body:
  text: 後漢書卷一上光武帝紀第一上世祖光武皇帝諱秀字文叔南陽蔡陽人高祖九世之孫也出自景帝生長沙定王發發生舂陵節侯買買生鬱林太守外外生巨鹿都尉回回生南頓令欽欽生光武光武年九歲而孤養於叔父良身長七尺三寸美須眉大口隆準日角性勤於稼穡而兄伯升好俠養士常非笑光武事田業比之高祖兄仲王莽天鳳中乃之長安受尚書略通大義莽末天下連歲災蝗寇盜鋒起地皇三年南陽荒飢諸家賓客多為小盜光武避吏新野因賣穀於宛宛人李通等以圖讖説光武云劉氏復起李氏為輔光武初不敢當然獨念兄伯升素結輕客必舉大事且王莽敗亡已兆天下方亂遂與定謀於是乃市兵弩十月與李通從弟軼等起於屆時年二十八十一月有星孛于張光武遂將賓客還舂陵時伯升已會衆起兵初諸家子弟恐懼皆亡逃自匿曰伯升殺我及見光武絳衣大冠皆驚曰謹厚者亦復為之乃稍自安伯升於是招新市平林兵與其帥王鳳陳牧西擊長聚光武初騎牛殺新野尉乃得馬進屠唐子鄉又殺湖陽尉軍中分財物不均衆恚恨欲反攻諸劉光武斂宗人所得物悉以與之衆乃悅進拔棘陽與王莽前隊大夫甄阜屬正梁丘賜戰於小長安漢軍大敗還保棘陽更始元年正月甲子朔漢軍復與甄阜梁丘賜戰於沘水西大破之斬阜賜伯升又破王莽納言將軍嚴尤秩宗將軍陳茂於淯陽進圍宛城二月辛巳立劉聖公為天子以伯升為大司徒光武為太常偏將軍三月光武別與諸將徇昆陽定陵郾皆下之多得牛馬財物穀數十萬斛轉以饋宛下莽聞阜賜死漢帝立大懼遣大司徒王尋大司空王邑將兵百萬其甲士奶二萬人五月到潁川復與嚴尤陳茂合初光武為舂陵侯家訟逋租於尤尤見而奇之及是時城中出降尤者言光武不取財物但會兵計策尤笑曰是美須眉者邪何為乃如是初王莽徵天下能為兵法者六十三家數百人並以為軍吏選練武衛招募猛士旌旗輜重千里不絶時有長人巨無霸長一丈大十圍以為壘尉又驅諸猛獸虎豹犀象之屬以助威武自秦漢出師之盛未嘗有也光武將數千兵徼之於陽關諸將見尋邑兵盛反走馳入昆陽皆惶怖憂念妻孥欲散歸諸城光武議曰今兵穀既少而外寇強大并力禦之功庶可立如欲分散藝無俱全且宛城未拔不能相救昆陽即破一日之間諸部亦滅矣今不同心膽共舉功名反欲守妻子財物邪諸將怒曰劉將軍何敢如是光武笑而起會候騎還言大兵且至城北軍陳數百里不見其後諸將遽相謂曰更請劉將軍計之光武復為圖畫成敗諸將憂迫皆曰諾時城中唯有八九千人光武乃使成國上公王鳳廷尉大將軍王常留守夜自與驃騎大將軍宗佻五威將軍李軼等十三騎出城南門於外收兵時莽軍到城下者且十萬光武幾不得出既至郾定陵悉發諸營兵而諸將貪惜財貨欲分留守之光武曰今若破敵珍珤萬倍大功可成如為所敗首領無餘何財物之有衆乃從嚴尤説王邑曰昆陽城小而堅今假號者在宛亟進大兵彼必奔走宛敗昆陽自服邑曰吾昔以虎牙將軍圍翟義坐不生得以見責讓今將百萬之衆遇城而不能下何謂邪遂圍之數十重列營百數雲車十餘丈瞰臨城中旗幟蔽野埃塵連天鉦鼓之聲聞數百里或為地道衝輣橦城積弩亂發矢下如雨城中負戶而汲王鳳等乞降不許尋邑自以為功在漏刻意氣甚逸夜有流星墜營中晝有雲如壞山當營而隕不及地尺而散吏士皆厭伏六月己卯光武遂與營部俱進自將步騎千餘前去大軍四五里而陳尋邑亦遣兵數千合戰光武奔之斬首數十級諸部喜曰劉將軍平生見小敵怯今見大敵勇甚可怪也且復居前請助將軍光武復進尋邑兵却諸部共乘之斬首數百千級連勝遂前時伯升拔宛已三日而光武尚未知乃偽使持書報城中云宛下兵到而陽墯其書尋邑得之不喜諸將既經纍捷膽氣益壯無不一當百光武乃與敢死者三千人從城西水上衝其中堅尋邑陳亂乘鋭崩之遂殺王尋城中亦鼓譟而出中它藝震呼動天地莽兵大潰走者相騰踐奔殪百餘里間會大雷風屋瓦皆飛雨下如注滍川盛溢虎豹皆股戰士卒爭赴溺死者以萬數水為不流王邑嚴尤陳茂輕騎乘死人度水逃去盡獲其軍實輜重車甲珍寶不可勝算舉之連月不盡或燔燒其餘光武因復徇下潁陽會伯升為更始所害光武自父城馳詣忿愈司徒官屬迎弔光武光武難交私語深引過而已未嘗自伐昆陽之功又不敢為伯升服喪飲食言笑如平常更始以是慙拜光武為破虜大將軍封武信侯九月庚戌三輔豪桀共誅王莽傳首詣宛更始將北都洛陽以光武行司隸校尉使前整修宮府於是置僚屬作文移從事司察一如舊章時三輔吏士東迎更始見諸將過皆冠幘而服婦人衣諸于繡镼莫不笑之或有畏而走者及見司隸僚屬皆歡喜不自勝老吏或垂涕曰不圖今日復見漢官威儀由是識者皆屬心焉及更始至洛陽乃遣光武以破虜將軍行大司馬事十月持節北度河鎮慰州郡所到部縣輒見二千石長吏三老官屬下至佐史考察黜陟如州牧行部事輒平遣囚徒除王莽苛政復漢官名吏人喜悅爭持牛酒迎勞進至邯鄲故趙繆王子林説光武曰赤眉今在河東但決水灌之百萬之衆可使為魚光武不答去之真定林於是乃詐以卜者王郎為成帝子子輿十二月立郎為天子都邯鄲遂遣使者降下郡國二年正月光武以王郎新盛乃北徇薊王郎移檄購光武十萬戶而故廣陽王子劉接起兵薊中以應郎城內擾亂轉相驚恐言邯鄲使者方到二千石以下皆出迎於是光武趣駕南轅晨夜不敢入城邑舍食道傍至饒陽官屬皆乏食光武乃自稱邯鄲使者入傳舍傳吏方進食從者飢爭奪之傳吏疑其偽乃椎鼓數十通紿言邯鄲將軍至官屬皆失色光武升車欲馳既而懼不免徐還坐曰請邯鄲將軍入久乃駕去傳中人遙語門者閉之門長曰天下詎可知而閉長者乎遂得南出晨夜兼行蒙犯霜雪天時寒面皆破裂至呼沱河無船適遇冰合得過未畢數車而陷進至下博城西遑惑不知所之有白衣老父在道旁指曰努力信都郡為長安守去此八十里光武即馳赴之信都太守任光開門出迎世祖因發旁縣得四千人先擊堂陽貰縣皆降之王莽和戎成卒正邳彤亦蟆降又昌城人劉植宋子人耿純各率宗親子弟據其縣邑以奉光武於是北降下曲陽衆稍合樂附者至有數萬人復北擊中山拔盧奴所過發奔命兵移檄邊部共擊邯鄲郡縣還復響應南擊新市真定元氏防子皆下之因入趙界時王郎大將李育屯柏人漢兵不知而進前部偏將朱浮鄧禹為育所破亡失輜重光武在後聞之收浮禹散卒與育戰於郭門大破之盡得其所獲育還保城攻之不下於是引兵拔廣阿會上谷太守耿況漁陽太守彭寵各遣其將吳漢寇恂等將突騎來助擊王郎更始亦遣尚書僕射謝躬討郎光武因大饗士卒遂東圍巨鹿王郎守將王饒堅守月餘不下郎遣將倪宏劉奉率數萬人救巨鹿光武逆戰於南斬首數千級四月進圍邯鄲連戰破之五月甲辰拔其城誅王郎收文書得吏人與郎交關謗毀者數千章光武不省會諸將軍燒之曰令反側子自安更始遣侍御史持節立光武為蕭王悉令罷兵詣行在所光武辭以河北未平不就徵自是始二於更始是時長安政亂四方背叛梁王劉永命睢陽公孫述稱王巴蜀李憲自立為淮南王秦豐自號楚黎王張步起琅邪董憲起東海延岑起漢中田戎起夷陵並置將帥侵略郡縣又別號諸賊銅馬大肜高湖重連鐵脛大搶尤來上江青犢五校鄉五幡五樓富平獲索等各領部曲衆合數百萬人所在寇掠光武將擊之先遣吳漢北發十郡兵幽州牧苗曾不從漢遂斬曾而發其衆秋光武擊銅馬於鄡吳漢將突騎來會清陽賊數挑戰光武堅營自守有出鹵掠者輒擊取之絶其糧道積月餘日賊食盡夜遁去追至館陶大破之受降未盡而高湖重連從東南來與銅馬餘衆合光武復與大戰於蒲陽悉破降之封其渠帥為列侯降者猶不自安光武知其意勑令各歸營勒兵乃自乘輕騎按行部陳降者更相語曰蕭王推赤心置人腹中安得不投死乎由是皆服悉將降人分配諸將衆遂數十萬故關西號光武為銅馬帝赤眉別帥與大肜青犢十餘萬衆在射犬光武進擊大破之衆皆散走使吳漢岑彭襲殺謝躬於鄴青犢赤眉賊入函谷關攻更始光武乃遣鄧禹率六裨將引兵而西以乘更始赤眉之亂時更始使大司馬朱鮪舞陰王李軼等屯洛陽光武亦令馮異守孟津以拒之建武元年春正月平陵人方望立前孺子劉嬰為天子更始遣丞相李松擊斬之光武北擊尤來大搶五幡於元氏追至右北平連破之又戰於順水北乘勝輕進反為所敗賊追急短兵接光武自投高岸遇突騎王豐下馬授光武光武撫其肩而上顧笑謂耿弇曰幾為虜嗤弇頻射却賊得免士卒死者數千人散兵歸保范陽軍中不見光武或云已歿諸將不知所為吳漢曰卿曹努力王兄子在南陽何憂無主衆恐懼數日乃定賊雖戰勝而素懾大威客主不相知夜遂引去大軍復進至安次與戰破之斬首三千餘級賊入漁陽乃遣吳漢率耿弇陳俊馬武等十二將軍追戰于潞東及平谷大破滅之朱鮪遣討難將軍蘇茂攻溫馮異寇恂與戰大破之斬其將賈強於是諸將議上尊號馬武先進曰天下無主如有聖人承敝而起雖仲尼為相孫子為將猶恐無能有益反水不收後悔無及大王雖執謙退奈宗廟社稷何宜且還薊即尊位乃議征伐今此誰賊而馳騖擊之乎光武驚曰何將軍出是言可斬也武曰諸將盡然光武使出曉之乃引軍還至薊夏四月公孫述自稱天子光武從薊還過范陽命收葬吏士至中山諸將復上奏曰漢遭王莽宗廟廢絶豪傑憤怒兆人塗炭王與伯升首舉義兵更始因其資以據帝位而不能奉承大統敗亂綱紀盜賊日多羣生危蹙大王初征昆陽王莽自潰後拔邯鄲北州弭定參分天下而有其二跨州據土帶甲百萬言武力則莫之敢抗論文德則無所與辭臣聞帝王不可以久曠天命不可以謙拒惟大王以社稷為計萬姓為心光武又不聽行到南平棘諸將復固請之光武曰寇賊未平四面受敵何遽欲正號位乎諸將且出耿純進曰天下士大夫捐親戚𠫓廾土壤從大王於矢石之間者其計固望其攀龍鱗附鳳翼以成其所志耳今功業即定天人亦應而大王留時逆衆不正號位純恐士大夫望絶計窮則有去歸之思無為久自苦也大衆一散難可復合時不可留衆不可逆純言甚誠切光武深感曰吾將思之行至鄗光武先在長安時同舍生強華自關中奉赤伏符曰劉秀發兵捕不道四夷雲集龍鬬野四七之際火為主羣臣因復奏曰受命之符人應為大萬里合信不議同情周之白魚曷足比焉今上無天子海內淆亂符瑞之應昭然著聞宜答天神以塞羣望光武於是命有司設壇場於鄗南千秋亭五成陌六月己未即皇帝位燔燎告天禋于六宗望於羣神其祝文曰皇天上帝后土神祇眷顧降命屬秀黎元為人父母秀不敢當羣下百辟不謀同辭咸曰王莽篡位秀發憤興兵破王尋王邑於昆陽誅王郎銅馬於河北平定天下海內蒙恩上當天地之心下為元元所歸讖記曰劉秀發兵捕不道卯金修德為天子秀猶固辭至于再至于三羣下僉曰皇天大命不可稽留敢不敬承於是建元為建武大赦天下改鄗為高邑是月赤眉立劉盆子為天子甲子前將軍鄧禹擊更始定國公王匡於安邑大破之斬其將劉均秋七月辛未拜前將軍鄧禹為大司徒丁丑以野王令王梁為大司空壬午以大將軍吳漢為大司馬偏將軍景丹為驃騎大將軍大將軍耿弇為建威大將軍偏將軍蓋延為虎牙大將軍偏將軍朱祐為建義大將軍中堅將軍杜茂為大將軍時宗室劉茂自號厭新將軍率衆降封為中山王己亥幸懷遣耿弇率強弩將軍陳俊軍五社津備滎陽以東使吳漢率朱祐及廷尉岑彭執金吾賈復揚化將軍堅鐔等十一將軍圍朱鮪於洛陽八月壬子祭社稷癸丑祠高祖太宗世宗於懷宮進幸河陽更始廩丘王田立降九月赤眉入長安更始奔高陵辛未詔曰更始秧恁棄城逃走妻子裸袒流道路朕甚愍之今封更始為淮陽王吏人敢有賊害者罪同大逆甲申以前高密令卓茂為太傅辛卯朱鮪舉城降冬十月癸丑車駕入洛陽幸南宮却非殿遂定都焉遣岑彭擊荊州羣賊十一月甲午幸懷劉永自稱天子十二月丙戌至自懷赤眉殺更始而隗囂據隴右盧芳起安定破虜大將軍叔壽擊五校賊於曲梁戰歿二年春正月甲子朔日有食之大司馬吳漢率九將軍擊鄉賊於鄴東大破降之庚辰封功臣皆為列侯大國四縣餘各有差下詔曰人情得足苦於放縱快須臾之欲忘慎罰之義惟諸將業遠功大誠欲傳於無窮宜如臨深淵如履薄冰戰戰栗栗日慎一日其顯效未酬名籍未立者大鴻臚趣上朕將差而録之博士丁恭議曰古帝王封諸侯不過百里故利以建侯取法於雷強幹弱枝所以為治也今封諸侯四縣不合法制帝曰古之亡國皆以無道未嘗聞功臣地多而滅亡者乃遣謁者即授印綬策曰在上不驕高而不危制節謹度滿而不溢敬之戒之傳爾子孫長為漢藩壬午更始復漢將軍鄧曄輔漢將軍于匡降皆復爵位壬子起高廟建社稷於洛陽立郊兆于城南始正火德色尚赤是月赤眉焚西京宮室發掘園陵寇掠關中大司徒鄧禹入長安遣府掾奉十一帝神主納於高廟真定王楊臨邑侯讓謀反遣前將軍耿純誅之二月己酉幸修武大司空王梁免壬子以太中大夫宋弘為大司空遣驃騎大將軍景丹率征虜將軍祭遵等二將軍擊弘農賊破之因遣祭遵圍蠻中賊張滿漁陽太守彭寵反攻幽州牧朱浮於薊延岑自稱武安王於漢中辛卯至自修武三月乙未大赦天下詔曰頃獄多冤人用刑深刻朕甚愍之孔子云刑罰不中則民無所措手足其與中二千石諸大夫博士議郎議省刑法遣執金吾賈復率二將軍擊更始郾王尹遵破降之驍騎將軍劉植擊密賊戰歿遣虎牙大將軍蓋延率四將軍伐劉永夏四月圍永於睢陽更始將蘇茂殺淮陽太守潘蹇而附劉永甲午封叔父良為廣陽王兄子章為太原王章弟興為魯王舂陵侯嫡子祉為城陽王五月庚辰封更始元氏王歙為泗水王故真定王楊子得為真定王周後姬常為周承休公癸未詔曰民有嫁妻賣子欲歸父母者恣聽之敢拘執論如律六月戊戌立貴人郭氏為皇后子強為皇太子大赦天下增郎謁者從官秩各一等丙午封宗子劉終為淄川王秋八月帝自將征五校丙辰幸內黃大破五校於羛陽降之遣遊擊將軍鄧隆救朱浮與彭寵戰於潞隆軍敗績蓋延拔睢陽劉永奔譙破虜將軍鄧奉據淯陽反九月壬戌至自內黃驃騎大將軍景丹薨延岑大破赤眉於杜陵關中飢民相食冬十一月以廷尉岑彭為征南大將軍率八將軍討鄧奉於堵鄉銅馬青犢尤來餘賊共立孫登為天子於上郡登將樂玄殺登以其衆五萬餘人降遣偏將軍馮異代鄧禹伐赤眉使太中大夫伏隆持節安輯青徐二州招張步降之十二月戊午詔曰惟宗室列侯為王莽所廢先靈無所依歸朕甚愍之其並復故國若侯身已歿屬所上其子孫見名尚書封拜是歲蓋延等大破劉永於沛西初王莽末天下旱蝗黃金一斤易粟一斛至是野穀旅生麻尤盛野蠶成繭被於山阜人收其利焉三年春正月甲子以偏將軍馮異為征西大將軍杜茂為驃騎大將軍大司徒鄧禹及馮異與赤眉戰於回溪禹異敗績征虜將軍祭遵破蠻中斬張滿辛巳立皇考南頓君已上四廟壬午大赦天下閏月乙巳大司徒鄧禹免馮異與赤眉戰於崤底大破之餘衆南向宜陽帝自將征之己亥幸宜陽甲辰親勒六軍大陳戎馬大司馬吳漢精卒當前中軍次之驍騎武衛分陳左右赤眉望見震怖遣使乞降丙午赤眉君臣面縛奉高皇帝璽綬詔以屬城門校尉戊申至自宜陽己酉詔曰羣盜縱橫賊害元元盆子竊尊號亂惑天下朕奮兵討擊應時崩解十餘萬衆束手降服先帝璽綬歸之王府斯皆祖宗之靈士人之力朕曷足以享斯哉其擇吉日祠高廟賜天下長子當為父後者爵人一級二月己未祠高廟受傳國璽劉永立董憲為海西王張步為齊王步殺光祿大夫伏隆而反幸懷遣吳漢率二將軍擊青犢於軹西大破降之三月壬寅以大司徒司直伏湛為大司徒彭寵陷薊城寵自立為燕王帝自將征鄧奉幸堵陽夏四月大破鄧奉於小長安斬之馮異與延岑戰於上林破之吳漢率七將軍與劉永將蘇茂戰於廣樂大破之虎牙大將軍蓋延圍劉永於睢陽五月己酉車駕還宮乙卯晦日有食之六月壬戌大赦天下耿弇與延岑戰於穰大破之秋七月征南大將軍岑彭率三將軍伐秦豐戰於黎丘大破之獲其將蔡宏庚辰詔曰吏不滿六百石下至墨綬長相有罪先請男子八十以上十歲以下及婦人從坐者自非不道詔所名捕皆不得繫當驗問者即就驗女徒雇山歸家蓋延拔睢陽獲劉永而蘇茂周建立永子紆為梁王冬十月壬申幸舂陵祠園廟因置酒舊宅大會故人父老十一月乙未至自舂陵涿郡太守張豐反是歲李憲自稱天子西州大將軍隗囂奉奏建義大將軍朱祐率祭遵與延岑戰於東陽斬其將張成四年春正月甲申大赦天下二月壬子幸懷壬申至自懷遣右將軍鄧禹率二將軍與延岑戰於武當破之夏四月丁巳幸鄴己巳進幸臨平遣大司馬吳漢擊五校賊於箕山大破之五月進幸元氏辛巳進幸盧奴遣征虜將軍祭遵率四將軍討張豐於涿郡斬豐六月辛亥車駕還宮七月丁亥幸譙遣捕虜將軍馬武偏將軍王霸圍劉紆於垂惠董憲將賁休以蘭陵城降憲圍之虎牙大將軍蓋延率平狄將軍龐萌救賁休不克蘭陵為憲所陷秋八月戊午進幸壽春太中大夫桓殺臨淮太守劉度惲坐誅遣揚武將軍馬成率三將軍伐李憲九月圍憲於舒冬十月甲寅車駕還宮太傅卓茂薨十一月丙申幸宛遣建義大將軍朱祐率二將軍圍秦豐於黎丘十二月丙寅進幸黎丘是歲征西大將軍馮異與公孫述將程焉戰於陳倉破之五年春正月癸巳車駕還宮二月丙午大赦天下捕虜將軍馬武偏將軍王霸拔垂惠乙丑幸魏郡壬申封殷後孔安為殷紹嘉公彭寵為其蒼頭所殺漁陽平大司馬吳漢率建威大將軍耿弇擊富平獲索賊於平原大破降之復遣耿弇率二將軍討張步三月癸未徙廣陽王良為趙王始就國平狄將軍龐萌反殺楚郡太守孫萌而東附董憲遣征南大將軍岑彭率二將軍伐田戎於津鄉大破之夏四月旱蝗河西大將軍竇融始遣使貢獻五月丙子詔曰久旱傷麥秋種未下朕甚憂之將殘吏未勝獄多冤結元元愁恨感動天氣乎其令中都官三輔郡國出繫囚罪非犯殊死一切勿案見徒免為庶人務進柔良退貪酷各正厥事焉六月建義大將軍朱祐拔黎丘獲秦豐而龐萌蘇茂圍桃城帝時幸蒙因自將征之先理兵任城乃進救桃城大破萌等秋七月丁丑幸沛祠高原廟詔修復西京園陵進幸湖陵征董憲又幸蕃遂攻董憲於昌慮大破之八月己酉進幸郯留吳漢攻劉紆董憲等車駕轉徇彭城下邳吳漢拔郯獲劉紆漢進圍董憲龐萌於朐冬十月還幸魯使大司空祠孔子耿弇等與張步戰於臨淄大破之帝幸臨淄進幸劇張步斬蘇茂以降齊地平初起太學車駕還宮幸太學賜博士弟子各有差十一月壬寅大司徒伏湛免尚書令侯霸為大司徒十二月盧芳自稱天子於九原西州大將軍隗囂子恂入侍交址牧鄧讓率七郡太守遣使奉貢詔復濟陽二年徭役是歲野穀漸少田畝益廣焉
