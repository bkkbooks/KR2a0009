body:
  text: 後漢書卷八十上文苑列傳第七十上杜篤字季雅京兆杜陵人也高祖延年宣帝時為御史大夫篤少博學不修小節不為鄉人所禮居美陽與美陽令遊數從請託不諧頗相恨令怒收篤送京師會大司馬吳漢薨光武詔諸儒誄之篤於獄中為誄辭最高帝美之賜帛免刑篤以關中表𩹉山河先帝舊京不宜改營洛邑乃上奏論都賦曰臣聞知而復知是為重知臣所欲言陛下已知故略其梗概不敢具陳昔般庚去奢行儉於亳成周之隆乃即中洛遭時制都不常厥邑賢聖之慮蓋有優劣霸王之姿明知相絕守國之埶同歸異術或𠫓廾去阻務處平易或據山帶河并吞六國或富貴思歸不顧見襲或掩空擊虛自蜀漢出即日車駕策由一卒或知而不從久都墝埆臣不敢有所據竊見司馬相如楊子雲作辭賦以諷主上臣誠慕之伏作書一篇名曰論都謹并封奏如左闔入函谷觀於崤黽圖險於隴蜀其三月丁酉行至長安經營宮室傷愍舊京即詔京兆迺命扶風齋肅致敬告覲園陵悽然有懷祖之思喟乎以思諸夏之隆遂天旋雲遊造舟于渭北涇流千乘方轂萬騎駢羅衍陳於岐梁東橫乎大河瘞后土禮邠郊其歲四月反于洛都明年有詔復函谷關作大駕宮六王邸高車廄於長安脩理東都城門橋涇渭往往繕離觀東臨霸滻西望昆明北登長平規龍首撫未央覛平樂儀建章之潢汙固不容夫吞舟且洛邑之渟瀯曷足以居乎萬乘哉咸陽守國利器不可久虛以示姦萌篤未甚然甚言也故因為述大漢之崇世據廱州之利而今國家未暇之故以喻客意曰有聖託之大漢大漢開基高祖有勳斬白蛇屯黑雲聚五星於東井提干將而呵暴秦蹈滄海跨崑崙奮彗光埽項軍遂濟人難蕩滌於泗沂劉敬建策初都長安太宗承流守之以文躬履節儉側身行仁食不二味衣無異采賑人以農桑率下以約己曼麗之容不悅於目鄭衞之聲不過於耳佞邪之臣不列於朝巧偽之物不鬻於巿故能理升平而刑幾措富衍於孝景功傳於後嗣讎遂命票騎勤任衞青勇惟鷹揚軍如流星深之匈奴割裂王庭席卷漠北叩勒祁連橫分單于屠裂百蠻燒罽帳繫閼氏燔康居灰珍奇椎鳴鏑釘鹿蠡馳阬岸獲昆彌虜侲驅騾驢馭宛馬鞭駃騠拓地萬里威震八荒肇置四郡據守敦煌并域屬國一郡領方立候隅北建護西羌捶驅氐僰寥狼卭莋東攠烏桓蹂轔濊貊南羈鉤町水劒強越殘夷文身海波沫血郡縣日南漂㮣朱崖部尉東南兼有黃支連緩耳瑣雕題摧天督牽象犀椎蛤碎瑠璃甲瑁戕觜觿於是同穴裘褐之域共川鼻飲之國莫不袒跣稽顙失氣虜伏非夫大漢之盛世藉廱土之饒得御外理內之術孰能致功若斯故創業於高祖嗣傳於孝惠德隆於太宗財衍於孝景威盛於聖武政行於宣元侈極於成哀祚缺於孝平傳世十一歷載三百德衰而復盈道微而復章皆莫能遷於廱州而背於咸陽宮室寢廟山陵相望高顯弘麗可思可榮羲農已來無茲著明田惟上沃野千里原隰彌望保殖五穀桑麻條暢濱據南山帶以涇渭號曰陸海蠢生萬類楩檀柘蔬果成實畎瀆潤淤水泉灌溉漸澤成川粳稻陶遂厥土之膏畝價一金田田相如鐇钁株林火耕流種功淺得深既有蓄積塞四臨四被隴蜀南通漢中北據谷口東阻嶔巖關函守嶢山東道窮置列洴隴廱偃西戎拒守襃斜嶺南不通杜口絕津朔方無從鴻渭之流徑入于河大船萬艘轉漕相過東綜滄海西綱流沙朔南暨聲諸夏是和城池百尺塞要害關梁之險多所衿帶一卒舉礧千夫沈滯一人奮戟三軍沮敗地埶便利介冑剽悍可與守近利以攻遠士卒易保人不肉袒肇十有二是為贍腴用霸則兼并先據則功殊修文則財衍行武則士要為政則化上篡逆則難誅進攻則百剋退守則有餘斯固帝王之淵囿而守國之利器也八誅自京師天畀更始不能引維慢藏招寇復致赤眉海內雲擾諸夏滅微羣龍並戰未知是非于時聖帝赫然申威荷天人之符兼不世之姿受命於皇上獲助於靈祇立號高邑搴旗四麾首策之臣運籌出奇虓怒之旅如虎如螭師之攸向無不靡披蓋夫燔魚剸蛇莫之方斯大呼山東響動流沙要龍淵首鏌命騰太白親發狼弧南禽公孫北背強胡西平隴冀東據洛都乃廓平帝宇濟蒸人於塗炭成兆庶之亹亹遂興復乎大漢論都而遺思廱州也方躬勞聖思以率海內厲撫名將略地疆外信威於征伐展武乎荒裔若夫文身鼻飲緩耳之主椎結左衽鐻之君東南殊俗不羈之國西北絕域難制之鄰靡不重譯納貢請為藩臣上猶謙讓而不伐勤意以為獲無用之虜不如安有益之民略荒裔之地不如保殖五穀之淵遠救於已亡不若近而存存也今國家躬脩道德吐惠含仁湛恩沾洽時風顯宣徒垂意於持平守實務在愛育元元苟有便於王政者聖主納焉何則物罔挹而不損道無隆而不移陽盛則運陰滿則虧故存不忘亡安不諱危雖有仁義猶設城池也客以利器不可久虛而國家亦不忘乎西都何必去洛邑之渟瀯與篤後仕郡文學掾以目疾二十餘年不闚京師篤之外高祖破羌將軍辛武賢以武略稱篤常歎曰杜氏文明善政而篤不任為吏辛氏秉義經武而篤又怯於事外內五世至篤衰矣女弟適扶風馬氏建初三年車騎將軍馬防擊西羌請篤為從事中郎戰沒於射姑山所著賦誄弔書讚七言女誡及雜文凡十八篇又著明世論十五篇子碩豪俠以貨殖聞王隆字文山馮翊雲陽人也王莽時以父任為郎後避難河西為竇融左護軍建武中為新汲令能文章所著詩賦銘書凡二十六篇初王莽末沛國史岑子孝亦以文章顯莽以為謁者著頌誄復神說疾凡四篇夏恭字敬公梁國蒙人也習韓詩孟氏易講授門徒常千餘人王莽末盜賊從橫攻沒郡縣恭以恩信為衆所附擁兵固守獨安全光武即位嘉其忠果召拜郎中再遷太山都尉和集百姓甚得其歡心恭善為文著賦頌詩勵學凡二十篇年四十九卒官諸儒共謚曰宣明君子牙少習家業著賦頌讚誄凡四十篇舉孝廉早卒鄉人號曰文德先生傅毅字武仲扶風茂陵人也少博學永平中於平陵習章句因作迪志詩曰咨爾庶士迨時斯勗日月逾邁豈云旋復哀我經營旅力靡及在茲弱冠靡所庶立作股肱萬邦是紀奕世載德迄我顯考保膺淑懿纘脩其道漢之中葉俊乂式序秩彼殷宗光此勳緒闇啟我童昧先人有訓我訊我誥訓我嘉務誨我博學爰率朋友尋此舊則契闊夙夜庶不懈忒作考之居息二事敗業多疾我力如彼遵衢則罔所極二志靡成聿勞我心如彼兼聽則溷於音夕聿同始卒毅以顯宗求賢不篤士多隱處故作七激以為諷建初中肅宗博召文學之士以毅為蘭臺令史拜郎中與班固賈逵共典校書毅追美孝明皇帝功德最盛而廟頌未立乃依清廟作顯宗頌十篇奏之由是文雅顯於朝廷車騎將軍馬防外戚尊重請毅為軍司馬待以師友之禮及馬氏敗免官歸永元元年車騎將軍竇憲復請毅為主記室崔駰為主簿及憲遷大將軍復以毅為司馬班固為中護軍憲府文章之盛冠於當世毅早卒著詩賦誄頌祝文七激連珠凡二十八篇黃香字文彊江夏安陸人也年九歲失母思慕憔悴殆不免喪鄉人稱其至孝年十二太守劉護聞而召之署門下孝子甚見愛敬香家貧內無僕妾躬執苦勤盡心奉養遂博學經典究精道術能文章京師號曰天下無雙江夏黃童初除郎中元和元年肅宗詔香詣東觀讀所未嘗見書香後告休及歸京師時千乘王冠帝會中山邸乃詔香殿下顧謂諸王曰此天下無雙江夏黃童者也左右莫不改觀後召詣安福殿言政事拜尚書郎數陳得失賞賚增加常獨止宿臺上晝夜不離省闥帝聞善之永元四年拜左丞功滿當遷和帝留增秩六年累遷尚書令後以為東郡太守香上疏讓曰臣江淮孤賤愚矇小生經學行能無可筭錄遭值太平先人餘福得以弱冠特蒙徵用連階累任遂極臺閣訖無纖介稱報恩効死誠不意悟卒被非望顯拜近郡尊位千里臣聞量能授官則職無廢事因勞施爵則賢愚得宜臣香小醜少為諸生典郡從政固非所堪誠恐矇頓孤忝聖恩又惟機密端首至為尊要復非臣香所當久奉承詔驚惶不知所裁臣香年在方剛適可驅使願乞餘恩留備宂官賜以督責小職任之宮臺煩事以畢臣香螻蟻小志誠瞑目至願土灰極榮帝亦惜香幹用久習舊事復留為尚書令增秩二千石賜錢三十萬是後遂管樞機甚見親重而香亦祗勤物務憂公如家十二年東平清河奏訞言卿仲遼等所連及且千人香科別據奏全活甚衆每郡國疑罪輒務求輕科愛惜人命每存憂濟又曉習邊事均量軍政皆得事宜帝知其精勤數加恩賞疾病存問賜醫藥在位多所薦達寵遇甚盛議者譏其過倖延平元年遷魏郡太守郡舊有內外園田常與人分種收穀歲數千斛香曰田令商者不農王制仕者不耕伐冰食祿之人不與百姓爭利乃悉以賦人課令耕種時被水年飢乃分奉祿及所得賞賜班贍貧者於是豐富之家各出義穀助官稟貸荒民獲全後坐水潦事免數月卒於家所著賦牋奏書令凡五篇子瓊自有傳劉毅北海敬王子也初封平望侯永元中坐事奪爵毅少有文辯稱元初元年上漢德論并憲論十二篇時劉珍鄧耽尹兌馬融共上書稱其美安帝嘉之賜錢三萬拜議郎李尤字伯仁廣漢雒人也少以文章顯和帝時侍中賈逵薦尤有相如楊雄之風召詣東觀受詔作賦拜蘭臺令史稍遷安帝時為諫議大夫受詔與謁者僕射劉珍等俱撰漢記後帝廢太子為濟陰王尤上書諫爭順帝立遷樂安相年八十三卒所著詩賦銘誄頌七歎哀典凡二十八篇尤同郡李勝亦有文才為東觀郎著賦誄頌論數十篇蘇順字孝山京兆霸陵人也和安閒以才學見稱好養生術隱處求道晚乃仕拜郎中卒於官所著賦論誄哀辭雜文凡十六篇時三輔多士扶風曹衆伯師亦有才學著誄書論四篇又有曹朔不知何許人作漢頌四篇劉珍字秋孫一名寶南陽蔡陽人也少好學永初中為謁者僕射鄧太后詔使與校書劉騊駼馬融及五經博士校定東觀五經諸子傳記百家蓺術整齊脫誤是正文字永寧元年太后又詔珍與騊駼作建武已來名臣傳遷侍中越騎校尉延光四年拜宗正明年轉衛尉卒官著誄頌連珠凡七篇又撰釋名三十篇以辯萬物之稱號云葛龔字元甫梁國寧陵人也和帝時以善文記知名性慷慨壯烈勇力過人安帝永初中舉孝廉為太官丞上便宜四事拜蕩陰令辟太尉府病不就州舉茂才為臨汾令居二縣皆有稱績著文賦碑誄書記凡十二篇王逸字叔師南郡宜城人也元初中舉上計吏為校書郎順帝時為侍中著楚辭章句行於世其賦誄書論及雜文凡二十一篇又作漢詩百二十三篇子延壽字文考有儁才少遊魯國作靈光殿賦後蔡邕亦造此賦未成及見延壽所為甚奇之遂輟翰而已曾有異夢意惡之乃作夢賦以自厲後溺水死時年二十餘崔琦字子瑋涿郡安平人濟北相瑗之宗也少遊學京師以文章博通稱初舉孝廉為郎河南尹梁冀聞其才請與交冀行多不軌琦數引古今成敗以戒之冀不能受乃作外戚箴其辭曰王晏起姜后脫簪齊桓好樂衛姬不音皆輔主以禮扶君以仁達才進善以義濟身之索牝雞之晨專權擅愛顯己蔽人陵長閒舊圮剝至親並后匹嫡淫女斃陳匪賢是上番為司徒荷爵負乘采食名都詩人是刺德用不憮暴辛惑婦拒諫自孤蝠蛇其心縱毒不辜諸父是殺孕子是刳天怒地忿人謀鬼圖甲子昧爽身首分離初為天子後為人螭泯絕宗廟燒燔末嬉喪夏襃姒斃周妲己亡殷趙靈沙丘戚姬人豕呂宗以敗陳后作巫卒死於外霍欲鴆子身乃罹廢能天人爾違患生不德福有慎機日不常中月盈有虧履道者固杖埶者危微臣司戚敢告在斯琦以言不從失意復作白鵠賦以為風梁冀見之呼琦問曰百官外內各有司存天下云云豈獨吾人之尤君何激刺之過乎琦對曰昔管仲相齊樂聞譏諫之言蕭何佐漢乃設書過之吏今將軍累世台輔任齊伊公而德政未聞黎元塗炭不能結納貞良以救禍敗反復欲鉗塞士口杜蔽主聽將使玄黃改色馬鹿易形乎冀無以對因遣琦歸後除為臨濟長不敢之職解印綬去冀遂令刺客陰求殺之客見琦耕於陌上懷書一卷息輒偃而詠之客哀其志以實告琦曰將軍令吾要子今見君賢者情懷忍忍可亟自逃吾亦於此亡矣琦得脫走冀後竟捕殺之所著賦頌銘誄箴弔論九咨七言凡十五篇邊韶字孝先陳留浚儀人也以文章知名教授數百人詔口辯曾晝日假臥弟子私謿之曰邊孝先腹便便嬾讀書但欲眠韶潛聞之應時對曰邊為姓孝為字腹便便五經笥但欲眠思經事寐與周公通夢靜與孔子同意師而可謿出何典記謿者大慙韶之才捷皆此類也桓帝時為臨潁侯相徵拜太中大夫著作東觀再遷北地太守入拜尚書令後為陳相卒官著詩頌碑銘書策凡十五篇
