body:
  text: 後漢書卷八十三逸民列傳第七十三易稱遁之時義大矣哉又曰不事王侯高尚其事是以堯稱則天不屈潁陽之高武盡美矣終全孤竹之潔自茲以降風流彌繁長往之軌未殊而感致之數匪一或隱居以求其志或回避以全其道或靜己以鎮其躁或去危以圖其安或垢俗以動其概或疵物以激其清然觀其甘心畎畝之中憔悴江海之上豈必親魚鳥樂林草哉亦云性分所至而已故蒙恥之賓屢黜不去其國蹈海之節千乘莫移其情適使矯易去就則不能相為矣彼雖硜硜有類沽名者然而蟬蛻囂埃之中自致寰區之外異夫飾智巧以逐浮利者乎荀卿有言曰志意修則驕富貴道義重則輕王公也漢室中微王莽篡位士之蘊藉義憤甚矣是時裂冠毀冕相攜持而去之者蓋不可勝數楊雄曰鴻飛冥冥弋者何篡焉言其違患之遠也光武側席幽人求之若不及旌帛蒲車之所徵賁相望於巖中矣若薛方逢萌聘而不肯至嚴光周黨王霸至而不能屈羣方咸遂志士懷仁斯固所謂舉逸民天下歸心者乎肅宗亦禮鄭均而徵高鳳以成其節自後帝德稍衰邪當朝處子耿介羞與卿相等列至乃抗憤而不顧多失其中行焉蓋録其絶塵不反同夫作者列之此篇野王二老者不知何許人也初光武二於更始會關中擾亂遣前將軍鄧禹西征送之於道既反因於野王獵路見二老者即禽光武問曰禽何向並舉手西指言此中多虎臣每即禽虎亦即臣大王勿往也光武曰苟有其備虎亦何患父曰何大王之謬邪昔湯即桀於鳴條而大城於亳武王亦即紂於牧野而大城於郟鄏彼二王者其備非不深也是以即人者人亦即之雖有其備庸可忽乎光武悟其旨顧左右曰此隱者也將用之辭而去莫知所在向長字子平河內朝歌人也隱居不仕性尚中和好通老易貧無資食好事者更饋焉受之取足而反其餘王莽大司空王邑辟之連年乃至欲薦之於莽固辭乃止潛隱於家讀易至損益卦喟然歎曰吾已知富不如貧貴不如賤但未知死何如生耳建武中男女娶嫁既畢勑斷家事勿相關當如我死也於是遂肆意與同好北海禽慶俱遊五嶽名山竟不知所終逢萌字子康北海都昌人也家貧給事縣為亭長時尉行過亭萌候迎拜謁既而擲楯歎曰大丈夫安能為人役哉遂去之長安學通春秋經時王莽殺其子宇萌謂友人曰三綱絶矣不去禍將及人即解冠挂東都城門歸將家屬浮海客於遼東萌素明陰陽知莽將敗有頃乃首戴瓦盎哭於巿曰新乎新乎因遂潛藏及光武即位乃之琅邪勞山養志修道人皆化其德北海太守素聞其高遣吏奉謁致禮萌不答太守懷恨而使捕之吏叩頭曰子康大賢天下共聞所在之處人敬如父往必不獲祇自毀辱太守怒收之繫獄更發它吏行至勞山人果相率以兵弩捍禦吏被傷流血奔而還後詔書徵萌託以老耄迷路東西語使者云朝廷所以徵我者以其有益於政尚不知方面所在安能濟時乎即便駕歸連徵不起以壽終初萌與同郡徐房平原李子雲王君公相友善並曉陰陽懷德穢行房與子雲養徒各千人君公遭亂獨不去儈牛自隱時人謂之論曰避世牆東王君公周黨字伯況太原廣武人也家産千金少孤為宗人所養而遇之不以理及長又不還其財黨詣鄉縣訟主乃歸之既而散與宗族悉免遣奴婢遂至長安遊學初鄉佐嘗衆中辱黨黨久懷之後讀春秋聞復讎之義便輟講而還與鄉佐相聞期剋鬬日既交刃而黨為鄉佐所傷困頓鄉佐服其義輿歸養之數日方蘇既悟而去自此勑身修志州里稱其高及王莽竊位託疾杜門自後賊暴從橫殘滅郡縣唯至廣武過城不入建武中徵為議郎以病去職遂將妻子居黽池復被徵不得已乃著短布單衣榖皮綃頭待見尚書及光武引見黨伏而不謁自陳願守所志帝乃許焉博士范升奏毀黨曰臣聞堯不須許由巢父而建號天下周不待伯夷叔齊而王道以成伏見太原周黨東海王良山陽王成等蒙受厚恩使者三聘乃肯就車及陛見帝廷黨不以禮屈伏而不謁偃蹇驕悍同時俱逝黨等文不能演義武不能死君釣采華名庶幾三公之位臣願與坐雲臺之下考試圖國之道不如臣言伏虛妄之罪而敢私竊虛名誇上求高皆大不敬書奏天子以示公卿詔曰自古明王聖主必有不賓之士伯夷叔齊不食周粟太原周黨不受朕祿亦各有志焉其賜帛四十匹黨遂隱居黽池著書上下篇而終邑人賢而祠之初黨與同郡談賢伯升鴈門殷謨君長俱守節不仕王莽世建武中徵並不到王霸字儒仲太原廣武人也少有清節及王莽篡位𠫓廾冠帶絶交宦建武中徵到尚書拜稱名不稱臣有司問其故霸曰天子有所不臣諸侯有所不友司徒侯霸讓位於霸閻陽毀之曰太原俗黨儒仲頗有其風遂止以病歸隱居守志茅屋蓬戶連徵不至以壽終嚴光字子陵一名遵會稽餘姚人也少有高名與光武同遊學及光武即位乃變名姓隱身不見帝思其賢乃令以物色訪之後齊國上言有一男子披羊裘釣澤中帝疑其光乃備安車玄纁遣使聘之三反而後至舍於北軍給牀褥太官朝夕進膳司徒侯霸與光素舊遣使奉書使人因謂光曰公聞先生至區區欲即詣造迫於典司是以不獲願因日暮自屈語言光不答乃投札與之口授曰君房足下位至鼎足甚善懷仁輔義天下悅阿諛順旨要領絶霸得書封奏之帝笑曰狂奴故態也車駕即日幸其館光臥不起帝即其臥所撫光腹曰咄咄子陵不可相助為理邪光又眠不應良久乃張目熟視曰昔唐堯著德巢父洗耳士故有志何至相迫乎帝曰子陵我竟不能下汝邪於是升輿歎息而去復引光入論道舊故相對纍日帝從容問光曰朕何如昔時對曰陛下差增於往因共偃臥光以足加帝腹上明日太史奏客星犯御坐甚急帝笑曰朕故人嚴子陵共臥耳除為諫議大夫不屈乃耕於富春山後人名其釣處為嚴陵瀨焉建武十七年復特徵不至年八十終於家帝傷惜之詔下郡縣賜錢百萬穀千斛井丹字大春扶風郿人也少受業太學通五經善談論故京師為之語曰五經紛綸井大春性清高未嘗修刺候人建武末沛王輔等五王居北宮皆好賓客更遣請丹不能致信陽侯陰就光烈皇后弟也以外戚貴盛乃詭說五王求錢千萬約能致丹而別使人要劫之丹不得已既至就故為設麥飯葱葉之食丹推去之曰以君侯能供甘旨故來相過何其薄乎更置盛饌乃食及就起左右進輦丹笑曰吾聞桀駕人車豈此邪坐中皆失色就不得已而令去輦自是隱閉不關人事以壽終梁鴻字伯鸞扶風平陵人也父讓王莽時為城門校尉封修遠伯使奉少昊後寓於北地而卒鴻時尚幼以遭亂世因卷席而葬後受業太學家貧而尚節介博覽無不通而不為章句學畢乃牧豕於上林苑中曾誤遺火延及它舍鴻乃尋訪燒者問所去失悉以豕償之其主猶以為少鴻曰無它財願以身居作主人許之因為執勤不懈朝夕鄰家耆老見鴻非恆人乃共責讓主人而稱鴻長者於是始敬異焉悉還其豕鴻不受而去歸鄉里藝家慕其高節多欲女之鴻並絶不娶同縣孟氏有女狀肥醜而黑力舉石臼擇對不嫁至年三十父母問其故女曰欲得賢如梁伯鸞者鴻聞而娉之女求作布衣麻屨織作筐緝績之具及嫁始以裝飾入門七日而鴻不答妻乃跪牀下請曰竊聞夫子高義簡斥數婦妾亦偃蹇數夫矣今而見擇敢不請罪鴻曰吾欲裘褐之人可與俱隱深山者爾今乃衣綺縞傅粉墨豈鴻所願哉妻曰以觀夫子之志耳妾自有隱居之服乃更為椎髻著布衣操作而前鴻大喜曰此真梁鴻妻也能奉我矣字之曰德曜名孟光居有頃妻曰常聞夫子欲隱居避患今何為默默無乃欲低頭就之乎鴻曰諾乃共入霸陵山中以耕織為業詠詩書彈琴以自娛仰慕前世高士而為四皓以來二十四人作頌因東出關過京師作五噫之歌曰陟彼北芒兮噫顧覽帝京兮噫宮室崔嵬兮噫人之劬勞兮噫遼遼未央兮噫肅宗聞而非之求鴻不得乃易姓運期名耀字侯光與妻子居齊魯之閒有頃又去適吳將行作詩曰逝舊邦兮遐征將遙集兮東南心惙怛兮傷悴志菲菲兮升降欲乘策兮縱邁疾吾俗兮作讒競舉枉兮措直咸先佞兮唌唌聊固靡慙兮獨建冀異州兮尚賢聊逍搖兮遨嬉纘仲尼兮周流儻云覩兮我悅遂舍車兮即浮過季札兮延陵求魯連兮海隅雖不察兮光貌幸神靈兮與休惟季春兮華阜麥含含兮方秀哀茂時兮逾邁愍芳香兮日臭悼吾心兮不獲長委結兮焉究口囂囂兮余訕嗟恇恇兮誰留遂至吳依大家皋伯通居廡下為人賃舂每歸妻為具食不敢於鴻前仰視舉案齊眉伯通察而異之曰彼傭能使其妻敬之如此非凡人也乃方舍之於家鴻潛閉著書十餘篇疾且困告主人曰昔延陵季子葬子於嬴博之閒不歸鄉里慎勿令我子持喪歸去及卒伯通等為求葬地於吳要離冢傍咸曰要離烈士而伯鸞清高可令相近葬畢妻子歸扶風初鴻友人京兆高恢少好老子隱於華陰山中及鴻東遊思恢作詩曰鳥嚶嚶兮友之期念高子兮僕懷思想念恢兮爰集茲二人遂不復相見恢亦高抗終身不仕高鳳字文通南陽葉人也少為書生家以農畝為業而專精誦讀晝夜不息妻嘗之田曝麥於庭令鳳護雞時天暴雨而鳳持竿誦經不覺潦水流麥妻還怪問鳳方悟之其後遂為名儒乃教授業於西唐山中鄰里有爭財者持兵而鬬鳳往解之不已乃脫巾叩頭固請曰仁義遜讓奈何𠫓廾之於是爭者懷感投兵謝罪鳳年老執志不倦名聲著聞太守連召請恐不得免自言本巫家不應為吏又詐與寡嫂訟田遂不仕建初中將作大匠任隗舉鳳直言到公車託病逃歸推其財産悉與孤兄子隱身漁釣終於家論曰先大夫宣侯嘗以講道餘隙寓乎逸士之篇至高文通傳輟而有感以為隱者也因著其行事而論之曰古者隱逸其風尚矣潁陽洗耳恥聞禪讓孤竹長飢羞食周粟或高棲以違行或疾物以矯情雖軌迹異區其去就一也若伊人者志陵青雲之上身晦泥汙之下心名且猶不顯況怨纍之為哉與夫委體淵沙鳴弦揆日者不其遠乎臺佟字孝威魏郡鄴人也隱於武安山鑿穴為居采藥自業建初中州辟不就刺史行部乃使從事致謁佟載病往謝刺史乃執贄見佟曰孝威居身如是甚苦如何佟曰佟幸得保終性命存神養和如明使君宣詔書夕惕庶事反不苦邪遂去隱逸終不見韓康字伯休一名恬休京兆霸陵人家世著姓常采藥名山賣於長安市口不二價三十餘年時有女子從康買藥康守價不移女子怒曰公是韓伯休那乃不二價乎康歎曰我本欲避名今小女子皆知有我何用藥為乃遁入霸陵山中博士公車連徵不至桓帝乃備玄纁之禮以安車聘之使者奉詔造康康不得已乃許諾辭安車自乘柴車冒晨先使者發至亭亭長以韓徵君當過方發人牛修道橋及見康柴車幅巾以為田叟也使奪其牛康即釋駕與之有頃使者至奪牛翁乃徵君也使者欲奏殺亭長康曰此自老子與之亭長何罪乃止康因中道逃遁以壽終矯慎字仲彥扶風茂陵人也少好黃老隱遁山谷因穴為室仰慕松喬導引之術與馬融蘇章鄉里並時融以才博顯名章以廉直稱然皆推先於慎汝南吳蒼甚重之因遺書以觀其志曰仲彥足下勤處隱約雖乘雲行泥棲宿不同每有西風何嘗不歎蓋聞黃老之言乘虛入冥藏身遠遁亦有理國養人施於為政至如登山絶迹神不著其證人不覩其驗吾欲先生從其可者於意何如昔伊尹不懷道以待堯舜之君方今明明四海開闢巢許無為箕山夷齊悔入首陽足下審能騎龍弄鳳翔嬉雲閒者亦非狐兔燕雀所敢謀也慎不答年七十餘竟不肯娶後忽歸家自言死日及期果卒後人有見慎於敦煌者故前世異之或云神仙焉慎同郡馬瑤隱於汧山以兔為事所居俗化百姓美之號馬牧先生焉戴良字叔鸞汝南慎陽人也曾祖父遵字子高平帝時為侍御史王莽篡位稱病歸鄉里家富好給施尚俠氣食客常三四百人時人為之語曰關東大豪戴子高良少誕節母喜驢鳴良常學之以娛樂焉及母卒兄伯鸞居廬啜粥非禮不行良獨食肉飲酒哀至乃哭而二人俱有毀容或問良曰子之居喪禮乎良曰然禮所以制情佚也情苟不佚何禮之論夫食旨不甘故致毀容之實若味不存口食之可也論者不能奪之良才既高達而論議尚奇多駭流俗同郡謝季孝問曰子自視天下孰可為比良曰我若仲尼長東魯大禹出西羌獨步天下誰與為偶舉孝廉不就再辟司空府彌年不到州郡迫之乃遁辭詣府悉將妻子既行在道因逃入江夏山中優遊不仕以壽終初良五女並賢每有求姻輒便許嫁疏裳布被竹笥木屐以遣之五女能遵其訓皆有隱者之風焉法真字高卿扶風郿人南郡太守雄之子也好學而無常家博通內外圖典為關西大儒弟子自遠方至者陳留范冉等數百人性恬靜寡欲不交人閒事太守請見之真乃幅巾詣謁太守曰昔魯哀公雖為不肖而仲尼稱臣太守虛薄欲以功曹相屈光贊本朝何如真曰以明府見待有禮故敢自同賓末若欲吏之真將在北山之北南山之南矣太守戄然不敢復言辟公府舉賢良皆不就同郡田弱薦真曰處士法真體兼四業學窮典奧幽居恬泊樂以忘憂將蹈老氏之高蹤不為玄纁屈也臣願聖朝就加袞職必能唱清廟之歌致來儀之鳳矣會順帝西巡弱又薦之帝虛心欲致前後四徵真曰吾既不能遁形遠世豈飲洗耳之水哉遂深自隱絶終不降屈友人郭正稱之曰法真名可得聞身難得而見逃名而名我隨避名而名我追可謂百世之師者矣乃共刊石頌之號曰玄德先生年八十九中平五年以壽終漢陰老父者不知何許人也桓帝延熹中幸竟陵過雲夢臨沔水百姓莫不觀者有老父獨耕不輟尚書郎南陽張溫異之使問曰人皆來觀老父獨不輟何也老父笑而不對溫下道百步自與言老父曰我野人耳不達斯語請問天下亂而立天子邪理而立天子邪立天子以父天下邪役天下以奉天子邪昔聖王宰世茅茨采椽而萬人以寧今子之君勞人自縱逸遊無忌吾為子羞之子何忍欲人觀之乎溫大慙問其姓名不告而去陳留老父者不知何許人也桓帝世黨錮事起守外黃令陳留張升去官歸鄉里道逢友人共班草而言升曰吾聞趙殺鳴犢仲尼臨河而反覆巢竭淵龍鳳逝而不至今宦豎日亂陷害忠良賢人君子其去朝乎夫德之不建人之無援將性命之不免奈何因相抱而泣老父趨而過之植其杖太息言曰吁二大夫何泣之悲也夫龍不隱鱗鳳不藏羽網羅高縣去將安所雖泣何及乎二人欲與之語不顧而去莫知所終龐公者南郡襄陽人也居峴山之南未嘗入城府夫妻相敬如賓荊州刺史劉表數延請不能屈乃就候之謂曰夫保全一身孰若保全天下乎龐公笑曰鴻鵠巢於高林之上暮而得所栖黿鼉穴於深淵之下夕而得所宿夫趣舍行止亦人之巢穴也且各得其栖宿而已天下非所保也因釋耕於壟上而妻子耘於前表指而問曰先生苦居畎畝而不肯官祿後世何以遺子孫乎龐公曰世人皆遺之以危今獨遺之以安雖所遺不同未為無所遺也表歎息而去後遂攜其妻子登鹿門山因采藥不反贊曰江海冥滅山林長往遠性風疏逸情雲上道就虛全事違塵枉
