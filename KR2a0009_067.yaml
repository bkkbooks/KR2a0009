body:
  text: 後漢書卷六十一左周黃列傳第五十一左雄字伯豪南郡陽涅陽人也安帝時舉孝廉稍遷冀州刺史州部多豪族好請託雄常閉門不與交通奏案貪猾二千石無所回忌永建初公車徵拜議郎時順帝新立大臣懈怠朝多闕政雄數言事其辭深切尚書僕射虞詡以雄有忠公節上疏薦之曰臣見方今公卿以下類多拱默以樹恩為賢盡節為愚至相戒曰白璧不可為容容多後福伏見議郎左雄數上封事至引陛下身遭難厄以為警戒實有王臣蹇蹇之節周公謨成王之風宜擢在喉舌之官必有匡弼之益由是拜雄尚書再遷尚書令上疏陳事曰對禹貴在知人安人則惠黎民懷之分伯建侯代位親民民用和穆禮讓以興故詩云有淹淒淒興雨祁祁雨我公田遂及我私及幽厲昏亂不自為政褒豔用權七子黨進賢愚錯緒深谷為陵故其詩云四國無政不用其良又曰哀今之人胡為虺蜴言人畏吏如虺蜴也宗周既滅六國并秦坑儒泯典剗革五等更立郡縣縣設令長郡置守尉什伍相司封豕其民大漢受命雖未復古然克慎庶官蠲苛救敝悅以濟難撫而循之至於文景天下康乂誠由玄靖寬柔克慎官人故也降及宣帝興於仄陋綜核名實知時所病刺史守相輒親引見考察言行信賞必罰帝乃歎曰民所以安而無怨者政平吏良也與我共此者其唯良二千石乎以為吏數變易則下不安業久於其事則民服教化其有政理者輒以璽書勉勵增秩賜金或爵至關內侯公卿缺則以次用之是以吏稱其職人安其業漢世良吏於茲為盛故能降來儀之瑞建中興之功動無常各懷一切莫慮長久謂殺害不辜為威風聚斂整辨為賢能以理己安民為劣弱以奉法循理為不化髡鉗之戮生於睚眥覆尸之禍成於喜怒視民如寇讎稅之如豺虎監司項背相望與同疾疢見非不舉聞惡不察觀政於亭傳責成於朞月言善不稱德論功不據實虛誕者獲譽拘檢者離毀或因罪而引高或色斯以求名州宰不覆競共辟召踊躍升騰超等踰匹或考奏捕案而亡不受罪會赦行賂復見洗滌朱紫同色清濁不分故使姦猾枉濫輕忽去就拜除如流缺動百數鄉官部吏職斯祿薄車馬衣服一出於民廉者取足貪者充家特選橫調紛紛不絶送迎煩費損政傷民和氣未洽灾眚不消咎皆在此今之墨綬猶古之諸侯拜爵王庭輿服有庸而齊於匹豎叛命避負非所以崇憲明理惠育元元也臣愚以為守相長吏惠和有顯效者可就增秩勿使移徙非父母喪不得去官其不從法禁不式王命錮之終身雖會赦令不得齒列若被劾奏亡不就法者徙家邊郡以懲其後鄉部親民之吏皆用儒生清白任從政者寬其負算增其秩祿吏職滿歲宰府州郡乃得辟舉如此威福之路塞虛僞之端絶送迎之役損賦斂之源息循理之吏得成其化率土之民各寧其所追配文宣中興之軌流光垂祚永世不刊帝感其言申下有司考其真僞詳所施行雄之所言皆明達政體而宦豎權終不能用自是選代交互令長月易迎新送舊勞擾無已或官寺空曠無人案事每選部劇乃至逃亡永建三年京師漢陽地皆震裂水泉涌出四年司冀復有大水雄推較灾異以為下人有逆上之徵又上疏言宜密為備以俟不虞尋而青冀楊州盜賊連發數年之閒海內擾亂其後天下大赦賊雖頗解而官猶無備流叛之餘數月復起雄與僕射郭虔共上疏以為寇賊連年死亡太半一人犯法舉宗羣亡宜及其尚微開令改悔若告黨與者聽除其罪能誅斬者明加其賞書奏並不省又上言宜崇經術繕修太學帝從之陽嘉元年太學新成詔試明經者補弟子增甲乙之科員各十人除京師及郡國耆儒年六十以上為郎舍人諸王國郎者百三十八人雄又上言郡國孝廉古之貢士出則宰民宣協風教若其面牆則無所施用孔子曰四十不惑禮稱強仕請自今孝廉年不滿四十不得察舉皆先詣公府諸生試家法文吏課箋奏副之端門練其虛實以觀異能以美風俗有不承科令者正其罪法若有茂才異行自可不拘年齒帝從之於是班下郡國明年有廣陵孝廉徐淑年未及舉臺郎疑而詰之對曰詔書曰有如顏回子奇不拘年齒是故本郡以臣充選郎不能屈雄詰之曰昔顏回聞一知十孝廉聞一知幾邪淑無以對乃譴却郡於是濟陰太守胡廣等十餘人皆坐謬舉免黜唯汝南陳蕃潁川李膺下邳陳球等三十餘人得拜郎中自是牧守畏栗莫敢輕舉迄于永嘉喜察選清平多得其人雄又奏徵海內名儒為博士使公卿子弟為諸生有志操者加其俸祿及汝南謝廉河南趙建年始十二各能通經雄並奏拜童子郎於是負書來學雲集京師初帝廢為濟陰王乳母宋娥與黃門孫程等共議立帝帝後以娥前有謀遂封為山陽君邑五千戶又封大將軍梁商子冀襄邑侯雄上封事曰夫裂土封侯王制所重高皇帝約非劉氏不王非有功不侯孝安皇帝封江京王聖等遂致地震之異永建二年封陰謀之功又有日食之變數術之士咸歸咎於封爵今青州飢虛盜賊未息民有乏絶上求稟貸陛下乾乾勞思以濟民為務宜循古法寧靜無為以求天意以消灾異誠不宜追録小恩虧失大典帝不聽雄復諫曰臣聞人君莫不好忠正而惡讒諛然而歷世之患莫不以忠正得罪讒諛蒙幸者蓋聽忠難從諛易也夫刑罪人情之所甚惡貴寵人情之所甚欲是以時俗為忠者少而習諛者多故令人主數聞其美稀知其過迷而不悟至於危亡臣伏見詔書顧念阿母舊德宿恩欲特加顯賞案尚書故事無乳母爵邑之制唯先帝時阿母王聖為野王君聖造生讒賊廢立之禍生為天下所咀嚼死為海內所歡快桀紂貴為天子而庸僕羞與為比者以其無義也夷齊賤為匹夫而王侯爭與為伍者以其有德也今阿母躬蹈約儉以身率下羣僚蒸庶莫不向風而與王聖並同爵號懼違本操失其常願臣愚以為凡人之心理不相遠其所不安古今一也百姓深懲王聖傾覆之禍民萌之命危於纍卵常懼時世復有此類怵惕之念未離於心恐懼之言未絶乎口乞如前議歲以千萬給奉阿母內足以盡恩愛之歡外可不為吏民所怪梁冀之封事非機急宜過灾厄之運然後平議可否會復有地震緱氏山崩之異雄復上疏諫曰先帝封野王君漢陽地震今封山陽君而京城復震專政在陰其灾尤大臣前後瞽言封爵至重王者可私人以財不可以官宜還阿母之封以塞灾異今冀已高讓山陽君亦宜崇其本節雄言數切至娥亦畏懼辭讓而帝戀戀不能已卒封之後阿母遂以交遘失爵是時大司農劉據以職事被譴召詣尚書傳呼促步又加以捶撲雄上言九卿位亞三事班在大臣行有佩玉之節動有庠序之儀孝明皇帝始有撲罰皆非古典帝從而改之其後九卿無復捶撲者自雄掌納言多所匡肅每有章表奏議臺閣以為故事遷司隸校尉初雄薦周舉為尚書舉既稱職議者咸稱焉及在司隸又舉故冀州刺史馮直以為將帥而直嘗坐臧受罪舉以此劾奏雄雄悅曰吾嘗事馮直之父而又與直善今宣光以此奏吾乃是韓厥之舉也由是天下服焉明年坐法免後復為尚書永和三年卒周舉字宣光汝南汝陽人陳留太守防之子防在儒林傳舉姿貌短陋而博學洽聞為儒者所宗故京師為之語曰五經從橫周宣光延熹光四年辟司徒李郃府時宦者孫程等既立順帝誅滅諸閻議郎陳禪以為閻太后與帝無母子恩宜徙別館絶朝見羣臣議者咸以為宜舉謂郃曰昔鄭武姜謀殺嚴公嚴公誓之黃泉秦始皇怨母失行久而隔絶後感潁考叔茅焦之言循復子道書傳美之今諸閻新誅太后幽在離宮若悲愁生疾一日不虞主上將何以令於天下如從禪議後世歸咎明公宜密表朝廷令奉太后率厲羣臣朝覲如舊以厭天心以答人望郃即上疏陳之明年正月帝乃朝于東宮太后由此以安後長樂少府朱倀代郃為司徒舉猶為吏時孫程等坐懷表上殿爭功帝怒悉徙封遠縣勑洛陽令促期發遣舉說朱倀曰朝廷在西鍾下時非孫程等豈立雖韓彭吳賈之功何以加諸今忘其大德録其小過如道路夭折帝有殺功臣之譏及今未去宜急表之倀曰今詔怒二尚書已奏其事吾獨表此必致罪譴舉曰明公年過八十位為台輔不於今時竭忠報國惜身安寵欲以何求祿位雖全必陷佞邪之譏諫而獲罪猶有忠貞之名若舉言不足採請從此辭倀乃表諫帝果從之舉後舉茂才為平丘令上書言當世得失辭甚切正尚書郭虔應賀等見之歎息共上疏稱舉忠直欲帝置章御坐以為規誡舉稍遷并州刺史太原一郡舊俗以介子推焚骸有龍忌之禁至其亡月咸言神靈不樂舉火由是士民每冬中輒一月寒食莫敢煙爨老小不堪歲多死者舉既到州乃作弔書以置子推之廟言盛冬去火殘損民命非賢者之意以宣示愚民使還溫食於是衆惑稍解風俗頗革轉冀州刺史陽嘉三年司隸校尉左雄薦舉徵拜尚書舉與僕射黃瓊同心輔政名重朝廷左右憚之是歲河南三輔大旱五穀灾傷天子親自露坐德陽殿東廂請雨又下司隸河南禱祀河神名山大澤詔書以舉才學優深特下策問曰朕以不德仰承三統夙興夜寐思協大中頃年以來旱灾屢應稼穡焦枯民食困乏五品不訓王澤未流羣司素餐據非其位審所貶黜變復之徵厥效何由分別具對勿有所諱舉對曰臣聞易稱天尊地卑乾坤以定二儀交構乃生萬物萬物之中以人為貴故聖人養之以君成之以化順四節之宜適陰陽之和使男女婚娶不過其時包之以仁恩導之以德教示之以灾異訓之以嘉祥此先聖承乾養物之始也夫陰陽閉隔則二氣否塞二氣否塞則人物不昌人物不昌則風雨不時風雨不時則水旱成灾陛下處唐虞之位未行堯舜之政近廢文帝光武之法而循亡秦奢侈之欲內積怨女外有曠夫今皇嗣不興東宮未立傷和逆理斷絶人倫之所致也非但陛下行此而已豎宦之人亦復虛以形藝威侮良家取女閉之至有白首歿無配偶逆於天心昔武王入殷出傾宮之女成湯遭灾以六事剋己魯僖遇旱而自責祈雨皆以精誠轉禍為福自枯旱以來彌歷年歲未聞陛下改過之效徒勞至尊暴露風塵誠無益也又下州郡祈神致請昔齊有大旱景公欲祀河伯晏子諫曰不可夫河伯以水為城國魚鱉為民庶水盡魚枯豈不欲雨自是不能致也陛下所行但務其華不尋其實猶緣木希魚却行求前誠宜推信革政崇道變惑出後宮不御之女理天下冤枉之獄除太官重膳之費夫五品不訓責在司徒有非其位宜急黜斥臣自藩外擢典納言學薄智淺不足以對易傳曰陽感天不旋日惟陛下留神裁察因召見舉及書令成翊世僕射黃瓊問以得失舉等並對以為宜慎官人去斥貪汙離遠佞邪循文帝之儉尊孝明之教則時雨必應帝曰百官貪汙佞邪者為誰乎舉獨對曰臣從下州超備機密不足以別羣臣然公卿大臣數有直言者忠貞也阿諛苟容者佞邪也司徒視事六年未聞有忠言異謀愚心在此其後以事免司徒劉崎遷舉司隸校尉永和元年灾異數見省內惡之詔召公卿中二千石尚書詣顯親殿問曰言事者多云昔周公攝天子事及薨成王欲以公禮葬之天為動變及更葬以天子之禮即有反風之應北鄉侯親為天子而葬以王禮故數有灾異宜加尊諡列於昭穆羣臣議者多謂宜如詔旨舉獨對曰昔周公有請命之應隆太平之功故皇天動威以章聖德北鄉侯本非正統姦臣所立立不踰歲年號未改皇天不祐大命夭昏春秋王子猛不稱崩魯子野不書葬今北鄉侯無它功德以王禮葬之於事已崇不宜稱諡灾眚之來弗由此也於是司徒黃尚太常桓焉等七十人同舉議帝從之尚字伯河南郡人也少歷顯位亦以政事稱舉出為蜀郡太守坐事免大將軍梁商表為從事中郎甚敬重焉六年三月上巳日商大會賓客宴于洛水舉時稱疾不往商與親昵酣飲極歡及酒闌倡罷繼以露之歌坐中聞者皆為掩涕太僕張种時亦在焉會還以事告舉舉歎曰此所謂哀樂失時非其所也殃將及乎商至秋果薨商疾篤帝親臨幸問以遺言對曰人之將死其言也善臣從事中郎周舉清高忠正可重任也由是拜舉諫議大夫時連有灾異帝思商言召舉於顯親殿問以變眚舉對曰陛下初立遵修舊典興化致政遠近肅然頃年以來稍違於前朝多寵幸祿不序德觀天察人準今方古誠可危懼書曰僭恆暘若夫僭差無度則言不從而下不正陽無以制則上擾下竭宜密嚴勑州郡察彊宗大姦以時禽討其後江淮猾賊周生徐鳳等處處並起如舉所陳時詔遣八使巡行風俗皆選素有威名者乃拜舉為侍中舉侍中杜喬守光祿大夫周栩前青州刺史馮羡尚書欒巴侍御史張綱兗州刺史郭遵太尉長史劉班並守光祿大夫分行天下其刺史二千石有臧罪顯明者驛馬上之墨綬以下便輒收舉其有清忠惠利為百姓所安宜表異者皆以狀上於是八使同時俱拜天下號曰八俊舉於是劾奏貪猾表薦公清朝廷稱之遷河內太守徵為大鴻臚及梁太后臨朝詔以殤帝幼崩廟次宜在順帝下太常馬訪奏宜如詔書諫議大夫呂勃以為應依昭穆之序先殤帝後順帝詔下公卿舉議曰春秋魯閔公無子庶兄僖公代立其子文公遂躋僖於閔上孔子譏之書曰有事于太廟躋僖公傳曰逆祀也及定公正其序經曰從祀先公為萬世法也今殤帝在先於秩為父順帝在後於親為子先後之義不可改昭穆之序不可亂呂勃議是也太后下詔從之遷光祿勳會遭母憂去職後拜光祿大夫建和三年卒朝廷以舉清公亮直方欲以為宰相深痛惜之乃詔告光祿勳汝南太守曰昔在前世求賢如渴封墓軾閭以光賢哲故公叔見誄翁歸蒙述所以昭忠厲俗作範後昆故光祿大夫周舉性侔夷魚忠踰隨管前授牧守及還納言出入京輦有欽哉之績在禁闈有密靜之風豫録乃勳用登九列方欲式序百官亮協三事不永夙終用乖遠圖朝廷愍悼良為愴然詩不云乎肇敏戎功用錫爾祉其令將大夫以下到喪發日復會弔加賜錢十萬以旌委蛇素絲之節焉子協協字巨勝少尚玄虛以父任為郎自免歸家父故吏河南召夔為郡將卑身降禮致敬於協協恥交報之因杜門自絶後太守舉孝廉復以疾去時梁冀貴盛被其徵命者莫敢不應唯協前後三辟竟不能屈後舉賢良方正不應又公車徵玄纁備禮固辭廢疾常隱處竄身慕老聃清靜杜絶人事巷生荊棘十有餘歲至延熹二年乃開門延賓游談宴樂及秋而梁冀誅年終而協卒時年五十蔡雍以為知命自協曾祖父揚至協孫恂六世一身皆知名云黃瓊字世英江夏安陸人魏郡太守香之子也香在文苑傳瓊初以父任為太子舍人辭病不就遭父憂服闋五府俱辟連年不應永建中公卿多薦瓊者於是與會稽賀純廣漢楊厚俱公車徵瓊至綸氏稱疾不進有司劾不敬詔下縣以禮慰遣遂不得已先是徵聘處士多不稱望李固素慕於瓊乃以書逆遺之曰聞已度伊洛近在萬歲亭豈即事有漸將順王命乎蓋君子謂伯夷隘柳下惠不恭故傳曰不夷不惠可否之閒蓋聖賢居身之所珍也誠遂欲枕山棲谷擬跡巢由斯則可矣若當輔政濟民今其時也自生民以來善政少而亂俗多必待堯舜之君此為志士終無時矣常聞語曰嶢嶢者易缺皎皎者易汙陽春之曲和者必寡盛名之下其實難副近魯陽樊君被徵初至朝廷設壇席猶待神明雖無大異而言行所守無缺而毀謗布流應時折減者豈非觀聽望深聲名太盛乎自頃徵聘之士胡元安薛孟嘗朱仲昭顧季鴻等其功業皆無所採是故俗論皆言處士純盜虛聲願先生弘此遠謨令衆人歎服一雪此言耳瓊至即拜議郎稍遷尚書僕射初瓊隨父在臺閣習見故事及後居職達練官曹爭議朝堂莫能抗奪時連有灾異瓊上疏順帝曰閒者以來卦位錯謬寒燠相干蒙氣數興日暗月散原之天意殆不虛然陛下宜開石室案河洛外命史官悉條上永建以前至漢初灾異與永建以後訖于今日孰為多少又使近臣儒者參考政事數見公卿察問得失諸無功德者宜皆斥黜臣前頗陳灾眚并薦光祿大夫樊英太中大夫薛包及會稽賀純廣漢楊厚未蒙御省伏見處士巴郡黃錯漢陽任棠年皆耆耋有作者七人之志宜更見引致助崇大化於是有詔公車徵錯等三年大旱瓊復上疏曰昔魯僖遇旱以六事自讓躬節儉閉女謁於讒佞者十三人誅稅民受貨者九人退舍南郊天立大雨今亦宜顧省政事有所損闕務存質儉以易民聽尚方御府息除煩費明勑近臣使遵法度如有不移示以好惡數見公卿引納儒士訪以政化使陳得失又囚徒尚積多致死亡亦足以感傷和氣招降灾旱若改敝從善擇用嘉謀則灾消福至矣書奏引見德陽殿使中常侍以瓊奏書屬主者施行自帝即位以後不行籍田之禮瓊以國之大典不宜久廢上疏奏曰自古聖帝哲王莫不敬恭明祀增致福祥故必躬郊廟之禮親籍田之勤以先羣萌率勸農功昔周宣王不籍千畝文公以為大譏卒有姜戎之難終損中興之名竊見陛下遵稽古之鴻業體虔肅以應天順時奉元懷柔百神朝夕觸塵埃於道路晝暮聆庶政以恤人雖詩詠成湯之不怠遑書美文王之不暇食誠不能加今廟祀適闋而祈穀潔齊之事近在明日臣恐左右之心不欲屢動聖躬以為親耕之禮可得而廢臣聞先王制典籍田有日司徒咸戒司空除壇先時五日有協風之應王即齊宮饗醴載耒誠重之也自癸巳以來仍西北風甘澤不集寒涼尚結迎春東郊既不躬親先農之禮所宜自勉以逆和氣以致時風易曰君子自強不息斯其道也書奏帝從之頃之遷尚書令瓊以前左雄所上孝廉之選專用儒學文吏於取士之義猶有所遺乃奏增孝悌及能從政者為四科事竟施行又雄前議舉吏先試之於公府又覆之於端門後尚書張盛奏除此科瓊復上言覆試之作將以澄洗清濁覆實虛濫不宜改革帝乃止出為魏郡太守稍遷太常和平中以選入侍講禁中元嘉元年遷司空桓帝欲褒崇大將軍梁冀使中朝二千石以上會議其禮特進胡廣太常羊溥司隸校尉祝恬太中大夫邊韶等咸稱冀之勳德其制度賚賞以宜比周公錫之山川土田附庸瓊獨建議曰冀前以親迎之勞增邑三千又其子胤亦加封賞昔周公輔相成王制禮作樂化致太平是以大啓土宇開地七百今諸侯以戶邑為制不以里數為限蕭何識高祖於泗水霍光定傾危以興國皆益戶增封以顯其功冀可比鄧禹合食四縣賞賜之差同於霍光使天下知賞必當功爵不越德朝廷從之冀意以為恨會以地動策免復為太僕永興元年遷司徒轉太尉梁冀前後所託辟召一無所用雖有善人而為冀所飾舉者亦不加命延熹元年以日食免復為大司農明年梁冀被誅太尉胡廣司徒韓縯司空孫朗皆坐阿附免廢復拜瓊為太尉以師傅之恩而不阿梁氏乃封為邟鄉侯邑千戶瓊辭疾讓封六七上言旨懇惻乃許之梁冀既誅瓊首居公位舉奏州郡素行貪汙至死徙者十餘人海內由是翕然望之尋而五侯權傾動內外自度力不能匡乃稱疾不起四年以寇賊免其年復為司空秋以地震免七年疾篤上疏諫曰臣聞天者務剛其氣君者務彊其政是以王者處高自持不可不安履危任力不可不據夫自持不安則顛任力不據則危故聖人升高據上則以德義為首涉危蹈傾則以賢者為力唐堯以德化為冠冕以稷契為筋力高而益崇動而愈據此先聖所以長守萬國保其社稷者也昔高皇帝應天順民奮劒而王掃除秦項革命創制降德流祚至於哀平而帝道不綱秕政日亂遂使姦佞朝外戚專恣所冠不以仁義為冕所蹈不以賢佐為力終至顛蹶滅絶漢祚天維陵民鬼慘愴賴皇乾眷命炎德復輝光武以聖武天挺繼統興業創基冰泮之上立足枳棘之林擢賢於衆愚之中畫功於無形之世崇禮義於交爭循道化於亂離是自歷高而不傾任力危而不跌興復洪祚開建中興光被八極垂名無窮至於中葉盛業漸衰陛下初從藩國爰升帝位天下拭目謂見太平而即位以來未有勝政諸梁秉權豎宦充朝重封纍職傾動朝廷卿校牧守之選皆出其門羽毛齒革明珠南金之寶殷滿其室富擬王府藝回天地言之者必族附之者必榮忠臣懼死而杜口萬夫怖禍而木舌塞陛下耳目之明更為聾瞽之主故太尉李固杜喬忠以直言德以輔政念國亡身隕歿為報而坐陳國議遂見殘滅賢愚切痛海內傷懼又前白馬令李雲指言宦官罪穢宜誅皆因衆人之心以救積薪之敝弘農杜衆知雲所言宜行懼雲以忠獲罪故上書陳理之乞同日而死所以感悟國家庶雲獲免而雲既不辜衆又并坐天下尤痛益以怨結故朝野之人以忠為諱昔趙殺鳴犢孔子臨河而反夫覆巢破卵則鳳皇不翔刳牲夭胎則麒麟不臻誠物類相感理使其然尚書周永昔為沛令素事梁冀幸其威藝坐事當罪越拜令職見冀將衰乃陽毀示忠遂因姦計亦取封侯又黃門協邪羣輩相黨自冀興盛腹背相親朝夕圖謀共搆姦軌臨冀當誅無可設巧復記其惡以要爵賞陛下不加清澄審別真僞復與忠臣並時顯封使朱紫共色粉墨雜蹂所謂扺金玉於沙礫碎圭璧於泥塗四方聞之莫不憤歎昔曾子大孝慈母投杼伯奇至賢終於流放夫讒諛所舉無高而不可升阿黨相抑無深而不可淪可不察歟臣至頑駑世荷國恩身輕位重勤不補過然懼於永歿負釁益深敢以垂絶之日陳不諱之言庶有萬分無恨三泉其年卒時年七十九贈車騎將軍諡曰忠侯孫琬琬字子琰少失父早而辨慧祖父瓊初為魏郡太守建和元年正月日食京師不見而瓊以狀聞太后詔問所食多少瓊思其對而未知所況琬年七歲在傍曰何不言日食之餘如月之初瓊大驚即以其言應詔而深奇愛之後瓊為司徒琬以公孫拜童子郎辭病不就知名京師時司空盛允有疾瓊遣琬候問會江夏上蠻賊事副府允發書視畢微戲琬曰江夏大邦而蠻多士少琬奉手對曰蠻夷猾夏責在司空因拂衣辭去允甚奇之稍遷五官中郎將時陳蕃為光祿勳深相敬待數與議事舊制光祿舉三署郎以高功久次才德尤異者為茂才四行時權富子弟多以人事得舉而貧約守志者以窮退見遺京師為之謠曰欲得不能光祿茂才於是琬蕃同心顯用志士平原劉醇河東朱山蜀郡殷參等並以才行蒙舉蕃琬遂為權富郎所見中傷事下御史丞王暢侍御史刁韙韙暢素重蕃琬不舉其事而左右復陷以朋黨暢坐左轉議郎而免蕃官琬韙俱禁錮韙字子榮彭城人後陳蕃被徵而言事者多訟韙復拜議郎遷尚書在朝有鯁直節出為魯東海二郡相性抗厲有明略所在稱神常以法度自整家人莫見墯容焉琬被廢𠫓廾幾二十年至光和末太尉楊賜上書薦琬有撥亂之才由是徵拜議郎擢為青州刺史遷侍中中平初出為右扶風徵拜將作大匠少府太僕又為豫州牧時寇賊陸梁州境雕殘琬討擊平之威聲大震政績為天下表封關內侯及董卓秉政以琬名臣徵為司徒遷太尉更封陽泉鄉侯卓議遷都長安琬與司徒楊彪同諫不從琬退而駮議之曰昔周公營洛邑以寧姬光武卜東都以隆漢天之所啓神之所安大業既定豈宜妄有遷動以虧四海之望時人懼卓暴怒琬必及害固諫之琬對曰昔白公作亂於楚屈廬冒刃而前崔杼弒君於齊晏嬰不懼其盟吾雖不德誠慕古人之節琬竟坐免卓猶敬其名德舊族不敢害後與楊彪同拜光祿大夫及徙西都轉司隸校尉與司徒王允同謀誅卓及卓將李傕郭汜攻破長安遂收琬下獄死時年五十二論曰古者諸侯歲貢士進賢受上賞非賢貶爵土升之司馬辨論其才論定然後官之任官然後祿之故王者得其人進仕勸其行經邦弘務所由久矣漢初詔舉賢良方正州郡察孝廉秀才斯亦貢士之方也中興以後復增敦朴有道賢能直言獨行高節質直清白敦厚之屬榮路既廣觖望難裁自是竊名僞服浸以流競權門貴仕請謁繁興自左雄任事限年試才雖頗有不密固亦因識時宜而黃瓊胡廣張衡崔瑗之徒泥滯舊方互相詭駮循名者屈其短算實者挺其效故雄在尚書天下不敢妄選十餘年閒稱為得人斯亦效實之徵乎順帝始以童弱反政而號令自出知能任使故士得用情天下喁喁仰其風采遂乃備玄纁玉帛以聘南陽樊英天子降寢殿設壇席尚書奉引延問失得急登賢之舉虛降己之禮於是處士鄙生忘其拘儒拂巾衽褐以企旌車之招矣至乃英能承風俊乂咸事若李固周舉之淵謨弘深左雄黃瓊之政事貞固桓焉楊厚以儒學進崔瑗馬融以文章顯吳祐蘇章种皓欒巴牧民之良幹龐參虞詡將帥之宏規王龔張皓虛心以推士張綱杜喬直道以糾違郎顗陰陽詳密張衡機術特妙東京之士於茲盛焉向使廟堂納其高謀彊場埸宣其智力帷幄容其謇辭舉厝稟其成式則武宣之軌豈其遠而詩云靡不有初鮮克有終可為恨哉及孝桓之時碩德繼興陳蕃楊秉處稱賢宰皇甫張段出號名將王暢李膺彌縫袞闕朱穆劉陶獻替匡時郭有道奬鑒人倫陳仲弓弘道下邑其餘宏儒遠智高心潔行激揚風流者不可勝言而斯道莫振文武陵隊在朝者以正議嬰戮謝事者以黨錮致灾往車雖折而來軫方遒所以傾而未顛決而未潰豈非仁人君子心力之為乎嗚呼贊曰雄作納言古之八元舉升以彙越自下蕃登朝理政並紓灾昏瓊名夙知纍章國疵琬亦早秀位及志差
