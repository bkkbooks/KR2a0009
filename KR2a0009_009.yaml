body:
  text: 後漢書卷八孝靈帝紀第八孝靈皇帝諱宏肅宗玄孫也曾祖河閒孝王開祖淑父萇世封解瀆亭侯帝襲侯爵母董夫人桓帝崩無子皇太后與父城門校尉竇武定策禁中使守光祿大夫劉倏持節將左右羽林至河閒奉迎建寧元年春正月壬午城門校尉竇武為大將軍己亥帝到夏門亭使竇武持節以王青蓋車迎入殿中庚子即皇帝位年十二改元建寧以前太尉陳蕃為太傅與竇武及司徒胡廣參録尚書事使護羌校尉段熲討先零羌二月辛酉葬孝桓皇帝于宣陵廟曰威宗庚午謁高廟辛未謁世祖廟大赦天下賜民爵及帛各有差段熲大破先零羌於逢義山閏月甲午追尊皇祖為孝元皇夫人夏氏為孝元皇后考為孝仁皇夫人董氏為慎園貴人夏四月戊辰太尉周景薨司空宣酆免長樂衛尉王暢為司空五月丁未朔日有食之詔公卿以下各上封事及郡國守相舉有道之士各一人又故刺史二千石清高有遺惠為衆所歸者皆詣公車太中大夫劉矩為太尉六月京師雨水秋七月破羌將軍段熲復破先零羌於涇陽八月司空王暢免宗正劉寵為司空九月丁辛亥中常侍曹節矯詔誅太傅陳蕃大將軍竇武及尚書令尹勳侍中劉瑜屯騎校尉馮述皆夷其族皇太后遷于南宮司徒胡廣為太傅録尚書事司空劉寵為司徒大鴻臚許栩為司空冬十月甲辰晦日有食之令天下繫斥未決入縑贖各有差十一月太尉劉矩免太僕沛國聞人襲為太尉十二月鮮卑及濊貊寇幽并二州二年春正月丁丑大赦天下三月乙巳尊慎園董貴人為孝仁皇后夏四月癸巳大風雨雹詔公卿以下各上封事五月太尉聞人襲罷司空許栩免六月司徒劉寵為太尉太常許訓為司徒太僕長沙劉囂為司空秋七月破羌將軍段熲大破先零羌於射虎塞外谷東羌悉平九月江夏蠻叛州郡討平之丹陽山越賊圍太守陳夤夤擊破之冬十月丁亥中常侍侯覽諷有司奏前司空虞放太僕杜密長樂少府李膺司隸校尉朱瑀𧜛潁川太守巴肅沛相荀翌昱河內太守魏朗山陽太守翟超皆為鉤黨下獄死者百餘人妻子徙邊諸附從者錮及五屬制詔州郡大舉鉤黨於是天下豪桀及儒學行義者一切結為黨人庚子戊戌晦日有食之十一月太尉劉寵免太僕郭禧為太尉鮮卑寇并州是歲長樂太僕曹節為車騎將軍百餘日罷三年春正月河內人婦食夫河南人夫食婦三月丙寅晦日有食之夏四月太尉郭禧罷太中大夫聞人襲為太尉秋七月司空劉囂罷八月大鴻臚橋玄為司空九月執金吾董寵下獄死冬濟南賊起攻東平陵鬱林烏滸民相率內屬四年春正月甲子帝加元服大赦天下賜公卿以下各有差唯黨人不赦二月癸卯地震海水溢河水清三月辛酉朔日有食之太尉聞人襲免太僕李咸為太尉詔公卿至六百石各上封事大疫使中謁者巡行致醫藥司徒許訓免司空橋玄為司徒夏四月太常來豔為司空五月河東地裂雨雹山水暴出秋七月司空來豔免癸丑立貴人宋氏為皇后司徒橋玄免太常宗俱為司空前司空許栩為司徒冬鮮卑寇并州熹平元年春三月壬戌太傅胡廣薨夏五月己巳大赦天下改元熹平長樂太僕侯覽有罪自殺六月京師雨水癸巳皇太后竇氏崩秋七月甲寅葬桓思皇后宦官諷司隸校尉段熲捕繫太學諸生千餘人冬十月渤海王悝被誣謀反丁亥悝及妻子皆自殺十一月會稽人許生自稱越王寇郡縣遣楊州刺史臧旻丹陽太守陳夤討破之十二月司徒許栩罷大鴻臚袁隗為司徒鮮卑寇并州是歲甘陵王恢薨二年春正月大疫使使者巡行致醫藥丁丑司空宗俱薨二月壬午大赦天下以光祿勳楊賜為司空三月太尉李咸免夏五月以司隸校尉段熲為太尉沛相師遷坐誣罔國王下獄死六月北海地震東萊北海海水溢秋七月司空楊賜免太常潁川唐珍為司空冬十二月日南徼外國重譯貢獻太尉段熲罷鮮卑寇幽并二州癸酉晦日有食之三年春正月夫餘國遣使貢獻二月己巳大赦天下太常陳耽為太尉三月中山王暢薨無子國除夏六月封河閒王利子康為濟南王奉孝仁皇祀秋洛水溢冬十月癸丑令天下繫囚罪未決入縑贖十一月楊州刺史臧旻率丹陽太守陳寅大破許生於會稽斬之任城王博薨十二月鮮卑寇北地北地太守夏育追擊破之鮮卑又寇并州司空唐珍罷永樂少府許訓為司空四年春三月詔諸儒正五經文字刻石立于太學門外封河閒王建孫子他為任城王夏四月郡國七大水五月丁卯大赦天下延陵園灾遣使者持節告祠延陵鮮卑寇幽州六月弘農三輔螟遣守宮令之鹽監穿渠為民興利令郡國遇災者減田租之半其傷害十四以上勿收責冬十月丁巳令天下繫囚罪未決入縑贖拜沖帝母虞美人為憲園貴人質帝母陳夫人為渤海孝王妃改平準為中準使宦者為令列於內署自是諸署悉以閹人為丞令五年夏四月癸亥大赦天下益州郡夷叛太守李顒討平之復崇高山名為嵩高山大雩使侍御史行詔獄亭部理冤枉原輕繫休囚徒五月太尉陳耽罷司空許訓為太尉閏月永昌太守曹鸞坐訟黨人𠫓廾市詔黨人門生故吏父兄子弟在位者皆免官禁錮六月壬戌太常南陽劉逸為司空秋七月太尉許訓罷光祿勳劉寬為太尉冬十月壬午御殿後槐樹自拔倒豎司徒袁隗罷十一月丙戌光祿大夫楊賜為司徒十二月甘陵王定薨試太學生年六十以上百餘人除郎中太子舍人至王家郎郡國文學吏是歲鮮卑寇幽州沛國言黃龍見譙六年春正月辛丑大赦天下二月南宮平城門及武庫東垣屋自壞夏四月大旱七州蝗鮮卑寇三邊市賈民為宣陵孝子者數十人皆除太子舍人秋七月司空劉逸免衛尉陳球為司空八月遣破鮮卑中郎將田晏出雲中使胸奴中郎將臧旻與南單于出鴈門護烏桓校尉夏育出高柳並伐鮮卑晏等大敗冬十月癸丑朔日有食之太尉劉寬免帝臨辟雍辛丑京師地震辛亥令天下繫囚罪未決入縑贖十一月司空陳球免十二月甲寅太常河南孟為太尉庚辰司徒楊賜免太常陳耽為司空鮮卑寇遼西永安太僕王旻下獄死光和元年春正月合浦交址烏滸蠻叛招引九真日南民攻沒郡縣太尉孟罷二月辛亥朔日有食之癸丑光祿勳陳國袁滂為司徒己未地震始置鴻都門學生三月辛丑大赦天下改元光和太常常山張皓為太尉夏四月丙辰地震侍中寺雌雞化為雄司空陳耽免太常來豔為司空五月壬午有白衣人入德陽殿門亡去不獲六月丁丑有黑氣墯所御溫德殿庭中秋七月壬子青虹見御坐玉堂後殿庭中八月有星孛于天巿九月太尉張皓罷太常陳球為太尉司空來豔薨冬十月屯騎校尉袁逢為司空皇后宋氏廢后父執金吾酆下獄死丙子晦日有食之十一月太尉陳球免十二月丁巳光祿大夫橋玄為太尉是歲鮮卑寇酒泉京師馬生人初開西邸賣官自關內侯虎賁羽林入錢各有差私令左右賣公卿公千萬卿五百萬二年春大疫使常侍中謁者巡行致醫藥三月司徒袁滂免大鴻臚劉郃為司徒乙丑太尉橋玄罷太中大夫段熲為太尉京兆地震司空袁逢罷太常張濟為司空夏四月甲戌朔日有食之辛巳中常侍王甫及太尉段熲並下獄死丁酉大赦天下諸黨人禁錮小功以下皆除之東平王端薨五月衛尉劉寬為太尉秋七月使胸奴中郎將張修有罪下獄死冬十月甲申司徒劉郃永樂少府陳球衛尉陽球步兵校尉劉納謀誅宦者事泄皆下獄死巴郡板楯蠻叛遣御史中丞蕭瑗督益州刺史討之不剋十二月光祿勳楊賜為司徒鮮卑寇幽并二州是歲河閒王利薨洛陽女子生兒兩頭四臂三年春正月癸酉大赦天下二月公府駐駕廡自壞三月梁王元薨夏四月江夏蠻叛六月詔公卿舉能通古文尚書毛詩左氏穀梁春秋各一人悉除議郎秋表是地震涌水出八月令繫囚罪未決入縑贖各有差冬閏月有星孛于狼弧鮮卑寇幽并二州十二月己巳立貴人何氏為皇后是歲作罼圭靈昆苑四年春正月初置騄驥廄丞領受郡國調馬豪右辜榷馬一匹至二百萬二月郡國上芝英草夏四月庚子大赦天下交址刺史朱俊討交址合浦烏滸蠻破之六月庚辰雨雹秋七月河南言鳳皇見新城羣鳥隨之賜新城令及三老力田帛各有差九月庚寅朔日有食之太尉劉寬免衛尉許為太尉閏月辛酉北宮東掖庭永巷署災司徒楊賜罷冬十月太常陳耽為司徒鮮卑寇幽并二州是歲帝作列肆於後宮使諸釆女販賣更相盜竊爭鬬帝著商估服飲宴為樂又於西園弄狗著進賢冠帶綬又駕四驢帝躬自操轡驅馳周旋京師轉相放效五年春正月辛未大赦天下二月大疫三月司徒陳耽免夏四月旱太常袁隗為司徒五月庚申永樂宮置灾秋七月有星孛于太微巴郡板楯蠻詣太守曹謙降癸酉令繫囚罪未決入縑贖八月起四百尺觀於阿亭道冬十月太尉許罷太常楊賜為太尉校獵上林苑歷函谷關遂巡狩于廣成苑十二月還幸太學六年春正月日南徼外國重譯貢獻二月復長陵縣比豐沛三月辛未大赦天下夏大旱秋金城河水溢五原山岸崩始置圃囿署以宦者為令冬東海東萊琅邪井中冰厚尺餘大有年中平元年春二月巨鹿人張角自稱黃天其部師帥有三十六萬方皆著黃巾同日反叛安平甘陵人各執其王以應之三月戊申以河南尹何進為大將軍將兵屯都亭置八關都尉官壬子大赦天下黨人還諸徙者唯張角不赦詔公卿出馬弩舉列將子孫及吏民有明戰陳之略者詣公車遣北中郎將盧植討張角左中郎將皇甫嵩右中郎將朱俊討潁川黃巾庚子南陽黃巾張曼成攻殺郡守褚貢夏四月太尉楊賜免太僕弘農鄧盛為太尉司空張濟罷大司農張溫為司空朱俊為黃巾波才所敗侍中向栩張鈞坐言宦者下獄死汝南黃巾敗太守趙謙於邵陵廣陽黃巾殺幽州刺史郭勳及太守劉衛五月皇甫嵩朱俊復與波才等戰於長社大破之六月南陽太守秦頡擊張曼成斬之交址屯兵執刺史及合浦太守來達自稱柱天將軍遣交址刺史賈琮討平之皇甫嵩朱俊大破汝南黃巾於西華詔嵩討東郡朱俊討南陽盧植破黃巾圍張角於廣宗宦官誣奏植抵罪遣中郎將董卓攻張角不克寸洛陽女子生兒兩頭共身秋七月巴郡妖巫張修反寇郡縣河南尹徐灌下獄死八月皇甫嵩與黃巾戰於倉亭獲其帥乙巳詔皇甫嵩北討張角九月安平王續有罪誅國除冬十月皇甫嵩與黃巾賊戰於廣宗獲張角弟梁角先死乃戮其尸以皇甫嵩為左車騎將軍十一月皇甫嵩又破黃巾于下曲陽斬張角弟寶湟中義從胡北宮伯玉與先零羌叛以金城人邊章韓遂為軍帥攻殺護羌校尉伶徵金城太守陳懿癸巳朱俊拔宛城斬黃巾別帥孫夏詔減太官珍羞御食一肉廄馬非郊祭之用悉出給軍十二月己巳大赦天下改元中平是歲下邳王意薨無子國除郡國生異草備龍蛇鳥獸之形二年春正月大疫琅邪王據薨二月己酉南宮大灾火半月乃滅己癸亥廣陽門外屋自壞稅天下田畝十錢黑山賊張牛角等十餘輩並起所在寇鈔司徒袁隗免三月廷尉崔烈為司徒北宮伯玉等寇三輔遣左車騎將軍皇甫嵩討之不克寸夏四月庚戌大風雨雹五月太尉鄧盛翩太僕河南內張延為太尉秋七月三輔螟左車騎將軍皇甫嵩免八月以司空張溫為車騎將軍討北宮伯玉九月特進楊賜為司空冬十月庚寅司空楊賜薨光祿大夫許相為司空前司徒陳耽諫議大夫劉陶坐直言下獄死十一月張溫破北宮伯玉於美陽因遣蕩寇將軍周慎追擊之圍榆中又遣中郎將董卓討先零羌慎卓並不克鮮卑寇幽并二州是歲造萬金堂於西園洛陽民生兒兩頭四臂三年春二月江夏兵趙慈反殺南陽太守秦頡庚戌大赦天下太尉張延罷車騎將軍張溫為太尉中常趙忠為車騎將軍復修玉堂殿鑄銅人四黃鍾四及天祿蝦蟆又鑄四出文錢五月壬辰晦日有食之六月荊州刺史王敏討趙慈斬之車騎將軍趙忠罷秋八月懷陵上有雀萬數悲鳴因鬬相殺冬十月武陵蠻叛寇郡界郡兵討破之前太尉張延為宦人所譖下獄死十二月鮮卑寇幽并二州四年春正月己卯大赦天下二月滎陽賊殺中牟令己亥南宮內殿罘罳自壞三月河南尹何苗討滎陽賊破之拜苗為車騎將軍夏四月涼州刺史耿鄙討金城賊韓遂鄙兵大敗遂寇漢陽漢陽太守傅燮戰沒扶風人馬騰漢陽人王國並叛寇三輔太尉張溫免司徒崔烈為太尉五月司空許相為司徒光祿勳沛國丁宮為司空六月洛陽民生男兩頭共身漁陽人張純與同郡張舉舉兵叛攻殺右北平太守劉政遼東太守楊終護烏桓校尉公綦稠等舉兵自稱天子寇幽冀二州秋九月丁酉令天下繫囚罪未決入縑贖冬十月零陵人觀自稱平天將軍寇桂陽長沙太守孫堅擊斬之十一月太尉崔烈罷大司農曹嵩為太尉十二月休屠各胡叛是歲賣關內侯假金印紫綬傳世入錢五百萬五年春正月休屠各胡寇西河殺郡守邢紀丁酉大赦天下二月有星孛于紫宮黃巾餘賊郭太等起於西河白波谷寇太原河東三月休屠各胡攻殺戌刺史張懿遂與南胸奴左部胡合殺其單于夏四月汝南葛陂黃巾攻沒郡縣太尉曹嵩罷五月永樂少府樊陵為太尉六月丙寅大風太尉樊陵罷益州黃巾馬相攻殺刺史郗儉自稱天子又寇巴郡殺郡守趙部益州從事賈龍擊相斬之郡國七大水秋七月射聲校尉馬日磾為太尉八月初置西園八校尉司徒許相罷司空丁宮為司徒光祿勳南陽劉弘為司空衛尉董重為票騎將軍九月南單于叛與白波賊寇河東遣中郎將孟益率騎都尉公孫瓚討漁陽賊張純等冬十月壬午御殿後槐樹自拔倒豎青徐黃巾復起寇郡縣甲子帝自稱無上將軍耀兵於平樂觀十一月涼州賊王國圍陳倉右將軍皇甫嵩救之遣下軍校尉鮑鴻討葛陂黃巾巴郡板楯蠻叛遣上軍別部司馬趙瑾討平之公孫瓚與張純戰於石門大破之是歲改刺史新置牧六年春二月左將軍皇甫嵩大破王國於陳倉三月幽州牧劉虞購斬漁陽賊張純下軍校尉鮑鴻下獄死夏四月丙午朔日有食之太尉馬日磾免幽州牧劉虞為太尉丙辰帝崩于南宮嘉德殿年三十四戊午皇子辨即皇帝位年十七尊皇后曰皇太后太后臨朝大赦天下改元為光喜熹封皇弟協為渤海王後將軍袁隗為太傅與大將軍何進參録尚書事上軍校尉蹇碩下獄死五月辛巳票騎將軍董重下獄死六月辛亥孝仁皇后董氏崩辛酉葬孝靈皇帝于文陵雨水秋七月甘陵王忠薨庚寅孝仁皇后歸葬河閒慎陵徙渤海王協為陳留王司徒丁宮罷八月戊辰中常侍張讓段圭等殺大將軍何進於是虎賁中郎將袁術燒東西宮攻諸宦者庚午張讓段圭等劫少帝及陳留王幸北宮德陽殿何進部曲將吳匡與車騎將軍何苗戰於朱雀闕下苗敗斬之辛未司隸校尉袁紹勒兵收僞司隸校尉樊陵河南尹許相及諸閹人無少長皆斬之讓圭等復劫少帝陳留王走小平津尚書盧植追讓圭等斬數人其餘投河而死帝與陳留王協夜步逐熒光行數里得民家露車共乘之辛未還宮大赦天下改光喜熹為昭寧并州牧董卓殺執金吾丁原司空劉弘免董卓自為司空九月甲戌董卓廢帝為弘農王自六月雨至于是月論曰秦本紀說趙高譎二世指鹿為馬而趙忠張讓亦紿靈帝不得登高臨觀故知亡敝者同其致矣然則靈帝之為靈也優哉贊曰靈帝負乘委體宦孽徵亡備兆小雅盡缺麋鹿霜露遂棲宮衛
