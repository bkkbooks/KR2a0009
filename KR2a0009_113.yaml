body:
  text: 後漢書志第十三五行一貌不恭淫雨服妖雞禍青眚屋自壞訛言旱謠狼食人五行傳說及其占應漢書五行志録之詳矣故泰山太守應劭給事中董巴散騎常侍譙周並撰建武以來災異今合而論之以續前志云五行傳曰田獵不宿飲食不享出入不節奪民農時及有姦謀則木不曲直謂木失其性而為災也又曰貌之不恭是謂不肅厥咎狂厥罰恆雨厥極惡時則有服妖時則有龜孽時則有雞禍時則有下體生上之痾時則有青眚青祥惟金沴木說云氣之相傷謂之沴建武元年赤眉賊率樊崇逢安等共立劉盆子為天子然崇等視之如小兒百事自由初不恤録也後正旦至君臣欲共饗既坐酒食未下羣臣更起亂不可整時大司農楊音案劒怒曰小兒戲尚不如此其後遂破壞崇安等皆誅死唯音為關內侯以壽終光武崩山陽王荊哭不哀作飛書與東海王勸使作亂明帝以荊同母弟太后在故隱之後徙王廣陵荊遂坐復謀反自殺也章帝時竇皇后兄憲以皇后甚幸於上故人人莫不畏憲憲於是強請奪沁水長公主田公主畏憲與之憲乃賤顧之後上幸公主田覺之問憲憲又上言借之上以后故但譴勑之不治其罪後章帝崩竇太后攝政憲秉機密忠直之臣與憲忤者憲多害之其後憲兄弟遂皆被誅桓帝時梁冀秉政兄弟貴盛自恣好驅馳過度至於歸家猶馳驅入門百姓號之曰梁氏滅門驅馳後遂誅滅和帝永元十年十三年十四年十五年皆淫雨傷稼安帝元年初四年秋郡國十淫雨傷稼永寧元年郡國三十三淫雨傷稼建光元年京都及郡國二十九淫雨傷稼是時羌反久未平百姓屯戍不解愁苦延光元年郡國二十七淫雨傷稼二年郡國五連雨傷稼順帝永建四年司隸荊豫兗冀部淫雨傷稼六年冀州淫雨傷稼桓帝延熹二年夏霖雨五十餘日是時大將軍梁冀秉政謀害上所幸鄧貴人母宣冀又擅殺議郎邴尊上欲誅冀懼其持權日久威勢強盛恐有逆命害及吏民密與近臣中常侍單超等圖其方略其年八月冀卒伏罪誅滅靈帝建寧元年夏霖雨六十餘日是時大將軍竇武謀變廢中官其年九月長樂五官史朱瑀等共與中常侍曹節起兵先誅武交兵闕下敗走追斬武兄弟死者數百人熹平元年夏霖雨七十餘日是時中侍曹節等共誣曰白勃海王悝謀反其十月誅悝中平六年夏霖雨八十餘日是時靈帝新棄羣臣大行尚在梓宮大將軍何進與佐軍校尉袁紹等共謀欲誅廢中官下文陵畢中常侍張讓等共殺進兵戰京都死者數千更始諸將軍過雒陽者數十輩皆幘而衣婦人衣繡擁時智者見之以為服之不中身之災也乃奔入邊郡避之是服妖也其後更始遂為赤眉所殺桓帝元嘉中京都婦女作愁眉啼墮馬髻折要步齲齒笑所謂愁眉者細而曲折啼者薄拭目下若啼處墮馬髻者作一邊折要步者足不在體下齲齒笑者若齒痛樂不欣欣始自大將軍梁冀家所為京都歙然諸夏皆放效此近服妖也梁冀二世上將媾王室大作威福將危社稷天誡若曰兵馬將往收捕婦女憂愁踧眉啼泣吏卒掣頓折其要脊令髻傾邪雖強語笑無復氣味也到延熹二年舉宗誅夷延熹中梁冀誅後京都幘顏短耳長短上長下時中常侍單超左悺徐璜具瑗唐衡在帝左右縱其姦慝海內慍曰一將軍死五將軍出家有數侯子弟列布州郡賓客雜襲騰翥上短下長與梁冀同占到其八年桓帝因日蝕之變乃拜故司徒韓寅為司隸校尉以次誅鉏京都正清延熹中京都長者皆著木屐婦女始嫁至作漆畫五采為系此服妖也到九年黨事始發傳黃門北寺臨時惶惑不能信天任命多有逃走不就考者九族拘繫及所過歷長少婦女皆被桎梏應木屐之象也靈帝建寧中京都長者皆以葦方笥為具下士盡然時有識者竊言葦方笥郡國讞篋也今珍用之此天下人皆當有罪讞於理官也到光和三年癸丑赦令詔書吏民依黨禁錮者赦除之有不見文他以類比疑者讞於是諸有黨郡皆讞廷尉人名悉入方笥中靈帝好胡服胡帳胡牀胡坐胡飯胡空侯胡笛胡舞京都貴戚皆競為之此服妖也其後董卓多擁胡兵填塞街衢虜掠宮掖發掘園陵靈帝於宮中西園駕四白驢躬自操轡驅馳周旋以為大樂於是公卿貴戚轉相放效至乘輜軿以為騎從互相侵奪賈與馬齊案易曰時乘六龍以御天行天者莫若龍行地者莫如馬詩云四牡騤騤載是常服檀車煌煌四牡彭彭夫驢乃服重致遠上下山谷野人之所用耳何有帝王君子而驂服之乎鈍之畜而今貴之天意若曰國且大亂賢愚倒植凡執政者皆如驢也其後董卓陵虐王室多援邊人以充本朝胡夷異種跨蹈中國熹平中省內冠狗帶綬以為笑樂有一狗突出走入司徒府門或見之者莫不驚怪京房易傳曰君不正臣欲篡厥妖狗冠出後靈帝寵用便嬖子弟永樂賓客鴻都羣小傳相汲引公卿牧守比肩是也又遣御史於西鄉邸賣官關內侯顧五百萬者賜與金紫詣闕上書占令長隨縣好醜豐約有賈強者貪如豺虎弱者略不類物實狗而冠者也司徒古之丞相一統國政天戒若曰宰相多非其人尸祿素餐莫能據正持重阿意曲從今在位者皆如狗也故狗走入其門靈帝數遊戲於西園中令後宮采女為客舍主人身為商賈服行至舍采女下酒食因共飲食以為戲樂此服妖也其後天下大亂獻帝建安中男子之衣好為長躬而下甚短女子好為長裙而上甚短時益州從事莫嗣以為服妖是陽無下而陰無上也天下未欲平也後還遂大亂靈帝光和元年南宮侍中寺雌雞欲化雄一身毛皆似雄但頭冠尚未變詔以問議郎蔡雍雍對曰貌之不恭則有雞禍宣帝黃龍元年未央宮雌雞化為雄不鳴無距是歲元帝初即位立王皇后至初元元年丞相史家雌雞化為雄冠距鳴將是歲后父禁為平陽平侯女立為皇后至哀帝晏駕后攝政王莽以后兄子為大司馬由是為亂臣竊推之頭元首人君之象今雞一身已變未至於頭而上知之是將有其事而不遂成之象也若應之不精政無所改頭冠或成為患茲大是後張角作亂稱黃巾遂破壞四方疲於賦役多叛者上不改政遂至天下大亂桓帝永興二年四月丙午光祿勳吏舍壁下夜有青氣視之得玉鉤玦各一鉤長七寸二分玦周五寸四分身中皆雕鏤此青祥也玉金類也七寸二分商數也五寸四分徵數也商為臣徵為事蓋為人臣引決事者不肅將有禍也是時梁冀秉政專恣後四歲梁氏誅滅也延熹五年太學門無故自壞襄楷以為太學前疑所居其門自壞文德將喪教化廢也是後天下遂至喪亂永康元年十月壬戍南宮平城門內屋自壞金沴木木動也其十二月宮車晏駕靈帝光和元年南宮平城門內屋武庫屋及外東垣屋前後頓壞蔡雍對曰平城門正陽之門與宮連郊祀法駕所由從出門之最尊者也武庫禁兵所藏東垣庫之外障易傳曰小人在位上下咸悖厥妖城門內崩潛潭巴曰宮瓦自墮諸侯強陵主此皆小人顯位亂法之咎也其後黃巾賊先起東方庫兵大動皇后同父兄何進為大將軍同母弟苗為車騎將軍兄弟並貴盛皆統兵在京都其後進欲誅廢中官為中常侍張讓段圭等所殺兵戰宮中闕下更相誅滅天下兵大起三年二月公府駐駕廡自壞南北三十餘閒中平二年二月癸亥廣陽城門外上屋自壞也獻帝初平二年三月長安宣平城門外屋無故自壞至三年夏司徒王允使中郎將呂布殺太師董卓夷三族興平元年十月長安市門無故自壞至二年春李傕郭汜鬬長安中傕迫劫天子移置傕塢盡燒宮殿城門官府民舍放兵寇鈔公卿以下冬天子東還雒陽傕汜追上到曹陽虜掠乘輿輜重殺光祿勳鄧淵廷尉宣璠少府田邠等數十人五行傳曰好攻戰輕百姓飾城郭侵邊境則金不從革謂金失其性而為災也又曰言之不從是謂不厥咎僭厥罰恆陽厥極憂時則有詩妖時則有介蟲之孽時則有犬禍時則有口舌之痾時則有白眚白祥惟木沴金介蟲劉歆傳以為毛蟲乂治也安帝永初元年十一月民訛言相驚司隸并冀州民人流移時鄧太后專政婦人以順為道故禮夫死從子之命今專王主事此不從而僭也世祖建武五年夏旱京房傳曰欲德不用茲謂張厥災荒其旱陰雲不雨變而赤因四陰衆出過時茲謂廣其旱不生上下皆蔽茲謂隔其旱天赤三月時有雹殺飛禽上緣求妃茲謂僭其旱三月大溫亡雲君高臺府茲謂犯陰侵陽其旱萬物根死有火災庶位踰節茲謂僭其旱澤物枯為火所傷是時天下僭逆者未盡誅軍多過時章帝章和二年夏旱時章帝崩後竇太后兄弟用事奢僭和帝永元六年秋京都旱時雒陽有冤囚和帝幸雒陽寺録囚徒理冤囚牧收令下獄抵罪行未還宮澍雨降安帝永初六年夏旱七年夏旱元初元年夏旱二年夏旱六年夏旱順帝永建三年夏旱五年夏旱陽嘉二年夏旱時李固對策以為奢僭所致也沖帝永嘉熹元年夏旱時沖帝幼崩太尉李固勸太后及兄梁冀立嗣帝擇年長有德者天下賴之則功名不朽年幼未可知如後不善悔無所及時太后及冀貪立年幼欲久自專遂立質帝八歲此不用德桓帝元嘉元年夏旱是時梁冀秉政妻子並受封寵踰節延熹元年六月旱靈帝熹平五年夏旱六年夏旱光和五年夏旱六年夏旱是時常侍黃門僭作威福獻帝興平元年秋長安旱是時李傕郭汜專權縱肆更始時南陽有童謠曰諧不諧在赤眉得不得在河北是時更始在長安世祖為大司馬平定河北更始大臣並僭專權故謠妖作也後更始遂為赤眉所殺是更始之不諧在赤眉也世祖自河北興世祖建武六年蜀童謠曰黃牛白腹五銖當復是時公孫述僭號於蜀時人竊言王莽稱黃述欲繼之故稱白五銖漢家貨明當復也述遂誅滅王莽末天水童謠曰出吳門望緹羣見一蹇人言欲上天令天可上地上安得民時隗囂初起兵於天水後意稍廣欲為天子遂破滅囂少病蹇吳門冀郭門名也緹羣山名也順帝之末京都童謠曰直如弦死道邊曲如鉤反封侯案順帝即世孝質短祚大將軍梁冀貪樹疏幼以為己功專國號令以贍其私太尉李固以為清河王雅性聰明敦詩悅禮加又屬親立長則順置善則固而冀建白太后策免固徵蠡吾侯遂即至尊固是日幽斃于獄暴尸道路而太尉胡廣封安樂鄉侯司徒趙戒廚亭侯司空袁湯安國亭侯云桓帝之初天下童謠曰小麥青青大麥枯誰當穫者婦與姑丈人何在西擊胡吏買馬君具車請為諸君鼓嚨胡案元嘉中涼州諸羌一時俱反南入蜀漢東抄三輔延及并冀大為民害命將出衆每戰常負中國益發甲卒麥多委棄但有婦女穫刈之也吏買馬君具車者言調發重及有秩者也請為諸君鼓嚨胡者不敢公言私咽語桓帝之初京都童謠曰城上烏尾畢逋公為吏子為徒一徒死百乘車車班班入河閒河閒姹女工數錢以錢為室金為堂石上慊慊舂黃粱梁下有懸鼓我欲擊之丞卿怒案此皆謂為政貪也城上烏尾畢逋者處高利獨食不與下共謂人主多聚斂也公為吏子為徒者言蠻夷將畔逆父既為軍吏其子又為卒徒往擊之也一徒死百乘車者言前一人往討胡既死矣後又遣百乘車往車班班入河閒者言上將崩乘輿班班入河閒迎靈帝也河閒姹女工數錢以錢為室金為堂者靈帝既立其母永樂太后好聚金以為堂也石上慊慊舂黃粱者言永樂雖積金錢慊慊常苦不足使人舂黃粱而食之也梁下有懸鼓我欲擊之丞卿怒者言永樂主教靈帝使賣官受錢所祿非其人天下忠篤之士怨望欲擊懸鼓以求見丞卿主鼓者亦復諂順怒而止我也桓帝之初京都童謠曰游平賣印自有平不辟豪賢及大姓案到延熹之末鄧皇后以譴自殺乃以竇貴人代之其父名武字游平拜城門校尉及太后攝政為大將軍與太傅陳蕃合心戮力惟德是建印綬所加咸得其人豪賢大姓皆絶望矣桓帝之末京都童謠曰茅田一頃中有井四方纖纖不可整嚼復嚼今年尚可後年鐃案易曰拔茅茹以其彙征吉茅喻羣賢也井者法也于時中常侍管霸蘇康憎疾海內英哲與長樂少府劉囂太常許詠尚書柳分尋穆史佟司隸唐珍等代作脣齒河內牢川詣闕上書汝潁南陽上采虛譽專作威福甘陵有南北二部三輔尤甚由是傳考黃門北寺始見廢閣茅田一頃者言羣賢衆多也中有井者言雖厄窮不失其法度也四方纖纖不可整者言姦慝大熾不可整理嚼復嚼者京都飲酒相強之辭也言食肉者鄙不恤王政徒耽宴飲歌呼而已也今年尚可者言但禁錮也後年鐃者陳竇被誅天下大壞桓帝之末京都童謠曰白蓋小車何延延河閒來合諧河閒來合諧案解犢亭屬饒陽河閒縣也居無幾何而桓帝崩使者與解犢侯皆白蓋車從河閒來延延衆貌也是時御史劉倏建議立靈帝以倏為侍中中常侍侯覽畏其親近必當閒己白拜倏泰山太守因令司隸迫促殺之朝廷必少長思其功效乃拔用其弟郃致位司徒此為合諧也靈帝之末京都童謠曰侯非侯王非王千乘萬騎上北芒案到中平六年史侯登躡至尊獻帝未有爵號為中常侍段圭等數十人所執公卿百官皆隨其後到河上乃得來還此為非侯非王上北芒者也靈帝中平中京都歌曰承樂世董逃遊四郭董逃蒙天恩董逃帶金紫董逃行謝恩董逃整車騎董逃垂欲發董逃與中辭董逃出西門董逃瞻宮殿董逃望京城董逃日夜絶董逃心摧傷董逃案董謂董卓也言雖跋扈縱其殘暴終歸逃竄至於滅族也獻帝踐祚之初京都童謠曰千里草何青青十日卜不得生案千里草為董十日卜為卓凡別字之體皆從上起左右離合無有從下發端者也今二字如此者天意若曰卓自下摩上以臣陵君也青青者暴盛之貌也不得生者亦旋破亡建安初荊州童謠曰八九年閒始欲衰至十三年無孑遺言自中興以來荊州無破亂及劉表為牧民又豐樂至此逮八九年當始衰者謂劉表妻當死諸將並零落也十三年無孑遺者言十三年表又當死民當移詣冀州也順帝陽嘉元年十月中望都蒲陰狼殺童兒九十七人時李固對策引京房易傳曰君將無道害將及人去之深山以全身厥災妖狼食人陛下覺寤比求隱滯故狼災息靈帝建寧中羣狼數十頭入晉陽南城門齧人
