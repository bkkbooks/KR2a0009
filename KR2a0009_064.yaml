body:
  text: 後漢書卷五十九張衡列傳第四十九張衡字平子南陽西鄂人也世為著姓祖父堪蜀郡太守衡少善屬文游於三輔因入京師觀太學遂通五經貫六藝雖才高於世而無驕尚之情常從容淡靜不好交接俗人永元中舉孝廉不行連辟公府不就時天下承平日久自王侯以下莫不踰侈衡乃擬班固兩都作二京賦因以諷諫精思傅會十年乃成文多故不載大將軍鄧騭奇其才纍召不應衡善機巧尤致思於天文陰陽歷算常耽好玄經謂崔瑗曰吾觀太玄方知子雲妙極道數乃與五經相擬非徒傳記之屬使人難論陰陽之事漢家得天下二百歲之書也復二百歲殆將終乎所以作者之數必顯一世常然之符也漢四百歲玄其興矣安帝雅聞衡善術學公車特徵拜郎中再遷為太史令遂乃研核陰陽妙盡琁機之正作渾天儀著靈憲算罔論言甚詳明順帝初再轉復為太史令衡不慕當世所居之官輒積年不徙自去史職五載復還乃設客問作應閒以見其志云則夕行之立功立事式昭德音是故伊尹思使君為堯舜而民處唐虞彼豈虛言而已哉必旌厥素爾咎單巫咸實守王家申伯樊仲實幹周邦服袞而朝介圭作瑞厥跡不朽垂烈後昆不亦丕歟且學非以要利而富貴萃之貴以行令富以施惠惠施令行故易稱以大業質以文美實由華興器賴雕飾為好人以輿服為榮吾子性德體道篤信安仁約己博藝無堅不鑽以思世路斯何遠矣曩滯日官今又原之雖老氏曲全進道若退然行亦以需必也學非所用術有所仰故臨川將濟而舟楫不存焉徒經思天衢內昭獨智固合理民之式也故嘗見謗于鄙儒深厲淺揭隨時為義曾何貪於支離而習其孤技邪參輪可使自轉木雕猶能獨飛已垂翅而還故棲盍亦調其機而銛諸昔有文王自求多福人生在勤不索何獲曷若卑體屈己美言以相剋鳴于喬木乃金聲而玉振之用後勳雪前吝婞佷不柔以意誰靳也夥而恥智之不博是故藝可學而行可力也天爵高懸得之在命或不速而自懷或羡旃而不臻求之無益故智者面而不思阽身以徼幸固貪夫之所為未得而豫喪也枉尺直尋議者譏之盈欲虧志孰云非羞於心有猜則簋𧹞饌餔猶不屑餐旌瞀以之意之無疑則兼金盈百而不嫌辭孟軻以之士或解裋褐而襲黼黻或委臿築而據文軒者度德拜爵量績受祿也輸力致庸受必有階之察三辰於上跡禍福乎下經緯歷數然後天步有常則風后之為也當少昊清陽之末實或亂德人神雜擾不可方物重黎又相顓頊而申理之日月即次則重黎之為也人各有能因藝授任鳥師別名四叔三正官無二業事不並濟晝長則宵短日南則景北天且不堪兼況以人該之夫玄龍迎夏則陵雲而奮鱗樂時也涉冬則淈泥而潛蟠避害也公旦道行故制典禮以尹天下懼教誨之不從有人之不理仲尼不遇故論六經以俟來辟恥一物之不知有事之無範所考不齊如何可一係箭而聊城薥柝從往則合橫來則離安危無常要在說夫咸以得人為梟失士為尤故樊噲披帷入見高祖高祖踞洗以對酈生當此之會乃黿鳴而鱉應也故能同心戮力勤恤人隱奄受區夏遂定帝位皆謀臣之由也故一介之策各有攸建子長諜之爛然有第夫女魃北而應龍翔洪鼎聲而軍容息溽暑至而鶉火棲寒冰沍而黿鼉蟄今也皇澤宣洽海外混同萬方億醜并質共劑若修成之不暇尚何功之可立立事有三言為下列下列且不可庶矣奚冀其二哉俗異事藝舛殊不能通其變而一度以揆之斯契船而求劒守株而伺兔也冒愧逞願必無仁以繼之有道者所不履也越王句踐事此故厥緒不永捷徑邪至我不忍以投步干進苟容我不忍以歙肩雖有犀舟徑楫猶人涉卬否有須者也姑亦奉順敦篤守以忠信得之不休不獲不吝不見是而不惛居下位而不憂允上德之常服焉方將師天老而友地典與之乎高睨而大談孔甲且不足慕焉稱殷彭及周聃與世殊技固孤是求子憂朱泙曼之無所用吾恨輪扁之無所教也子覩木雕獨飛臣攴心我垂翅故棲吾感去蛙附鴟悲爾先笑而後號也貫高以端辭顯義蘇武以禿節效貞蒱且以飛矰逞巧詹何以沈鉤致精奕秋以局取譽王豹以清謳流聲僕進不能參名於二立退又不能羣彼數子愍三墳之既穨惜八索之不理庶前訓之可鑽聊朝隱乎柱史且韞櫝以待價踵顏氏以行止曾不慊夫晉楚敢告誠於知己陽嘉元年復造候風地動儀以精銅鑄成員徑八尺合蓋隆起形似酒尊飾以篆文山龜鳥獸之形中有都柱傍行八道施關發機外有八龍首銜銅丸下有蟾蜍張口承之其牙機巧制皆隱在尊中覆蓋周密無際如有地動尊則振龍機發吐丸而蟾蜍銜之振聲激揚伺者因此覺知雖一龍發機而七首不動尋其方面乃知震之所在驗之以事合契若神自書典所記未之有也嘗一龍機發而地不覺動京師學者咸怪其無徵後數日驛至果地震隴西於是皆服其妙自此以後乃令史官記地動所從方起時政事漸損權移於下衡因上疏陳事曰伏惟陛下宣哲克明繼體承天中遭傾覆龍德泥蟠今乘雲高躋磐桓天位誠所謂將隆大位必先倥偬之也親履艱難者知下情備經險易者達物僞故能一貫萬機靡所疑惑百揆允當庶績咸熙宜獲福祉神祇受譽黎庶而陰陽未和灾眚屢見神明幽遠冥鑒在茲福仁禍淫景響而應因德降休乘失致咎天道雖遠吉凶可見近世鄭蔡江樊周廣王聖皆為效矣故恭儉畏忌必蒙祉祚奢淫諂慢鮮不夷戮前事不忘後事之師也夫情勝其性流遁忘反豈唯不肖中才皆然苟非大賢不能見得思義故積惡成釁罪不可解也向使能瞻前顧後援鏡自戒則何陷於凶患乎貴寵之臣衆所屬仰其有愆尤上下知之褒美譏惡有心皆同故怨讟溢乎四海神明降其禍辟也頃年雨常不足思求所失則洪範所謂僭恆陽若者也懼羣臣奢侈昏踰典式自下逼上用速咎徵又前年京師地震土裂裂者威分震者人擾也君以靜唱臣以動和威自上出不趣於下禮之政也竊懼聖思厭倦制不專己恩不忍割與衆共威威不可分德不可共洪範曰臣有作威作福玉食害于而家凶于而國天鑒孔明雖疏不失灾異示人前後數矣而未見所革以復往悔自非聖人不能無過願陛下思惟所以稽古率舊勿令刑德八柄不由天子若恩從上下事依禮制禮制修則奢僭息事合宜則無凶咎然後神望允塞灾消不至矣初光武善讖及顯宗肅宗因祖述焉自中興之後儒者爭學圖緯兼復附以訞言衡以圖緯虛妄非聖人之法乃上疏曰臣聞聖人明審律歷以定吉凶重之以卜筮雜之以九宮經天驗道本盡於此或觀星辰逆順寒燠所由或察龜策之占巫覡之言其所因者非一術也立言於前有徵於後故智者貴焉謂之讖書讖書始出蓋知之者寡自漢取秦用兵力戰功成業遂可謂大事當此之時莫或稱讖若夏侯勝眭孟之徒以道術立名其所述著無讖一言劉向父子領校祕書閲定九流亦無讖録成哀之後乃始聞之尚書堯使理洪水九載績用不成則殛死禹乃嗣興而春秋讖云共工理水凡讖皆云黃帝伐蚩尤而詩讖獨以為蚩尤敗然後堯受命春秋元命包中有公輸班與墨翟事見戰國非春秋時也又言別有益州益州之置在於漢世其名三輔諸陵世數可知至於圖中訖于成帝一卷之書互異數事聖人之言藝無若是殆必虛僞之徒以要世取資往者侍中賈逵摘讖互異三十餘事諸言讖者皆不能說至於王莽篡位漢世大禍八十篇何為不戒則知圖讖成於哀平之際也且河洛六藝篇録已定後人皮傅無所容篡永元中清河宋景遂以歷紀推言水灾而僞稱洞視玉版或者至於𠫓廾家業入山林後皆無效而復采前世成事以為證驗至於永建復統則不能知此皆欺世罔俗以昧藝位情僞較然莫之糾禁且律歷卦候九宮風角數有徵效世莫肯學而競稱不占之書譬猶畫工惡圖犬馬而好作鬼魅誠以實事難形而虛僞不窮也宜收藏圖讖一禁絶之則朱紫無所眩典籍無瑕玷矣後遷侍中帝引在帷幄諷議左右嘗問衡天下所疾惡者宦官懼其毀己皆共目之衡乃詭對而出閹豎恐終為其患遂共讒之衡常思圖身之事以為吉凶倚伏幽微難明乃作思玄賦以宣寄情志其辭曰膺以永靚兮綿日月而不衰伊中情之信修兮慕古人之貞節竦余身而順止兮遵繩墨而不跌志團團以應懸兮誠心固其如結旌性行以制佩兮佩夜光與瓊枝幽蘭之秋華兮又綴之以江蘺美襞積以酷裂兮允塵邈而難虧既姱麗而鮮雙兮非是時之攸珍奮余榮而莫見兮播余香而莫聞幽獨守此仄陋兮敢怠皇而舍勤幸二八之遻虞兮喜傅說之生殷尚前良之遺風兮恫後辰而無及何孤行之兮孑不羣而介立感鸞鷖之特棲兮悲淑人之稀合之多僻兮畏立辟以危身曾煩毒以迷或兮羌孰可與言己私湛憂而深懷兮思繽紛而不理願竭力以守義兮雖貧窮而不改執雕虎而試象兮阽焦原而跟止庶斯奉以周旋兮要既死而後已俗遷渝而事化兮泯規矩之圜方珍蕭艾於重笥兮謂蕙芷之不香斥西施而弗御兮羈要裊以服箱行陂僻而獲志兮循法度而離殃惟天地之無窮兮何遭遇之無常不抑操而苟容兮譬臨河而無航欲巧笑以干媚兮非余心之所嘗襲溫恭之黻衣兮披禮義之繡裳辮貞亮以為鞶兮雜技藝以為珩昭綵藻與雕琢兮璜聲遠而彌長淹棲以恣欲兮耀靈忽其西藏恃己知而華豫兮鶗鳴而不芳冀一年之三秀兮遒白露之為霜時亹亹而代序兮疇可與乎比伉咨妒嫮之難並兮想依韓以流亡恐漸冉而無成兮留則蔽而不章山以周流兮翼迅風以揚聲二女感於崇嶽兮或冰折而不營天蓋高而為澤兮誰云路之不平勔自強而不息兮蹈玉階之嶢崢懼筮氏之長短兮鑽東以觀禎遇九皋之介鳥兮怨素意之不逞遊塵外而瞥天兮據冥翳而哀鳴鵰鶚競於貪婪兮我修潔以益榮子有故於玄鳥兮歸母氏而後寧泉之瀝液兮咀石菌之流英翾鳥舉而魚躍兮將往走乎八荒過少皞之窮野兮問三丘乎句芒何道真之淳粹兮去穢纍而票輕登蓬萊而容與兮鼇雖抃而不傾留瀛洲而採芝兮聊且以乎長生憑歸雲而遐逝兮夕余宿乎扶桑吸青岑之玉醴兮餐沆瀣以為糧發昔夢於木禾兮穀昆崘之高岡朝吾行於湯谷兮從伯禹於稽山集羣神之執玉兮疾防風之食言眺夫衡阿兮睹有黎之圮墳痛火正之無懷兮託山陂以孤魂愁蔚蔚以慕遠兮越卬州而愈敖躋日中于昆吾兮憩炎天之所陶揚芒熛而絳天兮水泫沄而涌濤溫風翕其增熱兮惄鬱邑其難聊顝羈旅而無友兮余安能乎留茲木於廣都兮拓若華而躊躇超軒轅於西海兮跨汪氏之龍魚聞此國之千歲兮曾焉足以娛余門而東馳兮云台行乎中野亂弱水之潺湲兮逗華陰之湍渚號馮夷俾清津兮櫂龍舟以濟豫會帝軒之未歸兮悵相佯而延佇呬河林之蓁蓁兮偉關睢之戒女黃靈詹而訪命兮摎天道其焉如曰近信而遠疑兮六籍闕而不書神逵昧其難覆兮疇克謨而從諸牛哀病而成虎兮雖逢昆其必噬鱉令殪而尸亡兮取蜀禪而引世死生錯而不齊兮雖司命其不晰竇號行於代路兮後膺祚而繁廡王肆侈於漢庭兮卒銜恤而絶緒尉尨眉而郎潛兮逮三葉而遘武董弱冠而司袞兮設王隧而弗處夫吉凶之相仍兮恆反側而靡所穆負天以悅牛兮豎亂叔而幽主文斷袪而忌伯兮閹謁賊而寧后通人暗於好惡兮豈愛惑之能剖嬴擲讖而戒胡兮備諸外而發內或輦賄而違車兮孕行産而為對慎竈顯於言天兮占水火而妄誶梁叟患夫黎丘兮丁厥子而事刃親所睇而弗識兮矧幽冥之可信毋綿攣以涬己兮思百憂以自疢彼天監之孔明兮用棐忱而佑仁湯蠲體以禱祈兮蒙厖禠以拯人景三慮以營國兮熒惑次於它辰魏顆亮以從理兮鬼亢回以敝秦咎繇邁而種德兮德樹茂乎英六桑末寄夫根生兮卉既雕而已育有無言而不讎兮又何往而不復盍遠迹以飛聲兮孰謂時之可蓄冰之磑磑兮清泉沍而不流寒風淒而永至兮拂穹岫之騷騷玄武縮於殼中兮螣蛇蜿而自糾魚矜鱗而並凌兮鳥登木而失條坐太陰之屏室兮慨含欷而增愁怨高陽之相寓兮顓頊之宅幽庸織絡於四裔兮斯與彼其何瘳望寒門之絶垠兮縱余緤乎不周迅飈潚其媵我兮騖翩飄而不禁趨谽之洞穴兮摽通淵之碄碄經重陰乎寂寞兮愍墳羊之潛深龍令執炬兮過鍾山而中休瞰瑤溪之赤岸兮弔祖江之見劉聘王母於銀臺兮羞玉芝以療飢戴勝憖其既歡兮又誚余之行載太華之玉女兮召洛浦之宓妃咸姣麗以蠱媚兮增嫮眼而蛾眉舒妙婧之纖兮揚雜錯之袿徽離朱脣而微笑兮顏的以遺光獻環琨與璵縭兮申厥好以玄黃雖色豔而賂美兮志浩蕩而不嘉雙材悲於不納兮並詠詩而清歌歌曰天地烟熅百卉含花鳴鶴交頸雎鳩相和處子懷春精魂回移如何淑明忘我實多將答賦而不暇兮爰整駕而亟行瞻昆崘之巍巍兮臨縈河之洋洋伏靈以負坻兮亘螭龍之飛梁登閬風之曾城兮搆不死而為牀屑瑤繠以為糇兮白水以為漿抨巫咸以占夢兮乃貞吉之元符滋令德於正中兮合含嘉秀禾以為敷既垂穎而顧本兮爾要思乎故居安和靜而隨時兮姑純懿之所廬以交集兮涷雨沛其灑塗轙雕輿而樹葩兮擾應龍以服輅百神森其備從兮屯騎羅而星布振余袂而就車兮修劒揭以低昂冠咢咢其映蓋兮佩綝纚以輝煌僕夫儼其正策兮八乘攄而超驤氛旄溶以天旋兮霓旌飄而飛揚撫軨軹而還睨兮心灼藥其如湯羡上都之赫戲兮何迷故而不忘左青雕以揵芝兮右素威以司鉦前長離使拂羽兮委水衡乎玄冥屬箕伯以函風兮徵淟涊而為清曳雲旗之離離兮鳴玉鸞之譻譻涉清霄而升遐兮浮蔑蒙而上征紛翼翼以徐戾兮焱回回其揚靈叫帝閽使闢扉兮覿天皇于瓊宮聆廣樂之九奏兮展泄泄以肜肜考理亂於律鈞兮意建始而思終惟盤逸之無斁兮懼樂往而哀來素撫弦而餘音兮大容吟曰念哉既防溢而靜志兮逮我暇以翺翔出紫宮之肅肅兮集大微之閬閬命王良掌策駟兮踰高閣之鏘鏘建罔車之幕幕兮獵青林之芒芒彎威弧之撥剌兮射嶓冢之封狼觀壁壘於北落兮伐河鼓之磅硠乘天潢之泛泛兮浮雲漢之湯湯倚招搖攝提以低回流兮察二紀五緯之綢繆遹皇偃蹇夭矯以連卷兮雜沓叢悴颯以方驤汨飂戾沛以罔象兮爛漫麗靡以迭蕩凌驚雷之兮弄狂電之淫裔踰厖澒於宕冥兮貫倒景而高厲廓蕩蕩其無涯兮乃今窮乎天外眷而屢顧兮馬倚輈而俳回雖遨游以偷樂兮豈愁慕之可懷出閶闔兮降天塗乘飈忽兮馳虛無雲霏霏兮繞余輪風眇眇兮震余旟繽聯翩兮紛暗曖倏眩眃兮反常閭煥以粲爛兮美紛紜以從風御六藝之珍駕兮遊道德之平林結典籍而為兮歐儒墨而為禽玩陰陽之變化兮詠雅頌之徽音嘉曾氏之歸耕兮慕歷陵之欽崟共夙昔而不二兮居終始之所服也夕惕若厲以省愆兮懼余身之未勑也苟中情之端直兮莫吾知而不恧墨無為以凝志兮與仁義乎消搖不出戶而知天下兮何必歷遠以劬勞區超踰騰躍絶世俗飄神舉逞所欲天不可階仙夫希柏舟悄悄吝不飛松喬高跱孰能離結精遠遊使心攜回志朅來從玄諆獲我所求夫何思永和初出為河閒相時國王驕奢不遵典憲又多豪右共為不軌衡下車治威嚴整法度陰知姦黨名姓一時收禽上下肅然稱為政理視事三年上書乞骸骨徵拜尚書年六十二永和四年卒著周官訓詁崔瑗以為不能有異於諸儒也又欲繼孔子易說彖象殘缺者竟不能就所著詩賦銘七言靈憲應閒七辨巡誥懸圖凡三十二篇永初中謁者僕射劉珍校書郎劉騊駼等著作東觀撰集漢記因定漢家禮儀上言請衡參論其事會並卒而衡常歎息欲終成之及為侍中上疏請得專事東觀收撿遺文畢力補綴又條上司馬遷班固所與典籍不合者十餘事又以為王莽本傳但應載篡事而已至於編年月紀災祥宜為元后本紀又更始居位人無異望光武初為其將然後即真宜以更始之號建於光武之初書數上竟不聽及後之著述多不詳典時人追恨之論曰崔瑗之稱平子曰數術窮天地制作侔造化斯致可得而言歟推其圍範兩儀天地無所蘊其靈運情機物有生不能參其智故智知思引淵微人之上術記曰德成而上藝成而下量斯思也豈夫藝而已哉何德之損乎贊曰三才理通人靈多蔽近推形算遠抽深滯不有玄慮孰能昭晣
