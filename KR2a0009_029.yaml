body:
  text: 後漢書卷二十七宣張二王杜郭吳承鄭趙列傳第十七宣秉字巨公馮翊雲陽人也少修高節顯名三輔哀平際見王氏據權專政侵削宗室有逆亂萌遂隱遁深山州郡連召常稱疾不仕王莽為宰衡辟命不應及莽篡位又遣使者徵之秉固稱疾病更始即位徵為侍中建武元年拜御史中丞光武特詔御史中丞與司隸校尉尚書令會同並專席而坐故京師號曰三獨坐明年遷司隸校尉務舉大綱簡略苛細百僚敬之秉性節約常服布被蔬食瓦器帝嘗幸其府舍見而歎曰楚國二龔不如雲陽宣巨公即賜布帛帳帷什物四年拜大司徒司直所得祿奉輒以收養親族其孤弱者分與田地自無擔石之儲六年卒於官帝敏惜之除子彪為郎張湛字子孝扶風平陵人也矜嚴好禮動止有則居處幽室必自修整雖遇妻子若嚴君焉及在鄉黨詳言正色三輔以為儀表人或謂湛偽詐湛聞而笑曰我誠詐也人皆詐惡我獨詐善不亦可乎成哀閒為二千石王莽時歷太守都尉建武初為左馮翊在郡修典禮設條教政化大行後告歸平陵望寺門而步主簿進曰明府位尊德重不宜自輕湛曰禮下公門軾輅馬孔子於鄉黨恂恂如也父母之國所宜盡禮何謂輕哉五年拜光祿勳光武臨朝或有惰容湛輒陳諫其失常乘白馬帝每見湛輒言白馬生且復諫矣七年以病乞身拜光祿大夫代王丹為太子太傅及郭后廢因稱疾不朝拜太中大夫居中東門候舍故時人號曰中東門君帝數存問賞賜後大司徒戴涉被誅帝彊起湛以代之湛至朝堂遺失溲便因自陳疾篤不能復任朝事遂罷之後數年卒於家王丹字仲回京兆下邽人也哀平時仕州郡王莽時連徵不至家累千金隱居養志好施周急每歲農時輒載酒肴於田閒候勤者而勞之其墯孏者恥不致丹皆兼功自厲邑聚相率以致殷富其輕黠游蕩廢業為患者輒曉其父兄使黜責之沒者則賻給親自將護其有遭喪憂者輒待丹為辦鄉鄰以為常行之十餘年其化大洽風俗以篤丹資性方絜疾惡彊豪時河南太守同郡陳遵關西之大俠也其友人喪親遵為護喪事賻助甚豐丹乃懷縑一匹陳之於主人前曰如丹此縑出自機杼遵聞而有慙色自以知名欲結交於丹丹拒而不許會前將軍鄧禹西征關中軍糧乏丹率宗族上麥一二千斛禹表丹領左馮翊稱疾不視事免歸後徵為太子少傅時大司徒侯霸欲與交友及丹被徵遣子昱候於道昱迎拜車下丹下荅之昱曰家公欲與君結交何為見拜丹曰君房有是言丹未之許也丹子有同門生喪親家在中山白丹欲往奔慰結侶將行丹怒而撻之令寄縑以祠焉或問其故丹曰交道之難未易言也世稱管鮑次則王貢張陳凶其終蕭朱𨻶其末故知全之者鮮矣時人服其言客初有薦士於丹者因選舉之而後所舉者陷罪丹坐以免客慙懼自絕而丹終無所言尋復徵為太子太傅乃呼客謂曰子之自絕何量丹之薄也不為設食以罰之相待如舊其後遜位卒于家王良字仲子東海蘭陵人也少好學習小夏侯尚書王莽時寑病不仕教授諸生千餘人建武二年大司馬吳漢辟大應三年徵拜諫議大夫數有忠言以禮進止朝廷敬之遷沛郡太守至蘄縣稱病不之府官屬皆隨就之良遂上疾篤乞骸骨徵拜太中大夫六年代宣秉為大司徒司直在位恭儉妻子不入官舍布被瓦器時司徒史鮑恢以事到東海過候其家而良妻布裙曳柴從田中歸恢告曰我司徒史也故來受書欲見夫人妻曰妾是也苦掾無書恢乃下拜歎息而還聞者莫不嘉之後以病歸一歲復徵至滎陽疾篤不任進道乃過其友人友人不肯見曰不有忠言奇謀而取大位何其往來屑屑不憚煩也遂拒之良慙自後連徵輒稱病詔以玄纁聘之遂不應後光武幸蘭陵遣使者問良所苦疾不能言對詔復其子孫邑中傜役卒於家論曰夫利仁者或借仁以從利體義者不期體以合義季文子妾不衣帛魯人以為美談公孫弘身服布被汲黯譏其多詐事實未殊而譽毀別議何也將體之與利之異乎宣秉王良處位優重而秉甘疏薄良妻荷薪可謂行過乎儉然當世咨其清人君高其節豈非臨之以誠哉語曰同言而信則信在言前同令而行則誠在令外不其然乎張湛不屑矜偽之誚斯不偽矣王丹難於交執之道斯知交矣杜林字伯山扶風茂陵人也父鄴成哀閒為涼州刺史林少好學沈深家既多書又外氏張竦父子喜文采林從竦受學博洽多聞時稱通儒初為郡吏王莽敗盜賊起林與弟成及同郡范逡孟冀等將細弱俱客河西道逢賊數千人遂掠取財褫奪衣服拔刃向林等將欲殺之冀仰曰願一言而死將軍知天神乎赤眉兵衆百萬所向無前而殘賊不道卒至破敗今將軍以數千之衆欲規霸王之事不行仁恩而反遵覆車不畏天乎賊遂釋之俱免於難隗囂素聞林志節深相敬待以為持書平後因疾告去辭還祿食囂復欲令彊起遂稱篤囂意雖相望且欲優容之乃出令曰杜伯山天子所不能臣諸侯所不能友蓋伯夷叔齊恥食周粟今且從師友之位須道開通使順所志林雖拘於囂而終不屈節建武六年弟成物故囂乃聽林持喪東歸既遣而悔追令刺客楊賢於隴坻遮殺之賢見林身推鹿車載致弟喪乃歎曰當今之世誰能行義我雖小人何忍殺義士因亡去光武聞林已還三輔乃徵拜侍御史引見問以經書故舊及西州事甚悅之賜車馬衣被羣寮知林以名德用甚尊憚之京師士大夫咸推其博洽河南鄭興東海衛宏等皆長於古學興嘗師事劉歆林既遇之欣然言曰林得興等固諧矣使宏得林且有以益之及宏見林闇然而服濟南徐巡始師事宏後皆更受林學林前於西州得漆書古文尚書一卷常寶愛之雖遭難困握持不離身出以示宏等曰林流離兵亂常恐斯經將絕何意東海衛子濟南徐生復能傳之是道竟不墜於地也古文雖不合時務然願諸生無悔所學宏巡益重之於是古文遂行明年大議郊祀制多以為周郊后稷漢當祀堯詔復下公卿議議者僉同帝亦然之林獨以為周室之興祚由后稷漢業特起功不緣堯祖宗故事所宜因循定從林議後代王良為大司徒司直林薦同郡范逡趙秉申屠剛及隴西牛邯等皆被擢用士多歸之十一年司直官罷以林代郭憲為光祿勳內奉宿衛外總三署周密敬慎選舉稱平郎有好學者輒見誘進朝夕滿堂十四年羣臣上言古者肉刑嚴重則人畏法令今憲律輕薄故姦軌不勝宜增科禁以防其源詔下公卿林奏曰夫人情挫辱則義節之風損法防繁多則苟免之行興孔子曰導之以政齊之以刑民免而無恥導之以德齊之以禮有恥且格古之明王深識遠慮動居其厚不務多辟周之五刑不過三千大漢初興詳覽失得故破矩為圓彫為樸蠲除苛政更立疏網海內歡欣人懷寬德及至其後漸以滋章吹毛索疵詆欺無限果桃菜茹之饋集以成臧小事無妨於義以為大戮故國無廉士家無完行至於法不能禁令不能止上下相遁為敝彌深臣愚以為宜如舊制不合翻移帝從之後皇太子彊求乞自退封東海王故重選官屬以林為王傅從駕南巡狩時諸王傅數被引命或多交游不得應詔唯林守慎有召必至餘人雖不見譴而林特受賞賜又辭不敢受帝益重之明年代丁恭為少府二十二年復為光祿勳頃之代朱浮為大司空博雅多通稱為任職相明年薨帝親自臨喪送葬除子喬為郎詔曰公侯子孫必復其始賢者之後宜宰城邑其以喬為丹水長論曰夫威彊以自禦力損則身危飾詐以圖己詐窮則道屈而忠信篤敬蠻貊行焉者誠以德之感物厚矣故趙孟懷忠匹夫成其仁杜林行義烈士假其命易曰人之所助者順信有不誣矣郭丹字少卿南陽穰人也父稚成帝時為廬江太守有清名丹七歲而孤小心孝順後母哀憐之為鬻衣買產業後從師長安買符入函谷關乃慨然歎曰丹不乘使者車終不出關既至京師常為都講諸儒咸敬重之大司馬嚴尤請丹辭病不就王莽又徵之遂與諸生逃於北地更始二年三公舉丹賢能徵為諫議大夫持節使歸南陽安集受降丹自去家十有二年果乘高車出關如其志焉更始敗諸將悉歸光武並獲封爵丹獨保平氏不下為更始發喪衰絰盡哀建武二年遂潛逃去敝衣閒行涉歷險阻求謁更始妻子奉還節傳因歸鄉里太守杜詩請為功曹丹薦鄉人長者自代而去詩乃歎曰昔明王興化卿士讓位今功曹推賢可謂至德勑以丹事編署黃堂以為後法十三年大司馬吳漢辟舉高第再遷并州牧有清平稱轉使匈奴中郎將遷左馮翊永平三年代李訢為司徒在朝廉直公正與侯霸杜林張湛郭伋齊名相善明年坐考隴西太守鄧融事無所據策免五年卒於家時年八十七以河南尹范遷有清行代為司徒遷字子廬沛國人初為漁陽太守以智略安邊匈奴不敢入界及在公輔有宅數畝田不過一頃復推與兄子其妻嘗謂曰君有四子而無立錐之地可餘奉祿以為後世業遷曰吾備位大臣而蓄財求利何以示後世在位四年薨家無擔石焉後顯宗因朝會問羣臣郭丹家今何如宗正劉匡對曰昔孫叔敖相楚馬不秣粟妻不衣帛子孫竟蒙寑丘之封丹出典州郡入為三公而家無遺產子孫困匱帝乃下南陽訪求其嗣長子宇官至常山太守少子濟趙相吳良字大儀齊國臨淄人也初為郡吏歲旦與掾史入賀門下掾王望舉觴上壽諂稱太守功德良於下坐勃然進曰望佞邪之人欺諂無狀願勿受其觴太守斂容而止讌罷轉良為功曹恥以言受進終不肯謁時驃騎將軍東平王蒼聞而辟之署為西曹蒼甚相敬愛上疏薦良曰臣聞為國所重必在得人報恩之義莫大薦士竊見臣府西曹掾齊國吳良資質敦固公方廉恪躬儉安貧白首一節又治尚書學通師法經任博士行中表儀宜備宿衛以輔聖政臣蒼榮寵絕矣憂責深大私慕公叔同升之義懼於臧文竊位之罪敢秉愚瞽犯冒嚴禁顯宗以示公卿曰前以事見良鬚髮皓然衣冠甚偉夫薦賢助國宰相之職蕭何舉韓信設壇而拜不復考試今以良為議郎永平中車駕近出而信陽侯陰就干突禁衛車府令徐匡鉤就車收御者送獄詔書譴匡匡乃自繫良上言曰信陽侯就倚恃外戚干犯乘輿無人臣禮為大不敬匡執法守正反下于理臣恐聖化由是而薥帝雖赦匡猶左轉良為即丘長後遷司徒長史每處大議輒據經典不希旨偶俗以徼時譽後坐事免復拜議郎卒於官承宮字少子琅邪姑幕人也少孤年八歲為人牧豕鄉里徐子盛者以春秋經授諸生數百人宮過息廬下樂其業因就聽經遂請留門下為諸生拾薪執苦數年勤學不倦經典既明乃歸家教授遭天下喪亂遂將諸生避地漢中後與妻子之蒙陰山肆力耕種禾黍將孰人有認之者宮不與計推之而去由是顯名三府更辟皆不應永平中徵詣公車車駕臨辟雍召宮拜博士遷左中郎將數納忠言陳政論議切売心朝臣憚其節名播匈奴時北單于遣使求得見宮顯宗勑自整飾宮對曰夷狄眩名非識實者也臣狀醜不可以示遠宜選有威容者帝乃以大鴻臚魏應代之十七年拜侍中祭酒建初元年卒肅宗襃歎賜以冢地妻上書乞歸葬鄉里復賜錢三十萬鄭均字仲虞東平任城人也少好黃老書兄為縣吏頗受禮遺均數諫止不聽即脫身為傭歲餘得錢帛歸以與兄曰物盡可復得為吏坐臧終身捐棄兄感其言遂為廉絜均好義篤實養寡嫂孤兒恩禮敦至常稱病家廷不應州郡辟召郡將欲必致之使縣令譎將詣門既至卒不能屈均於是客於濮陽建初三年司徒鮑昱辟之後舉直言並不詣六年公車特徵再遷尚書數納忠言肅宗敬重之後以病乞骸骨拜議郎告歸因稱病篤帝賜以衣冠元和元年詔告廬江太守東平相曰議郎鄭均束脩安貧恭儉節整前在機密以病致仕守善貞固黃髮不怠又前安邑令毛義躬履遜讓比徵辭病淳絜之風東州稱仁書不云乎章厥有常吉哉其賜均義穀各千斛常以八月長吏存問賜羊酒顯茲異行明年帝東巡過任城乃幸均舍勑賜尚書祿以終其身故時人號為白衣尚書永元中卒於家趙典字仲經蜀郡成都人也父戒為太尉桓帝立以定策封廚亭侯典少篤行隱約博學經書弟子自遠方至建和初四府表薦徵拜議郎侍講禁內再遷為侍中時帝欲廣開鴻池典諫曰鴻池汎溉已且百頃猶復增而深之非所以崇唐虞之約己遵孝文之愛人也帝納其言而止父卒襲封出為弘農太守轉右扶風公事去官徵拜城門校尉轉將作大匠遷少府又轉大鴻臚時恩澤諸侯以無勞受封羣臣不悅而莫敢諫典獨奏曰夫無功而賞勞者不勸上忝下辱亂象干度且高祖之誓非功臣不封宜一切削免爵土以存舊典帝不從頃之轉太僕遷太常朝廷每有災異疑議輒諮問之典據經正對無所曲折每得賞賜輒分與諸生之貧者後以諫爭違旨免官就國會帝崩時禁藩國諸侯不得奔弔典慨然曰身從衣褐之中致位上列且鳥烏反哺報德況於士邪遂解印綬符策付縣而馳到京師州郡及大鴻臚並執處其罪而公卿百寮嘉典之義表請以租自贖詔書許之再遷長樂少府衛尉公卿復表典篤學博聞宜備國師會病卒使者弔祠竇太后復遣使兼贈印綬謚曰獻侯典兄子謙謙弟溫相繼為三公謙字彥信初平元年代黃琬為太尉獻帝遷都長安以謙行車騎將軍為前置明年病罷復為司隸校尉車師王侍子為董卓所愛數犯法謙收殺之卓大怒殺都官從事而素敬憚謙故不加罪轉為前將軍遣擊白波賊有功封郫侯李傕殺司徒王允復代允為司徒數月病免拜尚書令是年卒謚曰忠侯溫字子柔初為京兆郡丞歎曰大丈夫當雄飛安能雌伏遂棄官去遭歲大飢散家糧以振窮餓所活萬餘人獻帝西遷都為侍中同輿輦至長安封江南亭侯代楊彪為司空免頃之復為司徒錄尚書事時李傕與郭汜相攻傕遂虜掠禁省劫帝幸北塢外內隔絕傕素疑溫不與己同乃內溫於塢中又欲移乘輿於黃白城溫與傕書曰公前託為董公報讎然實屠陷王城殺戮大臣天下不可家見而戶說也今與郭汜爭睚眥之𨻶以成千鈞之讎人在塗炭各不聊生曾不改悟遂成禍亂朝廷仍下明詔欲令和解上命不行威澤日損而復欲移轉乘輿更幸非所此誠老夫所不達也於易一為過再為涉三而弗改滅其頂凶不如早共和解引軍還屯上安萬乘下全人民豈不幸甚傕大怒欲遣人殺溫董卓李傕從弟應溫故掾也諫之數日乃獲免溫從車駕都許建安十三年以辟司空曹操子丕為掾操怒奏溫辟忠臣子弟選舉不實免官是歲卒年七十二贊曰宣鄭二王奉身清方杜林據古張湛矜莊典以義黜宮由德揚大儀鵠髮見表憲王少卿志仕終乘高箱
