body:
  text: 後漢書志第二十四百官一太傅太尉司徒司空將軍漢之初興承繼大亂兵不及戢法度草創略依秦制後嗣因循至景帝感吳楚之難始抑損諸侯王及至武帝多所改作然而奢廣民用匱乏世祖中興務從節約并官省職費減億計所以補復殘缺及身未改而四海從風中國安樂者也昔周公作周官分職著明法度相持王室雖微猶能久存今其遺書所以觀周室牧民之德既至又其有益來事之範殆未有所窮也故新汲令王隆作小學漢官篇諸文倜說較略不究唯班固著百官公卿表記漢承秦置官本末訖于王莽差有條貫然皆孝武奢廣之事又職分未悉世祖節約之制宜為常憲故依其官簿粗注職分以為百官志凡置官之本及中興所省無因復見者既在漢書百官表不復悉載太傅上公一人本注曰掌以善導無常職世祖以卓茂為太傅薨因省其後每帝初即位輒置太傅錄尚書事薨輒省太尉公一人本注曰掌四方兵事功課歲盡即奏其殿最而行賞罰凡郊祀之事掌亞獻大喪則告謚南郊凡國有大造大疑則與司徒司空通而論之國有過事則與二公通諫爭之世祖即位為大司馬建武二十七年改為太尉長史一人千石本注曰署諸曹事掾史屬二十四人本注曰漢舊注東西曹掾比四百石餘掾比三百石屬比二百石故曰公府掾比古元士三命者也或曰漢初掾史辟皆上言之故有秩比命士其所不言則為百石屬其後皆自辟除故通為百石云西曹主府史署用東曹主二千石長吏遷除及軍吏戶曹主民戶祠祀農桑奏曹主奏議事辭曹主辭訟事法曹主郵驛科程事尉曹主卒徒轉運事賊曹主盜賊事決曹主罪法事兵曹主兵事金曹主貨幣鹽鐵事倉曹主倉穀事黃閤主簿錄省衆事令史及御屬二十三人本注曰漢舊注公令史百石自中興以後注不說石數御屬主為公御閤下令史主閤下威儀事記室令史主上章表報書記門令史主府門其餘令史各典曹文書司徒公一人本注曰掌人民事凡教民孝悌遜順謙儉養生送死之事則議其制建其度凡四方民事功課歲盡則奏其殿最而行賞罰凡郊祀之事掌省牲視濯大喪則掌奉安梓宮凡國有大疑大事與太尉同世祖即位為大司徒建武二十七年去大長史一人千石掾屬三十一人令史及御屬三十六人本注曰世祖即位以武帝故事置司直居丞相府助督錄諸州建武十八年省也司空公一人本注曰掌水土事凡營城起邑浚溝洫修墳防之事則議其利建其功凡四方水土功課歲盡則奏其殿最而行賞罰凡郊祀之事掌掃除樂器大喪則掌將校復土凡國有大造大疑諫爭與太尉同世祖即位為大司空建武二十七年去大屬長史一人千石掾屬二十九人令史及御屬四十二人將軍不常置本注曰掌征伐背叛比公者四第一大將軍次驃騎將軍次車騎將軍次衛將軍又有前後左右將軍初武帝以衛青數征伐有功以為大將軍欲尊寵之以古尊官唯有三公皆將軍始自秦晉以為卿號故置大司馬官號以冠之其後霍光王鳳等皆然成帝綏和元年賜大司馬印綬罷將軍官世祖中興吳漢以大將軍為大司馬景丹為驃騎大將軍位在公下及前後左右雜號將軍衆多皆主征伐事訖皆罷明帝初即位以弟東平王蒼有賢才以為驃騎將軍以王故位在公上數年後罷章帝即位西羌反故以舅馬防行車騎將軍征之還後罷和帝即位以舅竇憲為車騎將軍征匈奴位在公下還復有功遷大將軍位在公上復征西羌還免官罷安帝即位西羌寇亂復以舅鄧騭為車騎將軍征之還遷大將軍位如憲數年復罷自安帝政治衰缺始以嫡舅耿寶為大將軍常在京都順帝即位又以皇后父兄弟相繼為大將軍如三公焉長史司馬皆一人千石本注曰司馬主兵如太尉從事中郎二人六百石本注曰職參謀議掾屬二十九人令史及御屬三十一人本注曰此皆府員職也又賜官騎三十人及鼓吹其領軍皆有部曲大將軍營五部部校尉一人比二千石軍司馬一人比千石部下有曲曲有軍候一人比六百石曲下有純屯純屯長一人比二百石其不置校尉部但軍司馬一人又有軍假司馬假候皆為副貳其別營領屬為別部司馬其兵多少各隨時宜門有門候其餘將軍置以征伐無員職亦有部曲司馬軍候以領兵其職吏部集各一人總知營事兵曹掾史主兵事器械稟假掾史主稟假禁司又置外刺刺姦主罪法明帝初置度遼將軍以衛南單于衆新降有二心者後數有不安遂為常守
