body:
  text: 後漢書卷三十六鄭范陳賈張列傳第二十六鄭興字少贛河南開封人也少學公羊春秋晚善左氏傳遂積精深思通達其旨同學者皆師之天鳳中將門人從劉歆講正大義歆美興才使撰條例章句傳詁及校三統歷更始立以司直李松行丞相事先入長安松以興為長史令還奉迎遷都更始諸將皆山東人咸勸留洛陽興說更始曰陛下起自荊楚權政未施一朝建號而山西雄桀爭誅王莽開關郊迎者何也此天下同苦王氏虐政而思高祖之舊德也今久不撫之臣恐百姓離心盜賊復起矣春秋書齊小白入齊不稱侯未朝廟故也今議者欲先定赤眉而後入關是不識其本而爭其末恐國家之守轉在函谷雖臥洛陽庸得安枕乎更始曰朕西決矣拜興為諫議大夫使安集關西及朔方涼益三州還拜涼州刺史會天水有反者攻殺郡守興坐免時赤眉入關東道不通興乃西歸隗囂囂虛心禮請而興恥為之屈稱疾不起囂矝己自飾常以為西伯復作乃與諸將議自立為王興聞而說囂曰春秋傳云口不道忠信之言為嚚耳不聽五聲之和為聾閒者諸將集會無乃不道忠信之言大將軍之聽無乃阿而不察乎昔文王承積德之緒加之以睿聖三分天下尚服事殷及武王即位八百諸侯不謀同會皆曰紂可伐矣武王以未知天命還兵待時高祖征伐纍年猶以沛公行師今令德雖明世無宗周之祚威略雖振未有高祖之功而欲舉未可之事昭速禍患無乃不可乎惟將軍察之囂竟不稱王後遂廣置職位以自尊高興復止囂曰夫中郎將太中大夫使持節官皆王者之器非人臣所當制也孔子曰唯器與名不可以假人不可以假人者亦不可以假於人也無益於實有損於名非尊上之意也囂病之而止及囂遣子恂入侍將行興因恂求歸葬父母囂不聽而徙興舍益其秩禮興入見囂曰前遭赤眉之亂以將軍僚舊故敢歸身明德幸蒙覆載之恩復得全其性命興聞事親之道生事之以禮死葬之以禮祭之以禮奉以周旋弗敢失墜今為父母未葬請乞骸骨若以增秩徙舍中更停留是以親為餌無禮甚矣將軍焉用之囂曰囂將不足留故邪興曰將軍據七郡之地擁羌胡之衆以戴本朝德莫厚焉威莫重焉居則為專命之使入必為鼎足之臣興從俗者也不敢深居屏處因將軍求進不患不達因將軍求入何患不親此興之計不逆將軍者也興業為父母請不可以已願留妻子獨歸葬將軍又何猜焉囂曰幸甚促為辨裝遂令與妻子俱東時建武六年也侍御史杜林先與興同寓隴右乃薦之曰竊見河南鄭興執義堅固敦悅詩書好古博物見疑不惑有公孫僑觀射父之德宜侍帷幄典職機密昔張仲在周燕翼宣王而詩人悅喜惟陛下留聽少察以助萬分乃徵為太中大夫明年三月晦日食興因上疏曰春秋以天反時為灾地反物為妖人反德為亂亂則妖灾生往年以來謫咎連見意者執事頗有闕焉案春秋昭公十七年夏六月甲戌朔日有食之傳曰日過分而未至三辰有灾於是百官降物君不舉避移時樂奏鼓祝用幣史用辭今孟夏純乾用事陰氣未作其灾尤重夫國無善政則謫見日月變咎之來不可不慎其要在因人之心擇人處位也堯知鯀不可用而用之者是屈己之明因人之心也齊桓反政而相管仲晉文歸國而任郤縠者是不私其私擇人處位也今公卿大夫多舉漁陽太守郭伋可大司空者而不以時定道路流言咸曰朝廷欲用功臣功臣用則人位謬矣願陛下上師唐虞下覽齊晉以成屈己從衆之德以濟羣臣讓善之功而月臣象君亢急則臣下促迫故行疾也今年正月繁霜自爾以來率多寒日此亦急咎之罰天於賢聖之君猶慈父之於孝子也丁寧申戒欲其反政故灾變仍見此乃國之福也今陛下高明而羣臣惶促宜留思柔剋之政垂意洪範之法博採廣謀納羣下之策帝嘗問興郊祀事曰吾欲以讖斷之何如興對曰臣不為讖帝怒曰卿之不為讖非之邪興惶恐曰臣於書有所未學而無所非也帝意乃解興數言政事依經守義文章溫雅然以不善讖故不能任九年使監征南積弩營於津鄉會征南將軍岑彭為刺客所殺興領其營遂與大司馬吳漢俱擊公孫述述死詔興留屯成都頃之侍御史舉奏興奉使私買奴婢坐左轉蓮勺令是時喪亂之餘郡縣殘荒興方欲築城郭修禮教以化之會以事免興好古學尤明左氏周官長於歷數自杜林桓談衛宏之屬莫不斟酌焉世言左氏者多祖於興而賈逵自傳其父業故有鄭賈之學興去蓮勺後遂不復仕客授閿鄉三公連辟不肯應卒于家子衆衆字仲師年十二從父受左氏春秋精力於學明三統歷作春秋難記條例兼通易詩知名於世建武中皇太子及山陽王荊因虎賁中郎將梁松以縑帛聘請衆欲為通義引籍出入殿中衆謂松曰太子儲君無外交之義漢有舊防蕃王不宜私通賓客遂辭不受松復風衆以長者意不可逆衆曰犯禁觸罪不如守正而死太子及荊聞而奇之亦不強也及梁氏事敗賓客多坐之唯衆不染於辭永平初辟司空府以明經給事中再遷越騎司馬復留給事中是時北胸奴遣使求和親八年顯宗遣衆持節使胸奴衆至北庭虜欲令拜衆不為屈單于大怒圍守閉之不與水火欲脅服衆衆拔刀自誓單于恐而止乃更發使隨衆還京師朝議復欲遣使報之衆上疏諫曰臣伏聞北單于所以要致漢使者欲以離南單于之衆堅三十六國之心也又當揚漢和親誇示鄰敵令西城欲歸化者局促狐疑懷土之人絶望中國耳漢使既到便偃蹇自信若復遣之虜必自謂得謀其羣臣駮議者不敢復言如是南庭動搖烏桓有離心矣南單于久居漢地具知形藝萬分離析旋為邊害今幸有度遼之衆揚威北垂雖勿報答不敢為患帝不從復遣衆衆因上言臣前奉使不為胸奴拜單于恚恨故遣兵圍臣今復銜命必見陵折臣誠不忍持大漢節對氈裘獨拜如令胸奴遂能服臣將有損大漢之強帝不聽衆不得已既行在路連上書固爭之詔切責衆追還繫廷尉會赦歸家其後帝見胸奴來者問衆與單于爭禮之狀皆言胸奴中傳衆意氣壯勇雖蘇武不過乃復召衆為軍司馬使與虎賁中郎將馬廖擊車師至敦煌拜為中郎將使護西域會胸奴脅車師圍戊己校尉衆發兵救之遷武威太守謹修邊備虜不敢犯遷左馮翊政有名迹建初六年代鄧彪為大司農是時肅宗議復鹽鐵官衆諫以為不可詔數切責至被奏劾衆執之不移帝不從在位以清正稱其後受詔作春秋刪十九篇八年卒官子安世亦傳家業為長樂未央廄令延光中安帝廢太子為濟陰王安世與太常桓焉太僕來歷等共正議諫爭及順帝立安世已卒追賜錢帛除子亮為郎衆曾孫公業自有傳范升字辨卿代郡人也少孤依外家居九歲通論語孝經及長習梁丘易老子教授後生王莽大司空王邑辟升為議曹史時莽頻發兵役徵賦繁興升乃奏記邑曰升聞子以人不閒於其父母為孝臣以下不非其君上為忠今衆人咸稱朝聖皆曰公明蓋明者無不見聖者無不聞今天下之事昭昭於日月震震於雷霆而朝云不見公云不聞則元元焉所呼天公以為是而不言則過小矣知而從令則過大矣二者於公無可以免宜乎天下歸怨於公矣朝以遠者不服為至念升以近者不悅為重憂今動與時戾事與道反馳騖覆車之轍探湯敗事之後後出益可怪晚發愈可懼耳方春歲首而動發遠役藜藿不充田荒不耕穀價騰躍斛至數千吏人陷於湯火之中非國家之人也如此則胡貊守關青徐之寇在於帷帳矣升有一言可以解天下倒縣免元元之急不可書傳願蒙引見極陳所懷邑雖然其言而竟不用升稱病乞身邑不聽令乘傳使上黨升遂與漢兵會因留不還建武二年光武徵詣懷宮拜議郎遷博士上疏讓曰臣與博士梁恭山陽太守呂羌俱修梁丘易二臣年並耆艾經學深明而臣不以時退與恭並立深知羌學又不能達慙負二老無顏於世誦而不行知而不言不可開口以為人師願推博士以避恭羌帝不許然由是重之數詔引見每有大議輒見訪問時尚書令韓歆上疏欲為費氏易左氏春秋立博士詔下其議四年正月朝公卿大夫博士見於雲臺帝曰范博士可前平說升起對曰左氏不祖孔子而出於丘明師徒相傳又無其人且非先帝所存無因得立遂與韓歆及太中大夫許淑等互相辨難日中乃罷升退而奏曰臣聞主不稽古無以承天臣不述舊無以奉君陛下愍學微缺勞心經藝情存博聞故異端競進近有司請置京氏易博士羣下執事莫能據正京氏既立費氏怨望左氏春秋復以比類亦希置立京費已行次復高氏春秋之家又有騶夾如令左氏費氏得置博士高氏騶夾五經奇異並復求立各有所執乖戾分爭從之則失道不從則失人將恐陛下必有猒倦之聽孔子曰博學約之弗叛矣夫夫學而不約必叛道也顏淵曰博我以文約我以禮孔子可謂知教顏淵可謂善學矣老子曰學道日損損猶約也又曰絶學無憂絶末學也今費左二學無有本師而多反異先帝前世有疑於此故京氏雖立輒復見廢疑道不可由疑事不可行詩書之作其來已久孔子尚周流遊觀至于知命自衛反魯乃正雅頌今陛下草創天下紀綱未定雖設學官無有弟子詩書不講禮樂不修奏立左費非政急務孔子日攻乎異端斯害也已傳曰聞疑傳疑聞信傳信而堯舜之道存願陛下疑先帝之所疑信先帝之所信以示反本明不專己天下之事所以異者以不一本也易曰天下之動貞夫一也又曰正其本萬事理五經之本自孔子始謹奏左氏之失凡十四事時難者以太史公多引左氏升又上太史公違戾五經謬孔子言及左氏春秋不可録三十一事詔以下博士後升為出妻所告坐繫得出還鄉里永平中為聊城令坐事免卒於家陳元字長孫蒼梧廣信人也父欽習左氏春秋事黎陽賈護與劉歆同時而別自名家王莽從欽受左氏學以欽為猒難將軍元少傳父業為之訓詁鋭精覃思至不與鄉里通以父任為郎建武初元與桓談杜林鄭興俱為學者所宗時議欲立左氏傳博士范升奏以為左氏淺末不宜立元聞之乃詣闕上疏曰陛下撥亂反正文武並用深愍經藝謬雜真僞錯亂每臨朝日輒延羣臣講論聖道知丘明至賢親受孔子而公羊穀梁傳聞於後世故詔立左氏博詢可否示不專己盡之羣下也今論者沈溺所習玩守舊聞固執虛言傳受之辭以非親見實事之道左氏孤學少與遂為異家之所覆冒夫至音不合衆聽故伯牙絶弦至寶不同衆好故卞和泣血仲尼聖德而不容於世況於竹帛餘文其為雷同者所排固其宜也非陛下至明孰能察之所言前後相違皆斷小文媟黷微辭以年數小差掇為巨謬遺脫纖微指為大尤抉瑕擲釁掩其弘美所謂小辨破言小言破道者也升等又曰先帝不以左氏為經故不置博士後主所宜因襲臣愚以為若先帝所行而後主必行者則盤庚不當遷于殷周公不當營洛邑陛下不當都山東也往者孝武皇帝好公羊衛太子好穀梁有詔詔太子受公羊不得受穀梁孝宣皇帝在人閒時聞衛太子好穀梁於是獨學之及即位為石渠論而穀梁氏興至今與公羊並存此先帝後帝各有所立不必其相因也孔子曰純儉吾從衆至於拜下則違之夫明者獨見不惑於朱紫聽者獨聞不謬於清濁故離朱不為巧眩移目師曠不為新聲易耳方今干戈少弭戎事略戰留思聖藝眷顧儒雅採孔子拜下之義卒淵聖獨見之旨分明白黑建立左氏解釋先聖之積結洮汰學者之纍惑使基業垂於萬世後進無復狐疑則天下幸甚宿冤若辭不合經事不稽古退就重誅雖死之日生之年也元以才高著名辟司空李通府時大司農江馮上言宜令司隸校尉督察三公事下三府元上疏曰臣聞師臣者帝賓臣者霸故武王以太公為師齊桓以夷吾為仲父孔子曰百官總己聽於冢宰近則高帝優相國之禮太宗假宰輔之權及亡新王莽遭漢中衰專操國柄以偷天下況己自喻不信羣臣奪公輔之任損宰相之威以刺舉為明徼訐為直至乃陪僕告其君長子弟變其父兄罔密法峻大臣無所措手足然不能禁董忠之謀身為世戮故人君患在自驕不患驕臣失在自任不在任人是以文王有日之勞周公執吐握之恭不聞其崇刺舉務督察也方今四方尚擾天下未一百姓觀聽咸張耳目陛下宜修文武之聖典襲祖宗之遺德勞心下士屈節待賢誠不宜使有司察公輔之名帝從之宣下其議李通罷元後復辟司徒歐陽歙府數陳當世便事郊廟之禮帝不能用以病去年老卒於家子堅卿有文章賈逵字景伯扶風平陵人也九世祖誼文帝時為梁王太傅曾祖父光為常山太守宣帝時以吏二千石自洛陽徙焉父徽從劉歆受左氏春秋兼習國語周官又受古文尚書於塗惲學毛詩於謝曼卿作左氏條例二十一篇逵悉傳父業弱冠能誦左氏傳及五經本文以大夏侯尚書教授雖為古學兼通五家穀梁之說自為兒童常在太學不通人閒事身長八尺二寸諸儒為之語曰問事不休賈長頭性愷悌多智思俶儻有大節尤明左氏傳國語為之解詁五十一篇永平中上疏獻之顯宗重其書寫藏祕館時有神雀集宮殿官府冠羽有五采色帝異之以問臨邑侯劉復復不能對薦逵博物多識帝乃召見逵問之對曰昔武王終父之業鸑鷟在岐宣帝威懷戎狄神雀仍集此胡降之徵也帝勑蘭臺給筆札使作神雀頌拜為郎與班固並校祕書應對左右肅宗立降意儒術特好古文尚書左氏傳建初元年詔逵入講北宮白虎觀南宮雲臺帝善逵說使發出左氏傳大義長於二傳者逵於是具條奏之曰臣謹擲出左氏三十事尤著明者斯皆君臣之正義父子之紀綱其餘同公羊者什有七八或文簡小異無害大體至如祭仲紀季伍子胥叔術之屬左氏義深於君父父羊多任於權變其相殊絶固以甚遠而冤抑積久莫肯分明書建平中侍中劉歆欲立左氏不先暴論大義而輕移太常恃其義長詆挫諸儒諸儒內懷不服相與排之孝哀皇帝重逆衆心故出歆為河內太守從是攻擊左氏遂為重讎至光武皇帝奮獨見之明興立左氏穀梁會二家先師不曉圖讖故令中道而廢凡所以存先王之道者要在安上理民也今左氏崇君父卑臣子彊幹弱枝勸善戒惡至明至切至直至順且三代異物損益隨時故先帝博觀異家各有所採易有施孟復立梁丘尚書歐陽復有大小夏侯今三傳之異亦猶是也又五經家皆無以證圖讖明劉氏為堯後者而左氏獨有明文五經家皆言顓頊代黃帝而堯不得為火德左氏以為少昊代黃帝即圖讖所謂帝宣也如令堯不得為火則漢不得為赤其所發明補益實多遝猶朝夕恪勤遊情六藝研機綜微靡不審核若復留意廢學以廣聖見庶幾無所遺失矣逵母常有疾帝欲加賜以校書例多特以錢二十萬使潁陽侯馬防與之謂防曰賈逵母病此子無人事於外屢空則從孤竹之子於首陽山矣逵數為帝言古文尚書與經傳爾雅詁訓相應詔令撰歐陽大小夏侯尚書古文同異逵集為三卷帝善之復令撰齊魯韓詩與毛氏異同并作周官解故遷逵為衛士令八年乃詔諸儒各選高才生受左氏穀梁春秋古文尚書毛詩由是四經遂行於世皆拜逵所選弟子及門生為千乘王國郎朝夕受業黃門署學者皆欣欣羡慕焉和帝即位永元三年以逵為左中郎將八年復為侍中領騎都尉內備帷幄兼領祕書近署甚見信用逵薦東萊司馬均陳國汝郁帝即徵之並蒙優禮均字少賓安貧好學隱居教授不應辟命信誠行乎州里鄉人有所計爭輒令祝少賓不直者終無敢言位至侍中以老病乞身帝賜以大夫祿歸鄉里郁字叔異性仁孝及親歿遂隱處山澤後纍遷為魯相以德教化百姓稱之流人歸者八九千戶逵所著經傳義詁及論難百餘萬言又作詩頌誄書連珠酒令凡九篇學者宗之後世稱為通儒然不修小節當世以此頗譏焉故不至大官永元十三年卒時年七十二朝廷愍惜除兩子為太子舍人論曰鄭賈之學行乎數百年中遂為諸儒宗亦徒有以焉爾桓談以不善讖流亡鄭興以遜辭僅免賈逵能附會文致最差貴顯世主以此論學悲矣哉張霸字伯饒蜀郡成都人也年數歲而知孝讓雖出入飲食自然合禮鄉人號為張曾子七歲通春秋復欲進餘經父母曰汝小未能也霸曰我饒為之故字曰饒焉後就長水校尉樊倏鯈受嚴氏公羊春秋遂博覽五經諸生孫林劉固段著等慕之各市宅其傍以就學焉舉孝廉光祿主事稍遷永元中為會稽太守表用郡人處士顧奉公孫松等奉後為潁川太守松為司隸校尉並有名稱其餘有業行者皆見擢用郡中爭厲志節習經者以千數道路但聞誦聲初霸以樊倏鯈刪嚴氏春秋猶多繁辭乃減定為二十萬言更名張氏學霸始到越賊未解郡界不寧乃移書開購明用信賞賊遂束手歸附不煩士卒之力童謠曰𠫓廾我戟捐我矛盜賊盡吏皆休視事三年謂掾史曰太守起自孤生致位郡守蓋日中則移月滿則虧老氏有言知足不辱遂上病後徵四遷為侍中時皇后兄虎賁中郎將鄧騭當朝貴盛聞霸名行欲與為交霸逡巡不答衆人笑其不識時務後當為五更會疾卒年七十遺勑諸子曰昔延州使齊子死嬴博因坎路側遂以葬焉今蜀道阻遠不宜歸塋可止此葬足藏髮齒而已務遵速朽副我本心人生一世但當畏敬於人若不善加己直為受之諸子承命葬於河南梁縣因遂家焉將作大匠翟酺等與諸儒門人追録本行諡曰憲文中子楷楷字公超通嚴氏春秋古文尚書門徒常百人賓客慕之自父黨夙儒偕造門焉車馬填街徒從無所止黃門及貴戚之家皆起舍巷次以候過客往來之利楷疾其如此輒徙避之家貧無以為業常乘驢車至縣賣藥足給食者輒還鄉里司隸舉茂才除長陵令不至官隱居弘農山中學者隨之所居成市後華陰山南遂有公超市五府連辟舉賢良方正不就漢安元年順帝特下詔告河南尹曰故長陵令張楷行慕原憲操擬夷齊輕貴樂賤竄跡幽藪高志確然獨拔羣俗前比徵命盤桓未至將主者玩習於常優賢不足使其難進歟郡時以禮發遣楷復告疾不到性好道術能作五里霧時關西人裴優亦能為三里霧自以不如楷從學之楷避不肯見桓帝即位優遂行霧作賊事覺被考引楷言從學術楷坐繫廷尉詔獄積二年恆諷誦經籍作尚書注後以事無驗見原還家建和三年下詔安車備禮聘之辭以篤疾不行年七十終於家子陵陵字處沖官至尚書元嘉中歲首朝賀大將軍梁冀帶劒入省陵呵叱令出勑羽林虎賁奪冀劒冀跪謝陵不應即劾奏冀請廷尉論罪有詔以一歲俸贖而百僚肅然初冀弟不疑為河南尹舉陵孝廉不疑疾陵之奏冀因謂曰昔舉君適所以自罰也陵對曰明府不以陵不肖誤見擢序今申公憲以報私恩不疑有愧色陵弟玄玄字處虛沈深有才略以時亂不仕司空張溫數以禮辟不能致中平二年溫以車騎將軍出征涼州賊邊章等將行玄自田廬被褐帶索要說溫曰天下寇賊雲起豈不以黃門常侍無道故乎聞中貴人公卿已下當出祖道於平樂觀明公總天下威重握六師之要若於中坐酒酣鳴金鼓整行陳召軍正執有罪者誅之引兵還屯都亭以次翦除中官解天下之倒縣報海內之怨毒然後顯用隱逸忠正之士則邊章之徒宛轉股掌之上矣溫聞大震不能對良久謂玄曰處虛非不悅子之言顧吾不能行如何玄乃歎曰事行則為福不行則為賊今與公長辭矣即仰藥欲飲之溫前執其手曰子忠於我我不能用是吾罪也子何為當然且出口入耳之言誰今知之玄遂去隱居魯陽山中及董卓秉政聞之辟以為掾舉侍御史不就卓臨之以兵不得已彊起至輪氏道病終贊曰中世儒門賈鄭名學衆馳一介爭禮氈幄升元守經義偏情較霸貴知止辭交戚里公超善術所舍成市
