body:
  text: 後漢書卷二十八上桓談馮衍列傳第十八上桓談字君山沛國相人也父成帝時為太樂令談以父任為郎因好音律善鼓琴博學多通遍習五經皆詁訓大義不為章句能文章尤好古學數從劉歆楊雄辨析疑異性嗜倡樂簡易不修威儀而喜非毀俗儒由是多見排扺哀平間位不過郎傅皇后父孔鄉侯晏深善於談是時高安侯董賢寵幸女弟為昭儀皇后日已疏晏默默不得意談進説曰昔武帝欲立衛子夫陰求陳皇后之過而陳后終廢子夫竟立今董賢至愛而女弟尤幸殆將有子夫之變可不憂哉晏驚動曰然為之奈何談曰刑罰不能加無罪邪枉不能勝正人夫士以才智要君女以媚道求主皇后年少希更艱難或驅使醫巫外求方技此不可不備又君侯以后父尊重而多通賓客必借以重藝貽致譏議不如謝遣門徒務執謙賣心此修己正家避禍之道也晏曰善遂罷遣常客入白皇后如談所戒後賢果風太醫令真欽使求傅氏罪過遂逮后弟侍中喜詔獄無所得乃解故傅氏終全於哀帝之時及董賢為大司馬聞談名欲與之交談先奏書於賢説以輔國保身之術賢不能用遂不與通當王莽居攝篡弒之際天下之士莫不競褒稱德美作符命以求容媚談獨自守默然無言莽時為掌樂大夫更始立召拜太中大夫世祖即位徵待詔上書言事失旨不用後大司空宋弘薦談拜議郎給事中因上疏陳時政所宜曰臣聞國之廢興在於政事政事得失由乎輔佐輔佐賢明則俊士充朝而理合世務輔佐不明則論失時宜而舉多過事夫有國之君俱欲興化建善然而政道未理者其所謂賢者異也昔楚莊王問孫叔敖曰寡人未得所以為國是也叔敖曰國之有是衆所惡也恐王不能定也王曰不定獨在君亦在臣乎對曰君驕士曰士非我無從富貴士驕君曰君非士無從安存人君或至失國而不悟士或至飢寒而不進君臣不合則國是無從定矣莊王曰善願相國與諸大夫共定國是也蓋善政者視俗而施教察失而立防威德更興文武迭用然後政調於時而躁人可定昔董仲舒言理國譬若琴瑟其不調者則解而更張夫更張難行而拂衆者亡是故賈誼以才逐而朝錯以智死世雖有殊能而終莫敢談者懼於前事也矣夫張官置吏以理萬人縣賞設罰以別善惡惡人誅傷則善人蒙福矣今人相殺傷雖已伏法而私結怨讎子孫相報後忿深前至於滅戶殄業而俗稱豪健故雖有怯弱猶勉而行之此為聽人自理而無復法禁者也今宜申明舊令若已伏官誅而私相傷殺者雖一身逃亡皆徙家屬於邊其相傷者加常二等不得雇山贖罪如此則仇怨自解盜賊息矣以抑并兼長廉恥也今富商大賈多放錢貨中家子弟為之保役趨走與臣僕等勤收稅與封君比入是以衆人慕效不耕而食至乃多通侈靡以淫耳目今可令諸商賈自相糾告若非身力所得皆以臧畀告者如此則專役一己不敢以貨與人事寡力弱必歸功田畝田畝修則穀入多而地力盡矣生議所欲陷則與死比是為刑開二門也今可令通義理明習法律者校定科比一其法度班下郡國蠲除故條如此天下知方而獄無怨濫矣是時帝方信讖多以決定嫌疑又酬賞少薄天下不時安定談復上疏曰臣前獻瞽言未蒙詔報不勝憤悶冒死復陳愚夫策謀有益於政道者以合人心而得事理也凡人情忽於見事而貴於異聞觀先王之所記述咸以仁義正道為本非有奇怪虛誕之事蓋天道性命聖人所難言也自子貢以下不得而聞況後世淺儒能通之乎今諸巧慧小才伎數之人增益圖書矯稱讖記以欺惑貪邪詿誤人主焉可不抑遠之哉臣談伏聞陛下窮折方士黃白之術甚為明矣而乃欲聽納讖記又何誤也其事雖有時合譬猶卜數隻偶之類陛下宜垂明聽發聖意屏羣小之曲説述五經之正義略靁同之俗語詳通人之雅謀而四方盜賊未盡歸伏者此權謀未得也臣談伏觀陛下用兵諸所降下既無重賞以相恩誘或至虜掠奪其財物是以兵長渠率各生狐疑黨輩連結歲月不解古人有言曰天下皆知取之為取而莫知與之為取陛下誠能輕爵重賞與士共之則何招而不至何説而不釋何向而不開何征而不剋如此則能以狹為廣以為速亡者復存失者復得矣其後有詔會議靈臺所處帝謂談曰吾欲以讖決之何如談默然良久曰臣不讀讖帝問其故談復極言讖之非經帝大怒曰桓談非聖無法將下斬之談叩頭流血良久乃得解出為六安郡丞意忽忽不樂道病卒時年七十餘初談著書言當世行事二十九篇號曰新論上書獻之世祖善焉琴道一篇未成肅宗使班固續成之所著賦誄書奏凡二十六篇元和中肅宗行東巡狩至沛使使者祠談冢鄉里以為榮馮衍字敬通京兆杜陵人也祖野王元帝時為大鴻臚衍幼有奇才年九歲能誦詩至二十而博通羣書王莽時諸公多薦舉之者衍辭不肯仕時天下兵起莽遣更始將軍廉丹討伐山東丹辟衍為掾與俱至定陶莽追詔丹曰倉廩盡矣府庫空矣可以怒矣可以戰矣將軍受國重任不捐身於中野無以報恩塞責丹惶恐夜召衍以書示之衍因説丹曰衍聞順而成者道之所大也逆而功者權之所貴也是故期於有成不問所由論於大體不守小節昔逢丑父伏軾而使其君取飲稱於諸侯鄭祭仲立突而出忽終得復位美於春秋蓋以死易生以存易亡君子之道也詭於衆意寧國存身賢智之慮也故易曰窮則變變則通通則久是以自天祐之吉無不利若夫知其不可而必行之破軍殘衆無補於主身死之日負義於時智者不為勇者不行且衍聞之得時無怠張良以五世相韓椎秦始皇博浪之中勇冠乎賁育名高乎太山將軍之先為漢信臣新室之興英俊不附今海內潰亂人懷漢德甚於詩人思召公也愛其甘棠而況子孫乎人所歌舞天必從之方今為將軍計莫若屯據大郡鎮撫吏士砥厲其節百里之內牛酒日賜納雄桀之士詢忠智之謀要將來之心待從橫之變興社稷之利除萬人之害則福祿流於無窮功烈著於不滅何與軍覆於中原身膏於草野功敗名喪恥及先祖哉聖人轉禍而為福智士因敗而為功願明公深計而無與俗同丹不能從進及睢陽復説丹曰蓋聞明者見於無形智者慮於未萌況其昭晢者乎凡患生於所忽禍發於細微敗不可悔時不可失公孫鞅曰有高人之行負非於世有獨見之慮見贅於人故信庸庸之論破金石之策襲當世之操失高明之德夫決者智之君也疑者事之役也時不重至公勿再計丹不聽遂進及無鹽與赤眉戰死衍乃亡命河東更始二年遣尚書僕射鮑永行大將軍事安集北方衍因以計説永曰是故君臣兩興功名兼立銘勒金石令問不忘今衍幸逢寬明之日將值危言之時豈敢拱默避罪而不竭其誠哉夷緣邊破於北狄遠征萬里暴兵纍年禍拿未解兵連不息刑法彌深賦斂愈重衆強之黨橫擊於外百僚之臣貪殘於內元元無聊飢寒並臻父子流亡夫婦離散廬落丘墟田疇蕪穢疾疫大興災異蜂起於是江湖之上海岱之濱風騰波涌更相駘藉四垂之人肝腦塗地死亡之數不啻太半殃咎之毒痛入骨髓匹夫僮婦咸懷怨怒皇帝以聖德靈威龍興鳳舉率宛葉之衆將散亂之兵喢血昆陽長驅武關破百萬之陳摧九虎之軍靁震四海席卷天下攘除禍亂誅滅無道一期之間海內大定繼高祖之休烈修文武之絶業社稷復存炎精更輝德冠往初功無與二天下自以去亡新就聖漢當蒙其福而賴其願樹恩布德易以周洽其猶順驚風而飛鴻毛也然而諸將虜掠逆倫絶理殺人父子妻人婦女燔其室屋略其財産飢者毛食寒者裸跣冤結失望無所歸命今大將軍以明淑之德秉大使之權統三軍之政存撫并州之人惠愛之誠加乎百姓高世之聲聞乎羣士故其延頸企踵而望者非特一人也且大將軍之事豈得圭璧其行束修其心而已哉將定國家之大業成天地之元功也昔周宣中興之主齊桓霸強之君耳猶有申伯召虎夷吾吉甫攘其蝥賊安其疆宇況乎萬里之漢明帝復興而大將軍為之梁棟此誠不可以忽也將軍所部不過百里守城不休戰軍不息兵革雲翔百姓震駭奈何自怠不為深憂夫并州之地東帶名關北逼強胡年穀獨孰人庶多資斯四戰之地攻守之場也如其不虞何以待之故曰德不素積人不為用備不豫具難以應卒今生人之命縣於將軍將軍所杖必須良才宜改易非任更選賢能夫十室之邑必有忠信審得其人以承大將軍之明雖則山澤之人無不感德思樂為用矣然後簡精鋭之卒發屯守之士三軍既整甲兵已具相其土地之饒觀其水泉之利制屯田之術習戰射之教則威風遠暢人安其業矣若鎮太原撫上黨收百姓之歡心樹名賢之良佐天下無變則足以顯聲譽一朝有事則可以建大功惟大將軍開日月之明發深淵之慮監六經之論觀孫吳之策省羣議之是非詳衆士之白黑以超周南之迹垂甘棠之風令夫功烈施於千載富貴傳于無窮伊望之策何以加茲及世祖即位遣宗正劉延攻天井關與田邑連戰十餘合延不得進邑迎母弟妻子為延所獲後邑聞更始敗乃遣使詣洛陽獻璧馬即拜為上黨太守因遣使者招永衍永衍等疑不肯降而忿邑背前約衍乃遣邑書曰三王背畔赤眉危國天下蟻動社稷顛隕是忠臣立功之日志士馳馬之秋也伯玉擢選剖符專宰大郡夫上黨之地有四塞之固東帶三關西為國蔽奈何舉之以資強敵開天下之胸假仇讎之刃豈不哀哉曲戟不易其辭謝息守郕脅以晉魯不喪其邑由是言之內無鉤頸之禍外無桃萊之利而被畔人之聲蒙降城之恥竊為左右羞之且邾庶其竊邑畔君以要大利曰賤而必書莒牟夷以土地求食而名不滅是以大丈夫動則思禮行則思義未有背此而身名能全者也為伯玉深計莫若與鮑尚書同情勠力顯忠貞之節立超世之功如以尊親係纍之故能捐位投命歸之尚書大義既全敵人紓怨上不損剖符之責下足救老幼之命申眉高談無愧天下若乃貪上黨之權惜全邦之實衍恐伯玉必懷周趙之憂上黨復有前年之禍昔晏平仲納延陵之誨終免欒高之難孫林父違穆子之戒故陷終身之惡以為伯玉聞此至言必若刺心自非嬰城而堅守則策馬而不顧也聖人轉禍而為福智士因敗以成勝願自強於時無與俗同金石要長生而避死地可也今百齡之期未有能至老壯之間相去幾何誠使故朝尚在忠義可立雖老親受戮妻兒橫分邑之願也間者上黨黠賊大衆圍城義兵兩輩入據井陘邑親潰敵圍拒擊宗正自試智勇非不能當誠知故朝為兵所害新帝司徒已定三輔隴西北地從風響應其事昭昭日月經天河海帶地不足以比死生有命富貴在天天下存亡誠云命也邑雖沒身能如命何亡義無其誰為老母拘執恩所當留而厲以貪權誘以策馬抑其利心必其不顧何其愚乎邑年三十歷位卿士性少嗜欲情厭事為況今位尊身危財多命殆鄙人知之何疑君子君長敬通揭節垂組自相署立蓋仲由使門人為臣孔子譏其欺天君長據位兩州加以一郡而河東畔國兵不入彘上黨見圍不窺大谷宗正臨境莫之能援兵威屈辱國權日損三王背畔赤眉害主未見兼行倍道之赴若墨翟纍繭救宋申包胥重胝存楚衛女馳歸唁兄之志主亡一歲莫知定所虛冀妄言苟肆鄙塞未能事生安能事死未知為臣焉知為主豈厭為臣子思為君父乎欲搖太山而蕩北海事敗身危要思邑言帝怨衍等不時至永以立功得贖罪遂任用之而衍獨見黜永謂衍曰昔高祖賞季布之罪誅丁固之功今遭明主亦何憂哉衍曰記有之人有挑其鄰人之妻者挑其長者長者詈之挑其少者少者報之後其夫死而取其長者或謂之曰夫非罵爾者邪曰在人欲其報我在我欲其罵人也夫天命難知人道易守守道之臣何患死亡頃之帝以衍為曲陽令誅斬劇賊郭勝等降五千餘人論功當封以讒毀故賞不行建武六年日食衍上書陳八事其一曰顯文德二曰褒武烈三曰修舊功四曰招俊傑五曰明好惡六曰簡法令七曰差秩祿八曰撫邊境書奏帝將召見初衍為狼孟長以罪摧陷大姓令狐略是時略為司空長史讒之於尚書令王護尚書周生豐曰衍所以求見者欲毀君也護等懼之即共排間衍遂不得入後衛尉陰興新陽侯陰就以外戚貴顯深敬重衍衍遂與之交結由是為諸王所聘請尋為司隸從事帝懲西京外戚賓客故皆以法繩之大者抵死徙其餘至貶黜衍由此得罪嘗自詣獄有紹赦不問西歸故郡閉門自保不敢復與親故通
