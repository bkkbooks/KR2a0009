body:
  text: 後漢書卷二十四馬援列傳第十四子廖子防兄子嚴族孫稜馬援字文淵扶風茂陵人也其先趙奢為趙將號曰馬服君子孫因為氏武帝時以吏二千石自邯鄲徙焉曾祖父通以功封重合侯坐兄何羅反被誅故援再世不顯援三兄況余員並有才能王莽時皆為二千石援年十二而孤少有大志諸兄奇之嘗受齊詩意不能守章句乃辭況欲就邊郡田牧況曰汝大才當晚成良工不示人以朴且從所好會況卒援行服期年不離墓所敬事寡不冠不入廬後為郡督郵送囚至司命府囚有重罪援哀而縱之遂亡命北地遇赦因留牧畜賓客多歸附者遂役屬數百家轉遊隴漢間常謂賓客曰丈夫為志窮當益堅老當益壯因處田牧至有牛馬羊數千頭穀數萬斛既而歎曰凡殖貨財産貴其能施賑也否則守錢虜耳乃盡散以班昆弟故舊身衣羊裘皮褲王莽末四方兵起莽從弟衛將軍林廣招雄俊乃辟援及同縣原涉為掾薦之於莽莽以涉為鎮戎大尹援為新成大尹及莽敗援兄員時為增山連率與援俱去郡復避地涼州世祖即位員先詣洛陽帝遣員復郡卒於官援因留西州隗囂甚敬重之以援為綏德將軍與決籌策是時公孫述稱帝於蜀囂使援往觀之援素與述同里閈相善以為既至當握手歡如平生而述盛陳陛衛以延援入交拜禮畢使出就館更為援制都布單衣交讓冠會百官於宗廟中立舊交之位述鸞旗旄騎警蹕就車磬折而入禮饗官屬甚盛欲授援以封侯大將軍位賓客皆樂留援曉之曰天下雄雌未定公孫不吐哺走迎國士與圖成敗反修飾邊幅如偶人形此子何足久稽天下士乎因辭歸謂囂曰子陽井底蛙耳而妄自尊大不如專意東方建武四年冬囂使援奉書洛陽援至引見於宣德殿世祖迎笑謂援曰卿遨遊二帝間今見卿使人大慙援頓首辭謝因曰當今之世非獨君擇臣也臣亦擇君矣臣與公孫述同縣少相善臣前至蜀述陛戟而後進臣臣今遠來陛下何知非刺客姦人而簡易若是帝復笑曰卿非刺客顧説客耳援曰天下反覆盜名字者不可勝數今見陛下恢廓大度同符高祖乃知帝王自有真也帝甚壯之援從南幸黎丘轉至東海及還以為待詔使太中大夫來歙持節送援西歸隴右隗囂與援共臥起問以東方流言及京師得失援説囂曰前到朝廷上引見數十每接宴語自夕至旦才明勇略非人敵也且開心見誠無所隱伏闊達多大節略與高帝同經學博覽政事文辨前世無比囂曰卿謂何如高帝援曰不如也高帝無可無不可今上好吏事動如節度又不喜飲酒囂意不懌曰如卿言反復勝邪然雅信援故遂遣長子恂入質援因將家屬隨恂歸洛陽居數月而無它職任援以三輔地曠土沃而所將賓客猥多乃上書求屯田上林苑中帝許之會隗囂用王元計意更狐疑援數以書記責譬於囂囂怨援背己得書增怒其後遂發兵拒漢援乃上疏曰臣援自念歸身聖朝奉事陛下本無公輔一言之薦左右為容之助臣不自陳陛下何因聞之夫居前不能令人輊居後不能令人軒與人怨不能為人患臣所恥也故敢觸冒罪忌昧死陳誠臣與隗囂本實交友初囂遣臣東謂臣曰本欲為漢願足下往觀之於汝意可即專心矣及臣還反報以赤心實欲導之於善非敢譎以非義而囂自挾姦心盜憎主人怨毒之情遂歸於臣臣欲不言則無以上聞願聽詣行在所極陳滅囂之術得空胸腹申愚策退就隴畝死無所恨帝乃召援計事援具言謀畫因使援將突騎五千往來遊説囂將高峻任禹之屬下及羌豪為陳禍福以離囂友支黨援又為書與囂將楊廣使曉勸於囂曰春卿無恙前別冀南寂無音驛援間還長安因留上林竊見四海已定兆民同情而季孟閉拒背畔為天下表的常懼海內切齒思相屠裂故遺書戀戀以致惻隱之計乃聞季孟歸罪於援而納王遊翁諂邪之説自謂函谷以西舉足可定以今而觀竟何如邪援間至河內過存伯春見其奴吉從西方還説伯春小弟仲舒望見吉欲問伯春無它否竟不能言曉夕號泣婉轉塵中又説其家悲愁之狀不可言也夫怨讎可刺不可毀援聞之不自知泣下也援素知季孟孝愛曾閔不過夫孝於其親豈不慈於其子可有子抱三木而跳梁妄作自同分羹之事乎季孟平生自言所以擁兵衆者欲以保全父母之國而完墳墓也又言苟厚士大夫而已而今所欲全者將破亡之所欲完者將毀傷之所欲厚者將反薄之季孟嘗折愧子陽而不受其爵今更共陸陸欲往附之將難為顏乎若復責以重質當安從得子主給是哉往時子陽獨欲以王相待而春卿拒之今者歸老更欲低頭與小兒曹共槽櫪而食併肩側身於怨家之朝乎男兒溺死何傷而拘遊哉今國家待春卿意深宜使牛孺卿與諸耆老大人共説季孟若計畫不從真可引領去矣前披輿地圖見天下郡國百有六所奈何欲以區區二邦以當諸夏百有四乎春卿事季孟外有君臣之義內有朋友之道言君臣邪固當諫爭語朋友邪應有切磋豈有知其無成而但萎腇咋舌叉手從族乎及今成計殊尚善也過是欲少味矣且來君叔天下信士朝廷重之其意依依常獨為西州言援商朝廷尤欲立信於此必不負約援不得久留願急賜報廣竟不答八年帝自西征囂至漆諸將多以王師之重不宜遠入險阻計冘豫未決會召援夜至帝大喜引入具以羣議質之援因説隗囂將帥有土崩之藝兵進有必破之狀又於帝前聚米為山谷指畫形藝開示衆軍所從道徑往來分析曲折昭然可曉帝曰虜在吾目中矣明旦遂進軍至第一囂衆大潰九年拜援為太中大夫副來歙監諸將平涼州自王莽末西羌寇邊遂入居塞內金城屬縣多為虜有來歙奏言隴西侵殘非馬援莫能定十一年夏璽書拜援隴西太守援乃發步騎三千人擊破先零羌於臨洮斬首數百級獲馬牛羊萬餘頭守塞諸羌八千餘人詣援降諸種有數萬屯聚寇鈔拒浩亹隘援與揚武將軍馬成擊之羌因將其妻子輜重移阻於允吾谷援乃潛行間道掩赴其營羌大驚壞復遠徙唐翼谷中援復追討之羌引精兵聚北山上援陳軍向山而分遣數百騎繞襲其後乘夜放火擊鼓叫譟虜遂大潰凡斬首千餘級援以兵少不得窮追收其穀糧畜産而還援中矢貫脛帝以璽書勞之賜牛羊數千頭援盡班諸賓客是時朝臣以金城破羌之西塗遠多寇議欲棄之援上言破羌以西城多完牢易可依固其田土肥壤灌溉流通如令羌在湟中則為害不休不可𠫓廾也帝然之於是詔武威太守令悉還金城客民歸者三千餘口使各反舊邑援奏為置長吏繕城郭起塢候開導水田勸以耕牧郡中樂業又遣羌豪楊封譬説塞外羌皆來和親又武都氐人背公孫述來降者援皆上復其侯王君長賜印綬帝悉從之乃罷馬成軍十三年武都參狼羌與塞外諸種為寇殺長吏援將四千餘人擊之至氐道縣羌在山上援軍據便地奪其水草不與戰羌遂窮困豪帥數十萬戶亡出塞諸種萬餘人悉降於是隴右清靜援務開寬恩信恩寬以待下任吏以職但總大體而已賓客故人日滿其門諸曹時白外事援輒曰此丞掾之任何足相煩頗哀老子使得遨遊若大姓侵小民黠羌欲旅距此乃太守事耳傍縣嘗有報仇者吏民驚言羌反百姓奔入城郭狄道長詣門請閉城發兵援時與賓客飲大笑曰燒虜何敢復犯我曉狄道長歸守寺舍良怖急者可牀下伏後稍定郡中服之視事六年徵入為虎賁中郎將初援在隴西上書言宜如舊鑄五銖錢事下三府三府奏以為未可許事遂寢及援還從公府求得前奏難十餘條乃隨牒解釋更具表言帝從之天下賴其便援自還京師數被進見為人明須髮眉目如畫間於進對尤善述前世行事每言及三輔長者下至閭里少年皆可觀聽自皇太子諸王侍聞者莫不屬耳忘倦又善兵策帝常言伏波論兵與我意合每有所謀未嘗不用初卷人維汜訞言稱神有弟子數百人坐伏誅後其弟子李廣等宣言汜神化不死以誑惑百姓十七年遂共聚會徒黨攻沒晥城殺晥侯劉閔自稱南嶽大師遣謁者張宗將兵數千人討之復為廣所敗於是使援發諸郡兵合萬餘人擊破廣等斬之又交址女子徵側及女弟徵二反攻沒其郡九真日南合浦蠻夷皆應之寇略嶺外六十餘城側自立為王於是璽書拜援伏波將軍以扶樂侯劉隆為副督樓船將軍段志等南擊交址軍至合浦而志病卒詔援并將其兵遂緣海而進隨山刊道千餘里十八年春軍至浪泊上與賊戰破之斬首數千級降者萬餘人援追徵側等至禁溪數敗之賊遂散走明年正月斬徵側徵二傳首洛陽封援為新息侯食邑三千戶援乃擊牛釃酒勞饗軍士從容謂官屬曰吾從弟少遊常哀吾慷慨多大志曰士生一世但取衣食裁足乘下澤車御款段馬為郡掾史守墳墓鄉里稱善人斯可矣致求盈餘但自苦耳當吾在浪泊西里間虜未滅之時下潦上霧毒氣重蒸仰視飛鳶跕跕墯水中臥念少遊平生時語何可得也今賴士大夫之力被蒙大恩猥先諸君紆佩金紫且喜且慙吏士皆伏稱萬歲援將樓船大小二千餘艘戰士二萬餘人進擊九真賊徵側餘黨都羊等自無功至居風斬獲五千餘人嶠南悉平援奏言西于縣戶有三萬二千遠界去庭千餘里請分為封溪望海二縣許之援所過輒為郡縣治城郭穿渠灌溉以利其民條奏越律與漢律駮者十餘事與越人申明舊制以約束之自後駱越奉行馬將軍故事二十年秋振旅還京師軍吏經瘴疫死者十四五賜援兵車一乘朝見位次九卿援好騎善別名馬於交址得駱越銅鼓乃鑄為馬式還上之因表曰夫行天莫如龍行地莫如馬馬者甲兵之本國之大用安寧則以別尊卑之序有變則以濟遠近之難昔有騏驥一日千里伯樂見之昭然不惑近世有西河子輿亦明相法子輿傳西河儀長孺長孺傳茂陵丁君都君都傳成紀楊子阿臣援嘗師事子阿受相馬骨法考之於行事輒有驗效臣愚以為傳聞不如親見視景不如察形今欲形之於生馬則骨法難備具又不可傳之於後孝武皇帝時善相馬者東門京鑄作銅馬法獻之有詔立馬於魯班門外則更名魯班門曰金馬門臣謹依儀氏中帛氏口齒謝氏脣丁氏身中備此數家骨相以為法馬高三尺五寸圍四尺五寸有詔置於宣德殿下以為名馬式焉初援軍還將至故人多迎勞之平陵人孟冀名有計謀於坐賀援援謂之曰吾望子有善言反同衆人邪昔伏波將軍路博德開置七郡裁封數百戶今我微勞猥饗大縣功薄賞厚何以能長久乎先生奚用相濟冀曰愚不及援曰方今胸奴烏桓尚擾北邊欲自請擊之男兒要當死於邊野以馬革裹尸還葬耳何能臥牀上在兒女子手中邪冀曰諒為烈士當如此矣還月餘會胸奴烏桓寇扶風援以三輔侵擾園陵危逼因請行許之自九月至京師十二月復出屯襄國詔百官祖道援謂黃門郎梁松竇固曰凡人為貴當使可賤如卿等欲不可復賤居高堅自持勉思鄙言松後果以貴滿致災固亦幾不免明年秋援乃將三千騎出高柳行鴈門代郡上谷障塞烏桓候者見漢軍至虜遂散去援無所得而還援嘗有疾梁松來候之獨拜牀下援不答松去後諸子問曰梁伯孫帝壻貴重朝廷公卿已下莫不憚之大人奈何獨不為禮援曰我乃松父友也雖貴何得失其序乎松由是恨之二十四年武威將軍劉尚擊武陵五溪蠻夷深入軍沒援因復請行時年六十二帝愍其老未許之援自請曰臣尚能被甲上馬帝令試之援據鞍顧眄以示可用帝笑曰矍鑠哉是翁也遂遣援率中郎將馬武耿舒劉匡孫永等將十二郡募士及薥刑四萬餘人征五溪援夜與送者訣謂友人謁者杜愔曰吾受厚恩年迫餘日索常恐不得死國事今獲所願甘心瞑目但畏長者家兒或在左右或與從事殊難得調介介獨惡是耳明年春軍至臨鄉遇賊攻縣援迎擊破之斬獲二千餘人皆散走入竹林中初軍次下雋有兩道可入從壺頭則路近而水嶮從充則塗夷而運遠帝初以為疑及軍至耿舒欲從充道援以為𠫓廾日費糧不如進壺頭扼其喉咽充賊自破以事上之帝從援策三月進營壺頭賊乘高守隘水疾船不得上會暑甚士卒多疫死援亦中病遂困乃穿岸為室以避炎氣賊每升險鼓譟援輒曳足以觀之左右哀其壯意莫不為之流涕耿舒與兄好畤侯弇書曰前舒上書當先擊充糧雖難運而兵馬得用軍人數萬爭欲先奮今壺頭竟不得進大衆怫鬱行死誠可痛惜前到臨鄉賊無故自致若夜擊之即可殄滅伏波類西域賈胡到一處輒止以是失利今果疾疫皆如舒言弇得書奏之帝乃使虎賁中郎將梁松乘驛責問援因代監軍會援病卒松宿懷不平遂因事陷之帝大怒追收援新息侯印綬初兄子嚴敦並喜譏議而通輕俠客援前在交址還書誡之曰吾欲汝曹聞人過失如聞父母之名耳可得聞口不可得言也好論議人長短妄是非正法此吾所大惡也寧死不願聞子孫有此行也汝曹知吾惡之甚矣所以復言者施襟結褵申父母之戒欲使汝曹不忘之耳龍伯高敦厚周慎口無擇言謙約節儉廉公有威吾愛之重之願汝曹效之杜季良豪俠好義憂人之憂樂人之樂清濁無所失父喪致客數郡畢至吾愛之重之不願汝曹效也效伯高不得猶為謹勑之士所謂刻鵠不成尚類鶩者也效季良不得陷為天下輕薄子所謂畫虎不成反類狗者也訖今季良尚未可知郡將下車輒切齒州郡以為言吾常為寒心是以不願子孫效也季良名保京兆人時為越騎司馬保仇人上書訟保為行浮薄亂羣惑衆伏波將軍萬里還書以誡兄子而梁松竇固以之交結將扇其輕偽敗亂諸夏書奏帝召責松固以訟書及援誡書示之松固叩頭流血而得不罪詔免保官伯高名述亦京兆人為山都長由此擢拜零陵太守初援在交址常餌薏苡實用能輕身省欲以勝瘴氣南方薏苡實大援欲以為種軍還載之一車時人以為南土珍怪權貴皆望之援時方有寵故莫以聞及卒後有上書譖之者以為前所載還皆明珠文犀馬武與於陵侯侯昱等皆以章言其狀帝益怒援妻孥惶懼不敢以喪還舊塋裁買城西數畝地葬而已賓客故人莫敢弔會嚴與援妻子草索相連詣闕請罪帝乃出松書以示之方知所坐上書訴冤前後六上辭甚哀切然後得葬又前雲陽令同郡朱勃詣闕上書曰臣聞王德聖政不忘人之功採其一美不求備於衆故高祖赦蒯通而以王禮葬田橫大臣曠然咸不自疑夫大將在外讒言在內微過輒記大功不計誠為國之所慎也故章邯畏口而奔楚燕將據聊而不下豈其甘心末規哉悼巧言之傷類也羣貴之間傍無一言之佐馳深淵入虎口豈顧計哉寧自知當要七郡之使徼封侯之福邪八年車駕西討隗囂國計狐疑衆營未集援建宜進之策卒破西州及吳漢下隴冀路斷隔唯獨狄道為國堅守士民飢困寄命漏刻援奉詔西使鎮慰邊衆乃招集豪傑曉誘羌戎謀如涌泉藝如轉規遂救倒縣之急存幾亡之城兵全師進因糧敵人隴冀略平而獨守空郡兵動有功師進輒克銖鋤先零緣入山谷猛怒力戰飛矢貫脛又出征交址土多瘴氣援與妻子生訣無悔吝之心遂斬滅徵側克平一州間復南討立陷臨鄉師已有業未竟而死吏士雖疫援不獨存夫戰或以久而立功或以速而致敗深入未必為得不進未必為非人情豈樂久屯絶地不生歸哉惟援得事朝廷二十二年北出塞漠南度江海觸冒害氣僵死軍事名滅爵絶國土不傳海內不知其過衆庶未聞其毀卒遇三夫之言橫被誣罔之讒家屬杜門葬不歸墓怨隙並興宗親怖栗死者不能自列生者莫為之訟臣竊傷之豈復疑以錢穀間哉夫操孔父之忠而不能自免於讒此鄒陽之所悲也詩云取彼讒人投畀豺虎豺虎不食投畀有北有北不受投畀有昊此言欲令上天而平其惡惟陛下留思豎儒之言無使功臣懷恨黃泉臣聞春秋之義罪以功除聖王之祀臣有五義若援所謂以死勤事者也願下公卿平援功罪宜絶宜續以厭海內之望勃字叔陽年十二能誦詩書常候援兄況勃衣方領能矩步辭言𡢃雅援裁知書見之自失況知其意乃自酌酒慰援曰朱勃小器速成智盡此耳卒當從汝稟學勿畏也朱勃未二十右扶風請試守渭城宰及援為將軍封侯而勃位不過縣令援後雖貴常待以舊恩而卑侮之勃愈身自親及援遇讒唯勃能終焉肅宗即位追賜勃子穀二千斛初援兄子壻王磐子石王莽從兄平阿侯仁之子也莽敗磐擁富資居故國為人尚氣節而愛士好施有名江淮間後遊京師與衛尉陰興大司空朱浮齊王章共相友善援謂姊子曹訓曰王氏廢姓也子石當屏居自守而反遊京師長者用氣自行多所陵折其敗必也後歲餘磐果與司隸校尉蘇鄴丁鴻事相連坐死洛陽獄而磐子肅復出入北宮及王侯邸第援謂司馬呂种曰建武之元名為天下重開自今以往海內日當安耳但憂國家諸子並壯而舊防未立若多通賓客則大獄起矣卿曹戒慎之及郭后薨有上書者以為肅等受誅之家客因事生亂慮致貫高任章之變帝怒乃下郡縣收捕諸王賓客更相牽引死者以千數呂种亦豫其禍臨命嘆曰馬將軍誠神人也永平初援女立為皇后顯宗圖畫建武中名臣列將於雲臺以椒房故獨不及援東平王蒼觀圖言於帝曰何故不畫伏波將軍像帝笑而不言至十七年援夫人卒乃更修封樹起祠堂建初三年肅宗使五官中郎將持節追策諡援曰忠成侯四子廖防光客卿客卿幼而歧嶷年六歲能應接諸公專對賓客嘗有死罪亡命者來過客卿逃匿不令人知外若訥而內沈敏援甚奇之以為將相器故以客卿字焉援卒後客卿亦夭沒論曰馬援騰聲三輔遨遊二帝及定節立謀以干時主將懷負鼎之願蓋為千載之遇焉然其戒人之禍智矣而不能自免於讒隙豈功名之際理固然乎夫利不在身以之謀事則智慮不私己以之斷義必厲誠能回觀物之智而為反身之察若施之於人則能恕自鑒其情亦明矣廖字敬平少以父任為郎明德皇后既立拜廖為羽林左監虎賁中郎將顯宗崩受遺詔典掌門禁遂代趙喜為衛尉肅宗甚尊重之時皇太后躬履節儉事從約廖慮美業難終上疏長樂宮以勸成德政曰臣案前世詔令以百姓不足起於世尚奢靡故元帝罷服官成帝御浣衣哀帝去樂府然而侈費不息至於衰亂者百姓從行不從言也夫改政移風必有其本傳曰吳王好劒客百姓多創瘢楚王好細宮中多餓死長安語曰城中好高髻四方高一尺城中好廣眉四方且半額城中好大袖四方全匹帛斯言如戲有切事實前下制度未幾後稍不行雖或吏不奉法良由慢起京師今陛下躬服厚繒斥去華飾素所安發自聖性此誠上合天心下順民望浩大之福莫尚於此陛下既已得之自然猶宜加以勉勗法太宗之隆德戒成哀之不終易曰不恆其德或承之羞誠令斯事一竟則四海誦德聲薰天地神明可通金石可勒而況於行仁心乎況於行令乎願置章坐側以當瞽人夜誦之音太后深納之朝廷大議輒以詢訪廖性質誠畏慎不愛權藝聲名盡心納忠不屑毀譽有司連據舊典奏封廖等纍讓不得已建初四年遂受封為順陽侯以特進就第每有賞賜輒辭讓不敢當京師以是稱之子豫為步兵校尉太后崩後馬氏失藝廖性寬緩不能教勒子孫豫遂投書怨誹又防光奢侈好樹黨與八年有司奏免豫遣廖防光就封豫隨廖歸國考擊物故後詔還廖京師永元四年卒和帝以廖先帝之舅厚加賵賻使者弔祭王主會喪諡曰安侯子遵嗣徙封程鄉侯遵卒無子國除元初三年鄧太后詔紹封廖孫度為潁陽侯防字江平永平十二年與弟光俱為黃門侍郎肅宗即位拜防中郎將稍遷城門校尉建初二年金城隴西保塞羌皆反拜防行車騎將軍事以長水校尉耿恭副將北軍五校兵及諸郡積射士三萬人擊之軍到冀而羌豪布橋等圍南部都尉於臨洮防欲救之臨洮道險車騎不得方駕防乃別使兩司馬將數百騎分為前後軍去臨洮十餘里為大營多樹幡幟揚言大兵旦當進羌候見之馳還言漢兵盛不可當明旦遂鼓譟而前羌虜驚走因追擊破之斬首虜四千餘人遂解臨洮圍防開以恩信燒當種皆降唯布橋等二萬餘人在臨洮西南望曲谷十二月羌又敗耿恭司馬及隴西長史於和羅谷死者數百人明年春防遣司馬夏駿將五千人從大道向其前潛遣司馬馬彭將五千人從間道衝其心腹又令將兵長史李調等將四千人繞其西三道俱擊復破之斬獲千餘人得牛羊十餘萬頭羌退走夏駿追之反為所敗防乃引兵與戰於索西又破之布橋迫急將種人萬餘降詔徵防還拜車騎將軍城門校尉如故防貴寵最盛與九卿絶席光自越騎校尉遷執金吾四年封防潁陽侯光為許侯兄弟二人各六千戶防以顯宗寢疾入參醫藥又平定西羌增邑千三百五十戶屢上表讓位俱以特進就第皇太后崩明年拜防光祿勳光為衛尉防數言政事多見採用是冬始施行十二月迎氣樂防所上也子巨為常從小侯六年正月以巨當冠特拜為黃門侍郎肅宗親御章臺下殿陳鼎俎自臨冠之明年防復以病乞骸骨詔賜故中山王田廬以特進就第防兄弟貴盛奴婢各千人已上資産巨億皆買京師膏腴美田又大起第觀連閣臨道彌亙街路多聚聲樂曲度比諸郊廟賓客奔湊四方畢至京兆杜篤之徒數百人常為食客居門下刺史守令多出其家歲時賑給鄉閭故人莫不周洽防又多牧馬畜賦斂羌胡帝不喜之數加譴勑所以禁遏甚備由是權藝稍損賓客亦衰八年因兄子豫怨謗事有司奏防光兄弟奢侈踰僭濁亂聖化悉免就國臨上路詔曰舅氏一門俱就國封四時陵廟無助祭先后者朕甚傷之其令許侯思田廬有司勿復請以慰朕渭陽之情光為人小心周密喪母過哀帝以是特親愛之乃復位特進子康黃門侍郎永元二年光為太僕康為侍中及竇憲誅光坐與厚善復免就封後憲奴誣光與憲逆自殺家屬歸本郡本郡復殺康而防及廖子遵皆坐徙封丹陽防為翟鄉侯租歲限三百萬不得臣吏民防後以江南下溼上書乞歸本郡和帝聽之十三年卒子巨嗣後為長水校尉永初七年鄧太后詔諸馬子孫還京師隨四時見會如故事復紹封光子朗為合鄉侯嚴字威卿父余王莽時為楊州牧嚴少孤而好擊劒習騎射後乃白援從平原楊太伯講學專心墳典能通春秋左氏因覽百家羣言遂交結英賢京師大人咸器異之仕郡督郵援常與計議委以家事弟敦字孺卿亦知名援卒後嚴乃與敦俱歸安陵居巨下三輔稱其義行號曰巨下二卿明德皇后既立嚴乃閉門自守猶復慮致譏嫌遂更徙北地斷絶賓客永平十五年皇后勑使移居洛陽顯宗召見嚴進對間雅意甚異之有詔留仁壽闥與校書郎杜撫班固等雜定建武注記常與宗室近親臨邑侯劉復等論議政事甚見寵幸後拜將軍長史將北軍五校士羽林禁兵三千人屯西河美稷衛護南單于聽置司馬從事牧守謁敬同之將軍勑嚴過武庫祭蚩尤帝親御阿閣觀其士衆時人榮之肅宗即位徵拜侍御史中丞除子鱄為郎令勸學省中其冬有日食之災嚴上封事曰臣聞日者衆陽之長食者陰侵之徵書曰無曠庶官天工人其代之言王者代天官人也故考績黜陟以明褒貶無功不黜則陰盛陵陽臣伏見方今刺史太守專州典郡不務奉事盡心為國而司察偏阿取與自己同則舉為尤異異則中以刑法不即垂頭塞耳採求財賂今益州刺史朱酺楊州刺史倪説涼州刺史尹業等每行考事輒有物故又選舉不實曾無貶坐是使臣下得作威福也故事州郡所舉上奏司直察能否以懲虛實今宜加防檢式遵前制舊丞相御史親治職事唯丙吉以年老優遊不案吏罪於是宰府習為常俗更共罔養以崇虛名或未曉其職便復遷徙誠非建官賦祿之意宜勑正百司各責以事州郡所舉必得其人若不如言裁以法令傳曰上德以寬服民其次莫如猛故火烈則人望而畏之水懦則人狎而玩之為政者寬以濟猛猛以濟寬如此綏御有體災眚消矣書奏帝納其言而免酺等官建初元年遷五官中郎將除三子為郎嚴數薦達賢能申解冤結多見納用復以五官中郎將行長樂衛尉事二年拜陳留太守嚴當之職乃言於帝曰昔顯親侯竇固誤先帝出兵西域置伊吾盧屯煩費無益又竇勳受誅其家不宜親近京師是時勳女為皇后竇氏方寵時有側聽嚴言者以告竇憲兄弟由是失權貴心嚴下車明賞罰發姦慝郡界清靜時京師訛言賊從東方來百姓奔走轉相驚動諸郡遑急各以狀聞嚴察其虛妄獨不為備詔書勑問使驛係道嚴固執無賊後卒如言典郡四年坐與宗正劉軼少府丁鴻等更相屬託徵拜太中大夫十餘日遷將作大匠七年復坐事免後既為竇氏所忌遂不復在位及帝崩竇太后臨朝嚴乃退居自守訓教子孫永元十年卒於家時年八十二弟敦官至虎賁中郎將嚴七子唯續融知名續字季則七歲能通論語十三明尚書十六治詩博觀羣籍善九章算術順帝時為護羌校尉遷度遼將軍所在有威恩稱融自有傳稜字伯威援之族孫也少孤依從兄毅共居業恩猶同産毅卒無子稜心喪三年建初中仕郡功曹舉孝廉及馬氏廢肅宗以稜行義徵拜謁者章和元年遷廣陵太守時穀貴民飢奏罷鹽官以利百姓賑貧羸薄賦稅興復陂湖溉田二萬餘頃吏民刻石頌之永元二年轉漢陽太守有威嚴稱大將軍竇憲西屯武威稜多奉軍費侵賦百姓憲誅坐抵罪後數年江湖多劇賊以稜為丹陽太守稜發兵掩擊皆禽滅之轉會稽太守治亦有聲轉河內太守永初中坐事抵罪卒于家贊曰伏波好功爰自冀隴南靜駱越西屠燒種徂年已流壯情方勇明德既升家祚以興廖乏三趣防遂驕陵
