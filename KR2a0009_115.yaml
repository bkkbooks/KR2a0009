body:
  text: 後漢書志第十五五行三大水水變色大寒雹冬雷山鳴魚孽蝗五行傳曰簡宗廟不禱祠廢祭祀逆天時則水不潤下謂水失其性而為災也又曰聽之不聰是謂不謀厥咎急厥罰恆寒厥極貧時則有鼓妖時則有魚孽時則有豕禍時則有耳痾時則有黑眚黑祥惟火沴水魚孽劉歆傳以為介蟲之孽謂蝗屬也和帝永元元年七月郡國九大水傷稼京房易傳曰顓事有知誅罰絶理厥災水其水也而雨殺人隕霜大風天黃飢而不損茲謂泰厥水水殺人辟遏有德茲謂狂厥水水流殺人已水則地生蟲歸獄不解茲謂追非厥水寒殺人追誅不解茲謂不理厥水五穀不收大敗不解茲謂皆陰厥水流入國邑隕霜殺穀是時和帝幼竇太后攝政其兄竇憲幹事及憲諸弟皆貴顯並作威暴虐嘗所怨恨輒任客殺之其後竇氏誅滅十二年六月潁川大水傷稼是時和帝幸鄧貴人陰有欲廢陰后之意陰后亦懷恚怨一曰先是恭懷皇后葬禮有闕竇太后崩後乃改殯梁后葬西陵徵舅三人皆為列侯位特進賞賜纍千金殤帝延平元年五月郡國三十七大水傷稼董仲舒曰水者陰氣盛也是時帝在襁抱鄧太后專政安帝永初元年冬十月辛酉河南新城山水暴出突壞民田壞處泉水出深三丈是時司空周章等以鄧太后不立皇太子勝而立清河王子故謀欲廢置十一月事覺章等被誅是年郡國四十一水出漂沒民人讖曰水者純陰之精也陰氣盛洋溢者小人專制權妒疾賢者依公結私侵乘君子小人席勝失懷得志故涌水為災二年大水三年大水四年大水五年大水六年河東池水變色皆赤如血是時鄧太后猶專政延光三年大水流殺民人傷苗稼是時安帝信江京樊豐及阿母王聖等讒言免太尉楊震廢皇太子質帝本初元年五月海水溢樂安北海溺殺人物是時帝幼梁太后專政桓帝建和二年七月京師大水去年冬梁冀枉殺故太尉李固杜喬三年八月京都大水是時梁太后猶專政永興元年秋河水溢漂害人物二年六月彭城泗水增長逆流永壽元年六月雒水溢至津陽城門漂流人物是時梁皇后兄冀秉政疾害忠直威權震主後遂誅滅延熹八年四月濟北河水清九年四月濟陰東郡濟北平原河水清襄楷上言河者諸侯之象清者陽明之徵豈獨諸侯有規京都計邪其明年宮車晏駕徵解犢亭侯為漢嗣即尊位是為孝靈皇帝永康元年八月六州大水勃海海溢沒殺人是時桓帝奢侈淫祀其十一月崩無嗣靈帝建寧四年二月河水清五月山水大出漂壞廬舍五百餘家熹平二年六月東萊北海海水溢出漂沒人物三年秋雒水出四年夏郡國三水傷害秋稼光和六年秋金城河溢水出二十餘里中平五年郡國六水大出獻帝建安二年九月漢水流害民人是時天下大亂十八年六月大水二十四年八月漢水溢流害民人庶徵之恆寒靈帝光和六年冬大寒北海東萊琅邪井中冰厚尺餘獻帝初平四年六月寒風如冬時和帝永元五年六月郡國三雨雹大如雞子是時和帝用酷吏周紆為司隸校尉刑誅深刻安帝永初元年雨雹二年雨雹大如雞子三年雨雹大如鴈子傷稼劉向以為雹陰脅陽也是時鄧太后以陰專陽政元初四年六月戊辰郡國三雨雹大如杅杯及雞子殺六畜延光元年四月郡國二十一雨雹大如雞子傷稼是時安帝信讒無辜死者多三年雨雹大如雞子桓帝延熹四年五月己卯京都雨雹大如雞子是時桓帝誅殺過差又寵小人七年五月己丑京都雨雹是時皇后鄧氏僭侈驕恣專幸明年廢以憂死其家皆誅靈帝建寧二年四月雨雹四年五月河東雨雹光和四年六月雨雹大如雞子是時常侍黃門用權中平二年四月庚戌雨雹傷稼獻帝初平四年六月右扶風雹如斗和帝元興元年冬十一月壬午郡國四冬雷是時皇子數不遂皆隱之民閒是歲宮車晏駕殤帝生百餘日立以為君帝兄有疾封為平原王卒皆夭無嗣殤帝延平元年九月乙亥陳留雷有石隕地四安帝永初六年十月丙戌郡六冬雷七年十月戊子郡國三冬雷元初元年十月癸巳郡國三冬雷三年十月辛亥汝南樂浪冬雷四年十月辛酉郡國五冬雷六年十月丙子郡國五冬雷永寧元年十月郡國七冬雷建光元年十月郡國七冬雷延光四年郡國十九冬雷是時太后攝政上無所與太后既崩阿母王聖及皇后兄閻顯兄弟更秉威權上遂不親萬機從容寬仁任臣下桓帝建和三年六月乙卯雷震憲陵寢屋先是梁太后聽兄冀枉殺李固杜喬靈帝熹平六年冬十月東萊冬雷中平四年十二月晦雨水大雷電雹獻帝初平三年五月丙申無雲而雷四年五月癸酉無雲而雷建安七八年中長沙醴陵縣有大山常大鳴如牛詬聲積數年後豫章賊攻沒醴陵縣殺略吏民靈帝熹平二年東萊海出大魚二枚長八九丈高二丈餘明年中山王暢任城王博並薨和帝永元四年蝗八年五月河內陳留蝗九月京都蝗九年蝗從夏至秋先是西羌數反遣將軍將北軍五校征之安帝永初四年夏蝗是時西羌寇亂軍衆征距連十餘年五年夏九州蝗六年三月去蝗處復蝗子生七年夏蝗元初元年夏郡國五蝗二年夏郡國二十蝗延光元年六月郡國蝗順帝永建五年郡國十二蝗是時鮮卑寇朔方用衆征之永和元年秋七月偃師蝗去年冬烏桓寇沙南用衆征之桓帝永興元年七月郡國三十二蝗是時梁冀秉政無謀憲苟貪權作虐二年六月京都蝗永壽三年六月京都蝗延熹元年五月京都蝗靈帝熹平六年夏七州蝗先是鮮卑前後三十餘犯塞是歲護烏桓校尉夏育破鮮卑中郎將田晏使胸奴中郎將臧旻將南單于以下三道並出討鮮卑大司農經用不足殷斂郡國以給軍糧三將無功還者少半光和元年詔策問曰連年蝗蟲至冬踊其咎焉在蔡雍對曰臣聞易傳曰大作不時天降災厥咎蝗蟲來河圖祕徵篇曰帝貪則政暴而吏酷酷則誅深必殺主蝗蟲蝗蟲貪苛之所致也是時百官遷徙皆私上禮西園以為府獻帝興平元年夏大蝗是時天下大亂建安二年五月蝗
