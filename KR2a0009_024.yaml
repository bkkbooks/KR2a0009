body:
  text: 後漢書卷二十二朱景王杜馬劉傅堅馬列傳第十二朱祐字仲先南陽宛人也少孤歸外家復陽劉氏往來舂陵世祖與伯升皆親愛之伯升拜大司徒以祐為護軍及世祖為大司馬討河北復以祐為護軍常見親幸舍止於中祐侍宴從容曰長安政亂公有日角之相此天命也世祖曰召刺姦收護軍祐乃不敢復言從征河北常力戰陷陳以為偏將軍封安陽侯世祖即位拜為建義大將軍建武二年更封堵陽侯冬與諸將擊鄧奉於淯陽祐軍敗為奉所獲明年奉破乃肉袒因祐降帝復祐位而厚加慰賜遣擊新野隨皆平之延岑自敗於穰遂與秦豐將張成合祐率征虜將軍祭遵與戰於東陽大破之臨陳斬成延岑敗走歸豐祐收得印綬九十七進擊黃郵降之賜祐黃金三十斤四年率破姦將軍侯進輔威將軍耿植代征南大將軍岑彭圍秦豐於黎丘破其將張康於蔡陽斬之帝自至黎丘使御史中丞李由持璽書招豐豐出惡言不肯降車駕引還勑祐方略祐盡力攻之明年夏城中窮困豐乃將其母妻子九人肉袒降祐轞車傳豐送洛陽斬之大司馬吳漢劾奏祐廢詔受降違將帥之任帝不加罪祐還與騎都尉臧宮會擊延岑餘黨陰酇筑陽三縣賊悉平之祐為人質直尚儒學將兵率衆多受降以克定城邑為本不存首級之功又禁制士卒不得虜掠百姓軍人樂放縱多以此怨之九年屯南行唐拒胸奴十三年增邑定封鬲侯食邑七千三百戶十五年朝京師上大將軍印綬因留奉朝請祐奏古者人臣受封不加王爵可改諸王為公帝即施行又奏宜令三公並去大名以法經典後遂從其議祐初學長安帝往候之祐不時相勞苦而先升講舍後車駕幸其第帝因笑曰主人得無捨我講乎以有舊恩數蒙賞賚二十四年卒子商嗣商卒子演嗣永元十四年坐從兄伯為外孫陰皇后巫蠱事免為庶人永初七年鄧太后紹封演子沖為鬲侯景丹字孫卿馮翊櫟陽人也少學長安王莽時舉四科丹以言語為固德侯相有幹事稱遷朔調連率副二更始立遣使者徇上谷丹與連率耿況降復為上谷長史王郎起丹與況共謀拒之況使丹與子弇及寇恂等將兵南歸世祖世祖引見丹等笑曰邯鄲將帥數言我發漁陽上谷兵吾聊應言然何意二郡良為吾來方與士大夫共此功名耳拜丹為偏將軍號奉義侯從擊王郎將兒宏等於南郎兵迎戰漢軍退卻丹等縱突騎擊大破之追奔十餘里死傷者從橫丹還世祖謂曰吾聞突騎天下精兵今乃見其戰樂可言邪遂從征河北世祖即位以讖文用平狄將軍孫咸行大司馬衆咸不悅詔舉可為大司馬者羣臣所推唯吳漢及丹帝曰景將軍北州大將是其人也然吳將軍有建大策之勳又誅苗幽州謝尚書其功大舊制驃騎將軍官與大司馬相兼也乃以吳漢為大司馬而拜丹為驃騎大將軍建武二年定封丹櫟陽侯帝謂丹曰今關東故王國雖數縣不過櫟陽萬戶邑夫富貴不歸故鄉如衣繡夜行故以封卿耳丹頓首謝秋與吳漢建威大將軍耿弇建義大將軍朱祐執金吾賈復偏將軍馮異強弩將軍陳俊左曹王常騎都尉臧宮等從擊破五校於羛陽降其衆五萬人會陝賊蘇況攻破弘農生獲郡守丹時病帝以其舊將欲令強起領郡事乃夜召入謂曰賊迫近京師但得將軍威重臥以鎮之足矣丹不敢辭乃力疾拜命將營到郡十餘日薨子尚嗣徙封余吾侯尚卒子苞嗣苞卒子臨嗣無子國絶永初七年鄧太后紹封苞弟遽為監亭侯王梁字君嚴漁陽安要陽人也為郡吏太守彭寵以梁守狐奴令與蓋延吳漢俱將兵南及世祖於廣阿拜偏將軍既拔邯鄲賜爵關內侯從平河北拜野王令與河內太守寇恂南拒洛陽北守天井關朱鮪等不敢出兵世祖以為梁功及即位議選大司空而赤伏符曰王梁主衛作玄武帝以野王衛之所徙玄武水神之名司空水土之官也於是擢拜梁為大司空封武強侯建武二年與大司馬吳漢等俱擊鄉有詔軍事一屬大司馬而梁輒發野王兵帝以其不奉詔勑令止在所縣而梁復以便宜進軍帝以梁前後違命大怒遣尚書宗廣持節軍中斬梁廣不忍乃檻車送京師既至赦之月餘以為中郎將行執金吾事北守箕關擊赤眉別校降之三年春轉擊五校追至信都趙國破之悉平諸屯聚冬遣使者持節拜梁前將軍四年春擊肥城文陽拔之進與驃騎大將軍杜茂擊佼彊蘇茂於楚沛閒拔大梁齧桑而捕虜將軍馬武偏將軍王霸亦分道並進歲餘悉平之五年從救桃城破龐萌等梁戰尤力拜山陽太守鎮撫新附將兵如故數月徵入代歐陽歙為河南尹梁穿渠引穀水注洛陽城下東寫鞏川及渠成而水不流七年有司劾奏之梁慙懼上書乞骸骨乃下詔曰梁前將兵征伐衆人稱賢故擢典京師建議開渠為人興利旅力既愆迄無成功百姓怨讟談者歡譁雖蒙寬宥猶執謙退君子成人之美其以梁為濟南太守十三年增邑定封封阜成侯十四年卒官子禹嗣禹卒子堅石嗣堅石追坐父禹及弟平與楚王英謀反𠫓廾市國除杜茂字諸公南陽冠軍人也初歸光武於河北為中堅將軍常從征伐世祖即位拜大將軍封樂鄉侯北擊五校於真定進降廣平建武二年更封苦陘侯與中郎將王梁擊五校賊於魏郡清河東郡悉平諸營保降其持節大將三十餘人三郡清靜道路流通明年遣使持節拜茂為驃騎大將軍擊沛郡拔芒時西防復反迎佼彊五年春茂率捕虜將軍馬武進攻西防數月拔之彊奔董憲東方既平七年詔茂引兵北屯田晉陽廣武以備胡寇九年與鴈門太守郭涼擊盧芳將尹由於繁畤芳將賈覽率胡騎萬餘救之茂戰軍敗引入樓煩城時盧芳據高柳與胸奴連兵數寇邊民帝患之十二年遣謁者段忠將衆郡薥刑配茂鎮守北邊因發邊卒築亭候修烽火又發委輸金帛繒絮供給軍士并賜邊民冠蓋相望茂亦建屯田驢車轉運先是鴈門人賈丹霍匡解勝等為尹由所略由以為將帥與共守平城丹等聞芳敗遂共殺由詣郭涼涼上狀皆封為列侯詔送委輸金帛賜茂涼軍吏及平城降民自是盧芳城邑稍稍來降涼誅其豪右郇氏之屬鎮撫羸弱旬月閒鴈門且平芳遂亡入胸奴帝擢涼子為中郎宿衛左右涼字公文右北平人也身長八尺氣力壯猛雖武將然通經書多智略尤曉邊事有名北方初幽州牧朱浮辟為兵曹掾擊彭寵有功封廣武侯十三年增茂邑更封修侯十五年坐斷兵馬稟縑使軍吏殺人免官削戶邑定封參蘧鄉侯十九年卒子元嗣永平十四年坐與東平王等謀反減死一等國除永初七年鄧太后紹封茂孫奉為安樂亭侯馬成字君遷南陽棘陽人也少為縣吏世祖徇潁川以成為安集掾調守郟令及世祖討河北成即𠫓廾官步負追及於滿蒲陽以成為期門從征伐世祖即位再遷護軍都尉建武四年拜揚武將軍督誅虜將軍劉隆振威將軍宋登射聲校尉王賞發會稽丹陽九江六安四郡兵擊李憲時帝幸壽春設壇場祖禮遣之進圍憲於舒令諸軍各深溝高壘憲數挑戰成堅壁不出守之歲餘至六年春城中食盡乃攻之遂屠舒斬李憲追擊其黨與盡平江淮地七年夏封平舒侯八年從征破隗囂以成為天水太守將軍如故冬徵還京師九年代來歙守中郎將率武威將軍劉尚等破河池遂平武都明年大司空李通罷以成行大司空事居府如真數月復拜揚武將軍十四年屯常山中山以備北邊并領建義大將軍朱祐營又代驃騎大將軍杜茂繕治障塞自西河至渭橋河上至安邑太原至井陘中山至鄴皆築保壁起烽燧十里一候在事五六年帝以成勤勞徵還京師邊人多上書求請者復遣成還屯及南單于保塞北方無事拜為中山太守上將軍印綬領屯兵如故二十四年南擊武溪蠻賊無功上太守印綬二十七年定封全椒侯就國三十二年卒子衛嗣衛卒子香嗣徙封棘陵侯香卒子豐嗣豐卒子玄嗣玄卒子邑嗣邑卒子醜嗣桓帝時以罪失國延熹二年帝復封成玄孫昌為益陽亭侯劉隆字元伯南陽安衆侯宗室也王莽居攝中隆父禮與安衆侯崇起兵誅莽事泄隆以年未七歲故得免及壯學於長安更始拜為騎都尉謁歸迎妻子置洛陽聞世祖在河內即追及於射犬以為騎都尉與馮異共拒朱鮪李軼等軼遂殺隆妻子建武二年封亢父侯四年拜誅虜將軍討李憲憲平遣隆屯田武當十一年守南郡太守歲餘上將軍印綬十三年增邑更封竟陵侯是時天下墾田多不以實又戶口年紀互有增減十五年詔下州郡檢核其事而刺史太守多不平均或優饒豪右侵刻羸弱百姓嗟怨遮道號呼時諸郡各遣使奏事帝見陳留吏牘上有書視之云潁川弘農可問河南南陽不可問帝詰吏由趣吏不肯服抵言於長壽街上得之帝怒時顯宗為東海公年十二在幄後言曰吏受郡勑當欲以墾田相方耳帝曰即如此何故言河南南陽不可問對曰河南帝城多近臣南陽帝鄉多近親田宅踰制不可為準帝令虎賁將詰問吏吏乃實首服如顯宗對於是遣謁者考實具知姦狀明年隆坐徵下獄其疇輩十餘人皆死帝以隆功臣特免為庶人明年復封為扶樂鄉侯以中郎將副伏波將軍馬援擊交址蠻夷徵側等隆別於禁溪口破之獲其帥徵二斬首千餘級降者二萬餘人還更封大國為長平侯及大司馬吳漢薨隆為驃騎將軍行大司馬事隆奉法自守視事八歲上將軍印綬罷賜養牛上樽酒十斛以列侯奉朝請三十年定封慎侯中元二年卒諡曰靖侯子安嗣傅俊字子衛潁川襄城人也世祖徇襄城俊以縣亭長迎軍拜為校尉襄城收其母弟宗族皆滅之從破王尋等以為偏將軍別擊京密破之遣歸潁川收葬家屬及世祖討河北俊與賓客十餘人北追及於邯鄲上謁世祖使將潁川兵常從征伐世祖即位以俊為侍中建武二年封昆陽侯三年拜俊積弩將軍與征南大將軍岑彭擊破秦豐因將兵徇江東揚州悉定七年卒諡曰威侯子昌嗣徙封蕪湖侯建初中遭母憂因上書以國貧不願之封乞錢五十萬為關內侯肅宗怒貶為關內侯竟不賜錢永初七年鄧太后復封昌子鐵為高置亭侯堅鐔字子伋潁川襄城人也為郡縣吏世祖討河北或薦鐔者因得召見以其吏能署主簿又拜偏將軍從平河北別擊破大槍於盧奴世祖即位拜鐔揚化將軍封強侯與諸將攻洛陽而朱鮪別將守東城者為反閒私約鐔晨開上東門鐔與建義大將軍朱祐乘朝而入與鮪大戰武庫下殺傷甚衆至旦食乃罷朱鮪由是遂降又別擊內黃平之建武二年與右將軍萬修徇南陽諸縣而堵鄉人董欣反宛城獲南陽太守劉驎鐔乃引軍赴宛選敢死士夜自登城斬關而入欣遂棄城走還堵鄉鄧奉復反新野攻破吳漢時萬修病卒鐔獨孤絶南拒鄧奉北當董欣一年閒道路隔塞糧饋不至鐔食蔬菜與士卒共勞苦每急輒先當矢石身被三創以此能全其衆及帝征南陽擊破欣奉以鐔為左曹常從征伐六年定封合肥侯二十六年卒子鴻嗣鴻卒子浮嗣浮卒子雅嗣馬武字子張南陽湖陽人也少時避讎客居江夏王莽末竟陵西陽三老起兵於郡界武往從之後入緑林中遂與漢軍合更始立以武為侍郎與世祖破王尋等拜為振威將軍與尚書令謝躬共攻王郎及世祖拔邯鄲請躬及武等置酒高會因欲以圖躬不剋既罷獨與武登叢臺從容謂武曰吾得漁陽上谷突騎欲令將軍將之何如武曰駑怯無方略世祖曰將軍久將習兵豈與我掾史同哉武由是歸心及謝躬誅死武馳至射犬降世祖見之甚悅引置左右每勞饗諸將武輒起斟酌於前世祖以為歡復使將其部曲至鄴武叩頭辭以不願世祖愈美其意因從擊羣賊世祖擊尤來五幡等敗於慎水武獨殿還陷陳故賊不得迫及進至安定次小廣陽武常為軍鋒力戰無前諸將皆引而隨之故遂破賊窮追至平谷浚靡而還世祖即位以武為侍中騎都尉封山都侯建武四年與虎牙將軍蓋延等討劉永武別擊濟陰下成武楚丘拜捕虜將軍明年龐萌反攻桃城武先與戰破之會車駕至萌遂敗走六年夏與建威大將軍耿弇西擊隗囂漢軍不利引下隴囂追急武選精騎還為後拒身被甲持戟奔擊殺數千人囂兵乃退諸軍得還長安十三年增邑更封鄃侯將兵北屯下曲陽備胸奴坐殺軍吏受詔將妻子就國武徑詣洛陽上將軍印綬削戶五百定封為楊虛侯因留奉朝請帝後與功臣諸侯宴語從容言曰諸卿不遭際會自度爵祿何所至乎高密侯鄧禹先對曰臣少嘗學問可郡文學博士帝曰何言之謙乎卿鄧氏子志行修整何為不掾功曹餘各以次對至武曰臣以武勇可守尉督盜賊帝笑曰且勿為盜賊自致亭長斯可矣武為人啫酒闊達敢言時醉在御前面折同列言其短長無所避忌帝故縱之以為笑樂帝雖制御功臣而每能回容宥其小失遠方貢珍甘必先遍賜列侯而太官無餘有功輒增邑賞不任以吏職故皆保其福祿終無誅譴者二十五武以中郎將將兵擊武陵蠻夷還上印綬顯宗初西羌寇隴右覆軍殺將朝廷患之復拜武捕虜將軍以中郎將王豐副與監軍使者竇固右輔都尉陳欣將烏桓黎陽營三輔募士涼州諸郡羌胡兵及弛刑合四萬人擊之到金城浩亹與羌戰斬首六百級又戰於洛都谷為羌所敗死者千餘人羌乃率衆引出塞武復追擊到東西邯大破之斬首四千六百級獲生口千六百人餘皆降散武振旅還京師增邑七百戶并前千八百戶永平四年卒子嗣坐兄伯濟與楚王英黨顏忠謀反國除永初七年鄧太后紹封武孫震為漻亭侯震卒子側嗣論曰中興二十八將前世以為上應二十八宿未之詳也然咸能感會風雲奮其智勇稱為佐命亦各志能之士也議者多非光武不以功臣任職至使英姿茂績委而勿用然原夫深圖遠算固將有以焉爾若乃王道既衰降及霸德猶能授受惟庸勳賢皆序如管隰之迭升桓世先趙之同列文朝可謂兼通矣降自秦漢世資戰力至於翼扶王運皆武人屈起亦有鬻繒屠狗輕猾之徒或崇以連城之賞或任以阿衡之地故藝疑則隙生力侔則亂起蕭樊且猶縲紲信越終見葅戮不其然乎自茲以降迄于孝武宰輔五世莫非公侯遂使縉紳道塞賢能蔽壅朝有世及之私下多抱關之怨其懷道無聞委身草莽者亦何可勝言故光武鑒前事之違存矯枉之志雖寇鄧之高勳耿賈之鴻烈分土不過大縣數四所加特進朝請而已觀其治平臨政課職責咎將所謂導之以政齊之以刑者乎若格之功臣其傷已甚何者直繩則虧喪恩舊橈情則違廢禁典選德則功不必厚舉勞則人或未賢參任則羣心難塞並列則其敝未遠不得不校其勝否即以事相權故高秩厚禮允答元功峻文深憲責成吏職建武之世侯者百餘若夫數公者則與參國議分均休咎其餘並優以寬科完其封祿莫不終以功名延慶于後昔留侯以為高祖悉用蕭曹故人而郭伋亦譏南陽多顯鄭興又戒功臣專任夫崇恩偏授易啓私溺之失至公均被必廣招賢之路意者不其然乎永平中顯宗追感前世功臣乃圖畫二十八將於南宮雲臺其外又有王常李通竇融卓茂合三十二人故依其本弟係之篇末以志功臣之次云爾太傅高密侯鄧禹中山太守全椒侯馬成大司馬廣平侯吳漢河南尹阜成侯王梁左將軍膠東侯賈復琅邪太守祝阿侯陳俊建威大將軍好畤侯耿弇驃騎大將軍參蘧侯杜茂執金吾雍奴侯寇恂積弩將軍昆陽侯傅俊征南大將軍舞陽侯岑彭左曹合肥侯堅鐔征西大將軍陽夏侯馮異上谷太守淮陽陵侯王霸建義大將軍鬲侯朱祐信都太守阿陵侯任光征虜將軍潁陽侯祭遵豫章太守中水侯李忠驃騎大將軍櫟陽侯景丹右將軍槐里侯萬修虎牙大將軍安平侯蓋延太常靈壽侯邳彤衛尉安成侯銚期驍騎將軍昌成侯劉植東郡太守東光侯耿純橫野大將軍山桑侯王常城門校尉朗陵侯臧宮大司空固始侯李通捕虜將軍楊虛侯馬武大司空安豐侯竇融驃騎將軍慎侯劉隆太傅宣德侯卓茂贊曰帝績思庸功是存有來羣后捷我戎軒婉孌龍姿儷景同翻
