body:
  text: 後漢書志第十二天文下桓三十八靈二十獻九隕石孝桓建和元年八月壬寅熒惑犯輿鬼質星二年二月辛卯熒惑行在輿鬼中三年五月己丑太白行入太微右掖門留十五日出端門丙申熒惑入東井八月己亥鎮星犯輿鬼中南星乙丑彗星芒長五尺見天巿中東南指色黃白九月戊辰不見熒惑犯輿鬼為死喪質星為戮臣入太微為亂臣鎮星犯輿鬼為喪彗星見天巿中為質貴人至和平元年十二月甲寅梁太后崩梁冀益驕亂矣元嘉元年二月戊子太白晝見永興二年閏月丁酉太白晝見時上幸後宮采女鄧猛明年封猛兄演為南頓侯後四歲梁皇后崩梁冀被誅猛立為皇后恩寵甚盛永壽元年三月丙申鎮星逆行入太微中七十四日去左掖門七月己未辰星入太微中八十日去左掖門八月己巳熒惑入太微二十一日出端門太微天子廷也鎮星為貴臣妃后逆行為匿謀辰星入太微為大水一曰後宮有憂是歲雒水溢至津門南陽大水熒惑留入太微中又為亂臣是時梁氏專政九月己酉晝有流星長二尺所色黃白癸巳熒惑犯歲星為姦臣謀大將戮二年六月甲寅辰星入太微遂伏不見辰星為水為兵為妃后八月戊午太白犯軒轅大星為皇后其三年四月戊寅熒惑入東井口中為大臣有誅者其七月丁丑太白犯心前星為大臣後二年四七月懿獻皇后以憂死大將軍梁冀使太倉令秦宮刺殺議郎邴尊又欲殺鄧后母宣事覺桓帝收冀及妻壽襄城君印綬皆自殺誅諸梁及孫氏宗族或徙邊是其應也延熹四年三月甲寅熒惑犯輿鬼質星五月辛酉客星在營室稍順行生芒長五尺所至心一度轉為彗熒惑犯輿鬼質星大臣有戮死者五年十月南郡太守李肅坐蠻夷賊攻盜郡縣取財一億以上入府取銅虎符肅背敵走不救城郭又監黎陽謁者燕喬坐贓重泉令彭良殺無辜皆棄巿京兆虎牙都尉宋謙坐贓下獄死客星在營室至心作彗為大喪後四年鄧后以憂死六年十一月丁亥太白晝見是時鄧后家貴盛七年七月戊辰辰星犯歲星八月庚戌熒惑犯輿鬼質星庚申歲星犯軒轅大星十月丙辰太白犯房北星丁卯辰星犯太白十二月乙丑熒惑犯軒轅第二星辰星犯歲星為兵熒惑犯質星有戮臣歲星犯軒轅為女主憂太白犯房北星為後宮其八年二月太僕南鄉侯左勝以罪賜死勝弟中常侍上蔡侯悺北鄉侯黨皆自殺癸亥皇后鄧氏坐執左道廢遷于祠桐宮死宗親侍中沘陽侯鄧康河南尹鄧萬越騎校尉鄧弼虎賁中郎將安鄉陽侯鄧魯會侍中監羽林左騎鄧德右騎鄧壽昆陽侯鄧統淯陽侯鄧秉議郎鄧循皆繫暴室萬魯會死康等免官又荊州刺史芝交址刺史葛祗皆為賊所拘略桂陽太守任胤背敵走皆𠫓廾巿熒惑犯輿鬼質星之應也八年五月癸酉太白犯輿鬼質星壬午熒惑入太微右執法閏月己未太白犯心前星十月癸酉歲星犯左執法十一月戊午歲星入太微犯左執法九年正月壬辰歲星入太微中五十八日出端門六月壬戌太白行入輿鬼七月乙未熒惑行輿鬼中犯質星九月辛亥熒惑入太微西門積五十八日永康元年正月庚寅熒惑逆行入太微東門留太微中百一日出端門七月丙戌太白晝見經天太白犯心前星太白犯輿鬼質星有戮臣熒惑入太微為賊臣太白犯心前星為兵喪歲星入太微犯左執法將相有誅者歲星入守太微五十日占為人主太白熒惑入輿鬼皆為死喪又犯質星為戮臣熒惑留太微中百一日占為人主太白晝見經天為兵憂在大人其九年十一月太原太守劉南陽太守成皆坐殺無辜荊州刺史李隗為賊所拘尚書郎孟璫坐受金漏言皆𠫓廾巿永康元年十二月丁丑桓帝崩太傅陳蕃大將軍竇武尚書令尹勳黃門令山冰等皆枉死太白犯心熒惑留守太微之應也孝靈帝建寧元年六月太白在西方入太微犯西蕃南頭星太微天廷也太白行其中宮門當閉大將被甲兵大臣伏誅其八月太傅陳蕃大將軍竇武謀欲盡誅諸宦者其九月辛亥中常侍曹節長樂五官史朱瑀覺之矯制殺蕃武等家屬徙日南比景熹平元年十月熒惑入南斗中占曰熒惑所守為兵亂斗為吳其十一月會稽賊許昭聚衆自稱大將軍昭父生為越王攻破郡縣二年四月有星出文昌入紫宮蛇行有首尾無身赤色有光照垣牆八月丙寅太白犯心前星辛未白氣如一匹練衝北斗第四星占曰文昌為上將貴相太白犯心前星為大臣後六年司徒劉羣郃為中常侍曹節所譖下獄死白氣衝北斗為大戰明年冬揚州刺史臧旻丹陽太守陳寅攻盜賊苴康斬首數千級光和元年四月癸丑流星犯軒轅第二星東北行入北斗魁中八月彗星出亢北入天巿中長數尺稍長至五六丈赤色經歷十餘宿八十餘日乃消於天菀中流星為貴使軒轅為內宮北斗魁主殺流星從軒轅出抵北斗魁是天子大使將出有伐殺也至中平元年黃巾賊起上遣中郎將皇甫嵩朱俊等征之斬首十餘萬級彗除天巿天帝將徙帝將易都至初平元年獻帝遷都長安三年冬彗星出狼弧東行至于張乃去張為周地彗星犯之為兵亂後四年京都大發兵擊黃巾賊五年四月熒惑在太微中守屏七月彗星出三台下東行入太微至太子幸臣二十餘日而消十月歲星熒惑太白三合於虛相去各五六寸如連珠占曰熒惑在太微為亂臣是時中常侍趙忠張讓郭勝孫璋等並為姦亂彗星入太微天下易主至中平六年宮車晏駕歲星熒惑太白三合於虛為喪虛齊也地明年琅邪王據薨光和中國皇星東南角去地一二丈如炬火狀十餘日不見占曰國皇星為內亂外內有兵喪其後黃巾賊張角燒州郡朝廷遣將討平斬首十餘萬級中平六年宮車晏駕大將軍何進令司隸校尉袁紹私募兵千餘人陰跱雒陽城外竊呼并州牧董卓使將兵至京都共誅中官對戰南北宮闕下死者數千人燔燒宮室遷都西京及司徒王允與將軍呂布誅卓卓部曲將郭汜李傕旋兵攻長安公卿百官吏民戰死者且萬人天下之亂皆自內發中平二年十月癸亥客星出南門中大如半筵五色喜怒稍小至後年六月消占曰為兵至六年司隸校尉袁紹誅滅中官大將軍部曲將吳匡攻殺車騎將軍何苗死者數千人三年四月熒惑逆行守心後星十月戊午月食心後星占曰為大喪後三年而靈帝崩五年二月彗星出奎逆行入紫宮後三出六十餘日乃消六月丁卯客星如三升碗出貫索西南行入天市至尾而消占曰彗除紫宮天下易主客星入天市為貴人喪明年四月宮車晏駕中平中夏流星赤如火長三丈起河鼓入天市抵觸宦者星色白長二三丈後尾再屈食頃乃滅狀似枉矢占曰枉矢流發其宮射所謂矢當直而枉者操矢者邪枉人也中平六年大將軍何進謀盡誅中官中官覺於省中殺進俱兩破滅天下由此遂大壞亂六年八月丙寅太白犯心前星戊辰犯心中大星其日未冥四刻大將軍何進於省中為諸黃門所殺己巳車騎將軍何苗為進部曲將吳匡所殺孝獻初平三二年九月蚩尤旗見長十餘丈色白出角亢之南占曰蚩尤旗見則王征伐四方其後丞相曹公征討天下且三十年四年十月孛星出兩角間東北行入天市中而滅占曰彗除天市天帝將徙帝將易都是時上在長安後二年東遷明年七月至雒陽其八月曹公迎上都許建安五年十月辛亥有星孛于大梁冀州分也時袁紹在冀州其年十一月紹軍為曹公所破七年夏紹死後曹公遂取冀州九年十一月有星孛于東井輿鬼入軒轅太微十一年正月星孛于北斗首在斗中尾貫紫宮及北辰占曰彗星掃太微宮人主易位其後魏文帝受禪十二年十月辛卯有星孛于鶉尾荊州分也時荊州牧劉表據荊州時益州從事周羣以為荊州牧將死而失土明年秋表卒以小子琮自代曹公將伐荊州琮懼舉軍詣公降十七年十二月有星孛于五諸侯周羣以為西方專據土地者皆將失土是時益州牧劉璋據益州漢中太守張魯別據漢中韓遂據涼州宋宗建別據枹罕明年冬曹公遣偏將擊涼州十九年獲宋宗建韓遂逃于羌中病死其年秋璋失益州二十年秋曹公攻漢中魯降十八年秋歲星鎮星熒惑俱入太微逆行留守帝坐百餘日占曰歲星入太微人主改二十三年三月孛星晨見東方二十餘日夕出西方犯歷五車東井五諸侯文昌軒轅后妃太微鋒炎指帝坐占曰除舊布新之象也殤帝延平元年九月乙亥隕石陳留四春秋僖公十六年隕石于宋五傳曰隕星也董仲舒以為從高反下之象或以為庶人惟星隕民困之象也桓帝延熹七年三月癸亥隕石右扶風一鄠又隕石二皆有聲如雷
