body:
  text: 後漢書志第二十九輿服上玉輅乘輿金根安車立車耕車戎車獵車軿車青蓋車緑車皂蓋車夫人安車大駕法駕小駕輕車大使車小使車載車導從車車馬飾書曰明試以功車服以庸言昔者聖人興天下之大利除天下之大害躬親其事身履其勤憂之勞之不避寒暑使天下之民物各得安其性命無夭昏暴陵之災是以天下之民敬而愛之若親父母則而養之若仰日月夫愛之者欲其長久不憚力役相與起作宮室上棟下宇以雍覆之欲其長久也敬之者欲其尊嚴不憚勞煩相與起作輿輪旌旗章表以尊嚴之斯愛之至敬之極也苟心愛敬雖報之至情由未盡或殺身以為之盡其情也奕世以祀之明其功也是以流光與天地比長後世聖人知恤民之憂思深大者必饗其樂勤仁育物使不夭折者必受其福故為之制禮以節之使夫上仁繼天統物不伐其功民物安逸若道自然莫知所謝老子曰聖人不仁以百姓為芻狗此之謂也夫禮服之興也所以報功章德尊仁尚賢故禮尊尊貴貴不得相踰所以為禮也非其人不得服其服所以順禮也順則上下有序德薄者退德盛者縟故聖人處乎天子之位服玉藻邃延日月升龍山車金根飾黃屋左纛所以副其德章其功也賢仁佐聖封國愛受民黼黻文繡降龍路車所以顯其仁光其能也及其季末聖人不得其位賢者隱伏是以天子微弱諸侯脅矣於此相貴以等相讟以貨相賂以利天下之禮亂矣至周夷王下堂而迎諸侯此天子失禮微弱之始也自是諸侯宮縣樂食祭以白牡擊玉礊朱干設鍚冕而大武大夫臺門旅樹反坫繡黼丹朱中衣鏤簋朱紘此大夫之僭諸侯禮也詩刺彼己之子不稱其服傷其敗化易譏負且乘致寇至言小人乘君子器盜思奪之矣自是禮制大亂兵革並作上下無法諸侯陪臣山楶藻降及戰國奢僭益熾削滅禮籍蓋惡有害己之語競修奇麗之服飾以輿馬文罽玉纓象鑣金鞍以相夸上爭錐刀之利殺人若刈草然其宗祀亦旋夷滅榮利在己雖死不悔及秦并天下攬其輿服上選以供御其次以錫百官漢興文學既缺時亦草創承秦之制後稍改定參稽六經近於雅正孔子曰其或繼周者行夏之正乘殷之輅服周之冕樂則韶舞故撰輿服著之于篇以觀古今損益之義云上古聖人見轉蓬始知為輪輪行可載因物知生復為之輿輿輪相乘流運罔極任重致遠天下獲其利後世聖人觀於天視斗周旋魁方杓曲以攜龍角為帝車於是乃曲其輈乘牛駕馬登險赴難周覽八極故易震乘乾謂之大壯言器莫能有上之者也自是以來世加其飾至奚仲為夏車正建其斿旐尊卑上下各有等級周室大備官有六職百工與居一焉一器而羣工致巧者車最多是故具物以時六材皆良輿方法地蓋圓象天三十輻以象日月蓋弓二十八以象列星龍旗九斿七仞齊軫以象大火鳥旟七斿五仞齊較以象鶉火熊旗六斿五仞齊肩以象參伐龜旐四斿四仞齊首以象營室弧旌枉矢以象弧也此諸侯以下之所建者也天子五玉路以玉為飾錫鍚樊纓十有再就建太常十有二斿九仞曳地日月升龍象天明也夷王以下周室衰弱諸侯大路秦并天下閲三代之禮或曰殷瑞山車金根之色漢承秦制御為乘輿所謂孔子乘殷之路者也乘輿金根安車立車輪皆朱班重牙二轂兩轄金薄繆龍為輿倚較文虎伏軾龍首銜軛左右吉陽筒鸞雀立衡文畫輈羽蓋華蚤建大旗十有二斿畫日月升龍駕六馬象鑣鏤錫鍚金鍐鋄方釳插翟尾朱兼樊纓赤罽易茸金就十有二左纛以氂牛尾為之在左騑馬軛上大如斗是為德車五時車安立亦皆如之各如方色馬亦如之白馬者朱其髦尾為朱鬣云所御駕六餘皆駕四後從為副車耕車其飾皆如之有三蓋一曰芝車置耒耜之箙上親耕所乘也戎車其飾皆如之蕃以矛麾金鼓羽析幢翳胄甲弩之箙獵車其飾皆如之重輞縵輪繆龍繞之一曰闟豬車親校獵乘之太皇太后皇太后法駕皆御金根加交路絡帳裳非法駕則乘紫罽軿車雲文畫輈黃金塗五末蓋蚤左右騑駕三馬長公主赤罽軿車大貴人貴人公主王妃封君油畫軿車大貴人加節畫輈皆右騑而已皇太子皇子皆安車朱班輪青蓋金華蚤黑文畫轓文輈金塗五末皇子為王錫以乘之故曰王青蓋車皇孫則緑車以從皆左右騑駕三公列侯安車朱班輪倚鹿較伏熊軾皂繒蓋黑轓右騑中二千石二千石皆皂蓋朱兩轓其千石六百石朱左轓轓長六尺下屈廣八寸上業廣尺二寸九文十二初後謙一寸若月初生示不敢自滿也景帝中元五年始詔六百石以上施車轓得銅五末軛有吉陽筒中二千石以上右騑三百石以上皂布蓋千石以上皂繒覆蓋二百石以下白布蓋皆有四維杠衣賈人不得乘馬車除吏赤畫杠其餘皆青云公列侯中二千石二千石夫人會朝若蠶各乘其夫之安車右騑加交路絡帷裳皆皂非公會不得乘朝車得乘漆布輜軿車銅五末乘輿大駕公卿奉引太僕御大將軍參乘屬車八十一乘備千乘萬騎西都行祠天郊甘泉備之官有其注名曰甘泉鹵簿東都唯大行乃大駕大駕太僕校駕法駕黃門令校駕乘輿法駕八公卿不在鹵簿中河南尹執金吾雒陽令奉引奉車郎御侍中參乘屬車十六乘前驅有九斿雲罕鳳皇闟戟皮軒鸞旗皆大夫載鸞旗者編羽旄列繫幢旁民或謂之雞翹非也後有金鉦黃鉞黃門鼓車古者諸侯二車九乘秦滅九國兼其車服故大駕屬車八十一乘法駕半之屬車皆皂蓋赤𩹉木朱轓戈矛弩箙尚書御史所載最後一車懸豹尾豹尾以前比省中行祠天郊以法駕祠地明堂省什三祠宗廟尤省謂之小駕每出太僕奉駕上鹵簿中常侍小黃門副尚書主者郎令史副侍御史蘭臺令史副皆執注以督整車騎謂之護駕春秋上陵尤省於小駕直事尚書一人從其餘令以下皆先行後罷輕車古之戰車也洞朱輪輿不巾不蓋建矛戟幢麾輒弩服藏在武庫大駕法駕出射聲校尉司馬史吏士載以次屬車在鹵簿中諸車有矛戟其飾幡斿旗幟皆五采制度從周禮吳孫兵法云有巾有蓋謂之武剛車武剛車者為先驅又為屬車輕車為後殿焉大使車立乘駕駟赤帷持節者重導從賊曹車斧車督車功曹車皆兩大車伍伯璅弩十二人辟車四人從車四乘無節單導從減半小使車不立乘有騑赤屏泥油重絳帷導無斧車近小使車蘭輿赤轂白蓋赤帷從騶騎四十人此謂追捕考案有所勑取者之所乘也諸使車皆朱班輪四輻赤衡軛其送葬白堊已下灑車而後還公卿中二千石二千石郊廟明堂祠陵法出皆大車立乘駕駟他出乘安車大行載車其飾如金根車加施組連璧交絡四角金龍首銜璧垂五采析羽流蘇前後雲氣畫帷裳文畫曲轓長懸車等太僕御駕六布施馬布施馬者淳白駱馬也以黑藥灼其身為虎文既下馬斥賣車藏城北祕宮皆不得入城門當用太僕考工乃內飾治禮吉凶不相干也公卿以下至縣三百石長導從置門下五吏賊曹督盜賊功曹皆帶劒三車導主簿主記兩車為從縣令以上加導斧車公乘安車則前後并馬立乘長安雒陽令及王國都縣加前後兵車亭長設右騑駕兩璅弩車前伍伯公八人中二千石二千石六百石皆四人自四百石以下至二百石皆二人黃綬武官伍伯文官辟車鈴下侍閣門蘭部署街里走卒皆有程品多少隨所典領驛馬三十里一置卒皆赤幘絳韝云古者軍出師旅皆從秦省其卒取其師旅之名焉公以下至二千石騎吏四人千石以下至三百石縣長二人皆帶劒持棨戟為前列揵弓韣九鞬諸侯王法駕官屬傅相以下皆備鹵簿似京都官騎張弓帶鞬遮迾出入稱課促列侯家丞庶子導從若會耕祠主縣假給辟車鮮明卒備其威儀導從事畢皆罷所假諸車之文乘輿倚龍伏虎文畫輈龍首鸞衡重牙班輪升龍飛軨皇太子諸侯王倚虎伏鹿文畫輈轓吉陽筒朱班輪鹿文飛軨旗旗九斿降龍公列侯倚鹿伏熊黑轓朱班輪鹿文飛軨九斿降龍卿朱兩轓五斿降龍二千石以下各從科品諸轓車以上軛皆有吉陽筒諸馬之文案乘輿金鍐鋄方釳插翟象鑣龍畫沫升龍赤扇汗青兩翅尾駙馬左右赤珥流蘇飛鳥節赤膺兼皇太子或亦如之王公列侯鏤錫義鍚文髦朱鑣朱鹿朱文絳扇汗青翅尾卿以下有騑者緹扇汗青翅尾當盧義文髦上下皆通中二千石以上及使者乃有騑駕云
