body:
  text: 後漢書志第二十一郡國三陳留東郡東平任城泰山濟北山陽濟陰右兗州東海琅邪彭城廣陵下邳右徐州陳留郡武帝置雒陽東五百三十里十七城戶十七萬七千五百二十九口八十六萬九千四百三十三陳留有鳴鴈亭浚儀本大梁尉氏雍丘本嵵國襄邑有滑亭有承匡城外黃有葵丘聚齊桓公會此城中有曲棘里有繁陽城小黃東昏濟陽平丘有臨濟亭田儋死此有匡有黃池亭封丘有桐牢亭或曰古蟲牢酸棗長垣侯國有匡城有蒲城有祭城己吾有大棘鄉有首鄉考城故菑章帝更名故屬梁圉故屬淮陽有高陽亭扶溝故屬淮陽濮陽古昆吾國春秋時曰濮有鹹城或曰古鹹國有清丘有鉏城燕本南燕國有雍鄉有胙城古胙國有平陽亭有瓦亭有桃城白馬有韋鄉頓丘東阿有清亭東武陽濕水出范有秦亭臨邑有沛泲廟博平聊城有夷儀聚有聶戚城發干樂平侯國故清章帝更名陽平侯國有莘亭有岡成城衛公國本觀故國姚姓光武更名有河牧城有竿城穀城春秋時小穀有巂下聚十四萬八千二百七十無鹽本宿國任姓有章城東平陸六國時曰平陸有闞亭有堂陽亭富成章壽張春秋曰良漢曰壽良光武改曰壽張有堂聚故聚屬東郡須昌故屬東郡有致密城古中都有陽穀城寧陽故屬泰山九萬四千一百五十六任城本任國有桃聚亢父樊奉高有明堂武帝造博有泰山廟岱山在西北有龜山有龍鄉城梁甫侯國有菟裘聚巨平侯國有亭禪山有陽關亭嬴有鐵山茌侯國萊蕪有原山潘水出蓋沂水出南武陽侯國有顓臾城南城故屬東海有東陽城費侯國故屬東海有祊亭有台亭牟故國十三萬五千八百九十七盧有平陰城有防門有光里有景茲山有敖山有清亭有長城至東海蛇丘有遂鄉有下歡亭有鑄鄉城成本國茌平本屬東郡剛十一昌邑刺史治有梁丘城有甲父亭東緡春秋時曰緡巨野有大野澤高平侯國故橐章帝更名有茅鄉城湖陸故湖陵章帝更名南平陽侯國有漆亭有閭丘亭方與有武唐亭魯侯觀魚臺有泥母亭或曰古寧母瑕丘金鄉防東千五百五十四定陶本曹國古陶堯所居有三鬷亭冤句有棗城成陽有堯冢靈臺有雷澤乘氏侯國有泗水有鹿城鄉句陽有垂亭鄄城離狐故屬東郡廩丘故屬東郡有高魚城有運城單父侯國故屬山陽成武故屬山陽有郜城己氏故屬梁十六郯本國刺史治蘭陵有次室亭戚朐有鐵有伊盧鄉襄賁昌慮有藍鄉承陰平利城合城鄉祝其有羽山春秋時曰祝其夾谷地厚丘贛榆本屬琅邪建初五年復十七萬九百六十七開陽故屬東海建初五年屬東武琅邪東莞有鄆亭有邳鄉有公來山或曰古浮來西海諸莒本國故屬城陽有鐵有崢嶸谷東安故屬城陽陽都故屬城陽有牟臺臨沂故屬東海有叢亭即丘侯國故屬東海春秋曰祝丘繒侯國故屬東海有概亭姑幕彭城有鐵武原傅陽有柤水呂留梧菑丘廣戚故屬沛國戶八萬三千九百七口四十一萬百九十廣陵有東陵亭江都有江水祠高郵平安淩故屬泗水東陽故屬臨淮有長洲澤吳王濞太倉在此射陽故屬臨淮鹽瀆故屬臨淮輿侯國故屬臨淮堂邑故屬臨淮有鐵春秋時曰堂海西故屬東海下邳本屬東海葛嶧山本嶧陽山有鐵徐本國有樓亭或曰古蔞林僮侯國睢陵下相淮陰淮浦盱台高山潘旌淮陵取慮有蒲姑陂東成曲陽侯國故屬東海司吾侯國故屬東海良成故屬東海春秋時曰良夏丘故屬沛
