body:
  text: 後漢書卷二十六伏侯宋蔡馮趙牟韋列傳第十六伏湛子隆伏湛字惠公琅邪東武人也九世祖勝字子賤所謂濟南伏生者也湛高祖父孺武帝時客授東武因家焉父理為當世名儒以詩授成帝為高密太傅別自名學湛性孝友少傳父業教授數百人成帝時以父任為博士弟子五遷至王莽時為繡衣執法使督大姦遷後隊屬正更始立以為平原太守時倉卒兵起天下驚擾而湛獨晏然教授不廢謂妻子曰夫一穀不登國君徹膳今民皆飢奈何獨飽乃共食麤糲悉分奉祿以賑鄉里來客者百餘家時門下督素有氣力謀欲為湛起兵湛惡其惑衆即收斬之徇首城郭以示百姓於是吏人信向郡內以安平原一境湛所全也光武即位知湛名儒舊臣欲令幹任內職徵拜尚書使典定舊制時大司徒鄧禹西征關中帝以湛才任宰相拜為司直行大司徒事車駕每出征伐常留鎮守總攝羣司建武三年遂代鄧禹為大司徒封陽都侯時彭寵反於漁陽帝欲自征之湛上疏諫曰臣聞文王受命而征伐五國必先詢之同姓然後謀於羣臣加占蓍龜以定行事故謀則成卜則吉戰則勝其詩曰帝謂文王詢爾仇方同爾弟兄以爾鉤援與爾臨以伐崇庸崇國城守先退後伐所以重人命俟時而動故參分天下而有其二陛下承大亂之極受命而帝興明祖宗出入四年而滅鄉制五校降銅馬破赤眉誅鄧奉之屬不為無功今京師空匱資用不足未能服近而先事邊外且漁陽之地逼接北狄黠虜困迫必求其助又今所過縣邑尤為困乏種麥之家多在城郭聞官兵將至當已收之矣大軍遠涉二千餘里士馬罷勞轉糧艱阻今兗豫青冀中國之都而寇賊從橫未及從化漁陽以東本備邊塞地接外虜貢稅微薄安平之時尚資內郡況今荒耗豈足先圖而陛下捨近務遠棄易求難四方疑怪百姓恐懼誠臣之所惑也復願遠覽文王重兵博謀近思征伐前後之宜顧問有司使極愚誠采其所長擇之聖慮以中土為憂念帝覽其奏竟不親征時賊徐異卿等萬餘人據富平連攻之不下唯云願降司徒伏公帝知湛為青徐所信向遣到平原異卿等即日歸降護送洛陽湛雖在倉卒造次必於文德以為禮樂政化之首顛沛猶不可違是歲奏行鄉飲酒禮遂施行也其冬車駕征張步留湛居守時蒸祭高廟而河南尹司隸校尉於廟中爭論湛不舉奏坐策免六年徙封不其侯邑三千六百戶遣就國後南陽太守杜詩上疏薦湛曰臣聞唐虞以股肱康文王以多士寧是故詩稱濟濟書曰良哉臣詩竊見故大司徒陽都侯伏湛自行束脩訖無毀玷篤信好學守死善道經為人師行為儀表前在河內朝歌及居平原吏人畏愛則而象之遭時反覆不離兵凶秉節持重有不可奪之志陛下深知其能顯以宰相之重衆賢百姓仰望德義微過斥退久不復用有識所惜儒士痛心臣竊傷之湛容貌堂堂國之光暉智略謀慮朝之淵藪髫髮厲志白首不衰實足以先後王室名足以光示遠人古者選擢諸侯以為公卿是故四方回首仰望京師柱石之臣宜居輔弼出入禁門補缺拾遺臣詩愚戇不足以知宰相之才竊懷區區敢不自竭臣前為侍御史上封事言湛公廉愛下好惡分明累世儒學素持名信經明行修通達國政尤宜近侍納言左右舊制九州五尚書令一郡二人可以湛代頗為執事所非但臣詩蒙恩深渥所言誠有益於國雖死無恨故復越職觸冒以聞十三年夏徵勑尚書擇拜吏日未及就位因讌見中暑病卒賜祕器帝親弔祠遣使者送喪脩冢二子隆翕翕嗣爵卒子光嗣光卒子晨嗣晨謙敬博愛好學尤篤以女孫為順帝貴人奉朝請位特進卒子無忌嗣亦傳家學博物多識順帝時為侍中屯騎校尉永和元年詔無忌與議郎黃景校定中書五經諸子百家蓺術元嘉中桓帝復詔無忌與黃景崔寔等共撰漢記又自采集古今刪著事要號曰伏侯注無忌卒子質嗣官至大司農質卒子完嗣尚桓帝女陽安長公主女為孝獻皇后曹操殺后誅伏氏國除初自伏生已後世傳經學清靜無競故東州號為伏不鬬云隆字伯文少以節操立名仕郡督郵建武二年詣懷宮光武甚親接之時張步兄弟各擁彊兵據有齊地拜隆為太中大夫持節使青徐二州招降郡國隆移檄告曰乃者猾臣王莽殺帝盜位宗室興兵除亂誅莽故羣下推立聖公以主宗廟而任用賊臣殺戮賢良三王作亂盜賊從橫忤逆天心卒為赤眉所害皇天祐漢聖哲應期陛下神武奮發以少制衆故尋邑以百萬之軍潰散於昆陽王郎以全趙之師土崩於邯鄲大肜高胡望旗消靡鐵脛五校莫不摧破梁王劉永幸以宗室屬籍爵為侯王不知厭足自求禍棄遂封爵牧守造為詐逆今虎牙大將軍屯營十萬已拔睢陽劉永奔迸家已族矣此諸君所聞也不先自圖後悔何及青徐羣盜得此惶怖獲索賊右師郎等六校即時皆降張步遣使隨隆詣闕上書獻鰒魚其冬拜隆光祿大夫復使於步并與新除青州牧守及都尉俱東詔隆輒拜令長以下隆招懷綏緝多來降附帝嘉其功比之酈生即拜步為東萊太守而劉永亦復遣使立步為齊王步貪受王爵冘豫未決隆曉譬曰高祖與天下約非劉氏不王今可得為十萬戶侯耳步欲留隆與共守二州隆不聽求得反命步遂執隆而受永封隆遣閒使上書曰臣隆奉使無狀受執凶逆雖在困戹授命不顧又吏人知步反畔心不附之願以時進兵無以臣隆為念臣隆得生到闕廷受誅有司此其大願若令沒身寇手以父母昆弟長累陛下陛下與皇后太子永享萬國與天無極帝得隆奏召父湛流涕以示之曰隆可謂有蘇武之節恨不且許而遽求還也其後步遂殺之時人莫不憐哀焉五年張步平車駕幸北海詔隆中弟咸收隆喪賜給棺斂太中大夫護送喪事詔告琅邪作冢以子瑗為郎中侯霸字君房河南密人也族父淵以宦者有才辯任職元帝時佐石顯等領中書號曰大常侍成帝時任霸為太子舍人霸矜嚴有威容家累千金不事產業篤志好學師事九江太守房元治穀梁春秋為元都講王莽初五威司命陳崇舉霸德行遷隨宰縣界曠遠濱帶江湖而亡命者多為寇盜霸到即案誅豪猾分捕山賊縣中清靜再遷為執法刺姦糾案埶位者無所疑憚後為淮平大尹政理有能名及王莽之敗霸保固自守卒全一郡更始元年遣使徵霸百姓老弱相攜號哭遮使者車或當道而臥皆曰願乞侯君復留朞年民至乃戒乳婦勿得舉子侯君當去必不能全使者慮霸就徵臨淮必亂不敢授璽書具以狀聞會更始敗道路不通建武四年光武徵霸與車駕會壽春拜尚書令時無故典朝廷又少舊臣霸明習故事收錄遺文條奏前世善政法度有益於時者皆施行之每春下寬大之詔奉四時之令皆霸所建也明年代伏湛為大司徒封關內侯在位明察守正奉公不回十三年霸薨帝深傷惜之親自臨弔下詔曰惟霸積善清絜視事九年漢家舊制丞相拜日封為列侯朕以軍師暴露功臣未封緣忠臣之義不欲相踰未及爵命奄然而終嗚呼哀哉於是追封謚霸則鄉哀侯食邑二千六百戶子昱嗣臨淮吏人共為立祠四時祭焉以沛郡太守韓歆代霸為大司徒歆字翁君南陽人以從攻伐有功封扶陽侯好直言無隱諱帝每不能容嘗因朝會聞帝讀隗囂公孫述相與書歆曰亡國之君皆有才桀紂亦有才帝大怒以為激發歆又證歲將飢凶指天畫地言甚剛切坐免歸田里帝猶不釋復遣使宣詔責之司隸校尉鮑永固請不能得歆及子嬰竟自殺歆素有重名死非其罪衆多不厭帝乃追賜錢穀以成禮葬之後千乘歐陽歙清河戴涉相代為大司徒坐事下獄死自是大臣難居相任其後河南內蔡茂京兆玉況魏郡馮勤皆得薨位況字文伯性聰敏為陳留太守以德行化人遷司徒四年薨昱後徙封於陵侯永平中兼太僕昱卒子建嗣建卒子昌嗣宋弘字仲子京兆長安人也父尚成帝時至少府哀帝立以不附董賢違忤抵罪弘少而溫順哀平閒作侍中王莽時為共工赤眉入長安遣使徵弘逼迫不得已行至渭橋自投於水家人救得出因佯死獲免光武即位徵拜太中大夫建武二年代王梁為大司空封栒邑侯所得租奉分贍九族家無資產以清行致稱徙封宣平侯帝嘗問弘通博之士弘乃薦沛國桓譚才學洽聞幾能及楊雄劉向父子於是召譚拜議郎給事中帝每讌輒令鼓琴好其繁聲弘聞之不悅悔於薦舉伺譚內出正朝服坐府上遣吏召之譚至不與席而讓之曰吾所以薦子者欲令輔國家以道德也而今數進鄭聲以亂雅頌非忠正者也能自改邪將令相舉以法乎譚頓首辭謝良久乃遣之後大會羣臣帝使譚鼓琴譚見弘失其常度帝怪而問之弘乃離席免冠謝曰臣所以薦桓譚者望能以忠正導主而令朝廷耽悅鄭聲臣之罪也帝改容謝使反服其後遂不復令譚給事中弘推進賢士馮翊桓梁三十餘人或相及為公卿者弘當讌見御坐新屏風圖畫列女帝數顧視之弘正容言曰未見好德如好色者帝即為徹之笑謂弘曰聞義則服可乎對曰陛下進德臣不勝其喜時帝姊湖陽公主新寡帝與共論朝臣微觀其意主曰宋公威容德器羣臣莫及帝曰方且圖之後弘被引見帝令主坐屏風後因謂弘曰諺言貴易交富易妻人情乎弘曰臣聞貧賤之知不可忘糟糠之妻不下堂帝顧謂主曰事不諧矣弘在位五年坐考上黨太守無所據免歸第數年卒無子國除弘弟嵩以剛彊孝烈著名官至河南尹嵩子由章元和閒為太尉坐阿黨竇憲策免歸本郡自殺由二子漢登登在儒林傳漢字仲和以經行著名舉茂才四遷西河太守永建元年為東平相度遼將軍立名節以威恩著稱遷太僕上病自乞拜太中大夫卒策曰太中大夫宋漢清修雪白正直無邪前在方外仍統軍實懷柔異類莫匪嘉績戎車載戢邊人用寧予錄乃勳引登九列因病退讓守約彌堅將授三事未剋而終朝廷慜悼怛其愴然詩不云乎肇敏戎功用錫爾祉其令將相大夫會葬加賜錢十萬及其在殯以全素絲羔羊之絜焉子則字元矩為鄢陵令亦有名迹拔同郡韋著扶風法真稱為知人則子年十歲與蒼頭共弩射蒼頭弦斷矢激誤中之即死奴叩頭就誅則察而恕之潁川荀爽深以為美時人亦服焉論曰中興以後居台相總權衡多矣其能以任職取名者豈非先遠業後小數哉故惠公造次急於鄉射之禮君房入朝先奏寬大之令夫器博者無近用道長者其功遠蓋志士仁人所為根心者也君子以之得固貴矣以之失亦得矣宋弘止繁聲戒淫色其有關雎之風乎蔡茂字子禮河內懷人也哀平閒以儒學顯徵試博士對策陳災異以高等擢拜議郎遷侍中遇王莽居攝以病自免不仕莽朝會天下擾亂茂素與竇融善因避難歸之融欲以為張掖太守固辭不就每所餉給計口取足而已後與融俱徵復拜議郎再遷廣漢太守有政績稱時陰氏賓客在郡界多犯吏禁茂輒糾案無所回避會洛陽令董宣舉糾湖陽公主帝始怒收宣既而赦之茂喜宣剛正欲令朝廷禁制貴戚乃上書曰臣聞興化致教必由進善康國寧人莫大理惡陛下聖德係興再隆大命即位以來四海晏然誠宜夙興夜寐雖休勿休然頃者貴戚椒房之家數因恩埶干犯吏禁殺人不死傷人不論臣恐繩墨棄而不用斧斤廢而不舉近湖陽公主奴殺人西市而與主共輿出入宮省逋罪積日冤魂不報洛陽令董宣直道不顧干主討姦陛下不先澄審召欲加箠當宣受怒之初京師側耳及其蒙宥天下拭目今者外戚憍逸賓客放濫宜勑有司案理姦罪使執平之吏永申其用以厭遠近不緝之情光武納之建武二十年代戴涉為司徒在職清儉匪懈二十三年薨于位時年七十二賜東園梓棺賻贈甚厚茂初在廣漢夢坐大殿極上有三穗禾茂跳取之得其中穗輒復失之以問主簿郭賀賀離席慶曰大殿者宮府之形象也極而有禾人臣之上祿也取中穗是中台之位也於字禾失為秩雖曰失之乃所以得祿秩也袞職有闕君其補之旬月而茂徵焉乃辟賀為掾賀字喬卿雒陽人祖父堅伯父游君並修清節不仕王莽賀能明法累官建武中為尚書令在職六年曉習故事多所匡益拜荊州刺史引見賞賜恩寵隆異及到官有殊政百姓便之歌曰厥德仁明郭喬卿忠正朝廷上下平顯宗巡狩到南陽特見嗟歎賜以三公之服黼黻冕旒勑行部去襜帷使百姓見其容服以章有德每所經過吏人指以相示莫不榮之永平四年徵拜河南尹以清靜稱在官三年卒詔書慜惜賜車一乘錢四十萬馮勤字偉伯魏郡繁陽人也曾祖父揚宣帝為弘農太守有八子皆為二千石趙魏閒榮之號曰萬石君焉兄弟形皆偉壯唯勤祖父偃長不滿七尺常自恥短陋恐子孫之似也乃為子伉娶長妻伉生勤長八尺三寸八歲善計初為太守銚期功曹有高能稱期常從光武征伐政事一以委勤勤同縣馮巡等舉兵應光武謀未成而為豪右焦廉等所反勤乃率將老母兄弟及宗親歸期期悉以為腹心薦於光武初未被用後乃除為郎中給事尚書以圖議軍糧在事精勤遂見親識每引進帝輒顧謂左右曰佳乎吏也由是使典諸侯封事勤差量功次輕重國土遠近地埶豐薄不相踰越莫不厭服焉自是封爵之制非勤不定帝益以為能尚書衆事皆令總錄之司徒侯霸薦前梁令閻楊楊素有譏議帝常嫌之既見霸奏疑其有姦大怒賜霸璽書曰崇山幽都何可偶黃鉞一下無處所欲以身試法邪將殺身以成仁邪使勤奉策至司徒府勤還陳霸本意申釋事理帝意稍解拜勤尚書僕射職事十五年以勤勞賜爵關內侯遷尚書令拜大司農三歲遷司徒先是三公多見罪退帝賢勤欲令以善自終乃因讌見從容戒之曰朱浮上不忠於君下陵轢同列竟以中傷至今死生吉凶未可知豈不惜哉人臣放逐受誅雖復追加賞賜賻祭不足以償不訾之身忠臣孝子覽照前世以為鏡誡能盡忠於國事君無二則爵賞光乎當世功名列於不朽可不勉哉勤愈恭約盡忠號稱任職勤母年八十每會見詔勑勿拜令御者扶上殿顧謂諸王主曰使勤貴寵者此母也其見親重如此中元元年薨帝悼惜之使者弔祠賜東園祕器賵贈有加勤七子長子宗嗣至張掖屬國都尉中子順尚平陽長公主終於大鴻臚建初八年以順中子奮襲主爵為平陽侯薨無子永元七年詔書復封奮兄羽林右監勁為平陽侯奉公主之祀奮弟由黃門侍郎尚平安公主勁薨子卯嗣卯延光中為侍中薨子留嗣趙憙字伯陽南陽宛人也少有節操從兄為人所殺無子憙年十五常思報之乃挾兵結客後遂往復仇而仇家皆疾病無相距者憙以因疾報殺非仁者心且釋之而去顧謂仇曰爾曹若健遠相避也仇皆臥自搏後病愈悉自縛詣憙憙不與相見後竟殺之更始即位舞陰大姓李氏擁城不下更始遣柱天將軍李寶降之不肯云聞宛之趙氏有孤孫憙信義著名願得降之更始乃徵憙憙年未二十既引見更始笑曰繭栗犢豈能負重致遠乎即除為郎中行偏將軍事使詣舞陰而李氏遂降憙因進入潁川擊諸不下者歷汝南界還宛更始大悅謂憙曰卿名家駒努力勉之會王莽遣王尋王邑將兵出關更始乃拜憙為五威偏將軍使助諸將拒尋邑於昆陽光武破尋邑憙被創有戰勞還拜中郎將封勇功侯更始敗憙為赤眉兵所圍迫急乃踰屋亡走與所友善韓仲伯等數十人攜小弱越山阻徑出武關仲伯以婦色美慮有彊暴者而己受其害欲棄之於道憙責怒不聽因以泥塗仲伯婦面載以鹿車身自推之每道逢賊或欲逼略憙輒言其病狀以此得免既入丹水遇更始親屬皆祼跣塗炭飢困不能前憙見之悲感所裝縑帛資糧悉以與之將護歸鄉里時鄧奉反於南陽憙素與奉善數遺書切責之而讒者因言憙與奉合謀帝以為疑及奉敗帝得憙書乃驚曰趙憙真長者也即徵憙引見賜鞌馬待詔公車時江南未賓道路不通以憙守簡陽侯相憙不肯受兵單車馳之簡陽吏民不欲內憙憙乃告譬呼城中大人示以國家威信其帥即開門面縛自歸由是諸營壁悉降荊州牧奏憙才任理劇詔以為平林侯相攻擊羣賊安集已降者縣邑平定後拜懷令大姓李子春先為琅邪相豪猾并兼為人所患憙下車聞其二孫殺人事未發覺即窮詰其姦收考子春二孫自殺京師為請者數十終不聽時趙王良疾病將終車駕親臨王問所欲言王曰素與李子春厚今犯罪懷令趙憙欲殺之願乞其命帝曰吏奉法律不可枉也更道它所欲王無復言既薨帝追感趙王乃貰出子春其年遷憙平原太守時平原多盜賊憙與諸郡討捕斬其渠帥餘黨當坐者數千人憙上言惡惡止其身可一切徙京師近郡帝從之乃悉移置潁川陳留於是擢舉義行誅鋤姦惡後青州大蝗侵入平原界輒死歲屢有年百姓歌之二十六年帝延集內戚讌會歡甚諸夫人各各前言趙憙篤義多恩往遭赤眉出長安皆為憙所濟活帝甚嘉之後徵憙入為太僕引見謂曰卿非但為英雄所保也婦人亦懷卿之恩厚加賞賜二十七年拜太尉賜爵關內侯時南單于稱臣烏桓鮮卑並來入朝帝令憙典邊事思為久長規憙上復緣邊諸郡幽并二州由是而定三十年憙上言宜封禪正三雍之禮中元元年從封泰山及帝崩憙受遺詔典喪禮是時藩王皆在京師自王莽篡亂舊典不存皇太子與東海王等雜止同席憲章無序憙乃正色橫劒殿階扶下諸王以明尊卑時藩國官屬出入宮省與百僚無別憙乃表奏謁者將護分止它縣諸王並令就邸唯朝晡入臨整禮儀嚴門衞內外肅然永平元年封節鄉侯三年春坐考中山相薛脩事不實免其冬代竇融為衞尉八年代虞延行太尉事居府如真後遭母憂上疏乞身行喪禮顯宗不許遣使者為釋服賞賜恩寵甚渥憙內典宿衞外幹宰職正身立朝未嘗懈惰及帝崩復典喪事再奉大行禮事脩舉肅宗即位進為太傅錄尚書事擢諸子為郎吏者七人長子代給事黃門建初五年憙疾病帝親幸視及薨車駕往臨弔時年八十四謚曰正侯子代嗣官至越騎校尉永元中副行征西將軍劉尚征羌坐事下獄疾病物故和帝憐之賜祕器錢布贈越騎校尉節鄉侯印綬子直嗣官至步兵校尉直卒子淑嗣無子國除牟融字子優北海安丘人也少博學以大夏侯尚書教授門徒數百人名稱州里以司徒茂才為豐令視事三年縣無獄訟為州郡最司徒范遷薦融忠正公方經行純備宜在本朝并上其理狀永平五年入代鮑昱為司隸校尉多所舉正百僚敬憚之八年代包咸為大鴻臚十一年代鮭陽鴻為大司農是時顯宗方勤萬機公卿數朝會每輒延謀政事判折獄訟融經明才高善論議朝廷皆服其能帝數嗟歎以為才堪宰相明年代伏恭為司空舉動方重甚得大臣節肅宗即位以融先朝名臣代趙憙為太尉與憙參錄尚書事建初四年薨車駕親臨其喪時融長子麟歸鄉里帝以其餘子幼弱勑太尉掾史教其威儀進止贈賵恩寵篤密焉又賜冢塋地於顯節陵下除麟為郎韋彪字孟達扶風平陵人也高祖賢宣帝時為丞相祖賞哀帝時為大司馬彪孝行純至父母卒哀毀三年不出廬寑服竟羸瘠骨立異形醫療數年乃起好學洽聞雅稱儒宗建武末舉孝廉除郎中以病免復歸教授安貧樂道恬於進趣三輔諸儒莫不慕仰之顯宗聞彪名永平六年召拜謁者賜以車馬衣服三遷魏郡太守肅宗即位以病免徵為左中郎將長樂衞尉數陳政術每歸寬厚比上疏乞骸骨拜為奉車都尉秩中二千石賞賜恩寵侔於親戚建初七年車駕西巡狩以彪行太常從數召入問以三輔舊事禮儀風俗彪因建言今西巡舊都宜追錄高祖中宗功臣襃顯先勳紀其子孫帝納之行至長安乃制詔京兆尹右扶風求蕭何霍光後時光無苗裔唯封何末孫熊為酇侯建初二年已封曹參後曹湛為平陽侯故不復及焉乃厚賜彪錢珍羞食物使歸平陵上冢還拜大鴻臚是時陳事者多言郡國貢舉率非功次故守職益懈而吏事疏咎在州郡有詔下公卿朝臣議彪上議曰伏惟明詔憂勞百姓垂恩選舉務得其人夫國以簡賢為務賢以孝行為首孔子曰事親孝故忠可移於君是以求忠臣必於孝子之門夫人才行少能相兼是以孟公綽優於趙魏老不可以為滕薛大夫忠孝之人持心近厚鍛鍊之吏持心近薄三代之所以直道而行者在其所以磨之故也士宜以才行為先不可純以閥閱然其要歸在於選二千石二千石賢則貢舉皆得其人矣帝深納之彪以世承二帝吏化之後多以苛刻為能又置官選職不必以才因盛夏多寒上疏諫曰臣聞政化之本必順陰陽伏見立夏以來當暑而寒殆以刑罰刻急郡國不奉時令之所致也農人急於務而苛吏奪其時賦發充常調而貪吏割其財此其巨患也夫欲急人所務當先除其所患天下樞要在於尚書尚書之選豈可不重而閒者多從郎官超升此位雖曉習文法長於應對然察察小慧類無大能宜簡嘗歷州宰素有名者唯進退舒時有不逮然端心向公奉職周密宜鑒嗇夫捷急之對深思絳侯木訥之功也往時楚獄大起故置令史以助郎職而類多小人好為姦利今者務簡可皆停省又諫議之職應用公直之士通才謇正有補益於朝者今或從徵試輩為大夫又御史外遷動據州郡並宜清選其任責以言績其二千石視事雖久而為吏民所便安者宜增秩重賞勿妄遷徙惟留聖心書奏帝納之元和二年春東巡狩以彪行司徒事從行還以病乞身帝遣小黃門太醫問病賜以食物彪遂稱困篤章和二年夏使謁者策詔曰彪以將相之裔勤身飭行出自州里在位歷載中被篤疾連上求退君年在耆艾不可復以加增恐職事煩碎重有損焉其上大鴻臚印綬其遣太子舍人詣中臧府受賜錢二十萬永元元年卒詔尚書故大鴻臚韋彪在位無愆方欲錄用奄忽而卒其賜錢二十萬布百匹穀三千斛彪清儉好施祿賜分與宗族家無餘財著書十二篇號曰韋卿子族子義義字季節高祖父玄成元帝時為丞相初彪獨徙扶風故義猶為京兆杜陵人焉兄順字叔文平輿令有高名次兄豹字季明數辟公府輒以事去司徒劉愷復辟之謂曰卿以輕好去就爵位不躋今歲垂盡當選御史意在相薦子其宿留乎豹曰犬馬齒衰旅力已劣仰慕崇恩故未能自割且眩瞀滯疾不堪久待選薦之私非所敢當遂跣而起愷追之徑去不顧安帝西巡徵拜議郎義少與二兄齊名初仕州郡太傅桓焉辟舉理劇為廣都長甘陵陳二縣令政甚有績官曹無事牢獄空虛數上書順帝陳宜依古典考功黜陟徵集名儒大定其制又譏切左右貶刺竇氏言既無感而久抑不遷以兄順喪去官比辟公府不就廣都為生立廟及卒三縣吏民為義舉哀若喪考妣豹子著字休明少以經行知名不應州郡之命大將軍梁冀辟不就延熹二年桓帝公車備禮徵至霸陵稱病歸乃入雲陽山采藥不反有司舉奏加罪帝特原之復詔京兆尹重以禮敦勸著遂不就徵靈帝即位中常侍曹節以陳蕃竇氏既誅海內多怨欲借寵時賢以為名白帝就家拜著東海相詔書逼切不得已解巾之郡政任威刑為受罰者所奏坐論輸左校又後妻憍恣亂政以之失名竟歸為姦人所害隱者恥之贊曰湛霸奮庸維寧兩邦淮人孺慕徐寇要降弘實體遠仁不忘本憙政多迹彪明理損牟公簡帝身終上袞
