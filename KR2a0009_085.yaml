body:
  text: 後漢書卷七十八宦者列傳第六十八易曰天垂象聖人則之宦者四星在皇位之側故周禮置官亦備其數閽者守中門之禁寺人掌女宮之戒又云王之正內者五人月令仲冬命閹尹審門閭謹房室詩之小雅亦有巷伯刺讒之篇然宦人之在王朝者其來舊矣將以其體非全氣情志專良通關中人易以役養乎然而後世因之才任稍廣其能者則勃貂管蘇有功於楚晉景監繆賢著庸於秦趙及其敝也則豎刁亂齊伊戾禍宋漢興仍襲秦制置中常侍官然亦引用士人以參其選皆銀璫左貂給事殿省及高后稱制乃以張卿為大謁者出入臥內受宣詔命文帝時有趙談北宮伯子頗見親幸至於孝武亦愛李延年帝數宴後庭或潛游離館故請奏機事多以宦人主之至元帝之世史游為黃門令勤心納忠有所補益其後弘恭石顯以佞險自進卒有蕭周之禍損穢帝德焉中興之初宦官悉用閹人不復雜調它士至永平中始置員數中常侍四人小黃門十人和帝即祚幼弱而竇憲兄弟專總權威內外臣僚莫由親接所與居者唯閹宦而已故鄭衆得專謀禁中終除大憝遂享分土之封超登宮卿之位於是中官始盛焉自明帝以後迄乎延平委用漸大而其員稍增中常侍至有十人小黃門二十人改以金璫右貂兼領卿署之職鄧后以女主臨政而萬機殷遠朝臣國議無由參斷帷幄稱制下令不出房闈之閒不得不委用刑人寄之國命手握王爵口含天憲非復掖廷永巷之職閨牖房闥之任也其後孫程定立順之功曹騰參建桓之策續以五侯合謀梁冀受鉞迹因公正恩固主心故中外服從上下屏氣或稱伊霍之勳無謝於往載或謂良平之畫復興於當今雖時有忠公而竟見排斥舉動回山海呼吸變霜露阿旨曲求則光寵三族直情忤意則參夷五宗漢之綱紀大亂矣若夫高冠長劒紆朱懷金者布滿宮闈苴茅分虎南面臣人者蓋以十數府署第館列於都鄙子弟支附過半於州國南金和寶冰紈霧縠之積盈仞珍臧嬙媛侍兒歌童舞女之玩充備綺室狗馬飾雕文土木被緹繡皆剝割萌黎競恣奢欲搆害明賢專樹黨類其有更相援引希附權彊者皆腐身熏子以自衒達同敝相濟故其徒有繁敗國蠹政之事不可單書所以海內嗟毒志士窮棲寇劇緣閒搖亂區夏雖忠良懷憤時或奮發而言出禍從旋見孥戮因復大考鉤黨轉相誣染凡稱善士莫不離被災毒竇武何進位崇戚近乘九服之囂怨協羣英之藝力而以疑留不斷至於殄敗斯亦運之極乎雖袁紹龔行芟夷無餘然以暴易亂亦何云及自曹騰說梁冀竟立昏弱魏武因之遂遷龜鼎所謂君以此始必以此終信乎其然矣鄭衆字季産南陽犨人也為人謹敏有心幾永平中初給事太子家肅宗即位拜小黃門遷中常侍和帝初加位鉤盾令時竇太后秉政后兄大將軍憲等並竊威權朝臣上下莫不附之而衆獨一心王室不事豪黨帝親信焉及憲兄弟圖作不軌衆遂首謀誅之以功遷大長秋策勳班賞每辭多受少由是常與議事中官用權自衆始焉十四年帝念衆功美封為鄛鄉侯食邑千五百戶永初元年和熹皇后益封三百戶元初元年卒養子閎嗣閎卒子安嗣後國絶桓帝延熹二年紹封衆曾孫石讎為關內侯蔡倫字敬仲桂陽人也以永平末始給事宮掖建初中為小黃門及和帝即位轉中常侍豫參帷幄倫有才學盡心敦慎數犯嚴顏匡弼得失每至休沐輒閉門絶賓暴體田野後加位尚方令永元九年監作祕劒及諸器械莫不精工堅密為後世法自古書契多編以竹簡其用縑帛者謂之為紙縑貴而簡重並不便於人倫乃造意用樹膚麻頭及敝布魚網以為紙元興元年奏上之帝善其能自是莫不從用焉故天下咸稱蔡侯紙元初元年鄧太后以倫久宿衛封為龍亭侯邑三百戶後為長樂太僕四年帝以經傳之文多不正定乃選通儒謁者劉珍及博士良史詣東觀各讎校漢家法令倫監典其事倫初受竇后諷旨誣陷安帝祖母宋貴人及太后崩安帝始親萬機勑使自致廷尉倫恥受辱乃沐浴整衣冠飲藥而死國除孫程字稚卿涿郡新城人也安帝時為中黃門給事長樂宮時鄧太后臨朝帝不親政事小黃門李閏與帝乳母王聖常共譖太后兄執金吾悝等言欲廢帝立平原王德翼帝每忿懼及太后崩遂誅鄧氏而廢平原王封閏雍鄉侯又小黃門江京以讒諂進初迎帝於邸以功封都鄉侯食邑各三百戶閏京並遷中常侍江京兼大長秋與中常侍樊豐黃門令劉安鉤盾令陳達及王聖聖女伯榮扇動內外競為侈虐又帝舅大將軍耿寶皇后兄大鴻臚閻顯更相阿黨遂枉殺太尉楊震廢皇太子為濟陰王明年帝崩立北鄉侯為天子顯等遂專朝爭權乃諷有司奏誅樊豐廢耿寶王聖及黨與皆見死徙十月北鄉侯病篤程謂濟陰王謁者長興渠曰王以嫡統本無失德先帝用讒遂至廢黜若北鄉疾不起共斷江京閻顯事乃可成渠等然之又中黃門南陽王康先為太子府史自太子之廢常懷歎憤又長樂太官丞京兆王國並附同於程至二十七日北鄉侯薨閰顯白太后徵諸王子簡為帝嗣未及至十一月二日程遂與王康等十八人聚謀於西鍾下皆單衣為誓四日夜程等共會崇德殿上因入章臺門時江京劉安及李閏陳達等俱坐省門下程與王康共就斬京安達以李閏權藝積為省內所服欲引為主因舉刃脅閏曰今當立濟陰王無得搖動閏曰諾於是扶閏起俱於西鍾下迎濟陰王立之是為順帝召尚書令僕射以下從輦幸南宮雲臺程等留守省門遮扞內外閻顯時在禁中憂迫不知所為小黃門樊登勸顯發兵以太后詔召越騎校尉馮詩虎賁中郎將閻崇屯朔平門以禦程等誘詩入省太后使授之印曰能得濟陰王者封萬戶侯得李閏者五千戶侯顯以詩所將衆少使與登迎吏士于左掖門外詩因格殺登歸營屯守顯弟衛尉景遽從省中還外府收兵至盛德門程傳召諸尚書使收景尚書郭鎮時臥病聞之即率直宿羽林出南止車門逢景從吏士拔白刃呼曰無干兵鎮即下車時節詔之景曰何等詔因斫鎮不中鎮引劒擊景墯車左右以戟叉其胸遂禽之送廷尉獄即夜死旦日令侍御史收顯等送獄於是遂定下詔曰夫表功録善古今之通義也故中常侍長樂太僕江京黃門令劉安鉤盾令陳達與故車騎將軍閻顯兄弟謀議惡逆傾亂天下中黃門孫程王康長樂太官丞王國中黃門黃龍彭愷孟叔李建王成張賢史泛馬國王道李元楊他陳豫趙封李剛魏猛苗光等懷忠憤發勠力協謀遂掃滅元惡以定王室詩不云乎無言不讎無德不報程為謀首康國協同其封程為浮陽侯食邑萬戶康為華容侯國為酈侯各九千戶黃龍為湘南侯五千戶彭愷為西平昌侯孟叔為中廬侯李建為復陽侯各四千二百戶王成為廣宗侯張賢為祝阿侯史泛為臨沮侯馬國為廣平侯王道為范縣侯李元為褒信侯楊他為山都侯陳豫為下雋侯趙封為析縣侯李剛為枝江侯各四千戶魏猛為夷陵侯二千戶苗光為東阿侯千戶是為十九侯加賜車馬金銀錢帛各有差李閏以先不豫謀故不封遂擢拜程騎都尉永建元年程與張賢孟叔馬國等為司隸校尉虞詡訟罪懷表上殿呵叱左右帝怒遂免程官因悉遣十九侯就國後徙封程為宜城侯程既到國怨恨恚懟封還印綬符策亡歸京師往山中詔書追求復故爵土賜車馬衣物遣還國三年帝念程等功勳悉徵還京師程與王道李元皆拜騎都尉餘悉奉朝請陽嘉元年程病甚即拜奉車都尉位特進及卒使五官中郎將追贈車騎將軍印綬賜諡剛侯侍御史持節監護喪事乘輿幸北部尉傳瞻望車騎程臨終遺言上書以國傳弟美帝許之而分程半封程養子壽為浮陽侯後詔書録微功封興渠為高望亭侯四年詔宦官養子悉聽得為後襲封爵定著乎令王康王國彭愷王成趙封魏猛六人皆早卒黃龍楊他孟叔李建張賢史泛王道李元李剛九人與阿母山陽君宋娥更相貨賂求高官增邑又誣罔中常侍曹騰孟賁等永和二年發覺並遣就國減租四分之一宋娥奪爵歸田舍唯馬國陳豫苗光保全封邑初帝見廢監太子家小黃門籍建傅高梵長秋長趙熹丞良賀藥長夏珍皆以無過獲罪建等坐徙朔方及帝即位並擢為中常侍梵坐臧罪減死一等建後封東鄉侯三百戶賀清儉退厚位至大長秋陽嘉中詔九卿舉武猛賀獨無所薦帝引問其故對曰臣生自草茅長於宮掖既無知人之明又未嘗交知士類昔衛鞅因景監以見有識知其不終今得臣舉者匪榮伊辱固辭之及卒帝思賀忠封其養子為都鄉侯三百戶曹騰字季興沛國譙人也安帝時除黃門從官順帝在東宮鄧太后以騰年少謹厚使侍皇太子書特見親愛及帝即位騰為小黃門遷中常侍桓帝得立騰與長樂太僕州輔等七人以定策功皆封亭侯騰為費亭侯遷大長秋加位特進騰用事省闥三十餘年奉事四帝未嘗有過其所進達皆海內名人陳留虞放邊韶南陽延固張溫弘農張奐潁川堂溪典等時蜀郡太守因計吏賂遺於騰益州刺史种皓於斜谷關搜得其書上奏太守并以劾騰請下廷尉案罪帝曰書自外來非騰之過遂寢皓奏騰不為纖介常稱皓為能吏時人嗟美之騰卒養子嵩嗣种皓後為司徒告賓客曰今身為公乃曹常侍力焉嵩靈帝時貨賂中官及輸西園錢一億萬故位至太尉及子操起兵不肯相隨乃與少子疾避亂琅邪為徐州刺史陶謙所殺單超河南人徐璜下邳良城人具瑗魏郡元城人左悺河南平陰人唐衡潁川郾人也桓帝初超璜瑗為中常侍悺衡為小黃門史初梁冀兩妹為順桓二帝皇后冀代父商為大將軍再世權戚威振天下冀自誅太尉李固杜喬等驕橫益甚皇后乘藝忌恣多所鴆毒上下鉗口莫有言者帝逼畏久恆懷不平恐言泄不敢謀之延熹二年皇后崩帝因如廁獨呼衡問左右與外舍不相得者皆誰乎衡對曰單超左悺前詣河南尹不疑禮敬小簡不疑收其兄弟送洛陽獄二人詣門謝乃得解徐璜具瑗常私忿疾外舍放橫口不敢道於是帝呼超悺入室謂曰梁將軍兄弟專固國朝迫脅外內公卿以下從其風旨今欲誅之於常侍意何如超等對曰誠國姦賊當誅日久臣等弱劣未知聖意何如耳帝曰審然者常侍密圖之對曰圖之不難但恐陛下復中狐疑帝曰姦臣脅國當伏其罪何疑乎於是更召璜瑗等五人遂定其議帝齧超臂出血為盟於是詔收冀及宗親黨與悉誅之悺衡遷中常侍封超新豐侯二萬戶璜武原侯瑗東武陽侯各萬五千戶賜錢各千五百萬悺上蔡侯衡汝陽侯各萬三千戶賜錢各千三百萬五人同日封故世謂之五侯又封小黃門劉普趙忠等八人為鄉侯自是權歸宦官朝廷日亂矣超病帝遣使者就拜車騎將軍明年薨賜東園祕器棺中玉具贈侯將軍印綬使者理喪及葬發五營騎士將軍侍御史護喪將作大匠起冢塋其後四侯轉橫天下為之語曰左回天具獨坐徐臥虎唐兩墯皆競起第宅樓觀壯麗窮極伎巧金銀罽毦施於犬馬多取良人美女以為姬妾皆珍飾華侈擬則宮人其僕從皆乘牛車而從列騎又養其疏屬或乞嗣異姓或買蒼頭為子並以傳國襲封兄弟姻戚皆宰州臨郡辜較百姓與盜賊無異超弟安為河東太守弟子匡為濟陰太守璜弟盛為河內太守悺弟敏為陳留太守瑗兄恭為沛相皆為所在蠹害璜兄子宣為下邳令暴虐尤甚先是求故汝南太守下邳李皓女不能得及到縣遂將吏卒至皓家載其女歸戲射殺之埋著寺內時下邳縣屬東海汝南黃浮為東海相有告言宣者浮乃收宣家屬無少長悉考之掾史以下固諫爭浮曰徐宣國賊今日殺之明日坐死足以瞑目矣即案宣罪棄市暴其尸以示百姓郡中震栗璜於是訴怨於帝帝大怒浮坐髡鉗輸作右校五侯宗族賓客虐遍天下民不堪命起為寇賊七年衡卒亦贈車騎將軍如超故事璜卒賻贈錢布賜冢塋地明年司隸校尉韓演因奏悺罪惡及其兄太僕南鄉侯稱請託州郡聚斂為姦賓客放縱侵犯吏民悺稱皆自殺演又奏瑗兄沛相恭臧罪徵詣廷尉瑗詣獄謝上還東武侯印綬詔貶為都鄉侯卒於家超及璜衡襲封者並降為鄉侯租入歲皆三百萬子弟分封者悉奪爵土劉普等貶為關內侯侯覽者山陽防東人桓帝初為中常侍以佞猾進倚藝貪放受納貨遺以巨萬計延熹中連歲征伐府帑空虛乃假百官奉祿王侯租稅覽亦上縑五千匹賜爵關內侯又託以與議誅梁冀功進封高鄉侯小黃門段圭家在濟陰與覽並立田業近濟北界僕從賓客侵犯百姓劫掠行旅濟北相滕延一切收捕殺數十人陳尸路衢覽圭大怨以事訴帝延坐多殺無辜徵詣廷尉免延字伯行北海人後為京兆尹有理名世稱為長者覽等得此愈放縱覽兄參為益州刺史民有豐富者輒誣以大逆皆誅滅之沒入財物前後纍億計太尉楊秉奏參檻車徵於道自殺京兆尹袁逢於旅舍閲參車三百餘兩皆金銀錦帛珍玩不可勝數覽坐免旋復復官建寧二年喪母還家大起塋冢督郵張儉因舉奏覽貪侈奢縱前後請奪人宅三百八十一所田百一十八頃立第宅十有六區皆有高樓池苑堂閣相望飾以綺畫丹漆之屬制度重深僭類宮省又豫作壽冢石椁雙闕高廡百尺破人居室發掘墳墓虜奪良人妻略婦子及諸罪釁請誅之而覽伺候遮章竟不上儉遂破覽冢宅藉沒資財具言罪狀又奏覽母生時交通賓客干亂郡國復不得御覽遂誣儉為鉤黨及故長樂少府李膺太僕杜密等皆夷滅之遂代曹節領長樂太僕熹平元年有司舉奏覽專權驕奢策收印綬自殺阿黨者皆免曹節字漢豐南陽新野人也其本魏郡人世吏二千石順帝初以西園騎遷小黃門桓帝時遷中常侍奉車都尉建寧元年持節將中黃門虎賁羽林千人北迎靈帝陪乘入宮及即位以定策封長安鄉侯六百戶時竇太后臨朝后父大將軍武與太傅陳蕃謀誅中官節與長樂五官史朱瑀從官史共普張亮中黃門王尊長樂謁者騰是等十七人共矯詔以長樂食監王甫為黃門令將兵誅武蕃等事已具蕃武傳節遷長樂衛尉封育陽侯增邑三千戶甫遷中常侍黃門令如故瑀封都鄉侯千五百戶普亮等五人各三百戶餘十一人皆為關內侯歲食租二千斛先是瑀等陰於明堂中禱皇天曰竇氏無道請皇天輔皇帝誅之令事必成天下得寧既誅武等詔令太官給塞具賜瑀錢五千萬餘各有差後更封華容侯二人節病困詔拜為車騎將軍有頃疾瘳上印綬罷復為中常侍位特進秩中二千石尋轉大長秋熹平元年竇太后崩有何人書朱雀闕言天下大亂曹節王甫幽殺太后常侍侯覽多殺黨人公卿皆尸祿無有忠言者於是詔司隸校尉劉猛逐捕十日一會猛以誹書言直不肯急捕月餘主名不立猛坐左轉諫議大夫以御史中丞段熲代猛乃四出逐捕及太學游生繫者千餘人節等怨猛不已使熲以它事奏猛抵罪輸左校朝臣多以為言乃免刑復公車徵之節遂與王甫等誣奏桓帝弟勃海王悝謀反誅之以功封者十二人甫封冠軍侯節亦增邑四千六百戶并前七千六百戶父兄子弟皆為公卿列校牧守令長布滿天下節弟破石為越騎校尉越騎營五百妻有美色破石從求之五百不敢違妻執意不肯行遂自殺其淫暴無道多此類也光和二年司隸校尉陽球奏誅王甫及子長樂少府萌沛相吉皆死獄中時連有災異郎中梁人審忠以為朱瑀等罪惡所感乃上書曰臣聞理國得賢則安失賢則危故舜有臣五人而天下理湯舉伊尹不仁者遠陛下即位之初未能萬機皇太后念在撫育權時攝政故中常侍蘇康管霸應時誅殄太傅陳蕃大將軍竇武考其黨與志清朝政華容侯朱瑀知事覺露禍及其身遂興造逆謀作亂王室撞踏省闥執奪璽綬迫脅陛下聚會羣臣離閒骨肉母子之恩遂誅蕃武及尹勳等因共割裂城社自相封賞父子兄弟被蒙尊榮素所親厚布在州郡或登九列或據三司不惟祿重位尊之責而苟營私門多蓄財貨繕修第舍連里竟巷盜取御水以作魚釣車馬服玩擬於天家羣公卿士杜口吞聲莫敢有言州牧郡守承順風旨辟召選舉釋賢取愚故蟲蝗為之生夷寇為之起天意憤盈積十餘年故頻歲日食於上地震於下所以譴戒人主欲令覺悟誅鉏無狀昔高宗以雉雊之變故獲中興之功近者神祇啓悟陛下發赫斯之怒故王甫父子應時馘路人士女莫不稱善若除父母之讎誠怪陛下復忍孽臣之類不悉殄滅昔秦信趙高以危其國吳使刑人身遘其禍虞公抱寶牽馬魯昭見逐乾侯以不用宮之奇子家駒以至滅辱今以不忍之恩赦夷族之罪姦謀一成悔亦何及臣為郎十五年皆耳目聞見瑀之所為誠皇天所不復赦願陛下留漏刻之聽裁省臣表掃滅醜類以答天怒與瑀考驗有不如言願受湯鑊之誅妻子并徙以絶妄言之路章寢不報節遂領尚書令四年卒贈車騎將軍後瑀亦病卒皆養子傳國審忠字公誠宦官誅後辟公府呂強字漢盛河南成皋人也少以宦者為小黃門再遷中常侍為人清忠奉公靈帝時例封宦者以強為都鄉侯強辭讓懇惻固不敢當帝乃聽之因上疏陳事曰臣聞諸侯上象四七下裂王土高祖重約非功臣不侯所以重天爵明勸戒也伏聞中常侍曹節王甫張讓等及侍中許相並為列侯節等宦官祐薄品卑人賤讒諂媚主佞邪徼寵放毒人物疾妒忠良有趙高之禍未被轘裂之誅掩朝廷之明成私樹之黨而陛下不悟妄授茅土開國承家小人是用又并及家人重金兼紫相繼為蕃輔受國重恩不念爾祖述修厥德而交結邪黨下比羣佞陛下或其瑣才特蒙恩澤又授位乖越賢才不升素餐私幸必加榮擢陰陽乖剌稼穡荒蔬人用不康罔不由茲臣誠知封事已行言之無逮所以冒死干觸陳愚忠者實願陛下損改既謬從此一止當貴而今更賤者由賦發繁數以解縣官寒不敢衣飢不敢食民有斯厄而莫之恤宮女無用填積後庭天下雖復盡力耕桑猶不能供昔楚女悲愁則西宮致災況終年積聚豈無憂怨乎夫天生蒸民立君以牧之君道得則民戴之如父母仰之猶日月雖時有征稅猶望其仁恩之惠易曰悅以使民民忘其勞悅以犯難民忘其死儲君副主宜諷誦斯言南面當國宜履行其事豈宜有顧戀之意且河閒疏遠解瀆絶而當勞民單力未見其便又今外戚四姓貴幸之家及中官公族無功德者造起館舍凡有萬數樓閣連接丹青素堊雕刻之飾不可單言喪葬踰制奢麗過禮競相放效莫肯矯拂穀梁傳曰財盡則怨力盡則懟尸子曰君如杅民如水杅方則水方杅圓則水圓上之化下猶風之靡草今上無去奢之儉下有縱欲之敝至使禽獸食民之甘木土衣民之帛昔師曠諫晉平公曰梁柱衣繡民無褐衣池有𠫓廾酒士有渴死馬秣粟民有飢色近臣不敢諫遠臣不得暢此之謂也懷道迷國而切言極對毀刺貴臣譏呵豎宦陛下不密其言至令宣露羣邪項領膏脣拭舌競欲咀嚼造作飛條陛下回受誹謗致雍刑罪室家徙放老幼流離豈不負忠臣哉今羣臣皆以雍為戒上畏不測之難下懼劒客之害臣知朝廷不復得聞忠言矣故太尉段熲武勇冠世習於邊事垂髮服戎功成皓首歷事二主勳烈獨昭陛下既已式序位登台司而為司隸校尉陽球所見誣脅一身既斃而妻子遠播天下惆悵功臣失望宜徵雍更授任反熲家屬則忠貞路開衆怨以弭矣時帝多私臧收天下之珍每郡國貢獻先輸中署名為導行費強上疏諫曰郡之寶中御府積天下之繒西園引司農之臧中聚太僕之馬而所輸之府輒有導行之財調廣民困費多獻少姦吏因其利百姓受其敝又阿媚之臣好獻其私容諂姑息自此而進以成功若無可察然後付之尚書尚書舉劾請下廷尉覆案虛實行其誅罰今但任尚書或復勑用如是三公得免選舉之負尚書亦復不坐責賞無歸豈肯空自苦勞乎之見玼則不當照也願陛下詳思臣言不以記過見玼為責中平元年黃巾賊起帝問強所宜施行強欲先誅左右貪濁者大赦黨人料簡刺史二千石能否帝納之乃先赦黨人於是諸常侍人人求退又各自徵還宗親子弟在州郡者中常侍趙忠夏惲等遂共搆強云與黨人共議朝廷數讀霍光傳強兄弟所在並皆貪穢帝不悅使中黃門持兵召強強聞帝召怒曰吾死亂起矣丈夫欲盡忠國家豈能對獄吏乎遂自殺忠惲復譖曰強見召未知所問而就外草自屏有姦明審遂收捕宗親沒入財産焉時宦者濟陰丁肅下邳徐衍南陽郭耽汝陽李巡北海趙祐等五人稱為清忠皆在里巷不爭威權巡以為諸博士試甲乙科爭弟高下更相告言至有行賂定蘭臺漆書經字以合其私文者乃白帝與諸儒共刻五經文於石於是詔蔡雍等正其文字自後五經一定爭者用息趙祐博學多覽著作校書諸儒稱之又小黃門甘陵吳伉善為風角博達有奉公稱知不得用常託病還寺舍從容養志云張讓者潁川人趙忠者安平人也少皆給事省中桓帝時為小黃門忠以與誅梁冀功封都鄉侯延熹八年黜為關中內侯食本縣租千斛靈帝時讓忠並遷中常侍封列侯與曹節王甫等相為表𩹉節死後忠領大長秋讓有監奴典任家事交通貨賂威形喧赫扶風人孟他資産饒贍與奴朋結傾竭饋問無所遺愛奴咸德之問他曰君何所欲力能辦也曰吾望汝曹為我一拜耳時賓客求謁讓者車恆數百千兩他時詣讓後至不得進監奴乃率諸倉頭迎拜於路遂共輿車入門賓客咸驚謂他善於讓皆爭以珍玩賂之他分以遺讓讓大喜遂以他為涼州刺史是時讓忠及夏惲郭勝孫璋畢嵐栗嵩段圭高望張恭韓悝宋典十二人皆為中常侍封侯貴寵父兄子弟布列州郡所在貪殘為人蠹害黃巾既作盜賊糜沸郎中中山張鈞上書曰竊惟張角所以能興兵作亂萬人所以樂附之者其源皆由十常侍多放父兄子弟婚親賓客典據州郡辜榷財利侵掠百姓百姓之冤無所告訴故謀議不軌聚為盜賊宜斬十常侍縣頭南郊以謝百姓又遣使者布告天下可不須師旅而大寇自消天子以鈞章示讓等皆免冠徒跣頓首乞自致洛陽詔獄並出家財以助軍費有詔皆冠履視事如故帝怒鈞曰此真狂子也十常侍固當有一人善者不鈞復重上猶如前章輒寢不報詔使廷尉侍御史考為張角道者御史承讓等旨遂誣奏鈞學黃巾道收掠死獄中而讓等實多與張角交通後中常侍封諝徐奏奉事獨發覺坐誅帝因怒詰讓等曰汝曹常言黨人欲為不軌皆令禁錮或有伏誅今黨人更為國用汝曹反與張角通為可斬未皆叩頭云故中常侍王甫侯覽所為帝乃止明年南宮災讓忠等說帝令斂天下田畝稅十錢以修宮室發太原河東狄道諸郡材木及文石每州郡部送至京師黃門常侍輒令譴呵不中者因強折賤買十分雇一因復貨之於宦官復不為即受材木遂至腐積宮室連年不成刺史太守復增私調百姓呼嗟凡詔所徵求皆令西園騶密約勑號曰中使恐動州郡多受賕賂刺史二千石及茂才孝廉遷除皆責助軍修宮錢大郡至二三千萬餘各有差當之官者皆先至西園諧價然後得去有錢不畢者或至自殺其守清者乞不之官皆迫遣之時巨鹿太守河內司馬直新除以有清名減責三百萬直被詔悵然曰為民父母而反割剝百姓以稱時求吾不忍也辭疾不聽行至孟津上書極陳當世之失古今禍敗之戒即吞藥自殺書奏帝為暫絶修宮錢又造萬金堂於西園引司農金錢繒帛仞積其中又還河閒買田宅起第觀帝本侯家宿貧每歎桓帝不能作家居故聚為私臧復臧寄小黃門常侍錢各數千萬常云張常侍是我公趙常侍是我母宦官得志無所憚畏並起第宅擬則宮室帝常登永安侯臺宦官恐其望見居處乃使中大人尚但諫曰天子不當登高登高則百姓虛散自是不敢復升臺榭明年遂使鉤盾令宋典繕修南宮玉堂又使掖庭令畢嵐鑄銅人四列於倉龍玄武闕又鑄四鐘皆受二千斛縣於玉堂及雲臺殿前又鑄天祿蝦吐水於平門外橋東轉水入宮又作翻車渴烏施於橋西用灑南北郊路以省百姓灑道之費又鑄四出文錢錢皆四道識者竊言侈虐已甚形象兆見此錢成必四道而去及京師大亂錢果流布四海復以忠為車騎將軍百餘日罷六年帝崩中軍校尉袁紹說大將軍何進令誅中官以悅天下謀泄讓忠等因進入省遂共殺進而紹勒兵斬忠捕宦官無少長悉斬之讓等數十人劫質天子走河上追急讓等悲哭辭曰臣等殄滅天下亂矣惟陛下自愛皆投河而死論曰自古喪大業絶宗禋者其所漸有由矣三世代以嬖色取禍嬴氏以奢虐致災西京自外戚失祚東都緣閹尹傾國成敗之來先史商之久矣至於釁起宦夫其略猶或可言何者刑餘之醜理謝全生聲榮無暉於門閥肌膚莫傳於來體推情未鑒其敝即事易以取信加漸染朝事頗識典物故少主憑謹舊之庸女君資出內之命顧訪無猜憚之心恩狎有可悅之色亦有忠厚平端懷術糾邪或敏才給對飾巧亂實或借譽貞良先時薦譽非直苟恣凶德止於暴橫而已然真邪並行情貌相越故能回惑昏幼迷瞀視聽蓋亦有其理焉詐利既滋朋徒日廣直臣抗議必漏先言之閒至戚發憤方啓專奪之隙斯忠賢所以智屈社稷故其為墟易曰履霜堅冰至云所從來久矣今迹其所以亦豈一朝一夕哉贊曰任失無小過用則違況乃巷職遠參天機舞文巧態作惠作威凶家害國夫豈異歸
