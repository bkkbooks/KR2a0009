body:
  text: 後漢書卷二十一任李萬邳劉耿列傳第十一任光子隗任光字伯卿南陽宛人也少忠厚為鄉里所愛初為鄉嗇夫郡縣吏漢兵至宛軍人見光冠服鮮明令解衣將殺而奪之會光祿勳劉賜適至視光容貌長者乃救全之光因率黨與從賜為安集掾拜偏將軍與世祖破王尋王邑更始至洛陽以光為信都太守及王郎起郡國皆降之光獨不肯遂與都尉李忠令萬脩功曹阮況五官掾郭唐等同心固守廷掾持王郎檄詣府白光光斬之於巿以徇百姓發精兵四千人城守更始二年春世祖自薊還狼狽不知所向傳聞信都獨為漢拒邯鄲即馳赴之光等孤城獨守恐不能全聞世祖至大喜吏民皆稱萬歲即時開門與李忠萬脩率官屬迎謁世祖入傳舍謂光曰伯卿今埶力虛弱欲俱入城頭子路力子都兵中何如邪光曰不可世祖曰卿兵少何如光曰可募發奔命出攻傍縣若不降者恣聽掠之人貪財物則兵可招而致也世祖從之拜光為左大將軍封武成侯留南陽宗廣領信都太守事使光將兵從光乃多作檄文曰大司馬劉公將城頭子路力子都兵百萬眾從東方來擊諸反虜遣騎馳至鉅鹿界中吏民得檄傳相告語世祖遂與光等投暮入堂陽界使騎各持炬火彌滿澤中光炎燭天地舉城莫不震驚惶怖其夜即降旬日之閒兵眾大盛因攻城邑遂屠邯鄲迺遣光歸郡城頭子路者東平人姓爰名曾字子路與肥城劉詡起兵盧城頭故號其兵為城頭子路曾自稱都從事詡稱校三老寇掠河濟閒眾至二十餘萬更始立曾遣使降拜曾東萊郡太守詡濟南太守皆行大將軍事是歲曾為其將所殺衆推詡為主更始封詡助國侯令罷兵歸本郡力子都者東海人也起兵鄉里鈔擊徐兗界衆有六七萬更始立遣使降拜子都徐州牧為其部曲所殺餘黨復相聚與諸賊會於鄉因號為鄉鄉渠帥董次仲始起茌平遂渡河入魏郡清河與五校合眾十餘萬建武元年世祖入洛陽遣大司馬吳漢等擊鄉明年春大破降之是歲更封光阿陵侯食邑萬戶五年徵詣京師奉朝請其冬卒子隗嗣後阮況為南陽太守郭唐至河南尹皆有能名隗字仲和少好黃老清靜寡欲所得奉秩常以賑卹宗族收養孤寡顯宗聞之擢奉朝請遷羽林左監虎賁中郎將又遷長水校尉肅宗即位雅相敬愛數稱其行以為將作大匠將作大匠自建武以來常謁者兼之至隗迺置真焉建初五年遷太僕八年代竇固為光祿勳所歷皆有稱章和元年拜司空隗義行內修不求名譽而以沈正見重於世和帝即位大將軍竇憲秉權專作威福內外朝臣莫不震懾時憲擊匈奴國用勞費隗奏議徵憲還前後十上獨與司徒袁安同心畢力持重處正鯁言直議無所回隱語在袁安傳永元四年薨子屯嗣帝追思隗忠擢屯為步兵校尉徙封西陽侯屯卒子勝嗣勝卒子世嗣徙封北鄉侯李忠字仲都東萊黃人也父為高密都尉忠元始中以父任為郎署中數十人而忠獨以好禮修整稱王莽時為新博屬長郡中咸敬信之更始立使使者行郡國即拜忠都尉官忠遂與任光同奉世祖以為右大將軍封武固侯時世祖自解所佩綬以帶忠因從攻下屬縣至苦陘世祖會諸將問所得財物唯忠獨無所掠世祖曰我欲特賜李忠諸卿得無望乎即以所乘大驪馬及繡被衣物賜之進圍鉅鹿未下王郎遣將攻信都信都大姓馬寵等開城內之收太守宗廣及忠母妻而令親屬招呼忠時寵弟從忠為校尉忠即時召見責數以背恩反城因格殺之諸將皆驚曰家屬在人手中殺其弟何猛也忠曰若縱賊不誅則二心也世祖聞而美之謂忠曰今吾兵已成矣將軍可歸救老母妻子宜自募吏民能得家屬者賜錢千萬來從我取忠曰蒙明公大恩思得効命誠不敢內顧宗親世祖迺使任光將兵救信都光兵於道散降王郎無功而還會更始遣將攻破信都忠家屬得全世祖因使忠還行太守事收郡中大姓附邯鄲者誅殺數百人及任光歸郡忠迺還復為都尉建武二年更封中水侯食邑三千戶其年徵拜五官中郎將從平龐萌董憲等六年遷丹陽太守是時海內新定南方海濱江淮多擁兵據土忠到郡招懷降附其不服者悉誅之旬月皆平忠以丹陽越俗不好學嫁娶禮儀衰於中國乃為起學校習禮容春秋鄉飲選用明經郡中向慕之墾田增多三歲閒流民占著者五萬餘口十四年三公奏課為天下第一遷豫章太守病去官徵詣京師十九年卒子威嗣威卒子純嗣永平九年坐母殺純叔父國除永初七年鄧太后復封純琴亭侯純卒子廣嗣萬脩字君游扶風茂陵人也更始時為信都令與太守任光都尉李忠共城守迎世祖拜為偏將軍封造義侯及破邯鄲拜右將軍從平河北建武二年更封槐里侯與揚化將軍堅鐔俱擊南陽未剋而病卒于軍子普嗣徙封泫氏侯普卒子親嗣徙封扶柳侯親卒無子國除永初七年鄧太后紹封脩曾孫豐為曲平亭侯豐卒子熾嗣永建元年熾卒無子國除延熹二年桓帝紹封脩玄孫恭為門德亭侯邳彤字偉君信都人也父吉為遼西太守彤初為王莽和成卒正世祖徇河北至下曲陽彤舉城降復以為太守留止數日世祖北至薊會王郎兵起使其將徇地所到縣莫不奉迎唯和成信都堅守不下彤聞世祖從薊還失軍欲至信都乃先使五官掾張萬督郵尹綏選精騎二千餘匹掾路迎世祖軍彤尋與世祖會信都世祖雖得二郡之助而兵衆未合議者多言可因信都兵自送西還長安彤廷對曰議者之言皆非也吏民歌吟思漢久矣故更始舉尊號而天下響應三輔清宮除道以迎之一夫荷戟大呼則千里之將無不捐城遁逃虜伏請降自上古以來亦未有感物動民其如此者也又卜者王郎假名因埶驅集烏合之衆遂震燕趙之地況明公奮二郡之兵揚響應之威以攻則何城不克以戰則何軍不服今釋此而歸豈徒空失河北必更驚動三輔墮損威重非計之得者也若明公無復征伐之意則雖信都之兵猶難會也何者明公既西即邯鄲城民不肯捐父母背城主而千里送公其離散亡逃可必也世祖善其言而止即日拜彤為後大將軍和成太守如故使將兵居前比至堂陽堂陽已反屬王郎彤使張萬尹綏先曉譬吏民世祖夜至即開門出迎引兵擊破白奢賊於中山自此常從戰攻信都復反為王郎郎所置信都王捕繫彤父弟及妻子使為手書呼彤曰降者封爵不降族滅彤涕泣報曰事君者不得顧家彤親屬所以至今得安於信都者劉公之恩也公方爭國事彤不得復念私也會更始所遣將攻拔信都郎兵敗走彤家屬得免及拔邯鄲封武義侯建武元年更封靈壽侯行大司空事帝入洛陽拜彤太常月餘日轉少府是年免復為左曹侍中常從征伐六年就國彤卒子湯嗣九年徙封樂陵侯十九年湯卒子某嗣無子國除元初元年鄧太后紹封彤孫音為平亭侯音卒子柴嗣初張萬尹綏與彤俱迎世祖皆拜偏將軍亦從征伐萬封重平侯綏封平臺侯論曰凡言成事者以功著易顯謀幾初者以理隱難昭斯固原情比迹所宜推察者也若迺議者欲因二郡之衆建入關之策委成業臨不測而世主未悟謀夫景同邳彤之廷對其為幾乎語曰一言可以興邦斯近之矣劉植字伯先鉅鹿昌城人也王郎起植與弟喜從兄歆率宗族賓客聚兵數千人據昌城聞世祖從薊還迺開門迎世祖以植為驍騎將軍喜歆偏將軍皆為列侯時真定王劉揚起兵以附王郎衆十餘萬世祖遣植說揚揚迺降世祖因留真定納郭后后即揚之甥也故以此結之迺與揚及諸將置酒郭氏漆里舍揚擊筑為歡因得進兵拔邯鄲從平河北建武二年更封植為昌城侯討密縣賊戰歿子向嗣帝使喜代將植營復為驍騎將軍封觀津侯喜卒復以歆為驍騎將軍封浮陽侯喜歆從征伐皆傳國于後向徙封東武陽侯卒子述嗣永平十五年坐與楚王英謀反國除耿純字伯山鉅鹿宋子人也父艾為王莽濟平尹純學於長安因除為納言士王莽敗更始立使舞陰王李軼降諸郡國純父艾降還為濟南太守時李軼兄弟用事專制方面賓客游說者甚衆純連求謁不得通久之迺得見因說軼曰大王以龍虎之姿遭風雲之時奮迅拔起期月之閒兄弟稱王而德信不聞於士民功勞未施於百姓寵祿暴興此智者之所忌也兢兢自危猶懼不終而況沛然自足可以成功者乎軼奇之且以其鉅鹿大姓迺承制拜為騎都尉授以節令安集趙魏會世祖度河至邯鄲純即謁見世祖深接之純退見官屬將兵法度不與它將同遂求自結納獻馬及縑帛數百匹世祖北至中山留純邯鄲會王郎反世祖自薊東南馳純與從昆弟訢宿植共率宗族賓客二千餘人老病者皆載木自隨奉迎於育拜純為前將軍封耿鄉侯訢宿植皆偏將軍使與純居前降宋子從攻下曲陽及中山是時郡國多降邯鄲者純恐宗家懷異心迺使訢宿歸燒其廬舍世祖問純故對曰竊見明公單車臨河北非有府臧之蓄重賞甘餌可以聚人者也徒以恩德懷之是故士衆樂附今邯鄲自立北州疑惑純雖舉族歸命老弱在行猶恐宗人賓客半有不同心者故燔燒屋室絕其反顧之望世祖歎息及至鄗世祖止傳舍鄗大姓蘇公反城開門內王郎將李惲純先覺知將兵逆與惲戰大破斬之從平邯鄲又破銅馬時赤眉青犢上江大彤鐵脛五幡十餘萬衆並在射犬世祖引兵將擊之純軍在前去衆營數里賊忽夜攻純雨射營中士多死傷純勒部曲堅守不動選敢死二千人俱持彊弩各傅三矢使銜枚閒行繞出賊後齊聲呼譟彊弩並發賊衆驚走追擊遂破之馳騎白世祖世祖明旦與諸將俱至營勞純曰昨夜困乎純曰賴明公威德幸而獲全世祖曰大兵不可夜動故不相救耳軍營進退無常卿宗族不可悉居軍中迺以純族人耿伋為蒲吾長悉令將親屬居焉世祖即位封純高陽侯擊劉永於濟陰下定陶初純從攻王郎墯馬折肩時疾發迺還詣懷宮帝問卿兄弟誰可使者純舉從弟植於是使植將純營純猶以前將軍從時真定王劉揚復造作讖記云赤九之後癭揚為主揚病癭欲以惑衆與綿曼賊交通建武二年春遣騎都尉陳副游擊將軍鄧隆徵揚揚閉城門不內副等乃復遣純持節行赦令於幽冀所過並使勞慰王侯密勑純曰劉揚若見因而收之純從吏士百餘騎與副隆會元氏俱至真定止傳舍揚稱病不謁以純真定宗室之出遣使與純書欲相見純報曰奉使見王侯牧守不得先詣如欲面會宜出傳舍時揚弟林臨邑侯讓及從兄細各擁兵萬餘人揚自恃衆強而純意安靜即從官屬詣之兄弟並將輕兵在門外揚入見純純接以禮敬因延請其兄弟皆入迺閉閤悉誅之因勒兵而出真定震怖無敢動者帝憐揚讓謀未發並封其子復故國純還京師因自請曰臣本吏家子孫幸遭大漢復興聖帝受命備位列將爵為通侯天下略定臣無所用志願試治一郡盡力自效帝笑曰卿既治武復欲修文邪迺拜純為東郡太守時東郡未平純視事數月盜賊清寧四年詔純將兵擊更始東平太守范荊荊降進擊太山濟南及平原賊皆平之居東郡四歲時發干長有罪純案奏圍守之奏未下長自殺純坐免以列侯奉朝請從擊董憲道過東郡百姓老小數千隨車駕涕泣云願復得耿君帝謂公卿曰純年少被甲冑為軍吏耳治郡迺能見思若是乎六年定封為東光侯純辭就國帝曰文帝謂周勃丞相吾所重君為我率諸侯就國今亦然也純受詔而去至鄴賜穀萬斛到國弔死問病民愛敬之八年東郡濟陰盜賊羣起遣大司空李通橫野大將軍王常擊之帝以純威信著於衞地遣使拜太中大夫使與大兵會東郡東郡聞純入界盜賊九千餘人皆詣純降大兵不戰而還璽書復以為東郡太守吏民悅服十三年卒官謚曰成侯子阜嗣植後為輔威將軍封武邑侯宿至代郡太守封遂鄉侯訢為赤眉將軍封著武侯從鄧禹西征戰死雲陽凡宗族封列侯者四人關內侯者三人為二千石者九人阜徙封莒鄉侯永平十四年坐同族耿歙與楚人顏忠辭語相連國除建初二年肅宗追思純功紹封阜子盱為高亭侯盱卒無嗣帝復封盱弟騰卒子忠嗣忠卒孫緒嗣贊曰任邳識幾嚴城解扉委佗還旅二守焉依純植義發奉兵佐威
