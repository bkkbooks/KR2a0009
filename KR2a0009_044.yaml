body:
  text: 後漢書卷四十上班彪列傳第三十上自東都主人以下分為下卷班彪字叔皮扶風安陵人也祖況成帝時為越騎校尉父稚哀帝時為廣平太守彪性沈重好古年二十餘更始敗三輔大亂時隗囂擁衆天水彪乃避難從之囂問彪曰往者周亡戰國並爭天下分裂數世然後定意者從橫之事復起於今乎將承運迭興在於一人也願生試論之對曰周之廢興與漢殊異昔周爵五等諸侯從政本根既微枝葉彊大故其末流有從橫之事埶數然也漢承秦制改立郡縣主有專己之威臣無百年之柄至於成帝假借外家哀平短祚國嗣三絕故王氏朝因竊號位危自上起傷不及下是以即真之後天下莫不引領而歎十餘年閒中外搔擾遠近俱發假號雲合咸稱劉氏不謀同辭方今雄桀帶州域者皆無七國世業之資而百姓謳吟思仰漢德已可知矣囂曰生言周漢之埶可也至於但見愚人習識劉氏姓號之故而謂漢家復興疎矣昔秦失其鹿劉季逐而羈之時人復知漢乎彪既疾囂言又傷時方艱乃著王命論以為漢德承堯有靈命之符王者興祚非詐力所致欲以感之而囂終不寤遂避河西河西大將軍竇融以為從事深敬待之接以師友之道彪乃為融畫策事漢總西河以拒隗囂及融徵還京師光武問曰所上章奏誰與參之融對曰皆從事班彪所為帝雅聞彪才因召入見舉司隸茂才拜徐令以病免後數應三公之命輒去彪既才高而好述作遂專心史籍之閒武帝時司馬遷著史記自太初以後闕而不錄後好事者頗或綴集時事然多鄙俗不足以踵繼其書彪乃繼採前史遺事傍貫異聞作後傳數十篇因斟酌前史而譏正得失其略論曰曰楚之檮杌晉之乘魯之春秋其事一也定哀之閒魯君子左丘明論集其文作左氏傳三十篇又撰異同號曰國語二十一篇由是乘檮杌之事遂闇而左氏國語獨章又有記錄黃帝以來至春秋時帝王公侯卿大夫號曰世本一十五篇春秋之後七國並爭秦并諸侯則有戰國策三十三篇漢興定天下太中大夫陸賈記錄時功作楚漢春秋九篇孝武之世太史令司馬遷採左氏國語刪世本戰國策據楚漢列國時事上自黃帝下訖獲麟作本紀世家列傳書表凡百三十篇而十篇缺焉遷之所記從漢元至武以絕則其功也至於採經摭傳分散百家之事甚多疎略不如其本務欲以多聞廣載為功論議淺而不篤其論術學則崇黃老而薄五經序貨殖則輕仁義而羞貧窮道游俠則賤守節而貴俗功此其大敝傷道所以遇極刑之咎也然善述序事理辯而不華質而不野文質相稱蓋良史之才也誠令遷依五經之法言同聖人之是非意亦庶幾矣所以知古後之所由觀前聖人之耳目也司馬遷序帝王則曰本紀公侯傳國則曰世家卿士特起則曰列傳又進項羽陳涉而黜淮南衡山細意委曲條列不經若遷之著作採獲古今貫穿經傳至廣博也一人之精文重思煩故其書刊落不盡尚有盈辭多不齊一若序司馬相如舉郡縣著其字至蕭曹陳平之屬及董仲舒並時之人不記其字或縣而不郡者蓋不暇也今此後篇慎覈其事整齊其文不為世家唯紀傳而已傳曰殺史見極平易正直春秋之義也彪復辟司徒玉況府時東宮初建諸王國並開而官屬未備師保多闕彪上言曰齊不能無齊言也習與惡人居不能無為惡猶生長於楚不能無楚言也是以聖人審所與居而戒慎所習昔成王之為孺子出則周公邵公太公史佚入則大顛閎夭南宮括散宜生左右前後禮無違者故成王一日即位天下曠然太平是以春秋愛子教以義方不納於邪驕奢淫佚所自邪也詩云詒厥孫謀以宴翼子言武王之謀遺子孫也向王襃蕭望之周堪之徒以文章儒學保訓東宮以下莫不崇簡其人就成德器今皇太子諸王雖結髮學問脩習禮樂而傅相未值賢才官屬多闕舊典宜博選名儒有威重明通政事者以為太子太傅東宮及諸王國備置官屬又舊制太子食湯沐十縣設周衞交戟五日一朝因坐東箱省視膳食其非朝日使僕中允旦旦請問而已明不媟黷廣其敬也後察司徒廉為望都長吏民愛之建武三十年年五十二卒官所著賦論書記奏事合九篇二子固超超別有傳論曰班彪以通儒上才傾側危亂之閒行不踰方言不失正仕不急進貞不違人敷文華以緯國典守賤薄而無悶容彼將以世運未弘非所謂賤焉恥乎何其守道恬淡之篤也固字孟堅年九歲能屬文誦詩賦及長遂博貫載籍九流百家之言無不窮究所學無常師不為章句舉大義而已性寬和容衆不以才能高人諸儒以此慕之永平初東平王蒼以至戚為驃騎將軍輔政開東閤延英雄時固始弱冠奏記說蒼曰詩書所載未有三此者也傳曰必有非常之人然後有非常之事有非常之事然後有非常之功固幸得生於清明之世豫在視聽之末私以螻螘竊觀國政誠美將軍擁千載之任躡先聖之蹤體弘懿之姿據高明之埶博貫庶事服膺六蓺白黑簡心求善無猒採擇狂夫之言不逆負薪之議竊見幕府新開廣延羣俊四方之士顛倒衣裳將軍宜詳唐殷之舉察伊臯之薦令遠近無偏幽隱必達期於總覽賢才收集明智為國得人以寧本朝則將軍養志和神優游廟堂光名宣於當世遺烈著於無窮暉當世之俊彥也京兆祭酒晉馮結髮修身白首無違好古樂道玄默自守古人之美行時俗所莫及扶風掾李育經明行著教授百人客居杜陵茅室土階京兆扶風二郡更請徒以家貧數辭病去溫故知新論議通明廉清修絜行能純備雖前世名儒國家所器韋平孔翟無以加焉宜令考續以參萬事京兆督郵郭基孝行著於州里經學稱於師門政務之績有絕異之效如得及明時秉事下僚進有羽翮奮翔之用退有嵵梁一介之死涼州從事王雍躬卞嚴之節文之以術蓺涼州冠蓋未有宜先雍者也古者周公一舉則三方怨曰奚為而後己宜及府開以慰遠方弘農功曹史殷肅達學洽聞才能絕倫誦詩三百奉使專對此六子者皆有殊行絕才德隆當世如蒙徵納以輔高明此山梁之秋夫子所為歎也昔卞和獻寶以離斷趾靈均納忠終於沈身而和氏之璧千載垂光屈子之篇萬世歸善願將軍隆照微之明信日之聽少屈威神咨嗟下問令塵埃之中永無荊山汨羅之恨父彪卒歸鄉里固以彪所續前史未詳乃潛精研思欲就其業既而有人上書顯宗告固私改作國史者有詔下郡收固繫京兆獄盡取其家書先是扶風人蘇朗偽言圖讖事下獄死固弟超恐固為郡所覈考不能自明乃馳詣闕上書得召見具言固所著述意而郡亦上其書顯宗甚奇之召詣校書部除蘭臺令史與前睢陽令陳宗長陵令尹敏司隸從事孟異共成世祖本紀遷為郎典校祕書固又撰功臣平林新市公孫述事作列傳載記二十八篇奏之帝乃復使終成前所著書固以為漢紹堯運以建帝業至於六世史臣乃追述功德私作本紀編於百王之末廁於秦項之列太初以後闕而不錄故探撰前記綴集所聞以為漢書起元高祖終于孝平王莽之誅十有二世二百三十年綜其行事傍貫五經上下洽通為春秋考紀表志傳凡百篇固自永平中始受詔潛精積思二十餘年至建初中乃成當世甚重其書學者莫不諷誦焉自為郎後遂見親近時京師脩起宮室濬繕城隍而關中耆老猶望朝廷西顧固感前世相如壽王東方之徒造搆文辭終以諷勸乃上兩都賦盛稱洛邑制度之美以折西賓淫侈之論其辭曰弗康寔用西遷作我上都主人聞其故而覩其制乎主人曰未也願賓攄懷舊之蓄念發思古之幽情博我以皇道弘我以漢京賓曰唯唯之山右界襃斜隴首之險帶以洪河涇渭之川華實之毛則九州之上腴焉防禦之阻則天下之奧區焉是故橫被六合三成帝畿周以龍興秦以虎視及至大漢受命而都之也仰寤東井之精俯協河圖之靈奉春建策留侯演成天人合應以發皇明乃眷西顧寔惟作京於是睎秦領睋北阜挾酆霸據龍首圖皇基於億載度宏規而大起肇自高而終平世增飾以崇麗歷十二之延祚故窮奢而極侈建金城其萬雉呀周池而成淵披三條之廣路立十二之通門內則街衢洞達閭閻且千九市開場貨別隧分人不得顧車不得旋闐城溢郭傍流百廛紅塵四合煙雲相連於是既庶且富娛樂無疆都人士女殊異乎五方游士擬於公侯列肆侈於姬姜鄉曲豪俊游俠之雄節慕原嘗名亞春陵連交合衆騁騖乎其中域黻冕所興冠蓋如雲七相五公與乎州郡之豪桀五都之貨殖三選七遷充奉陵邑蓋以彊幹弱枝隆上都而觀萬國封畿之內厥土千里逴犖諸夏兼其所有其陽則崇山隱天幽林穹谷陸海珍藏藍田美玉商洛緣其隈鄠杜濱其足源泉灌注陂池交屬竹林果園芳草甘木郊野之富號曰近蜀其陰則冠以九嵕陪以甘泉乃有靈宮起乎其中秦漢之所極觀淵雲之所頌歎於是乎存焉下有鄭白之沃衣食之源隄封五萬疆埸綺分溝塍刻鏤原隰龍鱗決渠降雨荷臿成雲五穀垂穎桑麻敷棻東郊則有通溝大漕潰渭洞河泛舟山東控引淮湖與海通波西郊則有上囿禁苑林麓藪澤陂池連乎蜀漢繚以周牆四百餘里離宮別館三十六所神池靈沼往往而在其中乃有九真之麟大宛之馬黃支之犀條枝之鳥踰崐崘越巨海殊方異類至三萬里中天之華闕豐冠山之朱堂因瑰材而究奇抗應龍之虹梁列棼橑以布翼荷棟桴而高驤雕玉瑱以居楹裁金璧以飾璫發五色之渥采光爓朗以景彰於是左墄右平重軒三階閨房周通門闥洞開列鍾虡於中庭立金人於端闈仍增崖而衡閾臨峻路而啟扉徇以離殿別寢承以崇臺閒舘煥若列星紫宮是環清涼宣溫神仙長年金華玉堂白虎麒麟區宇若茲不可殫論增槃業峨登降炤爛殊形詭制每各異觀乘茵步輦唯所息宴後宮則有掖庭椒房后妃之室合歡增成安處常寧茝若椒風披香發越蘭林蕙草鴛鸞飛翔之列昭陽特盛隆乎孝成屋不呈材牆不露形裛以藻繡絡以綸連隨侯明月錯落其閒金釭銜璧是為列錢翡翠火齊流燿含英懸黎垂棘夜光在焉於是玄墀釦切玉階彤庭磩采緻琳珉青熒珊瑚碧樹周阿而生紅羅颯纚綺組繽紛精曜華燭俯仰如神後宮之號十有四位窈窕繁華更盛迭貴處乎斯列者蓋以百數左右廷中朝堂百僚之位蕭曹魏邴謀謨乎其上佐命則垂統輔翼則成化流大漢之愷悌蕩亡秦之毒螫故令斯人揚樂和之聲作畫一之歌功德著於祖宗膏澤洽于黎庶又有天祿石渠典籍之府命夫諄誨故老名儒師傅講論乎六蓺稽合乎同異又有承明金馬著作之庭大雅宏達於茲為羣元元本本周見洽聞啟發篇章校理祕文周以鉤陳之位衞以嚴更之署總禮官之甲科羣百郡之廉孝虎賁贅衣閹尹閽寺陛戟百重各有攸司周廬千列徼道綺錯輦路經營脩涂飛閣自未央而連桂宮北彌明光而絙長樂陵墱道而超西墉混建章而外屬設璧門之鳳闕上柧棱而棲金雀內則別風之嶕嶢眇麗巧而竦擢張千門而立萬戶順陰陽以開闔爾乃正殿崔巍層構厥高臨乎未央經駘盪而出馺娑洞枍詣與天梁上反宇以蓋戴激日景而納光神明鬱其特起遂偃蹇而上躋軼雲雨於太半虹霓回帶於棼楣雖輕迅與僄狡猶愕眙而不敢階攀井幹而未半目眴轉而意迷舍櫺檻而卻倚若顛墜而復稽魂怳怳以失度巡回涂而下低既懲懼於登望降周流以彷徨步甬道以縈紆又杳窱而不見陽排飛闥而上出若游目於天表似無依之而洋洋前唐中而後太液攬滄海之湯湯揚波濤於碣石激神嶽之嶈嶈濫瀛洲與方壺蓬萊起乎中央於是靈草冬榮神木叢生巖峻崔崒金石崢嶸抗仙掌與以承露擢雙立之金莖軼埃壒之混濁鮮顥氣之清英騁文成之丕誕馳五利之所刑庶松喬之羣類時游從乎斯庭實列仙之攸館匪吾人之所寧起鳥詔梁野而驅獸毛羣內闐飛羽上覆接翼側足集禁林而屯聚水衡虞人理其營表種別羣分部曲有署罘罔連紘籠山絡野列卒周帀星羅雲布於是乘鑾輿備法駕帥羣臣披飛廉入苑門遂繞酆鎬歷上蘭六師發冑百獸駭殫震震爚爚雷奔電激草木塗地山淵反覆蹂蹸其十二三乃拗怒而少息爾乃期門佽飛列刃鑽鍭要趹追蹤鳥驚觸絲獸駭值鋒機不掎弦不再控矢無單殺中必疊雙颮颮紛紛矰繳相纏風毛雨血灑野蔽天平原赤勇士厲猨狖失木豺狼攝竄爾乃移師趨險並蹈潛穢窮虎奔突狂兕觸蹷許少施巧秦成力折掎僄狡猛噬脫角挫脰徒搏獨殺挾師豹拖熊螭頓犀犛曳豪羆超迥壑越峻崖蹷巉巖鉅石隤松栢仆叢林摧草木無餘禽獸殄夷於是天子乃登屬玉之館歷長楊之榭覽山川之體埶觀三軍之殺獲原野蕭條目極四裔禽相鎮厭獸相枕藉然後收禽會衆論功賜胙陳輕騎以行炰騰酒車而斟酌割鮮野食舉燧命爵饗賜畢勞逸齊大輅鳴鸞容與回集乎豫章之宇臨乎昆明之池左牽牛而右織女似雲漢之無崖茂樹蔭蔚芳草被堤蘭茝發色曄曄猗猗若摛錦布繡燭燿乎其陂玄鶴白鷺黃鵠鵁鸛鶬鴰鴇鶂鳧鷖鴻鴈朝發河海夕宿江漢沈浮往來雲集霧散於是後宮乘輚路登龍舟張鳳蓋建華旗袪黼帷鏡清流靡微風澹淡浮櫂女謳鼓吹震聲激越謍厲天鳥羣翔魚闚淵招白閒下雙鵠揄文竿出比目撫鴻幢御矰繳方舟並騖俛仰極樂遂風舉雲搖浮遊普覽前乘秦領後越九嵕東薄河華西涉岐雍宮館所歷百有餘區行所朝夕儲不改供禮上下而接山川究休祐之所用採遊童之歡謠第從臣之嘉頌于斯之時都都相望邑邑相屬國藉十世之基家承百年之業士食舊德之名氏農服先疇之畎畝商修族世之所鬻工用高曾之規矩粲乎隱隱各得其所
