body:
  text: 後漢書志第二十八百官五州郡縣鄉亭里胸奴中郎將烏桓校尉護羌校尉王國宋衛國列侯關內侯四夷國百官奉外十二州每州刺史一人六百石本注曰秦有監御史監諸郡漢興省之但遣丞相史分刺諸州無常官孝武帝初置刺史十三人秩六百石成帝更為牧秩二千石建武十八年復為刺史十二人各主一州其一州屬司隸校尉諸州常以八月巡行所部郡國録囚徒考殿最初歲盡詣京都奏事中興但因計吏皆有從事史假佐本注曰員職略與司隸同無都官從事其功曹從事為治中從事豫州部郡國六冀州部九兗州部八徐州部五青州部六荊州部七揚州部六益州部十二涼州部十二并州部九幽州部十一交州部七凡九十八其二十七王國相其七十一郡太守其屬國都尉屬國分郡離遠縣置之如郡差小置本郡名世祖并省郡縣四百餘所後世稍復增之凡州所監都為京都置尹一人二千石丞一人每郡置太守一人二千石丞一人郡當邊戍者丞為長史王國之相亦如之每屬國置都尉一人比二千石丞一人本注曰凡郡國皆掌治民進賢勸功決訟檢姦常以春行所主縣勸民農桑振救乏絶秋冬遣無害吏案訊諸囚平其罪法論課殿最歲盡遣吏上計并舉孝廉郡口二十萬舉一人尉一人典兵禁備盜賊景帝更名都尉武帝又置三輔都尉各一人譏出入邊郡置農都尉主屯田殖穀又置屬國都尉主蠻夷降者中興建武六年省諸郡都尉并職太守無都試之役省關都尉唯邊郡往往置都尉及屬國都尉稍有分縣治民比郡安帝以羌犯法三輔有陵園之守乃復置右扶風都尉京兆虎牙都尉皆置諸曹掾史本注曰諸曹略如公府曹無東西曹有功曹史主選署功勞有五官掾署功曹及諸曹事其監屬縣有五部督郵曹掾一人正門有亭長一人主記室史主録記書催期會無令史閣下及諸曹各有書佐幹主文書屬官每縣邑道大者置令一人千石其次置長四百石小者置長三百石侯國之相秩次亦如之本注曰皆掌治民顯善勸義禁姦罰惡理訟平賊恤民時務秋冬集課上計於所屬郡國凡縣主蠻夷曰道公主所食湯沐曰國邑縣萬戶以上為令不滿為長侯國為相皆秦制也丞各一人尉大縣二人小縣一人本注曰丞署文書典知倉獄尉主盜賊凡有賊發主名不立則推索行尋案察姦宄以起端緒各署諸曹掾史本注曰諸曹略如郡員五官為廷掾監鄉五部春夏為勸農掾秋冬為制度掾鄉置有秩三老游徼本注曰有秩郡所署秩百石掌一鄉人其鄉小者縣置嗇夫一人皆主知民善惡為役先後知民貧富為賦多少平其差品三老掌教化凡有孝子順孫貞女義婦讓財救患及學士為民法式者皆扁表其門以興善行游徼掌徼循禁司姦盜又有鄉佐屬鄉主民收賦稅亭有亭長以禁盜賊本注曰亭長主求捕盜賊承望都尉里有里魁民有什伍善惡以告本注曰里魁掌一里百家什主十家伍主五家以相檢察民有善事惡事以告監官邊縣有障塞尉本注曰掌禁備羌夷犯塞其郡有鹽官鐵官工官都水官者隨事廣狹置令長及丞秩次皆如縣道無分士給均本吏本注曰凡郡縣出鹽多者置鹽官主鹽稅出鐵多者置鐵官主鼓鑄有工多者置工官主工稅物有水池及魚利多者置水官主平水收漁稅在所諸縣均差吏更給之置吏隨事不具縣員使胸奴中郎將一人比二千石本注曰主護南單于置從事二人有事隨事增之掾隨事為員護羌烏桓校尉所置亦然護烏桓校尉一人比二千石本注曰主烏桓胡護羌校尉一人比二千石本注曰主西羌皇子封王其郡為國每置傅一人相一人皆二千石本注曰傅主導王以善禮如師不臣也相如太守有長史如郡丞漢初立諸王因項羽所立諸王之制地既廣大且至千里又其官職傅為太傅相為丞相又有御史大夫及諸卿皆秩二千石石官皆如朝廷國家唯為置丞相其御史大夫以下皆自置之至景帝時吳楚七國恃其國大遂以作亂幾危漢室及其誅滅景帝懲之遂令諸王不得治民令內史主治民改丞相曰相省御史大夫廷尉少府宗正博士官武帝改漢內史中尉郎中令之名而王國如故員職皆朝廷為署不得自置至漢成帝省內史治民更令相治民太傅但曰傅中尉一人比二千石本注曰職如郡都尉主盜賊郎中令一人僕一人皆千石本注曰郎中令掌王大夫郎中宿衛官如光祿勳自省少府職皆并焉僕主車及馭如太僕本注曰太僕比二千石武帝改但曰僕又皆減其秩治書比六百石本注曰治書本尚書更名大夫比六百石本注曰無員掌奉王使至京都奉璧賀正月及使諸國本皆持節後去節謁者比四百石本注曰掌冠長冠本員十六人後減禮樂長本注曰主樂人衛士長本注曰主衛士醫工長本注曰主醫藥永巷長本注曰宦者主宮中婢使祠祀長本注曰主祠祀皆比四百石郎中二百石本注曰無員衛公宋公本注曰建武二年封周後姬常為周承休公五年封殷後孔安為殷紹嘉公十三年改常為衛公安為宋公以為漢賓在三公上列侯所食縣為侯國本注曰承秦爵二十等為徹侯金印紫綬以賞有功功大者食縣小者食鄉亭得臣其所食吏民後避武帝諱為列侯武帝元朔二年令諸王得推恩分衆子土國家為封亦為列侯舊列侯奉朝請在長安者位次三公中興以來唯以功德賜位特進者次車騎將軍賜位朝侯次五校尉賜位祠侯次大夫其餘以胏附及公主子孫奉墳墓於京都者亦隨時見會位在博士議郎下諸王封者受茅土歸以立社稷禮也列土特進朝侯賀正月執璧云每國置相一人其秩各如本縣本注曰主治民如令長不臣也但納租于侯以戶數為限其家臣置家丞庶子各一人本注曰主侍侯使理家事列侯舊有行人洗馬門大夫凡五官中興以來食邑千戶已上置家丞庶子各一人不滿千戶不置家丞又悉省行人洗馬門大夫關內侯承秦賜爵十九等為關內侯無土寄食在所縣民租多少各有戶數為限四夷國王率衆王歸義侯邑君邑長皆有丞比郡縣百官受奉例大將軍三公奉月三百五十斛中二千石奉月百八十斛二千石奉月百二十斛比二千石奉月百斛千石奉月八十斛六百石奉月七十斛比六百石奉月五十斛四百石奉月四十五斛比四百石奉月四十斛三百石奉月四十斛比三百石奉月三十七斛二百石奉月三十斛比二百石奉月二十七斛一百石奉月十六斛斗食奉月十一斛佐史奉月八斛凡諸受奉皆半錢半穀贊曰帝道淵默冢帥修德寡以御衆分職乃克不置不監無驕無忒程是師徒寧民康國
