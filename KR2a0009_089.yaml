body:
  text: 後漢書卷八十下文苑列傳第七十下張升字彥真陳留尉氏人富平侯放之孫也升少好學多關覽而任情不羈其意相合者則傾身交結不問窮賤如乖其志好者雖王公大人終不屈從常歎曰死生有命富貴在天其有知我雖胡越可親苟不相識從物何益仕郡為綱紀以能出守外黃令吏有受賕者即論殺之或譏升守領一時何足趨明威戮乎對曰昔仲尼暫相誅齊之侏儒手足異門而出故能威震強國反其侵地君子仕不為己職思其憂豈以久近而異其度哉遇黨錮去官後竟見誅年四十九著賦誄頌碑書凡六十篇趙一字元叔漢陽西縣人也體貌魁梧身長九尺美須豪眉望之甚偉而恃才倨傲為鄉黨所擯乃作解擯後屢抵罪幾至死友人救得免一乃貽書謝恩曰之二人不遭仁遇神則結絶之氣竭矣然而糒脯出乎車軨針石運乎手爪今所賴者非直車軨之糒脯手爪之針石也乃收之於斗極還之於司命使乾皮復含血枯骨復被肉允所謂遭仁遇神真所宜傳而著之余畏禁不敢班班顯言竊為窮鳥賦一篇其辭曰右羿子彀左飛丸激矢交集于我思飛不得欲鳴不可舉頭畏觸搖足恐墯內獨怖急乍冰乍火幸賴大賢我矜我憐昔濟我南今振我西鳥也雖頑猶識密恩內以書心外用告天天乎祚賢歸賢永年且公且侯子子孫孫又作刺世疾邪賦以舒其怨憤曰伊五帝之不同禮三王亦又不同樂數極自然變化非是故相反駮德政不能救世溷亂賞罰豈足懲時清濁春秋時禍敗之始戰國愈復增其荼毒秦漢無以相踰越乃更加其怨酷寧計生民之命唯利己而自足撫拍豪強偃蹇反俗立致咎殃捷懾逐物日富月昌渾然同惑孰溫孰涼邪夫顯進直士幽藏其毛羽所惡則洗垢求其瘢痕雖欲竭誠而盡忠路絶嶮而靡緣九重既不可啓又羣吠之狺狺安危亡於旦夕肆嗜欲於目前奚異涉海之失杝積薪而待燃榮納由於閃揄孰知辨其蚩妍故法禁屈撓於藝族恩澤不逮於單門寧飢寒於堯舜之荒歲兮不飽暖於當今之豐年乘理雖死而非亡違義雖生而匪存文籍雖滿腹不如一囊錢伊優北堂上抗髒倚門邊芻賢者雖獨悟所困在羣愚且各守爾分勿復空馳驅哀哉復哀哉此是命矣夫光和元年舉郡上計到京師是時司徒袁逢受計計吏數百人皆拜伏庭中莫敢仰視一獨長揖而已逢望而異之令左右往讓之曰下郡計史吏而揖三公何也對曰昔酈食其長揖漢王今揖三公何遽怪哉逢則斂衽下堂執其手延置上坐因問西方事大悅顧謂坐中曰此人漢陽趙元叔也朝臣莫有過之者吾請為諸君分坐坐者皆屬觀既出往造河南尹羊陟不得見一以公卿中非陟無足以託名者乃日往到門陟自強許通尚臥未起一徑入上堂遂前臨之曰竊伏西州承高風舊矣乃今方遇而忽然奈何命也因舉聲哭門下驚皆奔入滿側陟知其非常人乃起延與語大奇之謂曰子出矣陟明旦大從車騎奉謁造一時諸計吏多盛飾車馬帷幕而一獨柴車草屏露宿其傍延陟前坐於車下左右莫不歎愕陟遂與言談至熏夕極歡而去執其手曰良璞不剖必有泣血以相明者矣陟乃與袁逢共稱薦之名動京師士大夫想望其風采及西還道經弘農過候太守皇甫規門者不即通一遂遁去門吏懼以白之規聞一名大驚乃追書謝曰蹉跌不面企德懷風虛心委質為日久矣側聞仁者愍其區區冀承清誨以釋遙悚今旦外白有一尉兩計吏不道屈尊門下更啓乃知已去如印綬可投夜豈待旦惟君明睿平其夙心寧當慢加於所天事在悖惑不足具責儻可原察追修前好則何福如之謹遣主簿奉書下筆氣結汗流竟趾一報曰君學成師範縉紳歸慕仰高希驥歷年滋多旋轅兼道渴於言侍沐浴晨興昧旦守門實望仁兄昭其懸以貴下賤握髮垂接高可敷玩墳典起發聖意下則抗論當世消弭時災豈悟君子自生怠倦失恂恂善誘之德同亡國驕惰之志蓋見機而作不俟終日是以夙退自引畏使君勞昔人或歷說而不遇或思士而無從皆歸之於天不尤於物今一自譴而已豈敢有猜仁君忽一匹夫於德何損而遠辱手筆追路相尋誠足愧也一之區區曷云量己其嗟可去謝也可食誠則頑薄實識其趣但關節疢動膝灸塊壞潰請俟它日乃奉其情輒誦來貺永以自慰遂去不顧州郡爭致禮命十辟公府並不就終於家初袁逢使善相者相一云仕不過郡吏竟如其言著賦頌針誄書論及雜文十六篇劉梁字曼山一名岑東平寧陽人也梁宗室子孫而少孤貧賣書於市以自資常疾世多利交以邪曲相黨乃著破羣論時之覽者以為仲尼作春秋亂臣知懼今此論之作俗士豈不愧心其文不存又著辨和同之論其辭曰夫事有違而得道有順而失義有愛而為害有惡而為美其故何乎蓋明智之所得暗僞之所失也是以君子之於事也無適無莫必考之以義焉焉酸苦以劑其味君子食之以平其心同如水焉若以水濟水誰能食之琴瑟之專一誰能聽之是以君子之行周而不比和而不同以救過為正以匡惡為忠經曰將順其美匡救其惡則上下和睦能相親也師不穀之罪也若以宗廟之靈得保首領以歿請為靈若厲大夫許諸及其卒也子囊曰不然夫事君者從其善不從其過赫赫楚國而君臨之撫正南海訓及諸夏其寵大矣有是寵也而知其過可不謂恭乎大夫從之此違而得道者也及靈王驕淫暴虐無度芋尹申亥從王之欲以殯於乾溪殉之二女此順而失義者也鄢陵之役晉楚對戰陽穀獻酒子反以斃此愛而害之者也臧武仲曰孟孫之惡我藥石也季孫之愛我美疢也疢毒滋厚石猶生我此惡而為美者也孔子曰智之難也有臧武仲之智而不容於魯國抑有由也作不順而施不恕也蓋善其知義譏其違道也智之不及又在及而違之者矣故曰智及之仁不能守之雖得之必失之也夏書曰念茲在茲庶事恕施忠智之謂矣道則兄弟不阿苟得其義雖仇讎不廢故解狐蒙祁奚之薦二叔被周公之害勃鞮以逆文為成傅瑕以順厲為敗管蘇以憎忤取進申侯以愛從見退考之以義也故曰不在逆順以義為斷不在憎愛以道為貴禮記曰愛而知其惡憎而知其善考義之謂也桓帝時舉孝廉除北新城長告縣人曰昔文翁在蜀道著巴漢庚桑瑣隸風移碨磊吾雖小宰猶有社稷苟赴期會理文墨豈本志乎乃更大作講舍延聚生徒數百人朝夕自往勸誡身執經卷試策殿最儒化大行此邑至後猶稱其教焉特召入拜尚書郎纍遷後為野王令未行光和中病卒孫楨亦以文才知名邊讓字文禮陳留浚儀人也少辨博能屬文作章華賦雖多淫麗之辭而終之以正亦如相如之諷也其辭曰隩南眺巫山之阿延目廣望騁觀終日顧謂左史倚相曰盛哉斯樂可以遺老而忘死也於是遂作章華之臺築乾溪之室窮木土之技單珍府之實舉國營之數年乃成設長夜之淫宴作北里之新聲於是伍舉知夫陳蔡之將生謀也乃作斯賦以諷之商之大彭兮越隆周之兩虢達皇佐之高勳兮馳仁聲之顯赫惠風春施神武電斷華夏肅清五服攸亂旦垂精於萬機兮夕回輦於門館設長夜之歡飲兮展中情之嬿婉竭四海之妙珍兮盡生人之祕玩清池兮靡微風而行舟登瑤臺以回望兮冀彌日而消憂於是招宓妃命湘娥齊倡列鄭女羅揚激楚之清宮兮展新聲而長歌繁手超於北里妙舞麗於陽阿金石類聚絲竹羣分被輕袿曳華文羅衣飄颻組綺繽紛縱輕軀以迅赴若孤鵠之失羣振華袂以逶迤若遊龍之登雲於是歡嬿既洽長夜向半琴瑟易調繁手改彈清聲發而響激微音逝而流散振弱支而紆繞兮若緑繁之垂幹忽飄颻以輕逝兮似鸞飛於天漢舞無常態鼓無定節尋聲響應修短靡跌長袖奮而生風清氣激而繞結爾乃妍媚遞進巧弄相加俯仰異容忽兮神化體迅輕鴻榮曜春華進如浮雲退如激波雖復柳惠能不咨嗟於是天河既回淫樂未終清籥發徵激楚揚風於是音氣發於絲竹兮飛響軼於雲中比目應節而雙躍兮孤雌感聲而鳴雄美繁手之輕妙兮嘉新聲之彌隆於是衆變已盡羣樂既考歸乎生風之廣夏兮修黃軒之要道攜西子之弱腕兮援毛嬪之素肘形便娟以嬋媛兮若流風之靡草美儀操之姣麗兮忽遺生而忘老才悟稼穡之艱難美呂尚之佐周善管仲之輔桓將超世而作理焉沈湎於此歡於是罷女樂墮瑤臺思夏禹之卑宮慕有虞之土階舉英奇於仄陋拔髦秀於蓬萊君明哲以知人官隨任而處能百揆時庶績咸熙諸侯慕義不召同期繼高陽之絶軌崇成莊之洪基雖齊桓之一匡豈足方於大持爾乃育之以仁臨之以明致虔報於鬼神盡肅恭乎上京馳淳化於黎元永歷世而太平大將軍何進聞讓才名欲辟命之恐不至詭以軍事徵召既到署令史進以禮見之讓善占謝射能辭對時賓客滿堂莫不羡其風府掾孔融王朗並修刺候焉議郎蔡雍深敬之以為讓宜處高任乃薦於何進曰伏惟幕府初開博選清英華髮舊德並為元龜雖振鷺之集西雍濟濟之在周庭無以或加竊見令史陳留邊讓天授逸才聰明賢智髫夙孤不盡家訓及就學廬便受大典初涉諸經見本知義授者不能對其問章句不能逮其意心通性達口辨辭長非禮不動非法不言若處狐疑之論定嫌審之分經典交至撿括參合衆夫寂焉莫之能奪也使讓生在唐虞則元凱之次運值仲尼則顏冉之亞豈徒俗之凡偶近器而已者哉階級名位亦宜超然若復隨輩而進非所以章瓌偉之高價昭知人之絶明也傳曰函牛之鼎以亨雞多汁則淡而不可食少汁則熬而不可熟此言大器之於小用固有所不宜也雍竊悁邑怪此寶鼎未受犧牛大羹之和久在煎熬臠割之閒願明將軍回謀垂慮裁加少納貢之機密展之力用若以年齒為嫌則顏回不得貫德行之首子奇終無理阿之功苟堪其事古今一也讓後以高才擢進屢遷出為九江太守不以為能也初平中王室大亂讓去官還家恃才氣不屈曹操多輕侮之言建安中其鄉人有搆讓於操操告郡就殺之文多遺失酈炎字文勝范陽人酈食其之後也炎有文才解音律言論給捷多服其能理靈帝時州郡辟命皆不就有志氣作詩二篇曰千里足超邁絶塵驅忽誰能逐賢愚豈常類稟性在清濁富貴有人籍貧賤無天録通塞苟由己志士不相卜陳平敖里社韓信釣河曲終居天下宰食此萬鍾祿德音流千載功名重山嶽文質道所貴遭時用有嘉絳灌臨衡宰謂誼崇浮華賢才抑不用遠投荊南沙抱玉乘龍驥不逢樂與和安得孔仲尼為世陳四科炎後風病慌忽性至孝遭母憂病甚發動妻始産而驚死妻家訟之收繫獄炎病不能理對熹平六年遂死獄中時年二十八尚書盧植為之誄讚以昭其懿德侯瑾字子瑜敦煌人也少孤貧依宗人居性篤學恆傭作為資暮還輒柴以讀書常以禮自牧獨處一房如對嚴賓焉州郡纍召公車有道徵並稱疾不到作矯世論以譏切當時而徙入山中覃思著述以莫知於世故作應賓難以自寄又案漢記撰中興以後行事為皇德傳三十篇行於世餘所作雜文數十篇多亡失西河西人敬其才而不敢名之皆稱為侯君云高彪字義方吳郡無錫人也家本單寒至彪為諸生遊太學有雅才而訥於言嘗從馬融欲訪大義融疾不獲見乃覆刺遺融書曰承服風問從來有年故不待介者而謁大君子之門冀一見龍光以腹心之願不圖遭疾幽閉莫啓昔周公旦父文兄武九命作伯以尹華夏猶揮沐吐餐垂接白屋故周道以隆天下歸德公今養痾傲士故其宜也融省書慙追謝還之彪逝而不顧後郡舉孝廉試經第一除郎中校書東觀數奏賦頌奇文因事諷諫靈帝異之時京兆第五永為督軍御史使督幽州百官大會祖餞於長樂觀議郎蔡雍等皆賦詩彪乃獨作針曰文武將墜乃俾俊臣整我皇綱董此不虔古之君子即戎忘身明其果毅尚其桓桓呂尚七十氣冠三軍詩人作歌如鷹如鸇天有太一五將三門地有九變丘陵山川人有計策六奇五閒總茲三事謀則咨詢無曰己能務在求賢淮陰之勇廣野是尊周公大聖石碏純臣以威克愛以義滅親勿謂時險不正其身勿謂無人莫識己真忘富遺貴福祿乃存枉道依合復無所觀先公高節越可永遵佩藏斯戒以厲終身雍等甚美其文以為莫尚也後遷內外黃令帝勑同僚臨送祖於上東門詔東觀畫彪像以勸學者彪到官有德政上書薦縣人申徒蟠等病卒於官文章多亡子岱亦知名張超字子並河閒鄚人也留侯良之後也有文才靈帝時從車騎將軍朱俊征黃巾為別部司馬著賦頌碑文薦檄箋書謁文嘲凡十九篇超又善於草書妙絶時人世共傳之禰衡字正平平原般人也少有才辨而尚氣剛傲好矯時慢物興平中避難荊州建安初來遊許下始達潁川乃陰懷一刺既而無所之適至於刺字漫滅是時許都新建賢士大夫四方來集或問衡曰盍從陳長文司馬伯達乎對曰吾焉能從屠沽兒耶又問荀文若趙稚長云何衡曰文若可借面弔喪稚長可使監請客唯善魯國孔融及弘農楊修常稱曰大兒孔文舉小兒楊德祖餘子碌碌莫足數也融亦深愛其才衡始弱冠而融年四十遂與為交友上疏薦之曰臣聞洪水橫流帝思俾乂旁求四方以招賢俊昔孝武繼統將弘祖業疇咨熙載羣士響臻陛下睿聖纂承基緒遭遇厄運勞謙日惟嶽降神異人並出竊見處士平原禰衡年二十四字正平淑質貞亮英才卓礫初涉藝文升堂覩奧目所一見輒誦於口耳所瞥聞不忘於心性與道合思若有神弘羊潛計安世默識以衡準之誠不足怪忠果正直志懷霜雪見善若驚疾惡若讎任座抗行史魚厲節殆無以過也鷙鳥纍伯不如一鶚使衡立朝必有可觀飛辨騁辭溢氣坌涌解疑釋結臨敵有餘昔賈誼求試屬國詭係單于終軍欲以長纓牽致徑越弱冠慷慨前世美之近日路粹嚴象亦用異才擢拜臺郎衡宜與為比如得龍躍天衢振翼雲漢楊聲紫微垂光虹霓足以昭近署之多士增四門之穆穆鈞天廣樂必有奇麗之觀帝室皇居必蓄非常之寶若衡等輩不可多得激楚楊阿至妙之容臺牧者之所貪飛兔騕裊絶足奔放良樂之所急臣等區區敢不以聞融既愛衡才數稱述於曹操操欲見之而衡素相輕疾自稱狂病不肯往而數有恣言操懷忿而以其才名不欲殺之聞衡善擊鼓乃召為鼓史因大會賓客閲試音節諸史過者皆令脫其故衣更著岑牟單絞之服次至衡衡方為漁陽參撾蹀而前容態有異聲節悲壯聽者莫不慷慨衡進至操前而止吏訶之曰鼓史何不改裝而輕敢進乎衡曰諾於是先解衵衣次釋餘服裸身而立徐取岑牟單絞而著之畢復參撾而去顏色不怍操笑曰本欲辱衡衡反辱孤孔融退而數之曰正平大雅固當爾邪因宣操區區之意衡許往融復見操說衡狂疾今求得自謝操喜勑門者有客便通待之極晏衡乃著布單衣疏巾手持三尺梲杖坐大營門以杖捶地大罵吏白外有狂生坐於營門言語悖逆請收案罪操怒謂融曰禰衡豎子孤殺之猶雀鼠耳顧此人素有虛名遠近將謂孤不能容之今送與劉表視當何如於是遣人騎送之臨發衆人為之祖道先供設於城南乃更相戒曰禰衡勃虐無禮今因其後到咸當以不起折之也及衡至衆人莫肯興衡坐而大號衆問其故衡曰坐者為冢臥者為尸尸冢之閒能不悲乎劉表及荊州士大夫先服其才名甚賓禮之文章言議非衡不定表嘗與諸文人共草章奏並極其才思時衡出還見之開省未周因毀以抵地表憮然為駭衡乃從求筆札須臾立成辭義可觀表大悅益重之後復侮慢於表表恥不能容以江夏太守黃祖性急故送衡與之祖亦善待焉衡為作書記輕重疏密各得體宜祖持其手曰處士此正得祖意如祖腹中之所欲言也祖長子射為章陵太守尤善於衡嘗與衡俱遊共讀蔡雍所作碑文射愛其辭還恨不繕寫衡曰吾雖一覽猶能識之唯其中石缺二字為不明耳因書出之射馳使寫碑還校如衡所書莫不歎伏射時大會賓客人有獻鸚鵡者射舉巵於衡曰願先生賦之以娛嘉賓衡覽攬筆而作文無加點辭采甚麗後黃祖在蒙衝船上大會賓客而衡言不遜順祖慙乃訶之衡更熟視曰死公云等道祖大怒令五百將出欲加箠衡方大罵祖恚遂令殺之祖主簿素疾衡即時殺焉射徒跣來救不及祖亦悔之乃厚加棺斂衡時年二十六其文章多亡云贊曰情志既動篇辭為貴抽心呈貌非雕非蔚殊狀共體同聲異氣言觀麗則永監淫費
