  - {type: variant, offset: 2410, length: 137, content: 宮東平王蒼琅邪王京從駕來朝皇太后七年春正月癸卯皇太后陰氏崩二月庚申葬光烈皇后秋八月戊辰北海王興薨是歲北匈奴遣使乞和親八年春正月己卯司徒范遷薨三月辛卯太尉虞延為司徒衞尉趙憙行太尉事遣越騎司馬鄭衆報使北匈奴初置度遼將軍屯五原曼柏秋郡國十四雨水冬十月北宮成丙子臨辟雍養三老五更禮畢, WYG: 宫}
