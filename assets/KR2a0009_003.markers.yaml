  - {type: variant, offset: 2393, length: 1, content: 二, WYG: 準以當金甲辰詔書云劉攽曰案文少一曰字祖考來假明哲之祀假音格格至也尚書䕫曰於予擊石拊石搏拊琴瑟以詠祖考來格言明哲祭祀則能致祖考之神來至予末小子質又菲薄仰惟先帝烝烝之情前修禘祭以盡孝敬朕得識昭穆之序寄逺祖之思今年大禮復舉加以先帝之坐言顯宗神坐今新加之悲傷感懐樂以迎來哀以送往雖祭亡如在而空虛不知所裁庻或饗之豈亡克愼肅雍之臣辟公之相肅敬雍和相助也詩大雅曰有來雍雍至止肅肅相維辟公天子穆穆言百辟諸侯來助祭皆有肅雍之德無懈慢也皆助朕之依依依依思慕之意今賜公錢四十萬卿半之及百官執事各有差九}
