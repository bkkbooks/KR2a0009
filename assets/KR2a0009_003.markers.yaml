  - {type: variant, offset: 4308, length: 5, content: 延謀反發覺, WYG: 昞任城王尚沛王定皆從辛丑帝耕于懷二月壬寅告常山魏郡清河鉅鹿平原東平郡太守相曰朕惟廵狩之制以宣聲教考同遐邇解釋結寃也今四國無政不用其良詩小雅曰日月告凶不用其行四國無政不用其良言四方之國無政者由天子不用善人也駕言出游欲親知其劇易前祠園陵遂望祀華霍華霍山名也今在廬江灊縣西南亦名天柱山爾雅曰華山為西嶽霍山為南嶽東柴岱宗為人祈福今將禮常山遂徂北土歴魏郡經平原升踐隄防詢訪耆老咸曰往者汴門未作深者成淵淺則泥塗追惟先帝勤人之德謂永平十二年修汴渠底績逺圖復禹𢎞業尚書曰覃懷底績孔安國注云底置績功也逺圖猶長算也言能復禹為理水之大功聖跡滂流至于海表不克堂構朕甚慙焉尚書曰若考作室既底法厥子乃不肯堂矧肯構月令孟春善相邱陵土地所宜月令孟春之月善相邱陵阪險原隰土地所宜五穀所殖以教導人必躬親之田事既飭今肥田尚多未有墾闢其悉以賦貧民給與糧種務盡地力勿令游手所過縣邑聽半入今年田租以勸農夫之勞乙丑勑侍御史司空曰方春所過無得有所伐殺車可以引避引避之騑馬可輟解輟解之夾轅者為服馬服馬外為騑馬詩云敦彼行葦牛羊勿踐履詩大雅也鄭𤣥注云敦敦然道旁之葦牧牛羊者無使踐履折傷之况於人乎禮人君伐一草木不時謂之不孝禮記孔子曰伐一樹殺一獸不以其時非孝也俗知順人莫知順天其明稱朕意戊辰進幸中山遣使者祠北嶽出長城史記蒙恬為秦築長城西自臨洮東至海}
