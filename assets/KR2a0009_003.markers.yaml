  - {type: variant, offset: 4012, length: 0, content: '', WYG: 潁陽戊申車駕還宫詔曰五經剖判去聖彌逺章句遺辭乖疑難正恐先師微言將遂廢絶非所以重稽古求道眞也其令羣儒選髙才生受學左氏穀梁春秋古文尚書毛詩以扶微學廣異義焉是歲京師及郡國螟元和元年春正月中山王焉來朝日南徼外蠻夷獻生犀白雉劉欣明交州記曰犀其毛如豕蹏有三甲頭女馬有三角鼻上角短額上頭上角長異物志日角中特有光耀白理如線自本逹末則為通天犀閏月辛丑濟陰王長薨二月甲戌詔曰王者八政以食為本尚書洪範八政一曰食是為政本故古者急耕稼之業致耒耜之勤耒耜農器也耒其柄耜其刄節用儲蓄以備凶災是以歲雖不登而人無飢色自牛疫已來穀食連少良由吏教未至刺史二千石不以為負負猶憂也其令郡國募人無田欲徙它界就肥饒者恣聽之到在所賜給公田為雇耕傭賃種􅀈􅀈糧也古餉字音式上反貰與田器勿收租五歲除算三年其後欲還本鄉者勿禁夏四月巳夘分東平國封憲王蒼子尚為任城王六月辛酉沛王輔薨秋七月丁未詔曰律云掠者唯得榜笞立蒼頡篇曰掠問也廣雅曰榜擊也音彭說文曰笞擊也立謂立而考訊之又令丙箠長短有數令丙為篇之次也前書音義曰令有先後有令甲令乙令丙又景帝京師定箠令箠長五尺本大一寸其竹也末薄半寸其平去節故曰長短有數也劉攽曰注景帝京師定箠令案景帝定令行於天下不止京師京師衍字也盖景似京師似帝因爾誤出自往者大獄已來掠考多酷鉆鑽之屬大獄謂楚王英等事也鉆音其亷反說文曰鉆鋷也國語曰中刑用鑽鑿皆謂慘酷其肌膚也慘苦無極念其痛毒怵然動心書曰鞭作官刑豈云若此孔安國注尚書曰以鞭為理官事之刑宜及秋冬理獄明為其禁八月甲子太尉鄧彪罷大司農鄭𢎞為太尉癸酉詔曰朕道化不德吏政失和元元未諭抵罪於下寇賊爭心不息邊野邑屋不修修或作充永惟庻事思稽厥衷與凡百君子共𢎞斯道中心悠悠將何以寄其改建初九年為元和元年郡國中}
