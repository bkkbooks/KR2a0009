  - {type: variant, offset: 126, length: 0, content: '', WYG: 祫以冬十月禘之為言諦諦審昭穆尊卑之義祫者合也冬十月五穀成故骨肉合飲食於祖廟謂之殷祭四時正祭外有五月嘗麥三伏立秋嘗粢盛酎十月嘗稻等謂之間祀即各於更衣之殿更衣者非正處也園中有寢有便殿寢者陵上正殿便殿寢側之别殿即更衣也劉攽曰注立秋嘗粢盛酎案漢制立秋嘗粢粢稷也八月飲酎此文誤出一盛字少八月飲三字共進武德之舞如孝文皇帝祫祭髙廟故事前書高廟奏武德文始五行之舞制曰可是歲牛疫京師及三州大旱詔勿收兖豫徐州田租芻槀其以見穀賑給貧人劉攽曰案詔無它語不當有其字建初元年春正月詔三州郡國方春東作恐人稍受廪往來煩劇或妨耕農廪給也稍為少少給之不頓與劉攽曰注案文為當作謂其各實覈尤貧者計所貸并與之并音必政反流人欲歸本者郡縣其實稟令足還到聽過止官亭無雇舎宿長吏親躬無使貧弱遺脫小吏豪右得容姦妄前書曰百石已下有斗食佐史之秩言小吏也詔書既下勿得稽留刺史明加督察尤無狀者無狀謂其罪惡尤大其狀無可寄言故云無狀它皆類此}
