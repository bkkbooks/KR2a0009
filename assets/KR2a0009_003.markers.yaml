  - {type: variant, offset: 1700, length: 2, content: 星孛, WYG: 教夏曰教殷曰庠周曰序劉攽曰夏曰教教當作校漢承暴秦襃顯儒術建立五經為置博士其後學者精進雖曰承師亦别名家言雖承一師之業其後觸類而長更為章句則别為一家之學孝宣皇帝以為去聖久逺學不厭博故遂立大小夏侯尚書後又立京氏易大小夏侯謂夏侯勝勝從兄子建也京氏京房也至建武中復置顔氏嚴氏春秋大小戴禮博士嚴氏謂嚴彭祖顔氏謂顔安樂大小戴戴德戴聖也此皆所以扶進微學尊廣道蓺也中元元年詔書五經章句煩多議欲減省至永平元年長水校尉儵樊儵奏言先帝大業當以時施行欲使諸儒共正經義頗令學者得以自助孔子曰學之不講是吾憂也又曰博學而篤志切問而近思仁在其中矣論語文也講猶習也篤厚也志記也言人能博渉學而後識之切問於已所未悟之事近思已所能及之事好學亦仁之一分故仁在其中矣於戲其勉之哉於是下太常將大夫博士議郎郎官博士屬太常故云下及諸生諸儒㑹白虎觀講議五經同異使五官中郎將魏應承制問續漢志曰五官中郎將比二千石侍中淳}
