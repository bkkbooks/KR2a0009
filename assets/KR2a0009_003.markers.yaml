  - {type: variant, offset: 4017, length: 0, content: '', WYG: 俗亦名靈臺大母辛未幸太山柴告岱宗有黄鵠三十從西南來經祠壇上東北過于宫屋翺翔升降進幸奉髙壬申宗祀五帝于汶上明堂前書曰濟南人公玉帶上黄帝時明堂圖中有一殿四面無壁以茅盖通水水圜宫垣為複道上有樓從西南入名曰崑崙以拜祀上帝於是上作明堂於汶上如帶圖焉汶水出太山朱虛縣萊蕪山癸酉告祠二祖四宗二祖謂髙祖世祖四宗謂文帝為太宗武帝為世宗宣帝為中宗明帝為顯宗大㑹外内羣臣丙子詔曰朕巡狩岱宗柴望山川告祠明堂以章先勲其二王之後禮記曰存二王之後尊賢不過二代公羊傳曰存二王之後所以通三王也漢之二王殷周之後也先聖之𦙍東觀記曰孔子後襃成}
