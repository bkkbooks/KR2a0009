  - {type: variant, offset: 4382, length: 0, content: '', WYG: 繫囚減死一等詣金城戍六月戊辰司徒桓虞免癸夘司空袁安為司徒光禄勲任隗為司空桓虞字仲春馮翊萬年人隗字仲和南陽宛人秋七月癸夘齊王晃有罪貶為蕪湖侯蕪湖縣名屬丹陽故城在今宣州當塗縣東南壬子淮陽王昞薨鮮卑擊破北單于斬之燒當羌㓂金城護羌校尉劉盱討之斬其渠帥壬戌詔曰朕聞明君之德啓迪鴻化緝熙康乂光照六幽緝熙光明也六幽謂六合幽隱之處也訖惟人面靡不率俾仁風翔于海表威霆行乎鬼區鬼區即鬼方然後敬恭明祀膺五福之慶獲來儀之貺尚書五福一曰夀二曰富三曰康寜四曰攸好德五曰考終命來儀謂鳳也書曰鳳皇來儀朕以不德受祖宗𢎞烈乃者鳳皇仍集麒麟並臻甘露宵降嘉穀滋生芝草之類歲月不絶朕夙夜祗畏上天無以彰于先功今改元和四年為章和元年秋令是月養衰老授几杖行糜粥飲食月令仲秋之月其賜髙年二人共布帛各一匹以為醴酪}
  - {type: page-break, offset: 4382, content: '', id: KR2a0009_WYG_003-25a, image: WYG0252/WYG0252-0092a.png}
