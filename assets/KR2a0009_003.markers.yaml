  - {type: variant, offset: 105, length: 2, content: 卯葬, WYG: 未大赦天下賜民爵人二級為父後及孝悌力田人三級脫無名數及流人欲占者人一級爵過公乗得移與子若同産子鰥寡孤獨篤癃貧不能自存者粟人三斛詔曰朕以眇身託于王侯之上統理萬機懼失厥中兢兢業業未知所濟深惟守文之主必建師傅之官詩不云乎不愆不忘率由舊章詩大雅也鄭𤣥注云愆過也率循也由用也言成王之令德不過誤不違失皆循用舊典文章謂周公之禮法行太尉事節鄉侯憙三世在位為國元老趙憙}
  - {type: page-break, offset: 105, content: '', id: KR2a0009_WYG_003-2a, image: WYG0252/WYG0252-0080c.png}
