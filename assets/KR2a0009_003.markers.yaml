  - {type: variant, offset: 134, length: 0, content: '', WYG: 孝也尚書舜典曰汝作司徒敬敷五教在寛愷悌君子大雅所歎愷樂悌易也詩大雅泂酌篇曰愷悌君子民之父母布告天下使明知朕意酒泉太守段彭討擊車師大破之罷戊巳校尉官二月武陵澧中蠻叛武陵郡今澧州水經曰澧水出武陵充縣西厯山之北也三月甲寅山陽東平地震己巳詔曰朕以無德}
