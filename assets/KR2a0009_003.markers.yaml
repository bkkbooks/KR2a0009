  - {type: variant, offset: 4017, length: 0, content: '', krp: 俗亦名靈臺大母辛未幸太山柴告岱宗有黄鵠三十從西南來經祠壇上東北過于宫屋翺翔升降進幸奉髙壬申宗祀五帝于汶上明堂前書曰濟南人公玉帶上黄帝時明堂圖中有一殿四面無壁以茅盖通水水圜宫垣為複道上有樓從西南入名曰崑崙以拜祀上帝於是上作明堂於汶上如帶圖焉汶水出太山朱虛縣萊蕪山癸酉告祠二祖四宗二祖謂髙祖世祖四宗謂文帝為太宗武帝為世宗宣帝為中宗明帝為顯宗大㑹外内羣臣丙子詔曰朕巡狩岱宗柴望山川告祠明堂以章先勲其二王之後禮記曰存二王之後尊賢不過二代公羊傳曰存二王之後所以通三王也漢之二王殷周之後也先聖之𦙍東觀記曰孔子後襃成}
  - {type: variant, offset: 4018, length: 0, content: '', WYG: 等咸來助祭東后蕃衞東后謂東方國君也諸侯為天子蕃屏故曰蕃衞伯父伯兄仲叔季弟㓜子童孫尚書吕刑文皆天子同姓諸侯有父叔兄弟子孫列者故總而同之百僚從臣宗室衆子要荒四裔要荒二服名要服去王城二千里荒服去王城二千五百里要者言可要束以文教荒者言其荒忽無常也裔逺也謂荒服之外也沙漠之北葱嶺之西西河舊事曰葱嶺山名在敦煌西其山髙大多葱故以為名焉冒耏之類字書曰耏多須貌音而言須鬢多蒙冒其面或曰西域人多著冒而長故舉以為言也劉攽曰注西域人多著冒而長案文當有一須字緣紀文言冒耏跋渉懸度草行曰跋水行曰渉左傳子太叔曰跋渉山川西域傳曰懸度者石山也溪谷不通以䋲索相引而度去陽闗五千八百五十里陵踐阻絶駿奔郊畤駿疾也音俊尚書駿奔走在廟郊畤祭天處也前書音義曰畤神靈之居止者咸來助祭祖宗功德延}
