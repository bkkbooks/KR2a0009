  - {type: variant, offset: 1023, length: 602, content: 辟雍起靈臺恢弘大道被之八極而胤子無成康之質羣臣無呂旦之謀盥洗進爵踧踖惟慙素性頑鄙臨事益懼故君子坦蕩蕩小人長戚戚其令天下自殊死已下謀反大逆皆赦除之百僚師尹其勉修厥職順行時令敬若昊天以綏兆人三月臨辟雍初行大射禮秋九月沛王輔楚王英濟南王康淮陽王延東海王政來朝冬十月壬子幸辟雍初行養老禮詔曰光武皇帝建三朝之禮而未及臨饗眇眇小子屬當聖業閒暮春吉辰初行大射令月元日復踐辟雍尊事三老兄事五更安車輭輪供綏執授侯王設醬公卿饌珍朕親袒割執爵而酳祝哽在前祝噎在後升歌鹿鳴下管新宮八佾具脩萬舞於庭朕固薄德何以克當易陳負乘詩刺彼己永念慙疚無忘厥心三老李躬年耆學明五更桓榮授朕尚書詩曰無德不報無言不酬其賜榮爵關內侯食邑五千戶三老五更皆以二千石祿養終厥身其賜天下三老酒人一石肉四十斤有司其存耆恤幼孤惠魚眾寡稱朕意焉中山王焉始就國甲子西巡狩幸長安祠高廟遂有事於十一陵歷覽館邑會郡縣吏勞賜作樂十一月甲申遣使者以中牢祠蕭何霍光帝謁陵園過式其墓進幸河東所過賜二千石令長已下至於掾史各有差癸卯車駕還宮十二月護羌校尉竇林下獄死是歲始迎氣於五郊少府陰就子豐殺其妻酈邑公主就坐自殺三年春正月癸巳詔曰朕奉郊祀登靈臺見史官正儀度夫春者歲之始也始得其正則三時有成比者水旱不節邊人食寡政失於上人受其咎有司其勉順時氣勸督農桑去其螟蜮以及蝥賊詳刑慎罰明察單辭夙夜匪懈以稱朕意二月甲寅太尉趙憙司徒李訢免丙辰左馮翊郭丹為司徒己未南陽太守虞延為太尉甲子立貴人馬氏為皇后, WYG: ''}
