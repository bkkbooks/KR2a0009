  - {type: variant, offset: 786, length: 236, content: 徙山陽王荊為廣陵王遣就國是歲遼東太守祭肜使鮮卑擊赤山烏桓大破之斬其渠帥越巂姑復夷叛州郡討平之二年春正月辛末宗祀光武皇帝於明堂帝及公卿列侯始服冠冕衣裳玉佩絇屨以行事禮畢登靈臺使尚書令持節詔驃騎將軍三公曰今令月吉日宗祀光武皇帝於明堂以配五帝禮備法物樂和八音詠祉福舞功德其班時令勑羣后事畢升靈臺望元氣吹時律觀物變羣僚藩輔宗室子孫衆郡奉計百蠻貢職烏桓濊貊咸來助祭單于侍子骨都侯亦皆陪位斯固聖祖功德之所致也朕以闇陋奉承大業親執珪璧恭祀天地仰惟先帝受命中興撥亂反正以寧天下封泰山建明堂, WYG: ''}
