  - {type: variant, offset: 4019, length: 0, content: '', WYG: 朕躬予一人空虛多疚纂承尊明疚病也纂繼也盥洗享薦慙愧祗慄詩不云乎君子如祉亂庻遄已詩小雅遄速也已止也祉福也鄭𤣥注云福者福賢者謂爵禄之也如此則亂亦庶幾可疾止也歴數既從靈耀著明歴數既從謂行四分歴也靈耀著明謂日月貞明亦欲與士大夫同心自新}
