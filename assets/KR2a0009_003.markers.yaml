  - {type: variant, offset: 4013, length: 0, content: '', WYG: 官繫囚減死一等勿笞詣邊縣妻子自随占著在所其犯殊死一切募下蠶室其女子宫繫囚鬼薪白粲以上皆減本罪一等輸司宼作亡命者贖各有差丁酉南巡狩詔所經道上郡縣無得設儲跱儲積也跱具也言不預有蓄備命司空自將徒支柱橋梁柱音竹主反有遣使奉迎探知起居二千石當坐其賜鰥寡孤獨不能自存者粟人五斛九月乙未東平王忠薨辛丑幸章陵祠舊宅園廟見宗室故人賞賜各有差冬十月己未進幸江陵詔廬江太守祠南嶽}
