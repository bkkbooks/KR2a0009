  - {type: variant, offset: 2159, length: 213, content: 楚王英東平王蒼淮陽王延琅邪王京東海王政趙王盱北海王興齊王石來朝二月王雒山出寶鼎廬江太守獻之夏四月甲子詔曰昔禹收九牧之金鑄𣇓以象物使人知神姦不逢惡氣遭德則興遷于商周周德既衰𣇓乃淪亡祥瑞之降以應有德方今政化多僻何以致茲易曰𣇓象三公豈公卿奉職得其理邪太常其以礿祭之日陳𣇓於廟以備器用賜三公帛五十匹九卿二千石半之先帝詔書禁人上事言聖而閒者章奏頗多浮詞自今若有過稱虛譽尚書皆宜抑而不省示不為諂子蚩也冬十月行幸魯祠東海恭王陵會沛王輔楚王英, WYG: ''}
