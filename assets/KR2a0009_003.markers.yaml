  - {type: variant, offset: 117, length: 1, content: 上, WYG: 言孝明皇帝聖德淳茂劬勞日昊身御浣衣日昊日昳尚書曰文王自朝至于日中􅉴不遑暇食食無兼珍澤臻四表尚書曰光被四表逺人慕化僬僥儋耳欵塞自至欵扣僬僥儋耳觧見明紀克伐鬼方開道西域鬼方逺方易曰髙宗伐鬼方三年克之威靈廣被無思不服以烝庶為憂不以天下為樂備三雍之教躬養老之禮作登歌正雅樂博貫六蓺周禮保氏教之六蓺一曰禮二曰樂三曰射四曰馭五曰書六曰數前書蓺文志曰以禮樂春秋易詩書為六蓺博貫謂䆒極深幽耳劉攽曰注前書蓺文志曰以禮樂春秋案文多一曰字不舎晝夜聰明淵塞著在圖讖河圖曰圖出代九天開明受用嗣興十代以光又括地象曰十代禮樂文雅竝出謂明帝也至德所感通於神明功烈光於四海仁風行於千載而深執謙謙自稱不德無起寢廟掃地而祭除日祀之法春秋外傳曰日祭月祀時享祖禰則日祭髙曾則月祀三祧則時享今此除日祀之法從時月之祭劉攽曰注三祧則時享案自古但有二祧無三祧明三字誤省送終之禮遂藏主於光烈皇后更衣别室天下聞之莫不悽愴陛下至孝烝烝奉順聖德臣愚以為更衣在中門之外處所殊别宜}
  - {type: page-break, offset: 117, content: '', id: KR2a0009_WYG_003-3a, image: WYG0252/WYG0252-0081a.png}
