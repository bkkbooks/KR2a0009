  - {type: variant, offset: 2614, length: 0, content: '', krp: 其女子宫繫囚鬼薪白粲已上前書曰鬼薪白粲已上皆三歲刑也男子為鬼薪取薪以給宗廟女子為白粲使擇米白粲粲然皆減本罪各一等輸司宼作}
  - {type: variant, offset: 2616, length: 1321, content: 者令贖罪各有差凡徙者賜弓弩衣粮壬寅晦日有食之既詔曰朕以無德奉承大業而下貽人怨上動三光日食之變其災尤大春秋圖讖所為至譴永思厥咎在予一人羣司勉修職事極言無諱於是在位者皆上封事各言得失帝覽章深自引咎乃以所上班示百官詔曰羣僚所言皆朕之過人冤不能理吏黠不能禁而輕用人力繕修宮宇出入無節喜怒過差昔應門失守關雎刺世飛蓬隨風微子所歎永覽前戒竦然兢懼徒恐薄德久而致怠耳北匈奴寇西河諸郡九年春三月辛丑詔郡國死罪囚減罪與妻子詣五原朔方占著所在死者皆賜妻父若男同產一人復終身其妻無父兄獨有母者賜其母錢六萬又復其口筭夏四月甲辰詔郡國以公田賜貧人各有差令司隸校尉部刺史歲上墨綬長吏視事三歲已上理狀尤異者各一人與計偕上及尤不政理者亦以聞是歲大有年為四姓小侯開立學校置五經師十年春二月廣陵王荊有罪自殺國除夏四月戊子詔曰昔歲五穀登衍今茲蠶麥善收其大赦天下方盛夏長養之時蕩滌宿惡以報農功百姓勉務桑稼以備災害吏敬厥職無令愆墯閏月甲午南巡狩幸南陽祠章陵日北至又祠舊宅禮畢召校官弟子作雅樂奏鹿鳴帝自御塤篪和之以娛嘉賓還幸南頓勞饗三老官屬冬十一月徵淮陽王廷會平輿徵沛王輔會睢陽十二月甲午車駕還宮十一年春正月沛王輔楚王英濟南王康東平王蒼淮陽王延中山王焉琅邪王京東海王政來朝秋七月司隸校尉郭霸下獄死是歲漅湖出黃金廬江太守以獻時麒麟白雉醴泉嘉禾所在出焉十二年春正月益州徼外夷哀牢王相率內屬於是置永昌郡罷益州西部都尉夏四月遣將作謁者王吳修渠自滎陽至于千乘海口五月丙辰賜天下男子爵人二級三老孝悌力田人三級流民無名數欲占者人一級魚眾寡孤獨篤貧無家屬不能自存者粟人三斛詔曰昔曾閔奉親竭觀致養仲尼葬子有棺無椁喪貴致哀禮存寧儉今百姓送終之制競為奢靡生者無擔石之儲而財力盡於墳土伏臘無糟糠而牲牢兼於一奠糜破積世之業以供終朝之費子孫飢寒絕命於此豈祖考之意哉又車服制度恣極耳目田荒不耕游食者衆有司其申明科禁宜於今者宣下郡國秋七月乙亥司空伏恭罷乙未大司農牟融為司空冬十月司隸校尉王康下獄死是歲天下安平人無傜役歲比登稔百姓殷富粟斛三十牛羊被野十三年春二月帝耕於藉田禮畢賜觀者食三月河南尹薛昭下獄死夏四月渠成辛巳行幸滎陽巡行河渠乙酉詔曰自渠決敗六十餘歲加頃年以來雨水不時流東侵日月益甚水門故處皆在河中漭瀁廣溢莫測圻岸蕩蕩極望不知綱紀今兗豫之人多被水患乃云縣官不先人急好興它役又或以為河流入幽冀蒙利故曰左隄彊則右隄傷左右俱彊則下方傷宜任水埶所之使人隨高而處公家息壅塞之費百姓無陷溺之患議者不同南北異論朕不知所從久而不決今既築隄理渠絕水立門河分流復其舊迹陶丘之北漸就壤墳故薦嘉玉絜牲以禮河神東過洛汭歎禹之績今五土之宜反其正色濱渠下田賦與貧人無令豪右得固其利庶繼世宗瓠子之作因遂度河登太行進幸上黨壬寅車駕還宮冬十月壬辰晦日有食之三公免冠自劾制曰冠履勿劾災異屢見咎在朕躬憂懼遑遑未知其方將有司陳事多所隱諱使君上壅蔽下有不暢乎昔衞有忠臣靈公得守其位今何以和穆陰陽消伏災譴刺史太守詳刑理冤存恤魚眾孤勉思職焉十一月楚王英謀反廢國除遷於涇縣所連及死徙者數千人是歲齊王石薨十四年春三月甲戌司徒虞延免自殺夏四月丁巳鉅鹿太守南陽邢穆為司徒前楚王英自殺夏五月封故廣陵王荊子元壽為廣陵侯初作壽陵十五年春二月庚子東巡狩辛丑幸偃師詔亡命自殊死以下, WYG: ''}
