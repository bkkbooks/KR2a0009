  - {type: variant, offset: 3986, length: 3, content: 彭城癸, WYG: 槐里岐山得銅器形似酒罇獻之又獲白鹿帝曰上無明天子下無賢方伯已見明帝紀人之無良相怨一方詩小雅也良善也言王者所為無有善者各相與於一方而怨之義見韓詩斯器亦曷為來哉公羊傳曰孔子抱麟而泣曰孰為來哉孰為來哉又幸長平御池陽宫前書音義曰長平坂在池陽南有長平觀去長安五十餘里東至髙陵造舟於涇而還造至也謂次比舟令相至為橋而度也爾雅曰天子造舟諸侯維舟大夫方舟士特舟每所到幸輒㑹郡縣吏人勞賜作樂十一月詔勞賜河東守令掾以下十二月丁}
