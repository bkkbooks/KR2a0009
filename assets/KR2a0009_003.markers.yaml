  - {type: variant, offset: 146, length: 0, content: '', WYG: 而災異仍見與政相應朕既不明渉道日寡又選舉乖實俗吏傷人官職耗亂刑罰不中可不憂與昔仲弓季氏之家臣子游武城之小宰孔子猶誨以賢才問以得人論語仲弓為季氏宰問政子曰赦小過舉賢才子游為武城宰孔子謂之曰汝得人焉耳乎明政無大小以得人為本夫鄉舉里選必累功勞今刺史守相不明眞偽茂才孝廉歲以百數既非能顯而當授之政事甚無謂也每尋前世舉人貢士或起甽畝不繫閥閱說文曰甽田中之溝音工犬反史記曰明其等曰閥積其功曰閲言前代舉人務取賢才不拘門地敷奏以言則文章可採明試以功則政有異迹敷陳奏進也令各陳進其言則知其能否也尚書曰敷奏以言明試以功則政之類文質彬彬朕甚嘉之彬彬雜半之貎其令太傅三公中二千石二千石郡國守相舉賢良方正能直言極諫之士各一人夏五月辛酉初舉孝廉郎中寛博有謀任典城者以補長相任堪使也典主也長謂縣長相謂侯相秋七月辛亥詔以上林池籞田賦與貧人籞禁苑也音語前書音義曰折竹以繩懸連之使人不得往來謂之籞八月庚寅有星孛于天市史記曰房為天駟東北曲十二星曰旗旗中四星曰天市九月永昌哀牢夷叛冬十月武陵郡兵討叛蠻破降之十一月阜陵王延謀反貶為阜陵侯二年春三月辛丑詔曰比年隂陽不調饑饉屢臻深惟}
