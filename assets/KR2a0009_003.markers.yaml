  - {type: variant, offset: 4418, length: 308, content: 嫁為人妻勿與俱謀反大逆無道不用此書是歲北匈奴寇雲中雲中太守廉范擊破之十七年春正月甘露降於甘陵北海王睦薨二月乙巳司徒王敏薨三月癸丑汝南太守鮑昱為司徒是歲甘露仍降樹枝內附芝草生殿前神雀五色翔集京師西南夷哀牢儋耳僬僥槃木白狼動黏諸種前後慕義貢獻西域諸國遣子入侍夏五月戊子公卿百官以帝威德懷遠祥物顯應乃並集朝堂奉觴上壽制曰天生神物以應王者遠人慕化實由有德朕以虛薄何以享斯唯高祖光武聖德所被不敢有辭其敬舉觴太常擇吉日策告宗廟其賜天下男子爵人二級三老孝悌力田人三級流人無名數欲占者人一級魚眾寡孤獨篤貧不能自存者粟人三斛郎從官視事十歲以上者帛十匹中二千石二千石下至黃綬貶秩奉贖在去年以來皆還贖秋八月丙寅令武威張掖酒泉敦煌及張掖屬國, WYG: 宫}
