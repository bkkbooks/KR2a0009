  - {type: variant, offset: 148, length: 25, content: 受命中興德侔帝王協和萬邦假於上下懷柔百神惠於魚眾寡, WYG: 憂人之本本謂稼穡詔書曰不傷財不害人誠欲元元去末歸本而今貴戚近親奢縱無度嫁娶送終尤為僭侈有司廢典莫肯舉察春秋之義以貴理賤今自三公竝宜明糾非法宣振威風}
