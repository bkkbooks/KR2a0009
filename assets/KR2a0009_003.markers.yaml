  - {type: variant, offset: 4013, length: 0, content: '', krp: 官繫囚減死一等勿笞詣邊縣妻子自随占著在所其犯殊死一切募下蠶室其女子宫繫囚鬼薪白粲以上皆減本罪一等輸司宼作亡命者贖各有差丁酉南巡狩詔所經道上郡縣無得設儲跱儲積也跱具也言不預有蓄備命司空自將徒支柱橋梁柱音竹主反有遣使奉迎探知起居二千石當坐其賜鰥寡孤獨不能自存者粟人五斛九月乙未東平王忠薨辛丑幸章陵祠舊宅園廟見宗室故人賞賜各有差冬十月己未進幸江陵詔廬江太守祠南嶽}
  - {type: variant, offset: 4014, length: 1, content: 徵, WYG: 詔長沙零陵太守祠長沙定王舂陵節侯鬱林府君還幸宛十一月己丑車駕還宫賜從者各有差十二月壬子詔曰書云父不慈子不祗兄不友弟不恭不相及也祗敬也左傳胥臣云康誥曰父不慈子不祗兄不友弟不恭不相及也今康誥之言事同而文異往者妖言大獄所及}
  - {type: variant, offset: 4014, length: 1, content: 徵, krp: 詔長沙零陵太守祠長沙定王舂陵節侯鬱林府君還幸宛十一月己丑車駕還宫賜從者各有差十二月壬子詔曰書云父不慈子不祗兄不友弟不恭不相及也祗敬也左傳胥臣云康誥曰父不慈子不祗兄不友弟不恭不相及也今康誥之言事同而文異往者妖言大獄所及}
  - {type: variant, offset: 4016, length: 0, content: '', WYG: 逺一人犯罪禁至三屬即三族也謂父族母族及妻族莫得垂纓士宦王朝如有賢才而没齒無用朕甚憐之非所謂與之更始也諸以前妖惡禁錮者一皆蠲除之左傳曰以重幣錮之杜預注曰禁錮勿令仕也以明棄咎之路但不得在宿衛而已二年春正月乙酉詔曰令云人有産子者復勿算三歲今諸懐􅗖者說文曰􅗖孕也賜胎養穀人三斛復其夫勿算一歲著以為令又詔三公曰方春生養萬物莩甲前書音義曰莩葉裏白皮也易曰百果甲坼也宜助萌陽以育時物其令有司罪非殊死且勿案騐及吏人條書相告不得聽受條事條也冀以息事寜人敬奉天氣立秋如故夫俗吏矯飾外貎似是而非揆之人事則悅耳論之陰陽則傷化朕甚饜之甚苦之安靜之吏悃愊無華說文曰悃愊至誠也悃音苦本反愊音孚逼反日計不足月計有餘莊子曰有庚桑子者偏得老聃之道以居㟪壘之山㟪壘之人相與云庚桑子之始來吾洒然異之今吾日計之不足歲計之有餘庻幾其聖人乎如襄城令劉方方字伯況平原人吏人同聲謂之不煩雖未有它異斯亦殆近之矣間勑二千石各尚寛明而今富姦行賂於下貪吏枉法於上使有罪不論而無過被刑甚大逆也夫以苛為察以刻為明以輕為德以重為威四者或興則下有怨心吾詔書數下冠盖接道而吏不加理人或失職其咎安在勉思舊令稱朕意焉二月甲寅始用四分歴續漢書曰時待詔張盛京房鮑業等以四分歴請與待詔楊岺等共課歲餘盛等所中多四分之歴始頗施行詔曰今山川鬼神應典禮者尚未咸秩咸皆也秩序也言山川之神尚未次序而祭之書曰咸秩無文其議增修羣祀以祈豐年丙辰東巡狩己未鳳皇集肥城肥城縣名屬太山郡故城在今濟州平陰縣東南乙丑帝耕於定陶詔曰三老尊年也孝悌淑行也力田勤勞也國家甚休之其賜帛人一匹勉率農功使使者祠唐堯於成陽靈臺成陽縣屬濟陰郡郭緣生述征記曰成陽縣東南有堯母慶都臺上有祠廟堯母}
