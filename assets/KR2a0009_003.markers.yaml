  - {type: variant, offset: 4384, length: 0, content: '', WYG: 囚犯法在丙子赦前而後捕繫者皆減死勿笞詣金城戌八月癸酉南廵狩壬午遣使者祠昭靈后於小黄園小黄縣屬陳留郡故城在今汴州陳留縣東北漢舊儀曰昭靈后髙祖母起兵時死小黄北後為作園廟于小黄栅陳留風俗傳曰沛公起兵野戰喪皇妣于黄鄉天下平定仍使使者以梓宫招魂幽野於是丹蛇在水自洒濯之入于梓宫其浴處有遺髮故諡曰昭靈夫人劉攽曰注天下平定仍使使者案仍當作乃仍者重複之辭無用于此甲申徴任城王尚㑹雎陽戊子幸梁己丑遣使祠沛髙原廟豐枌榆社前書音義曰枌白榆髙祖里社在豐縣東北十五里原廟解見光武紀乙未幸沛祠獻王陵徴㑹東海王政乙未晦日有食之九月庚子幸彭城東海王政沛王定任城王尚皆從辛亥幸夀春壬子詔郡國中都官}
