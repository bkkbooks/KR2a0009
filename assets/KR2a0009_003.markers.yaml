  - {type: variant, offset: 109, length: 1, content: 皇, WYG: 時為太尉明}
  - {type: variant, offset: 109, length: 1, content: 皇, krp: 時為太尉明}
  - {type: variant, offset: 111, length: 0, content: '', WYG: 時行太尉事故曰三代在位元長也詩曰方叔元老司空融融牟融典職六年勤勞不怠其以憙為太傅融為太尉並録尚書事武帝初以張子孺領尚書事録尚書事由此始三事大夫莫肯夙夜小雅之所傷也詩雨無正之文也三事三公也鄭𤣥注云幽王在外三公及諸侯随而行者皆無復君臣之禮不肯晨夜省王予違汝弼汝無面從尚書益稷之文也孔安國注云我違道汝當以義輔正我無面從我股肱之正義也羣后百僚勉思厥職各貢忠誠以輔不逮申勑四方稱朕意焉十一月戊戌蜀郡太守第五倫為司空詔征西將軍耿秉屯酒泉酒泉今肅州縣也前書音義曰城下有泉其味若酒因名酒泉焉遣酒泉太守段彭救戊巳校尉耿恭甲辰晦日有食之}
  - {type: page-break, offset: 111, content: '', id: KR2a0009_WYG_003-2b, image: WYG0252/WYG0252-0080d.png}
