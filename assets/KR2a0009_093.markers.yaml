  - {type: variant, offset: 3356, length: 192, content: 違行或疾物以矯情雖軌迹異區其去就一也若伊人者志陵青雲之上身晦泥汙之下心名且猶不顯況怨累之為哉與夫委體淵沙鳴弦揆日者不其遠乎臺佟字孝威魏郡鄴人也隱於武安山鑿穴為居采藥自業建初中州辟不就刺史行部乃使從事致謁佟載病往謝刺史乃執贄見佟曰孝威居身如是甚苦如何佟曰佟幸得保終性命存神養和如明使君宣詔書夕惕庶事反不苦邪遂去隱逸終不見韓康字伯休一名恬休京兆霸陵人家世著姓常采藥名山賣於長安市口不二價三, WYG: 女妻爕爕專精經學}
