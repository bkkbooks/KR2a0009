  - {type: variant, offset: 4980, length: 1, content: 表, WYG: 君世以金蛇遺梁冀事發覺以蛇輸司農冀從喬借觀之喬不肯與冀始為恨累遷大鴻臚時冀小女死令公卿會喪喬獨不徃冀又衘之遷光禄勲建和元年代胡廣為太尉桓帝將納梁冀妹冀欲令以厚禮迎之喬據執舊典不聽時有司奏曰春秋迎王后于紀在塗則稱后今大將軍冀女弟宜備禮章時進徴幣奏可於是悉依惠帝納后故事聘黄金一萬斤納采鴈璧乘馬一依舊典也又冀屬喬舉氾宫為尚書喬以宫臧罪明著遂不肯用因此日忤於冀先是李固見廢内外喪氣羣臣側足而立唯喬正色無所回橈回邪也橈曲也由是海内歎息朝野瞻望焉在位}
  - {type: page-break, offset: 4980, content: '', id: KR2a0009_WYG_093-21b, image: WYG0253/WYG0253-0315d.png}
