  - {type: variant, offset: 3875, length: 347, content: 從其可者於意何如昔伊尹不懷道以待堯舜之君方今明明四海開闢巢許無為箕山夷齊悔入首陽足下審能騎龍弄鳳翔嬉雲閒者亦非狐兔燕雀所敢謀也慎不荅年七十餘竟不肯娶後忽歸家自言死日及期果卒後人有見慎於敦煌者故前世異之或云神僊焉慎同郡馬瑤隱於汧山以兔為事所居俗化百姓美之號馬牧先生焉戴良字叔鸞汝南慎陽人也曾祖父遵字子高平帝時為侍御史王莽篡位稱病歸鄉里家富好給施尚俠氣食客常三四百人時人為之語曰關東大豪戴子高良少誕節母憙驢鳴良常學之以娛樂焉及母卒兄伯鸞居廬啜粥非禮不行良獨食肉飲酒哀至乃哭而二人俱有毀容或問良曰子之居喪禮乎良曰然禮所以制情佚也情苟不佚何禮之論夫食旨不甘故致毀容之實若味不存口食之可也論者不能奪之良才既高達而論議尚奇多駭流俗同郡謝季孝問曰子自視天下孰可為比良曰我若仲尼長東魯大禹出西羌獨步天下誰與為偶, WYG: ''}
