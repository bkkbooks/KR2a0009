  - {type: variant, offset: 3293, length: 0, content: '', WYG: 到乃發䘮固對曰帝雖㓜少猶天下之父今日崩亡人神感動豈有臣子反共掩匿乎昔秦皇亡於沙丘史記曰始皇東巡道病崩於沙丘徐廣曰趙有沙丘宫在鉅鹿也胡亥趙髙隐而不發卒害扶蘇以至亡國丞相李斯為始皇崩在外恐諸公子及天下有變乃祕之不發喪獨胡亥趙髙等知隂謀破去始皇所封書賜公子扶蘇死而立胡亥為太子胡亥元年楚漢並起近北鄉侯薨閻后兄弟及江京等亦共掩祕遂有孫程手刃之事江京劉安等坐省門下孫程與王康等就斬京安等立順帝也此天下大忌不可之甚者也太后從之即暮發喪固以清河王蒜年長有徳欲立之謂梁冀曰今當立帝宜擇長年髙明有徳任親政事者願將軍審詳大計察周霍之立文宣周勃立文帝霍光立宣帝也戒鄧閻之利㓜弱謂鄧太后立殤帝帝時誕育百餘日三嵗而崩又立安帝時十餘嵗閻太后立北鄉侯其年薨又徴諸王子擬擇立之冀不從乃立樂安王子纘年八嵗是為質帝時冲帝將北卜山陵固乃議曰今處處寇賊軍興用費加倍新創憲陵賦發非一帝尚㓜小可起陵於憲陵塋内依康陵制度康陵殤帝陵也其於役費三分減一乃從固議時太后以比遭不造委任宰輔固所匡正每輙從用其黄門宦者一皆斥遣天下咸望遂平而梁冀猜專每相忌疾初順帝時諸所除官多不以次及固在事奏免百餘人此等既怨又希望冀旨遂共作飛章虚誣固罪曰臣聞君不稽古無以承天書曰粤若稽古帝堯鄭𤣥注曰稽同也古天也言能同天而行者帝堯臣不述舊無以奉君昔堯殂之後舜仰慕三年坐則見堯於牆食則覩堯於􅅅太公兵法曰帝堯王天下之時金銀珠玉弗服也錦繡文綺弗衣也竒怪異物弗視也玩好之器弗寳也淫佚之樂弗聽也宫垣室屋弗堊色也榱桷柱楹弗􅍨餙也茅茨之蓋弗翦齊也滋味重累弗食也溫飯煖􅅅酸餧不易也斯所謂聿追來孝不失臣子之節者聿述也詩大雅曰文王烝哉遹追來孝言文王能述追王季勤孝之行也太尉李固因公假私依正行邪離間近戚自隆支黨至於表舉薦逹例皆門徒及所辟召靡非先舊或富室財賂或子壻㛰屬其列在官牒者凡四十九人又廣選賈豎以補令史募求好馬臨窻呈試出入踰侈輜軿曜日大行在殯路人掩涕固獨胡粉飾貌搔頭弄姿西京雜記曰武帝遇李夫人就取玉簪搔頭自此宫人搔頭皆用玉槃旋偃仰從容冶歩曾無慘怛傷悴之心山陵未成違矯舊政善則稱己過則歸君斥逐近臣不得侍送作威作福莫固之甚臣聞台輔之位實和隂陽璇璣不平寇賊姦軌書曰在璇璣玉衡以齊七政孔安國注曰璇羙玉也璣衡也王者正天文之器可運轉者也又曰寇賊姦軌注曰羣行攻刼曰寇殺人曰賊在外曰姦在内曰軌則責在太尉續漢志曰太尉掌四方兵事功課嵗盡則奏殿最而行賞罰也固受任之後東南跋扈兩州數郡謂九江賊徐鳳馬免等攻燒城邑廣陵賊張嬰等攻殺江都長九江廣陵是荆揚之地故云兩州也千里蕭條兆人傷損大化陵遲而詆疵先主茍肆狂狷存無廷爭之忠沒有誹謗之說夫子罪莫大於累父臣惡莫深於毁君固之過釁事合誅辟據吳祐傳此章馬融之詞書奏冀以白太后使下其事太后不聽得免冀忌帝聰慧恐為後患遂令左右進鴆帝苦煩甚使促召固固入前問陛下得患所由帝尚能言曰食煑餅令腹中悶得水尚可活時冀亦在側曰恐吐不可飲水語未絶而崩固伏尸號哭推舉侍醫冀慮其事泄天惡之因議立嗣固引司徒胡廣司空趙戒謝承書戒字志伯蜀郡成都人也戒博學明經講授舉孝廉累遷荆州刺史梁商弟讓為南陽太守恃椒房之寵不奉法戒到州劾奏之遷河間相以冀部難理整厲威嚴遷戒南陽太守糾豪傑恤吏人奏免中官貴戚子弟為令長貪濁者徴拜為尚書令出為河南尹轉拜太常永和六年特拜司空也先與冀書曰天下不幸仍遭大憂皇太后聖徳當朝攝統萬機明將軍體履忠孝憂存社稷而頻年之間國祚三絶順帝崩冲帝立一年崩質帝一年崩今當立帝天下重器誠知太后垂心將軍勞慮詳擇其人務存聖明然愚情眷眷竊獨有懐逺尋先世廢立舊儀近見國家踐祚前事未}
