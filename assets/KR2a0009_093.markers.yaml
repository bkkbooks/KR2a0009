  - {type: variant, offset: 1149, length: 0, content: '', WYG: 保乾圖曰天皇於是斟元氣陳樞以五易威宋均注曰威則也法也天皇斟元氣陳列樞機受行次之當得也尚書出納王命賦政四海賦布也權尊埶重責之所歸若不平心災𤯝必至誠宜審擇其人以毗聖政今與陛下共理天下者外則公卿尚書内則常侍黄門譬猶一門之内一家之事安則共其福慶危則通其禍敗刺史二千石外統職事内受法則夫表曲者景必邪源清者流必絜猶叩樹本百枝皆動也周頌曰薄言振之莫不震疊韓詩薛君傳曰薄辭也振奮也莫無也震動也疊應也羙成王能奮舒文武之道而行之則天下無不動而應其政教此言動之於内而應於外者也由此言之本朝號令豈可蹉跌間隙一開則邪人動心利競暫啓則仁義道塞刑罰不能復禁化導以之寖壊此天下之紀綱當今之急務陛下宜開石室陳圖書前書曰司馬遷為太史令紬史記石室金匱之書紬音抽招會羣儒引問得失指擿變象以求天意其言有中理即時施行顯拔其人以表能者則聖聽日有所}
