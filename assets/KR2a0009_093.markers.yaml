  - {type: variant, offset: 3292, length: 0, content: '', WYG: 上言自頃選舉牧守多非其人至行無道侵害百姓又宜止槃遊專心庶政帝納其言於是下詔諸州劾奏守令以下政有乖枉遇人無惠者免所居官其姦穢重罪收付詔獄及冲帝即位以固為太尉與梁冀叅録尚書事明年帝崩梁太后以楊徐盗賊盛强恐驚擾致亂使中常侍詔固等欲湏所徴諸王}
