  - {type: variant, offset: 3295, length: 2, content: 講道, WYG: 來政事多謬地震宫廟彗星竟天誠是將軍用情之日傳曰以天下與人易為天下得人難昔昌邑之立昬亂日滋霍光憂愧發憤悔之折骨昌邑王賀武帝孫昌邑哀王子也昭帝崩霍光立之自非博陸忠勇霍光封博陸侯前書音義曰博大陸平取其嘉名無此縣也食邑北海河東也延年奮發大漢之祀幾將傾矣霍光召丞相已下議曰昌邑王行昬亂恐危社稷如何羣臣皆驚愕失色大司農田延年前離席案劒曰今日之議不得旋踵羣臣後應者臣請劒斬之於是廢立遂定至憂至重可不熟慮悠悠萬事唯此為大國之興衰在此一舉冀得書乃召三公中二千石列侯大議所立固廣戒及大鴻臚杜喬皆以為清河王蒜明徳著聞又屬最尊親宜立為嗣先是蠡吾侯志當取冀妹時在京師冀欲立之衆論既異憤憤不得意而未有以相奪未有别理而易奪之中常侍曹騰等聞而夜徃說冀曰將軍累世有椒房之親秉攝萬機賔客縱横多有過差清河王嚴明若果立則將軍受禍不乆矣不如立蠡吾侯富貴可長保也冀然其言明日重會公卿冀意氣凶凶而言辭激切自胡廣趙戒以下莫不懾憚之皆曰惟大將軍令而固獨與杜喬堅守本議冀厲聲曰罷㑹固意既不從猶望衆心可立復以書勸冀愈激怒乃說太后先策免固竟立蠡吾侯是為桓帝後嵗}
