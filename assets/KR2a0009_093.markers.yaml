  - {type: variant, offset: 986, length: 0, content: '', WYG: 秉威權容請託故也而中常侍在日月之側聲埶振天下子弟禄仕曾無限極雖外託謙黙不干州郡而謟偽之徒望風進舉今可為設常禁同之中臣昔舘陶公主為子求郎舘陶公主光武第三女也明帝不許賜錢千萬所以輕厚賜重薄位者為官人失才害及百姓也竊聞長水司馬武宣續漢志長水校尉一人比二千石司馬一人千石掌宿衞也開陽城門候羊廸等續漢志曰城門每門候一人六百石無他功徳初拜便眞此雖小失而漸壊舊章續漢書曰中都官千石六百石故事先守一嵗然後補眞先聖法度所宜堅守政教一跌百年不復詩云上帝板板下民卒癉刺周王變祖法度故使下民將盡病也板反也卒盡也癉病也詩大雅凡伯刺周厲王反先王之道下人盡病也今陛下之}
