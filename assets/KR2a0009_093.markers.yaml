  - {type: variant, offset: 3301, length: 2, content: 逸士, krp: 漢家衰微從此始矣公等受主厚禄顚而不扶傾覆大事後}
  - {type: variant, offset: 3304, length: 0, content: '', WYG: 良史豈有所私固身已矣於義得矣夫復何言廣戒得書悲慙皆長歎流涕州郡收固二子基兹於偃城皆死獄中續漢書曰基偃師長袁宏記曰基字憲公兹字季公並為長史聞固䇿免並弃官亡歸巴漢南鄭趙子賤為郡功曹詔下郡殺固二子太守知其枉遇之甚寛二子託服藥死具棺器欲因出逃子賤畏法勑吏驗寔就殺之小子爕得脫亡命冀乃封廣戒而露固尸於四衢爾雅曰四達謂之衢郭璞注曰交通四出者也令有敢臨者加其罪固弟子汝南郭亮謝承書曰亮字恒直朗陵人也年始成童成童年十五也禮記曰十五成童舞象也遊學洛陽乃左提章鉞章謂所上章也蒼頡}
  - {type: page-break, offset: 3304, content: '', id: KR2a0009_WYG_093-16b, image: WYG0253/WYG0253-0313b.png}
