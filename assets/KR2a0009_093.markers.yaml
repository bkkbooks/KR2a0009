  - {type: variant, offset: 3313, length: 1, content: 感, WYG: 雷霆地厚而有淪䧟上下皆可畏懼也詩云謂天蓋髙不敢不跼謂地蓋厚不敢不蹐也耳目適宜視聽口不可以妄言也太后聞而不誅南陽人董班亦徃哭固而殉尸不肯去殉巡也楚國先賢傳曰班字季宛人也少遊太學宗事李固才髙行羙不交非類嘗耦耕澤畔惡衣蔬食聞固死乃星行奔赴哭泣盡哀司𨽻察狀奏聞天子釋而不罪班遂守尸積十日不去桓帝嘉其義烈聽許送喪到漢中赴葬畢而還也太后憐之乃聽得禭斂歸葬二人由此顯名三公並辟班遂隠身莫知所歸固所著章表奏議教令對䇿記銘凡十一篇弟子趙承等悲歎不已乃共論固言迹}
  - {type: page-break, offset: 3313, content: '', id: KR2a0009_WYG_093-17b, image: WYG0253/WYG0253-0313d.png}
