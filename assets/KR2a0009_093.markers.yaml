  - {type: variant, offset: 3291, length: 0, content: '', WYG: 之位是以巖穴幽人智術之士彈冠振衣樂欲為用四海欣然歸服聖徳厚等在職雖無竒卓然夕惕孳孳志在憂國臣前在荆州聞厚純等以病免歸誠以悵然為時惜之一日朝會見諸侍中並皆年少無一宿儒大人可顧問者誠可歎息宜徴還厚等以副羣望瓊乆處議郎已且十年衆人皆怪始隆崇今更滯也隆髙也崇重也光禄大夫周舉才謨髙正宜在常伯訪以言議侍中杜喬學深行直當世良臣乆託疾病可勑令起又薦陳留楊倫倫見儒林傳河南尹存東平王惲陳國何臨臨字子陵熙之子為平原太守見百家譜也清河房植等植見黨人篇也是日有詔徴用倫厚等而遷瓊舉以固為大司農先是周舉等八使案察天下多所劾奏其中並是宦者親屬輙為請乞詔遂令勿考又舊任三府選令史光禄試尚書郎時皆特拜不復選試固乃與廷尉吳雄上疏以為八使所糾宜急誅罰選舉署置可歸有司帝感其言乃更下免八使所舉刺史二千石自是希復特拜切責三公明加考察朝廷稱善乃復與光禄勲劉}
