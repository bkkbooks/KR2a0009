  - {type: variant, offset: 3305, length: 6, content: 至高文通傳輟, WYG: 曰鉞斧也右秉鈇鑕詣闕上書乞收固屍不許因徃臨哭陳辭於前遂守喪不去夏門亭長呵之曰洛陽北面西頭門門外有萬夀亭李杜二公為大臣不能安上納忠而興造無端卿曹何等腐生公犯詔書干試有司乎腐生者猶言腐儒也亮曰亮含隂陽以生戴乾履坤義之所動豈知性命何為以死相懼亭長歎曰居非命之世非命謂衰亂之時人多不得其死也天髙不敢不跼地厚不敢不蹐跼曲也蹐累足也言天髙}
  - {type: page-break, offset: 3305, content: '', id: KR2a0009_WYG_093-17a, image: WYG0253/WYG0253-0313c.png}
