  - {type: 'tls:seg', offset: 4984, content: '', id: KR2a0009_ZHSJ_093-d93p51s7}
  - {type: variant, offset: 4984, length: 0, content: '', WYG: 逮案罪而梁太后素知喬忠但䇿免而已續漢書曰喬諸生耿伯嘗與鮪同止冀諷吏執鮪為喬門生冀愈怒使人脇喬曰早從宜妻子可得全從宜令其自盡也喬不肯明日冀遣騎至其門不聞哭者遂白執繫之死獄中妻子歸故郡與李固俱暴尸於城北家屬故人莫敢視者喬故掾陳留楊匡聞之號泣星行到洛陽乃著故赤幘託為夏門亭吏守衞尸喪驅䕶蠅蟲積十二日都官從事執之以聞太后義而不罪匡於是帶鈇鑕詣闕上書并乞李杜二公骸骨太后許之成禮殯殮送喬喪還家葬送行服隠匿不仕匡初好學常在外黄大澤教授門徒補蘄長蘄今徐州縣也音機政有異績遷平原令時國相徐曾中常侍璜之兄也匡恥與接事託疾牧豕云袁山松書匡一名章字叔康也論曰夫稱仁者其道𢎞矣𢎞大也言非一塗也立言踐行立其言必踐而行之豈徒徇名安己而已哉徇求也將以定去就之槩正天下之風使生以理全死與義合也槩節也立身之道唯孝與忠全死生之義湏得其所夫專為義則傷生貴義則賤生也專為生則騫義騫違也專為物則害智為物則役智故為害專為已則損仁若義重於生舍生可也生重於義全生可也孟子曰魚我所欲熊掌我所欲也二者不可得兼舍魚而取熊掌者也生亦我所欲也義亦我所欲也二者不可得兼舍生而取義者也上以殘闇失君道下以篤固盡臣節臣節盡而死之則為殺身以成仁去之不為求生以害仁也論語無求生以害仁有殺身以成仁順桓之間國統三絶太后稱制賊臣虎視李固據位持重以爭大義確乎而不可奪確堅貌也易曰確乎其不可拔論語曰臨大節而不可奪豈不知守節之觸禍恥夫覆折之傷任也易曰鼎折足覆公餗言不勝其任也觀其發正辭及所遺梁冀書雖機失謀乖猶戀戀而}
