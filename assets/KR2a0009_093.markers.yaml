  - {type: variant, offset: 4335, length: 376, content: 關西大儒弟子自遠方至者陳留范冉等數百人性恬靜寡欲不交人閒事太守請見之真乃幅巾詣謁太守曰昔魯哀公雖為不肖而仲尼稱臣太守虛薄欲以功曹相屈光贊本朝何如真曰以明府見待有禮故敢自同賓末若欲吏之真將在北山之北南山之南矣太守戄然不敢復言辟公府舉賢良皆不就同郡田弱薦真曰處士法真體兼四業學窮典奧幽居恬泊樂以忘憂將蹈老氏之高蹤不為玄纁屈也臣願聖朝就加袞職必能唱清廟之歌致來儀之鳳矣會順帝西巡弱又薦之帝虛心欲致前後四徵真曰吾既不能遯形遠世豈飲洗耳之水哉遂深自隱絕終不降屈友人郭正稱之曰法真名可得聞身難得而見逃名而名我隨避名而名我追可謂百世之師者矣乃共刊石頌之號曰玄德先生年八十九中平五年以壽終漢陰老父者不知何許人也桓帝延熹中幸竟陵過雲夢臨沔水百姓莫不觀者有老父獨耕不輟尚書郎南陽張溫異之使問曰人皆來觀老父獨不輟何也老父笑而不對溫下道百步自與言老父曰我野人耳不達斯語請問天下, WYG: ''}
