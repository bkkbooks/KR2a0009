  - {type: variant, offset: 3551, length: 0, content: '', WYG: 間梁冀既誅而災𤯝屢見明年史官上言宜有赦令又當存録大臣寃死者子孫於是大赦天下并求固後嗣爕乃以本末告酒家酒家具車重厚遣之皆不受遂還鄉里追服姊弟相見悲感傍人既而戒爕曰先公正直為漢忠臣而遇朝廷傾亂梁冀肆虐令吾宗祀血食將絶今弟幸而得濟豈非天邪宜杜絶衆人勿妄往來愼無一言加於梁氏加梁氏則連主上禍重至矣唯引咎而已爕謹從其誨後王成卒爕以禮葬之感傷舊恩每四節為設上賔之位而祠焉州郡禮命四府並辟皆無所就後徴拜議郎及其在位廉方自守所交皆舍短取長好成人之羙}
