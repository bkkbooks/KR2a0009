  - {type: variant, offset: 4318, length: 1, content: 雄, WYG: 轉東海相入拜侍中漢安元年以喬守光禄大夫使徇察兖州表奏太山太守李固政為天下第一陳留太守梁讓濟隂太守氾宫濟北相崔瑗等臧罪千萬以上讓即大將軍梁冀季父宫瑗皆冀所善還拜太子太傅遷大司農時梁冀子弟五人及中常侍等以無功並封喬上書諫曰陛下越從藩臣龍飛即位天人屬心萬邦攸賴不急忠賢}
