  - {type: variant, offset: 4982, length: 1, content: 延, WYG: 月以地震免宦者唐衡左悺等因共譖於帝曰陛下前當即位喬與李固抗議言上不堪奉漢宗祀抗舉也帝亦怨之及清河王蒜事起梁冀遂諷有司劾喬及李固與劉鮪等交通}
