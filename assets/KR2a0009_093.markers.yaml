  - {type: variant, offset: 3316, length: 2, content: 隱者, WYG: 徳行一篇謝承書曰固所授弟子潁川杜訪汝南鄭遂河内趙承等七十二人相與哀歎悲憤以為眼不復瞻固形容耳不復聞固嘉訓乃共論集徳行一篇爕字徳公初固既䇿罷知不免禍乃遣三子歸鄉里時爕年十三姊文姬為同郡趙伯英妻賢而有智見二兄歸具知事本黙然獨悲曰李氏滅矣自太公以來積徳累仁何以遇此太公謂祖父郃}
