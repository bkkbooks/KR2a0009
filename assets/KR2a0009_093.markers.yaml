  - {type: variant, offset: 2084, length: 1169, content: 好賓客更遣請丹不能致信陽侯陰就光烈皇后弟也以外戚貴盛乃詭說五王求錢千萬約能致丹而別使人要劫之丹不得已既至就故為設麥飯葱葉之食丹推去之曰以君侯能供甘旨故來相過何其薄乎更置盛饌乃食及就起左右進輦丹笑曰吾聞桀駕人車豈此邪坐中皆失色就不得已而令去輦自是隱閉不關人事以壽終梁鴻字伯鸞扶風平陵人也父讓王莽時為城門校尉封脩遠伯使奉少昊後寓於北地而卒鴻時尚幼以遭亂世因卷席而葬後受業太學家貧而尚節介博覽無不通而不為章句學畢乃牧豕於上林苑中曾誤遺火延及它舍鴻乃尋訪燒者問所去失悉以豕償之其主猶以為少鴻曰無它財願以身居作主人許之因為執勤不懈朝夕鄰家耆老見鴻非恆人乃共責讓主人而稱鴻長者於是始敬異焉悉還其豕鴻不受而去歸鄉里埶家慕其高節多欲女之鴻並絕不娶同縣孟氏有女狀肥醜而黑力舉石臼擇對不嫁至年三十父母問其故女曰欲得賢如梁伯鸞者鴻聞而娉之女求作布衣麻屨織作筐緝績之具及嫁始以裝飾入門七日而鴻不荅妻乃跪牀下請曰竊聞夫子高義簡斥數婦妾亦偃蹇數夫矣今而見擇敢不請罪鴻曰吾欲裘褐之人可與俱隱深山者爾今乃衣綺縞傅粉墨豈鴻所願哉妻曰以觀夫子之志耳妾自有隱居之服乃更為椎髻著布衣操作而前鴻大喜曰此真梁鴻妻也能奉我矣字之曰德曜名孟光居有頃妻曰常聞夫子欲隱居避患今何為默默無乃欲低頭就之乎鴻曰諾乃共入霸陵山中以耕織為業詠詩書彈琴以自娛仰慕前世高士而為四皓以來二十四人作頌因東出關過京師作五噫之歌曰陟彼北芒兮噫顧覽帝京兮噫宮室崔嵬兮噫人之劬勞兮噫遼遼未央兮噫肅宗聞而非之求鴻不得乃易姓運期名燿字侯光與妻子居齊魯之閒有頃又去適吳將行作詩曰逝舊邦兮遐征將遙集兮東南心惙怛兮傷悴志菲菲兮升降欲乘策兮縱邁疾吾俗兮作讒競舉枉兮措直咸先佞兮唌唌聊固靡慙兮獨建冀異州兮尚賢聊逍搖兮遨嬉纘仲尼兮周流儻云覩兮我悅遂舍車兮即浮過季札兮延陵求魯連兮海隅雖不察兮光貌幸神靈兮與休惟季春兮華阜麥含含兮方秀哀茂時兮逾邁愍芳香兮日臭悼吾心兮不獲長委結兮焉究口囂囂兮余訕嗟恇恇兮誰留遂至吳依大家皐伯通居廡下為人賃舂每歸妻為具食不敢於鴻前仰視舉案齊眉伯通察而異之曰彼傭能使其妻敬之如此非凡人也乃方舍之於家鴻潛閉著書十餘篇疾且困告主人曰昔延陵季子葬子於嬴博之閒不歸鄉里慎勿令我子持喪歸去及卒伯通等為求葬地於吳要離冢傍咸曰要離烈士而伯鸞清高可令相近葬畢妻子歸扶風初鴻友人京兆高恢少好老子隱於華陰山中及鴻東遊思恢作詩曰鳥嚶嚶兮友之期念高子兮僕懷思想念恢兮爰集茲二人遂不復相見恢亦高抗終身不仕高鳳字文通南陽葉人也少為書生家以農畝為業而專精誦讀晝夜不息妻嘗之田曝麥於庭令鳳護鷄時天暴雨而鳳持竿誦經不覺潦水流麥妻還怪問鳳方悟之其後遂為名儒乃教授業於西唐山中鄰里有爭財者持兵而鬬鳳往解之不已乃脫巾叩頭固請曰仁義遜讓柰何𠫓廾之於是爭者懷感投兵謝罪鳳年老執志不倦名聲著聞太守連召請恐不得免自言本巫家不應為吏又詐與寡嫂訟田遂不仕建初中, WYG: 弭散遷}
