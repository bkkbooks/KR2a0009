  - {type: variant, offset: 3257, length: 2, content: 任隗, WYG: 上疏陳事曰臣聞氣之清者為神人之清者為賢養身者以練神為寳安國者以積賢為道昔秦欲謀楚王孫圉設壇西門陳列名臣秦使戄然遂為寢兵秦欲伐楚使使者徃觀楚之寳器昭奚恤乃為壇使客東面自居西面之壇稱曰理百姓實倉廩子西在此奉珪璋使諸侯子方在此守封彊謹境界葉公子髙在此理師旅正兵戎司馬子反在此懐霸王之餘義獵治亂之遺風昭奚恤在此惟大國所觀使反言於秦君曰楚多賢臣未可謀也事見新序國語曰楚王孫圉聘於晉趙簡子鳴玉以相問圉曰楚之白珩猶在乎其為寳也幾何對曰未嘗為寳也楚人有觀射父能作訓辭以行諸侯有左史倚相道訓典以序百物此楚國之寳也若夫古玉白珩先王之所玩也何寳焉與此所引不同也魏文侯師卜子夏友田子方軾叚干木故羣俊競至名過齊桓秦人不敢闚兵於西河斯蓋積賢人之符也魏文侯受經於子夏過叚干木閭未嘗不軾也李克曰文侯東得卜子夏田子方叚干木此三人者君皆師之又秦欲伐魏或曰魏君賢人是禮國人稱仁上下和合未可圖也事見史記陛下撥亂龍飛初登大位聘南陽樊英江夏黄瓊廣漢楊厚會稽賀純謝承書曰純字仲眞㑹稽山隂人少為諸生博極羣蓺十辟公府三}
