  - {type: variant, offset: 1286, length: 0, content: '', krp: 聖躬謂天子也中夏中國也瞰音苦暫反四裔四夷也稜威也左傳曰徳以柔中國刑以威四夷也西盪河源東澹海漘北動幽崖南趯朱垠盪滌也河源在崑崙山前書曰威稜澹乎鄰國音義曰澹猶動也音徒濫反漘水涯音脣郭璞注爾雅曰涯上平坦而下水深者為漘趯躍也音他歴反說文曰垠界也音銀殊方别區界絶而不鄰自孝武所不能征孝宣所不能臣莫不陸讋水慄奔走而來賔爾雅曰讋懼也音之涉反遂綏哀牢開永昌綏安也哀牢西南夷號永平十二年其國王栁貎相率内屬以其地置永昌郡也春王三朝㑹同漢亰是日也天子受四海之圖籍膺萬國之貢珍内撫諸夏外接百蠻春王猶左傳云春王正月也三朝元日也朝音陟遙反謂嵗之朝月之朝日之朝前書谷永曰今年正月翔日食於三朝之㑹周禮曰時見曰㑹殷眺曰同賈逵注曰膺猶受也詩曰因時百蠻也乃盛禮樂供帳置乎雲龍之庭陳百僚而賛羣后究皇儀而展帝容供帳供設帷帳也供音九用反前書曰三輔長無供悵之勞戴延之記曰端門東有崇賢門次外有雲龍門賛引也於是庭實千品㫖酒萬鍾列金罍班玉觴嘉珍御太牢饗庭實貢獻之物也左傳孟獻子曰臣聞聘而獻物於是有庭實旅百千品言多也說文曰鍾器也孔叢子曰堯飲千鍾罍酒器也詩曰我姑酌彼金罍珍八珍也太牢牛羊豕也饗協韻音香爾乃食舉雍徹太師奏樂陳金石布絲竹鐘鼓鏗鏘管弦曄煜食舉謂當食舉樂也蔡邕禮樂志曰大予樂郊祀陵廟殿中諸食舉樂也雍詩篇名也謂食訖歌雍詩以徹也論語曰三家者以雍徹太師樂官也周禮太師掌六律六呂以合隂陽之聲也鏗音苦耕反鏘音楚庠反曄煜盛貎也煜音育抗五聲極六律歌九功舞八佾韶武備太古畢左傳晏子曰五聲六律杜預注云五聲宮商角徴羽六律黄鍾太簇姑洗蕤賔夷}
  - {type: variant, offset: 1287, length: 0, content: '', WYG: 無射尚書曰九功惟序九序惟歌九功謂金木水火土榖正徳利用厚生也佾舞行也榖梁傳曰天子八佾韶舜樂名武武王樂名太古逺古也四夷間奏徳廣所及仱佅兜離罔不具集間迭也音古莧反詩國風曰漢廣徳廣所及也鄭𤣥注周禮云四夷之樂東方曰韎南方曰任西方曰株離北方曰禁禁字書作仱音渠禁反佅音摩葛反周禮仱作禁佅作韎兜作㭑也萬樂備百禮暨皇歡浹羣臣醉降烟煴調元氣然後撞鐘告罷百僚遂退萬樂百禮盛言之也暨至也易曰天地絪緼萬物化醇禮統曰天地者元氣之所生萬物之祖尚書大傳曰天子将入撞㽔賔之鍾左五鍾皆應撞音直江反於是聖上親萬方之歡娛久沐浴乎膏澤懼其侈心之將萌而怠於東作也尚書曰平秩東作注云嵗起於春而始就耕乃申舊章下眀詔命有司班憲度昭節儉示太素詩大雅曰率由舊章鄭𤣥注云舊典文章左傳臧哀伯曰大路越席大羮不和昭其儉也列子曰太素者質之始也去後宮之麗飾損乘輿之服御除工商之淫業興農桑之上務遂令海内棄末而反本背偽而歸真女修織絍男務耕耘器用陶匏服尚素𤣥耻纎靡而不服賤竒麗而不珍捐金於山沈珠於淵前書文帝詔曰農天下之本也而人或不務本而事末音義曰夲農也末賈也背偽去雕飾也歸真尚質素也杜預注左傳曰織絍織繒布也禮記曰器用陶匏陶瓦器也匏瓠也陸賈新語曰聖人不用珠玉而寳其身故舜棄黄金於嶄巖之山捐珠玉於五湖之川以杜淫邪之欲也於是百姓滌瑕盪穢而鏡至清形神寂寞耳目不營嗜欲之原滅㢘正之心生莫不優游而自得玉潤而金聲瑕穢猶過惡也揚雄集曰滌瑕盪穢淮南子曰形者生之舍神者生之制也又曰和順以寂寞尚書曰弗役耳目百度惟貞淮南子曰吾所謂有天下者自得而已禮記孔子曰君子比徳於玉焉溫潤而澤仁也孟子曰孔子徳如金聲也是以四海之内學校如林庠序盈門獻酬交錯爼豆莘莘下舞上歌蹈徳詠仁前書平帝立舉學官郡國曰學縣道邑及侯國曰校鄉曰庠聚曰序詩曰獻酬交錯莘莘衆多也音所巾反禮記曰歌者在上貴人聲也又嗟歎之不足故手之舞之足之蹈之劉邠曰注平帝立舉學官案文多一舉字登降飫宴之禮既畢因相與嗟歎𤣥徳讜言𢎞說咸含和而吐氣頌曰盛哉乎斯世詩曰飲酒之飫毛萇注云不脫屨升堂謂之飫飫私也尚書曰𤣥徳升聞字林曰讜美言也音黨今論者但知誦虞夏之書詠殷周之詩講羲文之易論孔氏之春秋罕能精古今之清濁䆒漢徳之所由伏羲畫八卦文王作卦辭孔子作春秋清濁猶善惡也唯子頗識舊典又徒馳騁乎末流溫故知新已難而知徳者鮮矣末流猶下流也謂諸子也前書曰不入于道徳放縱于末流論語孔子曰温故知新可以為師矣又曰由知徳者鮮矣且夫辟界西戎險阻四塞修其防禦孰與處乎土中平夷洞達萬方輻湊辟逺也音匹亦反戰國䇿蘇秦說孟嘗君曰秦四塞之國也髙誘注云四靣有山關之固故曰四塞之國防禦謂闗禁也輻湊如輻之湊於轂也前書武帝詔吾丘壽王曰子在朕前之時知略輻湊也秦領九􅉄涇渭之川曷若四瀆五嶽帯河泝洛圖書之淵四瀆江河淮濟也河圖曰天有四表以布精魄地有四瀆以出圖書爾雅曰泰山為東嶽衡山為南嶽華山為西嶽􅁪山為北嶽圖書之淵謂河洛也易繋辭曰河出圖洛出書也建章甘泉館御列仙孰與靈臺眀堂統和天人館御謂設臺以進御神仙也禮含文嘉曰禮天子靈臺以考觀天人之際法隂陽之㑹也太液昆眀鳥獸之囿曷若辟雍海流道徳之富三輔黄啚曰辟雍水四周於外象四海也游俠踰侈犯義侵禮孰與同履法度翼翼濟濟也游俠即西賔云鄉曲豪俊游俠之雄踰侈謂列肆侈於姫姜等也爾雅曰翼翼敬也詩曰濟濟多士毛萇注云濟濟多威儀也子習秦阿房之造天而不知亰洛之有制也識函谷之可闗而不知王者之無外也史記曰秦始皇作阿房宮造至也公羊傳曰王者無外也主人之辭未終西都賔矍然失容逡廵降階惵然意下捧手欲辭主人曰復位今將喻子五篇之詩說文曰矍視遽之貎音許縛反周書曰臨攝以威而惵惵者猶恐懼也音徒頰反喻告也賔既卒業乃稱曰羙哉乎此詩義正乎揚雄事實乎相如非惟主人之好學蓋乃遭遇乎斯時也揚雄作長楊羽獵賦司馬相如作子虚上林賦並文雖藻麗其事迂誕不如主人之言義正事實也小子狂簡不知所裁既聞正道請終身誦之其詩曰論語孔子曰吾黨之小子狂簡斐然成章不知所以裁之又曰不忮不求何用不臧子路終身誦之眀堂詩於昭眀堂眀堂孔陽聖皇宗祀穆穆煌煌於音烏歎羙之辭也詩周頌曰於昭于天孔甚也陽眀也國風曰我朱孔陽聖皇宗祀謂祭光武于眀堂也詩曰穆穆煌煌宜君宜王穆穆猶敬也煌煌猶羙也上帝宴饗五位時序誰其配之世祖光武前書曰天神貴者太一太一佐曰五帝五位五帝也河圖曰蒼帝威靈仰赤帝赤熛怒黄帝含樞紐白帝白招矩黑帝叶光紀揚雄河東賦曰靈祗既饗五位時序謂各依其方而祭之普天率土各以其職猗與緝熙允懐多福詩小雅曰溥天之下莫非王土率土之濵莫非王臣溥亦普也孝經曰四海之内各以其職來助祭詩商頌曰猗與那與猗羙也允信也懐來也詩大雅曰聿懐多福辟雍詩廼流辟雍辟雍湯湯聖皇莅止造舟為梁湯湯水流貎莅臨也詩小雅曰方叔莅止大雅曰造舟為梁毛萇注云天子造舟造至也謂連舟為浮梁也皤皤國老廼父廼兄抑抑威儀孝友光眀説文曰皤皤老人貌也音歩何反孝經援神契曰天子尊事三老兄事五更抑抑羙也詩曰威儀抑抑爾雅曰善父母為孝善兄弟為友於赫太上示我漢行鴻化惟神永觀厥成於赫歎羙也太上謂太古立徳賢聖之人並著飬老之禮今我漢家遵行之也鴻大也文子曰執𤣥徳于心化馳如神詩周頌曰我客戾止永觀厥成爾雅曰觀示也靈臺詩廼經靈臺靈臺既崇帝勤時登爰考休徴詩大雅曰經始靈臺崇髙也時登以時登之休美也徴騐也三光宣精五行布序習習祥風祁祁甘雨三光日月星也宣布也精眀也五行水火金木土布序謂各順其性無謬沴也習習和也詩小雅曰習習谷風禮斗威儀曰君政頌平則祥風至宋均注曰即景風也祁祁徐也詩小雅曰興雨祁祁尚書考靈燿曰熒惑順行甘雨時也百穀溱溱庶卉蕃蕪屢惟豐年於皇樂胥百言非一也尚書洪範曰百穀用成溱溱盛貎尚書曰庶草蕃蕪爾雅曰蕃蕪豐也詩周頌曰綏萬邦屢豐年又曰於皇時周於音烏詩小雅曰君子樂胥受天之祜注云胥有才智之名寳鼎詩嶽修貢兮川效珍吐金景兮歊浮雲寳鼎見兮色紛緼煥其炳兮被龍文謂永平六年王雒山得寳鼎廬江太守獻之景光也說文曰歊氣出貎音火驕反史記曰秦武王與孟恱舉龍文之鼎登柤廟兮享聖神昭靈徳兮彌億年時眀帝詔曰其以礿祭之日陳鼎于廟以備器用彌終也萬萬曰億尚書曰公其以予萬億年敬天之休白雉詩啓靈篇兮披瑞圖獲白雉兮效素烏靈篇謂河洛之書也固集此題篇云白雉素烏歌故兼言效素烏發皓羽兮奮翹英容絜朗兮於淳精皓白也翹尾也春秋元命包曰烏者陽之精章皇徳兮侔周成永延長兮膺天慶章眀也侔等也孝經援神契曰周成王時越裳獻白雉慶讀曰卿及肅宗雅好文章固愈得幸數入讀書禁中㦯連日繼夜每行廵狩輙獻上賦頌朝廷有大議使難問公卿辯論於前賞賜恩寵甚渥固自以二世才術位不過郎二代謂彪及固感東方朔揚雄自論以不遭蘓張范蔡之時作賔戯以自通焉東方􅃋答客難曰使蘓秦張儀與僕並生曽不得掌故安敢望侍郎乎揚雄觧嘲曰范睢魏之亡命也蔡澤山東之匹夫也有談范蔡於許史之間則狂矣固所作賔戯事見前書後遷𤣥武司馬續漢志曰宮掖門每門司馬一人秩比千石𤣥武司馬主𤣥武門天子㑹諸儒講論五經作白虎通徳論令固撰集其事章帝建初四年詔諸王諸儒㑹白虎觀講議五經同異時北單于遣使貢獻求欲和親詔問羣僚議者㦯以為匈奴變詐之國無内向之心徒以畏漢威靈逼憚南虜南匈奴也故希望報命以安其離叛今若遣使恐失南虜親附之歡而成北狄猜詐之計不可固議曰竊自惟思漢興以來曠世歴年兵纒夷狄尤事匈奴綏御之方其塗不一㦯修文以和之㦯用武以征之㦯卑下以就之文帝與匈奴通關市妻以漢女増厚其賂也㦯臣服而致之宣帝時匈奴稽首臣服遣子入侍雖屈申無常所因時異然未有拒絶棄放不與交接者也故自建武之始復修舊典數出重使前後相繼建武二年日逐王遣使詣漁陽請和親使中郎将李茂報命二十六年遣中郎将叚郴授南單于印綬至於其末始乃暫絶永平八年復議通之而廷争連日異同紛回多執其難少言其易先帝聖徳逺覧瞻前顧後遂復出使事同前世先帝謂眀帝也永平八年遣越騎司馬鄭衆報使北匈奴以此而推未有一世闕而不修者也今烏桓就闕稽首譯官康居月氐自逺而至匈奴離析名王來降三方歸服不以兵威此誠國家通於神眀自然之徴也臣愚以為宜依故事復遣使者上可繼五鳳甘露致逺人之㑹宣帝五鳳三年單于名王将衆五萬餘人來降稱臣朝賀甘露元年匈奴呼韓邪遣子右賢王入侍下不失建武永平覊縻之義虜使再來然後一徃既眀中國主在忠信且知聖朝禮義有常豈可逆詐示猜孤其善意乎絶之未知其利通之不聞其害設後北虜稍彊能為風塵相侵擾則風塵起方復求為交通將何所及不若因今施惠為䇿近長固又作典引篇述敘漢徳典謂堯典引猶續也漢承堯後故述漢徳以續堯典以為相如封禪靡而不典文雖靡麗而體無古典揚雄羙新典而不實體雖典則而其事虚偽謂王莽事不實盖自謂得其致焉其辤曰太極之原兩儀始分烟烟熅熅有沈而奥有浮而清易繫辭曰易有太極是生兩儀又曰天地絪縕萬物化醇蔡邕曰絪縕隂陽和一相扶貎也奥濁也易乾鑿度曰清輕者為天濁沈者為地沈浮交錯庶類混成庶類萬物也混猶同也老子曰有物混成先天地生肇命人主五徳初始同乎草昩𤣥混之中人主謂天子也尚書曰成湯簡代夏作民主五徳五行也初始謂伏義始以木徳王也木生火故神農以火徳五行相生周而復始草昧謂草創暗昧也易曰天地草昧幽𤣥混沌之中謂三皇初起之時也踰䋲越契寂寥而亡詔者系不得而綴也易繫辭曰上古結䋲而化後代聖人易之以書契踰越並過也詔告也言過䋲契以上既無父子故寂寥而無文誥系謂易繫辭也故易繫而不得綴連也厥有氏號紹天闡繹者氏號謂太昊號庖犧氏炎帝號神農氏黄帝號軒轅氏之類紹繼也謂王者繼而作闡開也繹陳也莫不開元於太昊皇初之首上哉夐乎其書猶可得而修也易曰帝出於震始以木徳王天下故曰皇初之首又曰古者庖犧氏之王天下也仰則觀象于天俯則觀法于地是其書可得而修也亞斯之世通變神化函光而未曜亞斯之代謂少昊顓頊髙辛等雖通變神化而易繫不載其事故曰函光未曜若夫上稽乾則降承龍翼而炳諸典謨以冠徳卓蹤者莫崇乎陶唐稽考乾天也論語孔子曰惟天為大惟堯則之龍翼謂稷契等為堯之羽翼易乾上九曰用九見羣龍無首吉鄭𤣥注云六爻皆體龍羣龍象也謂禹與稷契咎陶之屬並在于朝炳眀也典謨謂堯典臯陶謨也為道徳之冠首蹤跡之卓異者莫異于陶唐爾雅曰崇髙也陶唐舍𦙍而禪有虞虞亦命夏后稷契熙載越成湯武舍𦙍謂堯舍其𦙍子丹朱而禪於舜舜亦舍其子商均而禪禹書曰熙帝之載孔安國注云熙廣也載事也言稷契並能廣立功事於堯舜之朝越於也於是成其子孫湯武之業並得為天子也湯契之後武王后稷之後股肱既周天乃歸功元首將授漢劉股肱謂稷契也既周謂其子孫並周徧得為天子元首堯也言天更歸功于堯又将授漢以帝位俾其承三季之荒末值亢龍之災孽懸象暗而恒文乖彞倫斁而舊章缺俾使也三季三王之季也易乾文言曰亢龍有悔窮之災也孽亦災也易曰懸象著眀莫大於日月乖謂失於常度也倫理也斁敗也尚書曰彞倫攸斁舊章缺謂秦燔詩書故先命𤣥聖使綴學立制宏亮洪業表相祖宗賛揚廸哲備㦲燦爛真神眀之式也𤣥聖謂孔丘也春秋演孔啚曰孔子母徴在夢感黑帝而生故曰𤣥聖荘子曰恬澹𤣥聖素王之道綴學立制謂為漢家法制也宏洪並大也亮信也表眀也相助也廸蹈也哲智也言賛揚蹈履哲智之君謂髙祖等也尚書曰兹四人廸哲燦爛盛眀也式法也雖前聖臯䕫衡旦宻勿之輔比兹褊矣臯臯陶也䕫舜之典樂者衡謂阿衡即伊尹也旦周公也宻勿猶黽勉也兹謂孔子言臯䕫等比之為褊小矣是以髙光二聖辰居其域時至氣動乃龍見淵躍論語孔子曰譬如北辰居其所而衆星拱之時至氣動謂髙祖聚彤雲於碭山光武發佳氣於白水易乾卦九二曰見龍在田九四曰㦯躍在淵並喻漢初起拊翼而未舉則威靈紛紜海内雲蒸雷動電熛胡縊莽分不莅其誅拊翼以雞為喻言知将旦則鼓其翼而鳴前書曰張陳之交拊翼俱起以喻髙祖光武也紛紜盛貎也如雲之蒸言天下英傑為漢者多矣熛光也胡縊謂胡亥縊死也莽分謂公賔就斬莽也莅臨也言天下先為漢誅之髙祖光武不親臨也然後欽若上下恭揖羣后正位度宗有于徳不台淵穆之譲靡號師矢敦奮撝之容尚書曰欽若昊天欽敬也若順也上下謂天地也書曰格于上下羣后諸侯也易曰君子正位凝命也尚書曰延入翼室恤度宗度居也宗尊也前書曰舜譲于徳不台音義曰台讀曰嗣言二祖初即位居尊之時並譲言于徳不能嗣成帝功有此淵深穆敬之譲髙祖初即位曰寡人聞帝者賢者有也虛言無實之名非所取也光武即位固辭至于再三靡無也矢陳也敦猶廹逼也詩云矢于牧野又曰敷敦淮濆言漢取天下無號令陳師敦廹奮武撝旄之容詩曰奮伐荆楚尚書曰王秉白旄以麾撝亦麾也言並天人所推不尚威力也盖以膺當天之正統受克譲之歸運蓄炎上之烈精蘊孔佐之𢎞陳云爾正統謂漢承周為火徳尚書堯典曰允恭克譲謂漢承堯克譲之後歸運謂堯歸運于漢也炎上謂火徳烈精言盛也蘊藏也孔佐謂孔丘制作春秋及緯書以佐漢也即春秋演孔啚曰夘金刀名為劉中國東南出荆州赤帝後次代周是也謂大陳漢之期運也洋洋乎若徳帝者之上儀誥誓所不及已洋洋羙也若如也儀法也謂如此羙徳可謂五帝之上法也穀梁傳曰誥誓不及五帝盟詛不及三王交質不及五伯上下不相信服方有誥誓五帝之時上下和睦故誓不及鋪觀二代洪纎之度其賾可探也鋪徧也二代殷周也洪纎猶大小也度法度也賾幽深也言徧觀殷周大小之法其幽深可探知之並開迹於一匱同受侯甸之所服奕世勤民以伯方統牧孔子曰譬如平地雖覆一匱鄭𤣥注云匱盛土籠也侯服甸服謂諸侯也湯為桀之諸侯文王為紂之諸侯奕猶重也自契至湯十四代后稷至文王十五代並積勤勞于人也伯方猶方伯也謂湯為夏伯文王為殷伯並統領州牧乘其命賜彤弧黄戚之威用討韋顧黎崇之不格周禮九命作伯彤弧赤弓黄戚黄金飾斧也禮記曰諸侯賜弓矢然後專征伐賜斧鉞然後菽韋顧並國名湯滅之詩殷頌曰韋顧既伐黎崇亦國名史記文王伐崇尚書曰西伯既戡黎格來也至乎三五華夏亰遷鎬亳遂自北靣虎離其師革滅天邑三五未詳京師京都也武王都鎬湯都亳詩云宅是鎬亰武王成之尚書曰湯始居亳從先王居自從也北靣謂臣也湯武並以臣伐君史記曰如虎如羆如豺如離於商郊音義曰離與螭同革改也易曰湯武革命天邑天子所都也尚書曰肆予敢求爾于天邑商劉攽曰注京師京都也案文多一師字是故義士偉而不敦武稱未盡䕶有慙徳不其然與左傳曰武王克商遷九鼎于洛邑義士猶曰薄徳杜預注曰伯夷之屬也史記曰伯夷叔齊逢武王伐紂叩馬諌曰以臣弑君可謂仁乎偉猶異也敦厚也武周武王樂也論語孔子曰謂武盡羙矣未盡善也䕶湯樂也左傳延陵季子聘魯觀樂見舞大䕶者曰聖人之𢎞也而猶有慙徳然猶於穆猗那翕純皦繹以崇嚴祖考殷薦宗祀配帝發祥流慶對越天地者舄奕乎千載豈不克自神眀哉於歎辭也穆美也歎羙周家之徳詩周頌曰於穆清廟猗亦歎之辭也那多也歎羙湯之徳多也殷頌曰猗與那與論語子語魯太師樂曰樂其可知也始作翕如也縱之純如也皦如也繹如也以成何晏注曰翕盛也純和諧也皦其音莭眀也鄭𤣥注云繹調達之貎此言殷周之代尚有於穆猗那之頌播之於翕純皦繹之樂尊祖嚴父宗祀配天於眀堂之中詩商頌曰濬哲惟啇長發其祥言發禎祥以流慶於子孫周頌曰秉文之徳對越在天舄奕猶蟬聫不絶也誕略有常審言行於篇籍光藻朗而不渝爾誕大也言殷周二代改化之迹大略有常也篇籍謂詩書也朗眀也渝變也言光彩文藻朗眀而不變耳其餘殊異不能及於漢也矧夫赫赫聖漢巍巍唐基泝測其源乃先孕虞育夏甄殷陶周矧況也漢承唐虞之基逆流曰泝孕懐也育飬也甄陶謂造成也前書音義曰陶人作瓦器謂之甄言虞夏殷周之先祖並嘗為堯臣劉攽曰注漢承唐虞之基案注觧唐基耳何故輙出虞字明當作堯然後宣二祖之重光襲四宗之緝熙神靈日燭光被六幽仁風翔乎海表威靈行於鬼區慝亡逈而不泯微胡瑣而不頤二祖髙祖世祖也尚書曰宣重光襲重也四宗文帝為太宗武帝為代宗宣帝為中宗明帝為顯宗燭照也言如日之照六幽六合幽逺之地鬼區逺方也易曰髙宗伐鬼方慝惡也逈逺也泯滅也瑣小也頤飬也言凶惡者無逺而不滅微細者何小而不飬也故夫顯定三才昭登之績匪堯不興鋪聞遺筞在下之訓匪漢不𢎞三才天地人也易曰兼三才而兩之登升也績功也言升天之功非堯不能興也尚書曰昭升于上鋪布也遺策堯之餘策謂堯典也在下謂後代子孫也言堯典為子孫之訓非漢不能𢎞大也厥道至乎經緯乾坤出入三光外運混元内浸豪芒性類循理品物咸亨其已久矣經緯天地言隂陽交泰也出入三光言日月星得其度也混元天地之總名也豪芒纎微也老子曰和隂陽節四時潤乎}
