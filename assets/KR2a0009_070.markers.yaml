  - {type: variant, offset: 879, length: 0, content: '', WYG: 于無窮竊見故司空掾桓梁宿儒盛名冠徳州里七十従心行不踰矩論語孔子曰七十而従心所欲不踰矩言恣心之所為皆闇合於法則盖清廟之光輝當世之俊彦也詩周頌曰於穆清廟肅雍顯相濟濟多士秉}
