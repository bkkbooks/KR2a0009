  - {type: variant, offset: 1349, length: 0, content: '', krp: 曰瘞埋祭山曰庋縣祭川曰浮沈肅祗恭敬也封禪書曰湯武至尊不失肅敬元和中詔曰朕廵狩岱宗柴望山川庋音居毁反是以鳳凰來儀集羽族於觀魏肉角馴毛宗於外囿擾緇文皓質於郊升黄暉采鱗於沼甘露霄零於豐草三足軒翥於茂樹尚書曰鳳凰来儀元和二年詔曰乃者鳳凰鸞鳥比集七郡羽族謂羣鳥隨}
