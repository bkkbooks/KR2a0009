  - {type: variant, offset: 877, length: 0, content: '', krp: 無不窮究九流謂道儒墨名法隂陽農術縦横所學無常師不為章句舉大義而已性寛和容衆不以才}
  - {type: variant, offset: 878, length: 0, content: '', WYG: 高人諸儒以此慕之謝承書曰固年十三王充見之拊其背謂彪曰此兒必記漢事永平初東平王蒼以至戚為驃騎将軍輔政開東閣延英雄時固始弱冠奏記說蒼曰奏進也記書也前書待詔鄭朋奏記于蕭望之奏記自朋始也将軍以周召之徳立乎本朝承休眀之䇿建威靈之號號驃騎将軍也昔在周公今也将軍詩書所載未有三此者也惟蒼與周公二人而已傳曰必有非常之人然後有非常之事有非常之事然後有非常之功司馬相如喻蜀之辭固幸得生于清眀之世豫在視聴之末私以螻螘竊觀國政螻螘謂細㣲也誠羙将軍擁千載之任躡先聖之蹤千載謂自周公至眀帝時千餘載也先聖謂周公也體𢎞懿之姿據髙眀之勢博貫世事服膺六藝白黑簡心求善無厭淮南子曰聖人見是非若白黑之别于目左傳曰求善不厭也採擇狂夫之言不逆負薪之議負薪賤人也三畧曰負薪之語廊廟之言也竊見幕府新開廣延羣俊四方之士顛倒衣裳詩曰東方未眀顛倒衣裳言士争歸之急遽也将軍宜詳唐殷之舉察伊臯之薦舜舉臯陶湯舉伊尹令逺近無偏幽隐必達期於總覧賢才收集眀智為國得人以寧本朝則将軍飬志和神優㳺廟堂光眀宣於當世遺烈}
