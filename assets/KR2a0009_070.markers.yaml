  - {type: variant, offset: 865, length: 5, content: 融受業博通, WYG: 遷序帝王則曰本紀公侯傳國則曰世家卿士特起則曰列傳又進項羽陳渉而黜淮南衡山謂遷著項羽本紀又陳渉起于隴畝數月被殺無子孫相繼者為世家淮南衡山漢室之王𦙍當世家而編之列傳言進退之失也細意委曲條例不經若遷之著作採獲古今貫穿}
  - {type: variant, offset: 865, length: 5, content: 融受業博通, krp: 遷序帝王則曰本紀公侯傳國則曰世家卿士特起則曰列傳又進項羽陳渉而黜淮南衡山謂遷著項羽本紀又陳渉起于隴畝數月被殺無子孫相繼者為世家淮南衡山漢室之王𦙍當世家而編之列傳言進退之失也細意委曲條例不經若遷之著作採獲古今貫穿}
