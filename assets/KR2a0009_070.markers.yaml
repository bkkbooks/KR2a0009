  - {type: variant, offset: 1816, length: 492, content: 多所駮正後儒服虔等以為折中所著詩論銘書應訊表教令凡二十篇云史弼字公謙陳留考城人也父敞順帝時以佞辯至尚書郡守弼少篤學聚徒數百仕州郡辟公府遷北軍中候是時桓帝弟渤海王悝素行險辟僭傲多不法弼懼其驕悖為亂乃上封事曰臣聞帝王之於親戚愛雖隆必示之以威體雖貴必禁之以度如是和睦之道興骨肉之恩遂昔周襄王恣甘昭公孝景皇帝驕梁孝王而二弟階寵終用慢卒周有播蕩之禍漢有爰盎之變竊聞勃海王悝憑至親之屬恃偏私之愛失奉上之節有僭慢之心外聚剽輕不逞之徒內荒酒樂出入無常所與羣居皆有口無行或家之𠫓廾子或朝之斥臣必有羊勝伍被之變州司不敢彈糾傅相不能匡輔陛下隆於友于不忍遏絕恐遂滋蔓為害彌大乞露臣奏宣示百僚使臣得於清朝明言其失然後詔公卿平處其法法決罪定乃下不忍之詔臣下固執然後少有所許如是則聖朝無傷親之譏勃海有享國之慶不然懼大獄將興使者相望於路矣臣職典禁兵備禦非常而妄知藩國干犯至戚罪不容誅不勝憤懣謹冒死以聞帝以至親不忍下其事後悝竟坐逆謀貶為癭陶王弼遷尚書出為平原相時詔書下舉鉤黨郡國所奏相連及者多至數百唯弼獨無所上詔書前後切却州郡髡笞掾史從事坐傳責曰詔書疾惡黨人旨意懇惻青州六郡其五有黨近國甘陵亦考南北部平原何理而得獨無弼, WYG: ''}
