  - {type: variant, offset: 883, length: 0, content: '', WYG: 長安有披香殿鴛鸞殿飛翔殿餘未詳昭陽特盛隆乎孝成屋不呈材墻不露形裛以藻繡絡以綸連隨侯眀月錯落其間金釭銜璧是為列錢翡翠火齊流燿含英懸黎垂棘夜光在焉昭陽殿成帝趙昭儀所居也說文曰裛纏也音於業反綸紏青絲綬也綸㦯作編淮南子曰隨侯之珠和氏之璧高誘注云隨侯行見大蛇傷以藥傅之後蛇銜珠以報之因曰隨侯珠說文曰釭轂鐡也音江又音工謂以黄金為釭其中銜璧納之于壁帶為行列歴歴如錢也前書曰昭陽殿壁帶徃徃為黄金釭函藍田玉璧明珠翠羽飾之異物志曰翠鳥形如燕赤而雄曰翡青而雌曰翠其羽可以飾愇帳韻集曰火齊珠也戰國策曰應侯謂秦王曰梁有懸黎左傳曰晉荀息請以垂棘之璧假道于虞言懸黎垂棘之玉並夜有光輝也於是𤣥墀釦切玉階彤庭碝磩采緻琳珉青熒珊瑚碧樹周阿而生前書曰昭陽殿中庭彤朱而殿上髹漆髹音休漆黒故曰𤣥墀殿上地也又曰切皆銅沓黄金塗白玉階釦音口碝磩琳珉並石次玉者碝音而兗反磩音戚綵緻其文理宻也青熒其光色也漢武故事曰武帝起神堂植玉樹茸珊瑚為枝以碧玉為葉淮南子曰崑崙山有碧樹在其北高誘注云碧青石也謂以珠玉假為樹而植之於殿曲阿曲也紅羅颯纚綺組繽紛精曜華燭俯仰如神薛綜注西亰賦曰颯纚長袖貌颯音素合反纚音山綺反綺文繒也組綬也繽紛盛貌燭照也言精彩華飾照曜也戰國䇿張儀謂秦王曰彼周鄭之女粉白黛黑立於衢非知而見之者以為神也後宮之號十有四位窈窕繁華更盛迭貴處乎斯列者蓋以百數前書曰漢興因秦之稱號正嫡稱皇后妾皆稱夫人凡十四等有昭儀婕妤娙娥傛華羙人八子充衣七子良人長使少使五官順常是為十三等又有無涓共和娛靈保林良使夜者秩祿同共為一等合十四位也窈窕幽閑也繁華美麗也百數謂以百而數之也左右廷中朝堂百僚之位蕭曹魏邴謀謨乎其上蕭何曹參並沛人魏相字弱翁濟隂人邴吉字少卿魯國人並為丞相佐命則垂統輔翼則成化流大漢之愷悌蕩亡秦之毒螫李陵書曰其餘佐命立功之士司馬相如曰垂統理順易繼也統業也禮記曰保者慎其身以輔翼之愷樂也悌易也揚雄長楊賦曰今朝廷出愷悌行簡易王褒四子講徳論曰秦之處位任政者並施毒螫前書曰孝惠髙后之時海内得離戰國之苦君臣俱欲無為而天下晏然衣食滋殖又曰近觀漢相髙祖開基蕭曹為冠孝宣中興邴魏有聲是時黜陟有序衆職修理公卿多稱其位海内興于禮譲也故令斯人揚和樂之聲作畫一之歌功徳著於祖宗膏澤洽於黎庶孔叢子曰古之帝王功成作樂其功善者其樂和前書曰蕭何薨曹参代之百姓歌之曰蕭何為法較若畫一曹参代之守而弗失祖宗謂髙祖中宗也又有天祿石渠典籍之府命夫諄誨故老名儒師傅講論乎六藝稽合乎同異三輔故事曰天祿石渠並閣名在未央宮北以閣祕書諄誨謂殷勤教告也詩大雅曰誨爾諄諄鄭𤣥注云我教告王口語諄諄然諄音之純反六蓺謂詩書禮樂易春秋也稽考也前書甘露中詔諸儒講五經同異令蕭望之平奏其議又有承眀金馬著作之庭大雅宏逹於兹為羣元元本本周見洽聞啟發篇章校理秘文承明殿前之廬也金馬署名也門有銅馬故名金馬門待詔者皆居之宏亦大也元其元本其本秘文秘書也孝經鉤命決曰丘掇秘文也周以鉤陳之位衛以嚴更之署總禮官之甲科羣百郡之㢘孝周環也前書音義曰鉤陳紫官外星也宮衛之位亦象之嚴更之署行夜之司也禮官奉常也有博士掌試䇿考其優劣為甲乙之科即前書曰太常以公孫𢎞為下第是也言百郡舉全數前書又曰興㢘舉孝虎賁贅衣閹尹閽寺陛㦸百重各有攸司虎賁宿衛之臣贅衣主衣之官贅綴也音之銳反尚書曰綴衣虎賁閹尹閽寺並宦官周禮有閽人寺人陛㦸執㦸于陛也百重言多也攸所也司主也協韻音伺周廬千列徼道綺錯廬謂宿衛之廬周於宮也千列言多也史記衛令曰周廬設卒甚謹徼道徼廵之道綺錯交錯也前書曰中尉掌徼廵}
