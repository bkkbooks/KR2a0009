  - {type: variant, offset: 746, length: 2, content: 罪成, WYG: 命輙去彪旣才髙而好述作遂専心史籍之間武帝時司馬遷著史記自太初以後闕而不錄太初武帝年號後好事者頗㦯綴集時事然多鄙俗不足以踵繼其書好事者謂揚雄劉歆陽城衡褚少孫史孝山之徒也彪乃繼採前史遺事傍貫異聞作後傳數十篇因斟酌前史而譏正得失其略論曰唐虞三代詩書所及世有史官以司典籍禮記曰動則左史書之言則右史書之見于史籍者夏太史終古殷太史向摯周太史儋也見呂氏春秋暨}
