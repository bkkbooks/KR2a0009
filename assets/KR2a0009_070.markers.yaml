  - {type: variant, offset: 879, length: 0, content: '', krp: 于無窮竊見故司空掾桓梁宿儒盛名冠徳州里七十従心行不踰矩論語孔子曰七十而従心所欲不踰矩言恣心之所為皆闇合於法則盖清廟之光輝當世之俊彦也詩周頌曰於穆清廟肅雍顯相濟濟多士秉}
  - {type: variant, offset: 880, length: 0, content: '', WYG: 之徳鄭𤣥注曰顯光也言桓梁可參多士助祭于清廟為光輝也爾雅曰髦俊也羙士為彦亰兆祭酒晉馮結髮脩身白首無違好古樂道𤣥默自守古人之羙行時俗所莫及扶風掾李育育字元春見儒林傳經眀行著教授百人客居杜陵茅室土階亰兆扶風二郡更請徒以家貧數辭病去温故知新論議通眀㢘清修潔行能純備雖前世名儒國家所器韋平孔翟無以加焉韋賢平當孔光翟方進也流俗本平字作𤣥誤宜令考績以叅萬事亰兆督郵郭基孝行著於州里經學稱於師門政務之績有絶異之效如得及眀時秉事下僚進有羽翮奮翔之用退有杞梁一介之死說苑曰趙簡子㳺于西河而嘆曰安得賢士而與處焉舟人吉桑對曰鴻鵠髙飛所恃者六翮也背上之毛腹下之毳加之滿把飛不能為之益髙不知門下左右客千人亦有六翮之用乎将盡毛毳也又曰齊荘公攻莒杞梁與華周進鬬壊軍陷陣三軍不敢當至莒城下殺二十七人而死也涼州従事王雍躬卞嚴之節文之以術藝卞嚴卞荘子也新序曰卞荘子好勇飬母戰而三北交㳺非之國君辱之荘子受命顔色不變及母死三年齊與魯戰荘子請従至見于将軍曰初獨與母處是以戰而三北今母歿矣請塞責遂赴敵而鬬獲甲首而獻曰夫三北以飬母也吾聞之莭士不以辱生遂殺十人而死論語孔子曰卞荘子之勇冉求之藝文之以禮樂涼州冠蓋未有宜先雍者也古者周公一舉則三方怨曰奚為而後已孫卿子曰周公東征西國怨曰何獨不來也南征而北國怨曰何獨後我也宜及府開以慰逺方𢎞農功曹史殷肅固集殷作叚達學洽聞才能絶倫誦詩三百奉使専對此六子者皆有殊行絶才徳隆當世如蒙徵納以輔髙眀此山梁之秋夫子所為歎也秋猶時也論語孔子曰山梁雌雉時哉昔卞和獻寳以離㫁趾離被也斷趾刖足也事見韓子靈均納忠終於沈身屈原字靈均納忠于楚終不見信自沈于汨羅之水而死而和氏之璧千載垂光屈子之篇萬世歸善願将軍隆照微之眀信日昃之聴信音申少屈威神咨嗟下問令塵埃之中永無荆山汨羅之恨蒼納之父彪卒歸鄉里固以彪所續前史未詳乃潜精研思欲就其業旣而有人上書顯宗告固私改作國史者有詔下郡收固繫亰兆獄盡取其家書先是扶風人蘇朗偽言圖䜟事下獄死固弟超恐固為郡所覈考不能自眀乃馳詣闕上書得召見具言固所著述意而郡亦上其書顯宗甚竒之召詣校書部前書固叙傳曰永平中為郎典校秘書除蘭臺令史漢官儀曰蘭臺令史六人秩百石掌書劾奏與前雎陽令陳宗長陵令尹敏司𨽻従事孟異共成世祖本紀遷為郎典校秘書固又撰功臣平林新市公孫述事作列傳載記二十八篇奏之帝乃復使終成前所著書固以為漢紹堯運以建帝業至於六世史臣六代謂武帝史臣謂司馬遷也乃追述功徳私作本紀編於百王之末厠於秦項之列史記起自黄帝漢最居其末也太初以後闕而不錄故探撰前紀綴集所聞以為漢書起元髙祖終于孝平王莽之誅十有二世二百三十年高惠呂后文景武昭宣元成哀平十二代也幷王莽合二百三十年綜其行事旁貫五經上下洽通為春秋考紀表志傳凡百篇紀十二表八志十列傳七十合百萹前書音義曰春秋考紀謂帝紀也言考覈時事具四時以立言如春秋之經固自永平中始受詔潜精積思二十餘年至建初中乃成當世甚重其書學者莫不諷誦焉自為郎後遂見親近時亰師脩起宮室濬繕城隍而闗中耆老猶望朝廷西顧固感前世相如壽王東方之徒造搆文辭終以諷勸相如作上林子虚賦吾丘壽王作士大夫論及驃騎将軍頌東方朔作客難及非有先生論其辝並以諷諭為主也乃上兩都賦盛稱洛邑制度之羙以折西賔淫侈之論其辭曰有西都賔問於東都主人曰中興都洛陽故以東都為主而謂西都為賔也盖聞皇漢之初經營也嘗有意乎都河洛矣輟而弗康實用西遷作我上都主人聞其故而覩其制乎皇大也尚書曰厥既得吉卜則經營高祖五年婁敬說上都闗中上疑之左右大臣皆山東人多勸都洛陽此為有意都河洛矣張良曰洛陽其中小不過數百里四面受敵非用武之國關中金城千里天府之國也於是上即日西都關中此為輟而弗康也輟止也康安也主人曰未也願賔據懐舊之蓄念發思古之幽情廣雅曰攄舒也博我以皇道𢎞我以漢亰賔曰唯唯漢之西都在于雍州實曰長安前書音義曰長安本秦之鄉名髙祖都焉左據函谷二崤之阻表以泰華終南之山函谷關名也左傳曰崤有二陵其南陵夏后臯之墓其北陵文王之所避風雨故曰二崤太華山也山海經曰華首之西六十里曰太華終南長安南山也詩曰終南何有注云終南周之名山中南也右界襃斜隴首之險帶以洪河涇渭之川襃斜谷名南口曰襃北口曰斜在今梁州隴首山名在今秦州洪大也華實之毛則九州之上腴焉防禦之阻則天下之奥區焉華實之毛謂草木也左傳曰食土之毛前書曰秦地九州膏腴尚書雍州厥田上上防禦謂闗禁也揚雄衛尉箴曰設置山險盡為防禦奥深也言秦地險固為天下深奥之區域是故横被六合三成帝畿前書音義曰闗西為横被猶及也呂氏春秋曰神眀通于六合髙誘注云四方上下為六合周禮曰方千里曰王畿三成謂周秦漢並都之也周以龍興秦以虎視及至大漢受命而都之也龍興虎視喻盛彊也孔安國尚書序曰漢室龍興易曰虎視耽耽仰寤東井之精俯協河圖之靈寤猶曉也協合也髙祖至覇上五星聚于東井又河圖曰帝劉季日角戴勝斗匈龍股長七尺八寸昌光出軫五星聚井期之興天授圖地出道予張兵鈐劉季起東井秦之分野眀漢當代秦都關中奉春建䇿留侯演成奉春君婁敬也春者四時之始婁敬亦始建遷都之䇿故以號焉留侯張良也蒼頡篇曰演者引也天人合應以發皇眀乃眷西頋實惟作京天謂五星聚東井也人謂婁敬等進說也皇明謂髙祖也西頋謂入關也詩云乃眷西顧於是睎秦嶺睋北阜挾酆霸據龍首睎望也音希睋視也音蛾秦嶺在今藍田東南北阜即今三原縣北有髙阜東西横亘者是也酆水出鄠縣南山豐谷霸水出藍田谷三秦記曰龍首山六十里頭入渭水尾達樊川在傍曰挾在上曰據也圖皇基於億載度宏規而大起肇自髙而終平世增飾以崇麗歴十二之延祚故窮奢而極侈肇始也始自高祖終於平帝為十二代也建金城其萬雉呀周池而成淵披三條之廣路立十二之通門金城言堅固也張良曰金城千里杜預注左傳云方丈為堵三堵為雉字林曰呀大空也音火加反周禮國方九里旁三門每門為大路故曰三條鄭𤣥注周禮云司門若今城門校尉主王城十二門也内則街衢洞達閭閻且千九市開場貨别隧分人不得頋車不得旋闐城溢郭傍流百廛紅塵四合煙雲相連字林曰閭里門也閻里中門也且千言多也漢宮闕疏曰長安九市其六在道西三在道東隧列肆道也鄭𤣥注禮記曰廛市邸舍也於是旣庶且富娛樂無疆都人士女殊異乎五方㳺士擬於公侯列肆侈於姫姜論語子適衛冉有僕子曰庶矣哉冉有曰既庶矣又何加焉曰富之詩周頌云惠我無疆疆境也詩小雅曰彼都人士毛萇注云城郭之域曰都五方謂四方及中央也前書曰秦地三方雜錯鄭𤣥注周禮曰肆市中陳物處也杜元凱注左傳云姫姜大國之女也鄉曲豪俊㳺俠之雄節慕原嘗名亞春陵連交合衆騁騖乎其中豪俊㳺俠謂朱家郭觧原渉之類也原嘗謂平原君趙勝孟嘗君田文也春陵謂春申君黄歇信陵君無忌也並招致賔客名髙天下也若乃觀其四郊浮游近縣則南望杜霸北眺五陵名都對郭邑居相承英俊之域黻冕所興冠蓋如雲七相五公浮游謂周流也杜霸謂杜陵霸陵在城南故南望也五陵謂長陵安陵陽陵茂陵平陵在渭北故北眺也並徙人以置縣邑故云名都對郭蒼頡篇曰黻綬也冕冠也其所徙者皆豪右富貲吏二千石故多英俊冠盖之人如雲言多也詩云出其東門有女如雲七相謂丞相車千秋長陵人黄霸王商並杜陵人也韋賢平當魏相王嘉並平陵人也五公謂田蚡為太尉長陵人張安世為大司馬朱博為司空並杜陵人平晏為司徒韋賢為大司馬並平陵人也與乎州郡之豪傑五都之貨殖三選七遷充奉陵邑蓋以彊幹弱枝隆上都而觀萬國前書音義曰五都謂洛陽邯鄲臨淄宛成都也三選選三等之人謂徙吏二千石及髙貲富人及豪傑幷兼之家於諸陵盖以彊幹弱枝非獨為奉山園也見前書自元帝已後不遷故唯七焉爾雅曰觀指示也選㦯為徙義亦通封畿之内厥土千里逴犖諸夏兼其所有前書曰秦地沃野千里人以富饒逴犖猶超絶也逴音卓犖音呂角反諸夏謂中國也其陽則崇山隐天幽林穹谷陸海珍蔵藍田羙玉商洛緣其隈鄠杜濵其足穹谷深谷東方朔曰漢興去三河之地止灞滻之西都涇渭之南此謂天下陸海之地也范子計然曰玉出藍田商及上洛皆縣名隈山曲也濵猶近也鄠杜二縣名近南山之足爾雅云麓山足也源泉灌注陂池交屬竹林果園芳草甘木郊野之富號曰近蜀孔安國注尚書曰澤障曰陂停水曰池前書曰巴蜀土肥羙有山林竹樹蔬食果實之饒今南山亦有之與巴蜀相類故曰近蜀爾雅曰邑外曰郊郊外曰野其隂則冠以九嵕陪以甘泉乃有靈宮起乎其中秦漢之所極觀淵雲之所頌歎於是乎存焉陰謂北也九嵕山尤髙峻故稱冠云甘泉山在雲陽北秦始皇於上置林光宮漢又起甘泉宮益壽延壽館通天臺故云秦漢之所極觀王褒字子淵作甘泉頌揚子雲作甘泉賦故云淵雲頌歎下有鄭白之沃衣食之源隄封五萬疆埸綺分溝塍刻鏤原隰龍鱗决渠降雨荷臿成雲五穀垂頴桑麻敷棻史記曰韓使水工鄭國說秦令引涇水為渠傍北山東注洛溉田四萬餘頃名曰鄭國渠武帝時趙中大夫白公奏穿渠引涇水首起谷口尾入櫟陽溉田四千餘頃因名白渠時人歌之曰田於何所池陽谷口鄭國在前白渠起後舉臿為雲决渠為兩涇水一石其泥數斗且溉且糞長我禾黍衣食亰師億萬之口前書曰天子畿方千里隄封百萬井音義曰隄謂積土為封限也音丁兮反廣雅曰埸界也音亦周禮曰夫間有遂十夫有溝說文曰塍田畦也音繩刻鏤謂交錯如鏤也爾雅曰髙平曰原下濕曰隰言如龍鱗之五色也五榖黍稷菽麥稻也爾雅曰禾穗謂之頴爾雅曰敷布也棻茂盛也音芬東郊則有通溝大漕潰渭洞河泛舟山東控引淮湖與海通波漕水運也蒼頡篇曰潰傍決也前書武帝穿漕渠通渭史記曰滎陽下引河東南為鴻溝以與淮泗㑹西郊則有上囿禁苑林麓藪澤陂池連乎蜀漢繚以周墻四百餘里離宮别館三十六所神池靈沼徃往而在上囿謂上林苑也榖梁傳曰林屬于山為麓鄭𤣥注周禮曰澤無水曰藪繚猶繞也音了三輔黄圖曰上林有建}
