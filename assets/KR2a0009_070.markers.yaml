  - {type: variant, offset: 858, length: 4, content: 典深敬焉, WYG: 所記従漢元至武以絶則其功也至於採經摭傳分散百家之事甚多踈略不如其本務欲以多聞廣載為功論議淺而不篤其論術學則崇黄老而薄五經黄帝老子道家也五經儒家也遷序傳曰道家使人精神専一動合無形贍足萬物此謂崇黄老也}
  - {type: variant, offset: 858, length: 4, content: 典深敬焉, krp: 所記従漢元至武以絶則其功也至於採經摭傳分散百家之事甚多踈略不如其本務欲以多聞廣載為功論議淺而不篤其論術學則崇黄老而薄五經黄帝老子道家也五經儒家也遷序傳曰道家使人精神専一動合無形贍足萬物此謂崇黄老也}
