  - {type: variant, offset: 1292, length: 0, content: '', WYG: 䖍鞏勞謙兢兢業業貶成抑定不敢論制作爾雅曰䖍鞏固也易曰勞謙君子有終吉言帝固為勞謙也兢兢戒慎也業業危懼也禮記曰王者功成作樂理定制禮今不敢論制禮作樂之事言謙之甚也至令遷正黜色賔監之事煥揚宇内而禮官儒林屯朋篤論之士而不傳祖宗之彷彿雖云優慎無乃葸歟遷正改正朔也黜色易服色也賔謂殷周二王之後謂漢之賔監視也視殷周之事以為監戒論語孔子曰周監于二代屯衆也朋羣也不傳謂不制作篇藉以紀功徳也彷彿猶梗槩也論語孔子曰慎而無禮則葸鄭𤣥注云葸質慤貎也言雖優游謙慎無乃太質慤也}
