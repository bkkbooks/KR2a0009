  - {type: variant, offset: 1291, length: 0, content: '', WYG: 分類品物萬殊亨通也易曰含𢎞光大品物咸亨盛㢤皇家帝世徳臣列辟功君百王榮鏡宇宙尊無與抗皇家帝代謂漢家歴代也列辟謂古之帝王也言漢家徳可以臣彼列辟功可以君彼百王相如封禪書曰歴選列辟鏡猶光明也抗猶敵也讀曰康乃}
