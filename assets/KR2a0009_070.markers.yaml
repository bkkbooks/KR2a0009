  - {type: variant, offset: 885, length: 0, content: '', WYG: 也輦路經營脩涂飛閣前書音義曰輦道閣道也涂亦塗也古字通用自未央而連桂宮北彌眀光而絙長樂陵墱道而超西墉混建章而外屬設璧門之鳳闕上柧棱而棲金雀未央宮在西長樂宮在東桂宮眀光宮在北言飛閣相連也墱陛級也音丁鄧反墉城也混同也建章宮在城西屬連也前書曰建章宮其東則鳳闕門髙二十餘丈其南有璧門之屬說文曰柧棱殿堂上最髙之處也柧音孤棱音力登反其上棲金雀焉三輔故事曰建章宮闕上有銅鳳凰即金雀也劉攽曰注鳳闕門案文多一門字内則别風之嶕嶢眇麗巧而竦擢張千門而立萬户順隂陽以開闔三輔故事曰建章宮東有折風闕闗中記曰折風一名别風嶕嶢髙也嶕音焦嶢音堯前書曰建章宮庭為千門萬户闔謂之陰開謂之陽易曰闔户謂之坤闢户謂之乾爾乃正殿崔巍層構厥髙臨乎未央經駘盪而出馺娑洞枍詣與天梁上反宇以蓋戴激日景而納光正殿即前殿也層重也臨乎未央言髙之極也闢中記建章宮有駘盪馺娑枍詣殿天梁亦宮名也駘音殆盪音蕩馺音素合反娑音素可反枍音烏計反爾雅曰蓋戴覆也反宇謂飛檐上反也激日謂日激入于殿内也神眀鬱其特起遂偃蹇而上躋軼雲雨於太半虹霓回帶於棼楣雖輕信與僄狡猶愕眙而不敢階神眀臺名也躋升也偃蹇髙貎也軼過也前書音義曰凡數三分有二為太半說文曰棼棟也爾雅曰楣謂之梁郭璞云門户上横梁也方言曰僄輕也音匹妙反鄭𤣥注禮記曰狡疾也字書曰愕驚也音五各反字林曰眙驚貌也音丑吏反攀井幹而未半目眴轉而意迷舍櫺檻而郤倚若顛墜而復稽魂怳怳以失度廵回涂而下低井幹樓名也前書曰武帝作井幹樓髙五十丈輦道相屬焉蒼頡篇曰眴視不眀也音眩櫺檻樓上欄楯也櫺音零稽㽞也旣懲懼於登望降周流以彷徨歩甬道以縈紆又杳窱而不見陽淮南子曰甬道相連髙誘注云甬道飛閣複道也廣雅曰窈窱深也杳與窈通窱音它鳥反陽明也旣創前之登望乃下廵于複道宮宇深䆳又不見眀也排飛闥而上出若㳺目於天表似無依之洋洋飛闥閣上門也王逸注楚辭曰洋洋無所歸貌前唐中而後太液攬滄海之湯湯揚波濤於碣石激神嶽之嶈嶈濫瀛洲與方壺蓬萊起乎中央前書曰建章宮其西唐中數十里音義曰唐庭也其北太液池中有蓬萊方丈瀛州壺梁象海中神山湯湯流貌也蒼頡篇曰濤大波也碣石海畔山也說文曰濫泛也列子曰海中有神山一曰岱輿二曰貟嶠三曰方壺四曰瀛洲五曰蓬萊於是靈草冬榮神木叢生巖峻崔崒金石峥嶸靈草神木謂不死藥也史記曰海中神山仙人不死藥在焉峥嶸髙峻也崔音阻回反崒音才律反峥音仕耕反嶸音宏抗僊掌以承露擢雙立之金莖軼埃壒之混濁鮮顥氣之清英前書曰武帝時作銅柱承露仙人掌之屬三輔故事云建章宮承露盤髙二十丈大七圍以銅為之上有仙人掌承露和玉屑飲之金莖即銅柱也軼過也埃壒塵也鮮潔也說文曰顥白貌音皓騁文成之丕誕馳五利之所刑庶松喬之羣類時游従乎斯庭實列僊之攸館匪吾人之所寕丕大也誕欺也前書曰齊人李少翁以方士見上上拜為文成将軍言于上曰即欲與神通宮室被服非象神神物不至乃作甘泉宮中為臺畫天地泰一諸鬼神而置祭具以致天神又曰膠東人樂大多方畧而敢為大言言曰臣常往東海中見安期羡門之屬乃拜為五利将軍刑法也列僊傳曰赤松子者神農時雨師也服水玉以教神農又曰王子喬者周靈王太子晋道士浮丘公接以上嵩山爾乃盛娛游之壯觀奮大武乎上囿因兹以威戎夸狄耀威而講事大武謂大陳武事也月令孟冬之月天子乃命将帥講武習射御也命荆州使起鳥詔梁野而驅獸毛羣内闐飛羽上覆接翼側足集禁林而屯聚荆州江湘之地其俗習于捕鳥故使起之梁野巴漢之人其俗習于逐獸故使其人驅之闐音田聚音才諭反水衡虞人理其營表種别羣分部曲有署前書曰上林苑屬水衡都尉虞人掌山澤之官周禮曰虞人萊所田之野為表鄭司農曰表所以識正行列也續漢書将軍領軍皆有部大将軍營五部部校尉一人部下有曲曲有軍候一人也罘罔連紘籠山絡野列卒周帀星羅雲布鄭𤣥注禮記曰獸罟曰罘音浮紘罘之網於是乘鑾輿備法駕帥羣臣披飛㢘入苑門蔡邕獨斷曰天子至尊不敢渫瀆言之故託于乘輿天子車駕有大駕法駕小駕大駕則公卿奉引備千乘萬騎法駕公卿不在鹵簿中惟執金吾奉引侍中驂乘飛㢘館名也武帝所作前書音義曰飛㢘神禽能致風氣身似鹿頭如雀有角而蛇尾文如豹文于館上作之因以名焉劉攽曰乘鑾輿案注所觧乘輿之義則多此鑾字遂繞酆鎬歴上蘭六師發胄百獸駭殫震震爚爚雷奔電激草木塗地山淵反覆蹂蹸其十二三乃拗怒而少息酆文王所都在鄠縣東鎬武王所都在上林苑中三輔黄圖云上林苑有上蘭觀尚書曰司馬掌邦政統六師又曰百獸率舞駭殫言驚懼也震震爚爚奔走之貎爚音躍塗汚也反覆猶傾動也車騎旣多視之眩亂有似傾動蹂踐也音汝九反蹸轢也音力刃反拗猶抑也音於少反言且抑六師之怒而少停也爾乃期門佽飛列刃鑚鍭要趹追蹤鳥驚觸絲獸駭值鋒機不虚掎弦不再控矢無單殺中必疊雙颮颮紛紛矰繳相纒風毛雨血灑野蔽天前書曰武帝與北地良家子期于殿門故號期門又曰募佽飛射士音義佽飛本秦左弋官也武帝改為飲飛官有一令九丞在上林中紡矰繳弋鳬雁嵗萬頭以供宗廟蒼頡篇曰攅聚也鑚與攅通爾雅曰金鏃剪羽謂之鍭音侯廣雅曰趹奔也音決機弩牙也說文曰掎偏引也音居綺反颮颮紛紛衆多也說文曰颮古飈字鄭𤣥注周禮曰結繳于矢謂之矰矰髙也平原赤勇士厲猨􅎜失木豺狼懾竄郭璞注山海經曰猿似猴而大臂長便㨗色黑蒼頡書曰􅎜似狸音以救反淮南子曰猨􅎜顚蹷而失木枝懾懼也音之葉反竄走也協韻音七外反爾乃移師趨險並蹈潜穢窮虎奔突狂兕觸蹷潜深也穢謂榛蕪之林虎兕之所居也爾雅曰兕似牛郭璞曰一角青色重千斤廣雅曰蹷跳也音居衛反許少施巧秦成力折掎僄狡㧖猛噬脫角挫脰徒摶獨殺許少秦成並未詳僄狡獸之輕捷者說文曰搤捉也音戹搤與㧖通噬囓挫折也脰頸也徒空也謂空手摶殺之也爾雅曰暴虎徒摶也殺音所界反挟師豹拖熊螭頓犀犛曳豪羆超逈壑越峻崖蹷巉巗鉅石隤松栢仆叢林摧草木無餘禽獸殄夷師師子也說文曰拖曳也音徒可反杜預注左傳云螭山神獸形郭璞注山海經曰犀似牛而猪頭黑色有三角一在頂上一在額上一在鼻上犛牛黑色出西南徼外犛音力之反爾雅曰羆似熊而黄巉巗山石髙峻之貌也殄盡也夷猶殺也於是天子乃登屬玉之館歴長楊之榭覧山川之體埶觀三軍之殺獲原野蕭條目極四裔禽相鎮厭獸相枕藉前書宣帝幸萯陽宮屬玉觀音義曰屬玉水鳥也似鵁鶄於觀上作之因以名焉三輔黄啚曰上林有長楊宮鄭𤣥注禮記曰土髙曰臺有木曰榭獲協韻音胡卦反楚詞曰山蕭條而無獸然後收禽㑹衆論功賜胙陳輕騎以行炰騰酒車而斟酌割鮮野食}
