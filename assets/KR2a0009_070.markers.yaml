  - {type: 'tls:seg', offset: 868, content: '', id: KR2a0009_ZHSJ_070-d70p7s7}
  - {type: variant, offset: 872, length: 0, content: '', WYG: 至廣博也一人之精文重思煩故其書刋落不盡尚有盈辭多不齊一刋削也謂削落繁蕪仍有不盡若序司馬相如舉郡縣著其字至蕭曹陳平之屬}
  - {type: page-break, offset: 872, content: '', id: KR2a0009_WYG_070-5b, image: WYG0252/WYG0252-0843d.png}
  - {type: variant, offset: 872, length: 0, content: '', krp: 至廣博也一人之精文重思煩故其書刋落不盡尚有盈辭多不齊一刋削也謂削落繁蕪仍有不盡若序司馬相如舉郡縣著其字至蕭曹陳平之屬}
  - {type: variant, offset: 873, length: 0, content: '', WYG: 董仲舒並時之人不記其字㦯縣而不郡者盖不暇也史記衛靑者平陽人也張釋之堵陽人並不顯郡之類也今此後篇慎覈其事整齊其文不為世家惟紀傳而已傳曰殺史見極平易正直春秋之義也彪復辟司徒玊況府玊音肅時東宮初建諸王國並開建武二十三年玊況為司徒十九年建眀帝為太子十七年封諸王而官屬未備師保多闕彪上言曰孔子稱性相近習相逺也見論語賈誼以為習與善人居不能無為善猶生長于齊不能無齊言也習與惡人居不能無惡猶生長于楚不能無楚言也賈誼上疏之辭是以聖人審所與居而戒慎所習昔成王之為孺子出則周公召公太公史佚入則太顛閎夭南宫括散宜生左右前後禮無違者左傳曰自郊勞至于贈賄禮無違者故成王一日即位天下曠然太平是以春秋愛子教以義方不納於邪驕奢滛佚所自邪也左傳衛大夫石碏諌衛莊公之辭也詩云詒厥孫謀以宴翼子言武王之謀遺子孫也詩大雅也詒遺也宴安也翼敬也言文王遺其孫以善謀武王以安敬之道遺其子子謂成王也漢興太宗使鼂錯導太子以法術文帝時鼂錯為博士上言曰人主所以顯功揚名者以知術數也今皇太子所讀書多矣而未知術數願陛下擇聖人之術以賜太子上善之拜錯為太子家令賈誼教梁王以詩書賈誼為梁王太傅梁王文帝之少子名揖愛而好書故令誼傅之及至中宗亦令劉向王褒蕭望之周堪之徒以文章儒學保訓東宫以下中宗宣帝也時元帝為太子宣帝使王褒劉向張子僑等之太子宫娛侍太子朝夕讀誦蕭望之為太傅周堪為少傅並見前書莫不崇簡其人就成徳器今皇太子諸王雖結髮學問脩習禮樂而傅相未置賢才官屬多闕舊典宜博選名儒有威重明通政事者以為太子太傅東宮及諸王國備置官屬又舊制太子食湯沐十縣設周衛交㦸五日一朝因坐東箱省視膳食其非朝日使僕中允旦旦請問而已眀不媟黷廣其敬也漢官儀曰皇太子五日一至臺因坐東箱省視膳食以法制勑太官尚食宰吏其非朝曰使僕中允旦旦請問眀不媟黷所以廣敬也太子僕一人秩千石中允一人四百石主門衛徼廵書奏帝納之後察司徒㢘為望都長吏民愛之察舉也司徒薦為㢘建武三十年年五十二卒官所著賦論書記奏事合九篇二子固超超别有傳論曰班彪以通儒上才傾側危亂之間行不踰方論語孔子曰可謂仁之方鄭𤣥注云方猶道也言不失正仕不急進貞不違人敷文華以緯國典守賤薄而無悶容彼將以世運未𢎞非所謂賤焉耻乎何其守道恬淡之篤也孔子曰邦有道貧且賤焉耻也言彪當中興之初時運未泰故不以貧賤為耻何守道清静之固也恬淡猶清静也篤固也固字孟堅年九嵗能屬文誦詩書及長遂博貫載籍九流}
