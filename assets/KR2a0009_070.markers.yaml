  - {type: variant, offset: 996, length: 2, content: 咨嗟, WYG: 黄圖曰未央宮有清凉殿宣室殿中溫室殿一本作宣寳中溫殿誤今従宋本増改珊瑚碧樹周阿而生注漢武故事曰武帝起神堂植玉樹茸珊瑚為枝茸字一本作葺臣㑹汾按茸與葺皆非也此字當作叢因與茸同音故誤不知者又妄改為葺耳雖輕信與僄狡臣㑹汾按信字義未妥當従文選作迅後漢書卷七十上考證欽定四庫全書後漢書卷七十下宋宣城太守范煜撰唐章懐太子賢注班固列傳第三十下班固傳主人喟然而歎曰痛乎風俗之移人也子實秦人矜夸館室保界河山信識昭㐮而知始皇矣惡睹大漢之云為乎喟歎貎也前書曰人有剛柔緩急音聲不同繫水土之風氣謂之風好惡取舎動静無常隨君上之情欲謂之俗保守也謂守河山之險以為界昭㐮昭王㐮王也惡安也音烏夫大漢之開原也奮布衣以登皇極繇數期而創萬世蓋六籍所不能談前聖靡得而言}
