  - {type: variant, offset: 4014, length: 1040, content: 連戰破賊帥張角斬獲萬餘人角等走保廣宗植築圍鑿造作雲梯垂當拔之帝遣小黃門左豐詣軍觀賊形埶或勸植以賂送豐植不肯豐還言於帝曰廣宗賊易破耳盧中郎固壘息軍以待天誅帝怒遂檻車徵植減死罪一等及車騎將車皇甫嵩討平黃巾盛稱植行師方略嵩皆資用規謀濟成其功以其年復為尚書帝崩大將軍何進謀誅中官乃召并州牧董卓以懼太后植知卓凶悍難制必生後患固止之進不從及卓至果陵虐朝廷乃大會百官於朝堂議欲廢立羣僚無敢言植獨抗議不同卓怒罷會將誅植語在卓傳植素善蔡邕邕前徙朔方植獨上書請之邕時見親於卓故往請植事又議郎彭伯諫卓曰盧尚書海內大儒人之望也今先害之天下震怖卓乃止但免植官而已植以老病求歸懼不免禍乃詭道從轘轅出卓果使人追之到懷不及遂隱於上谷不交人事冀州牧袁紹請為軍師初平三年卒臨困勑其子儉葬於土穴不用棺椁附體單帛而已所著碑誄表記凡六篇建安中曹操北討柳城過涿郡告守令曰故北中郎將盧植名著海內學為儒宗士之楷模國之楨幹也昔武王入殷封商容之閭鄭喪子產仲尼隕涕孤到此州嘉其餘風春秋之義賢者之後宜有殊禮亟遣丞掾除其墳墓存其子孫并致薄醊以彰厥德子毓知名論曰風霜以別草木之性危亂而見貞良之節則盧公之心可知矣夫螽蠆起懷雷霆駭耳雖賁育荊諸之倫未有不冘豫奪常者也當植抽白刃嚴閤之下追帝河津之閒排戈刃赴戕折豈先計哉君子之於忠義造次必於是顛沛必於是也趙岐字邠卿京兆長陵人也初名嘉生於御史臺因字臺卿後避難故自改名字示不忘本土也岐少明經有才蓺娶扶風馬融兄女融外戚豪家岐常鄙之不與融相見仕州郡以廉直疾惡見憚年三十餘有重疾臥蓐七年自慮奄忽乃為遺令勑兄子曰大丈夫生世遯無箕山之操仕無伊呂之勳天不我與復何言哉可立一員石於吾墓前刻之曰漢有逸人姓趙名嘉有志無時命也柰何其後疾瘳永興二年辟司空掾議二千石得去官為親行服朝廷從之其後為大將軍梁冀所辟為陳損益求賢之策冀不納舉理劇為皮氏長會河東太守劉祐去郡而中常侍左悺兄勝代之岐恥疾宦官即日西歸京兆尹延篤復以為功曹先是中常侍唐衡兄玹為京兆虎牙都尉郡人以玹進不由德皆輕侮之岐及從兄襲又數為貶議玹深毒恨延熹元年玹為京兆尹岐懼禍及乃與從子戩逃避之玹果收岐家屬宗親陷以重法盡殺之岐遂逃難四方江淮海岱靡所不歷自匿姓名賣餅北海市中時安丘孫嵩年二十餘遊市見岐察非常人停車呼與共載岐懼失色嵩乃下帷令騎屏行人密問岐曰視子非賣餅者又相問而色動不有重怨即亡命乎我北海孫賓石闔門百口埶能相濟岐素聞嵩名即以實告之遂以俱歸嵩先入白母曰出行乃得死友迎入上堂饗之極歡藏岐複壁中數年岐作戹屯歌二十三章後諸唐死滅因赦乃出三府聞之同時並辟九年乃應司徒胡廣之命會, WYG: 㑹}
