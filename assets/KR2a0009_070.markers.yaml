  - {type: variant, offset: 999, length: 0, content: '', WYG: 漢髙祖曰吾以布衣提三尺劔取天下髙祖起兵五年而即帝位故云由數期繇即由也孔安國注尚書云匝四時曰期萬世盛言之也六籍六經也當此之時功有横而當天討有逆而順人故婁敬度埶而獻其說蕭公權宜以拓其制時豈泰而安之哉計不得以已也横音胡孟反髙祖入關秦王子嬰降而五星聚于東井此功有横而當天也逆謂以臣伐君前書陸賈曰湯武逆取而以順守之及髙祖入關秦人争獻牛酒此謂討有逆而順人也婁敬已見上又曰蕭何脩未央宮上見壮麗甚怒何對曰天下未定故可因遂就宮室且天子以四海為家非令壮麗無以威重且無令後代有以加也時豈奢侈而安之哉言天下初定計不得已而都西亰也吾子曾不是睹頋燿後嗣之末造不亦闇乎顧反也燿炫燿也言吾子曽不睹度埶權宜之由而反炫燿後嗣子孫末代之所造非其盛稱武帝成帝神僊昭陽之事也今將語子以建武之理永平之事監乎泰清以變子之或志淮南子曰太清之化也和順以寂漠質直以素樸髙誘注曰太清無為之化也往者王莽作逆漢祚中缺天人致誅六合相滅天人謂天意人事共相誅也于時之亂生民㡬亡鬼神泯絶壑無完柩郛罔遺室原野猒人之肉川谷流人之血秦項之災猶不克半書契以來未之或紀也人者神之主生人既亡故鬼神亦絶也楊子法言曰秦将白起長平之戰坑四十萬人原野猒人之肉川谷流人之血也故下民號而上愬上帝懐而降鑒致命於聖皇上帝天也聖皇光武也懐猶愍念也降下也鍳視也言上天愍念下人之上愬故下視四海可以為君者而致命於光武也於是聖皇乃握乾符闡坤珍披皇圖稽帝文赫爾發憤應若興雲霆發昆陽憑怒雷震乾符坤珍謂天地符瑞也皇圗帝文謂圖緯之文也霆疾雷也發于昆陽謂破王尋王邑憑盛也言盛怒如雷之震協韻音真遂超大河跨北嶽立號髙邑建都河洛跨㩀也言光武渡河㩀北嶽遂即位於鄗而改鄗為髙邑也紹百王之荒屯因造化之盪滌體元立制繼天而作紹繼也屯難也高誘注淮南子云造化天地也滌除也作起也杜預注左傳云凡人君即位欲體元以居正穀梁傳曰為天下主者天也繼天者君也系唐統接漢緒茂育羣生恢復疆宇􅈴兼乎在昔事勤乎三五爾雅曰系繼也緒業也前書曰漢帝本系出自唐帝言光武能繼唐堯之統業也恢大也三五三皇五帝也豈特方軌並迹紛綸后辟理近古之所務蹈一聖之險易云爾哉軌轍也紛綸猶雜蹂也爾雅曰后辟君也險易猶理亂也言光武功徳勤勞兼於前代百王非直一聖帝也且夫建武之元天地革命四海之内更造夫婦肇有父子君臣初建人倫實始斯乃虙羲氏之所以基皇徳也易曰天地革而四時成又曰湯武革命爾雅曰九夷八狄七戎六蠻謂之四海基始也帝王紀曰庖犧氏風姓也制嫁娶之禮取犠牲以充庖厨以食天下故號庖犧後或謂之伏犧言光武更造夫婦如伏犧時也分州土立市朝作舟車造器械斯軒轅氏之所以開帝功也黄帝號軒轅氏前書昔在黄帝畫野分州易繋辭曰神農氏日中為市黄帝堯舜垂衣裳而天下治刳木為舟剡木為楫服牛乘馬引重致逺以利天下弦木為弧剡木為矢弧矢之利以威天下言光武利人如軒轅也龔行天罸應天順民斯乃湯武之所以昭王業也尚書武王曰今子惟龔行天之罸易曰湯武革命順乎天而應乎人言光武征伐如湯武者也遷都改邑有殷宗中興之則焉即土之中有周成隆平之制焉尚書曰盤庚遷于殷史記曰帝陽甲之時殷衰諸侯莫朝陽甲崩弟盤庚立自河北度河南居湯之故地行湯之政殷道復興尚書曰王來紹上帝自服于土中孔安國曰洛邑地埶之中也春秋命歴序曰成康之隆醴泉湧出言都洛陽如殷宗周成之制也不階尺土一人之柄同符乎髙祖孟子曰紂去武丁未久也尺地莫非其有也一人莫非其臣也又曰舜文王相去千有餘嵗若合符契克己復禮以奉終始允恭乎孝文左傳仲尼曰古有志克已復禮仁也孫卿子曰生人之始死人之終也終始俱善人道畢矣尚書允恭克譲謂躬自儉約同於文帝也憲章稽古封岱勒成儀炳乎世宗憲章猶法則也禮記曰仲尼憲章文武尚書曰若稽古帝堯言法乎考古而封泰山勒石以記成功也炳眀也其禮儀眀乎武帝也案六經而校徳妙古昔而論功仁聖之事旣該帝王之道備矣六經謂詩書禮樂易春秋妙猶羙也或作眇眇逺也該偹也至于永平之際重熈而累洽盛三雍之上儀脩袞龍之法服敷洪藻信景鑠揚世廟正予樂人神之和允洽君臣之序既肅熈光也洽浹也三雍謂眀堂辟雍靈䑓也永平二年正月宗祀光武皇帝于眀堂禮畢登靈䑓三月臨辟雍行大射禮周禮王之吉服享}
