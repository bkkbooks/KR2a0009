  - {type: 'tls:seg', offset: 1352, content: '', id: KR2a0009_ZHSJ_070-d70p11s46}
  - {type: variant, offset: 1352, length: 0, content: '', WYG: 觀魏門闕也肉角謂麟也伏侯古今注曰建初二年北海得一角獸大如麕有角在耳間端有肉又元和二年麒麟見陳一角端如葱葉色赤黄櫌馴也緇文皓質謂騶虞也說文曰騶虞白虎黑文尾長于身古今注曰元和三年白虎見彭城黄暉采鱗謂黄龍也建初五年有八黄龍見于零陵古今注曰元和二年甘露降河南三足烏集沛國軒翥謂飛翔上下也若乃嘉穀靈草竒獸神禽應圖合牒窮祥極瑞者朝夕坰牧日月邦畿卓犖乎方州羡溢乎要荒嘉穀嘉禾靈草芝屬古今注曰元和二年芝生沛如人冠大坐状章和九年詔曰嘉榖滋生芝草之類嵗月不絶竒獸神禽謂白虎白雉之屬也建初七年獲白鹿元和元年日南獻生犀白雉言應於瑞圖又合乎史諜也坰牧郊野也卓犖殊絶也羡音以戰反劉攽曰注如人冠大坐案文大當作衣冠如人衣冠坐也昔姬有素雉朱烏𤣥秬黄之事耳君臣動色左右相趨濟濟翼翼峨峨如也孝經援神契曰周成王時越裳來獻白雉朱烏謂赤烏也尚書中候曰大子發渡孟津有火自天止于王屋流為赤烏𤣥秬黑黍也詩大雅曰誕降嘉種惟秬惟秠黄麥也謂赤烏銜牟麥而至也詩頌曰貽我來牟詩大雅曰濟濟多士又曰惟此文王小心翼翼又曰奉璋峨峨盖用昭眀寅畏承聿懐之福亦以寵靈文武貽燕後昆覆以懿鑠豈其為身而有顓辭也詩大雅曰昭明有融寅敬也尚書曰嚴恭寅畏聿述也懐思也詩大雅曰昭事上帝聿懐多福貽遺也燕安也後昆子孫也言此並以光寵神靈文王武王之徳遺燕安于子孫也詩大雅曰貽厥孫謀以燕翼子覆猶重也懿鑠並羙也詩大雅曰我求懿徳又曰於鑠王師言詩人歌頌周之盛徳當成康之時其成王康王豈獨為身而有自専之辭也並上寵文武之業下遺子孫之基也言今章帝既獲符瑞之應亦宜同成康之事也若然受之宜亦勤恁旅力以充厥道啓恭館之金縢御東序之祕寳以流其占受之謂漢受此符瑞也說文曰恁念也音人甚反旅陳也允當也恭肅之館謂廟中也金縢以金緘匱藏符瑞之書於其中也御猶陳也東序東箱也秘寳謂河啚之屬尚書曰天球河啚在東序孔安國注曰河啚八卦是也言啓金縢之書及河啚之卦以占之也流猶徧也夫圖書亮章天哲也孔猷先命聖孚也體行徳本正性也逄吉丁辰景命也啚書河啚洛書也亮信章眀哲智言天便啚書者為天子所知也孔孔丘也猷啚也孚信也孔丘之啚先命漢家當湏封禪此聖}
