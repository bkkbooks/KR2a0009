  - {type: variant, offset: 1000, length: 0, content: '', WYG: 王即袞冕鄭𤣥注曰袞卷龍衣也永平二年帝及公卿列侯始服冕冠衣裳敷布也鴻大也藻文藻也謂明帝禮畢登靈䑓之後布詔于天下曰建明堂立辟雍起靈䑓恢𢎞大道被之八極此為布鴻藻也信讀曰申景大也鑠羙也揚世廟謂上尊號光武廟曰世祖正予樂謂依讖文改大樂為大予樂也乃動大路遵皇衢省方廵狩窮覧萬國之有無考聲教之所被散皇眀以燭幽大路玉路也皇衢馳道也易曰先王以省方觀人設教尚書曰嵗二月東廵狩又曰朔南暨聲教皇大也燭照也然後增周舊脩洛邑翩翩巍巍顯顯翼翼光漢亰于諸夏總八方而為之極周成王都洛邑漢又増而修之故曰増焉翩翩巍巍顯顯翼翼並宮闕顯盛之貎論語曰不如諸夏之亡詩商頌曰商邑翼翼四方之極極中也洛陽土之中也}
