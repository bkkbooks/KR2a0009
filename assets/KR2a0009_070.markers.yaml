  - {type: variant, offset: 863, length: 1, content: 從, WYG: 曰儒者博而寡要勞而少功此為薄五經也序貨殖則輕仁義而羞貧窮史記貨殖傳序曰家貧親老妻子輭弱嵗時無以祭祀飲食被服不足以自適如此不慙耻則無所比矣無巖處竒士之行而長貧賤語仁義亦足羞也道㳺俠則賤守節而貴俗功史記㳺俠傳序曰季次原憲行君子之徳義不苟合當世當世亦笑之終身空室蓬户褐衣疏食不厭今㳺狹其行雖不軌于正義然其言必信其行必果已諾必誠不愛其軀赴士之戹盖有足道者今拘學或抱咫尺之義久孤于世豈若卑論齊俗與世沈浮而取榮名哉此其大敝傷道所以遇極刑之咎也極刑謂遷被腐刑也遷與任安書曰最下腐刑極矣然善述序事理辯而不華質而不俚文質相稱蓋良史之才也誠令遷依五經之法言同聖人之是非意亦庶幾矣易曰顔氏之子其殆庶幾乎夫百家之書猶可法也若左氏國語世本戰國䇿楚漢春秋太史公書今之所以知古後之所由觀前聖人之耳目也司}
  - {type: page-break, offset: 863, content: '', id: KR2a0009_WYG_070-4b, image: WYG0252/WYG0252-0843b.png}
  - {type: page-break, offset: 863, content: '', id: KR2a0009_WYG_070-5a, image: WYG0252/WYG0252-0843c.png}
