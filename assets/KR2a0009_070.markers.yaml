  - {type: variant, offset: 5057, length: 15, content: 烏桓鮮卑反叛公卿舉岐擢拜并州刺, WYG: 掩破北庭永元二年南單于出雞鹿塞擊北匈奴於河雲大破之固至私渠海聞虜中亂引還及竇憲敗固先坐免官固不教學諸子諸子多不遵法度吏人苦之初洛陽令种兢嘗行固奴干其車騎吏推呼之奴醉罵兢大怒畏憲不敢發心衘之及竇氏賔客皆逮考兢因此捕繋固遂死獄中時年六十一詔以譴責兢抵主者吏罪固所著典引賔戯應譏詩賦銘誄頌書文記論議六言在者凡四十一篇論曰司馬遷班固父子其言}
