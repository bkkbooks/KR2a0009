  - {type: variant, offset: 1000, length: 0, content: '', krp: 王即袞冕鄭𤣥注曰袞卷龍衣也永平二年帝及公卿列侯始服冕冠衣裳敷布也鴻大也藻文藻也謂明帝禮畢登靈䑓之後布詔于天下曰建明堂立辟雍起靈䑓恢𢎞大道被之八極此為布鴻藻也信讀曰申景大也鑠羙也揚世廟謂上尊號光武廟曰世祖正予樂謂依讖文改大樂為大予樂也乃動大路遵皇衢省方廵狩窮覧萬國之有無考聲教之所被散皇眀以燭幽大路玉路也皇衢馳道也易曰先王以省方觀人設教尚書曰嵗二月東廵狩又曰朔南暨聲教皇大也燭照也然後增周舊脩洛邑翩翩巍巍顯顯翼翼光漢亰于諸夏總八方而為之極周成王都洛邑漢又増而修之故曰増焉翩翩巍巍顯顯翼翼並宮闕顯盛之貎論語曰不如諸夏之亡詩商頌曰商邑翼翼四方之極極中也洛陽土之中也}
  - {type: variant, offset: 1001, length: 0, content: '', WYG: 以皇城之内宮室光眀闕庭神麗奢不可踰儉不能侈言奢儉合禮也外則因原野以作苑順流泉而為沼發蘋藻以潜魚豐圃草以毓獸制同乎梁騶義合乎靈囿蘋藻並水草也詩小雅曰魚在在藻韓詩曰東冇圃草駕言行狩薛君傳曰圃博也有博大之茂草也毓亦育也魯詩傳曰古有梁騶者天子之田也詩大雅曰王在靈囿麀鹿攸伏毛萇注云囿所以域飬禽獸也此言魚獸各得其所如文王之靈囿也若乃順時節而蒐狩簡車徒以講武則必臨之以王制考之以風雅左傳臧僖伯曰春蒐夏苖秋獮冬狩皆于農隙以講事也杜預注云各隨時之閑也禮記王制曰天子諸侯無事則嵗三田田不以禮曰暴天物也歴騶虞覽駟驖嘉車攻采吉日禮官正儀乘輿乃出詩國風序曰騶虞蒐田以時仁如騶虞毛萇注曰騶虞義獸白虎黑文不食生物又曰駟鐵羙㐮公也始命有田狩之事其詩曰駟驖孔阜注曰驖驪也阜大也又小雅序曰車攻宣王復古也修車馬備器械復㑹諸侯於東都因田獵而選車徒焉其詩曰我車既攻我馬既同注云攻堅也又吉日詩曰我車既好四牡孔阜宣帝詔曰禮官具禮儀也於是發鯨魚鏗華鍾登玉輅乘時龍鳳蓋颯灑和鸞玲瓏天官景從祲威盛容鯨魚謂刻杵作鯨魚形也鏗謂擊之也音苦耕反尚書大傳曰天子将出則撞黄鍾右五鍾皆應薛綜注西京賦云海中有大魚名鯨又有獸名蒲牢蒲牢素畏鯨魚鯨魚擊蒲牢蒲牢輙大鳴呼凡鍾欲令其聲大者故作蒲牢于其上撞鍾者名為鯨魚鍾有篆刻之文故曰華爾雅曰馬髙八尺以上曰龍月令春駕蒼龍各隨四時之色故曰時也玲瓏聲也蔡邕獨斷曰百官小吏曰天官祲亦盛也山靈䕶野屬御方神雨師汎灑風伯清塵千乘雷起萬騎紛紜元戎竟野戈鋋彗雲羽旄掃電旌旗拂天山靈山神也屬連也音燭方四方也雨師畢星也風伯箕星也韓子師曠謂晉平公曰黄帝合鬼神于泰山風伯進掃雨師灑道蔡邕獨斷曰天子大駕偹千乘萬騎元戎戎車也詩小雅曰元戎十乘以先啓行毛萇注曰元大也夏后氏曰鉤車先正也殷曰寅車先疾也周曰元戎先良也說文曰鋋小矛也音市延反彗掃也音似銳反焱焱炎炎揚光飛文吐爓生風吹野燎山日月為之奪眀丘陵為之摇震焱焱炎炎並戈矛車馬之光也說文曰焱火華也音以瞻反震讀曰真遂集乎中囿}
