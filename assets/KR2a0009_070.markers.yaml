  - {type: variant, offset: 749, length: 3, content: 卿手李, WYG: 諸侯國自有史左傳魯季孫召外史掌惡臣衛史華龍滑曰我太史也楚有左史倚相故孟子曰楚之檮杌晉之乘魯之春秋其事一也乘者興于田賦乘馬之事檮杌者嚚凶之類興于記惡之誡春秋以二始舉四時以記萬事遂各因以為名其記事一也見趙岐孟子注定哀之間魯定}
