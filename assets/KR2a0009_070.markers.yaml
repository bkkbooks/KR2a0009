  - {type: variant, offset: 882, length: 0, content: '', WYG: 神池通白鹿原詩曰王在靈沼其中乃有九真之麟大宛之馬黄支之犀條枝之鳥踰崐崘越巨海殊方異類至三萬里宣帝詔曰九真郡獻竒獸晋灼漢書注云駒形麟色牛角武帝時李廣利斬大宛王首獲汗血馬來又黄支國自三萬里貢生犀條枝國臨西海有大鳥卵如甕條枝與安息接武帝時安息國發使來獻之又曰崑崙山髙二千五百里並見前書其宮室也體象乎天地經緯乎隂陽據坤靈之正位放泰紫之圎方圎象天方象地南北為經東西為緯揚雄司空箴曰普彼坤靈侔天作合放象也太紫謂太微紫宮也劉向七畧曰眀堂之制内有太室象紫宮南出明堂象太微春秋合誠圖曰太微其星十二四方史記天官書曰環之匡衛十二星藩臣皆曰紫宮是太微方而紫宮圎也樹中天之華闕豐冠山之朱堂因瑰材而䆒竒抗應龍之虹梁列棼橑以布翼荷棟桴而高驤列子曰周穆王作中天之臺說文曰闕門觀也前書簫何作東闕北闕豐大也冠山謂在山之上也埤蒼曰瑰瑋珍竒也廣雅曰有翼曰應龍梁作應龍之形而又曲如虹也説文曰棼複屋之棟橑椽也翼屋之四阿也荷負也驤舉也爾雅曰棟謂之桴音浮雕玉瑱以居楹裁金璧以飾璫發五色之渥采光爓朗以景彰廣雅曰瑱礩也音田瑱與磌通楹柱也雕玉為礩以承柱也上林賦曰華榱璧璫韋昭注曰璫榱頭也渥光潤也爓音豔於是左墄右平重軒三階閨房周通門闥洞開列鍾虡於中庭立金人於端闈仍増崖而衡閾臨峻路而啟扉摯虞决疑要注曰墄者為階級平者以文塼相亞次也域亦作墄言階級勒墄然音七則反王逸楚辭注曰軒樓板也周禮夏后氏世室九階鄭𤣥注云南靣三階三靣各二也爾雅曰宮中之門謂之闈小者謂之闥簴以懸鍾也史記秦始皇收天下兵器聚之咸陽銷以為金人十二置宮中端闈宫正門也三輔黄圖曰秦宮殿端門四達以則紫宮仍因也衡横也閾門限劉攽曰注域亦作墄案文當云亦作域言墄字有作域者也下又云墄言階級勒墄是觧墄義耳徇以離殿别寝承以崇臺閒館煥若列星紫宮是環徇猶繞也崇髙也閒音閑煥明也言周回宮館眀若列星之環繞紫宮也環協韻音宦清凉宣溫神僊長年金華玉堂白虎麒麟區宇若兹不可殫論三輔黄圖曰未央宮有清涼殿宣室殿中溫室殿金華殿大玉堂殿中白虎殿麒麟殿長樂宮有神仙殿殫盡也増槃業峨登降炤爛殊形詭制每各異觀乘茵歩輦唯所息宴増重也槃屈也業峨髙也業音五臘反峨音我詭異也茵褥也駕人曰輦後宮則有掖庭椒房后妃之室合歡増成安處常寕茝若椒風披香發越蘭林蕙草鴛鸞飛翔之列漢官儀曰婕妤以下皆居掖庭三輔黄圖曰長樂宮有椒房殿前書曰班婕妤居増成舍桓譚新論曰董賢女弟為昭儀居舍號曰椒風漢宮闕}
