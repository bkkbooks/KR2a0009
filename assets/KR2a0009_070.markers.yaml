  - {type: variant, offset: 1286, length: 0, content: '', WYG: 聖躬謂天子也中夏中國也瞰音苦暫反四裔四夷也稜威也左傳曰徳以柔中國刑以威四夷也西盪河源東澹海漘北動幽崖南趯朱垠盪滌也河源在崑崙山前書曰威稜澹乎鄰國音義曰澹猶動也音徒濫反漘水涯音脣郭璞注爾雅曰涯上平坦而下水深者為漘趯躍也音他歴反說文曰垠界也音銀殊方别區界絶而不鄰自孝武所不能征孝宣所不能臣莫不陸讋水慄奔走而來賔爾雅曰讋懼也音之涉反遂綏哀牢開永昌綏安也哀牢西南夷號永平十二年其國王栁貎相率内屬以其地置永昌郡也春王三朝㑹同漢亰是日也天子受四海之圖籍膺萬國之貢珍内撫諸夏外接百蠻春王猶左傳云春王正月也三朝元日也朝音陟遙反謂嵗之朝月之朝日之朝前書谷永曰今年正月翔日食於三朝之㑹周禮曰時見曰㑹殷眺曰同賈逵注曰膺猶受也詩曰因時百蠻也乃盛禮樂供帳置乎雲龍之庭陳百僚而賛羣后究皇儀而展帝容供帳供設帷帳也供音九用反前書曰三輔長無供悵之勞戴延之記曰端門東有崇賢門次外有雲龍門賛引也於是庭實千品㫖酒萬鍾列金罍班玉觴嘉珍御太牢饗庭實貢獻之物也左傳孟獻子曰臣聞聘而獻物於是有庭實旅百千品言多也說文曰鍾器也孔叢子曰堯飲千鍾罍酒器也詩曰我姑酌彼金罍珍八珍也太牢牛羊豕也饗協韻音香爾乃食舉雍徹太師奏樂陳金石布絲竹鐘鼓鏗鏘管弦曄煜食舉謂當食舉樂也蔡邕禮樂志曰大予樂郊祀陵廟殿中諸食舉樂也雍詩篇名也謂食訖歌雍詩以徹也論語曰三家者以雍徹太師樂官也周禮太師掌六律六呂以合隂陽之聲也鏗音苦耕反鏘音楚庠反曄煜盛貎也煜音育抗五聲極六律歌九功舞八佾韶武備太古畢左傳晏子曰五聲六律杜預注云五聲宮商角徴羽六律黄鍾太簇姑洗蕤賔夷}
