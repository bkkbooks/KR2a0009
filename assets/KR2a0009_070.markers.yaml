  - {type: variant, offset: 3006, length: 634, content: 議欲加封爵植雖布衣以武素有名譽乃獻書以規之曰植聞嫠有不恤緯之事漆室有倚楹之戚憂深思遠君子之情夫士立爭友義貴切磋書陳謀及庶人詩詠詢于芻蕘植誦先王之書久矣敢愛其瞽言哉今足下之於漢朝猶旦奭之在周室建立聖主四海有繫論者以為吾子之功於斯為重天下聚目而視攢耳而聽謂準之前事將有景風之祚尋春秋之義王后無嗣擇立親長年均以德德均則決之卜筮今同宗相後披圖案牒以次建之何勳之有豈橫叨天功以為己力乎宜辭大賞以全身名又比世祚不競仍外求嗣可謂危矣而四方未寧盜賊伺𨻶恆岳勃碣特多姦盜將有楚人脅比尹氏立朝之變宜依古禮置諸子之官徵王侯愛子宗室賢才外崇訓道之義內息貪利之心簡其良能隨用爵之彊幹弱枝之道也武並不能用州郡數命植皆不就建寧中徵為博士乃始起焉熹平四年九江蠻反四府選植才兼文武拜九江太守蠻寇賓服以疾去官作尚書章句三禮解詁時始立太學石經以正五經文字植乃上書曰臣少從通儒故南郡太守馬融受古學頗知今之禮記特多回臣前以周禮諸經發起粃謬敢率愚淺為之解詁而家乏無力供繕寫上願得將書生二人共詣東觀就官財糧專心研精合尚書章句考禮記失得庶裁定聖典刊正碑文古文科斗近於為實而厭抑流俗降在小學中興以來通儒達士班固賈逵鄭興父子並敦悅之今毛詩左氏周禮各有傳記其興春秋共相表𩹉宜置博士為立學官以助後來以廣聖意會南夷反叛以植嘗在九江有恩信拜為廬江太守植深達政宜務存清靜弘大體而已歲餘復徵拜議郎與諫議大夫馬日磾議郎蔡邕楊彪韓說等並在東觀校中書五經記傳補續漢記帝以非急務轉為侍中遷尚書光和元年有日食之異植上封事諫曰臣聞五行傳日晦而月, WYG: ''}
