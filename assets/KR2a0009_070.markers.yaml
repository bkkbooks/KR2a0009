  - {type: variant, offset: 898, length: 0, content: '', WYG: 風舉雲揺浮㳺普覽前乘秦領後越九􅉄協韻音綜東薄河華西渉岐雍宮館所歴百有餘區行所朝夕儲不改供薄廹也岐山雍縣在扶風儲積也供協韻音九用反禮上下而接山川究休祐}
