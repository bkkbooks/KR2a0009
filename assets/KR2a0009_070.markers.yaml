  - {type: variant, offset: 2377, length: 238, content: 怒即收郡僚職送獄道舉奏弼會黨禁中解弼以俸贖罪得免濟活者千餘人弼為政特挫抑彊豪其小民有罪多所容貸遷河東太守被一切詔書當舉孝廉弼知多權貴請託乃豫勑斷絕書屬中常侍侯覽果遣諸生齎書請之并求假鹽稅積日不得通生乃說以它事謁弼而因達覽書弼大怒曰太守忝荷重任當選士報國爾何人而偽詐無狀命左右引出楚捶數百府丞掾史十餘人皆諫於廷弼不對遂付安邑獄即日考殺之侯覽大怨遂詐作飛章下司隸誣弼誹謗檻車徵吏人莫敢近者唯前孝廉裴瑜送到崤澠之閒大言於道傍曰明府摧折虐臣選德報國如其獲罪足以垂名竹帛願不憂不懼弼曰誰, WYG: 也炎}
