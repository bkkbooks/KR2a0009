  - {type: variant, offset: 889, length: 3, content: 平陽侯, WYG: 節鄭𤣥注曰鸞在衡和在軾皆金鈴也三輔黄圖曰上林苑有豫章觀左牽牛而右織女似雲漢之無涯茂樹䕃蔚芳草被堤蘭茝發色曄曄猗猗若摛錦布繡燭耀乎其陂漢宮閣疏曰昆明池有二石人牽牛織女之象也雲漢天河也郭璞注爾雅云茝香草音昌改反曄曄猗猗羙茂之貎說文曰摛舒也𤣥鶴白鷺黄鵠鵁鸛鶬鴰鳵鶂鳬鷖鴻雁朝發河海夕宿江漢沈浮往來雲集霧散郭璞注爾雅云鵁似鳬脚近尾略不能地行江東謂之魚鵁音火交反說文曰鸛鸛雀也爾雅曰鶬麋鴰音括郭璞注曰即鶬鴰也今關西呼為鴰鹿鳵似雁而大無趾音保鶂水鳥也荘子曰白鶂之}
