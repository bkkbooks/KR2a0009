  - {type: variant, offset: 893, length: 4, content: 到官表龔, WYG: 視眸子不運而風化李巡注爾雅曰在野曰鳬在家曰鶩並鴨也鄭𤣥注詩云鷖鳬屬也音一兮反周處風土記曰鷖鷖􅀈也以名自呼大如雞生卵于荷葉上毛萇注詩云大曰鴻小曰鴈於是後宮乘輚路登龍舟張鳳蓋建華旗祛黼帷鏡清流靡微風澹淡浮埤蒼曰輚卧車也音仕板反淮南子曰龍舟鷁首浮次以虞桓譚新論曰乘車玉瓜華芝及鳳凰三蓋上林賦曰乘法駕建華旗髙誘注淮南子曰祛舉也澹隨風之貌也澹音徒濫反淡音徒敢反櫂女謳鼓吹震聲激越謍厲天鳥羣翔魚闚淵櫂楫也謳歌也震協韻音真謍聲也音火宏反招白閒下雙鵠揄文竿出比目招猶舉也弩有黄閒之名此言白閒盖弓弩之屬本或作白鷼謂鳥也西京雜記曰越王獻髙帝白鷼黑鷼各一雙說文曰揄引也音投文竿翠羽為文飾也闞子曰魯人有好釣者以桂為餌鍜黄金之釣錯以銀碧垂翡翠之綸爾雅曰東方有比目魚不比不行撫鴻幢御矰繳方舟並鶩俛仰極樂廣雅曰幢謂之懤幢音直江反即舟中之幢盖也本或作罿罿鳥網也音衡矰弋矢也繳以繫箭也方舟並两舟也}
