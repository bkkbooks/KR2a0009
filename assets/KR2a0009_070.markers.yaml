  - {type: variant, offset: 853, length: 1, content: 旬, WYG: 三十篇又撰異同號曰國語二十篇由是乘檮杌之事遂闇不行于時為闇也其書今亡而左氏國語獨章又有記錄黄帝以來至春秋時帝王公侯卿大夫號曰世本一十五篇春秋之後七國並争秦幷諸侯則有戰國䇿三十三篇漢興定天下太中大夫陸賈記錄時功作楚漢春秋九篇孝武之世太史令司馬遷採左氏國語刪世本戰國䇿據楚漢列國時事上自黄帝下訖獲麟武帝泰始二年登隴首獲白麟遷作史記絶筆于此年也作本紀世家列傳書表凡百三十篇而十篇缺焉十篇謂遷歿之後亡景紀武紀禮書樂書兵書将相年表}
