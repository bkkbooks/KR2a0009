  - {type: variant, offset: 1348, length: 0, content: '', WYG: 尚書曰惇叙九族又曰九族既睦辯章百姓鄭𤣥注云辯别也章眀也惇厚也睦親也章帝性篤愛不忍與諸王乖離皆㽞京師也廵靖黎蒸懐保鰥寡之恵浹廵撫也靖安也黎蒸皆衆也懐思也保安也浹洽也尚書曰懐保小人惠鮮鰥寡謂章帝在位凡四廵狩賜人爵鰥寡孤獨不能自存者粟燔瘞縣沈肅祗羣神之禮備爾雅曰祭天曰燔柴祭}
