  - {type: variant, offset: 42, length: 0, content: '', WYG: 尉登少傳歐陽尚書教授數千人為汝陰令政為明能號稱神父遷趙相入為尚書僕射順帝以登明識禮樂使持節臨太學奏定典律轉拜侍中數上封事抑退權臣由是出為潁川太守市無二價道不拾遺病免卒於家汝陰人配社祠之張馴傳張馴字子儁濟陰定陶人也少遊太學能誦春秋左氏傳以大夏侯尚書教授辟公府舉高第拜議郎與蔡邕共奏定六經文字擢拜侍中典領祕書近署甚見納異多因便宜陳政得失朝廷嘉之遷丹陽太守化有恵政光和七年徴拜尚書遷大司農初平中卒於官尹敏傳尹敏字㓜季南陽堵陽人也堵音者少為諸生初習歐陽尚書後受古文兼善毛詩榖梁左氏春秋建武二年上疏陳洪範消災之術時世}
