  - {type: variant, offset: 648, length: 2, content: 夏禘, WYG: 遷右中郎將十年拜太常澤果敢直言數有據爭後北地太守廖信廖音力弔反坐貪穢下獄没入財産顯宗以信臧物班諸亷吏唯澤及光禄勲孫堪大司農常冲特蒙賜焉是時京師翕然在位者咸自勉勵堪字子穉河南維氏人也明經學有志操清白貞正愛士大夫然一毫未嘗取於人以節介氣勇自行王莽末兵革並起宗族老弱在營保間堪常力戰陷敵無所回避數被創刃宗族頼}
