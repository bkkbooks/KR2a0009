  - {type: variant, offset: 1544, length: 0, content: '', WYG: 曰言必則古昔稱先王遊庠序聚横横又作黌塾者蓋布之於邦域矣若乃經生所處不逺萬里之路經生謂博士也就之者不以萬里為逺而至也精廬暫建贏糧動有千百精廬講讀之舍贏擔負也其耆名高義開門受徒者編牒不下萬人皆專相傳祖莫或訛雜至有分爭王庭樹朋私里繁其章條穿求崖穴以合一家之説故楊雄曰今之學者非獨為之華藻又從而繡其鞶帨楊雄法言之文也喻學者文煩碎也鞶帯也字或作幋説文曰鞶覆衣巾也音盤帨佩巾也音税夫理書無二義歸有宗而碩學之徒莫之或從無二專一也故通人鄙其固焉又雄所謂譊譊之學各習其師也亦法言之文也譊譊喧也音奴交反且觀成名高第終能逺至者蓋亦寡焉而迂滯若是矣然所談者仁義所傳者聖法也故人識君臣父子之綱家知違邪歸正之路自桓靈之間君道秕僻秕榖不成也以喻政化之惡也朝綱日陵國隙屢啓陵陵遲也自中智以下靡不審其崩離而權彊之臣息其闚盜之謀謂閻忠勸皇甫嵩令推亡漢而自立嵩不從其言豪俊之夫屈於鄙生之議者謂董卓欲大起兵鄭泰止之卓從其言人誦先王言也下畏逆順埶也言政化雖壊而朝久不傾危者以經籍道行下人懼逆順之埶至如張溫皇甫嵩之徒功定天下之半聲馳四海之表俯仰顧盻則天業可移猶鞠躬昬主之下狼狽折札之命散成兵就繩約而無悔心昬主謂獻帝也札簡也折簡而召言不勞重命也繩約猶拘制也謂溫}
  - {type: page-break, offset: 1544, content: '', id: KR2a0009_WYG_109-46a, image: WYG0253/WYG0253-0542c.png}
