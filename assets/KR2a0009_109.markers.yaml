  - {type: variant, offset: 1235, length: 0, content: '', WYG: 職事對府不知官曹處吏白門下責之時右扶風琅邪徐業亦大儒也聞𤣥諸生試引見之與語大驚曰今日相遭眞解矇矣遭逄也遂請上堂難問極日後𤣥去官舉孝亷除為郎㑹顔氏博士缺𤣥試䇿第一拜為博士居數月諸生上言𤣥兼説嚴氏宣氏不宜專為顔氏博士劉攽曰案前後叙説無宣氏學蓋下有宜氏因誤宣氏長此兩字也光武且令還署未及遷而卒李育傳李育字元春扶風漆人也漆縣今豳州辛平縣少習公羊春秋沈思專精博覽書傳知名太學深為同郡班固所重固奏記薦育於驃騎將軍東平王蒼由是京師貴戚爭徃交之州郡請召育到輒辭病去常避地敎授門徒數百頗渉獵古學嘗讀左氏傳雖樂文采然謂不得聖人深意以為前世陳元范升之徒更相非折折難也音之舌反而多引圖讖不據理體於是作難左氏義四十一事建初元年衛尉馬廖舉育方正為議郎後拜博士四年詔與諸儒論五經於白虎觀育以公羊義難賈逵徃返皆有理證最為通儒再遷尚書令及馬氏廢建初八年順陽侯馬廖子豫為歩兵校尉坐投書怨謗豫免廖歸國見馬援傳育坐為所舉免歸嵗餘復徴再遷侍中卒於官何休傳何休字邵公任城樊人也樊縣故城在今兗州瑕丘縣西南父豹少府休為人質朴訥口而雅有心思精研六經世儒無及者以列卿子詔拜郎中非其好也辭病而去不仕州郡進退必以禮太傅陳蕃辟之與參政事蕃敗休坐廢錮乃作春秋公羊解詁博物志曰何休注公羊云何氏學冇不解者或答曰休謙辭受學於師乃宣此義不出於己此言為允也覃思不闚門十有七年又注訓孝經論語風角七分皆經緯典謨不與守文同説又以春秋駮漢事六百餘條妙得公羊本意休善歴算與其師博士羊弼追述李育意以難二傳作公羊墨守言公羊之義不可攻如墨翟之守城也左氏膏肓穀梁廢疾黨禁解又辟司徒羣公表休道術深明宜侍帷幄倖臣不悦之乃拜議郎屢陳忠言再遷諫議大夫年五十四光}
