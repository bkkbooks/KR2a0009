  - {type: variant, offset: 2078, length: 277, content: 代之始明不相襲也繼世之王巡狩則修封以祭而已自秦始皇孝武帝封泰山本由好僊信方士之言造為石檢印封之事也所聞如此雖誠天道難可度知然其大較猶有本要天道質誠約而不費者也故牲有用牘器用陶匏殆將無事於檢封之閒而樂難攻之石也且唯封為改代故曰岱宗夏康周宣由廢復興不聞改封世祖欲因孝武故封實繼祖宗之道也而梁松固爭以為必改乃當夫既封之後未有福而松卒被誅死雖罪由身蓋亦誣神之咎也且帝王所以能大顯于後者實在其德加於民不聞其在封矣言天地者莫大於易易無六宗在中之象若信為天地四方所宗是至大也而比太社又為失所難以為誠矣贊曰天地禋郊宗廟享祀咸秩無文山川具止淫乃國紊典惟皇紀肇自盛敬孰崖厥始, WYG: 百九下考證}
