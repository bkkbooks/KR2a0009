  - {type: variant, offset: 76, length: 5, content: 臘一歲五祀, WYG: 書奏立詔勿問拜僖蘭臺令史元和二年春帝東廵狩還過魯幸闕里以太牢祠孔子及七十二弟子作六代之樂黄帝曰雲門堯曰咸池舜曰大韶禹曰大夏湯曰大濩周曰大武大㑹孔氏男子二十以上者六十三人命儒者講論僖因自陳謝帝曰今日之㑹寜於卿宗有光榮乎對曰臣聞明王聖主莫不尊師貴道今陛下親屈萬乗辱臨敝里此乃崇禮先師増煇聖徳至於光榮非所敢承帝大笑曰非聖者子孫焉有斯言乎遂拜僖郎中賜褒成侯損及孔氏男女錢帛詔僖從還京師使校書東觀冬拜臨晉令崔駰以家林筮之崔篆所作易林也謂為不吉止僖曰子盍辭乎僖曰學不為人仕不擇官吉凶由已而由卜乎在縣}
