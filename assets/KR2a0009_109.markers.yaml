  - {type: variant, offset: 1234, length: 0, content: '', WYG: 數百人常居門下著書百餘篇皆五經通難又作孟子章句建初三年舉孝亷遷海西令卒於官張𤣥傳張𤣥字君夏河内河陽人也少習顔氏春秋兼通數家法建武初舉明經補𢎞農文學遷陳倉縣丞清淨無欲專心經書方其講問乃不食終日及有難者輒為張數家之説令擇從所安諸儒皆伏其多通著録千餘人𤣥初為縣丞嘗}
