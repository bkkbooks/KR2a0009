  - {type: variant, offset: 22, length: 0, content: '', WYG: 之後於薊先是四方學士多懐挾圖書遁逃林藪自是莫不抱負墳策雲會京師范升陳元鄭興杜林衛宏劉昆桓榮之徒繼踵而集於是立五經博士各以家法教授易有施孟梁丘京氏尚書歐陽大小夏侯詩齊魯韓毛禮大小戴春秋嚴顔凡十四博士太常差次總領焉建武五年乃修起太學稽式古典籩豆干戚之容備之於列籩豆禮器也竹謂之籩木謂之豆干楯也戚鉞也舞者所執服方領習矩歩者委它乎其中方領直領也委它行貌也委音於危反它音以支反中元元年初建三雍明帝即位親行其禮天子始冠通天徐廣輿服雜注曰天子朝冠通天冠高九寸黒介幘金博山所常服也衣日月續漢志曰乘輿備文日月星辰也備法物之駕胡廣漢制度曰天子出有大駕法駕小駕大駕則公卿奉引大將軍驂乗大僕御屬車八十一乘備千乘萬騎法駕公不在鹵簿唯河南尹執金吾洛陽今奉引侍中驂乘奉車郎御屬車三十六乘小駕太僕奉駕侍御史整車騎也盛清道之儀漢官儀曰清道以旄頭為前驅也坐明堂而朝羣后登靈臺以望雲物雲物解見明紀袒割辟雍之上尊養三老五更饗射禮畢帝正坐自講諸儒執經問難於前冠帶縉紳之人圜橋門而觀聽者蓋億萬計漢官儀曰辟雍四門外有水以節觀者門外皆有橋觀者水外故云圜橋門也圜繞也其後復為功臣子孫四姓末屬别立校舍捜選高能以受其業劉攽曰案文此受當作授自期門羽林之士悉令通孝經章句匈奴亦遣子入學濟濟乎洋洋乎盛於永平矣建初中大會諸儒於白虎觀考詳同異連月乃罷肅宗親臨稱制如石渠故事石渠見章紀顧命史臣著為通義即白虎通義是又詔高才生受古文尚書毛詩榖梁左氏春秋雖不立學官然皆擢高第為講郎給事近署所以網羅遺逸博存衆家孝和亦數幸東觀覽閲書林及鄧后稱制學者頗懈時樊凖徐防並陳敦學之宜又言儒職多非其人於是制詔公卿妙簡其選三署郎能通經術者皆得察舉自安帝覽政薄於蓺文博士倚席不講禮記曰凡侍坐於大司成者逺近間三席又曰若非飲食之客則布席席間函丈注云謂講問客也倚席言不施講坐也朋徒相視怠􅄆學舍頽敝鞠為園蔬詩小雅曰鞠為茂草注云鞠窮也牧兒蕘豎至於薪刈其下順帝感翟酺之言乃更修黌宇説文曰黌學也黌與横同凡所造構二百四十房千八百五十室試明經下第補弟子增甲乙之科員各十人除郡國耆儒皆補郎舍人本初元年梁太后詔曰大將軍下至六百石悉遣子就學每嵗輒於鄉射月一饗會之以此為常漢官儀曰春三月秋九月習鄉射禮禮生皆使太學學生自是遊學增盛至三萬餘生然章句漸疏而多以浮華相尚儒者之風蓋衰矣黨人既誅其高名善士多坐流廢後遂至忿爭更相言告亦有私行金貨定蘭臺桼書經字以合其私文熹平四年靈帝乃詔諸儒正定五經刋於石碑為古文篆隸三體書法以相參檢樹之學門古文謂孔子壁中書篆書秦始皇使程邈所作也隸書亦程邈所獻也主於徒隸從簡易也謝承書曰碑立太學門外瓦屋覆之四面欄障開門於南河南郡設吏卒視之楊龍驤洛陽記載朱超石與凡書云石經文都似碑高一丈許廣四尺駢羅相接使天下咸取則焉初光武遷還洛陽其經牒祕書載之二千餘兩自此以後參倍於前及董卓移都之際吏民擾亂自辟雍東觀蘭臺石室宣明鴻都諸藏典策文章競共剖散其縑帛圖書大則連為帷蓋小乃制為縢囊縢亦幐也音徒恒反説文曰幐囊也及王允所收而西者裁七十餘乗道路艱逺復棄其半矣後長安之亂一時焚蕩莫不冺盡焉東京學者猥衆難以詳載今但録其能通經名家者以為儒林篇其自有列傳者則不兼書若師資所承老子曰善人者不善人之師也不善人者善人之資也故因曰師資宜標名為證者乃著之云前書云田何傳易授丁寛前書寛字子襄丁寛授田王孫王孫授沛人施讎東海孟喜琅邪梁丘賀前書讎字子卿喜字長卿賀字長翁由是易有施孟梁丘之學又東郡京房受易於梁國焦延壽前書延壽名贛别為京氏學又有東萊費直前書直字長翁傳易授琅邪王横為費氏學前書横作璜字平仲本以古字號古文易又沛人高相傳易授子康及蘭陵母將永為高氏學母將姓也母讀曰無施孟梁丘京氏四家皆立博士費高二家未得立劉昆傳劉昆字桓公陳留東昏人東昏屬陳留郡東緡屬山陽郡諸本作緡者誤梁孝王之𦙍也少習容禮容儀也前書魯徐生善為容孝文時以容為禮官大夫平帝時受施氏易於沛人戴賓能彈雅琴知清角之操劉向别錄曰雅琴之意事皆出龍徳諸琴雜事中前書蓺文志曰雅琴龍氏名徳趙氏名定韓子曰師曠對晉平公曰昔黄帝合鬼神駕象車交龍畢方並轄蚩尤居前風伯進埽雨師灑道作為清角今君徳薄不足以聽之王莽世教授弟子恒五百餘人每春秋饗射常備列典儀以素木瓠葉為爼豆桑弧蒿矢以射菟首詩小雅瓠葉詩序曰刺幽王棄禮而不能行故思古之人不以微薄廢禮焉詩曰幡幡瓠葉采之亨之君子有酒酌言嘗之有菟斯首炰之燔之君子有酒酌言獻之昆懼禮之廢故引以瓠葉為爼實射則歌菟首之詩而為節也每有行禮縣宰輒率吏屬而觀之王莽以昆多聚徒衆私行大禮有僭上心乃繫昆及家屬於外黄獄尋莽敗得免既而天下大亂昆避難河南負犢山中郡國志河南郡有負犢山建武五年舉孝㢘不行遂逃教授於江陵光武聞之即除為江陵令時縣連年火災昆輒向火叩頭多能降雨止風徴拜議郎稍遷侍中𢎞農太守先是崤黽驛道多虎災行旅不通昆為政三年仁化大行虎皆負子渡河帝聞而異之二十二年徴代杜林為光禄勲詔問昆曰前在江陵反風滅火後守𢎞農虎北渡河行何徳政而致是事昆對曰偶然耳左右皆笑其質訥帝歎曰此乃長者之言也顧命書諸策乃令入授皇太子及諸王小侯五十餘人二十七年拜騎都尉三十年以老乞骸骨詔賜洛陽第舍以千石禄終其身中元二年卒子軼字君文傳昆業門徒亦盛永平中為太子中庶子建初中稍遷宗正卒官遂世掌宗正焉洼丹傳洼丹字子玉風俗通洼音圭南陽育陽人也世傳孟氏易王莽時常避世教授専志不仕徒衆數百人建武初為博士稍遷十一年為大鴻臚作易通論七篇世號洼君通丹學義研深易家宗之稱為大儒十七年卒於官年七十時中山觟陽鴻字孟孫姓觟陽名鴻也觟音胡瓦反其字從角或作鮭從魚者音胡佳反亦以孟氏易教授有名稱永平中為少府任安傳任安字定祖廣漢綿竹人也少遊太學受孟氏易兼通數經又從同郡楊厚學圖讖究極其術時人稱曰欲知仲桓問任安又曰居今行古任定祖學終還家教授諸生自逺而至初仕州郡後太尉再辟除博士公車徴皆稱疾不就州牧劉焉表薦之時王塗隔塞詔命竟不至年七十九建安七年卒于家楊政傳楊政字子行京兆人也少好學從代郡范升受梁丘易善説經書京師為之語曰説經鏗鏗楊子行教授數百人范升嘗為出婦所告坐繫獄政乃肉袒以箭貫耳抱升子潛伏道傍候車駕而持章叩頭大言曰范升三娶唯有一子今適三嵗孤之可哀武騎虎賁懼驚乗輿舉弓射之猶不肯去旄頭又以㦸义政傷胷政猶不退哀泣辭請有感帝心詔曰乞楊生師乞讀曰氣即尺一出升政由是顯名為人嗜酒不拘小節果敢自矜然篤於義時帝壻梁松皇后弟陰就皆慕其聲名而請與交友政每共言論常切磋懇至不為屈撓嘗詣揚虚侯馬武武難見政稱疾不為起政入戸徑升牀排武把臂責之曰卿蒙國恩備位藩輔不思求賢以報殊寵而驕天下英俊此非養身之道也今日動者刀入脅武諸子及左右皆大驚以為見劫操兵滿側政顔色自若會陰就至責數武令為交友其剛果任情皆如此也建初中官至左中郎將張興傳張興字君上潁川鄢陵人也習梁丘易以教授建武中舉孝㢘為郎謝病去復歸聚徒後辟司徒馮勤府勤舉為孝㢘稍遷博士永平初遷侍中祭酒十年拜太子少傅顯宗數訪問經術既而聲稱著聞弟子自逺至者著録且萬人為梁丘家宗著於籍録十四年卒於官子魴傳興業位至張掖屬國都尉戴憑傳戴憑字次仲汝南平輿人也習京氏易年十六郡舉明經徴試博士拜郎中時詔公卿大會羣臣皆就席憑獨立光武問其意憑對曰博士説經皆不如臣而坐居臣上是以不得就席帝即召上殿令與諸儒難説憑多所解釋帝善之拜為侍中數進見問得失帝謂憑曰侍中當匡補國政勿有隠情憑對曰陛下嚴帝曰朕何用嚴憑曰伏見前太尉西曹掾蔣遵清亮忠孝學通古今陛下納膚受之訴遂致禁錮論語孔子曰膚受之訴注云謂受人之訴辭皮膚之不深知其情核也劉攽曰注受人訴辭皮膚之不深案文少一在字一外字世以是為嚴帝怒曰汝南子欲復黨乎憑出自繫廷尉有詔􅃯出後復引見憑謝曰臣無謇諤之節而有狂瞽之言不能以尸伏諫韓詩外傳曰昔衞大夫史魚病且死謂其子曰我數知蘧伯玉之賢而不能進彌子瑕不肖而不能退死不當居䘮正堂殯我於側室足矣衞君問其故子以父言聞於君君乃召蘧伯玉而貴之彌子瑕退之徙殯於正堂成禮而後去偸生茍活誠慙聖朝帝即勅尚書解遵禁錮拜憑虎賁中郎將以侍中兼領之正旦朝賀百僚畢會帝令羣臣能説經者更相難詰義有不通輒奪其席以益通者憑遂重坐五十餘席故京師為之語曰解經不窮戴侍中在職十八年卒於官詔賜東園梓器錢二十萬時南陽魏滿字叔牙亦習京氏易教授永平中至𢎞農太守孫期傳孫期字仲彧濟陰成武人也少為諸生習京氏易古文尚書家貧事母至孝牧豕於大澤中以奉養焉逺人從其學者皆執經壟畔以追之里落化其仁讓黄巾賊起過期里陌相約不犯孫先生舍郡舉方正遣吏齎羊酒請期期驅豕入草不顧司徒黄琬特辟不行終於家建武中范升傳孟氏易以授楊政而陳元鄭衆皆傳費氏易其後馬融亦為其傳融授鄭𤣥𤣥作易注荀爽又作易傳自是費氏興而京氏遂衰前書云濟南伏生名勝傳尚書授濟南張生及千乗歐陽生前書字伯和歐陽生授同郡兒寛寛授歐陽生之子世世相傳至曾孫歐陽高高字子陽為尚書歐陽氏學張生授夏侯都尉都尉名都尉授族子始昌始昌傳族子勝為大夏侯氏學勝傳從兄子建建别為小夏侯氏學三家皆立博士又魯人孔安國傳古文尚書授都尉朝姓都尉名朝朝授膠東庸譚為尚書古文學未得立歐陽歙傳歐陽歙字正思樂安千乗人也自歐陽生傳伏生尚書至歙八世皆為博士歙既傳業而恭謙好禮讓王莽時為長社宰長社今許州縣也更始立為原武令世祖平河北到原武見歙在縣修政遷河南都尉後行太守事世祖即位始為河南尹封被陽侯被陽故城在今淄州高苑縣西南建武五年坐事免官明年拜揚州牧遷汝南太守推用賢俊政稱異迹九年更封夜侯夜今萊州掖縣歙在郡教授數百人視事九嵗徴為大司徒坐在汝南臧罪千餘萬發覺下獄諸生守闕為歙求哀者千餘人至有自髠剔者平原禮震年十七聞獄當斷馳之京師行到河内獲嘉縣自繫上書求代歙死曰伏見臣師大司徒歐陽歙學為儒宗八世博士而以臧咎當伏重辜歙門單子㓜未能傳學身死之後永為廢絶上令陛下獲殺賢之譏下使學者䘮師資之益乞殺身以代歙命書奏而歙已死獄中謝承書曰震字仲威光武嘉其仁義拜震郎中後以公事左遷淮陽王廐長歙掾陳元上書追訟之言甚切至帝乃賜棺木贈印綬賻縑三千匹子復嗣復卒無子國除濟陰曹曾字伯山從歙受尚書門徒三千人位至諫議大夫子祉河南尹傳父業教授又陳留陳弇字叔明亦受歐陽尚書於司徒丁鴻仕為蘄長續漢書曰弇以尚書教授躬自耕種常有黄雀飛來随弇翺翔牟長傳牟長字君高樂安臨濟人也其先封牟春秋之末國滅因氏焉長少習歐陽尚書不仕王莽世祖}
