  - {type: variant, offset: 1236, length: 0, content: '', krp: 五年卒服䖍傳服䖍字子愼初名重又名祗後改為䖍河南滎陽人也少以清苦建志入太學受業有雅才善著文論作春秋左氏傳解行之至今又以左傳駮何休之所駮漢事六十條舉孝亷稍遷中平末拜九江太守免遭亂行客病卒所著賦碑誄書記連珠九憤凡十餘篇穎容傳穎容字子嚴陳國長平人也長平縣故城在今陳州西北博學多通善春秋左氏師事太尉楊賜郡舉孝亷州辟公車徴皆不就初平中避亂荆州聚徒千餘人劉表以為武陵太守不肯起著春秋左氏條例五萬餘言建安中卒謝該傳謝該字文儀南陽章陵人也善明春秋左氏為世名儒門徒數百千人建安中河東人樂詳條左氏疑滯數十事以問該皆為通解之名為謝氏釋行於世魏略曰詳字文載少好學聞謝該善左氏傳乃從南陽歩渉詣許從該問難諸要今左氏問七十二事詳所撰也社畿為太守署詳文學祭酒黄初中徴拜博士十餘人學多褊又不熟悉唯詳五業並授其或難質不解詳無慍色以杖畫地牽譬引類至忘寢食也劉攽曰注徴拜博士十餘人案文須更有博士二字仕為公車司馬令以父母老託疾去官欲歸鄉里會荆州道斷不得去少府孔融上書薦之曰臣聞高祖創業韓彭之將征討暴亂陸賈叔孫通進説詩書陸賈為大中大夫時前説稱詩書著書十二篇每奏一篇高祖未嘗不稱善叔孫通為高祖制禮儀並見前書光武中興吳耿佐命范升衛宏修述舊業故能文武並用成長久之計陛下聖德欽明同符二祖勞謙戹運三年乃讙史記高宗諒闇三年不言言乃讙時靈帝崩後獻帝居諒闇初釋服也今尚父鷹揚方叔翰飛尚父太公也毛詩曰維師尚父時惟鷹揚又曰方叔涖止其車三千鴧彼飛隼翰飛戾天注云方叔卿士命為將也涖臨也鴧急疾之貎也飛乃至天喻士卒至勇能深入攻敵王師電鷙羣凶破殄始有櫜弓卧鼓之次毛詩曰載橐弓矢橐所以盛弓言今太平橐弓卧鼓不用征伐故須賢人也宜得名儒典綜禮紀竊見故公車司馬令謝該體曽史之淑性曽參史魚兼商偃之文學卜商言偃也論語曰文學子游子夏博通羣蓺周覽古今物來有應事至不惑清白異行敦悦道訓求之逺近少有疇匹若乃巨骨出吳史記曰吳伐越隳㑹稽得骨節專車吳使使問仲尼骨何者最大仲尼曰禹致羣臣於㑹稽山防風氏後至禹殺而僇之其節專車此為大也隼集陳庭史記曰有隼集于陳庭而死楛矢貫之石砮矢長尺有咫陳湣公使問仲尼仲尼曰隼來逺矣此肅愼之矣也昔武王克商通道九夷百蠻使各以其方賄來貢於是肅愼貢楛矢石砮長尺有咫先王以分大姫配虞胡公而封諸陳試求之故府果得之黄熊入寢左傳曰鄭子産聘于晉晉侯有疾韓宣子曰寡君寢疾於今三月矣今夢黄熊入於寢門其何厲鬼邪對曰昔堯殛鯀于羽山其神化為黄熊以入羽泉實為夏郊三代祀之晉為盟主其或者未之把也韓子把夏郊晉侯有間亥有二首左傳晉悼夫人食輿人之城把者絳縣人或年長矣無子而徃與於食有與疑年使之年曰臣小人也不知紀年臣生之嵗正月甲子朔四百有四十五甲子矣其季於今三之一也吏走問諸朝師曠曰魯叔仲惠伯會郤成子于承匡之嵗也七十三年矣史趙曰亥有二首六身下二如身是其日數也士文伯曰然則二萬六千六百有六旬也杜注云亥字二畫在上併三人為身如算之六也非夫洽聞者莫識其端也雋不疑定北闕之前前書昭帝時有男子成方遂詣北闕自稱衛太子丞相御史二千石至者立莫敢發言京兆尹雋不疑後到叱從吏收縳或曰是非未可知不疑曰諸君何患於衛太子昔蒯聵違命出奔輒距而不納春秋是之衛太子得罪先帝亡不即死今來自詣此罪人也遂送下詔獄天子與大將軍霍光聞而嘉之曰公卿大臣當用經術明於大義也劉攽曰注遂送下詔獄案文多一下字夏侯勝辯常陰之驗然後朝士益重儒術前書曰昌邑王嗣立數出勝當乘輿車前諌曰天久陰不雨臣下有謀上者陛下欲何之王怒謂勝為妖言縳以屬吏吏白霍光是時光與張子孺謀欲廢王光譲子孺以為泄子孺實不泄召問勝對言在洪範光子孺以此益重儒術士今該實卓然比跡前列間以父母老疾棄官欲歸道路險塞無由自致猥使良才抱璞而逃踰越山河沈淪荆楚所謂徃而不反者也韓詩外傳曰山林之士為名故徃而不能反朝廷之士為禄故入而不能出也後日當更饋樂以釣由余尅像以求傅説豈不煩哉史記曰由余其先晉人也亡入戎能晉言戎王聞繆公賢故使由余觀秦秦繆公示以宫室積聚由余曰使鬼為之則勞神矣使人為之亦苦人矣繆公退而問於内史廖曰孤聞國有聖人敵國之憂也今由余寡人之害將柰何廖曰戎王處僻未聞中國之聲君試遺以女樂以奪其志為由余請以疏其間留而莫遣以失其期戎王候之必疑由余君臣有間乃可慮也乃令内史廖以女樂二八遺戎王戎王受而説之由余數諌不聽繆公又數使人間要由余由余遂去降秦臣愚以為可推録所在召該令還楚人止孫卿之去國劉向孫卿子後序所論孫卿事曰卿名況趙人也楚相春申君以為蘭陵令或謂春申君曰湯以七十里文王以百里孫卿賢者今與之百里地楚其危乎春申君謝之孫卿去之趙後客或謂春申君曰伊尹去夏入殷殷王而夏亡管仲去魯入齊魯弱而齊强故賢者所在君尊國安今孫卿天下賢人所去之國其不安乎春申君使人聘孫卿乃還復為蘭陵令漢朝追匡衡於平原前書匡衡為平原文學長安令楊興薦之於車騎將軍史高曰衡材智有餘經學絶倫但以無階朝廷故隨牒在逺方將軍試召置幕府貢之朝廷必為國器高然其言辟衡為議曹吏薦衡於帝}
