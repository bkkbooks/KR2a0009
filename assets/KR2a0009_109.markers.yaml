  - {type: variant, offset: 50, length: 0, content: '', WYG: 年十七即位即位一年議立明堂安車蒲輪徴魯申公六年舉賢良班固贊曰以武帝之雄才大略不改文景之恭儉以濟斯人雖詩書所稱何以加兹也及後恣已忘其前之}
  - {type: variant, offset: 50, length: 0, content: '', krp: 年十七即位即位一年議立明堂安車蒲輪徴魯申公六年舉賢良班固贊曰以武帝之雄才大略不改文景之恭儉以濟斯人雖詩書所稱何以加兹也及後恣已忘其前之}
  - {type: variant, offset: 51, length: 0, content: '', WYG: 善謂武帝末年好神仙祭祀之事征伐四夷連兵三十餘年又信巫蠱天下户口減半人相食筭及舟車官賣鹽鐵也僖曰書傳若此多矣鄰房生梁郁儳和之曰儳謂不與之言而傍對也禮記曰母儳言儳音士鑒反如此武帝亦是狗邪僖駰黙然不對郁怒恨之陰上書告駰僖誹謗先帝刺譏當}
  - {type: page-break, offset: 51, content: '', id: KR2a0009_WYG_109-17a, image: WYG0253/WYG0253-0528a.png}
  - {type: variant, offset: 51, length: 0, content: '', krp: 善謂武帝末年好神仙祭祀之事征伐四夷連兵三十餘年又信巫蠱天下户口減半人相食筭及舟車官賣鹽鐵也僖曰書傳若此多矣鄰房生梁郁儳和之曰儳謂不與之言而傍對也禮記曰母儳言儳音士鑒反如此武帝亦是狗邪僖駰黙然不對郁怒恨之陰上書告駰僖誹謗先帝刺譏當}
