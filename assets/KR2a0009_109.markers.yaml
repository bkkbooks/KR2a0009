  - {type: 'tls:seg', offset: 55, content: '', id: KR2a0009_ZHSJ_109-d109p2s8}
  - {type: variant, offset: 57, length: 0, content: '', WYG: 政之美惡顯在漢史坦如日月是為直説書傳實事非虚謗也夫帝者為善則天下之善咸歸焉其不善則天下之惡亦萃焉斯皆有以致之故不可以誅於人也誅責也且陛下即位以來政教未過而徳澤有加言政教未有過失也天下所具也臣等獨何譏刺哉假使所非實是則固應悛改儻其不當亦宜含容又何罪焉陛下不推原大數深自為計徒肆私忿以快其意臣等受戮死即死耳顧天下之人必回視易慮以此事闚陛下心自今以後茍見不可之事終莫復言者矣臣之所以不愛其死猶敢極言者誠為陛下深惜此大業陛下若不自惜則臣何頼焉齊桓公親揚其先君之惡以唱管仲國語曰魯莊公束縛管仲以與齊桓公公親迎於郊而與之坐問焉昔吾先君襄公築臺以為高位田狩畢弋不聽國政卑聖侮士而唯女是崇九妃六嬪陳妾數百食必粱肉衣必文繡戎士凍餒是以國家不日引不月長恐宗廟不掃除社稷不血食敢問為此若何管子曰昔者聖王之理天下定人之居成人之事而慎用其六柄焉}
  - {type: page-break, offset: 57, content: '', id: KR2a0009_WYG_109-17b, image: WYG0253/WYG0253-0528b.png}
  - {type: page-break, offset: 57, content: '', id: KR2a0009_WYG_109-18a, image: WYG0253/WYG0253-0528c.png}
  - {type: variant, offset: 57, length: 0, content: '', krp: 政之美惡顯在漢史坦如日月是為直説書傳實事非虚謗也夫帝者為善則天下之善咸歸焉其不善則天下之惡亦萃焉斯皆有以致之故不可以誅於人也誅責也且陛下即位以來政教未過而徳澤有加言政教未有過失也天下所具也臣等獨何譏刺哉假使所非實是則固應悛改儻其不當亦宜含容又何罪焉陛下不推原大數深自為計徒肆私忿以快其意臣等受戮死即死耳顧天下之人必回視易慮以此事闚陛下心自今以後茍見不可之事終莫復言者矣臣之所以不愛其死猶敢極言者誠為陛下深惜此大業陛下若不自惜則臣何頼焉齊桓公親揚其先君之惡以唱管仲國語曰魯莊公束縛管仲以與齊桓公公親迎於郊而與之坐問焉昔吾先君襄公築臺以為高位田狩畢弋不聽國政卑聖侮士而唯女是崇九妃六嬪陳妾數百食必粱肉衣必文繡戎士凍餒是以國家不日引不月長恐宗廟不掃除社稷不血食敢問為此若何管子曰昔者聖王之理天下定人之居成人之事而慎用其六柄焉}
