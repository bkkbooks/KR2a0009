  - {type: variant, offset: 1545, length: 1, content: 國, WYG: 嵩並被徴而就拘制也暨乎剝橈自極人神數盡易大過曰棟橈凶橈折也極終也言漢祚自終人神之數盡橈音女教反然後羣英乘其運世德終其祚羣英謂袁術曹操之屬代徳終其祚謂曹丕即位廢獻帝為山陽公自廢至薨十四年以夀終跡衰敝之所由致而能多歴年所者斯豈非學之效乎跡猶尋也言由有儒學故能長久也故先師垂典文褒勵學者之功篤矣切矣不循春秋至乃比於殺逆其將有意乎史記曰為人君父而不通春秋之義者必蒙首惡之名為人臣子不通春秋之義者必陷簒弑誅死之罪也贊曰斯文未陵亦各有承論}
