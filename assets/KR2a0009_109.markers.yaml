  - {type: variant, offset: 1758, length: 279, content: 角為天田官主穀祀用壬辰位祠之壬為水辰為龍就其類也牲用太牢縣邑令長侍祠舞者用童男十六人舞者象教田初為芟除次耕種芸耨驅爵及穫刈舂簸之形象其功也縣邑常以乙未日祠先農於乙地以丙戌日祠風伯於戌地以己丑日祠雨師於丑地用羊豕立春之日皆青幡幘迎春于東郭外令一童男冒青巾衣青衣先在東郭外野中迎春至者自野中出則迎者拜之而還弗祭三時不迎論曰臧文仲祀爰居而孔子以為不知漢書郊祀志著自秦以來迄于王莽典祀或有未修而爰居之類衆焉世祖中興蠲除非常修復舊祀方之前事邈殊矣嘗聞儒言三皇無文結繩以治自五帝始有書契至於三王俗化彫文詐偽漸興始有印璽以檢姦萌然猶未有金玉銀銅之器也自上皇以來封泰山者至周, WYG: 氏問}
