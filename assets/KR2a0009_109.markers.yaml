  - {type: variant, offset: 47, length: 1, content: 宗, WYG: 尉張禹薦補博士稍遷陳留太守坐法免年七十八卒於家子舉自有傳孔僖傳孔僖字仲和魯國魯人也自安國以下世傳古文尚書毛詩曽祖父子建少遊長安與崔篆友善及篆仕王莽為建新大尹莽改千乗國曰建信又改曰建新郡守曰大尹嘗勸子建仕對曰吾有布衣之心子有衮冕之志各從所好不亦善乎道既乖矣請從此辭遂歸終於家僖與崔篆孫駰復相友善同遊太學習春秋因讀吳王夫差時事僖廢書歎曰若是所謂畫龍不成反為狗者夫差伐越敗之越王勾踐乃以甲兵五千人棲於㑹稽使大夫種因吳太宰嚭而行成吳王將許之伍子胥諫曰今不滅後必悔之吳王不聽後勾踐滅吳吳王曰吾悔不用子胥之言遂自剄死劉攽曰正文畫龍不成案古語皆云畫虎不成此誤駰曰然昔孝武皇帝始為天子年方十八崇信聖道師則先王五六年間號勝文景前書}
