  - {type: variant, offset: 644, length: 2, content: 冬祫, WYG: 遷少府諸生自逺方至者著録數千人當世稱為大儒太常樓望侍中承宫長水校尉樊鯈等皆受業於恭二十年拜侍中祭酒騎都尉與侍中劉昆俱在光武左右每事諮訪焉卒於官周澤傳周澤字穉都北海安丘人也少習公羊嚴氏春秋隠居敎授門徒常數百人建武末辟大司馬府署議曹祭酒數月徴試博士中元元年遷黽池令奉公剋己矜恤孤羸吏人歸愛之永平}
