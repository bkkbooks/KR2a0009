  - {type: variant, offset: 236, length: 300, content: 哀帝成帝元帝廟代今親廟兄弟以下使有司祠宜為南頓君立皇考廟祭上至舂陵節侯羣臣奉祠時議有異不著上可涉等議詔曰以宗廟處所未定且祫祭高廟其成哀平且祠祭長安故高廟其南陽舂陵歲時各且因故園廟祭祀園廟去太守治所遠者在所令長行太守事侍祠惟孝宣帝有功德其上尊號曰中宗於是雒陽高廟四時加祭孝宣孝元凡五帝其西廟成哀平三帝主四時祭於故高廟東廟京兆尹侍祠冠衣車服如太常祠陵廟之禮南頓君以上至節侯皆就園廟南頓君稱皇考廟鉅鹿都尉稱皇祖考廟鬱林太守稱皇曾祖考廟節侯稱皇高祖考廟在所郡縣侍祠二十六年有詔問張純禘祫之禮不施行幾年純奏禮三年一祫五年一禘毀廟之主陳於太祖未毀廟之主皆升合食太祖五年再殷祭舊制三年一祫毀廟主合食高廟存廟主未嘗合, WYG: ''}
  - {type: variant, offset: 236, length: 300, content: 哀帝成帝元帝廟代今親廟兄弟以下使有司祠宜為南頓君立皇考廟祭上至舂陵節侯羣臣奉祠時議有異不著上可涉等議詔曰以宗廟處所未定且祫祭高廟其成哀平且祠祭長安故高廟其南陽舂陵歲時各且因故園廟祭祀園廟去太守治所遠者在所令長行太守事侍祠惟孝宣帝有功德其上尊號曰中宗於是雒陽高廟四時加祭孝宣孝元凡五帝其西廟成哀平三帝主四時祭於故高廟東廟京兆尹侍祠冠衣車服如太常祠陵廟之禮南頓君以上至節侯皆就園廟南頓君稱皇考廟鉅鹿都尉稱皇祖考廟鬱林太守稱皇曾祖考廟節侯稱皇高祖考廟在所郡縣侍祠二十六年有詔問張純禘祫之禮不施行幾年純奏禮三年一祫五年一禘毀廟之主陳於太祖未毀廟之主皆升合食太祖五年再殷祭舊制三年一祫毀廟主合食高廟存廟主未嘗合, krp: ''}
