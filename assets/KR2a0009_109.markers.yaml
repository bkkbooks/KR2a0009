  - {type: variant, offset: 43, length: 0, content: '', WYG: 方草創天下未遑其事命敏待詔公車拜郎中辟大司空府帝以敏博通經記令校圖讖使蠲去崔發所為王莽著録次比前書王莽居攝三年廣饒侯劉京車騎將軍千人扈雲太保屬臧鴻奏符命京言齊郡新井雲言巴郡石牛鴻言扶風雍石莽皆迎受十一月甲子莽上奏太后曰巴郡石牛雍石}
