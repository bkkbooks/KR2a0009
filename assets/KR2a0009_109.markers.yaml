  - {type: variant, offset: 128, length: 1, content: 是, WYG: 諸卿咸皆散與諸生之貧者病篤帝親輦駕臨視八年年七十一卒於官子福拜郎中亦以論語入授和帝魏應傳魏應字君伯任城人也少好學建武初詣博士受業習魯詩閉門誦習不交僚黨京師稱之後歸為郡吏舉明經除濟陰王文學以疾免官敎授山澤中徒衆常數百人永平初為博士再遷侍中十三年遷大鴻臚十八年拜光禄大夫建初四年拜}
