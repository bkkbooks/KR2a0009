  - {type: variant, offset: 141, length: 1, content: 奏, WYG: 辭定為二十萬言在位九年以病乞骸骨罷詔賜千石奉以終其身十五年行幸琅邪引遇如三公儀建初二年冬肅宗行饗禮以恭為三老年九十元和元年卒賜𦵏顯節陵下子壽官至東郡太守任末傳任末字叔本蜀郡繁人也繁縣故城在今益州新繁縣北少習齊詩遊京師敎授十餘年友人董奉徳於洛陽病亡末乃躬推鹿車載奉德喪致其墓所由是知名為郡功曹辭以病免後奔師喪於道物故臨命勅兄子造曰必致我尸於師門使死而有知魂靈不慙如其無知得土而已造從之景鸞傳景鸞字漢伯廣漢梓潼人也少隨師學經渉七州之地能理齊詩施氏易兼受河洛圖緯作易説及詩解文句兼取河洛以類相從名為交集又撰禮内外記號曰禮略又抄風角雜書列其占驗作興道一篇及作月令章句凡所著述五十餘萬言數上書陳救災變之術州郡辟命不就以壽終薛漢傳薛漢字公子淮陽人也世習韓詩父子以章句著名漢少傳父業尤善説災異讖緯敎授常數百人建武初為博士受詔校定圖讖當世言詩者推漢為長永平中為千乗太守政有異迹後坐楚事辭相連下獄死弟子犍為杜撫會稽澹臺敬伯鉅鹿韓伯高最知名杜撫傳杜撫字叔和犍為武陽人也少有高才受業於薛漢定韓詩章句後歸鄉里敎授沈靜樂道舉動必以禮弟子千餘人後為驃騎將軍東平王蒼所辟及蒼就國掾史悉補王官屬未滿嵗皆自劾歸時撫為大夫不忍去蒼聞賜車馬財物遣之辟太尉府建初中為公車令數月卒官其所作詩題約義通學者傳之曰杜君注云劉攽曰作詩題約義通案文題下當有脱字蓋合云文約義通也召馴傳召馴字伯春九江壽春人也曽祖信臣元帝時為少府前書信臣字翁卿為南陽太守吏人親愛號曰召父父建武中為卷令卷縣屬滎陽郡卷音丘圓反俶儻不拘小節馴少習韓詩博通書傳以志義聞鄉里號之曰德行恂恂召伯春累仕州郡辟司徒府建初元年稍遷騎都尉侍講肅宗拜左中郎將入授諸王帝嘉其義學恩寵甚崇出拜陳留太守賜刀劒錢物元和二年入為河南尹章和二年代任隗為光禄勲卒於官賜冢塋陪園陵孫休位至青州刺史楊仁傳楊仁字文義巴郡閬中人也建武中詣師學習韓詩數年歸静居敎授仕郡為功曹舉孝亷除郎太常上仁經中博士上音時掌反下同仁自以年未五十不應舊科漢官儀曰博士限年五十以上上府譲選顯宗特詔補北宫衛士令漢官儀曰北宫衛士令一人秩六百石引見問當世政迹仁對以寛和任賢抑黜驕戚為先又上便宜十二事皆當世急務帝嘉之賜以縑錢及帝崩時諸馬貴盛各争欲入宫仁被甲持㦸嚴勒門衛莫敢輕進者肅宗既立諸馬共譖仁刻峻帝知其忠愈善之拜什邡令今益州什邡縣也音十方寛惠為政勸課掾史弟子悉令就學其有通明經術者顯之右署右署上司或貢之朝由是義學大興墾田千餘頃行兄喪去官後辟司徒桓虞府掾有宋章者貪奢不法仁終不與交言同席時人畏其節後為閬中令卒於官趙曄傳趙曄字長君㑹稽山陰人也少嘗為縣吏奉檄迎督郵曄耻於厮役遂棄車馬去到犍為資中資中縣名今資州資陽縣詣杜撫受韓詩究竟其術積二十年絶問不還家為發喪制服撫卒乃歸州召補從事不就舉有道卒於家曄著吳越春秋詩細歴神淵蔡邕至㑹稽讀詩細而歎息以為長於論衡邕還京師傳之學者咸誦習焉時山陽張匡字文通亦習韓詩作章句後舉有道博士徴不就卒於家衛宏傳衛宏字敬仲東海人也少與河南鄭興俱好古學初九江謝曼卿善毛詩乃為其訓宏從曼卿受學因作毛詩序善得風雅之㫖于今傳於世後從大司空杜林更受古文尚書作訓㫖時濟南徐廵師事宏後從林受學亦以儒顯由是古學大興光武以為}
