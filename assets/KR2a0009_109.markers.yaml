  - {type: variant, offset: 134, length: 3, content: 張純與, WYG: 詔入授千乗王伉應經明行修弟子自遠方至著録數千人肅宗甚重之數進見論難於前特受賞賜時㑹京師諸儒於白虎觀講論五經同異使應專掌難問侍中淳于恭奏之帝親臨稱制如石渠故事明年出為上黨太守徴拜騎都尉卒於官伏恭傳伏恭字叔齊琅邪東武人司徒湛之兄子也湛弟黯字稚文以明齊詩改定章句作解説九篇位至光禄勲無子以恭為後恭性孝事所繼母甚謹少傳黯學以任為郎建武四年除劇令視事十三年以惠政公亷聞青州舉為尤異太常試經第一拜博士遷常山太守敦修學校敎授不輟由是北州多為伏氏學永平二年代梁松為}
