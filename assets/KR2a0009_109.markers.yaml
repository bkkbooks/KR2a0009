  - {type: variant, offset: 45, length: 0, content: '', krp: 符獻者封侯承天命用神説騎都尉崔發等視説其後莽封發}
  - {type: variant, offset: 46, length: 0, content: '', WYG: 説符侯敏對曰讖書非聖人所作其中多近鄙别字頗類世俗之辭恐疑誤後生帝不納敏因其闕文增之曰君無口為漢輔帝見而怪之召敏問其故敏對曰臣見前人增損圖書敢不自量竊幸萬一帝深非之雖竟不罪而亦以此沈滯與班彪親善每相遇輒日旰忘食夜分不寢旰晩也自以為鍾期伯牙莊周恵施之相得也説苑曰伯牙子鼔琴其友鍾子期聽之志在於山水子期皆知之子期死伯牙屏琴絶絃終身不復鼔琴莊子曰莊子送葬過恵子之墓顧謂從者曰郢人堊墁其鼻端若蠅翼使匠石斵之匠石運斤成風聽而斵之盡堊而鼻不傷郢人立不失容元君聞之召匠石曰當為寡人為之匠石曰臣則嘗斵之雖然臣之質死久矣自恵子之死吾無以為質矣吾無與言之堊墁有泥墁之也堊音於各反墁音莫干反蠅翼薄也後三遷長陵令永平五年詔書捕男子周慮慮素有名稱而善於敏敏坐繫免官及出歎曰瘖聾之徒真世之有道者也何謂察察而遇斯患乎劉攽曰何謂察察案文謂當作為言何故為此察察也後人不曉為謂多相亂也十一年除郎中遷諫議大夫卒於家周防傳周防字偉公汝南汝陽人也父揚少孤㣲常修逆旅杜預注左傳曰逆旅客舍也以供過客而不受其報防年十六仕郡小吏世祖廵狩汝南召掾史試經防尤能誦讀拜為守丞防以未冠謁去禮男子二十冠自以年未成人故請去謁請也師事徐州刺史蓋豫受古文尚書經明舉孝㢘拜郎中撰尚書雜記三十二篇四十萬言}
