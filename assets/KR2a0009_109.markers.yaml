  - {type: variant, offset: 119, length: 1, content: 盜, WYG: 孝文幸魯親祠孔子廟又改封二十八葉孫珍為崇聖侯北齊改封三十一葉孫為恭聖侯周武帝平齊改封鄒國公隋文帝仍舊封鄒國公隋煬帝改封為紹聖侯貞觀十一年封夫子裔孫子徳倫為褒聖侯倫今見存楊倫傳楊倫字仲理陳留東昏人也少為諸生師事司徒丁鴻習古文尚書為郡文學掾更歴數將志乖於時以不能人間事遂去職不復應州郡命講授於大澤中弟子至千餘人元初中郡禮請三府並辟公車徴皆辭疾不就後特徴博士為清河王傅是嵗安帝崩倫輒棄官奔䘮號泣闕下不絶聲閻太后以其専擅去職坐抵罪順帝即位詔免倫刑遂留行䘮于恭陵服闋徴拜侍中是時邵陵令任嘉在職貪穢因遷武威太守後有人奏嘉臧罪千萬徴考廷尉其所牽染將相大臣百有餘人倫乃上書曰臣聞春秋誅惡及本本誅則惡消振裘持領領正則毛理今任嘉所坐狼籍未受辜戮猥以垢臭改典大郡自非案坐舉者無以禁絶姦萌徃者湖陸令張疊蕭令駟賢徐州刺史劉福等釁穢既章咸伏其誅而豺狼之吏至今不絶者豈非本舉之主不加之罪乎昔齊威之霸殺姦臣五人幷及舉者以弭謗讟當斷不斷黄石所戒黄石公三略曰當斷不斷反受其亂夫聖王所以聽僮夫匹婦之言者猶塵加嵩岱霧集淮海雖未有益不為損也惟陛下留神省察奏御有司以倫言切直辭不遜順下之尚書奏倫探知密事徼以求直坐不敬結鬼薪結正其罪也鬼薪取薪以給宗廟三嵗刑也詔書以倫數進忠言特原之免歸田里陽嘉二年徴拜太中大夫将軍梁商以為長史諫諍不合出補常山王傅病不之官詔書勅司隸催促發遣倫乃留河内朝歌以疾自上曰有留死一尺無北行一寸刎頸不易九裂不恨裂死也楚詞曰雖九死其猶未悔也匹夫所執彊於三軍論語曰三軍可奪帥也匹夫不可奪志也固敢有辭帝乃下詔曰倫出幽升高詩曰出自幽谷升於喬木寵以藩傅稽留王命擅止道路託疾自從茍肆狷志狷狂狷也音絹遂徴詣廷尉有詔原罪倫前後三徴皆以直諫不合既歸閉門講授自絶人事公車復徴遜遁不行卒於家遁逃也中興北海牟融習大夏侯尚書東海王良習小夏侯尚書沛國桓榮習歐陽尚書榮世習相傳授東京最盛扶風杜林傳古文尚書林同郡賈逵為之作訓馬融作傳鄭𤣥注解由是古文尚書遂顯于世後漢書卷一百九上後漢書卷一百九上考證儒林傳詩齊魯韓毛何焯曰衍一毛字此時毛詩未得立也且如此乃十五非十四矣參以百官志博士果十四人詩三齊魯韓氏應劭漢官儀並同天子始冠通天衣日月何焯曰漢承秦故郊祀皆服袀糸至顯宗而革故統冠曰始詳輿服志本初元年監本宋本俱作太初臣會汾按質帝無太初年號明是本字今改正熹平四年靈帝乃詔諸儒正定五經刋於石碑為古文篆隸三體書法以相參檢臣世駿按趙明誠金石録云儒林傳序云為古文篆隸三體者非也蔡邕所書乃八分而三體石經乃魏時所建孫期傳自是費氏興而京氏遂衰何焯校本京氏上疑當有孟氏二字尹敏傳其中多近鄙别字何焯曰如以劉為卯金刀以泉貨為白水眞人皆别字之徴也周防傳父揚少孤微周勰傳云自勰曽祖父揚至勰孫恂六世知名則揚亦嘗顯名史略之耳孔僖傳世傳古文尚書毛詩臣良裘按此毛字亦疑衍又安國未聞受毛詩疑魯詩之譌作六代之樂何焯曰按前書秦時惟餘韶武安得經新莽之亂尚備此樂云六代者史仍一時之夸飾也後漢書卷一百九上考證欽定四庫全書後漢書卷一百九下宋宣城太守范煜撰唐章懐太子賢注儒林列傳第六十九下前書魯人申公受詩於浮丘伯為作詁訓是為魯詩齊人轅固生亦傳詩是為齊詩燕人韓嬰亦傳詩是為韓詩三家皆立博士趙人毛萇傳詩是為毛詩未得立高詡傳高詡字季回平原般人也般音卜滿反曽祖父嘉以魯詩授元帝仕至上合太守父容少傳嘉學哀平間為光祿大夫詡以父任為郎中世傳魯詩以信行清操知名王莽簒位父子稱盲逃不仕莽世光武即位大司空宋𢎞薦詡徴為郎除符離長符離縣故城在今徐州符離縣東也去官後徴為博士建武十一年拜大司農在朝以方正稱十三年卒官賜錢及冢田包咸傳包咸字子良㑹稽曲阿人也曲阿今潤州縣少為諸生受業長安師事博士右師細君姓右師習魯詩論語王莽末去歸鄉里於東海界為赤眉}
