  - {type: variant, offset: 2306, length: 2, content: 月制, WYG: 十遺勑諸子曰昔延州使齊子死嬴博因坎路側遂以塟焉嬴博二縣名屬泰山郡禮記曰延陵季子適齊其長子死於嬴博之間因塟焉今蜀道阻逺不宜歸塋可止此塟足蔵髪齒而已務遵速朽副我本心人生一世但當畏敬於人若不善加已直為受之諸子承命塟於河南梁縣因遂家焉將作大匠翟酺等與諸門人追録本行諡曰憲文中子楷楷字公超通嚴氏春秋古文尚}
