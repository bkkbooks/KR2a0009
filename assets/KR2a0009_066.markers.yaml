  - {type: variant, offset: 39, length: 1, content: 莽, WYG: 太傅為文帝子梁王楫之博也曾祖父光為常山太守宣帝時以吏二千石自洛陽徙焉父徽從劉歆受左氏春秋兼習國語周官又受古文尚書於塗惲風俗通曰塗姓塗山氏之後惲字子真受尚書於胡常見前書學毛詩於謝曼卿作左氏條例二十一篇逵悉傳父業弱冠能誦左氏傳及五經本文以大夏侯尚書敎授雖為古學兼通五家榖梁之說五家謂尹更始劉向周慶丁姓王彦等皆為榖梁見前書也自為兒童常在太學不通人間事身長八尺二寸諸儒為之語曰問事不休賈長頭性愷悌多智思俶儻有大節愷樂也悌易也言有和樂簡易之徳也俶儻卓異也尤明左氏傳國語為之觧詁五十一篇左氏三十篇國語二十一篇也永平中上疏獻之顯宗重其書寫蔵祕館時有神雀集宫殿官府冠羽有五采色帝異之以問臨邑侯劉復臨邑東郡縣也復齊武王伯升孫北海王興子復不能對薦逵博物多識帝乃召見逵問之對曰昔武王終父之業鸑鷟在岐鸑鷟鳯之别名也周大夫内史過對周惠王曰周之興也鸑鷟鳴于岐山事見國語宣帝威懐戎狄神雀仍集此胡降之徴也仍頻也宣帝時神雀再見改為年號後匈奴降服呼韓入朝也帝勑蘭臺給筆札使作神雀頌拜為郎與班固並校祕書應對左右肅宗立降意儒術特好古文尚書左氏傳建}
