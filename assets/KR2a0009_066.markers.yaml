  - {type: variant, offset: 2275, length: 0, content: '', WYG: 論曰鄭賈之學行乎數百年中遂為諸儒宗亦徒有以焉爾言賈鄭雖為儒宗而不為帝所重故曰亦徒有以焉爾桓譚以不善讖流亡鄭興以遜辭僅免賈逵能附㑹文致最差貴顯賈逵附㑹文致謂引左氏明漢為堯後也世主以此論學悲矣哉言}
  - {type: variant, offset: 2275, length: 0, content: '', krp: 論曰鄭賈之學行乎數百年中遂為諸儒宗亦徒有以焉爾言賈鄭雖為儒宗而不為帝所重故曰亦徒有以焉爾桓譚以不善讖流亡鄭興以遜辭僅免賈逵能附㑹文致最差貴顯賈逵附㑹文致謂引左氏明漢為堯後也世主以此論學悲矣哉言}
  - {type: variant, offset: 2276, length: 1, content: 頻, WYG: 主不重經而重讖也張霸傳子楷楷子陵陵弟𤣥張霸字伯饒蜀郡成都人也年數嵗而知孝讓雖出入飲食自然合禮鄊人號為張曾子七嵗通春秋復欲進餘經父母曰汝小未能也霸曰我饒為之故字曰饒焉饒猶益也後就長水校尉樊儵受嚴氏公羊春秋遂博覽五經諸生孫林劉固叚著等慕之各市宅其傍以就學焉舉孝廉光禄主事稍遷光禄勲之主事也見漢官儀永元中為㑹稽太守表用郡人處士顧奉公孫松等奉後為潁川太守松為司𨽻校尉並}
