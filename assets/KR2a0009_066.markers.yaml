  - {type: variant, offset: 5552, length: 5, content: 到署祭酒甚, WYG: 彊起至輪氏道病終輪氏縣屬潁川郡故城在今洛州洛陽縣城西南賛曰中世儒門賈鄭名學衆馳一介争禮氊幄一介單使也左傳曰君亦不使一介行李告於寡君氊幄謂匈奴也升元守經義偏情駮霸貴知止辭交戚里公超善術所舍成市後漢書卷六十六後漢書卷六十六考證鄭興傳一朝建號而山西雄桀争誅王莽注山西謂陕山已西也日知録曰古之所謂山西即今闗中方言自山而東五國之郊郭璞觧曰六國惟秦在山西王伯厚地理通釋曰秦漢之間稱山北山南山東山西者皆指太行以其在天下之中故指此山以表地勢正義以為華山之西非也范升傳遂與韓歆及太中大夫許淑等監本舊本俱缺太字臣㑹汾按前書百官公卿表大夫掌議論有太中大夫諫大夫武帝太初元年更名中大夫為光禄大夫秩比二千石劉昭百官志太中大夫千石無員屬光禄勲别無中大夫之名又按北海靖王傳云嵗終遣中大夫奉璧朝賀注中大夫王國官也引續漢志曰中大夫比六百石掌奉王使京都亦}
