  - {type: variant, offset: 2276, length: 1, content: 頻, krp: 主不重經而重讖也張霸傳子楷楷子陵陵弟𤣥張霸字伯饒蜀郡成都人也年數嵗而知孝讓雖出入飲食自然合禮鄊人號為張曾子七嵗通春秋復欲進餘經父母曰汝小未能也霸曰我饒為之故字曰饒焉饒猶益也後就長水校尉樊儵受嚴氏公羊春秋遂博覽五經諸生孫林劉固叚著等慕之各市宅其傍以就學焉舉孝廉光禄主事稍遷光禄勲之主事也見漢官儀永元中為㑹稽太守表用郡人處士顧奉公孫松等奉後為潁川太守松為司𨽻校尉並}
  - {type: variant, offset: 2278, length: 2, content: 雷霆, WYG: 名稱其餘有業行者皆見擢用郡中争厲志節習經者以千數道路但聞誦聲初霸以樊儵刪嚴氏春秋猶多繁辭乃減定為二十萬言更名張氏學霸始到越賊未觧郡界不寧乃移書開購明用信賞賊遂束手歸附不煩士卒之力童謡曰棄我㦸捐我矛盗賊盡吏皆休視事三年謂掾史曰太守起自孤生致位郡守盖日中則移月滿則虧史記蔡澤之辭也易豐卦曰日中則昃月盈則食也老子有言知足不辱遂上病後徴四遷為侍中時皇后兄虎賁中郎將鄧隲當朝貴盛聞霸名行欲與為交霸逡廵不答衆人笑其不識時務後當為五更㑹}
