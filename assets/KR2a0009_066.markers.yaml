  - {type: variant, offset: 6104, length: 346, content: 一搢紳諸儒莫不流涕北海鄭玄聞而歎曰漢世之事誰與正之兗州陳留聞閒皆畫像而頌焉其撰集漢事未見錄以繼後史適作靈紀及十意又補諸列傳四十二篇因李傕之亂湮沒多不存所著詩賦碑誄銘讚連珠箴弔論議獨斷勸學釋誨樂女訓篆埶祝文章表書記凡百四篇傳於世論曰意氣之感士所不能忘也流極之運有生所共深悲也當伯喈抱鉗扭徙幽裔仰日月而不見照燭臨風塵而不得經過其意豈及語平日倖全人哉及解刑衣竄歐越潛舟江壑不知其遠捷步深林尚苦不密但願北首舊丘歸骸先壟又可得乎董卓一旦入朝辟書先下分明枉結信宿三遷匡導既申狂僭屢革資同人之先號得北叟之後福屬其慶者夫豈無懷君子斷刑尚或為之不舉況國憲倉卒慮不先圖矜情變容而罰同邪黨執政乃追怨子長謗書流後放此為戮未或聞之典刑贊曰季長戚氏才通情侈苑囿典文流悅音伎邕實慕靜心精辭綺斥言金商南徂北徙籍梁懷董名澆身毀, WYG: 六考證}
