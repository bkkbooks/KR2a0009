  - {type: variant, offset: 5576, length: 1, content: 三, WYG: 大傳等則曰尚書說今范升引易緯遂蒙上易曰為文注家於易本文中求之固無此文耳賈逵傳帝善逵說使出左氏傳大義長於二傳者監本出字上有發字臣㑹汾按發出並舉古人無此等文今從宋本并作周官觧故注故謂事之指意也臣人龍按前書賈誼為左氏傳訓故又藝文志有魯故二十五卷師古注曰故者通其指義也今流俗毛詩改故訓傳為詁字失真則此注自應作故字觧鄉人有所計争輒令祝少賓注祝詛也東觀記曰争曲直者輒言敢祝少賓乎}
