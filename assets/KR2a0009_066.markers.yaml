  - {type: variant, offset: 1329, length: 0, content: '', WYG: 思義公羊傳冬黑弓以濫来奔文何以無邾婁通濫也曷為通濫賢者子孫宜有地賢者孰謂謂叔術也何賢乎叔術讓國也其相殊絶固已甚逺而寃抑積久莫肯分明臣以永平中上言左氏與圖讖合者先帝不遺芻蕘省納臣言寫其傳詁蔵之秘書建平中建平哀帝年也侍中劉歆欲立左氏不先暴論大義而輕移太常恃其義長詆挫諸儒諸儒内懐不服相與排之排擯却也劉歆建立左氏哀帝令歆與諸儒講論其義諸博士不肯置對歆乃移書太常以責之故被排擯事見前書孝哀皇帝重逆衆心故出歆為河内太守從是攻擊左氏遂為重讎至光武皇帝奮獨見之明興立左氏榖梁㑹二家先師不曉圖讖故令中道而廢凡所以存先王之道者要在安上理民也今左氏崇君父卑臣子疆幹弱枝勸善戒惡至明至切至直至順左傳曰翼戴天子加之以恭又曰君命天也天可讎乎委質䇿名貳乃辟也父敎子貳何以事君又曰棄父之命惡用子矣以有無父之國則可是崇君父卑臣子也左氏王人雖微序在諸侯之上又曰五大不在邊五細不在庭末大必折尾大不掉是彊幹弱枝也又曰盡而不汚懲惡而勸善非聖人誰能脩之史記曰孔子曰我欲載之空言不如見之}
  - {type: page-break, offset: 1329, content: '', id: KR2a0009_WYG_066-20a, image: WYG0252/WYG0252-0802a.png}
  - {type: page-break, offset: 1329, content: '', id: KR2a0009_WYG_066-20b, image: WYG0252/WYG0252-0802b.png}
