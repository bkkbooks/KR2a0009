  - {type: variant, offset: 4582, length: 2, content: 羊陟, WYG: 曰故長陵令張楷行慕原憲操擬夷齊原憲魯人字子思孔子弟子清約守節貧而樂道輕貴樂賤竄跡幽藪髙志確然獨拔羣俗前此徴命盤桓未至將主者翫習於常優賢不足使其難進歟郡時以禮發遣楷復告疾不到性好道術能作五里霧時闗西人裴優亦能為三里霧自以不如楷從學之楷避不肯見桓帝即位優遂行霧作賊事覺被考引楷言從學術楷坐繫廷尉詔獄積二年恒諷誦經籍作尚書注後以事無騐見原還家建和三年詔安車備禮聘之辭以篤疾不行年七十終於家子陵陵字處冲官至尚書元嘉中嵗首朝賀大將軍梁冀帶劔入省陵呵叱之令出勑羽林虎賁奪冀劔冀跪謝陵不應即劾奏冀請廷尉論罪有詔以一嵗俸贖而百寮肅然初冀弟不疑為河南尹舉陵孝廉不疑疾陵之奏冀因謂曰昔舉君適所以自罰也陵對曰明府不以陵不肖誤見擢序今申公憲以報私恩不疑有愧色陵弟𤣥𤣥字處虚沉深有才畧以時亂不仕司空張温數以禮辟不能致中平二年温以車騎將軍出征涼州賊邊章等將行𤣥自田廬被褐帶索要說温曰天下冦賊雲起豈不以黄門常侍無道故乎聞中貴人公卿以下當出祖道於平樂觀明公總天下威重握六師之要若於中坐酒酣鳴金鼓整行陣召軍正執有罪者誅之引兵還屯都亭以次翦除中官觧天下之倒懸報海内之怨毒然後顯用隐逸忠正之士則邊章之徒宛轉股掌之上矣温聞大震不能對良久謂𤣥曰處虚非不恱子之言顧吾不能行如何𤣥乃歎曰事行則為福不行則為賊今與公長辭矣即仰藥欲飲之温前執其手曰子忠於我我不能用是吾罪也子何為當然且出口入耳之言誰今知之左傳曰言出於余口入於爾耳𤣥遂去隐居魯陽山中山在今汝州南及董卓秉政聞之辟以為掾舉}
