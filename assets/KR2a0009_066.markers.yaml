  - {type: variant, offset: 41, length: 1, content: 授, WYG: 元年詔逵入講北宫白虎觀南宫雲臺帝善逵說使出左氏傳大義長於二傳者逵於是具條奏之曰臣謹擿出左氏三十事尤著明者斯皆君臣之正義父子之紀綱其餘同公羊者什有七八或文簡小異無害大體至如祭仲紀季伍子胥叔術之屬左氏義深於君父公羊多任於權變左傳宋人執鄭祭仲曰不立突將死祭仲許之遂出昭公而立厲公杜預注云祭仲之如宋非㑹非聘見誘被拘廢長立少故書名罪之公羊傳曰祭仲者何鄭之相也何}
