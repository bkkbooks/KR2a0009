  - {type: variant, offset: 2928, length: 233, content: 臣子曠然衆庶解悅臣愚以為宜擢文右職以勸忠謇宣聲海內博開政路憙益州刺史龐芝涼州刺史劉虔各有奉公疾姦之心憙等所糾其効尤多餘皆枉橈不能稱職或有抱罪懷瑕與下同疾綱網薥縱莫相舉察公府臺閣亦復默然五年制書議遣八使又令三公謠言奏事是時奉公者欣然得志邪枉者憂悸失色未詳斯議所因寢息昔劉向奏曰夫執狐疑之計者開羣枉之門養不斷之慮者來讒邪之口今始聞善政旋復變易足令海內測度朝政宜追定八使糾舉非法更選忠清平章賞罰三公歲盡差其殿最使吏知奉公之福營私之禍則衆灾之原庶可塞矣選於是名臣輩出文武並興, WYG: 徒司空大將軍也}
