  - {type: variant, offset: 3162, length: 501, content: 之得人數路而已夫書畫辭賦才之小者匡國理政未有其能陛下即位之初先涉經術聽政餘日觀省篇章聊以游意當代博弈非以教化取士之本而諸生競利作者鼎沸其高者頗引經訓風喻之言下則連偶俗語有類俳優或竊成文虛冒名氏臣每受詔於盛化門差次錄第其未及者亦復隨輩皆見拜擢既加之恩難復收改但守奉祿於義已弘不可復使理人及仕州郡昔孝宣會諸儒於石渠章帝集學士於白虎通經釋義其事優大文武之道所宜從之若乃小能小善雖有可觀孔子以為致遠則泥君子故當志其大者明而今在任無復能省及其還者多召拜議郎郎中若器用優美不宜處之冗散如有釁故自當極其刑誅豈有伏罪懼考反求遷轉更相放効臧否無章先帝舊典未嘗有此可皆斷絕以覈真偽繼體之君父子至親公卿列臣受恩之重皆屈情從制不敢踰越今虛偽小人本非骨肉既無幸私之恩又無祿仕之實惻隱思慕情何緣生而羣聚山陵假名稱孝行不隱心義無所依至有姦軌之人通容其中桓思皇后祖載之時東郡有盜人妻者亡在孝中本縣追捕乃伏其辜虛偽雜穢難得勝言又前至得拜後輩被遺或經年陵次以暫歸見漏或以人自代亦蒙寵榮爭訟怨恨凶凶道路太子官屬宜搜選令德豈有但取丘墓凶醜之人其為不祥莫與大焉宜遣歸田里以明詐偽書奏帝乃親迎氣北郊及行辟雍之禮又詔宣陵孝子為舍人者悉改為丞尉焉光和, WYG: 安}
