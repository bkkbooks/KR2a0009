  - {type: variant, offset: 1331, length: 1, content: 止, WYG: 故先帝博觀異家各有所採易有施孟復立梁丘施讎孟喜梁丘賀也尚書歐陽復有大小夏侯歐陽和伯大夏侯勝小夏侯建也並見前書今三傳之異亦猶是也又五經家皆無以證圖讖明劉氏為堯後者而左氏獨有明文春秋晉大夫蔡墨曰陶唐氏既衰其後有劉累學擾龍事孔甲范氏其後也范㑹自秦還晉其處者為劉氏明漢承堯後也五經家皆言顓頊代黄帝而堯不得為火徳史記曰黄帝崩其孫昌意之子立是為帝顓頊當時五經家同為此說若以顓頊代黄帝以土徳王即顓頊當為金徳髙辛為水徳堯為木徳漢承堯後自然不得為火徳也左氏以為少昊代黄帝即圖讖所謂帝宣也左氏傳曰黄帝氏以雲紀少昊氏以鳥紀是以少昊代黄帝也河圖曰大星如虹下流華渚女節意感生白帝朱宣宋均注曰朱宣少昊氏也如令堯不得為火}
  - {type: page-break, offset: 1331, content: '', id: KR2a0009_WYG_066-21a, image: WYG0252/WYG0252-0802c.png}
