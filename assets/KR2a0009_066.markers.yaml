  - {type: variant, offset: 3737, length: 842, content: 召邕與光祿大夫楊賜諫議大夫馬日磾議郎張華太史令單颺詣金商門引入崇德殿使中常侍曹節王甫就問灾異及消改變故所宜施行邕悉心以對事在五行天文志又特詔問曰比災變互生未知厥咎朝廷焦心載懷恐懼每訪羣公卿士庶聞忠言而各存括囊莫肯盡心以邕經學深奧故密特稽問宜披露失得指陳政要勿有依違自生疑諱具對經術以皁囊封上邕對曰臣伏惟陛下聖德允明深悼災咎襃臣末學特垂訪及非臣螻蟻所能堪副斯誠輸寫肝膽出命之秋豈可以顧患避害使陛下不聞至戒哉臣伏思諸異皆亡國之怪也天於大漢殷勤不已故屢出祅變以當譴責欲令人君感悟改危即安今災眚之發不於它所遠則門垣近在寺署其為監戒可謂至切蜺墯鷄化皆婦人干政之所致也前者乳母趙嬈貴重天下生則貲藏侔於天府死則丘墓踰於園陵兩子受封兄弟典郡續以永樂門史霍玉依阻城社又為姦邪今者道路紛紛復云有程大人者察其風聲將為國患宜高為隄防明設禁令深惟趙霍以為至戒今聖意勤勤思明邪正而聞太尉張顥為玉所進光祿勳姓璋有名貪濁又長水校尉趙玹屯騎校尉蓋升並叨時幸榮富優足宜念小人在位之咎退思引身避賢之福伏見廷尉郭禧純厚老成光祿大夫橋玄聰達方直故太尉劉寵忠實守正並宜為謀主數見訪問夫宰相大臣君之四體委任責成優劣已分不宜聽納小吏雕琢大臣也又尚方工技之作鴻都篇賦之文可且消息以示惟憂詩云畏天之怒不敢戲豫天戒誠不可戲也宰府孝廉士之高選近者以辟召不慎切責三公而今並以小文超取選舉開請託之門違明王之典衆心不厭莫之敢言臣願陛下忍而絕之思惟萬機以荅天望聖朝既自約厲左右近臣亦宜從化人自抑損以塞咎戒則天道虧滿鬼神福謙矣臣以愚贛感激忘身敢觸忌諱手書具對夫君臣不密上有漏言之戒下有失身之禍願寢臣表無使盡忠之吏受怨姦仇章奏帝覽而歎息因起更衣曹節於後竊視之悉宣語左右事遂漏露其為邕所裁黜者皆側目思報初邕與司徒劉郃素不相平叔父衞尉質又與將作大匠楊陽球有𨻶球即中常侍程璜女夫也璜遂使人飛章言邕質數以私事請託於郃郃不聽邕含隱切志欲相中於是詔下尚書召邕詰狀邕上書自陳曰臣被召問以大鴻臚劉郃前為濟陰太守臣屬吏張宛長休百日郃為司隸又託河內郡吏李奇為州書佐及營護故, WYG: 告}
