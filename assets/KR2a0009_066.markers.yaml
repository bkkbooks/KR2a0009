  - {type: variant, offset: 272, length: 545, content: 徒設疑以自通及斟酌羣言韙其是而矯其非作釋誨以戒厲云爾人然則有位斯貴有財斯富行義達道士之司也故伊摯有負鼎之衒仲尼設執鞭之言甯子有清商之歌百里有豢牛之事夫如是則聖哲之通趣古人之明志也夫子生清穆之世稟醇和之靈覃思典籍韞櫝六經安貧樂賤與世無營沈精重淵抗志高冥包括無外綜析無形其已久矣曾不能拔萃出羣揚芳飛文登天庭序彝倫埽六合之穢慝清宇宙之埃塵連光芒於白日屬炎氣於景雲時逝歲暮默而無聞小子惑焉是以有云方今聖上寬明輔弼賢知崇英逸偉不墜於地德弘者建宰相而裂土才羨者荷榮祿而蒙賜盍亦回塗要至俛仰取容輯當世之利定不拔之功榮家宗於此時遺不滅之令蹤夫獨未之思邪何為守彼而不通此蹉跌之敗者已公子謖爾斂袂而興曰胡為其然也胡老曰居吾將釋汝昔自太極君臣始基有羲皇之洪寧唐虞之至時三代之隆亦有緝熙五伯扶微勤而撫之于斯已降天網縱人紘薥王塗壞太極君臣土崩上下瓦解於是智者騁詐辯者馳說武夫奮略戰士講銳電駭風馳霧散雲披變詐乖詭以合時宜或畫一策而綰萬金或談崇朝而錫瑞珪連衡者六印磊落合從者駢組流離隆貴翕習積富無崖據巧蹈機以忘其危夫華離蔕而萎條去幹而枯女冶容而淫士背道而辜人毀其滿神疾其邪利端始萌害漸亦牙速速方轂夭夭是加欲豐其屋乃蔀其家是故天地否閉聖哲潛形石門守晨沮溺耦耕顏歜抱璞蘧瑗保生齊人歸樂孔子斯征雍渠驂乘逝而遺輕夫豈主而背國乎道, WYG: 命}
