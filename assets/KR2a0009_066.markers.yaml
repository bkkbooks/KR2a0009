  - {type: variant, offset: 26, length: 0, content: '', krp: 年也侍御史杜林先與興同寓隴右乃薦之曰竊見河南鄭興執義堅固敦悦詩書左傳趙衰曰臣亟聞郤縠之言矣郤縠悦禮樂而敦詩書也好古博物見疑不惑有公孫僑觀射父之徳左傳子産辨黄熊晉侯聞之曰博物君子也觀射父楚大夫也對昭王以重黎義和之事見國語宜侍帷幄典職機密昔張仲在周燕翼宣王而詩人悅喜張仲周宣王時賢臣也燕樂也翼敬也詩小雅曰侯誰在矣張仲孝友惟陛下留聽少察以助萬分乃徴為太中大夫明年三月晦日食興因上疏曰春秋以天反時為災地反物為妖人反徳為亂亂則妖災生左傳晉伯宗之辭天反時為災謂寒暑易節也地反物為妖謂羣物失性也往年已来讁咎連見意者執事頗有闕焉按春秋昭公十七年夏六月甲戌朔日有食之杜預注曰於周為六月於夏為四月純陽用事隂氣未動而侵陽也傳曰日過分而未至言過春分而未及夏至也三辰有災三辰日月星也於是百官降物降物素服君不舉不舉盛饌避移時避正寢過日食時也樂用鼓奏鼓伐鼓祝用幣用幣於社史用辭用辭以自責也此以上皆左傳載魯大夫答季平子之詞也今孟夏純乾用事隂氣未作其災尤重夫國無善政則讁見日月變咎之来不可不慎其要在因人之心擇人處位也左傳晉士文伯曰國無政不用善則自取讁於日月之災故政不可不慎也務三而已一曰擇人二曰因人三曰從時也堯知鯀不可用而用之者屈已之明因人之心也齊桓反政而相管仲晉文歸國而任郄縠者是不私其私擇人處位也史記曰桓公與兄子紏争位糾使管仲將兵遮道射桓公鉤帶及桓公即位任政於管仲也又晉文公自秦歸國懐公故臣郄芮謀燒公宫殺文公宦者勃鞮告之後文公以郄縠為中軍帥縠即郄芮之族文公不以為讎而任焉言唯賢是用不私其私也今公卿大夫多舉漁陽太守郭伋可大司空者而不以時定道路流言咸曰朝廷若用功臣功臣用則人位謬矣願陛下上師唐虞下覽齊晉以成屈已從衆之徳以濟羣臣讓善之功濟成也夫日月交㑹數應在朔而頃年日食每多在晦先時而合皆月行疾也日君象而月臣象君亢急則臣下促廹故行疾也今年正月繁霜自爾以来率多寒日正月夏之四月此亦急咎之罰書曰急恒寒若天於賢聖之君猶慈父之於孝子也丁寧申戒欲其反政故災變仍見此乃國之福也今陛下髙明而羣臣惶促宜留思柔剋之政垂意洪範之法剋能也柔剋謂和柔而能立事也尚書洪範曰髙明柔剋博採廣謀納羣下之策書奏多有所納帝嘗問興郊祀事曰吾欲以讖斷之何如興對曰臣不為讖帝怒曰卿之不為讖非之邪興惶恐曰臣於書有所未學而無所非也帝意乃解興數言政事依經守義文章溫雅然以不善讖故不能任九年使監征南積弩營於津鄉征南將軍岑彭積弩將軍傅俊屯津鄉以拒公孫述津鄉在今荆州也㑹征南將軍岑彭為刺客所殺興領其營遂與大司馬吴漢俱擊公孫述述死詔興留屯成都頃之侍御史舉奏興奉使私買奴婢坐左轉蓮勺令蓮勺縣屬左馮翊故城在今同州下邽縣東北蓮音輦勺音酌是時喪亂之餘郡縣殘荒興方欲築城郭修禮敎以化之㑹以事免興好古學尤明左氏周官長於歴數自杜林桓譚衛宏之屬莫不斟酌焉斟酌謂取其意指也世言左氏者多祖興而賈逵自傳其父業故有鄭賈之學興去蓮勺後遂不復仕客授閿鄉閿音聞古字也建安中改作聞三公連辟不肯應卒于家子衆衆字仲師年十二從父受左氏春秋精力於學明三統歴作春秋難記條例兼通易詩知名於世建武中皇太子及山陽王荆因虎賁中郎將梁松以縑帛聘請衆欲為通義引籍出入殿中衆謂松曰太子儲君無外交之義漢有舊防蕃王不宜私通賔客遂辭不受松復風衆以長者意不可逆衆曰犯禁觸罪不如守正而死太子及荆聞而竒之亦不强也及梁氏事敗梁松坐懸飛書誹謗下獄死事見梁統傳也賔客多坐之唯衆不染於辭永平初辟司空府以明經給事中再遷越騎司馬漢官儀曰越騎司馬一人秩千石也復留給事中是時北匈奴遣使求和親八年顯宗遣衆持節使匈奴衆至北庭虜欲令拜衆不為屈單于大怒圍守閉之不與水火欲脅服衆衆拔刀自誓單于恐而止乃更發使隨衆還京師朝議欲復遣使報之衆上疏諫曰臣伏聞北單于所以要致漢使者欲以離南單于之衆堅三十六國之心也武帝開通西域本三十六國又當揚漢和親誇示鄰敵令西域欲歸化者局促狐疑懐土之人絶望中國耳漢使既到便偃蹇自信信音申若復遣之虜必自謂得謀其羣臣駮議者不敢復言駮議謂勸單于歸漢如是南庭動揺烏桓有離心矣南單于久居漢地具知形勢萬分離析旋為邊害今幸有度遼之衆揚威北垂雖勿報答不敢為患明帝八年初置度遼將軍屯五原曼栢帝不從復遣衆衆因上言臣前奉使不為匈奴拜單于恚恨故遣兵圍臣今復銜命必見陵折臣誠不忍持大漢節對氊裘獨拜如令匈奴遂能服臣將有損大漢之强帝不聽衆不得已既行在路連上書固争之詔切責衆追還繫廷尉㑹赦歸家其後帝見匈奴来者問衆與單于争禮之狀皆言匈奴中傳衆意氣壯勇雖蘇武不過乃復召衆為軍司馬使與虎賁中郎將馬廖擊車師至敦煌拜為中郎將使䕶西域㑹匈奴脅車師圍戊巳校尉衆發兵救之遷武威太守謹脩邊備虜不敢犯遷左馮翊政有名迹建初六年代鄧彪為大司農是時肅宗議復鹽鐵官衆諫以為不可武帝時國用不足乃賣鹽鐵置官以主之昭帝罷之今議欲復之詔數切責至被奏劾衆執之不移帝不從在位以清正稱其後受詔作春秋刪十九篇八年卒官子安世亦傳家業為長樂未央廐令續漢志曰廐令一人秩六百石延光中安帝廢太子為濟隂王安世與太常桓焉太僕来歴等共正議諫争及順帝立安世巳卒追賜錢帛除子亮為郎衆曾孫公業自有傳范升傳范升字辯卿代郡人也少孤依外家居九嵗通論語孝經及長習梁丘易老子敎授後生宣帝時梁丘賀之易也王莽大司空王邑辟升為議曹史時莽頻發兵役徴賦繁興升乃奏記邑曰升聞子以人不間於其父母為孝臣以下不非其君上為忠論語曰孝哉閔子騫人不間於其父母昆弟之言子騫之孝化其父母兄弟言人無非之者忠臣事君有過即諫在下無有非君者是忠臣也今衆人咸稱朝聖皆曰公明盖明者無不見聖者無不聞今天下之事昭昭於日月震震於雷霆而朝云不見公云不聞則元元焉所呼天公以為是而不言則過小矣知而從令則過大矣二者於公無可以免宜乎天下歸怨於公矣朝以逺者不服為至念升以近者不悦為重憂今動與時戾事與道反馳騖覆車之轍探湯敗事之後賈誼曰前車覆後車誡論語曰見不善如探湯後出益可怪晚發愈可懼耳方春嵗首而動發逺役藜霍不充田荒不耕榖價騰躍斛至數千吏人陷於湯火之中非國家之人也如此則胡貊守關青徐之寇在於帷帳矣王莽時青徐二郡為宼號青徐賊劉攽曰胡貊守闗案闗當作闕方喻廹近不當云闗升有一言可以解天下倒懸免元元之急不可書𫝊願䝉引見極陳所懐邑雖然其言而竟不用升稱病乞身邑不聽令乘傳使上黨升遂與漢兵㑹因留不還建武二年光武徴詣懐宫拜議郎遷博士上疏讓曰臣與博士梁恭山陽太守吕羌俱脩梁丘易二臣年並耆艾經學深明而臣不以時退與恭並立深知羌學又不能逹逹進也慙負二老無顔於世誦而不行知而不言不可開口以為人師願推博士以避恭羌帝不許然由是重之數詔引見每有大議輒見訪問時尚書令韓歆上疏欲為費氏易左氏春秋立博士費直字長翁善易長於卦筮見前書詔下其議四年正月朝公卿大夫博士見於雲臺帝曰范博士可前平說升起對曰左氏不祖孔子而出於丘明師徒相傳又無其人且非先帝所存無因得立遂與韓歆及太中大夫許淑等互相辯難日中乃罷升退而奏曰臣聞主不稽古無以承天臣不述舊無以奉君陛下愍學微缺勞心經蓺情存博聞故異端競進近有司請置京氏易博士羣下執事莫能據正京氏既立費氏怨望左氏春秋復以比類亦希置立京費已行次復髙氏沛人髙相善易與費直同時見前書春秋之家又有騶夹前書曰騶氏無師夹氏未知其書也如令左氏費氏得置博士髙氏騶夹五經竒異並復求立各有所執乖戾分争從之則失道不從則失人將恐陛下必有厭倦之聽孔子曰博學約之弗叛矣夫論語孔子之言弗畔言不違道也夫學而不約必叛道也顔淵曰博我以文約我以禮孔子可謂知敎顔淵可謂善學矣老子曰學道日損損猶約也又曰絶學無憂絶末學也今費左二學無有本師而多反異先帝前世有疑於此故京氏雖立輒復見廢疑道不可由疑事不可行詩書之作其来已久孔子尚周流㳺觀至于知命自衛反魯乃正雅頌孔子以魯哀公十一年自衛還魯是時道衰樂廢孔子来還乃正之故雅頌各得其所見史記今陛下草創天下紀綱未定雖設學官無有弟子詩書不講禮樂不脩奏立左費非政急務孔子曰攻乎異端斯害也已攻猶習也異端謂竒技也傳曰聞疑傳疑聞信傳信而堯舜之道存榖梁傳曰信以傳信疑以傳疑公羊傳曰君子曷為春秋樂堯舜之道也願陛下疑先帝之所疑信先帝之所信以示反本明不専已天下之事所以異者以不一本也易曰天下之動貞夫一也易下繫之文也又曰正其本萬事理今易無此文也五經之本自孔子始謹奏左氏之失凡十四事時難者以太史公多引左氏升又上太史公違戾五經謬孔子言及左氏春秋不可録三十一事詔以下博士後升為出妻所告坐繫得出還鄉里永平中為聊城令坐事免卒於家陳元傳陳元字長孫蒼梧廣信人也廣信故城在今梧州蒼梧縣父欽習左氏春秋事黎陽賈護與劉歆同時而别自名家元父欽字子佚以左氏授王莽自名陳氏春秋故曰别也賈護字季君並見前書也王莽從欽受左氏學以欽為猒難將軍猒一葉反元少傳父業為之訓詁銳精覃思至不與鄉里通以父任為郎建武初元與桓譚杜林鄭興俱為學者所宗時議欲立左氏傳博士范升奏以為左氏淺末不宜立元聞之乃詣闕上疏曰陛下撥亂反正文武並用撥理也語見公羊傳深愍經蓺謬雜真偽錯亂每臨朝日輒延羣臣講論聖道知丘明至賢親受孔子而公羊榖梁傳聞於後世故詔立左氏博詢可否示不専已盡之羣下也今論者沉溺所習翫守舊聞固執虚言傳受之辭以非親見實事之道左氏孤學少與與猶黨也遂為異家之所覆冒夫至音不合衆聽故伯牙絶弦伯牙善鼓琴鍾子期善聽相與為友子期死伯牙破琴絶弦不復鼓琴以時人莫之能聽也見呂覽至寳不同衆好故卞和泣血卞和得寳玉獻楚武王王示玉人曰石也刖其右足武王殁後復獻之文王復曰石也刖其左足至成王時卞和抱其璞於郊泣盡以血繼之王乃使玉尹攻之果得寳玉事見韓子也仲尼聖徳而不容於世仲尼去魯斥齊逐乎宋衛困于陳蔡之間見史記况於竹帛餘文其為雷同者所排固其宜也非陛下至明孰能察之臣元竊見博士范升等所議奏左氏春秋不可立及太史公違戾凡四十五事案升等所言前後相違皆斷截小文媟黷微辭以年數小差掇為巨謬媟狎也黷垢濁也掇拾也音丁括反遺脫纖微指為大尤抉瑕擿釁抉音於決反掩其𢎞美所謂小辯破言小言破道者也大戴記小辯篇孔子曰小辯破言小言破義小義破道升等又曰先帝不以左氏為經故不置博士後主所宜因襲臣愚以為若先帝所行而後主必行者則盤庚不當遷於殷周公不當營洛邑盤庚都耿遷於殷文王都酆武王都鄗周公輔成王營洛邑陛下不當都山東也往者孝武皇帝好公羊衛太子好榖梁有詔詔太子受公羊不得受榖梁劉攽曰有詔詔太子案文多一詔字孝宣皇帝在人間時聞衛太子好榖梁於是獨學之及即位為石渠論而榖梁氏興石渠閣以蔵秘書在未央殿北宣帝甘露三年詔諸儒韋元成梁丘賀等講論五經於石渠也至今與公羊並存此先帝後帝各有所立不必其相因也孔子曰純儉吾從衆至於拜下則違之論語孔子曰麻冕禮也今也純儉吾從衆拜下禮也今拜乎上泰也雖違衆吾從下何晏注云麻冕緇布冠也古績麻三十升以為之純絲也絲易成故從儉臣之與君行禮者下拜然後升時臣驕泰故于上拜今從下禮之恭也夫明者獨見不惑於朱紫聽者獨聞不謬於清濁故離朱不為巧眩移目離朱黄帝時明目者也一號離婁慎子曰離朱之明察毫末於百歩之外師曠不為新聲易耳桓譚新論曰晉師曠善知音衛靈公將之晉宿於濮水之上夜聞新聲召師涓告之曰為我聽寫之曰臣得之矣遂之晉晉平公饗之酒酣靈公曰有新聲願奏之乃令師涓鼓琴未終師曠止之曰此亾國之聲也方今干戈少弭戎事略戢留思聖蓺眷顧儒雅採孔子下拜之義卒淵聖獨見之㫖分明黑白建立左氏觧釋先聖之積結洮汰學者之累惑洮汰猶洗濯也使基業垂於萬世後進無復狐疑則天下幸甚臣元愚鄙嘗傳師言如得以褐衣召見俯伏庭下褐織毛為布貧者之服也誦孔氏之正道理丘明之宿寃若辭不合經事不稽古退就重誅雖死之日生之年也書奏下其議范升復與元相辯難凡十餘上帝卒立左氏學太常選博士四人元為第一帝以元新忿争乃用其次司隸從事李封於是諸儒以左氏之立論議讙譁自公卿以下數廷争之㑹封病卒左氏復廢元以才髙著名辟司空李通府時大司農江馮上言宜令司隸校尉督察三公事下三府元上疏曰臣聞師臣者帝賓臣者霸言以臣為師以臣為賓也故武王以太公為師齊桓以夷吾為仲父孔子曰百官總已聽於冢宰論語文也近則髙帝優相國之禮蕭何為相國髙帝賜劔履上殿入朝不趨太宗假宰輔之權太宗孝文也申屠嘉為丞相坐府召太中大夫鄧通欲誅之孝文使持節召通令人謝嘉故曰假權也及亡新王莽遭漢中衰專操國柄以偷天下偷竊也況已自喻不信羣臣奪公輔之任損宰相之威以刺舉為明徼訐為直至乃陪僕告其君長子弟變其父兄王莽時開吏告其將奴婢告其主罔密法峻大臣無所措手足然不能禁董忠之謀身為世戮董忠為王莽大司馬共劉歆等謀誅莽事發覺死也故人君患在自驕不患驕臣失在自任不在任人是以文王有日昃之勞周公執吐握之恭尚書曰文王自朝至于曰中昃不遑暇食史記曰伯禽封魯周公戒之曰我文王之子武王之弟成王之叔父亦不賤矣我一沐三握髮一飯三吐哺以待士猶恐失天下之賢人汝無以國驕人也不聞其崇刺舉務督察也方今四方尚擾天下未一百姓觀聽咸張耳目陛下宜脩文武之聖典襲祖宗之遺徳勞心下士屈節待賢誠不宜使有司察公輔之名帝從之宣下其議司察猶督察也李通罷元後復辟司徒歐陽歙府數陳當世便事郊廟之禮帝不能用以病去年老卒於家子堅卿有文章賈逵傳賈逵字景伯扶風平陵人也九}
