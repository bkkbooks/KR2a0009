  - {type: variant, offset: 25, length: 0, content: '', WYG: 少學公羊春秋晚善左氏傳遂積精深思通逹其㫖同學者皆師之東觀記曰興從博士金子嚴為左氏春秋天鳯中王莽年也將門人從劉歆講正大義左氏義也歆美興才使撰條例章句訓詁及校三統歴説文曰詁訓古言也音古度反三統歴劉歆撰謂夏殷周歴也更始立以司直李松行丞相事先入長安松以興為長史令還奉迎遷都更始諸將皆山東人咸勸留洛陽興說更始曰陛下起自荆楚權政未施更始起南陽南陽屬荆州故曰荆楚也一朝建號而山西雄桀争誅王莽開關郊迎者何也山西謂陕山已西也此天下同苦王氏虐政而思髙祖之舊徳也今久不撫之臣恐百姓離心盗賊復起矣春秋書齊小白入齊不稱侯未朝廟故也小白齊桓公也春秋齊小白入于齊公羊傳曰曷為以國氏當國也其言入何篡辭也今議者欲先定赤眉而後入關是不識其本而争其末恐國家之守轉在函谷言若不早都闗中有人先入則國家鎭守轉在函谷也雖臥洛陽庸得安枕乎庸用也更始曰朕西決矣拜興為諌議大夫使安集關西及朔方凉益三州還拜凉州刺史㑹天水有反者攻殺郡守興坐免時赤眉入關東道不通興乃西歸隗囂虚心禮請劉攽曰案文少一囂字而興耻為之屈稱疾不起囂矜已自飾常以為西伯復作西伯文王也作起也乃與諸將議自立為王興聞而説囂曰春秋傳曰口不道忠信之言為嚚耳不聽五聲之和為聾左傳富辰諫周襄王之辭間者諸將集㑹無乃不道忠信之言大將軍之聽無乃阿而不察乎昔文王承積徳之緒加之以睿聖三分天下尚服事殷孔子曰三分天下有其二以服事殷及武王即位八百諸侯不謀同㑹皆曰紂可伐矣武王以未知天命還兵待時史記曰武王觀兵孟津諸侯不期而㑹者八百人皆曰紂可伐矣王曰汝未知天命乃還師後閒紂殺比干囚箕子乃告諸侯以伐之故曰待時也髙祖征伐累年猶以沛公行師今令徳雖明世無宗周之祚威略雖振未有髙祖之功而欲舉未可之事昭速禍患劉攽曰案文昭當作招無乃不可乎惟將軍察之囂竟不稱王後遂廣置職位以自尊髙興復止囂曰夫中郎將太中大夫使持節官皆王者之器非人臣所當制也孔子曰惟器與名不可以假人左傳杜預注曰器車服召爵號也不可以假人者亦不可以假於人也無益於實有損於名非尊上之意也囂病之而止病猶難也及囂遣子恂入侍將行興因恂求歸𦵏父母囂不聽而徙興舍益其秩禮興入見囂曰前遭赤眉之亂以將軍僚舊故敢歸身明徳興嘗為凉州刺史囂為西州將軍故曰僚舊也幸䝉覆載之恩復得全其性命興聞事親之道生事之以禮死塟之以禮祭之以禮奉以周旋弗敢失墜周旋猶遵奉也左傳季文子曰先大夫臧文仲敎行父事君之禮奉以周旋弗敢失墜也今為父母未塟請乞骸骨若以增秩徙舍中更停留是以親為餌猶釣餌也無禮甚矣將軍焉用之囂曰囂將不足留故邪興曰將軍據七郡之地七郡天水隴西武威張掖酒泉燉煌金城也擁羌胡之衆以戴本朝徳莫厚焉威莫重焉居則為専命之使入必為鼎足之臣興從俗者也不敢深居屏處因將軍求進不患不逹因將軍求入何患不親此興之計不逆將軍者也興業為父母請不可以已願留妻子獨歸塟將軍又何猜焉囂曰幸甚促為辦裝遂令與妻子俱東時建武}
