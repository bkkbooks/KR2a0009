  - {type: variant, offset: 4587, length: 930, content: 胡母班郃不為用致怨之狀臣征營怖悸肝膽塗地不知死命所在竊自尋案實屬宛奇不及陟班凡休假小吏非結恨之本與陟姻家豈敢申助私黨如臣父子欲相傷陷當明言臺閣具陳恨狀所緣內無寸事而謗書外發宜以臣對與郃參驗臣得以學問特蒙襃異執事秘館操管御前姓名貌狀微簡聖心今年七月召詣金商門問以灾異齎詔申旨誘臣使言臣實愚贛唯識忠盡出命忘軀不顧後害遂譏刺公卿內及寵臣實欲以上對聖問救消災異規為陛下建康寧之計陛下不念忠臣直言宜加掩蔽誹謗卒至便用疑怪盡心之吏豈得容哉詔書每下百官各上封事欲以改政思譴除凶致吉而言者不蒙延納之福旋被陷破之禍今皆杜口結舌以臣為戒誰敢為陛下盡忠孝乎臣季父質連見拔擢位在上列臣被蒙恩渥數見訪逮言事者因此欲陷臣父子破臣門戶非復發糾姦伏補益國家者也臣年四十有六孤特一身得託名忠臣死有餘榮恐陛下於此不復聞至言矣臣之愚職當咎患但前者所對質不及聞而衰老白首橫見引逮隨臣摧沒入阬埳誠冤誠痛臣一入牢獄當為楚毒所迫趣以飲章辭情何緣復聞死期垂至冒昧自陳願身當辜戮匄質不并坐則身死之日更生之年也惟陛下加餐為萬姓自愛於是下邕質於洛陽獄劾以仇怨奉公議害大臣大不敬𠫓廾市事奏中常侍呂強愍邕無罪請之帝亦更思其章有詔減死一等與家屬髡鉗徙朔方不得以赦令除楊陽球使客追路刺邕客感其義皆莫為用球又賂其部主使加毒害所賂者反以其情戒邕故每得免焉居五原安陽縣邕前在東觀與盧植韓說等撰補後漢記會遭事流離不及得成因上書自陳奏其所著十意分別首目連置章左帝嘉其才高會明年大赦及宥邕還本郡邕自徙及歸凡九月焉將就還路五原太守王智餞之酒酣智起舞屬邕邕不為報智者中常侍王甫弟也素貴驕慙於賓客詬邕曰徒敢輕我邕拂衣而去智銜之密告邕怨於囚放謗訕朝廷內寵惡之邕慮卒不免乃亡命江海遠跡吳會往來依太山羊氏積十二年在吳吳人有燒桐以爨者邕聞火烈之聲知其良木因請而裁為琴果有美音而其尾猶焦故時人名曰焦尾琴焉初邕在陳留也其鄰人有以酒食召邕者比往而酒以酣焉客有彈琴於屏邕至門試潛聽之曰憘以樂召我而有殺心何也遂反將命者告主人曰蔡君向來至門而去邕素為邦鄉所宗主人遽自追而問其故邕具以告莫不憮然彈琴者曰我向鼓弦見螳蜋方向鳴蟬蟬將去而未飛螳蜋為之一前一卻吾心聳然惟恐螳蜋之失之也此豈為殺心而形於聲者乎邕莞然而笑曰此足以當之矣中平六年靈帝崩董卓為司空聞邕名高辟之稱疾, WYG: ''}
