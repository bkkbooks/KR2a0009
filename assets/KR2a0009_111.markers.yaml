  - {type: variant, offset: 13, length: 0, content: '', WYG: 年徵拜太常卒官李充傳李充字大遜陳留人也家貧兄弟六人同食遞衣妻竊謂充曰今貧居如此難以久安妾有私財願思分異充偽酬之曰如欲别居當醞酒具會請呼鄉里内外共議其事婦從充置酒讌客充於坐中前跪白母曰此婦人無狀而教充離間母兄罪合遣斥便呵叱其婦逐令出門婦銜涕而去坐中驚肅因遂罷散充後遭母䘮行服墓次有人盜其墓樹者充手自殺之服闋立精舎講授太守魯平請署功曹不就平怒乃援充以捐溝中因讁署縣都亭長不得已起親職役後和帝公車徵不行延平中詔公卿中二千石各舉隱士大儒務取髙行以勸後進特徴充為博士時魯平亦為博士每與集會常歎服焉充遷侍中大將軍鄧騭貴戚傾時無所下借下音假借音子夜反以充髙節每卑敬之嘗置酒請充賔客滿堂酒酣騭跪曰幸託椒房位列上將幕府初開欲辟天下竒偉以匡不逮惟諸君博求其器充乃為陳海内隱居懐道之士頗有不合騭欲絶其說以肉啖之充抵肉於地曰說士猶甘於肉遂出徑去騭甚望之同坐汝南張孟舉往讓充曰一日聞足下與鄧將軍說士未究一日猶昨日也激刺面折不由中和出言之責非所以光祚子孫者也充曰大丈夫居世貴行其意何能逺為子孫計哉由是見非於貴戚遷左中郎將年八十以為國三老安帝常特進見賜以几杖卒於家繆肜傳繆肜字豫公汝南召陵人也少孤兄弟四人皆同財産及各娶妻諸婦遂求分異又數有鬬争之言肜深懐憤歎乃掩戸自撾曰繆肜汝脩身謹行學聖人之法將以齊整風俗奈何不能正其家乎弟及諸婦聞之悉叩頭謝罪遂更為敦睦之行仕縣為主簿時縣令被}
