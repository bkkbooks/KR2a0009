  - {type: variant, offset: 7, length: 0, content: '', WYG: 宋宣城太守范煜撰唐章懐太子賢注獨行列傳第七十一孔子曰與其不得中庸必也狂狷乎庸常也中和可常行之道謂之中庸言若不得中庸之人與之居必也須得狂狷之人又云狂者進取狷者有所不為也此是錄論語者因夫子之言而釋狂狷之人也此蓋失於周全之道而取諸偏至之端者也然則有所不為亦將有所必為者矣既云進取亦將有所不取者矣如此性尚分流為否異適矣人之好尚不同或為或否各有所適中世偏行一介之夫能成名立方者盖亦衆也或志剛金石而剋扞於强禦謂劉茂衞福也或意嚴冬霜而甘心於小諒戴就陸續也亦有結朋協好幽明共心范式張劭也蹈義陵險死生等節繆肜李善也雖事非通圓良其風軌有足懐者而情迹殊雜難為條品片辭特趣不足區别措之則事或有遺措置也載之則貫序無統以其名體雖殊而操行俱絶故總為獨行篇焉庶備諸闕文紀志漏脫云爾譙𤣥傳譙𤣥字君黄巴郡閬中人也少好學能說易春秋仕於州郡成帝永始二年有日食之災乃詔舉敦樸遜讓有行義者各一人州舉𤣥詣公車對策髙第拜議郎帝始作期門數為微行前書武帝微行常與侍中常侍武騎及待詔北地良家子能騎射者期諸殿門故有期門之號自此始也成帝微行亦然故言始也立趙飛燕為皇后后專寵懐忌皇太子多横夭折𤣥上書諫曰臣聞王者承}
