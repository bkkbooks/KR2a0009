  - {type: variant, offset: 4459, length: 322, content: 逃亡皆得免其六年征西將軍馬賢擊西羌於北地謝射姑山下父子為羌所沒殺是其應也四年七月壬午熒惑入南斗犯第三星五年四月戊午太白晝見八月己酉熒惑入太微斗為貴相為揚州熒惑犯入之為兵喪其六年大將軍商薨九江丹陽賊周生馬勉等起兵攻沒郡縣梁氏又專權於天廷中六年二月丁巳彗星見東方長六七尺色青白西南指營室及墳墓星丁丑彗星在奎一度長六尺癸未昬見西北歷昴畢甲申在東井遂歷輿鬼柳七星張光炎及三台至軒轅中滅營室者天子常宮墳墓主死彗星起而在營室墳墓不出五年天下有大喪後四年孝順帝崩昴為邊兵又為趙羌周馬父子後遂為寇又劉文刦清河相射暠欲立王蒜為天子暠不聽殺暠王閉門距文官兵捕誅文蒜以惡人所刦廢為尉氏侯又徙為犍陽都鄉侯薨國絕歷東井輿鬼為秦皆羌所攻鈔炎及三台為三公是時太尉杜喬及故太尉, WYG: ''}
