轅為後宮星出之為失勢其十四年六月辛卯陰皇后廢十六年四月丁未紫宮中生白氣如粉絮戊午客星出紫宮西行至昂五月壬申滅七月庚午水在輿鬼中十月辛亥流星起鉤陳北行三丈有光色黃白氣生紫宮中為喪客星從紫宮西行至昴為趙輿鬼為死喪鉤陳為皇后流星出之為中使後一年元興元年十二月二日和帝崩殤帝即位一年又崩無嗣鄧太后遣使者迎清河孝王子即位是為孝安皇帝是其應也清河趙地也元興元年二月庚辰有流星起角亢五丈所四月辛亥有流星起斗東北行到須女七月己巳有流星起天市五丈所光色赤閏月辛亥水金俱在氐流星起斗東北行至須女須女燕地天市為外軍水金會為兵誅其年遼東貊人反鈔六縣發上谷漁陽右北平遼西烏桓討之孝殤帝延平元年正月丁酉金火在婁金火合為爍為大人憂是歲八月辛亥孝殤帝崩孝安永初元年五月戊寅熒惑逆行守心前星八月戊申客星在東井弧星西南心為天子明堂熒惑逆行守之為反臣客星在東井為大水是時安帝未臨朝鄧太后攝政鄧騭為車騎將軍弟弘悝閶皆以校尉封侯秉國勢司空周章意不平與王尊叔元茂等謀欲閉宮門捕將軍兄弟誅常侍鄭衆蔡倫刦刺尚書廢皇太后封皇帝為遠國王事覺章自殺東井弧皆秦地是時羌反斷隴道漢遣騭將左右羽林北軍五校及諸郡兵征之是歲郡國四十一縣三百一十五雨水四瀆溢傷秋稼壞城郭殺人民是其應也二年正月戊子太白晝見三年正月庚戌月犯心後星己亥太白入斗中十二月彗星起天菀南東北指長六七尺色蒼白太白晝見為強臣是時鄧氏方盛月犯心後星不利子心為宋五月丁酉沛王牙正薨太白入斗中為貴相凶天菀為外軍彗星出其南為外兵是後使羌氐討賊李貴又使烏桓擊鮮卑又使中郎將任尚護羌校尉馬賢擊羌皆降四年六月甲子客星大如李蒼白芒氣長二尺西南指上階星癸酉太白入輿鬼指上階為三公後太尉張禹司空張敏皆免官太白入輿鬼為將凶後中郎將任尚坐贓千萬檻車徵棄巿五年六月辛丑太白晝見經天元初元年三月癸酉熒惑入輿鬼二年九月辛酉熒惑入輿鬼中三年三月熒惑入輿鬼中五月丙寅太白入畢口七月甲寅歲星入輿鬼閏月己未太白犯太微左執法十一月甲午客星見西方己亥在虛危南至胃昴四年正月丙戌歲星留輿鬼中乙未太白晝見丙上四月壬戌太白入輿鬼中己巳辰星入輿鬼中五月己卯辰星犯歲星六月丙申熒惑入輿鬼中戊戌犯輿鬼大星九月辛巳太白入南斗口中五年三月丙申鎮星犯東井鉞星五月庚午辰星犯輿鬼質星丙戌太白犯鉞星六年四月癸丑太白入輿鬼六月丙戌熒惑在輿鬼中丁卯鎮星在輿鬼中辛巳太白犯左執法自永初五年到永寧十年之中太白一晝見經天再入輿鬼一守畢再犯左執法入南斗犯鉞星熒惑五入輿鬼鎮星一犯東井鉞星一入輿鬼歲星辰星再入輿鬼凡五星入輿鬼中皆為死喪熒惑太白甚犯鉞質星為誅戮斗為貴將執法為近臣客星在虛危為喪為哭泣昴畢為邊兵又為獄事至建光元年三月癸巳鄧太后崩五月庚辰太后兄車騎將軍騭等七侯皆免官自殺是其應也延光二年八月己亥熒惑出太微端門三年二月辛未太白犯昴五月癸丑太白入畢九月壬寅鎮星犯左執法四年太白入輿鬼中六月壬辰太白出太微九月甲子太白入斗口中十一月客星見天巿熒惑出太微為亂臣太白犯昴畢為近邊兵一曰大人當之鎮星犯左執法有誅臣太白入輿鬼中為大喪太白出太微為中宮有兵入斗口為貴將相有誅者客星見天巿中為貴喪是時大將軍耿寶中常侍江京樊豐小黃門劉安與阿母王聖聖子女永等并構譖太子保并惡太子乳母男廚監邴吉三年九月丁酉廢太子為濟陰王以北鄉侯懿代殺男吉徙其父母妻子日南四年三月丁卯安帝巡狩從南陽還道寢疾至葉崩閻后與兄衛尉顯中常侍江京等共隱匿不令羣臣知上崩遣司徒劉喜等分詣郊廟告天請命載入北宮庚午夕發喪尊閻氏為太后北鄉侯懿病薨京等又不欲立保白太后更徵諸王子擇所立中黃門孫程王國王康等十九人共合謀誅顯京等立保為天子是為孝順皇帝皆姦人強臣狂亂王室其於死亡誅戮兵起宮中是其應孝順永建二年二月癸未太白晝見三十九日閏月乙酉太白晝見東南維四十一日八月乙巳熒惑入輿鬼太白晝見為強臣熒惑為凶輿鬼為死喪質星為誅戮是時中常侍高梵張防將作大匠翟酺尚書令高堂芝僕射張敦尚書尹就郎姜述楊鳳等及兗州刺史鮑就使匈奴中郎將張國金城太守張篤敦煌太守張朗相與交通漏泄就述棄巿梵防酺芝敦鳳就國皆抵罪又定遠侯班始尚陰城公主堅得鬬爭殺堅得坐要斬馬巿同產皆棄巿六年四月熒惑入太微中犯左右執法西北方六寸所十月乙卯太白晝見十二月壬申客星芒氣長二尺餘西南指色蒼白在牽牛六度客星芒氣白為兵牽牛為吳越後一年會稽海賊曾於等千餘人燒句章殺長吏又殺鄞鄮長取官兵拘殺吏民攻東部都尉揚州六郡逆賊章何等稱將軍犯四十九縣大攻略吏民陽嘉元年閏月戊子客星氣白廣二尺長五丈起天菀西南主馬牛為外軍色白為兵是時敦煌太守徐白使疏勒王盤等兵二萬人入于窴界虜掠斬首三百餘級烏桓校尉耿嘩使烏桓親漢都尉戎末瘣等出塞鈔鮮卑斬首獲生口財物鮮卑怨恨鈔遼東代郡殺傷吏民是後西戎北狄為寇害以馬牛起兵馬牛亦死傷於兵中至, krp: 此}
