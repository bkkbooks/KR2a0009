  - {type: variant, offset: 117, length: 1, content: 日, WYG: 人以郎中秩滿嵗稱給事未滿嵗稱灌謁者胡廣云明章二帝服勤園陵謁者灌桓後遂稱云馬融以為灌者習所膱也應奉云如胡公之言則吉凶異制馬云灌習也字義非也髙祖承秦灌嬰服事七年號大謁者後人掌之以姓灌章豈其然乎使持節督郡國行風俗太守令長坐者凡七十人旋拜侍御史除南頓令卒官子授官至蒼梧太守范冉傳范冉字史雲冉或作丹陳留外黄人也少為縣小吏年十八奉檄迎督郵冉耻之乃遁}
