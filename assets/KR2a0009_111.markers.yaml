  - {type: variant, offset: 7, length: 0, content: '', krp: 宋宣城太守范煜撰唐章懐太子賢注獨行列傳第七十一孔子曰與其不得中庸必也狂狷乎庸常也中和可常行之道謂之中庸言若不得中庸之人與之居必也須得狂狷之人又云狂者進取狷者有所不為也此是錄論語者因夫子之言而釋狂狷之人也此蓋失於周全之道而取諸偏至之端者也然則有所不為亦將有所必為者矣既云進取亦將有所不取者矣如此性尚分流為否異適矣人之好尚不同或為或否各有所適中世偏行一介之夫能成名立方者盖亦衆也或志剛金石而剋扞於强禦謂劉茂衞福也或意嚴冬霜而甘心於小諒戴就陸續也亦有結朋協好幽明共心范式張劭也蹈義陵險死生等節繆肜李善也雖事非通圓良其風軌有足懐者而情迹殊雜難為條品片辭特趣不足區别措之則事或有遺措置也載之則貫序無統以其名體雖殊而操行俱絶故總為獨行篇焉庶備諸闕文紀志漏脫云爾譙𤣥傳譙𤣥字君黄巴郡閬中人也少好學能說易春秋仕於州郡成帝永始二年有日食之災乃詔舉敦樸遜讓有行義者各一人州舉𤣥詣公車對策髙第拜議郎帝始作期門數為微行前書武帝微行常與侍中常侍武騎及待詔北地良家子能騎射者期諸殿門故有期門之號自此始也成帝微行亦然故言始也立趙飛燕為皇后后專寵懐忌皇太子多横夭折𤣥上書諫曰臣聞王者承}
  - {type: variant, offset: 8, length: 0, content: '', WYG: 繼宗統極保業延祚莫急𦙍嗣故易有幹蠱之義詩詠衆多之福易曰幹父之蠱注云蠱事也毛詩曰螽斯后妃之徳也后妃不妬忌則子孫衆多也其詩曰螽斯羽詵詵兮宜爾子孫振振兮今陛下聖嗣未立天下屬望而不惟社稷之計專念微行之事愛幸用於所惑曲意留於非正竊聞後宫皇子産而不育前書成帝宫人曹偉能及許美人皆生子趙昭儀皆令殺之臣聞之怛然痛心傷剝竊懐憂國不忘須臾夫警衞不脩則患生非常忽有醉酒狂夫分争道路既無尊嚴之儀豈識上下之别此為胡狄起於轂下而賊亂發於左右也願陛下念天下之至重愛金玉之身均九女之施九女解見崔𤦺傳存無窮之福天下幸甚時數有災異𤣥輒陳其變既不省納故久稽郎官後遷太常丞以弟服去職平帝元始元年日食又詔公卿舉敦朴直言大鴻臚左咸舉𤣥詣公車對䇿復拜議郎遷中散大夫四年選明逹政事能班化風俗者八人時並舉𤣥為繡衣使者前書御史大夫領繡衣直指出討姦猾理大獄武帝所制不常置持節與太僕任惲等分行天下觀覽風俗所至專行誅賞事未及終而王莽居攝𤣥於是縱縱舎也使者車變易姓名間竄歸家間私也因以隱遁後公孫述僣號於蜀連聘不詣述乃遣使者備禮徵之若𤣥不肻起便賜以毒藥太守乃自齎璽書至𤣥廬曰君髙節已著朝廷垂意誠不宜復辭自招凶禍𤣥仰天歎曰唐堯大聖許由耻仕周武至徳伯夷守餓彼獨何人我亦何人保志全髙死亦奚恨遂受毒藥𤣥子瑛泣血叩頭於太守曰方今國家東有嚴敵兵師四出國用軍資或不常充足願奉家錢千萬以贖父死太守為請述聼許之𤣥遂隱藏田野終述之世時兵戈累年莫能脩尚學業𤣥獨訓諸子勤習經書建武十一年卒明年天下平定𤣥弟慶以狀詣闕自陳光武美之策詔本郡祠以中牢勅所在還𤣥家錢時亦有犍為費貽不肻仕述劉攽曰案}
