  - {type: variant, offset: 4360, length: 2, content: 梁商, WYG: 何進移書陳留太守累行論諡僉曰宜為貞節先生諡法清白守節曰貞好廉自尅曰節也㑹葬者二千餘人刺史郡守各為立碑表墓焉戴就傳戴就字景成㑹稽上虞人也仕郡倉曹掾揚州刺史歐陽參奏太守成公浮臧罪遣部從事薛安案倉庫簿領收就於錢塘縣獄幽囚考掠五毒參至就慷慨直辭色不變容又燒斧使就挾於肘腋從吳毛詩云不吳不敖何承天纂文曰臿今之也張揖字詁云臿刃也音華案說文字林三蒼並無字就語獄卒可熟燒斧勿令冷每上彭考彭即篣也因止飯食不肻下肉焦毁墯地者掇而食之掇拾也丁活反主者窮竭酷慘無復餘方乃卧就覆船下以馬通薫之本草經曰馬通馬矢也一夜二日皆謂已死發船視之就方張眼大罵曰何不益火而使滅絶又復燒地以大鍼刺指爪中使以把土爪悉墯落主者以狀白安安呼見就謂曰太守罪穢狼藉受命考實君何故以骨肉拒扞邪就據地答言太守剖符大臣當以死報國卿雖銜命固宜申斷寃毒奈何誣枉忠良强相掠理令臣謗其君子證其}
