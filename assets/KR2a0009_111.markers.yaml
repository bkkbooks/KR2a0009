  - {type: variant, offset: 4367, length: 2, content: 太白, WYG: 城在今營州南值鮮卑萬餘人入塞寇鈔苞母及妻子遂為所劫質載以撃郡苞率騎二萬與賊對陣賊出母以示苞苞悲號謂母曰為子無狀欲以微祿奉養朝夕不圗為母作禍昔為母子今為王臣義不得顧私恩毁忠節唯當萬死無以塞罪母遥謂曰威豪人各有命何得相顧以虧忠義昔王陵母對漢使伏劒以固其志爾其勉之苞即時進戰賊悉摧破其母妻皆為所害苞殯斂母畢自上歸葬靈帝遣策弔慰封鄃侯鄃今貝州縣也音式榆反苞葬訖謂鄉人曰食祿而避難非忠也殺母以全義非孝也如是有何面目立於天下遂歐血而死向栩傳向栩字甫興河内朝歌人向長之後也髙士傳向長向字作尚字少為書生性卓詭不倫恒讀老子狀如學道又似狂生好被髪著絳綃頭說文綃生絲也從系肖聲音消案此字當作幧音此消反其字從巾古詩云少年見羅敷脱巾著幧頭鄭𤣥注儀禮云如今著幓頭自頂中而前交額上却繞髻也}
