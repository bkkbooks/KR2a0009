  - {type: variant, offset: 11, length: 0, content: '', WYG: 經除為郎元始平帝年也會王莽居攝業以病去官杜門不應州郡之命太守劉咸強召之業乃載病詣門咸怒出教曰賢者不避害譬猶彀弩射市薄命者先死聞業名稱故欲與之為治而反託疾乎令詣獄養病欲殺之客有說咸曰趙殺鳴犢孔子臨河而逝史記曰孔子既不得用於衞將西見趙簡子至於河而聞竇鳴犢舜華之死也臨河而歎曰美哉河水洋洋乎丘之不濟命也夫子貢進曰敢問何謂也孔子曰竇鳴犢舜華晉國之賢大夫也趙簡子未得志之時須此兩人而後從政丘聞之也刳胎殺天則騏驎不至竭澤而漁則蛟龍不合覆巢毁卵則鳯凰不翔何則君子諱傷其類夫鳥獸之於不義也尚知避之而况乎丘哉乃還也未聞求賢而脅以牢獄者也咸乃出之因舉方正王莽以業為酒士王莽時官酤酒故置酒士也病不之官遂隱藏山谷絶匿名迹終莽之世及公孫述僣號素聞業賢徵之欲以為博士業固疾不起數年述羞不致之乃使大鴻臚尹融持毒酒奉詔命以劫業若起則受公侯之位不起賜之以藥融譬㫖曰方今天下分崩孰知是非而以區區之身試於不測之淵乎朝廷貪慕名徳曠官缺位于今七年四時珍御不以忘君宜上奉知己下為子孫身名俱全不亦優乎今數年不起猜疑寇心凶禍立加非計之得者也業乃歎曰危國不入亂國不居論語孔子曰危邦不入亂邦不居天下有道則見無道則隱親於其身為不善者義所不從君子見危授命論語曰親於其身為不善者君子不入又曰君子見危授命見得思義何乃誘以髙位重餌哉融見業辭志不屈復曰宜呼室家計之業曰以丈夫斷之於心久矣何妻子之為遂飲毒而死述聞業死大驚又耻有殺賢之名乃遣使弔祠賻贈百匹業子翬逃辭不受蜀平光武下詔表其閭益部紀載其髙節圗畫形象初平帝時蜀郡王皓為美陽令王嘉為郎王莽簒位並棄官西歸及公孫述稱帝遣使徵皓嘉恐不至遂先繫其妻子使者謂嘉曰速裝妻子可全對曰犬馬猶識主況於人乎王皓先自刎以首付使者述怒遂誅皓家屬王嘉聞而歎之曰後之哉乃對使者伏劍而死是時犍為任永及業同郡馮信並好學博古公孫述連徵命待以髙位皆託青盲以避世難永妻淫於前匿情無言見子入井忍而不救信侍婢亦對信姦通及聞述誅皆盥洗更視曰世適平目即清淫者自殺光武聞而徵之並會病卒劉茂傳劉茂字子衞太原晉陽人也少孤獨與母居家貧以筋力致養孝行著於鄉里及長能習禮經教授常數百人哀帝時察孝廉再遷五原屬國侯遭母憂去官服竟後為沮陽令沮陽縣屬上谷郡故城在今媯州東沮音阻會王莽簒位茂棄官避世𢎞農山中教授建武二年歸為郡門下掾時赤眉二十餘萬衆攻郡縣殺長吏及府掾史茂負太守孫福踰墻藏空穴中得免其暮俱奔盂縣今并州盂縣也晝則逃隠夜求糧食積百餘日賊去乃得歸府明年詔書求天下義士福言茂曰臣前為赤眉所攻吏民壊亂奔走趣山臣為賊所圍命如絲髪賴茂負臣踰城出保盂縣茂與弟觸冒兵刃緣山負食臣及妻子得度死命節義尤髙宜䝉表擢以厲義士詔書即徴茂拜議郎遷宗正丞續漢書宗正丞一人比千石也後拜侍中卒官元初中鮮卑數百餘騎寇漁陽太守張顯率吏士追出塞遥望虜營烟火急趣之兵馬掾嚴授慮有伏兵苦諫止不聼顯䠞令進授不獲已前戰伏兵發授身被十創殁於陣顯拔刃追散兵不能制虜射中顯主簿衞福功曹徐咸遽赴之顯遂墮馬福以身擁蔽虜并殺之朝廷愍授等節詔書褒歎厚加賞賜各除子一人為郎中永初二年劇賊畢豪等入平原界縣令劉雄將吏士乘船追之至厭次河厭次縣之河也與賊合戰雄敗執雄以矛刺之時小吏所輔所姓也風俗通曰宋大夫華所事之後也漢有所忠為諫議大夫前叩頭求哀願以身代雄豪等縱雄而刺輔貫心洞背即死東郡太守捕得豪等具以狀上詔書追傷之賜錢二十萬除父奉為郎中溫序傳溫序字次房太原祁人也仕州從事建武二年騎都尉弓里戌弓里姓也將兵平定北州到太原歴訪英俊大人問以策謀戌見序竒之上疏薦焉於是徴為侍御史遷武陵都尉病免官六年拜謁者遷䕶羗校尉序行部至襄武為隗囂别將茍宇所拘劫宇謂序曰子若與我并威同力天下可圖也序曰受國重任分當效死義不貪生茍背恩徳宇等復曉譬之序素有氣力大怒叱宇等曰虜何敢迫脇漢將因以節撾殺數人賊衆爭欲殺之宇止之曰此義士死節可賜以劒序受劒銜鬚於口顧左右曰既為賊所迫殺無令鬚汙土遂伏劒而死序主簿韓遵從事王忠持屍歸斂光武聞而憐之命忠送䘮到洛陽賜城傍為冢地賻榖千斛縑五百匹除三子為郎中長子壽服竟為鄒平侯相夢序告之曰久客思鄉里壽即棄官上書乞骸骨歸葬帝許之乃反舊塋焉序墓在今并州祁縣西北彭脩傳彭脩字子陽會稽毘陵人也毘陵今常州晉陵縣也吳地記曰本名延陵吳王諸樊封季札漢改曰毘陵年十五時父為郡吏得休休假也與脩俱歸道為盜所劫脩困迫乃拔佩刀前持盜帥曰父辱子死卿不顧死邪盜相謂曰此童子義士也不宜逼之遂辭謝而去鄉黨稱其名後仕郡為功曹時西部都尉宰鼂行太守事應劭漢官曰都尉秦官也本名郡尉掌佐太守典其武職秩比二千石孝景時更名都尉以微過收吳縣獄吏將殺之主簿鍾離意争諫甚切鼂怒使收縳意欲案之掾史莫敢諫脩排閣直入拜於庭曰明府發雷霆於主簿請聞其過鼂曰受教三日初不奉行廢命不忠豈非過邪脩因拜曰昔任座面折文侯解見文苑禰衡傳朱雲攀毁欄檻前書成帝時朱雲上書請以尚方斬馬劒斬張禹上欲殺之雲攀折殿檻西京雜記云攀折玉檻自非賢君焉得忠臣今慶明府為賢君主簿為忠臣鼂遂原意罰貰獄吏罪後州辟從事時賊張子林等數百人作亂郡言州請脩守吳令脩與太守俱出討賊賊望見車馬競交射之飛矢雨集脩障扞太守而為流矢所中死太守得全賊素聞其恩信即殺弩中脩者餘悉皆降散言曰自為彭君故降不為太守服也索盧放傳索盧放字君陽索盧姓也東郡人也以尚書教授千餘人初署郡門下掾更始時使者督行郡國太守有事當就斬刑放前言曰今天下所以苦毒王氏歸心皇漢者實以聖政寛仁故也而傳車所過未聞恩澤太守受誅誠不敢言但恐天下惶懼各生疑變夫使功者不如使過若秦穆赦孟明而用之霸西戎願以身代太守之命遂前就斬使者義而赦之由是顯名建武六年徴為洛陽令政有能名以病乞身徙諫議大夫數納忠言後以疾去建武末復徵不起光武使人輿之見於南宫雲臺賜榖二千斛遣歸除子為太子中庶子卒於家續漢書曰太子中庶子秩六百石周嘉傳周嘉字惠文汝南安城人也髙祖父燕宣帝時為郡決曹掾太守欲枉殺人燕諫不聼遂殺囚而黜燕囚家守闕稱寃詔遣覆考燕見太守曰願謹定文書皆著燕名府君但言時病而已出謂掾史曰諸君被問悉當以罪推燕如有一言及於府君燕手劒相刃使乃收燕劉攽曰案文少一者字繫獄屢被掠楚辭無屈撓當下蠶室乃嘆曰我平王之後正公𤣥孫謝承書曰燕字少卿其先出自周平王之後漢興紹嗣封為正公食采於汝墳也豈可以刀鋸之餘下見先君遂不食而死燕有五子皆至刺史太守嘉仕郡為主簿王莽末羣賊入汝陽城嘉從太守何敞討賊敞為流矢所中郡兵奔北賊圍繞數十重白刃交集嘉乃擁敞以身扞之因呵賊曰卿曹皆人隸也為賊既逆豈有還害其君者邪嘉請以死贖君命因仰天號泣羣賊於是兩兩相視曰此義士也給其車馬遣送之後太守寇恂舉為孝廉拜尚書侍郎光武引見問以遭難之事嘉對曰太守被傷命懸寇手臣實駑怯不能死難帝曰此長者也詔嘉尚公主嘉稱病篤不肻當稍遷零陵太守視事七年卒零陵頌其遺愛吏民為立祠焉嘉從弟暢字伯持性仁慈為河南尹永初二年夏旱久禱無應暢因收葬洛城傍客死骸骨凡萬餘人應時澍雨嵗乃豐稔位至光祿勲范式傳范式字巨卿山陽金鄉人也一名汜少遊太學為諸生與汝南張劭為友劭字元伯二人並告歸鄉里式謂元伯曰後二年當還將過拜尊親見孺子焉見其子也孺子稚子也乃共尅期日後期方至元伯具以白毋請設饌以候之毋曰二年之别千里結言爾何相信之審邪對曰巨卿信士必不乖違母曰若然當為爾醞酒至其日巨卿果到升堂拜飲盡歡而别式仕為郡功曹後元伯寢疾篤同郡郅君章殷子徵晨夜省視之元伯臨盡歎曰恨不見吾死友子徵曰吾與君章盡心於子是非死友復欲誰求元伯曰若二子者吾生友耳山陽范巨卿所謂死友也尋而卒式忽夢見元伯𤣥冕垂纓屣履而呼曰巨卿吾以某日死當以爾時葬永歸黄泉子未我忘豈能相及式怳然覺寤悲歎泣下具告太守請往奔䘮太守雖心不信而重違其情許之式便服朋友之服儀禮䘮服記曰朋友在它國袒免歸則己注云謂無親者為之主䘮服又曰朋友麻注云朋友雖無親有同道之恩相為服緦之絰帯投其葬日馳往赴之式未及到而䘮已發引既至壙將窆窆下棺也而柩不肻進其母撫之曰元伯豈有望邪遂停柩移時乃見有素車白馬號哭而來其母望之曰是必范巨卿也巨卿既至叩䘮言曰行矣元伯死生路異永從此辭會葬者千人咸為揮涕式因執紼而引柩於是乃前式遂留止冢次為脩墳樹然後乃去後到京師受業太學時諸生長沙陳平子亦同在學與式未相見而平子被病將亡謂其妻曰吾聞山陽范巨卿烈士也可以託死吾殁後但以屍埋巨卿户前乃裂素為書以遺巨卿既終妻從其言時式出行適還省書見瘞愴然感之向墳揖哭以為死友乃營䕶平子妻兒身自送䘮於臨湘未至四五里乃委素書於柩上哭别而去其兄弟聞之尋求不復見長沙上計掾史到京師上書表式行狀三府並辟不應舉州茂才四遷荆州刺史友人南陽孔嵩家貧親老乃變姓名傭為新野縣阿里街卒阿里里名也式行部到新野而縣選嵩為導騎迎式導引之騎式見而識之呼嵩把臂謂曰子非孔仲山邪對之歎息語及平生曰昔與子俱曵長裾遊息帝學吾䝉國恩致位牧伯而子懐道隱身處於卒伍不亦惜乎嵩曰侯嬴長守於賤業史記曰侯嬴年七十家貧為大梁夷門卒魏公子聞之往請欲厚遺之不肻受曰臣脩身潔行數十年終不以監門困故受公子財晨門肆志於抱闗解見張皓傳子欲居九夷不患其陋論語曰孔子欲居九夷或曰陋如之何子曰君子居之何陋之有貧者士之宜豈為鄙哉式􅃯縣代嵩嵩以為先傭未竟不肻去嵩在阿里正身厲行街中子弟皆服其訓化遂辟公府之京師道宿下亭盜共竊其馬尋問知其嵩也乃相責讓曰孔仲山善士豈宜侵盜乎於是送馬謝之嵩官至南海太守式後遷廬江太守有威名卒於官李善傳李善字次孫南陽淯陽人本同縣李元蒼頭也建武中疫疾元家相繼死沒唯孤兒續始生數旬而貲財千萬諸奴婢私共計議欲謀殺續分其財産善深傷李氏而力不能制乃潛負續逃亡隱山陽瑕丘界中親自哺養乳為生湩湩乳汁也音竹用反推燥居濕備嘗艱勤續雖在孩抱奉之不異長君有事輒長跪請白然後行之閭里感其行皆相率脩義續年十嵗善與歸本縣脩理舊業告奴婢於長吏悉收殺之時鍾離意為瑕丘令上書薦善行狀光武詔拜善及續並為太子舎人善顯宗時辟公府以能理劇再遷日南太守從京師之官道經淯陽過李元冢未至一里乃脫朝服持鉏去草及拜墓哭泣甚悲身自炊㸑執鼎爼以脩祭祀垂泣曰君夫人善在此盡哀數日乃去到官以愛惠為政懐來異俗遷九江太守未至道病卒續至河間相王忳傳王忳字少林忳音純廣漢新都人也忳嘗詣京師於空舎中見一書生疾困愍而視之書生謂忳曰我當到洛陽而被病命在須臾腰下有金十斤願以相贈死後乞藏骸骨未及問姓名而命絶忳即鬻一斤營其殯葬餘金悉置棺下人無知者後歸數年縣署忳大度亭長初到之日有馬馳入亭中而止其日大風飄一繡被復墮忳前即言之於縣縣以歸忳忳後乘馬到雒縣馬遂奔走牽忳入它舎主人見之喜曰今禽盜矣問忳所由得馬忳具說其狀并及繡被主人悵然良久乃曰被隨旋風與馬俱亡卿何陰徳而致此二物忳自念有葬書生事因說之并道書生形貎及埋金之處主人大驚號曰是我子也姓金名彦前往京師不知所在何意卿乃葬之大恩久不報天以此章卿徳耳忳悉以被馬還之彦父不取又厚遺忳忳辭讓而去時彦父為州從事因告新都令假忳休息自與俱迎彦䘮餘金具存忳由是顯名仕郡功曹州治中從事舉茂才除郿令到官至斄亭斄音台亭長曰亭有鬼數殺過客不可宿也忳曰仁勝凶邪徳除不祥何鬼之避即入亭止宿夜中聞有女子稱寃之聲忳咒曰有何枉狀可前求理乎女子曰無衣不敢進忳便投衣與之女子乃前訴曰妾夫為涪令之官過宿此亭亭長無狀枉殺妾家十餘口埋在樓下悉盜取財貨忳問亭長姓名女子曰即今門下游徼者也忳曰汝何故數殺過客對曰妾不得白日自訴每夜陳寃客輒眠不見應不勝感恚故殺之忳曰當為汝理此寃勿復殺良善也因解衣於地忽然不見明旦召游徼詰問具服罪即収繫及同謀十餘人悉伏辜遣吏送其䘮歸鄉里於是亭遂清安張武傳張武者吳郡由拳人也由拳縣故城在今蘇州嘉興縣南父業郡門下掾送太守妻子還鄉里至河内亭盜夜劫之業與賊戰死遂亡失屍骸武時年㓜不及識父後之太學受業每節常持父遺劒至亡處祭醊泣而還太守第五倫嘉其行舉孝廉遭母䘮過毁傷父魂靈不返因哀慟絶命陸續傳陸續字智初會稽吳人也世為族姓祖父閎字子春建武中為尚書令美姿貎喜着越布單衣光武見而好之自是常􅃯會稽郡獻越布續㓜孤仕郡戸曹史時嵗荒民飢困太守尹興使續於都亭賦民饘粥續悉簡閲其民訊以名氏事畢興問所食㡬何續因口說六百餘人皆分别姓名無有差謬興異之刺史行部見續辟為别駕從事以病去還為郡門下掾是時楚王英謀反陰疏天下善士及楚事覺顯宗得其錄有尹興名乃徵興詣廷尉獄續與主簿梁宏功曹史駟勲及掾史五百餘人詣洛陽詔獄就考諸吏不堪痛楚死者太半唯續宏勲掠考五毒肌肉消爛終無異辭續母逺至京師覘候消息獄事特急無緣與續相聞母但作饋食付門卒以進之續雖見考苦毒而辭色慷慨未嘗易容唯對食悲泣不能自勝使者怪而問其故續曰母來不得相見故泣耳使者大怒以為獄門吏卒通傳意氣召將案之續曰因食餉羮識母所自調和故知來耳非人告也使者問何以知母所作乎續曰母嘗截肉未嘗不方劉攽曰案文上嘗當作常斷葱以寸為度是以知之使者問諸謁舎謁舎所謂停主人之舎也續母果來於是陰嘉之上書說續行狀帝即赦興等事還鄉里禁錮終身續以老病卒長子稠廣陵太守有理名中子逢樂安太守少子襃力行好學不慕榮名連徵不就襃子康已見前傳戴封傳戴封字平仲濟北剛人也剛縣故城在今兗州龔丘縣東北年十五詣太學師事鄮令東海申君申君卒送䘮到東海道當經其家父母以封當還豫為娶妻封暫過拜親不宿而去還京師卒業時同學石敬平溫病卒封養視殯斂以所齎糧市小棺送䘮到家更斂見敬平行時書物皆在棺中乃大異之封後遇賊財物悉被略奪唯餘縑七匹賊不知處封乃追以與之曰知諸君乏故送相遺賊驚曰此賢人也盡還其器物後舉孝廉光禄主事遭伯父䘮去官詔書求賢良方正直言之士有至行能消災伏異者公卿郡守各舉一人郡及大司農俱舉封公車徴陛見對策第一擢拜議郎遷西華令時汝潁有蝗災獨不入西華界時督郵行縣蝗忽大至督郵其日即去蝗亦頓除一境竒之其年大旱封禱請無獲乃積薪坐其上以自焚火起而大雨暴至於是逺近歎服遷中山相時諸縣囚四百餘人辭狀已定當行刑封哀之皆遣歸家與剋期日皆無違者詔書策美焉永元}
