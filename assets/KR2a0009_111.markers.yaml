  - {type: variant, offset: 247, length: 3848, content: 杯從織女西行光照地織女天之真女流星出之女主憂其月癸卯光烈皇后崩八年六月壬午長星出柳張三十七度犯軒轅刺天船陵太微氣至上陛凡見五十六日去柳周地是歲多雨水郡十四傷稼九年正月戊申客星出牽牛長八尺歷建星至房南滅見至五十日牽牛主吳越房心為宋後廣陵王荊與沈涼楚王英與顏忠各謀逆事覺皆自殺廣陵屬吳彭城古宋地十三年閏月丁亥火犯輿鬼為大喪質星為大臣誅戮其十二月楚王英與顏忠等造作妖書謀反事覺英自殺忠等皆伏誅十四年正月戊子客星出昴六十日在軒轅右角稍滅昴主邊兵後一年漢遣奉車都尉顯親侯竇固駙馬都尉耿秉騎都尉耿忠開陽城門候秦彭太僕祭肜將兵擊匈奴一曰軒轅右角為貴相昴為獄事客星守之為大獄是時考楚事未訖司徒虞延與楚王英黨與黃初公孫弘等交通皆自殺或下獄伏誅十五年十一月乙丑太白入月中為大將戮人主亡不出三年後三年孝明帝崩十六年正月丁丑歲星犯房右驂北第一星不見辛巳乃見房右驂為貴臣歲星犯之為見誅是後司徒邢穆坐與阜陵王延交通知逆謀自殺四月癸未太白犯畢畢為邊兵後北匈奴寇邊入雲中至咸漁陽使者高弘發三郡兵追討無所得太僕祭肜坐不進下獄十八年六月己未彗星出張長三尺轉在郎將南入太微皆屬張張周地為東都太微天子廷彗星犯之為兵喪其八月壬子孝明帝崩孝章建初元年正月丁巳太白在昴西一尺八月庚寅彗星出天市長二尺所稍行入牽牛三度積四十日稍滅太白在昴為邊兵彗星出天市為外軍牽牛為吳越是時蠻夷陳縱等及哀牢王類牢反攻蕉嶲唐城永昌太守王尋走奔楪榆安夷長宋延為羌所殺以武威太守傅育領護羌校尉馬防行車騎將軍征西羌又阜陵王延與子男魴謀反大逆無道得不誅廢為侯二月年九日月甲寅流星過紫宮中長數丈散為三滅十二月戊寅彗星出婁三度長八九尺稍入紫宮中百六日稍滅流星過入紫宮皆大人忌後四年六月癸丑明德皇后崩二元和二年四月丁巳客星晨出東方在胃八度長三尺歷閣道入紫宮留四十日滅閣道柴宮天子之宮也客星犯入留久為大喪後四年孝章帝崩孝和永元元年正月辛卯有流星起參長四丈有光色黃白二月流星起天棓東北行三丈所滅色青白壬申夜有流星起太微東蕃長三丈三月丙辰流星起天津壬戌有流星起天將軍東北行參為邊兵天棓為兵太微天廷天津為水天將軍為兵流星起之皆為兵其六月漢遣車騎將軍竇憲執金吾耿秉與度遼將軍鄧鴻出朔方並進兵臨私渠北鞮海斬虜首萬餘級獲生口牛馬羊百萬頭日逐王等八十一部降凡三十餘萬人追單于至西海是歲七月又雨水漂人民是其應二年正月乙卯金木俱在奎丙寅水又在奎奎主武庫兵三星會又為兵喪辛未水金木在婁亦為兵又為匿謀二月丁酉有流星大如桃起紫宮東蕃西北行五丈稍滅四月丙辰有流星大如瓜起文昌東北西南行至少微西滅有頃音如雷聲已而金在軒轅大星東北二尺所八月丁未有流星如雞子起太微西東南行四丈所消十月癸未有流星大如桃起天津西行六丈所消十一月辛酉有流星大如拳起紫宮西行到胃消三年九月丁卯有流星大如雞子起紫宮西南至北斗柄閒消紫宮天子宮文昌少微為貴臣天津為水北斗主殺流星起歷紫宮文昌少微天津文昌為天子使出有兵誅也竇憲為大將軍憲弟篤景等皆卿校尉憲女弟壻郭舉為侍中射聲校尉與衞尉鄧疊母元俱出入宮中謀為不軌至四年六月丙寅辰發覺和帝幸北宮詔執金吾五校勒兵屯南北宮閉城門捕舉舉父長樂少府璜及疊疊弟步兵校尉磊母元皆下獄誅憲弟篤景等皆自殺金犯軒轅女主失勢竇氏被誅太后失勢五年四月癸巳太白熒惑辰星俱在東井七月壬午歲星犯軒轅大星九月金在南斗魁中火犯房北第一星東井秦地為法三星合內外有兵又為法令及水金入斗口中為大將將死火犯房北第一星為將相其六年正月司徒丁鴻薨七月水大漂殺人民傷五穀許侯馬光有罪自殺九月行車騎將軍事鄧鴻越騎校尉馮柱發左右羽林北軍五校士及八郡跡射烏桓鮮卑合四萬騎與度遼將軍朱徵護烏桓校尉任尚中郎將杜崇征叛胡十二月車騎將軍鴻坐追虜失利下獄死度遼將軍徵中郎將崇皆抵罪七年正月丁未有流星起天津入紫宮中滅色青黃有光二月癸酉金火俱在參戊寅金火俱在東井八月甲寅水土金俱在軫十一月甲戌金火俱在心十二月己卯有流星起文昌入紫宮消丙辰火金水俱在斗流星入紫宮金火在心皆為大喪三星合軫為白衣之會金火俱在參東井皆為外兵有死將三星俱在斗有戮將若有死相八年四月樂成王黨七月樂成王宗皆薨將兵長史吳棽坐事徵下獄誅十月北海王威自殺十二月陳王羨薨其九年閏月皇太后竇氏崩遼東鮮卑反太守祭參不追虜徵下獄誅九月司徒劉方坐事免官自殺隴西羌反遣執金吾劉尚行征西將軍事越騎校尉節鄉侯趙世發北軍五校黎陽雍營及邊胡兵三萬騎征西羌十一年五月丙午流星大如瓜起氐西南行稍有光白色占曰流星白為有使客大為大使小亦小使疾期疾亦大如瓜為近小行稍有光為也又正王日邊方有受王命者也明年二月蜀郡旄牛徼外夷白狼樓薄種王唐繒等率種人口十七萬歸義內屬賜金印紫綬錢帛十二年十一月癸酉夜有蒼白氣長三丈起天園東北指軍市見積十日占曰兵起十日期歲明年十一月遼東鮮卑二千餘騎寇右北平十三年十一月乙丑軒轅第四星閒有小客星色青黃軒轅為後宮星出之為失勢其十四年六月辛卯陰皇后廢十六年四月丁未紫宮中生白氣如粉絮戊午客星出紫宮西行至昂五月壬申滅七月庚午水在輿鬼中十月辛亥流星起鉤陳北行三丈有光色黃白氣生紫宮中為喪客星從紫宮西行至昴為趙輿鬼為死喪鉤陳為皇后流星出之為中使後一年元興元年十二月二日和帝崩殤帝即位一年又崩無嗣鄧太后遣使者迎清河孝王子即位是為孝安皇帝是其應也清河趙地也元興元年二月庚辰有流星起角亢五丈所四月辛亥有流星起斗東北行到須女七月己巳有流星起天市五丈所光色赤閏月辛亥水金俱在氐流星起斗東北行至須女須女燕地天市為外軍水金會為兵誅其年遼東貊人反鈔六縣發上谷漁陽右北平遼西烏桓討之孝殤帝延平元年正月丁酉金火在婁金火合為爍為大人憂是歲八月辛亥孝殤帝崩孝安永初元年五月戊寅熒惑逆行守心前星八月戊申客星在東井弧星西南心為天子明堂熒惑逆行守之為反臣客星在東井為大水是時安帝未臨朝鄧太后攝政鄧騭為車騎將軍弟弘悝閶皆以校尉封侯秉國勢司空周章意不平與王尊叔元茂等謀欲閉宮門捕將軍兄弟誅常侍鄭衆蔡倫刦刺尚書廢皇太后封皇帝為遠國王事覺章自殺東井弧皆秦地是時羌反斷隴道漢遣騭將左右羽林北軍五校及諸郡兵征之是歲郡國四十一縣三百一十五雨水四瀆溢傷秋稼壞城郭殺人民是其應也二年正月戊子太白晝見三年正月庚戌月犯心後星己亥太白入斗中十二月彗星起天菀南東北指長六七尺色蒼白太白晝見為強臣是時鄧氏方盛月犯心後星不利子心為宋五月丁酉沛王牙正薨太白入斗中為貴相凶天菀為外軍彗星出其南為外兵是後使羌氐討賊李貴又使烏桓擊鮮卑又使中郎將任尚護羌校尉馬賢擊羌皆降四年六月甲子客星大如李蒼白芒氣長二尺西南指上階星癸酉太白入輿鬼指上階為三公後太尉張禹司空張敏皆免官太白入輿鬼為將凶後中郎將任尚坐贓千萬檻車徵棄巿五年六月辛丑太白晝見經天元初元年三月癸酉熒惑入輿鬼二年九月辛酉熒惑入輿鬼中三年三月熒惑入輿鬼中五月丙寅太白入畢口七月甲寅歲星入輿鬼閏月己未太白犯太微左執法十一月甲午客星見西方己亥在虛危南至胃昴四年正月丙戌歲星留輿鬼中乙未太白晝見丙上四月壬戌太白入輿鬼中己巳辰星入輿鬼中五月己卯辰星犯歲星六月丙申熒惑入輿鬼中戊戌犯輿鬼大星九月辛巳太白入南斗口中五年三月丙申鎮星犯東井鉞星五月庚午辰星犯輿鬼質星丙戌太白犯鉞星六年四月癸丑太白入輿鬼六月丙戌熒惑在輿鬼中丁卯鎮星在輿鬼中辛巳太白犯左執法自永初五年到永寧十年之中太白一晝見經天再入輿鬼一守畢再犯左執法入南斗犯鉞星熒惑五入輿鬼鎮星一犯東井鉞星一入輿鬼歲星辰星再入輿鬼凡五星入輿鬼中皆為死喪熒惑太白甚犯鉞質星為誅戮斗為貴將執法為近臣客星在虛危為喪為哭泣昴畢為邊兵又為獄事至建光元年三月癸巳鄧太后崩五月庚辰太后兄車騎將軍騭等七侯皆免官自殺是其應也延光二年八月己亥熒惑出太微端門三年二月辛未太白犯昴五月癸丑太白入畢九月壬寅鎮星犯左執法四年太白入輿鬼中六月壬辰太白出太微九月甲子太白入斗口中十一月客星見天巿熒惑出太微為亂臣太白犯昴畢為近邊兵一曰大人當之鎮星犯左執法有誅臣太白入輿鬼中為大喪太白出太微為中宮有兵入斗口為貴將相有誅者客星見天巿中為貴喪是時大將軍耿寶中常侍江京樊豐小黃門劉安與阿母王聖聖子女永等并構譖太子保并惡太子乳母男廚監邴吉三年九月丁酉廢太子為濟陰王以北鄉侯懿代殺男吉徙其父母妻子日南四年三月丁卯安帝巡狩從南陽還道寢疾至葉崩閻后與兄衛尉顯中常侍江京等共隱匿不令羣臣知上崩遣司徒劉喜等分詣郊廟告天請命載入北宮庚午夕發喪尊閻氏為太后北鄉侯懿病薨京等又不欲立保白太后更徵諸王子擇所立中黃門孫程王國王康等十九人共合謀誅顯京等立保為天子是為孝順皇帝皆姦人強臣狂亂王室其於死亡誅戮兵起宮中是其應孝順永建二年二月癸未太白晝見三十九日閏月乙酉太白晝見東南維四十一日八月乙巳熒惑入輿鬼太白晝見為強臣熒惑為凶輿鬼為死喪質星為誅戮是時中常侍高梵張防將作大匠翟酺尚書令高堂芝僕射張敦尚書尹就郎姜述楊鳳等及兗州刺史鮑就使匈奴中郎將張國金城太守張篤敦煌太守張朗相與交通漏泄就述棄巿梵防酺芝敦鳳就國皆抵罪又定遠侯班始尚陰城公主堅得鬬爭殺堅得坐要斬馬巿同產皆棄巿六年四月熒惑入太微中犯左右執法西北方六寸所十月乙卯太白晝見十二月壬申客星芒氣長二尺餘西南指色蒼白在牽牛六度客星芒氣白為兵牽牛為吳越後一年會稽海賊曾於等千餘人燒句章殺長吏又殺鄞鄮長取官兵拘殺吏民攻東部都尉揚州六郡逆賊章何等稱將軍犯四十九縣大攻略吏民陽嘉元年閏月戊子客星氣白廣二尺長五丈起天菀西南主馬牛為外軍色白為兵是時敦煌太守徐白使疏勒王盤等兵二萬人入于窴界虜掠斬首三百餘級烏桓校尉耿嘩使烏桓親漢都尉戎末瘣等出塞鈔鮮卑斬首獲生口財物鮮卑怨恨鈔遼東代郡殺傷吏民是後西戎北狄為寇害以馬牛起兵馬牛亦死傷於兵中至, WYG: 此}
