  - {type: variant, offset: 127, length: 8, content: 大水是歲伊雒水溢, WYG: 人與漢中李固河内王奐親善而鄙賈偉節郭林宗焉謝承書曰奐字子昌河内武徳人明五經負笈追業常賃灌園耻交勢利為考城令遷漢陽太守徵拜議郎卒奐後為考城令境接外黄屢遣書請冉冉不至及奐遷漢陽太守將行冉乃與弟協歩齎麥酒於道側設壇以待之冉見奐車徒駱驛遂不自聞惟與弟共辯論於路奐識其聲即下車與相揖對奐曰行路倉卒非陳契闊之所可共前亭宿息以叙分隔冉曰子前在考城思欲相從以賤質自絶豪友耳今子逺適千里會面無期故輕行相候以展訣别如其相追將有慕貴之譏矣便起告違拂衣而去奐瞻望弗及冉長逝不顧桓帝時以冉為萊蕪長萊蕪縣屬泰山郡故城在今淄川縣東南遭母憂不}
