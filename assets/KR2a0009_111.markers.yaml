  - {type: variant, offset: 15, length: 1, content: 和, WYG: 獄踰渉四年令卒以自免太守隴西梁湛召為決曹史安帝初湛病卒官肜送䘮還隴西始葬㑹西羌反叛湛妻子悉避亂它郡肜獨留不去為起墳冢乃潛穿井傍以為窟室晝則隱竄夜則負土及賊平而墳已立其妻子意肜已死還見大驚闗西咸稱傳之共給車馬衣資肜不受而歸鄉里辟公府舉尤異遷中牟令縣近京師多權豪肜到誅諸姦吏及託名貴戚賔客者百有餘人威名遂行卒於官陳重傳陳重字景公豫章宜春人也宜春今袁州縣少與同郡雷義為友俱學魯詩顔氏春秋太守張雲舉重孝廉重以讓義前後十餘通記記書也雲不聼義明年舉孝廉重與俱在郎署有同署郎負息錢數十萬責主日至詭求無已說文曰詭責也重乃密以錢代還郎後覺知而厚辭謝之重曰非我之為將有同姓名者終不言惠又同舎郎有告歸寧者誤持鄰舎郎絝以去主疑重所取重不自申說而市絝以償之後寧䘮者歸以絝還主其事乃顯重後與義俱拜尚書郎義代同時人受罪以此黜退重見義去亦以病免後舉茂才除細陽令政有異化舉尤異當遷為會稽太守遭姊憂去官後為司徒所辟拜侍御史卒雷義傳雷義字仲公豫章鄱陽人也鄱陽縣城在今饒州鄱陽縣東初為郡功曹嘗擢舉善人不伐其功義嘗濟人死罪罪者後以金二斤謝之義不受金主伺義不在默投金於承塵上後葺理屋宇乃得金金主已死無所復還義乃以付縣曹後舉孝廉拜尚書侍郎有同時郎坐事當居刑作義黙自表取其罪以此論司寇同臺郎覺之委位自上乞贖義罪順帝詔皆除刑義歸舉茂才讓於陳重刺史不聼義遂佯狂被髪走不應命鄉里為之語曰膠漆自謂堅不如雷與陳}
