  - {type: variant, offset: 4363, length: 0, content: '', WYG: 薛安庸騃忸行無義忸􅏸也猶言慣習騃音吾楷反就考死之日當白之於天與羣鬼殺汝於亭中如䝉生全當手刃相裂安深竒其壯節即解械更與美談表其言辭解釋郡事徴浮還京師免歸鄉里太守劉寵舉就孝廉光祿主事病卒風俗通曰光祿奉肹上就為主事趙苞傳趙苞字威豪甘陵東武城人今貝州武城縣從兄忠為中常侍苞深耻其門族有宦官名埶不與忠交通初仕州郡舉孝廉再遷廣陵令視事三年政教清明郡表其狀遷遼西太守抗厲威嚴名振邊俗以到官明年遣使迎母及妻}
