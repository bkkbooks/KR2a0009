  - {type: variant, offset: 4387, length: 2, content: 逵蘧, WYG: 讓讒栩不欲令國家命將出師疑與角同心欲為内應收送黄門北寺獄殺之諒輔傳諒輔字漢儒廣漢新都人也仕郡為五官掾百官志曰毎州皆置諸曹掾史有功曹史主選署功勞有五官掾署功曹及諸曹事時夏大旱太守自出祈禱山川連日而無所降輔乃自暴庭中慷慨咒曰輔為股肱不能進諫納忠薦賢退惡和調陰陽承順天意至令天地否隔萬物焦枯百姓喁喁無所訴告咎盡在輔今郡太守改服責己為民祈福精誠懇到未有感徹輔今敢自祈請若至日中不雨乞以身塞無狀於是積薪柴聚茭茅以自環茭乾草也搆火其旁將自焚焉未及日中時而天雲晦合須臾澍雨一郡沾潤世以此稱其志誠劉翊傳劉翊字子相潁川潁陰人也家世豐産常能周施而不有其惠曾行於汝南界中有陳國張季禮逺赴師䘮遇寒氷車毁頓滯道路翊見而謂曰君慎終赴義行宜速逹即下車與之不告姓名自䇿馬而去季禮意其子相也後故到潁陰還所假乘翊閉門辭行不與相見常守志卧疾不屈聘命河南种拂臨郡引為功曹翊以拂名公之子拂暠之子也乃為起焉拂以其擇時而仕甚敬任之陽翟黄綱恃程夫人權力求占山澤以自營植拂召翊問曰程氏貴盛在帝左右不聼則恐見怨與之則奪民利為之奈何翊曰名山大澤不以封盖為民也禮記曰名山大澤不以封明府聼之則被佞倖之名矣若以此獲禍貴子申甫則自以不孤也申甫拂之子拂從翊言遂不與之乃舉翊為孝廉不就後黄巾賊起郡縣饑荒翊救給乏絶資其食者數百人鄉族貧者死亡則為具殯葬嫠獨則助營妻娶寡婦曰嫠無夫曰獨獻帝遷都西京翊舉上計掾是時寇賊興起道路隔絶使驛稀有逹者翊夜行晝伏乃到長安詔書嘉其忠勤特拜議郎遷陳留太守翊散所握珍玩唯餘車馬自載東歸出闗數百里見士大夫病亡道次翊以馬易棺脫衣歛之又逢知故困餒於路不忍委去因殺所駕牛以救其乏衆人止之翊曰視沒不救非志士也遂俱餓死王烈傳王烈字彦方魏志烈字彦考太原人也少師事陳寔以義行稱鄉里有盜牛者主得之盜請罪曰刑戮是甘乞不使王彦方知也烈聞而使人謝之遺布一端或問其故烈曰盜懼吾聞其過是有耻惡之心既懐耻惡必能改善故以此激之後有老父遺劒於路行道一人見而守之至暮老父還尋得劒怪而問其姓名以事告烈烈使推求乃先盜牛者也諸有爭訟曲直將質之於烈或至塗而反或望廬而還其以徳感人若此察孝廉三府並辟皆不就遭黄巾董卓之亂乃避地遼東夷人尊奉之太守公孫度接以昆弟之禮魏志曰公孫度字叔濟本遼東襄平人度父延避吏居𤣥莬任為郡吏時𤣥莬太守公孫域子豹年十八早死度少時名豹又與域子同年域見親哀之遣就師學為娶妻後舉有道除尚書郎遼東太守訪州}
