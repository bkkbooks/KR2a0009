  - {type: variant, offset: 4370, length: 3, content: 晝見也, WYG: 於竈北坐板床上如是積久板乃有膝踝足指之處不好語言而喜長嘯賔客從就輒伏而不視有弟子名為顔淵子貢季路冉有之輩或騎驢入市乞匄於人或悉邀諸乞兒俱歸止宿為設酒食時人莫能測之郡禮請辟舉孝廉賢良方正有道公府辟皆不到又與彭城姜肱京兆韋著並徵栩不應後特徵到拜趙相及之官時人謂}
