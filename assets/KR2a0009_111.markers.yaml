  - {type: variant, offset: 9, length: 0, content: '', WYG: 亦字乃合在不字上乃漆身為厲陽狂以避之退藏山藪十餘年述破後仕至合浦太守瑛善説易以授顯宗為北宫衞士令漢官儀曰北宫衞士令一人秩六百石李業傳李業字巨游廣漢梓潼人也少有志操介特習魯詩師博士許晃元始}
