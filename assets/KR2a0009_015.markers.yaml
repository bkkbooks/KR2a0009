  - {type: variant, offset: 6596, length: 3, content: 歙急攻, WYG: 戲於庭極乃畢入殿前激水化為比目魚跳躍嗽水作霧鄣日畢化成黄龍長八丈出水逰戲於庭炫燿日光以两大絲繩繋兩柱中頭間相去數丈兩倡女對舞行於繩上對面道逢切肩不傾又蹋局出身藏形於斗中鍾磬並作樂畢作魚龍曼延小黄門吹三通謁者引公卿羣臣以次拜微行出罷卑官在前尊官在後徳陽殿周旋容萬人陛高二丈皆文石作壇激沼水於殿下畫屋朱梁玉階金柱刻鏤作宫掖之好厠以青翡翠一柱三帶韜以赤緹天子正旦節㑹朝百官於此自到偃師去宫四十三里望朱雀五闕徳陽其上鬱嵂與天連雒陽宫閣傳云徳陽宫殿南北行七丈東西行三十七丈四尺其每朔唯十月旦從故事者髙祖定秦之月元年歳首也蔡邕曰羣臣朝見之儀視不晚朝十月朔之故以問胡廣廣曰舊儀公卿以下毎月常朝先帝以其頻故省唯六月十月朔朝後復以六月朔盛暑省之蔡邕禮樂志曰漢樂四品一曰大予樂典郊廟上陵殿諸食舉之樂郊樂易所謂先}
