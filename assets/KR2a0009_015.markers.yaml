  - {type: variant, offset: 6, length: 8, content: 隗囂公孫述列傳第, WYG: 日服蒼衣先再拜乃跪陳陳已復再拜乃起祝曰昊天生五穀以養人今五榖病旱恐不成敬進清酒搏脯再拜請雨雨幸大澍奉牲禱以甲乙日為大靑龍一長八丈居中央為小龍七各長四丈於東方皆東鄉其間相去八尺小僮八人皆齋}
  - {type: variant, offset: 6, length: 8, content: 隗囂公孫述列傳第, krp: 日服蒼衣先再拜乃跪陳陳已復再拜乃起祝曰昊天生五穀以養人今五榖病旱恐不成敬進清酒搏脯再拜請雨雨幸大澍奉牲禱以甲乙日為大靑龍一長八丈居中央為小龍七各長四丈於東方皆東鄉其間相去八尺小僮八人皆齋}
