  - {type: variant, offset: 42, length: 2, content: 囂歸, WYG: 罪稽首再拜以聞制曰可維建寜四年七月乙未制詔皇后之尊與帝齊體供奉天地祗承宗廟母臨天下故有莘興殷姜任母周二代之隆盖有内徳長秋宫闕中宫曠位宋貴人乗淑媛之懿體山河之儀威容昭曜徳冠後庭羣寮所咨人曰宜哉卜之蓍龜卦得承乾有司奏議宜稱紱組以臨兆民今使太尉襲使持節奉璽綬宗正祖為副立貴人為皇后其徃踐爾位敬宗禮典肅慎中饋無替朕命永終天禄皇后初即位章徳殿太尉使持節奉璽綬天子臨軒百官陪位皇后北面太尉住盖下東向宗正大長秋西向宗正讀策文畢皇后拜稱臣妾畢住位太尉襲授璽綬中常侍長樂太僕髙}
