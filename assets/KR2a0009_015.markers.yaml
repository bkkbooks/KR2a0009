  - {type: variant, offset: 36, length: 0, content: '', WYG: 致雨具作土龍吹律及諸方術無不備設譚問求雨所以為土龍何也曰龍見者輙有風雨興起以迎送之故縁其象類而為之立土人舞僮二佾七日一變如故事周禮曰䍿舞帥而舞旱暵之事鄭𤣥曰䍿赤皂染羽為之也旱暵注陽也用假色者欲其有時而去之反拘朱索社伐朱鼓漢舊儀曰成帝二年六月始命諸官止雨朱繩反縈社撃鼔攻之是後水旱常不和干寳曰朱絲縈社社太隂也朱火色也絲維屬天子伐鼔於社責羣隂也諸侯用幣於社請上公也伐鼔於朝退自攻也此聖人厭勝之法也禱賽以少牢如禮漢舊儀曰武帝元封日到七月畢賽之秋冬春不求雨古今注曰武帝元封六年五月旱女及巫丈夫不入市也拜皇太子之儀百官㑹位定謁者}
