  - {type: variant, offset: 1173, length: 241, content: 草創英雄未集以望異域之人疵瑕未露欲先崇郭隗想望樂毅故欽承大旨順風不讓將軍以至德尊賢廣其謀慮動有功發中權基業已定大勳方緝今俊並會羽翮並肩望無耆耉之德而猥託賓客之上誠自愧也雖懷介然之節欲絜去就之分誠終不背其本貳其志也何則范蠡收責句踐乘偏舟於五湖舅犯謝罪文公亦逡巡於河上夫以二子之賢勒銘兩國猶削跡歸愆請命乞身望之無勞蓋其宜也望聞烏氏有龍池之山微徑南通與漢相屬其傍時有奇人聊及須廣求其真願將軍勉之囂等遂至長安更始以為右將軍崔義皆即舊號其冬崔義謀欲叛歸囂懼并禍即以事告之崔義誅死更始感囂忠以為, WYG: ''}
