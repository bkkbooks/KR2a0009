  - {type: variant, offset: 15, length: 3, content: 隗囂字, WYG: 日服青衣而舞之田嗇夫亦齋三日服青衣而立之諸里社通之於閭外之溝取五蝦蟇錯置社之中池方八尺深一尺置水蝦蟇焉具清酒搏脯祝齋三日服蒼衣拜跪陳祝如初取三嵗雄雞與三嵗豭猪皆燔之於四通神宇令民闔邑里南門置水其外開里北門具老豭猪一置之里北門之外市中亦置一豭猪聞彼鼓聲皆燒猪尾取死人骨埋之開山淵積薪而焚之决通道橋之壅塞不行者決瀆之幸而得雨報以豚一酒鹽黍財足以茅為席毋斷夏求雨令縣邑以水日家人祀竈毋舉土功更大浚井暴釡於壇杵臼于術七日為四通之壇於邑南門之外方七尺植赤繒七其神蚩尤祭之以赤雄雞七𤣥酒其清酒搏脯祝齋三日服赤衣拜跪陳祝如春以丙丁日為赤大龍一長七丈居中又為小龍六長三丈五尺於南方皆南鄉其間相去七尺壯者七人皆齋三日服赤衣而舞之司空嗇夫亦齋三日服赤衣而立之鑿社而通之閭外之溝取五蝦蟇錯置社之中池方七尺深一尺酒脯祭齋衣赤拜跪陳祝如初取三嵗雄雞豭猪燔之四通神宇開隂閉陽如春也}
