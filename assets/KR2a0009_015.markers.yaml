  - {type: variant, offset: 37, length: 0, content: '', WYG: 皇太子當御坐殿下北面司空當太子西北東面立讀策書畢中常侍持皇太子璽綬東向授太子太子再拜三稽首謁者贊皇太子臣某甲謁者稱制曰可三公升階上殿賀夀萬歳因大赦天下供賜禮畢罷拜諸侯王公之儀百官㑹位定謁者引光禄勲前丁孚漢儀曰太常住盖下東向讀文與此異也謁者引當拜前當坐伏殿下光禄勲前一拜舉手曰制詔其以某為某丁孚漢儀有夏勤策文曰維元初六年三月甲子制詔以大鴻臚勤為司徒曰朕承天序惟稽古建爾于位為漢輔往率舊職敬敷五教五教在寛左右朕躬宣力四表保乂皇家於戲實惟秉國之均旁祗厥緒時亮天工可不慎與勤而戒之讀策書畢謁者稱臣某再拜尚書郎以璽印綬付侍御史侍御史前東面立授璽印綬王公再拜頓首三下贊謁者曰某王臣某新封某公某初謝中謁者報謹謝贊者立曰謝皇帝為公興皆冠謝起就位供賜禮畢罷臣昭曰漢立皇后國禮之大而志無其儀良未可了案蔡質所記立宋皇后儀今取以備闕云尚書令臣}
