  - {type: variant, offset: 348, length: 0, content: '', WYG: 為闋正徳曰合五音律先唱五音並作二十五闋皆音以竽樂叶圖徴曰夫聖人之作樂不可以自娱也所以觀得失之效者也故聖人不取備於}
  - {type: page-break, offset: 348, content: '', id: KR2a0009_WYG_015-10a, image: WYG0252/WYG0252-0257a.png}
  - {type: variant, offset: 348, length: 0, content: '', krp: 為闋正徳曰合五音律先唱五音並作二十五闋皆音以竽樂叶圖徴曰夫聖人之作樂不可以自娱也所以觀得失之效者也故聖人不取備於}
  - {type: variant, offset: 349, length: 2, content: 將十, WYG: 人必從八能之士故撞鍾者當知鍾撃鼓者當知鼔吹管者當知管吹竽者當知竽撃磬者當知磬鼓琴者當知琴故八士曰或調隂陽或調律厯或調五音故撞鍾者以知法度鼓琴者以知四海撃磬者以知民事鍾音調則君道得君道得則黄鍾㽔賔之律應君道不得則鍾音不調鍾音不調則黄鍾蕤賔之律不應鼔音調則臣道得臣道得則太簇之律應管音調則律厯正律厯正則夷則之律應磬音調則民道得民道得則林鐘之律應竽音調則法度得法度得則無射之律應琴音調則四海合嵗氣百川一合徳鬼神之道行祭祀之道得如此則姑洗之律應五樂皆得則應鍾之律應天地以和氣至則和氣應和氣不至則天地和氣不應鍾音調下臣以法賀主鼓音調主以法賀臣磬音調主以徳施於百姓琴音調主以徳及四海八能之士常以日冬至成天文日夏至成地理作隂樂以成天文作陽樂以成地理訖正徳曰八能士各言事八能士各書板言事文曰臣某言今月若干日甲乙日冬至黄鍾之音調君道得孝道襃商臣角民徴事羽物各一板否則召太史令各板書封以皂囊送西陛跪授尚書施當軒北面稽首拜上封事尚書授侍中常侍迎受報聞以小黄門幡麾節度太史令前曰禮畢制曰可太史令前稽首曰􅀈太史令八能士詣太官受賜陛者以次罷日夏至禮亦如之蔡邕獨斷曰冬至陽氣始動夏至隂氣始起麋鹿角觧故寢兵鼔身欲寜志欲靜故不聽事迎送五日臘者嵗終大祭縱吏民宴飲非迎氣故但送不迎正月嵗首亦如臘儀冬至陽氣起君道長故賀夏至隂氣起君道衰故不賀鼓以動衆鍾以止衆故夜漏盡鼓鳴則起晝漏盡鍾鳴則息季冬之月星廻嵗終隂陽以交勞農大享臘髙堂隆曰帝王各以其行之盛而祖以其終而臘火生於寅盛於午終於戌故火家以午祖以戌臘秦靜曰古禮出行}
