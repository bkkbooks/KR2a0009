  - {type: variant, offset: 342, length: 4, content: 凡我同盟, WYG: 至日所以休兵不興事閉闗商旅不行何此日隂陽氣微王者承天理物故率天下靜不復行役以扶助微氣成萬物也夏至隂氣始動冬至陽氣始萌易曰先王以至日閉關商旅不行夏至隂始起反大熱何隂氣始起陽氣推而上故大熱也冬至陽始起隂氣推而上故大寒也故使八能之士八人或吹黄鍾之律間竽或撞黄鍾之鍾或度晷景權水輕重水一升冬重十三两或撃黄鍾之磬或鼓黄鍾之瑟軫間九尺二十五弦宫處于中左右為商徴角羽或撃黄鍾之鼓先之三日太史謁之至日夏時四孟冬則四仲其氣至焉先氣至五刻太史令與八能之士郎坐于端門左塾太子具樂器夏赤冬黒列前殿之前西上鍾為端守宫設席于器南北面東上正徳席鼓南西面令晷儀東北三刻中黄門持兵引太史令八能之士入自端門就位二刻侍中尚書御史謁者皆陛一刻乘輿親御臨軒安體靜居以聽之太史令前當軒溜北面跪舉手曰八能之士以備請行事制曰可太史令稽首曰􅀈起立少退顧令正徳曰可行事正徳曰􅀈皆旋復位正徳立命八能士曰以次行事間音以竽八能曰􅀈五音各}
  - {type: page-break, offset: 342, content: '', id: KR2a0009_WYG_015-9a, image: WYG0252/WYG0252-0256c.png}
