  - {type: variant, offset: 390, length: 9, content: 奉血鍉進護軍舉手揖, WYG: 大儺所以扶陽抑隂也盧植禮記注曰所以逐衰而迎新其儀選中黄門子弟年十歲以上十二以下百二十人為侲子皆赤幘皂製執大鼗漢舊儀曰方相帥百𨽻及童女以桃弧棘矢土鼔鼓且射之以赤九五穀播灑之譙周論語注曰以葦矢射之薛綜曰侲之言善善童幼子也方相氏黄金四目蒙熊皮𤣥衣朱裳執戈揚盾十二獸有衣毛角中黄門行之冗從僕射将之以逐惡鬼于禁中夜漏上水朝臣㑹侍中尚書御史謁者虎賁羽林郎將執事皆赤幘陛衞乗輿御前殿黄門令奏曰侲子備請逐疫於是中黄門倡侲子和曰甲作食􅓇胇胃食虎雄伯食魅騰簡食不祥攬}
