  - {type: variant, offset: 19, length: 2, content: 孟天, WYG: 夏禱山陵以助之令縣邑一徙市於邑南門之外五日禁男子無得行入市家人祠中霤母舉土功聚巫市旁為之結盖為四通之壇於中央植黄繒五其神后稷祭之以母􅓞五𤣥酒具清酒搏脯令各為祝齋三日衣黄衣皆如春祠以戊巳日為大黄龍一長五丈居中央又為小龍四各長二丈五尺於中央皆南鄉其間相去五尺丈夫五人皆齋三日服黄衣而舞之老者亦齋三日衣黄衣而立之亦通社中於閭外溝蝦蟇池方五尺深一尺他皆如前秋暴巫尫至九日毋舉火事煎金器家人祠門為四通之壇於邑西門之外方九尺植白繪九其神大昊祭之桐木魚九𤣥酒其清酒搏脯衣白衣他如春以庚辛日為大白龍一長九丈居中央為小龍八各長四丈五尺於西方皆西鄉其間相去九尺鰥者九人皆齋三日服白衣而舞之司馬亦齋三日衣白衣而立之蝦蟇池方九尺深一尺他如前冬舞龍六日禱於名山以助之家人祠井毋壅}
