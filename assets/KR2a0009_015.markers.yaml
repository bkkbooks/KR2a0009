  - {type: variant, offset: 2941, length: 3120, content: 下寬仁諸侯雖有亡叛而後歸輒復位號不誅也以囂文吏曉義理故復賜書深言則似不遜略言則事不決今若束手復遣恂弟歸闕庭者則爵祿獲全有浩大之福矣吾年垂四十在兵中十歲厭浮語虛辭即不欲勿報囂知帝審其詐遂遣使稱臣於公孫述明年述以囂為朔寧王遣兵往來為之援埶秋囂將步騎三萬侵安定至陰槃馮異率諸將拒之囂又令別將下隴攻祭遵於汧兵並無利乃引還帝因令來歙以書招王遵遵乃與家屬東詣京師拜為太中大夫封向義侯遵字子春霸陵人也父為上郡太守遵少豪俠有才辯雖與囂舉兵而常有歸漢意曾於天水私於來歙曰吾所以戮力不避矢石者豈要爵位哉徒以人思舊主先君蒙漢厚恩思効萬分耳又數勸囂遣子入侍前後辭諫切甚囂不從故去焉八年春來歙從山道襲得略陽城囂出不意懼更有大兵乃使王元拒隴坻行巡守番須口王孟塞雞頭道牛邯軍瓦亭囂自悉其大衆圍來歙公孫述亦遣其將李育田弇助囂攻略陽連月不下帝乃率諸將西征之數道上隴使王遵持節監大司馬吳漢留屯於長安遵知囂必敗滅而與牛邯舊故知其有歸義意以書喻之曰遵與隗王歃盟為漢自經歷虎口踐履死地已十數矣于時周洛以西無所統壹故為王策欲東收關中北取上郡進以奉天人之用退以懲外夷之亂數忖孜冀聖漢復存當挈河隴奉舊都以歸本朝生民以來臣人之埶未有便於此時者也而王之將吏羣居穴處之徒人人扺掌欲為不善之計遵與孺卿日夜所爭害幾及身者豈一事哉前計抑絕後策不從所以吟嘯腕垂涕登車幸蒙封拜得延論議每及西州之事未嘗敢忘孺卿之言今車駕大衆已在道路吳耿驍將雲集四境而孺卿以奔離之卒拒要當軍衝視其形埶何如哉夫智者覩危思變賢者泥而不滓是以功名終申策畫復得故夷吾束縛而相齊黥布杖劒以歸漢去愚就義功名並著今孺卿當成敗之際遇嚴兵之鋒可為怖慄宜斷之心參之有識邯得書沈吟十餘日乃謝士衆歸命洛陽拜為太中大夫於是囂大將十三人屬縣十六衆十餘萬皆降王元入蜀求救囂將妻子奔西城從楊廣而田弇李育保上邽詔告囂曰若束手自詣父子相見保無佗也高皇帝云橫來大者王小者侯若遂欲為黥布者亦自任也囂終不降於是誅其子恂使吳漢與征南大將軍岑彭圍西城耿弇與虎牙大將軍蓋延圍上邽車駕東歸月餘楊廣死囂窮困其大將王捷別在戎丘登城呼漢軍曰為隗王城守者皆必死無二心願諸軍亟罷請自殺以明之遂自刎頸死數月王元行巡周宗將蜀救兵五千餘人乘高卒至鼓譟大呼曰百萬之衆方至漢軍大驚未及成陳元等決圍殊死戰遂得入城迎囂歸冀會吳漢等食盡退去於是安定北地天水隴西復反為囂九年春囂病且餓出城餐糗糒恚憤而死王元周宗立囂少子純為王明年來歙耿弇蓋延等攻破落門周宗行巡苟宇趙恢等將純降宗恢及諸隗分徙京師以東純與巡宇徙弘農唯王元留為蜀將及輔威將軍臧宮破延岑元舉衆詣宮降元字惠孟初拜上蔡令遷東平相坐墾田不實下獄死牛邯字孺卿狄道人有勇力才氣雄於邊垂及降大司空徒司直杜林太中大夫馬援並薦之以為護羌校尉與來歙平隴右十八年純與賓客數十騎亡入胡至武威捕得誅之論曰隗囂援旗糺族假制明神迹夫創圖首事有以識其風矣終於孤立一隅介于大國隴坻雖隘非有百二之埶區區兩郡以禦堂堂之鋒至使窮廟策竭征徭身歿衆解然後定之則知其道有足懷者所以棲有四方之桀士至投死絕亢而不悔者矣夫功全則譽顯業謝則釁生回成喪而為其議者或未聞焉若囂命會符運敵非天力雖坐論西伯豈多嗤乎公孫述字子陽扶風茂陵人也哀帝時以父任為郎後父仁為河南都尉而述補清水長央仁以述年少遣門下掾隨之官月餘掾辭歸白仁曰述非待教者也後太守以其能使兼攝五縣政事修理姦盜不發郡中謂有鬼神王莽天鳳中為導江卒正居臨邛復有能名及更始立豪傑各起其縣以應漢南陽人宗成自稱虎牙將軍入略漢中又商人王岑亦起兵於雒縣自稱定漢將軍殺王莽庸部牧以應成衆合數萬人述聞之遣使迎成等成等至成都虜掠暴橫述意惡之召縣中豪桀謂曰天下同苦新室思劉氏久矣故聞漢將軍到馳迎道路今百姓無辜而婦子係獲室屋燒燔此寇賊非義兵也吾欲保郡自守以待真主諸卿欲并力者即留不欲者便去豪桀皆叩頭曰願效死述於是使人詐稱漢使者自東方來假述輔漢將軍蜀郡太守兼益州牧印綬乃選精兵千餘人西擊成等比至成都衆數千人遂攻成大破之成將垣副殺成以其衆降二年秋更始遣柱功侯李寶益州刺史張忠將兵萬餘人徇蜀漢述恃其地險衆附有自立志乃使其弟恢於綿竹擊寶忠大破走之由是威震益部功曹李熊說述曰方今四海波蕩匹夫橫議將軍割據千里地什湯武若奮威德以投天𨻶霸王之業成矣宜改名號以鎮百姓述曰吾亦慮之公言起我意於是自立為蜀王都成都蜀地肥饒兵力精強遠方士庶多往歸之邛笮君長皆來貢獻李熊復說述曰今山東飢饉人庶相食兵所屠滅城邑丘墟蜀地沃野千里土壤膏腴果實所生無穀而飽女工之業覆衣天下名材竹幹器械之饒不可勝用又有魚鹽銅銀之利浮水轉漕之便北據漢中杜襃斜之險東守巴郡拒扞關之口地方數千里戰士不下百萬見利則出兵而略地無利則堅守而力農東下漢水以窺秦地南順江流以震荊楊所謂用天因地成功之資今君王之聲聞於天下而名號未定志士狐疑宜即大位使遠人有所依歸述曰帝王有命吾何足以當之熊曰天命無常百姓與能能者當之王何疑焉述夢有人語之曰八𣒅子系十二為期覺謂其妻曰雖貴而祚短若何妻對曰朝聞道夕死尚可況十二乎會有龍出其府殿中夜有光耀述以為符瑞因刻其掌文曰公孫帝建武元年四月遂自立為天子號成家色尚白建元曰龍興元年以李熊為大司徒以其弟光為大司馬恢為大司空改益州為司隸校尉蜀郡為成都尹越巂任貴亦殺王莽大尹而據郡降述遂使將軍侯丹開白水關北守南鄭將軍任滿從閬中下江式東據扞關於是盡有益州之地自更始敗後光武方事山東未遑西伐關中豪桀呂鮪等往往擁衆以萬數莫知所屬多往歸述皆拜為將軍遂大作營壘陳車騎肄習戰射會聚兵甲數十萬人積糧漢中築宮南鄭又造十層赤樓帛蘭船多刻天下牧守印章備置公卿百官使將軍李育程烏將數萬衆出陳倉與呂鮪徇三輔三年征西將軍馮異擊鮪育於陳倉大敗之鮪育奔漢中五年延岑田戎為漢兵所敗皆亡入蜀岑字叔牙南陽人始起據漢中又擁兵關西關西所在破散走至南陽略有數縣戎汝南人初起兵夷陵轉寇郡縣衆數萬人岑戎並與秦豐合豐俱以女妻之及豐敗故二人皆降於述述以岑為大司馬封汝寧王戎翼江王六年述遣戎與將軍任滿出江關下臨沮夷陵閒招其故衆因欲取荊州諸郡竟不能剋是時述廢銅錢置鐵官錢百姓貨幣不行蜀中童謠言曰黃牛白腹五銖當復好事者竊言王莽稱黃述自號白五銖錢漢貨也言天下當并還劉氏述亦好為符命鬼神瑞應之事妄引讖記以為孔子作春秋為赤制而斷十二公明漢至平帝十二代歷數盡也一姓不得再受命又引錄運法曰廢昌帝立公孫括地象曰帝軒轅受命公孫氏握援神契曰西太守乙卯金謂西方太守而乙絕卯金也五德之運黃承赤而白繼黃金據西方為白德而代王氏得其正序又自言手文有奇及得龍興之瑞數移書中國冀以感動衆心帝患之乃與述書曰圖讖言公孫即宣帝也代漢者當塗高君豈高之身邪乃復以掌文為瑞王莽何足效乎君非吾賊臣亂子倉卒時人皆欲為君事耳何足數也君日月已逝妻子弱小當早為定計可以無憂天下神器不可力爭宜留三思署曰公孫皇帝述不荅明年隗囂稱臣於述述騎都尉平陵人荊邯見東方將平兵且西向說述曰兵者帝王之大器古今所不能廢也昔秦失其守豪桀並起漢祖無前人之迹立錐之地起於行陣之中躬自奮擊兵破身困者數矣然軍敗復合創愈復戰何則前死而成功踰於却就於滅亡也隗囂遭遇運會割有雍州兵強士附威加山東遇更始政亂復失天下衆庶引領四方瓦解囂不及此時推危乘勝以爭天命而退欲為西伯之事尊師章句賓友處士偃武息戈卑辭事漢喟然自以文王復出也令漢帝釋關隴之憂專精東伐四分天下而有其三使西州豪傑咸居心於山東發閒使招攜貳則五分而有其四若舉兵天水必至沮潰天水既定則九分而有其八陛下以梁州之地內奉萬乘外給三軍百姓愁困不堪上命將有王氏自潰之變臣之愚計以為宜及天下之望未絕豪傑尚可招誘急以此時發國內精兵令田戎據江陵臨江南之楚倚巫山之固築壘堅守傳檄吳楚長沙以南必隨風而靡令延岑出漢中定三輔天水隴西拱手自服如此海內震搖冀有大利述以問羣臣博士吳柱曰昔武王伐殷先觀兵孟津八百諸侯不期同辭然猶還師以待天命未聞無, WYG: 㦸}
  - {type: variant, offset: 2941, length: 3120, content: 下寬仁諸侯雖有亡叛而後歸輒復位號不誅也以囂文吏曉義理故復賜書深言則似不遜略言則事不決今若束手復遣恂弟歸闕庭者則爵祿獲全有浩大之福矣吾年垂四十在兵中十歲厭浮語虛辭即不欲勿報囂知帝審其詐遂遣使稱臣於公孫述明年述以囂為朔寧王遣兵往來為之援埶秋囂將步騎三萬侵安定至陰槃馮異率諸將拒之囂又令別將下隴攻祭遵於汧兵並無利乃引還帝因令來歙以書招王遵遵乃與家屬東詣京師拜為太中大夫封向義侯遵字子春霸陵人也父為上郡太守遵少豪俠有才辯雖與囂舉兵而常有歸漢意曾於天水私於來歙曰吾所以戮力不避矢石者豈要爵位哉徒以人思舊主先君蒙漢厚恩思効萬分耳又數勸囂遣子入侍前後辭諫切甚囂不從故去焉八年春來歙從山道襲得略陽城囂出不意懼更有大兵乃使王元拒隴坻行巡守番須口王孟塞雞頭道牛邯軍瓦亭囂自悉其大衆圍來歙公孫述亦遣其將李育田弇助囂攻略陽連月不下帝乃率諸將西征之數道上隴使王遵持節監大司馬吳漢留屯於長安遵知囂必敗滅而與牛邯舊故知其有歸義意以書喻之曰遵與隗王歃盟為漢自經歷虎口踐履死地已十數矣于時周洛以西無所統壹故為王策欲東收關中北取上郡進以奉天人之用退以懲外夷之亂數忖孜冀聖漢復存當挈河隴奉舊都以歸本朝生民以來臣人之埶未有便於此時者也而王之將吏羣居穴處之徒人人扺掌欲為不善之計遵與孺卿日夜所爭害幾及身者豈一事哉前計抑絕後策不從所以吟嘯腕垂涕登車幸蒙封拜得延論議每及西州之事未嘗敢忘孺卿之言今車駕大衆已在道路吳耿驍將雲集四境而孺卿以奔離之卒拒要當軍衝視其形埶何如哉夫智者覩危思變賢者泥而不滓是以功名終申策畫復得故夷吾束縛而相齊黥布杖劒以歸漢去愚就義功名並著今孺卿當成敗之際遇嚴兵之鋒可為怖慄宜斷之心參之有識邯得書沈吟十餘日乃謝士衆歸命洛陽拜為太中大夫於是囂大將十三人屬縣十六衆十餘萬皆降王元入蜀求救囂將妻子奔西城從楊廣而田弇李育保上邽詔告囂曰若束手自詣父子相見保無佗也高皇帝云橫來大者王小者侯若遂欲為黥布者亦自任也囂終不降於是誅其子恂使吳漢與征南大將軍岑彭圍西城耿弇與虎牙大將軍蓋延圍上邽車駕東歸月餘楊廣死囂窮困其大將王捷別在戎丘登城呼漢軍曰為隗王城守者皆必死無二心願諸軍亟罷請自殺以明之遂自刎頸死數月王元行巡周宗將蜀救兵五千餘人乘高卒至鼓譟大呼曰百萬之衆方至漢軍大驚未及成陳元等決圍殊死戰遂得入城迎囂歸冀會吳漢等食盡退去於是安定北地天水隴西復反為囂九年春囂病且餓出城餐糗糒恚憤而死王元周宗立囂少子純為王明年來歙耿弇蓋延等攻破落門周宗行巡苟宇趙恢等將純降宗恢及諸隗分徙京師以東純與巡宇徙弘農唯王元留為蜀將及輔威將軍臧宮破延岑元舉衆詣宮降元字惠孟初拜上蔡令遷東平相坐墾田不實下獄死牛邯字孺卿狄道人有勇力才氣雄於邊垂及降大司空徒司直杜林太中大夫馬援並薦之以為護羌校尉與來歙平隴右十八年純與賓客數十騎亡入胡至武威捕得誅之論曰隗囂援旗糺族假制明神迹夫創圖首事有以識其風矣終於孤立一隅介于大國隴坻雖隘非有百二之埶區區兩郡以禦堂堂之鋒至使窮廟策竭征徭身歿衆解然後定之則知其道有足懷者所以棲有四方之桀士至投死絕亢而不悔者矣夫功全則譽顯業謝則釁生回成喪而為其議者或未聞焉若囂命會符運敵非天力雖坐論西伯豈多嗤乎公孫述字子陽扶風茂陵人也哀帝時以父任為郎後父仁為河南都尉而述補清水長央仁以述年少遣門下掾隨之官月餘掾辭歸白仁曰述非待教者也後太守以其能使兼攝五縣政事修理姦盜不發郡中謂有鬼神王莽天鳳中為導江卒正居臨邛復有能名及更始立豪傑各起其縣以應漢南陽人宗成自稱虎牙將軍入略漢中又商人王岑亦起兵於雒縣自稱定漢將軍殺王莽庸部牧以應成衆合數萬人述聞之遣使迎成等成等至成都虜掠暴橫述意惡之召縣中豪桀謂曰天下同苦新室思劉氏久矣故聞漢將軍到馳迎道路今百姓無辜而婦子係獲室屋燒燔此寇賊非義兵也吾欲保郡自守以待真主諸卿欲并力者即留不欲者便去豪桀皆叩頭曰願效死述於是使人詐稱漢使者自東方來假述輔漢將軍蜀郡太守兼益州牧印綬乃選精兵千餘人西擊成等比至成都衆數千人遂攻成大破之成將垣副殺成以其衆降二年秋更始遣柱功侯李寶益州刺史張忠將兵萬餘人徇蜀漢述恃其地險衆附有自立志乃使其弟恢於綿竹擊寶忠大破走之由是威震益部功曹李熊說述曰方今四海波蕩匹夫橫議將軍割據千里地什湯武若奮威德以投天𨻶霸王之業成矣宜改名號以鎮百姓述曰吾亦慮之公言起我意於是自立為蜀王都成都蜀地肥饒兵力精強遠方士庶多往歸之邛笮君長皆來貢獻李熊復說述曰今山東飢饉人庶相食兵所屠滅城邑丘墟蜀地沃野千里土壤膏腴果實所生無穀而飽女工之業覆衣天下名材竹幹器械之饒不可勝用又有魚鹽銅銀之利浮水轉漕之便北據漢中杜襃斜之險東守巴郡拒扞關之口地方數千里戰士不下百萬見利則出兵而略地無利則堅守而力農東下漢水以窺秦地南順江流以震荊楊所謂用天因地成功之資今君王之聲聞於天下而名號未定志士狐疑宜即大位使遠人有所依歸述曰帝王有命吾何足以當之熊曰天命無常百姓與能能者當之王何疑焉述夢有人語之曰八𣒅子系十二為期覺謂其妻曰雖貴而祚短若何妻對曰朝聞道夕死尚可況十二乎會有龍出其府殿中夜有光耀述以為符瑞因刻其掌文曰公孫帝建武元年四月遂自立為天子號成家色尚白建元曰龍興元年以李熊為大司徒以其弟光為大司馬恢為大司空改益州為司隸校尉蜀郡為成都尹越巂任貴亦殺王莽大尹而據郡降述遂使將軍侯丹開白水關北守南鄭將軍任滿從閬中下江式東據扞關於是盡有益州之地自更始敗後光武方事山東未遑西伐關中豪桀呂鮪等往往擁衆以萬數莫知所屬多往歸述皆拜為將軍遂大作營壘陳車騎肄習戰射會聚兵甲數十萬人積糧漢中築宮南鄭又造十層赤樓帛蘭船多刻天下牧守印章備置公卿百官使將軍李育程烏將數萬衆出陳倉與呂鮪徇三輔三年征西將軍馮異擊鮪育於陳倉大敗之鮪育奔漢中五年延岑田戎為漢兵所敗皆亡入蜀岑字叔牙南陽人始起據漢中又擁兵關西關西所在破散走至南陽略有數縣戎汝南人初起兵夷陵轉寇郡縣衆數萬人岑戎並與秦豐合豐俱以女妻之及豐敗故二人皆降於述述以岑為大司馬封汝寧王戎翼江王六年述遣戎與將軍任滿出江關下臨沮夷陵閒招其故衆因欲取荊州諸郡竟不能剋是時述廢銅錢置鐵官錢百姓貨幣不行蜀中童謠言曰黃牛白腹五銖當復好事者竊言王莽稱黃述自號白五銖錢漢貨也言天下當并還劉氏述亦好為符命鬼神瑞應之事妄引讖記以為孔子作春秋為赤制而斷十二公明漢至平帝十二代歷數盡也一姓不得再受命又引錄運法曰廢昌帝立公孫括地象曰帝軒轅受命公孫氏握援神契曰西太守乙卯金謂西方太守而乙絕卯金也五德之運黃承赤而白繼黃金據西方為白德而代王氏得其正序又自言手文有奇及得龍興之瑞數移書中國冀以感動衆心帝患之乃與述書曰圖讖言公孫即宣帝也代漢者當塗高君豈高之身邪乃復以掌文為瑞王莽何足效乎君非吾賊臣亂子倉卒時人皆欲為君事耳何足數也君日月已逝妻子弱小當早為定計可以無憂天下神器不可力爭宜留三思署曰公孫皇帝述不荅明年隗囂稱臣於述述騎都尉平陵人荊邯見東方將平兵且西向說述曰兵者帝王之大器古今所不能廢也昔秦失其守豪桀並起漢祖無前人之迹立錐之地起於行陣之中躬自奮擊兵破身困者數矣然軍敗復合創愈復戰何則前死而成功踰於却就於滅亡也隗囂遭遇運會割有雍州兵強士附威加山東遇更始政亂復失天下衆庶引領四方瓦解囂不及此時推危乘勝以爭天命而退欲為西伯之事尊師章句賓友處士偃武息戈卑辭事漢喟然自以文王復出也令漢帝釋關隴之憂專精東伐四分天下而有其三使西州豪傑咸居心於山東發閒使招攜貳則五分而有其四若舉兵天水必至沮潰天水既定則九分而有其八陛下以梁州之地內奉萬乘外給三軍百姓愁困不堪上命將有王氏自潰之變臣之愚計以為宜及天下之望未絕豪傑尚可招誘急以此時發國內精兵令田戎據江陵臨江南之楚倚巫山之固築壘堅守傳檄吳楚長沙以南必隨風而靡令延岑出漢中定三輔天水隴西拱手自服如此海內震搖冀有大利述以問羣臣博士吳柱曰昔武王伐殷先觀兵孟津八百諸侯不期同辭然猶還師以待天命未聞無, krp: 㦸}
