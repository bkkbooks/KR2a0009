  - {type: variant, offset: 400, length: 0, content: '', WYG: 食咎伯竒食夢强梁祖明共食磔死寄生委隨食觀錯斷食巨窮竒騰根共食蠱凡使十二神追惡凶赫女軀拉女幹節觧女肉抽女肺腸女不急去後者為糧東京賦曰捐魑魅斮獝狂斬委蛇腦方良囚耕父於清冷溺女魃於神潢殘䕫魖與罔象殪壄仲而殲㳺光注曰魑魅山澤之神獝狂惡鬼委蛇大如車轂方良草澤神耕父女魃皆旱鬼惡水故囚溺於水中使不能為害䕫魖㒺象木石之怪壄仲㳺光兄弟八人恒在人間作怪害也孔子曰木石之怪􅇪罔兩水之怪龍罔象臣昭曰木石山怪也䕫一足越人謂之山㺐罔兩山精好學人聲而迷惑人龍神物也非所常見故曰怪罔象食人一名沐埤蒼曰獝狂無頭鬼因作方相與十二獸儛嚾呼周徧前後省三過持炬火送疫出端門東京賦曰煌火馳而星流逐赤疫於四裔注曰煌火光逐驚走煌然火光如星馳赤疫疫鬼惡者也侲子合三行從東序上西序下門外騶騎傳炬出宫司馬闕門門外五營騎士傳火棄雒水中東京賦注曰衞士千人在端門外五營千騎在衛士外為三部更送至雒水凡三軰逐鬼投雒水中仍上天池絶其橋梁使不得度還百官官府各以木面獸能為儺人師訖設桃梗鬱儡葦茭畢執事陛者罷山海經曰東海中有度朔山上有大桃樹蟠屈三千里其卑枝門曰東北鬼門萬鬼出入也上有二神人一曰神荼一曰鬱儡主閲領衆鬼之惡害人者執以葦索而用食虎於是黄帝法而象之敺除畢因立桃梗於門户上畫鬱儡持葦索以御凶鬼畫虎於門當食鬼也史記曰東至於蟠木風俗通曰黄帝上古之時有神荼與鬱儡兄弟二人性能執鬼桃梗梗者更也嵗終更始受介祉也蘇秦說孟嘗君曰土偶人語桃梗今子東國之桃木削子為人虎者陽物百獸之長能撃鷙性食鬼魅者也葦㦸桃杖以賜公卿}
