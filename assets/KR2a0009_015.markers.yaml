  - {type: variant, offset: 6248, length: 338, content: 輦出房闥又立其兩子為王食犍為廣漢各數縣羣臣多諫以為成敗未可知戎士暴露而遽王皇子示無大志傷戰士心述不聽唯公孫氏得任事由此大臣皆怨八年帝使諸將攻隗囂述遣李育將萬餘人救囂囂敗并沒其軍蜀地聞之恐動述懼欲安衆心成都郭外有秦時舊倉述改名白帝倉自王莽以來常空述即詐使人言白帝倉出穀如山陵百姓空市里往觀之述乃大會羣臣問曰白帝倉竟出穀乎皆對言無述曰訛言不可信道隗王破者復如此矣俄而囂將王元降述以為將軍明年使元與領軍環安拒河池又遣田戎及大司徒任滿南郡太守程汎將兵下江關破威虜將軍馮駿等拔巫及夷陵夷道因據荊門十一年征南大將軍岑彭攻之滿等大敗述將王政斬滿首降于彭田戎走保江州城邑皆開門降彭遂長驅至武陽帝乃與述書陳言禍福以明丹青之信述省書歎息以示所親太常常少光祿勳張隆隆少皆勸降述曰廢興命也豈有降天子哉, WYG: ''}
