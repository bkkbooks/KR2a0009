  - {type: variant, offset: 1616, length: 1324, content: 為持書楊廣王遵周宗及平襄人行巡阿陽人王捷長陵人王元為大將軍杜陵金丹之屬為賓客由此名震西州聞於山東建武二年大司徒鄧禹西擊赤眉屯雲陽禹裨將馮愔引兵叛禹西向天水囂逆擊破之於高平盡獲輜重於是禹承制遣使持節命囂為西州大將軍得專制涼州朔方事及赤眉去長安欲西上隴囂遣將軍楊廣迎擊破之又追敗之於烏氏涇陽閒囂既有功於漢又受鄧禹爵署其腹心議者多勸通使京師三年囂乃上書詣闕光武素聞其風聲報以殊禮言稱字用敵國之儀所以慰藉之良厚時陳倉人呂鮪擁衆數萬與公孫述通寇三輔囂復遣兵佐征西大將軍馮異擊之走鮪遣使上狀帝報以手書曰慕樂德義思相結納昔文王三分猶服事殷但駑馬鈆刀不可強扶數蒙伯樂一顧之價而蒼蠅之飛不過數步即託驥尾得以絕羣隔於盜賊聲問不數將軍操執款款扶傾救危南距公孫之兵北禦羌胡之亂是以馮異西征得以數千百人躑躅三輔微將軍之助則咸陽已為他人禽矣今關東寇賊往往屯聚志務廣遠多所不暇未能觀兵成都與子陽角力如令子陽到漢中三輔願因將軍兵馬鼓旗相當儻肯如言蒙天之福即智士計功割地之秋也管仲曰生我者父母成我者鮑子自今以後手書相聞勿用傍人解構之言自是恩禮愈篤其後公孫述數出兵漢中遣使以大司空扶安王印綬授囂囂自以與述敵國恥為所臣乃斬其使出兵擊之連破述軍以故蜀兵不復北出時關中將帥數上書言蜀可擊之狀帝以示囂因使討蜀以效其信囂乃遣長史上書盛言三輔單弱劉文伯在邊未宜謀蜀帝知囂欲持兩端不願天下統一於是稍黜其禮正君臣之儀初囂與來歙馬援相善故帝數使歙援奉使往來勸令入朝許以重爵囂不欲東連遣使深持謙辭言無功德須四方平定退伏閭里五年復遣來歙說囂遣子入侍囂聞劉永彭寵皆已破滅乃遣長子恂隨歙詣闕以為胡騎校尉封鐫羌侯而囂將王元王捷常以為天下成敗未可知不願專心內事元遂說囂曰昔更始西都四方響應天下喁喁謂之太平一旦敗壞大王幾無所厝今南有子陽北有文伯江湖海岱王公十數而欲牽儒生之說棄千乘之基羇旅危國以求萬全此循覆車之軌計之不可者也今天水完富士馬最強北收西河上郡東收三輔之地案秦舊迹表𩹉河山元請以一丸泥為大王東封函谷關此萬世一時也若計不及此且畜養士馬據隘自守曠日持久以待四方之變圖王不成其弊猶足以霸要之魚不可脫於淵神龍失埶即還與蚯蚓同囂心然元計雖遣子入質猶負其險欲專方面於是游士長者稍稍去之六年關東悉平帝積苦兵閒以囂子內侍公孫述遠據邊陲乃謂諸將曰且當置此兩子於度外耳因數騰書隴蜀告示禍福囂賓客掾史多文學生每所上事當世士大夫皆諷誦之故帝有所辭荅尤加意焉囂復遣使周游詣闕先到馮異營游為仇家所殺帝遣衞尉銚期持珍寶繒帛賜囂期至鄭被盜亡失財物帝常稱囂長者務欲招之聞而歎曰吾與隗囂事欲不諧使來見殺得賜道亡會公孫述遣兵寇南郡乃詔囂當從天水伐蜀因此欲以潰其心腹囂復上言白水險阻棧閣絕敗又多設支閡帝知其終不為用叵欲討之遂西幸長安遣建威大將軍耿弇等七將軍從隴道伐蜀先使來歙奉璽書喻旨囂疑懼即勒兵使王元據隴坻伐木塞道謀欲殺歙歙得亡歸諸將與囂戰大敗各引退囂因使王元行巡侵三輔征西大將軍馮異征虜將軍祭遵等擊破之囂乃上疏謝曰吏人聞大兵卒至驚恐自救臣囂不能禁止兵有大利不敢廢臣子之節親自追還昔虞舜事父大杖則走小杖則受臣雖不敏敢忘斯義今臣之事在於本朝賜死則死加刑則刑如遂蒙恩更得洗心死骨不朽有司以囂言慢請誅其子恂帝不忍復使來歙至汧賜囂書曰昔柴將軍與韓信書云, WYG: 弧弓撮矢}
