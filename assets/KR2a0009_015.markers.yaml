  - {type: variant, offset: 22, length: 2, content: 成紀, WYG: 為四通之壇於邑北門之外方六尺植黒繪六其神𤣥冥祭之以黒狗子六𤣥酒其清酒搏脯祝齋三日衣𤣥衣祀禮如春以壬癸日為大黒龍一長六丈居中央又為小龍五各長三丈於北方皆北鄉其間相去六尺老者六}
  - {type: variant, offset: 22, length: 2, content: 成紀, krp: 為四通之壇於邑北門之外方六尺植黒繪六其神𤣥冥祭之以黒狗子六𤣥酒其清酒搏脯祝齋三日衣𤣥衣祀禮如春以壬癸日為大黒龍一長六丈居中央又為小龍五各長三丈於北方皆北鄉其間相去六尺老者六}
  - {type: variant, offset: 25, length: 9, content: 也少仕州郡王莽國師, WYG: 皆齋三日衣黒衣而舞之尉亦齋三日服黒衣而立之蝦蟇池皆如春四時皆庚子日令吏民夫婦皆偶處凡求雨大體丈夫欲藏而居女子欲和而樂應龍有翼法言曰象龍之致雨艱矣哉龍乎龍乎新論曰}
