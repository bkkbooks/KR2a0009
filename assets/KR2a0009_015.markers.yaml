  - {type: variant, offset: 38, length: 0, content: '', WYG: 僕射臣鼎尚書臣旭臣乘臣滂臣謨臣詣稽首言伏惟陛下履乾則坤動合隂陽羣臣大小咸以長秋宫未定遵舊依典章表仍聞歴時乃聼令月吉日以宋貴人}
