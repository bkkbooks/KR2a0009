  - {type: variant, offset: 6600, length: 11, content: 元環安安使刺客殺歙述復, WYG: 以作樂崇徳殷薦上帝周官若樂六變則天神皆降可得而禮也宗廟樂虞書所謂琴瑟以詠祖考來假詩云肅雍和鳴先祖是聽食舉樂王制謂天子食舉以樂周官王大食則命奏鍾鼔二曰周頌雅樂典辟雍饗射六宗社稷之樂辟雍饗射孝經所謂移風易俗莫善於樂禮記曰揖讓而治天下者禮樂之謂也社稷詩所謂琴瑟撃鼔以御田祖者也禮記曰夫樂施於金石越於聲音用乎宗廟社稷事乎山川鬼神此之謂也三曰黄門鼔吹天子所以宴樂羣臣詩所謂坎坎鼔我蹲蹲舞我者也其短簫鐃歌軍樂也其傳曰黄帝歧伯所作以建威揚徳風勸士也盖周官所謂王大㨗則}
