  - {type: variant, offset: 6815, length: 448, content: 千餘人以配岑於市橋偽建旗幟鳴鼓挑戰而潛遣奇兵出吳漢軍後襲擊破漢漢墯水緣馬尾得出十一月臧宮軍至咸門述視占書云虜死城下大喜謂漢等當之乃自將數萬人攻漢使延岑拒宮大戰岑三合三勝自旦及日中軍士不得食並疲漢因令壯士突之述兵大亂被刺洞墯馬左右輿入城述以兵屬延岑其夜死明旦岑降吳漢乃夷述妻子盡滅公孫氏并族延岑遂放兵大掠焚述宮室帝聞之怒以譴漢又讓漢副將劉尚曰城降三日吏人從服孩兒老母口以萬數一旦於兵縱火聞之可為酸鼻尚宗室子孫嘗更吏職何忍行此仰視天俯視地觀放麑啜羹二者孰仁良失斬將弔人之義也初常少張隆勸述降不從並以憂死帝下詔追贈少為太常隆為光祿勳以禮改葬之其忠節志義之士並蒙旌顯程烏李育以有才幹皆擢用之於是西土咸悅莫不歸心焉論曰昔趙佗自王番禺公孫亦竊帝蜀漢推其無他功能而至於後亡者將以地邊處遠非王化之所先乎述雖為漢吏無所馮資徒以文俗自憙遂能集其志計道未足而意有餘不能因𨻶立功以榆吇隉方乃坐飾邊幅以高深自安昔吳起所以慙魏侯也及其謝臣屬審廢興之命與夫泥首銜玉者異日談也贊曰公孫習吏隗王得士漢命已還二隅方跱天數有違江山難恃, WYG: ''}
