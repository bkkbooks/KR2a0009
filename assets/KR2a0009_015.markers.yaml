  - {type: variant, offset: 744, length: 368, content: 下貪賄莫相檢考民坐挾銅炭沒入鍾官徒隸殷積數十萬入工匠飢死長安皆臭既亂諸夏狂心益悖北攻強胡南擾勁越西侵羌戎東摘濊貊使四境之外並入為害緣邊之郡江海之瀕滌地無類故攻戰之所敗苛法之所陷飢饉之所夭疾疫之所及以萬萬計其死者則露屍不掩生者則奔亡流散幼孤婦女流離係虜此其逆人之大罪也馬董忠國師劉歆衞將軍王涉皆結謀內潰司命孔仁納言嚴尤秩宗陳茂舉衆外降今山東之兵二百餘萬已平齊楚下蜀漢定宛洛據敖倉守函谷威命四布宣風中岳興滅繼絕封定萬國遵高祖之舊制修孝文之遺德有不從命武軍平之馳使四夷復其爵號然後還師振旅櫜弓臥鼓申命百姓各安其所庶無負子之責囂乃勒兵十萬擊殺雍州牧陳慶將攻安定安定大尹王向莽從弟平阿侯譚之子也威風獨能行其邦內屬縣皆無叛者囂乃移書於向喻以天命反覆誨示終不從於是進兵虜之以徇百姓然後行戮安定悉降而長安中亦起兵誅王莽囂遂分遣諸將徇隴西武都金城武威張掖, WYG: 食賜羣臣}
