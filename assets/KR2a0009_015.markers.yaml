  - {type: variant, offset: 5, length: 0, content: '', WYG: 五梁剡令劉昭補幷注禮儀志第五禮儀中立夏桃印請雨黄郊拜皇太子劉拜王公立秋貙案戸祠星土牛立冬士冬至㑹臘遣衛朝大儺立夏之日夜漏未盡五刻京都百官皆衣赤至季夏衣黄郊其禮祠特祭竈自立春至立夏盡立秋郡國上雨澤若少府郡縣各掃除社稷其旱也公卿官長以次行雩禮求雨公羊傳曰大雩旱祭也何休注曰君親之南郊以六事謝過自責曰政不善與民失職與宫室崇與婦謁盛與苞苴行與䜛夫倡與使童男女各八人舞而呼雩故謂之雩春秋繁露曰大旱雩祭而請雨大水鳴鼓而攻社天地之所為隂陽之所起也或請焉或怒焉何如也曰大旱陽滅隂也陽滅隂者尊厭卑也固其義也雖大甚拜請之而已敢有加也大水者隂滅陽也隂滅陽者卑勝尊也以賤陵貴者逆節故鳴鼔而攻之朱絲而脅之為其不義此亦春秋之不畏强禦也變天地之位正隂陽之序貞行其道而不忘其難義之至也又仲舒奏江都王云求雨之方損陽益隂願大王無收廣陵女子為人祝者一月租賜諸巫者諸巫母大小皆相聚於郭門為小壇以脯酒祭女獨擇寛大便處移市市使無内丈夫丈夫無得相從飲食令吏妻各往視其夫皆到即起雨注而已服䖍注左傳曰大雩夏祭天名雩逺也逺為百糓求膏雨也龍見而雩龍角亢也謂四月昬龍星體見萬物始盛待雨而大故雩祭以求雨也一説大雩者祭於帝而祈雨也一説郊祀天祈農事雩祭山川而祈雨也漢舊儀求雨太常禱天地宗廟社稷山川以賽各如其常牢禮也四月立夏旱乃求雨禱雨而已後旱復重禱而已訖立秋雖旱不得禱求雨也閉諸陽衣皂興土龍山海經曰大荒東北隅有山名曰凶犂土丘應龍處南極殺蚩尤與夸父不得復上故下數旱旱而為應龍之狀乃得大雨郭璞曰今之土龍本此氣應自然㝠感非人所能為也董仲舒云春旱求雨令縣邑以水日令民禱社稷家人祠戸毋伐名木毋斬山林暴巫聚蛇八日於邑東門之外為四通之壇方八尺植蒼繒八其神共工祭之以生魚八𤣥酒具清酒摶脯擇巫之潔清辯口利辭者以為祝祝齋}
