  - {type: variant, offset: 57, length: 0, content: '', WYG: 言氣相更也漢兼用之故以五月五日朱索五色印為門户飾以難止惡氣桃印本漢制所以輔卯金魏除之也日夏至禁舉大火止炭鼓鑄消石冶皆絶止至立秋如故事是日浚井改水日冬至鑚燧改火云先立秋十八日郊黄帝是日夜漏未盡五刻京都百官皆衣黄至立秋迎氣於黄郊樂奏黄鍾之宫歌帝臨冕而執干戚舞雲翹育命所以養時訓也立秋之日夜漏未盡五刻京都百官皆衣白施皂領緣中衣迎氣於白郊禮畢皆衣絳至立冬立秋之日自郊禮畢}
