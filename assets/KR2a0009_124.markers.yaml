  - {type: variant, offset: 1017, length: 453, content: 卿號故置大司馬官號以冠之其後霍光王鳳等皆然成帝綏和元年賜大司馬印綬罷將軍官世祖中興吳漢以大將軍為大司馬景丹為驃騎大將軍位在公下及前後左右雜號將軍衆多皆主征伐事訖皆罷明帝初即位以弟東平王蒼有賢才以為驃騎將軍以王故位在公上數年後罷章帝即位西羌反故以舅馬防行車騎將軍征之還後罷和帝即位以舅竇憲為車騎將軍征匈奴位在公下還復有功遷大將軍位在公上復征西羌還免官罷安帝即位西羌寇亂復以舅鄧騭為車騎將軍征之還遷大將軍位如憲數年復罷自安帝政治衰缺始以嫡舅耿寶為大將軍常在京都順帝即位又以皇后父兄弟相繼為大將軍如三公焉長史司馬皆一人千石本注曰司馬主兵如太尉從事中郎二人六百石本注曰職參謀議掾屬二十九人令史及御屬三十一人本注曰此皆府員職也又賜官騎三十人及鼓吹其領軍皆有部曲大將軍營五部部校尉一人比二千石軍司馬一人比千石部下有曲曲有軍候一人比六百石曲下有純屯純屯長一人比二百石其不置校尉部但軍司馬一人又有軍假司馬假候皆為副貳其別營領屬為別部司馬其兵多少各隨時宜門有門候其餘將軍置以征伐無員職亦有部曲司馬軍候以領兵其職吏部集各一人總, WYG: 慚㒺}
