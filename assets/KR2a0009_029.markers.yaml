  - {type: variant, offset: 207, length: 182, content: 拜大司徒司直所得祿奉輒以收養親族其孤弱者分與田地自無擔石之儲六年卒於官帝敏惜之除子彪為郎張湛字子孝扶風平陵人也矜嚴好禮動止有則居處幽室必自修整雖遇妻子若嚴君焉及在鄉黨詳言正色三輔以為儀表人或謂湛偽詐湛聞而笑曰我誠詐也人皆詐惡我獨詐善不亦可乎成哀閒為二千石王莽時歷太守都尉建武初為左馮翊在郡修典禮設條教政化大行後告歸平陵望寺門而步主簿進曰明府位尊德重不宜自輕湛曰禮下, WYG: 多訛晉文}
