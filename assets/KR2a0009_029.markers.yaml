  - {type: variant, offset: 29, length: 0, content: '', krp: 河東扶風𢎞農漢書地理志記天下郡縣本末及山川竒異風俗所由至矣今但錄中興以來郡縣改異及春秋三史㑹同征伐地名臣昭案志猶有遺闕今衆書所載不可悉記其春秋土地通儒所據而未備者皆先列焉以為郡國志本志唯郡縣名為大書其山川地名悉為細注今進為大字新注證發臣劉昭采集凡前志有縣名今所不載者皆世祖所并省也前無今有者後所置也凡縣名先書者郡所治也帝王世紀曰自天地設闢未有經界之制三皇尚矣諸子稱神農之王天下也地東西九十萬里南北八十五萬里及黄帝受命始作舟車以濟不通乃推分星次以定律度自斗十一度至婺女七度一名須女曰星紀之次於辰在丑謂之赤奮若於律為黄鍾斗建在子今吳越分野自婺女八度至危十六度曰𤣥枵之次一名天黿於辰在子謂之困敦於律為大吕斗建在丑今齊分野自危十七度至奎四度曰豕韋之次一名娵訾於辰在亥謂之大淵獻於律為太蔟斗建在寅今衞分野自奎五度至胃六度曰降婁之次於辰在戌謂之閹茂於律為夾鍾斗建在卯今魯分野自胃七度至畢十一度曰大梁之次於辰在酉謂之作噩於律為姑洗斗建在辰今趙分野自畢十二度至東井十五度曰實沈之次於辰在申謂之涒灘於律為中吕斗建在已今晉魏分野自井十六度至栁八度曰鶉首之次於辰在未謂之協洽於律為蕤賔斗建在午今秦分野自栁九度至張十七度曰鶉火之次於辰在午謂之敦牂一名大律於律為林鍾斗建在未今周分野自張十八度至軫十一度曰鶉尾之次於辰在已謂之大荒落於律為夷則斗建在申今楚分野自軫十二度至氐四度曰夀星之次於辰在辰謂之執徐於律為南吕斗建在酉今韓分野自氐五度至尾九度曰大火之次於辰在卯謂之單閼於律為無射斗建在戌今宋分野自尾十度至斗七度百三十五分而終曰析木之次於辰在寅謂之攝提格於律為應鍾斗建在亥今燕分野凡天有十二次日月之所躔也地有十二分王侯之所國也故四方方七宿四七二十八宿合一百八十二星東方蒼龍三十二星七十五度北方𤣥武三十五星九十八度四分度之一西方白虎五十一星八十度南方朱雀六十四星百一十二度周天三百六十五度四分度之一一度二千九百三十三里分為十二次一次三十度三十二分度之十四各以附其七宿間距周天積百七萬九百一十三里徑三十五萬六千九百七十一里陽道左行故太嵗右轉凡中外官常明者百二十四可名者三百二十合二千五百星微星之數凡萬一千五百二十星萬物所受咸系命焉此黄帝創制之大略也而佗説稱日月所照三十五萬里考諸子所載神農之地過日月之表近為虚誕及少昊氏之衰九黎亂徳其制無聞矣洎顓頊之所建帝嚳受定則孔子稱其地北至幽陵南暨交趾西蹈流沙東極蟠木日月所照莫不底焉是以建萬國而制九州至堯遭洪水分為十二州今虞書是也及禹平水土還為九州今禹貢是也是以其時九州之地凡二千四百三十萬八千二十四頃定墾者九百三十萬六千二十四頃不墾者千五百萬二千頃民口千三百五十五萬三千九百二十三人至於塗山之㑹諸侯承唐虞之盛執玉帛亦有萬國是以山海經稱禹使大章步自東極至於西垂二億三萬三千三百里七十一步又使豎亥步南極北盡於北垂二億三萬三千五百里七十五步四海之内則東西二萬八千里南北二萬六千里出水者八千里受水者八千里名山五千三百五十經六萬四千五十六里出銅之山四百六十七出鐵之山三千六百九以供財用儉則有餘奢則不足以男女耕織不奪其時故公家有三十年之積私家有九年之儲及夏之衰棄稷弗務有窮之亂少康中興乃復禹迹孔甲之至桀行暴諸侯相兼逮湯受命其能存者三千餘國方於塗山十損其七民離毒政將亦如之殷因於夏六百餘載其間損益書策不存無以考之又遭紂亂至周克商制五等之封凡千七百七十三國又減湯時千三百矣民衆之損將亦如之及周公相成王致治刑錯民口千三百七十一萬四千九百二十三人多禹十六萬一千人周之極盛也其後七十餘嵗天下無事民彌以息及昭王南征不反穆王失荒加以幽厲之亂平王東遷三十餘載至齊桓公二年周莊王之十三年五千里内非天王九嬪之御自世子公侯以下至於庶民凡千百八十四萬七千人除有土老疾定受田者九百萬四千人其後諸侯相并當春秋時尚有千二百國二百四十二年之中殺君三十六亡國五十二諸侯奔走不得保社稷者不可勝數至于戰國存者十餘於是縱横短長之説相奪於時殘民詐力之兵動以萬計故崤有匹馬之禍宋有易子之急晉陽之圍縣釜而炊長平之戰血流漂鹵周之列國唯有燕衞秦楚而已齊及三晉皆以簒亂南面稱王衞雖得存不絶若綫然考蘇張之説計秦及山東六國戎卒尚存五百餘萬推民口數尚當千餘萬及秦兼諸侯置三十六郡其所殺傷三分居二猶以餘力行參夷之刑収大半之賦北築長城四十餘萬南戍五嶺五十餘萬阿房驪山七十餘萬十餘年間百姓死没相踵於路陳項又肆其餘烈故新安之坑二十餘萬彭城之戰睢水不流至漢祖定天下民之死傷亦數百萬是以平城之卒不過三十萬方之六國五損其二自孝惠至文景與民休息六十餘嵗民衆大増是以太倉有不食之粟都内有朽貫之錢武帝承其資畜軍征三十餘嵗地廣萬里天下之衆亦減半矣及霍光秉政乃務省役至于孝平六世相承雖時征行不足大害民户又息元始二年郡國百三縣邑千四百八十七地東西九千三百二里南北萬三千三百六十八里定墾田八百二十七萬五百三十六頃民户千三百二十三萬三千六百一十二口五千九百一十九萬四千九百七十八人多周成王四千五百四十八萬五十五人漢之極盛也及王莽簒位續以更始赤眉之亂至光武中興百姓虚耗十有二存中元二年民户四百二十七萬千六百三十四口二千一百萬七千八百二十人永平建初之際天下無事務在養民迄于孝和民户滋殖及孝安永初元初之間兵饑之苦民人復損至于孝桓頗增於前永夀二年二千六百七萬九百六口五千六萬六千八百五十六人墾田亦多單師屢征及靈帝遭黄巾獻帝即位而董卓興亂大焚宫廟劫御西遷京師蕭條豪傑並爭郭汜李傕之屬殘害又甚是以興平建安之際海内凶荒天子奔流白骨盈野故陜津之難以箕撮指安邑之東后裳不完遂有㓂戎雄雌未定割剝庶民三十餘年及魏武皇帝尅平天下文帝受禪人衆之損萬有一存景元四年與蜀通計民戸九十四萬三千四百二十三口五百三十七萬二千八百九十一人又案正始五年揚威將軍朱照日所上吳之所領兵户九十三萬二千推其民數不能多蜀矣昔漢永和五年南陽户五十餘萬汝南户四十餘萬方之於今三帝鼎足不踰二郡加有食祿復除之民凶年饑疾之難見可供役裁若一郡以一郡之人供三帝之用斯亦勤矣自禹至今二千餘載六代損益備於兹焉臣昭案謐記云春秋時有千二百國未知所出班固云周之始爵五而土三葢千八百國轉相吞滅數百年間列國耗盡至春秋時尚有數十河南尹秦三川郡髙帝更名世祖都雒陽建武十五年改曰河南尹應劭漢官曰尹正也郡府聽事壁諸尹畫贊肇自建武訖于陽嘉注其清濁進退所謂不隱過不虚譽甚得述事之實後人是瞻足以勸懼雖春秋采毫毛之善貶纎介之惡不避王公無以過此尤著明也二十一城永和五年户二十萬八千四百八十六口百一萬八百二十七雒陽摯虞曰古之周南今之雒陽魏氏春秋曰有委粟山在陰鄉魏時營為圓丘皇覽曰縣東北山萇𢎞冢縣北芒山道西吕不韋冢周時號成周公羊傳曰成周者何東周也何休曰周道始成王之所都也帝王世紀曰城東西六里十一步南北九里一百步晉元康地道記曰城内南北九里七十步東西六里十步為地三百頃一十二畝有三十六步城東北隅周威烈王冢有狄泉在城中左傳僖二十九年盟于狄泉杜預曰城内太倉西南池水或曰本在城外定元年城成周乃繞之案此水晉時在東宫西北帝王世紀曰狄泉本殷之墓地在成周東北今城中有殷王冢是也又太倉中大冢周景王也有唐聚左傳昭二十三年尹辛敗劉師于唐有上程聚古程國史記曰重黎之後伯休甫之國也關中更有程地帝王世紀曰文王居程徙都豐故此加為上程有士鄉聚馮異斬武勃地有褚氏聚左傳昭二十六年王宿褚氏杜預曰縣南有褚氏亭有榮錡澗左傳周景王崩于榮錡氏杜預曰鞏縣西有前亭杜預曰縣西南有泉亭即泉城也有圉鄉左傳昭二十二年單氏伐東圉杜預曰縣東南有圉鄉又西南有戎城伊雒之戎有大解城左傳昭二十三年晉師次于解杜預曰縣西南有大解小解河南帝王世紀曰城西有郟鄏陌太康畋于有雒之表今河之南本傳有員犢山周公時所城雒邑也春秋時謂之王城鄭𤣥詩譜曰周公攝政五年成王宅雒邑使召公先相宅既成謂之王城博物記曰王城方七百二十丈郛方一十里南望雒水北至陜山地道記曰去雒城四十里左傳定八年單子伐穀城杜預曰在縣西東城門名鼎門帝王世紀曰東南門九鼎所從入又曰武王定鼎雒陽西南雒水九鼎中觀是也北城門名乾祭左傳昭二十四年士伯立於乾祭皇覽曰城西南柏亭西周山上周靈王冢民祠之不絶又有甘城杜預曰縣西南有甘泉有蒯鄉左傳昭二十三年尹辛攻蒯晉地道記曰在縣西南有蒯亭梁故國伯翳後有陽人聚史記曰秦滅東周不絶其祀以陽人地有霍陽山左傳哀四年楚為一昔之期襲梁及霍有注城史記曰魏文侯四十二年敗秦于注博物記曰梁伯好土功今梁多有城滎陽有鴻溝水文穎曰於滎陽下引河東南為鴻溝即官渡水也有廣武城西征記曰有三皇山或謂三室山山上有二城東者曰東廣武西者曰西廣武各在山一頭相去二百餘步其間隔深澗漢祖與項籍語處有虢亭虢叔國有隴城左傳文二年盟于垂隴有薄亭有敖亭周宣王狩于敖左傳宣十二年晉師在敖鄗之間秦立為敖倉有費澤左傳宣十二年楚潘黨逐魏錡及滎杜預曰縣東滎澤也卷左傳成十年晉鄭盟修澤杜預曰縣東有修武亭有長城經陽武到密史記蘇秦說襄王曰大王之地西有長城之界有垣雝城或曰古衡雍史記無忌謂魏王曰王有鄭地得垣雍者也杜預曰即是衡雍又今縣所治城有扈城亭左傳莊二十三年盟于扈杜預曰在縣西北原武陽武有武彊城史記曰曹參攻武彊秦始皇東逰至陽武博浪沙中為盜所驚中牟左傳宣元年諸侯救鄭遇于北林杜預曰縣西南有林亭在鄭北有圃田澤左傳曰原圃爾雅十藪鄭有圃田有清口水左傳閔二年遇于清杜預曰縣有清陽亭有管城杜預曰管國也在京縣東北漢書音義曰故管叔邑有曲遇聚前書曹參破楊熊有蔡亭開封左傳哀十四年逢澤有介麋杜預曰在縣東北逺疑非徐廣曰逢池也苑陵有棐林左傳宣元年諸侯㑹于棐林杜預曰縣東有林鄉徐齊民北征記曰縣東南有大隧澗鄭莊公所闕又大城東臨濮水水東溱水注于洧城西臨洧水有制澤左傳宣十年諸侯遷於制田杜預曰縣東有制城有瑣侯亭左傳襄十一年諸侯之師次于瑣杜預曰縣西有瑣侯亭平陰穀城瀍水出博物記曰出潛亭山有函谷關西征記曰函谷左右絶岸十丈中容車而已緱氏左傳曰吕相絶秦伯殄滅我費滑杜預曰滑國都於費今緱氏縣案本紀縣有百坏山干寳搜神記曰縣有延夀亭有鄔聚左傳王取鄔劉杜預曰鄔在縣西南有轘轅關瓚曰險道名在縣東南鞏鞏伯國左傳曰商湯有景亳之命杜預曰縣西南有湯亭帝王世紀曰湯亭偃師又曰夏太康五弟須于雒汭在縣東北三十里有尋谷水左傳昭二十三年王師晉師圍鄩中史記曰張儀下兵三川塞什谷之口徐廣曰縣有尋口有東訾聚今名訾城左傳昭二十三年單子取訾杜預曰在縣西南晉地道記曰在縣之東有坎塪聚左氏周襄王出國人納之坎塪杜預曰在縣東地道記在南有黄亭有湟水左傳昭二十三年王子猛居于湟杜預曰有黄亭在縣西北有明谿泉左傳昭二十三年賈辛軍于溪泉成臯史記曰成臯北門名玉門左傳破燕師于北制杜預曰北制一名虎牢亦即此縣也穆天子傳曰七萃之士生搏虎而獻天子命為柙而畜之東虢是曰虎牢左傳曰鄭子皮勞晉韓宣子于索氏杜預曰縣東有大索城尚書禹貢至于大岯張楫云成臯縣山又有旋門坂縣西南十里見東京賦有旃然水左傳襄十八年楚伐鄭次旃然有瓶丘聚有漫水有汜水左傳曰周襄王處鄭地汜京鄭共叔所居左傳云謂之京城大叔應劭曰有索亭楚漢戰京索北征記又有索水密春秋時曰新城傳曰新密僖六年諸侯圍新城杜預曰一名密縣有大騩山山海經曰大騩之山其隂多鐵多美堊有草焉狀如蓍而毛青華而白實其名曰􅚄服者不夭有梅山左傳曰襄十八年楚伐鄭右廻梅山在縣西北有陘山史記魏襄王六年伐楚敗之陘山秦破魏華陽地亦在縣杜預遺令曰山上有冢或曰子産邪東北向新鄭城不忘本也新城左傳曰文十七年周敗戎于􅀈垂杜預曰縣北有垂亭史記秦遷西周公於􅓆狐徐廣曰與陽人聚相近在雒陽南百五十里梁新城之間有髙都城史記蘇代説韓相國以髙都與周者有廣成聚有廣成苑有鄤聚古鄤氏今名蠻中左傳昭十六年楚殺鄤子杜預曰縣東南有蠻城又祭遵獲張滿也匽師帝王世紀曰帝嚳所都殷盤庚復南亳是為西亳皇覽曰北有臯繇祠又曰有湯亭有湯祠有尸鄉帝王世紀曰尸鄉在縣西二十里春秋時曰尸氏左傳昭二十六年劉人敗子朝之師于尸氏前書田横自殺處新鄭詩鄭國祝融墟皇甫謐曰古有鄭國黄帝之所都平河内郡髙帝置雒陽北百二十里十八城户十五萬九千七百七十口八十萬一千五百五十八懷有隰城左傳曰王取鄭隰城杜預曰在縣西南傳又曰郤至與周爭鄇田杜預曰縣西南有鄇人亭河陽左傳曰王與鄭盟杜預曰縣南孟津有湛城軹左傳曰王以蘇忿生田向與鄭杜預曰縣西北地名向上有原鄉左傳曰王與鄭原杜預曰沁水西北有原城有溴梁左傳曰襄十六年諸侯㑹溴梁波有絺城左傳曰王與鄭絺杜預曰在野王縣西南沁水山海經曰沁水出井陘東野王有太行山山海經曰其上有金玉下有碧有獸焉其狀如麋而四角馬尾而有距其名曰驒還酈食其説曰杜太行之道韋昭曰在縣北有射犬聚世祖破青犢也有邘城史記曰紂以文王九侯鄂侯為三公徐廣曰鄂一作邘武王子封在縣西北溫蘇子所都濟水出王莽時大旱遂枯絶皇覽曰縣郭東濟水南有虢公冢州平臯有邢丘故邢國周公子所封臣瓚曰丘名也非國在襄國西有李城史記曰邯鄲李同却秦兵趙封其父李侯徐廣曰即此城山陽邑有雍城杜預曰古雍國在縣西有蔡城蔡叔邑此猶鄭管城之類乎武徳獲嘉侯國脩武故南陽秦始皇更名有南陽城左傳僖四年晉文公圍南陽史記曰白起攻韓南陽太行道絶之山海經曰太行之山清水出焉郭璞曰脩武縣北黒山亦出清水陽樊攒茅田服䖍曰樊仲山之所居故名陽樊杜預曰縣西北有攢城左傳曰定元年魏獻子田大陸杜預曰西北吳澤也有小脩武聚春秋曰甯史記曰髙祖得韓信軍小脩武晉灼曰在城東有隤城左傳隱十一年以隤與鄭共本國淇水出前志注曰水出北山博物記曰有奥水流入淇水有緑竹草有汎亭凡伯邑汲晉地道記曰有銅關朝歌有鹿腹山紂所都居帝王世紀曰紂糟丘酒池肉林在城西前書注曰鹿臺在城中南有牧野去縣十七里北有邶國南有寧鄉史記無忌説魏安釐王曰通韓上黨於共甯徐廣曰有寧鄉左傳曰襄二十三年救晉次雍榆杜預曰縣東有雍城是也蕩陰有羑里城韋昭曰羑音酉文王所拘處林慮故隆慮殤帝改有鐵徐廣曰洹水所出蘇秦合諸侯盟處班叔皮逰居賦亦曰潄余馬乎洹泉嗟西伯於牖城河東郡秦置雒陽西北五百里博物記曰有山澤近鹽沃土之民不才漢興少有名人大衣冠三世皆衰絶也二十城户九萬三千五百四十三口五十七萬八百三安邑帝王世紀曰縣西有鳴條陌湯伐桀戰昆吾亭左傳昆吾與桀同日亡地道記咸山在南有鐵有鹽池前志曰池在縣西南魏都賦注曰在猗氏六十四里楊佺期雒陽記曰河東鹽池長七十里廣七里水氣紫色有别御鹽四面刻如印齒文章字妙不可述楊有髙梁亭左傳曰僖九年晉懷公死髙梁杜預曰在縣西南地道記有梁城去縣五十里叔嚮邑也平陽侯國左傳曰成七年諸侯盟馬陵杜預曰衞地也平陽東南地名馬陵又説在魏郡元城有鐵堯都此晉地道記曰有堯城臨汾博物記曰有賈鄉賈伯邑有董亭左傳曰晉改蒐于董杜預曰縣有董亭汾陰博物記曰古之綸少康邑有介山縣西北有狐谷亭郭璞爾雅注曰縣有水口如車輪許濆沸涌出其深無限名之為瀵蒲坂有雷首山史記曰趙盾田首山息桑下有餓人示眯明縣南二十里有歴山舜所耕處又伯夷叔齊隱於首陽山馬融曰在蒲坂華山之北河曲之中有沙丘亭左傳曰文十二年秦晉戰河曲杜預曰在縣南湯伐桀孔安國曰河曲之南大陽有吳山上有虞城杜預曰虞國也帝王世紀曰舜嬪于虞虞城是也亦謂吳城史記秦昭王伐魏取吳城即此城也皇覽曰盜跖冢臨河博物記曰傅巖在縣北有下陽城虢邑左傳僖二年虞晉所滅縣東北三十里有茅津左傳曰秦伐晉遂自茅津濟杜預曰在縣西南有茅亭即茅城有顛軨坂左傳曰入自顛軨博物記曰在縣鹽池東吳城之北今之吳坂杜預曰在縣東北解左傳曰咎犯與秦晉大夫盟於郇杜預曰縣西北有郇城博物記曰有智邑有桑泉城左傳僖二十四年晉文公入桑泉杜預曰在縣西二十里有臼城左傳曰晉文公入取臼衰者也杜預曰在縣東南博物記曰臼季邑縣西北卑耳山縣西南齊桓公西伐所登有解城左傳僖十五年晉侯賂秦伯及解梁城有瑕城左傳文十二年秦侵晉及瑕杜預曰猗氏縣東北有瑕城皮氏有耿鄉尚書祖乙徙耿左傳閔元年晉滅耿杜預曰縣東南有耿鄉博物記曰有耿城有鐵有冀亭左傳僖二年晉荀息曰冀為不道杜預曰國在縣東北史記蘇代説燕王曰下南陽封冀聞喜邑博物記曰縣治涑之川史記曰伐韓到乾河郭璞曰縣東北有乾河口但有故溝處無復水左傳曰僖三十一年晉蒐清源杜預曰在縣北本曲沃曲沃在縣東北數里與晉相去六七百里見毛詩譜注有董池陂古董澤左傳曰改蒐于董董澤之蒲有稷山亭縣西五十里左傳曰宣十五年晉侯治兵于稷有涑水左傳吕相絶秦曰伐我涑川有洮水絳邑縣西有絳邑城杜預曰古絳也有翼城左傳隱五年曲沃伐翼杜預曰在縣東八十里永安故彘史記曰周穆王封造父趙城徐廣曰在永安博物記曰有吕鄉吕甥邑也陽嘉三年更名杜預曰縣東北有彘城有霍大山爾雅曰西南之美者有霍山之多珠玉焉左傳曰閔元年晉滅霍杜預曰縣東北有霍大山史記曰原過受神人書稱余霍大山山陽侯天吏也又蜚亷於山得石棺仍葬也河北詩魏國有韓亭猗氏地道記曰左傳文十三年詹嘉處瑕在縣東北垣有王屋山兗水出史記曰魏武侯二年城王垣博物記曰山在東狀如垣有壺丘亭左傳襄元年晉討宋五大夫寘諸瓠丘杜預曰縣東南有壺丘亭有邵亭博物記曰縣東九十里有郫邵之阨賈季迎公子樂于陳趙孟殺諸郫邵襄陵晉地道記曰晉武公曲沃徙此北屈左傳曰二屈杜預曰二當為北傳曰屈産之乗有駿馬有壺口山禹貢曰壺口治梁及岐有采桑津左傳僖八年晉敗狄于采桑杜預曰縣西南有采桑津蒲子左傳曰晉文公居蒲城杜預曰今蒲子縣濩澤侯國有析城山前志曰在縣西南端氏史記曰趙韓魏分晉封晉端氏𢎞農郡武帝置其二縣建武十五年屬雒陽西南四百五十里九城户四萬六千八百一十五口十九萬九千一百一十三𢎞農故秦函谷關左傳曰虢公敗戎于桑田杜預曰在縣東北桑田亭燭水出前志出衡山嶺下谷有枯樅山本傳赤眉立盆子於鄭北古今注曰在此山下有桃丘聚故桃林左傳曰守桃林之塞博物記曰在湖縣休與之山有務鄉赤眉破季松處有曹陽亭史記曰章邯殺周章于曹陽晉灼曰縣東十三里又獻帝東歸敗處曹公改曰好陽陜史記曰自陜以西召公主之自陜以東周公主之本虢仲國杜預曰虢都上陽在縣東有虢城有焦城故焦國史記曰武王封神農之後於焦有陜陌博物記二伯所分黽池穀水出前志曰出穀陽谷有二崤新安澗水出博物記曰西漢水出新安入雒又有孝水見潘岳西征賦宜陽有金門山山竹為律管陸渾西有虢略地左傳僖十五年晉侯賂秦東盡虢畧杜預曰從河曲南行而東盡故虢盧氏有熊耳山山海經曰其上多漆其下多㯶浮豪之水出焉西北流注于雒其中多美玉多人魚伊水清水出晉地道記伊東北入雒湖故屬京兆前志有鼎湖有闅鄉皇覽曰戾太子南出葬在闅鄉南秦又改曰寧秦華陰故屬京兆史記曰魏文侯三十六年齊侵陰晉前志曰髙帝改曰華隂吕氏春秋九藪云秦之華陽髙誘曰或在華隂西誘又曰桃林縣西長城是也晉地道記曰潼關是也有太華山左傳晉賂秦南及華山山海經曰太華之山削成而四方其髙五千仞其廣十里鳥獸奠居有蛇焉名曰肥􅀢六足四翼見則天下大旱武王放馬牛於桃林墟孔安國曰在華山東晉地道記山在縣西南京兆尹秦内史武帝改其四縣建武十五年屬雒陽西九百五十里決錄注曰京大也天子曰兆民十城户五萬三千二百九十九口二十八萬五千五百七十四長安髙帝所都漢舊儀曰長安城方亦十三里經緯各長十五里十三城門九百七十三頃城中皆屬長安令辛氏三秦記曰長安地皆黒壤城中今赤如火堅如石父老所傳盡鑿龍首山為城皇覽曰衞思后葬城東南桐松園今千人聚是鎬在上林苑中孟康曰長安西南有鎬池秦始皇江神反璧曰為吾遺鎬池君古史考曰武王遷鎬長安豐亭鎬池也皇覽曰文王周公冢皆在鎬聚東杜中有細栁聚前書周亞夫所屯處有蘭池史記曰秦始皇微行夜出逢盜蘭池三秦記曰始皇引渭水為長池東西二百里南北三十里刻石為鯨魚二百丈有曲郵前書髙帝征黥布張良送至曲郵有杜郵史記曰白起死處三秦記曰長安城西有九嵕山西有杜山杜預曰畢國在西北霸陵有枳道亭前書秦王子嬰降於軹道旁地道記曰霸水西有長門亭前書文帝出長門若見五人於道北立五帝壇杜陵杜預曰古唐杜氏也酆在西南杜預曰在鄠縣東決錄注曰鎬在酆水東酆在鎬水西相去二十五里鄭史記殺商君鄭黽池鄭桓公封於此黄圖云下邽縣并鄭桓帝西廵復之新豐有驪山杜預曰古驪戎國韋昭曰戎來居此山故號驪戎三秦記曰始皇墓在山北有始皇祠不齋戒往即疾風暴雨人理欲上則杳㝠失道縣西有白鹿原周平王時白鹿出案關中圖縣南有新豐原白鹿在霸陵東有鴻門亭前書髙帝見項羽處孟康曰在縣東七十里舊大道北下坂口名關中記曰始皇陵北十餘里有謝聚及戲亭周幽王死處蘇林曰縣東南四十里有嚴城藍田出美玉三秦記曰有川方三十里其水北流出玉銅鐵石地道記有虎候山長陵故屬馮翊蔡邕作樊陵頌云前漢户五萬口有十七萬王莽後十不存一永初元年羌戎作虐至光和領户不盈四千園陵蕃衞粢盛之供百役出焉民用匱乏不堪其事商故屬𢎞農帝王世紀曰契所封也左傳哀四年將通於少習杜預曰少習縣東之武關上雒侯國有冢領山雒水出故屬𢎞農山海經曰雒水出䕶舉之山案史記云雒水出熊耳山海經曰雒出王城南至相谷西東北流去虎牢城西四十里注河口謂之雒汭有莵和山左傳哀四年楚司馬軍于莵和有蒼野聚左傳曰昭四年楚左師軍蒼野杜預曰在縣南陽陵故屬馮翊左馮翊秦屬内史武帝分改名雒陽西六百八十八里決錄注曰馮馮也翊明也十三城户三萬七千九十口十四萬五千一百九十五潘岳關中記曰三輔舊治長安城中長吏各在其縣治民光武東都之後扶風出治槐里馮翊出治髙陵髙陵池陽爾雅十藪周有焦穫郭璞曰縣瓠中是也地道記有嶻嶭山在北有鬼谷生三所氏案史記鬼谷在潁川陽城與地記不同}
