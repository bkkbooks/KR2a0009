  - {type: variant, offset: 407, length: 539, content: 所宜盡禮何謂輕哉五年拜光祿勳光武臨朝或有惰容湛輒陳諫其失常乘白馬帝每見湛輒言白馬生且復諫矣七年以病乞身拜光祿大夫代王丹為太子太傅及郭后廢因稱疾不朝拜太中大夫居中東門候舍故時人號曰中東門君帝數存問賞賜後大司徒戴涉被誅帝彊起湛以代之湛至朝堂遺失溲便因自陳疾篤不能復任朝事遂罷之後數年卒於家王丹字仲回京兆下邽人也哀平時仕州郡王莽時連徵不至家累千金隱居養志好施周急每歲農時輒載酒肴於田閒候勤者而勞之其墯孏者恥不致丹皆兼功自厲邑聚相率以致殷富其輕黠游蕩廢業為患者輒曉其父兄使黜責之沒者則賻給親自將護其有遭喪憂者輒待丹為辦鄉鄰以為常行之十餘年其化大洽風俗以篤丹資性方絜疾惡彊豪時河南太守同郡陳遵關西之大俠也其友人喪親遵為護喪事賻助甚豐丹乃懷縑一匹陳之於主人前曰如丹此縑出自機杼遵聞而有慙色自以知名欲結交於丹丹拒而不許會前將軍鄧禹西征關中軍糧乏丹率宗族上麥一二千斛禹表丹領左馮翊稱疾不視事免歸後徵為太子少傅時大司徒侯霸欲與交友及丹被徵遣子昱候於道昱迎拜車下丹下荅之昱曰家公欲與君結交何為見拜丹曰君房有是言丹未之許也丹子有同門生喪親家在中山白丹欲往奔慰結侶將行丹怒而撻之令寄縑以祠焉或問其故丹曰交道之難未易言也世稱管鮑次則王貢張陳凶其終蕭朱𨻶其末故知全之者鮮矣時人服其言客初有薦士於丹者因選舉之, WYG: ''}
