  - {type: variant, offset: 2921, length: 2045, content: 隴西太守鄧融事無所據策免五年卒於家時年八十七以河南尹范遷有清行代為司徒遷字子廬沛國人初為漁陽太守以智略安邊匈奴不敢入界及在公輔有宅數畝田不過一頃復推與兄子其妻嘗謂曰君有四子而無立錐之地可餘奉祿以為後世業遷曰吾備位大臣而蓄財求利何以示後世在位四年薨家無擔石焉後顯宗因朝會問羣臣郭丹家今何如宗正劉匡對曰昔孫叔敖相楚馬不秣粟妻不衣帛子孫竟蒙寑丘之封丹出典州郡入為三公而家無遺產子孫困匱帝乃下南陽訪求其嗣長子宇官至常山太守少子濟趙相吳良字大儀齊國臨淄人也初為郡吏歲旦與掾史入賀門下掾王望舉觴上壽諂稱太守功德良於下坐勃然進曰望佞邪之人欺諂無狀願勿受其觴太守斂容而止讌罷轉良為功曹恥以言受進終不肯謁時驃騎將軍東平王蒼聞而辟之署為西曹蒼甚相敬愛上疏薦良曰臣聞為國所重必在得人報恩之義莫大薦士竊見臣府西曹掾齊國吳良資質敦固公方廉恪躬儉安貧白首一節又治尚書學通師法經任博士行中表儀宜備宿衛以輔聖政臣蒼榮寵絕矣憂責深大私慕公叔同升之義懼於臧文竊位之罪敢秉愚瞽犯冒嚴禁顯宗以示公卿曰前以事見良鬚髮皓然衣冠甚偉夫薦賢助國宰相之職蕭何舉韓信設壇而拜不復考試今以良為議郎永平中車駕近出而信陽侯陰就干突禁衛車府令徐匡鉤就車收御者送獄詔書譴匡匡乃自繫良上言曰信陽侯就倚恃外戚干犯乘輿無人臣禮為大不敬匡執法守正反下于理臣恐聖化由是而薥帝雖赦匡猶左轉良為即丘長後遷司徒長史每處大議輒據經典不希旨偶俗以徼時譽後坐事免復拜議郎卒於官承宮字少子琅邪姑幕人也少孤年八歲為人牧豕鄉里徐子盛者以春秋經授諸生數百人宮過息廬下樂其業因就聽經遂請留門下為諸生拾薪執苦數年勤學不倦經典既明乃歸家教授遭天下喪亂遂將諸生避地漢中後與妻子之蒙陰山肆力耕種禾黍將孰人有認之者宮不與計推之而去由是顯名三府更辟皆不應永平中徵詣公車車駕臨辟雍召宮拜博士遷左中郎將數納忠言陳政論議切売心朝臣憚其節名播匈奴時北單于遣使求得見宮顯宗勑自整飾宮對曰夷狄眩名非識實者也臣狀醜不可以示遠宜選有威容者帝乃以大鴻臚魏應代之十七年拜侍中祭酒建初元年卒肅宗襃歎賜以冢地妻上書乞歸葬鄉里復賜錢三十萬鄭均字仲虞東平任城人也少好黃老書兄為縣吏頗受禮遺均數諫止不聽即脫身為傭歲餘得錢帛歸以與兄曰物盡可復得為吏坐臧終身捐棄兄感其言遂為廉絜均好義篤實養寡嫂孤兒恩禮敦至常稱病家廷不應州郡辟召郡將欲必致之使縣令譎將詣門既至卒不能屈均於是客於濮陽建初三年司徒鮑昱辟之後舉直言並不詣六年公車特徵再遷尚書數納忠言肅宗敬重之後以病乞骸骨拜議郎告歸因稱病篤帝賜以衣冠元和元年詔告廬江太守東平相曰議郎鄭均束脩安貧恭儉節整前在機密以病致仕守善貞固黃髮不怠又前安邑令毛義躬履遜讓比徵辭病淳絜之風東州稱仁書不云乎章厥有常吉哉其賜均義穀各千斛常以八月長吏存問賜羊酒顯茲異行明年帝東巡過任城乃幸均舍勑賜尚書祿以終其身故時人號為白衣尚書永元中卒於家趙典字仲經蜀郡成都人也父戒為太尉桓帝立以定策封廚亭侯典少篤行隱約博學經書弟子自遠方至建和初四府表薦徵拜議郎侍講禁內再遷為侍中時帝欲廣開鴻池典諫曰鴻池汎溉已且百頃猶復增而深之非所以崇唐虞之約己遵孝文之愛人也帝納其言而止父卒襲封出為弘農太守轉右扶風公事去官徵拜城門校尉轉將作大匠遷少府又轉大鴻臚時恩澤諸侯以無勞受封羣臣不悅而莫敢諫典獨奏曰夫無功而賞勞者不勸上忝下辱亂象干度且高祖之誓非功臣不封宜一切削免爵土以存舊典帝不從頃之轉太僕遷太常朝廷每有災異疑議輒諮問之典據經正對無所曲折每得賞賜輒分與諸生之貧者後以諫爭違旨免官就國會帝崩時禁藩國諸侯不得奔弔典慨然曰身從衣褐之中致位上列且鳥烏反哺報德況於士邪遂解印綬符策付縣而馳到京師州郡及大鴻臚並執處其罪而公卿百寮嘉典之義表請以租自贖詔書許之再遷長樂少府衛尉公卿復表典篤學博聞宜備國師會病卒使者弔祠竇太后復遣使兼贈印綬謚曰獻侯典兄子謙謙弟溫相繼為三公謙字彥信初平元年代黃琬為太尉獻帝遷都長安以謙行車騎將軍為前置明年病罷復為司隸校尉車師王侍子為董卓所愛數犯法謙收殺之卓大怒殺都官從事而素敬憚謙故不加罪轉為前將軍遣擊白波賊有功封郫侯李傕殺司徒王允復代允為司徒數月病免拜尚書令是年卒謚曰忠侯溫字子柔初為京兆郡丞歎曰大丈夫當雄飛安能雌伏遂棄官去遭歲大飢散家糧以振窮餓所活萬餘人獻帝西遷都為侍中同輿輦至長安封江南亭侯代楊彪為司空免頃之復為司徒錄尚書事時李傕與郭汜相攻傕遂虜掠禁省劫帝幸北塢外內隔絕傕素疑溫不與己同乃內溫於塢中又欲移乘輿於黃白城溫與傕書曰公前託為董公報讎然實屠陷王城殺戮大臣天下不可家見而戶說也今與郭汜爭睚眥之𨻶以成千鈞之讎人在塗炭各不聊生曾不改悟遂成禍亂朝廷仍下明詔欲令和解上命不行威澤日損而復欲移轉乘輿更幸非所此誠老夫所不達也於易一為過再為涉三而弗改滅其頂凶不如早共和解引軍還屯上安萬乘下全人民豈不幸甚傕大怒欲遣人殺溫董卓李傕從弟應溫故掾也諫之數日乃獲免溫從車駕都許建安十三年以辟司空曹操子丕為掾操怒奏溫辟忠臣子弟選舉不實免官是歲卒年七十二贊曰宣鄭二王奉身清方杜林據古張湛矜莊典以義黜宮由德揚大儀鵠髮見表憲王少卿志仕終乘高箱, WYG: 證}
