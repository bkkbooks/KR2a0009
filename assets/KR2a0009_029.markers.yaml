  - {type: variant, offset: 1046, length: 1101, content: 年大司馬吳漢辟大應三年徵拜諫議大夫數有忠言以禮進止朝廷敬之遷沛郡太守至蘄縣稱病不之府官屬皆隨就之良遂上疾篤乞骸骨徵拜太中大夫六年代宣秉為大司徒司直在位恭儉妻子不入官舍布被瓦器時司徒史鮑恢以事到東海過候其家而良妻布裙曳柴從田中歸恢告曰我司徒史也故來受書欲見夫人妻曰妾是也苦掾無書恢乃下拜歎息而還聞者莫不嘉之後以病歸一歲復徵至滎陽疾篤不任進道乃過其友人友人不肯見曰不有忠言奇謀而取大位何其往來屑屑不憚煩也遂拒之良慙自後連徵輒稱病詔以玄纁聘之遂不應後光武幸蘭陵遣使者問良所苦疾不能言對詔復其子孫邑中傜役卒於家論曰夫利仁者或借仁以從利體義者不期體以合義季文子妾不衣帛魯人以為美談公孫弘身服布被汲黯譏其多詐事實未殊而譽毀別議何也將體之與利之異乎宣秉王良處位優重而秉甘疏薄良妻荷薪可謂行過乎儉然當世咨其清人君高其節豈非臨之以誠哉語曰同言而信則信在言前同令而行則誠在令外不其然乎張湛不屑矜偽之誚斯不偽矣王丹難於交執之道斯知交矣杜林字伯山扶風茂陵人也父鄴成哀閒為涼州刺史林少好學沈深家既多書又外氏張竦父子喜文采林從竦受學博洽多聞時稱通儒初為郡吏王莽敗盜賊起林與弟成及同郡范逡孟冀等將細弱俱客河西道逢賊數千人遂掠取財褫奪衣服拔刃向林等將欲殺之冀仰曰願一言而死將軍知天神乎赤眉兵衆百萬所向無前而殘賊不道卒至破敗今將軍以數千之衆欲規霸王之事不行仁恩而反遵覆車不畏天乎賊遂釋之俱免於難隗囂素聞林志節深相敬待以為持書平後因疾告去辭還祿食囂復欲令彊起遂稱篤囂意雖相望且欲優容之乃出令曰杜伯山天子所不能臣諸侯所不能友蓋伯夷叔齊恥食周粟今且從師友之位須道開通使順所志林雖拘於囂而終不屈節建武六年弟成物故囂乃聽林持喪東歸既遣而悔追令刺客楊賢於隴坻遮殺之賢見林身推鹿車載致弟喪乃歎曰當今之世誰能行義我雖小人何忍殺義士因亡去光武聞林已還三輔乃徵拜侍御史引見問以經書故舊及西州事甚悅之賜車馬衣被羣寮知林以名德用甚尊憚之京師士大夫咸推其博洽河南鄭興東海衛宏等皆長於古學興嘗師事劉歆林既遇之欣然言曰林得興等固諧矣使宏得林且有以益之及宏見林闇然而服濟南徐巡始師事宏後皆更受林學林前於西州得漆書古文尚書一卷常寶愛之雖遭難困握持不離身出以示宏等曰林流離兵亂常恐斯經將絕何意東海衛子濟南徐生復能傳之是道竟不墜於地也古文雖不合時務然願諸生無悔所學宏巡益重之於是古文遂行明年大議郊祀制多以為周郊后稷漢當祀堯詔復下公卿議議者僉同帝亦然之林獨以為周室之興祚由后稷漢業特起功不緣堯祖宗故事所宜因循定從林議後代王良為大司徒司直林薦同郡范逡趙秉申屠剛及隴西牛邯等皆被擢用士多歸之十一年司直官罷以林代郭憲為光祿勳內奉宿衛外總三署周密敬慎選舉稱平郎有好學者輒見誘進朝夕滿堂, WYG: ''}
