  - {type: variant, offset: 2171, length: 474, content: 姦軌不勝宜增科禁以防其源詔下公卿林奏曰夫人情挫辱則義節之風損法防繁多則苟免之行興孔子曰導之以政齊之以刑民免而無恥導之以德齊之以禮有恥且格古之明王深識遠慮動居其厚不務多辟周之五刑不過三千大漢初興詳覽失得故破矩為圓彫為樸蠲除苛政更立疏網海內歡欣人懷寬德及至其後漸以滋章吹毛索疵詆欺無限果桃菜茹之饋集以成臧小事無妨於義以為大戮故國無廉士家無完行至於法不能禁令不能止上下相遁為敝彌深臣愚以為宜如舊制不合翻移帝從之後皇太子彊求乞自退封東海王故重選官屬以林為王傅從駕南巡狩時諸王傅數被引命或多交游不得應詔唯林守慎有召必至餘人雖不見譴而林特受賞賜又辭不敢受帝益重之明年代丁恭為少府二十二年復為光祿勳頃之代朱浮為大司空博雅多通稱為任職相明年薨帝親自臨喪送葬除子喬為郎詔曰公侯子孫必復其始賢者之後宜宰城邑其以喬為丹水長論曰夫威彊以自禦力損則身危飾詐以圖己詐窮則道屈而忠信篤敬蠻貊行焉者誠以德之感物厚矣故趙孟懷忠匹夫成其仁杜林行義烈士假其命易曰人之所助者順信有不誣矣郭丹字少卿南陽穰人也父稚成帝時為廬江太守有清名丹七歲而孤小心孝順後母哀憐之為鬻衣買產業後從師長安買符入, WYG: 秦}
