  - {type: variant, offset: 2732, length: 188, content: 有二年果乘高車出關如其志焉更始敗諸將悉歸光武並獲封爵丹獨保平氏不下為更始發喪衰絰盡哀建武二年遂潛逃去敝衣閒行涉歷險阻求謁更始妻子奉還節傳因歸鄉里太守杜詩請為功曹丹薦鄉人長者自代而去詩乃歎曰昔明王興化卿士讓位今功曹推賢可謂至德勑以丹事編署黃堂以為後法十三年大司馬吳漢辟舉高第再遷并州牧有清平稱轉使匈奴中郎將遷左馮翊永平三年代李訢為司徒在朝廉直公正與侯霸杜林張湛郭伋齊名相善明年坐, WYG: 九}
