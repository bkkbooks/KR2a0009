  - {type: variant, offset: 4370, length: 0, content: '', WYG: 十二月休屠各胡叛是嵗賣闗内侯假金印紫綬傳世入錢五百萬五年春正月休屠各胡宼西河殺郡守郉紀丁酉大赦天下二月有星孛于紫宫黄巾餘賊郭大等起於西河白波谷宼太原河東三月休屠各胡攻殺并州刺史張懿遂與南匈奴左部胡合殺其單于夏四月汝南葛陂黄巾攻沒郡縣葛陂在今豫州新蔡縣西北太尉曹嵩罷五月永樂少府樊陵為太尉陵字徳雲胡陽人也六月丙寅大風太尉樊陵罷益州黄巾馬相攻殺刺史郗儉自稱天子又宼巴郡殺郡守趙部益州從事賈龍擊相斬之郡國七大水秋七月射聲校尉馬日磾為太尉八月初置西園八校尉樂資山陽公載記曰小黄門蹇碩為上軍校尉虎賁中郎將袁紹為中軍校尉屯騎校尉鮑鴻為下軍校尉議郎曹操為典軍校尉趙融為助軍左校尉馮芳為助軍右校尉諫議大夫夏牟為左校尉淳于瓊為右校尉凡八校尉皆統於蹇碩司徒許相罷司空丁宫為司徒光禄勳南陽劉𢎞為司空字子髙安衆人衛尉董重爲驃騎將軍九月南單于叛與白波賊宼河東遣中郎將孟益率騎都尉公孫瓚討漁陽賊張純等冬十月壬午御殿後槐樹自拔倒豎青徐黄巾復起宼郡縣甲子帝自稱無上將軍燿兵於平樂觀平樂觀在洛陽城西十一月凉州賊王國圍陳倉右將軍皇甫嵩救之遣下軍校尉鮑鴻討葛陂黄巾巴郡板楯蠻叛遣上軍别部司馬趙瑾討平之公孫瓚與張純戰於石門大破之時烏桓反叛與賊張純等攻薊中故瓚追擊之石門山名在今營州西南是嵗改刺史新置牧}
