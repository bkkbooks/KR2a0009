  - {type: variant, offset: 5699, length: 6, content: 閒二郡比豐沛, WYG: 南尹許相及諸閹人無少長皆斬之讓珪等復刼少帝陳留王走小平津小平津在今鞏縣西北續漢志曰時京師童謡曰侯非侯王非王千乗萬騎上北印案獻帝未有爵號為段珪等所執公卿百官皆隨其後到河上乃得還尚書盧植追讓珪等斬數人其餘投河而死獻帝春秋曰河南中部掾閔貢見天子出率騎追之北到河上天子飢渇貢宰羊進之厲聲責讓等曰君以閹宦之隸刀鋸之殘越從汚泥扶侍日月賣㺯國恩階賤為貴刼迫帝王蕩覆王室假息漏刻遊魂河津自亡新以来姦臣賊子未有如君者今不速死吾射殺汝譲等惶怖义手再拜叩頭向天子辭曰臣等死陛下自愛遂投河死帝與陳留王協夜歩逐螢光行數里得民家露車共乗之辛未還宫大赦天下改光熹為昭寧幷州牧董卓殺執金吾丁原司空劉𢎞免董卓自為司空九月甲戌董卓廢帝為𢎞農王自六月雨至于是月}
