  - {type: variant, offset: 2872, length: 215, content: 初以小黃門為守宮令置從右僕射官京師蝗秋七月河東地裂冬十一月司徒尹嘗屆長沙蠻叛寇益陽司空韓縯為司徒太常北海孫朗為司空延熹元年春三月己酉初置鴻德苑令夏五月己酉大會公卿以下賞賜各有差甲戌晦日有食之京師蝗六月戊寅大赦天下改元延熹丙戌分中山置博陵郡以奉孝崇皇園陵大雩秋七月己巳雲陽地裂甲子太尉黃瓊免太常胡廣為太尉冬十月校獵廣成遂幸上林苑十二月鮮卑寇邊使匈奴中郎將張奐率南單于擊破之二年春二月鮮卑寇鴈門己亥阜陵王便薨蜀郡夷寇蠶陵殺縣令三月復斷, WYG: 荆州}
