  - {type: variant, offset: 5790, length: 1, content: 桓, krp: 靈帝負乗委體宦孽易曰負且乘致寇至言帝以小人而乗君子之噐徵亡備兆小雅盡缺詩小雅曰小雅廢則四夷交侵中國㣲矣缺亦廢也麋鹿霜露遂棲宫衛史記曰伍子胥諌吳王吳王不聽子胥曰臣今見麋鹿逰於姑蘇之臺宫中生荆棘露沾衣也言帝為政貪亂任寄不得其人尋以獻帝遷播洛陽丘墟故麋鹿棲宫衛也協韻衛音于别反劉攽曰熹平五年書十月壬午御殿後槐樹}
  - {type: variant, offset: 5792, length: 4, content: 宗支越躋, WYG: 㧞倒豎中平五年又書十月壬午御殿後槐樹自㧞倒豎年數日月無少異者盖必有一誤臣攽案中平五年十月又書甲子帝稱無上將軍云云壬午到甲子凡四十五日非一月所能兼也則中平所記為衍矣又案續漢志中平五年亦無此異後漢書卷八後漢書卷八考證靈帝紀癸酉晦日有食之晦監夲訛朔從宋夲改臣㑹汾按上文已序冬十二月事係此語於年終當作晦字元年二年日食皆在十月晦晦而日食司}
