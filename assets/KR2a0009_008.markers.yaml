  - {type: variant, offset: 1144, length: 0, content: '', WYG: 太尉劉寛免衛尉許􅖢為太尉閏月辛酉北宫東掖庭永巷署災永巷宫中署名也漢官儀曰令一人宦者為之秩六百石掌宫婢侍使劉攽曰注侍使案使當作史即給尚書郎侍史之類司徒楊賜罷冬十月太常陳耽為司徒鮮卑宼幽幷二州是歲帝作列肆於後宫使諸采女販賣更相盗竊爭鬭帝著商估服飲宴為樂又於西園弄狗著進賢冠帶綬三禮圖曰進賢冠文官服之前髙七寸後髙三寸長八寸續漢志曰靈帝寵用便嬖子弟轉相汲引賣關内侯直五百萬令長强者貪如豺狼弱者畧不類物實狗而冠也昌邑王見狗冠方山冠龔遂曰王之左右皆狗而冠又駕四驢帝躬自操轡驅馳周旋京師轉相放效續漢志曰驢者乃服重致逺上下山谷野人之所用耳何有帝王君子而驂駕之乎天意若曰國且大亂賢愚倒植凡執政者皆如驢也五年春正月辛未大赦天下二月大疫三月司徒陳耽免夏四月旱太常袁隗爲司徒}
