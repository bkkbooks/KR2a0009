  - {type: variant, offset: 5790, length: 1, content: 桓, WYG: 靈帝負乗委體宦孽易曰負且乘致寇至言帝以小人而乗君子之噐徵亡備兆小雅盡缺詩小雅曰小雅廢則四夷交侵中國㣲矣缺亦廢也麋鹿霜露遂棲宫衛史記曰伍子胥諌吳王吳王不聽子胥曰臣今見麋鹿逰於姑蘇之臺宫中生荆棘露沾衣也言帝為政貪亂任寄不得其人尋以獻帝遷播洛陽丘墟故麋鹿棲宫衛也協韻衛音于别反劉攽曰熹平五年書十月壬午御殿後槐樹}
