  - {type: variant, offset: 4538, length: 366, content: 寅梁王成薨五月己丑京師雨雹秋七月辛卯趙王乾薨野王山上有死龍荊州刺史度尚擊零陵桂陽盜賊及蠻夷大破平之冬十月壬寅南巡狩庚申幸章陵祠舊宅遂有事于園廟賜守令以下各有差戊辰幸雲夢臨漢水還幸新野祠湖陽新野公主魯哀王壽張敬侯廟護羌校尉段熲擊當煎羌破之十二月辛丑車駕還宮八年春正月遣中常侍左悺之苦縣祠老子勃海王悝謀反降為癭廮陶王丙申晦日有食之詔公卿校尉舉賢良方正二月己酉南宮嘉德署黃龍見千秋萬歲殿火太僕左稱有辠自殺癸亥皇后鄧氏廢河南尹鄧萬世虎賁中郎將鄧會下獄死護羌校尉段熲擊罕姐羌破之三月辛巳大赦天下夏四月甲寅安陵園寢火丁巳壞郡國諸房祀濟陰東郡濟北河水清五月壬申罷太山都尉官丙戌太尉楊秉薨六月丙辰緱氏地裂桂陽胡蘭朱蓋等復反攻沒郡縣轉寇零陵零陵太守陳球拒之遣中郎將度尚長沙太守抗挾母酸鶠蓋大破斬之蒼梧太守張為賊所執又桂陽太守任胤背敵畏儒皆𠫓廾市閏月甲, WYG: ''}
