  - {type: variant, offset: 325, length: 1, content: 尊, WYG: 大赦天下以光祿勲楊賜為司空三月太尉李咸免夏五月以司隸校尉叚熲為太尉沛相師遷坐誣罔國王下獄死國王陳愍王寵也臣賢案陳敬王傳云國相師遷又東觀記曰陳行相師遷奏沛相魏愔前爲陳相與陳王寵交通明魏愔為沛相此言師遷為沛相蓋誤也六月北海地震東莱北海海水溢續漢志曰時出大魚二枚各長八九丈髙二丈餘秋七月司空楊賜免太常潁川唐珍為司空冬十二月日南徼外國重譯貢獻太尉段熲罷鮮卑宼幽幷二州癸酉晦日有食之三年春正月夫餘國遣使貢獻二月己巳大赦天下太常陳耽爲太尉耽字漢公東海人也三月中山王暢薨無子國除夏六月封河間王利子康爲濟南王奉孝仁}
