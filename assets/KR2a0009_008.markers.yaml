  - {type: variant, offset: 2236, length: 307, content: 各一人詔曰比者星辰謬越坤靈震動灾異之降必不空發勑己修政庶望有補其輿服制度有踰侈長飾者皆宜損省郡縣務存儉約申明舊令如永平故事六月彭城泗水增長逆流詔司隸校尉部刺史曰蝗灾為害水變仍至五穀不登人無宿儲其令所傷郡國種蕪菁以助人食京師蝗東海朐山崩九月丁卯朔日有食之詔曰朝政失中雲漢作旱川靈涌水蝗螽孳蔓殘我百穀太陽虧光飢饉荐臻其不被害郡縣當為飢餒者儲天下一家趣不糜爛則為國寶其禁郡國不得賣酒祠祀裁足太尉胡廣免司徒黃瓊為太尉閏月光祿勳尹頌為司徒減天下死罪一等徙邊戍蜀郡李伯詐稱宗室當立為太初皇帝伏誅冬十一月甲辰校獵上林苑遂至函谷關賜所過道傍年九十以上錢各有差太山琅邪賊公孫舉等反叛殺長吏永壽元年春正月戊申大赦天下改元永壽二月司隸冀, WYG: 傳案今鄧}
