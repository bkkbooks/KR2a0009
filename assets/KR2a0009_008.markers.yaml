  - {type: variant, offset: 337, length: 1, content: 建, WYG: 順帝虞羙人也憲園在洛陽東北質帝母陳夫人爲渤海孝王妃渤海孝王鴻之夫人也改平凖為中凖漢官儀曰平凖令一人秩六百石也使宦者為令列於内署自是諸署悉以閹人爲丞令五年夏四月癸亥大赦天下益州郡夷叛太守李顒討平之復崇髙山名爲嵩髙山前書武帝祠中嶽改嵩髙為崇髙東觀記曰使中郎将堂谿典請雨因上言改之名為嵩髙山大雩使侍御史行詔獄亭部理寃枉原輕繫休囚徒五月太尉陳耽罷司空許訓為太尉閏月永昌太守曹鸞坐訟黨人棄市訟謂申理之也其言切直帝怒檻車送槐里獄掠殺之也詔黨人門生故吏父兄子弟在位者皆免官禁錮六月壬戌太常南陽劉逸字大逈安衆人為司空秋七月太尉許訓罷光禄勲劉寛為太尉冬十月壬午御殿後槐樹自㧞倒豎司徒袁隗罷十一月丙戌光禄大夫楊賜為司徒十二月甘陵王定薨試太學生年六十以上百餘人除郎中太子舍人至王家郎郡國文學吏漢官儀曰太子舍人王家郎中並秩二百石無員是嵗鮮卑宼幽州沛國言黄龍見譙六年春正月辛巳大赦天下二月南宫平城門及武庫東垣屋自壊平城門洛陽城南門也蔡邕曰平城門正陽之門與宫連郊祀法駕所從出門之最尊者武庫禁兵所藏東垣庫之外障易傳曰小人在位厥妖城門自壊夏四月大旱七州蝗鮮卑宼三邊謂東西與北邉市賈民為宣陵孝子者數十人皆除太子舍人秋七月司空劉逸免衛尉陳球為司空八月遣破鮮卑中郎将田晏出雲中使匈奴中郎將臧旻與南單于出鴈門護烏桓校尉夏育出髙栁並伐鮮卑晏等大敗冬十月癸丑朔日有食之太尉劉寛免帝臨辟雍辛丑京師地震辛亥令天下繫囚罪未决入縑贖十一月司空陳球免十二月甲寅太常河南孟􅖢爲太尉􅖢字叔逹音乙六反庚辰司徒楊賜免太常陳耽為司空鮮卑宼遼西永安太僕王旻下獄死永安宫之太僕也光}
