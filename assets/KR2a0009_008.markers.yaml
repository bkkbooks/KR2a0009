  - {type: variant, offset: 5694, length: 3, content: 歲復博, WYG: 虎賁中郎將袁術燒東西宫攻諸宦者庚午張讓段珪等刼少帝及陳留王幸北宫徳陽殿何進部曲將吳匡與車騎將軍何苖戰於朱雀闕下苖敗斬之辛未司隸校尉袁紹勒兵收偽司隸校尉樊}
