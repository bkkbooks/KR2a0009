  - {type: variant, offset: 42, length: 0, content: '', WYG: 母董夫人桓帝崩無子皇太后與父城門校尉竇武定䇿禁中使守光禄大夫劉儵持節將左右羽林至河間奉迎續漢志曰桓帝之初京都童謡曰城上烏尾畢逋公}
  - {type: page-break, offset: 42, content: '', id: KR2a0009_WYG_008-1b, image: WYG0252/WYG0252-0150b.png}
  - {type: variant, offset: 42, length: 0, content: '', krp: 母董夫人桓帝崩無子皇太后與父城門校尉竇武定䇿禁中使守光禄大夫劉儵持節將左右羽林至河間奉迎續漢志曰桓帝之初京都童謡曰城上烏尾畢逋公}
  - {type: variant, offset: 43, length: 3, content: 侯本初, WYG: 吏子為徒一徒死百乘車車班班入河間河間奼女工數錢以錢爲室金為堂石上慊慊舂黄粱梁下有懸鼓我欲擊之丞卿怒城上烏者䖏髙獨食不與下共謂人主多聚斂也公為吏子為徒者言蠻夷叛逆父既為軍吏子弟又為卒徒往擊之也一徒死百乘車者言前一人討胡既死矣後又遣百乘車往也車班班者言乗輿班班入河間迎靈帝也奼女數錢言帝既立其母永樂太后好聚金以為堂室也石上慊慊者言太后雖積金錢猶慊慊常若不足使人舂黄粱而食之也我欲擊之者言太后敎帝使賣官受錢天下忠篤之士怨望欲擊鼓求見卿懸鼔者復怒而止我也建寜}
