  - {type: variant, offset: 1722, length: 190, content: 裴優自稱皇帝伏誅甲寅皇太后梁氏崩三月車駕徙幸北宮甲午葬順烈皇后夏五月庚辰尊博園匽貴人曰孝崇皇后秋七月梓潼山崩冬十一月辛巳減天下死罪一等徙邊戍元嘉元年春正月京師疾疫使光祿大夫將醫藥案行癸酉大赦天下改元元嘉二月九江廬江大疫甲午河閒王建薨夏四月己丑安平王得薨京師旱任城梁國飢民相食司徒張歆罷光祿勳吳雄為司徒秋七月武陵蠻叛冬十月司空胡廣罷十一月辛巳京師地震閏月庚午任城王崇薨太常黃瓊為司空, WYG: 起漢遂微弱}
