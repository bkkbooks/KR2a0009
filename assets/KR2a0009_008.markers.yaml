  - {type: variant, offset: 320, length: 0, content: '', WYG: 陵夏四月戊辰太尉周景薨司空宣酆免長樂衛尉王暢爲司空五月丁未朔日有食之詔公卿以下各上封事及郡國守相舉有道之士各一人又故刺史二千石清髙有遺恵爲衆所歸者皆詣公車太中大夫劉矩爲太尉六月京師雨水秋七月破羌將軍叚熲復破先零羌於涇陽涇陽縣名屬安定故城在原州涼縣南也八月司空王暢免宗正劉寵爲司空九月丁亥中常侍曹節矯詔誅太傅陳蕃大將軍竇武及尚書令尹勲侍中劉瑜屯騎校尉馮述皆夷其族皇太后遷于南宫太后與竇武宻謀欲誅曹節今武等既誅故太后被遷司徒胡廣爲太傅錄尚書事司空劉寵爲司徒大鴻臚許栩爲司空}
  - {type: page-break, offset: 320, content: '', id: KR2a0009_WYG_008-3a, image: WYG0252/WYG0252-0151a.png}
  - {type: variant, offset: 320, length: 0, content: '', krp: 陵夏四月戊辰太尉周景薨司空宣酆免長樂衛尉王暢爲司空五月丁未朔日有食之詔公卿以下各上封事及郡國守相舉有道之士各一人又故刺史二千石清髙有遺恵爲衆所歸者皆詣公車太中大夫劉矩爲太尉六月京師雨水秋七月破羌將軍叚熲復破先零羌於涇陽涇陽縣名屬安定故城在原州涼縣南也八月司空王暢免宗正劉寵爲司空九月丁亥中常侍曹節矯詔誅太傅陳蕃大將軍竇武及尚書令尹勲侍中劉瑜屯騎校尉馮述皆夷其族皇太后遷于南宫太后與竇武宻謀欲誅曹節今武等既誅故太后被遷司徒胡廣爲太傅錄尚書事司空劉寵爲司徒大鴻臚許栩爲司空}
  - {type: variant, offset: 324, length: 0, content: '', WYG: 辰晦日有食之令天下繫囚罪未决入縑贖各有差十一月太尉劉矩免太僕沛國聞人襲為太尉姓聞人名襲字定卿風俗通曰少正卯魯之聞人其後氏焉十二月鮮卑及濊貊宼幽拜二州二年春正月丁丑大赦天下三月乙巳尊慎園董貴人爲孝仁皇后續漢志曰置永樂宫儀如桓帝尊匽貴人之禮夏四月癸巳大風雨雹詔公卿以下各上封事五月太尉聞人襲罷司空許栩免六月司徒劉寵為太尉太常許訓爲司徒訓字季師平輿人太僕長沙劉囂爲司空囂字重寜秋七月破羌將軍段熲大破先零羌於射虎塞外谷東羌悉平九月江夏蠻叛州郡討平之丹陽山越賊圍太守陳夤夤擊破之冬十月丁亥中常侍侯覽諷有司奏前司空虞放太僕杜密長樂少府李膺司隸校尉朱瑀潁川太守巴肅沛相荀翌河内太守魏朗山陽太守翟超皆爲鉤黨下獄鉤謂相牽引也事見劉淑李膺傳死者百餘人妻子徙邊諸附從者錮及五屬五屬謂五服内親也制詔州郡大舉鉤黨於是天下豪傑及儒學行義者一切結爲黨人續漢志曰建寜中京都長者皆以葦方笥爲裝具時有識者竊言葦笥郡國讞篋也後黨人禁錮㑹赦有疑者皆讞廷尉人名悉入方笥中庚子晦日有食之十一月太尉劉寵免太僕郭禧爲太尉字公房扶溝人也禧音僖鮮卑宼幷州是嵗長樂太僕曹節為車騎將軍百餘日罷三年春正月河内人婦食夫河南人夫食婦三月丙寅晦日有食之夏四月太尉郭禧罷太中大夫聞人襲為太尉秋七月司空劉囂罷八月大鴻臚橋𤣥爲司空九月執金吾董寵下獄死冬濟南賊起攻東平陵東平陵縣名屬濟南郡故城在今濟州東鬱林烏滸民相率内屬烏滸南方夷號也廣州記曰其俗食人以鼻飲水口中進噉如故四年春正月甲子帝加元服大赦天下賜公卿以下各有差唯黨人不赦二月癸夘地震海水溢河水清三月辛酉朔日有食之太尉聞人襲免太僕李咸爲太尉字元卓汝南西平人詔公卿至六百石各上封事大疫使中謁者廵行致醫藥司徒許訓免司空橋𤣥為司徒夏四月太常來豔爲司空豔字季徳南陽新野人五月河東地裂雨雹山水暴出秋七月司空来豔免癸丑立貴人宋氏爲皇后執金吾宋酆女前年入掖庭為貴人司徒橋𤣥免太常宗俱爲司空俱字伯儷南陽安定人前司空許栩為司徒冬鮮卑宼幷州熹平元年春三月壬戌太傅胡廣薨夏五月己巳大赦天下改元熹平長樂太僕侯覽有罪自殺六月京師雨水癸巳皇太后竇氏崩秋七月甲寅葬桓思皇后宦官諷司隸校尉叚熲捕繫太學諸生千餘人時有人書朱雀闕云天下大亂公卿皆尸祿故捕之事見宦者傳冬十月勃海王悝被誣謀反丁𤣥悝及妻子皆自殺十一月㑹稽人許生自稱越王宼郡縣東觀記曰㑹稽許昭聚衆自稱大將軍立父生為越王攻破郡縣遣揚州刺史臧旻丹陽太守陳夤討破之十二月司徒許栩罷大鴻臚袁隗爲司徒鮮卑宼幷州是嵗甘陵王恢薨二年春正月大疫使使者廵行致醫藥丁丑司空宗俱薨二月壬}
