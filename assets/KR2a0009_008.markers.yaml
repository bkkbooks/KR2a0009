  - {type: variant, offset: 1414, length: 1, content: 徒, WYG: 空朱儁為黄巾波才所敗侍中向栩張鈞坐言宦者下獄死時鈞上書曰今斬常侍懸其首於南郊以謝天下即兵自消也章以章示常侍故下獄也汝南黄巾敗太守趙謙於邵陵邵陵縣名屬汝南郡故城在今豫州郾城縣東廣陽黄巾殺幽州刺史郭勳及太守劉衛五月皇甫嵩朱儁復與波才等戰於長社大破之長社今許州縣也故城在長葛縣西六月南陽太守秦頡擊張曼成斬之交阯屯兵執刺史及合浦太守来逹自稱柱天將軍遣交阯刺史賈琮討平之皇甫嵩朱儁大破汝南黄巾於西華西華縣屬汝南郡故城在今陳州項城縣西詔嵩討東郡朱儁討南陽盧植破黄巾圍張角於廣宗宦官誣奏植抵罪植連破張角垂當㧞之小黄門左豐言扵帝曰盧中郎固壘息軍以待天誅帝怒遂檻車徵植減死一等遣中郎將董卓攻張角不剋洛陽女子生兒兩頭共身續漢志曰上西門外女子生兒兩頭異肩共胷以為不祥墮地棄之其後政在私門上下無别兩頭之象秋七月巴郡妖巫張修反宼郡縣劉艾紀曰時巴郡巫人張修療病愈者雇以五斗米號為五斗米師河南尹徐灌下獄死八月皇甫嵩與黄巾戰於倉亭獲其帥其帥卜己也倉亭在東郡乙巳詔皇甫嵩北討張角九月安平王續有罪誅國除冬十月皇甫嵩與黄巾賊戰于廣宗獲張角弟梁角先死乃戮其屍發棺斷頭傳送馬市以皇甫嵩爲左車騎將軍}
