  - {type: variant, offset: 4392, length: 142, content: 潁川許栩為司徒夏四月辛亥康陵東署火五月鮮卑寇遼東屬國秋七月甲申平陵園寑火桂陽盜賊李研等寇郡界武陵蠻復叛太守陳奉與戰大破降之隴西太守孫羌討滇那羌破之八月車騎將軍馮緄免冬十月丙辰校獵廣成遂幸函谷關上林苑十一月司空劉寵免南海賊寇郡界十二月衞尉周景為司空七年春正月庚寅沛王榮薨三月癸亥隕石于鄠, WYG: 鮑鴻下獄死}
