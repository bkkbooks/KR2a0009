  - {type: variant, offset: 5070, length: 240, content: 詔公卿校尉郡國舉至孝沛國戴異得黃金印無文字遂與廣陵人龍尚等共祭井作符書稱太上皇伏誅己酉詔曰比歲不登民多飢窮又有水旱疾疫之困盜賊徵發南州尤甚灾異日食譴告累至政亂在予仍獲咎徵其令大司農絕今歲調度徵求及前年所調未畢者勿復收責其灾旱盜賊之郡勿收租餘郡悉半入三月癸巳京師有火光轉行人相驚譟司隸豫州飢死者什四五至有滅戶者遣三府掾賑稟之陳留太守韋毅坐臧自殺夏四月濟陰東郡濟北平原河水清司徒許栩免五月太常胡廣為司徒六月南匈奴及烏桓鮮卑寇緣邊九郡秋七月沈氐羌寇武威張掖詔舉武猛三公各二人卿校尉各一人, WYG: ''}
