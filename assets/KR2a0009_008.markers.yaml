  - {type: variant, offset: 327, length: 0, content: '', WYG: 祀秋洛水溢冬十月癸丑令天下繫囚罪未决入縑贖十一月揚州刺史臧旻率丹陽太守陳夤大破許生於㑹稽斬之任城王博薨十二月鮮卑宼北地北地太守夏育追擊破之鮮卑又宼幷州司空唐珍罷永樂少府許訓爲司空四年春三月詔諸儒正五經文字刻石立于太學門外封河間王建孫佗為任城王建桓帝弟夏四月郡國七大水五月丁夘大赦天下延園陵災成帝陵也在今武陽縣西遣使者持節告祠延陵鮮卑宼幽州六月𢎞農三輔螟遣守宫令之鹽監穿渠為民興利前漢地理志及續漢郡國志並無鹽今蒲州安邑縣西南有鹽城劉攽曰注鹽城當作鹽池耳及無鹽字下當有一監字說文監字訓為鹽池然則注家案地志求鹽所在則無之二漢志不謂池為監也而據今所見則有池云令郡國遇災者減田租之半其傷害什四以上勿收責冬十月丁巳令天下繫囚罪未决入縑贖拜冲帝}
