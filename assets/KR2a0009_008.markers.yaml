  - {type: variant, offset: 1395, length: 2, content: 趙戒, WYG: 許􅖢罷太常楊賜爲太尉校獵上林苑歴函谷關遂廵狩于廣成苑十二月還幸太學六年春正月日南徼外國重譯貢獻二月復長陵縣比豐沛三月辛未大赦天下夏大旱秋金城河水溢五原山岸崩始置圃囿署以宦者為令冬東海東莱琅邪井中冰厚尺餘大有年中平元年春二月鉅鹿人張角自稱黄天其部師有三十六萬皆著黄巾同日反叛續漢書曰三十六萬餘人安平甘陵人各執其王以應之安平王續甘陵王忠三月戊申以河南尹何進為大將軍將兵屯都亭置八關都尉官都亭在洛陽八闗謂函谷廣城伊闕大谷轘轅旋門小平津孟津也壬子大赦天下黨人還諸徙者時中常侍吕彊言於帝曰黨錮久積若與黄巾合謀悔之無救帝懼皆赦之唯張角不赦詔公卿出馬弩舉列將子孫及吏民有明戰陣之畧者詣公車遣北中郎將盧植討張角左中郎將皇甫嵩右中郎將朱儁討潁川黄巾庚子南陽黄巾張曼成攻殺郡守褚貢夏四月太尉楊賜}
