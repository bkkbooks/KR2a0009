  - {type: variant, offset: 3608, length: 593, content: 七月司空盛允為司徒太常虞放為司空長沙蠻寇郡界九月太山琅邪賊勞丙等復叛寇掠百姓遣御史中丞趙某持節督州郡討之丁亥詔無事之官權絕奉豐年如故冬十一月日南蠻賊率衆詣郡降勒姐羌圍允街段熲擊破之太山賊叔孫無忌攻殺都尉侯章十二月遣中郎將宗資討破之武陵蠻寇江陵車騎將軍馮緄討皆降散荊州刺史度尚討長沙蠻平之四年春正月辛酉南宮嘉德殿火戊子丙署火大疫二月壬辰武庫火司徒盛允免大司農种暠為司徒三月省從右僕射官太尉黃瓊免夏四月太常劉矩為太尉甲寅封河閒王開子博為任城王五月辛酉有星孛于心丁卯原陵長壽門火己卯京師雨雹六月京兆扶風及涼州地震庚子岱山及博尤來山並穨裂己酉大赦天下司空虞放免前太尉黃瓊為司空犍為屬國夷寇鈔百姓益州刺史山昱擊破之零吾羌與先零諸種並叛寇三輔秋七月京師雩減公卿以下奉貣王侯半租占賣關內侯虎賁羽林緹騎營士五大夫錢各有差九月司空黃瓊免大鴻臚劉寵為司空冬十月天竺國來獻南陽黃武與襄城惠得昆陽樂季訞言相署皆伏誅先零沈氐羌與諸種羌寇并涼二州十一月中郎將皇甫規擊破之十二月夫餘王遣使來獻五年春正月省太官右監丞壬午南宮丙署火三月沈氐羌寇張掖酒泉壬午濟北王次薨夏四月長沙賊起寇桂陽蒼梧驚馬逸象突入宮殿乙丑恭陵東闕火戊辰虎賁掖門火己巳太學西門自壞五月康陵園寑火長沙零陵賊起攻桂陽蒼梧南海交阯遣御史中丞盛脩督州郡討之不克乙亥京師地震詔公卿各上封事甲申中藏府承祿署火秋七月己未南宮承善闥火鳥吾羌寇漢陽隴西金城諸郡兵討破之, WYG: ''}
