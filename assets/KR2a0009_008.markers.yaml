  - {type: variant, offset: 5693, length: 0, content: '', WYG: 大赦天下改元為光熹封皇弟協為渤海王後將軍袁隗為太傅與大將軍何進參録尚書事上軍校尉蹇碩下獄時蹇碩謀欲立渤海王協發覺劉攽曰正文蹇碩下獄案碩以此時誅明少一死字五月辛巳驃騎將軍董重下獄死董重皇后之弟子也六月辛亥孝仁皇后董氏崩辛酉𦵏孝靈皇帝于文陵在洛陽西北三十里陵髙十二文周回三百步雨水秋七月甘陵王忠薨庚寅孝仁皇后歸葬河間愼陵徙渤海王協為陳留王司徒丁宫罷八月戊辰中常侍張讓段珪等殺大將軍何進於}
