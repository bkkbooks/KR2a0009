  - {type: variant, offset: 5509, length: 160, content: 申京師及上黨地裂廬江賊起寇郡界壬子晦日有食之詔公卿校尉舉賢良方正六月庚申大赦天下悉除黨錮改元永康丙寅阜陵王統薨秋八月魏郡言嘉禾生甘露降巴郡言黃龍見六忖水勃海海溢詔州郡賜溺死者七歲以上錢人二千一家皆被害者悉為收斂其亡失穀食稟人三斛冬十月先零羌寇三輔使匈奴中郎將張奐擊破之十一月西河言白菟見十二月壬申復癭廮陶王悝為勃海王丁丑, WYG: 辰}
