  - {type: variant, offset: 19, length: 0, content: '', krp: 故反應規矩之淑質兮過班倕而裁之公輸班魯人也倕舜時為共工之言皆巧人也以喻湯及高宗也協準矱之貞度兮同斷金之𤣥䇿準繩也矱尺也貞正也易曰二人同心其利斷金𤣥䇿猶妙䇿也何天衢於盛世兮超千載而垂績易大畜卦乾下艮上其上九曰何天之衢亨鄭𤣥云艮為手手上肩也乾為首首肩之間荷物處乾為天艮為徑路天衢象也豈脩德之極致兮將天祚之攸適愍余生之不造兮造成也丁漢氏之中微丁當也氛霓鬱以横厲兮羲和忽以濳暉氛祲也霓日傍之氣横厲謂氣盛而陵於天也羲和日也氣盛而日光微喻王莽簒漢六柄制於家門兮王綱漼以陵遲國語管仲對齊桓公曰昔者聖人之理天下也而慎用其六柄焉韋昭注云六柄生殺貧賤富貴也漼猶摧落也音千隗反黎共奮以跋扈兮羿浞狂以恣雎國語曰昔少皥之衰九黎亂德人神雜揉不可方物淮南子曰昔者共工與顓頊爭為帝怒而觸不周之山天柱折地維絶跋扈強梁也恣雎自用之貌也恣音訾雎音許維反羿浞己見上睹嫚臧而乘釁兮竊神器之萬機易曰嫚藏誨盗釁隙也神器帝王之位老子曰天下神器不可為也書云兢兢業業一日二日萬機思輔弼以媮存兮亦號咷以詶咨輔弼謂王莽輔政也媮茍且也號咷哀呼也前書王莽䇿孺子嬰為定安公莽親執孺子手流涕歔欷也嗟三事之我負兮乃廹余以天威三事謂三公也負謂太保甄豐舉也豈無熊僚之微介兮悼我生之殱夷左傳曰楚白公勝為亂石乞曰市南有熊相宜僚者若得之可以當五百人矣從白公而見之與之言説告之故辭承之以劒不動勝曰不為利謟不為威惕不泄人言以求媚者去之介耿介也我生謂母也殱滅也夷傷也言其母老恐禍及也庶眀哲之末風兮懼大雅之所譏詩大雅曰既眀且哲以保其身遂翕翼以委命兮受符守乎艮維艮東北之位謂篆為千乘太守也恨遭閉而不隱兮違石門之高蹤易曰天地閉而賢人隱論語曰子路宿於石門晨門曰奚自子路曰自孔氏曰是知其不可而為之者歟揚蛾眉於復關兮犯孔戒之冶容楚詞曰衆女皆妒余之蛾眉詩國風序曰氓刺時也淫風大行男女無别故序其事以風焉其詩曰乘彼垝垣以望復關毛萇注云垝毁也復關君子所近之處也易繫辭曰冶容誨淫鄭𤣥云謂飾其容而見於外曰冶懿氓蚩之悟悔兮慕白駒之所從詩曰氓之蚩蚩抱布貿絲匪來貿絲來即我謀注云氓人也蚩蚩殷厚之貌布幣也即就也言此之人非買絲來就我為室家也又曰及爾偕老老使我怨注云我欲與汝俱至老汝反薄我使怨也又曰皎皎白駒喻賢人也乃稱疾而屢復兮歴三祀而見許復猶白也悠輕舉以逺遁兮託峻峗以幽處峻峗謂山也峗音魚委反竫潛思於至賾兮騁六經之奥府賾深也皇再命而紹䘏兮乃云眷乎建武皇天也紹繼也䘏憂也言天憂䘏眷顧漢家所以再命光武也運欃槍以電掃兮清六合之土宇欃槍彗也聖德滂以横被兮黎庶愷以鼓舞闢四門以博延兮彼幽牧之我舉開闢四方之門廣求賢也幽牧謂為幽州刺史所舉也分畫定而計決兮豈云賁乎鄙耉賁飾也易曰束帛戔戔賁於丘園也遂縣車以縶馬兮絶時俗之進取歎暮春之成服兮闔衡門以掃軌論語曽㸃曰暮春者春服既成衡横也謂横木為門軌跡也聊優游以永日兮守性命以盡齒齒年也貴啟體之歸全兮庶不忝乎先子論語曰曾子有疾召門弟子曰啟予足注云父母全而生之亦當全而歸之忝辱也先子謂先人也孟子曾西曰吾先子之所畏也篆生毅以疾隱身不仕毅生駰年十三能通詩易春秋博學有偉才盡通古今訓詁百家之言善屬文少游太學與班固傅毅同時齊名常以典籍為業未遑仕進之事時人或譏其太𤣥靜將以後名失實駰擬揚雄解嘲作達㫖以荅焉華嶠書曰駰譏揚雄以為范蔡鄒衍之徒乘釁相傾誑曜諸侯者也而云彼我異時又曰竊貲卓氏割炙細君斯蓋士之贅行而云不能與此數公者同以為失類而改之也其辭曰或説己曰易稱備物致用可觀而有所合故能扶陽以出順隂而入備物致用易繫辭之文也可觀而有所合序卦之文也鄭𤣥注易乾鑿度曰陽起於子隂起於午天數大分以陽出離以隂入坎坎為中男離為中女太乙之行出從中男入從中女因隂陽男女之偶為終始也春發其華秋收其實有始有極爰登其質今子韞櫝六經服膺道術韞匣也櫝匱也論語曰有美玉韞櫝而藏諸歴世而游髙談有日俯鉤深於重淵仰探逺乎九乾易曰探賾索隱鉤深致逺九乾謂天有九重也離騷天問曰圓則九重孰營度之窮至賾於幽微測潛隱之無源然下不歩卿相之廷上不登王公之門進不黨以讚已退不黷於庸人讃猶稱也獨師友道德合符曩真抱景特立與士不羣葢高樹靡隂獨木不林隨時之宜道貴從凡華嶠書作高樹不庇易曰隨時之義大矣哉老子曰和其光而同其塵故言道貴從凡於時太上運天德以君世憲王僚而布官太上明帝也傳曰太上立德天徳含𢎞光大也易曰乃位乎天德尚書曰唐虞稽古建官惟百夏啇官倍亦克用乂憲法也僚官也言法三王而建官也臨雍泮以恢儒疏軒冕以崇賢天子辟雍諸侯頖宫璧雍者環之以水圎而加璧也頖半也諸侯半天子之宫皆所以立學垂教也率惇德以厲忠孝揚茂化以砥仁義砥礪也選利器於良材求鏌鋣於明智吳越春秋曰干將吳人也造二劒一曰干將二曰莫邪莫邪者干將之妻名也干將作劒采五山之精合六金之英百神臨觀遂以成劒説苑曰所以尚干將莫邪者貴其立斷所以尚騏驥者貴其立至必且歴日曠久絲氂猶能栔石駑馬亦能致逺是以聰明敏㨗人之美材也不以此時攀台階闚紫闥三台謂之三階三公之象也據高軒望朱闕夫欲千里而咫尺未發八寸曰咫蒙竊惑焉故英人乘斯時也文子曰智過萬人謂之英千人謂之俊猶逸禽之赴深林蝱蚋之趣大沛蚋小蟲蚊之類蚋音芮説文曰秦謂之蚋楚謂之蚊孟子曰汚池沛澤}
  - {type: variant, offset: 20, length: 0, content: '', WYG: 熙曰沛水草相半胡為嘿嘿而乆沉滯也荅曰有是言乎子茍欲勉我以世路不知其跌而失吾之度也古者隂陽始分天地初制制協韻音之設反皇綱云緒帝紀乃設傳序歴數三代興滅昔大庭尚矣赫胥罔識大庭赫胥並古帝王號也尚逺也罔無也識記也淳樸散離人物錯乖高辛攸降厥趣各違高辛氏帝嚳也道無常稽與時張弛隨時弛張不考之於常道也失仁為非得義為是老子曰失道後德失德後仁失仁後義失義後禮君子通變各審所履故士或掩目而淵潛荘子曰北人無澤與舜為友舜以天下讓之無澤乃自投清泠之淵終身不反也或盥耳而山棲盥洗也許由字武仲隱於沛澤之中堯聞之乃致天下而讓}
