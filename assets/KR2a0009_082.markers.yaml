  - {type: variant, offset: 98, length: 2, content: 禁且, WYG: 純法八世故宜參以霸政八世謂三皇五帝也霸政謂齊桓晉文也劉攽曰純法八世案文世當作代説己見前則宜重賞深罰以御之眀著法術以檢之自非上德嚴之則理寛之則亂何以眀其然也近孝宣皇帝眀於君人之道審於為政之理故嚴刑峻法破姦軌之膽海内清肅天下密如密靜也薦勲祖廟享號中宗算計見效優於孝文元帝即位多行寛政卒以墮損墮讀曰隳威權始奪遂為漢室基禍之主政道得失於斯可監昔孔子作春秋襃齊桓懿晉文歎管仲之功夫豈不美文武之道哉誠達權救敝之理也左傳齊桓公伐楚責以包茅不貢王祭不供晉文公召王盟諸侯於踐土管仲相公子紏而射桓公此並權變之道也故聖人能與世推移而俗士苦不知變楚詞漁父曰聖人不凝滯於物而與時推移也以為結繩之約可復理亂秦之緒干戚之舞足以解平城之圍易曰上古結繩而化後世聖人易之以書契干盾也戚鉞也尚書曰苖人逆命禹乃舞干羽於兩階七旬有苖格前書高祖被匈奴圍於平城}
