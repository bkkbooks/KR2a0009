  - {type: variant, offset: 37, length: 0, content: '', WYG: 之與扶風馬融南陽張衡特相友好初瑗兄章為州人所殺瑗手刃報仇因亡命㑹赦歸家家貧兄弟同居數十年鄉邑化之年四十餘始為郡吏以事繫東郡發干獄發干縣之獄也獄掾善為禮瑗間考訊}
