  - {type: variant, offset: 101, length: 0, content: '', WYG: 陳平計得解言干戚之舞}
  - {type: variant, offset: 101, length: 0, content: '', krp: 陳平計得解言干戚之舞}
  - {type: variant, offset: 102, length: 0, content: '', WYG: 平城之所用也夫熊經鳥伸雖延歴之術非傷寒之理呼吸吐納雖度紀之道非續骨之膏莊子曰吹呴呼吸吐故納新熊經鳥伸此導引之士養形之人也黄帝素問曰人傷於寒而轉為熱何也夫寒盛則生於熱也度紀猶延年也言鳥伸不可療傷寒吸氣不能續斷骨也蓋為國之法有似理身平則養疾則攻焉夫刑罰者治亂之藥石也德教者興平之粱肉也夫以德教除殘是以粱肉理疾也以刑罰理平是以藥石供養也方今承百王之敝値戹運之㑹自數世以來政多恩貸馭委}
