  - {type: variant, offset: 2505, length: 190, content: 命櫜弓戢戈當謂使君與國同規而舍是弗恤完然有自取之志懼非海內企望之意也成湯討桀稱有夏多罪武王伐紂曰殷有重罰此二王者雖有聖德假使時無失道之過無由逼而取也今主上非有惡於天下徒以幼子脅於彊臣異於湯武之時也又聞幼主明智聰敏有夙成之德天下雖未被其恩咸歸心焉若輔而興之則旦奭之美率土所望也使君五世相承為漢宰輔榮寵之盛莫與為比宜効忠守節以報王室時人多惑圖緯之言妄牽非類之文苟以悅主為美不顧成敗之計, WYG: 水旁}
