  - {type: variant, offset: 2731, length: 3166, content: 年因河內張炯符命遂果僭號自稱仲家以九江太守為淮南尹置公卿百官郊祀天地乃遣使以竊號告呂布并為子娉布女布執術使送許術大怒遣其將張勳橋蕤攻布大敗而還術又率兵擊陳國誘殺其王寵及相駱俊曹操乃自征之術聞大駭即走度淮留張勳橋蕤於蘄陽以拒操操擊破斬蕤而勳退走術兵弱大將死衆情離叛加天旱歲荒士民凍餒江淮閒相食殆盡時舒仲應為術沛相術以米十萬斛與為軍糧仲應悉散以給飢民術聞怒陳兵將斬之仲應曰知當必死故為之耳寧可以一人之命救百姓於塗炭術下馬牽之曰仲應足下獨欲享天下重名不與吾共之邪術雖矜名尚奇而天性驕肆尊己陵物及竊偽號淫侈滋甚媵御數百無不兼羅紈厭粱肉自下飢困莫之簡卹於是資實空盡不能自立四年夏乃燒宮室奔其部曲陳簡雷薄於山復為簡等所拒遂大困窮士卒散走憂懣不知所為遂歸帝號於紹曰祿去漢室久矣天下提挈政在家門豪雄角逐分割疆宇此與周末七國無異唯彊者兼之耳袁氏受命當王符瑞炳然今君擁有四州人戶百萬以彊則莫與爭大以位則無所比高曹操雖欲扶衰奬微安能續絕運起已滅乎謹歸大命君其興之紹陰然其計術因欲北至青州從袁譚曹操使劉備徼之不得過復走還壽春六月至江亭坐簀牀而歎曰袁術乃至是乎因憤慨結病歐血死妻子依故吏廬江太守劉勳孫策破勳復見收視術女入孫權宮子曜仕吳為郎中論曰天命符驗可得而見未可得而言也然大致受大福者歸於信順乎夫事不以順雖彊力廣謀不能得也謀不可得之事日失忠信變詐妄生矣況復苟肆行之其以欺天乎雖假符僭稱歸將安所容哉呂布字奉先五原九原人也以弓馬驍武給并州刺史丁原為騎都尉原屯河內以布為主簿甚見親待靈帝崩原受何進召將兵詣洛陽為執金吾會進敗董卓誘布殺原而并其兵卓以布為騎都尉誓為父子甚愛信之稍遷至中郎將封都亭侯卓自知凶恣每懷猜畏行止常以布自衞嘗小失卓意卓拔手戟擲之布拳捷得免而改容顧謝卓意亦解布由是陰怨於卓卓又使布守中閤而私與傅婢情通益不自安因往見司徒王允自陳卓幾見殺之狀時允與尚書僕射士孫瑞密謀誅卓因以告布使為內應布曰如父子何曰君自姓呂本非骨肉今憂死不暇何謂父子擲戟之時豈有父子情也布遂許之乃於門刺殺卓事已見卓傳允以布為奮威將軍假節儀同三司封溫侯允既不赦涼州人由是卓將李傕等遂相結還攻長安布與傕戰敗乃將數百騎以卓頭繫馬鞌走出武關奔南陽袁術待之甚厚布自恃殺卓有德袁氏遂恣兵鈔掠術患之布不安復去從張楊於河內時李傕等購募求布急楊下諸將皆欲圖之布懼謂楊曰與卿州里今見殺其功未必多不如生賣布可大得傕等爵寵楊以為然有頃布得走投袁紹紹與布擊張燕於常山燕精兵萬餘騎數千匹布常御良馬號曰赤菟能馳城飛塹與其健將成廉魏越等數十騎馳突燕陣一日或至三四皆斬首而出連戰十餘日遂破燕軍布既恃其功更請兵於紹紹不許而將士多暴橫紹患之布不自安因求還洛陽紹聽之承制使領司隸校尉遣壯士送布而陰使殺之布疑其圖己乃使人鼓箏於帳中潛自遁出夜中兵起而布已亡紹聞懼為患募遣追之皆莫敢逼遂歸張楊道經陳留太守張邈遣使迎之相待甚厚臨別把臂言誓邈字孟卓東平人少以俠聞初辟公府稍遷陳留太守董卓之亂與曹操共舉義兵及袁紹為盟主有驕色邈正義責之紹既怨邈且聞與布厚乃令曹操殺邈操不聽然邈心不自安興平元年曹操東擊陶謙令其將武陽人陳宮屯東郡宮因說邈曰今天下分崩雄桀並起君擁十萬之衆當四戰之地撫劒顧眄亦足以為人豪而反受制不以鄙乎今州軍東征其處空虛呂布壯士善戰無前迎之共據兗州觀天下形埶俟時事變通此亦從橫一時也邈從之遂與弟超及宮等迎布為兗州牧據濮陽郡縣皆應之曹操聞而引軍擊布累戰相持百餘日是時旱蝗少穀百姓相食布移屯山陽二年閒操復盡收諸城破布於鉅野布東奔劉備邈詣袁術求救留超將家屬屯雍丘操圍超數月屠之滅其三族邈未至壽春為其兵所害時劉備領徐州居下邳與袁術相拒於淮上術欲引布擊備乃與布書曰術舉兵詣闕未能屠裂董卓將軍誅卓為術報恥功一也昔金元休南至封丘為曹操所敗將軍伐之令術復明目於遐邇功二也術生年以來不聞天下有劉備備乃舉兵與術對戰憑將軍威靈得以破備功三也將軍有三大功在術術雖不敏奉以死生將軍連年攻戰軍糧苦少今送米二十萬斛非唯此止當駱驛復致凡所短長亦唯命布得書大悅即勒兵襲下邳獲備妻子備敗走海西飢困請降於布布又恚術運糧不復至乃具車馬迎備以為豫州刺史遣屯小沛布自號徐州牧術懼布為己害為子求婚布復許之術遣將紀靈等步騎三萬以攻備備求救於布諸將謂布曰將軍常欲殺劉備今可假手於術布曰不然術若破備則北連太山吾為在術圍中不得不救也便率步騎千餘馳往赴之靈等聞布至皆斂兵而止布屯沛城外遣人招備并請靈等與共饗飲布謂靈曰玄德布弟也為諸君所困故來救之布性不喜合鬬但喜解鬬耳乃令軍候植戟於營門布彎弓顧曰諸君觀布射戟小支中者當各解兵不中可留決鬬布即一發正中戟支靈等皆驚言將軍天威也明日復歡會然後各罷術遣韓胤以僭號事告布因求迎婦布遣女隨之沛相陳珪恐術報布成姻則徐楊合從為難未已於是往說布曰曹公奉迎天子輔贊國政將軍宜與協同策謀共存大計今與袁術結姻必受不義之名將有累卵之危矣布亦素怨術而女已在塗乃追還絕婚執胤送許曹操殺之陳珪欲使子登詣曹操布固不許會使至拜布為左將軍布大喜即聽登行并令奉章謝恩登見曹操因陳布勇而無謀輕於去就宜早圖之操曰布狼子野心誠難久養非卿莫究其情偽即增珪秩中二千石拜登廣陵太守臨別操執登手曰東方之事便以相付令陰合部衆以為內應始布因登求徐州牧不得登還布怒拔戟斫机曰卿父勸吾協同曹操絕婚公路今吾所求無獲而卿父子並顯重但為卿所賣耳登不為動容徐對之曰登見曹公言養將軍譬如養虎當飽其肉不飽則將噬人公曰不如卿言譬如養鷹飢即為用飽則颺去其言如此布意乃解袁術怒布殺韓胤遣其大將張勳橋蕤等與韓暹楊奉連埶步騎數萬七道攻布布時兵有三千馬四百匹懼其不敵謂陳珪曰今致術軍卿之由也為之柰何珪曰暹奉與術卒合之師耳謀無素定不能相維子登策之比於連雞埶不俱棲立可離也布用珪策與暹奉書曰二將軍親拔大駕而布手殺董卓俱立功名當垂竹帛今袁術造逆宜共誅討柰何與賊還來伐布可因今者同力破術為國除害建功天下此時不可失也又許破術兵悉以軍資與之暹奉大喜遂共擊勳等於下邳大破之生禽橋蕤餘衆潰走其所殺傷墯水死者殆盡時太山臧霸等攻破莒城許布財幣以相結而未及送布乃自往求之其督將高順諫止曰將軍威名宣播遠近所畏何求不得而自行求賂萬一不剋豈不損邪布不從既至莒霸等不測往意固守拒之無獲而還順為人清白有威嚴少言辭將衆整齊每戰必剋布性決易所為無常順每諫曰將軍舉動不肯詳思忽有失得動輒言誤誤事豈可數乎布知其忠而不能從建安三年布遂復從袁術遣順攻劉備於沛破之曹操遣夏侯惇救備為順所敗操乃自將擊布至下邳城下遺布書為陳禍福布欲降而陳宮等自以負罪於操深沮其計而謂布曰曹公遠來埶不能久將軍若以步騎出屯於外宮將餘衆閉守於內若向將軍宮引兵而攻其背若但攻城則將軍救於外不過旬月軍食畢盡擊之可破也布然之布妻曰昔曹氏待公臺如赤子猶舍而歸我今將軍厚公臺不過於曹氏而欲委全城捐妻子孤軍遠出乎若一旦有變妾豈得為將軍妻哉布乃止而潛遣人求救於袁術自將千餘騎出戰敗走還保城不敢出術亦不能救曹操圍之壅沂泗以灌其城三月上下離心其將侯成使客牧其名馬而客策之以叛成追客得馬諸將合禮以賀成成分酒肉先入詣布而言曰蒙將軍威靈得所亡馬諸將齊賀未敢嘗也故先以奉貢布怒曰布禁酒而卿等醞釀為欲因酒共謀布邪成忿懼乃與諸將共執陳宮高順率其衆降布與麾下登白門樓兵圍之急令左右取其首詣操左右不忍乃下降布見操曰今日已往天下定矣操曰何以言之布曰明公之所患不過於布今已服矣令布將騎明公將步天下不足定也顧謂劉備曰玄德卿為坐上客我為降虜繩縛我急獨不可一言邪操笑曰縛虎不得不急乃命緩布縛劉備曰不可明公不見呂布事丁建陽董太師乎操頷之布目備曰大耳兒最叵信操謂陳宮曰公臺平生自謂智有餘今意何如宮指布曰是子不用宮言以至於此若見從未可量也操又曰柰卿老母何宮曰老母在公不在宮也夫以孝理天下者不害人之親操復曰柰卿妻子何宮曰宮聞霸王之主不絕人之祀固請就刑遂出不顧操為之泣涕布及宮順皆縊殺之傳首許市贊曰焉作庸牧以希後福曷云負荷地墮身逐術既叨貪布亦飜覆, WYG: 考證}
  - {type: variant, offset: 2731, length: 3166, content: 年因河內張炯符命遂果僭號自稱仲家以九江太守為淮南尹置公卿百官郊祀天地乃遣使以竊號告呂布并為子娉布女布執術使送許術大怒遣其將張勳橋蕤攻布大敗而還術又率兵擊陳國誘殺其王寵及相駱俊曹操乃自征之術聞大駭即走度淮留張勳橋蕤於蘄陽以拒操操擊破斬蕤而勳退走術兵弱大將死衆情離叛加天旱歲荒士民凍餒江淮閒相食殆盡時舒仲應為術沛相術以米十萬斛與為軍糧仲應悉散以給飢民術聞怒陳兵將斬之仲應曰知當必死故為之耳寧可以一人之命救百姓於塗炭術下馬牽之曰仲應足下獨欲享天下重名不與吾共之邪術雖矜名尚奇而天性驕肆尊己陵物及竊偽號淫侈滋甚媵御數百無不兼羅紈厭粱肉自下飢困莫之簡卹於是資實空盡不能自立四年夏乃燒宮室奔其部曲陳簡雷薄於山復為簡等所拒遂大困窮士卒散走憂懣不知所為遂歸帝號於紹曰祿去漢室久矣天下提挈政在家門豪雄角逐分割疆宇此與周末七國無異唯彊者兼之耳袁氏受命當王符瑞炳然今君擁有四州人戶百萬以彊則莫與爭大以位則無所比高曹操雖欲扶衰奬微安能續絕運起已滅乎謹歸大命君其興之紹陰然其計術因欲北至青州從袁譚曹操使劉備徼之不得過復走還壽春六月至江亭坐簀牀而歎曰袁術乃至是乎因憤慨結病歐血死妻子依故吏廬江太守劉勳孫策破勳復見收視術女入孫權宮子曜仕吳為郎中論曰天命符驗可得而見未可得而言也然大致受大福者歸於信順乎夫事不以順雖彊力廣謀不能得也謀不可得之事日失忠信變詐妄生矣況復苟肆行之其以欺天乎雖假符僭稱歸將安所容哉呂布字奉先五原九原人也以弓馬驍武給并州刺史丁原為騎都尉原屯河內以布為主簿甚見親待靈帝崩原受何進召將兵詣洛陽為執金吾會進敗董卓誘布殺原而并其兵卓以布為騎都尉誓為父子甚愛信之稍遷至中郎將封都亭侯卓自知凶恣每懷猜畏行止常以布自衞嘗小失卓意卓拔手戟擲之布拳捷得免而改容顧謝卓意亦解布由是陰怨於卓卓又使布守中閤而私與傅婢情通益不自安因往見司徒王允自陳卓幾見殺之狀時允與尚書僕射士孫瑞密謀誅卓因以告布使為內應布曰如父子何曰君自姓呂本非骨肉今憂死不暇何謂父子擲戟之時豈有父子情也布遂許之乃於門刺殺卓事已見卓傳允以布為奮威將軍假節儀同三司封溫侯允既不赦涼州人由是卓將李傕等遂相結還攻長安布與傕戰敗乃將數百騎以卓頭繫馬鞌走出武關奔南陽袁術待之甚厚布自恃殺卓有德袁氏遂恣兵鈔掠術患之布不安復去從張楊於河內時李傕等購募求布急楊下諸將皆欲圖之布懼謂楊曰與卿州里今見殺其功未必多不如生賣布可大得傕等爵寵楊以為然有頃布得走投袁紹紹與布擊張燕於常山燕精兵萬餘騎數千匹布常御良馬號曰赤菟能馳城飛塹與其健將成廉魏越等數十騎馳突燕陣一日或至三四皆斬首而出連戰十餘日遂破燕軍布既恃其功更請兵於紹紹不許而將士多暴橫紹患之布不自安因求還洛陽紹聽之承制使領司隸校尉遣壯士送布而陰使殺之布疑其圖己乃使人鼓箏於帳中潛自遁出夜中兵起而布已亡紹聞懼為患募遣追之皆莫敢逼遂歸張楊道經陳留太守張邈遣使迎之相待甚厚臨別把臂言誓邈字孟卓東平人少以俠聞初辟公府稍遷陳留太守董卓之亂與曹操共舉義兵及袁紹為盟主有驕色邈正義責之紹既怨邈且聞與布厚乃令曹操殺邈操不聽然邈心不自安興平元年曹操東擊陶謙令其將武陽人陳宮屯東郡宮因說邈曰今天下分崩雄桀並起君擁十萬之衆當四戰之地撫劒顧眄亦足以為人豪而反受制不以鄙乎今州軍東征其處空虛呂布壯士善戰無前迎之共據兗州觀天下形埶俟時事變通此亦從橫一時也邈從之遂與弟超及宮等迎布為兗州牧據濮陽郡縣皆應之曹操聞而引軍擊布累戰相持百餘日是時旱蝗少穀百姓相食布移屯山陽二年閒操復盡收諸城破布於鉅野布東奔劉備邈詣袁術求救留超將家屬屯雍丘操圍超數月屠之滅其三族邈未至壽春為其兵所害時劉備領徐州居下邳與袁術相拒於淮上術欲引布擊備乃與布書曰術舉兵詣闕未能屠裂董卓將軍誅卓為術報恥功一也昔金元休南至封丘為曹操所敗將軍伐之令術復明目於遐邇功二也術生年以來不聞天下有劉備備乃舉兵與術對戰憑將軍威靈得以破備功三也將軍有三大功在術術雖不敏奉以死生將軍連年攻戰軍糧苦少今送米二十萬斛非唯此止當駱驛復致凡所短長亦唯命布得書大悅即勒兵襲下邳獲備妻子備敗走海西飢困請降於布布又恚術運糧不復至乃具車馬迎備以為豫州刺史遣屯小沛布自號徐州牧術懼布為己害為子求婚布復許之術遣將紀靈等步騎三萬以攻備備求救於布諸將謂布曰將軍常欲殺劉備今可假手於術布曰不然術若破備則北連太山吾為在術圍中不得不救也便率步騎千餘馳往赴之靈等聞布至皆斂兵而止布屯沛城外遣人招備并請靈等與共饗飲布謂靈曰玄德布弟也為諸君所困故來救之布性不喜合鬬但喜解鬬耳乃令軍候植戟於營門布彎弓顧曰諸君觀布射戟小支中者當各解兵不中可留決鬬布即一發正中戟支靈等皆驚言將軍天威也明日復歡會然後各罷術遣韓胤以僭號事告布因求迎婦布遣女隨之沛相陳珪恐術報布成姻則徐楊合從為難未已於是往說布曰曹公奉迎天子輔贊國政將軍宜與協同策謀共存大計今與袁術結姻必受