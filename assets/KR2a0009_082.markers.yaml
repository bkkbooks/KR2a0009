  - {type: variant, offset: 35, length: 1, content: 肅, WYG: 蓋在滿而不挹位有餘而仁不足也漢興以後迄於哀平外家二十保族全身四人而已外家當為后家也二十者謂高帝吕后産禄謀反誅惠帝張皇后廢文帝母薄太后弟昭被殺孝文帝竇皇后從昆弟子嬰誅景帝薄皇后武帝陳皇后並廢衛皇后自殺昭帝上官皇后家族誅宣帝祖母史良娣為巫蠱死宣帝母王夫人弟子商下獄死霍皇后家破元帝王皇后弟王莽簒位成帝許皇后賜死趙皇后廢自殺哀帝祖母傅太后家屬徙合浦平帝母衛姬家屬誅昭帝趙太后憂死是也四人者哀帝母丁姬景帝王皇后宣帝許皇后王皇后其家族並全書曰鑒於有殷可不慎哉竇氏之興肇自孝文二君以淳淑守道成名先曰竇太后之弟長君少君退讓君子不敢以富貴驕人故云淳淑守道也安豐以佐命著徳顯自中興竇融封為安豐侯内以忠誠自固外以法度自守卒享祚國垂祉於今夫謙德之光周易所羙滿溢之位道家所戒易曰謙尊而光卑而不可踰老子曰富貴而驕自遺其咎功成名遂而身退天之道也故君子福大而愈懼爵隆而益恭逺察近覽俯仰有則銘諸几杖刻諸盤杅太公金匱曰武王曰吾欲造起居之誡隨之以身几之書曰安無忘危存無忘亡孰惟二者必後無凶杖之書曰輔人無茍扶人無咎墨子曰堯舜禹湯書其事於竹帛琢之盤盂杅亦盂也矜矜業業無怠無荒如此則百福是荷慶流無窮矣及憲為車騎將軍辟駰為掾憲府貴重掾屬三十人皆故刺史二千石唯駰以處士年少擢在其間憲擅權驕恣駰數諌之及出擊匈奴道路愈多不法駰為主簿前後奏記數十指切長短憲不能容稍疏之因察駰高第出為長岑長長岑縣屬樂浪郡其地在遼東駰自以逺去不得意遂不之官而歸永元四年卒於家所著詩賦銘頌書記表七依婚禮結言達㫖酒警合二十一篇中子瑗瑗字子玉早孤鋭志好學盡能傳其父業年十八至亰師從侍中賈逵質正大義逵善待之瑗因留游學遂明天官歴數亰房易傳六日七分解見郎顗傳諸儒}
