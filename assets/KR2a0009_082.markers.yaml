  - {type: variant, offset: 1205, length: 8, content: 米賊陵傳子衡衡傳, WYG: 具五刑文帝雖除肉刑當劓者笞三百當斬左趾者笞五百當斬右趾者棄市右趾者既殞其命笞撻者往往至死雖有輕刑之名其實殺也當此之時民皆思復肉刑至景帝元年乃下詔曰加笞與重罪無異幸而不死不可為民乃定律減笞輕捶自是之後笞者得全此以上並見前書刑法志以此言之文帝乃重刑非輕之也以嚴致平非以寛致平也必欲行若言當大定其本使人主師五帝而式三王式法也盪亡秦之俗遵先聖之風棄苟全之政蹈稽古之蹤復五等之爵立井田之制畝百為夫九夫為井然後選稷契為佐伊吕為輔樂作而鳳皇儀擊石而百獸舞尚書曰簫韶九成鳯皇來儀又䕫曰}
