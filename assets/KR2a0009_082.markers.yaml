  - {type: variant, offset: 409, length: 517, content: 衆焉欲立威刑以自尊大乃託以佗事殺州中豪彊十餘人士民皆怨初平二年犍為太守任岐及賈龍並反攻焉焉擊破皆殺之自此意氣漸盛遂造作乘輿車重千餘乘焉四子範為左中郎將誕治書御史璋奉車都尉並從獻帝在長安唯別部司馬瑁隨焉在益州朝廷使璋曉譬焉焉留璋不復遣興平元年征西將軍馬騰與範謀誅李傕焉遣叟兵五千助之戰敗範及誕並見殺焉既痛二子又遇天火燒其城府車重延及民家館邑無餘於是徙居成都遂疽發背疽卒州大吏趙韙等貪璋溫仁立為刺史詔書因以璋為監軍使者領益州牧以韙為征東中郎將先是荊州牧劉表表焉僭擬乘輿器服韙以此遂屯兵朐備表初南陽三輔民數萬戶流入益州焉悉收以為衆名曰東州兵璋性柔寬無威略東州人侵暴為民患不能禁制舊士頗有離怨趙韙之在巴中甚得衆心璋委之以權韙因人情不輯乃陰結州中大姓建安五年還共擊璋蜀郡廣漢犍為皆反應東州人畏見誅滅乃同心并力為璋死戰遂破反者進攻韙於江州斬之張魯以璋闇懦不復承順璋怒殺魯母及弟而遣其將龐羲等攻魯數為所破魯部曲多在巴土故以羲為巴郡太守魯因襲取之遂雄於巴漢十三年曹操自將征荊州璋乃遣使致敬操加璋振威將軍兄瑁平寇將軍璋因遣別駕從事張松詣操而操不相接禮松懷恨而還勸璋絕曹氏而結好劉備璋從之十六年璋聞曹操當遣兵向漢中討張魯內懷恐懼松復說璋迎劉備以拒操璋即遣, WYG: 德}
