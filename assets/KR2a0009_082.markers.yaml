  - {type: 'tls:seg', offset: 2095, content: '', id: KR2a0009_ZHSJ_082-d82p22s8}
  - {type: variant, offset: 2095, length: 409, content: 又少見識書言代漢者當塗高自云名字應之又以袁氏出陳為舜後以黃代赤德運之次遂有僭逆之謀又聞孫堅得傳國璽遂拘堅妻奪之興平二年冬天子播越敗於曹陽術大會群下因謂曰今海內鼎沸劉氏微弱吾家四世公輔百姓所歸欲應天順民於諸君何如衆莫敢對主簿閻象進曰昔周自后稷至于文王積德累功參分天下猶服事殷明公雖奕世克昌孰若有周之盛漢室雖微未至殷紂之敝也術嘿然使召張範範辭疾遣弟承往應之術問曰昔周室陵則有桓文之霸秦失其政漢接而用之今孤以土地之廣士人之衆欲徼福於齊桓擬迹於高祖可乎承對曰在德不在衆苟能用德以同天下之欲雖云匹夫霸王可也若陵僭無度干時而動衆之所𠫓廾誰能興之術不說自孫堅死子策復領其部曲術遣擊楊州刺史劉繇破之策因據江東策聞術將欲僭號與書諫曰董卓無道陵虐王室禍加太后暴及弘農天子播越宮廟焚毀是以豪桀發憤沛然俱起元惡既斃幼主東顧乃使王人奉命宣明朝恩偃武修文與之更始然而河北異謀於黑山曹操毒被於東徐劉表僭亂於南荊公孫叛逆於朔北正禮阻兵玄德爭盟是以未獲, WYG: 寳}
