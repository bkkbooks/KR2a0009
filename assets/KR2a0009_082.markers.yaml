  - {type: variant, offset: 16, length: 0, content: '', WYG: 四十二崔駰傳子瑗孫實崔駰字亭伯涿郡安平人也高祖父朝昭帝時為幽州從事諌刺史無與燕刺王通及刺王敗擢為侍御史燕刺王旦武帝子坐與上官桀等謀亂自殺刺力割反生子舒歴四郡太守所在有能名舒小子篆王莽時為郡文學以眀經徴詣公車太保甄豐舉為歩兵校尉篆辭曰吾聞伐國不問仁人前書董仲舒曰昔在魯君問栁下惠曰吾欲伐齊如何栁下惠曰不可歸而有憂色曰吾聞伐國不問仁人此言何為至於我哉戰陳不訪儒士論語云衛靈公問陳於孔子孔子對曰爼豆之事則嘗聞之軍旅之事未之學也此舉奚為至哉遂投劾歸投辭自劾有過不合應舉莽嫌諸不附己者多以法中傷之時篆兄發以佞巧幸於莽位至大司空母師氏能通經學百家之言莽寵以殊禮賜號義成夫人金印紫綬文軒丹轂顯於新世後以篆為建新大尹莽改千乘郡曰建新守曰大尹篆不得已乃歎曰吾生無妄之世値澆羿之君易曰無妄之行窮之災也左傳曰昔有夏之方衰也后羿自鉏遷於窮石因夏人以代夏政而淫於原獸用寒浞伯眀氏之䜛子弟也而虞羿于田以取其國家浞因羿室生澆及􅜦恃其䜛慝詐偽而不德於人澆音五弔反􅜦音許既反上有老母下有兄弟安得獨潔已而危所生哉乃遂單車到官稱疾不視事三年不行縣續漢志曰郡國常以春行至縣勸人農桑振救乏絶門下掾倪敞諌篆乃强起班春班布春令所至之縣獄犴填滿犴音岸前書音義曰鄉亭之獄曰犴篆垂涕曰嗟乎刑罰不中乃陷人於穽此皆何罪而至於是遂平理所出二千餘人掾吏叩頭諌曰劉攽曰案吏當作史總言之掾史皆吏也獨言之當云史耳朝廷初政州牧峻刻初政謂莽即位宥過申枉誠仁者之心然獨為君子將有悔乎篆曰邾文公不以一人易其身君子謂之知命左傳曰邾文公卜遷於繹史曰利於人不利於君邾子曰茍利於人孤之利也人既利矣孤必與焉遂遷於繹五月邾文公卒君子曰知命也如殺一大尹贖二千人蓋所願也遂稱疾去建武初朝廷多薦言之者幽州刺史又舉篆賢良篆自以宗門受莽偽寵慚愧漢朝遂辭歸不仕客居滎陽閉門潛思著周易林}
