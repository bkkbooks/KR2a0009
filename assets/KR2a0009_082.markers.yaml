  - {type: variant, offset: 1264, length: 0, content: '', WYG: 其後辟太尉袁湯大將軍梁冀府並不應大司農羊傅少府何豹上書薦寔才美能高宜在朝廷召拜議郎遷大將軍冀司馬與邉韶延篤等著作東觀出為五原太守五原土宜麻枲而俗不知織績民冬月無衣積細草而臥其中見吏則衣草而出寔至官斥賣儲峙為作紡績織絍綀縕之具以教之民得以免寒苦杜預注左傳曰織絍織布者孔安國論語注曰緼枲也是時胡虜連入雲中朔方殺略吏民一嵗至九奔命寔整厲士馬嚴烽候虜不敢犯常為邊最最為第一以病徴拜議郎復與}
