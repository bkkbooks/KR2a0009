  - {type: variant, offset: 944, length: 0, content: '', krp: 夷三族之令黥劓斬趾斷舌}
  - {type: variant, offset: 945, length: 257, content: 名今以部曲遇之則不滿其心以賓客待之則一國不容二主此非自安之道從事廣漢王累自倒懸於州門以諫璋一無所納備自江陵馳至涪城璋率步騎數萬與備會張松勸備於會襲璋備不忍明年出屯葭萌松兄廣漢太守肅懼禍及己乃以松謀白璋收松斬之勑諸關戍勿復通備大怒還兵擊璋所在戰剋十九年進圍成都數十日城中有精兵三萬人穀支一年吏民咸欲拒戰璋言父子在州二十餘歲無恩德以加百姓而攻戰三載肌膏草野者以璋故也何心能安遂開城出降羣下莫不流涕備遷璋於公安歸其財寶後以病卒明年曹操破張魯定漢中魯字公旗初祖父陵順帝時客於蜀學道鶴鳴山中造作符書以惑百姓受其道者輒出米五斗, WYG: 首}
