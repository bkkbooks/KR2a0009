  - {type: variant, offset: 75, length: 2, content: 太常, WYG: 刑甫侯即吕侯也為周穆王訓暢夏禹用刑之法並見尚書俗人拘文牽古不達權制奇偉所聞簡忽所見烏可與論國家之大事哉故言事者雖合聖德輒見掎奪掎音居蟻反賈逵注國語曰從後牽曰掎何者其頑士闇於}
