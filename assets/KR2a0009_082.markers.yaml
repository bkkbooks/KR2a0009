  - {type: variant, offset: 20, length: 0, content: '', krp: 熙曰沛水草相半胡為嘿嘿而乆沉滯也荅曰有是言乎子茍欲勉我以世路不知其跌而失吾之度也古者隂陽始分天地初制制協韻音之設反皇綱云緒帝紀乃設傳序歴數三代興滅昔大庭尚矣赫胥罔識大庭赫胥並古帝王號也尚逺也罔無也識記也淳樸散離人物錯乖高辛攸降厥趣各違高辛氏帝嚳也道無常稽與時張弛隨時弛張不考之於常道也失仁為非得義為是老子曰失道後德失德後仁失仁後義失義後禮君子通變各審所履故士或掩目而淵潛荘子曰北人無澤與舜為友舜以天下讓之無澤乃自投清泠之淵終身不反也或盥耳而山棲盥洗也許由字武仲隱於沛澤之中堯聞之乃致天下而讓}
  - {type: variant, offset: 21, length: 0, content: '', WYG: 由以為汚乃臨池洗耳其友巢父飲犢聞由為堯所讓曰何以汚吾犢口牽於上流而飲之見荘子及高士傳或草耕而僅飽伯成子髙唐虞時為諸侯至禹去而耕禹往見之則耕在野見吕氏春秋或木茹而長飢説苑曰鮑焦衣木皮食木實韓詩外傳曰焦弃其蔬而立槁死於洛濵也或重聘而不來狂接輿者楚人也耕而食楚王聞其賢使使者持金百鎰車二駟聘之曰願煩先生理江南接輿笑而不應使者去而逺徙莫知所之見荘子或屢黜而不去論語曰栁下惠為士師三黜人曰可以去矣曰直道而事人何往而不三黜也或冒訽以干進或望色而斯舉訽辱也音火豆反新序曰伊尹蒙耻辱負鼎爼以干湯論語曰色斯舉矣翔而後集舉協韻音據或以役夫發夢於王公高宗夢得説乃使百工營求諸野得諸傅巖孔安國曰傅氏之巖在虞虢之界通道所經有澗水環道常使胥靡刑人築護此道説賢而隱代胥靡築之以供食事見尚書王公總而言也爾雅皇王后辟公侯君也或以漁父見兆於元龜戰國䇿曰吕尚之遇文王也身為漁父史記曰太公以釣干周西伯西伯將出獵卜之曰所獲非龍非螭非熊非羆所獲霸王之輔於是西伯獵果遇太公渭水之陽與語大説元大也若夫紛繷塞路凶虐播流方言云繷盛多也音奴董反人有昏墊之戹主有疇咨之憂尚書曰下民昏墊孔安國曰昬瞀墊溺皆困水災也又曰帝曰咨洪水滔天浩浩懷山襄陵有能俾乂條垂藟蔓上下相求藟藤也音壘詩曰南有樛木葛藟纍之於是乎賢人授手援世之災孟子曰天下溺則援之以道嫂溺則援之以手也跋渉赴俗急斯時也草行為跋昔堯含慼而臯陶謨高祖歎而子房慮謨謀也堯遭洪水咨嗟憂愁訪下人有能理者臯陶大禹陳其謨見尚書及史記高祖為項羽所敗下馬踞鞍而問子房曰吾欲捐關以東誰可與共功者子房曰九江王布彭越韓信即欲捐之此三人楚可破之劉攽曰注末之字案文當作也禍不散而曹絳奮曹參及絳侯周勃皆從髙祖征伐以定天下也結不解而陳平權高祖擊匈奴至白登被圍七日用陳平計得出及其䇿合道從克亂弭衝乃將鏤𤣥珪冊顯功珪玉也詩含神霧曰刻之玉版藏之金匱銘昆吾之冶墨子曰昔夏后開冶使飛亷析金於山以鑄鼎於昆吾蔡邕銘論曰吕尚作周太師其功銘於昆吾之鼎也勒景襄之鍾國語曰晉魏顆以其身退秦師於輔氏其勲銘於景鍾此兼言襄也與其有事則褰裳濡足冠挂不顧褰裳渉水也新序曰今為濡足之故不救人溺可乎淮南子曰禹之趨時冠挂而不顧履遺而不取也劉攽曰與其有事案文與合作當上又合有故字揚雄蔡邕同用此律也人溺不拯則非仁也當其無事則躐纓整襟規矩其歩躐音吕渉反躐踐也此字宜從手廣雅云躐持也言持纓整襟修其容止史記曰攝纓整襟華嶠書躐作攝也德讓不脩則非忠也是以險則救俗平則守禮舉以公心不私其體今聖上之育斯人也樸以皇質雕以唐文孔子曰大哉堯之為君也煥乎其有文章故言唐文六合怡怡比屋為仁壹天下之衆異齊品類之萬殊參差同量坏冶一陶坏土器之未燒者郭璞注爾雅曰坏胎物之始也坏音普才反羣生得理庶績其凝凝成也家家有以樂和人人有以自優威械蔵而爼豆布六典陳而九刑厝械謂器械甲兵之屬厝謂置之不用周禮太宰之職掌建邦之六典以佐王理邦國一曰理典二曰教典三曰禮典四曰政典五曰刑典六曰事典左傳曰周有亂政而作九刑杜預注云周之衰為刑書謂之九刑濟茲兆庶出於平易之路雖有力牧之略尚父之厲力牧黄帝臣也史記尚父吕望相武王以伐紂厲謂威容嚴厲伊臯不論奚事范蔡伊尹臯繇范雎蔡澤夫廣厦成而茂木暢逺求存而良馬縶廣厦既成不求材故林木條暢也逺求謂逺方珍異之物也存猶止息也言所求之物既止不資良馬之力也隂事終而水宿藏立冬之後盛德在水隂氣用事故曰隂事水宿謂北方七宿斗牛女虚危室壁也月令曰孟冬之月昏危中仲冬昬東壁中季冬昏婁中孟春昏參中水星伏蔵不見也場功畢而大火入爾雅曰心為大火詩􅃎風曰七月流火又曰九月築場圃也方斯之際處士山積學者川流衣裳被宇冠蓋雲浮譬猶衡陽之林岱隂之麓山南曰陽山北曰隂榖梁傳曰林屬於山曰麓伐尋抱不為之稀蓺拱把不為之數八尺曰尋蓺植也兩手曰拱數猶概也數音疏角反悠悠罔極亦各有得悠悠衆多也罔極猶無窮也亦各有得言皆自以為得也彼採其華我收其實舎之則藏已所學也彼彼衆人也論語曰用之則行舍之則藏故進動以道則不辭執珪而秉柱國吕氏春秋曰得伍員者位執珪前書音義曰古爵名也又曰柱國楚官猶秦之相國也復靜以理則甘糟糠而安藜藿夫君子非不欲仕也恥夸毗以求舉夸毗謂佞人足恭善為進退非不欲室也惡登牆而摟處孟子曰踰東家牆摟其處子則得妻不摟則不得將摟之乎趙岐注云摟牽也其字從手處子處女也呌呼􅃷鬻縣旌自表非隨和之寳也暴智燿世因以干祿非仲尼之道也華嶠書曰因字作回回邪也游不倫黨茍以徇已倫謂等倫黨謂朋黨徇營也言交非其類茍以營已而已汗血競時利合而友汙血謂勞力也競時謂趨時也利合而友不以道義子笑我之沈滯吾亦病子㞕㞕而不已也㞕㞕猶區區也先人有則而我弗虧行有枉徑而我非隨枉曲也徑道也臧否在予唯世所議固將因天質之自然誦上哲之高訓詠太平之清風行天下之至順懼吾躬之穢德勤百畆之不耘尚書曰穢德彰聞禮記曰夫人情者聖王之田也修禮以耕之陳義以種之講學以耨之古者夫田百畝耘除草也縶余馬以安行俟性命之所存安行不奔馳也天命之謂性言隱居以體命昔孔子起威於夾谷解見陳禪傳晏嬰發勇於崔杼解見馮衍傳曹劌舉節於柯盟曹劌曹沬也史記曰曹沬以勇事魯荘公為魯將與齊戰三敗荘公懼乃獻遂邑地以和猶以為将齊桓公與荘公㑹於柯盟桓公與荘公既盟於壇上曹沬以七首劫齊桓公左右莫敢動乃還魯之侵地卞嚴克㨗於彊禦新序曰卞荘子養母戰而三北交游非之國君辱之及母死三年齊與魯戰荘子請從遂赴敵而鬭三獲甲首曰夫三北以養母也今志節小具而責塞矣吾聞之節士不以辱生遂反敵殺十人而死君子曰三北已塞滅世斷宗於孝未終也范蠡錯埶於㑹稽錯置也音七故反埶謂謀略也史記曰吳王敗越於夫椒越王乃以餘兵五千人保於㑹稽吳師追而圍之越王謂范蠡曰奈何范蠡對曰卑辭厚禮以遺之勾踐乃命大夫種行成於吳膝行頓首曰勾踐請為臣妻為妾吳王乃赦越王越王反國拊循其士范蠡曰可矣乃伐吳吳師敗越復棲吳王姑蘇之山也伍員樹功於柏舉伍子胥名員楚人也子胥父誅於楚子胥挾弓矢而干吳王闔閭闔閭甚勇之為興師伐楚戰於柏舉楚師敗績事見榖梁傳魯連辯言以退燕史記曰魯仲連齊人也燕將攻下齊聊城固保守之田單攻之不下魯仲連乃為書遺燕將燕將見書泣三日乃自殺遂平聊城包胥單辭而存楚左傳曰楚昭王為吳所敗奔隋申包胥如秦乞師曰吳為封豕長蛇以荐食上國寡君越在草莽使下臣告急立依於庭牆而哭日夜不絶聲勺飲不入口七日秦師乃出軍敗吳而復楚國唐且華顛以悟秦唐且即唐雎也戰國䇿曰齊楚伐魏魏使人請救於秦不至魏人有唐雎者年九十餘矣西見秦王秦王曰丈人忙然乃逺至此魏來者數矣寡人知魏之急矣唐且曰夫魏萬乘之國也稱東藩者以秦之彊也今齊楚之兵已在魏郊矣大王之救不至魏急且割地而約從是王亡一萬乘之魏而强二敵之齊楚秦王悟遽發兵救魏爾雅曰顛頂也華顛謂白首也甘羅童牙而報趙甘羅下蔡人甘茂孫也年十二事秦相吕不韋秦使張唐往相燕羅曰借臣車五乘請為張唐先報趙不韋乃言之於始皇召見使甘羅於趙趙襄王郊迎事見史記童牙謂幼小也原衰見亷於壺飱昔趙衰為原大夫故曰原衰左傳曰晉侯問原守於寺人勃鞮對曰昔趙衰以壺飱從徑餒而不食故使䖏原見音胡殿反宣孟收德於束脯吕覽曰昔趙宣孟將之絳見桑下有餓人宣孟止車下食而餔之再咽而能視宣孟問之曰汝何為而餓若是對曰臣官於絳歸而糧絶羞行乞故至於此宣子與脯三朐拜受而弗敢食問其故曰臣有老母將以遺之宣孟曰食之吾更與汝乃復與脯二束吳札結信於丘木史記曰吳公子季札使過徐徐君好季札劒口不敢言季札知之為使上國未獻洎還至徐徐君已死於是乃解其寳劒繫之徐君冢樹而去展季効貞於門女展季栁下惠也韓詩外傳曰魯有男子獨處夜暴風雨至婦人趨而託之男子閉戸不納曰吾聞男女不六十不間居婦人曰子何不學栁下惠然嫗不逮門之女國人不稱其亂焉顔囘眀仁於度轂程嬰顯義於趙武程嬰解見馮衍傳度轂未詳僕誠不能編德於數者竊慕古人之所序元和中肅宗始修古禮廵狩方岳駰上四廵頌以稱漢德辭甚典美文多故不載案駰集有東西南北四廵頌流俗本四多作西者誤帝雅好文章自見駰頌後常嗟歎之謂侍中竇憲曰卿寧知崔駰乎對曰班固數為臣説之然未見也帝曰公愛班固而忽崔駰此葉公之好龍也試請見之劉向新序曰子張見魯哀公七日哀公不禮焉而去曰君之好士有似葉公子髙好龍天龍聞而降之窺頭於牖拖尾於堂葉公見之失其魂魄五色無主是葉公非好龍也好夫似龍而非龍者駰由此候憲憲屣履迎門屣履謂納履曵之而行言怱遽也屣音山爾反笑謂駰曰亭伯吾受詔交公公何得薄哉遂揖入為上客居無幾何帝幸憲第時駰適在憲所帝聞而欲召見之憲諌以為不宜與白衣㑹帝悟曰吾能令駰朝夕在傍何必於此適欲官之㑹帝崩竇太后臨朝憲以重戚出内詔命駰獻書誡之曰駰聞交淺而言深者愚也在賤而望貴者惑也未信而納忠者謗也三者皆所不宜而或蹈之者思効其區區憤盈而不能已也竊見足下體淳淑之姿躬高眀之量意羙志厲有上賢之風駰幸得充下館序後陳陳列也是以竭其拳拳敢進一言傳曰生而富者驕生而貴者慠生富貴而能不驕慠者未之有也今寵祿初隆百僚觀行當堯舜之盛世處光華之顯時尚書大傳曰舜時百工相和為卿雲之歌曰卿雲爛兮糺漫漫兮日月光華旦復旦兮豈可不庶幾夙夜以永衆譽𢎞申伯之羙致周邵之事乎申伯周宣王之元舅周公邵公皆輔佐周室也語曰不患無位患所以立論語曰孔子之言也言但患立身不處於仁義也昔馮野王以外戚居位稱為賢臣前書曰馮野王}
