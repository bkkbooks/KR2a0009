  - {type: variant, offset: 38, length: 4, content: 徙竟陵焉, WYG: 輙問以禮説其專心好學雖顛沛必於是後事釋歸家為度遼將軍鄧遵所辟居無何遵被誅瑗免歸後復辟車騎將軍閻顯府時太后稱制顯入參政事先是安帝廢太子為濟隂王而以北鄉侯為嗣瑗以侯立不以正知顯將敗欲說令廢立而顯日沉醉不能得見乃謂長史陳禪曰中常侍江亰陳逹等得以嬖寵惑蠱先帝遂使廢黜正統扶立疏孽}
