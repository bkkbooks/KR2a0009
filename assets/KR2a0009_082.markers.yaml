  - {type: variant, offset: 1757, length: 1, content: 時, WYG: 服武弁戴鶡尾狼狽而走烈罵曰死卒父撾而走孝乎以其武官故罵為卒或作孔卒者誤也鈞曰舜之事父小杖則受大杖則走非不孝也家語曰曾子耘𤓰誤傷其根曾晳怒建大杖以擊其首曾子仆地不知人有頃乃蘇孔子聞之怒謂門弟子曰參來勿内也昔瞽叟有子曰舜瞽叟欲使之未嘗不往則欲殺之未嘗可得小箠則待大杖則逃不陷父於不義也烈慙而止烈後拜太尉鈞少交結英豪有名稱為西河大守獻帝初鈞與袁紹俱起兵山東}
