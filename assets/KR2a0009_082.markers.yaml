  - {type: variant, offset: 52, length: 3, content: 去官居, WYG: 舉茂才遷汲令汲縣名屬河内在事數言便宜為人開稻田數百頃視事七年百姓歌之漢安初大司農胡廣少府竇章共薦瑗宿德大儒從政有迹不宜久在下位由此遷濟北相時李固為太山太守美瑗文雅奉書禮致殷勤嵗餘光祿大夫杜喬為八使徇行郡國八使見周舉傳以臧罪奏瑗徴詣廷尉瑗上書自訟得理出㑹病卒年六十六臨終顧命子寔曰夫人稟天地之氣以生及其終也歸精於天還骨於地何地不可藏形骸勿歸鄉里其􅈖贈之物羊豕之奠一不得受寔奉遺令遂留葬洛}
