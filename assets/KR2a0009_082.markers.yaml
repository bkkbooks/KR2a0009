  - {type: variant, offset: 1265, length: 3, content: 祭酒各, WYG: 儒博士共雜定五經㑹梁冀誅寔以故吏免官禁錮數年時鮮卑數犯邊詔三公舉威武謀略之士司空黄瓊薦寔拜遼東太守行道母劉氏病卒上疏求歸葬行喪母有母儀淑德博覽書傳初寔在五原常訓以臨民之政寔之善績母有其助焉服竟召拜尚書寔以世方阻亂稱疾不視事數月免歸初寔父卒剽賣田宅}
