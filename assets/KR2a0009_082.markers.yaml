  - {type: variant, offset: 43, length: 1, content: 任, WYG: 帝即位發病廟中周勃之徴於斯復見吕后立恵帝後宫子為少帝周勃廢之也今欲與長史君共求見說將軍白太后收亰等廢少帝引立濟陰王必上當天心下合人望伊霍之功不下席而立則將軍兄弟傳祚於蕪窮若拒違天意乆曠神器則將以無罪并辜元惡元大也書曰元惡大憝此所謂禍福之㑹分功之時史記蔡澤説范雎曰君獨不觀夫博者乎或欲大投或欲分功今君相秦坐制諸侯使天下皆畏秦此亦秦分功之時也禪猶豫未敢從㑹北鄉侯薨孫程立濟隂王是為順帝閻顯兄弟悉伏誅瑗坐被斥門生蘓祗具知瑗謀欲上書言狀瑗聞而遽止之時陳禪為司隸校尉召瑗謂曰第聽祗上書禪請為之證第但也司馬相如曰第如臨邛瑗曰此譬猶兒妾屏語耳願使君勿復出口遂辭歸不復應}
