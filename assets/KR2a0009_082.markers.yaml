  - {type: variant, offset: 18, length: 0, content: '', WYG: 四篇用决吉凶多所占驗臨終作賦以自悼名慰志其辭曰嘉昔人之遘辰兮遘遇也辰時也美伊傅之選時伊尹干湯傅説遇高宗爾雅曰選遇也音}
