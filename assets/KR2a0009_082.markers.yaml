  - {type: variant, offset: 72, length: 0, content: '', krp: 奢瑗聞之怒敕妻子曰吾并日而食以供賓客而反以獲譏士大夫不足養如此後勿過菜具無為諸子所蚩終不能改奉祿盡於賓饗也寔字子真一名台字元始少沈靜好典籍父卒隱居墓側服竟三公並辟皆不就桓帝初詔公卿郡國舉至孝獨行之士寔以郡舉徴詣公車病不對䇿除為郎眀於政體吏才有餘論當世便事數十條名曰政論指切時要言辯而确确堅正也音口角反當世稱之仲長統曰凡為人主宜寫一通置之坐側其辭曰自堯舜之帝湯武之王皆賴眀哲之佐博物之臣故臯陶陳謨而唐虞以興伊箕作訓而殷周用隆伊尹作伊訓箕子作洪範及繼體之君欲立中興之功者曷嘗不賴賢哲之謀乎凡天下所不理者常由人主承平日乆俗漸敝而不悟政寖衰而不改習亂安危怢不自覩怢音他没反怢忽忘也或荒耽嗜欲不恤萬機或耳蔽箴誨厭偽忽真厭飫姦偽輕忽至真或猶豫岐路莫適所從或見信之佐括囊}
