  - {type: variant, offset: 1773, length: 222, content: 之禍出奔南陽會長沙太守孫堅殺南陽太守張咨引兵從術劉表上術為南陽太守術又表堅領豫州刺史使率荊豫之卒擊破董卓於陽人術從兄紹因堅討卓未反遠遣其將會稽周昕奪堅豫州術怒擊昕走之紹議欲立劉虞為帝術好放縱憚立長君託以公義不肯同積此釁𨻶遂成乃各外交黨援以相圖謀術結公孫瓚而紹連劉表豪桀多附於紹術怒曰羣豎不吾從而從吾家奴乎又與公孫瓚書云紹非袁氏子紹聞大怒初平三年術遣孫堅擊劉表於襄陽堅戰死公孫瓚使劉備與術合謀共逼紹紹與曹操會擊皆破之四年術引軍入陳留屯封丘黑山餘賊, WYG: 既誅拜烈城門校尉}
