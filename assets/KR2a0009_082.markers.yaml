  - {type: variant, offset: 73, length: 1, content: 宗, WYG: 祿易曰括嚢無咎無譽括結也結嚢不言持祿而已或疎逺之臣言以賤廢是以王綱縱弛於上智士鬱伊於下鬱伊不申之貌楚詞曰獨伊蔚而誰語也悲夫自漢興以來三百五十餘嵗矣政令垢翫上下怠懈垢惡也風俗彫敝人庶巧偽百姓囂然咸復思中興之救矣且濟時拯世之術豈必體堯蹈舜然後乃理哉期於補䘺決壞枝柱邪傾䘺音直莧反禮記曰衣裳䘺裂紉箴請補綴柱音陟主反隨形裁割要措斯世於安寧之域而已故聖人執權遭時定制權謂變也遭遇其時而定法制不循於舊也歩驟之差各有云設不彊人以不能背急切而慕所聞也背當時之急切而慕所聞之事則非濟時之要蓋孔子對葉公以來逺哀公以臨人景公以節禮非其不同所急異務也韓子曰葉公問政於仲尼仲尼曰政在恱近而來逺魯哀公問政於仲尼仲尼曰政在選賢齊景公問政於仲尼仲尼曰政在節財此云臨人節禮文不同也是以受命之君每輙創制中興之主亦匡時失昔盤庚愍殷遷都易民盤庚殷王也自耿遷於亳邑作書三篇以告之周穆有闕甫侯}
