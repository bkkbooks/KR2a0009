  - {type: variant, offset: 3955, length: 674, content: 與參政事蕃敗休坐廢錮乃作春秋公羊解詁覃思不闚門十有七年又注訓孝經論語風角七分皆經緯典謨不與守文同說又以春秋駮漢事六百餘條妙得公羊本意休善歷筭與其師博士羊弼追述李育意以難二傳作公羊墨守左氏膏肓穀梁廢疾黨禁解又辟司徒羣公表休道術深明宜侍帷幄倖臣不悅之乃拜議郎屢陳忠言再遷諫議大夫年五十四光和五年卒服虔字子慎初名重又名祇後改為虔河南滎陽人也少以清苦建志入太學受業有雅才善著文論作春秋左氏傳解行之至今又以左傳駮何休之所駮漢事六十條舉孝廉稍遷中平末拜九江太守免遭亂行客病卒所著賦碑誄書記連珠九憤凡十餘篇潁容字子嚴陳國長平人也博學多通善春秋左氏師事太尉楊賜郡舉孝廉州辟公車徵皆不就初平中避亂荊州聚徒千餘人劉表以為武陵太守不肯起著春秋左氏條例五萬餘言建安中卒謝該字文儀南陽章陵人也善明春秋左氏為世名儒門徒數百千人建安中河東人樂詳條左氏疑滯數十事以問該皆為通解之名為謝氏釋行於世仕為公車司馬令以父母老託疾去官欲歸鄉里會荊州道斷不得去少府孔融上書薦之曰臣聞高祖創業韓彭之將征討暴亂陵賈叔孫通進說詩書光武中興吳耿佐命范升衛宏脩述舊業故能文武並用成長久之計陛下聖德欽明同符二祖勞謙戹運三年乃讙今尚父鷹揚方叔翰飛王師電鷙羣凶破殄始有櫜弓臥鼓之次宜得名儒典綜禮紀竊見故公車司馬令謝該體曾史之淑性兼商偃之文學博通羣蓺周覽古今物來有應事至不惑清白異行敦悅道訓求之遠近少有疇匹若乃巨骨出吳隼集陳庭黃能入寢亥有二首非夫洽聞者莫識其端也雋不疑定北闕之前夏侯勝辯常陰之驗然後朝士益重儒術今該實卓然比跡前列閒以父母老疾𠫓廾官欲歸道路險塞無由自致猥使良才抱樸而逃踰越山河沈淪荊楚所謂往而不反, WYG: 盛衰}
