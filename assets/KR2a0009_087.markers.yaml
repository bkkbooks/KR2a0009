  - {type: variant, offset: 137, length: 0, content: '', WYG: 私語行事人使不加力既而載出城外根得蘇太后使人檢視根遂詐死三日目中生蛆因得逃竄為宜城山中酒家保宜城縣故城在今㐮州率道縣南其地出美酒廣雅云保使也言為人傭力保任而使也積十五年酒家知其賢厚敬待之及鄧氏誅左右皆言根等之忠帝謂根已死乃下詔布告天下錄其子孫根方歸鄉里徴詣公車拜侍御史初平原郡吏成翊世亦諫太后歸政坐抵罪與根俱徵擢為尚書郎並見納用或問根曰往者遇禍天下同義知故不少何至自苦如此根曰周旋民間非絶跡之處邂逅發露禍及知親故不為也順帝時稍遷濟隂太守去官還家年七十八卒翊世字季明少好學深明道術延光中中常侍樊豐帝乳母}
