  - {type: variant, offset: 819, length: 1, content: 罷, WYG: 荆州刺史李固薦巴治迹徴拜議郎守光祿大夫與杜喬周舉等八人徇行州郡巴使徐州還再遷豫章太守郡土多山川鬼怪小人常破貲産以祈禱巴素有道術能役鬼神乃悉毁壞房祀剪理姦誣房謂為房堂而祀者於是祅異自消百姓始頗為懼終皆安之神仙傳曰時廬山廟有神於帳中與人言語飲酒投杯能令官亭湖中分風船行者舉帆相逢巴未到十數日廟中神不復作聲郡中常患黄父鬼為百姓害巴到皆不知所在郡内無復疾疫也遷沛相所在有績徴拜尚書神仙傳曰巴為尚書正朝大㑹巴獨後到又飲酒西南噀之有司奏巴不敬有}
