  - {type: variant, offset: 3701, length: 203, content: 知名太學深為同郡班固所重固奏記薦育於驃騎將軍東平王蒼由是京師貴戚爭往交之州郡請召育到輒辭病去常避地教授門徒數百頗涉獵古學嘗讀左氏傳雖樂文采然謂不得聖人深意以為前世陳元范升之徒更相非折而多引圖讖不據理體於是作難左氏義四十一事建初元年衛尉馬廖舉育方正為議郎後拜博士四年詔與諸儒論五經於白虎觀育以公羊義難賈逵往返皆有理證最為通儒再遷尚書令及馬氏廢育坐為所舉免歸歲餘復徵再遷侍中卒於官何休字邵公任城樊人也父豹少府休, WYG: 陶}
