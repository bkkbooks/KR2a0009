  - {type: variant, offset: 1429, length: 1406, content: 入為河南尹章和二年代任隗為光祿勳卒於官賜冢塋陪園陵孫休位至青州刺史楊仁字文義巴郡閬中人也建武中詣師學習韓詩數年歸靜居教授仕郡為功曹舉孝廉除郎太常上仁經中博士仁自以年未五十不應舊科上府讓選顯宗特詔補北宮衞士令引見問當世政迹仁對以寬和任賢抑黜驕戚為先又上便宜十二事皆當世急務帝嘉之賜以縑錢及帝崩時諸馬貴盛各爭欲入宮仁被甲持戟嚴勒門衞莫敢輕進者肅宗既立諸馬共譖仁刻峻帝知其忠愈善之拜什邡令寬惠為政勸課掾史弟子悉令就學其有通明經術者顯之右署或貢之朝由是義學大興墾田千餘頃行兄喪去官後辟司徒桓虞府掾有宋章者貪奢不法仁終不與交言同席時人畏其節後為閬中令卒於官趙曄字長君會稽山陰人也少嘗為縣吏奉檄迎督郵曄恥於廝役遂𠫓廾車馬去到犍為資中詣杜撫受韓詩究竟其術積二十年絕問不還家為發喪制服曄撫卒業乃歸州召補從事不就舉有道卒于家曄著吳越春秋詩細歷神淵蔡邕至會稽讀詩細而歎息以為長於論衡邕還京師傳之學者咸誦習焉時山陽張匡字文通亦習韓詩作章句後舉有道博士徵不就卒於家衞宏字敬仲東海人也少與河南鄭興俱好古學初九江謝曼卿善毛詩乃為其訓宏從曼卿受學因作毛詩序善得風雅之旨于今傳於世後從大司空杜林更受古文尚書為作訓旨時濟南徐巡師事宏後從林受學亦以儒顯由是古學大興光武以為議郎宏作漢舊儀四篇以載西京雜事又著賦頌誄七首皆傳於世中興後鄭衆賈逵傳毛詩後馬融作毛詩傳鄭玄作毛詩箋前書魯高堂生漢興傳禮十七篇後瑕丘蕭奮以授同郡后蒼蒼授梁人戴德及德兄子聖沛人慶普於是德為大戴禮聖為小戴禮普為慶氏禮三家皆立博士孔安國所獻禮古經五十六篇及周官經六篇前世傳其書未有名家中興已後亦有大小戴博士雖相傳不絕然未有顯於儒林者建武中曹充習慶氏學傳其子襃遂撰漢禮事在襃傳董鈞字文伯犍為資中人也習慶氏禮事大鴻臚王臨元始中舉明經遷廩犧令病去官建武中舉孝廉辟司徒府鈞博通古今數言政事永平初為博士時草創五郊祭祀及宗廟禮樂威儀章服輒令鈞參議多見從用當世稱為通儒累遷五官中郎將常教授門生百餘人後坐事左轉騎都尉年七十餘卒於家中興鄭衆傳周官經後馬融作周官傳授鄭玄玄作周官注玄本習小戴禮後以古經校之取其義長者故為鄭氏學玄又注小戴所傳禮記四十九篇通為三禮焉前書齊胡母子都傳公羊春秋授東平嬴公嬴公授東海孟卿孟卿授魯人眭孟眭孟授東海嚴彭祖魯人顏安樂彭祖為春秋嚴氏學安樂為春秋顏氏學又瑕丘江公傳穀梁春秋三家皆立博士梁太傅賈誼為春秋左氏傳訓詁授趙人貫公丁恭字子然山陽東緡人也習公羊嚴氏春秋恭學義精明教授常數百人州郡請召不應建武初為諫議大夫博士封關內侯十一年遷少府諸生自遠方至者著錄數千人當世稱為大儒太常樓望侍中承宮長水校尉樊儵鯈等皆受業於恭二十年拜侍中祭酒騎都尉與侍中劉昆俱在光武左右每事諮訪焉卒於官周澤字稺都北海安丘人也少習公羊嚴氏春秋隱居教授門徒常數百人建武末辟大司馬府署議曹祭酒數月徵試博士中元元年遷黽池令奉公剋己矜恤孤羸吏人歸愛之永平五年遷右中郎將十年拜太常澤果敢直言數有據爭後北地太守廖信坐貪穢下獄沒入財產顯宗以信臧物班諸廉史唯澤及光祿勳孫堪大司農常沖特蒙賜焉是時京師翕然在位者咸自勉勵堪字子稺河南緱氏人也明經學有志操清白貞正愛士大夫然一毫未嘗取於人以節介氣勇自行王莽末兵革並起宗族老弱在營保閒堪常力戰陷敵無所回避數被創刃宗族賴之郡中咸服其義勇建武中仕郡縣公正廉絜奉祿不及妻子皆以供賓客及為長吏所在有迹為吏人所敬仰喜分明去就嘗為縣令謁府趨步緩門亭長譴堪御吏堪便解印綬去不之官後復仕為左馮翊坐遇下促急, WYG: ''}
