  - {type: variant, offset: 821, length: 0, content: '', krp: 問巴巴頓首謝曰臣本縣成都市失火臣故因酒為雨以㓕火臣不敢不敬詔即以驛書問成都成都答言正旦大失火食時有雨從東北來火乃息雨皆酒臭後忽一旦大風天霧晦暝對坐皆不相見失巴所在尋問之云其日還成都與親故别也㑹帝崩營起憲陵陵左右或有小人墳冢主者欲有所侵毁巴連上書苦諫時梁太后臨朝詔詰巴曰大行皇帝晏駕有日卜擇陵園務從省約塋域所極裁二十頃而巴虛言主者壞人冢墓事既非實寢不報下巴猶固遂其愚復上誹謗茍肆狂瞽益不可長巴坐下獄抵罪禁錮還家二十餘年靈帝即位大將軍竇武太傅陳蕃輔政徴拜議郎蕃武被誅巴以其黨復讁為永昌太守以功自劾劉攽曰案功不可以自劾當是無功自劾少一無字辭病不行上書極諫理陳竇之寃帝怒下詔切責收付廷尉巴自殺子賀官至雲中太守劉陶傳劉陶字子竒一名偉潁川潁隂人濟北貞王勃之後陶為人居簡不脩小節所與交友必也同志好尚或殊富貴不求合情趣茍同貧賤不易意同宗劉愷以雅德知名獨深器陶時大將軍梁冀專朝而桓帝無子連嵗荒饑災異數見陶時游太學乃上疏陳事曰臣聞人非天地無以為生天地非人無以為靈書曰惟天地萬物父母惟人萬物之靈也是故帝非人不立人非帝不寧夫天之與帝帝之與人猶頭之與足相湏而行也伏惟陛下年隆德茂中天稱號中天謂天之中也襲常存之慶循不易之制目不視鳴條之事耳不聞檀車之聲鳴條地名在安邑之西尚書曰伊尹相湯伐桀遂與桀戰于鳴條之野檀車兵車也詩曰檀車嘽嘽四牡痯痯征夫不逺嘽音昌善反痯音管天災不有痛於肌膚震食不即損於聖體故蔑三光之謬輕上天之怒伏念髙祖之起始自布衣高祖日吾以布衣提三尺劍以取天下拾暴秦之敝追亡周之鹿前書蒯通曰秦失其鹿天下共逐之音義云以鹿喻帝位也合散扶傷克成帝業功既顯矣勤亦至矣流福遺祚至於陛下陛下既不能増明烈考之軌而忽高祖之勤妄假利器委授國柄使羣醜刑隸芟刈小民雕敝諸夏虐流遠近利器謂權也周禮太宰以八柄詔王馭羣臣謂爵祿與置生奪廢誅也刑隸謂閹人也故天降衆異以戒陛下陛下不悟而競令虎豹窟於麑場豺狼乳於春囿鹿子曰麑乳産也斯豈唐咨禹稷益典朕虞議物賦土蒸民之意哉又令牧守長吏劉攽曰案文令當作今上下交競封豕長蛇蠶食天下貨殖者為窮寃之魂貧餒者作飢寒之鬼高門獲東觀之辜豐室羅妖叛之罪説苑曰孔子為魯司㓂七日而誅少正邜於東觀之下也死者悲於窀穸生者戚於朝野杜元凱注左傳曰窀厚也穸夜也厚夜猶長夜也是愚臣所為咨嗟長懷歎息者也且秦之將亡正諫者誅諛進者賞前書賈山上書曰秦始皇進諛謟之人殺直諫之士也嘉言結於忠舌國命出於䜛口擅閻樂於咸陽授趙高以車府趙高為車府令與壻咸陽令閻樂謀殺胡亥事見史記也權去已而不知威離身而不顧古今一揆成敗同埶願陛下遠覽強秦之傾近察哀平之變得失昭然禍福可見臣又聞危非仁不扶亂非智不救故武丁得傅説以消鼎雉之災武丁殷王高宗也尚書曰高宗得傅説為相殷復興焉高宗時有雉登鼎耳而雊武丁懼而脩德位以永寧周宣用申甫以濟夷厲之荒申伯仲山甫周宣王之臣也詩曰惟申及甫惟周之翰史記曰周孝王之子爕是為夷王夷王崩子厲王胡立行暴虐死于彘也竊見故冀州刺史南陽朱穆前烏桓校尉臣同郡李膺皆履正清平貞高絶俗穆前在冀州奉憲操平摧破姦黨掃清萬里膺歴典牧守正身率下及掌戎馬威揚朔北斯實中興之良佐國家之柱臣也宜還本朝挟輔王室上齊七燿下鎮萬國臣敢吐不時之義於諱言之朝不時謂不合於時也諱言謂拒諫也猶冰霜見日必至消滅臣始悲天下之可悲今天下亦悲臣之愚惑也書奏不省時有上書言人以貨輕錢薄故致貧困宜改鑄大錢事下四府羣僚及太學能言之士陶上議曰聖王承天制物與人行止建功則衆悦其事興戎而師樂其旅是故靈臺有子來之人武旅有鳬藻之士詩大雅曰經始靈臺經之營之不日成之經始勿亟庻人子來武旅周武王之旅鳬得水藻言喜悦也皆舉合時宜動順人道也臣伏讀鑄錢之詔平輕重之議訪覃幽微不遺窮賤是以藿食之人謬延逮及説苑曰有東郭祖朝者上書於晉獻公曰願請聞國家之計獻公使人告之曰肉食者已慮之矣藿食者尚何預焉祖廟曰肉食者一旦失計於廟堂之上若臣等藿食寕得無肝膽塗地於中原之野其禍亦及臣之身安得無預國家之計乎蓋以為當今之憂不在於貨在乎民飢夫生養之道先食後民劉攽曰案文民當作貨是以先王觀象育物敬授民時象天象也尚書曰欽若昊天敬授人時使男不逋畝女不下機故君臣之道行王路之教通由是言之食者乃有國之所寳生民之至貴也竊見比年已來良苖盡於蝗螟之口杼柚空於公私之求詩曰小東大東杼柚其空所急朝夕之餐所患靡盬之事豈謂錢貨之厚薄銖兩之輕重哉就使當今沙礫化為南金瓦石變為和玉詩曰大路南金和玉卞和之玉也使百姓渇無所飲飢無所食雖皇義之純德唐虞之文明猶不能以保蕭牆之内也蓋民可百年無貨不可一朝有飢故食為至急也議者不逹農殖之本多言鑄冶之便或欲因縁行詐以賈國利國利將盡取者爭競造鑄之端於是乎生蓋萬人鑄之一人奪之猶不能給况今一人鑄之則萬人奪之乎雖以隂陽為炭萬物為銅賈誼之言役不食之民使不飢之士猶不能足無厭之求也夫欲民殷財阜要在止役禁奪則百姓不勞而足陛下聖德愍海内之憂戚傷天下之艱難欲鑄錢齊貨以救其敝此猶養魚沸鼎之中棲鳥烈火之上水木本魚鳥之所生也用之不時必至燋爛願陛下寛鍥薄之禁後冶鑄之議鍥刻也音口結反聽民庶之謡吟問路叟之所憂列子曰堯理天下五十年不知天下理亂堯乃㣲服遊於康衢兒童謡曰立我蒸民莫不爾極不識不知順帝之則説苑曰孔子行遊中路聞哭者聲其音甚悲孔子避車而問之曰夫子非有喪也何哭之悲虞丘子對曰吾有三失吾少好學周徧天下還後吾親亡是一失也事君驕奢不遂是二失也厚交友而後絶是三失也劉攽曰注文莫不爾極案文不當作非瞰三光之文耀視山河之分流三光日月星也分謂山流謂河言日月有讁食之災星晨有錯行之變故視其文耀也山崩川竭皆亡之徵也天下之心國家大事餐然皆見無有遺惑者矣臣嘗誦詩至於鴻鴈于野之勞哀勤百堵之事每喟爾長懷中篇而歎詩小雅鴻鴈之篇曰鴻鴈于飛肅肅其羽之子于征劬勞于野鴻鴈于飛集于中澤之子于垣百堵皆作鄭元注云壞滅之國徵人起屋舍築牆壁百堵同時而起言趨事也近聽征夫飢勞之聲甚於斯歌是以追悟匹婦吟魯之憂始於此乎列女傳曰魯漆室邑之女過時未適人當穆公之時君老太子㓜女倚柱而啼傍人聞之心莫不惨惨者鄰婦從之遊謂曰何哭之悲子欲嫁乎吾為子求偶漆室女曰嗟乎始吾以子為知今反無識也豈為嫁之故不樂而悲哉吾憂魯君老而太子少也見白駒之意屏營傍徨不能監寐詩曰皎皎白駒食我場苖縶之維之以永今朝白駒喻賢人也監寐猶寤寐也伏念當今地廣而不得耕民衆而無所食羣小競起進秉國之位鷹揚天下鳥鈔求飽吞肌及骨並噬無厭誠恐卒有役夫窮匠起於板築之間役夫謂陳渉起蘄也窮匠謂驪山之徒也並見史記也投斤攘臂登高遠呼使愁怨之民嚮應雲合八方分崩中夏魚潰公羊傳曰其言梁亡何魚爛而亡也何休曰魚爛從中發潰爛也雖方尺之錢何能有救其危猶舉函牛之鼎絓纎枯之末函牛之鼎謂大鼎也淮南子曰函牛之鼎沸則蛾不得置其一足焉絓掛也音胡賈反詩人所以眷然顧之澘焉出涕者也詩小雅大東之文也澘涕下貌鄭𤣥注云傷今不如古也臣東野狂闇不逹大義縁廣及之時對過所問知必以身脂鼎鑊為天下笑帝竟不鑄錢後陶舉孝亷除順陽長縣多姦猾陶到官宣募吏民有氣力勇猛能以死易生者不拘亡命姦臧於是剽輕劍客之徒過晏等十餘人過姓也過國之後見左傳皆來應募陶責其先過要以後效使各結所厚少年得數百人皆嚴兵待命於是覆案姦軌所發若神以病免吏民思而歌之曰邑然不樂思我劉君何時復來安此下民陶明尚書春秋為之訓詁推三家尚書三家謂夏侯建夏侯勝歐陽和伯也及古文是正文字三百餘事名曰中文尚書頃之拜侍御史靈帝宿聞其名數引納之時鉅鹿張角偽託大道妖惑小民陶與奉車都尉樂松議郎袁貢連名上疏言之曰聖王以天下耳目為視聽故能無不聞見今張角支黨不可勝計前司徒楊}
  - {type: variant, offset: 822, length: 0, content: '', WYG: 奏下詔書切勑州郡䕶送流民㑹賜去位不復捕錄雖㑹赦令而謀不觧散四方私言云角等竊入京師覘視朝政鳥聲獸心私共嗚呼州郡忌諱不欲聞之但更相告語莫肯公文宜下明詔重募角等賞以國土有敢回避與之同罪帝殊不悟方詔陶次第春秋條例明年張角反亂海内鼎沸帝思陶言封中陵鄉侯三遷尚書令以所舉將為尚書難與齊列乞從冗散拜侍中以數切諌為權臣所憚徙為京兆尹到職當出脩宫錢直千萬時拜職名當出買官之錢謂之脩宫錢也陶既清貧而恥以錢買職稱疾不聼政帝宿重陶才原其罪徵拜諫議大夫是時天下日危寇賊方熾陶憂致崩亂復上疏曰臣聞事之急者不能安言心之痛者不能緩聲竊見天下前遇張角之亂後遭邉章之宼每聞羽書告急之聲心灼内熱四體驚竦今西羌逆類私署將帥皆多叚頴時吏曉習戰陳識知山川變詐萬端臣常懼其輕出河東馮翊鈔西軍之後東之函谷據阸高望今果已攻河東恐遂轉更豕突上京如是則南道斷絶車騎之軍孤立時湟中義從胡北宫伯玉等叛遣左車騎將軍皇甫嵩討之不尅也關東破膽四方動揺威之不來叫之不應雖有田單陳平之䇿計無所用臣前驛馬上便宜急絶諸郡賦調冀尚可安事付主者留連至今莫肯求問今三郡之民皆以奔亡南出武關北徙壺谷三郡河東馮翊京兆也壺谷壺關之谷在上黨也冰駭風散唯恐在後今其存者尚十三四軍吏士民悲愁相守民有百走退死之心而無一前鬭生之計西宼浸前去營咫尺胡騎分布已至諸陵將軍張温天性精勇而主者旦夕廹促軍無後殿假令失利其敗不救臣自知言數見厭而言不自裁者以為國安則臣蒙其慶國危則臣亦先亡也謹復陳當今要急八事乞湏臾之間深垂納省其八事大較言天下大亂皆由宦官宦官事急共䜛陶曰前張角事發詔書示以威恩自此以來各各改悔今者四方安静而陶疾害聖政專言妖孽州郡不上陶何縁知疑陶與賊通情於是收陶下黄門北寺獄掠按日急陶自知必死對使者曰朝廷前封臣云何今反受邪譖恨不與伊吕同疇而以三仁為軰論語曰殷有三仁焉㣲子去之箕子為之奴比干諫而死遂閉氣而死天下莫不痛之陶著書數十萬言又作七曜論匡老子反韓非復孟軻及上書言當世便事條教賦奏書記辯疑凡百餘篇時司徒東海陳耽亦以非罪與陶俱死耽以忠正稱歴位三司光和五年詔公卿以謡言舉刺史二}
