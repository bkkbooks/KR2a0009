  - {type: variant, offset: 888, length: 243, content: 也少習齊詩遊京師教授十餘年友人董奉德於洛陽病亡末乃躬推鹿車載奉德喪致其墓所由是知名為郡功曹辭以病免後奔師喪於道物故臨命勑兄子造曰必致我尸於師門使死而有知魂靈不慙如其無知得土而已造從之景鸞字漢伯廣漢梓潼人也少隨師學經涉七州之地能理齊詩施氏易兼受河洛圖緯作易說及詩解文句兼取河洛以類相從名為交集又撰禮內外記號曰禮略又抄風角雜書列其占驗作興道一篇及作月令章句凡所著述五十餘萬言數上書陳救災變之術州郡辟命不就以壽終薛漢字公子淮陽人也世習韓詩父子以章句著名漢少傳父業尤善說災異讖緯教授常數百人建武, WYG: 悼傷焉}
