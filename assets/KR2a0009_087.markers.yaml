  - {type: variant, offset: 824, length: 1, content: 奉, WYG: 為民蠧害者謡言謂聼百姓風謡善惡而黜陟之也時太尉許戫司空張濟承望内官受取貨賂其宦者子弟賔客雖貪汙穢濁皆不敢問而虚糺邉遠小郡清脩有惠化者二十六人吏人詣闕陳訴耽與議郎曹操上言公卿所舉率黨其私所謂放䲭梟而囚鸞鳳其言忠切帝}
  - {type: variant, offset: 824, length: 1, content: 奉, krp: 為民蠧害者謡言謂聼百姓風謡善惡而黜陟之也時太尉許戫司空張濟承望内官受取貨賂其宦者子弟賔客雖貪汙穢濁皆不敢問而虚糺邉遠小郡清脩有惠化者二十六人吏人詣闕陳訴耽與議郎曹操上言公卿所舉率黨其私所謂放䲭梟而囚鸞鳳其言忠切帝}
  - {type: variant, offset: 826, length: 0, content: '', WYG: 譲戫濟由是諸坐謡言徵者悉拜議郎宦官怨之遂誣䧟耽死獄中李雲傳李雲字行祖甘陵人也性好學善隂陽初舉孝亷再遷白馬令桓帝延熹二年誅大將軍梁冀而中常侍單超等五人皆以誅冀功並封列侯專權選舉又立掖庭民女亳氏為皇后數月間后家封者四人賞賜巨萬時封后兄康為比陽侯弟統昆陽侯統從兄㑹安陽侯統弟秉為濟陽侯是時地數震裂衆災頻降雲素剛憂國將危心不能忍乃露布上書移副三府露布謂不封之也并以副本上三公府也曰臣聞皇后天下母徳配坤靈得其人則五氏來備不得其人則地動揺宫史記曰庶徵曰雨曰暘曰燠曰風曰寒五者來備各以其序庻草繁廡是與氏古字通耳春秋漢含孳曰女主盛臣制命則地動比年災異可謂多矣皇天之戒可謂至矣高祖受命至今三百六十四嵗君期一周當有黄精代見姓陳項虞田許氏不可令此人居太尉太傅典兵之官黄精謂魏氏將興陳項虞田並舜之後舜土德亦尚黄故忌也舉厝至重不可不慎班功行賞宜應其實梁冀雖持權專擅虐流天下今以罪行誅猶召家臣搤殺之耳而猥封謀臣萬户以上高祖聞之得無見非西北列將得無觧體列將謂皇甫規段頴等孔子曰帝者諦也春秋運斗樞曰五帝脩名立功脩德成化統調隂陽招類使神故稱帝帝之諦言也鄭𤣥注云審諦於物也劉攽曰注帝之諦言也案文言當在諦字上今官位錯亂小人諂進財貨公行政化日損尺一拜用不經御省尺一之板謂詔䇿也見漢官儀是帝欲不諦乎帝得奏震怒下有司逮雲詔尚書都䕶劒㦸送黄門北寺獄使中常侍管霸與御史廷尉雜考之時𢎞農五官掾杜衆傷雲以忠諫獲罪上書願與雲同日死帝愈怒遂并下廷尉大鴻臚陳蕃上疏救雲曰李雲所言雖不識禁忌干上逆旨其意歸於忠國而已昔高祖忍周昌不諱之諫成帝赦朱雲腰領之誅周昌觧見陳忠傳朱雲上書曰臣願賜尚方斬馬劍斷佞臣一人以厲其餘上問誰也對曰安昌侯張禹上大怒曰小臣居下訕上廷辱師傅罪死不赦御史將雲去左將軍辛慶忌以死争上意觧然後得已事並見前書今日殺雲臣恐剖心之譏復議於世矣比干以死諫紂紂怒曰吾聞聖人心有七竅乃剖比干而觀其心事見史記故敢觸龍鱗冐昧以請韓子曰夫龍之為蟲也可狎而馴也然喉下有逆鱗嬰之則殺人人主有逆鱗説者嬰之則亦幾矣太常楊秉洛陽市長沐茂郎中上官資並上疏請雲帝恚甚有司奏以為大不敬詔切責蕃秉免歸田里茂資貶秩二等時帝在濯龍池管霸奏雲等事霸詭言曰李雲野澤愚儒杜衆郡中小吏出於狂戇不足加罪帝謂霸曰帝欲不諦是何等語而常侍欲原之邪顧使小黄門可其奏雲衆皆死獄中後冀州刺史賈琮使行部過祠雲墓刻石表之論曰禮有五諫諷為上五諫謂諷諫順諫闚諫指諫䧟諫也諷諫者知患禍之萌而諷告也順諫者出辭遜順不逆君心也闚諫者視人君顔色而諫也指諫者質指其事而諫也䧟諫者言國之害忘生為君也見大戴禮若夫託物見情因文載旨使言之者無罪聞之者足以自戒卜商詩序之文也貴在於意逹言從理歸乎正曷其絞訐摩上以衒沽成名哉絞直也訐正也沽賣之也李雲草茅之生不識失身之義儀禮曰凡自稱於君宅在邦者曰市井之臣在野則曰草茅之臣庶人則曰刺草之臣易曰臣不密則失身劉攽曰注宅在邦者案儀禮文公宅者在邦此誤遂乃露布帝者班檄三公至於誅死而不顧斯豈古之狂也論語曰古之狂也直今之狂也詐而已矣夫未信而諫則以為謗己論語曰事君信而後諫其君未信則以為謗己故説者識其難焉韓非有説難篇劉瑜傳劉瑜字季節廣陵人也高祖父廣陵靖王父辯清河太守謝承書云父祥為清河太守瑜少好經學尤善圗䜟天文歴筭之術州郡禮請不就延熹八年太尉楊秉舉賢良方正及到京師上書陳事曰臣瑜自念東國鄙陋得以豐沛枝𦙍被䝉復除不給卒伍故太尉楊秉知臣竊闚典籍猥見顯舉誠冀臣愚直有補萬一而秉忠謨不遂命先朝露臣在下土聽聞歌謡驕臣虐政之事遠近呼嗟之音竊為辛楚泣血漣如幸得引錄備答聖問泄寫至情不敢庸回庸用也回邪也誠願陛下且以湏㬰之慮覽今往之事人何為咨嗟天曷為動變蓋諸侯之位上法四七垂文炳燿關之盛衰者也四七二十八宿也諸侯為天子守四方猶天之有二十八宿漢官儀曰天子建侯上法四七也今中官邪孽比肩裂土皆競立𦙍嗣繼體傳爵或乞子疎屬或買皃市道殆乖開國承家之義易曰大君有命開國承家古者天子一娶九女公羊傳曰諸侯一聘三女天子一娶九女夏殷制也娣姪有序河圖授嗣正在九房今女嬖令色充積閨帷皆當盛其玩飾冗食空宫勞散精神生長六疾左傳曰天有六氣滛生六疾六氣曰隂陽風雨晦明過則為災隂滛寒疾陽滛熱疾風滛未疾雨滛腹疾晦滛惑疾明滛心疾女隂物也而晦時滛則生内熱惑蠱之疾也此國之費也生之傷也且天地之性隂陽正紀隔絶其道則水旱為并詩云五日為期六日不詹詩小雅曰}
