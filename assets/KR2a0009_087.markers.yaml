  - {type: variant, offset: 826, length: 0, content: '', krp: 譲戫濟由是諸坐謡言徵者悉拜議郎宦官怨之遂誣䧟耽死獄中李雲傳李雲字行祖甘陵人也性好學善隂陽初舉孝亷再遷白馬令桓帝延熹二年誅大將軍梁冀而中常侍單超等五人皆以誅冀功並封列侯專權選舉又立掖庭民女亳氏為皇后數月間后家封者四人賞賜巨萬時封后兄康為比陽侯弟統昆陽侯統從兄㑹安陽侯統弟秉為濟陽侯是時地數震裂衆災頻降雲素剛憂國將危心不能忍乃露布上書移副三府露布謂不封之也并以副本上三公府也曰臣聞皇后天下母徳配坤靈得其人則五氏來備不得其人則地動揺宫史記曰庶徵曰雨曰暘曰燠曰風曰寒五者來備各以其序庻草繁廡是與氏古字通耳春秋漢含孳曰女主盛臣制命則地動比年災異可謂多矣皇天之戒可謂至矣高祖受命至今三百六十四嵗君期一周當有黄精代見姓陳項虞田許氏不可令此人居太尉太傅典兵之官黄精謂魏氏將興陳項虞田並舜之後舜土德亦尚黄故忌也舉厝至重不可不慎班功行賞宜應其實梁冀雖持權專擅虐流天下今以罪行誅猶召家臣搤殺之耳而猥封謀臣萬户以上高祖聞之得無見非西北列將得無觧體列將謂皇甫規段頴等孔子曰帝者諦也春秋運斗樞曰五帝脩名立功脩德成化統調隂陽招類使神故稱帝帝之諦言也鄭𤣥注云審諦於物也劉攽曰注帝之諦言也案文言當在諦字上今官位錯亂小人諂進財貨公行政化日損尺一拜用不經御省尺一之板謂詔䇿也見漢官儀是帝欲不諦乎帝得奏震怒下有司逮雲詔尚書都䕶劒㦸送黄門北寺獄使中常侍管霸與御史廷尉雜考之時𢎞農五官掾杜衆傷雲以忠諫獲罪上書願與雲同日死帝愈怒遂并下廷尉大鴻臚陳蕃上疏救雲曰李雲所言雖不識禁忌干上逆旨其意歸於忠國而已昔高祖忍周昌不諱之諫成帝赦朱雲腰領之誅周昌觧見陳忠傳朱雲上書曰臣願賜尚方斬馬劍斷佞臣一人以厲其餘上問誰也對曰安昌侯張禹上大怒曰小臣居下訕上廷辱師傅罪死不赦御史將雲去左將軍辛慶忌以死争上意觧然後得已事並見前書今日殺雲臣恐剖心之譏復議於世矣比干以死諫紂紂怒曰吾聞聖人心有七竅乃剖比干而觀其心事見史記故敢觸龍鱗冐昧以請韓子曰夫龍之為蟲也可狎而馴也然喉下有逆鱗嬰之則殺人人主有逆鱗説者嬰之則亦幾矣太常楊秉洛陽市長沐茂郎中上官資並上疏請雲帝恚甚有司奏以為大不敬詔切責蕃秉免歸田里茂資貶秩二等時帝在濯龍池管霸奏雲等事霸詭言曰李雲野澤愚儒杜衆郡中小吏出於狂戇不足加罪帝謂霸曰帝欲不諦是何等語而常侍欲原之邪顧使小黄門可其奏雲衆皆死獄中後冀州刺史賈琮使行部過祠雲墓刻石表之論曰禮有五諫諷為上五諫謂諷諫順諫闚諫指諫䧟諫也諷諫者知患禍之萌而諷告也順諫者出辭遜順不逆君心也闚諫者視人君顔色而諫也指諫者質指其事而諫也䧟諫者言國之害忘生為君也見大戴禮若夫託物見情因文載旨使言之者無罪聞之者足以自戒卜商詩序之文也貴在於意逹言從理歸乎正曷其絞訐摩上以衒沽成名哉絞直也訐正也沽賣之也李雲草茅之生不識失身之義儀禮曰凡自稱於君宅在邦者曰市井之臣在野則曰草茅之臣庶人則曰刺草之臣易曰臣不密則失身劉攽曰注宅在邦者案儀禮文公宅者在邦此誤遂乃露布帝者班檄三公至於誅死而不顧斯豈古之狂也論語曰古之狂也直今之狂也詐而已矣夫未信而諫則以為謗己論語曰事君信而後諫其君未信則以為謗己故説者識其難焉韓非有説難篇劉瑜傳劉瑜字季節廣陵人也高祖父廣陵靖王父辯清河太守謝承書云父祥為清河太守瑜少好經學尤善圗䜟天文歴筭之術州郡禮請不就延熹八年太尉楊秉舉賢良方正及到京師上書陳事曰臣瑜自念東國鄙陋得以豐沛枝𦙍被䝉復除不給卒伍故太尉楊秉知臣竊闚典籍猥見顯舉誠冀臣愚直有補萬一而秉忠謨不遂命先朝露臣在下土聽聞歌謡驕臣虐政之事遠近呼嗟之音竊為辛楚泣血漣如幸得引錄備答聖問泄寫至情不敢庸回庸用也回邪也誠願陛下且以湏㬰之慮覽今往之事人何為咨嗟天曷為動變蓋諸侯之位上法四七垂文炳燿關之盛衰者也四七二十八宿也諸侯為天子守四方猶天之有二十八宿漢官儀曰天子建侯上法四七也今中官邪孽比肩裂土皆競立𦙍嗣繼體傳爵或乞子疎屬或買皃市道殆乖開國承家之義易曰大君有命開國承家古者天子一娶九女公羊傳曰諸侯一聘三女天子一娶九女夏殷制也娣姪有序河圖授嗣正在九房今女嬖令色充積閨帷皆當盛其玩飾冗食空宫勞散精神生長六疾左傳曰天有六氣滛生六疾六氣曰隂陽風雨晦明過則為災隂滛寒疾陽滛熱疾風滛未疾雨滛腹疾晦滛惑疾明滛心疾女隂物也而晦時滛則生内熱惑蠱之疾也此國之費也生之傷也且天地之性隂陽正紀隔絶其道則水旱為并詩云五日為期六日不詹詩小雅曰}
  - {type: variant, offset: 827, length: 0, content: '', WYG: 朝采藍不盈一䄡五日為期六日不詹注云詹至也婦人過時而怨曠期至五日而歸今六日不至是以憂也怨曠作歌仲尼所錄謂仲尼刪詩編錄也況從㓜至長幽藏殁身又常侍黄門亦廣妻娶怨毒之氣結成妖𤯝行路之言官發畧人女取而復置轉相驚懼孰不悉然無縁空生此謗鄒衍匹夫杞氏匹婦尚有城崩霜隕之異況乃羣軰咨怨能無感乎淮南子曰鄒衍事燕恵王盡忠左右譖之王繫之仰天而哭五月天為之下霜列女傳曰齊人杞梁襲莒戰死其妻無所歸乃就夫尸於城下而哭之七日城崩也昔秦作阿房國多刑人今第舍増多窮極竒巧掘山攻石不避時令禮記月令曰孟夏之月無有壞墮無起土功無發大衆也促以嚴刑威以法正劉攽曰案文當作正法民無罪而覆入之民有田而覆奪之州郡官府各自考事姦情賕賂皆為吏餌民愁鬱結起入賊黨官輒興兵誅討其罪貧困之民或有賣其首級以要酬賞父兄相代殘身妻孥相視分裂窮之如彼伐之如此豈不痛哉又陛下以北辰之尊神器之寳而㣲行近習之家私幸宦官之舍近習謂親近狎者賔客市買熏灼道路因此暴縱無所不容今三公在位皆博逹道蓺而各正諸己莫或匡益者非不智也畏死罰也惟陛下設置七臣以廣諫道孝經曰古者天子有争臣七人鄭𤣥注七人謂三公及前疑後承左輔右弼及開東序金縢史官之書從堯舜禹湯文武致興之道爾雅曰東西廂謂之序書曰天球河圖在東序縢緘也以金緘之不欲人開也遠佞邪之人放鄭衛之聲則政致和平德感祥風矣孝經援神契曰德至八方則祥風至臣悾悾推情言不足採悾悾誠懇之貎懼以觸忤征營慴悸於是特詔召瑜問災咎之徵指事案經䜟以對執政者欲令瑜依違其辭而更䇿以它事瑜復悉心以對八千餘言有切於前帝竟不能用拜為議郎及帝崩大將軍竇武欲大誅宦官乃引瑜為侍中又以侍中尹勲為尚書令共同謀畫及武敗瑜勲並被誅事在武傳勲字伯元河南人從祖睦為太尉睦孫頌為司徒勲為人剛毅直方少時毎讀書得忠臣義士之事未嘗不投書而仰歎自以行不合於當時不應州郡公府禮命桓帝時以有道徴四遷尚書令延熹中誅大將軍梁冀帝召勲部分衆職甚有方畧封宜陽鄉侯僕射霍諝尚書張敬歐陽参李偉虞放周永並封亭侯勲後再遷至九卿以病免拜為侍中八年中常侍具瑗左悺等有罪免奪封邑因黜勲等爵瑜誅後宦官悉焚其上書以為訛言子琬傳瑜學明占候能著災異舉方正不行謝弼傳謝弼字輔宣東郡武陽人也謝承書曰弼字輔鸞東郡濮陽人也與此不同中直方正猶言中正方直也為鄉邑所宗師建寕二年詔舉有道之士弼與東海陳敦𤣥莬公孫度俱對䇿皆除郎中時青蛇見前殿大風㧞木詔公卿以下陳得失弼上封事曰臣聞和氣應於有德祅異生乎失政上天告譴則王者思其愆政道或虧則姦臣當其罰夫蛇者隂氣所生鱗者甲兵之符也謝承書曰蛇者隂氣所生龍之類也龍有鱗甲兵之符也鴻範傳曰厥極弱時則有蛇龍之孽前書曰皇之不極是謂不建厥極弱時則有下伐上之痾龍蛇之孽也又熒惑守亢裴回不去法有近臣謀亂發於左右不知陛下所與從容帷幄之内親信者為誰宜急斥黜以消天戒臣又聞惟虺惟蛇女子之祥詩小雅之文也鄭𤣥注云虺蛇宂處隂之祥也故為生女伏惟皇太后定䇿宫闥援立聖明書云父子兄弟罪不相及竇氏之誅豈宜咎延太后幽隔空宫愁感天心如有霧露之疾陛下當何面目以見天下文帝徙淮南王長於蜀袁盎曰淮南王為人剛今暴摧折之臣恐其逢霧露病死陛下冇殺弟之名也昔周㐮王不能敬事其母戎狄遂至交侵史記曰周㐮王母早死後母曰恵后生叔帯有寵帯與戎翟謀伐㐮王孝和皇帝不絶竇氏之恩前世以為美談竇太后崩張酺等奏云不宜合葬先帝和帝手詔曰臣子無貶尊上之文恩不忍離於是合葬見皇后紀也禮為人後者為之子今以桓帝為父豈得不以太后為母哉援神契曰天子行孝四夷和平方今邉境日蹙兵革蜂起自非孝道何以濟之願陛下仰慕有虞蒸蒸之化俯思凱風慰母之念尚書舜典曰蒸蒸乂不格姦孔安國注云蒸蒸猶進進也言舜進於善道詩凱風曰有子七人莫慰母心臣又聞爵賞之設必酬庸勲開國承家小人勿用易師卦上六爻詞也今功臣乆外未䝉爵秩阿母寵私乃享大封大風雨雹亦由於兹又故太傅陳蕃輔相陛下勤身王室夙夜匪懈而見䧟羣邪一旦誅滅其為酷濫駭動天下門生故吏並離徙錮蕃身已徃人百何贖詩國風曰如可贖兮人百}
