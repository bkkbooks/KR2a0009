  - {type: variant, offset: 4857, length: 516, content: 四篇皆傳於世蔡玄字叔陵汝南南頓人也學通五經門徒常千人其著錄者萬六千人徵辟並不就順帝特詔徵拜議郎講論五經異同甚合帝意遷侍中出為弘農太守卒官論曰自光武中年以後干戈稍戢專事經學自是其風世篤焉其服儒衣稱先王遊庠序聚橫塾者蓋布之於邦域矣若乃經生所處不遠萬里之路精廬暫建贏糧動有千百其耆名高義開門受徒者編牒不下萬人皆專相傳祖莫或訛雜至有分爭王庭樹朋私里繁其章條穿求崖穴以合一家之說故楊雄曰今之學者非獨為之華藻又從而繡其鞶帨夫書理無二義歸有宗而碩學之徒莫之或徙故通人鄙其固焉又雄所謂譊譊之學各習其師也且觀成名高第終能遠至者蓋亦寡焉而迂滯若是矣然所談者仁義所傳者聖法也故人識君臣父子之綱家知違邪歸正之路自桓靈之閒君道秕僻朝綱日陵國𨻶屢啟自中智以下靡不審其崩離而權彊之臣息其闚盜之謀豪俊之夫屈於鄙生之議者人誦先王言也下畏逆順埶也至如張溫皇甫嵩之徒功定天下之半聲馳四海之表俯仰顧眄則天業可移猶鞠躬昏主之下狼狽折札之命散成兵就繩約而無悔心暨乎剝橈自極人神數盡然後羣英乘其運世德終其祚跡衰敝之所由致而能多歷年所者斯豈非學之效乎故先師垂典文襃勵學者之功篤矣切矣不循春秋至乃比於殺逆其將有意乎贊曰斯文未陵亦各有承塗分流別專門並興精疏殊會通閡相徵千載不作淵原誰澂, WYG: 七考證}
