  - {type: variant, offset: 4689, length: 167, content: 奏詔即徵還拜議郎以壽終建武中鄭興陳元傳春秋左氏學時尚書令韓歆上疏欲為左氏立博士范升與歆爭之未決陳元上書訟左氏遂以魏郡李封為左氏博士後羣儒蔽固者數廷爭之及封卒光武重違衆議而因不復補許慎字叔重汝南召陵人也性淳篤少博學經籍馬融常推敬之時人為之語曰五經無雙許叔重為郡功曹舉孝廉再遷除洨長卒于家初慎以五經傳說臧否不同於是撰為五經異義又作說文解字, WYG: 八}
