  - {type: variant, offset: 3442, length: 258, content: 著書百餘篇皆五經通難又作孟子章句建初三年舉孝廉遷海西令卒於官張玄字君夏河內河陽人也少習顏氏春秋兼通數家法建武初舉明經補弘農文學遷陳倉縣丞清淨無欲專心經書方其講問乃不食終日及有難者輒為張數家之說令擇從所安諸儒皆伏其多通著錄千餘人玄初為縣丞嘗以職事對府不知官曹處吏白門下責之時右扶風琅邪徐業亦大儒也聞玄諸生試引見之與語大驚曰今日相遭真解矇矣遂請上堂難問極日後玄去官舉孝廉除為郎會顏氏博士缺玄試策第一拜為博士居數月諸生上言玄兼說嚴氏宣冥氏不宜專為顏氏博士光武且令還署未及遷而卒李育字元春扶風漆人也少習公羊春秋沈思專精博覽書, WYG: 劉陶}
