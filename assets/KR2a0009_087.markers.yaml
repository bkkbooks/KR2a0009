  - {type: variant, offset: 3019, length: 360, content: 數為三老五更建初中致仕卒於家鍾興字次文汝南汝陽人也少從少府丁恭受嚴氏春秋恭薦興學行高明光武召見問以經義應對甚明帝善之拜郎中稍遷左中郎將詔令定春秋章句去其復重以授皇太子又使宗室諸侯從興受章句封關內侯興自以無功不敢受爵帝曰生教訓太子及諸王侯非大功邪興曰臣師丁恭於是復封恭而興遂固辭不受爵卒於官甄宇字長文北海安丘人也清靜少欲習嚴氏春秋教授常數百人建武中為州從事徵拜博士稍遷太子少傅卒於官傳業子普普傳子承承尤篤學未嘗視家事講授常數百人諸儒以承三世傳業莫不歸服之建初中舉孝廉卒於梁相子孫傳學不絕樓望字次子陳留雍丘人也少習嚴氏春秋操節清白有稱鄉閭建武中趙節王栩聞其高名遣使齎玉帛請以為師望不受後仕郡功曹永平初為侍中越騎校尉入講省內十六年遷大司農十八年代周澤為太常建初五年坐事左轉太中大夫後為左中郎將教授不倦世稱儒宗諸生著錄九千餘人年, WYG: 漢書卷}
