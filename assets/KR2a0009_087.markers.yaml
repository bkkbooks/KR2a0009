  - {type: variant, offset: 827, length: 0, content: '', krp: 朝采藍不盈一䄡五日為期六日不詹注云詹至也婦人過時而怨曠期至五日而歸今六日不至是以憂也怨曠作歌仲尼所錄謂仲尼刪詩編錄也況從㓜至長幽藏殁身又常侍黄門亦廣妻娶怨毒之氣結成妖𤯝行路之言官發畧人女取而復置轉相驚懼孰不悉然無縁空生此謗鄒衍匹夫杞氏匹婦尚有城崩霜隕之異況乃羣軰咨怨能無感乎淮南子曰鄒衍事燕恵王盡忠左右譖之王繫之仰天而哭五月天為之下霜列女傳曰齊人杞梁襲莒戰死其妻無所歸乃就夫尸於城下而哭之七日城崩也昔秦作阿房國多刑人今第舍増多窮極竒巧掘山攻石不避時令禮記月令曰孟夏之月無有壞墮無起土功無發大衆也促以嚴刑威以法正劉攽曰案文當作正法民無罪而覆入之民有田而覆奪之州郡官府各自考事姦情賕賂皆為吏餌民愁鬱結起入賊黨官輒興兵誅討其罪貧困之民或有賣其首級以要酬賞父兄相代殘身妻孥相視分裂窮之如彼伐之如此豈不痛哉又陛下以北辰之尊神器之寳而㣲行近習之家私幸宦官之舍近習謂親近狎者賔客市買熏灼道路因此暴縱無所不容今三公在位皆博逹道蓺而各正諸己莫或匡益者非不智也畏死罰也惟陛下設置七臣以廣諫道孝經曰古者天子有争臣七人鄭𤣥注七人謂三公及前疑後承左輔右弼及開東序金縢史官之書從堯舜禹湯文武致興之道爾雅曰東西廂謂之序書曰天球河圖在東序縢緘也以金緘之不欲人開也遠佞邪之人放鄭衛之聲則政致和平德感祥風矣孝經援神契曰德至八方則祥風至臣悾悾推情言不足採悾悾誠懇之貎懼以觸忤征營慴悸於是特詔召瑜問災咎之徵指事案經䜟以對執政者欲令瑜依違其辭而更䇿以它事瑜復悉心以對八千餘言有切於前帝竟不能用拜為議郎及帝崩大將軍竇武欲大誅宦官乃引瑜為侍中又以侍中尹勲為尚書令共同謀畫及武敗瑜勲並被誅事在武傳勲字伯元河南人從祖睦為太尉睦孫頌為司徒勲為人剛毅直方少時毎讀書得忠臣義士之事未嘗不投書而仰歎自以行不合於當時不應州郡公府禮命桓帝時以有道徴四遷尚書令延熹中誅大將軍梁冀帝召勲部分衆職甚有方畧封宜陽鄉侯僕射霍諝尚書張敬歐陽参李偉虞放周永並封亭侯勲後再遷至九卿以病免拜為侍中八年中常侍具瑗左悺等有罪免奪封邑因黜勲等爵瑜誅後宦官悉焚其上書以為訛言子琬傳瑜學明占候能著災異舉方正不行謝弼傳謝弼字輔宣東郡武陽人也謝承書曰弼字輔鸞東郡濮陽人也與此不同中直方正猶言中正方直也為鄉邑所宗師建寕二年詔舉有道之士弼與東海陳敦𤣥莬公孫度俱對䇿皆除郎中時青蛇見前殿大風㧞木詔公卿以下陳得失弼上封事曰臣聞和氣應於有德祅異生乎失政上天告譴則王者思其愆政道或虧則姦臣當其罰夫蛇者隂氣所生鱗者甲兵之符也謝承書曰蛇者隂氣所生龍之類也龍有鱗甲兵之符也鴻範傳曰厥極弱時則有蛇龍之孽前書曰皇之不極是謂不建厥極弱時則有下伐上之痾龍蛇之孽也又熒惑守亢裴回不去法有近臣謀亂發於左右不知陛下所與從容帷幄之内親信者為誰宜急斥黜以消天戒臣又聞惟虺惟蛇女子之祥詩小雅之文也鄭𤣥注云虺蛇宂處隂之祥也故為生女伏惟皇太后定䇿宫闥援立聖明書云父子兄弟罪不相及竇氏之誅豈宜咎延太后幽隔空宫愁感天心如有霧露之疾陛下當何面目以見天下文帝徙淮南王長於蜀袁盎曰淮南王為人剛今暴摧折之臣恐其逢霧露病死陛下冇殺弟之名也昔周㐮王不能敬事其母戎狄遂至交侵史記曰周㐮王母早死後母曰恵后生叔帯有寵帯與戎翟謀伐㐮王孝和皇帝不絶竇氏之恩前世以為美談竇太后崩張酺等奏云不宜合葬先帝和帝手詔曰臣子無貶尊上之文恩不忍離於是合葬見皇后紀也禮為人後者為之子今以桓帝為父豈得不以太后為母哉援神契曰天子行孝四夷和平方今邉境日蹙兵革蜂起自非孝道何以濟之願陛下仰慕有虞蒸蒸之化俯思凱風慰母之念尚書舜典曰蒸蒸乂不格姦孔安國注云蒸蒸猶進進也言舜進於善道詩凱風曰有子七人莫慰母心臣又聞爵賞之設必酬庸勲開國承家小人勿用易師卦上六爻詞也今功臣乆外未䝉爵秩阿母寵私乃享大封大風雨雹亦由於兹又故太傅陳蕃輔相陛下勤身王室夙夜匪懈而見䧟羣邪一旦誅滅其為酷濫駭動天下門生故吏並離徙錮蕃身已徃人百何贖詩國風曰如可贖兮人百}
