  - {type: variant, offset: 822, length: 0, content: '', krp: 奏下詔書切勑州郡䕶送流民㑹賜去位不復捕錄雖㑹赦令而謀不觧散四方私言云角等竊入京師覘視朝政鳥聲獸心私共嗚呼州郡忌諱不欲聞之但更相告語莫肯公文宜下明詔重募角等賞以國土有敢回避與之同罪帝殊不悟方詔陶次第春秋條例明年張角反亂海内鼎沸帝思陶言封中陵鄉侯三遷尚書令以所舉將為尚書難與齊列乞從冗散拜侍中以數切諌為權臣所憚徙為京兆尹到職當出脩宫錢直千萬時拜職名當出買官之錢謂之脩宫錢也陶既清貧而恥以錢買職稱疾不聼政帝宿重陶才原其罪徵拜諫議大夫是時天下日危寇賊方熾陶憂致崩亂復上疏曰臣聞事之急者不能安言心之痛者不能緩聲竊見天下前遇張角之亂後遭邉章之宼每聞羽書告急之聲心灼内熱四體驚竦今西羌逆類私署將帥皆多叚頴時吏曉習戰陳識知山川變詐萬端臣常懼其輕出河東馮翊鈔西軍之後東之函谷據阸高望今果已攻河東恐遂轉更豕突上京如是則南道斷絶車騎之軍孤立時湟中義從胡北宫伯玉等叛遣左車騎將軍皇甫嵩討之不尅也關東破膽四方動揺威之不來叫之不應雖有田單陳平之䇿計無所用臣前驛馬上便宜急絶諸郡賦調冀尚可安事付主者留連至今莫肯求問今三郡之民皆以奔亡南出武關北徙壺谷三郡河東馮翊京兆也壺谷壺關之谷在上黨也冰駭風散唯恐在後今其存者尚十三四軍吏士民悲愁相守民有百走退死之心而無一前鬭生之計西宼浸前去營咫尺胡騎分布已至諸陵將軍張温天性精勇而主者旦夕廹促軍無後殿假令失利其敗不救臣自知言數見厭而言不自裁者以為國安則臣蒙其慶國危則臣亦先亡也謹復陳當今要急八事乞湏臾之間深垂納省其八事大較言天下大亂皆由宦官宦官事急共䜛陶曰前張角事發詔書示以威恩自此以來各各改悔今者四方安静而陶疾害聖政專言妖孽州郡不上陶何縁知疑陶與賊通情於是收陶下黄門北寺獄掠按日急陶自知必死對使者曰朝廷前封臣云何今反受邪譖恨不與伊吕同疇而以三仁為軰論語曰殷有三仁焉㣲子去之箕子為之奴比干諫而死遂閉氣而死天下莫不痛之陶著書數十萬言又作七曜論匡老子反韓非復孟軻及上書言當世便事條教賦奏書記辯疑凡百餘篇時司徒東海陳耽亦以非罪與陶俱死耽以忠正稱歴位三司光和五年詔公卿以謡言舉刺史二}
