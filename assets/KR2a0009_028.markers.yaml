  - {type: variant, offset: 3736, length: 0, content: '', krp: 深惟禹湯罪已之義歸咎自責寅畏天戒詳延百僚博問公卿知變所自審得厥故修復往術以答天命臣子逺近莫不延頸企踵茍有隙空一介之知事願自效貢納}
  - {type: variant, offset: 3737, length: 5, content: 德係興再隆, WYG: 聽臣伏見日蝕之占自昔典籍十月之交春秋傳記漢注所載史官占候羣臣宻對陛下所觀覽左右所諷誦可謂詳悉備矣雖復廣問䧟在前志無以復加乃者茀氣于參臣前得敦朴之人後三年二月對䇿北宫端門以為參者西方之位其於分野并州是也殆謂西戎北狄其後種𦍑叛戻烏桓犯上郡并凉動兵驗略效矣今復見}
