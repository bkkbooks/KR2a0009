  - {type: variant, offset: 7738, length: 0, content: '', krp: 大水多死傷在角六度中平三年五月壬辰晦日有蝕之潛潭巴曰壬辰蝕河決}
  - {type: variant, offset: 7739, length: 1, content: 內, WYG: 久霧連隂六年四月丙午朔日有蝕之其月浹辰宫車晏駕獻帝初平四年正月甲寅朔日有蝕之在營室四度潛潭巴曰甲寅蝕雷電擊殺骨肉相攻是時李傕郭汜專政袁宏紀曰未蝕八刻太史令王立奏曰日晷過度無有變也於是朝臣皆賀帝宻令尚書候焉未晡一刻而蝕尚書賈詡奏曰立伺候不明疑悮上下太尉周忠職所典掌請皆治罪詔曰天道遠事驗難明且灾異應政而至雖探道知機焉能無失而欲歸咎史官益重朕之不徳也弗從於是避正殿寢兵不聼事五日興平元年六月乙巳晦日有蝕之建安五年九月庚午朔日有蝕之潛潭巴曰庚午蝕後火燒官兵六年十月癸未朔日有蝕之十三年十月癸未朔日有蝕之潛潭巴曰癸未蝕仁義不明在尾十二度十五年二月乙巳朔日有蝕之十七年六月庚寅晦日有蝕之二十一年五月己亥朔日有蝕之潛潭巴曰己亥蝕小人用事君子縶二十四年二月壬子晦日有蝕之凡漢中興十二世百九十六年日蝕七十二朔三十二晦三十七月二日三光武建武七年四月丙寅日有暈抱白虹貫暈在畢八度古今注曰時日加卯西面東面有抱湏臾成暈中有兩鈎在南北面有白虹貫暈在西北南面有背在景加已皆觧也畢為邉兵秋隗囂反侵安定皇徳傳史曰白虹貫下破軍晋分也古今注曰章帝建初元年正月壬申白虹貫日五年七月甲寅夜白虹出乙丑地西北曲入七年四月丙寅日加卯西面有抱湏臾成暈有白虹貫日殤帝延平元年六月丁未日暈上有半暈暈中外有僪背两珥十二月丙寅日暈再重中有背僪順帝永建二年正月戊午白虹貫日三年正月丁酉日有白虹貫交暈中六年正月丁卯日暈两珥白虹貫珥中永和六年正月己卯暈两珥中赤外靑白虹貫暈中案郎顗傳陽嘉二年正月乙卯白虹貫日又唐檀傳永建五年白虹貫日檀上便宜三事陳其咎徵春秋元命苞曰隂陽之氣聚為雲氣立為虹蜺離為倍僪分為抱珥考異郵曰臣謀反徧刺日巫咸占曰臣不知則日月僪如淳曰蝃蝀謂之虹雌謂之蜺向外曰倍刺日曰僪在旁如半環向日曰抱在傍直對曰珥孟康曰僪如僪也宋均曰黄氣抱日輔臣納忠靈帝時日數出東方正赤如血無光髙二丈餘乃有景且入西方去地二丈亦如之京房占曰國有侫䜛朝有殘臣則曰不光闇㝠不明孟康曰日月無光曰薄其占曰事天不謹則日月赤是時日出入去地二三丈皆赤如血者數矣春秋感精符曰日無光主勢奪羣臣以讒術色赤如炭以急見伐又兵馬發禮斗威儀曰日月赤君喜怒無常輕殺不辜戮於無罪不事天地忽於鬼神時則大雨土風常起日蝕無光地動雷降其時不救兵從外来為賊戮而不葬京房占曰日無故日夕無光天下變枯社稷移主光和四年二月己巳黄氣抱日黄白珥在其表春秋感精符曰日朝珥則有喪孽又云日已出若其入而雲皆赤黄名曰日空不出三年必有移民而去者也中平四年三月丙申黒氣大如𤓰在日中春秋感精符曰日黒則水滛溢五年正月日色赤黄中有黒氣如飛鵲數月乃銷六年二月乙未白虹貫日春秋感精符曰虹貫日天下悉極文法大擾百官殘賊酷法横殺下多相告刑用及族世多深刻獄}
