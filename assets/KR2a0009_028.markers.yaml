  - {type: variant, offset: 4565, length: 0, content: '', WYG: 東井主法梁太后又聽兄冀枉殺公卿犯天法也明年太后崩元嘉二年七月二日庚辰日有蝕之在翼四度史官不見廣陵}
  - {type: page-break, offset: 4565, content: '', id: KR2a0009_WYG_028-12a, image: WYG0252/WYG0252-0358a.png}
  - {type: variant, offset: 4565, length: 0, content: '', krp: 東井主法梁太后又聽兄冀枉殺公卿犯天法也明年太后崩元嘉二年七月二日庚辰日有蝕之在翼四度史官不見廣陵}
  - {type: line-break, offset: 4566, content: '', id: ZHSJ__dup7047}
  - {type: variant, offset: 4566, length: 10, content: 勤勞賜爵關內侯遷尚書, WYG: 聞京房占曰庚辰蝕君易賢以剛卒以自傷後有水翼主倡樂時上好樂過阮籍樂論曰桓帝聞琴悽愴傷心倚扆而悲慷慨長息曰善乎哉為琴若此一而足矣永興二年九月丁卯朔日有蝕之在角五度角鄭宿也十一月泰山盗賊群起劫殺長吏泰山於天文屬鄭永夀三年閏月庚辰晦日有蝕之在七星二度史官不見郡國以聞例在永元四年後二嵗梁皇后崩冀兄弟被誅延熹元年五月甲戌晦日有蝕之在栁七度京都宿也梁冀别傳曰常侍徐璜白言臣切見道術家常言漢死在戌亥今太嵗在丙戌五月甲戍日蝕栁宿朱雀漢家之貴國宿分周地今京師是也史官上占去重見輕璜召太史陳援詰問乃以實對冀怨援不為隐諱使人隂求其短發擿上聞上以亡失候儀不肅有司奏収殺獄中八年正月丙申晦日有蝕之在營室十三度營室之中女主象也其二月癸亥鄧皇后坐酗上送暴室}
  - {type: page-break, offset: 4566, content: '', id: KR2a0009_WYG_028-12b, image: WYG0252/WYG0252-0358b.png}
