  - {type: variant, offset: 1400, length: 2, content: 張步, krp: 雒陽候者不見八年十月古今注曰十二月壬寅晦日有蝕之既潛潭巴曰壬寅蝕天下苦兵大臣驕横在斗十一度斗吳也廣陵於天文屬吳後二年廣陵王荆坐謀反自殺十三年十月古今注曰閏八月甲辰晦日有蝕之潜潭巴曰甲辰蝕四騎脅大水在尾十七度京房占曰主后夀命絶後有大水十六年五月戊午晦日有蝕之潛潭巴曰戊午蝕乆旱榖不傷在栁十五度儒說五月戊午猶十一月甲子也又宿在京都其占重後二嵗宫車晏駕十八年十一月甲辰晦日有蝕之在斗二十一度是時明帝既崩馬太后制爵禄故陽不勝章帝建初五年二月庚辰朔日有蝕之潛潭巴曰庚辰蝕彗星東至有宼兵在東壁八度例在前建武二十九年是時群臣爭經多相非毁者又别夲云庚辰蝕大旱六年六月辛未晦日有蝕之潛潭巴曰辛未蝕大水在翼六度翼主逺客冬東平王蒼等來朝明年正月蒼薨古今注曰元和元年九月己未日有蝕之元和元年八月乙未晦日有蝕之史官不見佗官以聞日在氐四度星占曰天下災期三年和帝永元二年二月壬午日有蝕之潛潭巴曰壬午蝕乆雨旬望史官不見涿郡以聞日在奎八度京房占曰三公與諸侯相賊弱其君王天應而日蝕三公失國後旱且水臣昭以為三公宰輔之位即竇憲四年六月戊戌朔日有蝕之潛潭巴曰戊戌蝕有土殃主后死天下諒陰京房占曰婚嫁家欲戮在七星二度主衣裳又曰行近軒轅在左角為太后族是月十九日案夲紀庚申幸北宫詔捕憲等庚申是二十三日上免太后}
  - {type: variant, offset: 1404, length: 3, content: 各擁彊, WYG: 竇憲等官遣就國選嚴能相於國蹙廹自殺七年四月辛亥朔日有蝕之潛潭巴曰辛亥蝕子為雄在觜觽為葆旅主収歛儒説葆旅宫中之象収歛貪妬之象是嵗鄧貴人始入明年三月陰皇后立鄧貴人有寵陰后妬忌之後遂坐廢一曰是將入參参伐為斬刈明年七月越騎校尉馮柱捕斬匈奴温禺犢王烏居戰十二年秋七月辛亥朔日有蝕之在翼八度荆州宿也明年冬南郡蠻夷反為宼十五年四月甲子晦日有蝕之在東井二十二度東井主酒食之宿也婦人之職無非無儀酒食是議去年冬鄧皇后立有丈夫之性與知外事故天示象是年水雨傷稼安帝永初元年三月二日癸酉日有蝕之在胃二度胃主廪倉是時鄧太后専政去年大水傷稼倉廩為虛古今注曰三年三月日有蝕之五年正月庚辰朔日有蝕之在虛八度正月王者統事之正日也虛空名也是時鄧太后攝政安帝不得行事俱不得其正若王者位虛故於正月陽不克示象也於是陰預乘陽故夷狄並為㓂害西邉諸郡皆至虛空七年四月丙申晦日有蝕之潛潭巴曰丙申蝕諸侯相攻京房占曰君臣暴虐臣下横恣上下相賊後有地動在東井一度元初元年十月戊子朔日有蝕之潛潭巴曰戊子蝕宫室内婬雌必成雄京房占曰妻欲害夫九族夷滅後有大水在尾十度尾為後宫繼嗣之宫也是時上甚幸閻貴人將立故示不善將為繼嗣禍也明年四月遂立為后後遂與江京耿寳等共讒太子廢之二年九月壬午晦日有蝕之在心四度心為王者明乆失位也三年三月二日辛亥日有蝕之在婁五度史官不見遼東以聞四年二月乙亥朔日有蝕之潛潭巴曰乙亥蝕東國發}
