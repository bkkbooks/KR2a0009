  - {type: variant, offset: 132, length: 181, content: 立以為平原太守時倉卒兵起天下驚擾而湛獨晏然教授不廢謂妻子曰夫一穀不登國君徹膳今民皆飢奈何獨飽乃共食麤糲悉分奉祿以賑鄉里來客者百餘家時門下督素有氣力謀欲為湛起兵湛惡其惑衆即收斬之徇首城郭以示百姓於是吏人信向郡內以安平原一境湛所全也光武即位知湛名儒舊臣欲令幹任內職徵拜尚書使典定舊制時大司徒鄧禹西征關中帝以湛才任宰相拜為司直行大司徒事車駕每出征伐常留鎮守總攝羣司建武, WYG: ''}
