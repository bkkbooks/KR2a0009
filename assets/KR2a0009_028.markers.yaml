  - {type: variant, offset: 3259, length: 454, content: 乞拜太中大夫卒策曰太中大夫宋漢清修雪白正直無邪前在方外仍統軍實懷柔異類莫匪嘉績戎車載戢邊人用寧予錄乃勳引登九列因病退讓守約彌堅將授三事未剋而終朝廷慜悼怛其愴然詩不云乎肇敏戎功用錫爾祉其令將相大夫會葬加賜錢十萬及其在殯以全素絲羔羊之絜焉子則字元矩為鄢陵令亦有名迹拔同郡韋著扶風法真稱為知人則子年十歲與蒼頭共弩射蒼頭弦斷矢激誤中之即死奴叩頭就誅則察而恕之潁川荀爽深以為美時人亦服焉論曰中興以後居台相總權衡多矣其能以任職取名者豈非先遠業後小數哉故惠公造次急於鄉射之禮君房入朝先奏寬大之令夫器博者無近用道長者其功遠蓋志士仁人所為根心者也君子以之得固貴矣以之失亦得矣宋弘止繁聲戒淫色其有關雎之風乎蔡茂字子禮河內懷人也哀平閒以儒學顯徵試博士對策陳災異以高等擢拜議郎遷侍中遇王莽居攝以病自免不仕莽朝會天下擾亂茂素與竇融善因避難歸之融欲以為張掖太守固辭不就每所餉給計口取足而已後與融俱徵復拜議郎再遷廣漢太守有政績稱時陰氏賓客在郡界多犯吏禁茂輒糾案無所回避會洛陽令董宣舉糾湖陽公主帝始怒收宣既而赦之茂喜宣剛正欲令朝廷禁制貴戚乃, WYG: 縣}
