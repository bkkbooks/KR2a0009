  - {type: variant, offset: 1395, length: 0, content: '', krp: 谿蠻夷爲㓂害伏波將軍馬援将兵擊之古今注曰二十六年二月戊子日有蝕之盡二十九年二月丁巳朔日有蝕之潜潭巴曰丁巳蝕下有敗兵在東壁五度東壁為文章一名娵訾之口先是皇子諸王各招來文章談說之士去年中有人上奏諸王所招待者或眞偽雜受刑罸者子孫宜可分别於是上怒詔捕諸王客皆被以苛法死者}
  - {type: variant, offset: 1396, length: 2, content: 親接, WYG: 多世祖不早為明設刑禁一時治之過差故天示象世祖於是改悔遣使悉理侵枉也三十一年五月癸酉晦日有蝕之潛潭巴曰癸酉蝕連陰不觧滛雨毁山有兵在栁五度京都宿也自二十一年示象至此十年後二年宫車晏駕中元元年十一月甲子晦日有蝕之在斗二十度斗為廟主爵祿儒説十一月甲子時王日也又為星紀主爵禄其占重明帝永平三年八月壬申晦日有蝕之潛潭巴曰壬申蝕水滅陽潰隂欲翔在氐二度氐為宿宫是時明帝作北宫古今注曰四年八月丙寅時加未日有蝕之五年二月乙未朔日有蝕之京師候者不覺河南尹郡國三十一上六年六月庚辰晦日有蝕}
  - {type: page-break, offset: 1396, content: '', id: KR2a0009_WYG_028-4b, image: WYG0252/WYG0252-0354b.png}
  - {type: variant, offset: 1396, length: 2, content: 親接, krp: 多世祖不早為明設刑禁一時治之過差故天示象世祖於是改悔遣使悉理侵枉也三十一年五月癸酉晦日有蝕之潛潭巴曰癸酉蝕連陰不觧滛雨毁山有兵在栁五度京都宿也自二十一年示象至此十年後二年宫車晏駕中元元年十一月甲子晦日有蝕之在斗二十度斗為廟主爵祿儒説十一月甲子時王日也又為星紀主爵禄其占重明帝永平三年八月壬申晦日有蝕之潛潭巴曰壬申蝕水滅陽潰隂欲翔在氐二度氐為宿宫是時明帝作北宫古今注曰四年八月丙寅時加未日有蝕之五年二月乙未朔日有蝕之京師候者不覺河南尹郡國三十一上六年六月庚辰晦日有蝕}
