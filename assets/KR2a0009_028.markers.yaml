  - {type: variant, offset: 3743, length: 3, content: 命即位, WYG: 異申誡重譴於此二城海内莫見三月一日合辰在婁婁又西方之宿衆占顯明者𦍑及烏桓有悔過之辭将吏䇿勲之名臣恐受任典牧者茍脱目前皆粗圗身一時之權不顧為國百世之利論者羙近功忽其逺則各相不大疢病伏惟天象不虚老子曰圖難於其易也為大於其細也消灾復異宜在於今詩曰日月告凶不用其行四國無政不用其良傳曰國無政不用善則自取謫于日月之災故政不可不慎也務三而已一曰擇人二曰安民三曰從時臣融伏惟方今有道之世漢典設張侯甸采衛司民之吏案繩循墨雖有殿最所差無幾其䧟罪辟身自取禍百姓未被其大傷至邉郡牧御失和吉之與凶敗之與成優劣相懸不誡不可審擇其人上}
