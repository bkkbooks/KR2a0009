  - {type: variant, offset: 1400, length: 2, content: 張步, WYG: 雒陽候者不見八年十月古今注曰十二月壬寅晦日有蝕之既潛潭巴曰壬寅蝕天下苦兵大臣驕横在斗十一度斗吳也廣陵於天文屬吳後二年廣陵王荆坐謀反自殺十三年十月古今注曰閏八月甲辰晦日有蝕之潜潭巴曰甲辰蝕四騎脅大水在尾十七度京房占曰主后夀命絶後有大水十六年五月戊午晦日有蝕之潛潭巴曰戊午蝕乆旱榖不傷在栁十五度儒說五月戊午猶十一月甲子也又宿在京都其占重後二嵗宫車晏駕十八年十一月甲辰晦日有蝕之在斗二十一度是時明帝既崩馬太后制爵禄故陽不勝章帝建初五年二月庚辰朔日有蝕之潛潭巴曰庚辰蝕彗星東至有宼兵在東壁八度例在前建武二十九年是時群臣爭經多相非毁者又别夲云庚辰蝕大旱六年六月辛未晦日有蝕之潛潭巴曰辛未蝕大水在翼六度翼主逺客冬東平王蒼等來朝明年正月蒼薨古今注曰元和元年九月己未日有蝕之元和元年八月乙未晦日有蝕之史官不見佗官以聞日在氐四度星占曰天下災期三年和帝永元二年二月壬午日有蝕之潛潭巴曰壬午蝕乆雨旬望史官不見涿郡以聞日在奎八度京房占曰三公與諸侯相賊弱其君王天應而日蝕三公失國後旱且水臣昭以為三公宰輔之位即竇憲四年六月戊戌朔日有蝕之潛潭巴曰戊戌蝕有土殃主后死天下諒陰京房占曰婚嫁家欲戮在七星二度主衣裳又曰行近軒轅在左角為太后族是月十九日案夲紀庚申幸北宫詔捕憲等庚申是二十三日上免太后}
