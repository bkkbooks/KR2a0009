  - {type: variant, offset: 3949, length: 237, content: 廣漢夢坐大殿極上有三穗禾茂跳取之得其中穗輒復失之以問主簿郭賀賀離席慶曰大殿者宮府之形象也極而有禾人臣之上祿也取中穗是中台之位也於字禾失為秩雖曰失之乃所以得祿秩也袞職有闕君其補之旬月而茂徵焉乃辟賀為掾賀字喬卿雒陽人祖父堅伯父游君並修清節不仕王莽賀能明法累官建武中為尚書令在職六年曉習故事多所匡益拜荊州刺史引見賞賜恩寵隆異及到官有殊政百姓便之歌曰厥德仁明郭喬卿忠正朝廷上下平顯宗巡狩到南陽特見嗟歎賜以三公之服黼黻冕旒勑行部去襜帷使百姓見其容服以章有德每所經過吏人指以相示莫不榮之, WYG: ''}
