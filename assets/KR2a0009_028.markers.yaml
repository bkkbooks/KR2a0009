  - {type: variant, offset: 1395, length: 0, content: '', WYG: 谿蠻夷爲㓂害伏波將軍馬援将兵擊之古今注曰二十六年二月戊子日有蝕之盡二十九年二月丁巳朔日有蝕之潜潭巴曰丁巳蝕下有敗兵在東壁五度東壁為文章一名娵訾之口先是皇子諸王各招來文章談說之士去年中有人上奏諸王所招待者或眞偽雜受刑罸者子孫宜可分别於是上怒詔捕諸王客皆被以苛法死者}
