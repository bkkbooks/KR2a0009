  - {type: variant, offset: 315, length: 1071, content: 遂代鄧禹為大司徒封陽都侯時彭寵反於漁陽帝欲自征之湛上疏諫曰臣聞文王受命而征伐五國必先詢之同姓然後謀於羣臣加占蓍龜以定行事故謀則成卜則吉戰則勝其詩曰帝謂文王詢爾仇方同爾弟兄以爾鉤援與爾臨以伐崇庸崇國城守先退後伐所以重人命俟時而動故參分天下而有其二陛下承大亂之極受命而帝興明祖宗出入四年而滅鄉制五校降銅馬破赤眉誅鄧奉之屬不為無功今京師空匱資用不足未能服近而先事邊外且漁陽之地逼接北狄黠虜困迫必求其助又今所過縣邑尤為困乏種麥之家多在城郭聞官兵將至當已收之矣大軍遠涉二千餘里士馬罷勞轉糧艱阻今兗豫青冀中國之都而寇賊從橫未及從化漁陽以東本備邊塞地接外虜貢稅微薄安平之時尚資內郡況今荒耗豈足先圖而陛下捨近務遠棄易求難四方疑怪百姓恐懼誠臣之所惑也復願遠覽文王重兵博謀近思征伐前後之宜顧問有司使極愚誠采其所長擇之聖慮以中土為憂念帝覽其奏竟不親征時賊徐異卿等萬餘人據富平連攻之不下唯云願降司徒伏公帝知湛為青徐所信向遣到平原異卿等即日歸降護送洛陽湛雖在倉卒造次必於文德以為禮樂政化之首顛沛猶不可違是歲奏行鄉飲酒禮遂施行也其冬車駕征張步留湛居守時蒸祭高廟而河南尹司隸校尉於廟中爭論湛不舉奏坐策免六年徙封不其侯邑三千六百戶遣就國後南陽太守杜詩上疏薦湛曰臣聞唐虞以股肱康文王以多士寧是故詩稱濟濟書曰良哉臣詩竊見故大司徒陽都侯伏湛自行束脩訖無毀玷篤信好學守死善道經為人師行為儀表前在河內朝歌及居平原吏人畏愛則而象之遭時反覆不離兵凶秉節持重有不可奪之志陛下深知其能顯以宰相之重衆賢百姓仰望德義微過斥退久不復用有識所惜儒士痛心臣竊傷之湛容貌堂堂國之光暉智略謀慮朝之淵藪髫髮厲志白首不衰實足以先後王室名足以光示遠人古者選擢諸侯以為公卿是故四方回首仰望京師柱石之臣宜居輔弼出入禁門補缺拾遺臣詩愚戇不足以知宰相之才竊懷區區敢不自竭臣前為侍御史上封事言湛公廉愛下好惡分明累世儒學素持名信經明行修通達國政尤宜近侍納言左右舊制九州五尚書令一郡二人可以湛代頗為執事所非但臣詩蒙恩深渥所言誠有益於國雖死無恨故復越職觸冒以聞十三年夏徵勑尚書擇拜吏日未及就位因讌見中暑病卒賜祕器帝親弔祠遣使者送喪脩冢二子隆翕翕嗣爵卒子光嗣光卒子晨嗣晨謙敬博愛好學尤篤以女孫為順帝貴人奉朝請位特進卒子無忌嗣亦傳家學博物多識順帝時為侍中屯騎校尉永和元年詔無忌與議郎黃景校定中書五經諸子百家蓺術元嘉中桓帝復詔無忌與黃景崔寔等共撰漢記又自采集古今刪著事要號曰伏侯注無忌卒子質嗣官至大司農質卒子完嗣尚桓帝女陽安長公主女為孝獻皇后曹操殺后誅伏氏國除初自伏生已後世傳經學清靜無競故東州號為伏不鬬云隆字伯文少以節操立名仕郡督郵, WYG: ''}
