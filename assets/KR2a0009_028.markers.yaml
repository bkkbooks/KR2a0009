  - {type: variant, offset: 6698, length: 1028, content: 陳事者多言郡國貢舉率非功次故守職益懈而吏事疏咎在州郡有詔下公卿朝臣議彪上議曰伏惟明詔憂勞百姓垂恩選舉務得其人夫國以簡賢為務賢以孝行為首孔子曰事親孝故忠可移於君是以求忠臣必於孝子之門夫人才行少能相兼是以孟公綽優於趙魏老不可以為滕薛大夫忠孝之人持心近厚鍛鍊之吏持心近薄三代之所以直道而行者在其所以磨之故也士宜以才行為先不可純以閥閱然其要歸在於選二千石二千石賢則貢舉皆得其人矣帝深納之彪以世承二帝吏化之後多以苛刻為能又置官選職不必以才因盛夏多寒上疏諫曰臣聞政化之本必順陰陽伏見立夏以來當暑而寒殆以刑罰刻急郡國不奉時令之所致也農人急於務而苛吏奪其時賦發充常調而貪吏割其財此其巨患也夫欲急人所務當先除其所患天下樞要在於尚書尚書之選豈可不重而閒者多從郎官超升此位雖曉習文法長於應對然察察小慧類無大能宜簡嘗歷州宰素有名者唯進退舒時有不逮然端心向公奉職周密宜鑒嗇夫捷急之對深思絳侯木訥之功也往時楚獄大起故置令史以助郎職而類多小人好為姦利今者務簡可皆停省又諫議之職應用公直之士通才謇正有補益於朝者今或從徵試輩為大夫又御史外遷動據州郡並宜清選其任責以言績其二千石視事雖久而為吏民所便安者宜增秩重賞勿妄遷徙惟留聖心書奏帝納之元和二年春東巡狩以彪行司徒事從行還以病乞身帝遣小黃門太醫問病賜以食物彪遂稱困篤章和二年夏使謁者策詔曰彪以將相之裔勤身飭行出自州里在位歷載中被篤疾連上求退君年在耆艾不可復以加增恐職事煩碎重有損焉其上大鴻臚印綬其遣太子舍人詣中臧府受賜錢二十萬永元元年卒詔尚書故大鴻臚韋彪在位無愆方欲錄用奄忽而卒其賜錢二十萬布百匹穀三千斛彪清儉好施祿賜分與宗族家無餘財著書十二篇號曰韋卿子族子義義字季節高祖父玄成元帝時為丞相初彪獨徙扶風故義猶為京兆杜陵人焉兄順字叔文平輿令有高名次兄豹字季明數辟公府輒以事去司徒劉愷復辟之謂曰卿以輕好去就爵位不躋今歲垂盡當選御史意在相薦子其宿留乎豹曰犬馬齒衰旅力已劣仰慕崇恩故未能自割且眩瞀滯疾不堪久待選薦之私非所敢當遂跣而起愷追之徑去不顧安帝西巡徵拜議郎義少與二兄齊名初仕州郡太傅桓焉辟舉理劇為廣都長甘陵陳二縣令政甚有績官曹無事牢獄空虛數上書順帝陳宜依古典考功黜陟徵集名儒大定其制又譏切左右貶刺竇氏言既無感而久抑不遷以兄順喪去官比辟公府不就廣都為生立廟及卒三縣吏民為義舉哀若喪考妣豹子著字休明少以經行知名不應州郡之命大將軍梁冀辟不就延熹二年桓帝公車備禮徵至霸陵稱病歸乃入雲陽山采藥不反有司舉奏加罪帝特原之復詔京兆尹重以禮敦勸著遂不就徵靈帝即位, WYG: ''}
