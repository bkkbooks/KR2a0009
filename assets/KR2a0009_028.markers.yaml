  - {type: 'tls:seg', offset: 1393, content: '', id: KR2a0009_ZHSJ_028-d28p14s6}
  - {type: variant, offset: 1393, length: 1, content: 光, WYG: 在栁十四度栁河南也時世祖在雒陽赤眉降賊樊崇謀作亂其七月發覺皆伏誅古今注曰四年五月乙卯晦日有蝕之六年九月丙寅晦日有蝕之潛潭巴曰丙寅蝕乆旱多有徴京房曰有小旱灾史官不見郡以聞本紀都尉詡以聞在尾八度宋浮上疏以郡縣數代羣陽騷動所致見浮傳七年三月癸亥晦日有蝕之潛潭巴曰癸亥日蝕天人崩鄭興曰頃年日蝕每多在晦行疾也君亢急臣下促廹在畢五度畢為邉兵秋隗囂反侵安定冬盧芳所置朔方雲中太守各舉郡降古今注曰九年七月丁酉十一年六月癸丑十二月辛亥竝日有蝕之十六年三月辛丑晦日有蝕之潛潭巴曰辛丑日蝕主疑王在昴七度昴為獄事時諸郡太守坐度田不實世祖怒殺十餘人然後深悔之十七年二月乙未晦日有蝕之潛潭巴曰乙未蝕天下多邪氣鬱鬱蒼蒼京房曰君責衆庶暴害之在胃九度胃為廩倉時諸郡新坐租之後天下憂怖以榖為言故示象或曰胃供飬之官也其十月廢郭皇后詔曰不可以奉供飬二十二年五月乙未晦日有蝕之在栁七度京都宿也栁為上倉祭祀榖也近輿鬼輿鬼為宗廟十九年中有司奏請立近帝四廟以祭之有詔廟處所未定且就髙廟祫祭之至此三年遂不立廟有簡墮心奉祖宗之道有闕故示象也二十五年三月戊申晦日有蝕之潜潭巴曰戊申蝕地動揺侵兵强一曰主兵弱諸侯强在畢十五度畢為邉兵其冬十月以}
