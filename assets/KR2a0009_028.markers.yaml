  - {type: variant, offset: 2223, length: 1018, content: 無故典朝廷又少舊臣霸明習故事收錄遺文條奏前世善政法度有益於時者皆施行之每春下寬大之詔奉四時之令皆霸所建也明年代伏湛為大司徒封關內侯在位明察守正奉公不回十三年霸薨帝深傷惜之親自臨弔下詔曰惟霸積善清絜視事九年漢家舊制丞相拜日封為列侯朕以軍師暴露功臣未封緣忠臣之義不欲相踰未及爵命奄然而終嗚呼哀哉於是追封謚霸則鄉哀侯食邑二千六百戶子昱嗣臨淮吏人共為立祠四時祭焉以沛郡太守韓歆代霸為大司徒歆字翁君南陽人以從攻伐有功封扶陽侯好直言無隱諱帝每不能容嘗因朝會聞帝讀隗囂公孫述相與書歆曰亡國之君皆有才桀紂亦有才帝大怒以為激發歆又證歲將飢凶指天畫地言甚剛切坐免歸田里帝猶不釋復遣使宣詔責之司隸校尉鮑永固請不能得歆及子嬰竟自殺歆素有重名死非其罪衆多不厭帝乃追賜錢穀以成禮葬之後千乘歐陽歙清河戴涉相代為大司徒坐事下獄死自是大臣難居相任其後河南內蔡茂京兆玉況魏郡馮勤皆得薨位況字文伯性聰敏為陳留太守以德行化人遷司徒四年薨昱後徙封於陵侯永平中兼太僕昱卒子建嗣建卒子昌嗣宋弘字仲子京兆長安人也父尚成帝時至少府哀帝立以不附董賢違忤抵罪弘少而溫順哀平閒作侍中王莽時為共工赤眉入長安遣使徵弘逼迫不得已行至渭橋自投於水家人救得出因佯死獲免光武即位徵拜太中大夫建武二年代王梁為大司空封栒邑侯所得租奉分贍九族家無資產以清行致稱徙封宣平侯帝嘗問弘通博之士弘乃薦沛國桓譚才學洽聞幾能及楊雄劉向父子於是召譚拜議郎給事中帝每讌輒令鼓琴好其繁聲弘聞之不悅悔於薦舉伺譚內出正朝服坐府上遣吏召之譚至不與席而讓之曰吾所以薦子者欲令輔國家以道德也而今數進鄭聲以亂雅頌非忠正者也能自改邪將令相舉以法乎譚頓首辭謝良久乃遣之後大會羣臣帝使譚鼓琴譚見弘失其常度帝怪而問之弘乃離席免冠謝曰臣所以薦桓譚者望能以忠正導主而令朝廷耽悅鄭聲臣之罪也帝改容謝使反服其後遂不復令譚給事中弘推進賢士馮翊桓梁三十餘人或相及為公卿者弘當讌見御坐新屏風圖畫列女帝數顧視之弘正容言曰未見好德如好色者帝即為徹之笑謂弘曰聞義則服可乎對曰陛下進德臣不勝其喜時帝姊湖陽公主新寡帝與共論朝臣微觀其意主曰宋公威容德器羣臣莫及帝曰方且圖之後弘被引見帝令主坐屏風後因謂弘曰諺言貴易交富易妻人情乎弘曰臣聞貧賤之知不可忘糟糠之妻不下堂帝顧謂主曰事不諧矣弘在位五年坐考上黨太守無所據免歸第數年卒無子國除弘弟嵩以剛彊孝烈著名官至河南尹嵩子由章元和閒為太尉坐阿黨竇憲策免歸本郡自殺由二子漢登登在儒林傳漢字仲和以經行著名舉茂才四遷西河太守永建元年為東平相, WYG: ''}
