  - {type: variant, offset: 1390, length: 2, content: 詣懷, WYG: 正月甲子朔日有食之在危八度杜預曰歴家之說謂日光以望時遥奪月光故月蝕日月同㑹月奄日故日蝕蝕冇上下者行有髙下日光輪存而中食者相奄密故日光溢出皆既者正相當而相奄間疏也然聖人不言月蝕日而以自蝕為文闕於所不見春秋潛潭巴云甲子蝕有兵敵强臣昭案春秋緯六旬之蝕各以甲子為説此偏舉一隅未為通證故於事驗不盡相符今依日例注以廣其候耳京房占曰北夷侵忠臣有謀後大水在東方日蝕說曰日者太陽之精人君之象君道有虧為陰所乘故蝕蝕者陽不克也其候雜說漢書五行志著之必矣春秋緯曰日之將食則斗第二星變色微赤不明七日而蝕儒説諸侯專權則其應多在日所宿之國春秋漢含孳曰臣子謀日乃蝕孝經鉤命決曰失義不徳白虎不出禁或逆枉矢射山崩日蝕管子曰日掌陽月掌陰星掌和陽為徳隂為刑和為事是故日蝕則失徳之國惡之月蝕則失刑之國惡之彗星見則失和之國惡之是故聖王日蝕則修徳月蝕則修刑慧星見則修和諸象附從則多為王者事人君改修其徳則咎害除孝經鉤命決曰日蝕修孝山崩理惑是時世祖初興天下賊亂未除虛危齊也賊張步擁兵據齊上遣伏隆諭步許降旋復叛稱王至五年中乃破三年五月乙卯晦日有蝕之潜潭巴曰乙卯蝕雷不行雪殺草不長姦人入}
  - {type: page-break, offset: 1390, content: '', id: KR2a0009_WYG_028-1b, image: WYG0252/WYG0252-0352d.png}
  - {type: page-break, offset: 1390, content: '', id: KR2a0009_WYG_028-2a, image: WYG0252/WYG0252-0353a.png}
