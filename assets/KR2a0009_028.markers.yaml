  - {type: variant, offset: 4900, length: 1733, content: 乃挾兵結客後遂往復仇而仇家皆疾病無相距者憙以因疾報殺非仁者心且釋之而去顧謂仇曰爾曹若健遠相避也仇皆臥自搏後病愈悉自縛詣憙憙不與相見後竟殺之更始即位舞陰大姓李氏擁城不下更始遣柱天將軍李寶降之不肯云聞宛之趙氏有孤孫憙信義著名願得降之更始乃徵憙憙年未二十既引見更始笑曰繭栗犢豈能負重致遠乎即除為郎中行偏將軍事使詣舞陰而李氏遂降憙因進入潁川擊諸不下者歷汝南界還宛更始大悅謂憙曰卿名家駒努力勉之會王莽遣王尋王邑將兵出關更始乃拜憙為五威偏將軍使助諸將拒尋邑於昆陽光武破尋邑憙被創有戰勞還拜中郎將封勇功侯更始敗憙為赤眉兵所圍迫急乃踰屋亡走與所友善韓仲伯等數十人攜小弱越山阻徑出武關仲伯以婦色美慮有彊暴者而己受其害欲棄之於道憙責怒不聽因以泥塗仲伯婦面載以鹿車身自推之每道逢賊或欲逼略憙輒言其病狀以此得免既入丹水遇更始親屬皆祼跣塗炭飢困不能前憙見之悲感所裝縑帛資糧悉以與之將護歸鄉里時鄧奉反於南陽憙素與奉善數遺書切責之而讒者因言憙與奉合謀帝以為疑及奉敗帝得憙書乃驚曰趙憙真長者也即徵憙引見賜鞌馬待詔公車時江南未賓道路不通以憙守簡陽侯相憙不肯受兵單車馳之簡陽吏民不欲內憙憙乃告譬呼城中大人示以國家威信其帥即開門面縛自歸由是諸營壁悉降荊州牧奏憙才任理劇詔以為平林侯相攻擊羣賊安集已降者縣邑平定後拜懷令大姓李子春先為琅邪相豪猾并兼為人所患憙下車聞其二孫殺人事未發覺即窮詰其姦收考子春二孫自殺京師為請者數十終不聽時趙王良疾病將終車駕親臨王問所欲言王曰素與李子春厚今犯罪懷令趙憙欲殺之願乞其命帝曰吏奉法律不可枉也更道它所欲王無復言既薨帝追感趙王乃貰出子春其年遷憙平原太守時平原多盜賊憙與諸郡討捕斬其渠帥餘黨當坐者數千人憙上言惡惡止其身可一切徙京師近郡帝從之乃悉移置潁川陳留於是擢舉義行誅鋤姦惡後青州大蝗侵入平原界輒死歲屢有年百姓歌之二十六年帝延集內戚讌會歡甚諸夫人各各前言趙憙篤義多恩往遭赤眉出長安皆為憙所濟活帝甚嘉之後徵憙入為太僕引見謂曰卿非但為英雄所保也婦人亦懷卿之恩厚加賞賜二十七年拜太尉賜爵關內侯時南單于稱臣烏桓鮮卑並來入朝帝令憙典邊事思為久長規憙上復緣邊諸郡幽并二州由是而定三十年憙上言宜封禪正三雍之禮中元元年從封泰山及帝崩憙受遺詔典喪禮是時藩王皆在京師自王莽篡亂舊典不存皇太子與東海王等雜止同席憲章無序憙乃正色橫劒殿階扶下諸王以明尊卑時藩國官屬出入宮省與百僚無別憙乃表奏謁者將護分止它縣諸王並令就邸唯朝晡入臨整禮儀嚴門衞內外肅然永平元年封節鄉侯三年春坐考中山相薛脩事不實免其冬代竇融為衞尉八年代虞延行太尉事居府如真後遭母憂上疏乞身行喪禮顯宗不許遣使者為釋服賞賜恩寵甚渥憙內典宿衞外幹宰職正身立朝未嘗懈惰及帝崩復典喪事再奉大行禮事脩舉肅宗即位進為太傅錄尚書事擢諸子為郎吏者七人長子代給事黃門建初五年憙疾病帝親幸視及薨車駕往臨弔時年八十四謚曰正侯子代嗣官至越騎校尉永元中副行征西將軍劉尚征羌坐事下獄疾病物故和帝憐之賜祕器錢布贈越騎校尉節鄉侯印綬子直嗣官至步兵校尉直卒子淑嗣無子國除牟融字子優北海安丘人也少博學以大夏侯尚書教授門徒數百人名稱州里以司徒茂才為豐令視事三年縣無獄訟為州郡最司徒范遷薦融忠正公方經行純備宜在本朝并上其理狀永平五年入代鮑昱為司隸校尉多所舉正百僚敬憚之八年代包咸為大鴻臚十一年代鮭陽鴻為大司農是時顯宗方勤萬機公卿數朝會每輒延謀政事判折獄訟融經明才高善論議朝廷皆服其能帝數嗟歎以為才堪宰相明年代伏恭為司空舉動方重甚得大臣節肅宗即位以融先朝名臣代趙憙為太尉與憙參錄尚書事建初四年薨車駕親臨其喪時融長子麟歸鄉里帝以其餘子幼弱勑太尉掾史教其威儀進止贈賵恩寵篤密焉又賜冢塋地於顯節陵下除麟為郎韋彪字孟達扶風平陵人也高祖賢宣帝時為丞相祖賞哀帝時為大司馬彪孝行純至父母卒哀毀三年不出廬寑服竟羸瘠骨立異形醫療數年乃起好學洽聞雅稱儒宗建武末舉孝廉除郎中以病免復歸教授安貧樂道恬於進趣三輔諸儒莫不慕仰之顯宗聞彪名永平六年召拜謁者賜以車馬衣服三遷魏郡太守肅宗即位以病免徵為左中郎將長樂衞尉數陳政術每歸寬厚比上疏乞骸骨拜為奉車都尉秩中二千石賞賜恩寵侔於親戚建初七年車駕西巡狩以彪行太常從數召入問以三輔舊事禮儀風俗彪因建言今西巡舊都宜追錄高祖中宗功臣襃顯先勳紀其子孫帝納之行至長安乃制詔京兆尹, WYG: ''}
