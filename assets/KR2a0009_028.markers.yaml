  - {type: variant, offset: 7731, length: 0, content: '', WYG: 王甫等専權蔡邕上書曰四年正月朔日體微傷群臣服赤幘赴宫門之中無救乃各罷歸天有大異隱而不宣求御過是已事之甚者六年十月癸丑朔日有蝕之趙相}
  - {type: variant, offset: 7731, length: 0, content: '', krp: 王甫等専權蔡邕上書曰四年正月朔日體微傷群臣服赤幘赴宫門之中無救乃各罷歸天有大異隱而不宣求御過是已事之甚者六年十月癸丑朔日有蝕之趙相}
  - {type: variant, offset: 7732, length: 0, content: '', WYG: 聞谷永上書賦歛滋重不顧黎民百姓虛竭則日蝕將有潰叛之變光和元年二月辛亥朔日有蝕之十月丙子晦日有蝕之在箕四度箕為後宫口舌是月上聽讒廢宋皇后案本傳盧植上書丙子蝕自己過午既蝕之後雲霧掩暧}
  - {type: page-break, offset: 7732, content: '', id: KR2a0009_WYG_028-14a, image: WYG0252/WYG0252-0359a.png}
  - {type: variant, offset: 7732, length: 0, content: '', krp: 聞谷永上書賦歛滋重不顧黎民百姓虛竭則日蝕將有潰叛之變光和元年二月辛亥朔日有蝕之十月丙子晦日有蝕之在箕四度箕為後宫口舌是月上聽讒廢宋皇后案本傳盧植上書丙子蝕自己過午既蝕之後雲霧掩暧}
  - {type: variant, offset: 7733, length: 4, content: 蕃竇氏既, WYG: 八事以諌蔡邕對問曰詔問踐阼以来災𤯝屢見頃嵗日蝕地動風雨不時疫癘流行勁風折樹河雒盛溢臣聞陽微則日蝕隂盛則地震思亂則風貌失則雨視闇則疾簡宗廟水不潤下川流滿溢明君臣正上下抑隂尊陽修五事於聖躬致精慮於共御其救之也二年四月甲戍朔日有蝕之四年九月庚寅朔日有蝕之潛潭巴曰庚寅蝕将相}
  - {type: variant, offset: 7733, length: 4, content: 蕃竇氏既, krp: 八事以諌蔡邕對問曰詔問踐阼以来災𤯝屢見頃嵗日蝕地動風雨不時疫癘流行勁風折樹河雒盛溢臣聞陽微則日蝕隂盛則地震思亂則風貌失則雨視闇則疾簡宗廟水不潤下川流滿溢明君臣正上下抑隂尊陽修五事於聖躬致精慮於共御其救之也二年四月甲戍朔日有蝕之四年九月庚寅朔日有蝕之潛潭巴曰庚寅蝕将相}
