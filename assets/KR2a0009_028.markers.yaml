  - {type: variant, offset: 4187, length: 375, content: 平四年徵拜河南尹以清靜稱在官三年卒詔書慜惜賜車一乘錢四十萬馮勤字偉伯魏郡繁陽人也曾祖父揚宣帝為弘農太守有八子皆為二千石趙魏閒榮之號曰萬石君焉兄弟形皆偉壯唯勤祖父偃長不滿七尺常自恥短陋恐子孫之似也乃為子伉娶長妻伉生勤長八尺三寸八歲善計初為太守銚期功曹有高能稱期常從光武征伐政事一以委勤勤同縣馮巡等舉兵應光武謀未成而為豪右焦廉等所反勤乃率將老母兄弟及宗親歸期期悉以為腹心薦於光武初未被用後乃除為郎中給事尚書以圖議軍糧在事精勤遂見親識每引進帝輒顧謂左右曰佳乎吏也由是使典諸侯封事勤差量功次輕重國土遠近地埶豐薄不相踰越莫不厭服焉自是封爵之制非勤不定帝益以為能尚書衆事皆令總錄之司徒侯霸薦前梁令閻楊楊素有譏議帝常嫌之既見霸奏疑其有姦大怒賜霸璽書曰崇山幽都何可偶黃鉞一下無處所欲以身試法邪將殺身以成仁邪使勤奉策至司徒府勤還陳霸本意申釋事理帝意稍解拜勤尚書僕射職事, WYG: 元}
