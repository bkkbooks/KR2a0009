  - {type: variant, offset: 2438, length: 771, content: 長史亦於此西歸可須夜鼓聲而發陰緩所得生口龜茲王聞之大喜自以萬騎於西界遮超溫宿王將八千騎於東界徼于窴超知二虜已出密召諸部勒兵雞鳴馳赴莎車營胡大驚亂奔走追斬五千餘級大獲其馬畜財物莎車遂降龜茲等因各退散自是威震西域初月氏嘗助漢擊車師有功是歲貢奉珍寶符拔師子因求漢公主超拒還其使由是怨恨永元二年月氏遣其副王謝將兵七萬攻超超衆少皆大恐超譬軍士曰月氏兵雖多然數千里踰葱領來非有運輸何足憂邪但當收穀堅守彼飢窮自降不過數十日決矣謝遂前攻超不下又鈔掠無所得超度其糧將盡必從龜茲求救乃遣兵數百於東界要之謝果遣騎齎金銀珠玉以賂龜茲超伏兵遮擊盡殺之持其使首以示謝謝大驚即遣使請罪願得生歸超縱遣之月氏由是大震歲奉貢獻明年龜茲姑墨溫宿皆降乃以超為都護徐幹為長史拜白霸為龜茲王遣司馬姚光送之超與光共脅龜茲廢其王尤利多而立白霸使光將尤利多還詣京師超居龜茲它乾城徐幹屯疏勒西域唯焉耆危須尉犁以前沒都護懷二心其餘悉定六年秋超遂發龜茲鄯善等八國兵合七萬人及吏士賈客千四百人討焉耆兵到尉犁界而遣曉說焉耆尉犁危須曰都護來者欲鎮撫三國即欲改過向善宜遣大人來迎當賞賜王侯已下事畢即還今賜王綵五百匹焉耆王廣遣其左將北鞬支奉牛酒迎超超結鞬支曰汝雖匈奴侍子而今秉國之權都護自來王不以時迎皆汝罪也或謂超可便殺之超曰非汝所及此人權重於王今未入其國而殺之遂令自疑設備守險豈得到其城下哉於是賜而遣之廣乃與大人迎超於尉犁奉獻珍物焉耆國有葦橋之險廣乃絕橋不欲令漢軍入國超更從它道厲度七月晦到焉耆去城二十里正營大澤中廣出不意大恐乃欲悉驅其人共入山保焉耆左候元孟先嘗質京師密遣使以事告超超即斬之示不信用乃期大會諸國王因揚聲當重加賞賜於是焉耆王廣尉犁王汎及北鞬支等三十人相率詣超其國相腹久等十七人懼誅皆亡入海而危須王亦不至坐定超怒詰廣曰危須王何故不到腹久等所緣逃亡遂叱吏士收廣汎等於陳睦故城斬之傳首京師因縱兵鈔掠, WYG: ''}
