  - {type: variant, offset: 1976, length: 0, content: '', WYG: 以國貧不願之封乞錢五十萬為關内侯肅宗怒貶為關内侯竟不賜錢永初七年鄧太后復封昌子鐵為高置亭侯堅鐔傳堅鐔字子伋東觀記伋作皮潁川襄城人也為郡縣吏世祖討河北或薦鐔者因得召見以其吏能署主簿又拜偏將軍從平河北别擊破大槍於盧奴世祖即位拜鐔揚化將軍封㶏强侯㶏强縣名屬汝南郡㶏音於靳反與諸將攻洛陽而朱鮪别將守東城者為反間私約鐔晨開上東門上東門洛陽故城東面北頭第一門也鐔與建義大將軍朱祐乗朝而入與鮪大戰武庫下洛陽記曰建始殿東有大倉倉東有武庫藏兵之所殺傷甚衆至旦食乃罷朱鮪由是遂降又别擊内黃平之建武二年與右將軍萬脩徇南陽諸縣而堵鄉人董訢反宛城獲南陽太守劉驎鐔乃引軍赴宛選敢死士夜自登城斬關而入訢遂棄城走還堵鄉鄧奉復反新野攻破吳漢時萬脩病卒鐔獨孤絶南拒鄧奉北當董訢一年間道路隔塞糧饋不至鐔食蔬菜與士卒共勞苦每急輒先當矢石石謂發石以投人也墨子曰備城者積石百枚重十鈞已上者身被三創以此能全其衆及帝征南陽擊破訢奉以鐔為左曹常從征伐六年定封合肥侯二十六年卒子鴻嗣鴻卒子浮嗣浮卒子雅嗣馬武傳馬武字子張南陽湖陽人也少時避讎客居江夏王莽末竟陵西陽三老起兵於郡界武往從之後入綠林中遂與漢軍合更始立以武為侍郎與世祖破王尋等拜為振威將軍與尚書令謝躬共攻王郎及世祖拔邯鄲請躬及武等置酒高㑹因欲以圖躬不剋既罷獨與武登叢臺故趙王臺也在今洺州邯鄲城中從容謂武曰吾得漁陽上谷突騎欲令將軍將之何如武曰駑怯無方畧世祖曰將軍久將習兵豈與我掾史同哉武由是歸心及謝躬誅死武馳至射犬降世祖見之甚悅引置左右每勞饗諸將武輒起斟酌於前世祖以為歡復使將其部曲至鄴武叩頭辭以不願世祖愈美其意因從擊羣賊世祖擊尤來五幡等敗於愼水武獨殿還䧟陣故賊不得迫及殿鎭後也音丁殿反言兵敗而鎭其後也進至安定次小廣陽即廣平亭也在今幽州范陽縣西南以有廣陽國故謂此亭為小廣陽也武常為軍鋒力戰無前諸將皆引而隨之故遂破賊窮追至平谷浚靡而還平谷縣名屬漁陽郡浚靡縣名屬右北平郡靡音縻世祖即位以武為侍中騎都尉封山都侯建武四年與虎牙將軍蓋延等討劉永武别擊濟隂下成武楚丘拜捕虜將軍明年龎萌反攻桃城武先與戰破之㑹車駕至萌遂敗走六年夏與建威大將軍耿弇西擊隗囂漢軍不利引下隴囂追急武選精騎還為後拒身被甲持㦸奔擊殺數千人劉攽曰按文言武持㦸奔擊何能殺數千人明千是十字囂兵乃退諸軍得還長安十三年增邑更封鄃侯鄃縣名屬平原郡故城在今德州平原縣西南鄃音俞將兵北屯下曲陽備匈奴坐殺軍吏受詔將妻子就國武徑詣洛陽上將軍印綬削户五百定封為揚虛侯因留奉朝請帝後與功臣諸侯讌語從容言曰諸卿不遭際㑹自度爵祿何所至乎高密侯鄧禹先對曰臣少嘗學問可郡文學博士帝曰何言之謙乎卿鄧氏子志行脩整何為不掾功曹餘各以次對至武曰臣以武勇可守尉督盜賊帝笑曰且勿為盜賊自致亭長斯可矣武為人嗜酒闊達敢言闊達大度也敢言謂言果敢而無所隱也時醉在御前面折同列言其短長無所避忌帝故縱之以為笑樂帝雖制御功臣而每能回容宥其小失回曲也曲法以容也遠方貢珍甘必先徧賜列侯而太官無餘有功輒增邑賞不任以吏職故皆保其福祿終無誅譴者二十五年武以中郎將將兵擊武陵蠻夷還上印綬顯宗初西羌寇隴右覆軍殺將朝廷患之復拜武捕虜將軍以中郎將王豐副與監軍使者竇固右輔都尉}
