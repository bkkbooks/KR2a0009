  - {type: variant, offset: 1880, length: 2, content: 控弦, WYG: 為長平侯長平縣屬汝南郡及大司馬吳漢薨隆為驃騎將軍行大司馬事隆奉法自守視事八歲上將軍印綬罷賜養牛上樽酒}
  - {type: variant, offset: 1880, length: 2, content: 控弦, krp: 為長平侯長平縣屬汝南郡及大司馬吳漢薨隆為驃騎將軍行大司馬事隆奉法自守視事八歲上將軍印綬罷賜養牛上樽酒}
  - {type: variant, offset: 1883, length: 2, content: 萬故, WYG: 斛前書音義曰稻米一斗得酒一斗為上樽稷米一斗為中樽粟米一斗為下樽也以列侯奉朝請三十年定封愼侯愼縣名屬汝南郡也中元二年卒諡曰靖侯子安嗣傅俊傳傅俊字子衞潁川襄城人也世祖徇襄城俊以縣亭長迎軍拜為校尉襄城收其母弟宗族皆滅之從破王尋等東觀記曰傅俊從上迎擊王尋等於陽關漢兵反走還汝水上上以手飲水澡盥鬚眉塵垢謂俊曰今日罷倦甚諸卿寧憊邪以為偏將軍别擊京密破之遣歸潁川收葬家屬及世祖討河北俊與賔客十餘人北追及於邯鄲上謁世祖使將潁川兵常從征伐世祖即位以俊為侍中建}
