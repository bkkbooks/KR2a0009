  - {type: variant, offset: 5617, length: 267, content: 收得前部五千餘人於是前部始復開通還屯田柳中四年秋勇發敦煌張掖酒泉六千騎及鄯善疏勒車師前部兵擊後部王軍就大破之首虜八千餘人馬畜五萬餘頭捕得軍就及匈奴持節使者將至索班沒處斬之以報其恥傳首京師永建元年更立後部故王子加特奴為王勇又使別校誅斬東且彌王亦更立其種人為王於是車師六國悉平其冬勇發諸國兵擊匈奴呼衍王呼衍王亡走其衆二萬餘人皆降捕得單于從兄勇使加特奴手斬之以結車師匈奴之𨻶北單于自將萬餘騎入後部至金且谷勇使假司馬曹俊馳救之單于引去俊追斬其貴人骨都侯於是呼衍王遂徙居枯梧河上是後車師無復虜跡城郭皆安唯焉耆王元孟未降二年勇上請攻元孟於是遣敦煌, WYG: ''}
