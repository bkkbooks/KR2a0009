  - {type: variant, offset: 14, length: 0, content: '', WYG: 斤四年率破姦將軍侯進輔威將軍耿植代征南大將軍岑彭圍秦豐於黎丘破其將張康於蔡陽斬之帝自至黎丘使御史中丞李由持璽書招豐豐出惡言不肯降車駕引還勑祐方畧祐盡力攻之明年夏城中窮困豐乃將其母妻子九人肉袒降祐轞車傳豐送洛陽斬之大司馬吳漢劾奏祐廢詔受降違將帥之任帝不加罪祐還與騎都尉臧宮㑹擊延岑餘黨隂酇筑陽三縣賊悉平之祐為人質直尚儒學將兵率衆多受降以克定城邑為本不存首級之功又禁制士卒不得虜掠百姓軍人樂放縱多以此怨之九年屯南行唐拒匈奴行唐今恒州縣也十三年增邑定封鬲侯鬲縣名屬平原郡食邑}
