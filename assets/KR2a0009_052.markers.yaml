  - {type: variant, offset: 5224, length: 208, content: 後屈就北虜緣邊之郡將受困害恐河西城門必復有晝閉之儆矣今不廓開朝廷之德而拘屯戍之費若北虜遂熾豈安邊久長之策哉太尉屬毛軫難曰今若置校尉則西域駱驛遣使求索無猒與之則費難供不與則失其心一旦為匈奴所迫當復求救則為役大矣勇對曰今設以西域歸匈奴而使其恩德大漢不為鈔盜則可矣如其不然則因西域租入之饒兵馬之衆以擾動緣邊是為富仇讎之財增暴夷之埶也置校尉者宣威布德以繫諸國內向之心以疑匈奴覬覦之情而無財費耗國之慮也且西域之人無它求索其來入, WYG: 路意}
