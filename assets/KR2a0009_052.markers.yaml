  - {type: variant, offset: 2107, length: 330, content: 何不緣詔書留之更遣它吏送侍子乎超曰是何言之陋也以邑毀超故今遣之內省不疚何卹人言快意留之非忠臣也明年復遣假司馬和恭等四人將兵八百詣超超因發疏勒于窴兵擊莎車莎車陰通使疏勒王忠啖以重利忠遂反從之西保烏即城超乃更立其府丞成大為疏勒王悉發其不反者以攻忠積半歲而康居遣精兵救之超不能下是時月氏新與康居婚相親超乃使使多齎錦帛遺月氏王令曉示康居王康居王乃罷兵執忠以歸其國烏即城遂降於超後三年忠說康居王借兵還據損中密與龜茲謀遣使詐降於超超內知其姦而外偽許之忠大喜即從輕騎詣超超密勒兵待之為供張設樂酒行乃叱吏縛忠斬之因擊破其衆殺七百餘人南道於是遂通明年超發于窴諸國兵二萬五千人復擊莎車而龜茲王遣左將軍發溫宿姑墨尉頭合五萬人救之超召將校及于窴王議曰今兵少不敵其計莫若各散去于窴從是而, WYG: 廓州化隂縣}
