  - {type: variant, offset: 6255, length: 205, content: 軍八九千人龜茲吏人並叛其王而與溫宿姑墨數萬兵反共圍城慬等出戰大破之連兵數月胡衆敗走乘勝追擊凡斬首萬餘級獲生口數千人駱駝畜產數萬頭龜茲乃定而道路尚隔檄書不通歲餘朝廷憂之公卿議者以為西域阻遠數有背叛吏士屯田其費無已永初元年遂罷都護遣騎都尉王弘發關中兵迎慬禧博及伊吾盧柳中屯田吏士二年春還至敦煌會衆羌反叛朝廷大發兵西擊之逆詔慬留為諸軍援慬至張掖日勒羌諸種萬餘人攻亭候殺略吏人慬進兵擊大破之乘勝追至昭武虜遂散走其能脫者, WYG: 三}
