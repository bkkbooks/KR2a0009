  - {type: variant, offset: 896, length: 0, content: '', WYG: 帝擢涼子為中郎宿衞左右涼字公文右北平人也身長八尺氣力壯猛雖武將然通經書多智畧尤曉邊事有名北方初幽州牧朱浮辟為兵曹掾擊彭寵有功封廣武侯十三年增茂邑更封脩侯脩縣名屬信都國也十五年坐斷兵馬廪縑斷猶割截也}
