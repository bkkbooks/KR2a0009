  - {type: variant, offset: 34, length: 0, content: '', WYG: 也少學長安王莽時舉四科東觀記曰王莽時舉有德行能言語通政事明文學之士丹以言語為固德侯相有幹事稱遷朔調連率副貳朔調上谷也副貳屬令也更始立遣使者徇上谷丹與連率耿況降復為上谷長史王郎起丹與況共謀拒之況使丹與子弇及寇恂等將兵南歸世祖世祖引見丹等笑曰邯鄲將帥數言我發漁陽上谷兵吾聊應言然王郎將帥數云欲發二郡兵以拒光武時光武聊應然之猶今兩軍遙相戲弄也何意二郡良為吾來東觀記曰上在廣阿聞外}
  - {type: page-break, offset: 34, content: '', id: KR2a0009_WYG_052-4a, image: WYG0252/WYG0252-0599a.png}
  - {type: variant, offset: 34, length: 0, content: '', krp: 也少學長安王莽時舉四科東觀記曰王莽時舉有德行能言語通政事明文學之士丹以言語為固德侯相有幹事稱遷朔調連率副貳朔調上谷也副貳屬令也更始立遣使者徇上谷丹與連率耿況降復為上谷長史王郎起丹與況共謀拒之況使丹與子弇及寇恂等將兵南歸世祖世祖引見丹等笑曰邯鄲將帥數言我發漁陽上谷兵吾聊應言然王郎將帥數云欲發二郡兵以拒光武時光武聊應然之猶今兩軍遙相戲弄也何意二郡良為吾來東觀記曰上在廣阿聞外}
  - {type: variant, offset: 36, length: 1, content: 志, WYG: 兵自來登城勒兵在西門樓上問何等兵丹等對言上谷漁陽兵上曰為誰來乎對曰為劉公即請丹入人人勞勉恩意甚備方與士大夫共此功名耳拜丹為偏將軍號奉義侯從擊王郎將兒宏等於南􅒋兒音五兮反郎兵迎戰漢軍退郤續漢書曰南􅒋賊迎擊上營得上鼓車輜重數乗也丹等縱突騎擊大破之追奔十餘里死傷者從橫丹還世祖謂曰吾聞突騎天下精兵今乃見其戰樂可言邪遂從征河北世祖即位以讖文用平狄將軍孫咸行大司馬衆咸}
  - {type: page-break, offset: 36, content: '', id: KR2a0009_WYG_052-4b, image: WYG0252/WYG0252-0599b.png}
  - {type: variant, offset: 36, length: 1, content: 志, krp: 兵自來登城勒兵在西門樓上問何等兵丹等對言上谷漁陽兵上曰為誰來乎對曰為劉公即請丹入人人勞勉恩意甚備方與士大夫共此功名耳拜丹為偏將軍號奉義侯從擊王郎將兒宏等於南􅒋兒音五兮反郎兵迎戰漢軍退郤續漢書曰南􅒋賊迎擊上營得上鼓車輜重數乗也丹等縱突騎擊大破之追奔十餘里死傷者從橫丹還世祖謂曰吾聞突騎天下精兵今乃見其戰樂可言邪遂從征河北世祖即位以讖文用平狄將軍孫咸行大司馬衆咸}
