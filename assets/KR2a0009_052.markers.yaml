  - {type: variant, offset: 1417, length: 428, content: 一耳臣伏自惟念卒伍小吏實願從谷吉效命絕域庶幾張騫𠫓廾身曠野昔魏絳列國大夫尚能和輯諸戎況臣奉大漢之威而無鈆刀一割之用乎前世議者皆曰取三十六國號為斷匈奴右臂今西域諸國自日之所入莫不向化大小欣欣貢奉不絕唯焉耆龜茲獨未服從臣前與官屬三十六人奉使絕域備遭艱戹自孤守疏勒於今五載胡夷情數臣頗識之問其城郭小大皆言倚漢與依天等以是效之則葱領可通葱領通則龜茲可伐今宜拜龜茲侍子白霸為其國王以步騎數百送之與諸國連兵歲月之閒龜茲可禽以夷狄攻夷狄計之善者也臣見莎車疏勒田地肥廣草牧饒衍不比敦煌鄯善閒也兵可不費中國而粮食自足且姑墨溫宿二王特為龜茲所置既非其種更相厭苦其埶必有降反若二國來降則龜茲自破願下臣章參考行事誠有萬分死復何恨臣超區區特蒙神靈竊冀未便僵仆目見西域平定陛下舉萬年之觴薦勳祖廟布大喜於天下書奏帝知其功可成議欲給兵平陵人徐幹素與超同志上疏願奮身佐超五年遂以幹為假司馬將薥刑及義從千人就超先是莎車以為漢兵不出遂降於龜茲而疏勒都尉番辰亦復反叛會徐幹適至超遂與幹擊番辰大破之, WYG: 妹}
