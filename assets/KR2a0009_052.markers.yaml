  - {type: variant, offset: 6116, length: 0, content: '', krp: 愼侯劉隆太傅宣德侯卓茂贊曰帝績思乂庸功是存庸勲也言將興帝績則念勲功之臣也有來羣后捷我戎軒捷勝也謂寇}
  - {type: variant, offset: 6117, length: 2, content: 鴻司, WYG: 之徒翼佐王烈戎車所至皆克捷也婉孌龍姿儷景同飜婉孌猶親愛也龍姿謂光武也儷齊也偶也言諸將齊景飜飛而舉大功也後漢書卷五十二後漢書卷五十二考證景丹傳邯鄲將帥數言我發漁陽上谷兵吾聊應言然注王郎將帥數云欲發二郡兵以拒光武時光武聊應然之日知錄曰謂邯鄲將帥有此言我亦聊以此言應之不能必二郡之果來也本文自明注乃謂王郎欲發之謬矣杜茂傳坐與東平王等傳末劉攽刋誤一條當移入此句之下}
