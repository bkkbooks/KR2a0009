  - {type: variant, offset: 12, length: 0, content: '', WYG: 十二朱祐傳朱祐字仲先南陽宛人也東觀記曰祐作福避安帝諱劉攽曰案注引東觀記安帝諱則此人當名祜前後皆誤矣少孤歸外家復陽劉氏復陽縣名屬南陽郡往來舂陵世祖與伯升皆親愛之伯升拜大司徒以祐為護軍前書曰護軍都尉秦官平帝元始元年更名護軍也及世祖為大司馬討河北復以祐為護軍常見親幸舍止於中祐侍讌從容曰長安政亂公有日角之相此天命也日角解在光武紀世祖曰召刺姦收護軍王莽置左右刺姦使督姦猾祐乃不敢復言從征河北常力戰陷陣續漢書曰祐至南䜌為賊所傷上親候視之以為偏將軍封安陽侯世祖即位拜為建義大將軍建武二年更封堵陽侯堵陽縣名屬南陽郡故城在今唐州方城縣堵音者冬與諸將擊鄧奉於淯陽祐軍敗為奉所獲明年奉破乃肉袒因祐降帝復祐位而厚加慰賜遣擊新野隨皆平之隨縣名屬南陽郡故城在今隨州隨縣延岑自敗於穰遂與秦豐將張成合祐率征虜將軍祭遵與戰於東陽大破之東陽聚名在南陽臨陣斬成延岑敗走歸豐祐收得印綬九十七東觀記曰收得所盗茂陵武帝廟衣印綬進擊黃郵降之賜祐黃金}
