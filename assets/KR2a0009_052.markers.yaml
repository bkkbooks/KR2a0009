  - {type: punctuation, offset: 3284, content: ，, id: KR2a0009_ZHSJ_052-bkkpn710}
  - {type: 'tls:seg', offset: 3284, content: '', id: KR2a0009_ZHSJ_052-d52p18s6}
  - {type: variant, offset: 3285, length: 0, content: '', WYG: 之賞或任以阿衡之地樊噲封為舞陽侯灌嬰為丞相封為潁隂侯阿倚也衡平也言天下依倚而取平也故勢疑則隙生力侔則亂起埶位過則君臣相疑侔等也蕭樊且猶縲紲信越終見葅戮不其然乎蕭何為丞相為人請上林中空地上大怒乃下廷尉械擊之燕王盧綰反樊噲以相國擊燕人有惡噲黨於呂氏帝大怒使陳平即軍中斬噲平畏呂氏執噲詣長安韓信封為淮隂侯人上書告信反吕后使武士縳信斬之彭越為梁王呂后令其舍人告越謀反遂夷宗族刑法志曰夷三族者梟其首葅其骨肉彭越韓信皆受此誅自兹以降迄于孝武宰輔五世莫非公侯自高祖至于孝武凡五代也其中宰輔皆以公侯勲貴為之遂使縉紳道塞賢能蔽壅縉赤色也紳帶也或作搢搢揷也謂揷笏於帶也朝有世及之私下多抱關之怨世及謂父子相繼也禮記曰大人世及以為禮抱關謂守}
  - {type: page-break, offset: 3285, content: '', id: KR2a0009_WYG_052-19a, image: WYG0252/WYG0252-0606c.png}
  - {type: variant, offset: 3285, length: 0, content: '', krp: 之賞或任以阿衡之地樊噲封為舞陽侯灌嬰為丞相封為潁隂侯阿倚也衡平也言天下依倚而取平也故勢疑則隙生力侔則亂起埶位過則君臣相疑侔等也蕭樊且猶縲紲信越終見葅戮不其然乎蕭何為丞相為人請上林中空地上大怒乃下廷尉械擊之燕王盧綰反樊噲以相國擊燕人有惡噲黨於呂氏帝大怒使陳平即軍中斬噲平畏呂氏執噲詣長安韓信封為淮隂侯人上書告信反吕后使武士縳信斬之彭越為梁王呂后令其舍人告越謀反遂夷宗族刑法志曰夷三族者梟其首葅其骨肉彭越韓信皆受此誅自兹以降迄于孝武宰輔五世莫非公侯自高祖至于孝武凡五代也其中宰輔皆以公侯勲貴為之遂使縉紳道塞賢能蔽壅縉赤色也紳帶也或作搢搢揷也謂揷笏於帶也朝有世及之私下多抱關之怨世及謂父子相繼也禮記曰大人世及以為禮抱關謂守}
  - {type: variant, offset: 3286, length: 3, content: 晝閉先, WYG: 者前書曰蕭望之署小苑東門候王仲翁謂望之曰不肯碌碌反抱關為其懷道無聞委身草莽者亦何可勝言故光武鑒前事之違存矯枉之志矯正也違失也枉曲也孟子曰矯枉者過其正雖寇鄧之高勲耿賈之鴻烈分土不過大縣數四所加特進朝請而已鄧禹為大司徒封高密侯食邑四縣耿弇好畤侯食邑二縣奉朝請賈復封膠東侯凡食六縣以列侯加特進觀其治平臨政課職責咎將所謂導之以政齊之以刑者乎若格之功臣其傷巳甚格正也若以上法繩正功臣則於其有害也劉攽曰注於其有害也按文少一人字何者直繩則虧䘮恩舊撓情則違廢禁典選德則功不必厚舉勞則人或未賢參任則羣心難塞並列則其敝未遠參任謂兼勲賢而任之則羣臣之心各有覬望故難塞也若遵高祖並用功臣則其敝未遠不得不校其勝否即以事相權勝否猶可否即就也權謂平其輕重故高秩厚禮允答元功峻文深憲責成吏職建武之世侯者百餘若夫數公者則與參國議分均休咎賈復傳曰帝方以吏亊責三公故功臣遂不用是時列侯唯高密固始膠東三侯與公卿參議國家大事恩遇甚厚也其餘並優以寛科完其封祿莫不終以功名延慶于後昔留侯以為高祖悉用蕭曹故人前書曰上望見諸將往往偶語張良曰此謀反耳陛下起布衣為天子而所封皆蕭曹故人故相聚謀反也見高紀而郭伋亦譏南陽多顯郭伋傳曰光武以伋為并州牧帝引見伋因言選補衆職當簡天下賢俊不宜專用南陽人也}
