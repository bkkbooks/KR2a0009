  - {type: variant, offset: 6616, length: 589, content: 萬餘人又遼東太守耿夔率將鮮卑種衆共擊之詔慬行度遼將軍事龐雄與耿夔共擊匈奴奧鞬日逐王破之單于乃自將圍中郎將耿种於美稷連戰數月攻之轉急种移檄求救明年正月慬將八千餘人馳往赴之至屬國故城與匈奴左將軍烏桓大人戰破斬其渠帥殺三千餘人虜其妻子獲財物甚衆單于復自將七八千騎迎攻圍慬慬被甲奔擊所向皆破虜遂引還虎澤三月何熙軍到五原曼柏暴疾不能進遣龐雄與慬及耿种步騎萬六千人攻虎澤連營稍前單于惶怖遣左奧鞬日逐王詣慬乞降慬乃大陳兵受之單于脫帽徒跣面縛稽顙納質會熙卒于師即拜慬度遼將軍龐雄還為大鴻臚雄巴郡人有勇略稱為名將明年安定北地上郡皆被羌寇穀貴人流不能自立詔慬發邊兵迎三郡太守使將吏人徙扶風界慬即遣南單于兄子優孤塗奴將兵迎之既還慬以塗奴接其家屬有勞輒授以羌侯印綬坐專擅徵下獄抵罪明年校書郎馬融上書訟慬與護羌校尉龐參有詔原刑語在龐參傳會叛羌寇三輔關中盜賊起拜慬謁者將兵擊之至湖縣病卒何熙字孟孫陳國人少有大志永元中為謁者身長八尺五寸善為威容贊拜殿中音動左右和帝偉之擢為御史中丞歷司隸校尉大司農及在軍臨歿遺言薄葬三子臨瑾阜臨瑾並有政能阜俊才早沒臨子衡為尚書以正直稱坐訟李膺等下獄免官廢于家論曰時政平則文德用而武略之士無所奮其力能故漢世有發憤張膽爭膏身於夷狄以要功名多矣祭肜耿秉啟匈奴之權班超梁慬奮西域之略卒能成功立名享受爵位薦功祖廟勒勳于後亦一時之志士也贊曰定遠慷慨專功西遐坦步葱雪咫尺龍沙慬亦抗憤勇乃負荷, WYG: 考證}
