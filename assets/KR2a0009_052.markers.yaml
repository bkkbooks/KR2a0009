  - {type: variant, offset: 1156, length: 1, content: 肅, WYG: 上將軍印綬十三年增邑更封竟陵侯是時天下墾田多不以實又户口年紀互有增減十五年詔下州郡檢覈其事而刺史太守多不平均或優饒豪右侵刻羸弱百姓嗟怨遮道號呼時諸郡各遣使奏事帝見陳留吏牘上有書視之云潁川𢎞農可問河南南陽不可問帝詰吏由趣吏不肯服抵言於長壽街上得之抵欺也帝怒時顯}
