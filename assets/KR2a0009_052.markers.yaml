  - {type: variant, offset: 38, length: 2, content: 修細, WYG: 悅詔舉可為大司馬者東觀記曰載讖文曰孫咸征狄也劉攽曰按注文多一曰字羣臣所推唯吳漢及丹帝曰景將軍北州大將是其人也然吳將軍有建大策之勲謂發漁陽兵也又誅苖幽州謝尚書其功大苖曾謝躬舊制驃騎將軍官與大司馬相兼也前書武帝置大司馬號大將軍驃騎將軍也乃以吳漢為大司馬而拜丹為驃騎大將軍建武二年定封丹櫟陽侯帝謂丹曰今關東故王國雖數縣不過櫟陽萬户邑夫富貴不歸故鄉如衣繡夜行故以封卿耳前書武帝謂朱買臣之語丹頓首謝秋與吳漢建威大將軍耿弇建義大將軍朱祐執金吾賈復偏將軍馮異强弩將軍陳俊左曹王常騎都尉臧宮等從擊破五校於羛陽聚名也解見光武紀降其衆五萬人㑹陜賊蘇况攻破𢎞農生獲郡守丹時病東觀記曰丹從上至懷病瘧見上在前瘧發寒慄上笑曰聞壯士不病瘧今漢大將軍反病瘧邪使小黃門扶起賜醫藥還歸洛陽病遂加帝以其舊將欲令强起領郡事乃夜召入謂曰賊迫近京師但得將軍威重卧以鎮之足矣丹不敢辭乃力疾拜命將營到郡續漢書曰將營兵西到𢎞農也十餘日薨子尚嗣徙封余吾侯余吾縣名屬上黨故城在今潞州屯留縣西北尚卒子苞嗣苞卒子臨嗣無子國絶永初七年鄧太后紹封苞弟遽為監亭侯王梁傳王梁字君嚴漁陽安陽人也為郡吏太守彭寵以梁守狐奴令與蓋延吳漢俱將兵南及世祖於廣阿拜偏將軍既拔邯鄲賜爵關内侯從平河北拜野王令與河内太守寇恂南拒洛陽北守天井關朱鮪等不敢出兵世祖以為梁功及即位議選大司空而赤伏符曰王梁主衞作𤣥武𤣥武北方之神龜蛇合體帝以野王衞之所徙史記曰衞元君自濮陽徙於野王𤣥武水神之名司空水土之官也於是擢拜梁為大司空封武彊侯建武二年與大司馬吳漢等俱擊檀鄉有詔軍事一屬大司馬而梁輒發野王兵帝以其不奉詔勑令止在所縣而梁復以便宜進軍帝以梁前後違命大怒遣尚書宗廣持}
