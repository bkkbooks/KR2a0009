  - {type: variant, offset: 3282, length: 0, content: '', WYG: 四年卒子檀嗣坐兄伯濟與楚王英黨顏忠謀反國除永初七年鄧太后紹封武孫震為漻亭侯漻音胡巧反又力彫反震卒子側嗣論曰中興二十八將前世以為上應二十八宿未}
  - {type: variant, offset: 3282, length: 0, content: '', krp: 四年卒子檀嗣坐兄伯濟與楚王英黨顏忠謀反國除永初七年鄧太后紹封武孫震為漻亭侯漻音胡巧反又力彫反震卒子側嗣論曰中興二十八將前世以為上應二十八宿未}
  - {type: variant, offset: 3283, length: 1, content: 末, WYG: 詳也然咸能感㑹風雲奮其智勇風雲已具聖公傳稱為佐命亦各志能之士也易通卦驗曰黃佐命鄭𤣥注云黃者火之子佐命張良是也已上皆華嶠之辭議者多非光武不以功臣任職至使英姿茂績委而勿用然原夫深圖遠算固將有以焉爾若乃王道既衰降及霸德王謂周也霸謂齊桓晉文公猶能授受惟庸勲賢皆序如管隰之迭升桓世先趙之同列文朝可謂兼通矣史記曰管仲隰朋脩齊國之政齊人皆悅事之管子曰管仲寢疾桓公問之若不可諱政將安移之對曰隰朋可國語云文公使趙衰為卿辭曰先軫有謀臣不若也乃使先軫佐下軍公曰趙衰其所讓皆社稷之衛也降自秦漢世資戰力至於翼扶王運皆武人屈起屈起猶勃起也音其勿反亦有鬻繒屠狗輕猾之徒灌嬰雎陽販繒者樊噲沛人以屠狗為事皆從高祖或崇以連}
