  - {type: variant, offset: 3843, length: 1226, content: 懷一切莫肯遠慮如有卒暴超之氣力不能從心便為上損國家累世之功下𠫓廾忠臣竭力之用誠可痛也故超萬里歸誠自陳苦急延頸踰望三年於今未蒙省錄得萬國之歡心不遺小國之臣況超得備侯伯之位故敢觸死為超求哀匄超餘年一得生還復見闕庭使國永無勞遠之慮西域無倉卒之憂超得長蒙文王葬骨之恩子方哀老之惠詩云民亦勞止汔可小康惠此中國以綏四方超有書與妾生訣恐不復相見妾誠傷超以壯年竭忠孝於沙漠疲老則便捐死於曠野誠可哀憐如不蒙救護超後有一旦之變冀幸超家得蒙趙母衞姬先請之貸妾愚戇不知大義觸犯忌諱書奏帝感其言乃徵超還超在西域三十一歲十四年八月至洛陽拜為射聲校尉超素有匈脅疾既至病遂加帝遣中黃門問疾賜醫藥其年九月卒年七十一朝廷愍惜焉使者弔祭贈賵甚厚子雄嗣初超被徵以戊己校尉任尚為都護與超交代尚謂超曰君侯在外國三十餘年而小人猥承君後任重慮淺宜有以誨之超曰年老失智任君數當大位豈班超所能及哉必不得已願進愚言塞外吏士本非孝子順孫皆以罪過徙補邊屯而蠻夷懷鳥獸之心難養易敗今君性嚴急水清無大魚察政不得下和宜蕩佚簡易寬小過總大綱而已超去後尚私謂所親曰我以班君當有奇策今所言平平耳尚至數年而西域反亂以罪被徵如超所戒有三子長子雄累遷屯騎校尉會叛羌寇三輔詔雄將五營兵屯長安就拜京兆尹雄卒子始嗣尚清河孝王女陰城公主主順帝之姑貴驕淫亂與嬖人居帷中而召始入使伏牀下始積怒永建五年遂拔刃殺主帝大怒腰斬始同產皆𠫓廾巿超少子勇勇字宜僚少有父風永初元年西域反叛以勇為軍司馬與兄雄俱出敦煌迎都護及西域甲卒而還因罷都護後西域絕無漢吏十餘年元初六年敦煌太守曹宗遣長史索班將千餘人屯伊吾車師前王及鄯善王皆來降班後數月北單于與車師後部遂共攻沒班進擊走前王略有北道鄯善王急求救於曹宗宗因此請出兵五千人擊匈奴報索班之恥因復取西域鄧太后召勇詣朝堂會議先是公卿多以為宜閉玉門關遂𠫓廾西域勇上議曰昔孝武皇帝患匈奴彊盛兼總百蠻以逼障塞於是開通西域離其黨與論者以為奪匈奴府藏斷其右臂遭王莽篡盜徵求無猒胡夷忿毒遂以背叛光武中興未遑外事故匈奴負彊驅率諸國及至永平再攻敦煌河西諸郡城門晝閉孝明皇帝深惟廟策乃命虎臣出征西域故匈奴遠遁邊境得安及至永元莫不內屬會閒者羌亂西域復絕北虜遂遣責諸國備其逋租高其價直嚴以期會鄯善車師皆懷憤怨思樂事漢其路無從前所以時有叛者皆由牧養失宜還為其害故也今曹宗徒恥於前負欲報雪匈奴而不尋出兵故事未度當時之宜也夫要功荒外萬無一成若兵連禍結悔無及已況今府藏未充師無後繼是示弱於遠夷暴短於海內臣愚以為不可許也舊敦煌郡有營兵三百人今宜復之復置護西域副校尉居於敦煌如永元故事又宜遣西域長史將五百人屯樓蘭西當焉耆龜茲徑路南彊鄯善于窴心膽北扞匈奴東近敦煌如此誠便尚書問勇曰今立副校尉何以為便又置長史屯樓蘭利害云何勇對曰昔永平之末始通西域初遣中郎將居敦煌後置副校尉於車師既為胡虜節度又禁漢人不得有所侵擾故外夷歸心匈奴畏威今鄯善王尤還漢人外孫若匈奴得志則尤還必死此等雖同鳥獸亦知避害若出屯樓蘭足以招附其心愚以為便長樂衞尉鐔顯廷尉綦母參司隸校尉崔據難, WYG: ''}
