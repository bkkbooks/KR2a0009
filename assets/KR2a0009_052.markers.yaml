  - {type: variant, offset: 3688, length: 154, content: 隔絕超以一身轉側絕域曉譬諸國因其兵衆每有攻戰輒為先登身被金夷不避死亡賴蒙陛下神靈且得延命沙漠至今積三十年骨肉生離不復相識所與相隨時人士衆皆已物故超年最長今且七十衰老被病頭髮無黑兩手不仁耳目不聰明扶杖乃能行雖欲竭盡其力以報塞天恩迫於歲暮犬馬齒索蠻夷之性悖逆侮老而超旦暮入地久不見代恐開姦宄之源生逆亂之心而卿大夫, WYG: ''}
