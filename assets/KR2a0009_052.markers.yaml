  - {type: variant, offset: 1113, length: 2, content: 大喪, WYG: 三十二年卒子衞嗣衞卒子香嗣徙封棘陵侯香卒子豐嗣豐卒子𤣥嗣𤣥卒子邑嗣邑卒子醜嗣桓帝時以罪失國延熹二年帝復封成𤣥孫昌為益陽亭侯劉隆傳劉隆字元伯南陽安衆侯宗室也王莽居攝中隆父禮與安衆侯崇起兵誅莽事泄隆以年未七歲故得免及壯學於長安更始拜為騎都尉謁歸謁請也謂請假歸也迎妻子置洛陽聞世祖在河内即追及於射犬以為騎都尉與馮異共拒朱鮪李軼等軼}
