  - {type: variant, offset: 15, length: 4, content: 班超字仲, WYG: 千三百户東觀記曰祐自陳功薄而國大願受南陽五百户足矣上不許十五年朝京師上大將軍印綬因留奉朝請祐奏古者人臣受封不加王爵可改諸王為公帝即施行又奏宜令三公並去大名以法經典後遂從其議祐初學長安帝往候之祐不時相勞苦而先}
