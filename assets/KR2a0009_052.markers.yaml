  - {type: variant, offset: 897, length: 0, content: '', WYG: 軍吏殺人免官削户邑定封參蘧鄉侯十九年卒子元嗣永平十四年坐與東平王等謀反減死一等國除永初七年鄧太后紹封茂孫奉為安樂亭侯劉攽曰案王平顏忠是楚王同時謀反}
  - {type: variant, offset: 897, length: 0, content: '', krp: 軍吏殺人免官削户邑定封參蘧鄉侯十九年卒子元嗣永平十四年坐與東平王等謀反減死一等國除永初七年鄧太后紹封茂孫奉為安樂亭侯劉攽曰案王平顏忠是楚王同時謀反}
  - {type: variant, offset: 898, length: 6, content: 而降超超重賜, WYG: 多連士大夫故杜元坐之傳寫之誤遂作東平王東平何嘗反也馬成傳馬成字君遷南陽棘陽人也少為縣吏世祖徇潁川以成為安集掾調守郟令郟縣名今汝州縣也及世祖討河北成即棄官歩負追及於滿陽以成為期門從征伐世祖即位再遷護軍都尉建武四年拜揚武將軍督誅虜將軍劉隆振威將軍宋登射聲校尉王賞發㑹稽丹陽九江六安四郡兵擊李憲時帝幸壽春設壇場祖禮遣之應劭風俗通曰謹按禮傳共工氏之子曰脩好遠游舟車所至足跡所逮靡不窮覽故祀以為祖神祖徂也進圍憲於舒令諸軍各深溝高壘憲數挑戰成堅壁不出守之歲餘至六年春城中食盡乃攻之遂屠舒斬李憲追擊}
