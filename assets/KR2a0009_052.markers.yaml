  - {type: variant, offset: 545, length: 212, content: 吏士往奔虜營會天大風超令十人持鼓藏虜舍後約曰見火然皆當鳴鼓大呼餘人悉持兵弩夾門而伏超乃順風縱火前後鼓噪虜衆驚亂超手格殺三人吏兵斬其使及從士三十餘級餘衆百許人悉燒死明日乃還告郭恂恂大驚既而色動超知其意舉手曰掾雖不行班超何心獨擅之乎恂乃悅超於是召鄯善王廣以虜使首示之一國震怖超曉告撫慰遂納子為質還奏於竇固固大喜具上超功效并求更選使使西域帝壯超節詔固曰吏如班超何故不遣而更選乎今以超為軍司馬令遂前功超復受使固欲益其兵超曰願將本所從, WYG: ''}
