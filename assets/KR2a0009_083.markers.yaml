  - {type: variant, offset: 3001, length: 411, content: 詔書而已帝大悅渙由此顯名州舉茂才除溫令縣多姦猾積為人患渙以方略討擊悉誅之境內清夷商人露宿於道其有放牛者輒云以屬稚子終無侵犯在溫三年遷兗州刺史繩正部郡風威大行後坐考妖言不實論歲餘徵拜侍御史永元十五年從駕南巡還為洛陽令以平正居身得寬猛之宜其冤嫌久訟歷政所不斷法理所難平者莫不曲盡情詐壓塞羣疑又能以譎數發擿姦伏京師稱歎以為渙有神筭元興元年病卒百姓市道莫不咨嗟男女老壯皆相與賦斂致奠醊以千數渙喪西歸道經弘農民庶皆設槃桉於路吏問其故咸言平常持米到洛為卒司所鈔恆亡其半自王君在事不見侵枉故來報恩其政化懷物如此民思其德為立祠安陽亭西每食輒弦歌而薦之永初二年鄧太后詔曰夫忠良之吏國家所以為理也求之甚勤得之至寡故孔子曰才難不其然乎昔大司農朱邑右扶風尹翁歸政迹茂異令名顯聞孝宣皇帝嘉歎愍惜而以黃金百斤策賜其子故洛陽令王渙秉清脩之節蹈羔羊之義盡心奉公務在惠民功業未遂不幸早世百姓追思為之立祠自非忠愛之至孰能若斯者乎今以渙子石為郎中以勸勞勤延熹中, WYG: 盛美増光日月矣}
