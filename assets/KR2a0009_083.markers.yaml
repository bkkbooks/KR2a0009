  - {type: variant, offset: 6323, length: 192, content: 無囚比縣流人歸化徙居二萬餘戶民嘗為虎所害乃設檻捕之生獲二虎恢聞而出呪虎曰天生萬物唯人為貴虎狼當食六畜而殘暴於人王法殺人者死傷人則論法汝若是殺人者當垂頭服罪自知非者當號呼稱冤一虎低頭閉目狀如震懼即時殺之其一視恢鳴吼踴躍自奮遂令放釋吏人為之歌頌青州舉尤異遷丹陽太守暴疾而卒弟翊字漢文名高於恢宰府先辟之翊陽喑不肯仕及恢被命乃就孝廉除須昌長化有異政吏人生為立碑聞舉將喪𠫓廾官歸後舉茂才不就卒於, WYG: 七十四終于}
