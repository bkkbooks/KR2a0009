  - {type: variant, offset: 6069, length: 0, content: '', WYG: 再舉有道不就謝承書曰詔書令郡以禮發遣蟠到河南萬歳亭折轅而旋也先是京師游士汝南范滂等非訐朝政自公卿以下皆折節下之訐謂横議是非也訐或作評也太學生爭慕其風以為文學將興處士復用蟠獨歎曰昔戰國之世處士横議孟子曰聖王不作諸侯恣行處士横議前書曰秦既稱帝患周之敗以為起於處士横議諸侯力爭音義曰言由横議而敗之列國之王至為擁篲先驅史記鄒衍如燕昭王擁篲先驅請列弟子之坐而受業築碣石宫身親往師之卒有阬儒燒書之禍今之謂矣乃絶迹於梁碭之間梁國有碭縣因樹為屋自同傭人謝承書曰居蓬萊之室依桑樹以為棟也居二年滂等果罹黨錮或死或刑者數百人蟠礭然免於疑論}
