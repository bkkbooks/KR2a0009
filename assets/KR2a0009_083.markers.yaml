  - {type: variant, offset: 6070, length: 16, content: 融以告郭林宗林宗因與融齎刺就房謁, WYG: 蟠友人陳郡馮雍坐事繫獄豫州牧黄琬欲殺之或勸蟠救雍蟠不肯行曰黄子琰為吾故邪未必合罪如不用吾言雖往何益琬聞}
