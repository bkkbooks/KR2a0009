  - {type: variant, offset: 5693, length: 329, content: 果菜為限雞豕有數農事既畢乃令子弟羣居還就黌學其剽輕游恣者皆役以田桑嚴設科罰躬助喪事賑恤窮寡朞年稱大化覽初到亭人有陳元者獨與母居而母詣覽告元不孝覽驚曰吾近日過舍廬落整頓耕耘以時此非惡人當是教化未及至耳母守寡養孤苦身投老柰何肆忿於一朝欲致子以不義乎母聞感悔涕泣而去覽乃親到元家與其母子飲因為陳人倫孝行譬以禍福之言元卒成孝子鄉邑為之諺曰父母何在在我庭化我鳲梟哺所生時考城令河內王渙政尚嚴猛聞覽以德化人署為主簿謂覽曰主簿聞陳元之過不罪而化之得無少鷹鸇之志邪覽曰以為鷹鸇不若鸞鳳渙謝遣曰枳棘非鸞鳳所棲百里豈大賢之路今日太學曳長裾飛名譽皆主簿後耳以一月奉為資勉卒景行覽入太學時諸生同郡符融有高名與覽比宇賓客盈室覽常自守不與融言融觀其容止心獨奇之乃謂曰與先生同郡壤隣房牖今, WYG: 上}
