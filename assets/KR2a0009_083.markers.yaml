  - {type: variant, offset: 4813, length: 1, content: 舉, WYG: 選能言語生茅容輕騎追之及於塗容為設飲共言稼穡之事臨訣去謂容曰為我謝郭林宗大樹將顚非一繩所維何為栖栖不遑寜處顚仆也維繫也喻時將衰季豈一人可能救邪及林宗有母憂穉往弔之置生芻一束於廬前而去衆怪不知其故林宗曰此必南州高士徐孺子也詩不云乎生芻一束其人如玉小雅白駒詩此戒賢者行所舍主人之餼雖薄要就賢主人其徳如玉然也吾無徳以堪之靈帝初欲蒲輪聘穉㑹卒時年七十二子𦙍字季登篤行}
