  - {type: variant, offset: 462, length: 7, content: 辟大司徒鄧禹府, WYG: 安帝以𤣥纁羔幣聘燮禮卿執羔董仲舒春秋繁露曰凡贄卿用羔羔有角而不用類仁者執之不鳴殺之不嘷類死義者羔飲其母必跪類知禮者故以為贄及南陽馮良二郡各遣丞掾致禮宗族更勸之曰夫脩德立行所以為國自先世以来勲寵相承君獨何為守東岡之陂乎燮曰吾既不能隠處巢穴追綺季之跡綺季東園公夏黄公角里先生謂之四皓隠於商山見前書也而猶顯然不逺父母之國斯固以滑泥揚波同其流矣滑混也楚詞何不滑其泥而揚其波滑音古没反夫脩道者度其時而動動而不時焉得亨乎亨通也書曰慮善以動動惟厥時因自載到潁川陽城遣生送敬劉攽曰案文當云遣門生送敬少一門字遂辭疾而歸送敬猶致謝也良亦載病到近縣送禮而還送禮謂送其所致之禮也詔書告二郡歲以羊酒養病良字君郎出於孤微少作縣吏年三十為尉從佐從佐謂隨從而已不主案牘也奉檄迎督郵即路慨然耻在厮役厮賤也因壊車殺馬毁裂衣冠乃遁至犍為從杜撫學妻子求索蹤迹斷絶後乃見草中有敗車死馬衣裳腐朽謂為虎狼盜賊所害發喪制服積十許年乃還鄉里志行高整非禮不動遇妻子如君臣鄉黨以為儀表燮良年皆七十餘終黃憲傳黃憲字叔度汝南愼陽人也在愼水之南因以名縣南陽有愼陽國而流俗書此或作順陽者誤世貧賤父為牛醫潁川荀淑至愼陽遇憲於逆旅逆旅客舍時年十四淑竦然異之揖與語移日不能去謂憲曰子吾之師表也既而前至袁閎一作閬所未及勞問逆曰子國有顏子寧識之乎顏子顏回也閎曰見吾叔度邪是時同郡戴良才高倨慠而見憲未嘗不正容及歸罔然若有失也其母問曰汝復從牛醫兒來邪對曰良不見叔度不自以為不及既覩其人則瞻之在前忽焉在後論語顏回慕孔子之言也固難得而測矣同郡陳蕃周}
