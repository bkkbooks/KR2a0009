  - {type: variant, offset: 3425, length: 160, content: 詔密縣存故太傅卓茂廟洛陽留王渙祠焉鐔顯後亦知名安帝時豫州刺史時天下飢荒競為盜賊州界收捕且萬餘人顯愍其困窮自陷刑辟輒赦之因自劾奏有詔勿理後位至長樂衛尉自渙卒後連詔三公特選洛陽令皆不稱職永和中以劇令勃海任峻補之峻擢用文武吏皆盡其能糾剔姦盜不得旋踵一歲斷獄不過數十威風猛於渙而文理不及之峻字叔高終於太山太守許荊字少張會稽陽羨人, WYG: 立}
