  - {type: variant, offset: 6088, length: 9, content: 請留宿林宗嗟歎下牀, WYG: 免雍罪大將軍何進連徴不詣進必欲致之使蟠同郡黄忠書勸曰前莫府初開至如先生特加殊禮優而不名申以手筆設几杖之坐經過二載而先生抗志彌高所尚益固竊論先生高節有餘於時則未也今潁川荀爽載病在道北海鄭𤣥北面受署彼豈樂羈牽哉知時不可逸豫也昔人之隠遭時則放聲滅迹巢棲茹薇放棄也謂棄聲名也巢棲謂巢父也説文薇似藿也其不遇也則祼身大笑被髮狂歌楚詞曰桑扈祼行史記曰箕子被髪佯狂歌謂楚狂接輿歌而過孔子也今先生處平壤壤地也游人間吟典籍襲衣裳事異昔人而欲逺蹈其迹不亦難乎孔氏可師何必首陽孔子使子路語隠者云不仕無義長㓜之節不可廢也君臣之義如之何其可廢也欲潔其身而亂大倫首陽夷齊所隠山也蟠不答中平五年復與爽𤣥及潁川韓融融字元長韶之子也見韶傳陳紀等十四人並博士徴不至明年董卓廢立蟠及爽融紀等復俱公車徴讀漢志曰徴爽}
