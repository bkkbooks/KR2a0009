  - {type: variant, offset: 4922, length: 2, content: 是失, WYG: 係嗣當立乃遞往就室肱博通五經兼明星緯士之逺来就學者三千餘人諸公爭加辟命皆不就二弟名聲相次亦不應徴聘時人慕之肱嘗與季江謁郡夜於道遇盜欲殺之肱兄弟更相爭死賊遂兩釋焉謝承書曰肱與季江俱乗車行適野廬為賊所劫取其衣物欲殺其兄弟肱謂盜曰弟年㓜父母所憐愍又未聘娶願自殺身濟弟季江言兄年徳在前家之珍寶國之英俊乞自受戮以代兄命盜戢刃曰二君所謂賢人吾等不良妄相侵犯棄物而去肱車中尚有數千錢盜不見也使從者追以與之亦復不受肱以物經歴盗手因以付亭吏而去也但掠奪衣資而已既至郡中見肱無衣服怪問其故肱託以它辭終不言盜盜聞而感悔後乃就精廬精廬即精舍也求見徴君肱與相見皆叩頭謝罪而還所略物肱不受勞以酒食而遣之後與徐穉俱徴不至桓帝乃下彭城使畫工圗其形狀肱臥於幽闇以被韜靣韜藏也言感眩疾不欲出風工竟不得見之中常侍曹節等專執朝事新誅太傅陳蕃}
