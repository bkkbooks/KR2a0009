  - {type: variant, offset: 3586, length: 165, content: 祖父武太守第五倫舉為孝廉武以二弟晏普未顯欲令成名乃請之曰禮有分異之義家有別居之道於是共割財產以為三分武自取肥田廣宅奴婢強者二弟所得並悉劣少鄉人皆稱弟克讓而鄙武貪婪晏等以此並得選舉武乃會宗親泣曰吾為兄不肖盜聲竊位二弟年長未豫榮祿所以求得分財自取大譏今理產所增三倍於前悉以推二弟一無所留於是郡中翕然遠近稱之位至長樂少府荊少為郡吏兄子世, WYG: 穉}
