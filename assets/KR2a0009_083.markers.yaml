  - {type: variant, offset: 5199, length: 243, content: 塞道車不得進乃輕服遁歸後四遷為豫章太守又三遷拜會稽太守山民愿朴乃有白首不入市井者頗為官吏所擾寵簡除煩苛禁察非法郡中大化徵為將作大匠山陰縣有五六老叟尨眉皓髮自若邪山谷閒出人齎百錢以送寵寵勞之曰父老何自苦對曰山谷鄙生未嘗識郡朝它守時吏發求民閒至夜不絕或狗吠竟夕民不得安自明府下車以來狗不夜吠民不見吏年老遭值聖明今聞當見棄去故自扶奉送寵曰吾政何能及公言邪勤苦父老為人選一大錢受之轉為宗正大鴻臚延熹四年代黃瓊為司空以陰霧愆陽免頃之拜將作大匠復為宗正建寧元年代王暢為司空頻遷司徒太尉二年以日食策免, WYG: 喪}
