  - {type: variant, offset: 6523, length: 3, content: 善亨鮮, WYG: 用同廢與其遐棲豈若蒙穢䝉穢謂仕亂朝悽悽碩人陵阿窮退碩人謂賢者悽悽飢病貌也言賢者退而窮處詩國風曰考槃在阿碩人之薖曲陵曰阿陵升也薖飢也薖音苦戈反韜伏明姿甘是堙曖堙沈也曖猶醫也後漢書卷八十三後漢書卷八十三考證周燮傳決曹掾燕之後也決字監本作法臣㑹汾按獨行傳周嘉篇作決從改按百官志太尉公府諸曹有法曹主郵驛料程有決曹主罪法郡太守下置諸曹掾史略如公府則法曹決曹並有之周燕於宣帝時為郡決曹太守欲枉殺人燕諫不聼知監本作法曹者誤矣徐穉傳穉不免之既謁而退不免之三字疑有誤何焯曰免疑作就通鑑作穉不之免袁紀作不之起固病不詣諸本同}
