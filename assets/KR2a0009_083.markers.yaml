  - {type: variant, offset: 3752, length: 219, content: 報讎殺人怨者操兵攻之荊聞乃出門逆怨者跪而言曰世前無狀相犯咎皆在荊不能訓導兄既早沒一子為嗣如令死者傷其滅絕願殺身代之怨家扶荊起曰許掾郡中稱賢吾何敢相侵因遂委去荊名譽益著太守黃兢舉孝廉和帝時稍遷桂陽太守郡濱南州風俗脆薄不識學義荊為設喪紀婚姻制度使知禮禁嘗行春到耒陽縣人有蔣均者兄弟爭財互相言訟荊對之歎曰吾荷國重任而教化不行咎在太守乃顧使吏上書陳狀乞詣廷尉均兄弟感悔各求受罪在事十二年父老稱歌以病自上徵拜諫議大夫卒於官桂陽人為立廟樹碑荊孫靈帝時, WYG: ''}
