  - {type: variant, offset: 490, length: 7, content: 與交州接境頗染, WYG: 禮進賢達多所降致卒不能屈憲郭林宗少游汝南先過袁閎劉攽曰案袁閬字奉高閎字夏甫此下言奉高則閎當作閬也不宿而退進往從憲累日方還或以問林宗郭泰别傳曰時林宗過薛恭祖恭祖問曰聞足下見袁奉高車不停軌鑾不輟軛從叔度乃彌信宿也林宗曰奉高之器譬諸汎濫雖清而易挹奉高閎字也爾雅曰側出汎泉正出濫泉汎音軌濫音檻叔度汪汪若千頃陂澄之不清淆之不濁不可量也淆混也憲初舉孝㢘又辟公府友人勸}
