  - {type: variant, offset: 4808, length: 4, content: 拜議郎矩, WYG: 雖不就有死喪負笈赴弔常於家豫炙鷄一隻以一兩綿絮漬酒中暴乾以裹鷄徑到所起冢􅎬外以水漬綿使有酒氣斗米飯白茅為藉以鷄置前釃酒畢留謁則去不見喪主時㑹者四方名士郭林宗等數十人聞之疑其穉也}
  - {type: variant, offset: 4808, length: 4, content: 拜議郎矩, krp: 雖不就有死喪負笈赴弔常於家豫炙鷄一隻以一兩綿絮漬酒中暴乾以裹鷄徑到所起冢𡑞外以水漬綿使有酒氣斗米飯白茅為藉以鷄置前釃酒畢留謁則去不見喪主時㑹者四方名士郭林宗等數十人聞之疑其穉也}
