  - {type: variant, offset: 20, length: 6, content: 民閒頗達情偽, WYG: 人者也然用舍之端君子之所以存其誠也誠實也孔子曰用之則行舍之則藏易曰閑邪存其誠故其行也則濡足䝉垢出身以効時新序曰申屠狄非時將自投河崔嘉聞而止之曰吾聞聖人從事於天地之間人之父母也今為濡足之故不救溺人乎及其止也則窮棲茹菽藏寶以迷國爾雅曰啜茹也孫卿子曰君子啜菽飲水非愚也是節然也論語曰陽貨謂孔子曰懐其寶而迷其邦可謂仁乎太原閔仲叔者謝承書曰閔貢字仲叔世稱節士雖周黨之潔清自以弗及也黨}
