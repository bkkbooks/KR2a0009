  - {type: variant, offset: 290, length: 0, content: '', WYG: 肉日買猪肝一片屠者或不肯與安邑令聞􅃯吏常給焉仲叔怪而問之知乃歎曰閔仲叔豈以口腹累安邑邪遂去客沛以夀終仲叔同郡荀恁字君大恁音而甚反少亦脩清節資財千萬父越卒悉散與九族隠居山澤以求厥志王莽末匈奴宼其本縣廣武廣武縣屬太原郡故城在今代州鴈門縣聞恁名節相約不入荀氏閭光武徴以病不至永平初東平王蒼為驃騎將軍開東閤延賢俊辟而應焉及後朝㑹顯宗戲之曰先帝徴君不至驃騎辟君而来何}
