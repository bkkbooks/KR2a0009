  - {type: variant, offset: 833, length: 1847, content: 任聖童值倉卒避兵之隴西時隗囂已據四郡遣使請延延不應更始元年以延為大司馬屬拜會稽都尉時年十九迎官驚其壯及到靜泊無為唯先遣饋禮祠延陵季子時天下新定道路未通避亂江南者皆未還中土會稽頗稱多士延到皆聘請高行如董子儀嚴子陵等敬待以師友之禮掾吏貧者輒分奉祿以賑給之省諸卒令耕公田以周窮急每時行縣輒使慰勉孝子就餐飯之吳有龍丘萇者隱居太末志不降辱王莽時四輔三公連辟不到掾史白請召之延曰龍丘先生躬德履義有原憲伯夷之節都尉埽洒其門猶懼辱焉召之不可遣功曹奉謁修書記致醫藥吏使相望於道積一歲萇乃乘輦詣府門願得先死備錄延辭讓再三遂署議曹祭酒萇尋病卒延自臨殯不朝三日是以郡中賢士大夫爭往宦焉建武初延上書願乞骸骨歸拜王庭詔徵為九真太守光武引見賜馬雜繒令妻子留洛陽九真俗以射獵為業不知牛耕民常告糴交阯每致困乏延乃令鑄作田器教之墾闢田疇歲歲開廣百姓充給又駱越之民無嫁娶禮法各因淫好無適對匹不識父子之性夫婦之道延乃移書屬縣各使男年二十至五十女年十五至四十皆以年齒相配其貧無禮娉令長吏以下各省奉祿以賑助之同時相娶者二千餘人是歲風雨順節穀稼豐衍其產子者始知種姓咸曰使我有是子者任君也多名子為任於是徼外蠻夷夜郎等慕義保塞延遂止罷偵候戍卒初平帝時漢中錫光為交阯太守教導民夷漸以禮義化聲侔於延王莽末閉境拒守建武初遣使貢獻封鹽水侯領南華風始於二守焉延視事四年徵詣洛陽以病稽留左轉睢陽令九真吏人生為立祠拜武威太守帝親見戒之曰善事上官無失名譽延對曰臣聞忠臣不私私臣不忠履正奉公臣子之節上下雷同非陛下之福善事上官臣不敢奉詔帝歎息曰卿言是也既之武威時將兵長史田紺郡之大姓其子弟賓客為人暴害延收紺繫之父子賓客伏法者五六人紺少子尚乃聚會輕薄數百人自號將軍夜來攻郡延即發兵破之自是威行境內吏民累息郡北當匈奴南接種羌民畏寇抄多廢田業延到選集武略之士千人明其賞罰令將雜種胡騎休屠黃石屯據要害其有警急逆擊追討虜多殘傷遂絕不敢出河西舊少雨澤乃為置水官吏修理溝渠皆蒙其利又造立校官自掾吏史子孫皆令詣學受業復其傜役章句既通悉顯拔榮進之郡遂有儒雅之士後坐誅羌不先上左轉召陵令顯宗即位拜潁川大守永平二年徵會辟雍因以為河內太守視事九年病卒少子愷官至太常王景字仲通樂浪亻六邯人也八世祖仲本琅邪不其人好道術明天文諸呂作亂齊哀王襄謀發兵而數問於仲及濟北王興居反欲委兵師仲仲懼禍及乃浮海東奔樂浪山中因而家焉父閎為郡三老更始敗土人王調殺郡守劉憲自稱大將軍樂浪太守建武六年光武遣太守王遵將兵擊之至遼東閎與郡決曹史楊邑等共殺調迎遵皆封為列侯閎獨讓爵帝奇而徵之道病卒景少學易遂廣闚衆書又好天文術數之事沈深多伎蓺辟司空伏恭府時有薦景能理水者顯宗詔與將作謁者王吳共修作浚儀渠吳用景流法水乃不復為害初平帝時河汴決壞未及得修建武十年陽武令張汜上言河決積久日月侵毀濟渠所漂數十許縣脩理之費其功不難宜改脩堤防以安百姓書奏光武即為發卒方營河功而浚儀令樂俊復上言昔元光之閒人庶熾盛緣隄墾殖而瓠子河決尚二十餘年不即擁塞今居家稀少田地饒廣雖未脩理其患猶可且新被兵革方興役力勞怨既多民不堪命宜須平靜更議其事光武得此遂止後汴渠東侵日月廣而水門故處皆在河中兗豫百姓怨歎以為縣官興佗役不先民急永平十二年議修汴渠乃引見景問以理水形便景陳其利害應對敏給帝善之又以嘗修浚儀功業有成乃賜景山海經河渠書禹貢圖及錢帛衣物夏遂發卒數十萬遣景與王吳脩渠築隄自滎陽東至千乘海口千餘里景乃商度地埶鑿山阜破砥績直溝澗防遏衝要疎決壅積十里立一水門令更相洄注無復潰漏之患景雖簡省役費然猶以百億計明年夏渠成帝親自巡行詔濱河郡國置河堤員吏如西京舊制景由是知名王吳及諸從事掾史皆增秩一等景三遷為侍御史十五年從駕東巡狩至無鹽帝美其功績拜河堤謁者賜車馬縑錢建初七年遷徐州刺史先是杜陵杜篤奏上論都賦欲令車駕遷還長安耆老聞者皆動懷土之心莫不眷然佇立西望景以宮廟已立恐人情疑惑會時有神雀諸瑞乃作金人論頌洛邑之美天人之符文有可採明年遷廬江太守先是百姓不知牛耕致地力有餘而食常不足郡界有楚相孫叔敖所起芍陂稻田景乃驅率吏民修起蕪廢教用犂耕由是墾闢倍多境內豐給遂銘石刻誓令民知常禁又訓令蠶織為作法制皆著于鄉亭廬江傳其文辭卒於官初景以為六經所載皆有卜筮作事舉止質於蓍龜而衆書錯糅吉凶相反乃參紀衆家數術文書冢宅禁忌堪輿日相之屬適於事用者集為大衍玄基云秦彭字伯平扶風茂陵人也自漢興之後世位相承六世祖襲為潁川太守與羣從同時為二千石者五人故三輔號曰萬石秦氏彭同產女弟顯宗時入掖庭為貴人有寵永平七年以彭貴人兄隨四姓小侯擢為開陽城門候十五年拜騎都尉副駙馬都尉耿秉北征匈奴建初元年遷山陽, WYG: ''}
