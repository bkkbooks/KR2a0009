  - {type: variant, offset: 5098, length: 1, content: 交, WYG: 以禮優順勿失其意肱使家人對云久病就醫遂羸服閒行竄伏青州界中賣卜給食召命得斷家亦不知其處歴年乃還年七十七熹平二年終于家弟子陳留劉操追慕肱徳共刋石頌之申屠蟠傳申屠蟠字子龍陳留外黄人也九歳喪父哀毁過禮服除不進酒肉十餘年每忌日輙三日不食海内先賢傳曰蟠在冢側致甘露白雉以孝稱同郡􅚆氏女玉為父報讎􅚆姓也殺夫氏之黨吏執玉以告外黄令梁配續漢書曰同縣大女􅚆玉為從父報讐殺夫之從母兄李士姑執玉以告吏也配欲論殺玉蟠時年十五為諸生進諫曰玉之節義足以感無耻之孫激忍辱之子不遭明時尚當表旌廬墓況在清聼而不加哀矜配善其言乃為讞得減死論讞請也鄉人稱美之家貧傭為漆工郭林宗見而奇之同郡蔡邕深重蟠及被州辟乃辭讓之曰申屠蟠禀氣𤣥妙性敏心}
