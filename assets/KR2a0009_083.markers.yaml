  - {type: variant, offset: 4120, length: 684, content: 昔東海孝婦感天致旱于公一言甘澤時降宜戮訟者以謝冤魂庶幽枉獲申時雨可期丹從之即刑訟女而祭婦墓天應澍雨穀稼以登嘗後策孝廉舉茂才拜徐令州郡表其能遷合浦太守郡不產穀實而海出珠寶與交阯比境常通商販貿糴糧食先時宰守並多貪穢詭人採求不知紀極珠遂漸徙於交阯郡界於是行旅不至人物無資貧者餓死於道嘗到官革易前敝求民病利曾未踰歲去珠復還百姓皆反其業商貨流通稱為神明以病自上被徵當還吏民攀車請之嘗既不得進乃載鄉民船夜遁去隱處窮澤身自耕傭鄰縣士民慕其德就居止者百餘家桓帝時尚書同郡楊喬上書薦嘗曰臣前後七表言故合浦太守孟嘗而身輕言微終不蒙察區區破心徒然而已嘗安仁弘義耽樂道德清行出俗能幹絕羣前更守宰移風改政去珠復還飢民蒙活且南海多珍財產易積掌握之內價盈兼金而嘗單身謝病躬耕壟次匿景藏采不揚華藻實羽翮之美用非徒腹背之毛也而沈淪草莽好爵莫及廊廟之寶𠫓廾於溝渠且年歲有訖桑榆行盡而忠貞之節永謝聖時臣誠傷心私用流涕夫物以遠至為珍士以稀見為貴槃木朽株為萬乘用者左右為之容耳王者取士宜拔衆之所貴臣以斗筲之姿趨走日月之側思立微節不敢苟私鄉曲竊感禽息亡身進賢嘗竟不見用年七十卒于家第五訪字仲謀京兆長陵人司空倫之族孫也少孤貧常傭耕以養兄嫂有閑暇則以學文仕郡為功曹察孝廉補新都令政平化行三年之閒鄰縣歸之戶口十倍遷張掖太守歲飢粟石數千訪乃開倉賑給以救其敝吏懼譴爭欲上言訪曰若上須報是𠫓廾民也太守樂以一身救百姓遂出穀賦人順帝璽書嘉之由是一郡得全歲餘官民並豐界無姦盜遷南陽太守去官拜護羌校尉邊境服其威信卒於官劉矩字叔方沛國蕭人也叔父光順帝時為司徒矩少有高節以叔父叔遼未得仕進遂絕州郡之命太尉朱寵太傅桓焉嘉其志義故叔遼以此為, WYG: 穉}
