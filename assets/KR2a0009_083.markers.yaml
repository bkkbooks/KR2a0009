  - {type: variant, offset: 413, length: 3, content: 綴集殊, WYG: 後宫千數其可損乎廐馬萬匹其可減乎左右悉權豪其可去乎皆對曰不可桓乃慨然歎曰使桓生行死歸於諸子何有哉若忤時强諫死而後歸於諸勸行者復何益也遂隠身不出若二三子可謂識去就之槩候時而處槩節也候時以居不失去就也夫然豈其枯槁茍而已哉蓋詭時審己以成其道焉詭違也迹若違時志存量己也余故列其風流區而載之言其清潔之風各有條流故區别而紀之周爕傳周燮字彥祖汝南安城人決曹掾燕之後也燕見獨行篇周嘉傳燮生而欽頤折頞醜狀駭人頤頷也欽頤曲頷也說文曰頞鼻莖也折亦曲也欽音丘凡反欽或作顩音同其母欲棄之其父不聽曰吾}
