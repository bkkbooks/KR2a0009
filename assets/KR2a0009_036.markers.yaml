  - {type: variant, offset: 1783, length: 427, content: 鄧太后臨朝儒學陵替準乃上疏曰明師傅及光武皇帝受命中興羣雄崩擾旌旗亂野東西誅戰不遑啟處然猶投戈講蓺息馬論道至孝明皇帝兼天地之姿用日月之明庶政萬機無不簡心而垂情古典游意經蓺每饗射禮畢正坐自講諸儒並聽四方欣欣雖闕里之化矍相之事誠不足言又多徵名儒以充禮官如沛國趙孝琅邪承宮等或安車結駟告歸鄉里或豐衣博帶從見宗廟其餘以經術見優者布在廊廟故朝多皤皤之良華首之老每讌會則論難衎衎共求政化詳覽羣言響如振玉朝者進而思政罷者退而備問小大隨化雍雍可嘉朝門羽林介冑之士悉通孝經博士議郎一人開門徒衆百數化自聖躬流及蠻荒匈奴遣伊秩訾王大車且渠來入就學八方肅清上下無事是以議者每稱盛時咸言永平辭文吏則去法律而學詆欺銳錐刀之鋒斷刑辟之重德陋俗薄以致苛刻昔孝文竇后性好黃老而清靜之化流景武之閒臣愚以為宜下明詔博求幽隱發揚巖穴寵進儒雅有如孝宮者徵詣公車以俟聖上講習之期公卿各舉明經及舊儒子孫進其爵位使纘其業復召郡國書佐使讀律令如此則延頸者日有所見傾耳者月有所聞伏願陛下推述先帝進業之道準再遷, WYG: ''}
