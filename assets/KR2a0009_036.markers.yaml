  - {type: variant, offset: 490, length: 599, content: 年封長羅侯十三年封弟丹為射陽侯兄子尋玄鄉侯族兄忠更父侯十五年定封宏壽張侯十八年帝南祠章陵過湖陽祠重墓追爵謚為壽張敬侯立廟於湖陽車駕每南巡常幸其墓賞賜大會宏為人謙柔畏慎不求苟進常戒其子曰富貴盈溢未有能終者吾非不喜榮埶也天道惡滿而好謙前世貴戚皆明戒也保身全己豈不樂哉每當朝會輒迎期先到俯伏待事時至乃起帝聞之常勑騶騎臨朝乃告勿令豫到宏所上便宜及言得失輒手自書寫毀削草本公朝訪逮不敢衆對宗族染其化未嘗犯法帝甚重之及病困車駕臨視留宿問其所欲言宏頓首自陳無功享食大國誠恐子孫不能保全厚恩令臣魂神慙負黃泉願還壽張食小鄉亭帝悲傷其言而竟不許二十七年卒遺勑薄葬一無所用以為棺柩一臧不宜復見如有腐敗傷孝子之心使與夫人同墳異臧帝善其令以書示百官因曰今不順壽張侯意無以彰其德且吾萬歲之後欲以為式賻錢千萬布萬匹謚為恭侯贈以印綬車駕親送葬子鯈嗣帝悼宏不已復封少子茂為平望侯樊氏侯者凡五國明年賜鯈弟鮪及從昆弟七人合錢五千萬論曰昔楚頃襄王問陽陵君曰君子之富何如對曰假人不德不責食人不使不役親戚愛之衆人善之若乃樊重之折契止訟其庶幾君子之富乎分地以用天道實廩以崇禮節取諸理化則亦可以施於政也與夫愛而畏者何殊閒哉鯈字長魚謹約有父風事後母至孝及母卒哀思過禮毀病不自支世祖常遣中黃門朝暮送饘粥服闋就侍中丁恭受公羊嚴氏春秋建武中禁網尚闊諸王既長各招引賓客以鯈外戚爭遣致之而鯈清靜自保無所交結及沛王輔事發貴戚子弟多見收捕鯈以不豫得免帝崩鯈為復土, WYG: 營}
