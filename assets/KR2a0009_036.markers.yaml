  - {type: variant, offset: 3369, length: 501, content: 九興素與從兄嵩不相能然敬其威重興疾病帝親臨問以政事及羣臣能不興頓首曰臣愚不足以知之然伏見議郎席廣謁者陰嵩並經行明深踰於公卿興沒後帝思其言遂擢廣為光祿勳嵩為中郎將監羽林十餘年以謹勑見幸顯宗即位拜長樂衞尉遷執金吾永平元年詔曰故侍中衞尉關內侯興典領禁兵從平天下當以軍功顯受封爵又諸舅比例應蒙恩澤興皆固讓安乎里巷輔導朕躬有周昌之直在家仁孝有曾閔之行不幸早卒朕甚傷之賢者子孫宜加優異其以汝南之鮦陽封興子慶為鮦陽侯慶弟博為強侯博弟員丹並為郎慶推田宅財物悉與員丹帝以慶義讓擢為黃門侍郎慶卒子琴嗣建初五年興夫人卒肅宗使五官中郎將持節即墓賜策追謚興曰翼侯琴卒子萬全嗣萬全卒子桂嗣興弟就嗣父封宣恩侯後改封為新陽侯就善談論朝臣莫及然性剛不得衆譽顯宗即位以就為少府位特進就子豐尚酈邑公主公主嬌妒豐亦狷急永平二年遂殺主被誅父母當坐皆自殺國除帝以舅氏故不極其刑陰氏侯者凡四人初陰氏世奉管仲之祀謂為相君宣帝時陰子方者至孝有仁恩臘日晨炊而竈神形見子方再拜受慶家有黃羊因以祀之自是已後暴至巨富田有七百餘頃輿馬僕隸比於邦君子方常言我子孫必將彊大至識三世而遂繁昌故後常以臘日祀竈而薦黃羊焉贊曰權族好傾后門多毀樊氏世篤陰亦戒侈恂恂苗胤傳龜襲紫, WYG: 六}
