  - {type: variant, offset: 17, length: 1, content: 宏, WYG: 千石本注曰掌序錄王國嫡庶之次及諸宗室親屬逺近郡國嵗因計上宗室名籍若有犯法當髠以上先上諸宗正宗正以聞乃報決胡廣曰又嵗一治諸王世譜差序秩第漢官曰員吏四十一人其六人四科一人二百石四人百石三人佐六人騎吏二人法家十八人學事一人官醫丞一人比千石諸公主每主家令一人六百石丞一人三百石本注曰其餘屬吏増減無常漢官曰主簿一人秩六百石僕一人秩六百石私府長一人秩六百石家丞一人三百石直吏三人從官二人東觀書曰其主薨無}
  - {type: page-break, offset: 17, content: '', id: KR2a0009_WYG_036-1b, image: WYG0252/WYG0252-0423b.png}
  - {type: variant, offset: 17, length: 1, content: 宏, krp: 千石本注曰掌序錄王國嫡庶之次及諸宗室親屬逺近郡國嵗因計上宗室名籍若有犯法當髠以上先上諸宗正宗正以聞乃報決胡廣曰又嵗一治諸王世譜差序秩第漢官曰員吏四十一人其六人四科一人二百石四人百石三人佐六人騎吏二人法家十八人學事一人官醫丞一人比千石諸公主每主家令一人六百石丞一人三百石本注曰其餘屬吏増減無常漢官曰主簿一人秩六百石僕一人秩六百石私府長一人秩六百石家丞一人三百石直吏三人從官二人東觀書曰其主薨無}
  - {type: variant, offset: 19, length: 5, content: 鯈族曾孫準, WYG: 置傅一人守其家右屬宗正本注曰中興省都司空令丞如淳曰主罪人大司農卿一人中二千石本注曰掌諸錢穀金帛諸貨幣郡國四時上月旦見錢穀簿其逋未畢各具别之邊郡諸官請調度者皆為報給損多益寡取相給足漢書曰員吏百六十四人其十八人四科九人斗食十六人二百石文學二十人百石二十五人佐七十五人學事一人官醫丞一人比千石部丞一人六百石本注曰部丞主帑藏古今注曰建初七年七月為大司農置丞一人秩千石别主帑藏則部丞應是而秩不同應劭漢官秩亦云二千石太倉令一人六百石本注曰主受郡國傳漕榖漢官曰員吏九十九人丞一人平凖令一人六百石本注曰掌知物賈主練染作采色漢官曰員吏百九十人丞一人導官令一人六百石本注曰主舂御米及作乾糒導擇也漢官曰員吏百一十二人丞一人右屬大司農本注曰郡國鹽官鐵官本屬司農中興皆屬郡縣魏志曰曹公置典農中郎將秩二千石典農都尉秩六百石或四百石典農校尉秩比二千石所主如中郎部分别而少為校尉丞又有廩犧令六百石掌祭祀犧牲鴈鶩之屬漢官曰丞一人三百石員吏四十人其十一人斗食十七人佐七人學事五人守學事皆河南屬縣給吏者及雒陽市長漢官曰市長一人秩四百石丞一人二百石明法補員吏三十六人十三人百石嗇夫十一人斗食十二人佐又有檝櫂丞三百石别治中水官主水渠在馬市東有員吏六人滎陽敖倉官中興皆屬河南尹餘均輸等皆省均輸者前書孟康注曰謂諸當所有輸於官者皆令輸其土地所饒平其所在時賈官更於他處貨之輸者既便而官有利鹽鐵論大夫曰往者郡國諸侯各以其物貢輸往來煩雜物多苦惡或不償其費故郡置輸官以相給運而便逺方之貢故曰均輸開委府于京師以籠貨物賤則買貴則賣是以縣官不失實商賈無所利故曰平凖平凖則民不失職均輸則民不劬勞故平凖均輸所以平萬物而便百姓也文學曰古之賦税於民也因其所工不求所拙農人納其穫工女效其織今釋其所有責其所無百姓賤買貨物以便上求間者郡國或令民作布絮吏留難與之為市吏之所入非獨齊陶之縑蜀漢之布也亦民間之所為耳行姦賣平農民重苦必苦女工繭税未見輸之均也縣官猥發闔門擅市即萬民並収並収則物騰躍騰躍則商賈利自市則吏容姦豪吏富商積貨儲物以待其急輕賈姦吏収以取貴未見凖之平也蓋古之均輸所以齊勞逸而便貢輸非以為利而賈萬物也王隆小學漢官篇曰調均報度輸漕委輸胡廣注曰邊郡諸官請調者皆為調均報給之也以水通輸曰漕委積也郡國所積聚金帛貨賄随時輸送諸司農曰委輸以供國用前書又有都内籍田令丞幹官鐵市兩長丞郡國諸倉農監六十五官長丞皆屬之少府卿一人中二千石本注曰掌中服御諸物衣服寳貨珍膳之屬漢官曰員吏三十四人其一人四科一人二百石五人百石四人斗食三人佐六人騎吏十三人學事一人官醫少者小也小故稱少府王者以租税為公用山澤陂池之税以供王之私用古皆作小府漢官儀曰田租芻槀以給經用凶年山澤魚鹽市税少府以給私用也丞一人比千石太醫令一人六百石本注曰掌諸醫漢官曰員醫二百九十三人員吏十九人藥丞方丞各一人本注曰藥丞主藥方丞主藥方太官令一人六百石本注曰掌御飲食漢官曰員吏六十九人衞士三十八人荀綽晉百官表注曰漢制太官令秩千石丞四人秩四百石不與志同左丞甘丞湯官丞果丞各一人本注曰左丞主飲食甘丞主膳具湯官丞主酒果丞主果荀綽云甘丞掌諸甘肥果丞别在外諸果菜茹守宫令一人六百石本注曰主御紙筆墨及尚書財用諸物及封泥漢官曰員吏六十九人丞一人漢官曰外官丞二百石公府吏府也上林苑令一人六百石本注曰主苑中禽獸頗有民居皆主之捕得其獸送太官漢官曰員吏五十八人案桓帝又置鴻徳苑令丞尉各一人侍中比二千石漢官秩云千石周禮太僕干寳注曰若漢侍中本注曰無員掌侍左右賛導衆事顧問應對法駕出則多}
