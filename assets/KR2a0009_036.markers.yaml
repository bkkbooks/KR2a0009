  - {type: variant, offset: 2215, length: 1, content: 初, WYG: 元三年七月増尚書令史員功滿未嘗犯禁者以補小縣墨綬蔡質曰皆選蘭臺符節上稱簡精練有吏能為之決錄注曰故事尚書郎以令史久缺補之世祖始改用孝㢘為郎以孝亷丁邯補焉邯稱疾不就詔問實病羞為郎乎對曰臣實不病恥以孝亷為令史職耳世祖怒曰虎賁滅頭杖之數十詔問欲為郎不邯曰能殺臣者陛下不能為郎者臣中詔遣出竟不為郎邯字叔春京兆陽陵人也有髙節正直不撓後拜汾陰令治有名迹遷漢中太守妻弟為公孫述將収妻送南鄭獄免冠徒跣自陳詔曰漢中太守妻乃繫南鄭獄誰當搔其背垢者懸牛頭賣馬脯盜跖行孔子語以邯服罪且邯一妻冠履勿謝治有異卒於官符節令一人六百石本注曰為符節臺率主符節事凡遣使掌授節尚符璽郎中四人本注曰舊二人在中主璽及虎符竹符之半者漢官曰當時明法律郎周禮掌節有虎節龍節皆金也干寳注曰漢之銅虎符則其制也周禮又曰以英蕩輔之干寳曰英刻書也蕩竹箭也刻而書其所使之事以助三節之信則漢之竹使符者亦取則於故事也符節令史二百石本注曰掌書魏氏春秋曰中平六年始復節上赤葆御史中丞一人千石本注曰御史大夫之丞也舊别監御史在殿中宻舉非法周禮掌建邦之宫刑以主治王宫之政令干寳注曰若御史中丞及御史大夫轉為司空因别留中為御史臺率風俗通曰尚書御史臺皆以官倉頭為吏主賦舎凡守其門户蔡質漢儀曰丞故二千石為之或遷侍御史髙第執憲中司朝㑹獨坐内掌蘭臺督諸州刺史糾察百寮出為二千石魏志曰建安置御史大夫不領中丞置長史一人後又屬少府治書侍御史二人六百石本注曰掌選明法律者為之凡天下諸讞疑事掌以法律當其是非蔡質漢儀曰選御史髙第補之胡廣曰孝宣感路温舒言秋季後請讞時帝幸宣室齋居而決事令侍御史二人治書御史起此後因别置冠法冠秩百石有印綬與符節郎共平廷尉奏事罪當輕重荀綽晉百官表注曰惠帝以後無所平治備位而已侍御史十五人六百石本注曰掌察舉非法受公卿郡吏奏事有違失舉刻之凡郊廟之祠及大朝㑹大封拜則二人監威儀有違失則劾奏蔡質漢儀曰其二人者更直執法省中者皆糾察百官督州郡公法府掾屬髙第補}
