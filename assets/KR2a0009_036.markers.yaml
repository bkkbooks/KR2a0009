  - {type: variant, offset: 2214, length: 0, content: '', WYG: 侍御史皆避車豫相廻避衞士傳不得迕臺官臺官過後乃得去臣昭案獻帝分置左右僕射建安四年以榮邵為尚書左僕射是也獻帝起居注曰邵卒官贈執金吾尚書六人六百石本注曰成帝初置尚書四人韋昭曰尚奉也分為四曹漢舊儀曰初置五曹有三公曹主斷獄蔡質漢儀曰典天下嵗盡集課事三公尚書二人典三公文書吏曹尚書典選舉齋祀屬三公曹靈帝末梁鵠為選部尚書常侍曹尚書主公卿事蔡質漢儀曰主常侍黄門御史事世祖改曰吏曹二千石曹尚書主郡國二千石事漢舊儀曰亦云主刺史蔡質漢儀曰掌中郎官水火盗賊辭訟罪𤯝民曹尚書主凡吏上書事蔡質漢舊儀曰典繕治功作監池苑囿盜賊事客曹尚書主外國夷狄事尚書龍作納言出入帝命應劭曰今尚書官王之喉舌世祖承遵後分二千石曹又分客曹為南主客曹北主客曹蔡質漢儀曰天子出獵駕御府曹郎屬之凡六曹周禮天官有司㑹鄭𤣥曰若今尚書左右丞各一人四百石本注曰掌錄文書期㑹左丞主吏民章報及騶伯史蔡質漢儀曰總典臺中綱紀無所不統右丞假署印綬及紙筆墨諸財用庫藏蔡質漢儀曰右丞與僕射對掌授廩假錢穀與左丞無所不統凡中宫漏夜盡鼓鳴則起鍾鳴則息衞士甲乙徼相傳甲夜畢傳乙夜相傳盡五更衞士傳言五更未明三刻後雞鳴衞士踵丞郎趨嚴上臺不畜宫中雞汝南出雞鳴衞士候朱雀門外專傳雞鳴於宫中應劭曰楚歌今雞鳴歌也晉太康地道記曰後漢固始鮦陽公安細陽四縣衞士習此曲於闕下歌之今雞鳴是也侍郎三十六人四百石本注曰一曹有六人主作文書起草蔡質漢儀曰尚書郎初從三署詣臺試初上臺稱守尚書郎中嵗滿稱尚書郎三年稱侍郎客曹郎主治羌胡事劇遷二千石或刺史其公遷為縣令秩滿自占縣去詔書賜錢三萬與三臺祖餞餘官則否治嚴一月凖謁公卿陵廟乃發御史中丞遇尚書丞郎避車執板住揖丞郎坐車舉手禮之車過逺乃去尚書言左右丞敢告知如詔書律令郎見左右丞對揖無敬稱曰左右君丞郎見尚書執扳對揖稱曰明時見令僕射執板拜朝賀對揖令史十八人二百石本注曰曹有三主書後増劇曹三人合二十一人古今注曰}
