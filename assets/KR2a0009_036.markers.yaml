  - {type: variant, offset: 1091, length: 541, content: 永平元年拜長水校尉與公卿雜定郊祠禮儀以讖記正五經異說北海周澤琅邪承宮並海內大儒鯈皆以為師友而致之於朝上言郡國舉孝廉率取年少能報恩者耆宿大賢多見廢棄宜勑郡國簡用良俊又議刑辟宜須秋月以順時氣顯宗並從之二年以壽張國益東平王徙封鯈燕侯其後廣陵王荊有罪帝以至親悼傷之詔鯈與羽林監南陽任隗雜理其獄事竟奏請誅荊引見宣明殿帝怒曰諸卿以我弟故欲誅之即我子卿等敢爾邪鯈仰而對曰天下高帝天下非陛下之天下也春秋之義君親無將將而誅焉是以周公誅弟季友鴆兄經傳大之臣等以荊屬託母弟陛下留聖心加惻隱故敢請耳如令陛下子臣等專誅而已帝歎息良久鯈益以此知名其後弟鮪為子賞求楚王英女敬鄉公主鯈聞而止之曰建武時吾家並受榮寵一宗五侯時特進一言女可以配王男可以尚主但以貴寵過盛即為禍患故不為也且爾一子柰何棄之於楚乎鮪不從十年鯈卒賵贈甚厚謚曰哀侯帝遣小黃門張音問所遺言先是河南縣亡失官錢典負者坐死及罪徙者甚衆遂委責於人以償其秏鄉部吏司因此為姦鯈常疾之又野王歲獻甘醪膏每輒擾人吏以為利鯈並欲奏罷之疾病未及得上音歸具以聞帝覽之而悲歎勑二郡並令從之長子汜嗣以次子郴梵為郎其後楚事發覺帝追念鯈謹恪又聞其止鮪婚事故其諸子得不坐焉梵字文高為郎二十餘年三署服其重慎悉推財物二千餘萬與孤兄子官至大鴻臚汜卒子時嗣時卒子建嗣建卒無子國絕永寧元年鄧太后, WYG: 行}
