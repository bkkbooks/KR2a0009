  - {type: variant, offset: 33, length: 0, content: '', WYG: 尹亦如之又侍中舊與中官俱止禁中武帝時侍中莽河羅挾刃謀逆由是侍中出禁外有事乃入畢即出王莽秉政侍中復入與中官共止章帝元和中侍中郭舉與後宫通拔佩刀驚上舉伏誅侍中由是復出外中常侍千石本注曰宦者無員後増秩比二千石掌侍左右從入内宫賛導内衆事顧問應對給事黄門侍郎六百石本注曰無員掌侍從左右給事中關通中外及諸王朝見於殿中引王就坐漢舊儀曰黄門郎屬黄門令日暮入對青瑣門拜名曰夕郎宫閣簿青瑣門在南宫衛瓘注吳都賦曰青瑣户邊靑鏤也一曰天子門内有眉格再重裏青畫曰瑣獻帝起居注曰帝初即位初置侍中給事黄門侍郎員各六人出入禁中近侍帷幄省尚書事改給事黄門侍郎為侍中侍郎去給事黄門之號旋復復故舊侍中黄門侍郎以在中宫者不與近宻交政誅黄門後侍中侍郎出入禁闈機事頗露由是王允乃奏比尚書不得出入不通賔客自此始也又曰諸奄人官悉以議郎郎中稱秩如故諸署令兩梁冠陛殿上得召都官從事以下小黄門六百石本注曰宦者無員掌侍左右受尚書事上在内宫關通中外及中宫已下衆事諸公主及王太妃等有疾苦則使問之黄門令一人六百石董巴曰禁門曰黄闥以中人主之故號曰黄門令本注曰宦者主省中諸宦者漢官曰員吏十八人丞從丞各一人本注曰宦者從丞主出入從黄門署長畫室署長玉堂署長各一人丙署長七人皆四百石黄綬本注曰宦者各主中宫别處中黄門冗從僕射一人六百石本注曰宦者主中黄門冗從居則宿衞直守門户出則騎從夾乗輿車中黄門比百石本注曰宦者無員後増比三百石掌給事禁中掖庭令一人六百石本注曰宦者掌後宫貴人采女事漢官曰吏從官百六十七人待詔五人員吏十人左右丞暴室丞各一人本注曰宦者暴室丞主中婦人疾病者就此室治其皇后貴人有罪亦就此室永巷令一人六百石本注曰宦者典宫婢侍使漢官曰員吏六人吏從官三十四人丞一人本注曰宦者漢官曰右丞一人暴室一人御府令一人六百石本注曰宦者典官婢作中衣服及補浣之屬漢官曰員吏七人吏從官三十人丞織室丞各一人本注曰宦者漢官曰右丞一人祠祀令一人六百石本注曰典中諸小祠祀漢官曰從官吏八人騶僕射一人家巫八人丞一人本注曰宦者鉤盾令一人六百石本注曰宦者典諸近池苑囿逰觀之處漢官曰吏從官四十人員吏四十八人丞永安丞各一人三百石本注曰宦者永安北宫東北别小宫名有園觀苑中丞果丞鴻池丞南園丞各一人二百石本注曰苑中丞主苑中離宫果丞主果園鴻池池名在雒}
