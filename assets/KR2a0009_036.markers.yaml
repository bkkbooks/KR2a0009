  - {type: variant, offset: 2503, length: 864, content: 令明習故事遂見任用元初三年代周暢為光祿勳五年卒於官陰識字次伯南陽新野人也光烈皇后之前母兄也其先出自管仲管仲七世孫修自齊適楚為陰大夫因而氏焉秦漢之際始家新野及劉伯升起義兵識時游學長安聞之委業而歸率子弟宗族賓客千餘人往詣伯升伯升乃以識為校尉更始元年遷偏將軍從攻宛別降新野淯陽杜衍冠軍胡湖陽二年更始封識陰德侯行大將軍事建武元年光武遣使迎陰貴人於新野并徵識識隨貴人至以為騎都尉更封陰鄉侯二年以征伐軍功增封識叩頭讓曰天下初定將帥有功者衆臣託屬掖廷仍加爵邑不可以示天下帝甚美之以為關都尉鎮函谷遷侍中以母憂辭歸十五年定封原鹿侯及顯宗立為皇太子以識守執金吾輔導東宮帝每巡郡國識常留鎮守京師委以禁兵入雖極言正議及與賓客語未嘗及國事帝敬重之常指識以勑戒貴戚激厲左右焉識所用掾史皆簡賢者如虞延廷傅寬薛愔等多至公卿校尉顯宗即位拜為執金吾位特進永平二年卒贈以本官印綬謚曰貞侯子躬嗣躬卒子璜嗣永初七年為奴所殺無子國絕永寧元年鄧太后以璜弟淑紹封淑卒子鮪嗣躬弟子綱女為和帝皇后封綱吳房侯位特進三子軼輔敞皆黃門侍郎后坐巫蠱事廢綱自殺輔下獄死軼敞徙日南識弟興興字君陵光烈皇后母弟也為人有膂力建武二年為黃門侍郎守期門僕射典將武騎從征伐平定郡國興每從出入常操持小蓋障翳風雨躬履塗泥率先期門光武所幸之處輒先入清宮甚見親信雖好施接賓然門無俠客與同郡張宗上谷鮮于裒不相好知其有用猶稱所長而達之友人張汜杜禽與興厚善以為華而少實但私之以財終不為言是以世稱其忠平第宅苟完裁蔽風雨九年遷侍中賜爵關內侯帝後召興欲封之置印綬於前興固讓曰臣未有先登陷陣之功而一家數人並蒙爵土令天下觖望誠為盈溢臣蒙陛下貴人恩澤至厚富貴已極不可復加至誠不願帝嘉興之讓不奪其志貴人問其故興曰貴人不讀書記邪亢龍有悔夫外戚家苦不知謙退嫁女欲配侯王取婦眄睨公主愚心實不安也富貴有極人當知足夸奢益為觀聽所譏貴人感其言深自降挹卒不為宗親求位十九年拜衞尉亦輔導皇太子明年夏帝風眩疾甚後以興領侍中受顧命於雲臺廣室會疾瘳召見興欲以代吳漢為大司馬興叩頭流涕固讓曰臣不敢惜身誠虧損聖德不可苟冒至誠發中感動左右帝遂聽之二十三年卒時年, WYG: 卷}
