  - {type: variant, offset: 1687, length: 0, content: '', WYG: 李尤銘曰上西在季位月惟戌雍門銘曰雍門處中位月在酉廣陽門銘曰廣陽位孟厥月在申津門銘曰津名自定位季月未小苑門開陽門應劭漢官曰開陽門始成未有名宿昔有一柱來在樓上琅邪開陽縣上言縣南城門一拄飛去光武皇帝使來識視悵然遂堅縛之刻記其年月因以名焉銘曰開陽在孟位月惟已耗門銘曰耗門值季月位在辰中東門銘曰中東處仲月位當卯上東門銘曰上東少陽厥位在寅穀門銘曰穀門北中位當于子夏門銘曰夏門值孟位月在亥凡十二門蔡質漢儀曰雒陽二十四街街一亭十二城門門一亭右屬城門校尉北軍中候一人六百石本注曰掌監五營漢官曰員}
