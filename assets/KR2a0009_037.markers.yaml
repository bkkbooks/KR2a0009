  - {type: variant, offset: 2611, length: 232, content: 士七十許人力戰連日弩矢盡城陷魴乃遁去帝聞郡國反即馳赴潁川魴詣行在所帝案行鬬處知魴力戰乃嘉之曰此健令也所當討擊勿拘州郡襃等聞帝至皆自髡剔負鈇鑕將其衆請罪帝且赦之使魴轉降諸聚落縣中平定詔乃悉以襃等還魴誅之魴責讓以行軍法皆叩頭曰今日受誅死無所恨魴曰汝知悔過伏罪今一切相赦聽各反農桑為令作耳目皆稱萬歲是時每有盜賊並為襃等所發無敢動者縣界清靜十三年遷魏郡太守二十七年以高第入代趙憙為太僕中元元年從東封岱宗行衞尉事還代張純為司空賜爵關內侯二年帝崩使魴持節起原陵更封楊邑鄉侯食三, WYG: ''}
