  - {type: variant, offset: 1483, length: 0, content: '', WYG: 秋中宫謁者令一人六百石本注曰宦者中宫謁者三人四百石本注曰宦者主報中章中宫尚書五人六百石本注曰宦者主中文書中宫私府令一人六百石本注曰宦者主中藏幣帛諸物裁衣被補浣者皆主之丁孚漢儀曰中宫藏府令秩千石儀比御府令丞一人本注曰宦者中宫永巷令一人六百石本注曰宦者主宫人丞一人本注曰宦者中宫黄門冗從僕射一人六百石本注曰宦者主中黄門冗從丁孚漢儀曰給事中宫侍郎六人比尚書郎宦者為之給事黄門四人比黄門侍郎給事羽林郎一人比羽林將虎賁官騎下中宫署令一人六百石本注曰宦者主中宫請署天子數女騎六人丞復道丞各一人本注曰宦者復道丞主中閣道中宫藥長一人四百石本注曰宦者右屬大長秋本注曰承秦有詹事一人位在長秋上亦宦者主中諸官成帝省之以其職并長秋是後皇后當法駕出則中謁中宦者職}
