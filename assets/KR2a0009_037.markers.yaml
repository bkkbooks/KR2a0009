  - {type: variant, offset: 2921, length: 2, content: 南宮, WYG: 主烏桓騎射聲校尉一人比二千石服䖍曰工射也冥寞中聞聲則射中之故以為名本注曰掌宿衞兵蔡質漢儀曰掌待詔射聲事漢官曰員吏百二十九人領士七百人司馬一人千石右屬北軍中候本注曰舊有中壘校尉領北軍營壘之事有胡騎虎賁校尉皆武帝置中興省中壘但置中候以監五營胡騎并長水虎賁主輕車并射聲案大駕鹵簿五校在前各有鼓吹一部凡中二千石丞比千石真二千石丞長史六百石比二千石丞比六百石令相千石丞尉四百石其六百石丞尉三百石長相四百石及三百石丞尉皆二百石諸候公主家丞秩皆比百石諸邊鄣塞尉諸陵校尉長皆二百石有常例者不署秩司𨽻校尉一人比二千石蔡質漢儀曰職在典京師外部諸郡無所不糾封侯外戚三公以下無尊卑入宫開中道稱使者每㑹後到先去本注曰孝武帝初置荀綽晉百官表注曰司𨽻校尉周官也征和中陽石公主巫蠱之獄起乃依周置司𨽻臣昭曰周無司𨽻豈即司寇乎持節掌察舉百官以下及京師近郡犯法者前書曰置從中都官徒千二百人捕巫蠱督大姦猾後罷其兵元帝去節成帝省}
