  - {type: variant, offset: 4454, length: 788, content: 郡貢獻轉運皆從東冶汎海而至風波艱阻沈溺相係弘奏開零陵桂陽嶠道於是夷通至今遂為常路在職二年所息省三億萬計時歲天下遭旱邊方有警人食不足而帑藏殷積弘又奏宜省貢獻減徭費以利飢人帝順其議元和元年代鄧彪為太尉時舉將第五倫為司空班次在下每正朔朝見弘曲躬而自卑帝問知其故遂聽置雲母屏風分隔其閒由此以為故事在位四年奏尚書張林阿附侍中竇憲而素行臧穢又上洛陽令楊光憲之賓客在官貪殘並不宜處位書奏吏與光故舊因以告之光報憲憲奏弘大臣漏泄密事帝詰讓弘收上印綬弘自詣廷尉詔勑出之因乞骸骨歸未許病篤上書陳謝并言竇憲之短帝省章遣醫占弘病比至已卒臨歿悉還賜物勑妻子褐巾布衣素棺殯殮以還鄉里周章字次叔南陽隨人也初仕郡為功曹時大將軍竇憲免封冠軍侯就國章從太守行春到冠軍太守猶欲謁之章進諫曰今日公行春豈可越儀私交且憲椒房之親埶傾王室而退就藩國禍福難量明府剖符大臣千里重任舉止進退其可輕乎太守不聽遂便升車章前拔佩刀絕馬鞅於是乃止及憲被誅公卿以下多以交關得罪太守幸免以此重章舉孝廉六遷為五官中郎將延平元年為光祿勳永初元年代魏霸為太常其冬代尹勤為司空是時中常侍鄭衆蔡倫等皆秉埶豫政章數進直言初和帝崩鄧太后以皇子勝有痼疾不可奉承宗廟貪殤帝孩抱養為己子故立之以勝為平原王及殤帝崩羣臣以勝疾非痼意咸歸之太后以前既不立恐後為怨乃立和帝兄清河孝王子祐是為安帝章以衆心不附遂密謀閉宮門誅車騎將軍鄧騭兄弟及鄭衆蔡倫劫尚書廢太后於南宮封帝為遠國王而立平原王勝事覺勝策免章自殺家無餘財諸子易衣而出并日而食論曰孔子稱可與立未可與權權也者反常者也將從反常之事必資非常之會使夫舉無違妄志行名全周章身非負圖之託德乏萬夫之望主無絕天之舋地有既安之埶而創慮於難圖希功於理絕不已悖乎如令君器易以下議即斗筲必能叨天業狂夫豎臣亦自奮矣孟軻有言曰有伊尹之心則可無伊尹之心則篡矣於戲方來之人戒之哉贊曰朱定北州激成寵尤魴用降帑延感歸囚鄭竇怨偶代相為仇周章反道小智大謀, WYG: ''}
