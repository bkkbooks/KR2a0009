  - {type: variant, offset: 1686, length: 0, content: '', WYG: 左校令一人六百石本注曰掌左工徒丞一人安帝復也右校令一人六百石本注曰掌右工徒丞一人安帝復也右屬將作大匠前書曰屬官又有左右中候右庫東園王章左右前後中校士令丞成帝省城門校尉一人比二千石本注曰掌雒陽城門十二所周禮司門干寳注曰如今校尉司馬一人千石本注曰主兵城門每門候一人周禮每門下士二人干寳曰如今門候六百石蔡質漢儀曰門候見校尉執板不拜本注曰雒陽城十二門其正南一門曰平城門漢官秩曰平城門為宫門不置候置屯司馬秩二千石李尤銘曰平城司午厥位處中古今注曰建武十四年九月開平城門北宫門屬衞尉其餘上西門應劭漢官曰上西所以不純白者漢家初成故丹鏤}
