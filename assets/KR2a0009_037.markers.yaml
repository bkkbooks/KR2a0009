  - {type: variant, offset: 2224, length: 237, content: 曾子曰君子所貴乎道者三籩豆之事則有司存而光武明帝躬好吏事亦以課覈三公其人或失而其禮稍薄至有誅斥詰辱之累任職責過一至於此追感賈生之論不亦篤乎朱浮譏諷苛察欲速之弊然矣焉得長者之言哉馮魴字孝孫南陽湖陽人也其先魏之支別食菜馮城因以氏焉秦滅魏遷于湖陽為郡族姓王莽末四方潰畔魴乃聚賓客招豪桀作營以待所歸是時湖陽大姓虞都尉反城稱兵先與同縣申屠季有仇而殺其兄謀滅季族季亡歸魴魴將季欲還其營道逢都尉從弟長卿來欲執季魴叱長卿曰我與季雖無素故士窮相歸要當以死任之卿為何言遂與俱歸季謝曰蒙恩得全死無, WYG: ''}
