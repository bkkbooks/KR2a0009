  - {type: variant, offset: 252, length: 788, content: 於鄭也權時救急二者皆為國耳即疑浮相譖何不詣闕自陳而為族滅之計乎朝廷之於伯通恩亦厚矣委以大郡任以威武事有柱石之寄情同子孫之親匹夫媵母尚能致命一餐豈有身帶三綬職典大邦而不顧恩義生心外畔者乎伯通與吏人語何以為顏行步拜起何以為容坐臥念之何以為心引鏡窺影何施眉目舉措建功何以為人惜乎棄休令之嘉名造梟鴟之逆謀捐傳世之慶祚招破敗之重災高論堯舜之道不忍桀紂之性生為世笑死為愚鬼不亦哀乎伐以為功高天下往時遼東有豕生子白頭異而獻之行至河東見羣豕皆白懷慙而還若以子之功論於朝廷則為遼東豕也今乃愚妄自比六國六國之時其埶各盛廓土數千里勝兵將百萬故能據國相持多歷年世今天下幾里列郡幾城柰何以區區漁陽而結怨天子此猶河濱之人捧土以塞孟津多見其不知量也盛時內聽驕婦之失計外信讒邪之諛言長為羣后惡法永為功臣鑒戒豈不誤哉定海內者無私讎勿以前事自誤願留意顧老母幼弟凡舉事無為親厚者所痛而為見讎者所快時二郡畔戾北州憂恐浮以為天子必自將兵討之而但遣游擊將軍鄧隆陰助浮浮懷懼以為帝怠於敵不能救之乃上疏曰昔楚宋列國俱為諸侯莊王以宋執其使遂有投袂之師魏公子顧朋友之要觸冒強秦之鋒夫楚魏非有分職匡正之大義也莊王但為爭強而發忿公子以一言而立信耳今彭寵反畔張豐逆節以為陛下必棄捐它事以時滅之既歷時月寂寞無音從圍城而不救放逆虜而不討臣誠惑之昔高祖聖武天下既定猶身自征伐未嘗寧居陛下雖興大業海內未集而獨逸豫不顧北垂百姓遑遑無所繫心三河冀州曷足以傳後哉今秋稼已孰復為漁陽所掠張豐狂悖姦黨日增連年拒守吏士疲勞甲冑生蟣蝨弓弩不得薥上下燋心相望救護仰希陛下生活之恩詔報曰往年赤眉跋扈長安吾策其無穀必東果來歸降今度此反虜埶無久全其中必有內相斬者今軍資未充故須後麥耳浮城中糧盡人相食會上谷太守耿況遣騎來救浮浮乃得遁走南至良鄉其兵長反遮之浮恐不得脫乃下馬刺殺其妻僅以身免城降於寵尚書令侯霸奏浮敗亂幽州構成寵罪徒勞軍師不能死節罪當伏誅帝不忍以浮代賈復為, WYG: ''}
