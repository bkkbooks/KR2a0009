  - {type: variant, offset: 3005, length: 1141, content: 定弟石襲母公主封獲嘉侯亦為侍中稍遷衞尉能取悅當世為安帝所寵帝嘗幸其府留飲十許日賜駁犀具劒佩刀紫艾綬玉玦各一拜子世為黃門侍郎世弟二人皆郎中自永初兵荒王侯租秩多不充於是特詔以它縣租稅足石令如舊限歲入穀三萬斛錢四萬遷光祿勳遂代楊震為太尉及北鄉侯立遷太傅與太尉東萊劉喜參錄尚書事順帝既立石與喜皆以阿黨閻顯江京等策免復為衞尉卒子代嗣代卒弟承嗣為步兵校尉石弟珖和帝時詔封楊邑侯亦以石寵官至城門校尉卒子肅嗣為黃門侍郎虞延字子大陳留東昏人也延初生其上有物若一匹練遂上升天占者以為吉及長長八尺六寸要帶十圍力能扛鼎少為戶牖亭長時王莽貴人魏氏賓客放從延率吏卒突入其家捕之以此見怨故位不升性敦朴不拘小節又無鄉曲之譽王莽末天下大亂延常嬰甲冑擁衞親族扞禦鈔盜賴其全者甚衆延從女弟年在孩乳其母不能活之棄於溝中延聞其號聲哀而收之養至成人建武初仕執金吾府除細陽令每至歲時伏臘輒休遣徒繫各使歸家並感其恩德應期而還有囚於家被病自載詣獄既至而死延率掾吏史殯于門外百姓感悅之後去官還鄉里太守富宗聞延名召署功曹宗性奢靡車服器物多不中節延諫曰昔晏嬰輔齊鹿裘不完季文子相魯妾不衣帛以約失之者鮮矣宗不悅延即辭退居有頃宗果以侈從被誅臨當伏刑擥涕而歎曰恨不用功曹虞延之諫光武聞而奇之二十年東巡路過小黃高帝母昭靈后園陵在焉時延為部督郵詔呼引見問園陵之事延進止從容占拜可觀其陵樹株蘖皆諳其數俎豆犧牲頗曉其禮帝善之勑延從駕到魯還經封丘城門門下小不容羽蓋帝怒使撻侍御史延因下見引咎以為罪在督郵言辭激揚有感帝意乃制誥曰以陳留督郵虞延故貰御史罪延從送車駕西盡郡界賜錢及劒帶佩刀還郡於是聲名遂振二十三年司徒玉況辟焉時元正朝賀帝望而識延遣小黃門馳問之即日召拜公車令明年遷洛陽令是時陰氏有客馬成者常為姦盜延收考之陰氏屢請獲一書輒加篣二百信陽侯陰就乃訴帝譖延多所冤枉帝乃臨御道之館親錄囚徒延陳其獄狀可論者在東無理者居西成乃回欲趨東延前執之謂曰爾人之巨蠹久依城社不畏熏燒今考實未竟宜當盡法成大呼稱枉陛戟郎以戟刺延叱使置之帝知延不私謂成曰汝犯王法身自取之呵使速去後數日伏誅於是外戚斂手莫敢干法在縣三年遷南陽太守永平初有新野功曹鄧衍以外戚小侯每豫朝會而容姿趨步有出於衆顯宗目之顧左右曰朕之儀貌豈若此人特賜輿馬衣服延以衍雖有容儀而無實行未嘗加禮帝既異之乃詔衍令自稱南陽功曹詣闕既到拜郎中遷玄武司馬衍在職不服父喪帝聞之乃歎曰知人則哲惟帝難之信哉斯言衍慙而退由是以延為明三年徵代趙憙為太尉八年代范遷為司徒歷位二府十餘年無異政績會楚王英謀反陰氏欲中傷之使人私以楚謀告延延以英藩戚至親不然其言又欲辟幽州從事公孫弘以弘交通楚王而止並不奏聞及英事發覺詔書切讓延遂自殺家至清貧子孫不免寒餧延從曾孫放字子仲少為太尉楊震門徒及震被讒自殺順帝初放詣闕追訟震罪由是知名桓帝時為尚書以議誅, WYG: 謁}
