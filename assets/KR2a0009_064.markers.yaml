  - {type: variant, offset: 4716, length: 515, content: 律鈞兮意建始而思終惟盤逸之無斁兮懼樂往而哀來素撫弦而餘音兮大容吟曰念哉既防溢而靜志兮迨我暇以翺翔出紫宮之肅肅兮集大微之閬閬命王良掌策駟兮踰高閣之鏘鏘建罔車之幕幕兮獵青林之芒芒彎威弧之撥剌兮射嶓冢之封狼觀壁壘於北落兮伐河鼓之磅硠乘天潢之汎汎兮浮雲漢之湯湯倚招搖攝提以低回流兮察二紀五緯之綢繆遹皇偃蹇夭矯以連卷兮雜沓叢顇颯以方驤汨飂戾沛以罔象兮爛漫麗靡以迭逿凌驚雷之兮弄狂電之淫裔踰庬澒於宕冥兮貫倒景而高厲廓盪盪其無涯兮乃今窮乎天外眷而屢顧兮馬倚輈而俳回雖遨游以媮樂兮豈愁慕之可懷出閶闔兮降天塗乘飈忽兮馳虛無雲霏霏兮繞余輪風眇眇兮震余旟繽聯翩兮紛暗曖倏眩眃兮反常閭煥以粲爛兮美紛紜以從風御六蓺之珍駕兮遊道德之平林結典籍而為兮歐儒墨而為禽玩陰陽之變化兮詠雅頌之徽音嘉曾氏之歸耕兮慕歷陵之欽崟共夙昔而不貳兮居終始之所服也夕惕若厲以省諐兮懼余身之未勑也苟中情之端直兮莫吾知而不恧墨無為以凝志兮與仁義乎消搖不出戶而知天下兮何必歷遠以劬勞區超踰騰躍絕世俗飃神舉逞所欲天不可階仙夫希栢舟悄悄吝不飛松喬高跱孰能離結精遠遊使心攜回志朅來從玄諆獲我所求夫何思永和初出為河閒相時國王驕奢不遵典憲又多豪右共為不軌衡下車治威嚴整法度陰知姦黨名姓一時收禽上下肅, WYG: 是京師翕}
