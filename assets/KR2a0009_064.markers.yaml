  - {type: variant, offset: 2578, length: 0, content: '', WYG: 擢為黄門侍郎歴位卿校尉温恭謙讓亦敦詩書永初中為長樂少府松弟竦竦字叔敬少習孟氏易孟喜字長卿東海人見前書弱冠能敎授後坐兄松事與弟恭俱徙九真既徂南土歴江湖濟沅湘湖謂洞庭湖在今岳州水經云沅水出牂柯且蘭縣注云入洞庭㑹于江湘水出零陵始安縣陽海山至巴丘入于江感悼子胥屈原以非辜沈身乃作悼騷賦繫𤣥石而沈之東觀記載其文曰彼仲尼之佐魯兮先嚴斷而後𢎞衍雖離讒以嗚邑兮卒暴誅於兩觀殷伊尹之協徳兮暨太甲而俱寧豈齊量其㡬㣲兮徒信已以榮名雖吞刀以奉命兮抉目眦於門閭吳荒萌其已殖兮可信顔於王廬圖往鏡來兮關比在篇君名既泯没兮後辟亦然屈平濯徳兮絜顯芬香勾踐罪種兮越嗣不長重耳忽推兮六卿卒强趙隕鳴犢兮秦人入疆樂毅奔趙兮燕亦是喪武安賜命兮昭以不王䝉宗不幸兮長平顛荒范父乞身兮楚項不昌何爾生不先後兮惟洪勲以遐邁服荔裳如朱紱兮聘鸞路於犇瀨歴蒼梧之崇丘兮宗虞氏之俊又臨衆瀆之神林兮東勅職於蓬碣祖聖道而垂典兮襃忠孝以為珍既匡救而不得兮必殞命而後亾惟賈傅其違指兮何揚生之敗真彼皇麟之髙舉兮熈太}
  - {type: page-break, offset: 2578, content: '', id: KR2a0009_WYG_064-6b, image: WYG0252/WYG0252-0770b.png}
  - {type: page-break, offset: 2578, content: '', id: KR2a0009_WYG_064-7a, image: WYG0252/WYG0252-0770c.png}
  - {type: variant, offset: 2578, length: 0, content: '', krp: 擢為黄門侍郎歴位卿校尉温恭謙讓亦敦詩書永初中為長樂少府松弟竦竦字叔敬少習孟氏易孟喜字長卿東海人見前書弱冠能敎授後坐兄松事與弟恭俱徙九真既徂南土歴江湖濟沅湘湖謂洞庭湖在今岳州水經云沅水出牂柯且蘭縣注云入洞庭㑹于江湘水出零陵始安縣陽海山至巴丘入于江感悼子胥屈原以非辜沈身乃作悼騷賦繫𤣥石而沈之東觀記載其文曰彼仲尼之佐魯兮先嚴斷而後𢎞衍雖離讒以嗚邑兮卒暴誅於兩觀殷伊尹之協徳兮暨太甲而俱寧豈齊量其㡬㣲兮徒信已以榮名雖吞刀以奉命兮抉目眦於門閭吳荒萌其已殖兮可信顔於王廬圖往鏡來兮關比在篇君名既泯没兮後辟亦然屈平濯徳兮絜顯芬香勾踐罪種兮越嗣不長重耳忽推兮六卿卒强趙隕鳴犢兮秦人入疆樂毅奔趙兮燕亦是喪武安賜命兮昭以不王䝉宗不幸兮長平顛荒范父乞身兮楚項不昌何爾生不先後兮惟洪勲以遐邁服荔裳如朱紱兮聘鸞路於犇瀨歴蒼梧之崇丘兮宗虞氏之俊又臨衆瀆之神林兮東勅職於蓬碣祖聖道而垂典兮襃忠孝以為珍既匡救而不得兮必殞命而後亾惟賈傅其違指兮何揚生之敗真彼皇麟之髙舉兮熈太}
  - {type: variant, offset: 2579, length: 3, content: 河宋景, WYG: 之悠悠臨岷川以愴恨兮指丹海以為期顯宗後詔聽還本郡竦閉門自養以經籍為娱著書數篇名曰七序班固見而稱曰孔子著春秋而亂臣賊子懼左傳書齊豹曰盗三叛人名以懲不義善人勸焉淫人懼焉孟子云仲尼成春秋亂臣賊子懼梁竦作七序而竊位素餐者慙性好施不事産業長嫂舞隂公主贍給諸梁親疎有序特重敬竦雖衣食器物必有加異竦悉分與親族自無所服服猶用也竦生長京師不樂本土自負其才鬱鬱不得意嘗登髙逺望歎息言曰大丈夫居世生當封侯死當廟食禮記曰諸侯五廟卿大夫三廟士一廟如其不然閑居可以養志詩書足以自娱州郡之職徒勞人耳後辟命交至並無所就有三男三女肅宗納其二女皆為貴人小貴人生和帝竇皇后養以為子而竦家私相慶後諸竇聞之恐梁氏得志終為已害建初八年}
  - {type: page-break, offset: 2579, content: '', id: KR2a0009_WYG_064-7b, image: WYG0252/WYG0252-0770d.png}
