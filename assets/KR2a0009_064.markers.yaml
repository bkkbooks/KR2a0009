  - {type: punctuation, offset: 2222, content: 「, id: KR2a0009_ZHSJ_064-bkkpn546}
  - {type: variant, offset: 2223, length: 0, content: '', WYG: 竊見元哀二帝輕殊死之刑以一百二十三事手殺人者減死一等東觀記曰元帝初元五年輕殊死刑三十四事哀帝建平元年輕殊死刑八十一事其四十二事手殺人者減死一等自是以後著為常準故人輕犯法吏易殺人臣聞立君之道仁義為主仁者愛人義者政理愛人以除殘為務政理以去亂為心刑罰在衷無取於輕是以五帝有流殛放殺之誅唐虞時流共工放驩兠殺三苖殛鯀堯為五帝之一故舉言焉三王有大辟刻肌之法大辟罪之大者謂死刑也刻肌謂墨劓臏刖故孔子稱仁者必有勇論語載孔子之言也五帝三王皆以仁義而化而能用肉刑以正俗是為勇也又曰理財正辭禁民為非曰義易繫辭曰何以守位曰仁何以聚人曰財理財正辭禁人為非曰義繫辭亦孔子作故稱又曰髙帝受命誅暴平蕩天下約令定律誠得其宜高祖定天下使蕭何次律令文帝寛恵柔克遭世康平克能也言以和柔能理俗也尚書曰高明柔克也唯除省肉刑相坐之法他皆率由無革舊章秦法一人有罪坐其家室文帝除肉刑并相坐律令餘則仍舊不改武帝値中國隆盛財力有餘征伐逺方軍役數興豪傑犯禁姦吏弄法故重首匿之科著知從之律凡首匿者每為謀自藏匿罪人至宣帝時除子匿父母妻匿夫孫匿祖父母罪餘至殊死上請知從謂見知故縱武帝時立見知故縱之罪使張湯等著律並見前書以破朋黨以懲隱匿宣帝聰明正直總御海内臣下奉憲無所失墜因循先典天下稱理至哀平繼體而即位日淺聽斷尚寡丞相王嘉輕為穿鑿虧除先帝舊約成律王嘉字公仲平陵人案嘉傳及刑法志並無其事統與嘉時代相接所引固不妄矣但班固略而不載也數年之間百有餘事或不便於理或不厭民心謹表其尤害於體者傅奏於左體政體也傳音附伏惟陛下包元履德權時撥亂撥理也公羊傳曰撥亂代反之正功踰文武德侔髙皇誠不宜因循季末衰微之軌回神明察考量得失宣詔有司詳擇其善定不易之典施無窮之法天下幸甚事下三公廷尉議者以為隆刑峻法非明王急務施行日久豈一朝所釐釐猶改也統今所定不宜開可統復上言曰有司以臣今所言不可施行尋臣之所奏非曰嚴刑竊謂髙帝以後至乎孝宣其所施行多合經傳宜比方今事騐之往古聿遵前典事無難改不勝至願願得召見若對尚書近臣口陳其要帝令尚書問狀統對曰}
