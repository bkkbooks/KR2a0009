  - {type: variant, offset: 5404, length: 0, content: '', WYG: 識人有犯者罪至刑死嘗有西域賈胡不知禁忌誤殺一莬轉相告言坐死者十餘人冀二弟嘗私遣人出獵上黨冀聞而捕其賔客一時殺三十餘人無生還者冀又起别第於城西以納姦亾或取良人悉為奴婢至數千人名曰自賣人元嘉元年帝以冀有援立之功欲崇殊典乃大㑹公卿共議其禮於是有司奏冀入朝不趨劔履上殿謁讃不名禮儀比蕭何事見}
  - {type: page-break, offset: 5404, content: '', id: KR2a0009_WYG_064-18a, image: WYG0252/WYG0252-0776a.png}
  - {type: variant, offset: 5404, length: 0, content: '', krp: 識人有犯者罪至刑死嘗有西域賈胡不知禁忌誤殺一莬轉相告言坐死者十餘人冀二弟嘗私遣人出獵上黨冀聞而捕其賔客一時殺三十餘人無生還者冀又起别第於城西以納姦亾或取良人悉為奴婢至數千人名曰自賣人元嘉元年帝以冀有援立之功欲崇殊典乃大㑹公卿共議其禮於是有司奏冀入朝不趨劔履上殿謁讃不名禮儀比蕭何事見}
