  - {type: variant, offset: 2339, length: 236, content: 道術立名其所述著無讖一言劉向父子領校祕書閱定九流亦無讖錄成哀之後乃始聞之尚書堯使理洪水九載績用不成則殛死禹乃嗣興而春秋讖云共工理水凡讖皆云黃帝伐蚩尤而詩讖獨以為蚩尤敗然後堯受命春秋元命包中有公輸班與墨翟事見戰國非春秋時也又言別有益州益州之置在於漢世其名三輔諸陵世數可知至於圖中訖于成帝一卷之書互異數事聖人之言埶無若是殆必虛偽之徒以要世取資往者侍中賈逵摘讖互異三十餘事諸言讖者皆不能說至於王莽篡位漢世大禍八十篇何為不戒則知圖讖成於哀平之際也且河洛六蓺篇錄已定後人皮傅無所容篡, WYG: 㳟懐皇后從兄}
