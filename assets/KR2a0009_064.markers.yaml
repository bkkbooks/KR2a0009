  - {type: variant, offset: 5259, length: 0, content: '', WYG: 行六棊故云六博鮑宏博經曰用十二棊六棊白六棊黑所擲頭謂之瓊瓊有五采刻為一畫者謂之塞刻為兩畫者謂之白刻為三畫者謂之黑一邊不刻者五塞之間謂之五塞蹴鞠劉向别録曰蹴鞠者傳言黃帝所作或曰起戰國之時蹴鞠兵埶也所以講武知有材也意錢之戲何承天纂文曰詭億一曰射意一曰射數即攤錢也又好臂鷹走狗騁馬鬬雞初為黃門侍郎轉侍中虎賁中郎將越騎歩兵校尉執金吾永和元年拜河南尹冀居職暴恣多非法父商所親客洛陽令吕放頗與商言及冀之短商以讓冀冀即遣人於道刺殺放而恐商知之乃推疑於放之怨仇請以放弟禹為洛陽令安慰放家欲以滅口使捕之盡滅其宗親賔客百餘人商薨未及𦵏順帝乃拜冀為大將軍弟侍中不疑為河南尹及帝崩冲帝始在繦褓太后臨朝詔冀與太傅趙峻太尉李固參録尚書事冀雖辭不肯當而侈暴滋甚冲帝又崩冀立質帝帝少而聰慧知冀驕横嘗朝羣臣目冀曰此跋扈將軍也跋扈猶强梁也冀聞深惡之遂令左右進鴆加煑餅帝即日崩復立桓帝而枉害李固及前太尉杜喬海内嗟懼語在李固傳建和元年益封冀萬三千户増大將軍府舉髙第茂才官屬倍於三公漢官儀三公府有長史一人司徒府掾屬三十一人令史及御屬三十六人也又封不疑為潁陽侯不疑弟蒙西平侯冀子𦙍襄邑侯各萬户和平元年重増封冀萬户并前所襲合三萬户𢎞農人宰宣素性佞邪欲取媚於冀乃上言大將軍有}
