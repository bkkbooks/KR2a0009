  - {type: variant, offset: 5411, length: 2, content: 篡事, WYG: 謡人口雖輿粟盈門何救阻饑之戹阻難也書曰黎民阻饑也永言終制未解尸官之尤尸官猶尸禄終制謂薄葬也況乃傾側孽臣商遣冀不疑與曹節等為交友也𫝊寵凶嗣以至破家傷國}
