  - {type: variant, offset: 1315, length: 336, content: 之乎高睨而大談孔甲且不足慕焉稱殷彭及周聃與世殊技固孤是求子憂朱泙曼之無所用吾恨輪扁之無所教也子覩木雕獨飛臣攵心我垂翅故棲吾感去鼃附鴟悲爾先笑而後號也貫高以端辭顯義蘇武以禿節效貞蒱且以飛矰逞巧詹何以沈鉤致精弈秋以局取譽王豹以清謳流聲僕進不能參名於二立退又不能羣彼數子愍三墳之既穨惜八索之不理庶前訓之可鑽聊朝隱乎柱史且韞櫝以待價踵顏氏以行止曾不慊夫晉楚敢告誠於知己陽嘉元年復造候風地動儀以精銅鑄成員徑八尺合蓋隆起形似酒尊飾以篆文山龜鳥獸之形中有都柱傍行八道施關發機外有八龍首銜銅丸下有蟾蜍張口承之其牙機巧制皆隱在尊中覆蓋周密無際如有地動尊則振龍機發吐丸而蟾蜍銜之振聲激揚伺者因此覺知雖一龍發機而七首不動尋其方面乃知震之所在驗之以事合契若神自書典所記未之有也嘗一龍機發而地不覺動, WYG: 融等俱詣}
