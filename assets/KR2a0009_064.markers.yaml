  - {type: variant, offset: 5234, length: 3, content: 政理視, WYG: 良輔帝委重焉東觀漢記商少持韓詩兼讀衆書傳記天資聰敏昭逹萬情舉措動作直推雅性務在誠實不為華飾孝友著於閭閾明信結於友朋其在朝廷儼恪矜嚴威而不猛退食私館接賔待客寛和肅敬憂人之憂樂人之樂皆若在已輕財貨不為畜積故衣裘裁足卒嵗奴婢車馬共用而已朝廷由是敬憚委任焉每有飢饉輒載租榖於城門賑與貧餒不宣已恵檢御門族未嘗以權盛干法而性慎弱無威斷頗溺於内豎以小黄門曹節等用}
