  - {type: variant, offset: 5400, length: 1, content: 事, WYG: 人皆貪叨凶淫各遣私客籍屬縣富人被以它罪藉謂疏録之也閉獄掠拷使出錢自贖貲物少者至於死徙扶風人士孫奮居富而性吝冀因以馬乘遺之摯虞三輔决録注曰士孫奮字景卿少為郡五官掾起家得錢貲至一億七千萬富聞京師也從貸錢五千萬奮以三千萬與之冀大怒乃告郡縣認奮母為其守臧婢云盗白珠十斛紫金千斤以叛遂收考奮兄弟死於獄中悉没貲財億七千餘萬其四方調發嵗時貢獻皆先輸上第於冀上第第一也乘輿乃其次焉吏人齎貨求官請罪者道路相望冀}
  - {type: page-break, offset: 5400, content: '', id: KR2a0009_WYG_064-16b, image: WYG0252/WYG0252-0775b.png}
