  - {type: variant, offset: 5402, length: 0, content: '', WYG: 遣客出塞交通外國廣求異物因行道路發取妓女御者劉攽曰案古無妓字當作伎而使人復乘埶橫暴妻略婦女歐擊吏卒所在怨毒冀乃大起第舍而壽亦對街為宅殫極土木互相誇競堂寢皆有隂陽奥室奥深室也連房洞户洞通也謂相當也柱壁雕鏤加以銅漆窻牖皆有綺䟱青𤨏牖小窻也綺踈謂鏤為綺文青𤨏謂刻為𤨏文而以青飾之也圖以雲氣仙靈臺閣周通更相臨望飛梁石蹬陵跨水道架虚為橋若飛也金玉珠璣異方珍怪充積臧室逺致汗血名馬又廣開園囿採土築山十里九坂以象二崤二崤山在今洛州永寜縣西北深林絶澗有若自然奇禽馴獸飛走其間冀壽共乘輦車張羽盖飾以金銀游觀第内多從倡伎鳴鍾吹管酣謳竟路或連繼日夜以騁娱恣客到門不得通皆請謝門者門者累千金又多拓林苑禁同王家西至𢎞農東界滎陽南極魯陽北逹河淇包含山藪逺帶丘荒周旋封域殆將千里又起莬苑於河南城西經亘數十里發屬縣卒徒繕修樓觀數年乃成移檄所在調發生莬刻其毛}
  - {type: page-break, offset: 5402, content: '', id: KR2a0009_WYG_064-17a, image: WYG0252/WYG0252-0775c.png}
  - {type: page-break, offset: 5402, content: '', id: KR2a0009_WYG_064-17b, image: WYG0252/WYG0252-0775d.png}
