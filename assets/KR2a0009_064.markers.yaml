  - {type: variant, offset: 5257, length: 1, content: 卒, krp: 中常侍張逵蘧政内者令石光内者署名令一人秩六百石屬少府見漢官儀也尚方令傅福冗從僕射杜永連謀共譛商及中常侍曹騰孟賁云欲徵諸王子圖議廢立請收商等案罪帝曰大將軍父子我所親騰賁我所愛必無是但汝曹共妒之耳逵等知言不用懼廹遂出矯詔收縳騰賁於省中帝聞震怒敇宦者李歙急呼騰賁釋之收逵等悉伏誅辭所連染及在位大臣商懼多侵枉乃上疏曰春秋之義功在元帥罪止首惡春秋經書虞師晉師滅下陽公羊傳曰虞微國也曷為序于大國之上表虞首惡也曷為序虞首惡虞受賂假滅國者道以取亡焉故賞不僣溢刑不淫濫五帝三王所以同致康乂也左傳曰善為國者賞不僣而刑不濫賞僣則懼及淫人刑濫則懼及善人若不幸而過寧僣無濫竊聞考中常侍張逵等辭語多所牽及大獄一起無辜者衆死囚久繫纎微成大言久繫則細微之事引牽而成大也非所以順迎和氣平政成化也禮記月令孟春之月天子親帥三公九卿諸侯大夫以迎春於東郊命相布徳和令行慶施恵下及兆民也宜早訖竟以止逮捕之煩逮及也辭所連及即追捕之也帝乃納之罪止坐者六年秋商病篤勅子冀等曰吾以不德享受多福生無以輔益朝廷死必耗費帑藏衣衾飯唅玉匣珠貝之屬何益朽骨唅口實也白虎通曰大夫飯以玉唅以貝士飯以珠唅以貝也百僚勞擾紛華道路祗增塵垢雖云禮制亦有權時權時謂不依禮也方今邊境不寧盗賊未息豈宜重為國損氣絶之後載至冢舍即時殯歛歛以時服皆以故衣無更裁制殯已開冢冢開即𦵏祭食如存無用三牲孝子善述父志不宜違我言也禮記曰孝子善述父之志善成人之事及薨帝親臨喪諸子欲從其誨朝廷不聽賜以東園朱壽之器劉攽曰案文衍一之字銀鏤黃腸玉匣什物二十八種夀器棺也以朱飾之以銀鏤之前書音義曰以栢木黃心為槨曰黃腸也錢二百萬布三千匹皇后錢五百萬布萬匹及𦵏贈輕車介士輕車兵車也介士甲士也賜諡忠侯中宫親送帝幸宣陽亭每城門皆有亭即宣陽門之亭也瞻望車騎東觀記云初帝作誄曰孰云忠侯不聞其音背去國家都茲𤣥隂幽居㝠㝠靡所宜窮也子冀嗣冀字伯車為人鳶肩豺目鳶鴟也鴟肩上竦也豺目目竪也洞精矘眄洞通也矘音它蕩反説文目精直視口吟舌言謂語吃不能明了裁能書計少為貴戚逸游自恣性嗜酒能挽滿彈棊挽滿猶引强也蓺經曰彈棊兩人對局白黑棊各六枚先列棊相當更先彈也其局以石為之格五前書吾丘壽王善格五音義云簺也音蘓代反說文曰簺行棊相塞謂之簺鮑宏簺經曰簺有四采塞白乘五是也至五即格不得行故謂之格五六博楚詞曰琨蔽象棊有六博王逸注云投六}
