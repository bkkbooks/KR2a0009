  - {type: variant, offset: 5408, length: 1, content: 但, WYG: 也悉以定陶陽成餘戸增封為四縣比鄧禹冀初封襄邑襲封乗氏更以定陶陽成足四縣賞賜金錢奴婢綵帛車馬衣服甲第比霍光以殊元勲每朝㑹與三公絶席絶席别也十日一入平尚書事謂平議也宣布天下為萬世法冀猶以所奏禮薄意不悅専擅威柄凶恣日積機事大小莫不諮決之宫衛近侍並所親樹樹置也禁省起居纎㣲必知百官遷召皆先到冀門牋檄謝恩然後敢詣尚書下邳人吳樹為宛令之官辭冀冀賔客布在縣界以情託樹樹對曰小人姦蠧比屋可誅眀將軍以椒房之重處上將之位宜崇賢善以補朝闕宛為大都士之淵藪自侍坐以來未聞稱一長者而多託非人誠非敢聞冀嘿然不恱樹到縣遂誅殺冀客為人害者數十人由是深怨之樹後為荆州刺史臨去辭冀冀為設酒因鴆之樹出死車上又遼東太守矦猛初拜不謁冀託以他事乃腰斬之時郎中汝南袁著年十九見冀凶縱不勝其憤乃詣闕上書曰臣聞仲尼歎鳯鳥不至河不出圗自傷卑賤不能致也今陛下居得致之位又有能致之資此董仲舒對策之詞著引而畧之也而和氣未}
