  - {type: variant, offset: 1784, length: 211, content: 獲福祉神祇受譽黎庶而陰陽未和灾眚屢見神明幽遠冥鑒在茲福仁禍淫景響而應因德降休乘失致咎天道雖遠吉凶可見近世鄭蔡江樊周廣王聖皆為效矣故恭儉畏忌必蒙祉祚奢淫諂慢鮮不夷戮前事不忘後事之師也夫情勝其性流遯忘反豈唯不肖中才皆然苟非大賢不能見得思義故積惡成釁罪不可解也向使能瞻前顧後援鏡自戒則何陷於凶患乎貴寵之臣衆所屬仰其有愆尤上下知之襃美譏惡有心皆同故怨讟溢乎四海神明降其禍辟也頃年雨常不足思求所失則洪範所謂僭恆陽若者也懼羣臣奢侈昏踰, WYG: 重刑罰以遵舊}
