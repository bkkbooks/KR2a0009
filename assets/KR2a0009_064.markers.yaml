  - {type: variant, offset: 2586, length: 4, content: 推言水灾, WYG: 漢興以來母氏莫不隆顯臣愚以為宜上尊號追慰聖靈存録諸舅以明親親帝悲泣曰非君孰為朕思之㑹貴人姊南陽樊調妻嫕嫕音於計反上書自訟曰妾同産女弟貴人前充後宫蒙先帝厚恩得見寵幸皇天授命誕生聖明}
