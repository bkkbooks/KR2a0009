  - {type: variant, offset: 2225, length: 0, content: '', WYG: 帝明王制立刑罰故雖堯舜之盛猶誅四凶經曰天討有罪五刑五庸哉尚書咎繇謨之詞也庸用也言天以五刑討有罪用五刑必當也又曰爰制百姓于刑之衷尚書吕刑云士制百姓於刑之中孔安國注云咎繇作士制百官于刑之中此作爰爰於也義亦通衷音貞仲反下同也孔子曰刑罰不衷則}
