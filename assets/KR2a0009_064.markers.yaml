  - {type: variant, offset: 5260, length: 5, content: 官訓詁崔瑗, WYG: 公之功今既封諸子則其妻宜為邑君詔遂封冀妻孫壽為襄城君兼食陽翟租嵗入五千萬加賜赤紱比長公主長公主儀服同藩王解見皇后紀壽色美而善為妖態作愁眉嗁䊋墯馬髻折腰歩齲齒笑風俗通曰愁眉者細而曲折嗁䊋者薄拭目下若啼處墯馬髻者側在一邊折腰歩者足不任體齲齒笑者若齒痛不忻忻始自冀家所為京師翕然皆放效之齲音丘禹反}
