  - {type: variant, offset: 2725, length: 1799, content: 帝引在帷幄諷議左右嘗問衡天下所疾惡者宦官懼其毀己皆共目之衡乃詭對而出閹豎恐終為其患遂共讒之衡常思圖身之事以為吉凶倚伏幽微難明乃作思玄賦以宣寄情志其辭曰膺以永靚兮綿日月而不衰伊中情之信脩兮慕古人之貞節竦余身而順止兮遵繩墨而不跌志團團以應懸兮誠心固其如結旌性行以制佩兮佩夜光與瓊枝幽蘭之秋華兮又綴之以江蘺美襞積以酷裂兮允塵邈而難虧既姱麗而鮮雙兮非是時之攸珍奮余榮而莫見兮播余香而莫聞幽獨守此仄陋兮敢怠皇而舍勤幸二八之遻虞兮喜傅說之生殷尚前良之遺風兮恫後辰而無及何孤行之兮孑不羣而介立感鸞鷖之特棲兮悲淑人之稀合之多僻兮畏立辟以危身曾煩毒以迷或兮羌孰可與言己私湛憂而深懷兮思繽紛而不理願竭力以守義兮雖貧窮而不改執雕虎而試象兮阽焦原而跟止庶斯奉以周旋兮要既死而後已俗遷渝而事化兮泯規矩之圜方珍蕭艾於重笥兮謂蕙芷之不香斥西施而弗御兮羈要褭以服箱行陂僻而獲志兮循法度而離殃惟天地之無窮兮何遭遇之無常不抑操而苟容兮譬臨河而無航欲巧笑以干媚兮非余心之所嘗襲溫恭之黻衣兮披禮義之繡裳辮貞亮以為鞶兮雜技蓺以為珩昭綵藻與雕琢兮璜聲遠而彌長淹棲以恣欲兮燿靈忽其西藏恃己知而華予兮鶗鳴而不芳冀一年之三秀兮遒白露之為霜時亹亹而代序兮疇可與乎比伉咨妒嫮之難並兮想依韓以流亡恐漸冉而無成兮留則蔽而不章山以周流兮翼迅風以揚聲二女感於崇岳兮或冰折而不營天蓋高而為澤兮誰云路之不平勔自強而不息兮蹈玉階之嶢崢懼筮氏之長短兮鑽東以觀禎遇九皐之介鳥兮怨素意之不逞遊塵外而瞥天兮據冥翳而哀鳴鵰鶚競於貪婪兮我脩絜以益榮子有故於玄鳥兮歸母氏而後寧泉之瀝液兮咀石菌之流英翾鳥舉而魚躍兮將往走乎八荒過少皞之窮野兮問三丘乎句芒何道真之淳粹兮去穢累而票輕登蓬萊而容與兮鼇雖抃而不傾留瀛洲而採芝兮聊且以乎長生憑歸雲而遐逝兮夕余宿乎扶桑噏青岑之玉醴兮餐沆瀣以為糧發昔夢於木禾兮穀崐崘之高岡朝吾行於湯谷兮從伯禹於稽山集羣神之執玉兮疾防風之食言覜夫衡阿兮睹有黎之圮墳痛火正之無懷兮託山陂以孤魂愁蔚蔚以慕遠兮越卬州而愉敖躋日中于昆吾兮憩炎天之所陶揚芒熛而絳天兮水泫沄而涌濤溫風翕其增熱兮惄鬱邑其難聊顝羈旅而無友兮余安能乎留茲木於廣都兮拓若華而躊躇超軒轅於西海兮跨汪氏之龍魚聞此國之千歲兮曾焉足以娛余門而東馳兮云台行乎中野亂弱水之潺湲兮逗華陰之湍渚號馮夷俾清津兮櫂龍舟以濟予會帝軒之未歸兮悵相佯而延佇呬河林之蓁蓁兮偉關睢之戒女黃靈詹而訪命兮摎天道其焉如曰近信而遠疑兮六籍闕而不書神逵昧其難覆兮疇克謨而從諸牛哀病而成虎兮雖逢昆其必噬鼈令殪而尸亡兮取蜀禪而引世死生錯而不齊兮雖司命其不晰竇號行於代路兮後膺祚而繁廡王肆侈於漢庭兮卒銜恤而絕緒尉尨眉而郎潛兮逮三葉而遘武董弱冠而司袞兮設王隧而弗處夫吉凶之相仍兮恆反側而靡所穆負天以悅牛兮豎亂叔而幽主文斷袪而忌伯兮閹謁賊而寧后通人闇於好惡兮豈愛惑之能剖嬴擿讖而戒胡兮備諸外而發內或輦賄而違車兮孕行產而為對慎竈顯於言天兮占水火而妄誶梁叟患夫黎丘兮丁厥子而事刃親所睇而弗識兮矧幽冥之可信毋綿攣以涬己兮思百憂以自疢彼天監之孔明兮用棐忱而佑仁湯蠲體以禱祈兮蒙厖禠以拯人景三慮以營國兮熒惑次於它辰魏顆亮以從理兮鬼亢回以敝秦咎繇邁而種德兮德樹茂乎英六桑末寄夫根生兮卉既彫而已毓有無言而不讎兮又何往而不復盍遠迹以飛聲兮孰謂時之可蓄冰之磑磑兮清泉沍而不流寒風淒而永至兮拂穹岫之騷騷玄武縮於殼中兮螣蛇蜿而自糾魚矜鱗而幷凌兮鳥登木而失條坐太陰之屏室兮慨含欷而增愁怨高陽之相寓兮顓頊之宅幽庸織絡於四裔兮斯與彼其何瘳望寒門之絕垠兮縱余緤乎不周迅飈潚其媵我兮騖翩飃而不禁趨谽之洞穴兮摽通淵之碄碄經重陰乎寂寞兮愍墳羊之潛深龍令執炬兮過鍾山而中休瞰瑤谿之赤岸兮弔祖江之見劉聘王母於銀臺兮羞玉芝以療飢戴勝憖其既歡兮又誚余之行載太華之玉女兮召洛浦之宓妃咸姣麗以蠱媚兮增嫮眼而蛾眉舒妙婧之纖兮揚雜錯之袿徽離朱脣而微笑兮顏的以遺光獻環琨與璵縭兮申厥好以玄黃雖色豔而賂美兮志浩盪而不嘉雙材悲於不納兮並詠詩而清歌歌曰天地烟熅百卉含蘤鳴鶴交頸雎鳩相和處子懷春精魂回移如何淑明忘我實多將荅賦而不暇兮爰整駕而亟行瞻崐崘之巍巍兮臨縈河之洋洋伏靈以負坻兮亘螭龍之飛梁登閬風之曾城兮搆不死而為牀屑瑤繠以為糇兮白水以為漿抨巫咸以占夢兮迺貞吉之元符滋令德於正中兮合含嘉秀禾以為敷既垂穎而顧本兮爾要思乎故居安和靜而隨時兮姑純懿之所廬以交集兮涷雨沛其灑塗轙琱輿而樹葩兮擾應龍以服輅百神森其備從兮, WYG: ''}
