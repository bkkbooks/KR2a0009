  - {type: variant, offset: 318, length: 996, content: 不徙自去史職五載復還乃設客問作應閒以見其志云則夕行之立功立事式昭德音是故伊尹思使君為堯舜而民處唐虞彼豈虛言而已哉必旌厥素爾咎單巫咸寔守王家申伯樊仲實幹周邦服袞而朝介圭作瑞厥跡不朽垂烈後昆不亦丕歟且學非以要利而富貴萃之貴以行令富以施惠惠施令行故易稱以大業質以文美實由華興器賴彫飾為好人以輿服為榮吾子性德體道篤信安仁約己博蓺無堅不鑽以思世路斯何遠矣曩滯日官今又原之雖老氏曲全進道若退然行亦以需必也學非所用術有所仰故臨川將濟而舟檝不存焉徒經思天衢內昭獨智固合理民之式也故嘗見謗于鄙儒深厲淺揭隨時為義曾何貪於支離而習其孤技邪參輪可使自轉木雕猶能獨飛已垂翅而還故棲盍亦調其機而銛諸昔有文王自求多福人生在勤不索何獲曷若卑體屈己美言以相剋鳴于喬木乃金聲而玉振之用後勳雪前吝婞佷不柔以意誰靳也夥而恥智之不博是故蓺可學而行可力也天爵高懸得之在命或不速而自懷或羨旃而不臻求之無益故智者面而不思阽身以徼幸固貪夫之所為未得而豫喪也枉尺直尋議者譏之盈欲虧志孰云非羞於心有猜則簋𧹞饌餔猶不屑餐旌瞀以之意之無疑則兼金盈百而不嫌辭孟軻以之士或解裋褐而襲黼黻或委臿築而據文軒者度德拜爵量績受祿也輸力致庸受必有階之察三辰於上跡禍福乎下經緯歷數然後天步有常則風后之為也當少昊清陽之末實或亂德人神雜擾不可方物重黎又相顓頊而申理之日月即次則重黎之為也人各有能因蓺授任鳥師別名四叔三正官無二業事不並濟晝長則宵短日南則景北天且不堪兼況以人該之夫玄龍迎夏則陵雲而奮鱗樂時也涉冬則淈泥而潛蟠避害也公旦道行故制典禮以尹天下懼教誨之不從有人之不理仲尼不遇故論六經以俟來辟恥一物之不知有事之無範所考不齊如何可一係箭而聊城薥柝從往則合橫來則離安危無常要在說夫咸以得人為梟失士為尤故樊噲披帷入見高祖高祖踞洗以對酈生當此之會乃黿鳴而鼈應也故能同心戮力勤恤人隱奄受區夏遂定帝位皆謀臣之由也故一介之策各有攸建子長諜之爛然有第夫女魃北而應龍翔洪鼎聲而軍容息溽暑至而鶉火棲寒冰沍而黿鼉蟄今也皇澤宣洽海外混同萬方億醜并質共劑若修成之不暇尚何功之可立立事有三言為下列下列且不可庶矣奚冀其二哉俗異事埶舛殊不能通其變而一度以揆之斯契船而求劒守株而伺兔也冒愧逞願必無仁以繼之有道者所不履也越王句踐事此故厥緒不永捷徑邪至我不忍以投步干進苟容我不忍以歙肩雖有犀舟勁檝猶人涉卬否有須者也姑亦奉順敦篤守以忠信得之不休不獲不吝不見是而不惛居下位而不憂允上德之常服焉方將師天老而友地典, WYG: 統}
