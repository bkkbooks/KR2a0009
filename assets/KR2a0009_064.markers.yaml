  - {type: variant, offset: 2591, length: 3, content: 偽稱洞, WYG: 爲竇憲兄弟所見譛訴使妾父竦寃死牢獄骸骨不掩老母孤弟逺徙萬里獨妾遺脫逸伏草野常恐没命無由自逹今遭值陛下神聖之運親統萬㡬羣物得所憲兄弟姦惡既伏辜誅海内曠然各獲其宜妾得蘇息拭目更}
  - {type: variant, offset: 2591, length: 3, content: 偽稱洞, krp: 爲竇憲兄弟所見譛訴使妾父竦寃死牢獄骸骨不掩老母孤弟逺徙萬里獨妾遺脫逸伏草野常恐没命無由自逹今遭值陛下神聖之運親統萬㡬羣物得所憲兄弟姦惡既伏辜誅海内曠然各獲其宜妾得蘇息拭目更}
  - {type: variant, offset: 2595, length: 5, content: 玉版或者至, WYG: 乃敢昧死自陳所天臣以君為天故云所天妾聞太宗即位薄氏蒙榮文帝即位尊薄太后為皇太后封弟昭為軹侯太后母前死櫟陽廼追尊太后父為靈文侯㑹稽郡置園邑三百家櫟陽亦置靈文夫人園令如靈文侯園儀也宣帝繼統史族復興史良娣宣帝祖母也宣帝初生母王夫人死無所歸史良娣母貞君養視焉宣帝即位以舊恩封史恭三子髙為樂陵侯㑹為將陵侯𤣥為平臺侯妾門雖有薄史之親獨無外戚餘恩誠自悼傷妾父既寃不可復生母氏年殊七十殊猶過也及弟裳等逺在絶域不知死生願乞收竦朽骨使母弟得歸本郡則施過天地存殁幸賴帝覽章感悟乃下中常侍掖庭令騐問之嫕辭證明審遂得引見具陳其狀乃留嫕止宫中連月乃出賞賜衣被錢帛第宅奴婢旬月之間累資十萬嫕素有行操帝益愛之加號梁夫人擢樊調為羽林左監調光禄大夫宏兄之曾孫也宏光武舅也}
