  - {type: variant, offset: 2583, length: 0, content: '', WYG: 譛殺二貴人而陷竦等}
  - {type: variant, offset: 2583, length: 0, content: '', krp: 譛殺二貴人而陷竦等}
  - {type: variant, offset: 2584, length: 1, content: 歷, WYG: 惡逆詔使漢陽太守鄭據傳考竦罪死獄中家屬復徙九真辭語連及舞隂公主坐徙新城使者護守新城今洛州伊闕縣也宫省事密莫有知和帝梁氏生者永元九年竇太后崩松子扈遣從兄䄠䄠古禪字也奏記三府以為漢家舊典崇貴母氏而梁貴人親育聖躬不䝉尊號求得申議求申理而議之也太尉張酺引䄠訊問事理㑹後召見因白䄠奏記之狀帝感慟良久曰於君意若何酺對曰春秋之義母以子貴解見光武}
  - {type: page-break, offset: 2584, content: '', id: KR2a0009_WYG_064-8a, image: WYG0252/WYG0252-0771a.png}
