  - {type: variant, offset: 5410, length: 0, content: '', WYG: 賢愚失序者埶分權臣上下壅隔之故也夫四時之運功成則退易繫辭曰寒往則暑來暑往則寒來寒暑相推而嵗成焉老子曰功成名遂身退天之道也髙爵厚寵鮮不致灾今大將軍位極功成可為至戒宜遵懸車之禮髙枕頥神薛廣徳為御史大夫乞骸骨賜安車駟馬懸其安車傳子孫欲令冀遵致仕之禮也傳曰木實繁者披枝害心若不抑損權盛將無以全其身矣左右聞臣言將側目切齒臣特以童䝉見拔故敢忘忌諱昔舜禹相戒無若丹朱尚書禹謂帝舜曰無若丹朱傲惟慢遊是好周公戒成王無如殷王紂尚書周公戒成王曰無若殷王受之迷亂酣于酒徳哉願除誹謗之罪以開天下之口書得奏御冀聞而密遣掩捕著著乃變易姓名後託病偽死結蒲為人市棺殯送冀廉問知其詐廉察也隂求得笞殺之隱蔽其事學生桂陽劉常當世名儒素善於著冀召補令史以辱之時太原郝絜胡武皆危言髙論危亦髙謂峻也與著友善先是絜等連名奏記三府薦海内髙士而不詣冀冀追怒之又疑為著黨勅中都官移檄捕前奏記者並殺之遂誅武家死者六十餘人絜初逃亡知不得免因輿櫬奏書冀門書入仰藥而死家乃得全及冀誅有詔以禮祀著等冀諸忍忌皆此類也不疑好經書善待士冀隂疾之因中常侍白帝轉為光禄勲又諷衆人共薦其子允為河南尹允一名胡狗時年十六容貌甚陋不勝冠帶道路見者莫不嗤笑焉不疑自恥兄弟有隙遂讓位歸第與弟䝉閉門自守冀不欲令與賔客交通隂使人變服至門記往來者南郡太守馬融江夏太守田明初除過謁不疑冀諷州郡以它事陷之皆髠笞徙朔方融自刺不殊明遂死於路永興二年封不疑子馬為潁隂矦允子桃為城父矦冀一門前後七封矦三皇后六貴人二大將軍夫人女食邑稱君者七人尚公主三人其餘卿將尹校五十七人在位二十餘年窮極滿盛威行内外百僚側目莫敢違命天子㳟已而不得有所親豫帝既不平之延熹二年太史令陳授因小黃門徐璜陳灾異日食之變咎在大將軍冀聞之諷洛陽令收考授死於獄帝由此發怒初掖庭人鄧香妻宣生女猛香盖掖庭署人之名香卒宣更適梁紀梁紀者冀妻壽之舅也壽引進猛入掖庭見幸為貴人冀因欲認猛為其女以自固乃易猛姓為梁時猛姊婿邴尊為議郎冀恐尊沮敗宣意沮壊也恐尊壊敗宣意不從其改梁姓也乃結刺客於偃城刺殺尊而又欲殺宣宣家在延熹里與中常侍袁赦相比相鄰比也冀使刺客登赦屋欲入宣家赦覺之鳴鼓會衆以告宣宣馳入以白帝帝大怒遂與中常侍單超具瑗唐衡左悺徐璜等五人成謀誅冀語在宦者傳冀心疑超等乃使中黃門張惲入省宿以防其變具瑗勅吏收惲以輙從外入欲圗不軌帝因是御前殿召諸尚書入發其事使尚書令尹勲持節勒丞郎以下皆操兵守省閤歛諸符節送省中使黃門令具瑗將左右廐騶騶騎士也虎賁羽林都􅇋劔㦸士續漢志曰左右都􅇋各一人秩六百石主劔㦸士徼循宫中及天子有所收考也合千餘人與司𨽻校尉張彪共圍冀第使光禄勲袁盱音吁持節收冀大將軍印綬徙封比景都鄉矦冀及妻壽即日皆自殺悉收子河南尹允叔父屯騎校尉讓及親從衛尉淑越騎校尉忠長水校尉㦸等諸梁及孫氏中外宗親送詔獄無長少皆棄市不疑䝉先卒其它所連及公卿列校刺史二千石死者數十人故吏賔客免黜者三百餘人朝廷為空唯尹勲袁盱及廷尉邯鄲義在焉是時事卒從中發卒音七訥反使者交馳公卿失其度官府市里鼎沸數日乃定百姓莫不稱慶收冀財貨縣官斥賣合三十餘萬萬以充王府用減天下稅租之半散其苑囿以業窮民録誅冀功者封尚書令尹勲以下數十人論曰順帝之世梁商稱為賢輔豈以其地居亢滿而能以愿謹自終者乎亢上極之名也愿慤也夫宰相運動樞極感㑹天人樞謂斗樞也極北極也中於道則易以興政乖於務則難乎御物商協回天之埶屬彫弱之期而匡朝䘏患未聞上術憔悴之音}
