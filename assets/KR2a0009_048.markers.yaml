  - {type: variant, offset: 526, length: 246, content: 為吏見忌於上所在多被劾自去臨淮屏居野澤布衣蔬食不與邑里通鄉黨譏其介建初中南陽大飢米石千餘暉盡散其家資以分宗里故舊之貧羸者鄉族皆歸焉初暉同縣張堪素有名稱嘗於太學見暉甚重之接以友道乃把暉臂曰欲以妻子託朱生暉以堪先達舉手未敢對自後不復相見堪卒暉聞其妻子貧困乃自往候視厚賑贍之暉少子頡怪而問曰大人不與堪為友平生未曾相聞子孫竊怪之暉曰堪嘗有知己之言吾以信於心也暉又與同郡陳揖交善揖早卒有遺腹子友暉常哀之及司徒桓虞為南陽太守召暉子駢為吏暉辭駢而薦友虞嘆息遂召之其義烈若此元和中肅宗巡狩告南陽太守問暉起居召, WYG: 是}
