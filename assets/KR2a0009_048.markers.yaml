  - {type: variant, offset: 41, length: 0, content: '', WYG: 又率陳俊及前將軍王梁擊破五校賊於臨平追至東郡箕山大破之北擊清河長直及平原五里賊皆平之東觀記及續漢書長直並作長垣按長垣縣名在河南不得言北擊而范書作長直當是賊號或因地以為名時鬲縣五姓共逐守長據城而反鬲縣名屬平原郡故城在今徳州西北五姓盖當土彊宗豪右也鬲音革諸將争欲攻之漢不聽曰使鬲反者皆守長罪也敢輕冐進兵者斬乃移檄告郡使收守長而使人謝城中五姓大喜即相率歸降諸將乃服曰不戰而下城非衆所及也冬漢率建威大將軍耿弇漢中將軍王常等劉攽曰中當作忠擊富平獲索二賊扵平原眀年春賊率五萬餘人夜攻漢營軍中驚亂漢堅卧不動有頃乃定即夜發精兵出營突擊大破其衆因追討餘黨遂至無鹽無鹽縣名屬東平國故城在今鄆州東進擊渤海皆平之又従征董憲圍朐城眀年春拔朐朐縣名解見光武紀斬憲事已見劉永傳東方悉定振旅還京師㑹隗囂畔夏復遣漢西屯長安八年從車駕上隴遂圍隗囂扵西城帝勅漢曰諸郡甲卒俱坐費糧食若有逃亡則沮敗衆心宜悉罷之漢等貪并力攻囂遂不能遣糧食日少吏士疲役逃亡者多及公孫述救至漢遂退敗十一年春率征南大將軍岑彭等伐公孫述及彭破荆門長驅入江關漢留夷陵装露橈船橈短檝也音人遥反將南陽兵及弛刑募士三萬人泝江而上㑹岑彭為刺客所殺漢并將其軍十二年春與公孫述將魏黨公孫永戰於魚涪津大破之續漢書曰犍為郡南安縣有漁涪津在縣北臨大江南中志曰漁涪津廣數百歩遂圍武陽述遣子壻史興將五千人救之漢迎擊興盡殄其衆因入犍為界諸縣皆城守漢乃進軍攻廣都拔之遣輕騎燒成都市橋橋名也解見公孫述傳武陽以東諸小城皆降帝戒漢曰成都十餘萬衆不可輕也但堅據廣都待其来攻勿與争鋒若不敢来公轉營廹之須其力疲乃可擊也漢乘利遂自將歩騎二萬餘人進逼成都去城十餘里阻江北為營作浮橋使副將武威將軍劉尚東觀記續漢書尚字並作禹將萬餘人屯於江南相去二十餘里帝聞大驚讓漢曰比勑公千條萬端何意臨事勃亂既輕敵深入又與尚别營事有緩急不復相及賊若出兵綴公以大衆攻尚尚破公即敗矣幸無它者急引兵還廣都詔書未到述果使其將謝豐袁吉將衆十許萬分為二十餘營幷出攻漢使别將萬餘人刼劉尚令不得相救漢與大戰一日兵敗走入壁豐因圍之漢乃召諸將厲之曰吾共諸君踰越險阻轉戰千里所在斬獲遂深入敵地至其城下而今與劉尚二處受圍埶既不接其禍難量欲潜師就尚扵江南幷兵禦之若能同心一力人自為戰大功可立如其不然敗必無餘成敗之機在此一舉諸將皆曰諾扵是饗士秣馬閉營三日不出乃多樹幡旗使煙火不絶夜銜枚引兵與劉尚合軍豐等不覺眀日乃分兵拒江北自將攻江南漢悉兵迎戰自旦至晡遂大破之斬謝豐袁吉獲甲首五千餘級扵是引還廣都留劉尚拒述具以状上而深自譴責帝報曰公還廣都甚得其宜述必不敢略尚而擊公也略猶過也若先攻尚公従廣都五十里悉歩騎赴之適當值其危困破之必矣自是漢與述戰扵廣都成都之間八戰八剋遂軍扵其郭中述自將數萬人出城大戰漢使護軍髙午唐邯將數萬鋭卒擊之述兵敗走髙午奔陳刺述殺之事已見述傳旦日城降斬述首傳送洛陽眀年正月漢振旅浮江而下至宛詔令過家上冡賜穀二萬斛十五年復率揚武將軍馬成捕虜將軍馬武北擊匈奴徙鴈門代郡上谷吏人六萬餘口置居庸常闗以東劉攽曰按文當有一山字十八年蜀郡守將史歆反於成都自稱大司馬攻太守張穆穆踰城走廣都歆遂移檄郡縣而宕渠楊偉朐䏰徐容等宕渠朐䏰二縣名皆屬巴郡朐音劬䏰音忍宕渠山名因以名縣故城在今渠州流江縣東北俗名車騎城是也}
