  - {type: variant, offset: 43, length: 0, content: '', WYG: 州志朐音春䏰音閏其地下溼多朐䏰蟲因以名縣故城在今􅇪州雲安縣西萬户故城是也起兵各數千人以應之帝以歆昔為岑彭護軍曉習兵事故遣漢率劉尚及太中大夫臧宮將萬餘人討之漢入武都乃發廣漢巴蜀三郡兵圍成都百餘日城破誅歆等漢乃乗桴㳂江下巴郡楊偉徐容等惶恐解散漢誅其渠帥二百餘人徙其黨與數百家於南郡長沙而還漢性彊力每従征伐帝未安恒側足而立諸將見戰陳不利或多惶懼失其常度漢意氣自若方整厲器械激揚士吏帝時遣人觀大司馬何為還言方脩戰攻之具乃嘆曰呉公差彊人意隠若一敵國矣隠威重之貎言其威重若敵國前書周亞夫謂劇孟曰大將得之若一敵國矣每當出師朝受詔夕即引道初無辦嚴之日嚴即装也避眀帝諱故改之故能常任職以功名終及在朝廷斤斤謹質形扵體貎爾雅曰眀明斤斤察也李巡曰斤斤精詳之察也孫炎曰重慎之察也斤音靳漢嘗出征妻子在後買田業漢還讓之曰軍師在外吏士不足何多買田宅乎遂盡以分與昆弟外家東觀記曰漢但修里宅不起第夫人先死薄葬小墳不作祠堂也二十年漢病篤車駕親臨問所欲言對曰臣愚無所知識唯願陛下慎無赦而已及薨有詔悼愍賜謚曰忠侯東觀記曰有司奏議以武為謚詔特賜謚曰忠侯發北軍五校輕車介士送葬如大將軍霍光故事漢置南北軍五校尉解見順帝紀輕車兵車也介士甲士也霍光傳云以北軍五校尉輕車介士載光尸以轀輬車黄屋左纛軍陳至茂陵不以南軍者重之也子哀侯成嗣為奴所殺二十八年分漢封為三國成子旦為灈陽侯灈陽縣名屬汝南郡在灈水之陽因以為名其地今豫州呉房縣也音劬以奉漢嗣旦弟盱盱音火俱反為筑陽侯成弟國為新蔡侯筑陽縣名屬南陽郡古穀國也在筑水之陽故城在今襄州穀城縣西新蔡縣名屬汝南郡蔡平侯自蔡徙此故加新字今豫州縣也筑音逐旦卒無子國除建初八年徙封盱為平春侯平春縣名屬江夏郡以奉漢後盱卒子勝嗣初漢兄尉為將軍從征戰死封尉子彤為安陽侯安陽縣名屬汝南郡古江國也故城在今豫州新息縣西南帝以漢功大復封弟翕為襃親侯呉氏侯者凡五國初漁陽都尉嚴宣與漢俱㑹光武扵廣阿光武以為偏將軍封建信侯建信縣名屬千乗國論曰呉漢自建武世常居上公之位終始倚愛之親差彊人意是倚之也遂見親信是愛之也諒由質簡而彊力也子曰剛毅木訥近仁論語文剛毅謂彊而􅀎斷木樸慤貎訥忍於言也四者皆仁之質若加文則成仁矣故言近仁斯豈漢之方乎方比也昔陳平智有餘以見疑周勃質朴忠而見信高祖謂吕后曰陳平智有餘然難獨任是見疑也又曰周勃重厚少文安劉氏者必勃是見信也夫仁義不足以相懐則智者以有餘為疑而朴者以不足取信矣懐依也言若仁義之心足相依信則情無疑阻若彼此之誠未協仁義不足相依則智者翻以有餘見疑朴者以愚直取信蓋延傳蓋延字巨卿漁陽要陽人也要陽縣名光武時省身長八尺彎弓三百斤邊俗尚勇力而延以氣聞歴郡列掾州従事所在職辦古者三公下至郡縣皆有掾屬續漢志曰建武十八年立刺史十三人人主一州皆有従事史假佐每郡皆置諸曺掾郡中列掾非一延並為之故言歴也漁陽屬幽州東觀記云延為幽州従事彭寵為太守召延署營尉行護軍及}
