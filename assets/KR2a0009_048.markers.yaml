  - {type: variant, offset: 5881, length: 592, content: 無逆節之罪漢朝無可慙之恥而盛春東作興動大役元元怨恨咸懷不悅而猥復為衞尉篤奉車都尉景繕修館第彌街絕里臣雖斗筲之人誠竊懷怪以為篤景親近貴臣當為百僚表儀今衆軍在道朝廷焦脣百姓愁苦縣官無用而遽起大第崇飾玩好非所以垂令德示無窮也宜且罷工匠專憂北邊恤人之困書奏不省後拜為尚書復上封事曰夫忠臣憂世犯主嚴顏譏刺貴臣至以殺身滅家而猶為之者何邪君臣義重有不得已也臣伏見往事國之危亂家之將凶皆有所由較然易知昔鄭武姜之幸叔段衞莊公之寵州吁愛而不教終至凶戾由是觀之愛子若此猶飢而食之以毒適所以害之也伏見大將軍憲始遭大憂公卿比奏欲令典幹國事憲深執謙退固辭盛位懇懇勤勤言之深至天下聞之莫不悅喜今踰年無幾大禮未終卒然中改兄弟專朝憲秉三軍之重篤景總宮衞之權而虐用百姓奢侈僭偪誅戮無罪肆心自快今者論議凶凶咸謂叔段州吁復生於漢臣觀公卿懷持兩端不肯極言者以為憲等若有匪懈之志則己受吉甫襃申伯之功如憲等陷於罪辜則自取陳平周勃順呂后之權終不以憲等吉凶為憂也臣敞區區誠欲計策兩安絕其緜緜塞其涓涓上不欲令皇太后損文母之號陛下有誓泉之譏下使憲等得長保其福祐然臧獲之謀上安主父下存主母猶不免於嚴怒臣伏惟累祖蒙恩至臣八世復以愚陋旬年之閒歷顯位備機近每念厚德忽然忘生雖知言必夷滅而冒死自盡者誠不忍目見其禍而懷默苟全駙馬都尉瓌雖在弱冠有不隱之忠比請退身願抑家權可與參謀聽順其意誠宗廟至計竇氏之福敞數切諫言諸竇罪過憲等深怨之時濟南王康尊貴驕甚憲, WYG: 圍七日}
