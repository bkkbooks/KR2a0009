  - {type: variant, offset: 844, length: 2, content: 念患, WYG: 二十七年宫乃與楊虚侯馬武上書曰匈奴貪利無有禮信窮則稽首安則侵盗縁邉被其毒痛内國憂其抵突抵觸也虜今人畜疫死旱蝗赤地赤地言在地}
