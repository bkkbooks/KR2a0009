  - {type: variant, offset: 808, length: 1, content: 補, WYG: 東州新平大將軍之功也負海猾夏盗賊之處國家以為重憂且勉鎮撫之十三年增邑定封祝阿侯祝阿縣名屬平原郡眀年徵奉朝請二十三年卒子浮嗣徙封蘄春侯蘄春今蘄州縣也東觀記曰詔書以祝阿益濟南國故徙浮封蘄春侯蘄音祈浮卒子專諸嗣專諸卒子篤嗣臧宫傳臧宫字君翁潁川郟人也郏縣名今汝州郟城縣也少為縣亭長游徼續漢書曰每十里一亭亭有長以禁盗賊每鄉有游徼掌循禁姦盗也後率賔客入下江兵中為校尉因従光武征戰諸將多稱其勇光武察宫勤力少言甚親納之及至河北以為偏將軍従破羣賊數陷陳郤敵光武即位以為侍中騎都尉建武二年封成安侯成安縣名屬潁川郡眀年將突騎與征虜將軍祭遵擊更始將左防韋顔華嶠書韋字作韓於沮陽酈悉降之三年將兵徇江夏擊代鄉鍾武竹里皆下之鍾武縣名屬江夏郡故城在今申州鍾山縣西南帝使太中大夫華嶠書曰使張明也持節拜宫為輔威將軍七年更封期思侯期思縣名屬汝南郡故城在今光州固始縣西北撃梁郡濟隂皆平之十一年將兵至中盧屯駱越中盧縣名屬南郡故城在今襄州襄陽縣南盖駱越人徙於此因以為名是時}
