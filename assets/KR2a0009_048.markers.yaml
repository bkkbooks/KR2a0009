  - {type: variant, offset: 38, length: 0, content: '', krp: 黄郵水黄郵聚也又與偏將軍馮異擊昌城五樓賊張文等又攻銅馬五幡於新安皆破之眀年春率建威大將軍耿弇虎牙大將軍蓋延擊青犢於軹西大破降之又率驃騎大將軍杜茂彊弩將軍陳俊等圍蘇茂於廣樂劉永將周建别招聚收集得十餘萬人救廣樂漢將輕騎迎與之戰不利墮馬傷膝還營建等遂連兵入城諸將謂漢曰大敵在前而公傷卧衆心懼矣漢乃勃然裹創而起椎牛饗士令軍中曰賊衆雖多皆刼掠羣盗勝不相讓敗不相救此上兩句在左傳鄭大夫公子突之詞也非有仗節死義者也今日封侯之秋諸君勉之於是軍士激怒人倍其}
  - {type: variant, offset: 39, length: 1, content: 決, WYG: 旦日建茂出兵圍漢漢選四部精兵黄頭呉河等前書鄧通為黄頭郎音義曰土勝水故刺船郎著黄㡌號黄頭也及烏桓突騎三千餘人齊鼓而進續漢書曰漢躬被甲拔㦸令諸部將曰聞靁鼓聲皆大呼俱大進後至者斬遂鼓而進之劉攽曰注俱大進按文多一大字建軍大潰反還奔城漢長驅追擊爭門並入大破之茂建突走漢留杜茂陳俊等守廣樂自將兵助蓋延圍劉永於睢陽永既死二城皆降眀}
  - {type: variant, offset: 39, length: 1, content: 決, krp: 旦日建茂出兵圍漢漢選四部精兵黄頭呉河等前書鄧通為黄頭郎音義曰土勝水故刺船郎著黄㡌號黄頭也及烏桓突騎三千餘人齊鼓而進續漢書曰漢躬被甲拔㦸令諸部將曰聞靁鼓聲皆大呼俱大進後至者斬遂鼓而進之劉攽曰注俱大進按文多一大字建軍大潰反還奔城漢長驅追擊爭門並入大破之茂建突走漢留杜茂陳俊等守廣樂自將兵助蓋延圍劉永於睢陽永既死二城皆降眀}
