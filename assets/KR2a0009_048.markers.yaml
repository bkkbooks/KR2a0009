  - {type: variant, offset: 1977, length: 3844, content: 法為賊也夫中世之所敦已為上世之所薄況又薄於此乎昔在仲尼不失舊於原壤楚嚴不忍章於絕纓由此觀之聖賢之德敦矣老氏之經曰大丈夫處其厚不處其薄居其實不居其華故去彼取此夫時有薄而厚施行有失而惠用故覆人之過者敦之道也救人之失者厚之行也往者馬援深昭此道可以為德誡其兄子曰吾欲汝曹聞人之過如聞父母之名耳可得聞口不得言斯言要矣遠則聖賢履之上世近則丙吉張子孺行之漢廷故能振英聲於百世播不滅之遺風不亦美哉其善悠悠者皆是其可稱乎凡此之類豈徒乖為君子之道哉將有危身累家之禍焉悲夫行之者不知憂其然故害興而莫之及也斯既然矣又有異焉人皆見之而不能自遷何則務進者趨前而不顧後榮貴者矜己而不待人智不接愚富不賑貧貞士孤而不恤賢者戹而不存故田蚡以尊顯致安國之金淳于以貴埶引方進之言夫以韓翟之操為漢之名宰然猶不能振一貧賢薦一孤士又況其下者乎此禽息史魚所以專名於前而莫繼於後者也故時敦俗美則小人守正利不能誘也時否俗薄雖君子為邪義不能止也何則先進者既往而不反後來者復習俗而追之是以虛華盛而忠信微刻薄稠而純篤稀斯蓋谷風有棄予之歎伐木有鳥鳴之悲矣二宰之失度美韓稜之抗正貴丙張之弘裕賤時俗之誹謗則道豐績盛名顯身榮載不刊之德播不滅之聲然後知薄者之不足厚者之有餘也彼與草木俱朽此與金石相傾豈得同年而語並日而談哉穆又著絕交論亦矯時之作梁冀驕暴不悛朝野嗟毒穆以故吏懼其釁積招禍復奏記諫曰古之明君必有輔德之臣規諫之官下至器物銘書成敗以防遺失故君有正道臣有正路從之如升堂違之如赴壑今明將軍地有申伯之尊位為羣公之首一日行善天下歸仁終朝為惡四海傾覆頃者官人俱匱加以水蟲為害京師諸官費用增多詔書發調或至十倍各言官無見財皆當出民搒掠割剝彊令充足公賦既重私斂又深牧守長吏多非德選貪聚無猒遇人如虜或絕命於箠楚之下或自賊於迫切之求又掠奪百姓皆託之尊府遂令將軍結怨天下吏人酸毒道路歎嗟昔秦政煩苛百姓土崩陳勝奮臂一呼天下鼎沸而面諛之臣猶言安耳諱惡不悛卒至亡滅昔永和之末綱紀少薥頗失人望四五歲耳而財空戶散下有離心馬免之徒乘敝而起荊揚之閒幾成大患幸賴順烈皇后初政清靜內外同力僅乃討定今百姓戚戚困於永和內非仁愛之心可得容忍外非守國之計所宜久安也夫將相大臣均體元首共輿而馳同舟而濟輿傾舟覆患實共之豈可以去明即昧履危自安主孤時困而莫之卹乎宜時易宰守非其人者減省第宅園池之費拒絕郡國諸所奉送內以自明外解人惑使挾姦之吏無所依託司察之臣得盡耳目憲度既張遠邇清壹則將軍身尊事顯德燿無窮天道明察無言不信惟垂省覽冀不納而縱放日滋遂復賂遺左右交通宦者任其子弟賓客以為州郡要職穆又奏記極諫冀終不悟報書云如此僕亦無一可邪穆言雖切然亦不甚罪也永興元年河溢漂害人庶數十萬戶百姓荒饉流移道路冀州盜賊尤多故擢穆為冀州刺史州人有宦者三人為中常侍並以檄謁穆穆疾之辭不相見冀部令長聞穆濟河解印綬去者四十餘人及到奏劾諸郡至有自殺者以威略權宜盡誅賊渠帥舉劾權貴或乃死獄中有宦者趙忠喪父歸葬安平僭為璵璠玉匣偶人穆聞之下郡案驗吏畏其嚴明遂發墓剖棺陳尸出之而收其家屬帝聞大怒徵穆詣廷尉輸作左校太學書生劉陶等數千人詣闕上書訟穆曰伏見施刑徒朱穆處公憂國拜州之日志清姦惡誠以常侍貴寵父兄子弟布在州郡競為虎狼噬食小人故穆張理天網補綴漏目羅取殘禍以塞天意由是內官咸共恚疾謗讟煩興讒𨻶仍作極其刑讁輸作左校天下有識皆以穆同勤禹稷而被共鯀之戾若死者有知則唐帝怒於崇山重華忿於蒼墓矣當今中官近習竊持國柄手握王爵口含天憲運賞則使餓隸富於季孫呼噏則令伊顏化為桀跖而穆獨亢然不顧身害非惡榮而好辱惡生而好死也徒感王綱之不攝懼天網之久失故竭心懷憂為上深計臣願黥首繫趾代穆校作帝覽其奏乃赦之穆居家數年在朝諸公多有相推薦者於是徵拜尚書穆既深疾宦官及在臺閣旦夕共事志欲除之乃上疏曰案漢故事中常侍參選士人建武以後乃悉用宦者自延平以來浸益貴盛假貂璫之飾處常伯之任天朝政事一更其手灌傾海內寵貴無極子弟親戚並荷榮任故放濫驕溢莫能禁禦凶狡無行之徒媚以求官恃埶怙寵之輩漁食百姓窮破天下空竭小人愚臣以為可悉罷省遵復往初率由舊章更選海內清淳之士明達國體者以補其處即陛下可為堯舜之君衆僚皆為稷契之臣兆庶黎萌蒙被聖化矣帝不納後穆因進見口復陳曰臣聞漢家舊典置侍中中常侍各一人省尚書事黃門侍郎一人傳發書奏皆用姓族自和熹太后以女主稱制不接公卿乃以閹人為常侍小黃門通命兩宮自此以來權傾人主窮困天下宜皆罷遣博選耆儒宿德與參政事帝怒不應穆伏不肯起左右傳出良久乃趨而去自此中官數因事稱詔詆毀之穆素剛不得意居無幾憤懣發疽延熹六年卒時年六十四祿仕數十年蔬食布衣家無餘財公卿共表穆立節忠清虔恭機密守死善道宜蒙旌寵策詔襃述追贈益州太守所著論策奏教書詩記嘲凡二十篇穆前在冀州所辟用皆清德長者多至公卿州郡子野少有名節仕至河南尹初穆父卒穆與諸儒考依古義謚曰貞宣先生及穆卒蔡邕復與門人共述其體行謚為文忠先生論曰朱穆見比周傷義偏黨毀俗志抑朋游之私遂著絕交之論蔡邕以為穆貞而孤又作正交而廣其致焉蓋孔子稱上交不諂下交不黷又曰晏平仲善與人交子夏之門人亦問交於子張故易明斷金之義詩載讌朋之謠若夫文會輔仁直諒多聞之友時濟其益紵衣傾蓋彈冠結綬之夫遂隆其好斯固交者之方焉至乃田竇衞霍之游客廉頗翟公之門賓進由埶合退因衰異又專諸荊卿之感激侯生豫子之投身情為恩使命緣義輕皆以利害移心懷德成節非夫交照之本未可語失得之原也穆徒以友分少全因絕同志之求黨俠生敝而忘得朋之義蔡氏貞孤之言其為然也古之善交者詳矣漢興稱王陽貢禹陳遵張竦中世有廉范慶鴻陳重靁義云樂恢字伯奇京兆長陵人也父親為縣吏得罪於令收將殺之恢年十一常俯伏寺門晝夜號泣令聞而矜之即解出親恢長好經學事博士焦永永為河東太守恢隨之官閉廬精誦不交人物後永以事被考諸弟子皆以通關被繫恢獨皦曒然不樜於法遂篤志為名儒性廉直介立行不合己者雖貴不與交信陽侯陰就數致禮請恢恢絕不荅後仕本郡吏太守坐法誅故人莫敢往恢獨奔喪行服坐以抵罪歸復為功曹選舉不阿請託無所容同郡楊政數衆毀恢後舉政子為孝廉由是鄉里歸之辟司空牟融府會蜀郡太守第五倫代融為司空恢以與倫同郡不肯留薦潁川杜安而退諸公多其行連辟之遂皆不應後徵拜議郎會車騎將軍竇憲出征匈奴恢數上書諫爭朝廷稱其忠入為尚書僕射是時河南尹王調洛陽令李阜與竇憲厚善縱舍自由恢劾奏調阜并及司隸校尉諸所刺舉無所回避貴戚惡之憲弟夏陽侯瓌欲往候恢恢謝不與通憲兄弟放縱而忿其不附己妻每諫恢曰昔人有容身避害何必以言取怨恢歎曰吾何忍素餐立人之朝乎遂上疏諫曰臣聞百王之失皆由權移於下大臣持國常以埶盛為咎伏念先帝聖德未永早棄萬國陛下富於春秋纂承大業諸舅不宜幹正王室以示天下之私經曰天地乖互衆物夭傷君臣失序萬人受殃政失不救其極不測方今之宜上以義自割下以謙自引四舅可長保爵土之榮皇太后永無慙負宗廟之憂誠策之上者也書奏不省時竇太后臨朝和帝未親萬機恢以意不得行乃稱疾乞骸骨詔賜錢太醫視疾恢薦任城郭均成陽高鳳而遂稱篤拜騎都尉上書辭謝曰仍受厚恩無以報效夫政在大夫孔子所疾世卿持權春秋以戒聖人懇惻不虛言也近世外戚富貴必有驕溢之敗今陛下思慕山陵未遑政事諸舅寵盛權行四方若不能自損誅罰必加臣壽命垂盡臨死竭愚惟蒙留神詔聽上印綬乃歸鄉里竇憲因是風厲州郡迫脅恢遂飲藥死弟子縗絰輓者數百人衆庶痛傷之後竇氏誅帝始親事恢門生何融等上書陳恢忠節除子己為郎中何敞字文高扶風平陵人也其先家于汝陰六世祖比干學尚書於朝錯武帝時為廷尉正與張湯同時湯持法深而比干務仁恕數與湯爭雖不能盡得然所濟活者以千數後遷丹楊陽都尉因徙居平陵敞父寵建武中為千乘都尉以病免遂隱居不仕敞性公正自以趣舍不合時務每請召常稱疾不應元和中辟太尉宋由府由待以殊禮敞論議高常引大體多所匡正司徒袁安亦深敬重之是時京師及四方累有奇異鳥獸草木言事者以為祥瑞敞通經傳能為天官意甚惡之乃言於二公曰夫瑞應依德而至災異緣政而生故鸜鵒來巢昭公有乾侯之戹西狩獲麟孔子有兩楹之殯海鳥避風臧文祀之君子譏焉今異鳥翔於殿屋怪草生於庭際不可不察由安懼然不敢荅居無何而肅宗崩時竇氏專政外戚奢侈賞賜過制倉帑為虛敞奏記由曰敞聞事君之義進思盡忠退思補過歷觀世主時臣無不各欲為化垂之無窮然而平和之政萬無一者蓋以聖主賢臣不能相遭故也今國家秉聰明之弘道明公履晏晏之純德君臣相合天下翕然治平之化有望於今孔子曰如有用我者三年有成今明公視事出入再朞宜當克己以醻四海之心禮一穀不升則損服徹膳天下不足若己使然而比年水旱人不收穫涼州緣邊家被凶害男子疲於戰陳妻女勞於轉運老幼孤寡歎息相依又中州內郡公私屈竭此實損膳節用之時國恩覆載賞賚過度但聞臘賜自郎官以上公卿王侯以下至於空竭帑藏損耗國資尋公家之用皆百姓之力明君賜賚宜有品制忠臣受賞亦應有度是以夏禹玄圭周公束帛今明公位尊任重責深負大上當匡正綱紀下當濟安元元豈但空空無違而已哉宜先正己以率羣下還所得賜因陳得失奏王侯就國除苑囿之禁節省浮費賑卹窮孤則恩澤下暢黎庶悅豫上天聰明必有立應使百姓歌誦史官紀德豈但子文逃祿公儀退食之比哉由不能用時齊殤王子都鄉侯暢奔弔國憂上書未報侍中竇憲遂令人刺殺暢於城門屯衞之中而主名不立敞又說由曰劉暢宗室肺府茅土藩臣來弔大憂上書須報親在武衞致此殘酷奉憲之吏莫適討捕蹤迹不顯主名不立敞備數股肱職典賊曹故欲親至發所以糾其變而二府以為故事三公不與賊盜昔陳平生於征戰之世猶知宰相之分云外鎮四夷內撫諸侯使卿大夫各得其宜今二府執事不深惟大義惑於所聞公縱姦慝莫以為咎惟明公運獨見之明昭然勿疑敞不勝所見請獨奏案由乃許焉二府聞敞行皆遣主者隨之於是推舉具得事實京師稱其正以高第拜侍御史時遂以竇憲為車騎將軍大發軍擊匈奴而詔使者為憲弟篤景並起邸第興造勞役百姓愁苦敞上疏諫曰臣聞, WYG: ''}
  - {type: variant, offset: 1977, length: 3844, content: 法為賊也夫中世之所敦已為上世之所薄況又薄於此乎昔在仲尼不失舊於原壤楚嚴不忍章於絕纓由此觀之聖賢之德敦矣老氏之經曰大丈夫處其厚不處其薄居其實不居其華故去彼取此夫時有薄而厚施行有失而惠用故覆人之過者敦之道也救人之失者厚之行也往者馬援深昭此道可以為德誡其兄子曰吾欲汝曹聞人之過如聞父母之名耳可得聞口不得言斯言要矣遠則聖賢履之上世近則丙吉張子孺行之漢廷故能振英聲於百世播不滅之遺風不亦美哉其善悠悠者皆是其可稱乎凡此之類豈徒乖為君子之道哉將有危身累家之禍焉悲夫行之者不知憂其然故害興而莫之及也斯既然矣又有異焉人皆見之而不能自遷何則務進者趨前而不顧後榮貴者矜己而不待人智不接愚富不賑貧貞士孤而不恤賢者戹而不存故田蚡以尊顯致安國之金淳于以貴埶引方進之言夫以韓翟之操為漢之名宰然猶不能振一貧賢薦一孤士又況其下者乎此禽息史魚所以專名於前而莫繼於後者也故時敦俗美則小人守正利不能誘也時否俗薄雖君子為邪義不能止也何則先進者既往而不反後來者復習俗而追之是以虛華盛而忠信微刻薄稠而純篤稀斯蓋谷風有棄予之歎伐木有鳥鳴之悲矣二宰之失度美韓稜之抗正貴丙張之弘裕賤時俗之誹謗則道豐績盛名顯身榮載不刊之德播不滅之聲然後知薄者之不足厚者之有餘也彼與草木俱朽此與金石相傾豈得同年而語並日而談哉穆又著絕交論亦矯時之作梁冀驕暴不悛朝野嗟毒穆以故吏懼其釁積招禍復奏記諫曰古之明君必有輔德之臣規諫之官下至器物銘書成敗以防遺失故君有正道臣有正路從之如升堂違之如赴壑今明將軍地有申伯之尊位為羣公之首一日行善天下歸仁終朝為惡四海傾覆頃者官人俱匱加以水蟲為害京師諸官費用增多詔書發調或至十倍各言官無見財皆當出民搒掠割剝彊令充足公賦既重私斂又深牧守長吏多非德選貪聚無猒遇人如虜或絕命於箠楚之下或自賊於迫切之求又掠奪百姓皆託之尊府遂令將軍結怨天下吏人酸毒道路歎嗟昔秦政煩苛百姓土崩陳勝奮臂一呼天下鼎沸而面諛之臣猶言安耳諱惡不悛卒至亡滅昔永和之末綱紀少薥頗失人望四五歲耳而財空戶散下有離心馬免之徒乘敝而起荊揚之閒幾成大患幸賴順烈皇后初政清靜內外同力僅乃討定今百姓戚戚困於永和內非仁愛之心可得容忍外非守國之計所宜久安也夫將相大臣均體元首共輿而馳同舟而濟輿傾舟覆患實共之豈可以去明即昧履危自安主孤時困而莫之卹乎宜時易宰守非其人者減省第宅園池之費拒絕郡國諸所奉送內以自明外解人惑使挾姦之吏無所依託司察之臣得盡耳目憲度既張遠邇清壹則將軍身尊事顯德燿無窮天道明察無言不信惟垂省覽冀不納而縱放日滋遂復賂遺左右交通宦者任其子弟賓客以為州郡要職穆又奏記極諫冀終不悟報書云如此僕亦無一可邪穆言雖切然亦不甚罪也永興元年河溢漂害人庶數十萬戶百姓荒饉流移道路冀州盜賊尤多故擢穆為冀州刺史州人有宦者三人為中常侍並以檄謁穆穆疾之辭不相見冀部令長聞穆濟河解印綬去者四十餘人及到奏劾諸郡至有自殺者以威略權宜盡誅賊渠帥舉劾權貴或乃死獄中有宦者趙忠喪父歸葬安平僭為璵璠玉匣偶人穆聞之下郡案驗吏畏其嚴明遂發墓剖棺陳尸出之而收其家屬帝聞大怒徵穆詣廷尉輸作左校太學書生劉陶等數千人詣闕上書訟穆曰伏見施刑徒朱穆處公憂國拜州之日志清姦惡誠以常侍貴寵父兄子弟布在州郡競為虎狼噬食小人故穆張理天網補綴漏目羅取殘禍以塞天意由是內官咸共恚疾謗讟煩興讒𨻶仍作極其刑讁輸作左校天下有識皆以穆同勤禹稷而被共鯀之戾若死者有知則唐帝怒於崇山重華忿於蒼墓矣當今中官近習竊持國柄手握王爵口含天憲運賞則使餓隸富於季孫呼噏則令伊顏化為桀跖而穆獨亢然不顧身害非惡榮而好辱惡生而好死也徒感王綱之不攝懼天網之久失故竭心懷憂為上深計臣願黥首繫趾代穆校作帝覽其奏乃赦之穆居家數年在朝諸公多有相推薦者於是徵拜尚書穆既深疾宦官及在臺閣旦夕共事志欲除之乃上疏曰案漢故事中常侍參選士人建武以後乃悉用宦者自延平以來浸益貴盛假貂璫之飾處常伯之任天朝政事一更其手灌傾海內寵貴無極子弟親戚並荷榮任故放濫驕溢莫能禁禦凶狡無行之徒媚以求官恃埶怙寵之輩漁食百姓窮破天下空竭小人愚臣以為可悉罷省遵復往初率由舊章更選海內清淳之士明達國體者以補其處即陛下可為堯舜之君衆僚皆為稷契之臣兆庶黎萌蒙被聖化矣帝不納後穆因進見口復陳曰臣聞漢家舊典置侍中中常侍各一人省尚書事黃門侍郎一人傳發書奏皆用姓族自和熹太后以女主稱制不接公卿乃以閹人為常侍小黃門通命兩宮自此以來權傾人主窮困天下宜皆罷遣博選耆儒宿德與參政事帝怒不應穆伏不肯起左右傳出良久乃趨而去自此中官數因事稱詔詆毀之穆素剛不得意居無幾憤懣發疽延熹六年卒時年六十四祿仕數十年蔬食布衣家無餘財公卿共表穆立節忠清虔恭機密守死善道宜蒙旌寵策詔襃述追贈益州太守所著論策奏教書詩記嘲凡二十篇穆前在冀州所辟用皆清德長者多至公卿州郡子野少有名節仕至河南尹初穆父卒穆與諸儒考依古義謚曰貞宣先生及穆卒蔡邕復與門人共述其體行謚為文忠先生論曰朱穆見比周傷義偏黨毀俗志抑朋游之私遂著絕交之論蔡邕以為穆貞而孤又作正交而廣其致焉蓋孔子稱上交不諂下交不黷又曰晏平仲善與人交子夏之門人亦問交於子張故易明斷金之義詩載讌朋之謠若夫文會輔仁直諒多聞之友時濟其益紵衣傾蓋彈冠結綬之夫遂隆其好斯固交者之方焉至乃田竇衞霍之游客廉頗翟公之門賓進由埶合退因衰異又專諸荊卿之感激侯生豫子之投身情為恩使命緣義輕皆以利害移心懷德成節非夫交照之本未可語失得之原也穆徒以友分少全因絕同志之求黨俠生敝而忘得朋之義蔡氏貞孤之言其為然也古之善交者詳矣漢興稱王陽貢禹陳遵張竦中世有廉范慶鴻陳重靁義云樂恢字伯奇京兆長陵人也父親為縣吏得罪於令收將殺之恢年十一常俯伏寺門晝夜號泣令聞而矜之即解出親恢長好經學事博士焦永永為河東太守恢隨之官閉廬精誦不交人物後永以事被考諸弟子皆以通關被繫恢獨皦曒然不樜於法遂篤志為名儒性廉直介立行不合己者雖貴不與交信陽侯陰就數致禮請恢恢絕不荅後仕本郡吏太守坐法誅故人莫敢往恢獨奔喪行服坐以抵罪歸復為功曹選舉不阿請託無所容同郡楊政數衆毀恢後舉政子為孝廉由是鄉里歸之辟司空牟融府會蜀郡太守第五倫代融為司空恢以與倫同郡不肯留薦潁川杜安而退諸公多其行連辟之遂皆不應後徵拜議郎會車騎將軍竇憲出征匈奴恢數上書諫爭朝廷稱其忠入為尚書僕射是時河南尹王調洛陽令李阜與竇憲厚善縱舍自由恢劾奏調阜并及司隸校尉諸所刺舉無所回避貴戚惡之憲弟夏陽侯瓌欲往候恢恢謝不與通憲兄弟放縱而忿其不附己妻每諫恢曰昔人有容身避害何必以言取怨恢歎曰吾何忍素餐立人之朝乎遂上疏諫曰臣聞百王之失皆由權移於下大臣持國常以埶盛為咎伏念先帝聖德未永早棄萬國陛下富於春秋纂承大業諸舅不宜幹正王室以示天下之私經曰天地乖互衆物夭傷君臣失序萬人受殃政失不救其極不測方今之宜上以義自割下以謙自引四舅可長保爵土之榮皇太后永無慙負宗廟之憂誠策之上者也書奏不省時竇太后臨朝和帝未親萬機恢以意不得行乃稱疾乞骸骨詔賜錢太醫視疾恢薦任城郭均成陽高鳳而遂稱篤拜騎都尉上書辭謝曰仍受厚恩無以報效夫政在大夫孔子所疾世卿持權春秋以戒聖人懇惻不虛言也近世外戚富貴必有驕溢之敗今陛下思慕山陵未遑政事諸舅寵盛權行四方若不能自損誅罰必加臣壽命垂盡臨死竭愚惟蒙留神詔聽上印綬乃歸鄉里竇憲因是風厲州郡迫脅恢遂飲藥死弟子縗絰輓者數百人衆庶痛傷之後竇氏誅帝始親事恢門生何融等上書陳恢忠節除子己為郎中何敞字文高扶風平陵人也其先家于汝陰六世祖比干學尚書於朝錯武帝時為廷尉正與張湯同時湯持法深而比干務仁恕數與湯爭雖不能盡得然所濟活者以千數後遷丹楊陽都尉因徙居平陵敞父寵建武中為千乘都尉以病免遂隱居不仕敞性公正自以趣舍不合時務每請召常稱疾不應元和中辟太尉宋由府由待以殊禮敞論議高常引大體多所匡正司徒袁安亦深敬重之是時京師及四方累有奇異鳥獸草木言事者以為祥瑞敞通經傳能為天官意甚惡之乃言於二公曰夫瑞應依德而至災異緣政而生故鸜鵒來巢昭公有乾侯之戹西狩獲麟孔子有兩楹之殯海鳥避風臧文祀之君子譏焉今異鳥翔於殿屋怪草生於庭際不可不察由安懼然不敢荅居無何而肅宗崩時竇氏專政外戚奢侈賞賜過制倉帑為虛敞奏記由曰敞聞事君之義進思盡忠退思補過歷觀世主時臣無不各欲為化垂之無窮然而平和之政萬無一者蓋以聖主賢臣不能相遭故也今國家秉聰明之弘道明公履晏晏之純德君臣相合天下翕然治平之化有望於今孔子曰如有用我者三年有成今明公視事出入再朞宜當克己以醻四海之心禮一穀不升則損服徹膳天下不足若己使然而比年水旱人不收穫涼州緣邊家被凶害男子疲於戰陳妻女勞於轉運老幼孤寡歎息相依又中州內郡公私屈竭此實損膳節用之時國恩覆載賞賚過度但聞臘賜自郎官以上公卿王侯以下至於空竭帑藏損耗國資尋公家之用皆百姓之力明君賜賚宜有品制忠臣受賞亦應有度是以夏禹玄圭周公束帛今明公位尊任重責深負大上當匡正綱紀下當濟安元元豈但空空無違而已哉宜先正己以率羣下還所得賜因陳得失奏王侯就國除苑囿之禁節省浮費賑卹窮孤則恩澤下暢黎庶悅豫上天聰明必有立應使百姓歌誦史官紀德豈但子文逃祿公儀退食之比哉由不能用時齊殤王子都鄉侯暢奔弔國憂上書未報侍中竇憲遂令人刺殺暢於城門屯衞之中而主名不立敞又說由曰劉暢宗室肺府茅土藩臣來弔大憂上書須報親在武衞致此殘酷奉憲之吏莫適討捕蹤迹不顯主名不立敞備數股肱職典賊曹故欲親至發所以糾其變而二府以為故事三公不與賊盜昔陳平生於征戰之世猶知宰相之分云外鎮四夷內撫諸侯使卿大夫各得其宜今二府執事不深惟大義惑於所聞公縱姦慝莫以為咎惟明公運獨見之明昭然勿疑敞不勝所見請獨奏案由乃許焉二府聞敞行皆遣主者隨之於是推舉具得事實京師稱其正以高第拜侍御史時遂以竇憲為車騎將軍大發軍擊匈奴而詔使者為憲弟篤景並起邸第興造勞役百姓愁苦敞上疏諫曰臣聞, krp: ''}
