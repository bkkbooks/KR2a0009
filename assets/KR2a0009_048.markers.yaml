  - {type: variant, offset: 38, length: 0, content: '', WYG: 黄郵水黄郵聚也又與偏將軍馮異擊昌城五樓賊張文等又攻銅馬五幡於新安皆破之眀年春率建威大將軍耿弇虎牙大將軍蓋延擊青犢於軹西大破降之又率驃騎大將軍杜茂彊弩將軍陳俊等圍蘇茂於廣樂劉永將周建别招聚收集得十餘萬人救廣樂漢將輕騎迎與之戰不利墮馬傷膝還營建等遂連兵入城諸將謂漢曰大敵在前而公傷卧衆心懼矣漢乃勃然裹創而起椎牛饗士令軍中曰賊衆雖多皆刼掠羣盗勝不相讓敗不相救此上兩句在左傳鄭大夫公子突之詞也非有仗節死義者也今日封侯之秋諸君勉之於是軍士激怒人倍其}
