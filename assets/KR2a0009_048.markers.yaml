  - {type: variant, offset: 847, length: 1, content: 甚, WYG: 物皆盡説苑曰晉平公時赤地千里疫困之力不當中國一郡萬里死命縣在陛下福不再來時或易失左傳曰大福不再蒯通曰時者難遇而易失也豈宜固守文徳而墮武事乎今命將臨塞厚縣購賞喻告髙句驪烏桓鮮卑攻其左發河西四郡謂張掖酒泉武威金城也天水隴西羌胡擊其右如此北虜之滅不過數年臣恐陛下仁恩不忍謀臣狐疑令萬世刻石之功不立於聖世詔報曰黄石公記曰柔能制剛弱能制彊即張良於下邳圯所見老父出一編書者柔者徳也剛者賊也弱者仁之助也彊者怨之歸也故曰有德之君以所樂樂人無徳之君以所樂樂身樂人者其樂長樂身者不}
