  - {type: 'tls:seg', offset: 37, content: '', id: KR2a0009_ZHSJ_048-d48p2s5}
  - {type: variant, offset: 37, length: 0, content: '', WYG: 危之城待滅亡之禍義無所立節無所成不若開門内軍轉禍為福免下愚之敗收中智之功此計之至者也康然之於是康收劉慶及躬妻子開門内漢等及躬従隆慮歸鄴不知康已反之乃與數百騎輕入城漢伏兵收之手擊殺躬其衆悉降續漢書曰時岑彭已在城中將躬詣傳舎出白漢漢至躬在彭前伏漢曰何故與鬼語遂殺之躬字子張南陽人初其妻知光武不平之常戒躬曰君與劉公積不相能而信其虛談不為之備終受制矣躬不納故及扵難光武北撃羣賊續漢書曰従擊銅馬重連髙胡皆破之漢常將突騎五千為軍鋒數先登陷陳及河北平漢與諸將奉圖書上尊號光武即位拜為大司馬更封舞陽侯建武二年春漢率大司空王梁建義大將軍朱祐大將軍杜茂執金吾賈復揚化將軍堅鐔偏將軍王覇騎都尉劉隆馬武隂識共擊檀鄉賊於鄴東漳水上大破之水經曰漳水源出上黨長子縣西發鳩山東北至昌亭與滹沱河合降者十餘萬人帝使使者璽書定封漢為廣平侯食廣平斥漳曲周廣年凡四縣四縣皆屬廣平郡廣平故城在今洺州永年縣西北廣年在今永年縣東北斥漳在今洺州洺水縣曲周故城在今洺州曲周縣西南廣年避焬帝諱故改為永年縣復率諸將擊鄴西山賊黎伯卿等及河内脩武悉破諸屯聚車駕親幸撫勞復遣漢進兵南陽撃宛湼陽酈穰新野諸城皆下之引兵南與秦豐戰黄郵水上破之南陽新野縣}
