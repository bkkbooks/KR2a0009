  - {type: variant, offset: 31, length: 5, content: 世衣冠暉早, WYG: 貧給事縣為亭長王莽末以賔客犯法乃亡命至漁陽命名也謂脱其名籍而逃亡資用乏以販馬自業往来燕薊間所至皆交結豪傑更始立使使者韓鴻徇河北續漢書曰雒陽人韓鴻為謁者使持節降河北拜除二千石或謂鴻曰呉子顔竒士也可與計事鴻召見漢甚恱之遂承制拜爲安樂令安樂縣名屬漁陽郡故城在今幽州潞縣西北㑹王郎起北州擾惑漢素聞光武長者獨欲歸心乃說太守彭寵曰漁陽上谷突騎天下所聞也君何不合二郡精鋭附劉公擊邯鄲此一時之功也一時言不可再遇也寵以為然而官屬皆欲附王郎寵不能奪漢乃辭出止外亭念所以譎衆未知所出譎詐也未知欲出何計以詐也望見道中有一人似儒生者漢使人召之為具食續漢書曰時道路多饑人來求食者似儒生漢召故先為具食劉攽曰案注文漢召下少一之字問以所聞生因言劉公所過為郡縣所歸邯鄲舉尊號者實非劉氏漢大喜即詐為光武書移檄漁陽使生齎以詣寵令具以所聞説之漢復随後入寵甚然之扵是遣漢將兵與上谷諸將幷軍而南所至擊斬王郎將帥續漢書曰攻薊誅王郎大將趙閎等及光武於廣阿拜漢為偏將軍既拔邯鄲續漢書曰時上使漢等將突騎揚兵戲馬士騎馳環邯鄲城乃圍之賜號建策侯漢為人質厚少文造次不䏻以辭自達鄧禹及諸將多知之數相薦舉乃得召見遂見親信常居門下光武將發幽州兵夜召鄧禹問可使行者禹曰間數與呉漢言其人勇鷙有智謀廣雅曰鷙執也凡鳥之勇鋭獸之猛悍者皆名鷙也諸將鮮能及者即拜漢大將軍持節北發十郡突騎更始幽州牧苗曾聞之隂勒兵勅諸郡不肯應調調發也漢乃將二十騎先馳至無終無終本山戎國也無終山名因為國號漢為縣名屬右北平故城在今幽州漁陽縣也曾以漢無備出迎於路漢即撝兵騎收曾斬之而奪其軍北州震駭城邑莫不望風弭從弭猶服也遂悉發其兵引而南與光武㑹清陽諸將望見漢還士馬甚盛皆曰是寜肯分兵與人邪及漢至莫府上兵簿莫大也兵簿軍士之名帳諸將人人多請之光武曰屬者恐不與人屬猶近也今所請又何多也諸將皆慙初更始遣尚書令謝躬率六將軍攻王郎不能下㑹光武至共定邯鄲而躬禆將虜掠不相承禀光武深忌之雖俱在邯鄲遂分城而處然每有以慰安之躬勤於職事光武常稱曰謝尚書真吏也故不自疑躬既而率其兵數萬還屯扵鄴時光武南擊青犢謂躬曰我追賊於射犬必破之尤來在山陽者埶必當驚走若以君威力擊此散虜必成禽也躬曰善及青犢破而尤來果北走隆慮山躬乃留大將軍劉慶魏郡太守陳康守鄴自率諸將軍擊之窮寇死戰其鋒不可當躬遂大敗死者數千人光武因躬在外乃使漢與岑彭襲其城漢先令辯士説陳康曰盖聞上智不處危以僥倖僥猶求也中智䏻因危以為功下愚安扵危以自亡危亡之至在人所由不可不察今京師敗亂四方雲擾公所聞也蕭王兵彊士附河北歸命公所見也謝躬内背蕭王外失衆心公所知也今公據}
