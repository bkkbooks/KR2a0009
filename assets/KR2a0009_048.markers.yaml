  - {type: variant, offset: 808, length: 1, content: 補, krp: 東州新平大將軍之功也負海猾夏盗賊之處國家以為重憂且勉鎮撫之十三年增邑定封祝阿侯祝阿縣名屬平原郡眀年徵奉朝請二十三年卒子浮嗣徙封蘄春侯蘄春今蘄州縣也東觀記曰詔書以祝阿益濟南國故徙浮封蘄春侯蘄音祈浮卒子專諸嗣專諸卒子篤嗣臧宫傳臧宫字君翁潁川郟人也郏縣名今汝州郟城縣也少為縣亭長游徼續漢書曰每十里一亭亭有長以禁盗賊每鄉有游徼掌循禁姦盗也後率賔客入下江兵中為校尉因従光武征戰諸將多稱其勇光武察宫勤力少言甚親納之及至河北以為偏將軍従破羣賊數陷陳郤敵光武即位以為侍中騎都尉建武二年封成安侯成安縣名屬潁川郡眀年將突騎與征虜將軍祭遵擊更始將左防韋顔華嶠書韋字作韓於沮陽酈悉降之三年將兵徇江夏擊代鄉鍾武竹里皆下之鍾武縣名屬江夏郡故城在今申州鍾山縣西南帝使太中大夫華嶠書曰使張明也持節拜宫為輔威將軍七年更封期思侯期思縣名屬汝南郡故城在今光州固始縣西北撃梁郡濟隂皆平之十一年將兵至中盧屯駱越中盧縣名屬南郡故城在今襄州襄陽縣南盖駱越人徙於此因以為名是時}
  - {type: variant, offset: 810, length: 0, content: '', WYG: 孫述將田戎任滿與征南大將軍岑彭相拒於荆門彭等戰數不利越人謀畔從蜀宫兵少力不能制㑹屬縣送委輸車數百乗至宫夜使鋸斷城門限令車聲回轉出入至旦越人候伺者聞車聲不絶而門限斷相告以漢兵大至其渠帥乃奉牛酒以勞軍營宫陳兵大㑹擊牛釃酒饗賜慰納之釃音所宜反説文曰下酒也詩注曰以筐曰釃也越人由是遂安宫與岑彭等破荆門别至垂鵲山通道出秭歸至江州岑彭下巴郡使宫將降卒五萬從涪水上平曲公孫述將延岑盛兵於沅水沅水出廣漢解見光武紀時宫衆多食少轉輸不至而降者皆欲散畔郡邑復更保聚觀望成敗宫欲引還恐為所反反音翻㑹帝遣謁者將兵詣岑彭有馬七百匹宫矯制取以自益晨夜進兵多張旗幟登山鼓噪右歩左騎挟船而引呼聲動山谷岑不意漢兵卒至登山望之大震恐宫因從擊劉攽曰按從擊無理當作縦字大破之斬首溺死者萬餘人水為之濁流延岑奔成都其衆恙降盡獲其兵馬珍寳華嶠書曰上璽書勞宫賜吏士絳縑六千匹自是乗勝追北降者以十萬數人好陽而惡隂北方幽隂之地故軍敗者皆謂之北史記樂書曰北者敗也而近代音北為背失其指矣軍至平陽鄉蜀將王元舉衆降進拔緜竹破涪城斬公孫述弟恢復攻拔繁郫繁縣名屬蜀郡繁江名因以為縣名故城在今益州新繁縣北郫縣名屬蜀郡故城在今益州郫縣北郫音皮前後收得節五印綬千八百是時大司馬呉漢亦乗勝進營逼成都宫連屠大城兵馬旌旗甚盛乃乗兵入小雒郭門歴成都城下張載注蜀都賦云漢武帝元鼎三年立成都郭十八門小雒郭門盖其數焉至呉漢營飲酒高㑹漢見之甚歡謂宫曰將軍向者經虜城下震揚威靈風行電照然窮冦難量還營願従它道矣宫不従復路而歸賊亦不敢近之進軍咸門成都北面東頭門與呉漢並滅公孫述帝以蜀新定拜宫為廣漢太守十三年增邑更封鄼侯十五年徵還京師以列侯奉朝請定封朗陵侯朗陵縣名屬汝南郡故城在今豫州郎山縣西南十八年拜太中大夫十九年妖巫維氾弟子單臣傅鎮等復妖言相聚入原武城維或作緱劫吏人自稱將軍於是遣宫將北軍及黎陽營數千人圍之賊穀食多數攻不下士卒死傷帝召公卿諸侯王問方略皆曰宜重其購賞時顯宗為東海王獨對曰妖巫相劫埶無久立其中必有悔欲亡者但外圍急不得走耳宜小挺緩挺解也令得逃亡逃亡則一亭長足以禽矣帝然之即勑宫徹圍緩賊賊衆分散遂斬臣鎮等宫還遷城門校尉復轉左中郎將擊武谿賊至江陵降之武谿水名在今辰州盧谿縣宫以謹信質樸故常見任用後匈奴饑疫自相分争帝以問宫宫曰願得五千騎以立功帝笑曰常勝之}
