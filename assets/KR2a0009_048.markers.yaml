  - {type: variant, offset: 6668, length: 155, content: 郎將常忿疾中常侍蔡倫倫深憾之元興元年敞以祠廟嚴肅微疾不齋後鄧皇后上太傅禹冢敞起隨百官會倫因奏敞詐病坐抵罪卒于家論曰永元之際天子幼弱太后臨朝竇氏憑盛戚之權將有呂霍之變幸漢德未衰大臣方忠袁任二公正色立朝樂何之徒抗議柱下故能挾幼主之斷勦姦回之偪不然國家危矣夫竇氏之閒唯何敞可以免而特以子失交之故廢黜不顯大位惜乎過矣哉, WYG: 顛沛狼狽也顛音丁千反}
