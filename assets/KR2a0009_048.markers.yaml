  - {type: variant, offset: 46, length: 0, content: '', WYG: 周建蘇茂於彭城茂建亡奔董憲將賁休舉蘭陵城降前書有賁赫音肥今有此姓賁音奔劉攽曰注賁音奔按文多一賁字憲聞之自郯圍休時延及龐萌在楚請往救之帝勑曰可直往𢷬郯則蘭陵必自解𢷬擊也東觀記作擊字延等以賁休城危遂先赴之憲逆戰而陽敗延等遂逐退因拔圍入城劉攽曰按文多一遂字緣下有逐字誤之眀日憲大出兵合圍延等懼遽出突走因往攻郯帝讓之曰間欲先赴郯者以不意故耳今既奔走賊計已立圍豈可解乎延等至郯果不能克而董憲遂拔蘭陵殺賁休延等往来要擊憲别將於彭城郯邳之間戰或日數合頗有剋獲帝以延輕敵深入數以書誡之東觀記載延上疏辭曰臣幸得受干戈誅逆虜奉職未稱久留天誅常恐汙辱名號不及等倫}
