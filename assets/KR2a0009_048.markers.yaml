  - {type: variant, offset: 44, length: 1, content: 莽, WYG: 郎起延與呉漢同謀歸光武續漢書曰并與狐奴令王梁同勸寵延至廣阿拜偏將軍號建功侯従平河北光武即位以延為虎牙將軍建武二年更封安平侯遣南擊敖倉轉攻酸棗封丘皆拔酸棗封丘二縣名屬陳留郡酸棗故城在今滑州縣也封丘故城在今汴州縣也劉攽曰按文皆拔下不可無一之字其夏督駙馬都尉馬武騎都尉劉隆護軍都尉馬成偏將軍王覇等南伐劉永先攻拔襄邑續漢書曰時劉永别將許徳據襄邑延攻而拔之進取麻鄉麻鄉縣名故城在今宋州碭山縣東北遂圍永扵睢陽數月盡收野麦夜梯其城入永驚懼引兵走出東門東觀記云走出魚門然則東門名魚門也延追擊大破之永棄軍走譙延進攻拔薛斬其魯郡太守薛縣名屬魯國故城在今徐州滕縣東南東觀記曰魯郡太守梁丘夀也而彭城扶陽杼秋蕭皆降扶陽縣名屬沛郡杼秋縣名屬梁國故城在今徐州蕭縣西北杼音食汝反又破永沛郡太守斬之東觀記曰沛郡太守陳脩永將蘇茂佼彊周建等三萬餘人佼彊姓名也周大夫原伯佼之後也救永共攻延延與戰於沛西大破之永軍亂遁沒溺死者太半永棄城走湖陵蘇茂奔廣樂延遂定沛楚臨淮脩髙祖廟置嗇夫祝宰樂人楚即今彭城縣也臨淮郡名今泗州下邳縣髙祖廟在今徐州沛縣東故泗水亭中即髙祖為亭長之所也嗇夫主知廟事東觀記曰時蓋延因齋戒祠高祖廟三年雎陽復反城迎劉永反音翻延復率諸將圍之百日收野穀永乏食突走延追擊盡得輜重永為其將所殺永弟防舉城降四年春延又擊蘇茂周建於蘄蘄縣名屬沛郡有大澤鄉蘄音機進與董憲戰留下皆破之留縣名屬楚國故城在今徐州沛縣東南因率平敵將軍龐萌攻西防拔之西防縣名春秋時宋之西防城故城在今宋州單父縣北復追}
