  - {type: variant, offset: 956, length: 7, content: 書通議暉奏據林, WYG: 未足以為比功上烈也至於山西既定威臨天下謂誅隗囂公孫述戎羯喪其精膽羣帥賈其餘壯羯本匃奴别部分散居其上黨武鄉羯室因號羯胡此揔謂戎夷耳不指於羯也左傳曰欲勇者賈余餘勇斯誠雄心尚武之㡬先志翫兵之日㡬㑹也翫習也先志者乗勝之志也臧宫馬武之徒撫鳴劒而抵掌志馳於伊吾之北矣屈原曰撫長劒而玉珥曹植結交篇曰利劒鳴手中説文曰抵側擊也光武審黄石存包桑周易否卦九五曰其亡其亡繫于包桑}
