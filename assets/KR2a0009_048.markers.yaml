  - {type: variant, offset: 104, length: 0, content: '', WYG: 免與彼不同帝自將而東徴延與大司馬呉漢漢忠將軍王常前將軍王梁捕虜將軍馬武討虜將軍王霸等㑹任城討龐萌於桃鄉又並従征董憲於昌慮皆破平之六年春遣屯長安九年隗囂死延西撃街泉略陽清水諸屯聚皆定街泉略陽清水三縣皆屬天水郡十一年與中郎將來歙攻河池未剋以病引還拜為左馮翊將軍如故續漢書曰視事四年人敬其威信十三年增封定食萬户十五年薨於位子扶嗣扶卒子側嗣永平十三年坐與舅王平謀反伏誅國除永初七年鄧太后紹封延曾孫恢為蘆亭侯東觀記作盧亭恢卒子遂嗣陳俊傳陳俊字子昭南陽西鄂人也江夏郡有鄂故此加西也故城在}
