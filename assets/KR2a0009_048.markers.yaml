  - {type: variant, offset: 990, length: 985, content: 有詔施行暉復獨奏曰王制天子不言有無諸侯不言多少祿食之家不與百姓爭利今均輸之法與賈販無異鹽利歸官則下人窮怨布帛為租則吏多姦盜誠非明主所當宜行帝卒以林等言為然得暉重議因發怒切責諸尚書暉等皆自繫獄三日詔敕出之曰國家樂聞駮議黃髮無愆詔書過耳何故自繫暉因稱病篤不肯復署議尚書令以下惶怖謂暉曰今臨得譴讓柰何稱病其禍不細暉曰行年八十蒙恩得在機密當以死報若心知不可而順旨雷同負臣子之義今耳目無所聞見伏待死命遂閉口不復言諸尚書不知所為乃共劾奏暉帝意解寑其事後數日詔使直事郎問暉起居太醫視疾太官賜食暉乃起謝復賜錢十萬布百匹衣十領後遷為尚書令以老病乞身拜騎都尉賜錢二十萬和帝即位竇憲北征匈奴暉復上疏諫頃之病卒子頡修儒術安帝時至陳相頡子穆穆字公叔年五歲便有孝稱父母有病輒不飲食差乃復常及壯耽學銳意講誦或時思至不自知亡失衣冠顛隊阬岸其父常以為專愚幾不知數馬足穆愈更精篤初舉孝廉順帝末江淮盜賊羣起州郡不能禁或說大將軍梁冀曰朱公叔兼資文武海內奇士若以為謀主賊不足平也冀亦素聞穆名乃辟之使典兵事甚見親任及桓帝即位順烈太后臨朝穆以冀埶地親重望有以扶持王室因推災異奏記以勸戒冀曰穆伏念明年丁亥之歲刑德合於乾位易經龍戰之會其文曰龍戰于野其道窮也謂陽道將勝而陰道負也今年九月天氣鬱冒五位四候連失正氣此互相明也夫善道屬陽惡道屬陰若修正守陽摧折惡類則福從之矣穆每事不逮所好唯學傳受於師時有可試願將軍少察愚言申納諸儒而親其忠正絕其姑息專心公朝割除私欲廣求賢能斥遠佞惡夫人君不可不學當以天地順道漸漬其心宜為皇帝選置師傅及侍講者得小心忠篤敦禮之士將軍與之俱入參勸講授師賢法古此猶倚南山坐平原也誰能傾之今年夏月暈房星明年當有小戹宜急誅姦臣為天下所怨毒者以塞災咎議郎大夫之位本以式序儒術高行之士今多非其人九卿之中亦有乖其任者惟將軍察焉又薦种暠欒巴等而明年嚴鮪謀立清河王蒜又黃龍二見沛國冀無術學遂以穆龍戰之言為應於是請暠為從事中郎薦巴為議郎舉穆高第為侍御史時同郡趙康叔盛者隱于武當山清靜不仕以經傳教授穆時年五十乃奉書稱弟子及康歿喪之如師其尊德重道為當時所服常感時澆薄慕尚敦篤乃作崇厚論其辭曰夫俗之薄也有自來矣故仲尼歎曰大道之行也而丘不與焉蓋傷之也夫道者以天下為一在彼猶在己也故行違於道則愧生於心非畏義也事違於理則負結于意非憚禮也故率性而行謂之道得其天性謂之德德性失然後貴仁義是以仁義起而道德遷禮法興而淳樸散故道德以仁義為薄淳樸, WYG: 質卑詞幣}
