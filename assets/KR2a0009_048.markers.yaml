  - {type: variant, offset: 785, length: 1, content: 暉, WYG: 行大將軍事張歩聞之遣其將擊俊戰於嬴下續漢書曰嬴縣名屬太山郡嬴音盈俊大破之追至濟南收得印綬九十餘歩時擬私封爵人之印綬稍攻下諸縣遂定太山五年與建威大將軍耿弇共破張歩事在弇傳時琅邪未平乃徙俊為琅邪太守領將軍如故齊地素聞俊名入界盗賊皆解散俊將兵擊董憲於贛榆贛榆縣名屬東海郡贛音貢進破朐賊孫陽平之八年張歩畔還琅邪俊追討斬之帝美其功詔俊得專征青徐華嶠書曰賜俊璽書曰將軍元勲大著威震青徐兩州有警得專征之俊得撫貧弱表有義檢制軍吏不得與郡縣相干百姓歌之數}
