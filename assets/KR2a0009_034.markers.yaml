  - {type: variant, offset: 2981, length: 525, content: 顗又上書薦黃瓊李固并陳消災之術曰臣前對七事要政急務宜於今者所當施用誠知愚淺不合聖聽人賤言廢當受誅罰征營惶怖靡知厝身為用文武創德周召作輔是以能建天地之功增日月之耀者也詩云赫赫王命仲山甫將之邦國若否仲山甫明之宣王是賴以致雍熙陛下踐祚以來勤心庶政而三九之位未見其人是以災害屢臻四國未寧臣考之國典驗之聞見莫不以得賢為功失士為敗且賢者出處翔而後集爵以德進則其情不苟然後使君子恥貧賤而樂富貴矣若有德不報有言不醻來無所樂進無所趨則皆懷歸藪澤修其故志矣夫求賢者上以承天下以為人不用之則逆天統違人望逆天統則災眚降違人望則化不行災眚降則下呼嗟化不行則君道虧四始之缺五際之戹其咎由此豈可不剛健篤實矜矜慄慄以守天功盛德大業乎從政明達變復朝廷前加優寵賓于上位瓊入朝日淺謀謨未就因以喪病致命遂志老子曰大音希聲大器晚成善人為國三年乃立天下莫不嘉朝廷有此良人而復怪其不時還任陛下宜加隆崇之恩極養賢之禮徵反京師以慰天下又處士漢中李固年四十通游夏之蓺履顏閔之仁絜白之節情同皦日忠貞之操好是正直卓冠古人當世莫及元精所生王之佐臣天之生固必為聖漢宜蒙特徵以示四方夫有出倫之才不應限以官次昔顏子十八天下歸仁子奇稺齒化阿有聲若還瓊徵固任以時政伊尹傅說不足為比則可垂景光致休祥矣臣顗明不知人伏聽衆言, WYG: ''}
