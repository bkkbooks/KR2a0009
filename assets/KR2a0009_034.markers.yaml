  - {type: variant, offset: 5097, length: 818, content: 漢誅莽光武復興虛言猶然況於實邪夫星辰麗天猶萬國之附王者也下將畔上故星亦畔天石者安類墜者失埶春秋五石隕宋其後襄公為楚所執秦之亡也石隕東郡今隕扶風與先帝園陵相近不有大喪必有畔逆清者屬陽濁者屬陰河當濁而反清者陰欲為陽諸侯欲為帝也太學天子教化之宮其門無故自壞者言文德將喪教化廢也京房易傳曰河水清天下平今天垂異地吐妖人厲疫三者並時而有河清猶春秋麟不當見而見孔子書之以為異也物有微而志信人有賤而言忠臣雖至賤誠願賜清閒極盡所言十餘日復上書曰臣伏見太白北入數日復出東方其占當有大兵中國弱四夷彊臣又推步熒惑今當出而潛必有陰謀皆由獄多冤結忠臣被戮德星所以久守執法亦為此也陛下宜承天意理察冤獄為劉成虧除罪辟追錄李雲杜衆等子孫宮崇所獻神書專以奉天地順五行為本亦有興國廣嗣之術其文易曉參同經典而順帝不行故國胤不興孝沖孝質頻世短祚申休宋萬彭生任鄙之徒生於其時殷紂好色妲己是出葉公好龍真龍游廷今黃門常侍天刑之人陛下愛待兼倍常寵係嗣未兆豈不為此天官宦者星不在紫宮而在天市明當給使主市里也今乃反處常伯之位實非天意陛下嗜欲不去殺罰過理既乖其道豈獲其祚哉或言老子入夷狄為浮屠浮屠不三宿桑下不欲久生恩愛精之至也天神遺以好女浮屠曰此但革囊盛血遂不眄之其守一如此乃能成道今陛下婬女豔婦極天下之麗甘肥飲美單天下之味柰何欲如黃老乎書上即召詔詣尚書問狀楷曰臣聞古者本無宦臣武帝末春秋高數游後宮始置之耳後稍見任至於順帝遂益繁熾今陛下爵之十倍於前至今無繼嗣者豈獨好之而使之然乎尚書上其對詔下有司處正尚書承旨奏曰其宦者之官非近世所置漢初張澤為大謁者佐絳侯誅諸呂孝文使趙談參乘而子孫昌盛楷不正辭理指陳要務而析言破律違背經蓺假借星宿偽託神靈造合私意誣上罔事請下司隸正楷罪法收送洛陽獄帝以楷言雖激切然皆天文恆象之數故不誅猶司寇論刑初順帝時琅邪宮崇詣闕上其師干吉於曲陽泉水上所得神書百七十卷皆縹白素朱介青首朱目號太平清領書其言以陰陽五行為家而多巫覡雜語有司奏崇所上妖妄不經乃收臧之後張角頗有其書焉及靈, WYG: 罷和}
