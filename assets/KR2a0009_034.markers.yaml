  - {type: variant, offset: 791, length: 0, content: '', WYG: 賢佞朱紫錯用丞相故事四科取士一曰徳行髙妙志節清白二曰學通行脩經中博士三曰明達法令足以決疑能案章覆問文中御史四曰剛毅多畧遭事不惑明足以決才任三輔令皆有孝悌亷公之行自今以後審四科辟召及刺史二千石察茂才尤異孝亷之吏務盡實覈選擇英俊賢行亷潔平端於縣邑務授試以職有非其人臨計過署不便習官事書疏不端正不如詔書有司奏罪名并正舉者又舊河隄謁者世祖改以三府掾屬為謁者領之遷超御史中丞刺史或為小郡監察黎陽謁者世祖以幽并州兵騎定天下故於黎陽立營以謁者監之兵騎千人復除甚重謁者任輕多放情態順帝改用公解府掾有清名威重者遷超}
