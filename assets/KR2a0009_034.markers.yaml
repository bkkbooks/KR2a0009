  - {type: variant, offset: 1562, length: 0, content: '', krp: 乙未詔書三公舉茂才各一人亷吏各二人光祿嵗舉茂才四行各一人察亷吏三人中二千石嵗察亷吏各一人廷尉大司農各二人將兵將軍嵗察亷吏各二人監察御史司𨽻州牧嵗舉茂才各一人令史及御屬}
  - {type: variant, offset: 1564, length: 0, content: '', WYG: 三人本注曰漢舊注公令史百石自中興以後注不説石數御屬主為公御荀綽晉百官表注曰御屬如錄事也閤下令史主閤下威儀事記室令史主上表章報書記門令史主府門其餘令史各典曹文書應劭漢官儀有官騎三十人司徒公一人孔安國曰主徒衆教以禮義本注曰掌人民事凡教民孝悌遜順謙儉養生送死之事則議其制建其度凡}
