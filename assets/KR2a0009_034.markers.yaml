  - {type: variant, offset: 5027, length: 9, content: 符瑞或聞河內龍死諱, WYG: 卿號故置大司馬官號以冠之其後霍光王鳳等皆然成帝綏和元年賜大司馬印綬罷將軍官世祖中興吳漢以大將軍為大司馬景丹為驃騎大將軍位在公下及前後左右雜號將軍衆多皆主征伐事訖皆罷魏畧曰曹公置都䕶軍中尉置䕶軍將軍亦皆比二千石旋軍並止罷明帝初即位以弟東平王蒼有賢才}
