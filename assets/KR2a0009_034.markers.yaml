  - {type: variant, offset: 186, length: 1, content: 災, WYG: 平子為侍中典校書方作周官解説乃欲以漢次述漢事㑹復遷河間相遂莫能立也述作之功獨不易矣既感斯言顧見故新汲令王文山小學為漢官篇畧道公卿内外之職旁及四夷博物條暢多所發明足以知舊制儀品蓋法有成易而道有因革是以聊集所宜為作詁解各隨其下綴續後事令世施行庶明厥㫖廣前後憤盈之念増助來哲多聞之覽焉唯班固著百官公卿表記漢承秦置官本末訖于王莽差有條貫然皆孝武奢廣之事又職分未悉世祖節約之制宜為常憲故依其官簿粗注職分以為百官志臣昭曰本志既久是注曰百官簿今昭又採}
  - {type: variant, offset: 186, length: 1, content: 災, krp: 平子為侍中典校書方作周官解説乃欲以漢次述漢事㑹復遷河間相遂莫能立也述作之功獨不易矣既感斯言顧見故新汲令王文山小學為漢官篇畧道公卿内外之職旁及四夷博物條暢多所發明足以知舊制儀品蓋法有成易而道有因革是以聊集所宜為作詁解各隨其下綴續後事令世施行庶明厥㫖廣前後憤盈之念増助來哲多聞之覽焉唯班固著百官公卿表記漢承秦置官本末訖于王莽差有條貫然皆孝武奢廣之事又職分未悉世祖節約之制宜為常憲故依其官簿粗注職分以為百官志臣昭曰本志既久是注曰百官簿今昭又採}
