  - {type: variant, offset: 1104, length: 455, content: 七日戊午徵日也日加申風從寅來丑時而止丑寅申皆徵也不有火災必當為旱願陛下校計繕修之費永念百姓之勞罷將作之官減彫文之飾損庖廚之饌退宴私之樂易中孚傳曰陽感天不旋日如是則景雲降集眚沴息矣道人也寒溫為實清濁為貌今三公皆令色足恭外厲內荏以虛事上無佐國之實故清濁效而寒溫不效也是以陰寒侵犯消息占曰日乘則有妖風日蒙則有地裂如是三年則致日食陰侵其陽漸積所致立春前後溫氣應節者詔令寬也其後復寒者無寬之實也夫十室之邑必有忠信率土之人豈無貞賢未聞朝廷有所賞拔非所以求善贊務弘濟元元宜採納良臣以助聖化驚動涉歷天門災成戊己今春當旱夏必有水臣以六日七分候之可知夫災眚之來緣類而應行有玷缺則氣逆于天精感變出以戒人君王者之義時有不登則損滋徹膳數年以來穀收稍減家貧戶饉歲不如昔百姓不足君誰與足水旱之災雖尚未至然君子遠覽防微慮萌老子曰人之飢也以其上食稅之多也故孝文皇帝綈袍革舄木器無文約身薄賦時致升平今陛下聖德中興宜遵前典惟節惟約天下幸甚易曰天道無親常與善人是故高宗以享福宋景以延年十六日在婁五度推步三統熒惑今當在翼九度今反在柳三度則不及五十餘度去, WYG: 二}
