  - {type: variant, offset: 1895, length: 774, content: 宮無節政教亂逆威武衰微則此三星以應之也罰者白虎其宿主兵其國趙魏變見西方亦應三輔凡金氣為變發在秋節臣恐立秋以後趙魏關西將有羌寇畔戾之患宜豫宣告諸郡使敬授人時輕徭役薄賦斂勿妄繕起堅倉獄備守衞回選賢能以鎮撫之金精之變責歸上司宜以五月丙午遣太尉服干戚建井旟書玉板之策引白氣之異於西郊責躬求愆謝咎皇天消滅妖氣蓋以火勝金轉禍為福也日中者侵太陽也見於春者政變常也方今中官外司各各考事其所考者或非急務又恭陵火災主名未立多所收捕備經考毒尋火為天戒以悟人君可順而不可違可敬而不可慢陛下宜恭己內省以備後災凡諸考案并須立秋又易傳曰公能其事序賢進士後必有喜反之則白虹貫日以甲乙見者則譴在中台自司徒居位陰陽多謬久無虛己進賢之策天下興議異人同咨且立春以來金氣再見金能勝木必有兵氣宜黜司徒以應天意陛下不早攘之將負臣言遺患百姓年詩氾歷樞曰卯酉為革政午亥為革命神在天門出入候聽言神在戌亥司候帝王興衰得失厥善則昌厥惡則亡於易雄雌祕歷今值困乏凡九二困者衆小人欲共困害君子也經曰困而不失其所其唯君子乎唯獨賢聖之君遭困遇險能致命遂志不去其道陛下乃者潛龍養德幽隱屈戹即位之元紫宮驚動歷運之會時氣已應然猶恐妖祥未盡君子思患而豫防之臣以為戌仲已竟來年入季文帝改法除肉刑之罪至今適三百載宜因斯際大蠲法令官名稱號輿服器械事有所更變大為小去奢就儉機衡之政除煩為簡改元更始招求幽隱舉方正徵有道博採異謀開不諱之路臣陳引際會恐犯忌諱書不盡言未敢究暢臺詰顗曰對云白虹貫日政變常也朝廷率由舊章何所變易而言變常又言當大蠲法令革易官號或云變常以致災或改舊以除異何也又陽嘉初建復欲改元據何經典其以實對顗對曰方春東作布德之元陽氣開發養導萬物王者因天視聽奉順時氣宜務崇溫柔遵其行令而今立春之後考事不息秋冬之政行乎春夏故白虹春見掩蔽日曜凡邪氣乘陽則虹蜺在日斯皆臣下執事刻急所致殆非朝廷優寬之本此其變常之咎也又今選舉皆歸三司非有, WYG: 山祝恬踐}
