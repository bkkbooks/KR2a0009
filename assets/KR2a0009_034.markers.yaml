  - {type: variant, offset: 1565, length: 8, content: 日戊辰熒惑歷輿鬼, WYG: 方民事功課嵗盡則奏其殿最而行賞罰凡郊祀之事掌省牲視濯大喪則掌奉安梓宫凡國有大疑大事與太尉同世祖即位為大司徒漢官儀曰王莽時議以漢無司徒官故定三公之號曰大司馬大司徒大司空世祖即位因而不改蔡質漢儀曰司徒府與蒼龍闕對厭於尊者不敢號府應劭曰此不然丞相舊位在長安時府有四出門隨時聴事明帝本欲依之迫於太尉司空但為}
