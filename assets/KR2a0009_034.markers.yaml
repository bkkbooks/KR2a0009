  - {type: variant, offset: 4725, length: 6, content: 俱入軒轅逆行, WYG: 辰失度災變非常則責之司馬山陵崩阤川谷不通五穀不植草木不茂則責之司空君臣不正人道不和國多盜賊民怨其上則責之司徒故三公典其職憂其分舉其辨明其得此之謂三公之事世祖即位為大司空應劭漢官儀曰綏和元年罷御史大夫官法周制初置司空議者初以縣道官獄司空故覆加大為大司空亦所以别大小之文建武二十七年去大漢舊儀曰御史大夫勅上計丞長史曰詔書殿下布告郡國臣下承宣無狀多不宄百姓不蒙恩被化守長史到郡與二千石同力為民興利除害務有以安之稱詔書郡國有茂才不顯者言殘民貪汚煩擾之吏百姓所苦務勿任用方察不稱者刑罰務於得中惡惡止其身選舉民侈過度務有以化之問今嵗善惡孰與往年對上問今年盜賊孰與往年得無有羣輩大賊對上臣昭案獻帝建安十三年又罷司空置御史大夫御史大夫郗慮慮免不得補荀綽晉百官表注曰獻帝置御史大夫職如司空不領侍御史屬長史一人千石掾屬二十九人漢官目錄云二十四人令史及御屬}
