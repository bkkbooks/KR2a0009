  - {type: 'tls:seg', offset: 190, content: '', id: KR2a0009_ZHSJ_034-d34p4s3}
  - {type: variant, offset: 190, length: 0, content: '', WYG: 者既在漢書百官表不復悉載太傅上公一人大戴記曰傅傅之徳義也應劭漢官儀曰傅者覆也賈生曰天子不喻於先聖之徳不知君民之道不見禮義之正詩書無宗學業不法此太師之責也古者齊太公職之天子不惠於庶民不禮於大臣不中於折獄無經於百官不哀於䘮不敬於祭不戒於齊不信於事此太傅之責也古者周公職之天子處位不端受業不敬言語不叙音聲不中進退升降不以禮俯仰周旋無節此太保之責也古者燕召公職之天子燕業反其學左右之習詭其師荅諸侯遇大臣不知文雅之辭言語之道簡聞少誦不博不習此少師之責也天子居處出入不以禮衣服冠帶不以制御器列側不以度采服從好不以章忿悦不以義與奪不以節此少傅之責也天子居處燕私安而易樂而耽飲食不時醉飽不節寢起早晏無常玩好器弄無制此少保之責也此古天子自輔弼之禮也自為天子而賢智維之故能慮無失計舉無過事終身得中本注曰掌以善導無常職世祖以卓茂為太傅薨因省其後每帝初即位輙置太傅錄尚書事薨輙省胡廣注曰猶古冢宰總己之義也案靈帝之初以陳蕃為太傅蕃誅以胡廣代始不止一人也董卓在長安又自尊為太師位在太傅上應劭漢官儀曰太師古官也平帝元年孔光以太𫝊見授詔太師無朝十日一賜餐賜靈夀杖省中施坐置几太師入省中用杖自是而闕又漢官云太傅長史一人秩千石掾屬二十四人令史御屬二十二人荀綽晉百官表注曰漢太傅置掾屬十人御屬一人令史十二人置長史與漢異太尉公一人應劭曰自上安下曰尉武官悉以為稱前書曰秦官鄭𤣥注月令亦曰秦官尚書中候云舜為太尉束晳據非秦官以此追難𤣥焉臣昭曰緯候衆書宗貴神詭出沒隱顯動挾誕怪該覈隂}
  - {type: page-break, offset: 190, content: '', id: KR2a0009_WYG_034-3a, image: WYG0252/WYG0252-0412c.png}
  - {type: page-break, offset: 190, content: '', id: KR2a0009_WYG_034-3b, image: WYG0252/WYG0252-0412d.png}
