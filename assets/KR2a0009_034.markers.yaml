  - {type: variant, offset: 218, length: 0, content: '', WYG: 别異大小司馬之號建武二十七年改為太尉蔡質漢儀曰府開闕王莽初起大司馬後簒盜神器故遂貶去其闕漢官儀曰張衡云明帝以司馬司空府欲復更太尉府時公趙熹也西曹掾安衆鄭均素好名節以為朝廷新造北宫整飭官寺旱魃為虐民不堪命曾無殷湯六事周宣雲漢之辭今府本館陶公主第舎員職既少自足相容熹表陳之即聴許其冬臨辟雍歴二府見皆壯麗而太尉府獨卑陋顯宗東顧歎息曰椎牛縱酒勿令乞兒為宰時熹子世為侍中驂乗歸具白之熹以為恨頻}
