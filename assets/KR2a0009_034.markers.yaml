  - {type: variant, offset: 191, length: 1, content: 嘉, WYG: 徼迎起伏或有先徴時能後驗故守寄搆思雜稱曉輔通儒達好時畧文滯公輸益州具於張衡之詰無口漢輔炳乎尹敏之諷圖䜟紛偽其俗多矣太尉官實司天虞舜作宰璇衡賦政將是據後位以書前非唐官之實號乎太尉所職即舜所掌遂以同掌追稱太尉乃中候之妄蓋非官之為謬康成淵博自注中候裁及注禮而忘舜位豈其實哉此是不發譏於中候而正之於月令也廣微之誚未探碩意説苑曰當堯之時舜為司徒新論曰昔堯試於大麓者領錄天子事如今尚書官矣古史考曰舜居百揆總領百事説者以百揆堯初别置於周更名冢宰斯其然矣本注曰掌四方兵事功課嵗盡即奏其殿最而行賞罰凡郊祀之事掌亞獻大喪則告諡南郊凡國有大造大疑則與司徒司空通而論之國有過事則與}
