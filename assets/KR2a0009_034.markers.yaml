  - {type: variant, offset: 4549, length: 167, content: 臣聞皇天不言以文象設教堯舜雖聖必歷象日月星辰察五緯所在故能享百年之壽為萬世之法臣竊見去歲五月熒惑入太微犯帝坐出端門不軌常道其閏月庚辰太白入房犯心小星震動中耀中燿天王也傍小星者天王子也夫太微天廷五帝之坐而金火罰星揚光其中於占天子凶又俱入房心法無繼嗣今年歲星久守太微逆行西至掖門還切執法歲為木精好生惡殺而淹留不去者咎在仁德不修誅罰太酷前七, WYG: 建安八}
