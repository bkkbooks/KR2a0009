  - {type: variant, offset: 3567, length: 849, content: 此則天文昭爛星辰顯列五緯循軌四時和睦不則太陽不光天地溷濁時氣錯逆霾霧蔽日自立春以來累經旬朔未見仁德有所施布但聞罪罰考掠之聲夫天之應人疾於景響而自從入歲常有蒙氣月不舒光日不宣曜日者太陽以象人君政變於下日應於天清濁之占隨政抑揚天之見異事無虛作豈獨陛下倦於萬機帷幄之政有所闕歟何天戒之數見也臣願陛下發揚乾剛援引賢能勤求機衡之寄以獲斷金之利臣之所陳輒以太陽為先者明其不可久闇急當改正其異雖微其事甚重臣言雖約其旨甚廣惟陛下乃眷臣章深留明思事消息之卦也於此六日之中靁當發聲發聲則歲氣和王道興也易曰靁出地奮豫先王以作樂崇德殷薦之上帝靁者所以開發萌牙辟陰除害萬物須靁而解資雨而潤故經曰靁以動之雨以潤之王者崇寬大順春令則靁應節不則發動於冬當震反潛故易傳曰當靁不靁太陽弱也今蒙氣不除日月變色則其效也天網恢恢疏而不失隨時進退應政得失大人者與天地合其德與日月合其明琁璣動作與天相應靁者號令其德生養號令殆廢當生而殺則靁反作其時無歲陛下若欲除災昭祉順天致和宜察臣下尤酷害者亟加斥黜以安黎元則太皓悅和靁聲乃發數寸光芒交接房心者天帝明堂布政之宮孝經鉤命決曰歲星守心年穀豐尚書洪範記曰月行中道移節應期德厚受福重華留之重華者謂歲星在心也今太白從之交合明堂金木相賊而反同合此以陰陵陽臣下專權之異也房心東方其國主宋石氏經曰歲星出左有年出右無年今金木俱東歲星在南是為出右恐年穀不成宋人飢也陛下宜審詳明堂布政之務然後妖異可消五緯順序矣僭陽者祿去公室臣下專權也自冬涉春訖無嘉澤數有西風反逆時節朝廷勞心廣為禱祈薦祭山川暴龍移市臣聞皇天感物不為偽動災變應人要在責己若令雨可請降水可攘止則歲無隔并太平可待然而災害不息者患不在此也立春以來未見朝廷賞錄有功表顯有德存問孤寡賑恤貧弱而但見洛陽都官奔車東西收繫纖介牢獄充盈臣聞恭陵火處比有光曜明此天災非人之咎丁丑大風掩蔽天地風者號令天之威怒皆所以感悟人君忠厚之戒又連月無雨將害宿麥若一穀不登則飢者十三四矣陛下誠宜廣被恩澤貸贍元元昔堯遭九年之水人有十載之蓄者簡稅防災為其方也願陛下早宣德澤以應天功若臣言不用朝政, WYG: 法且案}
