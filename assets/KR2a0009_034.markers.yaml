  - {type: punctuation, offset: 365, content: 「, id: KR2a0009_ZHSJ_034-bkkpn88}
  - {type: variant, offset: 365, length: 300, content: 君子不思遵利茲謂無澤厥災孽火燒其宮又曰君高臺府犯陰侵陽厥災火又曰上不儉下不節炎火並作燒君室自頃繕理西苑修復太學宮殿官府多所搆飾昔盤庚遷殷去奢即儉夏后卑室盡力致美又魯人為長府閔子騫曰仍舊貫何必改作臣愚以為諸所繕修事可省減稟卹貧人賑贍孤寡此天之意也人之慶也仁之本也儉之要也焉有應天養人為仁為儉而不降福者哉傳曰久陰不雨亂氣也蒙之比也蒙者君臣上下相冒亂也又曰欲德不用厥異常陰夫賢者化之本雲者雨之具也得賢而不用猶久陰而不雨也又頃前數日寒過其節冰既解釋還復凝合夫寒往則暑來暑往則寒來此言日月相推寒暑相避以成物也今立春之後火卦用事當溫而寒違反時節由功賞不至而刑罰必加也宜須立秋順氣行罰盈縮往來涉歷輿鬼環繞軒轅火精南, WYG: 世祖詔}
