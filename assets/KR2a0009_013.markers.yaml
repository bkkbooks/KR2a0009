合月以合積月乗積合為小積又以月餘乗積合滿其月法得一從小積為月餘積月滿紀月去之餘為入紀月毎以章閏乗之滿章月得一為閏不盡為閏餘以閏減入紀月其餘以十二去之餘為入嵗月數從天正十一月起算外星合所在之月也其閏滿二百二十四以上至二百三十一星合閏月閏或進退以朔制之推朔日以蔀日乗之入紀月滿蔀月得一為積日不盡為小餘積日滿六十去之餘為大餘命以甲子算外星合月朔日推入月日以蔀日乗月餘以其月法乗朔小餘從之以四千四百六十五約之所得得滿日度法得一為入月日不盡為日餘以朔命入月日算外星合日也推合度以周天乗度分滿日度法得一為積度不盡為度餘以斗二十一四分一命度算外星合所在度也一術加退嵗一以減上元滿八十除去之餘以沒數乗之滿日法得一為大餘不盡為小餘以甲子命大餘則星合嵗天正冬至日也以周率小餘幷度餘餘滿日度法從度即正後星合日數也命以冬至求後合月加合積月於入嵗月加月餘於月餘滿其月法得一從入嵗月入嵗月滿十二去之有閏計焉餘命如前算外後合月也餘一加晨得夕加夕得晨求朔日以大小餘加今所得其月餘得一月者又餘二十九小餘滿蔀月得一如大餘大餘命如前求入月日以入月日餘加今所得餘滿日度法得一從日其前合月朔小餘不滿其虚分者空加一日日滿月先去二十九其後合月朔小餘不滿四百九十九又減一日其餘命如前求合度以積度度餘加今所得餘滿日度法得一從度命如前經斗除如周率矣木晨伏十六日七千二百二十分半行二度萬三千八百一十一分在日後十三度有竒而見東方見順日行五十八分度之十一五十八日行十一度微遲日行九分五十八日行九度留不行二十五日旋逆日行七分度之一八十四日進十二度復留二十五日復順五十八日行九度又五十八日行十一度在日前十三度有竒而夕伏西方除伏逆一見三百六十六日行二十八度伏復十六日七千二百二十二分半行二度萬三千八百一十一分而與日合凡一終三百九十八日有萬四千六百四十一分行星三十二度與萬三百一十四分通率日行四千七百二十五分之三百九十八火晨伏七十一日二千六百九十四分行五十五度二千二百五十四分半在日後十六度有竒而見東方見順日行二十三分度之十四八十四日行一十二度㣲遲日行十二分九十二日行四十八度留不行十一日旋逆日行六十二分度之十七六十二日退十七度復留十一日復順九十二日行四十八度又百八十四日行百一十二度在日前十六度有竒而夕伏西方除伏逆一見六百三十六日行百三度伏復七十一日二千六百九十四分行五十五度二千二百五十四分半而與日合凡一終七百七十九日有千八百七十二分行星四百一十四度與九百九十三分通率日行千八百七十六分之九百九十七土晨伏十九日千八十一分半行三度萬四千七百二十五分半在日後十五度有竒而見東方見順日行四十三分度之三八十六日行六度留不行三十三日旋逆日行十七分度之一百二日退六度復留三十三日復順八十六日行六度在日前十五度有竒而夕伏西方除伏逆見三百四十日行六度伏復十九日千八十一分半行三度萬四千七百二十五分半與日合凡一終三百七十八日有二千一百六十三分行星十二度與二萬九千四百五十一分通率日行九千四百一十五分之三百一十九金晨伏五日退四度在日後九度而見東方見逆日行五分度之三十三四十六日行三十三度而日行一度六分度之三十三四十六日行三十三度而日行一度九十分度之十五九十一日行六百度益疾日行一度二十二分九十一日行百一十三度在日後九度而晨伏東方除伏逆一見二百四十六日行二百四十六度伏四十一日二百八十一分行五十度二百八十一分而與日合一合二百九十二日百八十一分行星如之金夕伏四十一日二百八十一分行五十度二百八十一分在日前九度而見西方見順疾日行一度九十一分度之二十二九十一日行百一十三度㣲遲日行一度十五分九十一日行百六度而進日行四十六分度之三十三四十六日行三十三度留不行八日旋逆日行五分度之三十日退六度在日前九度而夕伏西方除伏逆一見二百四十六日行二百四十六度伏五日退四度而後合凡三合一終五百八十四日有五百六十二分行星如之通率日行一度水晨伏九日退七度在日後十六度而見東方見逆一日退一度留不行二日旋順日行九分度之八九日行八度而疾日行一度四分度之一二十日行二十五度在日後十六度而晨伏東方除伏逆一見三十二日行三十二度伏十六日四萬四千八百五分行三十二度四萬四千八百五分而與日合一合五十七日有四萬四千八百五分行星如之水夕伏十六日四萬四千八百五分行三十二度四萬四千八百五分在日前十六度而見西方見順疾日行一度四分度之一二十日行二十五度而遲日行九分度之八九日行八度留不行二日逆一日退一度在日前十六度而夕伏西方除伏逆一見三十二日行三十度伏九日退七度而復合凡再合一終百一十五日有四萬一千九百七十八分行星如之通率日行一度歩術以歩法伏日度分如星合日度餘命之如前得星見日度也術分母乗之分日如度法而一分不盡如法半以上亦得一而日加所行分滿其母得一度逆順母不同以當行之母乗故分如故母如一也留者承前逆則減之伏不書度經斗除如行母四分具一其分有損益前後相放其以赤道命度進加退減之其歩以黄道日名天正十一月十二月正月二月三月四月五月六月七月八月九月十月冬至大寒雨水春分糓雨小滿夏至大暑處暑秋分霜降小雪月令章句孟春以立春為節驚蟄為中中必在其月節不必在其月據孟春之驚蟄在十六日以後立春在正月驚蟄在十五日以前立春在徃年十二月斗二十六四分退二牛八女十二進二虛十進三危十六進二室十六進二壁十進二北方九十八度四分一奎十六婁十二進二胃十四進二昴十一進二畢十六進二觜二退二參九退四西方八十度井三十三退三鬼四柳十五星七進一張十八進一翼十八進一軫十七進一南方百一十二度角十二亢九退一氐十五退二房五退三心五退三尾十八進三箕十一退三東方七十五度右赤道度周天三百六十五度四分一斗二十四進一牛七女十一虛十危十六室十八壁十北方九十六度四分一奎十七婁十二胃十五昴十二畢十六觜三參八西方八十三度井三十鬼四柳十四星七張十七翼十九軫十八南方百九度角十三亢十氏十六房五心五尾十八箕十東方七十七度右黄道度三百六十五四分一黄道去極日景之生據儀表也漏刻之生以去極逺近差乗節氣之差如逺近而差一刻以相增損昬明之生以天度乗晝漏夜漏減三百而一為定度以減天度餘為明加定度一為昬其餘四之如法為少不盡三之如法為強餘半法以上以成強強三為少少四為度其強二為少弱也又以日度餘為少强而各加焉張衡渾儀曰赤道横帶渾天之腹去極九十一度十分之五黄道斜帶其腹出赤道表裏各二十四度故夏至去極六十七度而強冬至去極百一十五度亦強也然則黄道斜截赤道者則春分秋分之去極也今此春分去極九十少秋分去極九十一少者就夏厯景去極之法以為率也上頭横行}
