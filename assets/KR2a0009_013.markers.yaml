  - {type: variant, offset: 374, length: 288, content: 諸將遂共議立更始為天子二月辛巳設壇場於淯水上沙中陳兵大會更始即帝位南面立朝羣臣素懦弱羞愧流汗舉手不能言於是大赦天下建元曰更始元年悉拜置諸將以族父良為國三老王匡為定國上公王鳳成國上公朱鮪大司馬伯升大司徒陳牧大司空餘皆九卿將軍五月伯升拔宛六月更始入都宛城盡封宗室及諸將為列侯者百餘人更始忌伯升威名遂誅之以光祿勳劉賜為大司徒前鍾武侯劉望起兵略有汝南時王莽納言將軍嚴尤秩宗將軍陳茂既敗於昆陽往歸之八月望遂自立為天子以尤為大司馬茂為丞相王莽使太師王匡國將哀章守洛陽更始遣定國上公王匡攻洛陽西屏大將軍申屠建丞相司直李松攻武關三輔震動是時海內豪桀翕然響應皆殺其牧守自稱將軍用漢年號以待詔命旬, WYG: ''}
