  - {type: variant, offset: 27, length: 0, content: '', krp: 漢書十志下盡王莽而世祖以来唯有紀傳無續志者臣所師事故太傅胡廣知臣頗識其門户略以所有舊事雖未備悉粗見首尾積累思惟二十餘年不在其位非外吏庶}
  - {type: variant, offset: 29, length: 3, content: 殺聖公, WYG: 得擅述天誘其𠂻得備著作郎建言十志皆當撰録遂與議郎張華等分受之所使元順難者皆以付臣先治律厯以籌算為本天文為驗請太師舊注考校連年徃徃頗有差舛當有增損乃可施行為無窮法道至深㣲不敢獨議郎中劉洪宻於用算故臣表上洪與共參思圖牒尋繹適冇頭角㑹臣被罪遂放邉野臣竊自痛一為不善使史籍所闕胡廣所校二十年之恩中道廢絶不得䆒竟慺慺之情猶以}
