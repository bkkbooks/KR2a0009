  - {type: variant, offset: 2557, length: 1372, content: 也於是祿使從兵與更始共牧馬於郊下因令縊殺之劉恭夜往收臧其屍光武聞而傷焉詔大司徒鄧禹葬之於霸陵有三子求歆鯉明年夏求兄弟與母東詣洛陽帝封求為襄邑侯奉更始祀歆為穀孰侯鯉為壽光侯求後徙封成陽侯求卒子巡嗣復徙封灌濩澤侯巡卒子姚嗣論曰周武王觀兵孟津退而還師以為紂未可伐斯時有未至者也漢起驅輕黠烏合之衆不當天下萬分之一而旌旃之所撝及書文之所通被莫不折戈頓顙爭受職命非唯漢人餘思固亦幾運之會也夫為權首鮮或不及陳項且猶未興況庸庸者乎劉盆子者太山式人城陽景王章之後也祖父憲元帝時封為式侯父萌嗣王莽篡位國除因為式人焉天鳳元年琅邪海曲有呂母者子為縣吏犯小罪宰論殺之呂母怨宰密聚客規以報仇母家素豐貲產數百萬乃益釀醇酒買刀劒衣服少年來酤者皆賒與之視其乏者輒假衣裳不問多少數年財用稍盡少年欲相與償之呂母垂泣曰所以厚諸君者非欲求利徒以縣宰不道枉殺吾子欲為報怨耳諸君寧肯哀之乎少年壯其意又素受恩皆許諾其中勇士自號猛虎遂相聚得數十百人因與呂母入海中招合亡命衆至數千呂母自稱將軍引兵還攻破海曲執縣宰諸吏叩頭為宰請母曰吾子犯小罪不當死而為宰所殺殺人當死又何請乎遂斬之以其首祭子冢復還海中後數歲琅邪人樊崇起兵於莒衆百餘人轉入太山自號三老時青徐大飢寇賊蜂起衆盜以崇勇猛皆附之一歲閒至萬餘人崇同郡人逄安東海人徐宣謝祿楊音各起兵合數萬人復引從崇共還攻莒不能下轉掠至姑幕因擊王莽探湯侯田況大破之殺萬餘人遂北入青州所過虜掠還至太山留屯南城初崇等以困窮為寇無攻城徇地之計衆既寖盛乃相與為約殺人者死傷人者償創以言辭為約束無文書旌旗部曲號令其中最尊者號三老次從事次卒吏史汎相稱曰臣巨人王莽遣平均公廉丹太師王匡擊之崇等欲戰恐其衆與莽兵亂乃皆朱其眉以相識別由是號曰赤眉赤眉遂大破丹匡軍殺萬餘人追至無鹽廉丹戰死王匡走崇又引其兵十餘萬復還圍莒數月或說崇曰莒父母之國奈何攻之乃解去時呂母病死其衆分入赤眉青犢銅馬中赤眉遂寇東海與王莽沂平大尹戰敗死者數千人乃引去掠楚沛汝南潁川還入陳留攻拔魯城轉至濮陽會更始都洛陽遣使降崇崇等聞漢室復興即留其兵自將渠帥二十餘人隨使者至洛陽降更始皆封為列侯崇等即未有國邑而留衆稍有離叛乃遂亡歸其營將兵入潁川分其衆為二部崇與逄安為一部徐宣謝祿楊音為一部崇安攻拔長社南擊宛斬縣令而宣祿等亦拔陽翟引之梁擊殺河南太守赤眉衆雖數戰勝而疲敝厭兵皆日夜愁泣思欲東歸崇等計議慮衆東向必散不如西攻長安更始二年冬崇安自武關宣等從陸渾關兩道俱入三年正月俱至弘農與更始諸將連戰剋勝衆遂大集乃分萬人為一營凡三十營營置三老從事各一人進至華陰軍中常有齊巫鼓舞祠城陽景王以求福助巫狂言景王大怒曰當為縣官何故為賊有笑巫者輒病軍中驚動時方望弟陽怨更始殺其兄乃逆說崇等曰更始荒亂政令不行故使將軍得至於此今將軍擁百萬之衆西向帝城而無稱號名為羣賊不可以久不如立宗室挾義誅伐以此號令誰敢不服崇等以為然而巫言益甚前及鄭乃相與議曰今迫近長安而鬼神如此當求劉氏共尊立之六月遂立盆子為帝自號建世元年初赤眉過式掠盆子及二兄恭茂皆在軍中恭少習尚書略通大義及隨崇等降更始即封為式侯以明經數言事拜侍中從更始在長安盆子與茂留軍中屬右校卒吏史劉俠卿主芻牧牛號曰牛吏及崇等欲立帝求軍中景王後者得七十餘人唯盆子與茂及前西安侯劉孝最為近屬崇等議曰聞古天子將兵稱上將軍乃書札為符曰上將軍又以兩空札置笥中遂於鄭北設壇場祠城陽景王諸三老從事皆大會陛下列盆子等三人, WYG: ''}
