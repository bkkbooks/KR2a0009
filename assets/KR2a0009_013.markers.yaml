  - {type: variant, offset: 33, length: 185, content: 客欲報之客犯法聖公避吏於平林吏繫聖公父子張聖公詐死使人持喪歸舂陵吏乃出子張聖公因自逃匿王莽末南方飢饉人庶羣入野澤掘鳧茈而食之更相侵奪新市人王匡王鳳為平理諍訟遂推為渠帥衆數百人於是諸亡命馬武王常成丹等往從之共攻離鄉聚臧於綠林中數月閒至七八千人地皇二年荊州牧某發奔命二萬人攻之匡等相率迎擊於雲杜大破牧軍殺數千人盡獲輜重遂攻拔竟陵轉擊雲杜安陸多略婦女還入綠林中至有五萬餘口州郡, WYG: 心}
