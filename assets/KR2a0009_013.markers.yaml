  - {type: variant, offset: 4131, length: 1578, content: 輔郡縣營長遣使貢獻兵士輒剽奪之又數虜暴吏民百姓保壁由是皆復固守至臘日崇等乃設樂大會盆子坐正殿中黃門持兵在後公卿皆列坐殿上酒未行其中一人出刀筆書謁欲賀其餘不知書者起請之各各屯聚更相背向大司農楊音按劒罵曰諸卿皆老傭也今日設君臣之禮反更殽亂兒戲尚不如此皆可格殺更相辯鬬而兵衆遂各踰宮斬關入掠酒肉互相殺傷衞尉諸葛穉聞之勒兵入格殺百餘人乃定盆子惶恐日夜啼泣獨與中黃門共臥起唯得上觀閣而不聞外事時掖庭中宮女猶有數百千人自更始敗後幽閉殿內掘庭中蘆菔根捕池魚而食之死者因相埋於宮中有故祠甘泉樂人尚共擊鼓歌舞衣服鮮明見盆子叩頭言飢盆子使中黃門稟之米人數斗後盆子去皆餓死不出劉恭見赤眉衆亂知其必敗自恐兄弟俱禍密教盆子歸璽綬習為辭讓之言建武二年正月朔崇等大會劉恭先曰諸君共立恭弟為帝德誠深厚立且一年肴亂日甚誠不足以相成恐死而無所益願得退為庶人更求賢知唯諸君省察崇等謝曰此皆崇等罪也恭復固請或曰此寧式侯事邪恭惶恐起去盆子乃下牀解璽綬叩頭曰今設置縣官而為賊如故吏人貢獻輒見剽劫流聞四方莫不怨恨不復信向此皆立非其人所致願乞骸骨避賢聖必欲殺盆子以塞責者無所離死誠冀諸君肯哀憐之耳因涕泣噓唏崇等及會者數百人莫不哀憐之乃皆避席頓首曰臣無狀負陛下請自今已後不敢復放縱因共抱持盆子帶以璽綬盆子號呼不得已既罷出各閉營自守三輔翕然稱天子聰明百姓爭還長安市里且滿得後二十餘日赤眉貪財物復出大掠城中粮食盡遂收載珍寶因大縱火燒宮室引兵而西過祠南郊車甲兵馬最為猛盛衆號百萬盆子乘王車駕三馬從數百騎乃自南山轉掠城邑與更始將軍嚴春戰於郿破春殺之遂入安定北地至陽城番須中逢大雪坑谷皆滿士多凍死乃復還發掘諸陵取其寶貨遂汙辱呂后屍凡賊所發有玉匣殮者率皆如生故赤眉得多行婬穢大司徒鄧禹時在長安遣兵擊之於郁夷反為所敗禹乃出之雲陽九月赤眉復入長安止桂宮時漢中賊延岑出散關屯杜陵逄安將十餘萬人擊之鄧禹以逄安精兵在外唯盆子與羸弱居城中乃自往攻之會謝祿救至夜戰街中禹兵敗走延岑及更始將軍李寶合兵數萬人與逄安戰於杜陵岑等大敗死者萬餘人寶遂降安而延岑收散卒走寶乃密使人謂岑曰子努力還戰吾當於內反之表𩹉合勢可大砟岑即還挑戰安等空營擊之寶從後悉拔赤眉旌幟更立己幡旗安等戰疲還營見旗幟皆白大驚亂走自投川谷死者十餘萬逄安與數千人脫歸長安時三輔大飢人相食城郭皆空白骨蔽野遺人往往聚為營保各堅守不下赤眉虜掠無所得十二月乃引而東歸衆尚二十餘萬隨道復散光武乃遣破姦將軍侯進等屯新安建威大將軍耿弇等屯宜陽分為二道以要其還路勑諸將曰賊若東走可引宜陽兵會新安賊若南走可引新安兵會宜陽明年正月鄧禹自河北度擊赤眉於湖禹復敗走赤眉遂出關南向征西大將軍馮異破之於崤底帝聞乃自將幸宜陽盛兵以邀其走路赤眉忽遇大軍驚震不知所為乃遣劉恭乞降曰盆子將百萬衆降陛下何以待之帝曰待汝以不死耳樊崇乃將盆子及丞相徐宣以下三十餘人肉袒降上所得傳國璽綬更始七尺寶劒及玉璧各一積兵甲宜陽城西與熊耳山齊帝令縣廚賜食衆積困餧十餘萬人皆得飽飫明旦大陳兵馬臨洛水令盆子君臣列而觀之謂盆子曰自知當死不對曰罪當應死猶幸上憐赦之耳帝笑曰兒大黠宗室無蚩者又謂崇等曰得無悔降乎朕今遣卿歸營勒兵鳴鼓相攻決其勝負不欲強相服也徐宣等叩頭曰臣等出長安東都門君臣計議歸命聖德百姓可與樂成難與圖始故不告衆耳今日得降猶去虎口歸慈母誠歡誠喜無所恨也帝曰卿所謂鐵中錚錚傭中佼佼者也又曰諸卿大為無道所過皆夷滅老弱溺社稷汙井竈然猶有三善攻破城邑周徧天下本故妻婦無所改易是一善也立君能用宗室是二善也餘賊立君迫急皆持其首降自以為功諸卿獨完全以付朕是三善也乃令各與妻子居洛陽賜宅人一區田二頃其夏樊崇逄安謀反誅死楊音在長安時遇趙王良有恩賜爵關內侯與徐宣俱歸鄉里卒於家劉恭為更始報殺謝祿自繫獄赦不誅帝憐盆子賞賜甚厚以為趙王郎中後病失明賜滎陽均輸官地以為列肆使食其稅終身贊曰聖公靡聞假我風雲始順歸歷終然崩分赤眉阻亂盆子探符雖盜皇器乃食均輸, WYG: 考證}
