  - {type: variant, offset: 19, length: 7, content: 公光武族兄也弟, WYG: 問前後六年質奉機宻趨走目下遂竟端右出相好藩還尹輦轂句日之中登躡上列父子一門兼受恩寵不能輸冩心力以效絲髮之功一旦被章䧟沒辜戮陛下天地之徳不忍刀鋸截臣首領得就平罪父子家屬徙充邉方完全軀命喘息相隨非臣無状所敢復望非臣罪惡所當復䝉非臣辭筆所能復陳臣初決罪雒陽詔獄生出牢户顧念元初中故尚書郎張俊坐漏泄事當伏重刑已出糓門復聽讀鞠詔書馳救一等輸作左校俊上書謝恩遂以轉徙郡縣促遣徧於吏手不得頃息含辭抱悲無由上逹既到徙所乗塞守烽職在候望憂怖焦灼無心復能操筆成草致章闕庭誠知聖朝不責臣謝但愚心有所不竟臣自在布衣常以}
