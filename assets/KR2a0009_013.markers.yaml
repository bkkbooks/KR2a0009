  - {type: variant, offset: 6, length: 4, content: 劉玄劉盆, WYG: 晝一夜而運過周星從天而西日違天而東日之所行與運周在天成度在厯成日居以列宿終於四七受以甲乙終於六旬日月相推日舒月速當其同謂之合朔舒先速後近一逺三謂之弦相與為衡分天之中謂之望以速及舒光盡體伏謂之晦晦朔合離斗建移辰謂之日月之行則有冬有夏冬夏之間則有春有秋是故日行北陸謂之冬西陸謂之春南陸謂之夏東陸謂之秋日道發南去極彌逺其景彌長逺長乃極冬乃至焉日道斂北去極彌近其景彌短近短乃極夏乃至焉二至之中道齊景正春秋分焉日周於天一寒一暑四時備成萬物畢改攝提遷次青龍移辰謂之嵗嵗首至也月首朔也至朔同日謂之章同在日首謂之蔀蔀終六旬謂之紀嵗朔又復謂之元是故日以實之月以閏之時以分之嵗以周之章以明之蔀以部之紀以記之元以原之然後雖有變化萬殊嬴朒無方莫不結系於此而禀正焉極建其中道營於外琁衡追日以察斂光道生焉孔壺為漏浮箭為刻下漏數刻以考中星昏明生焉日有光道月有九行九行出入而交生焉朔㑹望衡鄰於所交虧薄生焉月有晦朔星有合見月有弦望星有留逆其歸一也歩術生焉金水承陽先後日下速則先日遲而後留留而後逆逆與日違違而後速與日競競又先日遲速順逆晨夕生焉日月五緯各有終原而七元生焉見伏有日留行有度而率數生焉參差齊之多少均之㑹終生焉引而伸之觸而長之探賾索隠鉤深致逺無幽辟潛伏而不以其精者然故隂陽有分寒暑有節天地貞觀日月貞明若夫祐術開業淳燿天光重黎其上也顓頊曰重黎承聖帝之命若昊天典歴象三辰以授民事立閏定時以成嵗功羲和其隆也唐虞憂啇曰羲和取象金火革命創制治歴明時應天順民湯武其盛也月令章句曰帝舜叶時月正日湯武革命治歴明時言承平者叶之承亂者革之及王徳之衰也無道之君亂之於上頑愚之史失之於下夏后之時羲和滛湎廢時亂日𦙍乃征之紂作滛虐䘮其甲}
