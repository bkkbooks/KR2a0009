  - {type: variant, offset: 1708, length: 154, content: 孺子劉嬰為天子初望見更始政亂度其必敗謂安陵人弓林等曰前定安公嬰平帝之嗣雖王莽篡奪而嘗為漢主今皆云劉氏真人當更受命欲共定大功何如林等然之乃於長安求得嬰將至臨涇立之聚黨數千人望為丞相林為大司馬更始遣李松與討難將軍蘇茂等擊破皆斬之又使蘇茂拒赤眉於弘農茂軍敗死者千餘人三月遣李松會朱鮪與赤眉戰於蓩鄉松等大敗𠫓廾軍走死, WYG: 志所無臣􅁒著}
