  - {type: variant, offset: 11, length: 2, content: 列傳, krp: 武王誅之夫能貞而明之者其興也勃焉回而敗之者其亡也忽焉巍巍乎若道天地之綱紀帝王之壮事是以聖人寳焉君子勤之夫歴有聖人之徳六焉以本氣者尚其體以綜數者尚其文以考類者尚其象以作事者尚其時以占徃者尚其源以知來者尚其流大業載之吉凶生焉是以君子將有興焉咨焉而以從事受命而莫之違也若夫用天因地揆時施敎頒諸明堂以為民極者莫大乎月令帝王之大司備矣天下之能事畢矣過此而徃羣忌苟禁君子未之或知也斗之二十一度去極至逺也日在焉而冬至羣物於是乎生故律首黄鍾歴始冬至月先建子時平夜半當漢高皇帝受命四十有五嵗陽在上章隂在執除冬十有一月甲子夜半朔旦冬至日月閏積之數皆自此始立元正朔謂之漢歴又上兩元而月食五星之元並發端焉歴數之生也乃立儀表以校日景景長則日逺天度之端也日發其端周而為嵗然其景不復四周千四百六十一日而景復初是則日行之終以周除日得三百六十五四分度之一為嵗之日數日日行一度亦為天度察日月俱發度端即是起舍合朔日行十九周月行二百五十四周復㑹於端是則月行之終也以日周除月周得一嵗周天之數以日一周減之餘十二十九分之七則月行過周及日行之數也為一嵗之月以除一嵗日為一月之數月之餘分積滿其法得一月月成則其嵗月大四時推移故置十二中以定月位有朔而無中者為閏月中之始日節與中為二十四氣以除一嵗日為一氣之日數也其分積而成日為沒幷嵗氣之分如法為一嵗沒沒分於終中中終於冬至冬至之分積如其法得一日四嵗而終月分成閏閏七而盡其嵗十九名之曰章章首分盡四之俱終名之曰蔀以一嵗日乗之為蔀之日數也以甲子命之二十而復其初是以二十蔀為紀紀嵗青龍未終三終嵗後復青龍為元元法四千五百六十樂叶圖徴曰天元以甲子朔旦冬至日月起於牽牛之初右行二十八宿以考王者終始或盡一其歴數或不能盡一以四千五百六十為紀甲寅窮宋均曰紀即元也四千五百六十者五行相代一終之大數也王者即位或遇其統或不盡其數故一共以四千五百六十為甲寅之終也王者起必易元故不復㳂前而終言之也韓子曰四千五百六十嵗為一元元中有厄故聖人有九嵗之畜以備之也紀法千五百二十月令章句曰紀還復故歴紀月萬八千八百蔀法七十六月令章句曰七十六嵗為蔀首蔀月九百四十章法十九章月二百三十五月令章句曰十九嵗七閏月為一章周天千四百六十一日法四蔀日二萬七千七百五十九沒數二十一為章閏通法四百八十七沒法七因為章閏日餘百六十八中法四十二大周三十四萬三千三百三十五月周千一十六月食數之生也乃記月食之既者率二十三食而復既其月食百三十五率之相除得五百二十三之二十而一食以除一嵗之月得嵗有再食五百一十三分之五十也分終其法因以與蔀相約得四與二十七五之㑹二千五十二二十而與元㑹元㑹四萬一千四十蔀㑹三千五十三嵗數五百一十三食數千八十一月數百二十五食法二十二推入蔀術曰以元法除去上元其餘以紀法除之所得數從天紀算外則所入紀也不滿紀法者入紀年數也以蔀法除之所得數從甲子蔀起算外所入紀嵗名命之算上即所求年太嵗所在推月食所入蔀㑹年以元㑹除去上元其餘以蔀㑹除之所得以七十二乗之滿六十除去之餘以二十除所得數從天紀算之起外所以入紀不滿二十者數從甲子蔀起算外所入蔀㑹也其初不滿蔀㑹者入蔀㑹年數也各以不入紀嵗名命之算上即所求年蔀天紀嵗名地紀嵗名人紀嵗名蔀首甲子庚辰庚子庚申一癸卯丙申丙辰丙子二壬午壬子壬申壬辰三辛酉戊辰戊子戊申四庚子甲申甲辰甲子五己卯庚子庚申庚辰六戊午丙辰丙子丙申七丁酉壬申壬辰壬子八丙子戊子戊申戊辰九乙卯甲辰甲子甲申十甲午庚申庚辰庚子十一癸酉丙子丙申丙辰十二壬子壬辰壬午壬申十三辛卯戊申戊辰戊子十四庚午甲子甲申甲辰十五乙酉庚辰庚子庚申十六戊子丙申丙辰丙子十七丁卯壬子壬申壬辰十八丙午戊辰戊子戊申十九乙酉甲申甲辰甲子二十推天正術置入蔀年減一以章月乗之滿章法得一名為積月不滿為閏餘十二以上其嵗有閏推天正朔日置入蔀積月以蔀日乗之滿蔀月得一名為積日不滿為小餘積日以六十除去之其餘為大餘以所入蔀名命之算盡之外則前年天正十一月朔日也小餘四百四十一以上其月大求後月朔加大餘二十九小餘四百九十小餘滿蔀月得一上加大餘命之如前一術以大周乗年周天乗減之餘滿蔀日則天正朔日也推二十四氣術曰置入蔀年減一以月餘乗之滿中法得一名曰大餘不滿為小餘大餘滿六十除去之其餘以蔀名命之算盡之外則前年冬至之日也求次氣加大餘十五小餘七除命之如前小寒日也推閏月所在以閏餘減章法餘以十二乗之滿章閏數得一滿四以上亦得一算之數從前年十一月起算盡之外閏月也或進退以中氣定之推弦望日因其月朔大小餘之數皆加大餘七小餘三百五十九四分三小餘滿蔀月得一加大餘大餘命如法得上弦又加得望次下弦又後月朔其弦望小餘二百六十以下每以百刻乗之滿蔀月得一刻不滿其數近節氣夜漏之半者以算上為日推沒滅術置入蔀年減一以沒數乗之滿日法得一名為積没不盡為沒餘以通法乗積沒滿沒法得一名為大餘不盡為小餘大餘滿六十除去之其餘以蔀名命之算盡之外前年冬至前沒日也求後没加大餘六十九小餘四小餘滿沒法從大餘命之如前無分為滅一術以為五乗冬至小餘以減通法餘滿沒法得一則天正後沒也推合朔所在度置入蔀積月以日乗之滿大周除去之其餘滿蔀月得一名為積度不盡為餘分積度加斗二十一度加二百三十五分以宿次除之不滿宿則日月合朔所在星度也求後合朔加度二十九加分四百九十九分滿蔀月得一度經斗除二百三十五分一術以閏餘乗周天以減大周餘滿蔀月得一合以斗二十一度四分一則天正合朔日月所在度推日所在度置入蔀積日之數以蔀法乗之滿蔀日除去之其餘滿蔀法得一為積度不盡為餘分積度加斗二十一度加十九分以宿次除去之則夜半日所在宿度也求次日加一度求次月大加三十度小加二十九度經斗除十分一術以朔小餘減合度分即日夜半所在其分二百三十五約之十九乗之推月所在度置入蔀積日之數以月周乗之滿蔀日除去之其餘滿蔀法得一為積度不盡為餘分積度加斗二十一十分除如上法則所求之日夜半月所在宿度也求次日加十三度二十八分求次月大加三十五度六十一分月小二十二度三十三分分滿法得一度經斗除十九分其冬下旬月在張心署之謂盡漏分後盡漏盡也一術以蔀法除朔小餘所得以減日半度也餘以減分即月夜半所在度也推日明所入度分術曰置其月節氣夜漏之數以蔀法乗之二百除之得一分即夜半到明所行分也以增夜半日所在度分為明所在度分也求昬日所入度以夜半到明日所行分分減蔀法其餘即夜半到昬所行分也以加半夜所在度分為昬日所在度也推月明所入度分術曰置其節氣夜半之數以月周乗之以二百除之為積分積分滿蔀法得一以增夜半度即明月所在度也求昬月所入度以明積分減月周其餘滿蔀法得一度加夜半則昬月所在度也推弦望日所入星度術曰置合朔度分之數加七度三百五十九分四分之三宿次除之即得上弦日所入宿度分也求望下弦加除如前法小分四從大分滿蔀月從度推弦望月所入星度術曰置月合朔度分之數加度九十八加分六百五十三半以宿次除之即上弦月所入宿度分也求望下弦加除如前分滿蔀月從度推月食術曰置入蔀㑹年數減一以食數乗之滿嵗數得一名曰積食不滿為食餘以月數乗積滿食法得一名為積月不滿為月餘分積月以章月除去之其餘為入章月數當先除入章閏乃以十二除去之不滿者命以十一月算盡之外則前十一月前食月也求入章閏者置入章月以章閏乗之滿章月得一則入章閏數也餘分滿二百二十四以上至二百三十一為食在閏月閏或進退以朔日定之求後食加五百二十分滿法得一月數命之如法其分盡食算上推月食朔日術曰置食積月之數以二十九乗之為積日又以四百九十乗積月滿蔀月得一以幷積日以六十除之其餘以所㑹蔀名命之算盡之外則前年天正前食月朔日也求食日加大餘十四小餘七百一十九半小餘滿蔀月為大餘大餘命如前則食日也求後食朔及日皆加大餘二十七小餘六百一十五其月餘分不滿二十者文加大餘二十九小餘四百九十九其食小餘者當以漏刻課之夜漏未盡以算上為日一術以嵗數去上元餘以為積月以百一十二乗之滿月數去之餘滿食法得一則天正後食也推諸加時以十二乗小餘先減如法之半得一時其餘乃以法除之所得算之數從夜半子起算盡之外則所加時也推諸上水漏刻以百乗其小餘滿其法得一刻不滿法法什之滿法得一分積刻先減所入節氣夜漏之半其餘為晝上水之數過晝漏去之餘為夜上水數其刻不滿夜漏半者乃減之餘為昨夜未晝其弦望其日五星數之生也各記於日與周天度相約而為率以章法乗周率為用法章月乗日率如月法為積月日餘以月之月乗積為朔大小餘乗為入月日餘以日法乗周率為日度法以率去日率餘以乗周天如日度法為度之餘也日率相約取之得二千九百九十萬一千六百二十一億五十八萬二千三百而五星終如蔀之數與元通木周率四千三百二十七日率四千七百二十五合積月十三月餘四萬一千六百六月法八萬二千二百一十三大餘二十三小餘八百四十七虚分九十三入月日十五日餘萬四千六百四十七日度法萬七千三百八積度三十三度餘萬三百一十四火周率八百七十九日率千八百七十六合積月二十六月餘六千六百三十四月法萬六千七百一大餘四十七小餘七百五十四虚分一百八十六入月日十一日餘千八百七十二日度法三千五百一十六積度四十九度餘一百一十四土周率九千九十六日率九千四百一十五合積月十二月餘十三萬八千六百三十七月法十七萬二千八百二十四大餘五十四小餘三百四十八虚分五百九十二入月日二十三日餘二千一百六十三日度法三萬六千三百八十四積度十二度餘二萬九千四百五十一金周率五千八百三十日率四千六百六十一合積月九月餘九萬八千四百五月法十一萬七百七十大餘二十五小餘七百三十一虛分二百九入月日二十六日餘二百八十一日度法二萬三千三百二十積度二百九十二度餘二百八十一水周率萬一千九百八日率千八百八十九合積月一月餘二十一萬七千六百六十月法二十二萬六千二百五十二大餘二十九小餘四百九十九虚分四百四十九入月日二十七日餘四萬四千八百五日度法四萬七千六百三十一積度五十七度餘四萬四千八百五推五星術置上元以來盡所求年以周率乗之滿日率得一名為積合不盡名合餘餘以周率除之不得焉退嵗無所得星合其年得一合前年二合前二年金水積合竒為晨偶為夕其不滿周率者反減之餘為度分推星合月以合積月乗積合為小積又以月餘乗積合滿其月法得一從小積為月餘積月滿紀月去之餘為入紀月毎以章閏乗之滿章月得一為閏不盡為閏餘以閏減入紀月其餘以十二去之餘為入嵗月數從天正十一月起算外星合所在之月也其閏滿二百二十四以上至二百三十一星合閏月閏或進退以朔制之推朔日以蔀日乗之入紀月滿蔀月得一為積日不盡為小餘積日滿六十去之餘為大餘命以甲子算外星合月朔日推入月日以蔀日乗月餘以其月法乗朔小餘從之以四千四百六十五約之所得得滿日度法得一為入月日不盡為日餘以朔命入月日算外星合日也推合度以周天乗度分滿日度法得一為積度不盡為度餘以斗二十一四分一命度算外星合所在度也一術加退嵗一以減上元滿八十除去之餘以沒數乗之滿日法得一為大餘不盡為小餘以甲子命大餘則星合嵗天正冬至日也以周率小餘幷度餘餘滿日度法從度即正後星合日數也命以冬至求後合月加合積月於入嵗月加月餘於月餘滿其月法得一從入嵗月入嵗月滿十二去之有閏計焉餘命如前算外後合月也餘一加晨得夕加夕得晨求朔日以大小餘加今所得其月餘得一月者又餘二十九小餘滿蔀月得一如大餘大餘命如前求入月日以入月日餘加今所得餘滿日度法得一從日其前合月朔小餘不滿其虚分者空加一日日滿月先去二十九其後合月朔小餘不滿四百九十九又減一日其餘命如前求合度以積度度餘加今所得餘滿日度法得一從度命如前經斗除如周率矣木晨伏十六日七千二百二十分半行二度萬三千八百一十一分在日後十三度有竒而見東方見順日行五十八分度之十一五十八日行十一度微遲日行九分五十八日行九度留不行二十五日旋逆日行七分度之一八十四日進十二度復留二十五日復順五十八日行九度又五十八日行十一度在日前十三度有竒而夕伏西方除伏逆一見三百六十六日行二十八度伏復十六日七千二百二十二分半行二度萬三千八百一十一分而與日合凡一終三百九十八日有萬四千六百四十一分行星三十二度與萬三百一十四分通率日行四千七百二十五分之三百九十八火晨伏七十一日二千六百九十四分行五十五度二千二百五十四分半在日後十六度有竒而見東方見順日行二十三分度之十四八十四日行一十二度㣲遲日行十二分九十二日行四十八度留不行十一日旋逆日行六十二分度之十七六十二日退十七度復留十一日復順九十二日行四十八度又百八十四日行百一十二度在日前十六度有竒而夕伏西方除伏逆一見六百三十六日行百三度伏復七十一日二千六百九十四分行五十五度二千二百五十四分半而與日合凡一終七百七十九日有千八百七十二分行星四百一十四度與九百九十三分通率日行千八百七十六分之九百九十七土晨伏十九日千八十一分半行三度萬四千七百二十五分半在日後十五度有竒而見東方見順日行四十三分度之三八十六日行六度留不行三十三日旋逆日行十七分度之一百二日退六度復留三十三日復順八十六日行六度在日前十五度有竒而夕伏西方除伏逆見三百四十日行六度伏復十九日千八十一分半行三度萬四千七百二十五分半與日合凡一終三百七十八日有二千一百六十三分行星十二度與二萬九千四百五十一分通率日行九千四百一十五分之三百一十九金晨伏五日退四度在日後九度而見東方見逆日行五分度之三十三四十六日行三十三度而日行一度六分度之三十三四十六日行三十三度而日行一度九十分度之十五九十一日行六百度益疾日行一度二十二分九十一日行百一十三度在日後九度而晨伏東方除伏逆一見二百四十六日行二百四十六度伏四十一日二百八十一分行五十度二百八十一分而與日合一合二百九十二日百八十一分行星如之金夕伏四十一日二百八十一分行五十度二百八十一分在日前九度而見西方見順疾日行一度九十一分度之二十二九十一日行百一十三度㣲遲日行一度十五分九十一日行百六度而進日行四十六分度之三十三四十六日行三十三度留不行八日旋逆日行五分度之三十日退六度在日前九度而夕伏西方除伏逆一見二百四十六日行二百四十六度伏五日退四度而後合凡三合一終五百八十四日有五百六十二分行星如之通率日行一度水晨伏九日退七度在日後十六度而見東方見逆一日退一度留不行二日旋順日行九分度之八九日行八度而疾日行一度四分度之一二十日行二十五度在日後十六度而晨伏東方除伏逆一見三十二日行三十二度伏十六日四萬四千八百五分行三十二度四萬四千八百五分而與日合一合五十七日有四萬四千八百五分行星如之水夕伏十六日四萬四千八百五分行三十二度四萬四千八百五分在日前十六度而見西方見順疾日行一度四分度之一二十日行二十五度而遲日行九分度之八九日行八度留不行二日逆一日退一度在日前十六度而夕伏西方除伏逆一見三十二日行三十度伏九日退七度而復合凡再合一終百一十五日有四萬一千九百七十八分行星如之通率日行一度歩術以歩法伏日度分如星合日度餘命之如前得星見日度也術分母乗之分日如度法而一分不盡如法半以上亦得一而日加所行分滿其母得一度逆順母不同以當行之母乗故分如故母如一也留者承前逆則減之伏不書度經斗除如行母四分具一其分有損益前後相放其以赤道命度進加退減之其歩以黄道日名天正十一月十二月正月二月三月四月五月六月七月八月九月十月冬至大寒雨水春分糓雨小滿夏至大暑處暑秋分霜降小雪月令章句孟春以立春為節驚蟄為中中必在其月節不必在其月據孟春之驚蟄在十六日以後立春在正月驚蟄在十五日以前立春在徃年十二月斗二十六四分退二牛八女十二進二虛十進三危十六進二室十六進二壁十進二北方九十八度四分一奎十六婁十二進二胃十四進二昴十一進二畢十六進二觜二退二參九退四西方八十度井三十三退三鬼四柳十五星七進一張十八進一翼十八進一軫十七進一南方百一十二度角十二亢九退一氐十五退二房五退三心五退三尾十八進三箕十一退三東方七十五度右赤道度周天三百六十五度四分一斗二十四進一牛七女十一虛十危十六室十八壁十北方九十六度四分一奎十七婁十二胃十五昴十二畢十六觜三參八西方八十三度井三十鬼四柳十四星七張十七翼十九軫十八南方百九度角十三亢十氏十六房五心五尾十八箕十東方七十七度右黄道度三百六十五四分一黄道去極日景之生據儀表也漏刻之生以去極逺近差乗節氣之差如逺近而差一刻以相增損昬明之生以天度乗晝漏夜漏減三百而一為定度以減天度餘為明加定度一為昬其餘四之如法為少不盡三之如法為強餘半法以上以成強強三為少少四為度其強二為少弱也又以日度餘為少强而各加焉張衡渾儀曰赤道横帶渾天之腹去極九十一度十分之五黄道斜帶其腹出赤道表裏各二十四度故夏至去極六十七度而強冬至去極百一十五度亦強也然則黄道斜截赤道者則春分秋分之去極也今此春分去極九十少秋分去極九十一少者就夏厯景去極之法以為率也上頭横行}
