  - {type: variant, offset: 15, length: 0, content: '', krp: 行者黄道進退之數也本當以銅儀日月度之則可知也以儀一嵗乃竟而中間又有隂兩難卒成也是以作小渾盡赤道黄道乃各調賦三百六十五度四分度之一從冬至所在始起令之相當值也取北極及衡各誠㧻之為軸取薄竹篾穿其兩端令兩穿中間與渾半等以貫之令察之與渾相切摩也乃從減半起以為八十二度八分之五盡衡減之半焉又中分其篾拗去其半令其半之際正直與兩端減半相直令篾半之際從冬至起一度一移之視篾之半際夕多黄赤道㡬也其所多少則進退之數也從北極數之則元極之度也各分赤道黄道為二十四氣一氣相去十五度十六分之七每一氣者黄道進退一度焉所以然者黄道直時去南北極近其處地小而横行與赤道且等故以篾度之於赤道多也設一氣令十六日皆常率四日差少半也令一氣十五日不能半耳故使中道三日之中若少半也三氣一節故四十六日而差今三度也至於差三之時而五日同率者一其實節之間不能四十六日也今殘日居其䇿故五日同率也其率雖同先之皆強後之皆弱不可勝計取至於三而復冇進退者黄道稍斜於横行不得度故也春分秋分所以退者黄道始起更斜矣於横行不得度故也亦每一氣一度焉三氣一節亦差三度也至三氣之後稍逺而直故横行得度而稍進也立春立秋横行稍退矣而度猶云進者以其所退減其所進猶有盈餘未盡故也立夏立冬横行稍進矣而度猶退者以其所進増其所退猶有不足未畢故也以此論之日行非冇進退而以赤道重廣黄道使之然也本二十八宿相去度數以赤道為強耳故於黄道亦進退也冬至在斗二十一度少半最逺時也而此厯斗二十度俱百一十五強矣冬至冝與之同率焉夏至在井二十一度半強最近時也而此歴井二十三度俱六十七度強矣夏至冝與之同率焉二十四氣冬至月令章句曰冬至之為極有三意焉晝漏極短去極極逺咎景極長極者至而還之辭也日所在斗二十度百一十分八分退二黄道去極百一十五度晷景丈三尺晝漏刻四十五夜漏刻五十五昬中星奎六弱旦中星亢二少強退一月令章句曰中星當中而不中日行遲也未當中而中日行疾也小寒日所在女二度七分進二黄道去極百一十三強晷景丈二尺三寸晝漏刻四十五八分夜漏刻五十四二分昬中星婁六半強退一旦中星氐七少弱退二大寒日所在虚五度十四分進二黄道去極百一十一大弱晷景丈一尺晝漏刻四十六八分夜漏刻五十三二分昬中星胃十一半強退一旦中星心半退三立春日所在危七度二十一分進二黄道去極百六少弱晷景九尺六寸晝漏刻四十八六分夜漏刻五十一四分昬中星畢五少強退三旦中星尾七半弱退三雨水日所在室八度二十八分退三黄道去極百一强晷景七尺九寸五分晝漏刻五十八分夜漏刻四十九二分昬中星參六半弱退四旦中星箕六大弱退三驚蟄日所在壁八度三分進一黄道去極九十五強晷景六尺五寸晝漏刻五十三三分夜漏刻四十六七分昬中星井十七少弱退三旦中星斗少退二春分日所在奎十四度十分黄道去極八十九少強晷景五尺二寸五分晝漏刻五十五八分夜漏刻四十四二分昬中星鬼四旦中星斗十一強退二清明日所在胃一度十七分退二黄道去極八十三少弱晷景四尺一寸五分晝漏刻五十八三分夜漏刻四十一七分昬中星星四大進旦中星斗二十一半退二糓雨日所在昴二度二十四分退二黄道去極七十七大強晷景三尺二寸晝漏刻六十五分夜漏刻三十九五分昬中星張十七進二旦中星斗六半立夏日所在畢八度三十一分退三黄道去極七十三少弱晷景二尺五寸二分晝漏刻六十二四分夜漏刻三十七六分昬中星翼十七大進二旦中星女十少弱一小滿日所在參四度六分退四黄道去極六十九大弱晷景尺九寸八分晝漏刻六十三九分夜漏刻三十六一分昬中星角六弱旦中星危大弱進二芒種日所在井十度十三分退三黄道去極六十七少弱晷景尺六寸八分晝漏刻六十四九分夜漏刻三十五一分昬中星亢五大退一旦中星危十四強進二夏至月令章句曰夏至之為極有三意焉畫漏極長去極極近晷景極短日所在井二十五度二十分退三黄道去極六十七強晷景尺五寸晝漏刻六十五夜漏刻三十五昬中星氐十二少弱退二旦中星室十二少弱退三小暑日所在柳三度二十七分黄道去極六十七大強晷景尺七寸晝漏刻六十四七分夜漏刻三十五三分昬中星尾一大強退三旦中星奎二大強大暑日所在星四度三分進二黄道去極七十晷景二尺晝漏刻六十三八分夜漏刻三十六二分昬中星尾十五半弱退三旦中星婁三大退一立秋日所在張十二度九分進一黄道去極七十三半強晷景二尺五寸五分晝漏刻六十二三分夜漏刻三十七七分昬中星箕九大強退三旦中星胃九大強退二處暑日所在翼九度十六分退二黄道去極七十八半强晷景三尺三寸三分晝漏刻六十二分夜漏刻三十九八分昬中星斗十少退旦中星畢三大退三白露日所在軫六度二十三分退一黄道去極八十四少強晷景四尺三寸五分晝漏刻五十七八分夜漏刻四十二二分昬中星斗二十一強退一旦中星參五半弱退四秋分日所在角四度三十分黄道去極九十半強晷景五尺五寸晝漏刻五十五二分夜漏刻四十四八分昬中星牛五少旦中星井十六少強退二寒露日所在亢八度五分退三黄道去極九十六少強晷景六尺八寸五分晝漏刻五十二六分夜漏刻四十七四分昬中星女七大進一旦中星鬼三少強霜降日所在氐十四度十三分退二黄道去極百二少強晷景八尺四寸晝漏刻五十三分夜漏刻四十九七分昬中星虚六大進一旦中星星三大強進一立冬日所在房四度十九分退三黄道去極百七少強晷景丈四寸二分晝漏刻四十八二分夜漏刻五十一八分昬中星危八強進二旦中星張十五大強進一小雪日所在箕一度二十六分退三黄道去極百一十一弱晷景丈一尺四寸晝漏刻四十六七分夜漏刻五十三三分昬中星室二半強進二旦中星翼十五大強進二大雪日所在斗六度一分退三黄道去極百一十三大強晷景丈二尺五寸六分晝漏刻四十五五分夜漏刻五十四五分昬中星壁半強進一旦中星軫十五少强進一易緯所稱晷景長短不與相應今列之於後幷至與不至各有所候以參廣異同冬至晷長一丈三尺當至不至則旱多温病未當至而至則多病暴逆心痛應在夏至小寒晷長一丈一尺四分當至不至先小旱後小水丈夫多病喉痺未當至而至多病身熱來年麻不熟耳大寒晷長一丈一尺八分當至不至先大旱後大水麥不成病厥逆未當至而至多病上氣嗌腫瘦立春晷長一丈一寸六分當至不至兵起麥不成民瘵未當至而至多病熛疾疫心雨水晷長九尺一寸六分當至不至早麥不成多病痛未當至而至多病驚蟄晷長八尺二寸當至不至則霧稚禾不成老人多病嚏未當至而至多病癰疽脛腫春分晷長七尺二寸四分當至不至先旱後水嵗惡米不成多病耳痒清明晷長六尺二寸八分當至不至菽豆不熟多病嚏振寒洞泄未當至而至多温病暴死熟榖雨晷長五尺三寸六分當至不至水物雜稲等不多病疾瘧振寒霍亂未當至而至老人多病氣腫疾立夏晷長四尺三寸六分當至不至旱五穀傷牛畜未當至而至多病頭痛腫嗌喉痺後小滿晷長三尺四寸當至不至凶言國有大䘮先水旱多病筋急痺痛未當至而至多熛嗌腫未芒種晷長二尺四寸四分當至不至凶言國有狂令當至而至多病厥眩頭痛夏至晷長一尺四寸八分當至不至國有大殃旱隂陽並傷草木夏落有大寒未當至而至病眉腫小暑晷長二尺四寸四分當至不至前小水後小旱有兵多病泄注腹痛未當至而至病臚腫大暑晷長三尺四寸當至不至外兵作來年飢多病筋痺胷痛未當至而至多病脛痛惡氣黍立秋晷長四尺三寸六分當至不至暴風為災来年不熟未當至而至多病咳上氣咽腫来處暑晷長五尺三寸二分當至不至國多浮令兵起年麥不熟未當至而至病脹耳熟不出行當白露晷長六尺二寸八分當至不至多病痤疽泄未至而至多病水腹閉疝瘕温秋分晷長七尺二寸四分當至不至草木復榮多病悲心痛未當至而至多病胷鬲痛寒露晷長八尺二寸當至不至来年穀不成六畜鳥獸被殃多病疝瘕腰痛未當至而至多病疢熟中霜降晷長九尺一寸六分當至不至萬物大耗年多大風人病腰痛未當至而至多病胷脇支滿立冬晷長丈一寸二分當至不至地氣不藏来年立夏反寒早旱晚水萬物不成未當至而至多病臂掌痛小雪晷長一丈一尺八分當至不至来年蠶麥不成多病脚腕痛未當至而至亦為多肘腋痛大雪晷長一丈二尺四分當至不至温氣泄夏蝗蟲生大水多病少氣五疸水腫未當至而至多病癰疽痛應在芒種月令章句曰周天三百六十五度四分度之一分為十二次日月之所躔也地有十二分王侯之所國也毎次三十二度三十三分之十四日至其初為節至其中為中氣衛自危十度至壁八度謂之豕韋之次立春驚蟄居之之分野自壁八度至冐一度謂之降婁之次雨水春分居之魯之分野趙自胃一度至畢六度謂之大梁之次清明糓雨居之之分野晉自畢六度至井十度謂之實沈之次立夏小滿居之之分野自井十度至柳三度謂之鶉首之次芒種夏至居之秦之分野之自柳三度至張十二度謂之鶉火之次小暑大暑居周之分野自張十二度至軫六度謂之鶉尾之次立秋䖏暑居之楚之分野鄭自軫六度至亢八度謂之夀星之次白露秋分居之之分野宋自亢八度至尾四度謂之大火之次寒露霜降居之之分野自尾四度至斗六度謂之析木之次立冬小雪居之燕之分野之自斗六度至須女二度謂之星紀之次大雪冬至居越之分野自湏女二度至危十度謂之𤣥枵之次小寒大寒居之齊之分野載蔡邕分星次度數與皇甫謐不同兼明氣節所在故焉謚所列在郡國志中星以日所在為正日行四嵗乃終置所求年二十四氣小餘四之如法為少大餘不盡三之如法為強弱以減節氣昏明中星而各定矣強正弱直也其强弱相減同名相去異名從之從強進少為弱從弱退少而強從上元太嵗在庚辰以來盡熹平三年嵗在甲寅積九千四百五十五嵗也宋世治歴何承天曰歴數之術若心所不逹雖復通人前識無救其弊是以多歴年嵗猶未能有定四分於天出三百年而盈一日積世不悟徒云建歴之本必先立元假託䜟緯遂開治亂此之為弊亦以甚矣}
  - {type: variant, offset: 16, length: 2, content: 玄字, WYG: 歆三統法尤復疏闊方於四分六千餘年又益一日揚雄心惑其説採為太𤣥班固謂之最密著于漢志司馬彪曰自大初元年始用三統歴施行百有餘年曾不憶劉歆之生不逮太初二三君子為厯㡬乎不知而妄言者歟元和中糓城門候劉洪始悟四分於天疏闊更以五百八十九為紀法百四十五為斗分而造乾象法又制遲疾厯以歩月行方於太初四分轉精宻矣論曰易有太極是生兩儀兩儀之分尚矣乃有皇犧皇犧之有天下也未有書計厯載彌乆暨於黄帝班示文章重黎記註象應著名始終相驗凖度追元乃立厯數天難諶斯是以五三迄于來今各有改作不通用故黄帝造厯元起辛卯而顓頊用乙卯虞用戊午夏用丙寅殷用甲寅周用丁巳魯用庚子漢興承秦初用乙卯至武帝元封不與天合乃㑹術士作太初厯元以丁丑王莽之際劉歆作三統追太初前世一元得五星㑹庚戌之嵗以為上元太初厯到章帝元和旋復疏闊徴能術者課校諸厯定朔稽元追漢三十五年庚辰之嵗追朔一日乃與天合以為四分厯元加六百五元一紀上得庚申有近於緯而嵗不攝提以辨厯者得開其説而其元尠與緯同同則或不得於天然厯之興廢以疏宻課固不主於元光和元年中議郎蔡邕郎中劉洪補續律厯志邕能著文清濁鍾律洪能為算述敘三光今考論其業義指博通術數略舉是以集録為上下篇放續前志以備一家蔡邕戍邉上章曰朔方髠鉗徒臣邕稽首再拜上書皇帝陛下臣邕被受陛下尤異大恩初由宰府備數典城以叔父故衛尉質時為尚書召拜郎中受詔詣東觀著作遂與羣儒並拜議郎沐浴恩澤承答}
