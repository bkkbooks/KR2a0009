  - {type: variant, offset: 797, length: 888, content: 丞相申屠建李松自長安傳送乘輿服御又遣中黃門從官奉迎遷都二年二月更始自洛陽而西初發李松奉引馬驚奔觸北宮鐵柱門三馬皆死初王莽敗唯未央宮被焚而已其餘宮館一無所毀宮女數千備列後庭自鍾鼓帷帳輿輦器服太倉武庫官府市里不改於舊更始既至居長樂宮升前殿郎吏以次列庭中更始羞怍俛首刮席不敢視諸將後至者更始問虜掠得幾何左右侍官皆宮省久吏各驚相視李松與棘陽人趙萌說更始宜悉王諸功臣朱鮪爭之以為高祖約非劉氏不王更始乃先封宗室太常將軍劉祉為定陶王劉賜為岸劉慶為燕王劉歙為元氏王大將軍劉嘉為漢中王劉信為汝陰王後遂立王匡為比陽王王鳳為宜城王朱鮪為膠東王衞尉大將軍張卬為淮陽王廷尉大將軍王常為鄧王執金吾大將軍廖湛為穰王申屠建為平氏王尚書胡殷為隨王桂天大將軍李通為西平王五威中郎將李軼為舞陰王水衡大將軍成丹為襄邑王大司空陳牧為陰平王驃騎大將軍宋佻為潁陰王尹尊為郾王唯朱鮪辭曰臣非劉宗不敢干典遂讓不受乃徙鮪為左大司馬劉賜為前大司馬使與李軼李通王常等鎮撫關東以李松為丞相趙萌為右大司馬共秉內任更始納趙萌女為夫人有寵遂委政於萌日夜與婦人飲讌後庭羣臣欲言事輒醉不能見時不得已乃令侍中坐帷內與語諸將識非更始聲出皆怨曰成敗未可知遽自縱放若此韓夫人尤嗜酒每侍飲見常侍奏事輒怒曰帝方對我飲正用此時持事來乎起扺祚悎蛂趙萌專權威福自己郎吏有說萌放縱者更始怒拔劒擊之自是無復敢言萌私忿侍中引下斬之更始救請不從時李軼朱鮪命山東王匡張卬橫暴三輔其所授官爵者皆羣小賈豎或有膳夫庖人多著繡面衣錦袴襜褕諸于罵詈道中長安為之語曰竈下養中郎將爛羊胃騎都尉爛羊頭關內侯軍帥將軍豫章李淑上書諫曰方今賊寇始誅王化未行百官有司宜慎其任夫三公上應台宿九卿下括河海故天工人其代之陛下定業雖因下江平林之埶斯蓋臨時濟用不可施之既安宜釐改制度更延英俊因才授爵以匡王國今公卿大位莫非戎陳尚書顯官皆出庸伍資亭長賊捕之用而當輔佐綱維之任唯名與器聖人所重今以所重加非其人望其毗益萬分興化致理譬猶緣木求魚升山採珠海內望此有以闚度漢祚臣非有憎疾以求進也但為階下惜此舉厝敗材傷錦所宜至慮惟割既往謬妄之失思隆周文濟濟之美更始怒繫淑詔獄自是關中離心四方怨叛諸將出征各自專置牧守州郡交錯, WYG: 變}
