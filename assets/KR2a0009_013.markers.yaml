  - {type: variant, offset: 11, length: 2, content: 列傳, WYG: 武王誅之夫能貞而明之者其興也勃焉回而敗之者其亡也忽焉巍巍乎若道天地之綱紀帝王之壮事是以聖人寳焉君子勤之夫歴有聖人之徳六焉以本氣者尚其體以綜數者尚其文以考類者尚其象以作事者尚其時以占徃者尚其源以知來者尚其流大業載之吉凶生焉是以君子將有興焉咨焉而以從事受命而莫之違也若夫用天因地揆時施敎頒諸明堂以為民極者莫大乎月令帝王之大司備矣天下之能事畢矣過此而徃羣忌苟禁君子未之或知也斗之二十一度去極至逺也日在焉而冬至羣物於是乎生故律首黄鍾歴始冬至月先建子時平夜半當漢高皇帝受命四十有五嵗陽在上章隂在執除冬十有一月甲子夜半朔旦冬至日月閏積之數皆自此始立元正朔謂之漢歴又上兩元而月食五星之元並發端焉歴數之生也乃立儀表以校日景景長則日逺天度之端也日發其端周而為嵗然其景不復四周千四百六十一日而景復初是則日行之終以周除日得三百六十五四分度之一為嵗之日數日日行一度亦為天度察日月俱發度端即是起舍合朔日行十九周月行二百五十四周復㑹於端是則月行之終也以日周除月周得一嵗周天之數以日一周減之餘十二十九分之七則月行過周及日行之數也為一嵗之月以除一嵗日為一月之數月之餘分積滿其法得一月月成則其嵗月大四時推移故置十二中以定月位有朔而無中者為閏月中之始日節與中為二十四氣以除一嵗日為一氣之日數也其分積而成日為沒幷嵗氣之分如法為一嵗沒沒分於終中中終於冬至冬至之分積如其法得一日四嵗而終月分成閏閏七而盡其嵗十九名之曰章章首分盡四之俱終名之曰蔀以一嵗日乗之為蔀之日數也以甲子命之二十而復其初是以二十蔀為紀紀嵗青龍未終三終嵗後復青龍為元元法四千五百六十樂叶圖徴曰天元以甲子朔旦冬至日月起於牽牛之初右行二十八宿以考王者終始或盡一其歴數或不能盡一以四千五百六十為紀甲寅窮宋均曰紀即元也四千五百六十者五行相代一終之大數也王者即位或遇其統或不盡其數故一共以四千五百六十為甲寅之終也王者起必易元故不復㳂前而終言之也韓子曰四千五百六十嵗為一元元中有厄故聖人有九嵗之畜以備之也紀法千五百二十月令章句曰紀還復故歴紀月萬八千八百蔀法七十六月令章句曰七十六嵗為蔀首蔀月九百四十章法十九章月二百三十五月令章句曰十九嵗七閏月為一章周天千四百六十一日法四蔀日二萬七千七百五十九沒數二十一為章閏通法四百八十七沒法七因為章閏日餘百六十八中法四十二大周三十四萬三千三百三十五月周千一十六月食數之生也乃記月食之既者率二十三食而復既其月食百三十五率之相除得五百二十三之二十而一食以除一嵗之月得嵗有再食五百一十三分之五十也分終其法因以與蔀相約得四與二十七五之㑹二千五十二二十而與元㑹元㑹四萬一千四十蔀㑹三千五十三嵗數五百一十三食數千八十一月數百二十五食法二十二推入蔀術曰以元法除去上元其餘以紀法除之所得數從天紀算外則所入紀也不滿紀法者入紀年數也以蔀法除之所得數從甲子蔀起算外所入紀嵗名命之算上即所求年太嵗所在推月食所入蔀㑹年以元㑹除去上元其餘以蔀㑹除之所得以七十二乗之滿六十除去之餘以二十除所得數從天紀算之起外所以入紀不滿二十者數從甲子蔀起算外所入蔀㑹也其初不滿蔀㑹者入蔀㑹年數也各以不入紀嵗名命之算上即所求年蔀天紀嵗名地紀嵗名人紀嵗名蔀首甲子庚辰庚子庚申一癸卯丙申丙辰丙子二壬午壬子壬申壬辰三辛酉戊辰戊子戊申四庚子甲申甲辰甲子五己卯庚子庚申庚辰六戊午丙辰丙子丙申七丁酉壬申壬辰壬子八丙子戊子戊申戊辰九乙卯甲辰甲子甲申十甲午庚申庚辰庚子十一癸酉丙子丙申丙辰十二壬子壬辰壬午壬申十三辛卯戊申戊辰戊子十四庚午甲子甲申甲辰十五乙酉庚辰庚子庚申十六戊子丙申丙辰丙子十七丁卯壬子壬申壬辰十八丙午戊辰戊子戊申十九乙酉甲申甲辰甲子二十推天正術置入蔀年減一以章月乗之滿章法得一名為積月不滿為閏餘十二以上其嵗有閏推天正朔日置入蔀積月以蔀日乗之滿蔀月得一名為積日不滿為小餘積日以六十除去之其餘為大餘以所入蔀名命之算盡之外則前年天正十一月朔日也小餘四百四十一以上其月大求後月朔加大餘二十九小餘四百九十小餘滿蔀月得一上加大餘命之如前一術以大周乗年周天乗減之餘滿蔀日則天正朔日也推二十四氣術曰置入蔀年減一以月餘乗之滿中法得一名曰大餘不滿為小餘大餘滿六十除去之其餘以蔀名命之算盡之外則前年冬至之日也求次氣加大餘十五小餘七除命之如前小寒日也推閏月所在以閏餘減章法餘以十二乗之滿章閏數得一滿四以上亦得一算之數從前年十一月起算盡之外閏月也或進退以中氣定之推弦望日因其月朔大小餘之數皆加大餘七小餘三百五十九四分三小餘滿蔀月得一加大餘大餘命如法得上弦又加得望次下弦又後月朔其弦望小餘二百六十以下每以百刻乗之滿蔀月得一刻不滿其數近節氣夜漏之半者以算上為日推沒滅術置入蔀年減一以沒數乗之滿日法得一名為積没不盡為沒餘以通法乗積沒滿沒法得一名為大餘不盡為小餘大餘滿六十除去之其餘以蔀名命之算盡之外前年冬至前沒