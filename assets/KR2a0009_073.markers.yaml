  - {type: variant, offset: 631, length: 233, content: 其冠並與李膺陳蕃王暢更相襃重學中語曰天下模楷李元禮不畏強禦陳仲舉天下俊秀王叔茂又渤海公族進階扶風魏齊卿並危言深論不隱豪強自公卿以下莫不畏其貶議屣履到門時河內張成善說風角推占當赦遂教子殺人李膺為河南尹督促收捕既而逢宥獲免膺愈懷憤疾竟案殺之初成以方伎交通宦官帝亦頗誶其占成弟子牢脩因上書誣告膺等養太學遊士交結諸郡生徒更相驅馳共為部黨誹訕朝廷疑亂風俗於是天子震怒班下郡國逮捕黨人布告天下使同忿疾遂收執膺等其辭所連及陳寔之徒二百餘人或有逃遁不獲皆懸金購募使者四出相望於道明年, WYG: ''}
