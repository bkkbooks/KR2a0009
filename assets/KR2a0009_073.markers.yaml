  - {type: variant, offset: 12, length: 0, content: '', WYG: 三十三朱暉傳孫穆朱暉字文季南陽宛人也東觀記曰其先宋微子之後也以國氏姓周衰諸侯滅宋犇碭易姓爲朱後徙于宛也家世衣冠暉早孤有氣決年十三王莽敗天下亂與外氏家屬從田間奔入宛城東觀記曰暉外祖父孔休以德行稱於代也道遇羣賊白刃劫諸婦女略奪衣物昆弟賓客皆惶廹伏地莫敢動暉拔劒前曰財物皆可取耳諸母衣不可得今日朱暉死日也賊見其小壯其志笑曰童子内刀遂捨之而去初光武與暉父岑俱學長安有舊故及卽位求問岑時已卒乃召暉拜為郎暉尋以病去卒業於太學性矜嚴進止必以禮諸儒稱其高永平初顯宗舅新陽侯隂就慕暉賢自往候之暉避不見復遣家丞致禮續漢志曰諸侯家丞秩三百石暉遂閉門不受就聞歎曰志士也勿奪其節後為郡吏太守阮況嘗欲市暉婢暉不從東觀記曰暉為督郵況當歸女欲買暉婢暉不敢與後況卒暉送其家金三斤及況卒暉乃厚贈送其家人或譏焉暉曰前阮府君有求於我所以不敢聞命誠恐以財貨汚君今而相送眀吾非有愛也驃騎將軍東平王蒼聞而辟之甚禮敬焉正月朔旦蒼當入賀故事少府給璧是時陰就為府卿貴驕吏慠不奉法蒼坐朝堂漏且盡而求璧不可得顧謂掾屬曰若之何暉望見少府主簿持璧即往紿之曰紿欺也我數聞璧而未嘗見試請觀之主簿以授暉暉顧召令史奉之奉之於蒼主簿大驚遽以白就就曰朱掾義士勿復求更以它璧朝蒼旣罷召暉謂曰屬者掾自視孰與藺相如屬向也與猶如也史記曰藺相如趙人也趙惠文王時得楚和氏璧秦昭王欲以十}
