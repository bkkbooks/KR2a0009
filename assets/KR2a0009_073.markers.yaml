  - {type: variant, offset: 5241, length: 662, content: 對或否滂忠於後越次而進王甫詰曰君為人臣不惟忠國而共造部黨自相襃舉評論朝廷虛搆無端諸所謀結並欲何為皆以情對不得隱飾滂對曰臣聞仲尼之言見善如不及見惡如探湯欲使善善同其清惡惡同其汙謂王政之所願聞不悟更以為黨甫曰卿更相拔舉迭為脣齒有不合者見則排斥其意如何滂乃慷慨仰天曰古之循善自求多福今之循善身陷大戮身死之日願埋滂於首陽山側上不負皇天下不愧夷齊甫愍然為之改容乃得並解桎梏滂後事釋南歸始發京師汝南南陽士大夫迎之者數千兩同囚鄉人殷陶黃穆亦免俱歸並衞侍於滂應對賓客滂顧謂陶等曰今子相隨是重吾禍也遂遁還鄉里初滂等繫獄尚書霍諝理之及得免到京師往候諝而不為謝或有讓滂者對曰昔叔向嬰罪祁奚救之未聞羊舌有謝恩之辭祁老有自伐之色竟無所言建寧二年遂大誅黨人詔下急捕滂等督郵吳導至縣抱詔書閉傳舍伏牀而泣滂聞之曰必為我也即自詣獄縣令郭揖大驚出解印綬引與俱亡曰天下大矣子何為在此滂曰滂死則禍塞何敢以罪累君又令老母流離乎其母就與之訣滂白母曰仲博孝敬足以供養滂從龍舒君歸黃泉存亡各得其所惟大人割不可忍之恩勿增感戚母曰汝今得與李杜齊名死亦何恨既有令名復求壽考可兼得乎滂跪受教再拜而辭顧謂其子曰吾欲使汝為惡則惡不可為使汝為善則我不為惡行路聞之莫不流涕時年三十三論曰李膺振拔汙險之中蘊義生風以鼓動流俗激素行以恥威權立廉尚以振貴埶使天下之士奮迅感㮣波蕩而從之幽深牢破室族而不顧至于子伏其死而母歡其義壯矣哉子曰道之將廢也與命也尹勳字伯元河南鞏人也家世衣冠伯父睦為司徒兄頌為太尉宗族多居貴位者而勳獨持清操不以地埶尚人州郡連辟察孝廉三遷邯鄲令政有異迹後舉高第五遷尚書令及桓帝誅, WYG: 說}
