  - {type: variant, offset: 6320, length: 9, content: 食乾飯茹菜禁制豪右, WYG: 俯伏寺門晝夜號泣令聞而矜之即解出親恢長好經學事博士焦永永為河東太守恢隨之官閉廬精誦不交人物後永以事被考諸弟子皆以通闗被繫為交通闗渉也恢獨曒然不汚於法曒明也音公鳥反或從白作皎音亦同遂篤志為名儒性亷直介立介特也行不合已者雖貴不與交信陽侯隂就數致禮請恢恢絶不答後仕本郡吏太守坐法誅東觀記京兆尹張恂召恢署戸曹史故人莫敢往恢獨奔喪行服坐以抵罪歸復為功曹選舉不阿請託無所容同郡楊政數衆毁恢後舉政子為孝亷由是鄉里歸之辟司空牟融府㑹蜀郡太守第五倫代融為司空恢以與倫同郡不肯留薦潁川杜安而退諸公多其行連辟之遂皆不應華嶠書曰安擢為宛令以病去章帝行過潁川安上書召拜御史遷至巴郡太守而恢在家安與恢書通問恢告吏口謝且讓之曰為宛令不合志病去可也干人主以闚覦非也違平生操故不報安亦節士也年十三入太學號奇童洛陽令周紆自往候安安謝不見}
