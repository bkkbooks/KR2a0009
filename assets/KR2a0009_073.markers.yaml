  - {type: variant, offset: 7210, length: 0, content: '', WYG: 謀聽順其意誠宗廟至計竇氏之福敞數切諫言諸竇罪過憲等深怨之時濟南王康尊貴驕甚康光武少子也憲乃白出敞為濟南太傅敞至國輔康以道義數引法度諫正之康敬禮焉歳餘遷汝南太守敞疾文俗吏以苛刻求當時名譽故}
