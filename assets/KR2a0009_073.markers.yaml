  - {type: variant, offset: 6378, length: 1, content: 謝, WYG: 也其先家于汝隂六世祖比干學尚書於晁錯何氏家傳云六世祖父比干字少卿經明行修兼通法律為汝隂縣獄吏决曹掾平活數千人後為丹陽都尉獄無寃囚淮汝號曰何公征和三年三月辛亥天大隂雨比干在家日中夢貴客車騎滿門覺以語妻語未已而門有老嫗可八十餘頭白求寄避雨雨甚而衣履不霑漬雨止送出門乃謂比干曰公有隂德今天錫君䇿以廣公之子孫因出懐中符䇿狀如簡長九寸凡九百九十枚以授比干子孫佩印綬者當如此算比干年五十八有六男又生三子本始元年自汝隂徙平陵代為名族武帝時為廷尉正與張湯同時湯持法深而比干務仁恕數與湯争雖不能盡得然所濟活者以千數後遷丹陽都尉因徙居平陵敞父寵建武中為千乘都尉以}
  - {type: page-break, offset: 6378, content: '', id: KR2a0009_WYG_073-23b, image: WYG0253/WYG0253-0041d.png}
  - {type: variant, offset: 6378, length: 1, content: 謝, krp: 也其先家于汝隂六世祖比干學尚書於晁錯何氏家傳云六世祖父比干字少卿經明行修兼通法律為汝隂縣獄吏决曹掾平活數千人後為丹陽都尉獄無寃囚淮汝號曰何公征和三年三月辛亥天大隂雨比干在家日中夢貴客車騎滿門覺以語妻語未已而門有老嫗可八十餘頭白求寄避雨雨甚而衣履不霑漬雨止送出門乃謂比干曰公有隂德今天錫君䇿以廣公之子孫因出懐中符䇿狀如簡長九寸凡九百九十枚以授比干子孫佩印綬者當如此算比干年五十八有六男又生三子本始元年自汝隂徙平陵代為名族武帝時為廷尉正與張湯同時湯持法深而比干務仁恕數與湯争雖不能盡得然所濟活者以千數後遷丹陽都尉因徙居平陵敞父寵建武中為千乘都尉以}
  - {type: variant, offset: 6380, length: 0, content: '', WYG: 免遂隐居}
  - {type: variant, offset: 6380, length: 0, content: '', krp: 免遂隐居}
  - {type: variant, offset: 6381, length: 4, content: 起延熹八, WYG: 仕敞性公正自以趣舍不合時務每請召常稱疾不應元和中辟太尉宋由府由待以殊禮敞論議高常引大體多所匡正司徒袁安亦深敬重之是時京師及四方累有奇異鳥獸草木言事者以為祥瑞敞通經傳能為天官意甚惡之乃言於二公曰夫瑞應依徳而至災異緣政而生故鸜鵒來巢昭公有乾侯之戹春秋有鸜鵒來巢左氏傳魯大夫師已曰文武之世童謠有之曰鸜鵒之羽公在外野往饋之馬鸜鵒跦跦公在乾侯季平子逐昭公公遜于乾侯杜預注乾侯在魏郡斥丘縣晉境内邑也西狩獲麟孔子有兩楹之殯公羊傳曰西狩獲麟有以告孔子者曰有麏而角者何孔子曰孰為來哉孰為來哉反􅃑拭靣涕下沾袍曰吾道窮矣何氏注曰麟者太平之符聖人之類時得麟而死此亦天告夫子將没之徴也禮記孔子謂子貢曰予疇昔夜夢坐奠於兩楹之間焉殷人殯於兩楹之間丘即殷人也予殆將死也遂寢疾七日而死海鳥避風臧文祀之君子譏焉國語曰海鳥爰居止於魯東門之外三日臧文仲使國人祭之展禽譏焉因曰今兹海其有風乎廣川之鳥恒知避風是嵗海多大風冬煖文仲聞之曰吾過矣今異鳥翔於殿屋怪草生於庭際不可不察由安懼然不敢答懼音紀具反居無何而肅宗崩時竇氏專政外戚奢侈賞賜過制倉帑為虚帑音它朗反敞奏記由曰敞聞事君之義進思盡忠退思補過歴觀世主時臣無不各欲為化垂之無窮然而平和之政萬無一者盖以聖主賢臣不能相遭故也今國家秉聪明之𢎞道明公履晏晏之純徳晏晏溫和也君臣相合天下翕然治平之化有望於今孔子曰如有用我者三}
