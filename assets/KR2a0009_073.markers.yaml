  - {type: variant, offset: 6189, length: 3, content: 禁錮歷, WYG: 懼其釁積招禍復奏記諌曰古之明君必有輔徳之臣規諌之官下至器物銘書成敗以防遺失黄帝作巾机之法孔甲有盤盂之誡太公隂謀曰武王衣之銘曰桑蠶苦女工難得新捐故後必寒鏡銘曰以鏡自照者見形容以人自照者見吉凶觴銘曰樂極則悲沈湎致非社稷為危也故君有正道臣有正路説苑君道篇曰人君之道清淨無為務在博愛趨在任賢廣開耳目以察萬方不固溺於流俗不拘繫於左右臣術篇曰人臣之術順從復命無所敢専義不茍合位不茍尊必有益於國必有補於君也從之如升堂違之如赴壑今明将軍地有申伯之尊申國之伯周宣王之元舅位為羣公之首冀絶席於三公一日行善天下歸仁論語曰一日克已復禮天下歸仁焉終朝為惡四海傾覆頃者官人俱匱加以水蟲為害水災及蝗蟲也京師諸官費用增多詔書發調或至十倍各言官無見財皆當出民搒掠割剝彊令充足公賦既重私歛又深牧守長吏多非德選貪聚無猒遇人如虜或絶命於箠楚之下或自賊於迫切之求賊殺也又掠奪百姓皆託之尊府遂令將軍結怨天下吏人酸毒道路歎嗟昔秦政煩苛百姓土崩陳勝奮臂一呼天下鼎沸前書淮南王謂伍被曰陳勝吳廣起于大澤奮臂大呼天下響應也而面䛕之臣猶言安耳秦胡亥時山東兵大起叔孫通謂胡亥曰䑕竊狗盜郡縣逐捕之不足憂諸生曰何先生言之䛕也諱惡不悛卒至亡滅昔永和之末綱紀少弛頗失人望四五歲耳而財空户散下有離心馬免之徒乘敝而起荆揚之間幾成大患質帝時九江賊馬免稱黄帝歴陽賊華孟稱黑帝並九江都尉滕撫討斬之九江歴陽是荆揚之間也幸頼順烈皇后初政清静内外同力僅乃討定今百姓戚戚困於永和内非仁愛之心可得容忍外非守國之計所冝久安也夫將相大臣均體元首共輿而馳同舟而濟輿傾舟覆患實共之豈可以去明即昧履危自安即就也主孤時困而莫之䘏乎宜時易宰守非其人者減省第宅園池之費拒絶郡國諸所奉送内以自明外解人惑使挾姦之吏無所依託司察之臣得盡耳目憲度既張遠邇清一則将軍身尊事顯徳燿無窮天道明察無言不信惟􅂷省覽冀不納而縱放日滋遂復賂遺左右交通宦者任其子弟賓客以為州郡要職穆又奏記極諫冀終不悟報書云如此僕亦無一可邪穆言雖切然亦不甚罪也永興元}
