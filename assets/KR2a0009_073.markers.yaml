  - {type: variant, offset: 6953, length: 191, content: 張牧為中賊曹吏委心晊牧襃善糾違肅清朝府宛有富賈張汎者桓帝美人之外親善巧雕鏤玩好之物頗以賂遺中官以此並得顯位恃其伎巧用埶縱橫晊與牧勸收捕汎等既而遇赦晊竟誅之并收其宗族賓客殺二百餘人後乃奏聞於是中常侍侯覽使汎妻上書訟其冤帝大震怒徵下獄死晊與牧亡匿齊魯之閒會赦出後州郡察舉三府交辟並不就及李杜之誅因復逃竄終于江夏山中云陳翔字子麟汝南邵陵人也祖父珍司隸校尉翔少知名善交結察孝廉太尉周景辟舉高, WYG: 髙}
