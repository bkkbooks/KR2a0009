  - {type: variant, offset: 7360, length: 2, content: 苑康, WYG: 論曰永元之際天子幼弱太后臨朝竇氏馮盛戚之權將有呂霍之變吕禄吕産也霍光之子禹幸漢徳未衰大臣方忠袁任二公正色立朝袁安任隗也樂何之徒抗議柱下漢官儀曰侍御史周官也為柱下史冠法冠案禮圖注云法冠執法者服之樂恢為司隸何敞為御史並彈射紏察之官也故能挾幼主斷勦姦囘之偪勦絶也劉攽曰故能挾㓜主斷案文斷}
