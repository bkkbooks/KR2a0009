  - {type: variant, offset: 4572, length: 150, content: 初察孝廉歷慎令貝丘長皆以郡守非其人辭病去辟公府稍遷拜議郎與竇武陳蕃等謀誅閹官武等遇害肅亦坐黨禁錮中常侍曹節後聞其謀收之肅自載詣縣縣令見肅入閤解印綬與俱去肅曰為人臣者有謀不敢隱有罪不逃刑既不隱其謀矣又敢逃其刑乎遂被害刺史賈琮刊石立銘以記之范滂字孟博汝南征羌人也少厲清節為州里所服舉孝廉光祿四行時冀州飢荒, WYG: 順帝末江淮}
