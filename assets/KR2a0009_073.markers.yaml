  - {type: variant, offset: 6678, length: 0, content: '', WYG: 庇人也人多曠者而我取富焉是勤人以自封也死無日矣我逃死非逃富也公儀退食之比哉史記公儀休相魯食茹而美㧞園葵而棄之見布好而逐出其家婦燔其機云欲令農士女工安得奪其貨乎比音庇劉攽曰注安得奪其貨乎案文奪當作售得當作所也由不能用時齊殤王子都鄉侯暢奔弔國憂上書未報時章帝崩也殤王名石齊武王縯之孫也劉攽曰案殤字當作煬字説在本傳侍中竇憲遂令人刺殺暢於城門屯衛之中暢得幸竇太后故刺殺之而主名不立敞又説由曰劉暢宗室肺府茅土藩臣來弔大憂上書湏報湏待也親在武衛致此殘酷奉憲之吏莫適討捕適音的謂無指的討捕也蹤迹不顯主名不立敞偹數股肱職典賊曹股肱謂手臂也公府有賊曹主知盜賊也故欲親至發所以紏其變而二府以為故事三公不與賊盜敞在太尉府二府謂司徒司空邴吉為丞相不案事遂為故事見馬防傳也昔陳平生於征戰之世猶知宰相之分云外鎮四夷内撫諸侯使卿大夫各得其宜陳平為左丞相對文帝曰宰相者佐天子理隂陽順四時下育萬物之宜外鎮撫四夷諸侯内親附}
