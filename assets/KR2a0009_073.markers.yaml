  - {type: variant, offset: 7153, length: 1, content: 賀, krp: 無可慙之恥而盛春東作嵗起於東人始就耕故曰東作興動大役元元怨恨咸懐不悦而猥復為衛尉篤奉車都尉景繕脩舘第彌街絶里臣雖斗筲之人鄭氏注論語筲竹器容斗二升誠竊懐怪以為篤景親近貴臣當為百僚表儀今衆軍在道朝廷焦脣百姓愁苦縣官無用而遽起大第崇飾玩好非所以垂令徳示無窮也宜且罷工匠專憂北邉恤人之困書奏不省後拜為尚書復上封事曰夫忠臣憂世犯主嚴顔譏刺貴臣至以殺身滅家而猶為之者何邪君臣義重有不得已也臣伏見往事國之危亂家之將凶皆有所由較然易知較明也昔鄭武姜之幸叔段左傳鄭武姜愛少子叔叚莊公立武姜請以京封叔叚謂之京城太叔後武姜引以襲鄭衛莊公之寵州吁左傳衛莊公寵庶子州吁州吁好兵公不禁大夫石碏諫曰臣聞愛子教之以義方弗納於邪荘公不從及卒適子桓公立州吁乃殺桓公而簒其位愛而不教終至凶戾由是觀之愛子若此猶飢而食之以毒適所以害之也史記蘇秦曰飢人之所以飢而不食烏喙者為其愈充腹而與餓死同患也伏見}
