  - {type: variant, offset: 6181, length: 5, content: 會固被誅陟, WYG: 桓帝臨辟雍行禮畢公卿出虎賁置弓階上公卿下階皆避弓穆過呵虎賁曰執天子器何故投于地虎賁怖即攝弓穆劾奏虎賁抵罪公卿皆慙曰朱御史可謂臨事不惑者也時同郡趙康叔盛者隱於武當山清靜不仕以經傳教授穆時年五十乃奉書稱弟子及康殁喪之如師其尊德重道為當時所服常感時澆薄慕尚敦篤乃作崇厚論其辭曰夫俗之薄也有自來矣故仲尼歎曰大道之行也而丘不與焉禮記曰仲尼歎曰大道之行三代之英丘未之逮也而有志焉鄭𤣥注曰大道謂三皇五帝時也蓋傷之也夫道者以天下為一在彼猶在已也故行違於道則愧生於心非畏義也事違於理則負結於意非憚禮也故率性而行謂之道率循也子思曰天命之謂性率性之謂道修道之謂教也得其天性謂之德天之所命之謂性不失天性是謂德德性失然後貴仁義道德之性失仁義之迹彰是以仁義起而道徳遷遷徙也禮法興而淳樸散故道德以仁義為薄淳樸以禮法為賊也老子曰失道而後德失德而後仁失仁而後義失義而後禮夫禮者忠信之薄而亂之首也夫中世之所敦已為上世之所薄中世謂五帝時況又薄於此乎故夫天不崇大則覆幬不廣地不深厚則載物不博幬亦覆左傳曰如天之無不燾如地之無不載幬與燾同人不敦厖則道數不遠敦厖厚大也左傳曰人生敦厖數猶理也言人不敦厚不能入道之精理也昔在仲尼不失舊於原壤原壤孔子之舊也禮記曰原壤之母死孔子助之沐槨原壤登木而歌曰貍首之斑然執女手之卷然從者曰子未可以已乎夫子曰親者無失其為親故者無失其為故楚嚴不忍章於絶纓説苑曰楚莊王賜羣臣酒日暮燭滅乃有人引美人之衣者美人援絶其冠纓告王趣火來上視絶纓者王曰賜人酒使醉失禮柰何欲顯婦人之節而辱士乎乃命左右曰與寡人飲不絶冠纓者不懽羣臣百餘人皆絶去其冠纓乃上火也由此觀之聖賢之德敦矣老氏之經曰大丈夫處其厚不處其薄居其實不居其華故去彼取此此老子道徳經之詞顧歡注曰道德為厚禮法為薄清虛為實聲色為華去彼華薄取此厚實夫時有薄而厚施行有失而惠用俗之凋薄以厚御之行之有失以惠待之即上孔子楚莊是也故覆人之過者敦之道也救人之失者厚之行也往者馬援深昭此道可以為徳誡其兄子曰吾欲汝曹聞人之過如聞父母之名耳可得聞口不得言斯言要矣遠則聖賢履之上世履踐也言敦厚之道孔子楚莊已踐履之近則邴吉張子孺行之漢廷宣帝時邴吉為丞相不案吏曰夫以三公府案吏吾竊陋之子孺為車騎將軍匿名遠權隱人過失故能振英聲於百世播不滅之遺風不亦美哉然而時俗或異風化不敦而尚相誹謗劉攽曰案下文有而字則然字下不宜更用而字謂之臧否記短則兼折其長貶惡則并伐其善悠悠者皆是其可稱乎悠悠多也稱舉也凡此之類豈徒乖為君子之道哉將有危身累家之禍焉悲夫行之者不知憂其然故害興而莫之及也斯既然矣又有異焉人皆見之而不能自遷何則務進者趨前而不顧後榮貴者矜已而不待人智不接愚富不賑貧貞士孤而不恤賢者戹而不存故田蚡以尊顯致安國之金田蚡武帝王皇后同産弟為太尉親貴用事韓安國為梁王太傳坐法失官安國以五百金遺蚡蚡為言太后即召以為北地都尉也淳于以貴埶引方進之言翟方進成帝時為丞相淳于長元后姊子封定陵侯以能謀議為九卿用事方進獨與長交稱薦之也夫以韓翟之操為漢之名宰前書曰天子以韓安國為國器拜御史大夫又曰翟方進智能有餘天子甚重之故言名宰也然猶不能振一貧賢薦一孤士又況其下者乎此禽息史魚所以專名於前而莫繼於後者也韓詩外傳曰禽息秦大夫薦百里奚不見納繆公出當車以頭撃闑腦乃精出曰臣生無補於國不如死也繆公感寤而用百里奚秦以大化禮大夫殯於正室士於適室韓子曰史魚衛大夫卒委柩後寢衛君弔而問之曰不能進蘧伯玉退彌子瑕以屍諫也故時敦俗美則小人守正利不能誘也時否俗薄雖君子為邪義不能止也皆牽於時也何則先進者既往而不反後來者復習俗而追之是以虚華盛而忠信微刻薄稠而純篤稀斯蓋谷風有棄予之歎詩小雅曰習習谷風維風及雨將恐將懼維予與女將安將樂女轉棄予伐木有鳥鳴之悲矣詩小雅曰伐木丁丁鳥鳴嚶嚶出自幽谷遷于喬木嚶其鳴矣求其友聲也嗟乎世士誠躬師孔聖之崇則嘉楚嚴之美行希李老之雅誨思馬援之所尚鄙二宰之失度美韓稜之抗正事具韓稜傳貴丙張之𢎞裕賤時俗之誹謗則道豐績盛名顯身榮載不刋之德刋削也播不滅之聲然知薄者之不足厚者之有餘也劉攽曰案文然字下不可少後字眀脱之彼與草木俱朽彼謂薄也此與金石相傾此謂厚也老子曰高下之相傾豈得同年而語並日而談哉穆又著絶交論亦矯時之作穆集載論其略曰或曰子絶存問不見客亦不答也何故曰古者進退趨業無私游之交相見以公朝享㑹以禮紀否則朋徒受習而已曰人將疾子如何曰寜受疾曰受疾可乎曰世之務交游也久矣敦千乘不忌于君犯禮以追之背公以從之其愈者則孺子之愛也其甚者則求蔽過竊譽以贍其私事替義退公輕私重居勞於聽也或於道而求其私贍矣是故遂往不反而莫敢止焉是川瀆並決而莫敢之塞游豶蹂稼而莫之禁也詩云威儀棣棣不可選也後生將復何述而吾不才焉能規此實悼無行子道多闕臣事多尤思復白圭重考古言以補往過時無孔堂思兼則滯匪有廢也則亦焉興是以敢受疾也不亦可乎文士傳曰世無絶交又與劉伯宗絶交書及詩曰昔我為豐令足下不遭母憂乎親觧縗絰來入豐寺及我為侍書御史足下親來入臺足下今為二千石我下為郎乃反因計吏以謁相與足下豈丞尉之徒我豈足下部欲以此謁為榮寵乎咄劉伯宗於仁義道何其薄哉其詩曰北山有鴟不潔其翼飛不正向寢不定息飢則木攬飽則泥伏饕餮貪汙臭腐是食填膓滿嗉嗜欲無極長鳴呼鳳謂鳳無徳鳳之所趨與子異域永從此訣各自努力蓋因此而著論也劉攽曰注我豈足下部欲以此謁為榮寵乎案文部字下少一民字梁冀驕暴不悛朝野嗟毒穆}
