  - {type: variant, offset: 7667, length: 716, content: 遷侍中桓帝時數有灾異下策博求直言儒上封事十條極言得失辭甚忠切帝不能納出為任城相頃之徵拜議郎會竇武事下獄自殺賈彪字偉節潁川定陵人也少遊京師志節慷慨與同郡荀爽齊名初仕州郡舉孝廉補新息長小民困貧多不養子彪嚴為其制與殺人同罪城南有盜劫害人者北有婦人殺子者彪出案發而掾吏欲引南彪怒曰賊寇害人此則常理母子相殘逆天違道遂驅車北行案驗其罪城南賊聞之亦面縛自首數年閒人養子者千數僉曰賈父所長生男名為賈子生女名為賈女延熹九年黨事起太尉陳蕃爭之不能得朝廷寒心莫敢復言彪謂同志曰吾不西行大禍不解乃入洛陽說城門校尉竇武尚書霍諝武等訟之桓帝以此大赦黨人李膺出曰吾得免此賈生之謀也先是岑晊以黨事逃亡親友多匿焉彪獨閉門不納時人望之彪曰傳言相時而動無累後人公孝以要君致釁自遺其咎吾以不能奮戈相待反可容隱之乎於是咸服其裁正以黨禁錮卒于家初彪兄弟三人並有高名而彪最優故天下稱曰賈氏三虎偉節最怒何顒字伯求南陽襄鄉人也少遊學洛陽顒雖後進而郭林宗賈偉節等與之相好顯名太學友人虞偉高有父讎未報而篤病將終顒往候之偉高泣而訴顒感其義為復讎以頭醊其墓及陳蕃李膺之敗顒以與蕃膺善遂為宦官所陷乃變姓名亡匿汝南閒所至皆親其豪桀有聲荊豫之域袁紹慕之私與往來結為奔走之友是時黨事起天下多離其難顒常私入洛陽從紹計議其窮困閉戹者為求援救以濟其患有被掩捕者則廣設權計使得逃隱全免者甚衆及黨錮解顒辟司空府每三府會議莫不推顒之長累遷及董卓秉政逼顒以為長史託疾不就乃與司空荀爽司徒王允等共謀卓會爽薨顒以它事為卓所繫憂憤而卒初顒見曹操歎曰漢家將亡安天下者必此人也操以是嘉之嘗稱潁川荀彧王佐之器及彧為尚書令遣人西迎叔父爽并致顒屍而葬之爽之冢傍贊曰渭以涇濁玉以礫貞物性既區嗜惡從形蘭蕕無並銷長相傾徒恨芳膏煎灼燈明, WYG: 考證}
