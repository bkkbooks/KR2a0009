  - {type: variant, offset: 1103, length: 2275, content: 常侍侯覽意旨上書告儉與同鄉二十四人別相署號共為部黨圖危社稷以儉及彬褚鳳張肅薛蘭馮禧魏玄徐乾為八俊田林張隱劉表薛郁王訪劉祗宣靖公緒恭為八顧朱楷田槃疎耽薛敦宋布唐龍嬴咨宣襃為八及刻石立墠共為部黨而儉為之魁靈帝詔刊章捕儉等大長秋曹節因此諷有司奏捕前黨故司空虞放太僕杜密長樂少府李膺司隸校尉朱𧜛潁川太守巴肅沛相荀翌河內太守魏朗山陽太守翟超任城相劉儒太尉掾范滂等百餘人皆死獄中餘或先歿不及或亡命獲免自此諸為怨𨻶者因相陷害睚眦之忿濫入黨中又州郡承旨或有未嘗交關亦離禍毒其死徙廢禁者六七百人熹平五年永昌太守曹鸞上書大訟黨人言甚方切帝省奏大怒即詔司隸益州檻車收鸞送槐里獄掠殺之於是又詔州郡更考黨人門生故吏父子兄弟其在位者免官禁錮爰及五屬光和二年上祿長和海上言禮從祖兄弟別居異財恩義已輕服屬疎末而今黨人錮及五族既乖典訓之文有謬經常之法帝覽而悟之黨錮自從祖以下皆得解釋中平元年黃巾賊起中常侍呂彊言於帝曰黨錮久積人情多怨若久不赦宥輕與張角合謀為變滋大悔之無救帝懼其言乃大赦黨人誅徙之家皆歸故郡其後黃巾遂盛朝野崩離綱紀文章蕩然矣凡黨事始自甘陵汝南成於李膺張儉海內塗炭二十餘年諸所蔓衍皆天下善士三君八俊等三十五人其名迹存者並載乎篇陳蕃竇武王暢劉表度尚郭林宗別有傳荀翌附祖淑傳張邈附呂布傳胡母班附袁紹傳王考字文祖東平壽張人冀州刺史秦周字平王陳留平丘人北海相蕃嚮字嘉景魯國人郎中王璋字伯儀東萊曲城人少府卿位行並不顯翟超山陽太守事見陳蕃傳字及郡縣未詳朱𧜛沛人與杜密等俱死獄中唯趙典名見而已劉淑字仲承河閒樂成人也祖父稱司隸校尉淑少學明五經遂隱居立精舍講授諸生常數百人州郡禮請五府連辟並不就永興二年司徒种暠舉淑賢良方正辭以疾桓帝聞淑高名切責州郡使輿病詣京師淑不得已而赴洛陽對策為天下第一拜議郎又陳時政得失災異之占事皆效驗再遷尚書納忠建議多所補益又再遷侍中虎賁中郎將上疏以為宜罷宦官辭甚切直帝雖不能用亦不罪焉以淑宗室之賢特加敬異每有疑事常密諮問之靈帝既位宦官譖淑與竇武等通謀下獄自殺李膺字元禮潁川襄城人也祖父脩安帝時為太尉父益趙國相膺性簡亢無所交接唯以同郡荀淑陳寔為師友初舉孝廉為司徒胡廣所辟舉高第再遷青州刺史守令畏威明多望風𠫓廾官復徵再遷漁陽太守尋轉蜀郡太守以母老乞不之官轉護烏桓校尉鮮卑數犯塞膺常蒙矢石每破走之虜甚憚懾以公事免官還居綸氏教授常千人南陽樊陵求為門徒膺謝不受陵後以阿附宦官致位太尉為節志者所羞荀爽嘗就謁膺因為其御既還喜曰今日乃得御李君矣其見慕如此永壽二年鮮卑寇雲中桓帝聞膺能乃復徵為度遼將軍先是羌虜及疏勒龜茲數出攻鈔張掖酒泉雲中諸郡百姓屢被其害自膺到邊皆望風懼服先所掠男女悉送還塞下自是之後聲振遠域延熹二年徵再遷河南尹時宛陵大姓羊元羣罷北海郡臧罪狼藉郡舍溷軒有奇巧乃載之以歸膺表欲按其罪元羣行賂宦豎膺反坐輸作左校初膺與廷尉馮緄大司農劉祐等共同心志糾罰姦倖緄祐時亦得罪輸作司隸校尉應奉上疏理膺等曰昔秦人觀寶於楚昭奚恤莅以羣賢梁惠王瑋其照乘之珠齊威王荅以四臣夫忠賢武將國之心膂竊見左校薥刑徒前廷尉馮緄大司農劉祐河南尹李膺等執法不撓誅舉邪臣肆之以法衆庶稱宜昔季孫行父親逆君命逐出莒僕於舜之功二十之一今膺等投身彊禦畢力致罪陛下既不聽察而猥受譖訴遂令忠臣同愆元惡自春迄冬不蒙降恕遐邇觀聽為之歎息夫立政之要記功忘失是以武帝捨安國於徒中宣帝徵張敞於亡命緄前討蠻荊均吉甫之功祐數臨督司有不吐茹之節膺著威幽并遺愛度遼今三垂蠢動王旅未振易稱雷雨作解君子以赦過宥罪乞原膺等以備不虞書奏乃悉免其刑再遷復拜司隸校尉時張讓弟朔為野王令貪殘無道至乃殺孕婦聞膺厲威嚴懼罪逃還京師因匿兄讓弟舍藏於合柱中膺知其狀率將吏卒破柱取朔付洛陽獄受辭畢即殺之讓訴冤於帝詔膺入殿御親臨軒詰以不先請便加誅辟之意膺對曰昔晉文公執衞成公歸于京師春秋是焉禮云公族有罪雖曰宥之有司執憲不從昔仲尼為魯司寇七日而誅少正卯今臣到官已積一旬私懼以稽留為愆不意獲速疾之罪誠自知釁責死不旋踵特乞留五日剋殄元惡退就鼎鑊始生之願也帝無復言顧謂讓曰此汝弟之罪司隸何愆乃遣出之自此諸黃門常侍皆鞠躬屏氣休沐不敢復出宮省帝怪問其故並叩頭泣曰畏李校尉是時朝庭日亂綱紀穨阤膺獨持風裁以聲名自高士有被其容接者名為登龍門及遭黨事當考實膺等案經三府太尉陳蕃卻之曰今所考案皆海內人譽憂國忠公之臣此等猶將十世宥也豈有罪名不章而致收掠者乎不肯平署帝愈怒遂下膺等於黃門北寺獄膺等頗引宦官子弟宦官多懼請帝以天時宜赦於是大赦天下膺免歸鄉里居陽城山中天下士大夫皆高尚其道而汙穢朝廷及陳蕃免太尉朝野屬意於膺荀爽恐其名高致禍欲令屈節以全亂世為書貽曰久廢過庭不聞善誘陟岵瞻望惟日為歲知以直道不容於時悅山樂水家于陽城道近路夷當即聘問無狀嬰疾闕於所仰頃聞上帝震怒貶黜鼎臣人鬼同謀以為天子當貞觀二五利見大人不謂夷之初旦明而未融虹蜺揚煇𠫓廾和取同方今天地氣閉大人休否智者見險投以遠害雖匱人望內合私願想甚欣然不為恨也願怡神無事偃息衡門任其飛沈與時抑揚頃之帝崩陳蕃為太傅與大將軍竇武共秉朝政連謀誅諸宦官故引用天下名士乃以膺為長樂少府及陳竇之敗膺等復廢後張儉事起收捕鉤黨鄉人謂膺曰可去矣對曰事不辭難罪不逃刑臣之節也吾年已六十死生有命去將安之乃詣詔獄考死妻子徙邊門生故吏及其父兄並被禁錮時侍御史蜀郡景毅子顧為膺門徒而未有錄牒故不及於譴毅乃慨然曰本謂膺賢遣子師之豈可以漏奪名籍苟安而已遂自表免歸時人義之膺子瓚位至東平相初曹操微時瓚異其才將沒謂子宣等曰時將亂矣天下英雄無過曹操張孟卓與吾善袁本初汝外親雖爾勿依必歸曹氏諸子從之並免於亂世杜密字周甫潁川陽城人也為人沈質少有厲俗志為司徒胡廣所辟稍遷代郡太守徵三, WYG: ''}
