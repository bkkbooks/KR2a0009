  - {type: variant, offset: 7212, length: 8, content: 貪穢並徵詣廷尉參, WYG: 以寛和為政立春日常召督郵還府督郵主司察愆過立春陽氣發生故召歸分遣儒術大吏案行屬縣顯孝悌有義行者及舉寃獄以春秋義斷之是以郡中無怨聲百姓化其恩禮其出居者皆歸養其父母追行喪服出居謂與父母别居者其親先亡者自恨䘮禮不足追行䘮制也推財相譲者二百許人東觀記曰髙譚等百八十五人推財相讓置立禮官不任文吏又脩理鮦陽舊渠百姓頼其利鮦陽縣屬汝南郡故城在今豫州新蔡縣北水經注云葛陂東出為鮦水俗謂之三丈陂墾田增三萬餘頃吏人共刻石頌敞功德及竇氏敗有司奏敞子與夏陽侯瓌厚善坐免官永元十二年復徴三遷五官中郎將常忿疾}
