  - {type: variant, offset: 6268, length: 0, content: '', WYG: 攝攝持也懼天網之久失故竭心懷憂為上深計臣願黥首繋趾黥首謂鑿額􅄺墨也繋趾謂釱其足也以鐵著足曰釱也代穆校作帝覽其奏乃赦之穆居家數年在朝諸公多有相推薦者於是徴拜尚書穆既深疾宦官及在臺閣旦夕共事志欲除之乃上疏曰案漢故事中常侍參選士人建武以後乃悉用宦者自延平以來浸益貴盛假貂璫之飾處常伯之任璫以金為之當冠前附以金蟬也漢官儀曰中常侍秦官也漢興或用士人銀璫左貂光武以後專任宦者右貂金璫常伯侍中天朝政事一更其手權傾海内寵貴無極子弟親戚並荷榮任故放濫驕溢莫能禁禦凶狡無行之徒媚以求官恃埶怙寵之軰漁食百姓窮破天下空竭小人愚臣以為可悉罷省遵復往初率由舊章更選海内清淳之士明逹國體者以補其處即陛下可為堯舜之君衆僚皆為稷契之臣兆庶黎民蒙被聖化矣帝不}
