  - {type: variant, offset: 6343, length: 6, content: 家張儉字元節, WYG: 下大臣持國常以埶盛為咎伏念先帝聖徳未永早棄萬國陛下富於春秋纂承大業春秋謂年也言年少春秋尚多故稱富諸舅不宜幹正王室以示天下之私經曰天地乖互衆物夭傷君臣失序萬人受殃政失不救其極不測方今之宜上以義自割下以謙自引四舅可長保爵土之榮四舅謂竇憲弟篤景瓌也皇太后永無慙負宗廟之憂誠䇿之上者也書奏不省時竇太后臨朝和帝未親萬機恢以意不得行乃稱疾乞骸骨詔賜錢太醫視疾恢薦任城郭均成陽髙鳳而遂稱篤拜騎都尉上書辭謝曰仍受厚恩無以報效夫政在大夫孔子所疾論語孔子曰天下有道政不在大夫世卿持權春秋以戒左傳曰齊崔氏出奔衛公羊傳曰崔氏者何齊大夫稱崔氏者何貶曷為貶譏世卿也聖人懇惻不虚言也近世外戚富貴必有驕溢之敗今陛下思慕}
