  - {type: variant, offset: 6204, length: 0, content: '', WYG: 劾諸部至有自殺者以威略權宜盡誅賊渠帥舉劾權貴或乃死獄中有宦者趙忠喪父歸塟安平安平郡冀州所部僭為璵璠玉匣偶人玉匣長尺廣二寸半衣死者自腰以下至足連以金縷天子之制也左傳曰陽虎將以璵璠歛杜預注云美玉名君所佩也偶人明器之屬也穆聞之下郡}
