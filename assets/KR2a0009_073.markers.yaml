  - {type: variant, offset: 3572, length: 0, content: '', WYG: 明此令字是今字是時榖貴縣官經用不足經常也朝廷憂之尚書張林上言榖所以貴由錢賤故也可盡封錢一取布帛為租以通天下之用又鹽食之急者雖貴人不得不須官可自鬻前書曰因官器作鬻鹽音義曰鬻古煑字又宜因交阯益州上計吏往來市珍寶收采其利武帝時所謂均輸者也武帝作均輸法謂州郡所出租賦并雇運之直官總取之市其土地所出之物官自轉輸於京謂之均輸於是詔諸尚書通議暉奏據林言不可施行事遂寢後陳事者復重述林前議以為於國誠便帝然之有詔施行暉復獨奏曰王制天子不言有無諸侯不言多少食禄之家不與百姓爭利今均輸之法與賈販無異鹽利歸官則下人窮怨布帛為租則吏多姦盜誠非明主所當宜行劉攽曰案文當與宜不須並存合去當字帝卒以林等言為然得暉重議因發怒切責諸尚書暉等皆自繋獄三日詔勑出之曰國家樂聞駮議黄髪無愆詔書過耳黄髪老稱謂朱暉也何故自繫暉因稱病篤不肯復署議尚書令以下惶怖謂暉曰今臨得譴讓奈何稱病其禍不細暉曰行年八十䝉恩得在機宻當以死報若心知不可而順㫖雷同負臣子之義今耳目無所聞見伏待死命遂閉口不復言諸尚書不知所為乃共劾奏暉帝意解寢其事後數日詔使直事郎問暉起居直事郎謂署郎當次直者太醫視疾太官賜食暉乃起謝復賜錢十萬布百匹衣十領後}
