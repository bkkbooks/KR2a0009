  - {type: variant, offset: 4753, length: 210, content: 境守令自知臧汙望風解印綬去其所舉奏莫不厭塞衆議遷光祿勳主事時陳蕃為光祿勳滂執公儀詣蕃蕃不止之滂懷恨投版𠫓廾官而去郭林宗聞而讓蕃曰若范孟博者豈宜以公禮格之今成其去就之名得無自取不優之議也蕃乃謝焉復為太尉黃瓊所辟後詔三府掾屬舉謠言滂奏刺史二千石權豪之黨二十餘人尚書責滂所劾猥多疑有私故滂對曰臣之所舉自非叨穢姦暴深為民害豈以汙簡札哉閒以會日迫促故先舉所急其未審者方更參實臣聞農夫去草嘉穀必茂忠臣除姦王道以清若臣言有貳甘受顯戮吏, WYG: 郡}
