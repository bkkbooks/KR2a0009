  - {type: variant, offset: 4304, length: 205, content: 與范滂張儉等俱被誣陷詔下州郡捕為黨魁及儉等亡命經歷之處皆被收考辭所連引布徧天下馥乃頓足而歎曰孽自己作空汙良善一人逃死禍及萬家何以生為乃自翦須變形入林慮山中隱匿姓名為冶家傭親突煙炭形貌毀瘁積二三年人無知者後馥弟靜乘車馬載縑帛追之於涅陽市中遇馥不識聞其言聲乃覺而拜之馥避不與語靜追隨至客舍共宿夜中密呼靜曰吾以守道疾惡故為權宦所陷且念營苟全以庇性命弟柰何載物相求是以禍見追也明旦別去黨禁未解而卒宗慈字孝初南陽安衆人也, WYG: 歴職股肱}
