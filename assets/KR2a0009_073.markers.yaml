  - {type: variant, offset: 68, length: 422, content: 節其所偏雖情品萬區質文異數至於陶物振俗其道一也叔末澆訛王道陵缺而猶假仁以效己憑義以濟功舉中於理則強梁裭氣片言違正則厮臺解情蓋前哲之遺塵有足求者霸德既衰狙詐萌起彊者以決勝為雄弱者以詐劣受屈至有畫半策而綰萬金開一說而錫琛瑞或起徒步而仕執珪解草衣以升卿相士之飾巧馳辯以要能釣利者不期而景從矣自是愛尚相奪與時回變其風不可留其敝不能反及漢祖杖劒武夫興憲令寬賒文禮簡闊緒餘四豪之烈人懷陵上之心輕死重氣怨惠必讎令行私庭權移匹庶任俠之方成其俗矣自武帝以後崇尚儒學懷經協術所在霧會至有石渠分爭之論黨同伐異之說守文之徒盛於時矣至王莽專偽終於篡國忠義之流恥見纓紼遂乃榮華丘壑甘足枯槁雖中興在運漢德重開而保身懷方彌相慕襲去就之節重於時矣逮桓靈之閒主荒政繆國命委於閹寺士子羞與為伍故匹夫抗憤處士橫議遂乃激揚名聲互相題拂品覈公卿裁量執政婞直之風於斯行矣夫上好則下必甚矯枉故直必過其理然矣若范滂張儉之徒清心忌惡終陷黨議不其然乎初桓帝為蠡吾侯受學於甘陵周福及即帝位擢福為尚書時, WYG: ''}
  - {type: variant, offset: 68, length: 422, content: 節其所偏雖情品萬區質文異數至於陶物振俗其道一也叔末澆訛王道陵缺而猶假仁以效己憑義以濟功舉中於理則強梁裭氣片言違正則厮臺解情蓋前哲之遺塵有足求者霸德既衰狙詐萌起彊者以決勝為雄弱者以詐劣受屈至有畫半策而綰萬金開一說而錫琛瑞或起徒步而仕執珪解草衣以升卿相士之飾巧馳辯以要能釣利者不期而景從矣自是愛尚相奪與時回變其風不可留其敝不能反及漢祖杖劒武夫興憲令寬賒文禮簡闊緒餘四豪之烈人懷陵上之心輕死重氣怨惠必讎令行私庭權移匹庶任俠之方成其俗矣自武帝以後崇尚儒學懷經協術所在霧會至有石渠分爭之論黨同伐異之說守文之徒盛於時矣至王莽專偽終於篡國忠義之流恥見纓紼遂乃榮華丘壑甘足枯槁雖中興在運漢德重開而保身懷方彌相慕襲去就之節重於時矣逮桓靈之閒主荒政繆國命委於閹寺士子羞與為伍故匹夫抗憤處士橫議遂乃激揚名聲互相題拂品覈公卿裁量執政婞直之風於斯行矣夫上好則下必甚矯枉故直必過其理然矣若范滂張儉之徒清心忌惡終陷黨議不其然乎初桓帝為蠡吾侯受學於甘陵周福及即帝位擢福為尚書時, krp: ''}
