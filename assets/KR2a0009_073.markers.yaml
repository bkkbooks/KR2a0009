  - {type: variant, offset: 3573, length: 22, content: 河南尹轉太僕黨事既起免歸本郡與李膺俱坐而名行, WYG: 為尚書令以老病乞身拜騎都尉賜錢二十萬和帝即位竇憲北征匈奴暉復上疏諫頃之病卒華嶠書曰暉年五十失妻昆弟欲為繼室暉歎曰時俗希不以後妻敗家者遂不復娶也子頡修儒術安帝時至陳}
