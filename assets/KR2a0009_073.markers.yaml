  - {type: variant, offset: 13, length: 0, content: '', WYG: 城易之趙王使相如奉璧入秦秦王大喜無意償趙城相如乃前曰璧有瑕願指視王相如乃持璧却立倚柱怒髪上衝冠曰臣觀大王無意償趙城邑故臣復取璧大王必欲急臣臣今頭與璧俱碎於柱矣相如持其璧睨柱欲以擊柱秦王恐其璧破乃謝之帝聞壯之及當幸長安欲嚴宿衛故以暉為衛士令再遷臨淮太守暉好節槩有所拔用皆厲行士其諸報怨以義犯率皆爲求其理多得生濟其不義之囚即時僵仆僵偃仆踣也吏人畏愛爲之歌曰彊直自遂南陽朱季吏畏其威人懷其惠東觀記曰建武}
