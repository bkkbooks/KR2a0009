  - {type: variant, offset: 7208, length: 1, content: 徐, WYG: 夀生顯京輔都尉顯生鄢光禄大夫鄢生寵濟南都尉寵生敞八世也復以愚陋旬年之間歴顯位備機近每念厚徳忽然􅁯生雖知言必夷滅而冒死自盡者誠不忍目見其禍而懐黙苟全駙馬都尉瓌雖在弱冠有不隐之忠比請退身願抑家權可與}
