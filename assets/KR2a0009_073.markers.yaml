又與劉伯宗絶交書及詩曰昔我為豐令足下不遭母憂乎親觧縗絰來入豐寺及我為侍書御史足下親來入臺足下今為二千石我下為郎乃反因計吏以謁相與足下豈丞尉之徒我豈足下部欲以此謁為榮寵乎咄劉伯宗於仁義道何其薄哉其詩曰北山有鴟不潔其翼飛不正向寢不定息飢則木攬飽則泥伏饕餮貪汙臭腐是食填膓滿嗉嗜欲無極長鳴呼鳳謂鳳無徳鳳之所趨與子異域永從此訣各自努力蓋因此而著論也劉攽曰注我豈足下部欲以此謁為榮寵乎案文部字下少一民字梁冀驕暴不悛朝野嗟毒穆}
