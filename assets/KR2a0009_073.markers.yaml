  - {type: variant, offset: 6333, length: 4, content: 會黨事起, WYG: 書安不發悉壁藏之及後捕案貴戚賓客安開壁出書印封如故後徴拜議郎㑹車騎將軍竇憲出征匈奴恢數上書諌争朝廷稱其忠東觀記載上書諌曰春秋之義王者不理夷狄得其地不可墾發得其人無益於政故明王之於夷狄覉縻而已孔子曰逺人不服則修文徳以来之以漢之盛不務脩舜禹周公之徳而無故興干戈動兵革以求無用之物臣誠惑之入為尚書僕射是時河南尹王調洛陽令李阜與竇憲厚善縱舍自由恢劾奏調阜并及司隷校尉諸所刺舉無所回避貴戚惡之決録注曰調字叔和為河南尹永和二年坐買洛陽令同郡任稜竹田及上罷城東漕渠}
