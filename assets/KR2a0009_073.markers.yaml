  - {type: variant, offset: 6135, length: 3, content: 徵復拜, WYG: 順烈太后臨朝穆以冀埶地親重望有以扶持王室因推災異奏記以勸戒冀曰穆伏念明年丁亥之歲刑德合於乾位厯法太歲在丁壬歲徳在北宫太歲在亥卯未歲刑亦在北宮故合於乾位也易經龍戰之㑹其文曰龍戰于野其道窮也易坤卦上六象詞也坤爻居上六故云其道窮也王弼注云陰之為道卑順不逆乃全其美盛而不已同陽之地陽所不堪故戰于野謂陽道將勝而陰道負也今年九月天氣鬰冐五位四候連失正氣此互相明也夫善道屬陽惡道屬陰若修正守陽摧折惡類則福從之矣穆每事不逮所好唯學傳受於師時有可試願將軍少察愚言申納諸儒申重也而親其忠正絶其姑息姑且也息安也小人之道茍且取安也禮記曰君子之愛人也以德細人之愛人也以姑息專心公朝割除私欲廣求賢能斥遠佞惡夫人君不可不學當以天地順道漸漬其心宜為皇帝選置師傅及侍講者得小心忠篤敦禮之士將軍與之俱入參勸講授師賢法古此猶倚南山坐平原也誰能傾之今年夏月暈房星明年當有小戹宜急誅姦臣為天下所怨毒者以塞災咎}
