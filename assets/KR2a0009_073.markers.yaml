  - {type: variant, offset: 6315, length: 1, content: 計, WYG: 野字子遼見荀爽薦文初穆父卒穆與諸儒考依古義諡曰貞宣先生諡法曰清白守節曰貞善聞周達曰宣及穆卒蔡邕復與門人共述其體行諡為文忠先生袁山松書曰蔡邕議曰魯季文子君子以為忠而諡曰文子又傳曰忠文之實也忠以為實文以彰之遂共諡穆荀爽聞而非之故張璠論曰夫諡者上之所贈非下之所造故顔閔至徳不聞有諡朱蔡各以衰世臧否不立故私議之論曰朱穆見比周傷義偏黨毁俗左傳曰頑嚚不友是為比周杜預注比近也周宻也志抑朋游之私遂著絶交之論蔡邕以為穆貞而孤又作正交而廣其志焉邕論略曰聞之前訓曰君子以朋友講習而正人無有滛朋是以古之交者其義敦以正其誓信以固逮夫周徳始衰頌聲既寢伐木有鳥鳴之刺谷風有棄予之怨其所由來政之缺也自此以降彌以陵遲或闕其始終或彊其比周是以搢紳患其然而論者諄諄如也疾淺薄而携貳者有之惡朋黨而絶交游者有之其論交也曰富貴則人争趣之貧賤則人争去之是以君子慎人所以交已審已所以交人富貴則無暴集之客貧賤則無棄舊之賔矣故原其所以來則知其所以去見其所以始則覩其所以終彼貞士者貧賤不待夫冨貴冨貴不驕乎貧賤故可貴也蓋朋友之道有義則合無義則離善則久要不㤀平生之言惡則忠告善誨之否則止無自辱焉故君子不為可棄之行不患人之遺己也信有可歸之徳不病人之遠己也不幸或然則躬自厚而薄責於人怨其逺矣求諸己而不求諸人咎其稀矣夫逺怨稀咎之機咸在乎躬莫之能改也子夏之門人問交於子張而二子各有聞乎夫子然則以交誨也商也寛故告之以拒人師也褊故訓之以容衆各從其行而矯之至於仲尼之正教則汎愛衆而親仁故非善不喜非仁不親交㳺以方㑹友以文可無貶也穀梁子亦曰心志既通名譽不聞友之罪也今将患其流而塞其源病其末而刈其本無乃未若擇其正而黜其邪與其彼農皆黍而獨稷焉夫黍亦神農之嘉榖與稷並為粢盛也使交而可廢則黍其愆矣括二論而言之則刺薄者博而洽㫁交者貞而孤孤有羔羊之節與其不獲已而矯時也走将從夫孤焉劉攽曰注否則止案否字當作不可盖孔子稱上交不諂下交不黷易繫辭之言也又曰晏平仲善與人交子夏之門人亦問交於子張並見論語故易明㫁金之義易繫辭曰二人同心其利㫁金詩載讌朋之謠詩小雅伐木序云讌友朋故舊也其詩曰伐木滸滸釃酒有藇釃音所宜反藇音序若夫文㑹輔仁直諒多聞之友時濟其益論語曰君子以文㑹友以友輔仁又曰益者三友友直友諒友多聞益矣紵衣傾盖彈冠結綬之夫遂隆其好左傳曰吳季札以縞帶贈子產子産獻紵衣焉孔叢子曰孔子與程子相遇於途傾蓋而語傾蓋謂駐車交蓋也前書曰王陽貢禹相與為友朱博與蕭育為友時稱蕭朱結綬王貢彈冠言其趣舍同相薦逹斯固交者之方焉方道也至乃田竇衛霍之游客竇嬰孝文皇后從兄子封魏其侯游士賓客争歸之武帝時為丞相田蚡武帝王皇后同產弟為太尉蚡以太后故親幸數言事多效士吏趨埶利者皆去嬰而歸蚡衛青拜大將軍青姊子霍去病為驃騎將軍皆為大司馬去病秩禄與大將軍等自是後青}
