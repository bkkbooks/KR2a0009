  - {type: variant, offset: 4965, length: 275, content: 詰滂覩時方艱知意不行因投劾去太守宗資先聞其名請署功曹委任政事滂在職嚴整疾惡其有行違孝悌不軌仁義者皆埽迹斥逐不與共朝顯薦異節抽拔幽陋滂外甥西平李頌公族子孫而為鄉曲所𠫓廾中常侍唐衡以頌請資資用為吏滂以非其人寑而不召資遷怒捶書佐朱零零仰曰范滂清裁猶以利刃齒腐朽今日寧受笞死而滂不可違資乃止郡中中人以下莫不歸怨乃指滂之所用以為范黨後牢脩誣言鉤黨滂坐繫黃門北寺獄獄吏謂曰凡坐繫皆祭皐陶滂曰皐陶賢者古之直臣知滂無罪將理之於帝如其有罪祭之何益衆人由此亦止獄吏將加掠考滂以同囚多嬰病乃請先就格遂與同郡袁忠爭受楚毒桓帝使中常侍王甫以次辨詰滂等皆三木囊頭暴於階下餘人在前, WYG: 禁}
