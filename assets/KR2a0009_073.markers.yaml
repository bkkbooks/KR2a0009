  - {type: variant, offset: 3647, length: 263, content: 廉補尚書侍郎閑練故事文札強辨每有奏議應對無滯為僚類所歸除任城令兗州舉為尤異遷揚州刺史是時會稽太守梁旻大將軍冀之從弟也祐舉奏其罪旻坐徵復遷祐河東太守時屬縣令長率多中官子弟百姓患之祐到黜其權強平理冤結政為三河表再遷延熹四年拜尚書令又出為河南尹轉司隸校尉時權貴子弟罷州郡還入京師者每至界首輒改易輿服隱匿財寶威行朝廷拜宗正三轉大司農時中常侍蘇康管霸用事於內遂固天下良田美業山林湖澤民庶窮困州郡累氣祐移書所在依科品沒入之桓帝大怒論祐輸左校後得赦出復歷三卿輒以疾辭乞骸骨歸田里詔拜中散大夫遂杜門絕迹每三公缺朝廷皆屬意於祐以譖毀不用延篤貽之, WYG: 亷謝承}
