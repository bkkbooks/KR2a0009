  - {type: variant, offset: 6317, length: 2, content: 受奉, WYG: 衰而去病益貴青故人門下多去事去病輙得官爵也亷頗翟公之門賓史記曰亷頗趙人封為信平君假相國長平之免歸也故客盡去及復用為將客又至亷頗曰客退矣客曰吁君何見之晚也夫以市道交君有埶我即從君無埶即去此其理也又何怨焉下邽翟公為廷尉賓亦填門及廢門外可設爵羅後復為廷尉賓客欲往翟公大署其門曰一死一生乃知交情一貧一富乃知交態一貴一賤交情乃見也進由埶合退由衰異又專諸荆卿之感激史記曰專諸堂邑人吳公子光以嫡嗣未得立請專諸刺吳王僚諸曰王僚可殺也母老子弱是其無如我何光乃置酒請王僚酒酣專諸置七首魚炙之中以刺王僚立死又曰荆軻衛人也燕太子丹質於秦秦王政遇之不善丹怨亡歸與軻交結乃尊為上卿故謂之荆卿軻入秦刺始皇不遂而死也侯生豫子之投身史記曰侯嬴魏隐士為大梁夷門監者魏公子無忌請為上客秦圍邯郸嬴教公子竊兵符北救趙乃自剄又曰豫譲晉人趙㐮子滅智伯讓曰士為知已者死乃變名姓欲刺㐮子㐮子令執之伏劍而死情為恩死命縁義輕皆以利害移心懐徳成節非夫交照之本未可語失得之原也穆徒以友分少全因絶同志之求黨侠生敝而忘得朋之義易曰西南得朋蔡氏貞孤之言其為然也古之善交者詳矣漢興稱王陽貢禹陳遵張竦前書曰陳遵字孟公杜陵人也張竦字伯松竦博學通達以亷儉自守而遵放縱不拘操行雖異然相親友也中世有亷范慶鴻陳重靁義云樂恢傳樂恢字伯竒京兆長陵人也父親為縣吏得罪於令收將殺之恢年十一}
