  - {type: variant, offset: 2534, length: 717, content: 越曰宗賊雖盛而衆不附若袁術因之禍必至矣吾欲徵兵恐不能集其策焉出對曰理平者先仁義理亂者先權謀兵不在多貴乎得人袁術驕而無謀宗賊率多貪暴越有所素養者使人示之以利必持衆來使君誅其無道施其才用威德既行襁負而至矣兵集衆附南据江陵北守襄陽荊州八郡可傳檄而定公路雖至無能為也表曰善乃使越遣人誘宗賊帥至者十五人皆斬之而襲取其衆唯江夏賊張虎陳坐擁兵據襄陽城表使越與龐季往譬之乃降江南悉平諸守令聞表威名多解印綬去表遂理兵襄陽以觀時變袁術與其從兄紹有𨻶而紹與表相結故術共孫堅合從襲表表敗堅遂圍襄陽會表將黃祖救至堅為流箭所中死餘衆退走及李傕等入長安冬表遣使奉貢傕以表為鎮南將軍荊州牧封成武侯假節以為己援建安元年驃騎將軍張濟自關中走南陽因攻穰城中飛矢而死荊州官屬皆賀表曰濟以窮來主人無禮至於交鋒此非牧意牧受弔不受賀也使人納其衆衆聞之喜遂皆服從三年長沙太守張羨率零陵桂陽三郡畔表表遣兵攻圍破羨平之於是開土遂廣南接五領北據漢川地方數千里帶甲十餘萬初荊州人情好擾加四方駭震寇賊相扇處處麋沸表招誘有方威懷兼洽其姦猾宿賊更為效用萬里肅清大小咸悅而服之關西兗豫學士歸者蓋有千數表安慰賑贍皆得資全遂起立學校博求儒術綦母闓宋忠等撰立五經章句謂之後定愛民養士從容自保及曹操與袁紹相持於官度紹遣人求助表許之不至亦不援曹操且欲觀天下之變從事中郎南陽韓嵩別駕劉先說表曰今豪桀並爭兩雄相持天子之重在於將軍若欲有為起乘其敝可也如其不然固將擇所宜從豈可擁甲十萬坐觀成敗求援而不能助見賢而不肯歸此兩怨必集於將軍恐不得中立矣曹操善用兵且賢俊多歸之其埶必舉袁紹然後移兵以向江漢恐將軍不能禦也今之勝計莫若舉荊州以附曹操操必重德將軍長享福祚垂之後嗣此萬全之策也蒯越亦勸之表狐疑不斷乃遣嵩詣操觀望虛實謂嵩, WYG: ''}
