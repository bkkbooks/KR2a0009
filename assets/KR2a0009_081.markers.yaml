  - {type: variant, offset: 1880, length: 3, content: 背袁向, krp: 貶黜將半政未踰時功効卓然實應賞異以勸功能改任牧守去斥姦殘又宜更選匈奴烏桓䕶羌中郎將校尉簡練文武授之法令除并涼二州今年租更寛赦罪隸埽除更始則善吏知奉公之祐惡者覺營私之禍胡馬可不窺長城塞下無候望之患矣帝覺悟乃更選幽并刺史自營郡太守都尉以下多所革易下詔為陳将軍除并涼一年租賦以賜吏民龜既到職州郡重足震慄鮮卑不敢近塞省息經用嵗以億計經常也大將軍梁冀與龜素有隙譖其沮毁國威挑取功譽挑取猶獨取也獨取其名如挑戰之義不為胡虜所畏坐徵還遂乞骸骨歸田里復徵為尚書冀暴虐日甚龜上疏言其罪状請誅之帝不省自知必為冀所害不食七日而死西域胡夷并涼民庶咸為舉哀弔祭其墓橋𤣥傳橋𤣥字公祖梁國睢陽人也七世祖仁從同郡戴徳學著禮記章句四十九篇號曰橋君學成帝時為大鴻臚祖父基廣陵太守父肅東萊太守𤣥少為縣功}
