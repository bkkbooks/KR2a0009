  - {type: variant, offset: 29, length: 0, content: '', WYG: 鄧隲聞其名而辟焉舉茂才時漢中蠻夷反畔以禪為漢中太守夷賊素聞其名聲即時降服遷左馮翊入拜諫議大夫永寜元年西南夷撣國王撣音徒丹反劉攽曰案和紀皆作擅音撣字亦無作平聲者而此音徒丹當由注者見前音擅誤以為壇而音之也又檢説文擅音徒旱反如此則與徒丹平側之間耳語音或容有輕重之殊然注書當定從一説不宜二三也獻樂及幻人能吐火自支解易牛馬頭眀年元㑹作之於庭安帝與羣臣共觀大竒之禪獨離席舉手大言曰昔齊魯為夾谷之㑹齊作侏儒之樂仲尼誅之家語曰魯定公與齊侯㑹於夾谷孔子攝相事齊奏中宫之樂倡優戲於前孔子趨曰匹夫而侮諸侯罪應誅於是斬侏儒手足異處劉攽曰案文當作首足又曰放鄭聲逺佞人論語孔子之言帝王之庭不宜設夷狄之技尚書陳忠劾奏禪曰古者合歡之樂舞於堂四夷之樂陳於門故詩云以雅以南韎任朱離詩小雅鼓鐘之詩曰以雅以南以籥不僣薛君云南夷之樂曰南四夷之樂唯南可以和於雅者以其人聲音及籥不僣差也周禮鞮鞻氏掌四夷之樂鄭𤣥注云東方曰韎南方曰任西方曰朱離北方曰禁毛詩無韎任朱離之文葢見齊魯之詩也今亡韎音昧禮記曰九夷八蠻六戎五狄來朝立於眀堂四門之外也今撣國越流沙踰縣度前書西域傳曰縣度者山名也谿谷不通以繩索相引而度去陽關五千八百八十里萬里貢獻非鄭衛之聲佞人之比而禪廷訕朝政訕謗也請劾禪下獄有詔勿収左轉為𤣥菟候城障尉侯城縣在遼東詔敢不之官上妻子從者名禪既行朝廷多訟之㑹北匈奴入遼東追拜禪遼東太守胡憚其威彊退還數百里禪不加兵但使吏卒往曉慰之單于随使還郡禪於學行禮為説道義以感化之單于懐服遺以胡中珍貨而去及鄧騭誅廢禪以故吏免復為車騎將軍閻顯長史順帝即位遷司隸校尉眀年卒于官子澄有清名官至漢中太守禪曾孫寳亦剛壮有禪風為州别駕從事顯名州里龎參傳龎參字仲達河南􅚆氏人也初仕郡未知名河南尹龎奮見而竒之舉為孝廉拜左校令坐法輸作若盧若盧獄名永初元年涼州先零種羌反畔遣車騎將軍鄧騭討之參於徒中使其子俊上書曰方今西州流民擾動而徵發不絶水潦不休地力不復言其耗損不復於舊重之以大軍疲之以逺戍農功消於轉運資財竭於徵發田疇不得墾闢禾稼不得収入搏手困窮無望来秋兩手相搏言無計也百姓力屈不復堪命臣愚以為萬里運糧逺就羌戎不若總兵養衆以待其疲車騎將軍騭宜且振旅留征西校尉任尚使督涼州士民轉居三輔休徭役以助其時止煩賦以益其財令男得耕種女得織絍絍音如深反杜預注左傳云織絍織繒布也然後畜精鋭乗懈沮}
