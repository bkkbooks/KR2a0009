  - {type: variant, offset: 1036, length: 1, content: 行, WYG: 殺之參素與洛陽令祝良不平謝承書曰良字邵平長沙人聰明博學有才幹以廉平見稱也良聞之率吏卒入太尉府案實其事乃上參罪遂因灾異䇿免有司以良不先聞奏輙折辱宰相坐繫詔獄良能得百姓心洛陽吏人守闕請代其罪者日有數千萬人詔乃原刑陽嘉四年復以參為太尉永和元年以乆病罷卒於家陳龜傳陳龜字}
