  - {type: variant, offset: 266, length: 253, content: 譬人將鬬而斷其右手曰我必勝若如是者可乎夫𠫓廾兄弟而不親天下其誰親之屬有讒人交鬬其閒以求一朝之利願塞耳勿聽也若斬佞臣數人復相親睦以御四方可橫行於天下譚不從尚復自將攻譚譚戰大敗嬰城固守尚圍之急譚奔平原而遣潁川辛毗詣曹操請救劉表以書諫譚曰天降災害禍難殷流初交殊族卒成同盟使王室震蕩彝倫攸斁是以智達之士莫不痛心入骨傷時人不能相忍也然孤與太公志同願等雖楚魏絕邈山河䄄遠戮力乃心共奬王室使非族不干吾盟異類不絕吾好此孤與太公無貳之所致也功績未卒太公殂隕賢胤承統以繼洪業宣奕世之德履丕顯之祚摧嚴敵於鄴都揚休烈於朔土顧定疆宇, WYG: 虓}
