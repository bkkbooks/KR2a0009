  - {type: variant, offset: 520, length: 465, content: 視河外凡我同盟莫不景附何悟青蠅飛於竿旌無忌游於二壘使股肱分成二體匈膂絕為異身初聞此問尚謂不然定聞信來乃知閼伯實沈之忿已成𠫓廾親即讎之計已決旃斾交於中原暴尸累於城下聞之哽咽若存若亡昔三王五伯下及戰國君臣相弒父子相殺兄弟相殘親戚相滅蓋時有之然或欲以成王業或欲以定霸功皆所謂逆取順守而徼富強於一世也未有𠫓廾親即異兀其根本而能全於長世者也游之恨於齊未若太公之忿於曹也宣子之臣承業未若仁君之繼統也且君子違難不適讎國交絕不出惡聲況忘先人之讎𠫓廾親戚之好而為萬世之戒遺同盟之恥哉蠻夷戎狄將有誚讓之言況我族類而不痛心邪之無慙順之節仁君當降志辱身以濟事為務事定之後使天下平其曲直不亦為高義邪今仁君見憎於夫人未若鄭莊之於姜氏昆弟之嫌未若重華之於象敖然莊公卒崇大隧之樂象敖終受有鼻之封願捐𠫓廾百痾追攝舊義復為母子昆弟如初今整勒士馬瞻望鵠立曹操遂還救譚十月至黎陽尚聞操度河乃釋平原還鄴尚將呂曠高翔畔歸曹氏譚復陰刻將軍印以假曠翔操知譚詐乃以子整娉譚女以安之而引軍還九年三月尚使審配守鄴復攻譚於平原配獻書於譚曰配聞良藥苦口而利於病忠言逆耳而便於行願將軍緩心抑, WYG: ''}
