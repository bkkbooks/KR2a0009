  - {type: variant, offset: 1060, length: 0, content: '', krp: 龜臨行上疏曰臣龜䝉恩累世馳騁邉垂雖展鷹犬之用頓斃胡虜之庭魂骸不返薦享狐狸猶無}
  - {type: variant, offset: 1061, length: 7, content: 續賢兄立我將軍, WYG: 塞厚責答萬分也至臣頑駑劉攽曰案文至臣無義當作臣至器無鈆刀一割之用過受國恩榮秩兼優生年死日永懼不報臣聞三辰不軌擢士為相蠻夷不恭㧞卒為将臣無文武之才而忝鷹揚之任詩曰維師尚父時維鷹揚上慙聖明下懼素餐素空也無功受祿為素餐雖歿軀體無所云補今西州邉鄙土地塉埆埆音覺又音確謂薄土也鞍馬為居射獵為業男寡耕稼之利女乏機杼之饒守塞候望懸命鋒鏑聞急長驅去不圖反自頃年以来匈奴數攻營郡謂郡有屯兵者即䕶羌校尉屯金城烏桓校尉屯上谷之類殘殺長吏侮略良細戰夫身膏沙漠居人首係馬鞍或舉國掩戸盡種灰滅孤兒寡婦號哭空城野無青草室如懸磬左傳曰室如懸磬野無青草言其屋居如磬之懸下無所有雖含生氣實同枯朽徃嵗并州水雨灾螟互生稼穡荒耗租更空闕更謂卒更錢也老者慮不終年少壮懼於困戹陛下以百姓為子品庶以陛下為父焉可不日呉勞神書曰文王至于日中呉不遑暇食也垂撫循之恩哉唐堯親捨其子以禪虞舜者是欲民遭聖君不令遇惡主也史記曰堯知子丹朱不肖不足授天下乃推授舜則天下得其利而丹朱病授丹朱則天下病而丹朱得其利堯曰終不以天下之病而利一人卒授舜以天下也劉攽曰注乃推授舜則天下得其利案史記本文更有授舜兩字故古公杖䇿其民五倍帝王世紀曰古公亶父是為大王為百姓所附狄人攻之事之以皮幣玉帛不能免焉王遂杖䇿而去踰梁山止於岐山之陽邑於周地豳人從者如歸市一年成邑二年成都三年五倍其初也文王西伯天下歸之帝王世記曰西伯至仁百姓襁負而至豈復輿金輦寳}
