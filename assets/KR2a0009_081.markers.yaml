  - {type: variant, offset: 30, length: 0, content: '', krp: 其不意攻其不備則邉人之仇報奔北之耻雪矣書奏會御史中丞樊凖上疏薦參曰臣聞鷙鳥累百不如一鶚前書鄒陽諫吴王之辭也鶚大鵬也昔孝文皇帝悟馮唐之言而赦魏尚之罪使為邉守匈奴不敢南向前書馮唐謂文帝曰臣聞魏尚為雲中守匈奴逺避不近雲中之塞上功莫府一言不相應文吏以法繩之愚以為陛下法太眀而賞太輕文帝悦是日令唐持節赦魏尚復以為雲中守也夫以一臣之身折方面之難者選用得也臣伏見故左校令河南龎參勇謀不測卓爾竒偉高才武略有魏尚之風前坐微法輸作經時今羌戎為患大}
  - {type: variant, offset: 31, length: 1, content: 黎, WYG: 西屯臣以為如參之人宜在行伍惟眀詔採前世之舉觀魏尚之功免赦參刑以為軍鋒必有成効宣助國威鄧太后納其言即擢參於徒中召拜謁者使西督三輔諸軍屯而徵鄧騭還四年羌冦轉盛兵費日廣且連年不登榖石萬餘參奏記於鄧騭曰比年羌冦特困隴右供徭賦役為損日滋官負人責數十億萬責音側懈反今復募發百姓調取穀帛衒賣什物以應吏求外傷羌虜内困徵賦為羌冦所傷也遂乃千里轉糧逺給武都西郡塗路傾阻難勞百端疾行則鈔暴為害遲進則穀食稍損運糧散於曠野牛馬死於山澤縣官不足輙貸於民民已窮矣將從誰求名救金城而實困三輔三輔既困還復為金城之禍矣參前數言宜棄西域乃為西州士大夫所笑今茍貪不毛之地營恤不使之民恤憂也不使之人謂戎虜凶獷不堪為用暴軍伊吾之野以慮三族之外言勞師救逺以為親戚之憂慮果破涼州禍亂至今夫拓境不寜無益於彊多田不耕何救飢敝故善為國者務懐其内不求外利務富其民不貪廣土三輔山原曠逺民庶稀疏故縣邱城可居者多邱空也今宜徙邉郡不能自存者入居諸陵田戍故縣孤城絶郡以權徙之轉運逺費聚而近之徭役煩數休而息之此善之善者也騭及公卿以國用不足欲從參議衆多不同乃止拜參為漢}
