  - {type: variant, offset: 1672, length: 186, content: 於袁氏亦自不得不爾意欲活之配意氣壯烈終無撓辭見者莫不歎息遂斬之全尚母妻子還其財寶高幹以并州降復為刺史曹操之圍鄴也譚復背之因略取甘陵安平勃海河閒攻尚於中山尚敗走故安從熙而譚悉收其衆還屯龍湊十二月曹操討譚軍其門譚夜遁奔走南皮臨清河而屯明年正月急攻之譚欲出戰軍未合而破譚被髮驅馳追者意非恆人趨奔之譚墯馬顧曰咄兒過我我能富貴汝言未絕口頭已斷地於是斬郭圖等戮其妻子熙尚為其將焦觸張南, WYG: 聚姦}
