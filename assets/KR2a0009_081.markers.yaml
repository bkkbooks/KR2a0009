  - {type: variant, offset: 1030, length: 1, content: 獄, WYG: 時當㑹茂才孝廉參以被奏稱疾不得㑹上計掾廣漢叚恭因會上疏曰伏見道路行人農夫織婦皆曰太尉龎參竭忠盡節徒以直道不能曲心孤立羣邪之間自處中傷之地臣猶冀在陛下之世當䝉安全而復以讒佞傷毁忠正此天地之大禁人主之至誠昔白起賜死諸侯酌酒相賀季子来歸魯人喜其紓難紓緩也季子魯公子}
