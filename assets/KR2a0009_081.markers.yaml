  - {type: variant, offset: 1020, length: 0, content: '', WYG: 南仲赫赫列在}
  - {type: variant, offset: 1020, length: 0, content: '', krp: 南仲赫赫列在}
  - {type: variant, offset: 1021, length: 0, content: '', WYG: 詩亞夫赳赳載於漢䇿詩曰赫赫南仲薄伐西戎周亞夫為漢將赳赳武貌竊見前䕶羌校尉龎參文武昭備智略𢎞逺既有義勇果毅之節兼以博雅深謀之姿又度遼將軍梁慬前統西域勤苦數年還留三輔功效克立間在北邉單于降服今皆幽囚陷於法網昔荀林父敗績於邲晉侯使復其位左傳曰晉荀林父及楚師戰於邲晉師敗績林父請死晉侯欲許之士貞子諫曰不可夫其敗也如日月之食何損於眀晉侯使復其位也孟眀視喪師於崤秦伯不替其官左傳曰晉敗秦師於崤獲百里孟眀視後赦而歸之秦伯曰孤之罪也不替孟眀故晉景并赤狄之土秦穆遂覇西戎左傳曰晉荀林父敗赤狄遂滅之晉侯賞林父狄臣千室亦賞士貞子瓜衍之縣曰吾獲狄土子之功也又曰秦伯伐晉遂覇西戎用孟眀也宜逺覽二君使參慬得在寛宥之科誠有益於折衝毗佐於聖化書奏赦參等後以參為遼東太守永建元年遷度遼将軍四年入為大鴻臚尚書僕射虞詡薦參有宰相器能順帝時以為太尉録尚書事是時三}
