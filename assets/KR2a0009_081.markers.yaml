  - {type: variant, offset: 16, length: 7, content: 十四下紹子譚譚, WYG: 卒陳禪傳陳禪字紀山巴郡安漢人也仕郡功曹舉善黜惡為邦内所畏察孝亷州辟治中從事續漢志曰毎州有治中從事也時刺史為人所上受納臧賂禪當傳考傳謂逮捕而考之也無它所齎但持喪歛之具而已及至笞掠無算五毒畢加禪神意}
