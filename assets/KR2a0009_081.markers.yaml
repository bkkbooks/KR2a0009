  - {type: variant, offset: 30, length: 0, content: '', WYG: 其不意攻其不備則邉人之仇報奔北之耻雪矣書奏會御史中丞樊凖上疏薦參曰臣聞鷙鳥累百不如一鶚前書鄒陽諫吴王之辭也鶚大鵬也昔孝文皇帝悟馮唐之言而赦魏尚之罪使為邉守匈奴不敢南向前書馮唐謂文帝曰臣聞魏尚為雲中守匈奴逺避不近雲中之塞上功莫府一言不相應文吏以法繩之愚以為陛下法太眀而賞太輕文帝悦是日令唐持節赦魏尚復以為雲中守也夫以一臣之身折方面之難者選用得也臣伏見故左校令河南龎參勇謀不測卓爾竒偉高才武略有魏尚之風前坐微法輸作經時今羌戎為患大}
