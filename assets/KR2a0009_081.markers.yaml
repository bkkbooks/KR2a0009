  - {type: variant, offset: 15, length: 0, content: '', WYG: 四十一李恂傳李恂字叔英安定臨涇人也少習韓詩韓嬰所傳詩也教授諸生常數百人太守潁川李鴻請署功曹未及到而州辟為從事㑹鴻卒恂不應州命而送鴻喪還鄉里既葬留起冢墳持喪三年辟司徒桓虞府後拜侍御史持節使幽州宣布恩澤慰撫北狄所過皆圖寫山川屯田聚落百餘卷悉封奏上肅宗嘉之拜兖州刺史以清約率下常席羊皮服布被遷張掖太守有威重名時大將軍竇憲將兵屯武威天下州郡逺近莫不脩禮遺恂奉公不阿為憲所奏免後復徵拜謁者使持節領西域副校尉西域殷富多珍寳諸國侍子及督使賈胡督使主蕃國之使也賈胡胡之商賈也數遺恂奴婢宛馬金銀香􅄢之屬一無所受袁山松書曰西域出諸香石宻􅄢織毛為布者北匈奴數斷西域車師伊吾隴沙以西使命不得通前書曰車師前國王居交河城伊吾故城在今瓜州晉昌縣北廣志曰流沙在玉門闗外東西數百里有三斷名曰三隴也恂設購賞遂斬虜帥縣首軍門自是道路夷清威恩並行遷武威太守後坐事免歩歸鄉里潜居山澤結草為廬獨與諸生織席自給會西羌反叛恂到田舍為所執獲羌素聞其名放遣之恂因詣洛陽謝時嵗荒司空張敏司徒魯恭等各遣子饋糧悉無所受徙居新安關下拾橡實以自資橡櫟實也武帝元鼎三年徙函谷關於新安也年九十}
