  - {type: variant, offset: 1033, length: 2, content: 歔欷, WYG: 也閔公之時國家多難以季子忠賢故請齊侯復之公羊傳曰季子来歸其言季子何賢也言其来歸何喜之也劉攽曰注言其来歸案文當云其言来歸誤倒之眀此書中多有誤倒一兩字者夫國以賢化君以忠安今天下咸欣陛下有此忠賢願卒寵任以安社稷書奏詔即遣小黄門視參疾太醫致羊酒後參夫人疾前妻子投於井}
