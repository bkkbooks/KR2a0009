  - {type: variant, offset: 3450, length: 772, content: 三年曹操自將征表未至八月表疽發背卒在荊州幾二十年家無餘積二子琦琮表初以琦貌類於己甚愛之後為琮娶其後妻蔡氏之姪蔡氏遂愛琮而惡琦毀譽之言日聞於表表寵耽後妻每信受焉又妻弟蔡瑁及外甥張允並得幸於表又睦於琮而琦不自寧嘗與琅邪人諸葛亮謀自安之術亮初不對後乃共升高樓因令去梯謂亮曰今日上不至天下不至地言出子口而入吾耳可以言未亮曰君不見申生在內而危重耳居外而安乎琦意感悟陰規出計會表將江夏太守黃祖為孫權所殺琦遂求代其任及表病甚琦歸省疾素慈孝允等恐其見表而父子相感更有託後之意乃謂琦曰將軍命君撫臨江夏其任至重今釋衆來必見譴怒傷親之歡重增其疾非孝敬之道也遂遏于戶外使不得見琦流涕而去人衆聞而傷焉遂以琮為嗣琮以侯印授琦琦怒投之地將因奔喪作難會曹操軍至新野琦走江南蒯越韓嵩及東曹掾傅巽等說琮歸降琮曰今與諸君據全楚之地守先君之業以觀天下何為不可巽曰逆順有大體強弱有定埶以人臣而拒人主逆道也以新造之楚而禦中國必危也以劉備而敵曹公不當也三者皆短欲以抗王師之鋒必亡之道也將軍自料何與劉備琮曰不若也巽曰誠以劉備不足禦曹公則雖全楚不能以自存也誠以劉備足禦曹公則備不為將軍下也願將軍勿疑及操軍到襄陽琮舉州請降劉備奔夏口操以琮為青州刺史封列侯蒯越等侯者十五人乃釋嵩之囚以其名重甚加禮待使條品州人優劣皆擢而用之以嵩為大鴻臚以交友禮待之蒯越光祿勳劉光先尚書令初表之結袁紹也侍中從事鄧義諫不聽義以疾退終表世不仕操以為侍中其餘多至大官操後敗於赤壁劉備表琦為荊州刺史明年卒論曰袁紹初以豪俠得衆遂懷雄霸之圖天下勝兵舉旗者莫不假以為名及臨場決敵則悍夫爭命深籌高議則智士傾心盛哉乎其所資也韓非曰佷剛而不和愎過而好勝嫡子輕而庶子重斯之謂亡徵劉表道不相越而欲臥收天運擬蹤三分其猶木禺之於人也贊曰紹姿弘雅表亦長者稱雄河外強南夏魚儷漢舳雲屯冀馬闚圖訊鼎禋天類社既云天工亦資人亮矜彊少成坐談奚望回皇冢嬖身穨業喪, WYG: 一}
