  - {type: variant, offset: 651, length: 2, content: 經義, WYG: 旦將妻子車騎百餘東奔趙萌於新豐更始復疑王匡陳牧成丹與張卬等同謀乃並召入牧丹先至即斬之王匡懼將兵入長安與張卬等合李松還從更始與趙萌共攻匡卬於城内連戰月餘匡等敗走更始徙居長信宫三輔黄圖曰從洛門至周廟門有長信宫在其中赤眉至髙陵匡等迎降之遂共連兵而進更始城守使李松出戰敗死者二千餘人赤眉生得松時松弟汎為城門校尉赤眉使使謂之曰開城門活汝兄汎即開門九月赤眉入城更始單騎走從厨城門出三輔黄圖曰洛城門王莽改曰建子門其内有長安厨官俗名之為厨城門今長安故城北面之中門是也諸婦女從後連呼曰陛下當下謝城更始即下拜復上馬去初侍中劉恭以赤眉立其弟盆子自繫詔獄聞更始敗乃出步從至髙陵止傳舎右輔都尉嚴本本或作平或作丕恐失更始為赤眉所誅將兵在外號為屯衞而實囚之赤眉下書曰聖公降者封長沙王過二十日勿受更始遣劉恭請降赤眉使其將謝祿往受之十月更始遂隨祿肉袒詣長樂宫上璽綬於盆子赤眉坐更始置庭中將殺之劉恭謝祿為請不能得遂引更始出劉恭追呼曰臣誠力極請得先死㧞劒欲自刎赤眉帥樊崇等遽共救止之乃赦更始封為畏威侯劉恭復為固請竟得封長沙王更始常依謝祿居劉恭亦擁䕶之三輔苦赤眉暴虐皆憐更始而張卬等以為慮謂祿曰今諸營長多欲簒聖公者一旦失之合兵攻公自滅之道也於是祿使從兵與更始共牧馬於郊下因令縊殺之劉恭夜往収藏其屍光武聞而傷焉詔大司徒鄧禹𦵏之於霸陵有三子求歆鯉明年夏求兄弟與母東詣洛陽帝封求為襄邑侯奉更始祀歆為穀孰侯鯉為夀光侯求後徙封咸陽侯求卒子廵嗣復徙封灌澤侯襄邑即春秋襄牛地也今為縣在宋州西穀孰縣屬梁國在宋州東南夀光縣屬北海郡今青州縣也灌澤縣今澤州縣故曰徙封廵卒子姚嗣論曰周武王}
