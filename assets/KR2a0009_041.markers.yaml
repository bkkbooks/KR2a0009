  - {type: variant, offset: 94, length: 0, content: '', WYG: 於是諸亡命馬武王常成丹等往從之共攻離鄉聚藏於綠林中離鄉聚謂諸鄉聚離散去城郭逺者大曰鄉小曰聚前書曰収合離鄉置大城中即其義也綠林山在今荆州當陽縣東北也數月間至七八千人地皇二年王}
  - {type: page-break, offset: 94, content: '', id: KR2a0009_WYG_041-2a, image: WYG0252/WYG0252-0461a.png}
  - {type: variant, offset: 94, length: 0, content: '', krp: 於是諸亡命馬武王常成丹等往從之共攻離鄉聚藏於綠林中離鄉聚謂諸鄉聚離散去城郭逺者大曰鄉小曰聚前書曰収合離鄉置大城中即其義也綠林山在今荆州當陽縣東北也數月間至七八千人地皇二年王}
  - {type: variant, offset: 95, length: 1, content: 敗, WYG: 年也荆州牧某史闕名也發奔命二萬人攻之匡等相率迎擊於雲杜雲杜縣名屬江夏郡故城在今復州沔陽縣西北大破牧軍殺數千人盡獲輜重續漢書曰牧欲北歸隨武等復遮擊之鈎牧車屏泥刺殺其驂乗然不敢殺牧也劉攽曰案馬謂之驂人謂之參乗只合用參字遂攻㧞竟陵縣名屬江夏郡故城在今郢州長夀縣南轉擊雲杜安陸安陸縣屬江夏郡今安州縣也多畧婦女還入綠林中至有五萬餘口州郡不能制三年大疾疫死者且半乃各分散引去王常成丹西入南郡號下江兵王匡王鳳馬武及其支黨朱鮪張卬等續漢書卬作印北入南陽號新市兵皆自稱將軍七月匡等進攻隨未能下隨縣屬南陽郡今隨州縣平林人陳牧廖湛廖音力弔反復聚衆千餘人號平林兵以應之聖公因往從牧等為其軍安集掾欲其安集軍衆故權以為官名是時光武及兄伯升亦起舂陵與諸部合兵而進四年正月破王莽前隊大夫甄阜屬正梁丘賜斬之號聖公為更始將軍衆雖多而無所統一諸將遂共議立更始為天子二月辛巳設壇場於淯水上沙中陳兵大㑹更始即帝位南面立朝羣臣素懦弱羞愧流汗舉手不能言於是大赦}
