  - {type: variant, offset: 640, length: 0, content: '', WYG: 興化致理譬猶縁木求魚升山採珠求之非所不可得也孟子對齊宣王曰以若所為求若所欲猶緣木求魚也海内望此有以闚度漢祚臣非有憎疾以求進也但為陛下惜此舉厝敗材傷錦所宜至慮孟子謂齊宣王曰為巨室則必使工師求大木工師得大木則王喜以為能勝其任也匠人斵而小之則王怒以為不勝其任矣左傳子産謂子皮曰子有美錦不使人學製焉大官大邑身之所庇而使學者製焉其為美錦不亦重乎未嘗操刀而使之割其傷實多也惟割既往謬妄之失思隆周文濟濟之美割絶也詩大雅曰濟濟多士文王以寧更始怒繫淑詔獄自是關中離心四方怨叛諸將出征各自專置牧守州郡交錯不知所從十二月赤眉西入關三年正月平陵人方望立前孺子劉嬰為天子初望見更始政亂度其必敗謂安陵人弓林等曰前定安公嬰平帝之嗣雖王莽簒奪而嘗為漢主}
