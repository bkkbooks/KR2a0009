  - {type: variant, offset: 170, length: 0, content: '', WYG: 李軼為舞隂王水衡大將軍成丹為襄邑王大司空陳牧為陰平王陰平縣屬廣漢國驃騎大將軍宋佻為潁陰王尹尊為郾王唯朱鮪辭曰臣非劉宗不敢干典遂讓不受乃徙鮪為左大司馬劉賜為前大司馬使與李軼李通王常等鎮撫關東}
