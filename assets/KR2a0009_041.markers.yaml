  - {type: variant, offset: 3113, length: 1467, content: 縣建武元年拜河南太守及封功臣帝令各言所樂諸將皆占豐邑美縣唯綝願封本鄉或謂綝曰人皆欲縣子獨求鄉何也綝曰昔孫叔敖勑其子受封必求墝埆之地今綝能薄功微得鄉亭厚矣帝從之封定陵新安鄉侯食邑五千戶後徙封陵陽侯鴻年十三從桓榮受歐陽尚書三年而明章句善論難為都講遂篤志精銳布衣荷擔不遠千里初綝從世祖征伐鴻獨與弟盛居憐盛幼小而共寒苦及綝卒鴻當襲封上書讓國於盛不報既葬乃挂縗絰於冢廬而逃去留書與盛曰鴻貪經書不顧恩義弱而隨師生不供養死不飯唅皇天先祖並不祐助身被大病不任茅土前上疾狀願辭爵仲公章寢不報迫且當襲封謹自放𠫓廾逐求良醫如遂不瘳永歸溝壑鴻初與九江人鮑駿同事桓榮甚相友善及鴻亡封與駿遇於東海陽狂不識駿駿乃止而讓之曰昔伯夷吳札亂世權行故得申其志耳春秋之義不以家事廢王事今子以兄弟私恩而絕父不滅之基可謂智乎鴻感悟垂涕歎息乃還就國開門教授鮑駿亦上書言鴻經學至行顯宗甚賢之永平十年詔徵鴻至即召見說文侯之命篇賜御衣及綬稟食公車與博士同禮頃之拜侍中十三年兼射聲校尉建初四年徙封魯陽鄉侯肅宗詔鴻與廣平王羨及諸儒樓望成封桓郁賈逵等論定五經同異於北宮白虎觀使五官中郎將魏應主承制問難侍中淳于恭奏上帝親稱制臨決鴻以才高論難最明諸儒稱之帝數嗟美焉時人嘆曰殿中無雙丁孝公數受賞賜擢徙校書遂代成封為少府門下由是益盛遠方至者數千人彭城劉愷北海巴茂九江朱倀皆至公卿元和三年徙封馬亭鄉侯和帝即位遷太常永元四年代袁安為司徒是時竇太后臨政憲兄弟各威權鴻因日食上封事曰臣聞日者陽精守實不君之象也月者陰精盈毀有常臣之表也故日食者臣乘君陰陵陽月滿不下驕盈也昔周室衰季皇甫之屬專權於外黨類強盛侵奪主埶則日月薄食故詩曰十月之交朔月辛卯日有食之亦孔之醜春秋日食三十六弒君三十二變不空生各以類應夫威柄不以放下利器不可假人覽觀往古近察漢興傾危之禍靡不由之是以三桓專魯田氏齊六卿分晉諸呂握權統嗣幾移哀平之末廟不血食故雖有周公之親而無其德不得行其埶也謁辭求通待報雖奉符璽受臺勑不敢便去久者至數十日背王室向私門此乃上威損下權盛也人道悖於下效驗見於天雖有隱謀神照其情垂象見戒以告人君閒者月滿先節過望不此臣驕溢背君專功獨行也陛下未深覺悟故天重見戒誠宜畏懼以防其禍詩云敬天之怒不敢戲豫若勑政責躬杜漸防萌則凶妖銷滅害除福湊矣莫不忽於微細以致其大恩不忍誨義不忍割去事之後未然之明鏡也臣愚以為左官外附之臣依託權門傾覆諂諛以求容媚者宜行一切之誅閒者大將軍再出威振州郡莫不賦斂吏人遣使貢獻大將軍雖云不受而物不還主部署之吏無所畏憚縱行非法不伏罪辜故海內貪猾競為姦吏小民吁嗟怨氣滿腹臣聞天不可以不剛不剛則三光不明王不可以不彊不彊則宰牧從橫宜因大變改政匡失以塞天意時大郡口五六十萬舉孝廉二人小郡口二十萬并有蠻夷者亦舉二人帝以為不均下公卿會議鴻與司空劉方上言凡口率之科宜有階品蠻夷錯雜不得為數自今郡國率二十萬口歲舉孝廉一人四十萬二人六十萬三人八十萬四人百萬五人百二十萬六人不滿二十萬二歲一人不滿十萬三歲一人帝從之六年鴻薨賜贈有加常禮子湛嗣湛卒子浮嗣浮卒子夏嗣論曰孔子曰太伯三以天下讓民無得而稱焉孟子曰聞伯夷之風者貪夫廉懦夫有立志若乃太伯以天下而違周伯夷率絜情以去國並未始有其讓也故太伯稱至德伯夷稱賢人後世聞其讓而慕其風徇其名而昧其致所以激詭行生而取與妄矣至夫鄧彪劉愷讓其弟以取義使弟受非服而己厚其名於義不亦薄乎君子立言非苟顯其理將以啟天下之方悟者立行非獨善其身將以訓天下之方動者言行之所開塞可無慎哉原丁鴻之心主於忠愛乎何其終悟而從義也異夫數子類乎徇名者焉贊曰五更待問應若鳴鍾庭列輜駕堂修禮容穆穆帝則擁經以從丁鴻翼翼讓而不飾高論白虎深言日食, WYG: 考證}
