  - {type: variant, offset: 2168, length: 7, content: 宦官秉權典執政, WYG: 在長安遣兵擊之於郁夷郁夷縣屬右扶風也反為所敗禹乃出之雲陽九月赤眉復入長安止桂宫長安記曰桂宫在未央宫北亦曰北宫時漢中賊延岑出散關屯杜陵逢安將十餘萬人擊之鄧禹以逢安精兵在外唯盆子與羸弱居城中乃自往攻之㑹謝祿救至夜戰稾街中三輔舊事曰長安城中有稾街禹兵敗走延岑及更始將軍李寳合兵數萬人與逢安戰於杜陵岑等大敗死者萬餘人寳遂降安而延岑収散卒走寳乃宻使人謂岑曰子努力還戰吾當於内反之表裏合勢可大破也岑即還挑戰安等空營擊之寳從後悉㧞赤眉旌幟更立已幡旗安等戰疲還營見旗幟皆白大驚亂走自投川谷死者十餘萬逢安與數千人脱歸長安時三輔大飢人相食城郭皆空白骨蔽野遺人往往聚為營保各堅守不下赤眉虜掠}
