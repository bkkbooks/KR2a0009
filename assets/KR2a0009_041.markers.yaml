  - {type: variant, offset: 2827, length: 285, content: 六諸儒莫不傷之所著七說及書凡三篇蔡邕等共論序其志僉以為彬有過人者四夙智早成岐嶷也學優文麗至通也仕不苟祿絕高也辭隆從窊絜操也乃共樹碑而頌焉劉猛琅邪人桓帝時為宗正直道不容自免歸家靈帝即位太傅陳蕃大將軍竇武輔政復徵用之論曰伏氏自東西京相襲為名儒以取爵位中興而桓氏尤盛自榮至典世宗其道父子兄弟代作帝師受其業者皆至卿相顯乎當世孔子曰古之學者為己今之學者為人為人者憑譽以顯物為己者因心以會道桓榮之累世見宗豈其為己乎丁鴻字孝公潁川定陵人也父綝字幼春王莽末守潁陽尉世祖略地潁陽潁陽城守不下綝說其宰遂與俱降世祖大喜厚加賞勞以綝為偏將軍因從征伐綝將兵先度河移檄郡國攻營略地下河南陳留潁川二十, WYG: ''}
