  - {type: variant, offset: 2245, length: 1, content: 同, WYG: 熊耳山齊宜陽縣故城韓國城也在今洛州福昌縣東酈元水經注曰洛水之北有熊耳山雙巒競舉狀如熊耳在宜陽西也帝令縣厨賜食衆積困餧十餘萬人皆得飽飫明旦大陳兵馬臨洛水令盆子君臣列而觀之謂盆子曰自知當死不對曰罪當應死猶幸上憐赦之耳帝笑曰兒大黠宗室無蚩者釋名曰蚩癡也又謂崇等曰得無悔降乎朕今遣卿歸營勒兵鳴鼓相攻決其勝負不欲强相服也徐宣等叩頭曰臣等出長安東都門君臣計議歸命聖徳百姓可與樂成難與圖始故不告衆耳今日得降猶去虎口歸慈母誠歡誠喜無所恨也帝曰卿所謂鐵中錚錚傭中佼佼者也説文曰錚錚金也鐵之錚錚言微有剛利也錚音初耕反佼音古巧反佼好貌也詩曰佼人僚兮今相傳云音胡巧反言佼佼者凡傭之人稍為勝也又曰諸卿大為無道所過皆夷滅老弱溺社稷汚井竈溺音奴弔反然猶有三善攻破城邑劉攽曰案文當云攻城破邑周徧天下本故妻婦無所改易是一善也立君能用宗室是二善也餘賊立君迫急皆持其首降自以為功諸卿獨完全以付朕是三善也乃令各與妻子居洛陽賜宅人一區田二頃其夏樊崇逢安}
