  - {type: variant, offset: 156, length: 4, content: 擢榮弟子, WYG: 懸莽首於宛城市是月㧞洛陽生縛王匡哀章至皆斬之十月使奮威大將軍劉信擊殺劉望於汝南并誅嚴尤陳茂更始遂北都洛陽以劉賜為丞相申屠建李松自長安傳送乗輿服御又遣中黄門從官奉迎遷都二年二月更始自洛陽而西初發李松奉引馬驚奔觸北宫鐵柱門三馬皆死續漢書曰馬禍也時更始失道將亡之徴初王莽敗唯未央宫被焚而已其餘宫館一無所毁宫女數千備列後庭自鍾鼔帷帳輿輦器服太倉武庫官府市里不改於舊更始既至居長樂宫升前殿郎吏以次列庭中更始羞怍俛首刮席不敢視怍顔色變也俛俯也諸將後至者更始問虜掠得㡬何左右侍官皆宫省久吏各驚相視李松與棘陽人趙萌説更始宜悉王諸功臣朱鮪爭之以為髙祖約非劉氏不王更始乃先封宗室太常將軍劉祉為定陶王劉賜為宛王劉慶為燕王劉歙為元氏王大將軍劉嘉為漢中王劉信為汝陰王後遂立王匡為比陽王王鳳為宣城王朱鮪為膠東王衞尉大將軍張卬為淮陽王廷尉大將軍王常為鄧王執金吾大將軍廖湛為穰王申屠建為平氏王尚書胡殷為隨王柱天大將軍李通為西平王西平縣屬汝南郡故城在今}
