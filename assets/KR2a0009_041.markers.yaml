  - {type: variant, offset: 171, length: 0, content: '', WYG: 李松為丞相趙萌為右大司馬共秉内任更始納趙萌女為夫人有寵遂委政於萌日夜與婦人飲讌後庭羣臣欲言事輙醉不能見時不得已乃令侍中坐帷内與語諸將識非更始聲出皆怨曰成敗未可知遽自縱放若此韓夫人尤嗜酒每侍飲見常侍奏事輙怒曰帝方對我飲正用此時持事來乎起抵破書案抵擊也趙萌專權威福自己郎吏有說萌放縱者更始怒㧞劒擊之自是無復敢言萌私忿侍中引下斬之更始救請不從時李軼朱鮪擅命山東王匡張卬横暴三輔其所授官爵者皆羣小賈豎或有膳夫庖人多著繡面衣錦袴襜褕諸于罵詈道中襜褕諸于見光武紀續漢志曰時智者見之以為服之不中身之灾也乃奔入邊郡避之是服妖也其後為赤眉所殺也長安為之語曰竈下養中郎將爛羊胃騎都尉爛羊頭關内侯公羊傳曰炊烹為養軍帥將軍劉攽曰案是時多置軍師鄧禹傳亦作軍師將軍此當作師豫章李淑上書諫曰方今賊寇始誅王化未行百官有司宜慎其任夫三公上應台宿九卿下括河海春秋漢含孳曰三公在天為三台九卿為北斗故三公象五岳九卿法河海二十七大夫法山陵八十一元士法谷阜合為帝佐以匡綱紀故天工人其代之陛下定業雖因下江平林之埶斯蓋臨時濟用不可施之既安宜釐改制度更延英俊因才授爵以匡王國今公卿大位莫非戎陳}
