  - {type: variant, offset: 1137, length: 147, content: 徒多至公卿子郁嗣論曰張佚訐切陰侯以取高位危言犯衆義動明后知其直有餘也若夫一言納賞志士為之懷恥受爵不讓風人所以興歌而佚廷議戚援自居全德意者以廉不足乎昔樂羊食子有功見疑西巴放麑以罪作傅蓋推仁審偽本乎其情君人者能以此察則真邪幾於辨矣郁字仲恩少以父任為郎敦厚篤學傳父業以尚書教授門徒常數百人榮卒郁當襲爵, WYG: 共卧起唯得}
