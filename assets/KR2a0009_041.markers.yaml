  - {type: variant, offset: 2239, length: 0, content: '', WYG: 耿弇等屯宜陽分為二道以要其還路勅諸將曰賊若東走可引宜陽兵㑹新安賊若南走可引新安兵㑹宜陽明年正月鄧禹自河北度擊赤眉於湖湖縣故城在今虢州湖城縣西南禹復敗走赤眉遂出關南向征西大將軍馮異破之於崤底即崤坂也在今洛州永寧縣西北帝聞乃自將幸宜陽盛兵以邀其走路赤眉忽遇大軍震驚不知所為乃遣劉恭乞降曰盆子將百萬衆降陛下}
