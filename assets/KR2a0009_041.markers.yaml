  - {type: variant, offset: 1487, length: 248, content: 道若性昔成王幼小越在襁保周公在前史佚在後太公在左召公在右中立聽朝四聖維之是以慮無遺計舉無過事孝昭皇帝八歲即位大臣輔政亦選名儒韋賢蔡義夏侯勝等入授於前平成聖德近建初元年張酺魏應召訓亦講禁中臣伏惟皇帝陛下躬天然之姿宜漸教學而獨對左右小臣未聞典義昔五更桓榮親為帝師子郁結髮敦尚繼傳父業故再以校尉入授先帝父子給事禁省更歷四世今白首好禮經行篤備又宗正劉方宗室之表善為詩經先帝所襃宜令郁方並入教授以崇本朝光示大化由是遷長樂少府復入侍講頃之轉為侍中奉車都尉永元四年代丁鴻為太常明年病卒郁經授二帝恩寵甚篤賞賜前後, WYG: 宫女猶有}
