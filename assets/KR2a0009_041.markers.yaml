  - {type: variant, offset: 641, length: 2, content: 皇太, WYG: 皆云劉氏真人當更受命欲共定大功何如林等然之乃於長安求得嬰將至臨涇立之今涇州縣也聚黨數千人望為丞相林為大司馬更始遣李松與討難將軍蘇茂等擊破皆斬之又使蘇茂拒赤眉於𢎞農茂軍敗死者千餘人三月遣李松㑹朱鮪與赤眉戰於蓩鄉蓩音莫老反字林云毒草也因以為地名續漢志𢎞農有蓩鄉東觀記曰徐宣樊崇等入至𢎞農枯樅山下與更始將軍蘇茂戰崇北至蓩鄉轉至湖湖即湖城縣也以此而言其蓩蓋在今虢州湖城縣之間松等大敗棄軍走死者三萬餘人時王匡張卬守河東為鄧禹所破還奔長安卬與諸將議曰赤眉近在鄭華陰間旦暮且至今獨有長安見滅不久不如勒兵掠城中以自富轉攻所在東歸南陽収宛王等兵事若不集復入湖池中為盜耳申屠建廖湛等皆以為然共入說更始更始怒不應莫敢復言及赤眉立劉盆}
