  - {type: variant, offset: 648, length: 2, content: 姿通, krp: 掫音子侯反續漢志曰新豐有鴻門亭掫城即此也張卬廖湛胡殷申屠建等與御史大夫隗囂合謀欲以立秋日貙膢時共劫更始前書音義曰貙獸以立秋日祭獸王者亦此日出獵用祭宗廟冀州北郡以八月朝作飲食為膢其俗語曰膢臘社伏貙音丑于反膢音婁俱成前計侍中劉能卿知其謀以告之更始託病不出召張卬等卬等皆入將悉誅之唯隗囂不至更始狐疑使卬等四人且待於外廬卬與湛殷疑有變遂突出獨申屠建在更始斬之卬與湛殷遂勒兵掠東西市昏時燒門入戰於宫中更始大敗}
