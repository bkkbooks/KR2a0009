  - {type: variant, offset: 1081, length: 0, content: '', WYG: 引兵還攻破海曲執縣宰諸吏叩頭為宰請母曰吾子犯小罪不當死而為宰所殺殺人當死又何請乎遂斬之以其首祭子冢復還海中後數嵗琅邪人樊崇起兵於莒東觀記曰樊崇字細君衆百餘人轉入太山自號三老時青齊大饑寇賊蜂起羣盜以崇勇猛皆附之一嵗間至萬餘人崇同郡人逄安劉攽曰案逢字從夅音龎字自從夅非借逢為龎音此傳内皆誤東海人徐宣謝祿楊音東觀記曰逄音龎安字少子東莞人也徐宣字驕稺謝祿字子竒皆東海臨沂人也各起兵合數萬人復引從崇共還攻莒不能下轉掠至姑幕姑幕縣名故城在今宻州莒縣東北古薄姑氏之國因擊王莽探湯侯田況大破之王莽改北海益縣曰探湯殺萬餘人遂北入青州所過虜掠還至太山留屯南城南城縣屬東海郡有南城山因以為名也初崇等以困窮為寇無攻城徇地之計衆既寖盛乃相與為約殺人者死傷人者償創以言辭為約束無文書旌旗部曲號令其中最尊者號三老次從事次卒吏汎相稱曰臣人劉攽曰案三老從事卒史皆是漢小吏名或鄉官也赤眉之起不知自名官府取耳目所熟者為稱呼故有此號後人不曉誤以史為吏字卒吏絶無義理當改為卒史又案前書言盜賊亶稱巨人今此為臣人亦誤也當作巨王莽遣平均公亷丹太師王匡擊之崇等欲戰恐其衆與莽兵亂乃皆朱其眉以相識别由是號曰赤眉赤眉遂大破丹匡軍殺萬餘人追至無鹽無鹽縣名故城在今鄆州須昌縣東亷丹戰死王匡走崇又引其兵十餘萬復還圍莒數月或説崇曰莒父母之國奈何攻之乃解去時吕母病死其衆分入赤眉青犢銅馬中赤眉遂寇東海與王莽沂平大尹王莽改東海郡曰沂平以郡守為大尹戰敗死者數千人乃引去掠楚沛汝南潁川還入陳留攻㧞魯城轉至濮陽㑹更始都洛陽遣使降崇崇等聞漢室復興即留其兵自將渠帥二十餘人隨使者至洛陽降更始皆封為列侯崇等既未有國邑而留衆稍有離叛乃遂亡歸其營將兵入潁川分其衆為二部崇與逄安為一部徐宣謝祿楊音為一部崇安攻㧞長社南擊宛斬縣令而宣祿等亦㧞陽翟引之梁今汝州梁縣也擊殺河南太守赤眉衆雖數戰勝而疲敝厭兵厭倦皆日夜愁泣思欲東歸崇等計議慮衆東向必散不如西攻長安更始二年冬崇安自武關宣等從陸渾關武關在今商州上洛縣東河圖括地象曰武關山為地門上為天齊星前書曰陸渾縣有關在今洛州伊闕縣西南兩道俱入三年正月俱至𢎞農與更始諸將連戰尅勝衆遂大集乃分萬人為一營凡三十營營置三老從事各一人進至華隂軍中常有齊巫鼓舞祠城陽景王以求福助以其定諸吕安社稷故郡國多為立祠焉盆子承其後故軍中祠之巫狂言景王大怒曰當為縣官何故為賊縣官謂天子也有笑巫者輙病軍中驚動時方望弟陽怨更始殺其兄乃逆説崇等曰更始荒亂政令不行故使將軍得至於此今將軍擁百萬之衆西向帝城而無稱號名為羣賊不可以久不如立宗室挾義誅伐以此號令誰敢不服崇等以為然而巫言益甚前及鄭今華州縣乃相與議曰今迫近長安而鬼神如此當求劉氏共尊立之六月遂立盆子為帝自號建世元年初赤眉過式掠盆子及二兄恭茂皆在軍中恭少習尚書略通大義及隨崇等降更始即封為式侯以明經數言事拜侍中從更始在長安盆子與茂留軍中屬右校卒吏劉攽曰案吏當為史説並見上劉俠卿主芻牧牛號曰牛吏及崇等欲立帝求軍中景王後者得七十餘人唯盆子與茂及前西安侯劉孝最為近屬崇等議曰聞古天子將兵稱上將軍乃書札為符曰上將軍又以兩空札置笥中札簡也笥篋也遂於鄭北設壇場祠城陽景王諸三老從事皆大㑹陛下列盆子等三人居中立以年齒探札盆子最幼後探得符諸將乃皆稱臣拜盆子時年十五被髪徒跣敝衣赭汗見衆拜恐畏欲啼茂謂曰善藏符盆子即齧折棄之復還依俠卿俠卿為制絳單衣半頭赤幘幘巾所以覆髻也續漢書曰童子幘無屋示未成人也半頭幘即空頂幘也其上無屋故以為名董仲舒繁露曰以赤統者幘尚赤盆子承漢統故用赤也東宫故事曰太子有空頂幘一枚即半頭幘之製也直綦履綦履文也蓋直刺其文以為飾也乗軒車大馬赤屏泥赤屏泥謂以緹油屏泥於軾前絳襜絡襜帷也車上施帷以屏蔽者交絡之以為飾續漢志曰王公列侯安車加交絡帷裳也而猶從牧兒遨崇雖起勇力而為衆所宗然不知書數徐宣故縣獄吏能通易經遂共推宣為丞相崇御史}
