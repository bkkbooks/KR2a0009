  - {type: variant, offset: 150, length: 5, content: 子選求明經, WYG: 師王匡國將哀章守洛陽風俗通曰哀姓魯哀公之後因諡以為姓更始遣定國上公王匡攻洛陽西屏大將軍申屠建丞相司直李松攻武關三輔震動是時海内豪傑翕然響應皆殺其牧守自稱將軍用漢年號以待詔命旬月之間徧於天下長安中起兵攻未央宫九月東海人公賔就斬王莽於漸臺風俗通曰公賔姓也魯大夫公賔庚之後漸臺太液池中臺也為水所漸潤故以為名収璽綬傳首詣宛更始時在便坐黄堂取視之喜曰莽不如是當與霍光等寵姬韓夫人笑曰若不如是帝焉得之乎更始悦}
