  - {type: variant, offset: 943, length: 726, content: 幸號貴人為后上以后母宣為長安君封其兄弟愛寵隆崇又多封無功者去年春白馬令李雲坐直諫死至此彗除心尾火連作五年正月壬午南宮丙署火四月乙丑恭北陵東闕火戊辰虎賁掖門火五月康陵園寢火甲申中藏府承祿署火七月己未南宮承善闥內火六年四月辛亥康陵東署火七月甲申平陵園寢火八年二月己酉南宮嘉德署黃龍千秋萬歲殿皆火四月甲寅安陵園寢火閏月南宮長秋和歡殿後鉤盾掖庭朔平署各火十一月壬子德陽前殿西閤及黃門北寺火殺人九年三月癸巳京都夜有火光轉行民相驚譟靈帝熹平四年五月延陵園災光和四年閏月辛酉北宮東掖庭永巷署災五年五月庚申德陽前殿西北入門內永樂太后宮署火中平二年二月己酉南宮雲臺災庚戌樂城成門災延及北闕度道西燒嘉德和歡殿案雲臺之災自上起榱題數百同時並然若就縣華鐙其日燒盡延及白虎威興門尚書符節蘭臺夫雲臺者乃周家之所造也圖書術籍珍玩寶怪皆所藏在也京房易傳曰君不思道厥妖火燒宮是時黃巾作慝變亂天常七州二十八郡同時俱發命將出衆雖頗有所禽然宛廣宗曲陽尚未破壞役起負海杼柚空懸百姓死傷已過半矣而靈帝曾不克己復禮虐侈滋甚尺一雨布騶騎電激官非其人政以賄成內嬖鴻都並受封爵京都為之語曰今茲諸侯歲也天戒若曰放賢賞淫何以舊典為故焚其臺門祕府也其後三年靈帝暴崩續以董卓之亂火三日不絕京都為丘墟矣獻帝初平元年八月霸橋災其後三年董卓見殺庶徵之恆燠漢書以冬溫應之中興以來亦有冬溫而記不錄云安帝元初三年有瓜異本共生一八瓜同蔕時以為嘉瓜或以為瓜者外延離本而實女子外屬之象也是時閻皇后初立後閻后與外親耿寶等共譖太子廢為濟陰王更外迎濟北王子犢立之草妖也桓帝延熹九年雒陽城局竹柏葉有傷者占曰天子凶靈帝熹平三年右校別作中有兩樗樹皆高四尺所其一株宿夕暴長長丈餘大一圍作胡人狀頭目鬢鬚髮備具京房易傳曰王德衰下人將起則有木生人狀五, WYG: 屍骸娥}
