  - {type: variant, offset: 2103, length: 246, content: 年秋五色大鳥見于新城衆鳥隨之時以為鳳皇時靈帝不恤政事常侍黃門專權羽孽之時也衆鳥之性見非常班駮好聚觀之至於小爵希見梟者虣見猶聚中平三年八月中懷陵上有萬餘爵先極悲鳴已因亂鬬相殺皆斷頭懸著樹枝枳棘到六年靈帝崩大將軍何進以內寵外嬖積惡日久欲悉糾黜以隆更始政而太后持疑事久不決進從中出於省內見殺因是有司盪滌虔劉後祿而尊厚者無餘矣夫陵者高大之象也天戒若曰諸懷爵祿而尊厚者還自相害至滅亡也桓帝建和三年秋七月北地廉雨肉似羊肋或大如手近赤祥也是時梁太后攝政兄梁冀專權枉誅漢良臣故太尉李固杜喬天下寃之其後梁氏誅滅, WYG: 考證}
  - {type: variant, offset: 2103, length: 246, content: 年秋五色大鳥見于新城衆鳥隨之時以為鳳皇時靈帝不恤政事常侍黃門專權羽孽之時也衆鳥之性見非常班駮好聚觀之至於小爵希見梟者虣見猶聚中平三年八月中懷陵上有萬餘爵先極悲鳴已因亂鬬相殺皆斷頭懸著樹枝枳棘到六年靈帝崩大將軍何進以內寵外嬖積惡日久欲悉糾黜以隆更始政而太后持疑事久不決進從中出於省內見殺因是有司盪滌虔劉後祿而尊厚者無餘矣夫陵者高大之象也天戒若曰諸懷爵祿而尊厚者還自相害至滅亡也桓帝建和三年秋七月北地廉雨肉似羊肋或大如手近赤祥也是時梁太后攝政兄梁冀專權枉誅漢良臣故太尉李固杜喬天下寃之其後梁氏誅滅, krp: 考證}
