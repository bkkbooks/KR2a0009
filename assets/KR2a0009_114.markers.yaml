  - {type: variant, offset: 2061, length: 0, content: '', WYG: 餘卒倫妹芝亦有才義少喪親長而追感乃作申情賦云龐淯母酒泉龐淯母者趙氏之女也字娥父為同縣人所殺而娥兄弟三人時俱病物故讐乃喜而自賀以為莫已報也娥陰懷感憤乃潛備刀兵常帷車以候讐家十餘年不能得後遇於都亭刺殺之因詣縣自首曰父讐已報請就刑戮福禄長尹嘉義之解印綬欲與俱亡娥不肯去曰怨塞身死妾之明分結罪理獄君之常理何敢茍生以枉公法後遇赦得免州郡表其閭太常張奐嘉歎以束帛禮之劉長卿妻沛劉長卿妻者同郡桓鸞之女也鸞已見前傳生}
