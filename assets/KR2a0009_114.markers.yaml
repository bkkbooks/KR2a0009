  - {type: variant, offset: 240, length: 299, content: 月己亥北宮盛饌門閤火是時和帝幸鄧貴人陰后寵衰怨恨上有欲廢之意明年會得陰后挾偽道事遂廢遷于桐宮以憂死立鄧貴人為皇后十五年六月辛酉漢中城固南城門災此孝和皇帝將絕世之象也其後二年宮車晏駕殤帝及平原王皆早夭折和帝世絕安帝永初二年四月甲寅漢陽河阿陽城中失火燒殺三千五百七十人先是和帝崩有皇子二人皇子勝長鄧皇后貪殤帝少欲自養長立之延平元年殤帝崩勝有厥疾不篤羣臣咸欲立之太后以前既不立勝遂更立清河王子是為安帝司空周章等心不掩厭服謀欲誅鄧氏廢太后安帝而更立勝元年十一月事覺章等被誅其後涼州叛羌為害大甚涼州諸郡寄治馮翊扶風界及太后崩鄧氏被誅四年三月戊子杜陵園火元初四年二月壬戌武庫火是時羌叛大為寇害發天下兵以攻禦之積, WYG: ''}
