  - {type: variant, offset: 33, length: 1, content: 妾, krp: 母非所生憎毁日積而穆姜慈愛溫仁撫字益隆衣食資供皆兼倍所生或謂母曰四子不孝甚矣何不别居以遠之對曰吾方以義相導使其自遷善也及前妻長子興遇疾困篤母惻隱自然親調藥膳恩情篤密興疾久乃瘳於是呼三弟謂曰繼母慈仁出自天授吾兄弟不識恩養禽獸其心雖母道益隆我曹過惡亦已深矣遂將三弟詣南鄭獄陳母之德狀已之過乞就刑辟縣言之於郡郡守表異其母蠲除家徭遣散四子許以脩革自後訓導愈明並}
  - {type: variant, offset: 35, length: 203, content: 妻則火不炎上謂火失其性而為災也又曰視之不明是謂不悊厥咎舒厥罰常燠厥極疾時則有草妖時則有蠃蟲之孽時則有羊禍時則有赤眚赤祥惟水沴火蠃蟲劉歆傳以為羽蟲建武中漁陽太守彭寵被徵書至明日潞縣火災起城中飛出城外燔千餘家殺人京房易傳曰上不儉下不節盛火數起燔宮室儒說火以明為德而主禮時寵與幽州牧朱浮有𨻶疑浮見浸譖故意狐疑其妻勸無應徵遂反叛攻浮卒誅滅和帝永元八年十二月丁巳南宮宣室殿火是時和帝幸北宮竇太后在南宮明年竇太后崩十三, WYG: 良士穆姜}
