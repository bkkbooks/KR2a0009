  - {type: variant, offset: 23, length: 0, content: '', krp: 楚莊王好田獵樊姬故不食鮮禽以諫王齊桓公好音樂衞姬不聽五音以諫公並解見文苑傳也故君以責我我言而不用君必謂我不奉教令則罪在我矣若言而見用是為子違父而從婦則罪在彼矣生如此亦何聊哉乃自殺莫不傷之曹世叔妻扶風曹世叔妻者同郡班彪之女也名昭字惠班一名姬博學高才世叔早卒有節行法度凡固著漢書其八表及天文志未及竟而卒和帝詔昭就東觀藏書閣踵而成之踵繼也帝數召入宫令皇后諸貴人師事焉號曰大家每有貢獻異物輙詔大家作賦頌及鄧太后臨朝與聞政事以出入之勤特封子成關内侯官至齊相時漢書始出多未能通者同郡馬融伏於閣下從昭受讀後又詔融兄續繼昭成之融兄名續見馬援傳永初中太后兄大將軍鄧騭以母憂上書乞身太后不欲許以問昭昭因上疏曰伏惟皇太后陛下躬盛德之美隆唐虞之政闢四門而開四聰采狂夫之瞽言納芻蕘之謀慮前漢曰狂夫之言明主擇焉詩曰先人有言詢於芻蕘妾昭得以愚朽身當盛明敢不披露肝膽以效萬一妾聞謙讓之風德莫大焉故典墳述美神祗降福易曰謙尊而光又曰鬼神害盈而福謙左傳曰謙讓者德之基也昔夷齊去國天下服其廉高孟子曰聞伯夷之風者貪夫廉懦夫有立志太伯違邠孔子稱為三讓周太王有疾太伯欲讓季歷託采藥於吳時已居周此言邠者蓋夲其始而言之也所以光昭令德揚名于後者也論語曰能以禮讓為國於從政乎何有論語孔子之言也何有言若無有由是言之推讓之誠其致遠矣今四舅深執忠孝引身自退四舅謂騭悝𢎞閶也而以方垂未靜拒而不許如後有毫毛加於今日謂有纖微之過則推讓之美失也誠恐推讓之名不可再得緣見逮及故敢昧死竭其愚情自知言不足采以示蟲螘之赤心太后從而許之於是騭等各還里第焉作女誡七篇有助内訓其辭曰鄙人愚暗受性不敏蒙先君之餘寵賴母師之典訓母傅母也師女師也左傳曰宋伯姬卒待姆也毛詩曰言告師氏言告言歸年十有四執箕箒於曹氏前書呂公謂高祖曰臣有息女願為箕帚妾言執箕帚主賤役以事舅姑于今四十餘載矣戰戰兢兢常懼黜辱以増父母之羞以益中外之累中内也夙夜劬心勤不告勞而今而後乃知免耳吾性疏頑教導無素素先也恒恐子穀負辱清朝三輔決錄注曰齊相子穀頗隨時俗注云曹成壽之子也司徒掾察孝廉為長垣長母為太后師徵拜中散大夫子穀即成之字也聖恩横加猥賜金紫漢官儀曰二千石金印紫綬實非鄙人庶幾所望也男能自謀矣吾不復以為憂也但傷諸女方當適人而不漸訓誨不聞婦禮懼失容它門取恥宗族吾今疾在沈滯性命無常念汝曹如此每用惆悵間作女誡七章願諸女各寫一通庶有補益裨助汝身去矣其朂勉之去矣猶言從今已往卑弱第一古者生女三日臥之牀下弄之瓦塼而齋告焉詩小雅曰乃生女子載寢之地載弄之瓦毛萇注云瓦紡塼也箋云臥之於地卑之也紡塼習其所有事於紡績也臥之牀下明其卑弱主下人也弄之瓦塼明其習勞主執勤也齋告先君明當主繼祭祀也毛詩傳曰采蘋大夫妻能循法度也能循法度則可以承先祖供祭祀矣于以采蘋南澗之濵于以采藻于彼行潦于以盛之維筐及筥于以湘之維錡及釜于以奠之宗室牖下誰其尸之有齊季女三者蓋女人之常道禮法之典教矣謙讓恭敬先人後已有善莫名不自名已之善也有惡莫辭忍辱含垢常若畏懼是謂卑弱下人也晩寢早作作起也勿憚夙夜執務私事不辭劇易劇猶雜也所作必成手跡整理是謂執勤也正色端操以事夫主清靜自守無好戲笑潔齊酒食以供祖宗潔清也謂食也左傳曰潔齊豐盛也是謂繼祭祀也三者茍備而患名稱之不聞黜辱之在身未之見也三者茍失之何名稱之可聞黜辱之可遠哉夫婦第二夫婦之道參配陰陽通達神明信天地之𢎞義人倫之大節也是以禮貴男女之際詩著關雎之義禮記曰昏禮者將合二姓之好上以事宗廟而下以繼後世也故君子重之詩關雎樂得淑女以配君子也由斯言之不可不重也夫不賢則無以御婦婦不賢則無以事夫夫不御婦則威儀廢缺婦不事夫則義理墮闕墮音許規反墮廢也方斯二者其用一也察今之君子徒知妻婦之不可不御威儀之不可不整故訓其男檢以書傳殊不知夫主之不可不事義禮之不可不存也但教男而不教女不亦蔽於彼此之數乎禮八歲始教之書十五而至於學矣禮記曰八歲入小學獨不可依此以為則哉敬愼第三陰陽殊性男女異行陽以剛為德陰以柔為用男以彊為貴女以弱為美故鄙諺有云生男如狼猶恐其尫生女如䑕猶恐其虎然則脩身莫若敬避彊莫若順故曰敬順之道婦之大禮也夫敬非它持久之謂也夫順非它寛裕之謂也持久者知止足也寛裕者尚恭下也夫婦之好終身不離房室周旋遂生媟黷媟黷既生語言過矣語言旣過縱恣必作縱恣旣作則侮夫之心生矣此由於不知止足者也夫事有曲直言有是非直者不能不爭曲者不能不訟訟爭既施則有忿怒之事矣此由於不尚恭下者也侮夫不節譴呵從之忿怒不止楚撻從之夫為夫婦者義以和親恩以好合楚撻既行何義之存譴呵旣宣何恩之有恩義俱廢夫婦離矣婦行第四女有四行一曰婦德二曰婦言三曰婦容四曰婦功禮記文也夫云婦德不必才明絶異也婦言不必辯口利辭也婦容不必顔色美麗也婦功不必工巧過人也清閑貞靜守節整齊行已有恥動靜有法是謂婦德擇辭而說不道惡語時然後言不厭於人是謂婦言盥浣塵穢服飾鮮潔沐浴以時身不垢辱是謂婦容專心紡績不好戲笑潔齊酒食以奉賔客是謂婦功此四者女人之大德而不可乏之者也然為之甚易唯在存心耳古人有言仁逺乎哉我欲仁而仁斯至矣此之謂也論語孔子之言也專心第五禮夫有再娶之義儀禮曰父在為母何以朞至尊在不敢伸也父必三年而後娶達子志也婦無二適之文故曰夫者天也儀禮曰夫者妻之天也婦人不二適者猶曰不二天也天固不可逃夫固不可離也行違神祗天則罰之禮義有愆夫則薄之故女憲曰得意一人是謂永畢失意一人是謂永訖由斯言之夫不可不求其心然所求者亦非謂佞媚茍親也固莫若專心正色禮義居絜耳無淫聽目無邪視出無冶容入無廢飾無聚會羣輩無看視門戸此則謂專心正色矣若夫動靜輕脫視聽陜輸陜輸不定貌入則亂髮壞形出則窈窕作態窈窕妖冶之貌也說所不當道觀所不當視此謂不能專心正色矣曲從第六夫得意一人是謂永畢失意一人是謂永訖欲人定志專心之言也舅姑之心豈當可失哉物有以恩自離者亦有以義自破者也夫雖云愛舅姑云非此所謂以義自破者也然則舅姑之心奈何固莫尚於曲從矣姑云不爾而是固宜從令不爾猶不然也姑云爾而非猶宜順命勿得違戾是非爭分曲直此則所謂曲從矣故女憲曰婦如影響焉不可賞影響言順從也和叔妹第七婦人之得意於夫主由舅姑之愛已也舅姑之愛已由叔妹之譽已也由此言之我臧否譽毁一由叔妹叔妹之心復不可失也皆莫知叔妹之不可失而不能和之以求親其蔽也哉自非聖人鮮能無過故顏子貴於能改仲尼嘉其不貳論語孔子曰顔回不貳過易曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也而况婦人者也雖以賢女之行聰哲之性其能備乎是故室人和則謗掩外内離則惡揚此必然之勢也易曰二人同心其利斷金同心之言其臭如蘭此之謂也金物之堅者二人同心則其利可以斷之二人既同心其芳馨如蘭也古人通謂氣為臭也夫嫂妹者體敵而尊恩疏而義親若淑媛謙順之人淑善也美女曰媛則能依義以篤好崇恩以結援使徽美顯章而瑕過隱塞舅姑矜善而夫主嘉美聲譽曜于邑鄰休光延於父母若夫憃愚之人於嫂則託名以自高於妹則因寵以驕盈驕盈既施何和之有恩義既乖何譽之臻是以美隱而過宣姑忿而夫慍毁訾布於中外恥辱集于厥身進増父母之羞退益君子之累君子謂夫也詩曰未見君子憂心忡忡斯乃榮辱之本而顯否之基也可不愼哉然則求叔妹之心固莫尚於謙順矣謙則德之柄易繫辭之文也順則婦之行凡斯二者足以和矣詩云在彼無惡在此無射其斯之謂也韓詩周頌之言也射厭也射音亦毛詩射作斁也馬融善之令妻女習焉昭女妹曹豐生昭壻之妹也亦有才惠為書以難之辭有可觀昭年七十餘卒皇太后素服舉哀使者監護喪事所著賦頌銘誄問注哀辭書論上疏遺令凡十六篇子婦丁氏為撰集之又作大家讚焉樂羊子妻河南樂羊子之妻者不知何氏之女也羊子嘗行路得遺金一餅還以與妻妻曰妾聞志士不飲盜泉之水論語撰考讖曰水名盜泉仲尼不潄廉者不受嗟來之食解見文苑傳况拾遺求利以汚其行乎羊子大慙乃捐金於野而遠尋師學一年來歸妻跪問其故羊子曰久行懷思無它異也妻乃引刀趨機而言曰此織生自蠶繭成於機杼一絲而累以至於寸累寸不已遂成丈匹今若斷斯織也則捐失成功稽廢時日夫子積學當日知其所亡論語孔子曰君子日知其所亡月無忘其所能亡無也以就懿德若中道而歸何異斷斯織乎羊子感其言復還終業遂七年不返妻常躬勤養姑又遠饋羊子嘗有它舍鷄謬入園中姑盜殺而食之妻對鷄不餐而泣姑怪問其故妻曰自傷居貧使食有它肉姑竟}
  - {type: variant, offset: 24, length: 0, content: '', WYG: 之後盜欲有犯妻者乃先劫其姑妻聞操刀而出盜人曰釋汝刀從我者可全不從我者則殺汝姑妻仰天而歎舉刀刎頸而死盜亦不殺其姑太守聞之即捕殺賊盜而賜妻縑帛以禮葬之號曰貞義陳文矩妻漢中陳文矩妻者同郡李}
