  - {type: variant, offset: 33, length: 1, content: 妾, WYG: 母非所生憎毁日積而穆姜慈愛溫仁撫字益隆衣食資供皆兼倍所生或謂母曰四子不孝甚矣何不别居以遠之對曰吾方以義相導使其自遷善也及前妻長子興遇疾困篤母惻隱自然親調藥膳恩情篤密興疾久乃瘳於是呼三弟謂曰繼母慈仁出自天授吾兄弟不識恩養禽獸其心雖母道益隆我曹過惡亦已深矣遂將三弟詣南鄭獄陳母之德狀已之過乞就刑辟縣言之於郡郡守表異其母蠲除家徭遣散四子許以脩革自後訓導愈明並}
