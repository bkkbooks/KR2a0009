  - {type: variant, offset: 1879, length: 125, content: 凡五色大鳥似鳳者多羽蟲之孽是時安帝信中常侍樊豐江京阿母王聖及外屬耿寶等讒言免太尉楊震廢太子為濟陰王不悊之異也章帝末號鳳皇百四十九見時直臣何敞以為羽孽似鳳翺翔殿屋不察也記者以為其後章帝崩以為驗案宣帝明帝時五色鳥羣翔殿屋賈逵以為胡降徵也帝多善政雖有過不及, WYG: 項原列女傳}
