  - {type: variant, offset: 7, length: 1, content: 五, WYG: 宋宣城太守范煜撰唐章懷太子賢注列女傳第七十四詩書之言女德尚矣詩謂關雎后妃之德也書稱釐降二女于媯汭嬪于虞尚遠也若夫賢妃助國君之政哲婦隆家人之道高士𢎞清淳之風貞女亮明白之節則其徽美未殊也而世典咸漏焉故自中興以後綜其成事述為列女篇如馬鄧梁后别見前紀梁嫕李姬各附家傳嫕梁竦女李姬李固女也若斯之類並不兼書餘但􅊧次才}
