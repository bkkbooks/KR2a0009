  - {type: variant, offset: 2061, length: 0, content: '', krp: 餘卒倫妹芝亦有才義少喪親長而追感乃作申情賦云龐淯母酒泉龐淯母者趙氏之女也字娥父為同縣人所殺而娥兄弟三人時俱病物故讐乃喜而自賀以為莫已報也娥陰懷感憤乃潛備刀兵常帷車以候讐家十餘年不能得後遇於都亭刺殺之因詣縣自首曰父讐已報請就刑戮福禄長尹嘉義之解印綬欲與俱亡娥不肯去曰怨塞身死妾之明分結罪理獄君之常理何敢茍生以枉公法後遇赦得免州郡表其閭太常張奐嘉歎以束帛禮之劉長卿妻沛劉長卿妻者同郡桓鸞之女也鸞已見前傳生}
  - {type: variant, offset: 2062, length: 0, content: '', WYG: 男五歲而長卿卒妻防遠嫌疑不肯歸寧兒年十五晚又夭殁妻慮不免乃豫刑其耳以自誓宗婦相與愍之共謂曰若家殊無它意假令有之猶可因姑姊妹以表其誠何貴義輕身之甚哉對曰昔我先君五更學為儒宗尊為帝師五更以來歷代不替男以忠孝顯女以貞順稱詩云無忝爾祖聿脩厥德是以豫自刑翦以明我情沛相王吉上奏高行顯其門閭號曰行義桓嫠寡婦曰嫠縣邑有祀必膰焉膰祭餘肉也尊敬之故有祭祀必致其餘也左傳曰天子有事膰焉皇甫規妻安定皇甫規妻者不知何氏女也規初喪室家後更娶之妻善屬文能草書時為規答書記衆人怪其工及規卒時妻年猶盛而容色美後董卓為相國承其名聘以軿輜百乘馬二十匹奴婢錢帛充路妻乃輕服詣卓門跪自陳情辭甚酸愴卓使傅奴侍者悉拔刀圍之而謂曰孤之威教欲令四海風靡何有不行於一婦人乎妻知不免乃立罵卓曰君羌胡之種毒害天下猶未足邪妾之先人清德奕世皇甫氏文武上才為漢忠臣君親非其趣使走吏乎敢欲行非禮於爾君夫人邪卓乃引車庭中以其頭懸軶鞭撲交下周禮考工記曰軶長六尺鄭衆曰謂轅端壓牛領者妻謂持杖者曰何不重乎速盡為惠遂死車下後人圖畫號曰禮宗云陰瑜妻南陽陰瑜妻者潁川荀爽之女也名采字女荀聰敏有才藝年十七適陰氏十九産一女而瑜卒采時尚豐少常慮為家所逼自防禦甚固後同郡郭奕喪妻爽以采許之魏書奕字伯益壽之子也為太子文學早卒因詐稱病篤召采既不得已而歸懷刃自誓爽令𫝊婢執奪其刃扶抱載之猶憂致憤激勅衞甚嚴女既到郭氏乃偽為歡悅之色謂左右曰我本立志與陰氏同穴而不免逼迫遂至於此素情不遂奈何乃命使建四燈盛裝飾請奕入相見共談言辭不輟奕敬憚之遂不敢逼至曙而出采因勅令左右辦浴旣入室而掩戸權令侍人避之以粉書扉上曰尸還陰陰字未及成懼有來者遂以衣帶自縊左右翫之不為意比視已絶時人傷焉盛道妻犍為盛道妻者同郡趙氏之女也字媛姜建安五年益部亂道聚衆起兵事敗夫妻執繫當死媛姜夜中告道曰法有常刑必無生望君可速濳逃建立門戸妾自留獄代君塞咎道依違未從媛姜便解道桎梏為齎糧貨子翔時年五歲使道携持而走媛姜代道持夜應對不失度道已遠乃以實告吏應時見殺道父子會赦得歸道感其義終身不娶焉孝女叔先雄孝女叔先雄者犍為人也父泥和永建初為縣功曹縣長遣泥和拜檄謁巴郡太守乘舩墮湍水物故尸喪不歸雄感念怨痛號泣晝夜心不圖存常有自沈之計所生男女二人並數歲雄乃各作囊盛珠環以繫兒數為訣别之辭家人每防閑之經百許日後稍懈雄因乘小舩於父墮處慟哭遂自投水死弟賢其夕夢雄告之却後六日當共父同出至期伺之果與父相持浮於江上郡縣表言為雄立碑圖像其形焉董祀妻陳留董祀妻者同郡蔡邕之女也名琰字文姬博學有才辯又妙於音律劉昭㓜童傳曰邕夜鼓琴絃絶琰曰第二絃邕曰偶得之耳故斷一絃問之琰曰第四絃並不差謬適河東衞仲道夫亡無子歸寧于家興平中天下喪亂文姬為胡騎所獲没於南匈奴左賢王在胡中十二年生二子曹操素與邕善痛其無嗣乃遣使者以金璧贖之而重嫁於祀祀為屯田都尉犯法當死文姬詣曹操請之時公卿名士及遠方使驛坐者滿堂操謂賔客曰蔡伯喈女在外今為諸君見之及文姬進蓬首徒行叩頭請罪音辭清辯㫖甚酸哀衆皆為改容操曰誠實相矜然文狀已去奈何文姬曰明公廐馬萬匹虎士成林何惜疾足一騎而不濟垂死之命乎操感其言乃追原祀罪時且寒賜以頭巾履襪操因問曰聞夫人家先多墳籍猶能憶識之不文姬曰昔亡父賜書四千許卷流離塗炭罔有存者今所誦憶裁四百餘篇耳操曰今當使十吏就夫人寫之文姬曰妾聞男女之别禮不親授禮記曰男女不親授乞給紙筆眞草唯命於是繕書送之文無遺誤後感傷亂離追懷悲憤作詩二章其辭曰漢季失權柄董卓亂天常志欲圖簒弑先害諸賢良逼迫遷舊邦擁主以自彊海内興義師欲共討不祥卓衆來東下金甲耀日光平土人脆弱來兵皆胡羌獵野圍城邑所向悉破亡斬􅎒無子遺尸骸相牚拒牚音直庚反馬邊懸男頭馬後載婦女長驅西入關逈路險且阻還顧邈㝠㝠肝脾為爛腐所畧有萬計不得令屯聚或有骨肉俱欲言不敢語失意機微間輒言斃降虜要當以亭刃我曹不活汝豈復惜性命不堪其詈罵或便加棰杖毒痛參幷下旦則號泣行夜則悲吟坐欲死不能得欲生無一可彼蒼者何辜乃遭此戹禍邊荒與華異人俗少義理處所多霜雪胡風春夏起翩翻吹我衣肅肅入我耳感時念父母哀歎無窮已有客從外來聞之常歡喜迎問其消息輒復非鄉里邂逅徼時願骨肉來迎已巳得自解免當復棄兒子天屬綴人心念别無會期存亡永乖隔不忍與之辭兒前抱我頸問我欲何之人言母當去豈復有還時阿母常仁惻今何更不慈我尚未成人奈何不顧思見此崩五内恍惚生狂癡號泣手撫摩當發復回疑兼有同時輩相送告離别慕我獨得歸哀呌聲摧裂馬為立踟蹰車為不轉轍觀者皆歔欷行路亦嗚咽去去割情戀遄征日遐邁悠悠三千里何時復交會念我出腹子匈臆為摧敗旣至家人盡又復無中外城郭為山林庭宇生荆艾白骨不知誰從横莫覆蓋出門無人聲豺狼號且吠㷀㷀對孤景怛咤糜肝肺登高遠眺望魂神忽飛逝奄若壽命盡旁人相寛大為復彊視息雖生何聊賴託命於新人竭心自朂厲流離成鄙賤常恐復捐廢人生幾何時懷憂終年歲其二章曰嗟薄祐兮遭世患宗族殄兮門戸單身執畧兮入西關歷險阻兮之羌蠻山谷𦕈兮路漫漫眷東顧兮但悲歎㝠當寢兮不能安㝠音暝飢當食兮不能餐常流涕兮眥不乾薄志節兮念死難雖茍活兮無形顔惟彼方兮遠陽精北方近陰遠陽陰氣凝兮雪夏零沙漠壅兮塵㝠㝠有草木兮春不榮人似禽兮食臭腥言兠離兮狀窈停兠離匈奴言語之貌歲聿暮兮時邁征夜悠長兮禁門扄不能寐兮起屏營登胡殿兮臨廣庭𤣥雲合兮翳月星北風厲兮肅泠泠胡笳動兮邊馬鳴孤鴈歸兮聲嚶嚶樂人興兮彈琴筝音相和兮悲且清心吐思兮匈憤盈欲舒氣兮恐彼驚含哀咽兮涕沾頸家既迎兮當歸寧臨長路兮捐所生兒呼母兮嗁失聲我掩耳兮不忍聽追持我兮走㷀㷀頓復起兮毁顔形還顧之兮破人情心怛絶兮死復生列女後傳琰字昭姬也賛曰端操有蹤幽閑有容區明風烈昭我管彤婦人之正其節操有蹤跡可紀者及幽都閑婉有禮容者區别其遺風餘烈以明女史之所紀也管彤赤管筆解見皇后紀後漢書巻一百十四後漢書卷一百十四考證曹世叔妻傳又詔融兄續繼昭成之何焯曰司馬彪云馬續述天文志續字季則見馬援傳末孝女曹娥傳迎婆娑神困學紀聞云曹娥碑云盱能撫節安歌婆娑樂神以五}
