  - {type: variant, offset: 7, length: 1, content: 五, krp: 宋宣城太守范煜撰唐章懷太子賢注列女傳第七十四詩書之言女德尚矣詩謂關雎后妃之德也書稱釐降二女于媯汭嬪于虞尚遠也若夫賢妃助國君之政哲婦隆家人之道高士𢎞清淳之風貞女亮明白之節則其徽美未殊也而世典咸漏焉故自中興以後綜其成事述為列女篇如馬鄧梁后别見前紀梁嫕李姬各附家傳嫕梁竦女李姬李固女也若斯之類並不兼書餘但􅊧次才}
  - {type: variant, offset: 9, length: 0, content: '', WYG: 尤高秀者不必專在一操而已鮑宣妻勃海鮑宣妻者桓氏之女也字少君宣嘗就少君父學父奇其清苦故以女妻之裝送資賄甚盛宣不悅謂妻曰少君生富驕習美飾而吾實貧賤不敢當禮妻曰大人以先生脩德守約故使賤妾侍執巾櫛既奉承君子唯命是從宣笑曰能如是是吾志也妻乃悉歸侍御服飾更著短布裳與宣共挽鹿車歸鄉里拜姑禮畢提甕出汲脩行婦道鄉邦稱之宣哀帝時官至司隸校尉子永中興初為魯郡太守永子昱從容問少君曰太夫人寧復識挽鹿車時不對曰先姑有言爾雅曰舅姑在則曰君舅君姑没則曰先舅先姑存不忘亡安不忘危易繫辭之言也吾焉敢忘乎永昱已見前傳王霸妻太原王霸妻者不知何氏之女也霸少立高節光武時連徵不仕霸已見逸人傳妻亦美志行初霸與同郡令狐子伯為友後子伯為楚相而其子為郡功曹子伯乃令子奉書於霸車馬服從雍容如也霸子時方耕於野聞賓至投耒而歸鄭𤣥注禮記云耒耜之上曲者也說文曰耒耜曲木見令狐子沮怍不能仰視沮喪也怍慙也霸目之有愧容客去而久臥不起妻怪問其故始不肯告妻請罪而後言曰吾與子伯素不相若向見其子容服甚光舉措有適而我兒曹蓬髮歷齒未知禮則曹軰也見客而有慙色父子恩深不覺自失耳妻曰君少脩清節不顧榮祿今子伯之貴孰與君之高奈何忘宿志而慚兒女子乎霸屈起而笑曰屈音渠勿反有是哉遂共終身隱遁姜詩妻廣漢姜詩妻者同郡龐盛之女也詩事母至孝妻奉順尤篤母好飲江水水去舍六七里妻嘗泝流而汲後値風不時得還母渴詩責而遣之妻乃寄止鄰舍晝夜紡績市珍羞使鄰母以意自遺其姑如是者久之姑怪問鄰母鄰母具對姑感慚呼還恩養愈謹其子後因遠汲溺死妻恐姑哀傷不敢言而託以行學不在姑嗜魚鱠又不能獨食夫婦常力作供鱠呼鄰母共之舍側忽有涌泉味如江水每旦輒出雙鯉魚常以供}
