  - {type: variant, offset: 2060, length: 0, content: '', WYG: 縣長度尚改葬娥於江南道傍為立碑焉會稽典錄曰上虞長度尚弟子邯鄲淳字子禮時甫弱冠而有異才尚先使魏朗作曹娥碑文成未出會朗見尚尚與之飲宴而子禮方至督酒尚問朗碑文成未朗辭不才因試使子禮為之操筆而成無所㸃定朗嗟嘆不暇遂毁其草其後蔡邕又題八字曰黄絹㓜婦外孫虀臼許升妻吳許升妻者呂氏之女也字榮升少為博徒不理操行榮嘗躬勤家業以奉養其姑數勸升脩學每有不善輒流涕進規榮父積忿疾升乃呼榮欲改嫁之榮嘆曰命之所遭義無離貳終不肯歸升感激自厲乃尋師逺學遂以成名尋被本州辟命行至壽春道為盜所害刺史尹耀捕盜得之榮迎喪於路聞而詣州請甘心讐人耀聽之榮乃手斷其頭以祭升靈後郡遭寇賊賊欲犯之榮踰垣走賊拔刀追之賊曰從我則生不從我則死榮曰義不以身受辱宼虜也遂殺之是日疾風暴雨靁電晦㝠賊惶懼叩頭謝罪乃殯葬之袁隗妻汝南袁隗妻者扶風馬融之女也字倫隗已見前傳倫少有才辯融家世豐豪裝遣甚盛及初成禮隗問之曰婦奉箕箒而已何乃過珎麗乎對曰慈親垂愛不敢逆命君若欲慕鮑宣梁鴻之高者妾亦請從少君孟光之事矣隗又曰弟先兄舉世以為笑今處姊未適先行可乎對曰妾姊高行殊邈未遭良匹不似鄙薄茍然而已又問曰南郡君學窮道奥文為辭宗融為南郡太守而所在之職輒以貨財為損何邪對曰孔子大聖不免武叔之毁子路至賢猶有伯寮之愬論語曰叔孫武叔毁仲尼子貢曰無以為也它人之賢者猶邱陵焉猶可踰也仲尼如日月也無得而踰焉公伯寮愬子路於季孫孔子曰道之將行也與命也道之將廢也與命也公伯寮其如命何家君獲此固其宜耳隗黙然不能屈帳外聽者為慙隗既寵貴當時倫亦有名於世年六}
