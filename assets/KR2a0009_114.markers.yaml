  - {type: variant, offset: 10, length: 10, content: 災火草妖羽蟲孽羊禍五, WYG: 母之膳赤眉散賊經詩里弛兵而過曰驚大孝必觸鬼神時歲荒賊乃遺詩米肉受而埋之比落䝉其安全比近也落藩也永平三年察孝廉顯宗詔曰大孝入朝凡諸舉者一聽平之由是皆拜郎中詩尋除江陽令卒于官所居治鄉人為立祀周郁妻沛郡周郁妻者同郡趙孝之女也字阿少習儀訓閑於婦道而郁驕淫輕躁多}
