  - {type: variant, offset: 4532, length: 0, content: '', WYG: 漢禮制度曰人君之居前有朝後有寝終則制廟以象朝後制寝以象寝光武都洛陽乃合髙祖以下至平帝為一廟藏十一帝主於其中元帝次當第八光武第九故立元帝為祖廟後遵而不改續漢志曰立社稷於洛陽在宗廟之右皆方壇四面及中各依方色無屋有墻門而已白虎通曰天子之壇方五丈諸侯之壇半天子之壇社者土也人非土不立非榖不食故封土立社示有土也稷者五榖之長得隂陽中和之氣故祭之也續漢書曰制郊兆於洛陽城南七里為壇八陛中又為重壇天地位皆在壇上其外壇上為五帝位青帝位在甲寅赤帝位在丙巳黄帝位在丁未白帝位在庚申黒帝位在壬亥其外為壝重營皆紫以象紫宮營有通道以為門日月在營内南道日在東月在西北斗在北道之西外營中營凡千五百一十四神髙皇帝配食焉北郊在洛陽城北四里方壇四陛地祗位南面西上髙皇后配西面皆在壇上地理羣后従食皆在壇下中嶽在未四嶽各依其方淮海俱在東河在西濟在北江在南餘山川各如其方漢初土徳色尚黄至此始明火德徽幟尚赤服色於是乃正劉攽曰注立元帝為祖廟案以世數言之元帝乃是光武考非祖也作祖字誤}
