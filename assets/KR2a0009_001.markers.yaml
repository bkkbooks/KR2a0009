  - {type: variant, offset: 5389, length: 0, content: '', WYG: 蔡邕獨㫁曰皇帝六璽皆玉螭虎紐文曰皇帝行璽皇帝之璽皇帝信璽天子行璽天子之璽天子信璽皆以武都紫泥封之玉璽譜曰傳國璽是秦始皇初定天下所刻其玉出藍田山丞相李斯所書其文曰受命于天既夀永昌髙祖至覇上秦王子嬰獻之至王莽簒位就元后求璽不與以威逼之乃出璽投地璽上螭一角缺及莽敗李松持璽詣宛上更始更始敗璽入赤眉劉盆子既敗以奉光武}
