  - {type: variant, offset: 4126, length: 0, content: '', WYG: 漢制度曰帝之下書有四一曰䇿書二月制書三曰詔書四月誡敕䇿書者編簡也其制長二尺短者半之篆書起年月日稱皇帝以命諸侯王三公以罪免亦賜䇿而以𨽻書用尺一寸兩行唯此為異也制書者帝者制度之命其文曰制詔三公皆璽封尚書令印重封露布州郡也詔書者詔告也其文曰告某官云如故事誡敕者謂敕刺史太守其文曰有詔敕某官它皆倣此劉攽曰注告某官云案文當更有云字}
