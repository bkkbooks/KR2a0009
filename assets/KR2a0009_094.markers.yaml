  - {type: variant, offset: 11, length: 0, content: '', WYG: 五十四吳祐傳吳祐字季英祐音又續漢書作佑陳留長垣人也父恢為南海太守恢或作惔音徒濫反祐年十二随從到官恢欲殺青簡以寫經書殺青者以火炙簡令汗取其青易書復不蠧謂之殺青亦謂汗簡義見劉向别録也祐諫曰今大人踰越五領領者西自衡山之南東至于海一山之限耳别標名則有五焉裴氏廣川記云大庾始安臨賀桂陽掲陽是為五領鄧徳明南康記曰大庾一也桂陽甲騎二也九眞都龎三也臨賀萌渚四也始安越城五也裴氏之說則為審矣逺在海濵其俗誠陋然舊多珍怪上為國家所疑下為權戚所望希望其贈遺也此書若成則載之兼兩車有兩輪故稱兩也昔馬援以薏苡興謗王陽以衣囊徼名徼要也音江堯反前書曰王陽好車馬衣服鮮明而遷徙轉移所載不過囊橐時人怪其奢伏其儉故俗傳王陽能作黄金嫌疑之間誠先賢所愼也恢乃止撫其首曰吳氏世不乏季子矣季子謂札也及年二十喪父居無擔石而不受贍遺常牧豕於長垣澤中續漢書曰年四十餘乃為郡吏也行吟經書遇父故人謂曰卿二千石子而自業賤事縱子無耻奈先君何祐辭謝而已守志如初後舉孝廉陳留耆舊傳曰太守冷宏召補文學宏見異之擢舉孝廉將行郡中為祖道祐越壇共小史雍丘黄眞歡語移時與結友而别祖道之禮封土為軷壇也五經要義曰祖道者行祭為道路祈也周禮大馭掌王玉路以祀及犯軷注云犯軷者封土象山於路側以芻棘栢為神主祭之以車轢軷而去喻無險難劉攽曰注以芻棘栢案禮記云菩芻棘栢此少一菩字也功曹以祐倨請黜之太守曰吳季英有知人之明卿且勿言眞後亦舉孝廉除新蔡長世稱其清節謝承書曰真字夏甫時公沙穆來遊太學無資糧乃變服客傭為祐賃舂祐與語大驚遂共定交於杵臼之間祐以光禄四行遷膠東侯相漢官儀曰四行敦厚質樸遜讓節儉也時濟北戴宏父為縣丞宏年十六從在丞舍祐每行園常聞諷誦之音竒而厚之亦與為友卒成儒宗知名東夏東夏東方也尚書曰尹兹東夏也官至酒泉太守濟北先賢傳曰宏字元襄剛縣乆也年二十二為郡督郵曾以職事見詰府君欲撻之宏曰今鄙郡遭明府咸以為仲尼之君國小人少以宏為顔回豈聞仲尼有撻顔回之義府君異其對即日教署主簿也祐政唯仁簡以身率物民有爭訴者輙閉閤自責然後斷其訟以道譬之或身到閭里重相和解自是之後爭隙省息吏人懐而不欺嗇夫孫性私賦民錢續漢書曰賦錢五百為父市單衣市衣以進其父父得而怒曰有君如是何忍欺之促歸伏罪性慙懼詣閤持衣自首祐屏左右問其故性具談父言祐曰掾以親故受汚穢之名所謂觀過斯知仁矣論語載孔子之言也使歸謝其父還以衣遺之又安丘男子母丘長與母俱行市道遇醉客辱其母長殺之而亡安丘追蹤於膠東得之祐呼長謂曰子母見辱人情所耻然孝子忿必慮難動不累親論語孔子曰忿思難又曰一朝之忿忘其身以及其親非惑與今若背親逞怒若汝也逞快也白日殺人赦若非義刑若不忍將如之何長以械自繫在手曰械曰國家制法囚身犯之明府雖加哀矜恩無所施祐問長有妻子乎對曰有妻未有子也即移安丘逮長妻妻到解其桎梏使同宿獄中妻遂懐孕至冬盡行刑長泣謂母曰負母應死當何以報吳君乎乃齧指而吞之含血言曰妻若生子名之吳生言我臨死吞指為誓屬兒以報吳君因投繯而死謂以繩為繯投之而縊也繯音胡犬反祐在膠東九年陳留耆舊傳曰祐處同僚無私書之問上司無牋檄之敬在膠東書不入京師也遷齊相大將軍梁冀表為長史及冀誣奏太尉李固祐聞而請見與冀爭之不聽時扶風馬融在坐為冀章草祐因謂融曰李公之罪成於卿手李公即誅卿何面目見天下之人乎冀怒而起入室祐亦徑去冀遂出祐為河間相因自免歸家不復仕躬灌園蔬以經書教授年九十八卒長子鳳官至樂浪太守少子愷新息令鳳子馮鮦陽侯相鮦陽縣屬汝南郡音紂皆有名於世陳留耆舊傳曰鳳字君雅馮字子髙延篤傳延篤字叔堅南陽犨人也犨音昌猶反故城在汝州魯山縣東南也少從潁川唐溪典受左氏傳先賢行狀曰典字季度為西鄂長風俗通曰吳夫槩王奔楚封堂谿因以為氏典為五官中郎將唐與堂同也旬日能諷誦之典深敬焉先賢行狀曰篤欲寫左氏傳無紙唐溪典以廢牋記與之篤以牋記紙不可寫傳乃借本諷之糧盡辭歸典曰卿欲寫傳何故辭歸篤曰已諷之矣典聞之歎曰嗟乎延生雖復端木聞一知二未足為喻若使尼父更起於洙泗君當編名}
