  - {type: variant, offset: 422, length: 1, content: 仰, WYG: 匡輔陛下隆於友于不忍遏絶友親也尚書曰惟孝友于兄弟恐遂滋蔓為害彌大滋長蔓延也乞露臣奏宣示百僚使臣得於清朝明言其失然後詔公卿平處其法法決罪定乃下不忍之詔臣下固執然後少有所許如是則聖朝無傷親之譏渤海有享國之慶不然懼大獄將興使者相望於路矣臣職典禁兵備禦非常而妄知藩國干犯至戚罪不容誅不勝憤懣謹冐死以聞帝以至親不忍下其事後悝竟坐逆謀貶為癭陶王弼遷尚書出為平原相時詔書下舉鉤黨鉤謂相連也郡國所奏相連及者多至數百唯弼獨無所上詔書前後切却州郡切急也却退也髠笞掾吏從事坐傳責曰續漢志每州皆有從事史及諸曹掾史傳客舍也音知戀反坐傳舍召弼而責詔書疾惡黨人㫖意懇惻青州六郡其五有黨濟南樂安齊國東萊平原北海六郡青州所管也青州在齊國臨淄見漢官儀近國甘陵亦考南北部桓帝為蠡吾侯受學於甘陵周福及帝即位擢福為尚書時同郡河南尹房植有名當朝二家賔客互相譏揣遂各樹朋徒漸成尤隙自是甘陵有南北部見黨人篇序也平原何理而得獨無弼曰先王疆理天下畫界分境疆界也理正也左傳曰先王疆理天下物土之宜而布其利也水土異齊風俗不同前書曰凡人函五常之性而其剛柔緩急音聲不同繋水土之風氣故謂之風好惡取舍動静無常隨君上之情欲故謂之俗也它郡自有平原自無胡可相比若承望上司誣陷良善淫刑濫罰以逞非理則平原之人戶可為黨相有死而己所不能也從事大怒即收郡僚職送獄遂舉奏弼會黨禁中解弼以俸贖罪得免俸音扶用反濟活者千餘人弼為政特挫抑彊豪其小民有罪多所容貸遷河東太守被一切詔書當舉孝廉弼知多權貴請託乃豫勑斷絶書屬屬音之欲反中常侍侯覽果遣諸生齎書請之并求假鹽稅積日不得通生乃說以它事謁弼而因達覽書劉攽曰案文說字當作詭謂詭譎也弼乃大怒曰太守忝荷重任當選士報國爾何人而偽詐無狀命左右引出楚捶數百府丞掾史十餘人皆諫於廷弼不對遂付安邑獄即日考殺之侯覽大怨遂詐作飛章下司𨽻誣弼誹謗檻車徴吏人莫敢近者唯前孝康裴瑜送到崤澠之間大言於道傍曰明府摧折虐臣選徳報國如其獲罪足以垂名竹帛願不憂不懼弼曰誰謂荼苦其甘如薺詩衞風也荼苦菜也昔人刎頸九死不恨刎割也楚辭曰雖九死其猶未悔也及下廷尉詔獄平原吏人奔走詣闕訟之又前孝廉魏劭毁變形服詐為家僮瞻䕶於弼弼遂受誣事當弃市劭與同郡人賣郡邸郡邸若今之寺邸也行賂於侯覽得減死罪一等論輸左校時人或譏曰平原行貨以免君無乃蚩乎陶丘洪曰青州先賢傳曰洪字子休平原人也清達博辯文冠當代舉孝廉不行辟太尉府年三十卒昔文王牖里閎散懐金牖里殷獄名或作羑亦名羑城在今相州湯隂縣北帝王紀散宜生南宫括閎天學乎吕尚尚知三人賢結朋友之交及紂囚文王乃以黄金千鎰與宜生令求諸物與紂史記曰閎天之徒乃求有莘氏女驪戎文馬有熊九駟它竒怪物因殷孽臣費仲獻之於紂紂大說乃赦之也史弼遭患義夫獻寳亦何疑焉於是議者乃息刑竟歸田里稱病閉門不出數為公卿所薦議郎何休又訟弼有幹國之器宜登台相徴拜議郎侯覽等惡之光和中出為彭城相會病卒裴瑜位至尚書先賢行狀曰瑜字雉璜聰明敏達觀物無滯清論所加必為成器醜議所指没齒無怨也論曰夫剛烈表性鮮能優寛仁柔用情多乏貞直吳季英}
