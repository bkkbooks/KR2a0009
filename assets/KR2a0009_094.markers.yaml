  - {type: variant, offset: 5435, length: 791, content: 季失權柄董卓亂天常志欲圖篡弒先害諸賢良逼迫遷舊邦擁主以自彊海內興義師欲共討不祥卓衆來東下金甲耀日光平土人脆弱來兵皆胡羌獵野圍城邑所向悉破亡斬無孑遺尸骸相牚拒馬邊縣男頭馬後載婦女長驅西入關迥路險且阻還顧冥冥肝脾為爛腐所略有萬計不得令屯聚或有骨肉俱欲言不敢語失意機微閒輒言斃降虜要當以亭刃我曹不活汝豈復惜性命不堪其詈罵或便加棰杖毒痛參并下旦則號泣行夜則悲吟坐欲死不能得欲生無一可彼蒼者何辜乃遭此戹禍邊荒與華異人俗少義理處所多霜雪胡風春夏起翩翩吹我衣肅肅入我耳感時念父母哀歎無窮已有客從外來聞之常歡喜迎問其消息輒復非鄉里邂逅徼時願骨肉來迎己己得自解免當復棄兒子天屬綴人心念別無會期存亡永乖隔不忍與之辭兒前抱我頸問母欲何之人言母當去豈復有還時阿母常仁惻今何更不慈我尚未成人柰何不顧思見此崩五內恍惚生狂癡號泣手撫摩當發復回疑兼有同時輩相送告離別慕我獨得歸哀叫聲摧裂馬為立踟躕車為不轉轍觀者皆歔欷行路亦嗚咽去去割情戀遄征日遐邁悠悠三千里何時復交會念我出腹子匈臆為摧敗既至家人盡又復無中外城郭為山林庭宇生荊艾白骨不知誰從橫莫覆蓋出門無人聲豺狼號且吠煢煢對孤景怛咤糜肝肺登高遠眺望魂神忽飛逝奄若壽命盡旁人相寬大為復彊視息雖生何聊賴託命於新人竭心自勗厲流離成鄙賤常恐復捐廢人生幾何時懷憂終年歲谷眇兮路曼曼眷東顧兮但悲歎冥當寢兮不能安飢當食兮不能餐常流涕兮眥不乾薄志節兮念死難雖苟活兮無形顏惟彼方兮遠陽精陰氣凝兮雪夏零沙漠壅兮塵冥冥有草木兮春不榮人似禽兮食臭腥言兜離兮狀窈停歲聿暮兮時邁征夜悠長兮禁門不能寐兮起屏營登胡殿兮臨廣庭玄雲合兮翳月星北風厲兮肅泠泠胡笳動兮邊馬鳴孤雁歸兮聲嚶嚶樂人興兮彈琴箏音相和兮悲且清心吐思兮匈憤盈欲舒氣兮恐彼驚含哀咽兮涕沾頸家既迎兮當歸寧臨長路兮捐所生兒呼母兮號失聲我掩耳兮不忍聽追持我兮走煢煢頓復起兮毀顏形還顧之兮破人情心怛絕兮死復生贊曰端操有蹤幽閑有容區明風烈昭我管彤, WYG: 書卷九十四考證}
