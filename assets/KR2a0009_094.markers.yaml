  - {type: variant, offset: 761, length: 0, content: '', WYG: 士之楷模國之楨幹也昔武王入殷封商容之閭鄭喪子産仲尼隕涕左傳曰仲尼聞子産死出涕曰古之遺愛也孤到此州嘉其餘風春秋之義賢者之後宜有殊禮公羊傳曰君子之善善也長惡惡也短惡惡止其身善善及子孫賢者子孫故君子為之諱也亟遣丞掾除其墳墓亟急也存其子孫并致薄醊醊祭酹也音張芮反以彰厥徳子毓知名魏志曰毓字子家十嵗而孤以學行稱仕魏至侍中吏部尚書時舉中郎}
