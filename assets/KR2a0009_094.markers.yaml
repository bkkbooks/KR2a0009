  - {type: variant, offset: 1700, length: 1075, content: 貴男女之際詩著關雎之義由斯言之不可不重也夫不賢則無以御婦婦不賢則無以事夫夫不御婦則威儀廢缺婦不事夫則義理墮闕方斯二事其用一也察今之君子徒知妻婦之不可不御威儀之不可不整故訓其男檢以書傳殊不知夫主之不可不事禮義之不可不存也但教男而不教女不亦蔽於彼此之數乎禮八歲始教之書十五而至於學矣獨不可依此以為則哉為美故鄙諺有云生男如狼猶恐其生女如鼠猶恐其虎然則修身莫若敬避彊莫若順故曰敬順之道婦人之大禮也夫敬非它持久之謂也夫順非它寬裕之謂也持久者知止足也寬裕者尚恭下也夫婦之好終身不離房室周旋遂生媟黷媟黷既生語言過矣語言既過縱恣必作縱恣既作則侮夫之心生矣此由於不知止足者也夫事有曲直言有是非直者不能不爭曲者不能不訟訟爭既施則有忿怒之事矣此由於不尚恭下者也侮夫不節譴呵從之忿怒不止楚撻從之夫為夫婦者義以和親恩以好合楚撻既行何義之存譴呵既宣何恩之有恩義俱廢夫婦離矣婦行第四女有四行一曰婦德二曰婦言三曰婦容四曰婦功夫云婦德不必才明絕異也婦言不必辯口利辭也婦容不必顏色美麗也婦功不必工巧過人也清閑貞靜守節整齊行己有恥動靜有法是謂婦德擇辭而說不道惡語時然後言不厭於人是謂婦言盥浣塵穢服飾鮮絜沐浴以時身不垢辱是謂婦容專心紡績不好戲笑絜齊酒食以奉賓客是謂婦功此四者女人之大德而不可乏之者也然為之甚易唯在存心耳古人有言仁遠乎哉我欲仁而仁斯至矣此之謂也逃夫固不可離也行違神祇天則罰之禮義有愆夫則薄之故女憲曰得意一人是謂永畢失意一人是謂永訖由斯言之夫不可不求其心然所求者亦非謂佞媚苟親也固莫若專心正色禮義居絜耳無塗聽目無邪視出無冶容入無廢飾無聚會羣輩無看視門戶此則謂專心正色矣若夫動靜輕脫視聽陜輸入則亂髮壞形出則窈窕作態說所不當道觀所不當視此謂不能專心正色矣舅姑之心豈當可失哉物有以恩自離者亦有以義自破者也夫雖云愛舅姑云非此所謂以義自破者也然則舅姑之心柰何固莫尚於曲從矣姑云不爾而是固宜從令姑云爾而非猶宜順命勿得違戾是非爭分曲直此則所謂曲從矣故女憲曰婦如影響焉不可賞也由此言之我臧否譽毀一由叔妹叔妹之心復不可失也皆莫知叔妹之不可失而不能和之以求親其蔽也哉自非聖人鮮能無過故顏子貴於能改仲尼嘉其不貳而況婦人者也雖以賢女之行聰哲之性其能備乎是故室人和則謗掩外內離則惡揚此必然之埶也易曰二人同心其利斷金同心之言其臭如蘭此之謂也夫嫂妹者體敵而尊恩疏而義親若淑媛謙順之人則能依義以篤好崇恩以結援使徽美顯章而瑕過隱塞舅姑矜善而夫主嘉美聲譽曜于邑鄰休光延於父母若夫憃愚之人於嫂則託名以自高於妹則因寵以驕盈驕盈既施何和之有恩義既乖何譽之臻是以美隱而過宣姑忿而夫慍毀訾布於中外恥辱集于厥身進增父母之羞退益, WYG: ''}
