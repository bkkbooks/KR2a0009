  - {type: variant, offset: 775, length: 447, content: 由是皆拜郎中詩尋除江陽令卒于官所居治鄉人為立祀沛郡周郁妻者同郡趙孝之女也字阿少習儀訓閑於婦道而郁驕淫輕躁多行無禮郁父偉謂阿曰新婦賢者女當以道匡夫郁之不改新婦過也阿拜而受命退謂左右曰我無樊衞二姬之行故君以責我我言而不用君必謂我不奉教令則罪在我矣若言而見用是為子違父而從婦則罪在彼矣生如此亦何聊哉乃自殺莫不傷之扶風曹世叔妻者同郡班彪之女也名昭字惠班一名姬博學高才世叔早卒有節行法度兄固著漢書其八表及天文志未及竟而卒和帝詔昭就東觀臧書閣踵而成之帝數召入宮令皇后諸貴人師事焉號曰大家每有貢獻異物輒詔大家作賦頌及鄧太后臨朝與聞政事以出入之勤特封子成關內侯官至齊相時漢書始出多未能通者同郡馬融伏於閣下從昭受讀後又詔融兄續繼昭成之永初中太后兄大將軍鄧騭以母憂上書乞身太后不欲許以問昭昭因上疏曰伏惟皇太后陛下躬盛德之美隆唐虞之政闢四門而開四聰采狂夫之瞽言納芻蕘之謀慮妾昭得以愚朽身當盛明敢不披露肝膽以効萬一妾聞謙讓之風德莫大焉故典墳述美神祇降福昔夷齊去國天下服其廉高太伯違邠孔子稱為三讓所以光昭令德揚名于後者也, WYG: 性}
