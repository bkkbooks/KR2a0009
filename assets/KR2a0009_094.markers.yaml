  - {type: variant, offset: 387, length: 0, content: '', WYG: 人刺殺盎也而二弟階寵終用㪍慢卒周有播蕩之禍漢有爰盎之變竊聞渤海王悝憑至親之屬恃偏私之愛失奉上之節有僣慢之心外聚剽輕不逞之徒剽悍也逞快也謂彼侵枉不快之人也左傳曰率羣不逞之人剽音疋妙反内荒酒樂出入無常所與羣居皆有口無行有虚言無實行也或家之弃}
