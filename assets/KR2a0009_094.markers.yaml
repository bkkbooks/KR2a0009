  - {type: variant, offset: 1351, length: 348, content: 君之餘寵賴母師之典訓年十有四執箕箒於曹氏于今四十餘載矣戰戰兢兢常懼黜辱以增父母之羞以益中外之累夙夜劬心勤不告勞而今而後乃知免耳吾性疏頑教道無素恆恐子穀負辱清朝聖恩橫加猥賜金紫實非鄙人庶幾所望也男能自謀矣吾不復以為憂也但傷諸女方當適人而不漸訓誨不聞婦禮懼失容它門取恥宗族吾今疾在沈滯性命無常念汝曹如此每用惆悵閒作女誡七章願諸女各寫一通庶有補益裨助汝身去矣其勗勉之弱主下人也弄之瓦塼明其習勞主執勤也齋告先君明當主繼祭祀也三者蓋女人之常道禮法之典教矣謙讓恭敬先人後己有善莫名有惡莫辭忍辱含垢常若畏懼是謂卑弱下人也晚寢早作勿憚夙夜執務私事不辭劇易所作必成手迹整理是謂執勤也正色端操以事夫主清靜自守無好戲笑絜齊酒食以供祖宗是謂繼祭祀也三者苟備而患名稱之不聞黜辱之在身未之見也三者苟失之何名稱之可聞黜辱之可遠, WYG: 計}
