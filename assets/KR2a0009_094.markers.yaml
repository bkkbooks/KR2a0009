  - {type: variant, offset: 4693, length: 724, content: 與陰氏同穴而不免逼迫遂至於此素情不遂柰何乃命使建四燈盛裝飾請奕入相見共談言辭不輟亦奕敬憚之遂不敢逼至曙而出采因勑令左右辨浴既入室而掩戶權令侍人避之以粉書扉上曰尸還陰陰字未及成懼有來者遂以衣帶自縊左右翫之不為意比視已絕時人傷焉犍為盛道妻者同郡趙氏之女也字媛姜建安五年益部亂道聚衆起兵事敗夫妻執繫當死媛姜夜中告道曰法有常刑必無生望君可速潛逃建立門戶妾自留獄代君塞咎道依違未從媛姜便解道桎梏為齎粮貨子翔時年五歲使道攜持而走媛姜代道持夜應對不失度道已遠乃以實告吏應時見殺道父子會赦得歸道感其義終身不娶焉孝女叔先雄者犍為人也父泥和永建初為縣功曹縣長遣泥和拜檄謁巴郡太守乘船墯湍水物故尸喪不歸雄感念怨痛號泣晝夜心不圖存常有自沈之計所生男女二人並數歲雄乃各作囊盛珠環以繫兒數為訣別之辭家人每防閑之經百許日後稍懈雄因乘小船於父墯處慟哭遂自投水死弟賢其夕夢雄告之卻後六日當共父同出至期伺之果與父相持浮於江上郡縣表言為雄立碑圖象其形焉陳留董祀妻者同郡蔡邕之女也名琰字文姬博學有才辯又妙於音律適河東衞仲道夫亡無子歸寧于家興平中天下喪亂文姬為胡騎所獲沒於南匈奴左賢王在胡中十二年生二子曹操素與邕善痛其無嗣乃遣使者以金璧贖之而重嫁於祀祀為屯田都尉犯法當死文姬詣曹操請之時公卿名士及遠方使驛坐者滿堂操謂賓客曰蔡伯喈女在外今為諸君見之及文姬進蓬首徒行叩頭請罪音辭清辯旨甚酸哀衆皆為改容操曰誠實相矜然文狀已去柰何文姬曰明公馬萬匹虎士成林何惜疾足一騎而不濟垂死之命乎操感其言乃追原祀罪時且寒賜以頭巾履襪操因問曰聞夫人家先多墳籍猶能憶識之不文姬曰昔亡父賜書四千許卷流離塗炭罔有存者今所誦憶裁四百餘篇耳操曰今當使十吏就夫人寫之文姬曰妾聞男女之別禮不親授乞給紙筆真草唯命於是繕書送之文無遺, WYG: ''}
