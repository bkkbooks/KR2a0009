  - {type: variant, offset: 2851, length: 941, content: 惠為書以難之辭有可觀昭年七十餘卒皇太后素服舉哀使者監護喪事所著賦頌銘誄問注哀辭書論上疏遺令凡十六篇子婦丁氏為撰集之又作大家讚焉河南樂羊子之妻者不知何氏之女也羊子嘗行路得遺金一餅還以與妻妻曰妾聞志士不飲盜泉之水廉者不受嗟來之食況拾遺求利以樜其行乎羊子大慙乃捐金於野而遠尋師學一年來歸妻跪問其故羊子曰久行懷思無它異也妻乃引刀趨機而言曰此織生自蠶繭成於機杼一絲而累以至於寸累寸不已遂成丈匹今若斷斯織也則捐失成功稽廢時月夫子積學當日知其所亡以就懿德若中道而歸何異斷斯織乎羊子感其言復還終業遂七年不反妻常躬勤養姑又遠饋羊子嘗有它舍雞謬入園中姑盜殺而食之妻對雞不餐而泣姑怪問其故妻曰自傷居貧使食有它肉姑竟棄之後盜欲有犯妻者乃先劫其姑妻聞操刀而出盜人曰釋汝刀從我者可全不從我者則殺汝姑妻仰天而歎舉刀刎頸而死盜亦不殺其姑太守聞之即捕殺賊盜而賜妻縑帛以禮葬之號曰貞義漢中程文矩妻者同郡李法之姊也字穆姜有二男而前妻四子文矩為安衆令喪於官四子以母非所生憎毀日積而穆姜慈愛溫仁撫字益隆衣食資供皆兼倍所生或謂母曰四子不孝甚矣何不別居以遠之對曰吾方以義相導使其自遷善也及前妻長子興遇疾困篤母惻隱自然親調藥膳恩情篤密興疾久乃瘳於是呼三弟謂曰繼母慈仁出自天受吾兄弟不識恩養禽獸其心雖母道益隆我曹過惡亦已深矣遂將三弟詣南鄭獄陳母之德狀己之過乞就刑辟縣言之於郡郡守表異其母蠲除家徭遣散四子許以脩革自後訓導愈明並為良士穆姜年八十餘卒臨終勑諸子曰吾弟伯度智達士也所論薄葬其義至矣又臨亡遺令賢聖法也令汝曹遵承勿與俗同增吾之累諸子奉行焉孝女曹娥者會稽上虞人也父盱能絃歌為巫祝漢安二年五月五日於縣江泝濤迎婆娑迎神溺死不得屍骸娥年十四乃沿江號哭晝夜不絕聲旬有七日遂投江而死至元嘉元年縣長度尚改葬娥於江南道傍為立碑焉吳許升妻者呂氏之女也字榮升少為博徒不理操行榮嘗躬勤家業以奉養其姑數勸升修學每有不善輒流涕進規榮父積忿疾升乃呼榮欲改嫁之榮歎曰命之所遭義無離貳終不肯歸升感激自厲乃尋師遠學遂以成名尋被本州辟命行至壽春道為盜所害刺史尹耀捕盜得之榮迎喪於路聞而詣州請甘心讎人耀聽之榮乃手斷其頭以祭升靈後郡遭寇賊賊欲犯之榮踰垣走賊拔刀追之賊曰從我則生不從我則死榮曰義不以身受辱寇虜也遂殺之是日疾風暴雨靁電晦冥賊惶懼叩頭謝罪乃殯葬之汝南袁隗妻者, WYG: 蓺娶}
