  - {type: variant, offset: 424, length: 1, content: 霸, WYG: 人畏傷發言烝烝烝烝猶仍也似夫懦者而懐憤激揚折讓權枉又何壯也仁以矜物義以退身君子哉法言曰君子於仁也柔於義也剛語曰活千人者子孫必封前書王翁孺曰聞活千人者有封子孫吾所活者萬人後世其興乎史弼頡頏嚴吏頡頏猶上下也終全平原之黨而其後不大不大謂子孫衰替也斯亦未可論也盧植傳盧植字子幹涿郡涿人也身長八尺二寸音聲如鐘少與鄭𤣥俱事馬融能通古今學好研精而不守章句融外戚豪家融明徳皇后之從姪也多列女倡歌舞於前植侍講積年未嘗轉盻融以是敬之學終辭歸闔門敎授性剛毅有大節常懐濟世志不好辭賦能飲酒一石時皇后父大將軍竇武援立靈帝初秉機政朝議欲加封爵植雖布衣以武素有名譽乃獻書以規之曰植聞嫠有不恤緯之事左傳曰范獻子曰人亦有言嫠不恤其緯而憂宗周之隕為將及焉杜預注曰嫠寡婦也織者常苦緯少寡婦所宜憂也漆室有倚楹之戚琴操曰魯漆室女倚柱悲吟而嘯隣人見其心之不樂也進而問之曰有淫心欲嫁之念耶何吟之悲漆室女曰嗟乎嗟乎子無志不知人之甚也昔者楚人得罪於其君走逃吾東家馬逸蹈吾園葵使吾終年不懕菜吾西隣人失羊不還請吾兄追之霧濁水出使吾兄溺死終身無兄政之所致也吾憂國傷人心悲而嘯豈欲嫁哉自傷懐結而為人所疑於是褰裳入山林之中見女貞之木喟然歎息援琴而絃歌以女貞之辭自經而死劉攽曰注以女貞之辭案文多一以字憂深思逺君子之情詩序曰憂深思逺儉而用禮乃有堯之遺風焉夫士立爭友義貴切磋孝經曰士有爭友身不陷於不義詩云如切如磋鄭𤣥注云骨曰切象曰磋言友之相規誡如骨象之見切磋書陳謀及庶人尚書洪範曰謀及卿士謀及庶人也詩詠詢于芻蕘詩大雅曰先人有言詢于芻蕘毛萇注云芻蕘採薪者也植誦先王之書久矣敢愛其瞽言哉無}
