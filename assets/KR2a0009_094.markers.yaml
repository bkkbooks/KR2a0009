  - {type: variant, offset: 4170, length: 1, content: 沛, WYG: 地世世徙公卿吏二千石及髙貲皆以陪諸陵五方之俗雜會非一國之風不但繫於詩秦􅃎也其為士好髙尚義貴於名行其俗失則趣執進權唯利是視余以不才生於西土耳能聽而聞故老之言目能視而見衣冠之疇心能識而觀其賢愚常以𤣥冬夢黄髮之士姓𤣥名明字子真與余寤言言必有中善否之間無所依違命操筆者書之近從建武以来暨于斯今其人既亡行乃可書玉石朱紫由此定矣故謂之決録矣}
