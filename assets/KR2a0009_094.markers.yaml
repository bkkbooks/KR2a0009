  - {type: variant, offset: 428, length: 3, content: 愧容客, WYG: 豈横叨天功以為己力乎叨貪也左傳曰貪天之功以為己力也宜辭大賞以全身名又比世祚不競競彊也仍外求嗣可謂危矣而四方未寜盜賊伺隙恒岳勃碣勃勃海也碣碣石山也特多姦盜將有楚人脅比尹氏立朝之變左傳曰楚公子比恭王之子也靈王立子比奔晉靈王卒子比自晉歸楚立為君比弟公子弃疾欲簒其位夜乃使人周走呼曰王至矣國人大驚子比乃自殺王子朝周景王之庶子景王卒子猛立尹氏周卿士立子朝奪猛位也宜依古禮置諸子之官徴王侯愛子宗室賢才外崇訓道之義内息貪利之心簡其良能隨用爵之彊幹弱枝之道也以樹為喻也謂京師為幹四方為枝前書曰漢興立都長安徙齊諸田楚昭屈景及諸功臣家於長陵蓋以彊幹弱枝非獨為奉山園也武並不能用州郡數命植皆不就建寜中徴為博士乃始起焉熹平四年九江蠻反四府選植才兼文武拜九江太守蠻寇賔服以疾}
  - {type: page-break, offset: 428, content: '', id: KR2a0009_WYG_094-15b, image: WYG0253/WYG0253-0324d.png}
