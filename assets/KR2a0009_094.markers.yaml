  - {type: variant, offset: 18, length: 3, content: 女德尚, WYG: 能著文章有名京師舉孝廉為平陽侯相到官表龔遂之墓立銘祭祠擢用其後於畎畝之間前書龔遂山陽南平陽人為勃海太守南平陽故城在今兖州鄒縣以師喪棄官奔赴五府並辟不就桓帝以博士徴拜議郎與朱穆邊韶共著作東觀稍遷侍中帝數問政事篤詭辭密對榖梁傳曰故士造辟而言詭辭而出范寗注云辟君也詭辭而出不以實告人也動依典義遷左馮翊又徙京兆尹其政用寛仁憂恤民黎擢用長者與參政事郡中歡愛三輔咨嗟焉先是陳留邊鳳為京兆尹亦有能名郡人為之語曰前有趙張三王前書趙廣漢張敞王尊王章王駿俱為京兆尹也後有邊延二君時皇子有疾下郡縣出珍藥而大將軍梁冀遣客齎書詣京兆并貨牛黄吳普本草曰牛黄味苦無毒牛出入呻者有之夜有光走角中牛死入膽中如雞子黄神農本草曰療驚癎除邪逐鬼篤發書收客曰大將軍椒房外家而皇子有疾必應陳進醫方豈當使客千里求利乎遂殺之冀慙而不得言有司承㫖欲求其事篤以病免歸敎授家巷時人或疑仁孝前後之證篤乃論之曰觀夫仁孝之辯辯爭也紛然異端互引典文代取事據代更也可謂篤論}
