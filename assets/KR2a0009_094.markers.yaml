  - {type: variant, offset: 4245, length: 0, content: '', WYG: 而岐所作孟子章句傳至今本傳何得反不記也贊曰呉翁温愛義干剛烈謂以義干梁冀爭李固也延史字人風和恩結梁使顯刑誣黨潛絶子幹兼姿逄掖臨師禮記孔子曰丘少居魯衣逄掖之衣鄭𤣥注曰逄}
  - {type: variant, offset: 4245, length: 0, content: '', krp: 而岐所作孟子章句傳至今本傳何得反不記也贊曰呉翁温愛義干剛烈謂以義干梁冀爭李固也延史字人風和恩結梁使顯刑誣黨潛絶子幹兼姿逄掖臨師禮記孔子曰丘少居魯衣逄掖之衣鄭𤣥注曰逄}
  - {type: variant, offset: 4246, length: 0, content: '', WYG: 大也為大掖之衣此君子有道蓺者所衣也相承本作縫義亦通邠卿出疆專命朝威疆界也左傳曰大夫出疆茍利社稷專之}
  - {type: variant, offset: 4246, length: 0, content: '', krp: 大也為大掖之衣此君子有道蓺者所衣也相承本作縫義亦通邠卿出疆專命朝威疆界也左傳曰大夫出疆茍利社稷專之}
  - {type: variant, offset: 4247, length: 0, content: '', WYG: 也後漢書卷九十四後漢書卷九十四考證吳祐傳踰越五領注裴氏廣川記諸本同川當作州為祖道注掌王玉路以祀及犯軷犯字監本誤祀從周禮太馭文改正所謂觀過斯知仁矣仁毛本作人何焯曰他本同作人史弼傳聚徒數百仕州郡注悉條諸生聚歛姦吏百餘人諸本同生字疑衍刑竟歸田里刑他本多作弼上云論輸左校刑竟謂徒役期滿也叚熲傳亦有刑竟字今仍監本盧植傳遂隱於上谷上字毛本作山子毓知名注時舉中郎毛本作中書郎趙岐傳}
