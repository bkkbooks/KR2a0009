  - {type: variant, offset: 432, length: 0, content: '', WYG: 官作尚書章句三禮解詁詁事也言解其事意時始立太學石經以正五經文字植乃上書曰臣少從通儒故南郡太守馬融受古學頗知今之禮記特多回宂回宂猶紆曲也臣前以周禮諸經發起粃謬粃粟不成喻義之乖僻也敢率愚淺為之解詁}
  - {type: page-break, offset: 432, content: '', id: KR2a0009_WYG_094-16a, image: WYG0253/WYG0253-0325a.png}
  - {type: variant, offset: 432, length: 0, content: '', krp: 官作尚書章句三禮解詁詁事也言解其事意時始立太學石經以正五經文字植乃上書曰臣少從通儒故南郡太守馬融受古學頗知今之禮記特多回宂回宂猶紆曲也臣前以周禮諸經發起粃謬粃粟不成喻義之乖僻也敢率愚淺為之解詁}
  - {type: variant, offset: 433, length: 2, content: 久臥, WYG: 家乏無力供繕寫上繕善也言家貧}
  - {type: variant, offset: 433, length: 2, content: 久臥, krp: 家乏無力供繕寫上繕善也言家貧}
  - {type: variant, offset: 436, length: 0, content: '', WYG: 能繕寫而上也願得將能書生二人共詣東觀就官財糧專心研精合尚書章句考禮記失得庶裁定聖典刋正碑文古文科斗近於為實而厭抑流俗降在小學古文謂孔子壁中書也形似科斗因以為名前書謂文字為小學也中興以來通儒達士班固賈逵鄭興父子並敦恱之興子衆也自有傳左傳曰郤豰恱禮樂而敦詩書也今毛詩左氏周禮各有傳記其與春秋共相表裏表裏言義相湏而成也前書云河圖洛書相為經緯八卦九章相為表裏宜置博士為立學官以助後來以廣聖意會南夷反叛以植嘗在九江有恩信拜為廬江太守植深達政宜務存清靜𢎞大體而已嵗餘復徴拜議郎與諫議大夫馬日磾議郎蔡邕楊彪韓說等並在東觀校中書五經記傳補續漢記言中書以别於外也帝以非急務轉為侍中遷尚書光和元年有日食之異上封事諫曰臣聞五行傳日晦而月見謂之朓王侯其舒五行傳劉向所著朓者行速在日前故早見劉向以為君舒緩則臣驕慢故日行遲而月行速也此謂君政舒緩故日食晦也春秋傳曰天子避位移時左氏傳曰日過分未至三辰有災於是乎君不舉避移時杜預注曰避正寢過日食時也言其相掩不過移時而間者日食自已過午既食之後雲霧晻曖比年地震彗孛互見臣聞漢以火徳化當寛明近色信䜛忌之甚者如火畏水故也案今年之變皆陽失隂侵消禦災凶宜有其道謹略陳八事一曰用良二曰原禁原其所禁而宥之也三曰禦癘防禦疫癘之氣四曰備寇五曰修禮六曰遵堯七曰御下八曰散利用良者宜使州郡覈舉賢良覈實也隨方委用責求選舉原禁者凡諸黨錮多非其罪可加赦恕申宥回枉回邪也禦癘者宋后家屬並以無辜委骸横尸不得收葬疫癘之來皆由於此宜勑收拾以安遊魂后以王甫程阿所構憂死父及兄弟並被誅靈帝後夢見桓帝怒曰宋皇后何罪而絶其命已訴於天上帝震怒罪在難救也備寇者侯王之家賦稅減削愁窮思亂必致非常宜使給足以防未然脩禮者應徴有道之人若鄭𤣥之徒陳明洪範禳服災咎遵堯者今郡守刺史一月數遷宜依黜陟以章能否縱不九載可滿三嵗書曰三載考績三考黜陟幽眀孔安國注曰三年考功三考九年能否幽明有别升進其明者黜退其幽者此皆唐堯之法也御下者請謁希爵一宜禁塞希求也遷舉之事責成主者散利者天子之體理無私積宜𢎞大務蠲略細微蠲除也帝不省中平元年黄巾賊}
