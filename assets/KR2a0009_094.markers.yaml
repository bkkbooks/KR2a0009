  - {type: variant, offset: 4248, length: 286, content: 姑姊妹以表其誠何貴義輕身之甚哉對曰昔我先君五更學為儒宗尊為帝師五更已來歷代不替男以忠孝顯女以貞順稱詩云無忝爾祖聿脩厥德是以豫自刑翦以明我情沛相王吉上奏高行顯其門閭號曰行義桓釐縣邑有祀必膰焉安定皇甫規妻者不知何氏女也規初喪室家後更娶之妻善屬文能草書時為規荅書記衆人怪其工及規卒時妻年猶盛而容色美後董卓為相國承其名娉以軿輜百乘馬二十匹奴婢錢帛充路妻乃輕服詣卓門跪自陳請辭甚酸愴卓使傅奴侍者悉拔刀圍之而謂曰孤之威教欲令四海風靡何有不行於一婦人乎妻知不免乃立罵卓曰君羌胡之種毒害天下猶未足邪妾之先人清德奕世皇甫氏文武上才為漢忠臣君親非其趣使走吏乎敢欲行非禮於爾君夫人邪卓乃引車庭中, WYG: 字臺卿注}
