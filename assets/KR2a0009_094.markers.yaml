  - {type: variant, offset: 354, length: 3, content: 妻亦美, WYG: 方之於吾未足况也且吾自束脩己來束脩謂束帶脩飾鄭元注論語曰謂年十五已上也為人臣不陷於不忠為人子不陷於不孝上交不謟下交不黷易繋辭之文也從此而殁下見先君逺祖可不慙赧色媿曰赧音女版反如此而不以善止者恐如敎羿射者也史記有養由基者善射者也去栁葉百歩而射之百發而百中之左右觀者百餘人皆曰善射有一人立其旁曰善可教射矣養由基怒釋弓搤劒曰客安能教我射乎客曰非吾能敎枝左詘右也夫去栁葉百歩而射之百發百中之不以善息少焉氣衰力倦弓撥矢鉤一發不中者百發盡息此言羿者蓋以俱善射而稱之焉愼勿迷其本弃其生也後遭黨事禁錮錮謂閉塞永康元年卒于家鄉里圖其形于屈原之廟屈原楚大夫抱忠貞而死篤有}
