  - {type: variant, offset: 426, length: 0, content: '', WYG: 䀕曰瞽䀕音直忍反今足下之於漢朝猶旦奭之在周室建立聖主四海有繋論者以為吾子之功於斯為重天下聚目而視攢耳而聽前書賈山曰使天下戴目而視傾耳而聽也謂準之前事將有景風之祚景風解見和帝紀尋春秋之義王后無嗣擇立親長年均以徳徳均則決之卜筮左傳王子朝曰先王之命王后無嫡則擇立長年鈞以徳徳鈞以卜古之制也今同宗相後披圖案牒以次建之何勲}
