  - {type: variant, offset: 30, length: 5, content: 政哲婦隆家, WYG: 數也而如欲分其大較較猶畧也體而名之則孝在事親仁施品物施物則功濟於時事親則徳歸於己於己則事寡濟事則功多推此以言仁則逺矣然物有出微而著事有由隱而章近取諸身則耳有聽受之用目有察見之明足有致逺之勞手有飾衞之功功雖顯外本之者心也逺取諸物則草木之生始於萌牙終於彌蔓枝葉扶疏榮華紛縟說文曰縟繁綵飾也末雖繁蔚致之者根也夫仁}
