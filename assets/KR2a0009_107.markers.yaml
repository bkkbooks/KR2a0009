  - {type: variant, offset: 52, length: 0, content: '', WYG: 推曰下義其罪上賞其姦上下相蒙難與處矣蒙欺也德義不足以相洽化導不能以懲違遂乃嚴刑痛殺隨而繩之致刻深之吏以暴理姦倚疾邪之公直濟忍苛之虐情漢世所謂酷能者蓋有聞也皆以敢悍精敏巧附文理風行霜烈威譽諠赫與夫斷斷守道之吏何工否之殊乎尚書曰如有一介臣斷斷猗孔安國注云斷斷猗然專一之臣也故嚴君蚩黄霸之術前書嚴延年為河南太守嚴刑峻罰時黄霸為潁川太守以寛恕為化郡中亦平屢蒙豐年鳳凰屢集上下詔稱揚其行加金爵之賞延年素輕霸為人及比郡為守褒賞反在已前心内不服河南界中又有蝗府丞狐義出行蝗還見延年延年曰此蝗豈鳳凰食邪密人笑卓茂之政茂傳曰初茂到縣有所廢置吏人笑之猛既窮矣而猶或未勝然朱邑不以笞辱加物前書曰朱邑以愛利為行未嘗笞辱人袁安未嘗鞫人臧罪安傳曰安為河南尹政號嚴明然未曽以臧罪鞫人也而猾惡}
