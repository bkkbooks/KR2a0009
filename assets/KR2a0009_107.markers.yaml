  - {type: variant, offset: 13, length: 1, content: 告, WYG: 拜陽平令陽平縣屬東郡故城今魏州莘縣也時趙魏豪右徃徃屯聚清河大姓趙綱遂於縣界起塢壁繕甲兵為在所害章到乃設饗㑹而延謁綱綱帯文劒被羽衣緝鳥羽以為衣也前書欒大為五利將軍服羽衣也從士百餘人來到章與對讌飲有頃手劎斬綱伏兵亦悉殺其從者因馳詣塢壁掩撃破之吏人遂安遷千乗太守坐誅斬盜賊過濫徴下獄免嵗中拜侍御史出為琅邪太守時北海安丘大姓夏長思等反遂囚太守處興風俗通曰史記趙有辨士處子故冇處姓也而據營陵城營陵縣屬北海郡也章聞即發兵千人馳徃撃之掾吏止章劉攽曰案文吏當作史曰二千石行不得出界兵不得擅發前書杜欽奏記王鳳曰二千石守千里之地任兵馬之重不宜去郡也章按劒怒曰逆虜無狀囚劫郡守此何可忍若坐討賊而死吾不恨也遂引兵安丘城下募勇敢燒城門與長思戰斬之獲三百餘級得牛馬五百餘頭而還興歸郡以狀上帝悉以所得班勞吏士後坐度人田不實徴以章有功但司寇論月餘免刑歸復徴㑹病卒周䊸傳周䊸字文通下邳徐人也為人刻削少恩好韓非之術少為廷尉史永平中補南行唐長到官曉吏人曰朝廷不以長不肖使牧黎民而性讐猾吏志除豪賊且勿相試遂殺縣中尤無狀者數十人吏人大震遷博平令博平縣故城在今博州博平縣東也收考姦臧無出獄者以威名遷齊相亦頗嚴酷專任刑法而善為辭案條敎辭案猶今案牘也為州内所則後坐殺無辜復左轉博平令建初中為勃海太守每赦令到郡輒隠閉不出先遣使屬縣盡決刑罪乃出詔書坐徴詣廷尉免歸䊸亷潔無資常築墼以自給劉攽曰案墼非築所成當作塹築為垣墻塹為坑塹也肅宗聞而憐之復以為郎再遷召陵侯相廷掾憚䊸嚴明欲損其威續漢志每郡有五官掾縣為廷掾也乃晨取死人斷手足立寺門䊸聞便徃至死人邉若與死人共語狀隂察視口眼有稻芒乃密問守門人曰悉誰載藁入城者悉猶知也門者對唯有廷掾耳又問鈴下漢官儀曰鈴下侍閣辟車此皆以名自定者也外頗有疑令與死人語者不對曰廷掾疑君乃收廷掾考問具服不殺人取道邉死人後人莫敢欺者徴拜洛陽令下車先問大姓主名吏數閭里豪彊以對䊸厲聲怒曰本問貴戚若馬竇等輩豈能知此賣菜傭乎於是部吏望風㫖爭以激切為事貴戚跼蹐京師肅清皇后弟黄門郎竇篤從宫中歸夜至止姦亭亭長霍延遮止篤篤蒼頭與爭延遂拔劒擬篤而肆詈恣口篤以表聞詔召司𨽻校尉河南尹詣尚書譴問遣劒㦸士收䊸送廷尉詔獄數日貰出貰赦也音市夜反帝知䊸奉法疾姦不事貴戚然苛慘失中慘虐也數為有司所奏八年遂免官後為御史中丞和帝即位太傅鄧彪奏䊸在任過酷不宜典司京輦漢官儀曰御史中丞外督部刺史内領侍御史糾察百官故云典司京輦免歸田里後竇氏貴盛篤兄弟秉權睚眦宿怨無不僵仆僵偃也仆踣也䊸自謂無全乃柴門自守以待其禍然篤等以䊸公正而怨隙有素遂不敢害永元五年復徴為御史中丞諸竇雖誅而夏陽侯瓌猶尚在朝䊸疾之乃上疏曰臣聞臧文仲之事君也見有禮於君者事之如孝子之養父母見無禮於君者誅之如鷹鸇之逐鳥雀左氏傳季孫行父稱臧文仲敎行父事君之辭也按夏陽侯瓌本出輕薄志在邪辟學無經術而妄搆講舍外招儒徒實㑹姦桀輕忽}
