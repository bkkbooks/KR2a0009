  - {type: variant, offset: 1167, length: 727, content: 用方石再累置壇中皆方五尺厚一尺用玉牒書藏方石牒厚五寸長尺三寸廣五寸有玉檢又用石檢十枚列於石傍東西各三南北各二皆長三尺廣一尺厚七寸檢中刻三處深四寸方五寸有蓋檢用金鏤五周以水銀和金以為泥王璽一方寸二分一枚方五寸方石四角又有距石皆再累枚長一丈厚一尺廣二尺皆在圓壇上其下用距石十八枚皆高三尺厚一尺廣二尺如小碑環壇立之去壇三步距石下皆有石跗入地四尺又用石碑高九尺廣三尺五寸厚尺二寸立壇丙地去壇三丈以上以刻書上以用石功難又欲及二月封故詔松欲因故封石空檢更加封而已松上疏爭之以為登封之禮告功皇天垂後無窮以為萬民也承天之敬尤宜章明奉圖書之瑞尤宜顯著今因舊封竄寄玉牒故石下恐非重命之義受命中興宜當特異以明天意遂使泰山郡及魯趣石工宜取完青石無必五色時以印工不能刻玉牒欲用丹漆書之會求得能刻玉者遂書書祕刻方石中合容玉牒二月上至奉高遣侍御史與蘭臺令史將工先上山刻石文曰維建武三十有二年二月皇帝東巡狩至于岱宗柴望秩於山川班于羣神遂覲東后從臣太尉熹行司徒事特進高密侯禹等漢賓二王之後在位孔子之後襃成侯序在東后蕃王十二咸來助祭河圖赤伏符曰劉秀發兵捕不道四夷雲集龍鬬野四七之際火為主河圖會昌符曰赤帝九世巡省得中治平則封誠合帝道孔矩則天文靈出地祇瑞興帝劉之九會命岱宗誠善用之姦偽不萌赤漢德興九世會昌巡岱皆當天地扶九崇經之常漢大興之道在九世之主封于泰山刻石著紀禪于梁父退省考五河圖合古篇曰帝劉之秀九名之世帝行德封刻政河圖提劉予曰九世之帝方明聖持衡拒九州平天下予雒書甄曜度曰赤三德昌九世會修符合帝際勉刻封孝經鉤命決曰予誰行赤劉用帝三建孝九會修專茲竭行封岱青河雒命后經讖所傳昔在帝堯聰明密微讓與舜庶後裔握機王莽以舅后之家三司鼎足冢宰之權勢依託周公霍光輔幼歸政之義遂以篡叛僭號自立宗廟墮壞社稷喪亡, WYG: 刋正且未葬但可言壊}
