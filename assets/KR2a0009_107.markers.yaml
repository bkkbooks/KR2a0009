  - {type: variant, offset: 29, length: 0, content: '', krp: 所容矣郡中咸畏服焉時天下大旱司空張顥條奏長吏苛酷貪汚者皆罷免}
  - {type: variant, offset: 30, length: 1, content: 矣, WYG: 球坐嚴苦徴詣廷尉當免官靈帝以球九江時有功拜議郎遷將作大匠坐事論頃之拜尚書令奏罷鴻都文學曰伏承有詔勑中尚方為鴻都文學樂松江覽等三十二人圖象立賛以勸學者臣聞傳曰君舉必書書而不法後嗣何觀左傳曹劌諫魯莊公之辭也案松覽等皆出於㣲蔑斗筲小人依憑世戚附託權豪俛眉承睫徼進明時或獻賦一篇或鳥篆盈簡八體書有鳥篆象形以為字也而位升郎中形圖丹青亦有筆不㸃牘辭不辯心假手請字妖偽百品莫不被䝉殊恩蟬蜕滓濁説文曰蜕蟬蜕所解皮也蜕音式鋭反楚詞曰濟江海兮蟬蜕或音它外反是以有識掩口天下嗟歎臣聞圖象之設以昭勸戒欲令人君動鑒得失未聞豎子小人詐作文頌而可妄竊天官垂象圖素者也今太學東觀足以宣明聖化願罷鴻都之選以消天下之謗書奏不省時中常侍王甫曹節等姦虐弄權扇動外内球嘗拊髀發憤曰若陽球作司𨽻此曹子安得容乎光和二年遷為司𨽻校尉王甫休沐里舍球詣闕謝恩奏收甫及中常侍淳于登袁赦封􅛑􅛑音吐盍反中黄門劉毅小黄門龎訓朱禹齊盛等及子弟為守令者姦猾縱恣罪合滅族太尉叚熲謟附佞倖宜並誅戮於是悉收甫熲等送洛陽獄及甫子永樂少府萌沛相吉球自臨考甫等五毒備極萌謂球曰父子既當伏誅少以楚毒假借老父球曰若罪惡無狀若汝也死不滅責乃欲球假借邪萌乃罵曰爾前事吾父子如奴奴敢反汝主乎今日困吾行自及也球使以土窒萌口箠朴交至父子悉死杖下熲亦自殺乃僵磔甫屍於夏城門大署牓曰賊臣王甫盡没入財産妻子皆徙比景球既誅甫復欲以次表曹節等乃勑中都官從事曰且先去大猾當次案豪右權門聞之莫不屏氣諸奢飾之物皆各緘縢不敢陳設説文曰緘束篋也孔安國注尚書曰縢緘也京師畏震時順帝虞貴人𦵏百官㑹喪還曹節見磔甫屍道次慨然抆淚曰抆拭也音亡粉反我曹自可相食何宜使犬䑛其汁乎語諸常侍今且俱入勿過里舍也節直入省白帝曰陽球故酷暴吏前三府奏當免官以九江㣲功復見擢用愆過之人好為妄作不宜使在司𨽻以騁毒虐帝乃徙球為衛尉時球出謁陵節勑尚書令召拜不得稽留尺一球被召急因求見帝叩頭曰臣無清高之行横蒙鷹犬之任前雖糾誅王甫叚熲蓋簡落狐狸未足宣示天下願假臣一月必令}
