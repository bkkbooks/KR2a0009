  - {type: variant, offset: 24, length: 1, content: 民, krp: 蟲坐左轉騎都尉七年遷將作大匠九年卒於官黄昌傳黄昌字聖真㑹稽餘姚人也餘姚今越州縣也本出孤微居近學宫數見諸生修庠序之禮因好之遂就經學又曉習文法仕郡為決曹續漢志曰決曹主罪法事刺史行部見昌甚竒之辟從事後拜宛令政尚嚴猛好發姦伏人有盜其車蓋者昌初無所言後乃密遣親客至門下賊曹家掩取得之續漢志曰賊曹主盜賊事悉收其家一時殺戮大姓戰懼皆稱神明朝廷舉能遷蜀郡太守先太守李根年老多悖政悖亂也百姓侵寃及昌到吏人訟者七百餘人悉為斷理莫不得所密捕盜帥一人脅使條諸縣彊暴之人姓名居處乃分遣掩討無有遺脱宿惡大姦皆奔走它境初昌為州書佐其婦歸寧於家遇賊被獲遂流轉入蜀為人妻其子犯事乃詣昌自訟昌疑母不類蜀人因問所由對曰妾本㑹稽餘姚戴次公女州書佐黄昌妻也妾嘗歸家為盜所略遂至於此昌驚呼前謂曰何}
  - {type: variant, offset: 26, length: 0, content: '', WYG: 識黄昌邪對曰昌左足心有黒子常自言當為二千石相書曰足心有黒子者二千石昌乃出足示之因相持悲泣還為夫婦視事四年徴再遷陳相縣人彭氏舊豪縱造起大舍高樓臨道昌每出行縣彭氏婦人輒升樓而觀昌不喜遂勑收付獄案殺之又遷為河内太守又再遷潁川太守劉攽曰案文多二又字永和五年徴拜將作大匠漢安元年進補大司農左轉大中大夫卒於官陽球傳陽球字方正漁陽泉州人也泉州故城在今幽州雍奴縣南也家世大姓冠蓋球能撃劒習弓馬性嚴厲好申韓之學郡吏有辱其母者球結少年數十人殺吏滅其家由是知名初舉孝亷補尚書侍郎閑逹故事其章奏處議處斷也常為臺閣所崇信出為高唐令以嚴苛過理郡守收舉收繫舉劾之也㑹赦見原辟司徒劉寵府舉高第九江山賊起連月不解三府上球有理姦才拜九江太守球到設方略凶賊殄破收郡中姦吏盡殺之遷平原相出教曰相前蒞高唐志掃姦鄙遂為貴郡所見枉舉昔桓公釋管仲射鉤之讎高祖赦季布逃亡之罪雖以不德敢忘前義況君臣分定而可懐宿昔哉今一蠲徃愆期諸}
  - {type: page-break, offset: 26, content: '', id: KR2a0009_WYG_107-11a, image: WYG0253/WYG0253-0499c.png}
  - {type: page-break, offset: 26, content: '', id: KR2a0009_WYG_107-11b, image: WYG0253/WYG0253-0499d.png}
