  - {type: variant, offset: 24, length: 1, content: 民, WYG: 蟲坐左轉騎都尉七年遷將作大匠九年卒於官黄昌傳黄昌字聖真㑹稽餘姚人也餘姚今越州縣也本出孤微居近學宫數見諸生修庠序之禮因好之遂就經學又曉習文法仕郡為決曹續漢志曰決曹主罪法事刺史行部見昌甚竒之辟從事後拜宛令政尚嚴猛好發姦伏人有盜其車蓋者昌初無所言後乃密遣親客至門下賊曹家掩取得之續漢志曰賊曹主盜賊事悉收其家一時殺戮大姓戰懼皆稱神明朝廷舉能遷蜀郡太守先太守李根年老多悖政悖亂也百姓侵寃及昌到吏人訟者七百餘人悉為斷理莫不得所密捕盜帥一人脅使條諸縣彊暴之人姓名居處乃分遣掩討無有遺脱宿惡大姦皆奔走它境初昌為州書佐其婦歸寧於家遇賊被獲遂流轉入蜀為人妻其子犯事乃詣昌自訟昌疑母不類蜀人因問所由對曰妾本㑹稽餘姚戴次公女州書佐黄昌妻也妾嘗歸家為盜所略遂至於此昌驚呼前謂曰何}
