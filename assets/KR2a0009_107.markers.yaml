  - {type: variant, offset: 6, length: 2, content: 祭祀, WYG: 漢承戰國餘烈多豪猾之民其并兼者則陵横邦邑桀徤者則雄張閭里横音胡孟反張音知亮反且宰守曠逺戸口殷大前書曰成帝户一千二百二十三萬三千六十口五千九百五十九萬四千九百七十八漢極盛矣故臨民之職專事威斷族滅姦軌先行後聞先行刑而後聞奏也肆情剛烈成其不撓之威撓屈也前書甯成為濟南都尉而郅都為守始前數都尉歩入府因吏謁守如縣令其畏都如此及成徃直陵都出其}
