  - {type: variant, offset: 44, length: 0, content: '', WYG: 共誣白郃等語已見陳球傳遂收球送洛陽獄誅死妻子徙邉王吉傳王吉者陳留浚儀人中常侍甫之養子也甫在宦者傳吉少好誦讀書傳喜名聲而性殘忍以父秉權寵年二十餘為沛相曉逹政事能斷察疑獄發起姦伏多出衆議課使郡内各舉姦吏豪人諸常有㣲過酒肉為臧者雖數十年猶加貶棄注其名籍專選剽悍吏撃斷非法若有生子不養即斬其父母合土棘埋之凡殺人皆磔屍車上隨其罪目宣示屬縣目罪名也夏月腐爛則以繩連其骨周徧一郡乃止見者駭懼視事五年凡殺萬餘人其餘􅆭毒刺刻不可勝數郡中惴恐惴懼也音之瑞反莫敢自保及陽球奏甫乃就收執死於洛陽獄論曰古者敦龎善惡易分左傳申叔時曰人生敦龎和同以聽杜預注云敦龎厚大也}
