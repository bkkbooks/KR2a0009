  - {type: variant, offset: 1922, length: 624, content: 里屯聚往往僭號北夷作寇千里無煙無雞鳴狗吠之聲皇天睠顧皇帝以匹庶受命中興年二十八載興兵起是以中次誅討十有餘年罪人則斯得黎庶得居爾田安爾宅書同文車同軌人同倫舟輿所通人迹所至靡不貢職建明堂立辟雍起靈臺設庠序同律度量衡修五禮五玉三帛二牲一死贄吏各修職復于舊典在位三十有二年年六十二乾乾日不敢荒寧涉危歷險親巡黎元恭肅神祇惠恤耆老理庶遵古聰允明恕皇帝唯慎河圖雒書正文是月辛卯柴登封泰山甲午禪于梁陰以承靈瑞以為兆民永茲一宇垂于後昆百寮從臣郡守師尹咸蒙祉福永永無極秦相李斯燔詩書樂崩禮壞建武元年已前文書散亡舊典不具不能明經文以章句細微相況八十一卷明者為驗又其十卷皆不昭子貢欲去告朔之餼羊子曰賜也爾愛其羊我愛其禮後有聖人正失誤刻石記二十二日辛卯晨燎祭天於泰山下南方羣神皆從用樂如南郊諸王王者後二公孔子後襃成君皆助祭位事也事畢將升封或曰泰山雖已從食於柴祭今親升告功宜有禮祭於是使謁者以一特牲於常祠泰山處告祠泰山如親耕貙劉先祠先農先虞故事至食時御輦升山日中後到山上更衣早晡時即位于壇北面羣臣以次陳後西上畢位升壇尚書令奉玉牒檢皇帝以寸二分璽親封之訖太常命人發壇上石尚書令藏玉牒已復石覆訖尚書令以五寸印封石檢事畢皇帝再拜羣臣稱萬歲命人立所刻石碑乃復道下二十五日甲午禪祭地于梁陰以高后配山川羣神從如元始中北郊故事四月己卯大赦天下以建武三十二年為建武中元元年復博奉高嬴勿出元年租芻以吉日刻玉牒書函藏金匱璽印封之乙酉使太尉行事以特告至高廟太尉奉匱以告高廟藏于廟室西壁石室高主室之下, WYG: 七考證}
