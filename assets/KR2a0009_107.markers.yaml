  - {type: variant, offset: 9, length: 0, content: '', WYG: 都素聞其聲善遇之與結驩違衆用已表其難測之智前書嚴延年為河南太守衆人所謂當死者一朝出之所謂當生者詭殺之吏人莫能測其用意深淺也至於重文横入為窮怒之所遷及者亦何可勝言重猶深也横猶枉也窮極也言遷怒於無罪之人故乃積骸滿穽漂血十里穽阬也前書尹賞守長安令得一切以便宜從事賞至修理長安獄穿地方深各數丈名為虎穴乃部戸曹掾吏雜舉長安中輕薄少年惡子無市籍商販作務而鮮衣凶服者得數百人盡以次内穴中覆以大石皆相枕籍死又王温舒為河内太守捕郡中豪猾論報流血十餘里也致温舒有虎冠之吏王温舒為中尉窮案姦猾盡糜爛獄中其爪牙吏虎而冠者也音義云言其殘虐之甚也延年受屠伯之名豈虚也哉前書嚴延年為河南太守所誅殺血流數里河南號曰屠伯言若屠人之殺六畜也若其揣挫彊埶摧勒公卿碎裂頭腦而不顧亦為壯也前書濟南瞷氏宗人三百餘家豪猾二千石莫能制郅都為濟南守至則誅瞷氏首惡郡中路不拾遺都後竟坐斬又趙廣漢為京兆尹侵犯貴戚大臣將吏卒入丞相魏相府召其夫人疏庭下受辭責以殺婢事司直蕭望之劾奏廣漢摧辱大臣傷化不道坐腰斬破碎頭腦言不避誅戮也劉攽曰注疏庭下案本傳疏當作跪自中興以後科網稍密吏人之嚴害者方於前世省矣而閹人親婭侵虐天下爾雅曰兩壻相謂曰婭至使陽球磔王甫之屍張儉剖曹節之墓若此之類雖厭快衆憤亦云酷矣儉知名故附黨人篇劉淑李膺等傳也董宣傳董宣字少平陳留圉人也初為司徒侯霸所辟舉高第累遷北海相到官以大姓公孫丹為五官掾丹新造居宅而卜工以為當有死者丹乃令其子殺道行人置屍舍内以塞其咎宣知即收丹父子殺之丹宗族親黨三十餘人操兵詣府稱寃呌嗁宣以丹前附王莽慮交通海賊乃悉收繫劇獄劇縣之獄使門下書佐水丘岑盡殺之姓水丘名岑也青州以其多濫奏宣考岑宣坐徴詣廷尉在獄晨夜諷誦無憂色及當出刑官屬具饌送之宣乃厲色曰董宣生平未曽食人之食況死乎升車而去時同刑九人次應及宣光武馳使騶騎特原宣刑且令還獄遣使者詰宣多殺無辜宣具以狀對言水丘岑受臣㫖意罪不由之願殺臣活岑使者以聞有詔左轉宣懐令令青州勿案岑罪岑官至司𨽻校尉後江夏有劇賊夏喜等寇亂郡境以宣為江夏太守到界移書曰朝廷以太守能禽姦賊故辱斯任今勒兵界首檄到幸思自安之宜喜等聞懼即時降散外戚隂氏為郡都尉宣輕慢之坐免後特徴為洛陽令時湖陽公主蒼頭白日殺人因匿主家吏不能得及主出行而以奴驂乗宣於夏門亭候之乃駐車叩馬以刀畫地大言數主之失叱奴下車因格殺之主即還宫訴帝帝大怒召宣欲箠殺之宣叩頭曰願乞一言而死帝曰欲何言宣曰陛下聖德中興而縱奴殺良人將何以理天下乎臣不須箠請得自殺即以頭撃楹流血被面帝令小黄門持之使宣叩頭謝主宣不從彊使頓之宣兩手據地終不肯俯主曰文叔為白衣時藏亡匿死吏不敢至門今為天子威不能行一令乎帝笑曰天子不與白衣同因勑彊項令出謝承書曰勑令詣大官賜食宣受詔出飯盡覆杯食机上大官以狀聞上問宣宣對曰臣食不敢遺餘如奉職不敢遺力賜錢三十萬宣悉以班諸吏由是搏撃豪彊莫不震慄京師號為卧虎歌之曰枹鼔不鳴董少平枹撃鼓杖也音孚其字從木也在縣五年年七十四卒於官詔遣使者臨視唯見布被覆屍妻子對哭有大麥數斛敝車一乗謝承書曰有白馬一匹蘭輿一乗也帝傷之曰董宣亷潔死乃知之以宣嘗為二千石賜艾綬𦵏以大夫禮拜子並為郎中後官至齊相諸本此下有説蔡茂事二十五字亦有無者案茂自有傳也樊曄傳樊曄字仲華南陽新野人也與光武少游舊建武初徴為侍御史遷河東都尉引見雲臺初光武微時嘗以事拘於新野曄為市吏餽餌一笥蒼頡篇曰餽饟也説文曰餌餅也笥竹器也帝德之不忘仍賜曄御食及乗輿服物因戲之曰一笥餌得都尉何如曄頓首辭謝及至郡誅討大姓馬適匡等馬適姓也前書有馬適建俗本匡上有王字者誤也盜賊清吏人畏之數年遷揚州牧敎民耕田種樹理家之術視事十餘年坐法左轉軹長軹縣屬河南郡故城在今洛州濟源縣東南也隗囂滅後隴右不安乃拜曄為天水太守政嚴猛好申韓法申不害韓非之法也善惡立斷人有犯其禁者率不生出獄吏人及羌胡畏之道不拾遺行旅至夜聚衣装道傍曰以付樊公涼州為之歌曰游子常苦貧力子天所富勤力之子寧見乳虎穴乳産也猛獸産乳䕶其子則博噬過常故以喻也諸本穴字或作六誤也不入冀府寺冀天水縣也大笑期必死忿怒或見置嗟我樊府君安可再遭値視事十四年卒官永平中顯宗追思曄在天水時政能以為後人莫之及詔賜家錢百萬子融有俊才好黄老不肯為吏李章傳李章字第公河内懐人也五世二千石章習嚴氏春秋宣帝時博士嚴彭祖也經明教授歴州郡吏光武為大司馬平定河北召章置東曹屬數從征伐}
