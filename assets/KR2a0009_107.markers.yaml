  - {type: variant, offset: 22, length: 0, content: '', WYG: 當伏誅戮而主者營私不為國計夫涓流雖寡浸成江河爝火雖微卒能燎野莊子曰日月出矣而爝火不息爝火小火也履霜有漸可不懲革易曰履霜堅氷至其所由來者漸矣宜尋吕産專竊之亂吕産吕太后之兄子封為梁王太后崩與弟祿作亂也永惟王莽簒逆之禍上安社稷之計下解萬夫之惑㑹瓌歸國䊸遷司𨽻校尉六年夏旱車駕}
