  - {type: variant, offset: 46, length: 2, content: 念想, WYG: 畫衣冠異服色而莫之犯白虎通曰畫象者其衣服象五刑也犯墨者蒙巾犯劓者以赭著其衣犯髕者以墨蒙其髕處而畫之犯宫者雜屝犯大辟者布衣無領墨黥面也叔世偷薄左傳曰叔向曰三辟之興皆叔代也叔代}
