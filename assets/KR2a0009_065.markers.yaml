  - {type: variant, offset: 1194, length: 2, content: 猭禽, WYG: 下昔堯作大章一䕫足矣䕫堯樂官也吕氏春秋曰魯哀公問於孔子曰樂正䕫一足矣章和元年正月乃召褒詣嘉徳門令小黄門持班固所上叔孫通漢儀十二篇勑褒曰此制散畧多不合經散畧猶疎畧也今宜依禮條正使可施行於南宫東觀盡心集作褒既受命乃次序禮事依凖舊典雜以五經讖記之文撰次天子至於庻人冠婚吉凶終始制度以為百五十篇寫以二尺四寸簡其年十二月奏上帝以衆論難一故但納之不復令有司平奏㑹帝崩和帝即位褒乃為作章句帝遂以新禮二篇冠擢褒監羽林左騎漢官儀曰羽林左騎秩六百石領羽林屬光禄勲也劉攽曰注羽林左騎案百官志騎當作監永元四年遷射聲校尉後太尉張酺尚書張敏等奏褒擅制漢禮破亂聖術宜加刑誅帝雖寢其奏而漢禮遂不行褒在射聲營舍有停棺不𦵏者百餘所褒親自履行問其意故吏對曰此等多是建武以来絶無後者}
