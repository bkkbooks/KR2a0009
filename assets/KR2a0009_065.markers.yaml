  - {type: variant, offset: 57, length: 0, content: '', WYG: 乃上表曰比年不登人用飢匱今復久旱秋稼未立立成也陽氣垂盡嵗月廹促夫國以民為本民以榖為命政之急務憂之重者也臣蒙恩尤深受職過任夙夜憂懼章奏不能叙心願對中常侍疏奏疏猶條録也即時引見復口陳時政之宜眀日和帝召太尉司徒幸洛陽獄録囚徒收洛陽令陳歆即大雨三日奮在位清白無它異績九年以病罷在家上疏曰聖人所美政道至要本在禮樂五經同歸而禮樂之用尤急孔子曰安上治民莫善於禮移風易俗莫善於樂又曰揖讓而化天下者禮樂之謂也禮記樂記孔子之辭也先王之道禮樂可謂盛矣孔子謂子夏曰禮以脩外樂以制内丘已矣夫禮稽命}
