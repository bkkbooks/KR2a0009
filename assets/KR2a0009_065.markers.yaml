  - {type: variant, offset: 2487, length: 0, content: '', WYG: 人王吉宣帝時人劉攽曰逺圖明懿美案文逺圖下多一明字故知自燕而觀有不盡矣禮記曰孔子之喪有自燕來觀者舍於子夏氏子夏曰聖人之𦵏人與人之𦵏聖人也子何觀焉有不盡矣言未備也孝章永言前王明發興作明發謂發夕至明也詩曰明發不寐専命禮臣撰定國憲洋洋乎盛徳之事焉洋洋美也而業絶天算議黜異端斯道竟復墜矣業絶天算謂章帝晏駕也議黜異端謂張酺等奏褒擅制禮遂不行也夫三王不相襲禮五帝不相沿樂所以咸莖異調中都殊絶咸咸池黄帝樂也莖六莖顓頊樂也見前書異調言古今不同也中都魯邑名也家語曰孔子}
  - {type: page-break, offset: 2487, content: '', id: KR2a0009_WYG_065-14a, image: WYG0252/WYG0252-0787a.png}
  - {type: variant, offset: 2487, length: 0, content: '', krp: 人王吉宣帝時人劉攽曰逺圖明懿美案文逺圖下多一明字故知自燕而觀有不盡矣禮記曰孔子之喪有自燕來觀者舍於子夏氏子夏曰聖人之𦵏人與人之𦵏聖人也子何觀焉有不盡矣言未備也孝章永言前王明發興作明發謂發夕至明也詩曰明發不寐専命禮臣撰定國憲洋洋乎盛徳之事焉洋洋美也而業絶天算議黜異端斯道竟復墜矣業絶天算謂章帝晏駕也議黜異端謂張酺等奏褒擅制禮遂不行也夫三王不相襲禮五帝不相沿樂所以咸莖異調中都殊絶咸咸池黄帝樂也莖六莖顓頊樂也見前書異調言古今不同也中都魯邑名也家語曰孔子}
  - {type: variant, offset: 2488, length: 1, content: 南, WYG: 中都宰制為養生送死之節殊絶猶斷絶也言古樂不同舊禮亦絶也况物運遷囘情數萬化制則不能隨其流變品度未足定其滋章言時代遷移繁省不定也斯固世主所當損益者也且樂非䕫襄而新音代起律謝臯蘇而制令亟易䕫舜樂官襄魯樂官也臯陶虞士官蘇忿生周武王之司㓂也脩補舊文獨何猜焉言刑樂數改而脩禮則疑之禮云禮云曷其然哉歎其不能定也鄭𤣥傳鄭𤣥字康成北海髙密人也八世祖崇哀帝時尚書僕射𤣥少為鄉嗇夫前書曰鄉有嗇夫掌聽訟收賦稅也得休歸常詣學官不樂為吏父數怒之不能禁鄭𤣥别傳曰𤣥年十一二隨母還家正臘㑹同列十數人皆美服盛飾語言閑通𤣥獨漢然如不及母私督數之乃曰此非我志不在所願也遂造太學受業師事京兆第五元先始通京氏易公羊春秋三統歴九章算術三統歴劉歆所撰也九章算術周公作也凡有九篇方田一粟米二差分三少廣四均輸五方程六傍要七盈不足八鉤股九又從東}
