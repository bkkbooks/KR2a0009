  - {type: variant, offset: 26, length: 0, content: '', WYG: 髙祖父安世宣帝時為大司馬衛將軍封富平侯臣賢案張安世昭帝元鳯六年以右將軍宿衛忠謹封富平侯今此言宣帝封誤也宣帝即位但益封萬户耳父放為成帝侍中純少襲爵土哀平間為侍中王莽時至列卿遭值篡偽多亡爵土純以敦謹守約保全前封建武初先來詣闕故得復國五年拜太中大夫使將潁川突騎安集荆徐揚部督委輸督促也委輸轉運也監諸將營後又將兵屯田南陽遷五官中郎將有司奏列侯非宗室不宜復國光武曰張純宿衛十有餘年其勿廢更封武始侯食富平之半武始縣屬魏郡富平縣屬平原郡也純在朝歴世明習故事建武初舊章多闕每有疑議輙以訪純自郊廟婚冠喪紀禮儀多所正定帝甚重之以純兼虎賁中郎將數被引見一日或至數四過三以至於四也純以宗廟未定昭穆失序十九年乃與太僕朱浮共奏言陛下興於匹庶蕩滌天下誅鉏暴亂興繼祖宗竊以經義所紀人事衆心雖實同創革而名為中興宜奉先帝恭承祭祀者也元帝以來宗廟奉祠髙皇帝為受命祖孝文皇帝為太宗孝武皇帝為世宗皆如舊制又立親廟四世推南頓君以上盡於舂陵節侯南頓令欽即光武之父舂陵侯買光武高祖也禮為人後者則為之子既事太宗則降其私親太宗謂元帝也據代相承高祖至元帝八代光武即高祖九代孫以代數相推故繼體元帝故曰既事太宗下又云宣元皇帝尊為祖父又曰自元帝以上祭于洛陽成帝以下祭于長安其義明矣降其私親謂舂陵以下不别序昭穆今禘祫髙廟陳序昭穆而舂陵四世君臣並列以卑厠尊不合禮意設不遭王莽而國嗣無寄推求宗室以陛下繼統者安得復顧私親違禮制乎昔髙帝以自受命不由太上宣帝以孫後祖不敢私親故為父立廟獨羣臣侍祠臣愚謂宜除今親廟以則二帝舊典願下有司博采其議詔下公卿大司徒戴渉大司空竇融議宜以宣元成哀平五帝四世代今親廟宣元皇帝尊為祖父可親奉祠成帝以下有司行事别為南頓君立皇考廟其祭上至舂陵節侯羣臣奉祠以明尊尊之敬親親之恩帝從之是時宗廟未備自元帝以上祭于洛陽高廟成帝以下祠於長安髙廟其南頓四世隨所在而祭焉明年純代朱浮為太僕二十三年代杜林為大司空在位慕曹參之迹務於無為曹參恵帝時代蕭何為相國遵蕭何法無所變更選辟掾史皆知名大儒明年上穿陽渠引洛水為漕上音時丈反陽渠在洛陽城南百姓得其利二十六年詔純曰禘祫之祭不行已久矣三年不為禮禮必壊三年不為樂樂必崩論語載宰我之言也宜據經典詳為其制純奏曰禮三年一祫五年一禘春秋傳曰大祫者何合祭也毁廟及未毁廟之主皆登合食乎太祖五年而再殷周禮三年一祫五年一祫又公羊傳曰大祫者何合祭也合祭奈何毁廟主陳于太祖未毁主皆升合食于太祖五年而再殷祭注云殷盛也謂三年祫五年禘也漢舊制三年一祫毁廟主合食髙廟存廟主未嘗合祭元始五年諸王公列侯廟㑹始為禘祭臣賢案平帝元始五年春祫祭明堂諸侯王列侯宗室助祭賜爵金帛今純及司馬彪書並云禘祭盖禘祫俱是大祭名可通也又前十八年親幸長安亦行此禮續漢書曰十八年上幸長安詔太常行禘禮於髙廟序昭穆父為昭南向子為穆北向禮説三年一閏天氣小備五年再閏天氣大備故三年一祫五年一禘禘之為言諦諦定昭穆尊卑之義也禘祭以夏四月夏者陽氣在上隂氣在下四月乾卦用事故言陽氣在上也故正尊卑之義也祫祭以冬十月冬者五榖成熟物備禮成故合聚飲食也斯典之廢於兹八年自十八年至此謂可如禮施行以時定議帝從之自是禘祫遂定時南單于及烏桓來降邊境無事百姓新去兵革嵗仍有年家給人足仍頻也純以聖王之建辟雍所以崇尊禮義既富而敎者也論語曰子適衛冉有僕子曰庶矣哉冉有曰既庶矣又何加焉曰富之既富矣又何加焉曰教之也乃案七經讖明堂圖讖騐也觧見光武紀七經謂詩書禮樂易春秋及論語也河間古辟雍記孝武太山明堂制度武帝時河間獻王徳獻雅樂對三雍宫有其書記也又武帝封太山濟南人公玉帶上黄帝時明堂圖明堂中有一殿四面無壁以茅盖水環宫垣為複道上有樓及平帝時議平帝時起明堂徵天下通一蓺以上皆議於公車也欲具奏之未及上㑹博士桓榮上言宜立辟雍明堂章下三公太常而純議同榮帝乃許之三十年純奏上宜封禪曰自古受命而帝治世之隆必有封禪以告成功焉禮記曰因名山升中于天鄭𤣥注曰謂廵狩至於方嶽燔柴祭天告以諸侯之成功也樂動聲儀曰以雅治人風成於頌動聲儀樂緯篇名也有周之盛成康之間郊配封禪皆可見也書曰嵗二月東廵狩至于岱宗柴則封禪之義也臣伏見陛下受中興之命平海内之亂脩復祖宗撫存萬姓天下曠然咸䝉更生恩徳雲行恵澤雨施易曰雲行雨施品物流形黎元安寧夷狄慕義詩云受天之祜四方來賀下武之詩也鄭𤣥注云言武王受此萬年之壽輔佐之臣亦宜䝉餘福也今攝提之嵗蒼龍甲寅徳在東宫爾雅曰太嵗在寅曰攝提格建武三十年太嵗在甲寅時嵗徳在東宫前書音義曰蒼龍太嵗也宜及嘉時遵唐帝之典繼孝武之業以二月東廵狩封于岱宗明中興勒功勲復祖統報天神禪梁父祀地祗傳祚子孫萬世之基也中元元年帝乃東廵岱宗以純視御史大夫從視比也幷上元封舊儀及刻石文武帝元封元年封禪儀令侍中皮弁搢紳射牛行事封廣丈二髙九尺有玉牒書書祕其事皆禁禪肅然天子親拜衣上黃江淮間一茅三脊為神藉五色土雜封縱逺方奇獸飛禽之屬也三月薨諡曰節侯子奮嗣奮字穉通父純臨終勑家丞曰司空無功於時猥䝉爵土身死之後勿議傳國東觀記曰家丞名歙奮兄根少被病光武詔奮嗣爵奮稱純遺勑固不肯受帝以奮違詔勑收下獄奮惶怖乃襲封永平四年隨例歸國奮少好學節儉行義常分損租奉奉音扶用反贍䘏宗親雖至傾匱而施與不怠十年儋耳降附儋耳郡武帝置故城即今儋州義倫縣也奮來朝上壽引見宣平殿應對合㫖顯宗異其才以為侍祠侯名臣子孫侍祠封侯解見鄧禹傳建初元年拜左中郎將轉五官中郎將遷長水校尉七年為}
