  - {type: variant, offset: 2683, length: 0, content: '', WYG: 書以青龍為天神之貴青龍即太嵗異名王莽銅權銘嵗在大梁龍集戊辰者以嵗為嵗星龍為太嵗也魏文昌殿鐘簴銘嵗在丙申龍次大火則是以嵗為太嵗龍為嵗星與前説相反然義得兩通至純傳所云按是年太嵗在寅故言攝提之嵗然又云蒼龍甲寅則是龍與嵗疊指太嵗而言駁矣德在東宫刋誤補遺曰此以嵗在寅與甲相值甲位在東方故也王莽傳亦云蒼龍癸酉徳在中宫經云癸徳在中宫按杜欽言戊土中宫之部今癸北宫而云中宫者以癸為戊妃耳此與純傳小異莽傳又云今年刑在東方是嵗壬申申刑寅故也張純}
