  - {type: variant, offset: 1227, length: 967, content: 徒睽孤刲刺裸裎袒裼冒柘槎棘枳窮浚谷底幽嶰暴斥虎搏狂兕獄熊抾封狶或輕訬趬悍廋疏嶁領犯歷嵩巒陵喬松履脩樠踔攳枝杪標端尾蒼蜼掎玄猨木產盡寓屬單罕罔合部弋同曲類行並驅星布麗屬曹伍相保各有分局矰碆飛流纖羅絡縸遊雉羣驚晨鳧輩作翬然雲起霅爾雹落潢導鬼區徑神場詔靈保召方相驅厲疫走蜮祥捎罔兩拂游光枷天狗緤墳羊然後緩節舒容裴回安步降集波川衡澤虞矢魚陳罟茲飛宿沙田開古蠱翬終葵揚關斧刊重冰撥蟄戶測潛鱗踵介旅逆獵湍瀨渀薄汾橈淪滅潭淵左挈夔龍右提蛟鼉春獻王鮪夏薦鼈黿於是流覽徧照殫變極態上下究竟山谷蕭條原野嵺愀上無飛鳥下無走獸虞人植旍獵者効具車弊田罷旋入禁囿棲乎昭明之觀休息乎高光之榭以臨乎宏池鎮以瑤臺純以金堤樹以蒱柳被以綠莎瀇瀁沆漭錯紾槃委天地虹洞固無端涯大明生東月朔西陂乃命壺涿驅水蠱逐罔螭滅短狐簎鯨鯢然後方餘皇連舼舟張雲帆施蜺幬靡颸風陵迅流發櫂歌縱水謳淫魚出蓍蔡浮湘靈下漢女游水禽鴻鵠鴛鴦鷗鷖鶬鴰鸕鷁鷺鴈鷿乃安斯寢戢翮其涯魴鱮鱏鯿鰋鯉鱨魦樂我純德騰踊相隨雖靈沼之白鳥孟津之躍魚方斯蔑矣然猶詠歌於伶蕭載陳於方策豈不哀哉師疊伍伯校千重山罍常滿房俎無空酒正案隊膳夫巡行清醪車湊燔炙騎將鼓駭舉爵鍾鳴既觴若乃陽阿衰斐之晉制闡鼃華羽之南音所以洞蕩匈臆發明耳目疏越蘊慉駭恫底伏鍠鍠鎗鎗奏于農郊大路之衢與百姓樂之是以明德曜乎中夏威靈暢乎四荒東鄰浮巨海而入享西旅越葱領而來王南徼因九譯而致貢朔狄屬象胥而來同蓋安不忘危治不忘亂道在乎茲斯固帝王之所以曜神武而折遐衝者也不覩日月之光聾昏不聞雷霆之震于今十二年為日久矣亦方將刊禁臺之秘藏發天府之官常由質要之故業率典刑之舊章采清原嘉岐陽登俊桀命賢良舉淹滯拔幽荒察淫侈之華譽顧介特之實功聘畎畝之羣雅宗重淵之潛龍乃儲精山藪歷思河澤目鼎俎耳聽康衢營傅說於胥靡求伊尹於庖廚索膠鬲於魚鹽聽宀心戚於大車俾之昌言而宏議軼越三家馳騁五帝悉覽休祥總括羣瑞遂棲鳳皇於高梧宿麒麟於西園納僬僥之珍羽受王母之白環永逍搖乎宇內與二儀乎無疆貳造化於后土參神施於昊乾超特達而無儔煥巍巍而無原豐千億之子孫歷萬載而永延禮樂既闋北轅反斾至自新城背伊闕反洛京頌奏忤鄧氏滯於東觀十年不得調因兄子喪自劾歸太后聞之怒謂融羞薄詔除欲仕州郡遂令禁錮之太后崩安帝親政召還郎署復在講部出為河閒王廏長史時車駕東巡岱宗融上東巡頌帝奇其文召拜郎中及北鄉侯即位融移病去為郡功曹陽嘉二年詔舉敦樸, WYG: 遷}
