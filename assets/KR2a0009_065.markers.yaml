  - {type: variant, offset: 2562, length: 0, content: '', krp: 事扶風馬融融門徒四百餘人升堂進者五十餘生融素驕貴𤣥在門下三年不得見乃使髙業弟子傳受於𤣥𤣥日夜尋誦未嘗怠倦㑹融集諸生考論圖緯聞𤣥善算乃召見於樓上𤣥因從質諸疑義問畢辭歸融喟然謂門人曰鄭生今去吾道東矣前書曰田何授易於丁寛學成寛東歸何謂門人曰易東矣𤣥自逰學十餘年乃歸鄉里家貧客耕東莱學徒相隨已數百千人及黨事起乃與同郡孫嵩等四十餘人俱被禁錮嵩字賔實見趙岐傳遂隱脩經業杜門不出時任城何休好公羊學遂著公羊墨守言公羊義理深逺不可駮難如墨翟之守城也左氏膏肓說文曰肓隔也心下為膏喻左氏之疾不可為也榖梁廢疾𤣥乃發墨守鍼膏肓起廢疾休見而歎曰康成入吾室操吾矛以伐我乎初中興之後范升陳元李育賈逵之徒争論古今學後馬融答北地太守劉瓌及𤣥答何休義據通深由是古學遂明靈帝末黨禁觧大將軍何進聞而辟之州郡以進權戚不敢違意遂廹脅𤣥不得已而詣之進為設几杖禮待甚優𤣥不受朝服而以幅巾見一宿逃去時年六十弟子河内趙商等自逺方至者數千後將軍袁隗表為侍中以父喪不行國相孔融深敬於𤣥屣履造門屣謂納履未正曵之而行言趨賢急也告髙密縣為𤣥特立一鄉曰昔齊置士鄉管仲相桓公制國為二十一鄉工商鄉六士鄉十五以居工商士也事見國語也越有君子軍皆異賢之意也吳越相攻越王勾踐乃中分其師為左右軍以其私卒君子六千人為中軍注云君子王所親近有至行者見國語鄭君好學實懐明徳昔太史公廷尉吳公謁者僕射鄧公皆漢之名臣又南山四皓有園公夏黄公潜光隱耀世加其髙皆悉稱公吳公文帝時為河南守鄧公景帝時為謁者僕射太史公司馬談武帝時四皓髙帝時也有園公夏黄公角里先生綺里季也鬚眉皓白故言皓秦時隐於商雒南山以待天下之定漢興迎而致之也然則公者仁徳之正號不必三事大夫也今鄭君鄉宜曰鄭公鄉昔東海于公僅有一節猶或戒鄉人侈其門閭一節謂決獄也昭帝時東海于公為縣獄吏決獄平郡為生立祠號曰于公祠先是于公閭門壊父老方共脩之于公曰少髙大其門令容駟馬車我決獄多隂徳子孫必有興者也矧乃鄭公之徳而無駟牡之路可廣開門衢令容髙車號為通徳門董卓遷都長安公卿舉𤣥為趙相道斷不至趙王䖍之相也㑹黄巾㓂青部乃避地徐州徐州牧陶謙接以師友之禮建安元年自徐州還髙密道遇黄巾賊數萬人見𤣥皆拜相約不敢入縣境𤣥後嘗疾篤自慮以書戒子益恩曰吾家舊貧不為父母昆弟所容去厮役之吏厮賤也㳺學周秦之都往来幽并兗豫之域獲覲乎在位通人處逸大儒得意者咸從捧手有所授焉處逸謂處士隐逸之大儒遂博稽六蓺粗覽傳記時覩秘書緯術之奥年過四十乃歸供養假田播殖以娯朝夕遇閹尹擅勢坐黨禁錮十有四年而䝉赦令舉賢良方正有道辟大將軍三司府公車再召比牒併名早為宰相比牒猶連牒也併名謂齊名也言連牒齊名被召者並為宰相也併音歩鼎反惟彼數公懿徳大雅克堪王臣故宜式序式用也序列也吾自忖度無任於此但念述先聖之元意思整百家之不齊亦庶㡬以竭吾才故聞命㒺從而黄巾為害萍浮南北復歸邦鄉入此嵗来已七十矣宿素衰落仍有失誤案之禮典便合傳家傳家謂家事傳子孫也曲禮曰七十老而傳今我告爾以老歸爾以事將閑居以安性覃思以終業自非拜國君之命問族親之憂展敬墳墓觀省野物胡嘗扶杖出門乎家事大小汝一承之咨爾煢煢一夫曾無同生相依其朂求君子之道研讃勿替劉攽曰案文讃當作鑚敬慎威儀以近有徳詩大雅民勞篇之言也顯譽成於僚友徳行立於已志若致聲稱亦有榮於所生可不深念邪可不深念邪吾雖無紱冕之緒頗有讓爵之髙謂頻被辟不就也自樂以論賛之功庶不遺後人之羞末所憤憤者徒以亡親墳壟未成所好羣書率皆腐敝不得於禮堂寫定傳與其人其人謂好學者也前書司馬遷曰僕誠已著此書傳之其人也日西方暮其可圖乎家今差多於昔勤力務時無恤飢寒菲飲食薄衣服節夫二者尚令吾寡恨若忽忘不識亦已焉哉時大將軍袁紹總兵冀州遣使要𤣥大㑹賓客𤣥最後至乃延升上坐身長八尺飲酒一斛秀眉明目容儀温偉紹客多豪俊並有才說見𤣥儒者未以通人許之競設異端百家互起𤣥依方辯對咸出問表皆得所未聞莫不嗟服時汝南應劭亦歸於紹因自賛曰故太山太守應中逺北靣稱弟子何如𤣥笑曰仲尼之門考以四科四科謂徳行言語政事文學顔淵閔子騫及子㳺子夏並見論語也囘賜之徒不稱官閥劭有慙色紹乃舉𤣥茂才表為左中郎將皆不就公車徴為大司農給安車一乘所過長吏送迎𤣥乃以病自乞還家五年春夢孔子告之曰起起今年嵗在辰来年嵗在已北齊劉畫髙才不遇傳論𤣥曰辰為龍已為蛇嵗至龍蛇賢人嗟𤣥以讖合之盖謂此也既寤以讖合之知命當終有頃寢疾時袁紹與曹操相拒於官渡官渡津名也在今鄭州中牟縣北前書音義曰於滎陽下引河東南為洪溝北通宋鄭淮泗即今官渡令其子譚遣使逼𤣥隨軍不得已載病到元城縣疾篤不進其年六月卒年七十四遺令薄𦵏自郡守以下嘗受業者縗絰赴㑹千餘人門生相與撰𤣥答諸弟子問五經依論語作鄭志八篇凡𤣥所注周易尚書毛詩儀禮禮記論語孝經尚書大傳中候乾象歴又著天文七政論魯禮禘祫義六蓺論毛詩譜駮許慎五經異義答臨孝存周禮難凡百餘萬言案謝承書載𤣥所注與此畧同不言注孝經唯此書獨有也𤣥質於辭訓通人頗譏其繁至於經傳洽孰稱為純儒齊魯間宗之其門人山陽郗慮至御史大夫東莱王基清河崔琰著名於世又樂安國淵任嘏慮字鴻豫基字伯興魏鎭南將軍安樂鄉侯琰字季珪魏東西曹掾遷中尉淵字子尼魏司空掾遷太僕嘏字昭光魏黄門侍郎也劉攽曰注魏東西曹掾案崔琰但作東曹掾多一西字時並童幼𤣥稱淵為國器嘏有道徳其餘亦多所鑒拔皆如其言𤣥唯有一子益恩孔融在}
  - {type: variant, offset: 2564, length: 0, content: '', WYG: 舉為孝廉及融為黄巾所圍益恩赴難隕身有遺腹子𤣥以其手文似已名之曰小同魏氏春秋曰小同髙貴鄉公時為侍中嘗詣司馬文王文王有密疏未之屏也如厠還問之曰卿見吾疏乎答曰我不見文王曰寜我負卿無卿負我遂酖之論曰自秦焚六經聖文埃滅埃塵也漢興諸儒頗脩蓺文及東京學者亦各名家而守文之徒滯固所禀禀受滯固猶固執也言學者各守所見不疏通也異端紛紜互相詭激遂令經有數家家有數說章句多者或乃百餘萬言學徒勞而少功後生疑而莫正}
