  - {type: variant, offset: 2707, length: 174, content: 一篇初融懲於鄧氏不敢復違忤埶家遂為梁冀草奏李固又作大將軍西第頌以此頗為正直所羞年八十八延熹九年卒于家遺令薄葬族孫日磾獻帝時位至太傅論曰馬融辭命鄧氏逡巡隴漢之閒將有意於居貞乎既而羞曲士之節惜不貲之軀終以奢樂恣性黨附成譏固知識能匡欲者鮮矣夫事苦則矜全之情薄生厚故安存之慮深登高不懼者胥靡之人也坐不垂堂者千金之子也原其大略歸於所安而已矣物我異觀亦更相笑也, WYG: 五考證}
