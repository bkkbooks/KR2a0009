  - {type: variant, offset: 2684, length: 8, content: 離騷所著賦頌碑誄, WYG: 奮官至津城門候舊本皆作建城門臣㑹汾按百官志洛陽十二門其一津門每門候一人秩六百石屬城門校尉以其當洛水浮橋故稱津城門也宜從監本曹襃傳大漢當自制禮監本脱去當字從宋本增慕叔孫通漢禮儀監本叔孫通下有為字從宋本去且三五歩驟優劣殊軌注時事彌順順字疑煩之誤又事字舊本作士鄭元傳三統歴九章算術注九章算術周公作也臣宗萬按魏劉徽九章算經序云周公制禮有九數九章是矣不云周公作算術也算術起於商髙見周髀宜曰鄭公鄉宜字監本誤作且今照宋本改六蓺論臣世駿按公羊疏曰鄭公先作六蓺論訖然後注}
