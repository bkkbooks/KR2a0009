  - {type: variant, offset: 1099, length: 4, content: 籠光列宿, krp: 末由也已每見圖書中心恧焉褒知帝旨欲有興作乃上疏曰昔者聖人受命而王莫不制禮作樂以著功徳功成作樂化定制禮所以救世俗致禎祥}
