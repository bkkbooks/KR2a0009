  - {type: variant, offset: 1104, length: 0, content: '', WYG: 萬姓獲福於皇天者也今皇天降祉嘉瑞並臻制作}
  - {type: variant, offset: 1104, length: 0, content: '', krp: 萬姓獲福於皇天者也今皇天降祉嘉瑞並臻制作}
  - {type: variant, offset: 1105, length: 11, content: 翳昧僄狡課才勁勇程氣狗, WYG: 符甚於言語言明白也宜定文制著成漢禮丕顯祖宗盛徳之美章下太常太常巢堪以為一世大典非褒所定不可許帝知羣寮拘攣難與圖始拘攣猶拘束也前書鄒陽曰能越拘攣之語也朝廷禮憲宜時刋立明年復下詔曰朕以不徳膺祖宗𢎞烈乃者鸞鳯仍集麟龍並臻甘露宵降嘉榖滋生赤草之類紀于史官赤草即朱草也大戴禮曰朱草日生一葉至十五日十六日落一葉周而復始也朕夙夜祗畏上無以彰于先功下無以克稱靈物漢遭秦餘禮壊樂崩且因循故事未可觀省有知其説者各盡所能褒省詔乃歎息謂諸生曰昔奚斯頌魯韓詩曰新廟奕奕奚斯所作薛君傳云是詩公子奚斯所作也考甫詠殷正考甫孔子之先也作商頌十二篇夫人臣依義顯君竭忠彰主行之美也當仁不讓吾何辭哉遂復上疏具陳禮樂之本制改之意拜褒侍中從駕南廵既還以事下三公未及奏詔召𤣥武司}
  - {type: page-break, offset: 1105, content: '', id: KR2a0009_WYG_065-11b, image: WYG0252/WYG0252-0785d.png}
