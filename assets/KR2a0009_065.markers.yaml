  - {type: variant, offset: 486, length: 6, content: 頗有蝗蟲今年, WYG: 書璇璣鈐曰述堯理世平制禮樂放唐之文緯本文云使帝王受命用吾道述堯理代平制禮放唐之文化洽作樂名斯在宋均注云述脩也予末小子託于數終曷以纉興崇𢎞祖宗仁濟元元帝命騐曰順堯考徳題期立象宋均注曰堯廵省于河洛得龜龍之圖書舜受禪後習堯禮得之演以為考河命題}
