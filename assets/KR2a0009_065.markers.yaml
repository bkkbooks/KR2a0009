  - {type: variant, offset: 753, length: 342, content: 穹槃回嵎峗錯崔神泉側出丹水涅池怪石浮磬燿焜于其陂其土毛則搉牧薦草芳茹甘荼茈萁芸蒩昌本深蒱芝荋菫荁蘘荷芋渠桂荏鳧葵格韮菹于其植物則玄林包竹藩陵蔽京珍林嘉樹建木叢生椿梧栝柏柜柳楓楊豐彤對蔚崟槮爽翕習春風含津吐榮鋪于布蓶扈蘳熒惡可殫形揫斂九藪之動物繯橐四野之飛征鳩之乎茲囿之中山敦雲移羣鳴膠膠鄙騃譟讙子野聽聳離朱目眩隸首策亂陳子籌昏於時營圍恢廓充斥川谷罦罝羅羉彌綸阬澤皐牢陵山校隊案部前後有屯甲乙相伍戊己為堅脩橦曳長庚之飛髾載日月之太常棲招搖與玄弋注枉矢於天狼羽毛紛其髟鼬揚金而扡玉瓖屯田車於平原播同徒於高岡旃旝摻其如林錯五色以摛光清氛埃埽野場誓六師搜儁良司徒勒卒司馬平行車攻馬同教達戒通伐咎鼓撞華鍾獵徒縱赴榛叢徽嫿霍奕別騖分奔騷擾聿皇往來交舛紛紛回回南北東西風行雲轉匈隱訇黃塵勃滃闇若霧昏, WYG: 道備}
