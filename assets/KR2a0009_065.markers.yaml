  - {type: variant, offset: 484, length: 1, content: 雖, WYG: 公臣注云此人但居惡人之中使犯法耳今承㫖而殺之是逆天心順府意也其罰重矣如得全此人命而身坐之吾所願也遂不為殺嚴奏褒耎弱免官歸郡為功曹徵拜博士㑹肅宗欲制定禮樂元和二年下詔曰河圖稱赤九㑹昌十世以光十一以興九謂光武十謂明帝十一謂章帝也}
