  - {type: variant, offset: 480, length: 2, content: 臣愚, WYG: 當洛水浮橋漢官儀曰候一人秩六百石也甫卒子吉嗣永初三年吉卒無子國除自昭帝封安世至吉傳國八世張安世字子孺昭帝時為右將軍始封富平侯卒子延夀嗣卒子勃嗣卒子臨嗣卒子放嗣卒子純嗣建武初改封武始侯卒子奮嗣卒子甫嗣卒子吉嗣無子國除此言八代者除安世始封也經歴簒亂二百年間簒亂謂王莽也張子孺昭帝元鳯六年封至永初三年合一百八十二年故曰間也未嘗譴黜封者莫與為比曹褒傳曹襃字叔通魯國薛人也父充持慶氏禮前書沛人慶普字孝公為東平太傅受禮於后倉號慶氏禮也建武中為博士從廵狩岱宗定封禪禮還受詔議立七郊三雍大射養老禮儀五帝及天地為七郊三雍以下觧見明帝紀顯宗即位充上言漢再受命仍有封禪之事而禮樂崩闕不可為後嗣法五帝不相沿樂三王不相襲禮禮記正文也言損益不同也大漢當自制禮以示百世帝問制禮樂云何充對曰河圖括地象曰有漢世禮樂文雅出尚書璇璣鈐曰有帝漢出徳洽作樂名予帝善之下詔曰今且改太樂官曰太予樂歌詩曲操以俟君子操猶曲也劉向别録曰君子因雅琴之適故從容以致思焉其道閉塞悲愁而作者名其曲曰操言遇灾害不失其操也拜充侍中作章句辯難於是遂有慶氏學襃少篤志有大度結髮傳充業博雅疎通尤好禮士常憾朝廷制度未備慕叔孫通漢禮儀晝夜硏精沈吟専思寢則懐抱筆札行則誦習文書當其念至忘所之適初舉孝廉再遷圉令圉縣屬陳留故城在今汴州雍丘縣南也以禮理人以徳化俗時它郡盗徒五人来入圉界吏捕得之陳留太守馬嚴聞而疾惡風縣殺之褒勑吏曰夫絶人命者天亦絶之臯陶不為盗制死刑管仲遇盗而升諸公禮雜記云孔子曰管仲遇盗取二人焉上}
