  - {type: variant, offset: 1939, length: 3, content: 令司隸, WYG: 薦扶徵拜侍中甚見器重扶私謂太常劉焉曰京師將亂益州分野有天子氣焉信之遂求為益州牧扶亦為蜀郡屬國都尉相與入蜀去後一歲帝崩天下大亂乃去官還家年八十二卒後劉備稱天子於蜀皆如扶言蜀丞相諸葛亮問廣漢秦宓董扶及任安所長宓曰董扶襃秋毫之善貶纖芥之惡任安記人之善忘人之過云蜀志曰宓字子勅廣漢綿竹人也少有才學州郡辟命稱疾不往或謂宓曰足下欲自比巢許四皓何故揚文藻見瓌穎乎密答曰僕文不能盡言言不能盡意何文藻之有揚乎虎生而文炳鳳生而五色豈以采自飾畫哉性自然也先主旣定益州廣漢太守夏纂請宓為師友祭酒領五官掾稱曰仲父宓稱疾卧在第舍尋拜左中郎將長水}
