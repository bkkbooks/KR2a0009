  - {type: variant, offset: 2586, length: 293, content: 年十月辛卯有星孛于鶉尾荊州分也時荊州牧劉表據荊州時益州從事周羣以為荊州牧將死而失土明年秋表卒以小子琮自代曹公將伐荊州琮懼舉軍詣公降十七年十二月有星孛于五諸侯周羣以為西方專據土地者皆將失土是時益州牧劉璋據益州漢中太守張魯別據漢中韓遂據涼州宋宗建別據枹罕明年冬曹公遣偏將擊涼州十九年獲宋宗建韓遂逃于羌中病死其年秋璋失益州二十年秋曹公攻漢中魯降十八年秋歲星鎮星熒惑俱入太微逆行留守帝坐百餘日占曰歲星入太微人主改二十三年三月孛星晨見東方二十餘日夕出西方犯歷五車東井五諸侯文昌軒轅后妃太微鋒炎指帝坐占曰除舊布新之象也殤帝延平元年九月乙亥隕石陳留四春秋僖公十六年隕石于宋五傳曰隕星也董仲舒以為從高反, WYG: ''}
