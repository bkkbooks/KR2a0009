  - {type: variant, offset: 1939, length: 3, content: 令司隸, krp: 薦扶徵拜侍中甚見器重扶私謂太常劉焉曰京師將亂益州分野有天子氣焉信之遂求為益州牧扶亦為蜀郡屬國都尉相與入蜀去後一歲帝崩天下大亂乃去官還家年八十二卒後劉備稱天子於蜀皆如扶言蜀丞相諸葛亮問廣漢秦宓董扶及任安所長宓曰董扶襃秋毫之善貶纖芥之惡任安記人之善忘人之過云蜀志曰宓字子勅廣漢綿竹人也少有才學州郡辟命稱疾不往或謂宓曰足下欲自比巢許四皓何故揚文藻見瓌穎乎密答曰僕文不能盡言言不能盡意何文藻之有揚乎虎生而文炳鳳生而五色豈以采自飾畫哉性自然也先主旣定益州廣漢太守夏纂請宓為師友祭酒領五官掾稱曰仲父宓稱疾卧在第舍尋拜左中郎將長水}
  - {type: variant, offset: 1944, length: 6, content: 袁紹私募兵千, WYG: 吳使張溫大敬服宓之文辯遷大司農而卒郭玉傳郭玉者廣漢雒人也初有老父不知何出常漁釣於涪水因號涪翁乞食人間見有疾者時下針石輒應時而效乃著針經診脉法傳於世診候也音直刃反弟子程高尋求積年翁乃授之高亦隱跡不仕玉少師事高學方診六徵之技隂陽不測之術和帝時為太醫丞多有效應帝奇之仍試令嬖臣羙手腕者與女子雜處帷中使玉各診一手問所疾苦玉曰左隂右陽脉有男女狀若異人臣疑其故帝歎息稱善玉仁愛不矜雖貧賤厮養必盡其心力而醫療貴人時或不愈帝乃令貴人羸服變處一針卽差召玉詰問其狀對曰醫之為言意也腠理至微腠理皮膚之間也韓子曰扁鵲見齊桓侯曰君有病在腠理也隨氣用巧針石之間毫芒即乖神存於心手之際可得解而不可得言也夫貴者處尊高以臨臣臣懷怖懾以承之其為療也有四難焉自用意而不任臣一難也將身不謹二難也骨節不彊不能使藥三難也好逸惡勞四難也針有分寸時有破漏分寸淺深之度破漏日有衝破者也重以恐懼之心加以裁愼之志臣意且猶不盡何有於病哉此其所為不愈也帝善其對年老卒官華佗傳華佗字元化佗音徒何反沛國譙人也一名旉音孚遊學徐土兼通數經曉養性之術年且百歲而猶有壯容時人以為仙沛相陳珪舉孝廉太尉黄琬辟皆不就精於方藥處齊不過數種齊音才計反心識分銖不假稱量針灸不過數處裁七八九若疾發結於内針藥所不能及者乃令先以酒服麻沸散旣醉無所覺因刳破腹背抽割積聚若在腸胃則斷􅎒湔洗除去疾穢旣而縫合傅以神膏四五日創愈一月之間皆平復佗别傳曰人有見山陽太守廣陵劉景宗說數見華佗見其療病平脉之候其驗若神琅邪劉勲為河内太守有女年幾二十左脚膝裏上有瘡癢而不痛創發數十日愈愈已復發如此七八年迎佗使視佗曰易療之當得稻糠色犬一頭好馬二匹以繩繫犬頸使走馬牽犬馬極輒易計馬走犬三十}
