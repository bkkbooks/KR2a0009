  - {type: variant, offset: 1292, length: 518, content: 建寧元年六月太白在西方入太微犯西蕃南頭星太微天廷也太白行其中宮門當閉大將被甲兵大臣伏誅其八月太傅陳蕃大將軍竇武謀欲盡誅諸宦者其九月辛亥中常侍曹節長樂五官史朱瑀覺之矯制殺蕃武等家屬徙日南比景熹平元年十月熒惑入南斗中占曰熒惑所守為兵亂斗為吳其十一月會稽賊許昭聚衆自稱大將軍昭父生為越王攻破郡縣二年四月有星出文昌入紫宮蛇行有首尾無身赤色有光炤垣牆八月丙寅太白犯心前星辛未白氣如一匹練衝北斗第四星占曰文昌為上將貴相太白犯心前星為大臣後六年司徒劉羣郃為中常侍曹節所譖下獄死白氣衝北斗為大戰明年冬揚州刺史臧旻丹陽太守陳寅攻盜賊苴康斬首數千級光和元年四月癸丑流星犯軒轅第二星東北行入北斗魁中八月彗星出亢北入天巿中長數尺稍長至五六丈赤色經歷十餘宿八十餘日乃消於天菀中流星為貴使軒轅為內宮北斗魁主殺流星從軒轅出抵北斗魁是天子大使將出有伐殺也至中平元年黃巾賊起上遣中郎將皇甫嵩朱儁等征之斬首十餘萬級彗除天巿天帝將徙帝將易都至初平元年獻帝遷都長安三年冬彗星出狼弧東行至于張乃去張為周地彗星犯之為兵亂後四年京都大發兵擊黃巾賊五年四月熒惑在太微中守屏七月彗星出三台下東行入太微至太子幸臣二十餘日而消十月歲星熒惑太白三合於虛相去各五六寸如連珠占曰熒惑在太微為亂臣是, WYG: ''}
