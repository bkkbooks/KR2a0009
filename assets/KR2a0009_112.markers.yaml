  - {type: variant, offset: 1965, length: 0, content: '', krp: 亂後莫知所在漢武内傳曰魯女生長樂人初餌胡麻及术絶穀八十餘年日少壯色如桃花日能行三百里走及麞鹿傳世見之云三百餘年後采藥嵩髙山見一女人曰我三天太上侍官也以五岳眞形與之并告其施行女生道成一旦與知友故人别云入華山去後五十年先相識者逢女生華山廟前乘白鹿從玉女三十人并令謝其鄉里親故人也徐登傳徐登者閩中人也閩中地今泉州也本女子化為丈夫善為巫術又趙炳字公阿東陽人能為越方東陽今婺州也抱朴子曰道士趙炳以氣禁人人不能起禁虎虎伏地低頭閉目便可執縳以大釘釘柱入尺許以氣吹之釘即躍出射去如弩箭之發異苑云趙侯以盆盛水吹氣作禁魚龍立見越方善禁呪也時遭兵亂疾疫大起二人遇於烏傷溪水之上酈元注水經曰吳寧溪出吳寧縣經烏傷謂之烏傷溪在今婺州義烏縣東也遂結言約共以其術療病各相謂曰今旣同志且可各試所能登乃禁溪水水為不流炳復次禁枯樹樹即生荑易曰枯楊生荑王弼注云荑者楊之秀也二人相視而笑共行其道焉登年長炳師事之貴尚清儉禮神唯以東流水為酌削桑皮為脯但行禁架所療皆除禁架即禁術也後登物故炳東入章安縣名屬會稽郡本名回浦光武改為章安故城在今台州臨海縣東南百姓未之知也炳乃故升茅屋梧鼎而爨主人見之驚懅梧支也懅忙也炳笑不應旣而爨熟屋無損異又嘗臨水求度船人不和之和猶許也俗本作知者誤也炳乃張蓋坐其中長嘯呼風亂流而濟於是百姓神服從者如歸章安令惡其惑衆收殺之人為立祠堂於永康至今蚊蚋不能入也炳故祠在今婺州永康縣東俗呼為趙侯祠至今蚊蚋不入祠所江南猶傳趙侯禁法以療疾云費長房傳費長房者汝南人也曾為市掾市中有老翁賣藥懸一壺於肆頭及市罷輒跳入壺中市人莫之見唯長房於樓上覩之異焉因往再拜奉酒脯翁知長房之意其神也謂之曰子明日可更來長房旦日復詣翁翁乃與俱入壺中唯見玉堂嚴麗旨酒甘肴盈衍其中共飲畢而出翁約不聽與人言之後乃就樓上候長房曰我神仙之人以過見責今事畢當去子寧能相隨乎樓下有少酒與卿為别長房}
  - {type: variant, offset: 1966, length: 2, content: 將兵, WYG: 人取之不能勝又令十人扛之猶不舉說文曰兩人對舉為扛音江翁聞笑而下樓以一指提之而上視器如一升許而二人飲之終日不盡長房遂欲求道而顧家人為憂顧念也翁乃斷一青竹度與長房身齊使懸之舍後家人見之即長房形也以為縊死大小驚號遂殯葬之長房立其傍而莫之見也於是遂隨從入深山踐荆棘於羣虎之中留使獨處長房不恐又卧於空室以朽索懸萬斤石於心上衆蛇競來齧索且斷長房亦不移翁還撫之曰子可教也復使食糞糞中有三蟲臭穢特甚長房意惡之翁曰子幾得道恨於此不成如何長房辭歸翁與一竹杖曰騎此任所之則自}
