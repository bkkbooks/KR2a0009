  - {type: variant, offset: 2272, length: 1, content: 矢, krp: 又謂曰旣已得魚恨無蜀中生薑耳放曰亦可得也操恐其近即所取因曰吾前遣人到蜀買錦可過勅使}
  - {type: variant, offset: 2274, length: 2, content: 邪枉, WYG: 増市二端語頃即得薑還幷獲操使報命後操使蜀反劉攽曰後操使蜀反案文少一自字驗問増錦之狀及時日早晚若符契焉後操出近郊士大夫從者百許人慈乃為齎酒一升脯一斤手自斟酌百官莫不醉飽操怪之使尋其故行視諸罏悉亡其酒脯矣罏酒肆也操懷不喜喜音許吏反因坐上欲收殺之慈乃郤入壁中霍然不知所在或見於市者又捕之而市人皆變形與慈同莫知誰是後人逢慈於陽城山頭因復逐之遂入走羊羣劉攽曰案文當作走入操知不可得乃令就羊中告之曰不復相殺本試君術耳忽有一老羝屈前兩膝人立而言曰遽如許言何遽如許為事即競往赴之而羣羊數百皆變為羝並屈前膝人立云遽如許遂莫知所取焉魏文帝典論論郤儉等事曰潁川郤儉能辟穀餌伏苓甘陵甘始名善行氣老而少容廬江左慈知補導之術並為軍吏初儉至之所伏苓賈㬥貴數倍議郎安平李覃學其辟穀食伏苓飲寒水水寒中泄利殆至殞命後始來衆人無不鴟視狼顧呼吸吐納軍祭酒𢎞農董芬為之過差氣閉不通良乆乃蘇左慈到又競受其補導之術至寺人嚴峻往從問受奄豎眞無事於斯術也人之逐聲乃至於是也計子勲傳計子勲者不知何郡縣人皆謂數百歲行來於人間一旦忽言日中當死主人與之葛衣子勲服而正寢至日中果死上成公傳上成公者宓縣}
