  - {type: variant, offset: 2160, length: 0, content: '', WYG: 年顧視見人而去猶駕昔所乘驢車也見者呼之曰薊先生小住並行應之並猶且也音蒲朗反視若遲徐而走馬不及於是而絶劉根傳劉根者潁川人也隱居嵩山中諸好事者自遠而至就根學道太守史祈以根為妖妄乃收執詣郡數之曰汝有何術而誣惑百姓若果有神可顯一驗事不爾立死矣根曰實無它異頗能令人見鬼耳祈曰促召之使太守目覩爾乃為明根於是左顧而嘯有頃祈之亡父祖近親數十人皆反縛在前向根叩頭曰小兒無狀分當萬坐顧而叱祈曰汝為子孫不能有益先人而反累辱亡靈可叩頭為吾陳謝祈驚懼悲哀頓首流血請自甘罪坐根嘿而不應忽然俱去不知所在左慈傳左慈字元放廬江人也少有神道甞在司空曹操坐操從容顧衆賔曰今}
