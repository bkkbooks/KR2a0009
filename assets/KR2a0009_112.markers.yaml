  - {type: variant, offset: 2138, length: 1, content: 靈, WYG: 東海大旱長房至海上見其人請雨乃謂之曰東海君有罪吾前繫於葛陂今方出之使作雨也於是雨立注長房曾與人共行見一書生黄巾被裘無鞍騎馬下而叩頭長房曰還它馬赦汝死罪人問其故長房曰此狸也盜社公馬耳又嘗坐客而使至宛市鮓須臾還乃飯劉攽曰又甞坐客使至宛案至宛市鮓謂長房身也不當作使字當作往字或一日之間人見其在千里之外者數處焉後失其符為衆鬼所殺薊子訓傳薊子訓者不知所由來也建安中客在濟隂宛句今曹州縣句音劬有神異之道甞抱鄰家嬰兒故失手墮地而死其父母驚號怨痛不可忍聞而子訓唯謝以過誤終無它說遂埋藏之後月餘子訓乃抱兒歸焉父母大恐曰死生異路雖思我兒乞不用復見也兒識父母軒渠笑悅欲往就之母不覺攬取乃實兒也雖大喜慶心猶有疑乃竊發視死兒但見衣被方乃信焉於是子訓流名京師士大夫皆承風向慕之後乃駕驢車與諸生俱詣許下道過滎陽止主人舍而所駕之驢忽然卒僵蛆蟲流出主遽白之子訓曰乃爾乎方安坐飯食畢徐出以杖扣之驢應聲奮起行歩如初即復進道其追逐觀者常有千數旣到京師公卿以下候之者坐上恒數百人皆為設酒脯終日不匱後因遁去遂不知所止初去之日唯見白雲騰起從旦至暮如是數十處時或有百歲翁自說童兒時見子訓賣藥於會稽市顔色不異於今後人復於長安東霸城見之與一老翁共摩挲銅人酈元水經注曰魏文}
