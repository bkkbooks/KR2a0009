  - {type: variant, offset: 19, length: 2, content: 隕石, WYG: 族飲食辭訣忽然而終時年八十四家無餘資諸子衰劣如其言云樊英傳樊英字季齊南陽魯陽人也少受業三輔習京氏易兼明五經又善風角算河洛七緯推歩災異七緯者易緯稽覽圖乾鑿度坤靈圖通卦驗是類謀辨終備也書緯璇璣鈐考靈耀刑徳收帝命驗運期授也詩緯推度災記歴樞含神務也禮緯含文嘉稽命徴斗威儀也樂緯動聲儀稽耀嘉叶圖徴也}
