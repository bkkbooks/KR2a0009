  - {type: variant, offset: 1960, length: 3, content: 并州牧, krp: 之使為禽戲普以年老手足不能相及粗以其法語諸醫普今年將九十耳不聾目不㝠牙齒完堅飲食無損亦以除疾兼利蹏足以當導引體有不快起作一禽之戲怡而汗出因以著粉身體輕便而欲食普施行之年九十餘耳目聰明齒牙完堅阿善針術凡醫咸言背及匈藏之間不可妄針針之不可過四分而阿針背入一二寸巨闕匈藏乃五六寸而病皆瘳阿從佗求方可服食益於人者佗授以漆葉青䴴散佗别傳曰青䴴者一名地節一名黄芝主理五藏益精氣本出於迷入山者見仙人服之以告佗佗以為佳語阿阿又秘之近者人見阿之壽而氣力强盛怪之遂責所服食因醉亂誤道之法一施人多服者皆有大驗本字書無䴴字相傳音女廉反然今人無識此者甚可恨惜劉攽曰注本字書案文多一夲字漆葉屑一斗青䴴十四兩以是為率言乆服去三蟲利五藏輕體使人頭不白阿從其言壽百餘歲漆葉處所而有青䴴生於豐沛彭城及朝歌間漢世異術之士甚衆雖云不經而亦有不可誣故簡其美者列于傳末冷壽光唐虞魯女生三人者皆與華佗同時壽光年可百五六十歲行容成公御婦人法列仙傳曰容成公者能善補導之事取精於𤣥牝其要谷神不死守生養氣者也髮白復黑齒落復生御婦人之術謂握固不瀉還精補腦也常屈頸鷮息鷮音居妖反毛詩曰有集唯鷮毛萇注曰鷮雉也山海經曰女几之山多白鷮郭璞曰似雉長尾走且鳴也鬚髮盡白而色理如三四十時死於江陵唐虞道赤眉張步家居里落若與相及死於鄉里不其縣魯女生數說顯宗時事甚明了議者疑其時人也}
  - {type: variant, offset: 1965, length: 0, content: '', WYG: 亂後莫知所在漢武内傳曰魯女生長樂人初餌胡麻及术絶穀八十餘年日少壯色如桃花日能行三百里走及麞鹿傳世見之云三百餘年後采藥嵩髙山見一女人曰我三天太上侍官也以五岳眞形與之并告其施行女生道成一旦與知友故人别云入華山去後五十年先相識者逢女生華山廟前乘白鹿從玉女三十人并令謝其鄉里親故人也徐登傳徐登者閩中人也閩中地今泉州也本女子化為丈夫善為巫術又趙炳字公阿東陽人能為越方東陽今婺州也抱朴子曰道士趙炳以氣禁人人不能起禁虎虎伏地低頭閉目便可執縳以大釘釘柱入尺許以氣吹之釘即躍出射去如弩箭之發異苑云趙侯以盆盛水吹氣作禁魚龍立見越方善禁呪也時遭兵亂疾疫大起二人遇於烏傷溪水之上酈元注水經曰吳寧溪出吳寧縣經烏傷謂之烏傷溪在今婺州義烏縣東也遂結言約共以其術療病各相謂曰今旣同志且可各試所能登乃禁溪水水為不流炳復次禁枯樹樹即生荑易曰枯楊生荑王弼注云荑者楊之秀也二人相視而笑共行其道焉登年長炳師事之貴尚清儉禮神唯以東流水為酌削桑皮為脯但行禁架所療皆除禁架即禁術也後登物故炳東入章安縣名屬會稽郡本名回浦光武改為章安故城在今台州臨海縣東南百姓未之知也炳乃故升茅屋梧鼎而爨主人見之驚懅梧支也懅忙也炳笑不應旣而爨熟屋無損異又嘗臨水求度船人不和之和猶許也俗本作知者誤也炳乃張蓋坐其中長嘯呼風亂流而濟於是百姓神服從者如歸章安令惡其惑衆收殺之人為立祠堂於永康至今蚊蚋不能入也炳故祠在今婺州永康縣東俗呼為趙侯祠至今蚊蚋不入祠所江南猶傳趙侯禁法以療疾云費長房傳費長房者汝南人也曾為市掾市中有老翁賣藥懸一壺於肆頭及市罷輒跳入壺中市人莫之見唯長房於樓上覩之異焉因往再拜奉酒脯翁知長房之意其神也謂之曰子明日可更來長房旦日復詣翁翁乃與俱入壺中唯見玉堂嚴麗旨酒甘肴盈衍其中共飲畢而出翁約不聽與人言之後乃就樓上候長房曰我神仙之人以過見責今事畢當去子寧能相隨乎樓下有少酒與卿為别長房}
