  - {type: variant, offset: 7, length: 0, content: '', WYG: 上宋宣城太守范煜撰唐章懐太子賢注方術列傳第七十二上仲尼稱易有君子之道四焉曰卜筮者尚其占易繫辭曰以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占占也者先王所以定禍福決嫌疑幽贊於神明遂知來物者也易說卦曰聖人之作易也幽贊於神明而生蓍繫辭曰無有逺近幽深遂知來物若夫隂陽推歩之學往往見於墳記矣左傳曰履端於始舉正於中歸餘於終尚書曰歴象日月星辰也然神經怪牒玉策金繩闗扄於明靈之府封縢於瑶壇之上者靡得而闚也至乃河洛之文龜龍之圖尚書中候曰堯沈璧於洛𤣥龜負書背中赤文朱字止壇舜禮壇於河畔沈璧禮畢至于下昊黄龍負卷舒圖出水壇畔箕子之術箕子説洪範五行隂陽之術也師曠之書占災異之書也今書七志有師曠六篇緯候之部緯七經緯也候尚書中候也鈐決之符兵法有玉鈐篇及𤣥女六韜要決曰太公對武王曰主將有隂符有大勝得敵之符符長一尺有破軍禽敵之符符長九寸有降城得邑之符符長八寸有却敵執逺之符符長七寸有交兵驚中堅守之符符長六寸有請糧食益兵之符符長五寸有敗軍亡將之符符長四寸有失亡吏卒之符符長三寸諸奉使行符稽留若符事聞聞符所告者皆誅皆所以探抽㝠賾參驗人區時有可聞者焉按爾雅曰賾深也區域也其流又有風角遁甲七政元氣六日七分逢占日者挺專須臾孤虛之術風角六日七分解並見郎顗傳遁甲推六甲之隂而隱遁也今書七志有遁甲經七政日月五星之政也元氣者謂開闢隂陽之書也河圗曰元氣闓陽為天前書班固曰東方朔之逢占覆射音義云逢人所問而占之也日者卜筮掌日之術也史記司馬季主為日者挺專折竹卜也楚辭曰索瓊茅以筳專注云筳八叚竹也楚人名結草折竹曰專筳音大寧反須臾隂陽吉凶立成之法也今書七志有武王須臾一卷孤虛者孤謂六甲之孤辰若甲子旬中戌亥無干是為孤也對孤為虛前書藝文志有風后孤虛二十卷及望雲省氣推處祥妖時亦有以效於事也望雲解見明帝紀省氣者觀城郭人畜氣以占之也而斯道隱逺𤣥奥難原故聖人不語怪神罕言性命論語曰子不語怪力亂神又曰子罕言利與命與仁或開末而抑其端論語曰孔子有疾子路請禱子曰丘之禱久矣鄭𤣥注云明素恭肅於鬼神且順子路之言也或曲辭以章其義易曰探賾索隱鈎深致逺定天下之吉凶成天下之亹亹者莫大於蓍龜也所謂民可使由之不可使知之論語孔子之言鄭𤣥注云由從也言王者設教務使人從之若皆知其本末則愚者或輕而不行漢自武帝頗好方術天下懐協道藝之士莫不負策抵掌順風而届焉前書武帝時李少君欒大等並以方術見少君拜文成將軍欒大拜五利將軍貴震天下而海上燕齊之士莫不搤腕而自言有禁方矣抵側擊也後王莽矯用符命及光武尤信讖言士之赴趣時宜者皆馳騁穿鑿争談之也故王梁孫咸名應圖籙越登槐鼎之任光武以赤伏符文拜梁為大司空又以讖文拜孫咸為大司馬見景丹傳鄭興賈逵以附同稱顯桓譚尹敏以乖忤淪敗各見本傳自是習為内學尚竒文貴異數不乏於時矣内學謂圖讖之書也其事秘宻故稱内是以通儒碩生忿其姦妄不經奏議慷慨以為宜見藏擯謂桓譚賈逵張衡之流也各見本傳子長亦云觀隂陽之書使人拘而多忌盖為此也司馬遷字子長其父太史公論六家之要曰觀隂陽之術太詳而衆忌使人拘而多畏見史記也夫物之所偏不能無蔽雖云大道其硋或同硋五愛反若乃詩之失愚書之失誣然則術數之失至於詭俗乎如令溫柔敦厚而不愚斯深於詩者也疎通知逺而不誣斯深於書者也禮記曰其為人也溫柔敦厚詩教也疎通知逺書教也詩之失愚書之失誣鄭𤣥注詩敦厚近愚書知逺近誣也極數知變而不詭俗斯深於數術者也易曰極數知來之謂占又曰知變化之道者其知神之所為乎故曰茍非其人道不虛行易繫辭之文也意者多迷其統取遣頗偏甚有雖流宕過誕亦失也取遣謂信與不信也隂陽之術或信或不信各有所執故偏頗也以為甚有者雖流宕失中過稱虛誕者亦為失也劉攽曰正文甚有雖流宕過誕亦失案此文不成文理注亦不明盖非范本真中世張衡為隂陽之宗郎顗咎徵最密餘亦班班名家焉謂襄楷蔡邕楊厚等也其徒亦有雅才偉徳未必體極藝能今盖糾其推變尤長可以𢎞補時事因合表之云表顯也任文公傳任文公巴郡閬中人也閬中今隆州縣父文孫明曉天官風角祕要文公少脩父術州辟從事哀帝時有言越巂太守欲反刺史大懼遣文公等五從事檢行郡界潛伺虛實共止傳舎時㬥風卒至文公遽起白諸從事促去當有逆變來害人者因起駕速驅諸從事未能自發郡果使兵殺之文公獨得免後為治中從事時大旱白刺史曰五月一日當有大水其變己至不可防救宜令吏人豫為其備刺史不聼文公獨儲大舩百姓或聞頗有為防者到其日旱烈文公急命促載使白刺史刺史笑之日將中天北雲起須臾大雨至餔時湔水涌起十餘丈酈元水經注云湔水出綿道玉壘山在今益州湔音子延反突壊廬舎所害數千人文公遂以占術馳名辟司空掾平帝即位稱疾歸家王莽簒後文公推數推歴運之數也知當大亂乃課家人負物百斤環舎趨走日數十劉攽曰舊本有一倒字不合刋去時人莫知其故後兵寇並起其逃亡者少能自脱惟文公大小負糧㨗歩㨗健也悉得完免遂奔子公山十餘年不被兵革公孫述時蜀武擔石折武擔山在今益州成都縣北百二十歩揚雄蜀王本紀云武都丈夫化為女子顔色美絶盖山精也蜀王納以為妃無㡬物故乃發卒之武都擔土葬於成都郭中號曰武擔以石作鏡一枚表其墓華陽國志曰王哀念之遣五丁之武都擔土為妃作冡盖地數畝髙七丈其石俗今名為石笋文公曰噫西州智士死我乃當之自是常㑹聚子孫設酒食後三月果卒故益部為之語曰任文公智無雙郭憲傳郭憲字子横汝南宋人也續漢志汝南郡有宋公國周名郪丘漢改為新郪章帝建初四年徙宋公於此少師事東海王仲子時王莽為大司馬召仲子仲子欲往憲諫曰禮有來學無有往教之義禮記曰禮聞來學不聞往教今君賤道畏貴竊所不取仲子曰王公至重不敢違之憲曰今正臨講業且當訖事仲子從之日晏乃往莽問君來何遲仲子具以憲言對莽隂竒之及後簒位拜憲郎中賜以衣服憲受衣焚之逃于東海之濵莽深忿恚討逐不知所在光武即位求天下有道之人乃徵憲拜博士再遷建武七年代張堪為光祿勲從駕南郊憲在位忽面向東北含酒三潠埤蒼曰潠噴也音巽執法奏為不敬執法糺劾之官也詔問其故憲對曰齊國失火故以此厭之後齊果上火災與郊同日八年車駕西征隗囂憲諫曰天下初定車駕未可以動憲乃當車拔佩刀以斷車靷靷在馬胸音𦙍帝不從遂上隴其後潁川兵起乃回駕而還帝歎曰恨不用子横之言時匈奴數犯塞帝患之乃召百僚廷議憲以為天下疲敝不宜動衆諫争不合乃伏地稱眩瞀不復言瞀亂也帝令兩郎扶下殿憲亦不拜帝曰常聞闗東觥觥郭子横竟不虛也觥觥剛直之貎音古横反憲遂以病辭退卒於家許楊傳許楊字偉君汝南平輿人也少好術數王莽輔政召為郎稍遷酒泉都尉及莽簒位楊乃變姓名為巫醫逃匿它界莽敗方還鄉里汝南舊有鴻郤陂陂在今豫州汝陽縣東成帝時丞相翟方進奏毁敗之建武中太守鄧晨欲脩復其功聞楊曉水脉召與議之楊曰昔成帝用方進之言前書翟方進奏壊鴻郤陂尋而自夢上天天帝怒曰何故敗我濯龍淵是後民失其利多致飢困時有謡歌曰敗我陂者翟子威飴我大豆亨我芋魁方進字子威芋魁芋根也前書飴作飯亨作羮反乎覆陂當復昔大禹決江疏河以利天下明府今興立廢業富國安民童謡之言將有徴於此誠願以死效力晨大悅因署楊為都水掾使典其事楊因髙下形勢起塘四百餘里數年乃立塘堤堰水也百姓得其便累嵗大稔初豪右大姓因緣陂役競欲辜較在所楊一無聼遂共譖楊受取賕賂晨遂収楊下獄而械輒自解獄吏恐遽白晨晨驚曰果濫矣太守聞忠信可以感靈今其效乎即夜出楊遣歸時天大隂晦道中若有火光照之時人異焉後以病卒晨於都宫為楊起廟圗畫形像百姓思其功績皆祭祀之髙獲傳髙獲字敬公汝南新息人也為人尼首方面尼首首象尼丘山中下四方髙也少遊學京師與光武有素舊師事司徒歐陽歙歙下獄當斷獲冠鐵冠帯鐵鑕詣闕請歙帝雖不赦而引見之謂曰敬公朕欲用子為吏宜改常性獲對曰臣受性於父母不可改之於陛下出便辭去三公争辟不應後太守鮑昱請獲既至門令主簿就迎主簿曰但使騎吏迎之劉攽曰主簿曰案文多一曰字獲聞之即去昱遣追請獲獲顧曰府君但為主簿所欺不足與談遂不留時郡境大旱獲素善}
