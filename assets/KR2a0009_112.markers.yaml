  - {type: variant, offset: 18, length: 0, content: '', krp: 橘數包由嘗從人飲勅御者曰酒若三行便宜嚴駕既而趣去後主人舎有鬬相殺者人請問何以知之由曰向社中木上有鳩鬬此兵賊之象也其言多驗著書十餘篇名曰其平終于家李南傳李南字孝山丹陽句容人也句容今潤州縣也近句曲山有所容因名焉少篤學明於風角和帝永元中太守馬棱坐盜賊事被徴當詣廷尉吏民不寧南特通謁賀棱意有恨謂曰太守不徳今當即罪而君反相賀邪南曰旦有善風明日中時應有吉問故來稱慶旦日棱延望景晏以為無徵至晡乃有驛使齎詔書原停棱事南問其遲留之狀使者曰向度宛陵浦里宛陵縣屬丹陽郡以舟濟水也馬踠足是以不得速踠屈損也棱乃服焉後舉有道辟公府病不行終於家南女亦曉家術為由拳縣人妻晨詣㸑室卒有㬥風婦便上堂從姑求歸辭其二親姑不許乃跪而泣曰家世傳術疾風卒起先吹竈突及井此禍為婦女主爨者妾將亡之應因著其亡日乃聼還家如期病卒李郃傳李郃字孟節漢中南鄭人也父頡以儒學稱官至博士郃襲父業遊太學通五經善河洛風星外質朴人莫之識縣召署幕門候吏和帝即位分遣使者皆微服單行各至州縣觀採風謡使者二人當到益部投郃候舎時夏夕露坐郃因仰觀問曰二君發京師時寧知朝廷遣二使邪二人黙然驚相視曰不聞也問何以知之郃指星示云有二使星向益州分野故知之耳前書觜觹參益州之分野也後三年其使者一人拜漢中太守郃猶為吏太守竒其隱徳召署戸曹史時大將軍竇憲納妻天下郡國皆有禮慶郡亦遣使郃進諫曰竇將軍椒房之親不脩禮徳而專權驕恣危亡之禍可翹足而待願明府一心王室勿與交通太守固遣之郃不能止請求自行許之郃遂所在留遲以觀其變行至扶風而憲就國自殺支黨悉伏其誅凡交通憲者皆為免官唯漢中太守不豫焉郃嵗中舉孝廉五遷尚書令又拜太常元初四年代袁敞為司空數陳得失有忠臣節在位四年坐請託事免安帝崩北鄉侯立復為司徒及北鄉侯病郃隂與少府河南陶範歩兵校尉趙直謀立順帝會孫程等事先成故郃功不顯明年坐吏民疾病仍有災異賜策免將作大匠翟酺上郃潛圖大計以安社稷於是錄隂謀之功封郃渉都侯辭讓不受年八十餘卒於家門人上黨馮胄獨制服心䘮三年時人異之家語曰仲尼既葬弟子皆家于墓行心䘮之禮三年䘮畢或去或留也胄字世威奉世之後也奉世字子明宣帝時為前將軍見前書也常慕周伯况閔仲叔之為人隱處山澤不應徵辟郃子固已見前傳弟子歴字季子清白有節博學善交與鄭𤣥陳紀等相結為新城長政貴無為亦好方術時天下旱縣界特雨官至奉車都尉叚翳傳叚翳字元章廣漢新都人也習易經明風角時有就其學者雖未至必豫知其姓名嘗告守津吏曰某日當有諸生二人荷擔問翳舎處者幸為告之後竟如其言又有一生來學積年自謂略究要術辭歸鄉里翳為合膏藥并以簡書封於筒中告生曰有急發視之生到葭萌與吏争度津吏檛破從者頭生開筒得書言到葭萌與吏鬬頭破者以此膏裹之生用其言創者即愈生歎服乃還卒業翳遂隱居竄跡終于家廖扶傳廖扶字文起廖音力弔反又音力救反汝南平輿人也習韓詩歐陽尚書教授常數百人父為北地太守永初中坐羌沒郡下獄死扶感父以法䘮身憚為吏及服終而歎曰老子有言名與身孰親吾豈為名乎遂絶志世外專精經典尤明天文讖緯風角推歩之術州郡公府辟召皆不應就問災異亦無所對扶逆知嵗荒乃聚榖數千斛悉用給宗族姻親又斂葬遭疫死亡不能自收者常居先人冡側未曾入城市太守謁煥謁姓也先為諸生從扶學後臨郡未到先遣吏脩門人之禮又欲擢扶子弟固不肯當時人因號為北郭先生年八十終于家二子孟舉偉舉並知名折像傳折像字伯式廣漢雒人也其先張江者封折侯曾孫國為鬰林太守徙廣漢因封氏焉國生像國有貲財二億家僮八百人像㓜有仁心不殺昆蟲不折萌芽能通京氏易好黄老言及國卒感多藏厚亡之義老子曰多藏必厚亡也乃散金帛資産周施親疎或諫像曰君三男兩女孫息盈前當增益産業何為坐自殫竭乎像曰昔鬬子文有言我乃逃禍非避富也國語曰楚成王毎出子文之禄必逃王止而後復人謂子文曰人生求富而子逃之何也子文曰夫從政者以庇人也人多曠者而我取富是勤人以自封也死無日矣我逃死不逃富吾門戸殖財日久盈滿之咎道家所忌老子曰持而盈之不如其已金玉滿堂莫之能守今世將衰子又不才不仁而富謂之不幸左傳曰善人富謂之幸淫人富謂之殃牆隙而髙其崩必疾也智者聞之咸服焉自知亡日召賔客}
