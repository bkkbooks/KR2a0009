  - {type: variant, offset: 396, length: 894, content: 見辰星為水為兵為妃后八月戊午太白犯軒轅大星為皇后其三年四月戊寅熒惑入東井口中為大臣有誅者其七月丁丑太白犯心前星為大臣後二年四七月懿獻皇后以憂死大將軍梁冀使太倉令秦宮刺殺議郎邴尊又欲殺鄧后母宣事覺桓帝收冀及妻壽襄城君印綬皆自殺誅諸梁及孫氏宗族或徙邊是其應也延熹四年三月甲寅熒惑犯輿鬼質星五月辛酉客星在營室稍順行生芒長五尺所至心一度轉為彗熒惑犯輿鬼質星大臣有戮死者五年十月南郡太守李肅坐蠻夷賊攻盜郡縣取財一億以上入府取銅虎符肅背敵走不救城郭又監黎陽謁者燕喬坐贓重泉令彭良殺無辜皆棄巿京兆虎牙都尉宋謙坐贓下獄死客星在營室至心作彗為大喪後四年鄧后以憂死六年十一月丁亥太白晝見是時鄧后家貴盛七年七月戊辰辰星犯歲星八月庚戌熒惑犯輿鬼質星庚申歲星犯軒轅大星十月丙辰太白犯房北星丁卯辰星犯太白十二月乙丑熒惑犯軒轅第二星辰星犯歲星為兵熒惑犯質星有戮臣歲星犯軒轅為女主憂太白犯房北星為後宮其八年二月太僕南鄉侯左勝以罪賜死勝弟中常侍上蔡侯悺北鄉侯黨皆自殺癸亥皇后鄧氏坐執左道廢遷于祠桐宮死宗親侍中沘陽侯鄧康河南尹鄧萬越騎校尉鄧弼虎賁中郎將安鄉陽侯鄧魯會侍中監羽林左騎鄧德右騎鄧壽昆陽侯鄧統淯陽侯鄧秉議郎鄧循皆繫暴室萬魯會死康等免官又荊州刺史芝交阯刺史葛祗皆為賊所拘略桂陽太守任胤背敵走皆𠫓廾巿熒惑犯輿鬼質星之應也八年五月癸酉太白犯輿鬼質星壬午熒惑入太微右執法閏月己未太白犯心前星十月癸酉歲星犯左執法十一月戊午歲星入太微犯左執法九年正月壬辰歲星入太微中五十八日出端門六月壬戌太白行入輿鬼七月乙未熒惑行輿鬼中犯質星九月辛亥熒惑入太微西門積五十八日永康元年正月庚寅熒惑逆行入太微東門留太微中百一日出端門七月丙戌太白晝見經天太白犯心前星太白犯輿鬼質星有戮臣熒惑入太微為賊臣太白犯心前星為兵喪歲星入太微犯左執法將相有誅者歲星入守太微五十日占為人主太白熒惑入輿鬼皆為死喪又犯質星為戮臣熒惑留太微中百一日占為人主太白晝見經天為兵憂在大人其九年十一月太原太守劉南陽太守成皆坐殺無辜荊州刺史李隗為賊所拘尚書郎孟璫坐受金漏言皆𠫓廾巿永康元年十二月丁丑桓帝崩太傅陳蕃大將軍竇武尚書令尹勳黃門令山冰等皆枉死太白犯心熒惑留守太微之應也孝, WYG: 就}
