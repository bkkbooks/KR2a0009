  - {type: variant, offset: 2161, length: 0, content: '', WYG: 髙會珍羞略備所少吳松江鱸魚耳松江在今蘇州東南首受大湖神仙傳云松江出好鱸魚味異它處元放於下坐劉攽曰放于下坐又下放曰亦可得也案傳未嘗以字稱亦無或用字或用名者明放皆當作慈應曰此可得也因求銅盤貯水以竹竿餌釣劉攽曰案文多一竹字於盤中須臾引一鱸魚出操大拊掌笑劉攽曰案文當作拊掌大笑會者皆驚操曰一魚不周坐席可更得乎放}
