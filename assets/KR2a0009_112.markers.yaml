  - {type: variant, offset: 13, length: 1, content: 八, WYG: 里亭雨可致也昱從之果得大雨每行縣輒軾其閭軾所以禮之禮記曰軾視馬尾也獲遂逺遁江南卒於石城石城在今蘇州西南石城人思之共為立祠王喬傳王喬者河東人也顯宗世為葉令喬有神術每月朔望常自縣詣臺朝帝怪其來數而不見車騎宻令太史伺望之言其臨至輒有雙鳬從東南飛來於是候鳬至舉羅張之但得一隻舄焉乃詔上方􅐷視說文曰􅐷亦視也音真吝反則四年中所賜尚書官屬履也每當朝時葉門下鼓不擊自鳴聞於京師後天下玉棺於堂前吏人推排終不揺動喬曰天帝獨召我邪乃沐浴服飾寢其中盖便立覆宿昔葬於城東土自成墳其夕縣中牛皆流汗喘乏而人無知者百姓乃為立廟號葉君祠牧守每班錄皆先謁拜之王喬墓在今葉縣東吏人祈禱無不如應若有違犯亦立能為祟帝乃迎取其鼓置都亭下略無復聲焉或云此即古仙人王子喬也劉向列仙傳曰王子喬周}
