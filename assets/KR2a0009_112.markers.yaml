  - {type: variant, offset: 1960, length: 3, content: 并州牧, WYG: 之使為禽戲普以年老手足不能相及粗以其法語諸醫普今年將九十耳不聾目不㝠牙齒完堅飲食無損亦以除疾兼利蹏足以當導引體有不快起作一禽之戲怡而汗出因以著粉身體輕便而欲食普施行之年九十餘耳目聰明齒牙完堅阿善針術凡醫咸言背及匈藏之間不可妄針針之不可過四分而阿針背入一二寸巨闕匈藏乃五六寸而病皆瘳阿從佗求方可服食益於人者佗授以漆葉青䴴散佗别傳曰青䴴者一名地節一名黄芝主理五藏益精氣本出於迷入山者見仙人服之以告佗佗以為佳語阿阿又秘之近者人見阿之壽而氣力强盛怪之遂責所服食因醉亂誤道之法一施人多服者皆有大驗本字書無䴴字相傳音女廉反然今人無識此者甚可恨惜劉攽曰注本字書案文多一夲字漆葉屑一斗青䴴十四兩以是為率言乆服去三蟲利五藏輕體使人頭不白阿從其言壽百餘歲漆葉處所而有青䴴生於豐沛彭城及朝歌間漢世異術之士甚衆雖云不經而亦有不可誣故簡其美者列于傳末冷壽光唐虞魯女生三人者皆與華佗同時壽光年可百五六十歲行容成公御婦人法列仙傳曰容成公者能善補導之事取精於𤣥牝其要谷神不死守生養氣者也髮白復黑齒落復生御婦人之術謂握固不瀉還精補腦也常屈頸鷮息鷮音居妖反毛詩曰有集唯鷮毛萇注曰鷮雉也山海經曰女几之山多白鷮郭璞曰似雉長尾走且鳴也鬚髮盡白而色理如三四十時死於江陵唐虞道赤眉張步家居里落若與相及死於鄉里不其縣魯女生數說顯宗時事甚明了議者疑其時人也}
