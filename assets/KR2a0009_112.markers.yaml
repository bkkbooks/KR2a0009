  - {type: variant, offset: 17, length: 0, content: '', WYG: 餘年後來於山上告桓良曰告我家七月七日待我緱氏山頭果乘白鶴駐山顛望之不得到舉手謝時人而去謝夷吾傳謝夷吾字堯卿會稽山隂人也少為郡吏學風角占候太守第五倫擢為督郵時烏程長有臧釁倫使收案其罪夷吾到縣無所驗但望閤伏哭而還一縣驚怪不知所為及還白倫曰竊以占候知長當死近三十日逺不過六十日遊魂假息非刑所加故不收之倫聼其言至月餘果有驛馬齎長印綬上言㬥卒倫以此益禮信之謝承書曰倫甚崇其道徳轉署主簿使子從受春秋夷吾待之如師弟子之禮時或遊戲不肯讀書便白倫行罰遂成其業也舉孝廉為夀張令謝承書曰縣人女子張雨早䘮父母年五十不肯嫁留養孤弟二人教其學問各得通經雨皆為聘娶皆成善士夷吾薦於州府使各選舉表復雨門戸永平十五年蝗發泰山流徙郡國荐食五穀過夀張界飛逝不集稍遷荆州刺史謝承書曰夷吾雅性明逺能決斷罪疑行部始到南陽縣遇孝章皇帝廵狩駕幸魯陽有詔勅荆州刺史入傳錄見囚徒誡長吏勿廢舊儀朕將覽焉上臨西廂南面夷吾處東廂分帷隔中央夷吾所決正一縣三百餘事事與上合而朝廷嘆息曰諸州刺史盡如此者朕不憂天下常以勵羣臣遷鉅鹿太守所在愛育人物有善績及倫作司徒令班固為文薦夷吾曰臣聞堯登稷契政隆太平舜用臯陶政致雍熙劉攽曰案文勢不當駢用兩政字盖上政本是治字避作化後人誤也殷周雖有髙宗昌發之君猶賴傅說吕望之䇿故能克崇其業允協大中尚書洪範曰皇建其有極孔安國注云皇大極中也竊見鉅鹿太守會稽謝夷吾出自東州厥土塗泥而英資挺特竒偉秀出才兼四科行包九徳四科見文苑傳尚書咎繇陳九徳曰寛而栗愿而恭亂而敬柔而立擾而毅直而溫簡而廉剛而塞强而義也仁足濟時知周萬物加以少膺儒雅韜含六籍推考星度綜校圖錄探賾聖祕觀變歴徴占天知地與神合契據其道徳以經王務昔為陪𨽻與臣從事奮忠毅之操躬史魚之節董臣嚴綱朂臣懦弱董督也朂勵也得以免戾實賴厥勲及其應選作宰惠敷百里降福彌異流化若神爰牧荆州威行邦國奉法作政有周召之風居儉履約紹公儀之操史記公儀休相魯抜園葵去織婦不與人争利尋功簡能為外臺之表聼聲察實為九伯之冠左傳曰五侯九伯杜預注云九州之伯也遷守鉅鹿政合時雍徳量績謀有伊吕管晏之任闡𢎞道奥同史蘇京房之倫左傳史蘇晉太史善筮者京房字君明善隂陽占候見前書雖密勿在公而身出心隱不殉名以求譽不馳騖以要寵念存遜遁演志箕山方之古賢實有倫序採之於今超然絶俗誠社稷之元龜大漢之棟甍尚書曰格人元龜罔敢知吉元大也甍亦棟也宜當拔擢使登鼎司上令三辰順軌於歴象下使五品咸訓于嘉時五品五常之教也謂父義母慈兄友弟恭子孝也訓順也必致休徵克昌之慶非徒循法奉職而已臣以頑駑器非其疇疇類也尸祿負乘夕惕若厲易曰負且乘致寇至又曰夕惕若厲言君子終日乾乾至于夕猶怵惕戒懼若危厲願乞骸骨更授夷吾上以光七曜之明下以厭率土之望庶令微臣塞咎免悔後以行春乘柴車從兩吏柴車賤車也冀州刺史上其儀序失中有損國典左轉下邳令豫剋死日如期果卒勅其子曰漢末當亂必有發掘露骸之禍使懸棺下葬墓不起墳墓謂塋域墳謂築土時博士渤海郭鳯亦好圖讖善說災異吉凶占應先自知死期豫令弟子市棺斂具至其日而終棺音古亂反楊由傳楊由字哀侯蜀郡成都人也少習易并七政元氣風雲占候為郡文學掾時有大雀夜集於庫樓上太守廉范以問由由對曰此占郡内當有小兵然不為害後二十餘日廣柔縣蠻夷反殺傷長吏廣柔縣屬蜀郡故城在今茂州文川縣西郡發庫兵擊之又有風吹削哺哺當作柿音孚廢反顔氏家訓曰削則扎也左傳曰削而投之是也史家假借為肝肺字今俗或作脯或作為反哺之哺學士因云是屏障之名非也風角書曰庶人之風揚塵轉削若是屏障何由可轉太守以問由由對曰方當有薦木實者其色黄赤頃之五官掾}
