  - {type: variant, offset: 1952, length: 4, content: 陰跱雒陽, krp: 拖曵計向五十餘里乃以藥飲女女即安卧不知人因取犬斷腹近後脚之前所斷之處向創口令去三二寸停之須臾有若蛇者從創中出便以鐵錐横貫蛇頭蛇在皮中揺動良乆須臾不動牽出長三尺許純是蛇但有眼處而無瞳子又逆鱗耳以膏散著創中七日愈又有人苦頭眩頭不得舉目不得視積年佗使悉解衣倒懸令頭去地一二寸濡布拭身體令周匝候視諸脉盡出五色佗令弟子數人以鈹刀決脉五色血盡視赤血出乃下以膏摩被覆汗出周匝飲以亭歴犬血散立愈又有婦人長病經年世謂寒熱注病者也冬十一月中佗令坐石槽中且用寒水汲灌云當滿百始七八灌戰欲死灌者懼欲止佗令滿數至將八十灌熱氣乃蒸出囂囂髙二三尺滿百灌佗乃然火温牀厚覆良乆汗洽出著粉汗糝便愈又有人病腹中半切痛十餘日中鬚眉墮落佗曰是脾半腐可刳腹養療也佗便飲藥令卧破腹視脾半腐壊刮去惡肉以膏傅創飲之藥百日平復也劉攽曰注且用寒水案文且當作旦佗甞行道見有病咽塞者咽喉也因語之曰向來道隅有賣餅人蓱虀甚酸詩義疏曰蘋澹水上浮萍者麄大謂蘋小者為萍季春始生可糝蒸為茹又可苦酒淹就酒也魏志及本草並作䔉虀也劉攽曰注蘋澹水上浮萍者案文此者當作也可取三升飲之病自當去即如佗言立吐一蛇乃懸於車而候佗時佗小兒戲於門中逆見自相謂曰客車邊有物必是逢我翁也及客進顧視壁北懸蛇以十數乃知其奇魏志曰故甘陵相夫人有身六月腹痛不安佗視脉曰胎已死使人手摸知所在在左則男在右則女云在左於是為湯下之果下男形即愈縣吏尹代苦四肢煩口中乾不欲聞人聲小便不利佗曰試作熱食得汗即愈不汗後三日死即作熱食不汗出佗曰藏氣已絶於内當啼泣而絶果如佗言府吏倪尋李延共止俱頭痛身熱所苦正同佗曰尋當下之延當發汗或難其異佗曰尋外實延内實故療之宜殊即各與藥明旦並起者也又有一郡守篤病乆佗以為盛怒則差乃多受其貨而不加功無何棄去又留書罵之太守果大怒令人追殺佗不及因瞋恚吐黑血數升而愈又有疾者詣佗求療佗曰君病根深應當剖破腹然君壽亦不過十年病不能相殺也病者不堪其苦必欲除之佗遂下療應時愈十年竟死廣陵太守陳登忽患匈中煩懣面赤不食佗脉之曰府君胃中有蟲欲成内疽腥物所為也即作湯二升再服須臾吐出三升許蟲頭赤而動半身猶是生魚膾所苦便愈佗曰此病後三朞當發遇良醫可救登至期疾動時佗不在遂死曹操聞而召佗常在左右操積苦頭風眩佗針隨手而差有李將軍者妻病呼佗視脉佗曰傷身而胎不去將軍言間實傷身胎已去矣佗曰案脉胎未去也將軍以為不然妻稍差百餘日復動更呼佗佗曰脉理如前是兩胎先生者去血多故後兒不得出也胎旣已死血脉不復歸必燥著母脊乃為下針幷令進湯婦因欲產而不通佗曰死胎枯燥勢不自生使人探之果得死胎人形可識但其色已黑佗之絶技皆此類也佗别傳曰有人病脚躄不能行佗切脉便使解衣㸃背數十處相去一寸或五寸從邪不相當言灸此各七壯灸創愈即行也後灸愈灸處夾脊一寸上下行端直均調如引繩也為人性惡難得意且恥以醫見業又去家思歸乃就操求還取方因託妻疾數期不反操累書呼之又勅郡縣發遣佗恃能厭事猶不肯至操大怒使人廉之廉察也知妻詐疾乃收付獄訊考驗首服荀彧請曰佗方術實工人命所懸宜加全宥操不從竟殺之佗臨死出一卷書與獄吏曰此可以活人吏畏法不敢受佗亦不强索火燒之初軍吏李成苦欬晝夜不寐佗以為腸癕與散兩錢服之即吐二升膿血於此漸愈乃戒之曰後十八歲疾當發動若不得此藥不可差也復分散與之後五六歲有里人如成先病請藥甚急成愍而與之乃故往譙更從佗求適値見收意不忍言後十八年成病發無藥而死廣陵吳普彭}
  - {type: variant, offset: 1957, length: 2, content: 外竊, WYG: 樊阿皆從佗學普依凖佗療多所全濟劉攽曰普依凖佗療案文不全須有一病字佗語普曰人體欲得勞動但不當使極耳動搖則穀氣得銷血脉流通病不得生譬如戸樞終不朽也是以古之仙者為導引之事熊經鴟顧熊經若熊之攀枝自懸也鴟顧身不動而囘顧也莊子曰吐故納新熊經鳥申此導引之士養形之人也引挽要體動諸闗節以求難老吾有一術名五禽之戲一曰虎二曰鹿三曰熊四曰猨五曰鳥佗别傳曰吳普從佗學微得其方魏明帝}
