  - {type: 'tls:seg', offset: 2278, content: '', id: KR2a0009_ZHSJ_112-d112p19s34}
  - {type: variant, offset: 2278, length: 0, content: '', WYG: 劉攽曰宓縣人案宓當作宻其初行乆而不還後歸語其家云我已得仙因辭家而去家人見其舉步稍髙良乆乃没云陳寔韓韶同見其事解奴辜傳解奴辜張貂者亦不知是何郡國人也皆能隱淪出入不由門戸奴辜能變易物形以誑幻人又河南有麴聖卿善為丹書符劾厭殺鬼神而使命之又有編肓意亦與鬼物交通編姓也肓意名初章帝時有壽光侯者壽姓也風俗通曰壽於姚吳大夫能劾百鬼衆魅令自縛見形其鄉人有婦為魅所病侯為劾之得大蛇數丈死於門外又有神樹人止者輒死鳥過者必墜侯復劾之樹盛夏枯落見大蛇長七八丈懸死其間帝聞而徵之乃試問之劉攽曰問之按文當作曰吾殿下夜半常有數人綘衣被髮持火相隨豈能劾之乎侯曰此小怪易銷耳帝偽使三人為之侯劾三人登時仆地無氣帝大驚曰非魅也朕相試耳解之而蘇甘始傳甘始東郭延年漢武内傳曰延年字公游封君達三人者皆方士也率能行容成御婦人術或飲小便或自倒懸愛嗇精氣不極視大言甘始元放延年皆為操所録問其術而行之曹植辨道論曰甘始者老而有少容自謂術士咸共歸之然始辭繁寡實頗切怪言余嘗辟左右獨與之言問其所行温顔以誘之羙辭以導之始語余吾本師金姓韓字世雄嘗與師於南海作金前後數四投數萬斤於海又言諸梁時西域胡來獻香􅄢腰𢃄割玉刀時悔不取也又言車師之西國兒生劈背出脾欲其食少而怒行也又言取鯉魚五寸一䨇令一著藥投沸膏}
