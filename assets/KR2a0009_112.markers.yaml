  - {type: variant, offset: 2279, length: 3, content: 平六年, WYG: 有藥奮尾鼔鰓遊行沉浮有若處淵其一者已熟而可噉余時問言寧可試不言是藥去此踰萬里當出塞始不自行不能得也言不盡於此頗難悉載故粗舉其巨怪者始若遭秦始皇漢武帝則復徐市欒}
