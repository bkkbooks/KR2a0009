  - {type: variant, offset: 2384, length: 1, content: 丈, WYG: 年入鳥舉山服水銀百餘年還鄉里如二十者常乘青牛故號青牛道士聞有病死者識與不識便以要間竹管中藥與服或下針應手皆愈不以姓名語人聞魯女生得五岳圖連年請求女生未見授幷告節度二百餘歲乃入𤣥丘山去劉攽曰註連年請求女生未見授按文當云連年請于女生求見授凡此數人皆百餘歲及二百歲也王眞傳王眞郝孟節者皆上黨人也王眞年且百歲視之面有光澤似未五十者自云周流登五岳名山悉能行胎息胎食之方嗽舌下泉咽之不絶房室漢武内傳曰王眞字叔經上黨人習閉氣而吞之名曰胎息習嗽舌下泉而咽之名曰胎食眞行之斷穀二百餘日肉}
