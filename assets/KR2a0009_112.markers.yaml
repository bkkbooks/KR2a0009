  - {type: variant, offset: 53, length: 198, content: 五月己丑太白行入太微右掖門留十五日出端門丙申熒惑入東井八月己亥鎮星犯輿鬼中南星乙丑彗星芒長五尺見天巿中東南指色黃白九月戊辰不見熒惑犯輿鬼為死喪質星為戮臣入太微為亂臣鎮星犯輿鬼為喪彗星見天巿中為質貴人至和平元年十二月甲寅梁太后崩梁冀益驕亂矣元嘉元年二月戊子太白晝見永興二年閏月丁酉太白晝見時上幸後宮采女鄧猛明年封猛兄演為南頓侯後四歲梁皇后崩梁冀被誅猛立為皇后恩寵甚盛永壽元年三月丙申鎮星逆行入太微中, WYG: ''}
