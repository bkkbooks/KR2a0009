  - {type: variant, offset: 22, length: 0, content: '', WYG: 經緯援神契鈎命決也春秋緯演孔圖元命包文耀鈎運斗樞感精符合誠圖考異郵保乾圖漢含孶佑助期握誠圖潛潭巴說題辭隱於壺山之陽山在今鄧州新城縣北即張衡南都賦云天封大狐是也受業者四方而至州郡前後禮請不應公卿舉賢良方正有道皆不行嘗有㬥風從西方起英謂學者曰成都市火甚盛因含水西向潄之乃令記其日時客後有從蜀來云是日大火有黑雲卒從東起須臾大雨火遂得滅於是天下稱其藝術安帝初徴為博士至建光元年復詔公車賜䇿書徵英及同郡孔喬謝承書曰喬字子松宛人也學古文尚書春秋左氏傳常幽居修志銳意典籍至乃歴年身不出門鄉里莫得瞻見公車徵不行卒於家也李昺謝承書曰昺字子然酇人也篤行好學不羡榮祿習魯詩京氏易室家相待如賔州郡前後禮請不應舉茂才除召陵令不到官公車徵不行卒也北海郎宗謝承書曰宗字仲綏安丘人也善京氏易風角星算推歩吉凶常負笈荷擔賣卜給食瘠服間行人莫得知安帝詔公車徴䇿文曰郎宗李昺孔喬等前此徴命未肯降意恐主者玩弄禮意不備使難進易退之人龍潛不屈其身各致嘉禮遣詣公車將以補察國政輔朕之不逮青州被詔書遣宗詣公車對䇿陳災異而為諸儒之表拜議郎除吳令到官一月時卒㬥風宗占以為京師有大火定火發時果如宗言諸公聞之表上博士徴宗耻以占事就徴文書未到夜懸印綬置㕔上遁去終于家子顗自有傳陳留楊倫見儒林傳東平王輔六人謝承書曰輔字公助平陸人也學公羊傳援神契常隠居野廬以道自娛辟公府舉有道對䇿拜郎中陳災異甄吉凶有驗拜議郎以病遜安帝公車徴不行卒於家唯郎宗楊倫到洛陽英等四人並不至永建二年順帝䇿書備禮𤣥纁徵之復固辭疾篤乃詔切責郡縣駕載上道英不得已到京稱病不肯起乃强輿入殿猶不以禮屈帝怒謂英曰朕能生君能殺君能貴君能賤君能富君能貧君君何以慢朕命英曰臣受命於天生盡其命天也死不得其命亦天也陛下焉能生臣焉能殺臣臣見㬥君如見仇讐立其朝猶不肯可得而貴乎雖在布衣之列環堵之中環堵面一堵也莊子曰原憲居環堵之中也晏然自得不易萬乘之尊又可得而賤乎陛下焉能貴臣焉能賤臣非禮之祿雖萬鍾不受也申其志雖簞食不厭也簞笥也論語曰顔回在陋巷之中一簞食一瓢飲陛下焉能富臣焉能貧臣帝不能屈而敬其名使出就太醫養疾月致羊酒至四年三月天子乃為英設壇席令公車令導尚書奉引賜几杖待以師傅之禮延問得失英不敢辭拜五官中郎將數月英稱疾篤詔以為光祿大夫賜告歸令在所送榖千斛常以八月致牛一頭酒三斛如有不幸祠以中牢英辭位不受有詔譬㫖勿聼英初被詔命僉以為必不降志及後應對又無竒謨深䇿談者以為失望謝承書曰南郡王逸素與英善因與其書多引古譬喻勸使就聘英順逸議談者失望也初河南張楷與英俱徴既而謂英曰天下有二道出與處也吾前以子之出能輔是君也濟斯人也而子始以不訾之身怒萬乘之主及其享受爵祿又不聞匡救之術進退無所據矣英既善術朝廷每有災異詔輒下問變復之效所言多驗變災異復於常也初英著易章句世名樊氏學以圖緯教授潁川陳寔少從英學嘗有疾妻遣奴婢拜問英下牀將答拜寔怪而問之英曰妻齊也共奉祭祀禮無不答禮記曰凡非弔䘮非見國君無不答拜其恭謹若是年七十餘卒於家孫陵靈帝時以謟事宦人為司徒陳郡郤廵學傳英業官至侍中論曰漢世之所謂名士者其風流可知矣雖弛張趣舎時有未純於刻情脩容依倚道蓺以就其聲價非所能通物方𢎞時務也易曰方以類聚物以羣分及徵樊英楊厚朝廷若待神明至竟無它異英名最髙毁最甚李固朱穆等以為處士純盜虛名無益於用故其所以然也然而後進希之以成名世主禮之以得衆原其無用亦所以為用則其有用或歸於無用矣何以言之夫煥乎文章時或乖用本乎禮樂適末或疎文章雖美時敝則不用也禮樂誠貴代末則廢及其陶搢紳藻心性使由之而不知者豈非道邈用表乖之數跡乎言文章禮樂其道邈逺出於常用之表不可以數跡求也而或者忽不踐之地賒無用之功莊子曰恵子謂莊子曰子言無用莊子曰知無用而可與言用矣夫地非不廣且大也人之所用容足耳側足而墊之致黄泉人尚有用乎恵子曰無用荘子曰然則無用之為用也亦明矣墊猶掘也至乃誚譟逺術賤斥國華逺術謂禮樂國華謂懐道隐逸之士也以為力詐可以救淪敝文律足以致寧平智盡於猜察道足於法令雖濟萬世其將與夷狄同也前書大人賦曰雖濟萬代不足以喜孟軻有言曰以夏變夷不聞變夷於夏況有未濟者乎後漢書卷一百十二上後漢書卷一百十二上考證許楊傳反乎覆陂當復臣會汾按前書翟方進傳此下有誰云者兩黄鵠六字後漢書卷一百十二上考證欽定四庫全書後漢書卷一百十二下宋宣城太守范煜撰唐章懷太子賢注方術列傳第七十二下唐檀傳唐檀字子產豫章南昌人也少遊太學習京氏易韓詩顔氏春秋尤好災異星占後還鄉里教授常百餘人元初七年郡界有芝草生太守劉祗欲上言之以問檀檀對曰方今外戚豪盛陽道微弱斯豈嘉瑞乎祗乃止永寧元年南昌有婦人生四子祗復問檀變異之應檀以為京師當有兵氣其禍發於蕭牆論語孔子曰吾恐季孫之憂不在顓臾而在蕭牆之内蕭肅也謂屏墻也言人民至屏無不肅敬至延光四年中黄門孫程揚兵殿省揚舉也誅皇后兄車騎將軍閻顯等立濟隂王為天子果如所占永建五年舉孝㢘除郎中是時白虹貫日檀因上便宜三事陳其咎徵書奏棄官去著書二十八篇名為唐子卒於家公沙穆傳公沙穆字文乂北海膠東人也家貧賤自為兒童不好戯弄長習韓詩公羊春秋尤銳思河洛推步之術居建成山中依林阻為室獨宿無侣時㬥風震雷有聲於外呼穆者三穆不與語有頃呼者自牖而入音狀甚怪穆誦經自若終亦無它妖異時人奇之後遂隱居東萊山學者自遠而至有富人王仲致產千金謂穆曰方今之世以貨自通吾奉百萬與子為資何如對曰來意厚矣夫富貴在天得之有命以貨求位吾不忍也謝承書曰穆嘗養猪有病使人賣之於市語之言如售當告買者言病賤取其直不可言無病欺人取貴價也賣猪者到市即售亦不言病其直過價穆怪之問其故齎半直追以還買猪人告語言猪實病欲賤賣不圖賣者人相欺乃取貴直買者言賣買私約亦復辭錢不取穆終不受錢而去也劉攽曰注賣者人相欺案文多一人字後舉孝亷以高第為主事遷繒相繒縣屬琅邪郡故城在今沂州承縣東北也時繒侯劉敞東海恭王之後也所為多不法廢嫡立庶傲狠放恣穆到官謁曰臣始除之日京師咸謂臣曰繒有惡侯以弔小相明侯何因得此醜聲之甚也幸承先人之支體傳茅土之重不戰戰兢兢而違越法度故朝廷使臣為輔願改往脩來自求多福乃上没敞所侵官民田地廢其庶子還立嫡嗣其蒼頭兒客犯法皆收考之因苦辭諫敞敞涕泣為謝多從其所規遷𢎞農令縣界有螟蟲食稼百姓惶懼穆乃設壇謝曰百姓有過罪穆之由請以身禱於是㬥雨不終日旣霽而螟蟲自銷百姓稱曰神明永壽元年霖雨大水三輔以東莫不湮没穆明曉占候乃豫告令百姓徙居高地故𢎞農人獨得免害遷遼東屬國都尉善得吏人歡心年六十六卒官六子皆知名謝承書曰穆子孚字允慈亦為善士舉孝廉尚書侍郎召陵令上谷太守也許曼傳許曼者汝南平輿人也祖父峻字季山善卜占之術多有顯驗時人方之前世京房自云少甞篤病三年不愈乃謁太山請命太山主人生死故詣請命也行遇道士張巨君授以方術所著易林至今行於世曼少傳峻學}
