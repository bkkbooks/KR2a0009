  - {type: punctuation, offset: 1696, content: 「, id: KR2a0009_ZHSJ_035-bkkpn398}
  - {type: variant, offset: 1696, length: 313, content: 吾已從君魚受道矣遭王莽亂奮與老母幼弟避兵河西建武五年河西大將軍竇融請奮署議曹掾守姑臧長八年賜爵關內侯時天下擾亂唯河西獨安而姑臧稱為富邑通貨羌胡市日四合每居縣者不盈數月輒致豐積奮在職四年財產無所增事母孝謹雖為儉約奉養極求珍膳躬率妻子同甘菜茹時天下未定士多不修節操而奮力行清絜為衆人所笑或以為身處脂膏不能以自潤徒益苦辛耳奮既立節治貴仁平太守梁統深相敬待不以官屬禮之常迎於大門引入見母隴蜀既平河西守令咸被徵召財貨連轂竟川澤唯奮無資單車就路姑臧吏民及羌胡更相謂曰孔君清廉仁賢舉縣蒙恩如何今去不共報德遂相賦斂牛馬器物千萬以上追送數百里奮謝之而已一無所受既至京師除武都郡丞時隴西餘賊隗茂等夜攻府舍殘殺郡守賊畏奮追急乃執其妻子欲以為質奮年已, WYG: ''}
