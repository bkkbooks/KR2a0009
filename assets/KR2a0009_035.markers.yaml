  - {type: variant, offset: 5114, length: 0, content: '', WYG: 上殿中主受尚書奏事平省之世祖省使小黄門郎受事車駕出給黄門郎兼有請室令車駕出在前請所幸徼車迎白示重慎中興但以郎兼事訖罷又省車户騎凡三將如淳曰主車曰車郎主户衞曰户郎及羽林令衞尉}
  - {type: page-break, offset: 5114, content: '', id: KR2a0009_WYG_035-8a, image: WYG0252/WYG0252-0420a.png}
  - {type: variant, offset: 5114, length: 0, content: '', krp: 上殿中主受尚書奏事平省之世祖省使小黄門郎受事車駕出給黄門郎兼有請室令車駕出在前請所幸徼車迎白示重慎中興但以郎兼事訖罷又省車户騎凡三將如淳曰主車曰車郎主户衞曰户郎及羽林令衞尉}
  - {type: variant, offset: 5115, length: 202, content: 校祖父侵安帝時司隸校尉父儒桓帝時為太常續以忠臣子孫拜郎中去官後辟大將軍竇武府及武敗坐黨事禁錮十餘年幽居守靜及黨禁解復辟太尉府四遷為廬江太守後揚州黃巾賊攻舒焚燒城郭續發縣中男子二十以上皆持兵勒陳其小弱者悉使負水灌火會集數萬人并埶力戰大破之郡界平後安風賊戴風等作亂續復擊破之斬首三千餘級生獲渠帥其餘黨輩原為平民賦與佃器使就農業中平三年江夏兵趙慈反叛殺南陽太守秦頡攻沒六縣拜續為南陽太守當入郡界乃羸服閒行侍童子, WYG: ''}
