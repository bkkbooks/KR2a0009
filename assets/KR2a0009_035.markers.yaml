  - {type: variant, offset: 6630, length: 5, content: 遭離飢戹死, WYG: 獄史二十七二百石廷吏文學十六佐二十六人騎吏三十人假佐一人官醫正左監各一人前漢有左右監平世祖省右而猶曰左左平一人六百石本注曰掌平決詔獄右屬廷尉本注曰孝武帝以下置中都官獄二十六所各令長名世祖中興皆省唯廷尉及雒陽有詔獄蔡質漢儀曰正月旦百官朝賀光祿勲劉嘉廷尉趙世各辭不能朝髙賜舉奏皆以被病篤困空文武之位闕上卿之賛既無忠信斷金之用而有敗禮傷化之尤不謹不敬請廷尉治嘉罪河南尹治世罪議以世掌廷尉故轉屬他官大鴻臚卿一人中二千石周禮象胥干寳注曰今鴻臚本注曰掌諸侯及四方歸義蠻夷其郊廟行禮賛導請行事既可以命羣司諸王入朝當郊迎典其禮儀及郡國上計匡四方來亦屬焉漢官曰員吏五十五人其六人四科二人二百石文學六人百石一人斗食十四人佐六人騎吏十五人學士五人官醫永元十年大匠應順上言百郡計吏觀國之光而舎逆旅崎嶇私館直裝衣物敝朽暴露朝㑹邈逺事不肅給昔霸國盟主耳舎諸侯於𨽻人子産以為大譏況今四海之大而可無乎和帝嘉納其言即創業焉皇子拜王賛授印綬及拜諸侯諸侯嗣子及四方夷狄封}
