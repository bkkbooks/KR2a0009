  - {type: variant, offset: 1511, length: 184, content: 由知覺愚以為軍旅尚興賊虜未殄徵兵郡國宜有重慎可立虎符以絕姦端昔魏之公子威傾鄰國猶假兵符以解趙圍若無如姬之仇則其功不顯事有煩而不可省費而不得已蓋謂此也書奏從之詩身雖在外盡心朝廷讜言善策隨事獻納視事七年政化大行十四年坐遣客為弟報仇被徵會病卒司隸校尉鮑永上書言詩貧困無田宅喪無所歸詔使治喪郡邸賻絹千匹孔奮字君魚扶風茂陵人也曾祖霸元帝時為侍中奮少從劉歆受春秋左氏傳歆稱之謂門人, WYG: 員漢官}
