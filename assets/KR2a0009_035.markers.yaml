  - {type: variant, offset: 6622, length: 0, content: '', WYG: 騶二十人長樂廏丞一人漢官曰員吏十五人卒騶二十人苜蓿苑官田所一人守之右屬太僕本注曰舊有六廏皆六百石令前書曰有大廏未央家馬三令各五丞一尉又車府路軨騎馬駿馬四令丞晉灼曰六廏名也主馬萬匹中興省約但置一廏後置左駿令廏别主乗輿御馬後或并省又有牧師苑皆令官主養馬分在河西六郡界中中興皆省唯漢陽有流馬苑但以羽林郎監領古今注曰漢安元}
