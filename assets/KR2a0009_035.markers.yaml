  - {type: variant, offset: 5319, length: 1217, content: 觀歷縣邑採問風謠然後乃進其令長貪絜吏民良猾悉逆知其狀郡內驚竦莫不震懾乃發兵與荊州刺史王敏共擊慈斬之獲首五千餘級屬縣餘賊並詣續降續為上言宥其枝附賊既清平乃班宣政令候民病利百姓歡服時權豪之家多尚奢麗續深疾之常敝衣薄食車馬羸敗府丞嘗獻其生魚續受而懸於庭丞後又進之續乃出前所懸者以杜其意續妻後與子祕俱往郡舍續閉門不內妻自將祕行其資藏唯有布衾敝袛裯鹽麥數斛而已顧勑祕曰吾自奉若此何以資爾母乎使與母俱歸六年靈帝欲以續為太尉時拜三公者皆輸東園禮錢千萬令中使督之名為左騶其所之往輒迎致禮敬厚加贈賂續乃坐使人於單席舉縕袍以示之曰臣之所資唯斯而已左驂白之帝不悅以此不登公位而徵為太常未及行會病卒時年四十八遺言薄斂不受賵遺舊典二千石卒官賻百萬府丞焦儉遵續先意一無所受詔書襃美勑太山太守以府賻錢賜續家云賈琮字孟堅東郡聊城人也舉孝廉再遷為京令有政理迹舊交阯土多珍產明璣翠羽犀象瑁異香美木之屬莫不自出前後刺史率多無清行上承權貴下積私賂財計盈給輒復求見遷代故吏民怨叛中平元年交阯屯兵反執刺史及合浦太守自稱柱天將軍靈帝特勑三府精選能吏有司舉琮為交阯刺史琮到部訊其反狀咸言賦斂過重百姓莫不空單京師遙遠告冤無所民不聊生自活故聚為盜賊琮即移書告示各使安其資業招撫荒散蠲復傜役誅斬渠帥為大害者簡選良吏試守諸縣歲閒蕩定百姓以安巷路為之歌曰賈父來晚使我先反今見清平吏不敢飯在事三年為十三州最徵拜議郎時黃巾新破兵凶之後郡縣重斂因緣生姦詔書沙汰刺史二千石更選清能吏乃以琮為冀州刺史舊典傳車驂駕垂赤帷裳迎於州界及琮之部升車言曰刺史當遠視廣聽糾察美惡何有反垂帷裳以自掩塞乎乃命御者褰之百城聞風自然竦震其諸臧過者望風解印綬去唯癭陶長濟陰董昭觀津長梁國黃就當官待琮於是州界翕然靈帝崩大將軍何進表琮為度遼將軍卒於官陸康字季寧吳郡吳人也祖父續在獨行傳父襃有志操連徵不至康少仕郡以義烈稱刺史臧旻舉為茂才除高成令縣在邊垂舊制令戶一人具弓弩以備不虞不得行來長吏新到輒發民繕修城郭康至皆罷遣百姓大悅以恩信為治寇盜亦息州郡表上其狀光和元年遷武陵太守轉守桂陽樂安二郡所在稱之時靈帝欲鑄銅人而國用不足乃詔調民田畝斂十錢而比水旱傷稼百姓貧苦康上疏諫曰臣聞先王治世貴在愛民省傜輕賦以寧天下除煩就約以崇簡易故萬姓從化靈物應德末世衰主窮奢極侈造作無端興制非一勞割自下以從苟欲故黎民吁嗟陰陽感動陛下聖德承天當隆盛化而卒被詔書畝斂田錢鑄作銅人伏讀惆悵悼心失圖夫十一而稅周謂之徹徹者通也言其法度可通萬世而行也故魯宣稅畝而蝝灾自生哀公增賦而孔子非之豈有聚奪民物以營無用之銅人捐捨聖戒自蹈亡王之法哉傳曰君舉必書書而不法後世何述焉陛下宜留神省察改敝從善以塞兆民怨恨之望書奏內倖因此譖康援引亡國以譬聖明大不敬檻車徵詣廷尉侍御史劉岱典考其事岱為表陳解釋免歸田里復徵拜議郎會廬江賊黃穰等與江夏蠻連結十餘萬人攻沒四縣拜康廬江太守康申明賞罰擊破穰等餘黨悉降帝嘉其功拜康孫尚為郎中獻帝即位天下大亂康蒙險遣孝廉計吏奉貢朝廷詔書策勞加忠義將軍秩, WYG: ''}
