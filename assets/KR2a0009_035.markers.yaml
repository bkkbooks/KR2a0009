  - {type: variant, offset: 149, length: 230, content: 年出為中山太守明年彭寵滅轉為漁陽太守漁陽既離王莽之亂重以彭寵之敗民多猾惡寇賊充斥伋到示以信賞糾戮渠帥盜賊銷散時匈奴數抄郡界邊境苦之伋整勒士馬設攻守之略匈奴畏憚遠迹不敢復入塞民得安業在職五歲戶口增倍後潁川盜賊羣起九年徵拜潁川太守召見辭謁帝勞之曰賢能太守去帝城不遠河潤九里冀京師并蒙福也君雖精於追捕而山道險自鬬當一士耳深宜慎之伋到郡招懷山賊陽夏趙宏襄城召吳等數百人皆束手詣伋降悉遣歸附農因自劾專命帝美其策不以咎之後宏吳等黨與聞伋威信遠自江南或從幽冀不期俱降駱驛不絕, WYG: ''}
