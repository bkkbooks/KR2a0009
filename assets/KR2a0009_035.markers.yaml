  - {type: variant, offset: 6594, length: 5, content: 有先受休假, WYG: 百二人古今注曰建武十三年九月初開此門北宫門蒼龍司馬主東門案雒陽宫門名為蒼龍闕門漢官曰員吏六人衞士四十人𤣥武司馬主𤣥武門漢官曰員吏二人衞士三十八人北屯司馬主北門漢官曰員吏二人衞士三十八人北宫朱爵司馬主南掖門漢官曰員吏四人衞士百二十四人古今注曰永平二年十一月初作北宫朱爵南司馬門東明司馬王東門漢官曰員吏十三人衞士百八十人朔平司馬主北門漢官曰員吏五人衞士百一十七人凡七門漢官曰凡員吏皆隊長佐凡居宫中}
