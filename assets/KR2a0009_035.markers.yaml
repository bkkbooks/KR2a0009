  - {type: variant, offset: 6614, length: 7, content: 年城陷月餘發病, WYG: 千石本注曰掌車馬天子每出奏駕上鹵簿用大駕則執馭漢官曰員吏七十人其七人四科一人二百石文學八人百石六人斗食七人佐六人騎吏三人假佐三十一人學事一人官醫丞一人比千石考工令一人六百石本注曰主作兵器弓弩刀鎧之屬成則傳執金吾入武庫及主織綬諸雜工漢官曰員吏百九人左右丞各一人車府令一人六百石本注曰主乗輿諸車漢官曰員吏二十四人丞一人未央廏令一人六百石本注曰主乗輿及廏中諸馬漢官曰員吏七十人}
