  - {type: variant, offset: 2824, length: 164, content: 郡更請召皆不應永平初隴西太守鄧融備禮謁范為功曹會融為州所舉案范知事譴難解欲以權相濟乃託病求去融不達其意大恨之范於是東至洛陽變名姓求代廷尉獄卒居無幾融果徵下獄范遂得衞侍左右盡心勸勞融怪其貌類范而殊不意乃謂曰卿何似我故功曹邪范訶之曰君困戹瞀亂邪語遂絕融繫出困病范隨而養視及死竟不言身自將車送喪致南陽葬畢乃去後辟公府會薛漢坐楚王事誅故, WYG: ''}
