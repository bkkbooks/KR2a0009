  - {type: variant, offset: 2452, length: 288, content: 萬騎入漁陽堪率數千騎奔擊大破之郡界以靜乃於狐奴開稻田八千餘頃勸民耕種以致殷富百姓歌曰桑無附枝麥穗兩岐張君為政樂不可支視事八年匈奴不敢犯塞帝嘗召見諸郡計吏問其風土及前後守令能否蜀郡計掾樊顯進曰漁陽太守張堪昔在蜀其仁以惠下威能討姦前公孫述破時珍寶山積捲握之物足富十世而堪去職之日乘折轅車布被囊而已帝聞良久歎息拜顯為魚復長方徵堪會病卒帝深悼惜之下詔襃揚賜帛百匹廉范字叔度京兆杜陵人趙將廉頗之後也漢興以廉氏豪宗自苦陘徙焉世為邊郡守或葬隴西襄武故因仕焉曾祖父襃成哀閒為右將軍祖父丹王莽時為大司馬庸部牧皆有名前世范父遭喪亂客死於蜀漢范遂流寓西州西州平歸鄉里年十五辭母西迎父喪蜀郡太守張穆丹, WYG: 督錄}
