  - {type: variant, offset: 2038, length: 222, content: 便習山谷其大豪齊鍾留者為羣氐所信向奮乃率厲鍾留等令要遮鈔擊共為表𩹉賊窘懼逼急乃推奮妻子以置軍前冀當退却而擊之愈厲遂禽滅茂等奮妻子亦為所殺世祖下詔襃美拜為武都太守奮自為府丞已見敬重及拜太守舉郡莫不改操為政明斷甄善疾非見有美德愛之如親其無行者忿之若讎郡中稱為清平弟奇游學洛陽奮以奇經明當仕上病去官守約鄉閭卒于家奇博通經典作春秋左氏刪奮晚有子嘉官至城門校尉作左氏說云張堪字君游南陽宛人也為郡族姓堪早孤讓先父餘財數百萬與兄子年十六受業長安志美行厲諸儒號, WYG: 比千石本注}
