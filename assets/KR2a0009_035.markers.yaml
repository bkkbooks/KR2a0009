  - {type: variant, offset: 6540, length: 3, content: 時袁術, WYG: 本注曰掌宫門衞士宫中徼循事漢官曰員吏四十一人其九人四科二人二百石文學三人百石十二人斗食二人佐十三人學事一人官醫衞士六十人丞一人比千石公車司馬令一人六百石本注曰掌宫南闕門凡吏民上章四方貢獻及徴詣公車者獻帝起居注曰建安八年議郎衞林為公車司馬令位随將大夫舊公車令與都官長史位從將大夫自林始丞尉各一人本注曰丞選曉諱掌知非法尉主闕門兵禁戒非常胡廣曰諸門部各陳}
