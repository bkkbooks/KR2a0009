  - {type: variant, offset: 23, length: 6, content: 郭伋字細侯扶, WYG: 人中二千石盧植禮注曰如大樂正本注曰掌禮儀祭祀每祭祀先奏其禮儀及行事常贊天子漢書儀曰贊饗一人秩六百石掌贊天子每選試博士奏其能否大射養老大喪皆奏其禮儀每月前晦察行陵廟漢官曰員吏八十五人其十二人四科十五人佐五人假佐十三人百石十五人騎吏九人學事十六人守學事臣昭曰凡漢官所載列職人數今悉以注雖頗為繁蓋周禮列官陳人役於前以為民極實觀國制此則宏模不可闕者也丞一人比千石盧植禮注曰如小樂正本注曰掌凡行禮及祭祀小事總署曹事漢舊儀曰丞舉廟中非法者其署曹掾史随事為員諸卿皆然太史令一人六百石本注曰掌天時星厯凡嵗將終奏新年厯凡國祭祀喪娶之事掌奏良日及時節禁忌凡國有瑞應灾異掌記之漢官儀曰太史待詔三十七人其六人治厯三人龜卜三人廬宅四人日時三人易筮二人典禳九人籍氏許氏典昌氏各三人嘉法請雨解事各二人醫二人丞一人明堂及靈臺丞一人二百石本注曰二丞掌守明堂靈臺靈臺掌候日月星氣皆屬太史漢官曰靈臺待詔四十二人其十四人候星二人候日三人候}
