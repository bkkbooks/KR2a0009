  - {type: variant, offset: 6560, length: 4, content: 其叛逆閉, WYG: 示威武交㦸以遮妄出入者南宫衞士令一人六百石本注曰掌南宫衞士漢官曰員吏九十五人衞士五百三十七人丞一人北宫衞士令一人六百石本注曰掌北宫衞士漢官曰員吏七十二人衞士四百七十二人丞一人左右都候各一人六百石周禮司寤氏有夜士干寳注曰今都候之屬本注曰主劒㦸士徼循宫及天子有所収考漢官曰右都候員吏二十二人衞士四百一十六人左都候員吏二十八人衞士三百八十三人蔡質漢儀曰宫中諸有劾奏罪左都候執㦸戲車縛送付詔獄在官大小各付所屬以馬被覆見尚書令尚書僕射尚書皆執板拜見丞郎皆揖丞各一人宫掖}
