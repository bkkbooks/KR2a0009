  - {type: variant, offset: 3064, length: 547, content: 情罪當萬坐帝怒稍解問范曰卿廉頗後邪與右將軍襃大司馬丹有親屬乎范對曰襃臣之曾祖丹臣之祖也帝曰怪卿志膽敢爾因貰之由是顯名舉茂才數月再遷為雲中太守會匈奴大入塞烽火日通故事虜人入過五千人移書傍郡吏欲傳檄求救范不聽自率士卒拒之虜衆盛而范兵不敵會日暮令軍士各交縛兩炬三頭火營中星列虜遙望火多謂漢兵救至大驚待旦將退范乃令軍中蓐食晨往赴之斬首數百級虜自相轔藉死者千餘人由此不敢復向雲中後頻歷武威武都二郡太守隨俗化導各得治宜建初中遷蜀郡太守其俗尚文辯好相持短長范每厲以淳厚不受偷薄之說成都民物豐盛邑宇逼側舊制禁民夜作以防火灾而更相隱蔽燒者日屬范乃毀削先令但嚴使儲水而已百姓為便乃歌之曰廉叔度來何暮不禁火民安作平生無襦今五絝在蜀數年坐法免歸鄉里范世在邊廣田地積財粟悉以賑宗族朋友肅宗崩范奔赴敬陵時廬江郡掾嚴麟奉章弔國俱會於路麟乘小車塗深馬死不能自進范見而愍然命從騎下馬與之不告而去麟事畢不知馬所歸乃緣蹤訪之或謂麟曰故蜀郡太守廉叔度好周人窮急今奔國喪獨當是耳麟亦素聞范名以為然即牽馬造門謝而歸之世伏其好義然依倚大將軍竇憲以此為譏卒於家初范與洛慶鴻為刎頸交時人稱曰前有管鮑後有慶廉鴻慷慨有義節位至琅邪會稽二郡太守所在有異迹論曰張堪廉范皆以氣俠立名觀其振危急赴險有足壯者堪之臨財范之忘施亦足以信意而感物矣若夫高祖之召欒布, WYG: ''}
