  - {type: variant, offset: 1206, length: 243, content: 臣以下咸懷樂土不讎其功而厲其用無以勸也陛下誠宜虛數郡以俟振旅之臣重復厚賞加於久役之士如此緣邊屯戍之師競而忘死乘城拒塞之吏不辭其勞則烽火精明守戰堅固聖王之政必因人心今猥用愚薄塞功臣之望誠非其宜受大恩收牧養不稱奉職無効久竊祿位令功臣懷慍誠惶誠恐八年上書乞避功德陛下殊恩未許放退臣詩蒙恩尤深義不敢苟冒虛請誠不勝至願願退大郡受小職及臣齒壯力能經營劇事如使臣詩必有補益復受大位雖析珪授爵所不辭也惟陛下哀矜詩雅好推賢數進知名士清河劉統及魯陽長董崇等初禁網尚簡但以璽書發兵未有虎符之信詩上疏曰臣聞兵者, WYG: 夫視列}
