  - {type: variant, offset: 4280, length: 831, content: 摧折權豪忤旨坐免隱身鄉里不交當世後徵為河南尹不就時天下日敝民多悲苦論者舉章有幹國才朝廷不能復用卒于家兄曾孫不韋不韋字公先父謙初為郡督郵時魏郡李暠為美陽令與中常侍具瑗交通貪暴為民患前後監司畏其埶援莫敢糺問及謙至部案得其臧論輸左校謙累遷至金城太守去郡歸鄉里漢法免罷守令自非詔徵不得妄到京師而謙後私至洛陽時暠為司隸校尉收謙詰掠死獄中暠又因刑其屍以報昔怨不韋時年十八徵詣公車會謙見殺不韋載喪歸鄉里瘞而不葬仰天嘆曰伍子胥獨何人也乃藏母於武都山中遂變名姓盡以家財募劒客邀暠於諸陵閒不剋會暠遷大司農時右校芻廥在寺北垣下不韋與親從兄弟潛入廥中夜則鑿地晝則逃伏如此經月遂得傍達暠之寢室出其牀下值暠在廁因殺其妾并及小兒留書而去暠大驚懼乃布棘於室以板籍地一夕九徙雖家人莫知其處每出輒劒戟隨身壯士自衞不韋知暠有備乃日夜飛馳徑到魏郡掘其父阜冢斷取阜頭以祭父墳又標之於市曰李君遷父頭暠匿不敢言而自上退位歸鄉里私掩塞冢椁捕求不韋歷歲不能得憤恚感傷發病歐血死不韋後遇赦還家乃始改葬行喪士大夫多譏其發掘冢墓歸罪枯骨不合古義唯任城何休方之伍員太原郭林宗聞而論之曰子胥雖云逃命而見用強吳憑闔廬之威因輕悍之衆雪怨舊郢曾不終朝而但鞭墓戮屍以舒其憤竟無手刃後主之報豈如蘇子單特孑立靡因靡資強讎豪援據位九卿城闕天阻宮府幽絕埃塵所不能過霧露所不能沾不韋毀身燋慮出於百死冒觸嚴禁陷族禍門雖不獲逞為報己深況復分骸斷首以毒生者使暠懷忿結不得其命猶假手神靈以斃之也力唯匹夫功隆千乘比之於員不以優乎議者於是貴之後太傅陳蕃辟不應為郡五官掾初弘農張奐睦於蘇氏而武威段熲與暠素善後奐熲有隙及熲為司隸以禮辟不韋不韋懼之稱病不詣熲既積憤於奐因發怒乃追咎不韋前報暠事以為暠表治謙事被報見誅君命天也而不韋仇之又令長安男子告不韋多將賓客奪舅財物遂使從事張賢等就家殺之乃先以鴆與賢父曰若賢不得不韋便可飲此賢到扶風郡守使不韋奉謁迎賢即時收執并其一門六十餘人盡誅滅之諸蘇以是衰破及段熲為陽球所誅天下以為蘇氏之報焉羊續字興祖太山平陽人也其先七世, WYG: ''}
