  - {type: variant, offset: 686, length: 0, content: '', WYG: 人佐二人學事四人守學事九人有秩百五十人祝人宰二百四十二人屠者六十人丞一人本注曰掌祝小神事太宰令一人六百石本注曰掌宰工鼎俎饌具之物凡國祭祀掌陳饌具漢官曰明堂丞一人二百石員吏四十二人其二人百石二人斗食二十三人佐九人有秩二人學事四人守學事宰二百四十二人屠者七十三人衞士一十五人丞一人大予樂令一人六百石本注曰掌伎樂凡國祭祀掌請奏樂及大饗用樂掌其陳序漢官曰員吏二十五人其二人百石二人斗食七人佐十人學事四人守學事樂人八佾舞三百八十人盧植禮注曰太子令如古大胥漢大樂律卑者之子不得舞宗廟之酎除吏二千石到六百石及關内侯到五大夫子取適子髙五尺已上}
  - {type: page-break, offset: 686, content: '', id: KR2a0009_WYG_035-3a, image: WYG0252/WYG0252-0417c.png}
  - {type: variant, offset: 686, length: 0, content: '', krp: 人佐二人學事四人守學事九人有秩百五十人祝人宰二百四十二人屠者六十人丞一人本注曰掌祝小神事太宰令一人六百石本注曰掌宰工鼎俎饌具之物凡國祭祀掌陳饌具漢官曰明堂丞一人二百石員吏四十二人其二人百石二人斗食二十三人佐九人有秩二人學事四人守學事宰二百四十二人屠者七十三人衞士一十五人丞一人大予樂令一人六百石本注曰掌伎樂凡國祭祀掌請奏樂及大饗用樂掌其陳序漢官曰員吏二十五人其二人百石二人斗食七人佐十人學事四人守學事樂人八佾舞三百八十人盧植禮注曰太子令如古大胥漢大樂律卑者之子不得舞宗廟之酎除吏二千石到六百石及關内侯到五大夫子取適子髙五尺已上}
