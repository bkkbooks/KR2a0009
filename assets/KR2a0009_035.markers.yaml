  - {type: variant, offset: 689, length: 0, content: '', WYG: 舞人丞一人盧植禮注曰大樂丞如古小胥髙廟令一人六百石本注曰守廟掌案行掃除無丞漢官曰員吏四人衞士一十五人世祖廟令一人六百石本注曰如髙廟漢官曰員吏六人衞士二十人先帝陵每陵園令各一人六百石本注曰掌守陵園案行掃除丞及校長各一人本注曰校長主兵戎盜賊事應劭漢官名秩曰丞皆選孝亷郎年少薄伐者遷補府長史都官令候司馬先帝陵每陵食官令各一人六百石本注曰掌望晦時節祭祀漢官曰每陵食監一人秩六百石監丞一人三百石中黄門八人從官二人案食監即是食官令號右屬太常本注曰有祠祀令一人後轉屬少府有太卜令六百石後省并太史中興以來省前凡十官案前書十官者太宰均官都水雍大祝五畤各一尉也東觀書曰章帝又置祀令丞延光元年省光祿勲卿一人中二千石本注曰掌宿衞宫殿門户典謁署郎更直執㦸宿衞門户考其徳行而進退之胡廣曰勲猶閽也易曰為閽寺宦寺主殿宫門户之職郊祀之事掌三獻漢官曰員吏四十四人其十人四科三人百石二人斗食二人佐六人騎吏八人學事十三人守學事一人官醫衞士八十一人丞一人比千石五官中郎將一人比二千石本注曰主五官郎蔡質漢儀曰中郎解其府對太學五官中郎比六百石本注曰無員郎年五十以屬五官故曰六百石五官侍郎比四百石本注曰無員五官郎中比三百石本注曰無員凡郎官皆主更直執㦸宿衞諸殿門出充車騎唯議郎不在直中蔡質漢儀曰三署郎見光祿勲執板拜見五官左右將執板不拜於三公諸卿無敬左中郎將比二千石本注曰主左署郎蔡質漢儀曰郎中解其府府次五官中郎比六百石侍郎比四百石郎中比三百石三郎本注曰皆無員右中郎將比二千石本注曰主右署郎中郎比六百石侍郎比四百石郎中比三百石本注曰皆無員三郎並無員虎賁中郎將比二千石本注曰主虎賁宿衞前書武帝置期門平帝更名虎賁蔡質漢儀曰主虎賁千五百人無常員多至千人戴鶡冠次右將府又虎賁舊作虎奔言如虎之奔也王莽以古有勇士孟賁故名焉孔安國曰若虎賁獸言其甚猛左右僕射左右陛長各一人比六百石本注曰僕射主虎賁郎習射陛長主直虎賁朝㑹在殿中漢官曰陛長墨綬銅印虎賁中郎比六百石虎賁侍郎比四百石虎賁郎中比三百石荀綽晉百官表注曰虎賁諸郎皆父死子代漢制也節從虎賁比二百石四郎本注曰皆無員掌宿衞侍從自節從虎賁久者轉遷才能差髙至中郎羽林中郎將比二千石本注曰主羽林郎案漢末又有四中郎將皆帥師征伐不知何時置董卓為東中郎將盧植為北中郎將獻帝以曹操為南中郎將羽林郎比三百石本注曰無員掌宿衞侍從常選漢陽隴西安定北地上郡西河凡六郡良家補本武帝以便馬從獵還宿殿陛巖下室中故號巖郎前書曰初置名建章營騎後更名出補三百石丞尉荀綽晉百官表注曰言其嚴厲整鋭也案此則為巖郎與志不同蔡質漢儀曰羽林郎百一十八人無常員府次虎賁府羽林左監一人六百石本注曰主羽林左騎漢官曰孝亷郎作主羽林九百人二監官屬史吏皆自出羽林中有材者作丞一人羽林右監一人六百石本注曰主羽林右騎丞一人奉車都尉比二千石本注曰無員漢官曰三人掌御乗輿車駙馬都尉比二千石本注曰無員漢官曰五人掌駙馬騎都尉比二千石本注曰無員漢官曰一十人本監羽林騎光祿大夫比二千石本注曰無員漢官曰三人凡大夫議郎皆掌顧問應對無常事唯詔命所使凡諸國嗣之喪則光祿大夫掌弔}
