  - {type: line-break, offset: 3156, content: '', id: ZHSJ__dup14911}
  - {type: variant, offset: 3158, length: 0, content: '', WYG: 也莊子作支伯吾親以没矣從物何為遂不應物猶事也建光元年年七十三嵗朝㑹集諸生講論終日嵗朝嵗旦因令其二子曰吾日者夢見先師東里先生與我講於隂堂之奥東南隅謂之奥隂堂幽暗之室又入其奥死之象也既而長歎豈吾齒之盡乎若命終之日桐棺足以周身外椁足以周棺歛形懸封濯衣幅巾歛形謂衣覆其形懸封謂直下棺不為埏道也濯衣浣衣也不更新制幅巾不加冠也封音窆編二尺四寸簡寫堯典一篇并刀筆各一以置棺前示不忘聖道其月望日無病忽終學者以為知命焉磐同郡蔡順字君仲亦以至孝稱汝南先賢傳曰蔡順事母至孝井桔橰朽在母生年上而順憂不敢理之俄而有扶老藤生繞之遂堅固焉順少孤養母嘗出求薪有客卒至卒音千訥反母望順不還乃噬其指噬嚙也順即心動棄薪馳歸跪問其故母曰有急客来吾噬指以悟汝耳母年九十以壽終未及}
