  - {type: variant, offset: 3149, length: 0, content: '', WYG: 方回堯時隠人也堯聘之練食雲母隱於五柞山至夏啓末為人所劫閉之室中從求道回化而去髙士傳曰堯舜各}
  - {type: variant, offset: 3149, length: 0, content: '', krp: 方回堯時隠人也堯聘之練食雲母隱於五柞山至夏啓末為人所劫閉之室中從求道回化而去髙士傳曰堯舜各}
