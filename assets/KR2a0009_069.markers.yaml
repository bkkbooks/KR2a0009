  - {type: variant, offset: 4720, length: 3, content: 李固政, krp: 時薦暠為孝廉迎路謁候咨不為留暠送至亭次望塵不及謂主簿曰趙君名重今過界不見必}
  - {type: variant, offset: 4726, length: 1, content: 第, WYG: 笑即棄印綬追至東海謁咨畢辭歸家其為時人所貴若此咨在官清簡計日受奉豪黨畏其儉節視事三年以疾自乞徵拜議郎抗疾京師劉攽曰案抗無義當是被字將終告其故吏朱祗蕭建等使薄斂素棺藉以黄壤棺中置土以藉其屍也欲令速朽早歸后土不聴子孫改之乃遺書勑子𦙍曰夫含氣之倫有生必終蓋天地之常期自然之至數是以通人達士鑒兹性命以存亡為晦明死生為朝夕故其生也不為娱亡也不為戚夫亡者元氣去體貞魂游散反素復始歸於無端元氣天之氣也貞正也復旋也端際也太素太始天地之初也言人既死正魂游散反於太素旋於太始無復端際者也既已消仆還合糞土土為棄物豈有性情而欲制其厚薄調其燥溼邪但以生者之情不忍見形之毁乃有掩骼埋􅉎之制易曰古之葬者衣以薪藏之中野後世聖人易之以棺椁易繫辭之文也棺椁之造自黄帝始劉向曰棺椁之作自黄帝始案禮記曰殷人棺椁蓋至殷而加飾爰自陶唐逮于虞夏猶尚簡樸或瓦或木及至殷人而有加焉禮記有虞氏之瓦棺夏后氏之堲周殷人棺椁古史考曰禹作土堲以周棺堲音即七反周室因之制兼二代復重以牆翣之飾禮記曰周人牆置翣盧植曰牆載棺車箱也三禮圖曰翣以竹為之髙二尺四寸廣三尺衣以白布柄長五尺𦵏時令人執之於柩車傍也表以旌銘之儀禮記曰銘明旌也以死者為不可别故以其旗識之劉攽曰表以旌銘之儀案旌銘合作銘旌招復含歛之禮招復謂招魂復魄也含以玉珠實口也歛以衣服歛屍也禮記曰凡復男子稱名婦人稱字榖梁傳曰貝玉曰含禮記曰小歛於户内大歛於阼也殯𦵏宅兆之期期謂諸侯五日而殯五月而𦵏大夫三日而殯三月而𦵏士二日而殯踰月而𦵏宅兆𦵏之塋域也棺椁周重之制禮記曰天子之棺四重鄭𤣥注云諸公三重諸侯再重大夫}
