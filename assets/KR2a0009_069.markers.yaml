  - {type: variant, offset: 2605, length: 0, content: '', krp: 怨害則塞乎天地之間也言愷有仲尼孟軻之徳也頻歴二司舉動得禮二司謂為司徒司空}
  - {type: variant, offset: 2606, length: 3, content: 承天臣, WYG: 疾致仕側身里巷處約思純進退有度百僚景式景慕以為法式海内歸懐往者孔光師丹近世鄧彪張酺皆去宰相復序上司孔光成帝時丞相哀帝時免後以日食徵詣公車復為丞相師丹哀帝時代王莽為大司馬後為大司空鄧彪明帝時為太尉章帝元和元年賜策罷和帝即位以彪為太傅録尚書事張酺和帝永元五年為太尉後策免十五年復為司徒誠宜簡練卓異以厭衆望書奏詔引愷拜太尉安帝初清河相叔孫光坐臧抵罪遂増錮二世釁及其子二世謂父子俱禁錮是時居延都尉范邠復犯臧罪詔下三公廷尉議司徒楊震司空陳襃廷尉張皓議依光比比類也以邠類叔孫光亦錮及子也比音庇愷獨以為春秋之義善善及子孫惡惡止其身所以進人於善也公羊傳曰曹公孫㑹自鄸出奔宋畔也曷為}
  - {type: page-break, offset: 2606, content: '', id: KR2a0009_WYG_069-17a, image: WYG0252/WYG0252-0836a.png}
