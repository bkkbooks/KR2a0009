  - {type: variant, offset: 3898, length: 441, content: 三公並辟班遂隱身莫知所歸固所著章表奏議教令對策記銘凡十一篇弟子趙承等悲歎不已乃共論固言迹以為德行一篇燮字德公初固既策罷知不免禍乃遣三子歸鄉里時燮年十三姊文姬為同郡趙伯英妻賢而有智見二兄歸具知事本默然獨悲曰李氏滅矣自太公已來積德累仁何以遇此密與二兄謀豫藏匿燮託言還京師人咸信之有頃難作下郡收固三子二兄受害文姬乃告父門生王成曰君執義先公有古人之節今委君以六尺之孤李氏存滅其在君矣成感其義乃將燮乘江東下入徐州界內令變名姓為酒家傭而成賣卜於巿各為異人陰相往來燮從受學酒家異之意非恆人以女妻燮燮專精經學十餘年閒梁冀既誅而灾眚屢見明年史官上言宜有赦令又當存錄大臣冤死者子孫於是大赦天下并求固後嗣燮乃以本末告酒家酒家具車重厚遣之皆不受遂還鄉里追服姊弟相見悲感傍人既而戒燮曰先公正直為漢忠臣而遇朝廷傾亂梁冀肆虐令吾宗祀血食將絕今弟幸而得濟豈非天邪宜杜絕衆人勿妄往來慎無一言加於梁氏加梁氏則連主上禍重至矣唯引咎而已燮謹從其誨後王成卒燮以禮葬之感傷舊恩每四節為設上賓之位而祠焉州郡禮命四府並辟皆無所就後, WYG: ''}
