  - {type: variant, offset: 31, length: 1, content: 郃, WYG: 著漢徳頌盛稱扶為名臣云趙孝傳趙孝字長平沛國蘄人也蘄音㡬父普王莽時為田禾將軍王莽時置田禾將軍屯田北邊任孝為郎每告歸嘗白衣歩擔嘗從長安還欲止郵亭亭長先時聞孝當過以有長者客掃洒待之素聞孝髙名故以為長者客也洒與灑通音所買反孝既至不自名不稱名也長不肯内因問曰聞田禾將軍子當從長安来何時至乎孝曰尋到矣於是遂去華嶠書曰孝報云三日至矣及天下亂人相食孝弟禮為餓賊所得孝聞之即自縛詣賊曰禮久餓羸痩不如孝肥飽賊大驚並放之謂曰可且歸更持米糒来孝求不能得復徃報賊願就烹衆異之遂不害鄉黨服其義州郡辟召進退必以禮舉孝廉不應永平中辟太尉府顯宗素聞其行詔拜諫議大夫遷侍中又遷長樂衛尉復徵弟禮為御史中丞禮亦恭謙行已類於孝帝嘉其兄弟篤行欲寵異之詔禮十日一就衛尉府大官送供具令共相對盡歡數年禮卒帝令孝從官屬送喪歸𦵏後嵗餘復以衛尉賜告歸卒于家孝無子拜禮兩子為郎時汝南有王琳巨尉者年十餘歲喪父母因遇大亂百姓奔逃唯琳兄弟獨守塜廬號泣不絶弟季出遇赤眉將為所哺哺食之也音補胡反琳自縛請先季死賊矜而放遣由是顯名鄉邑後辟司徒府薦士而退琅邪魏譚少間者時亦為饑寇所獲等輩數十人皆束縛以次當烹賊見譚似謹厚獨令主㸑暮輙執縛賊有夷長公夷姓也特哀念譚密觧其縛語曰汝曹皆應就食急從此去對曰譚為諸君㸑恒得遺餘餘人皆茹草萊不如食我長公義之相曉赦遣並得俱免譚永平中為主家令公主家令又齊國兒萌子明兒音五兮反梁郡車成子威二人兄弟並見執於赤眉將食之萌成叩頭乞以身代賊亦哀而兩釋焉淳于恭傳淳于恭字孟孫北海淳于人也淳于縣故城}
