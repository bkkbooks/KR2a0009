  - {type: variant, offset: 13, length: 4, content: 十三李固, WYG: 百餘人愍然哀之因以便宜出所在布粟給其廩糧劉攽曰案廩倉廩也禀給穀也明此當作禀為作褐衣許慎注淮南子曰楚人謂袍為短褐事畢上言帝以望不先表請章示百官詳議其罪時公卿皆以為望之專命法有常條鍾離意獨曰昔華元子反楚宋之良臣不禀君命擅平二國春秋之義以為美談春秋楚子圍宋宋人及楚人平公羊傳曰外平不書此何以書大其平乎已也何大乎其平乎已莊王圍宋有七日之糧爾盡此不勝將去而歸爾於是使司馬子反乘堙而闚宋城宋華元亦乗堙而出見之子反曰子之國何如華元曰憊矣曰何如曰易子而食之析骸而炊之子反曰諾吾軍有七日之糧爾盡此不勝將去而歸爾揖而去之反於莊王莊王怒曰吾使子往視之子曷為告之子反曰以區區之宋猶有不欺人之臣可以楚而無乎是以告之王曰諾引師而去之故君子大其平乎已也劉攽曰春秋之義以為美談案文當作義之春秋之義它處可用此據上下文則不安也今望懐義忘罪當仁不讓若䋲之以法忽其本情將乖聖朝愛育之㫖帝嘉意議赦而不罪王扶}
