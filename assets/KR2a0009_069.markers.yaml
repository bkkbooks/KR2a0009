  - {type: variant, offset: 2621, length: 3, content: 舜仰慕, WYG: 諱也春秋為賢者諱也何賢乎公子喜時讓國也君子之善善也長惡惡也短惡惡止其身善善及子孫賢者子孫故君子為其諱也尚書曰上刑挟輕下刑挟重今尚書呂刑篇曰上刑適輕下服下刑適重上服謂二罪俱發原其本情須有虧减故言適輕適重此言挟輕挟重意亦不殊但與今尚書不同耳如令使臧吏禁錮子孫以輕從重懼及善人左傳曰刑濫則懼及善人劉攽曰如令使臧吏案文多一如字非先王詳刑之意也尚書周穆王曰有邦有土告爾詳刑鄭𤣥注云詳審察之也有詔太尉議是視事}
