  - {type: variant, offset: 3152, length: 4, content: 與人易為, krp: 讓支父支父曰子適有勞憂之病方且療之未暇理}
  - {type: punctuation, offset: 3155, content: ，, id: KR2a0009_ZHSJ_069-bkkpn735}
