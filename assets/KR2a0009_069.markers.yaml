  - {type: variant, offset: 112, length: 0, content: '', WYG: 應客隱琅邪黔陬山遂數十年黔陬縣之山也黔陬故城在今密州諸城縣東北也建初元年肅宗下詔美恭素行告郡賜帛二十匹遣詣公車除為議郎引見極日訪以政事遷侍中騎都尉禮待甚優其所薦名賢無不徵用進對陳政皆本道徳帝與之言未嘗不稱善五年病篤使者數存問卒於官詔書襃歎賜穀千斛刻石表閭除子孝為太子舍人江革傳江革字次翁齊國臨淄人也少失父獨與母居遭天下亂盗賊並起革負母逃難備經阻險常採拾以為養數遇賊或劫欲將去革輙涕泣求哀言有老母辭氣愿款有足感動人者愿謹也款誠也賊以是不忍犯之或乃指避兵之方華嶠書曰語以避兵道也遂得俱全於難革轉客下邳窮貧裸跣行傭以供母便身之物莫不必給建武末年與母歸鄉里每至嵗時縣當案比案騐以比之猶今貌閱也革以母老不欲揺動自在轅中輓車不用牛馬由是鄉里稱之曰江巨孝巨大也華嶠書曰臨淄令楊音髙之設特席顯異巨孝於稠人廣衆中親奉錢以助供養也太守嘗備禮召革以母老不應及母終至性殆滅嘗寢伏冢廬服竟不忍除郡守遣丞掾釋服因請以為吏永平初舉孝廉為郎補楚太僕月餘自劾去楚王英馳遣官屬追之遂不肯還復使中傅贈送辭不受後數應三公命輒去建初初太尉牟融舉賢良方正再遷司空長史肅宗甚崇禮之遷五官中郎將每朝㑹帝常使虎賁扶侍及進拜恒目禮焉獨視之也時有疾不㑹輙大官送醪膳恩寵有殊於是京師貴戚衛尉馬廖侍中竇憲慕其行各奉書致禮革無所報受華嶠書曰終不報書一無所受帝聞而益善之後上書乞骸骨轉拜諫議大夫賜告歸因謝病稱篤元和中天子思革至行制詔齊相曰諌議大夫江革前以病歸今起居何如夫孝百行之冠衆善之始也國家每惟志士未嘗不及革縣以見穀千斛賜巨孝常以八月長吏存問致羊酒以終厥身華嶠書曰致羊一頭酒二斛如有不幸祠以中牢由是巨孝之稱行於天下及卒詔復賜穀千斛劉般傳子愷劉般字伯興宣帝之𤣥孫也宣帝封子囂於楚是為孝王孝王生思王衍衍生王紆紆生般自囂至般積累仁義世有名節而紆尤慈篤早失母同産弟原鄉侯平尚㓜紆親自鞠養常與共卧起飲食及成人未嘗離左右平病卒紆哭泣歐血數月亦殁初紆襲王封因值王莽簒位廢為庶人因家於彭城般數嵗而孤獨與母居王莽敗天下亂太夫人聞更始即位太夫人般之母也前書音義曰列侯之妻稱夫人列侯死子復為列侯母稱太夫人乃將般俱奔長安㑹更始敗復與般轉側兵革中西行上隴遂流至武威般雖尚少而篤志修行講誦不怠其母及諸舅以為身寄絶域死生未必必或作分也不宜苦精若此數以曉般般猶不改其業建武八年隗囂敗河西始通般即將家屬東至洛陽修經學於師門明年光武下詔封般為菑丘侯奉孝王祀使}
