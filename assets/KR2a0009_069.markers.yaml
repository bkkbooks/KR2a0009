  - {type: variant, offset: 128, length: 0, content: '', WYG: 議者多以為便般對以常平倉外有利民之名而内實侵刻百姓豪右因縁為姦小民不能得其平置之不便帝乃止先是時下令禁民二業謂農者不得商賈也又以郡國牛疫通使區種増耕汜勝之書曰上農區田法區方深各六寸間相去七寸一畝三千七百區丁男女種十畝至秋收區三升粟畝得百斛中農區田法方七寸深六寸間相去二尺一畝千二十七區丁男女種十畝秋收粟畝得五十一石下農區田法方九寸深六寸間相去三尺秋收畝得二十八石旱即以水沃之而吏下檢結多失其實百姓患之般上言郡國以官禁二業至有田者不得漁捕今濵江湖郡率少蠶桑民資漁採以助口實且以冬春閑月不妨農事夫漁獵之利為田除害有助穀食無關二業也又郡國以牛疫水旱墾田多減故詔勑區種増進頃畝以為民也而吏}
