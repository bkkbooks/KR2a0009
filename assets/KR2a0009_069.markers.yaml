  - {type: variant, offset: 2702, length: 445, content: 在官牒者凡四十九人又廣選賈豎以補令史募求好馬臨窻呈試出入踰侈輜軿曜日大行在殯路人掩涕固獨胡粉飾貌搔頭弄姿槃旋偃仰從容冶步曾無慘怛傷悴之心山陵未成違矯舊政善則稱己過則歸君斥逐近臣不得侍送作威作福莫固之甚臣聞台輔之位實和陰陽琁機不平寇賊姦軌則責在太尉固受任之後東南跋扈兩州數郡千里蕭條兆人傷損大化陵而詆疵先主苟肆狂狷存無廷爭之忠沒有誹謗之說夫子罪莫大於累父臣惡莫深於毀君固之過釁事合誅辟事奏冀以白太后使下其事太后不聽得免冀忌帝聰慧恐為後患遂令左右進鴆帝苦煩甚使促召固固入前問陛下得患所由帝尚能言曰食餅今腹中悶得水尚可活時冀亦在側曰恐吐不可飲水語未絕而崩固伏尸號哭推舉侍醫冀慮其事泄大惡之因議立嗣固引司徒胡廣司空趙戒先與冀書曰天下不幸仍遭大憂皇太后聖德當朝攝統萬機明將軍體履忠孝憂存社稷而頻年之閒國祚三絕今當立帝天下重器誠知太后垂心將軍勞慮詳擇其人務存聖明然愚情眷眷竊獨有懷遠尋先世廢立舊儀近見國家踐祚前事未嘗不詢訪公卿廣求羣議令上應天心下合衆望且永初以來政事多謬地震宮廟彗星竟天誠是將軍用情之日, WYG: 仙}
