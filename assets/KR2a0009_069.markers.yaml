  - {type: variant, offset: 2600, length: 1, content: 君, WYG: 三公上則台階下象山岳前書音義曰泰階者天之三階也上階為天子中階為諸侯公卿大夫下階為士庶人春秋漢含孳曰三公象五嶽股肱元首鼎足居職易曰鼎折足覆公餗鼎足三公之象協和隂陽調訓五品五品五常之教也三公爕理隂陽敬敷五教也考功量才以序庶僚遭烈風}
  - {type: variant, offset: 2600, length: 1, content: 君, krp: 三公上則台階下象山岳前書音義曰泰階者天之三階也上階為天子中階為諸侯公卿大夫下階為士庶人春秋漢含孳曰三公象五嶽股肱元首鼎足居職易曰鼎折足覆公餗鼎足三公之象協和隂陽調訓五品五品五常之教也三公爕理隂陽敬敷五教也考功量才以序庶僚遭烈風}
  - {type: variant, offset: 2602, length: 2, content: 稽古, WYG: 迷遇迅雨不惑位莫重焉尚書納舜於大麓烈風雷雨不迷史記曰堯使舜入山林川澤暴風雨舜行不迷堯以為聖也而今上司缺職未議其人臣竊差次諸卿考合衆議咸稱太常朱倀少府荀遷臣父寵前忝司空倀遷並為掾屬具知其能倀能說其經書而用心褊狭遷嚴毅剛直而薄於藝文伏見前司徒劉愷沈重淵懿道徳博備克讓爵土致祚弱弟躬浮雲之志兼浩然之氣孔子曰不義而富且貴於我如浮雲孟子曰我善養浩然之氣而}
  - {type: page-break, offset: 2602, content: '', id: KR2a0009_WYG_069-16b, image: WYG0252/WYG0252-0835d.png}
