  - {type: variant, offset: 4514, length: 177, content: 橫發錢三億以實西園燮上書陳諫辭義深切帝乃止先是潁川甄邵諂附梁冀為鄴令有同歲生得罪於冀亡奔邵邵偽納而陰以告冀冀即捕殺之邵當遷為郡守會母亡邵且埋屍於馬屋先受封然後發喪邵還至洛陽燮行塗遇之使卒投車於溝中笞捶亂下大署帛於其背曰諂貴賣友貪官埋母乃具表其狀邵遂廢錮終身燮在職二年卒時人感其世忠正咸傷惜焉杜喬字叔榮河內林慮人也少為諸生舉孝廉辟司徒楊震府稍遷為南郡太守轉, WYG: 拜}
