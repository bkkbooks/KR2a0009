  - {type: variant, offset: 3439, length: 441, content: 說太后先策免固竟立蠡吾侯是為桓帝後歲餘甘陵劉文魏郡劉鮪各謀立蒜為天子梁冀因此誣固與文鮪共為妖言下獄門生勃海王調貫械上書證固之枉河內趙承等數十人亦要鈇鑕詣闕通訴太后明之乃赦焉及出獄京師市里皆稱萬歲冀聞之大驚畏固名德終為己害乃更據奏前事遂誅之時年五十四臨命與胡廣趙戒書曰固受國厚恩是以竭其股肱不顧死亡志欲扶持王室比隆文宣何圖一朝梁氏迷謬公等曲從以吉為凶成事為敗乎漢家衰微從此始矣公等受主厚祿顛而不扶傾覆大事後之良史豈有所私固身已矣於義得矣夫復何言廣戒得書悲慙皆長歎流涕州郡收固二子基茲於郾城皆死獄中小子燮得脫亡命冀乃封廣戒而露固尸於四衢令有敢臨者加其罪固弟子汝南郭亮年始成童遊學洛陽乃左提章鉞右秉鈇鑕詣闕上書乞收固屍不許因往臨哭陳辭於前遂守喪不去夏門亭長呵之曰李杜二公為大臣不能安上納忠而興造無端卿曹何等腐生公犯詔書干試有司乎亮曰亮含陰陽以生戴乾履坤義之所動豈知性命何為以死相懼亭長歎曰居非命之世天高不敢不跼地厚不敢不蹐耳目適宜視聽口不可以妄言也太后聞而不誅南陽人董班亦往哭固而殉尸不肯, WYG: 謝病}
