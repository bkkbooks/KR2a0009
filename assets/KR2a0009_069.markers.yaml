  - {type: variant, offset: 2667, length: 5, content: 戚自隆支黨, WYG: 也言魴魚勞則尾赤君子勞苦則顔色變以王室政教如烈火矣猶觸冐而仕者以父母甚廹近飢寒之憂為此禄仕乃解韋帶就孝廉之舉以韋皮為帶未仕之服也求仕則服革帶故解之賈山上書曰布衣韋帶之士也和帝初拜謁者除任城長遷陽夏重合令陽夏屬淮南郡重合屬勃海郡頻歴三城皆有惠政後思母棄官還鄉里及母殁哀}
