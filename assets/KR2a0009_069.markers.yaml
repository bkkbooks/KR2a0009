  - {type: variant, offset: 831, length: 404, content: 周頌曰薄言振之莫不震疊此言動之於內而應於外者也猶由此言之本朝號令豈可蹉跌閒𨻶一開則邪人動心利競暫啟則仁義道塞刑罰不能復禁化導以之寑壞此天下之紀綱當今之急務陛下宜開石室陳圖書招會羣儒引問失得指擿變象以求天意其言有中理即時施行顯拔其人以表能者則聖聽日有所聞忠臣盡其所知又宜罷退宦官去其權重裁置常侍二人方直有德者省事左右小黃門五人才智閑雅者給事殿中如此則論者厭塞升平可致也臣所以敢陳愚瞽冒昧自聞者儻或皇天欲令微臣覺悟陛下陛下宜熟察臣言憐赦臣死出為廣漢雒令至白水關解印綬還漢中杜門不交人事歲中梁商請為從事中郎商以后父輔政而柔和自守不能有所整裁灾異數見下權日重固欲令商先正風化退辭高滿乃奏記曰春秋襃儀父以開義路貶無駭以閉利門夫義路閉則利門開利門開則義路閉也前孝安皇帝內任伯榮樊豐之屬外委周廣謝惲之徒開門受賂署用非次天下紛然怨聲滿道朝廷初立頗存清靜未能數年稍復墮損左右黨進者日有遷拜守死善道者滯涸窮路而未有改敝立德之方又, WYG: 肅宗}
