  - {type: variant, offset: 12, length: 0, content: '', WYG: 二十九孔子曰夫孝莫大於嚴父嚴父莫大於配天則周公其人也配天謂宗祀文王於明堂以配上帝子路曰傷哉貧也生無以養死無以𦵏子曰啜菽飲水孝也事見禮記啜音昌悅反廣雅云啜食也夫鐘鼓非樂云之本而器不可去論語孔子曰樂云樂云鐘鼓云乎哉言樂之所貴者移風易俗也非謂鐘鼓而已然而不可去鐘鼓去音丘呂反三牲非致孝之主而養不可廢孝經曰雖日用三牲猶為不孝言孝子者以和顔恱色為難也非謂三牲而已然不可闕甘㫖存器而亡本樂之遁也遁失也言盛飾鐘簴之器而忘移風之本是失樂之意也調器以和聲樂之成也崇養以傷行孝之累也不義而崇養更為親憂是孝之累也修已以致禄養之大也故言能大養則周公之祀致四海之祭言以義養則仲由之菽甘於東鄰之牲易曰東鄰殺牛不如西鄰之禴祭也夫患水菽之薄干禄以求養者是以恥禄親也干求也謂不以道求禄故可恥也存誠以盡行孝積而禄厚者此能以義養也中興廬江毛義少節家貧以孝行稱南陽人張奉慕其名往候之坐定而府檄適至以義守令檄召書也東觀記曰義為安陽尉府檄到當守令也義奉檄而入喜動顔色奉者志尚士也心賤之自恨来固辭而去及義母死去官行服數辟公府為縣令進退必以禮後舉賢良公車徵遂不至張奉歎曰賢者固不可測往日之喜乃為親屈也斯蓋所謂家貧親老不擇官而仕者也韓詩外傳曾子曰任重道逺不擇地而息家貧親老不擇官而仕建初中章帝下詔襃寵義賜穀千斛常以八月長吏問起居加賜羊酒壽終于家安帝時汝南薛包孟嘗好學篤行喪母以至孝聞及父娶後妻而憎包分出之包日夜號泣不能去至被歐杖不得已廬於舎外旦入而洒掃父怒又逐之乃廬於里門昬晨不廢積歲餘父母慙而還之後行六年服喪過乎哀既而弟子求分財異居包不能止乃中分其財奴婢引其老者曰與我共事久若不能使也田廬取其荒頓者頓猶廢也曰吾少時所理意所戀也器物取朽敗者曰我素所服食身口所安也弟子數破其産輙復賑給建光中公車特徵至拜侍中包性恬虚稱疾不起以死自乞有詔賜告歸加禮如毛義告請假也漢制吏病滿三月當免天子優賜其告使得帶印綬將官屬歸家養病謂之賜告也年八十餘以夀終若二子者推至誠以為行行信於心而感於人以成名受禄致禮斯可謂能以孝養也若夫江革劉般數公者之義行猶斯志也撰其行事著于篇自此已上並華嶠之詞也劉平傳王望王扶附劉平字公子楚郡彭城人也本名曠顯宗後改為平王莽時為郡吏守菑丘長菑丘縣屬彭城國政教大行其後每屬縣有劇賊輙令平守之所至皆理由是一郡稱其能更始時天下亂平弟仲為賊所殺其後賊復忽然而至平扶侍其母奔走逃難仲遺腹女始一嵗平抱仲女而棄其子母欲還取之平不聴曰力不能兩活仲不可以絶類遂去不顧與母俱匿野澤中平朝出求食逢餓賊將烹劉攽曰案文少一之字平叩頭曰今旦為老母求莱老母待曠為命願得先歸食母畢還就死食音飼下同因涕泣賊見其至誠哀而遣之平還既食母訖因白曰屬與賊期義不可欺遂還詣賊衆皆大驚相謂曰嘗聞烈士乃今見之子去矣吾不忍食子於是得全建武初平狄將軍龎萌反於彭城攻敗郡守孫萌平時復為郡吏冐白刃伏萌身上被十創困頓不知所為號泣請曰願以身代府君賊乃歛兵止曰此義士也勿殺遂觧去萌傷甚氣絶有頃蘇渇求飲平傾其創血以飲之後數日萌竟死平乃裹創扶送萌喪至其本縣後舉孝㢘拜濟隂郡丞太守劉育甚重之任以郡職上書薦平㑹平遭父喪去官服闋拜全椒長全椒縣屬九江郡也政有恩惠百姓懐感人或増貲就賦或減年從役刺史太守行部獄無繫囚人自以得所不知所問所或作何唯班詔書而去後以病免顯宗初尚書僕射鍾離意上書薦平及琅邪王望東萊王扶曰臣竊見琅邪王望楚國劉曠東萊王扶皆年七十執性恬淡所居之處邑里化之修身行義應在朝次臣誠不足知人竊慕推士進賢之義書奏有詔徵平等特賜辦裝錢至皆拜議郎並數引見平再遷侍中永平三年拜宗正數薦達名士承宮郇恁等恁字君大見黄憲傳恁音人甚反在位八年以老病上疏乞骸骨卒於家王望字慈卿客授㑹稽自議郎遷青州刺史甚有威名是時州郡災旱百姓窮荒望行部道見飢者裸行草食}
