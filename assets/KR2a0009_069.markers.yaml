  - {type: variant, offset: 501, length: 295, content: 然也而子弟羣從榮顯兼加永平建初故事殆不如此宜令步兵校尉冀及諸侍中還居黃門之官使權去外戚政歸國家豈不休乎而中常侍日月之側聲埶振天下子弟祿仕曾無限極雖外託謙默不干州郡而諂偽之徒望風進舉今可為設常禁同之中臣昔館陶公主為子求郎明帝不許賜錢千萬所以輕厚賜重薄位者為官人失才害及百姓也竊聞長水司馬武宣開陽城門候羊迪等無它功德初拜便真此雖小失而漸壞舊章先聖法度所宜堅守政教一跌百年不復詩云上帝板板下民卒癉刺周王變祖法度故使下民將盡病也元氣運平四時尚書出納王命賦政四海權尊埶重責之所歸若不平心灾眚必至誠宜審擇其人以毗聖政今與陛下共理天下者外則公卿尚書內則常侍黃門譬猶一門之內一家之事安則共其福慶危則通其禍敗, WYG: 申勑}
