  - {type: variant, offset: 19, length: 2, content: 堅漢, WYG: 元掖人也掖今萊州縣少修節行客居琅邪不其縣所止聚落化其徳小於鄉曰聚廣雅曰落居也國相張宗謁請不應欲强致之遂杖策歸鄉里連請固病不起劉攽曰案文當作固以病不起太傅鄧禹辟不至後拜議郎㑹見恂恂似不能言怐恂恭順之貌然性沈正不可干以非義當世髙之永平}
