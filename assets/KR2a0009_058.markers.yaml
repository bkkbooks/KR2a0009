  - {type: variant, offset: 3035, length: 2, content: 則裸, WYG: 衍被擯斥沈淪猶草木之漚鬰芬芳遇風霜而零落也夷音協韻異美音協韻媚游精神於大宅兮抗𤣥妙之常操處清靜以飬志兮實吾心之所樂大宅謂天地抗舉也老子曰𤣥之又𤣥衆妙之門樂音五孝反山峨峨而造天兮林㝠㝠而暢茂鸞回翔索其羣兮鹿哀鳴而求其友此言所居之處山林飛走之狀也索求也詩曰求其友聲也誦古今以散思兮覽聖賢以自鎭嘉孔丘之知命兮大老聃之貴𤣥徳與道其孰寳兮名與}
  - {type: variant, offset: 3035, length: 2, content: 則裸, krp: 衍被擯斥沈淪猶草木之漚鬰芬芳遇風霜而零落也夷音協韻異美音協韻媚游精神於大宅兮抗𤣥妙之常操處清靜以飬志兮實吾心之所樂大宅謂天地抗舉也老子曰𤣥之又𤣥衆妙之門樂音五孝反山峨峨而造天兮林㝠㝠而暢茂鸞回翔索其羣兮鹿哀鳴而求其友此言所居之處山林飛走之狀也索求也詩曰求其友聲也誦古今以散思兮覽聖賢以自鎭嘉孔丘之知命兮大老聃之貴𤣥徳與道其孰寳兮名與}
  - {type: variant, offset: 3038, length: 0, content: '', WYG: 其孰親陂山谷而閒處兮守寂寞而存神鎭重也古之聖賢多固窮以守道故覽之以自鎭也孔子曰五十而知天命又曰不知命無以為君子𤣥者幽寂之謂也老子曰萬物莫不尊道而貴德又曰道者萬物之奥也善人之所寳又曰名與身孰親陂謂傍其邊側也陂音丘義反史記曰陂山通道是也道以寂寞為主神不外營故常存也鎭協韻竹人反閒音閑劉攽曰注陂丘義反切不得丘當作兵夫莊周之釣魚兮辭卿相之顯位於陵子之灌園兮似至人之髣髴蓋隱約而得道兮羌窮悟而入術離塵垢之窈㝠兮配喬松之妙節莊子曰莊子釣於濮水楚王使}
  - {type: page-break, offset: 3038, content: '', id: KR2a0009_WYG_058-42a, image: WYG0252/WYG0252-0699a.png}
  - {type: variant, offset: 3038, length: 0, content: '', krp: 其孰親陂山谷而閒處兮守寂寞而存神鎭重也古之聖賢多固窮以守道故覽之以自鎭也孔子曰五十而知天命又曰不知命無以為君子𤣥者幽寂之謂也老子曰萬物莫不尊道而貴德又曰道者萬物之奥也善人之所寳又曰名與身孰親陂謂傍其邊側也陂音丘義反史記曰陂山通道是也道以寂寞為主神不外營故常存也鎭協韻竹人反閒音閑劉攽曰注陂丘義反切不得丘當作兵夫莊周之釣魚兮辭卿相之顯位於陵子之灌園兮似至人之髣髴蓋隱約而得道兮羌窮悟而入術離塵垢之窈㝠兮配喬松之妙節莊子曰莊子釣於濮水楚王使}
  - {type: variant, offset: 3039, length: 6, content: 笑被髮狂歌今, WYG: 夫二人往見焉曰願以境内累也莊子持竿不顧曰吾聞楚有神龜死已三千歳矣王以巾笥而臧之廟堂之上為此龜者寧死留骨而貴乎寕其生而曵尾塗中乎使者曰寧生曵尾塗中莊子曰往矣吾將曵尾於塗中列女傳曰於陵子終賢楚王欲以為相使使者往迎之子終出謝使者遂與妻俱逃而為人灌園孟子曰客居於陵故曰於陵子也至人守眞飬志言髣髴似之也二子雖病一時而聲流萬古蓋隱居困約而反得道之精窮棲悟理入賢人之術離塵垢之窈㝠也超然高邁配松喬之妙節也惟吾志之所庶兮固與俗其不同既俶儻而高引兮願觀其從容庶幾守道與俗不同俶儻猶卓異也凡言觀者非在己之言從容猶在後也衍雖擯斥當年身窮志沮而令聞期於不朽聲芳縣諸日月故曰願觀其從容顯宗卽位又多短衍以文過其實遂廢於家衍娶北地女任氏為妻悍忌不得畜媵妾悍急也兒女常自操井臼老竟逐之遂埳􅇄於時衍集載衍與婦弟任武逹書曰天地之性人有喜怒夫婦之道義有離合}
  - {type: page-break, offset: 3039, content: '', id: KR2a0009_WYG_058-42b, image: WYG0252/WYG0252-0699b.png}
