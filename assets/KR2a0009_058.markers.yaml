  - {type: variant, offset: 218, length: 507, content: 肉日買猪肝一片屠者或不肯與安邑令聞勑吏常給焉仲叔怪而問之知乃歎曰閔仲叔豈以口腹累安邑邪遂去客沛以壽終仲叔同郡荀恁字君大少亦脩清節資財千萬父越卒悉散與九族隱居山澤以求厥志王莽末匈奴寇其本縣廣武聞恁名節相約不入荀氏閭光武徵以病不至永平初東平王蒼為驃騎將軍開東閤延賢俊辟而應焉及後朝會顯宗戲之曰先帝徵君不至驃騎辟君而來何也對曰先帝秉德以惠下故臣可得不來驃騎執法以檢下故臣不敢不至後月餘罷歸卒於家桓帝時安陽人魏桓字仲英亦數被徵其鄉人勸之行桓曰夫干祿求進所以行其志也今後宮千數其可損乎廄馬萬匹其可減乎左右悉權豪其可去乎皆對曰不可桓乃慨然歎曰使桓生行死歸於諸子何有哉遂隱身不出若二三子可謂識去就之㮣候時而處夫然豈其枯槁苟而已哉蓋詭時審己以成其道焉余故列其風流區而載之周燮字彥祖汝南安城人法決曹掾燕之後也燮生而欽頤折頞醜狀駭人其母欲𠫓廾之其父不聽曰吾聞賢聖多有異貌興我宗者乃此兒也於是養之始在髫鬌而知廉讓十歲就學能通詩論及長專精禮易不讀非聖之書不脩賀問之好有先人草廬結于罔畔下有陂田常肆勤以自給非身所耕漁則不食也鄉黨宗族希得見者舉孝廉賢良方正特徵皆以疾辭延光二年安帝以玄纁羔幣聘燮及南陽馮良二郡各遣丞掾致禮宗族更勸之曰夫修德立行, WYG: ''}
