  - {type: variant, offset: 2770, length: 1, content: 學, WYG: 王之戰亦不過此季札呉王壽夢之少子也封於延陵昆弟四人札最少而賢壽夢卒諸兄欲立之札棄其室而耕乃捨之泓音烏萌反摭仁智之英華兮激亂國之末流觀鄭僑於溱洧兮訪晏嬰於營丘摭拾也鄭僑鄭大夫公孫僑也溱洧鄭二水名鄭詩曰溱與洧瀏其清矣晏嬰齊大夫晏平仲也爾雅曰水出其左曰營丘齊有營丘周衰政亂子產晏嬰皆有賢行輔其君也事見左傳國語日曀曀其}
  - {type: variant, offset: 2770, length: 1, content: 學, krp: 王之戰亦不過此季札呉王壽夢之少子也封於延陵昆弟四人札最少而賢壽夢卒諸兄欲立之札棄其室而耕乃捨之泓音烏萌反摭仁智之英華兮激亂國之末流觀鄭僑於溱洧兮訪晏嬰於營丘摭拾也鄭僑鄭大夫公孫僑也溱洧鄭二水名鄭詩曰溱與洧瀏其清矣晏嬰齊大夫晏平仲也爾雅曰水出其左曰營丘齊有營丘周衰政亂子產晏嬰皆有賢行輔其君也事見左傳國語日曀曀其}
  - {type: variant, offset: 2772, length: 2, content: 興處, WYG: 暮兮獨於邑而煩惑夫何九州之博大兮迷不知路之南北曀曀隂晦貎也詩曰曀曀其隂楚辭曰回朕車以復路及行迷之未遠駟素虯而馳騁兮乘翠雲而相佯就伯夷而折中兮得務光而愈明四馬曰駟虯龍之無角者也楚辭曰駟玉虯以乘翳兮爾雅曰馬高八尺為龍司馬相如曰駟蒼螭兮六素虯相佯猶逍遥也伯夷孤竹君之子周武王時義}
