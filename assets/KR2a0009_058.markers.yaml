  - {type: variant, offset: 1025, length: 0, content: '', WYG: 以抑幷兼長廉恥也今富商大賈多放錢貨中家子弟為之保役中家猶中等也保役可保信也趨走與臣僕等勤收稅與封君比入收稅謂舉錢輸息利也東觀記曰中家子為之保役受計上疏趨走俯伏譬若臣僕坐而分利也是以衆人慕効不耕而食至乃多通侈靡以􅁋耳目今可令諸商賈自相糾告若非身力所得皆以臧畀告者畀與也東觀記載譚言曰賈人多通侈靡之物羅紈綺繡雜綵玩好以滛人耳目而竭盡其財是為下樹奢媒而置貧本也求人之儉約富足何可得乎夫俗難卒變而人不可暴化宜抑其路使之稍自衰焉畀音必二反如此則專役一己不敢以貨與人事寡力弱必歸功田畝田畝脩則榖入多而地力盡矣又見法令決事輕重不齊或一事殊法同罪異論姦吏得因緣為市所欲活則出生議所欲䧟則與死比是為刑開二門也今可令通義理明習法律者校定科比科謂事條比謂類例一其法度班下郡國蠲除故條如此天下知方而獄無怨濫矣方猶法也書奏不省是時帝方信䜟多以決定嫌疑又醻賞少薄天下不時安定譚復上疏曰臣前獻瞽言}
