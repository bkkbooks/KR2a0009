  - {type: variant, offset: 2782, length: 2, content: 戰國, WYG: 堯理天下至公無私不賞而人勸不罰而人畏今子賞而不勸罰而不威德自此衰刑自此作夫子盍行無留吾事耕而不顧欵誠也眞人即謂子高躊躇猶蹢䠱也東觀記高字作喬謂仙人王子喬也義亦通意斟愖而不澹兮俟回風而容與求善卷}
  - {type: variant, offset: 2782, length: 2, content: 戰國, krp: 堯理天下至公無私不賞而人勸不罰而人畏今子賞而不勸罰而不威德自此衰刑自此作夫子盍行無留吾事耕而不顧欵誠也眞人即謂子高躊躇猶蹢䠱也東觀記高字作喬謂仙人王子喬也義亦通意斟愖而不澹兮俟回風而容與求善卷}
  - {type: variant, offset: 2785, length: 1, content: 世, WYG: 所存兮遇許由於負黍軔吾車於箕陽兮秣吾馬於潁滸聞至言而曉領兮還吾反乎故宇斟愖猶遲疑也澹定也俟待也容與猶從容也莊子曰舜以天下讓善卷善卷曰吾日出而作日入而息逍遥天地之間吾何以天下為哉遂入深山莫知所終許由字武仲堯時高士隱居箕山堯以天下譲由由不受惡聞其言遂洗耳於潁水負黍亭名在洛州陽城縣西南許由墓在其南秣謂食馬以粟字林曰滸水涯也愖音市林反或作堪字覽天地之幽奥兮統萬物之維綱究陰陽之變化兮昭五德之精光自此以下既反故宇乃欲尋覽天地究極陰陽幽奥謂深䆳也維綱猶宗指也五徳五行之徳也施之於物則為金木水火土施之於人則為仁義禮智信也躍青龍於滄海兮豢白虎於金山鑿巖石而為室兮託高陽以飬仙神雀翔於鴻崖兮𤣥武潛於嬰㝠伏朱樓而四望兮採三秀之華英天有二十八宿成龍虎龜鳯之形在地為四靈東方為青龍西方為白虎南方為朱雀北方為龜蛇豢飬也金山西方之精也神雀謂鳯也𤣥武謂龜蛇位在北方故曰𤣥身有鱗甲故曰武嬰㝠猶晦昧所謂幽都也衍既反故宇欲鑿巖石為室託高明之}
  - {type: page-break, offset: 2785, content: '', id: KR2a0009_WYG_058-39b, image: WYG0252/WYG0252-0697d.png}
