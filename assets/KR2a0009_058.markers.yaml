  - {type: variant, offset: 1934, length: 1, content: 世, WYG: 語者皆燒之令下三十日不燒黥為城旦制曰可是滅先王之法則援前聖以制中兮矯二主之驕奢饁女齊於絳臺兮饗椒舉於章華援引也矯正也饁餉也女齊晉大夫司馬侯也絳晉國所都國語曰晉平公為九層之臺又曰叔向見司馬侯之子撫而泣曰自其父之死吾蔑與事君矣昔者其父始之我終之我始之夫子終之無不可者是女齊事君必有規諫必諫作臺但書典散亡無以言耳椒舉楚大夫伍舉也饗宴也章華臺}
