  - {type: variant, offset: 1933, length: 0, content: '', WYG: 事秦昭王以上將軍擊趙於長平前後坑斬首虜四十五萬長平地名在今澤州也惡叢巧之亂世兮毒縱橫之敗俗流蘇秦於洹水兮幽張儀於鬼谷叢細也毒恨也關東為從闗西為橫蘓秦洛陽人也師事鬼谷先生為從說説關東六國為從親以畔秦㑹于洹水之上刳白馬而盟張儀魏人也與蘇秦同師為關西橫說説關西六國令事秦皆尚誣詐不遵道德洹水出汲郡林慮縣鬼谷谷名即鬼谷先生所居地在今洛州洛陽城北叢或作聚義亦通劉攽曰注云關西六國令事秦案關西何緣有六國不合明上文衍出關西二字澄德化之陵遲兮烈刑罰之峭峻燔商鞅之法術兮燒韓非之說論陵遲言頽替也澄猶清也烈慘也商鞅姓公孫氏好刑名之學事秦孝公變法令使人什伍相司犯禁相連坐不告姦者要斬告姦者與斬敵同賞匿姦者與降敵同罰人有二男以上不分異者倍其罰行之四年秦人富强韓非韓之諸公子也亦好刑名法術之學口吃不能言著書作孤憤五蠧内外儲說難十餘萬言皆尚法術少仁恩並見史記誚始皇之跋扈兮投李斯於四裔滅先王之法則兮禍濅滛而𢎞大誚責也跋扈猶彊梁也李斯上蔡人為秦丞相上書曰今諸生不師今而學古惑亂黔首臣請非秦記皆燒之天下敢有藏詩書百}
