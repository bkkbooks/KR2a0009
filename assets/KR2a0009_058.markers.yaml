  - {type: variant, offset: 1867, length: 0, content: '', WYG: 衆夫之所眩兮孰能觀於無形遵循也大路大道也老子曰大道泛兮又曰孔徳之容窈兮㝠兮其中有精又曰大象無形孔之為言空也窈㝠謂幽𤣥也道以空為主故無物而不容時俗眩於名利孰能觀大象無形哉行勁直以離尤兮羌前人之所有内自省而不慙兮遂定志而弗改離遭也尤過也羌語發聲也言古人有為勁直行而遭尤過者有之矣即屈原賈誼之流也衍内自省察不慙於古人遂守志不改也欣吾黨之唐虞兮愍吾生之愁勤聊發憤而揚情兮將以蕩夫憂心傷已不逄堯舜也蕩散也往者不可攀援兮來者不可與期}
