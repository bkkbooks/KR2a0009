  - {type: variant, offset: 1026, length: 5, content: 及勞問逆曰, WYG: 蒙詔報不勝憤懣冒死復陳愚夫䇿謀有益於政道者以合人心而得事理也凡人情忽於見事而貴於異聞觀先王之所記述咸以仁義正道為本非有竒怪虛誕之事蓋天道性命聖人所難言也自}
