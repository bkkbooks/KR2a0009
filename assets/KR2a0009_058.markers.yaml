  - {type: variant, offset: 1911, length: 0, content: '', WYG: 覽見舊都者也嵳峩高大貎崢嶸深邃貌嵗忽忽而日邁兮壽冉冉其不與耻功業之無成兮赴原野而窮處與猶待也楚辭曰日忽忽其將暮又曰老冉冉其將至功業無成情多憂憤故赴原野而窮居也昔伊尹之干湯兮七十說而乃信臯陶釣於靁澤兮賴虞舜而後親無二士之遭遇兮抱忠貞而莫逹率妻子而耕耘兮委厥美而不伐伊尹名摰負鼎爼以干湯七十說而乃信謂年七十說湯乃得信也皇甫謐帝王紀曰伊摰豐下銳上色黑而短僂身而下聲年七十而不遇湯聞其賢設朝禮而見之摰乃說湯至於王道信音申呂氏春秋曰舜陶於河濵漁於靁澤今言臯陶未詳靁澤在今濮州靁澤縣東也韓盧抑而不縱兮騏驥絆而不試獨慷慨而遠覽兮非庸庸之}
