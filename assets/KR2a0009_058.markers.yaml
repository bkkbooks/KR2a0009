  - {type: variant, offset: 1911, length: 0, content: '', krp: 覽見舊都者也嵳峩高大貎崢嶸深邃貌嵗忽忽而日邁兮壽冉冉其不與耻功業之無成兮赴原野而窮處與猶待也楚辭曰日忽忽其將暮又曰老冉冉其將至功業無成情多憂憤故赴原野而窮居也昔伊尹之干湯兮七十說而乃信臯陶釣於靁澤兮賴虞舜而後親無二士之遭遇兮抱忠貞而莫逹率妻子而耕耘兮委厥美而不伐伊尹名摰負鼎爼以干湯七十說而乃信謂年七十說湯乃得信也皇甫謐帝王紀曰伊摰豐下銳上色黑而短僂身而下聲年七十而不遇湯聞其賢設朝禮而見之摰乃說湯至於王道信音申呂氏春秋曰舜陶於河濵漁於靁澤今言臯陶未詳靁澤在今濮州靁澤縣東也韓盧抑而不縱兮騏驥絆而不試獨慷慨而遠覽兮非庸庸之}
  - {type: variant, offset: 1912, length: 1, content: 稱, WYG: 識戰國策曰齊欲伐魏淳于髠謂齊王曰韓盧天下之壯犬也淮南子曰絆騏驥而求千里衍喩己有高才而不申所以獨慷慨遠覽非庸庸之徒所能識也識叶韻音志卑衞賜之阜貨兮高顏回之所慕重祖考之洪烈兮故收功於此路卑賤也阜積也衍賤子貢貨殖慕顏回樂道所以不從流俗専心貞固者以其祖考功業隆大若苟求富貴恐致黜辱故於此路收功也循四時之代謝兮分五土之刑徳相林麓之所產兮甞水泉之所殖修神農之本業兮採軒轅之竒策追周棄之遺敎兮軼范蠡之絶迹周禮五土一曰山林二曰川瀆三曰丘陵四曰墳衍五曰原隰家語曰地東西為緯南北為經山為積徳川為積刑榖梁傳曰林屬於山曰麓周禮曰山林動物宜毛植物宜皁淮南子曰汾水濁宜麻濟水和宜麥河水調宜菽洛水輕利宜禾渭水多力宜黍江水肥宜稻管子曰四七二十八尺而至於泉其水白而丼宜黍秫三七二十一尺而至於泉其水黄而有臭宜大菽與麥二七一十四尺至於泉其味鹹宜稻與麥此甞水泉之所殖也周易曰神農氏斵木為耜揉木為耒耒耜之利以敎天下蓋取諸益周書曰神農之時天雨粟神農耕而種之軒轅黄帝也大戴禮曰黄帝時播種百榖草木節用水火財物人得其利周棄帝嚳之子為兒之時其游戯好種樹麻菽及成人遂好耕農相地之宜人皆}
