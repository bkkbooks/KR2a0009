  - {type: variant, offset: 1869, length: 1, content: 詣, WYG: 稱兮願橫逝而無由言唐虞徃不可攀援而及將來賢哲又不可豫期所病終身之後名譽不稱又願縱橫遠逝而其路無由也論語孔子曰君子疾没世而名不稱焉陟雍畤而消搖兮超略陽而不反念人生之不再兮悲六親之日遠雍縣名屬右扶風故城在今岐州雍縣南畤者止也神靈之所止也史記曰秦幷天下祠雍四畤}
