  - {type: variant, offset: 1906, length: 2, content: 愈謹, WYG: 可悔雖九死而不眠兮恐餘殃之有再淚汍瀾而雨集兮氣滂浡而雲披心怫鬰而紆結兮意沈抑而内悲言已往者託於貴戚之權幾䧟誅戮之罪此由我思慮不深遠已敗之事悔之無及雖復九死而目不瞑言怨恨之深也楚辭曰雖九死其猶未悔眠即瞑也今縱飭躬自朂又恐殃祸至再所以涙落意沈氣憤心結也瞰太行之嵳峩兮觀壺口之崢嶸悼丘墓之蕪穢兮恨昭穆之不榮太行山在上黨南壺口山在上黨東衍之遠祖馮亭}
