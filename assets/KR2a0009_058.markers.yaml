  - {type: variant, offset: 3088, length: 0, content: '', WYG: 已來日甚歳劇以白為黑以非為是造作端末妄生首尾無罪無辜䜛口嗷嗷亂匪降天生自婦人青蠅之心不重破國嫉妬之情不憚喪身牝雞之晨維家之索古之大患今始於衍醉飽過差輙為桀紂房中調戯布散海外張目抵掌以有為無痛徹蒼天毒流五臟愁令人不頼生忿令人不顧禍入門着牀繼嗣不育紡績織紝子無女工家貧無僮賤為匹夫故舊見之莫不悽愴曾無憫惜之恩唯一婢武逹所見頭無釵澤靣無脂粉形骸不蔽手足抱土不原其窮不揆其情跳梁大呌呼若入㝠販糖之妾不忍其態計婦當去久矣念兒曹小家無它使哀憐姜豹常為奴婢惻惻焦心事事腐腸訩訩籍籍不可聼聞暴虐此婢不死如髪半年之間膿血橫流婢病之後姜竟舂炊豹又觸冒泥塗心為愴然䌞榖放散冬衣不補端坐化亂一縷不貫既無婦道又無母儀忿見侵犯恨見狼籍依倚鄭令如居天上持質相刼詞語百車劒㦸在門何暇有讓百弩環舎何可彊}
  - {type: page-break, offset: 3088, content: '', id: KR2a0009_WYG_058-43b, image: WYG0252/WYG0252-0699d.png}
