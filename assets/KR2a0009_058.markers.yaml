  - {type: variant, offset: 1851, length: 0, content: '', WYG: 則思義未有背此而身名能全者也庶其邾大夫以邾邑漆閭丘奔魯故言竊邑畔君以要利也牟夷莒大夫竊牟婁及防茲求奔昭公三十一年邾黒肱以濫來奔左傳曰以地畔求食而已不求其名賤而必書以名其人終為不義不可滅已是故君子動則思禮行則思義或求名而不得或欲蓋而名彰此所謂三畔人名者也為伯玉深計莫若與鮑尚書同情戮力顯忠貞之節立超世之功如以尊親係累之故能捐位投命歸之尚書大義既全敵人紓怨紓緩也音舒上不損剖符之責下足救老幼之命申眉高談無愧天下若乃貪上黨之權惜全邦之實衍恐伯玉必懷周趙之憂上黨復有前年之禍史記曰趙}
