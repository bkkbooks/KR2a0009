  - {type: variant, offset: 1845, length: 1, content: 胤, krp: 之義當矣今三王背叛赤眉危國三王見更始傳天下螘動社稷顚隕螘動喻衆是忠臣立功之日志士馳馬之秋也伯玉擢選剖符專宰大郡文帝初與郡守始為銅虎符竹使符分持其一以為瑞信剖即分也夫上黨之地有四塞之固東帶三關西為國蔽三闗設上黨關壺口關石陘關也陘音形奈何舉之以資彊敵開天下之匈假仇讐之刃豈不哀哉張儀説楚王曰秦下甲攻衛陽晉大開天下胷李斯曰所謂借寇兵而齎盗糧也衍聞之委質為臣無有二心委質猶屈膝也左傳曰策名委質貳乃辟也臣無二心古之制也挈瓶之智守不假器解見左傳是以晏嬰臨盟擬以曲㦸不易其辭晏子春秋曰齊大夫崔杼弑齊莊公乃刼諸大夫盟有敢不盟者㦸鉤其頸劒承其心曰不與崔氏而與公室者盟神視之言不疾指不至血者死所殺者七人而後及晏子晏子奉血仰天曰崔氏無道而殺其君若有能復崔氏而嬰不與盟神視之遂仰而飲血崔氏曰晏子與我則齊國吾與共之不與我則㦸在脰劒在心子圖之晏子曰刼吾以刃而失其意非勇也留吾以利而背其君非義也詩云愷悌君子求福不回嬰可回而求福乎劒刃鉤之直兵推之嬰不革矣崔子遂釋之謝息守郕脅以晉魯不喪其邑左傳孟孫之家臣謝息孟孫從魯昭公如楚謝息為孟孫守郕邑晉人來理杞田季孫將以郕邑與之謝息不可曰夫子從君而守臣䘮邑雖吾子亦有猜焉季孫曰君之在楚於晉罪也又不聽晋魯罪重矣晋師必至吾無以待之謝息曰古人有言挈瓶之智守不假噐季孫曰吾與子桃辭以無山與之萊柞乃遷於桃杜預注曰挈瓶汲器諭小智也魯國下縣東南有桃虛萊柞二山名由是言之内無鉤頸之禍外無桃萊之利臣賢案謝息得桃邑萊山故言無桃萊之利也且為萊}
  - {type: variant, offset: 1847, length: 3, content: 季登篤, WYG: 似棗文又連桃後學者以桃棗易明桃萊難悟不䆒始終輒改萊為棗衍集又作萊或故作棗展轉乖僻為謬矣而被畔人之聲蒙降城之恥竊為左右羞之且邾庶其竊邑畔君以要大利曰賤而必書莒牟夷以土地求食而名不滅是以大丈夫動則思禮}
  - {type: variant, offset: 1847, length: 3, content: 季登篤, krp: 似棗文又連桃後學者以桃棗易明桃萊難悟不䆒始終輒改萊為棗衍集又作萊或故作棗展轉乖僻為謬矣而被畔人之聲蒙降城之恥竊為左右羞之且邾庶其竊邑畔君以要大利曰賤而必書莒牟夷以土地求食而名不滅是以大丈夫動則思禮}
