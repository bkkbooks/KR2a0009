  - {type: variant, offset: 1860, length: 0, content: '', WYG: 馮亭使人至趙曰韓不守上黨入之於秦其吏人皆安為趙不欲為秦有城市邑十七願再拜入之趙趙王大喜召平陽君豹告曰馮亭入城市邑十七受之何如豹曰聖人甚惡無故之利夫秦蠶食韓氏地中絶不令相通韓氏所以不入於秦者欲嫁其禍於趙必勿受也趙王不聽遂發兵取上黨於是秦人圍趙阬其卒四十萬秦又圍邯鄲又攻西周拔之故言懷周趙之憂前年猶徃時昔晏平仲納延陵之誨終免欒高之難延陵邑名呉公子季札所封故以號焉左傳魯襄二十九年季札聘齊見晏平仲曰子速納邑與政無邑無政乃免於難晏子因陳桓子以納邑與政是以免於欒高之難樂謂子雅高謂子尾皆齊大夫左氏魯昭公八年欒高作難晏子無罪孫林父違穆子之戒故陷終身之惡孫林父衛大夫孫文子也穆子魯大夫叔孫豹也左傳衛侯使孫林父聘魯且尋盟公登亦登叔孫穆子相儀趨進曰諸侯之㑹寡君未嘗後衛君今吾子不後寡君未知所過孫子無辭亦無悛容穆子曰孫子必亡為臣而君過而不悛亡之本也至襄十四年孫林父逐出衛獻公獻公復入國林父遂以戚邑畔是䧟於終身之惡以為伯玉聞此至言必若刺心自非嬰城而堅守則䇿馬而不顧也言不過為二塗而已聖人轉禍而為福智士因敗以成勝願自彊於時無與俗同邑報書曰僕雖駑怯亦欲為人者也豈苟貪生而畏死哉曲㦸在頸不易其心誠僕志也間者老母諸弟見執於軍而邑安然不顧者豈非重其節乎若使人居天地壽如金石要長生而避死地可也今百齡之期未有能至老壯之間相去㡬何誠使故朝尚在忠義可立雖老親受戮妻兒橫分邑之願也間者上黨黠賊大衆圍城義兵兩軰入據井陘邑親潰敵圍拒擊宗正即劉延自試智勇非不能當誠知故朝為兵所害新帝司徒已定三輔謂鄧禹也隴西北地從風響應其事昭昭日月經天河海帶地不足以比言明白也死生有命富貴在天論語子夏之辭天下存亡誠云命也邑雖沒身能如命何夫人道之本有恩有義義有所宜恩有所施君臣大義母子至恩今故主已亡義其誰為老母拘執恩所當留而厲以貪權誘以䇿馬抑其利心必其不顧何其愚乎邑年三十歴位卿士性少嗜慾情厭事為况今位尊身危財多命殆鄙人知之何疑君子君長敬通君長鮑永字也揭節垂組自相署立揭音其謁反謂負也蓋仲由使門人為臣孔子譏其欺天孔子有疾仲由欲使門人為臣以大夫之禮𦵏孔子孔子謂曰由之行詐也吾誰欺欺天乎事見論語君長據位兩州加以一郡衍集鮑永行將軍事安集并州擁兵屯太原與太原李仲房同心幷力而河東畔國兵不入彘聞更始敗故諸國畔也不入彘言不征之也彘縣名屬河東郡順帝改曰永安上黨見圍不窺太谷卽上所謂黠賊所圍城者也太谷自太原趣上黨之道不窺言不來救也今幷州太谷縣西有太谷是也宗正臨境莫之能援兵威屈辱國權日損三王背畔赤眉害主未見兼行倍道之赴昔墨翟累繭救宋申包胥重胝存楚衛女馳歸唁兄之志衛女衞宣公庶子頑之女為許穆公夫人其兄即戴公弔失國曰唁衞懿公為狄所滅戴公乃立廬於曹邑許穆夫人閔衛亡思歸唁之不得乃賦載馳之詩事見左傳主亡一歳莫知定所虛冀妄言苟肆鄙塞未能事生安能事死未知為臣焉知為主豈厭為臣子思為君父乎欲揺泰山而蕩北海言不可也孟子曰挾泰山而超北海也事敗身危要思邑言衍不從或訛言更始隨赤眉在北訛偽也永衍信之故屯兵界休界休縣屬太原郡今汾州縣方移書上黨云皇帝在雍以惑百姓永遣弟升及子壻張舒誘降湼城東觀記曰升及舒等謀使營尉李匡先反湼城開門内兵殺其縣長馮晏立故謁者祝回為湼長湼縣名屬上黨郡故城在今潞州鄕縣西湼音奴結反舒家在上黨邑悉繫之又書勸永降永不答東觀記載邑書曰愚聞丈夫不釋故而改圗哲士不徼幸而出危今君長故主敗不能死新帝立不肯降擁衆而據璧欲襲六國之從與邑同事一朝内為刎頸之盟興兵背畔攻取湼城破君長之國壞父母之鄕首難結怨輕㺯㓙器人心難知何意君長當為此計昔者韓信將兵無敵天下功不世出略不再見威執項羽名出高帝不知天時就烹於漢知伯分國既有三晉欲大無己身死地分頭為飲器君長銜命出征擁帶徒士上黨阸不能救河東畔不能取朝有顚沛之憂國有分崩之禍上無仇收之節下無不占之志天之所壞人不能支君長將兵不與韓信同日而論威行得衆不及智伯萬分之半不見天時不知厭足欲明人臣之義當先知故主之未然故貪天下之利宜及新主之未為今故主已敗新主旣成四海為羅綱天下為敵人舉足遇害動搖觸患履深淵之薄氷不為嗁渉千鈞之發機不知懼何如其知也絶鮑氏之姓廢子都之業誦堯之言服桀之行悲夫命也張舒内行邪孽不遵孝友疏其父族外附妻黨已收三族將行其法能逃不自詣者舒也能夷舒宗者予也永邑遂結怨焉自是與邑有隙邑字伯玉馮翊人也後為漁陽太守東觀記曰邑馮翊蓮芍人也其先齊諸田父豐為王莽著威將軍邑有大節渉學藝能善屬文為漁陽太守未到官道病徴還為諫議大夫病卒永衍審知更始已殁乃共罷兵幅巾降於河内不加冠幘但以一幅巾餙首而已帝怨衍等不時至永以立功得贖罪遂任用之立功謂說下懐而衍獨見黜永謂衍曰昔高祖賞季布之罪誅丁固之功季布項羽將數窘漢王漢王卽位赦布以為郎中丁固季布母弟為項羽將亦窘高祖高祖急顧丁固曰兩賢豈相戹哉丁公引還高祖即位丁固謁見高祖曰使項王失天下者丁公也遂斬之今遭明主亦何憂哉衍曰記有之人有挑其鄰人之妻者挑其長者長者詈之挑其少者少者報之後其夫死而取其長者或謂之曰夫非罵爾者邪曰在人欲其報我在我欲其罵人也此並陳軫對秦王之辭也見戰國䇿引之者言己為故主守節亦冀新帝重之也挑音徒了反夫天命難知人道易守守道之臣何患死亡頃之帝以衍為曲陽令曲陽縣名屬常山郡故城在今定州彭城縣西也劉攽曰按彭城不在定州當作鼓城也誅斬劇賊郭勝等降五千餘人論功當封以䜛毁故賞不行建武六年日食續漢志曰建武六年九月丙寅晦日有食之史官不見郡以聞衍上書陳八事其一曰顯文徳二曰褒武烈三曰修舊功四曰招俊傑五曰明好惡六曰簡法令七曰差秩禄八曰撫邊境書奏帝將召見初衍為狼孟長以罪摧陷大姓令狐略是時略為司空長史䜛之於尚書令王䕶尚書周生豐曰衍所以求見者欲毁君也風俗通曰周生姓也豫章舊志曰豐字偉防太山南武陽人也建武七年為豫章太守清約儉惠䕶等懼之卽共排間衍遂不得入後衞尉隂興新陽侯隂就以外戚貴顯深敬重衍衍遂與之交結由是為諸王所聘請興及就並光烈皇后母弟也衍集與隂就書曰衍聞神龍驤首幽雲景蒸明聖修徳志士思名是以意同情合聲比相應也伏見君侯忠孝之性慈仁慇懃論議周宻思慮深逺顧以微賤數蒙聖恩被侯大惠衍年老被病恐一旦無禄命先犬馬懷抱不報齎恨入㝠思剖肝膽有以塞責方今天下安定四海咸服蒙㤙更生之臣無所効其死力側聞東平山陽王壯當之國擇除官屬衍不自量願侯白以衍備門衞鄙語曰水不激不能破舟矢不激不能飲羽不念舊惡名賢所高負責之臣欲言不敢惟侯哀憐深留聖心則闔棺之日䰟復何恨尋為司𨽻從事帝懲西京外戚賔客故皆以法繩之大者抵死徙其餘至貶黜衍由此得罪嘗自詣獄有詔赦不問時衍又與就書曰奏曹掾馮衍叩頭死罪衍材素愚駑行義汙穢外無鄕里之譽内無汗馬之勞猥䝉明府天覆之徳}
