  - {type: variant, offset: 2053, length: 243, content: 但掠奪衣資而已既至郡中見肱無衣服怪問其故肱託以它辭終不言盜盜聞而感悔後乃就精廬求見徵君肱與相見皆叩頭謝罪而還所略物肱不受勞以酒食而遣之後與徐稺俱徵不至桓帝乃下彭城使畫工圖其形狀肱臥於幽闇以被韜面言患眩疾不欲出風工竟不得見之中常侍曹節等專執朝事新誅太傅陳蕃大將軍竇武欲借寵賢德以釋衆望乃白徵肱為太守肱得詔乃私告其友曰吾以虛獲實遂藉聲價明明在上猶當固其本志況今政在閹豎夫何為哉乃隱身遯命遠浮海濱再以玄纁聘不就即拜太中大夫詔書至門肱使家人對云久病就醫遂羸服閒行竄伏青州界中賣卜給食召命得斷家亦, WYG: 財用盡焉臣}
