  - {type: variant, offset: 3089, length: 0, content: '', WYG: 舉宗逹人觧説詞如循環口如布榖縣幡竟天擊鼓動地心不為惡身不為揺宜詳居錯且自為計無以上書告訴相恐狗吠不驚自信其情不去此婦則家不寧不去此婦則家不清不去此婦則福不生不去此婦則事不成自恨以華盛時不早自定至於垂白家貧身賤之日養癕長疽自生禍殃衍以室家紛然之故捐棄衣冠側身山野絶交游之路杜仕宦之門闔門不出心専耕耘以求衣食何敢有功名之路哉然有大志不戚戚於賤貧居常慷慨歎曰衍少事名賢經歷顯位懷金垂紫揭節奉使金謂印也紫謂綬也揭持也音求謁反不求苟得常有凌雲之志三公之貴千金之富不得其願不槩於懷槩猶屑也金或作乘貧而不衰賤而不恨年雖疲曵猶庶幾名賢之風曵猶頓也脩道徳於幽㝠之路以終身名為後世法居貧年老卒於家所著賦誄銘説問交徳誥慎情衍集有問交一篇慎情一篇書記說自序官録説䇿五十篇衍集見有二十八萹肅宗甚重其文子豹豹字仲文年十二母為父所出後母惡之嘗因豹夜寐欲行毒害豹逃走得免敬事愈謹而母疾之益深時人稱其孝衍}
