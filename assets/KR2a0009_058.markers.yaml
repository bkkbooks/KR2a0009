  - {type: variant, offset: 3090, length: 10, content: 爽玄及潁川韓融陳紀等, WYG: 宣孟書曰居室之義人之大倫思厚歡和之節樂定金石之固又自傷前遭不良比有去兩婦之名事誠不得不然豈中心之所好哉觀其書意似此妻又見出之長好儒學以詩春秋敎麗山下麗音力之反鄉里為之語曰道徳彬彬馮仲文論語曰文質彬彬然後君子鄭𤣥注彬彬雜半貌也舉孝㢘拜尚書郎忠勤不懈每奏事未報常俯伏省閤或從昬至明肅宗聞而嘉之使黃門持被覆豹勑令勿驚由是數加賞賜是時方平西域以豹有才謀拜為河西副校尉和帝初數言邊事奏置戊巳校尉城郭諸國復率舊職遷武威太守視事二年河西稱之復徴入為尚書永元}
