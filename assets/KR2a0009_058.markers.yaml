  - {type: variant, offset: 1303, length: 177, content: 士君子見之者靡不服深遠去玼吝將以道周性全無德而稱乎余曾祖穆侯以為憲隤然其處順淵乎其似道淺深莫臻其分清濁未議其方若及門於孔氏其殆庶乎故嘗著論云徐稺字孺子豫章南昌人也家貧常自耕稼非其力不食恭儉義讓所居服其德屢辟公府不起時陳蕃為太守以禮請署功曹稺不免之既謁而退蕃在郡不接賓客唯稺來特設一榻去則縣之後舉有道家拜太原太守皆不就延熹二年尚書令陳蕃僕射胡廣等上疏薦稺等, WYG: 良乆}
