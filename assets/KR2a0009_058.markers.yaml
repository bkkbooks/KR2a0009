  - {type: variant, offset: 1927, length: 0, content: '', krp: 濟而上征碣石海畔山也在今平州東洞庭湖名也中有洞庭山在今岳州西南衍既不同流俗情多憤怨故假言渉歴江山周流河海屈原云吾將逺逝以自適路脩逺以周流之類也瞻燕齊之舊居兮歴宋楚之名都哀羣后之不祀兮痛列國之為墟燕都今薊縣也齊都營丘今臨淄縣也宋都睢陽今宋州也楚初都丹陽在歸州後都郢在今荆州至考烈王為秦所逼又徙都壽春今壽州也不祀言皆絶也臧文仲曰咎陶庭堅不祀也馳中夏而升降兮路紆軫而多艱講聖哲之通論兮心愊憶而紛紜紆軫猶盤曲也愊憶猶鬱結也紛紜猶瞀亂也愊音普逼反惟天路之同軌兮或帝王之異政堯舜煥其蕩蕩兮禹承平而草命惟思也言思上天之路軌躅則同而帝王政敎參差有異班固曰仰天路而同軌白虎通曰徳合天者稱帝仁義合者稱王故言異政也煥文章貎蕩蕩政化平暢貎論語孔子曰惟天為大唯堯則之煥乎其有文章蕩蕩乎人無能名焉堯舜同道故兼言之舜禪位於禹禹承堯舜之後而改制度禪子故曰承平革命也幷日夜而幽思兮終悇憛而洞疑高陽􅴽其超遠兮世孰可與論兹孔子曰吾嘗終日不食終夜不寢以思楚辭云心悇憛而懷惑廣蒼云悇憛禍福未定也悇音它乎反憛音它紺反本或作㤞憏㤞音丑加反憏音丑制反未定也高陽帝顓頊之號也洞亦不定也史記曰虚惕洞疑又曰高陽氏沈深而有謀疏通而知事以其有謀而疏通故欲與之論事訊夏啓於丼澤兮傷帝典之始傾頌成康之載徳兮詠南風之歌聲訊問也啓禹子也尚書曰啟與有扈大戰于丼之野孔安國注云有扈與夏同姓恃親而不恭故啟征之於丼野丼野在今鄠縣啟既德薄同姓相攻故傷帝典之傾也易曰徳積載史記曰成康之際天下安寧刑錯三十餘年而不用周南召南謂國風之首篇歌文王之徳故詠之也非舜南風之歌思唐虞之晏晏兮揖稷契與為朋苗裔紛其條暢兮至湯武而勃興尚書考靈耀曰放勛欽明文思晏晏鄭𤣥注曰寛容覆載謂之晏稷名棄為堯后稷契為堯司徒契十四葉孫號湯滅夏桀而王有天下后稷十六葉孫周武王滅殷紂而王天下勃盛貌也左傳曰其興也勃焉昔三后之純粹兮每季世而窮禍弔夏桀於南巢兮哭殷紂於牧野三后夏殷周也惜其不能始終純茂毎至末代必窮其災禍湯放桀於南巢武王滅紂於牧野周之季業幽王為西戎所殺也離騷曰昔三后之純粹何桀紂之猖披南巢地名廬州巢縣也孔安國曰牧野紂近郊三十里地名也在今衞州詔伊尹於亳郊兮享呂望於酆洲功與日月齊光兮名與三王爭流詔召也亳湯都呂望周太師翼周滅殷者也酆文王所都在京兆杜陵亭水中可居曰洲也楊朱號乎衢路兮墨子泣乎白絲知漸染之易性兮怨造作之弗思淮南子曰楊子見逵路而哭之為其可以南可以北傷其本同而末異也墨子曰墨子見染絲歎曰染於蒼則蒼染於黄則黄五入之則為五色故染不可不愼非獨絲也國亦有染湯染伊尹紂染惡來也先王正道規摹有常苟生穿鑿則岐路競起故墨子知漸染之易性楊朱悲造作之弗思美關雎之識微兮愍王道之將崩拔周唐之盛徳兮捃桓文之譎功薛夫子韓詩章句曰詩人言雎鳩貞絜以聲相求必於河之洲蔽隱無人之處故人君動靜退朝入于私宮妃后御見去留有度今人君内傾於色大人見其萌故詠關睢說淑女正容儀也方言曰捃取也譎詐也齊桓公晉文公俱有覇功孔子曰晋文公譎而不正齊桓公正而不譎時周衰政亂桓文能統率諸侯翼戴天子故取其一切之功也忿戰國之遘禍兮憎權臣之擅彊黜楚子於南郢兮執趙武於溴梁周室衰微七國交爭是為戰國時吳楚僣號皆稱王孔子修春秋以蠻夷大者不過子故皆黜曰子又春秋稱公㑹晋宋衞鄭曹莒邾薛杞于溴梁戊寅大夫盟公羊傳曰諸侯皆在言大夫盟何信在大夫何言乎信在大夫徧刺天下之大夫也曷為徧刺天下之大夫君若綴旒然趙武晋卿趙文子也時晋為盟主文子晉之正卿而為不臣之行故欲執之也溴水名在河内軹縣東南至溫入河爾雅曰梁莫大於溴梁溴音古覓反善忠信之救時兮惡詐謀之妄作聘申叔於陳蔡兮禽荀息於虞虢申叔楚莊王時賢臣申叔時者也左傳陳夏徴舒弑靈公楚莊王伐陳殺夏徴舒因滅陳為縣申叔時諫莊王曰夏徴舒弑其君其罪大矣討而戮之君之義也諸侯之從曰討有罪也今縣陳貪其富也以討召諸侯而以貪終之無乃不可乎王曰善哉吾未之聞也乃復封陳聘謂問之也時惟在陳而兼言蔡者蓋以陳蔡相近因連言之也荀息晉大夫左傳曰晉荀息請以屈產之乘埀棘之璧假道於虞以伐虢公曰是吾寳也對曰若得道於虞猶外府也乃假道於虞以滅虢師還遂襲虞滅之誅犂鉏之介聖兮討臧倉之愬知􅮺子反於}
  - {type: variant, offset: 1929, length: 2, content: 廣戚, WYG: 兮爵管仲於夷儀犂鉏齊大夫介猶間也韓子曰仲尼為政於魯道不拾遺齊景公患之犂鉏曰去仲尼猶吹毛耳君何不遺魯公以女樂以驕其意魯君樂之必怠於政仲尼必諫諫而不聽必輕絶魯景公曰善乃令犂鉏以女樂遺魯哀公樂之果怠於政仲尼諫不聽遂去之孟子曰魯平公將出嬖人臧倉請曰它日君出必命有司所之今已駕矣敢請公曰吾將見孟子倉曰君何為輕身以先於匹夫者以為賢乎禮義由賢者出孟子後䘮踰前喪君無見焉公曰諾樂正子見孟子曰君將來見嬖人有臧倉者沮君是以不來孟子曰吾之不遇魯侯天也臧氏之子焉能使予不遇哉愬猶譛也知謂明於事也子反楚大夫也名側案􅮺字呂忱音仕眷反勉也東觀記作譏字此雖作􅮺蓋亦譏刺之意也春秋經書宋人及楚人平公羊傳曰外平不書此何以書貶曷為貶平者在下何休注云譏子反華元専盟不受君命故貶之然則子反違命盟蓋以平宋城下而言彭城者彭城宋之邑故舉以言之左傳宋大夫魚石等出奔楚楚伐宋取彭城以封魚石宋人圍彭城楚子重救彭城伐宋此言子反蓋衍誤也如曰不然或别有所據管仲齊桓公之相名夷吾夷儀郉邑也翟人滅邢管仲輔齊桓公築夷儀以封邢郉遷如歸於是天下諸侯知桓公之不為己動也是故天下歸之唯能用管夷吾而覇叻立事見國語以其能輔主成業故就夷儀而爵賞也劉攽曰注云倉曰君何為輕身以先於匹夫者案全文何當作所疾兵革之寖滋兮苦攻伐之萌生沈孫武於五湖兮斬白起於長平寖漸也孫武呉王闔廬將也善用兵越絶書曰太湖周三萬六千頃虞翻云太湖有五湖故謂之五湖滆湖洮湖射湖貴湖及太湖為五湖並太湖之小支俱連太湖故太湖兼得五湖之名在今湖州東也史記曰白起郿}
