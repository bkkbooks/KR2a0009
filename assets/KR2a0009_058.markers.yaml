  - {type: variant, offset: 1925, length: 1, content: 伯, krp: 通八荒八方荒逺之地覽河華之泱漭兮望秦晋之故國憤馮亭之不遂兮慍去疾之遭惑馮亭以上黨降趙秦破趙於長平而亭死故言不遂慍怨也馮去疾為秦丞相胡亥元年用趙高計始皇大臣咸見誅戮無遺脫者是遭惑也亭及去疾皆衍之先故遠懷憤怨也泱音烏朗反漭音莽流山岳而周覽兮徇碣石與洞庭浮江河而入海兮泝}
