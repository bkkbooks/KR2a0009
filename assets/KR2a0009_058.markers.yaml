  - {type: variant, offset: 1863, length: 1, content: 請, WYG: 記曰好問近於智力行近乎仁也而怨讐叢興譏議橫世蓋富貴易為善貧賤難為工也疏遠壠畝之臣無望高闕之下惶恐自陳以救罪尤書奏猶以前過不用衍不得志退而作賦又自論曰馮子以為夫人之徳不碌碌如玉落落如石老子道徳經之辭也言可貴可賤皆非道眞玉貌碌碌為人所貴石形落落為人所賤賤旣失矣貴亦未得言當處才不才之間風興雲蒸一龍一蛇與道翺翔與時變化夫豈守一節哉風興雲蒸言}
