  - {type: variant, offset: 2775, length: 5, content: 復用蟠獨歎, WYG: 不食周粟隱於首陽山掦雄反騷曰將折中乎重華列仙傳曰務光者夏時人也殷湯伐桀因光而謀光曰非吾事也至殷武丁時武丁欲以為相光不從遂投於梁山衍退不仕與務光辭相侔事相得故曰愈明愈猶益也欵子高於中野兮遇伯成而定慮欽眞人之德羙兮淹躊躇而弗去莊子曰伯成子高唐虞時為諸侯至禹為天子乃去而耕禹往見之曰堯理天下吾子立為諸侯堯授舜舜授予子去而耕其故何也子高}
