  - {type: variant, offset: 2896, length: 1, content: 吾, WYG: 故高冠長佩尊其威儀整斯服餙以異於衆也六醴蓋六氣也楚辭曰餐六氣而飲沆瀣茅君内傳曰句曲山上有神芝五種一曰龍仙芝似交龍之相負服之為太極仙卿第二名參成芝赤色有光其枝葉如金石之音折而續之卽復如故服之為太極大夫第三名燕胎芝其色紫形如葵葉上有燕象光明洞徹服一株拜為太清龍虎仙君第四名夜光芝其色青其實正白如李夜視其實如月光照洞一室服一株為太清仙官第五名曰玉芝剖食拜三官正員御史揵六枳而為籬兮築蕙若而為室播蘭芷於中庭兮列杜衡於外術自此以下說籬室庭除皆樹芬芳卉木喻己立身行道依仁履義猶屈原扈江蘺與薛芷紉秋蘭以為佩之類也揵立也枳芬木也晏子曰江南為橘江北為枳枳之為木芳而多刺可以為籬此云六枳東觀記作八枳案周書小開篇曰嗚呼汝何敬非時何擇非徳德枳維大人大人枳維公公枳維卿卿枳維大夫大夫枳維士登登皇皇日維國國枳維都都枳維邑邑枳維家家枳維欲無疆}
  - {type: page-break, offset: 2896, content: '', id: KR2a0009_WYG_058-41a, image: WYG0252/WYG0252-0698c.png}
