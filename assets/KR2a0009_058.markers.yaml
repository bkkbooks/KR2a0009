  - {type: variant, offset: 1843, length: 0, content: '', krp: 餘初譚著書言當世行事二十九篇號曰新論上書獻之世祖善焉新論一曰本造二王覇三求輔四言體五見徴六譴非七啟窹八袪蔽九正經十識通十一離事十二道賦十三辨惑十四述䇿十五閔友十六琴道本造閔友琴道各一篇餘並有上下東觀記曰光武讀之勑言卷大令皆别為上下凡二十九篇琴道一篇未成肅宗使班固續成之東觀記曰琴道未畢但有發首一章所著賦誄書奏凡二十六篇元和中肅宗行東廵狩至沛使使者祠譚冢鄉里以為榮馮衍傳馮衍字敬通京兆杜陵人也東觀記曰其先上黨潞人曾祖父奉世徙杜陵祖野王元帝時為大鴻臚野王字君卿奉世之長子也東觀記曰野王生座襲父爵為關内侯座生衍華嶠書曰衍祖父立生滿年十七喪父早卒滿生衍衍幼有竒才年九歳能誦詩至二十而博通羣書王莽時諸公多薦舉之者衍辭不肯仕時天下兵起莽遣更始將軍㢘丹討伐山東丹辟衍為掾與俱至定陶莽追詔丹曰倉廩盡矣府庫空矣可以怒矣可以戰矣將軍受國重任不捐身於中野無以報恩塞責丹惶恐夜召衍以書示之衍因説丹曰衍聞順而成者道之所大也逆而功者權之所貴也於正道雖違逆而事有成功者謂之權所謂反經合義者也是故期於有成不問所由論於大體不守小節昔逄丑父伏軾而使其君取飲稱於諸侯左氏傳齊晉戰于鞌晉卿韓厥逐及齊侯齊臣逄丑父乃與齊侯易位使齊侯御車韓厥將及齊侯丑父令齊侯如華泉取飲韓厥乃獻丑父於郤克郤克將戮之呼曰自今無有代其君任患者有一於此將為戮乎郤子曰人不難以死免其君我戮之不祥赦之以勸事君者鄭祭仲立突而出忽終得復位美於春秋蓋以死易生以存易亡君子之道也祭仲鄭大夫突及忽皆鄭莊公子也莊公薨太子忽當立公子突宋之出也故宋人執鄭祭仲公羊傳曰祭仲何以不名賢也何賢乎以為知權其知權柰何宋人執之謂曰為我出忽而立突祭仲不從其言則君必死國必亡從其言則君可以生易死國可以存易亡古人有權者祭仲是也權者反乎經後有善者也行權有道殺人以自生亡人以自存君子不為也詭於衆意寧國存身賢智之慮也詭違也故易曰窮則變劉攽曰案文多一曰字變則通通則久是以自天祐之吉無不利皆周易下繫之辭也若夫知其不可而必行之破軍殘衆無補於主身死之日負義於時負猶失也智者不為勇者不行且衍聞之得時無怠怠懈也言當急趋時張良以五世相韓椎秦始皇博浪之中張良大父開地相韓昭侯宣惠王襄哀王父平相釐王悼惠王五代相韓謂良父及祖相韓之五王也後秦㓕韓良家僮三百人乃悉以家財求客刺秦王得力士為鐡椎重百二十斤擊始皇於博浪沙中博浪地名在鄭州武陽縣南椎音力追反謂擊之也勇冠乎賁育名髙乎泰山孟賁夏育並古之勇士也前書音義曰孟賁生抜牛角夏育衞人力舉千鈞也將軍之先為漢信臣廉襃襄武人宣帝時為後將軍即丹之先新室之興英俊不附今海内潰亂人懷漢德甚於詩人思召公也愛其丼棠而况子孫乎人所歌舞天必從之詩小雅曰雖無徳與汝式歌且舞言漢氏之徳人歌舞之也尚書曰人之所欲天必從之方今為將軍計莫若屯據大郡鎭撫吏士砥礪其節百里之内牛酒日賜納雄桀之士詢忠智之謀要將來之心待從橫之變興社稷之利除萬人之害則福禄流於無窮功烈著於不滅何與軍覆於中原身膏於草野與猶如也功敗名喪耻及先祖哉聖人轉禍而為福智士因敗而為功願明公深計而無與俗同丹不能從進及睢陽復說丹曰蓋聞明者見於無形智者慮於未萌况其昭晳者乎晳明也商鞅謂秦孝公曰愚者闇於成事智者見於未萌凡患生於所忽禍發於細微司馬相如曰禍故多藏於隠微而發於人之所忽也敗不可悔時不可失公孫鞅曰有高人之行負非於世有獨見之慮見贅於人語見史記商君傳贅猶惡也史記贅作疑故信庸庸之論破金石之策庸常也金石以諭堅也襲當世之操失高明之徳夫决者智之君也疑者事之役也役猶賤也時不重至公勿再計丹不聽遂進及無鹽與赤眉戰死無鹽縣名屬東平郡故城在今鄆州須昌縣東衍乃亡命河東華嶠書曰丹死衍西歸吏以亡軍下司命乘傳逐捕故亡命更始二年遣尚書僕射鮑永行大將軍事安集北方永字君長司𨽻校尉宣之子衍因以計說永曰衍聞明君不惡切慤之言以測幽㝠之論忠臣不顧爭引之患以逹萬機之變慤實也幽㝠論深逺也爭引謂引事與君爭也事非一塗故曰萬機之變也書曰一日二日萬機東觀記衍更始時為偏將軍與鮑永相善更始既敗固守不以時下建武初為揚化大將軍掾辟鄧禹府數奏記於禹陳政言事自明君以下皆是諌鄧禹之詞非勸鮑永之説不知何據有此乖違是故君臣兩興功名兼立銘勒金石令聞不忘今衍幸逢寛明之日將値危言之時危猶髙也論語曰天下有道危言危行豈敢拱黙避罪而不竭其誠哉伏念天下離王莽之害久矣始自東郡之師離遭也莽居攝元年翟義起兵於東郡莽發八將軍以擊之東郡今滑州也繼以西海之役莽居攝元年西羗龎恬傳播等怨莽奪其地為西海郡攻西海太守程永莽遣䕶𦍑校尉竇況擊之巴蜀沒於南夷莽篡位貶西南夷㽛町王為侯王邯怨恨攻益州殺大尹程隆莽發巴蜀吏士擊之出入三年死者十七八緣邊破於北狄莽建國三年烏珠單于遣左賢王入雲中大殺吏人大軰萬餘中輩数千殺鴈門朔方太守略吏人畜產不可勝數緣邊虚耗也遠征萬里暴兵累年暴露也禍挐未解兵連不息挐謂相連引也刑法彌深莽以地皇元年以後為不須時令自是春夏斬人於市賦歛愈重衆彊之黨橫撃於外百僚之臣貪殘於内元元無聊饑寒並臻父子流亡夫婦離散廬落丘墟田疇蕪穢疾疫大興災異蜂起於是江湖之上海岱之濵風騰波涌更相駘藉莽時江湖海澤麋沸青徐荆楚之地搔擾前書音義曰跆蹈也今此為駘古字通四垂之人肝腦塗地死亡之數不啻太半殃咎之毒痛入骨髓匹夫僮婦咸懷怨怒僮猶賤也皇帝以聖德靈威龍興鳯舉率宛葉之衆將散亂之兵喢血昆陽劉攽曰案喢血是盟時喢血此當作喋與前書同也長驅武關破百萬之陳摧九虎之軍莽末下江兵鄧曅王匡攻武關莽乃拜將軍九人皆以虎為號以捍匡等擊破六虎敗走三虎乃保京師倉鄧曅等乃開武關迎更始靁震四海席卷天下席卷言無餘也攘除禍亂誅滅無道一朞之間海内大定繼髙祖之休烈脩文武之絶業社稷復存炎精更輝徳冠徃初功無與二此上二句司馬相如封禪書之辭天下自以去亡新就聖漢當蒙其福而頼其願樹恩布徳易以周洽其猶順驚風而飛鴻毛也言其易也王褒聖主得賢臣頌曰翼乎如鴻毛遇順風也然而諸將虜掠逆倫絶理倫亦理也殺人父子妻人婦女燔其室屋略其財產饑者毛食寒者裸跣毛草也臣賢案衍集毛字作無今俗語猶然者或古亦通乎寃結失望無所歸命今大將軍以明淑之徳秉大使之權綂三軍之政存撫并州之人惠愛之誠加乎百姓高世之聲聞乎羣士故其延頸企踵而望者非特一人也且大將軍之事豈得珪璧其行束修其心而已哉言當恢廓規摹不可空自清潔徒約束脩身而已將定國家之大業成天地之元功也昔周宣中興之主齊桓覇彊之君耳猶有申伯召虎夷吾吉甫申伯周宣王之元舅也召虎召穆公也吉甫謂尹吉甫也皆周宣王臣並見毛詩夷吾管仲之字也攘其蝥賊蝥賊食禾稼蟲名諭姦盗侵漁也蝥音牟安其彊宇況乎萬里之漢明帝復興而大將軍為之梁棟此誠不可以忽也左傳子產謂子皮曰子於鄭國棟也棟折榱崩僑將壓焉且衍聞之兵久則力屈人愁則變生今邯鄲之賊未滅眞定之際復擾邯鄲謂王郎也眞定謂劉掦也而大將軍所部不過百里守城不休戰軍不息兵革雲翔百姓震駭柰何自怠不為深憂夫并州之地東帶名關北逼彊胡井陘關也要害之塞故曰名關東觀記作石陘關年榖獨熟人庻多資斯四戰之地攻守之場也如其不虞何以待之故曰徳不素積人不為用備不豫具難以應卒史記子貢説晋君曰慮不先定不可以應卒卒音倉忽反今生人之命縣於將軍將軍所杖必須良才宜改易非任更選賢能夫十室之邑必有忠信東觀記曰無謂無賢路有聖人審得其人以承大將軍之明雖則山澤之人劉攽曰案此文雖則字顚倒當作則雖云云無不感德思樂為用矣然後簡精銳之卒發屯守之士三軍既整甲兵已具相其土地之饒觀其水泉之利制屯田之術習戰射之敎則威風遠暢人安其業矣若鎭太原撫上黨收百姓之歡心樹名賢之良佐天下無變則足以顯聲譽一朝有事則可以建大功惟大將軍開日月之明發深淵之慮監六經之論觀孫吳之䇿孫武呉王闔廬將吳起魏文侯將並著兵書也省羣議之是非詳衆士之白黑白黑猶賢愚也以超周南之迹垂丼棠之風令夫功烈施於千載富貴傳於無窮伊望之䇿何以加兹伊尹呂望永既素重衍為且受使得自置偏禆乃以衍為立漢將軍東觀記曰時永得置偏裨將五人也領狼孟長屯太原狼孟縣名屬太原郡故城在今并州陽曲縣東北與上黨太守田邑等繕甲養士扞衛幷土及世祖卽位遣宗正劉延攻天井關與田邑連戰十餘合延不得進邑迎母弟妻子為延所獲東觀記曰鄧禹使積弩將軍馮愔將兵擊邑愔悉得邑母弟妻子後邑聞更始敗乃遣使詣洛陽獻璧馬卽拜為上黨太守東觀記曰遣騎都尉弓里游諌大夫何叔武卽拜邑為上黨太守因遣使者招永衍永衍等疑不肯降而忿邑背前約東觀記衍與邑素誓刎頸俱受重任衍乃遺邑書曰蓋聞晉文出奔而予犯宣其忠晉文公重耳辟麗姬之難出奔狐偃勸令反國遂為覇主子犯即狐偃字也趙武逢難而程嬰明其賢趙盾晉卿生趙朔朔娶晉成公姊為夫人晉景公三年大夫屠岸賈誅趙氏殺趙朔滅其族朔妻有遺腹走公宫趙朔客程嬰公孫杵臼杵臼謂程嬰曰胡不死程嬰曰朔之婦有遺腹若幸而生男吾奉之即女也吾徐死耳居無何朔妻生男屠岸賈聞之乃索於宫中夫人置兒於絝中祝曰趙宗滅乎若啼即不滅若無聲及索兒竟無聲程嬰曰今一索不得後必復索之杵臼乃取它嬰兒負之匿山中諸將共攻殺杵臼幷孤兒然趙氏眞孤乃在程嬰所即趙武也居十五年晉景公乃立趙武為卿而復其田邑事見史記}
