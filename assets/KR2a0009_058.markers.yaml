  - {type: variant, offset: 1594, length: 202, content: 蕃曰徐稺袁閎韋著誰為先後蕃對曰閎出生公族聞道漸訓著長於三輔禮義之俗所謂不扶自直不鏤自雕至於稺者爰自江南卑薄之域而角立傑出宜當為先稺嘗為太尉黃瓊所辟不就及瓊卒歸葬稺乃負糧徒步到江夏赴之設雞酒薄祭哭畢而去不告姓名時會者四方名士郭林宗等數十人聞之疑其稺也乃選能言語生茅容輕騎追之及於塗容為設飯共言稼穡之事臨訣去謂容曰為我謝郭林宗大樹將顛非一繩所維何為栖栖不遑寧處及林宗有母憂稺往弔之置生芻一束於廬前而去衆怪不知, WYG: ''}
