  - {type: variant, offset: 1866, length: 0, content: '', WYG: 神藏與物變化隨時之宜無有常處化音協韻音花用之則行舎之則藏進退無主屈伸無常故曰有法無法因時為業有度無度與物趣舎史記司馬談之辭也言法度是非皆隨時俗物所趨則向之所舎則違之所謂隨時之義也常務道徳之實而不求當世之名闊略杪小之禮蕩佚人間之事放蕩縱逸不拘恒俗也正身直行恬然肆志顧嘗好俶儻之策時莫能聽用其謀顧猶及也俶儻卓異貌也喟然長歎自傷不遭遭遇也久棲遲於小官不得舒其所懷棲遲猶偃息也抑心折節意悽情悲夫伐氷之家不利雞豚之息言食厚禄不當求小利也禮記曰畜馬十乘不察於雞豚伐氷之家不畜牛羊伐氷謂卿大夫以上以其䘮祭得賜氷故言伐氷也韓詩外傳曰天子不言多少諸侯不言利害大夫不言委積駟馬之家不恃雞豚之息伐氷之家不恃牛羊之入也委積之臣不操市井之利韓詩外傳曰千乘之君不通貨財委積之臣不操市井之利是以貧窮有所勸而孤寡有所措也况歴位食禄二十餘年而財產益狹居處益貧惟夫君子之仕行其道也慮時務者不能興其徳為身求者不能成其功言不可兼也去而歸家復覉旅於州郡身愈據職家彌窮困卒離饑寒之災有喪元子之禍先將軍葬渭陵哀帝之崩也營之以為園奉世為右將軍即衍之曾祖故言先將軍渭陵元帝陵在長安北五十里哀帝義陵在長安北四十六里奉世墓入義陵塋中所以衍不得入𦵏而别求也於是以新豐之東鴻門之上壽安之中太上皇思東歸乃遷豐邑人於此立縣故曰新豐鴻門阪名前書音義曰在新豐東十七里舊大道北下阪口地埶高敞四通廣大南望酈山北屬涇渭東瞰河華龍門之陽三晉之路龍門河所經今絳州縣也三晉謂韓趙魏也西顧酆鄗周秦之丘宮觀之墟酆鄗二水名周文王都酆武王都鄗秦本封在隴西秦縣周平王東遷以後秦始有岐周之地故總言周秦之丘丘亦墟也通視千里覽見舊都遂定塋焉衍墓在今新豐縣南四里退而幽居蓋忠臣過故墟而歔欷孝子入舊室而哀歎史記曰箕子朝周過殷墟咸生禾黍箕子傷之欲哭則不可欲泣為其近婦人乃作麥秀之詩殷人聞之皆為流涕禮記檀弓曰反哭升堂反諸其所作也入室反諸其所養也反而亡焉失之哀於是為甚也每念祖考著盛德於前垂鴻烈於後遭時之禍墳墓蕪穢春秋蒸嘗昭穆無列司馬相如賦曰墳墓蕪穢而不修父為昭子為穆昭南靣穆北靣也年衰歳暮悼無成功將西田牧肥饒之野殖生產修孝道營宗廟廣祭祀然後闔門講習道徳觀覽乎孔老之論庻幾乎松喬之福列仙傳赤松子神農時雨師也服水玉能入火自燒常止西王母石室中能隨風上下王子喬周靈王太子晉也好吹笙作鳯鳴游伊洛之間道人浮丘公接以上嵩高山遂仙去也上隴阪陟高岡游精宇宙流目八紘尹文子曰四方上下曰宇蒼頡篇曰舟輿所届曰宙淮南子曰九州之外乃有八夤八夤之外乃有八紘也歴觀九州山川之體追覽上古得失之風愍道陵遲傷徳分崩夫覩其終必原其始故存其人而詠其道疆理九野經營五山𦕈然有思陵雲之意疆界也理正也詩曰我疆我理九野謂九州之野經營猶徃來五山卽五嶽也乃作賦自厲命其篇曰顯志顯志者言光明風化之情昭章𤣥妙之思也其辭曰開歳發春兮百卉含英開發皆始也爾雅曰春為發生卉草也楚辭曰獻歳發春兮甲子之朝兮汨吾西征君子舉事尚早故以朝言之汨行貌楚辭曰汨吾南征汨音于筆反發軔新豐兮裵回鎬京軔止車木也將行故發之陵飛廉而太息兮登平陽而懷傷飛㢘觀名武帝元封二年立於長安上有銅飛廉因以名焉前書音義曰飛廉神禽能致風氣有角而蛇尾文如豹文平陽縣名故城在今岐州岐山縣西南悲時俗之險阸兮哀好惡之無常時既險薄所以好惡不同楚辭曰悲時俗之迫阸也棄衡石而意量兮隨風波而飛揚衡秤衡也三十斤為鈞四鈞為石言時人棄衡石以意測量喻背法度也隨風波而飛掦言無志操也紛綸流於權利兮親靁同而妒異獨耿介而慕古兮豈時人之所憙言時俗溺於權利也同己則親之異己則妒之今己不與之同所以見惡也沮先聖之成論兮􅥞名賢之高風忽道徳之珍麗兮務富貴之樂耽沮敗也􅥞陵也耽亦樂也言時人之行如此遵大路而裵回兮履孔徳之窈㝠}
