  - {type: variant, offset: 559, length: 1, content: 赦, WYG: 右大將軍封武固侯時世祖自解所佩綬以帶忠東觀記曰上初至不脫衣帶衣服垢薄使忠解澣長襦忠更作新袍絝解支小單衣襪而上之因從攻下屬縣至苦陘苦陘縣名屬中山國章帝改曰漢昌自此已後隨代改之今定州唐昌縣是也世祖㑹諸將問所得財物唯忠獨無所掠世祖曰我欲特賜李忠諸卿得無望乎即以所乘大驪馬及繡被衣物賜之馬色黑而青曰驪進圍鉅鹿未下王郎遣將攻信都信都大姓馬寵等開城内之收太守宗廣及忠母妻而令親屬招呼忠時寵弟從忠為校尉忠即時召見責數以背恩反城因格殺之諸將皆驚曰家屬在人手中殺其弟何猛也忠曰若縱賊不誅則二心也世祖聞而美之謂忠曰今吾兵已成矣將軍可歸救老母妻子宜自募吏民能得家屬者賜錢千萬來從我取忠曰䝉明公大恩思得効命誠不敢内顧宗親世祖廼使任光將兵救信都光兵於道散降王郎無功而還㑹更始遣將攻破信都忠家屬得全世祖因使忠還行太守事收郡中大姓附邯鄲者誅殺數百人及任光歸郡忠廼還復為都尉建武二年更封中水侯中水縣屬涿郡}
  - {type: page-break, offset: 559, content: '', id: KR2a0009_WYG_051-5b, image: WYG0252/WYG0252-0590d.png}
  - {type: page-break, offset: 559, content: '', id: KR2a0009_WYG_051-6a, image: WYG0252/WYG0252-0591a.png}
