  - {type: variant, offset: 3666, length: 2, content: 野王, WYG: 東光侯東光今滄州縣也續漢書曰六年上令諸侯就國純上書自陳前在東郡案誅涿郡太守朱英親屬今國屬涿誠不自安制書報曰侯前奉公行法朱英久吏曉知義理何時當以公事相是非然受堯舜之罰者不能愛己也已更擇國土令侯無介然之憂乃更封純為東光侯純辭就國帝曰文帝謂周勃丞相吾所重}
