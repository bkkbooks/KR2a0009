  - {type: variant, offset: 3280, length: 5, content: 始親朝事忠, WYG: 紹封脩𤣥孫恭為門德亭侯邳彤傳邳彤字偉君信都人也父吉為遼西太守彤初為王莽和成卒正東觀漢記曰王莽分鉅鹿為和成郡居下曲陽以彤為卒正也世祖徇河北至下曲陽彤舉城降復}
