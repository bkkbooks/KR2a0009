  - {type: variant, offset: 3287, length: 2, content: 臨政, WYG: 太守留止數日世祖北至薊㑹王郎兵起使其將徇地所到縣莫不奉迎唯和成信都堅守不下彤聞世祖從薊還失軍欲至信都乃先使五官掾張萬督郵尹綏選精騎二千餘匹緣路迎世祖軍彤尋與世祖㑹信都世祖雖得二郡}
  - {type: page-break, offset: 3287, content: '', id: KR2a0009_WYG_051-8a, image: WYG0252/WYG0252-0592a.png}
  - {type: variant, offset: 3287, length: 2, content: 臨政, krp: 太守留止數日世祖北至薊㑹王郎兵起使其將徇地所到縣莫不奉迎唯和成信都堅守不下彤聞世祖從薊還失軍欲至信都乃先使五官掾張萬督郵尹綏選精騎二千餘匹緣路迎世祖軍彤尋與世祖㑹信都世祖雖得二郡}
  - {type: variant, offset: 3290, length: 0, content: '', WYG: 助而兵衆未合議者多言可因信都兵自送西還長安彤廷對曰議者之言皆非也吏民歌吟思漢久矣故更始舉尊號而天下嚮應三輔清宮除道以迎之一夫荷㦸大呼則千里之將無不捐城遁逃虜伏請降自上古以來亦未有感物動民其如此者也又卜者王郎假名因埶驅集烏合之衆遂震燕趙之地況明公奮二郡之兵揚嚮應之威以攻則何城不克以戰則何軍不服今釋此而歸豈徒空失河北必更驚動三輔墮損威重非計之得者也若明公無復征伐之意則雖信都之兵猶難㑹也何者明公既西則邯鄲城民不肯捐父母背城主而千里送公其離散亡逃可必也世祖善其言而止即日拜彤為後大將軍和成太守如故使將兵居前北至堂陽堂陽已反屬王郎彤使張萬尹綏先曉譬吏民世祖夜至即開門出迎引兵擊破白奢賊於中山自此常從戰攻信都復反為王郎郎所置信都王捕繫彤父弟及妻子使為手書呼彤曰降者封爵不降族滅彤涕泣報曰事君者不得顧家彤親屬所以至今得安於信都者劉公之恩也公方爭國事彤不得復念私也㑹更始所遣將攻㧞信都郎兵敗走彤家屬得免及拔邯鄲封武義侯建武元年更封靈壽侯靈壽縣名故城在今恒州靈壽縣西北行大司空事帝入洛陽拜彤太常月餘日轉少府是年免復為左曹侍中前書曰侍中有左右曹入侍天子故曰侍中常從征伐六年就國彤卒子湯嗣九年徙封樂陵侯樂陵縣名屬平原郡故城在今滄州樂陵縣東也十九年湯卒子某嗣史闕名也無子國除元}
