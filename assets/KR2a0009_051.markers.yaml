  - {type: variant, offset: 1081, length: 271, content: 陳伯敬者行必矩步坐必端膝呵叱狗馬終不言死目有所見不食其肉行路聞凶便解駕留止還觸歸忌則寄宿鄉亭年老寢滯不過舉孝廉後坐女壻亡吏太守邵夔怒而殺之時人罔忌禁者多談為證焉論曰曾子云上失其道民散久矣如得其情則哀矜而勿喜夫不喜於得情則恕心用恕心用則可寄枉直矣夫賢人君子斷獄其必主於此乎郭躬起自佐史小大之獄必察焉原其平刑審斷庶於勿喜者乎若乃推己以議物捨狀以貪情法家之能慶延于世蓋由此也陳寵字昭公沛國洨人也曾祖父咸成哀閒以律令為尚書平帝時王莽輔政多改漢制咸心非之及莽因呂寬事誅不附己者何武鮑宣等咸乃歎曰易稱君子見幾而作不俟終日吾可以逝矣即乞骸骨去職及莽篡位召咸, WYG: 泫谷水故}
