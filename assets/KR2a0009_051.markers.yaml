  - {type: variant, offset: 3663, length: 0, content: '', WYG: 劉揚復造作讖記云赤九之後癭揚為主漢以火德故云赤也光武於高祖九代孫故云九揚病癭欲以惑衆與綿曼賊交通綿曼縣名屬眞定國故城在今恒州石邑縣西北俗音訛謂之人文故城也建武二年春遣騎都尉陳副游擊將軍鄧隆徵揚揚閉城門不内副等乃復遣純持節行赦令於幽冀所過竝使勞慰王侯密勑純曰劉揚若見因而收之純從吏士百餘騎與副隆㑹元氏俱至眞定止傳舍揚稱病不謁以純眞定宗室之出男子謂姊妹之子為出也遣使與純書欲相見純報曰奉使見王侯牧守不得先詣如欲面㑹宜出傳舍時揚弟林邑侯讓及從兄細東觀記續漢書細竝作紺各擁兵萬餘人揚自恃衆强而純意安靜即從官屬詣之兄弟竝將輕兵在門外揚入見純純接以禮敬因延請其兄弟皆入廼閉閤悉誅之因勒兵而出眞定震怖無敢動者帝憐揚讓謀未發竝封其子復故國純還京師因自請曰臣本吏家子孫幸遭大漢復興}
