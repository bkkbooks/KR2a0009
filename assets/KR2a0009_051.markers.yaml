  - {type: variant, offset: 3652, length: 0, content: '', WYG: 時眞定王劉揚起兵以附王郎衆十餘萬世祖遣植說揚揚乃降世祖因留眞定納郭后后即揚之甥也故以此結之廼與揚及諸將置酒郭氏漆里舍漆園即郭氏所居之里名也劉攽曰按文無故忽有園字葢本是里字揚擊筑為歡因得進兵拔邯鄲從平河北建武二年更封植為昌城侯討密縣賊戰殁子向嗣帝使喜代將植營復為驍騎將軍封觀津侯觀津縣名故城在今德州蓨縣西北喜卒復以歆為驍騎將軍封浮陽侯浮陽縣名屬渤海郡在浮水之陽今滄州清池縣也喜歆從征伐皆傳國于後向徙封東武陽侯東武陽縣屬東郡在武水之陽故城在今魏州華陽縣南卒子述嗣永平十五年坐與楚王英謀反國除耿純傳耿純字伯山鉅鹿宋子人也父艾為王莽濟平尹莽改定陶國曰濟平也純學於長安因除為納言士王莽法古置納言之官即尚書也毎官皆置士故曰納言士也王莽敗更始立使舞隂王李軼降諸郡國純父艾降還為濟南太守時李軼兄弟用事專制方面賓客游說者甚衆純連求謁不得通久之廼得見因說軼曰大王以龍虎之姿遭風雲之時遭遇也易曰雲從龍風從虎奮迅拔起期月之間兄弟稱王拔猶卒也拔音歩末反期音朞而德信不聞於士民功勞未施於百姓寵祿暴興此智者之所忌也前書陳嬰母謂嬰曰暴得富貴者不祥也故云智者之所忌也兢兢自危猶懼不終而況沛然自足可以成功者乎公羊傳曰力沛然若有餘何休注曰沛有餘優饒貌軼竒之且以其鉅鹿大姓廼承制拜為騎都尉授以節令安集趙魏㑹世祖渡河至邯鄲純即謁見世祖深接之純退見官屬將兵法度不與它將同遂求自結納獻馬及縑帛數百匹世祖北至中山留純邯鄲㑹王郎反東觀記曰王郎舉尊號欲收純純持節與從吏夜遁出城駐節道中詔取行者車馬得數十馳歸宋子與從兄訢宿植俱詣上所在盧奴言王郎所反之狀世祖自薊東南馳純與從昆弟訢宿植}
