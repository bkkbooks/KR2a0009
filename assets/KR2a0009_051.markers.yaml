  - {type: variant, offset: 5054, length: 504, content: 誤為一拜而嫣受歐刀之誅臣願明主嚴天元之尊正乾剛之位職事巨細皆任賢能不宜復令女使干錯萬機重察左右得無石顯泄漏之姦尚書納言得無趙昌譖崇之詐公卿大臣得無朱博阿傅之援外屬近戚得無王鳳害商之謀若國政一由帝命王事每決於己則下不得偪上臣不得干君常雨大水必當霽止四方衆異不能為害書奏不省時三府任輕機事專委尚書而灾眚變咎輒切免公台忠以為非國舊體上疏諫曰臣聞君使臣以禮臣事君以忠故三公稱曰冢宰王者待以殊敬在輿為下御坐為起入則參對而議政事出則監察而董是非漢典舊事丞相所請靡有不聽今之三公雖當其名而無其實選舉誅賞一由尚書尚書見任重於三公陵以來其漸久矣臣忠心常獨不安是故臨事戰懼不敢穴見有所興造又不希意同僚以謬平典而謗讟日聞罪足萬死近以地震策免司空陳襃今者灾異復欲切讓三公昔孝成皇帝以妖星守心移咎丞相使賁麗納說方進方進自引卒不蒙上天之福徒乖宋景之誠故知是非之分較然有歸矣又尚書決事多違故典罪法無例詆欺為先文慘言醜有乖章憲宜責求其意割而勿聽上順國典下防威福置方員於規矩審輕重於衡石誠國家之典萬世之法也忠意常在襃崇大臣待下以禮其九卿有疾使者臨問加賜錢布皆忠所建奏頃之遷尚書令延光三年拜司隸校尉糾正中官外戚賓客近倖憚之不欲忠在內明年出為江夏, WYG: ''}
