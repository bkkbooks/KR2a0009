  - {type: variant, offset: 544, length: 1, content: 蒙, WYG: 云中尉又郡國志高密侯百官志皇子封每國傅相各一人中尉一人比二千石職如郡都尉主盜賊高密非郡為都字者誤劉攽曰注高密侯按文侯當作國高密實王國不當作侯也忠元始中以父任為郎署中數十人而忠獨以好禮脩整稱王莾時為新博屬長王莾改信都國曰新博都尉曰屬長也郡中咸敬信之}
