  - {type: variant, offset: 3653, length: 3, content: 秉權任, WYG: 率宗族賓客二千餘人續漢書曰皆衣縑襜褕絳衣也老病者皆載木自隨奉迎於育左傳曰又如是而嫁將就木焉木謂棺也老病者恐死故載以從軍育縣名故城在冀州拜純為前將軍封耿鄉侯酈元注水經曰郎水北有耿鄉光武封耿純為侯國俗謂之宜安城其故城在今恒州槀城縣西南也訢宿植皆偏將軍使與純居前降宋子從攻下曲陽及中山是時郡國多降邯鄲者純恐宗家懷異心廼使訢宿歸燒其廬舍世祖問純故對曰竊見明公單車臨河北非有府藏之蓄重賞甘餌可以聚人者也黄石公記曰芳餌之下必有懸魚重賞之下必有死夫易曰何以聚人曰財故純引之徒以恩德懷之是故士衆樂附今邯鄲自立北州疑惑純雖舉族歸命老弱在行猶恐宗人賓客半有不同心者故燔燒屋室絶其反顧之望世祖歎息及至鄗世祖止傳舍鄗大姓蘇公反城開門内王郎將李惲純先覺知將兵逆與惲戰大破斬之從平邯鄲又破銅馬時赤眉青犢上江大彤鐵脛五幡十餘萬衆並在射犬世祖引兵將擊之純軍在前去衆營數里賊忽夜攻純雨射營中矢下如雨也士多死傷純勒部曲堅守不動選敢死二千人俱持彊弩各傅三矢使銜枚間行傅著也繞出賊後齊聲呼譟彊弩並發賊衆驚走追擊遂破之馳騎白世祖世祖明旦與諸將俱至營勞純曰昨夜困乎純曰頼明公威德幸而獲全世祖曰大兵不可夜動故不相救耳軍營進退無常卿宗族不可悉居軍中廼以純族人耿伋為蒲吾長蒲吾縣名屬常山郡故城在今恒州靈壽縣南悉令將親屬居焉世祖即位封純高陽侯擊劉永於濟隂下定陶初純從攻王郎墮馬折肩時疾發廼還詣懷宮懷宮河内縣名有離宮焉}
