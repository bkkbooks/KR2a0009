  - {type: variant, offset: 1487, length: 1052, content: 郡吏辟司徒鮑昱府是時三府掾屬專尚交遊以不肯視事為高寵常非之獨勤心物務數為昱陳當世便宜昱高其能轉為辭曹掌天下獄訟其所平決無不厭服衆心時司徒辭訟久者數十年事類溷錯易為輕重不良吏得生因緣寵為昱撰辭訟比七卷決事科條皆以事類相從昱奏上之其後公府奉以為法三遷肅宗初為尚書是時承永平故事吏政尚嚴切尚書決事率近於重寵以帝新即位宜改前世苛俗乃上疏曰臣聞先王之政賞不僭刑不濫與其不得已寧僭不濫故唐堯著典眚灾肆赦周公作戒勿誤庶獄伯夷之典惟敬五刑以成三德由此言之聖賢之政以刑罰為首往者斷獄嚴明所以威懲姦慝姦慝既平必宜濟之以寬陛下即位率由此義數詔羣僚弘崇晏晏而有司執事未悉奉承典刑用法猶尚深刻斷獄者急於篣格酷烈之痛執憲者煩於詆欺放濫之文或因公行私逞縱威福夫為政猶張琴瑟大弦急者小弦絕故子貢非臧孫之猛法而美鄭喬之仁政詩云不剛不柔布政優優方今聖德充塞假于上下宜隆先王之道蕩滌煩苛之法輕薄箠楚以濟羣生全廣至德以奉天心帝敬納寵言每事務於寬厚其後遂詔有司絕鉆鑽諸慘酷之科解妖惡之禁除文致之請讞五十餘事定著于令是後人俗和平屢有嘉瑞漢舊事斷獄報重常盡三冬之月是時帝始改用冬初十月而已元和二年旱長水校尉賈宗等上言以為斷獄不盡三冬故陰氣微弱陽氣發泄招致灾旱事在於此帝以其言下公卿議寵奏曰夫冬至之節陽氣始萌故十一月有蘭射干芸荔之應時令曰諸生蕩安形體天以為正周以為春十二月陽氣上通雉雊雞乳地以為正殷以為春十三月陽氣已至天地已交萬物皆出蟄蟲始振人以為正夏以為春三微成著以通三統周以天元殷以地元夏以人元若以此時行刑則殷周歲首皆當流血不合人心不稽天意月令曰孟冬之月趣獄刑無留罪明大刑畢在立冬也又孟仲冬之月身欲寧事欲靜若以降威怒不可謂寧若以行大刑不可謂靜議者咸曰旱之所由咎在改律臣以為殷周斷獄不以三微而化致康平無有災害自元和以前皆用三冬而水旱之異往往為患由此言之災害自為它應不以改律秦為虐政四時行刑聖漢初興改從簡易蕭何草律季秋論囚俱避立春之月而不計天地之正二王之春實頗有違陛下探幽析微允執其中革百載之失建永年之功上有迎承之敬下有奉微之惠稽春秋之文當月令之意聖功美業不宜中疑書奏帝納之遂不復改竉性周密常稱人臣之義苦不畏慎自在樞機謝遣門人拒絕知友唯在公家而已朝廷器之皇后弟侍中竇憲薦真定令張林為尚書帝以問竉竉對林雖有才能而素行貪濁憲以此深恨竉林卒被用而以臧汙抵罪及帝崩憲等秉權常銜寵乃白太后令典喪事欲因過中之黃門侍郎鮑德素敬寵說憲弟夏陽侯瓌曰陳寵奉事先帝深見納任故久留臺閣賞賜有殊今不蒙忠能之賞而計幾微之故誠傷輔政容貸之德瓌亦好士深然之故得出為太山太守後轉廣漢太守, WYG: 信都縣}
