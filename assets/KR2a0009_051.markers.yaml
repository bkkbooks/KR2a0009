  - {type: variant, offset: 13, length: 0, content: '', WYG: 餘萬更始立曾遣使降拜曾東萊郡太守今萊州劉攽曰按他處復字郡名皆不言郡太守明此衍詡濟南太守皆行大將軍事是歲曾為其將所殺衆推詡為主更始封詡助國侯令罷兵歸本郡刁子都者東海人也起兵鄉里鈔擊徐兖界衆有}
