  - {type: punctuation, offset: 4231, content: 「, id: KR2a0009_ZHSJ_051-bkkpn1030}
  - {type: variant, offset: 4231, length: 674, content: 孝文皇帝定約禮之制光武皇帝絕告寧之典貽則萬世誠不可改宜復建武故事忠上疏曰臣聞之孝經始於愛親終於哀戚上自天子下至庶人尊卑貴賤其義一也夫父母於子同氣異息一體而分三年乃免於懷抱先聖緣人情而著其節制服二十五月是以春秋臣有大喪君三年不呼其門閔子雖要絰服事以赴公難退而致位以究私恩故稱君使之非也臣行之禮也周室陵禮制不序蓼莪之人作詩自傷曰瓶之罊矣惟罍之恥言己不得終竟子道者亦上之恥也高祖受命蕭何創制大臣有寧告之科合於致憂之義建武之初新承大亂凡諸國政多趣簡易大臣既不得告寧而羣司營祿念私鮮循三年之喪以報顧復之恩者禮義之方實為彫損大漢之興雖承衰敝而先王之制稍以施行故藉田之耕起於孝文孝廉之貢發於孝武郊祀之禮定於元成三雍之序備於顯宗大臣終喪成乎陛下聖功美業靡以尚茲孟子有言老吾老以及人之老幼吾幼以及人之幼天下可運於掌臣願陛下登高北望以甘陵之思揆度臣子之心則海內咸得其所宦豎不便之竟寢忠奏而從諷布議遂著于令忠以久次轉為僕射時帝數遣黃門常侍及中使伯榮往來甘陵而伯榮負寵驕蹇所經郡國莫不迎為禮謁又霖雨積時河水涌溢百姓騷動忠上疏曰臣聞位非其人則庶事不庶事不則政有得失政有得失則感動陰陽妖變為應陛下每引災自厚不責臣司臣司狃恩莫以為負故天心未得隔并屢臻青冀之域淫雨漏河徐岱之濱海水盆溢兗豫蝗蝝滋生荊楊稻收儉薄并涼二州羌戎叛戾加以百姓不足府帑虛匱自西徂東杼柚將空臣聞洪範五事一曰貌貌以恭恭作肅貌傷則狂而致常雨春秋大水皆為君上威儀不穆臨莅不嚴臣下輕慢貴倖擅權陰氣盛彊陽不能禁故為淫雨陛下以不得親奉孝德皇園廟比遣中使致敬甘陵朱軒軿馬相望道路可謂孝至矣然臣竊聞使者所過威權翕赫震動郡縣王侯, WYG: ''}
