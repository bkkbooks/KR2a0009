  - {type: variant, offset: 220, length: 228, content: 異於此兵事呼吸不容先關督帥且漢制棨戟即為斧鉞於法不合罪帝從躬議又有兄弟共殺人者而罪未有所歸帝以兄不訓弟故報兄重而減弟死中常侍孫章宣詔誤言兩報重尚書奏章矯制罪當斬帝復召躬問之躬對章應罰金帝曰章矯詔殺人何謂罰金躬曰法令有故誤章傳命之謬於事為誤誤者其文則輕帝曰章與囚同縣疑其故也躬曰周道如砥其直如矢君子不逆詐君王法天刑不可以委曲生意帝曰善遷躬廷尉正坐法免後三遷元和三年拜為廷尉躬家世掌法務在寬平及典理官決獄斷刑多依矜恕乃條諸重文可從輕者四十一事奏之事皆施行著于令, WYG: 稱}
