  - {type: variant, offset: 14, length: 0, content: '', WYG: 七萬更始立遣使降拜子都徐州牧為其部曲所殺餘黨復相聚與諸賊㑹於檀鄉今兖州瑕丘縣東北有檀鄉因號為檀鄉檀鄉渠帥董次仲始起茌平茌平縣名屬東郡故城在今博州聊城縣東茌音士疑反遂渡河入魏郡清河與五校合衆十餘萬建武元年世祖入洛陽遣大司馬吳漢等擊檀鄉明年春大破降之是歲更封光阿陵侯阿陵縣名屬涿郡食邑萬户五年徵詣京師奉朝請其冬卒子隗嗣後阮況為南陽太守}
