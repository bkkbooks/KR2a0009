  - {type: variant, offset: 11, length: 0, content: '', krp: 十一任光傳子隗任光字伯卿南陽宛人也少忠厚為鄉里所愛初為鄉嗇夫郡縣吏續漢志曰}
  - {type: variant, offset: 12, length: 0, content: '', WYG: 老游徼郡所署也秩百石掌一鄉人其鄉小者縣署嗇夫一人主知人善惡為役先後知人貧富為賦多少漢兵至宛軍人見光冠服鮮明令解衣將殺而奪之㑹光祿勲劉賜適至視光容貌長者乃救全之光因率黨與從賜為安集掾拜偏將軍與世祖破王尋王邑更始至洛陽以光為信都太守及王郎起郡國皆降之光獨不肯遂與都尉李忠令萬脩信都令也功曹阮況五官掾郭唐等續漢志曰五官掾掌署諸曹事同心固守廷掾持王郎檄東觀記扶柳縣廷掾詣府白光光斬之於市以狥百姓發精兵四千人城守更始二年春世祖自薊還狼狽不知所向傳聞信都獨為漢拒邯鄲即馳赴之光等孤城獨守恐不能全獨守無援故恐之聞世祖至大喜吏民皆稱萬歲即時開門與李忠萬脩率官屬迎謁世祖入傳舍謂光曰伯卿今埶力虛弱欲俱入城頭子路刁子都兵中何如邪光曰不可世祖曰卿兵少如何光曰可募發奔命出攻傍縣若不降者恣聽掠之人貪財物則兵可招而致也世祖從之拜光為左大將軍封武成侯留南陽宗廣領信都太守事使光將兵從光乃多作檄文曰大司馬劉公將城頭子路刁子都兵百萬衆從東方來擊諸反虜遣騎馳至鉅鹿界中吏民得檄傳相告語世祖遂與光等投暮入堂陽界投至也堂陽今冀州縣也使騎各持炬火彌滿澤中光炎燭天地舉城莫不震驚惶怖其夜即降旬日之間兵衆大盛因攻城邑遂屠邯鄲廼遣光歸郡城頭子路者東平人姓爰名曾字子路與肥城劉詡起兵盧城頭盧縣名屬太山郡今濟州縣故號其兵為城頭子路曾自稱都從事詡稱校三老寇掠河濟間衆至二}
