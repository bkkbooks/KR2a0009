  - {type: variant, offset: 3871, length: 284, content: 防禦不肅皆欲採獲虛名諱以盜賊為負雖有發覺不務清澄至有逞威濫怒無辜僵仆或有跼蹐比伍轉相賦斂或隨吏追赴周章道路是以盜發之家不敢申告鄰舍比里共相壓迮或出私財以償所亡其大章著不可掩者乃肯發露陵遲之漸遂且成俗寇攘誅咎皆由於此前年勃海張伯路可為至戒覆車之軌其迹不遠蓋失之末流求之本源宜糺增舊科以防來事自今彊盜為上官若它郡縣所糺覺一發部吏皆正法尉貶秩一等令長三月奉贖罪二發尉免官令長貶秩一等三發以上令長免官便可撰立科條處為詔文切勑刺史嚴加糺罰冀以猛濟寬驚懼姦慝頃季夏大暑而消息不協寒氣錯時水涌為變天之降異必有其故所舉有道之士可策問國典所務王事過差令處煖氣不效之意庶有讜言以承天誡元初, WYG: 民悅服十}
