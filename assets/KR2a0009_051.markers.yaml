  - {type: variant, offset: 3664, length: 0, content: '', WYG: 帝受命備位列將爵為通侯天下畧定臣無所用志願試治一郡盡力自効帝笑曰卿既治武復欲脩文邪廼拜純為東郡太守時東郡未平純視事數月盜賊清寧四年詔純將兵擊更始東平太守范荆荆降進擊太山濟南及平原賊皆平之居東郡四歲時發干長有罪純案奏圍守之奏未下長自殺純坐免以列侯奉朝請從擊董憲道過東郡百姓老小數千隨車駕涕泣云願復得耿君帝謂公卿曰純年少被甲胄為軍吏耳治郡廼能見思若是乎六年定}
