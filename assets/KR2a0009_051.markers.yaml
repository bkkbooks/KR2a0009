  - {type: variant, offset: 2540, length: 197, content: 州豪右并兼吏多姦貪訴訟日百數寵到顯用良吏王渙鐔顯等以為腹心訟者日減郡中清肅先是洛雒縣城南每陰雨常有哭聲聞於府中積數十年寵聞而疑其故使吏案行還言世衰亂時此下多死亡者而骸骨不得葬儻在於是寵愴然矜歎即勑縣盡收斂葬之自是哭聲遂絕及竇憲為大將軍征匈奴公卿以下及郡國無不遣吏子弟奉獻遺者而寵與中山相汝南張郴東平相應順守正不阿後和帝聞之擢寵為大司農郴太僕順左馮翊永元六年寵代郭躬為廷尉性仁矜及為理官數議疑獄常, WYG: ''}
