  - {type: variant, offset: 1972, length: 0, content: '', krp: 級得牛馬羊萬頭榖數萬斛因並河揚威武並音蒲浪反伺候車駕時大兵未進融乃引還帝以融信効著明益嘉之詔右扶風修理融父墳塋祠以太牢數馳輕使致遺四方珍羞梁統乃使人刺殺張𤣥遂與囂絶皆解所假將軍印綬七年夏酒泉太守竺曾以弟報怨殺人而去郡東觀記曰曽弟嬰報怨殺屬國侯王𦙍等曽慙而去郡融承制拜曾為武鋒將軍更以辛彤代之秋隗囂發兵寇安定帝將自西征之先戒融期㑹遇雨道斷且囂兵已退乃止融至姑臧姑臧縣名屬武威郡今涼州縣也西河舊事曰涼州城昔匈奴故蓋臧城後人音訛名姑臧也被詔罷歸融恐大兵遂久不出乃上書曰隗囂聞車駕當西臣融東下士衆騷動計且不戰囂將高峻之屬皆欲逢迎大軍後聞兵罷峻等復疑囂揚言東方有變西州豪傑遂復附從囂又引公孫述將令守突門突門守城之門墨子曰城百歩為一突門也臣融孤弱介在其間杜預注左傳云介猶間也雖承威靈宜速救助國家當其前臣融促其後緩急迭用首尾相資囂埶排迮排迮謂蹙迫也不得進退此必破也若兵不早進久生持疑則外長寇讐内示困弱復令讒邪得有因縁臣竊憂之惟陛下哀憐帝深美之八年夏車駕西征隗囂融率五郡太守及羌虜小月氏等小月氏西域胡國名歩}
