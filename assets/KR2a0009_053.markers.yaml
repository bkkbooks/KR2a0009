  - {type: variant, offset: 927, length: 283, content: 州所考遣鳳候終終為范游說坐徙北地帝東巡狩鳳皇黃龍並集終贊頌嘉瑞上述祖宗鴻業凡十五章奏上詔貰還故郡著春秋外傳十二篇改定章句十五萬言永元十二年徵拜郎中以病卒李法字伯度漢中南鄭人也博通羣書性剛而有節和帝永元九年應賢良方正對策除博士遷侍中光祿大夫歲餘上疏以為朝政苛碎違永平建初故事宦官權重椒房寵盛又譏史官記事不實後世有識尋功計德必不明信坐失旨下有司免為庶人還鄉里杜門自守故人儒生時有候之者言談之次問其不合上意之由法未嘗應對友人固問之法曰鄙夫可與事君乎哉苟患失之無所不至孟子有言夫仁者如射正己而後發發而不中不怨勝己者反諸身而已矣在家八年徵拜議郎諫議大夫正言極辭無改於舊出為汝南, WYG: 張掖}
