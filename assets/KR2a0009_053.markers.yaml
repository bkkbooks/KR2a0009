  - {type: variant, offset: 2040, length: 1, content: 尚, WYG: 盧水羌胡按湟水東經臨羌縣故城北又東盧溪水注之水出西南盧川即其地也萬二千騎出酒泉塞耿秉秦彭率武威隴西天水募士及羌胡萬騎出居延塞居延塞在今甘州張掖縣東北又太僕祭彤度遼將軍吳棠將河東北地西河羌胡及南單于兵萬一千騎出高闕塞高闕山名在朔方北騎都尉來苖護烏桓校尉文穆將太原鴈門代郡上谷漁陽右北平定襄郡兵及烏桓鮮卑萬一千騎出平城塞固忠至天山即祁連山也今在西州交河縣東北今名祁縣羅漫山擊呼衍王斬首千餘級呼衍王走追至蒲類海蒲類海今名婆悉海在今庭州蒲昌縣東南也留吏士屯伊吾盧城伊吾今伊州縣也本匈奴地明帝置宜禾都尉以為屯田故地今伊州納職縣伊吾故小城地是耿秉秦彭絶漠六百餘里至三木樓山匈奴中山名來苖文穆至匈奴河水上劉攽曰案匈河水名多一奴字前}
