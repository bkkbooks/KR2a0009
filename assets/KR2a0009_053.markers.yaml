  - {type: variant, offset: 4087, length: 214, content: 劭為袁紹軍謀校尉時始遷都於許舊章堙沒書記罕存劭慨然歎息乃綴集所聞著漢官禮儀故事凡朝廷制度百官典式多劭所立初父奉為司隸時並下諸官府郡國各上前人像贊劭乃連綴其名錄為狀人紀又論當時行事著中漢輯序撰風俗通以辯物類名號釋時俗嫌疑文雖不典後世服其洽聞凡所著述百三十六篇又集解漢書皆傳于時後卒於鄴弟子瑒璩並以文才稱中興初有應嫗者生四子而寡見神光照社試探之乃得黃金自是諸子宦學並有才名至瑒七世通顯霍諝字叔智魏郡鄴人也少為諸生明經有人誣諝舅宋光於, WYG: 憲}
