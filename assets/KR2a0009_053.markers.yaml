  - {type: variant, offset: 658, length: 264, content: 十餘萬言時太后兄衞尉馬廖謹篤自守不訓諸子終與廖交善以書戒之曰終聞堯舜之民可比屋而封桀紂之民可比屋而誅何者堯舜為之隄防桀紂示之驕奢故也詩曰皎皎練絲在所染之上智下愚謂之不移中庸之流要在教化春秋殺太子母弟直稱君甚惡之者坐失教也禮制人君之子年八歲為置少傅教之書計以開其明十五置太傅教之經典以道其志漢興諸侯王不力教誨多觸禁忌故有亡國之禍而乏嘉善之稱今君位地尊重海內所望豈可不臨深履薄以為至戒黃門郎年幼血氣方盛既無長君退讓之風而要結輕狡無行之客縱而莫誨視成任性鑒念前往可為寒心君侯誠宜以臨深履薄為戒廖不納子豫後坐縣書誹謗廖以就國終兄鳳為郡吏, WYG: 武威}
