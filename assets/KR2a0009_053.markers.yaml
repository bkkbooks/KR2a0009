  - {type: variant, offset: 3172, length: 0, content: '', WYG: 馬牛羊槖橐音託駝百餘萬頭於是溫犢須日逐溫吾夫渠王柳鞮等八十一部率衆降者前後二十餘萬人憲秉遂登燕然山去塞三千餘里刻石勒功紀漢威德令班固作銘曰惟永元元年秋七月有漢元舅曰車騎將軍竇憲寅亮聖明登翼王室寅敬亮信也尚書曰二公𢎞化寅亮天地登升也翼輔也納于大麓惟清緝熙孔安國注尚書曰麓錄也納之使大錄萬機也周頌曰惟清緝熙鄭𤣥注云光明也乃與執金吾耿秉述職巡御理兵於朔方左傳曰小有述職大有巡功又曰出曰理兵鷹揚之校螭虎之士爰該六師鷹揚如鷹之飛揚也詩云惟師尚父時惟鷹揚螭山神獸形也史記曰如羆如羆如豺如離徐廣曰離與螭同該備也詩云整我六師以脩我戎暨南單于東烏桓西戎氐羌侯王君長之羣驍騎三萬元戎輕武長轂四分暨及也元戎兵車也詩云元戎十乘以先啓行輕武言疾也長轂兵車雲輜蔽路萬有三千餘乘輜車也稱雲言多也勒以八陣莅以威神兵法有八陣圖𤣥甲耀日朱旗絳天𤣥甲鐵甲也前書曰發屬國之𤣥甲也遂陵高闕下鷄鹿經磧鹵絶大漠沙土曰漠直度曰絶斬溫禺以釁鼓血尸逐以染鍔溫禺尸逐皆匈奴王號也周禮殺人以血塗鼔謂之釁鍔刃也然後四校橫徂星流彗埽蕭條萬里野無遺寇於是域滅區單反斾而旋考傳驗圖窮覽其山川遂踰涿邪跨安侯乘燕然躡冒頓之區落焚}
  - {type: page-break, offset: 3172, content: '', id: KR2a0009_WYG_053-20a, image: WYG0252/WYG0252-0619a.png}
