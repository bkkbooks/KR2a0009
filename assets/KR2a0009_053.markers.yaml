  - {type: variant, offset: 1969, length: 0, content: '', WYG: 道絶馳還遣司馬席封間行通書東觀記及續漢書席皆作虞字帝復遣席封賜融友書所以尉藉之甚備尉藉解見隗囂傳融既深知帝意乃與隗囂書責讓之曰伏惟將軍國富政修士兵懷附親遇戹㑹之際國家不利之時謂漢遭王莽簒奪也守節不囘回邪也承事本朝後遣伯春囂子恂之字也委身於國無疑之誠於斯有效融等所以欣服高義願從役於將軍者良為此也而忿悁之間悁恚也改節易圖君臣分爭上下接兵言違背光武也委成功造難就委棄也去從義為橫謀去從背山東也為橫通西蜀也百年累之一朝毁之豈不惜乎殆執事者貪功建謀以至於此言隗囂執政事者貪有其功而立此逆謀也融竊痛之當今西州地埶局迫人兵離散易以輔人難以自建計若失路不反聞道猶迷淮南子曰通於道者如車軸不運於己而與轂致數千里不通於道者若迷惑告以東西南北然猶復迷惑矣不南合子陽則北入文伯耳文伯盧芳也夫負虛交而易强禦恃遠救而輕近敵負亦恃也易輕也恃公孫述而輕光武也易音以豉反未見其利也融聞智者不危衆以舉事仁者不違義以要功今以小敵大於衆何如言危衆也棄子徼功於義何如言違義也且初事本朝稽首北面忠臣節也稽首拜天子禮也禮君南嚮答陽之義臣北面答君也及遣伯春垂涕相送慈父恩也俄而背之謂吏士何忍而棄之謂留子何留子謂見在之子對伯春故曰留也自起兵以來轉相攻擊城郭皆為丘墟生人轉於溝壑今其存者非鋒刃之餘則流亡之孤迄今傷痍之體未愈哭泣之聲尚聞幸賴天運少還而大將軍復重於難是使積痾不得遂瘳幼孤將復流離其為悲痛尤足愍傷言之可為酸鼻宋玉曰孤子寡婦寒心酸鼻庸人且猶不忍況仁者乎融聞為忠甚易得宜實難左傳曰忠為令德非其人猶不可況不令乎憂人大過以德取怨詩曰不以我為德反以我為讐知且以言獲罪也區區所獻唯將軍省焉囂不納融乃與五郡太守共砥厲兵馬上疏請師期帝深嘉美之乃賜融以外屬圖及太史公五宗外戚世家景帝子十三人為王而母五人同母者為一宗故曰五宗言景帝以竇氏所生而致子孫衆多也魏其侯列傳竇嬰太后從兄子也封魏其侯魏其縣屬琅邪郡詔報曰每追念外屬孝景皇帝出自竇氏出生也爾雅曰男子謂姊妹之子曰出定王景帝之子朕之所祖昔魏其一言繼統以正梁孝王景帝弟也亦竇太后所生梁王朝因昆弟燕飲是時景帝未立太子酒酣帝從容曰千秋之後傳梁王太后驩竇嬰引巵酒進上曰天下者高祖天下父子相傳漢之約也帝何以得傳梁王帝遂止矣長君少君尊奉師傳長君竇大后兄也少君太后弟廣國之字也綘灌等以兩人所出微為擇師傳長者有節行者與居長君少君由此為退讓君子不以富貴驕人見前書脩成淑德施及子孫施延也音羊䜴反此皇太后神靈上天祐漢也從天水來者寫將軍所讓隗囂書痛入骨髓畔臣見之當股慄慙愧忠臣則酸鼻流涕義士則曠若發矇說文曰曠明也有眸子而無見曰矇前書揚雄曰乃今日發矇廓然光照矣非忠孝慤誠孰能如此說文曰慤謹也慤或作懿豈其德薄者所能克堪囂自知失河西之助族禍將及欲設間離之說亂惑眞心轉相解搆相解說而結搆以成其姦又京師百僚不曉國家及將軍本意多能採取虛偽誇誕妄談令忠孝失望傳言乖實毁譽之來皆不徒然不可不思今關東盜賊已定大兵今當悉西將軍其抗厲威武以應期㑹融被詔即與諸郡守將兵入金城初更始時先零}
