  - {type: variant, offset: 3173, length: 1, content: 弱, WYG: 上之龍庭四校四面之校橫徂橫行也星流彗埽言疾也安侯水名冒頓單于頭曼子也區落謂東滅東胡西走月氐南取樓煩悉收秦所奪匈奴地冒頓子稽粥號老上單于匈奴五月大㑹龍庭祭其先天地鬼神今皆焚蕩之上以攄高文之宿憤光祖宗之𤣥靈下以安固後嗣恢拓境宇振大漢之天聲高帝被冒頓單于圍於平城七日孝文帝時匈奴寇邊殺太守帝欲自征太后不許拓開也天聲雷霆之聲甘泉賦曰天聲起兮勇士厲恢大也兹所謂一勞而久逸暫費而永寧者也揚雄曰以為不一勞者不久逸不暫費者不永寧也乃遂封山刋石昭銘上德上猶至也老子曰上德不德是以有德其辭曰鑠王師兮征荒裔鑠美也詩曰於鑠王師遵養時晦勦凶虐兮􅎒海外勦絶􅎒整齊也詩云相土烈烈海外有􅎒夐其邈兮亘地界夐邈皆遠也亘竟也封神丘兮建隆嵑神丘即燕然山也方者謂之碑員者謂之碣嵑碣也協韻音其例反熙帝載兮振萬世熙廣也載事也書曰奮庸熙帝之載憲乃班師而還遣軍司馬吳汜梁諷奉金帛遺北單于宣明國威而兵隨其後時虜中乖亂汜諷所到輒招降之前後}
