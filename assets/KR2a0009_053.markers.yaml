  - {type: variant, offset: 4672, length: 1, content: 德, WYG: 憲前歲出征克滅北狄朝加封賞固讓不受舅氏舊典並䝉爵土西漢故事帝舅皆封侯其封憲冠軍侯邑二萬户篤郾侯景汝陽侯瓌夏陽侯各六千户憲獨不受封遂將兵出鎭涼州以侍中鄧疊行征西將軍事為副北單于以漢還侍弟復遣車諧儲王等款居延塞欲入朝見願請大使憲上遣大將軍中護軍班固行中郎將與司馬梁諷迎之㑹北單于為南匈奴所破被創遁走固至私渠海而還憲以北虜微弱遂欲滅之明年復遣右校尉耿䕫司馬任尚趙博等將兵擊北虜於金微山大破之克獲甚衆北單于逃走不知所在憲既平匈奴威名大}
