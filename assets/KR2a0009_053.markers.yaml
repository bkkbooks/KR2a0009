  - {type: variant, offset: 5652, length: 343, content: 郡太守及屬縣有臧汙者悉徵案罪威風大行中平元年與中郎將朱儁擊黃巾賊於宛破之張忠怨璆與諸閹官構造無端璆遂以罪徵有破賊功得免官歸家後再徵遷汝南太守轉東海相所在化行獻帝遷許以廷尉徵當詣京師道為袁術所劫授璆以上公之位璆乃歎曰龔勝鮑宣獨何人哉守之必死術不敢逼術死軍破璆得其盜國璽及還許上之并送前所假汝南東海二郡印綬司徒趙溫謂璆曰君遭大難猶存此邪璆曰昔蘇武困於匈奴不隊七尺之節況此方寸印乎後拜太常使持節拜曹操為丞相操以相讓璆璆不敢當卒於官論曰孫懿以高明見忌而受欺於陰計翟酺資譎數取通而終之以謇諫豈性智自有周偏先後之要殊度乎應氏七世才聞而奉劭采章為盛及撰著篇籍甄紀異知雖云小道亦有可觀者焉延璆應對辯正而不可犯陵上之尤斯固辭之不可以已也贊曰楊終李法華陽有聞二應克聰亦表汝濆翟酺詐懿霍諝請舅延能訐帝璆亦啎后, WYG: 十三考證}
