  - {type: variant, offset: 2010, length: 0, content: '', WYG: 大司空融自以非舊臣一旦入朝在功臣之右每召㑹進見容貌辭氣卑恭己甚帝以此愈親厚之融小心久不自安數辭讓爵位因侍中金遷口達至誠金遷安上之曾孫安上日磾弟倫之子遷哀帝時為尚書令又上疏曰臣融年五十三有子年十五質性頑鈍臣融朝夕教導以經藝不得令觀天文見讖記誠欲令恭肅畏事恂恂循道不願其有才能何况乃當傳以連城廣土享故諸侯王國哉因復請間求見帝不許後朝罷逡巡席後帝知欲有讓遂使左右傳出它日㑹見迎詔融曰日者知公欲讓職還土日者猶往日也故命公暑熱且自便今相見宜論他事勿得復言融不敢重陳請二十年大司徒戴渉坐所舉人盜金下獄帝以三公參職不得已乃策免融明年加位特進二十三年代隂興行衞尉事特進如故又兼領}
