  - {type: variant, offset: 1968, length: 0, content: '', WYG: 辛彤為敦煌太守厙鈞為金城太守融居屬國領都尉職如故置從事監察五郡河西民俗質樸而融等政亦寛和上下相親晏然富殖脩兵馬習戰射明烽燧之警羌胡犯塞融輒自將與諸郡相救皆如符要赴敵不失期契也每輙自破之其後匈奴懲乂懲創也說文云乂亦懲也稀復侵寇而保塞羌胡皆震服親附安定北地上郡流人避凶饑者歸之不絶融等遙聞光武即位而心欲東向以河西隔遠未能自通時隗囂先稱建武年號融等從受正朔囂皆假其將軍印綬囂外順人望内懷異心使辯士張𤣥游說河西曰更始事業已成尋復亡滅此一姓不再興之効今即有所主便相係屬一旦拘制自令失柄後有危殆雖悔無及今豪傑競逐雌雄未決項羽謂高祖曰願與沛公決雌雄當各據其土宇與隴蜀合從前書音義曰以利合為從以威埶相脅曰横高可為六國下不失尉佗佗姓趙眞定人也陳勝起佗行南海尉遂王有南越故曰尉佗也融等於是召豪傑及諸太守計議其中智者皆曰漢承堯運左傳曰陶唐氏既衰其後有劉累學擾龍事孔甲為御龍氏春秋時晉卿士㑹即其後也士㑹奔秦後歸晉其處者為劉氏戰國時劉氏自秦遷於魏魏遷大梁都於豐號豐公即太上皇父也故曰漢承堯運歴數延長今皇帝姓號見於圖書謂河圖赤伏符曰劉秀發兵捕不道自前世博物道術之士谷子雲夏賀良等建明漢有再受命之符言之久矣前書成帝時谷永上書曰陛下當陽數之標季渉三七之節紀哀帝時夏賀良言赤精子讖漢家歴運中衰當再受命矣故劉子駿改易名字冀應其占劉歆以哀帝建平元年改名秀字潁叔冀應符命及莽末道士西門君惠言劉秀當為天子遂謀立子駿事覺被殺出謂百姓觀者曰劉秀眞汝主也皆近事㬥著㬥露也著見也智者所共見也除言天命且以人事論之今稱帝者數人而洛陽土地最廣甲兵最强號令最明觀符命而察人事它姓殆未能當也諸郡太守各有賔客或同或異融小心精詳遂決策東向五年夏遣長史劉鈞奉書獻馬先是帝聞河西完富地接隴蜀常欲招之以逼囂述亦發使遺融書遇鈞於道即與俱還帝見鈞歡甚禮饗畢乃遣令還賜融璽書曰制詔行河西五郡大將軍事屬國都尉勞鎭守邊五郡兵馬精彊倉庫有蓄民庶殷富外則折挫羌胡内則百姓蒙福威德流聞虛心相望道路隔塞邑邑何已長史所奉書獻馬悉至深知厚意今益州有公孫子陽天水有隗將軍方蜀漢相攻權在將軍舉足左右便有輕重猶蒯通曰與楚即楚勝與漢即漢勝以此言之欲相厚豈有量哉諸事具長史所見將軍所知王者迭興千載一㑹言時難得而易失也欲遂立桓文輔微國當勉卒功業周室微弱齊桓晉文輔之以霸天下欲三分鼎足連衡合從亦宜以時定蒯通說韓信曰三分天下鼎足而立天下未并吾與爾絶域非相吞之國今之議者必有任囂效尉佗制七郡之計秦胡亥時南海尉任囂病且死召龍川令趙佗語曰番禺負山險阻南北東西數千里頗有中國人相輔此亦一州之主可為國故召公即令行南國尉事地理志曰蒼梧鬱林合浦交阯九眞南海日南皆越之分也此為七郡也效致也流俗本作教者誤也劉攽曰令行南國尉事按文國當作海王者有分土無分民自適己事而已今以黄金二百斤賜將軍便宜輒言因授融為涼州牧璽書既至河西咸驚以為天子明見萬里之外網羅張立一作𤣥之情融即復遣鈞上書曰臣融竊伏自惟幸得託先后末屬蒙恩為外戚累世二千石至臣之身復備列位假歴將帥假猶濫也守持一隅以委質則易為辭以納忠則易為力書不足以深達至誠故遣劉鈞口陳肝膽自以底裏上露長無纎介底裏皆露言無藏隱而璽書盛稱蜀漢二主三分鼎足之權任囂尉佗之謀竊自痛傷臣融雖無識猶知利害之際順逆之分豈可背眞舊之主事姦偽之人廢忠貞之節為傾覆之事棄已成之基求無冀之利此三者雖問狂夫猶知去就而臣獨何以用心謹遣同產弟友詣闕口陳區區友至高平高平今涼州縣也㑹囂反}
