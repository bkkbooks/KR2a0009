  - {type: variant, offset: 2034, length: 0, content: '', WYG: 數下詔切責融戒以竇嬰田蚡禍敗之事田蚡武帝王皇后異父弟也為丞相搆㑹竇嬰之罪使至誅戮事見前書融惶恐乞骸骨詔令歸第養病歲餘聽上衞尉印綬賜養牛上樽酒融在宿衞十餘年年老子孫縱誕多不法穆等遂交通輕薄屬託郡縣干亂政事以封在安豐欲令姻戚悉據故六安國遂矯稱隂太后詔令六安侯劉盱去婦因以女妻之五年盱婦家上書言狀帝大怒乃盡免穆等官諸竇為郎吏者皆將家屬歸故郡獨留融京師穆等西至函谷關有詔悉復追還㑹融卒時年七十八諡曰戴侯賻送甚厚帝以穆不能脩尚不能脩整自高尚也而擁富貲居大第常令謁者一人監護其家居數年謁者奏穆父子自失埶數出怨望語帝令將家屬歸本郡唯勲以泚陽主壻留京師穆坐賂遺小吏郡捕繫與子宣俱死平陵獄勲亦死洛陽獄久之詔還融夫人與小孫一人居洛陽家舍十四年封勲弟嘉為安豐侯食邑二千户奉融後和帝初為少府及勲子大將軍憲被誅免就國嘉卒子萬全嗣萬全卒子㑹宗嗣萬全弟子武别有傳論曰竇融始以豪俠為名拔起風塵之中拔音歩末反拔卒也亦音彭八反義兩通以投天隙投㑹天之間隙遂蟬蛻王侯之尊說文曰蟬蛻所解皮也言去微至貴也蛻音稅終膺卿相之位此則徼功趣埶之士也及其爵位崇滿至乃放遠權寵恂恂似若不能己者又何智也言融之心實欲去}
