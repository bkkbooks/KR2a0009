  - {type: variant, offset: 4785, length: 5, content: 莫敢違啎諝, WYG: 流君子所甚惡焉夫二三子得之不過房幄之間非復搜揚仄陋選舉而登也二三子謂衞霍及憲也皆緣椒房幃幄之恩耳當青病奴僕之時衞青本平陽公主家童所生相者見之曰貴人官至封侯青笑曰人奴之生無笞罵足矣安得封侯哉竇將軍念咎之日謂太后閉之南宮欲誅之日也乃庸力之不暇思鳴之無晨吳志諸葛瑾曰失旦之雞復思一鳴也何意裂膏腴享崇號乎東方朔稱用之則為虎不用則為鼠信矣以此言之士有懷琬琰以就煨塵者亦何可支哉琬琰美玉也楚詞曰懷琬琰以為心支計也亦何可計言其多也章字伯向少好學有文章}
  - {type: page-break, offset: 4785, content: '', id: KR2a0009_WYG_053-26a, image: WYG0252/WYG0252-0622a.png}
