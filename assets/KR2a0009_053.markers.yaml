  - {type: variant, offset: 3300, length: 542, content: 罪疑從輕議活次玉劭後追駮之據正典刑有可存者其議曰尚書稱天秩有禮五服五章哉天討有罪五刑五用哉而孫卿亦云凡制刑之本將以禁暴惡且懲其末也凡爵列官秩賞慶刑威皆以類相從使當其實也若德不副位能不稱官賞不酬功刑不應罪不祥莫大焉殺人者死傷人者刑此百王之定制有法之成科高祖入關雖尚約法然殺人者死亦無寬降夫時化則刑重時亂則刑輕書曰刑罰時輕時重此之謂也軍愚狷妄自投斃昔召忽親死子糾之難而孔子曰經於溝瀆人莫之知朝氏之父非錯刻峻遂能自隕其命班固亦云不如趙母指括以全其宗傳曰僕妾感慨而致死者非能義勇顧無慮耳夫刑罰威獄以類天之震燿殺戮也溫慈和惠以放天之生殖長育也是故春一草枯則為灾秋一木華亦為異今殺無罪之初軍而活當死之次玉其為枯華不亦然乎陳忠不詳制刑之本而信一時之仁遂廣引八議求生之端夫親故賢能功貴勤賓豈有次玉當罪之科哉若乃小大以情原心定罪此為求生非謂代死可以生也敗法亂政悔其可追劭凡為駮議三十篇皆此類也又刪定律令為漢儀建安元年乃奏之曰夫國之大事莫尚載籍載籍也者決嫌疑明是非賞刑之宜允獲厥中俾後之人永為監焉故膠東西相董仲舒老病致仕朝廷每有政議數遣廷尉張湯親至陋巷問其得失於是作春秋決獄二百三十二事動以經對言之詳矣逆臣董卓蕩覆王室典憲焚燎靡有孑遺開辟以來莫或茲酷今大駕東邁巡省許都拔出險難其命惟新臣累世受恩榮祚豐衍竊, WYG: 單于}
