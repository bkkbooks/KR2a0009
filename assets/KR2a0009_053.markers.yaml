  - {type: variant, offset: 286, length: 269, content: 安土重居謂之衆庶昔殷民近遷洛邑且猶怨望何況去中土之肥饒寄不毛之荒極乎且南方暑濕障毒互生愁困之民足以感動天地移變陰陽矣陛下留念省察以濟元元書奏肅宗下其章司空第五倫亦同終議太尉牟融司徒鮑昱校書郎班固等難倫以施行既久孝子無改父之道先帝所建不宜回異終復上書曰秦築長城功役繁興胡亥不革卒亡四海故孝元𠫓廾珠崖之郡光武絕西域之國不以介鱗易我衣裳魯文公毀泉臺春秋譏之曰先祖為之而己毀之不如勿居而已以其無妨害於民也襄公作三軍昭公舍之君子大其復古以為不舍則有害於民也今伊吾之役樓蘭之屯久而未還非天意也帝從之聽還徙者悉罷邊屯終又言宣帝博徵羣儒論定五經於石渠閣方, WYG: ''}
