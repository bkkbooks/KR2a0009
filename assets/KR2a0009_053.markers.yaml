  - {type: variant, offset: 4781, length: 2, content: 公卿, WYG: 殺後和熹鄧后臨朝永初三年詔諸竇前歸本郡者與安豐侯萬全俱還京師萬全少子章論曰衞青霍去病資强漢之衆連年以事匈奴國耗太半矣而猾虜未之勝後世猶傳其良將豈非以身名自終邪竇憲率羌胡邊雜之師一舉而空朔庭至乃追奔稽落之表飲馬北鞮之曲銘石負鼎薦告清廟列其功庸兼茂於前多矣而後世莫稱者章末釁以降其實也降損也是}
