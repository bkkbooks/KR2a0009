  - {type: variant, offset: 4770, length: 1, content: 時, WYG: 朝臣震懾望風承㫖而篤進位特進得舉吏漢法三公得舉吏見禮依三公景為執金吾瓌光祿勲權貴顯赫傾動京都雖俱驕縱而景為尤甚奴客緹騎依倚形埶侵陵小人漢官儀曰執金吾緹騎二百人說文曰緹帛丹黃色也言奴客及緹騎並為縱橫也强奪財貨簒取罪人妻畧婦女商賈閉塞如避寇讐有司畏懦莫敢舉奏太后聞之使謁者策免景官以特進就朝位瓌少好經書節約自脩出為魏郡遷潁川太守劉攽曰案文魏郡下少太守二字竇氏父子兄弟並居列位充滿朝廷叔父霸為城門校尉霸弟襃將作大匠襃弟嘉少府其為侍中將大夫郎吏十餘人憲既負重勞陵肆滋甚四年封鄧疊為穰侯疊與其弟歩兵校尉磊及母元又憲女壻射聲校尉郭舉舉父長樂少府璜太后居長樂宮故有少府秩二千石皆相交結元舉並出入禁中舉得幸太后遂共圖為殺害帝隂知其謀乃與近幸中常侍鄭衆定議誅之以憲在外慮其懼禍為亂忍而未發㑹憲及鄧疊班師還京師詔使大鴻臚持節郊迎賜軍吏各有差憲等既至帝乃幸北宮詔執金吾五校尉勒兵屯衞南北宮閉城門收捕疊磊璜舉皆下獄誅家屬徙合浦遣謁者僕射收憲}
