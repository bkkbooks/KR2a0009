  - {type: variant, offset: 2009, length: 0, content: '', WYG: 遂共進軍囂衆大潰城邑皆降帝高融功下詔以安豐陽泉蓼安安風四縣四縣並屬廬江郡安豐今壽州縣也故城在今霍山縣西北安風本漢六安國及陽泉故城並在今安豐縣南杜預注左傳曰蓼在今安豐蓼音了劉攽曰蓼安按文多安字此縣名蓼而已封融為安豐侯弟友為顯親侯顯親縣故城在今秦州成紀縣東南也遂以次封諸將帥武鋒將軍竺曾為助義侯武威太守梁統為成義侯張掖太守史苞為褒義侯金城太守庫鈞為輔義侯酒泉太守辛彤為扶義侯封爵既畢乘輿東歸悉遣融等西還所鎭融以兄弟並受爵位久專方面懼不自安數上書求代詔報曰吾與將軍如左右手耳韓信亡蕭何自追之人曰丞相何亡高祖聞之如失左右手耳見前書數執謙退何不曉人意勉循士民無擅離部曲及隴蜀平詔融與五郡太守奏事京師官屬賔客相隨駕乗千餘兩馬牛羊被野融到詣洛陽城門上涼州牧張掖屬國都尉安豐侯印綬詔遣使者還侯印綬引見就諸侯位賞賜恩寵傾動京師數月拜為冀州牧十餘日又}
