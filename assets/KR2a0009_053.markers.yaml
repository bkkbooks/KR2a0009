  - {type: variant, offset: 3885, length: 201, content: 十篇蠲去復重為之節文又集駮議三十篇以類相從凡八十二事其見漢書二十五漢記四皆刪潤色以全本體其二十六博採古今瓌瑋之士文章煥炳德義可觀其二十七臣所創造豈繄自謂必合道衷心焉憤邑聊以藉手昔鄭人以乾鼠為璞鬻之於周宋愚夫亦寶燕石緹十重夫覩之者掩口盧胡而笑斯文之族無乃類旃左氏實云雖有姬姜絲麻不𠫓廾憔悴菅蒯蓋所以代匱也是用敢露頑才廁于明哲之末雖未足綱紀國體宣洽時雍庶幾觀察增闡聖聽惟因萬機之餘暇游意省覽焉獻帝善之二年詔, WYG: 原}
