  - {type: variant, offset: 1212, length: 751, content: 政有聲迹後歸鄉里卒於家翟酺字子超廣漢雒人也四世傳詩酺好老子尤善圖緯天文歷筭以報舅讎當徙日南亡於長安為卜相工後牧羊涼州遇赦還仕郡徵拜議郎遷侍中時尚書有缺詔將大夫六百石以上試對政事天文道術以高第者補之酺自恃能高而忌故太史令孫懿恐其先用乃往候懿既坐言無所及唯涕泣流連懿怪而問之酺曰圖書有漢賊孫登將以才智為中官所害觀君表相似當應之酺受恩接悽愴君之禍耳懿憂懼移病不試由是酺對第一拜尚書時安帝始親政事追感祖母宋貴人悉封其家又元舅耿寶及皇后兄弟閻顯等並用威權酺上疏諫曰臣聞微子佯狂而去殷叔孫通背秦而歸漢彼非自疎其君時不可也臣荷殊絕之恩蒙值不諱之政豈敢雷同受寵而以戴天履地伏惟陛下應天履祚歷值中興當建太平之功而未聞致化之道蓋遠者難明請以近事徵之昔竇鄧之寵傾動四方兼官重紱盈金積貨至使議弄神器改更社稷豈不以埶尊威廣以致斯患乎及其破壞頭顙墯地願為孤豚豈可得哉夫致貴無漸失必暴受爵非道殃必疾今外戚寵幸功均造化漢元以來未有等比陛下誠仁恩周洽以親九族然祿去公室政移私門覆車重尋寧無摧折而朝臣在位莫肯正議翕翕訾訾更相佐附臣恐威權外假歸之良難虎翼一奮卒不可制故孔子曰吐珠於澤誰能不含老子稱國之利器不可以示人此最安危之極戒社稷之深計也儉者上曰朕為天下守財耳豈得妄用之哉至倉穀腐而不可食錢貫朽而不可校今自初政已來日月未久費用賞賜已不可筭斂天下之財積無功之家帑藏單盡民物彫傷卒有不虞復當重賦百姓怨叛既生危亂可待也容耳聞正言一日即位天下曠然言其法度素定也今陛下有成王之尊而無數子之佐雖欲崇雍熙致太平其可得乎自去年已來灾譴頻數地坼天崩高岸為谷脩身恐懼則轉禍為福輕慢天戒則其害彌深願陛下親自勞恤研精致思勉求忠貞之臣誅遠佞諂之黨損玉堂之盛尊天爵之重割情欲之歡罷宴私之好帝王圖籍陳列左右心存亡國所以失之鑒觀興王所以得之庶灾害可息豐年可招矣延光三年出, WYG: 竺曾}
