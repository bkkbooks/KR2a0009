  - {type: variant, offset: 2034, length: 0, content: '', krp: 數下詔切責融戒以竇嬰田蚡禍敗之事田蚡武帝王皇后異父弟也為丞相搆㑹竇嬰之罪使至誅戮事見前書融惶恐乞骸骨詔令歸第養病歲餘聽上衞尉印綬賜養牛上樽酒融在宿衞十餘年年老子孫縱誕多不法穆等遂交通輕薄屬託郡縣干亂政事以封在安豐欲令姻戚悉據故六安國遂矯稱隂太后詔令六安侯劉盱去婦因以女妻之五年盱婦家上書言狀帝大怒乃盡免穆等官諸竇為郎吏者皆將家屬歸故郡獨留融京師穆等西至函谷關有詔悉復追還㑹融卒時年七十八諡曰戴侯賻送甚厚帝以穆不能脩尚不能脩整自高尚也而擁富貲居大第常令謁者一人監護其家居數年謁者奏穆父子自失埶數出怨望語帝令將家屬歸本郡唯勲以泚陽主壻留京師穆坐賂遺小吏郡捕繫與子宣俱死平陵獄勲亦死洛陽獄久之詔還融夫人與小孫一人居洛陽家舍十四年封勲弟嘉為安豐侯食邑二千户奉融後和帝初為少府及勲子大將軍憲被誅免就國嘉卒子萬全嗣萬全卒子㑹宗嗣萬全弟子武别有傳論曰竇融始以豪俠為名拔起風塵之中拔音歩末反拔卒也亦音彭八反義兩通以投天隙投㑹天之間隙遂蟬蛻王侯之尊說文曰蟬蛻所解皮也言去微至貴也蛻音稅終膺卿相之位此則徼功趣埶之士也及其爵位崇滿至乃放遠權寵恂恂似若不能己者又何智也言融之心實欲去}
  - {type: variant, offset: 2036, length: 3, content: 共誣酺, WYG: 以帝不納故常恂恂恭順似若不得已然者也嘗獨詳味此子之風度雖經國之術無足多談而進退之禮良可言矣固字孟孫少以尚公主為黃門侍郎續漢書曰給事黃門侍郎六百石好覽書傳喜兵法貴顯用事中元元年襲父友封顯親侯顯宗即位遷中郎將監羽林士續漢志曰宣帝命中郎將騎都尉監羽林秩比二千石後坐從兄穆有罪廢于家十餘年時天下乂安帝欲遵武帝故事擊匈奴通西域以固明習邊事固舊隨融在河西曉知邊事也十五年冬拜為奉車都尉續漢志曰比二千石掌御乘輿以騎都尉耿忠為副忠弇子也謁者僕射耿秉為駙馬都尉秦彭為副皆置從事司馬並出屯涼州明年固與忠率酒泉敦煌張掖甲卒}
