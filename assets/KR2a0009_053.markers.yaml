  - {type: variant, offset: 4774, length: 0, content: '', WYG: 印綬更封為冠軍侯憲及篤景瓌皆遣就國帝以太后故不欲名誅憲為選嚴能相督察之憲篤景到國皆迫令自殺宗族賔客以憲為官者皆免歸本郡瓌以素自脩不被逼迫明年坐稟假貧人稟給也假貸貧人非侯家之法故坐焉徙封羅侯不得臣吏人羅縣屬長沙郡在今岳州湘隂縣東北初竇后之譖}
