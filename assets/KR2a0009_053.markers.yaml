  - {type: variant, offset: 5162, length: 359, content: 宗室加頃引見與之對博上下媟黷有虧尊嚴臣聞之帝左右者所以咨政德也故周公戒成王曰其朋其朋言慎所與也昔宋閔公與彊臣共博列婦人於側積此無禮以致大灾武帝與倖臣李延年韓嫣同臥起尊爵重賜情欲無猒遂生驕淫之心行不義之事卒延年被戮嫣伏其辜夫愛之則不覺其過惡之則不知其善所以事多放濫物情生怨故王者賞人必酬其功爵人必甄其德善人同處則日聞嘉訓惡人從游則日生邪情孔子曰益者三友損者三友邪臣惑君亂妾危主以非所言則悅於耳以非所行則翫於目故令人君不能遠之仲尼曰唯女子與小人為難養近之則不遜遠之則怨蓋聖人之明戒也昔光武皇帝與嚴光俱寢上天之異其夕即見夫以光武之聖德嚴光之高賢君臣合道尚降此變豈況陛下今所親幸以賤為貴以卑為尊哉惟陛下遠讒諛之人納謇謇之士除左右之權寤宦官之敝使積善日熙佞惡消殄則乾灾可除帝省其奏因以病自上乞骸骨還家靈帝復特徵不行病卒子驥白馬令, WYG: ''}
