  - {type: variant, offset: 769, length: 0, content: '', WYG: 氏禆冕釋幣于禰乗墨車載龍旂弧韣乃朝以瑞玉有繅天子負斧扆曰伯父實來余一人嘉之奉束帛匹馬卓上九馬随之奠幣再拜侯氏降天子辭於侯氏曰伯父無事歸寧乃邦侯氏再拜稽首而出也劉攽曰詔曰禮伯父歸寧案帝意欲推尊諸王引用經義既下文有詩云即此亦當有禮云字此伯父歸寧之語本出儀禮也詩云叔父建爾元子詩魯頌之文也叔父謂周公也建元子謂封伯禽也敬之至也昔蕭相國加以不名優忠賢也見前書王莽傳況兼親尊}
