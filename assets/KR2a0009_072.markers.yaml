  - {type: variant, offset: 274, length: 1, content: 宣, WYG: 無見曰矇間吏人奏事亦有此言但明智淺短或謂儻是復慮為非何者灾異之降緣政而見今改元之後年飢人流此朕之不徳感應所致又冬春旱甚所被尤廣雖内用克責而不知所定得王深䇿快然意解詩不云乎未見君子憂心忡忡既見君子我心則降詩國風也忡忡猶衝衝降下也思惟嘉謨以次奉行冀蒙福應彰報至徳特賜王錢}
