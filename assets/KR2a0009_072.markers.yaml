  - {type: variant, offset: 1413, length: 2, content: 忤旨, krp: 楨幹王室也朕南廵望淮海意在阜陵遂與侯相見侯志意衰落形體非故瞻省懐感以喜以悲今復侯為阜陵王増封四縣并前為五縣以阜陵下濕徙都壽春加賜錢千萬布萬疋安車一乘夫人諸子賞賜各有差明年入朝立五十一年薨子殤王冲嗣永元二年下詔盡削除前班下延事冲立二年薨無嗣和帝復封冲兄魴是為頃王永元八年封魴弟十二人為鄉亭侯魴立三十年薨子懐王恢嗣延光三年封恢兄弟五人為鄉亭侯恢立十年薨子節王代嗣陽嘉二年封代兄便親為勃遒亭侯代立十四年薨無子國絶建和元年桓帝立勃遒亭侯便親為恢嗣是為恭王立十三年薨子孝王統嗣立八年薨子王赦立建安中薨無子國除廣陵思王荆傳廣陵思王荆建武十五年封山陽公十七年進爵為王荆性刻急隐害隐害謂隂害於人也有才能而喜文法光武崩大行在前殿荆哭不哀而作飛書封以方底方底囊所以盛書也前書曰緑綈方底令蒼頭詐稱東海王彊舅大鴻臚郭況書與彊曰君王無罪猥被斥廢而兄弟至有束縛入牢獄者太后失職别守北宫太后郭后也職常也失其常位别遷北宫及至年老逺斥居邊封之於魯海内深痛觀者鼻酸及太后尸柩在堂洛陽吏以次捕斬賔客至有一家三尸伏堂者痛甚矣今天下有喪弓弩張設甚備間梁松勑虎賁史曰吏以便宜見非勿有所拘以便宜之事而有非者當即行之勿拘常制也封侯難再得也郎官竊悲之為王寒心累息累息猶疊息也今天下争欲思刻賊王以求功寧有量邪若歸并二國之衆可聚百萬君王}
