  - {type: variant, offset: 364, length: 275, content: 坐左轉脩武令稍遷拜尚書時零陵桂陽山賊為害公卿議遣討之又詔下州郡一切皆得舉孝廉茂才蕃上疏駮之曰昔高祖創業萬邦息肩撫養百姓同之赤子今二郡之民亦陛下赤子也致令赤子為害豈非所在貪虐使其然乎宜嚴勑三府隱覈牧守令長其有在政失和侵暴百姓者即便舉奏更選清賢奉公之人能班宣法令情在愛惠者可不勞王師而羣賊弭息矣又三署郎吏二千餘人三府掾屬過限未除但當擇善而授之簡惡而去之豈煩一切之詔以長請屬之路乎以此忤左右故出為豫章太守性方峻不接賓客士民亦畏其高徵為尚書令送者不出郭門遷大鴻臚會白馬令李雲抗疏諫桓帝怒當伏重誅蕃上書救雲坐免歸田里復徵拜議郎數日遷光祿勳時封賞踰制內寵猥盛蕃乃, WYG: 遽}
