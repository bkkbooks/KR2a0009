  - {type: variant, offset: 1933, length: 0, content: '', WYG: 恩不考極其事下詔不得臣屬吏人唯食租如故使相中尉謹宿衛之荆猶不改其後使巫祭祀祝詛有司舉奏請誅之荆自殺立二十九年死帝憐傷之賜諡曰思王十四年封荆子元壽為廣陵侯服王璽綬食荆故國六縣又封元壽弟三人為鄉侯明年帝東廵狩徵元壽兄弟會東平宫班賜御服器物又取皇子輿馬悉以與之建初七年肅宗詔元壽兄弟與諸王俱朝京師元壽卒子商嗣商卒子條嗣傳國于後臨淮懐公衡傳臨淮懐公衡建武十五年立未及進爵為王而薨無子國除中山簡王焉傳中山簡王焉建武十五年封左馮翊公劉攽曰案光武紀封焉左翊公與右翊相配十七年進爵為王焉以郭太后少子故獨留京師三十年徙封中山王永平二年冬諸王來會辟雍事畢歸蕃詔焉與俱就國從以虎賁官騎漢官儀騶騎王家名官騎焉上書辭讓顯宗報曰凡諸侯出境必備左右故夾谷之會司馬以從穀梁傳曰公會齊侯于頰谷齊人鼔譟欲以執魯君孔子歴階而上命司馬止之左氏傳頰谷作夾谷今五國各官騎百人稱娖前行娖音楚角反稱娖猶齊整也行音胡朗反皆北軍胡騎便兵善射弓不空發中必決眥司馬相如子虚之文夫有文事必有武備所}
