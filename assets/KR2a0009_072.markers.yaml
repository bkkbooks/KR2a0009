  - {type: variant, offset: 1451, length: 202, content: 時小黃門趙津南陽大猾張汜氾等奉事中官乘埶犯法二郡太守劉成考案其罪雖經赦令而並竟考殺之宦官怨恚有司承旨遂奏罪當𠫓廾市又山陽太守翟超沒入中常侍侯覽財產東海相黃浮誅殺下邳令徐宣超浮並坐髡鉗輸作左校蕃與司徒劉矩司空劉茂共諫請超浮等帝不悅有司劾奏之矩茂不敢復言蕃乃獨上疏曰臣聞齊桓修霸務為內政春秋於魯小惡必書宜先自整勑後以及人今寇賊在外四支之疾內政不理心腹之患臣寢不能寐食不能飽實憂左右日親忠言以疏內患漸積外難方深, WYG: 亭長}
