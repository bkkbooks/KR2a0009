  - {type: variant, offset: 192, length: 1, content: 前, WYG: 作金龜玉鶴刻文字以為符瑞十三年男子燕廣告英與漁陽王平顔忠等造作圗書有逆謀事下案驗有司奏英招聚姦猾造作圗讖擅相官秩置諸侯王公將軍二千石大逆不道請誅之帝以親親不忍乃廢英徙丹陽涇縣今宣州縣也賜湯沐邑五百戸湯沐解見皇后紀也遣大鴻臚持節護送使伎人奴婢妓士鼓吹悉從得乗輜軿軿猶屏也自隐蔽之車蒼頡篇曰衣車也劉攽曰奴婢妓士案文妓當作技士當作工又當工在技上上文伎人即是伎樂此工技是巧匠也梁節王傳中亦有工技也持兵弩行道射獵極意自娱男女為侯主者食邑如故椘太后勿上璽綬留住楚宫眀年英至丹陽自殺立三十三年國除詔遣光禄大夫持節弔祠贈賵如法加賜列侯印綬以諸侯禮𦵏於涇遣中黄門占護其妻子占䕶猶守䕶也悉出楚官屬無辭語者制詔許太后曰國家始聞楚事幸其不然既知審實懐用悼灼庶欲宥全王身令保卒天年而王不念顧太后竟不自免此天命也無可奈何太后其保養幼弱勉彊飲食諸許願王富貴人情也已詔有司出其有謀者令安田宅於是封燕廣為折姦侯楚獄遂至累年其辭語相連自京師親戚諸侯州郡豪傑及考案吏阿附相䧟坐死徙者以千數十五年帝幸彭城見許太后及英妻子於内殿悲泣感動左右建初二年肅宗封英子楚侯种五弟皆為列侯並不得置相臣吏人元和三年許太后薨復遣光禄大夫持節弔祠因留護喪事賻錢五百萬又遣謁者備王官屬迎英喪改𦵏彭城加王赤綬羽盖華藻如嗣王儀續漢輿服志曰諸侯王赤綬四采長二丈一尺皇子安車青盖金華藻追爵謚曰楚厲侯章和元年帝幸彭城見英夫人及六子厚加贈賜种}
