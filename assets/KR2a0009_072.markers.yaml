  - {type: variant, offset: 236, length: 0, content: '', WYG: 稱焉千駟四千匹今數㳺諸第晨夜無節又非所以逺防未然臨深履薄之法也願大王修恭儉遵古制省奴婢之口減乗馬之數斥私田之富節游觀之宴以禮起居則敞乃敢安心自保惟大王深慮愚言康素敬重敞雖無所嫌牾然終}
