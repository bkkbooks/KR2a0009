  - {type: variant, offset: 227, length: 1, content: 美, WYG: 十等王臣公公臣卿卿臣大夫大夫臣士士臣皁皁臣輿輿臣隸隸臣僚僚臣僕僕臣臺也而今奴婢廐馬皆有千餘增無用之口以自蠶食言如蠶之食漸至衰盡也宫婢閉隔失其天性感亂和氣又多起内第觸犯防禁費以巨萬巨大也大萬謂萬萬而功猶未半夫文繁者質荒木勝者人亡荒廢也文彩繁多則質以之廢土木増構則人殫其力故云人亡皆非所以奉禮承上傳福無窮者也故楚作章華以凶左氏傳楚靈王成章華之臺後卒被殺杜預注云臺在今南郡華容縣也吳興姑蘇而滅姑蘇臺一}
