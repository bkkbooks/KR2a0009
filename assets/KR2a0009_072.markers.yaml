  - {type: variant, offset: 1375, length: 1, content: 許, WYG: 忍以一嵗租五分之一贖罪安立十九年薨子節王崇嗣順帝時羌虜數反崇輒上錢帛佐邊費及帝崩復上錢三百萬助山陵用度朝廷嘉而不受立三十一年薨無子國絶延熹四年桓帝立河間孝王子恭為參户亭侯博為任城王劉攽曰案文多一為字又恭字合在上孝王名恭也以奉其祀杜預注左傳曰今丹水縣北有三户亭故城在今鄧州内鄉縣西南也博有孝行喪母服制如禮増封三千户立十三年薨無子國絶熹平四年靈帝復立河間貞王遜子新昌侯佗為任城王奉孝王後立四十六年魏受禪以為崇徳侯阜陵質王延傳阜陵質王延建武十五年封淮陽公十七年進爵為王二十八年就國三十年以汝南之長平西華新陽扶樂四縣益淮陽國長平故城在今陳州宛丘縣西北西華故城在今溵水縣西北新陽故城在今豫州眞陽西南扶樂故城在今陳州太康縣北也延性驕奢而遇下嚴烈永平}
