  - {type: variant, offset: 3002, length: 1430, content: 甫等與共交搆諂事太后太后信之數出詔命有所封拜及其支類多行貪虐蕃常疾之志誅中官會竇武亦有謀蕃自以既從人望而德於太后必謂其志可申乃先上疏曰臣聞言不直而行不正則為欺乎天而負乎人危言極意則羣凶側目禍不旋踵鈞此二者臣寧得禍不敢欺天也今京師囂囂道路諠譁言侯覽曹節公乘昕王甫鄭等與趙夫人諸女尚書並亂天下附從者升進忤逆者中傷方今一朝羣臣如河中木耳汎汎東西耽祿畏害陛下前始攝位順天行誅蘇康管霸並伏其辜是時天地清明人鬼歡喜柰何數月復縱左右元惡大姦莫此之甚今不急誅必生變亂傾危社稷其禍難量願出臣章宣示左右並令天下諸姦知臣疾之太后不納朝廷聞者莫不震恐蕃因與竇武謀之語在武傳及事泄曹節等矯詔誅武等蕃時年七十餘聞難作將官屬諸生八十餘人並拔刃突入承明門攘臂呼曰大將軍忠以衛國黃門反逆何云竇氏不道邪王甫時出與蕃相迕適聞其言而讓蕃曰先帝新𠫓廾天下山陵未成竇武何功兄弟父子一門三侯又多取掖庭宮人作樂飲讌旬月之閒貲財億計大臣若此是為道邪公為棟梁枉橈阿黨復焉求賊遂令收蕃蕃拔劒叱甫甫兵不敢近乃益人圍之數十重遂執蕃送黃門北寺獄黃門從官騶蹋踧蕃曰死老魅復能損我曹員數奪我曹稟假不即日害之徙其家屬於比景宗族門生故吏皆斥免禁錮蕃友人陳留朱震時為銍令聞而𠫓廾官哭之收葬蕃尸匿其子逸於甘陵界中事覺繫獄合門桎梏震受考掠誓死不言故逸得免後黃巾賊起大赦黨人乃追還逸官至魯相震字伯厚初為州從事奏濟陰太守單匡臧罪并連匡兄中常侍車騎將軍超桓帝收匡下廷尉以譴超超詣獄謝三府諺曰車如雞栖馬如狗疾惡如風朱伯厚論曰桓靈之世若陳蕃之徒咸能樹立風聲抗論惛俗而驅馳嶮之中與刑人腐夫同朝爭衡終取滅亡之禍者彼非不能絜情志違埃霧也愍夫世士以離俗為高而人倫莫相恤也以遯世為非義故屢退而不去以仁心為己任雖道遠而彌厲及遭際會協策竇武自謂萬世一遇也懍懍乎伊望之業矣功雖不終然其信義足以攜持民心漢世亂而不亡百餘年閒數公之力也王允字子師太原祁人也世仕州郡為冠蓋同郡郭林宗嘗見允而奇之曰王生一日千里王佐才也遂與定交年十九為郡吏時小黃門晉陽趙津貪橫放恣為一縣巨患允討捕殺之而津兄弟諂事宦官因緣譖訴桓帝震怒徵太守劉遂下獄死允送喪還平原終畢三年然後歸家復還仕郡人有路佛者少無名行而太守王球召以補吏允犯顏固爭球怒收允欲殺之刺史鄧盛聞而馳傳辟為別駕從事允由是知名而路佛以之廢𠫓廾允少好大節有志於立功常習誦經傳朝夕試馳射三公並辟以司徒高第為侍御史中平元年黃巾賊起特選拜豫州刺史辟荀爽孔融等為從事上除禁黨討擊黃巾別帥大破之與左中郎將皇甫嵩右中郎將朱儶等受降數十萬於賊中得中常侍張讓賓客書疏與黃巾交通允具發其姦以狀聞靈帝責怒讓讓叩頭陳謝竟不能罪之而讓懷協忿怨以事中允明年遂傳下獄會赦還復刺史旬日閒復以它罪被捕司徒楊賜以允素高不欲使更楚辱乃遣客謝之曰君以張讓之事故一月再徵凶慝難量幸為深計又諸從事好氣決者共流涕奉藥而進之允厲聲曰吾為人臣獲罪於君當伏大辟以謝天下豈有乳藥求死乎投杯而起出就檻車既至廷尉左右皆促其事朝臣莫不歎息大將軍何進太尉袁隗司徒楊賜共上疏請之曰夫內視反聽則忠臣竭誠寬賢矜能則義士厲節是以孝文納馮唐之說晉悼宥魏絳之罪允以特選受命誅逆撫順曾未期月州境澄清方欲列其庸勳請加爵賞而以奉事不當當肆大戮責輕罰重有虧衆望臣等備位宰相不敢寢默誠以允宜蒙三槐之聽以昭忠貞之心書奏得以減死論是冬大赦而允獨不在宥三公咸復為言至明年乃得解釋是時宦者橫暴睚眦觸死允懼不免乃變易名姓轉側河內陳留閒及帝崩乃奔喪京師時大將軍何進欲誅宦官召允與謀事請為從事中郎轉河南尹獻帝即位拜太僕再遷守尚書令, WYG: 容嗣}
