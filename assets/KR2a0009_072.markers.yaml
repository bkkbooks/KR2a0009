  - {type: variant, offset: 788, length: 237, content: 康臣知封事已行言之無及誠欲陛下從是而止又比年收斂十傷五六萬人飢寒不聊生活而采女數千食肉衣綺脂油粉黛不可貲計鄙諺言盜不過五女門以女貧家也今後宮之女豈不貧國乎是以傾宮嫁而天下化楚女悲而西宮災且聚而不御必生憂悲之感以致并隔水旱之困夫獄以禁止姦違官以稱才理物若法虧於平官失其人則王道有缺而令天下之論皆謂獄由怨起爵以賄成夫不有臭穢則蒼蠅不飛陛下宜採求失得擇從忠善尺一選舉委尚書三公使襃責誅賞各有所歸豈不幸甚帝頗納其言為出宮女五百餘人但賜儁爵關內侯而萬世南鄉侯延熹六年車駕幸廣城成校獵蕃, WYG: 自寧}
