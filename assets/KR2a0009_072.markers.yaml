  - {type: variant, offset: 195, length: 1, content: 守, WYG: 卒子度嗣度卒子拘嗣傳國於後濟南安王康傳濟南安王康建武十五年封濟南公十七年進爵為王二十八年就國三十年以平原之祝阿安徳朝陽平昌隰隂重邱六縣益濟南國中元二年封康子徳為東武城侯東武城屬清河郡今貝州武城縣是康在國不循法度交通賔客其後人上書告康}
