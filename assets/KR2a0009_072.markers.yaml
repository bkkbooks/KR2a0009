  - {type: variant, offset: 1292, length: 2, content: 偏權, WYG: 越率循也越違也傅聞在下傅音敷敷布也書曰克愼明德敷聞在下昊天不弔不報上仁俾屏余一人夙夜焭焭靡有所終俾使也屏蔽也左氏傳曰昊天不弔不憗遺一老俾屏余一人焭焭余在疚也今詔有司加賜鸞輅乘馬龍旂九旒虎賁百人奉送王行匪我憲王其孰離之離被也言非憲王誰更被蒙此㤙也魂而有靈保兹寵榮嗚呼哀哉立四十五年子懐王忠嗣明年帝乃分東平國封忠弟尚為任城王餘五人為列侯忠立十一年薨子孝王敞嗣元和三年行東廵守幸東平宫帝追感念蒼謂其諸子曰思其人至其鄉其處在其人亡因泣下沾襟遂幸蒼陵為陳虎賁鸞輅龍旂以章顯之祠以太牢親拜祠坐哭泣盡哀賜御劒于陵前陵在今鄆州東峗山南峗音魚委反初蒼歸國驃騎時吏丁牧周栩以蒼敬賢下士不忍去之遂為王家大夫數十年事祖及孫帝聞皆引見於前既愍其淹滯且欲掦蒼徳美即皆擢拜議郎牧至齊相栩上蔡令永元十年封蒼孫梁為矜陽亭侯敞弟六人為列侯敞喪母至孝國相陳珍上其行狀永寧元年鄧太后増邑五千戸又封蒼孫二人為亭侯敞立四十八年薨子頃王端嗣立四十七年薨子凱嗣立四十一年魏受禪以為崇徳侯論曰孔子稱貧而無諂}
