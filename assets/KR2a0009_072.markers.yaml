  - {type: variant, offset: 1143, length: 1, content: 焦, WYG: 至徳廣施慈愛骨肉既賜奉朝請咫尺天儀而親屈至尊降禮下臣每賜讌見輙興席改容中宫親拜事過典故臣惶怖戰慄誠不自安每會見踧踖無所措置踧踖謙譲貌也此非所以章示羣下安臣子也帝省奏歎息愈襃貴焉舊典諸王女皆封鄉主乃獨封蒼五女為縣公主三月大鴻臚奏遣諸王歸國帝特留蒼賜以祕書列仙圖道術祕方至八月飲酎畢飲酎解見章紀有司復奏遣蒼乃許之手詔賜蒼曰骨肉天性誠不以逺近為親疏然數見顔色情重昔時念王久勞思得還休欲署大鴻臚奏不忍下筆顧授小黄門中}
