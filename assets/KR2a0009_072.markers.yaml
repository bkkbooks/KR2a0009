  - {type: variant, offset: 2217, length: 355, content: 僕杜密太尉掾范滂等正身無玷死心社稷以忠忤旨橫加考案或禁錮閉隔或死徙非所杜塞天下之口聾盲一世之人與秦焚書阬儒何以為異昔武王克殷表閭封墓今陛下臨政先誅忠賢遇善何薄待惡何優夫讒人似實巧言如簧使聽之者惑視之者昏夫吉凶之効存乎識善成敗之機在於察言人君者攝天地之政秉四海之維舉動不可以違聖法進退不可以離道規謬言出口則亂及八方何況髡無罪於獄殺無辜於市乎昔禹巡狩蒼梧見市殺人下車而哭之曰萬方有罪在予一人故其興也勃焉又青徐炎旱五穀損傷民物流遷茹菽不足而宮女積於房掖國用盡於羅紈外戚私門貪財受賂所謂祿去公室政在大夫昔春秋之末周德衰微數十年閒無復災眚者天所𠫓廾也天之於漢悢悢無已故殷勤示變以悟陛下除妖去孽實在脩德臣位列台司憂責深重不敢尸祿惜生坐觀成敗如蒙採錄使身首分裂異門而出所不恨也帝諱其言切託以蕃辟召非其人遂策免之永康元年帝崩竇, WYG: ''}
