  - {type: variant, offset: 1285, length: 6, content: 黃琬共典選舉, WYG: 副監喪及將作使者凡六人令四姓小侯諸國王主悉㑹詣東平奔喪賜錢前後一億布九萬匹及𦵏䇿曰惟建初八年三月己夘皇帝曰咨王丕顯勤勞王室親受䇿命昭于前世出作蕃輔克愼明德率禮}
