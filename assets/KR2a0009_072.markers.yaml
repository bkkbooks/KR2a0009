  - {type: variant, offset: 225, length: 0, content: '', WYG: 縣東西平昌今徳州般縣也般音補滿反建初八年肅宗復還所削地康遂多殖財貨大修宫室奴婢至千四百人廐馬千二百匹私田八百頃奢侈恣欲㳺觀無節永元初國傅何敞上疏諫康曰盖聞諸侯之義制節謹度然後能保其社稷和其民人孝經諸侯章之義也大王以骨肉之親享食茅土當施張政令眀其典法出入進止宜有期度輿馬臺隸應為科品臺隸賤職也左氏傳曰}
