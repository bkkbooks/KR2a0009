  - {type: variant, offset: 166, length: 0, content: '', WYG: 魯相奏請誅政有詔削薛縣立四十四年薨子頃王肅嗣永元十六年封肅弟二十一人皆為列侯肅性謙儉循恭王法度永初中以西羌未平上錢二千萬元初中復上縑萬匹以助國費鄧太后下詔襃納焉立二十三年薨子孝王臻嗣永建二年封臻二弟敏儉為鄉侯臻及弟蒸鄉侯儉並有篤行母卒皆吐血毁皆眥或為􅇤至服練紅兄弟追念初喪父幼小哀禮有闕因復重行喪制既祥之後而服練也禮記曰練衣黄裏縓緣縓即紅也縓音七絹反鄭元注周禮曰淺絳也臻性敦厚有恩常分租秩賑給諸父昆弟國相籍襃具以狀聞順帝美之制詔大將軍三公大鴻臚曰東海王臻以近蕃之尊少襲王爵膺受多福未知艱難而能克己率禮孝敬自然事親盡愛送終竭哀降儀從士寢苫三年左氏傳曰晏桓子卒晏嬰麤衰斬苴絰帶杖菅屨食粥居倚廬寝苫枕草其家老曰非大夫之禮也杜預注云時士及大夫衰服各有不同和睦兄弟恤養孤弱至孝純備仁義兼𢎞朕甚嘉焉夫勸善厲俗為國所先曩者東平孝王敞兄弟行孝喪母如禮有增戸之封詩云永世克孝念兹皇祖詩周頌之文克能也今臻增封五千尸儉五百戸光啓土宇以酬厥徳立三十一年薨子懿王祗嗣初平四年遣子琬至長安奉章獻帝封琬汶陽侯拜為平原相祗立四十四年薨子羡嗣二十年魏受禪以為崇徳侯沛獻王輔傳沛獻王輔建武十五年封右馮翊公劉攽曰案光武紀輔封右翊公此多馮字誤天下亦無右馮翊郡也十七年郭后廢為中山太后故徙輔為中山王并食常山郡二十年復徙封沛王時禁􅃠尚疏諸王皆在京師競修}
