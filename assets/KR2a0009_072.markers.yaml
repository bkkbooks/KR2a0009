  - {type: variant, offset: 23, length: 1, content: 輿, WYG: 元年彊病顯宗遣中常侍鉤盾令將太醫乗驛視疾詔沛王輔濟南王康淮陽王延詣魯及薨臨命上疏謝曰臣蒙恩得備蕃輔特受二國宫室禮樂事事殊異巍巍無量訖無報稱而自修不謹連年被疾為朝廷憂念皇太后陛下哀憐臣彊感動發中數遣使者太醫令丞方伎道術絡繹不絶臣伏惟厚恩不知所言臣内自省視氣力羸劣日夜浸困浸漸也終不復望見闕庭奉承帷幄孤負重恩銜恨黄泉杜預注左傳云地中之泉故曰黄泉身既夭命孤弱復為皇太后陛下憂慮誠悲誠慙息政小}
