  - {type: variant, offset: 1408, length: 3, content: 尹李膺, krp: 淮南厲王長高帝子文帝時反被遷於蜀而死也經有正義律有明刑公羊傳曰君親無將將而必誅前書曰大逆無道父母妻子同産無少長}
