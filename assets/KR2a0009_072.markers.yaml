  - {type: variant, offset: 167, length: 0, content: '', WYG: 譽争禮四方賔客壽光侯劉鯉更始子也得幸於輔鯉怨劉盆子害其父因輔結客報殺盆子兄故式侯恭輔坐繋詔獄三日乃得出自是後諸王賓客多坐刑罰各循法度二十八年就國中元二年封輔子寳為沛侯永平元年封寳弟嘉為僮侯僮縣屬臨淮郡故城在今泗州宿預縣西南輔矜嚴}
