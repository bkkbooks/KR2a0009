  - {type: variant, offset: 250, length: 4, content: 鄉邑稱孝, WYG: 四方無虞蒼以天下化平宜修禮樂乃與公卿共議定南北郊冠冕車服制度及光武廟登歌八佾舞數語在禮樂輿服志其志今亾帝每廵狩蒼常留鎮侍衞皇太后四年春車駕近出觀覽城第第宅也有甲乙之次故曰第尋聞當遂校獵河内蒼即上書諫曰臣聞時令盛春農事不聚衆興功禮記月令曰孟春之月無聚大衆無置城郭仲春之月無作大事以妨農事也傳曰田獵不宿食飲不享出入不節則木不曲直此失春令者也尚書五行傳曰田獵不宿飲食不享出入不節奪人農時及有姦謀則木不曲直鄭𤣥注云木性或曲或直人所用為器者也無故生不暢茂多有折槁是為不曲直也前書音義曰不宿不預戒日也臣知車駕今出事從約省所過吏人諷誦甘棠之德雖然動不以禮非所以示四方也惟陛下因行田野循視稼穡消揺仿佯弭節而旋皆㳺散之意詩曰於焉消揺左氏傳曰横流而仿佯前書音義曰弭節猶按節也言不盡意馳驅也至秋冬乃振威靈整法駕備周衞設羽旄旄謂注旄於竿首詩云抑抑威儀惟德之隅詩大雅之文也抑抑宻也隅亷也言人審密於威儀抑抑然者其徳必嚴正如宫室之制内䋲直則外有亷隅臣不勝憤懣伏自手書乞詣行在所極陳至誠帝覽奏即還宫蒼在朝數載多所隆益而自以至親輔政聲望日重意不自安上疏歸職曰臣蒼疲駑特為陛下慈恩覆護在家被教導之仁升朝蒙爵命之首制書襃羙班之四海舉負薪之才升君子之器負薪喩小人也易曰負且乗致㓂至負也者小人之事乗也者君子之器以小人而乗君子之器則盗思奪之矣凡匹夫一介尚不忘簞食之恵簞竹器也圓曰簞方曰笥左氏傳曰晋宣子田於首山舍於翳桑見靈輙餓曰不食三日矣食之舍其半問之曰宦三年矣未知母之存否請遺之使盡之而為簞食與肉以與之既而輙為公介士倒㦸以禦公徒而免之問何故曰翳桑之餓人也況臣居宰相之位同氣之親哉宜當暴骸膏野為百寮先而愚頑之質加以固病誠羞負乗辱汙輔將之位將被詩人三百赤紱之刺赤紱大夫之服也詩曹風曰彼己之子三百赤紱刺其無徳居位者多也今方域晏然要荒無儆去王畿五百里曰甸服又五百里曰侯服又五百里曰綏服又五百里要服又五百里荒服儆備也音警將遵上徳無為之時也文官猶可併省武職尤不宜建昔象封有鼻不任以政有鼻國名其地在今永}
