  - {type: variant, offset: 255, length: 1, content: 郡, WYG: 營道縣北史記曰舜弟象封於有鼻也誠由愛深不忍揚其過惡前事之不忘來事之師也自漢興以来宗室子弟無得在公卿位者惟陛下審覽虞帝優養母弟遵承舊典終卒厚恩乞上驃騎將軍印綬退就蕃國願蒙哀憐帝優詔不聽其後}
  - {type: page-break, offset: 255, content: '', id: KR2a0009_WYG_072-14a, image: WYG0253/WYG0253-0021a.png}
  - {type: variant, offset: 255, length: 1, content: 郡, krp: 營道縣北史記曰舜弟象封於有鼻也誠由愛深不忍揚其過惡前事之不忘來事之師也自漢興以来宗室子弟無得在公卿位者惟陛下審覽虞帝優養母弟遵承舊典終卒厚恩乞上驃騎將軍印綬退就蕃國願蒙哀憐帝優詔不聽其後}
  - {type: variant, offset: 257, length: 0, content: '', WYG: 陳乞辭甚懇切五年乃許還國而不聽上將軍印綬以驃騎長史為東平太傅掾為中大夫令史為王家郎漢官儀將軍掾屬二十九人中大夫無員令史四十一人也加賜錢五千萬布十萬匹六年冬帝幸魯徴蒼從還京師明年皇太后崩既𦵏蒼乃歸國特賜宫人奴婢五百人布二十五萬匹及珍寳服御器物十一年蒼與諸王朝京師月餘還國帝臨送歸宫悽然懐思乃遣使手詔國中傅曰辭别之後獨坐不樂因就車歸伏軾而吟瞻望永懐實勞我心誦及采菽以增歎息采菽詩小雅之章也其詩曰采菽采菽筐之筥之君子來朝何錫與之毛萇注云菽所以芼太牢而待君子也日者問東平王䖏家何等最樂王言為善最樂其言甚大副是要腹矣今送列侯印十九枚諸王子年五嵗已上能趨拜者皆令帶之十五年春行幸東平賜蒼錢千五百萬布四萬匹帝以所作光武本紀示蒼蒼因上光武受命中興頌帝甚善之以其文典雅特令校書郎賈逵為之訓詁肅宗即位尊重恩}
  - {type: page-break, offset: 257, content: '', id: KR2a0009_WYG_072-14b, image: WYG0253/WYG0253-0021b.png}
  - {type: page-break, offset: 257, content: '', id: KR2a0009_WYG_072-15a, image: WYG0253/WYG0253-0021c.png}
