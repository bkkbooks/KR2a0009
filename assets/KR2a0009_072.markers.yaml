  - {type: variant, offset: 644, length: 0, content: '', krp: 前頗謂道路之言疑不審實近令從官古霸問湼陽主疾風俗通曰古姓周有古公亶父其後氏焉湼陽主光武女竇固之妻也使還乃知詔書已下竊見光武皇帝躬履儉約之行深覩始終之分勤勤懇懇以𦵏制為言故營建陵地具稱古典詔曰無為山陵陂池裁令流水而已孝眀皇帝大孝無違奉承貫行貫行謂一皆遵奉也谷永曰一以貫行固執無違也至於自所營創尤為儉省謙徳之羙於斯為盛易曰謙徳之柄臣愚以園邑之興始自彊秦古者邱隴且不欲其著眀禮記曰古者墓而不墳故言不欲其著眀豈況築郭邑建都郛哉榖梁傳曰人之所聚曰都杜預注左傳曰郛郭也上違先帝聖心下造無益之功虚費國用動揺百姓非所以致和氣祈豐年也又以吉凶俗數言之亦不欲無故繕修邱墓有所興起考之古法則不合稽之時宜則違人求之吉凶復未見其福陛下履有虞之至性追祖禰之深思然懼左右過議以累聖心臣蒼誠傷二帝純徳之羙不暢於無窮也惟蒙哀覽帝從而止自是朝廷每有疑政輙驛使諮問蒼悉心以對皆見納用三年帝饗衞士於南宫因從皇太后周行掖庭池閣乃閱隂太后舊時器服愴然動容乃命留五時衣各一襲五時衣謂春青夏朱季夏黄秋白冬黒也衣單複具曰襲及常所御衣合五十篋餘悉分布諸王主及子孫在京師者各有差特賜蒼及琅邪王京書曰中大夫奉使親}
  - {type: variant, offset: 645, length: 0, content: '', WYG: 動靜嘉之何已嵗月騖過山陵浸逺孤心悽愴如何如何間饗衞士於南宫因閱視舊時衣物聞於師曰其物存其人亡不言哀而哀自至信矣惟王孝友之德亦豈不然今送光烈皇后假紒帛巾各一周禮追師掌王后之首服為副編鄭𤣥云副婦人首服三輔謂之假紒續漢書帛字作皁及衣一篋可時奉瞻以慰凱風寒泉之思詩國風曰凱風羙孝子也凱風自南吹彼棘心棘心夭夭母氏劬勞爰}
