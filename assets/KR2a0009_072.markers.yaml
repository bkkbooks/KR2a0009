  - {type: variant, offset: 5212, length: 682, content: 家吾之願也如其不獲則奉身以死之朝廷幼少恃我而已臨難苟免吾不忍也努力謝關東諸公勤以國家為念初允以同郡宋翼為左馮翊王宏為右扶風是時三輔民庶熾盛兵穀富實李傕等欲即殺允懼二郡為患乃先徵翼宏宏遣使謂翼曰郭汜李傕以我二人在外故未危王公今日就徵明日俱族計將安出翼曰雖禍福難量然王命所不得避也宏曰義兵鼎沸在於董卓況其黨與乎若舉兵共討君側惡人山東必應之此轉福為福之計也翼不從宏不能獨立遂俱就徵下廷尉傕乃收允及翼宏并殺之允時年五十六長子侍中蓋次子景定及宗族十餘人皆見誅害唯兄子晨陵得脫歸鄉里天子感慟百姓喪氣莫敢收允尸者唯故吏平陵令趙戩𠫓廾官營喪王宏字長文少有氣力不拘細行初為弘農太守考案郡中有事宦官買爵位者雖位至二千石皆掠考收捕遂殺數十人威動鄰界素與司隸校尉胡种有𨻶及宏下獄种遂迫促殺之宏臨命詬曰宋翼豎儒不足議大計胡种樂人之禍禍將及之种後眠輒見宏以杖擊之因發病數日死後遷都於許帝思允忠節使改殯葬之遣虎賁中郎將奉策弔祭賜東園祕器贈以本官印綬送還本郡封其孫黑為安樂亭侯食邑三百戶士孫瑞字君策扶風人頗有才謀瑞以允自專討董卓之勞故歸功不侯所以獲免於難後為國三老光祿大夫每三公缺楊彪皇甫嵩皆讓位於瑞興平二年從駕東歸為亂兵所殺趙戩字叔茂長陵人性質正多謀初平中為尚書典選舉董卓數欲有所私授戩輒堅拒不聽言色強厲卓怒召將殺之衆人悚慄而戩辭貌自若卓悔謝釋之長安之亂容於荊州劉表厚禮焉及曹操平荊州乃辟之執戩手曰恨相見晚卒相國鍾繇長史論曰士雖以正立亦以謀濟若王允之推董卓而引其權伺其閒而敝其罪當此之時天子懸解矣而終不以猜忤為釁者知者本於忠義之誠也故推卓不為失正分權不為苟冒伺閒不為狙詐及其謀濟意從則歸成於正也, WYG: 除}
