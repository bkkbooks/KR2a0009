  - {type: variant, offset: 1412, length: 0, content: '', WYG: 棄市先帝不忍親親之恩枉屈大法為王受愆愆過也反而不誅先帝之過故言為王受過也羣下莫不惑焉今王曽莫悔悟悖心不移逆謀内潰自子魴發誠非本朝之所樂聞朕惻然傷心不忍致王于理今貶爵為阜陵侯食一縣獲斯辜者侯自取焉於戲誡哉赦魴等罪勿驗使謁者一人監䕶延國不得與吏人通章和元年行幸九江賜延書與車駕會壽春帝見延及妻子愍然傷之乃下詔曰昔周之爵封千有八百而姬姓居半者所}
