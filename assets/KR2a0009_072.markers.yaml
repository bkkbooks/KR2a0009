  - {type: variant, offset: 14, length: 1, content: 六, WYG: 二光武十王光武皇帝十一子郭皇后生東海恭王彊沛獻王輔濟南安王康阜陵質王延中山簡王焉許美人生楚王英光烈皇后生顯宗東平憲王蒼廣陵思王荆臨淮懐公衡琅邪孝王京東海恭王彊傳東海恭王彊建武二年立母郭氏為后彊為皇太子十七年而郭后廢彊常慼慼不自安數因左右及諸王}
