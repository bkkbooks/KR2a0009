  - {type: variant, offset: 1932, length: 0, content: '', WYG: 也無為扶蘇將閭呌呼天也扶蘇秦始皇之太子將閭庻子也扶蘇以數諫始皇使與蒙恬守北邊始皇死於沙丘少子胡亥詐立賜扶蘇死將閭昆弟三人囚於内宫胡亥使謂將閭曰公子不臣罪當死將閭乃仰天而大呼天者三曰天乎吾無罪昆弟三人皆流涕伏劒自殺事見史記彊得書惶怖即執其使封書上之顯宗以荆母弟祕其事遣荆出止河南宫時西羌反荆不得志冀天下因羌驚動有變私迎能為星者與謀議帝聞之乃徙封荆廣陵王遣之國其後荆復呼相工謂曰我貌類先帝先帝三十得天下我今亦三十可起兵未相者詣吏告之荆惶恐自繫獄帝復}
