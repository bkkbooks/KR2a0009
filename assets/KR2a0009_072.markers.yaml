  - {type: variant, offset: 17, length: 4, content: 字仲舉汝, WYG: 國光武不忍遲囘者數嵗乃許焉十九年封為東海王二十八年就國帝以彊廢不以過去就有禮故優以大封兼食魯郡合二十九縣賜虎賁旄頭宫殿設鍾虡之縣擬於乗輿虎賁旄頭鍾虡解見光武紀縣音𤣥彊臨之國數上書讓還東海又因皇太子固辭帝不許深嘉歎之以彊章宣示公卿初魯恭王好宫室起靈光殿甚壯麗是時猶存恭王名餘景帝之子殿在今兗州曲阜城中故基東西二十丈}
