  - {type: variant, offset: 237, length: 6, content: 閉埏隧因居其, WYG: 能改立五十九年薨子簡王錯嗣錯音七故反錯為太子時愛康鼓吹妓女宋閏使醫張尊招之不得錯怒自以劒刺殺尊國相舉奏有詔勿案永元十一年封錯弟七人為列侯錯立六年薨子孝王香嗣永初二年封香弟四人為列侯香篤行好經書初叔父篤有罪不得封西平昌侯昱坐法失侯香乃上書分爵土封篤子丸昱子嵩皆為列侯香立二十年薨無子國絶永建元年順帝立錯子阜陽侯顯為嗣是為釐王立三年薨子悼王廣嗣永建五年封廣弟文為樂城亭侯廣立二十五年永興元年薨無子國除東平憲王蒼傳子任城孝王尚東平憲王蒼建武十五年封東平公十七年進爵為王蒼少好經書雅有智思為人羙須􅐖要帶十圍顯宗甚愛重之及即位拜為驃騎將軍置長史掾史員四十人位在三公上四府掾史皆無四十人今特置以優之也永平元年封蒼子二人為縣侯二年以東郡之夀張須昌山陽之南平陽稾湖陵五縣益東平國南平陽縣故城今兗州鄒縣也稾縣一名髙平故城在鄒縣西南湖陵故城在今兗州防與縣東南是時}
