  - {type: variant, offset: 191, length: 0, content: '', WYG: 取慮須昌二縣益楚國取慮縣故城在今泗州下邳縣西南案臨淮無須昌有昌陽縣盖誤也取慮音秋閭自顯宗為太子時英常獨歸附太子太子特親愛之及即位數受賞賜永平元年特封英舅子許昌為龍舒侯龍舒縣屬廬江郡故城在今廬江縣西也英少時好㳺俠交通賔客晚節更喜黄老學為浮屠齋戒祭祀袁宏漢記浮屠佛也西域天竺國有佛道焉佛者漢言覺也將以覺悟羣生也其教以修善慈心為主不殺生專務清静其精者為沙門沙門漢言息也盖息意去欲而歸於無為又以為人死精神不滅随復受形生時善惡皆有報應故貴行善修道以鍊精神以至無生而得為佛也佛長丈六尺黄金色項中佩日月光變化無方無所不入而大濟羣生初眀帝夢見金人長大項有日月光以問羣臣或曰西方有神其名曰佛陛下所夢得無是乎於是遣使天竺問其道術而圗其形象焉八年詔令天下死罪皆入縑贖英遣郎中令奉黄縑白紈三十匹詣國相曰託在蕃輔過惡累積歡喜大恩奉送縑帛以贖愆罪國相以聞詔報曰楚王誦黄老之微言尚浮圗之仁祠潔齋三月與神為誓何嫌何疑當有悔吝其還贖以助伊蒲塞桑門之盛饌伊蒲塞即優婆塞也中華翻為近住言受戒行堪近僧住也桑門即沙門因以班示諸國中傅英後遂大交通方}
