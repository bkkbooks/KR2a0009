  - {type: variant, offset: 4667, length: 310, content: 溫侯食邑五千戶固讓不受士孫瑞說允曰夫執謙守約存乎其時公與董太師並位俱封而獨崇高節豈和光之道邪允納其言乃受二千戶三年春連雨六十餘日允與士孫瑞楊瓚登臺請霽復結前謀瑞曰自歲末以來太陽不照霖雨積時月犯執法彗孛仍見晝陰夜陽霧氣交侵此期應促盡內發者勝幾不可後公其圖之允然其言乃潛結卓將呂布使為內應會卓入賀呂布因刺殺之語在卓傳允初議赦卓部曲呂布亦數勸之既而疑曰此輩無罪從其主耳今若名為惡逆而特赦之適足使其自疑非所以安之之道也呂布又欲以卓財物班賜公卿將校允又不從而素輕布以劒客遇之布亦負其功勞多自誇伐既失意望漸不相平允性剛棱疾惡初懼董卓豺狼故折節圖之卓既殲滅自謂無復患難及在際會每乏溫潤之色杖正持重不循權宜之計是以羣下不甚附之董卓將校及, WYG: 王}
