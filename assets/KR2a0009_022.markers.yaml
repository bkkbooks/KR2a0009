  - {type: variant, offset: 1037, length: 276, content: 在後從者皆恐及至虖沱河候吏還白河水流澌無船不可濟官屬大懼光武令霸往視之霸恐驚衆欲且前阻水還即詭曰冰堅可度官屬皆喜光武笑曰候吏果妄語也遂前比至河河冰亦合乃令霸護度未畢數騎而冰解光武謂霸曰安吾衆得濟免者卿之力也霸謝曰此明公至德神靈之祐雖武王白魚之應無以加此武光謂官屬曰王霸權以濟事殆天瑞也以為軍正爵關內侯既至信都發兵攻拔邯鄲霸追斬王郎得其璽綬封王鄉侯從平河北常與臧宮傅俊共營霸獨善撫士卒死者脫衣以斂之傷者躬親以養之光武即位以霸曉兵愛士可獨任拜為偏將軍并將臧宮傅俊兵而以宮俊為騎都尉建武二年更封富波侯四年秋帝幸譙使霸與捕虜將軍馬武東討周建於垂惠蘇茂將五校兵四, WYG: ''}
