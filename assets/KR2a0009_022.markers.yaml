  - {type: variant, offset: 2625, length: 1506, content: 漢忠將軍王常捕虜將軍馬武驍騎將軍劉歆武威將軍劉尚等從天水伐公孫述師次長安時車駕亦至而隗囂不欲漢兵上隴辭說解故帝召諸將議皆曰可且延囂日月之期益封其將帥以消散之遵曰囂挾姦久矣今若按甲引時則使其詐謀益深而蜀警增備固不如遂進帝從之乃遣遵為前行隗囂使其將王元拒隴坻遵進擊破之追至新關及諸將到與囂戰並敗引退下隴乃詔遵軍汧耿弇軍漆征西大將軍馮異軍栒邑大司馬吳漢等還屯長安自是後遵數挫隗囂事已見馮異傳八年秋復從車駕上隴及囂破帝東歸過汧幸遵營勞饗士卒作黃門武樂良夜乃罷時遵有疾詔賜重茵覆以御蓋復令進屯隴下及公孫述遣兵救囂吳漢耿弇等悉奔還遵獨留不卻九年春卒於軍遵為人廉約小心克己奉公賞賜輒盡與士卒家無私財身衣韋絝布被夫人裳不加緣帝以是重焉及卒愍悼之尤甚遵喪至河南縣詔遣百官先會喪所車駕素服臨之望哭哀慟還幸城門過其車騎涕泣不能已喪禮成復親祠以太牢如宣帝臨霍光故事詔大長秋謁者河南尹護喪事大司農給費博士范升上疏追稱遵曰臣聞先王崇政尊美屏惡昔高祖大聖深見遠慮班爵割地與下分功著錄勳臣頌其德美生則寵以殊禮奏事不名入門不趨死則疇其爵邑世無絕嗣丹書鐵券傳於無窮斯誠大漢厚下安人長久之德所以累世十餘歷載數百廢而復興絕而復續者也陛下以至德受命先明漢道襃序輔佐封賞功臣同符祖宗征虜將軍潁陽侯遵不幸早薨陛下仁恩為之感傷遠迎河南惻怛之慟形於聖躬喪事用度仰給縣官重賜妻子不可勝數送死有以加生厚亡有以過存矯俗厲化卓如日月古者臣疾君視臣卒君弔德之厚者也陵已來久矣及至陛下復興斯禮羣下感動莫不自勵臣竊見遵修行積善竭忠於國北平漁陽西拒隴蜀先登坻上深取略陽衆兵既退獨守難制御士心不越法度所在吏人不知有軍清名聞於海內廉白著於當世所得賞賜輒盡與吏士身無奇衣家無私財同產兄午以遵無子娶妾送之遵乃使人逆而不受自以身任於國不敢圖生慮繼嗣之計臨死遺誡牛車載喪薄葬洛陽問以家事終無所言任重道遠死而後已遵為將軍取士皆用儒術對酒設樂必雅歌投壺又建為孔子立後奏置五經大夫雖在軍旅不忘俎豆可為謂好禮悅樂守死善道者也禮生有爵死有謚爵以殊尊卑謚以明善惡臣愚以為宜因遵薨論敘衆功詳案謚法以禮成之顯章國家篤古之制為後嗣法帝乃下升章以示公卿至葬車駕復臨贈以將軍侯印綬朱輪容車介士軍陳送葬謚曰成侯既葬車駕復臨其墳存見夫人室家其後會朝帝每歎曰安得憂國奉公之臣如祭征虜者乎遵之見思若此無子國除兄午官至酒泉太守從弟肜肜字次孫早孤以至孝見稱遇天下亂野無煙火而獨在冢側每賊過見其尚幼而有志節皆奇而哀之光武初以遵故拜肜為黃門侍郎常在左右及遵卒無子帝追傷之以肜為偃師長令近遵墳墓四時奉祠之肜有權略視事五歲縣無盜賊課為第一遷襄賁令時天下郡國尚未悉平襄賁盜賊白日公行肜至誅破姦猾殄其支黨數年襄賁政清璽書勉勵增秩一等賜縑百匹當是時匈奴鮮卑及赤山烏桓連和彊盛數入塞殺略吏人朝廷以為憂益增緣邊兵郡有數千人又遣諸將分屯障塞帝以肜為能建武十七年拜遼東太守至則勵兵馬廣斥候肜有勇力能貫三百斤弓虜每犯塞常為士卒前鋒數破走之二十一年秋鮮卑萬餘騎寇遼東肜率數千人迎擊之自被甲陷陳虜大奔投水死者過半遂窮追出塞虜急皆棄兵祼身散走斬首三千餘級獲馬數千匹自是後鮮卑震怖畏肜不敢復闚塞肜以三虜連和卒為邊害二十五年乃使招呼鮮卑示以財利其大都護偏何遣使奉獻願得歸化肜慰納賞賜稍復親附其異種滿離高句驪之屬遂駱驛款塞上貂裘好馬帝輒倍其賞賜其後偏何邑落諸豪並歸義願自効肜曰審欲立功當歸擊匈奴斬送頭首乃信耳偏何等皆仰天指心曰必自効即擊匈奴左伊袟秩訾部斬首二千餘級持頭詣郡其後歲歲相攻輒送首級受賞賜自是匈奴衰弱邊無寇警鮮卑烏桓並入朝貢肜為人質厚重毅體貌絕衆撫夷狄以恩信皆畏而愛之故得其死力初赤山烏桓數犯上谷為邊害詔書設購賞功切責州郡不能禁肜乃率勵偏何遣往討之永, WYG: ''}
