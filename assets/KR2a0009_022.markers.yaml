  - {type: variant, offset: 2053, length: 571, content: 少好經書家富給而遵恭儉惡衣服喪母負土起墳嘗為部吏所侵結客殺之初縣中以其柔也既而皆憚焉及光武破王尋等還過潁陽遵以縣吏數進見光武愛其容儀署為門下史從征河北為軍市令舍中兒犯法遵格殺之光武怒命收遵時主簿陳副諫曰明公常欲衆軍整齊今遵奉法不避是教令所行也光武乃貰之以為刺姦將軍謂諸將曰當備祭遵吾舍中兒犯法尚殺之必不私諸卿也尋拜為偏將軍從平河北以功封列侯建武二年春拜征虜將軍定封潁陽侯與驃騎大將軍景丹建義大將軍朱祐漢忠將軍王常騎都尉王梁臧宮等入箕關南擊弘農厭新柏華蠻中賊弩中遵口洞出流血衆見遵傷稍引退遵呼叱止之士卒戰皆自倍遂大破之時新城蠻中山賊張滿屯結險隘為人害詔遵攻之遵絕其糧道滿數挑戰遵堅壁不出而厭新柏華餘賊復與滿合遂攻得霍陽聚遵乃分兵擊破降之明年春張滿飢困城拔生獲之初滿祭祀天地自云當王既執歎曰讖文誤我乃斬之夷其妻子遵引兵南擊鄧奉弟終於杜衍破之時涿郡太守張豐執使者舉兵反自稱無上大將軍與彭寵連兵四年遵與朱祐及建威大將軍耿弇驍騎將軍劉喜俱擊之遵兵先至急攻豐豐功曹孟執豐降初豐好方術有道士言豐當為天子以五綵囊裹石繫豐肘云石中有玉璽豐信之遂反既執當斬猶曰肘石有玉璽遵為椎破之豐乃知被詐仰天歎曰當死無所恨諸將皆引還遵受詔留屯良鄉拒彭寵因遣護軍傅玄襲擊寵將李豪於潞大破之斬首千餘級相拒歲餘數挫其鋒黨與多降者及寵死遵進定其地六年春詔遵與建威大將軍耿弇虎牙大將軍蓋, WYG: 殤帝}
