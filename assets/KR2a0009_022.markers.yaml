  - {type: variant, offset: 476, length: 5, content: 兵擊卓京破, WYG: 縣二年四月有星出文昌入紫宫蛇行有首尾無身赤色有光炤垣墻八月丙寅太白犯心前星辛未白氣如一匹練衝北斗第四星占曰文昌為上將貴相太白犯心前星為大臣後六年司徒劉羣為中常侍曹節所譖下獄死白氣衝北斗為大戰明年冬揚州刺史臧旻丹陽太守陳寅攻盗賊苴康斬首數千級光和元年四月癸丑流星犯軒轅第二星東北行入北斗魁中八月彗星出亢北入天市中長數尺稍長至五六丈赤色經歴十餘宿八十餘日乃消於天菀中流星為貴使軒轅為内宮北斗魁主殺流星從軒轅出抵北斗魁是天子大使將出有伐殺也至中平元年黄巾賊起上遣中郎將皇甫嵩朱儁等征}
