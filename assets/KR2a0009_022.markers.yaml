  - {type: variant, offset: 1695, length: 0, content: '', WYG: 何苖為進部曲將吳匡所殺孝獻初平二年九月蚩尤旗見長十餘丈色白出角亢之南占曰蚩尤旗見則主征伐四方其後丞相曹公征討天下且三十年四年十月孛星出兩角間東北行入天市中而滅占曰彗除天市天帝將徙帝將易都是時上在長安後二年東遷明年七月至雒陽其八月曹公迎上都許建安五年十月辛亥有星孛于大梁冀州分也時袁紹在冀州其年十一月紹軍為曹公所破七年夏紹死後曹公遂取冀州九年十一月有星孛于東井輿鬼入軒轅太微十一年正月星孛于北斗首在斗中尾貫紫宮及北辰占曰彗星掃太微宮人主易位其後魏文帝受禪十二年十月辛卯有星孛于鶉尾荆州分也時荆州牧劉表據荆州時益州從事周羣以荆州牧將死而失土明年秋表卒以小子琮自代曹公將伐荆州琮懼舉軍詣公降十七年十二月有星孛于五諸}
