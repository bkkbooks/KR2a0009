  - {type: variant, offset: 4134, length: 156, content: 偏何擊破赤山斬其魁帥持首詣肜塞外震讋肜之威聲暢於北方西自武威東盡玄菟及樂浪胡夷皆來內附野無風塵乃悉罷緣邊屯兵十二年徵為太僕肜在遼東幾三十年衣無兼副顯宗既嘉其功又美肜清約拜日賜錢百萬馬三匹衣被刀劒下至居室什物大小無不悉備帝每見肜常歎息以為可屬以重任後從東巡狩過魯坐孔子講堂顧指子路室謂左右曰此太僕之室太僕吾之禦侮也, WYG: 九月乙亥隕石陳留四春秋僖公}
