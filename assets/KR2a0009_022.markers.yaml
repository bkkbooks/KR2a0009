  - {type: variant, offset: 16, length: 3, content: 祭遵從, WYG: 二天文下桓三十八獻九靈二十隕石孝桓建和元年八月壬寅熒惑犯輿鬼質星二年二月辛卯熒惑行在輿鬼中三年五月己丑太白行入太微右掖門留十五日出端門丙申熒惑入東井八月己亥鎮星犯輿鬼中南星乙丑彗星芒長五尺見天市中東南指色黄白九月戊辰不見熒惑犯輿鬼為死喪質星為戮臣入太微為亂臣鎮星犯輿鬼為喪彗星見天市中為質貴人至和平元年十二月甲寅梁太后崩梁冀益驕亂矣元嘉元年二月戊子太白晝見永興二年閏月丁酉太白晝見時上幸後宮采女鄧猛明年封猛兄演為南頓侯後四嵗梁皇后崩梁冀被誅猛立為皇后恩寵甚盛永夀元年三月丙申鎮星逆行入太微中七十四日去左掖門七月己未辰星入太微中八十日去左掖門八月己巳熒惑入太微二十一日出端門太微天子廷也鎮星為貴臣妃后逆行為匿謀辰星入太微為大水一曰後宮有憂是嵗雒水溢至津門南陽大水熒惑留入太微中又為亂臣是時梁氏専政九月己酉晝有流星長二尺所色黄白癸巳熒惑犯嵗星為姦臣謀大將戮二年六月甲寅辰星入太微遂伏不見辰星為水為兵為妃后八月戊午太白犯軒轅大星為皇后其三年四月戊寅熒惑入東井口中為大臣有誅者其七月丁丑太白犯心前星為大臣後二年四月懿獻皇后以憂死大將軍梁冀使太倉令秦宫刺殺議郎邴尊又欲殺鄧后母宣事覺桓帝收冀及妻夀襄城君印綬皆自殺誅諸梁及孫氏宗族或徙邊是其應也延熹四年三月甲寅熒惑犯輿鬼質星五月辛酉客星在營室稍順行生芒長五尺所至心一度轉為彗熒惑犯輿鬼質星大臣有戮死者五年十月南郡太守李肅坐蠻夷賊攻盜郡縣取財物一億以上入府取銅虎符肅背敵走不救城郭又監黎陽謁者燕喬坐贓重泉令彭良殺無辜皆棄市京兆虎牙都尉宋謙坐贓下獄死客星在營室至心作彗為大喪後四年鄧后以憂死六年十一月丁亥太白晝見是時鄧后家貴盛七年七月戊辰辰星犯嵗星八月庚戌熒惑犯輿鬼質星庚申嵗星犯軒轅大星十月丙辰太白犯房北星丁卯辰星犯太白十二月乙丑熒惑犯軒轅第二星辰星犯嵗星為兵熒惑犯質星有戮臣嵗星犯軒轅為女主憂太白犯房北星為後宮其八年二月太僕南鄉侯左勝以罪賜死勝}
