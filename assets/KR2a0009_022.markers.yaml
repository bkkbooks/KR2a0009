  - {type: variant, offset: 1682, length: 4, content: 王常建義, WYG: 部曲將吳匡攻殺車騎將軍何苖死者數千人三年四月熒惑逆行守心後星十月戊午月食心後星占曰為大喪後三年而靈帝崩五年二月彗星出奎逆行入紫宮後三出六十餘日乃消六月丁卯客星如三升椀出貫索西南行入天市至尾而消占曰彗除紫宫天下易主客星入天市為貴人喪明年四月宮車晏駕中平中夏流星赤如火長三丈起河皷入天市抵觸宦者星色白長二三丈後尾再屈食頃乃滅狀似枉矢占曰枉矢流發其宮射所謂矢當直而枉者操矢者邪枉人也中平六年大将軍何進謀盡誅中官中官於省中殺進俱兩破滅天下由此遂大壊亂六年八月丙寅太白犯心前星戊辰犯心中大星其日未寅四刻}
