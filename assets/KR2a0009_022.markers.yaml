  - {type: variant, offset: 1338, length: 297, content: 兵夾擊武武恃霸之援戰不甚力為茂建所敗武軍奔過霸營大呼求救霸曰賊兵盛出必兩敗努力而已乃閉營堅壁軍吏皆爭之霸曰茂兵精銳其衆又多吾吏士心恐而捕虜與吾相恃兩軍不一此敗道也今閉營固守示不相援賊必乘勝輕進捕虜無救其戰自倍如此茂衆疲勞吾承其弊乃可剋也茂建果悉出攻武合戰良久霸軍中壯士路潤等數十人斷髮請戰霸知士心銳乃開營後出精騎襲其背茂建前後受敵驚亂敗走霸武各歸營賊復聚衆挑戰霸堅臥不出方饗士作倡樂茂雨射營中中霸前酒樽霸安坐不動軍吏皆曰茂前日已破今易擊也霸曰不然蘇茂客兵遠來糧食不足故數挑戰以儌一切之勝今閉營休士所謂不戰而屈人之兵善之善者也茂建既不得戰乃引還營其夜建兄子誦反閉城拒之茂建遁去誦以城降五年春帝使太, WYG: 南門}
