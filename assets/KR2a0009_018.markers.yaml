  - {type: variant, offset: 1004, length: 1094, content: 吾有回門人日親斬將破軍平定山西功効尤著百姓不親五品不訓汝作司徒敬敷五教五教在寬今遣奉車都尉授印綬封為酇侯食邑萬戶敬之哉禹時年二十四遂渡汾陰河入夏陽更始中郎將左輔都尉公乘歙引其衆十萬與左馮翊兵共拒禹於衙禹復破走之而赤眉遂入長安是時三輔連覆敗赤眉所過殘賊百姓不知所歸聞禹乘勝獨剋而師行有紀皆望風相攜負以迎軍降者日以千數衆號百萬禹所止輒停車住節以勞來之父老童穉垂髮戴白滿其車下莫不感悅於是名震關西帝嘉之數賜書襃美諸將豪傑皆勸禹徑攻長安禹曰不然今吾衆雖多能戰者少前無可仰之積後無轉饋之資赤眉新拔長安財富充實鋒銳未可當也夫盜賊羣居無終日之計財穀雖多變故萬端寧能堅守者也上郡北地安定三郡土廣人稀饒穀多畜吾且休兵北道就粮養士以觀其弊乃可圖也於是引軍北至栒邑禹所到擊破赤眉別將諸營保郡邑皆開門歸附西河太守宗育遣子奉檄降禹遣詣京師帝以關中未定而禹久不進兵下勑曰司徒堯也亡賊桀也長安吏人遑遑無所依歸宜以時進討鎮慰西京繫百姓之心禹猶執前意乃分遣將軍別攻上郡諸縣更徵兵引穀歸至大要遣馮愔宗歆守栒邑二人爭權相攻愔遂殺歆因反擊禹禹遣使以聞帝帝問使人愔所親愛為誰對曰護軍黃防帝度愔防不能久和執必相忤因報禹曰縛馮愔者必黃防也乃遣尚書宗廣持節降之後月餘防果執愔將其衆歸罪更始諸將王匡胡殷成丹等皆詣廣降與共東歸至安邑道欲亡廣悉斬之愔至洛陽赦不誅二年春遣使者更封禹為梁侯食四縣時赤眉西走扶風禹乃南至長安軍昆明池大饗士卒率諸將齋戒擇吉日修禮謁祠高廟收十一帝神主遣使奉詣洛陽因循行園陵為置吏士奉守焉禹引兵與延岑戰於藍田不克復就穀雲陽漢中王劉嘉詣禹降嘉相李寶倨慢無禮禹斬之寶弟收寶部曲擊禹殺將軍耿訢自馮愔反後禹威稍損又乏食歸附者離散而赤眉復還入長安禹與戰敗走至高陵軍士飢餓者皆食棗菜帝乃徵禹還勑曰赤眉無穀自當來東吾折捶笞之非諸將憂也無得復妄進兵禹慙於受任而功不遂數以飢卒徼戰輒不利三年春與車騎將軍鄧弘擊赤眉遂為所敗衆皆死散事在馮異傳獨與二十四騎還詣宜陽謝上大司徒梁侯印綬有詔歸侯印綬數月拜右將軍延岑自敗於東陽遂與秦豐合四年春復寇順陽閒遣禹護復漢將軍鄧曄輔漢將軍于匡擊破岑於鄧追至武當復破之岑奔漢中餘黨悉降十三年天下平定諸功臣皆增戶邑定封禹為高密侯食高密昌安夷安淳于四縣帝以禹功高封弟寬為明親侯其後左右將軍官罷以特進奉朝請禹內文明篤行淳備事母至孝天下既定常欲遠名埶有子十三人各使守一蓺修整閨門教養子孫皆可以為後世法資用國邑不修產利帝益重之中元元年復行司悄從東巡狩封岱宗顯宗即位以禹先帝元功拜為太傅進見東向甚見尊寵居歲餘寢疾帝數自臨問以子男二人為郎永平元年年五十七薨謚曰元侯帝分禹封為三國長子震為高密侯襲為昌安侯珍為夷安侯禹少子鴻好籌策, WYG: ''}
