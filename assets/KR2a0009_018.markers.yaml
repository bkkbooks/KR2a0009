  - {type: variant, offset: 5636, length: 922, content: 中將大夫郎謁者不可勝數東京莫與為比論曰漢世外戚自東西京十有餘族非徒豪橫盈極自取災故必於貽釁後主以至顛敗者其數有可言焉何則恩非己結而權已先之情疏禮重而枉性圖之來竉方授地既害之𨻶埶謝讒亦勝之悲哉騭悝兄弟委遠時柄忠勞王室而終莫之免斯樂生所以泣而辭燕也寇恂字子翼上谷昌平人也世為著姓恂初為郡功曹太守耿況甚重之王莽敗更始立使使者徇郡國曰先降者復爵位恂從耿況迎使者於界上況上印綬使者納之一宿無還意恂勒兵入見使者就請之使者不與曰天王使者功曹欲脅之邪恂曰非敢脅使君竊傷計之不詳也今天下初定國信未宣使君建節銜命以臨四方郡國莫不延頸傾耳望風歸命今始至上谷而先墮大信沮向化之心生離畔之𨻶將復何以號令它郡乎且耿府君在上谷久為吏人所親今易之得賢則造次未安不賢則秖更生亂為使君計莫若復之以安百姓使者不應恂叱左右以使者命召況況至恂進取印綬帶況使者不得已乃承制詔之況受而歸及王郎起遣將徇上谷急況發兵恂與門下掾閔業共說況曰邯鄲拔起難可信向昔王莽時所難獨有劉伯升耳今聞大司馬劉公伯升母弟尊賢下士士多歸之可攀附也況曰邯鄲方盛力不能獨拒如何恂對曰今上谷完實控弦萬騎薑郡之資可以詳擇去就恂請東約漁陽齊心合衆邯鄲不足圖也況然之乃遣恂到漁陽結謀彭寵恂還至昌平襲擊邯鄲使者殺之奪其軍遂與況子弇等俱南及光武於廣阿拜恂為偏將軍號承義侯從破羣賊數與鄧禹謀議禹奇之因奉牛酒共交歡光武南定河內而更始大司馬朱鮪等盛兵據洛陽又并州未安光武難其守問於鄧禹曰諸將誰可使守河內者禹曰昔高祖任蕭何於關中無復西顧之憂所以得專精山東終成大業今河內帶河為固戶口殷實北通上黨南迫洛陽寇恂文武備足有牧人御衆之才非此子莫可使也乃拜恂河內太守行大將軍事光武謂恂曰河內完富吾將因是而起昔高祖留蕭何鎮關中吾今委公以河內堅守轉運給足軍糧率厲士馬防遏它兵勿令北度而已光武於是復北征燕代恂移書屬縣講兵肄射伐淇園之竹為矢百餘萬養馬二千匹收租四百萬斛轉以給軍朱鮪聞光武北而河內孤使討難將軍蘇茂副將賈彊將兵三萬餘人度鞏河攻溫檄書至恂即勒軍馳出並移告屬縣發兵會於溫下軍吏皆諫曰今洛陽兵度河前後不絕宜待衆軍畢集乃可出也恂曰溫郡之藩蔽失溫則郡不可守遂馳赴之旦日合戰而偏將軍馮異遣救及諸縣兵適至士馬四集幡旗蔽野恂乃令士卒乘城鼓噪大呼言曰劉公兵到蘇茂軍聞, WYG: ''}
