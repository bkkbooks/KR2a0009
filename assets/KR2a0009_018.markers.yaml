  - {type: variant, offset: 152, length: 3, content: 禹得効, WYG: 方此水也禮記盛徳篇曰明堂九室以茅蓋屋上圓下方此水名曰辟雍王制曰天子出征執有罪反舍奠於學以訊馘告樂記曰武王伐殷薦俘馘于京太室詩魯頌云矯矯虎臣在泮獻馘京鎬京也太室辟雍之中明堂太室也與諸侯泮宫俱獻馘焉即王制所謂以訊馘告者也禮記曰祀乎明堂所以教諸侯之孝也孝經曰孝悌之至通於神明光于四海無所不通詩云自西自東自南自北無思不服言行孝者則曰明堂行悌者則曰太學故孝經合以為一義而稱鎬京之詩以明之凡此皆明堂太室辟雍太學事通文合之義也}
