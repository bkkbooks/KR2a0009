  - {type: variant, offset: 2667, length: 0, content: '', WYG: 建武都雒陽制祀不道祭六宗由是廢不血食今冝復舊制度制曰下公卿議五官将行𢎞等三十一人議可祭大鴻臚龎雄等二十四人議不可當祭上從郃議由是遂祭六宗六宗之議自伏生及乎後代各有不同今竝抄集以證其論云虞書曰肆類于上帝禋于六宗望于山川伏生馬融曰萬物非天不覆非地不載非春不生非夏不長非秋不收非冬不藏禋于六宗此之謂也歐陽和伯夏侯建曰六宗上不謂天下不謂地傍不謂四方在六者之間助隂陽變化者也孔安國曰精意以享謂之禋宗尊也所尊祭其祀有六埋}
  - {type: page-break, offset: 2667, content: '', id: KR2a0009_WYG_018-8b, image: WYG0252/WYG0252-0280d.png}
  - {type: variant, offset: 2667, length: 0, content: '', krp: 建武都雒陽制祀不道祭六宗由是廢不血食今冝復舊制度制曰下公卿議五官将行𢎞等三十一人議可祭大鴻臚龎雄等二十四人議不可當祭上從郃議由是遂祭六宗六宗之議自伏生及乎後代各有不同今竝抄集以證其論云虞書曰肆類于上帝禋于六宗望于山川伏生馬融曰萬物非天不覆非地不載非春不生非夏不長非秋不收非冬不藏禋于六宗此之謂也歐陽和伯夏侯建曰六宗上不謂天下不謂地傍不謂四方在六者之間助隂陽變化者也孔安國曰精意以享謂之禋宗尊也所尊祭其祀有六埋}
  - {type: variant, offset: 2668, length: 0, content: '', WYG: 牢于太昭祭時也相近於坎壇祭寒暑也王宫祭日也夜明祭月也幽禜祭星也雩禜祭水旱也禋于六宗此之謂也孔叢曰宰我問六宗於夫子夫子答如安國之説臣昭以此觧若果是夫子所説則後儒無復紛然文秉案劉歆曰六宗謂水火雷風川澤也賈逵曰六宗謂日宗月宗星宗岱宗海宗河宗也鄭𤣥曰六宗星辰司中司命風伯雨師也星五緯也辰謂日月所㑹十二次也司中司命文昌第五第四星也風師箕也雨師畢也晉武帝初司馬紹統表駁之曰臣以為帝在于類則禋者非天山川屬望則海岱非宗宗猶包山則望何秩焉伏與歆逵失其義也六合之間非制典所及六宗之數非一位之名隂陽之説又非義也并五緯以為一分文昌以為二箕畢既屬於辰風師雨師復特為位𤣥之失也安國案祭法為宗而除其天地於上遺其四方於下取其中以為六宗四時寒暑日月衆星并水旱所宗者八非但六也傳曰山川之神則水旱厲疫之灾於是乎禜之日月星辰之神則雪霜風雨之不時於是乎禜之又曰龍見而雩如此禜者祀日月星辰山川之名雩者周人四月祭天求雨之稱也雪霜之灾非夫禜之所禳雩祭之禮非正月之所祈周人之後説有虞之典故於學者未盡喻也且類于上帝既禮天也望于山川禜所及也案周禮云昊天上帝日月星辰司中司命風師雨師社稷五祀五嶽山林川澤四方百物又曰兆五帝於四郊四類四望亦如之無六宗之兆祭法云祭天祭地祭時祭寒暑日月星祭水旱祭四方及山林川谷丘陵能出雲為風雨見怪物皆是有天下者祭百神非此族也不在祀典復無六宗之文明六宗所禋即祭法之所及周禮之所祀即虞書之所宗不冝特復立六宗之祀也春官大宗伯之職掌玉作六器以禮天地四方以蒼璧禮天以黄琮禮地以青圭禮東方以赤璋禮南方以白琥禮西方以𤣥璜禮北方天宗日月星辰寒暑之屬也地宗社稷五祀之屬也四方之宗者四時五帝之屬也如此則羣神咸秩而無廢百官徧修而不瀆於理為通幽州秀才張髦又上疏曰禋於六宗禮祖考所尊者六也何以考之周禮及禮記王制天子将出類于上帝冝于社造于禰廵狩四方覲諸侯歸格于祖禰用特堯典亦曰肆類于上帝禋于六宗望于山川徧于羣神班瑞于羣后肆覲東后叶時月正日同律度量衡廵狩一嵗以周爾乃歸格于藝祖用特臣以尚書與禮王制同事一義符契相合禋于六宗正謂祀祖考宗廟也文祖之廟六宗即三昭三穆也若如十家之説既各異義上下違背且没乎祖之禮考之禮考之祀典尊卑失序若但類于上帝不禋祖禰而行去時不告歸何以格以此推之較然可知也禮記曰夫政必本於天殽以降命命降于社之為殽地降于祖廟之謂仁義降於山川之謂興作降于五祀之謂制度又曰祭帝於郊所以定天位也祀社于國所以列地利也祭祖於廟所以本仁也山川所以儐鬼神也五祀所以本祀也又曰禮行於郊而百神受職焉禮行於社而百貨可極焉禮行於祖廟而孝慈服焉禮行於五祀而正法則焉故自郊社祖廟五祀義之修而禮之藏也凡此皆孔子所以祖述堯舜紀三代之教著在祀典首尾相證皆先天地次祖宗而後山川羣神耳故禮祭法曰七代之所更變者禘郊宗祖明舜受終文祖之廟察璇璣考七政審已天命之定遂上郊廟當義合堯典則周公其人也郊祀后稷以配天宗祀文王於明堂以配上帝是以四海之内各以其職來祭者也居其位攝其事郊天地供羣神之禮廵狩天下而遺其祖宗恐非有虞之志也五嶽視三公四瀆視諸侯皆以案先儒之説而以水旱風雨先五嶽四瀆從祖考而次上帝錯於肆類而亂祀典臣以十一家皆非也太學博士吳啇以為禋之言煙也三祭皆積柴而實牲體焉以升煙而報陽非祭宗廟之名也鄭所以不從諸儒之説者将欲據周禮禋祀皆天神也日月星辰司中司命風師雨師凡八而日月并從郊故其餘為六宗也以書禋于六宗與周禮事相符故據以為説也且文昌雖}
