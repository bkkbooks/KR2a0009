  - {type: variant, offset: 4715, length: 647, content: 太后皆不聽但白蓋雙騎門生輓送後以帝師之重分西平之都鄉封廣德弟甫德為都鄉侯四年又封京子黃門侍郎珍為陽安侯邑三千五百戶五年悝閶相繼並卒皆遺言薄葬不受爵贈太后並從之乃封悝子廣宗為葉侯閶子忠為西華侯自祖父禹教訓子孫皆遵法度深戒竇氏檢勑宗族闔門靜居騭子侍中鳳嘗與尚書郎張龕書屬郎中馬融宜在臺閣又中郎將任尚嘗遺鳳馬後尚坐斷盜軍粮檻車徵詣廷尉鳳懼事泄先自首於騭騭畏太后遂髡妻及鳳以謝天下稱之建光元年太后崩未及大斂帝復申前命封騭為上蔡侯位特進帝少號聰敏及長多不德而乳母王聖見太后久不歸政慮有廢置常與中黃門李閏候伺左右及太后崩宮人先有受罰者懷怨恚因誣告悝弘閶先從尚書鄧訪取廢帝故事謀立平原王得帝聞追怒令有司奏悝等大逆無道遂廢西平侯廣德葉侯廣宗西華侯忠陽安侯珍都鄉侯甫德皆為庶人騭以不與謀但免特進遣就國宗族皆免官歸故郡沒入騭等貲財田宅徙鄧訪及家屬於遠郡郡縣逼迫廣宗及忠皆自殺又徙封騭為羅侯騭與子鳳並不食而死騭從弟河南尹豹度遼將軍舞陽侯遵將作大匠暢皆自殺唯廣德兄弟以母閻后戚屬得留京師大司農朱寵痛騭無罪遇禍乃肉袒輿櫬上疏追訟騭曰伏惟和熹皇后聖善之德為漢文母兄弟忠孝同心憂國宗廟有主王室是賴功成身退讓國遜位歷世外戚無與為比當享積善履謙之祐而橫為宮人單辭所陷利口傾險反亂國家罪無申證獄不訊鞠遂令騭等罹此酷濫一門七人並不以命屍骸流離怨魂不反逆天感人率土喪氣宜收還冢次寵樹遺孤奉承血祀以謝亡靈寵知其言切自致廷尉詔免官歸田里衆庶多為騭稱枉帝意頗悟乃譴讓州郡還葬洛陽北芒舊塋公卿皆會喪莫不悲傷之詔遣使者祠以中牢諸從昆弟皆歸京師及, WYG: ''}
