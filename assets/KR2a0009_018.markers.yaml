  - {type: variant, offset: 15, length: 11, content: 訓孫騭寇恂曾孫榮鄧禹字, WYG: 與易傳保傅王居明堂之禮參相發明為四學焉文王世子篇曰凡大合樂則遂飬老天子至乃命有司行事興秩節祭先師先聖焉始之飬也適東序釋奠於先老遂設三老五更之席位言教學始之於飬老由東方嵗始也又春夏學干戈秋冬學羽籥皆於東序凡祭與飬老乞言合語之禮皆小樂正詔之於東序又曰大司成論説在東序然則詔學皆在東序東序東之堂也學者詔焉故稱太學}
