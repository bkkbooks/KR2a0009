  - {type: variant, offset: 6, length: 3, content: 鄧寇列, WYG: 宗辟雍老子靈臺迎氣是年初營北郊明堂周禮考工記曰周人明堂度九尺之筵東西九筵南北七筵堂崇一筵五室凡室二筵鄭𤣥曰明堂者明政教之堂周度以筵亦王者相改周堂高九尺殷三尺則夏一尺矣相參之數也孝經援神契曰明堂上圓下方八窻四逹布政之宫在國之陽晏子春秋曰明堂之制下之温濕不能及也上之寒暑不能入也木工不鏤示民知節也吕氏春秋曰周明堂茅茨蒿柱土階三等以見儉節也前志武帝欲治明堂奉高旁未明其制度濟南人公玉𢃄上黄帝時明堂圖圖中有一殿四靣無壁以茅葢通水水園宫垣為復道上有樓從西南入名曰崑崙以拜禮上帝於是作明堂汶水上如帯圖新論曰天稱明故命曰明堂上圓法天下方法地八窻法八風四逹法四時九室法九州十二坐法十二月三十六户法三十六雨七十二牖法七十二風東京賦曰復廟重屋八逹九房薛綜注曰八逹謂室有八窻也堂後有九室所以異於周制也王隆漢官篇曰是古者清廟茅屋胡廣曰古之清廟以茅蓋屋所以示儉也今之明堂茅蓋之乃加瓦其上不忘古也辟雍白虎通曰辟雍所以行禮樂宣徳化也辟者象璧圓以法天也雍者壅之以水象教化流行也辟之為言積也積天下之道徳雍之為言壅也壅天下之儀則故謂辟雍也王制曰天子辟雍諸侯泮宫外圓者欲使觀者平均也又欲言外圓内方明徳當圓行當方也靈臺未用事禮含文嘉曰禮天子靈臺所以觀天人之際隂陽之㑹也揆星度之驗徴六氣之端應神明之變化覩日氣之所驗為萬物獲福於無方之原招太極之清泉以與稼穡之根倉廩實知禮節衣食足知榮辱天子得靈臺之則五車三柱明制可行不失其常水泉川流無滯寒暴暑之灾陸澤山陵禾盡豐穰故東京賦曰左制辟雍右立靈臺薛綜注曰於上班教曰明堂大合樂射饗者辟雍司歴記候節氣者曰靈臺蔡邕明堂論曰明堂者天子太廟所以崇禮其祖以配上帝者也夏后氏曰世室殷人曰重屋周人曰明堂東曰青陽南曰明堂西曰總章北曰𤣥堂中曰太室易曰離也者明也南方之卦也聖人南靣而聼天下嚮明而治人君之位莫正於此焉故雖有五名而主以明堂也其正中焉皆曰太廟謹承天隨時之令昭令徳宗祀之禮明前功百辟之勞起尊老敬長之義顕教㓜誨稚之學朝諸侯選造士於其中以制度生者乘其能而至死者論其功而祭故為大教之宫而四學具焉官司備焉譬如北辰居其所而衆星拱之萬象翼之政教之所由生受作之所自來明一統也故言明堂事之大義之深也取其宗祀之清貌則曰清廟取其正室之貌則曰太廟取其尊崇則曰太室取其向明則曰明堂取其四門之學則曰太學取其四靣周水圓如璧則曰辟雍異名而同事其實一也春秋因魯取宋之姦賂則顕之太廟以明聖王建清廟明堂之義經曰取郜大鼎于宋納于太廟}
