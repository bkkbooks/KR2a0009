  - {type: variant, offset: 6906, length: 595, content: 部將殺人於潁川恂捕得繫獄時尚草創軍營犯法率多相容恂乃戮之於市復以為恥歎還過潁川謂左右曰吾與寇恂並列將帥而今為其所陷大丈夫豈有懷侵怨而不決之者乎今見恂必手劒之恂知其謀不欲與相見谷崇曰崇將也得帶劒侍側卒有變足以相當恂曰不然昔藺相如不畏秦王而屈於廉頗者為國也區區之趙尚有此義吾安可以忘之乎乃勑屬縣盛供具儲酒醪執金吾軍入界一人皆兼二人之饌恂乃出迎於道稱疾而還賈復勒兵欲追之而吏士皆醉遂過去恂遣谷崇以狀聞帝乃徵恂恂至引見時復先在坐欲起相避帝曰天下未定兩虎安得私鬬今日朕分之於是並坐極歡遂共車同出結友而去恂歸潁川三年遣使者即拜為汝南太守又使驃騎將軍杜茂將兵助恂討盜賊盜賊清靜郡中無事恂素好學乃修鄉校教生徒聘能為左氏春秋者親受學焉七年代朱浮為執金吾明年從車駕擊隗囂而潁川盜賊羣起帝乃引軍還謂恂曰潁川迫近京師當以時定惟念獨卿能平之耳從九卿復出以憂國可知也恂對曰潁川剽輕聞陛下遠踰阻險有事隴蜀故狂狡乘閒相詿誤耳如聞乘輿南向賊必惶怖歸死臣願執銳前驅即日車駕南征恂從至潁川盜賊悉降而竟不拜郡百姓遮道曰願從陛下復借寇君一年四乃留恂長社鎮撫吏人受納餘降初隗囂將安定高峻擁兵萬人據高平第一帝使待詔馬援招降峻由是河西道開中郎將來歙承制拜峻通路將軍封關內侯後屬大司馬吳漢共圍囂於冀及漢軍退峻亡歸故營復助囂拒隴阺及囂死峻據高平畏誅堅守建威大將軍耿弇率太中大夫竇士武威太守梁統等圍之一歲不拔十年帝入關將自征之恂時從駕諫曰長安道, WYG: 郊五}
