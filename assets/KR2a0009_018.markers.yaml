  - {type: variant, offset: 2102, length: 0, content: '', WYG: 禮䜟及月令有五郊迎氣服色因采元始中故事兆五郊於雒陽四方中兆在未壇皆三尺階無等立春之日迎春於東郊祭青帝句芒月令章句曰東郊去邑八里因木數也車旗服餙皆青歌青陽八佾舞雲翹之舞及因賜文官太傅司徒以下縑各有差立夏之日迎夏於南郊祭赤帝祝融月令章句曰去邑七里因火數也車旗服餙皆赤歌朱明八佾舞雲翹之舞先立秋十八日迎黄靈於中兆祭黄帝后土月令章句曰南郊五里因土數也車旗服餙皆黄歌朱明八佾舞雲翹育命之舞魏氏繆襲議曰漢有雲翹育命之舞不知所出舊以祀天今可兼以雲翹祀圜丘兼以育命祀方澤立秋之日迎秋於西郊祭白帝蓐收月令章句曰西郊九里因金數也車旗服餙皆白歌西皓八佾舞育命之舞使謁者以一特牲先祭先虞於壇有事天子入囿射牲以祭宗廟名曰貙劉語在禮儀志立冬之日迎冬於北郊祭黒帝𤣥冥月令章句曰北郊六里因水數也車旗服餙皆黒歌𤣥冥八佾舞育命之舞獻帝起居注曰建安八年公卿迎氣北郊始復用八佾皇覽曰迎禮春夏秋冬之樂又順天道是故距冬至日四十六日則天子迎春於東堂距邦八里堂高八尺堂階三等青税八乘旗尾尚青田車載矛號曰助天生唱之以角舞之以羽翟此迎春之樂也自春分數四十六日則天子迎夏於南堂距邦七里堂高七尺堂階二等赤税七乘旗旄尚赤田車載㦸號曰助天飬唱之以徴舞之以鼓鞉此迎夏之樂也自夏至數四十六日則天子迎秋於西堂距邦九里堂高九尺堂階九等白税九乘旗旄尚白田車載兵號曰助天收唱之以商舞之以干戚此迎秋之樂也自秋分數四十六日則天子迎冬於北堂距邦六里堂高六尺堂階六等黒税六乘旗旄尚黒田車載甲鐵鍪號曰助天誅唱之以羽舞之以干戈此迎冬之樂也章帝即位元和二年正月詔曰山川百神應祀者未盡其議增修羣祀冝享祀者東觀書詔曰經稱秩元祀咸秩無文祭法功施於民則祀之以死勤事則祀之以勞定國則祀之能禦大灾則祀之以日月星辰民所瞻仰也山林川谷丘陵民所取財用也非此族也不在祀典傳曰聖王先成民而後致力於神又曰山川之神則水旱厲疫之灾於是乎禜之日月星辰之神則雪霜風雨之不時於是乎禜之孝文十二年令曰比年五糓不登欲有以増諸神之祀王制曰山川神祗有不舉者}
