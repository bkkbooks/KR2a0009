  - {type: variant, offset: 10, length: 1, content: 第, WYG: 曰非禮也君人者将昭徳塞違故昭令徳以示子孫是以清廟茅屋昭其儉也夫徳儉而有度升降有數文物以紀之聲明以發之以照臨百官百官於是戒懼而不敢易紀律所以大明教也以周清廟論之魯太廟皆明堂也魯禘祀周公扵太廟明堂猶周宗祀文王於清廟明堂也禮記檀弓曰王齋禘於清廟明堂也孝經曰宗祀文王於明堂禮記明堂位曰太廟天子曰明堂又曰成王㓜弱周公踐天子位以治天下朝諸侯於明堂制禮作樂頌度量而天下大服成王以周公為有大勲勞於天下命魯公世世禘祀周公於太廟以天子禮樂升歌清廟下管象舞所以異魯於天下也取周清廟之歌歌於魯太廟明魯之太廟猶周清廟也皆所以昭文王周公之徳以示子孫者也易傳太初篇曰太子旦入東學晝入南學暮入西學在中央曰太學天子之所自學也禮記保傳篇曰帝入東學上親而貴仁入西學上賢而貴徳入南學上齒而貴信入北學上貴而尊爵入太學承師而問道與易傳同魏文侯孝經傳曰太學者中學明堂之位也禮記古大明堂之禮曰膳夫是相禮日中出南闈見九侯反問于相日側出西闈視五國之事日闇出北闈視帝節猶爾雅曰宫中之門謂之闈王居明堂之禮又别隂陽門南門稱門西門稱闈故周官有門闈之學師氏教以三徳守王門保氏教以}
