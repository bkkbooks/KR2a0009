  - {type: variant, offset: 8110, length: 849, content: 曰人父母先慈愛後威武先寬容後刑辟自生齒以上咸蒙德澤而臣兄弟獨以無辜為專權之臣所見批扺青蠅之人所共搆會以臣婚姻王室謂臣將撫其背奪其位退其身受其埶於是遂作飛章以被於臣欲使墜萬仞之阬踐必死之地令陛下忽慈母之仁發投杼之怒尚書背繩墨案空劾不復質确其過寘於嚴棘之下便奏正臣罪司隸校尉馮羨佞邪承旨廢於王命驅逐臣等不得旋踵臣奔走還郡沒齒無怨臣誠恐卒為豺狼橫見噬食故冒死欲詣闕披肝膽布腹心豹洛陽令袁騰並驅爭先若赴仇敵及死沒髡剔墳墓但未掘壙出尸剖棺露胔耳昔文王葬枯骨公劉敦行葦世稱其仁今殘酷容媚之吏無折中處平之心不顧無辜之害而興虛誣之誹欲使嚴朝必加濫罰是以不敢觸突天威而自竄山林以俟陛下發神聖之聽啟獨覩之明拒讒慝之謗絕邪巧之言救可濟之人援沒溺之命不意滯怒不為春夏息淹恚不為順時怠遂馳使郵驛布告遠近嚴文剋剝痛於霜雪張羅海內設罝萬里逐臣者窮人迹追臣者極車軌雖楚購伍員漢求季布無以過也力止則見埽滅行則為亡虜苟生則為窮人極死則為冤鬼天廣而無以自覆地厚而無以自載蹈陸土而有沈淪之憂遠巖牆而有鎮壓之患精誠足以感於陛下而哲王未肯悟如臣犯元惡大憝足以陳於原野備刀鋸陛下當班布臣之所坐以解衆論之疑臣思入國門坐於胏石之上使三槐九棘平臣之罪而閶闔九重陷穽步設舉趾觸罘罝動行絓羅網無綠至萬乘之前永無見信之期矣煖反寒春常凄風夏降霜雹又連年大風折拔樹木風為號令春夏布德議獄緩死之時願陛下思帝堯五教在寬之德企成湯避遠讒夫之誡以寧風旱以弭災兵臣聞勇者不逃死智者不重困固不為明朝惜垂盡之命願赴湘沅之波從屈原之悲沈江湖之流弔子胥之哀臣功臣苗緒生長王國懼獨含恨以葬江魚之腹無以自別於世不勝狐死首丘之情營魂識路之懷犯冒王怒觸突帝禁伏於兩觀陳訴毒痛然後登金鑊入沸湯糜爛於熾爨之下九死而未悔廩浚井之難申生不辭姬氏讒邪之謗臣敢忘斯議不自斃以解明朝之忿哉乞以身塞重責願陛下匄兄弟死命使臣一門頗有遺類以崇陛下寬饒之惠先死陳情臨章涕泣泣血連漣如帝省章愈怒遂誅榮寇氏由是衰廢贊曰元侯淵謨乃作司徒明啟帝略肇定秦都勳成智隱靜其如愚子翼守溫蕭公是係兵轉食以集鴻烈誅文屈賈有剛有折, WYG: 卷十八考證}
