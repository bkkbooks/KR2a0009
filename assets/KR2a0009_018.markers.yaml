  - {type: variant, offset: 2905, length: 1808, content: 盧水胡反畔以訓為謁者乘傳到武威拜張掖太守章和二年護羌校尉張紆誘誅燒當種羌迷吾等由是諸羌大怒謀欲報怨朝廷憂之公卿舉訓代紆為校尉諸羌激忿遂相與解仇結婚交質盟詛衆四萬餘人期冰合度河攻訓先是小月氏胡分居塞內勝兵者二三千騎皆勇健富彊每與羌戰常以少制多雖首施兩端漢亦時收其用時迷吾子迷唐別與武威種羌合兵萬騎來至塞下未敢攻訓先欲脅月氏胡訓擁衛稽故令不得戰議者咸以羌胡相攻縣官之利以夷伐夷不宜禁護訓曰不然今張紆失信衆羌大動經常屯兵不下二萬轉運之費空竭府帑涼州吏人命縣絲髮原諸胡所以難得意者皆恩信不厚耳今因其迫急以德懷之庶能有用遂令開城及所居園門悉驅羣胡妻子內之嚴兵守衛羌掠無所得又不敢逼諸胡因即解去由是湟中諸胡皆言漢家常欲鬬我曹今鄧使君待我以恩信開門內我妻子乃得父母咸歡喜叩頭曰唯使君所命訓遂撫養其中少年勇者數百人以為義從羌胡俗恥病死每病臨困輒以刃自刺訓聞有困疾者輒拘持縛束不與兵刃使醫藥療之愈者非一小大莫不感悅於是賞賂諸羌種使相招誘迷唐伯父號吾乃將其母及種人八百戶自塞外來降訓因發湟中秦胡羌兵四千人出塞掩擊迷唐於寫谷斬首虜六百餘人得馬牛羊萬餘頭迷唐乃去大小榆居頗巖谷衆悉破散其春復欲歸故地就田業訓乃發湟中六千人令長史任尚將之縫革為船置於箄上以度河掩擊迷唐廬落大豪多所斬獲復追逐奔北會尚等夜為羌所攻於是義從羌胡并力破之斬首前後一千八百餘級獲生口二千人馬牛羊三萬餘頭一種殆盡迷唐遂收其餘部遠徙廬落西行千餘里諸附落小種皆背畔之燒當豪帥東號稽顙歸死餘皆款塞納質於是綏接歸附威信大行遂罷屯兵各令歸郡唯置弛刑徒二千餘人分以屯田為貧人耕種修理城郭塢壁而已永元二式大將軍竇憲將兵鎮武威憲以訓曉羌胡方略上求俱行訓初厚於馬氏不為諸竇所親及憲誅故不離其禍訓雖寬中容衆而於閨門甚嚴兄弟莫不敬憚諸子進見未嘗賜席接以溫色四年冬病卒官時年五十三吏人羌胡愛惜旦夕臨者日數千人戎俗父母死恥悲泣皆騎馬歌呼至聞訓卒莫不吼號或以刀自割又刺殺其犬馬牛羊日鄧使君已死我曹亦俱死耳前烏桓吏士皆奔走道路至空城郭吏執不聽以狀白校尉徐傿傿歎息曰此義也乃釋之遂家家為訓立祠每有疾病輒此請禱求福元興元年和帝以訓皇后之父使謁者持節至訓墓賜策追封謚曰平壽敬侯中宮自臨百官大會訓五子騭京悝弘閶騭字昭伯少辟大將軍竇憲府及女弟為貴人騭兄弟皆除郎中及貴人立是為和熹皇后騭三遷虎賁中郎將京悝弘閶皆黃門侍郎京卒於官延平元年拜騭車騎將軍儀同三司儀同三司始自騭也悝虎賁中郎將弘閶皆侍中殤帝崩太后與騭等定策立安帝悝遷城門校尉弘虎賁中郎將自和帝崩後騭兄弟常居禁中騭謙遜不欲久在內連求還第歲餘太后乃許之永初元年封騭上蔡侯悝葉侯弘西平侯閶西華侯食邑各萬戶騭以定策功增邑三千戶騭等辭讓不獲遂逃避使者閒關詣闕上疏自陳曰臣兄弟汙濊無分可採過以外戚遭值明時託日月之末光被雲雨之渥澤並統列位光昭當世不能宣贊風美補助清化誠慙誠懼無以處心陛下躬天然之姿體仁聖之德遭國不造仍離大憂開日月之明運獨斷之慮援立皇統奉承大宗聖策定於神心休烈垂於不朽本非臣等所能萬一而猥推嘉美並享大封伏聞詔書驚惶慙怖追觀前世傾覆之誡退自惟念不寒而慄臣等雖無逮及遠見之慮猶有庶幾戒懼之情常母子兄弟內相勑厲冀以端売心畏慎一心奉戴上全天恩下完性命刻骨定分有死無二終不敢橫受爵土以增罪累惶窘征營昧死陳乞太后不聽騭頻上疏至於五六乃許之其夏涼部畔羌搖蕩西州朝廷憂之於是詔騭將左右羽林北軍五校士及諸部兵擊之車駕幸平樂觀餞送騭西屯漢陽使征西校尉任尚從事中郎司馬鈞與羌戰大敗時以轉輸疲弊百姓苦役冬徵騭班師朝廷以太后故遣五官中郎將迎拜騭為大將軍軍到河南使大鴻臚親迎中常侍齎牛酒郊勞王主以下候望於道既至大會羣臣賜束帛乘馬寵靈顯赫光震都鄙時遭元二之災人士荒飢死者相望盜賊羣起四夷侵畔騭等崇節儉罷力役推進天下賢士何熙祋諷羊浸李郃陶敦等列於朝廷辟楊震朱寵陳禪置之幕府故天下復安四年母新野君寢病騭兄弟並上書求還侍養太后以閶最少孝行尤著特聽之賜安車駟馬及新野君薨騭等復乞身行服章連上太后許之騭等既還里第並居冢次閶至孝骨立有聞當時及服闋詔喻騭還輔朝政更授前封騭等叩頭固讓乃止於是並奉朝請位次在三公下特進侯上其有大議乃詣朝堂與公卿參謀元初二年弘卒太后服齊衰帝絲麻並宿幸其第弘少治歐陽尚書授帝禁中諸儒多歸附之初疾病遺言悉以常服不得用錦衣玉匣有司奏贈弘驃騎將軍位特進封西平侯太后追思弘意不加贈位衣服但賜錢千萬布萬匹騭等復辭不受詔大鴻臚持節即弘殯封子廣德為西平侯將葬有司復奏發五營輕車騎士禮儀如霍光, WYG: ''}
