  - {type: variant, offset: 7502, length: 481, content: 居中應接近便安定隴西必懷震懼此從容一處可以制四方也今士馬疲倦方履險阻非萬乘之固前年潁川可為至戒帝不從進軍及汧峻猶不下帝議遣使降之乃謂恂曰卿前止吾此舉今為吾行也若峻不即降引耿弇等五營擊之恂奉璽書至第一峻遣軍師皇甫文出謁辭禮不屈恂怒將誅文諸將諫曰高峻精兵萬人率多彊弩西遮隴道連年不下今欲降之而反戮其使無乃不可乎恂不應遂斬之遣其副歸告峻曰軍師無禮已戮之矣欲降急降不欲固守峻惶恐即日開城門降諸將皆賀因曰敢問殺其使而降其城何也恂曰皇甫文峻之腹心其所取計者也今來辭意不屈必無降心全之則文得其計殺之則峻亡其膽是以降耳諸將皆曰非所及也遂傳峻還洛陽恂經明行修名重朝廷所得秩奉厚施朋友故人及從吏士常曰吾因士大夫以致此其可獨享之乎時人歸其長者以為有宰相器十二年卒謚曰威侯子損嗣恂同產弟及兄子姊子以軍功封列侯者凡八人終其身不傳於後初所與謀閔業者恂數為帝言其忠賜爵關內侯官至遼西太守十三年復封損庶兄壽為洨侯後徙封損扶柳侯損卒子釐嗣徙封商鄉侯釐卒子襲嗣恂女孫為大將軍鄧騭夫人由是寇氏得志於永初閒恂曾孫榮論曰傳稱喜怒以類者鮮矣夫喜而不比怒而思難者其唯君子乎子曰伯夷叔齊不念舊惡怨是用希於寇公而, WYG: 互}
