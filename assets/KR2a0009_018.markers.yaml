  - {type: variant, offset: 2103, length: 1, content: 小, WYG: 不敬今恐山川百神應典祀者尚未盡秩其議増修羣祀冝享祀者以祈豐年以致嘉福以蕃兆民詩不云乎懐柔百神及河喬嶽有年報功不私幸望豈嫌同辭其義一焉二月上東廵狩将至㤗山道使使者奉一太牢祠帝堯於濟隂成陽靈臺上至㤗山修光武山南壇兆辛未柴祭天地羣神如故事壬申宗祀五帝於孝武所作汶上明堂光武帝配如雒陽明堂祀癸酉更告祠高祖太宗世宗中宗世祖顯宗於明堂各一太牢卒事遂覲東后饗賜王}
