  - {type: variant, offset: 2724, length: 2, content: 終楊, WYG: 葬以王禮故數有災異宜加尊諡列於昭穆羣臣議者多謂宜如詔㫖舉獨對曰昔周公有請命之應隆太平之功故皇天動威以章聖徳北鄉侯本非正統姦臣所立立不踰嵗年號未改皇天不祐大命天昏杜預注左傳曰短折曰夭未名曰昏春秋王子猛不稱崩魯子野不書葬子猛周景王之子子野魯襄公之子春秋經書王子猛卒杜元凱注云未即位故不言崩又曰秋九月癸巳子野卒注曰不書葬未成君也今北鄉侯無它功徳以王禮葬之於事己崇不宜稱諡災𤯝之來弗}
