  - {type: variant, offset: 2703, length: 3, content: 吉凶占, WYG: 訓之以嘉祥此先聖承乾養物之始也夫隂陽閉隔則二氣否塞二氣否塞則人物不昌人物不昌則風雨不時風雨不時則水旱成災陛下處唐虞之位未行堯舜之政近廢文帝光武之法而循亡秦奢侈之欲内積怨女外有曠夫今皇嗣不興東宫未立傷和逆理斷絶人倫之所致也非但陛下行此而已豎宦之人亦復虚以形埶威侮良家取女閉之至有白首歿無配偶逆於天心歿終也昔武王入殷出傾宫之女帝王紀曰武王入殷命召公釋箕子之囚表商容之閭出傾宫之女於諸侯成湯遭災以六事剋己帝王紀曰湯伐桀後大旱七年洛川竭使人持三足鼎祝於山川曰政不節邪使人疾邪苞苴行邪䜛夫昌邪宫室榮邪女謁行邪何不雨之極也魯僖遇旱而自責祈雨解見楊厚傳皆以精誠轉禍為福自枯旱以來彌歴年嵗未聞陛下改過之効徒勞至尊暴露風塵誠無益也又下州郡祈神致請昔齊有大旱景公欲祀河伯晏子諫曰不可夫河伯以水為城國魚鼈為民庶水盡魚枯豈不欲雨自是不能致也晏子春秋之文陛下所行但務其華不尋其實猶縁木求魚却行求前縁木求魚見孟子之文韓詩外傳曰夫明鏡所以照形徃古所以知今夫惡知徃古之所以危亡無異却行而求逮於前人也誠宜推信革政崇道變惑出後宫不御之女理天下寃枉之獄除大官重膳之費夫五品不訓責在司徒有非其位宜急黜斥臣自藩外擢典納言學薄智淺不足以對易傳曰陽感天不旋日易稽覽圗之文也解見郎顗傳也惟陛下留神裁察因召見舉及尚書令成翊世僕射黄瓊問以得失舉等並對以為宜愼官人去斥貪汙離逺佞邪循文帝之儉尊孝明之教則時雨必}
