  - {type: variant, offset: 4953, length: 5, content: 陳郡郤巡學, WYG: 遷太尉更封陽泉鄉侯卓議遷都長安琬與司徒楊彪同諫不從琬退而駮議之曰昔周公營洛邑以寜姬光武卜東都以隆漢天之所啓神之所安大業既定豈宜妄有遷動以虧四海之望時人懼卓暴怒琬必及害固諌之琬對曰昔白公作亂於楚屈廬冒刃而前新序曰白公勝殺楚惠王王出亡令尹司馬皆死勝㧞劒而屬之於屈廬曰子與我將舍子不與我將殺子屈廬曰詩有之曰莫莫葛纍延于條枚愷悌君子求福不回今子殺子叔父而求福於廬也可乎且吾聞之知命之士見利不動臨死則死是謂人臣之禮故上知天命下知臣道其可刼乎子胡不推之白公勝乃入其劒焉崔杼弑君於齊晏嬰不懼其盟解見馮衍}
