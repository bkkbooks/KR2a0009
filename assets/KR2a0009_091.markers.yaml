  - {type: variant, offset: 1277, length: 915, content: 酒泉都尉及莽篡位楊乃變姓名為巫醫逃匿它界莽敗方還鄉里汝南舊有鴻郤陂成帝時丞相翟方進奏毀敗之建武中太守鄧晨欲修復其功聞楊曉水脈召與議之楊曰昔成帝用方進之言尋而自夢上天天帝怒曰何故敗我濯龍淵是後民失其利多致飢困時有謠歌曰敗我陂者翟子威飴我大豆亨我芋魁反乎覆陂當復昔大禹決江疏河以利天下明府今興立廢業富國安民童謠之言將有徵於此誠願以死效力晨大悅因署楊為都水掾使典其事楊因高下形埶起塘四百餘里數年乃立百姓得其便累歲大稔初豪右大姓因緣陂役競欲辜較在所楊一無聽遂共譖楊受取賕賂晨遂收楊下獄而械輒自解獄吏恐遽白晨晨驚曰果濫矣太守聞忠信可以感靈今其效乎即夜出楊遣歸時天大陰晦道中若有火光照之時人異焉後以病卒晨於都官宮為楊起廟圖畫形像百姓思其功績皆祭祀之高獲字敬公汝南新息人也為人尼首方面少遊學京師與光武有舊師事司徒歐陽歙歙下獄當斷獲冠鐵冠帶鈇鑕詣闕請歙帝雖不赦而引見之謂曰敬公朕欲用子為吏宜改常性獲對曰臣受性於父母不可改之於陛下出便辭去三公爭辟不應後太守鮑昱請獲既至門令主簿就迎主簿曰但使騎吏迎之獲聞之即去昱遣追請獲獲顧曰府君但為主簿所欺不足與談遂不留時郡境大旱獲素善天文曉遁甲能役使鬼神昱自往問何以致雨獲曰急罷三部督郵明府當自北出到三十里亭雨可致也昱從之果得大雨每行縣輒軾其閭獲遂遠遁江南卒於石城石城人思之共為立祠王喬者河東人也顯宗世為葉令喬有神術每月朔望常自縣詣臺朝帝怪其來數而不見車騎密令太史伺望之言其臨至輒有雙鳧從東南飛來於是候鳧至舉羅張之但得一隻舄焉乃詔尚方視則四年中所賜尚書官屬履也每當朝時葉門下鼓不擊自鳴聞於京師後天下玉棺於堂前吏人推排終不搖動喬曰天帝獨召我邪乃沐浴服飾寢其中蓋便立覆宿昔葬於城東土自成墳其夕縣中牛皆流汗喘乏而人無知者百姓乃為立廟號葉君祠牧守每班錄皆先謁拜之吏人祈禱無不如應若有違犯亦立能為祟帝乃迎取其鼓置都亭下略無復聲焉或云此即古仙人王子喬也謝夷吾字堯卿會稽山陰人也少為郡吏學風角占候太守第五倫擢為督郵時烏程長有臧釁倫使收案其罪夷吾到縣無所驗但望閤伏哭而還一縣驚怪不知所為及還白倫曰竊以占候知長當死近三十日遠不過六十日遊魂假息非刑所加故不收之倫聽其言至月餘果有驛馬齎長印綬上言暴卒倫以此益禮信之舉孝廉為壽張令稍遷荊, WYG: 并}
