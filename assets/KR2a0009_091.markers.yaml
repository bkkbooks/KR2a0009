  - {type: variant, offset: 4395, length: 1, content: 復, krp: 幸緱氏登太室聞山上呼萬嵗聲者三因以名焉蓋君子謂伯夷隘栁下惠不恭故傳曰不夷不惠可否之間論語孔子曰伯夷叔齊不降其志不辱其身謂栁下惠少連降志辱身我則異於是無可無不可鄭𤣥注云不為夷齊之清不為惠連之屈故曰異於是也蓋聖賢居身之所珍也誠遂欲枕山棲谷擬跡巢由斯則可矣若當輔政濟民今其時也自生民以來善政少而亂俗多必待堯舜之君此為志士終無時矣常聞語曰嶢嶢者易缺皦皦者易汙陽春之曲和者必寡盛名之下其實難副宋玉對楚襄王問曰客有歌於郢中者為下里巴人國中屬而和者数千人為陽春白雪屬而和者不過數百人是其曲彌髙其和彌寡近魯陽樊君被徴初至朝廷設壇席猶待神明樊君樊英也事具英傳雖無大異而言行所守亦無所缺而毁謗布流應時折減者豈非觀聽望深聲名太盛乎自頃徴聘之士胡元安薛孟嘗朱仲昭顧季鴻等其功業皆無所採是故俗論皆言處士純盜虛聲願先生𢎞此逺謨令衆人歎服一雪此言耳瓊至即拜議郎稍遷尚書僕射初瓊隨父在臺閣習見故事及後居職達練官曹爭議朝堂莫能抗奪時連有災異瓊上疏順帝曰間者以來卦位錯謬易乾鑿度曰求卦主嵗術常以太嵗為嵗紀嵗七十六為一紀二十紀為一蔀首即置積蔀首嵗數加所入紀嵗數以三十二除之不足除者以乾坤始數二卦而得一嵗未算即主嵗之卦也寒燠相干蒙氣數興日闇月散䝉隂闇也散謂不精明原之天意殆不虚然陛下宜開石室案河洛石室藏書之府河洛圖書之文也外命史官悉條上永建以前至漢初災異與永建以後訖于今日孰為多少又使近臣儒者參考政事數見公卿察問得失諸無功徳者宜皆斥黜臣前頗陳災𤯝并薦光禄大夫樊英太中大夫薛包及會稽賀純廣漢楊厚未䝉御省伏見處士巴郡黄錯漢陽任棠年皆耆耋有作者七人之志論語曰作者七人注云謂伯夷叔齊虞仲夷逸朱張栁下惠少連宜更見引致助崇大化於是有}
  - {type: variant, offset: 4399, length: 2, content: 賜策, WYG: 徴錯等三年大旱瓊復上疏曰昔魯僖遇旱以六事自讓躬節儉閉女謁放䜛佞者十三人誅稅民受貨者九人春秋考異郵曰僖公之時雨澤不㴻比于九月公大驚懼率羣臣禱山川以六過自讓絀女謁放下䜛佞郭都之等十三人誅領人之吏受貨賂趙祝等九人曰辜在寡人方今天旱野無生稼寡人當死百姓何謗請以身塞無狀也劉攽曰注郭都之等案文多一之字退舍南郊天立大雨今亦宜顧省政事有所損闕務存質儉以易民聽尚方御府息除煩費明勑近臣使遵法度如有不移示以好惡數見公卿引納儒士訪以政化使陳得失又囚徒尚積多致死亡亦足以感傷和氣招降災旱若改敝從善擇用嘉謀則災消福至矣}
