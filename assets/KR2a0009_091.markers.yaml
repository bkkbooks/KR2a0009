  - {type: variant, offset: 3550, length: 8, content: 功封郃涉都侯辭讓, WYG: 遷河内太守徴為太鴻臚及梁太后臨朝詔以殤帝㓜崩廟次宜在順帝下太常馬訪奏宜如詔書諫議大夫呂勃以為應依昭穆之序先殤帝後順帝詔下公卿舉議曰春秋魯閔公無子庶兄僖公代立其子文公遂躋僖於閔上孔子譏之書曰有事於太廟躋僖公傳曰逆祀也事見左氏傳及定公正其序經曰從祀先公為萬世法也左氏傳從祀先公杜預云從順也先公閔公僖公也將正二公之位親盡故通言先公也今殤帝在先於秩為父順帝在後於親為子先後之義}
