  - {type: variant, offset: 2640, length: 1, content: 上, WYG: 陽嘉三年司𨽻校尉左雄薦舉徴拜尚書舉與僕射黄瓊同心輔政名重朝廷左右憚之是嵗河南三輔大旱五穀災傷天子親自露坐徳陽殿東廂請雨又下司𨽻河南禱祀河神名山大澤詔書以舉才學優深特下䇿問曰朕以不徳仰承三綂天統地統人統謂之三統事見白虎通夙興夜寐思協大中尚書洪範曰建用皇極孔安國注云皇大也極中也言立大中之道而行之也頃年以來旱災屢應稼穡焦枯民食困乏五品不訓王澤未流五品五常之教也書曰五品不遜汝作司徒敬敷五教在寛訓亦遜之義羣司素餐據非}
