  - {type: variant, offset: 2940, length: 369, content: 被徵當詣廷尉吏民不寧南特通謁賀棱意有恨謂曰太守不德今當即罪而君反相賀邪南曰旦有善風明日中時應有吉問故來稱慶旦日棱延望景晏以為無徵至晡乃有驛使齎詔書原停棱事南問其留之狀使者曰向度宛陵浦里斻馬踠足是以不得速棱乃服焉後舉有道辟公府病不行終於家南女亦曉家術為由拳縣人妻晨詣爨室卒有暴風婦便上堂從姑求歸辭其二親姑不許乃跪而泣曰家世傳術疾風卒起先吹竈突及井此禍為婦女主爨者妾將亡之應因著其亡日乃聽還家如期病卒李郃字孟節漢中南鄭人也父頡以儒學稱官至博士郃襲父業遊太學通五經善河洛風星外質朴人莫之識縣召署幕門候吏和帝即位分遣使者皆微服單行各至州縣觀採風謠使者二人當到益部投郃候舍時夏夕露坐郃因仰觀問曰二君發京師時寧知朝廷遣二使邪二人默然驚相視曰不聞也問何以知之郃指星示云有二使星向益州分野故知之耳後三年其使者一人拜漢中太守郃猶為吏太守奇其隱德召署戶曹史時, WYG: 免}
