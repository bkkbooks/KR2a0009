  - {type: 'tls:seg', offset: 3580, content: '', id: KR2a0009_ZHSJ_091-d91p32s22}
  - {type: variant, offset: 3580, length: 0, content: '', WYG: 卒朝廷以舉清公亮直方欲以為宰相深痛惜之乃詔告光禄勲汝南太守曰昔在前世求賢如渇封墓軾閭以光賢哲尚書曰武王入殷封比干墓軾商容閭故公叔見誄翁歸䝉述所以昭忠厲俗作範後昆公叔文子衛大夫也文子卒其子戍請諡於君君曰昔者衛國凶饑夫子為粥與國之餓者不亦惠乎衛國有難夫子以其死衛寡人不亦貞乎夫子聽衛國之政脩其班制不亦文乎諡夫子貞惠文子事見禮記尹翁歸為右扶風宣帝下詔襃揚賜金百斤班固曰翁歸承風帝揚厥聲故曰蒙述也劉攽曰注尹翁歸為右扶風案文少一卒字故光禄大夫周舉性侔夷魚伯夷史魚也忠踰随管随會管仲前授牧守及還納言出入京輦有欽哉之績史記堯典曰咨十有二牧欽哉在禁闈有密靜之風予録乃勲用登九列方欲式序百官亮協三事不永夙終用乖逺圖朝廷愍悼良為愴然詩不云乎肇敏戎功用錫爾祉詩大雅也肇謀也敏㨗也戎汝也錫賜也祉福也其令將大夫以下到喪發日復會弔加賜錢十萬以旌委蛇素絲之節焉國風羔羊詩羔羊之皮素絲五紽退食自公委蛇委蛇子勰音叶勰字巨勝少尚𤣥虚以父任為郎自免歸家父故吏河南召夔為郡將卑身降禮致敬於勰勰恥交報之因杜門自絶後太守舉孝亷復以疾去}
