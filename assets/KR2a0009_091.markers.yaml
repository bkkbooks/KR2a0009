  - {type: variant, offset: 4686, length: 1, content: 延, WYG: 義於交爭循道化於亂離是自歴髙而不傾任力危而不跌興復洪祚開建中興光被八極垂名無窮至於中葉盛業漸衰陛下初從藩國爰升帝位天下拭目謂見太平而即位以來未有勝政諸梁秉權豎宦充朝重封累職傾動朝廷卿校牧守之選皆出其門羽毛齒革明珠南金之寳殷滿其室殷盛也富擬王府埶回天地言之者必族附之者必榮忠臣懼死而杜口萬夫怖禍而木舌法言曰金口木古也塞陛下耳目之明更為聾瞽之主故太尉李固杜喬忠以直言徳以輔政念國忘身隕歿為報而坐陳國議遂見殘滅坐音才卧反賢愚切痛海内傷懼又前白馬令李雲指言宦官罪穢宜誅皆因衆人之心以救積薪之敝賈誼上疏曰夫抱火厝積薪之下而寢其上火未及然因謂之安方今之政何以異此也𢎞農杜衆知雲所言宜行懼雲以忠獲罪故上書陳理之乞同日而死所以感悟國家庶雲獲免而雲既不辜衆又并坐天下尤痛益以怨結故朝野之人以忠為諱昔趙殺鳴犢孔子臨河而反夫覆巢破卵則鳳皇不翔刳牲夭胎則麒麟不臻誠物類相感理使其然史記曰孔子將西見趙簡子至於河而聞竇鳴犢舜華之死也臨河而歎曰美哉洋洋丘之不濟此命也夫竇鳴犢舜華晉之賢大夫也趙簡子不得志之時須此兩人而後從政及其得志而殺之丘聞刳胎殺夭則麒麟不至郊薮涸澤而漁則蛟龍不處其淵覆巢毁卵則鳳皇不翔何則君子諱傷其類也事亦見孔子家語文也尚書周永昔為沛令素事梁冀幸其威埶坐事當罪越拜令職見冀將衰乃陽毁示忠遂因姦計亦取封侯又黄門協邪羣軰相黨自冀興盛腹背相親朝夕圖謀共搆姦軌臨冀當誅無可設巧復記其惡以要爵賞陛下不加清徴審别眞偽復與忠臣並時顯封使朱紫共色粉墨雜蹂所謂抵金玉於沙礫抵投也音紙碎珪璧於泥塗四方聞之莫不憤歎昔曾子大孝慈母投杼解見寇榮傳伯竒至賢終於流放說苑曰王國子前母子伯竒後母子伯封後母欲其子立為太子說王曰伯竒好妾王不信其母曰令伯竒於後園妾過其旁王上臺視之即可知王如其言伯竒入園後母隂取蜂十數置单衣中過伯竒邉曰蜂螫我伯竒就衣中取蜂殺之王遥見之乃逐伯竒也劉攽曰注伯竒王國子案伯竒是尹吉甫子王國未詳夫䜛諛所舉無髙而不可升相抑無深而不可淪可不察歟臣至頑駑世荷國恩身輕位重勤不補過然懼於永歿負釁益深敢以垂絶之日陳不諱之言庶有萬分無恨三泉三者數之極一生二二生三三生萬物天地人之極數故以三為名者取其深之極也其年卒時年七十九贈車騎將軍諡曰忠侯孫琬琬字子琰少失父早而辯慧祖父瓊初為魏郡太守建和元年正月日食京師不見而瓊以狀聞太后詔}
