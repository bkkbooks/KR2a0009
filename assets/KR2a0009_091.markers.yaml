  - {type: variant, offset: 2765, length: 171, content: 廉范以問由由對曰此占郡內當有小兵然不為害後二十餘日廣柔縣蠻夷反殺傷長吏郡發庫兵擊之又有風吹削哺太守以問由由對曰方當有薦木實者其色黃赤頃之五官掾獻橘數包由嘗從人飲勑御者曰酒若三行便宜嚴駕既而趣去後主人舍有鬬相殺者人請問何以知之由曰向社中木上有鳩鬬此兵賊之象也其言多驗著書十餘篇名曰其平終于家李南字孝山丹陽句容人也少篤學明於風角和帝永元中太守馬棱, WYG: ''}
