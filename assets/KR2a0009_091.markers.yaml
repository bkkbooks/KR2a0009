  - {type: variant, offset: 3415, length: 4, content: 免官唯漢, WYG: 掩涕纂文曰䪥露今之挽歌也崔豹古今注䪥露歌曰䪥上露何易晞露晞明朝還復落人死一去何時歸太僕張种時亦在焉會還以事告舉舉歎曰此所謂哀樂失時非其所也殃將及乎左傳曰叔孫昭子與宋公語相泣樂祁退而告人曰君與叔孫其皆死乎吾聞之哀樂而樂哀皆喪心也心之精爽是謂魂魄魂魄去之何以能久也商至秋果薨商疾篤帝親臨幸問以遺言對曰人之將死其言也善臣從事}
