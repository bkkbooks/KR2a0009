  - {type: variant, offset: 4710, length: 7, content: 祿大夫賜告歸令, WYG: 禄勲深相敬待數與議事舊制光禄舉三署郎以髙功久次才徳尤異者為茂才四行久次謂久居官次也時權富子弟多以人事得舉而貧約守志者以窮退見遺京師為之謡曰欲得不能光禄茂才能音乃來反於是琬蕃同心顯用志士平原劉醇河東朱山蜀郡殷參等並以才行䝉舉蕃琬遂為權富郎所見中傷事下御史中丞王暢侍御史刁韙韙暢素重蕃琬不舉其事而左右復䧟以朋黨暢坐左轉議郎而免蕃官琬韙俱禁錮韙字子滎彭城人後陳蕃被徴而言事者多訟韙復拜議郎遷尚書}
