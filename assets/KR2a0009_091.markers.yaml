  - {type: variant, offset: 14, length: 0, content: '', krp: 子黨進賢愚錯緒深谷為陵故其詩云四國無政不用其良又曰哀今之人胡為虺蜴言人畏吏如虺蜴也襃豔謂襃姒也豔色羙也七子皆襃姒之親黨謂皇甫為卿士仲允為膳夫家伯為宰畨為司徒蹶為趣馬棸子為内史楀為師氏也幽王滛於色七子皆用言妻黨盛也四國四方之國也虺蝪之性見人則走哀今之人皆如是傷時政事也詩小雅番音方元反棸音側流反楀音記禹反宗周既滅六國并秦阬儒泯典剗革五等更立郡縣剗削也五等謂諸侯縣設令長郡置守尉什伍相司封豕其民史記商鞅為秦定變法之令令人什伍而相收司犯禁相連坐不告姦者腰斬揚雄長楊賦曰秦窫窳其士封豕其人也大漢受命雖未復古然克慎庶官蠲苛救敝恱以濟難撫而循之至於文景天下康乂誠由𤣥靖寛柔克慎官人故也降及宣帝興於仄陋綜覈名實知時所病刺史守相輙親引見考察言行信賞必罰帝乃歎曰民所以安而無怨者政平吏良也與我共此者其唯良二千石乎以為吏數變易則下不安業久於其事則民服教化其有政理者輙以璽書勉勵增秩賜金或爵至關内侯公卿缺則以次用之是以吏稱其職人安其業漢世良吏於兹為盛故能降來儀之瑞建中興之功宣帝時鳳皇五至因以紀年漢初至今三百餘載俗浸彫敝巧偽滋萌下飾其詐上肆其殘典城百里轉動無常各懐一切莫慮長久謂殺害不辜為威風聚斂整辦為賢能以理己安民為劣弱以奉法循理為不化髠鉗之戮生於睚皆覆尸之禍成於喜怒視民如寇讎稅之如豺虎國語曰鬭丹廷見令尹子常與之語問畜貨聚焉歸以語其弟曰楚其亡乎吾見令尹如餓獸豺虎焉殆必亡者也劉攽曰注畜貨聚焉案國語作聚馬此誤監司項背相望項背相望謂前後相顧也背音軰與同疾疢見非不舉聞惡不察觀政於亭傳責成於期月期匝也謂一嵗言善不稱徳論功不據實虚誕者獲譽拘檢者離毁離遭也或因罪而引髙或色斯以求名因罪遁以求髙尚之名也論語曰色斯舉矣言觀前人之顔色也州宰不覆競共辟召踴躍升騰超等踰匹或考奏捕案而亡不受罪會赦行賂復見洗滌朱紫同色清濁不分故使姦猾枉濫輕忽去就拜除如流缺動百數鄉官部吏職斯禄薄斯賤也車馬衣服一出於民亷者取足貪者充家特選横調調徴也紛紛不絶送迎煩費損政傷民和氣未洽災𤯝不消咎皆在此今之墨綬猶古之諸侯墨綬謂令長即古子男之國也拜爵王庭輿服有庸庸常也而齊於匹豎叛命避負非所以崇憲明理惠育元元也臣愚以為守相長吏惠和有顯效者可就増秩勿使移徙非父母喪不得去官其不從法禁不式王命錮之終身式用也雖會赦令不得齒列若被劾奏亡不就法者徙家邉郡以懲其後鄉部親民之吏皆用儒生清白任從政者任堪也音人林反寛其負算負欠也算口錢也儒生未有品秩故寛之增其秩禄吏職滿嵗宰府州郡乃得辟舉如此威福之路塞虚偽之端絶送迎之役損賦斂之源息循理之吏得成其化率土之民各寕其所追配文宣中興之軌文帝宣帝也文帝遭吕氏難故亦云中興也流光垂祚永世不刊帝感其言申下有司考其眞偽詳所施行雄之所言皆明達政體而宦豎擅權終不能用自是選代交互令長月易迎新送舊勞擾無己或官寺空曠無人案事每選部劇乃至逃亡永建三年京師漢陽地皆震裂水泉涌出四年司冀復有大水雄推較災異以為下人有逆上之徴天鏡經曰大水自平地出破山殺人其國有兵又上疏言宜密為備以俟不虞尋而青冀揚州盗賊連發數年之間海内擾亂其後天下大赦賊雖頗觧而官猶無備流叛之餘数月復起雄與僕射郭䖍共上疏以為寇賊連年死亡太半一人犯法舉宗羣亡宜及其尚微開令改悔若告黨與者聽除其罪能誅斬者明加其賞書奏並不省又上言宜崇經術繕脩太學帝從之陽嘉元年太學新成詔試明經者補弟子增甲乙之科員各十人除京師及郡國耆儒年六十以上為郎舍人諸王國郎者百三十八人雄又上言郡國孝亷古之貢士出則宰民宣協風教若其面墻則無所施用孔子曰四十而不惑禮稱强仕請自今孝亷年不滿四十不得察舉皆先詣公府諸生試家法儒有一家之學故稱家法文吏課牋奏副之端門練其虚實以觀異能以羙風俗有不承科令者正其罪法若有茂才異行自可不拘年齒帝從之於是班下郡國明年有廣陵孝亷徐淑謝承書曰淑字伯達廣陵海西人也寛裕博雅好學樂道随父慎在京師賛孟氏易春秋公羊禮記周官善誦太公六韜交接英雄常有壯志舉茂才除渤海脩令遷琅邪都尉也年未及舉臺郎疑而詰之對曰詔書曰有如顔回子竒不拘年齒解見順帝紀是故本郡以臣充選郎不能屈雄詰之曰昔顔回聞一知十孝亷聞一知幾邪淑無以對乃譴却郡於是濟隂太守胡廣等十餘人皆坐謬舉免黜唯汝南陳蕃潁川李膺下邳陳球等三十餘人得拜郎中自是牧守畏慄莫敢輕舉迄于永熹察選清平多得其人雄又奏徴海内名儒為博士使公卿子弟為諸生有志撡者加其俸禄及汝南謝亷河南趙建年始}
