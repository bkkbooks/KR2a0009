  - {type: variant, offset: 417, length: 0, content: '', krp: 士咸歸咎於封爵今青州饑虚盗賊未息民有乏絶上求稟貸陛下乾乾勞思以濟民為務宜循古法寜靜無為以求天意以消災異誠不宜追録小恩虧}
