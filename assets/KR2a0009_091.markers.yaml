  - {type: variant, offset: 13, length: 0, content: '', WYG: 五十一左雄傳左雄字伯豪南郡湼陽人也安帝時舉孝廉稍遷冀州刺史州部多豪族好請託雄常閉門不與交通奏案貪猾二千石無所囘忌永建初公車徴拜議郎時順帝新立大臣懈怠朝多闕政雄數言事其辭深切尚書僕射虞詡以雄有忠公節上疏薦之曰臣見方今公卿以下類多拱默以樹恩為賢盡節為愚至相戒曰白璧不可為容容多後福容容猶和同也言不可獨為白玉之清潔當與衆人和同也伏見議郎左雄數上封事至引陛下身遭難戹以為警戒實有王臣蹇蹇之節周公謨成王之風謨謀也即尚書立政無逸篇之類也宜擢在喉舌之官必有匡弼之益由是拜雄尚書再遷尚書令上疏陳事曰臣聞柔逺和邇莫大寜人寜人之務莫重用賢用賢之道必存考黜是以臯陶對禹貴在知人安人則惠黎民懐之尚書臯陶謨之詞也惠愛也黎衆也分伯建侯代位親民民用和睦禮讓以興故詩云有渰淒淒興雨祁祁雨我公田遂及我私詩云小雅也渰隂雲也淒淒雲興貌祁徐也言隂陽和風雨時先雨公田乃及私田及幽厲昬亂不自為政詩小雅刺幽王曰不自為政卒勞百姓襃豔用權}
