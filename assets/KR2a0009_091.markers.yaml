  - {type: variant, offset: 2707, length: 3, content: 先自知, WYG: 帝曰百官貪汙佞邪者為誰乎舉獨對曰臣從下州超備機密不足以别羣臣别音彼列反然公卿大臣數有直言者忠貞也阿諛茍容者佞邪也司徒視事六年未聞有忠言異謀愚心在此其後以事免司徒劉崎遷舉司𨽻校尉永和元年災異數見省内惡之詔召公卿中二千石尚書詣顯親殿問曰言事者多云昔周公攝天子事及薨成王欲以公禮葬之天為動變及更葬以天子之禮即有反風之應尚書洪範五行傳曰周公}
