  - {type: variant, offset: 418, length: 0, content: '', WYG: 大典帝不聽雄復諌曰臣聞人君莫不好忠正而惡䜛諛然而歴世之患莫不以忠正得罪䜛諛䝉倖者蓋聽忠難從諛易也夫刑罪人情之所甚惡貴寵人情之所甚欲是以時俗為忠者少而習諛者多故令人主數聞其美稀知其過迷而不悟}
  - {type: variant, offset: 418, length: 0, content: '', krp: 大典帝不聽雄復諌曰臣聞人君莫不好忠正而惡䜛諛然而歴世之患莫不以忠正得罪䜛諛䝉倖者蓋聽忠難從諛易也夫刑罪人情之所甚惡貴寵人情之所甚欲是以時俗為忠者少而習諛者多故令人主數聞其美稀知其過迷而不悟}
  - {type: variant, offset: 420, length: 3, content: 詭俗乎, WYG: 危亡臣伏見詔書顧念阿母舊徳宿恩欲特加顯賞案尚書故事無乳母爵邑之制唯先帝時阿母王聖為野王君聖造生䜛賊廢立之禍生為天下所咀嚼死為天下所歡快桀紂貴為天子而庸僕羞與為比者以其無義也夷齊賤為匹夫而王侯爭與為伍者以其有徳也今阿母躬蹈約儉以身率下羣僚蒸庶莫不向風而與王聖並同爵號懼違本撡失其常願臣愚以為凡人之心理不相逺其所不安古今一也百姓深懲王聖傾覆之禍民萌之命危於累卵常懼時世復有此類怵惕之念未離於心恐懼之言未絶於口乞}
