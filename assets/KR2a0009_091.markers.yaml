  - {type: variant, offset: 3726, length: 234, content: 如其言又有一生來學積年自謂略究要術辭歸鄉里翳為合膏藥并以簡書封於筒中告生曰有急發視之生到葭萌與吏爭度津吏檛破從者頭生開筒得書言到葭萌與吏鬬頭破者以此膏裹之生用其言創者即愈生歎服乃還卒業翳遂隱居竄跡終于家廖扶字文起汝南平輿人也習韓詩歐陽尚書教授常數百人父為北地太守永初中坐羌沒郡下獄死扶感父以法喪身憚為吏及服終而歎曰老子有言名與身孰親吾豈為名乎遂絕志世外專精經典尤明天文讖緯風角推步之術州郡公府辟召皆不應就問災異亦無所對扶逆知歲荒乃聚穀數千斛悉用給宗族姻親又斂葬遭疫死亡, WYG: ''}
