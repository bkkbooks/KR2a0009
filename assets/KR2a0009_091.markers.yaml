  - {type: variant, offset: 173, length: 241, content: 術及望雲省氣推處祥妖時亦有以效於事也而斯道隱遠玄奧難原故聖人不語怪神罕言性命或開末而抑其端或曲辭以章其義所謂民可使由之不可使知之漢自武帝頗好方術天下懷協道蓺之士莫不負策抵掌順風而屆焉後王莽矯用符命及光武尤信讖言士之赴趣時宜者皆騁馳穿鑿爭談之也故王梁孫咸名應圖籙越登槐鼎之任鄭興賈逵以附同稱顯桓譚尹敏以乖忤淪敗自是習為內學尚奇文貴異數不乏於時矣是以通儒碩生忿其姦妄不經奏議慷慨以為宜見藏擯子長亦云觀陰陽之書使人拘而多忌蓋為此也夫物之所偏未能無蔽雖云大道其硋或同若乃詩之失愚書之失誣然則, WYG: 變}
