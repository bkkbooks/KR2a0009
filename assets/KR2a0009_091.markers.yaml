  - {type: 'tls:seg', offset: 2209, content: '', id: KR2a0009_ZHSJ_091-d91p21s7}
  - {type: variant, offset: 2210, length: 213, content: 倫作司徒令班固為文薦夷吾曰臣聞堯登稷契政隆太平舜用皋陶政致雍熙殷周雖有高宗昌發之君猶賴傅說呂望之策故能克崇其業允協大中竊見鉅鹿太守會稽謝夷吾出自東州厥土塗泥而英姿挺特奇偉秀出才兼四科行包九德仁足濟時知周萬物加以少膺儒雅韜含六籍推考星度綜校圖錄探賾聖祕觀變歷徵占天知地與神合契據其道德以經王務昔為陪隸與臣從事奮忠毅之操躬史魚之節董臣嚴綱勖臣懦弱得以免戾寔賴厥勳及其應選作宰惠敷百里降福彌異流化若神爰牧荊州威行邦國奉法作政有周召之, WYG: 汝南先賢傳也於是衆惑稍解}
