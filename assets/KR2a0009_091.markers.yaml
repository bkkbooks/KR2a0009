  - {type: variant, offset: 4967, length: 0, content: '', WYG: 古者諸侯嵗貢士進賢受上賞非賢貶爵土升之司馬辯論其才論定然後官之任官然後禄之尚書大傳曰古者諸侯之於天子三年一貢士一適謂之好徳再適謂之賢賢三適謂之有功有功者天子賜以車服弓矢號曰命諸侯有不貢士謂之不率正一不適謂之過再不適謂之傲三不適謂之誣誣者天子絀之一絀以爵再絀以地三絀而爵地畢也故王者得其人進仕勸其行經邦𢎞務所由久矣}
