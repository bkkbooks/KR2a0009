  - {type: variant, offset: 3988, length: 318, content: 臨郡未到先遣吏脩門人之禮又欲擢扶子弟固不肯當時人因號為北郭先生年八十終于家二子孟舉偉舉並知名折像字伯式廣漢雒人也其先張江者封折侯曾孫國為鬱林太守徙廣漢因封氏焉國生像國有貲財二億家僮八百人像幼有仁心不殺昆蟲不折萌牙能通京氏易好黃老言及國卒感多藏厚亡之義乃散金帛資產周施親疎或諫像曰君三男兩女孫息盈前當增益產業何為坐自殫竭乎像曰昔鬬子文有言我乃逃禍非避富也吾門戶殖財日久盈滿之咎道家所忌今世將衰子又不才不仁而富謂之不幸牆𨻶而高其崩必疾也智者聞之咸服焉自知亡日召賓客九族飲食辭訣忽然而終時年八十四家無餘資諸子衰劣如其言云樊英字季齊南陽魯陽人也少受業三輔習京氏易兼明五經又善風角星筭河洛七緯推步災異隱於壺山之陽受業者四方而至州郡前後禮請不應公卿, WYG: ''}
