  - {type: variant, offset: 4685, length: 0, content: '', WYG: 恩而不阿梁氏乃封為邟鄉侯說文云邟潁川縣也漢潁川有周承休侯國元始二年更名曰邟音亢邑千戸瓊辭疾譲封六七上言㫖懇惻乃許之梁冀既誅瓊首居公位舉奏州郡素行貪汙至死徙者十餘人海内由是翕然望之尋而五侯擅權傾動内外自度力不能匡乃稱疾不起五侯謂左悺徐璜等四年以寇賊免其年復為司空秋以地震免七年疾篤上疏諌曰臣聞天者務剛其氣君者務彊其政是以王者處髙自持不可不安履危任力不可不據夫自持不安則顚任力不據則危故聖人升髙據上則以徳義為首渉危蹈傾則以賢者為力唐堯以徳化為冠冕以稷契為筋力髙而益崇動而愈據此先聖所以長守萬國保其社稷者也昔髙皇帝應天順民奮劒而王埽除秦項革命創制降徳流祚至於哀平則帝道不綱秕政日亂遂使姦佞擅朝外戚專恣所冠不以仁義為冕所蹈不以賢佐為力終至顚蹶滅絶漢祚天維陵弛民鬼慘愴頼皇乾眷命炎徳復輝光武以聖武天挺繼統興業創基氷泮之上立足枳棘之林氷泮喻危䧟枳棘喻艱難擢賢於衆愚之中畫功於無形之世形兆也言未有天下之兆畫或作書也崇}
