  - {type: variant, offset: 4579, length: 0, content: '', WYG: 也自癸巳以來仍西北風甘澤不集寒涼尚結西北風曰不周風亦曰厲風見呂氏春秋也迎春東郊既不躬親先農之禮所宜自勉以逆和氣以致時風通義曰八風者八卦之氣八風以時至則隂陽變化之道成萬物得以時育生也易曰君子自强不息斯其道也乾卦象曰天行健君子以自强不息也書奏帝從之頃之遷尚書令瓊以前左雄所上孝廉之選專用儒學文吏於取士之義猶有所遺乃奏增孝悌及能從政者為四科事竟施行又雄前議舉吏先試之於公府又覆之於端門後尚書張盛奏除此科瓊復上言覆試之作將以澄洗清濁覆實虚濫不宜改革帝乃止出為魏郡太守稍遷太常和平}
