  - {type: variant, offset: 2207, length: 2, content: 善績, WYG: 龍忌之禁新序曰晉文公反國介子推無爵遂去而之介山之上文公求之不得乃焚其山推遂不出而焚死事具耿恭傳龍星木之位也春見東方心為大火懼火之盛故為之禁火俗傳云子推以此日被焚而禁火至其亡月咸言神靈不樂舉火由是士民每冬中輙一月寒食莫敢煙爨老小不堪歳多死者舉既到州乃作弔書以置子推之廟言盛冬去火殘損民命非賢者之意以宣示愚民使還温食其事見桓譚新論}
