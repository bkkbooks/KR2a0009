  - {type: variant, offset: 4678, length: 3, content: 几杖待, WYG: 之差同於霍光使天下知賞必當功爵不越徳朝廷從之冀意以為恨會以地動䇿免復為太僕永興元年遷司徒轉大尉梁冀前後所託辟召一無所用雖有善人而為冀所飾舉者亦不加命延熹元年以日食免復為大司農明年梁冀被誅大尉胡廣司徒韓縯司空孫朗皆坐阿附免廢復拜瓊為太尉}
