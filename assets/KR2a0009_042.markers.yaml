  - {type: variant, offset: 3137, length: 0, content: '', krp: 還入安定初五原人李興隨昱朔方人田颯代郡人石鮪閔堪各起兵自稱將軍建武四年單于遣無樓且渠王入五原塞塞屬五原郡因以為名與李興等和親告興欲令芳還漢地為帝五年李興閔堪引兵至單于庭迎芳與俱入塞都九原縣九原縣名故城在勝州銀山縣也掠有五原朔方雲中定襄鴈門五郡並置守令與胡通兵侵苦北邊六年芳將軍賈覽將胡騎擊殺代郡太守劉興芳後以事誅其五原太守李興兄弟而其朔方太守田颯雲中太守橋扈恐懼叛芳舉郡降光武令領職如故後大司馬吳漢驃騎大將軍杜茂數擊芳並不尅十二年芳與賈覽共攻雲中久不下其將隨昱留守九原欲脅芳降芳知羽翼外附心膂内離遂棄輜重與十餘騎亡入匈奴其衆盡歸隨昱昱乃隨使者程恂詣闕拜昱為五原太守封鐫胡侯鐫謂琢鑿之故以為名下有鐫羌侯即其類昱弟憲武進侯十六年芳復入居髙栁髙栁縣名故城在今雲州定襄縣與閔堪兄林使使請降乃立芳為代王堪為代相林為代太傅賜繒}
  - {type: variant, offset: 3139, length: 2, content: 六千, WYG: 匹因使和集匈奴芳上疏謝曰臣芳過托先帝遺體棄在邊陲社稷遭王莽廢絶以是子孫之憂所宜共誅故遂西連羌戎北懷匈奴單于不忘舊徳權立救助是時兵革並起往往而在臣非敢有所貪覬覬望也期於奉承宗廟興立社稷是以久僭號位十有餘年罪宜萬死陛下聖徳髙明躬率衆賢海内賔服惠及殊俗以胏附之故胏附若肝胏相附著猶言親戚也赦臣芳罪加以仁恩封為代王使備北藩無以報塞重責冀必欲和輯匈奴輯音才入反郭景純云古集字不敢遺餘力負恩貸負猶背也謹奉天子玉璽思望闕庭詔報芳朝明年正月其冬芳入朝南及昌平昌平縣名故城在今幽州昌平縣東南有詔止令更朝明嵗芳自道還憂恐乃復背叛遂反與閔堪閔林相攻連月匈奴遣數百騎迎芳及妻子出塞芳留匈奴中十餘年病死初安定屬國胡與芳為寇及芳敗胡}
