  - {type: variant, offset: 20, length: 1, content: 宗, krp: 步亦定齊地永遣使拜憲翼漢大將軍步輔漢大將軍與共連兵遂專據東方及更始敗永自稱天子建武二年夏光武遣虎牙大將軍蓋延等伐永初陳留人蘇茂為更始討難將軍與朱鮪等守洛陽鮪既降漢茂亦歸命光武因使茂與蓋延俱攻永軍中不相能茂遂反殺淮陽太守掠得數縣據廣樂而臣於永永以茂為大司馬淮陽王蓋延遂圍睢陽數月拔之永將家屬走虞虞縣名屬梁國故城在今宋州虞城縣虞人反殺其母及妻子永與麾下數十人奔譙蘇茂佼彊周建合軍救永為蓋延所敗茂奔還廣樂彊建從永走保湖陵三年春永遣使立張步為齊王董憲為海西王於是遣大司馬吳漢等圍蘇茂於廣樂周建率衆救茂茂建戰敗棄城復還湖陵而睢陽人反城迎永反音幡吳漢與蓋延等合軍圍之城中食盡永與茂建走鄼今亳州縣也鄼音在何反諸將追急永將慶吾斬永首降封吾為列侯蘇茂周建奔垂惠共立永子紆為梁王佼彊還保西防四年秋遣捕虜將軍馬武騎都尉王霸圍紆建於垂惠蘇茂將五校兵救之紆建亦出兵與武等戰不尅而建兄子誦反閉城門拒之建茂紆等皆走建於道死茂奔下邳與董憲合紆奔佼彊五年遣驃騎大將軍杜茂攻佼彊於西防彊與劉紆奔董憲時平狄將軍龎萌反叛遂襲破蓋延引兵與董憲連和自號東平王屯桃鄉之北桃鄉故城在今兖州龔丘縣西北也龎萌傳龎萌山陽人初亡命在下江兵中更始立以為冀州牧將兵屬尚書令謝躬共破王郎及躬敗萌乃歸降光武即位以為侍中萌為人遜順甚見信愛帝嘗稱曰可以託六尺之孤寄百里之命者解見明紀龎萌是也拜為平狄將軍與蓋延共擊董憲時詔書獨下延而不及萌萌以為延譖已自疑遂反帝聞之大怒乃自將討萌與諸將書曰吾常以龎萌社稷之臣將軍得無笑其言乎老賊當族其各厲兵馬㑹睢陽憲聞帝自討龎萌乃與劉紆蘇茂佼彊去下邳還蘭陵使茂彊助萌合兵三萬急圍桃城帝時幸蒙聞之乃留輜重自將輕騎三千步卒數萬晨夜馳赴師次任城去桃鄉六十里旦日諸將請進賊亦勒兵挑戰帝不聴乃休士養鋭以挫其鋒城中聞車駕至衆心益固時吳漢等在東郡馳使召之萌等乃悉兵攻城二十餘日衆疲困而不能下及吳漢與諸將到乃率衆軍進桃城而帝親自搏戰大破之萌茂彊夜棄輜重逃奔董憲乃與劉紆悉其兵數萬人屯昌慮自將鋭卒拒新陽新陽縣屬東海郡帝先遣吳漢擊破之憲走還昌慮漢進守之憲恐乃招誘五校餘賊步騎數千人屯建陽去昌慮三十里建陽縣屬東海郡故城在今沂州丞縣北丞音時證反帝至蕃蕃音皮又音婆去憲所百餘里諸將請進帝不聴知五校乏食當退勅各堅壁以待其敝頃之五校糧盡果引去帝乃親臨四面攻憲三日復大破之衆皆奔散遣吳漢追擊之佼彊將其衆降蘇茂奔張步憲及龎萌走入繒山繒縣名故城在今沂州丞縣東北繒山即其縣之山也數日吏士聞憲尚在復往往相聚得數百騎迎憲入郯城吳漢等復攻拔郯憲與龎萌走保胊縣名屬東海郡今海州朐山縣西有故朐城秦始皇立石以為東闕門即此地也劉紆不知所歸軍士髙扈斬其首降梁地悉平吳漢進圍朐明年城中穀盡憲萌潛出襲取贛榆贛榆縣名今海州東海縣也贛音貢琅邪太守陳俊攻之憲萌走澤中㑹吳漢下朐城進盡獲其妻子劉攽曰案文多一進}
  - {type: variant, offset: 22, length: 0, content: '', WYG: 憲乃流涕謝其將士曰妻子皆已得矣為吳漢所得也嗟乎久苦}
  - {type: variant, offset: 22, length: 0, content: '', krp: 憲乃流涕謝其將士曰妻子皆已得矣為吳漢所得也嗟乎久苦}
  - {type: variant, offset: 23, length: 0, content: '', WYG: 卿乃將數十騎夜去欲從間道歸降而吳漢校尉韓湛追斬憲於方與方與音防預方與人黔陵亦斬萌皆傳首洛陽封韓湛為列侯黔陵為闗内侯張步傳張步字文公琅邪不其人也漢兵之起步亦聚衆數千轉攻傍縣下數城自為五威將軍遂據本郡更始遣魏郡王閎為琅邪太守步拒之不得進閎為檄曉諭吏人降得贛榆等六縣収兵數千人與步戰不勝時梁王劉永自以更始所立貪步兵彊承制拜步輔漢大將軍忠節侯督青徐二州使征不從命者步貪其爵號遂受之乃理兵於劇劇縣名在今青州夀光縣南也以弟𢎞為衞將軍𢎞弟藍𤣥武大將軍藍弟夀髙宻太守遣將徇太山東萊城陽膠東北海濟南徐諸郡皆下之步拓地寖廣寖漸也兵甲日盛王閎懼其衆散乃詣步相見欲誘以義方步大陳兵引閎怒曰步有何過}
  - {type: page-break, offset: 23, content: '', id: KR2a0009_WYG_042-8a, image: WYG0252/WYG0252-0475a.png}
