  - {type: variant, offset: 2368, length: 756, content: 為罪無正法不合致糾會長沙賊復起攻桂陽武陵緄以軍還盜賊復發策免頃之拜將作大匠轉河南尹上言舊典中官子弟不得為牧人職帝不納復為廷尉時山陽太守單遷以罪繫獄緄考致其死遷故車騎將軍單超之弟中官相黨遂共誹章誣緄坐與司隸校尉李膺大司農劉祐俱輸左校應奉上疏理緄等得免後拜屯騎校尉復為廷尉卒於官緄弟允清白有孝行能理尚書善推步之術拜降虜校尉終於家度尚字博平山陽湖陸人也家貧不修學行不為鄉里所推舉積困窮乃為宦者同郡侯覽視田得為郡上計吏拜郎中除上虞長為政嚴峻明於發擿姦非吏人謂之神明遷文安令遇時疾疫穀貴人飢尚開倉稟給營救疾者百姓蒙其濟時冀州刺史朱穆行部見尚甚奇之延熹五年長沙零陵賊合七八千人自稱將軍入桂陽蒼梧南海交阯交阯刺史及蒼梧太守望風逃奔二郡皆沒遣御史中丞盛修募兵討之不能剋豫章艾縣人六百餘人應募而不得賞直怨恚遂反焚燒長沙郡縣寇益陽殺縣令衆漸盛又遣謁者馬睦督荊州刺史劉度擊之軍敗睦度奔走桓帝詔公卿舉任代劉度者尚書朱穆舉尚自右校令擢為荊州刺史尚躬率部曲與同勞逸廣募雜種諸蠻夷明設購賞進擊大破之降者數萬人桂陽宿賊渠帥卜陽潘鴻等畏尚威烈徙入山谷尚窮追數百里遂入南海破其三屯多獲珍寶而陽鴻等黨衆猶盛尚欲擊之而士卒驕富莫有鬬志尚計緩之則不戰逼之必逃亡乃宣言卜陽潘鴻作賊十年習於攻守今兵寡少未易可進當須諸郡所發悉至爾乃并力攻之申令軍中恣聽射獵兵士喜悅大小皆相與從禽尚乃密使所親客潛焚其營珍積皆盡獵者來還莫不泣涕尚人人慰勞深自咎責因曰卜陽等財寶足富數世諸卿但不并力耳所亡少少何足介意衆聞咸憤踊尚勑令秣馬蓐食明旦徑赴賊屯陽鴻等自以深固不復設備吏士乘銳遂大破平之尚出兵三年羣寇悉定七年封右鄉侯遷桂陽太守明年徵還京師時荊州兵朱蓋等征戍役久財賞不贍忿恚復作亂與桂陽賊胡蘭等三千餘人復攻桂陽焚燒郡縣太守任胤𠫓廾城走賊衆遂至數萬轉攻零陵太守陳球固守拒之於是以尚, WYG: 程}
