  - {type: variant, offset: 804, length: 522, content: 以軍甲未解不敢歸降於是王宗召刺史太守共議皆以為當遂擊之雄曰不然兵凶器戰危事勇不可恃勝不可必賊若乘船浮海深入遠島攻之未易也及有赦令可且罷兵以慰誘其心埶必解散然後圖之可不戰而定也宗善其言即罷兵賊聞大喜乃還所略人而東萊郡兵獨未解甲賊復驚恐遁走遼東止海島上五年春乏食復抄東萊閒雄率郡兵擊破之賊逃還遼東遼東人李久等共斬平之於是州界清靜雄每行部錄囚徒察顏色多得情偽長吏不奉法者皆解印綬去在州四年遷南郡太守斷獄省少戶口益增郡濱帶江沔又有雲夢藪澤永初中多虎狼之暴前太守賞募張捕反為所害者甚衆雄乃移書屬縣曰凡虎狼之在山林猶人之居城市古者至化之世猛獸不擾皆由恩信寬澤仁及飛走太守雖不德敢忘斯義記到其毀壞檻穽不得妄捕山林是後虎害稍息人以獲安在郡數歲歲常豐稔元初中卒官子真在逸人傳滕撫字叔輔北海劇人也初仕州郡稍遷為涿令有文武才用太守以其能委任郡職兼領六縣風政修明流愛于人在事七年道不拾遺順帝末揚徐盜賊羣起磐牙連歲建康元年九江范容周生等相聚反亂屯據歷陽為江淮巨患遣御史中丞馮緄將兵督揚州刺史尹燿九江太守鄧顯討之燿顯軍敗為賊所殺又陰陵人徐鳳馬勉等復寇郡縣殺略吏人鳳衣絳衣帶黑綬稱無上將軍勉皮冠黃衣帶玉印稱黃帝築營於當塗山中乃建年號置百官遣別帥黃虎攻沒合肥明年廣陵賊張嬰等復, WYG: ''}
