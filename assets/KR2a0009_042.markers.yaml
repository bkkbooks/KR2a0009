  - {type: variant, offset: 3768, length: 348, content: 乘以排囊盛石灰於車上繫布索於馬尾又為兵車專彀弓弩剋共期會戰乃令馬車居前順風鼓灰賊不得視因以火燒布布然馬驚奔突賊陣因使後車弓弩亂發鉦鼓鳴震羣盜波駭破散追逐傷斬無數梟其渠帥郡境以清荊州刺史趙凱誣奏琁實非身破賊而妄有其功琁與相章奏凱有黨助遂檻車徵琁防禁嚴密無由自訟乃噬臂出血書衣為章具陳破賊形埶及言凱所誣狀潛令親屬詣闕通之詔書原琁拜議郎凱反受誣人之罪琁三遷為勃海太守所在有異政以事免後尚書令張溫特表薦之徵拜尚書僕射以病乞骸骨卒於家論曰安順以後風威稍薄寇攘橫緣𨻶而生剽人盜邑者不闋時月假署皇王者蓋以十數或託驗神道或矯妄冕服然其雄渠魁長未有聞焉猶至壘盈四郊奔命首尾若夫數將者並宣力勤慮以勞定功而景風之賞未甄膚受之言互及以此而推政道難乎以免贊曰張宗裨禹敢殿後拒江淮海岱虔劉寇阻其誰清之雄尚緄撫琁能用譎亦云振旅, WYG: 二考證}
