  - {type: variant, offset: 1924, length: 1, content: 燒, WYG: 朱浮於薊分兵徇廣陽上谷右北平又自以與耿況俱有重功而恩賞並薄數遣使要誘況況不受輙斬其使秋帝使㳺擊將軍鄧隆救薊隆軍潞南浮軍雍奴遣吏奏狀帝讀檄怒謂使吏曰營相去百里其勢豈可得相及比若還若汝也北軍必敗矣寵果盛兵臨河以拒隆又别發輕騎三千襲其後大破隆軍浮逺遂不能救引而去明年春寵遂拔右北平上谷數縣遣使以美女繒綵賂遺匈奴要結和親單于使左南將軍七八千騎往來為㳺兵以助寵又南結張步及富平獲索諸豪桀皆與交質連衡交質謂交相為質也左傳曰交質往來道路無壅前書音義曰以利合曰從以威力相脅曰衡遂攻拔薊}
