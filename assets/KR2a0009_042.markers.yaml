  - {type: variant, offset: 26, length: 1, content: 魯, WYG: 兵精延岑善戰而耿弇走之大王奈何就攻其營既呼茂不能待邪步曰負負無可言者負愧也再言之者愧之甚帝乃遣使告步茂能相斬降者封為列侯步遂斬茂使使奉其首降步三弟各自繫所在獄皆赦之封步為安丘侯後與家屬居洛}
  - {type: page-break, offset: 26, content: '', id: KR2a0009_WYG_042-10a, image: WYG0252/WYG0252-0476a.png}
  - {type: variant, offset: 26, length: 1, content: 魯, krp: 兵精延岑善戰而耿弇走之大王奈何就攻其營既呼茂不能待邪步曰負負無可言者負愧也再言之者愧之甚帝乃遣使告步茂能相斬降者封為列侯步遂斬茂使使奉其首降步三弟各自繫所在獄皆赦之封步為安丘侯後與家屬居洛}
  - {type: variant, offset: 28, length: 0, content: '', WYG: 王閎亦詣劇降八年夏步將妻子逃奔臨淮與弟𢎞藍欲招其故衆乗船入海琅邪太守陳俊追擊斬之王閎者王莽叔父平阿侯譚之子也哀帝時為中常侍時倖臣董賢為大司馬寵愛貴盛閎屢諫忤㫖哀帝臨崩以璽綬付賢曰無妄以與人時國無嗣主内外恇懼閎白元后請奪之即帶劒至宣徳後闥三輔黄圖曰未央宫有宣徳殿闥宫中門也舉手叱賢曰宫車晏駕國嗣未立公受恩深重當俯伏號泣何事久持璽綬以待禍至邪賢知閎必死不敢拒之乃跪授璽綬閎馳上太后朝廷壯之及王莽簒位潛忌閎乃出為東郡太守閎懼誅常繫藥手内莽敗漢兵起閎獨完全東郡三十餘萬户歸降更始李憲傳李憲者潁川許昌}
