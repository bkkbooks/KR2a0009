  - {type: variant, offset: 1641, length: 0, content: '', WYG: 漁陽太守偉容貌能飲飯飯音扶逺反有威於邊王莽居攝誅不附已者宏與何武鮑宣並遇害寵少為郡吏地皇中為大司空士王莽時九卿分屬三公每一卿置元士三人劉攽曰案王莽傳一卿置大夫三人一大夫置士三人此文不具少置大夫三人一大夫八字從王邑東拒漢軍到洛陽聞同産弟在漢兵中懼誅即與鄉人吳漢亡至漁陽抵父時吏抵歸也更始立使謁者韓鴻持節徇北州謂幽并也承制得專拜二千石以下鴻至薊以寵漢並鄉閭故人相見歡甚即拜寵偏將軍行漁陽太守事漢安樂令安樂縣名屬漁陽郡故城在今}
