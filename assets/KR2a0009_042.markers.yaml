  - {type: variant, offset: 1689, length: 4, content: 龐奮使速, WYG: 嚴宣䕶軍蓋延狐奴令王梁狐奴縣名屬漁陽郡與上谷軍合而南及光武於廣阿光武承制封寵建忠侯賜號大將軍遂圍邯鄲寵轉糧食前後不絶及王郎死光武追銅馬北至薊寵上謁自負其功意望甚髙負恃也光武接之不能滿以此懷不平不能滿其意故心不平也光武知之以問幽州牧朱浮浮對曰前吳漢北發兵時大王遺寵以所服劍又倚以為北道主人寵謂至當迎閤握手交歡並坐今既不然所以失望浮因曰王莽為宰衡時甄豐旦夕入謀議時人語曰夜半客甄長伯長伯豐字也豐平帝時為少府王莽簒位時為更始將軍及莽簒位後豐意不平卒以誅死光武大笑以為不至於此及即位吳漢王梁寵之所遣並為三公而寵獨無所加愈怏怏不得志歎曰我功當為王但爾者陛下忘我邪是時北州破散而漁陽差完有舊鹽鐵官寵轉以貿穀貿易也積珍寳益富彊朱浮與寵不相能浮數譖搆之建武二年春詔徴寵寵意浮賣已上疏願與浮俱徴又與吳漢蓋延等書盛言浮枉狀枉譖己之狀也固求同徴帝不許益以自疑而其妻素剛不堪抑屈固勸無受召寵又與常所親信吏計議皆懷怨於浮莫有勸}
