  - {type: variant, offset: 24, length: 0, content: '', WYG: 前見攻之甚乎閎按劒曰太守奉朝命而文公擁兵相距閎攻賊耳何謂甚邪步嘿然良久離席跪謝乃陳樂獻酒待以上賔之禮令閎關掌郡事關通也建武三年光武遣光祿大夫伏隆持節使齊拜步為東萊太守劉永聞隆至劇乃馳遣立步為齊王步即殺隆而受永命是時帝方北憂漁陽南事梁楚故步得專集齊地據郡十二及劉永死步等欲立永子紆為天子自為定漢公置百官王閎諫曰梁王以奉本朝之故是以山東頗能歸之今尊立其子將疑衆心且齊人多詐汲黯目公孫𢎞之詞宜且詳之步乃止五年步聞帝將攻之以其將費邑為濟南王屯歴下冬建威大將軍耿弇破斬費邑進拔臨淄步以弇兵少逺客可一舉而取乃悉將其衆攻弇於臨淄步兵大敗還奔劇帝自幸劇步退保平夀今青州北海縣也蘇茂將萬餘人來救之茂讓步曰以}
