  - {type: variant, offset: 17, length: 0, content: '', WYG: 王昌傳王昌一名郎趙國邯鄲人也素為卜相工明星歴常以為河北有天子氣時趙繆王子林景帝七代孫也好竒數術數任俠於趙魏間多通豪猾而郎與之親善初王莽簒位長安中或自稱成帝子子輿者莽殺之王莽傳曰時男子武仲自稱劉子輿郎緣是詐稱真子輿云母故成帝謳者嘗下殿卒僵須臾有黄氣從上下半日乃解遂􅗖身就館趙后欲害之趙飛鷰也偽易它人子以故得全東觀記曰宫婢生子正與同時即易之也輿年十二劉攽曰案上下文皆言子輿此少一子字識命者郎中李曼卿識命謂知天命也與俱至蜀十七到丹陽丹陽楚所封地在今歸州秭歸縣東也二十還長安展轉中山往來燕趙以須天時須待也林等愈動疑惑乃與趙國大豪李育張參等通謀規共立郎㑹人間傳赤眉將度河林等因此宣言赤眉當立劉子輿以觀衆心百姓多信之更始元年十二月林等遂率車騎數百晨入邯鄲城止於王宫故趙王之宫也立郎為天子林為丞相李育為大司馬張參為大將軍分遣將帥徇下幽冀移檄州郡曰制詔部刺史郡太守曰劉攽曰案文多下一曰字凡有曰字皆史臣所加詔不自言曰也朕孝成皇帝子子輿者也昔遭趙氏之禍因以王莽簒殺賴知命者將䕶朕躬東觀記曰知命者謂侍郎韓公等解形河濵削迹趙魏解形猶脱身也王莽竊位獲罪於天天命佑漢故使東郡太守翟義嚴鄉侯劉信擁兵征討出入胡漢普天率土知朕隱在人間南嶽諸劉為其先驅聖公光武本自舂陵北徙故舂陵近衡山故曰南嶽諸劉也朕仰觀天文乃興于斯以今月壬辰即位趙宫休氣熏蒸應時獲雨蓋聞為國子之襲父古今不易劉聖公未知朕故且持帝號諸興義兵咸以助朕皆當裂土享祚子孫已詔聖公及翟太守亟與功臣詣行在所天子所在曰行在所疑刺史二千石皆聖公所置未覩朕之沈滯或不識去就强者負力負恃也弱者惶惑今元元創痍已過半矣痍傷也朕甚悼焉故遣使者班下詔書郎以百姓思漢既多言翟義不死故詐稱之以從人望於是趙國以北遼東以西皆從風而靡明年光武自薊得郎檄南走信都走趣也音子豆反發兵徇旁縣遂攻栢人不下議者以為守栢人不如定鉅鹿光武乃引兵東北圍鉅鹿郎太守王饒據城數十日連攻不尅耿純説曰久守王饒士衆疲敝不如及大兵精銳進攻邯鄲若王郎已誅王饒不戰自服矣光武善其計乃留將軍鄧滿續漢書滿作蒲守鉅鹿而進軍邯鄲屯其郭北門郎數出戰不利乃使其諫議大夫杜威持節請降威雅稱郎實成帝遺體光武曰設使成帝復生天下不可得況詐子輿者乎威請求萬户侯光武曰顧得全身可矣顧猶念也威曰邯鄲雖鄙并力固守尚曠日月終不君臣相率但全身而已遂辭而去因急攻之二十餘日郎少傅李立為反間開門内漢兵遂拔邯鄲郎夜亡走道死追斬之劉永傳劉永者梁郡睢陽人梁孝王八世孫也傳國至父立元始中立與平帝外家衞氏交通衞氏平帝母家也中山衞子豪之女為王莽所誅更始即位永先詣洛陽紹封為梁王都睢陽永聞更始政亂遂據國起兵以弟防為輔國大將軍防弟少公御史大夫封魯王遂招諸郡豪傑沛人周建等並署為將帥攻下濟隂山陽沛楚淮陽汝南凡得二}
