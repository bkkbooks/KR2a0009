  - {type: variant, offset: 3137, length: 0, content: '', WYG: 還入安定初五原人李興隨昱朔方人田颯代郡人石鮪閔堪各起兵自稱將軍建武四年單于遣無樓且渠王入五原塞塞屬五原郡因以為名與李興等和親告興欲令芳還漢地為帝五年李興閔堪引兵至單于庭迎芳與俱入塞都九原縣九原縣名故城在勝州銀山縣也掠有五原朔方雲中定襄鴈門五郡並置守令與胡通兵侵苦北邊六年芳將軍賈覽將胡騎擊殺代郡太守劉興芳後以事誅其五原太守李興兄弟而其朔方太守田颯雲中太守橋扈恐懼叛芳舉郡降光武令領職如故後大司馬吳漢驃騎大將軍杜茂數擊芳並不尅十二年芳與賈覽共攻雲中久不下其將隨昱留守九原欲脅芳降芳知羽翼外附心膂内離遂棄輜重與十餘騎亡入匈奴其衆盡歸隨昱昱乃隨使者程恂詣闕拜昱為五原太守封鐫胡侯鐫謂琢鑿之故以為名下有鐫羌侯即其類昱弟憲武進侯十六年芳復入居髙栁髙栁縣名故城在今雲州定襄縣與閔堪兄林使使請降乃立芳為代王堪為代相林為代太傅賜繒}
  - {type: page-break, offset: 3137, content: '', id: KR2a0009_WYG_042-17a, image: WYG0252/WYG0252-0479c.png}
