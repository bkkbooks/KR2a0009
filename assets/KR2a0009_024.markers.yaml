  - {type: variant, offset: 5311, length: 5, content: 侯耿純橫野, WYG: 和四年秋五色大鳥見于新城衆鳥隨之時以為鳳皇時靈帝不恤政事常侍黄門專權羽孽之時也衆鳥之性見非常班駮好聚觀之至於小爵希見梟者虣見猶聚中平三年八月中懐陵上有萬餘爵先極悲鳴已因亂鬬相殺皆斷頭懸著樹枝枳棘到六年靈帝崩}
  - {type: variant, offset: 5311, length: 5, content: 侯耿純橫野, krp: 和四年秋五色大鳥見于新城衆鳥隨之時以為鳳皇時靈帝不恤政事常侍黄門專權羽孽之時也衆鳥之性見非常班駮好聚觀之至於小爵希見梟者虣見猶聚中平三年八月中懐陵上有萬餘爵先極悲鳴已因亂鬬相殺皆斷頭懸著樹枝枳棘到六年靈帝崩}
