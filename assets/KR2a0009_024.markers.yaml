  - {type: variant, offset: 4566, length: 491, content: 十八宿未之詳也然咸能感會風雲奮其智勇稱為佐命亦各志能之士也議者多非光武不以功臣任職至使英姿茂績委而勿用然原夫深圖遠筭固將有以焉爾若乃王道既衰降及霸德猶能授受惟庸勳賢皆序如管隰之迭升桓世先趙之同列文朝可謂兼通矣降自秦漢世資戰力至於翼扶王運皆武人屈起亦有鬻繒屠狗輕猾之徒或崇以連城之賞或任以阿衡之地故埶疑則𨻶生力侔則亂起蕭樊且猶縲紲信越終見葅戮不其然乎自茲以降迄于孝武宰輔五世莫非公侯遂使縉紳道塞賢能蔽壅朝有世及之私下多抱關之怨其懷道無聞委身草莽者亦何可勝言故光武鑒前事之違存矯枉之志雖寇鄧之高勳耿賈之鴻烈分土不過大縣數四所加特進朝請而已觀其治平臨政課職責咎將所謂導之以政齊之以刑者乎若格之功臣其傷已甚何者直繩則虧喪恩舊橈情則違廢禁典選德則功不必厚舉勞則人或未賢參任則羣心難塞並列則其敝未遠不得不校其勝否即以事相權故高秩厚禮允荅元功峻文深憲責成吏職建武之世侯者百餘若夫數公者則與參國議分均休咎其餘並優以寬科完其封祿莫不終以功名延慶于後昔留侯以為高祖悉用蕭曹故人而郭伋亦譏南陽多顯鄭興又戒功臣專任夫崇恩偏授易啟私溺之失至公均被必廣招賢之路意者不其然乎永平中顯宗追感前世功臣乃圖畫二十八將於, WYG: 月己酉}
