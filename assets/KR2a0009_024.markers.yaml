  - {type: variant, offset: 5310, length: 0, content: '', WYG: 方曰發明南方曰焦明西方曰鷫鸘北方曰幽昌中央曰鳳皇桓帝元嘉元年十一月五色大鳥見濟隂已氏時以為鳳皇此時政治衰缺梁冀秉政阿枉上幸亳后皆羽孽時也臣昭案魏朗對䇿桓帝時雉入太常宗正府朗説見本傳注靈帝}
