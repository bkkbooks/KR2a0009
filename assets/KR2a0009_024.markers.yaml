  - {type: variant, offset: 78, length: 2, content: 護軍, WYG: 妻鄭𤣥曰軒轅為后妃屬南宮其大星女主之位女御在前妾為妻之象也則火不炎上鄭𤣥曰君行此四者為逆天南宮之政南宮於地為火火性炎上然行人所用烹餁者也無故因見作熱燔熾為害是為火不炎上其他變異皆屬沴春秋考異郵曰火者陽之精也人合天氣五行隂陽極隂反陽極陽生隂故應人行以災不祥在所以感之萌應轉旋從逆殊心也謂火失其性而為災也又曰視之不明是謂不悊鄭𤣥曰視瞭也君視不明則是不能瞭其事也洪範曰視曰明厥咎舒䜟曰君舒怠臣下有倦白黒不别賢不肖並不能憂民急氣為之舒緩草不揺鄭𤣥曰君臣不瞭則舒緩矣厥罰}
