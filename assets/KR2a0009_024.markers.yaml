  - {type: variant, offset: 4473, length: 2, content: 斬首, WYG: 初造禍及枯骨規廣治之尤飾又上欲更造宮室益臺觀故火起莫府燒材木永和元年十月丁未承福殿火臣昭案楊厚傳是災先是爵號阿母宋娥為山陽君后父梁商本國侯又多益商封商長子冀當繼商爵以商生在復更封冀為襄邑侯追號后母為開封君皆過差非禮古今注曰六年十二月雒陽酒市失火燒肆殺人漢安元年三月甲午雒陽劉漢等百九十七家為火所燒東觀書曰其九十家不自存詔賜錢廪榖古今注曰火或從室屋間物中不知所從起數月乃止十二月雒陽失火後}
