  - {type: variant, offset: 5319, length: 8, content: 山桑侯王常城門校, WYG: 何進以内寵外嬖積惡日乆欲悉糾黜以隆更始冗政而太后持疑事久不決進從中出於省内見殺因是有司盪滌䖍劉後祿而尊厚者無餘矣夫陵者高大之象也天戒若曰諸懐爵祿而尊厚者還自相害至滅亡也古今注曰建武九年六郡八縣䑕食稼張璠紀曰初平元年三月獻帝初入未央宮翟雉飛入未央宮獲之獻帝春秋曰建安七年五色大鳥集魏郡衆鳥數千隨之魏志曰二十三年秃鶖集鄴宮文昌殿後也桓帝建和三年秋七月北地亷雨肉似羊肋説文曰肋脅骨也或大如手近赤祥也是時梁太后攝政兄梁冀専權枉誅漢良臣故太}
  - {type: page-break, offset: 5319, content: '', id: KR2a0009_WYG_024-12a, image: WYG0252/WYG0252-0332c.png}
