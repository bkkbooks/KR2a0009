  - {type: variant, offset: 3854, length: 352, content: 死武馳至射犬降世祖見之甚悅引置左右每勞饗諸將武輒起斟酌於前世祖以為歡復使將其部曲至鄴武叩頭辭以不願世祖愈美其意因從擊羣賊世祖擊尤來五幡等敗於慎水武獨殿還陷陣故賊不得迫及進至安定次小廣陽武常為軍鋒力戰無前諸將皆引而隨之故遂破賊窮追至平谷浚靡而還世祖即位以武為侍中騎都尉封山都侯建武四年與虎牙將軍蓋延等討劉永武別擊濟陰下成武楚丘拜捕虜將軍明年龐萌反攻桃城武先與戰破之會車駕至萌遂敗走六年夏與建威大將軍耿弇西擊隗囂漢軍不利引下隴囂追急武選精騎還為後拒身被甲持戟奔擊殺數千人囂兵乃退諸軍得還長安十三年增邑更封鄃侯將兵北屯下曲陽備匈奴坐殺軍吏受詔將妻子就國武徑詣洛陽上將軍印綬削戶五百定封為楊虛侯因留奉朝請帝後與功臣諸侯讌語從容言曰諸卿不遭際會自度爵祿何所至乎高密侯鄧禹先對曰臣少嘗學問可郡文學博士帝曰何言之謙乎卿, WYG: ''}
