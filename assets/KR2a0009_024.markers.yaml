  - {type: variant, offset: 4489, length: 2, content: 降散, WYG: 君弱臣强極隂之變也前始春而獄刑慘故火不炎上前入春節連寒木冰暴風折樹又八九州郡並言隕霜殺菽春秋晉執季孫行父木為之冰夫氣𢎞則景星見化錯則五星開日月蝕灾為已然異為方來恐卒有變必於三朝唯善政可以已之願察臣前言不棄愚忠則元元幸甚書奏不省九年三月癸巳京都夜有火光轉行民相驚譟袁山松書曰是時宦豎専朝鉤黨事起上尋無嗣陳蕃竇}
