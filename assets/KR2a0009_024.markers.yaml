  - {type: variant, offset: 4476, length: 0, content: '', WYG: 年宮車比三晏駕建和元年君位乃定桓帝建和二年五月癸丑北宮掖庭中德陽殿火及左掖門先是梁太后兄冀挾姦枉以故太尉李固杜喬正直恐害其事令人誣奏固喬而誅滅之是後梁太后崩而梁氏誅滅延熹四年正月辛酉南宮嘉德殿火戊子丙署火二月壬辰武庫火五月丁卯原陵長夀門火先是亳后因賤人得幸號貴人為后上以后母宣為長安君封其兄弟愛寵隆崇又多封無功者去年春白馬令李雲坐直諫死至此彗除心尾火連作五年正月壬午南宮丙署火四月乙丑恭北陵東闕火戊辰虎賁掖門火五月康陵園寢火甲申中藏府承禄署火七月已未南宮承善闥内火六年四月辛亥康陵東署火七月甲申平陵園寢火八年二月己酉南宮嘉德署黄龍}
