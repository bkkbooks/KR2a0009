  - {type: variant, offset: 5065, length: 0, content: '', krp: 所立作萐莆嘉禾必生此地以報陛下䖍恭之德疲民之力竭民之財實非所以致符瑞而懐遠人也臣昭曰高堂隆之言災其得天心乎雖與本志所明不同靈帝之時有焉故載其言廣災異也獻帝初平元年八月霸橋災其後三年董卓見殺臣昭案劉焉傳興平元年天火燒其城府輜重延及民家館邑無餘也庶徴之恒燠漢書以冬温應之中興以來亦有冬温而記不錄云越絶范蠡曰春燠而不生者}
  - {type: variant, offset: 5066, length: 2, content: 常李, WYG: 者德不完也夏寒而不長者臣下不奉主令也秋暑而復榮者百官刑不斷也冬温而泄者發府庫賞無功也此四者邦之禁也管子曰臣乘君威則隂侵陽盛夏雪降冬不冰也安帝元初三年有𤓰異本共生一𤓰同蔕時以為嘉𤓰或以為𤓰者外延離本而實女子外屬之象也是時閻皇后初立後閻后與外親耿寶等共譖太子廢為濟隂王更外迎濟北王子犢立之草妖也古今注曰和帝永元七年三月江夏縣民舍柱生兩枝其一長尺五寸分為八枝其一長尺六寸分為五枝皆青也桓帝延熹九年雒陽城局竹栢葉有傷者占曰天子凶靈帝熹平三年右校别作中有兩樗樹皆高四尺許其一株宿夕暴長長丈餘大一圍作胡人狀頭目鬢鬚髪備具京房易傳曰王德衰下人將起則有木生人狀臣昭以木生人狀下人將起京房之占雖以證驗貌類胡人猶未辨了董卓之亂實擁胡兵傕汜之時充斥尤甚遂窺間宮嬪剽虐百姓鮮卑之徒踐藉畿封胡之害深亦已毒矣五年十月壬午御所居殿後槐樹皆六七圍自拔倒竪根在上臣昭曰槐是三公之象貴之也靈帝授位不以徳進貪愚是升清賢斯黜槐之倒植豈以斯乎中平元年夏東郡陳留濟陽長垣濟隂寃句離狐縣界風俗}
