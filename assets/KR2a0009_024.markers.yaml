  - {type: variant, offset: 5309, length: 0, content: '', WYG: 橋瑁負衆怙亂陵蔑同盟忿疾同類以殞厥命陳留濟隂迎助謂為離德棄好即戎吏民殲之草妖之興豈不或信中平中長安城西北六七里空樹中有人面生鬢魏志曰建安二十五年正月曹公在雒陽起建始殿伐濯龍樹而血出又掘徙梨根傷而血出曹公惡之遂寢疾是月薨獻帝興平元年九月桑復生椹可食臣昭曰桑重生椹誠是木異必在濟民安知非瑞乎時蒼生死敗周秦殲盡餓䰟餒鬼不可勝言食此重椹大拯危命雖連理附枝亦不能及若以為怪則建武野穀旅生麻菽尤盛復是草妖邪安帝延光三年二月戊子有五色大鳥集濟南臺十月又集新豐時以為鳳皇或以為鳳皇陽明之應故非明主則隠不見凡五色大鳥似鳳者多羽蟲之孽是時安帝信中常侍樊豐江京阿母王聖及外屬耿寶等䜛言免太尉楊震廢太子為濟隂王不悊之異也章帝末號鳯皇百四十九見時直臣何敞以為羽孽似鳳翺翔殿屋不察也臣昭曰已論之於敞傳記者以為其後章帝崩以為驗案宣帝明帝時五色鳥羣翔殿屋賈逵以為胡降徴也帝多善政雖有過不及至衰缺末年胡降二十萬口是其驗也帝之時羌胡外叛讒慝内興羽孽之時也樂叶圖徵説五鳳皆五色為瑞者一為孽者四叶圖徴曰似鳳有四並為妖一曰鷫鸘鳩喙圓目身義戴信嬰禮膺仁負智至則早役之感也二曰發明烏喙大頸大翼大脛身仁戴智嬰義膺信負禮至則喪之感也三曰焦明長喙疏翼圓尾身義戴信嬰仁膺知負禮至則水之感也四曰幽昌鋭目小頭大身細足脛若鱗葉身智戴信負禮膺仁至則旱之感也國語曰周之興也鸑鷟鳴岐説文曰五方神鳥}
