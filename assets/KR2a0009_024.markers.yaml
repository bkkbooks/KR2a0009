  - {type: variant, offset: 1197, length: 926, content: 蓋延吳漢俱將兵南及世祖於廣阿拜偏將軍既拔邯鄲賜爵關內侯從平河北拜野王令與河內太守寇恂南拒洛陽北守天井關朱鮪等不敢出兵世祖以為梁功及即位議選大司空而赤伏符曰王梁主衛作玄武帝以野王衛之所徙玄武水神之名司空水土之官也於是擢拜梁為大司空封武強侯建武二年與大司馬吳漢等俱擊鄉有詔軍事一屬大司馬而梁輒發野王兵帝以其不奉詔勑令止在所縣而梁復以便宜進軍帝以梁前後違命大怒遣尚書宗廣持節軍中斬梁廣不忍乃檻車送京師既至赦之月餘以為中郎將行執金吾事北守箕關擊赤眉別校降之三年春轉擊五校追至信都趙國破之悉平諸屯聚冬遣使者持節拜梁前將軍四年春擊肥城文陽拔之進與驃騎大將軍杜茂擊佼彊蘇茂於楚沛閒拔大梁齧桑而捕虜將軍馬武偏將軍王霸亦分道並進歲餘悉平之五年從救桃城破龐萌等梁戰尤力拜山陽太守鎮撫新附將兵如故數月徵入代歐陽歙為河南尹梁穿渠引穀水注洛陽城下東寫鞏川及渠成而水不流七年有司劾奏之梁慙懼上書乞骸骨乃下詔曰梁前將兵征伐衆人稱賢故擢典京師建議開渠為人興利旅力既愆迄無成功百姓怨讟談者讙譁雖蒙寬宥猶執謙退君子成人之美其以梁為濟南太守十三年增邑定封封阜成侯十四年卒官子禹嗣禹卒子堅石嗣堅石追坐父禹及弟平與楚王英謀反𠫓廾市國除杜茂字諸公南陽冠軍人也初歸光武於河北為中堅將軍常從征伐世祖即位拜大將軍封樂鄉侯北擊五校於真定進降廣平建武二年更封苦陘侯與中郎將王梁擊五校賊於魏郡清河東郡悉平諸營保降其持節大將三十餘人三郡清靜道路流通明年遣使持節拜茂為驃騎大將軍擊沛郡拔芒時西防復反迎佼彊五年春茂率捕虜將軍馬武進攻西防數月拔之彊奔董憲東方既平七年詔茂引兵北屯田晉陽廣武以備胡寇九年與鴈門太守郭涼擊盧芳將尹由於繁畤芳將賈覽率胡騎萬餘救之茂戰軍敗引入樓煩城時盧芳據高柳與匈奴連兵數寇邊民帝患之十二年遣謁者段忠將衆郡薥刑配茂鎮守北邊因發邊卒築亭候修烽火又發委輸金帛繒絮供給軍士并賜邊民冠蓋相望茂亦建屯田驢車轉運先是鴈門人賈丹霍匡解勝等為尹由所略由以為將帥與共守平城丹等聞芳敗遂共殺由詣郭涼涼上狀皆封為列侯詔送委輸金帛賜茂涼軍吏及平城降民自是盧芳城邑稍稍來降涼誅其豪右郇氏之屬鎮撫羸弱旬月閒鴈門且平芳遂亡入匈奴帝擢涼子為中郎宿衞左右涼字公文右北平人也身長八尺氣力壯猛雖武將然通經書多智略尤曉邊事有名北方初, WYG: ''}
