  - {type: punctuation, offset: 751, content: ､, id: KR2a0009_ZHSJ_024-bkkpn163}
  - {type: variant, offset: 751, length: 435, content: 上谷兵吾聊應言然何意二郡良為吾來方與士大夫共此功名耳拜丹為偏將軍號奉義侯從擊王郎將兒宏等於南郎兵迎戰漢軍退卻丹等縱突騎擊大破之追奔十餘里死傷者從橫丹還世祖謂曰吾聞突騎天下精兵今乃見其戰樂可言邪遂從征河北世祖即位以讖文用平狄將軍孫咸行大司馬衆咸不悅詔舉可為大司馬者羣臣所推唯吳漢及丹帝曰景將軍北州大將是其人也然吳將軍有建大策之勳又誅苗幽州謝尚書其功大舊制驃騎將軍官與大司馬相兼也乃以吳漢為大司馬而拜丹為驃騎大將軍建武二年定封丹櫟陽侯帝謂丹曰今關東故王國雖數縣不過櫟陽萬戶邑夫富貴不歸故鄉如衣繡夜行故以封卿耳丹頓首謝秋與吳漢建威大將軍耿弇建義大將軍朱祐執金吾賈復偏將軍馮異強弩將軍陳俊左曹王常騎都尉臧宮等從擊破五校於羛陽降其衆五萬人會陝賊蘇況攻破弘農生獲郡守丹時病帝以其舊將欲令強起領郡事乃夜召入謂曰賊迫近京師但得將軍威重臥以鎮之足矣丹不敢辭乃力疾拜命將營到郡十餘日薨子尚嗣徙封余吾侯尚卒子苞嗣苞卒子臨嗣無子國絕永初七年鄧太后紹封苞弟遽為監亭侯王梁字君嚴漁陽安要陽人也為郡吏, WYG: ''}
