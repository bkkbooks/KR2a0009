  - {type: variant, offset: 5063, length: 1, content: 又, WYG: 足以講禮儀清掃所災之處不敢於此}
  - {type: variant, offset: 5063, length: 1, content: 又, krp: 足以講禮儀清掃所災之處不敢於此}
  - {type: variant, offset: 5065, length: 0, content: '', WYG: 所立作萐莆嘉禾必生此地以報陛下䖍恭之德疲民之力竭民之財實非所以致符瑞而懐遠人也臣昭曰高堂隆之言災其得天心乎雖與本志所明不同靈帝之時有焉故載其言廣災異也獻帝初平元年八月霸橋災其後三年董卓見殺臣昭案劉焉傳興平元年天火燒其城府輜重延及民家館邑無餘也庶徴之恒燠漢書以冬温應之中興以來亦有冬温而記不錄云越絶范蠡曰春燠而不生者}
