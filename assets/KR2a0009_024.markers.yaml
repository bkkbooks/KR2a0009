  - {type: variant, offset: 5062, length: 0, content: '', WYG: 日燒盡延及白虎威興門尚書符節蘭臺夫雲臺者乃周家之所造也圖書術籍珍玩寶怪皆所藏在也京房易傳曰君不思道厥妖火燒宮是時黄巾作慝變亂天常七州二十八郡同時俱發命將出衆雖頗有所禽然宛廣宗曲陽尚未破壊役起負海杼柚空懸百姓死傷己過半矣而靈帝曾不克已復禮虐侈滋甚尺一雨布騶騎電激官非其人政以賄成内嬖鴻都並受封爵京都為之語曰今兹諸侯嵗也天戒若曰放賢賞淫何以舊典為故焚其臺門祕府也其後三年靈帝暴崩續以董卓之亂火三日不絶京都為丘墟矣魏志曰魏明帝青龍二年崇華殿災詔問太史令高堂隆此何咎於禮寜有祈禳之義乎對曰夫災變之發皆所以明教誡也唯率禮修德可以勝之易傳曰上不儉下不節孽火燒其室又曰君高其臺天火為災此人君苟飾宮室不知百姓空竭故天應之以旱火從高殿起也上天降監故譴告陛下陛下宜增崇人道以答天意昔太戊有桑榖生於朝武丁有雊雉登於鼎皆聞災恐懼側身修徳三年之後遠夷朝貢故號曰中宗高宗此則前代之明鑒也今案舊占災火之發皆以臺榭宮室為誡然今宮室之所以充廣者實由宮人猥多之故宜簡擇留其淑懿如周之制罷省其餘此則祖已之所以訓高宗高宗之所以享遠號也詔問隆吾聞漢武帝時栢梁災而起宮殿以厭之其義云何對曰臣聞西京栢梁既災越巫陳方建章是營以厭火祥乃夷越之巫所為非聖賢之明訓也五行志曰栢梁災其後有江充巫蠱衞太子事如志之言越巫建章無所厭也孔子曰災者修類應行精祲相感以戒人君是以聖主覩災責躬退以修德以消復之今宜罷散民役宮室之制務從約節内足以待風雨}
  - {type: page-break, offset: 5062, content: '', id: KR2a0009_WYG_024-7b, image: WYG0252/WYG0252-0330b.png}
  - {type: page-break, offset: 5062, content: '', id: KR2a0009_WYG_024-8a, image: WYG0252/WYG0252-0330c.png}
