  - {type: variant, offset: 3391, length: 230, content: 高置亭侯堅鐔字子伋潁川襄城人也為郡縣吏世祖討河北或薦鐔者因得召見以其吏能署主簿又拜偏將軍從平河北別擊破大槍於盧奴世祖即位拜鐔揚化將軍封強侯與諸將攻洛陽而朱鮪別將守東城者為反閒私約鐔晨開上東門鐔與建義大將軍朱祐乘朝而入與鮪大戰武庫下殺傷甚衆至旦食乃罷朱鮪由是遂降又別擊內黃平之建武二年與右將軍萬脩徇南陽諸縣而堵鄉人董訢反宛城獲南陽太守劉驎鐔乃引軍赴宛選敢死士夜自登城斬關而入訢遂棄城走還堵鄉鄧奉復反新野攻破吳漢時萬脩病卒鐔獨孤絕南拒鄧奉北當董訢一年閒道路隔塞糧饋, WYG: 安帝司空周章等心}
