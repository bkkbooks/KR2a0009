  - {type: variant, offset: 314, length: 435, content: 丞李由持璽書招豐豐出惡言不肯降車駕引還勑祐方略祐盡力攻之明年夏城中窮困豐乃將其母妻子九人肉袒降祐轞車傳豐送洛陽斬之大司馬吳漢劾奏祐廢詔受降違將帥之任帝不加罪祐還與騎都尉臧宮會擊延岑餘黨陰酇筑陽三縣賊悉平之祐為人質直尚儒學將兵率衆多受降以克定城邑為本不存首級之功又禁制士卒不得虜掠百姓軍人樂放縱多以此怨之九年屯南行唐拒匈奴十三年增邑定封鬲侯食邑七千三百戶十五年朝京師上大將軍印綬因留奉朝請祐奏古者人臣受封不加王爵可改諸王為公帝即施行又奏宜令三公並去大名以法經典後遂從其議祐初學長安帝往候之祐不時相勞苦而先升講舍後車駕幸其第帝因笑曰主人得無捨我講乎以有舊恩數蒙賞賚二十四年卒子商嗣商卒子演嗣永元十四年坐從兄伯為外孫陰皇后巫蠱事免為庶人永初七年鄧太后紹封演子沖為鬲侯景丹字孫卿馮翊櫟陽人也少學長安王莽時舉四科丹以言語為固德侯相有幹事稱遷朔調連率副貳更始立遣使者徇上谷丹與連率耿況降復為上谷長史王郎起丹與況共謀拒之況使丹與子弇及寇恂等將兵南歸世祖世祖引見丹等笑曰邯鄲將帥數言我發, WYG: ''}
