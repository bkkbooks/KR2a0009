  - {type: variant, offset: 24, length: 2, content: 夫孝, WYG: 周之徳可謂至徳三分天下有其二以服事殷但駑馬鈆刀不可强扶周禮校人掌六馬駑馬最下者也説文鈆青金也似錫而色青賈誼云鈆刀為銛言駑馬鈆刀不可强扶持而用也數蒙伯樂一顧之價戰國策曰蘇代為燕説齊未見齊王先説淳于髠曰人有賣駿馬者比三旦立市市人}
