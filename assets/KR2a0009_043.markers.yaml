  - {type: variant, offset: 252, length: 1295, content: 而去及義母死去官行服數辟公府為縣令進退必以禮後舉賢良公車徵遂不至張奉歎曰賢者固不可測往日之喜乃為親屈也斯蓋所謂家貧親老不擇官而仕者也建初中章帝下詔襃寵義賜穀千斛常以八月長吏問起居加賜羊酒壽終于家安帝時汝南薛包孟嘗好學篤行喪母以至孝聞及父娶後妻而憎包分出之包日夜號泣不能去至被歐杖不得已廬於舍外旦入而洒掃父怒又逐之乃廬於里門昏晨不廢積歲餘父母慙而還之後行六年服喪過乎哀既而弟子求分財異居包不能止乃中分其財奴婢引其老者曰與我共事久若不能使也田廬取其荒頓者曰吾少時所理意所戀也器物取朽敗者曰我素所服食身口所安也弟子數破其產輒復賑給建光中公車特徵至拜侍中包性恬虛稱疾不起以死自乞有詔賜告歸加禮如毛義年八十餘以壽終若二子者推至誠以為行行信於心而感於人以成名受祿致禮斯可謂能以孝養也若夫江革劉般數公者之義行猶斯志也撰其行事著于篇劉平字公子楚郡彭城人也本名曠顯宗後改為平王莽時為郡吏守菑丘長政教大行其後每屬縣有劇賊輒令平守之所至皆理由是一郡稱其能更始時天下亂平弟仲為賊所殺其後賊復忽然而至平扶侍其母奔走逃難仲遺腹女始一歲平抱仲女而𠫓廾其子母欲還取之平不聽曰力不能兩活仲不可以絕類遂去不顧與母俱匿野澤中平朝出求食逢餓賊將亨之平叩頭曰今旦為老母求菜老母待曠為命願得先歸食母異還就死因涕泣賊見其至誠哀而遣之平還既食母訖因白曰屬與賊期義不可欺遂還詣賊衆皆大驚相謂曰常聞烈士乃今見之子去矣吾不忍食子於是得全建武初平狄將軍龐萌反於彭城攻敗郡守孫萌平時復為郡吏冒白刃伏萌身上被七創困頓不知所為號泣請曰願以身代府君賊乃斂兵止曰此義士也勿殺遂解去萌傷甚氣絕有頃蘇渴求飲平傾其創血以飲之後數日萌竟死平乃裹創扶送萌喪至其本縣後舉孝廉拜濟陰郡丞太守劉育甚重之任以郡職上書薦平會平遭父喪去官服闋拜全椒長政有恩惠百姓懷感人或增貲就賦或減年從役刺史太守行部獄無繫囚人自以得所不知所問唯班詔書而去後以病免顯宗初尚書僕射鍾離意上書薦平及琅邪王望東萊王扶曰臣竊見琅邪王望楚國劉曠東萊王扶皆年七十執性恬淡所居之處邑里化之脩身行義應在朝次臣誠不足知人竊慕推士進賢之義書奏有詔徵平等特賜辦裝錢至皆拜議郎並數引見平再遷侍中永平三年拜宗正數薦達名士承宮郇恁等在位八年以老病上疏乞骸骨卒於家王望字慈卿客授會稽自議郎遷青州刺史甚有威名是時州郡災旱百姓窮荒望行部道見飢者裸行草食五百餘人愍然哀之因以便宜出所在布粟給其廩稟糧為作褐衣事畢上言帝以望不先表請章示百官詳議其罪時公卿皆以為望之專命法有常條鍾離意獨曰昔華元子反楚宋之良臣不稟君命平二國春秋之義以為美談今望懷義忘罪當仁不讓若繩之以法忽其本情將乖聖朝愛育之旨帝嘉意議赦而不罪王扶字子元掖人也少脩節行客居琅邪不其縣所止聚落化其德國相張宗謁請不應欲強致之遂杖策歸鄉里連請固病不起太傅鄧禹辟不至後拜議郎會見恂恂似不能言然性沈正不可干以非義當世高之永平中臨邑侯劉復著漢德頌盛稱扶為名臣云趙孝字長平沛國蘄人也父普王莽時為田禾將軍任孝為郎每告歸常白衣步擔嘗從長安還欲止郵亭亭長先時聞孝當過以有長者客掃洒待之孝既至不自名長不肯內因問曰聞田禾將軍子當從長安來何時至乎孝曰尋到矣於是遂去及天下亂人相食孝弟禮為餓賊所得孝聞之, WYG: ''}
