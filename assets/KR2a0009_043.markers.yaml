  - {type: variant, offset: 28, length: 0, content: '', WYG: 司空扶安王印綬授囂囂自以與述敵國恥為所臣乃斬其使出兵擊之連破述軍以故蜀兵不復北出時關中將帥數上書言蜀可擊之狀帝以示囂因使討蜀以效其信囂乃遣長史上書盛言三輔單弱劉文伯在邊文伯盧芳字也未宜謀蜀帝知囂欲持兩端不願天下統一}
