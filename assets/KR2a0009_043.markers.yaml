  - {type: variant, offset: 35, length: 0, content: '', WYG: 王㡬無所厝今南有子陽北有文伯江湖海岱王公十數謂張步據齊董憲起東海李憲守舒劉紆居垂惠佼彊周建秦豐等各據州郡而欲牽儒生之説棄千乗之基儒生謂馬援説囂歸光武羇旅危國以求萬全此循覆車之軌計之不可者也今天水完富士馬最彊北収西河上郡東収三輔之地案秦舊迹表裏山河秦外山而内河左傳曰表裏山河元請以一丸泥為大王東封函谷關此萬世一時也若計不及此且畜養士馬據隘自守曠日持久以待四方之變圖王不成其弊猶足以霸前書徐樂曰圖王不成其弊足以霸也要之魚不可脱}
