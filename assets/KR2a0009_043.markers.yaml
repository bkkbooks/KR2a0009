  - {type: variant, offset: 86, length: 1, content: 主, WYG: 囂乃上疏謝曰吏人聞大兵卒至驚恐自救臣囂不能禁止兵有大利不敢廢臣子之節親自追還昔虞舜事父大杖則走小杖則受家語孔子謂曽子之詞也臣雖不敏敢望斯義今臣之事在於本朝賜死則死加刑則刑如遂蒙恩更得洗心死骨不朽有司以囂言慢請誅其子恂帝不忍復使來歙至汧汧水名因以為縣屬右扶風故城在今隴州汧源縣南賜囂書曰昔柴將軍與韓信書柴將軍柴武也韓信韓王信也信反入匈奴與漢戰故武與之書也云陛下寛仁諸侯雖有亡叛}
