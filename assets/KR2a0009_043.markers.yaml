  - {type: variant, offset: 4604, length: 206, content: 堅伯汝南安成人徵士燮之宗也祖父業建武初為天水太守磐少游京師學古文尚書洪範五行左氏傳好禮有行非典謨不言諸儒宗之居貧養母儉薄不充嘗誦詩至汝墳之卒章慨然而歎乃解韋帶就孝廉之舉和帝初拜謁者除任城長遷陽夏重合令頻歷三城皆有惠政後思母𠫓廾官還鄉里及母歿哀至幾於毀滅服終遂廬于冢側教授門徒常千人公府三辟皆以有道特徵磐語友人曰昔方回支父嗇神養和不以榮利滑其生術吾親以沒矣從物何為遂不應建光元年年七十三歲朝會集諸生講論終日因令其二, WYG: ''}
