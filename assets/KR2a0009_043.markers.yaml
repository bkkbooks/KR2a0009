  - {type: variant, offset: 5791, length: 5, content: 雖有仲尼重, WYG: 王小者侯田横為齊王天下既定横與賔客五百人居海島髙祖使召之曰横來大者王小者侯事見前書若遂欲為黥布者亦自任也必不歸降遂如黥布云欲為帝亦任之也囂終不降於是誅其子恂使吳漢與征南大將軍岑彭圍西城耿弇與虎牙大將軍蓋延圍上邽車駕東歸潁川賊起故東歸月餘楊廣死囂窮困其大將王㨗别在戎丘登城呼漢軍曰為隗王城守者皆必死無二心願諸軍亟罷亟音紀力反請自殺以}
