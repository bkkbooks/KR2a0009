  - {type: variant, offset: 79, length: 0, content: '', WYG: 脱於泉脱失也失泉則涸矣神龍失埶即還與蚯蚓同慎子曰騰蛇㳺霧飛龍乗雲雲罷霧除與蚯蚓同失其所乗故也囂心然元計雖遣子入質猶負其險阸欲專方面於是㳺士長者稍稍}
