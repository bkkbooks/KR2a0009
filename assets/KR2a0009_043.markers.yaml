  - {type: variant, offset: 5803, length: 0, content: '', krp: 東純與廵宇徙𢎞農唯王元留為蜀將及輔威將軍臧宫破延岑元舉衆詣宫降元字惠孟初拜上蔡令遷東平相坐墾田不實下獄死決錄曰平陵之王惠孟鏘鏘激昻囂述困於東平也牛邯字孺卿狄道人有勇力才氣雄於邊垂及降大司空司直杜林劉攽曰案司空無司直當作徒字杜林傳亦可見太中大夫馬援並薦之以為䕶羌校尉與來歙平隴右十八年純與賔客數十騎亡入胡至武威捕得誅之論曰隗囂援旗糺族援引也糺収也假制明神謂立髙祖孝文等廟而祭之也迹夫創圖首事有以識其風矣終於孤立一隅介于大國東逼於漢南拒於蜀左傳曰介于二大國之間隴坻雖隘非有百二之埶百二者以秦地險固二萬人當諸侯百萬人前書曰田肯賀髙祖秦得百二焉區區兩郡隴西天水也以禦堂堂之鋒言光武親征之也魏武兵書云無擊堂堂之陣至使窮廟策及征徭身歿衆解然後定之則知其道有足懷者所以棲有四方之桀四方雄桀者皆棲集而有之士至投死絶亢而不悔者矣亢喉嚨也謂王㨗自刎也夫功全則譽顯業謝則釁生回成喪而為其議者或未聞焉成喪猶成敗也言事之成敗在於天命不由人力能回為此議者寡故未之聞也若囂命㑹符運敵非天力雖坐論西伯豈多嗤乎天力謂光武天所授也言不遇光武為敵則不謝西伯也嗤笑也公孫述傳公孫述字子陽扶風茂陵人也東觀記曰其先武帝時以吏二千石自無鹽徙焉哀帝時以父任為郎任保任也東觀記曰成帝末述父仁為侍御史任為太子舎人稍増秩為郎焉後父仁為河南都尉秦置郡尉典兵禁捕盜賊景帝更名都尉秩比二千石也而述補清水長清水縣名屬天水郡今秦州縣仁以述年少遣門下掾隨之官州郡有掾皆自辟除之常居門下故以為號月餘掾辭歸白仁曰述非待教者也後太守以其能使兼攝五縣政事修理姦盜不發郡中謂有鬼神言明察也王莽天鳳中為導江卒正居臨卭王莽改蜀郡曰導江太守曰卒正臨卭今卭州縣也復有能名及更始立豪傑各起其縣以應漢南陽人宗成自稱虎牙將軍入略漢中又商人王岑亦起兵於雒縣商今商州商雒縣也雒縣屬廣漢郡今益州縣也自稱定漢將軍殺王莽庸部牧以應成王莽改益州為庸部其牧宋遵也衆合數萬人述聞之遣使迎成等成等至成都虜掠暴横述意惡之召縣中豪傑謂曰天下同苦新室思劉氏久矣故聞漢將軍到馳迎道路今百姓無辜而婦子係獲室屋燒燔此寇賊非義兵也吾欲保郡自守以待真主諸卿欲并力者即留不欲者便去豪傑皆叩頭曰願效死述於是使人詐稱漢使者自東方來假述輔漢將軍蜀郡太守兼益州牧印綬乃選精兵千餘人西擊成等比至成都衆數千人遂攻城大破之成將垣副殺成以其衆降風俗通曰垣秦邑也因以為姓秦始皇有將垣齮東觀記曰初副以漢中亭長聚衆降成自稱輔漢將軍二年秋更始遣柱功侯李寳益州刺史張忠將兵萬餘人徇蜀漢述恃其地險衆附有自立志乃使其弟恢恢本或作惔於綿竹擊寳忠大破走之綿竹縣名屬廣漢郡今益州縣也故城今在縣東由是威震益部功曹李熊説述曰方今四海波蕩匹夫横議將軍割據千里地什湯武枚乗諫吳王曰湯武之土不過百里若奮威徳以投天隙天時之間隙也霸王之業成矣宜改名號以鎮百姓述曰吾亦慮之公言起我意於是自立為蜀王都成都蜀地肥饒兵力精强逺方士庶多往歸之卭笮君長卭笮皆西南夷國名笮音昨見西南夷傳皆來貢獻李熊復説述曰今山東飢饉人庶相食兵所屠滅城邑丘墟蜀地沃野千里土壤膏腴無塊曰壤果實所生無穀而飽左思蜀都賦曰户有橘柚之園又曰𤓰疇芋區前書卓王孫曰吾聞㟭山之下沃野下有蹲鴟至死不飢女工之業覆衣天下左思蜀都賦曰百室離房機杼相和衣音於既反名材竹榦器械之饒不可勝用竹榦竹箭也内盛曰器外盛曰械又有魚鹽銅銀之利丙穴出嘉魚在漢中蜀有鹽井又有銅陵山其朱提界出銀朱音上朱反提音上移反浮水轉漕之便北據漢中杜裦斜之險東守巴郡拒扞關之口史記曰楚肅王為扞關以拒蜀故基在今硤州巴山縣地方數千里戰士不下百萬見利則出兵而略地無利則堅守而力農東下漢水以窺秦地南順江流以震荆揚所謂用天因地成功之資今君王之聲聞於天下而名號未定志士狐疑宜即大位使逺人有所依歸述曰帝王有命吾何足以當之熊曰天命無常百姓與能詩云天命靡常易曰百姓與能能者當之王何疑焉述夢有人語之曰八厶子系十二為期説文云厶音私系音係胡計反覺謂其妻曰雖貴而祚短若何妻對曰朝聞道夕死尚可况十二乎㑹有龍出其府殿中夜有光耀述以為符瑞因刻其掌文曰公孫帝建武元年四月遂自立為天子號成家以起成都故號成家色尚白建元曰龍興元年以李熊為大司徒以其弟光為大司馬恢為大司空改益州為司𨽻校尉蜀郡為成都尹漢以京師為司𨽻校尉部置京兆尹中興以洛陽為司𨽻校尉部置河南尹故述斆焉越巂任貴亦殺王莽大尹而據郡降述遂使將軍侯丹開白水關在漢陽西縣梁州記曰關城西南有白水關也北守南鄭今梁州縣也故城在今縣東北也將軍任滿從閬中下江州閬中江州皆縣名並屬巴郡閬中今隆州縣也江州故城在渝州巴縣西東據扞關於是盡有益州之地自更始敗後光武方事山東未遑西伐關中豪桀吕鮪等往往擁衆以萬數莫知所屬多往歸述時延岑據藍田王歆據下邽各稱將軍擁兵事見馮異傳皆拜為將軍遂大作營壘陳車騎肄習戰射㑹聚兵甲數十萬人積糧漢中築宫南鄭又造十層赤樓帛蘭舩蓋以帛飾其蘭檻也多刻天下牧守印章備置公卿百官使將軍李育程烏將數萬衆出陳倉與吕鮪徇三輔三年征西將軍馮異擊鮪育於陳倉大敗之鮪育奔漢中五年延岑田戎為漢兵所敗皆亡入蜀岑字叔牙南陽人東觀記曰筑陽縣人始起據漢中又擁兵關西關西所在破散劉攽曰案文多兩關西字走至南陽略有數縣戎汝南人初起兵夷陵轉寇郡縣衆數萬人岑戎並與秦豐合豐俱以女妻之及豐敗故二人皆降於述述以岑為大司馬封汝寧王戎翼江王六年述遣戎與將軍任滿出江關下臨沮夷陵間華陽國志曰巴楚相攻故置江關舊在赤甲城後移在江州南岸對白帝城故基在今䕫州復縣南臨沮縣名侯國屬南郡故城在今荆州當陽縣西北夷陵縣名屬南郡今硤州縣也故城在今縣西北劉攽曰注今䕫州復縣案文少一魚字招其故衆因欲取荆州諸郡竟不能尅是時述廢銅錢置鐵官錢置鐵官以鑄錢百姓貨幣不行蜀中童謡言曰黄牛白腹五銖當復好事者竊言王莽稱黄述自號白五銖錢漢貨也言天下當并還劉氏述亦好為符命鬼神瑞應之事妄引䜟記以為孔子作春秋為赤制而斷十二公尚書考靈耀曰孔子為赤制故作春秋赤者漢行也言孔子作春秋斷十二公象漢十二帝明漢至平帝十二代歴數盡也據漢十一帝言十二代者并數吕后一姓不得再受命又引錄運法曰廢昌帝立公孫括地象曰帝軒轅受命公孫氏握錄運法括地象並河圖名也援神契曰西太守乙卯金謂西方太守而乙絶卯金也乙軋也述言西方太守能軋絶卯金也五徳之運黄承赤而白繼黄金據西方為白徳而代王氏得其正序又自言手文有竒及得龍興之瑞數移書中國冀以感動衆心帝患之乃與述書曰圖䜟言公孫即宣帝也代漢者當塗髙君豈髙之身邪東觀記曰光武與述書曰承赤者黄也姓當塗其名髙也乃復以掌文為瑞王莽何足效乎王莽詐以鐵契石龜文圭𤣥印等為符瑞言不足倣傚也君非吾賊臣亂子倉卒時人皆欲為君事耳何足數也數責也君日月已逝妻子弱小當早為定計可以無憂天下神器不可力爭老子云天下神器不可為也宜留三思署曰公孫皇帝述不答明年隗囂稱臣於述述騎都尉平陵人荆邯見東方將平兵且西向説述曰兵者帝王之大器}
  - {type: variant, offset: 5804, length: 0, content: '', WYG: 今所不能廢也左傳宋子罕曰天生五材廢一不可誰能去兵聖人以興亂人以廢廢興存亡之術皆兵之由也昔秦失其守豪桀並起漢祖無前人之迹立錐之地言漢祖起自布衣無公劉太王之業也枚乗諫吳王書曰舜無立錐之地以有天下起於行陣之中躬自奮擊兵破身困者數矣然軍敗復合創愈復戰軍敗謂戰於睢水上為楚所破後得韓信軍復大振也創愈謂在於成臯間項羽射傷漢王胷後復戰何則前死而成功踰於却就於滅亡也劉攽曰案文下於字當作而在文勢不可併用兩於字也隗囂遭遇運㑹割有雍州兵强士附威加山東隴西天水皆雍州之地故言割有也囂傳云名震西州流聞山東是威加也遇更始政亂復失天下衆庶引領四方瓦解淮南子曰武王伐紂左操黄鉞右秉白旄而麾之則瓦解而走囂不及此時推危乗勝以爭天命而退欲為西伯之事尊師章句賔友處士章句謂鄭興等也處士謂方望等也偃武息戈卑辭事漢喟然自以文王復出也令漢帝釋關隴之憂以囂居西無東之意故置之度外而不為憂專精東伐四分天下而有其三使西州豪桀咸歸心於山東發間使召擕貳間使謂來歙馬援等也擕貳謂王遵鄭興杜林牛邯等相次而歸光武則五分而有其四若舉兵天水必至沮潰天水既定則九分而有其八陛下以梁州之地内奉萬乗外給三軍百姓愁困不堪上命將有王氏自潰之變王氏即王莽也臣之愚計以為宜及天下之望未絶豪桀尚可招誘急以此時發國内精兵令田戎據江陵臨江南之㑹倚巫山之固巫山在今䕫州巫山縣東也築壘堅守傳檄吳楚長沙以南必隨風而靡令延岑出漢中定三輔天水隴西拱手自服如此海内震揺冀有大利述以問羣臣博士吳柱曰昔武王伐殷先觀兵孟津八百諸侯不期同辭然猶還師以待天命未聞無左右之助而欲出師千里之外以廣封彊者也邯曰今東帝無尺土之柄驅烏合之衆鄒陽云周用烏集而王跨馬陷敵所向輙平不亟乗時與之分功而坐談武王之説是效隗囂欲為西伯也述然邯言欲悉發北軍屯士及山東客兵使延岑田戎分出兩}
