  - {type: variant, offset: 20, length: 0, content: '', WYG: 五人見禮如三公監位上大夫各主五郡公氏作牧侯氏卒正伯氏連率子氏屬令男氏屬長皆代其官其無爵者為尹又置六隊部置大夫職如太守劉攽曰大尹尹尉隊大夫案王莽置六尉六隊郡各置大夫故云尉隊大夫此多一尹字又注云又置六隊部置大夫少六尉二字部又當作郡也故新都侯王莽慢侮天地悖道逆理鴆殺孝平皇帝簒奪其位矯託天命偽作符書莽遣五威將軍王竒等班符命四十二篇於天下言當代漢之意欺惑衆庶震怒上帝反戾飾文以為祥瑞大風毁莽玉路堂又拔其昭寧堂池柬榆樹大十圍莽乃曰念紫閣仙圖天意立大子正其名乃立其子臨為太子以為祥應也戲弄神祗歌頌禍殃戲弄神祗謂仙人掌旁有白頭公青衣莽曰皇祖叔父子僑欲來迎我也歌頌禍殃謂莽作告天策自陳功勞千餘言能誦策文者除以為郎至五十餘人劉攽曰案本傳作五千人楚越之竹不足以書其惡前書朱光世曰南山之竹不足以盡我詞囂以楚越多竹故引以為言也天下昭然所共聞見今略舉大端以喻吏民蓋天為父地為母尚書曰惟天地萬物父母禍福之應各以事降莽明知之而冥昧觸冒不顧大忌詭亂天術援引史傳王莽每有災禍皆引史傳以文飾之前書説符侯崔發言於莽曰周禮及春秋左氏國有大災則哭以厭之故周易稱先號咷而後笑宜乎嗟呼告天以求救莽乃率羣臣至南郊陳其符命因搏心大哭昔秦始皇毁壞諡法以一二數欲至萬世史記曰秦始皇初并天下制曰太古有號無諡中古有號死而以行為諡如此則子議父臣議君自今以來除諡法朕為始皇帝後世以計數至于萬世傳之無窮而莽下三萬六千嵗之歴言身當盡此度莽令太史推三萬六千嵗歴紀六嵗一改元布告天下循亡秦之軌推無窮之數是其逆天之大罪也分裂郡國斷絶地絡絡猶經絡也謂莽分坼郡縣斷割疆界也田為王田賣買不得莽更名天下田曰王田不得賣買規錮山澤奪民本業莽制名山大澤不得採取造起}
