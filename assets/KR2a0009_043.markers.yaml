  - {type: variant, offset: 2952, length: 763, content: 門明年光武下詔封般為菑丘侯奉孝王祀使就國後以國屬楚王徙封杼秋侯十九年行幸沛詔問郡中諸侯行能太守薦言般束脩至行為諸侯師帝聞而嘉之乃賜般綬錢百萬繒二百匹二十年復與車駕會沛因從還洛陽賜穀什物留為侍祠侯永平元年以國屬沛徙封居巢侯復隨諸侯就國數年楊州刺史觀恂薦般在國口無擇言行無怨惡宜蒙旌顯顯宗嘉之十年徵般行執金吾事從至南陽還為朝侯明年兼屯騎校尉時五校官顯職閑而府寺寬敞輿服光麗伎巧畢給故多以宗室肺腑居之每行幸郡國般常將長水胡騎從帝曾欲置常平倉公卿議者多以為便般對以常平倉外有利民之名而內實侵刻百姓豪右因緣為姦小民不能得其平置之不便帝乃止是時下令禁民二業又以郡國牛疫通使區種增耕而吏下檢結多失其實百姓患之般上言郡國以官禁二業至有田者不得漁捕今濱江湖郡率少蠶桑民資漁採以助口實且以冬春閑月不妨農事夫漁獵之利為田除害有助穀食無關二業也又郡國以牛疫水旱墾田多減故詔勑區種增進頃畝以為民也而吏舉度田欲令多前至於不種之處亦通為租可申勑刺史二千石務令實覈其有增加皆使與奪田同罪帝悉從之肅宗即位以為長樂少府建初二年遷宗正般妻卒厚加賵贈及賜冢塋地於顯節陵下般在位數言政事其收恤九族行義尤著時人稱之年六十建初三年卒子憲嗣憲卒子重嗣憲兄愷愷字伯豫以當襲般爵讓與弟憲遁逃避封久之章和中有司奏請絕愷國肅宗美其義特優假之愷猶不出積十餘歲至永元十年有司復奏之侍中賈逵因上書曰孔子稱能以禮讓為國於從政乎何有竊見居巢侯劉般嗣子愷素行孝友謙遜絜清讓封弟憲潛身遠迹有司不原樂善之心而繩以循常之法懼非長克讓之風成含弘之化前世扶陽侯韋玄成近有陵陽侯丁鴻鄳侯鄧彪並以高行絜身辭爵未聞貶削而皆登三事今愷景仰前脩有伯夷之節宜蒙矜宥全其先功以增聖朝尚德之美和帝納之下詔曰故居巢侯劉般嗣子愷當襲般爵而稱父遺意致國弟憲遁亡七年所守彌篤蓋王法崇善成人之美其聽憲嗣爵遭事之宜後不得以為比乃徵愷, WYG: ''}
