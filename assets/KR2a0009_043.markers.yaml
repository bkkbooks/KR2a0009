  - {type: variant, offset: 5483, length: 295, content: 夕故其生也不為娛亡也不知戚夫亡者元氣去體貞魂游散反素復始歸於無端既已消仆還合糞土土為𠫓廾物豈有性情而欲制其厚薄調其燥溼邪但以生者之情不忍見形之毀乃有掩骼埋窆之制易曰古之葬者衣以薪藏之中野後世聖人易之以棺椁棺椁之造自黃帝始爰自陶唐逮于虞夏猶尚簡樸或瓦或木及至殷人而有加焉周室因之制兼二代復重以牆翣之飾表以旌銘之儀招復含斂之禮殯葬宅兆之期棺椁周重之制衣衾稱襲之數其事煩而害實品物碎而難備然而秩爵異級貴賤殊等自成康以下其典稍乖至於戰國漸至穨陵法度衰毀上下僭雜終使晉侯請隧秦伯殉葬陳大夫設參門之木宋司馬造石椁之奢爰暨暴秦違道廢德滅三代之制興淫邪之法國貲糜於三泉人力單於酈墓玩好窮於糞土伎巧費於窀穸自, WYG: ''}
