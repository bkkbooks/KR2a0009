  - {type: variant, offset: 29, length: 5, content: 嚴父嚴父莫, WYG: 是稍黜其禮正君臣之儀初囂與來歙馬援相善故帝數使歙援奉使往來勸令入朝許以重爵囂不欲東連遣使深持謙辭言無功徳須四方平定退伏閭里五年復遣來歙説囂遣子入侍囂聞劉永彭寵皆已破滅乃遣長子恂隨歙詣闕以為胡騎校尉封鐫羌侯胡騎校尉武帝置秩二千石也鐫猶鐫鑿也而囂將王元王㨗常以為天下成敗未可知不願專心内事元遂説囂曰昔更始西都四方響應天下喁喁謂之太平喁喁衆口向上也一旦敗壞}
