  - {type: variant, offset: 80, length: 0, content: '', WYG: 之東觀記曰杜林先去餘稍稍相隨東詣京師六年關東悉平帝積苦兵間以囂子内侍公孫述逺據邊垂乃謂諸將曰且當置此兩子於度外耳因數騰書隴蜀説文曰騰傳也告示禍福囂賔客掾史多文學生每所上事當世士大夫皆諷誦之故帝有所辭答尤加意焉囂復遣使周㳺詣闕先到馮異營㳺為仇家所殺帝遣衞尉銚期持珍寳繒帛賜囂期至鄭被盜鄭今華州縣是也亡失財物帝常稱囂長者務欲招之聞而歎曰吾與隗囂事欲不諧使來見殺得賜道亡㑹公孫述遣兵寇南郡南郡今荆州也乃詔囂當從天水伐蜀因此欲以潰其心腹囂復上言白水險阻棧閣絶敗白水縣有關屬廣漢郡棧閣者山路懸險棧木為閣道又多設支閡支柱障閡帝知其終不為用叵欲討之叵猶遂也遂西幸長安遣建威大將軍耿弇等七將軍從隴道伐蜀先使來歙奉璽書喻㫖囂疑懼即勒兵使王元據隴坻坻坂也郭仲産秦州記曰隴山東西百八十里在隴州汧源縣西伐木塞道謀欲殺歙歙得亡歸諸將與囂戰大敗各引退囂因使王元行廵侵}
