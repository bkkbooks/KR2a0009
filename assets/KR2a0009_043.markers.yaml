  - {type: variant, offset: 5812, length: 2, content: 華夏, WYG: 來歙岑彭受害自疑今以時自詣則家族完全若迷惑不喻委肉虎口痛哉奈何將帥疲倦吏士思歸不樂久相屯守詔書手記不可數得朕不食言述終無降意九月吳漢又破斬其大司徒謝豐執金吾袁吉漢兵遂守成都述謂延岑曰事當奈何岑曰男兒當死中求生可坐窮乎財物易聚耳不宜有愛述乃悉散金帛募敢死士五千餘人以配岑於市橋市橋即七星之一橋也李膺益州記曰冲星橋舊市橋也在今成都縣西南四里偽建旗幟幟幡也幟音昌忌反又式志反鳴鼔挑戰而潛遣竒兵出吳漢軍後襲擊破漢漢墮水緣馬尾得出十一月臧宫軍至咸門成都北面有二門其西者名咸門述視占書云虜死城下大喜謂漢等當之乃自將數萬人攻漢使延岑拒宫大戰岑三合三勝自旦及日中軍士不得食並疲漢因令壯士突之述兵大亂被刺洞胷墮馬吳漢傳云䕶軍髙午奔陣刺述殺之左右輿入城述以兵屬延岑其夜死明旦岑降吳漢乃夷述妻子盡滅公孫氏并族延岑遂放兵大掠焚述宫室帝聞之怒以譴漢又讓漢副將劉尚曰城降三日吏人從服孩兒老母口以萬數一旦放兵縱火聞之可為酸鼻尚宗室子孫嘗更吏職何忍行此仰視天俯視地觀放麑啜羮二者孰仁韓子曰孟孫獵得麑使秦西巴持之其母随而呼秦西巴不忍而與其母戰國策曰樂羊為魏將而攻中山其子在中山中山君烹其子而遺之羮樂羊啜之盡一盃而攻拔中山良失斬將弔人之義也良猶甚也初常少張隆勸述降不從並以憂死帝下詔追贈少為太常隆為光祿勲以禮改𦵏之其忠節志義}
