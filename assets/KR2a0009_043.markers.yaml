  - {type: variant, offset: 1548, length: 840, content: 自縛詣賊曰禮久餓羸瘦不如孝肥飽賊大驚並放之謂曰可且歸更持米糒來孝求不能得復往報賊願就亨衆異之遂不害鄉黨服其義州郡辟召進退必以禮舉孝廉不應永平中辟太尉府顯宗素聞其行詔拜諫議大夫遷侍中又遷長樂衞尉復徵弟禮為御史中丞禮亦恭謙行己類於孝帝嘉其兄弟篤行欲寵異之詔禮十日一就衞尉府太官送供具令共相對盡歡數年禮卒帝令孝從官屬送喪歸葬後歲餘復以衞尉賜告歸卒于家孝無子拜禮兩子為郎時汝南有王琳巨尉者年十餘歲喪父母因遭大亂百姓奔逃唯琳兄弟獨守塚廬號泣不絕弟季出遇赤眉將為所哺琳自縛請先季死賊矝而放遣由是顯名鄉邑後辟司徒府薦士而退琅邪魏譚少閒者時亦為飢寇所獲等輩數十人皆束縛以次當亨賊見譚似謹厚獨令主暮輒執縛賊有夷長公特哀念譚密解其縛語曰汝曹皆應就食急從此去對曰譚為諸君恆得遺餘餘人皆茹草萊不如食我長公義之相曉赦遣並得俱免譚永平中為主家令又齊國兒萌子明梁郡車成子威二人兄弟並見執於赤眉將食之萌成叩頭乞以身代賊亦哀而兩釋焉淳于恭字孟孫北海淳于人也善說老子清靜不慕榮名家有山田果樹人或侵盜輒助為收採又見偷刈禾者恭念其愧因伏草中盜去乃起里落化之王莽末歲飢兵起恭兄崇將為盜所亨恭請代得俱免後崇卒恭養孤幼教誨學問有不如法輒反用杖自箠以感悟之兒慙而改過初遭賊寇百姓莫事農桑恭常獨力田耕鄉人止之曰時方淆亂死生未分何空自苦為恭曰縱我不得它人何傷墾耨不輟後州郡連召不應遂幽居養志潛於山澤舉動周旋必由禮度建武中郡舉孝廉司空辟皆不應客隱琅邪黔陬山遂數十年建初元年肅宗下詔美恭素行告郡賜帛二十匹遣詣公車除為議郎引見極日訪以政事遷侍中騎都尉禮待甚優其所薦名賢無不徵用進對陳政皆本道德帝與之言未嘗不稱善五年病篤使者數存問卒於官詔書襃歎賜穀千斛刻石表閭除子孝為太子舍人江革字次翁齊國臨淄人也少失父獨與母居遭天下亂盜賊並起革負母逃難備經阻險常採拾以為養數遇賊或劫欲將去革輒涕泣求哀言有老母辭氣愿款有足感動人者賊以是不忍犯之或乃指避兵之方遂得俱全於難革轉客下邳窮貧裸跣行傭以供母便身之物莫不必給建武末年與母歸鄉里每至歲時縣當案比革以母老, WYG: ''}
