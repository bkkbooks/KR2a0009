  - {type: variant, offset: 5801, length: 1, content: 勉, WYG: 遂破滅囂少病蹇吳門冀都門名也有緹羣山王元周宗立囂少子純為王明年來歙耿弇蓋延等攻破落門落門聚名也有落門谷水在今秦州伏羌縣西周宗行廵茍宇趙恢等將純降宗恢及諸隗分徙京師}
