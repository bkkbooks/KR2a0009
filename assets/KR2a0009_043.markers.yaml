  - {type: variant, offset: 4811, length: 270, content: 曰吾日者夢見先師東里先生與我講於陰堂之奧既而長歎豈吾齒之盡乎若命終之日桐棺足以周身外椁足以周棺斂形懸封濯衣幅巾編二尺四寸簡寫堯典一篇并刀筆各一以置棺前云不忘聖道其月望日無病忽終學者以為知命焉磐同郡蔡順字君仲亦以至孝稱順少孤養母嘗出求薪有客卒至母望順不還乃噬其指順即心動𠫓廾薪馳歸跪問其故母曰有急客來吾噬指以悟汝耳母年九十以壽終未及得葬里中災火將逼其舍順抱伏棺柩號哭叫天火遂越燒它室順獨得免太守韓崇召為東閤祭酒母平生畏雷自亡後每有雷震順輒圜冢泣曰順在此崇聞之每雷輒為差車馬到墓所後太守鮑衆舉孝廉順不能遠離墳墓遂不就年八十終于家趙咨字文楚東郡燕, WYG: 春霸陵}
