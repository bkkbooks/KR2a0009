  - {type: variant, offset: 24, length: 2, content: 夫孝, krp: 周之徳可謂至徳三分天下有其二以服事殷但駑馬鈆刀不可强扶周禮校人掌六馬駑馬最下者也説文鈆青金也似錫而色青賈誼云鈆刀為銛言駑馬鈆刀不可强扶持而用也數蒙伯樂一顧之價戰國策曰蘇代為燕説齊未見齊王先説淳于髠曰人有賣駿馬者比三旦立市市人}
  - {type: variant, offset: 27, length: 0, content: '', WYG: 之知往見伯樂曰臣有駿馬欲賣之比三旦立於市市人莫與言願子還而視之去而顧之臣請獻一朝之價伯樂如其言一旦而價十倍也而蒼蠅之飛不過數步即託驥尾得以絶羣張敞書曰蒼蠅之飛不過十步自託騏驥之尾乃騰千里之路然無損於騏驥得使蒼蠅絶羣也見敞傳隔於盜賊聲問不數將軍操執款款扶傾救危南距公孫之兵北禦羌胡之亂是以馮異西征得以數千百人躑躅三輔躑躅猶踟蹰也微將軍之助則咸陽已為他人禽矣今關東寇賊往往屯聚志務廣逺多所不暇未能觀兵成都與子陽角力角力猶爭力也如令子陽到漢中三輔願因將軍兵馬旗鼓相當儻肯如言蒙天之福即智士計功割地之秋也秋一嵗中成功之時故舉以為言管仲曰生我者父母成我者鮑子事見史記自今以後手書相聞勿用傍人解構之言解構猶間構也自是恩禮愈篤其後公孫述數出兵漢中遣使以}
