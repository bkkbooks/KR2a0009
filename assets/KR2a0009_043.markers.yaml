  - {type: variant, offset: 3716, length: 877, content: 為郎稍遷侍中愷之入朝在位者莫不仰其風行遷步兵校尉十三年遷宗正免復拜侍中遷長水校尉永初元年代周章為太常愷性篤古貴處士每有徵舉必先巖穴論議引正辭氣高雅永初六年代張敏為司空元初二年代夏勤為司徒舊制公卿二千石刺史不得行三年喪由是內外衆職並廢喪禮元初中鄧太后詔長吏以下不為親行服者不得典城選舉時有上言牧守宜同此制詔下公卿議者以為不便愷獨議曰詔書所以為制服之科者蓋崇化厲俗以弘孝道也今刺史一州之表二千石千里之師職在辯章百姓宣美風俗尤宜尊重典禮以身先之而議者不尋其端至於牧守則云不宜是猶濁其源而望流清曲其形而欲景直不可得也太后從之時征西校尉任尚以姦利被徵抵罪尚曾副大將軍鄧騭騭黨護之而太尉馬英司空李郃承望騭旨不復先請即獨解尚臧錮愷不肯與議後尚書案其事二府並受譴咎朝廷以此稱之視事五歲永寧元年稱病上書致仕有詔優許焉加賜錢三十萬以千石祿歸養河南尹常以歲八月致羊酒時安帝始親政事朝廷多稱愷之德帝乃遣問起居厚加賞賜會馬英策罷尚書陳忠上疏薦愷曰臣聞三公上則台階下象山岳股肱元首鼎足居職協和陰陽調訓五品考功量才以序庶僚遭烈風不迷遇迅雨不惑位莫重焉而今上司缺職未議其人臣竊差次諸卿考合衆議咸稱太常朱倀少府荀遷臣父寵前忝司空倀遷並為掾屬具知其能倀能說經書而用心褊狹遷嚴毅剛直而薄於藝文伏見前司徒劉愷沈重淵懿道德博備克讓爵土致祚弱弟躬浮雲之志兼浩然之氣頻歷二司舉動得禮以疾致仕側身里巷處約思純進退有度百僚景式海內歸懷往者孔光師丹近世鄧彪張酺皆去宰相復序上司誠宜簡練卓異以猒衆望書奏詔引愷拜太尉安帝初清河相叔孫光坐臧抵罪遂增錮二世釁及其子是時居延都尉范邠復犯臧罪詔下三公廷尉議司徒楊震司空陳襃廷尉張皓議依光比愷獨以為春秋之義善善及子孫惡惡止其身所以進人於善也尚書曰上刑挾輕下刑挾重如今使臧吏禁錮子孫以輕從重懼及善人非先王詳刑之意也有詔太尉議是視事三年以疾乞骸骨久乃許之下河南尹禮秩如前歲餘卒于家詔使者護喪事賜東園祕器錢五十萬布千匹少子茂字叔盛亦好禮讓歷位出納桓帝時為司空會司隸校尉李膺等抵罪而南陽太守成太原太守劉下獄當死茂與太尉陳蕃司徒劉矩共上書訟之帝不悅有司承旨劾奏三公茂遂坐免建寧中復, WYG: ''}
