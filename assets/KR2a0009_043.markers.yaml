  - {type: variant, offset: 21, length: 0, content: '', krp: 廟窮極土作莽九廟一曰黄帝太初祖廟二曰虞帝始祖昭廟三曰陳胡王統祖穆廟四曰齊敬王代祖昭廟五曰濟北愍王王祖穆廟六曰濟南伯王尊禰昭廟七曰元城孺子王尊禰穆廟八曰陽平頃王昭廟九曰新都顯王穆廟殿皆重屋太祖廟東西南北各四十丈髙十七丈餘半之為銅欂櫨飾以金銅琱文窮極百工之巧功費數百鉅萬卒徒死者萬數也劉攽曰窮極土作案文土當作工凡興作不專在土也又注七曰元城孺子王案本王翁孺故稱孺王不當有子字發冢河東攻劫丘壟此其逆地之大罪也尊任殘賊信用姦佞誅戮忠正覆按口語赤車奔馳續漢志曰小使車赤轂白葢赤帷從騶騎四十人法冠晨夜寃繫無辜續漢志曰法冠一曰柱後髙五寸侍御史服之妄族衆庶行炮烙之刑除順時之法莽作焚如之刑燒殺陳良終帶等二十七人莽又作不順時之令春夏斬人此為不順時之法灌以醇醯裂以五毒莽以董忠反収忠宗族以醇醯毒藥白刃叢棘并一坎而薶之政令日變官名月易莽州郡官名改無常制乃至嵗復變更一郡至五易名而還復其故吏人不能紀也貨幣嵗改時百姓便安漢五銖錢以莽錢大小兩行難知皆私以五銖錢市買莽患之下書諸挾五銖錢者比非井田制投四裔吏民昏亂不知所從商旅窮窘號泣市道設為六管管主也莽設六管之令謂酤酒賣鹽鐵器鑄錢名山大澤此謂六也皆令縣官主税収其利増重賦斂刻剝百姓厚自奉養苞苴流行財入公輔禮記曰苞苴簟笥問人者莽令七公六卿兼號將軍分鎮大郡皆使為姦於外貨賄為市侵漁百姓上下貪賄莫相檢考民坐挾銅炭沒入鍾官莽時關東大飢蝗人犯鑄錢伍人相坐沒入為官奴婢其男子檻車兒女子步以鐵鎖其頸傳詣鍾官八十萬數到者易其夫婦愁苦死者什六七鍾官主鑄錢之官也徒𨽻殷積數十萬人工匠飢死長安皆臭既亂諸夏狂心益悖北攻强胡南擾勁越莽令十二部將同時十道並出大擊匈奴莽改句町王為侯其王邯怨怒不附莽諷牂牁大尹周歆詐殺邯邯弟承起兵攻殺歆西侵羌戎東摘濊貊摘擾也西羌龎恬傳幡等怨莽奪其地為西海郡遂反攻西海太守陳永莽又發髙句麗兵伐胡不欲行郡强迫之皆亡出塞為寇使四境之外並入為害緣邊之郡江海之瀕滌地無類瀕涯也滌蕩也蕩地無遺類也故攻戰之所敗苛法之所陷饑饉之所夭疾疫之所及以萬萬計其死者則露屍不掩生者則奔亡流散幼孤婦女流離係虜此其逆人之大罪也是故上帝哀矜降罰于莽妻子顛殞還自誅刈顛踣也殞絶也莽殺其子宇臨等妻王氏以莽數殺其子涕泣失明病卒大臣反據亡形已成大司馬董忠國師劉歆衞將軍王涉涉曲陽侯根之子也皆結謀内潰司命孔仁納言嚴尤秩宗陳茂舉衆外降莽置五威司命孔仁敗降更始餘並見光武紀今山東之兵二百餘萬已平齊楚下蜀漢定宛洛據敖倉守函谷威命四布宣風中岳中岳嵩髙也謂更始至洛陽興滅繼絶封定萬國遵髙祖之舊制修孝文之遺徳有不從命武軍平之馳使四夷復其爵號莽貶句町王為侯西域盡改其王為侯單于曰服于髙句麗曰下句麗今皆復其爵號然後還師振旅櫜弓卧鼓周禮曰出曰理兵入曰振旅詩周頌曰載戢干戈載櫜弓矢櫜韜也卧猶息也申命百姓各安其所庶無負子之責百姓襁負流亡責在君上既安其業則無責也囂乃勒兵十萬擊殺雍州牧陳慶將攻安定安定大尹王向莽從弟平阿侯譚之子也威風獨能行其邦内屬縣皆無叛者囂乃移書於向喻以天命反覆誨示終不從於是進兵虜之以徇百姓然後行戮安定悉降而長安中亦起兵誅王莽囂遂分遣諸將徇隴西武都金城武威張掖酒泉敦煌皆下之更始二年遣使徴囂及崔義等囂將行方望以為更始未可知固止之囂不聴望以書辭謝而去曰足下將建伊吕之業𢎞不世之功不世者言非代之所常有也而大事草創草創謂始造也英雄未集以望異域之人疵瑕未露望平陵人以與囂别郡故言異域欲先從郭隗想望樂毅新序云郭隗謂燕昭王曰王誠欲致士請從隗始隗且見事况賢於隗者乎於是昭王為隗築宫而師之樂毅自魏往騶衍自齊往劇辛自趙往士爭赴燕故欽承大㫖順風不讓將軍以至徳尊賢廣其謀慮動有功發中權基業已定大勲方緝今俊乂並㑹羽翮比肩管子曰桓公謂管仲曰寡人之有仲父猶飛鴻之有羽翼耳望無耆耉之徳而猥託賔客之上猥猶濫也誠自愧也雖懐介然之節欲絜去就之分誠終不背其本貳其志也何則范蠡収責句踐乗偏舟於五湖偏舟特舟也収責謂収其罪責也史記曰范蠡與句踐滅吳為書辭句踐曰臣聞主憂臣勞主辱臣死昔者君王辱於㑹稽所以不死為此事也今既雪恥臣請從㑹稽之誅乃裝其輕寳珠玉自與其私徒屬乗舟浮海以行計然云范蠡乗偏舟於江湖劉攽曰偏舟案史傳皆作扁舟扁特也不當用偏字咎犯謝罪文公亦逡廵於河上逡廵不進也左傳曰晉公子重耳反國及河子犯以璧授公子曰臣負羈紲從君廵於天下臣之罪多矣臣猶知之而况君乎請由此亡公子曰所不與舅氏同心者有如白水夫以二子之賢勒銘兩國猶削跡歸愆請命乞身望之無勞蓋其宜也望聞烏氏有龍池之山烏氏縣名屬安定郡故城在今涇州安定縣東也微徑南通與漢相屬其傍時有竒人聊及閑暇廣求其真願將軍勉之囂等遂至長安更始以為右將軍崔義皆即舊號其冬崔義謀欲叛歸囂懼并禍即以事告之崔義誅死更始感囂忠以為御史大夫明年夏赤眉入關三輔擾亂流聞光武即位河北囂即説更始歸政於光武叔父國三老良更始不聴諸將欲劫更始東歸囂亦與通謀事發覺更始使使者召囂囂稱疾不入因㑹客王遵周宗等勒兵自守更始使執金吾鄧曄謝承書曰曄南陽南名鄉人以勁悍亷直為將兵圍囂囂閉門拒守至昏時遂潰圍與數十騎夜斬平城門關三輔黄圖曰長安城南面西頭門亡歸天水復招聚其衆據故地自稱西州上將軍及更始敗三輔耆老士大夫皆奔歸囂囂素謙恭愛士傾身引接為布衣交以前王莽平河大尹長安谷恭莽改清河為平河為掌野大夫平陵范逡為師友趙秉蘇衡鄭興為祭酒前書音義曰禮飲酒必祭示有先也故稱祭酒祭祀時唯長者以酒沃酹申屠剛杜林為持書持書即持書侍御史秩六百石楊廣王遵周宗及平襄人行廵阿陽人王㨗長陵人王元為大將軍東觀記曰元杜陵人阿陽縣名屬天水郡本為河陽者誤也杜陵金丹之屬為賔客由此名震西川聞於山東建武二年大司徒鄧禹西擊赤眉屯雲陽禹禆將馮愔引兵叛禹西向天水囂逆擊破之於髙平縣名今原州髙平縣盡獲輜重於是禹承制遣使持節命囂為西州大將軍得專制涼州朔方事及赤眉去長安欲西上隴囂遣將軍楊廣迎擊破之又追敗之於烏氏涇陽間涇陽縣名屬安定郡今原州平原縣南涇陽故城是也囂既有功於漢又受鄧禹爵署其腹心議者多勸通使京師三年囂乃上書詣闕光武素聞其風聲報以殊禮言稱字用敵國之儀所以慰藉之良厚慰安也藉薦也言安慰而薦藉之良甚也時陳倉人吕鮪擁衆數萬與公孫述通寇三輔囂復遣兵佐征西大將軍馮異擊之走鮪遣使上狀帝報以手書曰慕樂徳義思相結納昔文王三分猶服事殷}
