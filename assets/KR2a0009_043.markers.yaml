  - {type: variant, offset: 18, length: 0, content: '', WYG: 三隗囂傳囂音五髙反隗囂字季孟天水成紀人也成紀縣名故城在今秦州隴城縣西北少仕州郡王莽國師劉歆引囂為士王莽置國師位上公士其屬官也莽置九卿分屬三公每一卿置大夫三人一大夫置元士三人歆死囂歸鄉里季父崔素豪俠能得衆聞更始立而莽兵連敗於是乃與兄義及上邽人楊廣冀人周宗謀起兵應漢囂止之曰夫兵凶事也史記范蠡曰兵者凶器戰者逆徳宗族何辜崔不聴遂聚衆數千人攻平襄殺莽鎮戎大尹平襄縣名屬天水郡故城在今秦州伏羌縣西北王莽改天水郡曰鎮戎郡守曰大尹崔廣等以為舉事宜立主以一衆心咸謂囂素有名好經書遂共推為上將軍囂辭讓不得已曰諸父衆賢不量小子必能用囂言者乃敢從命衆皆曰諾囂既立遣使聘請平陵人方望以為軍師平陵縣名屬右扶風也望至説囂曰足下欲承天順民輔漢而起今立者乃在南陽王莽尚據長安雖欲以漢為名其實無所受命將何以見信於衆乎宜急立髙廟稱臣奉祠所謂神道設教求助人神者也易觀卦曰聖人神道設教而天下服矣且禮有損益質文無常削地開兆除地以開兆域茅茨土階以致其肅敬雖未備物神明其舎諸囂從其言遂立廟邑東祀髙祖太宗世宗囂等皆稱臣執事史奉璧而告史祝史也璧者所以祀神也祝畢有司穿坎于庭周禮司盟掌盟載之法也鄭𤣥注曰載盟辭也書其辭於策殺牲取血坎其牲加書於上而薶之牽馬操刀奉盤錯鍉遂割牲而盟臣賢按蕭該音引字詁鍉即題音徒啟反方言曰宋楚之間謂盎為題據下文云鍉不濡血明非盆盎之類前書匈奴傳云漢遣韓昌等與單于及大臣俱登諾水東山刑白馬單于以徑路刀金留犁撓酒應劭云留犂飯匕也撓攪也以匕攪血而㰱之今亦奉盤措匙而㰱也以此而言鍉即匙字錯置也音七故反曰凡我同盟三十一將十有六姓允承天道興輔劉宗如懷姦慮明神殛之殛誅也髙祖文皇武皇俾墜厥命厥宗受兵族類滅亡有司奉血鍉進䕶軍舉手揖諸將軍曰鍉不濡血㰱不入口是欺神明也厥罰如盟既而薶血加書一如古禮事畢移檄告郡國曰漢復元年七月己酉朔己巳上將軍隗囂白虎將軍隗崔左將軍隗義右將軍楊廣明威將軍王遵雲旗將軍周宗等告州牧部監郡卒正連率大尹尹尉隊大夫屬正屬令莽以周官王制之文置卒正連率大尹大尹職如太守屬令屬長職如都尉置州牧部監}
