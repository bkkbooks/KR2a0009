  - {type: variant, offset: 5797, length: 0, content: '', WYG: 之遂自刎頸死何休公羊傳云刎割也數月王元行廵周宗將蜀救兵五千餘人乗髙卒至鼓譟大呼曰百萬之衆方至漢軍大驚未及成陳元等決圍殊死戰遂得入城迎囂歸冀㑹吳漢等食盡退去於是安定北地天水隴西復反為囂九年春囂病且餓出城餐糗糒鄭康成注}
