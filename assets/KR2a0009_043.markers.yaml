  - {type: variant, offset: 5823, length: 3, content: 本事禮, WYG: 於是西土咸悦莫不歸心焉論曰昔趙佗自王番禺趙佗真定人因漢初天下未定自立為南越王畨禺縣屬南海郡故城在今廣州西南越志曰有畨山禺山因以為名公孫亦竊帝蜀漢推其無他功能而至於後亡者將以地邊處逺非王化}
