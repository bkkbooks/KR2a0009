  - {type: variant, offset: 5788, length: 0, content: '', WYG: 便於此時者也而王之將吏羣居穴處之徒穴處言所識不逺也人人抵掌説文抵側擊也戰國策曰蘇秦與李兌抵掌而談也欲為不善之計遵與孺卿日夜所爭害㡬及身者豈一事哉前計抑絶後策不從所以吟嘯㧖腕垂涕登車㧖持也史記云天下之士莫不㧖腕以言之幸䝉封拜得延論議遵為太中大夫在論議之職每及西州之事未嘗敢忘孺卿之言今車駕大衆已在道路吳耿驍將雲集四境而孺卿以奔離之卒拒要㧖當軍衝視其形埶何如哉夫智者覩危思變賢者泥而不滓在泥滯之中而不滓汚也是以功名終申策畫復得故夷吾束縛而相齊新序曰桓公與管仲鮑叔甯戚飲桓公謂鮑叔曰姑為寡人祝乎鮑叔奉酒而起祝曰吾君無忘出莒也使管子無忘束縛從魯也使甯戚無忘其飯牛於車下也黥布杖劒以歸漢黥布為楚淮南王髙祖使隨何説布乃杖劒歸漢王也去愚就義功名並著今孺卿當成敗之際遇嚴兵之鋒可為怖慄宜斷之心胷參之有識邯得書沈吟十餘日乃謝士衆歸命洛陽拜為太中大夫於是囂大將十三人屬縣十六衆十餘萬皆降王元入蜀求救囂將妻子奔西城從楊廣西城縣名屬漢陽郡一名始昌城在今秦州上邽縣西南而田弇李育保上邽詔告囂曰}
