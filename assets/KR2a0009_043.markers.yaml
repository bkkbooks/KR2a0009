  - {type: variant, offset: 2472, length: 314, content: 英馳遣官屬追之遂不肯還復使中傅贈送辭不受後數應三公命輒去建初初太尉牟融舉賢良方正再遷司空長史肅宗甚崇禮之遷五官中郎將每朝會帝常使虎賁扶侍及進拜恆目禮焉時有疾不會輒太官送醪膳恩寵有殊於是京師貴戚衞尉馬廖侍中竇憲慕其行各奉書致禮革無所報受帝聞而益善之後上書乞骸骨轉拜諫議大夫賜告歸因謝病稱篤元和中天子思革至行制詔齊相曰諫議大夫江革前以病歸今起居何如夫孝百行之冠衆善之始也國家每惟志士未嘗不及革縣以見穀千斛賜巨孝常以八月長吏存問致羊酒以終厥身如有不幸祠以中牢由是巨孝之稱行於天下及卒詔復賜穀千斛劉般字伯興宣帝之玄孫也宣帝封子囂於楚是為孝王孝王生思王衍衍生王紆紆生般自囂至般積累仁義世有名節而紆尤慈篤早失母同產弟原鄉侯平尚幼紆親自鞠養常, WYG: 遵遵乃}
