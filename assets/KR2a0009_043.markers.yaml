  - {type: variant, offset: 5805, length: 0, content: '', WYG: 與漢中諸將合兵并埶蜀人及其弟光以為不宜空國千里之外決成敗於一舉固爭之述乃止延岑田戎亦數請兵立功終疑不聴述性苛細察於小事敢誅殺而不見大體好改易郡縣官名然少為郎習漢家制度出入法駕法駕屬車三十六乗公卿不在鹵簿中侍中驂乗奉車都尉御前驅九斿雲䍐鳳皇闟㦸皮軒鑾旗旄騎旄頭之騎也陳置陛㦸然後輦出房闥又立其兩子為王食犍為廣漢各數縣羣臣多諫以為成敗未可知戎士暴露而遽王皇子示無大志傷戰士心述不聴唯公孫氏得任事由此大臣皆怨八年帝使諸將攻隗囂述遣李育將萬餘人救囂囂敗并沒其軍蜀地聞之恐動述懼欲安衆心成都郭外有秦時舊倉述改名白帝倉述以色尚白故改之自王莽以來常空述即詐使人言白帝倉出穀如山林百姓空市里往觀之述乃大㑹羣臣問曰白帝倉竟出穀乎皆對言無述曰訛言不可信道隗王破者復如此矣俄而囂將王元降述以為將軍明年使元與領軍環安拒河池河池今鳳州縣也又遣田戎及大司徒任滿南郡太守程汎將兵下江關破虜將軍馮駿等拔巫及夷陵夷道夷道縣名屬南郡故城在今硤州宜都縣西因據荆門荆門山名也在今硤州宜都縣西北今猶有故城基趾在山上十一年征南大將軍岑彭攻之滿等大敗述將王政斬滿首降于彭田戎走保江州江州縣名屬巴郡故城今渝州巴縣城邑皆開門降彭遂長驅至武陽武陽縣名故城在今眉州帝乃與述書陳言禍福以明丹青之信楊雄法言曰王者之言炳若丹青述省書歎息以示所親太常常少光祿勲張隆隆少皆勸降述曰廢興命也豈有降天子哉左右莫敢復言中郎將來歙急攻王元環安安使刺客殺歙述復令刺殺岑彭十二年述弟恢及子壻史興並為大司馬吳漢輔威將軍臧宫所破戰死自是將帥恐懼日夜離叛述雖誅滅其家}
