  - {type: variant, offset: 1976, length: 0, content: '', krp: 臣謹案前對言冬至日去極一百一十五度夏至日去極六十七度春秋分日去極九十一度洪範日月之行則有冬夏五紀論日月循黄道南至牽牛北至東井率日日行一度月行十三度十九分度七也今史官一以赤道為度不與日月行同其斗牽牛輿鬼赤道得十五而黄道得十三度半行東璧奎婁軫角亢赤道十度黄道八度或月行多而日月相去反少謂之日却案黄道値牽牛出赤道南二十五度其直東井輿鬼出赤道北五度赤道者為中天去極俱九十度非日月道而以摇凖度日月失其實行故也以今太史官候注考元和二年九月已来月行牽牛東井四十九事無行十一度者行婁角三十七事無行十五六度者如安言問典星待詔姚崇井畢等十二人皆曰星圖有規法日月實從黄道官無其器不知施行案甘露二年大司農中丞耿夀昌奏以圖儀度日月行考驗天運狀日月行至牽牛東井日過度月行十五度至婁角日行一度月行十三度赤道使然此前世所共知也如言黄道有驗合天日無前却弦朢不差一日比用赤道密近宜施用上中多臣校案逵論永元四年也至十五年七月甲辰詔書造太史黄道銅儀以角為十三度亢十氐十六房五心五尾十八箕十斗二十四四分度之一牽牛七須女十一虛十危十六營室十八東壁十奎十七婁十二胃十五昴十二畢十六觜三參八東井三十輿鬼四栁十四星七張十七翼十九軫十八凡三百六十五度四分度之一冬至日在斗十九度四分度之一史官以郭日月行參弦朢雖密近而不為注日儀黄道與度轉運難以候是以少循其事逵論曰又今史官推合朔弦朢月食加時率多不中在於不知月行遲疾意永平中詔書令故太史待詔張隆以四分法署弦朢月食加時隆言能用易九六七八支知月行多少今案隆所署多失臣使隆逆推前手所署不應或異日不中天乃益逺至十餘度梵統以史官候注考校月行當有遲疾不必在牽牛東井婁角之間又非所謂朓側匿乃由月所在道有逺近出入所生率一月移故所疾處三度九嵗九道一復凡九章百七十一嵗復十一月合朔旦冬至合春秋三統九道終數可以知合朔弦朢月食加時據官注天度為分率以其術法上考建武以来月食凡三十八事差密近有益宣課試上案史官舊有九道術廢而不修熹平中故治厯郎梁國宗整上九道術詔書下太史以參舊術相應部太子舎人馮恂課校恂亦復作九道術增損其分與整術並校差為近太史令颺上以恂術參弦朢然而加時猶復先後天逺則十餘度杜預長厯曰書稱朞三百六旬有六日以閏月定四時成嵗允釐百工庶績咸熙是以天子必置日官諸侯必置日御世修其業以考其術舉全數而言故曰六日其實五日四分之一日日行一度而月日行十三度十九分度之有畸日官當㑹集此之遲疾以考成晦朔錯綜以設閏月閏月無中氣而北斗邪指兩辰之間所以異於他月也積此以相通四時八節無違乃得成嵗其微密至矣得其精微以合天道事叙而不悖故傳曰閏以正時時以作事事以厚生生民之道}
  - {type: variant, offset: 1978, length: 1, content: 悉, WYG: 乎在然隂陽之運隨動而差差而不已遂與厯錯故仲尼丘明每於朔閏發文葢矯正得失因以宣明厯數也桓十七年日食得朔而史闕其日單書朔僖十五年日食而史闕朔與日故傳因其得失並起時史之謬兼以明其餘日食或厯失其正也莊二十五年經書六月辛未朔日有食之鼓用牲于社周之六月夏之四月所謂正陽之月也而時厯誤實是七月之朔非六月故傳云非常也唯正月之朔慝未作日有食之於是乎有用幣于社伐鼔於朝此非用幣伐鼔常月因變而起厯誤也文十五年經文皆同而更復發傳曰非禮明前傳欲以審正陽之月後傳發例欲以明諸侯之禮也此乃聖賢之微旨先儒所未喻也昭十七年夏六月日有食之而平子言非正陽之月以誣一朝近於指鹿為馬故傳曰不君君且因以明此月為得天正也劉子駿造三統厯以修春秋春秋日食有甲乙者三十四而三統厯唯一食厯術比諸家既最疎又六十餘嵗輒益一日凡嵗當累日為次而無故益之此不可行之甚者班固前代名儒而謂之最密非徒班固也自古以来諸論春秋者多述謬誤或造家術或用黄帝以来諸厯以推經傳朔日皆不得諧合日食於朔此乃天驗經傳又書其朔食可謂得天而劉賈諸儒説皆以為月二日或三日公違聖人明文其蔽在於守一元不與天消息也余感春秋之事嘗著厯論極言厯之通理其大指曰天行不息日月星辰各運其舍皆動物也物動則不一雖行度大量可得而限累日為月以新故相序不得不有毫毛之差此自然理也故春秋日有頻月而食者曠年不食者理不得一而算守恒數故厯無不有差失也始失於毫毛而尚未可覺積而成多以失弦朢朔晦則不得不改憲以從之書所謂欽若昊天歴象日月星辰易所謂治厯明時言尚順天以求合非為合以驗天者也推此論之春秋二百餘年其治厯變通多矣雖數術絶滅還尋經傳微旨大量可知時之違謬則經傳有驗學者固當曲循經傳月日日之食以考朔晦也以推時驗而皆不然各據其學以推春秋此無異度已之跡而欲削他人之足也余為厯論之後至咸寜中善算李修夏顯}
