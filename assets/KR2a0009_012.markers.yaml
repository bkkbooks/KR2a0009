  - {type: variant, offset: 5323, length: 354, content: 制皇女皆封縣公主儀服同列侯其尊崇者加號長公主儀服同蕃王諸王女皆封鄉亭公主儀服同鄉亭侯肅宗唯特封東平憲王蒼琅邪孝王京女為縣公主其後安帝桓帝妹亦封長公主同之皇女其皇女封公主者所生之子襲母封為列侯皆傳國於後鄉亭之封則不傳襲其職僚品秩事在百官志不足別載故附于后紀末皇女義王建武十五年封舞陽長公主適延陵鄉侯太僕梁松松坐誹謗誅皇女中禮十五年封涅陽公主適顯親侯大鴻臚竇固肅宗尊為長公主皇女紅夫十五年封館陶公主適駙馬都尉韓光光坐與淮陽王延謀反誅皇女禮劉十七年封淯陽公主適陽安侯長樂少府郭璜璜坐與竇憲謀反誅皇女綬二十一年封酈邑公主適新陽侯世子陰豐豐害主誅死皇女姬永平二年封獲嘉長公主適楊邑侯將作大匠馮柱皇女奴三年封平陽公主適大鴻臚馮順皇女迎三年封隆慮公主適牟平侯耿襲皇女次三年封平氏公主皇女致三年封沁水公主適高密侯鄧乾皇女小姬, WYG: 書卷}
