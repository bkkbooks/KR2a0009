  - {type: variant, offset: 1980, length: 0, content: '', WYG: 論體為術名乾度厯表上朝廷其術合日行四分之數而微增月行用三百嵗改憲之意二元相推七十餘嵗承以强弱强弱之差葢少而適足以逺通盈縮時尚書及史官以乾度與太史厯參校古今記注乾度厯殊勝今其術具存時又并考古今十厯以驗春秋知三統厯之最踈也今具列其時得失之數又據經傳微旨證據及失閏旨考日辰朔晦以相發明為經傳長厯諸經傳證據及失閏時文字謬誤皆甄發之雖未必其得天葢春秋當時之厯也學者覧焉永元十四年待詔太史霍融上言官漏刻率九日增減一刻不與天相應或時差至二刻半不如夏厯密詔書下太常令史官與融以儀校天課度逺近太史令舒承梵等對案官所施漏法令甲第六常符漏品}
