  - {type: variant, offset: 3901, length: 196, content: 祚焉明年山東義兵大起討董卓之亂卓乃置弘農王於閣上使郎中令李儒進酖曰服此藥可以辟惡王曰我無疾是欲殺我耳不肯飲強飲之不得已乃與妻唐姬及宮人飲讌別酒行王悲歌曰天道易兮我何薄棄萬乘兮退守蕃逆臣見迫兮命不延逝將去汝兮適幽玄因令唐姬起舞姬抗袖而歌曰皇天崩兮后土穨身為帝兮命夭摧死生路異兮從此乖柰我煢獨兮心中哀因泣下嗚咽坐者皆歔欷王謂姬曰卿王者妃埶不復為吏民妻自愛從此長辭遂飲藥而死時年十八唐姬潁川人也王薨, WYG: ''}
