  - {type: variant, offset: 905, length: 373, content: 卜兆得壽房又筮得坤之比遂以為貴人常特被引御從容辭於帝曰夫陽以博施為德陰以不專為義螽斯則百福之所由興也願陛下思雲雨之均澤識貫魚之次序使小妾得免罪謗之累由是帝加敬焉陽嘉元年春有司奏立長秋宮以乘氏侯商先帝外戚春秋之義娶先大國梁小貴人宜配天祚正位坤極帝從之乃於壽安殿立貴人為皇后后既少聰惠深覽前世得失雖以德進不敢有驕專之心每日月見讁輒降服求愆建康元年帝崩后無子美人虞氏子炳立是為沖帝尊后為皇太后太后臨朝沖帝尋崩復立質帝猶秉朝政時楊徐劇賊寇擾州郡西羌鮮卑及日南蠻夷攻城暴掠賦斂煩數官民困竭太后夙夜勤勞推心杖賢委任太尉李固等拔用忠良務崇節儉其貪叨罪慝多見誅廢分兵討伐羣寇消夷故海內肅然宗廟以寧而兄大將軍冀鴆殺質帝專權暴濫忌害忠良數以邪說疑誤太后遂立桓帝而誅李固太后又溺於宦官多所封寵以此天下失望和平元年春歸政於帝太后寢疾遂篤乃御輦幸宣德殿見宮省官屬及諸梁兄弟, WYG: 待}
