  - {type: variant, offset: 2726, length: 3, content: 后母卒, WYG: 史令修上言漢所作注不與見食相應者二事以同為異者二十九事尚書召榖城門候劉洪勑曰前郎中馮光司徒掾陳晃各訟厯故議郎蔡邕共補續其志今洪其詣修與漠相參推元謂分考校月食審己巳元密近有師法洪便從漢受不能對洪上言推元漢己巳元則考靈曜旃蒙之嵗乙夘元也與光晃甲寅元相經緯}
