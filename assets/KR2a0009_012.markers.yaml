  - {type: variant, offset: 3263, length: 336, content: 后及酆父子歸宋氏舊塋臯門亭帝後夢見桓帝怒曰宋皇后有何罪過而聽用邪孽使絕其命勃海王悝既已自貶又受誅斃今宋氏及悝自訴於天上帝震怒罪在難救夢殊明察帝既覺而恐以事問於羽林左監許永曰此何祥其可攘乎永對曰宋皇后親與陛下共承宗廟母臨萬國歷年已久海內蒙化過惡無聞而虛聽讒妬之說以致無辜之罪身嬰極誅禍及家族天下臣妾咸為怨痛勃海王悝桓帝母弟也處國奉藩未嘗有過陛下曾不證審遂伏其辜昔晉侯失刑亦夢大厲被髮屬地天道明察鬼神難誣宜并改葬以安冤魂反宋后之徙家復勃海之先封以消厥咎帝弗能用尋亦崩焉靈思何皇后諱某南陽宛人家本屠者以選入掖庭長七尺一寸生皇子辯養於史道人家號曰史侯拜后為貴人甚有寵幸性彊忌後宮莫不震懾光和三年立為皇后明年追號后父真為車騎將軍舞陽宣德侯因封后母興為舞陽君時王美人任娠畏后乃服藥欲除, WYG: ''}
