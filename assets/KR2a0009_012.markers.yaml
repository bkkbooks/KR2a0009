  - {type: variant, offset: 2678, length: 0, content: '', WYG: 謂允執其中今誠術未有差錯之謬恂術未有獨中之異以無驗改未失是以檢将来為是者也誠術百三十五月月二十三食其文在書籍學者所修施行日久官守其業經緯日月厚而未愆信於天文述而不作恂久在候部詳心善意能揆儀度定立術}
