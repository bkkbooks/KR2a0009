  - {type: variant, offset: 1717, length: 249, content: 又置虎賁羽林衛士起宮室分鉅鹿九縣為后湯沐邑在位三年元嘉二年崩以帝弟平原王石為喪主斂以東園畫梓壽器玉匣飯含之具禮儀制度比恭懷皇后使司徒持節大長秋奉弔祠賻錢四千萬布四萬匹中謁者僕射典護喪事侍御史護大駕鹵簿詔安平王豹河閒王建勃海王悝長社益陽二長公主與諸國侯三百里內者及中二千石二千石令長相皆會葬將作大匠復土繕廟合葬博陵桓帝懿獻梁皇后諱女瑩順烈皇后之女弟也帝初為蠡吾侯梁太后徵欲與后為婚未及嘉禮會質帝崩因以立帝明年有司奏太后曰春秋迎王后于紀在塗則稱后今大將軍冀女弟膺紹聖善結婚之際有命既集宜備禮章時進徵幣請, WYG: ''}
