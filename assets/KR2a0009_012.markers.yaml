  - {type: variant, offset: 2359, length: 0, content: '', WYG: 大夫千石六百石重行北靣議郎博士西靣戸曹令史當坐中而讀詔書公議蔡邕前坐侍中西北近公卿與光晃相難問是非焉議郎蔡邕議以為厯數精微去聖久逺得失更迭術術無常是以承秦厯用顓頊元用乙卯蔡邕命論曰顓頊厯術曰天元正月己巳朔旦立春俱以日月起於天廟營室五度今月令孟春之月日在營室百有二歳孝武皇帝始改正朔厯用太初元用丁丑行之百八十九歳孝章皇帝改從四分元用庚申今光晃各以庚申為非甲寅為是案厯法黄帝顓頊夏殷周魯凡六家各自有元光晃所據則殷厯元也他元雖不明於圖讖各家術皆當有效於其當時黄帝始用太初丁丑之元有六家紛錯爭訟是非太史令張夀王挾甲寅元以非漢厯雜候清臺課在下第卒以疏闊連見劾奏太初效驗無所漏失是則雖非圖讖之元而有效於前者也及用四分以来考之行度密於太初是}
