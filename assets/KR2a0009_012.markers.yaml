  - {type: variant, offset: 4142, length: 984, content: 賈詡知之以狀白獻帝帝聞感愴乃下詔迎姬置園中使侍中持節拜為弘農王妃初平元年二月葬弘農王於故中常侍趙忠成壙中謚曰懷王帝求母王美人兄斌斌將妻子詣長安賜第宅田業拜奉車都尉興平元年帝加元服有司奏立長秋宮詔曰朕稟受不弘遭值禍亂未能紹先以光故典皇母前薨未卜宅兆禮章有闕中心如結三歲之慼蓋不言吉且須其後於是有司乃奏追尊王美人為靈懷皇后改葬文昭陵儀比敬恭二陵使光祿大夫持節行司空事奉璽綬斌與河南尹駱業復土斌還遷執金吾封都亭侯食邑五百戶病卒贈前將軍印綬謁者監護喪事長子端襲爵獻帝伏皇后諱壽琅邪東武人大司徒湛之八世孫也父完沈深有大度襲爵不其侯尚桓帝女陽安公主為侍中初平元年從大駕西遷長安后時入掖庭為貴人興平二式立為皇后完遷執金吾帝尋而東歸李傕郭汜等追敗乘輿於曹陽帝乃潛夜度河走六宮皆步行出營后手持縑數匹董承使符節令孫徽以刃脅奪之殺傍侍者血濺后衣既至安邑御服穿敝唯以棗栗為糧建安元年拜完輔國將軍儀比三司完以政在曹操自嫌尊戚乃上印綬拜中散大夫尋遷屯騎校尉十四年卒子典嗣自帝都許守位而已宿衞兵莫非曹氏黨舊姻戚議郎趙彥嘗為帝陳言時策曹操惡而殺之其餘內外多見誅戮操後以事入見殿中帝不任其憤因曰君若能相輔則厚不爾幸垂恩相捨操失色俛仰求出舊儀三公領兵朝見令虎賁執刃挾之操出顧左右汗流浹背自後不敢復朝請董承女為貴人操誅承而求貴人殺之帝以貴人有累為請不能得后自是懷懼乃與父完書言曹操殘逼之狀令密圖之完不敢發至十九年事乃露泄操追大怒遂逼帝廢后假為策曰皇后壽得由卑賤登顯尊極自處椒房二紀于茲既無任姒徽音之美又乏謹身養己之福而陰懷妒害苞藏禍心弗可以承天命奉祖宗今使御史大夫郗慮持節策詔其上皇后璽綬退避中宮遷于它館嗚呼傷哉自壽取之未致于理為幸多焉又以尚書令華歆為郗慮副勒兵入宮收后閉戶藏壁中歆就牽后出時帝在外殿引慮於坐后被髮徒跣行泣過訣曰不能復相活邪帝曰我亦不知命在何時顧謂慮曰郗公天下寧有是邪遂將后下暴室以幽崩所生二皇子皆酖殺之后在位二十年兄弟及宗族死者百餘人母盈等十九人徙涿郡獻穆曹皇后諱節魏公曹操之中女也建安十八年操進三女憲節華為夫人聘以束帛玄纁五萬匹小者待年於國十九年並拜為貴人及伏皇后被弒明年立節為皇后魏受禪遣使求璽綬后怒不與如此數輩后乃呼使者入親數讓之以璽抵軒下因涕泣橫流曰天不祚爾左右皆莫能仰視后在位七年魏氏既立以后為山陽公夫人自後四十一年魏景初元元年薨合葬禪陵車服禮儀皆依漢制論曰漢世皇后無謚皆因帝謚, WYG: 意}
