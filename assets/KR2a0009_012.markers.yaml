  - {type: variant, offset: 2657, length: 0, content: '', WYG: 下不及命厯序獲麟漢相去四蔀年數與奏記譜注不相應當今厯正月癸亥朔光晃以為乙丑朔乙丑之與癸亥無題勒欵識可與衆共别者須以弦朢晦朔光魄虧滿可得而見者考其符驗而光晃厯以考靈曜二}
  - {type: variant, offset: 2657, length: 0, content: '', krp: 下不及命厯序獲麟漢相去四蔀年數與奏記譜注不相應當今厯正月癸亥朔光晃以為乙丑朔乙丑之與癸亥無題勒欵識可與衆共别者須以弦朢晦朔光魄虧滿可得而見者考其符驗而光晃厯以考靈曜二}
  - {type: variant, offset: 2658, length: 0, content: '', WYG: 八宿度數及冬至日所在與今史官甘石舊文錯異不可考校以今渾天圖儀檢天文亦不合於考靈曜光晃誠能自依其術更造望儀以追天度逺有驗於圖書近有效於三光可以易奪甘石窮服諸術者實宜用之難問光晃但言圖讖所言不服元和二年二}
  - {type: page-break, offset: 2658, content: '', id: KR2a0009_WYG_012-20a, image: WYG0252/WYG0252-0224a.png}
  - {type: variant, offset: 2658, length: 0, content: '', krp: 八宿度數及冬至日所在與今史官甘石舊文錯異不可考校以今渾天圖儀檢天文亦不合於考靈曜光晃誠能自依其術更造望儀以追天度逺有驗於圖書近有效於三光可以易奪甘石窮服諸術者實宜用之難問光晃但言圖讖所言不服元和二年二}
  - {type: variant, offset: 2659, length: 0, content: '', WYG: 甲寅制書曰朕聞古先聖王先天而天不違後天而奉天時史官用太初鄧平術冬至之日日在斗二十二度而厯以為牽牛中星先立春一日則四分數之立春也而以折獄斷大刑於氣已迕用望平和葢亦逺矣今改行四分以遵於堯以順孔聖奉天之文是始用四分厯庚申元之詔也深引河洛圖讖以為符驗非史官私意獨所興構而光晃以為固意造妄説違反經文謬之甚者昔堯命羲和厯象日月星辰舜叶時月正日湯武革命治厯明時可謂正矣且猶遇水遭旱戒以蠻夷猾夏宼賊姦宄而光晃以為隂陽不和姦臣盜賊皆元之咎誠非其理元和二年乃用庚申至今九十二歳而光晃言秦所用代周之元不知從秦来漢三易元不常庚申光晃區區信用所學亦妄虛無造欺語之愆至於改}
  - {type: page-break, offset: 2659, content: '', id: KR2a0009_WYG_012-20b, image: WYG0252/WYG0252-0224b.png}
  - {type: page-break, offset: 2659, content: '', id: KR2a0009_WYG_012-21a, image: WYG0252/WYG0252-0224c.png}
