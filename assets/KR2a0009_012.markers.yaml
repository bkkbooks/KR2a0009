  - {type: variant, offset: 168, length: 517, content: 顯及弟景耀晏並為卿校典禁兵延光元年更封顯長社縣侯食邑萬三千五百戶追尊后母宗為滎陽君顯景諸子年皆童齔並為黃門侍郎后寵既盛而兄弟頗與朝權后遂與大長秋江京中常侍樊豐等共譖皇太子保廢為濟陰王四年春后從帝幸章陵帝道疾崩於葉縣后顯兄弟及江京樊豐等謀曰今晏駕道次濟陰王在內邂逅公卿立之還為大害乃偽云帝疾甚徙御臥車行四日驅馳還宮明日詐遣司徒劉喜熹詣郊廟社稷告天請命其夕乃發喪尊后曰皇太后皇太后臨朝以顯為車騎將軍儀同三司太后欲久專國政貪立幼式與顯等定策禁中迎濟北惠王子北鄉侯懿立為皇帝顯忌大將軍耿寶位尊權重威行前朝乃風有司奏寶及其黨與中常樊豐虎賁中郎將謝惲惲弟侍中篤篤弟大將軍長史宓侍中周廣阿母野王君王聖聖女永永壻黃門侍郎樊嚴等更相阿黨互作威福探刺禁省更為唱和皆大不道豐惲廣皆下獄死家屬徙比景宓嚴減死髡鉗貶寶為則亭侯遣就國自殺王聖母子徙鴈門於是景為衞尉耀城門校尉晏執金吾兄弟權要威福自由少帝立二百餘日而疾篤顯兄弟及江京等皆在左右京引顯屏語曰北鄉侯病不解國嗣宜時有定前不用濟陰王今若立之後必當怨又何不早徵諸王子簡所置乎顯以為然及少帝薨京白太后徵濟北河閒王子未至而中黃門孫程合謀殺江京等立濟陰王是為順帝顯景晏及黨與皆伏誅遷太后於離宮家屬徙比景明年太后崩在位, WYG: ''}
