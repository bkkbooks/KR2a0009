  - {type: variant, offset: 2010, length: 104, content: 六月始入掖庭八月立為皇后時太后秉政而梁冀專朝故后獨得寵幸自下莫得進見后藉姊兄廕埶恣極奢靡宮幄彫麗服御珍華巧飾制度兼倍前世及皇太后崩恩愛稍衰后既無子潛懷怨忌每宮人孕育鮮得全者帝雖迫畏梁冀不敢譴怒然見御轉稀至延熹, WYG: 以来日變二十事案五行志章和元}
