  - {type: variant, offset: 2664, length: 5, content: 于南宮親饋, WYG: 𢎞益逺哉公卿結正足懲淺妄之徒詔書勿治亦深盍各之致太初厯推月食多失四分因太初法以河平癸巳為元施行五年永元元年天以七月後閏食術以八月其十二年正月十二日蒙公乗宗紺}
  - {type: variant, offset: 2664, length: 5, content: 于南宮親饋, krp: 𢎞益逺哉公卿結正足懲淺妄之徒詔書勿治亦深盍各之致太初厯推月食多失四分因太初法以河平癸巳為元施行五年永元元年天以七月後閏食術以八月其十二年正月十二日蒙公乗宗紺}
