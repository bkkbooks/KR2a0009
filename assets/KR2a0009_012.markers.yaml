  - {type: variant, offset: 1971, length: 0, content: '', WYG: 知厯者雜議訖十年四月無能分明據者至元和二年太初失天益逺日月宿度相覺浸多而候者皆知冬至之日日在斗二十一度未至牽牛五度而以為牽牛中星從天四分日之三晦朔弦朢差天一日宿差五度章帝知其謬錯以問史官雖知不合而不能易故召治厯編訢李梵等綜校其状蔡邕議云梵清河人二月甲寅遂下詔曰朕聞古先聖王先天而天不違後天而奉天時河圖曰赤九㑹昌十世以光十一以興又曰九名之世帝行徳封刻政朕以不徳奉承大業夙夜祗畏不敢荒寜予末小子託在於數終曷以續興崇𢎞祖宗拯濟元元尚書璇璣鈐曰述堯世放唐文帝命驗曰堯考徳顧期立象且三五步驟優劣殊軌况乎頑陋無以克堪雖欲從之末由也已每見圖書中心恧焉間者以来政治不得隂陽不和災異不息癘疫之氣流傷於牛農夲不播夫庶徴休咎五事之應咸在朕躬信有闕矣将何以補之書曰惟先假王正厥事又曰嵗二月東廵狩至岱宗柴望秩于山川遂覲東后叶時月正日祖堯岱宗同律度量考在璣衡以正厯象庶乎有益春秋保乾圖曰三百年斗厯改憲史官用太初鄧平術有餘分一在三百年之域行度轉差浸以謬錯璇璣不正文象不稽冬至之日日在斗二十二度而厯以為牽牛中星先立春一日則四分數之立春日也以折獄斷大刑於氣已迕用望平和厯時之義盖亦逺矣今改行四分以遵於堯以順孔聖奉天之文冀百君子越有民同心敬授獲咸喜以明予祖之遺功於是四分施行而訢梵猶以為元首十一月當先大欲以合耦弦朢命有常日而十九嵗不得七閏晦朔失實行之未期章帝復發聖思考之經讖使左中郎将賈逵問治厯者衛承李崇太尉屬梁鮪司徒嚴朂太子舍人徐震鉅鹿公乘蘇統及訢梵等十人以為月當先小據春秋經書朔不書晦者朔必有明晦不朔必在其月也即先大則一月再朔後月無朔是明不可必梵等以為當先大無文正驗取欲諧耦十六日月脁昬晦當滅而已又晦與合同時不得異日又上知訢梵宂見勑母拘厯已班天元始起之月當小定後年厯數遂正永元中復令史官以九道法候弦望驗無有差跌逵論集狀後之議者用得折衷故詳錄焉逵論曰太初厯冬至日在牽牛初者牽牛中星也古黄帝夏殷周魯冬至日在建星建星即今斗星也太初厯斗二十六度三百八十五分牽牛八度}
