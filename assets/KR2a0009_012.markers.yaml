  - {type: variant, offset: 2663, length: 0, content: '', WYG: 議者所能變易太尉耽司徒隗司空訓以邕議劾光晃不敬正鬼薪法詔書勿治罪臣昭曰不有君子其能國乎觀蔡邕之議可以言天機矣賢明在}
