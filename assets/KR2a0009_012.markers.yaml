  - {type: variant, offset: 2670, length: 2, content: 壽黃, WYG: 書言今月十六日月當食而厯以二月至期如紺言太史令廵上紺有益官用除待詔甲辰詔書以紺法署施行五十六嵗至本初元年天以十二月食厯以後年正月於是始差到熹平三年二十九年之中先厯食者十六事常山長史劉洪上作七曜術甲辰詔屬太史部郎中劉固舎人馮恂等課效復作八元術固等作月食術並已相參固術與七曜術同月食所失皆以嵗在己未當食四月恂術以三月官厯以五月太史上課到時施行中者丁巳詔書報可其四年紺孫誠上書言受紺法術當復改今年十二月當食而官厯以後年正月到期如言拜誠為舎人丙申詔書聽行誠法光和二年嵗在己未三月五月皆隂太史令修部舎人張恂等推計行度以為三月近四月逺誠以四月奏廢誠術施用恂術其三年誠兄整前後上書言去年三月不食當以四月史官廢誠正術用恂不正術整所上五屬太史太史主者終不自言三月近四月逺食當以見為正無逺近詔書下太常其詳案注記平議術之要效驗虛實太常就耽上選侍中韓説博士蔡較榖城}
