  - {type: variant, offset: 2003, length: 4, content: 如舊典建, WYG: 法有細觕以生兩科其歸一也日法者日之所行分也日垂令明行有常節日法所該通逺無已損益毫氂差以千里自此言之數無縁得有虧棄之意也今欲飾平之失斷法垂分恐傷大道以步日月行度終數不同四章更不得朔餘一雖言九道去課進退恐不足以補其闕且課厯之法晦朔變弦以月食天驗昭著莫大焉今以去六十三分之法為厯驗章}
