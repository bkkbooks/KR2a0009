  - {type: variant, offset: 2673, length: 4, content: 令董萌因, WYG: 候劉洪右郎中陳調於太常府覆校注記平議難問恂誠各對恂術以五千六百四十日有九百六十一食為法而除成分空加縣法推建武以来俱得三百二十七食其十五食錯案其官素注天見食九十八與兩術相應其錯辟二千一百誠術以百三十五月二十三食為法乗除成月從建康以上減四十一建康以来減三十五以其俱不食恂術改易舊法誠術中復減損論其長短無以相踰各引書緯自證文無義要取追天而已夫日月之術日循黄道月從九道以赤道儀曰冬至去極俱一百一十五度其入宿也赤道在斗二十一而黄道在斗十九兩儀相參日月之行曲直有差以生進退故月行井牛十四度以上其在角婁十二度以上皆不應率不行以是言之則術不差不改不驗不用天道精微度數難定術法多端厯紀非一未驗無以知其是未差無以知其失失然後改之是然後用之}
  - {type: page-break, offset: 2673, content: '', id: KR2a0009_WYG_012-23a, image: WYG0252/WYG0252-0225c.png}
