  - {type: variant, offset: 1971, length: 0, content: '', krp: 知厯者雜議訖十年四月無能分明據者至元和二年太初失天益逺日月宿度相覺浸多而候者皆知冬至之日日在斗二十一度未至牽牛五度而以為牽牛中星從天四分日之三晦朔弦朢差天一日宿差五度章帝知其謬錯以問史官雖知不合而不能易故召治厯編訢李梵等綜校其状蔡邕議云梵清河人二月甲寅遂下詔曰朕聞古先聖王先天而天不違後天而奉天時河圖曰赤九㑹昌十世以光十一以興又曰九名之世帝行徳封刻政朕以不徳奉承大業夙夜祗畏不敢荒寜予末小子託在於數終曷以續興崇𢎞祖宗拯濟元元尚書璇璣鈐曰述堯世放唐文帝命驗曰堯考徳顧期立象且三五步驟優劣殊軌况乎頑陋無以克堪雖欲從之末由也已每見圖書中心恧焉間者以来政治不得隂陽不和災異不息癘疫之氣流傷於牛農夲不播夫庶徴休咎五事之應咸在朕躬信有闕矣将何以補之書曰惟先假王正厥事又曰嵗二月東廵狩至岱宗柴望秩于山川遂覲東后叶時月正日祖堯岱宗同律度量考在璣衡以正厯象庶乎有益春秋保乾圖曰三百年斗厯改憲史官用太初鄧平術有餘分一在三百年之域行度轉差浸以謬錯璇璣不正文象不稽冬至之日日在斗二十二度而厯以為牽牛中星先立春一日則四分數之立春日也以折獄斷大刑於氣已迕用望平和厯時之義盖亦逺矣今改行四分以遵於堯以順孔聖奉天之文冀百君子越有民同心敬授獲咸喜以明予祖之遺功於是四分施行而訢梵猶以為元首十一月當先大欲以合耦弦朢命有常日而十九嵗不得七閏晦朔失實行之未期章帝復發聖思考之經讖使左中郎将賈逵問治厯者衛承李崇太尉屬梁鮪司徒嚴朂太子舍人徐震鉅鹿公乘蘇統及訢梵等十人以為月當先小據春秋經書朔不書晦者朔必有明晦不朔必在其月也即先大則一月再朔後月無朔是明不可必梵等以為當先大無文正驗取欲諧耦十六日月脁昬晦當滅而已又晦與合同時不得異日又上知訢梵宂見勑母拘厯已班天元始起之月當小定後年厯數遂正永元中復令史官以九道法候弦望驗無有差跌逵論集狀後之議者用得折衷故詳錄焉逵論曰太初厯冬至日在牽牛初者牽牛中星也古黄帝夏殷周魯冬至日在建星建星即今斗星也太初厯斗二十六度三百八十五分牽牛八度}
  - {type: variant, offset: 1972, length: 2, content: 禮儀, WYG: 行事史官注冬夏至日常不及太初厯五度冬至日在斗二十一度四分度之一石氏星經曰黄道規牽牛初直斗二十度去極二十五度於赤道斗二十一度也四分法與行事候注天度相應尚書考靈曜斗二十二度無餘分冬至在牽牛所起又編訢等據今日所在牽牛中星五度於斗二十一度四分一與考靈曜相近即以明事元和二年八月詔書曰石不可離令兩候上得算多者太史令元等候元和二年至永元元年五嵗中課日行及冬夏至斗一十一度四分一合古厯建星考靈曜日所起其星間距度皆如石氏故事他術以為冬至日在牽牛初者自此遂黜也逵論曰以太初厯考漢元盡太初元年日朔二十三事其十七得朔四得晦二得二日新厯七得朔十四得晦二得三日以太初厯考太初元年盡更始二年二十四事十得晦以新厯十六得朔七得二日一得晦以太初厯考建武元年盡永元元年二十三事五得朔十八得晦以新厯十七得朔三日晦三得二日又以新厯上考春秋中有日朔者二十四事失不中者二十三事天道參差不齊必有餘餘又有長短不可以等齊治厯者方以七十六嵗斷之則餘分稍長稍得一日故易金火相革之卦象曰君子以治厯明時又曰湯武革命順乎天應乎人言聖人必厯象日月星辰明數不可貫數千萬嵗其間必改更先距求度數取合日月星辰所在而已故求度數取合日月星辰有異世之術太初厯不能下通於今新厯不能上得漢元一家厯法必在三百年之間故讖文曰三百年斗厯改憲漢興當用太初而不改下至太初元年百二嵗乃改故其前有先晦一日合朔下至成哀以二日為朔故合朔多在晦此其明效也逵論曰臣前上傅安等用黄道度日月弦朢多近史官一以赤道度之不與日月同於今厯弦朢至差一日以上輒奏以為變至以為日却縮退行於黄道日得行度不為變願請太史官日月宿簿及星度課與待詔星象考校}
