  - {type: variant, offset: 1984, length: 0, content: '', krp: 三年十二月乙酉下建武十年二月壬午詔書施行漏刻以日長短為數率日南北二度四分而增減一刻一氣俱十五日日去極各有多少今官漏率九日移一刻不隨日進退夏厯漏隨日南北為長短密近於官漏分明可施行其年十一月甲寅詔曰告司徒司空漏所以節時分定昏明昏明長短起於日去極逺近日道周不可以計率分當據儀度下參晷景今官漏以計率分昏明九日增減一刻違失其實至為疏數以耦法太史待詔霍融上言不與天相應太常史官運儀下水官漏失天者至三刻以晷景為刻少所違失密近有驗今下晷景漏刻四十八箭立成斧官府當用者計吏到班子四十八箭文多故魁取二十四氣日所在并黄道去極晷景漏刻昏明中星刻于下昔太初厯之興也發謀於元封啓定於天鳯積百三十年是非乃審及用四分亦於建武施於元和訖於永元七十餘年然後儀式備立司侯有凖天事幽微若此其難也中興以来圖讖漏泄而考靈曜命厯序皆有甲寅元其所起在四分庚申元後百一十四歳朔差却二日學士修之於草澤信向以為得正及太初厯以後大為疾而修之者云百四十四歳而太歳超一表百七十一歳當棄朔餘六十三中餘千一百九十七乃可常行自太初元年至永平十一年百七十一當去分而不去故令益有疏闊此二家常挟其術庶幾施行每有訟者百寮㑹議羣儒騁思論之有方益於多聞識之故詳錄焉安帝延光二年中謁者亶誦言當用甲寅元河南梁豐言當復用太初尚書郎張衡周興皆能厯數難誦豐或不對或言失誤衡興參案儀注者考往校今以為九道法最密詔書下公卿詳議太尉愷等上侍中施延等議太初過天日一度弦朢失正月以晦見西方食不與天相應元和改從四分四分雖密於太初復不正皆不可用甲寅元與天相應合圖讖可施行博士黄廣大行令任僉議如九道河南尹祉太子舍人李𢎞寺四十人議即用甲寅元當除元命苞天地開闢獲麟中百一十四嵗推閏月六直其日或朔晦弦朢二十四氣宿度不相應者非一用九道為朔月有比三大二小皆疏逺元和變厯以應保乾圖三百嵗斗厯改憲之文四分厯夲起圖讖最得其正不宜易愷等八十四人議宜從太初尚書令忠上奏諸從太初者皆無他效驗徒以世宗攘夷廓境享國久長為辭或云孝章改四分災異率甚未有善應臣伏惟聖王興起各異正朔以通三統漢祖受命因秦之紀十月為年首閏常在嵗後不稽先代違於帝典太宗遵修三階以平黄龍以至刑犴以錯五者以備洪範庶徴曰雨曰暘曰燠曰寒曰風五者来備各以其叙哀平之際同承太初而妖孽累仍痾禍非一議者不以成數相參考眞求實而汎采妄説歸福太初致咎四分太初厯衆賢所立是非已定永平不審復革其弦朢四分有謬不可施行元和鳯鳥不當應厯而翔集逺嘉前造則喪其休近譏後改則隱其福漏見曲論未可為是臣輒復重難衡興以為五紀論推步行度當時比諸術為近然猶未稽於古及向子歆欲以合春秋横斷年數損夏益周考之表紀差謬數百兩厯相課六千一百五十六歳而太初多一日冬至日直斗而云在牽牛迂闊不可復用昭然如此史官所共見非獨衡興前以為九道密近今議者以為有闕及甲寅元復多違失皆未可取正昔仲尼順假馬之名以崇君之義况天之厯數不可任疑從虛以非易是上}
  - {type: variant, offset: 1985, length: 1, content: 后, WYG: 其言遂改厯事順帝漢安二年尚書侍郎邊韶上言世微於數虧道盛於得常數虧則物衰得常則國昌孝武皇帝攄發聖思因元封七年十一月甲子朔旦冬至乃詔太史令司馬遷治厯鄧平等更建太初改元易朔行夏之正乾鑿度八十分之四十三為日法設清臺之候驗六異課效觕密太初為最其後劉歆研幾極深驗之春秋參以易道以河圖帝覽嬉雒書甄曜度推廣九道百七十一嵗進退六十三分百四十四嵗一超次與天相應少有闕謬從太初至永平十一年百七十嵗進退餘分六十三治厯者不知處之推得十二度弦朢不效挾廢術者得竄其説至永和二年小終之數寖過餘分稍增月不用晦朔而先見孝章皇帝以保乾圖三百年斗厯改憲就用四分以太白復樞甲子為癸亥引天從算耦之目前更以庚申為元既無明文託之於獲麟之嵗又不與感精符單閼之嵗同史官相代因成習疑少能鉤深致逺案弦朢足以知之詔書下三公百官雜議太史令虞恭治厯宗訢等議建厯之本必先立元元正然後定日法法定然後度周天以定分至三者有程則厯可成也四分厯仲紀之元起於孝文皇帝後元三年嵗在庚辰上四十五嵗嵗在乙未則漢興元年也又上二百七十五嵗嵗在庚申則孔子獲麟二百七十六萬嵗尋之上行復得庚申嵗嵗相承從下尋上其執不誤此四分厯元明文圖讖所著也太初元年嵗在丁丑上極其元當在庚戍而曰丙子言百四十四嵗超一辰凡九百九十三超嵗有空行八十二周有奇乃得丙子案嵗所超於天元十一月甲子朔旦冬至日月俱超日行一度積三百六十五度四分度一而周天一匝名曰嵗嵗從一辰日不得空周天則嵗無由超辰案百七十嵗二蔀一章小餘六十三自然之數也夫數出於抄曶以成毫氂毫氂積累以成分寸兩儀既定日月始離初行生分積分成度日行一度一嵗而周}
