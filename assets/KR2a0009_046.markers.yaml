  - {type: 'tls:seg', offset: 828, content: '', id: KR2a0009_ZHSJ_046-d46p9s2}
  - {type: variant, offset: 830, length: 327, content: 初立擢自遠郡代牟融為司空帝以明德太后故尊崇舅氏馬廖兄弟並居職任廖等傾身交結冠蓋之士爭赴趣之倫以后族過盛欲令朝廷抑損其權上疏曰臣聞忠不隱諱直不避害不勝愚狷昧死自表書曰臣無作威作福其害于而家凶于而國傳曰大夫無境外之交束脩之饋近代光烈皇后雖友愛天至而卒使陰就歸國徙廢陰興賓客其後梁竇之家互有非法明帝即位竟多誅之自是洛中無復權戚書記請託一皆斷絕又譬諸外戚曰苦身待士不如為國戴盆望天事不兩施臣常刻著五臧書諸紳帶而今之議者復以馬氏為言竊聞衞尉廖以布三千匹城門校尉防以錢三百萬私贍三輔衣冠知與不知莫不畢給又聞臘日亦遺其在洛中者錢各五千越騎校尉光臘用羊三百頭米四百斛肉五千斤臣愚以為不應經義惶恐不敢不以聞陛下情欲厚之亦宜所以安之臣今言此誠欲上忠陛下下全后家裁蒙省察及馬防, WYG: 歆}
