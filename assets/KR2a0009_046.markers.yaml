  - {type: variant, offset: 116, length: 175, content: 能下倫始以營長詣郡尹鮮于襃襃見而異之署為吏後襃坐事左轉高唐令臨去握倫臂訣曰恨相知晚倫後為鄉嗇夫平傜賦理怨結得人歡心自以為久宦不達遂將家屬客河東變名姓自稱王伯齊載鹽往來太原上黨所過輒為糞除而去陌上號為道士親友故人莫知其處數年鮮于襃薦之於京兆尹閻興興即召倫為主簿時長安鑄錢多姦巧乃署倫為督鑄錢掾領長安巿倫平銓衡正斗斛巿無阿枉百姓悅服每讀詔書常歎息曰此聖主, WYG: 足定}
