  - {type: variant, offset: 826, length: 3, content: 七歲肅, WYG: 山東未知所寄以禹沉深有大度故授以西討之略乃拜為前將軍持節中分麾下精兵二萬人遣西入闗令自選偏裨以下可與俱者扵是以韓歆為軍師李文李春程慮為祭酒慮字或為憲字馮愔為積弩將軍樊崇為驍騎將軍}
