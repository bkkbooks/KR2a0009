  - {type: variant, offset: 4046, length: 245, content: 至見提拽常嘗以事怒郎藥崧以杖撞之崧走入牀下帝怒甚疾言曰郎出郎出崧曰天子穆穆諸侯煌煌未聞人君自起撞郎帝赦之朝廷莫不悚慄爭為嚴切以避誅責唯意獨敢諫爭數封還詔書臣下過失輒救解之會連有變異意復上疏曰伏惟陛下躬行孝道修明經術郊祀天地畏敬鬼神憂恤黎元勞心不怠而天氣未和日月不明水泉湧溢寒暑違節者咎在羣臣不能宣化理職而以苛刻為俗吏殺良人繼踵不絕百官無相親之心吏人無雍雍之志至於骨肉相殘毒害彌深感逆和氣以致天灾百姓可以德勝難以力服先王要道民用和睦故能致天下和平灾害不生禍亂不作鹿鳴之詩必言宴樂者以人神之心洽, WYG: ''}
