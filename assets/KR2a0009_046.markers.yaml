  - {type: variant, offset: 2223, length: 0, content: '', WYG: 侍御史持節護喪事中二千石修幕府冢上賜玉衣梓宫便房黄腸題湊輼輬車黄屋左纛輕車材官五校士以送葬也太后皆不聽但白蓋雙騎門生輓送白蓋車也後以帝師之重分西平之都鄉封廣徳弟甫徳為都鄉侯四年又封京子黄門侍郎珍為陽安侯邑三千五百户五年悝閶相繼竝卒皆遺言薄葬不受爵贈太后竝從之乃封悝子廣宗為葉侯閶子忠為西華侯自祖父禹教訓子孫皆遵法度深戒竇氏章帝竇皇后竇勲女祖穆及叔父俱尚主穆交通輕薄屬託郡縣干亂政化後竝坐怨望謀不軌被誅故鄧氏深引為誡也檢勑宗族闔門靜居闔閉也騭子侍中鳯甞}
