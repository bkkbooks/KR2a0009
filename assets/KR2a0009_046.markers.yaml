  - {type: variant, offset: 410, length: 399, content: 之邪倫對曰臣三娶妻皆無父少遭飢亂實不敢妄過人食帝大笑倫出有詔以為扶夷長未到官追拜會稽太守雖為二千石躬自斬芻養馬妻執炊爨受俸裁留一月糧餘皆賤貿與民之貧羸者會稽俗多淫祀好卜筮民常以牛祭神百姓財產以之困匱其自食牛肉而不以薦祠者發病且死先為牛鳴前後郡將莫敢禁倫到官移書屬縣曉告百姓其巫祝有依託鬼神詐怖愚民皆案論之有妄屠牛者吏輒行罰民初頗恐懼或祝詛妄言倫案之愈急後遂斷絕百姓以安永平五年坐法徵老小攀車叩馬嗁呼相隨日裁行數里不得前倫乃偽止亭舍陰乘船去衆知復追之及詣廷尉吏民上書守闕者千餘人是時顯宗方案梁松事亦多為松訟者帝患之詔公車諸為梁氏及會稽太守上書者勿復受會帝幸廷尉錄囚徒得免歸田里身自耕種不交通人物數歲拜為宕渠令顯拔鄉佐玄賀賀後為九江沛二郡守以清絜稱所在化行終於大司農倫在職四年遷蜀郡太守蜀地肥饒人吏富實掾史家貲多至千萬皆鮮車怒馬以財貨自達倫悉簡其豐贍者遣還之更選孤貧志行之人以處曹任於是爭賕抑絕文職修理, WYG: ''}
