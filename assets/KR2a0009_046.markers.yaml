  - {type: variant, offset: 2785, length: 2, content: 付子, WYG: 頸血濺大王矣秦王不懌為擊缶相如顧趙御史書曰某年某月秦王為趙王擊缶秦羣臣曰請以趙十五城為秦王夀相如曰請以秦咸陽為趙王夀竟酒不􅀎相加既罷歸國趙拜相如為上卿位在廉頗之上頗曰我有攻城野戰之功相如徒以口舌為勞而位居我上我見必厚辱之相如出望見廉頗輙引車避之舎人諌相如曰夫以秦王相如能廷吒之何畏廉将軍哉吾念彊秦不敢加兵於趙者盖以吾兩人也今兩虎鬭必不俱全吾所以先公家之急而後私讎也區區之趙尚有此義吾安可以忘之乎乃勑屬縣盛供具儲酒醪説文曰醪兼汁滓酒執金吾軍入界一人皆兼}
