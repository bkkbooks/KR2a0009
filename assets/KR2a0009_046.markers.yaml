  - {type: variant, offset: 2782, length: 2, content: 還將, WYG: 相當恂曰不然昔藺相如不畏秦王而屈於廉頗者爲國也史記曰秦王與趙王飲於澠池秦王請趙王鼓瑟秦御史書曰某年某月趙王為秦王鼓瑟藺相如前請秦王擊缶秦王怒不許相如曰五歩之内相如請得}
