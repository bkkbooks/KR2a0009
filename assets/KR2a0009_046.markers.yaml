  - {type: variant, offset: 1162, length: 0, content: '', krp: 鄧尋為建威將軍耿訢為赤眉將軍左于為軍師將軍引而西建武元年正月禹自箕關將入河東箕關在今王屋縣東河東都尉守關不開禹攻十日破之獲輜重千餘乗進圍安邑數月未䏻下更始大將軍樊參將數萬人度大陽欲攻禹大陽縣屬河東郡前書音義曰大河之陽春秋秦伯伐晉自茅津濟杜預云河東大陽縣也禹遣諸將逆撃於解南大破之斬參首解縣屬河東郡故城在今蒲州桑泉縣東南也於是王匡成丹劉均等合軍十餘萬復共擊禹禹軍不利樊崇戰死㑹日暮戰罷軍師韓歆及諸將見兵勢已摧皆勸禹夜去禹不聼眀日癸亥匡等以六甲窮日不出禹因得更理兵勒衆眀旦匡悉軍出攻禹禹令軍中無得妄動既至營下因傳發諸將鼓而並進大破之匡等皆棄軍亡走禹率輕騎急追獲劉均及河東太守楊寳持節中郎將弭彊皆斬之收得節六印綬五百兵器不可勝數遂定河東承制拜李文為河東太守悉更置屬縣令長以鎮撫之是月光武即位於鄗使使者持節拜禹為大司徒䇿曰制詔前將軍鄧禹深執忠孝與朕謀謨帷幄決勝千里髙祖曰運籌帷幄之中决勝千里之外吾不如子房孔子曰自吾有回門人日親史記曰顔回年二十九髪白早死孔子哭之慟曰自吾有回門人益親也斬將破軍平定山西功効尤著百姓不親五品不訓汝作司徒敬敷五教五教在寛五品五常也父義母慈兄友弟恭子孝言五常之教務在寛也今遣奉車都尉授印綬封為鄼侯食邑萬户敬之哉鄼縣今屬南陽郡故城在襄州穀城縣東北禹時年二十四遂渡汾隂河入夏陽更始中郎將左輔都尉公乗歙左輔即左馮翊也三輔皆有都尉引其衆十萬與左馮翊兵共拒禹扵衙衙縣名屬左馮翊解見安紀禹復破走之而赤眉遂入長安是時三輔連覆敗赤眉所過殘賊百姓不知所歸聞禹乗勝獨剋而師行有紀紀綱紀也言有條貫而不殘暴皆望風相攜負以迎軍降者日以千數衆號百萬禹所止輒停車住節住或作拄以勞来之父老童穉垂髮戴白垂髮童㓜也戴白父老也滿其車下莫不感恱扵是名震關西帝嘉之數賜書褒美諸將豪傑皆勸禹徑攻長安禹曰不然今吾衆雖多能戰者少前無可仰之積仰猶恃也音魚向反後無轉饋之資赤眉新拔長安財富充實鋒鋭未可}
  - {type: variant, offset: 1163, length: 1, content: 出, WYG: 也夫盗賊羣居無終日之計財穀雖多變故萬端寜䏻堅守者也上郡北地安定三郡土廣人稀饒穀多畜吾且休兵北道就糧養士以觀其弊乃可圖也於是引軍北至栒邑栒邑縣屬右扶風故城在今豳州三水縣東北栒音荀禹所到撃破赤眉别將諸營保郡邑皆開門歸附西河太守宗育遣子奉檄降禹遣詣京師京師謂洛陽也公羊傳曰天子所居曰京師帝以關中未定而禹久不進兵下勑曰司徒堯也亡賊桀也長安吏人遑遑無所依歸宜以時進討鎮慰西京繫百姓之心禹猶執前意乃分遣將軍别攻上郡諸縣更徴兵引穀歸至大要大要縣名屬北地郡遣馮愔宗歆守栒邑二人争權相攻愔遂殺歆因反擊禹禹遣使以聞帝劉攽曰案文遣使以聞即是白天子矣不須用帝字眀衍帝問使人愔所親愛為誰對曰護軍黄防帝度愔防不能久和勢必相忤因報禹曰縛馮愔者必黄防也乃遣尚書宗廣持節降之後月餘防果執愔將其衆歸罪更始諸將王匡胡殷成丹等皆詣廣降與共東歸至安邑道欲亡廣悉斬之愔至洛陽赦不誅二年春遣使者更封禹為梁侯食四縣時赤眉西走扶風禹乃南至長安軍昆眀池大饗士卒率諸將齋戒擇吉日修禮謁祠髙廟收十一帝神主遣使奉詣洛陽因循行園陵為置吏士奉守焉禹引兵與延岑戰於藍田不克復就穀雲陽漢中王劉嘉詣禹降嘉相李寳倨慢無禮禹斬之寳弟收寳部曲擊禹殺將軍耿訢自馮愔反後禹威稍損又乏食歸附者􅄐散而赤眉復還入長安禹與戰敗走至高陵軍士饑餓者皆食棗菜劉攽曰案文多一者字軍既饑餓例皆食棗菜若書者字則似有不餓者矣帝乃徴禹還勑曰赤眉無穀自當來東吾折箠笞之非諸將憂也無得復妄進兵禹慙於受任而功不遂數以饑卒徼戰輙不利三年春與車騎將軍鄧𢎞擊赤眉遂為所敗衆皆死散事在馮異傳獨與二十四騎還詣宜陽謝上大司徒梁侯印綬有詔歸侯印綬數月拜右將軍延岑自敗於東陽遂與秦豐合四年春復㓂順陽間遣禹護復漢將軍鄧曄輔漢將軍于匡擊破岑扵鄧追至武當復破之岑奔漢中餘黨悉降十三年天下平定諸功臣皆增户邑定封禹為髙密侯食髙密昌安夷安淳于四縣髙密國名今密州縣也昌安夷安並屬髙密國昌安故城在今密州安丘縣外城也夷安故城在今密州髙密縣外城也淳于縣名屬北海郡故城在今密州安丘縣東北也帝以禹功髙封弟寛為眀親侯其後左右將軍官罷續漢志曰前後左右将軍皆主}
