  - {type: variant, offset: 1225, length: 0, content: '', WYG: 官時年五十三吏人羌胡愛惜旦夕臨者日數千人戎俗父母死恥悲泣皆騎馬歌呼至聞訓卒莫不吼號或以刀自割又刺殺其犬馬牛羊曰鄧使君已死我曹亦俱死耳前烏桓吏士皆奔走道路訓前任烏桓校尉時吏士也至空城郭吏執不聼以状白校尉徐傿傿歎息曰此義也傿音於建反乃釋之遂家家為訓立祠每}
