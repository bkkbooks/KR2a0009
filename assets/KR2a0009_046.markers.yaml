  - {type: variant, offset: 3147, length: 597, content: 恩令種有持忠入地之恨會赦出卒於家鍾離意字子阿會稽山陰人也少為郡督郵時部縣亭長有受人酒禮者府下記案考之意封還記入言於太守曰春秋先內後外詩云刑於寡妻以御于家邦明政化之本由近及遠今宜先清府內且闊略遠縣細微之愆太守甚賢之遂任以縣事建武十四年會稽大疫死者萬數意獨身自隱親經給醫藥所部多蒙全濟舉孝廉再遷辟大司徒侯霸府詔部送徒詣河內時冬寒徒病不能行路過弘農意輒移屬縣使作徒衣縣不得已與之而上書言狀意亦具以聞光武得奏以見視霸曰君所使掾何乃仁於用心誠良吏也意遂於道解徒桎梏恣所欲過與剋期俱至無或違者還以病免後除瑕丘令吏有建者盜竊縣內意屏人問狀建叩頭服罪不忍加刑遣令長休建父聞之為建設酒謂曰吾聞無道之君以刃殘人有道之君以義行誅子罪命也遂令建進藥而死二十五年遷堂邑令縣人防廣為父報讎繫獄其母病死廣哭泣不食意憐傷之乃聽廣歸家使得殯斂丞掾皆爭意曰罪自我歸義不累下遂遣之廣斂母訖果還入獄意密以狀聞廣竟得以減死論顯宗即位徵為尚書時交阯太守張恢坐臧千金徵還伏法以資物簿入大司農詔班賜羣臣意得珠璣悉以委地而不拜賜帝怪而問其故對曰臣聞孔子忍渴於盜泉之水曾參回車於勝母之閭惡其名也此臧穢之寶誠不敢拜帝嗟歎曰清乎尚書之言乃更以庫錢三十萬賜意轉為尚書僕射車駕數幸廣成苑意以為從禽廢政常當車陳諫般樂遊田之事天子即時還宮永平三年夏旱而大起北宮意詣闕免冠上疏曰伏見陛下以天時小旱憂念元元降避正殿躬自克責而比日密雲遂無大潤豈政有未得應天心者邪昔, WYG: 徳企}
