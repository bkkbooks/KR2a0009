  - {type: variant, offset: 1222, length: 2, content: 孝恐, WYG: 數十人訓身為煑湯藥咸得平愈其無妻者為適配偶八年舞隂公主子梁扈有罪訓坐私與扈通書徴免歸閭里東觀記曰燕人思慕為之作歌也元和三年盧水胡反畔以訓為謁者乗傳到武威拜張掖太守章和二年護羌校尉張紆誘誅燒當種羌迷吾等由是諸羌大怒謀欲報怨朝廷憂之公卿舉訓代紆為校尉諸羌激忿遂相與觧仇結婚交質盟詛鄭𤣥注周禮云大事曰盟小事曰詛衆四萬餘人期氷合渡河攻訓先是小月氏胡分居塞内勝兵者二三千騎劉攽曰案前書皆但言勝兵若干此誤出者字皆勇健富彊每與羌戰常以少制多雖首施兩端首施猶首鼠也漢亦時收其用時迷吾子迷唐别與武威種羌合兵萬騎来至塞下未敢攻訓先欲脅月氏胡訓擁衛稽故令不得戰稽故謂稽留事故也東觀記稽故字作諸故也議者咸以羌胡相攻縣官之利以夷伐夷不宜禁護訓曰不然今張紆失信衆羌大動經常屯兵不下二萬轉運之費空竭府帑説文曰帑金帛所蔵音它莽反涼州吏人命縣絲髮原諸胡所以難得意者皆恩信不厚耳今因其廹急以徳懐之庶䏻有用遂令開城及所居園門悉驅羣胡妻子内之嚴兵守衞羌掠無所得掠劫奪也又不敢逼諸胡因即觧去由是湟中諸胡湟中月氏胡所居今鄯州湟水縣也皆言漢家常欲鬭我曹今鄧使君待我以恩信開門内我妻子乃得父母咸歡喜叩頭曰唯使君所命訓遂撫養其中少年勇者數百人以為義従羌胡俗恥病死每病臨困輙以刀自刺訓聞有困疾者輙拘持縛束不與兵刄使醫藥療之愈者非一小大莫不感悦於是賞賂諸羌種使相招誘迷唐伯父號迷吾乃將其母及種人八百户自塞外来降訓因發湟中秦胡羌兵四千人出塞掩擊迷唐於寫谷東觀記曰寫作鴈斬首虜六百餘人得馬牛羊萬餘頭迷唐乃去大小榆兩谷名也見西羌傳居頗巖谷衆悉破散其春復欲歸故地就田業訓乃發湟中六千人令長史任尚將之縫革為船置於箄上以渡河箄木筏也音歩佳反掩擊迷唐廬落大豪多所斬獲復追逐奔北㑹尚等夜為羌所攻於是義従羌胡并力破之斬首前後一千八百餘級獲生口二千人馬牛羊三萬餘頭一種殆盡一種謂迷唐也迷唐遂收其餘部逺徙廬落西行千餘里諸附落小種皆背畔之燒當豪帥東號稽顙歸死東號羌名餘皆款塞納質於是綏接歸附威信大行遂罷屯兵各令歸郡唯置弛刑徒二千餘人分以屯田為貧人耕種修理城郭塢壁而已永元二年大將軍竇憲將兵鎮武威憲以訓曉羌胡方略上求俱行訓初厚扵馬氏不為諸竇所親及憲誅故不離其禍離遭也訓雖寛中容衆而於閨門甚嚴兄弟莫不敬惮諸子進見未甞賜席接以温色四年冬病}
