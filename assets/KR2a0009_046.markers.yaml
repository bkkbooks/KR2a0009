  - {type: variant, offset: 6453, length: 482, content: 之無事然恐海內別有發其姦者故未敢時上帝怒罵曰吏持兩端促提下左右方引去朗曰願一言而死小臣不敢欺欲助國耳帝問曰誰與共為章對曰臣自知當必族滅不敢多樜染人誠冀陛下一覺悟而已臣見考囚在事者咸共言妖惡大故臣子所宜同疾今出之不如入之可無後責是以考一連十考十連百又公卿朝會陛下問以得失皆長跪言舊制大罪禍及九族陛下大恩裁止於身天下幸甚及其歸舍口雖不言而仰屋竊歎莫不知其多冤無敢啎陛下者臣今所陳誠死無悔帝意解詔遣朗出後二日車駕自幸洛陽獄錄囚徒理出千餘人後平忠死獄中朗乃自繫會赦免官復舉孝廉建初中肅宗大會羣臣朗前謝恩詔以朗納忠先帝拜為易長歲餘遷濟陽令以母喪去官百姓追思之章和元年上行東巡狩過濟陽三老吏人上書陳朗前政治狀帝至梁召見朗詔三府為辟首由是辟司徒府永元中再遷清河太守坐法免永初三年太尉張禹薦朗為博士徵詣公車會卒時年八十四論曰左丘明有言仁人之言其利博哉晏子一言齊侯省刑若鍾離意之就格請過寒朗之廷爭冤獄篤矣乎仁者之情也夫正直本於忠誠則不詭本於諫爭則絞切彼二子之所本得乎天故言信而志行也贊曰伯魚子阿矯急去苛臨官以絜匡帝以奢宋均達政禁此妖禜禽蟲畏德子民請病意明尊尊割恩蕃屏惵惵楚黎寒君為命, WYG: 證}
