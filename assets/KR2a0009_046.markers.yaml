  - {type: variant, offset: 1952, length: 1, content: 憲, WYG: 厲冀以端慤畏慎一心奉戴上全天恩下完性命刻骨定分有死無二終不敢横受爵土以增罪累惶窘征營昧死陳乞太后不聽騭頻上疏至扵五六乃許之其夏涼部畔羌揺蕩西州朝廷憂之於是詔騭將左右羽林北軍五校士及諸部兵撃之車駕幸平樂觀餞送騭西屯漢陽使征西校尉任尚従事中郎司馬鈞與羌戰大敗時以轉輸疲弊百姓苦役冬徴騭班師班還也朝廷以太后故遣五官中郎將迎拜騭為大將軍軍到河南使大鴻臚親迎中常侍齎牛酒郊勞王主以下候望於道既至大㑹羣臣賜束帛乗馬駟馬曰乗寵靈顯赫光震都鄙時遭元二之災臣賢案元二即元元也古書字當再讀者即扵止字之下為小二字言此字當兩度言之後人不曉遂讀為元二或同之陽九或附之百六良由不悟致斯乖舛今岐州石鼓銘凡重言者皆為二字眀驗也人士荒饑死者相望盗賊羣起四夷侵畔騭}
