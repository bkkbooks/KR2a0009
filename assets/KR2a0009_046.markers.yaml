  - {type: variant, offset: 2770, length: 1, content: 追, WYG: 未定而君侯以此時據大郡内得人心外破蘇茂威震鄰敵功名發聞此讒人側目怨禍之時也昔蕭何守關中悟鮑生之言而髙祖恱漢王與項羽相拒京索蕭何留守關中上數}
