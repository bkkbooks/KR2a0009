  - {type: variant, offset: 2239, length: 0, content: '', WYG: 庶人騭以不與謀但免特進遣就國宗族皆免官歸故郡沒入騭等貲財田宅徙鄧訪及家屬於逺郡郡縣逼迫廣宗及忠皆自殺又徙封騭為羅侯羅縣屬長沙國騭與子鳳竝不食而死騭従弟河南尹豹度遼將軍舞陽侯遵}
