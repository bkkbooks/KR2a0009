  - {type: variant, offset: 2243, length: 0, content: '', WYG: 暢皆自殺唯廣德兄弟以母閻后戚屬得留京師大司農朱寵痛騭無罪遇禍乃肉袒輿櫬櫬親身棺也上疏追訟騭曰伏惟和熹皇后聖善之徳為漢文母詩凱風曰母氏聖善文母文王之母太任也言太后有聖智之善比於文母也兄弟忠孝同心憂國宗廟有主王室是賴殤帝崩太后與騭定立安帝故曰是賴功成身退讓國遜位歷世外戚無與為比當享積善履謙之祐易曰積善之家必有餘慶又曰鬼神害盈而福謙而横為宫人單辭所陷利口傾險反亂國家罪無申證申眀白也獄不訊鞫訊問也鞫窮也遂令騭等罹此酷濫一門七人竝不以命七人謂騭従弟豹遵暢騭子鳳鳳従弟廣宗忠也屍骸流離怨魂不反逆天感人率土喪氣宜收還冢次寵樹遺孤奉承血祀以謝亡靈血祀謂祭廟殺牲取血以告神也寵知其言切自致廷尉詔免官歸田里衆庶多為騭稱枉帝意頗悟乃譴讓州郡以逼迫廣宗等故也還𦵏洛陽北芒舊塋公卿皆㑹喪莫不悲傷之詔遣使者祠以中牢諸從昆弟皆歸京師及順帝即位追感太后恩訓愍騭無辜乃詔宗正復故大將軍鄧騭宗親内外朝見皆如故事除騭兄弟子及門従十二人悉為郎中擢朱寵為太尉錄尚書事寵字仲威京兆人初辟騭府稍遷潁川太守治理有聲劉攽曰案他處無治理竝出者蓋本以理字代治後入誤兩存之及拜太尉封安鄉侯甚加優禮廣徳早}
