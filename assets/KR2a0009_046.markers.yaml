  - {type: variant, offset: 2811, length: 5, content: 太原遮險格, WYG: 萬物也好生帝王之於萬人也慈愛陛下統天理物為萬國覆作人父母先慈愛後威武先寛容後刑辟自生齒以上咸蒙徳澤大戴禮曰男子八月生齒女子七月生齒也而臣兄弟獨以無辜為專權之臣所見批抵説文曰抵側擊也批音片支反抵音之氏反青蠅之人所共搆㑹青蠅詩小雅曰營營青蠅止于樊愷悌君子無信讒言青蠅能汚白使黒汚黒使白喻佞人變亂善惡以臣婚姻王室謂臣將撫其背奪其位退其身受其埶於是遂作飛章以被扵臣欲使墜萬仞之阬踐必死之地令陛下忽參母之仁發投杼之怒史記曰昔曾參處費魯人有與曾參同姓名}
