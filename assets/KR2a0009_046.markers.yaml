  - {type: variant, offset: 2225, length: 3, content: 僕來歷, WYG: 后遂髠妻及鳳以謝天下稱之建光元年太后崩未及大歛帝復申前命封騭為上蔡侯位特進帝少號聰敏及長多不徳而乳母王聖見太后久不歸政慮有廢置常與中黄門李閏候伺左右及太后崩宫人先有受罰者懐怨恚因誣告悝𢎞閶先従尚書鄧訪取廢帝故事謀立平原王得和帝長子平原王勝無嗣鄧太后立樂安王寵子得為平原王帝聞追怒令有司奏悝}
