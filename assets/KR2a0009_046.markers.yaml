  - {type: variant, offset: 4335, length: 262, content: 誠亦以此故不得久留出為魯相後德陽殿成百官大會帝思意言謂公卿曰鍾離尚書若在此殿不立意視事五年以愛利為化人多殷富以久病卒官遺言上書陳升平之世難以急化宜少寬假帝感傷其意下詔嗟歎賜錢二十萬藥崧者河內人天性朴忠家貧為郎常獨直臺上無被枕食糟糠帝每夜入臺輒見崧問其故甚嘉之自此詔太官賜尚書以下朝夕餐給帷被皁袍及侍史二人崧官至南陽太守宋均字叔庠南陽安衆人也父伯建武初為五官中郎將均以父任為郎時年十五好經書每休沐日輒受業博士通詩禮善論難至二十餘調補辰陽長其俗少學者而信巫鬼均為立學校禁絕淫祀人皆安之以祖母喪去官客授潁川後為謁者會武陵蠻反圍武威, WYG: 廣阿注横野}
