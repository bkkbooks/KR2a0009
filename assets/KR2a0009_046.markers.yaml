  - {type: variant, offset: 2769, length: 0, content: '', WYG: 委公以河内堅守轉運給足軍糧率厲士馬防遏它兵勿令北度而已光武於是復北征燕代恂移書屬縣講兵肄射肄習也伐淇園之竹為矢百餘萬前書音義曰淇園衞之苑多竹篠也養馬二千匹收租肆百萬斛轉以給軍朱鮪聞光武北而河内孤使討難將軍蘇茂副將賈彊將兵三萬餘人度鞏河攻温鞏温並今洛州縣臨黄河故曰鞏河檄書至恂即勒軍馳出並移告屬縣發兵㑹於温下軍吏皆諫曰今洛陽兵度河前後不絶宜待衆軍畢集乃可出也恂曰温郡之藩蔽失温則郡不可守遂馳赴之旦日合戰而偏將軍馮異遣救及諸縣兵適至士馬四集幡旗蔽野恂乃令士卒乗城鼓噪大呼言曰劉公兵到蘇茂軍聞之陳動恂因奔擊大破之追至洛陽遂斬賈彊茂兵自投河死者數千生獲萬餘人恂與馮異過河而還自是洛陽震恐城門晝閉時光武傳聞朱鮪破河内有頃恂檄至大喜曰吾知寇子翼可任也諸將軍賀因上尊號於是即位時軍食急乏恂以輦車驪駕轉輸前後不絶前書音義曰驪駕併駕也輦車人挽行也尚書升斗以稟百官帝數策書勞問恂同門生茂陵董崇説恂曰上新即位四}
