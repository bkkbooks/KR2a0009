  - {type: variant, offset: 5052, length: 3, content: 為山娶, krp: 諸瑞皆同則知所謂元二}
  - {type: variant, offset: 5056, length: 357, content: 皆娶巫家勿擾良民於是遂絕永平元年遷東海相在郡五年坐法免官客授潁川而東海吏民思均恩化為之作歌詣闕乞還者數千人顯宗以其能七年徵拜尚書令每有駮議多合上旨均嘗刪翦疑事帝以為有姦大怒收郎縛格之諸尚書惶恐皆叩頭謝罪均顧厲色曰蓋忠臣執義無有二心若畏威失正均雖死不易志小黃門在傍入具以聞帝善其不撓即令貰郎遷均司隸校尉數月出為河內太守政化大行均常嘗寢病百姓耆老為禱請旦夕問起居其為民愛若此以疾上書乞免詔除子條為太子舍人均自扶輿詣闕謝恩帝使中黃門慰問因留養疾司徒缺帝以均才任宰相召入視其疾令兩騶扶之均拜謝曰天罰有罪所苦浸篤不復奉望帷幄因流涕而辭帝甚傷之召條扶侍均出賜錢三十萬均性寬和不喜文法常以為吏能弘厚雖貪汙放縱猶無所害至於苛察之人身或廉法而巧黠刻削毒加百姓災害流亡所由而作及在尚書恆欲叩頭爭之以時方嚴切故遂不敢陳帝後聞其言而追悲之, WYG: 謂}
