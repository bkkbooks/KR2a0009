  - {type: variant, offset: 1217, length: 0, content: '', WYG: 久臨朝政宗門盛滿數上書長樂宫諫争宜崇公室自損私權言甚切至太后不従康心懐畏懼永寜元年遂謝病不朝太后使内侍者問之時宫人出入多􅀎有所毁譽其中耆宿皆稱中大人所使者乃康家先婢亦自通中大人康聞詬之詬駡也音許遘反曰汝我家出亦敢爾邪婢怨恚還說康詐疾而言不遜太后大怒遂免康官遣歸國絶屬籍及従兄隲誅隲音質安帝徴康為侍中順帝立為太僕有方正稱名重朝廷以病免加位特進陽嘉三年卒謚曰義侯論曰夫變通之世君臣相擇家語孔子曰君擇臣而任之臣亦擇君而事之斯最作事謀始之㡬也㡬者事之㣲也易訟卦曰君子以作事謀始鄧公贏糧徒歩觸紛亂而赴光武方言曰贏擔可謂識所従㑹矣於是中分麾下之軍以臨山西之隙至使關河響動懐赴如歸功雖不遂而道亦𢎞矣及其威損栒邑兵散宜陽褫龍章扵終朝就侯服以卒嵗褫音直紙反又勑紙反龍章衮龍之服也謂禹為赤眉所敗上司徒印綬也易訟卦曰或錫之鞶帶終朝三褫之榮悴交而下無二色進退用而上無猜情使君臣之羙後世莫闚其間不亦君子之致為乎訓字平叔禹第六子也少有大志不好文學禹常非之顯宗即位初以為郎中訓樂施下士士大夫多歸之東觀記曰訓謙恕下士無貴賤見之如舊朋友子往来門内視之如子有過加鞭朴之教大醫皮巡従獵上林還暮宿殿門下寒疝病發時訓直事聞巡聲起往問之巡曰冀得火以熨背訓身至太官門為求火不得乃以口噓其背復呼同廬郎共更嘘至朝遂愈也永平中理虖沱石臼河従都慮至羊腸倉酈元水經注云汾陽故城積粟所在謂之羊腸倉在晉陽西北石隥縈委若羊腸焉故以為名今嵐州界羊腸阪是也石臼河觧見眀紀欲令通漕水運曰漕太原吏人苦役連年無成轉運所經三百八十九隘隘音乙賣反前後沒溺死者不可勝算建初三年拜訓謁者使監領其事訓考量隠括隠審量括之也孫卿子曰拘木必待隠括蒸揉然後直也拘音鉤謂曲者也知大功難立具以上言肅宗従之遂罷其役更用驢輦嵗省費億萬計全活徒士數千人㑹上谷太守任興欲誅赤沙烏桓怨恨謀反詔訓將黎陽營兵屯狐奴以防其變漢官儀曰中興以幽冀并州兵克定天下故於黎陽立營以謁者監之狐奴縣屬漁陽郡也訓撫接邊民為幽部所歸六年遷護烏桓校尉黎陽故人多攜將老幼樂随訓徙邊東觀記曰訓故吏最貧羸者舉國念訓常所服藥北州少乏又知訓好青泥封書従黎陽歩推鹿車於洛陽市藥還過趙國易陽并載青泥一襆至上谷遺訓其得人心如是鮮卑聞其威}
