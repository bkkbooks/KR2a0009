  - {type: variant, offset: 2369, length: 0, content: '', WYG: 貴盛驕奢或以攝位權重皆以盈極被誅也非徒豪横盈極自取災故必於貽釁後主以至顚敗者其數有可言焉後主謂嗣君也言外戚握權者當先帝時或容免禍必貽罪釁於嗣君以至傾覆數猶理也其致敗之理可得言焉何則恩非已結而權已先之言外戚之家承隆寵於先帝不結恩於後主故權勢先在其身也情疏禮重而枉性圖之圖謀也其人既居權要禮數不可不重故後主枉其本性與之圖謀政事非心所好也來寵方授地既害之後来寵者方欲授之要職而先代權臣見居其地必須除舊方得授新是地既害之也隙開勢謝讒亦勝之君臣有隙上}
