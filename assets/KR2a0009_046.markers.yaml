  - {type: variant, offset: 115, length: 0, content: '', WYG: 庸人屈起屈音求勿反志在財幣争用威力朝夕自快而已非有忠良眀智深慮逺圖欲尊主安民者也四方分崩離析形勢可見眀公雖建藩輔之功猶恐無所成立扵今之計莫如延攬英雄務恱民心立髙祖之業救萬民之命以公而慮天下}
