  - {type: variant, offset: 1176, length: 1, content: 貴, WYG: 後世法資用國邑不修産利帝益重之中元元年復行司徒事従東巡狩封岱宗顯宗即位以禹先帝元功拜為太傅進見東向甚見尊寵臣當北面尊如賔故令東向居嵗餘寝疾帝數自臨問以子男二人為郎永平元年年五十七薨諡曰元侯帝分禹封為三國長子震為髙密侯襲為昌安侯􅈿為夷安侯禹少子鴻好籌䇿永平中以為小侯引入與議邊事帝以為能拜將兵長史率五營士屯鴈門肅宗時為度遼將軍永元中與大將軍竇憲俱出擊匈奴有功徴行車騎將軍劉攽曰檢和帝紀有事字眀此少一事字也出塞追畔胡逄侯坐逗留下獄死髙密侯震卒子乾嗣乾尚顯宗女沁水公主永元十四年隂皇后巫蠱事發乾従兄奉以后舅被誅乾従坐國除元興元年和帝復封乾本國拜侍中乾卒子成嗣成卒子襃嗣襃尚安帝妺舞隂長公主桓帝時為少府襃卒長子某嗣少子昌襲母爵為舞隂侯拜黄門侍郎昌安侯襲嗣子藩亦尚顯宗女平臯長公主平臯縣名屬河内郡故城在今懐州武徳縣西和帝時為侍中夷安侯珍子康少有􅍾行兄良襲封無後永初六年紹封康為夷安侯時諸紹封者皆食故國半租康以皇太后}
