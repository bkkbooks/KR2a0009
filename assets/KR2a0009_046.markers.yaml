  - {type: variant, offset: 42, length: 0, content: '', WYG: 年十三能誦詩受業長安時光武亦㳺學京師禹年雖幼而見光武知非常人遂相親附數年歸家及漢兵起更始立豪傑多薦舉禹禹不肯従及聞光武安集河北即杖䇿北渡追及扵鄴光武見之甚歡謂曰我得専封拜生逺来寜欲仕乎禹曰不願也光武曰即如是何欲為劉攽曰案文多一為字不然當云欲何為禹曰但願眀公威徳加扵四海禹得效}
