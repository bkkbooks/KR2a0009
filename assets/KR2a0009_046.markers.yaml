  - {type: variant, offset: 2773, length: 1, content: 庶, WYG: 王暴衣露盖數勞苦君者有疑君心為君計者遣君子孫昆弟䏻勝兵者悉詣軍何従其計髙祖大悦今君所將皆宗族昆弟也無乃當以前人為鏡戒恂然其言稱疾不視事帝將攻洛陽先至河内恂求從軍帝曰河内未可離也數固請不聽乃遣兄子寇張姊子谷崇將突騎願為軍鋒帝善之皆以為偏將軍建武二年恂坐繫考上書者}
  - {type: variant, offset: 2773, length: 1, content: 庶, krp: 王暴衣露盖數勞苦君者有疑君心為君計者遣君子孫昆弟䏻勝兵者悉詣軍何従其計髙祖大悦今君所將皆宗族昆弟也無乃當以前人為鏡戒恂然其言稱疾不視事帝將攻洛陽先至河内恂求從軍帝曰河内未可離也數固請不聽乃遣兄子寇張姊子谷崇將突騎願為軍鋒帝善之皆以為偏將軍建武二年恂坐繫考上書者}
  - {type: variant, offset: 2775, length: 0, content: '', WYG: 是時潁川人嚴終趙敦聚衆萬餘與密人賈期連兵為寇恂免數月復拜潁川太守與破姦將軍侯進俱擊之數月斬期首郡中悉平定封恂雍奴侯邑萬户執金吾賈復在汝南部將殺人於潁川部將謂軍部之下小將也恂捕得繫獄時尚草創軍營犯法率多相容恂乃戮之於市復以為恥還過潁川謂左右曰吾與寇恂並列將帥而今為}
