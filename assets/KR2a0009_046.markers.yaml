  - {type: variant, offset: 824, length: 1, content: 視, WYG: 使别將騎與蓋延等撃銅馬扵清陽延等先至戰不利還保城為賊所圍禹遂進與戰破之生獲其大將従光武追賊至滿陽連大克獲北州略定及赤眉西入關更始使定國上公王匡襄邑王成丹抗威將軍劉均及諸將分據河東𢎞農以拒之赤眉衆大集王匡等莫能當光武籌赤眉必破長安欲乗釁幷關中而方有}
