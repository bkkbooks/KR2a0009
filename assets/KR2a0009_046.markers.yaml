  - {type: variant, offset: 1349, length: 465, content: 公值帝長者屢有善政乃上疏襃稱盛美因以勸成風德曰陛下即位躬天然之德體晏晏之姿以寬弘臨下出入四年前歲誅刺史二千石貪殘者六人斯皆明聖所鑒非羣下所及然詔書每下寬和而政急不解務存節儉而奢侈不止者咎在俗敝羣下不稱故也光武承王莽之餘頗以嚴猛為政後代因之遂成風化郡國所舉類多辨職俗吏殊未有寬博之選以應上求者也陳留令劉豫冠軍令駟協並以刻薄之姿臨人宰邑專念掠殺務為嚴苦吏民愁怨莫不疾之而今之議者反以為能違天心失經義誠不可不慎也非徒應坐豫協亦當宜譴舉者務進仁賢以任時政不過數人則風俗自化矣臣嘗讀書記知秦以酷急亡國又目見王莽亦以苛法自滅故勤勸懇懇實在於此又聞諸王主貴戚驕奢踰制京師尚然何以示遠故曰其身不正雖令不行從以身教者從以言教者訟夫陰陽和歲乃豐君臣同心化乃成也其刺史太守以下拜除京師及道出洛陽者宜皆召見可因博問四方兼以觀察其人諸上書言事有不合者可但報歸田里不宜過加喜怒以明在寬臣愚不足採及諸馬得罪歸國而竇氏始貴倫復上疏曰臣得以空虛之質當輔弼之任素性駑怯位尊爵重拘迫大義思自策厲雖遭百死不敢擇地又況親遇危言之世哉今承百王之敝人尚文巧咸趨邪路莫能守正伏見, WYG: 遷}
