  - {type: variant, offset: 5417, length: 419, content: 卒於家族子意意字伯志父京以大夏侯尚書教授至遼東太守意少傳父業顯宗時舉孝廉以召對合旨擢拜阿陽侯相建初中徵為尚書肅宗性寬仁而親親之恩篤故叔父濟南中山二王每數入朝特加恩寵及諸昆弟並留京師不遣就國意以為人臣有節不宜踰禮過恩乃上疏諫曰陛下至孝烝烝恩愛隆深以濟南王康中山王焉先帝昆弟特蒙禮寵聖情戀戀不忍遠離比年朝見久留京師崇以叔父之尊同之家人之禮車入殿門即席不拜分甘損膳賞賜優渥昔周公懷聖人之德有致太平之功然後王曰叔父加以錫幣今康焉幸以支庶享食大國陛下即位蠲除前過還所削黜衍食它縣男女少長並受爵邑恩寵踰制禮敬過度春秋之義諸父昆弟無所不臣所以尊尊卑卑彊幹弱枝者也陛下德業隆盛當為萬世典法不宜以私恩損上下之序失君臣之正又西平王羡等六王皆妻子成家官屬備其當早就蕃國為子孫基阯而室第相望久磐京邑婚姻之盛過於本朝僕馬之衆充塞城郭驕奢僭擬寵祿隆過今諸國之封並皆膏腴風氣平調道路夷近朝聘有期行來不難宜割情不忍以義斷恩發遣康焉各歸蕃國令羡等速就便時以塞衆望帝納之章和, WYG: ''}
