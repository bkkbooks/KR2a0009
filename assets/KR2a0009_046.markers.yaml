  - {type: variant, offset: 1948, length: 0, content: '', WYG: 躬天然之姿體仁聖之徳遭國不造仍離大憂造成也仍頻也大憂和帝殤帝崩開日月之眀運獨斷之慮援立皇統奉承太宗聖䇿定於神心休烈垂扵不朽本非臣等所􅀎萬一而猥推嘉羙竝享大封猥曲也伏聞詔書驚惶慙怖追觀前世傾覆之誡前代外戚上官安霍禹之屬皆被誅戮也退自惟念不寒而慄惟思也不寒而慄言恐懼也前書曰義縦為定襄太守郡}
