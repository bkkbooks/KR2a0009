  - {type: variant, offset: 1162, length: 0, content: '', WYG: 鄧尋為建威將軍耿訢為赤眉將軍左于為軍師將軍引而西建武元年正月禹自箕關將入河東箕關在今王屋縣東河東都尉守關不開禹攻十日破之獲輜重千餘乗進圍安邑數月未䏻下更始大將軍樊參將數萬人度大陽欲攻禹大陽縣屬河東郡前書音義曰大河之陽春秋秦伯伐晉自茅津濟杜預云河東大陽縣也禹遣諸將逆撃於解南大破之斬參首解縣屬河東郡故城在今蒲州桑泉縣東南也於是王匡成丹劉均等合軍十餘萬復共擊禹禹軍不利樊崇戰死㑹日暮戰罷軍師韓歆及諸將見兵勢已摧皆勸禹夜去禹不聼眀日癸亥匡等以六甲窮日不出禹因得更理兵勒衆眀旦匡悉軍出攻禹禹令軍中無得妄動既至營下因傳發諸將鼓而並進大破之匡等皆棄軍亡走禹率輕騎急追獲劉均及河東太守楊寳持節中郎將弭彊皆斬之收得節六印綬五百兵器不可勝數遂定河東承制拜李文為河東太守悉更置屬縣令長以鎮撫之是月光武即位於鄗使使者持節拜禹為大司徒䇿曰制詔前將軍鄧禹深執忠孝與朕謀謨帷幄決勝千里髙祖曰運籌帷幄之中决勝千里之外吾不如子房孔子曰自吾有回門人日親史記曰顔回年二十九髪白早死孔子哭之慟曰自吾有回門人益親也斬將破軍平定山西功効尤著百姓不親五品不訓汝作司徒敬敷五教五教在寛五品五常也父義母慈兄友弟恭子孝言五常之教務在寛也今遣奉車都尉授印綬封為鄼侯食邑萬户敬之哉鄼縣今屬南陽郡故城在襄州穀城縣東北禹時年二十四遂渡汾隂河入夏陽更始中郎將左輔都尉公乗歙左輔即左馮翊也三輔皆有都尉引其衆十萬與左馮翊兵共拒禹扵衙衙縣名屬左馮翊解見安紀禹復破走之而赤眉遂入長安是時三輔連覆敗赤眉所過殘賊百姓不知所歸聞禹乗勝獨剋而師行有紀紀綱紀也言有條貫而不殘暴皆望風相攜負以迎軍降者日以千數衆號百萬禹所止輒停車住節住或作拄以勞来之父老童穉垂髮戴白垂髮童㓜也戴白父老也滿其車下莫不感恱扵是名震關西帝嘉之數賜書褒美諸將豪傑皆勸禹徑攻長安禹曰不然今吾衆雖多能戰者少前無可仰之積仰猶恃也音魚向反後無轉饋之資赤眉新拔長安財富充實鋒鋭未可}
