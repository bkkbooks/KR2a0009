  - {type: variant, offset: 2800, length: 1, content: 斌, krp: 並坐極歡遂共車同出結友而去恂歸潁川東觀記曰郡中政理盗賊不入三年遣使者即拜為汝南太守即就也又使驃騎}
  - {type: variant, offset: 2802, length: 4, content: 俠客晨夜, WYG: 軍杜茂將兵助恂討盗賊盗賊清靜郡中無事恂素好學乃脩鄉校教生徒聘能為左氏春秋者親受學焉七年代朱浮為執金吾眀年從車駕擊隗囂而潁川盗賊羣起帝乃引軍還謂恂曰潁川迫近京師當以時定惟念獨卿能平之耳従九卿復出以憂國可知也恂對曰潁川剽輕聞陛下逺踰阻險有事隴蜀故狂狡乗間相詿誤耳狡猾也説文曰詿亦誤也音挂如聞乗輿南向賊必惶怖歸死臣願執銳前驅即日車駕南征恂從至潁川盗賊悉降而竟不拜郡百姓遮道曰願従陛下復借寇君一年恂前為潁川太守故曰復借也乃留恂長社鎮撫吏人受納餘降初隗囂將安定髙峻擁兵萬人據髙平第一髙平縣屬安定郡續漢志曰髙平有第一城也帝使待詔馬援招降峻由是河西道開中郎將来歙承制拜峻通路將軍封關内侯後屬大司馬呉漢共圍囂扵冀及漢軍退峻亡歸故營復助囂拒隴阺及囂死峻據髙平畏誅堅守建威大將軍耿弇率太中大夫竇士武威太守梁統等圍之一嵗不拔十年帝入關將自征之恂時従駕諫曰長安道里居中應接近便従洛陽至髙平長安為中安定隴西必懐震懼此從容一處可以制四方也今士馬疲倦方履險阻非萬乗之固前年潁川可為至戒帝不従進軍及汧汧縣屬扶風故城在今隴州汧源縣南也峻猶不下帝議遣使降之乃謂恂曰卿前止吾此舉今為吾行也若峻不即降引耿弇等五營擊之恂奉璽書至第一峻遣軍師皇甫文出謁辭禮不屈恂怒將誅文諸將諌曰髙峻精兵萬人率多彊弩西遮隴道連年不下今欲降之而反戮其使無乃不可乎恂不應遂斬之遣其副歸告峻曰軍師無禮已戮之矣欲降急降不欲固守峻惶恐即日開城門降諸將皆賀因曰敢問殺其使而降其城何也恂曰皇甫文峻之腹心其所取計者也今来辭意不屈必無降心全之則文得其計殺之則峻亡其膽是以降耳諸將皆曰非所及也遂傳峻還洛陽恂經眀行修名重朝廷所得秩奉厚施朋友故人及従吏士常曰吾因士大夫以致此其可獨享之乎時人歸其長者以為有宰相噐十二年卒諡曰威侯子損嗣恂同産弟及兄子姊子以軍功封列侯者凡八人終其身不傳於後初所與謀閔業者恂數為帝言其忠賜爵闗内侯官至遼西太守十三年復封損庶兄夀為洨侯洨縣屬沛郡洨音故交反後徙封損扶桞侯扶栁縣屬信都郡故城在今冀州信都縣西也損卒子釐嗣徙封商鄉侯釐卒子襲嗣恂女孫為大將軍鄧騭夫人由是寇氏得志於永初間安帝永初元年鄧太后臨朝故得志也恂曾孫榮論曰傳稱喜怒以類者鮮矣左傳曰晉范武子㑹將老召其子文子曰吾聞之喜怒以類者鮮矣而易者實多也夫喜而不比怒而思難者其惟君子乎子曰伯夷叔齊不念舊惡怨是用希於寇公而見之矣論語孔子之言榮少知名桓帝時為侍中性矜絜自貴扵人少所與與黨與也以此見害於權寵而從兄子尚帝妹益陽長公主帝又聘其從孫女於後宫左右益惡之延熹中遂陷以罪辟與宗族免歸故郡吏承望風旨持之浸急榮恐不免奔闕自訟未至刺史張敬}
