  - {type: variant, offset: 6633, length: 878, content: 文無義要取追天而已夫日月之術日循黃道月從九道以赤道儀日冬至去極俱一百一十五度其入宿也赤道在斗中十一而黃道在斗十九兩儀相參日月之行曲直有差以生進退故月行井牛十四度以上其在角婁十二度以上皆不應率不行以是言之則術不差不改不驗不用天道精微度數難定術法多端曆紀非一未驗無以知其是未差無以知其失失然後改之是然後用之此謂允執其中今誠術未有差錯之謬恂術未有獨中之異以無驗改未失是以檢將來為是者也誠術百三十五月月二十三食其文在書籍學者所修施行日久官守其業經緯日月厚而未愆信於天文述而不作恂久在候部詳心善意能揆儀度定立術數推前校往亦與見食相應然協曆正紀欽若昊天宜率舊章如甲辰丙申詔書以見食為比今宜施用誠術棄放恂術史官課之後有效驗乃行其法以審術數以順改易耽以說等議奏聞詔書可恂整誠各復上書恂言不當施誠術整言不當復棄恂術為洪議所侵事下永安臺覆實皆不如恂誠等言劾奏謾欺詔書報恂誠各以二月奉贖罪整適作左校二月遂用洪等施行誠術光和二年萬年公乘王漢上月食注自章和元年到今年凡九十三歲合百九十六食與官曆河平元年月錯以己巳為元事下太史令修上言漢所作注不與見食相應者二事以同為異者二十九事尚書召穀城門候劉洪勑曰前郎中馮光司徒掾陳晃各訟曆故議郎蔡邕共補續其志今洪其詣修與漢相參推元謂課分考校月食審己巳元密近有師法洪便從漢受不能對洪上言推元漢己巳元則考靈曜旃蒙之歲乙卯元也與光晃甲寅元相經緯於以追天作曆校三光之步今為疏闊孔子緯一事見二端者明曆興廢隨天為節甲寅曆於孔子時效己巳顓頊秦所施用漢興草創因而不易至元封中迂闊不審更用太初應期三百改憲之節甲寅己巳讖雖有文略其年數是以學人各傳所聞至於課校罔得厥正夫甲寅元天正正月甲子朔旦冬至七曜之起始於牛初乙卯之元人正己巳朔旦立春三光聚天廟五度課兩元端閏餘差自百五十二分二之三朔三百四中節之餘二十九以效信難聚漢不解說但言先人有書而已以漢成注參官施行術不同二十九事不中見食二事案漢習書見己巳元謂朝不聞不知聖人獨有興廢之義史官有附天密術甲寅己巳前已施行效後格而已不用河平疏闊史官已廢之而漢以去事分爭殆非其意雖有師法與無同課又不近密其說蔀數術家所共知無所采取遣漢歸鄉里, WYG: ''}
