  - {type: variant, offset: 118, length: 4, content: 未遑考正, WYG: 策延年案劒有敢沮大議皆以軍法從之坐者震動前書昭帝崩霍光迎立昌邑王賀即位二十七日行淫亂光召丞相已下會議莫敢發言田延年前離席案劒曰羣臣有後應者請斬之尚書盧植獨曰昔太甲旣立不明太甲湯孫太丁子也尚書曰太甲既立不明伊尹放諸桐宫也昌邑罪過千餘故有廢立之事昌邑王凡所徴發一千一百二十七事今上富於春秋行無失徳非前事之比也卓大怒罷坐明日復集羣僚於崇徳前殿遂脅太后策廢少帝曰皇帝在喪無人子之心威儀不類人君今廢為𢎞農王乃立陳留王是為獻帝又議太后靈帝何皇后䠞迫永樂太后孝仁董皇后靈帝之母}
  - {type: page-break, offset: 118, content: '', id: KR2a0009_WYG_102-7a, image: WYG0253/WYG0253-0421a.png}
  - {type: variant, offset: 118, length: 4, content: 未遑考正, krp: 策延年案劒有敢沮大議皆以軍法從之坐者震動前書昭帝崩霍光迎立昌邑王賀即位二十七日行淫亂光召丞相已下會議莫敢發言田延年前離席案劒曰羣臣有後應者請斬之尚書盧植獨曰昔太甲旣立不明太甲湯孫太丁子也尚書曰太甲既立不明伊尹放諸桐宫也昌邑罪過千餘故有廢立之事昌邑王凡所徴發一千一百二十七事今上富於春秋行無失徳非前事之比也卓大怒罷坐明日復集羣僚於崇徳前殿遂脅太后策廢少帝曰皇帝在喪無人子之心威儀不類人君今廢為𢎞農王乃立陳留王是為獻帝又議太后靈帝何皇后䠞迫永樂太后孝仁董皇后靈帝之母}
