  - {type: variant, offset: 320, length: 0, content: '', WYG: 帝疾新愈大會未央殿卓朝服升車既而馬驚墮泥還入更衣其少妻止之卓不從遂行乃陳兵夾道自壘及宫左歩右騎屯衛周帀令呂布等扞衛前後王允乃與士孫瑞密表其事使瑞自書詔以授布令騎都尉李肅獻帝紀曰肅呂布同郡人也與布同心勇士十餘人偽著衛士服於北掖門内以待卓卓将至馬驚不行怪懼欲還呂布勸令進遂入門肅以㦸刺之𠂻甲不入傷臂墮車顧大呼曰呂布何在布曰有詔討賊臣卓大罵曰庸狗敢如是邪布應聲持矛刺卓趣兵斬之趣音促九州春秋曰布素使秦誼陳衛李黒等偽作宫門衛士持長㦸俠义卓車或义其馬卓驚呼布布素施鎧於衣中持矛即應聲刺卓墜於車主簿田儀九州春秋儀字作景及卓蒼頭前赴其尸布又殺之馳齎赦書以令宫陛内外士卒皆稱萬歲百姓歌舞於道長安中士女賣其珠玉衣装市酒肉相慶者塡滿街肆使皇甫嵩攻卓弟旻於郿塢殺其母妻男女盡滅其族英雄記曰卓母年九十走至塢門曰乞脫我死即時斬首乃尸卓於市天時始熱卓素充肥脂流於地守尸吏然火置卓臍中光明達曙如是積日諸袁門生又聚董氏之尸焚灰揚之於路塢中珍藏有金二三萬斤銀八九萬斤錦綺繢縠紈素竒玩積如丘山初卓以牛輔子壻素所親信使以兵屯陜輔分遣其校尉李傕郭汜張濟英雄記傕北地人劉艾獻帝紀曰傕字稚然汜張掖人將歩騎數萬擊破河南尹朱儁於中牟因掠陳留潁川諸縣殺略男女所過}
