  - {type: variant, offset: 9, length: 12, content: 賈逵論曆永元論曆延光論曆, WYG: 盡與豪帥相結後歸耕於野諸豪帥有來從之者卓爲殺耕牛與共宴樂豪帥感其意歸相斂得雜畜千餘頭以遺之由是以健俠知名爲州兵馬掾常徼守塞下說文曰徼巡也前書曰中尉巡徼京師音義曰所謂遊徼備盗賊卓膂力過人雙帶兩鞬左右馳射方言曰所以藏箭謂之服藏弓謂之鞬左氏傳云右屬櫜鞬爲羌胡所畏桓帝末以六郡良家子爲羽林郎從中郎將張奐爲軍司馬共擊}
