  - {type: variant, offset: 160, length: 0, content: '', WYG: 斬一青綬乃整齊耳布等惡之宣言相警云賊至軍衆大亂奔走堅追擊之軫布敗走卓遣将李傕詣堅求和堅拒絶不受進軍大谷距洛九十里大谷口在故嵩陽西北八}
