  - {type: variant, offset: 1735, length: 0, content: '', WYG: 制所作並無足觀也乃謂諸將曰天子當與天下共之朝廷自有公卿大臣楊當出扞外難何事京師遂還野王楊奉亦出屯梁乃以張楊為大司馬楊奉為車騎將軍韓暹為大將軍領司隸校尉皆假節鉞暹與董承並留宿衛暹矜功恣睢恣睢自任用之貎睢音火季反干亂政事董承患之潛召兗州牧曹操操乃詣闕貢獻稟公卿以下因奏韓暹張楊之罪暹懼誅單騎奔楊奉帝以暹楊有翼車駕之功詔一切勿問於是封衛將軍董承輔國將軍伏完等十餘人為列侯贈沮儁為𢎞農太守袁宏紀曰誅議郎侯祈尚書馮碩侍中壺崇討有罪也封衛將軍董承輔國將軍伏完侍中丁冲种輯尚書僕射鍾繇尚書郭溥御史中丞董芬彭城相劉艾馮翊韓斌東郡太守楊衆議郎羅邵伏徳趙蕤為列侯賞有功也贈射聲校尉沮儁為𢎞農太守旌死節也曹操以洛陽殘荒遂移帝幸許楊奉韓暹欲要遮車駕}
  - {type: page-break, offset: 1735, content: '', id: KR2a0009_WYG_102-24b, image: WYG0253/WYG0253-0429d.png}
  - {type: page-break, offset: 1735, content: '', id: KR2a0009_WYG_102-25a, image: WYG0253/WYG0253-0430a.png}
  - {type: variant, offset: 1735, length: 0, content: '', krp: 制所作並無足觀也乃謂諸將曰天子當與天下共之朝廷自有公卿大臣楊當出扞外難何事京師遂還野王楊奉亦出屯梁乃以張楊為大司馬楊奉為車騎將軍韓暹為大將軍領司隸校尉皆假節鉞暹與董承並留宿衛暹矜功恣睢恣睢自任用之貎睢音火季反干亂政事董承患之潛召兗州牧曹操操乃詣闕貢獻稟公卿以下因奏韓暹張楊之罪暹懼誅單騎奔楊奉帝以暹楊有翼車駕之功詔一切勿問於是封衛將軍董承輔國將軍伏完等十餘人為列侯贈沮儁為𢎞農太守袁宏紀曰誅議郎侯祈尚書馮碩侍中壺崇討有罪也封衛將軍董承輔國將軍伏完侍中丁冲种輯尚書僕射鍾繇尚書郭溥御史中丞董芬彭城相劉艾馮翊韓斌東郡太守楊衆議郎羅邵伏徳趙蕤為列侯賞有功也贈射聲校尉沮儁為𢎞農太守旌死節也曹操以洛陽殘荒遂移帝幸許楊奉韓暹欲要遮車駕}
  - {type: variant, offset: 1736, length: 0, content: '', WYG: 及曹操擊之獻帝春秋曰車駕出洛陽自轘轅而東楊奉韓暹引軍追之輕騎既至操設伏兵要于陽城山狹中大敗之奉暹奔袁術遂縱暴揚徐間明年左將軍劉備誘奉斬之暹懼走還幷州道為人所殺九州春秋曰暹失奉孤特}
  - {type: variant, offset: 1736, length: 0, content: '', krp: 及曹操擊之獻帝春秋曰車駕出洛陽自轘轅而東楊奉韓暹引軍追之輕騎既至操設伏兵要于陽城山狹中大敗之奉暹奔袁術遂縱暴揚徐間明年左將軍劉備誘奉斬之暹懼走還幷州道為人所殺九州春秋曰暹失奉孤特}
  - {type: variant, offset: 1737, length: 2, content: 日月, WYG: 千餘騎欲歸幷州為張宣所殺胡才李樂留河東才為怨家所害樂自病死張濟飢餓出至南陽攻穰戰死郭汜為其将伍習所殺三年使謁者僕射裴茂詔關中諸将段煨等討李傕夷三族典略曰傕頭至有詔高縣之以段煨為安南將軍封閺鄉侯閺鄉今號州縣也説文閺今作閿流俗誤也四年張楊為將楊醜所殺魏志曰楊素與呂布善曹公之圍布楊欲救之不能乃出兵東市遥為之埶其將楊醜殺楊以應曹公以董承為車騎將軍開府自都許之後權歸曹氏天子總已百官備員而已帝忌操專偪乃密詔董承使結天下義士共誅之承遂與劉備}
