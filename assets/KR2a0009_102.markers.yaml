  - {type: variant, offset: 1713, length: 0, content: '', WYG: 為陜令知其危險舊故河師猶時有傾危况今無師太尉所慮是也使李樂先度具舟船舉火為應帝歩出營臨河欲濟岸高十餘丈乃以絹縋而下縋音直類反餘人或匍匐岸側或從}
  - {type: variant, offset: 1713, length: 0, content: '', krp: 為陜令知其危險舊故河師猶時有傾危况今無師太尉所慮是也使李樂先度具舟船舉火為應帝歩出營臨河欲濟岸高十餘丈乃以絹縋而下縋音直類反餘人或匍匐岸側或從}
  - {type: variant, offset: 1714, length: 0, content: '', WYG: 自投死亡傷殘不復相知爭赴舡者不可禁制董承以戈擊披之斷手指於舟中者可掬同濟唯皇后宋貴人宋貴人名都常山太守泓之女也見獻帝起居注楊彪董承及后父執金吾伏完等數十人其宫女皆為傕兵所掠奪凍溺死者甚衆既到太陽止於人家太陽縣屬河東郡前書音義曰在太河之陽也即今陜州河北縣是也十三州記曰}
