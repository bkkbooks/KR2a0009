  - {type: punctuation, offset: 86, content: ､, id: KR2a0009_ZHSJ_102-bkkpn15}
  - {type: variant, offset: 94, length: 0, content: '', WYG: 十人金城亂懿出國等扶以到䕶羌營殺之而釋約允等隴西以愛憎露布冠約允名以爲賊州購約允各千户侯約允被購約改爲遂允改爲章劉攽曰注陳懿勸之使王國案此王字當作徃字陳懿勸約使徃也使專任軍政共殺金城太守陳懿攻燒州郡明年春將數萬騎入寇三輔侵逼園陵託誅宦官爲名詔以卓爲中郎將副左車騎將軍皇甫嵩征之嵩以無功免歸而邊章韓遂等大盛朝廷復以司空張溫爲車騎將軍假節執金吾袁滂爲副袁宏漢紀曰滂字公熙純素寡欲終不言人短當權寵之盛或以同異致禍滂獨中立於朝故愛憎不及焉拜卓破虜將軍與盪寇將軍周愼竝統於溫幷諸郡兵歩騎合十餘萬屯美陽美陽故城在今雍州武功縣北以衞園陵章遂亦進兵美陽溫卓與戰輒不利十一月夜有流星如火光長十餘丈照章遂營中驢馬盡鳴賊以爲不祥欲歸金城卓聞之喜明日乃與右扶風鮑鴻等幷兵俱攻大破之斬首數千級章遂敗走榆中榆中縣屬金城郡故城在今蘭州金城縣中溫乃遣周愼將三萬人追討之溫參軍事孫堅堅字文臺吳郡富春人即孫權之父也見吳志說愼曰賊城中無穀當外轉糧食堅願得萬人斷其運道將軍以大兵繼後賊必困乏而不敢戰若走入羌中幷力討之則涼州可定也愼不從引軍圍榆中城而章遂分屯葵園狹反斷愼運道愼懼乃棄車重而退溫時亦使卓將兵三萬討先零羌卓於望垣北望垣縣屬天水郡爲羌胡所圍糧食之絶進退逼急乃於所度水中僞立􅋣以爲捕魚而潜從􅋣下過軍續漢書􅋣字作堰其字義則同但異體耳比賊追之決水已深不得度時衆軍敗退唯卓全師而還屯於扶風封斄鄉侯邑千户斄縣故城在今雍州武功縣字或作邰音台三年春遣使者持節就長安拜張溫爲太尉三公在外始之於溫其冬徵溫還京師韓遂乃殺邊章及伯玉文侯擁兵十餘萬進圍隴西太守李相如反與遂連和共殺涼州刺史耿鄙而鄙司馬扶風馬騰典畧曰騰字夀成扶風茂陵人馬援後也長八尺餘身體洪大面鼻雄異而性賢厚人多敬之亦擁兵反叛又漢陽王國自號合衆將軍皆與韓遂合共推王國爲主悉令領其衆寇掠三輔五年圍陳倉乃拜卓前將軍與左將軍皇甫嵩擊破之韓遂等復共廢王國而劫故信都令漢陽閻忠英雄記曰王國等起兵劫忠爲主統三十六郡號車騎將軍使督統諸部忠恥爲衆所脅感恚病死遂等稍爭權利更相殺害其諸部曲竝各分乖六年徵卓爲少府不肯就}
