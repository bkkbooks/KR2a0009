  - {type: variant, offset: 616, length: 239, content: 闕矣將何以補之書曰惟先假王正厥事又曰歲二月東巡狩至岱宗柴望秩于山川遂覲東后叶時月正日祖堯岱宗同律度量考在璣衡以正曆象庶乎有益春秋保乾圖曰三百年斗曆改憲史官用太初鄧平術有餘分一在三百年之域行度轉差浸以謬錯琁璣不正文象不稽冬至之日日在斗二十二一度而曆以為牽牛中星先立春一日則四分數之立春日也以折獄斷大刑於氣已迕用望平和隨時之義蓋亦遠矣今改行四分以遵於堯以順孔聖奉天之文冀百君子越有民同心敬授儻獲咸喜熙以明予祖之遺功於是四分施行而訢梵猶以為元首十一月當先大欲以合耦弦望命有常日而十九歲, WYG: 禁防}
