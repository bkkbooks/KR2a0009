  - {type: variant, offset: 1717, length: 4, content: 用黃道度, WYG: 連和傕乃放遣公卿百官頗歸宮人婦女及乗輿器服初帝入關三輔户口尚數十萬自傕汜相攻天子東歸後長安城空四十餘}
