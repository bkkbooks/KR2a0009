  - {type: variant, offset: 924, length: 0, content: '', WYG: 度橋氾兵數百人遮橋曰是天子非車不得前傕兵數百人皆持大㦸在乗輿車前侍中劉艾大呼云是天子也使侍中楊琦高舉車帷帝言諸兵汝却何敢廹近至尊邪汜等兵乃却既度橋士衆咸稱萬歲李傕出屯曹陽以張濟為驃騎将軍復還屯陜遷郭汜車騎將軍楊定後將軍楊奉興義将軍又以故牛輔部曲董承為安集將軍蜀志曰承獻帝舅也裴松之注曰承靈帝母太后之姪汜等並侍送乘輿汜遂復欲脅帝幸郿定奉承不聽汜恐變生乃棄軍還就李傕車駕進至華隂帝王紀曰帝以尚書郎郭溥喻汜汜以屯部未定乞須留之溥因罵汜曰卿眞庸人賤夫為國上将今天子有命何須留之吾不忍見卿所行請}
