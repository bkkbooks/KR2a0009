  - {type: variant, offset: 382, length: 5, content: 晦朔弦望差, WYG: 公所舉終不見用時長安中盜賊不禁白日虜掠傕汜稠乃參分城内各備其界猶不能制而其子弟縱横侵暴百姓是時穀一斛五十萬豆麥二十萬人相食啖啖音徒敢反白骨委積臭穢滿路帝使侍御史侯汶音聞出太倉米豆為飢人作糜經日而死者無限帝疑賦䘏有虛賦布也䘏憂也乃親於御前自加臨檢旣知不實使侍中劉艾出讓有司於是尚書令以下皆詣省閣劉攽曰案文閣當作閤閤門也謝奏收侯汶考實詔曰未忍致汶于理可杖五十自是後多得全濟明年春傕因會刺殺樊稠於坐獻帝紀曰傕見稠果勇而得衆心疾害之醉酒潛使外生騎都尉胡封於坐中拉殺稠由是諸將各相疑異傕汜遂復理兵相攻袁宏紀曰李傕數設酒請汜或留汜止宿汜妻懼與傕婢妾私而奪己愛思有以離間之會傕送饋汜妻乃以䜴為藥汜將食妻曰食從外来儻或有故遂摘藥示之曰一栖不兩雄我固疑将軍之信李公也他日傕請汜大醉汜疑傕藥之絞糞汁飲之乃解於是遂相猜疑也安西将軍楊定者故卓部曲将也懼傕忍害乃與汜合謀迎}
