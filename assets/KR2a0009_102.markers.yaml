  - {type: punctuation, offset: 164, content: ，, id: KR2a0009_ZHSJ_102-bkkpn33}
  - {type: 'tls:seg', offset: 164, content: '', id: KR2a0009_ZHSJ_102-d102p2s23}
  - {type: variant, offset: 164, length: 0, content: '', WYG: 自若諸将有言語蹉跌便戮於前又稍誅關中舊族䧟以叛逆時太史望氣言當有大臣戮死者卓乃使人誣衛尉張溫與袁術交通遂笞溫於市殺之以塞天變前溫出屯羙陽令卓與邊章等戰無功溫召又不時應命旣到而辭對不遜時孫堅為溫參軍勸溫陳兵斬之溫曰卓有威名方倚以西行堅曰明公親帥王師威振天下何恃於卓而頼之乎堅聞古之名将仗鉞臨衆未有不斷斬以示威武者也故穰苴斬荘賈史記齊景公時晉伐阿鄄而燕侵河上以司馬穰苴為将軍使寵臣荘賈監軍賈期後至穰苴斬以狥三軍鄄音絹魏絳戮楊干魏絳晉大夫楊干晉公弟㑹諸侯於曲梁楊干亂行魏絳戮其僕事在左傳今若縱之自虧威重後悔何及溫不能從而卓猶懷忌恨故及於難溫子伯愼漢}
