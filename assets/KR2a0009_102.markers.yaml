  - {type: variant, offset: 134, length: 0, content: '', WYG: 年初定天下稱皇帝大人見臨洮身長五丈迹長六尺作銅人以厭之立在阿房殿前漢徙長樂宫中大夏殿前史記曰始皇鑄天下兵器為十二金人卓臨洮人也而今毁之雖成毁不同凶暴相類焉卓素聞天下同疾閹宦誅殺忠良及其在事雖行無道而猶忍性矯情擢用羣士乃任吏部尚書漢陽周珌侍中汝南伍瓊英雄記珌作毖字仲逺武威人瓊字徳瑜珌音祕尚書鄭公業公業名泰餘人皆書名范曄父名泰避其諱耳長史何顒等以處士荀爽為司空其染黨錮者陳紀韓融之徒皆為列卿幽滯之士多所顯拔以尚書韓馥為冀州刺史英雄記馥字文節潁川人侍中劉岱為兗州刺史吳志曰劉岱字公山東莱牟平人陳留孔伷為豫州刺史英雄記伷字公緒九州春秋伷為冑潁川張咨為南陽太守獻帝春秋咨作資後為孫堅所殺卓所親愛並不處顯職但将校而已初平元年馥等到官與袁紹之徒十餘人各興義兵同盟討卓而伍瓊周珌隂為内主初靈帝末黄巾餘黨郭太等復起西河白波谷轉寇太原遂破河東百姓流轉三輔號為白波賊衆十餘萬卓遣中郎将牛輔擊之不能却及聞東方兵起懼乃鴆殺𢎞農王欲徙都長安會公卿議太尉黄琬司徒楊彪廷爭不能得而伍瓊周珌又固諫之卓因大怒曰卓初入朝二子勸用善士故相從而諸君到官舉兵相圖此二君賣卓卓何用相負遂斬瓊珌而彪琬恐懼詣卓謝曰小人戀舊非欲沮國事也請以不及為罪劉攽曰案文當云請不以及罪多為字又倒以字卓既殺瓊珌旋亦悔之故表彪琬為光禄大夫於是遷天子西都初長安遭赤眉之亂宫室營寺焚滅無餘是時唯有高廟京兆府舎遂便時幸焉便時謂時}
