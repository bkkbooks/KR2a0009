  - {type: variant, offset: 377, length: 3, content: 四分日, WYG: 下反覆未可知相與州里今雖小違要當大同欲共一言乃騈馬交臂相加騈並也笑語良久軍還利告傕曰樊韓騈馬笑語不知其辭而意愛甚密於是傕稠始相猜疑猶加稠及郭汜開府與三公合爲六府皆參選舉獻帝起居注曰傕等各欲用其所舉若一違之便忿憤恚怒主者患之乃以次第用其所舉先從㴶起汜次之稠次}
