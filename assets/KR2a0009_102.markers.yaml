  - {type: variant, offset: 114, length: 0, content: '', WYG: 王為賢且為董太后所養卓自以與太后同族有廢立意初卓之入也歩騎不過三千自嫌兵少恐不為逺近所服率四五日輒夜潛出軍近營明旦乃大陳旌鼓而還以為西兵復至洛中無知者尋而何進及弟苗先所領部曲皆歸於卓卓又使吕布殺執金吾丁原而幷其衆英雄記曰原字建陽為人麄畧有勇善射受使不辭有警急追寇虜輒在前卓兵士大盛乃諷朝廷策免司空劉𢎞而自代之魏志曰以久不雨策免漢官儀曰𢎞字子高安衆人因集議廢立百僚大會卓乃奮首而言曰大者天地其次君臣所以為政皇帝闇弱不可以奉宗廟為}
  - {type: page-break, offset: 114, content: '', id: KR2a0009_WYG_102-6b, image: WYG0253/WYG0253-0420d.png}
