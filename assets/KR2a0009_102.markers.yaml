  - {type: variant, offset: 162, length: 1, content: 日, WYG: 里北出對洛陽故城張衡東京賦云盟津達其後大谷通其前是也距至也卓自出與堅戰於諸陵墓間卓敗走却屯澠池聚兵於陜堅進洛陽宣陽城門洛陽記洛陽城南面有四門從東第三門劉攽曰注從東第三門案文少名宣陽三字更擊呂布布復破走堅乃埽除宗廟平塞諸陵分兵出函谷關至新安澠池間以􅎒卓後卓謂長史劉艾曰關東諸將數敗矣無能為也唯孫堅小戇説文曰戇愚也音都降反諸將軍宜愼之乃使東中郎將董越屯澠池中郎將叚煨屯華隂典畧曰煨在華隂特脩農事天子東遷煨迎賫饋周急魏志曰武威人也煨音一回反中郎將牛輔屯安邑其餘中郎將校尉布在諸縣以禦山東卓諷朝廷使光禄勲宣璠璠音煩又音甫袁反持節拜卓為太師位在諸侯王上乃引還長安百官迎路拜揖卓遂僭擬車服乗金華青葢𤓰畫兩轓時人號竿摩車言其服飾近天子也金華以金為華飾車也𤓰者蓋弓頭為𤓰形也轓音甫袁反廣雅云車箱也畫為文彩續漢志云轓長六尺下屈廣八寸又云皇太子青葢金華蚤畫轓竿摩謂相逼近也今俗以事干人者謂之相竿摩以弟旻為左將軍封鄠侯兄子璜為侍中中軍校尉皆典兵事於是宗族内外竝居列位其子孫雖在髫齓男皆封侯女為邑君數與百官置酒宴會淫樂縱恣乃結壘於長安城東以自居又築塢於郿高厚七丈號曰萬歲塢今案塢舊基高一丈周廽一里一百歩積穀為三十年儲自云事成雄據天下不成守此足以畢老常至郿行塢公卿已下祖道於横門外横音光卓施帳幔飲設誘降北地反者數百人於坐中殺之先斷其舌次斬手足次鑿其眼目以鑊煑之未及得死偃轉柸案間會者戰慄亡失匕箸而卓飲}
