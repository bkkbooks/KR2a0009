  - {type: variant, offset: 407, length: 2, content: 合而, WYG: 從遂質留公卿彪謂汜曰將軍達人間事奈何君臣分爭一人刧天子一人質公卿此可行邪汜怒欲手刃彪彪曰卿尚不奉國家吾豈求生邪左右多諫汜乃止遂引兵攻傕矢及帝前獻帝紀曰汜與傕將張苞張龍謀誅傕汜將兵夜攻傕門候開門内汜兵苞等燒屋火不然汜兵弓弩並發矢及天子樓帷簾中又貫傕耳傕將楊奉夲白波賊帥乃將兵救傕於是汜衆乃退是日傕復移帝幸其北塢唯皇后宋貴人俱傕使校尉監門隔絶内外獻帝紀曰傕令門設反關校尉守察盛夏炎暑}
