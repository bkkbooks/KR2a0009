  - {type: variant, offset: 147, length: 6, content: 曆即縮用筭上, WYG: 遣将徐榮李蒙四出虜掠榮遇堅於梁故城在今汝州梁縣西南也與戰破堅生禽潁川太守李旻亨之卓所得義兵士卒皆以布纒裹倒立於地熱膏灌殺之時河内太守王匡英雄記曰匡字公節泰山人輕財好施以任俠聞屯兵河陽津將以圖卓卓遣疑兵挑戰而潛使銳卒從小平津過津北破之死者略盡明年孫堅收合散卒進屯梁縣之陽人梁縣屬河南郡今汝州縣也陽人聚故城在梁縣西卓遣將胡軫呂布攻之布與軫不相能軍中自驚恐士卒散亂九州春秋曰卓以東郡太守胡軫}
