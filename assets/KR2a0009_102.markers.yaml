  - {type: variant, offset: 4823, length: 4, content: 曆不如史, WYG: 本同何焯校本見下有害字越騎校尉汝南伍孚何焯曰孚與瓊疑是一人因其被害時人造此事以歸之耳裴注中採謝承書亦致疑及此僕射士孫瑞注瑞字君榮何焯校本榮改策十反乃許注濟從太}
