  - {type: variant, offset: 2291, length: 2215, content: 軫十八凡三百六十五度四分度之一冬至日在斗十九度四分度之一史官以郭部日月行參弦望雖密近而不為注日儀黃道與度轉運難以候是以少循其事逵論曰又今史官推合朔弦望月食加時率多不中在於不知月行疾意永平中詔書令故太史待詔張隆以四分法署弦望月食加時隆言能用易九六七八支爻知月行多少今案隆所署多失臣使隆逆推前手所署不應或異日不中天乃益遠至十餘度梵統以史官候注考校月行當有疾不必在牽牛東井婁角之閒又非所謂朓側匿乃由月所行道有遠近出入所生率一月移故所疾處三度九歲九道一復凡九章百七十一歲復十一月合朔旦冬至合春秋三統九道終數可以知合朔弦望月食加時據官注天度為分率以其術法上考建武以來月食凡三十八事差密近有益宣宜課試上案史官舊有九道術廢而不修熹平中故治曆郎梁國宗整上九道術詔書下太史以參舊術相應部太子舍人馮恂課校恂亦復作九道術增損其分與整術並校差為近太史令颺上以恂術參弦望然而加時猶復先後天遠則十餘度永元十四年待詔太史霍融上言官漏刻率九日增減一刻不與天相應或時差至二刻半不如夏曆密詔書下太常令史官與融以儀校天課度遠近太史令舒承梵等對案官所施漏法令甲第六常符漏品孝宣皇帝三年十二月乙酉下建武十年二月壬午詔書施行漏刻以日長短為數率日南北二度四分而增減一刻一氣俱十五日日去極各有多少今官漏率九日移一刻不隨日進退夏曆漏刻隨日南北為長短密近於官漏分明可施行其年十一月甲寅詔曰告司徒司空漏所以節時分定昬明昬明長短起於日去極遠近日道周圜不可以計率分當據儀度下參晷景今官漏以計率分昬明九日增減一刻違失其實至為疏數以耦法太史待詔霍融上言不與天相應太常史官運儀下水官漏失天者至三刻以晷景為刻少所違失密近有驗今下晷景漏刻四十八箭立成斧官府當用者計吏到班予四十八箭文多故魁取二十四氣日所在并黃道去極晷景漏刻昬明中星刻于下昔太初曆之興也發謀於元封啟定於天元鳳積百三十年是非乃審及用四分亦於建武施於元和訖於永元七十餘年然后儀式備立司候有準天事幽微若此其難也中興以來圖讖漏泄而考靈曜命曆序皆有甲寅元其所起在四分庚申元後百一十四歲朔差却二日學士修之於草澤信向以為得正及太初曆以後大天為疾而修之者云百四十四歲而太歲超一表辰百七十一歲當棄朔餘六十三中餘千一百九十七乃可常行自太初元年至永平十一年百七十一當去分而不去故令益有疏闊此二家常挾其術庶幾施行每有訟者百寮會議羣儒騁思論之有方益於多聞識之故詳錄焉安帝延光二年中謁者亶誦言當用甲寅元河南梁豐言當復用太初尚書郎張衡周興皆能曆數難誦豐或不對或言失誤衡興參案儀注者考往校今以為九道法最密詔書下公卿詳議太尉愷等上侍中施延等議太初過天日一度弦望失正月以晦見西方食不與天相應元和改從四分四分雖密於太初復不正皆不可用甲寅元與天相應合圖讖可施行博士黃廣大行令任僉議如九道河南尹祉太子舍人李泓等四十人議即用甲寅元當除元命苞天地開闢獲麟中百一十四歲推閏月六直其日或朔晦弦望二十四氣宿度不相應者非一用九道為朔月有比三大二小皆疏遠元和變曆以應保乾圖三百歲斗曆改憲之文四分曆本起圖讖最得其正不宜易愷等八十四人議宜從太初尚書令忠上奏諸從太初者皆無他效驗徒以世宗攘夷廓境享國久長為辭或云孝章改四分災異卒甚未有善應臣伏惟聖王興起各異正朔以通三統漢祖受命因秦之紀十月為年首閏常在歲後不稽先代違於帝典太宗遵修三階以平黃龍以至刑犴以錯五是以備哀平之際同承太初而妖孽累仍痾禍非一議者不以成數相參考真求實而汎采妄說歸福太初致咎四分太初曆衆賢所立是非已定永平不審復革其弦望四分有謬不可施行元和鳳鳥不當應曆而翔集遠嘉前造則喪表其休近譏後改則隱其福漏見曲論未可為是臣輒復重難衡興以為五紀論推步行度當時比諸術為近然猶未稽於古及向子歆欲以合春秋橫斷年數損夏益周考之表紀差謬數百兩曆相課六千一百五十六歲而太初多一日冬至日直斗而云在牽牛闊不可復用昭然如此史官所共見非獨衡興前以為九道密近今議者以為有闕及甲寅元復多違失皆未可取正昔仲尼順假馬之名以崇君之義況天之曆數不可任疑從虛以非易是上納其言遂寢改曆事順帝漢安二年尚書侍郎邊韶上言世微於數虧道盛於得常數虧則物衰得常則國昌孝武皇帝攄發聖思因元封七年十一月甲子朔旦冬至乃詔太史令司馬遷治曆鄧平等更建太初改元易朔行夏之正乾鑿度八十一分之四十三為日法設清臺之候驗六異課效觕密太初為最其後劉歆研機極深驗之春秋參以易道以河圖帝覽嬉雒書甄乾曜度推廣九道百七十一歲進退六十三分百四十四歲一超次與天相應少有闕謬從太初至永平十一年百七十一歲進退餘分六十三治曆者不知處之推得十二度弦望不效挾廢術者得竄其說至永元和二年小終之數寖過餘分稍增月不用晦朔而先見孝章皇帝以保乾圖三百年斗曆改憲就用四分以太白復樞甲子為癸亥引天從筭耦之目前更以庚申為元既無明文託之於獲麟之歲又不與感精符單閼之歲同史官相代因成習疑少能鉤深致遠案弦望足以知之詔書下三公百官雜議太史令虞恭治曆宗訢等議建曆之本必先立元元正然後定日法法定然後度周天以定分至三者有則曆可成也四分曆仲紀之元起於孝文皇帝後元三年歲在庚辰上四十五歲歲在乙未則漢興元年也又上二百七十五歲歲在庚申則孔子獲麟二百七十六萬歲尋之上行復得庚申歲歲相承從下尋上其執不誤此四分曆元明文圖讖所著也太初元年歲在丁丑上極其元當在庚戌而曰丙子言百四十四歲超一辰凡九百九十三超歲有空行八十二周有奇乃得丙子案歲所超於天元十一月甲子朔旦冬至日月俱超日行一度積三百六十五度四分度一而周天一帀名曰歲歲從一辰日不得空周天則歲無由超辰案百七十一歲二蔀一章小餘六十三自然之數, WYG: 服}
