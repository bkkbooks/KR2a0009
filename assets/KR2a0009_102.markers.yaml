  - {type: variant, offset: 1740, length: 13, content: 於今曆弦望至差一日以上輒奏, WYG: 謀未發會備出征承更與偏將軍王子服長水校尉种輯議郎吳碩結謀事泄承服輯碩皆為操所誅韓遂與馬騰自還涼州更相戰爭乃下隴據關中操方事河北慮其乗間為亂七年乃拜騰征南将軍遂征西将軍並開府後徴段煨為大鴻臚病卒復徴馬騰為衛尉封槐里侯騰乃應召而留子超領其部曲十六年超與韓遂舉關中背曹操操擊破之遂超敗走騰坐夷三族超攻殺涼州刺史韋康太僕瑞之子也弟誕魏光禄大夫復據隴右十九年天水人楊阜破超魏志曰阜字義山天水冀人也韋康}
