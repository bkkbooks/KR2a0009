  - {type: variant, offset: 401, length: 2, content: 問史, WYG: 車三乗迎天子皇后太尉楊彪謂暹曰古今帝王無在人臣家者諸君舉事當上順天心奈何如是暹曰将軍計決矣帝於是遂幸傕營彪等皆徒從亂兵入殿掠宫人什物傕又徙御府金帛乗輿器服而放火燒宫殿}
