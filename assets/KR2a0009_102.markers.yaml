  - {type: variant, offset: 373, length: 1, content: 星, WYG: 議欲盡誅涼州人諸君若棄軍單行則一亭長能束君矣不如相率而西以攻長安為董公報仇事濟奉國家以正天下若其不合走未後也傕等然之各相謂曰京師不赦我我當以死決之若攻長安尅則得天下矣不尅則鈔三輔婦女財物西歸鄉里尚可延命衆以為然於是共結盟率軍數千晨夜西行王允聞之乃遣卓故將胡軫徐榮擊之於新豐九州春秋曰胡文才揚整脩皆涼州人王允素所不善也及李傕之叛乃召文才整脩使東曉喻之不假借以溫顏謂曰關東鼠子欲何為乎卿徃曉之於是二人往實召兵而還榮戰死軫以衆降傕隨收兵比至長安已十餘萬與卓故部曲樊稠李蒙等合袁宏記曰蒙為傕所殺圍長安城城峻不可攻守之八日呂布軍有叟兵内反叟兵即蜀兵也漢代謂蜀為叟引傕衆得入城潰放兵虜掠死者萬餘人殺衛尉种拂等呂布戰敗出奔王允奉天子保宣平城門樓上三輔黄圖曰長安城東面北頭門號宣平門於是大赦天下李傕郭汜樊稠等皆為將軍袁山松書曰允謂傕等曰臣無作威作福將軍乃放縱欲何為乎傕等不應自拜署傕為揚武將軍汜為揚烈將軍樊稠等皆為中郎將也遂圍門樓共表請司徒王允出問太師何罪允窮蹙乃下後數日見殺傕等葬董卓於郿幷收董氏所焚尸之灰合斂一棺而葬之葬日大風雨霆震卓墓流水入藏漂其棺木獻帝起居注曰冢户開大風暴雨水土流入杼出之棺向入輒復風雨水溢郭户如此者三四冢中水半所稠等共下棺又風雨益暴甚遂閉户户閉大風復破其冢傕又遷車騎將軍開府領司隸校尉假節汜後將軍稠右將軍張濟為鎭東將軍竝封列侯傕汜稠共秉朝政濟出屯𢎞農以賈詡為左馮翊欲侯之詡曰此救命之計何功之有固辭乃止更以為尚書典選明年夏大雨晝夜二十餘日漂没人庶又風如冬時帝使御史裴茂訊詔獄原繫者二百餘人其中有為傕所枉繫者傕恐茂赦之乃表奏茂擅出囚徒疑有姦故請收之詔曰災異屢降隂雨為害使者銜命宣布恩澤原解輕微庶合天心欲釋寃結而復罪之乎一切勿問初卓之入關要韓遂馬騰共謀山東獻帝傳曰騰父平扶風人為天水蘭干尉失官遂留隴西與羌雜居家貧無妻遂娶羌女生騰遂騰見天下方亂亦欲倚卓起兵興平元年馬騰}
