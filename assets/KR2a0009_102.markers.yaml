  - {type: variant, offset: 100, length: 0, content: '', WYG: 畢廩賜斷絶前書音義曰牢廩食也古者名廩爲牢妻子飢凍牽挽臣車使不得行羌胡敝腸狗態言羌胡心腸敝惡情態如狗也續漢書敝作憋方言云憋惡也郭璞曰憋怤急性也憋音芳别反怤音芳于反臣不能禁止輒將順安慰增異復上如其更增異志當復聞上朝廷不能制頗以爲慮及靈帝寢疾璽書拜卓爲幷州牧令以兵屬皇甫嵩卓復上書言曰臣既無老謀又無壯士天恩誤加掌戎十年士卒大小相狎彌久戀臣畜養之恩爲臣奮一旦之命乞將之北州効力邊垂於是駐兵河東以觀時變及帝崩大將軍何進司隸校尉袁紹謀誅閹宦而太后不許乃私呼卓將兵入朝以脅太后卓得召卽時就道竝上書竝猶兼也曰中常侍張讓等竊倖承寵濁亂海内臣聞揚湯止沸莫若去薪前漢枚乘上書曰欲湯之滄一人吹之百人揚之無益也不如絶薪止火而已滄音側亮反寒也潰癕雖痛勝於内食昔趙鞅興晉陽之甲以逐君側之惡人公羊傳曰晉趙鞅取晉陽之甲以逐荀寅與士吉射者曷爲君側之惡人也此逐君側之惡人曷爲以叛言之無君命也劉攽曰注荀寅與士吉射者曷爲君側之惡人案公羊當更有荀寅士吉射五字下又更須有者也二字今臣輒鳴鐘鼓如洛陽鳴鐘鼔者聲其罪也論語曰小子鳴鼓而攻之典略載卓表曰張讓等慆慢天常擅操王命父子兄弟竝據州郡一書出門高獲千金下數百萬膏腴美田皆屬讓等使變氣上蒸妖賊蜂起請收讓等以清姦穢卓未至而何進敗虎賁中郎將袁術乃燒南宫欲討宦官而中常侍叚珪等山陽公載記叚字作殷劫少帝及陳留王夜走小平津卓遠見火起引兵急進未明到城西聞少帝在北芒因徃奉迎帝見卓將兵卒至恐怖涕泣典略曰帝望見卓涕泣羣公謂卓有詔却兵卓曰公諸人爲國大臣不能匡}
