  - {type: variant, offset: 4851, length: 204, content: 定精微於晷儀正衆疑祕藏中書改行四分之原及光武皇帝數下詔書草創其端孝明皇帝課校其實孝章皇帝宣行其法君更三聖年歷數十信而徵之舉而行之其元則上統開闢其數則復古四分宜如甲寅詔書故事奏可靈帝熹平四年五官郎中馮光沛相上計掾陳晃言曆元不正故妖民叛寇益州盜賊相續為害曆當用甲寅為元而用庚申圖緯無以庚申為元者近秦所用代周之元太史治治曆中郭香劉固意造妄說乞與本庚申元經緯有明文受虛欺重誅乙卯詔書下三府與儒林明道者詳議務得道真以羣, WYG: 令}
