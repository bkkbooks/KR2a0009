  - {type: variant, offset: 5099, length: 222, content: 有二歲孝武皇帝始改正朔曆用太初元用丁丑行之百八十九歲孝章皇帝改從四分元用庚申今光晃各以庚申為非甲寅為是案曆法黃帝顓頊夏殷周魯凡六家各自有元光晃所據則殷曆元也他元雖不明於圖讖各自一家之術皆當有效於其當時黃武帝始用太初丁丑之元有六家紛錯爭訟是非太史令張壽王挾甲寅元以非漢曆雜候清臺課在下第卒以疏闊連見劾奏太初效驗無所漏失是則雖非圖讖之元而有效於前者也及用四分以來考之行度密於太初是又新元有效於今者也延光元年中謁者亶誦亦非四分庚申上言當用命曆序甲寅元, WYG: 官}
