  - {type: variant, offset: 4820, length: 1, content: 黃, WYG: 道乎跖曰何適無有邪夫妄意室中之藏聖也入先勇也出後義也知可否智也分均仁也五者不備而能成大盜者天下未之有也及殘寇乗之倒山傾海殘寇謂傕汜等崑岡之火自兹而焚書曰火炎崑岡玉石俱焚版蕩之篇於焉而極詩大雅曰上}
  - {type: variant, offset: 4820, length: 1, content: 黃, krp: 道乎跖曰何適無有邪夫妄意室中之藏聖也入先勇也出後義也知可否智也分均仁也五者不備而能成大盜者天下未之有也及殘寇乗之倒山傾海殘寇謂傕汜等崑岡之火自兹而焚書曰火炎崑岡玉石俱焚版蕩之篇於焉而極詩大雅曰上}
  - {type: variant, offset: 4822, length: 0, content: '', WYG: 版版下人卒癉毛萇注云版反也痺病也言厲王為政反先王之道下人盡病也又蕩之什曰蕩蕩上帝下人之辟疾威上帝其命多辟鄭𤣥注云蕩蕩法度廢壞之貎嗚呼人之生也難矣左傳曰人生實難其有不獲死乎天地之不仁甚矣老子曰天地不仁以萬物爲芻狗贊曰百六有會前書音義曰四千五百歲為一元一元之中有九戹陽戹五隂戹四陽為旱隂為水初入元百六歲有陽戹故曰百六之會過剥成災易曰大過棟撓夲末弱也剥不利有攸徃小人長也董卓滔天干逆三才滔漫也尚書曰象龔滔天方夏崩沸方四方夏華夏也詩小雅云百川沸騰山冢崒崩皇京烟埃無禮雖及餘䘲遂廣左傳曰多行無禮必自及矢延王輅兵纒魏象周禮巾車氏掌王之五輅纒遶也魏象闕也區服傾回人神波蕩後漢書卷一百二後漢書卷一百二考證董卓傳朝廷不能制制字監本誤作爾從宋本改而彪琬恐懼監本無琬字臣㑹汾按上下文皆彪琬並言此不應獨舉楊彪從宋本增溫子伯愼何焯校本子改字事未及發而見}
