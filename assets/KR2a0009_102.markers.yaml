  - {type: variant, offset: 923, length: 0, content: '', WYG: 死者以萬數張濟自陜來和解二人仍欲遷帝權幸𢎞農帝亦思舊京因遣使敦請傕求東歸十反乃許袁宏紀曰濟從太官令孫篤校尉張式宣諭十反車駕即日發邁獻帝起居注曰初天子出到宣平門}
