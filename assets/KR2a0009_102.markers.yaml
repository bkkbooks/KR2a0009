  - {type: variant, offset: 1715, length: 0, content: '', WYG: 巖在其界今住穴尚存然後幸李樂營百官飢餓河内太守張楊魏志曰楊字稚叔雲中人使數千人負米貢餉帝乃御牛車因都}
  - {type: variant, offset: 1715, length: 0, content: '', krp: 巖在其界今住穴尚存然後幸李樂營百官飢餓河内太守張楊魏志曰楊字稚叔雲中人使數千人負米貢餉帝乃御牛車因都}
  - {type: variant, offset: 1716, length: 0, content: '', WYG: 邑河東太守王邑奉獻綿帛悉賦公卿以下封邑為列侯邑字文都北地涇陽人鎭北將軍見同歳名拜胡才征東將軍張楊為安國将軍皆假節開府其壘壁羣豎競求拜職刻印不給至乃以錐畫之或齎酒肉就天子燕飲魏志曰乘輿時居棘籬中門户無關閉天子與羣臣㑹兵士伏籬上觀互相鎭壓以為笑諸将或遣婢詣省問或齎酒送天子侍中不通喧呼罵詈也劉攽曰注遣婢詣省問或案問當作閤又遣太僕韓融至𢎞農與傕汜}
