  - {type: variant, offset: 127, length: 5, content: 官曆署七月, krp: 長安迎取飛亷及銅馬置上西門外名平樂館銅馬則東門京所作致於金馬門外者也張璠紀曰太史靈臺及永安候銅蘭楯卓亦取之故貨賤物貴穀石數萬又錢無輪郭文章不便人用魏志曰卓鑄小錢大五分無文章内外無輪郭不磨鑢時人以為秦始皇見長人於臨洮乃鑄銅人三輔舊事曰秦王立二}
