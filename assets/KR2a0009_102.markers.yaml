  - {type: 'tls:seg', offset: 122, content: '', id: KR2a0009_ZHSJ_102-d102p2s17}
  - {type: variant, offset: 123, length: 0, content: '', WYG: 令憂死逆婦姑之禮無孝順之節左傳曰婦養姑者也虧姑以成婦逆莫大焉遷於永安宫遂以弑崩卓遷太尉領前將軍事加節傳斧鉞虎賁更封郿侯傳音直戀反郿今岐州縣卓乃與司徒黄琬司空楊彪俱帶鈇鑕詣闕上書追理陳蕃竇武及諸黨人以從人望於是悉復蕃等爵位擢用子孫尋進卓為相國入朝不趨劒履上殿封母為池陽君置丞令劉攽曰案漢書内皆言令丞此不合倒之是時洛中貴戚室第相望金帛財産家家殷積卓縱放兵士突其廬舍淫略婦女剽虜資物謂之搜牢言牢固者皆捜索取之也一曰牢漉也二字皆從去聲今俗有此言人情崩恐不保朝夕及何后葬開文陵靈帝陵卓悉取藏中珍物又姦亂公主妻略宫人虐刑濫罰睚眦必死羣僚内外莫能自固卓嘗遣軍至陽城時人會於社下悉令就斬之駕其車重載其婦女以頭繫車轅歌呼而還又壞五銖錢更鑄小錢悉取洛陽及長安銅人鍾虡飛亷銅馬之屬以充鑄焉鍾虡以銅為之故賈山上書云懸石鑄鍾虡前書音義曰虡鹿頭龍身神獸也説文鍾鼓之跗以猛獸為飾也武帝置飛亷館音義云飛亷神禽身似鹿頭如爵有角蛇尾文如豹文明帝}
  - {type: page-break, offset: 123, content: '', id: KR2a0009_WYG_102-7b, image: WYG0253/WYG0253-0421b.png}
  - {type: page-break, offset: 123, content: '', id: KR2a0009_WYG_102-8a, image: WYG0253/WYG0253-0421c.png}
