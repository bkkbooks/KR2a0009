  - {type: variant, offset: 1779, length: 256, content: 日月宿簿及星度課與待詔星象考校奏可臣謹案前對言冬至日去極一百一十五度夏至日去極六十七度春秋分日去極九十一度洪範日月之行則有冬夏五紀論日月循黃道南至牽牛北至東井率日日行一度月行十三度十九分度七也今史官一以赤道為度不與日月行同其斗牽牛東井輿鬼赤道得十五而黃道得十三度半行東壁奎婁軫角亢赤道十七度黃道八度或月行多而日月相去反少謂之日却案黃道值牽牛出赤道南二十五度其直東井輿鬼出赤道北二十五度赤道者為中天去極俱九十度非日月道而以遙準度日月失其實行故也以今太史官候注考元和二年九月已來月行牽牛東井四十九事無行十一度者行婁角, WYG: ''}
