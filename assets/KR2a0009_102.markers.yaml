  - {type: variant, offset: 5595, length: 1037, content: 其符驗而光晃曆以考靈曜為本二十八宿度數及冬至日所在與今史官甘石舊文錯異不可考校以今渾天圖儀檢天文亦不合於考靈曜光晃誠能自依其術更造望儀以追天度遠有驗於圖書近有效於三光可以易奪甘石窮服諸術者實宜用之難問光晃但言圖讖所言不服元和二年二月甲寅制書曰朕聞古先聖王先天而天不違後天而奉天時史官用太初鄧平術冬至之日日在斗二十二一度而曆以為牽牛中星先立春一日則四分數之立春也而以折獄斷大刑於氣已迕用望平和蓋亦遠矣今改行四分以遵於堯以順孔聖奉天之文是始用四分曆庚申元之詔也深引河雒圖讖以為符驗非史官私意獨所興構而光晃以為香固意造妄說違反經文謬之甚者昔堯命羲和曆象日月星辰舜叶時月正日湯武革命治曆明時可謂正矣且猶遇水遭旱戒以蠻夷猾夏寇賊姦宄而光晃以為陰陽不和姦臣盜賊皆元之咎誠非其理元和二年乃用庚申至今九十二歲而光晃言秦所用代周之元不知從秦來漢三易元不常庚申光晃區區信用所學亦妄虛無造欺語之愆至於改朔易元往者壽王之術已課不效亶誦之議不用元和詔書文備義著非羣臣議者所能變易太尉耽司徒隗司空訓以邕議劾光晃不敬正鬼薪法詔書勿治罪太初曆推月食多失四分因太初法以河平癸巳為元施行五年永元元年天以七月後閏食術以八月其十二年正月十二日蒙公乘宗紺上書言今月十六日月當食而曆以二月至期如紺言太史令巡上紺有益官用除待詔甲辰詔書以紺法署施行五十六歲至本初元年天以十二月食曆以後年正月於是始差到熹平三年二十九年之中先曆食者十六事常山長史劉洪上作七曜術甲辰詔屬太史部郎中劉固舍人馮恂等課效復作八元術固等作月食術並已相參固術與七曜術同月食所失皆以歲在己未當食四月恂術以三月官曆以五月太史上課到時施行中者丁巳詔書報可其四年紺孫誠上書言受紺法術當復改今年十二月當食而官曆以後年正月到期如言拜誠為舍人丙申詔書聽行誠法光和二年歲在己未三月五月皆陰太史令修部舍人張恂等推計行度以為三月近四月遠誠以四月奏廢誠術施用恂術其三年誠兄整前後上書言去年三月不食當以四月史官廢誠正術用恂不正術整所上五正屬太史太史主者終不自言三月近四月遠食當以見為正無遠近詔書下太常其詳案注記平議術之要效驗虛實太常就耽上選侍中韓說博士蔡較穀城門候劉洪右郎中陳調於太常府覆校注記平議難問恂誠各對恂術以五千六百四十日月有九百六十一食為法而除成分空加縣法推建武以來俱得三百二十七食其十五食錯案其官素注天見食九十八與兩術相應其錯辟二千一百誠術以百三十五月二十三食為法乘除成月從建康以上減四十一建康以來減三十五以其俱不食恂術改易舊法誠術中復減損論其長短無以相踰各引書緯自, WYG: ''}
