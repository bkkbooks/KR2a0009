  - {type: variant, offset: 375, length: 1, content: 後, WYG: 隴右來朝進屯㶚橋時騰私有求於傕不獲而怒遂與侍中馬宇右中郎將劉範焉之子前涼州刺史种邵中郎將杜禀獻帝紀曰禀與賈詡有隙脅扶風吏人為騰守槐里欲共攻傕傕令樊稠及兄子利數萬人攻圍槐里夜梯城城陷斬禀梟首合兵攻傕連日不決韓遂聞之乃率衆来欲和騰傕旣而復與騰合傕使兄子利共郭汜樊稠與騰等戰於長平觀下前書音義曰長平坂名也在池陽南有長平觀去長安五十里遂騰敗斬首萬餘級种邵劉範等皆死遂騰走還涼州稠等又追之韓遂使人語稠曰}
