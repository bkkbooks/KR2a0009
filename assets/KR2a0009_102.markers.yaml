  - {type: variant, offset: 1757, length: 0, content: '', WYG: 八月拒守而救兵不至超入拘岳於冀殺刺史太守阜内有報超之志而未得其便外兄姜叙屯歴城阜少長詣叙家見叙母説前在冀中時事歔欷悲甚叙曰何為耳阜曰守城不能完君亡不能死亦何面目}
  - {type: variant, offset: 1757, length: 0, content: '', krp: 八月拒守而救兵不至超入拘岳於冀殺刺史太守阜内有報超之志而未得其便外兄姜叙屯歴城阜少長詣叙家見叙母説前在冀中時事歔欷悲甚叙曰何為耳阜曰守城不能完君亡不能死亦何面目}
  - {type: variant, offset: 1758, length: 0, content: '', WYG: 視息天下時叙母慨然勑從阜計超聞阜等兵起自將出襲歴城得叙母罵之曰若背父之逆子弑君之桀賊天地豈久容敢以面目視人乎超怒殺之阜與戰身被五創宗族昆弟死者七人超遂南奔張魯劉攽曰注阜少長詣叙家又云得叙母罵之曰案此言阜自少長於叙家後人不曉妄加一詣字下文少叙母二字超奔漢中降劉備蜀志曰超字孟起既奔漢中聞備圍劉璋於成都宻書請降備遣迎超將兵徑到城下城中震怖璋即稽首韓遂走金城羌中}
