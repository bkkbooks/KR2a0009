  - {type: variant, offset: 41, length: 0, content: '', WYG: 帝末戾太子巫蠱事起邴吉為廷尉監時宣帝年二嵗坐太子事繫望氣者言長安獄中有天子氣於是上遣使者分條中都官詔獄繫者亡輕重一切皆殺之内者令郭穰至郡邸獄吉閉門扞拒曰它人無辜猶不可況親曽孫乎穰不得入還以聞上曰天使之也因大赦天下曽孫賴吉得立宣帝立吉為丞相未及封而病上憂吉不起夏侯勝曰此未死也臣聞有隂徳者必饗其樂以及子孫後吉病愈封博陽侯薨子顯嗣甘露中削爵為闗内侯至孫昌復封博陽侯傳子至孫王莽敗乃絶劉攽曰注曽孫頼吉得立案前書立當作全終陳掌不侯而邴昌紹國雖有不類未可致詰其大致歸然矣袁公竇氏之間乃情帝室乃情猶竭情也引義雅正可謂王臣之烈易曰王臣蹇蹇匪躬之故烈業也及其理楚獄未嘗鞠人於臧罪其仁心足以覃乎後昆爾雅曰覃延也子孫之盛不亦宜乎此論竝華嶠之詞也張酺傳張酺字孟侯汝南細陽人趙王張敖之後也敖父耳自楚降漢髙祖封為趙王敖嗣後有罪廢為宣平侯敖子壽封細陽之池陽鄉後廢因家焉酺}
  - {type: page-break, offset: 41, content: '', id: KR2a0009_WYG_075-12b, image: WYG0253/WYG0253-0062b.png}
