  - {type: variant, offset: 3664, length: 221, content: 苗謂進曰始共從南陽來俱以貧賤依省內以致貴富國家之事亦何容易覆水不可收宜深思之且與省內和也進意更狐疑紹懼進變計乃脅之曰交搆已成形埶已露事留變生將軍復欲何待而不早決之乎進於是以紹為司隸校尉假節專命擊斷從事中郎王允為河南尹紹使洛陽方略武吏司察宦者而促董卓等使馳驛上欲進兵平樂觀太后乃恐悉罷中常侍小黃門使還里舍唯留進素所私人以守省中諸常侍小黃門皆詣進謝罪唯所措置進謂曰天下匈匈正患諸君耳今董卓垂至諸君何不早各就國袁紹勸進便於此決之至于再三進不許紹又為, WYG: 宋本改後漢}
