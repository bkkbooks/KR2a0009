  - {type: variant, offset: 1380, length: 1, content: 虞, WYG: 竇景家人復擊傷市卒吏捕得之景怒遣緹騎侯海等五百人歐傷市丞説文曰緹帛丹黄色也漢官儀曰執金吾有緹騎酺部吏楊章等窮䆒正海罪徙朔方景忿怨乃移書辟章等六人為執金吾吏欲因報之章等惶恐入白酺願自引臧罪以辭景命酺即上言其狀竇太后詔報自今執金吾辟吏皆勿遣及竇氏敗酺乃上疏曰臣實愚憃不及大體鄭𤣥注周禮云憃愚癡騃也憃音陟降反以為竇氏雖伏厥辜而罪刑未著後世不見其事但聞其誅非所以垂示國典貽之將來宜下理官與天下平之平之謂平論其罪也方憲等寵貴羣臣阿附唯恐不及皆言憲受顧命之託懐伊呂之忠臨終之命曰顧命至乃復比鄧夫人於文母臣賢案鄧夫人即穰侯鄧疊母元也元出入宮掖共竇憲女壻郭舉父子同謀殺害與竇氏同誅語在憲傳故張酺論憲兼及其黨稱鄧夫人者猶如前書霍光妻稱霍顯}
  - {type: page-break, offset: 1380, content: '', id: KR2a0009_WYG_075-15b, image: WYG0253/WYG0253-0063d.png}
