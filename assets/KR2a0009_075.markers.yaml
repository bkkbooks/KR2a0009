  - {type: variant, offset: 4082, length: 714, content: 人持兵竊自側闥入伏省中及進出因詐以太后詔召進入坐省闥讓等詰進曰天下憒憒亦非獨我曹罪也先帝嘗與太后不快幾至成敗我曹涕泣救解各出家財千萬為禮和悅上意但欲託卿門戶耳今乃欲滅我曹種族不亦太甚乎卿言省內穢濁公卿以下忠清者為誰於是尚方監渠穆拔劒斬進於嘉德殿前讓珪等為詔以故太尉樊陵為司隸校尉少府許相為河南尹尚書得詔板疑之曰請大將軍出共議中黃門以進頭擲與尚書曰何進謀反已伏誅矣進部曲將吳匡張璋素所親幸在外聞進被害欲將兵入宮宮閤閉袁術與匡共斫攻之中黃門持兵守閤會日暮術因燒南宮九龍門及東西宮欲以脅出讓等讓等入白太后言大將軍兵反燒宮攻尚書闥因將太后天子及陳留王又劫省內官屬從複道走北宮尚書盧植執戈於閣道窗下仰數段珪段珪等懼乃釋太后太后投閣得免袁紹與叔父隗矯詔召樊陵許相斬之苗紹乃引兵屯朱雀闕下捕得趙忠等斬之吳匡等素怨苗不與進同心而又疑其與宦官同謀乃令軍中曰殺大將軍者即車騎也士吏能為報讎乎進素有仁恩士卒皆流涕曰願致死匡遂引兵與董卓弟奉車都尉旻攻殺苗𠫓廾其屍於苑中紹遂閉北宮門勒兵捕宦者無少長皆殺之或有無須而誤死者至自發露然後得免死者二千餘人紹因進兵排宮或上端門屋以攻省內張讓段珪等困迫遂將帝與陳留王數十人步出穀門奔小平津公卿並出平樂觀無得從者唯尚書盧植夜馳河上王允遣河南中部掾閔貢隨植後貢至手劒斬數人餘皆投河而死明日公卿百官乃奉迎天子還宮以貢為郎中封都亭侯董卓遂廢帝又迫殺太后殺舞陽君何氏遂亡而漢室亦自此敗亂論曰竇武何進藉元舅之資據輔政之權內倚太后臨朝之威外迎羣英乘風之埶卒而事敗閹豎身死功穨為世所悲豈智不足而權有餘乎傳曰天之廢商久矣君將興之斯宋襄公所以敗於泓也贊曰武生蛇祥進自屠羊惟女惟弟來儀紫房上惛下嬖人靈動怨將糾邪慝以合人願道之屈矣代離凶困, WYG: 五考證}
