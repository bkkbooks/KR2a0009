  - {type: variant, offset: 12, length: 0, content: '', krp: 三十五袁安傳子敞𤣥孫閎袁安字邵公汝南汝陽人也祖父良習孟氏易孟喜字長卿東海人眀易為丞相掾見前書平帝時舉明經為太子舍人續漢志曰太子舍人秩比二百石無員建武初至成武令成武今曹州縣安少傳良學為人嚴重有威見敬於州里初為縣功曹續漢志曰縣功曹史主選署功勞奉檄詣從事從事因安致書於令續漢志曰每州刺史皆有從事史安曰公事自有郵驛私請則非功曹所持辭不肯受從事懼然而止懼音九具反後舉孝亷汝南先賢傳曰時大雪積地丈餘洛陽令自出案行見人家皆除雪出有乞食者至袁安門無有行路謂安已死令人除雪入戸見安僵臥問何以不出安曰大雪人皆餓不宜千人令以為賢舉為孝亷也除隂平長任城令隂平縣故城在今沂州承縣西南任城今兖州縣也所在吏人畏而愛之永平十三年楚王英謀為逆事下郡覆考眀年三府舉安能理劇拜楚郡太守是時英辭所連及繫者數千人顯宗怒甚吏案之急迫痛自誣死者甚衆安到郡不入府先往案獄理其無眀驗者條上出之府丞掾史皆叩頭爭以為阿附反虜法與同罪不可安曰如有不合太守自當坐之不以相及也遂分别具奏帝感悟即報許得出者四百餘家嵗餘徵為河南尹政號嚴明然未嘗以臧罪鞫人常稱曰凡學仕者髙則望宰相下則希牧守錮人於聖世尹所不忍為也聞之者皆感激自勵在職十年京師肅然名重朝廷建初八年遷太僕元和二年武威太守孟雲上書北虜既已和親而南部復往抄掠北單于謂漢欺之謀欲犯邊宜還其生口以安慰之詔百官議朝堂公卿皆言夷狄譎詐求欲無厭譎亦詐也既得生口當復妄自誇大不可開許安獨曰北虜遣使奉獻和親有得邊生口者輙以歸漢此明其畏威而非先違約也雲以大臣典邊不宜負信於戎狄還之足示中國優貸而使邊人得安誠便司徒桓虞改議從安太尉鄭𢎞司空第五倫皆恨之𢎞因大言激勵虞曰諸言當還生口者皆為不忠虞廷叱之倫及大鴻臚韋彪各作色變容司隸校尉舉奏安等皆上印綬謝肅宗詔報曰久議沈滯各有所志蓋事以議從策由衆定誾誾衎衎得禮之容誾誾忠正貌衎衎和樂貌寢嘿抑心更非朝廷之福君何尤而深謝其各冠履帝竟從安議明年代第五倫為司空章和元年代桓虞為司徒和帝即位竇太后臨朝后兄車騎將軍憲北擊匈奴安與太尉宋由司空任隗及九卿詣朝堂上書諫以為匈奴不犯邊塞而無故勞師逺渉損費國用徼功萬里非社稷之計書連上輙寢宋由懼遂不敢復署議而諸卿稍自引止唯安獨與任隗守正不移至免冠朝堂固爭者十上太后不聽衆皆為之危懼安正色自若竇憲既出而弟衞尉篤執金吾景各專威權公於京師使客遮道奪人財物景又擅使乘驛施檄緣邊諸郡發突騎及善騎射有才力者漁陽鴈門上谷三郡各遣吏將送詣景第有司畏憚莫敢言者安乃劾景擅發邊兵驚惑吏人二千石不待符信而輙承景檄當伏顯誅又奏司隸校尉河南尹阿附貴戚無盡節之義續漢書曰安奏司隸鄭㩀河南尹蔡嵩請免官案罪並寢不報憲景等日益横盡樹其親黨賓客於名都大郡袁山松書曰河南尹王調漢陽太守朱敞南陽太守滿殷高丹等皆其賓客前書曰十二萬戸為大郡也皆賦斂吏人更相賂遺其餘州郡亦復望風從之安與任隗舉奏諸二千石又它所連及貶秩免官者四十餘人竇氏大恨但安隗素行高亦未有以害之時竇憲復出屯武威眀年北單于為耿䕫所破遁走烏孫塞北地空餘部不知所屬憲日矜已功欲結恩北虜乃上立降者左鹿蠡王阿佟徒冬反為北單于置中郎將領護如南單于故事事下公卿議太尉宋由太常丁鴻光祿勲耿秉等十人議可許安與任隗奏以為光武招懐南虜非謂可永安内地正以權時之算可得扞禦北狄故也今朔漠既定宜令南單于反其北庭並領降衆無緣復更立阿佟以増國費宗正劉方大司農尹睦同安議事奏未以時定安懼憲計遂行乃獨上封事曰臣聞功有難圖不可豫見事有易斷較然不疑伏惟光武皇帝本所以立南單于者欲安南定北之策也恩徳甚備故匈奴遂分邊境無患孝明皇帝奉承先意不敢失墜赫然命將爰伐塞北至于章和之初降者十萬餘人議者欲置之濱塞東至遼東濱邊也太尉宋由光祿勲耿秉皆以為失南單于心不可先帝從之陛下奉承鴻業大開疆宇大將軍遠師討伐席卷北庭此誠宣明祖宗崇立𢎞勲者也宜審其終以成厥初伏念南單于屯先父舉衆歸徳自䝉恩以來四十餘年三帝積累以遺陛下陛下深宜遵述先志成就其業況屯首唱大謀空盡北虜輟而弗圖更立新降以一朝之計違三世之規失信於所養建立於無功由秉實知舊議而欲背棄先恩夫言行君子之樞機易曰言行者君子之樞機樞機之發榮辱之主也賞罰理國之綱紀論語曰言忠信行篤敬雖蠻貊行焉今若失信於一屯則百蠻不敢復保誓矣又烏桓鮮卑新殺北單于凡人之情咸畏仇讐今立其弟則二虜懐怨兵食可廢信不可去論語孔子曰足食足兵人信之矣必不得已而去於斯三者何先曰去兵曰必不得已而去於斯二者何先曰去食自古皆有死人無信不立且漢故事供給南單于費直嵗億九十餘萬西域嵗七千四百八十萬今北庭彌遠其費過倍是乃空盡天下而非建策之要也詔下其議安又與憲更相難折憲險急負埶言辭驕訐訐謂發揚人之惡至詆毁安稱光武誅韓歆戴渉故事安終不移大司徒歆坐非帝讀隗囂書自殺大司徒渉坐殺太倉令下獄死憲竟立匈奴降者右鹿蠡王於除鞬為單于鞬音九言反後遂反叛卒如安策安以天子㓜弱外戚擅權每朝會進見及與公卿言國家事未嘗不噫嗚流涕噫音醫又乙戒反嗚音一故反歎傷之貌也自天子及大臣皆恃頼之四年春薨朝廷痛惜焉後數月竇氏敗帝始親萬機追思前議者邪正之節乃除安子賞為郎策免宋由以尹睦為太尉劉方為司空睦河南人薨於位方平原人後坐事免歸自殺初安父没母使安訪求葬地道逢三書生問安何之安為言其故生乃指一處云葬此地當世為上公湏㬰不見安異之於是遂葬其所占之地故累世隆盛焉安子京敞最知名京字仲譽習孟氏易作難記三十萬言初拜郎中稍遷侍中出為蜀郡太守子彭字伯楚少傳父業歷廣漢南陽太守順帝初為光禄勲行至清為吏麤𫀆糲食終於議郎尚書胡廣等追表其有清絜之羙比前朝貢禹第五倫貢禹元帝御史大夫經明行修清絜憂國也未䝉顯贈當時皆嗟歎之彭弟湯字仲河少傳家學諸儒稱其節多歴顯位桓帝初為司空以豫議定策封安國亭侯食邑五百戸累遷司徒太尉以災異䇿免卒諡曰康侯風俗通曰湯時年八十六有子十二人湯長子成左中郎早卒次子逢嗣逢字周陽以累世三公子寛厚篤信著稱於時靈帝立逢以太僕豫議増封三百戸後為司空卒於執金吾朝廷以逢嘗為三老特優禮之賜以珠畫特詔祕器前書曰董賢死以砂畫棺音義云以朱砂畫之也珠與朱同祕器棺也飯含珠玉二十六品穀梁傳曰貝玉曰含使五官中郎將持節奉策贈以車騎將軍印綬加號特進諡曰宣文侯子基嗣位至太僕逢弟隗少歴顯官隗字次陽先逢為三公時中常侍袁赦隗之宗也用事於中以逢隗世宰相家推崇以為外援故袁氏貴寵於世富奢甚不與它公族同獻帝初隗為太傅成子紹逢子術自有傳董卓忿紹術背已遂誅隗及術兄基等男女二十餘人敞字叔平少傳易經教授以父任為太子舍人和帝時歴位將軍大夫侍中出為東郡太守徵拜太僕光禄勲元初三年代劉愷為司空明年坐子與尚書郎張俊交通漏洩省中語策免敞亷勁不阿權貴失鄧氏㫖遂自殺張俊者蜀郡人有才能兄龕竝為尚書郎年少勵鋒氣郎朱濟丁盛立行不修俊欲舉奏之二人聞恐因郎陳重雷義往請俊俊不聽因共私賂侍史使求俊短得其私書與敞子遂封上之皆下獄當死俊自獄中占獄吏上書自訟占謂口授也前書曰陳遵憑几口占書吏是也書奏而俊獄已報謂奏報論死也廷尉將出榖門臨行刑穀門洛陽城北面中門也鄧太后詔馳騎以減死論俊假名上書謝曰臣孤恩負義自䧟重刑情斷意訖無所復望廷尉鞠遣歐音一口反刀在前棺絮在後魂魄飛揚形容已枯陛下聖澤以臣嘗在近密謂為尚書郎識臣狀貌傷臣眼目留心曲慮特加徧覆喪車復還白骨更肉披棺發槨起見白日天地父母能生臣俊不能使臣俊當死復生陛下徳過天地恩重父母誠非臣俊破碎骸骨舉宗腐爛所報萬一臣俊徒也不得上書不勝去死就生驚喜踊躍觸冒拜章當時皆哀其文朝廷由此薄敞罪而隠其死以三公禮葬之復其官子盱況于反盱後至光禄勲時大將軍梁冀擅朝内外莫不阿附唯盱與廷尉邯鄲義正身自守及桓帝誅冀使盱持節收其印綬事已具梁冀傳閎字夏甫彭之孫也少勵操行苦身修節父賀為彭城相風俗通曰賀字元服祖父京為侍中安帝始加元服百僚會賀臨莊垂出而孫適生喜其嘉㑹因名字焉閎往省謁變名姓徒行無旅既至府門連日吏不為通會阿母出見閎驚謝承書曰乳母從内出見在門側面貌省瘐為其垂泣閎厚丁寧此間不知吾愼勿宣露也入白夫人乃密呼見既而辭去賀遣車送之閎稱眩疾不肯乘反郡界無知者及賀卒郡閎兄弟迎喪不受賻賵縗絰扶柩冒犯寒露體貌枯毁手足血流見者莫不傷之服闋累徵聘舉召皆不應居處側陋以耕學為業從父逢隗竝貴盛數饋之無所受閎見時方險亂而家門富盛常對兄弟歎曰吾先公福祚後世不能以徳守之而競為驕奢與亂世爭權此即晉之三郤矣三郤謂郤錡郤犫郤至皆晉卿也各驕奢為厲公所殺事見左傳延熹末黨事將作閎遂散髪絶世欲投迹深林以母老不宜遠遁乃築土室四周於庭不為戸自牖納飲食而已旦於室中東向拜母母思閎時徃就視母去便自掩閉兄弟妻子莫得見也及母殁不為制服設位時莫能名或以為狂生潛身十八年黄巾賊起攻没郡縣百姓驚散閎誦經不移賊相約語不入其閭鄉人就閎避難皆得全免年}
  - {type: variant, offset: 14, length: 2, content: 九竇, WYG: 七卒於土室汝南先賢傳曰閎臨卒敇其子曰勿設殯棺但著禈衫䟽布單衣幅巾襯尸於板牀之上以五百墼為藏二弟忠𢎞節操皆亞於閎忠字正甫與同郡范滂為友俱證黨事得釋語在滂傳初平中為沛相沛王琮相也琮光}
