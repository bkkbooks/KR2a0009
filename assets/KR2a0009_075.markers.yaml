  - {type: variant, offset: 2259, length: 0, content: '', WYG: 坐法當下獄和帝思榮忠節左轉共令共縣名屬河内郡故城在今衞州共城縣東即古共國也歲餘復以為山陽太守所歴郡縣皆見稱紀以老病乞身卒于家詔特賜錢二十萬除子男興為郎中興少有名譽永寧中尚書陳忠上疏薦興曰臣伏惟古者帝王有所號令言必𢎞雅辭必溫麗垂於後世列於典經故仲尼嘉唐虞之文章從周室之郁郁論語孔子曰大哉堯之為君也煥乎其有文章又曰周監於二代郁郁乎文哉吾從周臣竊見}
  - {type: page-break, offset: 2259, content: '', id: KR2a0009_WYG_075-21a, image: WYG0253/WYG0253-0066c.png}
  - {type: variant, offset: 2259, length: 0, content: '', krp: 坐法當下獄和帝思榮忠節左轉共令共縣名屬河内郡故城在今衞州共城縣東即古共國也歲餘復以為山陽太守所歴郡縣皆見稱紀以老病乞身卒于家詔特賜錢二十萬除子男興為郎中興少有名譽永寧中尚書陳忠上疏薦興曰臣伏惟古者帝王有所號令言必𢎞雅辭必溫麗垂於後世列於典經故仲尼嘉唐虞之文章從周室之郁郁論語孔子曰大哉堯之為君也煥乎其有文章又曰周監於二代郁郁乎文哉吾從周臣竊見}
  - {type: variant, offset: 2260, length: 1, content: 和, WYG: 禄郎周興光禄主郎故曰光禄郎孝友之行著於閨門清厲之志聞於州里蘊匵古今博物多聞蘊藏也匵匱也三墳之篇五典之策無所不覽伏羲神農黄帝之書曰三墳少昊顓頊高辛唐虞之書曰五典也屬文著辭有可觀採尚書出納帝命為王喉舌尚書為王之喉舌官也李固對策曰今陛下有尚書猶天之有北斗也北斗為天之喉舌尚書亦為陛下之喉舌也臣等既愚闇而諸郎多文俗吏鮮有雅才每為詔文宣示内外轉相求請或以不能而專已自由辭多鄙固興抱竒懐能隨軰栖遲誠可歎惜詔乃拜興為尚書郎卒興子景景字仲饗辟大將軍梁冀府稍遷豫州刺史河内太守好賢愛士其拔才薦善常恐不及每至歲時延請舉吏入上後堂與共宴㑹如此數四乃遣之贈送什物無不充備既而選其父兄子弟事相優異嘗稱曰臣子同貫若之何不厚先是司徒韓演在河内志在無私舉吏當行一辭而已恩亦不及其家曰我舉若可矣豈可令徧積一門故當時論者議此}
