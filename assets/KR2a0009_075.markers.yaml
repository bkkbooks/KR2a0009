  - {type: variant, offset: 40, length: 0, content: '', WYG: 王朗徒從整飾心嫌之遂稱病自絶王朗字景興肅之父也魏志有傳謝承書曰忠乘船載笠蓋詣朗見朗左右僮從皆着青綘采衣非其奢麗即辭疾發而退也後孫策破㑹稽忠等浮海南投交阯獻帝都許徵為衞尉未到卒𢎞字邵甫耻其門族貴埶乃變姓名徒歩師門不應徵辟終於家謝承書曰𢎞嘗入京師太學其從父逢為太尉呼𢎞與相見遇逢宴會作樂𢎞伏稱頭痛不聽音聲而退遂不復往紹術兄弟亦不與通忠子祕為郡門下議生黄巾起祕從太守趙謙擊之軍敗祕與功曹封觀等七人以身扞刃皆死於陳謙以得免詔祕等門閭號曰七賢謝承書曰祕字永寜封觀與主簿陳端門下督范仲禮賊曹劉偉徳主記史丁子嗣記室史張仲然議生袁祕等七人擢刃突陳與戰並死也封觀者有志節當舉孝亷以兄名位未顯耻先受之遂稱風疾喑不能言火起觀屋徐出避之忍而不告後數年兄得舉觀乃稱損而仕郡焉謝承書曰觀字孝起南頓人也論曰陳平多隂謀而知其後必廢丞相陳平為高祖謀臣出六竒歎曰我多隂謀道家之所禁吾世即廢以吾多隂謀禍也其後曽孫掌以衞氏親戚貴逹願得續封而終不得也邴吉有隂徳夏侯勝識其當封及子孫}
