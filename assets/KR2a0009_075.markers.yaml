  - {type: variant, offset: 1385, length: 10, content: 令武乃奏免黃門令魏彪, WYG: 不和萬人失所朝廷望公思惟得失與國同心而託病自絜求去重任誰當與吾同憂責者非有望於斷金也斷金解在皇后紀司徒固疾司空年老時司徒劉方司空張奮也公其傴僂勿露所敕傴僂言恭敬從命也左氏傳曰一命而僂再命而傴三命而俯酺惶恐詣闕謝還復視事酺雖在公位而父常居田里酺每有遷職輙一詣京師嘗來候酺適㑹嵗節公卿罷朝俱詣酺府奉酒上壽極歡卒日衆人皆慶羡之及父卒既葬詔遣使齎牛酒為釋服後}
