  - {type: variant, offset: 296, length: 228, content: 世逢文武之化豈敢懷祿逃罪不竭其誠陛下初從藩國爰登聖祚天下逸豫謂當中興自即位以來未聞善政梁孫寇鄧雖或誅滅而常侍黃門續為禍虐欺罔陛下競行譎詐自造制度妄爵非人朝政日衰姦臣日彊伏尋西京放恣王氏佞臣執政終喪天下今不慮前事之失復循覆車之軌臣恐二世之難必將復及趙高之變不朝則夕近者姦臣牢脩造設黨議遂收前司隸校尉李膺太僕杜密御史中丞陳翔太尉掾范滂等逮考連及數百人曠年拘錄事無効驗臣惟膺等建忠抗節志經王室此誠陛下稷伊呂之佐而虛為姦臣賊子之所誣枉天下寒心海內失望惟陛下留神澄省, WYG: 禮東觀記曰}
