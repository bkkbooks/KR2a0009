  - {type: variant, offset: 176, length: 0, content: '', WYG: 數月出為東郡太守酺自以嘗經親近未悟見出意不自得悟曉也上疏辭曰臣愚以經術給事左右少不更職不曉文法猥當剖符典郡班政千里必有負恩辱位之咎臣竊私自分殊不慮出城闕冀䝉留恩託備冗官羣僚所不安耳目所聞見不敢避好醜詔報曰經云身雖在外乃心不離王室尚書康王之誥曰雖爾身在外乃心㒺不在王室也典城臨民益所以報效也好醜必上不在逺近好醜為善惡也言事之善惡必以聞上此即報效豈拘外内也今賜裝三十萬其亟之官酺雖儒者而}
