  - {type: variant, offset: 190, length: 2, content: 覺悟, WYG: 至死盜徒皆飢寒傭保何足窮其法乎郡吏王青者謝承書曰青字公然東都聊城人也祖父翁與前太守翟義起兵攻王莽及義敗餘衆悉降翁獨守節力戰莽遂燔燒之父隆建武初為都尉功曹青為小史與父俱從都尉行縣道遇賊隆以身衞全都尉遂死於難青亦被矢貫咽音聲流喝流或作嘶喝音一介反廣蒼曰聲之幽也前郡守以青身有金夷竟不能舉夷傷也酺見之歎息曰豈有一門忠義而爵賞不及乎遂擢用極右曹漢官儀曰督郵功曹郡之極位}
