  - {type: variant, offset: 3117, length: 473, content: 碩計而以其書示進進乃使黃門令收碩誅之因領其屯兵袁紹復說進曰前竇武欲誅內寵而反為所害者以其言語漏泄而五營百官服畏中人故也今將軍既有元舅之重而兄弟並領勁兵部曲將吏皆英俊名士樂盡力命事在掌握此天贊之時也將軍宜一為天下除患名垂後世雖周之申伯何足道哉今大行在前殿將軍宜受詔領禁兵不宜輕出入宮省進甚然之乃稱疾不入陪喪又不送山陵遂與紹定籌策而以其計白太后太后不聽曰中官統領禁省自古及今漢家故事不可廢也且先帝新𠫓廾天下我柰何楚楚與士人對共事乎進難違太后意且欲誅其放縱者紹以為中官親近至尊出入號令今不悉廢後必為患而太后母舞陽君及苗數受諸宦官賂遺知進欲誅之數白太后為其障蔽又言大將軍專殺左右權以弱社稷太后疑以為然中官在省闥者或數十年封侯貴寵膠固內外進新當重任素敬憚之雖外收大名而內不能斷故事久不決紹等又為畫策多召四方猛將及諸豪傑使並引兵向京城以脅太后進然之主簿陳琳入諫曰易稱即鹿無虞諺有掩目捕雀夫微物尚不可欺以得志況國之大事其可以詐立乎今將軍總皇威握兵要龍驤虎步高下在心此猶鼓洪爐燎毛髮耳夫違經合道天人所順而反委釋利器更徵外助大兵聚會彊者為雄所謂倒持干戈授人以柄功必, WYG: 師}
