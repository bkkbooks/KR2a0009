  - {type: variant, offset: 635, length: 385, content: 內幹心膂宜以次貶黜案罪糾罰抑奪宦官欺國之封案其無狀誣罔之罪信任忠良平決臧否使邪正毀譽各得其所寶愛天官唯善是授如此咎徵可消天應可待閒者有嘉禾芝草黃龍之見夫瑞生必於嘉士福至實由善人在德為瑞無德為灾陛下所行不合天意不宜稱慶書奏因以病上還城門校尉槐里侯印綬帝不許有詔原李膺杜密等自黃門北寺若盧都內諸獄繫囚罪輕者皆出之其冬帝崩無嗣武召侍御史河閒劉儵參問其國中王子侯之賢者儵稱解瀆亭侯宏武入白太后遂徵立之是為靈帝拜武為大將軍常居禁中帝既立論定策功更封武為聞喜侯子機渭陽侯拜侍中兄子紹鄠侯遷步兵校尉紹弟靖西鄉侯為侍中監羽林左騎武既輔朝政常有誅翦宦官之意太傅陳蕃亦素有謀時共會朝堂蕃私謂武曰中常侍曹節王甫等自先帝時操弄國權濁亂海內百姓匈匈歸咎於此今不誅節等後必難圖武深然之蕃大喜以手推席而起武於是引同志尹勳為尚書令劉瑜為侍中馮述為屯騎校尉又徵天下名士廢黜者前司隸李膺宗正劉猛太僕杜密廬江, WYG: ''}
