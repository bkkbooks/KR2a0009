  - {type: variant, offset: 2359, length: 294, content: 使進弟河南尹苗出擊之苗攻破羣賊平定而還詔遣使者迎於成皐拜為車騎將軍封濟陽侯五年天下滋亂望氣者以為京師當有大兵兩宮流血大將軍司馬許涼假司馬伍宕說進曰太公六韜有天子將兵事可以威厭四方進以為然入言之於帝於是乃詔進大發四方兵講武於平樂觀下起大壇上建十二重五采華蓋高十丈壇東北為小壇復建九重華蓋高九丈列步兵騎士數萬人結營為陳天子親出臨軍駐大華蓋下進駐小華蓋下禮畢帝躬擐甲介馬稱無上將軍行陳三匝而還詔使進悉領兵屯於觀下是時置西園八校尉以小黃門蹇碩為上軍校尉虎賁中郎將袁紹為中軍校尉屯騎都尉鮑鴻為下軍校尉議郎曹操為典軍校尉趙融為助軍校尉淳于瓊為佐軍校尉又有左右校尉帝以蹇碩壯健而有武略特親任之以為元帥督, WYG: 召}
