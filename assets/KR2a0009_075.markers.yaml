  - {type: variant, offset: 1382, length: 0, content: '', WYG: 太伯母號祁夫人之類也文母文王之妻也詩曰既右烈考亦右文母今嚴威既行皆言當死不復顧其前後考折厥衷臣伏見夏陽侯瓌每存忠善前與臣言常有盡節之心檢敇賓客未嘗犯法臣聞王政骨肉之刑有三宥之義過厚不過薄禮記曰公族有罪獄成有司讞於公曰某之罪在大辟公曰宥之有司又曰在大辟公又曰宥之有司又曰在大辟公又曰宥之及三宥不對走出致刑于甸人公又使人追之曰雖然必宥之有司曰無及也反命於公公素服如其倫之喪也劉攽曰案今禮記文注多下公又曰宥之五字今議者}
