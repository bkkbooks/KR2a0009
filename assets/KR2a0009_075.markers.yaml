  - {type: variant, offset: 1383, length: 1, content: 洛, WYG: 瓌選嚴能相恐其迫切必不完免宜裁加貸宥以崇厚徳和帝感酺言徙瓌封就國而已永元五年遷酺為太僕數月代尹睦為太尉漢官儀曰睦字伯師河南鞏人也數上疏以疾乞身薦魏郡太守徐防自代帝不許使中黄門問病加以珍羞賜錢三十萬酺遂稱篤時子蕃以郎侍講帝因令小黄門敕蕃曰隂}
