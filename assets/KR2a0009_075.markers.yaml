  - {type: variant, offset: 1747, length: 1, content: 護, WYG: 從昆弟鄉里益高之初為郡功曹太守葛興中風病不能聽政棱隂代興視事出入二年令無違者興子嘗發教欲署吏棱拒執不從因令怨者章之章謂令上章告言之事下案驗吏以棱掩蔽興病專典郡職遂致禁錮顯宗知其忠後詔特原之由是徵辟五遷為尚書令與僕射郅壽尚書陳寵同時俱以才能稱肅宗嘗賜諸尚書劔唯此三人特以寳劒自手署其名曰韓棱楚龍淵晉太康記曰汝南西平縣有龍泉水可淬刀劒特堅利汝南即楚分野郅壽蜀漢文陳寵濟南椎成椎音直追反漢官椎成作鍜成時論者為之説以棱淵深有謀故得龍淵壽明逹有文章故得漢文寵敦朴善不見外故得椎成和帝即位侍中竇憲使人刺殺齊殤王子都鄉侯暢於上東門有司畏憲咸委疑於暢兄弟詔遣侍御史之齊案其事棱上疏以為賊在京師不宜捨近問遠恐為姦臣所笑竇太后怒以切責棱棱固執其議及事發果如所言憲惶恐白太后求出擊北}
