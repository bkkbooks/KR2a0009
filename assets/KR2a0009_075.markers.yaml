  - {type: variant, offset: 1374, length: 2, content: 劉祐, WYG: 奏免執金吾竇景景後復位遣掾夏猛私謝酺曰鄭據小人為所侵寃聞其兒為吏放縱狼籍取是曹子一人足以驚百酺大怒即收猛繫獄檄言執金吾府疑猛與據子不平矯稱卿意以報私讐㑹有贖罪令猛乃得出東觀記曰據字平卿黎陽人也為侍御史轉司𨽻校尉也頃之徵入}
