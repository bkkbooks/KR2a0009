  - {type: variant, offset: 3886, length: 195, content: 告諸州郡詐宣進意使捕案中官親屬進謀積日頗泄中官懼而思變張讓子婦太后之妹也讓向子婦叩頭曰老臣得罪當與新婦俱歸私門惟受恩累世今當遠離宮殿情懷戀戀願復一入直得暫奉望太后陛下顏色然後退就溝壑死不恨矣子婦言於舞陽君入白太后乃詔諸常侍皆復入直八月進入長樂白太后請盡誅諸常侍以下選三署郎入守宦官廬諸宦官相謂曰大將軍稱疾不臨喪不送葬今欻入省此意何為竇氏事竟復起邪又張讓等使人潛聽具聞其語乃率常侍段珪畢嵐等數, WYG: 卷七}
