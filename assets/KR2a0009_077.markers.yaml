  - {type: variant, offset: 795, length: 0, content: '', krp: 多獲生口超既破番辰欲進攻龜兹以烏孫兵彊宜因其力乃上言烏孫大國控弦十萬故武帝妻以公主烏孫國居赤谷城去長安八千九百里武帝元封中以江都王建女細君為公主以妻烏孫贈送甚盛烏孫以為右夫人至孝宣皇帝卒得其用西域傳曰宣帝即位烏孫遣使上書言匈奴連發大兵侵擊烏孫欲隔絶漢烏孫願發國半精兵五萬騎盡力擊匈奴唯天子出兵以救公主漢大發十五萬騎五將軍分道並出烏孫以五萬騎從西方入至右谷蠡王庭獲四萬餘級馬牛羊七十餘萬今可遣使招慰與共合力帝納之八年拜超為將兵長史假鼓吹幢麾將兵長史解見和帝紀平帝元始二年使謁者大司馬掾持節行邊兵遣執金吾候陳茂假以鉦鼓古今樂録曰横吹胡樂也張騫入西域傳其法於長安唯得摩訶兠勒一曲李延年因之更造新聲二十八解乘輿以為武樂後漢以給邊將萬人將軍得之在俗用者有黄鵠隴頭出關入關出塞入塞折楊栁黄覃子赤之楊望行人十曲劉熙釋名曰幢童也其貌童童然蔡邕月令章句曰羽鳥翼也以為旌幢麾也横吹麾幢皆大將所有超非大將故言假以徐幹為軍司馬别遣衞候李邑護送烏孫使者賜大小昆彌以下錦帛前書曰烏孫國王先號昆莫名獵驕靡後書昆彌云後代取昆字靡彌聲相近音有輕重耳昆莫既死子孫争國漢令立元貴靡為大昆彌烏就屠為小昆彌賜印綬故有大小昆彌之號焉李邑始到于寘而値龜兹攻疏勒恐懼不敢前因上書陳西域之功不可成又盛毁超擁愛妻抱愛子安樂外國無内顧心超聞之歎曰身非曾參而有三至之䜛恐見疑於當}
  - {type: variant, offset: 796, length: 3, content: 北中郎, WYG: 矣三至解見宼榮傳遂去其妻帝知超忠乃切責邑曰縱超擁愛妻抱愛子思歸之士千餘人何能盡與超同心乎令邑詣超受節度詔超若邑任在外者便留與從事超即遣邑}
