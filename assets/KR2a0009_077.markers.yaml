  - {type: variant, offset: 800, length: 6, content: 盧植及東中郎, WYG: 烏孫侍子還京師徐幹謂超曰邑前親毁君欲敗西域今何不縁詔書留之更遣他吏送侍子乎超曰是何言之陋也以邑毁超故今遣之内省不疚何䘏人言疚病也䘏憂也論語孔子曰内省不疚夫何憂何懼左氏傳曰詩云禮義不愆何恤乎人之言詩謂逸詩也快意留之非忠臣也明年復遣假司馬和恭等四人}
