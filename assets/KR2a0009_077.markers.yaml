  - {type: variant, offset: 949, length: 2, content: 築京, WYG: 不動中國不煩戎士得逺夷之和同異俗之心而致天誅蠲宿耻以報將士之讐致猶至也蠲除也司馬法曰賞不踰月欲人速覩為善之利也其封超為定逺侯邑千户東}
  - {type: variant, offset: 949, length: 2, content: 築京, krp: 不動中國不煩戎士得逺夷之和同異俗之心而致天誅蠲宿耻以報將士之讐致猶至也蠲除也司馬法曰賞不踰月欲人速覩為善之利也其封超為定逺侯邑千户東}
  - {type: variant, offset: 952, length: 0, content: '', WYG: 記曰其以漢中郡南鄭之西鄉户千封超為定逺侯故城在今洋州西鄉縣南超自以久在絶域年老思土十二年上疏曰臣聞太公封齊五世葬周狐死首丘代馬依風禮記曰太公封}
  - {type: page-break, offset: 952, content: '', id: KR2a0009_WYG_077-14a, image: WYG0253/WYG0253-0087c.png}
  - {type: variant, offset: 952, length: 0, content: '', krp: 記曰其以漢中郡南鄭之西鄉户千封超為定逺侯故城在今洋州西鄉縣南超自以久在絶域年老思土十二年上疏曰臣聞太公封齊五世葬周狐死首丘代馬依風禮記曰太公封}
  - {type: variant, offset: 953, length: 2, content: 城南, WYG: 營丘比及五世皆反葬於周君子曰樂樂其所自生禮不亡其本古之人有言曰狐死正丘首仁也鄭𤣥注曰正丘首丘也代郡名在趙北韓詩外傳曰代馬依北風飛鳥掦故巢也夫周齊同在中土千里之間况於逺處絶域小臣能無依風首丘之思哉蠻夷之俗畏壯侮老案前書曰匈奴其俗壯者食肥美老者食其餘貴壯徤賤老弱也臣超犬馬齒殱常恐年衰奄忽僵仆孤魂棄捐昔蘇武留匈奴中尚十九年今臣幸得奉節帶金銀護西域金銀謂印也金印紫綬銀印青綬也如自以壽終屯部誠無所恨然恐後世或名臣為沒西域臣不敢望到酒泉郡但願生入玉門關玉門關屬敦煌郡今沙州也去長安三千六百里關在敦煌縣西北酒泉今肅州也去長安二千八百五十里也臣老病衰困冒死瞽言謹遣子勇隨獻物入塞東觀記曰時安息遣使獻大爵師子超遣子勇隨入塞也及臣生在令勇目見中土而超妺同郡曹壽妻昭亦上書請超曰妾同産兄西域都護定逺侯超幸得以微功特䝉重賞爵列通侯位二千石天恩殊絶誠非小臣所當被蒙超之始出志捐軀命冀立微功以自陳效會陳睦之變道路隔絶超以一身轉側絶域曉譬諸國因其兵衆每有攻戰輙為先登身被金夷夷傷也不避死亡賴䝉陛下神靈且得延命沙漠至今積三十年骨肉生離不復相識所與相隨時人士衆皆已物故超年最長今且七十衰老被病頭髮無黑兩手不仁不仁猶不遂也耳目不聰明扶杖乃能行雖欲竭盡其力以報塞天恩廹於嵗暮犬馬齒索蠻夷之性悖逆侮老而超旦暮入地久不見代恐開姦宄之源生逆亂之心而卿大夫咸懐一切莫肯逺慮如有卒暴超之氣力不能從心便為上損國家累世之功下棄忠臣竭力之用誠可痛也故超萬里歸誠自陳苦急延頸踰望三年於今未蒙省録踰遥也高祖踰謂黥布曰何苦而反妾竊聞古者十五受兵六十還之周禮鄉大夫職曰國中七尺以及六十野自六尺以及六十有五皆征之征謂賦稅從征役也韓詩外傳曰二十行役六十免役與周禮國中同}
