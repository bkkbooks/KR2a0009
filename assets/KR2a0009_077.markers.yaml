  - {type: variant, offset: 842, length: 6, content: 日乃閉營休士, WYG: 年超發于寘諸國兵二萬五千人復擊莎車而龜兹王遣左將軍發温宿姑墨尉頭合五萬人救之超召將校及于寘王議曰今兵少不敵其計莫若各散去于寘從是而東長史亦於此西歸可須夜鼓聲而發隂緩所得生口龜兹王聞之大喜自}
