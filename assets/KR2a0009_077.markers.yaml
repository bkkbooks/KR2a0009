  - {type: variant, offset: 959, length: 6, content: 左車騎將車領, krp: 言六十還之據國中為説也劉攽曰注即知一與周禮七尺同禮國中六十免役案文一字當作二十又下文禮國中當云周禮國中亦有休息不任職也縁陛下以至孝理天下得萬國之歡心不遺小國之臣况超得備侯伯之位故敢觸死為超求哀匄超餘年匄乞也一得生還復見闕庭使國永無勞逺之慮西域無倉卒之憂超得長䝉文王𦵏骨之恩子方哀老之恵𦵏骨解見明紀田子方魏文侯之師也見君之老馬棄之曰少盡其力老而棄之非仁也於是收而養之事見史記也詩云民亦勞止汔可小康恵此中國以綏四方詩大雅也汔其也康綏皆安也言先施恩恵於中國然後乃安四方超有書與妾生訣恐不復相見妾誠傷超以壯年竭忠孝於沙漠疲老則便捐死於曠野誠可哀憐如不蒙救護超後有一旦之變}
