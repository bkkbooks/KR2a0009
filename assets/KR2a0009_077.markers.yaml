  - {type: variant, offset: 195, length: 1, content: 方, WYG: 小欣欣貢奉不絶唯焉耆龜兹獨未服從臣前與官屬三十六人奉使絶域備遭艱戹自孤守疏勒於今五載胡夷情數臣頗識之問其城郭小大皆言倚漢與依天等以是效之則葱領可通效猶騐也西河舊事曰葱領山其上多葱因以為名葱領通則龜兹可伐今宜拜龜兹侍子白霸為其國王以歩騎數百送之與諸國連兵嵗月之間龜兹可禽以夷狄攻夷狄計之善者也前書晁錯曰以蠻夷攻蠻夷中國之利也臣見莎車疏勒田地肥廣草牧饒衍不比敦煌鄯善間也敦煌今涼州縣兵可不費中國而糧食自足且姑墨温宿二王特為龜兹所置温宿國王居温宿城去長安八千三百五十里也既非其種更相厭苦其埶必有降反若二國來降則龜兹自破願下臣章參考行事誠有}
