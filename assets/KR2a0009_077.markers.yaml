  - {type: variant, offset: 1762, length: 1, content: 嵩, WYG: 餘頭捕得軍就及匈奴持節使者將至索班沒處斬之以報其耻傳首京師永建元年更立後部故王子加特奴為王勇又使别校誅斬東且彌王亦更立其種人為王且音子余反於是車師六國悉平其冬勇發諸國兵擊匈奴呼衍王呼衍王亡走其衆二萬餘人皆降捕得單于從兄勇使加特奴手斬之以結車師匈奴之隙北單于自將萬餘騎入後部至金且谷勇使假司馬曹俊馳救之單于引去俊追斬其貴人骨都侯於是呼衍王遂徙居枯梧河上是後車師無復虜跡城郭皆安唯焉耆王元孟未降二年勇上請攻元孟於是遣敦煌太守張朗將河西四郡兵三千人配勇河西四郡金城敦煌張掖酒泉因發諸國兵四萬餘人分騎為兩道擊之勇從南道朗從北道約期俱至焉耆而朗先有罪欲徼功自贖遂先期至爵離關遣司馬將兵前戰首虜二千餘人元孟懼誅逆遣使乞降張朗徑入焉耆受降而還元孟竟}
