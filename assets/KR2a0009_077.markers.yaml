  - {type: variant, offset: 372, length: 283, content: 事已露晨夜馳勑諸方一時俱起皆著黃巾為摽幟時人謂之黃巾亦名為蛾賊殺人以祠天角稱天公將軍角弟寶稱地公將軍寶弟梁稱人公將軍所在燔燒官府劫略聚邑州郡失據長吏多逃亡旬日之閒天下嚮應京師震動詔勑州郡修理攻守簡練器械自函谷大谷廣城伊闕轘轅旋門孟津小平津諸關並置都尉召羣臣會議嵩以為宜解黨禁益出中藏錢西園廄馬以班軍士帝從之於是發天下精兵博選將帥以嵩為左中郎將持節與右中郎將朱儁共發五校三河騎士及募精勇合四萬餘人嵩儁各統一軍共討潁川黃巾儁前與賊波才戰戰敗嵩因進保長社波才引大衆圍城嵩兵少軍人皆恐乃召軍吏謂曰兵有奇變不在衆寡今賊依草結營易為風火若因夜縱燒必大驚亂吾出兵擊之四面俱合田單之, WYG: 其}
