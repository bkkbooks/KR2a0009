  - {type: variant, offset: 1599, length: 0, content: '', WYG: 中國而費難供也今車師已屬匈奴鄯善不可保信一旦反覆班將能保北虜不為邊害乎以勇為軍司馬故以將言將音子亮反勇對曰今中國置州牧者以禁郡縣姦猾盗賊也若州牧能保盗賊不起者臣亦願以要斬保匈奴之不為邊害也今通西域則虜埶必弱虜埶必弱則為患微矣劉攽曰案文此句多一必字孰與歸其府藏續其斷臂哉今置校尉以扞撫西域設長史以招懐諸國若棄而不立則西域望絶望絶之後屈就北虜縁邊之郡將受困害恐河西城門必復}
