  - {type: variant, offset: 1111, length: 154, content: 信都令漢陽閻忠干說嵩曰難得而易失者時也時至不旋踵者幾也故聖人順時以動智者因幾以發今將軍遭難得之運蹈易駭之機而踐運不撫臨機不發將何以保大名乎嵩曰何謂也忠曰天道無親百姓與能今將軍受鉞於暮春收功於末冬兵動若神謀不再計摧強易於折枯消堅甚於湯雪旬月之閒神兵電埽封尸刻石南向以報威德震本朝風聲馳海外雖湯武之舉未有高將軍者, WYG: ''}
