  - {type: variant, offset: 840, length: 1, content: 剋, WYG: 下是時月氐新與康居婚相親超乃使使多齎錦帛遺月氏王令曉示康居王康居王乃罷兵執忠以歸其國烏即城遂降於超後三年忠説康居王借兵還據損中損中未詳東觀記作蝢中續漢及華嶠書並作損中本或作植未知孰是也密與龜兹謀遣使詐降於超超内知其姦而外偽許之忠大喜即從輕騎詣超超密勒兵待之為供張設樂供音居用反張音竹亮反酒行乃叱吏縛忠斬之因擊破其衆殺七百餘人南道於是遂通}
