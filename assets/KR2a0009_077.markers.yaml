  - {type: variant, offset: 2996, length: 550, content: 及所調合五千人分從兩道而入既到州界按甲不前先遣使詣郡觀賊虛實宣揚威德以震動其心既而與七郡兵俱進逼之遂斬梁龍降者數萬人旬月盡定以功封都亭侯千五百戶賜黃金五十斤徵為諫議大夫及黃巾起公卿多薦儁有才略拜為右中郎將持節與左中郎將皇甫嵩討潁川汝南陳國諸賊悉破平之嵩乃上言其狀而以功歸儁於是進封西鄉侯遷鎮賊中郎將時南陽黃巾張曼成起兵稱神上使衆數萬殺郡守褚貢屯宛下百餘日後太守秦頡擊殺曼成賊更以趙弘為帥衆浸盛遂十餘萬據宛城儁與荊州刺史徐璆及秦頡合兵萬八千人圍弘自六月至八月不拔有司奏欲徵儁司空張溫上疏曰昔秦用白起燕任樂毅皆曠年歷載乃能克敵儁討潁川以有功效引師南指方略已設臨軍易將兵家所忌宜假日月責其成功靈帝乃止儁因急擊弘斬之賊餘帥韓忠復據宛拒儁儁兵少不敵乃張圍結壘起土山以臨城內因鳴鼓攻其西南賊悉衆赴之儁自將精卒五千掩其東北乘城而入忠乃退保小城惶懼乞降司馬張超及徐璆秦頡皆欲聽之儁曰兵有形同而埶異者昔秦項之際民無定主故賞附以勸來耳今海內一統唯黃巾造寇納降無以勸善討之足以懲惡今若受之更開逆意賊利則進戰鈍則乞降縱敵長寇非良計也因急攻連戰不剋儁登土山望之顧謂張超曰吾知之矣賊今外圍周固內營逼急乞降不受欲出不得所以死戰也萬人一心猶不可當況十萬乎其害甚矣不如徹圍并兵入城忠見圍解埶必自出出則意散易破之道也既而解圍忠果出戰儁因, WYG: ''}
