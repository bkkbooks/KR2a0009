  - {type: variant, offset: 867, length: 0, content: '', WYG: 馬畜財物莎車遂降龜兹等因各退散自是威震西域初月氐嘗助漢擊車師有功是嵗貢奉珍寳符拔師子續漢書曰符拔形似麟而無角因求漢公主超拒還其使由是怨恨永元二年月氐遣其副王謝將兵七萬攻超超衆少皆大恐超譬軍士曰月氐兵雖多然數千里踰葱領來非有運輸何足憂邪但當收榖堅守彼飢窮自降不過數十日决矣謝遂前攻超不下又鈔掠無所得超度其糧將盡必從龜兹求救乃遣兵數百於東界要之謝果遣騎齎金銀珠玉以賂龜兹超伏兵遮擊盡殺之持其使首以示謝謝大驚即遣使請罪願得生歸超縱遣之月氐由是大震嵗奉貢獻明年龜兹姑墨温宿皆降乃以超為都護徐幹為長史拜白霸為龜兹王遣司馬姚光送之超與光共脅龜兹廢其王尤利多而立白霸使光將尤利多還詣京師超居龜兹它乾城徐幹屯疏勒西域唯焉耆危須尉犁以前沒都護懐二心其餘悉定六年秋超遂發龜兹鄯善等八國兵合七萬人及吏士賈客千四百人討焉耆兵到尉犁界而遣曉説焉耆尉犁危須曰都護來者欲鎮撫三國即欲改過向善宜遣大人來迎當賞賜王侯已下大人謂其酋長事畢即還今賜王綵五百匹焉耆王廣遣其左將北鞬支奉牛酒迎超鞬音九言反超詰鞬支曰汝雖匈奴侍子而今秉國之權都護自來王不以時迎皆汝罪也或謂超可便殺之超曰非汝所及此人權重於王今未入其國而殺之遂令自疑設備守險豈得到其城下哉於是賜而遣之廣乃與大人迎超於尉犁奉獻珍物焉耆國有葦橋之險廣乃絶橋不欲令漢軍入國超更從它道厲度由帶以上為厲由膝以下為揭見爾雅也七月晦到焉耆去城二十里正營大澤中劉攽曰案文正當作止廣出不意大恐乃欲悉驅其人共入山保焉耆左候元孟先嘗質京師密遣使以事告超超即斬之示不信用乃期大會諸國王因揚聲當重加賞賜於是焉耆王廣尉犁王汎及北鞬支等三十人相率詣超其國相腹久等十七人懼誅皆亡入海十七字本或為七十而危須王亦不至坐定超怒詰廣曰危須王何故不到腹久等所縁逃亡遂叱吏士收廣汎等於}
