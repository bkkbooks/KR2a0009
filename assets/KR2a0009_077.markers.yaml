  - {type: variant, offset: 188, length: 5, content: 方猶將軍號, WYG: 伐朝鮮起𤣥菟樂浪以斷匈奴之左臂也西伐大宛結烏孫裂匈奴之右臂南面以西為右也今西域諸國自日之所入莫不向化西域傳曰自條支國乘水西行可百餘日近日所入}
