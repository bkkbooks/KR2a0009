  - {type: variant, offset: 1761, length: 0, content: '', WYG: 餘人於是前部始復開通還屯田栁中四年秋勇發敦煌張掖酒泉六千騎及鄯善疏勒車師前部兵擊後部王軍就大破之軍就名也首虜八千餘人馬畜五}
  - {type: variant, offset: 1761, length: 0, content: '', krp: 餘人於是前部始復開通還屯田栁中四年秋勇發敦煌張掖酒泉六千騎及鄯善疏勒車師前部兵擊後部王軍就大破之軍就名也首虜八千餘人馬畜五}
