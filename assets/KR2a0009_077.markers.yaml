  - {type: variant, offset: 948, length: 0, content: '', WYG: 頭更立元孟為焉耆王超留焉耆半嵗慰撫之於是西域五十餘國悉皆納質内屬焉明年下詔曰往者匈奴獨擅西域宼盗河西永平之末城門書閉先帝深愍邊氓嬰罹宼害乃命將帥擊右地破白山臨蒲類西河舊事曰白山之中有好木匈奴謂之天山去蒲類海百里郭義恭廣志曰西域有白山通嵗有雪亦名雪山破白山見明紀也取車師城郭諸國震慴響應遂開西域置都護而焉耆王舜舜子忠獨謀悖逆恃其險隘覆沒都護并及吏士先帝重元元之命憚兵役之興故使軍司馬班超安集于寘以西超遂踰葱領迄縣度迄至也縣度山名縣音𤣥謂以䋲索縣縋而過也其處在皮山國以西􅄢賔國之東也出入二十二年莫不賔從改立其王而綏其}
  - {type: page-break, offset: 948, content: '', id: KR2a0009_WYG_077-13b, image: WYG0253/WYG0253-0087b.png}
