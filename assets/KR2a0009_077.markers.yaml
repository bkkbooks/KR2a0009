  - {type: variant, offset: 1001, length: 1, content: 田, WYG: 十四年八月至洛陽拜為射聲校尉超素有胷脅疾既至病遂加帝遣中黄門問疾賜醫藥其九月卒年七十一朝廷愍惜焉使者弔祭贈賵甚厚子雄嗣初超被徴以戊巳校尉任尚為都護劉攽曰案是時但有戊校尉多已字與超交代尚謂超曰君侯在外國三十餘年而小人猥承君後任重慮淺宜有以誨之超曰年老失智任君數當大位豈班超所能及哉必不得已願進愚言塞外吏士本非孝子順孫皆以罪過徙補邊屯而蠻夷懐鳥獸之心難養易敗今君性嚴急水清無大魚察政不得下和家語孔子曰水至清則無魚人至察則無徒宜蕩佚簡易寛小過總大綱而已超去後尚私謂所親曰我以班君當有竒策今所言平平耳尚至數年而西域反亂以罪被徴如超所戒有三子長子雄累遷屯騎校尉會叛羌宼三輔詔雄將五營兵屯長安就拜京兆尹雄卒子始嗣尚清河孝王女隂城公主主順帝之姑貴驕滛亂與嬖人居帷中而召始入使伏牀下始積怒永建五年遂拔刃殺主帝大怒腰斬始同産皆棄市超少子勇勇字宜僚少有父風永初元年西域反叛以勇為軍司馬與兄雄俱出敦煌迎都護及西域甲卒而還因罷都護後西域絶無漢吏十餘年元初六年敦煌太守曹宗遣長史索班將千餘人屯伊吾車師前王及鄯善王皆來降班後數月北單于與車師後部遂共攻沒班進撃走前王畧有北道鄯善王急求救於曹宗宗因此請出兵五千人擊匈奴報索班之耻因復取西域鄧太后召勇詣朝堂會議先是公卿多以為宜閉玉門關遂棄西域勇上議曰昔孝武皇帝患匈奴彊盛兼總百蠻以逼障塞於是開通西域離其黨與論者以為奪匈奴府藏斷其右臂遭王莽簒盗徴求無厭胡夷忿毒遂以背叛光武中興未遑外事故匈奴負彊驅率諸國及至永平再攻敦煌河西諸郡城門晝閉孝明皇帝深惟廟策古者謀事必就祖故言廟策也乃命虎臣出征西域毛詩曰進厥虎臣闞如虓虎故匈奴逺遁邊境得安及至永元莫不内屬會間者羌亂西域復絶北虜遂遣責諸國備其逋}
