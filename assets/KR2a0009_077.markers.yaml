  - {type: variant, offset: 4073, length: 176, content: 也儁曰副相國非臣所堪也遷都計非事所急也辭所不堪言所非急臣之宜也使者曰遷都之事不聞其計就有未露何所承受儁曰相國董卓具為臣說所以知耳使人不能屈由是止不為副卓後入關留儁守洛陽而儁與山東諸將通謀為內應既而懼為卓所襲乃𠫓廾官奔荊州卓以弘農楊懿為河南尹守洛陽儁聞復進兵還洛懿走儁以河南殘破無所資乃東屯中牟移書州郡請師討卓徐州刺史陶謙遣精兵三千餘州郡稍有所給謙乃上儁, WYG: 熙}
