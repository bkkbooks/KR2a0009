  - {type: variant, offset: 1947, length: 208, content: 守固備非九地之陷也王國雖強而攻我之所不救非九天之埶也夫埶非九天攻者受害陷非九地守者不拔國今已陷受害之地而陳倉保不拔之城我可不煩兵動衆而取全勝之功將何救焉遂不聽王國圍陳倉自冬迄春八十餘日城堅守固竟不能拔賊衆疲敝果自解去嵩進兵擊之卓曰不可兵法窮寇勿迫追歸衆勿追迫今我追國是迫歸衆追窮寇也困獸猶鬬蜂蠆有毒況大衆乎嵩曰不然前吾不擊避其銳也今而擊之待其衰也所擊疲師非歸衆也國衆且走莫有鬬志以整擊亂非窮寇也遂獨進擊之使卓為後拒連, WYG: 慬等出}
