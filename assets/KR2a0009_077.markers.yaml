  - {type: variant, offset: 187, length: 0, content: '', WYG: 人與共飲酒酣因激怒之曰卿曹與我俱在絶域曹輩也欲立大功以求富貴今虜使到裁數日而王廣禮敬即廢如令鄯善收吾屬送匈奴骸骨長為豺狼食矣為之奈何官屬皆曰今在危亡之地死生從司馬超曰不入虎穴不得虎子當今之計獨有因夜以火攻虜使彼不知我多少必大震怖可殄盡也滅此虜則鄯善破膽功成事立矣衆曰當與從事議之超怒曰吉凶決於今日從事文俗吏聞此必恐而謀泄死無所名非壯士也衆曰善初夜遂將吏士往奔虜營會天大風超令十人持鼓藏虜舍後約曰見火然皆當鳴鼓大呼餘人悉持兵弩夾門而伏超乃順風縱火前後鼓噪虜衆驚亂超手格殺三人吏兵斬其使及從士三十餘級餘衆百許人悉燒死東觀記曰斬得匈奴節使屋賴帶副使比離支首及節也明日乃還告郭恂恂大驚既而色動超知其意舉手曰掾雖不行班超何心獨擅之乎恂乃悦超於是召鄯善王廣以虜使首示之一國震怖超曉告撫慰遂納子為質還奏於竇固固大喜具上超功效并求更選使使西域帝壯超節詔固曰吏如班超何故不遣而更選乎今以超為軍司馬令遂前功超復受使固欲益其兵超曰願將本所從三十餘人足矣如有不虞多益為累是時于寘王廣徳新攻破莎車遂雄張南道于寘國去長安九千六百七十里南與婼羌西與姑墨接莎車國去長安九千九百五十里西域南北有大山中央有河東西六千餘里東至玉門陽關有兩道從鄯善傍南山北波河西行至莎車為南道雄張猶熾盛也張音丁亮反波傍也波音詖而匈奴遣使監護其國超既西先至于寘廣徳禮意甚疎且其俗信巫巫言神怒何故欲向漢漢使有騧馬急求取以祠我廣徳乃遣使就超請馬續漢及華嶠書騧字並作騩説文馬淺黒色也音京媚反超密知其狀報許之而令巫自來取馬有頃巫至超即斬其首以送廣徳因辭讓之廣徳素聞超在鄯善誅滅虜使大惶恐即攻殺匈奴使者而降超超重賜其王以下因鎮撫焉時龜兹王建為匈奴所立倚恃虜威據有北道攻破疏勒殺其王龜兹國居居延城去長安七千四百八十里南與精絶東與且末北與烏孫西與姑墨接前書音義龜兹音丘兹今龜音丘勿反兹音沮惟反盖急言耳自車師前王庭隨北山波河西行至疏勒為北道疏勒國居疏勒城去長安九千三百五十里也而立龜兹人兠題為疏勒王眀年春超從間道至疏勒去兠題所居槃橐城九十里逆遣吏田慮先往降之勑慮曰兠題本非疏勒種國人必不用命若不即降便可執之慮既到兠題見慮輕弱殊無降意慮因其無備遂前刧縛兠題左右出其不意皆驚懼奔走慮馳報超超即赴之悉召疏勒將吏説以龜兹無道之狀因立其故王兄子忠為王續漢書曰求得故王兄子榆勒立之更名曰忠也國人大悦忠及官屬皆請殺兠題超不聼欲示以威信釋而遣之疏勒由是與龜兹結怨十八年帝崩焉耆以中國大喪焉耆國居員渠城去長安七千三百里北與烏孫接遂攻沒都護陳睦超孤立無援而龜兹姑墨數發兵攻疏勒姑墨國王居南城去長安八千一百五十里超守槃橐城與忠為首尾士吏單少拒守嵗餘肅宗初即位以陳睦新沒恐超單危不能自立下詔徴超超發還疏勒舉國憂恐其都尉黎弇曰漢使棄我我必復為龜兹所滅耳誠不忍見漢使去因以刀自剄超還至于寘王侯以下皆號泣曰依漢使如父母誠不可去互抱超馬脚不得行超恐于寘終不聼其東又欲遂本志乃更還疏勒疏勒兩城自超去後復降龜兹而與尉頭連兵尉頭國居尉頭谷去長安八千六百五十里南與疏勒接衣服類烏孫也超捕斬反者擊破尉頭殺六百餘人疏勒復安建初三年超率疏勒康居于寘拘彌兵一萬人攻姑墨石城破之康居國去長安萬二千三百里不屬都護斬首七百級超欲因此叵平諸國叵猶遂也乃上疏請兵曰臣竊見先帝欲開西域故北擊匈奴西使外國鄯善于寘即時向化今拘彌莎車疏勒月氏烏孫康居復願歸附欲共并力破滅龜兹平通漢道若得龜兹則西域未服者百分之一耳臣伏自惟念卒伍小吏實願從谷吉效命絶域庶幾張騫棄身曠野谷吉長安人永之父也元帝時為衛司馬使送郅支單于侍子為郅支所殺張騫武帝時為郎使月氏為匈奴所閉留之十餘嵗乃亡走大宛窮急即射禽獸給食昔魏絳列國大夫尚能和輯諸戎魏絳晉大夫晉悼公時山戎使孟樂如晉因魏絳納虎豹之皮請和諸戎公悦使魏絳盟諸戎事見左傳輯亦和也况臣奉大漢之威而無鉛刀一割之用乎賈誼曰莫邪為鈍兮鉛刀為銛楚詞曰捐棄太阿寳鉛刀兮前世議者皆曰取三十六國號為斷匈奴右臂前書曰漢遣公主為烏孫夫人結為昆弟則是斷匈奴右臂也哀帝時劉歆上議曰武帝時立五屬國起朔}
