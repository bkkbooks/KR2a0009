  - {type: variant, offset: 2684, length: 164, content: 門無留客時人皆稱而附之堅壽亦顯名後為侍中辭不拜病卒朱儁字公偉會稽上虞人也少孤母嘗販繒為業儁以孝養致名為縣門下書佐好義輕財鄉閭敬之時同郡周規辟公府當行假郡庫錢百萬以為冠幘費而後倉卒督責規家貧無以備儁乃竊母繒帛為規解對母既失產業深恚責之儁曰小損當大益初貧後富必然理也本縣長山陽度尚見而奇之薦於太守韋毅稍歷郡職後太守尹端以儁為主簿熹平, WYG: ''}
