  - {type: variant, offset: 4700, length: 3, content: 持節鎮, WYG: 龎雄與耿䕫共撃匈奴奥鞬日逐王破之單于乃自將圍中郎將耿种於美稷連戰數月攻之轉急种移檄求救明年正月慬將八千餘人馳往赴之至屬國故城與匈奴左將軍烏桓大人戰破斬其渠帥殺三千餘人虜其妻子獲財物甚衆單于復自將七八千騎迎攻圍慬慬被甲奔擊所向皆破虜遂引還虎澤三月何熙軍到五原曼柏曼柏縣名屬五原郡暴疾不能進遣龎雄與慬及耿种歩騎萬六千人攻虎澤連營稍前單于惶怖遣左奥鞬日逐王詣慬乞降慬乃大陳兵受之單于脱㡌徒跣靣縛稽顙納質會熙卒于師即拜慬度遼將軍龎雄還為大鴻臚雄巴郡人有勇畧稱為名將明年安定北地上郡皆被羌宼榖貴人流不能自立詔慬發邊兵迎三郡太守使將吏人徙扶風界慬即遣南單于兄子優孤塗奴將兵迎之既還慬以塗奴接其家屬有勞輙授以羌侯印綬坐專擅徴下獄扺罪明年校書郎馬融上書訟慬與護羌校尉龎參有詔原刑語在龎參傳會叛羌寇三輔}
