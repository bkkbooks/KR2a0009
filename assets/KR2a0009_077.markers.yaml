  - {type: variant, offset: 966, length: 29, content: 州牧封槐里侯食槐里美陽兩縣合八千戶以黃巾既平故改年為中平嵩, WYG: 幸超家得蒙趙母衛姬先請之貸趙母謂趙奢之妻趙括之母也懼括敗先請得不坐事見史記衛姬者齊桓公之姬桓公與管仲謀伐衛桓公入姬請衛之罪事見列女傳也妾愚戇不知大義觸犯忌諱書}
