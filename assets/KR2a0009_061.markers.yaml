  - {type: variant, offset: 5267, length: 0, content: '', WYG: 守轉守桂陽樂安二郡所在稱之時靈帝欲鑄銅人而國用不足乃詔調民田畝斂十錢而比水旱傷稼百姓貧苦康上疏諌曰臣聞先王治世貴在愛民省徭輕賦以寜天下除煩就約以崇簡易易曰乾以易知坤以簡能而天下之理得矣故萬姓從化靈物應德末世衰主窮奢極侈造作無端興制非一勞割自下以從茍欲勞苦割剝於下人也故黎民吁嗟陰陽感動陛下聖德承天當隆盛化而卒被詔書畝歛田錢鑄作銅人伏讀惆悵悼心失圖夫什一而稅周謂之徹孟子曰夏后氏五十而貢殷人七十而助周人百畝而徹其實皆什一也徹者通也言其法度可通萬世而行也故魯宣稅畝而蝝災自生公羊傳曰初稅畝者何履畝而稅也何休注云宣公無恩信於人人不肯盡力於公田起履踐案行擇其畆穀好者稅取之蝝螽子也公羊傳冬蝝生此言蝝生何上變古易常也注云上謂宣公變易公田舊制而稅畝也哀公增賦而孔子非之左傳曰季孫欲以田賦使冉有訪諸仲尼仲尼私於冉有曰子季孫若欲行而法則周公之典在若欲茍而行之又何訪焉豈有聚奪民物以營無用之銅人捐捨聖戒自蹈亡王之法哉謂秦始皇鑄銅人十二卒致滅亡也傳曰君舉必書書而不法後世何述焉陛下宜留神省察改敝從善以塞兆民怨恨之望書奏内倖因此譖康援引亡國以譬聖明大不敬檻車徵詣廷}
