  - {type: variant, offset: 22, length: 1, content: 犍, WYG: 之貌語遂絶融繫出困病范隨而養視及死竟不言身自將車送喪至南陽葬畢乃去後辟公府㑹薛漢坐楚王事誅楚王英謀反也故人門生莫敢視范獨往收歛之吏以聞顯宗大怒召范入詰責曰薛漢與楚王同謀交亂天下范公府掾不與朝廷同心而反收斂罪人何也范叩頭曰臣無狀愚戇以為漢等皆已伏誅不勝師資之情罪當萬坐老子曰善人為不善人之師不善人為善人之資也帝怒稍解問范曰卿廉頗後邪與右將軍裦大司馬丹有親屬乎范對曰裦臣之曾祖丹臣之祖也帝曰怪卿志膽敢爾因貰之貰赦也由是顯名舉茂才數月再遷為雲中太守㑹匈奴大入塞烽火日通故事虜人過五千人劉攽曰按文人當作入移書傍郡吏欲傳檄求救范不聽自率士卒拒之虜衆盛而范兵不敵㑹日暮令軍士各交縛兩炬三頭爇火營中星列用兩炬交縛如十字爇其三頭手持一端使敵人望之疑兵士之多虜遙望火多謂漢兵救至大驚待旦將退范乃令軍中蓐食晨往赴之蓐食早起食於寢蓐中也斬首數百級虜自相轔藉死者千餘人轔轢也藉相蹈藉也由此不敢復向雲中後頻歴武威武都二郡太守隨俗化導各得治宜建初中遷蜀郡太守其俗尚文辯好相持短長范每厲以淳厚不受偸薄之說成都民物豐盛邑宇逼側舊制禁民夜作以防火災而更相隠蔽燒者日屬范乃毁削先令但嚴使儲水而已百姓為便乃歌之曰廉叔度來何暮不禁火民安作平生無襦今五絝作協韻音則護反在蜀數年坐法免歸鄉里范世在邊廣田地積財粟悉以賑宗族朋友肅宗崩范奔赴敬陵時廬江郡掾嚴麟奉章弔國俱㑹於路麟乗小車塗深馬死不能自進范見而愍然命從騎下馬與之不告而去麟事畢不知馬所歸乃緣縱訪之或謂麟曰故蜀郡太守廉叔度好周人窮急今奔國喪獨當是耳麟亦素聞范名以為然即牽馬造門謝而歸之世伏其好義然依倚大將軍竇憲以此為譏卒于家初范與洛陽慶鴻為刎頸交時人稱曰前有管鮑後有慶廉鴻慷慨有義節位至琅邪㑹稽二郡太守所在有異迹論曰張堪廉范皆以氣俠立名觀其振危急赴險阸有足壯者堪之臨財范之忘施亦足以信意而感物矣信音伸若夫髙祖之召欒布欒布梁人為人所略賣為奴梁王彭越贖為梁大夫使於齊漢召彭越以謀反夷三族詔有收視者輒捕之布還奏事彭越頭下祠而哭之吏捕以聞上召罵曰若與彭越反邪布曰今漢一徵兵於梁彭王不行而疑以為反則人人自危也上乃釋布拜為都尉也明帝之引廉范加怒以發其志就戮更延其寵聞義能徙誠君道所尚然情理之樞亦有開塞之感焉户之開闔必由於樞情之通塞必在於感言髙祖明帝初怒欒布廉范後感其義而赦之王堂傳王堂字敬伯廣漢郪人也初舉光禄茂才光禄舉之為茂才也遷穀城令治有名迹穀城縣屬東郡故城在今齊州東阿縣東永初中西羌寇巴郡為民患詔書遣中郎將尹就攻討連年不剋三府舉堂治劇拜巴郡太守堂馳兵赴賊斬虜千餘級巴庸清靜吏民生為立祠庸即上庸縣也故城在今房州清水縣西也刺史張喬表其治能遷右扶風安帝西廵阿母王聖中常侍江京等並請屬於堂堂不為用掾吏固諫之堂曰吾蒙國恩豈可為權寵阿意阿曲也以死守之即日遣家屬歸閉閤上病果有誣奏堂者㑹帝崩京等悉誅堂以守正見稱永建二年徵入為將作大匠四年坐公事左轉議郎續漢志曰議郎秩六百石無員復拜魯相政存簡一至數年無辭訟遷汝南太守搜才禮士不茍自専乃教掾史曰古人勞於求賢逸於任使故能化清於上事緝於下其憲章朝右簡覈才職委功曹陳蕃匡政理務拾遺補闕任主簿應嗣庶循名責實察言觀效焉自是委誠求當不復妄有辭教郡内稱治時大將軍梁商及尚書令袁湯以求屬不行並恨之後廬江賊迸入弋陽界堂勒兵追討即便奔散而商湯猶因此風州奏堂在任無警免歸家年八十六卒遺令薄歛瓦棺以葬子穉清行不仕曾孫商益州牧劉焉以為蜀郡太守有治聲蘇章傳族孫不韋蘇章字孺文扶風平陵人也八世祖建武帝時為右將軍前書曰建以校尉從大將軍青擊匃奴封平陵侯中子武最知名也祖父純字桓公有髙名性强切而持毁譽持執也執毁譽之論謂品藻其臧否士友咸憚之至乃相謂曰見蘇桓公患其教責人不見又思之三輔號為大人大人長老之稱言尊事之也永平中為奉車都尉竇固軍出擊北匈奴車師有功劉攽曰案竇固自為奉車都尉蘇純但從之耳為當作從封中陵鄉侯官至南陽太守章少博學能屬文安帝時舉賢良方正對䇿髙第為議郎數陳得失其言甚直出}
