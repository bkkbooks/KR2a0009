  - {type: variant, offset: 1681, length: 1021, content: 命亟自實前掾李固時為大將軍梁商從事中郎乃奏記於商曰今旦聞下太尉王公勑令自實未審其事深淺何如王公束脩厲節敦樂蓺文不求苟得不為苟行但以堅貞之操違俗失衆橫為讒佞所構毀衆人聞知莫不歎慄夫三公尊重承天象極未有詣理訴冤之義纖微感㮣輒引分決是以舊典不有大罪不至重問王公沈靜內明不可加以非理卒有它變則朝廷獲害賢之名羣臣無救護之節矣昔絳侯得罪袁盎解其過魏尚獲戾馮唐訴其冤時君善之列在書傳今將軍內倚至尊外典國柄言重信著指撝無違宜加表救濟王公之艱難語曰善人在患飢不及餐斯其時也商即言之於帝事乃得釋龔在位五年以老病乞骸骨卒於家子暢論曰張晧王龔稱為雅推士若其好通汲善明發升薦仁人之情也夫士進則世收其器賢用即人獻其能能獻既已厚其功器收亦理兼天下其利甚博而人莫之先豈同折枝於長者以不為為難乎昔柳下惠見抑於臧文淳于長受稱于方進然則立德者以幽陋好遺顯登者以貴塗易引故晨門有抱關之夫柱下無朱文之軫也暢字叔茂少以清實為稱無所交黨初舉孝廉辭病不就大將軍梁商特辟舉茂才四遷尚書令出為齊相徵拜司隸校尉轉漁陽太守所在以嚴明為稱坐事免官是時政事多歸尚書桓帝特詔三公令高選庸能太尉陳蕃薦暢清方公正有不可犯之色由是復為尚書尋拜南陽太守前後二千石逼懼帝鄉貴戚多不稱職暢深疾之下車奮厲威猛其豪黨有釁穢者莫不糾發會赦事得散暢追恨之更為設法諸受臧二千萬以上不自首實者盡入財物若其隱伏使吏發屋伐樹堙井夷竈豪右大震功曹張敞奏記諫曰五教在寬著之經典湯去三面八方歸仁武王入殷先去炮格之刑高祖鑒秦唯定三章之法孝文皇帝感一緹縈蠲除肉刑卓茂文翁召父之徒皆疾惡嚴刻務崇溫厚仁賢之政流聞後世夫明哲之君網漏吞舟之魚然後三光明於上人物悅於下言之若迂其效甚近發屋伐樹將為嚴烈雖欲懲惡難以聞遠以明府上智之才日月之曜敷仁惠之政則海內改觀實有折枝之易而無挾山之難郡為舊都侯甸之國園廟出於章陵三后生自新野士女沾教化黔首仰風流自中興以來功臣將相繼世而隆愚以為懇懇用刑不如行恩孳孳求姦未若禮賢舜舉臯陶不仁者遠隨會為政晉盜奔秦虞芮入境讓心自生化人在德不在用刑暢深納敞諫更崇寬政慎刑簡罰教化遂行郡中豪族多以奢靡相尚暢常布衣皮褥車馬羸敗以矯其敝同郡劉表時年十七從暢受學進諫曰夫奢不僭上儉不逼下循道行禮貴處可否之閒蘧伯玉恥獨為君子府君不希孔聖之明訓而慕夷齊之末操無乃皎然自貴於世乎暢曰昔公儀休在魯拔園葵去織婦孫叔敖相楚其子被裘刈薪夫以約失之鮮矣聞伯夷之風者貪夫廉懦夫有立志雖以不德敢慕遺烈後徵為長樂衞尉建寧元年遷司空數月以水災策免明年卒於家子謙為, WYG: 崩}
