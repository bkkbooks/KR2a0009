  - {type: variant, offset: 4576, length: 685, content: 遷南陽太守以糾舉豪右為執家所謗徵詣廷尉抵罪會赦歸家復徵拜廷尉熹平元年竇太后崩太后本遷南宮雲臺宦者積怨竇氏遂以衣車載后尸置城南市舍數日中常侍曹節王甫欲用貴人體殯帝曰太后親立朕躬統承大業詩云無德不報無言不酬豈宜以貴人終乎於是發喪成禮及將葬節等復欲別葬太后而以馮貴人配祔詔公卿大會朝堂令中常侍趙忠監議太尉李咸時病乃扶輿而起擣椒自隨謂妻子曰若皇太后不得配食桓帝吾不生還矣既議坐者數百人各瞻望中官良久莫肯先言趙忠曰議當時定怪公卿以下各相顧望球曰皇太后以盛德良家母臨天下宜配先帝是無所疑忠笑而言曰陳廷尉宜便操筆球即下議曰皇太后自在椒房有聰明母儀之德遭時不造援立聖明承繼宗廟功烈至重先帝晏駕因遇大獄遷居空宮不幸早世家雖獲罪事非太后今若別葬誠失天下之望且馮貴人冢墓被發骸骨暴露與賊併尸魂靈汙染且無功於國何宜上配至尊忠省球議作色俛仰蚩球曰陳廷尉建此議甚健球曰陳竇既冤皇太后無故幽閉臣常痛心天下憤歎今日言之退而受罪宿昔之願公卿以下皆從球議李咸始不敢先發見球辭正然後大言曰臣本謂宜爾誠與臣意合會者皆為之愧曹節王甫復爭以為梁后家犯惡逆別葬懿陵武帝黜廢衞后而以李夫人配食今竇氏罪深豈得合葬先帝乎李咸乃詣闕上疏曰臣伏惟章德竇后虐害恭懷安思閻后家犯惡逆而和帝無異葬之議順朝無貶降之文至於衞后孝武皇帝身所廢𠫓廾不可以為比今長樂太后尊號在身親嘗稱制坤育天下且援立聖明光隆皇祚太后以陛下為子陛下豈得不以太后為母子無黜母臣無貶君宜合葬宣陵一如舊制帝省奏謂曹節等曰竇氏雖為不道而太后有德於朕不宜降黜節等無復言於是議者乃定咸字元貞汝南人累經州郡以廉幹知名在朝清忠權倖憚之六年遷球司空以地震免拜光祿大夫復為廷尉太常, WYG: 其狀}
