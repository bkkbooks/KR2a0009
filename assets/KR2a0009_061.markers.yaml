  - {type: variant, offset: 3623, length: 733, content: 大司農延熹四年遷司徒推達名臣橋玄皇甫規等為稱職相在位三年年六十一薨并涼邊人咸為發哀匈奴聞暠卒舉國傷惜單于每入朝賀望見墳墓輒哭泣祭祀二子岱拂岱字公祖好學養志舉孝廉茂才辟公府皆不就公車特徵病卒初岱與李固子燮同徵議郎燮聞岱卒痛惜甚乃上書求加禮於岱曰臣聞仁義興則道德昌道德昌則政化明政化明而萬姓寧伏見故處士种岱淳和達理耽悅詩書富貴不能回其慮萬物不能擾其心稟命不永奄然殂殞若不槃桓難進等輩皆已公卿矣昔先賢既沒有加贈之典周禮盛德有銘誄之文而岱生無印綬之榮卒無官謚之號雖未建忠效用而為聖恩所拔遐邇具瞻宜有異賞朝廷竟不能從拂字穎伯初為司隸從事拜宛令時南陽郡吏好因休沐游戲市里為百姓所患拂出逢之必下車公謁以愧其心自是莫敢出者政有能名累遷光祿大夫初平元年代荀爽為司空明年以地震策免復為太常李傕郭汜之亂長安城潰百官多避兵衝拂揮劒而出曰為國大臣不能止戈除暴致使凶賊兵刃向宮去欲何之遂戰而死子劭劭字申甫少知名中平末為諫議大夫大將軍何進將誅宦官召并州牧董卓至澠池而進意更狐疑遣劭宣詔止之卓不受遂前至河南劭迎勞之因譬令還軍卓疑有變使其軍士以兵脅劭劭怒稱詔大呼叱之軍士皆披遂前質責卓卓辭屈乃還軍夕陽亭及進敗獻帝即位拜劭為侍中卓既權而惡劭彊力遂左轉議郎出為益涼二州刺史會父拂戰死竟不之職服終徵為少府大鴻臚皆辭不受曰昔我先父以身徇國吾為臣子不能除殘復怨何面目朝覲明主哉遂與馬騰韓遂及左中郎劉範諫議大夫馬宇共攻李傕郭汜以報其仇與汜戰於長平觀下軍敗劭等皆死勝遂還涼州陳球字伯真下邳淮浦人也歷世著名父亹廣漢太守球少涉儒學善律令陽嘉中舉孝廉稍遷繁陽令時魏郡太守諷縣求納貨賄球不與之太守怒而撾督郵欲令逐球督郵不肯曰魏郡十五城獨繁陽有異政今受命逐之將致議於天下矣太守乃止復辟公府舉高第拜侍御史是時桂陽黠賊李研等羣聚, WYG: 治}
