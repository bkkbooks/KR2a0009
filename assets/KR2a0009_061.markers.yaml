  - {type: variant, offset: 14, length: 0, content: '', WYG: 二十一郭伋傳郭伋字細侯扶風茂陵人也髙祖父解前書曰解字翁伯河内軹人徙茂陵也武帝時以任俠聞父梵為蜀郡太守伋少有志行哀平間辟大司空府三遷為漁陽都尉王莽時為上谷大尹王莽改太守為大尹遷幷州牧更始新立三輔連被兵寇百姓震駭强宗右姓右姓猶髙姓也各擁衆保營莫肻先附更始素聞伋名徵拜左馮翊使鎭撫百姓世祖即位拜雍州牧再轉為尚書令數納忠諌争建武}
