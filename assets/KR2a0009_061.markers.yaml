  - {type: variant, offset: 843, length: 579, content: 乃諷尚書以綱為廣陵太守因欲以事中之前遣郡守率多求兵馬綱獨請單車之職既到乃將吏卒十餘人徑造嬰壘以慰安之求得與長老相見申示國恩嬰初大驚既見綱誠信乃出拜謁綱延置上坐問所疾苦乃譬之曰前後二千石多肆貪暴故致公等懷憤相聚二千石信有罪矣然為之者又非義也今主上仁聖欲以文德服叛故遣太守思以爵祿相榮不願以刑罰相加今誠轉禍為福之時也若聞義不服天子赫然震怒荊楊兗豫大兵雲合豈不危乎若不料彊弱非明也𠫓廾善取惡非智也去順效逆非忠也身絕血嗣非孝也背正從邪非直也見義不為非勇也六者成敗之幾利害所從公其深計之嬰聞泣下曰荒裔愚人不能自通朝廷不堪侵枉遂復相聚偷生若魚遊釜中喘息須臾閒耳今聞明府之言乃嬰等更生之晨辰也既陷不義實恐投兵之日不免孥戮綱約之以天地誓之以日月嬰深感悟乃辭還營明日將所部萬餘人與妻子面縛歸降綱乃單車入嬰壘大會置酒為樂散遣部衆任從所之親為卜居宅相田疇子弟欲為吏者皆引召之人情悅服南州晏然朝廷論功當封梁冀遏絕乃止天子嘉美徵欲擢用綱而嬰等上書乞留乃許之綱在郡一年年四十六卒百姓老幼相攜詣府赴哀者不可勝數綱自被疾吏人咸為祠祀祈福皆言千秋萬歲何時復見此君張嬰等五百餘人制服行喪送到犍為負土成墳詔曰故廣陵太守張綱大臣之苗剖符統務正身導下班宣德信降集劇賊張嬰萬人息干戈之役濟蒸庶之困未升顯爵不幸早卒嬰等縗杖若喪考妣朕甚愍焉拜綱子續為郎中賜錢百萬王龔字伯宗山陽高平人也世為豪族初舉孝廉稍遷青, WYG: ''}
