  - {type: variant, offset: 2707, length: 835, content: 長史謙子粲以文才知名种暠字景伯河南洛陽人仲山甫之後也父為定陶令有財三千萬父卒暠悉以賑卹宗族及邑里之貧者其有進趣名利皆不與交通始為縣門下史時河南尹田歆外甥王諶名知人歆謂之曰今當舉六孝廉多得貴戚書命不宜相違欲自用一名士以報國家爾助我求之明日諶送客於大陽郭遙見暠異之還白歆曰為尹得孝廉矣近洛陽門下史也歆笑曰當得山澤隱滯近迺洛陽吏邪諶曰山澤不必有異士異士不必在山澤歆即召暠於庭辯詰職事暠辭對有序歆甚知之召署主簿遂舉孝廉辟太尉府舉高第順帝末為侍御史時所遣八使光祿大夫杜喬周舉等多所糾奏而大將軍梁冀及諸宦官互為請救事皆被寑遏暠自以職主刺舉志案姦違乃復劾諸為八使所舉蜀郡太守劉宣等罪惡章露宜伏歐刀又奏請勑四府條舉近臣父兄及知親為刺史二千石尤殘穢不勝任者免遣案罪帝乃從之擢暠監太子於承光宮中常侍高梵從中單駕出迎太子時太傅杜喬等疑不欲從惶惑不知所為暠乃手劒當車曰太子國之儲副人命所係今常侍來無詔信何以知非姦邪今日有死而已梵辭屈不敢對馳命奏之詔報太子乃得去喬退而歎息愧暠臨事不惑帝亦嘉其持重稱善者良久出為益州刺史暠素慷慨好立功立事在職三年宣恩遠夷開曉殊俗岷山雜落皆懷服漢德其白狼槃木唐菆卭僰諸國自前刺史朱輔卒後遂絕暠至乃復舉種向化時永昌太守冶鑄黃金為文蛇以獻梁冀暠糾發逮捕馳傳上言而二府畏懦不敢案之冀由是銜怒於暠會巴郡人服直聚黨數百人自稱天王暠與太守應承討捕不克吏人多被傷害冀因此陷之傳逮暠承太尉李固上疏救曰臣伏聞討捕所傷本非暠承之意實由縣吏懼法畏罪迫逐深苦致此不詳比盜賊羣起處處未絕暠承以首舉大姦而相隨受罪臣恐沮傷州縣糾發之意更共飾匿莫復盡心梁太后省奏乃赦暠承罪免官而已後涼州羌動以暠為涼州刺史甚得百姓歡心被徵當遷吏人詣闕請留之太后歎曰未聞刺史得人心若是乃許之暠復留一年遷漢陽太守戎夷男女送至漢陽界暠與相揖謝千里不得乘車及到郡化行羌胡禁止侵掠遷使匈奴中郎將時遼東烏桓反叛復轉遼東太守烏桓望風率服迎拜於界上坐事免歸後司隸校尉舉暠賢良方正不應徵拜議郎遷南郡太守入為尚書會匈奴寇并涼二州桓帝擢暠, WYG: 表琮}
