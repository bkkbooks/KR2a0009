  - {type: variant, offset: 14, length: 0, content: '', krp: 二十一郭伋傳郭伋字細侯扶風茂陵人也髙祖父解前書曰解字翁伯河内軹人徙茂陵也武帝時以任俠聞父梵為蜀郡太守伋少有志行哀平間辟大司空府三遷為漁陽都尉王莽時為上谷大尹王莽改太守為大尹遷幷州牧更始新立三輔連被兵寇百姓震駭强宗右姓右姓猶髙姓也各擁衆保營莫肻先附更始素聞伋名徵拜左馮翊使鎭撫百姓世祖即位拜雍州牧再轉為尚書令數納忠諌争建武}
  - {type: variant, offset: 15, length: 0, content: '', WYG: 年出為中山太守明年彭寵滅轉為漁陽太守漁陽既離王莽之亂重以彭寵之敗離猶遭也民多猾惡寇賊充斥杜預注左傳曰充滿斥見也伋到示以信賞糾戮渠帥盗賊銷散時匈奴數抄郡界邊境苦之伋整勒士馬設攻守之略匈奴畏憚逺迹不敢復入塞民得安業在職五歲户口增倍後潁川盗賊羣起九年徵拜潁川太守召見辭謁因辭而謁見也帝勞之曰賢能太守去帝城不逺河潤九里冀京師幷蒙福也莊子曰河潤九里澤及三族君雖精於追捕而山道險阸自鬭當一士耳深宜愼之伋到郡招懐山賊陽夏趙宏陽夏縣名屬陳國夏公雅反襄城召呉等數百人皆束手詣伋降悉遣歸務農因自劾専命謂擅放降賊也帝美其䇿不以咎之後宏呉等黨與聞伋威信逺自江南或從幽冀不期俱降駱驛不絶駱驛連續十一年省朔方刺史屬幷州帝以盧芳據北土乃調伋為幷州牧過京師謝恩帝即引見并召皇太子諸王宴語終日賞賜車馬衣服什物伋因言選補衆職當簡天下賢俊不宜專用南陽人帝納之伋前在并州素結恩德及後入界所到縣邑老㓜相攜逄迎道路所過問民疾苦聘求耆德雄俊設几杖之禮朝夕與參政事禮記曰謀於長者必操几杖以從之始至行部到西河美稷有童兒數百各騎竹馬於道次迎拜伋問兒曹何自逺來曹輩也對曰聞使君到喜故來奉迎伋辭謝之及事訖諸兒復送至郭外問使君何日當還伋謂别駕從事計日當告之劉攽曰案文多一當字上文問者可云當此下文著當字無理行部既還先期一日伋為違信於諸兒遂止于野亭湏期乃入是時朝廷多舉伋可為大司空帝以并部尚有盧芳之儆儆急也且匈奴未安欲使久於其事故不召伋知盧芳夙賊夙舊也難卒以力制常嚴􅇏候明購賞以結寇心芳將隋昱劉攽曰案随字至隋時方去之單作隋今此宜作隨遂謀脅芳降伋芳乃亡入匈奴伋以老病上書乞骸骨二十二年徵為太中大夫賜宅一區及帷帳錢穀以充其家伋輙散與宗親九族無所遺餘明年卒時年八}
