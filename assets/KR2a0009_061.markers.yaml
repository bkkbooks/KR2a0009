  - {type: variant, offset: 64, length: 0, content: '', WYG: 及武敗坐黨事禁錮十餘年幽居守静及黨禁解復辟太尉府四遷為廬江太守後揚州黄巾賊攻舒焚燒城郭續發縣中男子二十以上皆持兵勒陳其小弱者悉使負水灌火㑹集數萬人并埶力戰大破之郡界平後安風賊戴風等作亂安風縣屬廬江郡續復擊破之斬首三千餘級生獲渠帥其餘黨輩原為平民原免也賦與佃器使就農業中平三年江夏兵趙慈反叛殺南陽太守秦頡攻没六縣拜續為南陽太守當入郡界乃羸服間行侍童子一人觀厯縣邑採問風謡然後乃進其令長貪潔吏民良猾悉逆知其狀郡内驚竦莫不震懾乃發兵與荆州刺史王敏共擊慈斬之獲首}
