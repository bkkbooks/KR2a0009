  - {type: variant, offset: 17, length: 0, content: '', WYG: 帝親臨弔賜冢塋地杜詩傳杜詩字公君河内汲人也少有才能仕郡功曹有公平稱更始時辟大司馬府建武元年歲中三遷為侍御史安集洛陽時將軍蕭廣放縱兵士暴横民間百姓惶擾詩敕曉不改遂格殺廣還以狀聞世祖召見賜以棨㦸漢雜事曰漢制假棨㦸以代斧鉞崔豹古今注曰棨㦸前驅之器也以木為之後代刻偽無復典刑以赤油韜之亦謂之油㦸亦曰棨㦸王公已下通用之以前驅也復使之河東誅降逆賊楊異等詩到大陽大陽縣名屬河東郡聞賊規欲北度乃與長史急焚其船部勒郡兵將突騎趂擊斬異等賊遂翦滅拜成臯令成臯縣屬河南郡今洛州氾水縣是視事三歲舉政尤異再遷為沛郡都尉轉汝南都尉所在稱治七年遷南陽太守性節儉而政治清平以誅暴立威善於計略省愛民役造作水排鑄為農器排音蒲拜反冶鑄者為排以吹炭令激水以鼓之也排當作㰆古字通用也用力少見功多百姓便之又修治陂池廣拓土田郡内比室殷足時人方於召信臣比室猶比屋也前書曰召信臣字翁卿九江夀春人也遷南陽太守為人興利務在富之開通溝渠凡十數處故南陽為之語曰前有召父後有杜母詩自以無勞不安久居大郡求欲降避功臣乃上疏曰陛下亮成天工克濟大業偃兵修文羣帥反旅反旅謂班師也海内合和萬世蒙福天下幸甚唯匈奴未譬聖德威侮二垂譬猶曉也威虐也侮慢也二垂謂西與北也陵虐中國邊民虚耗不能自守臣恐猛武之將雖勤亦未得解甲櫜弓也櫜韜也音髙詩曰載櫜弓矢也夫勤而不息亦怨勞而不休亦怨怨恨之師難復責功臣伏覩將帥之情功臣之望冀一休足於内郡休足止行役也然後即戎出命不敢有恨臣愚以為師克在和不在衆春秋左氏傳文也陛下雖垂念北邊亦當頗泄用之泄猶雜也昔湯武善御衆故無忿鷙之師鷙擊也湯武順天應人其所征討皆弔伐而已故無忿怒而擊也陛下起兵十有三年將帥和睦士卒鳬薻言其和睦歡悦如鳬之戯於水薻也今若使公卿郡守出於軍壘則將帥自厲壘軍壁厲勉也士卒之復比於宿衛則戎士自百復謂優寛也音福續漢志曰羽林郎秩比三百石掌侍從宿衛言士卒得比於郎則人百其勇何者天下已安各重性命大臣以下咸懐樂土不讐其功而厲其用無以勸也陛下誠宜虚缺數郡以俟振旅之臣重復厚賞加於久役之士如此緣邊屯戍之師競而忘死乗城拒塞之吏不辭其勞則烽火精明守戰堅固聖王之政必因人心今猥用愚薄塞功臣之望誠非其宜臣詩伏自惟忖本以史吏一介之才史吏謂初為郡功曹也書曰如有一介臣也遭陛下創制大業賢俊在外空乏之間超受大恩收養不稱劉攽曰案收養無義合作牧養二漢通謂守令為牧養也奉職無效久竊禄位令功臣懐愠誠惶誠恐八年上書乞避功德陛下殊恩未許放退臣詩蒙恩尤深義不敢茍冒虛請誠不勝至願願退大郡受小職及臣齒壯力能經營劇事如使臣詩必有補益復受大位雖析珪授爵所不辭也惟陛下哀矜帝惜其能遂不許之詩雅好推賢數進知名士清河劉統及魯陽長董崇等初禁網尚簡但以璽書發兵未有虎符之信詩上疏曰臣聞兵者國之凶器聖人所慎舊制發兵皆以虎符其餘徵調竹使而已符䇿合㑹取為大信所以明著國命歛持威重也說文曰符信也漢制以竹長六寸分而相合前書文帝二年初與郡守為銅虎符竹使符音義曰銅虎第一至第五發兵遣使符合乃聽之竹使符以竹五寸鐫刻篆書亦第一至第五也間者發兵但用璽書或以詔令如有姦人詐偽無由知覺愚以為軍旅尚興賊虜未殄徵兵郡國宜有重慎可立虎符以絶姦端昔魏之公子威傾鄰國猶假兵符以解趙圍若無如姬之仇則其功不顯秦昭王已破趙長平又進圍邯鄲魏昭王之子無忌號信陵君其姊為趙惠文王弟平原君夫人平原君數遺公子書請救於魏魏王使將軍晉鄙将十萬衆救趙實持兩端以觀望平原君使者相屬謂公子曰今邯鄲旦暮降秦魏救不至獨不憐公子姊耶公子患之過侯嬴問之嬴屏人語曰嬴聞晉鄙兵符常在王卧内而如姬最幸力能竊之嬴聞如姬父為人所殺公子使客斬其仇頭敬進如姬姬為公子死無所辭公子誠一開口以請如姬姬必諾公子從其計如姬果盗晉鄙兵符與公子於是遂矯魏王令奪晉鄙兵進擊秦軍解去事見史記也事有煩而不可省費而不得已盖謂此也書奏從之詩身雖在外盡心朝廷讜言善䇿随事獻納視事七年政化大行十四年坐遣客為弟報仇被徵㑹病卒司𨽻校尉鮑永上書言詩貧困無田宅䘮無所歸詔使治䘮郡邸賻絹千匹孔奮傳孔奮字君魚扶風茂陵人也曾祖霸元帝時為侍中奮少從劉歆受春秋左氏傳歆稱之謂門人曰吾已從君魚受道矣言君魚之道已過於已矣遭王莽亂奮與老母㓜弟避兵河西建武五年河西大將軍竇融請奮署議曹掾守姑臧長八年賜爵關内侯時天下擾亂唯河西獨安而姑臧稱為富邑通貨羌胡市日四合古者為市一日三合周禮曰大市日側而市百族為主朝市朝時而市百賈為主夕市夕時而市販夫販婦為主今既人貨殷繁故一日四合也每至縣者不盈數月輒至豐積奮在職四年財産無所增事母孝謹雖為儉約奉養極求珍膳躬率妻子同甘菜茹廣雅曰茹食也時天下未定士多未修節操而奮力行清潔為衆人所笑或以為身處脂膏不能以自潤徒益苦辛耳劉攽曰案文益當在徒字上奮既立節治貴仁平太守梁統深相敬待不以官屬禮之常迎於大門引入見母隴蜀既平河西守令咸被徵召財貨連轂彌竟川澤唯奮無資單車就路姑臧吏民及羌胡更相謂曰孔君清廉仁賢舉縣蒙恩如何今去不共報德遂相賦歛牛馬器物千萬以上追送數百里奮謝之而已一無所受既至京師除武都郡丞時隴西餘賊隗茂等夜攻府舍殘殺郡守賊畏奮追急乃執其妻子欲以為質奮年已五十唯有一子終不顧望遂窮力討之吏民感義莫不倍用命焉郡多氐人便習山谷其大豪齊鍾留者為羣氐所信向奮乃率厲鍾留等令要遮鈔擊共為表裏賊窘懼逼急乃推奮妻子以置軍前冀當退却而擊之愈厲遂禽滅茂等奮妻子亦為所殺世祖下詔褒美拜為武都太守奮自為府丞已見敬重及拜太守舉郡莫不改操為政明斷甄善疾非甄明也見有美德愛之如親其無行者忿之若讐郡中稱為清平弟奇游學洛陽奮以奇經明當仕上病去官守約鄉閭卒于家奇博通經典作春秋左氏刪刪定其義也奮晚有子嘉官至城門校尉作左氏説云説猶今之疏也}
