  - {type: variant, offset: 25, length: 0, content: '', krp: 原令武原縣屬楚國故城在今泗州下邳縣北時歲飢輒開倉廪活三千餘户順帝時遷冀州刺史故人為清河太守章行部案其姦臧乃請太守為設酒肴陳平生之好甚歡太守喜曰人皆有一天我獨有二天章曰今夕蘇孺文與故人飲者私恩也明日冀州刺史案事者公法也遂舉正其罪州境知章無私望風畏肅換為幷州刺史以摧折權豪忤㫖坐免隐身鄉里不交當世後徵為河南尹不就時天下日敝民多悲苦論者舉章有幹國才朝廷不能復用卒于家兄曾孫不韋不韋字公先父謙初為郡督郵時魏郡李暠為美陽令與中常侍具瑗交通貪暴為民患前後監司畏其埶援莫敢糾問及謙至部案得其臧論輸左校謙累遷至金城太守去郡歸鄉里漢法免罷守令自非詔徵不得妄到京師而謙後私至洛陽時暠為司𨽻校尉收謙詰掠死獄中暠又因刑其屍以報昔怨不韋時年十八徵詣公車㑹謙見殺不韋載䘮歸鄉里瘞而不𦵏仰天歎曰伍子胥獨何人也子胥父伍奢為楚王所殺子胥復讐鞭平王之尸解見寇榮傳乃藏母於武都山中武都郡名其地在今成州上禄縣界有仇池山東西懸絶壁立百仞故藏於其中也遂變名姓盡以家財募劍客邀暠於諸陵間不剋㑹暠遷大司農時右校芻廥在寺北垣下說文云廥芻槀藏音工外反垣墻也不韋與親從兄弟潛入廥中夜則鑿地晝則逃伏如此經月遂得傍逹暠之寢室出其牀下値暠在厠因殺其妾并及小兒留書而去暠大驚懼乃布棘於室以板籍地一夕九徙雖家人莫知其處每出輒劍㦸隨身壯士自衛不韋知暠有備乃日夜飛馳徑到魏郡掘其父阜冢斷取阜頭以祭父墳又標之於市曰李君遷父頭暠匿不敢言而自上退位歸鄉里私掩塞冢椁捕求不韋厯歲不能得憤恚感傷發病毆血死不韋後遇赦還家乃始改𦵏行喪士大夫多譏其發掘冢墓歸罪枯骨不合古義唯任城何休方之伍員太原郭林宗聞而論之曰子胥雖云逃命而見用强呉慿闔廬之威因輕悍之衆雪怨舊郢曾不終朝而但鞭墓戮屍以舒其憤竟無手刃後主之報豈如蘇子單特孑立靡因靡資强讐豪援據位九卿城闕天阻宫府幽絶埃塵所不能過霧露所不能沾不韋毁身憔慮出於百死冒觸嚴禁陷族禍門雖不獲逞為報已深况復分骸斷首以毒生者毒苦也使暠懐忿結不得其命猶假手神靈以斃之也力唯匹夫功隆千乗比之於員不以優乎議者於是貴之後太傳陳蕃辟不應為郡五官掾初𢎞農張奐睦於蘇氏而武威叚熲與暠素善後奐熲有隙及熲為司𨽻以禮辟不韋不韋懼之稱病不詣熲既積憤於奐因發怒乃追咎不韋前報暠事以為暠表治謙事被報見誅君命天也而不韋仇之又令長安男子告不韋多將賓客奪舅財物遂使從事張賢等就家殺之乃先以鴆與賢父曰若賢不得不韋便同飲此賢到扶風郡守使不韋奉謁迎賢即時收執并其一門六十餘人盡誅滅之諸蘇以是衰破及叚熲為陽球所誅天下以為蘇氏之報焉羊續傅羊續字興祖太山平}
