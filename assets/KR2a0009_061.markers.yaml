  - {type: variant, offset: 21, length: 0, content: '', WYG: 度京兆杜陵人趙將廉頗之後也漢興以廉氏豪宗自苦陘徙焉苦陘縣屬中山國章帝更名漢昌世為邊郡守或葬隴西襄武故因仕焉曾祖父裦成哀間為右將軍祖父丹王莽時為大司馬庸部牧王莽改益州為庸部皆有名前世范父遭喪亂客死於蜀漢范遂流寓西州謂巴屬也西州平歸鄉里年十五辭母西迎父喪蜀郡太守張穆丹之故吏乃重資送范范無所受與客歩負喪歸葭萌葭萌縣名屬廣漢郡今利州益昌縣即漢葭萌地也載船觸石破没范抱持棺柩遂俱沈溺衆傷其義鉤求得之療救僅免於死穆聞復馳遣使持前資物追范范又固辭歸葬服竟詣京師受業事博士薛漢漢字公子見儒林傳京兆隴西二郡更請召皆不應永平初隴西太守鄧融備禮謁范為功曹謁請也㑹融為州所舉案舉其罪案驗之范知事譴難解欲以權相濟乃託病求去融不逹其意大恨之范於是東至洛陽變名姓求代廷尉獄卒居無幾融果徵下獄范遂得衛侍左右盡心勤勞融怪其貌類范而殊不意乃謂曰卿何似我故功曹邪范訶之曰君困戹瞀亂邪鄭𤣥注禮記曰瞀目不}
