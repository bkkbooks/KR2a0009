  - {type: variant, offset: 3510, length: 4, content: 黑山諸帥, WYG: 死免乃足為呌呼蒼天號咷泣血者也又中世之選三公也務於清慤謹慎循常習故者是婦女之檢柙鄉曲之常人耳惡足以居斯位邪檢柙猶規矩也埶既如彼選又如此}
