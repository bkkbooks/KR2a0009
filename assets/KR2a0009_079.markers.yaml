  - {type: variant, offset: 3486, length: 0, content: '', WYG: 也得拘絜而失才能非立功之實也拘絜謂自拘束而絜其身者即隐逸之人也以亷舉而以貪去非士君子之志也去音欺吕反夫選用必取善士善士富者少而貧者多禄不}
