  - {type: variant, offset: 3460, length: 1, content: 耕, krp: 侔於守令財賂自營犯法不坐刺客死士為之投命至使弱力少智之子被穿幃敗寄死不斂寃枉窮困不敢自理雖亦由網禁踈闊盖分田無限使之然也今欲張太平之紀綱立至化之基趾齊民財之豐寡正風俗之奢儉非井田實莫由也此變有所敗而宜復者也肉刑之廢輕重無品下死則得髠鉗下髠鉗則得鞭笞下猶減也死者不可復生而髠者無傷於人髠笞不足以懲中罪安得不至於死哉言髠笞太輕不足畏懼而姦人冒罪以䧟於死明復古肉刑則人不䧟於死也夫雞狗之攘竊男女之滛奔酒醴之賂遺謬誤之傷害皆非值於死者也殺之則甚重髠之則甚輕不制中刑以稱其罪則法令安得不參差殺生安得不過謬乎今患刑輕之不足以懲惡則假臧貨以成罪託疾病以諱殺假増臧貨以益其罪託稱疾病令死於獄也科條無所凖名實不相應恐非帝王之通法聖人之良制也或曰過刑惡人可也過刑善人豈可復哉曰若前政以來未曾枉害善人者則有罪不死也言善人有罪亦當殺之也是為忍於殺人也劉攽曰案文多一也字而不忍於刑人也今令五刑有品輕重有數科條有序名實有正非殺人逆亂鳥獸之行甚重者皆勿殺鳥獸之行謂蒸報也嗣周氏之祕典續吕侯之祥刑此又宜復之善者也周禮大司冦職掌邦之三典以佐王刑邦國詰四方一曰刑新國用輕典二曰刑平國用中典三曰刑亂國用重典祥善也尚書曰教爾祥刑易曰陽一君二臣君子之道也隂二君一臣小人之道也繫辭之文也陽卦一陽而二隂隂卦一隂而二陽陽為君隂為臣然則寡者為人上者也衆者為人下者也一伍之長才足以長一伍者也一國之君才足以君一國者也天下之王才足以王天下者也愚役於智猶枝之附幹此理天下之常法也制國以分人立政以分事人逺則難綏事總則難了今逺州之縣或相去數百千里雖多山陵洿澤猶有可居人種榖者焉當更制其境界使逺者不過二百里明版籍以相數閲審什伍以相連持周禮曰凡在版者注云版名籍也以版為之也限夫田以斷并兼定五刑}
