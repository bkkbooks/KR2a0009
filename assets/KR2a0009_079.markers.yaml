  - {type: variant, offset: 3580, length: 0, content: '', WYG: 端興敗資焉是以繁簡唯時寛猛相濟刑書鐫鼎事有可詳三章在令取貴能約左傳曰鄭人鑄刑書杜預注云鑄刑書于鼎以為國之常法也高祖初入關除秦苛法約法三章言其詳約也太叔致猛政之襃國子流遺愛之涕左傳曰鄭子産有疾謂子太叔曰我死子必為政唯有徳者能以寛服人其次莫如猛又曰子産卒仲尼聞之出涕曰古之遺愛也國子即子產也鄭穆公子國之子因以為姓也宣孟改冬日之和平陽循畫一之法斯實弛張之𢎞致可以徴其統乎宣孟晉大夫趙盾也左傳賈季對酆舒曰趙衰冬日之日也趙盾夏日之日也注云冬日可愛夏日可畏前書平陽侯曹參為相國百姓歌之曰蕭何為法講若畫一曹參代之守}
