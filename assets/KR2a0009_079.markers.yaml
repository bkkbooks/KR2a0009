  - {type: variant, offset: 3516, length: 0, content: '', WYG: 望三公勲立於國家績加於生民不亦逺乎昔文帝之於鄧通可謂至愛而猶展申屠嘉之志展猶申也文帝時太中大夫鄧通居上傍有怠慢禮丞相申屠嘉奏事見之罷朝召通責之曰通小臣戯殿上大不敬當斬通頓首首盡出血文帝使人召通謝丞相曰此吾弄臣君其釋之夫見任如此則何患於左右小臣哉至如近世外戚宦豎請託不行意氣不滿立能䧟人於不測之禍惡可得彈正者哉曩者任之重而責之輕今者任之輕而責之重昔賈誼感絳侯之困辱因陳大臣亷耻之分開引}
  - {type: page-break, offset: 3516, content: '', id: KR2a0009_WYG_079-30b, image: WYG0253/WYG0253-0123d.png}
  - {type: variant, offset: 3516, length: 0, content: '', krp: 望三公勲立於國家績加於生民不亦逺乎昔文帝之於鄧通可謂至愛而猶展申屠嘉之志展猶申也文帝時太中大夫鄧通居上傍有怠慢禮丞相申屠嘉奏事見之罷朝召通責之曰通小臣戯殿上大不敬當斬通頓首首盡出血文帝使人召通謝丞相曰此吾弄臣君其釋之夫見任如此則何患於左右小臣哉至如近世外戚宦豎請託不行意氣不滿立能䧟人於不測之禍惡可得彈正者哉曩者任之重而責之輕今者任之輕而責之重昔賈誼感絳侯之困辱因陳大臣亷耻之分開引}
  - {type: variant, offset: 3517, length: 0, content: '', WYG: 裁之端文帝時賈誼上書曰大臣有罪不執縛係引而行也其有大罪者聞命則北靣再拜跪而自裁上不使人捽抑而刑之也是時丞相絳侯周勃免就國人有告勃謀反繫長安獄卒無事復爵邑故誼以此譏上上深納其言是後大臣有罪皆自殺不受刑也自此以來遂以成俗繼世之主生而見之習其所常曾莫之悟嗚呼可悲夫左手據天下之圖右手刎其喉愚者猶知難之况明哲君子哉言不以重利害其生事見莊子光武奪三公之重至今而加甚不假后黨以權數世而不行盖親疏之勢異也言光武奪三公重任今奪更甚光武不假后黨威權數代遂不遵行此為三公疏后族親故也母后之黨左右之人有此至親之勢故其貴任萬世常然之敗無世而無之莫之斯鑒亦可痛矣未若置丞相自總之若委三公則宜分任責成夫使為政者不當與之婚姻婚姻者不當使之為政也如此在位病人病人謂萬姓困敝也舉用失賢百姓不安争訟不息天地多變人物多妖然後可以分此罪矣或曰政在一人權甚重也曰人實難得何重之嫌昔者霍禹竇憲鄧隲梁冀之徒藉外戚之權管國家之柄及其伏誅以一言之詔詰朝而决何重之畏乎今夫國家漏神明於媟近輸權重於婦黨筭十世而為之者八九焉不此之罪而彼之疑何其詭邪此謂后黨彼謂三公也詭猶違也論曰百家之言政者尚矣尚猶逺也大畧歸乎寧固根柢革易時敝也夫遭運無常意見偏雜故是非之論紛然相乖嘗試妄論之謙不敢正言也以為世非胥庭人乖鷇飲化迹萬肇情故萌生赫胥氏大庭氏並古之帝號莊子曰夫聖人鶉居而鷇飲言鶉鳥無常居鷇飲不假物並淳朴時也肇始也雖周物之智不能研其推變山川之奥未足况其紆險易繫辭曰知周乎萬物而道濟天下推遷也莊子曰凡人心險於山川難於知天也則應俗適事難以常條如使用審其道則殊塗同會才爽其分則一豪以乖用得其人審其道也授非其才爽其分也易繫辭曰天下同歸而殊塗一致而百慮易緯曰差以毫釐失之千里何以言之若夫𤣥聖御世則天同極施舍之道宜無殊典莊子曰𤣥聖素王道也極猶致也言法天之道同其致也施舍猶興廢也而損益異運文朴遞行論語孔子曰殷因於夏禮所損益可知也朴質也禮記曰文質再而復也用明居晦囘泬於曩時興戈陳爼參差於上世囘泬猶携互不齊一也泬音穴及至戴黄屋服絺衣豐薄不齊而致化則一前書音義曰天子車以黄繒為盖裹故曰黄屋韓子曰堯之王天下也冬日鹿裘夏日葛衣絺葛也亦有宥公族黥國儲寛慘巨隔而防非必同此其分波而共源百慮而一致者也禮記曰公族有死罪獄成有司讞于公曰某之罪在大辟公曰宥之有司又曰在大辟公又曰宥之史記曰秦孝公太子犯法衛鞅曰太子君嗣也不可施刑刑其傅公子䖍黥其師公孫賈也若乃偏情矯用則枉直必過孟子曰矯枉過直矯正也枉曲也言正曲者過于直以喻為政者懲奢則太儉患寛則傷猛不能折𠂻也故葛屨履霜敝由崇儉詩魏風序曰葛屨刺褊也其君儉嗇褊急而無徳以}
