  - {type: variant, offset: 3483, length: 1, content: 斛, WYG: 人也又十取之則佐史之才已上十萬人也又十取之則可使在政理之位者萬人也以筋力用者謂之人人求丁壯以才智用者謂之士士貴耆老充此制以用天下之人猶將有儲何嫌乎不足也故物有不求未有無物之嵗也士有不用未有少士之世也夫如此而後可以用天性究人理興頓廢屬斷絶屬猶續也網羅遺漏拱押天人矣拱執也押㩜也押音下甲反或曰善為政者欲除煩去苛并官省職為之以無為事之以無事何子之言云云也老子云為無為事無事也曰若是三代不足摹聖人未可師也摹法也三代皆由肉刑及井田之法今不用是不摹之也君子用法制而至於化小人用法制而至於亂均是一法制也或以之化或以之亂行之不同也茍使豺狼牧羊豚盗跖主征税國家昏亂吏人放肆則惡復論損益之間哉惡音烏夫人待君子然後化理國待蓄積乃無憂患君子非自農桑以求衣}
  - {type: page-break, offset: 3483, content: '', id: KR2a0009_WYG_079-26b, image: WYG0253/WYG0253-0121d.png}
  - {type: page-break, offset: 3483, content: '', id: KR2a0009_WYG_079-27a, image: WYG0253/WYG0253-0122a.png}
