  - {type: variant, offset: 177, length: 1, content: 禁, WYG: 擇人所以為君深戒也幹雅自多不納其言統遂去之無幾幹以并州叛卒至於敗魏志曰高幹叛欲奔南荆州上洛都尉王琰捕斬之也并冀之士皆以是異統異其有知人之鑒也統性俶儻敢直言不矜小節黙語無常時人或謂之狂生每州郡命召輙稱疾不就常以為凡逰帝王者欲以立身揚名耳而名不常存人生易滅優游偃仰可以自娱欲卜居清曠以樂其志論之曰使居有良田廣宅背山臨流溝池環帀竹木周布場圃築前果園樹後舟車足以代歩渉之難使令足以息四體之役養親有兼珍之膳妻孥無苦身之勞孥讀曰奴良朋萃止則陳酒肴以娱之嘉時吉日則烹羔豚以奉之蹰躇畦苑逰戱平林蹰躇猶踟蹰也濯清水追凉風釣逰鯉弋高鴻諷於舞雩之下詠歸高堂之上雩祭旱之名也為壇而儛其上以祈雨焉論語曽㸃曰春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸安神閨房思老氏之𤣥虛呼吸精和求至人之仿佛老子曰𤣥之}
