  - {type: variant, offset: 17, length: 0, content: '', krp: 三十九王充傳王充字仲任會稽上虞人也其先自魏郡元城徙焉充少孤鄉里稱孝後到京師受業太學袁山松書曰充㓜聰明詣太學觀天子臨辟雍作六儒論師事扶風班彪好博覽而不守章句家貧無書常游洛陽市肆閲所賣書一見輙能誦憶遂博通衆流百家之言後歸鄉里屏居教授仕郡為功曹以數諫争不合去充好論説始若詭異終有理實以為俗儒守文多失其真乃閉門潛思絶慶弔之禮户牖牆壁各置刀筆著論衡八十五篇二十餘萬言袁山松書曰充所作論衡中土未有傳者蔡邕入吴始得之恒祕玩以為談助其後王朗為會稽太守又得其書及還許下時人稱其才進或曰不見異人當得異書問之果以論衡之益由是遂見傳焉抱朴子曰時人嫌蔡邕得異書或搜求其帳中隐處果得論衡抱數卷持去邕丁寧之曰唯我與爾共之勿廣也釋物類同異正時俗嫌疑刺史董勤辟為從事轉治中自免還家友人同郡謝夷吾上書薦充才學謝承書曰夷吾薦充曰充之天才非學所加雖前世孟軻孫卿近漢揚雄劉向司馬遷不能過也肅宗特詔公車徴病不行年漸七十志力衰耗乃造養性書十六篇裁節嗜欲頤神自守永元中病卒於家王符傳王符字節信安定臨涇人也少好學有志操與馬融竇章張衡崔瑗等友善安定俗鄙庶孽何休注公羊傳云孽賤也而符無外家為鄉人所賤自和安之後世務游宦當塗者更相薦引而符獨耿介不同於俗以此遂不得升進志意藴憤乃隐居著書三十餘篇以譏當時失得不欲章顯其名故號曰潛夫論其指訐時短討讁物情訐攻也讁責也足以觀見當時風政著其五篇云爾貴忠篇曰夫帝王之所尊敬者天也皇天之所愛育者人也今人臣受君之重位牧天之所愛焉可以不安而利之養而濟之哉是以君子任職則思利人達上則思進賢故居上而下不怨在前而後不恨也書稱天工人其代之王者法天而建官尚書咎繇謨曰亡曠庶官天工人其代之孔安國注云言人代天理官不可以天官私非其才也又曰明王奉若天道建邦設都孔安國注云天有日月北斗五星二十八宿皆有尊卑相正之法言明王奉順此道以立國設都也故明主不敢以私授忠臣不敢以虛受竊人之財猶謂之盗况偷天官以私已乎左傳介之推曰竊人之財猶謂之盗况貪天功以為已力乎以罪犯人必加誅罰况乃犯天得無咎乎夫五世之臣以道事君五代謂唐虞夏商周也劉攽曰五世之臣案此世字當是代字後人誤改澤及草木仁被率土是以福祚流衍本支百世詩大雅曰文王孫子本支百世季世之臣以謟媚主不思順天專仗殺伐白起蒙恬秦以為功天以為賊史記曰白起為秦將與趙戰于長平阬趙卒四十五萬人蒙恬為秦將北逐戎翟築長城起臨洮至遼東延袤萬餘里此為虐於人也息夫董賢主以為忠天以為盗息夫躬字子微哀帝時告東平王雲事封宜陵侯董賢字聖卿得幸哀帝為賢起大第于北闕下封為高安侯易曰徳薄而位尊智小而謀大鮮不及矣易繫辭之言是故徳不稱其禍必酷能不稱其殃必大劉攽曰案文少兩字盖本云徳不稱其位能不稱其禄夫竊位之人天奪其鑒論語孔子曰臧文仲其竊位者歟左傳晉卜偃曰虢必亡矣天奪之鑒而益其疾也杜預注云鑒所以自照也雖有明察之資仁義之志一旦富貴則背親捐舊喪其本心疎骨肉而親便辟薄知友而厚犬馬寧見朽貫千萬而不忍貸人一錢情知積粟腐倉而不忍貸人一斗骨肉怨望於家細人謗讟於道前人以敗後争襲之誠可傷也歴觀前政貴人之用心也與嬰兒子何其異哉嬰兒有常病貴人有常禍父母有常失人君有常過嬰兒常病傷於飽也貴臣常禍傷於寵也哺乳多則生癎病富貴盛而致驕疾愛子而賊之驕臣而滅之者非一也極其罰者乃有仆死深牢銜刀都市趙將李牧為韓倉所譛賜死將自誅臂短不能及銜刀于柱以自殺見戰國䇿豈非無功於天有害於人者乎夫鳥以山為埤而増巢其上魚以泉為淺而穿穴其中卒所以得者餌也曽子之文也亦見大戴禮貴戚願其宅吉而制為令名欲其門堅而造作鐡樞卒其所以敗者非苦禁忌少而門樞朽也常苦崇財貨而行驕僣耳不上順天心下育人物而欲任其私智竊弄君威反戾天地欺誣神明居累卵之危而圖太山之安為朝露之行而思傳世之功朝露言易盡也蘇子曰人生一世若朝露之託於桐葉耳其與幾何豈不惑哉豈不惑哉浮侈篇曰王者以四海為家兆人為子一夫不耕天下受其飢一婦不織天下受其寒文子曰神農之法曰丈夫丁壯不耕天下有受其飢者婦人當年不織天下有受其寒者故其耕不强者無以養生其織不力者無以衣形今舉俗舍本農趨商賈牛馬車輿填塞道路游手為巧充盈都邑游手為巧謂雕鏤之屬也務本者少浮食者衆商邑翼翼四方是極詩商頌文也鄭𤣥注云極中也翼翼然可則效乃四方之中正也今察洛陽資末業者什於農夫虛偽游手什於末業是則一夫耕百人食之一婦桑百人衣之以一奉百孰能供之天下百郡千縣市邑萬數類皆如此本末不足相供則民安得不飢寒飢寒並至則民安能無姦軌姦軌繁多則吏安能無嚴酷嚴酷數加則下安能無愁怨愁怨者多則咎徴並臻下民無聊而上天降灾則國危矣夫貧生於富弱生於彊亂生於化危生於安富而不節則貧强而驕人則弱居理而不脩徳則亂恃安而不慎微則危矣是故明主之養民憂之勞之教之誨之慎微防萌以斷其邪故易美節以制度不傷財不害民節以制度以下並節卦彖辭也鄭𤣥注云空府藏則傷財力役繁則害人二者奢泰之所致七月之詩大小教之終而復始由此觀之人固不可恣也七月詩豳風也大謂耕桑之法小謂索綯之類自春及冬終而復始也今人奢衣服侈飲食事口舌而習調欺或以謀姦合任為業合任謂相合為任俠也或以游博持掩為事博謂六博掩謂意錢也前書貨殖傳曰又况掘冢博掩犯姦成富也丁夫不扶犁鋤而懐丸挾彈携手上山遨遊或好取土作丸賣之外不足禦寇盗内不足禁䑕雀或作泥車瓦狗諸戱弄之具以巧詐小兒此皆無益也詩刺不績其麻市也婆娑詩陳風也婆娑舞貎謂婦人于市中歌舞以事神也又婦人不脩中饋休其蠶織易家人卦六二曰在中饋貞吉鄭𤣥注云中饋酒食也詩大雅曰婦無公事休其蠶織而起學巫祝鼓舞事神以欺誣細民熒惑百姓妻女羸弱疾病之家懐憂憤憒易為恐懼至使奔走便時去離正宅崎嶇路側風寒所傷姦人所利盗賊所中或増禍重祟至於死亡而不知巫所欺誤反恨事神之晚此妖妄之甚者也或刻畫好繒以書祝辭或虛飾巧言希致福祚或縻折金綵令廣分寸或斷截衆縷繞帶手腕或裁切綺縠縫紩成幡皆單費百縑用功千倍破牢為偽以易就難坐食嘉榖消損白日損或作捐夫山林不能給野火江海不能實漏巵皆所宜禁也昔孝文皇帝躬衣弋綈前書音義曰弋厚也綈繒也革舄韋帶而今京師貴戚衣服飲食車輿廬第奢過王制固亦甚矣且其徒御僕妾皆服文組綵牒牒即今疊布也錦繡綺紈葛子升越筩中女布説文曰綺文繒也前書曰齊俗作氷紈子細稱也沈懐逺南越志曰蕉布之品有三有蕉布有竹子布又有葛焉雖精麤之殊皆同出而異名揚雄蜀都賦曰布則蜘蛛作絲不可見風筩中黄潤一端數金盛𢎞之荆州記曰秭歸縣室多幽閑其女盡織布至數十升今永州俗猶呼貢布為女子布也犀象珠玉虎魄瑇瑁石山隐飾金銀錯鏤廣雅曰虎魄珠也生地中其上及旁不生草深者八九尺初時如桃膠凝堅乃成其方人以為枕出罽賔及大秦國吴録曰瑇瑁似龜而大出南海山石謂隐起為山石之文也窮極麗美轉相誇咤郭景純注子虛賦曰詫誇也咤與詫通也其嫁娶者車駢數里緹帷竟道蒼頡篇曰軿衣車駢音薄丁反又歩田反騎奴侍童夾轂並引富者競欲相過貧者耻其不逮一饗之所費破終身之業古者必有命然後乃得衣繒絲而乘車馬尚書大傳曰古之帝王者必有命人能敬長矜孤取舍好讓者命于其君得乘飾車軿馬衣文錦未有命者不得衣不得乘乘衣者有罰今雖不能復古宜令細民略用孝文之制古之葬者厚衣之以薪葬之中野不封不樹喪期無數後世聖人易之以棺椁易繫辭之言也桐木為棺葛采為緘尸子曰禹之喪法死于陵者葬于陵死于澤者葬于澤桐棺三寸制喪三日墨子曰舜西教乎七戎道死葬南巴之中衣衾三領欵木之棺葛以緘之采猶蔓也緘束也下不及泉上不泄臭中世以後轉用楸梓槐柏杶樗之屬各因方土裁用膠漆使其堅足恃其用足任如此而已今者京師貴戚必欲江南檽梓豫章之木檽音乃巨反見埤蒼爾雅曰栵檽音而注云檽似槲􅈪而痺小恐非棺椁之用豫章即樟木也邊逺下土亦競相放效夫檽梓豫章所出殊逺伐之高山引之窮谷入海乘淮逆河泝洛工匠雕刻連累日月會衆而後動多牛而後致重且千斤功將萬夫而東至樂浪西達敦煌費力傷農於萬里之地古者墓而不墳中世墳而不崇仲尼喪母冡高四尺遇雨而崩弟子請脩之夫子泣曰古不脩墓孔子合葬母于防曰吾聞之古也墓而不墳于是封之崇四尺孔子先反門人後雨甚至孔子曰爾來何遲也曰防墓崩孔子泫然流涕曰吾聞之古不脩墓見禮記也及鯉也死有棺無椁文帝葬芷陽縣名屬京兆文帝後改曰覇陵明帝葬洛南皆不藏珠寳不起山陵墓雖卑而徳最高今京師貴戚郡縣豪家生不極養死乃崇喪或至金縷玉匣檽梓楩柟多埋珍寳偶人車馬造起大冢廣種松栢廬舍祠堂務崇華侈案鄗畢之陵南城之冢畢周文王武王葬地也司馬遷云在鄗東南杜中無墳隴在今咸陽縣西北孔安國注尚書云在長安西北南城山曾子父所葬在今沂州費縣西南也周公非不忠曾子非不孝以為襃君愛父不在於聚財揚名顯親無取於車馬昔晉靈公多賦以雕牆春秋以為不君左傳晉靈公不君厚歛以雕牆杜預注云不君失君道也雕畫也華元樂舉厚葬文公君子以為不臣左傳曰宋文公卒始厚葬用蜃炭益車馬始用殉椁有四阿棺有翰檜君子謂華元樂舉於是不臣是棄君於惡也况於羣司士庶乃可僣侈主上過天道乎前書貢禹曰今大夫僣諸侯諸侯僣天子天子過天道其日久矣實貢篇曰國以賢興以謟衰君以忠安以佞危此古今之常論而時所共知也然衰國危君繼踵不絶者豈時無忠信正直之士哉誠苦其道不得行耳夫十歩之間必有茂草十室之邑必有忠信説苑曰十歩之澤必有芳草論語曰十室之邑必有忠信也是故亂殷有三仁小衛多君子亂殷謂紂時也三仁箕子微子比干也左傳吴季札適衛悦蘧瑗史狗史鰌公子荆公叔發公子朝曰衛多君子未有患也又臧宣叔曰衛之于晉不得為次國杜預注云春秋之時以彊弱為大小衛雖侯爵猶為小國今以大漢之廣土士民之繁庶朝廷之清明上下之脩正而官無善吏位無良臣此豈時之無賢諒由取之乖實夫志道者少與逐俗者多疇是以朋黨用私背實趨華其貢士者不復依其質幹凖其才行但虛造聲譽妄生羽毛略計所舉嵗且二百覽察其狀則徳侔顔冉詳覈厥能則鮮及中人皆總務升官自相推逹夫士者貴其用也不必求備故四友雖美能不相兼尚書大傳孔子曰文王得四臣丘亦得四友謂囘也為疏附賜也為奔走師也為先後由也為禦侮其能各不同也三仁齊致事不一節高祖佐命出自亡秦光武得士亦資暴莽况太平之時而云無士乎夫明君之詔也若聲忠臣之和也如響長短大小清濁疾徐必相應也且攻玉以石洗金以鹽詩小雅曰它山之石可以攻玉今之金工發金色者皆淬之于鹽水焉濯錦以魚浣布以灰夫物固有以賤理貴以醜化好者矣智者棄短取長以致其功今使貢士必覈以實其有小疵勿彊衣飾衣飾謂裝飾以成其過也衣音於氣反出處語黙各因其方則蕭曹周韓之倫何足不致吳鄧梁竇之屬企踵可待孔子曰未之思也夫何逺之有愛日篇曰國之所以為國者以有民也民之所以為民者以有榖也榖之所以豐殖者以有民功也功之所以能建者以日力也化國之日舒以長故其民閑暇而力有餘亂國之日促以短故其民困務而力不足舒長者非謂羲和安行羲和日也山海經曰東南海之外甘水之間有羲和之國有女子曰羲和方浴日于甘泉羲和者帝俊之妻是生十日郭璞注曰羲和盖天地始生日月者也乃君明民静而力有餘也促短者非謂分度損減洛書甄耀度曰凡周天三百}
