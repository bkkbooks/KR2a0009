  - {type: variant, offset: 2792, length: 638, content: 斯得庶續桓文忠誠之効遂舉兵攻紹於是冀州諸城悉畔從瓚紹懼乃以所佩勃海太守印綬授瓚從弟範遣之郡欲以相結而範遂背紹領勃海兵以助瓚瓚乃自署其將帥為青冀兗三州刺史又悉置郡縣守令與紹大戰於界橋瓚軍敗還薊紹遣將崔巨業將兵數萬攻圍故安不下退軍南還瓚將步騎三萬人追擊於巨馬水大破其衆死者七八千人乘勝而南攻下郡縣遂至平原乃遣其青州刺史田揩據有齊地紹復遣兵數萬與揩連戰二年糧食並盡士卒疲困互掠百姓野無青草紹乃遣子譚為青州刺史揩與戰敗退還是歲瓚破禽劉虞盡有幽州之地猛志益盛前此有童謠曰燕南垂趙北際中央不合大如礪唯有此中可避世瓚自以為易地當之遂徙鎮焉乃盛修營壘樓觀數十臨易河通遼海劉虞從事漁陽鮮于輔等合率州兵欲共報瓚輔以燕國閻柔素有恩信推為烏桓司馬柔招誘胡漢數萬人與瓚所置漁陽太守鄒丹戰于潞北斬丹等四千餘級烏桓峭王感虞恩德率種人及鮮卑七千餘騎共輔南迎虞子和與袁紹將麴義合兵十萬共攻瓚興平二年破瓚於鮑丘斬首二萬餘級瓚遂保易京開置屯田稍得自支相持歲餘麴義軍糧盡士卒飢困餘衆數千人退走瓚徼破之盡得其車重是時旱蝗穀貴民相食瓚恃其才力不恤百姓記過忘善睚眦必報州里善士名在其右者必以法害之常言衣冠皆自以職分富貴不謝人惠故所寵愛類多商販庸兒所在侵暴百姓怨之於是代郡廣陽上谷右北平各殺瓚所置長吏復與輔和兵合瓚慮有非常乃居於高京以鐵為門斥去左右男人七歲以上不得入易門專侍姬妾其文簿書記皆汲而上之令婦人習為大言聲使聞數百步以傳宣教令疏遠賓客無所親信故謀臣猛將稍有乖散自此之後希復攻戰或問其故瓚曰我昔驅畔胡於塞表埽黃巾於孟津, WYG: ''}
