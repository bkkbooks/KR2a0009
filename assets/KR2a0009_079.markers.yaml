  - {type: variant, offset: 20, length: 0, content: '', WYG: 十二里日一日行一度月一日行十三度十九分度之一也乃上闇下亂力不足也孔子稱既庶則富之既富乃教之是故禮義生於富足盗竊起於貧窮富足生於寛暇貧窮起於無日聖人深知力者民之本國之基也故務省徭役使之愛日是以堯勑羲和欽若昊天敬授民時明帝時公車以反支日不受章奏凡反支日用月朔為正戌亥朔一日反支申酉朔二日反支午未朔三日反支辰巳朔四日反支寅夘朔五日反支子丑朔六日反支見隂陽書也帝聞而怪曰民廢農桑逺來詣闕而復拘以禁忌豈為政之意乎於是遂蠲其制令寃民仰希申訴而令長以神自畜難見如神也}
