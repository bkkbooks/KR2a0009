  - {type: variant, offset: 3492, length: 3, content: 變建安, WYG: 君子也穽穿地䧟獸也機弩牙也盗賊凶荒九州代作饑饉暴至軍旅卒發横税弱人割奪吏禄所恃者寡所取者猥猥猶多也萬里懸乏首尾不救徭役並起農桑失業兆民呼嗟於昊天貧窮轉死於溝壑矣今通肥饒之率計稼穯之入令畝收三斛斛取一㪷未為甚多一嵗之間則有數年之儲雖興非法之役恣奢侈之欲廣愛幸之賜猶未能盡也不循古法規為輕税及至一方有警一面被灾未逮}
