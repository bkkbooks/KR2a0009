  - {type: variant, offset: 2638, length: 130, content: 無虛退之心紹罪九也又長沙太守孫堅前領豫州刺史遂能驅走董卓埽除陵廟忠勤王室其功莫大紹遣小將盜居其位斷絕堅糧不得深入使董卓久不服誅紹罪十也昔姬周政弱王道陵天子遷徙諸侯背畔故齊桓立柯會亭之盟晉文為踐土之會伐荊楚以致菁茅誅曹衞以章無禮臣雖闒茸名非先賢蒙被朝恩負荷重任職, WYG: 已定貴有常家尊}
