  - {type: variant, offset: 179, length: 1, content: 洛, WYG: 𤣥虛其心實其腹呼吸謂咽氣養生也莊子曰吹煦呼吸吐故納新又曰至人無已也與逹者數子論道講書俯仰二儀錯綜人物彈南風之雅操發清商之妙曲家語曰舜彈五絃之琴造南風之詩曰南風之薫兮可以解吾民之慍兮南風之時兮可以阜吾民之財兮三禮圖曰琴本五絃曰宫商角徴羽文王增二曰少宫少商弦最清也消揺一世之上睥睨天地之間不受當時之責永保性命之期如是則可以陵霄漢出宇宙之外矣豈羡夫入帝王之門哉又作詩二篇以見其志辭曰飛鳥遺跡蟬蛻亡殻騰蛇棄鱗神龍喪角王充論衡曰蠐螬化為復育復育轉為蟬蟬之去復育龜之解甲蛇之脱皮可謂尸解矣蛻音式銳反爾雅曰騰蛇有鱗廣雅曰有角曰龍喪角解角也至人能變逹士㧞俗乘雲無轡騁風無足􅂷露成幃張霄成幄沆瀣當餐九}
