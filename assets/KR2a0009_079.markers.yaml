  - {type: variant, offset: 3485, length: 0, content: '', WYG: 者也蓄積非横賦歛以取優饒者也奉禄誠厚則割剥貿易之罪乃可絶也蓄積誠多則兵宼水旱之灾不足苦也故由其道而得之民不以為奢由其道而取之民不以為勞天灾流行開倉庫以禀貸不亦仁乎衣食有餘損靡麗以散施不亦義乎彼君子居位為士民之長固宜重肉累帛朱輪駟馬今反謂薄屋者為高藿食者為清既失天地之性又開虛偽之名使小智居大位庶績不咸熙未必不由}
