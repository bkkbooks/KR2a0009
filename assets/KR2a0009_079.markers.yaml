  - {type: variant, offset: 3885, length: 731, content: 袁紹戰死鮮于輔將其衆歸曹操操以輔為度遼將軍封都亭侯閻柔將部曲曹操擊烏桓拜護烏桓校尉封關內侯張燕既為紹所敗人衆稍散曹操將定冀州乃率衆詣鄴降拜平北將軍封安國亭侯論曰自帝室王公之冑皆生長脂腴不知稼穡其能厲行飭身卓然不羣者或未聞焉劉虞守道慕名以忠厚自牧美哉乎季漢之名宗子也若虞瓚無閒同情共力糾人完聚保燕薊之饒繕兵昭武以臨羣雄之𨻶舍諸天運徵乎人文則古之休烈何遠之有陶謙字恭祖丹陽人也少為諸生仕州郡四遷為車騎將軍張溫司馬西討邊章會徐州黃巾起以謙為徐州刺史擊黃巾大破走之境內晏然時董卓雖誅而李傕郭汜作亂關中是時四方斷絕謙每遣使閒行奉貢西京詔遷為徐州牧加安東將軍封溧陽侯是時徐方百姓殷盛穀實甚豐流民多歸之而謙信用非所刑政不理別駕從事趙昱知名士也而以忠直見疎出為廣陵太守曹宏等讒慝小人謙甚親任之良善多被其害由斯漸亂下邳閻闕宣自稱天子謙始與合從後遂殺之而并其衆初曹操父嵩避難琅邪時謙別將守陰平士卒利嵩財寶遂襲殺之初平四年曹操擊謙破彭城傅陽謙退保郯操攻之不能克乃還過拔取慮雎陵夏丘皆屠之凡殺男女數十萬人雞犬無餘泗水為之不流自是五縣城保無復行迹初三輔遭李傕亂百姓流移依謙者皆殲興平元年曹操復擊謙略定琅邪東海諸縣謙懼不免欲走歸丹陽會張邈迎呂布據兗州操還擊布是歲謙病死初同郡人笮融聚衆數百往依於謙謙使督廣陵下邳彭城運糧遂斷三郡委輪大起浮屠寺上累金盤下為重樓又堂閣周回可容三千許人作黃金塗像衣以錦綵每浴佛輒多設飲飯布席於路其有就食及觀者且萬餘人及曹操擊謙徐方不安融乃將男女萬口馬三千匹走廣陵廣陵太守趙昱待以賓禮融利廣陵資貨遂乘酒酣殺昱放兵大掠因以過江南奔豫章殺郡守朱皓入據其城後為楊州刺史劉繇所破走入山中為人所殺昱字元達琅邪人清己疾惡潛志好學雖親友希得見之為人耳不邪聽目不妄視太僕种拂舉為方正, WYG: 音余}
