  - {type: variant, offset: 3497, length: 3, content: 袁紹復, WYG: 校計騫矩坐視戰士之蔬食立望餓殍之滿道如之何為君行此政也孟子曰塗有餓殍而不知發趙岐注云餓死者曰莩莩與殍通音皮表反二十税一名之曰貊况三十税一乎孟子載白圭曰吾欲二十而取一何如孟子曰子之道貊也趙岐注云貊夷貊之人在荒者也貊在北方其氣寒不生五榖無中國之禮故可二十取一而足也此言欲輕税也夫薄吏禄以豐軍用縁於秦征諸侯續以四夷漢承其業遂不改更危國亂家此之由也今田無常主民無常居吏食日禀禀給也禄班未定劉攽曰案文當作班禄可為法制畫一定科租税十一更賦如舊更賦已見光武紀也今者土廣民稀中地未墾上田已耕唯中地已下未也雖然猶當限以}
  - {type: page-break, offset: 3497, content: '', id: KR2a0009_WYG_079-28b, image: WYG0253/WYG0253-0122d.png}
  - {type: variant, offset: 3497, length: 3, content: 袁紹復, krp: 校計騫矩坐視戰士之蔬食立望餓殍之滿道如之何為君行此政也孟子曰塗有餓殍而不知發趙岐注云餓死者曰莩莩與殍通音皮表反二十税一名之曰貊况三十税一乎孟子載白圭曰吾欲二十而取一何如孟子曰子之道貊也趙岐注云貊夷貊之人在荒者也貊在北方其氣寒不生五榖無中國之禮故可二十取一而足也此言欲輕税也夫薄吏禄以豐軍用縁於秦征諸侯續以四夷漢承其業遂不改更危國亂家此之由也今田無常主民無常居吏食日禀禀給也禄班未定劉攽曰案文當作班禄可為法制畫一定科租税十一更賦如舊更賦已見光武紀也今者土廣民稀中地未墾上田已耕唯中地已下未也雖然猶當限以}
  - {type: variant, offset: 3501, length: 8, content: 攻瓚瓚遣子續請救, WYG: 家勿令過制其地有草者盡曰官田力堪農事乃聼受之若聼其自取後必為姦也法誡篇曰周禮六典冢宰貳王而理天下爾雅曰冡大也貳謂副貳也周禮天官冡宰掌建邦之六典以佐王理邦國一曰理典以理官府二曰教典以擾萬姓三曰禮典以諧萬姓四曰政典以均萬姓五曰刑典以紏萬姓六曰事典以生萬姓也春秋之時諸侯明徳者皆一卿為政爰及戰國亦皆然也秦兼天下則置丞相而貳之以御史大夫自高帝逮于孝成因而不改多終其身漢之隆盛是惟在焉夫任一人則政專任數人則相倚政專則和諧相倚則違戾和諧則太平之所興也違戾則荒亂之所起也光武皇帝愠數世之失權忿彊臣之竊命愠猶恨也數代謂元成哀平彊臣謂王莽矯枉過直政不任下雖置三公事歸臺閣臺閣謂尚書也自此以來三公之職備員而已然政有不理猶加譴責而權移外戚之家寵被近習之豎親其黨類用其私人内充京師外布列郡顛倒賢愚貿易選舉疲駑守境貪殘牧民撓擾百姓忿怒四夷撓音火高反招致乖叛亂離斯瘼瘼病也怨氣並作隂陽失和三光虧缺怪異數至蟲螟食稼水旱為灾此皆戚宦之臣所致然也反以策讓三公至}
