  - {type: 'tls:seg', offset: 3434, content: '', id: KR2a0009_ZHSJ_079-d79p18s39}
  - {type: variant, offset: 3434, length: 0, content: '', WYG: 雖下愚之才居之猶能使恩同天地威侔鬼神暴風疾霆不足以方其怒陽春時雨不足以喻其澤周孔數千無所復角其聖賁育百萬無所復奮其勇矣彼後嗣之愚主見天下莫敢與之違自謂若天地之不可亡也乃奔其私嗜騁其邪欲君臣宣滛上下同惡左傳泄冶諫陳靈公曰公卿宣滛人無效焉杜預注云宣示也目極角觝之觀耳窮鄭衛之聲武帝元封三年作角觝戯音義云兩兩相當角力角伎蓺射御故名角觝盖雜技樂以巴俞戯魚龍蔓延之屬也後更名平樂觀禮記曰鄭音好濫滛志宋音宴安溺志也入則耽於婦人出則馳於田獵荒廢庶政棄亡人物澶漫彌流無所底極澶漫猶縱逸也澶音徒旦反莊子外篇曰澶漫為樂也信任親愛者盡佞謟容悅之人也寵貴隆豐者盡后妃姬妾之家也使餓狼守庖厨飢虎牧牢豚遂至熬天下之脂膏斵生人之骨髓怨毒無聊禍亂並起中國擾攘四夷侵叛土崩瓦解一朝而去昔之為我哺乳之子孫者今盡是我飲血之宼讐也至於運徙勢去猶不覺悟者豈非富貴生不仁沈溺致愚疾邪存亡以之迭代政亂從此周復天道常然之大數也左傳曰美惡周必復天之道也又政之為理者取一切而已非能斟酌賢愚之分以開盛衰之數也日不如古彌以逺甚豈不然邪漢興以來相與同為編户齊民而以財力相君長者世無數焉而清潔之士徒自苦於茨棘之間無所益損於風俗也豪人之室連棟數百膏田滿野奴婢千羣徒附萬計徒衆也附親也船車賈販周於四方廢居積貯滿於都城史記曰轉轂百數廢居蓄邑注云有所廢有所蓄言其乘時射利也琦賂寳貨巨室不能容琦瑋也抱朴子曰片玉可以𤦺奚必俟盈尺也馬牛羊豕山谷不能受妖童美妾填乎綺室倡謳妓樂列乎深堂賓客待見而不敢去車騎交錯而不敢進三牲之肉臭而不可食清醇之酎敗而不可飲睇盼則人從其目之所視喜怒則人隨其心之所慮此皆公侯之廣樂君長之厚實也茍運智詐者則得之焉茍能得之者人不以為罪焉源發而横流路開而四通矣求士之舍榮樂而居窮苦舍音式者反棄放逸而赴束縛夫誰肯為之者邪束縛謂自潔清如拘執也夫亂世長而化世短亂世則小人貴寵君子困賤當君子困賤之時跼高天􅐲厚地猶恐有鎮壓之禍也詩小雅曰}
