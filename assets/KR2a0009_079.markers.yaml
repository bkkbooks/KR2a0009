  - {type: variant, offset: 30, length: 1, content: 祖, WYG: 從此言之中才以上足議曲直鄉亭部吏亦有任决斷者而類多枉曲盖有故焉夫理直則恃正而不橈事曲則謟意以行賕不橈故無恩於吏行賕故見私於法若事有反覆吏應坐之吏以應坐之故不得不枉之於廷以羸民之少黨而與豪吏對訟其勢得無屈乎縣承吏言故與之同若事有反覆縣亦應坐之縣以應坐之故而排之於郡以一民之輕而與一縣為訟其理豈得申乎事有反覆郡亦坐之郡以共坐之故而排之於州以一民之輕與一郡為訟其事豈獲勝乎既不肯理故乃逺詣公府公府復不能察而當延以日月貧弱者無以曠旬彊富者可盈千日理訟若此何枉之能理乎正士懐怨結而不見信信讀曰申猾吏崇姦軌而不被坐此小民所以易侵苦而天下所以多困窮也且除上天感痛致灾但以人功見事言之自三府州郡至於鄉縣典司之吏辭訟之民官事相連更相檢對者日可有十萬人一人有事二人經營是為日三十萬人廢其業也以中農率之則是嵗三百萬人受其飢者也然則盗賊何從而銷太平何由而作乎詩云莫肯念亂誰無}
  - {type: page-break, offset: 30, content: '', id: KR2a0009_WYG_079-13a, image: WYG0253/WYG0253-0115a.png}
  - {type: page-break, offset: 30, content: '', id: KR2a0009_WYG_079-13b, image: WYG0253/WYG0253-0115b.png}
  - {type: variant, offset: 30, length: 1, content: 祖, krp: 從此言之中才以上足議曲直鄉亭部吏亦有任决斷者而類多枉曲盖有故焉夫理直則恃正而不橈事曲則謟意以行賕不橈故無恩於吏行賕故見私於法若事有反覆吏應坐之吏以應坐之故不得不枉之於廷以羸民之少黨而與豪吏對訟其勢得無屈乎縣承吏言故與之同若事有反覆縣亦應坐之縣以應坐之故而排之於郡以一民之輕而與一縣為訟其理豈得申乎事有反覆郡亦坐之郡以共坐之故而排之於州以一民之輕與一郡為訟其事豈獲勝乎既不肯理故乃逺詣公府公府復不能察而當延以日月貧弱者無以曠旬彊富者可盈千日理訟若此何枉之能理乎正士懐怨結而不見信信讀曰申猾吏崇姦軌而不被坐此小民所以易侵苦而天下所以多困窮也且除上天感痛致灾但以人功見事言之自三府州郡至於鄉縣典司之吏辭訟之民官事相連更相檢對者日可有十萬人一人有事二人經營是為日三十萬人廢其業也以中農率之則是嵗三百萬人受其飢者也然則盗賊何從而銷太平何由而作乎詩云莫肯念亂誰無}
  - {type: variant, offset: 32, length: 7, content: 嘉光祿勳虞初舉, WYG: 母詩小雅也百姓不足君誰與足可無思哉可無思哉述赦篇曰凡療病者必知脉之虛實氣之所結然後為之方故疾可愈而夀可長也為國者必先知民之所苦禍之所起然後為之禁故姦可塞而國可安也今日賊良民之甚者莫大於數赦贖赦贖數則惡人昌而善人傷矣何以明之哉夫謹𠡠之人身不蹈非又有為吏正直不避彊禦而姦猾之黨横加誣言者皆知赦之不久故也善人君子被侵怨而能至闕庭自明者萬無數人數人之中得省問者百不過一既對尚書而空遣去者復什六七矣其輕薄姦軌既䧟罪法怨毒之家冀其辜戮以解畜憤而反一槩悉䝉赦釋令惡人高會而誇咤老盗服臧而過門}
  - {type: page-break, offset: 32, content: '', id: KR2a0009_WYG_079-14a, image: WYG0253/WYG0253-0115c.png}
