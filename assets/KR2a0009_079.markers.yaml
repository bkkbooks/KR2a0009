  - {type: variant, offset: 21, length: 1, content: 虞, WYG: 攽曰令寃民仰希申訴案文令當作今百姓廢農桑而趨府廷者相續道路非朝餔不得通非意氣不得見説文曰餔謂日加申時也今為晡}
  - {type: variant, offset: 21, length: 1, content: 虞, krp: 攽曰令寃民仰希申訴案文令當作今百姓廢農桑而趨府廷者相續道路非朝餔不得通非意氣不得見説文曰餔謂日加申時也今為晡}
  - {type: variant, offset: 23, length: 5, content: 伯安東海郯, WYG: 也或連日累月更相瞻視或轉請鄰里饋糧應對嵗功既虧天下豈無受其飢者乎孔子曰聼訟吾猶}
