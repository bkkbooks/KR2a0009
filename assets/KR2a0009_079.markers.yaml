  - {type: variant, offset: 3437, length: 2, content: 指麾, krp: 世人主一切之愆也昔春秋之時周氏之亂世也逮乎戰國則又甚矣秦政乘并兼之埶放虎狼之心政始皇名屠裂天下吞食生人暴虐不已以招楚漢用兵之苦甚於戰國之時也漢二百年而遭王莽之亂漢至王莽簒位二百一十四年云二百者舉全數計其殘夷滅亡之數又復倍乎秦項矣以及今日名都空而不居百里絶而無民者不}
  - {type: variant, offset: 3440, length: 1, content: 定, WYG: 勝數孝平帝時凡郡國一百三縣邑一千三百一十四道三十四侯國二百四十一地東西九千三百二里南北一萬三百六十八里人户一千二百二十三萬三千六十二口五千九百五十九萬四千九百七十八此漢家極盛之時遭王莽喪亂暨光武中興海内人户凖之於前十裁二三邊方蕭條略無孑遺孝靈遭黄巾之宼獻帝嬰董卓之禍英雄棊峙白骨膏野兵亂相尋三十餘年三方既寧萬不存一也此則又甚於亡新之時也悲夫不及五百年大難三起秦三王二帝通在位四十九年前漢二百三十年後漢百九十五年凡四百七十四年故云不及五百年也三起謂秦末及王莽并獻帝時也中間之亂尚不數焉變而彌猜下而加酷下猶後也推此以往可及於盡矣嗟乎不知來世聖人救此之道將何用也又不知天若窮此之數欲何至邪損益篇曰作有利於時制有便於物者可為也事有乖於數法有翫於時者可改也故行於古有其迹用於今無其功者不可不變變而不如前易而多所敗者亦不可不復也漢之初興分王子弟委之以士民之命假之以生殺之權於是驕逸自恣志意無厭魚肉百姓以盈其欲報蒸骨血以快其情上有簒叛不軌之姦下有暴亂殘賊之害雖籍親屬之恩盖源流形勢使之然也降爵削土稍稍割奪卒}
