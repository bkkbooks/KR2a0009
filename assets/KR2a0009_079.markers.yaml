  - {type: variant, offset: 40, length: 4, content: 廉稍遷幽, WYG: 子見讐而不得討遭盗者覩物而不敢取痛莫甚焉夫養稂莠者傷禾稼恵姦軌者賊良民爾雅曰稂童粮郭璞注云莠類也詩曰不稂不莠稂音郎書曰文王作罸刑兹無赦康誥之言也先王之制刑法也非好傷人肌膚斷人夀命也貴威姦懲惡除人害也故經稱天命有徳五服五章哉天討有罪五刑五用哉詩刺彼宜有罪汝反脱之詩大雅也此宜無罪汝反収之彼宜有罪汝反脱之毛萇注云脱赦也古者唯始受命之君承大亂之極寇賊姦軌難為法禁故不得不有一赦與之更新頤育萬物以成大化非以養姦活罪放縱天賊也夫性惡之民民之豺狼雖得放宥之澤終無改悔之心旦脱重梏夕還囹圄嚴明令尹不能使其斷絶何也凡敢為大姦者才必有過於衆而能自媚於上者也多散誕得之財奉以謟諛之辭以轉相驅誕猶虛也非有第五公之亷直孰不為顧哉謂第五倫也為司空性亷直也論者多曰久不赦則姦軌熾而吏不制宜數肆眚以解散之此未昭政亂之本源不察禍福之所生也後度遼將軍皇甫規解官歸安定鄉人有以貨得鴈門太守者亦去職還家書刺謁規規臥不迎既入而問卿前在郡食鴈美乎有頃又白王符在門規素聞符名乃驚遽而起衣不及帶屣履出迎援符手而還與同坐極歡時人為之語曰徒見二千石不如一縫掖禮記儒行孔子曰丘少居魯衣逢掖之衣鄭𤣥注曰逢猶大也大掖之衣大袂單衣也言書生道義之為貴也符竟不仕終於家仲長統傳仲長統字公理山陽高平人也少好學博渉書記贍於文辭年二十餘游學青徐并冀之間與交友者多異之并}
