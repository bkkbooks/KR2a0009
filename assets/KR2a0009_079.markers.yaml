  - {type: variant, offset: 635, length: 2001, content: 物由是與瓚漸不相平二年冀州刺史韓馥勃海太守袁紹及山東諸將議以朝廷幼沖逼於董卓遠隔關塞不知存否以虞宗室長者欲立為主乃遣故樂浪太守張岐等齎議上虞尊號虞見岐等厲色叱之曰今天下崩亂主上蒙塵吾被重恩未能清雪國恥諸君各據州郡宜共勠力盡心王室而反造逆謀以相垢誤邪固拒之馥等又請虞領尚書事承制封拜復不聽遂收斬使人於是選掾右北平田疇從事鮮于銀蒙險閒行奉使長安獻帝既思東歸見疇等大悅時虞子和為侍中因此遣和潛從武關出告虞將兵來迎道由南陽後將軍袁術聞其狀遂質和使報虞遣兵俱西虞乃使數千騎就和奉迎天子而術竟不遣之初公孫瓚知術詐固止虞遣兵虞不從瓚乃陰勸術執和使奪其兵自是與瓚仇怨益深和尋得逃術還北復為袁紹所留瓚既累為紹所敗而猶攻之不已虞患其黷武且慮得志不可復制固不許行而稍節其稟假瓚怒屢違節度又復侵犯百姓虞所賚賞典當胡夷瓚數抄奪之積不能禁乃遣驛使奉章陳其暴掠之罪瓚亦上虞稟糧不周二奏交馳互相非毀朝廷依違而已瓚乃築京於薊城以備虞虞數請瓚輒稱病不應虞乃密謀討之以告東曹掾右北平魏攸攸曰今天下引領以公為歸謀臣爪牙不可無也瓚文武才力足恃雖有小惡固宜容忍虞乃止頃之攸卒而積忿不已四年冬遂自率諸屯兵衆合十萬人以攻瓚將行從事代郡程緒免冑而前曰公孫瓚雖有過惡而罪名未正明公不先告曉使得改行而兵起蕭牆非國之利加勝敗難保不如駐兵以武臨之瓚必悔禍謝罪所謂不戰而服人者也虞以緒臨事沮議遂斬之以徇戒軍士曰無傷餘人殺一伯珪而已時州從事公孫紀者瓚以同姓厚待遇之紀知虞謀而夜告瓚瓚時部曲放散在外倉卒自懼不免乃掘東城欲走虞兵不習戰又愛人廬舍勑不聽焚燒急攻圍不下瓚乃簡募銳士數百人因風縱火直衝突之虞遂大敗與官屬北奔居庸縣瓚追攻之三日城陷遂執虞并妻子還薊猶使領州文書會天子遣使者段訓增虞封邑督六州事拜瓚前將軍封易侯假節督幽并司青冀瓚乃誣虞前與袁紹等欲稱尊號脅訓斬虞於薊市先坐而呪曰若虞應為天子者天當風雨以相救時旱埶炎盛遂斬焉傳首京師故吏尾敦於路劫虞首歸葬之瓚乃上訓為幽州刺史虞以恩厚得衆懷被北州百姓流舊莫不痛惜焉初虞以儉素為操冠敝不改乃就補其穿及遇害瓚兵搜其內而妻妾服羅紈盛綺飾時人以此疑之和後從袁紹報瓚云公孫瓚字伯珪遼西令支人也家世二千石瓚以母賤遂為郡小吏為人美姿貌大音聲言事辯慧太守奇其才以女妻之後從涿郡盧植學於緱氏山中略見書傳舉上計吏太守劉君坐事檻車徵官法不聽吏下親近瓚乃改容服詐稱侍卒身執徒養御車到洛陽太守當徙日南瓚具豚酒於北芒上祭辭先人酹觴祝曰昔為人子今為人臣當詣日南日南多瘴氣恐或不還便當長辭墳塋慷慨悲泣再拜而去觀者莫不歎息既行於道得赦瓚還郡舉孝廉除遼東屬國長史嘗從數十騎出行塞下卒逢鮮卑數百騎瓚乃退入空亭約其從者曰今不奔之則死盡矣乃自持兩刃矛馳出衝賊殺傷數十人瓚左右亦亡其半遂得免中平中以瓚督烏桓突騎車騎將軍張溫討涼州賊會烏桓反畔與賊張純等攻擊薊中瓚率所領追討純等有功遷騎都尉張純復與畔胡丘力居等寇漁陽河閒勃海入平原多所殺略瓚追擊戰於屬國石門虜遂大敗𠫓廾妻子踰塞走悉得其所略男女瓚深入無繼反為丘力居等所圍於遼西管子城二百餘日糧盡食馬馬盡弩楯力戰不敵乃與士卒辭訣各分散還時多雨雪隊阬死者十五六虜亦飢困遠走柳城詔拜瓚降虜校尉封都亭侯復兼領屬國長史職統戎馬連接邊寇每聞有警瓚輒厲色憤怒如赴讎敵望塵奔逐或繼之以夜戰虜識瓚聲憚其勇莫敢抗犯瓚常與善射之士數十人皆乘白馬以為左右翼自號白馬義從烏桓更相告語避白馬長史乃畫作瓚形馳騎射之中者咸稱萬歲虜自此之後遂遠竄塞外瓚志埽滅烏桓而劉虞欲以恩信招降由是與虞相忤初平二年青徐黃巾三十萬衆入勃海界欲與黑山合瓚率步騎二萬人逆擊於東光南大破之斬首三萬餘級賊𠫓廾其車重數萬兩奔走度河瓚因其半濟薄之賊復大破死者數萬流血丹水收得生口七萬餘人車甲財物不可勝筭威名大震拜奮武將軍封薊侯瓚既諫劉虞遣兵就袁術而懼術知怨之乃使從弟越將千餘騎詣術自結術遣越隨其將孫堅擊袁紹將周昕越為流矢所中死瓚因此怒紹遂出軍屯槃河將以報紹乃上疏曰臣聞皇羲已來君臣道著張禮以導人設刑以禁暴今車騎將軍袁紹託承先軌爵任崇厚而性本淫亂情行浮薄昔為司隸值國多難太后承攝何氏輔朝紹不能舉直措枉而專為邪媚招來不軌疑誤社稷至令丁原焚燒孟津董卓造為亂始紹罪一也卓既無禮帝主見質紹不能開設權謀以濟君父而𠫓廾置節傳迸竄逃亡忝辱爵命背違人主紹罪二也紹為勃海當攻董卓而默選戎馬不告父兄至使太傅一門纍然同斃不仁不孝紹罪三也紹既興兵涉歷二載不恤國難廣自封植乃多引資糧專為不急割刻無方考責百姓其為痛怨莫不咨嗟紹罪四也逼迫韓馥竊奪其州矯刻金玉以為印璽每有所下輒皁囊施檢文稱詔書昔亡新僭侈漸以即真觀紹所擬將必階亂紹罪五也紹令星工伺望祥妖賂遺財貨與共飲食剋會期日攻鈔郡縣此豈大臣所當施為紹罪六也紹與故虎牙都尉劉勳首共造兵勳降服張楊累有功効而以小忿枉加酷害信用讒慝濟其無道紹罪七也故上谷太守高焉故甘陵相姚貢紹以貪惏橫責其錢錢不備畢二人并命紹罪八也春秋之義子以母貴紹母親為傅婢地實微賤據職高重享福豐隆有苟進, WYG: ''}
