  - {type: variant, offset: 3456, length: 3, content: 如休兵, WYG: 可授之以柄假之以資者也是故收其奕世之權校其從横之勢善者早登否者早去去音袪莒反故下土無壅滯之士國朝無專貴之人此變之善可遂行者也井田之變豪人貨殖館舍布於州郡田畝連於方國身無半通青綸之命而竊三辰龍章之服十三州志曰有秩嗇夫得假半章印續漢輿服志曰百石青紺綸一采宛轉繆織長文二尺説文綸青絲綬也鄭𤣥注禮記曰綸今有秩嗇夫所佩也三辰日月星也龍章謂山龍之章皆畫於衣也不為編户一伍之長而有千室名邑之役周禮小司徒職五人為伍前書曰五家為伍伍有長論語孔子曰千室之邑百乘之家言豪强之家身無品秩而强富比於公侯也榮樂過於封君勢}
  - {type: page-break, offset: 3456, content: '', id: KR2a0009_WYG_079-23b, image: WYG0253/WYG0253-0120b.png}
  - {type: variant, offset: 3456, length: 3, content: 如休兵, krp: 可授之以柄假之以資者也是故收其奕世之權校其從横之勢善者早登否者早去去音袪莒反故下土無壅滯之士國朝無專貴之人此變之善可遂行者也井田之變豪人貨殖館舍布於州郡田畝連於方國身無半通青綸之命而竊三辰龍章之服十三州志曰有秩嗇夫得假半章印續漢輿服志曰百石青紺綸一采宛轉繆織長文二尺説文綸青絲綬也鄭𤣥注禮記曰綸今有秩嗇夫所佩也三辰日月星也龍章謂山龍之章皆畫於衣也不為編户一伍之長而有千室名邑之役周禮小司徒職五人為伍前書曰五家為伍伍有長論語孔子曰千室之邑百乘之家言豪强之家身無品秩而强富比於公侯也榮樂過於封君勢}
