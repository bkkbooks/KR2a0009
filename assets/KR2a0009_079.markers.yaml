  - {type: variant, offset: 3436, length: 0, content: '', WYG: 盖高不敢不跼謂地盖厚不敢不蹐毛萇注云跼曲也蹐累足也逮至清世則復入於矯枉過正之檢老者耄矣不能及寛饒之俗少者方壯將復困於衰亂之時是使姦人擅無窮之福利而善士挂不赦之罪辜茍目能辯色耳能辯聲口能辯味體能辯寒温者將皆以脩絜為諱惡設智巧以避之焉况肯有安而樂之者邪斯}
  - {type: variant, offset: 3436, length: 0, content: '', krp: 盖高不敢不跼謂地盖厚不敢不蹐毛萇注云跼曲也蹐累足也逮至清世則復入於矯枉過正之檢老者耄矣不能及寛饒之俗少者方壯將復困於衰亂之時是使姦人擅無窮之福利而善士挂不赦之罪辜茍目能辯色耳能辯聲口能辯味體能辯寒温者將皆以脩絜為諱惡設智巧以避之焉况肯有安而樂之者邪斯}
  - {type: variant, offset: 3437, length: 2, content: 指麾, WYG: 世人主一切之愆也昔春秋之時周氏之亂世也逮乎戰國則又甚矣秦政乘并兼之埶放虎狼之心政始皇名屠裂天下吞食生人暴虐不已以招楚漢用兵之苦甚於戰國之時也漢二百年而遭王莽之亂漢至王莽簒位二百一十四年云二百者舉全數計其殘夷滅亡之數又復倍乎秦項矣以及今日名都空而不居百里絶而無民者不}
