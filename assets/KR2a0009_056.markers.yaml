  - {type: variant, offset: 2098, length: 0, content: '', WYG: 建初四年薨車駕親臨其䘮時融長子麟歸鄉里帝以其餘子幼弱勅太尉掾史教其威儀進止贈賵恩寵篤密焉又賜冡塋地於顯節陵下除麟為郎韋彪傳族子義韋彪字孟逹扶風平陵人也高祖賢宣帝時為丞相祖賞哀帝時為大司馬彪孝行純至父母卒哀毁三年不出廬寢服竟羸瘠骨立異形醫療數年乃起好學洽聞雅稱儒宗建武末舉孝廉除郎中以病免復歸教授安貧樂道恬於進趣三輔諸儒莫不慕仰之顯宗聞彪名永平六年召拜謁者賜以車馬衣服三遷魏郡太守肅宗即位以病免徴為左中郎將長樂衛尉數陳政術每歸寛厚比上疏乞骸骨拜為奉車都尉秩中二千石賞賜恩寵侔於親戚建初七年車駕西廵狩以彪行太常從數召入問以三輔舊事禮儀風俗彪因建言今西廵舊都宜追録高祖中宗功臣中宗宣帝襃顯先勲紀其子孫帝納之行至長安乃制詔京兆尹右扶風求蕭何霍光後時光無苗裔唯封何末孫熊為鄼侯建初二年已封曹參後曹湛為平陽侯故不復及焉乃厚賜彪錢珍羞食物使歸平陵上冡還拜大鴻臚}
