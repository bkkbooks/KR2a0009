  - {type: variant, offset: 41, length: 0, content: '', WYG: 成帝時以父任為博士弟子五遷至王莽時為繡衣執法武帝置繡衣御史王莽改御史曰執法故曰繡衣執法也使督大姦遷後隊屬正王莽改河内為後隊更始立以為平原}
  - {type: variant, offset: 41, length: 0, content: '', krp: 成帝時以父任為博士弟子五遷至王莽時為繡衣執法武帝置繡衣御史王莽改御史曰執法故曰繡衣執法也使督大姦遷後隊屬正王莽改河内為後隊更始立以為平原}
  - {type: variant, offset: 43, length: 6, content: 潁川李鴻請署, WYG: 時倉卒兵起天下驚擾而湛獨晏然教授不廢謂妻子曰夫一榖不登國君徹膳禮記曰年榖不登君膳不祭肺今民皆飢奈何獨飽乃共食粗糲糲麤米也九章算術曰粟五十糲率三十一斛粟得六斗米為糲也悉分奉禄以賑鄉里來客者百餘家時門下督素有氣力謀欲為湛起兵湛惡其惑衆即收斬之徇首城郭以示百姓於是吏人信向郡内以安平原一境湛所全也光武即位知湛名儒舊臣欲令幹任内職幹主也徴拜尚書使典定舊制時大司徒鄧禹西征關中帝以湛才任宰相拜為司直行大司徒事車駕每出征伐常留鎮守總攝羣司建武三年遂代鄧禹為大司徒封陽都侯陽都縣名屬城陽國故城在今沂州沂水縣東時彭寵反於漁陽帝欲自征之湛上疏諌曰臣聞文王受命而征伐五國五國謂西伯受命伐犬夷伐密須伐耆伐邗伐崇見史記必先詢之同姓然後謀於羣臣加占蓍龜以定行事書曰謀及卿士謀及卜筮又曰文王唯卜用克綏受兹命詩大雅曰爰始爰謀爰契我龜故謀則成卜則吉戰則勝其詩曰帝謂文王詢爾仇方同爾兄弟以爾鉤援與爾臨衝以伐崇墉詩大雅也仇匹也鉤援梯所引上城也臨臨車也衝衝車也墉城也崇侯倡紂為無道故伐焉崇國城守先退後伐左氏傳曰文王聞崇徳亂而伐之軍三旬而不降退修政而復伐之因壘而降所以重人命俟時而動故参分天下而有其二陛下承大亂之極受命而帝興明祖宗出入四年而滅檀鄉制五校降銅馬破赤眉誅鄧奉之屬不為無}
