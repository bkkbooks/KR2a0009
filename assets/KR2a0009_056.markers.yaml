  - {type: variant, offset: 1409, length: 625, content: 宜𠫓廾西域乃為西州士大夫所笑今苟貪不毛之地營恤不使之民暴軍伊吾之野以慮三族之外果破涼州禍亂至今夫拓境不寧無益於彊多田不耕何救飢敝故善為國者務懷其內不求外利務富其民不貪廣土三輔山原曠遠民庶稀疏故縣丘城可居者多今宜徙邊郡不能自存者入居諸陵田戍故縣孤城絕郡以權徙之轉運遠費聚而近之徭役煩數休而息之此善之善者也騭及公卿以國用不足欲從參議衆多不同乃止拜參為漢陽太守郡人任棠者有奇節隱居教授參到先候之棠不與言但以薤一大本水一盂置戶屏前自抱孫兒伏於戶下主簿白以為倨參思其微意良久曰棠是欲曉太守也水者欲吾清也拔大本薤者欲吾擊強宗也抱兒當戶欲吾開門恤孤也於是歎息而還參在職果能抑強助弱以惠政得民元初元年遷護羌校尉畔羌懷其恩信明年燒當羌種號多等皆降始復得還都令居通河西路時先零羌豪僭號北地詔參將降羌及湟中義從胡七千人與行征西將軍司馬鈞期會北地擊之參於道為羌所敗既已失期乃稱病引兵還坐以詐疾徵下獄校書郎中馬融上書請之曰伏見西戎反畔寇鈔五州陛下愍百姓之傷痍哀黎元之失業單竭府庫以奉軍師昔周宣獫狁侵鎬及方孝文匈奴亦略上郡而宣王立中興之功文帝建太宗之號非惟兩主有明叡之姿抑亦扞城有虓虎之助是以南仲赫赫列在周詩亞夫赳赳載於漢策竊見前護羌校尉龐參文武昭備智略弘遠既有義勇果毅之節兼以博雅深謀之姿又度遼將軍梁慬前統西域勤苦數年還留三輔功効克立閒在北邊單于降服今皆幽囚陷於法網昔荀林父敗績於邲晉侯使復其位孟明視喪師於崤秦伯不替其官故晉景并赤狄之土秦穆遂霸西戎宜遠覽二君使參慬得在寬宥之科, WYG: ''}
