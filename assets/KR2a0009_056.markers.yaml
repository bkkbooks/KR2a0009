  - {type: variant, offset: 2054, length: 2, content: 遼東, WYG: 公卿者及猶繼也𢎞當讌見劉攽曰案文當合作嘗御坐新屏風圖畫列女帝數顧視之𢎞正容言曰未見好徳如好色者帝即為徹之笑謂𢎞曰聞義則服可乎對曰陛下進徳臣不勝其喜時帝姊湖陽公主新寡帝與共論朝臣微觀其意主曰宋公威容徳器羣臣莫及帝曰方且圖之後𢎞被引見帝令主坐屏風後因謂𢎞曰諺言貴易交富易妻人情乎𢎞曰臣聞貧賤之交不可忘糟糖之妻不下堂帝顧謂主曰事不諧矣𢎞在位五年坐考上黨太守無所據免歸第言無罪狀可據數年卒無子國除𢎞弟嵩以剛彊孝烈著名官至河南尹嵩子由章和間為太尉坐阿黨竇憲䇿免歸夲郡自殺由二子漢登登在儒林傳漢字仲和以經行著名舉茂才四遷西河}
