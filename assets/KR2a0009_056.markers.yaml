  - {type: line-break, offset: 805, content: '', id: ZHSJ__dup12307}
  - {type: variant, offset: 805, length: 270, content: 禪曾孫寶亦剛壯有禪風為州別駕從事顯名州里龐參字仲達河南緱氏人也初仕郡未知名河南尹龐奮見而奇之舉為孝廉拜左校令坐法輸作若盧永初元年涼州先零種羌反畔遣車騎將軍鄧騭討之參於徒中使其子俊上書曰方今西州流民擾動而徵發不絕水潦不休地力不復重之以大軍疲之以遠戍農功消於轉運資財竭於徵發田疇不得墾闢禾稼不得收入搏手困窮無望來秋百姓力屈不復堪命臣愚以為萬里運糧遠就羌戎不若總兵養衆以待其疲車騎將軍騭宜且振旅留征西校尉任尚使督涼州士民轉居三輔休徭役以助其時止煩賦以益其財令男得耕種女得織然後畜精銳乘懈沮出其不意攻其不備則邊人之仇報奔北之恥雪矣書奏會御史中丞樊準, WYG: 杜詩}
