  - {type: variant, offset: 2045, length: 0, content: '', krp: 人遷司徒四年薨昱後徙封於陵侯於陵縣名屬濟南郡故城在今淄州長山縣南永平中兼太僕昱卒子建嗣建卒子昌嗣宋𢎞傳宋𢎞字仲子京兆長安人也父尚成帝時至少府哀帝立以不附董賢違忤抵罪𢎞少而溫順哀平間作侍中王莽時為共工王莽改少府曰共工赤眉入長安遣使徴𢎞逼迫不得已行至渭橋自投於水家人救得出因佯死獲免光武即位徴拜太中大夫建武二年代王梁為大司空封栒邑侯栒音洵所得租奉分贍九族家無資産以清行致稱徙封宣平侯帝嘗問𢎞通博之士𢎞乃薦沛國桓譚才學洽聞幾能及揚雄劉向父子幾音祈洽浹洽也幾近也前}
  - {type: variant, offset: 2046, length: 4, content: 奏赦參等, WYG: 班固曰谷永經書汎為疏逹不能浹洽如劉向父子及揚雄也故𢎞引焉於是召譚拜議郎給事中帝每讌輙令鼔琴好其繁聲𢎞聞之不悦悔於薦舉伺譚内出正朝服坐府上遣吏召之譚至不與席而讓之曰吾所以薦子者欲令輔國家以道徳也而今數進鄭聲以亂雅頌非忠正者也論語孔子曰惡鄭聲之亂雅樂也史記曰鄭音好濫淫志也能自改邪将令相舉以法乎譚頓首辭謝良久乃遣之}
