  - {type: variant, offset: 2067, length: 0, content: '', WYG: 為東平王蒼曾孫端相也立名節以威恩著稱遷太僕上病自乞拜太中大夫卒䇿曰太中大夫宋漢清修雪白正直無邪前在方外仍統軍實仍頻也統領也軍實謂軍之所資也左傳曰墮軍實懐柔異類莫匪嘉績戎車載戢邊人用寧予録乃勲引登九列因病退讓守約彌堅将授三事未剋而終朝廷愍悼怛其愴然詩不云乎肇敏戎功用錫爾祉大雅江漢之詩也吉甫美宣王能興衰撥亂命召公平淮夷毛萇注云肇謀也敏疾也戎大也功事也祉謂福慶其令將相大夫㑹葬加賜錢十萬及其在殯以全素絲羔羊之潔焉詩國風曰羔羊之皮素絲五紽退食自公委蛇委蛇退食减膳也言卿大夫皆衣羔羊之裘素絲自减膳食從於公事行歩委蛇自得子則字元矩為鄢陵令亦有名迹抜同郡韋著扶風法真稱為知人則子年十歲與蒼頭共弩射蒼頭弦斷矢激誤中之即死奴叩頭就誅則察而恕之潁川荀爽稱以為美時人亦服焉論曰中興以後居台相總權衡多矣其能以任職取名者豈非先逺業後小數哉逺業謂徳禮小數謂名法也故恵公造次急於鄉射之禮君房入朝先奏寛大之令夫器博者無近用道長者其功逺盖志士仁人所為根心者也根猶本也君子以之得固貴矣以之失亦得矣以之得謂行道義而得固可貴矣以之失謂行道義而失亦為得矣宋𢎞止繁聲戒淫色其有關雎之風乎詩序曰關睢樂得淑女以配君子憂在進賢不淫其色也蔡茂傳郭賀附蔡茂字子禮河内懐人也哀平間以儒學顯徴試博士對䇿陳災異以高等擢拜議郎遷侍中遇王莽居攝以病自免不仕莽朝㑹天下擾亂茂素與竇融善因避難歸之融欲以為張掖太守固辭不就每所餉給計口取足而已後與融俱徴復拜議郎再遷廣漢太守有政績稱時隂氏賔客在郡界多犯吏禁茂輙紏案無所回避㑹洛陽令董宣舉紏湖陽公主帝始怒收宣既而赦之茂喜宣剛正欲令朝廷禁制貴戚乃上書曰臣聞興化致教必由進善康國寧人莫大理惡陛下聖徳重興再隆大命即位以来四海晏然誠宜夙興夜寐雖休勿休然頃者貴戚椒房之家數因恩埶干犯吏禁殺人不死傷人不論臣恐繩墨棄而不用繩墨謂章程也斧斤廢而不舉斧斤謂刑戮也賈誼曰釋斤斧之用也近湖陽公主奴殺人西市而與主共輿出入宫省逋罪積曰寃魂不報洛陽令董宣直道不顧干主討姦陛下不先澄審召欲加箠當宣受怒之初京師側耳及其䝉宥天下拭目今者外戚憍逸賔客放濫宜勅有司案理姦罪使執平之吏永申其用以厭逺近不緝之情光武納之緝叶也建武二十年代戴渉為司徒在職清儉匪懈二十三年薨于位時年七十二賜東園梓棺賻贈甚厚東園署名主作棺也茂初在廣漢夢坐大殿極上有三穂禾茂跳取之得其中穂輙復失之屋之大者古通呼為殿也極殿梁也前書音義曰三輔間謂屋梁為極以問主簿郭賀賀離席慶曰大殿者宫府之形象也極而有禾人臣之上禄也取中穂是中台之位也於字禾失為秩雖曰失之乃所以得禄秩也衮職有闕君其補之三公服衮畫為龍龍首衮衮然故言龍衮詩曰衮職有闕仲山甫補之旬月而茂徴焉乃辟賀為掾賀字喬卿雒陽人祖父堅伯父游君並修清節不仕王莽賀能明法累官建武中為尚書令在職六年曉習故事多所匡益拜荆州刺史引見賞賜恩寵隆異及到官有殊政百姓便之歌曰厥徳仁明郭喬卿忠正朝廷上下平顯宗廵狩至南陽特見嗟歎賜以三公之服黼黻冕旒三公服衮冕黼若斧形黻若兩已相背冕以木為之衣以帛𤣥上纁下廣八寸長尺六寸旒謂冕前後所垂玉也天子十二旒上公九旒勅行部去䄡帷使百姓見其容服以章有徳每所經過吏人指以相示莫不榮之永平}
