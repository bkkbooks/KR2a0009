  - {type: variant, offset: 29, length: 0, content: '', WYG: 九世祖勝字子賤所謂濟南伏生者也湛高祖父孺武帝時客授東武因家焉父理為當世名儒以詩授成帝為高密太傅别自名學為高密王寛傅也寛武帝𤣥孫廣陵王胥後也前書儒林傳曰伏理字君游受詩於匡衡由是齊詩有匡伏之學故言别自名學也湛性孝友}
