  - {type: variant, offset: 2180, length: 0, content: '', WYG: 而行者在其所以磨之故也論語孔子曰吾之於人誰毁誰譽如有所譽者其有所試矣斯三代之所以直道而行也彪引之者言古之用賢皆磨礪選鍊然後用之士宜以才行為先不可純以閥閲史記曰明其等曰閥積功曰閲然其要歸在於選二千石二千石賢則貢舉皆得其人帝深納之彪以世承二帝更化之後多以苛刻為能二帝光武明帝也又置官選職不必以才因盛夏多寒上疏諫曰臣聞政化之夲必順隂陽伏見立夏以来當暑而寒殆以刑罰刻急郡國不奉時令之所致也農人急於務而苛吏奪其時賦發充常調而貪吏割其財此其巨患也夫欲急人所務當先除其所患天下樞要在於尚書百官志曰尚書主知公卿二千石吏官上書外國夷狄事故曰樞要尚書之選豈可不重而間者多從郎官超升此位雖曉習文法長於應對然察察小慧類無大能宜簡嘗歴州宰素有名者雖進退舒遲時有不逮然端心向公奉職周密宜鑒嗇夫㨗急之對嗇夫官名也文帝出上林登虎圈因問上林尉禽獸簿}
