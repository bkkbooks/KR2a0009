  - {type: variant, offset: 2070, length: 0, content: '', krp: 潁川擊諸不下者歴汝南界還宛更始大悅謂憙曰卿名家駒努力勉之武帝謂劉徳為千里之駒故以憙比之㑹王莽遣王尋王邑将兵出關更始乃拜憙為五威偏將軍使助諸將拒尋邑於昆陽光武破尋邑憙被創有戰勞還拜中郎將封勇功侯更始敗憙為赤眉兵所圍廹急乃踰屋亡走與所友善韓仲伯等數十人携小弱越山阻徑出武關仲伯以婦色美慮有强暴者而己受其害欲棄之於道憙責怒不聽因以泥塗仲伯婦面載以鹿車身自推之風俗通曰俗說鹿車窄小載容一鹿每道逄賊或欲逼略憙輙言其病狀以此得免既入丹水丹水縣名屬南陽郡故城在今鄧州内鄉縣西南臨丹水遇更始親屬皆裸跣塗炭飢因不能前塗炭者若䧟泥墜火喻窮困之極也憙見之悲感所装縑帛資糧悉以與之將䕶歸鄉里時鄧奉反於南陽憙素與奉善數遺書切責之而讒者因言憙與奉合謀帝以為疑及奉敗帝得憙書乃驚曰趙憙真長者也即徴憙引見賜鞍馬待詔公車時江南未賔道路不通以憙守簡陽侯相憙不肯受兵東觀記曰勅憙從騎都尉儲融受兵二百人通利道路憙白上不願受融兵單車馳往度其形况上許之單車馳之簡陽吏民不欲内憙憙乃告譬呼城中大人示以國家威信其帥即開門面縛自歸由是諸營壁悉降荆州牧奏憙才任理劇詔以為平林侯相攻擊羣賊安集已降者縣邑平定後拜懐令大姓李子春先為琅邪相豪猾并兼為人所患憙下車聞其二孫殺人事未發覺即窮詰其姦收考子春二孫自殺京師為請者數十終不聼時趙王良疾病将終車駕親臨王問所欲言王曰素與李子春厚今犯罪懷令趙憙欲殺之願乞其命帝曰吏奉法律不可枉也更道它所欲王無復言既薨帝追感趙王乃貰出子春其年遷憙平原太守時平原多盗賊憙與諸郡討捕斬其渠帥餘黨當坐者數千人憙上言惡惡止其身公羊傳曰善善及子孫惡惡止其身可一切徙京師近郡帝從之乃悉移置潁川陳留於是擢舉義行誅鋤姦惡後青州大蝗侵入平原界輙死歲屢有年百姓歌之二十六年帝延集内戚讌㑹歡甚諸夫人各各前言趙憙篤義多恩往遭赤眉出長安皆為憙所濟活帝甚嘉之後徴憙入為太僕引見謂曰卿非但為英雄所保也婦人亦懐卿之恩厚加賞賜二十七年拜太尉賜爵關内侯時南單于稱臣烏桓鮮卑並來入朝帝令憙典邊事思為久長規規謀也憙上復縁邊諸郡幽幷二州由是而定復音伏謂建武六年徙雲中五原人於常山居庸間至二十六年復令還雲中五原東觀記曰草創茍合未有還人盖憙至此請徙之令盡也三十年憙上言宜封禪正三雍之禮中元元年從封泰山及帝崩憙受遺詔典䘮禮是時藩王皆在京師自王莽簒亂舊典不存皇太子與東海王等雜止同席憲章無序憙乃正色横劍殿階扶下諸王以明尊卑時藩國官屬出入宫省與百僚無别憙乃表奏謁者將䕶分止它縣諸王並令就邸唯朝晡入臨整禮儀嚴門衛内外肅然永平元年封節鄉侯三年春坐考中山相薛修事不實免修光武子中山王焉相也其冬代竇融為衛尉八年代虞延行太尉事居府如真後遭母憂上疏乞身行䘮禮顯宗不許遣使者為釋服賞賜恩寵甚渥憙内典宿衛外幹宰職正身立朝未嘗懈惰及帝崩復典䘮事再奉大行禮事修舉肅宗即位進為太傅録尚書事擢諸子為郎吏者七人長子代給事黄門建初五年憙疾病帝親幸視及薨車駕往臨弔時年八十四諡曰正侯子代嗣官至越騎校尉永元中副行征西將軍劉尚征羌坐事下獄疾病物故和帝憐之賜祕器錢布贈越騎校尉節鄉侯印綬子直嗣官至歩兵校尉直卒子淑嗣無子國除牟融傳牟融字子優北海安邱人也少博學以大夏侯尚書教授大夏侯名勝宣帝時人也門徒數百人名稱州里以司徒茂才為豐令司徒舉為茂才也豐今徐州縣也視事三年縣無獄訟為州郡最司徒范遷薦融忠正公方經行純備宜在夲朝并上其理狀漢官儀曰范遷字子廬沛人也永平五年入代鮑昱為司隸校尉多所舉正百僚敬憚之八年代包咸}
