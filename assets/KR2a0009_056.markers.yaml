  - {type: variant, offset: 2042, length: 0, content: '', krp: 石顯等領中書號曰大常侍成帝時任霸為太子舍人漢官儀曰太子舍人選良家子孫秩二百石霸矜嚴有威容家累千金不事産業篤志好學師事九江太守房元治榖梁春秋為元都講東觀記曰從鍾寧君受律也王莽初五威司命陳崇舉霸徳行遷随宰王莽置五威司命將軍又改縣令長曰宰隨縣名屬南陽郡今隨州縣也縣界曠逺濵𢃄江湖而亡命者多為㓂盗霸到即案誅豪猾分捕山賊縣中清静再遷為執法刺姦王莽傳曰置執法左右刺姦選能吏侯霸等分督六尉六隊如漢刺史紏案埶位者無所疑憚後為淮平大尹政理有能名王莽改臨淮郡為淮平及王莽之敗霸保固自守卒全一郡更始元年遣使徴霸東觀記曰遣謁者侯盛荆州刺史費遂齎璽書徴霸百姓老弱相携號哭遮使者車或當道而卧皆曰願乞侯君復留朞年民至乃戒乳婦勿得舉子侯君當去必不能全使者慮霸就徴臨淮必亂不敢授璽書具以狀聞㑹更始敗道路不通建武四年光武徴霸與車駕㑹夀春拜尚書令時無故典朝廷又少舊臣霸明習故事收録遺文條奏前世善政法度有益}
  - {type: variant, offset: 2043, length: 1, content: 聖, WYG: 時者皆施行之每春下寛大之詔奉四時之令皆霸所建也月令春布徳行慶施恵下人故曰寛大奉四時謂依月令也明年代伏湛為大司徒封關内侯在位明察守正奉公不回十三年霸薨帝深傷惜之親自臨弔下詔曰惟霸積善清絜視事九年漢家舊制丞相拜曰封為列侯漢自高祖以列侯為丞相武帝以元勲佐命皆盡拜公孫𢎞為丞相封平津侯因以為故事朕以軍師暴露功臣未封縁忠臣之義不欲相踰未及爵命奄然而終嗚呼哀哉於是追封諡霸則鄉哀侯食邑二千六百户子昱嗣臨淮吏人共為立祠四時祭焉以沛郡太守韓歆代霸為大司徒歆字翁君南陽人以從攻伐有功封扶陽侯好直言無隱諱帝每不能容嘗因朝㑹聞帝讀隗囂公孫述相與書歆曰亡國之君皆有才桀紂亦有才帝大怒以為激發歆又證嵗将饑凶指天畫地言甚剛切坐免歸田里帝猶不釋復遣使宣詔責之司隸校尉鮑永固請不能得歆及子嬰竟自殺歆素有重名死非其罪衆多不厭厭音一葉反帝乃追賜錢榖以成禮葬之成禮具禮也言不以非命而降其葬禮後千乗歐陽歙清河戴渉相代為大司徒坐事下獄死自是大臣難居相任其後河内蔡茂京兆玉況玉音肅魏郡馮勤皆得薨位況字文伯性聰敏為陳留太守以徳行}
