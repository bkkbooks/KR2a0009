  - {type: variant, offset: 2038, length: 3, content: 折衝毗, krp: 國雖死無恨故復越職觸冐以聞十三年夏徴勅尚書擇拜吏曰未及就位因讌見中暑病卒賜祕器帝親弔祠遣使者送䘮修冢二子隆翕翕嗣爵卒子光嗣光卒子晨嗣東觀記曰晨尚高平公主晨謙敬博愛好學尤篤以女孫為順帝貴人奉朝請位特進卒子無忌嗣亦傳家學博物多識順帝時為侍中屯騎校尉永和元年詔無忌與議郎黄景校定中書五經諸子百家蓺術中書内中之書也蓺文志曰諸子凡一百八十九家言百家舉其成數也蓺謂書數射御術謂醫方卜筮元嘉中桓帝復詔無忌與黄景崔寔等共撰漢記又自采集古今刪著事要號曰伏侯注其書上自黄帝下盡漢質帝為八卷見行於今無忌卒子質嗣官至大司農質卒子完嗣尚桓帝女陽安長公主女為孝獻皇后曹操弑后誅伏氏國除初自伏生以後世傳經學清静無競故東州號為伏不鬭云隆字伯文少以節操立名東觀記隆作盛字伯明仕郡督郵建武二年詣懐宫光武甚親接之時張歩兄弟各擁彊兵據有齊地拜隆為太中大夫持節使青徐二州招降郡國隆移檄告曰乃者猾臣王莽弑帝盗位宗室興兵除亂誅莽故羣下推立聖公以主宗廟而任用賊臣殺戮賢良三王作亂盗賊從横忤逆天心三王見聖公傳卒為赤眉所害皇天祐漢聖哲應期陛下神武奮發以少制衆故尋邑以百萬之軍潰散於昆陽王郎以全趙之師土崩於邯鄲全趙謂舉趙之地大肜高胡望旗消靡鐵脛五校莫不摧破梁王劉永幸以宗室屬籍爵為侯王不知厭足自求禍棄遂封爵牧守造為詐逆今虎牙大将軍屯營十萬巳抜雎陽劉永奔迸家巳族矣此諸君所聞也不先自圖後悔何及青徐羣盗得此惶怖獲索賊右師郎等六校即時皆降右或為古張歩遣使隨隆東觀記歩遣其掾孫昱隨之詣闕上書獻鰒魚郭璞注三蒼云鰒似蛤偏著石廣志曰鰒無鱗有殻一靣附石細孔雜雜或七或九夲草云石決明一名鰒魚音歩角反其冬拜隆光禄大夫復使於歩并與新除青州牧守及都尉俱東詔隆輒拜令長以下隆招懐綏緝多来降附帝嘉其功比之酈生酈生酈食其也説齊王廣下齊七十餘城食其音異基即拜歩為東萊太守而劉永亦復遣使立歩為齊王歩貪受王爵冘豫未决冘音以今反隆曉譬曰高祖與天下約非劉氏不王今可得為十萬户侯耳歩欲留隆與共守二州隆不聽二州青州徐州也求得反命歩遂執隆而受永封隆遣間使上書曰臣隆奉使無狀言罪大也受執凶逆雖在困戹授命不顧又吏人知歩反畔心不附之願以時進兵無以臣隆為念臣隆得生到闕廷受誅有司此其大願若令没身㓂手以父母昆弟長累陛下累託也音力偽反陛下與皇后太子永享萬國與天無極帝得隆奏召父湛流涕以示之曰隆可謂有蘇武之節武帝時蘇武使匈奴㑹衛律所將降者隂相與謀刼單于母閼氏歸漢事發單于使衛律考其事召武受辭武不屈節引佩刀自刺單于欲降武武不降杖節牧羊海上卧起操持節節髦盡落在匈奴中十九年乃得歸漢見前書也恨不且許而遽求還也其後歩遂殺之時人莫不憐哀焉五年張歩平車駕幸北海詔隆中弟咸收隆䘮賜給棺斂太中大夫䕶送䘮事詔告琅邪作冢以子瑗為郎中侯霸傳侯霸字君房河南密人也族父淵以宦者有才辯任職元帝時}
  - {type: punctuation, offset: 2040, content: ，, id: KR2a0009_ZHSJ_056-bkkpn431}
  - {type: 'tls:seg', offset: 2040, content: '', id: KR2a0009_ZHSJ_056-d56p15s54}
  - {type: variant, offset: 2042, length: 0, content: '', WYG: 石顯等領中書號曰大常侍成帝時任霸為太子舍人漢官儀曰太子舍人選良家子孫秩二百石霸矜嚴有威容家累千金不事産業篤志好學師事九江太守房元治榖梁春秋為元都講東觀記曰從鍾寧君受律也王莽初五威司命陳崇舉霸徳行遷随宰王莽置五威司命將軍又改縣令長曰宰隨縣名屬南陽郡今隨州縣也縣界曠逺濵𢃄江湖而亡命者多為㓂盗霸到即案誅豪猾分捕山賊縣中清静再遷為執法刺姦王莽傳曰置執法左右刺姦選能吏侯霸等分督六尉六隊如漢刺史紏案埶位者無所疑憚後為淮平大尹政理有能名王莽改臨淮郡為淮平及王莽之敗霸保固自守卒全一郡更始元年遣使徴霸東觀記曰遣謁者侯盛荆州刺史費遂齎璽書徴霸百姓老弱相携號哭遮使者車或當道而卧皆曰願乞侯君復留朞年民至乃戒乳婦勿得舉子侯君當去必不能全使者慮霸就徴臨淮必亂不敢授璽書具以狀聞㑹更始敗道路不通建武四年光武徴霸與車駕㑹夀春拜尚書令時無故典朝廷又少舊臣霸明習故事收録遺文條奏前世善政法度有益}
