  - {type: variant, offset: 2052, length: 1, content: 參, WYG: 薦桓譚者望能以忠正導主而令朝廷耽悅鄭聲臣之罪也帝改容謝使反服其後遂不復令譚給事中𢎞推進賢士馮翊桓梁三十餘人或相及}
