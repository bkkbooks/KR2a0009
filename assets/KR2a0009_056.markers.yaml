  - {type: variant, offset: 3958, length: 425, content: 年卒時年七十五玄性剛急無大體然謙儉下士子弟親宗無在大官者及卒家無居業喪無所殯當時稱之初曹操微時人莫知者嘗往候玄玄見而異焉謂曰今天下將亂安生民者其在君乎操常感其知己及後經過玄墓輒悽愴致祭自為其文曰故太尉橋公懿德高軌汎愛博容國念明訓士思令謨幽靈潛翳哉緬矣操以幼年逮升堂室特以頑質見納君子增榮益觀皆由奬助猶仲尼稱不如顏淵李生厚歎賈復士死知己懷此無忘又承從容約誓之言徂沒之後路有經由不以斗酒隻雞過相沃酹車過三步腹痛勿怨雖臨時戲笑之言非至親之篤好胡肯為此辭哉懷舊惟顧念之悽愴奉命東征屯次鄉里北望貴土乃心陵墓裁致薄奠公其享之玄子羽官至任城相論曰任棠姜岐世著其清結甕牖而辭三命殆漢陽之幽人乎龐參躬求賢之禮故民悅其政橋玄厲邦君之威而衆失其情夫豈力不足歟將有道在焉如令其道可忘則彊梁勝矣語曰三軍可奪帥匹夫不可奪志子貢曰寧喪千金不失士心昔段干木踰牆而避文侯之命泄柳閉門不納穆公之請貴必有所屈賤亦有所申矣贊曰李叟勤身甘飢辭饋禪為君隱之死靡貳龜習邊功參起徒中橋公識運先覺時雄, WYG: ''}
