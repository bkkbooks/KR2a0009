  - {type: variant, offset: 2182, length: 1, content: 曲, WYG: 對虎圏嗇夫從旁代對響應無窮文帝拜嗇夫為上林令張釋之曰夫絳侯東陽侯言事曽不能出口豈効此嗇夫喋喋利口㨗急哉文帝曰善遂不拜嗇夫為上林令深思絳侯木訥之功也木質也訥遲鈍也前書曰周勃木彊少文又曰安劉氏者必勃往時楚獄大起故置令史以助郎職而類多小人好為姦利今者務簡可皆停省又諌議之職應用公直之士通才謇正有補益於朝者今或從徴試輩為大夫輩類也又御史外遷動據州郡並宜清選其任責以言績其二千石視事雖久而為吏民所便安者宜增秩重賞勿妄遷徙惟留聖}
