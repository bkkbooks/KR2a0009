  - {type: variant, offset: 2069, length: 0, content: '', WYG: 徴拜河南尹以清静稱在官三年卒詔書愍惜賜車一乘錢四十萬馮勤傳馮勤字偉伯魏郡繁陽人也曾祖父揚宣帝時為𢎞農太守有八子皆為二千石趙魏間榮之號曰萬石君焉兄弟形皆偉壯唯勤祖父偃長不滿七尺常自恥短陋恐子孫之似也東觀記偃為黎陽令乃為子伉娶長妻伉生勤長八尺三寸八歲善計計算術也初為太守銚期功曹有髙能稱期常從光武征伐政事一以委勤勤同縣馮廵等舉兵應光武謀未成而為豪石焦廉等所反反音幡勤乃率將老母兄弟及宗親歸期期悉以為腹心薦於光武初未被用後乃除為郎中給事尚書東觀記魏郡太守范横上疏薦勤然始除之以圖議軍糧在事精勤遂見親識每引進帝輙顧謂左右曰佳乎吏也由是使典諸侯封事勤差量功次輕重國土逺近地埶豐薄不相踰越莫不厭服焉自是封爵之制非勤不定帝益以為能尚書衆事皆令總録之司徒侯霸薦前梁令閻楊楊素有譏議帝常嫌之既見霸奏疑其有姦大怒賜霸璽書曰崇山幽都何可偶崇山南裔也幽都北裔也偶對也言将殺之不可得流徙也尚書舜流共工於幽州放驩兠於崇山黄鉞一下無處所鉞斧也以黄金飾之所以戮人欲以身試法邪将殺身以成仁邪使勤奉䇿至司徒府勤還陳霸本意申釋事理帝意稍解拜勤尚書僕射職事十五年以勤勞賜爵關内侯遷尚書令拜大司農三歲遷司徒先是三公多見罪退帝賢勤欲令以善自終乃因讌見從容戒之曰朱浮上不忠於君下陵轢同列竟以中傷至今朱浮為大司空坐賣弄國恩免又為陵轢同列帝銜之惜其功不忍加罪死生吉凶未可知豈不惜哉人臣放逐受誅雖復追加賞賜賻祭不足以償不訾之身訾量也言無量可比之貴重之極也訾與資同忠臣孝子覽照前世以為鏡誡能盡忠於國事君無二則爵賞光乎當世功名列於不朽可不勉哉勤愈恭約盡忠號稱任職勤母年八十每㑹見詔勅勿拜令御者扶上殿謂諸王曰使勤貴寵者此母也其見親重如此中元元年薨東觀記曰中元元年車駕西幸長安祠園陵還勤燕見前殿盡日歸府因病喘逆上使太醫療視賞賜錢帛遂薨帝悼惜之使者弔祠賜東園祕器賵贈有加勤七子長子宗嗣至張掖屬國都尉中子順尚平陽長公主終於大鴻臚平陽主明帝女建初八年以順中子奮襲主爵為平陽侯薨無子永元七年詔書復封奮兄羽林右監勁為平陽侯奉公主之祀奮弟由黄門侍郎尚平安公主章帝女也臣賢案東觀記亦云安平皇后紀云由尚平邑公主紀傳不同未知孰是劉攽曰案傳作平安注云安平必有一誤然安平是縣名則安平是矣勁薨子卯嗣卯延光中為侍中薨子留嗣趙憙傳趙憙字伯陽南陽宛人也少有節操從兄為人所殺無子憙年十五常思報之乃挾兵結客後遂往復仇而仇家皆疾病無相距者憙以因疾報殺非仁者心且釋之而去顧謂仇曰爾曹若健逺相避也仇皆卧自搏自搏猶叩頭也後病愈悉自縛詣憙憙不與相見後竟殺之更始即位舞隂大姓李氏擁城不下更始遣柱天將軍李寳降之不肯云聞宛之趙氏有孤孫憙信義著名願得降之更始乃徴憙憙年未二十既引見更始笑曰繭栗犢豈能負重致逺乎犢角如繭栗言小也禮記曰天地之牲角繭栗即除為郎中行偏將軍事使詣舞隂而李氏遂降憙因進}
