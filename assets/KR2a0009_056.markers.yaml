  - {type: variant, offset: 2103, length: 3, content: 中參名, WYG: 門孝經緯之文也夫人才行少能相兼是以孟公綽優於趙魏老不可以為滕薛大夫論語孔子之言也公綽魯大夫趙魏皆晉卿之邑也家臣稱老公綽性寡欲趙魏老優聞無事滕薛小國大夫職煩故不可為也}
