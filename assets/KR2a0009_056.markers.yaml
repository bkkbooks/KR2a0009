  - {type: 'tls:seg', offset: 2045, content: '', id: KR2a0009_ZHSJ_056-d56p15s55}
  - {type: variant, offset: 2045, length: 0, content: '', WYG: 人遷司徒四年薨昱後徙封於陵侯於陵縣名屬濟南郡故城在今淄州長山縣南永平中兼太僕昱卒子建嗣建卒子昌嗣宋𢎞傳宋𢎞字仲子京兆長安人也父尚成帝時至少府哀帝立以不附董賢違忤抵罪𢎞少而溫順哀平間作侍中王莽時為共工王莽改少府曰共工赤眉入長安遣使徴𢎞逼迫不得已行至渭橋自投於水家人救得出因佯死獲免光武即位徴拜太中大夫建武二年代王梁為大司空封栒邑侯栒音洵所得租奉分贍九族家無資産以清行致稱徙封宣平侯帝嘗問𢎞通博之士𢎞乃薦沛國桓譚才學洽聞幾能及揚雄劉向父子幾音祈洽浹洽也幾近也前}
