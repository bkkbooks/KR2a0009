  - {type: variant, offset: 2782, length: 337, content: 水雨災螟互生稼穡荒耗租更空闕老者慮不終年少壯懼於困戹陛下以百姓為子品庶以陛下為父焉可不日勞神垂撫循之恩哉唐堯親捨其子以禪虞舜者是欲民遭聖君不令遇惡主也故古公杖策其民五倍文王西伯天下歸之豈復輿金輦寶以為民惠乎近孝文皇帝感一女子之言除肉刑之法體德行仁為漢賢主陛下繼中興之統承光武之業臨朝聽政而未留聖意且牧守不良或出中官懼逆上旨取過目前呼嗟之聲招致災害胡虜凶悍因衰緣𨻶而令倉庫單於豺狼之口功業無銖兩之効皆由將帥不忠聚姦所致前涼州刺史祝良初除到州多所糾罰太守令長貶黜將半政未踰時功効卓然實應賞異以勸功能改任牧守去斥姦殘又宜更選匈奴烏桓護羌中郎將校尉簡練文武授之法令除并涼二州今年租更寬赦罪隸埽除更始則善吏知奉公之祐惡者覺營私之禍胡馬可不窺長城塞下無候望之患矣帝覺悟乃更選幽井刺史自營, WYG: ''}
