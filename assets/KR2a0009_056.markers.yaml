  - {type: variant, offset: 110, length: 179, content: 過皆圖寫山川屯田聚落百餘卷悉封奏上肅宗嘉之拜兗州刺史以清約率下常席羊皮服布被遷張掖太守有威重名時大將軍竇憲將兵屯武威天下州郡遠近莫不修禮遺恂奉公不阿為憲所奏免後復徵拜謁者使持節領西域副校尉西域殷富多珍寶諸國侍子及督使賈胡數遺恂奴婢宛馬金銀香罽之屬一無所受北匈奴數斷西域車師伊吾隴沙以西使命不得通恂設購賞遂斬虜帥縣首軍門自是道路夷清威恩並行遷武威太守後坐事免步, WYG: 信向遣到平原異卿等即曰}
  - {type: variant, offset: 110, length: 179, content: 過皆圖寫山川屯田聚落百餘卷悉封奏上肅宗嘉之拜兗州刺史以清約率下常席羊皮服布被遷張掖太守有威重名時大將軍竇憲將兵屯武威天下州郡遠近莫不修禮遺恂奉公不阿為憲所奏免後復徵拜謁者使持節領西域副校尉西域殷富多珍寶諸國侍子及督使賈胡數遺恂奴婢宛馬金銀香罽之屬一無所受北匈奴數斷西域車師伊吾隴沙以西使命不得通恂設購賞遂斬虜帥縣首軍門自是道路夷清威恩並行遷武威太守後坐事免步, krp: 信向遣到平原異卿等即曰}
