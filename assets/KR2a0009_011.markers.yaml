  - {type: variant, offset: 1555, length: 1739, content: 尤而猶恩加別館增寵黨戚至乎東海逡巡去就以禮使後世不見隆薄進退之隙不亦光於古乎光烈陰皇后諱麗華南陽新野人初光武適新野聞后美心悅之後至長安見執金吾車騎甚盛因歎曰仕宦當作執金吾娶妻當得陰麗華更始元年六月遂納后於宛當成里時年十九及光武為司隸校尉方西之洛陽令后歸新野及鄧奉起兵后兄識為之將后隨家屬徙淯陽止於奉舍光武即位令侍中傅俊迎后與胡陽寧平主諸宮人俱到洛陽以后為貴人帝以后雅性寬仁欲崇以尊位后固辭以郭氏有子終不肯當故遂立郭皇后建武四年從征彭寵生顯宗於元氏九年有盜劫殺后母鄧氏及弟訢帝甚傷之乃詔大司空曰吾微賤之時娶於陰氏因將兵征伐遂各別離幸得安全俱脫虎口以貴人有母儀之美宜立為后而固辭弗敢當列於媵妾朕嘉其義讓許封諸弟未及爵土而遭患逢禍母子同命愍傷于懷小雅曰將恐將懼惟予與汝將安將樂汝轉𠫓廾予風人之戒可不慎乎其追爵謚貴人父陸為宣恩哀侯弟訢為宣義恭侯以弟就嗣哀侯後及尸柩在堂使太中大夫拜授印綬如在國列侯禮魂而有靈嘉其寵榮十七年廢皇后郭氏而立貴人制詔三公曰皇后懷執怨懟數違教令不能撫循它子訓長異室宮闈之內若見鷹鸇既無關雎之德而有呂霍之風豈可託以幼孤恭承明祀今遣大司徒涉宗正吉持節其上皇后璽綬陰貴人鄉里車歸自微賤自我不見于今三年宜奉宗廟為天下母主者詳案舊典時上尊號異常之事非國休福不得上壽稱慶后在位恭儉少嗜玩不喜笑謔性仁孝多矜慈七歲失父雖已數十年言及未曾不流涕帝見常歎息顯宗即位尊后為皇太后永平三年冬帝從太后幸章陵置酒舊宅會陰鄧故人諸家子孫並受賞賜七年崩在位二十四年年六十合葬原陵明帝性孝愛追慕無已十七年正月當謁原陵夜夢先帝太后如平生歡既寤悲不能寐即案歷明旦日吉遂率百官及故客上陵其日降甘露於陵樹帝令百官采取以薦會畢帝從席前伏御牀視太后鏡奩中物感動悲涕令易脂澤裝具左右皆泣莫能仰視焉明德馬皇后諱某伏波將軍援之小女也少喪父母兄客卿敏惠早夭母藺夫人悲傷發疾慌惚后時年十歲幹理家事勑制僮御內外諮稟事同成人初諸家莫知者後聞之咸歎異焉后嘗久疾太夫人令筮之筮者曰此女雖有患狀而當大貴兆不可言也後又呼相者使占諸女見后大驚曰我必為此女稱臣然貴而少子若養它子者得力乃當踰於所生初援征五溪蠻卒於師虎賁中郎將梁松黃門侍郎竇固等因譖之由是家益失埶又數為權貴所侵侮后從兄嚴不勝憂憤白太夫人絕竇氏婚求進女掖庭乃上書曰臣叔父援孤恩不報而妻子特獲恩全戴仰陛下為天為父人情既得不死便欲求福竊聞太子諸王妃匹未備援有三女大者十五次者十四小者十三儀狀髮膚上中以上皆孝順小心婉靜有禮願下相工簡其可否如有萬一援不朽於黃泉矣又援姑姊妹並為成帝婕妤葬於延陵臣嚴幸得蒙恩更生冀因緣先姑當充後宮由是選后入太子宮時年十三奉承陰后傍接同列禮則脩備上下安之遂見寵異常居後堂顯宗即位以后為貴人時后前母姊女賈氏亦以選入生肅宗帝以后無子命令養之謂曰人未必當自生子但患愛養不至耳后於是盡心撫育勞悴過於所生肅宗亦孝性淳篤恩性天至母子慈愛始終無纖介之閒后常以皇嗣未廣每懷憂歎薦達左右若恐不及後宮有進見者每加慰納若數所寵引輒增隆遇永平三年春有司奏立長秋宮帝未有所言皇太后曰馬貴人德冠後宮即其人也遂立為皇后先是數日夢有小飛蟲無數赴著身又入皮膚中而復飛出既正位宮闈愈自謙肅身長七尺二寸方口美髮能誦易好讀春秋楚辭尤善周官董仲舒書常衣大練裙不加緣朔望諸姬主朝請望見后袍衣疎麤反以為綺縠就視乃笑后辭曰此繒特宜染色故用之耳六宮莫不歎息帝嘗幸苑囿離宮后輒以風邪露霧為戒辭意款備多見詳擇帝幸濯龍中並召諸中下邳王已下皆在側請呼皇后帝笑曰是家志不好樂雖來無歡是以遊娛之事希嘗從焉十五年帝案地圖將封皇子悉半諸國后見而言曰諸子裁食數縣於制不已儉乎帝曰我子豈宜與先帝子等乎歲給二千萬足矣時楚獄連年不斷囚相證引坐繫者甚眾后慮其多濫乘閒言及惻然帝感悟之夜起仿偟為思所納卒多有所降宥時諸將奏事及公卿較議難平者帝數以試后后輒分解趣理各得其情每於侍執之際輒言及政事多所毗補而未嘗以家私干欲故寵敬日隆始終無衰及帝崩肅宗即位尊后曰皇太后諸貴人當徙居南宮太后感析別之懷各賜王赤綬加安車駟馬白越三千端雜帛二千匹黃金十斤自撰顯宗起居注削去兄防參醫藥事帝請曰黃門舅旦夕供養且一年即無襃異又不錄勤勞無乃過乎太后曰吾不欲令後世聞先帝數親後宮之家故不著也建初元年帝欲封爵諸舅太后不聽明年夏大旱言事者以為不封外戚之故有司因此, WYG: ''}
