  - {type: variant, offset: 4421, length: 1, content: 當, WYG: 聖人作樂所以宣氣致和順隂陽也臣愚以為可順上天之明待因嵗首令正發太蔟之律奏雅頌之音以立太平以迎和氣其條貫甚備詔書以防言下三公熹平六年東觀召典律者太子舍人張光等問凖意光等不知歸閱舊藏乃得其器形制如房書猶不能定其弦緩急音不可書以時人知之者欲敎而無從心逹者體知而無師故史官能辨清濁者遂絶其可以相傳者唯}
