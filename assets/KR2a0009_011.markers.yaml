  - {type: variant, offset: 5264, length: 3133, content: 十二通詩論語諸兄每讀經傳輒下意難問志在典籍不問居家之事母常非之曰汝不習女工以供衣服乃更務學寧當舉博士邪后重違母言晝修婦業暮誦經典家人號曰諸生父訓異之事無大小輒與詳議永元四年當以選入會訓卒后晝夜號泣終三年不食鹽菜憔悴毀容親人不識之后嘗夢捫天蕩蕩正青若有鍾乳狀乃仰嗽飲之以訊諸占夢言堯夢攀天而上湯夢及天而咶之斯皆聖王之前占吉不可言又相者見后驚曰此成湯之法也家人竊喜而不敢宣后叔父陔言常聞活千人者子孫有封兄訓為謁者使修石臼河歲活數千人天道可信家必蒙福初太傅禹歎曰吾將百萬之眾未嘗妄殺一人其後世必有興者七年后復與諸家子俱選入宮后長七尺二寸姿顏姝麗絕異於眾左右皆驚八年冬入掖庭為貴人時年十六恭肅小心動有法度承事陰后夙夜戰兢接撫同列常克己以下之雖宮人隸役皆加恩借帝深嘉愛焉及后有疾特令后母兄弟入視醫藥不限以日數后言於帝曰宮禁至重而使外舍久在內省上令陛下有幸私之譏下使賤妾獲不知足之謗上下交損誠不願也帝曰人皆以數入為榮貴人反以為憂深自抑損誠難及也每有讌會諸姬貴人競自修整簪珥光采袿裳鮮明而后獨著素裝服無飾其衣有與陰后同色者即時解易若並時進見則不敢正坐離立行則僂身自卑帝每有所問常逡巡後對不敢先陰后言帝知后勞心曲體歎曰修德之勞乃如是乎後陰后漸疎每當御見輒辭以疾時帝數失皇子后憂繼嗣不廣恆垂涕歎息數選進才人以博帝意陰后見后德稱日盛不知所為遂造祝詛欲以為害帝嘗寢病危甚陰后密言我得意不令鄧氏復有遺類后聞乃對左右流涕言曰我竭誠盡心以事皇后竟不為所祐而當獲罪於天婦人雖無從死之義然周公身請武王之命越姬心誓必死之分上以報帝之恩中以解宗族之禍下不令陰氏有人豕之譏即欲飲藥宮人趙玉者固禁之因詐言屬有使來上疾已愈后信以為然乃止明日帝果瘳十四年夏陰后以巫蠱事廢后請救不能得帝便屬意焉后愈稱疾篤深自閉絕會有司奏建長秋宮帝曰皇后之尊與朕同體承宗廟母天下豈易哉唯鄧貴人德冠後庭乃可當之至冬立為皇后辭讓者三然後即位手書表謝深陳德薄不足以充小君之選是時方國貢獻競求珍麗之物自后即位悉令禁絕歲時但供紙墨而已帝每欲官爵鄧氏后輒哀請謙讓故兄騭終帝世不過虎賁中郎將元興元年帝崩長子平原王有疾而諸皇子夭沒前後十數後生者輒隱秘養於人閒殤帝生始百日后乃迎立之尊后為皇太后太后臨朝和帝葬後宮人並歸園太后賜周馮貴人策曰朕與貴人託配後庭共歡等列十有餘年不獲福祐先帝早𠫓廾天下孤心煢煢靡所瞻仰夙夜永懷感愴發中今當以舊典分歸外園慘結增歎燕燕之詩曷能喻焉其賜貴人王青蓋車采飾輅驂馬各一駟黃金三十斤雜帛三千匹白越四千端又賜馮貴人王赤綬以未有頭上步搖環珮加賜各一具是時新遭大憂法禁未設宮中亡大珠一篋太后念欲考問必有不辜乃親閱宮人觀察顏色即時首服又和帝幸人吉成御者共枉吉成以巫蠱事遂下掖庭考訊辭證明白太后以先帝左右待之有恩平日尚無惡言今反若此不合人情更自呼見實覈果御者所為莫不歎服以為聖明常以鬼神難徵淫祀無福乃詔有司罷諸祠官不合典禮者又詔赦除建武以來諸犯妖惡及馬竇家屬所被禁錮者皆復之為平人減大官導官尚方內者服御珍膳靡麗難成之物自非供陵廟稻梁米得導擇朝夕一肉飯而已舊大官湯官經用歲且二萬萬太后勑止曰日殺省珍費自是裁數千萬及郡國所貢皆減其過半悉斥賣上林鷹犬其蜀漢釦器九帶佩刀並不復調止畫工三十九種又御府尚方織室錦繡冰紈綺縠金銀珠玉犀象瑁彫鏤翫弄之物皆絕不作離宮別館儲峙米糒薪炭悉令省之又詔諸園貴人其宮人有宗室同族若羸老不任使者令園監實覈上名自御北宮增喜觀閱問之恣其去留即日免遣者五六百人及殤帝崩太后定策立安帝猶臨朝政以連遭大憂百姓苦役殤帝康陵方中祕藏及諸工作事事減約十分居一詔告司隸校尉河南尹南陽太守曰每覽前代外戚賓客假借威權輕薄謥詷至有濁亂奉公為人患苦咎在執法怠懈不輒行其罰故也今車騎將軍騭等雖懷敬順之志而宗門廣大姻戚不少賓客姦猾多干禁憲其明加檢勑勿相容護自是親屬犯罪無所假貸太后愍陰氏之罪廢赦其徙者歸鄉勑還資財五百餘萬永初元年爵號太夫人為新野君萬戶供湯沐邑二年夏京師旱親幸洛陽寺錄冤獄有囚實不殺人而被考自誣羸困輿見畏吏不敢言將去舉頭若欲自訴太后察視覺之即呼還問狀具得枉實即時收洛陽令下獄抵罪行未還宮澍雨大降三年秋太后體不安左右憂惶禱請祝辭願得代命太后聞之即譴怒切勑掖庭令以下但使謝過祈福不得妄生不祥之言舊事歲終當饗遣衞士大儺逐疫太后以陰陽不和軍旅數興詔饗會勿設戲作樂減逐疫侲子之半悉罷象橐駝之屬豐年復故太后自入宮掖從曹大家受經書兼天文筭數晝省王政夜則誦讀而患其謬誤懼乖典章乃博選諸儒劉珍等及博士議郎四府掾史五十餘人詣東觀讎校傳記事畢奏御賜葛布各有差又詔中官近臣於東觀受讀經傳以教授宮人左右習誦朝夕濟濟及新野君薨太后自侍疾病至乎終盡憂哀毀損事加於常贈以長公主赤綬東園祕器玉衣繡衾又賜布三萬匹錢三千萬騭等遂固讓錢布不受使司空持節護喪事儀比東海恭王謚曰敬君太后諒闇既終久旱太后比三日幸洛陽錄囚徒理出死罪三十六人耐罪八十人其餘減罪死右趾已下至司寇七年正月初入太廟齋七日賜公卿百僚各有差庚戌謁宗廟率命婦羣妾相禮儀與皇帝交獻親薦成禮而還因下詔曰凡供薦新味多非其節或鬱養強孰或穿掘萌牙味無所至而夭折生長豈所以順時育物乎傳曰非其時不食自今當奉祠陵廟及給御者皆須時乃上凡所省二十三種自太后臨朝水旱十載四夷外侵盜賊內起每聞人飢或達旦不寐而躬自減徹以救災戹故天下復平歲還豐穰元初五年平望侯劉毅以太后多德政欲令早有注記上書安帝曰臣聞易載羲農而皇德著書述唐虞而帝道崇故雖聖明必書功於竹帛流音於管弦伏惟皇太后膺大聖之姿體乾坤之德齊蹤虞妃比跡任姒孝悌慈仁允恭節約杜絕奢盈之源防抑逸欲之兆正位內朝流化四海及元興延平之際國無儲副仰觀乾象參之人譽援立陛下為天下主永安澈綏靜四海又遭水潦東州飢荒垂恩元元冠蓋交路菲薄衣食躬率羣下損膳解驂以贍黎苗惻隱之恩猶視赤子克己引愆顯揚仄陋崇晏晏之政敷在寬之教興滅國繼絕世錄功臣復宗室追還徙人蠲除禁錮政非惠和不圖於心制非舊典不訪於朝弘德洋溢充塞宇宙洪澤豐沛漫衍八方華夏樂化戎狄混并丕功著於大漢碩惠加於生人巍巍之業可聞而不可及蕩蕩之勳可誦而不可名古之帝王左右置史漢之舊典世有注記夫道有夷崇治有進退若善政不述細異輒書是為堯湯負洪水大旱之責而無咸熙假天之美高宗成王有雉雊迅風之變而無中興康寧之功也上考詩書有虞二妃周室三母修行佐德思不踰閾未有內遭家難外遇灾害覽總大麓經營天物功德巍巍若茲者也宜令史官著長樂宮注聖德頌以敷宣景燿勒勳金石縣之日月攄之罔極以崇陛下烝烝之孝帝從之六年太后詔徵和帝弟濟北河閒王子男女年五歲以上四十餘人又鄧氏近親子孫三十餘人並為開邸第教學經書躬自監試尚幼者使置師保朝夕入宮撫循詔導恩愛甚渥乃詔從兄河南尹豹越騎校尉康等曰吾所以引納羣子置之學官者實以方今承百王之敝時俗淺薄巧偽滋生五經衰缺不有化導將遂陵故欲襃崇聖道以匡失俗傳不云乎飽食終日無所用心難矣哉今末世貴戚食祿之家溫衣美飯乘堅驅良而面牆術學不識臧否斯故禍敗所從來也永平中四姓小侯皆令入學所以矯俗厲薄反之忠孝先公既以武功書之竹帛兼以文德教化子孫故能束脩不觸羅網誠令兒曹上述祖考休烈下念詔書本意則足矣其勉之哉康以太后久臨朝政心懷畏懼託病不朝太后使內人問之時宮婢出入多能有所毀譽其耆宿者皆稱中大人所使者乃康家先婢亦自通中大人康聞詬之曰汝我家出爾敢爾邪婢怒還說康詐疾而言不遜太后遂免康官遣歸國絕屬籍永寧二年二月寢病漸篤乃乘輦於前殿見侍中尚書因北至太子新所繕宮還大赦天下賜諸園貴人王主羣僚錢布各有差詔曰朕以無德託母天下而薄祐不天早離大憂延平之際海內無主元元戹運危於累卵勤勤苦心不敢以萬乘為樂上欲不欺天愧先帝下不違人負宿心誠在濟度百姓以安劉氏自謂感徹天地當蒙福祚而喪禍內外傷痛不絕頃以廢病沈滯久不得侍祠自力上原陵加欬逆唾血遂至不解存亡大分無可柰何公卿百官其勉盡忠恪以輔朝廷三月崩在位二十年年四, WYG: 卷}
  - {type: variant, offset: 5264, length: 3133, content: 十二通詩論語諸兄每讀經傳輒下意難問志在典籍不問居家之事母常非之曰汝不習女工以供衣服乃更務學寧當舉博士邪后重違母言晝修婦業暮誦經典家人號曰諸生父訓異之事無大小輒與詳議永元四年當以選入會訓卒后晝夜號泣終三年不食鹽菜憔悴毀容親人不識之后嘗夢捫天蕩蕩正青若有鍾乳狀乃仰嗽飲之以訊諸占夢言堯夢攀天而上湯夢及天而咶之斯皆聖王之前占吉不可言又相者見后驚曰此成湯之法也家人竊喜而不敢宣后叔父陔言常聞活千人者子孫有封兄訓為謁者使修石臼河歲活數千人天道可信家必蒙福初太傅禹歎曰吾將百萬之眾未嘗妄殺一人其後世必有興者七年后復與諸家子俱選入宮后長七尺二寸姿顏姝麗絕異於眾左右皆驚八年冬入掖庭為貴人時年十六恭肅小心動有法度承事陰后夙夜戰兢接撫同列常克己以下之雖宮人隸役皆加恩借帝深嘉愛焉及后有疾特令后母兄弟入視醫藥不限以日數后言於帝曰宮禁至重而使外舍久在內省上令陛下有幸私之譏下使賤妾獲不知足之謗上下交損誠不願也帝曰人皆以數入為榮貴人反以為憂深自抑損誠難及也每有讌會諸姬貴人競自修整簪珥光采袿裳鮮明而后獨著素裝服無飾其衣有與陰后同色者即時解易若並時進見則不敢正坐離立行則僂身自卑帝每有所問常逡巡後對不敢先陰后言帝知后勞心曲體歎曰修德之勞乃如是乎後陰后漸疎每當御見輒辭以疾時帝數失皇子后憂繼嗣不廣恆垂涕歎息數選進才人以博帝意陰后見后德稱日盛不知所為遂造祝詛欲以為害帝嘗寢病危甚陰后密言我得意不令鄧氏復有遺類后聞乃對左右流涕言曰我竭誠盡心以事皇后竟不為所祐而當獲罪於天婦人雖無從死之義然周公身請武王之命越姬心誓必死之分上以報帝之恩中以解宗族之禍下不令陰氏有人豕之譏即欲飲藥宮人趙玉者固禁之因詐言屬有使來上疾已愈后信以為然乃止明日帝果瘳十四年夏陰后以巫蠱事廢后請救不能得帝便屬意焉后愈稱疾篤深自閉絕會有司奏建長秋宮帝曰皇后之尊與朕同體承宗廟母天下豈易哉唯鄧貴人德冠後庭乃可當之至冬立為皇后辭讓者三然後即位手書表謝深陳德薄不足以充小君之選是時方國貢獻競求珍麗之物自后即位悉令禁絕歲時但供紙墨而已帝每欲官爵鄧氏后輒哀請謙讓故兄騭終帝世不過虎賁中郎將元興元年帝崩長子平原王有疾而諸皇子夭沒前後十數後生者輒隱秘養於人閒殤帝生始百日后乃迎立之尊后為皇太后太后臨朝和帝葬後宮人並歸園太后賜周馮貴人策曰朕與貴人託配後庭共歡等列十有餘年不獲福祐先帝早𠫓廾天下孤心煢煢靡所瞻仰夙夜永懷感愴發中今當以舊典分歸外園慘結增歎燕燕之詩曷能喻焉其賜貴人王青蓋車采飾輅驂馬各一駟黃金三十斤雜帛三千匹白越四千端又賜馮貴人王赤綬以未有頭上步搖環珮加賜各一具是時新遭大憂法禁未設宮中亡大珠一篋太后念欲考問必有不辜乃親閱宮人觀察顏色即時首服又和帝幸人吉成御者共枉吉成以巫蠱事遂下掖庭考訊辭證明白太后以先帝左右待之有恩平日尚無惡言今反若此不合人情更自呼見實覈果御者所為莫不歎服以為聖明常以鬼神難徵淫祀無福乃詔有司罷諸祠官不合典禮者又詔赦除建武以來諸犯妖惡及馬竇家屬所被禁錮者皆復之為平人減大官導官尚方內者服御珍膳靡麗難成之物自非供陵廟稻梁米得導擇朝夕一肉飯而已舊大官湯官經用歲且二萬萬太后勑止曰日殺省珍費自是裁數千萬及郡國所貢皆減其過半悉斥賣上林鷹犬其蜀漢釦器九帶佩刀並不復調止畫工三十九種又御府尚方織室錦繡冰紈綺縠金銀珠玉犀象瑁彫鏤翫弄之物皆絕不作離宮別館儲峙米糒薪炭悉令省之又詔諸園貴人其宮人有宗室同族若羸老不任使者令園監實覈上名自御北宮增喜觀閱問之恣其去留即日免遣者五六百人及殤帝崩太后定策立安帝猶臨朝政以連遭大憂百姓苦役殤帝康陵方中祕藏及諸工作事事減約十分居一詔告司隸校尉河南尹南陽太守曰每覽前代外戚賓客假借威權輕薄謥詷至有濁亂奉公為人患苦咎在執法怠懈不輒行其罰故也今車騎將軍騭等雖懷敬順之志而宗門廣大姻戚不少賓客姦猾多干禁憲其明加檢勑勿相容護自是親屬犯罪無所假貸太后愍陰氏之罪廢赦其徙者歸鄉勑還資財五百餘萬永初元年爵號太夫人為新野君萬戶供湯沐邑二年夏京師旱親幸洛陽寺錄冤獄有囚實不殺人而被考自誣羸困輿見畏吏不敢言將去舉頭若欲自訴太后察視覺之即呼還問狀具得枉實即時收洛陽令下獄抵罪行未還宮澍雨大降三年秋太后體不安左右憂惶禱請祝辭願得代命太后聞之即譴怒切勑掖庭令以下但使謝過祈福不得妄生不祥之言舊事歲終當饗遣衞士大儺逐疫太后以陰陽不和軍旅數興詔饗會勿設戲作樂減逐疫侲子之半悉罷象橐駝之屬豐年復故太后自入宮掖從曹大家受經書兼天文筭數晝省王政夜則誦讀而患其謬誤懼乖典章乃博選諸儒劉珍等及博士議郎四府掾史五十餘人詣東觀讎校傳記事畢奏御賜葛布各有差又詔中官近臣於東觀受讀經傳以教授宮人左右習誦朝夕濟濟及新野君薨太后自侍疾病至乎終盡憂哀毀損事加於常贈以長公主赤綬東園祕器玉衣繡衾又賜布三萬匹錢三千萬騭等遂固讓錢布不受使司空持節護喪事儀比東海恭王謚曰敬君太后諒闇既終久旱太后比三日幸洛陽錄囚徒理出死罪三十六人耐罪八十人其餘減罪死右趾已下至司寇七年正月初入太廟齋七日賜公卿百僚各有差庚戌謁宗廟率命婦羣妾相禮儀與皇帝交獻親薦成禮而還因下詔曰凡供薦新味多非其節或鬱養強孰或穿掘萌牙味無所至而夭折生長豈所以順時育物乎傳曰非其時不食自今當奉祠陵廟及給御者皆須時乃上凡所省二十三種自太后臨朝水旱十載四夷外侵盜賊內起每聞人飢或達旦不寐而躬自減徹以救災戹故天下復平歲還豐穰元初五年平望侯劉毅以太后多德政欲令早有注記上書安帝曰臣聞易載羲農而皇德著書述唐虞而帝道崇故雖聖明必書功於竹帛流音於管弦伏惟皇太后膺大聖之姿體乾坤之德齊蹤虞妃比跡任姒孝悌慈仁允恭節約杜絕奢盈之源防抑逸欲之兆正位內朝流化四海及元興延平之際國無儲副仰觀乾象參之人譽援立陛下為天下主永安澈綏靜四海又遭水潦東州飢荒垂恩元元冠蓋交路菲薄衣食躬率羣下損膳解驂以贍黎苗惻隱之恩猶視赤子克己引愆顯揚仄陋崇晏晏之政敷在寬之教興滅國繼絕世錄功臣復宗室追還徙人蠲除禁錮政非惠和不圖於心制非舊典不訪於朝弘德洋溢充塞宇宙洪澤豐沛漫衍八方華夏樂化戎狄混并丕功著於大漢碩惠加於生人巍巍之業可聞而不可及蕩蕩之勳可誦而不可名古之帝王左右置史漢之舊典世有注記夫道有夷崇治有進退若善政不述細異輒書是為堯湯負洪水大旱之責而無咸熙假天之美高宗成王有雉雊迅風之變而無中興康寧之功也上考詩書有虞二妃周室三母修行佐德思不踰閾未有內遭家難外遇灾害覽總大麓經營天物功德巍巍若茲者也宜令史官著長樂宮注聖德頌以敷宣景燿勒勳金石縣之日月攄之罔極以崇陛下烝烝之孝帝從之六年太后詔徵和帝弟濟北河閒王子男女年五歲以上四十餘人又鄧氏近親子孫三十餘人並為開邸第教學經書躬自監試尚幼者使置師保朝夕入宮撫循詔導恩愛甚渥乃詔從兄河南尹豹越騎校尉康等曰吾所以引納羣子置之學官者實以方今承百王之敝時俗淺薄巧偽滋生五經衰缺不有化導將遂陵故欲襃崇聖道以匡失俗傳不云乎飽食終日無所用心難矣哉今末世貴戚食祿之家溫衣美飯乘堅驅良而面牆術學不識臧否斯故禍敗所從來也永平中四姓小侯皆令入學所以矯俗厲薄反之忠孝先公既以武功書之竹帛兼以文德教化子孫故能束脩不觸羅網誠令兒曹上述祖考休烈下念詔書本意則足矣其勉之哉康以太后久臨朝政心懷畏懼託病不朝太后使內人問之時宮婢出入多能有所毀譽其耆宿者皆稱中大人所使者乃康家先婢亦自通中大人康聞詬之曰汝我家出爾敢爾邪婢怒還說康詐疾而言不遜太后遂免康官遣歸國絕屬籍永寧二年二月寢病漸篤乃乘輦於前殿見侍中尚書因北至太子新所繕宮還大赦天下賜諸園貴人王主羣僚錢布各有差詔曰朕以無德託母天下而薄祐不天早離大憂延平之際海內無主元元戹運危於累卵勤勤苦心不敢以萬乘為樂上欲不欺天愧先帝下不違人負宿心誠在濟度百姓以安劉氏自謂感徹天地當蒙福祚而喪禍內外傷痛不絕頃以廢病沈滯久不得侍祠自力上原陵加欬逆唾血遂至不解存亡大分無可柰何公卿百官其勉盡忠恪以輔朝廷三月崩在位二十年年四, krp: 卷}
