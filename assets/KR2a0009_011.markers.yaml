  - {type: variant, offset: 3520, length: 898, content: 臣莫若君況親屬乎吾豈可上負先帝之旨下虧先人之德重襲西京敗亡之禍哉固不許帝省詔悲歎復重請曰漢興舅氏之封侯猶皇子之為王也太后誠存謙虛柰何令臣獨不加恩三舅乎且衞尉年尊兩校尉有大病如令不諱使臣長抱刻骨之恨宜及吉時不可稽留太后報曰吾反覆念之思令兩善豈徒欲獲謙讓之名而使帝受不外施之嫌哉昔竇太后欲封王皇后之兄丞相條侯言受高祖約無軍功非劉氏不侯今馬氏無功於國豈得與陰郭中興之后等邪常觀富貴之家祿位重疊猶再實之木其根必傷且人所以願封侯者欲上奉祭祀下求溫飽耳今祭祀則受四方之珍衣食則蒙御府餘資斯豈不足而必當得一縣乎吾計之孰矣勿有疑也夫至孝之行安親為上今數遭變異穀價數倍憂惶晝夜不安坐臥而欲先營外封違慈母之拳拳乎吾素剛急有匈中氣不可不順也若陰陽調和邊境清靜然後行子之志吾但當含飴弄孫不能復關政矣時新平主家御者失火延及北閣後殿太后以為己過起居不歡時當謁原陵自引守備不慎慙見陵園遂不行初太夫人葬起墳微高太后以為言兄廖等即時減削其外親有謙素義行者輒假借溫言賞以財位如有纖介則先見嚴恪之色然後加譴其美車服不軌法度者便絕屬籍遣歸田里廣平鉅鹿樂成王車騎朴素無金銀之飾帝以白太后太后即賜錢各五百萬於是內外從化被服如一諸家惶恐倍於永平時乃置織室蠶於濯龍中數往觀視以為娛樂常與帝旦夕言道政事及教授諸小王論議經書述敘平生雍和終日四年天下豐稔方垂無事帝遂封三舅廖防光為列侯並辭讓願就關內侯太后聞之曰聖人設教各有其方知人情性莫能齊也吾少壯時但慕竹帛志不顧命今雖已老而復戒之在得故日夜惕厲思自降損居不求安食不念飽冀乘此道不負先帝所以化導兄弟共同斯志欲令瞑目之日無所復恨何意老志復不從哉萬年之日長恨矣廖等不得已受封爵而退位歸第焉太后其年寢疾不信巫祝小醫數勑絕禱祀至六月崩在位二十三年年四十餘合葬顯節陵賈貴人南陽人建武末選入太子宮中元二年生肅宗而顯宗以為貴人帝既為太后所養專以馬氏為幼故貴人不登極位賈氏親族無受寵榮者及太后崩乃策書加貴人王赤綬安車一駟永巷宮人二百御府雜帛二萬匹大司農黃金千斤錢二千萬諸史並闕後事故不知所終章德竇皇后諱某扶風平陵人大司徒空融之曾孫也祖穆父勳坐事死事在竇融傳勳尚東海恭王彊女沘陽公主后其長女也家既廢壞數呼相工問息耗見后, WYG: 音律}
