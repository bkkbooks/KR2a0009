  - {type: variant, offset: 5, length: 0, content: '', WYG: 一梁剡令劉昭補幷注律厯志第一律厯志律準候氣古之人論數也曰物生而後有象象而後有滋滋而後有數然則天地初形人物既著則算數之事生矣記稱大橈作甲子吕氏春秋曰黄帝師大橈博物記曰容成氏造厯黄帝臣也月令章句大橈探五行之情占斗綱所建於是始作甲乙以名曰謂之幹作子丑以名日謂之枝枝幹相配以成六旬隸首作數博物記曰隸首黄帝之臣一説隸首善算者也二者既立以比日表表即晷景以管萬事夫一十百千萬所同用也律度量衡厯其别用也故體有長短檢以度説苑曰以粟生之十粟為一分十分為一寸十寸為一尺十尺為一丈物有多少受以量説苑曰千二百粟為一籥十籥為一合十合為一升十升為一斗十斗為一斛量有輕重平以權衡説苑曰十粟重一圭十圭重一銖二十四銖重一两十六兩重一斤三十斤重一鈞四鈞重一石聲有清濁協以律吕三光運行紀以歴數然後幽隱之情精微之變可得而綜也前志曰夫推厯生律制噐規圓矩方權重衡平準繩嘉量探賾索隱鉤深致逺莫不用焉度長短者不失毫釐量多少者不失圭撮權輕重者不失黍累紀於一協於十長於百大於千廣於萬漢興北平侯張蒼首治律厯孝武正樂置協律之官至元始中博徵通知鍾律者考其意義羲和劉歆典領條奏前史班固取以為志而元帝時郎中京房房字君明知五聲之音六律之數}
