  - {type: variant, offset: 4555, length: 622, content: 慶梁貴人生和帝后既無子並疾忌之數閒於帝漸致疎嫌因誣宋貴人挾邪媚道遂自殺廢慶為清河王語在慶傳梁貴人者襃親愍侯梁竦之女也少失母為伯母舞陰長公主所養年十六亦以建初二年與中姊俱選入掖庭為貴人四年生和帝后養為己子欲專名外家而忌梁氏八年乃作飛書以陷竦竦坐誅貴人姊妹以憂卒自是宮房惵息后愛日隆及帝崩和帝即位尊后為皇太后皇太后臨朝尊母沘陽公主為長公主益湯沐邑三千戶兄憲弟篤景並顯貴威權後遂密謀不軌永元四年發覺被誅九年太后崩未及葬而梁貴人姊嬺嫕上書陳貴人枉歿之狀太尉張酺司徒劉方司空張奮上奏依光武黜呂太后故事貶太后尊號不宜合葬先帝百官亦多上言者帝手詔曰竇氏雖不遵法度而太后常自減損朕奉事十年深惟大義禮臣子無貶尊上之文恩不忍離義不忍虧案前世上官太后亦無降黜其勿復議於是合葬敬陵在位十八年帝以貴人酷歿斂葬禮闕乃改殯於承光宮上尊謚曰恭懷皇后追服喪制百官縞素與姊大貴人俱葬西陵儀比敬園和帝陰皇后諱某光烈皇后兄執金吾識之曾孫也后少聰慧善書蓺永元四年選入掖庭以先后近屬故得為貴人有殊寵八年遂立為皇后自和熹鄧后入宮愛寵稍衰數有恚恨后外祖母鄧朱出入宮掖十四年夏有言后與朱共挾巫蠱道事發覺帝遂使中常侍張慎與尚書陳襃於掖庭獄雜考案之朱及二子奉毅與后弟軼輔敞辭語相連及以為祠祭祝詛大逆無道奉毅輔考死獄中帝使司徒魯恭持節賜后策上璽綬遷于桐宮以憂死立七年葬薔重部父特進綱自殺軼敞及朱家屬徙日南比景縣宗親外內昆弟皆免官還田里永初四年鄧太后詔赦陰氏諸徙者悉歸故郡還其資財五百餘萬和熹鄧皇后諱綏, WYG: ''}
