  - {type: variant, offset: 620, length: 260, content: 四帝臨朝者六后莫不定策帷帟委事父兄貪孩童以久其政抑明賢以專其威任重道悠利深禍速身犯霧露於雲臺之上家嬰縲絏於圄犴之下湮滅連踵傾輈繼路而赴蹈不息燋爛為期終於陵夷大運淪亡神寶詩書所歎略同一揆故考列行跡以為皇后本紀雖成敗事異而同居正號者並列于篇其以私恩追尊非當時所奉者則隨它事附出親屬別事各依列傳其餘無所見則係之此紀以纘西京外戚云爾光武郭皇后諱聖通真定人也為郡著姓父昌讓田宅財產數百萬與異母弟國人義之仕郡功曹娶真定恭王女號郭主生后及子況昌早卒郭主雖王家女而好禮節儉有母儀之德更始二年春光武擊王郎至真定因納后有寵及即位以為貴人建武, WYG: 解元和}
