  - {type: variant, offset: 31, length: 2, content: 夫人, WYG: 靜者數二以陽生隂倍之以隂生陽四之皆三而一陽生隂曰下生隂生陽曰上生上生不得過黄鍾之清濁下生不得及黄鍾之數實皆參天兩地圓蓋方覆六耦承奇之道也黄鍾律吕之首而生十二律者也前書曰黄帝使伶倫自大夏之西崑崙之隂取竹之嶰谷生其竅厚均者斷兩節間而吹之以為黄鍾之管制十二筩以聽鳳之鳴其雄鳴爲六雌鳴亦六比黄鍾之音而皆可以生之是為律夲至治之世天地之氣合以生風天地之風氣正十二律乃定其相生也皆三分而損益之是故十二律之得十七萬七千一百四十七是為黄鍾之實前書曰太極元氣函三為一極中也元始也行於十二辰始動於子參之於丑得三又參之於寅得}
