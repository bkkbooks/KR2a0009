  - {type: variant, offset: 16, length: 2, content: 后妃, WYG: 生下皆三生二以下生上皆三生四陽下生隂隂上生陽終於中吕而十二律畢矣中吕上生執始執始下生去滅上下相生終於南事六十律畢矣夫十二律}
  - {type: page-break, offset: 16, content: '', id: KR2a0009_WYG_011-2b, image: WYG0252/WYG0252-0203d.png}
  - {type: variant, offset: 16, length: 2, content: 后妃, krp: 生下皆三生二以下生上皆三生四陽下生隂隂上生陽終於中吕而十二律畢矣中吕上生執始執始下生去滅上下相生終於南事六十律畢矣夫十二律}
  - {type: variant, offset: 19, length: 0, content: '', WYG: 變至於六十猶八卦之變至於六十四也宓犧作易紀陽氣之初以為律法建日冬至之聲以黄鍾為宫太蔟為商姑洗為角林鍾為徴南吕為羽應鍾為變宫蕤賔為變徵月令章句曰以姑洗為角南吕為羽則微濁也此聲氣之元五音之正也故各終一日其餘以次運行當日者各自為宫而商徵以類從焉月令章句曰律率也聲之管也上古聖人夲隂陽别風聲審清濁而不可以文載口傳也於是始鑄金作鍾以主十二月之聲然後以放并降之氣鍾難分别乃截竹為管謂之律律者清濁之率法也聲之清濁以長短為}
  - {type: page-break, offset: 19, content: '', id: KR2a0009_WYG_011-3a, image: WYG0252/WYG0252-0204a.png}
  - {type: variant, offset: 19, length: 0, content: '', krp: 變至於六十猶八卦之變至於六十四也宓犧作易紀陽氣之初以為律法建日冬至之聲以黄鍾為宫太蔟為商姑洗為角林鍾為徴南吕為羽應鍾為變宫蕤賔為變徵月令章句曰以姑洗為角南吕為羽則微濁也此聲氣之元五音之正也故各終一日其餘以次運行當日者各自為宫而商徵以類從焉月令章句曰律率也聲之管也上古聖人夲隂陽别風聲審清濁而不可以文載口傳也於是始鑄金作鍾以主十二月之聲然後以放并降之氣鍾難分别乃截竹為管謂之律律者清濁之率法也聲之清濁以長短為}
  - {type: punctuation, offset: 20, content: ，, id: KR2a0009_ZHSJ_011-bkkpn3}
  - {type: 'tls:seg', offset: 20, content: '', id: KR2a0009_ZHSJ_011-d11p2s3}
  - {type: variant, offset: 20, length: 0, content: '', WYG: 禮運篇曰五聲六律十二管還相為宫此之謂也鄭𤣥曰宫數八十一黄鍾長九寸九九八十一也三分宫去一生徴徴數五十四林鍾長六寸六九五十四也三分徵益一生商商數七十二太簇長八寸八九七十二也三分商去一生羽羽數四十八南吕長五寸三分寸之一五九四十五又三分寸之一為四十八也三分羽益一生角角數六十四姑洗長七寸九分寸之一七九六十三又九分寸之一為六十四也三分角去一生變宫三分變宫益一生變徵自此已後則隨月而變所謂還相為宫以六十律分朞之日黄鍾自冬至始及冬至而復隂陽寒燠風雨之占生焉於以檢攝羣音考}
  - {type: page-break, offset: 20, content: '', id: KR2a0009_WYG_011-3b, image: WYG0252/WYG0252-0204b.png}
  - {type: variant, offset: 20, length: 0, content: '', krp: 禮運篇曰五聲六律十二管還相為宫此之謂也鄭𤣥曰宫數八十一黄鍾長九寸九九八十一也三分宫去一生徴徴數五十四林鍾長六寸六九五十四也三分徵益一生商商數七十二太簇長八寸八九七十二也三分商去一生羽羽數四十八南吕長五寸三分寸之一五九四十五又三分寸之一為四十八也三分羽益一生角角數六十四姑洗長七寸九分寸之一七九六十三又九分寸之一為六十四也三分角去一生變宫三分變宫益一生變徵自此已後則隨月而變所謂還相為宫以六十律分朞之日黄鍾自冬至始及冬至而復隂陽寒燠風雨之占生焉於以檢攝羣音考}
  - {type: variant, offset: 21, length: 0, content: '', WYG: 髙下茍非草木之聲則無不有所合虞書曰律和聲此之謂也房又曰竹聲不可以度調故作凖以定數凖之状如瑟長丈而十三弦隱間九尺以應黄鍾之律九寸中央一弦下有畫分寸以為六十律清濁之節房言律詳於歆所奏其術施行於史官候部用之}
  - {type: variant, offset: 21, length: 0, content: '', krp: 髙下茍非草木之聲則無不有所合虞書曰律和聲此之謂也房又曰竹聲不可以度調故作凖以定數凖之状如瑟長丈而十三弦隱間九尺以應黄鍾之律九寸中央一弦下有畫分寸以為六十律清濁之節房言律詳於歆所奏其術施行於史官候部用之}
