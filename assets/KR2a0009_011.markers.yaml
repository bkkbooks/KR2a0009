  - {type: variant, offset: 4423, length: 3, content: 尊貴非, WYG: 㩁常數及候氣而已夫五音生於隂陽分為十二律轉生六十皆所以紀斗氣效物類也天效以景地效以響即律也隂陽和則景至律氣應則灰除是故天子常以日冬夏至御前殿合八能之士陳八音聽樂均度晷景候鍾律權土灰放隂陽冬至陽氣應則樂均清景長極黄鍾通土灰輕而衡仰夏至隂氣應則樂均濁景短極蕤賔通土灰重而衡低淮南子曰水勝故夏至濕火勝故冬至燥燥故灰輕濕故灰重進退於先後五日之中八能各以候狀聞太史封上效則和否則占易緯曰冬至人主不出宫寝兵從樂五日擊黄鍾之磬公卿大夫列士之意得則隂陽之晷如度數夏至之日如冬至之禮冬至之日樹八尺之表日中視其晷晷如度者其嵗羙人民和順晷不如度者則嵗惡人民多譌言政令為之不平晷進則水晷退則旱進一尺則日食退一尺則月食月食則正}
