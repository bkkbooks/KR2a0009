  - {type: variant, offset: 4093, length: 433, content: 戊辰三郡雨雹秋七月辛丑陳王鈞薨京師及郡國十雨水詔曰今年秋稼茂好垂可收穫而連雨未霽懼必淹傷夕惕惟憂思念厥咎夫霖雨者人怨之所致其武吏以威暴下文吏妄行苛刻鄉吏因公生姦為百姓所患苦者有司顯明其罰又月令仲秋養衰老授几杖行糜粥方今案比之時郡縣多不奉行雖有糜粥糠秕相半長吏怠事莫有躬親甚違詔書養老之意其務崇仁恕賑護寡獨稱朕意焉九月護羌校尉任尚使客刺殺叛羌零昌冬十一月己卯彭城王恭薨十二月越巂夷寇遂久殺縣令甲子任尚及騎都尉馬賢與先零羌戰于富平上河大破之虔人羌率衆降隴右平是歲郡國十三地震五年春正月越巂夷叛二月壬戌中山王憲薨三月京師及郡國五旱詔稟遭旱貧人夏六月高句驪與穢貊寇玄菟秋七月越巂蠻夷及旄牛豪叛殺長吏丙子詔曰舊令制度各有科品欲令百姓務崇節約遭永初之際人離荒戹朝廷躬自菲薄去絕奢飾食不兼味衣無二綵比年雖獲豐穰尚乏儲積而小人無慮不圖久長嫁娶送終紛華靡麗至有走卒奴婢被綺縠著珠璣京師尚若斯何以示四遠設張法禁懇惻分明而有司惰任訖不奉行秋節既立鷙鳥將用且復重申以觀後效八月丙申朔日有食之, WYG: ''}
