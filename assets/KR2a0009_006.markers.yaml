  - {type: variant, offset: 969, length: 2, content: 太傅, WYG: 遣黎陽營兵出屯中山北界告幽州刺史其令縁邊郡増置歩兵列屯塞下調五營弩師郡舉五人令教習戰射調選也五營五校也謂長水歩兵射聲胡騎車騎等五校尉也劉攽曰正文案調五營弩師何為更言舉明此舉字是與字一郡與五人教習也又注案此五校之名大誤檢百官志有屯騎越騎歩兵長水射聲今此誤云胡騎車騎當改胡作屯車作越且二漢冇車騎將軍及騎都尉官耳無車騎校尉也又胡騎中興長水矣所以知非章懐之誤者安紀永初三年注五校引用漢官儀甚明壬寅廷尉}
