  - {type: variant, offset: 3650, length: 2, content: 任尚, krp: 陳龜迫殺南單于己丑晦日有蝕之且凍羌寇三輔殺令長且音子余反丁丑令死罪以下及亡命贖各有差九月令扶風漢陽築隴道塢三百所置屯兵辛未太尉王龔罷且凍羌寇武都燒隴關隴山之闗也今名大震關在今隴州汧源縣西也壬午太常桓焉為太尉丁亥徙西河郡居離石離石縣名在郡南五百九里西河本都平定縣至此徙於離石上郡居夏陽朔方居五原句龍吾期等東引烏桓西收羌胡寇上郡立車紐為單于冬十一月辛巳遣使匈奴中郎將張耽擊破之車紐降六年春正月丙子征西將軍馬賢與且凍羌戰於射姑山賢軍敗沒安定太守郭璜下獄死詔貸王侯國租一歳閏月鞏唐羌寇隴西遂及三輔二月丁巳有星孛於營室三月武都太守趙冲討鞏唐羌破之庚子司空郭䖍免丁巳河間王政薨丙午太僕趙戒為司空戒字志伯蜀郡成都人也夏五月庚子齊王無忌薨使匈奴中郎將張耽大破烏桓羌胡於天山東觀記曰耽將吏兵繩索相懸上通天山鞏唐羌寇北地秋七月甲午詔假民有貲者户錢一千八月丙辰大將軍梁商薨壬戌河南尹梁冀為大將軍九月諸種羌寇武威辛亥晦日有蝕之冬十月癸丑徙安定居扶風北地居馮翊十一月庚子以執金吾張喬行車騎將軍事將兵}
