  - {type: variant, offset: 10, length: 3, content: 五恭宗, WYG: 六孝順皇帝諱保諡法曰慈和徧服曰順伏侯古今注曰保之字曰守安帝之子也母李氏為閻皇后所害永寜元年立為皇太子延光三年安帝乳母王聖大長秋江京前書曰長秋皇后官本秦官將行也景帝更名大長秋或用中人或用士人秩二千石中興常用宦者中常侍樊豐譖太子乳母王男厨監邴吉殺之太子數為歎息王聖等懼有後禍遂與豐京共搆陷太子太子坐廢為濟陰王明年三月安帝崩北鄉侯立濟陰王以廢黜不得上殿親臨梓宮悲號不食内外羣僚莫不哀之及北鄉侯薨車騎將軍閻顯及江京與中常侍劉安陳逹等白太后祕不發喪而更徵立諸國王子乃閉宮門屯兵自守十一月丁巳京師及郡國十六地震是夜中黄門孫程等十九人十九人見孫程傳共斬江京劉安陳逹等迎濟陰王於德陽殿西鍾下漢官儀曰崇賢門内德陽殿也即皇帝位年十一近臣尚書以下從輦到南宮登雲臺召百官尚書令劉光等奏言}
