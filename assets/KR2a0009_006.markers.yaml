  - {type: variant, offset: 1616, length: 1, content: 皇, WYG: 京師地震漢陽地陷裂甲午詔實覈傷害者賜年七歳以上錢人二千一家被害郡縣為收斂乙未詔勿收漢陽今年田租口賦夏四月癸夘遣光禄大夫案行漢陽及河内魏郡陳留東郡稟貸貧人六月旱遣使者錄囚徒理輕繫甲寅濟南王顯薨秋七月丁酉茂陵園寢災帝縞素避正殿爾雅曰縞皓也繒之精白者曰縞辛亥使太常王龔持節告祠茂陵九月鮮卑寇漁陽冬十二月己亥太傅桓焉免東觀記曰無清介辟召䇿罷是歳車騎將軍來歴罷四年春正月丙寅詔曰朕託王公之上渉道日寡政失厥中陰陽氣隔寇盜肆暴庶獄彌繁憂悴永歎疢如疾首詩云君子如祉亂庶遄已解見章紀三朝之㑹朔旦立春嘉與海内洗心自新其赦天下從甲寅赦令已來復秩屬籍三年正月已來還贖其閻顯江京等知識婚姻禁錮一原除之妻父曰婚壻父曰姻一猶皆也務崇寛和敬順時令遵典去苛以稱朕意丙子}
