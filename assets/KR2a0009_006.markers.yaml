  - {type: variant, offset: 3810, length: 0, content: '', WYG: 戊戌帝崩於玉堂前殿年三歳清河王蒜徵至京師孝質皇帝諱纘諡法忠正無邪曰質古今注曰纘之字曰繼肅宗𤣥孫曽祖父千乘貞王伉祖父樂安夷王寵父勃海孝王鴻母陳夫人冲帝不豫大將軍梁冀徴帝到洛陽都亭及冲帝崩皇太后與冀定策禁中丙辰使冀持節以王青葢車迎帝入南宮丁巳封為建平侯其日即皇帝位年八歳己未𦵏孝冲皇帝於懷陵在洛陽西北十五里伏侯古今注曰高四丈六尺周百八十三歩廣陵賊張嬰等復反攻殺堂邑江都長堂邑縣屬廣陵郡今揚州六合縣也九江賊徐鳳等攻殺曲陽東城長曲陽縣屬九江郡在淮曲之陽故城在今豪州定逺縣西北東城縣故城在定逺縣東南也}
