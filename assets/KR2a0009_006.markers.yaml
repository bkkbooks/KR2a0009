  - {type: variant, offset: 2039, length: 268, content: 州大飢人相食四年春正月元日會徹樂不陳充庭車辛卯詔以三輔比遭寇亂人庶流除三年逋租過更口筭芻稟上郡貧民各有差海賊張伯路復與勃海平原劇賊劉文河周文光等攻厭次殺縣令遣御史中丞王宗督青州刺史法雄討破之度遼將軍梁慬遼東太守耿夔討破南單于於屬國故城丙午詔減百官及州郡縣奉各有差二月丁巳稟九江貧民南匈奴寇常山乙丑初置長安雍二營都尉官乙亥詔自建初以來諸祅言它過坐徙邊者各歸本郡其沒入官為奴婢者免為庶人詔謁者劉珍及五經博士校定東觀五經諸子傳記百家蓺術整齊脫說是正文字三月南單于降先零羌寇襃中漢中太守鄭勤戰歿徙金城郡都襄武戊子杜陵園火癸巳郡國九地震夏四月六州, WYG: ''}
