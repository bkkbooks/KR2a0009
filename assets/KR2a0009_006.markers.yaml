  - {type: variant, offset: 3281, length: 358, content: 日有食之先零羌敗涼州刺史皮陽於狄道乙卯詔除三輔三歲田租更賦口筭十一月是歲郡國十五地震二年春正月詔稟三輔及式涼六郡流貧人蜀郡青衣道夷奉獻內屬修理西門豹所分漳水為支渠以溉民田二月戊戌遣中謁者收葬京師客死無家屬及棺椁朽敗者皆為設祭其有家屬尤貧無以葬者賜錢人五千辛酉詔三輔河內河東上黨趙國太原各修理舊渠通利水道以溉公私田疇三月癸亥京師大風先零羌寇益州遣中郎將尹就討之夏四月丙午立貴人閻氏為皇后五月京師旱河南及郡國十九蝗甲戌詔曰朝廷不明庶事失中灾異不息憂心悼懼被蝗以來七年于茲而州郡隱匿裁言頃畝今羣飛蔽天為害廣遠所言所見寧相副邪三司之職內外是監既不奏聞又無舉正天灾至重欺罔辠大今方盛夏且復假貸以觀厥後其務消救灾眚安輯黎元六月丙戌太尉司馬苞薨洛陽新城地裂秋七月辛巳太僕太山馬英為太尉八月遼東鮮卑圍無慮縣九月又攻夫犂營殺縣令壬午晦, WYG: ''}
