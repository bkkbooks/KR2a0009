  - {type: variant, offset: 7174, length: 0, content: '', WYG: 順初立時髦允集爾雅曰髦俊也郭璞注云士中之俊猶毛中之髦時張皓王龔龎參張衡李郃李固黄瓊之儔也匪砥匪革終淪嬖習砥礪也革改也淪沒也言順帝初升天位又羣賢總集不能因兹自礪改革前非而終溺於私嬖近習也謂封孫程等十九人為侯又詔中官養子聽襲封爵之類也保阿傳士后家世及保}
