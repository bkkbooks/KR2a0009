  - {type: variant, offset: 3656, length: 0, content: '', WYG: 大將軍公卿舉賢良方正能探賾索隱者各一人賾幽深也索求也秋七月始置承華廐東觀記曰時以逺近獻馬衆多園廐充滿始置承華廐令秩六百石八月南匈奴左部大人句龍吾斯與薁鞬臺耆等反叛薁音於六反鞬音居言反丁夘遣侍中杜喬光祿大夫周舉守光祿大夫郭遵馮羡欒巴張綱周栩劉班等八人分行州郡班宣風化舉實臧否九月庚寅廣陵盜賊張嬰等寇郡縣冬十月辛未太尉桓焉司徒劉壽免甲戌行車騎將軍張喬罷劉攽曰案文少一事字十一月壬午司隸校尉趙峻為太尉大司農胡廣為司徒峻字伯師下邳徐人也癸夘詔大將軍三公選武猛試用有效騐任為將校者各一人是歳廣陵賊張嬰等詣太守張綱降二年春二月丙辰鄯善國遣使貢獻夏四月庚戌護羌校尉趙冲與漢陽太守張貢擊燒當羌於參䜌破之參䜌縣屬安定郡䜌音力全反六月乙丑熒惑犯鎮星丙寅立南匈奴守義王兠樓儲為南單于冬十月辛丑令郡國中都官繫囚殊死以下出縑贖各有差其不能入贖者遣詣臨羌縣居作二歳甲辰減百官奉丙午禁沽酒又貸王侯國租一歳閏月趙冲擊燒當羌於河陽破之河陽縣屬天水郡故城在今秦州隴城縣西北十一月使匈奴中郎將馬寔遣人刺殺句龍吾斯十二月揚徐盜賊攻燒城寺殺略吏民是歳涼州地百八十震建康元年春正月辛丑詔曰隴西漢陽張掖北地武威武都自去年九月已來地百八十震山谷坼裂壞敗城寺殺害民庶夷狄叛逆賦役重數内外怨曠惟咎歎息其遣光祿大夫案行宣暢恩澤惠此下民勿為煩擾三月庚子沛王廣薨領護羌校尉衞琚追討叛羌破之琚音居南郡江夏盜賊寇掠城邑州郡討平之夏四月使匈奴中郎將馬寔擊南匈奴左部破之於是胡羌烏桓悉詣寔降辛巳立皇子炳為皇太子改年建康大赦天下賜人爵各有差秋七月丙午清河王延平薨八月揚徐盜賊范容周生等寇掠城邑遣御史中丞馮赦督州郡兵討之庚午帝崩於玉堂前殿時年三十遺詔無起寢廟斂以故服珠玉玩好皆不得下論曰古之人君離幽放而反國祚者有矣莫不矯鑒前違審識情偽無忘在外之憂離遭也矯正也左傳曰晉侯在外十九年矣險阻艱難備嘗之矣人之情偽盡知之矣故能中興其業觀夫順朝之政殆不然乎何其傚僻之多與殆近也言順帝傚前之僻不能改正也孝冲皇帝諱炳諡法曰㓜少在位曰冲司馬彪曰冲㓜早夭故諡曰冲伏侯古今注曰炳之字曰明順帝之子也母曰虞貴人建康元年立為皇太子其年八月庚午即皇帝位年二歳尊皇后曰皇太后太后臨朝丁丑以太尉趙峻為太傳大司農李固為太尉參錄尚書事九月丙午𦵏孝順皇帝於憲陵在洛陽西十五里陵髙八丈四尺周三百步廟曰敬宗是日京師及太原鴈門地震三郡水涌土裂庚戌詔三公特進侯卿校尉舉賢良方正幽逸修道之士各一人百僚皆上封事己未九江太守丘騰有罪下獄死東觀記曰騰知罪法深大懷挾姦巧稽留道路下獄死揚州刺史尹耀九江太守鄧顯討賊范容等於歴陽軍敗耀顯為賊所殁冬十月日南蠻夷攻燒城邑交阯刺史夏方招誘降之壬申常山王儀薨己夘零陵太守劉康坐殺無辜下獄死十一月九江盜賊徐鳳馬勉等稱無上將軍攻燒城邑己酉令}
