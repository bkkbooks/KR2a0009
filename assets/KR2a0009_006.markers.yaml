  - {type: variant, offset: 3166, length: 5, content: 癸酉日有食, WYG: 庚戌益州盜賊劫質令長殺列侯夏四月丙寅車師後部司馬率後部王加特奴等掩擊匈奴大破之獲其季母五月戊戌制詔曰昔我太宗丕顯之徳假于上下儉以恤民政致康乂朕秉事不明政失厥道天地譴怒大變仍見春夏連旱寇賊彌繁元元被害朕甚愍之嘉與海内洗心更始其大赦天下自殊死以下謀反大逆諸犯不當得赦者皆赦除之賜民年八十以上米人一斛肉二十斤酒五斗九十以上加賜帛人二匹絮三斤秋七月庚戌鍾羌寇隴西漢陽冬十月護羌校尉馬續擊破之十一月壬寅司徒劉崎司空孔扶免乙巳大司農南郡黄尚為司徒光祿勲河東王卓為司空黄尚字伯河南郡邔人也王卓字仲遼河東觧人也邔音求紀反丙午武都塞上屯羌及外羌攻破屯官驅畧人畜四年春二月丙子初聽中官得以養子為後世襲封爵自去冬旱至于是月謁者馬賢擊鍾羌大破}
