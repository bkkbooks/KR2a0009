  - {type: variant, offset: 6049, length: 2, content: 旄牛, WYG: 丙申詔曰昔堯命四子以欽天道四子謂羲仲羲叔和仲和叔也書曰乃命羲和欽若昊天鴻範九疇休咎有象尚書曰天乃錫禹洪範九疇孔安國注云洪大也範法也疇類也言天與禹洛出書神龜負文而出列於背有數至於九禹遂因而第之以成九類其八日庶徵有休徵咎徵之應休羙也咎惡也徵騐也人君行善政則百榖用成家用平康是休徵也政有乖失則百榖用不成家用不寜是咎徵也休之與咎皆象人君之政故言休咎有象也象或作家夫瑞以和降異因逆感禁微應大前聖所重言君政純和則瑞氣降若逆時令則災異感所禁雖微其應乃大前聖所重即謂唐堯欽若昊天箕子休咎之應頃者州郡輕慢憲防競逞殘暴造設科條陷入無罪或以喜怒驅逐長吏恩阿所私罰枉仇隙至令守闕訴訟前後不絶送故迎新人離其害怨氣傷和以致災眚書曰明德慎罰眚過也明德慎罰尚書康誥之言方春東作育微敬始其勑有司罪非殊死且勿案騐以崇在寛言東作之時湏育養細微敬事之始禮記月令孟春之月無殺蟲胎夭飛鳥無麛無卵慶賜遂行無有不當書曰敬敷五敎在寛壬子廣陵太守王喜坐討賊逗遛下獄死二月庚辰詔曰九江廣陵二郡數離寇害殘}
