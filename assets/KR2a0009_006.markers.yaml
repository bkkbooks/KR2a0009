  - {type: variant, offset: 4082, length: 3, content: 丁丑太, WYG: 甲午詔曰朕以不德託母天下布政不明每失厥中自春渉夏大旱炎赫憂心京京爾雅曰京京憂也故得禱祈明祀劉攽曰案文云得無理當是復字冀蒙潤澤前雖得雨而宿麥頗傷比日隂雲還復開霽寤寐永歎重懷慘結寤覺也寐卧也詩曰寤寐永歎唯憂用老將二千石令長不崇寛和暴刻之為乎其令中都官繫囚罪非殊死考未竟者一切任出以須立秋任保也郡國有名山大澤能興雲雨者二千石長吏各絜齋請禱竭誠盡禮又兵役連年死亡流離或支骸不歛或停棺莫收朕甚愍焉昔文王𦵏枯骨人頼其德呂氏春秋曰周文王使人掘地得死人骸文王曰更𦵏之吏曰此無主文王曰有天下者天下之主今我非其主邪遂令吏以衣棺𦵏之天下聞之曰文王賢矣澤及枯骨又况人乎今遣使者案行若無家屬及貧無資者隨宜賜䘏以慰孤魂是月下邳人謝安應募擊徐鳳等斬之丙辰詔曰孝殤皇帝雖不永休祚而即位踰年君臣禮成孝安皇帝承襲統業而前世遂令恭陵在康陵之上先後相踰失其次序非所以奉宗廟之重垂無窮之制昔定公追正順祀春秋善之魯閔公立二年而薨次僖公立僖雖是閔庶兄然}
