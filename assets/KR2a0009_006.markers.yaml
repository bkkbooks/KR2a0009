  - {type: variant, offset: 3146, length: 1, content: 穀, WYG: 粟人五斛二月海賊曽旌等寇會稽殺句章鄞鄮三縣長三縣皆屬會稽郡鄮縣今越州縣也句章故城在今鄮縣西鄞故城在鄮縣東南鄞音銀鄮音茂攻會稽東部都尉詔縁海縣各屯兵戌丁巳皇后謁髙廟光武廟詔稟甘陵貧人大小口各有差京師旱庚申勑郡國二千石各禱名山嶽瀆遣大夫謁者詣嵩高首陽山并祠河洛請雨首陽山在洛陽東北戊辰雩以冀部比年水潦民食不贍詔案行稟貸勸農功賑乏絶甲戌詔曰政失厥和隂陽隔并冬鮮宿雪春無澍雨分禱祈請靡神不禜説文曰禜設緜蕞為營以祈水旱禜音詠詩曰靡神不舉深恐在所慢違如在之義論語曰祭神如神在今遣侍中王輔等持節分詣岱山東海滎陽河洛盡心祈焉濟水四瀆之一至河南溢為滎澤故於滎陽祠焉三月揚州六郡妖賊章河等寇四十九縣殺傷長吏庚寅帝臨辟雍饗射大赦天下改元陽嘉詔宗室絶屬籍者一切復籍稟冀州尤貧民勿收今年更租口賦夏五月戊寅阜陵王恢薨秋七月史官始作候風地動銅儀時張衡為太史令作之丙辰以太學新成試明經下第者補弟子増甲乙科員各十人前書音義曰甲科謂作簡䇿難問列置案上任試者意投射取而答之謂之射策上者為甲次者為乙若錄政化得失顯而問之謂之對策也除郡國耆儒九十人補郎舍人九月詔郡國中都官繫囚皆減死一等亡命者贖各有差鮮卑寇遼東冬十一月甲申望都蒲隂狼殺女子九十七人望都縣名屬中山國今定州縣也章帝改曲逆為蒲隂亦屬中山與望都相近故城在今定州北東觀記亦作蒲本多作滿滿字者誤也東觀又云為不祠北岳所致詔曰政失厥中狼災為應至乃殘食孤幼博訪其故山岳尊靈國所望秩而比不奉祠淫刑放濫害加孕婦也劉攽曰注本多作滿滿字者誤案文多一滿字詔賜狼所殺者錢}
