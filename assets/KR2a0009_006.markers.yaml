  - {type: variant, offset: 4531, length: 250, content: 殺長吏冬十月鮮卑寇上谷十二月丁巳中郎將任尚有辠𠫓廾市是歲郡國十四地震六年春二月乙巳京師及郡國四十二地震或坼裂水泉涌出壬子詔三府選掾屬高第能惠利牧養者各五人光祿勳與中郎將選孝廉郎寬博有謀清白行高者五十人出補令長丞尉乙卯詔曰夫政先京師後諸夏月令仲春養幼小存諸孤季春賜貧窮賑乏絕省婦使表貞女所以順陽氣崇生長也其賜人尤貧困孤弱單獨穀人三斛貞婦有節義十斛甄表門閭旌顯厥行三月庚辰始立六宗祀於洛城西北夏四月會稽大疫遣光祿大夫將太醫循行疾病賜棺木除田租口賦沛國勃海大風雨雹五月京師旱六月丁丑樂成王賓薨丙戌平原王得薨, WYG: ''}
