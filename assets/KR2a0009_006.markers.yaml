  - {type: variant, offset: 3647, length: 0, content: '', WYG: 光祿大夫案行金城隴西賜壓死者年七歳以上錢人二千一家皆被害為收歛之除今年田租尤甚者勿收口賦閏月蔡伯流等率衆詣徐州刺史應志降續漢書曰志字仲節汝南南頓人也曽祖父順己酉京師地震五月吳郡丞羊珍反攻郡府太守王衡破斬之六月辛丑琅邪王遵薨九真太守祝良交阯刺史張喬慰誘日南叛蠻降之嶺外平續漢書曰祝良字邵卿長沙臨湘人秋七月丙戌濟北王多薨八月己未司徒黄尚免九月己酉光祿勲長沙劉壽為司徒壽字伯長臨湘人也丙戌令大將軍三公各舉故刺史二千石及見令長郎謁者四府掾屬剛毅武猛有謀謨任將帥者各二人特進卿校尉各一人冬十月燒當羌寇金城護羌校尉馬賢擊破之羌遂相招而叛十二月戊戌朔日有食之四年春正月庚辰中常侍張逵蘧政楊定等有罪誅事見梁商傳也連及𢎞農太守張鳳安平相楊皓下獄死三月乙亥京師地震夏四月癸夘護羌校尉馬賢討燒當羌大破之戊午大赦天下賜民爵及粟帛各有差五月戊辰封故濟北惠王壽子安為濟北王秋八月太原郡旱民庶流冗癸丑遣光祿大夫案行稟貸除更賦冬十月戊午校獵上林苑歴函谷關而還十一月丙寅幸廣成苑五年春二月戊申京師地震夏四月庚子中山王𢎞薨南匈奴左部句龍大人吾斯車紐等叛圍羙稷羙稷縣屬西河郡也五月度遼將軍馬續討吾斯車紐破之使匈奴}
