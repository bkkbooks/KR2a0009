  - {type: variant, offset: 3155, length: 1, content: 匹, krp: 人戊子客星出天苑辛夘詔曰間者以來吏政不勤故災咎屢臻盜賊多有退省所由皆以選舉不實官非其人是以天心未得人情多怨書歌肱股詩刺三事尚書益稷篇帝作歌曰元首明哉股肱良哉詩小雅曰三事大夫莫肯夙夜邦君諸侯莫肯朝夕也今刺史二千石之選歸任三司三司三公也即太尉司空司徒也歸猶委任也其簡序先後情覈高下歳月之次文武之宜務存厥衷庚子恭陵百丈廡災恭陵安帝陵也廡廊屋也説文曰堂下周屋曰廡也是歳起西苑修飾宮殿二年春二月甲申詔以吳郡㑹稽饑荒貸人種糧三月使匈奴中郎將王稠率左骨都侯等擊鮮卑破之辛酉除京師耆儒年六十以上四十八人補郎舍人及諸王國郎夏四月復置隴西南部都尉官武帝元朔四年初置南部都尉於隴西臨洮縣中興以來廢至此復置之也己亥京師地震五月庚子詔曰朕以不德統奉鴻業無以奉順乾坤協序隂陽災眚屢見咎徵仍臻地動之異發自京師矜矜祗畏不知所裁羣公卿士將何以匡輔不逮奉答戒異異不空設必有所應其各悉心直言厥咎靡有所諱戊午司空王龔免六月辛未太常魯國孔扶為司空扶字仲淵疏勒國獻師子封牛東觀記曰疏勒王盤遣使文時詣闕師子似虎正黃有􅐖耏尾端茸毛大如斗封牛其領上肉隆起若封然因以名之即今之峯牛丁丑洛陽地陷是月旱秋七月己未太尉龎參免八月己巳大鴻臚沛國施延為太尉延字君子蘄縣人也鮮卑寇代郡冬十月庚午行禮辟雍奏應鍾始復黄鍾作樂器隨月律子為黄鍾律長九寸聲有輕重長短度量皆出黄鍾隨月律謂月令正月律中太蔟二月律中夾鍾三月律中姑洗四月律中仲呂五月律中㽔賓六月律中林鍾七月律中夷則八月律中南呂九月律中無射十月律中應鍾十一月律中黄鍾十二月律中大呂東觀記曰元和以來音戾不調復修如舊典蔟音湊三年春}
