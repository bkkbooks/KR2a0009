  - {type: variant, offset: 3646, length: 0, content: '', WYG: 烏桓寇雲中十一月圍度遼將軍耿曄於蘭池續漢志曰雲中郡沙南縣冇蘭池城發諸郡兵救之烏桓退走十二月甲寅京師地震永和元年春正月夫餘王來朝乙夘詔曰朕秉政不明災眚屢臻典籍所忌震食為重今日變方逺地摇京師東觀記曰陽嘉四年詔曰朕以不徳謫見於天零陵言日食京師不覺故此言日變方遠劉攽曰正文日變方遠案注引東觀記曰零陵言日食則是遠方也言方逺無理與注皆誤咎徴不虚必有所應羣公百僚其各上封事指陳得失靡有所諱己巳宗祀明堂登雲臺改元永和大赦天下秋七月偃師蝗冬十月丁亥承福殿火帝避御雲臺十一月丙子太尉龎參罷十二月象林蠻夷叛乙巳以前司空王襲為太尉二年春正月武陵蠻叛圍充縣又寇夷道充縣屬武陵郡故城在澧州崇義縣東北充音衝夷道屬南郡二月廣漢屬國都尉擊破白馬羌武陵太守李進擊叛蠻破之三月辛亥北海王翼薨乙夘司空王卓薨丁丑光祿勲馮翊郭䖍為司空䖍字君賢池陽人也夏四月丙申京師地震五月日南叛蠻攻郡府秋七月九真交阯二郡兵反八月庚子熒惑犯南斗熒惑火星也南斗北方之宿也前書音義曰犯謂七寸内光芒相及江夏盜賊殺邾長邾縣屬江夏郡故城在今復州竟陵縣東邾音朱冬十月甲申行幸長安所過鰥寡孤獨貧不能自存者賜粟人五斛庚子幸未央宮會三輔郡守都尉及官屬勞賜作樂十一月丙午祠高廟丁未遂有事十一陵丁夘京師地震十二月乙亥至自長安三年春二月乙亥京師及金城隴西地震二郡山岸崩地陷戊子太白犯熒惑夏四月九江賊蔡伯流寇郡界及廣陵殺江都長戊戌}
