  - {type: variant, offset: 6570, length: 539, content: 酉初復右校令左校令丞官日南徼外蠻豪帥詣闕貢獻馮翊言甘露降頻陽衙潁川上言木連理白鹿麒麟見陽翟鮮卑寇高柳梁王堅薨八月辛巳大鴻臚耿寶為大將軍戊子潁川上言麒麟一白虎二見陽翟九月丁酉廢皇太子保為濟陰王乙巳詔郡國中都官死辠繫打賹一等詔詣敦煌隴西及度遼營其右趾以下及亡命者贖各有差辛亥濟南上言黃龍見歷城庚申晦日有食之冬十月行幸長安壬午新豐上言鳳皇集西界亭丁亥會三輔守令掾史於長安作樂閏月乙未祠高廟遂有事十一陵歷觀上林昆明池遣使者祠太上皇于萬年以中牢祠蕭何曹參霍光十一月乙丑至自長安十二月乙未琅邪言黃龍見諸縣是歲京師及諸郡國二十三地震三十六雨水疾風雨雹四年春正月壬午東郡言黃龍二麒麟一見濮陽二月乙亥下邳王衍薨甲辰南巡狩三月戊午朔日有食之庚申幸宛帝不豫辛酉令大將軍耿寶行太尉事祠章陵園廟告長沙零陵太守祠定王節侯鬱林府君乙丑自宛還丁卯幸葉帝崩于乘輿年三十二祕不敢宣所在上食問起居如故庚午還宮辛未夕乃發喪尊皇后為皇太后太后蟈癒以后兄大鴻臚閻顯為車騎將軍定策禁中立章帝孫濟北惠王壽子北鄉侯懿甲戌濟南王香薨乙酉北鄉侯即皇帝位夏四月丁酉太尉馮石為太傅司徒劉熹為太尉參錄帑悃前司空李郃為司徒辛卯大將軍耿寶中常侍樊豐侍中謝惲周廣乳母野王君王聖坐相阿黨豐惲廣下獄死寶自殺聖徙鴈門己酉葬孝安皇帝于恭陵廟曰恭宗六月乙, WYG: ''}
