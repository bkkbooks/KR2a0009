  - {type: variant, offset: 4810, length: 672, content: 十二月戊午朔日有食之既郡國八地震是歲永昌益州蜀郡夷叛與越雟夷殺長吏燔城邑益州刺史張喬討破降之永寧元年春正月甲辰任城王安薨三月丁酉濟北王壽薨車師後王叛殺部司馬沈氐羌寇張掖夏四月丙寅立皇子保為皇太子改元永寧大赦天下賜王主三公列侯下至郎吏從官金帛又賜民爵及布粟各有差己巳紹封陳王羨子崇為陳王濟北王子萇為樂成王河閒王子翼為平原王壬午琅邪王壽薨六月沈氐種羌叛寇張掖護羌校尉馬賢討沈氐羌破之秋七月乙酉朔日有食之冬十月己巳司空李郃免癸酉衞尉廬江陳為司空自三月至是月京師及郡國三十三大風雨水十二月永昌徼外撣國遣使貢獻戊辰司徒劉愷罷遼西鮮卑降癸酉太常楊震為司徒是歲郡國二十三地震夫餘王遣子詣闕貢獻燒當羌叛建光元年春正月幽州刺史馮煥率二郡太守討高句驪穢貊不克二月癸亥大赦天下賜諸園貴人王主公卿以下錢布各有差以公卿校尉尚書子弟一人為郎舍人三月癸巳皇太后鄧氏崩丙午葬和熹皇后丁未樂安王寵薨戊申追尊皇考清河孝王曰孝德皇皇妣左氏曰孝德皇后祖妣宋貴人曰敬隱皇后夏四月穢貊復與鮮卑寇遼東遼東太守蔡諷追擊戰歿丙辰以廣川并清河國丁巳尊孝德皇元耿氏為甘陵大貴人甲子樂成王萇有罪廢為臨湖侯己巳令公卿特進侯中二千石二千石郡國守相舉有道之士各一人賜魚眾寡孤獨貧不能自存者穀人三斛甲戌遼東屬國都尉龐奮承偽璽書殺玄菟太守姚光五月庚辰特進鄧騭及度遼將軍鄧遵並以譖自殺丙申貶平原王翼為都鄉侯秋七月己卯改元建光大赦天下壬寅太尉馬英薨八月護羌校尉馬賢討燒當羌於金城不利甲子前司徒劉愷為太尉鮮卑寇居庸關九月雲中太守成嚴擊之戰歿鮮卑圍烏桓校尉於馬城度遼將軍耿夔救之戊子幸衞尉馮石府是秋京師及郡國二十九雨水, WYG: ''}
