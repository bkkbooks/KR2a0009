  - {type: variant, offset: 253, length: 4, content: 倪敞諫篆, WYG: 王望舉觴上壽謟稱太守功徳東觀記曰王望言曰齊郡敗亂遭離盗賊不聞雞鳴犬吠之音明府視事五年土地開闢盗賊滅息五穀豐熟家給人足今日歳首請上雅壽掾史皆稱萬歳良於下坐勃然進曰望佞邪之人欺謟無狀願勿受其觴東觀記曰良時跪曰門下掾佞謟明府勿受其觴盜賊未盡人庶困乏今良曹掾尚無絝望曰議曹惰窳自無絝寧足為不家給人足邪太守曰此生言是賜良鰒魚百枚也太守歛容而止讌罷轉良為功曹恥以言受進終不肯謁時驃騎將軍東平王蒼聞而辟之署為西曹蒼甚相敬愛上疏薦良曰臣聞為國所重必在得人報恩之義莫大薦士竊見臣府西曹掾齊國吳良資質敦固公方廉恪躬儉安貧白首一節言雖耆耄志節不衰又治尚書學通師法東觀記曰良習大夏侯尚書經任博士行中表儀宜備宿衛以輔聖政臣蒼榮寵絶矣憂責深大絶猶極也私慕公叔同升之義懼於臧文竊位之罪公叔文子衛大夫公孫拔之謚也文子家臣名僎操行與文子同文子}
