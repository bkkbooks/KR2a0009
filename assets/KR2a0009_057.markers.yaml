  - {type: variant, offset: 250, length: 0, content: '', WYG: 屬南陽論曰夫威彊以自禦力損則身危飾詐以圖已詐窮則道屈而忠信篤敬蠻貊行焉者誠以德之感物厚矣論語曰子張問行子曰言忠信行篤敬雖蠻貊之邦行矣故趙孟懷忠匹夫成其仁趙孟晋大夫趙盾也左傳曰晉靈公不君趙盾驟諌之靈公患焉使鉏麑賊之晨往寢門闢矣盛服將朝尚早坐而假寐麑退而言曰不忘恭敬民之主也賊民之主不忠棄君之命不信有一於此不如死也觸槐而死趙盾遂得全論語曰有殺身以成仁無求生以害仁杜林行義烈士假其命易曰人之所助者順有不誣矣易繫辭曰天之所助者信人之所助者順不誣言必蒙天人之助也郭丹傳郭丹字少卿南陽穰人也父稚成帝時為廬江太守有清名丹七歳而孤小心孝順後母哀憐之為鬻衣裝買産業鬻賣也後從師長安買符入函谷闗符即繻也前書音義曰舊出入闗皆用傳傳煩因裂繻帛分持後復出合之以為符信買符非眞符也東觀記曰丹從宛人陳洮買入闗符既入關封符乞人也乃慨然歎曰丹不乗使者車終不出關續漢志曰諸侯使車皆朱班輪四輻赤衡軛旣至京師常為都講諸儒咸敬重之大司馬嚴尤請丹辭病不就王莽又徴之遂與諸生逃於北地更始二年三公舉丹賢能徴為諌議大夫持節使歸南陽安集受降丹自去家十有二年果乘髙車出闗如其志焉更始敗諸將悉歸光武並獲封爵丹獨保平氏不下為更始發喪衰絰盡哀喪服斬衰裳上曰衰下曰裳麻在首要皆曰絰首絰象緇布冠要絰象大帶絰之言實衰之言摧明中實摧痛也平氏縣名屬南陽郡建武二年遂潛逃去敝衣間行渉歴險阻求謁更始妻子奉還節傳因歸鄉里太守杜詩請為功曹丹薦鄉人長者自代而去詩乃歎曰昔明王興化卿士讓位毛萇詩傳曰虞芮之君爭田相謂曰西伯仁人也盍往質焉乃相與朝周至其朝士讓為大夫大夫讓為卿二國君乃慙而退今功曹推賢可謂至徳勑以丹事編署黄堂以為後法黄堂太守之㕔事十三年大司馬呉漢辟舉髙第再遷并州牧有清平稱轉使匃奴中郎將遷左馮翊永平三年代李訢為司徒在朝㢘直公正與侯霸杜林張湛郭伋齊名相善眀年坐考隴西太守鄧融事無所據䇿免五年卒於家時年八十七以河南尹范遷有清行代為司徒遷字子廬沛國人初為漁陽太守以智略安邊匃奴不敢入界及在公輔有宅數畝田不過一頃復推與兄子其妻嘗謂曰君有四子而無立錐之地史記楚優孟曰孫叔敖子無立錐之地可餘奉祿以為後世業遷曰吾備位大臣而蓄財求利何以示後世在位四年薨家無擔石焉後顯宗因朝㑹問群臣郭丹家今何如宗正劉匡對曰昔孫叔敖相楚馬不秣粟妻不衣帛子孫竟蒙寢邱之封孫叔敖楚莊王之相也期思縣人史記曰楚之處士虞邱相進之相楚上下和合吏無姦邪遂霸諸侯吕覽曰叔敖將死戒其子曰王數封我矣吾不受也我死王則封汝必無受利地楚越之間有寢邱者此其地不利而名甚惡可長有者唯此也孫叔敖死王以羙地封其子其子辭請寝邱至今不失寢邱縣名後漢改為固始今光州固始縣也有孫叔敖祠焉丹出典州郡入為三公而家無遺産子孫困匱帝乃下南陽訪求其嗣長子宇官至常山太守少子濟趙相呉良傳吳良字大儀齊國臨淄人也初為郡吏東觀記曰良為郡議曹掾歳旦與掾史入賀}
