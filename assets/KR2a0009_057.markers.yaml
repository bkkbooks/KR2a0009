  - {type: variant, offset: 263, length: 0, content: '', WYG: 殺鹿持歸肉分門下取皮上師師不受宫因棄之人問其故宫曰既已與人義不可復取經典既眀乃歸家教授遭天下喪亂遂將諸生避地漢中後與妻子之䝉隂山䝉隂縣名屬太山郡有蒙山在今沂州新泰縣東南肆力耕種禾黍將熟人有認之者宫不與計推之而去由是顯名三府更辟皆不應三府謂太尉司徒司空府永平中徵詣公車車駕臨辟雍召宫拜博士遷左中郎將數納忠言陳政論議切慤朝臣憚其節名播匃奴時北單于遣使求得見宫顯宗勑自整飾宫對曰夷狄眩名非識實者也臣狀醜不可以示逺宜選有威容者續漢書曰夷狄聞臣虚稱故欲見臣臣醜陋形寢不如選長大有威容者示之也帝乃以大鴻臚魏應代之十七年拜侍中祭酒建初元年卒肅宗褒歎賜以冡地妻上書乞歸葬鄉里復賜錢三十萬續漢書曰宫子疊官}
