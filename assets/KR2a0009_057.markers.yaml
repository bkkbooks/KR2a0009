  - {type: variant, offset: 274, length: 1, content: 嗟, WYG: 均遣子英奉章詣闕詔召見英問均所苦賜以冠幘錢布元和元年詔告廬江太守東平相曰以毛義廬江人鄭均東平人故告二郡守相也議郎鄭均束修安貧恭儉節整前在機密以病致仕守善貞固黄髮不怠又前安邑令毛義躬履遜讓比徴辭病淳潔之風東州稱仁書不云}
  - {type: variant, offset: 274, length: 1, content: 嗟, krp: 均遣子英奉章詣闕詔召見英問均所苦賜以冠幘錢布元和元年詔告廬江太守東平相曰以毛義廬江人鄭均東平人故告二郡守相也議郎鄭均束修安貧恭儉節整前在機密以病致仕守善貞固黄髮不怠又前安邑令毛義躬履遜讓比徴辭病淳潔之風東州稱仁書不云}
