  - {type: variant, offset: 258, length: 3, content: 強起班, WYG: 升進之於公與之同為大夫臧文仲魯大夫臧孫辰也時栁下惠為士師文仲知其賢而不進達之孔子譏之曰臧文仲其竊位者與知柳下之賢而不與立事並見論語也敢秉愚瞽犯冒嚴禁顯宗以示公卿曰前以事見良鬚髮皓然衣冠甚偉夫薦賢助國宰相之職蕭何舉韓信設壇而拜不復考試蕭何薦韓信于髙祖曰陛下必欲爭天下非信無可與計者漢王於是設壇塲拜信為大將軍見前書今以良為議郎永平中車駕近出而信陽侯隂就干突禁衛車府令徐匡鉤就車收御者送獄鉤留也詔書譴匡匡乃自繫良上言曰信陽侯就倚恃外戚干犯乗輿無人臣禮為大不敬匡執法守正反下於理臣恐聖化由是而弛弛廢也帝雖赦匡猶左轉良為即邱長即邱縣名屬東海郡即左氏傳之祝邱也故城在今沂州臨沂縣東南後遷司徒長史哀帝改丞相為大司徒司直仍舊中興因之不改建武十一年省司直置長史每處大議輙據經典不希㫖偶俗以徼時譽希猶瞻望也後坐事免復拜議郎卒於官承宫傳承宫字少子世本承姓衛大夫成叔承之後也琅邪姑幕人也少孤年八歳為人牧豕鄉里徐子盛者以}
