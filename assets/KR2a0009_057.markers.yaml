  - {type: variant, offset: 60, length: 0, content: '', WYG: 紏察百僚光武特詔御史中丞與司隸校尉尚書令續漢志曰尚書令一人千石秦官武帝用宦者成帝用士人也㑹同並專席而坐故京師號曰三獨坐眀年遷司隸校尉務舉大綱簡略苛細百僚敬之説文曰苛細草也以喻煩雜也秉性節約常服布被蔬食瓦器帝嘗幸其府舍見而歎曰楚國二龔不如雲陽宣巨公二龔謂龔勝字君賔龔舍字君倩二人皆以清苦立節著名事見前書即賜布帛帳帷什物周禮幕人掌帷帟幄幕鄭𤣥曰在傍曰帷爾雅曰幬謂之帳軍法五人為伍二五為什則共其器物故通謂}
  - {type: page-break, offset: 60, content: '', id: KR2a0009_WYG_057-2a, image: WYG0252/WYG0252-0666c.png}
  - {type: variant, offset: 60, length: 0, content: '', krp: 紏察百僚光武特詔御史中丞與司隸校尉尚書令續漢志曰尚書令一人千石秦官武帝用宦者成帝用士人也㑹同並專席而坐故京師號曰三獨坐眀年遷司隸校尉務舉大綱簡略苛細百僚敬之説文曰苛細草也以喻煩雜也秉性節約常服布被蔬食瓦器帝嘗幸其府舍見而歎曰楚國二龔不如雲陽宣巨公二龔謂龔勝字君賔龔舍字君倩二人皆以清苦立節著名事見前書即賜布帛帳帷什物周禮幕人掌帷帟幄幕鄭𤣥曰在傍曰帷爾雅曰幬謂之帳軍法五人為伍二五為什則共其器物故通謂}
  - {type: variant, offset: 61, length: 0, content: '', WYG: 生之具為什物劉攽曰案帳帷當作帷帳注文先解帷後帳是其次矣四年拜大司徒司直司直武帝元狩五年置比二千石掌佐丞相舉不法哀帝元壽二年改丞相為大司徒中興因而不改猶置司直至建武十一年省司直置長史一人署諸曹事至二十七年司徒又去大字見前書及續漢書所得祿奉輙以收養親族其孤弱者分與田地自無擔石之儲前書音義曰齊人名小甖為擔今江淮人謂一石為一擔擔音丁濫反六年卒於官帝敏惜之劉攽曰案文敏當作愍除}
  - {type: page-break, offset: 61, content: '', id: KR2a0009_WYG_057-2b, image: WYG0252/WYG0252-0666d.png}
  - {type: variant, offset: 61, length: 0, content: '', krp: 生之具為什物劉攽曰案帳帷當作帷帳注文先解帷後帳是其次矣四年拜大司徒司直司直武帝元狩五年置比二千石掌佐丞相舉不法哀帝元壽二年改丞相為大司徒中興因而不改猶置司直至建武十一年省司直置長史一人署諸曹事至二十七年司徒又去大字見前書及續漢書所得祿奉輙以收養親族其孤弱者分與田地自無擔石之儲前書音義曰齊人名小甖為擔今江淮人謂一石為一擔擔音丁濫反六年卒於官帝敏惜之劉攽曰案文敏當作愍除}
  - {type: variant, offset: 62, length: 3, content: 舒歷四, WYG: 彪為郎東觀記曰彪官至𤣥菟太守張湛傳張湛字子孝扶風平陵人也矜嚴好禮動止有則居處幽室必自修整雖遇妻子若嚴君焉易家人卦曰家人有嚴君焉父母之謂也及在鄉黨詳言正色詳審也三輔以為儀表儀法也表正也書曰儀表萬邦人或謂湛偽詐湛聞而笑曰我誠詐也人皆詐惡我獨詐善不亦可乎成哀間為二千石王莽時厯太守都尉建武初為左馮翊在郡修典禮設條教政化大行後告歸平陵望寺門而歩告請也告歸謂請假歸寺門即平陵縣門也風俗通曰寺者嗣也理事之吏嗣續於其中也主簿進曰眀府位尊徳重不宜自輕郡守所居曰府府者尊髙之稱前書韓延壽為東}
  - {type: page-break, offset: 62, content: '', id: KR2a0009_WYG_057-3a, image: WYG0252/WYG0252-0667a.png}
