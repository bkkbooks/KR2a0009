  - {type: variant, offset: 323, length: 1745, content: 之心然獨為君子將有悔乎篆曰邾文公不以一人易其身君子謂之知命如殺一大尹贖二千人蓋所願也遂稱疾去建武初朝廷多薦言之者幽州刺史又舉篆賢良篆自以宗門受莽偽寵慙愧漢朝遂辭歸不仕客居滎陽閉門潛思著周易林六十四篇用決吉凶多所占驗臨終作賦以自悼名曰慰志其辭曰嘉昔人之遘辰兮美伊傅之時應規矩之淑質兮過班倕而裁之協準矱之貞度兮同斷金之玄策何天衢於盛世兮超千載而垂績豈脩德之極致兮將天祚之攸適六柄制于家門兮王綱漼以陵黎共奮以跋扈兮羿浞狂以恣睢睹嫚臧而乘釁兮竊神器之萬機思輔弼以媮存兮亦號咷以詶咨嗟三事之我負兮乃迫余以天威豈無熊僚之微介兮悼我生之殲夷庶明哲之末風兮懼大雅之所譏遂翕翼以委命兮受符守乎艮維恨遭閉而不隱兮違石門之高蹤揚蛾眉於復關兮犯孔戒之冶容懿氓蚩之悟悔兮慕白駒之所從乃稱疾而屢復兮歷三祀而見許悠輕舉以遠遁兮託峻峗以幽處竫潛思於至賾兮騁六經之奧府皇再命而紹卹兮乃云眷乎建武運欃槍以電埽兮清六合之土宇聖德滂以橫被兮黎庶愷以鼓舞闢四門以博延兮彼幽牧之我舉分畫定而計決兮豈云賁乎鄙耇遂懸車以縶馬兮絕時俗之進取歎暮春之成服兮闔衡門以埽軌聊優游以永日兮守性命以盡齒貴啟體之歸全兮庶不忝乎先子篆生毅以疾隱身不仕毅生駰年十三能通詩易春秋博學有偉才盡通古今訓詁百家之言善屬文少游太學與班固傅毅同時齊名常以典籍為業未遑仕進之事時人或譏其太玄靜將以後名失實駰擬楊雄解嘲作達旨以荅焉其辭曰發其華秋收其實有始有極爰登其質今子韞櫝六經服膺道術歷世而游高談有日俯鉤深於重淵仰探遠乎九乾窮至賾於幽微測潛隱之無源然下不步卿相之廷上不登王公之門進不黨以讚己退不黷於庸人獨師友道德合符曩真抱景特立與士不羣蓋高樹靡陰獨木不林隨時之宜道貴從凡于時太上運天德以君世憲王僚而布官臨雍泮以恢儒疏軒冕以崇賢率惇德以厲忠孝揚茂化以砥仁義選利器於良材求鏌於明智不以此時攀台階闚紫闥據高軒望朱闕夫欲千里而咫尺未發蒙竊惑焉故英人乘斯時也猶逸禽之赴深林蝱蚋之趣大沛胡為嘿嘿而久沈滯也天地初制皇綱云緒帝紀乃設傳序歷數三代興滅昔大庭尚矣赫胥罔識淳𣾴散離人物錯乖高辛攸降厥趣各違道無常稽與時張薥失仁為非得義為是君子通變各審所履故士或掩目而淵潛或盥耳而山棲或草耕而僅飽或木茹而長飢或重聘而不來或屢黜而不去或冒訽以干進或望色而斯舉或以役夫發夢於王公或以漁父見兆於元龜若夫紛塞路凶虐播流人有昏墊之戹主有疇咨之憂條垂藟蔓上下相求於是乎賢人授手援世之災跋涉赴俗急斯時也昔堯含慼而臯陶謨高祖歎而子房慮禍不散而曹絳奮結不解而陳平權及其策合道從克亂弭衝乃將鏤玄珪冊顯功銘昆吾之冶勒景襄之鍾與其有事則褰裳濡足冠挂不顧人溺不拯則非仁也當其無事則躐纓整襟規矩其步德讓不修則非忠也是以險則救俗平則守禮舉以公心不私其體衆異齊品類之萬殊參差同量坏冶一陶羣生得理庶績其凝家家有以樂和人人有以自優威械臧而俎豆布六典陳而九刑厝濟茲兆庶出於平易之路雖有力牧之略尚父之厲伊臯不論奚事范蔡夫廣廈成而茂木暢遠求存而良馬縶陰事終而水宿臧場功畢而大火入方斯之際處士山積學者川流衣裳被宇冠蓋雲浮譬猶衡陽之林岱陰之麓伐尋抱不為之稀蓺拱把不為之數悠悠罔極亦各有得彼採其華我收其實舍之則臧己所學也故進動以道則不辭執珪而秉柱國復靜以理則甘糟糠而安藜藿衒鬻縣旌自表非隨和之寶也暴智燿世因以干祿非仲尼之道也游不倫黨苟以徇己汗血競時利合而友子笑我之沈滯吾亦病子而不已也先人有則而我弗虧行有枉徑而我弗隨臧否在予唯世所議固將因天質之自然誦上哲之高訓詠太平之清風行天下之至順懼吾躬之穢德勤百畝之不耘縶余馬以安行俟性命之所存昔孔子起威於夾谷晏嬰發勇於崔杼曹劌舉節於柯盟卞嚴克捷於彊禦范蠡錯埶於會稽五員樹功於柏舉魯連辯言以退燕包胥單辭而存楚唐且華顛以悟秦甘羅童牙而報趙原衰見廉於壺𧹞宣孟收德於束脯吳札結信於丘木展季効貞於門女顏回明仁於度轂程嬰顯義於趙武僕誠不能編德於數者竊慕古人之所序元和中肅宗始修古禮巡狩方岳駰上四巡頌以稱漢德辭甚典美文多故不載帝雅好文章自見駰頌後帝常嗟歎之謂侍中竇憲曰卿寧知崔駰乎對曰班固數為臣說之然未見也帝曰公愛班固而忽崔駰此葉公之好龍也試請見之駰由此候憲憲屣履迎門笑謂駰曰亭伯吾受詔交公公何得薄哉遂揖入為上客居無幾何帝幸憲第時駰適在憲所帝聞而欲召見之憲諫以為不宜與白衣會帝悟曰吾能令駰朝夕在傍何必於此適欲官之會帝崩, WYG: 弔祠}
