  - {type: variant, offset: 247, length: 0, content: '', krp: 徴拜諌議大夫數有忠言以禮進止朝廷敬之遷沛郡太守至蘄縣稱病不之府官屬皆隨就之良遂上疾篤乞骸骨徴拜太中大夫六年代宣秉為大司徒司直在位恭儉妻子不入官舍布被瓦器時司徒史鮑恢以事到東海過候其家而良妻布裙曵柴自田中歸東觀記曰徒跣曵柴恢告曰我司徒史也故来受書欲見夫人妻曰妾是也苦掾無書掾即謂鮑恢司徒之掾史也言勞苦相過更無書信恢乃下拜歎息而還聞者莫不嘉之後以病歸一歳復徴至滎陽疾篤不任進道乃過其友人友人不肯見曰不有忠言竒謀而取大位何其往来屑屑不憚煩也揚雄方言曰屑屑不安也秦晉曰屑屑郭景純曰往来貎遂拒之良慙自後連徴輙稱病詔以𤣥纁聘之遂不應後光武幸蘭陵遣使者問良所疾苦不能言對詔復其子孫邑中徭役卒於家論曰夫利仁者或借仁以從利體義者不期體以合義此言履行仁義其事雖同原其本心眞偽各異利仁者謂心非好仁但以行仁則於己有利故假借仁道以求利耳若天性自然體合仁義者舉措云為不期於體而㝠然自合禮記曰仁者安仁智者利仁畏罪者彊仁與人同功其仁未可知與人同過其仁則可知季文子妾不衣帛魯人以為羙談文子魯卿季孫行父之諡也無衣帛之妾無食粟之馬君子是以知季文子忠於公室相三君矣而無私積可不謂忠乎事見左傳公孫𢎞身服布被汲黯譏其多詐公孫𢎞淄川人也武帝時為丞相汲黯曰𢎞以三公而身服布被詐也事見前書事實未殊而譽毁别議何也將體之與利之異乎宣秉王良處位優重而秉甘疏薄良妻荷薪可謂行過乎儉然當世咨其清人君髙其節豈非臨之以誠哉語曰同言而信則信在言前同令而行則誠在令外不其然乎眞偽之跡既殊人之信否亦異同言而信謂體仁與利仁二人同出言而人信服其眞者不信其偽者則知信不由言故言信在言前也同令而行意亦同也此皆子思子累徳篇之言故稱語曰張湛不屑矜偽之誚斯不偽矣屑猶介也王丹難於交執之道斯知交矣杜林傳杜林字伯山扶風茂陵人也案杜鄴傳鄴本魏郡繁陽人也武帝時徙茂陵父鄴成哀間為凉州刺史林少好學沈深家既多書又外氏張竦父子喜文采鄴字子夏祖父皆至郡守鄴少孤其母張敞女也鄴從敞子吉學得其家書竦即吉之子也博學文雅過於敞見前書林從竦受學博洽多聞時稱通儒風俗通曰儒者區也言其區别古今居則玩聖哲之詞動則行典籍之道稽先王之制立當時之事此通儒也若能納而不能出能言而不能行講誦而已無能往来此俗儒也初為郡吏王莽敗盗賊起林與弟成及同郡范逡孟冀等逡音七倫反將細弱俱客河西道逢賊數千人遂掠取財裝禠奪衣服禠解也音直紙反拔刃向林等將欲殺之冀仰曰願一言而死將軍知天神乎言知天道有神乎赤眉兵衆百萬所向無前而殘賊不道卒至破敗今將軍以數千之衆欲規霸王之事}
  - {type: variant, offset: 249, length: 0, content: '', WYG: 仁恩而反遵覆車不畏天乎賈誼曰前車覆後車誡詩曰不畏于天不媿于人賊遂釋之俱免於難隗囂素聞林志節深相敬待以為持書平劉攽曰案文多一平字蓋舊作治書讀者以平音治字章懷已改作持後人又妄留平字也後因疾告去辭還禄食囂復欲令彊起遂稱篤囂意雖相望且欲優容之望猶恨也東觀記曰林寄囂地終不降志辱身至簪蒿席草不食其粟也乃出令曰杜伯山天子所不能臣諸侯所不能友禮記曰儒有上不臣天子下不事諸侯愼靜尚寛砥礪廉隅其規為有如此者盖伯夷叔齊恥食周粟史記曰伯夷叔齊孤竹君之子也兄弟讓位歸文王後武王東伐紂伯夷叔齊扣馬諌曰父死不葬爰及干戈可謂孝乎以臣伐君可謂仁乎武王平殷亂而二人恥之義不食周粟餓死於首陽山今且從師友之位須道開通使順所志林雖拘於囂而終不屈節建武六年弟成物故囂乃聽林持喪東歸既遣而悔追令刺客楊賢於隴坻遮殺之賢見林身推鹿車載致弟喪乃歎曰當今之世誰能行義我雖小人何忍殺義士因亡去光武聞林已還三輔乃徴拜侍御史引見問以經書故舊及西州事甚悅之賜車馬衣被羣寮知林以名徳用甚尊憚之京師士大夫咸推其博洽東觀記曰林與馬援同鄉里素相親厚援從南方還時林馬適死援令子持馬一匹遺林曰朋友有車馬之饋可且以備乏林受之居數月林遣子奉書曰將軍内施九族外有賓客望恩者多林父子兩人食列卿祿常有盈今送錢五萬援受之謂子曰人當以此為法是杜伯山所以勝我也博廣也洽徧也言其所聞見廣大也河南鄭興東海衛宏等皆長於古學宏字敬仲在儒林傳興嘗師事劉歆林既遇之欣然言曰林得興等固諧矣使宏得林且有以益之及宏見林闇然而服濟南徐廵始師事宏後皆更受林學林前於西州得漆書古文尚書一卷常寳愛之雖遭艱困握持不離身出以示宏等曰林流離兵亂常恐斯經將絶何意東海衛子濟南徐生復能傳之是道竟不墜於地也古文雖不合時務然願諸生無悔所學宏廵益重之於是古文遂行眀年大議郊祀制多以為周郊后稷漢當祀堯詔復下公卿議議者僉同帝亦然之林獨以為周室之興祚由后稷漢業特起功不縁堯祖宗故事所冝因循定從林議東觀記載林議曰當今政卑易行禮簡易從人無愚智思仰漢徳基業特起不因縁堯堯逺於漢人不曉信言提其耳終不説諭后稷近周人所知之又據以興基由其祚詩曰不愆不忘率由舊章宜如舊制以解天下之惑後代王良為大司徒司直林薦同郡范逡趙秉申屠剛及隴西牛邯等皆被擢用士多歸之十一年司直官罷以林代郭憲為光祿勲内奉宿衛外總三署三署左右中郎將及五官中郎將皆管郎官也見續漢書周密敬愼選舉稱平郎有好學者輙見誘進朝夕滿堂十四年羣臣上言古者肉刑嚴重則人畏法令今憲律輕薄故姦軌不勝左傳曰凡亂在外為姦在内為軌宜增科禁以防其源詔下公卿林奏曰夫人情挫辱則義節之風損法防繁多則茍免之行興孔子曰導之以政齊之以刑民免而無恥導之以徳齊之以禮有恥且格皆論語之言也政謂禁令刑謂刑罰格来也言為政之法初訓導之以禁令若有違則整齊之以刑罰則人但免罪而已而無恥慙之心若教導之以道徳整齊之以禮義則人皆有耻慙之心且皆来服古之眀王深識遠慮動居其厚不務多辟周之五刑不過三千五刑謂墨劓剕宮大辟也尚書呂刑篇曰五刑之屬三千大漢初興詳覽失得故破矩為圓斵彫為樸蠲除苛政更立疏網史記曰漢興破觚而為圓斵彫而為樸號為網漏吞舟之魚觚亦方也老子曰天網恢恢疏而不漏海内歡欣人懷寛徳及至其後漸以滋章吹毛索疵詆欺無限老子曰法令滋章盗賊多有前書曰有司吹毛求疵索求也詆欺謂飾非成釁非其本罪果桃菜茹之饋集以成臧小事無妨於義以為大戮故國無㢘士家無完行至於法不能禁令不能止上下相遁為敝彌深遁猶回避也前書曰上下相匿以文避法焉臣愚以為宜如舊制不合翻移帝從之後皇太子彊求乞自退封東海王故重選官屬以林為王傅從駕南廵狩時諸王傅數被引命或多交逰不得應詔唯林守愼有召必至餘人雖不見譴而林特受賞賜又辭不敢受帝益重之東觀記曰王又以師數加饋遺林不敢受常辭以道上稟假有餘若以車重無所置之明年代丁恭為少府恭字子然山陽人在儒林傳二十二年復為光祿勲頃之代朱浮為大司空博雅多通稱為任職相明年薨帝親自臨喪送葬除子喬為郎詔曰公侯子孫必復其始左氏傳晉大夫辛膠之言賢者之後宜宰城邑其以喬為丹水長丹水}
