  - {type: variant, offset: 69, length: 1, content: 在, krp: 居曰路寢車曰路車馬曰路馬軾車前横木也乗車必正立}
  - {type: variant, offset: 71, length: 0, content: '', WYG: 所敬則撫軾謂小俛也禮記曰大夫士下公門軾路馬鄭𤣥云所以廣敬孔子於鄉黨恂恂如也論語之文也鄭𤣥云恂恂恭順貎也父母之國所宜盡禮何謂輕哉史記孔子謂門弟子曰魯墳墓所處父母之國也詩曰惟桑與梓必恭敬止也五年拜光祿勲前書光祿勲本名郎中令秦官武帝改焉秋中二千石掌大夫郎中從官光武臨朝或有惰容湛輙陳諫其失常乗白馬帝每見湛輙言白馬生且復諌矣七年以病乞身拜光祿大夫代王丹為太子太傅及郭后廢建武十七年廢因稱疾不朝拜太中大夫居中東門候舍漢官儀曰洛陽十二門東面三門最北門名上東門次南曰中東門每門校尉一人秩二千石司馬一人秩千石候一人秩六百石候舍蓋候之所居故時人號曰中東門君帝數存問賞賜後大司徒戴渉被誅渉字叔平冀州清河人也坐所舉人盗金下獄帝彊起湛以代之湛至朝堂遺失溲便溲小便也溲音所流反因自陳疾篤不}
