  - {type: variant, offset: 3549, length: 320, content: 之佐括囊守祿或疎遠之臣言以賤廢是以王綱縱薥於上智士鬱伊於下悲夫姓囂然咸復思中興之救矣且濟時拯世之術豈必體堯蹈舜然後乃理哉期於補決壞枝柱邪傾隨形裁割要措斯世於安寧之域而已故聖人執權遭時定制步驟之差各有云設不彊人以不能背急切而慕所聞也蓋孔子對葉公以來遠哀公以臨人景公以節禮非其不同所急異務也是以受命之君每輒創制中興之主亦匡時失昔盤庚愍殷遷都易民周穆有闕甫侯正刑俗人拘文牽古不達權制奇偉所聞簡忽所見烏可與論國家之大事哉故言事者雖合聖德輒見掎奪何者其頑士闇於時權安習所見不知樂成況可慮始苟云率由舊章而已其達者或矜名妒能恥策非己舞筆奮辭以破其義寡不勝衆遂見擯𠫓廾雖稷契復存猶將困焉斯賈生之所以排於絳灌屈子之所以攄其幽憤者也夫以文帝之明賈生之賢絳灌之忠, WYG: ''}
