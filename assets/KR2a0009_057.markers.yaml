  - {type: variant, offset: 283, length: 0, content: '', WYG: 也帝納其言而止墨子曰堯舜堂髙三尺土階三等茅茨不剪采椽不斵飯土簋歠土鉶糲粱之飯藜藿之羮夏日葛衣冬日鹿裘是約己也文帝嘗欲作露臺召匠計之曰直百金帝曰百金中人十家之産何以臺為宮室苑囿無所増益有不便輙㢮以利人是愛人也父卒襲封出為𢎞農太守轉右扶風公事去官徴拜城門校尉轉將作大匠遷少府又轉大鴻臚時恩澤諸侯以無勞受封羣臣不悅而莫敢諌典獨奏曰夫無功而賞勞者不勸上忝下辱亂象干度左傳曰國無政不用善則自取謫}
  - {type: page-break, offset: 283, content: '', id: KR2a0009_WYG_057-20a, image: WYG0252/WYG0252-0675c.png}
  - {type: variant, offset: 283, length: 0, content: '', krp: 也帝納其言而止墨子曰堯舜堂髙三尺土階三等茅茨不剪采椽不斵飯土簋歠土鉶糲粱之飯藜藿之羮夏日葛衣冬日鹿裘是約己也文帝嘗欲作露臺召匠計之曰直百金帝曰百金中人十家之産何以臺為宮室苑囿無所増益有不便輙㢮以利人是愛人也父卒襲封出為𢎞農太守轉右扶風公事去官徴拜城門校尉轉將作大匠遷少府又轉大鴻臚時恩澤諸侯以無勞受封羣臣不悅而莫敢諌典獨奏曰夫無功而賞勞者不勸上忝下辱亂象干度左傳曰國無政不用善則自取謫}
  - {type: variant, offset: 284, length: 4, content: 穽此皆何, WYG: 日月之災故政不可不愼務三而已一曰擇人二曰因人三曰從時前書曰成帝時同日封王氏五侯其日天氣赤黄霧四塞哀帝封丁傅日亦然是不用善人則亂象干度且髙祖之誓非功臣不封史記功臣侯表曰髙祖與功臣約曰非劉氏不王非有功不侯不如是天下共擊之宜一切削免爵土以存舊典帝不從頃之轉太僕遷太常朝廷每有灾異疑議輙諮問之謝承書曰天子宗典道懿尊為國師位特進七為列卿寢布被食用瓦器也典據經正對無所曲折每得賞賜輙分與諸生之貧者後以諌争違旨免官就國㑹帝崩時禁藩國諸侯不得奔弔典慨然曰身從衣褐之中致位上列褐織毛布之衣貧者所服且烏鳥反哺報徳况於士邪小爾雅曰純黒而反哺者謂之烏春秋元命包曰烏孝鳥也遂解印綬符䇿付縣而馳到京師州郡及大鴻臚並執處其}
  - {type: page-break, offset: 284, content: '', id: KR2a0009_WYG_057-20b, image: WYG0252/WYG0252-0675d.png}
