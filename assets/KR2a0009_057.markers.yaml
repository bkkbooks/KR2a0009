  - {type: variant, offset: 245, length: 0, content: '', WYG: 免歸後徴為太子少傅時大司徒侯覇欲與交友及丹被徴遣子昱候於道昱迎拜車下丹下荅之昱曰家公欲與君結交何為見拜丹曰君房有是言丹未之許也丹子有同門生喪親家在中山白丹欲往奔慰結侣將行丹怒而撻之東觀記曰丹怒撻之五十令寄縑以祠焉東觀記曰寄帛二匹以祠焉或問其故丹曰交道之難未易言也世稱管鮑次則王貢史記曰管夷吾潁上人嘗與鮑叔牙㳺叔牙知其賢管仲貧困嘗欺鮑叔牙鮑叔牙終善遇之管仲曰生我者父母知我者鮑叔前書王吉字子陽貢禹字少翁並瑯琊人也二人相善時人為之語王陽在位貢禹彈冠言其趣舍同也張陳凶其終蕭朱隙其末張耳陳餘初為刎頸交後搆隙耳後為漢將兵殺陳餘於泜水之上蕭育字次君朱博字子元二人為友著聞當代後有隙不終故時以交為難並見前書故知全之者鮮矣時人服其言客初有薦士於丹者因選舉之而後所舉者陷罪丹坐以免客慚懼自絶而丹終無所言尋復徴為太子太傅乃呼客謂曰子之自絶何量丹之薄也不為設食以罰之相待如舊其後遜位卒于家王良傳王良字仲子東海蘭陵人也少好學習小夏侯尚書夏侯建大夏侯勝之從兄子也建受尚書於勝號小夏侯見前書王莽時稱病不仕教授諸生千餘人建武二年大司馬吳漢辟不應}
