  - {type: variant, offset: 2183, length: 246, content: 當堯舜之盛世處光華之顯時豈可不庶幾夙夜以永衆譽弘申伯之美致周邵之事乎語曰不患無位患所以立昔馮野王以外戚居位稱為賢臣近陰衞尉克己復禮終受多福郯氏之宗非不尊也陽侯平之族非不盛也重侯累將建天樞執斗柄其所以獲譏於時垂愆於後者何也蓋在滿而不挹位有餘而仁不足也漢興以後迄于哀平外家二十保族全身四人而已書曰鑒于有殷可不慎哉自中興內以忠誠自固外以法度自守卒享祚國垂祉於今夫謙德之光周易所美滿溢之位道家所戒故君子福大而愈懼爵隆而益恭遠察近覽俯仰有則銘諸几杖刻諸盤杅矜矜業業無殆無荒如此則百福是荷慶流無窮矣及憲為, WYG: ''}
