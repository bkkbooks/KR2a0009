  - {type: variant, offset: 2735, length: 248, content: 辟車騎將軍閻顯府時閻太后稱制顯入參政事先是安帝廢太子為濟陰王而以北鄉侯為嗣瑗以侯立不以正知顯將敗欲說令廢立而顯日沈醉不能得見乃謂長史陳禪曰中常侍江京陳達等得以嬖寵惑蠱先帝遂使廢黜正統扶立疎孽少帝即位發病廟中周勃之徵於斯復見今欲與長史君共求見說將軍白太后收京等廢少帝引立濟陰王必上當天心下合人望伊霍之功不下席而立則將軍兄弟傳祚於無窮若拒違天意久曠神器則將以無罪并辜元惡此所謂禍福之會分功之時禪猶豫未敢從會北鄉侯薨孫程立濟陰王是為順帝閻顯兄弟悉伏誅瑗坐被斥門生蘇祇具知瑗謀欲上書言狀瑗聞而遽止之時陳禪, WYG: ''}
