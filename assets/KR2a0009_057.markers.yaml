  - {type: punctuation, offset: 4812, content: 、, id: KR2a0009_ZHSJ_057-bkkpn1197}
  - {type: variant, offset: 4813, length: 515, content: 言祠文表記書凡十五篇寔從兄烈有重名於北州歷位郡守九卿靈帝時開鴻都門榜賣官爵公卿州郡下至黃綬各有差其富者則先入錢貧者到官而後倍輸或因常侍阿保別自通達是時段熲樊陵張溫等雖有功勤名譽然皆先輸貨財而後登公位烈時因傅母入錢五百萬得為司徒及拜日天子臨軒百僚畢會帝顧謂親倖者曰悔不小靳可至千萬程夫人於傍應曰崔公冀州名士豈肯買官賴我得是反不知姝邪烈於是聲譽衰減久之不自安從容問其子鈞曰吾居三公於議者何如鈞曰大人少有英稱歷位卿守論者不謂不當為三公而今登其位天下失望烈曰何為然也鈞曰論者嫌其銅臭烈怒舉杖擊之鈞時為虎賁中郎將服武弁戴鶡尾狼狽而走烈罵曰死卒父檛而走孝乎鈞曰舜之事父小杖則受大杖則走非不孝也烈慙而止烈後拜太尉鈞少交結英豪有名稱為西河太守獻帝初鈞與袁紹俱起兵山東董卓以是收烈付郿獄錮之鋃鐺鐵鎖卓既誅拜烈城門校尉及李傕入長安為亂兵所殺烈有文才所著詩書教頌等凡四篇論曰崔氏世有美才兼以沈淪典籍遂為儒家文林駰瑗雖先盡心於貴戚而能終之以居正則其歸旨異夫進趣者乎李固高絜之士也與瑗隣郡奉贄以結好由此知杜喬之劾殆其過矣寔之政論言當世理亂雖鼂錯之徒不能過也贊曰崔為文宗世禪雕龍建新恥潔摧志求容永矣長岑于遼之陰不有直道曷取泥沈瑗不言祿亦離冤辱子真持論感起昏俗, WYG: 考證}
