  - {type: variant, offset: 4213, length: 599, content: 刑文帝雖除肉刑當劓者笞三百當斬左趾者笞五百當斬右趾者𠫓廾巿右趾者既殞其命笞撻者往往至死雖有輕刑之名其實殺也當此之時民皆思復肉刑至景帝元年乃下詔曰加笞與重罪無異幸而不死不可為民人乃定律減笞輕捶自是之後笞者得全以此言之文帝乃重刑非輕之也以嚴致平非以寬致平也必欲行若言當大定其本使人主師五帝而式三王盪亡秦之俗遵先聖之風𠫓廾苟全之政蹈稽古之蹤復五等之爵立井田之制然後選稷契為佐伊呂為輔樂作而鳳皇儀擊石而百獸舞若不然則多為累而已其後辟太尉袁湯大將軍梁冀府並不應大司農羊傅少府何豹上書薦寔才美能高宜在朝廷召拜議郎遷大將軍冀司馬與邊韶延篤等著作東觀出為五原太守五原土宜麻枲而俗不知織績民冬月無衣積細草而臥其中見吏則衣草而出寔至官斥賣儲峙為作紡績織綀縕之具以教之民得以免寒苦是時胡虜連入雲中朔方殺略吏民一歲至九奔命寔整厲士馬嚴烽候虜不敢犯常為邊最以病徵拜議郎復與諸儒博士共雜定五經會梁冀誅寔以故吏免官禁錮數年時鮮卑數犯邊詔三公舉威武謀略之士司空黃瓊薦寔拜遼東太守行道母劉氏病卒上疏求歸葬行喪母有母儀淑德博覽書傳初寔在五原常訓以臨民之政寔之善績母有其助焉服竟召拜尚書寔以世方阻亂稱疾不視事數月免歸初寔父卒剽賣田宅起冢塋立碑頌葬訖資產竭盡因窮困以酤釀販鬻為業時人多以此譏之寔終不改亦取足而已不致盈餘及仕官歷位邊郡而愈貧薄建寧中病卒家徒四壁立無以殯斂光祿勳楊賜太僕袁逢少府段熲為備棺槨葬具大鴻臚袁隗樹碑頌德所著碑論箴銘荅, WYG: 十}
