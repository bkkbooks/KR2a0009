  - {type: variant, offset: 80, length: 0, content: '', WYG: 連徴不至家累千金隠居養志好施周急周急謂周濟困急也孔子曰君子周急不繼富每歳農時輙載酒肴於田間候勤者而勞之東觀記曰載酒肴便於田頭大樹下飲食勸勉之因留其餘酒肴而去其墯孏者恥不致丹皆兼功自厲孏與嬾同音力亶反邑聚相率以致殷富其輕黠游蕩廢業}
