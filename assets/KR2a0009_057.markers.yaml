  - {type: variant, offset: 276, length: 2, content: 刑罰, WYG: 章厥有常吉哉章眀也吉善也言為天子當眀顯其有常徳者優其禀餼則政之善也尚書咎繇謨之言其賜均義榖各千斛常以八月長吏存問賜羊酒顯茲異行東觀記曰賜羊一頭酒二斗終其身問遺賢良必以八月諸物老成故順其時氣助養育之也故月令仲秋之月養衰老授几杖行糜粥飲食鄭𤣥注云助老氣也眀年帝東廵過任城乃幸均舍勑賜尚書祿以終其身續漢志曰尚書秩六百石祿毎月七十石時人號為白衣尚書永元中卒于家趙典傳趙典字仲經蜀郡成都人也父戒為太尉謝承書曰典太尉戒之叔子也桓帝立以定䇿封厨亭侯典少篤行隱約𨼆猶靜也約儉也博學經書弟子自遠方至謝承書曰典學孔子七經河圖洛書内外藝術靡}
  - {type: page-break, offset: 276, content: '', id: KR2a0009_WYG_057-19a, image: WYG0252/WYG0252-0675a.png}
