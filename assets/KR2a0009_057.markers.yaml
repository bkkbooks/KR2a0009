  - {type: variant, offset: 264, length: 0, content: '', WYG: 濟隂太守鄭均傳鄭均字仲虞東平任城人也少好黄老書兄為縣吏東觀記曰兄仲為縣游徼頗受禮遺均數諌止不聼則脫身為傭歳餘得錢帛歸以與兄曰物盡可復得為吏坐臧終身捐棄兄感其言遂為㢘潔均好義篤實養寡嫂孤兒恩禮敦至東觀記曰均失兄養孤兒兄子甚篤已冠娶妻出令别居並門盡推財與}
