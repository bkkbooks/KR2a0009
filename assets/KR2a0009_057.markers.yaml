  - {type: variant, offset: 2459, length: 275, content: 少擢在其閒憲擅權驕恣駰數諫之及出擊匈奴道路愈多不法駰為主簿前後奏記數十指切長短憲不能容稍疎之因察駰高第出為長岑長駰自以遠去不得意遂不之官而歸永元四年卒于家所著詩賦銘頌書記表七依婚禮結言達旨酒警合二十一篇中子瑗瑗字子玉早孤銳志好學盡能傳其父業年十八至京師從侍中賈逵質正大義逵善待之瑗因留游學遂明天官歷數京房易傳六日七分諸儒宗之與扶風馬融南陽張衡特相友好初瑗兄章為州人所殺瑗手刃報仇因亡命會赦歸家家貧兄弟同居數十年鄉邑化之年四十餘始為郡吏以事繫東郡發干獄獄掾善為禮瑗閒考訊時輒問以禮說其專心好學雖顛沛必於是後事釋歸家為度遼將軍鄧遵所辟居無何遵被誅瑗免歸後, WYG: 病罷}
