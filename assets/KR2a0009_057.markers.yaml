  - {type: variant, offset: 245, length: 0, content: '', krp: 免歸後徴為太子少傅時大司徒侯覇欲與交友及丹被徴遣子昱候於道昱迎拜車下丹下荅之昱曰家公欲與君結交何為見拜丹曰君房有是言丹未之許也丹子有同門生喪親家在中山白丹欲往奔慰結侣將行丹怒而撻之東觀記曰丹怒撻之五十令寄縑以祠焉東觀記曰寄帛二匹以祠焉或問其故丹曰交道之難未易言也世稱管鮑次則王貢史記曰管夷吾潁上人嘗與鮑叔牙㳺叔牙知其賢管仲貧困嘗欺鮑叔牙鮑叔牙終善遇之管仲曰生我者父母知我者鮑叔前書王吉字子陽貢禹字少翁並瑯琊人也二人相善時人為之語王陽在位貢禹彈冠言其趣舍同也張陳凶其終蕭朱隙其末張耳陳餘初為刎頸交後搆隙耳後為漢將兵殺陳餘於泜水之上蕭育字次君朱博字子元二人為友著聞當代後有隙不終故時以交為難並見前書故知全之者鮮矣時人服其言客初有薦士於丹者因選舉之而後所舉者陷罪丹坐以免客慚懼自絶而丹終無所言尋復徴為太子太傅乃呼客謂曰子之自絶何量丹之薄也不為設食以罰之相待如舊其後遜位卒于家王良傳王良字仲子東海蘭陵人也少好學習小夏侯尚書夏侯建大夏侯勝之從兄子也建受尚書於勝號小夏侯見前書王莽時稱病不仕教授諸生千餘人建武二年大司馬吳漢辟不應}
  - {type: variant, offset: 247, length: 0, content: '', WYG: 徴拜諌議大夫數有忠言以禮進止朝廷敬之遷沛郡太守至蘄縣稱病不之府官屬皆隨就之良遂上疾篤乞骸骨徴拜太中大夫六年代宣秉為大司徒司直在位恭儉妻子不入官舍布被瓦器時司徒史鮑恢以事到東海過候其家而良妻布裙曵柴自田中歸東觀記曰徒跣曵柴恢告曰我司徒史也故来受書欲見夫人妻曰妾是也苦掾無書掾即謂鮑恢司徒之掾史也言勞苦相過更無書信恢乃下拜歎息而還聞者莫不嘉之後以病歸一歳復徴至滎陽疾篤不任進道乃過其友人友人不肯見曰不有忠言竒謀而取大位何其往来屑屑不憚煩也揚雄方言曰屑屑不安也秦晉曰屑屑郭景純曰往来貎遂拒之良慙自後連徴輙稱病詔以𤣥纁聘之遂不應後光武幸蘭陵遣使者問良所疾苦不能言對詔復其子孫邑中徭役卒於家論曰夫利仁者或借仁以從利體義者不期體以合義此言履行仁義其事雖同原其本心眞偽各異利仁者謂心非好仁但以行仁則於己有利故假借仁道以求利耳若天性自然體合仁義者舉措云為不期於體而㝠然自合禮記曰仁者安仁智者利仁畏罪者彊仁與人同功其仁未可知與人同過其仁則可知季文子妾不衣帛魯人以為羙談文子魯卿季孫行父之諡也無衣帛之妾無食粟之馬君子是以知季文子忠於公室相三君矣而無私積可不謂忠乎事見左傳公孫𢎞身服布被汲黯譏其多詐公孫𢎞淄川人也武帝時為丞相汲黯曰𢎞以三公而身服布被詐也事見前書事實未殊而譽毁别議何也將體之與利之異乎宣秉王良處位優重而秉甘疏薄良妻荷薪可謂行過乎儉然當世咨其清人君髙其節豈非臨之以誠哉語曰同言而信則信在言前同令而行則誠在令外不其然乎眞偽之跡既殊人之信否亦異同言而信謂體仁與利仁二人同出言而人信服其眞者不信其偽者則知信不由言故言信在言前也同令而行意亦同也此皆子思子累徳篇之言故稱語曰張湛不屑矜偽之誚斯不偽矣屑猶介也王丹難於交執之道斯知交矣杜林傳杜林字伯山扶風茂陵人也案杜鄴傳鄴本魏郡繁陽人也武帝時徙茂陵父鄴成哀間為凉州刺史林少好學沈深家既多書又外氏張竦父子喜文采鄴字子夏祖父皆至郡守鄴少孤其母張敞女也鄴從敞子吉學得其家書竦即吉之子也博學文雅過於敞見前書林從竦受學博洽多聞時稱通儒風俗通曰儒者區也言其區别古今居則玩聖哲之詞動則行典籍之道稽先王之制立當時之事此通儒也若能納而不能出能言而不能行講誦而已無能往来此俗儒也初為郡吏王莽敗盗賊起林與弟成及同郡范逡孟冀等逡音七倫反將細弱俱客河西道逢賊數千人遂掠取財裝禠奪衣服禠解也音直紙反拔刃向林等將欲殺之冀仰曰願一言而死將軍知天神乎言知天道有神乎赤眉兵衆百萬所向無前而殘賊不道卒至破敗今將軍以數千之衆欲規霸王之事}
