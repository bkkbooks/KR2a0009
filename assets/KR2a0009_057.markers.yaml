  - {type: variant, offset: 279, length: 0, content: '', WYG: 貫綜受業者百有餘人建和初四府表薦四府太尉司徒司空大將軍府也謝承書曰典性眀達志節清亮益州舉茂才以病辭太尉黄瓊胡廣舉有道方正皆不應桓帝公車徴對䇿為諸儒之表徵拜議郎侍講禁内再遷為侍}
