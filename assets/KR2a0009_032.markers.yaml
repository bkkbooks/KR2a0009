  - {type: variant, offset: 1138, length: 2, content: 夫離, WYG: 臣昭案始皇所過乃在錢塘富春豈近餘杭之界乎毘陵季札所居北江在北越絶曰縣南城古淹地上湖中冢者季子冢也名延陵墟皇覽曰暨陽鄉丹徒春秋曰朱方曲阿由拳左傳曰越敗吳于檇李杜預曰縣南醉李城也干寳搜神記曰秦始皇東廵望氣者云五百年後江東有天子氣始皇至令囚徒十萬人堀汙其地表以惡名故改之曰由拳縣安越絶曰有西岑冢越王孫開所立以備春申君使其子守之子死遂𦵏城中富春陽羨邑郭璞曰縣有張公山洞宻有二堂無錫侯國史記曰春申君城故吳墟以自為都邑城在無錫皇覽曰吳王太伯冢在吳縣北梅里聚去城十里太伯始所居地名句吳臣昭案無錫縣東皇山有太伯冡民世修敬焉去墓十里有舊宅井猶存臣昭以為即宅為置廟不如皇覽所説也越絶曰縣西龍尾陵}
