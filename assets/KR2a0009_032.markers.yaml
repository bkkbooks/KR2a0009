  - {type: variant, offset: 4, length: 0, content: '', krp: 三十二梁剡令劉昭補并注郡國志第二十二郡國四青州濟南齊國平原樂安北海東萊荆州南陽武陵南郡長沙江夏零陵桂陽揚州九江豫章丹陽廬江㑹稽吳郡濟南郡故齊文帝分雒陽東千八百里十城户七萬八千五百四十四口四十五萬三千三百八東平陵有鐵有譚城故譚國有天山著於陵杜預曰縣西北有于亭陳桓子以封齊公子周臺菅有賴亭左傳哀六年公如賴土鼓梁鄒鄒平東朝陽杜預曰縣西有崔城歴城有鐵有巨里聚耿弇破費敢處皇覽曰太甲有冢在歴山上平原郡髙帝置雒陽北一千三百里九城户十五萬五千五百八十八口百萬二千六百五十八平原地道記曰有篤馬河髙唐濕水出般鬲侯國夏時有鬲君滅浞立少康魏都賦注曰縣有蓋節淵三齊記曰城南有蒲臺髙八十尺秦始皇所頓處在臺下縈蒲繫馬今蒲猶縈者祝阿春秋時曰祝柯左傳哀十年取犂及轅杜預曰縣西有轅城故縣省有野井亭左傳昭二十五年齊侯唁公于野井杜預曰在縣東樂陵濕陰安徳侯國厭次本富平明帝更名樂安國髙帝西平昌置為千乗永元七年更名雒陽東千五百二十里九城户七萬四千四百口四十二萬四千七十五臨濟本狄安帝更名地道記曰狄伐衞懿公千乗髙苑樂安博昌有薄姑城古薄姑氏杜預曰薄姑地有貝中聚左傳齊侯田于貝丘杜預曰縣南有地名貝丘有時水左傳莊九年戰于乾時杜預曰時水在縣界岐流旱則竭涸故曰乾時蓼城侯國杜預曰縣東北有攝城利故屬齊益侯國故屬北海夀光故屬北海有灌亭古灌國北海國景帝置建武十三年有菑川髙宻膠東三國以其縣屬十八城户十五萬八千六百四十一口八十五萬三千六百四劇有紀亭古紀國營陵平夀有斟城杜預曰有斟亭古斟國故縣後省有寒亭古寒國浞封此都昌左傳莊元年齊遷紀之鄑城地道記曰鄑城在縣西安丘有渠丘亭地道記曰有渠丘城淳于永元九年復有宻鄉左傳隠二年紀莒盟宻故宻鄉在縣東北後省平昌侯國故屬琅邪有蔞鄉左傳昭五年莒牟夷以牟婁及防茲來奔杜預曰縣西南有防亭朱虚侯國故屬琅邪永初元年屬左傳莊元年齊遷紀郚杜預曰朱虚縣東南有郚城鄭志曰有小泰山公玉帶曰岐伯令黄帝封㤗山即此山也東安平故屬菑川六國時曰安平有酅亭故兆左傳莊三年紀季以酅入于齊地道記有羌頭山髙宻侯國昌安侯國安帝復夷安侯國安帝復膠東侯國即墨侯國有棠鄉左傳襄六年圍棠杜預曰棠國也壯武安帝復故夷國左傳隠元年紀伐夷下宻安帝復拒地道記曰養澤在西幽州藪有萊山萊王祠觀陽東萊郡髙帝置雒陽東三千二百二十八里十三城户十萬四千二百九十七口四十八萬四千三百九十三黄地道記曰縣東二百三十里至海中連岑有土道秦始皇登此山刻二碑東二百三十里有始皇漢武帝二碑牟平惤侯國地道記曰有百枝萊君祠三齊記曰南有蹲犬山似犬蹲有神劉寵出西都經此山山犬吠之寵曰山神謂我人也曲成侯國前書禱萬里沙在縣掖侯國有過鄉故過國當利侯國東牟侯國昌陽盧鄉長廣故屬琅邪黔陬侯國故屬琅邪有介亭左傳襄二十四年伐莒侵介根杜預曰縣東北計基城號介國葛盧有尤涉亭不期侯國故屬琅邪三齊記曰鄭𤣥教授不期山山下生草大如䪥葉長一尺餘堅韌異常土人名曰康成書帶齊國秦置雒陽東千八百里六城户六萬四千四百一十五口四十九萬一千七百六十五臨菑本齊刺史治爾雅十藪齊有海隅郭璞曰海濵廣斥左傳齊戌葵丘杜預曰在縣西皇覽曰吕尚冢往縣城南去縣十餘里在齊桓公冢南菑水南桓公冢西北有晏嬰冢孟子注曰南小山曰牛山博物記曰縣西有袁婁西安有棘里亭杜預曰在縣東陳桓子封子山有蘧丘里古渠丘昌國臨胊有三亭古郱邑左傳莊元年齊所徙杜預曰在縣東南應劭曰伯氏邑也地道記曰有石髙山廣般陽故屬濟南右青州刺史部郡國六縣六十五南陽郡秦置雒陽南七百里三十七城户五十二萬八千五百五十一口二百四十三萬九千六百一十八宛本申伯國荆州記曰郡城周三十六里博物記有申亭南都賦注曰有玉池澤陂有南就聚有𤓰里津東觀書鄧奉拒光武𤓰里有夕陽聚袁山松書曰賈復從擊鄧奉追至夕陽聚有東武亭冠軍邑葉有長山曰方城杜預曰方城山在縣南屈完曰楚國方城以為城皇覽曰縣西北去城三里葉公諸梁冢近縣祠之曰葉君丘有卷城左傳昭二十五年楚子使季然郭卷新野有東鄉故新都王莽封也有黄郵聚吳漢破秦豐地章陵故舂陵世祖更名古今注曰建武十八年使中郎將耿遵築城有上唐鄉前志曰故唐國下江兵荆州軍西鄂有精山朱儁破孫夏山海經曰有豐山神耕父處之常逰清泠之淵出入有光見即其國為敗有九鍾焉是知霜鳴郭璞曰清泠水在西鄂縣山上神來時水赤光耀今有屋祠也霜降則鍾鳴故言知也物有自然感應而不可為也南都賦注耕父旱鬼也皇覽曰王子朝冢在縣西雉博物記曰滍水出魯陽有魯山前志曰古魯縣南都賦注有堯山封劉累立堯祠有牛蘭累亭謝沈書云牛蘭山也犨堵陽博望舞陰邑比陽復陽侯國有杏聚平氏桐柏大復山淮水出前書曰在縣南荆州記曰桐柏淮源涌發其中潛流三十里東出大復山南山南有淮源廟博物記曰有陽山出紫草有宜秋聚伯升見下江兵棘陽荆州記曰東北百里有謝城有藍鄉伯升襲甄阜處有黄淳聚又伯升攻梁丘賜杜預曰蓼國在東南前志蓼國湖陽是湖陽邑荆州記曰樊重母畏雷為石室避之悉以文石為階今存隨古隨國西有斷蛇丘即䘖珠之蛇也杜預曰有賴亭左傳僖十五年齊伐厲在縣北帝王世紀曰神農氏起列山謂列山氏今隨厲鄉是也荆州記曰縣北界有重山山有一穴云是神農所生又有周廻一頃二十畝地外有兩重壍中有九井相傳神農既育九井自穿汲一井則衆井動即此地為神農社年常祠之育陽邑有小長安漢軍為甄阜所破處有東陽聚朱祐破張成處湼陽陰酇鄧有鄾聚左傳桓九年楚師圍鄾山都侯國酈侯國荆州記曰縣北八里有菊水其源旁悉芳菊水極甘馨又中有三十家不復穿井即飲此水上夀百二十三十中夀百餘七十者猶以為夭漢司空王暢太傅袁隗為南陽令縣月送三十餘石飲食澡浴悉用之太尉胡廣父患風羸南陽恒汲飲此水疾遂瘳此菊莖短葩大食之甘美異於餘菊廣又収其實種之京師遂處處傳植之穰朝陽南都賦陂澤有鉗盧注曰匡縣蔡陽侯國襄陽耆舊傳曰有松子亭下有神陂中多魚人捕不可得南都賦所稱安衆侯國博物記曰有土魯山出紫石英筑陽侯國有涉都鄉杜預曰穀國在縣北博物記曰今穀亭荆州記曰縣北四里有開林山西北有䪥山武當有和城聚荆州記曰縣有女思山南二百里有武當順陽侯國故博山有須聚成都襄鄉南鄉丹水故屬𢎞農南鄉丹水二縣有商城張儀與楚商於之地有章宻鄉有三户亭左傳哀四年晉執蠻子畀楚師析故屬𢎞農故楚白羽邑左傳昭十八年許遷于白羽有武關在縣西南都賦曰武關在其西文頴曰去縣百七十里有豐鄉城左傳哀四年司馬起豐析荆州記曰縣有龍淵深不測縣北有馬頭山南郡秦置雒陽南一千五百里十七城户十六萬二千五百七十口七十四萬七千六百四江陵史記曰楚熊渠立長子康為句亶王張瑩曰今江陵也皇覽曰孫叔敖冢在城中白土里有津鄉左傳莊十九年楚子大敗于津荆州記曰縣東三里餘有三湖湖東有水名長谷又西北有小城名曰冶父左傳曰莫敖縊于荒谷羣師囚于冶父縣北十餘里有紀南城楚王所都東南有郢城子囊所城史記蘇秦説楚威王楚東有夏州左傳楚莊伐陳鄉取一人以歸謂之夏州今夏口城有州名夏口巫西有白帝城郭璞曰有巫山秭歸本歸國杜預曰䕫國荆州記曰縣北一百里有屈平故宅方七頃累石為屋基今其地名樂平宅東北六十里有女須廟中廬侯國襄陽耆舊傳曰古廬戎也縣西山中有一道漢時常有數百匹馬出其中馬形皆小似巴滇馬三國時陸遜攻襄陽又值此穴中有數十匹馬出遜載還建業蜀使來有五部兵家滇池者識其馬色云亡父所乗對之流涕荆州記云是析縣馬頭山又縣南十五里有陵水東流注沔水中有物如馬甲如鮮鯉不可入七八月中好在磧上自曝膝頭似虎掌爪小兒不知欲取弄戲便殺人或曰生得者摘其鼻厭可小小便名為木盧編有藍口聚下江兵所據左傳鬪緡以權叛楚遷於那處杜預曰縣東南有那口城當陽杜預曰縣東有權城楚武王所尅荆州記曰縣東南有麥城城東有廬城沮水西有磨城伍子胥造此二城以攻麥城華容侯國雲夢澤在南杜預曰州國在縣東枝江縣有雲夢城江夏安陸縣東南有雲夢城或曰華容縣東南亦有雲夢巴丘湖江南之雲夢也爾雅十藪楚有雲夢郭璞曰巴丘湖是也襄陽有阿頭山岑彭破張楊襄陽耆舊傳曰縣西九里有方山父老傳云交甫所見玉女㳺處北山之下曲隈是也荆州記曰襄陽舊楚之北津從襄陽渡江經南陽出方關是周鄭晉衛之道其東津經江夏出平澤關是通陳蔡齊宋之道邔侯國有犂丘城朱祐禽秦豐蘇嶺山宜城侯國杜預曰縣西舊羅國後徙枝江鄀侯國永平元年復左傳楚文王伐黄還及湫杜預曰縣東南有湫城臨沮侯國有荆山山海經曰其陽多鉄其陰多赤金其東多牛荆州記曰西北三十里有清谿谿北即荆山首曰景山即卞和抱璞之處南都賦注曰漢水至荆山東别流為滄浪之水枝江侯國本羅國有丹陽聚史記曰秦齊破楚屈匄遂取丹陽夷道荆州記曰縣西北有宜陽山東南有羊腸山夷陵有荆門岑彭破田戎處虎牙山荆州記曰荆門江南虎牙江北虎牙有文如齒牙荆門上合下開州陵史記楚考烈王納州於秦佷山故屬武陵江夏郡髙帝置雒陽南千五百里十四城户五萬八千四百三十四口二十六萬五千四百六十四西陵西陽車犬侯國杜預曰古䢵國在東南有䢵城鄳史記曰無忌説魏安釐王曰秦不敢攻㝠阸之塞徐廣云即此縣也竟陵侯國有鄖鄉左傳桓十一年鄖人軍蒲騷立章山本内方荆州記曰山髙三十丈周廻百餘里縣東有申水左傳楚公子比為王次魚陂杜預曰在縣西北雲杜杜預曰縣東南有鄖城故國沙羨邾地道記曰楚滅邾徙其君此城下雉蘄春侯國鄂平春侯國南新市侯國案本傳有離鄉聚綠林安陸零陵郡武帝置雒陽南三千三百里十三城户二十一萬二千二百八十四口百萬一千五百七十八泉陵零陵陽朔山湘水出羅含湘中記曰有營水有洮水有雍水有祁水有宜水有春水有烝水有表水有來水有淥水有連水有倒水有偽水有泊水有資水皆注湘營道南有九疑山舜之所𦵏郭璞山海經注曰其山九谿皆相似故曰九疑湘州營陽郡記曰山下有舜祠故老相傳舜登九疑營浦滎陽郡記曰縣南三里餘有舜南廵止宿處今立廟泠道有舂陵鄉洮陽都梁有路山夫夷侯國故屬長沙始安侯國始安郡記曰縣東有駮樂山東有遼山重安侯國故鍾武永建三年更名湘鄉昭陽侯國荆州記縣東有余水傍有漁父廟烝陽侯國故屬長沙桂陽郡髙帝置上領山在雒陽南三千九百里十一城户十三萬五千}
