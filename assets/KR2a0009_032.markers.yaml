  - {type: variant, offset: 773, length: 346, content: 也伏念本朝躬聖德舉義兵龔行天罰所當必摧誠天之所福非人力也將軍本無尺土孤立一隅宜推誠奉順與朝并力上應天心下醻人望為國立功可以永年嫌疑之事聖人所絕以將軍之威重遠在千里動作舉措可不慎與今璽書數到委國歸信欲與將軍共同吉凶布衣相與尚有沒身不負然諾之信況於萬乘者哉今何畏何利久疑如是卒有非常之變上負忠孝下愧當世夫未至豫言固常為虛及其已至又無所及是以忠言至諫希得為用誠願反覆愚老之言囂不納遂畔從述建武七年詔書徵剛剛將歸與囂書曰愚聞專己者孤拒諫者塞孤塞之政亡國之風也雖有明聖之姿猶屈己從衆故慮無遺策舉無過事夫聖人不以獨見為明而以萬物為心順人者昌逆人者亡此古今之所共也將軍以布衣為鄉里所推廊廟之計既不豫定動軍發衆又不深料今東方政教日睦百姓平安而西州發兵人人懷憂騷動惶懼莫敢正言羣衆疑惑人懷顧望非徒無精銳之心其患, WYG: ''}
