  - {type: variant, offset: 1122, length: 0, content: '', WYG: 通號為地脉越絶書曰湖周三萬六千頃又有大雷山小雷山周處風土記曰舜漁澤之所臣昭案此僻在成陽是也又吳伐越敗之夫椒杜預曰太湖中椒山是也海鹽案今計偕簿縣之故治順帝時陷而為湖今謂為當湖大旱湖竭城郭之處可識烏程左傳襄三年楚伐吳}
