  - {type: variant, offset: 2993, length: 1836, content: 失母居喪過禮及長理韓詩嚴氏春秋明天文歷數王莽時寇賊羣發惲乃仰占玄象歎謂友人曰方今鎮歲熒惑並在漢分翼軫之域去而復來漢必再受命福歸有德如有順天發策者必成大功時左隊大夫逯並素好士惲說之曰當今上天垂象智者以昌愚者以亡昔伊尹自鬻輔商立功全人惲竊不遜敢希伊尹之蹤應天人之變明府儻不疑逆俾成天德並奇之使署為吏惲不謁曰昔文王拔呂尚於渭濱高宗禮傅說於巖築桓公取管仲於射鉤故能立弘烈就元勳未聞師相仲父而可為吏位也非闚天者不可與圖遠君不授驥以重任驥亦俛首裹足而去耳遂不受署西至長安乃上書王莽曰臣聞天地重其人惜其物故運機衡垂日月含元包一甄陶品類顯表紀世圖錄豫設漢歷久長孔為赤制不使愚惑殘人亂時智者順以成德愚者逆以取害神器有命不可虛獲上天垂戒欲悟陛下令就臣位轉禍為福劉氏享天永命陛下順節盛衰取之以天還之以天可謂知命矣若不早圖是不免於竊位也且堯舜不以天顯自與故禪天下陛下何貪非天顯以自累也天為陛下嚴父臣為陛下孝子父教不可廢子諫不可拒惟陛下留神莽大怒即收繫詔獄劾以大逆猶以惲據經讖難即害之使黃門近臣脅惲令自告狂病恍忽不覺所言惲乃瞋目詈曰所陳皆天文聖意非狂人所能造遂繫須冬會赦得出乃與同郡鄭敬南遁蒼梧建武三年又至廬江因遇積弩將軍傅俊東徇揚州俊素聞惲名乃禮請之上為將兵長史授以軍政惲乃誓衆曰無掩人不備窮人於戹不得斷人支體祼人形骸放淫婦女俊軍士猶發冢陳尸掠奪百姓惲諫俊曰昔文王不忍露白骨武王不以天下易一人之命故能獲天地之應剋商如林之旅將軍如何不師法文王而犯逆天地之禁多傷人害物虐及枯尸取罪神明今不謝天改政無以全命願將軍親率士卒收傷葬死哭所殘暴以明非將軍本意也從之百姓悅服所向皆下七年俊還京師而上論之惲恥以軍功取位遂辭歸鄉里縣令卑身崇禮請以為門下掾惲友人董子張者父先為鄉人所害及子張病將終惲往候之子張垂歿視惲歔欷不能言惲曰吾知子不悲天命而痛讎不復也子在吾憂而不手子亡吾手而不憂也子張但目擊而已惲即起將客遮仇人取其頭以示子張子張見而氣絕惲因而詣縣以狀自首令應之惲曰為友報讎吏之私也奉法不阿君之義也虧君以生非臣節也趨出就獄令跣而追惲不及遂自至獄令拔刃自向以要惲曰子不從我出敢以死明心惲得此乃出因病去久之太守歐陽歙請為功曹汝南舊俗十月饗會百里內縣皆齎牛酒到府讌飲時臨饗禮訖歙教曰西部督郵繇延天資忠貞稟性公方摧破姦凶不嚴而理今與衆儒共論延功顯之于朝太守敬嘉厥休牛酒養德主簿讀書教戶曹引延受賜惲於下坐愀然前曰司正舉觥以君之罪告謝于天案延資性貪邪外方內員朋黨搆姦罔上害人所在荒亂怨慝並作明府以惡為善股肱以直從曲此既無君又復無臣惲敢再拜奉觥歙色慙動不知所言門下掾鄭敬進曰君明臣直功曹言切明府德也可無受觥哉歙意少解曰實歙罪也敬奉觥惲乃免冠謝曰昔虞舜輔堯四罪咸服讒言弗庸孔任不行故能作股肱帝用有歌惲不忠孔任是昭豺虎從政既陷誹謗又露所言罪莫重焉請收惲延以明好惡歙曰是重吾過也遂不讌而罷惲歸府稱病延亦自退鄭敬素與惲厚見其言忤歙乃相招去曰子廷爭繇延君猶不納延今雖去其埶必還直心無諱誠三代之道然道不同者不相為謀吾不能忍見子有不容君之危盍去之乎惲曰孟軻以彊其君之所不能為忠量其君之所不能為賊惲業已彊之矣障君於朝既有其直而不死職罪也延退而惲又去不可敬乃獨隱於弋陽山中居數月歙果復召延惲於是乃去從敬止漁釣自娛留數十日惲志在從政既乃喟然而歎謂敬曰天生俊士以為人也烏獸不可與同羣子從我為伊呂乎將為巢許而父老堯舜乎敬曰吾足矣初從生步重華於南野謂來歸為松子今幸得全軀樹類還奉墳墓盡學問道雖不從政施之有政是亦為政也吾年耄矣安得從子子勉正性命勿勞神以害生惲於是告別而去敬字次都清志高世光武連徵不到惲遂客居江夏教授郡舉孝廉為上東城門候帝嘗出獵車駕夜還惲拒關不開帝令從者見面於門閒惲曰火明遼遠遂不受詔帝乃迴從東中門入明日惲上書諫曰昔文王不敢槃于游田以萬人惟憂而陛下遠獵山林夜以繼晝其如社禝宗廟何暴虎馮河未至之戒誠小臣所竊憂也書奏賜布百匹貶東中門候為參封尉後令惲授皇太子韓詩侍講殿中及郭皇后廢惲乃言於帝曰臣聞夫婦之好父不能得之於子況臣能得之於君乎是臣所不敢言雖然願陛下念其可否之計無令天下有議社稷而已帝曰惲善恕己量主知我必不有所左右而輕天下也后既廢而太子意不自安惲乃說太子曰久處疑位上違孝道下近危殆昔高宗明君吉甫賢臣及有纖介放逐孝子春秋之義母以子貴太子宜因左右及諸皇子引愆退身奉養母氏以明聖教不背所生太子從之帝竟聽許惲再遷長沙太守先是長沙有孝子古初遭父喪未葬鄰人失火初匍匐柩上以身扞火火為之滅惲甄異之以為首舉後坐事左轉芒長又免歸避地教授著書八篇以病卒子壽壽字伯, WYG: ''}
