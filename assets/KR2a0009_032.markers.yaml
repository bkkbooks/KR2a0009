  - {type: variant, offset: 33, length: 1, content: 祖, WYG: 紀曰禹㑹諸侯塗山皇覽曰楚大夫子思冢在縣東山鄉西去縣四十里子思造芍陂全椒鍾離侯國阜陵下蔡故屬沛左傳成七年吳入州來杜預曰下蔡縣平阿故屬沛有塗山應劭云山在當塗左傳穆有塗山之㑹義成故屬沛丹陽郡秦鄣郡武帝更名雒陽東二千一百六十里建安十三年孫權分新都郡十六城户十三萬六千五百一十八口六十三萬五百四十五宛陵溧陽丹陽故鄣秦鄣郡所治吳興記曰中平年分縣南置安吉縣光和末張角亂此鄉守險助國漢}
