  - {type: variant, offset: 4830, length: 648, content: 善文章以廉能稱舉孝廉稍遷冀州刺史時冀部屬郡多封諸王賓客放縱類不檢節壽案察之無所容貸乃使部從事專住王國又徙督郵舍王宮外動靜失得即時騎驛言上奏王罪及劾傅相於是藩國畏懼並為遵節視事三年冀土肅清三遷尚書令朝廷每有疑議常獨進見肅宗奇其智策擢為京兆尹郡多彊豪姦暴不禁三輔素聞壽在冀州皆懷震竦各相檢勑莫敢干犯壽雖威嚴而推誠下吏皆願効死莫有欺者以公事免復徵為尚書僕射是時大將軍竇憲以外戚之寵威傾天下憲嘗使門生齎書詣壽有所請託壽即送詔獄前後上書陳憲驕恣引王莽以誡國家是時憲征匈奴海內供其役費而憲及其弟篤景並起第宅驕奢非法百姓苦之壽以府臧空虛軍旅未休遂因朝會譏刺憲等厲音正色辭旨甚切憲怒陷壽以買公田誹謗下吏當誅侍御史何敞上疏理之曰臣聞聖王闢四門開四聰延直言之路下不諱之詔立敢諫之旗聽歌謠於路爭臣七人以自鑒照考知政理違失人心輒改更之故天人並應傳福無窮臣伏見尚書僕射郅壽坐於臺上與諸尚書論擊匈奴言議過差及上書請買公田遂繫獄考劾大不敬臣愚以為壽機密近臣匡救為職若懷默不言其罪當誅今壽違衆正議以安宗廟豈其私邪又臺閣平事分爭可否雖唐虞之隆三代之盛猶謂諤諤以昌不以誹謗為罪請買公田人情細過可裁隱忍壽若被誅臣恐天下以為國家橫罪忠直賊傷和氣忤逆陰陽臣所以敢犯嚴威不避夷滅觸死瞽言非為壽也忠臣盡節以死為歸臣雖不知壽度其甘心安之誠不欲聖朝行誹謗之誅以傷晏晏之化杜塞忠直垂譏無窮臣敞謬豫機密言所不宜罪名明白當填牢獄先壽僵仆萬死有餘書奏壽得減死論徙合浦未行自殺家屬得歸鄉里贊曰鮑永沈吟晚乃歸正志達義全先號後慶申屠對策郅惲上書有道雖直無道不愚, WYG: 證}
