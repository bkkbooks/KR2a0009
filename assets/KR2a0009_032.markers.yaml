  - {type: variant, offset: 739, length: 6, content: 及隗囂據隴右, WYG: 立遂昌縣東陽記縣龍丘山有九石特秀林表色丹白逺望盡如蓮花龍丘長隠居於此因以為名其峯際復有巖穴外如忩牖中有石床巖前有一桃樹其實甚甘非山中自有莫知誰植上虞漢末分南鄉立始寜縣剡餘姚句章山海經曰餘句之山無草木多金玉郭璞曰山在餘姚南句章北故二縣因以為名句踐}
