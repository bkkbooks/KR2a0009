  - {type: variant, offset: 96, length: 293, content: 策曰之君曠然覺悟懷邪之臣懼然自刻者也今朝廷不考功校德而虛納毀譽數下詔書張設重法抑斷誹謗禁割論議罪之重者乃至斬傷忠臣之情挫直士之銳殆乖建進善之旌縣敢諫之鼓闢四門之路明四目之義也地舉措不失然近則召公不悅遠則四國流言夫子母之性天道至親今聖主幼少始免繈緥即位以來至親分離外戚杜隔恩不得通且漢家之制雖任英賢猶援姻戚親疏相錯杜塞閒𨻶誠所以安宗廟重社稷也今馮衞無罪久廢不錄或處窮僻不若民庶誠非慈愛忠孝承上之意夫為人後者自有正義至尊至卑其埶不嫌是以人無賢愚莫不為怨姦臣賊子以之為便不諱之變誠難其慮今之保傅非古之周公周公至聖猶尚有累何況事失其衷不合天心者哉昔周公先遣伯禽守封於魯以義割恩寵不加後故配天郊祀, WYG: 小江山去小江}
