  - {type: variant, offset: 2716, length: 275, content: 年有成今陛下始踐天位刑政未著如有失得何能致異但臣前在汝南典理楚事繫者千餘人恐未能盡當其罪先帝詔言大獄一起冤者過半又諸徙者骨肉離分孤魂不祀一人呼嗟王政為虧宜一切還諸徙家屬蠲除禁錮興滅繼絕死生獲所如此和氣可致帝納其言四年代牟融為太尉六年薨年七十餘子德修志節有名稱累官為南陽太守時歲多荒災唯南陽豐穰吏人愛悅號為神父時郡學久廢德乃修起橫舍備俎豆黻冕行禮奏樂又尊饗國老宴會諸儒百姓觀者莫不勸服在職九年徵拜大司農卒于官子昂字叔雅有孝義節行初德被病數年昂俯伏左右衣不緩帶及處喪毀瘠三年抱負乃行服闋遂潛于墓次不關時務舉孝廉辟公府連徵不至卒於家郅惲字君章汝南西平人也年, WYG: ''}
