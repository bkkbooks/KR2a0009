  - {type: variant, offset: 29, length: 0, content: '', WYG: 魏氏春秋曰劉備在荆州所都改曰公安零陽充沅陵先有壺頭山馬援軍渡處有松梁山山有石開處數十丈其上名曰天門辰陽酉陽遷陵鐔成沅南建武二十六年置作唐長沙郡秦置雒陽南二千八百里十三城户二十五萬五千八百五十四口百五萬九千三百七十二臨湘攸茶陵安城酃荆州記曰有酃湖周廻三里取湖水為酒酒極甘美湘東記曰縣西南母山周廻四百里湘南侯國衡山在東南郭璞曰山别名岣嶁湘中記曰衡山有玉牒禹案其文以治水遥望衡山如陣雲㳂湘千里九向九背廼不復見連道昭陵益陽荆州記曰縣南十里有平岡岡有金井數百淺者四五尺深者不測俗傳云有金}
