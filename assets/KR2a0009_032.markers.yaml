  - {type: variant, offset: 16, length: 1, content: 第, WYG: 曰晉代太守趙厥問主簿潘京曰貴郡何以名武陵京曰鄙郡本名義陵在辰陽縣界與夷相接為所攻破光武時移東出遂得見全先識易號傳曰止戈為武髙平曰陵於是改名焉臣昭案前書本名武陵不知此對何據而出荆州記曰郡社中木麃樹是光武種至今也}
