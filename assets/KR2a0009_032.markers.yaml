  - {type: variant, offset: 746, length: 5, content: 背漢而附公, WYG: 遷吳王於甬東韋昭曰縣東洲鄞章安故治閩越地光武更名晉元康記曰本鄞縣南之廻浦鄉章帝章和元年立未詳永寧永和三年以章安縣東甌鄉為縣東部侯國吳郡順帝分㑹稽置雒陽東三千二百里十三城户十六萬四千一百六十四口七十萬七百八十二吳本國越絶曰吳大城闔閭所造周四十七里二百一十步二尺又有伍子胥城居巢城昌門外闔閭冢虎丘穹窿赤松子所取赤石脂也去縣二十里有鹿湖麗谿城又石城闔閭置美山虞山巫咸山皇覽曰縣東門外}
