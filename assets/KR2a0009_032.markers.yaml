  - {type: variant, offset: 1141, length: 4, content: 德逆人情, WYG: 春申君初封吳所造臣昭案今見在自是山名非築陵道婁豫章郡髙帝置雒陽南二千七百里二十一城户四十萬六千四百九十六口百六十六萬八千九百六豫章記曰新吳上蔡永脩縣並中平立豫章縣建安立上蔡民分徙此地立名上蔡南昌豫章記曰江淮唯此縣及吳臨湘三縣是也建城此地立名上蔡者豫章記曰縣有葛鄉有石炭二頃可燃以㸑新淦宜春廬陵興平元年孫策分立廬陵郡贛有豫章水雩都南野有臺領山南城鄱陽有鄱水黄金采建安十五年孫權分立鄱陽郡治縣歴陵有傅昜山餘汗鄡陽彭澤彭蠡澤在西柴桑艾左傳哀二十年吳公子慶忌所居海昏侯國在昌邑城豫章記曰城東十三里縣列江邊名慨口出豫章大江之口也昌邑王每乗流東望輙憤慨}
