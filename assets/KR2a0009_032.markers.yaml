  - {type: variant, offset: 1477, length: 374, content: 諫陳興復漢室翦滅篡逆之策諫每戒永曰君長幾事不密禍倚人門永感其言及諫卒自送喪歸扶風路平遂收永弟升太守趙興到聞乃歎曰我受漢茅土不能立節而鮑宣死之豈可害其子也勑縣出升復署永功曹時有矯稱侍中止傳舍者興欲謁之永疑其詐諫不聽而出興遂駕往永乃拔佩刀截馬當匈乃止後數日莽詔書果下捕矯稱者永由是知名舉秀才不應更始二年徵再遷尚書僕射行大將軍事持節將兵安集河東并州朔部得自置偏裨輒行軍法永至河東因擊青犢大破之更始封為中陽侯永雖為將率而車服敝素為道路所識時赤眉害更始三輔道絕光武即位遣諫議大夫儲大伯持節徵永詣行在所永疑不從乃收繫大伯遣使馳至長安既知更始已亡乃發喪出大伯等封上將軍列侯印綬悉罷兵但幅巾與諸將及同心客百餘人詣河內帝見永問曰卿衆所在永離席叩頭曰臣事更始不能令全誠慙以其衆幸富貴故悉罷之帝曰卿言大而意不悅時攻懷未拔帝謂永曰我攻懷三日而兵不下關東畏服卿可且將故人自往, WYG: ''}
