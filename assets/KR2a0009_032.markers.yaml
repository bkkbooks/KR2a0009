  - {type: variant, offset: 449, length: 9, content: 任以此思化則功何不, WYG: 廬而命焉其山大嶺凡七重圓基周廻垂三五百里其南嶺臨宫亭湖下有神廟七嶺㑹同莫升之者東南有香爐山其上氛氲若香煙西南中石門前有雙闕壁立千餘仞而瀑布流焉其中鳥獸草木之美靈藥方林之竒所稱名代豫章舊志匡俗字君平夏禹之苗裔也潛左傳曰昭三十一年吳人侵楚伐夷侵潛六楚沈尹戍帥師救潛是也潛有天柱山臨湖侯國龍舒侯國襄安皖有鐵居巢侯國皇覽曰范増冢在郭東又庭中亞父井吏民皆祭亞父於居巢庭上長吏初視事皆祭而後從政後更造祠於東廣志曰有二大湖六安國皇覧曰臯陶冢在縣蓼侯國安豐有大别山左傳昭二十三年吳敗諸侯之師于雞父杜預曰縣南有雞備亭陽泉侯國廣志曰有陽泉湖安風侯國㑹稽郡秦置本治吳立郡吳乃移山隂雒陽東三千八百里十四城户十二萬三千九十口四十八萬一千一百九十六山陰越絶曰句踐小城山陰是也稷山有句踐齋戒臺吳越春秋曰句踐築城已成怪山自}
