  - {type: 'tls:seg', offset: 1819, content: '', id: KR2a0009_ZHSJ_050-d50p12s10}
  - {type: variant, offset: 1821, length: 1047, content: 胡廣等追表其有清絜之美比前朝貢禹第五倫未蒙顯贈當時皆嗟歎之彭弟湯字仲河少傳家學諸儒稱其節多歷顯位桓帝初為司空以豫議定策封安國亭侯食邑五百戶累遷司徒太尉以灾異策免卒謚曰康侯湯長子成左中郎將早卒次子逢嗣逢字周陽以累世三公子寬厚篤信著稱於時靈帝立逢以太僕豫議增封三百戶後為司空卒於執金吾朝廷以逢嘗為三老特優禮之賜以珠畫特詔祕器飯含珠玉二十六品使五官中郎將持節奉策贈以車騎將軍印綬加號特進謚曰宣文侯子基嗣位至太僕逢弟隗少歷顯官先逢為三公時中常侍袁赦隗之宗也用事於中以逢隗世宰相家推崇以為外援故袁氏貴寵於世富奢甚不與它公族同獻帝初隗為太傳成子紹逢子術自有傳董卓忿紹術背己遂誅隗及術兄基男女二十餘人敞字叔平少傳易經教授以父任為太子舍人和帝時歷位將軍大夫侍中出為東郡太守徵拜太僕光祿勳元初三年代劉愷為司空明年坐子與尚書郎張俊交通漏洩省中語策免敞廉勁不阿權貴失鄧氏旨遂自殺張俊者蜀郡人有才能與兄龕並為尚書郎年少勵鋒氣郎朱濟丁盛立行不脩俊欲舉奏之二人聞恐因郎陳重雷義往請俊俊不聽因共私賂侍史使求俊短得其私書與敞子遂封上之皆下獄當死俊自獄中占獄吏上書自訟書奏而俊獄已報廷尉將出穀門臨行刑鄧太后詔馳騎以減死論俊假名上書謝曰臣孤恩負義自陷重刑情斷意訖無所復望廷尉鞠遣歐刀在前棺絮在後魂魄飛揚形容已枯陛下聖澤以臣嘗在近密識其狀貌傷其眼目留心曲慮特加徧覆喪車復還白骨更肉披棺發椁起見白日天地父母能生臣俊不能使臣俊當死復生陛下德過天地恩重父母誠非臣俊破碎骸骨舉宗腐爛所報萬一臣俊徒也不得上書不勝去死就生驚喜踊躍觸冒拜章當時皆哀其文朝廷由此薄敞罪而隱其死以三公禮葬之復其官子盱盱後至光祿勳時大將軍梁冀朝內外莫不阿附唯盱與廷尉邯鄲義正身自守及桓帝誅冀使盱持節收其印綬事已具梁冀傳閎字夏甫彭之孫也少勵操行苦身脩節父賀為彭城相閎往省謁變名姓徒行無旅既至府門連日吏不為通會阿母出見閎驚入白夫人乃密呼見既而辭去賀遣車送之閎稱眩疾不肯乘反郡界無知者及賀卒郡閎兄弟迎喪不受賻贈縗絰扶柩冒犯寒露禮貌枯毀手足血流見者莫不傷之服闋累徵聘舉召皆不應居處仄陋以耕學為業從父逢隗並貴盛數饋之無所受閎見時方險亂而家門富盛常對兄弟歎曰吾先公福祚後世不能以德守之而競為驕奢與亂世爭權此即晉之三郤矣延熹末黨事將作閎遂散髮絕世欲投迹深林以母老不宜遠遁乃築土室四周於庭不為戶自牖納飲食而已旦於室中東向拜母母思閎時往就視母去便自掩閉兄弟妻子莫得見也及母歿不為制服設位時莫能名或以為狂生潛身十八年黃巾賊起攻沒郡縣百姓驚散閎誦經不移賊相約語不入其閭卿人就閎避難皆得全免年, WYG: 卷}
