  - {type: variant, offset: 14, length: 0, content: '', krp: 十銚期傳銚期字次況潁川郟人也長八尺二寸容貌絶異矜嚴有威父猛為桂陽太守卒期服喪}
  - {type: variant, offset: 15, length: 0, content: '', WYG: 年鄕里稱之光武略地潁川聞期志義召署賊曹掾漢官儀曰東西曹掾比四百石餘掾比三百石賊曹主盜賊之事從徇薊時王郎檄書到薊薊中起兵應郎光武趣駕出百姓聚觀諠呼滿道遮路不得行期騎馬奮㦸瞋目大呼左右曰䟆周禮𨽻僕掌蹕宮中之事鄭衆曰止行清道也若今警蹕說文䟆與蹕同衆皆披靡披普彼反及至城門門已閉攻之得出行至信都以期為裨將與傅寛呂晏俱屬鄧禹徇傍縣又發房子兵禹以期為能獨拜偏將軍授兵二千人寛晏各數百人還言其狀光武甚善之使期别徇眞定宋子攻㧞樂陽槀肥纍樂陽縣名屬常山郡今恒州槀城縣也故城在縣西肥纍故肥子國也漢以為縣故城在今槀城縣西南並屬眞定國纍音力追反從擊王郎將兒宏劉奉於鉅鹿下兒音五奚反期先登陷陳手殺五}
