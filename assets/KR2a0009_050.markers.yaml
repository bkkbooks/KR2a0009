  - {type: variant, offset: 4891, length: 1091, content: 令與僕射郅壽尚書陳寵同時俱以才能稱肅宗嘗賜諸尚書劒唯此三人特以寶劒自手署其名曰韓棱楚龍淵郅壽蜀漢文陳寵濟南椎成時論者為之說以棱淵深有謀故得龍淵壽明達有文章故得漢文寵敦朴善不見外故得椎成和帝即位侍中竇憲使人刺殺齊殤王子都鄉侯暢於上東門有司畏憲咸委疑於暢兄弟詔遣侍御史之齊案其事棱上疏以為賊在京師不宜捨近問遠恐為姦臣所笑竇太后怒以切責棱棱固執其議及事發果如所言憲惶恐白太后求出擊北匈奴以贖罪棱復上疏諫太后不從及憲有功還為大將軍威震天下復出屯武威會帝西祠園陵詔憲與車駕會長安及憲至尚書以下議欲拜之伏稱萬歲棱正色曰夫上交不諂下交不黷禮無人臣稱萬歲之制議者皆慙而止尚書左丞王龍私奏記上牛酒於憲棱舉奏龍論為城旦棱在朝數薦舉良吏應順呂章周紆等皆有名當時及竇氏敗棱典案其事深竟黨與數月不休沐帝以為憂國忘家賜布三百匹遷南陽太守特聽棱得過家上冢鄉里以為榮棱發擿姦盜郡中震慄政號嚴平數歲徵入為太僕九年冬代張奮為司空明年薨子輔安帝時至趙相棱孫演順帝時為丹陽太守政有能名桓帝時為司徒大將軍梁冀被誅演坐阿黨抵罪以減死論遣歸本郡後復徵拜司隸校尉周榮字平孫廬江舒人也肅宗時舉明經辟司徒袁安府安數與論議甚器之及安舉奏竇景及與竇憲爭立北單于事皆榮所具草竇氏客太尉掾徐齮深惡之脅榮曰子為袁公腹心之謀排奏竇氏竇氏悍士刺客滿城中謹備之矣榮曰榮江淮孤生蒙先帝大恩以歷宰二城今復得備宰士縱為竇氏所害誠所甘心故常勑妻子若卒遇飛禍無得殯斂冀以區區腐身覺悟朝廷及竇氏敗榮由此顯名自郾令擢為尚書令出為潁川太守坐法當下獄和帝思榮忠節左轉共令歲餘復以為山陽太守所歷郡縣皆見稱紀以老病乞身卒于家詔特賜錢二十萬除子男興為郎中興少有名譽永寧中尚書陳忠上疏薦興曰臣伏惟古者帝王有所號令言必弘雅辭必溫麗垂於後世列於典經故仲尼嘉唐虞之文章從周室之郁郁臣竊見光祿郎周興孝友之行著於閨門清厲之志聞於州里蘊匵古今博物多聞三墳之篇五典之策無所不覽屬文著辭有可觀採尚書出納帝命為王喉舌臣等既愚闇而諸郎多文俗吏鮮有雅才每為詔文宣示內外轉相求請或以不能而專己自由辭多鄙固興抱奇懷能隨輩栖誠可歎惜詔乃拜興為尚書郎卒興子景景字仲饗辟大將軍梁冀府稍遷豫州刺史河內太守好賢愛士其拔才薦善常恐不及每至歲時延請舉吏入上後堂與共宴會如此數四乃遣之贈送什物無不充備既而選其父兄子弟事相優異常稱曰臣子同貫若之何不厚先是司徒韓演在河內志在無私舉吏當行一辭而已恩亦不及其家曰我舉若可矣豈可令徧積一門故當時論者議此二人景後徵入為將作大匠及梁冀誅景以故吏免官禁錮朝廷以景素著忠正頃之復引拜尚書令遷太僕衛尉六年代劉寵為司空是時宦官任人及子弟充塞列位景初視事與太尉楊秉舉奏諸姦猾自將軍牧守以下免者, WYG: 卷}
