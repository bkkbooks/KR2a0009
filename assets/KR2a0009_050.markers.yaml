  - {type: variant, offset: 128, length: 0, content: '', krp: 不知有軍言不侵擾清名聞於海内廉白著於當世所得賞賜輙盡與吏士身無竒衣家無私財同產兄午以遵無子娶妾送之遵乃使人逆而不受自以身任於國不敢圖生慮繼嗣之計臨死遺誡牛車載喪薄葬洛陽問以家事終無所言任重道遠死而後已遵為將軍取士皆用儒術對酒設樂必雅歌投壺雅歌謂歌雅詩也禮記投壺經曰壺頸脩七寸腹脩五寸口徑二寸半容斗五升壺中實小豆焉為其矢之躍而出也矢以柘若棘長二尺八寸無去其皮取其堅而重投之勝者飲不勝者以為優劣也又建為孔子立後奏置五經大夫雖在軍旅不忘爼豆可謂好禮悅樂守死善道者也禮生有爵死有諡爵以殊尊卑諡以明善惡臣愚以為宜因遵薨論叙衆功詳案諡法以禮成之諡法周書之篇周公制焉顯章國家篤古之制為後嗣法帝乃下升章以示公卿至葬車駕復臨贈以將軍侯印綬朱輪容車介士軍陳送葬容車容飾之車象生時也介士甲士也東觀記曰遣校尉發騎士四百人被𤣥甲兠鍪兵車軍陳送葬諡曰成侯既葬車駕復臨其墳存見夫人室家其後㑹朝帝每歎曰安得憂國奉公之臣如祭征虜者乎遵之見思如此東觀記曰上數嗟嘆衞尉銚期見上感慟對曰陛下至仁哀念祭遵不已羣臣各懷慚懼也無子國除兄午官至酒泉太守從弟彤彤字次孫早孤以至孝見稱遇天下亂野無烟火而獨在冢側每賊過見其尚㓜而有志節皆竒而哀之光武初以遵故拜彤為黃門侍郎常在左右及遵卒無子帝追傷之以彤為偃師長令近遵墳墓四時奉祠之彤有權略視事五歲縣無盜賊課為第一遷襄賁令襄賁縣名屬東海郡故城在今沂州臨沂縣南賁音肥時天下郡國尚未悉平襄賁盜賊白日公行彤至誅破姦猾殄其支黨數年襄賁政清璽書勉勵增秩一等賜縑百匹當是時匈奴鮮卑及赤山烏桓連和彊盛數入塞殺略吏人朝廷以為憂益增緣邊兵郡有數千人又遣諸將分屯障塞帝以彤為能建武十七年拜遼東太守至則勵兵馬廣斥候彤有勇力能貫三百斤弓虜每犯塞常為士卒鋒數破走之二十一年秋鮮卑萬餘騎寇遼東彤率數千人迎擊之自被甲陷陳虜大奔投水死者過半遂窮追出塞虜急皆棄兵裸身散走斬首三千餘級獲馬數千匹自是後鮮卑震怖畏彤不敢復闚塞彤以三虜連和卒為邊害卒終也三虜謂匈奴鮮卑及赤山烏桓二十五年乃使招呼鮮卑示以財利其大都䕶偏何鮮卑名也遣使奉獻願得歸化彤慰納賞賜稍復親附其異種滿離高句驪之屬遂駱驛欵塞上貂裘好馬帝輒倍其賞賜其後偏何邑落諸豪並歸義願自効彤曰審欲立功當歸擊匈奴斬送頭首乃信耳偏何等皆仰天指心曰必自効即擊匈奴左伊衭訾部斬首二千餘級持頭詣郡其後歲歲相攻輒送首級受賞賜自是匈奴衰弱邊無寇警鮮卑烏桓並入朝貢彤為人質厚重毅體貌絶衆撫夷狄以恩信皆}
