  - {type: variant, offset: 53, length: 2, content: 安少, WYG: 舍中兒犯法遵格殺之光武怒命收遵時主簿陳副諫曰明公常欲衆軍整齊今遵奉法不避是教令所行也光武乃貰之貰猶赦也以為刺姦將軍謂諸將曰當備祭遵吾舍中兒犯法尚殺之必不私諸卿也尋拜為偏將軍從平河北以功封列侯建武二年春拜征虜將軍定封潁陽侯與驃騎大將軍景丹建義大將軍朱祐漢忠將軍王常騎都尉王梁臧宮等入箕關箕關解在鄧禹}
