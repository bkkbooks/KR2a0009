  - {type: variant, offset: 15, length: 0, content: '', krp: 年鄕里稱之光武略地潁川聞期志義召署賊曹掾漢官儀曰東西曹掾比四百石餘掾比三百石賊曹主盜賊之事從徇薊時王郎檄書到薊薊中起兵應郎光武趣駕出百姓聚觀諠呼滿道遮路不得行期騎馬奮㦸瞋目大呼左右曰䟆周禮𨽻僕掌蹕宮中之事鄭衆曰止行清道也若今警蹕說文䟆與蹕同衆皆披靡披普彼反及至城門門已閉攻之得出行至信都以期為裨將與傅寛呂晏俱屬鄧禹徇傍縣又發房子兵禹以期為能獨拜偏將軍授兵二千人寛晏各數百人還言其狀光武甚善之使期别徇眞定宋子攻㧞樂陽槀肥纍樂陽縣名屬常山郡今恒州槀城縣也故城在縣西肥纍故肥子國也漢以為縣故城在今槀城縣西南並屬眞定國纍音力追反從擊王郎將兒宏劉奉於鉅鹿下兒音五奚反期先登陷陳手殺五}
  - {type: variant, offset: 16, length: 2, content: 五袁, WYG: 餘人被創中額攝幩復戰攝猶正也劉攽曰按幩為馬扇汗期被創中額則是幘字遂大破之王郎滅拜期虎牙大將軍乃因間說光武曰河北之地界接邊塞人習兵戰號為精勇今更始失政大統危殆海内無所歸往明公據河山之固擁精銳之衆以順萬人思漢之心則天下誰敢不從光武笑曰卿欲遂前䟆邪唯天子得稱警蹕時銅馬數十萬衆入清陽博平博平縣名屬東郡在今博州縣也期與諸將迎擊之連戰不利期乃更背水而戰所殺傷甚多㑹光武救至遂大破之追至館陶皆降之從擊青犢赤眉於射犬賊襲期輜重期還擊之手殺傷數十人身被三創而戰方力力苦戰也遂破走之光武即位封}
