  - {type: variant, offset: 5984, length: 199, content: 餘人遂連及中常侍防東侯覽東武陽侯具瑗皆坐黜朝廷莫不稱之視事二年以地震策免歲餘復代陳蕃為太尉建寧元年薨以豫議定策立靈帝追封安陽鄉侯長子崇嗣至甘陵相中子忠少歷列位累遷大司農忠子暉前為洛陽令去官歸兄弟好賓客雄江淮閒出入從車常百餘乘及帝崩暉聞京師不安來候忠董卓聞而惡之使兵劫殺其兄弟忠後代皇甫嵩為太尉錄尚書事以災異免復為衛尉從獻帝東歸洛陽贊曰袁公持重誠單所奉惟德不忘延世承寵孟侯經博侍言帝幙棱榮事君志同鸇雀, WYG: 考證}
