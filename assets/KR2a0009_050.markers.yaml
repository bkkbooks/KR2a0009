  - {type: variant, offset: 81, length: 1, content: 因, WYG: 東觀記曰時下宣帝臨霍將軍儀令公卿讀視以為故事詔大長秋謁者河南尹護喪事大司農給費博士范升上疏追稱遵曰臣聞先王崇政尊美屏惡昔高祖大聖深見遠慮班爵割地與下分功著錄勲臣頌其德美生則寵以殊禮奏事不名入門不趨前書曰蕭何奏事不名入門不趨死則疇其爵邑世無絶嗣疇等也言功臣死後子孫襲封世世與先人等丹書鐵劵傳於無窮前書高祖與功臣剖符作誓丹書鐵契金匱石室藏之宗廟斯誠大漢厚下}
