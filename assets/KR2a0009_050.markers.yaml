  - {type: variant, offset: 2940, length: 1788, content: 朗徒從整飾心嫌之遂稱病自絕後孫策破會稽忠等浮海南投交阯獻帝都許徵為衞尉未到卒弘字邵甫恥其門族貴埶乃變姓名徒步師門不應徵辟終於家忠子祕為郡門下議生黃巾起祕從太守趙謙擊之軍敗祕與功曹封觀等七人以身扞刃皆死於陳謙以得免詔祕等門閭號曰七賢封觀者有志節當舉孝廉以兄名位未顯恥先受之遂稱風疾喑不能言火起觀屋徐出避之忍而不告後數年兄得舉觀乃稱損而仕郡焉論曰陳平多陰謀而知其後必廢邴吉有陰德夏侯勝識其當封及子孫終陳掌不侯而邴昌紹國雖有不類未可致詰其大致歸然矣袁公竇氏之閒乃情帝室引義雅正可謂王臣之烈及其理楚獄未嘗鞫人於臧罪其仁心足以覃乎後昆子孫之盛不亦宜乎張酺字孟侯汝南細陽人趙王張敖之後也敖子壽封細陽之池陽鄉後廢因家焉酺少從祖父充受尚書能傳其業又事太常桓榮勤力不怠聚徒以百數永平九年顯宗為四姓小侯開學於南宮置五經師酺以尚書教授數講於御前以論難當意除為郎賜車馬衣裳遂令入授皇太子酺為人質直守經義每侍講閒𨻶數有匡正之辭以嚴見憚及肅宗即位擢酺為侍中虎賁中郎將數月出為東郡太守酺自以嘗經親近未悟見出意不自得上疏辭曰臣愚以經術給事左右少不更職不曉文法猥當剖符典郡班政千里必有負恩辱位之咎臣竊私自分殊不慮出城闕冀蒙留恩託備官羣僚所不安耳目所聞見不敢避好醜詔報曰經云身雖在外乃心不離王室典城臨民益所以報效也好醜必上不在遠近今賜裝錢三十萬其亟之官酺雖儒者而性剛斷下車擢用義勇搏擊豪彊長安有殺盜徒者酺輒案之以為令長受臧猶不至死盜徒皆飢寒傭保何足窮其法乎郡吏王青者祖父翁與前太守翟義起兵攻王莽及義敗餘衆悉降翁獨守節力戰莽遂燔燒之父隆建武初為都尉功曹青為小史與父俱從都尉行縣道遇賊隆以身衞全都尉遂死於難青亦被矢貫咽音聲流喝前郡守以青身有金夷竟不能舉酺見之歎息曰豈有一門忠義而爵賞不及乎遂擢用極右曹乃上疏薦青三世死節宜蒙顯異奏下三公由此為司空所辟自酺出後帝每見諸王師傅常言張酺前入侍講屢有諫正誾誾惻惻出於誠心可謂有史魚之風矣元和二年東巡狩幸東郡引酺及門生並郡縣掾史並會庭中帝先備弟子之儀使酺講尚書一篇然後脩君臣之禮賞賜殊特莫不沾洽酺視事十五年和帝初遷魏郡太守郡人鄭據時為司隸校尉奏免執金吾竇景景後復位遣掾夏猛私謝酺曰鄭據小人為所侵冤聞其兒為吏放縱狼藉取是曹子一人足以驚百酺大怒即收猛繫獄檄言執金吾府疑猛與據子不平矯稱卿意以報私讎會有贖罪令猛乃得出頃之徵入為河南尹竇景家人復擊傷市卒吏捕得之景怒遣緹騎侯海等五百人歐傷市丞酺部吏楊章等窮究正海罪徙朔方景忿怨乃移書辟章等六人為執金吾吏欲因報之章等惶恐入白酺願自引臧罪以辭景命酺即上言其狀竇太后詔報自今執金吾辟吏皆勿遣及竇氏敗酺乃上疏曰臣實愚惷不及大體以為竇氏雖伏厥辜而罪刑未著後世不見其事但聞其誅非所以垂示國典貽之將來宜下理官與天下平之方憲等寵貴羣臣阿附唯恐不及皆言憲受顧命之託懷伊呂之忠至乃復比鄧夫人於文母今嚴威既行皆言當死不復顧其前後考折厥衷臣伏見夏陽侯瓌每存忠善前與臣言常有盡節之心檢勑賓客未嘗犯法臣聞王政骨肉之刑有三宥之義過厚不過薄今議者為瓌選嚴能相恐其迫切必不完免宜裁加貸宥以崇厚德和帝感酺言徙瓌封就國而己永元五年遷酺為太僕數月代尹睦為太尉數上疏以疾乞身薦魏郡太守徐防自代帝不許使中黃門問病加以珍羞賜錢三十萬酺遂稱篤時子蕃以郎侍講帝因令小黃門勑蕃曰陰陽不和萬人失所朝廷望公思惟得失與國同心而託病自絜求去重任誰當與吾同憂責者非有望於斷金也司徒固疾司空年老公其傴僂勿露所勑酺惶恐詣闕謝還復視事酺雖在公位而父常居田里酺每有遷職輒一詣京師嘗來候酺適會歲節公卿罷朝俱詣酺府奉酒上壽極歡卒日衆人皆慶羨之及父卒既葬詔遣使齎牛酒為釋服後以事與司隸校尉晏稱會於朝堂酺從容謂稱曰三府辟吏多非其人稱歸即奏令三府各實其掾史酺本以私言不意稱奏之甚懷恨會復共謝闕下酺因責讓於稱稱辭言不順酺怒遂廷叱之稱乃劾奏酺有怨言天子以酺先帝師有詔公卿博士朝臣會議司徒呂蓋奏酺位居三司知公門有儀不屏氣鞠躬以須詔命反作色大言怨讓使臣不可以示四遠於是策免酺歸里舍謝遣諸生閉門不通賓客左中郎將何敞及言事者多訟酺公忠帝亦雅重之十五六年復拜為光祿勳數月代魯恭為司徒月餘薨乘輿縞素臨弔賜冢塋地賵贈恩寵異於它相酺病臨危勑其子曰顯節陵埽地露祭欲率天下以儉吾為三公既不能宣揚王化令吏人從制豈可不務節約乎其無起祠堂可作蓋廡施祭其下而已曾孫濟好儒學光和中至司空病罷及卒靈帝以舊恩贈車騎將軍關內侯印綬其年追濟侍講有勞封子根為蔡陽, WYG: ''}
