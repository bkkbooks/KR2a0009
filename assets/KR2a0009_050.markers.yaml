  - {type: variant, offset: 74, length: 0, content: '', WYG: 孟厷執豐降說文曰厷臂上也厷音古𢎞反初豐好方術有道士言豐當為天子以五綵囊裹石繫豐肘云石中有玉璽豐信之遂反既執當斬猶曰肘石有玉璽遵為椎破之豐乃知被詐仰天歎曰當死無恨諸將皆引還遵受詔留屯良鄉拒彭寵因遣護軍傅𤣥襲擊寵將李豪於潞大破之斬首千餘級相拒歲餘數挫其鋒黨與多降者及寵死遵進定其地六年春詔遵與建威大將軍耿弇虎牙大將軍蓋延漢忠將軍王常捕虜將軍馬武驍騎將軍劉歆武威將軍劉尚等從天水伐公孫述續漢書曰上幸廣陽城門設祖道閲過諸將以遵新破漁陽令最在前師次長安時車駕亦至而隗囂不欲漢兵上隴辭說解故解故謂解脫事故以為辭說帝召諸將議皆曰可且延囂日月之期益封其將帥以消散之遵曰囂挾姦久矣今若按甲引時則使其詐謀益深而蜀警備增固不如遂進帝從之乃遣遵為前行隗囂使其將王元拒隴坻遵進擊破之追至新關及諸將到與囂戰並敗引退下隴乃詔遵軍汧耿弇軍漆征西大將軍馮異軍栒邑大司馬吳漢等還屯長安自是後遵數挫囂事已見馮異傳八年秋復從車駕上隴及囂破帝東歸過汧幸遵營勞饗士卒作黃門武樂良夜乃罷黃門署名前書曰是時名倡皆集黃門武樂執干戚以舞也良猶深也夜或作久時遵有疾詔賜重茵覆以御蓋復令進屯隴下及公孫述遣兵救囂吳漢耿弇等悉奔還遵獨留不郤東觀記曰時遵屯汧詔書曰將軍連年距難衆兵即郤復獨按部功勞爛然兵退無宿戒糧食不豫具今乃調度恐力不堪國家知將軍不易亦不遺力今送縑千匹以賜吏士九年春卒於軍遵為人廉約小心克己}
