  - {type: variant, offset: 75, length: 3, content: 檄詣從, WYG: 公賞賜輙盡與士卒家無私財身衣韋絝布被夫人裳不加緣帝以是重焉緣或作綵及卒愍悼之尤甚遵喪至河南縣詔遣百官先會喪所車駕素服臨之望哭哀慟還幸城門過其車騎東觀記曰上還幸城門閲過喪車瞻望涕泣涕泣不能己喪禮成復親祠以太牢如宣帝臨霍光故}
