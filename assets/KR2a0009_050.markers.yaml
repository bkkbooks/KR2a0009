  - {type: variant, offset: 4756, length: 134, content: 也世為鄉里著姓父尋建武中為隴西太守棱四歲而孤養母弟以孝友稱及壯推先父餘財數百萬與從昆弟鄉里益高之初為郡功曹太守葛興中風病不能聽政棱陰代興視事出入二年令無違者興子嘗發教欲署吏棱拒執不從因令怨者章之事下案驗吏以棱掩蔽興病專典郡職遂致禁錮顯宗知其忠後詔特原之由是徵辟五遷為尚, WYG: 漢}
