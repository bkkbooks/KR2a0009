  - {type: variant, offset: 83, length: 1, content: 致, WYG: 人長久之德所以累世十餘歴載數百漢興至此二百餘年言數百者謂以百數之廢而復興絶而復續者也陛下以至德受命先明漢道劉攽曰按文當作光明襃序輔佐封賞功臣同符祖宗征虜將軍潁陽侯遵不幸早薨陛下仁恩為之感傷遠近河南惻怛之慟形於聖躬喪事用度仰給縣官重賜妻子不可勝數送死有以加生厚亡有以過存矯俗厲化卓如日月卓高也古者臣疾君視臣卒君弔前}
