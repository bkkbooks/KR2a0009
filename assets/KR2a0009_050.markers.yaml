  - {type: variant, offset: 63, length: 0, content: '', WYG: 霍陽山故名焉俗謂之張侯城在今汝州西南遵乃分兵擊破降之明年春張滿饑困城㧞生獲之初滿祭祀天地自云當王既執歎曰䜟文誤我乃斬之夷其妻子遵引兵南擊鄧奉弟終於杜衍破之杜衍縣名屬河南郡故城在今鄧州南陽縣西南時涿郡太守張豐執使者舉兵反自稱無上大將軍與彭寵連兵四年遵與朱祐及建}
