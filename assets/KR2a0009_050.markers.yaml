  - {type: variant, offset: 640, length: 371, content: 太尉宋由司空任隗及九卿詣朝堂上書諫以為匈奴不犯邊塞而無故勞師遠涉損費國用徼功萬里非社稷之計書連上輒寢宋由懼遂不敢復署議而諸卿稍自引止唯安獨與任隗守正不移至免冠朝堂固爭者十上太后不聽衆皆為之危懼安正色自若竇憲既出而弟衛尉篤執金吾景各專威權公於京師使客遮道奪人財物景又使乘驛施檄緣邊諸郡發突騎及善騎射有才力者漁陽鴈門上谷三郡各遣吏將送詣景第有司畏憚莫敢言者安乃劾景發邊兵驚惑吏人二千石不待符信而輒承景檄當伏顯誅又奏司隸校尉河南尹阿附貴戚無盡節之義請免官案罪並寢不報憲景等日益橫盡樹其親黨賓客於名都大郡皆賦斂吏人更相賂遺其餘州郡亦復望風從之安與任隗舉奏諸二千石又它所連及貶秩免官者四十餘人竇氏大恨但安隗素行高亦未有以害之時竇憲復出屯武威明年北單于為耿夔所破遁走烏孫塞北地空餘部不知所屬憲日矜己功欲結恩北虜乃上立降者左鹿蠡王阿佟為北單于置中郎將領護如, WYG: ''}
