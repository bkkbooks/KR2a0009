  - {type: variant, offset: 48, length: 0, content: '', WYG: 二年更封富波侯富波縣名屬汝南郡在今豫州四年秋帝幸譙使霸與捕虜將軍馬武東討周建於垂惠蘇茂將五校兵四千餘人救建而先遣精騎遮擊馬武軍糧武往救之建從城中出兵夾擊武武恃霸之援戰不甚力為茂建所敗武軍奔過霸營大呼求救霸曰賊兵盛出必兩敗努力而已乃閉營堅壁軍吏皆爭之霸曰茂兵精銳其衆又多吾吏士心恐而捕虜與吾相恃兩軍不一此敗道也今閉營固守示不相援賊必乘勝輕進捕虜無救其戰自倍如此茂衆疲勞吾承其弊乃可剋也茂建果悉出攻武合戰良久霸軍中壯士路潤等數十人斷髪請戰霸知士心銳乃開營後出精騎襲其背茂建前後受敵驚亂敗走霸武各歸營賊復聚衆挑戰霸堅卧不出方饗士作倡樂茂雨射營中中霸前酒樽安坐不動軍吏皆曰茂前日已破今易擊也霸曰不然蘇茂客兵遠來糧食不足故數挑戰以徼一切之勝徼要也一切猶權時也今閉營休士所謂不戰而屈人之兵善之善者也茂建既不得戰乃引還營其夜建兄子誦反閉城拒之茂建遁去誦以城降五年春帝使太中大夫持節拜霸為討虜將軍六年屯田新安八年屯田函谷關擊滎陽中牟盜賊皆平之九年霸與吳漢及横野大將軍王常建義大將軍朱祐破姦將軍侯進等五萬餘人擊盧芳將賈覽閔堪於高柳匈奴遣騎助芳漢軍遇雨戰不利吳漢還洛陽令朱祐屯常山王常屯涿郡侯進屯漁陽璽書拜霸上谷太守領屯兵如故捕擊胡虜無拘郡界拘猶限也明年霸復與吳漢等四將軍六萬人出高柳擊賈覽詔霸與漁陽太守陳訢將兵為諸軍鋒匈奴左南將軍將數千騎救覽霸等連戰於平城下破之追出塞斬首數百級霸及諸將還入鴈門與驃騎大將軍杜茂㑹攻盧芳將尹由於崞繁畤不剋崞與繁畤皆縣名屬鴈門郡並今代州縣也有崞山焉崞音郭十三年增邑户更封向侯向縣名屬沛郡左傳曰莒人入向按今密州莒縣南又有向城是時盧芳與匈奴烏桓連兵寇盜尤數緣邊愁苦詔霸將㢮刑徒六千餘人與杜茂治飛狐道飛狐道在今蔚州飛狐縣北通媯州懷戎縣即古之飛狐口也堆石布土築起亭障自代至平城三百餘里凡與匈奴烏桓大小數十百戰頗識邊事數上書言宜與匈奴結和親又陳委輸可從温水漕水經注曰溫餘水出上谷居庸關東又東過軍都縣南又東過薊縣北益通以運漕也以省陸轉輸之勞事皆施行後南單于烏桓降服北邊無事霸在上谷二十餘歲三十年定封淮陵侯淮陵縣屬臨淮郡永平二年以病免後數月卒子符嗣徙封􅋴侯􅋴縣名屬江夏郡􅋴音犬符卒子度嗣度尚顯宗女浚儀長公主為黃門郎度卒子歆嗣祭遵傳従弟彤祭遵字弟孫祭音側界反潁川潁陽人也少好經書家富給而遵恭儉惡衣服喪母負土起墳嘗為部吏所侵結客殺之}
