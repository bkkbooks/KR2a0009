  - {type: variant, offset: 28, length: 0, content: '', WYG: 世好文法東觀記曰}
  - {type: variant, offset: 28, length: 0, content: '', krp: 世好文法東觀記曰}
  - {type: variant, offset: 30, length: 5, content: 良習孟氏易, WYG: 為詔獄丞父為郡決曹掾漢官儀決曹主罪法事霸亦少為獄吏常慷慨不樂吏職其父奇之遣西學長安漢兵起光武過潁陽霸率賔客上謁曰將軍興義兵竊不自知量貪慕威德願充行伍光武曰夢想賢士共成功業豈有二哉遂從擊破王尋王邑於昆陽還休鄕里及光武為司𨽻校尉道過潁陽霸請其父願從父曰吾老矣不任軍旅汝往勉之霸從至洛陽及光武為大司馬以霸為功曹令史劉攽曰按功曹有史耳不當有令字從度河北賔客從霸者數十人稍稍引去光武謂霸曰潁川從我者皆逝而子獨留努力疾風知勁草及王郎起光武在薊郎移檄購光武光武令霸至市中募人將以擊郎市人皆大笑舉手邪揄之說文曰歋􅕆手相笑也歋音弋支反􅕆音踰或音由此云邪揄語輕重不同霸慚懅而還懅亦慙也音遽光武即南馳至下曲陽傳聞王郎兵在後從者皆恐及至滹沱河候吏還白河水流澌澌音斯無船不可濟官屬大懼光武令霸往視之霸恐驚衆欲且前阻水還即詭曰冰堅可度官屬皆喜光武笑曰候吏果妄語也遂前比至河河冰亦合乃令霸護度堅護度也未畢數騎而冰解光武謂霸曰安吾衆得濟免者卿之力也霸謝曰此明公至德神靈之祐雖武王白魚之應無以加此今文尚書曰武王度盟津白魚躍入王舟光武謂官屬曰王霸權以濟事殆天瑞也以為軍正爵關内侯既至信都發兵攻㧞邯鄲霸追斬王郎得其璽綬封王鄉侯從}
