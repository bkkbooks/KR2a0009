  - {type: variant, offset: 24, length: 0, content: '', WYG: 郡故城在今豫州}
  - {type: variant, offset: 24, length: 0, content: '', krp: 郡故城在今豫州}
  - {type: variant, offset: 25, length: 0, content: '', WYG: 陽縣東南也食邑五千户時檀鄉五樓賊入繁陽内黃繁陽縣名故城在今相州内黃縣東北内黃故城在西北又魏郡大姓數反覆而更始將卓京京或作原謀欲相率反鄴城帝以期為魏郡太守行大將軍事期發郡兵擊卓京破之斬首六百餘級京亡入山追斬其將校數十人獲京妻子進擊繁陽内黃復斬數百級郡界清平督盜賊李熊鄴中之豪而熊弟陸謀欲反城迎檀鄉反音翻或以告期期不應告者三四期乃召問熊熊叩頭首服願與老母俱就死期曰為吏儻不若為賊樂者可歸與老母往就陸也必以在城中為吏不如為賊之樂即任將母往就弟使吏送出城熊行求得陸將詣鄴城西門陸不勝愧感自殺以謝期期嗟嘆以禮葬之而還熊故職於是郡中服其威信建武五年行幸魏郡以期為太中大夫從還洛陽又拜衞尉期重於信義自為將有所降下未嘗虜掠及在朝廷憂國愛主其有不得於心必犯顏諫諍帝嘗輕與期門近出前書武帝將出必與北地良家子期於殿門故曰期門期頓首車前曰臣聞古今之戒變生不意誠不願陛下微行數出帝為之回輿而還十年卒東觀記曰期疾病使使者存問加賜醫藥甚厚其母問期當封何子期言受國家恩深常慙負如死不知當何以報國何宜封子也上甚憐之帝親臨襚歛贈以衞尉安成侯印綬諡曰忠侯子丹嗣復封丹弟統為建平侯建平縣名屬沛郡故城在今亳州酇縣西北一名馬頭城後徙封丹葛陵侯葛陵縣名故城在汝南故鮦陽縣也丹卒子舒嗣舒卒子羽嗣羽卒子蔡嗣王霸傳王霸字元伯潁川潁}
