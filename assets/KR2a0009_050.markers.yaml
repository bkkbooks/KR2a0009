  - {type: variant, offset: 56, length: 2, content: 良學, WYG: 南擊𢎞農厭新栢華蠻中賊東觀記曰栢華聚也弩中遵口洞出流血衆見遵傷稍引退遵呼叱止之士卒戰皆自倍遂大破之時新城蠻中山賊張滿新城縣名屬河南郡今伊闕縣也屯結險隘}
