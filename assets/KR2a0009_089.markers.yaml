  - {type: variant, offset: 1627, length: 325, content: 所失也是以君子之於事也無適無莫必考之以義焉焉酸苦以劑其味君子食之以平其心同如水焉若以水濟水誰能食之琴瑟之專一誰能聽之是以君子之行周而不比和而不同以救過為正以匡惡為忠經曰將順其美匡救其惡則上下和睦能相親也師不穀之罪也若以宗廟之靈得保首領以歿請為靈若厲大夫許諸及其卒也子囊曰不然夫事君者從其善不從其過赫赫楚國而君臨之撫正南海訓及諸夏其寵大矣有是寵也而知其過可不謂恭乎大夫從之此違而得道者也及靈王驕淫暴虐無度芋尹申亥從王之欲以殯於乾溪殉之二女此順而失義者也鄢陵之役晉楚對戰陽穀獻酒子反以斃此愛而害之者也臧武仲曰孟孫之惡我藥石也季孫之愛我美疢也疢毒滋厚石猶生我此惡而為美者也孔子曰智之難也有臧武仲之智而不容於魯國抑有由也作不順而施不恕也蓋善其知義譏其違道也智, WYG: 既頽惜八索}
