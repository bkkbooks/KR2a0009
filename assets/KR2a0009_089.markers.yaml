  - {type: variant, offset: 1965, length: 309, content: 智及之仁不能守之雖得之必失之也夏書曰念茲在茲庶事恕施忠智之謂矣道則兄弟不阿苟得其義雖仇讎不廢故解狐蒙祁奚之薦二叔被周公之害勃鞮以逆文為成傅瑕以順厲為敗管蘇以憎忤取進申侯以愛從見退考之以義也故曰不在逆順以義為斷不在憎愛以道為貴禮記曰愛而知其惡憎而知其善考義之謂也桓帝時舉孝廉除北新城長告縣人曰昔文翁在蜀道著巴漢庚桑瑣隸風移碨磥吾雖小宰猶有社稷苟赴期會理文墨豈本志乎乃更大作講舍延聚生徒數百人朝夕自往勸誡身執經卷試策殿最儒化大行此邑至後猶稱其教焉特召入拜尚書郎累遷後為野王令未行光和中病卒孫楨亦以文才知名邊讓字文禮陳留浚儀人也少辯博能屬文作章華賦雖多淫麗之辭而終之以正亦如相如之諷也其辭曰隩南眺巫山之阿延目廣望騁觀終日顧謂, WYG: 楚}
