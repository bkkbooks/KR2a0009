  - {type: variant, offset: 4815, length: 227, content: 恣言操懷忿而以其才名不欲殺之聞衡善擊鼓乃召為鼓史因大會賓客閱試音節諸史過者皆令脫其故衣更著岑牟單絞之服次至衡衡方為漁陽參撾蹀而前容態有異聲節悲壯聽者莫不慷慨衡進至操前而止吏訶之曰鼓史何不改裝而輕敢進乎衡曰諾於是先解衵衣次釋餘服裸身而立徐取岑牟單絞而著之畢復參撾而去顏色不怍操笑曰本欲辱衡衡反辱孤孔融退而數之曰正平大雅固當爾邪因宣操區區之意衡許往融復見操說衡狂疾今求得自謝操喜勑門者有客便通待之極晏衡乃著布單衣疎巾手持三尺梲杖坐大營門以杖捶地大罵吏白外有狂, WYG: ''}
