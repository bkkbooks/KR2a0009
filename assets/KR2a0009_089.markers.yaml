  - {type: variant, offset: 4725, length: 1, content: 必, WYG: 九奏左傳鄭荘公賦大隧之中其樂也融融姜出賦大隧之外其樂也洩洩肜與融同也考理亂於律鈞兮意建始而思終詩序曰太平之音安以樂其政和亂世之音怨以怒其政乖律十二律也樂叶圖徴曰聖人承天以立均宋均注曰均長八尺施絃以調六律也建立也衡言聽九奏之樂考政化之得失而思其終始也惟盤逸之無斁兮懼樂往而哀來盤樂也逸縱也斁厭也音亦又音徒故反古度字也莊子曰樂未畢也哀又繼之素撫弦而餘音兮大容吟曰念哉素素女也史記曰太常使素女鼔五十弦琴大容黄帝樂師也念哉戒逸樂也既防溢而靜志兮迨我暇以翺翔溢滿也迨及也翺翔將逺逝也出紫宫之肅肅兮集太微之閬閬紫宫太㣲並星名也肅肅清也閬閬明大也命王良掌策駟兮踰高閣之鏘鏘史記曰天駟旁一星曰王良髙閣閣道星也史記曰絶漢抵營室曰閣道鏘鏘髙貌也建罔車之幕幕兮獵青林之芒芒罔車畢星也幕幕罔貌青林天苑也彎威弧之撥剌兮射嶓冢之封狼弧星名也易曰弧矢之利以威天下撥音方割反剌音力逹反撥剌張弓貌也嶓冢山也封大也狼星名河圗曰嶓冢之精上為狼星觀壁壘於北落兮伐河鼓之磅硠壁東壁也史記曰羽林天軍西為壁壘旁大星為北落牽牛北為河鼔磅硠聲也磅音普郎反硠音郎乘天潢之汎汎兮浮雲漢之湯湯史記曰王良旁}
