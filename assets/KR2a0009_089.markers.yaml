  - {type: variant, offset: 2874, length: 0, content: '', krp: 於塗山執玉帛者萬國國語仲尼曰昔禹致羣神於㑹稽之山防風氏後至禹殺而戮之客曰敢問誰為神仲尼曰山川之守足以紀綱天下者其守為神食言謂後至也爾雅曰食偽也指長沙以邪徑兮存重華乎南鄰長沙今潭州也從稽山西南向長沙故云邪徑存猶問也重華舜名𦵏於蒼梧在長沙南故云南鄰也哀二妃之未從兮翩儐處彼湘瀕二妃舜妻堯女娥皇女英翩連翩也擯棄也瀕水涯也劉向列女傳曰舜陟方死於蒼梧二妃死於江湘之間俗謂之湘君湘夫人也禮記云舜葬蒼梧二妃不從也流目覜夫衡阿兮睹有黎之圯墳痛火正之無懷兮託山陂以孤魂衡阿衡山之曲也黎顓頊之子祝融也為髙辛氏之火正葬於衡山圯毁也盛𢎞之荆州記云衡山南有南正重黎墓楚靈王時山崩毁其墳得營丘九頭圖焉愁蔚蔚以}
  - {type: variant, offset: 2875, length: 0, content: '', WYG: 逺兮越卬州而愉敖河圖曰天有九部八紀地有九州八柱東南神州曰晨土正南卬州曰深土西南戎州曰滔土正西弇州曰开土正中冀州曰白土西北柱州曰肥土北方𤣥州曰成土東北咸州曰隐土正東揚州曰信土愉樂也敖遊也躋日中于昆吾兮憩炎天之所陶淮南子曰日至于昆吾是謂正中髙誘注云昆吾丘名在南方憩息也東方翔神異經曰南方有火山長四十里廣四五里晝夜火然陶猶炎熾也揚芒熛而絳天兮水泫沄而涌濤芒光芒也字林曰熛飛火也音必遥反泫音胡犬反沄音户昆反並水流貌也溫風翕其增熱兮惄鬱邑其難聊温風炎風也淮南子曰南方之極自北户之外南至委火炎風之野二萬二千里惄音奴覿反爾雅曰惄思也顝羈旅而無友兮余安能乎留兹顝獨也音苦骨反不能留此將復西行也顧金天而歎息兮吾欲往乎西嬉金天氏西方之帝少皥也嬉戲也前祝融使舉麾兮纚朱鳥以承旗纚繫也音山綺反朱鳥鳯也楚辭曰鳯凰翼其承旗也躔建木於廣都兮拓若華而躊躇躔次也拓猶折也淮南子曰建木在廣都若木在建木西木有十日其華照地山海經曰廣都之野后稷葬焉楚辭曰折若木以拂日躊躇猶徘徊也躊音直流反躇音直余反超軒轅於西海兮跨汪氏之龍魚聞此國之千歲兮曾焉足以娛余山海經曰軒轅之國在窮山之際其下夀者八百嵗龍魚在其北一曰蝦魚有神巫乗此以行九野一曰鱉魚在汪野北其為魚也如鯉魚白人之國在龍魚北也思九土之殊風兮從蓐收而遂徂九土九州也蓐收西方神也徂徃也欲還中土也歘神化而蟬蛻兮朋精粹而為徒歘疾貌也音許勿反蜕音税説文曰蟬蜕所觧皮也言去故就新若蟬蜕也朋猶侣也精粹羙也劉攽曰注案文當云蜕蝉所解皮也蹶白門而東馳兮云台行乎中野蹶音厥鄭𤣥注禮記云蹶行遽之貌也淮南子曰自東北方曰方土之山曰蒼門東方曰東極之山曰開明之門東南方曰波母之山曰陽門南方曰南極之山曰暑門西南方曰編駒之山曰白門西方曰西極之山曰閶闔之門西北方曰不周之山曰幽都之門北方曰北極之山曰寒門凡八極之雲是雨天下八門之風是節寒暑爾雅曰台我也野協韻音神渚反亂弱水之潺湲兮逗華隂之湍渚正絶流曰亂山海經曰崑崙之丘其下有弱水之川環之注云其水不勝鳥毛潺湲流貎也逗止也華隂華山之北也臨河故云湍渚號馮夷俾清津兮櫂龍舟以濟予號呼也聖賢塜墓記曰馮夷者𢎞農華隂潼鄉隄首里人服八石得水仙為河伯龍魚河圖曰河伯姓吕名公子夫人姓馮名夷俾使也清靜也津濟度處静之使無波濤也櫂檝也淮南子曰龍舟鷁首浮吹以虞予我也劉攽曰注為河伯龍魚案文伯下當有一字未詳或云是主字會帝軒之未歸兮悵相佯而延佇帝軒黄帝也鑄鼎於湖在今湖城縣與河華相近未歸謂黄帝得仙升天神靈未歸相佯猶徘徊也呬河林之蓁蓁兮偉關雎之戒女呬音許吏反爾雅曰呬息也蓁蓁茂盛貌山海經云北望河林其状如蒨偉羙也詩國風曰關闗雎鳩在河之洲窈窕淑女君子好仇衡覩河洲而思之也黄靈詹而訪命兮摎天道其焉如黄靈黄帝神也爾雅曰詹至也訪謀也摎求也曰近信而逺疑兮六籍闕而不書曰黄帝答言六籍六經也神逵昧其難覆兮疇克謨而從諸逵道也爾雅曰覆審也疇誰也謨謀也牛哀病而成虎兮雖逢昆其必噬昆兄也淮南子曰昔公牛哀病七日化而為虎其兄覘之虎搏而殺之不知其兄也鼈令殪而尸亡兮取蜀禪而引世鼈令蜀王名也令音靈殪死也禪傳位也引長也揚雄蜀王本紀曰荆人鼈令死其尸流亡随江水上至成都見蜀王杜宇杜宇立以為相杜宇號望帝自以徳不如鼈令以其國禅之號開明帝下至五代有開眀尚始去帝號復稱王也死生錯而不齊兮雖司命其不晰錯交錯也司命天神也春秋佐助期曰司命神名為滅黨長八尺小鼻望羊多髭癯瘦通於命運期度晰眀也協韻音之逝反竇號行於代路兮後膺祚而繁廡竇謂孝文竇皇后也繁廡茂盛也吕太后時出宫人以賜諸王竇姬家近清河願如趙近家遺宦者吏必置我趙伍中宦者忘之誤置代伍中姬涕泣不欲徃相強乃行至代代王獨幸竇姬生景帝後立為皇后景帝生十四子後至光武中興也王肆侈於漢庭兮卒銜恤而絶緒王謂孝平王皇后莽之女也前書聘以黄金二萬斤遣劉歆奉乗輿法駕迎后于第及莽簒位后嘗稱疾不朝㑹莽誅后自投火中而死恤憂也詩小雅曰出則銜恤絶緒言無後也尉尨眉而郎潛兮逮三葉而遘武尉謂都尉顔駟也尨蒼雜色遘遇也漢武故事曰上至郎署見一老郎鬢眉皓白問何時為郎何其老也對曰臣姓顔名駟以文帝時為郎文帝好文而臣好武景帝好老而臣尚少陛下好少而臣已老是以三葉不遇也上感其言擢為㑹稽都尉也董弱冠而司衮兮設王隧而弗處董賢字聖卿哀帝時為大司馬年二十衮三公服也時哀帝命為賢起冡至尊無以加及帝崩王莽殺賢於獄中左傳曰晉侯請隧曰王章也禮記曰二十曰弱冠也夫吉凶之相仍兮恒反側而靡所穆負天以悅牛兮豎亂叔而幽主穆魯大夫叔孫豹也謚曰穆牛謂豎牛豹之子也幽閉也大夫稱主左傳曰叔孫豹奔齊宿於庚宗遇婦人而私焉至齊夢天壓已弗勝顧而見人號之曰牛助余乃勝之及後還魯庚宗之婦人獻以雉曰余子長矣召而見之則所夢也遂使為豎有寵及穆子遇疾豎牛欲亂其室曰夫子疾病不欲見人牛不進食穆子遂餓而死文斷袪而忌伯兮閹謁賊而寧后文晉文公也祛􅃑也忌怨也伯謂伯楚也謁告也賊謂吕甥冀芮等寧安也后文公也初晉獻公使寺人勃鞮伐公於蒲城公踰垣勃鞮斬其祛及公入國吕甥冀芮謀作亂伯楚知之以告公公㑹秦伯于王城殺吕郄伯楚勃鞮字也事見國語通人闇於好惡兮豈愛惑之能剖通人謂穆子文公等闇於好惡謂初悦豎牛後以餓死始怨勃鞮終能告賊剖分也言通人尚闇於好惡况愛寵昏惑者豈能分之嬴擿讖而戒胡兮備諸外而發内嬴秦姓也摘猶發也謂始皇發讖云亡秦者胡乃使䝉恬北築長城以為外備而不知胡亥竟為趙髙所殺秦氏遂亡是發内也或輦賄而違車兮孕行產而為對輦運也違避也車謂張車子也有夫婦夜田者天帝見而矜之問司命曰此可富乎司命曰命當貧有張車子財可以借而與之期曰車子生急還之田者稍富及期夫婦輦其賄以逃同宿有婦人夜生子問名於其父父曰生車間名車子其家自此之後遂大貧敝見捜神記愼竈顯於言天兮占水火而妄誶爾雅曰誶告也左傳曰日有食之梓慎曰將水叔孫昭子曰旱也後果大旱又曰宋衞陳鄭將火鄭大夫禆竈請瓘斚玉瓚禳火子産弗予竈曰不用吾言鄭又将大子産曰天道逺人道邇非爾所及遂不與亦不復火也梁叟患夫黎丘兮丁厥子而事刃親所睇而弗識兮矧幽㝠之可信梁叟梁國之老人也丁當也睇視也矧況也吕氏春秋曰梁北有黎丘郷鄉有丈人徃市醉而歸者黎丘竒鬼效其子之状而道苦之丈人醒謂其子曰吾為而父我醉女道苦我何故其子泣曰必竒鬼也丈人眀日之市醉其真子迎之丈人拔劍而刺之事音側利反前書音}
