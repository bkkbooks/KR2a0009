  - {type: variant, offset: 3249, length: 301, content: 不宜也邕竊悁邑怪此寶鼎未受犧牛大羹之和久在煎熬臠割之閒願明將軍回謀垂慮裁加少納貢之機密展之力用若以年齒為嫌則顏回不得貫德行之首子奇終無理阿之功苟堪其事古今一也讓後以高才擢進屢遷出為九江太守不以為能也初平中王室大亂讓去官還家恃才氣不屈曹操多輕侮之言建安中其鄉人有搆讓於操操告郡就殺之文多遺失酈炎字文勝范陽人酈食其之後也炎有文才解音律言論給捷多服其能理靈帝時州郡辟命皆不就有志氣作詩二篇曰千里足超邁絕塵驅忽誰能逐賢愚豈常類稟性在清濁富貴有人籍貧賤無天錄通塞苟由己志士不相卜陳平敖里社韓信釣河曲終居天下宰食此萬鍾祿德音流千載功名重山岳文質道所貴遭時用有嘉絳灌臨衡宰謂誼崇浮華賢才抑不用遠投荊南沙抱玉乘龍驥不逢, WYG: 甚}
