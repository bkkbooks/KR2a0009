  - {type: variant, offset: 3244, length: 4, content: 小用固有, WYG: 天也揚雄甘泉賦曰浮蔑蒙而撇天紛翼翼以徐戾兮焱回回其揚靈翼翼飛貌戾至也回回光貌楚辭曰皇剡剡其揚靈王逸注云揚其光靈也呌帝閽使闢扉兮覿天皇于瓊宫閽主門者天皇天帝也揚雄甘泉賦曰選巫咸兮呌帝閽聆廣樂之九奏兮展􅂥􅂥以肜肜史記曰趙簡子曰我之帝}
  - {type: variant, offset: 3244, length: 4, content: 小用固有, krp: 天也揚雄甘泉賦曰浮蔑蒙而撇天紛翼翼以徐戾兮焱回回其揚靈翼翼飛貌戾至也回回光貌楚辭曰皇剡剡其揚靈王逸注云揚其光靈也呌帝閽使闢扉兮覿天皇于瓊宫閽主門者天皇天帝也揚雄甘泉賦曰選巫咸兮呌帝閽聆廣樂之九奏兮展洩洩以肜肜史記曰趙簡子曰我之帝}
