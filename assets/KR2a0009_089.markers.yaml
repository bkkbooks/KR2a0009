  - {type: variant, offset: 827, length: 0, content: '', WYG: 勾踐事此故厥緒不永史記曰越王勾踐先吳興師吳王聞之悉發精兵擊越敗之於夫椒越王乃以餘兵五千人保棲於㑹稽此為冐愧逞願自取敗也㨗徑邪至我不忍以投歩干進茍容我不忍以歙肩㨗疾也龡斂也音翕孟子曰阿意事貴脅肩所尊俗之情也歙亦脅也雖有犀舟勁檝猶人渉卬否有須者也前書曰羌戎弓矛之兵器不犀利音義曰}
  - {type: page-break, offset: 827, content: '', id: KR2a0009_WYG_089-9b, image: WYG0253/WYG0253-0235d.png}
  - {type: variant, offset: 827, length: 0, content: '', krp: 勾踐事此故厥緒不永史記曰越王勾踐先吳興師吳王聞之悉發精兵擊越敗之於夫椒越王乃以餘兵五千人保棲於㑹稽此為冐愧逞願自取敗也㨗徑邪至我不忍以投歩干進茍容我不忍以歙肩㨗疾也龡斂也音翕孟子曰阿意事貴脅肩所尊俗之情也歙亦脅也雖有犀舟勁檝猶人渉卬否有須者也前書曰羌戎弓矛之兵器不犀利音義曰}
  - {type: variant, offset: 828, length: 1, content: 揖, WYG: 俗謂刀兵利為犀犀堅也詩衛風曰招招舟子人渉卭否人渉卬否卬須我友卬我也須待也鄭𤣥注云人皆渉我友未至我獨待而不渉言室家之道非得所適貞女不行非得禮義婚姻不成喻仕當以道不求妄進也姑亦奉順敦篤守以忠信得之不休不獲不吝姑且也休羙也吝恥也不見是而不惽居下位而不憂允上徳之常服焉惽猶悶也易曰不見是而無悶樂則行之憂則違之又曰居上位而不驕在下位而不憂也方將師天老而友地典與之乎髙睨而大談孔甲且不足慕焉稱殷彭及周聃帝王紀曰黄帝以風后配上台天老配中台五聖配下台謂之}
  - {type: page-break, offset: 828, content: '', id: KR2a0009_WYG_089-10a, image: WYG0253/WYG0253-0236a.png}
