  - {type: variant, offset: 5290, length: 230, content: 記輕重疎密各得體宜祖持其手曰處士此正得祖意如祖腹中之所欲言也祖長子射為章陵太守尤善於衡嘗與衡俱遊共讀蔡邕所作碑文射愛其辭還恨不繕寫衡曰吾雖一覽猶能識之唯其中石缺二字為不明耳因書出之射馳使寫碑還校如衡所書莫不歎伏射時大會賓客人有獻鸚鵡者射舉巵於衡曰願先生賦之以娛嘉賓衡覽攬筆而作文無加點辭采甚麗後黃祖在蒙衝船上大會賓客而衡言不遜順祖慙乃訶之衡更熟視曰死公云等道祖大怒令五百將出欲加箠衡方大罵祖恚遂令殺之祖主簿素疾衡即時殺焉射徒跣來救不及祖亦悔之乃厚加棺斂衡時年二, WYG: 卷八}
