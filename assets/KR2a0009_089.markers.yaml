  - {type: variant, offset: 3955, length: 549, content: 官大會祖餞於長樂觀議郎蔡邕等皆賦詩彪乃獨作箴曰文武將墜乃俾俊臣整我皇綱董此不虔古之君子即戎忘身明其果毅尚其桓桓呂尚七十氣冠三軍詩人作歌如鷹如鸇天有太一五將三門地有九變丘陵山川人有計策六奇五閒總茲三事謀則咨詢無曰己能務在求賢淮陰之勇廣野是尊周公大聖石碏純臣以威克愛以義滅親勿謂時險不正其身勿謂無人莫識己真忘富遺貴福祿乃存枉道依合復無所觀先公高節越可永遵佩藏斯戒以厲終身邕等甚美其文以為莫尚也後遷內外黃令帝勑同僚臨送祖於上東門詔東觀畫彪像以勸學者彪到官有德政上書薦縣人申徒蟠等病卒於官文章多亡子岱亦知名張超字子並河閒鄚人也留侯良之後也有文才靈帝時從車騎將軍朱儁征黃巾為別部司馬著賦頌碑文薦檄牋書謁文嘲凡十九篇超又善於草書妙絕時人世共傳之禰衡字正平平原般人也少有才辯而尚氣剛傲好矯時慢物興平中避難荊州建安初來遊許下始達潁川乃陰懷一刺既而無所之適至於刺字漫滅是時許都新建賢士大夫四方來集或問衡曰盍從陳長文司馬伯達乎對曰吾焉能從屠沽兒耶又問荀文若趙稚長云何衡曰文若可借面弔喪稚長可使監請客唯善魯國孔融及弘農楊脩常稱曰大兒孔文舉小兒楊德祖餘子碌碌莫足數也融亦深愛其才衡始弱冠而融年四十遂與為交友上疏薦之曰臣聞洪水橫流帝思俾乂旁求四方以招賢俊昔孝武繼統將弘祖業疇咨熙載羣士響臻陛下叡聖纂承基緒遭遇戹運勞謙日惟岳降, WYG: ''}
