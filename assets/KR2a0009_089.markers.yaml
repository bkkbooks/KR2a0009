  - {type: variant, offset: 3552, length: 402, content: 和安得孔仲尼為世陳四科炎後風病慌忽性至孝遭母憂病甚發動妻始產而驚死妻家訟之收繫獄炎病不能理對熹平六年遂死獄中時年二十八尚書盧植為之誄讚以昭其懿德侯瑾字子瑜敦煌人也少孤貧依宗人居性篤學恆傭作為資暮還輒柴以讀書常以禮自牧獨處一房如對嚴賓焉州郡累召公車有道徵並稱疾不到作矯世論以譏切當時而徙入山中覃思著述以莫知於世故作應賓難以自寄又案漢記撰中興以後行事為皇德傳三十篇行於世餘所作雜文數十篇多亡失西河西人敬其才而不敢名之皆稱為侯君云高彪字義方吳郡無錫人也家本單寒至彪為諸生遊太學有雅才而訥於言嘗從馬融欲訪大義融疾不獲見乃覆刺遺融書曰承服風問從來有年故不待介者而謁大君子之門冀一見龍光以腹心之願不圖遭疾幽閉莫啟昔周公旦父文兄武九命作伯以尹華夏猶揮沐吐餐垂接白屋故周道以隆天下歸德公今養痾傲士故其宜也融省書慙追謝還之彪逝而不顧後郡舉孝廉試經第一除郎中校書東觀數奏賦頌奇文因事諷諫靈帝異之時京兆第五永為督軍御史使督幽州, WYG: ''}
