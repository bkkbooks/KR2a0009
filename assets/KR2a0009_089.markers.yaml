  - {type: variant, offset: 275, length: 313, content: 結絕之氣竭矣然而糒脯出乎車軨鍼石運乎手爪今所賴者非直車軨之糒脯手爪之鍼石也乃收之於斗極還之於司命使乾皮復含血枯骨復被肉允所謂遭仁遇神真所宜傳而著之余畏禁不敢班班顯言竊為窮鳥賦一篇其辭曰右羿子彀左飛丸激矢交集于我思飛不得欲鳴不可舉頭畏觸搖足恐墯內獨怖急乍冰乍火幸賴大賢我矜我憐昔濟我南今振我西鳥也雖頑猶識密恩內以書心外用告天天乎祚賢歸賢永年且公且侯子子孫孫又作刺世疾邪賦以舒其怨憤曰伊五帝之不同禮三王亦又不同樂數極自然變化非是故相反駮德政不能救世溷亂賞罰豈足懲時清濁春秋時禍敗之始戰國愈復增其荼毒秦漢無以相踰越乃更加其怨酷寧計生民之命唯利己而自足撫拍豪強偃蹇反俗立致咎殃捷懾逐物日富月昌渾然同惑孰溫孰涼邪夫顯進直士幽藏其毛羽所惡, WYG: 合横来}
