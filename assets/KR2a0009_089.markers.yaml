  - {type: variant, offset: 956, length: 453, content: 因舉聲哭門下驚皆奔入滿側陟知其非常人乃起延與語大奇之謂曰子出矣陟明旦大從車騎奉謁造壹時諸計吏多盛飾車馬帷幕而壹獨柴車草屏露宿其傍延陟前坐於車下左右莫不歎愕陟遂與言談至熏夕極歡而去執其手曰良璞不剖必有泣血以相明者矣陟乃與袁逢共稱薦之名動京師士大夫想望其風采及西還道經弘農過候太守皇甫規門者不即通壹遂遁去門吏懼以白之規聞壹名大驚乃追書謝曰蹉跌不面企德懷風虛心委質為日久矣側聞仁者愍其區區冀承清誨以釋遙悚今旦外白有一尉兩計吏不道屈尊門下更啟乃知已去如印綬可投夜豈待旦惟君明叡平其夙心寧當慢加於所天事在悖惑不足具責儻可原察追脩前好則何福如之謹遣主簿奉書下筆氣結汗流竟趾壹報曰君學成師範縉紳歸慕仰高希驥歷年滋多旋轅兼道渴於言侍沐浴晨興昧旦守門實望仁兄昭其懸以貴下賤握髮垂接高可敷翫墳典起發聖意下則抗論當世消弭時災豈悟君子自生怠倦失恂恂善誘之德同亡國驕惰之志蓋見機而作不俟終日是以夙退自引畏使君勞昔人或歷說而不遇或思士而無從皆歸之於天不尤於物今壹自譴而已豈敢有猜仁君忽一匹夫於德何損而遠辱手筆追路相尋誠足愧也壹之區區曷, WYG: 上}
