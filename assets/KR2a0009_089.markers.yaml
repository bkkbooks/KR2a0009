  - {type: variant, offset: 2437, length: 428, content: 微風而行舟登瑤臺以回望兮冀彌日而消憂於是招宓妃命湘娥齊倡列鄭女羅揚激楚之清宮兮展新聲而長歌繁手超於北里妙舞麗於陽阿金石類聚絲竹羣分被輕袿曳華文羅衣飄颻組綺繽紛縱輕軀以迅赴若孤鵠之失羣振華袂以逶迤若遊龍之登雲於是歡嬿既洽長夜向半琴瑟易調繁手改彈清聲發而響激微音逝而流散振弱支而紆繞兮若綠繁之垂幹忽飄颻以輕逝兮似鸞飛於天漢舞無常態鼓無定節尋聲響應修短靡跌長袖奮而生風清氣激而繞結爾乃妍媚遞進巧弄相加俯仰異容忽兮神化體迅輕鴻榮曜春華進如浮雲退如激波雖復柳惠能不咨嗟於是天河既回淫樂未終清籥發徵激楚揚風於是音氣發於絲竹兮飛響軼於雲中比目應節而雙躍兮孤雌感聲而鳴雄美繁手之輕妙兮嘉新聲之彌隆於是衆變已盡羣樂既考歸乎生風之廣夏兮脩黃軒之要道攜西子之弱腕兮援毛嬪之素肘形便娟以嬋媛兮若流風之靡草美儀操之姣麗兮忽遺生而忘老才悟稼穡之艱難美呂尚之佐周善管仲之輔桓將超世而作理焉沈湎於此歡於是罷女樂墮瑤臺思夏禹之卑宮慕有虞之土階舉英奇於仄陋拔髦秀於蓬萊君明哲以知人官隨任而處能, WYG: 所疑惑}
