  - {type: variant, offset: 2884, length: 2, content: 絕軌, WYG: 相寓兮㑋顓頊之宅幽髙陽氏帝顓頊也山海經曰東北海之外附禺之山帝顓頊與九嬪葬焉相視也寓居也㑋屈也音乞鳯反宅幽謂居北方幽都之地尚書曰宅朔方曰幽都庸織絡於四裔兮斯與彼其何瘳庸勞也織絡猶經緯徃来也瘳愈也言勞於徃来四方經積氷炎火之地彼此亦何差也織或作識絡或作駱望寒門之絶垠兮縱余緤乎不周淮南子曰北極之山曰寒門楚辭曰踔絶垠乎寒門垠音玉巾反廣雅曰垠咢也緤馬韁也音思列反不周西北方山也垠或作限也迅飈潚其媵我兮鶩翩飄而不禁飈風也潚疾也音肅媵送也翩飄亦疾貌也禁協韻音金趨谽㗿之洞穴兮標通淵之碄碄谽㗿深貌也谽音呼含反㗿音呼加反碄音林亦深貌也既遊四方又入地下經重隂乎寂寞兮愍墳羊之潛深重隂地中也國語曰魯季桓子穿井獲土缶中有蟲若羊焉使問仲尼仲尼對曰土之怪曰墳羊追慌忽於地底兮軼無形而上浮慌忽無形貌也出右宻之闇野兮不識蹊之所由右謂西方也宻山名也山海經曰西方曰宻山黄帝取宻山之玉䇿投之鍾山之隂闇幽隠也蹊路也速燭龍令執炬兮過鍾山而中休速召也燭龍北方之神也山海經曰西北海之外有神人靣蛇身而赤其眼及晦視乃明不食不寝是燭九隂是謂燭龍炬可以昭明瞰瑤谿之赤岸兮弔祖江之見劉瑤谿瑤岸也山海經曰鍾山之東曰瑤岸又曰鍾山其子曰鼓其状人靣而龍身是與欽􅀈殺祖江于崐崘之陽音邳爾雅曰劉殺也聘王母於銀臺兮羞玉芝以療飢王母西王母也銀臺仙人所居也羞進也本草經曰白芝一名玉芝戴勝愸其既歡兮又誚余之行遲山海經曰崐崘之丘有人戴勝虎齒有尾穴處名曰西王母愸相傳音宜覲反杜預注左傳愸發語之音也臣賢案張揖字詁愸笑貌也鳴之别體音許近反與此義合也載太華之玉女兮召洛浦之宓妃詩含神霧曰太華之山上有明星玉女主持玉漿服之成仙宓妃洛水神也咸姣麗以蠱媚兮增嫮眼而娥眉姣好也音古巧反蠱音野謂妖麗也嫮音胡故反好貌也楚辭曰嫮目宜笑也舒妙婧之纎腰兮揚雜錯之袿徽婧音財性反謂妍婧也袿音圭婦人之上服爾雅曰婦人之徽謂之䄜郭璞注云即今之香纓也離朱脣而微笑兮顏的礰以遺光的礰明也遺光言光彩射人也獻環琨與璵縭兮申厥好以𤣥黄環琨並玉佩也白虎通曰脩道無窮即佩環能本道徳即佩琨也𤣥黄謂繒綺也尚書曰厥篚𤣥黄言玉女宓妃等既獻環佩又贈以繒綺也雖色豔而賂美兮志浩蕩而不嘉賂或作貽浩蕩廣大也言不以玉女及贈遺為美也楚辭曰怨靈脩之浩蕩雙材悲於不納兮並詠詩而清歌雙材謂玉女宓妃也即上文所謂二女感於}
