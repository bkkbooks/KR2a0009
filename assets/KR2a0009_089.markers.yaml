  - {type: variant, offset: 3017, length: 209, content: 進曰伏惟幕府初開博選清英華髮舊德並為元龜雖振鷺之集西雍濟濟之在周庭無以或加竊見令史陳留邊讓天授逸才聰明賢智髫夙孤不盡家訓及就學廬便受大典初涉諸經見本知義授者不能對其問章句不能逮其意心通性達口辯辭長非禮不動非法不言若處狐疑之論定嫌審之分經典交至撿括參合衆夫寂焉莫之能奪也使讓生在唐虞則元凱之次運值仲尼則顏冉之亞豈徒俗之凡偶近器而已者哉階級名位亦宜超然若復隨輩而進非所以章瓌偉之高價昭知人之絕明也傳曰函牛之鼎以亨雞多汁則淡, WYG: 迷故}
