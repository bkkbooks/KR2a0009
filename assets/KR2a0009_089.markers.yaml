  - {type: variant, offset: 823, length: 0, content: '', WYG: 食其曰必欲聚徒合義兵誅無遒不冝踞見}
  - {type: variant, offset: 823, length: 0, content: '', krp: 食其曰必欲聚徒合義兵誅無遒不冝踞見}
  - {type: variant, offset: 824, length: 2, content: 揖漢, WYG: 者於是沛公輟洗謝之當此之㑹乃黿鳴而鼈應也喻君臣相感也焦贛易林曰黿鳴岐野鼈應於泉也故能同心戮力勤恤人隠隠病也國語曰勤恤人隠而除其害也奄受區夏遂定帝位皆謀臣之由也故一介之䇿各有攸建子長諜之爛然有第前書音義曰諜譜第也與牒通司馬遷字子長作史記著功臣䓁傳粲然各有第序也夫女􅔨北而應龍翔洪鼎聲而軍容息女􅔨旱神也北猶退也應龍能興雲雨者也山海經曰蚩尤作兵伐黄帝黄帝乃令應龍攻之冀州之野應龍蓄水蚩尤請風伯兩師從大風雨黄帝乃下天女曰妖雨止遂殺蚩尤妖不得復上所居不雨妖亦􅔨也音歩末反聲或作容或作客衡集容作害並未詳也溽暑至而鶉火棲寒冰沍而黿鼉蟄棲息也禮記月令曰季夏土潤溽暑鶉火午之宿也三月在午六月在酉言當季夏之時鶉火退於酉沍凝也今也皇澤宣洽海外混同萬方億醜并質共劑若修成之不暇尚何功之可立質劑猶今分文契也并共猶言交通也周禮曰凡賣買者質劑焉大市以質小市以劑鄭𤣥注云兩書一札同而别之長曰質短曰劑劑音子隨反立事有三言為下列下列且不可庻矣奚冀其二哉左傳魯叔孫豹曰太上有立徳其次有立功其次有立言杜預注云立徳黄帝堯舜也立功禹稷也立言史佚周任臧文仲于兹縉紳如雲儒士成林及津者風攄失塗者幽僻遭遇難要趨偶為幸世易俗異事埶舛殊不能通其變而一度以揆之易繫辭曰通其變使人不倦也斯契船而求劒守株而伺也契猶刻也吕氏春秋曰楚人有渉江者其劒自舟中墜於水遽契其舟曰是吾劒所從墜也舟已行而劒不行若此求劒不亦惑乎韓子曰宋人有耕者田中有株兎走觸之折頸而死因釋耕守株冀復得兎為宋國笑也冒愧逞願必無仁以繼之有道者所不履也越}
