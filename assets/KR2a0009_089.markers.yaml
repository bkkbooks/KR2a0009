  - {type: variant, offset: 2872, length: 0, content: '', WYG: 宜獲福祉神祗受譽黎庶而隂陽未和災眚屢見神明幽逺宜鑒在兹福仁禍滛景嚮而應因德降休乘失致咎天道雖逺吉凶可見近世鄭蔡江樊周廣王聖皆為效矣事見宦者傳故恭儉畏忌必䝉祉祚奢滛謟慢鮮不夷戮前事不忘後事之師也夫情勝其性流遯忘反性者生之質情者性之欲性善情惡情勝則荒滛也豈唯不肖中才皆然茍非大賢不能見得思義故積惡成釁罪不可觧也向使能瞻前顧後援鏡自戒則何陷於凶患乎楚辭曰瞻前而顧後兮援鏡自戒謂引前事以為鏡而自戒勑也韓詩外傳曰明鏡所以照形徃古所以知今貴寵之臣衆所屬仰其有愆尤上下知之褒美譏惡有心皆同故怨讟溢乎四海神明降其禍辟也辟罪也音頻亦反頃年雨常不足思求所失則洪範所謂僣恒𤾉若者也恒常也若順也孔安國注洪範云君行僭差則常𤾉順之常𤾉則多旱也懼羣臣奢侈昬踰典式自下逼上用速咎徵又前年京師地震土裂順帝永建三年正月京師地震裂者威分震者人擾也君以静唱臣以動和威自上出不趣於下禮之政也竊懼聖思厭倦制不專己恩不忍割與衆共威威不可分徳不可共洪範曰臣有作威作福玉食害于而家凶于而國天鑒孔明雖疎不失災異示人前後數矣而未見所革以復往悔革改也復反也自非聖人不能無過願陛下思惟所以稽古率舊勿令刑徳八柄不由天子周禮太宰以八柄詔王馭羣臣一曰爵二曰禄三曰予四曰置五曰生六曰奪七曰廢八曰誅若恩從上下事依禮制禮制脩則奢僭息事令宜則無凶咎然後神望允塞災消不至矣初光武善讖及顯宗肅宗因祖述焉自中興之後儒者争學圖緯兼復附以妖言衡以圖緯虛妄非聖人之法乃上疏曰臣聞聖人明審律歴以定吉凶重之以卜筮雜之以九宫易乾鑿度曰太乙取其數以行九宫鄭𤣥注云太一者北辰神名也下行八卦之宫每四乃還於中央中央者北神之所居故謂之九宫天數大分以陽出以隂入陽起於子隂起於午是以太一下九宫從坎宫始自此而從於坤宫又自此而從於震宫又自此而従於巽宫所以行半矣還息於中央之宫既又自此而從於乾宫又自此而從於兊宫又自此而從於艮宫又自此而從於離宫行則周矣上遊息於火一之星而反紫宫行起從坎宮始終於離宫也經天驗道本盡於此或觀星辰逆順寒燠所由或察龜策之占巫覡之言前書曰齊肅聰明者神或降之在男曰覡在女曰巫覡音胡歴反其所因者非一術也立言於前有徴於後故智者貴焉謂之讖書讖書始出蓋知之者寡自漢取秦用兵力戰功成業遂可謂大事當此之時莫或稱讖若夏侯勝眭孟之徒以道術立名其所述著無讖一言劉向父子領校祕書閱定九流亦無讖錄成哀之後乃始聞之眭𢎞字孟魯國蕃人也昭帝時以明經為議郎夏侯勝字長公東平人好洪範五行傳説宣帝時為太子太傅又成哀時有詔使劉向及子歆於祕書校定經傳諸子等九流謂儒家道家隂陽家法家名家墨家縱横家雜家農家見藝文志並無䜟説也尚書堯使鯀理洪水九載績用不成鯀則殛死禹乃嗣興殛誅死也而春秋讖云共工理水凡讖皆云黄帝伐蚩尤而詩讖獨以為蚩尤敗然後堯受命春秋元命苞中有公輸班與墨翟事見戰國非春秋時也衡集云班與墨翟並當子思時出仲尼後又言别有益州益州之置在於漢世前書武帝始置益州其名三輔諸陵世數可知至於圖中訖於成帝一卷之書互異數事聖人之言埶無若是殆必虛偽之徒以要世取資往者侍中賈逵擿讖互異三十餘事諸言讖者皆不能說至於王莽簒位漢世大禍八十篇何為不戒則知圖讖成於哀平之際也且河洛六藝篇錄已定後人皮傅無所容簒衡集上事云河洛五九六藝四九謂八十一篇也傳音附臣賢案衡集云後人皮傅無所容竄又揚雄方言曰秦晉言非其亊謂之皮𫝊謂不深得其情核皮膚淺近强相傅㑹也後人不逹皮膚之意流俗本多作頗傳者誤也無所容竄謂不容妄有加增也莊子曰竄句籍辭續漢書亦作竄本作簒者義亦通永元中清河宋景遂以歴紀推言水災而偽稱洞視玉版遯甲開山圖曰禹遊於東海得玉珪碧色長一尺二寸圓如日月以自照逹幽冥言宋景歴紀推知水災非洞視玉版所見也或者至於棄家業入山林後皆無效而復采前世成事以為證驗至於永建復統則不能知永建順帝卽位年也復統謂廢而復立言䜟家不論也此皆欺世罔俗以昧埶位情偽較然莫之糾禁且律歴卦候九宫風角數有徴效世莫肯學而競稱不占之書謂競稱讖家也譬猶畫工惡圖犬馬而好作鬼魅誠以實事難形而虛偽不窮也韓子曰客為齊王畫者問畫孰難對曰狗馬最難孰易鬼魅最易狗馬人所知也故難鬼魅無形故易也宜收藏圖讖一禁絶之則朱紫無所眩典籍無瑕玷矣後遷侍中帝引在帷幄諷議左右嘗問衡天下所疾惡者宦官懼其毁已皆共目之衡乃詭對而出閹豎恐終為其患遂共䜛之衡常思圖身之事以為吉凶倚伏幽微難明乃作思𤣥賦𤣥道也徳也老子曰𤣥之又𤣥衆妙之門以宣寄情志其辭曰仰先哲之𤣥訓兮雖彌高其弗違𤣥訓道徳之訓也論語顔回曰仰之彌髙匪仁里其焉宅兮匪義迹其焉追論語孔子曰里仁為羙宅不處仁焉得智里宅皆居也潛服膺以永靚兮綿日月而不衰說文曰膺胷也禮記曰服膺拳拳而不息靚音才性反前書音義曰靚與静同伊中情之信脩兮慕古人之貞節脩謂自脩為善也楚辭曰茍中情其好脩兮竦余身而順止兮遵繩墨而不跌竦企立也禮記曰爲人臣止於㳟為人子止於孝為人父止於慈與國人交止於信跌蹉也音徒結反繩墨喻禮法也楚辭曰遵繩墨而不頗志團團以應懸兮誠心固其如結圑圑垂貌也詩曰心之憂矣如或結之旌性行以制佩兮佩夜光與瓊枝旌明也夜光羙玉瓊枝玉樹以喻堅貞也楚辭曰折瓊枝以繼佩也纗幽蘭之秋華兮又綴之以江蘺案纗音租緩反字書亦纂字也纂繫也諸家音並户珪反誤也江蘺香草也本草經曰蘪蕪一名江蘺即芎藭苖也楚辭曰扈江蘺與薜芷兮紉秋蘭以為佩皆取芬芳以象徳也美襞積以酷裂兮允塵邈而難虧襞積衣襵也酷裂香氣盛也司馬相如曰酷裂淑郁又曰襞積褰皺允信也塵乆也邈逺也虧猶歇也衣服芬芳乆而不歇以喻道徳著美幽而不屈也既姱麗而鮮雙兮非是時之攸珍姱音口瓜反王逸注楚辭曰姱好也攸所也言徳雖美好而時人不珍也奮余榮而莫見兮播余香而莫聞幽獨守此仄陋兮敢怠皇而舍勤怠惰也皇暇也舍廢也幸二八之遻虞兮喜傅說之生殷尚前良之遺風兮恫後辰而無及二八八元八凱也遻遇也音五故反虞虞舜也尚慕也恫痛也音通辰時也痛已後時而不及之也何孤行之焭焭兮子不羣而介立感鸞鷖之特棲兮悲淑人之稀合山海經曰女牀山有鳥五采名曰鸞見則天下安寧又曰九疑山有五采之鳥名鷖淑善也特獨也言靈鳥既獨棲善人亦少合也彼無合其何傷兮患衆偽之冒眞旦獲讟于羣弟兮啓金縢而乃信旦周公也讟謗也信音申成王立周公攝政其弟管叔蔡叔等謗言云公将不利於孺子周公乃誅二叔秋大熟未穫天大雷電以風禾盡偃成王與大夫啓金縢之書乃得周公所自以為功代武王之䇿方信周公忠於國家也事見尚書覽烝民之多僻兮畏立辟以危身烝衆也僻邪也辟法也詩曰人之多僻無自立辟也曾煩毒以迷或兮羌孰可與言己曾重也羌發語辭也言己之志無可與言之也私湛憂而深懷兮思繽紛而不理湛音沈繽紛亂貌也願竭力以守義兮雖貧窮而不改執雕虎而試象兮阽焦原而跟止雕虎有文也阽臨也焦原原名跟足踵也尸子曰中黄伯曰我左執太行之獶右執雕虎唯象之未試吾或焉有力者則又願為牛與象自謂天下之義人也惡乎試之曰夫貧窮太行之獶也跡賤者義之雕虎也吾日試之矣又曰莒國有名焦原者廣尋長五十歩臨百仞之谿莒國莫敢近也有以勇見莒子者獨却行劑踵焉此所以服莒國也夫義之為焦原也髙矣此義所以服一世也衡言躬履仁義不避險難亦足以服一代之人也庶斯奉以周旋兮要既死而後已左傳史克曰奉以周旋不敢失墜論語孔子曰死而後已不亦逺乎俗遷渝而事化兮泯規矩之圜方化變也泯滅也珍蕭艾於重笥兮謂蕙芷之不香蕭蒿也笥篋也蕙芷並香草也貴蕭艾喻任小人謂蕙芷為不香喻棄賢人也斥西施而弗御兮羈要裊以服箱斥逺也西施越之羙女也要音於皎反裊音奴了反呂氏春秋曰要裊古之駿馬也服駕也箱車也言踈逺羙女又以駿馬駕車並喻不能用賢也劉攽曰案要裊古良馬當作褭從馬行陂僻而獲志兮循法度而離殃陂不正也離被也惟天地之無窮兮何遭遇之無常不抑操而茍容兮譬臨河而無航航船也孫卿子曰偷合茍容以持禄周書隂符曰四輔不存若濟河無舟矣欲巧笑以干媚兮非余心之所嘗襲溫恭之黻衣兮披禮義之繡裳襲重也周禮黒與青謂之黻五色備曰繡辮貞亮以為鞶兮雜技藝以為珩說文曰辮交織也音蒱殄反禮記曰男鞶革女鞶絲鄭𤣥注云鞶小囊盛帨巾也珩佩玉也昭綵藻與雕琢兮璜聲逺而彌長璜佩玉也爾雅曰半璧曰璜言佩服之羙喻道徳之盛也淹棲遲以恣欲兮燿靈忽其西藏淹久也棲遲游息也燿靈日也楚辭曰燿靈安藏言年嵗之蹉跎也恃己知而華予兮鶗鴂鳴而不芳己知猶知己也華榮也予衡自謂也鶗鴂鳥名喻䜛人也廣雅曰鷤䳏布榖也楚辭曰恐鷤䳏之先鳴兮使夫百草為之不芳王逸注云以喻䜛言先至使忠直之士被罪也言恃知己以相榮反遇䜛而見害也冀一年之三秀兮遒白露之為霜三秀芝草也楚辭曰采三秀於山間說文曰遒廹也方秀遇霜喻以賢被䜛也時亹亹而代序兮疇可與乎比伉亹亹進貌也謂四時更進而代序疇誰也伉偶也伉協韻音苦郎反咨妒嫮之難並兮想依韓以流亡咨歎也妒忌也嫮美也音胡故反楚辭曰嫮目宜笑言嫉妒者憎惡美人故難與並也韓謂齊仙人韓衆也為王採藥王不肯服終自服之遂得仙楚辭曰羡韓衆而得一流亡謂流遁亡去也恐漸冉而無成兮留則蔽而不章心猶與而狐疑兮即岐阯而攄情岐阯山足也周文王所居也文君為我端蓍兮利飛遁以保名文君文王也端正也楚辭曰詹尹端䇿拂龜周易遁卦上九曰肥遁無不利淮南九師道訓曰遁而能飛吉孰大焉歴衆山以周流兮翼迅風以揚聲遁卦艮下乾上艮為山故曰歴衆山從二至四為巽巽為風故曰翼迅風也二女感於崇岳兮或氷折而不營遁上九變而為咸咸感也咸卦艮下兌上從二至四為巽與兑為二女也崇岳謂艮也從三至五為乾易說卦曰乾為氷兌為毁折陽不求隂故曰氷折而不營也天蓋高而為澤兮誰云路之不平乾變為兌乾為天兌為澤故曰天為澤言天髙尚為澤誰云路之不平言可行也勔自强而不息兮蹈玉階之嶢崢勔勉也乾為金玉故曰玉階嶢崢高峻貌嶢音堯崢音士耕反懼筮氏之長短兮鑽東龜以觀禎左傳晉卜人曰筮短龜長不如從長言筮之未盡復以龜卜之也周禮龜人掌六龜之屬東龜曰果屬其色青也遇九臯之介鳥兮怨素意之不逞詩小雅曰鶴鳴九臯注云臯澤中溢水出所為也自外數至九喻深逺也介耿介也龜經有棲鶴兆也言卜得鶴兆也逞快也協韻音丑貞反遊塵外而瞥天兮據㝠翳而哀鳴瞥視也音普列反㝠翳高逺也鵰鶚競於貪婪兮我脩絜以益榮鵰鶚鷙鳥也以喻䜛佞也子有故於𤣥鳥兮歸母氏而後寧子謂衡也有故於𤣥鳥謂卜得鶴兆也易曰鳴鶴在隂其子和之我有好爵吾與汝縻之言子歸母氏然後得寧猶臣遇賢君方享爵禄勸衡求聖君以仕之也占既吉而無悔兮簡元辰而俶装悔惡也元辰吉辰也俶整也旦余沐於清原兮晞余髮於朝陽晞乾也朝陽日也爾雅曰山東曰朝陽楚辭曰朝濯髮於陽谷夕晞余身乎九陽也潄飛泉之瀝液兮咀石菌之流英瀝液微流也咀嚼也石菌芝也英華也翾鳥舉而魚躍兮將往走乎八荒翾飛也音許縁反走猶赴也音奏八荒八方荒逺地也淮南子曰登太山履石封以望八荒過少皥之窮野兮問三丘乎句芒帝王紀曰少皥邑于窮桑都曲阜故或謂之窮桑帝地在魯城北衡欲往東方故先過窮桑之野三丘東海中三山也謂蓬萊方丈瀛洲句芒木正東方之神也何道眞之淳粹兮去穢累而票輕道眞謂道徳之真班固幽通賦曰矧沈躬於道真不澆曰淳不雜曰粹票音匹妙反猶飄颻也登蓬萊而容與兮鼇雖抃而不傾鼇大龜也列子曰勃海之東有大壑焉其中有五山一曰岱輿二曰員嶠三曰方壺四曰瀛洲五曰蓬萊隨波上下往還不得暫峙仙聖訴於帝使巨鼇十五舉首而戴之迭為三番六萬嵗一交焉五山始不動抃音皮媛反楚辭曰鼇戴山抃説文抃拊手也留瀛洲而採芝兮聊且以乎長生東方朔十洲記曰瀛洲在東海之東上生神芝仙草有玉石膏出泉如酒味名之為玉酒飲之令人長生也憑歸雲而遐逝兮夕余宿乎扶桑扶桑日所出在陽谷中其桑相扶而生見淮南子噏青岑之玉醴兮餐沆瀣以為糧爾雅曰山小而髙曰岑郭璞注曰言岑崟也楚辭曰餐六氣而飲沆瀣王逸注云沆瀣夜半氣也糧或作粻發昔夢於木禾兮穀崑崙之高岡山海經曰崐崘墟在西北方八百里髙萬仞上有木禾長五尋大五圍昔夜也榖生也衡此夜夢禾生於崐崘山之上即下文云抨巫咸以占夢含嘉秀以為敷是也衡集注及近代注解皆云昔日夢至木禾今親往見焉是為發昔夢也臣賢案衡之此賦将往走乎八荒以後即先往東方次往南方乃適西方此時正在陽谷扶桑之地崐崘乃西方之山安得已往崐崘見木未乎良由尋究不精致斯謬耳朝吾行於𤾉谷兮從伯禹於稽山𤾉谷日所出也孔安國注尚書曰禹代鯀為崇伯故稱伯吳越春秋曰禹登茅山大㑹計理國之道故更名其山曰㑹稽也集羣神之執玉兮疾防風之食言左傳曰禹合}
