  - {type: variant, offset: 202, length: 0, content: '', WYG: 以為𤣥者天也道也言聖賢制法作事皆引天道以為本統而因附續萬類王政人事法度故宓羲氏謂之易老子謂之道孔子謂之元而揚雄謂之𤣥𤣥經三篇以紀天地人之道立三體有上中下如禹貢之陳三品三三而九因以九九八十一故為八十一卦以四為数数從一至四重累變易竟八十一而徧不可損益以三十五蓍揲之𤣥經五千餘言而傳十二篇也劉攽曰注以三十五蓍揲之案太𤣥乃用三十六揲作五字誤也謂崔瑗曰吾觀太𤣥方知子雲妙極道數乃與五經相擬非徒傳記之屬使人難論隂陽之事漢家得天下二百嵗之書也子雲當哀帝時著太𤣥經自漢初至哀帝二百嵗也復二百歳殆将終乎自中興至獻帝一百八十九年也所以作者之數必顯一世常然之符也漢四百歲𤣥其興矣自此以上並衡與崔瑗書之文也安帝雅聞衡善術學公車特徴拜郎中再遷為太史令漢官儀太史令屬太常秩六百石也遂乃研覈隂陽妙盡璇璣之正作渾天儀著靈憲算罔論言甚詳明漢名臣奏曰蔡邕曰言天體者有三家一曰周髀二曰宣夜三曰渾天宣夜之學絕無師法周髀術数具存考騐天状多所違失故史官不用唯渾天者近得其情今史官所用候䑓銅儀則其法也靈憲序曰昔在先王將歩天路用定靈軌尋緒本元先凖之于渾體是為正儀故靈憲作興衡集無算罔論盖網絡天地而算之因名焉順帝初再轉復為太史令衡不慕當世所居之官輒積年不徙自去史職五載復還乃設客問作應間以見其志云間非也衡集云觀者觀余去史官五載而復還非進取之勢也唯衡内識利鈍操心不改或不知我者以為失志矣用為間余余應之以時有遇否性命難求因兹以露余誠馬名之應間云有間余者曰盖聞前哲首務務於下學上達佐國理民有云為也論語曰孔子曰下學而上達注云下學人事上知天命也朝有所聞則夕行之立功立事式昭徳音尚書曰立功立事可以永年逸詩曰祈招之愔愔式昭徳音式用也昭明也是故伊尹思使君為堯舜而民處唐虞彼豈虚言而已哉必旌厥素爾尚書伊尹曰予弗克俾厥后唯堯舜其心愧耻若撻于市旌明也素猶志也咎單巫咸實守王家咎單巫咸並殷賢臣也尚書曰咎單作明居又曰巫咸保乂王家也申伯樊仲實幹周邦服衮而朝介圭作瑞申伯申國之伯也樊仲仲山甫也為樊侯並周宣王之卿士詩大雅曰維申及甫維周之翰注翰幹也服衮謂申伯為冢宰服袞冕之服也又曰錫爾介圭以作爾寳注云寳瑞也圭長尺二寸謂之介也厥跡不朽垂烈後昆不亦丕歟且學非以要利而富貴萃之貴以行令富以施恵恵施令行故易稱以大業易繫辭曰盛徳大業至矣哉富有之謂大業日新之謂盛徳也質以文美實由華興噐頼雕飾為好人以輿服為榮吾子性徳體道篤信安仁約己博藝無堅不鑚以思世路斯何逺矣論語曰篤信好學又曰仁者安仁又曰鑚之彌堅博我以文約我以禮曩滯日官今又原之日官史官也左傳曰天子有日官爾雅曰原再也雖老氏曲全進道若退然行亦以需老子曰曲則全枉則直又曰夷道若類進道若退易雜卦曰需不進也必也學非所用術有所仰故臨川將濟而舟檝不存焉徒經思天衢内昭獨智固合理民之式也故嘗見謗于鄙儒天衢天道也言徒鋭思作靈憲渾天儀等也深厲淺掲隨時為義曾何貪於支離而習其孤技邪掲褰衣也音丘厲反詩邶風曰深則厲淺則揭爾雅曰由帶以上為厲由膝以下為掲言遭時制宜遇深水則厲淺則揭也易隨卦曰隨時之義大矣哉荘子曰朱泙曼學屠龍於支離盖單千金之家三年技成而無所用技音渠綺反責衡何獨妙思於機巧者也劉攽曰注支離盖案荘子盖當作益支離其名益耳後人不讀荘子妄改為盖叄音三輪可使自轉木雕猶能獨飛己垂翅而還故棲盍亦調其機而銛諸垂翅故棲謂再為史官也盍何不也銛利也諸之也間者言衡作三輪木雕尚能飛轉已乃垂翅故棲何不調其機闗使利而高飛邪傅子曰張衡能令三輪獨轉也昔有文王自求多福詩大雅文王篇曰永言配命自求多福也劉攽曰正文昔有當作昔者人生在勤不索何獲曷若卑體屈己羙言以相剋剋勝也衡集作羙言以相市鳴于喬木乃金聲而玉振之詩小雅曰伐木丁丁鳥鳴嚶嚶出自幽谷遷于喬木喻求仕遷於髙位振揚徳音如金玉之聲孟子曰金聲而玉振之用後勳雪前吝婞佷不柔以意誰靳也吝耻也左傳曰宋公靳之杜預注云戯而相愧曰靳應之曰是何觀同而見異也君子不患位之不尊而患徳之不崇不恥禄之不夥而恥智之不博方言曰}
