  - {type: variant, offset: 203, length: 0, content: '', WYG: 物盛而多齊宋之郊謂之夥音和果反是故藝可學而行可力也天爵髙懸得之在命孟子曰仁義忠信樂善不倦此天爵也公卿大夫此人爵也案此謂天子髙懸爵位得者在命也或不速而自懐或羡旃而不臻速召也懐来也旃之也求之無益故智者偭而不思偭偕也阽身以徼幸固貪夫之所為未得而豫喪也阽危也枉尺直尋議者譏之盈欲虧志孰云非羞孟子陳代問孟子曰枉尺而直尋若可為也孟子曰昔齊景公田招虞人以旌不至将殺之志士不忘在溝壑如不待招而徃何哉且夫枉尺而直尋者以利言也如以利則枉尋直尺而利亦可為歟趙岐注云志士守義者也君子固窮故虞人不得其招尚不徃如何君子不得其招而妄見也尺小尋大不可枉大就小而以要利也於心有猜則簋飱饌餔猶不屑餐旌瞀以之猜嫌也簋食噐也飱音孫詩云有䝉簋飱饌音仕卷反餔音補故反並謂食也屑猶介也以用也爰旌瞀餓人也一作爰精目列子曰東方有人焉曰爰精目將有適也而餓於道狐丘父之盗曰丘見而下壺飱以餔之爰精目三餔而後能視曰子何為者也我狐父之人丘也爰精目曰譆汝非盗邪吾義不食子之食也兩手據地而歐之不出喀喀而死之也劉攽曰注子何為者也案文是對答之辭也字當作曰意之無疑則兼金盈百而不嫌辭孟軻以之孟子陳臻問曰前日於齊王餽兼金一百而不受於宋餽七十鎰而受前日之不受是則今日受非也孟子曰皆是也當在宋也予将逺行行者必以贐予何為不受若於齊則未有處無處而餽之是貨之也焉有君子而可以貨取乎趙岐注云兼金好金也價兼倍於惡者故曰兼金一百百溢也二十兩為溢贐送行者贈賄之禮也在齊時無事於義未有所處也義無所處而餽之是以貨賄所取我欲使我懐恵也劉攽曰注是以貨賄所取我案文多一取字士或觧裋褐而襲黼黻或委臿築而據文軒者度徳拜爵量績受禄也觧裋褐謂寗戚也委臿築謂傅説也裋音常主反方言曰自闗而西謂襜褕短者謂之裋也輸力致庸受必有階受或作爰渾元初基靈軌未紀吉凶紛錯人用朣朦朣朦言未晤也劉攽曰案蔡邕亦有此二字作瞳矇從目是也此誤黄帝為斯深慘有風后者是焉亮之察三辰於上跡禍福乎下經緯歴數然後天歩有常則風后之為也史記曰黄帝迎日推䇿舉風后力牧以理人順天地之紀幽明之占又曰旁羅日月星辰春秋内事曰黄帝師於風后風后善於伏羲氏之道故推演隂陽之事蓺文志隂陽流有風后十三篇也當少昊清陽之末實或亂徳人神雜擾不可方物重黎又相顓頊而申理之日月即次則重黎之為也帝王紀曰少昊字清陽國語楚觀射父曰少皥之衰也九黎亂徳人神雜揉不可方物顓頊承之乃命南正重司天以属神命火正黎司地以属人重少昊氏之子黎顓頊氏之子人各有能因藝受任鳥師别名四叔三正官無二業事不並濟左傳郯子曰少皥鳥師而鳥名鳯鳥氏歴正也𤣥鳥氏司分也伯趙氏司至也青鳥氏司啟也丹鳥氏司閉也又晉蔡墨曰少皥氏有四叔曰重曰該曰修曰熙實能金木及水使重為勾芒該為蓐收修及熙為𤣥㝠四叔分主三正言其不兼業也晝長則宵短日南則景北夏至日北極而影短畫}
