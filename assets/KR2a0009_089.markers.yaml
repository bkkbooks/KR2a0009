  - {type: variant, offset: 4729, length: 0, content: '', krp: 靡藐以迭逿戫音一六反汨音干筆反飂音遼沛音普蓋反並疾貌也藐小也藐音亡小反逿音徒郎反凌驚雷}
  - {type: variant, offset: 4730, length: 4, content: 觀帝室皇, WYG: 砊礚兮弄狂電之淫裔砊礚雷聲也砊音康礚苦蓋反滛裔電貌狂疾也踰庬澒於宕㝠兮貫倒景而高厲庬音亡孔反澒音胡孔反孝經援神契曰天度濛澒宋均注云濛澒未分之象也說文曰宕過也㝠幽㝠也貫穿也前書谷永上書曰登遐倒景音義曰在日月之上日月反從下照故其景倒也厲陵厲也廓盪盪其無涯兮乃今窮乎天外據開陽而頫盼兮臨舊鄉之暗藹春秋運斗樞曰北斗第六星為開陽頫音俯暗藹逺貌也暗音烏感反悲離}
