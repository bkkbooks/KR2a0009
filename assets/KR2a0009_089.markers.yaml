  - {type: variant, offset: 831, length: 3, content: 何遽怪, WYG: 其餘知天規紀地典力牧常先封胡孔甲等或以為師或以為將蓺文志隂陽有地典六篇殷彭即老彭殷賢人也睨視也髙視大談言不同流俗衡集作矢談矢亦直也義亦通也與世殊技固孤是求技巧也音佼本或作拔誤也子憂朱泙曼之無所用吾恨輪扁之無所教也輪扁為輪者名扁也扁音皮殄反荘子曰輪扁對齊桓公曰斵輪之法徐則甘而不固疾則苦而不入不疾不徐得之於手而應之心口不能言也臣不能以喻臣之子臣子亦不能受之於臣言泙曼屠龍既無所用輪扁斵輪亦不能教人也泙音匹萌反子覩木雕獨飛愍我垂翅故棲吾感去鼃附䲭悲爾先笑而後號也鼃蝦蟇也音胡媧反周易旅卦上九曰先笑而後號咷斐豹以斃督燔書禮至以掖國作銘左傳曰晉樂盈復入於晉欒氏之力臣曰督戎國人懼之斐豹謂范宣子曰茍焚丹書我殺督戎宣子曰而殺之所不請於君焚丹書者有如日乃殺之杜預注曰盖豹犯罪没為官奴以丹書其罪左傳衞伐邢禮至與國子廵城掖以赴外殺之禮至自為銘曰余掖殺國子莫余敢止國子邢正卿禮至本衞人仕邢為大夫掖為挟之而投於城外也衡集豹字作𨽻也弦髙以牛餼退敵墨翟以縈帯全城左傳曰秦師襲鄭及滑鄭商人弦髙將市於周遇之以牛十二犒師曰寡君聞吾子將出於敝邑敢犒従者秦孟明曰鄭有偹矣㓕滑而還墨子曰公輸般為雲梯以攻宋墨子觧帶為城以牒為械公輸般九攻墨子九拒公輸之攻盡墨子之守有餘楚王曰善}
