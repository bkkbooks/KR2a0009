  - {type: punctuation, offset: 3013, content: ，, id: KR2a0009_ZHSJ_089-bkkpn783}
  - {type: 'tls:seg', offset: 3013, content: '', id: KR2a0009_ZHSJ_089-d89p81s3}
  - {type: variant, offset: 3014, length: 1, content: 薦, WYG: 歎曰我其首禾乎髙誘注云禾穟向根君子不忘本也安和靜而隨時兮姑純懿之所廬姑且也懿羙也廬猶居也戒庶寮以夙㑹兮僉恭職而並迓僉皆也迓迎也豐隆軯其震霆兮列缺曄其照夜豐隆雷也軯聲也音普耕反震霆霹靂也霆音庭列缺電也曄光也雲師􅞝以交集兮涷雨沛其灑塗雲師屏翳也􅞝隂貌音徒感反爾雅曰暴雨謂之涷沛雨貌也塗協韻音徒故反楚辭曰使涷雨兮灑塵轙琱輿而樹葩兮擾應龍以服輅轙音魚綺反爾雅曰載轡謂之轙郭璞注云轙軶上環也轡所貫也琱以玉餙車也樹立也葩華也}
  - {type: page-break, offset: 3014, content: '', id: KR2a0009_WYG_089-32b, image: WYG0253/WYG0253-0247b.png}
  - {type: variant, offset: 3014, length: 1, content: 薦, krp: 歎曰我其首禾乎髙誘注云禾穟向根君子不忘本也安和靜而隨時兮姑純懿之所廬姑且也懿羙也廬猶居也戒庶寮以夙㑹兮僉恭職而並迓僉皆也迓迎也豐隆軯其震霆兮列缺曄其照夜豐隆雷也軯聲也音普耕反震霆霹靂也霆音庭列缺電也曄光也雲師􅞝以交集兮涷雨沛其灑塗雲師屏翳也􅞝隂貌音徒感反爾雅曰暴雨謂之涷沛雨貌也塗協韻音徒故反楚辭曰使涷雨兮灑塵轙琱輿而樹葩兮擾應龍以服輅轙音魚綺反爾雅曰載轡謂之轙郭璞注云轙軶上環也轡所貫也琱以玉餙車也樹立也葩華也}
  - {type: variant, offset: 3016, length: 0, content: '', WYG: 車上建華盖擾馴也廣雅曰有翼曰應龍也百神森其備從兮屯騎羅而星布周頌曰懐柔百神森衆貌也屯聚也振余袂而就車兮修劒揭以低昻脩長也掲低昂貌也冠咢咢其映蓋兮佩綝纚以煇煌咢音五各反一作岌並冠髙貌也映盖謂冠與車盖相映也綝音林纚音離盛貌也煇音胡本反光貌也僕夫儼其正策兮八乘攄而超驤八乗八龍也楚辭曰駕八龍之蜿蜿攎猶騰也氛旄溶以天旋兮蜺旌飄而飛揚氛天氣也旌羽旌也溶音勇王逸注楚辭曰溶廣大貌也蜺雌虹也撫軨軹而還睨兮心灼藥其如湯軨音零說文曰車輜間横木也楚辭曰倚結軨兮太息軹音之是反杜子春注周禮云軹兩轊也說文云車輪小穿也還睨顧瞻也藥音鑠熱貌也言顧瞻鄉國而心熱也羡上都之赫戲兮}
  - {type: page-break, offset: 3016, content: '', id: KR2a0009_WYG_089-33a, image: WYG0253/WYG0253-0247c.png}
