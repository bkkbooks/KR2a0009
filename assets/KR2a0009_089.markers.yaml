  - {type: variant, offset: 196, length: 0, content: '', krp: 張衡傳張衡字平子南陽西鄂人也西鄂縣故城在今鄧州向城縣南有平子墓及碑在焉崔瑗之文也世為}
  - {type: variant, offset: 197, length: 0, content: '', WYG: 姓祖父堪蜀郡太守衡少善屬文㳺於三輔因入京師觀太學遂通五經貫六蓺雖才髙於世而無驕尚之情常從容淡靜不好交接俗人永元中舉孝亷不行連辟公府不就時天下承平日乆自王侯以下莫不踰侈衡乃擬班固兩都作二京}
