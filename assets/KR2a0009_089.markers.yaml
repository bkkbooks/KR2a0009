  - {type: variant, offset: 4762, length: 1, content: 貪, WYG: 服也夕􅅥若厲以省諐兮懼余身之未勑也共音恭易曰君子終日乾乾夕􅅥若厲􅅥懼也厲病也勑整也茍中情之端直兮莫吾知而不恧恧慙也音女六反墨無為以凝志兮與仁義乎消揺老子曰上徳無為不出户而知天下兮何必歴逺以劬勞老子曰不出户而知天下系曰天長地久歲不留俟河之清祗懷憂系繫也老子曰天長地久左氏傳曰俟河之清人壽幾何也願得逺度以自娛上下無常窮六區六區謂四方上下也超踰騰躍絶世俗飄颻神舉逞所欲天不可階仙夫希栢舟悄悄吝不}
  - {type: page-break, offset: 4762, content: '', id: KR2a0009_WYG_089-36b, image: WYG0253/WYG0253-0249b.png}
  - {type: variant, offset: 4762, length: 1, content: 貪, krp: 服也夕惕若厲以省諐兮懼余身之未勑也共音恭易曰君子終日乾乾夕惕若厲惕懼也厲病也勑整也茍中情之端直兮莫吾知而不恧恧慙也音女六反墨無為以凝志兮與仁義乎消揺老子曰上徳無為不出户而知天下兮何必歴逺以劬勞老子曰不出户而知天下系曰天長地久歲不留俟河之清祗懷憂系繫也老子曰天長地久左氏傳曰俟河之清人壽幾何也願得逺度以自娛上下無常窮六區六區謂四方上下也超踰騰躍絶世俗飄颻神舉逞所欲天不可階仙夫希栢舟悄悄吝不}
