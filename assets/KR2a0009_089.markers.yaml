  - {type: variant, offset: 4735, length: 2, content: 必蓄, WYG: 之勞心兮情悁悁而思歸說文曰悁悁憂也音於緣反詩國風曰勞心悁悁也魂眷眷而屢顧兮馬倚輈而徘回輈轅也雖遨游以媮樂兮豈愁慕之可懷媮音通侯反懐安也出閶闔兮降天塗乘飈忽兮馳虛無閶闔天門雲霏霏兮繞余輪風眇眇兮震余旟繽聯翩兮紛暗曖倐眩眃兮反常閭倐忽也眩音縣眃音混疾貌也常閭故里也收疇昔之逸豫兮卷淫放之遐心謂初遊於四方天地之間以自滛放今改悔也修初服之娑娑兮長余珮之參參楚辭曰退將復修吾初服王逸注云修吾初始清絜之服也娑娑衣貎參參長貌文章煥以粲爛兮美紛紜以從風御六蓺之珍駕兮遊道徳之平林以六藝為車而駕之也以道徳為林而遊之也結典籍而為罟兮歐儒墨而為禽罟網也音古儒家子思孟軻孫卿等墨家謂翟墨胡}
  - {type: page-break, offset: 4735, content: '', id: KR2a0009_WYG_089-36a, image: WYG0253/WYG0253-0249a.png}
