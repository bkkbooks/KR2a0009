  - {type: variant, offset: 2887, length: 2, content: 成莊, WYG: 岳也歌曰天地烟熅百卉含蘤鳴鶴交頸睢鳩相和處子懷春精魂回移烟煴氣也易繫辭曰天地烟煴張揖字詁曰蘤古花字也處子處女也懐思也荘子曰綽約若處子詩曰有女懐春如何淑明忘我實多㳤善也詩曰如何如何忘我實多將答賦而不暇兮爰整駕而亟行賦謂玉女所歌詩也亟疾也音紀力反即上所謂氷折不營也瞻崐崘}
