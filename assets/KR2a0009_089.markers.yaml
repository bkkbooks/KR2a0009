  - {type: variant, offset: 4727, length: 1, content: 奇, WYG: 八星絶漢曰天潢雲漢曰天河也倚招揺攝提以低回剹流兮察二紀五緯之綢繆遹皇招搖攝提星名也剹音居流反低回剹流回轉之貌二紀日月也五緯五星也綢繆相次之貌也遹皇行貌也偃蹇夭矯㛯以連卷兮雜㳫叢顇颯以方驤㛯音孚萬反卷音拳並翺翔自恣之貌也􅖢汨飂戾沛以罔象兮爛漫}
