  - {type: variant, offset: 3008, length: 5, content: 讓宜處高任, WYG: 糇兮㪺白水以為􅄴瑤瓊也楚辭曰屑瓊橤以為粻糇糧也㪺音居于反謂酌也河圖曰崐山出五色流水其白水東南流入中國名為河也抨巫咸以占夢兮廼貞吉之元符抨使也音普耕反又補耕反巫咸神巫也山海經曰大荒之中有靈山巫咸巫彭巫謝等十巫衡既夢木禾今故令巫咸占之也元善也滋令徳於正中兮含嘉秀以為敷滋茂也淮南子曰昏張中則務種榖説文曰禾嘉榖也至二月始生八月而熟得時之中故謂之禾既垂穎而顧本兮爾要思乎故居穎穟也本禾本也言禾既垂穟顧本人亦當思故居也淮南子曰孔子見禾三變始於粟生於苖成於穟}
  - {type: page-break, offset: 3008, content: '', id: KR2a0009_WYG_089-32a, image: WYG0253/WYG0253-0247a.png}
