  - {type: variant, offset: 12, length: 181, content: 七十下張升字彥真陳留尉氏人富平侯放之孫也升少好學多關覽而任情不羈其意相合者則傾身交結不問窮賤如乖其志好者雖王公大人終不屈從常歎曰死生有命富貴在天其有知我雖胡越可親苟不相識從物何益仕郡為綱紀以能出守外黃令吏有受賕者即論殺之或譏升守領一時何足趨明威戮乎對曰昔仲尼暫相誅齊之侏儒手足異門而出故能威震強國反其侵地君子仕不為己職思其憂豈以久近而異其度哉遇黨錮去官後竟見誅年, WYG: ''}
