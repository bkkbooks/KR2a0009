  - {type: variant, offset: 2877, length: 4, content: 召同期繼, krp: 登何以畜人乎子韋曰君善言三熒惑必退三舍見呂氏春秋也魏顆亮以從理兮鬼亢回以敝秦魏顆魏武子之子也亮信也左傳曰晉魏顆敗秦師於輔氏獲杜回杜回秦之力人也初魏武子有嬖妾武子疾命顆曰必嫁是妾疾病則曰必以為殉及卒顆嫁之曰疾病則亂吾從其治也輔氏之役顆見老人結草以亢杜回躓而顛故獲之夜夢之曰余而所嫁婦人之父也爾用先人治命余是以報也咎繇邁而種徳兮徳樹茂乎英六尚書曰咎繇邁種徳注云邁行也種布也英六並國名咎繇能行布道徳子孫茂盛封於英六帝王紀臯陶卒葬之於六禹封其少子於六以奉其祀六故城在今夀州安豐縣南也桑末寄夫根生兮卉既彫而已毓根生謂寄生也言百軰至寒皆彫落唯寄生獨榮於桑之末本草經桑上寄生一名寄屑一名寓木一名宛童以喻咎繇封於英六餘國先滅英六獨存也有無言而不讎兮又何往而不復言咎繇布徳行仁慶流後裔詩曰無言不讎易曰無徃不復也盍逺迹以飛聲兮孰謂時之可蓄盍何不也蓄猶待言何不逺遊以飛聲譽誰謂時之可待言易逝也仰矯首以遥望兮魂敞惘而無疇敞惘猶敞怳也偪區中之隘陋兮將北度而宣遊偪迫也宣徧也行積冰之磑磑兮清泉沍而不流淮南子曰北方之極自九澤窮大海之極有凍寒積氷雪雹羣氷之野磑音牛哀反世本云公輸作石磑說文曰皚皚霜雪之貌也盖古字磑與皚通沍音胡故反杜預注左傳云沍閉也寒風凄而永至兮拂穹岫之騷騷𤣥武縮於殻中兮螣蛇蜿而自糾𤣥武謂龜蛇也曲禮曰前朱雀而後𤣥武殻龜甲也爾雅曰螣螣蛇蜿屈也糾纒結也騷騷叶韻音修紏音古由反魚矜鱗而幷凌兮鳥登木而失條矜竦也并猶聚也凌氷也音力澄反失條言寒也坐太隂之屏室兮慨含欷而增愁太隂北方極隂之地也楚詞曰選鬼神於太隂怨}
