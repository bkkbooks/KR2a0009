  - {type: variant, offset: 4764, length: 7, content: 兔騕褭絕足奔放, WYG: 階升也論語曰夫子之不可及猶天之不可階而升仙夫仙人也詩邶風曰栢舟言仁而不遇也其詩曰汎彼栢舟亦汎其流憂心悄悄愠于羣小静言思之不能奮飛鄭𤣥注云舟載度物者也今不用而與衆物汎汎然俱流水中諭仁人不用而與羣小並列悄悄憂貌也臣不遇於君猶不忍奮翼而飛去吝惜也衡亦不遇其時而為宦者所䜛故引以自諭也松喬高跱孰能離結精逺遊使心攜松赤松子也喬王子喬也列仙傳曰赤松子神農時雨師服水玉教神農能入火自燒至崐崘山上常止西王母石室隨風上下王子喬周靈王太子晉也好吹笙作鳯鳴遊伊洛間道士浮丘公接上嵩髙山三十餘年後來於山上見桓}
  - {type: page-break, offset: 4764, content: '', id: KR2a0009_WYG_089-37a, image: WYG0253/WYG0253-0249c.png}
