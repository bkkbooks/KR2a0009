  - {type: variant, offset: 2876, length: 0, content: '', WYG: 曰江東人以物插地中為事也毋綿攣以涬已兮思百憂以自疢綿攣猶牽制也涬音胡鼎反衡集註云涬引也言勿牽制於俗引憂於己詩曰無思百憂祗自重兮彼天監之孔明兮用棐忱而佑仁監視也孔甚也棐輔也忱誠也佑助也言天之視人甚眀唯輔誠信而助仁徳也尚書曰天監厥徳又曰天威棐忱湯蠲體以禱祈兮蒙厖禠以拯人蠲潔也祈求也爾雅曰厖大也禠福也帝王紀曰湯時大旱七年殷史卜曰當以人禱湯曰必以人禱吾請自當遂齊戒翦髮斷爪以己為牲禱於桑林之社果大雨言䝉天大福以拯救人衡集祈作祊祊祭也禠音斯景三慮以營國兮熒惑次於它辰景宋景公也三慮謂三善言也景公有疾司馬子韋曰熒惑守心心宋之分野君當祭之可移於相公曰相股肱也除心腹之疾而寘之股肱可乎曰可移於民公曰民所以為國無民何以為君曰可移於歳公曰歲所以養人也歲}
  - {type: page-break, offset: 2876, content: '', id: KR2a0009_WYG_089-28a, image: WYG0253/WYG0253-0245a.png}
  - {type: variant, offset: 2876, length: 0, content: '', krp: 曰江東人以物插地中為事也毋綿攣以涬已兮思百憂以自疢綿攣猶牽制也涬音胡鼎反衡集註云涬引也言勿牽制於俗引憂於己詩曰無思百憂祗自重兮彼天監之孔明兮用棐忱而佑仁監視也孔甚也棐輔也忱誠也佑助也言天之視人甚眀唯輔誠信而助仁徳也尚書曰天監厥徳又曰天威棐忱湯蠲體以禱祈兮蒙厖禠以拯人蠲潔也祈求也爾雅曰厖大也禠福也帝王紀曰湯時大旱七年殷史卜曰當以人禱湯曰必以人禱吾請自當遂齊戒翦髮斷爪以己為牲禱於桑林之社果大雨言䝉天大福以拯救人衡集祈作祊祊祭也禠音斯景三慮以營國兮熒惑次於它辰景宋景公也三慮謂三善言也景公有疾司馬子韋曰熒惑守心心宋之分野君當祭之可移於相公曰相股肱也除心腹之疾而寘之股肱可乎曰可移於民公曰民所以為國無民何以為君曰可移於歳公曰歲所以養人也歲}
  - {type: variant, offset: 2877, length: 4, content: 召同期繼, WYG: 登何以畜人乎子韋曰君善言三熒惑必退三舍見呂氏春秋也魏顆亮以從理兮鬼亢回以敝秦魏顆魏武子之子也亮信也左傳曰晉魏顆敗秦師於輔氏獲杜回杜回秦之力人也初魏武子有嬖妾武子疾命顆曰必嫁是妾疾病則曰必以為殉及卒顆嫁之曰疾病則亂吾從其治也輔氏之役顆見老人結草以亢杜回躓而顛故獲之夜夢之曰余而所嫁婦人之父也爾用先人治命余是以報也咎繇邁而種徳兮徳樹茂乎英六尚書曰咎繇邁種徳注云邁行也種布也英六並國名咎繇能行布道徳子孫茂盛封於英六帝王紀臯陶卒葬之於六禹封其少子於六以奉其祀六故城在今夀州安豐縣南也桑末寄夫根生兮卉既彫而已毓根生謂寄生也言百軰至寒皆彫落唯寄生獨榮於桑之末本草經桑上寄生一名寄屑一名寓木一名宛童以喻咎繇封於英六餘國先滅英六獨存也有無言而不讎兮又何往而不復言咎繇布徳行仁慶流後裔詩曰無言不讎易曰無徃不復也盍逺迹以飛聲兮孰謂時之可蓄盍何不也蓄猶待言何不逺遊以飛聲譽誰謂時之可待言易逝也仰矯首以遥望兮魂􅐞惘而無疇􅐞惘猶敞怳也偪區中之隘陋兮將北度而宣遊偪迫也宣徧也行積冰之磑磑兮清泉沍而不流淮南子曰北方之極自九澤窮大海之極有凍寒積氷雪雹羣氷之野磑音牛哀反世本云公輸作石磑說文曰皚皚霜雪之貌也盖古字磑與皚通沍音胡故反杜預注左傳云沍閉也寒風凄而永至兮拂穹岫之騷騷𤣥武縮於殻中兮螣蛇蜿而自糾𤣥武謂龜蛇也曲禮曰前朱雀而後𤣥武殻龜甲也爾雅曰螣螣蛇蜿屈也糾纒結也騷騷叶韻音修紏音古由反魚矜鱗而幷凌兮鳥登木而失條矜竦也并猶聚也凌氷也音力澄反失條言寒也坐太隂之屏室兮慨含欷而增愁太隂北方極隂之地也楚詞曰選鬼神於太隂怨}
