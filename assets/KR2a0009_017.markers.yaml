  - {type: variant, offset: 5365, length: 1, content: 遷, krp: 拜謁人多置錢物壇上亦不掃除國家上見之則詔書所謂酢梨酸棗狼籍散錢處數百幣帛具道是武帝封禪至㤗山下未及上百官為先上跪拜置梨棗錢于道以求福即此也東山名曰日觀日觀者鷄一鳴時見日始欲出長三丈所秦觀者望見長安吳觀者望見㑹稽周觀者望見齊西北有石室壇以南有玉盤中有玉龜山南脅神泉飲之極清美利人日入下去行數環日暮時頗雨不見其道一人居其前先知蹈有人乃舉足隨之比至天門下夜人定矣遣侍御史與蘭臺令史将工先上山刻石文曰維建武三十有二年二月皇帝東廵狩至於岱宗柴風俗通曰岱者胎也宗者長也萬物之始隂陽之交觸石膚寸而合不崇朝而徧雨天下惟㤗山乎故為五岳之長耳望秩於山川孔安國書注曰九州名山大川五岳四瀆之屬皆一時望祭之安國又曰喻以尊卑祭之也五嶽視三公四瀆視諸侯其餘小者或卿大夫伯子男班於羣神孔安國曰羣神謂丘陵墳衍古之聖賢皆祭之矣遂覲東后從臣太尉憙行}
