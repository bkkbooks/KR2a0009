  - {type: variant, offset: 5329, length: 1, content: 將, WYG: 将梁松等議記曰齊将有事㤗山先有事配林盖諸侯之禮也河嶽視公侯王者祭焉冝無即事之漸不祭配林盧植注曰配林小山林麓配㤗山者也謂諸侯不郊天㤗山廵省所考五嶽之宗故有事将祀之先即其漸天子則否矣㤗山廟在博縣風俗通曰博縣十月祀岱宗名曰合凍十二月涸凍正月解凍太守潔齋親自執事作脯廣一尺長五寸既祀訖取㤗山君夫人坐前脯三十朐太守拜章縣次驛馬傳送雒陽三十二年正月上齋夜讀河圖㑹昌符曰赤劉之九㑹命岱宗不慎克用何益於承誠善用之姦偽不萌感此文乃詔松等復案索河雒䜟文言九世封禪事者松等列奏乃許焉東觀書曰羣臣奏言登封告成為民報徳百王所同陛下輙拒絶不許臣下不敢頌功述徳業河雒誡書赤漢九世當廵封㤗山凡三十六事傳奏左帷陛下遂以仲月令辰遵岱嶽之正禮奉圖雒之明文以和靈瑞以為兆民上曰至㤗山乃復議國家徳薄灾異仍至圖䜟盖如此初孝武帝欲求神仙以扶方者言黄帝由封禪而後僊於是欲封禪封禪不常時人莫知元封元年上以方士言作封禪器以示羣儒多言不合於古於是罷諸儒不用三月上東上㤗山郭璞注山海經曰㤗山從山下至頭四十八里二百歩乃上石立之㤗山顛風俗通曰石高二丈一尺刻之曰事天以禮立身以義事父以孝成民則仁四海之内莫不為郡縣四夷八蠻咸来貢職與天無極人民蕃息天禄永得遂東廵海上求僊人無所見而還四月封㤗山風俗通曰封廣丈二尺髙九尺下有玉牒書也恐所施用非是乃祕其事語在漢書郊祀志東觀書曰上至㤗山有司復奏河雒圖記表章赤漢九世尤著明者前後凡三十六事與博士充等議以為殷統未絶黎庶繼命高宗乆勞猶為中興武王因父受命之列據三代郊天因孔子甚美其功後世謂之聖王漢統中絶王莽盗位一民莫非其臣尺土靡不其有宗廟不祀十有八年陛下無十室之資奮振於匹夫除殘去賊興復祖宗集就天下海内治平夷狄慕義功徳盛於高宗武王冝封禪為百姓祈福請親}
