  - {type: variant, offset: 2049, length: 217, content: 又詔常北擊河閒漁陽平諸屯聚五年秋攻拔湖陵又與帝會任城因從破蘇茂龐萌進攻下邳常部當城門戰一日數合賊反走入城常追迫之城上射矢雨下帝從百餘騎自城南高處望常戰力甚馳遣中黃門詔使引還賊遂降又別率騎都尉王霸共平沛郡賊六年春徵還洛陽令夫人迎常於舞陽歸家上冢西屯長安拒隗囂七年使使者持璽書即拜常為橫野大將軍位次與諸將絕席常別擊破隗囂將高峻於朝那囂遣將過烏氏常要擊破之轉降保塞羌諸營壁皆平之九年擊內黃賊破降之後北屯故安拒盧芳十二年薨于屯所謚曰節侯子廣嗣, WYG: 建武}
