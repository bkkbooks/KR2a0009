  - {type: variant, offset: 5376, length: 0, content: '', WYG: 居亭百官布野比曰山上雲氣成宫闕百官並見之二十一日夕牲時白氣廣一丈東南極望致濃厚時天清和無雲瑞命篇岱嶽之瑞以日為應也二十二日辛卯晨燎祭天於㤗山下南方羣神皆}
  - {type: variant, offset: 5376, length: 0, content: '', krp: 居亭百官布野比曰山上雲氣成宫闕百官並見之二十一日夕牲時白氣廣一丈東南極望致濃厚時天清和無雲瑞命篇岱嶽之瑞以日為應也二十二日辛卯晨燎祭天於㤗山下南方羣神皆}
  - {type: variant, offset: 5377, length: 1, content: 讖, WYG: 用樂如南郊封禪儀曰晨祭也日高三丈所燔燎燔燎煙正北也諸王王者後二公孔子後褒成君皆助祭位事也封禪儀曰百官各以决上郡儲輦三百為貴臣諸公王侯卿大夫百官皆歩上}
  - {type: variant, offset: 5377, length: 1, content: 讖, krp: 用樂如南郊封禪儀曰晨祭也日高三丈所燔燎燔燎煙正北也諸王王者後二公孔子後褒成君皆助祭位事也封禪儀曰百官各以决上郡儲輦三百為貴臣諸公王侯卿大夫百官皆歩上}
