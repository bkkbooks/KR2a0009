  - {type: variant, offset: 5371, length: 4, content: 鄧豪贍舍, WYG: 斯燔詩書樂崩禮壊建武元年已前文書散亡舊典不具不能明經文以章句細㣲相況八十一卷明者為驗又其十卷皆不昭晢子貢欲去告朔之餼羊子曰賜也爾愛其羊我愛其禮後有聖人正失誤刻石記封禪儀曰車駕十九日之山虞國}
