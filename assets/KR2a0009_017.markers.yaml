  - {type: variant, offset: 5370, length: 0, content: '', WYG: 劉秀發兵捕不道四夷雲集龍鬭野四七之際火為主河圖㑹昌符曰赤帝九世廵省得中治平則封誠合帝道孔矩則天文靈出地祗瑞興帝劉之九㑹命岱宗誠善用之姦偽不萌赤漢徳興九世㑹昌廵岱皆當天地扶九崇經之常漢大興之道在九世之王封於㤗山刻石著記禪於梁父退省考五河圖合古篇曰帝劉之秀九名之世帝行徳封刻政河圖提劉子曰九世之帝方明聖持衡拒九州平天下予雒書甄曜度曰赤三徳昌九世㑹修符合帝際勉刻封孝經鉤命決曰予誰行赤劉用帝三建孝九㑹修専兹竭行封岱青河雒命后經䜟所傳昔在帝堯聰明密㣲譲與舜庶後裔握機王莽以舅后之家三司鼎足冢宰之權勢依託周公霍光輔㓜歸政之義遂以篡叛僭號自立宗廟隳壊社稷喪亡不得血食十有八年楊徐青三州首亂兵革横行延及荆州豪傑并兼百里屯聚徃徃僣號北夷作㓂千里無煙無鷄鳴犬吠之聲皇天睠顧皇帝以匹庶受命中興年二十八載興兵起是以中次誅討十有餘年罪人則斯得黎庶得居爾田安爾宅書同文車同軌人同倫舟輿所通人跡所至靡不貢職建明堂立辟雍起靈臺設庠序同律度量衡孔安國書注曰同音律也度丈尺量斗斛衡觔兩也修五禮孔安國曰公侯伯子男朝聘之禮范寗曰吉凶軍賔嘉也五玉范寗曰五等諸侯之瑞珪璧也三帛孔安國曰諸侯世子執纁公之孤執𤣥附庸之君執黄范寗曰𤣥纁黄三孤所執二牲范寗曰羔鴈也卿執羔大夫執鴈一死雉也士所執䞇范寗曰總謂上所執之以為䞇者也吏各修職復於舊典在位三十有二年年六十二乾乾日昃不敢荒寜渉危歴險親廵黎元恭肅神祗惠恤耆老理庶遵古聰允明恕皇帝唯慎河圖雒書正文是月辛卯柴登封㤗山甲午禪於梁隂以承靈瑞以為兆民永兹一宇垂於後昆百僚從臣郡守師尹咸䝉祉福永永無極秦相}
