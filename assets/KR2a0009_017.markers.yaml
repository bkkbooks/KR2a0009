  - {type: variant, offset: 652, length: 0, content: '', WYG: 夫望亞卿望道外徑二歩壇廣一丈五尺髙一尺五寸十為周道大夫望之外徑九步士望亞大夫望道外徑五歩壇廣一丈髙一尺為周道士望之外徑九歩庶望亞士望道外徑九歩壇廣五尺髙五寸為周道庶望之外徑九歩凡天宗上帝宫壇營徑三里周九里營三重通八方歩后土壇方五丈六尺茅營去壇十歩外土營方二百限之其五零壇土茅營如上帝五神去營歩數神道四通廣各十歩宫内道廣各二丈有闕為周道后土宫外徑九歩營岱宗西門之外河北門之外海東門之外徑各六十歩壇方二丈高二尺為周道前望之外徑六歩列望亞前望道外三十六歩壇廣一丈五尺髙一尺五寸五為周道列望之外徑六歩卿望亞列望道外徑二十歩壇廣一丈高一尺十為周道卿望之外徑六歩大夫望亞卿望道之外徑九歩壇廣八尺高八寸為周道大夫望之外徑六歩士望亞大夫望道外徑十二歩壇廣六尺高六寸為周道士望之外徑六歩凡地宗后土宫壇營方二里周八里營再重道四通常以嵗之孟春正月上辛若丁親郊祭天南郊以地配望秩山川徧于羣神天地位皆南鄉同席地差共東共牢而食太宗高皇帝高后配于壇上西鄉后在北亦同席共牢而食日冬至使有}
