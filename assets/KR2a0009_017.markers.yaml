  - {type: variant, offset: 5334, length: 2, content: 嗣桓, WYG: 賁郎将先上山三案行還益治道徒千人十五日始齋國家居太守府舍諸王居府中諸侯在縣庭中齋諸卿校尉将軍大夫黄門郎百官及宋公衛公褒成侯東方諸侯雒中小侯齋城外汶水上太尉太常齋山虞馬第伯自云某等七十人先之山虞觀祭山壇及故明堂宫郎官等郊四處入其幕府觀治石石二枚状博平圖九尺此壇上石也其一石武}
