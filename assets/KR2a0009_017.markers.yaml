  - {type: variant, offset: 5341, length: 10, content: 校尉弟豔字季德少好學, WYG: 行徃徃道峻峭不騎歩牽馬乍歩乍騎且相半至中觀留馬去平地二十里南向極望無不覩仰望天闗如從谷底仰觀抗峰其為高也如視浮雲其峻也石壁窅窱如無道徑遥望其人端如行朽兀或為白石或雪久之白者移過樹乃知是人也殊不可上四布僵臥石上有頃復蘓亦頼齎酒脯處處有泉水目輙為之明復勉強相将行到天闗自以已至也問道中人言尚十餘里其道旁山脅大者廣八九尺狹者五六尺仰視巖石松樹鬱鬱蒼蒼若在雲中俛視谿谷碌碌不可見丈尺遂至天門之}
