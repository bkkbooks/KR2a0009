  - {type: variant, offset: 3943, length: 294, content: 弇趙匡明年攻拔落門隗囂支黨周宗趙恢及天水屬縣皆降初王莽世羌虜多背叛而隗囂招懷其酋豪遂得為用及囂亡後五谿先零諸種數為寇掠皆營塹自守州郡不能討歙乃大修攻具率蓋延劉尚及太中大夫馬援等進擊羌於金城大破之斬首虜數千人獲牛羊萬餘頭穀數十萬斛又擊破襄武賊傅栗卿等隴西雖平而人飢流者相望歙乃傾倉廩轉運諸縣以賑贍之於是隴右遂安而涼州流通焉十一年歙與蓋延馬成進攻公孫述將王元環安於河池下辯辨陷之乘勝遂進蜀人大懼使刺客刺歙未殊馳召蓋延延見歙因伏悲哀不能仰視歙叱延曰虎牙何敢然今使者中刺客無以報國故呼巨卿欲相屬以軍事而反效兒女子涕泣乎刃雖在身不能勒兵斬公邪延收淚強起受所誡歙自書表曰臣夜人定後為何人所賊傷中臣要害, WYG: 從此羣}
