  - {type: variant, offset: 2347, length: 336, content: 劉秀當為天子或曰是國師公劉秀乎光武戲曰何用知非僕邪坐者皆大笑晨心獨喜及光武與家屬避吏新野舍晨廬甚相親愛晨因謂光武曰王莽悖暴盛夏斬人此天亡之時也往時會宛獨當應邪光武笑不荅及漢兵起晨將賓客會棘陽漢兵敗小長安諸將多亡家屬光武單馬遁走遇女弟伯姬與共騎而奔前行復見元趣令上馬元以手撝曰行矣不能相救無為兩沒也會追兵至元及三女皆遇漢兵退保棘陽而新野宰乃汙晨宅焚其冢墓宗族皆恚怒曰家自富足何故隨婦家人入湯鑊中晨終無恨色更始立以晨為偏將軍與光武略地潁川俱夜出昆陽城擊破王尋王邑又別徇陽翟以東至京密皆下之更始北都洛陽以晨為常山太守會王郎反光武自薊走信都晨亦閒行會於鉅鹿下自請從擊邯鄲光武曰偉卿以一身從我不如以一郡為我北道主人乃遣晨歸郡光武追銅馬高胡羣賊於冀州晨發積射士千人又遣委輸給軍不絕光武, WYG: ''}
