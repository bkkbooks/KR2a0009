  - {type: variant, offset: 5379, length: 1, content: 公, WYG: 用輦輦者干寳周禮注曰對轝曰輦事畢将升封或曰㤗山}
  - {type: page-break, offset: 5379, content: '', id: KR2a0009_WYG_017-14a, image: WYG0252/WYG0252-0275a.png}
  - {type: variant, offset: 5379, length: 1, content: 公, krp: 用輦輦者干寳周禮注曰對轝曰輦事畢将升封或曰㤗山}
  - {type: variant, offset: 5381, length: 1, content: 孚, WYG: 已從食於柴祭今親升告功冝有禮祭於是使謁者以一特牲於常祠㤗山處告祠㤗山如親耕貙劉先祠先農先虞故事至食時御輦升山封禪儀曰國家御首輦人輓升山至中觀休須㬰復上日中後到山上更衣封禅儀曰湏臾羣臣畢就位早晡時即位於壇北靣羣臣以次陳後西上畢位升壇封禅儀曰國家臺上北靣虎賁陛㦸臺下尚書令奉玉牒檢皇帝以寸二分璽親封之訖太常命人發壇上石封禅儀曰騶騎三千餘人發壇上方石尚書令藏玉牒已復石覆訖尚書令以五寸印封石檢封禅儀曰以金為繩以石三檢東方西方各三檢檢中石泥及壇土色赤白黒各依如其方色事畢皇帝再拜羣臣稱萬嵗封禪儀曰稱萬嵗音動山谷有氣屬天遥望不見山巔山巔人在氣中不知也命人立所刻石碑乃復道下封禪儀曰封畢有頃詔百官以次下國家隨後數百人維持行相逢推百官連延二十餘里道多廹小深谿高岸數百丈歩從匍匐邪上起近炬火止亦駱驛歩從觸擊大石石聲正讙但讙石無相應和者腸不能已口不能黙夜半後到百官明旦乃訖其中老者氣劣不能行卧巖石下明日早太醫令復遵問起居國家云昨上下山欲行廹前欲休則後人所蹈道峻危險恐不能度國家不勞百官以下露卧水飲無一人蹉跌無一人疾病豈非天邪㤗山率多㬥雨如今上直下柴祭封登清晏溫和明日上壽賜百官省事事畢發暮宿奉高三十里明日發至梁甫九十里夕牲二十五日甲午禪祭地於梁隂以高后配山川羣神從如元始中北郊故事服䖍曰禪廣土地項威曰除地為墠後改墠曰禪神之矣封禪儀曰功効如彼天應如此羣臣上壽國家不聼四月己卯大赦天下以建武三十二年為建武中元元年復博奉高嬴勿出元年租芻槀以吉日刻玉牒書函藏金匱璽印封之乙酉使太尉行事以特告至高廟虞典曰歸格於㙯祖用特太尉奉匱以告高廟藏於廟室西壁石室高主室之下袁宏曰夫天地者萬物之官府山川者雲雨之丘墟萬物生遂則官府之功大雲雨施潤則丘墟之徳厚故化洽天下則功配於天地澤流一國則徳合於山川是以王者經畧必以天地為本諸侯述職必以山川為主體而象之取其陶育禮而告之歸其}
