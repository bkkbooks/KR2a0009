  - {type: line-break, offset: 6, content: '', id: ZHSJ__dup4456}
  - {type: variant, offset: 13, length: 398, content: 五李通字次元南陽宛人也世以貨殖著姓父守身長九尺容貌絕異為人嚴毅居家如官廷初事劉歆好星歷讖記為王莽宗卿師通亦為五威將軍從事出補巫丞有能名莽末百姓愁怨通素聞守說讖云劉氏復興李氏為輔私常懷之且居家富逸為閭里雄以此不樂為吏乃自免歸及下江新巿兵起南陽騷動通從弟軼亦素好事乃共計議曰今四方擾亂新室且亡漢當更興南陽宗室獨劉伯升兄弟汎愛容衆可與謀大事通笑曰吾意也會光武避事吏在宛通聞之即遣軼往迎光武光武初以通士君子相慕也故往荅之及相見共語移日握手極歡通因具言讖文事光武初殊不意未敢當之時守在長安光武乃微觀通曰即如此當如宗卿師何通曰已自有度矣因復備言其計光武既深知通意乃遂相約結定謀議期以材官都試騎士日欲劫前隊大夫及屬正因以號令大衆乃使光武與軼歸舂陵舉兵以相應遣從兄子季之長安以事報守季於道病死守密知之欲亡歸素與邑人黃顯相善時顯為中郎將聞之謂守曰今關門禁嚴君狀貌非凡將以此安之不知詣闕自歸事既未然脫可免禍守從其計即, WYG: 七祭祀}
