  - {type: variant, offset: 644, length: 0, content: '', WYG: 元年光武即位于鄗為壇營于鄗之陽春秋保乾圖曰建天子於鄗之陽名曰行皇祭告天地采用元始中郊祭故事六宗羣神皆從未以祖配天地共犢餘牲尚約黄圖載元始儀最悉曰元始四年宰衡莽奏曰帝王之義莫大承天承天之序莫重於郊祀祭天於南就陽位祀地於北主隂義圜丘象天方澤則地圜方因體南北從位燔燎升氣瘞埋就類牲欲繭栗味尚清𤣥器成匏勺貴誠因質天地神所統故類乎上帝禋于六宗望秩山川班于羣神皇天后土隨王所在而事祐焉甘泉太隂河東少陽咸失厥位不合禮制聖王之制必上當天心下合地意中考人事故曰愷悌君子求福不回回而求福厥路不通在易㤗卦乾坤合體天地交通萬物聚出其律太簇天子親郊天地先祖配天先妣配地隂陽之别以日冬至祀天夏至祀后土君不省方而使冇司六宗日月星山川海星則北辰川即河山岱宗三光衆明山阜百川衆流渟汙臯澤以類相屬各數秋望相序於是定郊祀祀長安南北郊罷甘泉河東祀上帝壇園八觚徑五丈高九尺茅營去壇十歩竹宫徑三百歩土營徑五百歩神靈壇各於其方靣三丈去茅營}
