  - {type: variant, offset: 637, length: 2, content: 徵通, WYG: 告天郊封禪祭祀之道自生民以來則有之矣豺獺知祭祀而况人乎故人知之至於念想猶豺獺之自然也顧古質畧而後文飾耳自古以來王公所}
  - {type: variant, offset: 637, length: 2, content: 徵通, krp: 告天郊封禪祭祀之道自生民以來則有之矣豺獺知祭祀而况人乎故人知之至於念想猶豺獺之自然也顧古質畧而後文飾耳自古以來王公所}
  - {type: variant, offset: 640, length: 2, content: 衞尉, WYG: 羣祀至於王莽漢書郊祀志既著矣故今但列自中興以來所修用者以為祭祀志謝沈書曰蔡邕引中興以來所脩者為祭祀志即邕之意也}
