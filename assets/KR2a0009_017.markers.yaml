  - {type: variant, offset: 2686, length: 4, content: 晨房子侯, WYG: 禅㤗山服虔注漢書曰封者増天之高歸功於天張晏云天高不可及於㤗山上立封禅而祭之冀近神靈也項威注曰封㤗山告太平升中和之氣於天祭土為封謂負土於㤗山為壇而祭也禮記曰因名山升中于天盧植注曰封㤗山告太平升中和之氣於天也東觀書載太尉趙熹上言曰自古}
