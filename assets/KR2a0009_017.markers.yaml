  - {type: variant, offset: 4635, length: 690, content: 皇太子驚病不安避幸安帝乳母野王君王聖舍太子乳母王男廚監邴吉等以為聖舍新繕修犯土禁不可久御聖及其女永與大長秋江京及中常侍樊豐王男邴吉等互相是非聖永遂誣譖男吉皆幽囚死家屬徙比景太子思男等數為歎息京豐懼有後害妄造虛無構讒太子及東宮官屬帝怒召公卿以下會議廢立耿寶等承旨皆以為太子當廢歷與太常桓焉廷尉張皓議曰經說年未滿十五過惡不在其身且男吉之謀皇太子容有不知宜選忠良保傅輔以禮義廢置事重此誠聖恩所宜宿留帝不從是日遂廢太子為濟陰王時監太子家小黃門籍建中傅高梵等皆以無罪徙朔方歷乃要結光祿勳祋諷宗正劉瑋將作大匠薛皓侍中閭丘弘陳光趙代施延太中大夫朱倀第五頡中散大夫曹成諫議大夫李尤符節令張敬持書侍御史龔調羽林右監孔顯城門司馬徐崇衞尉守丞樂闈長樂未央令鄭安世等十餘人俱詣鴻都門證太子無過龔調據法律明之以為男吉犯罪皇太子不當坐帝與左右患之乃使中常侍奉詔脅羣臣曰父子一體天性自然以義割恩為天下也歷諷等不識大典而與羣小共為讙譁外見忠直而內希後福飾邪違義豈事君之禮朝廷廣開言事之路故且一切假貸若懷迷不反當顯明刑書諫者莫不失色薛皓先頓首曰固宜如明詔歷怫然廷詰皓曰屬通諫何言而今復背之大臣乘朝車處國事固得輾轉若此乎乃各稍自引起歷獨守闕連日不肯去帝大怒乃免歷兄弟官削國租黜公主不得會見歷遂杜門不與親戚通時人為之震慄及帝崩閻太后起歷為將作大匠順帝即位朝廷咸稱社稷臣於是遷為衞尉祋諷劉瑋閭丘弘等先卒皆拜其子為郎朱倀施延陳光趙代等並為公卿任職徵王男邴吉家屬還京師厚加賞賜籍建高梵等悉蒙顯擢永建元年拜歷車騎將軍弟祉為步兵校尉超為黃門侍郎三年母長公主薨歷稱病歸第服闋復為大鴻臚陽嘉二年卒官子定嗣定尚安帝妹平氏長公主順帝時為, WYG: ''}
