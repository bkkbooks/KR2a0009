  - {type: variant, offset: 5, length: 7, content: 五李王鄧來列傳, WYG: 七梁剡令劉昭補并注祭祀志}
  - {type: variant, offset: 5, length: 7, content: 五李王鄧來列傳, krp: 七梁剡令劉昭補并注祭祀志}
  - {type: xml-element, offset: 6, content: '', id: KR2a0009_ZHSJ_017-bkkxmlele1}
