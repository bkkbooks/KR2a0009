  - {type: variant, offset: 3298, length: 428, content: 帝謀西收囂兵與俱伐蜀復使歙喻旨囂將王元說囂多設疑故久冘豫不決歙素剛毅遂發憤質責囂曰國家以君知臧否曉廢興故以手書暢意足下推忠誠遣伯春委質是臣主之交信也今反欲用佞惑之言為族滅之計叛主負子違背忠信乎吉凶之決在於今日欲前刺囂囂起入部勒兵將殺歙歙徐杖節就車而去囂愈怒王元勸囂殺歙使牛邯將兵圍守之囂將王遵諫曰愚聞為國者慎器與名為家者畏怨重禍俱慎名器則下服其命輕用怨禍則家受其殃今將軍遣子質漢內懷它志名器逆矣外人有議欲謀漢使輕怨禍矣古者列國兵交使在其閒所以重兵貴和而不任戰也何況承王命籍重質而犯之哉君叔雖單車遠使而陛下之外兄也害之無損於漢而隨以族滅昔宋執楚使遂有析骸易子之禍小國猶不可辱況於萬乘之主重以伯春之命哉歙為人有信義言行不違及往來游說皆可案覆西州士大夫皆信重之多為其言故得免而東歸八年春歙與征虜將軍祭遵襲略陽遵道病還分遣精兵隨歙合二千餘人伐山飪從番須回中徑至略陽斬囂守將金梁因保其城囂大驚曰何其神也乃悉兵數萬人圍略陽斬山築堤激水灌城歙與將士固死堅守矢盡乃發屋斷木, WYG: 羣司禮官咸}
