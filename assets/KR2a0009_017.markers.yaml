  - {type: variant, offset: 5383, length: 1, content: 卿, WYG: 本書日東廵狩至於岱宗柴傳曰郊祀后稷以祈農事夫廵狩觀化之常事祈農撫民之定業猶潔誠殷薦以告昊天况創制改物人神易聼者乎夫揖讓受終必有至徳於天下征伐革命則有大功於萬物是故王者初基則有封禪之事盖以其成功告於神明者也夫東方者萬物之所始山嶽者靈氣之所宅故求之物本必於其始取其所通必於所宅崇其壇場則謂之封明其代興則謂之禪然則封禪者王者開務之大禮也徳不周洽不得輙議斯事功不𢎞濟不得髣髴斯禮曠代一有其道至高故自黄帝堯舜至三代各一得封禪}
