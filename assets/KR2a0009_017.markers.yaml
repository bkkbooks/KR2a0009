  - {type: variant, offset: 5352, length: 10, content: 士開館養徒少歷顯位靈, WYG: 仰視天門窔遼如從穴中視天直上七里頼其羊腸逶迤名曰環道徃徃有絙索可得而登也兩從者扶挾前人相牽後人見前人履底前人見後人頂如畫重累人矣所謂磨胸捏石捫天之難也初上此道行十餘歩一休稍疲咽脣燋五六歩一休牒牒據頓地不避濕暗前有燥地目視而兩脚不隨早食上晡後到天門郭使者得銅物銅物形状如鍾又方柄有孔莫能識也疑封禪具也得之者汝南召陵人姓楊名通東上一里餘得木甲木甲者武}
