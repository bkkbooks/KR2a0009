  - {type: variant, offset: 4387, length: 247, content: 改汝南之當鄉縣為征羌國焉子襃嗣十三年帝嘉歙忠節復封歙弟由為宜西侯襃子稜尚顯宗女武安公主稜早歿襃卒以稜子歷為嗣論曰世稱來君叔天下信士夫專使乎二國之閒豈厭詐謀哉而能獨以信稱者良其誠心在乎使兩義俱安而己不私其功也歷字伯珍少襲爵以公主子永元中為侍中監羽林右騎永初三年遷射聲校尉永寧元年代馮石為執金吾延光元年尊歷母為長公主二年遷歷太僕明年中常侍樊豐與大將軍耿寶侍中周廣謝惲等共讒陷太尉楊震震遂自殺歷謂侍御史虞詡曰耿寶託元舅之親榮寵過厚不念報國恩而傾側姦臣誣奏楊公傷害忠良其天禍亦將至矣遂絕周廣謝惲不與交通, WYG: 承詔祭山及梁父}
