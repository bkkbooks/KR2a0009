  - {type: variant, offset: 821, length: 1138, content: 夫安不忘危宜令通居職療疾欲就諸侯不可聽於是詔通勉致醫藥以時視事其夏引拜為大司空通布衣唱義助成大業重以寧平公主故特見親重然性謙恭常欲避權埶素有消疾自為宰相謝病不視事連年乞骸骨帝每優寵之令以公位歸第養疾通復固辭積二歲乃聽上大司空印綬以特進奉朝請有司奏請封諸皇子帝感通首創大謀即日封通少子雄為召陵侯每幸南陽常遣使者以太牢祠通父冢十八年卒謚曰恭侯帝及皇后親臨弔送葬子音嗣音卒子定嗣定卒子黃嗣黃卒子壽嗣李軼後為朱鮪所殺更始之敗李松戰死唯通能以功名終永平中顯宗幸宛詔諸李隨安衆宗室會見並受賞賜恩寵篤焉論曰子曰富與貴是人之所欲不以其道得之不處也李通豈知夫所欲而未識以道者乎夫天道性命聖人難言之況乃億測微隱猖狂無妄之福汙滅親宗以觖一切之功哉昔蒙穀負書不徇楚難即墨用齊義雪燕恥彼之趣舍所立其殆與通異乎王常字顏卿潁川舞陽人也王莽末為弟報仇亡命江夏久之與王鳳王匡等起兵雲杜綠林中聚衆數萬人以常為偏裨攻傍縣後與成丹張卬別入南郡藍口號下江兵王莽遣嚴尤陳茂擊破之常與丹卬收散卒入蔞谿劫略鍾龍閒衆復振引軍與荊州牧戰於上唐大破之遂北至宜秋是時漢兵與新巿平林衆俱敗於小長安各欲解去伯升聞下江軍在宜秋即與光武及李通俱造常壁曰願見下江一賢將議大事成丹張卬共推遣常伯升見常說以合從之利常大悟曰王莽篡弒殘虐天下百姓思漢故豪傑並起今劉氏復興即真主也誠思出身為用輔成大功伯升曰如事成豈敢獨饗之哉遂與常深相結而去常還具為丹卬言之丹卬負其衆皆曰大丈夫既起當各自為主何故受人制乎常心獨歸漢乃稍曉說其說將帥曰往者成哀衰微無嗣故王莽得承閒篡位既有天下而政令苛酷積失百姓之心民之謳吟思漢非一日也故使吾屬因此得起夫民所怨者天所去也民所思者天所與也舉大事必當下順民心上合天意功乃可成若負強恃勇觸情恣欲雖得天下必復失之以秦項之埶尚至夷覆況今布衣相聚草澤以此行之滅亡之道也今南陽諸劉舉宗起兵觀其來議事者皆有深計大慮王公之才與之并合必成大功此天所以祐吾屬也下江諸將雖屈強少識然素敬常乃皆謝曰無王將軍吾屬幾陷於不義願敬受教即引兵與漢軍及新巿平林合於是諸部齊心同力銳氣益壯遂俱進破殺甄阜梁丘賜及諸將議立宗室唯常與南陽士大夫同意欲立伯升而朱鮪張卬等不聽及更始立以常為廷尉大將軍封知命侯別徇汝南沛郡還入昆陽與光武共擊破王尋王邑更始西都長安以常行南陽太守事令專命誅賞封為鄧王食八縣賜姓劉氏常性恭儉遵法度南方稱之更始敗建武二年夏常將妻子詣洛陽肉袒自歸光武見常甚歡勞之曰王廷尉良苦每念往時共更艱戹何日忘之莫往莫來豈違平生之言乎常頓首謝曰臣蒙大命得以鞭策託身陛下始遇宜秋後會昆陽幸賴靈武輒成斷金更始不量愚臣任以南州赤眉之難喪心失望以為天下復失綱紀聞陛下即位河北心開目明今得見闕庭死無遺恨帝笑曰吾與廷尉戲耳吾見廷尉不憂南方矣乃召公卿將軍以下大會具為羣臣言常以匹夫, WYG: 秀發憤}
