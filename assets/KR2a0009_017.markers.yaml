  - {type: 'tls:seg', offset: 2699, content: '', id: KR2a0009_ZHSJ_017-d17p20s25}
  - {type: variant, offset: 2701, length: 511, content: 謚元為新野節義長公主立廟于縣西封晨長子汎為吳房侯以奉公主之祀建武三年徵晨還京師數讌見說故舊平生為歡晨從容謂帝曰僕竟辯辦之帝大笑從幸章陵拜光祿大夫使持節監執金吾賈復等擊平邵陵新息賊四年從幸壽春留鎮九江晨好樂郡職由是復拜為中山太守吏民稱之常為冀州高第十三年更封南侯入奉朝請復為汝南太守十八年行幸章陵徵晨行廷尉事從至新野置酒酣讌賞賜數百十千萬復遣歸郡晨興鴻郤陂數千頃田汝土以殷魚稻之饒流衍它郡明年定封西華侯復徵奉朝請二十五年卒詔遣中謁者備公主官屬禮儀招迎新野主魂與晨合葬於北芒乘輿與中宮親臨喪送葬謚曰惠侯小子棠嗣後徙封武當棠卒子固嗣固卒子國嗣國卒子福嗣永建元年卒無子國除來歙字君叔南陽新野人也六世祖漢有才力武帝世以光祿大夫副樓船將軍楊僕擊破南越朝鮮父仲哀帝時為諫大夫娶光武祖姑生歙光武甚親敬之數共往來長安漢兵起王莽以歙劉氏外屬乃收繫之賓客共篡奪得免更始即位以歙為吏從入關數言事不用以病去歙女弟為漢中王劉嘉妻嘉遣人迎歙因南之漢中更始敗歙勸嘉歸光武遂與嘉俱東詣洛陽帝見歙大歡即解衣以衣之拜為太中大夫是時方以隴蜀為憂獨謂歙曰今西州未附子陽稱帝道里阻遠諸將方務關東思西州方略未知所任其謀若何歙因自請曰臣嘗與隗囂相遇長安其人始起以漢為名今, WYG: 禅}
