  - {type: variant, offset: 5333, length: 0, content: '', WYG: 廵祭封禪徳薄而任重一則以喜一則以懼喜於得承鴻業帝堯善及子孫之餘賞恭應圖録當得是賞懼於過差執徳不𢎞信道不篤為議者所誘進後世知吾罪深矣上許梁松等奏乃求元封時封禪故事議封禪所施用有司奏當用方石再累置壇中皆方五尺厚一尺用玉牒書藏方石牒厚五寸長尺三寸廣五寸有玉檢又用石檢十枚列於石傍東西各三南北各二皆長三尺廣一尺厚七寸檢中刻三處深四寸方五寸有盖檢用金縷五周以水銀和金以為泥玉璽一方寸二分一枚方五寸方石四角又有距石皆再累枚長一丈厚一尺廣二尺皆在圓壇上其下用距石十八枚皆高三尺厚一尺廣二尺如小碑環壇立之去壇三歩距石下皆有石跗入地四尺又用石碑高九尺廣三尺五寸厚尺二寸立壇丙地去壇三丈以上以刻書上以用石功難又欲及二月封故詔松欲因故封石空檢更加封而已欲及二月者虞書嵗二月東廵狩至於岱宗柴范寗曰廵狩者廵行諸侯所守二月直卯故以東廵狩也祭山曰燔柴積柴加牲於其上而燔之也松上疏爭之以為登封之禮告功皇天垂後無窮以為萬民也承天之敬尤冝章明奉圖書之瑞尤冝顯著今因舊封竄寄玉牒故石下恐非重命之義受命中興冝當特異以明天意遂使㤗山郡及魯趣石工冝取完青石無必五色時以印工不能刻玉牒欲用丹漆書之㑹求得能刻玉者遂書書祕刻方石中命容玉牒二月上至奉高應劭漢官馬第伯封禪儀記曰車駕正月二十八日發雒陽宫二月九日到魯遣守謁者郭堅伯将徒五百人治太山道十日魯遣宗室諸劉及孔氏瑕丘丁氏上壽受賜皆詣孔氏宅賜酒肉十一日發十二日宿奉高是日遣}
