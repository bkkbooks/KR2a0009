  - {type: variant, offset: 1962, length: 2, content: 明于, WYG: 破王邑百萬衆於昆陽誅王郎銅馬赤眉青犢賊平定天下海内䝉恩上當天心下為元元所歸䜟記曰劉秀發兵捕不道卯金修徳為天子秀猶固辭至於再至於三羣下曰皇天大命不可稽留敢不敬承二年正月初制郊兆於雒陽城南七里依鄗采元始中故事為圓壇八陛中又為重壇天地位其上皆南鄉西上其外壇上為五帝位青帝位在甲寅之地赤帝位在丙已之地黄帝位在丁未之地白帝位在庚申之地黒帝位在壬亥之地其外為壝重營皆紫以像紫宫有四通道以為門日月在中營内南道日在東月在西北斗在北道之西皆别位不在羣神列中八陛陛五十八醊合四百六十四醊五帝陛郭帝七十二醊合三百六十醊中營四門門五十四神合二百一十六神外營四門門百八神合四百三十二神皆背營内鄉中營四門門封神四外營四門門封神四合三十二神凡千五百一十四神營即壝也封封土築也背中營神五星也及中宫宿五官神及五嶽之屬也背外營神二十八宿外宫星雷公先農風伯雨師四海四瀆名山大川之屬也至七年五月詔三公曰漢當郊堯其與卿大夫博士議時侍御史杜林上疏以為漢起不因緣堯與殷周異冝而舊制以高帝配方軍師在外且可如元年郊祀故事上從之語在林傳東觀書載杜林上䟽悉於本傳曰臣聞營河雒以為民刻肌膚以為刑封疆畫界以建諸侯井田什一以供國用三代之所同及至漢興因時冝趨世務省煩苛取實事不苟貪高亢之論是以去土中之京師就闗内之逺都除肉刑之重律用髠鉗之輕法郡縣不置世禄之家農人三十而取一政卑易行禮簡易從民無愚智思仰漢徳樂承漢祀基業特起不因緣堯堯逺於漢民不曉信言提其耳終不悦諭后稷近於周民户}
