  - {type: variant, offset: 2837, length: 935, content: 年漢病篤車駕親臨問所欲言對曰臣愚無所知識唯願陛下慎無赦而已及薨有詔悼愍賜謚曰忠侯發北軍五校輕車介士送葬如大將軍霍光故事子哀侯成嗣為奴所殺二十八年分漢封為三國成子旦為灈陽侯以奉漢嗣旦弟盱為筑陽侯成弟國為新蔡侯旦卒無子國除建初八年徙封盱為平春侯以奉漢後盱卒子勝嗣初漢兄尉為將軍從征戰死封尉子彤為安陽侯帝以漢功大復封弟翕為襃親侯吳氏侯者凡五國初漁陽都尉嚴宣與漢俱會光武於廣阿光武以為偏將軍封建信侯論曰吳漢自建武世常居上公之位終始倚愛之親諒由質簡而彊力也子曰剛毅木訥近仁斯豈漢之方乎昔陳平智有餘以見疑周勃資朴忠而見信夫仁義不足以相懷則智者以有餘為疑而朴者以不足取信矣蓋延字巨卿漁陽要陽人也身長八尺彎弓三百斤邊俗尚勇力而延以氣聞歷郡列掾州從事所在職辦彭寵為太守召延署營尉行護軍及王郎起延與吳漢同謀歸光武延至廣阿拜偏將軍號建功侯從平河北光武即位以延為虎牙將軍建武二年更封安平侯遣南擊敖倉轉攻酸棗封丘皆拔其夏督駙馬都尉馬武騎都尉劉隆護軍都尉馬成偏將軍王霸等南伐劉永先攻拔襄邑進取麻鄉遂圍永於睢陽數月盡收野麥夜梯其城入永驚懼引兵走出東門延追擊大破之永棄軍走譙延進攻拔薛斬其魯郡太守而彭城扶陽杼秋蕭皆降又破永沛郡太守斬之永將蘇茂佼彊周建等三萬餘人救永共攻延延與戰於沛西大破之永軍亂遁沒溺死者太半永棄城走湖陵蘇茂奔廣樂延遂定沛楚臨淮修高祖廟置嗇夫祝宰樂人三年睢陽復反城迎劉永延復率諸將圍之百日收其野穀永乏食突走延追擊盡得輜重永為其將所殺永弟防舉城降四年春延又擊蘇茂周建於蘄進與董憲戰留下皆破之因率平敵狄將軍龐萌攻西防拔之復追敗周建蘇茂於彭城茂建亡奔董憲董憲將賁休舉蘭陵城降憲聞之自郯圍休時延及龐萌在楚請往救之帝勑曰可直往擣郯則蘭陵必自解延等以賁休城危遂先赴之憲逆戰而陽敗延等遂逐退因拔圍入城明日憲大出兵合圍延等懼遽出突走因往攻郯帝讓之曰閒欲先赴郯者以其不意故耳今既奔走賊計已立圍豈可解乎延等至郯果不能克而董憲遂拔蘭陵殺賁休延等往來要擊憲別將於彭城郯邳之閒戰或日數合頗有剋獲帝以延輕敵深入數以書誡之及龐萌反攻殺楚郡太守引軍襲敗延延走北度泗水破舟檝壞津梁僅而得免帝自將而東徵延與大司馬吳漢漢忠將軍王常前將軍王梁捕虜將軍馬武討虜將軍王霸等會任城討龐萌於桃鄉又並從征董憲於昌慮皆破平之六年春遣屯長安, WYG: ''}
