  - {type: variant, offset: 18, length: 1, content: 顏, krp: 遷以世黎氏之後為太史令遷著史記作天官書成帝時中壘校尉劉向廣洪範灾條作五紀皇極之論以參徃行之事孝明帝使班固叙漢書而馬續述天文志謝沈書曰蔡邕撰建武已後星驗著明以續前志譙周接繼其下者今紹漢書作天文志起王莽居攝元年迄孝獻帝建安二十五年二百一十五載言其時星辰之變表象之應以顯天戒明王事焉臣昭以張衡天文之妙冠絶一代所著靈憲渾儀畧具辰耀之本今冩載以備其理焉靈憲曰昔在先王将歩天路用之靈軌尋緒本元先準之於渾體是為正儀立度而皇極有逌建也樞運有逌稽也乃建乃稽斯經天常聖人無心因兹以生心故靈憲作興曰太素之前幽清𤣥静寂寞冥黙不可為象厥中惟靈厥外惟無如是者永乆焉斯謂溟涬蓋乃道之根也道根既建自無生有太素始萌萌而未兆并氣同色渾沌不分故道志之言云有物渾成先天地生其氣體固未可得而形其遲速固未可得而紀也如是者又永乆焉斯謂龎鴻蓋乃道之幹也道幹既育有物成體於是元氣剖判剛柔始分清濁異位天成於外地定於内天體於陽故圓以動地體於隂故平以静動以行施静以合化堙鬱構精時育庶類斯謂太元蓋乃道之實也在天成象在地成形天有九位地有九域天有三辰地有三形有象可效有形可度情性萬殊旁通感薄自然相生莫之能紀於是人之精者作聖實始紀綱而經緯之八極之維徑二億三萬二千三百里南北則短減千里東西則廣増千里自地至天半於八極則地之深亦如之通而度之則是渾已将覆其數用重鉤股懸天之景薄地之義皆移千里而差一寸得之過此而徃者未之或知也未之或知者宇宙之謂也宇之表無極宙之端無窮天有兩儀以儛道中其可覩樞星是也謂之北極在南者不著故聖人弗之名焉其世之遂九分而減二陽道左廻故天運左行有驗於物則人氣左嬴形左繚也天以陽廻地以隂淳是故天致其動稟氣舒光地致其静承施候明天以順動不失其中則四序順至寒暑不減致生有節故品物用生地以靈静作合承天清化致飬四時而後育故品物用成凡至大莫如天至厚莫若地地至質者曰地而已至多莫若水水精為漢漢用於天而無列焉思次質也地有山嶽以宣其氣精種為星星也者體生於地精成於天列居錯跱各有逌屬紫宫為皇極之居太㣲為五帝之廷明堂之房大角有席天市有坐蒼龍連蜷於左白虎猛據於右朱雀奮翼於前靈龜蜷首於後黄神軒轅於中六擾既畜而狼蚖魚鼈罔有不具在野象物在朝象官在人象事於是備矣懸象著明莫大乎日月其徑當天周七百三十六分之一地廣二百四十二分之一日者陽精之宗積而成鳥象烏而有三趾陽之類其數竒月者隂精之宗積而成獸象兎隂之類其數耦其後有憑焉者羿請無死之藥於西王母姮娥竊之以奔月将徃枚筮之於有黄有黄筮之曰吉翩翩歸妹獨将西行逢天晦芒母驚毋恐後且大昌姮娥遂託身於月是為蟾蜍夫日譬猶火月譬猶水火則外光水則含景故月光生於日之所照魄生於日之所蔽當日則光盈就日則光盡也衆星被耀因水轉光當日之衝光常不合者蔽於地也是謂闇虛在星星㣲月過則食日之薄地其明也繇暗視明明無所屈是以望之若火方於中天天地同明繇明瞻暗暗還自奪故望之若水火當夜而揚光在晝則不明也月之於夜與日同而差㣲星則不然強弱之差也衆星列布其以神著有五列焉是為三十五名一居中央謂之北斗動變挺占實司王命四布於方為二十八宿日月運行歴示吉凶五緯經次用告禍福則天心於是見矣中外之官常明者百有二十四可名者三百二十為星二千五百而海人之占未存焉㣲星之數蓋萬一千五百二十庶物蠢蠢咸得繫命不然何以總而理諸夫三光同形有似珠玉神守精存麗其職而宣其明及其衰神歇精斁於是乎有隕星然則奔星之所墜至則石文曜麗乎天其動者七日月五星是也周旋右回天道者貴順也近天則遲逺天則速行則屈屈則留回留回則逆逆則遲廹於天也行遲者覿于東覿于東屬陽行速者覿于西覿于西屬隂日與月此配合也攝提熒惑地候見晨附于日也太白辰星見昏附于月也二隂三陽参天兩地故男女取焉方星廵鎮必因常度苟或盈縮不逾於次故有列司作使曰老子四星周伯王逢芮各一錯乎五緯之間其見無期其行無度實妖經星之所然後吉凶冝周其祥可盡蔡邕表志曰言天體者有三家一曰周髀二曰宣夜三曰渾天宣夜之學絶無師法周髀數術具存考驗天状多所違失故史官不用唯渾天者近得其情今史官所用候臺銅儀則其法也立八尺圓體之度而具天地之象以正黄道以察發斂以行日月以歩五緯精㣲深妙萬世不易之道也官有其器而無本書前志亦闕而不論臣求其舊文連年不得在東觀以治律未竟未及成書案畧求索竊不自量卒欲寝伏儀下思惟精意案度成數扶以文義潤以道術著成篇章罪惡無状投畀有北灰滅雨絶世路無由冝博問羣臣下及巖穴知渾天之意者使述其義以禆天文志撰建武以來星變彗孛占驗著明者續其後王莽地皇三年十一月有星孛于張東南行五日不見孛星者惡氣所生為亂兵星占曰其國内外用兵也其所以孛徳孛徳者亂之象不明之表又參然孛焉兵之類也故名之曰孛孛之為言猶有所傷害有所妨蔽或謂之彗星所以除穢而布新也宋鈞注鉤命决曰彗五彗也蒼則王侯破天子苦兵赤則賊起強國恣黄則女害色權奪於后妃白則将軍逆二年兵大作黒則水精賦江河决賊處處起也韓楊占曰其象若竹彗樹木條長短無常其長大見乆灾深短小見不乆灾狹晏子春秋曰齊景公睹彗星使伯常騫穰之晏子曰不可此天教也日月之氣風雨不時彗星之出天為民之亂見之又一曰景公彗星出而泣晏子問之公曰寡人聞之彗星出其所向之國君當之今彗星出而向吾國我是以悲晏子曰君之行義固應無徳於國穿陂池則欲其深以廣也為臺榭則欲其髙且大也賦歛如撝奪誅戮如仇讎自是觀之孛又将出彗星之出庸何懼乎果如晏子之言孛之與彗如似匪同張為周地星孛于張東南行即翼軫之分翼軫為楚是周楚地将有兵亂後一年正月光武起兵舂陵㑹下江新市賊張卬王常及更始之兵亦至俱攻破}
