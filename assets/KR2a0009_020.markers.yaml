  - {type: variant, offset: 5345, length: 610, content: 七人宮乃與楊虛侯馬武上書曰匈奴貪利無有禮信窮則稽首安則侵盜緣邊被其毒痛中國憂其抵突虜今人畜疫死旱蝗赤地疫困之力不當中國一郡萬里死命縣在陛下福不再來時或易失豈宜固守文德而墮武事乎今命將臨塞厚縣購賞喻告高句驪烏桓鮮卑攻其左發河西四郡天水隴西羌胡擊其右如此北虜之滅不過數年臣恐陛下仁恩不忍謀臣狐疑令萬世刻石之功不立於聖世詔報曰黃石公記曰柔能制剛弱能制彊柔者德也剛者賊也弱者仁之助也彊者怨之歸也故曰有德之君以所樂樂人無德之君以所樂樂身樂人者其樂長樂身者不久而亡舍近謀遠者勞而無功舍遠謀近者逸而有終逸政多忠臣勞政多亂人故曰務廣地者荒務廣德者彊有其有者安貪人有者殘殘滅之政雖成必敗今國無善政災變不息百姓驚惶人不自保而復欲遠事邊外乎孔子曰吾恐季孫之憂不在顓臾且北狄尚彊而屯田警備傳聞之事恆多失實誠能舉天下之半以滅大寇豈非至願苟非其時不如息人自是諸將莫敢言兵事者宮永平元年卒謚曰愍侯子信嗣信卒子震嗣震卒子松嗣元初四年與母別居國除永寧元年鄧太后紹封松弟由為朗陵侯論曰中興之業誠艱難也然敵無秦項之彊人資附漢之思雖懷璽紆紱跨陵州縣殊名詭號千隊為羣尚未足以為比功上烈也至於山西既定威臨天下戎羯喪其精膽羣帥賈其餘壯斯誠雄心尚武之幾先志翫兵之日臧宮馬武之徒撫嗚劒而扺掌志馳於伊吾之北矣光武審黃石存包桑閉玉門以謝西域之質卑詞幣以禮匈奴之使其意防蓋已弘深豈其顛沛平城之圍忍傷黥王之陳乎贊曰吳公鷙彊實為龍驤電埽羣孽風行巴梁虎牙猛力功立睢陽宮俊休休是亦鷹揚, WYG: 考證}
