  - {type: variant, offset: 6, length: 0, content: '', WYG: 宿各布列下應十二子天地設位星辰之象備矣星經曰嵗星主㤗山徐州青州兖州熒惑主霍山揚州荆州交州鎭星主嵩髙山豫州太白主華隂山凉州雍州益州辰星主恒山冀州幽州并州嵗星主角亢氐房心尾箕熒惑主輿鬼柳七星張翼軫鎮星主東井太白主奎婁胃昴畢觜参辰星主斗牛女虛危室壁璇璣者謂北極星也玉衡者謂斗九星也玉衡第一星主徐州常以五子日候之甲子為東海丙子為琅琊戊子為彭城庚子為下邳壬子為廣陵凡五郡第二星主益州常以五亥日候之乙亥為漢中丁亥為永昌己亥為巴郡蜀郡牂牁辛亥為廣漢癸亥為犍為凡七郡第三星主冀州常以五戌日候之甲戌為魏郡渤海丙戌為安平戊戌為鉅鹿河間庚戌為清河趙國壬戌為恒山凡八郡第四星主荆州常以五卯日候之乙卯為南陽已卯為零陵辛卯為桂陽癸卯為長沙丁卯為武陵凡五郡第五星主兗州常以五辰日候之甲辰為東郡陳留丙辰為濟北戊辰為山陽㤗山庚辰為濟隂壬辰為東平任城凡八郡第六星主掦州常以五已日候之乙巳為豫章辛巳為丹陽己巳為廬江丁巳為}
