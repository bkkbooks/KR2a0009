  - {type: variant, offset: 2663, length: 173, content: 百餘人徙其黨與數百家於南郡長沙而還漢性彊力每從征伐帝未安恆側足而立諸將見戰陳不利或多惶懼失其常度漢意氣自若方整厲器械激揚士吏帝時遣人觀大司馬何為還言方脩戰攻之具乃歎曰吳公差彊人意隱若一敵國矣每當出師朝受詔夕即引道初無辦嚴之日故能常任職以功名終及在朝廷斤斤謹質形於體貌漢嘗出征妻子在後買田業漢還讓之曰軍師在外吏士不足何多買田宅乎遂盡以分與昆弟外家二, WYG: 月壬戍月犯木星}
