  - {type: variant, offset: 2530, length: 0, content: '', WYG: 以避胡㓂是小民流移之應古今注曰其年七月丁丑月犯昴頭兩星八月辛酉水見東方翼分九月甲午火犯輿鬼十月丁卯大星流有光發東井西行聲隆隆十三年二月乙卯火犯輿鬼西北黄帝占曰熒惑守輿鬼大人憂一曰貴人當之巫咸曰水見翼多火灾石氏曰為旱郗萌占曰流星出東井所之國大水十五年正月丁未彗星見昴炎長三丈韓揚占曰在昴大國起兵也稍西北行入營室犯離宫韓揚占曰彗出營室東壁之間為兵起也二月乙未至東壁滅見四十九日彗星為兵入除穢昴為邉兵彗星出之為有兵至十一月定襄都尉隂承反太守隨誅之盧芳從匈奴入居高柳至十六年十月降上璽綬一曰昴星為獄事是時大司徒歐陽歙以事繫獄踰嵗死營室天子之常宫離宫妃后之所居彗星入營室犯離宫是除宫室也是時郭皇后已疏至十七年十月遂廢為中山太后立隂貴人為皇后除宮之象也古今注曰十六年四月土星逆行十七年三月乙未火逆行從東門入太㣲到執法星東己酉南出端門}
