  - {type: variant, offset: 740, length: 281, content: 漢與岑彭襲其城漢先令辯士說陳康曰蓋聞上智不處危以僥倖中智能因危以為功下愚安於危以自亡危亡之至在人所由不可不察今京師敗亂四方雲擾公所聞也蕭王兵彊士附河北歸命公所見也謝躬內背蕭王外失衆心公所知也公今據孤危之城待滅亡之禍義無所立節無所成不若開門內軍轉禍為福免下愚之敗收中智之功此計之至者也康然之於是康收劉慶及躬妻子開門內漢等及躬從隆撢鄴不知康已反之乃與數百騎輕入城漢伏兵收之手擊殺躬其衆悉降躬字子張南陽人初其妻知光武不平之常戒躬曰君與劉公積不相能而信其虛談不為之備終受制矣躬不納故及於難光武北擊羣賊漢常將突騎五千為軍鋒數先登陷陳及河北平漢與諸將奉圖書上尊號光武即位拜為, WYG: ''}
