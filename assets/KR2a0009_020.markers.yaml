  - {type: variant, offset: 3995, length: 415, content: 漁陽所過虜掠俊言於光武曰宜令輕騎出賊前使百姓各自堅壁以絕其食可不戰而殄也光武然之遣俊將輕騎馳出賊前視人保壁堅完者勑令固守放散在野者因掠取之賊至無所得遂散敗及軍還光武謂俊曰困此虜者將軍策也及即位封俊為列侯建武二年春攻匡賊下四縣更封新處侯引擊頓丘降三城其秋大司馬吳漢承制拜俊為彊弩大將軍別擊金門白馬賊於河內皆破之四年轉徇汝陽及項又拔南武陽是時太山豪傑多擁衆與張步連兵吳漢言於帝曰非陳俊莫能定此郡於是拜俊太山太守行大將軍事張步聞之遣其將擊俊戰於嬴下俊大破之追至濟南收得印綬九十餘稍攻下諸縣遂定太山五年與建威大將軍耿弇共破張步事在弇傳時琅邪未平乃徙俊為琅邪太守領將軍如故齊地素聞俊名入界盜賊皆解散俊將兵擊董憲於贛榆進破朐賊孫陽平之八年張步畔還琅邪俊追討斬之帝美其功詔俊得專征青徐俊撫貧弱表有義檢制軍吏不得與郡縣相干百姓歌之數上書自請願奮擊隴蜀詔報曰東州新平大將軍之功也負海猾夏盜賊之處國家以為重憂且勉鎮撫之十三年增邑定封祝阿侯明年徵奉朝請, WYG: 畢}
