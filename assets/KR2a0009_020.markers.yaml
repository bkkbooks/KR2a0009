  - {type: variant, offset: 4603, length: 0, content: '', WYG: 七月古今注曰戊申月犯心後星戊午火在輿鬼一度入鬼中出尸星南半度十月己亥犯軒轅大星又七日間有客星炎二尺所西南行至明年二月二十二日在輿鬼東北六尺所滅凡見百一十三日輿鬼五星天府也黄帝占曰輿鬼天目也朱雀頭也中央星如粉絮鬼為變害故言一名天尸斧鉞或以病亡或以誅斬火尅金天以制法其西南一星主積布帛西北一星主積金玉東北一星主積馬東南一星主積兵一曰主頷珠錢郗萌曰輿鬼者參之尸也弧射狼誤中參左肩舉尸之東井治留尸輿鬼故曰天尸鬼之為言歸也又占曰五星有入輿鬼大臣誅有干鉞乘質者君貴人憂金玉用民人多疾從南入為男子從北入為女從西入為老人從東入為丁壯棺木倍價熒惑為凶衰輿鬼尸星主死亡熒惑入之為大䘮軒轅為後宫七星周地客星居之為死䘮其後二年光武崩中元古今注曰元年三月甲寅月犯心後星二年八月丁巳火犯太㣲西南角星相去二寸十月戊子大流星從西南東北行聲如雷火犯太㣲西南角星為将相後太尉趙憙司徒李訢坐事免官大流星為使中郎}
