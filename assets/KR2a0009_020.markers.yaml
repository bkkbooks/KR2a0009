  - {type: variant, offset: 4976, length: 367, content: 亦乘勝進營逼成都宮連屠大城兵馬旌旗甚盛乃乘兵入小雒郭門歷成都城下至吳漢營飲酒高會漢見之甚歡謂宮曰將軍向者經虜城下震揚威靈風行電照然窮寇難量還營願從它道矣宮不從復路而歸賊亦不敢近之進軍咸門與吳漢並滅公孫述帝以蜀地新定拜宮為廣漢太守十三年增邑更封酇侯十五年徵還京師以列侯奉朝請定封朗陵侯十八年拜太中大夫十九年妖巫維汜弟子單臣傅鎮等復妖言相聚入原武城劫吏人自稱將軍於是遣宮將北軍及黎陽營數千人圍之賊穀食多數攻不下士卒死傷帝召公卿諸侯王問方略皆曰宜重其購賞時顯宗為東海王獨對曰妖巫相劫埶無久立其中必有悔欲亡者但外圍急不得走耳宜小挺緩令得逃亡逃亡則一亭長足以禽矣帝然之即勑宮徹圍緩賊賊衆分散遂斬臣鎮等宮還遷城門校尉復轉左中郎將擊武谿賊至江陵降之宮以謹信質樸故常見任用後匈奴飢疫自相分爭帝以問宮宮曰願得五千騎以立功帝笑曰常勝之家難與慮敵吾方自思之, WYG: 書卷}
