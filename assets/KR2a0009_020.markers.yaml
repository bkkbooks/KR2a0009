  - {type: variant, offset: 1159, length: 574, content: 擊宛涅陽酈穰新野諸城皆下之引兵南與秦豐戰黃郵水上破之又與偏將軍馮異擊昌城五樓賊張文等又攻銅馬五幡於新安皆破之明收率建威大將軍耿弇虎牙大將軍蓋延擊青犢於軹西大破降之又率驃騎大將軍杜茂彊弩將軍陳俊等圍蘇茂於廣樂劉永將周建別招聚收集得十餘萬人救廣樂漢將輕騎迎與之戰不利墯馬傷膝還營建等遂連兵入城諸將謂漢曰大敵在前而公傷臥衆心懼矣漢乃勃然裹創而起椎牛饗士令軍中曰賊衆雖多皆劫掠羣盜勝不相讓敗不相救非有仗節死義者也今日封侯之秋諸君勉之於是軍士激怒人倍其氣旦日建茂出兵圍漢漢選四部精兵黃頭吳河等及烏桓突騎三千餘人齊鼓而進建軍大潰反還奔城漢長驅追擊爭門並入大破之茂建突走漢留杜茂陳俊等守廣樂自將兵助蓋延圍劉永於睢陽永既死二城皆降明年又率陳俊及前將軍王梁擊破五校賊於臨平追至東郡箕山大破之北擊清河長直及平原五里賊皆平之時鬲縣五姓共逐守長據城而反諸將爭欲攻之漢不聽曰使鬲反者皆守長罪也敢輕冒進兵者斬乃移檄告郡使收守長而使人謝城中五姓大喜即相率歸降諸將乃服曰不戰而下城非衆所及也冬漢率建威大將軍耿弇漢中忠將軍王常等擊富平獲索二賊於平原明年春賊率五萬餘人夜攻漢營軍中驚亂漢堅臥不動有頃乃定即夜發精兵出營突擊大破其衆因追討餘黨遂至無鹽進擊勃海皆平之又從征董憲圍朐城明年春拔朐斬憲事見劉永傳東方悉定振旅還京師會隗囂畔夏復遣漢西屯長安八年從車駕上隴遂圍隗囂於西城帝勑漢曰諸郡甲, WYG: ''}
