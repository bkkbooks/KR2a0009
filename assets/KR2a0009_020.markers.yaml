  - {type: variant, offset: 4612, length: 1, content: 時, WYG: 人名氏湯則巫咸困學紀聞曰星家有甘石巫咸三家太史公謂殷啇巫咸攷之書伊陟賛於巫咸作咸乂四篇又曰在太戊巫咸乂王家孔安國云巫氏也馬融謂殷之巫也鄭康成謂巫官孔頴逹云咸賢父子並為大臣必不世作巫官言巫氏是也後漢天文志乃云湯則巫咸當以書為正以顕天戒明王事焉注攝提熒惑地候見晨附於日也太白辰星見昏附於月也臣召南按攝提地候熒惑俱屬陽故曰附於日非謂土木火必附日而行金水不附日而行也光武下古今注壬寅犯心火星何焯校本火改大威虜将軍馮駿臣召南按}
