  - {type: variant, offset: 2533, length: 129, content: 蜀郡守將史歆反於成都自稱大司馬攻太守張穆穆踰城走廣都歆遂移檄郡縣而宕渠楊偉朐徐容等起兵各數千人以應之帝以歆昔為岑彭護軍曉習兵事故遣漢率劉尚及太中大夫臧宮將萬餘人討之漢入武都乃發廣漢巴蜀三郡兵圍成都百餘日城破誅歆等漢乃乘桴沿江下巴郡楊偉徐容等惶恐解散漢誅其渠帥, WYG: 十}
