  - {type: variant, offset: 14, length: 1, content: 吳, WYG: 星主幽州常以五寅日候之甲寅為𤣥莬丙寅為遼東遼西漁陽庚寅為上谷代郡壬寅為廣陽戊寅為涿郡凡八郡第九星主并州常以五申日候之甲申為五原雁門丙申為朔方雲中戊申為西河庚申為太原定襄壬申為上黨凡八郡璇璣玉衡占色春青黄夏赤黄秋白黄冬黒黄此是常明不如此者所向國有兵殃起凡有六十郡九州所領自有分而名焉三皇邁化協神醇朴謂五星如連珠日月如合璧化由自然民不犯慝至於書契之興五帝是作軒轅始受河圖鬭苞授規日月星辰之象故星官之書自黄帝始至高陽氏使南正重司天北正黎司地唐虞之時羲仲和仲尚書曰帝在璇璣玉衡以齊七政孔安國曰在察也璇美玉也璣衡王者正天文之器可運轉者七政日月五星各異政舜察天文齊七政也夏有昆吾湯則巫咸周之史佚萇𢎞宋之子韋楚之唐蔑魯之梓慎鄭之禆竈魏石中夫或云石申父齊國甘公皆掌天文之官仰占俯視以佐時政歩變擿㣲通洞密至採禍福之原覩成敗之勢秦燔詩書以愚百姓六經典籍殘為灰炭星官之書全而不毁故秦史書始皇之時彗孛大角大角以亡有大星與小星鬭於宫中是其廢亡之徴至}
