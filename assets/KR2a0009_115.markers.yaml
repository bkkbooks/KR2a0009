  - {type: variant, offset: 912, length: 0, content: '', WYG: 國又有夷洲及澶洲傳言秦始皇遣方士徐福將童男女數千人入海事見史記求蓬萊神仙不得徐福畏誅不敢還遂止此洲世世相承有數萬家人民時至會稽市會稽東冶縣人有入海行遭風流移至澶洲者所在絶遠不可往來沈瑩臨海水土志曰夷洲在臨海東南去郡二千}
