  - {type: variant, offset: 127, length: 2, content: 七月, WYG: 春復入遼東宼略六縣太守耿夔擊破之斬其渠帥安帝永初五年宫遣使貢獻求屬𤣥菟元初五年復與濊貊寇𤣥菟攻華麗城華麗縣屬樂浪郡建光元年春幽州刺史馮煥𤣥菟太守姚光遼東太守蔡諷等將兵出塞擊之捕斬濊貊渠帥獲兵馬財物宫乃遣嗣子遂成將二千餘人逆光等遣使詐降光等信之遂成因據險阸以􅃒大軍而潛遣三千人攻𤣥菟遼東焚城郭殺傷二千餘人於是發廣陽漁陽右北平涿郡屬國三千餘騎同救之而貊人已去夏復與遼東鮮卑八千餘人攻遼隊縣名屬遼東郡也殺掠吏人蔡諷等追擊於新昌戰殁功曹耿耗兵曹掾龍端兵馬掾公孫酺以身扞諷俱殁於陳死者百餘人秋宮遂率馬韓濊貊數千騎圍𤣥菟夫餘王遣子尉仇台將二萬餘人與州郡幷力討破之斬首五百餘級是歲宮死子遂成立姚光上言欲因其喪發兵擊之議者皆以為可許尚書陳忠曰宮前桀黠光不能討死而擊之非義也宜遣弔問因責讓前罪赦不加誅取其後善安帝從之明年遂成還漢生口詣𤣥菟降詔曰遂成等桀逆無狀當斬斷葅醢以示百姓幸會赦令乞罪請降鮮卑濊貊連年宼鈔驅略小民動以千數而裁送數十百人非向化之心也自今以後不與縣官戰鬬而自以親附送生口者皆與贖直縑人四十匹小口半之遂成死子伯固立其後濊貊率服東垂少事順帝陽嘉元年置𤣥菟郡屯田六部質桓之間復犯遼東西安平殺帶方令}
