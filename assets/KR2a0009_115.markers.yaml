  - {type: variant, offset: 29, length: 3, content: 簡宗廟, WYG: 仲尼學官名於郯子既而告人曰吾聞之天子失官學在四夷其信也凡蠻夷戎狄總名四夷者猶公侯伯子男皆號諸侯云夫餘國在𤣥菟北千里南與高句驪東與挹婁西與鮮卑接北有弱水地方二千里本濊地也初北夷索離國王出行索或作槖音度洛反其侍兒於後􅗖身􅗖音人鴆反王還欲殺之侍兒曰前見天上有氣大如雞子來降我因以有身王囚之後遂生男王令置於豕牢牢圈也豕以口氣嘘之}
