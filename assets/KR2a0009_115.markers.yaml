  - {type: variant, offset: 913, length: 2, content: 中平, krp: 土地無霜雪草木不死四面是山谿人皆髠髪穿耳女人不穿耳土地饒沃旣生}
  - {type: variant, offset: 916, length: 0, content: '', WYG: 穀又多魚肉有犬尾短如麕尾狀此夷舅姑子婦卧息共一大牀略不相避地有銅鐵唯用鹿格為矛以戰鬬摩礪青石以作弓矢取生魚肉雜貯大瓦器以鹽鹵之歴月餘日乃啖食之以為上肴也論曰昔箕子違衰殷之運避地朝鮮始其國俗未有聞也及施八條之約使人知禁遂乃邑無淫盗門不夜扄扄闗也回頑薄之俗就寛略之法行數百千}
  - {type: variant, offset: 916, length: 0, content: '', krp: 穀又多魚肉有犬尾短如麕尾狀此夷舅姑子婦卧息共一大牀略不相避地有銅鐵唯用鹿格為矛以戰鬬摩礪青石以作弓矢取生魚肉雜貯大瓦器以鹽鹵之歴月餘日乃啖食之以為上肴也論曰昔箕子違衰殷之運避地朝鮮始其國俗未有聞也及施八條之約使人知禁遂乃邑無淫盗門不夜扄扄闗也回頑薄之俗就寛略之法行數百千}
