  - {type: variant, offset: 12, length: 14, content: 水變色大寒雹冬雷山鳴魚孽蝗五, WYG: 居秦故空地稍役屬朝鮮蠻夷及故燕齊亡在者王之都王險也因王其國百有餘歲武帝滅之於是東夷始通上京王莽簒位貊人宼邊前書莽發高句麗兵當伐胡不欲}
