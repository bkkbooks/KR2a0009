  - {type: variant, offset: 33, length: 3, content: 禱祠廢, krp: 死復徙於馬蘭蘭即欄也馬亦如之王以為神乃聽母收養名曰東明東明長而善射王忌其猛復欲殺之東明奔走南至掩㴲水今髙麗中有蓋斯水疑此水是也以弓擊水魚鼈皆聚浮水上東明乘之得度因至夫餘而王之焉於東夷之域最為平敞土宜五穀出名馬赤玉貂豽豽似豹無前足音奴八反大珠如酸棗以員栅為城有宫室倉庫牢獄其人麤大彊勇而謹厚不為宼鈔以弓矢刀矛為兵以六畜名官有馬加牛加狗加其邑落皆主屬諸加食飲用爼豆會同拜爵洗爵揖讓升降以臘月}
