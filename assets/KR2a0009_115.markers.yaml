  - {type: variant, offset: 521, length: 388, content: 災二年大水三年大水四年大水五年大水六年河東池水變色皆赤如血是時鄧太后猶專政延光三年大水流殺民人傷苗稼是時安帝信江京樊豐及阿母王聖等讒言免太尉楊震廢皇太子質帝本初元年五月海水溢樂安北海溺殺人物是時帝幼梁太后專政桓帝建和二年七月京師大水去年冬梁冀枉殺故太尉李固杜喬三年八月京都大水是時梁太后猶專政永興元年秋河水溢漂害人物二年六月彭城泗水增長逆流永壽元年六月雒水溢至津陽城門漂流人物是時梁皇后兄冀秉政疾害忠直威權震主後遂誅滅延熹八年四月濟北河水清九年四月濟陰東郡濟北平原河水清襄楷上言河者諸侯之象清者陽明之徵豈獨諸侯有規京都計邪其明年宮車晏駕徵解犢亭侯為漢嗣即尊位是為孝靈皇帝永康元年八月六州大水勃海海溢沒殺人是時桓帝奢侈淫祀其十一月崩無嗣靈帝建寧四年二月河水清五月山水大出漂壞廬舍五百餘家熹平二年六月東萊北海海水溢出漂沒人物三年秋雒水出四年夏郡國三水傷害秋稼光和六年秋金城河溢水出, WYG: ''}
