  - {type: variant, offset: 118, length: 1, content: 蝗, krp: 貊弓是也魏氏春秋曰遼東郡西安平縣北有小水南流入海句驪别種因名之小水貊王莽初發句驪兵以伐匈奴其人不欲行彊廹遣之皆亡出塞為寇盜遼西大尹田譚追擊戰死莽令其將嚴尤擊之誘句驪侯騶入塞斬之傳首長安莽大說更名高句驪王為下句驪侯於是貊人寇邊愈甚建武八年高句驪遣使朝貢光武復其王號二十三年冬句驪蠶支落大加戴升等萬餘口詣樂浪内}
  - {type: variant, offset: 120, length: 1, content: 也, WYG: 二十五年春句驪寇右北平漁陽上谷太原而遼東太守祭肜以恩信招之皆復欵塞後句驪王宫生而開目能視國人懐之及長勇壯數犯邊境}
