  - {type: variant, offset: 131, length: 1, content: 九, krp: 志西安平帶方縣並屬遼東郡掠得樂浪太守妻子建寧二年𤣥菟太守耿臨討之斬首數百級伯固降服乞屬𤣥菟云東沃沮在高句驪蓋馬}
  - {type: variant, offset: 133, length: 1, content: 水, WYG: 山之東蓋馬縣名屬𤣥菟郡其山在今平壤城西平壤即王險城也東濱大海北與挹婁夫餘南與濊貊接其地東西夾夾音狹南北長可折方千里土肥羙背山向海宜五穀善田種有邑落長帥人性質直彊勇便持矛歩戰言語飲食居處衣服有似句驪其葬作大木椁長十餘丈開一頭為戸新死者先假埋之令皮肉盡乃取骨置椁中家人皆共一椁刻木如主隨死者為數焉武帝滅朝鮮以沃沮地為𤣥菟郡後為夷貊所侵徙郡於髙句驪西北更以沃沮為縣屬樂浪東部都尉至光武罷都尉官後皆以封其渠帥為沃沮侯其土迫小介於大國之間遂臣屬句驪句驪復置其中大人遂為使者以相監領責其租稅貂布魚鹽海中食物發羙女為婢妾焉又有北沃沮一名置溝婁去南沃沮八百餘里其俗皆與南同界南接挹婁挹婁人喜乘船宼鈔北沃沮畏之每夏輒藏於巖穴至冬船道不通乃下居邑落其耆老言嘗於海中得一布衣其形如中人衣而兩袖長三丈又於岸際見一人乘破船頂中復有面與語不通不食而死又說海中有女國無男人或傳其國有神井闚之輒生子云魏志曰母丘儉遣王頎追句驪王宫窮沃沮東界問其耆老所傳云濊北與高句驪沃沮南與辰韓接東窮大海西至樂浪濊及沃沮句驪本皆朝鮮之地也昔武王封箕子於朝鮮箕子教以禮義田蠶又制八條之教前書曰箕子教以八條者相殺者以當時償殺相}
