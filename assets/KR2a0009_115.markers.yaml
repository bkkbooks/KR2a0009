  - {type: variant, offset: 10, length: 0, content: '', WYG: 十有六國穆王後得驥騄之乘史記曰造父以善御幸於周繆王得赤驥盜驪驊騮騄耳之駟西廵狩樂而忘歸乃使造父御以告楚令伐徐一日而至造父解見蔡邕傳於是楚文王}
  - {type: variant, offset: 10, length: 0, content: '', krp: 十有六國穆王後得驥騄之乘史記曰造父以善御幸於周繆王得赤驥盜驪驊騮騄耳之駟西廵狩樂而忘歸乃使造父御以告楚令伐徐一日而至造父解見蔡邕傳於是楚文王}
  - {type: variant, offset: 11, length: 0, content: '', WYG: 舉兵而滅之偃王仁而無權不忍鬬其人故致於敗乃北走彭城武原縣東山下百姓隨之者以萬數因名其山為徐山武原縣故城在今泗州下邳縣北徐山在其東博物志曰徐王妖異不常武原縣東十里見有徐山石室祠處偃王溝通陳蔡之間得朱弓朱矢以已得天瑞自稱偃王穆王聞之遣使乘駟一日至楚伐之偃王仁不忍鬭為楚所敗北走此山也厲王無道淮夷入宼王命虢仲征之不克宣王復命召公伐而平之毛詩序曰江漢尹吉甫羙宣王也能興衰撥亂命召公平淮夷其詩曰江漢浮浮武夫滔滔匪安匪游淮夷來求王命召虎式辟四方徹我土疆及幽王淫亂四夷交侵至齊桓脩霸攘而郤焉及楚靈會申亦來豫盟左傳楚靈王蔡侯陳侯鄭伯許男淮夷㑹于申後越遷琅邪與共征戰遂陵暴諸夏侵滅小邦秦并六國其淮泗夷皆散為民戸陳渉起兵天下崩潰燕人衞滿避地朝鮮前書曰朝鮮王滿燕人自始全燕時嘗略屬眞番朝鮮為置吏築障漢興屬燕王盧綰反入匈奴滿亡命東走度浿}
  - {type: page-break, offset: 11, content: '', id: KR2a0009_WYG_115-3a, image: WYG0253/WYG0253-0640c.png}
  - {type: page-break, offset: 11, content: '', id: KR2a0009_WYG_115-3b, image: WYG0253/WYG0253-0640d.png}
