  - {type: variant, offset: 7, length: 0, content: '', krp: 宋宣城太守范煜撰唐章懷太子賢注東夷傳第七十}
  - {type: variant, offset: 8, length: 0, content: '', WYG: 東夷王制云東方曰夷夷者柢也言仁而好生萬物柢地而出事見風俗通故天性柔順易以道御至有君子不死之國焉山海經曰君子國衣冠帶劒食獸使二文虎在旁外國圖曰去琅邪三萬里山海經又曰不死人在交脛東其為人黒色壽不死並在東方也夷有九種竹書紀年曰后芬即位三年九夷來御也曰畎夷于夷方夷黄夷白夷赤夷𤣥夷風夷陽夷竹書紀年曰后泄二十一年命畎夷白夷赤夷𤣥夷風夷陽夷后相即位二年征黄夷七年于夷來賓後少康即位方夷來賓也故孔子欲居九夷也昔堯命羲仲宅嵎夷曰𤾉谷蓋日之所出也孔安國尚書注曰東方之地曰嵎夷暘谷日之所出也夏后氏太康失德夷人始畔太康啟之子也盤于游田十旬不反不恤人事為羿所逐也自少康已後世服王化遂賓於王門獻其樂舞少康帝仲康之孫帝相子也竹書紀年曰后發即位元年諸夷賓于王門諸夷入舞桀為暴虐諸夷内侵殷湯革命伐而定之至于仲丁藍夷作宼仲丁殷太戊之子也竹書紀年曰仲丁即位征于藍夷也自是或服或畔三百餘年武乙衰敝東夷􅎊盛遂分遷淮岱漸居中土武乙帝庚丁之子無道為革囊盛血仰而射之命曰射天也及武王滅紂肅愼來獻石砮楛矢管蔡畔周乃招誘夷狄周公征之遂定東夷尚書武王崩三監及淮夷畔周公征之作大誥又曰成王既伐管叔蔡叔滅淮夷康王之時肅愼復至後徐夷僭號乃率九夷以伐宗周西至河上穆王畏其方熾乃分東方諸侯命徐偃王主之博物志曰徐君宫人娠而生卵以為不祥棄於水濱孤獨母有犬名鵠倉持所棄卵銜以歸母母覆煖之遂成小兒生而偃故以為名宫人聞之乃更録取長襲為徐君尸子曰偃王有筋而無骨故曰偃也偃王處潢池東地方五百里水經注曰潢水一名汪水與泡水合至沛入泗自山陽以東海陵以北其地當之也}
