  - {type: variant, offset: 162, length: 1, content: 風, WYG: 者萬餘戸小者數千家各在山海間地合方四千餘里東西以海為限皆古之辰國也馬韓最大共立其種為辰王都目支國盡王三韓之地其諸國王先皆是馬韓種人焉馬韓人知田蠶作綿布出大栗如梨有長尾雞尾長五尺邑落雜居亦無城郭作土室形如冢開戸在上不知跪拜無長㓜男女之别不貴金寳錦􅄢不知騎乘牛馬唯重瓔珠以綴衣為飾及縣頸垂耳大率皆魁頭露紒魁頭猶科頭也謂以髪縈繞成科結也紒音計布袍草履其人壯勇少年有築室作力者輒以繩貫脊皮縋以大木嚾呼為健常以五月田竟祭鬼神晝夜酒㑹羣聚歌舞舞輒數十人相隨蹋地為節十月農功畢亦復如之諸國邑各以一人主祭}
