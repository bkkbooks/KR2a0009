  - {type: variant, offset: 919, length: 2, content: 六水, WYG: 而燕人衞滿擾雜其風擾亂也於是從而澆異焉老子曰法令滋章盜賊多有若箕子之省簡文條而用信義其得聖賢作法之原矣贊曰宅是嵎夷曰乃暘谷巢山潛海厥區九族嬴末紛亂燕人違難謂衛滿也雜華澆本遂通有漢衞滿入朝鮮既雜華夏之風又澆薄其本化以至通於漢也𦕈𦕈偏譯或從或畔偏遠也後漢書卷一百十五後漢書卷一百十五考證東夷傳於是楚文王}
