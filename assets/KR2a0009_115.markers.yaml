  - {type: variant, offset: 131, length: 1, content: 九, WYG: 志西安平帶方縣並屬遼東郡掠得樂浪太守妻子建寧二年𤣥菟太守耿臨討之斬首數百級伯固降服乞屬𤣥菟云東沃沮在高句驪蓋馬}
