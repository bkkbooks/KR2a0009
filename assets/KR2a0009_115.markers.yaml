  - {type: variant, offset: 140, length: 3, content: 曰顓事, WYG: 國至孫右渠元朔元年武帝年也濊君南閭等畔右渠率二十八萬口詣遼東内屬武帝以其地為蒼海郡數年乃罷至元封三年滅朝鮮分置樂浪臨屯𤣥莵真番四郡番音潘至昭帝始元五年罷臨屯真番以幷樂浪𤣥莵𤣥莵復徙居句驪自單大領已東沃沮濊貊悉屬樂浪後以境土廣逺復分領東七縣置樂浪東部都尉自内屬已後風俗稍薄法禁亦浸多至}
