  - {type: variant, offset: 50, length: 1, content: 性, WYG: 北所極土地多山險人形似夫餘而言語各異有五穀麻布出赤玉好貂無君長其邑落各有大人處於山林之間土氣極寒常為穴居以深為貴大家至接九梯好養豕食其肉衣其皮冬以豕膏塗身厚數分以禦風寒夏則裸袒以尺布蔽其前後其人臭穢不潔作厠於中圜之而居自漢興已後臣屬夫餘種衆雖少而多勇力處山險又善射發能入人目弓長四尺力如弩矢用楛長一尺八寸青石為鏃鏃皆施毒中人即死便乘船好宼盜鄰國畏患而卒不能服東夷夫餘飲食類此皆用爼豆劉攽曰東夷夫餘飲食類此皆用爼豆案文多一此字唯挹婁獨無法俗最無綱紀者也高句驪在遼東之東千里南與朝鮮濊貊東與沃沮北與夫餘接地方二千里多大山深谷人隨}
