  - {type: variant, offset: 221, length: 0, content: '', WYG: 知蠶桑作縑布乘駕牛馬嫁娶以禮行者讓路國出鐵濊倭馬韓並從市之凡諸貿易皆以鐵為貨俗喜歌舞飲酒鼓瑟兒生欲令其頭扁皆押之以石扁音補典反弁辰與辰韓雜居城郭衣服皆同言語風俗有異其人形皆長大美髮衣服潔清而刑法嚴峻其國近倭故頗有文身者初朝鮮王凖為衞滿所破乃將其餘衆數千人走入海攻馬韓破之自立為韓王凖後滅絶馬韓人復自立為辰王建武二十年韓人廉斯人蘇馬諟等詣樂浪貢獻廉斯邑名也諟音是光武封蘇馬諟為漢廉斯邑君使屬樂浪郡四時朝謁靈帝末韓濊並盛郡縣}
