  - {type: variant, offset: 224, length: 1, content: 敗, WYG: 海中依山島為居凡百餘國自武帝滅朝鮮使驛劉攽曰使驛按當作譯說已見上通於漢者三十許國國皆稱王世世傳統其大倭王居邪馬臺國按今名邪摩推音之訛也樂浪郡徼去其國萬二千里去其西北界拘邪韓國七千餘里其地大較在會稽東冶之東與朱崖儋耳相近故其法俗多同土宜禾稻麻紵蠶桑知織績為縑布出白珠青玉其山有丹土氣溫腝冬夏生菜茹無牛馬虎豹羊鵲鵲或作雞其兵有矛楯木弓竹矢或以骨為鏃男子皆黥面文身以其文左右大小别尊卑之差其男衣皆横幅結束相連女人被髪屈紒衣如單被貫頭而著之並丹朱坋身說文曰坋塵也音蒲頓反如中國之用粉也有城柵屋室父母兄弟異處唯會同男女無别飲食以手而用籩豆俗皆徒跣以蹲踞為恭敬人性嗜酒多壽考至百餘歲者甚衆國多女子大人皆有四五妻其餘或兩或三女人}
