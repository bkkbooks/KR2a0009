  - {type: variant, offset: 113, length: 2, content: 介蟲, WYG: 夫餘别種故言語法則多同而跪拜曵一脚行歩皆走凡有五族有消奴部絶奴部順奴部灌奴部桂婁部按今高驪五部一曰内部一名黄部即桂婁部也二曰北部一名後部即絶奴部也三曰東部一名左部即順奴部也四曰南部一名前部即灌奴部也五曰西部一名右部即消奴部也本消奴部為王稍微弱後桂婁部代}
