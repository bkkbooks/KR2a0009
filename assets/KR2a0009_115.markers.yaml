  - {type: variant, offset: 1405, length: 640, content: 冬雷六年十月丙子郡國五冬雷永寧元年十月郡國七冬雷建光元年十月郡國七冬雷延光四年郡國十九冬雷是時太后攝政上無所與太后既崩阿母王聖及皇后兄閻顯兄弟更秉威權上遂不親萬機從容寬仁任臣下桓帝建和三年六月乙卯雷震憲陵寢屋先是梁太后聽兄冀枉殺李固杜喬靈帝熹平六年冬十月東萊冬雷中平四年十二月晦雨水大雷電雹獻帝初平三年五月丙申無雲而雷四年五月癸酉無雲而雷建安七八年中長沙醴陵縣有大山常大鳴如牛呴聲積數年後豫章賊攻沒醴陵縣殺略吏民靈帝熹平二年東萊海出大魚二枚長八九丈高二丈餘明年中山王暢任城王博並薨和帝永元四年蝗八年五月河內陳留蝗九月京都蝗九年蝗從夏至秋先是西羌數反遣將軍將北軍五校征之安帝永初四年夏蝗是時西羌寇亂軍衆征距連十餘年五年夏九州蝗六年三月去蝗處復蝗子生七年夏蝗元初元年夏郡國五蝗二年夏郡國二十蝗延光元年六月郡國蝗順帝永建五年郡國十二蝗是時鮮卑寇朔方用衆征之永和元年秋七月偃師蝗去年冬烏桓寇沙南用衆征之桓帝永興元年七月郡國三十二蝗是時梁冀秉政無謀憲苟貪權作虐二年六月京都蝗永壽三年六月京都蝗延熹元年五月京都蝗靈帝熹平六年夏七州蝗先是鮮卑前後三十餘犯塞是歲護烏桓校尉夏育破鮮卑中郎將田晏使匈奴中郎將臧旻將南單于以下三道並出討鮮卑大司農經用不足殷斂郡國以給軍糧三將無功還者少半光和元年詔策問曰連年蝗蟲至冬踊其咎焉在蔡邕對曰臣聞易傳曰大作不時天降災厥咎蝗蟲來河圖祕徵篇曰帝貪則政暴而吏酷酷則誅深必殺主蝗蟲蝗蟲貪苛之所致也是時百官遷徙皆私上禮西園以為府獻帝興平元年夏大蝗是時天下大亂建安二年五月蝗, WYG: 考證}
