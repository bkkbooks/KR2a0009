  - {type: variant, offset: 116, length: 1, content: 孽, WYG: 其置官有相加對盧沛者古鄒大加古鄒大加高驪掌賓客之官如鴻臚也主簿優台使者帛衣先人武帝滅朝鮮以高句驪為縣前書元封中定朝鮮為眞番臨屯樂浪𤣥菟四部使屬𤣥菟賜鼓吹伎人其俗淫皆潔浄自熹暮夜輒男女羣聚為倡樂好祠鬼神社稷零星前書音義龍星左角曰天田則農祥也辰日祀以牛號曰零星風俗通曰辰之神為靈星故以辰日祀於東南也以十月祭天大會名曰東盟其國東有大穴號禭神亦以十月迎而祭之其公會衣服皆錦繡金銀以自飾大加主簿皆著幘如冠幘而無後其小加著折風形如弁無牢獄有罪諸加評議便殺之没入妻子為奴婢其婚姻皆就婦家生子長大然後將還便稍營送終之具金銀財幣盡於厚葬積石為封亦種松柏其人性凶急有氣力習戰鬬好宼鈔沃沮東濊皆屬焉句驪一名貊耳有别種依小水為居因名曰小水貊出好弓所}
