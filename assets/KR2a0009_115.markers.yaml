  - {type: variant, offset: 42, length: 1, content: 水, WYG: 有椁無棺殺人殉葬多者以百數其王葬用玉匣漢朝常豫以玉匣付𤣥菟郡王死則迎取以葬焉建武中東夷諸國皆來獻見二十五年夫餘王遣使奉貢光武厚答報之於是使命歲通至安帝永初五年夫餘王始將步騎七八千人宼鈔樂浪殺傷吏民後復歸附永寧元年乃遣嗣子尉仇台詣闕貢獻天子賜尉仇台印綬金綵順帝永和元年其王來朝京師帝作黄門鼓吹角抵戲以遣之桓帝延熹四年遣使朝賀貢獻永康元年王夫台將二萬餘人宼𤣥菟𤣥菟太守公孫域擊破之斬首千餘級至靈帝熹平三年復奉章貢獻夫餘本屬𤣥菟獻帝時其王求屬遼東云挹婁古肅愼之國也在夫餘東北千餘里東濱大海南與北沃沮接}
