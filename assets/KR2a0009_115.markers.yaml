  - {type: variant, offset: 917, length: 1, content: 郡, WYG: 故東夷通以柔謹為風異乎三方者也茍政之所暢則道義存焉仲尼懷憤以為九夷可居或疑其陋子曰君子居之何陋之有亦徒有以焉耳其後遂通接商賈漸交上}
  - {type: page-break, offset: 917, content: '', id: KR2a0009_WYG_115-18a, image: WYG0253/WYG0253-0648a.png}
