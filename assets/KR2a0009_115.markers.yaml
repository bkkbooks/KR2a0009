  - {type: variant, offset: 27, length: 0, content: '', WYG: 郡縣彊廹之皆亡出塞因犯為宼州郡歸咎於高句麗侯騶嚴尤奏言貉人犯法不從騶起宜慰安之建武之初復來朝貢時遼東太守祭肜威讋北方聲行海表於是濊貊倭韓萬里朝獻故章和已後使聘流通逮永初多難始入寇鈔桓靈失政漸滋蔓焉自中興之後四夷來賓雖時有乖畔而使驛不絶劉攽曰使驛不絶按郵驛中國可有之不可通於四夷自前書皆言使譯使即使者譯則譯人故合作使譯此書内有自作使驛處明是後人不曉妄改之故國俗風土可得略記東夷率皆土著憙飲酒歌舞或冠弁衣錦器用爼豆所謂中國失禮求之四夷者也左}
