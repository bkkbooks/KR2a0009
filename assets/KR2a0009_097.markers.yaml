  - {type: variant, offset: 2783, length: 199, content: 能克又戰於允街為羌所敗殺五百餘人於是守塞諸羌皆復相率為寇遣謁者張鴻領諸郡兵擊之戰於允吾唐谷軍敗鴻及隴西長史田颯皆沒又天水兵為牢姐種所敗於白石死者千餘人時燒何豪有婦人比銅鉗者年百餘歲多智筭為種人所信向皆從取計策時為盧水胡所擊比銅鉗乃將其衆來依郡縣種人頗有犯法者臨羌長收繫比銅鉗而誅殺其種六七百人顯宗憐之乃下詔曰昔桓公伐戎而無仁惠故春秋貶曰齊人今國家無德恩不及遠羸弱何辜而當并命夫長平之暴非帝者之功咎由, WYG: 納以前}
