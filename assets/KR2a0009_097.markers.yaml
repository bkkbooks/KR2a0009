  - {type: variant, offset: 31, length: 1, content: 岳, krp: 尹房植有名當朝鄉人為之謡曰天下規矩房伯武因師獲印周仲進二家賔客互相譏揣初委反遂各樹朋徒漸成尤隙由是甘陵有南北部黨人之議自此始矣後汝南太守宗資任功曹范滂南陽太守成瑨亦委功曹岑晊音質二郡又為謡曰汝南太守范孟博南陽宗資主畫諾南陽太守岑公孝𢎞農成瑨但坐嘯謝承書曰成瑨少修仁義篤學以清名見舉孝亷拜郎中遷南陽太守郡舊多豪強中官黄門磐牙境界瑨下車振威嚴以檢攝之是時桓帝乳母中官貴人外親張子禁怙恃貴埶不畏法網功曹岑晊勸使捕子禁付宛獄笞殺之桓帝徴瑨下獄死宗資字叔都南陽安衆人也家代為漢將相名臣祖父均自有傳資少在京師學孟氏易歐陽尚書舉孝㢘拜議郎補御史中丞汝南太守署范滂爲功曹委任政事推功於滂不伐其羙任善之名聞於海内也因此流言轉入太學諸生三萬餘人郭林宗賈偉節為其冠冠猶首也並與李膺陳蕃王暢更相褒重學中語曰天下模楷李元禮不畏強禦陳仲舉天下俊秀王叔茂又渤海公族進階公族姓也名進階風俗通曰晉成公立嫡子為公族大夫韓無忌號公族穆子見左氏傳扶風魏齊卿並危言深論不隠豪強危言謂不畏危難而直言也論語孔子曰邦有道危言危行自公卿以下莫不畏其貶議屣履到門時河内張成善說風角推占當赦遂教子殺人李膺為河南尹督促收捕既而逢宥獲免膺愈懐憤疾竟案殺之初成以方伎交通宦官帝亦頗誶其占成弟子牢脩因上書誣告膺等飬太學遊士交結諸郡生徒更相驅馳共為部黨誹訕朝廷疑亂風俗說文曰誹謗也蒼頡篇曰訕非也於是天子震怒班下郡國逮捕黨人布告天下使同忿疾遂收執膺等其辭所連}
