  - {type: variant, offset: 18, length: 1, content: 出, WYG: 同而遷染之塗異也嗜猶好也惡音烏故反言人好惡各有本性遷染者由其所習尚書曰唯人生厚因物有遷墨子曰墨子見染􅁝者泣而歎曰染於蒼則蒼染於黄則黄故染不可不慎也非獨染絲然也國亦有染湯染於伊尹故王天下殷紂染於惡來故國殘身死為天下僇夫刻意則行不肆牽物則其志流刻意刻削其意不得}
  - {type: page-break, offset: 18, content: '', id: KR2a0009_WYG_097-1b, image: WYG0253/WYG0253-0357b.png}
  - {type: variant, offset: 18, length: 1, content: 出, krp: 同而遷染之塗異也嗜猶好也惡音烏故反言人好惡各有本性遷染者由其所習尚書曰唯人生厚因物有遷墨子曰墨子見染絲者泣而歎曰染於蒼則蒼染於黄則黄故染不可不慎也非獨染絲然也國亦有染湯染於伊尹故王天下殷紂染於惡來故國殘身死為天下僇夫刻意則行不肆牽物則其志流刻意刻削其意不得}
  - {type: variant, offset: 20, length: 0, content: '', WYG: 恣也莊子曰刻意尚行離時異俗行音下孟反肆猶放縱也牽物謂為物所牽制則其志流宕忘反也淮南子曰非拘繫牽連於物而不與推移也是以聖人導人理性裁抑宕佚慎其所與節其所偏雖情品萬區質文異數至於陶物振俗其道一也陶謂陶冶以成之管子曰夫法之制人猶陶之於埴冶之於金也埴猶植叔未澆訛王道陵缺叔未猶季末也謂當春秋之時而猶假仁以効已憑義以濟功舉中於理則強梁褫氣片言違正則厮臺觧情盖前哲之遺塵有足求者褫猶奪也音直紙反厮臺賤人也齊侯伐楚楚子使與師言曰君處北海寡人處南海唯是風馬牛不相及也不虞君之渉吾地也何故管仲對曰爾貢包茅不入王祭不供無以縮酒寡人是徴對曰貢之不入寡君之罪也遂使屈完與齊盟于召陵此強梁禠氣也又晉吕甥郤芮將焚公宫而殺晉侯寺人披請見公使讓之且辭曰汝為恵公來求殺余命汝}
  - {type: page-break, offset: 20, content: '', id: KR2a0009_WYG_097-2a, image: WYG0253/WYG0253-0358a.png}
