  - {type: variant, offset: 50, length: 1, content: 濱, WYG: 祖父脩安帝時為太尉漢官儀曰脩字伯游父益趙國相膺性簡亢無所交接亢髙也唯以同郡荀淑陳寔為師友初舉孝亷為司徒胡廣所辟舉髙第再遷青州刺史守令畏威明多望風棄官復徴再遷漁陽太守尋轉蜀郡太守以母老乞不之官謝承書曰出補蜀郡太守脩庠序設條教明法令恩威並行蜀之珍玩不入}
