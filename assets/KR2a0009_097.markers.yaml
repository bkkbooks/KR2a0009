  - {type: variant, offset: 9512, length: 1, content: 愷, WYG: 道消泰卦曰君子道長小人道消老子曰髙下相傾也徒恨芳膏煎灼燈明前書龔勝死有一老父入哭甚哀曰薫以香自燒膏以明自消後漢書卷九十七後漢書卷九十七考證黨錮傳矯枉故直必過其理然矣注正枉必過其直見孟子今孟子無此文南陽宗資主畫諾臣世駿按讀者多以唯諾之辭非也此王公守相答箋啟符牒之文如人主之制杜宻傳劉季陵清髙士陵本或作林魏朗傳中官子弟為相國諸本同何焯校本改國相范滂傳君為人臣不推忠國臣㑹汾按江寜顧氏本作不惟惟字}
