  - {type: variant, offset: 9400, length: 0, content: '', WYG: 舉奏豫章太守王永奏事中官吳郡太守徐參在職貪穢並徴詣廷尉參中常侍璜之弟也由此威名大振又徴拜議郎補御史中丞坐黨事考黄門北寺獄以無驗見原卒于家孔昱傳孔昱字元世魯國魯人也七世祖霸成帝時歴九卿封褒成侯臣賢案前書孔霸字次儒即安國孫世習尚書宣帝時為太中大夫授太子經遷詹事髙宻相元帝即位霸以師賜爵闗内侯號褒成君薨謚曰烈君今范書及謝承書皆云成帝又言封侯盖誤也詹事及相俱二千石故曰歴卿自霸至昱爵位相係其卿相牧守五十三人列侯七人昱少習家學家學尚書大將軍梁冀辟不應太尉舉方正對䇿不合乃辭病去後遭黨事禁錮靈帝即位公車徴拜議郎補洛陽令以師䘮棄官卒于家苑康傳苑康字仲真勃海重合人也重合縣故城在今滄州樂陵縣東少受業太學與郭林宗親善舉孝亷再遷潁隂令有能迹遷太山太守郡内豪姓多不法康至奮威怒施嚴令莫有干犯者先所請奪人田宅皆遽還之是時山陽張儉殺常侍候覽母案其宗黨賔客或有迸匿太山界者康既常疾閹宦因此皆窮相收掩無得遺脫覽大怨之誣康與兗州刺史第五種及都尉壺嘉詐上賊}
