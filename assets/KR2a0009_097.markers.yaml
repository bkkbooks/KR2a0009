  - {type: variant, offset: 7682, length: 393, content: 軍追之出塞斬首數千級而還燒當燒何種聞賢軍還率三千餘人復寇張掖殺長吏初飢五同種大豪盧怱忍良等千餘戶別留允街而首施兩端建光元年春馬賢率兵召盧怱斬之因放兵擊其種人首虜二千餘人掠馬牛羊十萬頭忍良等皆亡出塞璽書封賢安亭侯食邑千戶忍良等以麻奴兄弟本燒當世嫡而賢撫恤不至常有怨心秋遂相結共脅將諸種步騎三千人寇湟中攻金城諸縣賢將先零種赴擊之戰於牧苑兵敗死者四百餘人麻奴等又敗武威張掖郡兵於令居因脅將先零沈氐諸種四千餘戶緣山西走寇武威賢追到鸞鳥招引之諸種降者數千麻奴南還湟中延光元年春賢追到湟中麻奴出塞度河賢復追擊戰破之種衆散遁詣涼州刺史宗漢降麻奴等孤弱飢困其年冬將種衆三千餘戶詣漢陽太守耿种降安帝假金印紫綬賜金銀綵繒各有差是歲虔人種羌與上郡胡反攻穀羅城度遼將軍耿夔將諸郡兵及烏桓騎赴擊破之三年秋隴西郡始還狄道焉麻奴弟犀苦立順帝永建元年隴西鍾羌反校尉馬賢將七千餘人擊之戰於臨洮斬首千餘級皆率種人降進封賢都, WYG: ''}
