  - {type: variant, offset: 9480, length: 1, content: 追, WYG: 桓帝時博士徴不就靈帝即位太尉黄瓊舉方正對䇿合時宜再遷議郎補䝉令䝉縣屬梁國以郡守非其人棄官去家無産業子孫同衣而出年八十卒于家謝承書曰敷與子孫同衣而行并日而食也劉儒傳劉儒字叔林東郡陽平人也陽平故城今魏州莘縣郭林宗常謂儒口訥心辯有珪璋}
