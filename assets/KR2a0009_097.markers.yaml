  - {type: variant, offset: 445, length: 1, content: 昆, WYG: 虞山在縣東少為縣吏兄為鄉人所殺朗白日操刃報讐於縣中遂亡命到陳國從博士郤仲信學春秋圗緯孔子作春秋緯十二篇又詣太學受五經京師長者李膺之徒争從之初辟司徒府再遷彭城令時中官子弟為相國多行非法朗與更相章奏幸臣忿疾欲中之中猶中傷㑹九真賊起乃共薦朗為九真都尉到官奨厲吏兵討破羣賊斬首二千級桓帝美其功徴拜議郎頃之遷尚書屢陳便宜有所補益出為河内太守政稱三河表尚書令陳蕃薦朗公忠亮直宜在機宻復徴為尚書㑹被黨議免歸家朗性矜嚴閉門整法度家人不見墯容後竇武等誅朗以黨被急徴行至牛渚自殺牛渚山名突出江中謂為牛渚圻在令宣州當塗縣北也著書數篇號魏子云夏馥傳夏馥字子治陳留圉人也少為書生言行質直同縣髙氏蔡氏並皆富殖郡人畏而事之唯馥比門不與交通比門猶並門也由是為豪姓所仇桓帝初舉直言不就馥雖不交時宦然以聲名為中官所憚遂與范滂張儉等俱被誣陷詔下州郡捕為黨魁及儉等亡命經歴之處皆被收考辭所連引布徧天下馥乃頓足而歎曰孽自已作空汙良善一人逃死禍及萬家何以生為乃自剪須變形入林慮山中林慮今相州縣隠匿姓名為冶家傭親突煙炭形貎毁瘁積二三年人無知者後馥弟静乗車馬載縑帛追之於湼陽市中湼陽縣屬南陽郡遇馥不識聞其言聲乃覺而拜之馥避不與語静追随至客舍共宿夜中宻呼静曰吾以守道疾惡故為權宦所陷且念營茍全以庇性命弟奈何載物相求是以禍見追也明旦别去黨禁未觧而卒宗慈傳宗慈字孝初南陽安衆人也安衆在今南陽縣西南仍有其名無復基址也舉孝亷九辟公府有道徴不就後為脩武令時太守出自權豪多取貨賂慈遂棄官去徴拜議郎未到道疾卒南陽羣士皆重其義行巴肅傳巴肅字恭祖勃海髙城人也髙城縣故城在今滄州鹽山縣南初察孝亷歴慎令貝丘長慎縣屬汝南郡貝丘縣屬清河郡皆以郡守非其人辭病去辟公府稍遷拜議郎與竇武陳蕃等謀誅閹宦武等遇害肅亦坐黨禁錮中常侍曹節後聞其謀收之肅自載詣縣縣令見肅入閤觧印綬與俱去肅曰為人臣者有謀不敢隠有罪不逃刑既不隠其謀矣又敢逃其刑乎遂被害刺史賈琮刋石立銘以記之范滂傳范滂字孟博汝南征羌人也征羌觧見來歙傳謝承書曰汝南細陽人也少厲清節為州里所服舉孝亷光祿四行漢官儀曰光祿舉敦厚質樸遜讓節儉此為四行也時冀州饑荒盜賊羣起乃以滂為清詔使案察之滂登車攬轡慨然有澄清天下之志及至州境守令自知臧汙望風觧印綬去其所舉奏莫不厭塞衆議遷光祿勲主事時陳蕃為光祿勲滂執公儀詣蕃蕃不止之滂懐恨投版棄官而去版笏也郭林宗聞而讓蕃曰若范孟博者豈宜以公禮格之格正也今成其去就之名得無自取不優之議邪蕃乃謝焉復為太尉黄瓊所辟後詔三府掾屬舉謡言漢官儀曰三公聴採長史臧否人所疾苦還條奏之是為舉謡言也頃者舉謡言掾屬令吏都㑹殿上主者大言州郡行狀云何善者同聲稱之不善者黙爾銜枚滂奏刺史二千石權豪之黨二十餘人尚書責滂所劾猥多疑有私故滂對曰臣之所舉自非叨穢姦暴深為民害豈以汙簡札哉間以㑹日廹促故先舉所急其未審者方更參實臣聞農夫去草嘉榖必茂左傳曰為國家者見惡如農夫之務去草焉忠臣除姦王道以清若臣言有貳甘受顕戮吏不能詰滂覩時方艱知意不行因投劾去太守宗資先聞其名請署功曹委任政事滂在職嚴整疾惡其有行違孝悌不軌仁義者皆掃迹斥逐不與共朝顯薦異節抽㧞幽陋滂外甥西平李頌公族子孫而為鄉曲所棄中常侍唐衡以頌請資資用為吏滂以非其人寑而不召資遷怒捶書佐朱零零仰曰范滂清裁猶以利刄齒腐朽裁音才載反今日寜受笞死而滂不可違資乃止郡中中人以下莫不歸怨乃指滂之所用以為范黨後牢脩誣言鉤黨鉤引也滂坐繫黄門北寺獄獄吏謂曰凡坐繋皆祭臯陶滂曰臯陶賢者古之直臣知滂無罪將理之於帝帝謂天也如其有罪祭之何益衆人由此亦止獄吏將加掠考滂以同囚多嬰病乃請先就格遂與同郡袁忠爭受楚毒桓帝使中常侍王甫以次辨詰滂等皆三木囊頭暴於階下三木項及手足皆有械更以物䝉覆其頭也前書司馬遷曰魏其大將也衣赭闗三木也餘人在前或對或否滂忠於後越次而進王甫詰曰君為人臣不推忠國而共造部黨自相褒舉評論朝廷虚搆無端諸所謀結並欲何為皆以情對不得隐飾滂對曰臣聞仲尼之言見善如不及見惡如探湯探湯喻去疾也見論語欲使善善同其清惡惡同其汙謂王政之所願聞不悟更以為黨甫曰卿更相㧞舉迭為唇齒有不合者見則排斥其意如何劉攽曰見則案文當作則見滂乃慷慨仰天曰古之循善自求多福今之循善身陷大戮劉攽曰案文循皆當作脩身死之日願埋滂於首陽山側上不負皇天下不愧}
