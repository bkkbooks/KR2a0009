  - {type: 'tls:seg', offset: 443, content: '', id: KR2a0009_ZHSJ_097-d97p4s16}
  - {type: variant, offset: 443, length: 0, content: '', WYG: 祖中山安國人也安國縣故城在今定州義豐縣東南謝承書曰祐宗室𦙍緒代有名位少修操行學嚴氏春秋小戴禮古文尚書仕郡為主簿郡將少子嘗出錢付之令市買果實祐悉以買筆書具與之因白郡將言郎君年可入小學而但傲狠逺近謂明府無過庭之教請出授書郡將為使子就祐受經五日一試不滿呈限白決罰遂成學業也安國後别屬博陵祐初察孝亷補尚書侍郎閑練故事文札強辨每有奏議應對無滯為僚類所歸除任城令兗州舉為尤異遷揚州刺史是時㑹稽太守梁是大將軍冀之從弟也祐舉奏其罪旻坐徴復遷祐河東太守時屬縣令長率多中官子弟百姓患之祐到黜其權強平理寃結政為三河表三河謂河東河内河南也表猶標準也再遷延熹四年拜尚書令又出為河南尹轉司隸校尉時權貴子弟罷州郡還入京師者每至界首輙改易輿服隠匿財寳威行朝廷拜宗正三轉大司農時中常侍蘇康管覇用事於内遂固天下良田羙業山林湖澤民庶窮困州郡累氣累氣屏息也祐移書所在依科品沒入之桓帝大怒論祐輸左校後得赦出復歴三卿輙以疾辭乞骸骨歸田里詔拜中散大夫遂杜門絶迹每三公缺朝廷皆屬意於祐以譖毁不用延篤貽之書曰昔太伯三讓人無徳而稱焉三讓觧見和帝紀延陵髙揖華夏仰風揖讓也左傳吴王夀夢卒子諸樊既除䘮將立弟季札札棄其室而耕乃舍之吾子懐蘧氏之可卷體甯子之如愚蘧瑗字伯玉甯子名俞並衛大夫論語孔子曰君子哉蘧伯玉邦有道則仕邦無道則可卷而懐之又曰甯武子邦無道則愚微妙𤣥通冲而不盈老子曰古之善為道者㣲妙𤣥通深不可識也又曰道冲而用之或不盈蔑三光之明未暇以天下為事何其劭與莊子曰舜讓天下於子州支伯子州支伯曰予適有幽憂之病方且理之未暇理天下也靈帝初陳蕃輔政以祐為河南尹及蕃敗祐黜歸卒于家明年大誅黨人幸不及禍魏朗傳魏朗字少英㑹稽上虞人也上虞縣故城在今越州餘姚縣}
