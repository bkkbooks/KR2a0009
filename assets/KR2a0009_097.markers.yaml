  - {type: variant, offset: 188, length: 215, content: 兵長在山谷短於平地不能持久而果於觸突以戰死為吉利病終為不祥堪耐寒苦同之禽獸雖婦人產子亦不避風雪性堅剛勇猛得西方金行之氣焉王政脩則賓服德教失則寇亂昔夏后氏太康失國四夷背叛及后相即位乃征畎夷七年然後來賓至于后泄始加爵命由是服從后桀之亂畎夷入居邠岐之閒成湯既興伐而攘之及殷室中衰諸夷皆叛至于武丁征西戎鬼方三年乃克故其詩曰自彼氐羌莫敢不來王及武乙暴虐犬戎寇邊周古公踰梁山而避于岐下及子季歷遂伐西落鬼戎太丁之時季歷復伐燕京之戎戎人大敗周師後, WYG: 見慕如此永夀}
