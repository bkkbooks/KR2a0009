  - {type: variant, offset: 9509, length: 2, content: 封沖, WYG: 黨事起太尉陳蕃争之不能得朝廷寒心莫敢復言彪謂同志曰吾不西行大禍不觧乃入洛陽說城門校尉竇武尚書霍諝武等訟之桓帝以此大赦黨人李膺出曰吾得免此賈生之謀也先是岑晊以黨事逃亡親友多匿焉彪獨閉門不納時人望之望怨也彪曰傳言相時而動無累後人相視也左傳之文也公孝以要君致釁自遺其咎吾以不能奮戈相待反可容隐之乎於是咸服其裁正以黨禁錮卒于家初彪兄弟三人並有髙名而彪最優故天下稱曰賈氏三虎偉節最怒何顒傳何顒字伯求南陽襄鄉人也襄鄉故城在今隨州􅀥陽縣東北也少逰學洛陽顒雖後進而郭林宗賈偉節等與之相好顯名太學友人虞偉髙有父讐未報而篤病將終顒往候之偉髙泣而訴顒感其義為復讐以頭醊其墓醊祭酹也音竹嵗反及陳蕃李膺之敗顒以與蕃膺善遂為宦官所陷乃變姓名亡匿汝南間所至皆親其豪傑有聲荆豫之域劉攽曰案文間字下又云有聲荆豫之域若祗在汝南則無用間字不當云荆盖漏南郡兩字也南郡則屬荆州袁紹慕之私與往來結為奔走之友詩大雅曰予曰有疏附予曰有先後予曰有奔走予曰有禦侮毛萇注曰論徳宣譽曰奔走也是時黨事起天下多離其難顒常私入洛陽從紹計議其窮困閉戹者為求援救以濟其患有被掩捕者則廣設權計使得逃隠全免者甚衆及黨錮觧顒辟司空府每三府㑹議莫不推顒之長累遷及董卓秉政逼顒以為長史託疾不就乃與司空荀爽司徒王允等共謀卓㑹爽薨顒以它事為卓所繫憂憤而卒初顒見曹操歎曰漢家將亡安天下者必此人也操以是嘉之嘗稱潁川荀彧王佐之噐及彧為尚書令遣人西迎叔父爽并致顒屍而𦵏之爽之冡傍劉攽曰西迎叔父爽案文致顒屍又𦵏冢傍則爽亦死矣明脫一䘮字贊曰渭以涇濁玉以礫貞物性既區嗜惡從形礫音厯說文曰礫小石也言渭以涇濁乃顯其清玉居礫石乃見其貞區猶别也嗜愛也從形謂形有善惡也以諭彼李膺等與宦豎不同故相憎疾蘭蕕無並消長相傾蕕臭草也左傳曰一薫一蕕十年尚猶有臭易否卦曰小人道長君}
