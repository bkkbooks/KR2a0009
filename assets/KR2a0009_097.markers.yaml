  - {type: variant, offset: 1300, length: 599, content: 荔義渠稱王及其衰亡餘種皆反舊為酋豪云羌無弋爰劒者秦厲公時為秦所拘執以為奴隸不知爰劒何戎之別也後得亡歸而秦人追之急藏於巖穴中得免羌人云爰劒初藏穴中秦人焚之有景象如虎為其蔽火得以不死既出又與劓女遇於野遂成夫婦女恥其狀被髮覆面羌人因以為俗遂俱亡入三河閒諸羌見爰劒被焚不死怪其神共畏事之推以為豪河湟閒少五穀多禽獸以射獵為事爰劒教之田畜遂見敬信廬落種人依之者日益衆羌人謂奴為無弋以爰劒嘗為奴隸故因名之其後世世為豪至爰劒曾孫忍時秦獻公初立欲復穆公之迹兵臨渭首滅狄戎忍季父卬畏秦之威將其種人附落而南出賜支河曲西數千里與衆羌絕遠不復交通其後子孫分別各自為種任隨所之或為氂牛種越巂羌是也或為白馬種廣漢羌是也或為參狼種武都羌是也忍及弟舞獨留湟中並多娶妻婦忍生九子為九種舞生十七子為十七種羌之興盛從此起矣及忍子研立時秦孝公雄強威服羌戎孝公使太子駟率戎狄九十二國朝周顯王研至豪健故羌中號其後為研種及秦始皇時務并六國以諸侯為事兵不西行故種人得以繁息秦既兼天下使蒙恬將兵略地西逐諸戎北卻衆狄築長城以界之衆羌不復南度至于漢興匈奴冒頓兵強破東胡走月氏威震百蠻臣服諸羌景帝時研種留何率種人求守隴西塞於是徙留何等於狄道安故至臨洮氐道羌道縣及武帝征伐四夷開地廣境北卻匈奴西逐諸羌乃度河湟築令居塞初開河西列置四郡通道玉門隔絕羌胡使南北不得交關於是障塞亭燧出長城外數千里時先零羌與封養牢姐種解仇結盟與匈奴通合兵十餘萬共攻令居安故遂圍枹罕漢遣, WYG: ''}
