  - {type: variant, offset: 8138, length: 667, content: 穀稼殷積又有龜茲鹽池以為民利水草豐美土宜產牧牛馬銜尾羣羊塞道北阻山河乘據險因渠以溉水舂河漕用功省少而軍糧饒足故孝武皇帝及光武築朔方開西河置上郡皆為此也而遭元元無妄之灾衆羌內潰郡縣兵荒二十餘年夫𠫓廾沃壤之饒損自然之財不可謂利離河山之阻守無險之處難以為固今三郡未復園陵單外而公卿選懦容頭過身張解設難但計所費不圖其安宜開聖德考行所長書奏帝乃復三郡使謁者郭璜督促徙者各歸舊縣繕城郭置候驛既而激河浚渠為屯田省內郡費歲一億計遂令安定北地上郡及隴西金城常儲穀粟令周數年馬賢以犀苦兄弟數背叛因繫質於令居其冬賢坐徵免右扶風韓皓代為校尉明年犀苦詣皓自言求歸故地皓復不遣因轉湟中屯田置兩河閒以逼羣羌皓復坐徵張掖太守馬續代為校尉兩河閒羌以屯田近之恐必見圖乃解仇詛盟各自儆備續欲先示恩信乃上移屯田還湟中羌意乃安至陽嘉元年以湟中地廣更增置屯田五部并為十部二年夏復置隴西南部都尉如舊制三年鍾羌良封等復寇隴西漢陽詔拜前校尉馬賢為謁者鎮撫諸種馬續遣兵擊良封斬首數百級四年馬賢亦發隴西吏士及羌胡兵擊殺良封斬首千八百級獲馬牛羊五萬餘頭良封親屬並詣實賢降賢復進擊鍾羌且昌且昌等率諸種十餘萬詣涼州刺史降永和元年馬續遷度遼將軍復以馬賢代為校尉初武都塞上白馬羌攻破屯官反叛連年二年春廣漢屬國都尉擊破之斬首六百餘級馬賢又擊斬其渠帥飢指累祖等三百級於是隴右復平明年冬燒當種那離等三千餘騎寇金城塞馬賢將兵赴擊斬首四百餘級獲馬千四百匹那離等復西招羌胡殺傷吏民四年馬賢將湟中義從兵及羌胡萬餘騎掩擊那離等斬之獲首虜千二百餘級得馬騾羊十萬餘頭徵賢為弘農太守以來機為并州刺史劉秉為涼州刺史並當之職, WYG: ''}
