  - {type: variant, offset: 9156, length: 216, content: 趙沖追擊鞏唐羌斬首四百餘級得馬牛羊驢萬八千餘頭羌二千餘人降詔沖督河西四郡兵為節度罕種羌千餘寇北地北地太守賈福與趙沖擊之不利秋諸種八九千騎寇武威涼部震恐於是復徙安定居扶風北地居馮翊遣行車騎將軍執金吾張喬將左右羽林五校士及河內南陽汝南兵萬五千屯三輔漢安元年以趙沖為護羌校尉沖招懷叛羌罕種乃率邑落五千餘戶詣沖降於是罷張喬軍屯唯燒何種三千餘落據參北界三年夏趙沖與漢陽太守張貢掩擊之斬首千五百級得牛羊驢十八萬頭冬沖擊諸種斬首四千餘級詔沖一子為, WYG: 徴拜議}
