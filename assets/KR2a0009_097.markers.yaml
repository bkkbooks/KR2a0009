  - {type: variant, offset: 3222, length: 282, content: 又奏林臧罪遂下獄死謁者郭襄代領校尉事到隴西聞涼州羌盛還詣闕抵罪於是復省校尉官滇吾子東吾立以父降漢乃入居塞內謹愿自守而諸弟迷吾等數為寇盜肅宗建初元年安夷縣吏略妻卑湳種羌婦吏為其夫所殺安夷長宗延追之出塞種人恐見誅遂共殺延而與勒姐及吾良二種相結為寇隴西太守孫純遣從事李睦及金城兵會和羅谷與卑湳等戰斬首虜數百人復拜故度遼將軍吳棠領護羌校尉居安夷二年夏迷吾遂與諸衆聚兵欲叛出塞金城太守郝崇追之戰於荔谷崇兵大敗崇輕騎得脫死者二千餘人於是諸種及屬國盧水胡悉與相應吳棠不能制坐徵免武威太守傅育代為校尉移居臨羌迷吾又與封養種豪布橋等五萬餘人共寇隴西漢陽於是遣行車騎將軍馬防長水校尉耿, WYG: 劉}
