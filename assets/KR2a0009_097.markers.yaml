  - {type: variant, offset: 9482, length: 4, content: 遇羌伏兵, WYG: 質珪璋玉也半珪曰璋謝承書曰林宗歎儒有珪璋之質終必為令徳之士詩曰如珪如璋令聞令望察孝亷舉髙第三遷侍中桓帝時數有災異下䇿博求直言儒上封事十條極言得失辭甚忠切帝不能納出為任城相頃之徴拜議郎㑹竇武事下獄自殺賈彪傳賈彪字偉節潁川定陵人也少遊京師志節慷慨}
