  - {type: variant, offset: 454, length: 1, content: 難, WYG: 未聞羊舌有謝恩之辭祁老有自伐之色竟無所言左傳晋討欒盈之黨殺叔向之弟羊舌虎并囚叔向於是祁奚聞之見范宣子曰夫謀而鮮過恵訓不倦者叔向有焉社稷之固也猶將十代宥之今一不免其身不亦惑乎宣子說而免之祁奚不見叔向而歸叔向亦不告免焉而朝孔安國注尚書曰自功曰伐也建寜二年}
