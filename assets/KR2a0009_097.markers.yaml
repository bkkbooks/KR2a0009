  - {type: variant, offset: 1987, length: 429, content: 不田處以為畜牧安國以事奏聞後將軍趙充國以為不可聽後因緣前言遂度湟水郡縣不能禁至元康三年先零乃與諸羌大共盟誓將欲寇邊帝聞復使安國將兵觀之安國至召先零豪四十餘人斬之因放兵擊其種斬首千餘級於是諸羌怨怒遂寇金城乃遣趙充國與諸將將兵六萬人擊破平之至研十三世孫燒當立元帝時𩒎姐等七種羌寇隴西遣右將軍馮奉世擊破降之從爰劒種五世至研研最豪健自後以研為種號十三世至燒當復豪健其子孫更以燒當為種號自𩒎姐羌降之後數十年四夷賓服邊塞無事至王莽輔政欲燿威德以懷遠為名乃令譯諷旨諸羌使共獻西海之地初開以為郡築五縣邊海亭燧相望焉滇良者燒當之玄孫也時王莽末四夷內侵及莽敗衆羌遂還據西海為寇更始赤眉之際羌遂放縱寇金城隴西隗囂雖擁兵而不能討之乃就慰納因發其衆與漢相拒建武九年隗囂死司徒掾班彪上言今涼州部皆有降羌羌胡被髮左袵而與漢人雜處習俗既異言語不通數為小吏黠人所見侵奪窮恚無聊故致反叛夫蠻夷寇亂皆為此也舊制益州部置蠻夷騎都尉幽州部置領烏桓校尉涼州部置護羌校尉皆持節領護理其怨結歲時循行問所疾苦, WYG: 在肅然}
