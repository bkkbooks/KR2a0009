  - {type: variant, offset: 39, length: 0, content: '', WYG: 家皆歸故郡其後黄巾遂盛朝野崩離綱紀文章蕩然矣詩大雅蕩篇序曰厲王無道天下蕩蕩無綱紀文章鄭𤣥注云蕩蕩法度廢壊之貌也凡黨事始自甘陵汝南成於李膺張儉海内塗炭二十餘年諸所蔓衍皆天下善士}
