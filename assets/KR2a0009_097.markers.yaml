  - {type: variant, offset: 8814, length: 8, content: 戎狄荒服蠻夷要服, WYG: 昔魏齊違死虞卿觧印違避也史記魏齊魏之諸公子也虞卿趙相也范雎入秦為昭王相昭王乃遺趙王書曰魏齊范雎之仇也急持其頭來趙王乃圍齊齊急見虞卿卿度趙王不可說乃觧其印與齊往信陵君所信陵君初聞之疑後乃出迎齊聞信陵初疑遂自刎趙王持其頭遺秦也季布逃亡朱家甘罪季布楚人為項羽將數窘漢王羽敗漢購求布千金敢舍匿罪三族布匿濮陽周氏髠鉗布之魯朱家所賣之朱家心知是季布也買置田舍乃徃洛陽見汝隂侯灌嬰說之曰季布何罪臣各為主用職耳汝隂侯}
