  - {type: variant, offset: 924, length: 159, content: 號曰陰戎陰戎之種遂以滋廣晉文公欲脩霸業乃賂戎狄通道以匡王室秦穆公得戎人由余遂霸西戎開地千里及晉悼公又使魏絳和諸戎復脩霸業是時楚晉強盛威服諸戎陸渾伊洛陰戎事晉而蠻氏從楚後陸渾叛晉晉令荀吳滅之後四十四年楚執蠻氏而盡囚其人是時義渠大荔最強築城數十皆自稱王至周貞王八年秦厲公滅大荔取其地趙亦滅代戎即北戎也韓魏復共稍并伊洛陰戎滅, WYG: 輙詣衍決}
