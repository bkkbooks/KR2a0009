  - {type: variant, offset: 28, length: 0, content: '', WYG: 知之矣若猶未也又將及難君命無二古之制也除君之惡唯力是視蒲人狄人余何有焉今君即位其無蒲狄乎此為厮臺觧情也並見左傳霸徳既衰狙詐萌起霸徳衰六}
  - {type: variant, offset: 28, length: 0, content: '', krp: 知之矣若猶未也又將及難君命無二古之制也除君之惡唯力是視蒲人狄人余何有焉今君即位其無蒲狄乎此為厮臺觧情也並見左傳霸徳既衰狙詐萌起霸徳衰六}
  - {type: variant, offset: 29, length: 1, content: 近, WYG: 時也狙音七余反廣雅曰狙獮猴也以其多詐故比之也彊者以決勝為雄弱者以詐劣受屈至有畫半䇿而綰萬金開一說而錫琛瑞蘇秦說趙王賜白璧百䨇黄金萬鎰虞卿一見趙王賜白璧一䨇黄金百鎰見史記及戰國䇿或起徒歩而仕執珪觧草衣以升卿相史記曰楚恵王言莊舄越之鄙細人也今仕楚執珪貴富矣觧草衣謂范睢蔡澤之類士之飾巧馳辯以要能釣利者不期而景從矣韓子李斯曰韓非飾辨詐謀以釣利於秦也賈誼過秦論曰贏糧而景從自是愛尚相奪與時回變其風不可留其敝不能反及漢祖杖劍武夫勃興憲令寛賖文禮簡濶緒餘四豪之烈人懐陵上之心四豪謂信陵君魏公子無忌平原君趙勝春申君黄歇孟嘗君田文前書班固曰游談者以四豪為稱首輕死重氣怨恵必讐令行私庭權移匹庶任俠之方成其俗矣前書音義曰相與信為任同是非為俠所謂權行州域力折公侯者也自武帝以後崇尚儒學懐經協術所在霧㑹至有石渠分争之論黨同伐異之說守文之徒盛於時矣武帝詔求賢良於是公孫𢎞董仲舒等出焉宣帝時集諸儒於石渠閣講論六蓺召五經名儒太子太傅蕭望之等大議殿中平公羊穀梁同異同已者朋黨之異已者攻伐之劉歆書曰黨同門妒道真至王莽専偽終於簒國忠義之流恥見纓紼遂乃榮華丘壑甘足枯槁謂龔勝薛方郭欽蔣詡之類並隠居不應莽召雖中興在運漢徳重開而保身懐方彌相慕襲去就之節重於時矣謂逢萌嚴光周黨尚長之屬逮桓靈之間主荒政謬國命委於閹寺士子羞與為伍故匹夫抗憤處士横議遂乃激揚名聲互相題拂品覈公卿裁量執政婞直之風於斯行矣婞狠也音刑鼎反夫上好則下必甚矯枉故直必過其理然矣禮記曰下之事上也不從其所令從其所行上好是物下必有甚者矣矯正也正枉必過其直見孟子若范滂張儉之徒清心忌惡終陷黨議不其然乎初桓帝為蠡吾侯受學於甘陵周福及即帝位擢福為尚書時同郡河}
