  - {type: variant, offset: 33, length: 1, content: 舜, WYG: 陳寔之徒二百餘人或有逃遁不獲皆懸金購募使者四出相望於道明年尚書霍諝城門校尉竇武並表為請帝意稍觧乃皆赦歸田里禁錮終身而黨人之名猶書王府自是正直廢放邪枉熾結海内希風之}
  - {type: page-break, offset: 33, content: '', id: KR2a0009_WYG_097-5b, image: WYG0253/WYG0253-0359d.png}
  - {type: variant, offset: 33, length: 1, content: 舜, krp: 陳寔之徒二百餘人或有逃遁不獲皆懸金購募使者四出相望於道明年尚書霍諝城門校尉竇武並表為請帝意稍觧乃皆赦歸田里禁錮終身而黨人之名猶書王府自是正直廢放邪枉熾結海内希風之}
  - {type: variant, offset: 35, length: 0, content: '', WYG: 遂共相摽搒希望也摽搒猶相稱揚也搒與榜同古字通指天下名士為之稱號上曰三君次曰八俊次曰八顧次曰八及次曰八㕑猶古之八元八凱也竇武劉淑陳蕃為三君君者言一世之所宗也李膺荀昱杜宻王暢劉祐魏朗趙典朱㝢為八俊俊者言人之英也郭林宗宗慈巴肅夏馥范滂尹勲蔡衍羊陟為八顧顧者言能以徳行引人者也張儉岑晊劉表陳翔孔昱苑康檀敷翟超為八及及者言其能導人追宗者也導引也宗謂所宗仰也度尚張邈王考劉儒胡母班秦周蕃嚮王章為八㕑蕃姓也音皮㕑者言能以財救人者也又張儉鄉人朱並承望中常侍侯覽意㫖上書告儉與同鄉二十}
  - {type: page-break, offset: 35, content: '', id: KR2a0009_WYG_097-6a, image: WYG0253/WYG0253-0360a.png}
  - {type: variant, offset: 35, length: 0, content: '', krp: 遂共相摽搒希望也摽搒猶相稱揚也搒與榜同古字通指天下名士為之稱號上曰三君次曰八俊次曰八顧次曰八及次曰八㕑猶古之八元八凱也竇武劉淑陳蕃為三君君者言一世之所宗也李膺荀昱杜宻王暢劉祐魏朗趙典朱㝢為八俊俊者言人之英也郭林宗宗慈巴肅夏馥范滂尹勲蔡衍羊陟為八顧顧者言能以徳行引人者也張儉岑晊劉表陳翔孔昱苑康檀敷翟超為八及及者言其能導人追宗者也導引也宗謂所宗仰也度尚張邈王考劉儒胡母班秦周蕃嚮王章為八㕑蕃姓也音皮㕑者言能以財救人者也又張儉鄉人朱並承望中常侍侯覽意㫖上書告儉與同鄉二十}
  - {type: variant, offset: 36, length: 1, content: 凶, WYG: 人别相署號共為部黨圗危社稷以儉及檀彬褚鳳張肅薛蘭馮禧魏𤣥徐乾為八俊田林張隠劉表薛郁王訪劉祗宣靖公緒恭為八顧公緒姓也朱楷田槃疎耽薛敦宋布唐龍羸咨宣褒為八及刻石立墠共為部黨而儉為之魁墠除地於中為壇墠音禪魁大帥也靈帝詔刋章捕儉等刋削不欲宣露並名故削除之而直捕儉等大長秋曹節因此諷有司奏捕前黨故司空虞放太僕杜宻長樂少府李膺司隸校尉朱㝢潁川太守巴肅沛相荀昱河内太守魏朗山陽太守翟超任城相劉儒太尉掾范滂等百餘人皆死獄中餘或先歿不及或亡命獲免自此諸為怨隙者因相陷害睚眦之忿濫入黨中睚音五懈反廣雅曰睚裂也眦音才賜反前書音義曰瞋目貎也史記曰睚眦之隙必報又州郡承㫖或有未嘗交闗亦離禍毒其死徙廢禁者六七百人熹平五年永昌太守曹鸞上書大訟黨人言甚方切帝省奏大怒即詔司隸益州檻車收鸞送槐里獄掠殺之於是又詔州郡更考黨人門生故吏父子兄弟其在位者免官禁錮爰及五屬謂斬衰齊衰大功小功緦麻也光和二年上禄長和海上禄縣屬武都郡今成州縣也上言禮從祖兄弟别居異財恩義已輕服屬疎末而今黨人錮及五族既乖典訓之文有謬經常之法左氏傳曰父子兄弟罪不相及帝覽而悟之黨錮自從祖以下皆得觧釋中平元年黄巾賊起中常侍吕彊言於帝曰黨錮久積人情多怨若久不赦宥輕與張角合謀為變滋大悔之無救帝懼其言乃大赦黨人誅}
