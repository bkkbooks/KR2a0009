  - {type: variant, offset: 3505, length: 3746, content: 副討破之於是臨洮索西迷吾等悉降防乃築索西城徙隴西南部都尉戍之悉復諸亭候至元和三年迷吾復與弟號吾諸雜種反叛秋號吾先輕入寇隴西界郡督烽掾李章追之生得號吾將詣郡號吾曰獨殺我無損於羌誠得生歸必悉罷兵不復犯塞隴西太守張紆權宜放遣羌即為解散各歸故地迷吾退居河北歸義城傅育不欲失信伐之乃募人鬬諸羌胡羌胡不肯遂復叛出塞更依迷吾章和元年育上請發隴西張掖酒泉各五千人諸郡太守將之育自領漢陽金城五千人合二萬兵與諸郡剋期擊之令隴西兵據河南張掖酒泉兵遮其西並未及會育軍獨進迷吾聞之徙廬落去育選精騎三千窮追之夜至建威南三兜谷去虜數里須旦擊之不設備迷吾乃伏兵三百人夜突育營營中驚壞散走育下馬手戰殺十餘人而死死者八百八十人及諸郡兵到羌遂引去育北地人也顯宗初為臨羌長與捕虜將軍馬武等擊羌滇吾功冠諸軍及在武威威聲聞於匈奴食祿數十年秩奉盡贍給知友妻子不免操井臼肅宗下詔追襃美之封其子毅為明進侯七百戶以隴西太守張紆代為校尉將萬人屯臨羌迷吾既殺傅育狃忕邊利章和元年復與諸種步騎七千人入金城塞張紆遣從事司馬防將千餘騎及金城兵會戰於木乘谷迷吾兵敗走因譯使欲降紆納之遂將種人詣臨羌縣紆設兵大會施毒酒中羌飲醉紆因自擊伏兵起誅殺酋豪八百餘人斬迷吾等五人頭以祭育冢復放兵擊在山谷閒者斬首四百餘人得生口二千餘人迷吾子迷唐及其種人向塞號哭與燒何當煎當闐等相結以子女及金銀娉納諸種解仇交質將五千人寇隴西塞太守寇盱與戰於白石迷唐不利引還大小榆谷北招屬國諸胡會集附落種衆熾盛張紆不能討永元元年紆坐徵以張掖太守鄧訓代為校尉稍以賞賂離閒之由是諸種少解東吾子東號立是時號吾將其種人降校尉鄧訓遣兵擊迷唐迷唐去大小榆谷徙居頗巖谷和帝永元四年訓病卒蜀郡太守聶尚代為校尉尚見前人累征不克欲以文德服之乃遣驛使招呼迷唐使還居大小榆谷迷唐既還遣祖母卑缺詣尚尚自送至塞下為設祖道令譯田汜等五人護送至廬落迷唐因而反叛遂與諸種共生屠裂汜等以血盟詛復寇金城塞五年尚坐徵免居延都尉貫友代為校尉友以迷唐難用德懷終於叛亂乃遣驛使搆離諸種誘以財貨由是解散友乃遣兵出塞攻迷唐於大小榆谷獲首虜八百餘人收麥數萬斛遂夾逢留大河築城塢作大航造河橋欲度兵擊迷唐迷唐乃率部落遠依賜支河曲至八年友病卒漢陽太守史充代為校尉充至遂發湟中羌胡出塞擊迷唐而羌迎敗充兵殺數百人明年充坐徵代郡太守吳祉代為校尉其秋迷唐率八千人寇隴西殺數百人乘勝深入脅塞內諸種羌共為寇盜衆羌復悉與相應合步騎三萬人擊破隴西兵殺大夏長遣行征西將軍劉尚越騎校尉趙代副將北軍五營黎陽雍營三輔積射及邊兵羌胡三萬人討之尚屯狄道代屯枹罕尚遣司馬寇盱監諸郡兵四面並會迷唐懼𠫓廾老弱奔入臨洮南尚等追至高山迷唐窮迫率其精強大戰盱斬虜千餘人得牛馬羊萬餘頭迷唐引去漢兵死傷亦多不能復追乃還入塞明年尚代並坐畏懦徵下獄免謁者王信領尚營屯枹罕謁者耿譚領代營屯白石譚乃設購賞諸種頗來內附迷唐恐乃請降信譚遂受降罷兵遣迷唐詣闕其餘種人不滿二千飢窘不立入居金城和帝令迷唐將其種人還大小榆谷迷唐以為漢作河橋兵來無常故地不可復居辭以種人飢餓不肯遠出吳祉等乃多賜迷唐金帛令糴穀巿畜促使出塞種人更懷猜驚十二年遂復背叛乃脅將湟中諸胡寇鈔而去王信耿譚吳祉皆坐徵以酒泉太守周鮪代為校尉明年迷唐復還賜支河曲初累姐種附漢迷唐怨之遂擊殺其酋豪由是與諸種為讎黨援益疎其秋迷唐復將兵向塞周鮪與金城太守侯霸及諸郡兵屬國湟中月氏諸胡隴西牢姐羌合三萬人出塞至允川與迷唐戰周鮪還營自守唯侯霸兵陷陳斬首四百餘級羌衆折傷種人瓦解降者六千餘口分徙漢陽安定隴西迷唐遂弱其種衆不滿千人遠踰賜支河首依發羌居明年周鮪坐畏懦徵侯霸代為校尉安定降羌燒何種脅諸羌數百人反叛郡兵擊滅之悉沒入弱口為奴婢時西海及大小榆谷左右無復羌寇隃麋相曹鳳上言西戎為害前世所患臣不能紀古且以近事言之自建武以來其犯法者常從燒當種起所以然者以其居大小榆谷土地肥美又近塞內諸種易以為非難以攻伐南得鍾存以廣其衆北阻大河因以為固又有西海魚鹽之利緣山濱水以廣田蓄故能彊大常雄諸種恃其權勇招誘羌胡今者衰困黨援壞沮親屬離叛餘勝兵者不過數百亡逃棲竄遠依發羌臣愚以為宜及此時建復西海郡縣規固二榆廣設屯田隔塞羌胡交關之路遏絕狂狡窺欲之源又殖穀富邊省委輸之役國家可以無西方之憂於是拜鳳為金城西部都尉將徙士屯龍耆後金城長史上官鴻上開置歸義建威屯田二十七部侯霸復上置東西邯屯田五部增留逢二部帝皆從之列屯夾河合三十四部其功垂立至永初中諸羌叛乃罷迷唐失衆病死有一子來降戶不滿數十東號子麻奴立初隨父降居安定時諸降羌布在郡縣皆為吏人豪右所徭役積以愁怨安帝永初元年夏遣騎都尉王弘發金城隴西漢陽羌數百千騎征西域弘迫促發遣羣羌懼遠屯不還行到酒泉多有散叛諸郡各發兵儌遮或覆其廬落於是勒姐當煎大豪東岸等愈驚遂同時奔潰麻奴兄弟因此遂與種人俱西出塞先零別種滇零與鍾羌諸種大為寇掠斷隴道時羌歸附既久無復器甲或持竹竿木枝以代戈矛或負板案以為楯或執銅鏡以象兵郡縣畏懦不能制冬遣車騎將軍鄧騭征西校尉任尚副將五營及三河三輔汝南南陽潁川太原上黨兵合五萬人屯漢陽明年春諸郡兵未及至鍾羌數千人先擊敗騭軍於冀西殺千餘人校尉侯霸坐衆羌反叛徵免以西域都護段禧代為校尉其冬騭使任尚及從事中郎司馬鈞率諸郡兵與滇零等數萬人戰於平襄尚軍大敗死者八千餘人於是滇零等自稱天子於北地招集武都參狼上郡西河諸雜種衆遂大盛東犯趙魏南入益州殺漢中太守董炳遂寇鈔三輔斷隴道湟中諸縣粟石萬錢百姓死亡不可勝數朝廷不能制而轉運難劇遂詔騭還師留任尚屯漢陽為諸軍節度朝廷以鄧太后故迎拜騭為大將軍封任尚樂亭侯食邑三百戶三年春復遣騎都尉任仁督諸郡屯兵救三輔仁戰每不利衆羌乘勝漢兵數挫當煎勒姐種攻沒破羌縣鍾羌又沒臨洮縣生得隴西南部都尉明年春滇零遣人寇襃中燔燒郵亭大掠百姓於是漢中太守鄭勤移屯襃中軍營久出無功有廢農桑乃詔任尚將吏兵還屯長安罷遣南陽潁川汝南吏士置京兆虎牙都尉於長安扶風都尉於雍如西京三輔都尉故事時羌復攻襃中鄭勤欲擊之主簿段崇諫以為虜乘勝鋒不可當宜堅守待之勤不從出戰大敗死者三千餘人段崇及門下史王宗原展以身扞刃與勤俱死於是徙金城郡居襄武任仁戰累敗而兵士放縱檻車徵詣廷尉詔獄死段禧病卒復以前校尉侯霸代之遂移居張掖五年春任尚坐無功徵免羌遂入寇河東至河內百姓相驚多奔南度河使北軍中候朱寵將五營士屯孟津詔魏郡趙國常山中山繕作塢候六百一十六所羌既轉盛而二千石令長多內郡人並無守戰意皆爭上徙郡縣以避寇難朝廷從之遂移隴西徙襄武安定徙美陽北地徙池陽上郡徙衙百姓戀土不樂去舊遂乃刈其禾稼發徹室屋夷營壁破積聚時連旱蝗飢荒而驅劫略流離分散隨道死亡或𠫓廾捐老弱或為人僕妾喪其太半復以任尚為侍御史擊衆羌於上黨羊頭山破之誘殺降者二百餘人乃罷孟津屯其秋漢陽人杜琦及弟季貢同郡王信等與羌通謀聚衆入上邽城琦自稱安漢將軍於是詔購募得琦首者封列侯賜錢百萬羌胡斬琦者賜金百斤銀二百斤漢陽太守趙博遣刺客杜習刺殺琦封習討姦侯賜錢百萬而杜季貢王信等將其衆據樗泉營侍御史唐喜領諸郡兵討破之斬王信等六百餘級沒入妻子五百餘人收金錢銀綵帛一億已上杜季貢亡從滇零六年任尚復坐徵免滇零死子零昌代立年尚幼少同種狼莫為其計策以杜季貢為將軍別居丁奚城七年夏騎都尉馬賢與侯霸掩擊零昌別部牢羌於安定首虜千人得驢騾駱馬牛羊二萬餘頭以畀得者元初元年春遣兵屯河內通谷衝要三十三所皆作塢壁設鳴鼓零昌遣兵寇雍城又號多與當煎勒姐大豪共脅諸種分兵鈔掠武都漢中巴郡板楯蠻將兵救之漢中五官掾程信率壯士與蠻共擊破之號多退走還斷隴道與零昌通謀侯霸馬賢將湟中吏人及降羌胡於枹罕擊之斬首二百餘級涼州刺史皮楊擊羌於狄道大敗死者八百餘人楊坐徵免侯霸病卒漢陽太守龐參代為校尉參以恩信招誘之二年春號多等率衆七千餘人詣參降遣詣闕賜號多侯印綬遣之參紿還居令居通河西道而零昌種衆復分寇益州遺中郎將尹就將南陽兵因發益部諸郡屯兵擊零昌黨呂叔都等至秋蜀人陳省羅橫應募刺殺叔都皆封侯賜錢又使屯騎校尉班雄屯三輔遣左馮翊司馬鈞行征西將軍督右扶風仲光安定太守杜恢北地太守盛包京兆虎牙都尉耿溥右扶風都尉皇甫旗等合八千餘人又龐參將羌胡兵七千餘人與鈞分道並北擊零昌參兵至勇士東為杜季貢所敗於是引退鈞等獨進攻拔丁奚城大克獲杜秀貢率衆偽逃鈞令光恢包等收羌禾稼光等違鈞節度散兵深入羌乃設伏要擊之鈞在城中怒而不救光等並沒死者三千餘人鈞乃遣還坐徵自殺龐參以失期軍敗抵罪以馬賢代領校尉事後遣任尚為中郎將將羽林緹騎五營子弟三千五百人代班雄屯三輔尚臨行懷令虞詡說尚曰使君頻奉國命討逐寇賊三州屯兵二十餘萬人𠫓廾農桑疲苦徭役而未有功効勞費日滋若此出不克誠為使君危之尚曰憂惶久矣不知所如詡曰兵法弱不攻強走不逐飛自然之埶也今虜皆馬騎日行數百來如風雨去如絕弦以步追之埶不相及所以曠而無功也為使君計者莫如罷諸郡兵各令出錢數千二十人共市一馬如此可捨甲冑馳輕兵以萬騎之衆逐數千之虜追尾掩其道自窮便人利事大功立矣尚大喜即上言用其計乃遣輕騎鈔擊杜季貢於丁奚城斬首四百餘級獲牛馬羊數千頭明年夏度遼將軍鄧遵率南單于及左鹿蠡王須沈萬騎擊零昌於靈州斬首八百餘級封須沈為破虜侯金印紫綬賜金帛各有差任尚遣兵擊破先零羌於丁奚城秋築馮翊北界候塢五百所任尚又遣假司馬募陷陳士擊零昌於北地殺其妻子得牛馬羊二萬頭燒其廬落斬首七百餘級得僭號文書及所沒諸將印綬四年春尚遣當闐種羌榆鬼等五人刺殺杜季貢封榆鬼為破羌侯其夏尹就以不能定益州坐徵抵罪以, WYG: ''}
  - {type: variant, offset: 3505, length: 3746, content: 副討破之於是臨洮索西迷吾等悉降防乃築索西城徙隴西南部都尉戍之悉復諸亭候至元和三年迷吾復與弟號吾諸雜種反叛秋號吾先輕入寇隴西界郡督烽掾李章追之生得號吾將詣郡號吾曰獨殺我無損於羌誠得生歸必悉罷兵不復犯塞隴西太守張紆權宜放遣羌即為解散各歸故地迷吾退居河北歸義城傅育不欲失信伐之乃募人鬬諸羌胡羌胡不肯遂復叛出塞更依迷吾章和元年育上請發隴西張掖酒泉各五千人諸郡太守將之育自領漢陽金城五千人合二萬兵與諸郡剋期擊之令隴西兵據河南張掖酒泉兵遮其西並未及會育軍獨進迷吾聞之徙廬落去育選精騎三千窮追之夜至建威南三兜谷去虜數里須旦擊之不設備迷吾乃伏兵三百人夜突育營營中驚壞散走育下馬手戰殺十餘人而死死者八百八十人及諸郡兵到羌遂引去育北地人也顯宗初為臨羌長與捕虜將軍馬武等擊羌滇吾功冠諸軍及在武威威聲聞於匈奴食祿數十年秩奉盡贍給知友妻子不免操井臼肅宗下詔追襃美之封其子毅為明進侯七百戶以隴西太守張紆代為校尉將萬人屯臨羌迷吾既殺傅育狃忕邊利章和元年復與諸種步騎七千人入金城塞張紆遣從事司馬防將千餘騎及金城兵會戰於木乘谷迷吾兵敗走因譯使欲降紆納之遂將種人詣臨羌縣紆設兵大會施毒酒中羌飲醉紆因自擊伏兵起誅殺酋豪八百餘人斬迷吾等五人頭以祭育冢復放兵擊在山谷閒者斬首四百餘人得生口二千餘人迷吾子迷唐及其種人向塞號哭與燒何當煎當闐等相結以子女及金銀娉納諸種解仇交質將五千人寇隴西塞太守寇盱與戰於白石迷唐不利引還大小榆谷北招屬國諸胡會集附落種衆熾盛張紆不能討永元元年紆坐徵以張掖太守鄧訓代為校尉稍以賞賂離閒之由是諸種少解東吾子東號立是時號吾將其種人降校尉鄧訓遣兵擊迷唐迷唐去大小榆谷徙居頗巖谷和帝永元四年訓病卒蜀郡太守聶尚代為校尉尚見前人累征不克欲以文德服之乃遣驛使招呼迷唐使還居大小榆谷迷唐既還遣祖母卑缺詣尚尚自送至塞下為設祖道令譯田汜等五人護送至廬落迷唐因而反叛遂與諸種共生屠裂汜等以血盟詛復寇金城塞五年尚坐徵免居延都尉貫友代為校尉友以迷唐難用德懷終於叛亂乃遣驛使搆離諸種誘以財貨由是解散友乃遣兵出塞攻迷唐於大小榆谷獲首虜八百餘人收麥數萬斛遂夾逢留大河築城塢作大航造河橋欲度兵擊迷唐迷唐乃率部落遠依賜支河曲至八年友病卒漢陽太守史充代為校尉充至遂發湟中羌胡出塞擊迷唐而羌迎敗充兵殺數百人明年充坐徵代郡太守吳祉代為校尉其秋迷唐率八千人寇隴西殺數百人乘勝深入脅塞內諸種羌共為寇盜衆羌復悉與相應合步騎三萬人擊破隴西兵殺大夏長遣行征西將軍劉尚越騎校尉趙代副將北軍五營黎陽雍營三輔積射及邊兵羌胡三萬人討之尚屯狄道代屯枹罕尚遣司馬寇盱監諸郡兵四面並會迷唐懼𠫓廾老弱奔入臨洮南尚等追至高山迷唐窮迫率其精強大戰盱斬虜千餘人得牛馬羊萬餘頭迷唐引去漢兵死傷亦多不能復追乃還入塞明年尚代並坐畏懦徵下獄免謁者王信領尚營屯枹罕謁者耿譚領代營屯白石譚乃設購賞諸種頗來內附迷唐恐乃請降信譚遂受降罷兵遣迷唐詣闕其餘種人不滿二千飢窘不立入居金城和帝令迷唐將其種人還大小榆谷迷唐以為漢作河橋兵來無常故地不可復居辭以種人飢餓不肯遠出吳祉等乃多賜迷唐金帛令糴穀巿畜促使出塞種人更懷猜驚十二年遂復背叛乃脅將湟中諸胡寇鈔而去王信耿譚吳祉皆坐徵以酒泉太守周鮪代為校尉明年迷唐復還賜支河曲初累姐種附漢迷唐怨之遂擊殺其酋豪由是與諸種為讎黨援益疎其秋迷唐復將兵向塞周鮪與金城太守侯霸及諸郡兵屬國湟中月氏諸胡隴西牢姐羌合三萬人出塞至允川與迷唐戰周鮪還營自守唯侯霸兵陷陳斬首四百餘級羌衆折傷種人瓦解降者六千餘口分徙漢陽安定隴西迷唐遂弱其種衆不滿千人遠踰賜支河首依發羌居明年周鮪坐畏懦徵侯霸代為校尉安定降羌燒何種脅諸羌數百人反叛郡兵擊滅之悉沒入弱口為奴婢時西海及大小榆谷左右無復羌寇隃麋相曹鳳上言西戎為害前世所患臣不能紀古且以近事言之自建武以來其犯法者常從燒當種起所以然者以其居大小榆谷土地肥美又近塞內諸種易以為非難以攻伐南得鍾存以廣其衆北阻大河因以為固又有西海魚鹽之利緣山濱水以廣田蓄故能彊大常雄諸種恃其權勇招誘羌胡今者衰困黨援壞沮親屬離叛餘勝兵者不過數百亡逃棲竄遠依發羌臣愚以為宜及此時建復西海郡縣規固二榆廣設屯田隔塞羌胡交關之路遏絕狂狡窺欲之源又殖穀富邊省委輸之役國家可以無西方之憂於是拜鳳為金城西部都尉將徙士屯龍耆後金城長史上官鴻上開置歸義建威屯田二十七部侯霸復上置東西邯屯田五部增留逢二部帝皆從之列屯夾河合三十四部其功垂立至永初中諸羌叛乃罷迷唐失衆病死有一子來降戶不滿數十東號子麻奴立初隨父降居安定時諸降羌布在郡縣皆為吏人豪右所徭役積以愁怨安帝永初元年夏遣騎都尉王弘發金城隴西漢陽羌數百千騎征西域弘迫促發遣羣羌懼遠屯不還行到酒泉多有散叛諸郡各發兵儌遮或覆其廬落於是勒姐當煎大豪東岸等愈驚遂同時奔潰麻奴兄弟因此遂與種人俱西出塞先零別種滇零與鍾羌諸種大為寇掠斷隴道時羌歸附既久無復器甲或持竹竿木枝以代戈矛或負板案以為楯或執銅鏡以象兵郡縣畏懦不能制冬遣車騎將軍鄧騭征西校尉任尚副將五營及三河三輔汝南南陽潁川太原上黨兵合五萬人屯漢陽明年春諸郡兵未及至鍾羌數千人先擊敗騭軍於冀西殺千餘人校尉侯霸坐衆羌反叛徵免以西域都護段禧代為校尉其冬騭使任尚及從事中郎司馬鈞率諸郡兵與滇零等數萬人戰於平襄尚軍大敗死者八千餘人於是滇零等自稱天子於北地招集武都參狼上郡西河諸雜種衆遂大盛東犯趙魏南入益州殺漢中太守董炳遂寇鈔三輔斷隴道湟中諸縣粟石萬錢百姓死亡不可勝數朝廷不能制而轉運難劇遂詔騭還師留任尚屯漢陽為諸軍節度朝廷以鄧太后故迎拜騭為大將軍封任尚樂亭侯食邑三百戶三年春復遣騎都尉任仁督諸郡屯兵救三輔仁戰每不利衆羌乘勝漢兵數挫當煎勒姐種攻沒破羌縣鍾羌又沒臨洮縣生得隴西南部都尉明年春滇零遣人寇襃中燔燒郵亭大掠百姓於是漢中太守鄭勤移屯襃中軍營久出無功有廢農桑乃詔任尚將吏兵還屯長安罷遣南陽潁川汝南吏士置京兆虎牙都尉於長安扶風都尉於雍如西京三輔都尉故事時羌復攻襃中鄭勤欲擊之主簿段崇諫以為虜乘勝鋒不可當宜堅守待之勤不從出戰大敗死者三千餘人段崇及門下史王宗原展以身扞刃與勤俱死於是徙金城郡居襄武任仁戰累敗而兵士放縱檻車徵詣廷尉詔獄死段禧病卒復以前校尉侯霸代之遂移居張掖五年春任尚坐無功徵免羌遂入寇河東至河內百姓相驚多奔南度河使北軍中候朱寵將五營士屯孟津詔魏郡趙國常山中山繕作塢候六百一十六所羌既轉盛而二千石令長多內郡人並無守戰意皆爭上徙郡縣以避寇難朝廷從之遂移隴西徙襄武安定徙美陽北地徙池陽上郡徙衙百姓戀土不樂去舊遂乃刈其禾稼發徹室屋夷營壁破積聚時連旱蝗飢荒而驅劫略流離分散隨道死亡或𠫓廾捐老弱或為人僕妾喪其太半復以任尚為侍御史擊衆羌於上黨羊頭山破之誘殺降者二百餘人乃罷孟津屯其秋漢陽人杜琦及弟季貢同郡王信等與羌通謀聚衆入上邽城琦自稱安漢將軍於是詔購募得琦首者封列侯賜錢百萬羌胡斬琦者賜金百斤銀二百斤漢陽太守趙博遣刺客杜習刺殺琦封習討姦侯賜錢百萬而杜季貢王信等將其衆據樗泉營侍御史唐喜領諸郡兵討破之斬王信等六百餘級沒入妻子五百餘人收金錢銀綵帛一億已上杜季貢亡從滇零六年任尚復坐徵免滇零死子零昌代立年尚幼少同種狼莫為其計策以杜季貢為將軍別居丁奚城七年夏騎都尉馬賢與侯霸掩擊零昌別部牢羌於安定首虜千人得驢騾駱馬牛羊二萬餘頭以畀得者元初元年春遣兵屯河內通谷衝要三十三所皆作塢壁設鳴鼓零昌遣兵寇雍城又號多與當煎勒姐大豪共脅諸種分兵鈔掠武都漢中巴郡板楯蠻將兵救之漢中五官掾程信率壯士與蠻共擊破之號多退走還斷隴道與零昌通謀侯霸馬賢將湟中吏人及降羌胡於枹罕擊之斬首二百餘級涼州刺史皮楊擊羌於狄道大敗死者八百餘人楊坐徵免侯霸病卒漢陽太守龐參代為校尉參以恩信招誘之二年春號多等率衆七千餘人詣參降遣詣闕賜號多侯印綬遣之參紿還居令居通河西道而零昌種衆復分寇益州遺中郎將尹就將南陽兵因發益部諸郡屯兵擊零昌黨呂叔都等至秋蜀人陳省羅橫應募刺殺叔都皆封侯賜錢又使屯騎校尉班雄屯三輔遣左馮翊司馬鈞行征西將軍督右扶風仲光安定太守杜恢北地太守盛包京兆虎牙都尉耿溥右扶風都尉皇甫旗等合八千餘人又龐參將羌胡兵七千餘人與鈞分道並北擊零昌參兵至勇士東為杜季貢所敗於是引退鈞等獨進攻拔丁奚城大克獲杜秀貢率衆偽逃鈞令光恢包等收羌禾稼光等違鈞節度散兵深入羌乃設伏要擊之鈞在城中怒而不救光等並沒死者三千餘人鈞乃遣還坐徵自殺龐參以失期軍敗抵罪以馬賢代領校尉事後遣任尚為中郎將將羽林緹騎五營子弟三千五百人代班雄屯三輔尚臨行懷令虞詡說尚曰使君頻奉國命討逐寇賊三州屯兵二十餘萬人𠫓廾農桑疲苦徭役而未有功効勞費日滋若此出不克誠為使君危之尚曰憂惶久矣不知所如詡曰兵法弱不攻強走不逐飛自然之埶也今虜皆馬騎日行數百來如風雨去如絕弦以步追之埶不相及所以曠而無功也為使君計者莫如罷諸郡兵各令出錢數千二十人共市一馬如此可捨甲冑馳輕兵以萬騎之衆逐數千之虜追尾掩其道自窮便人利事大功立矣尚大喜即上言用其計乃遣輕騎鈔擊杜季貢於丁奚城斬首四百餘級獲牛馬羊數千頭明年夏度遼將軍鄧遵率南單于及左鹿蠡王須沈萬騎擊零昌於靈州斬首八百餘級封須沈為破虜侯金印紫綬賜金帛各有差任尚遣兵擊破先零羌於丁奚城秋築馮翊北界候塢五百所任尚又遣假司馬募陷陳士擊零昌於北地殺其妻子得牛馬羊二萬頭燒其廬落斬首七百餘級得僭號文書及所沒諸將印綬四年春尚遣當闐種羌榆鬼等五人刺殺杜季貢封榆鬼為破羌侯其夏尹就以不能定益州坐徵抵罪以, krp: ''}
