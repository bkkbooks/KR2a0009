  - {type: variant, offset: 40, length: 1, content: 危, WYG: 君八俊等三十五人其名迹存者並載乎篇陳蕃竇武王暢劉表度尚郭林宗别有傳荀昱附祖淑傳張邈附吕布傳胡母班附袁紹傳王考字文祖東平夀張人冀州刺史秦周字平王陳留平丘人北海相蕃嚮字嘉景魯國人郎中王璋字伯儀東莱曲城人少府卿曲城縣故城在今莱州掖縣東北位行並不顯翟超山陽太守事在陳蕃傳字及郡縣未詳朱㝢沛人與杜宻等俱死獄中唯趙典名見而已劉淑傳劉淑字仲承}
