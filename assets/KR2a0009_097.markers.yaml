  - {type: variant, offset: 437, length: 3, content: 及文王, krp: 召昭奚恤問焉對曰此欲觀吾國之得失而圗之寳器在於賢臣遂使恤應之乃為東面之壇一為南面之壇四}
  - {type: variant, offset: 442, length: 0, content: '', WYG: 面之壇一秦使者至恤曰君客也請就上位東面子西南面太宰子方次之葉公子髙次之司馬子反次之恤自居西面之壇稱曰客觀楚國之寳器所寳者賢臣也理百姓實倉廩使人各得其所子西在此奉珪璋使諸侯觧忿悁之難交兩國之懽使無兵草之憂太宰子方在此守封疆謹境界不侵鄰國鄰亦不侵葉公子髙在此理師旅正兵戎以當彊敵提枹鼓以動百萬之衆使皆赴湯火蹈白刄出萬死不顧司馬子反在此若懐霸王之餘義獵理亂之遺風昭奚恤在此惟大國所觀秦使者瞿然無以對恤遂攝衣而去使反言秦君曰楚多賢臣未可謀也梁恵王瑋其照乘之珠齊威王答以四臣瑋猶羙也史記曰魏恵王問齊威王曰王亦有寳乎威王曰無有魏王曰寡人之國雖小尚有徑寸珠照車前後十二乘者十枚奈何以萬乘之國而無寳乎威王曰寡人所以為寳者與王異吾臣有檀子者使守南城楚人不敢為寇吾臣有盻子者使守髙唐則趙人不敢東漁於河吾臣有黔夫者使守徐州於是燕人祭北門趙人祭西門從者七十餘家吾臣有種首者使備盜賊則道不拾遺以此為寳將以照千里豈特十二乘哉魏王慚不懌而去夫忠賢武將國之心膂竊見左校㢮刑徒前廷尉馮緄大司農劉祐河南尹李膺等執法不撓誅舉邪臣肆之以法肆陳也衆庶稱宜昔季孫行父親逆君命逐出莒僕於舜之功二十之一紀太子僕殺紀公以其寳玉来奔納諸宣公公命與之邑季文子使司寇出之境公問其故對曰孝敬忠信為吉徳盜賊藏姦為凶徳夫莒僕則其孝敬則弑君父矣則其忠信則竊寳玉矣其人則盜賊也是以去之舜舉十六相去四凶有大功二十而為天子今行父雖未獲一吉人去一凶矣於舜之功二十之一也見左傳今膺等投身彊禦畢力致罪陛下既不聽察而猥受譖訴遂令忠臣同愆元惡自春迄冬不䝉降恕遐邇觀聽為之歎息夫立政之要記功忘失是以武帝捨安國於徒中景帝時韓安國為梁大夫坐法抵罪後梁内史缺起徒中為二千石拜為内史臣賢案此言武帝誤也宣帝徴張敞於亡命張敞為京兆尹坐殺人亡命歸家冀州亂徴敞為冀州刺史緄前討蠻荆均吉甫之功詩小雅曰顯允方叔征伐玁狁蠻荆来威鄭𤣥注云方叔先與吉甫征伐玁狁今特征伐蠻荆皆使来服於宣王之威美其功之多也緄以順帝時討長沙武陵蠻夷有功故以比之祐數臨督司有不吐茹之節謂祐奏梁冀弟旻又為司隸校尉權豪畏之也詩曰唯仲山甫柔亦不茹剛亦不吐不侮鰥寡不畏彊禦膺著威幽并遺愛度遼今三垂蠢動王旅未振易稱雷雨作觧君子以赦過宥罪易觧卦象辭也卦坎下震上觧坎為險為水水者雨之象震為動為雷王弼注云屯難盤結於是乎觧也乞原膺等以備不虞書奏乃悉免其刑再遷復拜司隸校尉時張讓弟朔為野王令貪殘無道至乃殺孕婦聞膺厲威嚴懼罪逃還京師因匿兄讓第舍藏於合柱中膺知其狀率將吏卒破柱取朔付洛陽獄受辭畢即殺之讓訴寃於帝詔膺入殿御親臨軒詰以不先請便加誅辟之意膺對曰昔晉文公執衛成公歸于京師春秋是焉公羊傳曰晉人執衛侯歸之于京師歸之于者執之乎天子之側者也罪定不定已可知矣何休注云歸之于者決辭也禮云公族有罪雖曰宥之有司執憲不從觧見張酺傳昔仲尼為魯司寇七日而誅少正卯今臣到官已積一旬私懼以稽留為愆不意獲速疾之罪誠自知釁責死不旋踵特乞留五日尅殄元惡退就鼎鑊始生之願也帝無復言顧謂讓曰此汝弟之罪司隸何愆乃遣出之自此諸黄門常侍皆鞠躬屏氣休沐不敢復出宫省帝怪問其故並叩頭泣曰畏李校尉是時朝廷日亂綱紀穨阤膺獨持風裁以聲名自髙裁音才代反士有被其容接者名為登龍門以魚為喻也龍門河水所下之口在今絳州龍門縣辛氏三秦記曰河津一名龍門水險不通魚鱉之屬莫能上江海大魚薄集龍門下數千不得上上則為龍也及遭黨事當考實膺等案經三府太尉陳蕃郤之曰今所考案皆海内人譽憂國忠公之臣此等猶將十世宥也觧見耿弇傳豈有罪名不章而致收掠者乎不肯平署平署猶連署也帝愈怒遂下膺等於黄門北寺獄獄名觧見靈紀也膺等頗引宦官子弟宦官多懼請帝以天時宜赦於是大赦天下膺免歸鄉里居陽城山中天下士大夫皆髙尚其道而汙穢朝廷以朝廷為汙穢也及陳蕃免太尉朝野屬意於膺荀爽恐其名髙致禍欲令屈節以全亂世為書貽曰久廢過庭不聞善誘陟岵瞻望惟日為嵗論語曰鯉趨而過庭子曰學詩乎曰未也又曰孔子恂恂然善誘人詩曰陟彼岵兮瞻望父兮又曰一日不見如三嵗兮爽致敬於膺故以父為喻也知以直道不容於時悅山樂水家于陽城道近路夷當即聘問無狀嬰疾闕於所仰頃聞上帝震怒貶黜鼎臣上帝謂天子鼎臣即陳蕃人鬼同謀易下繋曰人謀鬼謀百姓與能以為天子當貞觀二五利見大人易曰天地之道貞觀也乾九二九五並曰利見大人也不謂夷之初旦明而未融夷傷也融朗也明夷卦離下坤上離為日坤為地日之初出其明未朗左傳曰明而未融其當旦乎以膺黜故喻之也虹蜺揚煇棄和取同春秋考異郵曰虹蜺出亂惑弃和謂弃君子同小人也方今天地氣閉大人休否易文言曰天地閉賢人隠否九五曰大人休否休否謂休廢而否塞智者見險投以逺害見險難故投身以逺害也易曰君子以儉徳避難不可榮以禄雖匱人望内合私願匱乏也想甚欣然不為恨也願怡神無事偃息衡門毛萇詩注曰衡門横木為門任其飛沈與時抑揚頃之帝崩陳蕃為太傅與大將軍竇武共秉朝政連謀誅諸宦官故引用天下名士乃以膺為長樂少府及陳竇之敗膺等復廢後張儉事起收捕鈎黨鄉人謂膺曰可去矣對曰事不辭難罪不逃刑臣之節也左傳曰晉侯之弟揚干亂行於曲梁魏絳戮其僕晉侯怒謂羊舌赤曰合諸侯以為榮也揚干為戮何辱如之必殺魏絳無失也對曰絳無貳志事君不避難有罪不逃刑其將来辭何辱命焉吾年已六十死生有命去將安之乃詣詔獄考死妻子徙邊門生故吏及其父兄並被禁錮時侍御史蜀郡景毅子顧為膺門徒而未有錄牒故不及於譴毅乃慨然曰本謂膺賢遣子師之豈可以漏奪名籍茍安而已劉攽曰案文奪當作脫脫作奪音耳字不可通遂自表免歸時人義之膺子瓚位至東平相謝承書瓚作珪初曹操㣲時瓚異其才將沒謂子宣等曰時將亂矣天下英雄無過曹操張孟卓與吾善袁本初汝外親雖爾勿依必歸曹氏諸子從之並免於亂世杜宻傳杜宻字周甫潁川陽城人也為人沈質少有厲俗志為司徒胡廣所辟稍遷代郡太守徴三遷太山太守北海相其宦官子弟為令長有姦惡者輒捕案之行春到髙宻縣見鄭𤣥為鄉佐知其異噐即召署郡職遂遣就學後宻去官還家每謁守令多所陳託同郡劉勝亦自蜀郡告歸鄉里閉門掃軌無所干及軌車迹也言絶人事大守王昱謂宻曰劉季陵清髙士公卿多舉之者宻知昱激已對曰劉勝位為大夫見禮上賔而知善不薦聞惡無言隠情惜已自同寒蟬此罪人也寒蟬謂寂黙也椘詞曰悲哉秋之為氣也蟬寂寞而無聲今志義力行之賢而宻達之力行謂盡力行善也禮記曰好問近乎智力行近乎仁違道失節之士而宻紏之使明府賞刑得中令問休揚不亦萬分之一乎昱慚服待之彌厚後桓帝徴拜尚書令遷河南尹轉太僕黨事既起免歸本郡與李膺俱坐而名行相次故時人亦稱李杜焉前有李固杜喬故言亦也後太傅陳蕃輔政復為太僕明年坐黨事被徴自殺劉祐傳劉祐字}
