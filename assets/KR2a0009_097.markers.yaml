  - {type: variant, offset: 7256, length: 17, content: 喬領尹就軍屯招誘叛羌稍稍降散秋任尚, WYG: 儉傳張儉字元節山陽髙平人趙王張耳之後也張耳大梁人也髙祖立為趙王父成江夏太守儉初舉茂才以刺史非其人謝病不起延熹八年太守翟超請為東部督郵時中常侍侯覽家在防東縣名屬山陽郡故城在今兗州金鄉縣南殘暴百姓所為不軌儉舉劾覽及其母罪惡請誅之覽遏絶章表並不得通由是結仇覽等鄉人朱並素性佞邪為儉所棄並懐怨恚遂上書告儉與同郡二十四人為黨於是刋章討捕儉得亡命困廹遁走望門投止莫不重其名行破家相容}
