  - {type: variant, offset: 9584, length: 692, content: 餘年閒費用八十餘億諸將多斷盜牢稟私自潤入皆以珍寶貨賂左右上下放縱不恤軍事士卒不得其死者白骨相望於野桓帝建和二年白馬羌寇廣漢屬國殺長吏是時西羌及湟中胡復畔為寇益州刺史率板楯蠻討破之斬首招降二十萬人永壽元年校尉張貢卒以前南陽太守第五訪代為校尉甚有威惠西垂無事延熹二年訪卒以中郎將段熲代為校尉時燒當八種寇隴右熲擊大破之四年零吾復與先零及上郡沈氐牢姐諸種并力寇并涼及三輔會段熲坐事徵以濟南相胡閎代為校尉閎無威略羌遂陸梁覆沒營塢寇患轉盛中郎將皇甫規擊破之五年沈氐諸種復寇張掖酒泉皇甫規招之皆降事已具規傳鳥吾種復寇漢陽隴西金城諸郡兵共擊破之各還降附至冬滇那等五六千人復攻武威張掖酒泉燒民廬舍六年隴西太守孫羌擊破之斬首溺死三千餘人胡閎疾復以段熲為校尉永康元年東羌岸尾等脅同種連寇三輔中郎將張奐追破斬之事已具奐傳當煎羌寇武威破羌將軍段熲復破滅之餘悉降散事已具熲傳靈帝建寧三年燒當羌奉使貢獻中平元年北地降羌先零種因黃巾大亂乃與漢湟中羌義從胡北宮伯玉等反寇隴右事已具董卓傳興平元年馮翊降羌反寇諸縣郭汜樊稠擊破之斬首數千級自爰劒後子孫支分凡百五十種其九種在賜支河首以西及在蜀漢徼北前史不載口數唯參狼在武都勝兵數千人其五十二種衰少不能自立分散為附落或絕滅無後或引而遠去其八十九種唯鍾最強勝兵十餘萬其餘大者萬餘人小者數千人更相鈔盜盛衰無常無慮順帝時勝兵合可二十萬人發羌唐旄等絕遠未嘗往來氂牛白馬羌在蜀漢其種別名號皆不可紀知也建武十三年廣漢塞外白馬羌豪樓登等率種人五千餘戶內屬光武封樓登為歸義君長至和帝永元六年蜀郡徼外大牂夷種羌豪造頭等率種人五十餘萬口內屬拜造頭為邑君長賜印綬至安帝永初元年蜀郡徼外羌龍橋等六種萬, WYG: ''}
