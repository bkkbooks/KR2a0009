  - {type: variant, offset: 10277, length: 1047, content: 千二百八十口內屬明年蜀郡徼外羌薄申等八種三萬六千九百口復舉土內屬冬廣漢塞外參狼種羌二千四百口復來內屬桓帝建和二年白馬羌千餘人寇廣漢屬國殺長吏益州刺史率板楯蠻討破之湟中月氏胡其先大月氏之別也舊在張掖酒泉地月氏王為匈奴冒頓所殺餘種分散西踰葱領其羸弱者南入山阻依諸羌居止遂與共婚姻及驃騎將軍霍去病破匈奴取西河地開湟中於是月氏來降與漢人錯居雖依附縣官而首施兩端其從漢兵戰鬬隨埶強弱被服飲食言語略與羌同亦以父名母姓為種其大種有七勝兵合九千餘人分在湟中及令居又數百戶在張掖號曰義從胡中平元年與北宮伯玉等反殺護羌校尉泠徵金城太守陳懿遂寇亂隴右焉論曰羌戎之患自三代尚矣漢世方之匈奴頗為衰寡而中興以後邊難漸大朝規失綏御之和戎帥騫然諾之信其內屬者或倥偬於豪右之手或屈折於奴僕之勤塞候時清則憤怒而思禍桴革暫動則屬鞬以鳥驚故永初之閒羣種蜂起遂解仇嫌結盟詛招引山豪轉相嘯聚揭木為兵負柴為械穀轂馬揚埃陸梁於三輔建號稱制恣睢於北地東犯趙魏之郊南入漢蜀之鄙塞湟中斷隴道燒陵園剽城市傷敗踵係羽書日聞并涼之士特衝殘斃壯悍則委身於兵場女婦則徽纆而為虜發冢露胔死生塗炭自西戎作逆未有陵斥上國若斯其熾也和熹以女君親政威不外接朝議憚兵力之損情存苟安或以邊州難援宜見捐𠫓廾或懼疽食浸淫莫知所限謀夫回遑猛士疑慮遂徙西河四郡之人雜寓關右之縣發屋伐樹塞其戀土之心燔破貲積以防顧還之思於是諸將鄧騭任尚馬賢皇甫規張奐之徒爭設雄規更奉征討之命徵兵會衆以圖其𨻶馳騁東西奔救首尾搖動數州之境日耗千金之資至於假人增賦借奉侯王引金錢縑綵之珍徵糧粟鹽鐵之積所以賂遺購賞轉輸勞來之費前後數十巨萬或梟剋酋健摧破附落降俘載路牛羊滿山軍書未奏其利害而離叛之狀已言矣故得不酬失功不半勞暴露師徒連年而無所勝官人屈竭烈士憤喪段熲受事專掌軍任資山西之猛性練戎俗之態情窮武思盡銳以事之被羽前登身當百死之陳蒙沒冰雪經履千折之道始殄西種卒定東寇若乃陷擊之所殲傷追走之所崩籍頭顱斷落於萬丈之山支革判解於重崖之上不可校計其能穿竄草石自脫於鋒鏃者百不一二而張奐盛稱戎狄一氣所生不宜誅盡流血汙野傷和致妖是何言之迂乎羌雖外患實深內疾若攻之不根是養疾疴於心腹也惜哉寇敵略定矣而漢祚亦衰焉嗚呼昔先王疆理九土判別畿荒知夷貊殊性難以道御故斥遠諸華薄其貢職唯與辭要而已若二漢御戎之方失其本矣何則先零侵境趙充國遷之內地當煎當作寇馬文淵徙之三輔貪其暫安之埶信其馴服之情計日用之權宜忘經世之遠略豈夫識微者之為乎故微子垂泣於象箸辛有浩歎於伊川也贊曰金行氣剛播生西羌氐豪分種遂用殷彊虔劉隴北假僭涇陽朝勞內謀兵憊外攘, WYG: 考證}
