  - {type: variant, offset: 7327, length: 269, content: 因合埶俱進狼莫等引退乃轉營迫之至北地相持六十餘日戰於富平上河上大破之斬首五千級還得所略人男女千餘人牛馬驢羊駱馳十餘萬頭狼莫逃走於是西河虔人種羌萬一千口詣鄧遵降五年鄧遵募上郡全無種羌雕何等刺殺狼莫賜雕何為羌侯封遵武陽侯三千戶遵以太后從弟故爵封優大任尚與遵爭功又詐增首級受賕枉法臧千萬已上檻車徵𠫓廾市沒入田廬奴婢財物自零昌狼莫死後諸羌瓦解三輔益州無復寇儆自羌叛十餘年閒兵連師老不暫寧息軍旅之費轉運委輸用二百四十餘億府帑空竭延及內郡邊民死者不可勝數并涼二州遂至虛耗六年春勒姐種與隴西種羌號良等通謀欲反馬賢逆擊之於安故斬號良及種人數百級皆降散永寧, WYG: ''}
