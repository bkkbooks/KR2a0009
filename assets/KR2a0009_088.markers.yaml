  - {type: variant, offset: 1712, length: 1, content: 篤, WYG: 事太尉劉寛再舉孝亷聞所舉郡将喪乃棄官行服後為䕶軍司馬與左中郎皇甫嵩劉攽曰案嵩傳此一少將字俱討賊張角爕素疾中官既行因上疏曰臣聞天下}
