  - {type: variant, offset: 1790, length: 0, content: '', WYG: 也中平四年鄙率六郡兵討金城賊王國韓遂等爕知鄙失衆必敗諫曰使君統政日淺人未知敎孔子曰不敎人戰是謂棄之今率不習之人越大隴之阻將十舉十危而賊聞大軍將至必萬人一心邉兵多勇其鋒難當而新合之衆上下未和萬一内變雖悔無及不若息軍飬徳明賞必罰賊得寛挺挺觧也必謂我怯羣惡爭執其離可必然後率己教之人討己離之賊其功可坐而待也今不為萬全之福而就必危之禍竊為使君不取鄙不從行至狄道果有反者先殺程球次害鄙賊遂進圍漢陽城中兵少糧盡爕猶固守時北胡騎數千隨賊攻郡劉攽曰時北胡騎數千案文少一地字下文云鄉里羌胡是與爕同北地人也皆夙懐爕恩共於城外叩頭求送爕歸鄉里子幹年十三從在官舍知爕性剛有高義恐不能屈志以免進諫曰國家昏亂遂令大人不容於朝今天下已叛而兵不足自守鄉里羌胡爕北地人故云鄉里也先被恩徳欲令棄郡而歸願必許之徐至鄉里率厲義徒見有道而輔之以濟天下言未終爕慨然而歎呼幹小字曰别成幹集曰幹字彦林汝知吾必死邪盖聖逹節次守節左傳曰曹公子臧曰前志有之聖逹節次守節下失節且殷紂之暴伯夷不食周粟而死仲尼稱其賢史記曰伯夷孤竹君之子也武王載文王木主伐紂殷既平伯夷耻之義不食周粟遂餓死論語子貢問曰伯夷叔齊何人也孔子曰古之賢人也今朝廷不甚殷紂吾徳亦豈絶伯夷世亂不能飬浩然之志孟子曰飬吾浩然之􅂔趙岐注曰浩然天氣也食禄又欲避其難乎左傳曰子路曰食焉不避其難也吾行何之必死於此汝有才智勉之主簿楊㑹吾之程嬰也程嬰觧見馮衍傳幹哽咽不能復言左右皆泣下王國使故酒泉太守黄衍說爕曰成敗之事已可知矣先起上有覇王之業下成伊吕之勲天下非復漢有府君寕有意為吾屬師乎師即君也尚書曰作之君作之師也爕案劔叱衍曰若剖符之臣反為賊説邪遂麾左右進兵臨陣戰殁諡曰壮節侯幹知名位至扶風太守蓋勳傳蓋勳字元固敦煌廣至人也廣至縣名故城在今𤓰州常樂縣東今謂之縣泉堡是也家世二千石續漢書曰曾祖父進漢陽太守祖父彪大司農謝承書曰父字思齊官至安定属國都尉初舉孝亷為漢陽長史時武威太守倚恃權埶恣行貪横從事武都蘇正和案致其罪涼州刺史梁鵠畏懼貴戚欲殺正和以免其負乃訪之於勳勳素與正和有仇或勸勳可因此報隙勳曰不可謀事殺良非忠也乗人之危非仁也乃諫鵠曰夫紲食鷹鳶欲其鷙紲繫也廣雅曰鷙執也蒼頡觧詁曰鳶䲭也食音嗣鷙而亨之將何用哉鵠從其言正和喜於得免而詣勳求謝勳不見曰吾為梁使君謀不為蘓正和也怨之如初續漢書中平元年黄巾賊起故武威太守酒泉黄雋被徵失期梁鵠欲奏誅雋勳為言得免雋以黄金二十斤謝勳勳謂雋曰吾以子罪在八議故為子言吾豈賣評哉終辭不受中平元年北地羌胡與邉章等寇亂隴右刺史左昌因軍興斷盜數千萬斷謂割截勳固諫昌怒乃使勳别屯阿陽以拒賊鋒阿陽縣属天水郡欲因軍事罪之而勳數有戰功邉章等遂攻金城殺郡守陳懿勳勸昌救之不從邉章等進圍昌於冀昌懼而召勳勳初與從事辛曾孔常俱屯阿陽及昌檄到曾等疑不肯赴勳怒曰昔荘賈後期穣苴奮劒齊景公時燕晋侵齊景公以司馬穰苴為將扞之仍令寵臣荘賈監軍與穰苴期旦日㑹賈素驕貴夕時至穣苴召軍正問曰軍法期而後者云何對曰當斬遂斬賈以徇三軍今之從事豈重於古之監軍哉曾等懼而從之勲即率兵救昌到乃誚譲章等責以背叛之罪皆曰左使君若早從君言以兵臨我庻可自改今罪己重不得降也乃觧圍而去昌坐斷盗徴以扶風宋梟代之續漢書梟字作泉也梟患多寇叛謂勲曰凉州寡於學術故屢致反暴今欲多冩孝經令家家習之庶或使人知義勳諫曰昔太公封齊崔杼殺君伯禽侯魯慶父簒位崔杼齊大夫齊荘公先通其妻杼殺之慶父魯荘公弟荘公子開立是為湣公慶父襲殺涽公並見史記此二國豈乏學者今不急靜難之術遽為非常之事既足結怨一州又當取笑朝廷勲不知其可也梟不從遂奏行之果被詔書詰責坐以虗慢徴時叛羌圍護羌校尉夏育於畜官前書尹翁歸傳曰有論罪輸掌畜官音義曰右扶風畜牧所在有苑師之属故曰畜官畜音許救反勳與州郡合兵救育至狐槃為羌所破勳收餘衆百餘人為魚麗之陳麗音離左傳曰王以諸侯伐鄭鄭原繁高渠彌奉公為魚麗之陳先偏後伍伍承彌縫杜預注曰此魚麗陳法也羌精騎夹攻之急士卒多死勳被三創堅不動乃指木表表標也曰必尸我於此句就種羌滇吾句就羌别種也句音古侯反素為勳所厚乃以兵扞衆曰盖長史賢人汝曹殺之者為負天勲仰罵曰死反虜汝何知促來殺我衆相視而驚滇吾下馬與勳勳不肯上遂為賊所執羌戎服其義勇不敢加害送還漢陽後刺史楊雍即表勳領漢陽太守時人飢相漁食勳調榖稟之調猶發也先出家糧以率衆存活者千餘人後去官徴拜討虜校尉靈帝召見問天下何苦而反亂如此勳曰倖臣子弟擾之時宦者上軍校尉蹇碩在坐帝顧問碩碩懼不知所對而以此恨勳帝又謂勳曰吾己陳師於平樂觀多出中藏財物以餌士何如中藏謂内藏也勳曰臣聞先王耀徳不觀兵國語曰穆王將征犬戎祭公謀父諫曰不可先王燿徳不觀兵韋昭注曰燿明也觀示也今冦在逺而設近陳不足昭果毅祗黷武耳左傳曰戎昭果毅以聼之之謂武殺敵為果致果曰毅也帝曰善恨見君晚羣臣初無是言也勳時與宗正劉虞佐軍校尉袁紹同典禁兵勳謂虞紹曰吾仍見上上甚聪明但擁蔽於左右耳若共併力誅嬖倖然後徴㧞英俊以興漢室功遂身退豈不快乎虞紹亦素有謀因相連結未及發而司隸校尉張溫舉勳為京兆尹帝方欲延接勳而蹇碩等心懼之並勸從溫奏遂拜京兆尹時長安令楊黨父為中常侍恃埶貪放勲案得其臧千餘萬貴戚咸為之請勳不聼具以事聞并連黨父有詔窮案威震京師時小黄門京兆髙望為尚藥監倖於皇太子太子因蹇碩屬望子進為孝亷勳不肯用或曰皇太子副主望其所愛碩帝之寵臣而子違之所謂三怨成府者也府聚也勲曰選賢所以報國也非賢不舉死亦何悔勳雖在外每軍國密事帝常手詔問之續漢書曰是時漢陽叛人王國衆十萬餘攻陳倉三輔震動勳領郡兵五千人自請滿萬人因表用䖏士扶風孫瑞為鷹鷂都尉桂楊魏傑為破敵都尉京兆杜楷為威虜都尉𢎞農楊儒為鳥撃都尉長陵第五雋為清冦都尉凡五都尉皆素有名悉領属勳每有宻事靈帝手詔問之數加賞賜甚見親信在朝臣右及帝崩董卓廢少帝殺何太后勲與書曰昔伊尹霍光權以立功猶可寒心足下小醜何以終此賀者在門弔者在廬可不慎哉孫卿子曰慶者在堂弔者在閭福與禍鄰莫知其門也卓得書意甚憚之徴為議}
