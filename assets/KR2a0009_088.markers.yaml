  - {type: variant, offset: 1294, length: 410, content: 京師天畀更始不能引維慢藏招寇復致赤眉海內雲擾諸夏滅微羣龍並戰未知是非于時聖帝赫然申威荷天人之符兼不世之姿受命於皇上獲助於靈祇立號高邑搴旗四麾首策之臣運籌出奇虓怒之旅如虎如螭師之攸向無不靡披蓋夫燔魚剸蛇莫之方斯大呼山東響動流沙要龍淵首鏌命騰太白親發狼弧南禽公孫北背強胡西平隴冀東據洛都乃廓平帝宇濟蒸人於塗炭成兆庶之亹亹遂興復乎大漢論都而遺思廱州也方躬勞聖思以率海內厲撫名將略地疆外信威於征伐展武乎荒裔若夫文身鼻飲緩耳之主椎結左衽鐻之君東南殊俗不羈之國西北絕域難制之鄰靡不重譯納貢請為藩臣上猶謙讓而不伐勤意以為獲無用之虜不如安有益之民略荒裔之地不如保殖五穀之淵遠救於已亡不若近而存存也今國家躬脩道德吐惠含仁湛恩沾洽時風顯宣徒垂意於持平守實務在愛育元元苟有便於王政者聖主納焉何則物罔挹而不損道無隆而不移陽盛則運陰滿則虧故存不忘亡安不諱危雖有仁義猶設城池也客以利器不可久虛而國家亦不忘乎西都何必去洛邑之渟瀯與篤後仕郡文學掾以目疾, WYG: 此}
