  - {type: variant, offset: 2634, length: 0, content: '', WYG: 必以燕為帥角死衆奉燕故改姓張燕慓悍㨗速過人軍中號為飛燕衆至百萬號曰黒山後助公孫瓉與紹爭冀州也劉攽曰注張牛角立起案文立當作之北鄙將告倒懸之急股肱奏乞歸之記耳股肱猶手足也言北邉有倉卒之急股肱之}
  - {type: variant, offset: 2634, length: 0, content: '', krp: 必以燕為帥角死衆奉燕故改姓張燕慓悍㨗速過人軍中號為飛燕衆至百萬號曰黒山後助公孫瓉與紹爭冀州也劉攽曰注張牛角立起案文立當作之北鄙將告倒懸之急股肱奏乞歸之記耳股肱猶手足也言北邉有倉卒之急股肱之}
  - {type: variant, offset: 2635, length: 7, content: 江淮孤賤愚矇小, WYG: 將告歸自救耳主人當鑒戒曹軰反旌退師何冝久辱盛怒暴威於吾城之下哉足下譏吾恃黒山以為救獨不念黄巾之合從邪昔髙祖取彭越於鉅野前書彭越將其衆居鉅野中無所属漢王乃使人賜越將軍印使下濟隂以擊楚也光武創基兆於緑林卒能龍飛受命中興帝業茍可輔主興化夫何嫌哉况僕親奉璽書與之從事行矣孔璋足下徼利於境外臧洪投命於君親吾子託身於盟主盟主謂袁紹也臧洪䇿名於長安子謂余身死而名㓕僕亦笑子}
