  - {type: variant, offset: 2643, length: 3, content: 經學行, WYG: 死而無聞焉本同末離努力努力夫復何言紹見洪書知無降意增兵急攻城中糧盡外無援救洪自度不免呼吏士謂曰袁紹無道所圖不軌且不救洪郡将洪於大義不得不死念諸軍無事空與此禍與音預可先城未破將妻子出將吏皆垂泣曰明府之於袁氏本無怨隙今為郡將之故自致危困吏人何忍當捨明府去也初尚掘䑕煮筋角後無所復食主簿啟内厨米三斗請稍為饘粥杜預注左傳曰饘縻也音之延反洪曰何}
