  - {type: variant, offset: 52, length: 9, content: 居美陽與美陽令遊數, WYG: 禁亂之所由生猶坊止水之所自来也故以舊防為無用瓌之者必有水敗尸子曰刑罰者人之鞭策也今州曰任郡郡曰任縣更相委逺百姓怨窮以茍容為賢盡節為愚臣所發舉臧罪非一二府恐為臣所奏劉攽曰案上文三公劾詡則此當為三府也遂加誣罪臣將}
