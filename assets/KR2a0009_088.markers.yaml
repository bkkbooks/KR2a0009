  - {type: variant, offset: 28, length: 5, content: 延年宣帝時, WYG: 父經為郡縣獄吏案法平允務存寛恕每冬月上其状恒流涕隨之嘗稱曰東海于公髙為里門而其子定國卒至丞相前書于定國字曼倩東海人其父于公為縣獄吏郡法曹所決皆不恨為之生立祠其門閭壊父老方共脩之于公曰少髙大閭門令容駟馬髙盖車我決獄多隂徳未嘗有所寃子孫必有興者至定國為丞相孫永}
