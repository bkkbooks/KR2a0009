  - {type: variant, offset: 119, length: 5, content: 宜改營洛邑, WYG: 下殿防不得已趨就東箱埤蒼云箱序也字或作廂程曰陛下急收防無令從阿母求請阿母宋娥也帝問諸尚書尚書賈朗素與防善證詡之罪帝疑焉謂程曰且出吾方思之於是詡子顗與門生百餘人舉幡候中常侍髙梵車叩頭流血訴言枉状梵乃入言之防坐徙邉賈朗等六人或死或黜即日赦出詡程復上書陳詡有大功語甚切激帝感悟復徴拜議郎數日遷尚書僕射是時長吏二千石聴百姓讁罰者輸贖號為義錢託為貧人儲而守令因以聚歛詡上疏曰元年以来貧百姓章言長吏受取百萬以上者匈匈不絶讁罰吏人至數千萬而三公刺史少所舉奏尋永平章和中州郡以走卒錢給貸貧人走卒伍伯之類也續漢志曰伍伯公八人中二千石六人千石六百石皆四人自百石以下至二百石皆二人黃綬武官伍伯文官辟車鈴下侍閭門蘭部署街走卒皆有程品多少隨所典領率皆赤幩絳褠即今行鞭杖者也此言錢者令其出資錢不役其身也劉攽曰注街走卒又赤幩絳褠案後漢志街下有一里字又云絳褠字誤司空劾案州及郡縣皆坐免黜今冝遵前典蠲除權制於是詔書下詡章切責州郡讁罰輸贖自此而止先是寕陽主簿詣闕訴其縣令之枉寕陽縣属東平國故城在今兖州龔丘縣南也積六七歳不省主簿}
