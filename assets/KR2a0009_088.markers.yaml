  - {type: variant, offset: 837, length: 456, content: 黃支連緩耳瑣雕題摧天督牽象犀椎蛤碎瑠璃甲瑁戕觜觿於是同穴裘褐之域共川鼻飲之國莫不袒跣稽顙失氣虜伏非夫大漢之盛世藉廱土之饒得御外理內之術孰能致功若斯故創業於高祖嗣傳於孝惠德隆於太宗財衍於孝景威盛於聖武政行於宣元侈極於成哀祚缺於孝平傳世十一歷載三百德衰而復盈道微而復章皆莫能遷於廱州而背於咸陽宮室寢廟山陵相望高顯弘麗可思可榮羲農已來無茲著明田惟上沃野千里原隰彌望保殖五穀桑麻條暢濱據南山帶以涇渭號曰陸海蠢生萬類楩檀柘蔬果成實畎瀆潤淤水泉灌溉漸澤成川粳稻陶遂厥土之膏畝價一金田田相如鐇钁株林火耕流種功淺得深既有蓄積塞四臨四被隴蜀南通漢中北據谷口東阻嶔巖關函守嶢山東道窮置列洴隴廱偃西戎拒守襃斜嶺南不通杜口絕津朔方無從鴻渭之流徑入于河大船萬艘轉漕相過東綜滄海西綱流沙朔南暨聲諸夏是和城池百尺塞要害關梁之險多所衿帶一卒舉礧千夫沈滯一人奮戟三軍沮敗地埶便利介冑剽悍可與守近利以攻遠士卒易保人不肉袒肇十有二是為贍腴用霸則兼并先據則功殊修文則財衍行武則士要為政則化上篡逆則難誅進攻則百剋退守則有餘斯固帝王之淵囿而守國之利器也八誅, WYG: 寃者}
