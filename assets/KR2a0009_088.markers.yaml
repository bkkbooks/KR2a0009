  - {type: variant, offset: 1718, length: 0, content: '', WYG: 張角爕功多當封忠訴譛之續漢志曰爕軍斬賊三帥卜己張伯梁仲寕等功髙為封首靈帝猶識爕言識記也音志得不加罪竟亦不封以為安定都尉以疾免後拜議郎㑹西}
  - {type: variant, offset: 1718, length: 0, content: '', krp: 張角爕功多當封忠訴譛之續漢志曰爕軍斬賊三帥卜己張伯梁仲寕等功髙為封首靈帝猶識爕言識記也音志得不加罪竟亦不封以為安定都尉以疾免後拜議郎㑹西}
  - {type: variant, offset: 1719, length: 0, content: '', WYG: 反邉章韓遂作亂隴右徴發天下役賦無己司徒崔烈以為宜棄凉州詔㑹公卿百官烈堅執先議爕厲言曰斬司徒天下乃安尚書郎楊賛奏爕廷辱大臣帝以問爕爕對曰昔冐頓至逆也樊噲為上將願得十萬衆横行匈奴中憤激思奮未失人臣之節顧計當從與不耳季布猶曰噲可斬也冐頓匈奴單于名也前書曰季布為中郎將單于為書嫚吕太后吕太后怒召諸將議之}
  - {type: page-break, offset: 1719, content: '', id: KR2a0009_WYG_088-12a, image: WYG0253/WYG0253-0221a.png}
  - {type: variant, offset: 1719, length: 0, content: '', krp: 反邉章韓遂作亂隴右徴發天下役賦無己司徒崔烈以為宜棄凉州詔㑹公卿百官烈堅執先議爕厲言曰斬司徒天下乃安尚書郎楊賛奏爕廷辱大臣帝以問爕爕對曰昔冐頓至逆也樊噲為上將願得十萬衆横行匈奴中憤激思奮未失人臣之節顧計當從與不耳季布猶曰噲可斬也冐頓匈奴單于名也前書曰季布為中郎將單于為書嫚吕太后吕太后怒召諸將議之}
  - {type: variant, offset: 1721, length: 1, content: 辛, WYG: 樊噲曰願得十萬衆横行匈奴中諸將皆阿太后以噲言為然布曰樊噲可斬也夫以髙帝兵三十萬困于平城噲時亦在其中今奈何以十萬衆横行匃奴中今涼州天下要衝國家藩衞髙祖初興使酈商别定隴右前書漢王賜􅐱商爵信成君以將軍為隴右都尉别定北地世宗拓境列置四郡議者以為斷匈奴右臂前書}
