  - {type: variant, offset: 65, length: 2, content: 諧頗, WYG: 報詡不勝其憤乃自繫廷尉奏言曰昔孝安皇帝任用樊豐遂交亂嫡統㡬亡社稷今者張防復弄威柄國家之禍將重至矣臣不忍與防同朝謹自繫以聞無令臣襲楊震之迹震為樊豐所譛而死書奏防流涕訴帝詡坐論輸左校防必欲害之二日之中傳考四獄獄吏勸詡自引詡曰寕伏歐刀以示逺近歐刀刑人之刀也宦者孫程張賢等知詡以忠獲罪乃}
