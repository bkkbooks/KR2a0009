  - {type: variant, offset: 3295, length: 394, content: 稱好養生術隱處求道晚乃仕拜郎中卒於官所著賦論誄哀辭雜文凡十六篇時三輔多士扶風曹衆伯師亦有才學著誄書論四篇又有曹朔不知何許人作漢頌四篇劉珍字秋孫一名寶南陽蔡陽人也少好學永初中為謁者僕射鄧太后詔使與校書劉騊駼馬融及五經博士校定東觀五經諸子傳記百家蓺術整齊脫誤是正文字永寧元年太后又詔珍與騊駼作建武已來名臣傳遷侍中越騎校尉延光四年拜宗正明年轉衛尉卒官著誄頌連珠凡七篇又撰釋名三十篇以辯萬物之稱號云葛龔字元甫梁國寧陵人也和帝時以善文記知名性慷慨壯烈勇力過人安帝永初中舉孝廉為太官丞上便宜四事拜蕩陰令辟太尉府病不就州舉茂才為臨汾令居二縣皆有稱績著文賦碑誄書記凡十二篇王逸字叔師南郡宜城人也元初中舉上計吏為校書郎順帝時為侍中著楚辭章句行於世其賦誄書論及雜文凡二十一篇又作漢詩百二十三篇子延壽字文考有儁才少遊魯國作靈光殿賦後蔡邕亦造此賦未成及見延壽所為甚奇之遂輟翰而已曾有異夢意惡之乃作夢賦以自厲後溺水, WYG: 洪當}
