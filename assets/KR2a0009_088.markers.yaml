  - {type: variant, offset: 1791, length: 0, content: '', WYG: 時左將軍皇甫嵩精兵三萬屯扶風勳宻相要結將以討卓㑹嵩亦被徴勳以衆弱不能獨立遂並還京師自公卿以下莫不卑下於卓唯勳長揖爭禮見者皆為失色卓問司徒王允曰欲得快司隸校尉誰可作者允曰唯有盖京兆耳卓曰此人明智有餘然不可假以雄職乃以為越騎校尉卓又不欲令乆典禁兵復出為頴川太守未及至郡徴還京師時河南尹朱儁為卓陳軍事卓折儁曰我百}
