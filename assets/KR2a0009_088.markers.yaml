  - {type: variant, offset: 51, length: 0, content: '', krp: 以推鋒執銳無反顧之心者為臣屬於漢故也若棄其境域徙其人庶安土重遷必生異志如使豪雄相聚席卷而東席卷言無餘也前書曰雲徹席卷後無餘災也雖賁育為卒太公為將猶恐不足當禦議者喻以補衣猶有所完詡恐其疽食侵滛而無限極棄之非計疽癰瘡也脩曰吾意不及此㣲子之言㡬敗國事然則計當安出詡曰今涼土擾動人情不安竊憂卒然有非常之變誠宜令四府九卿四府謂太傳太尉司徒司空之府也九卿謂太常光禄衞尉廷尉太僕大鴻臚宗正大司農少府等也各辟彼州數人其牧守令長子弟皆除為冗官冗散也音人勇反外以勸厲答其功勤内以拘致防其邪計脩善其言更集四府皆從詡議於是辟西州豪傑為掾屬拜牧守長吏子弟為郎以安慰之鄧騭兄弟以詡異其議因此不平欲以吏法中傷詡後朝歌賊寗季等數千人攻殺長吏屯聚連年州郡不能禁乃以詡為朝歌長故舊皆弔詡曰得朝歌何衰詡笑曰志不求易事不避難臣之職也不遇槃根錯節何以别利噐乎始到謁河内太守馬棱棱字伯威援族孫也棱勉之曰君儒者當謀謨廟堂反在朝歌邪詡曰初除之日士大夫皆見弔勉以詡譸之知其無能為也譸當作籌也朝歌者韓魏之郊韓界上黨魏界河内相接犬牙故云郊也背大行臨黄河去敖倉百里敖倉在榮陽觧見安紀而青冀之人流亡萬數賊不知開倉招衆劫庫兵守城臯斷天下右臂右臂喻要便也此不足憂也今其衆新盛難與爭鋒兵不厭權願寛假轡策勿令有所拘閡而已閡與礙同及到官設令三科以募求壮士自掾史以下各舉所知其攻刼者為上傷人偷盗者次之帶喪服而不事家業為下收得百餘人詡為饗㑹悉貰其罪使入賊中誘令劫掠乃伏兵以待之遂殺賊數百人又潜遣貧人能縫者傭作賊衣以采綖縫其裾為幟幟記也續漢書曰以絳縷縫其裾也有出市里者吏輒禽之賊由是駭散咸稱神明遷懐令後羌冦武都鄧太后以詡有将帥之略遷武都太守引見嘉徳殿厚加賞賜羌乃率衆數千遮詡於陳倉崤谷詡即停軍不進而宣言上書請兵須到當發羌聞之乃分鈔傍縣詡因其兵散日夜進道兼行百餘里令吏士各作兩竈日増倍之羌不敢逼或問曰孫臏減竈而君增之孫臏為齊軍将與魏龎涓戰使齊軍入魏地為十萬竈明日為五萬竈明日為三萬竈龎涓行三日大喜曰我固知齊卒怯入吾地三日士卒亡過半矣事見史記兵法日行不過三十里以戒不虞前書王吉上疏曰古者師行三十里吉行五十里而今日且二百里何也詡曰虜衆多吾兵少徐行則易為所及速進則彼所不測虜見吾竈日増必謂郡兵来迎衆多行速必憚追我孫臏見弱吾今示彊勢有不同故也既到郡兵不滿三千而羌衆萬餘攻圍赤亭數十日赤亭故城在今渭州襄武縣東南有赤亭水也詡乃令軍中使彊弩勿發而潜發小弩羌以為矢力弱不能至并兵急攻詡於是使二十彊弩共射一人發無不中羌大震退詡因出城奮擊多所傷殺明日悉陳其兵衆令從東郭門出北一作西郭門入貿易衣服回轉數周羌不知其數更相恐動詡計賊當退乃潜遣五百餘人於淺水設伏候其走路虜果大奔因掩擊大破之斬獲甚衆賊由是敗散南入益州詡乃占相地埶築營壁二百八十所招還流亡假賑貧人郡遂以安先是運道艱險舟車不通驢馬負載僦五致一廣雅曰僦賃也音子救反僦五致一謂用五石賃而致一石也詡乃自將吏士案行川谷由沮至下辯沮及下辯並縣名沮今興州順政縣也下辯今成州同谷縣也沮音七余反數十里皆燒石翦木開漕船道續漢志曰下辯東三十餘里有峡中富泉水生大石障塞水流每至春夏輒溢沒秋稼壊敗營郭詡乃使人燒石以水灌之石皆坼裂因鎸去石遂無汜溺之患也以人僦直雇借傭者於是水運通利歳省四千餘萬詡始到郡戸裁盈萬及綏聚荒餘招還流散二三年間遂增至四萬餘户鹽米豐賤十倍於前續漢志曰詡始到榖石千鹽石八千見户萬三千視事三嵗米石八十鹽石四百流人還歸郡户𢾗萬人足家給一郡無事坐法免永建元年代陳禅為司隸校尉數月間奏太𫝊馮石太尉劉熹中常侍程璜陳秉孟生李閏等百官側目號為苛刻三公劾奏詡盛夏多拘繫無辜為吏人患詡上書自訟曰法禁者俗之堤防刑罰者人之銜轡記曰夫}
