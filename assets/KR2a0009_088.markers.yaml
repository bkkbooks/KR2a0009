  - {type: variant, offset: 2074, length: 289, content: 咨爾庶士迨時斯勗日月逾邁豈云旋復哀我經營旅力靡及在茲弱冠靡所庶立作股肱萬邦是紀奕世載德迄我顯考保膺淑懿纘脩其道漢之中葉俊乂式序秩彼殷宗光此勳緒闇啟我童昧先人有訓我訊我誥訓我嘉務誨我博學爰率朋友尋此舊則契闊夙夜庶不懈忒作考之居息二事敗業多疾我力如彼遵衢則罔所極二志靡成聿勞我心如彼兼聽則溷於音夕聿同始卒毅以顯宗求賢不篤士多隱處故作七激以為諷建初中肅宗博召文學之士以毅為蘭臺令史拜郎中與班固賈逵共典校書毅追美孝明皇帝功德最盛而廟頌未立乃依清廟作顯宗頌十篇奏之由是文雅顯於朝廷車騎將軍馬防外戚尊重請毅為軍司馬待以師友之禮及馬氏敗免官歸永元元年車騎將軍竇憲復請毅為主記室崔駰為主簿及憲遷, WYG: 句章自稱}
