  - {type: page-break, offset: 2370, content: '', id: KR2a0009_WYG_088-22b, image: WYG0253/WYG0253-0226b.png}
  - {type: variant, offset: 2370, length: 0, content: '', krp: 郎洪以年㓜才俊故拜童子郎也續漢書曰左雄奏徵海内名儒為博士使公卿子弟為諸生有志操者加其俸禄及汝南謝亷河南趙建章年始十二各能通經雄並奏拜童子郎於是負書来學雲集京師也知名太學洪體貎魁梧有異姿魁梧壮大之貌也梧音吾舉孝亷補即丘長即丘縣属瑯琊國故城在今沂州臨沂縣東南即春秋之祝丘也中平末棄官還家太守張超請為功曹時董卓弑帝圖危社稷洪説超曰明府歴世受恩兄弟並據大郡謂超為廣陵兄邈為陳留也今王室將危賊臣虎視此誠義士效命之秋也今郡境尚全吏人殷富若動桴鼓可得二萬人以此誅除國賊為天下唱義不亦冝乎超然其言與洪西至陳留見兄邈計事邈先謂超曰聞弟為郡委政臧洪洪者何如人超曰臧洪海内竒士才略智數不比於超矣邈即引洪與語大異之乃使詣兖州刺史劉岱岱字公山豫州刺史孔佃佃字公緒遂皆相善邈既先有謀約㑹超至定議乃與諸牧守大㑹酸棗設壇塲将盟既而更相辭譲莫敢先登咸共推洪洪乃攝衣升壇操血而盟曰漢室不幸皇綱失統賊臣董卓乗釁縱害禍加至尊毒流百姓大懼淪喪社稷翦覆四海兖州刺史岱豫州刺史佃陳留太守邈東郡太守瑁橋瑁也廣陵太守超等糾合義兵並赴國難紏收也凡我同盟齊心一力以致臣節隕首喪元必無二志有渝此盟俾墜其命無克遺育左傳曰王子虎盟諸侯于王庭要言曰皆奨王室無相害也有渝此盟明神殛之俾墜其師無克祚國也皇天后土祖宗明靈實皆鍳之洪辭氣慷慨聞其言者無不激揚自是之後諸軍各懐遲疑莫適先進遂使糧儲單竭兵衆乖㪚時討虜校尉公孫瓉與太}
