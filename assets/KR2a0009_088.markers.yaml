  - {type: variant, offset: 525, length: 254, content: 國家未暇之故以喻客意曰有聖託之大漢大漢開基高祖有勳斬白蛇屯黑雲聚五星於東井提干將而呵暴秦蹈滄海跨崑崙奮彗光埽項軍遂濟人難蕩滌於泗沂劉敬建策初都長安太宗承流守之以文躬履節儉側身行仁食不二味衣無異采賑人以農桑率下以約己曼麗之容不悅於目鄭衞之聲不過於耳佞邪之臣不列於朝巧偽之物不鬻於巿故能理升平而刑幾措富衍於孝景功傳於後嗣讎遂命票騎勤任衞青勇惟鷹揚軍如流星深之匈奴割裂王庭席卷漠北叩勒祁連橫分單于屠裂百蠻燒罽帳繫閼氏燔康居灰珍奇椎鳴鏑釘鹿蠡馳阬岸獲昆彌虜侲驅騾驢馭宛馬鞭駃騠拓地萬里威震八荒肇置四郡據守敦煌并域屬國, WYG: 或}
