  - {type: variant, offset: 3037, length: 228, content: 是豐富之家各出義穀助官稟貸荒民獲全後坐水潦事免數月卒於家所著賦牋奏書令凡五篇子瓊自有傳劉毅北海敬王子也初封平望侯永元中坐事奪爵毅少有文辯稱元初元年上漢德論并憲論十二篇時劉珍鄧耽尹兌馬融共上書稱其美安帝嘉之賜錢三萬拜議郎李尤字伯仁廣漢雒人也少以文章顯和帝時侍中賈逵薦尤有相如楊雄之風召詣東觀受詔作賦拜蘭臺令史稍遷安帝時為諫議大夫受詔與謁者僕射劉珍等俱撰漢記後帝廢太子為濟陰王尤上書諫爭順帝立遷樂安相年八十三卒所著詩賦銘誄頌七歎哀典凡二十八篇尤同郡李勝亦有文才, WYG: 洪隨}
