  - {type: variant, offset: 62, length: 0, content: '', WYG: 史魚死即以尸諫耳韓詩外傳曰昔者衛大夫史魚病且死謂其子曰我􅂾言蘧伯玉之賢而不能進彌子瑖不肖不能退為人臣生不能進賢而退不肖死不當理喪正堂殯我於室足矣衛君問其故子以父言聞君乃立召蘧伯玉而貴之彌子瑖而退之徙殯於正堂成禮而後去也順帝省其章乃為免司空陶敦漢官儀曰敦字文理京兆人也時中常侍張防特用權埶每}
