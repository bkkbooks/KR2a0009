  - {type: variant, offset: 3770, length: 394, content: 姜后脫簪齊桓好樂衛姬不音皆輔主以禮扶君以仁達才進善以義濟身之索牝雞之晨專權擅愛顯己蔽人陵長閒舊圮剝至親並后匹嫡淫女斃陳匪賢是上番為司徒荷爵負乘采食名都詩人是刺德用不憮暴辛惑婦拒諫自孤蝠蛇其心縱毒不辜諸父是殺孕子是刳天怒地忿人謀鬼圖甲子昧爽身首分離初為天子後為人螭泯絕宗廟燒燔末嬉喪夏襃姒斃周妲己亡殷趙靈沙丘戚姬人豕呂宗以敗陳后作巫卒死於外霍欲鴆子身乃罹廢能天人爾違患生不德福有慎機日不常中月盈有虧履道者固杖埶者危微臣司戚敢告在斯琦以言不從失意復作白鵠賦以為風梁冀見之呼琦問曰百官外內各有司存天下云云豈獨吾人之尤君何激刺之過乎琦對曰昔管仲相齊樂聞譏諫之言蕭何佐漢乃設書過之吏今將軍累世台輔任齊伊公而德政未聞黎元塗炭不能結納貞良以救禍敗反復欲鉗塞士口杜蔽主聽將使玄黃改色馬鹿易形乎冀無以對因遣琦歸後除為臨濟長不敢之職解印綬去冀遂令刺客陰求殺之客見琦耕於陌上懷書一卷息輒偃而詠之客哀其志以實告琦, WYG: 謂紹}
