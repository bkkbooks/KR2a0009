  - {type: variant, offset: 2629, length: 1, content: 香, WYG: 都東武陽時曹操圍張超於雍丘甚危急超謂軍吏曰今日之事唯有臧洪必來救我或曰袁曹方穆而洪為紹所用恐不能敗好逺来違福取禍超曰子源天下義士終非背本者也或見制強力不相及耳洪始聞超圍乃徙跣號泣並勒所領将赴其難自以衆弱從紹請兵而紹竟不聼之超城遂䧟張氏族㓕洪由是怨紹絶不與通紹興兵圍之歴年不下使洪邑人陳琳以書譬洪示其禍福責以恩義獻帝春秋曰紹使琳為書八條責以恩義告喻使降也洪答曰隔濶相思發於寤寐相去步武爾雅曰武跡也而趨舍異規其為愴恨胡可勝言前日不遺比辱雅況比頻也述叙禍福公私切至以子之才窮該典籍豈將闇於大道不逹余趣哉是以捐棄翰墨一無所酬亦冀遥忖􅄶心粗識鄙性重獲來命援引紛紜雖欲無對而義篤其言僕小人也本乏志用中因行役特䝉傾盖家語孔子之郯與程子相遇於塗傾盖而語也恩深分厚遂竊大州寕樂今日自還接刃乎每登城臨兵觀主人之旗鼓洪常寓於紹故謂之主人也瞻望帳幄感故友之周旋撫弦搦矢搦捉也音女卓反不覺涕流之覆靣也何者自以輔佐主人無以為悔主人相接過絶等倫劉攽曰案文悔字無義未詳何字或曰悔當作益受任之初志同大事掃清冦逆共尊王室豈悟本州被侵郡將遘戹請師見拒辭行被拘使洪故君遂至淪滅區區㣲節無所獲申豈得復全交友之道重虧忠孝之名乎所以忍悲揮戈收淚告絶若使主人少垂古人忠恕之情来者側席去者克己来者側席而待之去者克己自責不責人也則僕抗季札之志不為今日之戰矣吴王餘昧卒欲授弟季札季札逃去見史記也昔張景明登壇喢血奉辭奔走卒使韓牧譲印主人得地後但以拜章朝主賜爵獲傳之故不䝉觀過之貸而受夷滅之禍英雄記云袁紹使張景明郭公則髙元才等説韓馥使譲冀州與紹然則馥之譲位景明亦有其功其餘未詳也吕奉先討卓来奔請兵不獲告去何罪復見斫刺魏志吕布傳曰布破張燕軍而求益兵衆將士鈔掠紹患忌之布覺其意從紹求去英雄記布求還洛紹假布領司𨽻校尉外言當遣内欲殺布明日當發紹遣甲士三十人辭以送布止於帳側布偽使人于帳中鼓筝紹兵臥無何出帳去而兵不覺夜半起兵亂斫布林被謂己死明旦紹訊問知布尚在乃閉城門布遂引去劉子璜奉使踰時辭不獲命畏君懐親以詐求歸可謂有志忠孝無損覇道亦復彊尸麾下不䝉虧除慕進者䝉榮違意者被戮此乃主人之利非逰士之願也是以鑒戒前人守死窮城亦以君子之違不適敵國故也左傳云公山不狃曰君子違不適讎國杜預注云違奔亡也足下當見乆圍不觧救兵未至感婚姻之義推平生之好以為屈節而茍生勝守義而傾覆也昔晏嬰不降志於白刃南史不曲筆以求存崔杼殺齊荘公欲刼晏子與盟以㦸拘其勁劔承其心晏子曰刼吾以刃而失其意非勇也崔杼遂釋之事見晏子左傳曰太史書曰崔杼殺其君崔子殺之其弟嗣書而死者二人其弟又書乃舍之南史氏聞太史盡死執簡以徃聞既書矣乃還也故身傳圖象名垂後世況僕據金城之固驅士人之力散三年之畜以為一年之資匡困補之以悅天下何圖築室反耕哉左傳曰楚子闃宋築室反耕杜預注曰築室于宋反兵耕田示無還意也但懼秋風揚塵伯珪馬首南向伯珪公孫瓉字張揚飛燕旅力作難魏志曰張揚字稚叔雲中人也以武勇給并州為從事何進令於本州募兵得千餘人因留}
