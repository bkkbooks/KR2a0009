  - {type: variant, offset: 1779, length: 4, content: 馬防擊西, WYG: 詔忠論討黄巾之功執金吾甄舉等謂忠曰傅南容前在東軍有功不侯故天下失望今将軍親當重任宜進賢理屈以副衆心忠納其言遣弟城門校尉延致殷勤延謂爕曰南容少答我常侍萬户侯不足得也爕正色拒之曰遇與不遇命也有功不論時也傅爕豈求私賞哉忠愈懐恨然憚其名不敢害權貴亦多疾之是以不得留一作封出為漢陽太守初郡將范津眀知人劉攽曰案文明當作名聲之誤也明雖可通但前後多云名知人舉爕孝亷及津為漢陽與爕交代合符而去鄉邦榮之津字文淵南陽人爕善䘏人叛}
