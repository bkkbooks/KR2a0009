  - {type: variant, offset: 1715, length: 0, content: '', krp: 皆興於内是故虞舜升朝先除四凶然後用十六相左傳曰昔}
  - {type: variant, offset: 1716, length: 1, content: 祖, WYG: 陽氏有才子八人蒼舒隤敱擣戭大臨尨降庭堅仲容叔逹謂之八凱髙辛氏有才子八人伯奮仲堪叔献季仲伯虎仲熊叔豹季貍謂之八元也眀惡人不去則善人無由進也今張角起於趙魏黄巾亂於六州皇甫嵩傳曰連結郡國自青徐幽冀荆揚兖豫八州之人莫不畢應此云六州盖初起時也此皆釁發蕭墻而禍延四海也臣受戎任奉辭伐罪始到頴川戰無不尅黄巾雖盛不足為廟堂憂也臣之所懼在於治水不自其源末流彌増其廣耳陛下仁徳寛容多所不忍故閹豎㺯權忠臣不進誠使張角梟夷黄巾變服臣之所憂甫益深耳甫始也何者夫邪正之人不冝共國亦猶氷炭不可同噐韓子曰氷炭不同噐而乆寒暑不同時而至也彼知正人之功顯而危亡之兆見皆将巧辭飾說共長虗偽夫孝子疑於屢至甘茂對秦武王曰昔曾參之居費魯人有與曽參同姓名者殺人人告其母曰曾參殺人其母織自若也又告之其母自若也又告之其母投杼下機踰墻而走夫以曾參之賢與其母之信也三人疑之其母懼焉見史記也市虎成於三夫觧見馬援傳若不詳察真偽忠臣將復有杜郵之戮矣白起與應侯有隙搆之秦昭王免起為士伍遷之隂密行出咸陽西門十里至杜郵使賜劒自裁見史記案杜郵今咸陽城是其地酈元注水經云渭水北有杜郵亭也陛下宜思虞舜四罪之舉速行讒佞放殛之誅殛音紀力反殛亦誅也則善人思進姦凶自息臣聞忠臣之事君猶孝子之事父也子之事父焉得不盡其情使臣身被鈇鉞之戮陛下少用其言國之福也書奏宦者趙忠見而忿惡及}
