  - {type: variant, offset: 1709, length: 2, content: 闚京, WYG: 増一口斯獲罪於天也恭有俊才官至上黨太守傅爕傳傅爕字南容北地靈州人也靈州縣也本字㓜起慕南容三復白圭乃易字焉家語子貢對衞文子曰一日三復白圭之玷是南宫縚之行也王肅注云玷缺也詩云白圭之玷尚可磨也斯言之玷不可為也一日三復慎之至也身長八尺有威容少}
