  - {type: variant, offset: 2644, length: 7, content: 郡太守及羌虜小, WYG: 裂之地荆州爲劇故山鳴之異作其域也靈帝熹平二年東萊海出大魚二枚長八九丈高二丈餘明年中山王暢任城王博並薨京房易傳曰海出巨魚邪人進賢人疏臣昭謂此占符靈帝之世巨魚之出於是爲徴寧獨二王之妖也和帝永元四年蝗臣昭案本紀光武建武六年詔稱徃嵗水旱蝗蟲爲災古今注曰建武二十二年三}
