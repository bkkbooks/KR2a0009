  - {type: variant, offset: 2652, length: 272, content: 氏等步騎數萬輜重五千餘兩與大軍會高平第一融先遣從事問會見儀適是時軍旅代興諸將與三公交錯道中或背使者交私語帝聞融先問禮儀甚善之以宣告百僚乃置酒高會引見融等待以殊禮拜弟友為奉車都尉從弟士太中大夫遂共進軍囂衆大潰城邑皆降帝高融功下詔以安豐陽泉蓼安安風四縣封融為安豐侯弟友為顯親侯遂以次封諸將帥武鋒將軍竺曾為助義侯武威太守梁統為成義侯張掖太守史苞為襃義侯金城太守厙鈞為輔義侯酒泉太守辛肜為扶義侯封爵既畢乘輿東歸悉遣融等西還所鎮融以兄弟並受爵位久專方面懼不自安數上書求代詔報曰吾與將軍如左右手耳數執謙退何不曉人意勉循士民無離部曲及隴蜀平詔融與五郡太守奏事, WYG: ''}
