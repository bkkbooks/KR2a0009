  - {type: variant, offset: 2634, length: 9, content: 夏車駕西征隗囂融率, WYG: 中長沙醴陵縣有大山常大鳴如牛呴聲積數年後豫章賊攻没醴陵縣殺略吏民干寶曰論語擿輔像曰山土崩川閉塞漂淪移山鼓哭閉衡夷庶桀合兵王作時天下尚亂豪傑並爭曹操事二袁於河北孫吳創基於江外劉表阻亂衆於襄陽南招零桂北割漢川又以黄祖爲爪牙而祖與孫氏爲深讐兵革嵗交十年曹操破袁譚於南皮十一年走袁尙於遼東十三年吳禽黄祖是嵗劉表死曹操畧荆州逐劉備於當陽十四年吳破曹操於赤壁是三雄者卒共三分天下成帝王之業是所謂蔗桀合兵王作者也十六年劉備入蜀與吳再爭荆州於時戰爭四分}
  - {type: page-break, offset: 2634, content: '', id: KR2a0009_WYG_025-12a, image: WYG0252/WYG0252-0338c.png}
