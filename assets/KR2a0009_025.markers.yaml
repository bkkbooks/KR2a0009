  - {type: variant, offset: 710, length: 0, content: '', WYG: 也殤帝延平元年五月郡國三十七大水傷稼董仲舒曰水者隂氣盛也是時帝在襁抱鄧太后專政臣昭案本紀是年九月六州大水袁山松書曰六州河濟渭雒洧水盛長泛溢傷秋稼安帝永初元年冬十月辛酉河南新城山水虣出突壊民田壊處泉水出深三丈是時司空周章等以鄧太后不立皇太子勝而立清河王子故謀}
