  - {type: variant, offset: 2365, length: 6, content: 太牢數馳輕使, WYG: 為君帝兄有疾封為平原王卒皆夭無嗣古今注曰光武建武十年遼東冬雷草木實殤帝延平元年九月乙亥陳留雷有石隕地四臣昭案天文志末已載石隕未解此篇所以重記石與雷隕俱者九月雷未為異桓帝亦有此隕後不兼載於是為常古今注曰章帝建初四年五月戊寅頴隂石從天墜大如鐵鑕色黑始下時聲如雷安帝永初六年十月丙戌郡六冬雷京房占曰天冬雷地必震又曰教令擾又曰雷以十一月起黄鍾二月大聲八月闔藏此以春夏殺無辜不須冬刑}
