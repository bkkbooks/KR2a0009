  - {type: variant, offset: 708, length: 0, content: '', WYG: 徴拜諫議大夫建武十年雒水出造津城門校尉欲奏塞之宣曰昔周公卜雒以安宗廟為萬世基水不當入城門如為災異人主過}
  - {type: variant, offset: 708, length: 0, content: '', krp: 徴拜諫議大夫建武十年雒水出造津城門校尉欲奏塞之宣曰昔周公卜雒以安宗廟為萬世基水不當入城門如為災異人主過}
  - {type: variant, offset: 709, length: 0, content: '', WYG: 不可辭塞之無益昔東郡金堤大決水欲没郡令吏民散走大守王尊亡身勅以住立不動水應時自消尊人臣尚修政弭災豈況朝廷中興聖主天所挺授水必不入言未絶水去上善其言後乘輿出宣列引在前行遲乘輿欲驅鉤宣車蓋使疾行御者墮車下宣前諫曰王者承天綂地動有法度車則和鸞歩則佩玉動靜應天昔孝文時邊方有獻千里馬者還而不受陛下宜上稽唐虞下以文帝為法上納其言遂徐行按轡遷為河堤謁者以病免卒於家和帝永元元年七月郡國九大水傷稼榖梁傳曰高下有水災曰大水京房易傳曰顓事有知誅罰絶理厥災水其水也而殺人隕霜大風天黄饑而不損兹謂泰厥水水殺人辟遏有徳兹謂狂厥水水流殺人已水則地生蟲歸獄不解兹謂追非厥水寒殺人追誅不解兹謂不理厥水五榖不收大敗不解兹謂皆隂厥水流入國邑隕霜殺榖春秋考異郵曰隂盛臣逆民悲情發則水出河決也是時和帝幼竇太后攝政其兄竇憲幹事及憲諸弟皆貴顯並作威虣虐嘗所怨恨輙任客殺之其後竇氏誅滅東觀書曰十年五月丁巳京師大雨南山水流出至東郊壊民廬舍十二年六月潁川大水傷稼是時和帝幸鄧貴人隂有欲廢隂后之意隂后亦懐恚怨一曰先是恭懐皇后葬禮有闕竇太后崩後乃改殯梁后葬西陵徴舅三人皆爲列侯位特進賞賜累千金廣州先賢傳曰和帝時䇿問隂陽不和或水或旱方正鬱林布衣養奮字叔高對曰天有隂陽隂陽有四時四時有政令春夏則子惠布施寛仁秋冬則剛猛盛威行刑賞罰殺生各應其時則隂陽和四時調風雨時五榖升今則不然長吏多不奉行時令為政舉事干逆天氣上不卹下下不忠上百姓困乏而不卹哀衆怨鬱積故隂陽不和風雨不時災害緣類水者隂盛小人居位依公營私䜛言誦上雨漫溢者五榖有不升而賦税不為減百姓虛竭家有愁}
