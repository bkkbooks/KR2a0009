  - {type: variant, offset: 14, length: 1, content: 弟, WYG: 大水冬雷水變色山鳴大寒魚孽雹蝗五行傳曰簡宗廟不禱祠鄭𤣥注曰虛危為宗廟廢祭祀鄭𤣥曰牽牛主祭祀之牲逆天時鄭𤣥曰月在星紀周以為正月在𤣥枵殷以為正皆不得四時之正逆天時之象也春秋定十五年夏五月辛亥郊譏運卜三正以至失時是其類也則水不潤下鄭𤣥曰君行此四者為逆天北宮之政也北宮於地為水水性浸潤下流人所用灌溉者也無故源流竭絶川澤以涸是為不潤下其他變異皆屬沴謂水失其性而為災也太公六韜曰人主好破壊名山壅塞大川決通名水則嵗多大水五榖不成也又曰聽之不聰是謂不謀鄭𤣥曰君聽不聰則是不能謀其事也洪範曰聰作謀孔安國曰所謀必成當馬融曰上聰則下進其謀厥咎急鄭𤣥曰君臣不謀則急矣易傳曰誅罰絶理不云下也顓事有知不云謀也厥罰恒寒鄭𤣥曰聽曰水水主冬冬氣藏藏氣失故常寒厥極貧鄭𤣥曰藏氣失故於人為貧時則有鼓妖鄭𤣥曰鼓聽之應也時則有魚孽鄭𤣥曰魚蟲之生水而遊於水者也時則有豕禍鄭𤣥曰豕畜之居閑衛而聽者也屬聽時則有耳痾鄭𤣥曰聽氣失之病時則有黑眚黑祥惟火沴水魚孽劉歆傳以為介蟲之孽謂蝗屬也月令章句曰介者甲也謂龜蟹之屬也古今注曰光武建武四年東郡以北傷水七年六月戊辰雒水盛溢至聿城門帝自行水𢎞農都尉治折為水所漂殺民溺傷稼壊廬舍二十四年六月丙申沛國睢水逆流一日一夜止章帝建初八年六月癸巳東昬城下池水變赤如血臣昭案諸史光武之時郡國亦常有水災而志不載本紀八年秋大水又云是嵗大水今據杜林之傳列之孝和之前東觀書曰建武八年間郡國七大水涌泉盈溢杜林以為倉卒時兵擅權作威張氏雖皆降散猶尚有遺脱長吏制御無術令得復熾元元侵陵之所致也上疏曰臣聞先王無二道明聖用而治見惡如農夫之務去革焉芟夷藴崇之絶其本根勿使能殖畏其易也古今通道傳其法於有根狼}
  - {type: page-break, offset: 14, content: '', id: KR2a0009_WYG_025-1b, image: WYG0252/WYG0252-0333b.png}
  - {type: page-break, offset: 14, content: '', id: KR2a0009_WYG_025-2a, image: WYG0252/WYG0252-0333c.png}
