  - {type: variant, offset: 1684, length: 670, content: 累之一朝毀之豈不惜乎殆執事者貪功建謀以至於此融竊痛之當今西州地埶局迫人兵離散易以輔人難以自建計若失路不反聞道猶迷不南合子陽則北入文伯耳夫負虛交而易強禦恃遠救而輕近敵未見其利也融聞智者不危衆以舉事仁者不違義以要功今以小敵大於衆何如𠫓廾子徼功於義何如且初事本朝稽首北面忠臣節也及遣伯春垂涕相送慈父恩也俄而背之謂吏士何忍而𠫓廾之謂留子何自兵起以來轉相攻擊城郭皆為丘墟生人轉於溝壑今其存者非鋒刃之餘則流亡之孤迄今傷痍之體未愈哭泣之聲尚聞幸賴天運少還而大將軍復重於難是使積痾不得遂瘳幼孤將復流離其為悲痛尤足愍傷言之可為酸鼻庸人且猶不忍況仁者乎融聞為忠甚易得宜實難憂人大過以德取怨知且以言獲罪也區區所獻唯將軍省焉囂不納融乃與五郡太守共砥厲兵馬上疏請師期帝深嘉美之乃賜融以外屬圖及太史公五宗外戚世家魏其侯列傳詔報曰每追念外屬孝景皇帝出自竇氏定王景帝之子朕之所祖昔魏其一言繼統以正長君少君尊奉師傅修成淑德施及子孫此皇太后神靈上天祐漢也從天水來者寫將軍所讓隗囂書痛入骨髓畔臣見之當股慄慙愧忠臣則酸鼻流涕義士則曠若發矇非忠孝誠孰能如此豈其德薄者所能剋堪囂自知失河西之助族禍將及欲設閒離之說亂惑真心轉相解搆以成其姦又京師百僚不曉國家及將軍本意多能採取虛偽誇誕妄談令忠孝失望傳言乖實毀譽之來皆不徒然不可不思今關東盜賊已定大兵今當悉西將軍其抗厲威武以應期會融被詔即與諸郡守將兵入金城初更始時先零羌封何諸種殺金城太守居其郡隗囂使使賂遺封何與共結盟欲發其衆融等因軍出進擊封何大破之斬首千餘級得牛馬羊萬頭穀數萬斛因並河揚威武伺候車駕時大兵未進融乃引還帝以融信効著明益嘉之詔, WYG: 六月}
