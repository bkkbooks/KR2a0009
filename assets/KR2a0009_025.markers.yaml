  - {type: variant, offset: 1160, length: 377, content: 馬悉至深知厚意今益州有公孫子陽天水有隗將軍方蜀漢相攻權在將軍舉足左右便有輕重以此言之欲相厚豈有量哉諸事具長史所見將軍所知王者迭興千載一會欲遂立桓文輔微國當勉卒功業欲三分鼎足連衡合從亦宜以時定天下未并吾與爾絕域非相吞之國今之議者必有任囂效尉佗制七郡之計王者有分土無分民自適己事而已今以黃金二百斤賜將軍便宜輒言因授融為涼州牧璽書既至河西咸驚以為天子明見萬里之外網羅張立之情融即復遣鈞上書曰臣融竊伏自惟幸得託先后末屬蒙恩為外戚累世二千石至臣之身復備列位假歷將帥守持一隅以委質則易為辭以納忠則易為力書不足以深達至誠故遣劉鈞口陳肝膽自以底𩹉上露長無纖介而璽書盛稱蜀漢二主三分鼎足之權任囂尉佗之謀竊自痛傷臣融雖無識猶知利害之際順逆之分豈可背真舊之主事姦偽之人廢忠貞之節為傾覆之事𠫓廾已成之基求無冀之利此三者雖問狂夫猶知去就而臣獨何以用心謹遣同產弟友詣闕口陳區區友至高, WYG: 帝初}
