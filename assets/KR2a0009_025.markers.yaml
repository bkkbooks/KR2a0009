  - {type: variant, offset: 6500, length: 332, content: 梁棠兄弟徙九真還路由長沙逼瓌令自殺後和熹鄧后臨朝永初三年詔諸竇前歸本郡者與安豐侯萬全俱還京師萬全少子章論曰衛青霍去病資強漢之衆連年以事匈奴國秏太半矣而猾虜未之勝後世猶傳其良將豈非以身名自終邪竇憲率羌胡邊雜之師一舉而空朔庭至乃追奔稽落之表飲馬比鞮之曲銘石負鼎薦告清廟列其功庸兼茂於前多矣而後世莫稱者章末釁以降其實也是以下流君子所甚惡焉夫二三子得之不過房幄之閒非復搜揚仄陋選舉而登也當青病奴僕之時竇將軍念咎之日乃庸力之不暇思鳴之無晨何意裂膏腴享崇號乎東方朔稱用之則為虎不用則為鼠信矣以此言之士有懷琬琰以就煨塵者亦何可支哉章字伯向少好學有文章與馬融崔瑗同好更相推薦永初中三輔遭羌寇章避難東國家於外黃居貧蓬戶蔬食躬勤孝養然講讀不輟太僕鄧康聞其名請欲與交章不肯往康以此益重焉, WYG: 夏大蝗}
