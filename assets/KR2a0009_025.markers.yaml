  - {type: variant, offset: 1538, length: 145, content: 會囂反叛道絕馳還遣司馬席封閒行通書帝復遣席封賜融友書所以尉藉之甚備融既深知帝意乃與隗囂書責讓之曰伏惟將軍國富政修士兵懷附親遇戹會之際國家不利之時守節不回承事本朝後遣伯春委身於國無疑之誠於斯有效融等所以欣服高義願從役於將軍者良為此也而忿悁之閒改節易圖君臣分爭上下接兵委成功造難就去從義為橫謀百, WYG: 四}
