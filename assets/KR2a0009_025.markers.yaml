  - {type: variant, offset: 5819, length: 660, content: 封憲冠軍侯邑二萬戶篤郾侯景汝陽侯瓌夏陽侯各六千戶憲獨不受封遂將兵出鎮涼州以侍中鄧疊行征西將軍事為副北單于以漢還侍弟復遣車諧儲王等款居延塞欲入朝見願請大使憲上遣大將軍中護軍班固行中郎將與司馬梁諷迎之會北單于為南匈奴所破被創遁走固至私渠海而還憲以北虜微弱遂欲滅之明年復遣右校尉耿夔司馬任尚趙博等將兵擊北虜於金微山大破之克獲甚衆北單于逃走不知所在憲既平匈奴威名大盛以耿夔任尚等為爪牙鄧疊郭璜為心腹班固傅毅之徒皆置幕府以典文章刺史守令多出其門尚書僕射郅壽樂恢並以忤意相繼自殺由是朝臣震懾望風承旨而篤進位特進得舉吏見禮依三公景為執金吾瓌光祿勳權貴顯赫傾動京都雖俱驕縱而景為尤甚奴客緹騎依倚形埶侵陵小人強奪財貨篡取罪人妻略婦女商賈閉塞如避寇讎有司畏懦莫敢舉奏太后聞之使謁者策免景官以特進就朝位瓌少好經書節約自修出為魏郡遷潁川太守竇氏父子兄弟並居列位充滿朝廷叔父霸為城門校尉霸弟襃將作大匠襃弟嘉少府其為侍中將大夫郎吏十餘人憲既負重勞陵肆滋甚四年封鄧疊為穰侯疊與其弟步兵校尉磊及母元又憲女壻射聲校尉郭舉舉父長樂少府璜皆相交結元舉並出入禁中舉得幸太后遂共圖為殺害帝陰知其謀乃與近幸中常侍鄭衆定議誅之以憲在外慮其懼禍為亂忍而未發會憲及鄧疊班師還京師詔使大鴻臚持節郊迎賜軍吏各有差憲等既至帝乃幸北宮詔執金吾五校尉勒兵屯衛南北宮閉城門收捕疊磊璜舉皆下獄誅家屬徙合浦遣謁者僕射收憲大將軍印綬更封為冠軍侯憲及篤景瓌皆遣就國帝以太后故不欲名誅憲為選嚴能相督察之憲篤景到國皆迫令自殺宗族賓客以憲為官者皆免歸本郡瓌以素自修不被逼迫明年坐稟假貧人徙封羅侯不, WYG: 救也易曰}
