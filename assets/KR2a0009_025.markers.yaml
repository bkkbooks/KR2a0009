  - {type: variant, offset: 4033, length: 899, content: 河東北地西河羌胡及南單于兵萬一千騎出高闕塞騎都尉來苗護烏桓校尉文穆將太原鴈門代郡上谷漁陽右北平定襄郡兵及烏桓鮮卑萬一千騎出平城塞固忠至天山擊呼衍王斬首千餘級呼衍王走追至蒲類海留吏士屯伊吾盧城耿秉秦彭絕漠六百餘里至三木樓山來苗文穆至匈奴河水上虜皆奔走無所獲祭肜吳棠坐不至涿邪山免為庶人時諸將唯固有功加位特進明年復出玉門擊西域詔耿秉及騎都尉劉張皆去符傳以屬固固遂破白山降車師事已具耿秉傳固在邊數年羌胡服其恩信肅宗即位以公主修勑慈愛累世崇重加號長公主增邑三千戶徵固代魏應為大鴻臚帝以其曉習邊事每被訪及建初三年追錄前功增邑一千三百戶七年代馬防為光祿勳明年復代馬防為衛尉固久歷大位甚見尊貴賞賜租祿貲累巨億而性謙儉愛人好施士以此稱之章和二年卒謚曰文侯子彪至射聲校尉先固卒無子國除憲字伯度父勳被誅憲少孤建初二年女弟立為皇后拜憲為郎稍遷侍中虎賁中郎將弟篤為黃門侍郎兄弟親幸並侍宮省賞賜累積寵貴日盛自王主及陰馬諸家莫不畏憚憲恃宮掖聲埶遂以賤直請奪沁水公主園田主逼畏不敢計後肅宗駕出過園指以問憲憲陰喝不得對後發覺帝大怒召憲切責曰深思前過奪主田園時何用愈趙高指鹿為馬久念使人驚怖昔永平中常令陰黨陰博鄧疊三人更相糾察故諸豪戚莫敢犯法者而詔書切切猶以舅氏田宅為言今貴主尚見枉奪何況小人哉國家𠫓廾憲如孤雛腐鼠耳憲大震懼皇后為毀服深謝良久乃得解使以田還主雖不繩其罪然亦不授以重任和帝即位太后臨朝憲以侍中內幹機密出宣誥命肅宗遺詔以篤為虎賁中郎將篤弟景瓌並中常侍於是兄弟皆在親要之地憲以前太尉鄧彪有義讓先帝所敬而仁厚委隨故尊崇之以為太傅令百官總己以聽其所施為輒外令彪奏內白太后事無不從又屯騎校尉桓郁累世帝師而性和退自守故上書薦之令授經禁中所以內外協附莫生疑異憲性果急睚眦之怨莫不報復初永平時謁者韓紆嘗考劾父勳獄憲遂令客斬紆子以首祭勳冢齊殤王子都鄉侯暢來弔國憂暢素行邪僻與步兵校尉鄧疊親屬數往來京師因疊母元自通長樂宮得幸太后被詔召詣上東門憲懼見幸分宮省之權遣客刺殺暢於屯衛之中而歸罪於暢弟利侯剛乃使侍御史與青州刺史雜考剛等後事發覺太后怒閉憲於內宮憲懼誅自求擊匈奴以贖死會南單于請兵北伐乃拜憲車騎將軍金印紫綬官屬依司空以執金吾耿秉為副發, WYG: ''}
