  - {type: variant, offset: 16, length: 6, content: 固曾孫憲玄孫, WYG: 野心奔馬善驚成王深知其終卒之患故以殷氏六族分伯禽七族分康叔懐姓九宗分唐叔檢押其姦宄又遷其餘於成周舊地雜俗旦夕拘録所以挫其强御之力詘其驕恣之節也及漢初興上稽舊}
