  - {type: variant, offset: 2439, length: 193, content: 定帝將自西征之先戒融期會遇雨道斷且囂兵已退乃止融至姑臧被詔罷歸融恐大兵遂久不出乃上書曰隗囂聞車駕當西臣融東下士衆騷動計且不戰囂將高峻之屬皆欲逢迎大軍後聞兵罷峻等復疑囂揚言東方有變西州豪桀遂復附從囂又引公孫述將令守突門臣融孤弱介在其閒雖承威靈宜速救助國家當其前臣融促其後緩急迭用首尾相資囂埶排迮不得進退此必破也若兵不早進久生持疑則外長寇讎內示困弱復令讒邪得有因緣臣竊憂之惟陛下哀憐帝深美之, WYG: 七}
