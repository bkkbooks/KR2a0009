  - {type: variant, offset: 710, length: 0, content: '', krp: 也殤帝延平元年五月郡國三十七大水傷稼董仲舒曰水者隂氣盛也是時帝在襁抱鄧太后專政臣昭案本紀是年九月六州大水袁山松書曰六州河濟渭雒洧水盛長泛溢傷秋稼安帝永初元年冬十月辛酉河南新城山水虣出突壊民田壊處泉水出深三丈是時司空周章等以鄧太后不立皇太子勝而立清河王子故謀}
  - {type: variant, offset: 711, length: 0, content: '', WYG: 廢置十一月事覺章等伏誅是年郡國四十一水出漂没民人謝沈書曰死者以千數讖曰水者純隂之精也隂氣盛洋溢者小人専制擅權妬疾賢者依公結私侵乘君子小人席勝失懐得志故涌水為災二年大水臣昭案本紀京師及郡國四十有水周嘉傳是夏旱嘉收葬客死骸骨應時澍雨嵗乃豐稔則水不為災也三年大水臣昭案本紀京師及郡國四十一雨水四年大水臣昭案本紀云三郡五年大水臣昭案本紀郡國八六年河}
  - {type: page-break, offset: 711, content: '', id: KR2a0009_WYG_025-5b, image: WYG0252/WYG0252-0335b.png}
  - {type: variant, offset: 711, length: 0, content: '', krp: 廢置十一月事覺章等伏誅是年郡國四十一水出漂没民人謝沈書曰死者以千數讖曰水者純隂之精也隂氣盛洋溢者小人専制擅權妬疾賢者依公結私侵乘君子小人席勝失懐得志故涌水為災二年大水臣昭案本紀京師及郡國四十有水周嘉傳是夏旱嘉收葬客死骸骨應時澍雨嵗乃豐稔則水不為災也三年大水臣昭案本紀京師及郡國四十一雨水四年大水臣昭案本紀云三郡五年大水臣昭案本紀郡國八六年河}
  - {type: variant, offset: 712, length: 0, content: '', WYG: 池水變色皆赤如血水變占曰水化為血者好任殘賊殺戮不辜延及親戚水當為血是時鄧太后猶専政古今注曰元初二年潁川襄城流水化為血京房占曰流水化為血兵且起以日辰占與其色博物記曰江河水赤占曰泣血道路渉蘇於河以處延光三年大水流殺民人傷苖稼是時安帝信江京樊豐及阿母王聖等䜛言免太尉楊震廢皇太子臣昭案左雄傳順帝永建四年司冀二州大水傷禾稼楊厚傳永和元年夏雒陽暴水殺千餘人質帝本初元年五月海水溢樂安北海溺殺人物是時帝㓜梁太后専政春秋漢含孳曰九卿阿黨擠排正直驕奢僭害則江河潰決方儲對䇿曰民悲怨則隂類强河決海澹地動土涌桓帝建和二年七月京師大水去年冬梁冀枉殺故太尉李固杜喬三年八月京都大水是時梁太后猶専政永興元年秋河水溢漂害人物臣昭案朱穆傳云漂害數千萬戸京房占曰江河溢者天有制度地有里數懐容水澤浸溉萬物今溢者明在位者不勝任也三公之禍不能容也率執法者利刑罰不用常法二年六月彭城泗水增長逆流梁冀别傳曰冀之專政天為見異衆災並湊蝗蟲滋生河水逆流五星失次太白經天人民疾疫出入六年羌戎叛戾盜賊畧平皆冀所致敦煌實録張衡對䇿曰水者五行之首滯而逆流者人君之恩不能下及而教逆也潛潭巴曰水逆者反命也宜修德以應之永夀元年六月雒水溢至津陽城門漂流人物臣昭案本紀又南陽大水是時梁皇后兄冀秉政疾害忠直威權震主後遂誅滅延熹八年四月濟北水清九年四月濟隂東郡濟北平原河水清襄楷上言河者諸侯之象清者陽明之徴豈獨諸侯有規京都計邪其明年宮車晏駕徴解犢亭侯為漢嗣即尊位是為孝靈皇帝永康元年八月六州大水勃海海溢没殺人是時桓帝奢侈淫祀其十一月崩無嗣靈帝建寧四年二月河水清袁山松書曰禱于龍􅀈五月山水大出漂壊廬舍五百餘家袁山松書曰是河東水暴出也熹平二年六月東萊北海海水溢出漂没人物三年秋雒水出四年夏郡國三水傷害秋稼光和六年秋金城河溢水出二十餘里中平五年郡國六水大出臣昭案袁山松書曰山陽梁沛彭城下邳東海琅邪則是七郡獻帝建安二年九月漢水流害民人是時天下大亂袁山松書曰曹操専政十七年七月大水洧水溢十八年六月大水獻帝起居注曰七月大水上親避正殿八月以雨不止且還殿二十四年八月漢水溢流害民人袁山松書曰明年禪位于魏也庶徴之恒寒靈帝光和六年冬大寒北海東萊琅邪井中氷厚尺餘袁山松書曰是時羣賊起天下始亂讖曰寒者小人暴虐専權居位無道有位適罰無法又殺無罪其寒必暴殺獻帝初平四年六月寒風如冬時袁山松書曰時帝流遷失政養奮對䇿曰當温而寒刑罰慘也和帝永元五年六月郡國三雨雹大如雞子春秋考異郵曰隂氣之專精凝合生雹雹之為言合也以妾為妻大尊重九女之妃闕而不御坐不離前無由相去之心同輿參駟房袵之内歡欣之樂專政夫人施而不博隂精凝而見成易讖曰凡雹者過由人君惡聞其過抑賢不揚内與邪人通取財利蔽賢施之並當雨不雨故反雹下也是時和帝用酷吏周紆為司隸校尉刑誅深刻古今注曰光武建武十年十月戊辰樂浪上谷雨雹傷稼十二年河南平陽雨雹大如杯壊敗吏民廬舍十五年十二月乙卯鉅鹿雨雹傷稼永平三年八月郡國十二雨雹傷稼十年郡國十八或雨雹蝗易緯曰夏雹者治道煩苛繇役急促教令數變無有常法不救為兵强臣逆謀蝗蟲傷榖救之舉賢良爵有功務寛大無誅罰則災除安帝永初元年雨雹二年雨雹大如雞子三年雨雹大如鴈子傷稼劉}
