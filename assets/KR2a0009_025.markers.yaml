  - {type: variant, offset: 458, length: 246, content: 同心勠力則不能自守權鈞力齊復無以相率當推一人為大將軍共全五郡觀時變動議既定而各謙讓咸以融世任河西為吏人所敬向乃推融行河西五郡大將軍事是時武威太守馬期張掖太守任仲並孤立無黨乃共移書告示之二人即解印綬去於是以梁統為武威太守史苞為張掖太守竺曾為酒泉太守辛肜為敦煌太守厙鈞為金城太守融居屬國領都尉職如故置從事監察五郡河西民俗質樸而融等政亦寬和上下相親晏然富殖修兵馬習戰射明烽燧之警羌胡犯塞融輒自將與諸郡相救皆如符要每輒破之其後匈奴懲稀復侵寇而保塞羌胡皆震服親附安定北地上郡流人避凶飢者歸之不絕融等遙聞, WYG: 仕}
