  - {type: variant, offset: 5273, length: 425, content: 八陣莅以威神玄甲耀日朱旗絳天遂陵高闕下鷄鹿經磧鹵絕大漠斬溫禺以釁鼓血尸逐以染鍔然後四校橫徂星流彗埽蕭條萬里野無遺寇於是域滅區單反斾而旋考傳驗圖窮覽其山川遂踰涿邪跨安侯乘燕然躡冒頓之區落焚老上之龍庭上以攄高文之宿憤光祖宗之玄靈下以安固後嗣恢拓境宇振大漢之天聲茲所謂一勞而久逸暫費而永寧者也乃遂封山刊石昭銘上德其辭曰鑠王師兮征荒裔勦凶虐兮海外敻其邈兮亙地界封神丘兮建隆嵑熙帝載兮振萬世憲乃班師而還遣軍司馬吳汜梁諷奉金帛遺北單于宣明國威而兵隨其後時虜中乖亂汜諷所到輒招降之前後萬餘人遂及單于於西海上宣國威信致以詔賜單于稽首拜受諷因說宜修呼韓邪故事保國安人之福單于喜悅即將其衆與諷俱還到私渠海聞漢軍已入塞乃遣弟右溫禺鞮王奉貢入侍隨諷詣闕憲以單于不自身到奏還其侍弟南單于於漠北遺憲古鼎容五斗其傍銘曰仲山甫鼎其萬年子子孫孫永保用憲乃上之詔使中郎將持節即五原拜憲大將軍封武陽侯食邑二萬戶憲固辭封賜策許焉舊大將軍位在三公下置官屬依太尉憲威權震朝庭公卿希旨奏憲位次太傅, WYG: ''}
