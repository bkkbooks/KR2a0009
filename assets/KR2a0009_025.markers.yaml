  - {type: 'tls:seg', offset: 713, content: '', id: KR2a0009_ZHSJ_025-d25p6s3}
  - {type: variant, offset: 714, length: 0, content: '', WYG: 為雹隂脅陽也是時鄧太后以隂專陽政元初四年六月戊辰郡國三雨雹大如杅杯及雞子殺六畜古今注曰樂安雹如杅殺人京房占曰夏雨雹天下兵大作延光元年四月郡國二十一雨雹大如雞子傷稼是時安帝信䜛無辜死者多臣昭案尹敏傳是嵗}
  - {type: variant, offset: 714, length: 0, content: '', krp: 為雹隂脅陽也是時鄧太后以隂專陽政元初四年六月戊辰郡國三雨雹大如杅杯及雞子殺六畜古今注曰樂安雹如杅殺人京房占曰夏雨雹天下兵大作延光元年四月郡國二十一雨雹大如雞子傷稼是時安帝信䜛無辜死者多臣昭案尹敏傳是嵗}
  - {type: variant, offset: 716, length: 360, content: 隔遠未能自通時隗囂先稱建武年號融等從受正朔囂皆假其將軍印綬囂外順人望內懷異心使辯士張玄游說河西曰更始事業已成尋復亡滅此一姓不再興之效今即有所主便相係屬一旦拘制自令失柄後有危殆雖悔無及今豪傑競逐雌雄未決當各據其土宇與隴蜀合從高可為六國下不失尉佗融等於是召豪傑及諸太守計議其中智者皆曰漢承堯運歷數延長今皇帝姓號見於圖書自前世博物道術之士谷子雲夏賀良等建明漢有再受命之符言之久矣故劉子駿改易名字冀應其占及莽末道士西門君惠言劉秀當為天子遂謀立子駿事覺被殺出謂百姓觀者曰劉秀真汝主也皆近事暴著智者所共見也除言天命且以人事論之今稱帝者數人而洛陽土地最廣甲兵最彊號令最明觀符命而察人事它姓殆未能當也諸郡太守各有賓客或同或異融小心精詳遂決策東向五年夏遣長史劉鈞奉書獻馬先是帝聞河西完富地接隴蜀常欲招之以逼囂述亦發使遺融書遇鈞於道即與俱還, WYG: 大雨雹如斗安}
  - {type: variant, offset: 716, length: 360, content: 隔遠未能自通時隗囂先稱建武年號融等從受正朔囂皆假其將軍印綬囂外順人望內懷異心使辯士張玄游說河西曰更始事業已成尋復亡滅此一姓不再興之效今即有所主便相係屬一旦拘制自令失柄後有危殆雖悔無及今豪傑競逐雌雄未決當各據其土宇與隴蜀合從高可為六國下不失尉佗融等於是召豪傑及諸太守計議其中智者皆曰漢承堯運歷數延長今皇帝姓號見於圖書自前世博物道術之士谷子雲夏賀良等建明漢有再受命之符言之久矣故劉子駿改易名字冀應其占及莽末道士西門君惠言劉秀當為天子遂謀立子駿事覺被殺出謂百姓觀者曰劉秀真汝主也皆近事暴著智者所共見也除言天命且以人事論之今稱帝者數人而洛陽土地最廣甲兵最彊號令最明觀符命而察人事它姓殆未能當也諸郡太守各有賓客或同或異融小心精詳遂決策東向五年夏遣長史劉鈞奉書獻馬先是帝聞河西完富地接隴蜀常欲招之以逼囂述亦發使遺融書遇鈞於道即與俱還, krp: 大雨雹如斗安}
