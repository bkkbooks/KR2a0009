  - {type: variant, offset: 23, length: 4, content: 竇融字周, WYG: 合符重規徙齊諸田楚昭屈景燕趙韓魏之後以稍弱六國强宗邑里無營利之家野澤無兼并之民萬里之綂海内頼安後輙因衰麤之痛脅以送終之義故遂相率而陪園陵無反顧之心追觀徃法政皆神道設教强幹弱枝本支百世之要也是以皆永享康寜之福無怵惕之憂繼嗣承業恭已而治蓋此助也其被災害民輕薄無累重者兩府遣吏䕶送饒榖之郡或懼死亡卒為傭賃亦所以消散其口救瞻全其性命也昔魯隠有賢行將致國於桓}
