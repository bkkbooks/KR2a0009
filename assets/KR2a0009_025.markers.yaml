  - {type: variant, offset: 3236, length: 327, content: 代陰興行衞尉事特進如故又兼領將作大匠弟友為城門校尉兄弟並典禁兵融復乞骸骨輒賜錢帛太官致珍奇及友卒帝愍融年衰遣中常侍中謁者即其臥內強進酒食融長子穆尚內黃公主代友為城門校尉穆子勳尚東海恭王彊女沘陽公主友子固亦尚光武女涅陽公主顯宗即位以融從兄子林為護羌校尉竇氏一公兩侯三公主四二千石相與並時自祖及孫官府邸第相望京邑奴婢以千數於親戚功臣中莫與為比永平二年林以罪誅事在西羌傳帝由是數下詔切責融戒以竇嬰田蚡禍敗之事融惶恐乞骸骨詔令歸第養病歲餘聽上衞尉印綬賜養牛上樽酒融在宿衞十餘年年老子孫縱誕多不法穆等遂交通輕薄屬託郡縣干亂政事以封在安豐欲令姻戚悉據故六安國遂矯稱陰太后詔令六安侯劉盱去婦因以女妻之五年盱婦家上書言狀帝大怒乃盡免穆等官諸竇為郎吏者皆將家屬歸故郡獨留融, WYG: ''}
