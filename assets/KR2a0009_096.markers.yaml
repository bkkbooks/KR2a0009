  - {type: variant, offset: 845, length: 242, content: 七郡及汝南潁川施弛刑徒吏士五千餘人拒守零陽募充中五里蠻精夫不叛者四千人擊澧中賊五年春覃兒健等請降不許郡因進兵與戰於宏下大破之斬兒健首餘皆𠫓廾營走還漊中復遣乞降乃受之於是罷武陵屯兵賞賜各有差和帝永元四年冬漊中澧中蠻潭戎等反燔燒郵亭殺略吏民郡兵擊破降之安帝元初二年澧中蠻以郡縣徭稅失平懷怨恨遂結充中諸種二千餘人攻城殺長吏州郡募五里蠻六亭兵追擊破之皆散降賜五里六亭渠帥金帛各有差明年秋漊中澧中蠻四千人並為盜賊又零陵蠻羊孫陳湯等千餘人著赤幘稱將軍燒官寺抄掠百姓州郡募善蠻討平之順帝永和元年武陵, WYG: 從事奏濟隂}
