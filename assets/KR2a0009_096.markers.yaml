  - {type: variant, offset: 1540, length: 2, content: 馮緄, krp: 超桓帝収匡下廷尉以譴超超詣獄謝三府諺曰車如雞栖馬如狗疾惡如風朱伯厚論曰桓靈之世若陳蕃之徒咸能樹立風聲抗論惛俗而馳驅嶮阨之中與刑人腐夫同朝争衡前書班固曰相與提衡音義云衡平也言二人齊也終取滅亡之禍者彼非不能絜情志違埃霧也違避也愍夫世士以離俗為髙而人倫莫相恤也以遯世為非義故屢退而不去以仁心為己任雖道逺而彌厲論語曰仁以為己任不亦重乎死而後已不亦逺乎及遭際㑹協䇿竇武自謂萬世一遇也懔懔乎伊望之業矣懍懍有風采之貎也功雖不終然其信義足以携持民心漢世亂而不亡百餘年間數公之力也王允傳王允字子師太原祁人也祁今并州縣也世仕州郡為冠盖同郡郭林宗嘗見允而竒之曰王生一日千里玉佐才也史記曰田光謂燕太子丹曰臣聞驥壯盛之時一日千里至其老也駑馬先之遂與定交年十九為郡吏時小黄門晉陽趙津貪横放恣為一縣巨患允}
