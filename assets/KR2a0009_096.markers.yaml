  - {type: variant, offset: 138, length: 0, content: '', WYG: 名竊惟割地之封功徳是為臣熟自思省前後歴職無它異能合亦食祿不合亦食祿臣雖無素絜之行竊慕君子不以其道得之不居也論語孔子曰富與貴是人之所欲不以其道得之不處也若受爵不讓掩面就之詩小雅曰受爵不讓至于已斯亡注云爵祿不以相讓故怨禍及之也使皇天震怒災流下民於臣之身亦何所寄顧惟陛下哀臣朽老戒之在得論語孔子曰及其老也血氣既衰戒之在得注云得貪也竇太后不許蕃復固讓章前後十上竟不受封初桓}
