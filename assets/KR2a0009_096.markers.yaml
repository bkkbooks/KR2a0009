  - {type: variant, offset: 4064, length: 1017, content: 之境傷害千餘人昭王乃重募國中有能殺虎者賞邑萬家金百鎰時有巴郡閬中夷人能作白竹之弩乃登樓射殺白虎昭王嘉之而以其夷人不欲加封乃刻石盟要復夷人頃田不租十妻不筭傷人者論殺人者得以倓錢贖死盟曰秦犯夷輸黃龍一雙夷犯秦輸清酒一鍾夷人安之至高祖為漢王發夷人還伐三秦秦地既定乃遣還巴中復其渠帥羅朴督鄂度夕龔七姓不輸租賦餘戶乃歲入賨錢口四十世號為板楯蠻夷閬中有渝水其人多居水左右天性勁勇初為漢前鋒數陷陳俗喜歌舞高祖觀之曰此武王伐紂之歌也乃命樂人習之所謂巴渝舞也遂世世服從至于中興郡守常率以征伐桓帝之世板楯數反太守蜀郡趙溫以恩信降服之靈帝光和三二年巴郡板楯復叛寇掠三蜀及漢中諸郡靈帝遣御史中丞蕭瑗督益州兵討之連年不能剋帝欲大發兵乃問益州計吏考以征討方略漢中上計程包對曰板楯七姓射殺白虎立功先世復為義人其人勇猛善於兵戰昔永初中羌入漢州郡縣破壞得板楯救之羌死敗殆盡故號為神兵羌人畏忌傳語種輩勿復南行至建和二年羌復大入實賴板楯連摧破之前車騎將軍馮緄南征武陵雖受丹陽精兵之銳亦倚板楯以成其功近益州郡亂太守李顒亦以板楯討而平之忠功如此本無惡心長吏鄉亭更賦至重僕役箠楚過於奴虜亦有嫁妻賣子或乃至自頸剄割雖陳冤州郡而牧守不為通理闕庭悠遠不能自聞含怨呼天叩心窮谷愁苦賦役困罹酷刑故邑落相聚以致叛戾非有謀主僭號以圖不軌今但選明能牧守自然安集不煩征伐也帝從其言遣太守曹謙宣詔赦之即皆降服至中平五年巴郡黃巾賊起板楯蠻夷因此復叛寇掠城邑遣西園上軍別部司馬趙瑾討平之西南夷者在蜀郡徼外有夜郎國東接交阯西有滇國北有邛都國各立君長其人皆椎結左袵邑聚而居能耕田其外又有巂昆明諸落西極同師東北至葉榆地方數千里無君長辮髮隨畜遷徙無常自巂東北有莋都國東北有冉駹國或土著或隨畜遷徙自冉駹東北有白馬國氐種是也此三國亦有君長夜郎者初有女子浣於遯水有三節大竹流入足閒聞其中有號聲剖竹視之得一男兒歸而養之及長有才武自立為夜郎侯以竹為姓武帝元鼎六年平南夷為牂柯郡夜郎侯迎降天子賜其王印綬後遂殺之夷獠咸以竹王非血氣所生甚重之求為立後牂柯太守霸以聞天子乃封其三子為侯死配食其父今夜郎縣有竹王三郎神是也初楚頃襄王時遣將莊豪從沅水伐夜郎軍至且蘭椓船於岸而步戰既滅夜郎因留王滇池以且蘭有椓船牂柯處乃改其名為牂柯牂柯地多雨潦俗好巫鬼禁忌寡畜生又無蠶桑故其郡最貧句町縣有桄桹木可以為百姓資之公孫述時大姓龍傅尹董氏與郡功曹謝暹保境為漢乃遣使從番禺江奉貢光武嘉之並加襃賞桓帝時郡人尹珍自以生於荒裔不知禮義乃從汝南許慎應奉受經, WYG: ''}
