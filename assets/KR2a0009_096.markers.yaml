  - {type: variant, offset: 3307, length: 4, content: 桓帝永壽, WYG: 並將兵出武闗道以討袁術為名實欲分路征卓而後㧞天子還洛陽卓疑而留之允乃引内瑞為僕射瓚為尚書二年卓還長安錄入闗之功封允為温侯食邑五千戸固讓不受士孫瑞說允曰夫執謙守約存乎其時公與董太師並位俱封而獨崇髙節豈和光之道邪老子曰和其光同其塵允納其言乃受二千戸}
