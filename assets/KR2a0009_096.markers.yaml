  - {type: variant, offset: 63, length: 1, content: 妻, WYG: 青徐炎旱五榖損傷民物流遷茹菽不足廣雅曰茹食也而宫女積於房掖國用盡於羅紈外戚私門貪財受賂所謂禄去公室政在大夫昔春秋之末周徳衰㣲數十年間無復災𤯝者天所棄也春秋感精符曰魯哀公政亂絶無日食天不譴告也天之於漢悢悢無已悢悢猶眷眷也故殷勤示變}
