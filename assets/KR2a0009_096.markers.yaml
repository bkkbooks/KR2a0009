  - {type: variant, offset: 53, length: 0, content: '', WYG: 白日殺人匿主家吏追不得公主出宣駐車叩馬以刀畫地數主主言於帝帝賜宣錢二十萬語見董宣傳未聞二臣有専命之誅而今左右羣豎惡傷黨類妄相交搆致此刑譴聞臣是言當復嗁訴陛下深宜割塞近習豫政之源引納尚書朝省之事公卿大夫五日一朝宣帝五日一聴事自丞相已下各敷奏其言簡練清髙斥黜佞邪如是天和於上地洽於下休禎符瑞豈逺乎哉陛下雖厭毒臣言凡人主有自勉強敢以死陳帝得奏愈怒竟無所納朝廷衆庶莫不怨之宦官由此疾蕃彌甚選舉奏議輒以中詔譴郤長吏以下多至抵罪劉攽曰案文吏當作史太尉府有長史故因蕃見譴也猶以蕃名臣不敢加害瓆字文理髙唐人髙唐縣名今博州縣也瑨字㓜平陜人並有經術稱處位敢直言多所搏擊知名當時皆死於獄中九年李膺等以黨事下獄考實蕃因上疏極諌曰臣聞賢明之君委心輔佐亡國之主諱聞直辭故湯武雖聖而興於伊吕桀紂迷惑亡在失人闗龍逢桀臣王子比干紂諸父二人並諌悉皆誅死由此言之君為元首臣為股肱同體相湏共成羙惡}
  - {type: page-break, offset: 53, content: '', id: KR2a0009_WYG_096-8b, image: WYG0253/WYG0253-0349b.png}
