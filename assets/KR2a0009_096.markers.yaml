  - {type: variant, offset: 2735, length: 423, content: 可也今二州盜賊槃結不散武陵南郡蠻夷未輯長沙桂陽數被徵發如復擾動必更生患其不可一也又兗豫之人卒被徵發遠赴萬里無有還期詔書迫促必致叛亡其不可二也南州水土溫暑加有瘴氣致死亡者十必四五其不可三也遠涉萬里士卒疲勞比至領南不復堪鬬其不可四也軍行三十里為程而去日南九千餘里三百日乃到計人稟五升用米六十萬斛不計將吏驢馬之食但負甲自致費便若此其不可五也設軍到所在死亡必衆既不足禦敵當復更發此為刻割心腹以補四支其不可六也九真日南相去千里發其吏民猶尚不堪何況乃苦四州之卒以赴萬里之艱哉其不可七也前中郎將尹就討益州叛羌益州諺曰虜來尚可尹來殺我後就徵還以兵付刺史張喬喬因其將吏旬月之閒破殄寇虜此發將無益之効州郡可任之驗也宜更選有勇略仁惠任將帥者以為刺史太守悉使共住交阯今日南兵單無穀守既不足戰又不能可一切徙其吏民北依交阯事靜之後又命歸本還募蠻夷使自相攻轉輸金帛以為其資有能反閒致頭首者許以封侯列土之賞故并州刺史長沙祝良性多勇決又南陽張喬前在益州有破虜之功皆可任用昔太宗就加, WYG: 說文帝時}
