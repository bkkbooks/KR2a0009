  - {type: variant, offset: 3176, length: 0, content: '', WYG: 䝉三槐之聼以昭忠貞之心周禮朝士職三槐九棘公卿於下聼訟故曰三槐之聼書奏得以減死論是冬大赦而允獨不在宥三公咸復為言至明年乃得觧釋是時宦者横暴睚眦觸死睚音五懈反眦音士賜反前書曰原渉好殺睚眦於塵中觸死者甚多允懼不免乃變易名姓轉側河内陳留間轉側猶去来也及帝崩乃奔䘮京師時大將軍何進欲誅宦官召允與謀事請為從事中郎轉河南尹獻帝}
