  - {type: variant, offset: 19, length: 3, content: 高辛氏, WYG: 髙祖創業萬邦息肩撫飬百姓同之赤子尚書曰若保赤子惟民其康乂今二郡之民亦陛下之赤子也致令赤子為害豈非所在貪虐使其然乎宜嚴􅃯三府隐覈牧守令長其}
