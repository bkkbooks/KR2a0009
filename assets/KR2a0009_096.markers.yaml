  - {type: variant, offset: 48, length: 4, content: 將吳將軍, WYG: 勤苦耶前梁氏五侯毒徧海内五侯謂􅏷讓淑忠㦸五人與冀同時誅事見冀傳也天啓聖意収而戮之天下之議冀當小平明鑒未逺覆車如昨而近習之權復相扇結小黄門趙津大猾張汜等肆行貪虐姦媚左右前太原太守劉瓆南陽太守成瑨紏而戮之雖言赦後不當誅殺原其誠心在乎去惡至於陛下有何悁悁說文曰悁悁恚忿而小人道長營惑聖聴遂使天威為之發怒如加刑讁已為過甚况乃重罰令伏歐刄乎又前山陽太守翟超東海相黄浮奉公不撓疾惡如讎超沒侯覽財物浮誅徐宣之罪並䝉刑坐不逢赦恕覽之從横沒財已幸宣犯釁過死有餘辜昔丞相申屠嘉召責鄧通洛陽令董宣折辱公主而文帝從而請之光武加以重賞文帝時太中大夫鄧通愛幸居上旁有怠慢禮丞相申屠嘉入朝因見之為檄召通通至嘉曰通小臣戯殿上大不敬當斬通頓首首盡出血文帝使使召通而謝丞相曰吾弄臣君釋之也湖陽公主蒼}
