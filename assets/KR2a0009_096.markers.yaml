  - {type: variant, offset: 18, length: 0, content: '', WYG: 陳蕃傳陳蕃字仲舉汝南平輿人也祖河東太守蕃年十五嘗閑處一室而庭宇蕪穢父友同郡薛勤來候之謂蕃曰孺子何不洒掃以待賔客蕃曰大丈夫處世當掃除天下安事一室乎勤知其有清世志甚竒之初仕郡舉孝亷除郎中遭母憂棄官行䘮服闋刺史周景辟别駕從事續漢志曰别駕從事校尉行部奉引總録衆事以諫争不合投傳而去投棄也傳謂符也音丁戀反後公府辟舉方正皆不就太尉李固表薦徴拜議郎再遷為樂安太守續漢志曰樂安縣名夲名千乘和帝更名也時李膺為青州刺史名有威政屬城聞風皆自引去蕃獨以清績留郡人周璆髙潔之士璆音仇又巨秋反前後郡守招命莫肯至唯蕃能致焉字而不名特為置一榻去則縣之璆字孟玉臨濟人有羙名民有趙宣𦵏親而不閉埏隧埏隧今人墓道也杜預注左傳云掘地通路曰隧因居其中行服二十餘年鄉邑稱孝州郡數禮請之郡内以薦蕃蕃與相見問及妻子而宣五子皆服中所生蕃大怒曰聖人制禮賢者俯就不肖企及禮記曰三年之䘮可復父母之恩也賢者俯而就之不肖者企而及之且祭不欲數以其易黷故也黷媟也禮記曰祭不欲數數則煩煩則不敬況乃寢宿冡蔵而孕育其中誑時惑衆誣汙鬼神乎遂致其罪大將軍梁冀威震天下時遣書詣蕃有所請託不得通使者詐求謁蕃怒笞殺之坐左轉脩武令稍遷拜尚書時零陵桂陽山賊為害公卿議遣討之又詔下州郡一切皆得舉孝亷茂才蕃上疏駁之曰}
