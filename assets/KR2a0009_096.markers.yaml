  - {type: variant, offset: 1680, length: 816, content: 交阯之南有越裳國周公居攝六年制禮作樂天下和平越裳以三象重譯而獻白雉曰道路悠遠山川岨深音使不通故重譯而朝成王以歸周公公曰德不加焉則君子不饗其質政不施焉則君子不臣其人吾何以獲此賜也其使請曰吾受命吾國之黃耇曰久矣天之無烈風雷雨意者中國有聖人乎有則盍往朝之周公乃歸之於王稱先王之神致以薦于宗廟周德既衰於是稍絕及楚子稱霸朝貢百越秦并天下威服蠻夷始開領外置南海桂林象郡漢興尉佗自立為南越王傳國五世至武帝元鼎五年遂滅之分置九郡交阯刺史領焉其珠崖儋耳二郡在海洲上東西千里南北五百里其渠帥貴長耳皆穿而縋之垂肩三寸武帝末珠崖太守會稽孫幸調廣幅布獻之蠻不堪役遂攻郡殺幸幸子豹合率善人還復破之自領郡事討擊餘黨連年乃平豹遣使封還印綬上書言狀制詔即以豹為珠崖太守威政大行獻命歲至中國貪其珍賂漸相侵侮故率數歲一反元帝初元三年遂罷之凡立郡六十五歲逮王莽輔政元始二年日南之南黃支國來獻犀牛凡交阯所統雖置郡縣而言語各異重譯乃通人如禽獸長幼無別項髻徒跣以布貫頭而著之後頗徙中國罪人使雜居其閒乃稍知言語漸見禮化光武中興錫光為交阯任延守九真於是教其耕稼制為冠履初設媒娉始知姻娶建立學校導之禮義建武十二年九真徼外蠻里張游率種人慕化內屬封為歸漢里君明年南越徼外蠻夷獻白雉白菟至十六年交阯女子徵側及其妹徵貳反攻郡徵側者麊泠縣雒將之女也嫁為朱人詩索妻甚雄勇交阯太守蘇定以法繩之側忿故反於是九真日南合浦蠻里皆應之凡略六十五城自立為王交阯刺史及諸太守僅得自守光武乃詔長沙合浦交阯具車船修道橋通障谿儲糧穀十八年遣伏波將軍馬援樓船將軍段志發長沙桂陽零陵蒼梧兵萬餘人討之明年夏四月援破交阯斬徵側徵貳等餘皆降散進擊九真賊都陽等破降之徙其渠帥三百餘口於零陵於是領表悉平肅宗元和元年日南徼外蠻夷究不事人邑豪獻生犀白雉和帝永元十二年夏四月日南象林蠻夷二千餘人寇掠百姓燔燒官寺郡縣發兵討擊斬其渠帥餘衆乃降於是置象林將兵長史以防其患安帝永初元年九真徼外夜郎蠻夷舉土內屬開境千八百四十里元初二年蒼梧蠻夷反叛, WYG: ''}
