  - {type: variant, offset: 54, length: 6, content: 購黃金千鎰邑, WYG: 也前書曰君為元首臣為股肱明其一體相湏而成也伏見前司𨽻校尉李膺太僕杜宻太尉掾范滂等正身無玷死心社稷以忠忤㫖横加考案或禁錮閉隔或死徙非所杜塞天下之口聾盲一世之人與秦焚書阬儒何以為異秦始皇時丞相李斯上言曰天下已定百姓力農今諸生好古惑亂黔首臣請史官非秦記及天下敢有蔵詩書百家語者悉燒之事見史記衛宏詔定古文官書序曰秦既焚書患苦天下不從所改更而諸生到者拜為郎前後七百人乃宻令種𤓰於驪山阬谷中温處𤓰實詔博士說之人人不同乃令就視為伏機諸生賢儒皆至焉方相難不决因發機從上填之以土皆壓之終乃無聲今新豐縣温湯處號愍儒鄉湯西有馬谷西岸有阬古老相傳以為秦阬儒處也昔武王克殷表閭封墓史記武王克殷命畢公表商容之閭閎夭封比干之墓也今陛下臨政先誅忠賢遇善何薄待惡何優夫讒人似實巧言如簧詩小雅曰巧言如簧顔之厚矣簧笙簧也言䜛人之口以喻笙簧也使聼之者惑視之者昏夫吉凶之効存乎識善成敗之機在於察言人君者攝天地之政秉四海之維舉動不可以違聖法進退不可以離道規謬言出口則亂及八方何况髠無罪於獄殺無辜於市乎昔禹廵狩蒼梧見市殺人下車而哭之曰}
