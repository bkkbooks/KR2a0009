  - {type: variant, offset: 3313, length: 1, content: 居, krp: 春連雨六十餘日允與士孫瑞楊瓚登臺請霽復結前謀說文曰霽雨止也郭璞曰南陽人呼雨止曰霽瑞曰自嵗末以來太陽不照霖雨積時月犯執法執法星名史記曰太㣲南四星曰執法也彗孛仍見晝隂夜陽霧氣交侵此期應促盡内發者勝幾不可後公其圗之允然其言乃潜結卓將吕布使為内應㑹卓入賀吕布因刺殺之語在卓傳帝時疾愈故入賀也允初議赦卓部曲吕布亦數勸之既而疑曰此輩無罪從其主耳今若名為惡逆而特赦之適足使其自疑非所以安之之道也吕布又欲以卓財物班賜公卿將校允又不從而素輕布以劔客遇之布亦負其功勞多自誇伐既失意望漸不相平允性剛稜疾惡稜威稜也力登反初懼董卓豺狼故折節圗之卓既殱滅自謂無復患難及在際㑹每乏溫潤之色仗正持重不循權宜之計是以羣下不甚附之董卓將校及在位者多涼州人允議罷其軍或說允曰涼州人素憚袁氏而畏闗東今若一旦觧兵闗東則必人人自危劉攽曰今若一旦觧兵闗東案文多闗東二字可以皇甫義真為將軍就領其衆因使留陜以安撫之而徐與闗東通謀以觀其變允曰不然闗東舉義兵者皆吾徒耳今若距險屯陜雖安涼州而疑闗東之心甚不可也時百姓訛言當悉誅涼州人遂轉相恐動其在闗中者皆擁兵自守更相謂曰丁彦思蔡伯喈但以董公親厚並尚從坐今既不赦我曹而欲觧兵今日觧兵明日當復為魚肉矣卓部曲將李傕郭汜等先將兵在闗東因不自安遂合謀為亂攻圍長安城陷吕布奔走布駐馬青瑣門外前書音義曰以青畵戸邉鏤中天子制也招允曰公可以去乎允曰若蒙社稷之靈上安國家吾之願也如其不獲則奉身以死之朝廷㓜少恃我而已朝廷謂天子也臨難茍免吾不忍也努力謝闗東諸公勤以國家為念初允以同郡宋翼為左馮翊王宏為右扶}
  - {type: variant, offset: 3315, length: 0, content: '', WYG: 是時三輔民庶熾盛兵榖富實李傕等欲即殺允懼二郡為患乃先徴翼宏宏遣使謂翼曰郭汜李傕以我二人在外故未危王公今日就徴明日俱族計將安出翼曰雖禍福難量然王命所不得避也宏曰義兵鼎沸在於董卓况其黨與乎若舉兵共討君側惡人山東必應之此轉禍為福之計也翼不從宏不能獨立遂俱就徴下廷尉傕乃収允及翼宏并殺之允時年五十六長子侍中盖次子景定及宗族十餘人皆見誅害唯兄子晨陵得脫歸鄉里天子感慟百姓䘮氣莫敢収允尸者唯故吏平陵}
