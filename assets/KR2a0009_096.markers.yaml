  - {type: variant, offset: 611, length: 225, content: 險隘大寇郡縣遣武威將軍劉尚發南郡長沙武陵兵萬餘人乘船泝沅水入武谿擊之尚輕敵入險山深水疾舟船不得上蠻氏知尚糧少入遠又不曉道徑遂屯聚守險尚食盡引還蠻緣路徼戰尚軍大敗悉為所沒二十四年相單程等下攻臨沅遣謁者李嵩中山太守馬成擊之不能剋明年春遣伏波將軍馬援中郎將劉匡馬武孫永等將兵至臨沅擊破之單程等飢困乞降會援病卒謁者宗均聽悉受降為置吏司羣蠻遂平肅宗建初元年武陵澧中蠻陳從等反叛入零陽蠻界其冬零陽蠻五里精夫為郡擊破從從等皆降三年冬漊中蠻覃兒健等復反攻燒零陽作唐孱, WYG: 子逸於甘}
