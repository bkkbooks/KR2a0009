  - {type: 'tls:seg', offset: 42, content: '', id: KR2a0009_ZHSJ_096-d96p2s5}
  - {type: variant, offset: 42, length: 0, content: '', WYG: 應分土藩屏上國上象四七謂二十八宿各主諸侯之分野故曰下應分土言皆以輔王室也髙祖之約非功臣不侯而聞追錄河南尹鄧萬世父遵之微功更爵尚書令黄儁先人之絶封近習以非義授邑左右以無功𫝊賞授位不料其任裂土莫紀其功至乃一門之内侯者數人故緯象失度隂陽謬序稼用不成民用不康臣知封事已行言之無及誠欲陛下從是而止又比年収斂十傷五六萬人饑寒不聊生活而采女數千食肉衣綺脂油粉黛不可貲計貲量也鄙諺云盗不過五女門以女貧家也今後宫之女豈不貧國乎是以傾宫嫁而天下化帝王紀曰紂作傾宫多采羙女以充之武王伐殷乃歸傾宫之女於諸侯也楚女悲而西宫災公羊傳曰西宫災何休注云時僖公為齊桓所脅以齊媵為嫡楚女廢居西宫而不見恤悲愁怨曠所生且聚而不御必生憂悲之感以致并隔水旱之困夫獄以禁止姦違官以稱才理物若法虧於平官失其人則王道}
  - {type: page-break, offset: 42, content: '', id: KR2a0009_WYG_096-4a, image: WYG0253/WYG0253-0347a.png}
  - {type: variant, offset: 42, length: 0, content: '', krp: 應分土藩屏上國上象四七謂二十八宿各主諸侯之分野故曰下應分土言皆以輔王室也髙祖之約非功臣不侯而聞追錄河南尹鄧萬世父遵之微功更爵尚書令黄儁先人之絶封近習以非義授邑左右以無功𫝊賞授位不料其任裂土莫紀其功至乃一門之内侯者數人故緯象失度隂陽謬序稼用不成民用不康臣知封事已行言之無及誠欲陛下從是而止又比年収斂十傷五六萬人饑寒不聊生活而采女數千食肉衣綺脂油粉黛不可貲計貲量也鄙諺云盗不過五女門以女貧家也今後宫之女豈不貧國乎是以傾宫嫁而天下化帝王紀曰紂作傾宫多采羙女以充之武王伐殷乃歸傾宫之女於諸侯也楚女悲而西宫災公羊傳曰西宫災何休注云時僖公為齊桓所脅以齊媵為嫡楚女廢居西宫而不見恤悲愁怨曠所生且聚而不御必生憂悲之感以致并隔水旱之困夫獄以禁止姦違官以稱才理物若法虧於平官失其人則王道}
  - {type: variant, offset: 43, length: 0, content: '', WYG: 缺而令天下之論劉攽曰案文令當作今皆謂獄由怨起爵以賄成夫不有臭穢則蒼蠅不飛陛下宜採求失得擇從忠善尺一選舉委尚書三公尺一謂板長尺一以寫詔書也使褒責誅賞各有所歸豈不幸甚帝頗納其言為出宫女五百餘人但賜儁爵闗内侯而萬世南鄉侯延熹六年車駕幸廣城校獵廣城苑名在今汝州梁縣西也蕃上疏諫曰臣聞人君有事於苑囿唯仲秋西郊順時講武殺禽助祭以敦孝敬如或違此則為肆縱故臯陶戒舜無教逸遊尚書咎繇謨曰無教逸欲有邦周公戒成王無槃于遊田尚書無逸篇之言虞舜成王猶有此戒况徳不及二主者乎夫安平之時尚宜有節况當今之世有三空之戹哉田野空朝廷空倉庫空是謂三空加兵戎未戢四方離散是陛下焦心毁顔坐以待旦之時也豈宜揚旗曜武騁心輿馬之觀乎又前秋多雨民始種麥今失其勸種之時而令給驅禽除路之役非賢聖恤民之意也齊景公欲觀於海放乎琅邪晏子為陳百姓惡聞旌旗輿馬之音舉首嚬眉之感景公為之不行周穆王欲肆車轍馬跡祭公謀父為誦祈招之詩以止其心誠惡逸遊之害人也祭公祭國公為周卿士謀父名也祈招逸詩也左傳曰昔周穆王欲肆其心周行天下將皆必有車轍馬跡焉祭公謀父作祈招之詩以止王心其詩曰祈招之愔愔式昭徳音思我王度式如玉式如金刑人之力而無醉飽之心書奏不納自蕃為光禄勲與五官中郎將黄琬共典選舉不偏權富而為埶家郎所譛訴坐免歸頃之徴為尚書僕射轉太中大夫八年代楊秉為太尉蕃讓曰不愆不忘率由舊章詩大雅也言成王令徳不過誤不遺失循用舊典文章謂周公之禮法也臣不如太常胡廣齊七政訓五典臣不如議郎王暢聰明亮達文武兼姿劉攽曰案姿是姿貎此當作資也臣不如㢮刑徒李膺帝不許中常侍蘓康管霸等復被任用遂排陷忠良共相阿媚大司農劉祐廷尉馮緄音古本反河南尹李膺皆以忤㫖為之抵罪蕃因朝㑹固理膺等請加原宥升之爵任言及反覆誠辭懇切帝不聼因流涕而起時小黄門趙津南陽大猾張汜等奉事中官乘埶犯法二郡太守劉瓆成瑨考案其罪雖經赦令而並竟考殺之劉攽曰案漢魏鞠獄皆云考竟此誤宦官怨恚有司承㫖遂奏瓆瑨罪當棄市又山陽太守翟超沒入中常侍侯覽財産東海相黄浮誅殺下邳令徐宣超浮並坐髠鉗輸作左校蕃與司徒劉矩司空劉茂共諫請瓆瑨超浮等帝不悅有司劾奏之矩茂不敢復言蕃乃獨上疏曰臣聞齊桓脩霸務為内政國語曰桓公問管仲曰安國可乎對曰未可君若正卒伍修甲兵大國亦如之若欲速得志於天下諸侯則可以隠令可以寄政公曰隠令寄政若何對曰作内政而寄軍令焉春秋於魯小惡必書公羊傳莊公四年公及齊人狩于郜譏其與讐狩也僖公二十年新作南門譏其奢也故曰小惡必書也宜先自整勑後以及人今宼賊在外四支之疾内政不理心腹之患臣寢不}
