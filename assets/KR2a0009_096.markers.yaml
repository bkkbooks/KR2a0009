  - {type: variant, offset: 3254, length: 1, content: 日, WYG: 代楊彪為司徒守尚書令如故及董卓遷都闗中允悉収斂蘭臺石室圗書秘緯要者以從既至長安皆分别條上又集漢朝舊事所當施用者一皆奏之經籍具存允有力焉時董卓尚留洛陽朝政大小悉委之於允允矯情屈意每相承附卓亦推心不生乖疑故得扶持王室於危亂之中臣主内外莫不倚恃焉允見卓禍毒方深簒逆已兆宻與司隸校尉黄琬尚書鄭公業等謀共誅之乃上護羌校尉楊瓚行左將軍事執金吾士孫瑞為}
