  - {type: variant, offset: 5082, length: 1065, content: 圖緯學成還鄉里教授於是南域始有學焉珍官至荊州刺史滇王者莊蹻之後也元封二年武帝平之以其地為益州郡割牂柯越巂各數縣配之後數年復并昆明地皆以屬之此郡有池周回二百餘里水源深廣而末更淺狹有似倒流故謂之滇池河土平敞多出鸚鵡孔雀有鹽池田漁之饒金銀畜產之富人俗豪居官者皆富及累世及王莽政亂益州郡夷棟蠶若豆等起兵殺郡守越巂姑復夷人大牟亦皆叛殺略吏人莽遣寧始將軍廉丹發巴蜀吏人及轉兵穀卒徒十餘萬擊之吏士飢疫連年不能剋而還以廣漢文齊為太守造起陂池開通溉灌墾田二千餘頃率厲兵馬修障塞降集羣夷甚得其和及公孫述據益土齊固守拒險述拘其妻子許以封侯齊遂不降聞光武即位乃閒道遣使自聞蜀平徵為鎮遠將軍封成義侯於道卒詔為起祠堂郡人立廟祀之建武十八年夷渠帥棟蠶與姑復楪榆梇棟連然滇池建怜伶昆明諸種反叛殺長吏益州太守繁勝與戰而敗退保朱提十九年遣武威將軍劉尚等發廣漢犍為蜀郡人及朱提夷合萬三千人擊之尚軍遂度瀘水入益州界羣夷聞大兵至皆𠫓廾壘奔走尚獲其羸弱穀畜二十年進兵與棟蠶等連戰數月皆破之明年正月追至不韋斬棟蠶帥凡首虜七千餘人得生口五千七百人馬三千疋牛羊三萬餘頭諸夷悉平肅宗元和中蜀郡王追為太守政化尤異有神馬四匹出滇池河中甘露降白烏見始興起學校漸遷其俗靈帝熹平五年諸夷反叛執太守雍陟遣御史中丞朱龜討之不能剋朝議以為郡在邊外蠻夷喜叛勞師遠役不如𠫓廾之太尉掾巴郡李顒建策討伐乃拜顒益州太守與刺史龐芝發板楯蠻擊破平之還得雍陟顒卒後夷人復叛以廣漢景毅為太守討定之毅初到郡米斛萬錢漸以仁恩少年閒米至數十云哀牢夷者其先有婦人名沙壹居于牢山嘗捕魚水中觸沈木若有感因懷十月產子男十人後沈木化為龍出水上沙壹忽聞龍語曰若為我生子今悉何在九子見龍驚走獨小子不能去背龍而坐龍因舐之其母鳥語謂背為九謂坐為隆因名子曰九隆及後長大諸兄以九隆能為父所舐而黠遂共推以為王後牢山下有一夫一婦復生十女子九隆兄弟皆娶以為妻後漸相滋長種人皆刻畫其身象龍文衣皆著尾九隆死世世相繼乃分置小王往往邑居散在谿谷絕域荒外山川阻深生人以來未嘗交通中國建武二十三年其王賢栗遣兵乘箄船南下江漢擊附塞夷鹿茤鹿茤人弱為所禽獲於是震雷疾雨南風飄起水為逆流飜涌二百餘里箄船沈沒哀牢之衆溺死數千人賢栗復遣其六王將萬人以攻鹿茤鹿茤王與戰殺其六王哀牢耆老共埋六王夜虎復出其尸而食之餘衆驚怖引去賢栗惶恐謂其耆老曰我曹入邊塞自古有之今攻鹿茤輒被天誅中國其有聖帝乎天祐助之何其明也二十七年賢栗等遂率種人戶二千七百七十口萬七千六百五十九詣越巂太守鄭鴻降求內屬光武封賢栗等為君長自是歲來朝貢永平十二年哀牢王柳貌遣子率種人內屬其稱邑王者七十七人戶五萬一千八百, WYG: 卷}
