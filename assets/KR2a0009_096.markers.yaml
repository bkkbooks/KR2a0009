  - {type: variant, offset: 6192, length: 3053, content: 縣合為永昌郡始通博南山度蘭倉水行者苦之歌曰漢德廣開不賓度博南越蘭津度蘭倉為它人哀牢人皆穿鼻儋耳其渠帥自謂王者耳皆下肩三寸庶人則至肩而已土地沃美宜五穀蠶桑知染采文繡罽毲帛疊蘭干細布織成文章如綾錦有梧桐木華績以為布幅廣五尺絜白不受垢汙先以覆亡人然後服之其竹節相去一丈名曰濮竹出銅鐵鉛錫金銀光珠虎魄水精瑠璃軻蟲蚌珠孔雀翡翠犀象猩猩貊獸雲南縣有神鹿兩頭能食毒草先是西部都尉廣漢鄭純為政清絜化行夷貊君長感慕皆獻土珍頌德美天子嘉之即以為永昌太守純與哀牢夷人約邑豪歲輸布貫頭衣二領鹽一斛以為常賦夷俗安之純自為都尉太守十年卒官建初元年哀牢王類牢與守令忿爭遂殺守令而反叛攻越巂唐城太守王尋奔楪榆哀牢三千餘人攻博南燔燒民舍肅宗募發越巂益州永昌夷漢九千人討之明年春邪龍縣昆明夷鹵承等應募率種人與諸郡兵擊類牢於博南大破斬之傳首洛陽賜鹵承帛萬匹封為破虜傍邑侯永元六年郡徼外敦忍乙王莫延慕義遣使譯獻犀牛大象九年徼外蠻及撣國王雍由調遣重譯奉國珍寶和帝賜金印紫綬小君長皆加印綬錢帛永初元年徼外僬僥種夷陸類等三千餘口舉種內附獻象牙水牛封牛永寧元年撣國王雍由調復遣使者詣闕朝賀獻樂及幻人能變化吐火自支解易牛馬頭又善跳丸數乃至千自言我海西人海西即大秦也撣國西南通大秦明年元會安帝作樂於庭封雍由調為漢大都尉賜印綬金銀綵繒各有差也邛都夷者武帝所開以為邛都縣無幾而地陷為汙澤因名為邛池南人以為邛河後復反叛元鼎六年漢兵自越巂水伐之以為越巂郡其土地平原有稻田青蛉縣禺同山有碧鷄金馬光景時時出見俗多游蕩而喜謳歌略與牂柯相類豪帥放縱難得制御王莽時郡守枚根調邛人長貴以為軍候更始二年長貴率種人攻殺枚根自立為邛穀王領太守事又降於公孫述述敗光武封長貴為邛穀王建武十四年長貴遣使上三年計天子即授越巂太守印綬十九年武威將軍劉尚擊益州夷路由越巂長貴聞之疑尚既定南邊威法必行己不得自放縱即聚兵起營臺招呼諸君長多釀毒酒欲先以勞軍因襲擊尚尚知其謀即分兵先據邛都遂掩長貴誅之徙其家屬於成都永平元年姑復夷復叛益州刺史發兵討破之斬其渠帥傳首京師後太守巴郡張翕政化清平得夷人和在郡十七年卒夷人愛慕如喪父母蘇祈叟二百餘人齎牛羊送喪至翕本縣安漢起墳祭祀詔書嘉美為立祠堂安帝元初三年郡徼外夷大羊等八種戶三萬一千口十六萬七千六百二十慕義內屬時郡縣賦斂煩數五年卷夷大牛種封離等反畔殺遂久令明年永昌益州及蜀郡夷皆叛應之衆遂十餘萬破壞二十餘縣殺長吏燔燒邑郭剽略百姓骸骨委積千里無人詔益州刺史張喬選堪能從事討之喬乃遣從事楊竦將兵至楪榆擊之賊盛未敢進先以詔書告示三郡密徵求武士重其購賞乃進軍與封離等戰大破之斬首三萬餘級獲生口千五百人資財四千餘萬悉以賞軍士封離等惶怖斬其同謀渠帥詣竦乞降竦厚加慰納其餘三十六種皆來降附竦因奏長吏姦猾侵犯蠻夷者九十人皆減死州中論功未及上會竦病創卒張喬深痛惜之乃刻石勒銘圖畫其像天子以張翕有遺愛乃拜其子湍為太守夷人懽喜奉迎道路曰郎君儀貌類我府君後湍頗失其心有欲叛者諸夷耆老相曉語曰當為先府君故遂以得安後順桓閒廣漢馮顥為太守政化尤多異迹云莋都夷者武帝所開以為莋都縣其人皆被髮左袵言語多好譬類居處略與汶山夷同土出長年神藥仙人山圖所居焉元鼎六年以為沈黎郡至天漢四年并蜀為西部置兩都尉一居旄牛主徼外夷一居青衣主漢人永平中益州刺史梁國朱輔好立功名慷慨有大略在州數歲宣示漢德威懷遠夷自汶山以西前世所不至正朔所未加白狼槃木唐菆等百餘國戶百三十餘萬口六百萬以上舉種奉貢稱為臣僕輔上疏曰臣聞詩云彼徂者岐有夷之化傳曰岐道雖僻而人不遠詩人誦詠以為符驗今白狼王唐菆等慕化歸義作詩三章路經邛來大山零高坂峭危峻險百倍岐道繈負老幼若歸慈母遠夷之語辭意難正草木異種鳥獸殊類有犍為郡掾田恭與之習狎頗曉其言臣輒令訊其風俗譯其辭語今遣從事史李陵與恭護送詣闕并上其樂詩昔在聖帝舞四夷之樂今之所上庶備其一帝嘉之事下史官錄其歌焉遠夷樂德歌詩曰大漢是治堤官隗搆與天合意魏冒踰糟吏譯平端罔驛劉脾不從我來旁莫支留聞風向化微衣隨旅所見奇異知唐桑艾多賜贈繒布邪毗甘美酒食推潭僕遠昌樂肉飛拓拒蘇使便屈申悉備局後仍離蠻夷貧薄僂讓龍洞無所報嗣莫支度由願主長壽陽雒僧鱗子孫昌熾莫穉角存遠夷慕德歌詩曰蠻夷所處僂讓皮尼日入之部且交陵悟慕義向化繩動隨旅歸日出主路旦揀雒聖德深恩聖德渡諾與人富厚魏菌度洗冬多霜雪綜邪流藩夏多和雨莋邪尋螺寒溫時適藐潯瀘灕部人多有菌補邪推涉危歷險辟危歸險不遠萬里莫受萬柳去俗歸德術疊附德心歸慈母仍路孳摸遠夷懷德歌曰荒服之外荒服之儀土地墝埆犂籍憐憐食肉衣皮阻蘇邪犁不見鹽穀莫碭麤沐吏譯傳風罔譯傳微大漢安樂是漢夜拒攜負歸仁蹤優路仁觸冒險陜雷折險龍高山岐峻倫狼藏幢緣崖磻石扶路側祿木薄發家息落服淫百宿到洛理歷髭雒父子同賜捕茝菌毗懷抱匹帛懷匹漏傳告種人傳室呼敕長願臣僕陵陽臣僕肅宗初輔坐事免是時郡尉府舍皆有雕飾畫山神海靈奇禽異獸以眩燿之夷人益畏憚焉和帝永元十二年旄牛徼外白狼樓薄蠻夷王唐繒等遂率種人十七萬口歸義內屬詔賜金印紫綬小豪錢帛各有差安帝永初元年蜀郡三襄種夷與徼外汙衍種并兵三千餘人反叛攻蠶陵城殺長吏二年青衣道夷邑長令田與徼外三種夷三十一萬口齎黃金旄牛毦舉土內屬安帝增令田爵號為奉通邑君延光二年春旄牛夷叛攻零關殺長吏益州刺史張喬與西部都尉擊破之於是分置蜀郡屬國都尉領四縣如太守桓帝永壽二年蜀郡夷叛殺略吏民延熹二年蜀郡三襄夷寇蠶陵殺長吏四年犍為屬國夷寇郡界益州刺史山昱擊破之斬首千四百級餘皆解散靈帝時以屬蜀郡蜀屬國為漢嘉郡冉駹夷者武帝所開元鼎六年以為汶山郡至地節三年夷人以立郡賦重宣帝乃省并蜀郡為北部都尉其山有六夷七羌九氐各有部落其王侯頗知文書而法嚴重貴婦人黨母族死則燒其尸土氣多寒在盛夏冰猶不釋故夷人冬則避寒入蜀為傭夏則違暑反其衆聚邑皆依山居止累石為室高者至十餘丈為邛籠又土地剛鹵不生穀粟麻菽唯以麥為資而宜畜牧有旄牛無角一名童牛肉重千斤毛可為毦出名馬有靈羊可療毒又有食藥鹿鹿麑有胎者其腸中糞亦療毒疾又有五角羊麝香輕毛毼雞牲牲其人能作旄氈班罽青頓毞毲羊羧之屬特多雜藥地有鹹土以為鹽麡羊牛馬食之皆肥其西又有三河槃于虜北有黃石北地盧水胡其表乃為徼外靈帝時復分蜀郡北部為汶山郡云白馬氐者武帝元鼎六年時分廣漢西部合以為武都土地險阻有麻田出名馬牛羊漆蜜氐人勇戇抵冒貪貨死利居於河池一名仇池方百傾四面斗絕數為邊寇郡縣討之則依固自守元封三年氐人反叛遣兵破之分徙酒泉郡昭帝元鳳元年氐人復叛遣執金吾馬適建龍侯韓增大鴻臚田廣明將三輔太常徒討破之及王莽篡亂氐人亦叛建武初氐一悉附隴蜀及隗囂滅其酋豪乃背公孫述降漢隴西太守馬援上復其王侯君長賜以印綬後囂放人隗茂反殺武都太守氐人大豪齊鍾留為種類所敬信威服諸豪與郡丞孔奮擊茂破斬之後亦時為寇盜郡縣討破之論曰漢氏征伐戎狄有事邊遠蓋亦與王業而終始矣至於傾沒疆垂喪師敗將者不出時歲卒能開四夷之境發殊俗之附若乃文約之所沾漸風聲之所周流幾將日所出入處也著自山經水志者亦略及焉雖服叛難常威澤時曠及其化行則緩耳雕腳之倫獸居鳥語之類莫不舉種盡落回面而請吏陵海越障累譯以內屬焉故其錄名中郎校尉之署編數都護部守之曹動以數百萬計若乃藏山隱海之靈物沈沙棲陸之瑋寶莫不呈表怪麗雕被宮幄焉又其賨幏火毳馴禽封獸之賦軨積於內府夷歌巴舞殊音異節之技列倡於外明豈柔服之道必足於斯然亦云致遠者矣蠻夷雖附阻巖谷而類有土居連涉荊交之區布護巴庸之外不可量極然其凶勇狡筭薄於羌狄故陵暴之害不能深也西南之徼尤為劣焉故關守永昌肇自遠離啟土立人至今成都焉贊曰百蠻蠢居仞彼方徼鏤體卉衣憑深阻峭亦有別夷屯彼蜀表參差聚落紆餘岐道往化既孚改襟輸寶俾建永昌同編億兆, WYG: 考證}
  - {type: variant, offset: 6192, length: 3053, content: 縣合為永昌郡始通博南山度蘭倉水行者苦之歌曰漢德廣開不賓度博南越蘭津度蘭倉為它人哀牢人皆穿鼻儋耳其渠帥自謂王者耳皆下肩三寸庶人則至肩而已土地沃美宜五穀蠶桑知染采文繡罽毲帛疊蘭干細布織成文章如綾錦有梧桐木華績以為布幅廣五尺絜白不受垢汙先以覆亡人然後服之其竹節相去一丈名曰濮竹出銅鐵鉛錫金銀光珠虎魄水精瑠璃軻蟲蚌珠孔雀翡翠犀象猩猩貊獸雲南縣有神鹿兩頭能食毒草先是西部都尉廣漢鄭純為政清絜化行夷貊君長感慕皆獻土珍頌德美天子嘉之即以為永昌太守純與哀牢夷人約邑豪歲輸布貫頭衣二領鹽一斛以為常賦夷俗安之純自為都尉太守十年卒官建初元年哀牢王類牢與守令忿爭遂殺守令而反叛攻越巂唐城太守王尋奔楪榆哀牢三千餘人攻博南燔燒民舍肅宗募發越巂益州永昌夷漢九千人討之明年春邪龍縣昆明夷鹵承等應募率種人與諸郡兵擊類牢於博南大破斬之傳首洛陽賜鹵承帛萬匹封為破虜傍邑侯永元六年郡徼外敦忍乙王莫延慕義遣使譯獻犀牛大象九年徼外蠻及撣國王雍由調遣重譯奉國珍寶和帝賜金印紫綬小君長皆加印綬錢帛永初元年徼外僬僥種夷陸類等三千餘口舉種內附獻象牙水牛封牛永寧元年撣國王雍由調復遣使者詣闕朝賀獻樂及幻人能變化吐火自支解易牛馬頭又善跳丸數乃至千自言我海西人海西即大秦也撣國西南通大秦明年元會安帝作樂於庭封雍由調為漢大都尉賜印綬金銀綵繒各有差也邛都夷者武帝所開以為邛都縣無幾而地陷為汙澤因名為邛池南人以為邛河後復反叛元鼎六年漢兵自越巂水伐之以為越巂郡其土地平原有稻田青蛉縣禺同山有碧鷄金馬光景時時出見俗多游蕩而喜謳歌略與牂柯相類豪帥放縱難得制御王莽時郡守枚根調邛人長貴以為軍候更始二年長貴率種人攻殺枚根自立為邛穀王領太守事又降於公孫述述敗光武封長貴為邛穀王建武十四年長貴遣使上三年計天子即授越巂太守印綬十九年武威將軍劉尚擊益州夷路由越巂長貴聞之疑尚既定南邊威法必行己不得自放縱即聚兵起營臺招呼諸君長多釀毒酒欲先以勞軍因襲擊尚尚知其謀即分兵先據邛都遂掩長貴誅之徙其家屬於成都永平元年姑復夷復叛益州刺史發兵討破之斬其渠帥傳首京師後太守巴郡張翕政化清平得夷人和在郡十七年卒夷人愛慕如喪父母蘇祈叟二百餘人齎牛羊送喪至翕本縣安漢起墳祭祀詔書嘉美為立祠堂安帝元初三年郡徼外夷大羊等八種戶三萬一千口十六萬七千六百二十慕義內屬時郡縣賦斂煩數五年卷夷大牛種封離等反畔殺遂久令明年永昌益州及蜀郡夷皆叛應之衆遂十餘萬破壞二十餘縣殺長吏燔燒邑郭剽略百姓骸骨委積千里無人詔益州刺史張喬選堪能從事討之喬乃遣從事楊竦將兵至楪榆擊之賊盛未敢進先以詔書告示三郡密徵求武士重其購賞乃進軍與封離等戰大破之斬首三萬餘級獲生口千五百人資財四千餘萬悉以賞軍士封離等惶怖斬其同謀渠帥詣竦乞降竦厚加慰納其餘三十六種皆來降附竦因奏長吏姦猾侵犯蠻夷者九十人皆減死州中論功未及上會竦病創卒張喬深痛惜之乃刻石勒銘圖畫其像天子以張翕有遺愛乃拜其子湍為太守夷人懽喜奉迎道路曰郎君儀貌類我府君後湍頗失其心有欲叛者諸夷耆老相曉語曰當為先府君故遂以得安後順桓閒廣漢馮顥為太守政化尤多異迹云莋都夷者武帝所開以為莋都縣其人皆被髮左袵言語多好譬類居處略與汶山夷同土出長年神藥仙人山圖所居焉元鼎六年以為沈黎郡至天漢四年并蜀為西部置兩都尉一居旄牛主徼外夷一居青衣主漢人永平中益州刺史梁國朱輔好立功名慷慨有大略在州數歲宣示漢德威懷遠夷自汶山以西前世所不至正朔所未加白狼槃木唐菆等百餘國戶百三十餘萬口六百萬以上舉種奉貢稱為臣僕輔上疏曰臣聞詩云彼徂者岐有夷之化傳曰岐道雖僻而人不遠詩人誦詠以為符驗今白狼王唐菆等慕化歸義作詩三章路經邛來大山零高坂峭危峻險百倍岐道繈負老幼若歸慈母遠夷之語辭意難正草木異種鳥獸殊類有犍為郡掾田恭與之習狎頗曉其言臣輒令訊其風俗譯其辭語今遣從事史李陵與恭護送詣闕并上其樂詩昔在聖帝舞四夷之樂今之所上庶備其一帝嘉之事下史官錄其歌焉遠夷樂德歌詩曰大漢是治堤官隗搆與天合意魏冒踰糟吏譯平端罔驛劉脾不從我來旁莫支留聞風向化微衣隨旅所見奇異知唐桑艾多賜贈繒布邪毗甘美酒食推潭僕遠昌樂肉飛拓拒蘇使便屈申悉備局後仍離蠻夷貧薄僂讓龍洞無所報嗣莫支度由願主長壽陽雒僧鱗子孫昌熾莫穉角存遠夷慕德歌詩曰蠻夷所處僂讓皮尼日入之部且交陵悟慕義向化繩動隨旅歸日出主路旦揀雒聖德深恩聖德渡諾與人富厚魏菌度洗冬多霜雪綜邪流藩夏多和雨莋邪尋螺寒溫時適藐潯瀘灕部人多有菌補邪推涉危歷險辟危歸險不遠萬里莫受萬柳去俗歸德術疊附德心歸慈母仍路孳摸遠夷懷德歌曰荒服之外荒服之儀土地墝埆犂籍憐憐食肉衣皮阻蘇邪犁不見鹽穀莫碭麤沐吏譯傳風罔譯傳微大漢安樂是漢夜拒攜負歸仁蹤優路仁觸冒險陜雷折險龍高山岐峻倫狼藏幢緣崖磻石扶路側祿木薄發家息落服淫百宿到洛理歷髭雒父子同賜捕茝菌毗懷抱匹帛懷匹漏傳告種人傳室呼敕長願臣僕陵陽臣僕肅宗初輔坐事免是時郡尉府舍皆有