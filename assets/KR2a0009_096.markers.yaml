  - {type: variant, offset: 61, length: 1, content: 家, WYG: 方有罪在予一人故其興也勃焉說苑曰禹見罪人下車泣而問之左右曰夫罪人不順故使殺焉君王何為痛之至此也禹曰堯舜之人皆以堯舜之心為心今寡人為君也百姓各自以其心是以痛之書曰百姓有罪在予一人左傳曰禹湯罪已其興也勃焉桀紂罪人其亡也忽焉杜預注曰勃盛也}
