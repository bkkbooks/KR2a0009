  - {type: variant, offset: 259, length: 246, content: 母後歸以狀白帝於是使迎致諸子衣裳班蘭語言侏離好入山壑不樂平曠帝順其意賜以名山廣澤其後滋蔓號曰蠻夷外癡內黠安土重舊以先父有功母帝之女田作賈販無關梁符傳租稅之賦有邑君長皆賜印綬冠用獺皮名渠帥曰精夫相呼為姎徒今長沙武陵蠻是也其在唐虞與之要質故曰要服夏商之時漸為邊患逮于周世黨衆彌盛宣王中興乃命方叔南伐蠻方詩人所謂蠻荊來威者也又曰蠢爾蠻荊大邦為讎明其黨衆繁多是以抗敵諸夏也平王東遷蠻遂侵暴上國晉文侯輔政乃率蔡共侯擊破之至楚武王時蠻與羅子共敗楚師殺其將屈瑕莊王初立民飢兵弱復為所寇楚師既振然後乃服自是遂, WYG: 家}
