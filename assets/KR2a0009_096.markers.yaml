  - {type: variant, offset: 1206, length: 330, content: 漊中蠻果爭貢布非舊約遂殺鄉吏舉種反叛明年春蠻二萬人圍充城八千人寇夷道遣武陵太守李進討破之斬首數百級餘皆降服進乃簡選良吏得其情和在郡九年梁太后臨朝下詔增進秩二千石賜錢二十萬桓帝元嘉元年秋武陵蠻詹山等四千餘人反叛拘執縣令屯結深山至永興元年太守應奉以恩信招誘皆悉降散永壽三年十一月長沙蠻反叛屯益陽至延熹三年秋遂抄掠郡界衆至萬餘人殺傷長吏又零陵蠻入長沙冬武陵蠻六千餘人寇江陵荊州刺史劉度謁者馬睦南郡太守李肅皆奔走肅主簿胡爽扣馬首諫曰蠻夷見郡無儆備故敢乘閒而進明府為國大臣連城千里舉旄鳴鼓應聲十萬柰何委符守之重而為逋逃之人乎肅拔刃向爽曰掾促去太守今急何暇此計爽抱馬固諫肅遂殺爽而走帝聞之徵肅𠫓廾巿度睦減死一等復爽門閭拜家一人為郎於是以右校令度尚為荊州刺史討長沙賊平之又遣, WYG: 常侍}
