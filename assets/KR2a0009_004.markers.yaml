  - {type: variant, offset: 1504, length: 0, content: '', WYG: 乃上書諫曰臣聞上不以滋味為徳下不以貢膳為功故天子食太牢為尊不以果實為珍伏見交阯七郡獻生龍眼等鳥驚風發南州土地惡蟲猛獸不絶}
