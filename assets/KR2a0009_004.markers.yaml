  - {type: variant, offset: 902, length: 144, content: 明涉道日寡又選舉乖實俗吏傷人官職秏亂刑罰不中可不憂與昔仲弓季氏之家臣子游武城之小宰孔子猶誨以賢才問以得人明政無大小以得人為本夫鄉舉里選必累功勞今刺史守相不明真偽茂才孝廉歲以百數既非能顯而當授之政事甚無謂也每尋前世舉人貢士或起甽畝不繫閥閱敷奏以言則文章可採明試以功則政有異迹文質彬彬朕甚嘉之, WYG: 逮}
