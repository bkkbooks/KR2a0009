  - {type: variant, offset: 86, length: 0, content: '', krp: 乙亥以侍中竇憲爲車騎將軍伐北匈奴安息國遣使獻師子扶拔扶拔解見章帝紀永元元年春三月甲辰初令郎官詔除者得占丞尉以比秩爲真漢官儀曰羽林郎出補三百石丞尉自占丞尉小縣丞尉三百石其次四百石比秩為真皆所以優之劉攽曰案文云丞尉小縣三百石其次四百石已足不當更有丞尉字夏六月車騎將軍竇憲出雞鹿塞今在朔方窳渾縣北闞駰十三州志云窳渾縣有大道西北出雞鹿塞窳音羊主反度遼將軍鄧鴻出棝楊塞棝楊縣屬九原郡故城在今勝州銀城縣界棝音固南單于出滿夷谷滿夷谷關與北匈奴戰于稽落山大破之追至和渠北鞮海竇憲遂登燕然山刻石勒功而還北單于遣弟右温禺鞮王鞮音}
