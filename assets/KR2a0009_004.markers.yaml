  - {type: variant, offset: 1408, length: 0, content: '', WYG: 丁丑帝幸東觀覽書林閲篇籍博選術蓺之士以充其官二月任城王尚薨丙午賑貸張掖居延朔方日南貧民及孤寡羸弱不能自存者秋八月詔象林民失農桑業者賑貸種糧稟賜下貧榖食}
