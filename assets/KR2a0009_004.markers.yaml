  - {type: variant, offset: 422, length: 188, content: 烝庶為憂不以天下為樂備三雍之教躬養老之禮作登歌正予樂博貫六蓺不舍晝夜聰明淵塞著在圖讖至德所感通於神明功烈光於四海仁風行於千載而深執謙謙自稱不德無起寑廟埽地而祭除日祀之法省送終之禮遂藏主於光烈皇后更衣別室天下聞之莫不悽愴陛下至孝烝烝奉順聖德臣愚以為更衣在中門之外處所殊別宜尊廟曰顯宗其四時禘祫於光武之堂閒祀悉還更衣共進武德之舞如孝文皇帝祫祭高廟故事制曰可是歲牛疫京師及三州大旱詔, WYG: 上}
