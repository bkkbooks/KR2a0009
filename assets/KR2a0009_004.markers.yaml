  - {type: variant, offset: 81, length: 2, content: 節陵, WYG: 相清廟文王廟也於穆嘆羙之詞言助祭者禮儀敬且和也請上尊廟曰肅宗共進武德之舞制曰可癸亥陳王羡彭城王恭樂成王黨下邳王衍梁王暢始就國建初三年章帝不忍與諸王乖離皆留京師今遣之國夏四月丙子謁髙廟丁丑謁世祖廟戊寅詔曰昔孝武皇帝致誅胡越故權收鹽鐵之利武帝使孔僅東郭咸陽乘傳舉行天下鹽鐵作官府收利私家更不得鑄鐵煮鹽以奉師旅之費自中興以來匈奴未賔永平末年復修征伐先帝即位務休力役然猶深思遠慮安不忘危探觀舊典復收鹽鐵欲以防備不虞寜安邊境而吏多不良動失其便以違上意先帝恨之故遺戒郡國罷鹽鐵之禁縱民煮鑄入稅縣官如故事前書音義曰縣官謂天子其申勅刺史二千石奉順聖㫖勉𢎞徳化布告天下使明知朕意五月京師旱詔長樂少府桓郁侍講禁中長樂宮之少府也郁桓榮子也}
