  - {type: variant, offset: 1101, length: 0, content: '', WYG: 長縣長相侯相也十三州志云縣侯邑則令長為相秩随令長本秩五月辛卯改千乗國為樂安國千乗故城在今淄州高苑縣北樂安故城在今青州博昌縣南六月丙寅沛王定薨秋七月乙巳易陽地裂易陽縣在易水之陽今易州也九月癸卯京師地震八年春二月己丑立貴人隂氏為皇后賜天下男子爵人二級三老孝悌力田三級民無名數及流民欲占者一級鰥寡孤獨篤癃貧不能自存者粟人五斛夏四月癸亥樂成王黨薨甲子詔賑貸幷州四郡貧民五月河丙陳留蝗南匈奴右温禺犢王叛為寇秋七月行度遼將軍龎奮劉攽曰亦少一事字九年行征西將軍劉尚下亦同越騎校尉馮柱追討之斬右温禺犢王車師後王叛擊其前王八月辛酉飲酎詔郡國中都官繫囚減死一等詣敦煌戍其犯大逆募下蠶室其女子宮自死罪已下至司寇及亡命者入贖各有差九月京師蝗吏民言事者多歸責有司詔曰蝗蟲之異殆不虚生禮記月令曰孟夏行春令則蝗蟲為災洪範五行傳曰貪利傷人則蝗蟲損稼萬方有罪在予一人而言事者專咎自下非助我者也朕寤寐恫矜思弭憂釁尚書曰恫矜乃身孔安國注曰恫痛也矜病也言如痛病在身欲除之也矜音古頑反昔楚嚴無災而懼解見明紀成王出郊而反風成王疑周公天乃大風禾則盡偃王乃出郊祭天乃反風起禾事見尚書將何以匡朕不逮以塞災變百僚師尹勉修厥職刺史二千石詳刑辟理寃虐恤鰥寡矜孤弱思惟致災興蝗之咎庚子復置廣陽郡髙帝時燕國也昭帝元鳳元年為廣陽郡宣帝本始元年更為國也冬十月乙丑北海王威有罪自殺北海郡今青州縣十二月辛亥陳王羡薨丁巳南宫宣室殿火九年春正月永昌徼外蠻夷及撣國重譯奉貢撣音擅東觀記作擅俗本以禪字相類或作禪者誤也説文曰譯所以傳四夷之語也三月庚辰隴西地震癸巳濟南王康薨西域長史王林擊車師後王斬之夏四月丁卯封樂成王黨子廵為樂成王六月蝗旱戊辰詔今年秋稼為蝗蟲所傷皆勿收租更芻槀若有所損失以實除之餘當收租者亦半入其山林饒利陂池漁採以贍元元勿收假税秋七月蝗蟲飛過京師八月鮮卑寇肥如肥如縣屬遼西郡前書音義曰肥子奔燕封於此今平州也遼東太守祭參下獄死東觀記曰鮮卑千餘騎攻肥如城殺略吏人祭參坐沮敗下獄誅閏月辛巳皇太后竇氏崩丙申葬章徳皇后燒當羌寇隴西殺長吏遣行征西將軍劉向越騎校尉趙世等討破之九月庚申司徒劉方䇿免自殺甲子追尊皇妣梁貴人為皇太后冬十月乙酉改葬恭懷梁皇后于西陵謚法曰正徳羙容曰恭執義揚善曰懷東觀記曰改殯承光宮儀比敬園初后葬有闕竇后崩後乃議改葬十一月癸卯光禄勲河南呂蓋為司徒蓋字君玉宛陵人也十二月丙寅司空張奮罷壬申太僕韓稜為司空己丑復置若盧獄官前書曰若盧獄屬少府漢舊儀曰主鞫將相大臣也十年春三月壬戌詔曰隄防溝渠所以順助地理通利壅塞禮記月令曰季春之月修理隄防導逹溝瀆開通道路無有障塞今廢慢懈㢮不以為負刺史二千石其随宜疏導勿因縁妄發以為煩擾將顯行其罰夏五月京師大水東觀記曰京師大雨南山水流出至東郊壊人廬舍秋七月己巳司空韓稜薨八月丙子太常太山巢堪為司空堪字次朗太山南城人九月庚戌復置廪犧官漢官儀曰廩犧令一人秩六百石也冬十月五州雨水十二月燒當羌豪迷唐等率種人詣闕貢獻戊寅梁王暢薨十一年春二月遣使循行郡國稟貸被災害不能自存者令得漁采山林池澤不收假税丙午詔郡國中都官徒及篤癃老小女徒各除半刑其未竟三月者皆免歸田里夏四月丙寅大赦天下己巳復置右校尉官東觀記曰置在西河鵠澤縣秋七月辛卯詔曰吏民踰僣厚死傷生是以舊令節之制度頃者貴戚近親百僚師尹莫肯率從有司不舉怠放日甚又商賈小民或忘法禁竒巧靡貨流積公行其在位犯者當先舉正市道小民但且申明憲綱勿因科令加虐羸弱十二年春二月旄牛徼外白狼貗薄夷率種人内屬闞駰十三州志曰旄牛縣屬蜀郡前書曰旄牛所出歲貢其尾以為節旄詔貸被災諸郡民種糧賜下貧鰥寡孤獨不能自存者及郡國流民聽入陂池漁采以助蔬食三月丙申詔曰比年不登百姓虛匱匱乏也京師去冬無宿雪以其經冬故言宿也今春無澍雨黎民流離困於道路朕痛心疾首靡知所濟瞻仰昊天何辜今人詩大雅周宣王遇旱之詩言今人何罪而天令饑饉乎三公朕之腹心而未獲承天安民之策數詔有司務擇良吏今猶不改競為苛暴侵愁小民以求虚名委任下吏假埶行邪是以令下而姦生禁至而詐起董仲舒曰法出而奸生令下而詐起巧法析律飾文増辭禮記王制曰析言破律也貨行於言罪成乎手朕甚病焉公卿不思助明好惡將何以救其咎罰咎罰旣至復令災及小民若上下同心庶或有瘳其賜天下男子爵人二級三老孝悌力田三級民無名數及流民欲占者人一級鰥寡孤獨篤癃貧不能自存者粟人三斛壬子賜博士員弟子在太學者布人三匹武帝時置博士弟子太常擇人年十八以上儀狀端正者補焉昭帝増員滿百人宣帝倍之元帝更設員千人成帝更増員三千人夏四月日南象林蠻夷反象林縣屬日南郡今鬱林縣郡兵討破之閏月賑貸敦煌張掖五原民下貧者榖戊辰秭歸山崩秭歸縣屬南郡古之䕫國今歸州也袁山松曰屈原此縣人旣被流放忽然蹔歸其姊亦来因名其地為秭歸秭亦姊也東觀記曰秭歸山高四百餘丈崩填谿水壓殺百餘人六月舞陽大水賜被水災尤貧者榖人三斛}
