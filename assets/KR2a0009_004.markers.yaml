  - {type: variant, offset: 864, length: 2, content: 山陽, WYG: 遣使者分行貧民舉實流宂宂㪚也流㪚者舉案其實而給之開倉賑稟三十餘郡夏四月壬子封阜陵王种兄魴為阜陵王种無嗣故以魴襲也六月丁酉郡國三雨雹}
  - {type: page-break, offset: 864, content: '', id: KR2a0009_WYG_004-10a, image: WYG0252/WYG0252-0099a.png}
  - {type: variant, offset: 864, length: 2, content: 山陽, krp: 遣使者分行貧民舉實流宂宂㪚也流㪚者舉案其實而給之開倉賑稟三十餘郡夏四月壬子封阜陵王种兄魴為阜陵王种無嗣故以魴襲也六月丁酉郡國三雨雹}
