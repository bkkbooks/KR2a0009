  - {type: variant, offset: 3799, length: 596, content: 也諸以前妖惡禁錮者一皆蠲除之以明𠫓廾咎之路但不得在宿衞而已二年春正月乙酉詔曰令云人有產子者復勿筭三歲今諸懷者賜胎養穀人三斛復其夫勿筭一歲著以為令又詔三公曰方春生養萬物莩甲宜助萌陽以育時物其令有司罪非殊死且勿案驗及吏人條書相告不得聽受冀以息事寧人敬奉天氣立秋如故夫俗吏矯飾外貌似是而非揆之人事則悅耳論之陰陽則傷化朕甚饜之甚苦之安靜之吏悃愊無華日計不足月計有餘如襄城令劉方吏人同聲謂之不煩雖未有它異斯亦殆近之矣閒勑二千石各尚寬明而今富姦行賂於下貪吏枉法於上使有罪不論而無過被刑甚大逆也夫以苛為察以刻為明以輕為德以重為威四者或興則下有怨心吾詔書數下冠蓋接道而吏不加理人或失職其咎安在勉思舊令稱朕意焉二月甲寅始用四分歷詔曰今山川鬼神應典禮者尚未咸秩其議增修羣祀以祈豐年丙辰東巡狩己未鳳皇集肥城乙丑帝耕於定陶詔曰三老尊年也孝悌淑行也力田勤勞也國家甚休之其賜帛人一匹勉率農功使使者祠唐堯於成陽靈臺辛未幸太山柴告岱宗有黃鵠三十從西南來經祠壇上東北過于宮屋翺翔升降進幸奉高壬申宗祀五帝于汶上明堂癸酉告祠二祖四宗大會外內羣臣丙子詔曰朕巡狩岱宗柴望山川告祀明堂以章先勳其二王之後先聖之胤東后蕃衞伯父伯兄仲叔季弟幼子童孫百僚從臣宗室衆子要荒四裔沙漠之北葱領之西冒耏之類跋涉懸度陵踐阻絕駿奔郊畤咸來助祭祖宗功德延及朕躬予一人空虛多疚纂承尊明盥洗享薦慙愧祗慄詩不云乎君子如祉亂庶遄已歷數既從靈燿著明亦欲與士大夫同心自新, WYG: ''}
