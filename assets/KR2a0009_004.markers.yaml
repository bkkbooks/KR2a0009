  - {type: variant, offset: 1438, length: 0, content: '', WYG: 丁酉司空巢堪罷十一月癸卯大司農徐防為司空是歲初復郡國上計補郎官上計今計吏也前書音義曰舊制使郡丞奉歲計武帝元朔中令郡國舉孝廉各一人與計偕拜為郎中中廢今復之十五年春閏月乙未詔流民欲還歸本而無糧食者過所實稟之疾病加致醫藥其不欲還歸者勿強二月詔稟貸潁川汝南陳留江夏梁國敦煌貧民前書音義曰陳留本鄭邑後為陳所并故曰陳留今汴州縣也江夏郡高帝置沔水自江别至南郡華容為夏水過郡入江故曰江夏夏四月甲子晦日有食之五月戊寅南陽大風六月詔令百姓鰥寡漁采陂池勿收假税二歲秋七月丙寅濟南王錯薨錯音七故反復置涿郡故鹽鐵官續漢書曰其郡縣有鹽官鐵官者随事廣狹置令長及丞秩次皆如縣也九月壬午南廵狩清河王慶濟北王壽河間王開竝從}
  - {type: page-break, offset: 1438, content: '', id: KR2a0009_WYG_004-20b, image: WYG0252/WYG0252-0104b.png}
  - {type: variant, offset: 1438, length: 0, content: '', krp: 丁酉司空巢堪罷十一月癸卯大司農徐防為司空是歲初復郡國上計補郎官上計今計吏也前書音義曰舊制使郡丞奉歲計武帝元朔中令郡國舉孝廉各一人與計偕拜為郎中中廢今復之十五年春閏月乙未詔流民欲還歸本而無糧食者過所實稟之疾病加致醫藥其不欲還歸者勿強二月詔稟貸潁川汝南陳留江夏梁國敦煌貧民前書音義曰陳留本鄭邑後為陳所并故曰陳留今汴州縣也江夏郡高帝置沔水自江别至南郡華容為夏水過郡入江故曰江夏夏四月甲子晦日有食之五月戊寅南陽大風六月詔令百姓鰥寡漁采陂池勿收假税二歲秋七月丙寅濟南王錯薨錯音七故反復置涿郡故鹽鐵官續漢書曰其郡縣有鹽官鐵官者随事廣狹置令長及丞秩次皆如縣也九月壬午南廵狩清河王慶濟北王壽河間王開竝從}
  - {type: variant, offset: 1439, length: 0, content: '', WYG: 所過二千石長吏以下三老官屬及民百年者錢布各有差是秋四州雨水冬十月戊申幸章陵祠舊宅癸丑祠園廟㑹宗室於舊廬勞賜作樂戊午進幸雲夢臨漢水而還雲夢今安州縣也即在雲夢澤中十一月甲申軍駕還宮賜從臣及留者公卿以下錢布各有差十二月庚子琅邪王宇薨有司奏以為夏至則微隂起靡草死可以決小事禮記月令曰孟夏之月靡草死麥秋至斷薄刑決小罪鄭𤣥注云靡草薺亭歴之屬臣賢案五月一隂爻生可以言微隂今月令云孟夏乃是純陽之月此言夏至者與月令不同是歲初令郡國以日北至案薄刑十六年春正月己卯詔貧民有田業而以匱乏不能自農者貸種糧二月己未詔兖豫徐冀四州比年雨多傷稼禁沽酒夏四月遣三府掾分行四州貧民無以耕者為雇犂牛直五月壬午趙王商薨秋七月旱戊午詔曰今秋稼方穂而旱雲雨不霑疑吏行慘刻不宣恩澤妄拘無罪幽閉良善所致其一切囚徒於法疑者勿決以奉秋令禮記月令曰孟秋之月命有司修法制繕囹圄具桎梏斷薄刑決小罪方察煩苛之吏顯明其罰辛酉司徒魯恭免庚午光禄勲張酺為司徒辛巳詔令天下皆半入今年田租芻槀其被災害者以實除之貧民受貸種糧及田租芻槀皆勿收責八月己酉司徒張酺薨十月辛卯司空徐防為司徒大鴻臚陳寵為司空十一月己丑行幸緱氏登百岯山即柏岯山也在洛州緱氏縣南爾雅云山一成曰岯東觀記作坯竝音平眉反流俗本或作柸者誤也賜百官從臣布各有差北匈奴遣使稱臣貢獻十二月復置遼東西部都尉官西部都尉安帝時以為屬國都尉在遼東郡昌黎城也元興元年春正月戊午引三署郎召見禁中漢官儀三署謂五官署也左右署也各置中郎將以司之郡國舉孝廉以補三署郎年五十以上屬五官其次分在左右署凡有中郎議郎侍郎郎中四等無員禁中者門户有禁非侍御者不得入故謂禁中選除七十五人補謁者長相髙句驪寇郡界夏四月庚午大赦天下改元元興宗室以罪絶者悉復屬籍五月癸酉雍地裂東觀記曰右扶風雍地裂流俗本雍下有州者誤也秋九月遼東太守耿夔擊貊人破之冬十二月辛未帝崩于章徳前殿年二十七立皇子隆為皇太子賜天下男子}
