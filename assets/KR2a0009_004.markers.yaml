  - {type: variant, offset: 88, length: 0, content: '', WYG: 㑹稽山崩閠月丙子詔曰匈奴背叛爲害乆遠頼祖宗之靈師克有㨗醜虜破碎遂掃厥庭詩曰仍執醜虜庭謂單于所常居也役不再籍猶言不籍再舉萬里清蕩非朕小子𦕈身所能克堪有司其案舊典告類薦㓛以章休烈類祭天也書曰類于上帝薦進也以功進告于天九月庚申以車騎將軍竇憲爲大將軍以中郎將劉尚爲車騎將軍冬十月令郡國㢮刑輸作軍營其徙出塞者劉攽曰案遷徙者不可投之塞外明此徙字是從字刑雖未竟皆免歸田里庚子阜陵王延薨是嵗郡國九大水二年春正月丁丑}
