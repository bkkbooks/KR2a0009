  - {type: variant, offset: 4767, length: 409, content: 王者生殺宜順時氣其定律無以十一月十二月報囚九月壬辰詔鳳皇黃龍所見亭部無出二年租賦加賜男子爵人二級先見者帛二十匹近者三匹太守三十匹令長十五匹丞尉半之詩云雖無德與汝式歌且舞它如賜爵故事丙申徵濟南王康中山王焉會烝祭冬十一月壬辰日南至初閉關梁三年春正月乙酉詔曰蓋君人者視民如父母有憯怛之憂有忠和之教匍匐之救其嬰兒無父母親屬及有子不能養食者稟給如律丙申北巡狩濟南王康中山王焉西平王羨六安王恭樂成王黨淮陽王昞任城王尚沛王定皆從辛丑帝耕于懷二月壬寅告常山魏郡清河鉅鹿平原東平郡太守相曰朕惟巡狩之制以宣聲教考同遐解釋怨結也今四國無政不用其良駕言出游欲親知其劇易前祠園陵遂望祀華霍東祡岱宗為人祈福今將禮常山遂徂北土歷魏郡經平原升踐隄防詢訪耆老咸曰往者汴門未作深者成淵淺則泥塗追惟先帝勤人之德底績遠圖復禹弘業聖跡滂流至于海表不克堂桓構朕甚慙焉月令孟春善相丘陵土地所宜今肥田尚多未有墾闢其悉以賦貧民給與糧種務盡地力勿令游手所過縣邑聽半入今年, WYG: 除}
  - {type: variant, offset: 4767, length: 409, content: 王者生殺宜順時氣其定律無以十一月十二月報囚九月壬辰詔鳳皇黃龍所見亭部無出二年租賦加賜男子爵人二級先見者帛二十匹近者三匹太守三十匹令長十五匹丞尉半之詩云雖無德與汝式歌且舞它如賜爵故事丙申徵濟南王康中山王焉會烝祭冬十一月壬辰日南至初閉關梁三年春正月乙酉詔曰蓋君人者視民如父母有憯怛之憂有忠和之教匍匐之救其嬰兒無父母親屬及有子不能養食者稟給如律丙申北巡狩濟南王康中山王焉西平王羨六安王恭樂成王黨淮陽王昞任城王尚沛王定皆從辛丑帝耕于懷二月壬寅告常山魏郡清河鉅鹿平原東平郡太守相曰朕惟巡狩之制以宣聲教考同遐解釋怨結也今四國無政不用其良駕言出游欲親知其劇易前祠園陵遂望祀華霍東祡岱宗為人祈福今將禮常山遂徂北土歷魏郡經平原升踐隄防詢訪耆老咸曰往者汴門未作深者成淵淺則泥塗追惟先帝勤人之德底績遠圖復禹弘業聖跡滂流至于海表不克堂桓構朕甚慙焉月令孟春善相丘陵土地所宜今肥田尚多未有墾闢其悉以賦貧民給與糧種務盡地力勿令游手所過縣邑聽半入今年, krp: 除}
