  - {type: variant, offset: 1078, length: 0, content: '', WYG: 昭巖穴披幽隱遣詣公車前書音義曰公車署名也公車所在故以名焉漢官儀曰公車令一人秩六百石掌殿門諸上書詣闕下者皆集奏之凡所徴召亦總領之朕将悉聽焉帝乃親臨䇿問選補郎吏}
