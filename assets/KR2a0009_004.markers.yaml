  - {type: variant, offset: 3464, length: 333, content: 政失和元元未諭抵罪於下寇賊爭心不息邊野邑屋不修永惟庶事思稽厥衷與凡百君子共弘斯道中心悠悠將何以寄其改建初九年為元和元年郡國中都官繫囚減死一等勿笞詣邊縣妻子自隨占著在所其犯殊死一切募下蠶室其女子宮繫囚鬼薪白粲以上皆減本罪一等輸司寇作亡命者贖各有差丁酉南巡狩詔所經道上郡縣無得設儲跱命司空自將徒支柱橋梁有遣使奉迎探知起居二千石當坐其賜魚眾寡孤獨不能自存者粟人五斛九月乙未東平王忠薨辛丑幸章陵祠舊宅園廟見宗室故人賞賜各有差冬十月己未進幸江陵詔廬江太守祠南嶽又詔長沙零陵太守祠長沙定王舂陵節侯鬱林府君還幸宛十一月己丑車駕還宮賜從者各有差十二月壬子詔曰書云父不慈子不祗兄不友弟不恭不相及也往者妖言大獄所及廣遠一人犯罪禁至三屬莫得垂纓仕宦王朝如有賢才而沒齒無用朕甚憐之非所謂與之, WYG: 民}
