  - {type: variant, offset: 867, length: 3, content: 平地震, WYG: 觀記曰大如鴈子秋九月辛酉廣宗王萬嵗薨無子國除匈奴單于於除鞬叛遣中郎將任尚討滅之壬午令郡縣勸民蓄蔬食以助五榖蓄積也其官有陂池令得采取勿收假税二嵗假猶租賃冬十月辛未太尉尹睦薨漢官儀曰睦字伯師鞏人十一月乙丑太僕張酺為太尉是歲武陵郡兵破叛蠻降之䕶羌校尉貫友討燒當羌羌乃遁去南單于安國叛骨都侯喜斬之六年春正月永昌徼外夷遣使譯獻犀牛大象}
