  - {type: variant, offset: 2601, length: 243, content: 豈亡克慎肅雍之臣辟公之相皆助朕之依依今賜公錢四十萬卿半之及百官執事各有差九月甲戌幸偃師東涉卷津至河內下詔曰車駕行秋稼觀收穫因涉郡界皆精騎輕行無它輜重不得輒修道橋遠離城郭遣吏逢迎刺探起居出入前後以為煩擾動務省約但患不能脫粟瓢飲耳所過欲令貧弱有利無違詔書遂覽淇園己酉進幸鄴勞饗魏郡守令已下至于三老門闌走卒賜錢各有差勞賜常山趙國吏人復元氏租賦三歲辛卯車駕還宮詔天下繫囚減死一等勿笞詣邊戍妻子自隨占著所在父母同產欲相從者恣聽之有不到者皆以乏軍興論及犯殊死一切募下蠶室其女子宮繫囚鬼薪白粲已上皆減, WYG: ''}
