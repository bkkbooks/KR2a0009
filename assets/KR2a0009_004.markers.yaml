  - {type: variant, offset: 1819, length: 774, content: 中元元朱書五經章句煩多議欲減省至永平元年長水校尉鯈奏言先帝大業當以時施行欲使諸儒共正經義頗令學者得以自助孔子曰學之不講是吾憂也又曰博學而篤志切問而近思仁在其中矣於戲其勉之哉於是下太常將大夫博士議郎郎官及諸生諸儒會白虎觀講議五經同異使五官中郎將魏應承制問侍中淳于恭奏帝親稱制臨決如孝宣甘露石渠故事作白虎議奏是歲甘露降泉陵洮陽二縣五年春二月庚辰朔日有食之詔曰朕新離供養愆咎衆著上天降異大變隨之詩不云乎亦孔之醜又久旱傷麥憂心慘切公卿已下其舉直言極諫能指朕過失者各一人遣詣公車將親覽問焉其以巖穴為先勿取浮華甲申詔曰春秋書無麥苗重之也去秋雨澤不適今時復旱如炎如焚兇年無時而為備未至朕之不德上累三光震慄忉忉痛心疾首前代聖君博思咨諏雖降災咎輒有開匱反風之應令予小子徒慘慘而已其令二千石理冤獄錄輕繫禱五嶽四瀆及名山能興雲致雨者冀蒙不崇朝徧雨天下之報務加肅敬焉三月甲寅詔曰孔子曰刑罰不中則人無所措手足今吏多不良行喜怒或案不以罪迫脅無辜致令自殺者一歲且多於斷獄甚非為人父母之意也有司其議糾舉之荊豫諸郡兵討破武陵漊中叛蠻夏五月辛亥詔曰朕思直士側席異聞其先至者各以發憤吐懣略聞子大夫之志矣皆欲置於左右顧問省納建武詔書又曰堯試臣以職不直以言語筆札今外官多曠並可以補任戊辰太傅趙憙薨冬始行月令迎氣樂是歲零陵獻芝草有八黃龍見於泉陵西域假司馬班超擊疏勒破之六年春二月辛卯琅邪王京薨夏五月辛酉趙王盱薨六月丙辰太尉鮑昱薨辛未晦日有食之秋七月癸巳以大司農鄧彪為太尉七年春正月沛王輔濟南王康東平王蒼中山王焉東海王政琅邪王宇來朝夏六月甲寅廢皇太子慶為清河王立皇子為皇太子己未徙廣平王羨為西平王秋八月飲酎高廟禘祭光武皇帝孝明皇帝甲辰詔曰書云祖考來假明哲之祀予末小子質又菲薄仰惟先帝烝烝之情前修禘祭以盡孝敬朕得識昭穆之序寄遠祖之思今年大禮復舉加以先帝之坐悲傷感懷樂以迎來哀以送往雖祭亡如在而空虛, WYG: ''}
