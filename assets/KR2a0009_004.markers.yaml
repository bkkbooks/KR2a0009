  - {type: variant, offset: 622, length: 232, content: 穀賑給貧人建初元年春正月詔三州郡國方春東作恐人稍受稟往來煩劇或妨耕農其各實覈尤貧者計所貸并與之流人欲歸本者郡縣其實稟令足還到聽過止官亭無雇舍宿長吏親躬無使貧弱遺脫小吏豪右得容姦妄詔書既下勿得稽留刺史明加督察尤無狀者丙寅詔曰比年牛多疾疫墾田減少穀價頗貴人以流亡方春東宜及時務二千石勉勸農桑弘致勞來羣公庶尹各推精誠專急人事罪非殊死須立秋案驗有司明慎選舉進柔良退貪猾順時令理冤獄五教在寬帝典所美愷悌君子大雅所歎布告天下使明知朕意酒泉太守段彭討擊車師大破之罷戊己校尉官二月, WYG: 損除也}
