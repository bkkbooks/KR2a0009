  - {type: variant, offset: 1417, length: 5, content: 靈臺望雲物, WYG: 而多不均浹深惟四民農食之本慘然懷矜其令天下半入今年田租芻槀有宜以實除者如故事貧民假種食皆勿收責冬十一月安息國遣使獻師子及條枝大爵西域傳曰安息國居和犢城去洛陽二萬五千里條枝國臨西海出師子大雀郭義恭廣志曰大爵頸及身膺蹄都似槖駝舉頸髙八九尺張翅丈餘食大麥其卵如甕即今之駝鳥也丙辰詔曰幽幷涼州户口率少邊役衆劇束修良吏進仕路狹撫接夷狄以人為本其令緣邊郡口十萬以上歲舉孝廉一人不滿十萬二歲舉一人五萬以下三歲舉一人鮮卑寇右北平遂入漁陽漁陽太守擊破之戊辰司徒呂蓋罷十二月丁丑光禄勲魯恭為司徒辛卯巫蠻叛寇南郡巫縣屬南郡故城在今䕫州巫山縣也十四年春二月乙卯東海王政薨繕修故西海郡平帝時金城塞外羌獻地以為西海郡也光武建武中省金城入隴西郡至是復繕修之金城即今蘭州縣也徙金城西部都尉以戍之三月戊辰臨辟雍饗射}
  - {type: page-break, offset: 1417, content: '', id: KR2a0009_WYG_004-19a, image: WYG0252/WYG0252-0103c.png}
