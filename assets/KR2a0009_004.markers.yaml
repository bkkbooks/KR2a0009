  - {type: variant, offset: 80, length: 0, content: '', WYG: 敬陵在洛陽城東南三十九里古今注曰陵周三百歩髙六丈二尺庚戌皇太后詔曰先帝以明聖奉承祖宗至德要道天下清靜庶事咸寜今皇帝以㓜年㷀㷀在疚疚病也㷀㷀然在憂病之中也㷀或作嬛詩周頌云嬛嬛在疚朕且佐助聴政外有大國賢王竝爲藩屏内有公卿大夫綂理本朝恭已受成夫何憂哉孔子曰舜何為哉恭已正南面而已尚書曰予小子垂拱仰成然守文之際必有内輔以參聴斷侍中憲朕之元兄行能兼備忠孝尤篤先帝所器親受遺詔當以舊典輔斯職焉憲固執謙讓節不可奪今供養兩宫兩宫謂帝宫太后宫宿衞左右厥事已重亦不可復勞以政事故太尉鄧彪元功之族三讓彌髙元功謂髙密侯禹也彪父邯中興初有功封鄳侯父卒彪譲國異母弟鳳論語孔子曰太伯三以天下譲民無得而稱焉鄭𤣥注云太伯周太王之長子欲譲其弟季歴大王有疾太伯因適吳越採藥太王薨而不返季歴為喪主一譲也季歴赴之不來奔喪二譲也終喪之後遂斷髪文身三譲也彪譲封弟故以比之鄳音莫杏反海内歸仁爲羣賢首先帝襃表欲以崇化今彪聰明康彊可謂老成黃耇矣老成言老而有成徳也詩大雅曰雖無老成人黄謂髪落更生黄者耇亦老也詩序曰外尊事黄耇其以彪爲太傅賜爵關内侯錄尚書事百官總已以聴古者君在諒闇百官總已之職事以聼於冢宰錄尚書事則冢宰之任也朕庶幾得專心内位於戲羣公其勉率百僚各修厥職愛養元元綏以中和稱朕意焉辛酉有司上奏孝章皇帝崇𢎞鴻業徳化普洽垂意黎民留念稼穡文加殊俗武暢方表界惟人面無思不服巍巍蕩蕩莫與比隆巍巍乎其有成功蕩蕩乎人無能名焉孔子羙帝堯之辭見論語周頌曰於穆清廟肅雝}
