  - {type: variant, offset: 95, length: 0, content: '', WYG: 及粟帛各有差大酺五日郡國中都官繫囚死罪贖縑至司冦及亡命各有差庚辰賜京師民酺布兩户共一匹二月大將軍竇憲遣左校尉耿夔出居延塞居延縣屬張掖郡居延澤在東北武帝使伏波將軍路博徳築遮虜障於居延城圍北單于於金微山大破之獲其母閼氏閼氏匈奴后之號也音焉支夏六月辛夘尊太后母比陽公主東海恭王彊女爲長公主辛丑阜陵王种薨阜陵王延之子冬十月癸未行幸長安詔曰北狄破滅名王仍降仍頻也西域諸國納質内附豈非祖宗廸哲重光之鴻烈歟廸蹈也言由祖宗蹈履明智有重光累聖之徳成此大業也書曰兹四}
