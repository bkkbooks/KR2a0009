  - {type: variant, offset: 1428, length: 2, content: 癸巳, WYG: 辛卯廢皇后隂氏后父特進綱自殺秋七月甲寅詔復象林縣更賦田租芻槀二歲壬子常山王側薨是秋三州雨水冬十月甲申詔兖豫荆州今年水雨淫過多傷農功其令被害什四以上皆半入田租芻槀其不滿者以實除之辛卯}
