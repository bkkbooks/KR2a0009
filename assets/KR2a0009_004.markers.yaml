  - {type: variant, offset: 1480, length: 9, content: 斛夏奶諵巳罷常山呼, WYG: 里一候南海郡秦置今廣州縣也廣雅曰益智龍眼也交州記曰龍眼樹髙五六丈似荔支而小廣州記曰子似荔支而圓七月熟荔支樹高五六丈大如桂樹實如雞子甘而多汁似安}
