  - {type: variant, offset: 92, length: 0, content: '', WYG: 二月壬午日有蝕之東觀記曰史官不覺涿郡言之己亥復置西河上郡屬國都尉官前書西河郡羙稷縣上郡龜兹縣竝有屬國都尉其秩比二千石十三州志日典屬國武帝置掌納匈奴降者也哀帝省并大鴻臚故今復置之夏五月庚戌分太山爲濟北國分樂成涿郡勃海爲河間國丙辰封皇弟壽爲濟北王開爲河間王淑爲城陽王紹封故淮陽王昞子側爲常山王賜公卿以下至佐史錢布各有差己未遣副校尉閻磐討北匈奴取伊吾盧地丁卯紹封故齊王晃子無忌爲齊王北海王睦子威爲北海王車師前後王竝遣子入侍車師有後王前王前王即後王之子其庭相去五百里月氐國遣兵攻西域長史班超超擊降之六月辛卯中山王焉薨秋七月乙卯大將軍竇憲出屯涼州九月北匈奴遣使稱臣冬十月遣行中郎將班固報命南單于遣左谷蠡王師子左谷蠡匈奴王號師子其名也谷音鹿蠡音離出雞鹿塞擊北匈奴于河雲北大破之三年春正月甲子皇帝加元服元首也謂加冠於首儀禮冠者先筮日後筮賔東觀記曰時太后詔袁安為賔賜束帛乗馬賜諸侯王公將軍特進漢官儀曰諸侯功徳優盛朝廷所敬異者賜位特進在三公下中二千石列侯宗室子孫在京師奉朝請者黃金奉朝請無員三公外戚宗室諸侯多奉朝請漢律春曰朝秋曰請將大夫郎吏從官帛將謂五官及左右郎將也大夫謂光禄太中中散諫議大夫也十三州志曰大夫皆掌顧問應對言議夫之言扶也言能扶持君父也}
