  - {type: variant, offset: 1505, length: 4, content: 臨洮閏月, WYG: 路至於觸犯死亡之害死者不可復生來者猶可救也此二物升殿未必延年益夀帝從之章報羌即棄官還家不應徵召著唐子三十餘篇論曰自中興以後逮於永元雖頗有㢮張而俱存不擾是以齊民歲増闢土世廣偏師出塞則漠北地空都䕶西指則通譯四萬}
