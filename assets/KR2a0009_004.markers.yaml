  - {type: variant, offset: 860, length: 0, content: '', WYG: 燒當羌寇金城五年春正月乙亥宗祀五帝於明堂遂登靈臺望雲物大赦天下戊子千乘王伉薨辛卯封皇弟萬嵗爲廣宗王廣宗縣名今貝州宗城縣隋煬帝諱廣故改為宗城二月戊戌詔有司省減内外廐及涼州諸苑馬說文曰廐馬舍也漢官儀曰未央大廐長樂承華等廐令皆秩六百石又云牧帥諸苑六十六所分置西北邊分養馬三十萬頭自京師離宮果園上林廣成囿悉以假貧民恣得采捕不收其税丁未詔曰去年秋麥入少恐民食不足其上尤貧不能自給者户口人數往者郡國上貧民以衣履釡鬵爲貲而豪右得其饒利鬵音尋方言曰甑自關而東謂之鬵貧人旣計釡甑以為資財懼於役重多即賣之以避科税豪富之家乘賤買故得其饒利詔書實覈説文云覈考實事也欲有以益之而長吏不能躬親反更徵召㑹聚令失農作愁擾百姓若復有犯者二千石先坐甲寅太傅鄧彪薨戊午隴西地震}
  - {type: page-break, offset: 860, content: '', id: KR2a0009_WYG_004-8b, image: WYG0252/WYG0252-0098b.png}
  - {type: page-break, offset: 860, content: '', id: KR2a0009_WYG_004-9a, image: WYG0252/WYG0252-0098c.png}
  - {type: variant, offset: 860, length: 0, content: '', krp: 燒當羌寇金城五年春正月乙亥宗祀五帝於明堂遂登靈臺望雲物大赦天下戊子千乘王伉薨辛卯封皇弟萬嵗爲廣宗王廣宗縣名今貝州宗城縣隋煬帝諱廣故改為宗城二月戊戌詔有司省減内外廐及涼州諸苑馬說文曰廐馬舍也漢官儀曰未央大廐長樂承華等廐令皆秩六百石又云牧帥諸苑六十六所分置西北邊分養馬三十萬頭自京師離宮果園上林廣成囿悉以假貧民恣得采捕不收其税丁未詔曰去年秋麥入少恐民食不足其上尤貧不能自給者户口人數往者郡國上貧民以衣履釡鬵爲貲而豪右得其饒利鬵音尋方言曰甑自關而東謂之鬵貧人旣計釡甑以為資財懼於役重多即賣之以避科税豪富之家乘賤買故得其饒利詔書實覈説文云覈考實事也欲有以益之而長吏不能躬親反更徵召㑹聚令失農作愁擾百姓若復有犯者二千石先坐甲寅太傅鄧彪薨戊午隴西地震}
  - {type: variant, offset: 862, length: 1, content: 甲, WYG: 戊子詔曰選舉良才爲政之本科别行能必由鄉曲周禮鄉大夫掌其鄉之政敎考其徳行察其道藝三年而舉賢能者於王而郡國舉吏不加簡擇故先帝明敇在所令試之以職乃得充選漢官儀曰建初八年十二月己未詔書辟士四科其一曰徳行髙妙志節清白二曰經明行修能任博士三曰明曉法律足以決疑能案章覆問才任御史四曰剛毅多略遭事不惑明足照姦勇足決斷才任三輔令皆存孝悌清公不行自今以後審四科辟召及刺史二千石察舉茂才尤異孝廉吏務實校試以職有非其人不習曹事正舉者故不以實法也又徳行尤異不須經職者别署狀上而宣布以來出入九年二千石曽不承奉恣心從好司隸刺史訖無紏察訖竟也今新蒙赦令且復申勅後有犯者顯明其罰在位不以選舉為憂督察不以發覺為負負亦憂也非獨州郡也是以庶官多非其人下民被姦邪之傷由法不行故也庚}
  - {type: page-break, offset: 862, content: '', id: KR2a0009_WYG_004-9b, image: WYG0252/WYG0252-0098d.png}
