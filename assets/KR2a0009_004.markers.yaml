  - {type: variant, offset: 1409, length: 7, content: 酉宗祀明堂禮畢, WYG: 亥北宮盛饌門閣火䕶羌校尉周鮪擊燒當羌破之荆州雨水九月壬子詔曰荆州比歲不節今兹淫水為害淮南子曰女媧積蘆灰以止滛水髙誘注云平地水出為滛水餘雖頗}
