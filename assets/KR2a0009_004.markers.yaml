  - {type: variant, offset: 5386, length: 415, content: 乙丑幸安邑觀鹽池九月至自安邑冬十月北海王基薨燒當羌叛寇隴西是歲西域長史班超擊斬疏勒王章和元年春三月護羌校尉傅育追擊叛羌戰歿夏四月丙子令郡國中都官繫囚減死一等詣金城戍六月戊辰司徒桓虞免癸卯司空袁安為司徒光祿勳任隗為司空秋七月癸卯齊王晃有罪貶為蕪湖侯壬子淮陽王昞薨鮮卑擊破北單于斬之燒當羌寇金城護羌校尉劉盱討之斬其渠帥壬戌詔曰朕聞明君之德啟迪鴻化緝熙康光照六幽訖惟人面靡不率俾仁風翔于海表威霆行乎鬼區然後敬恭明祀膺五福之慶獲來儀之貺朕以不德受祖宗弘烈乃者鳳皇仍集麒麟並臻甘露宵降嘉穀滋生芝草之類歲月不絕朕夙夜祗畏上天無以彰于先功今改元和四年為章和元年秋令是月養衰老授几杖行糜粥飲食其賜高年二人共布帛各一匹以為醴酪死罪囚犯法在丙子赦前而後捕繫者皆減死勿笞詣金城戍八月癸酉南巡狩壬午遣使者祠昭靈后於小黃園甲申徵任城王弧睢陽戊子幸梁己丑遣使祠沛高原廟豐枌榆社乙未幸沛祠獻王陵徵會東海王政乙未晦日有食之九月庚子幸彭城東海王政沛王定任城王尚皆從, WYG: ''}
