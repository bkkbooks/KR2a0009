  - {type: variant, offset: 72, length: 2, content: 壬戌, WYG: 太后臨朝三月丁酉改淮陽爲陳國今陳州楚郡爲彭城國今徐州西平幷汝南郡西平縣故柏子國也在今豫州吳房縣西北六安復爲廬江郡即今廬州廬江縣西故舒城是遺詔徙西平王羡爲陳王六安王恭爲彭城王癸卯}
