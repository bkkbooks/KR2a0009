  - {type: variant, offset: 2845, length: 614, content: 罪各一等輸司寇作亡命贖死罪入縑二十匹右趾至髡鉗城旦舂十匹完城旦至司寇三匹吏人有罪未發覺詔書到自告者半入贖冬十月癸丑西巡狩幸長安丙辰祠高廟遂有事十一陵遣使者祠太上皇於萬年以中牢祠蕭何霍光進幸槐里岐山得銅器形似酒罇獻之又獲白鹿帝曰上無明天子下無賢方伯人之無良相怨一方斯器亦曷為來哉又幸長平御池陽宮東至高陵造舟於涇而還每所到幸輒會郡縣吏人勞賜作樂十一月詔勞賜河東守令掾以下十二月丁亥車駕還宮是歲京師及郡國螟八年春正月壬辰東平王蒼薨三月辛卯葬東平憲王賜鑾輅龍旂夏六月北匈奴大人率衆款塞降冬十二月甲午東巡狩幸陳留梁國淮陽潁陽戊申車駕還宮詔曰五經剖判去聖彌遠章句遺辭乖疑難正恐先師微言將遂廢絕非所以重稽古求道真也其令羣儒選高才生受學左氏穀梁春秋古文尚書毛詩以扶微學廣異義焉是歲京師及郡國螟元和元年春正月中山王焉來朝日南徼外蠻夷獻生犀白雉閏月辛丑濟陰王長薨二月甲戌詔曰王者八政以食為本故古者急耕稼之業致耒耜之勤節用儲蓄以備凶災是以歲雖不登而人無飢色自牛疫已來穀食連少良由吏教未至刺史二千石不以為負其令郡國募人無田欲徙它界就肥饒者恣聽之到在所賜給公田為雇耕傭賃種貰與田器勿收租五歲除筭三年其後欲還本鄉者勿禁夏四月己卯分東平國封憲王蒼子帕陞糮陘六月辛酉沛王輔薨秋七月丁未詔曰律云掠者唯得榜笞立又令丙箠長短有數自往者大獄已來掠考多酷鉆鑽之屬慘苦無極念其痛毒怵然動心書曰鞭作官刑豈云若此宜及秋冬理獄明為其禁八月甲子太尉鄧彪罷大司農鄭弘為太尉癸酉詔曰朕, WYG: ''}
