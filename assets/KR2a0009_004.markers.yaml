  - {type: variant, offset: 1153, length: 206, content: 延謀反貶為阜陵侯二年春三月辛丑詔曰比年陰陽不調肌饉屢臻深惟先帝憂人之本詔書曰不傷財不害人誠欲元元去末歸本而今貴戚近親奢縱無度嫁聚送終尤為僭侈有司廢典莫肯舉察春秋之義以貴理賤今自三公並宜明糾非法宣振威風朕在弱冠未知稼穡之艱難區區管窺豈能照一隅哉其科條制度所宜施行在事者備為之禁先京師而後諸夏甲辰罷伊吾盧屯兵永昌越巂益州三郡民夷討哀牢破平之夏四月戊子詔還坐楚淮陽事徙者四百餘家令歸本郡癸巳詔齊相省冰紈方空縠吹綸絮六月, WYG: 金印紫綬是歲}
