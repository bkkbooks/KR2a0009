  - {type: variant, offset: 4462, length: 199, content: 孔男女帛壬辰進幸東平祠憲王陵甲午遣使者祠定陶太后恭王陵乙未幸東阿北登太行山至天井關夏四月乙巳客星入紫宮乙卯車駕還宮庚申假于祖禰告祠高廟五月戊申詔曰乃者鳳皇黃龍鸞鳥比集七郡或一郡再見及白烏神雀甘露屢臻祖宗舊事或班恩施其賜天下吏爵人三級高年魚眾寡孤獨帛人一匹經曰無侮魚眾寡惠此煢獨加賜河南女子百戶牛酒令天下大酺五日賜公卿已下錢帛各有差及洛陽人當酺者布戶一匹城外三戶共一匹賜博士員弟子見在太學者布人三匹令, WYG: 官府}
