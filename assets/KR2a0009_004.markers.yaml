  - {type: variant, offset: 1084, length: 0, content: '', krp: 令伏閉盡日漢官舊儀曰伏日萬鬼行故盡日閉不干它事秋七月京師旱詔中都官徒各除半刑讁其未竟五月已下皆免遣丁巳幸洛陽寺寺官舍也風俗云云寺嗣也理事之吏嗣續於其中錄囚徒舉寃獄收洛陽令下獄抵罪司隸校尉河南尹皆左降未及還宫而澍雨西域都䕶班超大破焉耆尉犁斬其王自是西域降服納質者五十餘國南單于安國從弟子逢侯率叛胡亡出塞九月癸丑以光禄勲鄧鴻行車騎將軍事與越騎校尉馮柱行度遼將軍朱徽劉攽曰案文少一事字使匈奴中郎將杜崇討之冬十一月䕶烏桓校尉任尚率烏桓鮮卑大破逢侯闞駰十三州志曰䕶烏桓擁節秩比二千石武帝置以䕶内附烏桓旣而并於匈奴中郎將中興初班彪上言宜復此官以招附東胡乃復更置焉馮柱遣兵追擊復之劉攽曰案文少一破字詔以渤海郡屬冀州武陵漊中蠻叛郡兵討平之七年春正月行車騎將軍鄧鴻劉攽曰案文亦少一事字度遼將軍朱徽中郎將杜崇皆下獄死時南單于安國與崇不相平乃上書告崇崇令斷其章縁此驚叛安國卒見殺帝後知之皆徵下獄夏四月辛亥朔日有食之帝引見公卿問得失令將大夫御史謁者博士議郎郎官㑹廷中各言封事十三州志曰侍御史周官即柱下史秩六百石掌注記言行紏諸不法員十五人出有所案則稱使者焉謁者秦官也員七十人皆選孝廉年未五十曉解儐贊者歲盡拜縣令長史及都官府丞長史博士秦官博通古今秩皆六百石孝武初置五經博士後稍増至十四員取聰明威重一人為祭酒主領焉議郎郎官皆秦官也宂無所掌秩六百石或四百石劉攽曰注嵗盡拜縣令長史及都官府丞長史案文多一史字若是王國長史則當并守丞言之明此但是令長耳下文又自有長史也詔曰元首不明化流無良政失於民讁見于天讁譴也責也禮曰陽事不得譴讁見于天日為之食深惟庶事五敎在寛是以舊典因孝廉之舉以求其人武帝元光元年董仲舒初開其議詔郡國}
