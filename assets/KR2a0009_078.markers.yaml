  - {type: variant, offset: 12, length: 0, content: '', krp: 三十八楊終傳楊終字子山蜀郡成都人也年十三為郡小吏太守竒其才遣詣京師受業習春秋袁山松書曰時蜀郡有雷震决曹終上白記以為斷獄煩苛所致太守乃令終賦雷電之意而竒之顯宗時徴詣蘭臺拜校書郎建初元年大旱榖貴終以為廣陵楚淮陽濟南之獄徙者萬數又逺屯絶域吏民怨曠乃上疏曰臣聞善善及子孫惡惡止其身百王常典不易之道也春秋昭公二十年曹公孫會自鄸出奔宋公羊傳曰畔也曷為不言畔為公子喜時之後諱也春秋為賢者諱也何賢乎公子喜時譲國也君子善善也長惡惡也短惡惡止其身善善及子孫賢者子孫故君子為之諱秦政酷烈違牾天心一人有罪延及三族前書音義曰父族母族妻族也高祖平亂約法三章太宗至仁除去收孥太宗文帝也史記曰文帝徳至盛也豈不仁哉除去收拏相坐之律也萬姓廓然䝉被更生澤及昆蟲功垂萬世陛下聖明徳被四表今以比年久旱災疫未息災字或作牛疫病也躬自菲薄廣訪失得三代之隆無以加焉臣竊按春秋水旱之變皆應暴急惠不下流自永平以來仍連大獄有司窮考轉相牽引掠拷寃濫家屬徙邊加以北征匈奴西開三十}
  - {type: variant, offset: 13, length: 0, content: '', WYG: 國頻年服役轉輸煩費又逺屯伊吾樓蘭車師戊巳民懐土思怨結邊域傳曰安土重居謂之衆庶元帝詔曰安土重遷黎人之性也昔殷人近遷洛邑且猶怨望尚書盤庚序曰盤庚五遷將治亳殷人咨胥怨亳今河南偃師故曰近遷洛邑何况去中土之肥饒寄不毛之荒極乎毛草也爾雅曰觚竹北户西王母日下謂之四荒又曰東至於泰逺西至於邠國南至於濮鈆北至於祝栗謂四極言不毛荒極直論逺耳非必此地也之且南方暑濕障毒互生愁困之民足以感動天地移變隂陽矣陛下留念省察以濟元元書奏肅宗下其章司空第五倫亦同終議太尉牟融司徒鮑昱校書郎班固等難倫以施行既久孝子無改父之道先帝所建不宜回異終復上書曰秦築長城功役繁興胡亥不革卒亡四海故孝元棄珠崖之郡光武絶西域之國不以介鱗易我衣裳元帝初元三年珠崖郡反待詔賈捐之以為宜棄珠崖救人飢餓乃罷珠崖郡光武二十一年鄯善車師王等十六國皆遣子入侍請都護帝以中國初定未遑外事還其侍子厚加賞賜介鱗喻逺夷言其人與魚鼈無異也衣裳謂中國也楊雄法言曰珠崖之絶捐之之力也否則鱗介易我衣裳魯文公毁泉臺春秋譏之曰先祖為之而已毁之不如勿居而已以其無妨害於民也公羊傳曰毁泉臺何以書譏爾築之譏毁之譏先祖為之而已毁之勿居而已也襄公作三軍昭公舍之君子大其復古以為不舍則有害於民也公羊傳曰襄公十一年作三軍三軍者何三卿也昭公五年傳曰舍中軍舍中軍者何復古也言舍之與留量時制宜也今伊吾之役樓蘭之屯久而未還非天意也帝從之聼還徙者悉罷邊屯終又言宣帝博徴羣儒論定五經於石渠閣方今天下少事學者得成其業而章句之徒破壊大體宜如石渠故事永為後世則於是詔諸儒於白虎觀論考同異焉會終坐事繋獄博士趙博校書郎班固賈逵等以終深曉春秋學多異聞表請之終又上書自訟即日貰出乃得與於白虎觀焉與音預後受詔刪太史公書為十餘萬言時太后兄衛尉馬廖謹篤自守不訓諸子終與廖交善以書戒之曰終聞堯舜之民可比屋而封桀紂之民可比屋而誅事見陸賈新語何者堯舜為之隄防桀紂示之驕奢故也詩曰皎皎練絲在所染之逸詩曰皎皎白貌也墨子曰墨子見染絲者歎曰染於蒼則蒼染於黄則黄故染不可不慎也上智下愚謂之不移中庸之流要在教化春秋殺太子母弟直稱君甚惡之者坐失教也公羊傳曰晉侯殺其太子申生曷為直稱晉侯曰以殺其太子母弟直稱君者甚之也劉攽曰注稱晉侯曰以殺其太子案今文當云曷為直稱晉侯以殺其太子禮制人君之子年八嵗為置少傅教之書計以開其明大戴禮曰古者八嵗出就外舍學小蓺焉履小節焉又曰為置三少曰少保少傅少師是與太子宴者也禮記内則曰十年出就外傅居宿於外學書記也十五置太傅教之經典以道其志漢興諸侯王不力教誨多觸禁忌故有亡國之禍而乏嘉善之稱今君位地尊重海内所望豈可不臨深履薄以為至戒黄門郎年㓜血氣方盛廖子防及光俱為黄門郎孔子曰及其壯也血氣方剛戒之在鬬也既無長君退讓之風文帝竇后兄長君弟廣國字少君此兩人所出微絳灌等選長者之有節行者與之居長君少君由此為退讓君子不敢以富貴驕人也而要結輕狡無行之客縱而莫誨視成任性馬防傳曰兄弟貴盛賔客奔湊四方畢至數百餘人皆為食客也鑒念前世可為寒心君侯誠宜以臨深履薄為戒廖不納子豫後坐縣書誹謗縣音懸廖以就國終兄鳳為郡吏太守亷范為州所考遣鳳候終終為范游説坐徙北地益部耆舊傳曰終徙於北地望松縣而母於蜀物故終自傷被罪充邊乃作晨風之詩以舒其憤也帝東廵狩鳳皇黄龍並集終贊頌嘉瑞上述祖宗鴻業凡十五章奏上詔貰還故郡著春秋外傳}
