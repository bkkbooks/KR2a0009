  - {type: variant, offset: 4163, length: 252, content: 功之有固辭乃止更以為尚書典選明年夏大雨晝夜二十餘日漂沒人庶又風如冬時帝使御史裴茂訊詔獄原繫者二百餘人其中有為傕所枉繫者傕恐茂赦之乃表奏茂擅出囚徒疑有姦故請收之詔曰災異屢降陰雨為害使者銜命宣布恩澤原解輕微庶合天心欲釋冤結而復罪之乎一切勿問初卓之入關要韓遂馬騰共謀山東遂騰見天下方亂亦欲倚卓起兵興平元年馬騰從隴右來朝進屯霸橋時騰私有求於傕不獲而怒遂與侍中馬宇右中郎將劉範前涼州刺史种劭中郎將杜稟合兵攻傕連日不決韓遂聞之乃率衆來欲和騰傕既而復與騰合傕使兄子利共郭汜樊稠與騰等戰於長平觀下遂騰敗斬首萬餘級种劭劉範, WYG: 武}
