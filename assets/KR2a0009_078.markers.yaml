  - {type: variant, offset: 12, length: 0, content: '', WYG: 三十八楊終傳楊終字子山蜀郡成都人也年十三為郡小吏太守竒其才遣詣京師受業習春秋袁山松書曰時蜀郡有雷震决曹終上白記以為斷獄煩苛所致太守乃令終賦雷電之意而竒之顯宗時徴詣蘭臺拜校書郎建初元年大旱榖貴終以為廣陵楚淮陽濟南之獄徙者萬數又逺屯絶域吏民怨曠乃上疏曰臣聞善善及子孫惡惡止其身百王常典不易之道也春秋昭公二十年曹公孫會自鄸出奔宋公羊傳曰畔也曷為不言畔為公子喜時之後諱也春秋為賢者諱也何賢乎公子喜時譲國也君子善善也長惡惡也短惡惡止其身善善及子孫賢者子孫故君子為之諱秦政酷烈違牾天心一人有罪延及三族前書音義曰父族母族妻族也高祖平亂約法三章太宗至仁除去收孥太宗文帝也史記曰文帝徳至盛也豈不仁哉除去收拏相坐之律也萬姓廓然䝉被更生澤及昆蟲功垂萬世陛下聖明徳被四表今以比年久旱災疫未息災字或作牛疫病也躬自菲薄廣訪失得三代之隆無以加焉臣竊按春秋水旱之變皆應暴急惠不下流自永平以來仍連大獄有司窮考轉相牽引掠拷寃濫家屬徙邊加以北征匈奴西開三十}
