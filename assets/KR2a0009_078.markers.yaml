  - {type: variant, offset: 4567, length: 419, content: 十萬人相食啖白骨委樍臭穢滿路帝使侍御史侯汶出太倉米豆為飢人作糜經日而死者無降帝疑賦卹有虛乃親於御前自加臨檢既知不實使侍中劉艾出讓有司於是尚書令以下皆詣省閣謝奏收侯汶考實詔曰未忍致汶于理可杖五十自是後多得全濟明年春傕因會刺殺樊稠於坐由是諸將各相疑異傕汜遂復理兵相攻安西將軍楊定者故卓部曲將也懼傕忍害乃與汜合謀迎天子幸其營傕知其計即使兄子暹將數千人圍宮以車三乘迎天子皇后太尉楊彪謂暹曰古今帝王無在人臣家者諸君舉事當上順天心柰何如是暹曰將軍計決矣帝於是遂幸傕營彪等皆徒從亂兵入殿掠宮人什物傕又徙御府金帛乘輿器服而放火燒宮殿官府居人悉盡帝使楊彪與司空張喜等十餘人和傕汜汜不從遂質留公卿彪謂汜曰將軍達人閒事柰何君臣分爭一人劫天子一人質公卿此可行邪汜怒欲手刃彪彪曰卿尚不奉國家吾豈求生邪左右多諫汜乃止遂引兵攻傕矢及帝前又貫傕耳傕將楊奉本白波賊帥乃將兵救傕於是汜衆乃退是日傕復移帝幸其北塢唯皇后宋貴人俱傕使校尉監門隔絕內外尋復欲徙帝於池陽黃白城君臣惶懼, WYG: 郡印綬}
