  - {type: variant, offset: 482, length: 1, content: 慎, WYG: 人謂䑕未腊者為璞周人遇鄭賈人曰欲買璞乎鄭賈曰欲之出璞視之乃鼠也因謝不取戰國䇿亦然今此乃云鄭人以乾鼠為璞便與二説不同此云乾鼠彼云未腊事又差舛闕子曰宋之愚人得燕石梧臺之東歸而藏之以為大寳周客聞而觀之主人父齋七日端冕之衣釁之以特牲革匱十重緹巾十襲客見之俛而掩口盧胡而笑曰此燕石也與瓦甓不殊主人父怒曰商賈之言竪匠之心藏之愈固守之彌謹旃之也䌌音襲緹赤色繒也楚詞曰襲英衣兮緹䌌謂鮮明之衣左氏實云雖有姬姜絲麻不棄惟悴菅蒯盖所以代匱也左傳曰詩云雖有絲麻無棄菅蒯雖有姬姜無棄蕉萃凡百君子莫不代匱杜預云逸詩也姬姜大國之女蕉萃陋賤之人蕉萃憔悴古字通是用敢露頑才厠于明哲之末雖未足綱紀國體宣洽時雍庶幾觀察增闡聖聼惟因萬機之餘暇游意省覽焉獻帝善之二年詔拜劭為袁紹軍謀校尉時始遷都於許舊章堙沒書記罕存劭慨然歎息乃綴集所聞著漢官禮儀故事凡朝廷制度百官典式多劭所立初父奉為司𨽻時並下諸官府郡國各上前人像贊劭乃連綴其名録為狀人紀又論當時行事著中漢輯序撰風俗通以辯物類名號釋時俗嫌疑文雖不典後世服其洽聞凡所著述百三十六篇又集解漢書皆傳于時後卒於鄴弟子瑒璩並以文才稱華嶠書曰劭弟珣字季瑜司空掾珣生瑒魏志曰瑒字徳璉瑒弟璩字休璉咸以文章顯也中興初有應嫗者生四子而寡見神光照社試探之乃得黄金自是諸子宦學並有才名至瑒七世通顯應順}
