  - {type: variant, offset: 83, length: 3, content: 以健俠, WYG: 權貴共誣酺及尚書令高堂芝等交通屬託坐减死歸家復被章云酺前與河南張楷等謀反逮詣廷尉及杜真等上書訟之事得明釋卒於家益都耆舊傳曰杜真字孟宗廣漢綿竹人也少有孝行習易春秋誦百萬言兄事同郡翟酺酺後被繫獄真上檄章救酺繫獄笞六百竟免酺難京師莫不壯之著援神鉤命解詁十二篇援神契鉤命决皆孝經緯篇名也詁音古初酺之為大匠上言孝文皇帝始置五經博士武帝建元五年始置五經博士文帝之時未遑庠序之事酺之此言不}
