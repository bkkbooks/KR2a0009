  - {type: variant, offset: 528, length: 1, content: 乏, WYG: 極諝時年十五奏記於商曰將軍天覆厚恩愍舅光寃結前者温教許為平議雖未下吏斷决其事已䝉神明顧省之聼皇天后土實聞徳音竊獨踴躍私自慶幸諝聞春秋之義原情定過赦事誅意故許止雖弑君}
