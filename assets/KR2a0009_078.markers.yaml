  - {type: variant, offset: 5081, length: 304, content: 將軍脅主誰輕重乎傕怒呵遣酈因令虎賁王昌追殺之昌偽不及酈得以免傕乃自為大司馬與郭汜相攻連月死者以萬數張濟自陝來和解二人仍欲遷帝權幸弘農帝亦思舊京因遣使敦請傕求東歸十反乃許車駕即日發邁李傕出屯曹陽以張濟為驃騎將軍復還屯陝遷郭汜車騎將軍楊定後將軍楊奉興義將軍又以故牛輔部曲董承為安集將軍汜等並侍送乘輿汜遂復欲脅帝幸郿定奉承不聽汜恐變生乃𠫓廾軍還就李傕車駕進至華陰寧輯將軍段煨乃具服御及公卿以下資儲請帝幸其營初楊定與煨有𨻶遂誣煨欲反乃攻其營十餘日不下而煨猶奉給御膳稟贍百官終無二意李傕郭汜既悔令天子東乃來救段煨因欲劫帝而西楊定為汜所遮亡奔荊州而張濟與楊奉董承不相平乃反合傕汜共追乘輿大戰於弘農東澗承奉軍敗百官士卒死者, WYG: ''}
