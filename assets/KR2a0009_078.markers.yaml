  - {type: variant, offset: 3751, length: 357, content: 一歲不可再赦不許之傕等益懷憂懼不知所為武威人賈詡時在傕軍說之曰聞長安中議欲盡誅涼州人諸君若𠫓廾軍單行則一亭長能束君矣不如相率而西以攻長安為董公報仇事濟奉國家以正天下若其不合走未後也傕等然之各相謂曰京師不赦我我當以死決之若攻長安剋則得天下矣不剋則鈔三輔婦女財物西歸鄉里尚可延命衆以為然於是共結盟率軍數千晨夜西行王允聞之乃遣卓故將胡軫徐榮擊之於新豐榮戰死軫以衆降傕隨道收兵比至長安已十餘萬與卓故部曲樊稠李蒙等合圍長安城峻不可攻守之八日呂布軍有叟兵內反引傕衆得入城潰放兵虜掠死者萬餘人殺衛尉种拂等呂布戰敗出奔王允奉天子保宣平城門樓上於是大赦天下李傕郭汜樊稠等皆為將軍遂圍門樓共表請司徒王允出問太師何罪允窮蹙乃下後數日見殺傕等葬董卓於郿并收董氏所焚尸之灰合斂一棺而葬之葬日大風雨霆震卓墓流水入藏漂其棺木傕又遷車騎將軍開府領, WYG: ''}
