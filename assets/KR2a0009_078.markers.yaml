  - {type: variant, offset: 640, length: 369, content: 衆軍敗退唯卓全師而還屯於扶風封斄鄉侯邑千戶三年春遣使者持節就長安拜張溫為太尉三公在外始之於溫其冬徵溫還京師韓遂乃殺邊章及伯玉文侯擁兵十餘萬進圍隴西太守李相如反與遂連和共殺涼州刺史耿鄙而鄙司馬扶風馬騰亦擁兵反叛又漢陽王國自號合衆將軍皆與韓遂合共推王國為主悉令領其衆寇掠三輔五年圍陳倉乃拜卓前將軍與左將軍皇甫嵩擊破之韓遂等復共廢王國而劫故信都令漢陽閻忠使督統諸部忠恥為衆所脅感恚病死遂等稍爭權利更相殺害其諸部曲並各分乖六年徵卓為少府不肯就上書言所將湟中義從及秦胡兵皆詣臣曰牢直不畢稟賜斷絕妻子飢凍牽挽臣車使不得行羌胡敝腸狗態臣不能禁止輒將順安慰增異復上朝廷不能制頗以為慮及靈帝寑疾璽書拜卓為并州牧令以兵屬皇甫嵩卓復上書言曰臣既無老謀又無壯事天恩誤加掌戎十年士卒大小相狎彌久戀臣畜養之恩為臣奮一旦之命乞將之北州效力邊垂於是駐兵河東以觀時變及帝崩, WYG: ''}
