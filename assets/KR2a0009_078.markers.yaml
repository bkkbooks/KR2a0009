  - {type: variant, offset: 192, length: 1, content: 東, WYG: 西刺史二千石皆遣子弟奉賂遺憲憲敗後咸被繩黜順獨不在其中由是顯名為將作大匠視事五年省費億萬汝南記曰華仲妻本是汝南鄧元義前妻也元義父伯考為尚書僕射元義還鄉里妻留事姑甚謹姑憎之幽閉空室節其食飲羸露日困妻終無怨言後伯考怪而問之時義子朗年數嵗言母不病但苦飢耳伯考流涕曰何意親姑反為此禍因遣歸家更嫁為華仲妻仲為將作大匠妻乘朝車出元義於路傍觀之謂人曰此我故婦非有它過家夫人遇之實酷本自相貴其子朗時為郎母與書皆不答與衣裳輙以燒之母不以介意意欲見之乃至親家李氏堂上令人以它詞請朗朗至見母再拜涕泣因起出母追謂之曰我幾死自為汝家所棄我何罪過乃如此邪因此遂絶也生十子皆有才學中子疊江夏}
