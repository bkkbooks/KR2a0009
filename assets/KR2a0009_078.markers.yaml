  - {type: variant, offset: 1455, length: 0, content: '', WYG: 卒延年被戮嫣伏其辜李延年中山人也身及父母兄弟皆故倡人也武帝時延年女弟得幸號曰李夫人延年善歌舞為協律都尉佩二千石印綬與上臥起弟季與中人亂出入驕恣上遂誅延年兄弟韓嫣韓王信之曾孫也武帝為王時與嫣相愛後位至上大夫賞賜擬鄧通與上臥起出入永巷以姦聞被誅夫愛之則不覺其過惡之則不知其善所以事多放濫物情生怨故王者賞人必酬其功爵人必甄其徳甄明也善人同處則日聞嘉訓惡人從游則日生邪情孔子曰益者三友論語孔子曰友直友諒友多聞益矣友便僻友善柔友便佞損矣邪臣惑君亂妾危主以非所言則悦於耳以非所行則玩於目故令人君不能逺之仲尼曰唯女子與小人為難養近之則不遜逺之則怨盖聖人之明戒也昔光武皇帝與嚴光俱寢上天之異其夕即見事見逸人傳夫以光武之聖徳嚴光之高賢君臣合道尚降此變豈况陛下}
