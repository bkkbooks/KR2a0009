  - {type: variant, offset: 1695, length: 254, content: 何后葬開文陵卓悉取藏中珍物又姦亂公主妻略宮人虐刑濫罰睚眦必死羣僚內外莫能自固卓嘗遣軍至陽城時人會於社下悉令就斬之駕其車重載其婦女以頭繫車轅歌呼而還又壞五銖錢更鑄小錢悉取洛陽及長安銅人鍾虡飛廉銅馬之屬以充鑄焉故貨賤物貴穀石數萬又錢無輪郭文章不便人用時人以為秦始皇見長人於臨洮乃鑄銅人卓臨洮人也而今毀之雖成毀不同凶暴相類焉卓素聞天下同疾閹官誅殺忠良及其在事雖行無道而猶忍性矯情擢用羣士乃任吏部尚書漢陽周珌侍中汝南伍瓊尚書鄭公業長史何顒等以處士荀爽為司空其染黨錮者陳紀韓融之徒皆為列卿幽滯之士多所顯拔以尚書韓馥為冀, WYG: 稍遷荆}
