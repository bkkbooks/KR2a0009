  - {type: variant, offset: 54, length: 0, content: '', WYG: 酺自恃能高而忌故太史令孫懿恐其先用乃往候懿既坐言無所及唯涕泣流連懿怪而問之酺曰圖書有漢賊孫登將以才智為中官所害觀君表相似當應之春秋保乾圖曰漢賊臣名孫登大形小口長七尺九寸巧用法多技方詩書不用賢人杜口也酺受恩接悽愴君之禍耳懿憂懼移病不試移病謂作文移而稱病也由是酺對第一拜尚書時安帝始親政事追感祖母宋貴人悉封其家又元舅耿寳及皇后兄弟閻顯等並用威權酺上疏諫曰臣聞微子佯狂而去殷叔孫通背秦而歸漢彼非自疏其君時不可也臣荷殊絶之恩䝉值不諱之政豈敢雷同受寵而以戴天履地雷之發聲物皆同應言無是非}
  - {type: page-break, offset: 54, content: '', id: KR2a0009_WYG_078-7a, image: WYG0253/WYG0253-0097c.png}
