  - {type: variant, offset: 77, length: 1, content: 頭, WYG: 騎徙敦煌來鈔郡界劉攽曰案文徙當作從酺赴擊斬首九百級羌衆幾盡威名大震遷京兆尹順帝即位拜光禄大夫遷將作大匠損省經用嵗息四五千萬經常也屢因災異多所匡正益都耆舊傳曰時詔問酺隂陽失序水旱隔并其設銷復興濟之本酺上奏陳圖書之意曰漢四百年將有弱主閉門聼難之禍數在三百年之間宜升歴改憲行先王至徳要道奉率時禁抑損奢侈宣明質樸}
