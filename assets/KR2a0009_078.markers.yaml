  - {type: variant, offset: 528, length: 1, content: 乏, krp: 極諝時年十五奏記於商曰將軍天覆厚恩愍舅光寃結前者温教許為平議雖未下吏斷决其事已䝉神明顧省之聼皇天后土實聞徳音竊獨踴躍私自慶幸諝聞春秋之義原情定過赦事誅意故許止雖弑君}
  - {type: variant, offset: 531, length: 0, content: '', WYG: 罪趙盾以縱賊而見書許止許悼公之子名止也公羊傳曰冬葬許悼公賊未討何以書葬不成乎弑也許悼公是止進藥而殺是以君子加弑焉葬許悼公是君子之赦止赦止者免止罪之辭也何休注云原止欲愈父之病無害父之意故赦之是原情定過也又曰晉史書趙盾弑其君趙盾曰天乎無辜吾不弑君太史曰爾為仁為義人殺爾君而不討賊此非弑君如何此赦事誅意也此仲尼所以􅂷王法漢世所宜遵前脩也傳曰人心不同譬若其靣左傳鄭子產謂子皮曰人心不同譬如面焉吾豈}
  - {type: variant, offset: 531, length: 0, content: '', krp: 罪趙盾以縱賊而見書許止許悼公之子名止也公羊傳曰冬葬許悼公賊未討何以書葬不成乎弑也許悼公是止進藥而殺是以君子加弑焉葬許悼公是君子之赦止赦止者免止罪之辭也何休注云原止欲愈父之病無害父之意故赦之是原情定過也又曰晉史書趙盾弑其君趙盾曰天乎無辜吾不弑君太史曰爾為仁為義人殺爾君而不討賊此非弑君如何此赦事誅意也此仲尼所以垂王法漢世所宜遵前脩也傳曰人心不同譬若其靣左傳鄭子產謂子皮曰人心不同譬如面焉吾豈}
  - {type: variant, offset: 532, length: 1, content: 戰, WYG: 謂子靣如吾靣乎斯盖謂大小窳隆醜美之形至於鼻目衆竅毛髮之狀未有不然者也情之異者剛柔舒急倨敬之間至於趨利避害畏死樂生亦復均也諝與光骨肉義有相隐言其寃濫未必可諒且以人情平論其理光衣冠子孫徑路平易謂遵依常轍無所規求也位極州郡日望徴辟亦無瑕穢纎介之累無故刋定詔書欲以何名就有所疑當求其便安豈有觸冒死禍以解細微譬猶療飢於附子止渴於酖毒未入腸胃已絶咽喉豈可為哉史記蘇秦曰飢人之所以飢而不食烏喙者以其愈充腹而與餓死者同患也附子烏喙根同而狀異也昔東海孝婦見枉不辜幽靈感革天應枯旱前書曰東海有孝婦少寡無子養姑甚謹姑欲嫁之終不肻姑告鄰人曰孝婦養我勤苦我老久累丁壯乃自經死姑女告吏曰婦殺我母吏騐之急孝婦自誣服具獄上府太守竟論殺婦郡中枯旱三年後太守至自祭孝婦墓天立大雨嵗熟光之所坐情既可原守闕連年而終不見理呼嗟紫宫之門泣血兩觀之下天有紫㣲宫是上帝之所居也王者立宫象而為之兩觀謂闕也傷和致災為害滋甚凡事更赦令不應復案夫以罪刑明白尚䝉天恩豈有寃謗無徴反不得理是為刑宥正罪戮加誣侵也不偏不黨其}
