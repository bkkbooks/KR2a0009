  - {type: variant, offset: 2342, length: 1237, content: 將徐榮李蒙四出虜掠榮遇堅於梁與戰破堅生禽潁川太守李旻亨之卓所得義兵士卒皆以布纏裹倒立於地熱膏灌殺之時河內太守王匡屯兵河陽津將以圖卓卓遣疑兵挑戰而潛使銳卒從小平津過津北破之死者略盡明年孫堅收合散卒進屯梁縣之陽人卓遣將胡軫呂布攻之布與軫不相能軍中自驚恐士卒散亂堅追擊之軫布敗走卓遣將李傕詣堅求和堅拒絕不受進軍大谷距洛九十里卓自出與堅戰於諸陵墓閒卓敗走却屯黽池聚兵於陝堅進洛陽宣陽城門更擊呂布布復破走堅乃埽除宗廟平塞諸陵分兵出函谷關至新安黽池閒以卓後卓謂長史劉艾曰關東諸將數敗矣無能為也唯孫堅小戇諸將軍宜慎之乃使東中郎將董越屯黽池中郎將段煨屯華陰中郎將牛輔屯安邑其餘中郎將校尉布在諸縣以禦山東卓諷朝廷使光祿勳宣璠持節拜卓為太師位在諸侯王上乃引還長安百官迎路拜揖卓遂僭擬車服乘金華青蓋爪畫兩轓時人號竿摩車言其服飾近天子也以弟旻為左將軍封鄠侯兄子璜為侍中中軍校尉皆典兵事於是宗族內外並居列位其子孫雖在髫男皆封侯女為邑君數與百官置酒宴會淫樂縱恣乃結壘於長安城東以自居又築塢於郿高厚七丈號曰萬歲塢積穀為三十年儲自云事成雄據天下不成守此足以畢老嘗至郿行塢公卿已下祖道於橫門外卓施帳幔飲設誘降北地反者數百人於坐中殺之先斷其舌次斬手足次鑿其眼目以鑊之未及得死偃轉柸杯案閒會者戰慄亡失匕箸而卓飲食自若諸將有言語蹉跌便戮於前又稍誅關中舊族陷以叛逆時太史望氣言當有大臣戮死者卓乃使人誣衛尉張溫與袁術交通遂笞溫於市殺之以塞天變前溫出屯美陽令卓與邊章等戰無功溫召又不時應命既到而辭對不遜時孫堅為溫參軍勸溫陳兵斬之溫曰卓有威名方倚以西行堅曰明公親帥王師威振天下何恃於卓而賴之乎堅聞古之名將杖鉞臨衆未有不斷斬以示威武者也故穰苴斬莊賈魏絳戮楊干今若縱之自虧威重後悔何及溫不能從而卓猶懷忌恨故及於難溫字伯慎少有名譽累登公卿亦陰與司徒王允共謀誅卓事未及發而見害越騎校尉汝南伍孚忿卓凶毒志手刃之乃朝服懷佩刀以見卓孚語畢辭去卓起送至閤以手撫其背孚因出刀刺之不中卓自奮得免急呼左右執殺之而大詬曰虜欲反耶孚大言曰恨不得磔裂姦賊於都市以謝天地言未畢而斃時王允與呂布及僕射士孫瑞謀誅卓有人書呂字於布上負而行於市歌曰布乎有告卓者卓不悟三年四月帝疾新愈大會未央殿卓朝服升車既而馬驚墯泥還入更衣其少妻止之卓不從遂行乃陳兵夾道自壘及宮左步右騎屯衛周帀令呂布等扞衛前後王允乃與士孫瑞密表其事使瑞自書詔以授布令騎都尉李肅與布同心勇士十餘人偽著衛士服於北掖門內以待卓卓將至馬驚不行怪懼欲還呂布勸令進遂入門肅以戟刺之卓衷甲不入傷臂墯車顧大呼曰呂布何在布曰有詔討賊臣卓大罵曰庸狗敢如是邪布應聲持矛刺卓趣兵斬之主簿田儀及卓倉頭前赴其尸布又殺之馳齎赦書以令宮陛內外士卒皆稱萬歲百姓歌舞於道長安中士女賣其珠玉衣裝市酒肉相慶者填滿街肆使皇甫嵩攻卓弟旻於郿塢殺其母妻男女盡滅其族乃尸卓於市天時始熱卓素充肥脂流於地守尸吏然火置卓臍中光明達曙如是積日諸袁門生又聚董氏之尸焚灰揚之於路塢中珍藏有金二三萬斤銀八九萬斤錦綺繢縠紈素奇玩積如丘山初卓以牛輔子壻素所親信, WYG: ''}
