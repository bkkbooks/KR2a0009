  - {type: 'tls:seg', offset: 478, content: '', id: KR2a0009_ZHSJ_078-d78p4s46}
  - {type: variant, offset: 478, length: 1, content: 溫, WYG: 俾後之人永為監焉故膠東相董仲舒老病致仕朝廷每有政議數遣廷尉張湯親至陋巷問其得失事見前書於是作春秋决獄二百三十二事動以經對言之詳矣逆臣董卓蕩覆王室典憲焚燎靡有孑遺開辟以來莫或兹酷或有也今大駕東邁廵省許都拔出險難其命惟新臣累世受恩榮祚豐衍竊不自揆貪少云補輙撰具律本章句尚書舊事廷尉板令决事比例司徒都目五曹詔書司徒即丞相也總領綱紀佐理萬機故有都目成帝初置尚書員五人漢舊儀有常侍曹二千石曹户曹主客曹三公曹也及春秋斷獄凡二百五十篇蠲去復重為之節文復音複重音定容反又集駮議三十篇以類相從凡八十二事其見漢書二十五漢記四即東觀記皆刪叙潤色以全本體其二十六博採古今瓌瑋之士文章煥炳徳義可觀其二十七臣所創造豈繄自謂必合道𠂻繄音烏兮反繄猶是也心焉憤邑聊以藉手藉音自夜反昔鄭人以乾鼠為璞鬻之於周宋愚夫亦寳燕石緹䌌十重夫覩之者掩口盧胡而笑斯文之俗無}
