  - {type: variant, offset: 1400, length: 0, content: '', WYG: 違牾諝與尚書令尹勲數奏其事又因陛見陳聞罪失及冀誅後桓帝嘉其忠節封鄴都亭侯前後固讓不許出為河南尹遷司𨽻校尉轉少府廷尉卒官子雋安定太守爰延傳爰延字季平陳留外黄人也清苦好學能通經教授性質慤少言辭縣令隴西牛述好士知人乃禮請延為廷掾范丹為功曹濮陽潛為主簿濮陽姓也常共言談而已後令史昭以為鄉嗇夫仁化大行人但聞嗇夫不知郡縣在事三年州府禮請不就桓帝時徴博士太尉楊秉等舉賢良方正再遷為侍中帝游上林苑從容問延曰朕何如主也}
