  - {type: variant, offset: 55, length: 1, content: 卓, WYG: 謂之雷同禮記曰毋雷同左傳曰君履后土而戴皇天也伏惟陛下應天履祚歴值中興當建太平之功而未聞致化之道盖逺者難明請以近事徴之昔竇鄧之寵傾動四方兼官重紱盈金積貨至使議弄神器改更社稷神器謂天位也老子曰天下神器不可為也竇憲出入禁中得幸太后圖}
