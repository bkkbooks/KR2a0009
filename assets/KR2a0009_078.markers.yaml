  - {type: variant, offset: 1407, length: 4, content: 霍光定策, WYG: 朱雲廷折欄檻今侍中靣稱朕違敬聞闕矣朱雲字游成帝時上書求見曰今朝廷大臣上不能匡主下無以益人臣願賜尚方斬馬劒斷佞臣一人以勵其餘上問曰誰也對曰安昌侯張禹上大怒曰小臣廷辱師傅罪死不赦御史將雲下雲攀殿檻折雲呼曰臣得從龍逢比干遊於地下足矣未知朝廷如何耳上意乃解及後當脩檻上曰勿易因而輯之以旌直臣劉攽曰昔朱雲廷折欄檻案文廷下少争字拜五官中郎將轉長水校尉遷魏郡太守徴拜大鴻臚帝以延儒生常特宴見時太史令上言客星經帝坐帝密以問延延因上封事曰臣聞天子尊無為上故天以為子位臨臣庶威重四海動静以理則星辰順序意有邪僻則晷度錯違陛下以河南尹鄧萬有龍潛之舊封為通侯恩重公卿惠豐宗室加頃引見與之對博上下媟黷有虧尊嚴臣聞之帝左右者所以咨政徳也故周公戒成王曰其朋其朋言慎所與也尚書周公戒成王曰孺子其朋孺子其朋慎其徃昔宋閔公與彊臣共博列婦人於側積此無禮以致大災公羊經書宋萬弑其君㨗傳曰宋萬嘗與魯莊公戰獲于莊公歸舍諸宫中數月然後歸之與宋閔公博婦人在側萬曰甚矣魯侯之淑魯侯之羙天下諸侯宜為君者唯魯侯爾閔公矜此婦人妬其言顧曰此虜也魯侯之羙惡乎至萬怒搏閔公絶其脰武帝與倖臣李}
