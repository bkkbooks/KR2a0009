  - {type: variant, offset: 60, length: 0, content: '', WYG: 乎衣以文繡食以芻菽及其牽而入於太廟欲為孤犢其可得乎此作豚不同也夫致貴無漸失必暴受爵非道殃必疾今外戚寵幸功均造化漢元以來未有等比陛下誠仁恩周洽以親九族然禄去公室政移私門覆車重尋寧無摧折賈誼曰諺云前車覆後車誡也而朝臣在位莫肯正議翕翕訾訾更相佐附詩小雅曰翕翕訾訾亦孔之哀毛傳曰翕翕然患其上訾訾然不思稱職爾雅曰翕翕訾訾莫供職也訾音將徙反訿}
