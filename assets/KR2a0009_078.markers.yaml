  - {type: variant, offset: 472, length: 0, content: '', WYG: 獲生口老弱萬餘人輜重二千兩賊皆退却郡内以安興平元年前太尉曹嵩及子徳從琅邪入太山劭遣兵迎之未到而徐州牧陶謙素怨嵩子操數擊之乃使輕騎追嵩徳並殺之於郡界劭畏操誅棄郡奔冀州牧袁紹初安帝時河間人尹次潁川人史玉皆坐殺人當死次兄初及玉母軍並詣官曹求代其命因縊而物故尚書陳忠以罪疑從輕議活次玉劭後追駮之據正典刑有可存者其議曰尚書稱天秩有禮五服五}
  - {type: page-break, offset: 472, content: '', id: KR2a0009_WYG_078-15b, image: WYG0253/WYG0253-0101d.png}
  - {type: variant, offset: 472, length: 0, content: '', krp: 獲生口老弱萬餘人輜重二千兩賊皆退却郡内以安興平元年前太尉曹嵩及子徳從琅邪入太山劭遣兵迎之未到而徐州牧陶謙素怨嵩子操數擊之乃使輕騎追嵩徳並殺之於郡界劭畏操誅棄郡奔冀州牧袁紹初安帝時河間人尹次潁川人史玉皆坐殺人當死次兄初及玉母軍並詣官曹求代其命因縊而物故尚書陳忠以罪疑從輕議活次玉劭後追駮之據正典刑有可存者其議曰尚書稱天秩有禮五服五}
  - {type: punctuation, offset: 473, content: 、, id: KR2a0009_ZHSJ_078-bkkpn94}
  - {type: variant, offset: 473, length: 0, content: '', WYG: 哉天討有罪五刑五用哉而孫卿亦云凡制刑之本將以禁暴惡且懲其末也凡爵列官秩賞慶刑威皆以類相從使當其實也若徳不副位能不稱官賞不酬功刑不應罪不祥莫大焉殺人者死傷人者刑此百王之定制有法之成科高祖入關雖尚約法然殺人者死亦無寛降夫時化則刑重時亂則刑輕犯化之罪固重犯亂之罪為輕書曰刑罰時輕時重此之謂也今次玉公以清時釋其私憾阻兵安忍僵屍道路阻持也左傳曰衛州吁阻兵而安忍朝恩在寛幸至冬獄而初軍愚狷妄自投斃昔召忽親死子紏之難而孔子曰經於溝瀆人莫之知召忽齊大夫子紏齊襄公之庶子也子紏與小白争國子紏被殺召忽其𫝊也}
  - {type: page-break, offset: 473, content: '', id: KR2a0009_WYG_078-16a, image: WYG0253/WYG0253-0102a.png}
  - {type: variant, offset: 473, length: 0, content: '', krp: 哉天討有罪五刑五用哉而孫卿亦云凡制刑之本將以禁暴惡且懲其末也凡爵列官秩賞慶刑威皆以類相從使當其實也若徳不副位能不稱官賞不酬功刑不應罪不祥莫大焉殺人者死傷人者刑此百王之定制有法之成科高祖入關雖尚約法然殺人者死亦無寛降夫時化則刑重時亂則刑輕犯化之罪固重犯亂之罪為輕書曰刑罰時輕時重此之謂也今次玉公以清時釋其私憾阻兵安忍僵屍道路阻持也左傳曰衛州吁阻兵而安忍朝恩在寛幸至冬獄而初軍愚狷妄自投斃昔召忽親死子紏之難而孔子曰經於溝瀆人莫之知召忽齊大夫子紏齊襄公之庶子也子紏與小白争國子紏被殺召忽其𫝊也}
  - {type: variant, offset: 474, length: 0, content: '', WYG: 死之論語孔子論召忽曰豈若匹夫匹婦之為諒也自經於溝瀆而莫之知也鼂氏之父非錯刻峻遂能自隕其命班固亦云不如趙母指括以全其宗前書鼂錯為御史大夫改更律令諸侯諠譁錯父聞而非之曰劉氏安而鼂氏危矣遂飲藥而死史記曰趙母趙將馬服君趙奢之妻趙括之母也奢死趙欲以括為將母謂趙王曰王以為括如其父父子異心願王勿遣王曰吾計决矣括母曰王終將之即有不稱妾得無隨乎王許諾及括}
  - {type: variant, offset: 474, length: 0, content: '', krp: 死之論語孔子論召忽曰豈若匹夫匹婦之為諒也自經於溝瀆而莫之知也鼂氏之父非錯刻峻遂能自隕其命班固亦云不如趙母指括以全其宗前書鼂錯為御史大夫改更律令諸侯諠譁錯父聞而非之曰劉氏安而鼂氏危矣遂飲藥而死史記曰趙母趙將馬服君趙奢之妻趙括之母也奢死趙欲以括為將母謂趙王曰王以為括如其父父子異心願王勿遣王曰吾計决矣括母曰王終將之即有不稱妾得無隨乎王許諾及括}
  - {type: variant, offset: 475, length: 2, content: 走榆, WYG: 王以母先言竟不誅也而班固引之以為鼂錯贊詞傳曰僕妾感慨而致死者非能義勇顧無慮耳言僕妾之致死者顧無由計慮耳語見史記欒布傳賛也夫刑罰威獄以類天之震燿殺戮也温慈和惠以放天之生殖長育也左傳鄭大夫游吉之語是故春一草枯則為災秋一木華亦為異今殺無罪之初軍而活當死之次玉其為枯華不亦然乎陳忠不詳制刑之本而信一時之仁遂廣引八議求生之端夫親故賢能功貴勤賔豈有玉次當罪之科哉周禮小司寇職鄭司農曰親宗室有罪先請也故謂舊知也賢謂有徳行者能謂有道蓺者功謂有大勳也貴謂若今墨綬有罪先請也勤謂憔悴國事賔謂二王後若乃小大以情原心定罪左傳曰小大之獄雖不能察必以情原心定罪解見霍諝傳也此為求生非謂代死可以生也敗法亂政悔其可追劭凡為駮議三十篇皆此類也又刪定律令為漢儀建安元年乃奏之曰夫國之大事莫尚載籍也劉攽曰案文多一也字載籍也者决嫌疑明是非禮記曰夫禮者决嫌疑明是非賞刑之宜允獲厥}
