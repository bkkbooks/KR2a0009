  - {type: variant, offset: 5567, length: 1137, content: 里中方得至陝乃結營自守時殘破之餘虎賁羽林不滿百人皆有離心承奉等夜乃潛議過河使李樂先度具舟舡舉火為應帝步出營臨河欲濟岸高十餘丈乃以絹縋而下餘人或匍匐岸側或從上自投死亡傷殘不復相知爭赴舡者不可禁制董承以戈擊披之斷手指於舟中者可掬同濟唯皇后宋貴人楊彪董承及后父執金吾伏完等數十人其宮女皆為傕兵所掠奪凍溺死者甚衆既到大陽止於人家然後幸李樂營百官飢餓河內太守張楊使數千人負米貢餉帝乃御牛車因都安邑河東太守王邑奉獻綿帛悉賦公卿以下封邑為列侯拜胡才征東將軍張楊為安國將軍皆假節開府其壘壁羣豎競求拜職刻印不給至乃以錐畫之或齎酒肉就天子燕飲又遣太僕韓融至弘農與傕汜等連和傕乃放遣公卿百官頗歸宮人婦女及乘輿器服初帝入關三輔戶口尚數十萬自傕汜相攻天子東歸後長安城空四十餘日強者四散羸者相食二三年閒關中無復人跡建安元年春諸將爭權韓暹遂攻董承承奔張楊楊乃使承先繕修洛宮七月帝還至洛陽幸楊安殿張楊以為己功故因以楊名殿乃謂諸將曰天子當與天下共之朝廷自有公卿大臣楊當出扞外難何事京師遂還野王楊奉亦出屯梁乃以張楊為大司馬楊奉為車騎將軍韓暹為大將軍領司隸校尉皆假節鉞暹與董承並留宿衞暹矜功恣睢干亂政事董承患之潛召兗州牧曹操操乃詣闕貢獻稟公卿以下因奏韓暹張楊之罪暹懼誅單騎奔楊奉帝以暹楊有翼車駕之功詔一切勿問於是封衞將軍董承輔國將軍伏完等十餘人為列侯贈沮儁為弘農太守曹操以洛陽殘荒遂移帝幸許楊奉韓暹欲要遮車駕不及曹操擊之奉暹奔袁術遂縱暴楊徐閒明年左將軍劉備誘奉斬之暹懼走還并州道為人所殺胡才李樂留河東才為怨家所害樂自病死張濟飢餓出至南陽攻穰戰死郭汜為其將伍習所殺三年使謁者僕射裴茂詔關中諸將段煨等討李傕夷三族以段煨為安南將軍封閺鄉侯四年張楊為其將楊醜所殺以董承為車騎將軍開府自都許之後權歸曹氏天子總己百官備員而已帝忌操專偪乃密詔董承使結天下義士共誅之承遂與劉備同謀未發會備出征承更與偏將軍王服長水校尉种輯議郎吳碩結謀事泄承服輯碩皆為操所誅韓遂與馬騰自還涼州更相戰爭乃下隴據關中操方事河北慮其乘閒為亂七年乃拜騰征南將軍遂征西將軍並開府後徵段煨為大鴻臚病卒復徵馬騰為衞尉封槐里侯騰乃應召而留子超領其部曲十六年超與韓遂舉關中背曹操操擊破之遂超敗走騰坐夷三族超攻殺涼州刺史韋康復據隴右十九年天水人楊阜破超超奔漢中降劉備韓遂走金城羌中為其帳下所殺初隴西人宗建在枹罕自稱河首平漢王署置百官三十許年曹操因遣夏侯淵擊建斬之涼州悉平論曰董卓初以虓闞為情因遭崩剝之埶故得蹈藉彝倫毀裂畿服夫以刳肝斮趾之性則羣生不足以厭其快然猶折意縉紳疑陵奪尚有盜竊之道焉及殘寇乘之倒山傾海崑岡之火自茲而焚版蕩之篇於焉而極嗚呼人之生也難矣天地之不仁甚矣贊曰百六有會過剝成災董卓滔天干逆三才方夏崩沸皇京烟埃無禮雖及餘祲遂廣矢延王輅兵纏魏象區服傾回人神波蕩, WYG: 八考證}
