  - {type: variant, offset: 61, length: 1, content: 共, WYG: 訾古字通臣恐威權外假歸之良難虎翼一奮卒不可制韓詩外傳曰無為虎傅翼將飛入邑擇人而食夫置不肖之人於位是為虎傅翼也故孔子曰吐珠於澤誰能不含春秋保乾圖曰臣功大者主威侵權并族害己姦行吐珠於澤誰能不含諭君之權柄外假則必競取以為己利猶珠出於澤中誰能不含取以為己寳也吐猶出也老子稱國之利器不可以示人老子道經曰魚不可脱於泉國之利器不可以示人河上公注曰利器謂權道也理國權道不可以示執事之臣此最安危之極戒社稷之深計也夫儉徳之恭政存約節左氏傳魯大夫御孫曰儉徳之恭侈惡之大也故文帝愛百金於露臺飾帷帳於皁囊文帝常欲作露臺計直百金曰百金中人十家之産何以臺為遂止不作又東方朔曰文帝集上書囊以為殿帷或有譏其儉者上曰朕為天下守財耳豈得妄用之哉至倉榖腐而不可食錢貫朽而不可校今自初政已來日月未久費用賞賜已不可算歛天下之財積無功之家帑藏單盡民物彫傷卒有不虞復當重賦百姓怨叛既生危亂可待也昔成王之政周公在前召公在後畢公在左史佚在右四子挾而維之目見正容耳聞正言一日即位天下曠然言其法度素定也今陛下有成王之尊而無數子之佐雖欲崇雍熙致太平其可得乎自去年已來災譴頻數地坼天崩高岸為谷修身恐懼則轉禍為福輕慢天戒則其害彌深願陛下親自勞䘏研精致思勉求忠貞之臣誅逺佞謟之黨損玉堂之盛尊天爵之重孟子曰公卿大夫人爵也仁義禮智信天爵也割情欲之歡罷}
