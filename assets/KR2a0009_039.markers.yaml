  - {type: variant, offset: 1016, length: 559, content: 年純奏上宜封禪曰自古受命而帝治世之隆必有封禪以告成功焉樂動聲儀曰以雅治人風成於頌有周之盛成康之閒郊配封禪皆可見也書曰歲二月東巡狩至于岱宗祡則封禪之義也臣伏見陛下受中興之命平海內之亂修復祖宗撫存萬姓天下曠然咸蒙更生恩德雲行惠澤雨施黎元安寧夷狄慕義詩云受天之祜四方來賀今攝提之歲倉龍甲寅德在東宮宜及嘉時遵唐帝之典繼孝武之業以二月東巡狩封于岱宗明中興勒功勳復祖統報天神禪梁父祀地祇傳祚子孫萬世之基也中元元年帝乃東巡岱宗以純視御史大夫從并上元封舊儀及刻石文三月薨謚曰節侯子奮嗣奮字稺通父純臨終勑家丞曰司空無功於時猥蒙爵土身死之物勿議傳國奮兄根少被病光武詔奮嗣爵奮稱純遺勑固不肯受帝以奮違紹勑收下獄奮惶怖乃襲封永平四年隨例歸國奮少好學節儉行義常分損租奉贍卹宗親雖至傾匱而施與不怠十七年儋耳降附奮來朝上壽引見宣平殿應對合旨顯宗異其才以為侍祠侯建初元年拜左中郎將轉五官中郎將遷長水校尉七年為將作大匠章和元年免永元元年復拜城門校尉四年遷長樂衞尉明年代桓郁為太常六年代劉方為司空時歲災旱祈雨不應乃上表曰比年不登人用飢匱今復久旱秋稼未立陽氣垂盡歲月迫促夫國以民為本民以穀為命政之急務憂之重者也臣蒙恩尤深受職過任夙夜憂懼章奏不能叙心願對中常侍疏奏即時引見復口陳時政之宜明日和帝召太尉司徒幸洛陽獄錄囚徒收洛陽令陳歆即大雨三日奮在位清白無它異績, WYG: ''}
