  - {type: variant, offset: 24, length: 1, content: 陵, WYG: 預注左傳亦云鸞在鑣和在衡傅𤣥乗輿馬賦注曰鸞在馬勒鑣于寳周禮注曰和鸞皆以金為鈴史記曰前有錯衡所以養目也步中武象驟中韶濩所以養耳也龍旂九斿所以養信也寢兕持虎蛟韅彌龍所以養威也故大路之馬必信至教順然後乗之所以養安也天子五路周禮王之五路一曰玉路二曰金路三曰象路四曰革路五曰木路釋名曰天子所乗曰路路亦軍事也謂之路言行路也以玉為飾古文尚書曰大路在賔階面綴路在阼階面孔安國曰大路玉綴路金也服䖍曰大路總名也如今駕駟髙車矣尊卑俱乗之其采飾有差鄭𤣥曰王在焉曰路以玉飾諸末也傅𤣥乗輿馬賦注曰玉路重較也韻集曰軛前横木曰路錫樊纓十有再就鄭𤣥曰錫面當盧刻金為之所謂鏤錫也樊讀如鞶帶之鞶謂今馬大帶也鄭衆曰纓謂當胷士喪禮曰馬纓三就以削革為之三就三重三匝也鄭𤣥曰纓今馬鞅玉路之樊及纓皆以五采罽飾之十二就就成也杜預曰纓在馬脅前如索帬乗輿馬賦注曰繁纓飾以旄尾金塗十二重建太常十有二斿九仞曳地鄭衆曰太常九旗之畫日月者鄭𤣥曰七尺為仞天子之旗髙六丈三尺日月升龍象天明也崔駰東廵頌曰登天靈之威路駕太乙之象車夷王以下周室衰弱諸侯大路秦并天下閲三代之禮或曰殷瑞山車金根之色殷}
