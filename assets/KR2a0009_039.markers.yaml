  - {type: variant, offset: 15, length: 0, content: '', WYG: 九輿服上玉輅耕車乗輿戎車金根獵車安車軿車立車車青葢緣車大駕皂葢車小駕法駕夫人安車使車輕車大小使車車馬飾載車導從車書曰明試以功孔安國曰攷試其居國為政以差其功車服以庸孔安國曰賜以車服以旌其徳用所任也又一通諸侯四朝各使陳進治化之言明試其言以要其功功成則錫車服以表顯其能用言昔者聖人興天下之大利除天下之大害躬親其事身履其勤憂之勞之不避寒暑使天下之民物各得安其性命無夭昏暴陵之災是以天下之民敬而愛之若親父母則而養之若仰日月夫愛之者欲其長久不憚力役相與起作宫室上棟下宇以雍覆之欲其長久也敬之者欲其尊嚴不憚勞煩相與起作輿輪旌旗章表以尊嚴之斯愛之至敬之極也茍心愛敬雖報之至情由未盡或殺身以為之盡其情也弈世以祀之明其功也是以流光與天地比長後世聖人知恤民之憂思深大者必饗其樂勤仁毓物使不夭折者必受其福故為之制禮以節之使夫上仁繼天統物不伐其功民物安逸若道自然莫知所謝老子曰聖人不仁以百姓為芻狗此之謂也夫禮服之興也所以報功章徳尊仁尚賢故禮尊尊貴貴不得相踰所以為禮也非其人不得服其服所以順禮也順則上下有序徳薄者退徳盛者縟故聖人處乎天子之位服玉藻邃延日月升龍山車金根飾黄屋左纛所以副其徳章其功也賢仁佐聖封國愛民黼黻文繡降龍路車所以顯其仁光其能也及其季末聖人不得其位賢者隠伏是以天子微弱諸侯脅矣於是相貴以等相讟以貨相賂以利天下之禮亂矣至周夷王下堂而迎諸侯此天子失禮微弱之始也自是諸侯宫縣樂食祭以白牡擊玉磬朱干設錫冕而儛大武鄭𤣥注禮記曰此皆天子之禮也宫縣四面縣也干盾也錫傅其背如龜也武萬舞也白牡大路殷天子之禮也白牡殷牲大夫臺門旅樹反坫繡黼丹朱中衣鏤簋朱紘此大夫之僭諸侯禮也鄭𤣥曰此皆諸侯之禮也旅道也屏謂之樹所以蔽行道管氏樹塞門塞猶蔽也禮天子外屏諸侯内屏大夫以簾士以幃反坫反爵之坫也蓋在樽南兩君相見主君既獻於此反爵焉繡黼丹朱以為中衣領緣也繡讀為綃綃繒名也詩云素衣朱綃又曰素衣朱襮襮繡領也鏤簋謂刻而飾之也大夫刻之為龜耳諸侯飾以象天子飾以玉朱紘天子冕之紘也諸侯青組大夫士當緇組紘纁邊詩刺彼己之子不稱其服傷其敗化易譏負且乗致㓂至言小人乗君子器盜思奪之矣自是禮制大亂兵革並作上下無法諸侯陪臣山楶藻梲降及戰國奢僭益熾削滅禮籍葢惡有害己之語競修竒麗之服飾以輿馬文罽玉纓象鑣金鞍以相夸上爭錐刀之利殺人若刈草然而宗祀亦旋夷滅榮利在已雖死不悔及秦并天下攬其輿服上選以供御其次以錫百官漢興文學既缺時亦草創承秦之制後稍改定參稽六經近於雅正孔子曰其或繼周者行夏之正乗殷之輅服周之冕樂則韶舞故撰輿服著之於篇以觀古今損益之義云上古聖人見轉蓬始知為輪輪行可載因物知生復為之輿輿輪相乗流運罔極任重致逺天下獲其利後世聖人觀於天視斗周旋魁方杓曲春秋緯曰瑶光第一至第四為魁第}
