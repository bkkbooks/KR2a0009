  - {type: variant, offset: 37, length: 0, content: '', krp: 路於是始皇作金根之車殷曰乗根秦改曰金根乗輿馬賦注曰金根以金為飾漢承秦制御為乗輿孔子所謂乗殷之輅者也乗輿金根安車立車蔡邕曰五安五立徐廣曰立乗曰髙車坐乗曰安車輪皆朱班重牙周禮曰牙也者以為固抱也鄭衆曰牙謂輪輮也世間或謂之輞貳轂兩轄蔡邕曰轂外復有一轂抱轄其外乃復設轄抱銅置其中東京賦曰重輪貳轄疏轂飛軨金薄繆龍為輿倚較徐廣曰繆交錯之形也較在箱上説文曰􅏹文畫蕃蕃箱也通俗文曰車箱為較文虎伏軾魏都賦注曰軾車横覆膝人所馮止者也龍首衘軛左右吉陽筩鸞雀立衡徐廣曰置金鳥於衡上􅏹文畫輈羽葢華蚤徐廣曰翠羽葢黄裏所謂黄屋車也金華施橑末有二十八枚即蓋弓也東京賦曰樹翠羽之髙蓋薛綜曰樹翠羽為蓋如雲龍矣金作華形莖皆低曲建大旂十二斿畫日月升龍駕六馬東京賦云六𤣥虬之弈弈象鑣鏤錫金鑁方釳挿翟尾獨斷曰金鑁者馬冠也髙廣各五寸上如五華形在馬髦前方釳鐵也廣數寸在馬鑁後後有三孔挿翟尾其中薛綜曰釳中央兩頭髙如山形而貫中翟尾結著之顔延之幼誥曰釳乗輿馬頭上防釳角所以防罔羅釳以翟尾鐵翮象之也徐廣曰金為馬文髦朱兼樊纓赤罽易茸金就十有二左纛以氂牛尾為之在左騑馬軛上大如斗徐廣曰馬在中曰服在外曰騑騑亦名驂蔡邕曰在最後左騑馬頭上是為徳車五時車安立亦皆如之各如方色馬亦如之白馬者朱其髦尾為朱鬛云所御駕六餘皆駕四後從為副車古文尚書曰予臨兆民廩乎若朽索之馭六馬逸禮王度記曰天子駕六馬諸侯駕四大夫三士二庶人一周禮四馬為乗毛詩天子至大夫同駕四士駕二易京氏春秋公羊説皆云天子駕六許慎以為天子駕六諸侯及卿駕四大夫駕三士駕二庶人駕一史記曰秦始皇以水數制乗六馬鄭𤣥以為天子四馬周禮乗馬有四圉各養一馬也諸侯亦四馬顧命時諸侯皆獻乗黄朱乗亦四馬也今帝者駕六此自漢制與古異耳蔡邕表志曰以文義不著之故俗人多失其名五時副車曰五帝車鸞旗曰雞翹耕根曰三蓋其比非一也耕車其飾皆如之有三蓋一曰芝車置􅞙耒耜之箙上親耕所乗也新論桓譚謂楊雄曰君之為黄門郎居殿中數見輿輦玉蚤華芝及鳯皇三蓋之屬皆𤣥黄五色飾以金玉翠羽珠絡錦繡茵席者也東京賦曰立戈迆戞農輿路木薛綜曰戈句孑㦸戞長矛置車上者邪柱之迆邪也是謂戈路農輿三蓋所謂耕根車也東耕于藉乗馬無飾故稱木也賀循曰漢儀親耕青衣幘東京賦説親耕亦云鸞路蒼龍賀循曰車必有鸞而春獨鸞路者鸞鳯類而色青故以名春路也賦又曰介御間以剡耜薛綜曰耜耒金也廣五寸著耒耜而載之天子車參乗帝在左御在中介處右以耒置御之右戎車其飾皆如之蕃以矛麾金鼓羽析幢翳􅞙胄甲弩之箙漢制度曰戎立車以征伐周官其矢箙通俗文曰箭箙謂之步义干寳亦曰今謂之步义鄭𤣥注旣夕曰服車箱也顔延之幼誥云弩矢也獵車其飾皆如之重網縵輪繆龍繞之一曰闟猪車親校獵乗之魏文帝改曰闟虎車太皇太后皇太后法駕皆御金根重翟羽蓋者也加交路帳裳徐廣曰青交路青帷裳非法駕則乗紫罽軿車字林曰軿車有衣蔽無後轅者謂之輜也釋名軿屏也四屏蔽婦人乗牛車也有邸曰輜無邸曰軿傅子曰周曰輜車即輦也雲􅏹文畫輈黄金塗五末徐廣曰未詳疑謂前一轅及衡端轂頭也蓋蚤左右騑駕三馬長公主赤罽軿車大貴人貴人公主王妃封君油畫軿車大貴人加節畫輈皆右騑而已皇太子皇子皆安車朱班輪青蓋金華蚤黒􅏹文畫轓文輈金塗五末皇子為王錫以乗之故曰王青蓋車徐廣曰旂旗九旒畫降龍魏武帝令問東平王有金路何意為是特賜非侍中鄭稱對曰天子五路金以封同姓諸侯得乗金路與天子同此自得有非特賜也皇孫綠車以從皆左右騑駕三獨斷曰綠車名曰皇孫車天子有孫乗之公列侯安車朱班輪倚鹿較伏熊軾皁繒蓋黒轓右騑車有轓者謂之軒中二千石二千石皆皁蓋朱兩轓其千石六百石朱左轓轓長六尺下屈廣八寸上業廣尺二寸九文十二初後謙一寸若月初生示不敢自滿也案本傳舊典傳車驂駕乗赤帷裳唯郭賀為冀州勅去襜帷謝承書曰孔恂字巨卿新淦人州别駕從事車前舊有屏星如刺史車曲翳儀式是時刺史行部發去日晏刺史怒欲去别駕車屏星恂諫曰明使君傳車自發晚而欲徹去屏星毁國舊儀此不可行别駕可去屏星不可省即投傳去刺史追辭謝請不肯還於是遂不去屏星説文曰車當謂之屏星景帝中元五年始詔六百石以上施車轓得銅五末軛有吉陽筩中二千石以上右騑三百石以上皁布蓋千石以上皁繒覆蓋二百石以下白布蓋皆有四維杠衣賈人不得乗馬車除吏赤畫杠其餘皆青云古今注曰武帝天漢四年令諸侯王大國朱輪特虎居前左兕右麋小國朱輪畫特熊居前寢麋居左右卿車者也公列侯中二千石二千石夫人㑹朝若蠶各乗其夫之安車右騑加交路帷裳皆皁非公㑹不得乗朝車得乗漆布輜軿車銅五末乗輿大駕公卿奉引太僕御大將軍參乗屬車八十一乗薛綜曰屬之言相連屬也皆在後為三行備千乗萬騎西都行祠天郊甘泉備之官有其注名曰甘泉鹵簿蔡邕表志曰國家舊章而幽僻藏蔽莫之得見東都唯大行乃大駕大駕太僕校駕法駕黄門令校駕乗輿法駕八卿不在鹵簿中河南尹執金吾雒陽令奉引奉車郎御侍中參乗屬車四十六乗前驅有九斿雲䍐徐廣曰斿車有九乗前史不記形也武王尅紂百夫荷䍐旗以先驅東京賦曰雲䍐九斿薛綜曰旌旗名鳳凰闟㦸薛綜曰闟之言函也取四㦸函車邊皮軒鸞旗應劭漢官鹵簿圖曰乗輿大駕則御鳳凰車以金根為列皆大夫載胡廣曰皮軒以虎皮為軒郭璞曰皮軒革車或曰即曲禮前有士師則載虎皮鸞旗者編羽旄列繫幢旁胡廣曰建蓋在中民或謂之雞翹非也胡廣曰鸞旗以銅作鸞鳥車衡上與本志不同後有金鉦黄鉞説文曰鉞大斧也}
  - {type: variant, offset: 39, length: 2, content: 衞將, WYG: 法曰夏執𤣥鉞殷執白鉞周執黄鉞黄門鼓車古者諸侯貳車九乗秦滅九國兼其車服故大駕屬車八十一乗法駕半之屬車皆皁蓋赤裏木轓戈矛弩箙尚書御史所載最後一車懸豹尾薛綜曰侍御史載之豹尾以前比省中小學漢官篇曰豹尾過後罷屯解圍胡廣曰施於道路豹尾之内為省中故須過後屯圍乃得解皆所以戒不虞也淮南子曰}
