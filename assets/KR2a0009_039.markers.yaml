  - {type: variant, offset: 42, length: 3, content: 封富平, WYG: 政執豹皮所以制正其衆禮記前載虎皮亦此之義類行祠天郊以法駕祠地明堂省什三祠宗廟尤省謂之小駕每出太僕奉駕上鹵簿中常侍小黄門副尚書主者郎令史副侍御史蘭臺令史副皆執注以督整車騎謂之䕶駕春秋上陵尤省於小駕直事尚書一人從其餘令以下皆先行後罷輕車古之戰車也洞朱輪輿不巾不蓋建矛㦸幢麾􅞙輒弩服徐廣曰置弩於軾上駕兩馬也藏在武庫大駕法駕出射聲校尉司馬吏士載以次屬車在鹵簿中諸車有矛㦸其飾幡斿旗幟皆五采制度從周禮孫吳兵法云有巾有蓋謂之武剛車武剛車者為先驅又為屬車輕車為後殿焉大使車立乗駕駟赤帷持節者重導從賊曹車斧車督車功曹車皆兩大車伍百璅弩十二人辟車四人周禮條狼氏干寳注曰今卒辟車之屬從車四乗無節單導從減半小使車不立乗有騑赤屏泥油重絳帷導無斧車近小使車蘭輿赤轂白蓋赤帷從騶騎四十人此謂追捕考案有所勅取者之所乗也諸使車皆朱班輪四輻赤衡軛其送𦵏白堊已下洒車而後還公卿中二千石二千石郊廟明堂祠陵法出皆大車立乗駕駟他出乗安車大行載車其飾如金根車加施組連璧交絡四角金龍首衘璧垂五采析羽流蘇前後雲氣畫帷裳􅏹文畫曲轓長懸車等太僕御駕六布施馬布施馬者淳白駱馬也以黒藥灼其身為虎文既下馬斥賣車藏城北祕宫皆不得入城門當用太僕考工乃内飾治禮吉凶不相干也公卿以下至縣三百石長導從置門下五吏賊曹督盜賊功曹皆帶劒三車從導主簿主記兩車為從縣令以上加導斧車公乗安車則前從并馬立乗長安雒陽令及王國都縣加前後兵車亭長纂要雒陽亭長車前吹管設右騑駕兩璅弩車前伍伯公八人中二千石二千石六百石皆四人自四百石以下至二百石皆二人黄綬武官伍伯文官辟車軨下侍閣門䦨部署街里走卒皆有程品多少隨所典領驛馬三十里一置臣昭案東晉猶有郵驛共置承受傍郡縣文書有郵有驛行傳以相付縣置屋二區有承驛吏皆條所受書每月吉上州郡風俗通曰今吏郵書掾府督郵職掌此卒皆赤幘絳韝云古者軍出師旅皆從秦省其卒取其師旅之名焉公以下至二千石騎吏四人千石以下至三百石縣長二人皆帶劒持棨㦸為前列揵弓韣九鞬通俗文曰弓韔謂之鞬諸}
