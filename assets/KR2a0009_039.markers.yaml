  - {type: variant, offset: 1576, length: 226, content: 年以病罷在家上疏曰聖人所美政道至要本在禮樂五經同歸而禮樂之用尤急孔子曰安上治民莫善於禮移風易俗莫善於樂又曰揖讓而化天下者禮樂之謂也先王之道禮樂可謂盛矣孔子謂子夏曰禮以修外樂以制內丘已矣夫又曰禮樂不興則刑罰不中刑罰不中則民無所厝其手足臣以為漢當制作禮樂是以先帝聖德數下詔書愍傷崩缺而衆儒不達議多駮異臣累世台輔而大典未定私竊惟憂不忘寢食臣犬馬齒盡誠冀先死見禮樂之定十三年更召拜太常復上疏曰漢當改作禮樂圖書著明王者化定制禮功成作樂謹條禮樂異議三事願下有司以時, WYG: ''}
