  - {type: variant, offset: 16, length: 0, content: '', WYG: 至第七為杓合為斗以攜龍角為帝車於是廼曲其輈乗牛駕馬登險赴難周覽八極故易震乗乾謂之大壯言器莫能有上之者也孝經援神契曰斗曲杓橈象成車房為龍馬華葢覆鉤天罡入魁神不獨居故驂駕陪乗以道踟蹰宋均注曰房星既體蒼龍又象駕駟馬故兼言之也覆鉤既覆且鉤曲似葢也天罡入魁又似御陪乗自是以來世加其飾至奚仲為夏車正建其斿旐尊卑上下各有等級世本云奚仲始作車古史考曰黄帝作車引重致逺其後少昊時駕牛禹時奚仲駕馬臣昭案服牛乗馬以利天下其所起逺矣豈奚仲為始世本之誤史考所説是也周室大備官有六職百工與居一焉周禮曰審曲面勢以飭五材以辨民器謂之百工一器而羣工致巧者車最多是故具物以時六材皆良鄭𤣥曰取幹以冬取角以秋絲漆以夏筋膠未聞自此至弧旌枉矢皆出周禮鄭𤣥曰即是周禮注輿方法地葢圓象天三十輻以象日月鄭𤣥曰輪象日月者以其運行也日月三十日而合宿蓋弓二十八以象列星龍旂九斿七仞齊軫鄭𤣥曰軫謂車後横木以象大火鄭𤣥曰交龍為旂諸侯之所建也大火蒼龍宿之心其屬有尾尾九星鳥旟七斿五仞齊較鄭𤣥曰較者車髙檻木也以象鶉火鄭𤣥曰鳥隼為旟州里之所建鶉火朱鳥宿之栁其屬有七星熊旗六斿五仞齊肩以象參伐鄭𤣥曰熊虎為旗師都之所建伐屬白虎宿與參連體而六星龜旐四斿四仞齊首以象營室鄭𤣥曰龜蛇為旐縣鄙之所建營室𤣥武宿與東壁連體而四星弧旌枉矢以象弧也鄭𤣥曰覲禮曰侯氏載龍旂弧韣則旌旗之屬皆有弧也弧以}
