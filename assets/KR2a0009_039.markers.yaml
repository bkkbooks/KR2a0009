  - {type: variant, offset: 16, length: 0, content: '', krp: 至第七為杓合為斗以攜龍角為帝車於是廼曲其輈乗牛駕馬登險赴難周覽八極故易震乗乾謂之大壯言器莫能有上之者也孝經援神契曰斗曲杓橈象成車房為龍馬華葢覆鉤天罡入魁神不獨居故驂駕陪乗以道踟蹰宋均注曰房星既體蒼龍又象駕駟馬故兼言之也覆鉤既覆且鉤曲似葢也天罡入魁又似御陪乗自是以來世加其飾至奚仲為夏車正建其斿旐尊卑上下各有等級世本云奚仲始作車古史考曰黄帝作車引重致逺其後少昊時駕牛禹時奚仲駕馬臣昭案服牛乗馬以利天下其所起逺矣豈奚仲為始世本之誤史考所説是也周室大備官有六職百工與居一焉周禮曰審曲面勢以飭五材以辨民器謂之百工一器而羣工致巧者車最多是故具物以時六材皆良鄭𤣥曰取幹以冬取角以秋絲漆以夏筋膠未聞自此至弧旌枉矢皆出周禮鄭𤣥曰即是周禮注輿方法地葢圓象天三十輻以象日月鄭𤣥曰輪象日月者以其運行也日月三十日而合宿蓋弓二十八以象列星龍旂九斿七仞齊軫鄭𤣥曰軫謂車後横木以象大火鄭𤣥曰交龍為旂諸侯之所建也大火蒼龍宿之心其屬有尾尾九星鳥旟七斿五仞齊較鄭𤣥曰較者車髙檻木也以象鶉火鄭𤣥曰鳥隼為旟州里之所建鶉火朱鳥宿之栁其屬有七星熊旗六斿五仞齊肩以象參伐鄭𤣥曰熊虎為旗師都之所建伐屬白虎宿與參連體而六星龜旐四斿四仞齊首以象營室鄭𤣥曰龜蛇為旐縣鄙之所建營室𤣥武宿與東壁連體而四星弧旌枉矢以象弧也鄭𤣥曰覲禮曰侯氏載龍旂弧韣則旌旗之屬皆有弧也弧以}
  - {type: variant, offset: 17, length: 6, content: 純字伯仁京兆, WYG: 縿之幅有衣謂之韣又為設矢象弧星有矢也妖星有枉矢者蛇行有尾因此云枉矢蓋畫之𤣥注禮含文嘉曰蓋旗有九名日月為常交龍為旂通帛為旃雜帛為物熊虎為旗鳥隼為旟龜蛇為旐全羽為􅀈析羽為旌盧植注禮記曰有鈴曰旂干寳注周禮曰枉矢象妖星非其義也枉蓋應為枉直謂枉矢於弧此諸侯以下之所建者也白虎通曰居車中不内顧也仰即觀天俯即察地前聞和鸞之聲旁見四方之運此車教之道論語曰升車必正立執綏車中不内顧所以有和鸞以正威儀節行舒疾也鸞者在衡和者在軾馬動則鸞鳴鸞鳴則和應其聲名曰和敬舒則不鳴疾則失音明得其和也故詩云和鸞雍雍萬福攸同魯訓曰和設軾者也鸞設衡者也許慎曰詩云八鸞鎗鎗則一馬二鸞也又曰輶車鸞鑣知非衡也毛詩傳曰在軾曰和在鑣曰鸞}
