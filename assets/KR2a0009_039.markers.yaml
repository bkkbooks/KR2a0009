  - {type: variant, offset: 1803, length: 3420, content: 定昔者孝武皇帝光武皇帝封禪告成而禮樂不定事不相副先帝已詔曹襃今陛下但奉而成之猶周公斟酌文武之道非自為制誠無所疑久執謙謙令大漢之業不以時成非所以章顯祖宗功德建太平之基為後世法帝雖善之猶未施行其冬復以病罷明年卒於家子甫嗣官至津城門候甫卒子吉嗣永初三年吉卒無子國除自昭帝封安世至吉傳國八世經歷篡亂二百年閒未嘗譴黜封者莫與為比曹襃字叔通魯國薛人也父充持慶氏禮建武中為博士從巡狩岱宗定封禪禮還受詔議立七郊三雍大射養老禮儀顯宗即位充上言漢再受命仍有封禪之事而禮樂崩闕不可為後嗣法五帝不相沿樂三王不相襲禮大漢當自制禮以示百世帝問制禮樂云何充對曰河圖括地象曰有漢世禮樂文雅出尚書琁機鈐曰有帝漢出德洽作樂名予帝善之下詔曰今且改太樂官曰太予樂歌詩曲操以俟君子拜充侍中作章句辯難於是遂有慶氏學襃少篤志有大度結髮傳充業博雅疎通尤好禮事常感朝廷制度未備慕叔孫通為漢禮儀晝夜研精沈吟專思寢則懷抱筆札行則誦習文書當其念至忘所之適初舉孝廉再遷圉令以禮理人以德化俗時它郡盜徒五人來入圉界吏捕得之陳留太守馬嚴聞而疾惡風縣殺之襃勑吏曰夫絕人命者天亦絕之臯陶不為盜制死刑管仲遇盜而升諸公今承旨而殺之是逆天心順府意也其罰重矣如得全此人命而身坐之吾所願也遂不為殺嚴奏襃耎弱免官歸郡為功曹徵拜博士會肅宗欲制定禮樂元和二年下詔曰河圖稱赤九會昌十世以光十一以興尚書琁機鈐曰述堯理世平制禮樂放唐之文予末小子託于數終曷以纘興崇弘祖宗仁濟元元帝命驗曰順堯考德題期立象且三五步驟優劣殊軌況予頑陋無以克堪雖欲從之末由也已每見圖書中心恧焉襃知帝旨欲有興作乃上疏曰昔者聖人受命而王莫不制禮作樂以著功德功成作樂化定制禮所以救世俗致禎祥為萬姓獲福於皇天者也今皇天降祉嘉瑞並臻制作之符甚於言語宜定文制著成漢禮丕顯祖宗盛德之美章下太常太常巢堪以為一世大典非襃所定不可許帝知羣僚拘攣難與圖始朝廷禮憲宜時刊立明年復下詔曰朕以不德膺祖宗弘烈乃者鸞鳳仍集麟龍並臻甘露宵降嘉穀滋生赤草之類紀于史官朕夙夜祗畏上無以彰于先功下無以克稱靈物漢遭秦餘禮壞樂崩且因循故事未可觀省有知其說者各盡所能襃省詔乃歎息謂諸生曰昔奚斯頌魯考甫詠殷夫人臣依義顯君竭忠彰主行之美也當仁不讓吾何辭哉遂復上疏具陳禮樂之本制改之意拜襃侍中從駕南巡既還以事下三公未及奏詔召玄武司馬班固問改定禮制之宜固曰京師諸儒多能說禮宜廣招集共議得失帝曰諺言作舍道邊三年不成會禮之家名為聚訟互生疑異筆不得下昔堯作大章一夔足矣章和元年正月乃召襃詣嘉德門令小黃門持班固所上叔孫通漢儀十二篇勑襃曰此制散略多不合經今宜依禮條正使可施行於南宮東觀盡心集作襃既受命乃次序禮事依準舊典雜以五經讖記之文撰次天子至於庶人冠婚吉凶終始制度以為百五十篇寫以二尺四寸簡其年十二月奏上帝以衆論難一故但納之不復令有司平奏會帝崩和帝即位襃乃為作章句帝遂以新禮二篇冠擢襃監羽林左騎永元四年遷射聲校尉後太尉張酺尚書張敏等奏襃制漢禮破亂聖術宜加刑誅帝雖寢其奏而漢禮遂不行襃在射聲營舍有停棺不葬者百餘所襃親自履行問其意故吏對曰此等多是建武以來絕無後者不得埋掩襃乃愴然為買空地悉葬其無主者設祭以祀之遷城門校尉將作大匠時有疾疫襃巡行病徒為致醫藥經理饘粥多蒙濟活七年出為河內太守時春夏大旱糧穀踊貴襃到乃省吏并職退去姦殘澍雨數降其秋大孰百姓給足流皆還後坐上災害不實免有頃徵再遷復為侍中襃博物識古為儒者宗十四年卒官作通義十二篇演經雜論百二十篇又傳禮記四十九篇教授諸生千餘人慶氏學遂行於世論曰漢初天下創定朝制無文叔孫通頗採經禮參酌秦法雖適物觀時有救崩敝然先王之容典蓋多闕矣是以賈誼仲舒王吉劉向之徒懷憤歎息所不能已也資文宣之遠圖明懿美而終莫或用故知自燕而觀有不盡矣孝章永言前王明發興作專命禮臣撰定國憲洋洋乎盛德之事焉而業絕天筭議黜異端斯道竟復墜矣夫三王不相襲禮五帝不相樂所以咸莖異調中都殊絕況物運遷回情數萬化制則不能隨其流變品度未足定其滋章斯固世主所當損益者也且樂非夔襄而新音代起律謝臯蘇而制令亟易修補舊文獨何猜焉禮云禮云曷其然哉鄭玄字康成北海高密人也八世祖崇哀帝時尚書僕射玄少為鄉嗇夫得休歸常詣學官不樂為吏父數怒之不能禁遂造太學受業師事京兆第五元先始通京氏易公羊春秋三統歷九章筭術又從東郡張恭祖受周官禮記左氏春秋韓詩古文尚書以山東無足問者乃西入關因涿郡盧植事扶風馬融融門徒四百餘人升堂進者五十餘生融素驕貴玄在門下三年不得見乃使高業弟子傳授於玄玄日夜尋誦未嘗怠倦會融集諸生考論圖緯聞玄善筭乃召見於樓上玄因從質諸疑義問畢辭歸融喟然謂門人曰鄭生今去吾道東矣玄自游學十餘年乃歸鄉里家貧客耕東萊學徒相隨已數百千人及黨事起乃與同郡孫嵩等四十餘人俱被禁錮遂隱修經業杜門不出時任城何休好公羊學遂著公羊墨守左氏膏肓穀梁廢疾玄乃發墨守鍼膏肓起廢疾休見而歎曰康成入吾室操吾矛以伐我乎初中興之後范升陳元李育賈逵之徒爭論古今學後馬融荅北地太守劉瓌及玄荅何休義據通深由是古學遂明靈帝末黨禁解大將軍何進聞而辟之州郡以進權戚不敢違意遂迫脅玄不得已而詣之進為設几杖禮待甚優玄不受朝服而以幅巾見一宿逃去時年六十弟子河內趙商等自遠方至者數千後將軍袁隗表為侍中以父喪不行國相孔融深敬於玄屣履造門告高密縣為玄特立一鄉曰昔齊置士鄉越有君子軍皆異賢之意也鄭君好學實懷明德昔太史公廷尉吳公謁者僕射鄧公皆漢之名臣又南山四皓有園公夏黃公潛光隱耀世嘉其高皆悉稱公然則公者仁德之正號不必三事大夫也今鄭君鄉宜曰鄭公鄉昔東海于公僅有一節猶或戒鄉人侈其門閭矧乃鄭公之德而無駟牡之路可廣開門衢令容高車號為通德門董卓遷都長安公卿舉玄為趙相道斷不至會黃巾寇青部乃避地徐州徐州牧陶謙接以師友之禮建安元年自徐州還高密道遇黃巾賊數萬人見玄皆拜相約不敢入縣境玄後嘗疾篤自慮以書戒子益恩曰吾家舊貧不為父母羣弟所容去廝役之吏游學周秦之都往來幽并兗豫之域獲覲乎在位通人處逸大儒得意者咸從捧手有所受焉遂博稽六蓺粗覽傳記時覩祕書緯術之奧年過四十乃歸供養假田播殖以娛朝夕遇閹尹埶坐黨禁錮十有四年而蒙赦令舉賢良方正有道辟大將軍三司府公車再召比牒併名早為宰相惟彼數公懿德大雅克堪王臣故宜式序吾自忖度無任於此但念述先聖之元意思整百家之不齊亦庶幾以竭吾才故聞命罔從而黃巾為害萍浮南北復歸邦鄉入此歲來已七十矣宿素衰落仍有失誤案之禮典便合傳家今我告爾以老歸爾以事將閑居以安性覃思以終業自非拜國君之命問族親之憂展敬墳墓觀省野物胡嘗扶杖出門乎家事大小汝一承之咨爾焭焭一夫曾無同生相依其勗求君子之道研鑽勿替敬慎威儀以近有德顯譽成於僚友德行立於己志若致聲稱亦有榮於所生可不深念邪可不深念邪吾雖無紱冕之緒頗有讓爵之高自樂以論贊之功庶不遺後人之羞末所憤憤者徒以亡親墳壟未成所好羣書率皆腐敝不得於禮堂寫定傳與其人日西方暮其可圖乎家今差多於昔勤力務時無恤飢寒菲飲食薄衣服節夫二者尚令吾寡恨若忽忘不識亦已焉哉時大將軍袁紹總兵冀州遣使要玄大會賓客玄最後至乃延升上坐身長八尺飲酒一斛秀眉明目容儀溫偉紹客多豪俊並有才說見玄儒者未以通人許之競設異端百家互起玄依方辯對咸出問表皆得所未聞莫不嗟服時汝南應劭亦歸於紹因自贊曰故太山太守應中遠北面稱弟子何如玄笑曰仲尼之門考以四科回賜之徒不稱官閥劭有慙色紹乃舉玄茂才表為左中郎將皆不就公車徵為大司農給安車一乘所過長吏送迎玄乃以病自乞還家五年春夢孔子告之曰起起今年歲在辰來年歲在巳既寤以讖合之知命當終有頃寢疾時袁紹與曹操相拒於官度令其子譚遣使逼玄隨軍不得已載病到元城縣疾篤不進其年六月卒年七十四遺令薄葬自郡守以下嘗受業者縗絰赴會千餘人門人相與撰玄荅諸弟子問五經依論語作鄭志八篇凡玄所注周易尚書毛詩儀禮禮記論語孝經尚書大傳中候乾象歷又著天文七政論魯禮禘祫義六蓺論毛詩譜駮許慎五經異義荅臨孝存周禮難凡百餘萬言玄質於辭訓通人頗譏其繁至於經傳洽孰稱為純儒齊魯閒宗之其門人山陽郗慮至御史大夫東萊王基清河崔琰著名於世又樂安國淵任嘏時並童幼玄稱淵為國器嘏有道德其餘亦多所鑒拔皆如其言玄唯有一子益恩孔融在北海舉為孝廉及融為黃巾所圍益恩赴難隕身有遺腹子玄以其手文似己名之曰小同論曰自秦焚六經聖文埃滅漢興諸儒頗修蓺文及東京學者亦各名家而守文之徒滯固所稟異端紛紜互相詭激遂令經有數家家有數說章句多者或乃百餘萬言學徒勞而少功後生疑而莫正鄭玄括囊大典網羅衆家刪裁繁誣刊改漏失自是學者略知所歸王父豫章君每考先儒經訓而長於玄常以為仲尼之門不能過也及傳授生徒並專以鄭氏家法云贊曰富平之緒承家載世伯仁先歸釐我國祭玄定義乖襃修禮缺孔書遂明漢章中輟, WYG: 證}
  - {type: variant, offset: 1803, length: 3420, content: 定昔者孝武皇帝光武皇帝封禪告成而禮樂不定事不相副先帝已詔曹襃今陛下但奉而成之猶周公斟酌文武之道非自為制誠無所疑久執謙謙令大漢之業不以時成非所以章顯祖宗功德建太平之基為後世法帝雖善之猶未施行其冬復以病罷明年卒於家子甫嗣官至津城門候甫卒子吉嗣永初三年吉卒無子國除自昭帝封安世至吉傳國八世經歷篡亂二百年閒未嘗譴黜封者莫與為比曹襃字叔通魯國薛人也父充持慶氏禮建武中為博士從巡狩岱宗定封禪禮還受詔議立七郊三雍大射養老禮儀顯宗即位充上言漢再受命仍有封禪之事而禮樂崩闕不可為後嗣法五帝不相沿樂三王不相襲禮大漢當自制禮以示百世帝問制禮樂云何充對曰河圖括地象曰有漢世禮樂文雅出尚書琁機鈐曰有帝漢出德洽作樂名予帝善之下詔曰今且改太樂官曰太予樂歌詩曲操以俟君子拜充侍中作章句辯難於是遂有慶氏學襃少篤志有大度結髮傳充業博雅疎通尤好禮事常感朝廷制度未備慕叔孫通為漢禮儀晝夜研精沈吟專思寢則懷抱筆札行則誦習文書當其念至忘所之適初舉孝廉再遷圉令以禮理人以德化俗時它郡盜徒五人來入圉界吏捕得之陳留太守馬嚴聞而疾惡風縣殺之襃勑吏曰夫絕人命者天亦絕之臯陶不為盜制死刑管仲遇盜而升諸公今承旨而殺之是逆天心順府意也其罰重矣如得全此人命而身坐之吾所願也遂不為殺嚴奏襃耎弱免官歸郡為功曹徵拜博士會肅宗欲制定禮樂元和二年下詔曰河圖稱赤九會昌十世以光十一以興尚書琁機鈐曰述堯理世平制禮樂放唐之文予末小子託于數終曷以纘興崇弘祖宗仁濟元元帝命驗曰順堯考德題期立象且三五步驟優劣殊軌況予頑陋無以克堪雖欲從之末由也已每見圖書中心恧焉襃知帝旨欲有興作乃上疏曰昔者聖人受命而王莫不制禮作樂以著功德功成作樂化定制禮所以救世俗致禎祥為萬姓獲福於皇天者也今皇天降祉嘉瑞並臻制作之符甚於言語宜定文制著成漢禮丕顯祖宗盛德之美章下太常太常巢堪以為一世大典非襃所定不可許帝知羣僚拘攣難與圖始朝廷禮憲宜時刊立明年復下詔曰朕以不德膺祖宗弘烈乃者鸞鳳仍集麟龍並臻甘露宵降嘉穀滋生赤草之類紀于史官朕夙夜祗畏上無以彰于先功下無以克稱靈物漢遭秦餘禮壞樂崩且因循故事未可觀省有知其說者各盡所能襃省詔乃歎息謂諸生曰昔奚斯頌魯考甫詠殷夫人臣依義顯君竭忠彰主行之美也當仁不讓吾何辭哉遂復上疏具陳禮樂之本制改之意拜襃侍中從駕南巡既還以事下三公未及奏詔召玄武司馬班固問改定禮制之宜固曰京師諸儒多能說禮宜廣招集共議得失帝曰諺言作舍道邊三年不成會禮之家名為聚訟互生疑異筆不得下昔堯作大章一夔足矣章和元年正月乃召襃詣嘉德門令小黃門持班固所上叔孫通漢儀十二篇勑襃曰此制散略多不合經今宜依禮條正使可施行於南宮東觀盡心集作襃既受命乃次序禮事依準舊典雜以五經讖記之文撰次天子至於庶人冠婚吉凶終始制度以為百五十篇寫以二尺四寸簡其年十二月奏上帝以衆論難一故但納之不復令有司平奏會帝崩和帝即位襃乃為作章句帝遂以新禮二篇冠擢襃監羽林左騎永元四年遷射聲校尉後太尉張酺尚書張敏等奏襃制漢禮破亂聖術宜加刑誅帝雖寢其奏而漢禮遂不行襃在射聲營舍有停棺不葬者百餘所襃親自履行問其意故吏對曰此等多是建武以來絕無後者不得埋掩襃乃愴然為買空地悉葬其無主者設祭以祀之遷城門校尉將作大匠時有疾疫襃巡行病徒為致醫藥經理饘粥多蒙濟活七年出為河內太守時春夏大旱糧穀踊貴襃到乃省吏并職退去姦殘澍雨數降其秋大孰百姓給足流皆還後坐上災害不實免有頃徵再遷復為侍中襃博物識古為儒者宗十四年卒官作通義十二篇演經雜論百二十篇又傳禮記四十九篇教授諸生千餘人慶氏學遂行於世論曰漢初天下創定朝制無文叔孫通頗採經禮參酌秦法雖適物觀時有救崩敝然先王之容典蓋多闕矣是以賈誼仲舒王吉劉向之徒懷憤歎息所不能已也資文宣之遠圖明懿美而終莫或用故知自燕而觀有不盡矣孝章永言前王明發興作專命禮臣撰定國憲洋洋乎盛德之事焉而業絕天筭議黜異端斯道竟復墜矣夫三王不相襲禮五帝不相樂所以咸莖異調中都殊絕況物運遷回情數萬化制則不能隨其流變品度未足定其滋章斯固世主所當損益者也且樂非夔襄而新音代起律謝臯蘇而制令亟易修補舊文獨何猜焉禮云禮云曷其然哉鄭玄字康成北海高密人也八世祖崇哀帝時尚書僕射玄少為鄉嗇夫得休歸常詣學官不樂為吏父數怒之不能禁遂造太學受業師事京兆第五元先始通京氏易公羊春秋三統歷九章筭術又從東郡張恭祖受周官禮記左氏春秋韓詩古文尚書以山東無足問者乃西入關因涿郡盧植事扶風馬融融門徒四百餘人升堂進者五十餘生融素驕貴玄在門下三年不得見乃使高業弟子傳授於玄玄日夜尋誦未嘗怠倦會融集諸生考論圖緯聞玄善筭乃召見於樓上玄因從質諸疑義問畢辭歸融喟然謂門人曰鄭生今去吾道東矣玄自游學十餘年乃歸鄉里家貧客耕東萊學徒相隨已數百千人及黨事起乃與同郡孫嵩等四十餘人俱被禁錮遂隱修經業杜門不出時任城何休好公羊學遂著公羊墨守左氏膏肓穀梁廢疾玄乃發墨守鍼膏肓起廢疾休見而歎曰康成入吾室操吾矛以伐我乎初中興之後范升陳元李育賈逵之徒爭論古今學後馬融荅北地太守劉瓌及玄荅何休義據通深由是古學遂明靈帝末黨禁解大將軍何進聞而辟之州郡以進權戚不敢違意遂迫脅玄不得已而詣之進為設几杖禮待甚優玄不受朝服而以幅巾見一宿逃去時年六十弟子河內趙商等自遠方至者數千後將軍袁隗表為侍中以父喪不行國相孔融深敬於玄屣履造門告高密縣為玄特立一鄉曰昔齊置士鄉越有君子軍皆異賢之意也鄭君好學實懷明德昔太史公廷尉吳公謁者僕射鄧公皆漢之名臣又南山四皓有園公夏黃公潛光隱耀世嘉其高皆悉稱公然則公者仁德之正號不必三事大夫也今鄭君鄉宜曰鄭公鄉昔東海于公僅有一節猶或戒鄉人侈其門閭矧乃鄭公之德而無駟牡之路可廣開門衢令容高車號為通德門董卓遷都長安公卿舉玄為趙相道斷不至會黃巾寇青部乃避地徐州徐州牧陶謙接以師友之禮建安元年自徐州還高密道遇黃巾賊數萬人見玄皆拜相約不敢入縣境玄後嘗疾篤自慮以書戒子益恩曰吾家舊貧不為父母羣弟所容去廝役之吏游學周秦之都往來幽并兗豫之域獲覲乎在位通人處逸大儒得意者咸從捧手有所受焉遂博稽六蓺粗覽傳記時覩祕書緯術之奧年過四十乃歸供養假田播殖以娛朝夕遇閹尹埶坐黨禁錮十有四年而蒙赦令舉賢良方正有道辟大將軍三司府公車再召比牒併名早為宰相惟彼數公懿德大雅克堪王臣故宜式序吾自忖度無任於此但念述先聖之元意思整百家之不齊亦庶幾以竭吾才故聞命罔從而黃巾為害萍浮南北復歸邦鄉入此歲來已七十矣宿素衰落仍有失誤案之禮典便合傳家今我告爾以老歸爾以事將閑居以安性覃思以終業自非拜國君之命問族親之憂展敬墳墓觀省野物胡嘗扶杖出門乎家事大小汝一承之咨爾焭焭一夫曾無同生相依其勗求君子之道研鑽勿替敬慎威儀以近有德顯譽成於僚友德行立於己志若致聲稱亦有榮於所生可不深念邪可不深念邪吾雖無紱冕之緒頗有讓爵之高自樂以論贊之功庶不遺後人之羞末所憤憤者徒以亡親墳壟未成所好羣書率皆腐敝不得於禮堂寫定傳與其人日西方暮其可圖乎家今差多於昔勤力務時無恤飢寒菲飲食薄衣服節夫二者尚令吾寡恨若忽忘不識亦已焉哉時大將軍袁紹總兵冀州遣使要玄大會賓客玄最後至乃延升上坐身長八尺飲酒一斛秀眉明目容儀溫偉紹客多豪俊並有才說見玄儒者未以通人許之競設異端百家互起玄依方辯對咸出問表皆得所未聞莫不嗟服時汝南應劭亦歸於紹因自贊曰故太山太守應中遠北面稱弟子何如玄笑曰仲尼之門考以四科回賜之徒不稱官閥劭有慙色紹乃舉玄茂才表為左中郎將皆不就公車徵為大司農給安車一乘所過長吏送迎玄乃以病自乞還家五年春夢孔子告之曰起起今年歲在辰來年歲在巳既寤以讖合之知命當終有頃寢疾時袁紹與曹操相拒於官度令其子譚遣使逼玄隨軍不得已載病到元城縣疾篤不進其年六月卒年七十四遺令薄葬自郡守以下嘗受業者縗絰赴會千餘人門人相與撰玄荅諸弟子問五經依論語作鄭志八篇凡玄所注周易尚書毛詩儀禮禮記論語孝經尚書大傳中候乾象歷又著天文七政論魯禮禘祫義六蓺論毛詩譜駮許慎五經異義荅臨孝存周禮難凡百餘萬言玄質於辭訓通人頗譏其繁至於經傳洽孰稱為純儒齊魯閒宗之其門人山陽郗慮至御史大夫東萊王基清河崔琰著名於世又樂安國淵任嘏時並童幼玄稱淵為國器嘏有道德其餘亦多所鑒拔皆如其言玄唯有一子益恩孔融在北海舉為孝廉及融為黃巾所圍益恩赴難隕身有遺腹子玄以其手文似己名之曰小同論曰自秦焚六經聖文埃滅漢興諸儒頗修蓺文及東京學者亦各名家而守文之徒滯固所稟異端紛紜互相詭激遂令經有數家家有數說章句多者或乃百餘萬言學徒勞而少功後生疑而莫正鄭玄括囊大典網羅衆家刪裁繁誣刊改漏失自是學者略知所歸王父豫章君每考先儒經訓而長於玄常以為仲尼之門不能過也及傳授生徒並專以鄭氏家法云贊曰富平之緒承家載世伯仁先歸釐我國祭玄定義乖襃修禮缺孔書遂明漢章中輟, krp: 證}
