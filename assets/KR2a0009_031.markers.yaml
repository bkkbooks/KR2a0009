  - {type: variant, offset: 2185, length: 163, content: 之知命兮大老之貴玄德與道其孰寶兮名與身其孰親陂山谷而閒處兮守寂寞而存神夫莊周之釣魚兮辭卿相之顯位於陵子之灌園兮似至人之髣髴蓋隱約而得道兮羌窮悟而入術離塵垢之窈冥兮配喬松之妙節惟吾志之所庶兮固與俗其不同既俶儻而高引兮願觀其從容顯宗即位又多短衍以文過其實遂廢於家衍娶北地女任氏女為妻悍忌不得畜媵妾兒女常自操井臼老竟逐之遂埳壈於時然, WYG: 杜預曰縣東南}
