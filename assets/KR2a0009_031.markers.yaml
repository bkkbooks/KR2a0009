  - {type: variant, offset: 2743, length: 7, content: 馮衍夫然義直所, WYG: 此又首鄉注左傳桓八年齊侯師于首止應作僖五年齊侯會于首止杜預曰有首止城應作有首鄉林邑有沛廟沛當作泲湖陸故湖陵章帝更名注王莽改曰湖陸章帝復其號臣召南按前書湖陵莽曰湖陸蓋自光武中興郡縣名皆復其舊至章帝又改湖陵為湖陸也琅邪國注秦置建武中省城陽國}
