  - {type: variant, offset: 11, length: 1, content: 第, WYG: 宣二年鄭破宋師大棘杜預曰在襄邑縣南有首鄉左傳桓八年齊侯師于首止杜預曰在襄邑東南有首止城考城古菑陳留志曰古戴國地名杜預曰戴在外黄東南爾雅曰木立死曰菑吕氏春秋草鬱即為菑章帝更名故屬梁陳留志曰有箕子祠有穀亭古句瀆之丘案本傳有蒲亭圉故屬淮陽有髙陽亭陳留志曰有萬人聚王邑破翟義積尸處前書今髙陽文頴曰髙陽聚邑名在縣西扶溝故屬淮陽東郡秦置去雒陽八百餘里十五城户十三萬六千八}
