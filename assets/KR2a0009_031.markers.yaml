  - {type: variant, offset: 29, length: 4, content: 略而陳平, WYG: 墟杜預曰帝丘昆吾氏因}
  - {type: variant, offset: 29, length: 4, content: 略而陳平, krp: 墟杜預曰帝丘昆吾氏因}
  - {type: variant, offset: 34, length: 352, content: 謀毀之則疏譽之則親以文帝之明而魏尚之忠繩之以法則為罪施之以德則為功逮至晚世董仲舒言道德見妒於公孫弘李廣奮節於匈奴見排於衞青此忠臣之常所為流涕也臣衍自惟微賤之臣上無無知之薦下無馮唐之說乏董生之才寡李廣之埶而欲免讒口濟怨嫌豈不難哉敢回行求時之利事君無傾邪之謀將帥無虜掠之心衞尉陰興敬慎周密內自修勑外遠嫌疑故敢與交通興知臣之貧數欲本業之臣自惟無三益之才不敢處三損之地固讓而不受之昔在更始太原執貨財之柄居蒼卒之閒據位食祿二十餘年而財產歲狹居處日貧家無布帛之積出無輿馬之飾於今遭清明之時飭躬力行之秋而怨讎叢興譏議橫世蓋富貴易為善貧賤難為工也疏遠壠畝之臣無望高闕之下惶恐自陳以救罪尤衍不得志退而作賦又自論曰馮子以為夫人之德不碌碌如玉落落如石風興雲蒸一龍一蛇與道翺翔與時變化夫豈守一節哉用之則行舍之則臧進退無主屈申無常, WYG: ''}
