  - {type: variant, offset: 847, length: 493, content: 險兮哀好惡之無常棄衡石而意量兮隨風波而飛揚紛綸流於權利兮親靁同而妒異獨耿介而慕古兮豈時人之所憙沮先聖之成論兮名賢之高風忽道德之珍麗兮務富貴之樂耽遵大路而回兮履孔德之窈冥固衆夫之所眩兮孰能觀於無形行勁直以離尤兮羌前人之所有內自省而不慙兮遂定志而弗改欣吾黨之唐虞兮愍吾生之愁勤聊發憤而揚情兮將以蕩夫憂心往者不可攀援兮來者不可與期病沒世之不稱兮願橫逝而無由而臨嶭兮聽涇渭之波聲顧鴻門而歔欷兮哀吾孤之早零何天命之不純兮信吾罪之所生傷誠善之無辜兮齎此恨而入冥嗟我思之不遠兮豈敗事之可悔雖九死而不眠兮恐余殃之有再淚汍瀾而雨集兮氣滂浡而雲披心怫鬱而紆結兮意沈抑而內悲而日邁兮壽冉冉其不與恥功業之無成兮赴原野而窮處昔伊尹之干湯兮七十說而乃信臯陶釣於靁澤兮賴虞舜而後親無二士之遭遇兮抱忠貞而莫達率妻子而耕耘兮委厥美而不伐韓盧抑而不縱兮騏驥絆而不試獨慷慨而遠覽兮非庸庸之所識卑衛賜之阜貨兮高顏回之所慕重祖考之洪烈兮故收功於此路循四時之代謝兮分五土之刑德相林麓之所產兮嘗水泉之所殖修神農之本業兮採軒轅之奇策追周棄之遺教兮軼范蠡之絕迹陟隴山以踰望兮眇然覽於八荒風波飄其並興兮情惆悵而增傷覽河華之泱漭兮望秦晉之故, WYG: ''}
