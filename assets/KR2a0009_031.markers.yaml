  - {type: variant, offset: 1341, length: 492, content: 憤馮亭之不遂兮慍去疾之遭惑之舊居兮歷宋楚之名都哀羣后之不祀兮痛列國之為墟馳中夏而升降兮路紆軫而多艱講聖哲之通論兮心愊憶而紛紜惟天路之同軌兮或帝王之異政堯舜煥其蕩蕩兮禹承平而革命并日夜而幽思兮終悇憛而洞疑高陽其超遠兮世孰可與論茲訊夏啟於甘澤兮傷帝典之始傾頌成康之載德兮詠南風之歌聲思唐虞之晏晏兮揖稷契與為朋苗裔紛其條暢兮至湯武而勃興昔三后之純粹兮每季世而窮禍弔夏桀於南巢兮哭殷紂於牧野詔伊尹於亳郊兮享呂望於酆洲功與日月齊光兮名與三王爭流識微兮愍王道之將崩拔周唐之盛德兮捃桓文之譎功忿戰國之遘禍兮憎權臣之彊黜楚子於南郢兮執趙武於湨梁善忠信之救時兮惡詐謀之妄作聘申叔於陳蔡兮禽荀息於虞誅犂鉏之介聖兮討臧倉之愬知子反於彭城兮爵管仲於夷儀疾兵革之滋兮苦攻伐之萌生沈孫武於五湖兮斬白起於長平惡叢巧之亂世兮毒從橫之敗俗流蘇秦於洹水兮幽張儀於鬼谷澄德化之陵兮烈刑罰之峭峻燔商鞅之法術兮燒韓非之說論誚始皇之跋扈兮投李斯於四裔滅先王之法則兮禍淫而弘大援前聖以制中兮矯二主之驕奢饁女齊於絳臺兮饗椒舉於章華摛道德之光耀兮匡衰世之眇風襃宋襄於泓谷兮表季札於延陵摭仁智之英華兮激亂國之末流觀鄭僑於溱洧兮訪晏嬰於營, WYG: 頓}
