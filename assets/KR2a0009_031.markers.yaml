  - {type: variant, offset: 1973, length: 211, content: 於金山鑿巖石而為室兮託高陽以養仙神雀翔於鴻崖兮玄武潛於嬰冥伏朱樓而四望兮採三秀之華英纂前修之夸節兮曜往昔之光勳披綺季之麗服兮揚屈原之靈芬高吾冠之岌岌兮長吾佩之洋洋飲六醴之清液兮食五芝之茂英雜蘼蕪兮搆木蘭與新夷光扈扈而煬燿兮紛郁郁而暢美華芳曄其發越兮時恍忽而莫貴非惜身之埳軻兮憐衆美之憔悴游精神於大宅兮抗玄妙之常操處清靜以養志兮實吾心之所樂山峨峨而造天兮林冥冥而暢茂鸞回翔索其羣兮鹿哀鳴而求其友誦古今以散思兮覽聖賢以自鎮嘉孔, WYG: 通曰帝嚳冢在城臺隂野是也東阿左傳桓十年㑹于桃}
