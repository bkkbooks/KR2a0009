  - {type: variant, offset: 2349, length: 281, content: 大志不戚戚於賤貧居常慷慨歎曰衍少事名賢經歷顯位懷金垂紫揭節奉使不求苟得常有陵雲之志三公之貴千金之富不得其願不㮣於懷貧而不衰賤而不恨年雖疲曳猶庶幾名賢之風修道德於幽冥之路以終身名為後世法居貧年老卒于家所著賦誄銘說問交德誥慎情書記說自序官錄說策五十篇肅宗甚重其文子豹豹字仲文年十二母為父所出後母惡之嘗因豹夜寐欲行毒害豹逃走得免敬事愈謹而母疾之益深時人稱其孝長好儒學以詩春秋教麗山下鄉里為之語曰道德彬彬馮仲文舉孝廉拜尚書郎忠勤不懈每奏事未報常俯伏省閤或從昏至明肅宗聞而嘉之使黃門持被覆豹勑令勿驚由是數加賞賜是時方平西域以豹有才謀拜為河西副校尉和帝初數言邊事奏置戊己校尉, WYG: 桃}
