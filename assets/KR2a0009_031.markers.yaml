  - {type: variant, offset: 2736, length: 0, content: '', krp: 地東有淮潁煮棗成陽有堯冢靈臺有雷澤禹貢曰雷夏既澤帝王世紀曰舜耕歴山漁雷澤濟陰有歴山乗氏侯國博物記曰古乗丘有泗水有鹿城鄉句陽有垂亭左傳隠八年遇于垂史記無忌説魏安僖王曰文臺隳垂都焚徐廣曰縣有垂亭鄄城離狐故屬東郡廩丘故屬東郡有髙魚城有運城左傳襄二十六年齊烏餘以廩丘奔晉杜預曰今縣故城是又襲衞羊角取之杜預曰今縣所治城又襲我髙魚杜預曰在縣東北單父侯國故屬山陽成武故屬山陽左傳隠七年戎執凡伯}
  - {type: variant, offset: 2737, length: 0, content: '', WYG: 楚丘杜預曰在縣西南有郜城左傳隠十年取郜杜預曰縣東南有郜城地道記有秺城已氏故屬梁皇覽曰有平和鄉鄉有伊尹冢右兗州刺史部郡國八縣邑公侯國八十東海郡髙帝置雒陽東千五百里十三城户十四萬八千七百八十四口七十萬六千四百一十六剡本國刺史治博物記曰有勇王亭即勇士菑丘欣蘭陵有次室亭地道記曰故魯次室邑列女傳有漆室之女或作次室戚胊山海經曰都洲在海中一曰郁洲郭璞曰在縣界世俗傳此山在蒼梧徙來上皆有南方樹木博物記縣東北海邊植石秦所立之東門有鐵有伊盧鄉史記曰鍾離昧冢在伊盧襄賁昌慮有藍鄉左傳昭三十一年邾黒肱以濫來奔杜預曰縣所治城東北有郳城郳小邾國也承陰平利城合城漷水自北南至湖陸祝其有羽山殛鯀之山杜預曰在縣西南博物記曰東北獨居山西南有淵水即羽泉也俗謂此山為懲父山春秋時曰祝其夾谷地左傳定十年㑹齊侯夾谷孔子相厚丘左傳成九年城中城杜預曰在縣西南有中鄉城贛榆本屬琅邪建初五年復左傳齊伐莒莒子奔紀鄣杜預曰縣東北有紀城地道記曰海中去岸百九十步有秦始皇碑長一丈八尺廣五尺厚八尺三寸一行十三字潮水至加其上三丈去則三尺見也琅邪國秦置建武中省城陽國以其縣屬案本紀永夀元年置都尉治雒陽東一千五百里十三城户二萬八百四口五十七萬九百六十七開陽杜預曰古鄅左傳哀三年城啓陽杜預曰開陽故屬東海建初五年屬東武琅邪山海經曰有琅邪臺在渤海間琅邪之東郭璞曰琅邪臨海邊有山嶕嶢特起狀如髙臺此即琅邪臺齊景公曰吾循海而南放乎琅邪越絶曰句踐徙琅邪起觀臺臺周七里以望東海史記曰秦始皇徙黔首三萬户琅邪臺下傳有勞山東莞有鄆亭左傳曰公處鄆有邳鄉有公來山或曰古浮來左傳隠八年盟浮來杜預曰邳來山之間號曰邳來莊九年}
