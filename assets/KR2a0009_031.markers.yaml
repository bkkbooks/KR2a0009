  - {type: variant, offset: 2733, length: 1, content: 雖, WYG: 更名有河牧城左傳文元年㑹于戚鄭救晉中行氏晉敗鄭鐵杜預曰戚城南有鐵丘有竿城前書故發干縣穀城春秋時小穀左傳莊三十二年城小穀杜預曰城中有管仲井又傳曰埋長狄榮如首於周首之北門杜預曰縣東北有周首亭有巂下聚左傳僖二十六年追齊師至酅杜預曰縣西有地名酅下皇覽曰縣東十五里有項羽冢東平國故梁景帝分為濟東國宣帝改雒陽東九百七十五里七城户七萬九千一十二口四十四萬八千二百七十無鹽本宿國任姓左傳昭二十五年臧㑹奔郈杜預曰縣東南有郈鄉亭有章城古國左傳莊三十年齊取鄣東平陸六國時曰平陸有闞亭左傳桓十一年㑹于闞杜預曰在須昌縣東南有闞城博物記云即此亭是有堂陽亭故縣後省富成章夀張春秋曰良漢曰夀良光武改曰夀張有堂聚故聚屬東郡地道記曰有蚩尤祠狗城皇覽曰蚩尤冡在縣闞城中髙七丈須昌故屬東郡杜預曰須句古國在西北有致宻城古中都有陽穀城左傳僖三年㑹陽穀杜預曰在縣北寧陽故屬泰山任城國章帝元和元年分東平為任城雒陽東千一百里三城户三萬六千四百四十二口十九萬四千一百五十六任城本任國有桃聚光武破龎萌於桃鄉亢父左傳襄十三年取邿杜預曰縣有邿亭哀六年城邾瑕杜預曰縣北有邾瑕城樊泰山郡髙帝置雒陽東千四百里十二城户八千九百二十九口四十三萬七千三百一十七奉髙有明堂武帝造前書曰在縣西南四里左傳昭八年大蒐于紅至于商衞紅亭在縣西北杜預曰接宋衞也博有泰山廟岱山在西北有龜山左傳定十年齊歸龜陰之田杜預曰田在山北琴操孔子作龜山之操有龍鄉城左傳成二年齊圍龍杜預曰在縣西南史記作隆又楚有蜀之役杜預曰縣西北有蜀亭梁甫侯國有莵裘聚左傳隠公使營莵裘吾將老焉杜預曰縣南有莵裘城鉅平侯國有亭禪山即古所禪亭亭者也有陽關亭左傳襄十七年師自陽關桓六年㑹于成杜預曰縣東南成城即孟孫之邑嬴有鐵山荏侯國萊蕪有原山潘水出杜預曰汶水出蓋沂水出左傳㑹于防杜預曰在縣東南有防城南武陽侯國有顓臾城南城故屬東海有東陽城吕氏春秋夏孔甲遊田于東陽萯山左傳哀八年克東陽襄十九年城武城杜預曰南城縣哀十四年司馬𦵏丘輿杜預曰縣西北有輿城費侯國曹騰封費是鄼縣費亭非此國故屬東海有祊亭左傳隠八年鄭歸祊杜預曰在縣東南閔二年莒人歸共仲及宻杜預曰縣有宻如亭有台亭左傳襄十二年莒圍台杜預曰縣南有台亭牟故國濟北國和帝永元二年分泰山置臣昭案濟北前漢之舊國此是經并泰山復分雒陽東千一百五十里五城户四萬五千六百八十九口二十三萬五千八百九十七盧左傳隠三年齊鄭尋盧之盟杜預曰今縣故城有邾山在縣北成二年封鋭司徒女石窌杜預曰縣東有地名石窌有平陰城有防門左傳襄十八年齊禦晉平陰塹防門杜預曰在縣北又齊登巫山以望晉師杜預曰在縣東北有光里有景兹山杜預曰在縣東南有敖山左傳曰先君獻武廢二山即敖山具山有清亭左傳哀十一年齊伐魯及清是也有長城至東海史記蘇代説燕王曰齊有長城巨防巨防即防門蛇丘有遂鄉古遂國左傳莊十三年齊人滅遂有下讙亭左傳桓三年送姜氏于讙有鑄郷城周武王未及下車封堯後於鑄左傳有棘地成公三年叔孫僑如所圍杜預曰汶水北地有棘鄉東觀書有芳陘山成本國左傳衞師入郕杜預曰東平剛父縣西南有郕鄉茌平本屬東郡剛左傳哀八年齊取闡杜預曰在縣北有闡鄉山陽郡故梁景帝分置雒陽東八百一十里十城户十萬九千八百九十八口六十萬六千九十一昌邑刺史治有梁丘城左傳莊三十二年遇于梁丘杜預曰梁丘鄉在縣西南有甲父亭杜預曰甲父古國名在縣東南左傳隠十年取防杜預曰縣西有防城東緡春秋時曰緡左傳僖二十三年齊圍緡鉅野左傳桓七年焚咸丘杜預曰縣西有咸亭有大野澤春秋西狩獲麟之所爾雅十藪魯有大野杜預曰縣西南有郥亭定十三年齊伐晉之所髙平侯國故槖章帝更名前漢志莽改曰髙平章帝復莽此號左傳隠九年費伯城郎杜預曰縣東南有郁郎亭有茅鄉城杜預曰茅鄉在昌邑西南湖陸故湖陵章帝更名前漢志王莽改曰湖陸章帝復其號博物記曰茍水出地道記縣西有費亭城魏武帝初封所南平陽侯國有漆亭左傳城漆有閭丘亭左傳襄二十一年邾庶其以漆閭丘來奔杜預曰縣東北有漆鄉西北有顯閭亭哀七年囚邾子負瑕杜預曰縣西北有瑕丘城方與有武唐亭左傳桓二年盟于唐杜預曰在西南魯侯觀魚臺春秋經隠五年矢魚于棠有泥母亭或曰古甯母左傳僖七年盟甯母杜預曰在縣東三十一年臧文仲宿重館杜預曰縣西北有重鄉城瑕丘金鄉晉地道記曰縣多山所治名金山山北有鑿石為冢深十餘丈隧長三十丈傍却入為堂三方云}
