  - {type: variant, offset: 2742, length: 0, content: '', WYG: 西征記曰有沂水自城西西南注泗别下廻城南亦注泗舊有橋處張良與黄石公㑹此橋葛嶧山本嶧陽山山出名桐伏滔北征記曰今槃根往往而存有鐵徐本國有樓亭或曰古蔞林杜預曰在僮縣東南伏滔北征記曰縣北有大冢徐君墓延陵解劒之處僮侯國睢陵下相淮陰下鄉有南昌亭韓信寄食處淮浦盱台髙山潘旌淮陵取慮有蒲姑陂左傳昭十六年齊師至蒲隧杜預曰縣東有蒲姑陂東城曲陽侯國故屬東海司吾侯國故屬東海良城故屬東海春秋時曰良左傳昭十三年晉㑹吳于良夏丘故屬沛右徐州刺史部郡國五縣邑侯國六十二魏氏春秋曰初平三年分琅邪東海為城陽新城昌慮郡建安十一年省昌慮并東海後漢書卷三十一後漢書卷三十一考證郡國志三已吾有大棘鄉有首鄉臣召南按此二鄉注皆應在上文襄邑有承匡城之下大棘首鄉皆襄邑地非巳吾地也不知何以脱入}
