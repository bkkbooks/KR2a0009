  - {type: variant, offset: 1834, length: 137, content: 日曀曀其將暮兮獨於邑而煩惑夫何九州之博大兮迷不知路之南北駟素虯而馳騁兮乘翠雲而相佯就伯夷而折中兮得務光而愈明發子高於中野兮遇伯成而定慮欽真人之德美兮淹躊躇而弗去意斟愖而不澹兮俟回風而容與求善卷之所存兮遇許由於負黍軔吾車於箕陽兮秣吾馬於潁滸聞至言而曉領兮還吾反乎故宇於滄海兮豢, WYG: ''}
