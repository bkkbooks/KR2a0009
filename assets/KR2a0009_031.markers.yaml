  - {type: variant, offset: 4, length: 0, content: '', WYG: 三十一梁剡令劉昭補并注郡國志第二十一郡國三兗州陳留泰山東郡濟北東平山陽任城濟陰徐州東海廣陵琅邪下邳彭城陳留郡武帝置雒陽東五百三十里十七城户十七萬七千五百二十九口八十六萬九千四百三十三陳留有鳴鴈亭左傳成十六年衛伐鄭鳴鴈杜預曰在縣西北陳留志曰有桐陵亭古桐丘浚儀本大梁帝王世紀曰禹避商均浚儀晉地道記儀封人此縣也通俗文曰渠在浚儀曰莨蕩也尉氏陳留志曰有陵樹鄉北有澤澤有天子苑囿有秦樂廐漢諸帝以馴養猛獸雍丘本杞國陳留志曰城内有神井能興霧雹案北征記曰有吕祿臺髙七丈有酈生祠曹植禹廟讃曰有禹祠植移于其城城本名杞城襄邑有滑亭左傳莊三年次于滑杜預曰在縣西北有承匡城地道記曰在縣西左傳文十一年㑹晉郤缺于承匡有桐門亭有黄門亭襄元年㑹鄫杜預曰縣東南有鄫城外黄左傳惠公季年敗宋師于黄杜預曰宋邑縣東有黄城有葵丘聚齊桓公㑹此城中有曲棘里左傳昭二十五年宋公佐卒曲棘有繁陽城小黄漢舊儀曰髙祖母起兵時死縣北為作陵廟於小黄東昏陳留志曰故户牖鄉有陳平祠濟陽有武父鄉左傳桓十二年盟于武父杜預曰縣東北有武父城縣東南有武城縣都鄉有行宫光武生平丘有臨濟亭田儋死此有匡匡人之亭曹公破袁術處有黄池亭陳留志云黄亭在封丘左傳哀十三年盟黄池杜預曰在縣南傳曰吳囚子服景伯以還及户牖然即黄池在户牖西或以為外黄縣東溝非也封丘博物記有秋溝即敗狄于長丘是也有桐牢亭或曰古蟲牢左傳成五年諸侯㑹蟲牢陳留志有鞠亭古鞠居酸棗左傳鄭太叔至于廩延杜預曰縣北有延津襄五年㑹城棣杜預曰縣西南有棣城東有地烏巢曹公破袁紹處陳留志曰城内有韓王故宫闕長垣侯國有匡城陳留志曰孔子囚此北征記城周三里左傳僖十五年㑹牡丘次于匡杜預曰匡在縣西南昭十三年㑹平丘杜預曰縣西有平丘城有蒲城左傳成九年㑹于蒲杜預曰在縣西南史記曰孔子自匡過蒲陳留志云有子路祠有祭城杜預曰鄭祭封人仲邑陳留志曰有蘧伯玉墓及祠又西南有宛亭左傳僖}
