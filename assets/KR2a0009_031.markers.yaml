  - {type: variant, offset: 2737, length: 0, content: '', krp: 楚丘杜預曰在縣西南有郜城左傳隠十年取郜杜預曰縣東南有郜城地道記有秺城已氏故屬梁皇覽曰有平和鄉鄉有伊尹冢右兗州刺史部郡國八縣邑公侯國八十東海郡髙帝置雒陽東千五百里十三城户十四萬八千七百八十四口七十萬六千四百一十六剡本國刺史治博物記曰有勇王亭即勇士菑丘欣蘭陵有次室亭地道記曰故魯次室邑列女傳有漆室之女或作次室戚胊山海經曰都洲在海中一曰郁洲郭璞曰在縣界世俗傳此山在蒼梧徙來上皆有南方樹木博物記縣東北海邊植石秦所立之東門有鐵有伊盧鄉史記曰鍾離昧冢在伊盧襄賁昌慮有藍鄉左傳昭三十一年邾黒肱以濫來奔杜預曰縣所治城東北有郳城郳小邾國也承陰平利城合城漷水自北南至湖陸祝其有羽山殛鯀之山杜預曰在縣西南博物記曰東北獨居山西南有淵水即羽泉也俗謂此山為懲父山春秋時曰祝其夾谷地左傳定十年㑹齊侯夾谷孔子相厚丘左傳成九年城中城杜預曰在縣西南有中鄉城贛榆本屬琅邪建初五年復左傳齊伐莒莒子奔紀鄣杜預曰縣東北有紀城地道記曰海中去岸百九十步有秦始皇碑長一丈八尺廣五尺厚八尺三寸一行十三字潮水至加其上三丈去則三尺見也琅邪國秦置建武中省城陽國以其縣屬案本紀永夀元年置都尉治雒陽東一千五百里十三城户二萬八百四口五十七萬九百六十七開陽杜預曰古鄅左傳哀三年城啓陽杜預曰開陽故屬東海建初五年屬東武琅邪山海經曰有琅邪臺在渤海間琅邪之東郭璞曰琅邪臨海邊有山嶕嶢特起狀如髙臺此即琅邪臺齊景公曰吾循海而南放乎琅邪越絶曰句踐徙琅邪起觀臺臺周七里以望東海史記曰秦始皇徙黔首三萬户琅邪臺下傳有勞山東莞有鄆亭左傳曰公處鄆有邳鄉有公來山或曰古浮來左傳隠八年盟浮來杜預曰邳來山之間號曰邳來莊九年}
  - {type: variant, offset: 2738, length: 0, content: '', WYG: 叔受管仲及堂阜而脱之杜預曰東莞䝉陰縣西北有夷吾亭或曰鮑叔解夷吾縛於此因以為名即古堂阜也東莞後為名西海東觀書曰有勝山博物記太公吕望所出今有東吕鄉又釣於棘津其浦今存諸左傳莊二十九年城諸杜預曰諸縣在城陽郡又言隠四年莒人伐杞取牟婁杜預曰縣東北有婁鄉莒本國故屬城陽左傳成八年申公巫臣㑹渠丘公杜預曰縣有蘧丘里有鐵有崢嶸谷東安故屬城陽陽都故屬城陽有牟臺左傳宣元年㑹于平州杜預曰在縣西臨沂故屬東海有叢亭左傳隠六年盟于艾杜預曰縣東南有艾山七年城中丘杜預曰縣東北有中丘亭博物記曰縣東界次睢有大叢社民謂之食人社即次睢之社即丘侯國故屬東海春秋曰祝丘繒侯國故屬東海有概亭左傳莊九年盟于蔇杜預曰在縣北姑幕左傳昭五年莒牟夷以牟婁及防茲來奔杜預曰縣東北有茲亭博物記曰淮水入城東南五里有公冶長墓彭城國髙祖置為楚章帝改雒陽東千二百二十里八城户八萬六千一百七十口四十九萬三千二十七彭城古大彭邑北征記城西二十里有山山有楚元王墓伏滔北征記曰城北六里有山臨泗有宋桓魋石槨皆青石隠起龜龍鱗鳳之象有鐵武原傅陽有柤水左傳襄十年滅偪陽杜預曰即此縣也吕留西征記曰城中有張良廟梧菑丘廣戚故屬沛國廣陵郡景帝置為江都武帝更名建武中省泗水國以其縣屬雒陽東一千六百四十里十一城户八萬三千九百七口四十一萬百九十廣陵吳王濞所都城周十四里半有東陵亭博物記曰女子杜姜左道通神縣以為妖閉獄桎梏卒變形莫知所極以狀上因以其處為廟祠號曰東陵聖母江都有江水祠髙郵平安淩故屬泗水東陽故屬臨淮有長洲澤吳王濞太倉在此縣多麋博物記曰千千為羣掘食草根其處成泥名曰麋畯民人隨此畯種稻不耕而穫其収百倍又扶海洲上有草名蒒其實食之如大麥從七月稔熟民斂穫至冬乃訖名曰自然穀或曰禹餘糧射陽故屬臨淮有梁湖地道記曰有博支湖鹽瀆故屬臨淮輿侯國故屬臨淮堂邑故屬臨淮有鐵春秋時曰堂海西故屬東海下邳國武帝置為臨淮郡}
