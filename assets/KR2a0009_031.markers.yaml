  - {type: punctuation, offset: 388, content: 「, id: KR2a0009_ZHSJ_031-bkkpn80}
  - {type: variant, offset: 388, length: 227, content: 有法無法因時為業有度無度與物趣舍常務道德之實而不求當世之名闊略杪小之禮蕩佚人閒之事正身直行恬然肆志顧嘗好俶儻之策時莫能聽用其謀喟然長歎自傷不遭久棲於小官不得舒其所懷抑心折節意悽情悲夫伐冰之家不利雞豚之息委積之臣不操市井之利況歷位食祿二十餘年而財產益狹居處益貧惟夫君子之仕行其道也慮時務者不能興其德為身求者不能成其功去而歸家復羇旅於州郡身愈據職家彌窮困卒離飢寒之災有喪元子之禍之中地埶高敞四通廣大南望酈山北屬涇渭東瞰河華龍門之陽三晉之路西顧酆鄗周秦之丘宮觀, WYG: 昆吾}
