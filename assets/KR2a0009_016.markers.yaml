  - {type: variant, offset: 2810, length: 2, content: 崇德, WYG: 死者也先王之所惡惡死者之辱以為儉則不發不發則不辱故必以儉而合乎山原也宋未亡而東冢掘齊未亡而荘公掘國存而乃若此又况㓕名之後乎此爱而厚𦵏之故也欲爱而反害之欲安而反危之忠臣孝子亦不可以厚𦵏矣昔季孫以璵璠斂孔子歴級而止之為無窮慮也太皇太后皇太后崩司空以特牲告諡于祖廟如儀長樂太僕少府大長秋典䘮事三公奉制度他皆如禮儀丁孚漢儀曰永平七年隂太后崩晏駕詔曰柩将發於殿羣臣百官陪位黄門鼓吹三通鳴鐘鼓天子舉哀女侍史官三百人皆著素參以白素引棺挽歌下殿就車黄門宦者引以出宫省太后魂車鸞路靑羽盖駟馬龍旂九旒前有方相鳯皇車大将軍妻參乘太僕妻御悉道公卿百官如天子郊鹵簿儀後和熹鄧后𦵏案以為儀自此皆降損於前事也合𦵏羡道開通皇帝謁便房太常導至羡道去杖中常侍受至柩前謁伏哭止如儀辭太常導出中常侍授杖升車歸宫已下反虞立主如禮諸郊廟祭服皆下便房五時朝服各一襲在陵寝其餘及宴服皆封以箧笥藏宫殿後閤室諸}
