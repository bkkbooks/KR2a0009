  - {type: variant, offset: 6, length: 0, content: '', WYG: 瀆羣祀並禱求福疾病公卿復如禮登遐皇后詔三公典䘮事百官皆衣白單衣白幘不冠閉城門宫門近臣中黄門持兵虎賁羽林郎中署皆嚴宿衛宫府各警北軍五校繞宫屯兵黄門令尚書御史謁者晝夜行陳三公啟手足色膚如禮皇后皇太子皇子哭踊如禮沐浴如禮守宫令兼東園匠将女執事黄緜緹繒金縷玉柙如故事漢舊儀曰帝崩唅以珠纒以緹繒十二重以玉為􅃭如鎧状連縫之以黄金為縷腰以下以玉為札長一尺二寸半為柙下至足亦縫以黄金縷請諸衣衿斂之凡乗輿衣服已御輒藏之崩皆以斂飯唅珠玉如禮禮稽命徴曰天子飯以珠唅以玉諸侯飯以珠唅以珠卿大夫士飯以珠唅以貝槃冰如禮周禮凌人天子䘮供夷槃冰鄭𤣥曰夷之言尸也實冰于槃中置之尸牀之下所以寒尸也漢禮器制度大盤廣八尺長一文二尺深三尺漆赤中百官哭臨殿下是日夜下竹使符告郡國二千石諸侯王應劭曰凡與郡國守相竹使符皆以竹箭五枚長五寸鐫刻篆書第一至第五張晏曰符以代古之珪璋從簡易也此下大䘮符亦猶斯比竹使符到皆伏哭盡哀漢舊制發兵皆以銅虎符其餘徴調竹使而已符第合㑹為大信見杜詩傳小斂如禮東園匠考工令奏東園祕器表裏洞赤虡文畫日月鳥龜龍虎連璧偃月牙檜梓宫如故事大歛於兩楹之間五官左右虎賁羽林五将各将所部執虎賁㦸屯殿端門陛左右廂中黄門持兵陛殿上夜漏羣臣入晝漏上水大鴻臚設九賔隨立殿下謁者引諸侯王立殿下西靣北上}
