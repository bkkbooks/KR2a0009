  - {type: variant, offset: 14, length: 3, content: 第四齊, WYG: 哭羣臣皆哭三公升自阼階安梓宫内珪璋諸物近臣佐如故事嗣子哭踊如禮周禮駔珪璋璧琮琥璜之渠眉疏璧琮以斂尸鄭司農曰駔外有㨗盧也謂珪璋璧琮琥璜皆為開渠為眉瑑沙除以斂尸令汁得流去也鄭元曰以斂尸者於大斂焉加之也渠眉玉餙之溝瑑也以組穿聨六玉溝瑑之中以斂尸珪在左璋在首琥在右璜在足璧在背琮在腹蓋取象方明神之也疏璧琮者通於天地東園匠}
