  - {type: variant, offset: 3335, length: 802, content: 祭祀帝自臨其疾祉薨年四十三謚曰恭王竟不之國葬於洛陽北芒十三年封祉嫡子平為蔡陽侯以奉祉祀平弟堅為高鄉侯初建武二年以皇祖皇考墓為昌陵置陵令守視後改為章陵因以舂陵為章陵縣十八年立考侯康侯廟比園陵置嗇夫詔零陵郡奉祠節侯戴侯廟以四時及臘歲五祠焉置嗇夫佐吏各一人平後坐與諸王交通國除永平五年顯宗更封平為竟陵侯平卒子真嗣真卒子禹嗣禹卒子嘉嗣泗水王歙字經孫光武族父也歙子終與光武少相親愛漢兵起始及唐子終誘殺湖陽尉更始立歙從入關封為元氏王終為侍中更始敗歙終東奔洛陽建武二年立歙為泗水王終為淄川王十年歙薨封小子燀為堂谿侯奉歙後終喪思慕哭泣二十餘日亦薨封長子柱為邔侯以奉終祀又封終子鳳曲陽侯歙從父弟茂年十八漢兵之起茂自號劉失職亦聚衆京密閒稱厭新將軍攻下潁川汝南衆十餘萬人光武既至河內茂率衆降封為中山王十三年宗室為王者皆降為侯更封茂為穰侯茂弟匡亦與漢兵俱起建武二年封宜春侯為人謙遜永平中為宗正子浮嗣封朝陽侯浮弟屆永元中為征西將軍浮傳國至孫護無子封絕延光中護從兄瓌與安帝乳母王聖女伯榮私通遂取伯榮為妻得紹護封為朝陽侯位侍中及王聖敗貶爵為亭侯安成孝侯賜字子琴光武族兄也祖父利蒼梧太守賜少孤兄顯報怨殺人吏捕顯殺之賜與顯子信賣田宅同拋財產結客報吏皆亡命逃伏遭赦歸會伯升起兵乃隨從攻擊諸縣更始既立以賜為光祿勳封廣漢侯及伯升被害代為大司徒將兵討汝南未及平更始又以信為奮威大將軍代賜擊汝南賜與更始俱到洛陽更始欲令親近大將徇河北未知所使賜言諸家子獨有文叔可用大司馬朱鮪等以為不可更始狐疑賜深勸之乃拜光武行大司馬持節過河是日以賜為丞相令先入關修宗廟宮室還迎更始都長安封賜為宛王拜前大司馬使持節鎮撫關東二年春賜就國於屆典將六部兵後赤眉破更始賜所領六部亦稍散畔乃去宛保育陽聞光武即位乃西之武關迎更始妻子將詣洛陽帝嘉賜忠建武二年封為慎侯十三年更增戶邑定封為安成侯奉朝請以賜有恩信故親厚之數蒙讌私時幸其第恩賜特異賜輒賑與故舊無有遺積帝為營冢堂起祠廟置吏卒, WYG: ''}
