  - {type: variant, offset: 4138, length: 779, content: 舂陵孝侯二十八年卒子閔嗣三十年帝復封閔弟嵩為白牛侯坐楚事辭語相連國除閔卒子商嗣徙封為白牛侯商卒子昌嗣初信為更始討平汝南因封為汝陰王信遂將兵平定江南據豫章光武即位桂陽太守張隆擊破之信乃詣洛陽降以為汝陰侯永平十三年亦坐楚事國除成武孝侯順字平仲光武族兄也父慶舂陵侯敞同產弟順與光武同里閈少相厚更始即位以慶為燕王順為虎牙將軍會更始降赤眉慶為亂兵所叔殺順乃閒行詣光武拜為南陽太守建武二年封成武侯邑戶最大租入倍宗室諸家八年使擊破六安賊因拜為六安太守數年帝欲徵之吏人上書請留十一年卒帝使使者迎喪親自臨弔子遵嗣坐與諸王交通降為端氏侯遵卒子弇嗣弇卒無嗣國除永平十年顯宗幸章陵追念舊恩封順弟子三人為鄉侯初順叔父弘娶於樊氏皇妣之從妹也生二子敏國與母隨更始在長安建武二年詣洛陽光武封敏為甘里侯國為弋陽侯敏通經有行永平初官至越騎校尉弘弟梁以俠氣聞更始元年起兵豫章欲徇江東自號就漢大將軍暴病卒順陽懷侯嘉字孝孫光武族兄也父憲舂陵侯敞同產弟嘉少孤性仁厚南頓君養視如子後與伯升俱學長安習尚書春秋及義兵起嘉隨更始征伐漢軍之敗小長安也嘉妻子遇害更始即位以為偏將軍及攻破宛封興德侯遷大將軍擊延岑於冠軍降之更始既都長安以嘉為漢中王扶威大將軍持節就國都於南鄭衆數十萬建武二年延岑復反攻漢中圍南鄭嘉兵敗走岑遂定漢中進兵武都為更始柱功侯李寶所破岑走天水公孫述遣將侯丹取南鄭嘉收散卒得數萬人以寶為相從武都南擊侯丹不利還軍河池下辨復與延岑連戰岑引北入散關至陳倉嘉追擊破之更始鄧王廖湛將赤眉十八萬攻嘉嘉與戰於谷口大破之嘉手殺湛遂到雲陽就穀李寶等聞鄧禹西征擁兵自守勸嘉且觀成敗光武聞之告禹曰孝孫素謹善少且親愛當是長安輕薄兒誘圻捸禹即宣帝旨嘉乃因來歙詣禹於雲陽三年到洛陽從征伐拜為千乘太守六年病上書乞骸骨徵詣京師十三年封為順陽侯秋復封嘉子廧為黃李侯十五年嘉卒子參嗣有罪削為南鄉侯永平中參為城門校尉參卒子循嗣循卒子章嗣, WYG: 禮}
