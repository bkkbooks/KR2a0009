  - {type: variant, offset: 2435, length: 1, content: 興, WYG: 謁者副将作油緹帳以覆坑方石治黄腸題湊便房如禮漢舊儀略載前漢諸帝壽陵曰天子即位明年将作大匠營陵地用地七頃方中用地一頃深十三丈堂壇高三丈墳髙十二文武帝墳髙二十丈明中髙一丈七尺四周二丈内梓棺栢黄腸題湊以次百官藏畢其設四通羡門容大車六馬皆藏之内方外陟車石外方立先閉劔户户設夜龍莫邪劔伏弩設伏火已營陵餘地為西園后陵餘地為媫妤}
  - {type: page-break, offset: 2435, content: '', id: KR2a0009_WYG_016-5a, image: WYG0252/WYG0252-0262a.png}
  - {type: variant, offset: 2435, length: 1, content: 興, krp: 謁者副将作油緹帳以覆坑方石治黄腸題湊便房如禮漢舊儀略載前漢諸帝壽陵曰天子即位明年将作大匠營陵地用地七頃方中用地一頃深十三丈堂壇高三丈墳髙十二文武帝墳髙二十丈明中髙一丈七尺四周二丈内梓棺栢黄腸題湊以次百官藏畢其設四通羡門容大車六馬皆藏之内方外陟車石外方立先閉劔户户設夜龍莫邪劔伏弩設伏火已營陵餘地為西園后陵餘地為媫妤}
  - {type: variant, offset: 2438, length: 0, content: '', WYG: 次賜親屬功臣漢書音義曰題頭也湊以頭向内所以為固也便房藏中便坐也皇覽曰漢家之𦵏方中百歩已穿築為方城其中開四門四通足放六馬然後錯渾雜物扞漆繪綺金寳米榖及埋車馬虎豹禽獸發近郡卒徒置将軍尉侯以後宫貴幸者皆守園陵元帝𦵏乃不用車馬禽獸等物大駕太僕御方相氏黄金四目䝉熊皮𤣥衣朱裳執戈揚楯立乗四馬先驅周禮曰方相氏大䘮先柩及墓入壙以戈擊四隅敺方良鄭𤣥曰方相放想也可畏怖之貌壙穿地中也方良罔兩也天子之椁柏黄腸為裏表以石焉國語曰木石之怪䕫罔兩旂之制長三仞十有二斿天地畫日月升龍書旐曰天子之柩謁者二人立乗六馬為次大駕甘泉鹵簿金根容車蘭臺法駕䘮服大行載餙如金根車皇帝從送如禮太常上啟奠夜漏二十刻太尉冠長冠衣齋衣乗高車詣殿止車門外使者到南向立太尉進伏拜受詔太尉詣南郊未盡九刻大鴻臚設九賔隨立羣臣入位太尉行禮執事皆冠長冠衣齋衣太祝令跪讀諡䇿太尉再拜稽首治禮告事畢太尉奉諡䇿還詣殿端門太常上祖奠中黄門尚衣奉衣登容根車東園武士載大行司徒却行道立車前治禮引太尉入就位大行車西少南東靣奉䇿太史令奉哀䇿立後太常跪曰進皇帝進太尉讀諡䇿藏金匱皇帝次科藏於廟太史奉哀䇿葦箧詣陵太尉旋復公位再拜立哭太常跪曰哭大鴻臚傳哭十五舉音止哭太常行遣奠皆如禮請哭止哭如儀晝漏上水請發司徒河南尹先引車轉太常跪曰請拜送載車著白系參繆紼長三十丈大七寸為輓六行行五十人公卿以下子弟凡三百人皆素幘委貌冠衣素裳校尉三人皆赤幘不冠絳科單衣持幢幡候司馬丞為行首皆銜枚羽林孤兒巴俞擢歌者六十人為六列鐸司馬八人執鐸先大鴻臚設九賔隨立陵南羡門道東北靣諸侯王公特進道西北靣東上中二千石二千石列侯冝九賔東北靣西上皇帝白布幕素裏夾羡道東西向如禮容車幄坐羡道西南向車當坐南向中黄門尚衣奉衣就幄坐車少前太祝進醴獻如禮司徒跪曰大駕請舍太史令自車南北靣讀哀䇿掌故在後已哀哭太常跪曰哭大鴻臚傳哭如儀司徒跪曰請就下位東園武士奉下車司徒跪曰請就下房都導東園武士奉車入房司徒太史令奉諡哀䇿晉時有人嵩髙山下得竹簡一枚上有兩行科斗書之臺中外傳以相示莫有知者司空張華以問博士束晳晳曰此明帝顯節陵中䇿也檢校果然是知䇿用此書也東園武士執事下明器禮記曰明器神明之也孔子謂為明器知䘮道矣備物而不可用也鄭𤣥注既夕曰陳明器以西行南端為上筲八盛容三升鄭𤣥注既夕曰筲畚種類也其容蓋與簋同黍一稷一麥一粱一稻一麻一菽一小豆一甕三容三升醯一醢一屑一鄭𤣥注既夕曰屑薑桂之屑黍飴載以木桁覆以疏布甒二容三升醴一酒一載以木桁覆以功布瓦鐙一彤矢四軒輖中亦短衛彤矢四骨短衛既夕曰翭矢一乗骨鏃短衛鄭𤣥曰翭猶候也候物而射之矢也四矢曰乗骨鏃短衛亦示不用也生時翭矢金鏃凡為矢五分笴長而羽其一通俗文曰細毛翭也彤弓一巵八牟八鄭元注既夕曰牟盛湯漿豆八籩八形方酒壺八槃匜一具鄭𤣥注既夕曰槃匜盥器也杖几各一蓋一鍾十六無虡鎛四無虡爾雅曰大鍾謂之鏞郭璞注曰書曰笙鏞以間亦}
