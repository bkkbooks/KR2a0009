  - {type: variant, offset: 2803, length: 3, content: 立九年, WYG: 世紀曰在雒陽東去雒陽三十二里桓帝宣陵帝王世紀曰山方三百歩高十二丈在雒陽東南去雒陽三十里陽靈帝文陵帝王世紀曰山方三百歩高十二丈在雒西北去雒陽二十里八獻帝禪陵帝王世紀曰不起墳深五丈前堂方一丈尺後堂方一丈五尺角廣六尺在河内山陽之濁城西北去濁城直行十一里斜行七里去懐陵百一十里去山陽五十里南去雒陽三百一十里蔡質漢儀曰十二陵今見在河南尹無敬也之}
