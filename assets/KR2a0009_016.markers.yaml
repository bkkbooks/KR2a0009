  - {type: variant, offset: 2454, length: 7, content: 篇趙孝王谷次伯, WYG: 枚纒以皓皮四方置牖中主居其中央七日大斂棺以黍飯羊舌祭之牖中已𦵏收主為木函藏廟太室中西牆壁埳中望内外不出室堂之上坐為五時衣冠履几杖竹籠為俑人無頭坐起如生時皇后主長七寸圍九寸在皇帝主右旁高皇帝主長九寸上林結栗木長安祠廟作神主東園秘器作梓棺素木長丈三尺崇廣四尺先大駕日游冠衣於諸宫諸殿羣臣皆吉服從㑹如儀皇帝近臣喪服如禮醳大紅服小紅十一升都布練冠醳小紅服纎醳纎服留黄冠常冠近臣及二千石以下皆服留黄冠百官衣早毎變服從哭詣陵㑹如儀祭以特牲不進毛血首司徒光禄勲備三爵如禮古今注具載帝陵丈尺頃畆今附之後焉四}
