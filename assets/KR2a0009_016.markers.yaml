  - {type: variant, offset: 2451, length: 2, content: 論凡, WYG: 曰明帝崩司徒鮑昱典䘮事𦵏日三公入安梓宫還至羡道半逢上欲下昱前叩頭言禮天子鴻洞以贈所以重郊廟也陛下奈何冐危險不以義割哀上即還容根車游載容衣司徒至便殿並䡰騎皆從容車玉帳下司徒跪曰請就幄導登尚衣奉衣以次奉器衣物藏於便殿太祝進醴獻几下用漏十刻禮畢司空将校復土皇帝皇后以下皆去麤服服大紅還宫反廬立主如禮桑木主尺二寸不書諡虞禮畢祔於廟如禮漢舊儀曰髙帝崩三日小斂室中牖下作栗木主長八寸前方後圓圍一尺置牖中望外内張緜絮以鄣外以皓木大如指長三尺}
