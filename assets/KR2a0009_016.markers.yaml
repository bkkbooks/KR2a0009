  - {type: variant, offset: 1621, length: 806, content: 使信先成於敵人赦岑彭以顯義若此足以見其度矣志高慮遠禍發所忽嗚呼古人以蜂蠆為戒蓋畏此也詩云敬之敬之命不易哉北海靖王興建武二年封為魯王嗣光武兄仲初南頓君娶同郡樊重女字羔天都羔天都性婉順自為童女不正容服不出於房宗族敬焉生三男三女長男伯升次仲次光武長女黃次元次伯姬皇妣以初起兵時病卒宗人樊巨公收斂焉建武二年封黃為湖陽長公主伯姬為寧平長公主元與仲俱歿於小長安追爵元為新野長公主十五年追謚仲為儕王興其歲試守緱氏令為人有明略善聽訟甚得名稱遷弘農太守亦有善政視事四年上疏乞骸骨徵還京師奉朝請二十七年始就國明年以魯國益東海故徙興為北海王三十式封興子復為臨邑侯中元二年又封興二子為縣侯顯宗器重興每有異政輒乘驛問焉立三十九年薨子敬王睦嗣睦少好學博通書傳光武愛之數被延納顯宗之在東宮尤見幸待入侍諷誦出則執轡中興初禁網尚闊而睦性謙恭好士千里交結自名儒宿德莫不造門由是聲價益廣永平中法憲頗峻睦乃謝絕賓客放心音樂然性好讀書常為愛翫歲終遣中大夫奉璧朝賀召而謂之曰朝廷設問寡人大夫將何辭以對使者曰大王忠孝慈仁敬賢樂士臣雖螻蟻敢不以實睦曰吁子危我哉此乃孤幼時進趣之行也大夫其對以孤襲爵以來志意衰惰聲色是娛犬馬是好使者受命而行其能屈申若此初靖王薨悉推財產與諸弟雖王車服珍寶非列侯制皆以為分然後隨以金帛贖之睦能屬文作春秋旨義終始論及賦頌數十篇又善史書當世以為楷則及寢病帝驛馬令作草書尺牘十首立十年薨子哀王基嗣永平十八年封基二弟為縣侯二弟為鄉侯建初二年又封基弟毅為平望侯基立十四年薨無子肅宗憐之不除其國永元二年和帝封睦庶子斟鄉侯威為北海王奉睦後立七年威以非睦子又坐誹謗檻車徵詣廷尉道自殺永初元年鄧太后復封睦孫壽光侯普為北海王是為頃王延光二年復封睦少子為亭侯普立十七年薨子恭王翼嗣立十四年薨子康王嗣無後建安十一年國除初臨邑侯復好學能文章永平中每有講學事輒令復典掌焉與班固賈逵共述漢史傅毅等皆宗事之復子騊駼及從兄平望侯毅並有才學永寧中鄧太后召毅及騊駼入東觀與, WYG: ''}
