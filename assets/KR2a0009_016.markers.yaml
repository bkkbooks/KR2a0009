  - {type: variant, offset: 247, length: 641, content: 數十人伯升復收會兵衆還保棘陽阜賜乘勝留輜重於藍鄉引精兵十萬南渡黃淳水臨泚沘水阻兩川閒為營絕後橋示無還心新巿平林見漢兵數敗阜賜軍大至各欲解去伯升甚患之會下江兵五千餘人至宜秋乃往為說合從之埶下江從之語在王常傳伯升於是大饗軍士設盟約休卒三日分為六部潛師夜起襲取藍鄉盡獲其輜重明旦漢軍自西南攻甄阜下江兵自東南攻梁丘賜至食時賜陳潰阜軍望見散走漢兵急追之却迫黃淳水斬首溺死者二萬餘人遂斬阜賜王莽納言將軍嚴尤秩宗將軍陳茂聞阜賜軍敗引欲據宛伯升乃陳兵誓衆焚積聚破釜甑鼓行而前與尤茂遇育陽下戰大破之斬首三千餘級尤茂棄軍走伯升遂進圍宛自號柱天大將軍王莽素聞其名大震懼購伯升邑五萬戶黃金十萬斤位上公使長安中官署及天下鄉亭皆畫伯升像於塾旦起射之自阜賜死後百姓日有降者衆至十餘萬諸將會議立劉氏以從人望豪傑咸歸於伯升而新巿平林將帥樂放縱憚伯升威明而貪聖公懦弱先共定策立之然後使騎召伯升示其議伯升曰諸將軍幸欲尊立宗室其德甚厚然愚鄙之見竊有未同今赤眉起青徐眾數十萬聞南陽立宗室恐赤眉復有所立如此必將內爭今王莽未滅而宗室相攻是疑天下而自損權非所以破莽也且首兵唱號鮮有能遂陳勝項籍即其事也舂陵去宛三百里耳未足為功遽自尊立為天下準的使後人得承吾敝非計之善者也今且稱王以號令若赤眉所立者賢相率而往從之若無所立破莽降赤眉然後舉尊號亦未晚也願各詳思之諸將多曰善將軍張卬拔劒擊地曰疑事無功今日之議不得有二衆皆從之聖公既即位拜伯升為大司徒封漢信侯由是豪傑失望多不服平林後部攻新野不能下新野宰登城言曰得司徒劉公一信願先下及伯升軍至即, WYG: 詔}
