  - {type: variant, offset: 2807, length: 1, content: 初, WYG: 文帝終制略曰漢文帝之不發霸陵無求也光武掘原陵封樹也覇陵之完功在釋之原陵之掘罪在明帝是釋之忠以利君明帝爱以害親也忠臣孝子冝思釋之之言察明帝之戒存於所以安君定親使魂靈萬載無危斯則聖賢之忠孝矣自古及今未有不亡之國亦無不掘之墓也䘮亂以来漢氏諸陵無不發掘至乃燒取玉柙金鏤骸骨幷盡是焚如之刑也豈不重痛哉禍由乎厚𦵏封樹桑藿為我戒不亦明乎臣昭按董卓傳卓使吕布發諸帝陵及公卿以下冢墓收其珍寳卓别傳曰發成帝陵解金縷探含璣焉吕氏春秋略曰審知生聖人之要也審知死聖人之極也知生者不以物害生知死者不以物害死凡生於天地之間其必有死孝子之重其親者若親之愛其子不棄於溝壑故有𦵏送之義𦵏者藏也以生人心為之慮則莫如無動無動莫如無利藏淺則狐狸掘之深則及水泉故必高陵之上以避二害然而忘姦㓂之變豈不惑哉民之於利也犯白刃渉危難以求之忍親戚欺知交以求之今無此危無此醜而為利甚厚固難禁也國彌大家彌冨其𦵏彌厚珠玉金銅不可勝計姦人聞之轉以相告雖有嚴刑重罪不能止也且死者彌乆生者彌疏彌疏則守之彌怠藏器如故而守之有怠其势固必掘矣世至為丘隴其高若山陵樹之若林藪或設闕庭都邑以此示冨則可矣以此為死者則惑矣大凡死者其視萬世猶一暝也人之夀乆者不過百中者六十以百與六十為無窮者慮其情固不相當矣必以無窮為慮然後為可今有銘其墓曰此中有金寳甚厚不可掘也必為世笑矣而為之闕庭以自表此何異彼哉自古及今未有不亡之國也無不亡之國是無不掘之墓以耳目之所聞見則齊荆燕嘗亡矣宋中山已亡矣趙韓魏皆失其故國矣自此以上亡國不可勝數故其大墓無不掘也而猶皆爭為之豈不悲哉今夫君之不令民父之不教子兄之不悌弟皆鄉邑之所遺而惮耕耒之勞者也仍不事耕農而好鮮衣侈食智巧窮匱則合黨連衆而謀名丘大墓上曽不能禁也此有𦵏自表之禍也昔堯𦵏糓林通樹之舜𦵏紀市不變肆禹𦵏㑹稽不變人徒非爱其費}
