  - {type: variant, offset: 3024, length: 285, content: 莫不回從社稷傾覆至矣太后春秋高天子幼弱高皇帝所以分封子弟蓋為此也敞心然之及崇事敗敞懼欲結援樹黨乃為祉娶高陵侯翟宣女為妻會宣弟義起兵欲攻莽南陽捕殺宣女祉坐繫獄敞因上書謝罪願率子弟宗族為士卒先莽新居攝欲慰安宗室故不被刑誅及莽篡立劉氏為侯者皆降稱子食孤卿祿後皆奪爵及敞卒祉遂特見廢又不得官為吏祉以故侯嫡子行淳厚宗室皆敬之及光武起兵祉兄弟相率從軍前隊大夫甄阜盡收其家屬繫宛獄及漢兵敗小長安祉挺身還保棘陽甄阜盡殺其母弟妻子更始立以祉為太常將軍紹封舂陵侯從西入關封為定陶王別將擊破劉嬰於臨涇及更始降於赤眉祉乃閒行亡奔洛陽是時宗室唯祉先至光武見之歡甚建武二年封為城陽王賜乘輿御物車馬衣, WYG: 醳麤}
