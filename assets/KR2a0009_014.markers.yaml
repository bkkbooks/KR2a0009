  - {type: variant, offset: 6, length: 0, content: '', krp: 日皆牽羊酒至社下以祭日日有變割羊以祠社用救日日變執事者冠長冠衣皂單衣絳領袖緑中衣絳袴􅙋以行禮如故事公羊傳曰日有食之鼔用牲于社求乎隂之道也以朱絲縈社或曰脅之或曰為閣恐人犯之故縈之也何休曰脅之與責求同義社者土地之主也月者土地之精也上繋於天而犯日故鳴鼔而攻之脅其本也朱絲縈之助陽抑隂也或曰為闇者社者土地之主尊也為日光盡天闇㝠恐人犯歴之故縈之然此説非也先言鼔後言用牲者明先以尊者命責之後以臣子禮接之所以為順也白虎通曰日食必救之隂侵陽也鼔攻之以陽責隂也故春秋日食鼓用牲于社所以必用牲者土地别神也尊之不敢虚責也日食大水則鼓用牲大旱則雩祭求雨非虚言也助陽責下求隂之道也決疑要注曰凡救日食皆著赤幘以助陽也日將食天子素服避正殿内外嚴日有變伐鼔聞音侍臣著赤幘帶劎入侍三臺令史已下皆持劔立其戸前衛尉卿驅馳繞宫察廵守備周而復始日復常乃皆罷之立春之日夜漏未盡五刻京師百官皆衣青衣郡國縣道官下至斗食令史皆服青幘立青旙施土牛耕人于門外以示兆民至立夏唯武官不立春之日下寛大書曰制詔三公方春東作敬始慎微動作從之罪非殊死且勿案驗皆須麥秋退貪殘進柔良下當用者如故事月令曰命相布徳和令蔡邕曰即此詔之謂也獻帝起居注曰建安二十二年二月壬申詔書絶立春寛緩詔書不復行正月上丁祠南郊白虎通曰春秋傳曰以正月上辛尚書曰丁巳用牲于郊牛二先甲三日辛也後甲三日丁也皆可接事昊天之日禮畢次北郊明堂高廟世祖廟謂之五供五供畢以次上陵西都舊有上陵東都之儀百官四姓親家婦女公主諸}
  - {type: variant, offset: 7, length: 5, content: 劉張李彭盧, WYG: 大夫蔡邕獨斷曰凡與先后有𤓰葛者外國朝者侍子郡國計吏㑹陵晝漏上水大鴻臚設九賔隨立寢殿前薛綜曰九賓謂王侯公卿二千石六百石下及郎吏匈奴侍子凡九等鍾鳴謁者治禮引客羣臣就位如儀乗輿自東廂下太常導出西向拜止旋升阼階拜神坐退坐東廂西向侍中尚書陛者皆神坐後公卿羣臣謁神坐太官上食太常樂奏食舉文始五行之舞前書志曰文始舞者本韶舞也髙祖六年更名文始以示不相襲也五行舞者本周舞也秦始皇二十六年更名五行之舞也禮樂闋君臣受賜食畢郡國上計吏以次前當神軒占其郡榖價民所疾苦欲神知其動靜孝子事親盡禮敬愛之心也周徧如禮謝承書曰建寜五年正月車駕上原陵蔡邕為司徒掾從公行到陵見其儀愾然謂同坐者曰聞古不墓祭朝廷有上陵之禮始為可損今見威儀察其本意乃知孝明皇帝至孝惻隠不可易舊或曰本意云何昔京師在長安時其禮不可盡得聞也光武即世始葬于此明帝嗣位踰年羣臣朝正感先帝不復聞見此禮乃帥公卿百寮就園陵而創焉尚書陛西陛為神坐天子事亡如事存之意茍先帝有𤓰葛之屬男女畢㑹王侯大夫郡國計吏各向神坐而言庶㡬先帝神魂聞之今者日月久逺後生非時人但見其禮不知其哀以明帝聖孝之心親服三年乆在園陵初興此儀邱察几筵下顧羣臣悲切之心必不可堪邕見太傅胡廣曰國家禮有煩而不可省者不知先帝用心周密之至於此也廣曰然子宜載之以示學者邕退而記焉魚豢曰孝明以正月旦百官及四方來朝者上原陵朝禮是謂甚違古不墓祭之義臣昭以為邕之言然最後親陵遣計吏賜之帶佩八月飲酎上陵禮亦如之丁孚漢儀曰酎金律文帝所加以正月旦作酒八月成名酎酒因合諸侯助祭貢金漢律金布令曰皇帝齋宿親帥羣臣承祠宗廟羣臣宜分奉請諸侯}
