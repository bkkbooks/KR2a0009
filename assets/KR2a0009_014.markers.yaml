  - {type: variant, offset: 263, length: 1, content: 林, WYG: 富有四海而必私置藉田盖其義有三焉一曰以奉宗廟親致其孝也二曰以訓于百姓在勤勤則不匱也三曰聞之子孫躬知稼穡之艱難無違也耕時有司請行事就耕位天子三公九卿諸侯百官以次耕鄭𤣥注周禮曰天子三推公五推卿諸侯九推庶人終於千畝庶人謂徒三百人也月令章句曰卑者殊勞故三公五推禮自上以下降殺以兩勞事反之諸侯上當有孤卿七推大夫十二士終畝可知也盧植注禮記曰天子耕藉一發九推耒周禮二耜}
  - {type: variant, offset: 263, length: 1, content: 林, krp: 富有四海而必私置藉田盖其義有三焉一曰以奉宗廟親致其孝也二曰以訓于百姓在勤勤則不匱也三曰聞之子孫躬知稼穡之艱難無違也耕時有司請行事就耕位天子三公九卿諸侯百官以次耕鄭𤣥注周禮曰天子三推公五推卿諸侯九推庶人終於千畝庶人謂徒三百人也月令章句曰卑者殊勞故三公五推禮自上以下降殺以兩勞事反之諸侯上當有孤卿七推大夫十二士終畝可知也盧植注禮記曰天子耕藉一發九推耒周禮二耜}
