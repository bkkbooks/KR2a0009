  - {type: variant, offset: 5, length: 0, content: '', WYG: 四梁剡令劉昭補幷注禮儀志第四禮儀上合朔上陵立春冠五供夕牲耕蠶先高禖祓禊養老夫威儀所以與君臣序六親也若君亡君之威臣亡臣之儀上替下陵此謂大亂大亂作則羣生受其殃可不慎哉故記施行威儀以為禮儀志謝沈書曰太傅胡廣博綜舊儀立漢制度蔡邕因以為志譙周後改定以為禮儀志禮威儀每月朔旦太史上其月厯有司侍郎尚書見讀其令奉行其政朔前後各}
