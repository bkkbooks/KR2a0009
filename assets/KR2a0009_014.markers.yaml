  - {type: variant, offset: 306, length: 0, content: '', WYG: 得以作縷縫衣得以作中絮而已置蠶官令丞諸天下官皆詣蠶室亦婦人從事故舊有東西織室作法晋后祠先蠶先蠶壇高一丈方二丈為四出陛陛廣五尺在采桑壇之東南是月上已官民皆絜於東流水上曰洗濯祓除去宿垢疢為大絜絜者言陽氣布暢萬物訖出始絜之矣謂之禊也風俗通曰周禮女巫掌嵗時以祓除疾病禊者絜也春者蠢也蠢摇動也尚書以殷仲春厥民析言人觧析也蔡邕曰論語暮春者春服既成冠者五六人童}
