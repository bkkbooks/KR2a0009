  - {type: variant, offset: 1192, length: 623, content: 還湖陵而睢陽人反城迎永吳漢與蓋延等合軍圍之城中食盡永與茂建走酇諸將追急永將慶吾斬永首降封吾為列侯蘇茂周建奔垂惠共立永子紆為梁王佼彊還保西防四年秋遣捕虜將軍馬武騎都尉王霸圍紆建於垂惠蘇茂將五校兵救之紆建亦出兵與武等戰不剋而建兄子誦反閉城門拒之建茂紆等皆走建於道死茂奔下邳與董憲合紆奔佼彊五年遣驃騎大將軍杜茂攻佼彊於西防彊與劉紆奔董憲時平狄將軍龐萌反叛遂襲破蓋延引兵與董憲連和自號東平王屯桃鄉之北龐萌山陽人初亡在下江兵中更始立以為冀州牧將兵屬尚書令謝躬共破王郎及躬敗萌乃歸降光武即位以為侍中萌為人遜順甚見信愛帝常稱曰可以託六尺之孤寄百里之命者龐萌是也拜為平狄將軍與蓋延共擊董憲時詔書獨下延而不及萌萌以為延譖己自疑遂反帝聞之大怒乃自將討萌與諸將書曰吾常以龐萌社稷之臣將軍得無笑其言乎老賊當族其各厲兵馬會睢陽憲聞帝自討龐萌乃與劉紆蘇茂佼彊去下邳還蘭陵使茂彊助萌合兵三萬急圍桃城帝時幸蒙聞之乃留輜重自將輕騎三千步卒數萬晨夜馳赴師次任城去桃鄉六十里旦日諸將請進賊亦勒兵挑戰帝不聽乃休士養銳以挫其鋒城中聞車駕至衆心益固時吳漢等在東郡馳使召之萌等乃悉兵攻城二十餘日衆疲困而不能下及吳漢與諸將到乃率衆軍進桃城而帝親自搏戰大破之萌茂彊夜棄輜重逃奔董憲乃與劉紆悉其兵數萬人屯昌慮自將銳卒拒新陽帝先遣吳漢擊破之憲走還昌慮漢進守之憲恐乃招誘五校餘賊步騎數千人屯建陽去昌慮三十里帝至蕃去憲所百餘里諸將請進帝不聽知五校乏食當退勑各堅壁以待其敝頃之五校糧盡果引去帝乃親臨四面攻憲, WYG: 用}
