  - {type: variant, offset: 266, length: 0, content: '', WYG: 榖皆以給祭天地宗廟羣神之祀以為粢盛皇帝躬秉耒耜而耕古為甸師官賀循曰所種之榖黍稷穜稑稑早也穜晚也干寳周禮注曰穜晚秔稻之屬稑陵榖黍稷之屬是月令曰郡國守}
  - {type: variant, offset: 266, length: 0, content: '', krp: 榖皆以給祭天地宗廟羣神之祀以為粢盛皇帝躬秉耒耜而耕古為甸師官賀循曰所種之榖黍稷穜稑稑早也穜晚也干寳周禮注曰穜晚秔稻之屬稑陵榖黍稷之屬是月令曰郡國守}
