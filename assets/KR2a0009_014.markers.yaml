  - {type: variant, offset: 13, length: 0, content: '', WYG: 侯各以民口數率千口奉金四兩竒不滿千口至五百口亦四兩皆㑹酎少府受又大鴻臚食邑九真交阯日南者用犀角長九寸以上若瑇瑁甲一鬱林用象牙長三尺以上若翡翠各二十凖以當金漢舊儀曰皇帝惟八月酎車駕夕牲牛以絳衣之皇帝暮視牲以鑑燧取水於月以火燧取火於日為明水火左袒以水沃牛右肩手執鸞刀以切牛尾薦之而即更衣巾侍上熟乃祀之凡齋天地七日宗廟山川五日小祠三日齋日内有汙染觧齋副倅行禮先齋一日有汙穢災變齋祀如儀大喪唯天郊越紼而齋地以下皆百日後乃齋如故事魏文帝詔曰漢氏不拜日於東郊而旦夕常於殿下東面拜日煩褻似家人之事非事天交神之道也於是朝日東門之外將祭必先夕牲其儀如郊正月甲子若丙子為吉日可加元服儀從冠禮乘輿初緇布進賢次爵弁次武弁次通天以據皆於髙祖廟如禮謁冠禮曰成王冠周公使祝雍曰辭達而勿多也祝雍曰近於民逺於年逺於侫近於義嗇於財任賢使能博物記曰孝昭帝冠辭曰陛下摛顯先帝之光耀以承皇天之嘉禄欽奉仲春之吉辰普尊大道之郊域秉率百福之休靈始加昭明之元服推逺冲孺之幼志藴積文武之就徳肅勤髙祖之清廟六合之内靡不䝉徳永永與天無極獻帝}
