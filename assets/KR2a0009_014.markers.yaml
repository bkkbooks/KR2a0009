  - {type: variant, offset: 2899, length: 2367, content: 年秋光武幸壽春遣揚武將軍馬成等擊憲圍舒至六戎縣諢拔之憲亡走其軍士帛意追斬憲而降憲妻子皆伏誅封帛意漁浦侯後憲餘黨淳于臨等猶聚衆數千人屯灊山攻殺安風令楊州牧歐陽歙遣兵不能剋帝議欲討之廬江人陳衆為從事白歙請得喻降臨於是乘單車駕白馬往說而降之灊山人共生為立祠號白馬陳從事云彭寵字伯通南陽宛人也父宏哀帝時為漁陽太守偉容貌能飲飯有威於邊王莽居攝誅不附己者宏與何武鮑宣並遇害寵少為郡吏地皇中為大司空士從王邑東拒漢軍到洛陽聞同產弟在漢兵中懼誅即與鄉人吳漢亡至漁陽抵父時吏更始立使謁者韓鴻持節徇北州承制得專拜二千石已下鴻至薊以寵漢並鄉閭故人相見歡甚即拜寵偏將軍行漁陽太守事漢安樂令及光武鎮慰河北至薊以書招寵寵具牛酒將上謁會王郎詐立傳檄燕趙遣將徇漁陽上谷急發其兵北州衆多疑惑欲從之吳漢說寵從光武語在漢傳會上谷太守耿況亦使功曹寇恂詣寵結謀共歸光武寵乃發步騎三千人以吳漢行長史及都尉嚴宣護軍蓋延狐奴令王梁與上谷軍合而南及光武於廣阿光武承制封寵建忠侯賜號大將軍遂圍邯鄲寵轉糧食前後不絕及王郎死光武追銅馬北至薊寵上謁自負其功意望甚高光武接之不能滿以此懷不平光武知之以問幽州牧朱浮浮對曰前吳漢北發兵時大王遺寵以所服劒又倚以為北道主人寵謂至當迎閤握手交歡並坐今既不然所以失望浮因曰王莽為宰衡時甄豐旦夕入謀議時人語曰夜半客甄長伯及莽篡位後豐意不平卒以誅死光武大笑以為不至於此及即位吳漢王梁寵之所遣並為三公而寵獨無所加愈怏怏不得志歎曰我功當為王但爾者陛下忘我邪是時北州破散而漁陽差完有舊鹽鐵官寵轉以貿穀積珍寶益富彊朱浮與寵不相能浮數譖搆之建武二年春詔徵寵寵意浮賣己上疏願與浮俱徵又與吳漢蓋延等書盛言浮枉狀固求同徵帝不許益以自疑而其妻素剛不堪抑屈固勸無受召寵又與常所親信吏計議皆懷怨於浮莫有勸行者帝遣寵從弟子后蘭卿喻之寵因留子后蘭卿遂發兵反拜署將帥自將二萬餘人攻朱浮於薊分兵徇廣陽上谷右北平又自以與耿況俱有重功而恩賞並薄數遣使要誘況況不受輒斬其使秋帝使游擊將軍鄧隆救薊隆軍潞南浮軍雍奴遣吏奏狀帝讀檄怒謂使吏曰營相去百里其勢豈可得相及比若還北軍必敗矣寵果盛兵臨河以拒隆又別發輕騎三千襲其後大破隆軍浮遠遂不能救引而去明年春寵遂拔右北平上谷數縣遣使以美女繒綵賂遺匈奴要結和親單于使左南將軍七八千騎往來為游兵以助寵又南結張步及富平獲索諸豪傑皆與交質連衡遂攻拔薊城自立為燕王其妻數惡夢又多見變卜筮及望氣者皆言兵當從中起寵疑子后蘭卿質漢歸故不信之使將兵岩無親於中五年春寵齋獨在便室蒼頭子密等三人因寵臥寐共縛著牀告外吏云大王齋禁皆使吏休偽稱寵命教收縛奴婢各置一處又以寵命呼其妻妻入大驚寵急呼曰趣為諸將軍辦裝於是兩奴將妻入取寶物留一奴守寵寵謂守奴曰若小兒我素愛也今為子密所迫劫耳解我縛當以女珠妻汝家中財物皆與若小奴意欲解之視戶外見子密聽其語遂不敢解於是收金玉衣物至寵所裝之被馬六疋使妻縫兩縑囊昬夜後解寵手令作記告城門將軍云今遣子密等至子后蘭卿所速開門出勿稽留之書成即斬寵及妻頭置囊中便持記馳出城因以詣闕封為不義侯明旦閤門不開官屬踰牆而入見寵屍驚怖其尚書韓立等共立寵子午為王以子后蘭卿為將軍國師韓利斬午首詣征虜將軍祭遵降夷其宗族盧芳字君期安定三水人也居左谷中王莽時天下咸思漢德芳由是詐自稱武帝曾孫劉文伯曾祖母匈奴谷蠡渾邪王之姊為武帝皇后生三子遭江充之亂太子誅皇后坐死中子次卿亡之長陵小子回卿逃於左谷霍將軍立次卿迎回卿回卿不出因居左谷生子孫卿孫卿生文伯常以是言誑惑安定閒王莽末乃與三水屬國羌胡起兵更始至長安徵芳為騎都尉使鎮撫安定以西更始敗三水豪傑共計議以芳劉氏子孫宜承宗廟乃共立芳為上將軍西平王使使與西羌匈奴結和親單于曰匈奴本與漢約為兄弟後匈奴中衰呼韓邪單于歸漢漢為發兵擁護世世稱臣今漢亦中絕劉氏來歸我亦當立之令尊事我乃使句林王將數千騎迎芳芳與兄禽弟程俱入匈奴單于遂立芳為漢帝以程為中郎將將胡騎還入安定初五原人李興隨昱朔方人田颯代郡人石鮪閔堪各起兵自稱將軍建武四年單于遣無樓且渠王入五原塞與李興等和親告興欲令芳還漢地為帝五式李興閔堪引兵至單于庭迎芳與俱入塞都九原縣掠有五原朔方雲中定襄鴈門五郡並置守令與胡通兵侵苦北邊六年芳將軍賈覽將胡騎擊殺代郡太守劉興芳後以事誅其五原太守李興兄弟而其朔方太守田颯雲中太守橋扈恐懼叛芳舉郡降光武令領職如故後大司馬吳漢驃騎大將軍杜茂數擊芳並不剋十二年芳與賈覽共攻雲中久不下其將隨昱留守九原欲脅芳降芳知羽翼外附心膂內離遂棄輜重與十餘騎亡入匈奴其衆盡歸隨昱昱乃隨使者程恂詣闕拜昱為五原太守封鐫胡侯昱弟憲武進侯十六年芳復入居高柳與閔堪兄林使使請降乃立芳為代王堪為代相林為代太傅賜繒二萬匹因使和集匈奴芳上疏謝曰臣芳過託先帝遺體棄在邊陲社稷遭王莽廢絕以是子孫之憂所宜共誅故遂西連羌戎北懷匈奴單于不忘舊德權立救助是時兵革並起往往而在臣非敢有所貪覬期於奉承宗廟興立社稷是以久僭號位十有餘年罪宜萬死陛下聖德高明躬率衆賢海內賓服惠及殊俗以胏附之故赦臣芳罪加以仁恩封為代王使備北藩無以報塞重責冀必欲和輯匈奴不敢遺餘力負恩貸謹奉天子玉璽思望闕庭詔報芳朝明戎縣諢其冬芳入朝南及昌平有詔止令更朝明歲芳自道還憂恐乃復背叛遂反與閔堪閔林相攻連月匈奴遣數百騎迎芳及妻子出塞芳留匈奴中十餘年病死初安定屬國胡與芳為寇及芳敗胡人還鄉里積苦縣官徭役其中有駮馬少伯者素剛壯二十一年遂率種人反叛與匈奴連和屯聚青山乃遣將兵長史陳訢率三千騎擊之少伯乃降徙於冀縣論曰傳稱盛德必百世祀孔子曰寬則得衆夫能得衆心則百世不忘矣觀更始之際劉氏之遺恩餘烈英雄豈能抗之哉然則知高祖孝文之寬仁結於人心深矣周人之思邵公愛其甘棠又況其子孫哉劉氏之再受命蓋以此乎若數子者豈有國之遠圖哉因時擾攘苟恣縱而已耳然猶以附假宗室能掘強歲月之閒觀其智略固無足以憚漢祖發其英靈者也贊曰天地閉革野戰羣龍昌芳僭詐梁齊連鋒寵負強地憲縈深江實惟非律代委神邦, WYG: ''}
