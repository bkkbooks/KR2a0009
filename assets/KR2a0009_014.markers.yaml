  - {type: variant, offset: 43, length: 4, content: 氣時趙繆, WYG: 再拜興有司告事畢也明堂五郊宗廟太社稷六宗夕牲皆以晝漏十四刻初納夜漏未盡七刻初納進熟獻送神還有司告事畢六宗燔燎火大然有司告事畢正月始耕月令曰天子親載耒耜措之參保介之御間帥三公九卿躬耕帝籍盧植注曰帝天也藉耕也晝漏上水初納執事告祠先農已享賀循藉田儀曰漢耕日以太牢祭先農於田所春秋傳曰耕藉之禮唯齋三日左傳曰鄅人藉稻杜預注曰藉稻履行之薛綜注二京賦曰為天神借民力於此田故名曰帝藉田在國之辰地干寳周禮注曰古之}
