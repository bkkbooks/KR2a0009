  - {type: variant, offset: 267, length: 2, content: 李育, WYG: 皆勸民始耕如儀諸行出入皆鳴鍾皆作樂其有災眚有他故若請雨止雨皆不鳴鍾不作樂春秋釋痾曰漢家郡守行大夫禮鼎爼籩豆工歌縣何休曰漢家法陳師置守相故行其樂也仲春之月立高禖祠于城南祀以特牲月令𤣥鳥至之日以太牢祠詩曰克禋克祀以弗無子毛萇傳曰弗去無子求有子古者必立郊禖焉𤣥鳥至之日以太牢祀于郊禖天子親往后妃帥九嬪御乃禮天子所御帶以弓韣授以弓矢于郊禖之前鄭𤣥注云弗之言祓也禋祀上帝于郊禖以祓無子之疾而得福也月令章句曰髙尊也禖祀也吉事先見之象也盖}
  - {type: page-break, offset: 267, content: '', id: KR2a0009_WYG_014-7a, image: WYG0252/WYG0252-0250c.png}
  - {type: variant, offset: 267, length: 2, content: 李育, krp: 皆勸民始耕如儀諸行出入皆鳴鍾皆作樂其有災眚有他故若請雨止雨皆不鳴鍾不作樂春秋釋痾曰漢家郡守行大夫禮鼎爼籩豆工歌縣何休曰漢家法陳師置守相故行其樂也仲春之月立高禖祠于城南祀以特牲月令𤣥鳥至之日以太牢祠詩曰克禋克祀以弗無子毛萇傳曰弗去無子求有子古者必立郊禖焉𤣥鳥至之日以太牢祀于郊禖天子親往后妃帥九嬪御乃禮天子所御帶以弓韣授以弓矢于郊禖之前鄭𤣥注云弗之言祓也禋祀上帝于郊禖以祓無子之疾而得福也月令章句曰髙尊也禖祀也吉事先見之象也盖}
  - {type: variant, offset: 270, length: 0, content: '', WYG: 人所以祈子孫之祀𤣥烏感陽而至其來主為字乳蕃滋故重其至日因以用事契母簡狄盖以𤣥鳥至日有事髙禖而生契焉故詩曰天命𤣥鳥降而生商韣弓衣也祀以高禖之命飲之以醴帶以弓衣尚使得男也離騷曰簡狄在臺嚳何宜𤣥鳥致胎女何嘉王逸曰言簡狄侍帝嚳於臺上有飛燕堕其卵嘉而吞之因生契鄭𤣥注禮記曰後王以為禖官嘉祥而立其祠盧植注云𤣥鳥至時隂陽中萬物生故於是以三牲請子於髙禖之神居明顯之處故謂之高因其求子故謂之禖以為古者有媒氏之官因以為神晉元康中髙禖壇上石破詔問出何經典朝士莫知博士束晳答曰漢武帝晚得太子始為立高禖之祠髙禖者人之先也故立石為主祀以太牢明帝永平二年三月上始帥羣臣躬養三老五更于辟雍孝經援神契曰尊三老者父象也謁者奉几安車輭輪供綏執事五更寵以度接禮交容謙恭順貌宋均曰三老老人知天地人事者奉几授三老也安車坐乗之車輭輪蒲裹輪供綏三老就車天子親執綏授之五更老人知五行更代之事者度法也度以寵異之也鄭𤣥注禮記曰皆年老更事致仕者也名三五者取象三辰五星天所因以照明天下者𤣥又一注皆老人更知三徳五事者也應劭漢官儀曰三老五更三代所尊也安車輭輪送迎至家天子獨拜于屛三者道成於天地人老者久也舊也五者訓於五品更者五世長子更更相代言其能以善道改更已也三老五更皆取有首妻男女完具臣昭按桓榮五更後除兄子二人補四百石則榮非長子矣蔡邕曰五更長老之稱也行}
  - {type: page-break, offset: 270, content: '', id: KR2a0009_WYG_014-7b, image: WYG0252/WYG0252-0250d.png}
