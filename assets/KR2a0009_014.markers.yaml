  - {type: variant, offset: 1973, length: 925, content: 騎夜去欲從閒道歸降而吳漢校尉韓湛追斬憲於方與方與人黔陵亦斬萌皆傳首洛陽封韓湛為列侯黔陵關內侯張步字文公琅邪不其人也漢兵之起步亦聚衆數千轉攻傍縣下數城自為五威將軍遂據本郡更始遣魏郡王閎為琅邪太守步拒之不得進閎為檄曉喻吏人降得贛榆等六縣收兵數千人與步戰不勝時梁王劉永自以更始所立貪步兵彊承制拜步輔漢大將軍忠節侯督青徐二州使征不從命者步貪其爵號遂受之乃理兵於劇以弟弘為衞將軍弘弟藍玄武大將軍藍弟壽高密太守遣將徇太山東萊城陽膠東北海濟南齊諸郡皆下之步拓地廣兵甲日盛王閎懼其衆散乃詣步相見欲誘以義方步大陳兵引閎怒曰步有何過君前見攻之甚乎閎按劒曰太守奉朝命而文公擁兵相距閎攻賊耳何謂甚邪步嘿然良久離席跪謝乃陳樂獻酒待以上賓之禮令閎關掌郡事建武三年光武遣光祿大夫伏隆持節使齊拜步為東萊太守劉永聞隆至劇乃馳遣立步為齊王步即殺隆而受永命是時帝方北憂漁陽南事梁楚故步得專集齊地據郡十二及劉永死步等欲立永子紆為天子自為定漢公置百官王閎諫曰梁王以奉本朝之故是以山東頗能歸之今尊立其子將疑衆心且齊人多詐宜且詳之步乃止五年步聞帝將攻之以其將費邑為濟南王屯歷下冬建威大將軍耿弇破斬費邑進拔臨淄步以弇兵少遠客可一舉而取乃悉將其衆攻弇於臨淄步兵大敗還奔劇帝自幸劇步退保平壽蘇茂將萬餘人來救之茂讓步曰以南陽兵精延岑善戰而耿弇走之大王柰何就攻其營既呼茂不能待邪步曰負負無可言者帝乃遣使告步茂能相斬降者封為列侯步遂斬茂使使奉其首降步三弟各自繫所在獄皆赦之封步為安丘侯後與家屬居洛陽王閎亦詣劇降八年夏步將妻子逃奔臨淮與弟弘藍欲招其故衆乘船入海琅邪太守陳俊追擊斬之王閎者王莽叔父平阿侯譚之子也哀帝時為中常侍時倖臣董賢為大司馬寵愛貴盛閎屢諫忤旨哀帝臨崩以璽綬付賢曰無妄以與人時國無嗣主內外恇懼閎白元后請奪之即帶劒至宣德後闥舉手叱賢曰宮車晏駕國嗣未立公受恩深重當俯伏號泣何事久持璽綬以待禍至邪賢知閎必死不敢拒之乃跪授璽綬閎持上太后朝廷壯之及王莽篡位僭忌閎乃出為東郡太守閎懼誅常繫藥手內莽敗漢兵起閎獨完全東郡三十餘萬戶歸降更始李憲者潁川許昌人也王莽時為廬江屬令莽末江賊王州公等起衆十餘萬攻掠郡縣莽以憲為偏將軍廬江連率擊破州公莽敗憲據郡自守更始元年自稱淮南王建武三年遂自立為天子置公卿百官擁九城衆十餘萬, WYG: ''}
