  - {type: variant, offset: 270, length: 0, content: '', krp: 人所以祈子孫之祀𤣥烏感陽而至其來主為字乳蕃滋故重其至日因以用事契母簡狄盖以𤣥鳥至日有事髙禖而生契焉故詩曰天命𤣥鳥降而生商韣弓衣也祀以高禖之命飲之以醴帶以弓衣尚使得男也離騷曰簡狄在臺嚳何宜𤣥鳥致胎女何嘉王逸曰言簡狄侍帝嚳於臺上有飛燕堕其卵嘉而吞之因生契鄭𤣥注禮記曰後王以為禖官嘉祥而立其祠盧植注云𤣥鳥至時隂陽中萬物生故於是以三牲請子於髙禖之神居明顯之處故謂之高因其求子故謂之禖以為古者有媒氏之官因以為神晉元康中髙禖壇上石破詔問出何經典朝士莫知博士束晳答曰漢武帝晚得太子始為立高禖之祠髙禖者人之先也故立石為主祀以太牢明帝永平二年三月上始帥羣臣躬養三老五更于辟雍孝經援神契曰尊三老者父象也謁者奉几安車輭輪供綏執事五更寵以度接禮交容謙恭順貌宋均曰三老老人知天地人事者奉几授三老也安車坐乗之車輭輪蒲裹輪供綏三老就車天子親執綏授之五更老人知五行更代之事者度法也度以寵異之也鄭𤣥注禮記曰皆年老更事致仕者也名三五者取象三辰五星天所因以照明天下者𤣥又一注皆老人更知三徳五事者也應劭漢官儀曰三老五更三代所尊也安車輭輪送迎至家天子獨拜于屛三者道成於天地人老者久也舊也五者訓於五品更者五世長子更更相代言其能以善道改更已也三老五更皆取有首妻男女完具臣昭按桓榮五更後除兄子二人補四百石則榮非長子矣蔡邕曰五更長老之稱也行}
  - {type: variant, offset: 271, length: 0, content: '', WYG: 射之禮袁山松書曰天子皮弁素積親射大侯郡縣道行鄉飲酒于學校皆祀聖師周公孔子牲以犬鄭𤣥注儀禮曰狗取擇人孟冬亦如之石渠論曰鄉射合樂而大射不何也韋𤣥成曰鄉人本無樂故於嵗時合樂以同其意諸侯故自有樂故不復合樂鄭𤣥注鄉飲酒禮曰今郡國十月行鄉飲酒禮黨正每嵗邦索鬼神而祭祀則以禮屬民而飲酒于序以正齒位之禮凡鄉黨飲酒必於民聚之時欲其見化知尚賢尊長也𤣥冠衣皮弁服與禮異服䖍應劭曰漢家郡縣饗射祭祀皆假士禮而行之樂懸笙磬籩爼皆如士制於是七郊禮樂三雍之義備矣養三老五更之儀先吉日}
  - {type: page-break, offset: 271, content: '', id: KR2a0009_WYG_014-8b, image: WYG0252/WYG0252-0251b.png}
  - {type: variant, offset: 271, length: 0, content: '', krp: 射之禮袁山松書曰天子皮弁素積親射大侯郡縣道行鄉飲酒于學校皆祀聖師周公孔子牲以犬鄭𤣥注儀禮曰狗取擇人孟冬亦如之石渠論曰鄉射合樂而大射不何也韋𤣥成曰鄉人本無樂故於嵗時合樂以同其意諸侯故自有樂故不復合樂鄭𤣥注鄉飲酒禮曰今郡國十月行鄉飲酒禮黨正每嵗邦索鬼神而祭祀則以禮屬民而飲酒于序以正齒位之禮凡鄉黨飲酒必於民聚之時欲其見化知尚賢尊長也𤣥冠衣皮弁服與禮異服䖍應劭曰漢家郡縣饗射祭祀皆假士禮而行之樂懸笙磬籩爼皆如士制於是七郊禮樂三雍之義備矣養三老五更之儀先吉日}
  - {type: variant, offset: 272, length: 0, content: '', WYG: 徒上太傅若講師故三公人名用其徳行年耆髙者一人為老次一人為更也盧植禮記注曰選三公老者為三老卿大夫中之老者為五更亦參五之也皆服都紵大袍單衣皁縁領袖中衣冠進賢扶玉杖五更亦如之不杖皆齋于太學講堂月令章句曰三老國老也五更庶老也其日乘輿先到辟雍禮殿御坐東廂遣使者安車迎三老五更天子迎于門屏交禮道自阼階三老升自賔階至階天子揖如禮三老升東面三公設几九卿正履天子親袒割牲執醬而饋執爵而酳祝鯁在前祝饐在後禮記曰天子適饌省醴養老之珍具遂發詠焉退修之以孝養反升歌清廟孝養之詩也五更南面公進供禮亦如之譙周五經然否曰漢初或云三老答天子拜遭王莽之亂法度殘缺漢中興定禮儀羣臣欲令三老答拜城門校尉董鈞駮曰養三老所以教事父之道也若答拜是使天下答子拜也詔從鈞議譙周論之曰禮尸服上服猶以非親之故答子拜士見異國君亦答拜是皆不得視猶子也虞喜曰且據漢儀於門屏交禮交禮即答拜中興謬從鈞議後革之深得其意明日皆詣闕謝恩以見禮遇大尊顯故也前書禮樂志曰顯宗因祀光武皇帝於明堂養三老五更於辟雍威儀既盛矣徳化未流洽者以其禮樂未具羣下無所誦說而庠序尚未設之故也孔子曰譬如為山未成一簣止吾止也是月皇后帥公卿諸侯夫人蠶丁孚漢儀曰皇后出乘鸞輅青羽盖駕駟}
