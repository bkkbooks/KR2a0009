  - {type: variant, offset: 6, length: 0, content: '', WYG: 日皆牽羊酒至社下以祭日日有變割羊以祠社用救日日變執事者冠長冠衣皂單衣絳領袖緑中衣絳袴􅙋以行禮如故事公羊傳曰日有食之鼔用牲于社求乎隂之道也以朱絲縈社或曰脅之或曰為閣恐人犯之故縈之也何休曰脅之與責求同義社者土地之主也月者土地之精也上繋於天而犯日故鳴鼔而攻之脅其本也朱絲縈之助陽抑隂也或曰為闇者社者土地之主尊也為日光盡天闇㝠恐人犯歴之故縈之然此説非也先言鼔後言用牲者明先以尊者命責之後以臣子禮接之所以為順也白虎通曰日食必救之隂侵陽也鼔攻之以陽責隂也故春秋日食鼓用牲于社所以必用牲者土地别神也尊之不敢虚責也日食大水則鼓用牲大旱則雩祭求雨非虚言也助陽責下求隂之道也決疑要注曰凡救日食皆著赤幘以助陽也日將食天子素服避正殿内外嚴日有變伐鼔聞音侍臣著赤幘帶劎入侍三臺令史已下皆持劔立其戸前衛尉卿驅馳繞宫察廵守備周而復始日復常乃皆罷之立春之日夜漏未盡五刻京師百官皆衣青衣郡國縣道官下至斗食令史皆服青幘立青旙施土牛耕人于門外以示兆民至立夏唯武官不立春之日下寛大書曰制詔三公方春東作敬始慎微動作從之罪非殊死且勿案驗皆須麥秋退貪殘進柔良下當用者如故事月令曰命相布徳和令蔡邕曰即此詔之謂也獻帝起居注曰建安二十二年二月壬申詔書絶立春寛緩詔書不復行正月上丁祠南郊白虎通曰春秋傳曰以正月上辛尚書曰丁巳用牲于郊牛二先甲三日辛也後甲三日丁也皆可接事昊天之日禮畢次北郊明堂高廟世祖廟謂之五供五供畢以次上陵西都舊有上陵東都之儀百官四姓親家婦女公主諸}
