  - {type: variant, offset: 265, length: 0, content: '', WYG: 耦一耜之伐廣尺深尺伐發也天子及三公坐而論道參五職事故三公以五為數卿諸侯當究成天子之職事故以九為數伐皆三者禮以三為文力田種各耰訖有司告事畢史記曰漢文帝詔云農天下之本其開藉田朕躬耕以給宗廟粢盛應劭曰古者天子耕藉田千畝為天下先藉者帝王典籍之常也而應劭風俗通又曰古者使民如借故曰藉田鄭𤣥曰藉之言借也王一耕之使庶人耘芓終之盧植曰藉耕也春秋傳曰鄅人藉稻故知藉為耕也韋昭曰借民力以治之以奉宗廟且以勸率天下使務農也杜預注曰鄅人藉稻其君自出藉稻盖履行之瓉曰藉稻藉也本以躬親為義不得以假借為稱也漢舊儀曰春始東耕於藉田官祠先農先農即神農炎帝也祠以一太牢百官皆從大賜三輔二百里孝悌力田三老帛種百榖萬斛為立藉田倉置令}
  - {type: page-break, offset: 265, content: '', id: KR2a0009_WYG_014-6b, image: WYG0252/WYG0252-0250b.png}
