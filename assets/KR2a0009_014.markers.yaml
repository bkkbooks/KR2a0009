  - {type: variant, offset: 86, length: 174, content: 莽殺之郎緣是詐稱真子輿云母故成帝謳者嘗下殿卒僵須臾有黃氣從上下半日乃解遂姙身就館趙后欲害之偽易他人子以故得全子輿年十二識命者郎中李曼卿與俱至蜀十七到丹陽二十還長安展轉中山來往燕趙以須天時林等愈動疑惑乃與趙國大豪李育張參等通謀規共立郎會人閒傳赤眉將度河林等因此宣言赤眉當至立劉子輿以觀衆心百姓多信之更始元年十二月林等遂率車騎數百晨入邯鄲城止於王宮立郎, WYG: 貴}
