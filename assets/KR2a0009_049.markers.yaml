  - {type: variant, offset: 25, length: 0, content: '', WYG: 宛人也上谷太守即弇父也發此兩郡控弦萬騎邯鄲不足慮也光武官屬腹心皆不肯曰死尚南首奈何北行入囊中漁陽上谷北接塞垣至彼路窮如入囊也光武指弇曰是我北道主人也㑹薊中亂續漢志曰弇歸主人食未巳薊中擾亂上駕出南城門頗遮絶輜重城中相掠弇既與上相失以馬與城門亭長乃得出也光武遂南馳官屬各分散弇走昌平就況昌平縣名屬上谷郡今幽州縣故城在縣東也因説況使宼恂東約彭寵各發突騎二千匹歩兵千人弇與景丹宼恂及漁陽兵合軍而南所過擊斬王郎大將九卿校尉以下四百餘級得印級百二十五節二斬首三萬級定涿郡中山鉅鹿清河河間凡二十二縣遂及光武於廣阿是時光武方攻王郎傳言二郡兵為邯鄲来衆皆恐既而悉詣營上謁光武見弇等説曰當與漁陽上谷士大夫共此大功乃皆以為偏將軍使還領其兵加況大將軍興義侯得自置偏裨弇等遂従拔邯鄲時更始徴代郡太守趙永而況勸永不應召令詣扵光武光武遣永復郡永北還而代令張曅據城反畔乃招迎匈奴烏桓以為援助光武以弇弟舒為復胡將軍使擊曅破之永乃得復郡時五校賊二十餘萬北宼上谷況與舒連擊破之賊皆退走更始見光武威聲日盛君臣疑慮乃遣使立光武為蕭王令罷兵與諸將有功者還長安遣苗曾為幽州牧韋順為上谷太守蔡充為漁陽太守並北之部時光武居邯鄲宫晝卧溫眀殿漢趙王如意之殿也故基在今洺州邯鄲縣内弇入造牀下請間因説曰今更始失政君臣淫亂諸將擅命於畿内貴戚縦横扵都内更始傳曰李軼朱鮪擅命山東王匡張卬横㬥三輔天子之命不出城門所在牧守輙自遷易百姓不知所従士人莫敢自安擄掠財物刼掠婦女懐金玉者至不生歸元元叩心更思莽朝又銅馬赤眉之屬數十輩軰數十百萬聖公不能辦也辦猶成也音蒲莧反其敗不久公首事南陽破百萬之軍今定河北北據天府之地前書曰關中所謂金城天府弇以河北富饒故以喻焉劉攽曰河北北據按文多一北字以義征伐發號響應天下可傳檄而定天下至重不可令它姓得之聞使者従西方来欲罷兵不可従也今吏士死亡者多弇願歸幽州益發精兵以集其大計劉攽曰按文多一其字光武大説續漢書曰光武初見弇言起坐曰卿失言我斬卿弇曰大王哀厚弇如父子故披赤心為大王陳事上曰我戲卿耳乃拜弇為大將軍與呉漢北發幽州十郡兵弇到上谷收韋順蔡充斬之漢亦誅苗曾於是悉發幽州兵引而南從光武擊破銅馬髙湖赤眉青犢又追尤来大槍五幡扵元氏弇常將精騎為軍鋒輙破走之光武乗勝戰慎水上虜危急殊死戰時軍士疲弊遂大敗奔還壁范陽數日乃振壁謂築壘壁也賊亦退去従追至容城小廣陽安次連戰破之容城縣名屬涿郡故城在今易州道縣也廣陽國有廣陽縣故曰小廣陽及安次縣名並在今幽州也光武還薊復遣弇與呉漢景丹蓋延朱祐邳彤耿純劉植岑彭祭遵堅鐔王霸陳俊馬武十三將軍追賊至潞東及平谷平谷解見光武紀再戰斬首萬三千餘級遂窮追扵右北平無終土垠之間無終土垠並縣名屬右北平郡無終故城在今漁陽縣土垠故城在今平州西南垠音銀至浚靡而還浚靡縣名屬右北平故城在今漁陽縣北靡音麻賊散入遼西遼東或為烏桓貊人所鈔擊略盡光武即位拜弇為建威大將軍與驃騎大將軍景丹彊弩將軍陳俊攻厭}
