  - {type: variant, offset: 37, length: 2, content: 興初, WYG: 安帝崩閻太后以寳等阿附嬖倖共為不道策免寳及承皆貶爵為亭侯遣就國寳於道自殺國除決録注曰寳字君逹大貴人數為耿氏請陽嘉三年順帝遂詔封寳子劉攽曰按前後皆作紹封此誤箕牟平侯為侍中以恒為陽亭侯承為羽林中郎將其後貴人薨大將軍梁冀従承求貴人珍玩不􅀎得冀怒風有司奏奪其封承惶恐遂亡匿於穰數年冀推迹得之乃并族其家十餘人論曰淮隂廷論項王審料成埶則知高祖之廟勝矣淮隂侯韓信也史記韓信説髙祖曰項王特匹夫之勇婦人之仁也名雖霸實失天下心今大王入闗秋毫無所取秦人無不欲得大王王秦者今大王舉而東三秦可傳檄而定於是漢王舉兵定三秦廟勝謂謀兵於廟而勝敵弇決策河北劉攽曰按他傳賛語無单言名者眀少一耿字下文乃可言弇耳定計南陽亦見光武之業成矣然弇自剋拔全齊而無復尺寸功夫豈不懐懐思也言豈不思重立大功乎將時之度數不足以相容乎三世為將道家所忌史記曰秦使王翦之孫王離撃趙或曰王離秦之名將舉之必矣客曰不然夫將三代必敗以其殺伐多也其後受其不祥劉攽曰注以其殺伐多也按文多一也字而耿氏累葉}
