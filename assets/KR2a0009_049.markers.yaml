  - {type: variant, offset: 84, length: 3, content: 遷桂陽, WYG: 千餘級單于與數騎脱亡盡獲其匈奴珍寳財畜去塞五千餘里而還自漢出師所未嘗至也乃封夔粟邑侯粟邑縣名屬左馮翊故城在今同州白水縣西北㑹北單于弟左鹿蠡王於除鞬自立為單于衆八部二萬餘人來居蒲類海上遣使欵塞以夔為中郎將持節衞護之及竇憲敗夔亦免官奪爵土後復為長水校尉拜五原}
