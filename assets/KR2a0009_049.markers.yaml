  - {type: variant, offset: 28, length: 0, content: '', WYG: 杜􅒮率其衆以従岑弇與岑等戰於穰大破之斬首三千餘級生獲其將士五千餘人得印綬三百杜􅒮降岑與數騎遁走東陽弇従幸舂陵因見自請北收上谷兵未發者定彭寵扵漁陽取張豐扵涿郡還收富平獲索東攻張歩以平齊地帝壮其意乃許之四年詔弇進攻漁陽弇以父據上谷本與彭寵同功又兄弟無在京師者自疑不敢獨進上書求詣洛陽詔報曰將軍出身舉宗為國所向陷敵功效尤著何嫌何疑而欲求徴且與王常共屯涿郡勉思方略況聞弇求徴亦不自安遣舒弟國入侍帝善之進封況為隃麋侯隃麋縣名屬右扶風故城在今隴州汧陽縣東南隃音踰乃命弇與建義大將軍朱祐漢忠將軍王常等擊望都故安西山賊十餘營皆破之望都縣名屬中山國堯母慶都山在南故以名焉故城在今定州唐縣東北故安縣名故城在今易州易縣東南時征虜將軍祭遵屯良鄉良郷縣名屬涿郡驍騎將軍劉喜屯陽鄉陽郷縣名屬涿郡故城在今幽州故安縣西北以拒彭寵寵遣弟純將匈奴二千餘騎寵自引兵數萬分為兩道以撃遵喜胡騎經軍都軍都縣屬廣陽郡有軍都山在西北今幽州昌平縣舒襲破其衆斬匈奴兩王寵乃退走況復與舒攻寵取軍都五年寵死天子嘉況功使光禄大夫持節迎況袁山松書曰使光禄大夫樊宏詔況曰惟況功大不宜監察従事邉郡寒苦不足久居其詣行在所賜甲第奉朝請封牟平侯遣弇與呉漢擊富平獲索賊於平原大破之降者四萬餘人因詔弇進討張歩弇􅊖收集降卒結部曲置將吏率騎都尉劉歆}
