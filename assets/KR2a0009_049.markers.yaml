  - {type: variant, offset: 89, length: 0, content: '', WYG: 遷遼東太守元興元年貊人寇郡界夔追擊斬其渠帥永初三年南單于檀反畔使夔率鮮卑及諸郡兵屯鴈門與車騎將軍何熙共擊之熙推夔為先鋒而遣其司馬耿溥劉祉將二千人與夔俱進到屬國故城單于遣薁鞬日逐王三千餘人遮漢兵夔自擊其左令鮮卑攻其右虜遂敗走追斬千餘級殺其名王六人獲穹廬車重千餘兩馬畜生口甚衆鮮卑馬多羸病遂畔出塞夔不䏻獨進以不窮追左轉雲中太守後遷行度遼將軍事夔勇而有氣數侵陵匈奴中郎將鄭戩音翦元初元年坐徴下獄以减死論笞二百建光中復拜度遼將軍時鮮卑攻殺雲中太守成嚴圍烏桓校尉徐常於馬城馬城縣名屬代郡故城在今雲中定襄縣秦始皇初築城輒崩壊其後有馬周章馳走因随馬迹起城故以名焉夔與幽州刺史龎參救之追虜出塞而還後坐法免卒於家恭字伯宗國弟廣之子也少孤慷慨多大略有將帥才}
