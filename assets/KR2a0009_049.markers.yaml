  - {type: variant, offset: 125, length: 0, content: '', WYG: 昆彌已下皆歡喜遣使獻名馬及奉宣帝時所賜公主博具武帝元封中遣江都王建女細君為公主嫁與烏孫昆莫賜乗輿服御官屬侍御數百人贈送甚盛盖後宣帝賜以博具也願遣子入侍恭乃發使齎金帛迎其侍子眀年三月北單于遣左鹿蠡王二萬騎撃車師恭遣}
  - {type: variant, offset: 125, length: 0, content: '', krp: 昆彌已下皆歡喜遣使獻名馬及奉宣帝時所賜公主博具武帝元封中遣江都王建女細君為公主嫁與烏孫昆莫賜乗輿服御官屬侍御數百人贈送甚盛盖後宣帝賜以博具也願遣子入侍恭乃發使齎金帛迎其侍子眀年三月北單于遣左鹿蠡王二萬騎撃車師恭遣}
  - {type: variant, offset: 126, length: 1, content: 農, WYG: 馬將兵三百人救之道逄匈奴騎多皆為所殁匈奴遂破殺後王安得而攻金蒲城恭乗城摶戰以毒藥傅矢傳語匈奴曰漢家箭神其中瘡者必有異因發彊弩射之虜中矢者視創皆沸遂大驚㑹天暴風雨随雨擊之殺傷甚衆匈奴震怖相謂曰漢兵神真可畏也遂解去恭以疏勒城傍有澗水可固五月乃引兵據之七月匈奴復来攻恭恭募先登數千人直馳之胡騎散走匈奴遂於城下擁絶澗水恭於城中穿井十五丈不得水吏士渇乏笮馬糞汁而飲之笮謂壓笮也恭仰嘆曰聞昔貳師將軍拔佩刀刺山飛泉涌出貳師大宛中城名昔武帝時使李廣利伐大宛期至貳師城因以為號也今漢徳神眀豈有窮哉乃整衣服向井再拜為吏士禱有頃水泉奔出衆皆稱萬嵗乃令吏士揚水以示虜東觀記曰恭親自挽籠於是令士且勿飲先和泥塗城并揚示之虜出不意以為神眀遂引去時焉耆龜兹攻歿都䕶陳睦北虜亦圍關寵於栁中㑹顯宗崩救兵不至車師復畔與匈奴共攻恭恭厲士衆擊走之後王夫人先世漢人常私以虜情告恭又給以糧餉}
