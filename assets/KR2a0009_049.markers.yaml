  - {type: variant, offset: 921, length: 0, content: '', WYG: 正月㑹栁中擊車師攻交河城前書曰車師前王居交河城河水分流繞城下故號交河去長安八千一百五十里故城在今西州交河縣也斬首三千八百級獲生口三千餘人駝驢馬牛羊三萬七千頭北虜驚走車師復降東觀記曰車師太子比持訾降㑹闗寵已歿䝉等聞之便欲引兵還先是恭遣軍吏范羌至敦煌迎兵士寒服羌因随王蒙軍俱出塞羌固請迎恭諸將不敢前乃分兵二千人與羌従山北迎恭遇大雪丈餘軍僅能至城中夜聞兵馬聲}
