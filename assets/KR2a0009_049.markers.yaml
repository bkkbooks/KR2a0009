  - {type: variant, offset: 77, length: 1, content: 仕, WYG: 歴頓丘陽翟上蔡令所在吏人稱之徵為五官中郎將是時烏桓鮮卑屢㓂外境國素有籌策數言邉事帝器之及匈奴薁鞬日逐王比自立為呼韓邪單于欵塞稱藩願扞禦北虜事下公卿議者皆以為天下初定中國空虚夷狄情偽難知不可許國獨曰臣以為宜如孝宣故事受之宣帝甘露二年呼韓邪單于欵塞請朝帝發所過郡二千騎迎之寵以殊禮位在諸侯王上賛謁稱臣而不名令東扞鮮卑北拒匈奴率厲四夷完復邉郡使塞下無晏開之警晏晚也有警急則開門晚也萬世有安寜之策也劉攽曰按文多有字縁上言無遂妄生此對文非也帝従其議遂立比為南單于由是烏桓鮮卑保塞自守北虜逺遁中國少事二十七年代馮勤為大司馬又上言宜置度遼將軍左右校尉屯五原以防逃亡永平元年卒官顯宗追思國言後遂致度遼將軍劉攽曰按致當作置左右校尉如其議焉國二子秉夔秉字伯初有偉體腰帶八圍博通書記能説司馬兵法尤好將帥之略以父任為郎數上言兵事常以中國虚費邊陲不寜其患專在匈奴以戰去戰盛王之道顯宗既有志北伐隂然其言永平中召詣省闥問前後所上便宜方略拜謁者僕射遂見親幸每公卿㑹議常引秉上殿訪以邊事多簡帝心十五年拜駙馬都尉十六年以騎都尉秦彭為副與奉車都尉竇固等俱北伐匈奴虜皆奔走不戰而還十七年夏詔秉與固合兵萬四千騎復出白山擊車師車師有後王前王前王即後王之子其廷相去五百餘里固以後王道逺山谷深士卒寒苦欲攻前王秉議先赴後王以為并力根夲則前王自服固計未決秉奮身而起曰請行前乃上馬引兵北入衆軍不得已遂進並縦兵抄掠斬首數千級收馬牛十餘萬頭後王安得震怖縦數百騎出迎秉而固司馬蘇安欲全功歸固即馳謂安得曰漢貴將獨有奉車都尉天子姊壻固尚光武女湼陽公主眀帝姊也爵為通侯當先降之安得乃還更令其諸將迎秉秉大怒被甲上馬麾其精騎徑造固壁言曰車師王降訖今不至請往梟其首固大驚曰且止將敗事秉厲聲曰受降如受敵遂馳赴之安得惶恐走出門脱帽抱馬足降東觀記曰脱帽趨抱馬蹏也秉將以詣固其前王亦歸命遂定車師而還眀年秋肅宗即位拜秉征西將軍遣案行涼}
