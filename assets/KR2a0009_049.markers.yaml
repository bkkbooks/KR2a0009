  - {type: variant, offset: 2471, length: 1074, content: 書以立后事大謙不自專欲假之籌策決疑靈神篇籍所記祖宗典故未嘗有也恃神任筮既不必當賢就值其人猶非德選夫岐嶷形於自然俔天必有異表宜參良家簡求有德德同以年年鈞以貌稽之典經斷之聖慮政令猶汗往而不反詔文一下形之四方臣職在拾遺憂深責重是以焦心冒昧陳聞帝從之以梁貴人良家子定立為皇后時尚書令左雄議改察舉之制限年四十以上儒者試經學文吏試章奏廣復與敞虔上書駮之曰臣聞君以兼覽博照為德臣以獻可替否為忠書載稽疑謀及卿士詩美先人詢于芻蕘國有大政必議之於前訓諮之於故老是以慮無失策舉無過事竊見尚書令左雄議郡舉孝廉皆限年四十以上諸生試章句文吏試牋奏明詔既許復令臣等得與相參竊惟王命之重載在篇典當令縣於日月固於金石遺則百王施之萬世詩云天難諶斯不易惟王可不慎與蓋選舉因才無拘定制六奇之策不出經學鄭阿之政非必章奏甘奇顯用年乖彊仕終賈揚聲亦在弱冠漢承周秦兼覽殷夏祖德師經參雜霸軌聖主賢臣世以致理貢舉之制莫或回革今以一臣之言剗戾舊章便利未明衆心不猒矯枉變常政之所重而不訪台司不謀卿士若事下之後議者剝異異之則朝失其便同之則王言已行臣愚以為可宣下百官參其同異然後覽擇勝否詳採厥衷敢以瞽言冒干天禁惟陛下納焉帝不從時陳留郡缺職尚書史敞等薦廣曰臣聞德以旌賢爵以建事明試以功典謨所美五服五章天秩所作是以臣竭其忠君豐其寵舉不失德下忘其死竊見尚書僕射胡廣體真履規謙虛溫雅博物洽聞探賾窮理六經典奧舊章憲式無所不覽柔而不犯文而有禮忠貞之性憂公如家不矜其能不伐其勞翼翼周慎行靡玷漏密勿夙夜十有餘年心不外顧志不苟進臣等竊以為廣在尚書劬勞日久後母年老既蒙簡照宜試職千里匡寧方國陳留近郡今太守任缺廣才略深茂堪能撥煩願以參選紀綱頹俗使束脩守善有所勸仰廣典機事十年出為濟陰太守以舉吏不實免復為汝南太守入拜大司農漢安元年遷司徒質帝崩代李固為太尉錄尚書事以定策立桓帝封育陽安樂鄉侯以病遜位又拜司空告老致仕尋以特進徵拜太常遷太尉以日食免復為太常拜太尉延熹二年大將軍梁冀誅廣與司徒韓縯司空孫朗坐不衞宮皆減死一等奪爵土免為庶人後拜太中大夫太常九年復拜司徒靈帝立與太傅陳蕃參錄尚書事復封故國以病自乞會蕃被誅代為太傅總錄如故時年已八十而心力克壯繼母在堂朝夕瞻省傍無几杖言不稱老及母卒居喪盡哀率禮無愆性溫柔謹素常遜言恭色達練事體明解朝章雖無謇直之風屢有補闕之益故京師諺曰萬事不理問伯始天下中庸有胡公及共李固定策大議不全又與中常侍丁肅婚姻以此譏毀於時自在公台三十餘年歷事六帝禮任甚優每遜位辭病及免退田里未嘗滿歲輒復升進凡一履司空再作司徒三登太尉又為太傅其所辟命皆天下名士與故吏陳蕃李咸並為三司蕃等每朝會輒稱疾避廣時人榮之年八十二熹平元年薨, WYG: ''}
