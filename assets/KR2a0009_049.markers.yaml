  - {type: variant, offset: 1605, length: 722, content: 司徒延平元年遷太尉與太傅張禹參錄尚書事數受賞賜甚見優寵安帝即位以定策封龍鄉侯食邑千一百戶其年以災異寇賊策免就國凡三公以災異策免始自防也防卒子衡當嗣讓封於其弟崇數歲不得已乃出就爵云張敏字伯達河閒鄚人也建初二年舉孝廉四遷五年為尚書建初中有人侮辱人父者而其子殺之肅宗貰其死刑而降宥之自後因以為比是時遂定其議以為輕侮法敏駮議曰夫輕侮之法先帝一切之恩不有成科班之律令也夫死生之決宜從上下猶天之四時有生有殺若開相容恕著為定法者則是故設姦萌生長罪𨻶孔子曰民可使由之不可使知之春秋之義子不報讎非子也而法令不為之減者以相殺之路不可開故也今託義者得減妄殺者有差使執憲之吏得設巧詐非所以導在醜不爭之義又輕侮之比以繁滋至有四五百科轉相顧望彌復增甚難以垂之萬載臣聞師言救文莫如質故高帝去煩苛之法為三章之約建初詔書有改於古者可下三公廷尉蠲除其敝議寢不省敏復上疏曰臣敏蒙恩特見拔擢愚心所不曉迷意所不解誠不敢苟隨衆議臣伏見孔子垂經典臯陶造法律原其本意皆欲禁民為非也未曉輕侮之法將以何禁必不能使不相輕侮而更開相殺之路執憲之吏復容其姦枉議者或曰平法當先論生臣愚以為天地之性唯人為貴殺人者死三代通制今欲趣生反開殺路一人不死天下受敝記曰利一害百人去城郭夫春生秋殺天道之常春一物枯即為災秋一物華即為異王者承天地順四時法聖人從經律願陛下留意下民考尋利害廣令平議天下幸甚和帝從之九年拜司隸校尉視事二歲遷汝南太守清約不煩用刑平正有理能名坐事免延平元年拜議郎再遷潁川太守永初元年徵拜司空在位奉法而已視事三歲以病乞身不聽六年春行大射禮陪位頓仆乃策罷之因病篤卒于家胡廣字伯始南郡華容人也六世祖剛清高有志節平帝時大司徒馬宮辟之值王莽居攝剛解其衣冠縣府門而去遂亡命交阯隱於屠肆之閒後莽敗乃歸鄉里父貢交阯, WYG: 騎}
