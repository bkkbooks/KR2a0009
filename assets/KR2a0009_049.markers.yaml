  - {type: variant, offset: 83, length: 0, content: '', WYG: 曹操甚敬異之稍遷少府紀以操將簒漢建安二十三年與太醫令吉㔻㔻或作平丞相司直韋況晃曅謀起兵誅操不克夷三族于時衣冠盛門坐紀罹禍滅者衆矣夔字定公少有氣決永元初為車騎將軍竇憲假司馬北擊匈奴轉車騎都尉劉攽曰按官無車騎都尉明衍車字三年憲復出河西以􅇪為大將軍左校尉將精騎八百出居延塞直奔北單于廷於金㣲山斬閼氏名王已下}
