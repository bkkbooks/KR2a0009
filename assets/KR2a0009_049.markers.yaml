  - {type: variant, offset: 922, length: 127, content: 定策功封安鄉侯食邑千二百戶與太尉徐防司空尹勤同日俱封其秋以寇賊水雨策免防勤而禹不自安上書乞骸骨更拜太尉四年新野君病皇太后車駕幸其第禹與司徒夏勤司空張敏俱上表言新野君不安車駕連日宿止臣等誠竊惶懼臣聞王者動設先置止則交戟清道而後行清室而後御離宮不宿所以重宿衞, WYG: 為虜来大驚羌乃遥呼曰我范羌}
