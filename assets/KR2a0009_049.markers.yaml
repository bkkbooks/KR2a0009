  - {type: variant, offset: 1050, length: 195, content: 陛下體烝烝之至孝親省方藥恩情發中久處單外百官露止議者所不安宜且還宮上為宗廟社稷下為萬國子民比三上固爭乃還宮後連歲災荒府臧空虛禹上疏求入三歲租稅以助郡國稟假詔許之五年以陰陽不和策免七年卒于家使者弔祭除小子曜為郎中長子盛嗣徐防字謁卿沛國銍人也祖父宣為講學大夫以易教授王莽父憲亦傳宣業防少習父祖學永平中舉孝廉除為郎防體貌矜嚴占對可觀顯宗異之特補尚書郎職典樞機周密畏慎奉事二帝未嘗有過和帝時稍遷司隸, WYG: 漢遣軍迎}
