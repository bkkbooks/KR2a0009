  - {type: variant, offset: 15, length: 1, content: 三, WYG: 九耿弇傳弟國國子秉秉弟夔國弟子恭耿弇字伯昭扶風茂陵人也其先武帝時以吏二千石自鉅鹿徙焉武帝時徙吏二千石髙資富人及豪傑并兼之家於諸陵也父况字俠游以眀經為郎與王莽従弟伋共學老子於安丘先生嵇康聖賢髙士傳曰安丘望之字仲都京兆長陵人少持老子經恬淨不求進宦號曰安丘丈人成帝聞欲見之望之辭不肯見為巫醫於人間也後為朔調連率王莽改上谷郡曰朔調守曰連率弇少好學習父業袁山松書曰弇少學詩禮明銳有權謀常見郡尉試騎士建旗鼓𨽻馳射由是好將帥之事漢官儀曰嵗終郡試之時講武勒兵因以校獵簡其材力也劉攽曰常見郡尉試騎士按漢謂郡試騎士講武為都試後人不曉妄改為尉注所云郡字亦合作都且講武不專在都尉何得云尉試乎都試見前書及王莽敗更始立諸將略地者前後多擅威權輙改易守令況自以莽之所置懐不自安時弇年二}
