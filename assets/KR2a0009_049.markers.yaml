  - {type: variant, offset: 80, length: 0, content: '', WYG: 國及幸宫觀秉常領禁兵宿衞左右除三子為郎章和二年復拜征西將軍副車騎將軍竇憲擊北匈奴大破之事并見憲傳封秉羙陽侯食邑三千户秉性勇壮而簡易於事軍行常自被甲在前休止不結營部然逺斥候眀要誓有警軍陳立成士卒皆樂為死永元二年代桓虞為光禄勲眀年夏卒時年五十餘賜以朱棺玉衣將作大匠穿冢假鼓吹五營騎士三百餘人送𦵏諡曰桓侯匈奴聞秉卒舉國號哭或至棃面流血棃即􅋇字古通用􅋇割也音力私反長子沖嗣及竇憲敗以秉竇氏黨國除沖官至漢陽太守曾孫紀少有羙名}
