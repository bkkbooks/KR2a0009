  - {type: variant, offset: 756, length: 1, content: 祠, WYG: 今使人於危難之地急而棄之外則縦蠻夷之暴内則傷死難之臣誠令權時後無邉事可也匈奴如復犯塞為寇陛下將何以使將又二部兵人裁各數十二部謂闗寵及恭也匈奴圍之歴旬不下是其寡弱盡力之效也可令敦煌酒泉太守各將精騎二千多其幡幟倍道兼行以赴其急匈奴疲極之兵必不敢當四十日間足還入塞帝然之乃遣征西將軍耿秉屯酒泉行太守事遣秦彭與}
