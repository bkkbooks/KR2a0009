  - {type: variant, offset: 32, length: 0, content: '', krp: 陽今朝城在濟水北有漯河在今齊州臨濟縣東張歩聞之乃使其大將軍費邑軍歴下歴下城在今齊州歴城縣也又分兵屯祝阿祝阿今齊州縣也故城在今山荏縣東北别於太山鍾城列營數十以待弇弇度河先撃祝阿自旦攻城未中而拔之故開圍一角令其衆得奔歸鍾城鍾城人聞祝阿已潰大恐懼遂空壁亡去費邑分遣弟敢守巨里巨里聚名也一名巨合城在今齊州全節縣東南也弇進兵先脅巨里使多伐樹木揚言以填塞坑塹數日有降者言邑聞弇欲攻巨里謀来救之弇乃嚴令軍中趣修攻具宣勑諸部後三日當悉力攻巨里城隂緩生口令得亡歸歸者以弇期告邑邑至日果自將精兵三萬餘人来救之弇喜謂諸將曰吾所以修攻具者欲誘致邑耳今来適其所求也即分三千人守巨里自引精兵上岡阪爾雅曰山脊曰岡陂者曰阪乗髙合戰大破之臨陳斬邑既而收首級以示巨里城中城中兇懼兇恐懼聲音呼勇反費敢悉衆亡歸張歩弇復收其積聚縦兵撃諸未下者平四十餘營遂定濟南時張歩都劇使其弟藍將精兵二萬守西安西安縣名屬齊郡故城在今青州臨淄縣西北諸郡太守合萬餘人守臨淄相去四十里弇進軍畫中畫中邑名也畫音胡麥反故城在今西安城東南有澅水因名焉居二城之間弇視西安城小而堅且藍兵又精臨淄名雖大而實易攻乃勑諸校㑹㑹猶集也後五日攻西安藍聞之晨夜儆守至期夜半弇勑諸將皆蓐食前書音義曰未起而牀蓐中食也㑹眀至臨淄城護軍荀梁等争之以為宜速攻西安弇曰不然西安聞吾欲攻之日夜為備臨淄出不意而至必驚擾吾攻之一日必拔拔臨淄即西安孤張藍與歩隔絶必復亡去所謂擊一而得二者也若先攻西安不卒下頓兵堅城死傷必多縦能拔之藍引軍還奔臨淄并兵合勢觀人虚實吾深入敵地後無轉輸旬月之間不戰而困諸君之言未見其宜遂攻臨淄半日拔之入據其城張藍聞之大懼遂將其衆亡歸劇弇乃令軍中無得妄掠劇下須張歩至乃取之以激怒歩歩聞大笑曰以尤來大槍十餘萬衆吾皆即其營而破之今大耿兵少於彼弇況之長子故呼為大耿又皆疲勞何足摧乎乃與三弟藍𢎞夀及故大槍渠帥重異等兵重姓異名號二十萬至臨淄大城東將攻弇袁山松書曰弇上書曰臣據臨淄深塹髙壘張歩従劇縣来攻疲勞饑渇欲進誘而攻之欲去随而擊之臣依營而戰精鋭百倍以逸待勞以實擊虛旬日之間歩首可獲上是其計也弇先出淄水上與重異遇突騎欲縦弇恐挫其鋒令歩不敢進故示弱以盛其氣乃引歸小城陳兵於内伏琛齊地記曰小城内有漢景王祠歩氣盛直攻弇營與劉歆等合戰弇升王宫壊臺望之臨淄夲齊國所都即齊王宫中有壊䑓也東觀記作環䑓視歆等鋒交乃自引精兵以横突歩陳於東城下大破之飛矢中弇股以佩刀截之左右無知者至暮罷弇眀旦復勒兵出是時帝在魯聞弇為歩所攻自往救之未至陳俊謂弇曰劇虜兵盛可且閉營休士以須上来弇曰乗輿且到臣子當擊牛釃酒以待百官反欲以賊虜遺君父邪乃出兵大戰自旦及昏復大破之殺傷無數城中溝塹皆滿弇知歩困將退豫置左右翼為伏以待之兩旁伏兵如鳥之翼人定時歩果引去伏兵起縦擊追至鉅昧水上鉅昧水名一名巨浮水在今青州夀光縣西八九十里僵尸相屬收得輜重二千餘兩歩還劇兄弟各引兵散去後數日車駕至臨淄自勞軍羣臣大㑹帝謂弇曰昔韓信破歴下以開基前書曰齊屯田於歴下以備漢信撃破之今將軍攻祝阿以發迹此皆齊之西界功足相方而韓信襲擊已降前書曰酈食其説齊王田廣廣降之乃與食其縦酒罷守備韓信聞齊已降欲止蒯通説信令擊之食其音異基也將軍獨拔勍敵其功乃難扵信也又田横亨酈生及田横降高帝詔衞尉不聽為仇前書曰齊既破横走居海島髙帝召之横曰臣亨陛下之使酈食其今聞其弟商為衞尉臣恐懼不敢奉詔高帝詔酈商曰横即至敢動者族之張歩前亦殺伏隆若歩来歸命吾當詔大司徒釋其怨大司徒伏湛即隆之父又事尤相類也將軍前在南陽建此大策謂弇従帝幸舂陵時請收上谷兵定彭寵取張豐平張歩等常以為落落難合落落猶疏闊也有志者事竟成也弇因復追歩歩奔平夀平夀縣名屬北海郡故城在今青州北海縣乃肉袒負斧鑕於軍門鑕鍖也示必死鍖音竹林反弇傳歩詣行在所而勒兵入據其城樹十二郡旗鼓東觀記曰弇凡平城陽琅琊髙密膠東東莱北海齊千乗濟南平原泰山臨淄等令歩兵各以郡人詣旗下衆尚十餘萬輜重七千餘兩皆罷遣歸鄉里弇復引兵至城陽降五校餘黨祝阿餘黨也齊地悉平振旅還京師六年西拒隗囂屯兵於漆漆縣名屬右扶風故城在今豳州新平縣也漆水在西八年従上隴眀年與中郎將來歙分部徇安定北地諸營保皆下之弇凡所平郡四十六屠城三百未嘗挫折十二年況疾病乗輿數自臨幸復以國弟廣舉並為中郎將弇兄弟六人皆垂青紫省侍醫藥當代以為榮及況卒諡烈侯少子霸襲況爵十三年增弇户邑上大將軍印綬罷上音時掌反以列侯奉朝請每有四方異議輙召入問籌策年五十六永平元年卒謚曰愍侯子忠嗣忠以騎都尉擊匈奴於天山有功忠卒子馮嗣馮卒子良嗣一名無禁延光中尚安帝妹濮陽長公主位至侍中良卒子協嗣隃麋侯霸卒子文金嗣文金卒子喜嗣喜卒子顯嗣為羽林左監顯卒子援嗣尚桓帝妺長社公主為河陽太守後曹操誅耿氏唯援孫弘存焉決録注云援字伯緒官至河東太守也牟平侯舒卒子襲嗣尚顯}
  - {type: variant, offset: 33, length: 0, content: '', WYG: 女隆慮公主襲卒子寳嗣寳女弟為清河孝王妃及安帝立尊孝王母為孝徳皇后以妃為甘園大貴人帝以寳元舅之重使監羽林左車騎劉攽曰按百官志羽林左右監監左右騎不合有車字位至大將軍而附事内寵與中常侍樊豐帝乳母王聖等譛廢皇太子為濟隂王及排陷太尉楊震議者怨之寳弟子承襲公主爵為林慮侯林慮即上隆慮}
