  - {type: variant, offset: 21, length: 2, content: 智伯, WYG: 弇因説䕶軍朱祐求歸發兵以定邯鄲光武笑曰小兒曹乃有大意哉因數召見加㤙慰續漢書曰弇還檄與況陳上功徳自嫌年少恐不見信宜自來況得檄立發至昌平見上也弇因従光武北至薊聞邯鄲兵方到光武將欲南歸召官屬計議弇曰今兵従南來不可南行漁陽太守彭寵公之邑人寵}
  - {type: variant, offset: 21, length: 2, content: 智伯, krp: 弇因説䕶軍朱祐求歸發兵以定邯鄲光武笑曰小兒曹乃有大意哉因數召見加㤙慰續漢書曰弇還檄與況陳上功徳自嫌年少恐不見信宜自來況得檄立發至昌平見上也弇因従光武北至薊聞邯鄲兵方到光武將欲南歸召官屬計議弇曰今兵従南來不可南行漁陽太守彭寵公之邑人寵}
