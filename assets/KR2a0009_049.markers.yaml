  - {type: variant, offset: 299, length: 443, content: 年春薨于位天子親臨弔臨張禹字伯達趙國襄國人也祖父況族姊為皇祖考夫人數往來南頓見光武光武為大司馬過邯鄲況為郡吏謁見光武光武大喜曰乃今得我大舅乎因與俱北到高邑以為元氏令遷涿郡太守後為常山關長會赤眉攻關城況戰歿父歆初以報仇逃亡後仕為淮陽相終於汲令禹性篤厚節儉父卒汲吏人賻送前後數百萬悉無所受又以田宅推與伯父身自寄止永平八年舉孝廉稍遷建初中拜楊州刺史當過江行部中土民人皆以江有子胥之神難於濟涉禹將度吏固請不聽禹厲言曰子胥如有靈知吾志在理察枉訟豈危我哉遂鼓楫而過歷行郡邑深幽之處莫不畢到親錄囚徒多所明舉吏民希見使者民人懷喜悅怨德美惡莫不自歸焉元和二年轉兗州刺史亦有清平稱三年遷下邳相徐縣北界有蒲陽坡傍多良田而堙廢莫修禹為開水門通引灌溉遂成孰田數百頃勸率吏民假與種糧親自勉勞遂大收穀實鄰郡貧者歸之千餘戶室廬相屬其下成巿後歲至墾千餘頃民用溫給功曹史戴閏故太尉掾也權動郡內有小譴禹令自致徐獄然後正其法自長史以下莫不震肅永元六年入為大司農拜太尉和帝甚禮之十五年南巡祠園廟禹以太尉兼衞尉留守聞車駕當進幸江陵, WYG: 倫}
