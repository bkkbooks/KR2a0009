  - {type: variant, offset: 17, length: 3, content: 四鄧彪, WYG: 一乃辭況奉奏詣更始因齎貢獻以求自固之宜及至宋子㑹王郎詐稱成帝子輿起兵邯鄲弇従吏孫倉衞包於道共謀曰劉子輿成帝正統捨此不歸逺行安之弇按劒曰子輿弊賊卒為降虜耳我至長安與國家陳漁陽上谷兵馬之用還出太原代郡反覆數十日歸發突騎以轔烏合之衆轔轢也音力刄反如摧枯折腐耳觀公等不識去就族滅不久也倉包不従遂亡降王郎弇道聞光武在盧奴乃馳北上謁光武留署門下吏劉攽曰按百官志公府有門史又祭遵亦為門下史知此當作史}
  - {type: page-break, offset: 17, content: '', id: KR2a0009_WYG_049-2b, image: WYG0252/WYG0252-0567b.png}
