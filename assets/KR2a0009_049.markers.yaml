  - {type: variant, offset: 123, length: 1, content: 遷, WYG: 竇固及従弟駙馬都尉秉破降之始置西域都護戊巳校尉乃以恭為戊巳校尉屯後王部金蒲城金蒲城車師後王城廷也今延州蒲昌縣城是也謁者關寵為戊巳校尉劉攽曰案戊巳夲是兩校尉故耿恭闗寵各為一校今都為戊巳校尉盖流俗不知漢書以理觀之恭是戊校寵是已校也屯前王栁中城栁中今西州縣屯各置數百人恭至部移檄烏孫示漢威德}
