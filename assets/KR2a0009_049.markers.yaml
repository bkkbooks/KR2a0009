  - {type: variant, offset: 776, length: 142, content: 行還禹特蒙賞賜延平元年遷為太傅錄尚書事鄧太后以殤帝初育欲令重臣居禁內乃詔禹舍宮中給帷帳牀褥太官朝夕進食五日一歸府每朝見特贊與三公絕席禹上言方諒闇密靜之時不宜依常有事於苑囿其廣成上林空地宜且以假貧民太后從之及安帝即位數上疾乞身詔遣小黃門問疾賜牛一頭酒十斛勸令就第其錢布刀劒衣物前後累至永, WYG: 鄯善兵合七千餘人建}
