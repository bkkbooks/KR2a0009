  - {type: variant, offset: 205, length: 87, content: 民爵及帛各有差段熲大破先零羌於逢義山閏月甲午追尊皇祖為孝元皇夫人夏氏為孝元皇后考為孝仁皇夫人董氏為慎園貴人夏四月戊辰太尉周景薨司空宣酆免長樂衛尉王暢為司空五月丁未朔日有食之詔, WYG: ''}
