  - {type: variant, offset: 927, length: 735, content: 酉朔日有食之太尉聞人襲免太僕李咸為太尉詔公卿至六百石各上封事大疫使中謁者巡行致醫藥司徒許訓免司空橋玄為司徒夏四月太常來豔為司空五月河東地裂雨雹山水暴出秋七月司空來豔免癸丑立貴人宋氏為皇后司徒橋玄免太常宗俱為司空前司空許栩為司徒冬鮮卑寇并州熹平元年春三月壬戌太傅胡廣薨夏五月己巳大赦天下改元熹平長樂太僕侯覽有罪自殺六月京師雨水癸巳皇太后竇氏崩秋七月甲寅葬桓思皇后宦官諷司隸校尉段熲捕繫太學諸生千餘人冬十月渤海王悝被誣謀反丁亥悝及妻子皆自殺十一月會稽人許生自稱越王寇郡縣遣楊州刺史臧旻丹陽太守陳夤討破之十二月司徒許栩罷大鴻臚袁隗為司徒鮮卑寇并州是歲甘陵王恢薨二年春正月大疫使使者巡行致醫藥丁丑司空宗俱薨二月壬午大赦天下以光祿勳楊賜為司空三月太尉李咸免夏五月以司隸校尉段熲為太尉沛相師遷坐誣罔國王下獄死六月北海地震東萊北海海水溢秋七月司空楊賜免太常潁川唐珍為司空冬十二月日南徼外國重譯貢獻太尉段熲罷鮮卑寇幽并二州癸酉晦日有食之三年春正月夫餘國遣使貢獻二月己巳大赦天下太常陳耽為太尉三月中山王暢薨無子國除夏六月封河閒王利子康為濟南王奉孝仁皇祀秋洛水溢冬十月癸丑令天下繫囚罪未決入縑贖十一月楊州刺史臧旻率丹陽太守陳寅大破許生於會稽斬之任城王博薨十二月鮮卑寇北地北地太守夏育追擊破之鮮卑又寇并州司空唐珍罷永樂少府許訓為司空四年春三月詔諸儒正五經文字刻石立于太學門外封河閒王建孫子佗為任城王夏四月郡國七大水五月丁卯大赦天下延陵園灾遣使者持節告祠延陵鮮卑寇幽州六月弘農三輔螟遣守宮令之鹽監穿渠為民興利令郡國遇災者減田租之半其傷害十四以上勿收責冬十月丁巳令天下繫囚罪未決入縑贖拜沖帝母虞美人為憲園貴人質帝母陳夫人為渤海孝王妃改平準為中準使宦者為令列於內署自是諸署悉以閹人為丞令五年夏四月癸, WYG: ''}
