  - {type: variant, offset: 2106, length: 0, content: '', WYG: 分安定扶風爲新平郡是嵗揚州刺史劉繇與袁術将孫策戰于曲阿䇿字伯符孫堅子曲阿今潤州縣繇軍敗績孫䇿遂據江東吳志曰孫䇿既破繇遂度兵據㑹稽策自領㑹稽太守太傅馬日磾薨于夀春夀春縣名屬九江郡今夀春縣也二年春正月癸丑大赦天下二月乙亥李傕殺樊稠而與郭氾相攻三月丙寅李傕脇帝幸其營焚宫室夏四月甲午立貴人伏氏為皇后丁酉郭汜攻李傕矢及御前山陽公載記曰時弓弩並發矢下如雨及御所止髙樓殿前帷簾也是日李傕移帝幸北塢服䖍通俗文曰營居曰塢一曰庳城也山陽公載記曰時帝在南塢傕在北塢時流矢中傕左耳乃迎帝幸北塢帝不肯從强之乃行大旱五月壬午李傕自為大司馬六月庚午張濟自陕来和傕汜秋七月甲子車駕東歸郭汜自為車騎将軍楊定為後将軍楊奉為興義將軍董承為安集将軍並侍送乗輿張濟為驃騎将軍還屯陜八月甲辰幸新豐冬十月戊戌郭汜使其将伍習夜燒所幸學舎逼脇乗輿楊定楊奉與郭汜戰破之壬寅幸華隂露次道南是夜有赤氣貫紫宫獻帝春秋曰赤氣廣六七尺東至寅西至戌也張濟復反與李傕郭汜合十一月庚午李傕郭汜等追乗輿戰於東澗王師敗績殺光禄勳鄧泉衛尉士孫瑞廷尉宣播大長秋苖祀獻帝春秋播作璠也歩兵校尉魏桀侍中朱展射聲校尉沮儁風俗通曰沮姓也黄帝時史官沮誦之後音俱余反壬申幸曹陽露次田中曹陽澗名在今陕州西南七里俗謂之七里澗崔浩云自南山北通於河楊奉董承引白波帥胡才李樂韓暹及匈奴左賢王去卑率師奉迎與李傕等戰破之十二月庚辰車駕乃進李傕等復来追戰王師大敗殺畧宫人少府田芬大司農張義等皆戰歿進幸陕夜度河乙亥幸安邑是嵗袁紹遣將麴義與公孫瓚戰於鮑丘鮑丘水名出北塞中南流經九莊嶺東俗謂之大榆河又東南經漁陽縣故城東是瓚之戰處見水經注瓚軍大敗建安元年春正月癸酉郊祀上帝於安邑大赦天下改元建安二月韓暹攻衛将軍董承夏六月乙未幸聞喜秋七月甲子車駕至洛陽幸故中常侍趙忠宅丁丑郊祀上帝大赦天下巳卯謁太廟八月}
