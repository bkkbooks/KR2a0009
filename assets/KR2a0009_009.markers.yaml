  - {type: variant, offset: 1940, length: 0, content: '', WYG: 太尉趙謙罷太常馬日磾為太尉九月蚩尤旗見于角亢天官書曰蚩尤之旗類彗而後曲象旗熒惑之精也呂氏春秋云其色黄上白下見則王者征伐四方角亢蒼龍之星冬十月壬戌董卓殺衛尉張温十一月青州黄巾宼泰山泰山太守應劭擊破之黄巾轉宼渤海公孫瓚與戰於東光復大破之東光今滄州縣是嵗長沙有人死經月復活三年春正月丁丑大赦天下袁術遣将孫堅攻劉表於襄陽堅戰歿袁紹及公孫瓚戰于界橋今貝州宗城縣東有古界城近枯漳水則界橋在此也瓚軍大敗夏四月辛巳誅董卓夷三族司徒王允録尚書事總朝政遣使者張种撫慰山東青州黄巾擊殺兖州刺史劉岱於東平東郡太守曹操大破黄巾於夀張降之五月丁酉大赦天下丁未征西将軍皇甫嵩為車騎将軍董卓部曲将李傕郭汜樊稠張濟等反攻京師六月戊午䧟長安城太常种拂大僕魯旭大鴻臚周奐三輔决錄注曰奐字文明茂陵人城門校尉崔烈越騎校尉王頎竝戰殁頎音祈吏民死者萬餘人李傕等並自為将軍己未大赦天下李傕殺司隸校尉黄琬甲子殺司徒王允皆滅其族丙子前将軍趙謙為司徒秋七月庚子太尉馬日磾為太傅錄尚書事}
