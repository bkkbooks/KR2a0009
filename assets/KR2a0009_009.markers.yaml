  - {type: variant, offset: 2609, length: 194, content: 月梁王元薨夏四月江夏蠻叛六月詔公卿舉能通古文尚書毛詩左氏穀梁春秋各一人悉除議郎秋表是地震涌水出八月令繫囚罪未決入縑贖各有差冬閏月有星孛于狼弧鮮卑寇幽并二州十二月己巳立貴人何氏為皇后是歲作罼圭靈昆苑四年春正月初置騄驥廄丞領受郡國調馬豪右辜搉馬一匹至二百萬二月郡國上芝英草夏四月庚子大赦天下交阯刺史朱儁討交阯合浦烏滸蠻破之六月庚辰雨雹秋七月河南言鳳皇見新城羣鳥隨之賜新城令及三老力田帛各有差九, WYG: ''}
