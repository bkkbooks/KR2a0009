  - {type: variant, offset: 204, length: 0, content: '', WYG: 改昭寜為永漢丙子董卓殺皇太后何氏初令侍中給事黄門侍郎員各六人續漢志曰侍中比二千石無員漢官儀曰侍中左蟬右貂夲秦丞相史往来殿中故謂之侍中分掌乗輿服物下至褻器虎子之屬武帝時孔安國為侍中以其儒者特聽掌御坐唾壺朝廷榮之至東京時屬少府亦無員駕出則一人負傳國璽操斬蛇劒乗輿中官俱止禁中又曰給事黄門侍郎六百石無員掌侍從左右給事中使關通中外應劭曰黄門侍郎每日暮向青瑣門拜謂之夕郎輿服志曰禁門曰黄闥以中人主之故號曰黄門令然則黄門郎給事黄闥之内故曰黄門郎夲既無員於此各置六人也獻帝起居注曰自誅黄門後侍中侍郎出入禁中機事頗露由是王允乃奏侍中黄門不得出入不通賔客自此始也劉攽曰註乘輿中官俱止禁中案文當云參乘與中官俱止禁中少一參字誤一輿字}
