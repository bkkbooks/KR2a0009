  - {type: variant, offset: 2107, length: 0, content: '', krp: 丑幸南宫楊安殿癸夘安國将軍張楊為大司馬韓暹為大将軍楊奉為車騎将軍是時宫室燒盡百官披荆棘依牆壁間州郡各擁彊兵而委輸不至羣僚饑乏尚書郎以下自出採稆稆音吕埤蒼曰穭自生也稆與穭同或饑死牆壁間或為兵士所殺辛亥鎭東将軍曹操自領司隸校尉錄尚書事曹操殺侍中臺崇尚書馮碩等風俗通日金天氏裔孫曰臺駘其後氏焉山陽公載記曰臺字作壺劉攽曰注山陽公載記曰案文多一曰字封衛將軍董承為輔國将軍劉攽曰案文多一為字伏完等十三人為列侯贈沮儁為𢎞農太守庚申遷都許己巳幸曹操營九月太尉楊彪司空張喜罷冬十一月丙戍曹操自為司空行車騎将軍事百官總己以聽二年春袁術自稱天子三月袁紹自為大将軍夏五月蝗秋九月漢水溢是嵗饑江淮間民相食袁術殺陳王寵孫策遣使奉貢三年夏四月遣謁者裴茂率中郎将段煨討李傕夷三族獻帝起居注曰傳傕首到許有詔髙懸之也呂布叛冬十一月盜殺大司馬張楊十二月癸酉曹操擊吕布於徐州斬之四年春三月袁紹攻公孫瓚于易京獲之公孫瓚頻失利乃臨易河築京以自固故號易京其城三重周囘六里今内城中有土京在幽州歸義縣南爾雅曰絶髙謂之京非人為之㐀衛将軍董承為車騎将軍夏六月袁術死是嵗初置尚書左右僕射武陵女子死十四日復活續漢志曰女子李娥年六十餘死瘞於城中有行人聞冢中有聲告家人出之五年春正月車騎将軍董承偏将軍王服越騎校尉种輯受宻詔誅曹操事洩壬午曹操殺董承等夷三族秋七月立皇子馮為南陽王壬午南陽王馮薨九月庚午朔日有食之詔三公舉至孝二人九卿校尉郡國守相各一人皆上封事靡有所諱曹操與袁紹戰於官度裴松之北征記曰中牟臺下臨汴水是為官度袁紹曹操壘尚存焉在今鄭州中牟縣北紹敗走冬十月辛亥有星孛于大梁大梁酉之分東海王祗薨是嵗孫䇿死為許貢客所射傷弟權襲其餘業權字仲謀六年春三月丁夘朔日有食之七年夏五月庚戌袁紹薨于寘國獻馴象馴象謂隨人意也是嵗越嶲男子化為女子八年冬十月己巳公卿初迎冬於北郊斯禮久廢故曰初總章始復備八佾舞袁紹紀云迎氣北郊始用八佾佾列也謂舞者之行列往因亂廢今始備之總章樂官名古之安代樂初置司直官督中都官司直秩比二千石武帝元狩五年置掌佐丞相舉不法也建武十一年省今復置之九年秋八月戊寅曹操大破袁尚平冀州自領冀州牧冬十月有星孛于東井十二月賜三公已下金帛各有差自是三年一賜以為常制十年春正月曹操破袁譚於青州斬之魏書曰操攻譚不剋乃自執桴鼔應時破之夏四月黑山賊張燕率衆降魏志曰燕本姓褚常山真定人也黄巾起燕合聚少年為羣盜萬餘人博陵人張牛角為主牛角死燕代為主故改姓張燕剽勇軍中號曰張飛燕衆至百萬號曰黒山賊秋九月賜百官尤貧者金帛各有差十一年春正月有星孛于北斗三月曹操破髙幹於幷州獲之典論曰上洛都尉王琰敗之追斬其首秋七月武威太守張猛殺廱州刺史邯鄲商袁宏漢紀曰廱州作凉州也是嵗立故琅邪王容子熙為琅邪王濟北北海阜陵下邳常山甘陵濟隂平原八國皆除十二年秋八月曹操大破烏桓於栁城斬其蹋頓蹋頓匈奴王號栁城縣名屬遼西郡今營州縣冬十月辛夘有星孛于鶉尾鶉尾已之分己巳黄巾賊殺濟南王贇河間孝王五代孫十一月遼東太守公孫康殺袁尚袁熈十三年春正月司徒趙温免夏六月罷三公官置丞相御史大夫癸巳曹操自為丞相秋七月曹操南征劉表八月丁未光禄勲郗慮為御史大夫續漢書曰慮字鴻豫山陽髙平人也少受學於鄭𤣥壬子曹操殺太中大夫孔融夷其族是月劉表卒少子琮立琮以荆州降操冬十月癸未朔日有食之曹操以舟師伐孫權權将周瑜敗之於烏林赤壁十四年冬十月荆州地震十五年春二月乙巳朔日有食之十六年秋九月庚戍曹操與韓遂馬超戰於渭南遂等大敗關西平曹瞞傳曰時婁子伯説操曰今天寒可起沙為城以水灌之可一夜而成公從之比明城立超遂數挑戰不利操縱虎騎夹擊大破之超遂走凉州是嵗趙王赦薨十七年夏五月癸未誅衛尉馬騰夷三族六月庚寅晦日有食之秋七月洧水潁水溢螟八月馬超破涼州殺刺史韋康九月庚戍立皇子熙為濟隂王懿為山陽王邈為濟北王敦為東海王山陽公載記曰時許靖在巴郡聞立諸王曰将欲歙之必姑張之将欲奪之必姑與之其孟徳之謂乎冬十二月星孛于五諸侯五諸侯星名也十八年春正月庚寅復禹貢九州獻帝春秋曰時省幽并州以其郡國并於冀州省司隸校尉及涼州以其郡國并為雍州省交州并荆州益州於是有兖豫青徐荆揚冀益雍也九數雖同而禹貢無益州有梁州然梁益亦一地也夏五月丙申曹操自立為魏公加九錫案禮含文嘉曰九錫謂一曰車馬二曰衣服三曰樂器四曰朱戸五曰納陛六曰虎賁七百人七曰斧鉞八曰弓矢九曰秬鬯大雨水徙趙王珪為博陵王是嵗嵗星鎭星熒惑俱入太微是年秋三星逆行入太微守帝座五十日彭城王和薨十九年夏四月旱五月雨水劉備破劉璋據益州冬十月曹操遣将夏侯淵討朱建于枹罕獲之枹罕縣屬金城郡今河州縣也魏志曰淵字妙才沛國譙人也十一月丁卯曹操殺皇后伏氏滅其族及二皇子山陽公載記曰劉備在蜀聞之遂發喪二十年春正月甲子立貴人曹氏為皇后賜天下男子爵人一級孝悌力田二級賜諸王侯公卿以下榖各有差秋七月曹操破漢中張魯降二十一年夏四月甲午曹操自進號魏王五月己}
