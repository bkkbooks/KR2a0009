  - {type: variant, offset: 2102, length: 1, content: 孟, WYG: 朱儁免戊午太常楊彪為太尉録尚書事三輔大旱自四月至于是月帝避正殿請雨遣使者洗囚徒原輕繫洗謂蕩滌也是嵗榖一斛五十萬豆麥一斛二十萬人相食啖白骨委積帝使侍御史侯汶出太倉米豆為飢人作麋粥經日而死者無數帝疑賦䘏有虛乃親於御坐前量試作麋乃知非實袁宏紀曰時勑侍中劉艾取米豆五升於御前作糜得滿三盂於是詔尚書曰米豆五升得麋三盂而人委頓何也使侍中劉艾出讓有司於是尚書令以下皆詣省閣謝劉攽曰案閣當作閤閤門也詣閣無理奏收侯汶考實詔曰未忍致汶于理可杖五十自是之後多得全濟八月馮翊羌叛宼屬縣郭汜樊稠擊破之九月桑復生椹人得以食司徒淳于嘉}
