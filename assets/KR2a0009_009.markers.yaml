  - {type: variant, offset: 3847, length: 1399, content: 月特進楊賜為司空冬十月庚寅司空楊賜薨光祿大夫許相為司空前司徒陳耽諫議大夫劉陶坐直言下獄死十一月張溫破北宮伯玉於美陽因遣盪寇將軍周慎追擊之圍榆中又遣中郎將董卓討先零羌慎卓並不克鮮卑寇幽并二州是歲造萬金堂於西園洛陽民生兒兩頭四臂三年春二月江夏兵趙慈反殺南陽太守秦頡庚戌大赦天下太尉張延罷車騎將軍張溫為太尉中常趙忠為車騎將軍復修玉堂殿鑄銅人四黃鍾四及天祿蝦蟆又鑄四出文錢五月壬辰晦日有食之六月荊州刺史王敏討趙慈斬之車騎將軍趙忠罷秋八月懷陵上有雀萬數悲鳴因鬬相殺冬十月武陵蠻叛寇郡界郡兵討破之前太尉張延為宦人所譖下獄死十二月鮮卑寇幽并二州四年春正月己卯大赦天下二月滎陽賊殺中牟令己亥南宮內殿罘罳自壞三月河南尹何苗討滎陽賊破之拜苗為車騎將軍夏四月涼州刺史耿鄙討金城賊韓遂鄙兵大敗遂寇漢陽漢陽太守傅燮戰沒扶風人馬騰漢陽人王國並叛寇三輔太尉張溫免司徒崔烈為太尉五月司空許相為司徒光祿勳沛國丁宮為司空六月洛陽民生男兩頭共身漁陽人張純與同郡張舉舉兵叛攻殺右北平太守劉政遼東太守楊終護烏桓校尉公綦稠等舉兵自稱天子寇幽冀二州秋九月丁酉令天下繫囚罪未決入縑贖冬十月零陵人觀自稱平天將軍寇桂陽長沙太守孫堅擊斬之十一月太尉崔烈罷大司農曹嵩為太尉十二月休屠各胡叛是歲賣關內侯假金印紫綬傳世入錢五百萬五年春正月休屠各胡寇西河殺郡守邢紀丁酉大赦天下二月有星孛于紫宮黃巾餘賊郭太等起於西河白波谷寇太原河東三月休屠各胡攻殺戌刺史張懿遂與南匈奴左部胡合殺其單于夏四月汝南葛陂黃巾攻沒郡縣太尉曹嵩罷五月永樂少府樊陵為太尉六月丙寅大風太尉樊陵罷益州黃巾馬相攻殺刺史郗儉自稱天子又寇巴郡殺郡守趙部益州從事賈龍擊相斬之郡國七大水秋七月射聲校尉馬日磾為太尉八月初置西園八校尉司徒許相罷司空丁宮為司徒光祿勳南陽劉弘為司空衞尉董重為票騎將軍九月南單于叛與白波賊寇河東遣中郎將孟益率騎都尉公孫瓚討漁陽賊張純等冬十月壬午御殿後槐樹自拔倒豎青徐黃巾復起寇郡縣甲子帝自稱無上將軍燿兵於平樂觀十一月涼州賊王國圍陳倉右將軍皇甫嵩救之遣下軍校尉鮑鴻討葛陂黃巾巴郡板楯蠻叛遣上軍別部司馬趙瑾討平之公孫瓚與張純戰於石門大破之是歲改刺史新置牧六年春二月左將軍皇甫嵩大破王國於陳倉三月幽州牧劉虞購斬漁陽賊張純下軍校尉鮑鴻下獄死夏四月丙午朔日有食之太尉馬日磾免幽州牧劉虞為太尉丙辰帝崩于南宮嘉德殿年三十四戊午皇子辯即皇帝位年十七尊皇后曰皇太后太后臨朝大赦天下改元為光喜熹封皇弟協為渤海王後將軍袁隗為太傅與大將軍何進參錄尚書事上軍校尉蹇碩下獄死五月辛巳票騎將軍董重下獄死六月辛亥孝仁皇后董氏崩辛酉葬孝靈皇帝于文陵雨水秋七月甘陵王忠薨庚寅孝仁皇后歸葬河閒慎陵徙渤海王協為陳留王司徒丁宮罷八月戊辰中常侍張讓段珪等殺大將軍何進於是虎賁中郎將袁術燒東西宮攻諸宦者庚午張讓段珪等劫少帝及陳留王幸北宮德陽殿何進部曲將吳匡與車騎將軍何苗戰於朱雀闕下苗敗斬之辛未司隸校尉袁紹勒兵收偽司隸校尉樊陵河南尹許相及諸閹人無少長皆斬之讓珪等復劫少帝陳留王走小平津尚書盧植追讓珪等斬數人其餘投河而死帝與陳留王協夜步逐熒光行數里得民家露車共乘之辛未還宮大赦天下改光喜熹為昭寧并州牧董卓殺執金吾丁原司空劉弘免董卓自為司空九月甲戌董卓廢帝為弘農王自六月雨至于是月論曰秦本紀說趙高譎二世指鹿為馬而趙忠張讓亦紿靈帝不得登高臨觀故知亡敝者同其致矣然則靈帝之為靈也優哉贊曰靈帝負乘委體宦孽徵亡備兆小雅盡缺麋鹿霜露遂棲宮衞, WYG: 考證}
