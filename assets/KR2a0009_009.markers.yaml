  - {type: variant, offset: 1997, length: 0, content: '', WYG: 袁宏記曰時未晡八刻太史令王立奏曰晷過度無變也朝臣皆賀帝令候焉未晡一刻而食賈詡奏曰立司候不明疑誤上下請付理官帝曰天道逺事驗難明欲歸咎史官益重朕之不徳也丁夘大赦天下三月袁術殺揚州刺史陳温據淮南長安宣平城門外屋自壞三輔黄圖曰長安城東面北頭門也夏五月癸酉無雲而雷六月扶風大雨雹華山崩裂}
  - {type: variant, offset: 1997, length: 0, content: '', krp: 袁宏記曰時未晡八刻太史令王立奏曰晷過度無變也朝臣皆賀帝令候焉未晡一刻而食賈詡奏曰立司候不明疑誤上下請付理官帝曰天道逺事驗難明欲歸咎史官益重朕之不徳也丁夘大赦天下三月袁術殺揚州刺史陳温據淮南長安宣平城門外屋自壞三輔黄圖曰長安城東面北頭門也夏五月癸酉無雲而雷六月扶風大雨雹華山崩裂}
  - {type: variant, offset: 1999, length: 0, content: '', WYG: 周忠免太僕朱儁爲太尉録尚書事下邳賊闕宣自稱天子風俗通曰闕姓也承闕黨童子之後也縱横家有闕子著書雨水遣侍御史裴茂訊詔獄原輕繫六月辛丑天狗西北行前書音義曰有聲為天狗無聲為枉矢九月甲午試儒生四十餘人上第賜位郎中次太子舍人下第者罷之詔曰孔子歎學之不講講習也論語之文不講則所識日忘今耆儒年踰六十去離夲土營求糧資不得專業結童入學白首空歸長委農野永絶榮望朕甚愍焉其依科罷者聽為太子舎人}
