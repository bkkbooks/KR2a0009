  - {type: variant, offset: 624, length: 237, content: 平之丹陽山越賊圍太守陳夤夤擊破之冬十月丁亥中常侍侯覽諷有司奏前司空虞放太僕杜密長樂少府李膺司隸校尉朱瑀𧜛潁川太守巴肅沛相荀翌昱河內太守魏朗山陽太守翟超皆為鉤黨下獄死者百餘人妻子徙邊諸附從者錮及五屬制詔州郡大舉鉤黨於是天下豪桀及儒學行義者一切結為黨人庚子戊戌晦日有食之十一月太尉劉寵免太僕郭禧為太尉鮮卑寇并州是歲長樂太僕曹節為車騎將軍百餘日罷三年春正月河內人婦食夫河南人夫食婦三月丙寅晦日有食之夏四月太尉郭禧罷太中大夫聞人襲為太尉秋七月司空劉囂罷八月大鴻臚橋玄為司空九月執金吾, WYG: ''}
