  - {type: variant, offset: 4713, length: 255, content: 二年春鄧鴻遷大鴻臚以定襄太守皇甫棱行度遼將軍南單于復上求滅北庭於是遣左谷蠡王師子等將左右部八千騎出鷄鹿塞中郎將耿譚遣從事將護之至涿邪山乃留輜重分為二部各引輕兵兩道襲之左部北過西海至河雲北右部從匈奴河水西繞天山南度甘微河二軍俱會夜圍北單于單于大驚率精兵千餘人合戰單于被創墯馬復上將輕騎數十遁走僅而免脫得其玉璽獲閼氏及男女五人斬首八千級生虜數千口而還是時南部連剋獲納降黨衆最盛領戶三萬四千口二十三萬七千三百勝兵五萬一百七十故從事中郎將置從事二人耿譚以新降者多上增從事十二人三年北單于復為右校尉耿夔所破逃亡不知所在其, WYG: 詔使進}
