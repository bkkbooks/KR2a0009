  - {type: variant, offset: 758, length: 1, content: 遣, WYG: 武軍稍稍歸甫自旦至食時兵降略盡武紹走諸軍追圍之皆自殺梟首洛陽都亭續漢志曰桓帝末京師童謡曰茅田一頃中有井四方纎纎不可整嚼復嚼今年尚可後年磽案易曰拔茅連茹茅喻羣賢也井者法也時中常侍管霸等憎疾海内英賢並見廢錮茅田一頃言羣賢衆多也中有井者言雖厄窮不失法度也四方纎纎言姦慝不可理也嚼飲酒相強之辭也言不恤王政徒耽宴而已今年尚可者言但禁錮也後年磽者陳蕃竇武等誅天下大壊也磽音苦教反磽猶惡也收捕宗親賔客姻屬悉誅之及劉瑜馮述皆夷其族徙武家屬日南遷太后於雲臺當是時凶豎得志士大夫皆喪其氣矣武府掾桂陽胡騰少師事武獨殯斂行喪坐以禁銅武孫輔時年二嵗逃竄得全事覺節等捕之急胡騰及令史南陽張敞共逃輔於零陵界詐云已死騰以為己子而使聘娶焉後舉桂陽孝亷至建安中荆州牧劉表聞而辟焉以為從事使還竇姓以事列上㑹表卒曹操定荆州輔與宗人徙居於鄴辟丞相府從征馬超為流矢所中死飛矢曰流矢中傷也初武母産武而幷産一蛇送之林中後母卒及𦵏未窆有大蛇自榛草而出廣雅曰木藂生曰榛徑至喪所以頭擊柩涕血皆流俯仰蛣屈蛣音丘吉反若哀泣之容有頃而去時人知為竇氏之祥祥吉凶之先見者尚書曰亳有祥騰字子升初桓帝廵狩南陽以騰為䕶駕從事公卿貴戚車騎萬計徴求費役不可勝極騰上言天子無外乗輿所幸即為京師臣請以荆州刺史比司𨽻校尉南陽屬荆州故請以刺史比司𨽻臣自同都官從事帝從之漢官儀曰都官從事主洛陽百官朝㑹與三府掾同也自是肅然莫敢妄有干欲騰以此顕名黨錮解官至尚書張敞者太尉温之弟也漢官儀曰温字伯慎穰人也封𤣥鄉侯太史奏言有大臣誅死董卓取温笞殺於市以厭之何進傳何進字遂髙南陽宛人也異母女弟選入掖庭為貴人有寵於靈帝拜進郎中再遷虎賁}
