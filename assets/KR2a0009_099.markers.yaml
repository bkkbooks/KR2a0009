  - {type: variant, offset: 603, length: 2, content: 胡俗, WYG: 令氷與尹勲侍御史祝瑨雜考䬃辭連及曹節王甫勲氷即奏收節等使劉瑜内奏時武出宿歸府典中書者先以告長樂五官史朱瑀瑀盗發武奏罵曰中官放縱者自可誅耳我曹何罪而當盡見族滅因大呼曰陳蕃竇武奏白太后廢帝為大逆乃夜召素所親壯健者長樂從官史共普張亮等十七人喢血共盟誅武等曹節聞之驚起白帝曰外間切切請出御徳陽前殿令帝拔劔踊躍使乳母趙嬈等擁衛左右取棨信閉諸禁門棨有衣㦸也漢官儀曰凡居宫中皆施籍於掖門案姓名當入者本官為封棨傳審印信然後受之召尚書官屬脅以白刃使作詔板拜王甫為黃門令持節至北寺獄收尹勲山氷氷疑不受詔甫格殺之}
