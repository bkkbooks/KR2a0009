  - {type: variant, offset: 3735, length: 177, content: 雖有和親之名終無絲髮之効墝埆之人屢嬰塗炭父戰於前子死於後弱女乘於亭障孤兒號於道路老母寡妻設虛祭飲泣淚想望歸魂於沙漠之表豈不哀哉傳曰江海所以能長百川者以其下之也少加屈下尚何足病況今與匈奴君臣分定辭順約明貢獻累至豈宜違信自受其曲其勑度遼及領中郎將龐奮倍雇南部所得生口以還北虜其南部斬首獲生計功受賞如常科於是南單于復令薁鞮日逐王師子將輕騎數千出塞掩擊北虜復斬獲, WYG: 二}
