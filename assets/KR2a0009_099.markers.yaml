  - {type: variant, offset: 6530, length: 224, content: 人死盡今是何等人也乃遣使乞降許之單于脫帽徒跣對龐雄等拜陳道死罪於是赦之遇待如初乃還所鈔漢民男女及羌所略轉賣入匈奴中者合萬餘人五年梁慬免以雲中太守耿夔行度遼將軍元初元年夔免以烏桓校尉鄧遵為度遼將軍遵皇太后之從弟故始為真將軍焉四年逢侯為鮮卑所破部衆分散皆歸北虜五年春逢侯將百餘騎亡還詣朔方塞降鄧遵奏徙逢侯於潁川郡建光元年鄧遵免復以耿夔代為度遼將軍時鮮卑寇邊夔與溫禺犢王呼尤徽將新降者連年出塞討擊鮮卑還復各令屯列衝要而耿夔徵發煩劇新降者皆悉恨謀畔單于立二, WYG: 書卷九}
