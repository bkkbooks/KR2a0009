  - {type: variant, offset: 169, length: 224, content: 諸夏未遑外事至六年始令歸德侯劉颯使匈奴匈奴亦遣使來獻漢復令中郎將韓統報命賂遺金幣以通舊好而單于驕踞自比冒頓對使者辭語悖慢帝待之如初初使命常通而匈奴數與盧芳共侵北邊九年遣大司馬吳漢等擊之經歲無功而匈奴轉盛鈔暴日增十三年遂寇河東州郡不能禁於是漸徙幽并邊人於常山關居庸關已東匈奴左部遂復轉居塞內朝廷患之增緣邊兵郡數千人大築亭候修烽火匈奴聞漢購求盧芳貪得財帛乃遣芳還降望得其賞而芳以自歸為功不稱匈奴所遣單于復恥言其計故賞遂不行由是大恨入寇尤深二十年遂至上黨, WYG: ''}
