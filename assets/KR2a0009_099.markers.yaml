  - {type: variant, offset: 6755, length: 1261, content: 七年薨弟拔立耿夔復免以太原太守法度代為將軍烏稽侯尸逐鞮單于拔延光三年立夏新降一部大人阿族等遂反畔脅呼尤徽欲與俱去呼尤徽曰我老矣受漢家恩寧死不能相隨衆欲殺之有救者得免阿族等遂將妻子輜重亡去中郎將馬翼遣兵與胡騎追擊破之斬首及自投河死者殆盡獲馬牛羊萬餘頭冬法度卒四年漢陽太守傅衆代為將軍其冬傅衆復卒永建元年以遼東太守龐參代為將軍先是朔方以西障塞多不脩復鮮卑因此數寇南部殺漸將王單于憂恐上言求復障塞順帝從之乃遣黎陽營兵出屯中山北界增置緣邊諸郡兵列屯塞下教習戰射單于拔立四年薨弟休利立去特若尸逐就單于休利永建三年立四年龐參遷大鴻臚以東平相宋漢代為度遼將軍陽嘉二年漢遷太僕以烏桓校尉耿曄代為度遼將軍永和元年曄病徵以護羌校尉馬續代為度遼將軍五年夏南匈奴左部句龍王吾斯車紐等背畔率三千餘騎寇西河因復招誘右賢王合七八千騎圍美稷殺朔方代郡長史馬續與中郎將梁並烏桓校尉王元發緣邊兵及烏桓鮮卑羌胡合二萬餘人掩擊破之吾斯等遂更屯聚攻沒城邑天子遣使責讓單于開以恩義令相招降單于本不豫謀乃脫帽避帳詣並謝罪並以病徵五原太守陳龜代為中郎將龜以單于本不能制下逼迫之單于及其弟左賢王皆自殺單于休利立十三年龜又欲徙單于近親於內郡而降者遂更狐疑龜坐下獄免大將軍梁商以羌胡新反黨衆初合難以兵服宜用招降乃上表曰匈奴寇畔自知罪極窮鳥困獸皆知救死況種類繁熾不可單盡今轉運日增三軍疲苦虛內給外非中國之利竊見度遼將軍馬續素有謀謨且典邊日久深曉兵要每得續書與臣策合宜令續深溝高壁以恩信招降宣示購賞明其期約如此則醜類可服國家無事矣帝從之乃詔續招降畔虜商又移書續等曰中國安寧忘戰日久良騎野合交鋒接矢決勝當時戎狄之所長而中國之所短也強弩乘城堅營固守以待其衰中國之所長也而戎狄之所短也宜務先所長以觀其變設購開賞宣示反悔勿貪小功以亂大謀續及諸郡並各遵行於是右賢王部抑鞮等萬三千口詣續降秋句龍吾斯等立句龍王車紐為單于東引烏桓西收羌戎及諸胡等數萬人攻破京兆虎牙營殺上郡都尉及軍司馬遂寇掠并涼幽冀四州乃徙西河治離石上郡治夏陽朔方治五原冬遣中郎將張耽將幽州烏桓諸郡營兵擊畔虜車紐等戰於馬邑斬首三千級獲生口及兵器牛羊甚衆車紐等將諸豪帥骨都侯乞降而吾斯猶率其部曲與烏桓寇鈔六年春馬續率鮮卑五千騎到穀城擊之斬首數百級張耽性勇銳而善撫士卒軍中皆為用命遂繩索相懸上通天山大破烏桓悉斬其渠帥還得漢民獲其畜生財物夏馬續復免以城門校尉吳武代為將軍漢安元年秋吾斯與薁鞮臺耆且渠伯德等復掠并部呼蘭若尸逐就單于兜樓儲先在京師漢安二年立之天子臨軒大鴻臚持節拜授璽綬引上殿賜青蓋駕駟鼓車安車駙馬騎玉具刀劒什物給綵布二千匹賜單于閼氏以下金錦錯雜具軿車馬二乘遣行中郎將持節護送單于歸南庭詔太常大鴻臚與諸國侍子於廣陽城門外祖會饗賜作樂角抵百戲順帝幸胡桃宮臨觀之冬中郎將馬寔募刺殺句龍吾斯送首洛陽建康元年進擊餘黨斬首千二百級烏桓七十萬餘口皆詣寔降車重牛羊不可勝數單于兜樓儲立五年薨伊陵尸逐就單于居車兒建和元年立至永壽元年匈奴左薁鞮臺耆且渠伯德等復畔寇鈔美稷安定屬國都尉張奐擊破降之事已具奐傳延熹元年南單于諸部並畔遂與烏桓鮮卑寇緣邊, WYG: ''}
