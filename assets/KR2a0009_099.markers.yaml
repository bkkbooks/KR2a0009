  - {type: variant, offset: 4969, length: 1299, content: 右谷蠡王於除鞬自立為單于將右溫禺鞬王骨都侯已下衆數千人止蒲類海遣使款塞大將軍竇憲上書立於除鞬為北單于朝廷從之四年遣耿夔即授璽綬賜玉劒四具羽蓋一駟使中郎將任尚持節衞護屯伊吾如南單于故事方欲輔歸北庭會竇憲被誅五年於除鞬自畔還北帝遣將兵長史王輔以千餘騎與任尚共追誘將還斬之破滅其衆單于屯屠何立六年薨單于宣弟安國立單于安國永元五年立安國初為左賢王而無稱譽左谷蠡王師子素勇黠多知前單于宣及屯屠何皆愛其氣決故數遣將兵出塞掩擊北庭還受賞賜天子亦加殊異是以國中盡敬師子而不附安國安國由是疾師子欲殺之其諸新降胡初在塞外數為師子所驅掠皆多怨之安國因是委計降者與同謀議安國既立為單于師子以次轉為左賢王覺單于與新降者有謀乃別居五原界單于每龍會議事師子輒稱病不往皇甫棱知之亦擁護不遣單于懷憤益甚六年春皇甫棱免以執金吾朱徽行度遼將軍時單于與中郎將杜崇不相平迺上書告崇崇諷西河太守令斷單于章無由自聞而崇因與朱徽上言南單于安國疎遠故胡親近新降欲殺左賢王師子及左臺且渠劉利等又右部降者謀共迫脅安國起兵背畔請西河上郡安定為之儆備和帝下公卿議皆以為蠻夷反覆雖難測知然大兵聚會必未敢動搖今宜遣有方略使者之單于庭與杜崇朱徽及西河太守并力觀其動靜如無它變可令崇等就安國會其左右大臣責其部衆橫暴為邊害者共平罪誅若不從命令為權時方略事畢之後裁行客賜亦足以威示百蠻帝從之於是徽崇遂發兵造其庭安國夜聞漢軍至大驚棄帳而去因舉兵及將新降者欲誅師子師子先知乃悉將廬落入曼柏城安國追到城下門閉不得入朱徽遣吏曉譬和之安國不聽城既不下乃引兵屯五原崇徽因發諸郡騎追赴之急衆皆大恐安國舅骨都侯喜為等慮并被誅乃格殺安國安國立一年單于適之子師子立亭獨尸逐侯鞮單于師子永元六年立降胡五六百人夜襲師子安集掾王恬將衞護士與戰破之於是新降胡遂相驚動十五部二十餘萬人皆反畔脅立前單于屯屠何子薁日逐王逢侯為單于遂殺吏人燔燒郵亭廬帳將車重向朔方欲度漠北於是遣行車騎將軍鄧鴻越騎校尉馮柱行度遼將軍朱徽將左右羽林北軍五校士及郡國積射緣邊兵烏桓校尉任尚將烏桓鮮卑合四萬人討之時南單于及中郎將杜崇屯牧師城逢侯將萬餘騎攻圍之未下冬鄧鴻等至美稷逢侯乃乘冰度隘向滿夷谷南單于遣子將萬騎及杜崇所領四千騎與鄧鴻等追擊逢侯於大城塞斬首三千餘級得生口及降者萬餘人馮柱復分兵追擊其別部斬首四千餘級任尚率鮮卑大都護蘇拔廆烏桓大人勿柯八千騎要擊逢侯於滿夷谷復大破之前後凡斬萬七千餘級逢侯遂率衆出塞漢兵不能追七年正月軍還馮柱將虎牙營留屯五原罷遣鮮卑烏桓羌胡兵封蘇拔廆為率衆王又賜金帛鄧鴻還京師坐逗留失利下獄死後帝知朱徽杜崇失胡和又禁其上書以致反畔皆徵下獄死以鴈門太守龐奮行度遼將軍逢侯於塞外分為二部自領右部屯涿邪山下左部屯朔方西北相去數百里八年冬左部胡自相疑畔還入朔方塞龐奮迎受慰納之其勝兵四千人弱小萬餘口悉降以分處北邊諸郡南單于以其右溫禺犢王烏居戰始與安國同謀欲考問之烏居戰將數千人遂復反畔出塞外山谷閒為吏民害秋龐奮馮柱與諸郡兵擊烏居戰其衆降於是徙烏居戰衆及諸還降者二萬餘人於安定北地馮柱還遷將作大匠逢侯部衆飢窮又為鮮卑所擊無所歸竄逃入塞者駱驛不絕單于師子立四年薨單于長之子立萬氏尸逐鞮單于永元十年立十二年龐奮遷, WYG: ''}
