  - {type: variant, offset: 1222, length: 209, content: 見皆泣下郴等反命詔乃聽南單于入居雲中遣使上書獻駱二頭文馬十匹夏南單于所獲北虜薁鞬左賢王將其衆及南部五骨都侯合三萬餘人畔歸去北庭三百餘里共立薁鞬左賢王為單于月餘日更相攻擊五骨都侯皆死左賢王遂自殺諸骨都侯子各擁兵自守秋南單于遣子入侍奉奏詣闕詔賜單于冠帶衣裳黃金璽盭緺綬安車羽蓋華藻駕駟寶劒弓箭黑節三駙馬二黃金錦繡繒布萬匹絮萬斤樂器鼓車棨戟甲兵飲食什器又轉河東米糒二萬五千斛牛羊三萬六千頭以贍給之令中郎將置安集掾吏史將薥刑五, WYG: 數}
