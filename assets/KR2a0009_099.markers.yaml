  - {type: variant, offset: 8017, length: 1223, content: 郡以張奐為北中郎將討之單于諸部悉降奐以單于不能統理國事乃拘之上立左谷蠡王桓帝詔曰春秋大居正居車兒一心向化何罪而黜其遣還庭單于居車兒立二十五年薨子某立屠特若尸逐就單于某熹平元年立六年單于與中郎將臧旻出鴈門擊鮮卑石槐大敗而還是歲單于薨子呼徵立單于呼徵光和元年立二年中郎將張脩與單于不相能脩斬之更立右賢王羌渠為單于脩以不先請而誅殺檻車徵詣廷尉抵罪單于羌渠光和二年立中平四年前中山太守張純反畔遂率鮮卑寇邊郡靈帝詔發南匈奴兵配幽州牧劉虞討之單于遣左賢王將騎詣幽州國人恐單于發兵無已五年右部落與休著各胡白馬銅等十餘萬人反攻殺單于單于羌渠立十年子右賢王於扶羅立持至尸逐侯單于於扶羅中平五年立國人殺其父者遂畔共立須卜骨都侯為單于而於扶羅詣闕自訟會靈帝崩天下大亂單于將數千騎與白波賊合兵寇河內諸郡時民皆保聚鈔掠無利而兵遂挫傷復欲歸國國人不受乃止河東須卜骨都侯為單于一年而死南庭遂虛其位以老王行國事單于於扶羅立七年死弟呼廚泉立單于呼廚泉興平二年立以兄被逐不得歸國數為鮮卑所鈔建安元年獻帝自長安東歸右賢王去卑與白波賊帥韓暹等侍衞天子拒擊李傕郭汜及車駕還洛陽又徙遷許然後歸國二十一年單于來朝曹操因留於鄴而遣去卑歸監其國焉論曰漢初遭冒頓凶黠種衆強熾高祖威加四海而窘平城之圍太宗政鄰刑措不雪憤辱之恥逮孝武亟興邊略有志匈奴赫然命將戎旗星屬候列郊甸火通甘泉而猶鳴鏑揚塵出入畿內至於窮竭武力單用天財歷紀歲以攘之寇雖頗折而漢之疲耗略相當矣宣帝值虜庭分爭呼韓邪來臣乃權納懷柔因為邊衞罷關徼之儆息兵民之勞龍駕帝服鳴鍾傳鼓於清渭之上南面而朝單于朔易無復匹馬之蹤六十餘年矣後王莽陵篡擾動戎夷續以更始之亂方夏幅裂自是匈奴得志狼心復生乘閒侵佚害流傍境及中興之初更通舊好報命連屬金幣載道而單于驕踞益橫內暴滋深世祖以用事諸華未遑沙塞之外忍愧思難徒報謝而已因徙幽并之民增邊屯之卒及關東稍定隴蜀已清其猛夫扞將莫不頓足攘手爭言衞霍之事帝方厭兵閒脩文政未之許也其後匈奴爭立日逐來奔願脩呼韓之好以禦北狄之衝奉藩稱臣永為外扞天子總攬羣策和而納焉乃詔有司開北鄙擇肥美之地量水草以處之馳中郎之使盡法度以臨之制衣裳備文物加璽紱之綬正單于之名於是匈奴分破始有南北二庭焉讎釁既深互伺便𨻶控弦抗戈覘望風塵雲屯鳥散更相馳突至於陷潰創傷者靡歲或寧而漢之塞地晏然矣後亦頗為出師并兵窮討命竇憲耿夔之徒前後並進皆用果譎設奇數異道同會究掩其窟穴躡北追奔三千餘里遂破龍祠焚罽幕阬十角梏閼氏銘功封石倡呼而還單于震懾屏氣蒙氈遁走於烏孫之地而漠北空矣若因其時埶及其虛曠還南虜於陰山歸河西河於內地上申光武權宜之略下防戎羯亂華之變使耿國之筭不謬於當袁安之議見從於後王平易正直若此其弘也而竇憲矜三捷之効忽經世之規狼戾不端專行威惠遂復更立北虜反其故庭並恩兩護以私己福𠫓廾蔑天公坐樹大鯁永言前載何恨憤之深乎自後經綸失方畔服不一其為疢毒胡可單言降及後世翫為常俗終於吞噬神鄉丘墟帝宅嗚呼千里之差興自毫端失得之源百世不磨矣贊曰匈奴既分羽書稀聞野心難悔終亦紛紜, WYG: 考證}
