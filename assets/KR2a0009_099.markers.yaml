  - {type: variant, offset: 1613, length: 344, content: 臣貴者左賢王次左谷蠡王次右賢王次右谷蠡王謂之四角次左右日逐王次左右溫禺鞮王次左右漸將王是為六角皆單于子弟次第當為單于者也異姓大臣左右骨都侯次左右尸逐骨都侯其餘日逐且渠當戶諸官號各以權力優劣部衆多少為高下次第焉單于姓虛連題異姓有呼衍氏須卜氏丘林氏蘭氏四姓為國中名族常與單于婚姻呼衍氏為左蘭氏須卜氏為右主斷獄聽訟當決輕重口白單于無文書簿領焉冬前畔五骨都侯子復將其衆三千人歸南部北單于使騎追擊悉獲其衆南單于遣兵拒之逆戰不利於是復詔單于徙居西河美稷因使中郎將段郴及副校尉王郁留西河擁護之為設官府從事掾史令西河長史歲將騎二千薥刑五百人助中郎將衞護單于冬屯夏罷自後以為常及悉復緣邊八郡南單于既居西河亦列置諸部王助為扞戍使韓氏骨都侯屯北地右賢王屯朔方當于骨都侯屯五原呼衍骨都侯屯雲中郎氏骨都侯屯定襄左南, WYG: ''}
