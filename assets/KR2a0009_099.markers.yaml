  - {type: variant, offset: 74, length: 94, content: 南匈奴落尸逐鞮單于比者呼韓邪單于之孫烏珠留若鞮單于之子也自呼韓邪後諸子以次立至比季父孝單于輿時以比為右薁鞬日逐王部領南邊及烏桓建武初彭寵反畔於漁陽單于與共連兵因復權立盧芳使入居五原光武初方, WYG: 㳺}
