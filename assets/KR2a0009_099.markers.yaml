  - {type: variant, offset: 600, length: 1, content: 勑, WYG: 初京都童謡曰㳺平賣印自有評不避賢豪及大姓案武字游平與陳蕃合䇿戮力唯徳是建咸得其人賢豪大姓皆絶望矣㑹五月日食蕃復説武曰昔蕭望之困一石顯元帝時奄人石顯為中書}
  - {type: variant, offset: 600, length: 1, content: 勑, krp: 初京都童謡曰㳺平賣印自有評不避賢豪及大姓案武字游平與陳蕃合䇿戮力唯徳是建咸得其人賢豪大姓皆絶望矣㑹五月日食蕃復説武曰昔蕭望之困一石顯元帝時奄人石顯為中書}
  - {type: variant, offset: 602, length: 0, content: '', WYG: 譛御史大夫蕭望之令自殺也近者李杜諸公禍及妻子况今石顯數十軰乎蕃以八十之年欲為將軍除害今可且因日食斥罷宦官以塞天變又趙夫人及女尚書旦夕亂太后女尚書内宮也夫人即趙嬈急宜退絶惟將軍慮焉武乃白太后曰故事黃門常侍但當給事省内典門户主近署財物耳今乃使與政事而任權重子弟布列専為貪暴天下匈匈正以此故宜悉誅廢以清朝廷太后曰漢来故事世有但當誅其有罪豈可盡廢邪時中常侍管覇頗有才略専制省内武先白誅覇及中常侍蘓康等竟死武復數白誅曹節等太后冘豫未忍冘音滛冘豫不定也故事久不發至八月太白出西方劉瑜素善天官惡之上書皇太后曰太白犯房左驂上將星入太㣲其占宫門當閉將相不利姦人在主傍願急防之又與武蕃書以星辰錯繆不利大臣宜速斷大計武蕃得書將發於是以朱㝢為司𨽻校尉劉祐為河南尹虞祁為洛陽令武乃奏免黃門令魏彪以所親小黃門山氷代之使氷奏素狡猾尤無狀者長樂尚書鄭䬃䬃音立送北寺獄蕃謂武曰此曹子便當收殺何復考為武不}
