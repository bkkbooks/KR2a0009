  - {type: 'tls:seg', offset: 598, content: '', id: KR2a0009_ZHSJ_099-d99p4s35}
  - {type: variant, offset: 598, length: 1, content: 成, WYG: 咎於此今不誅節等後必難圖武深然之蕃大喜以手推席而起武於是引同志尹勲為尚書令劉瑜為侍中馮述為屯騎校尉又徴天下名士廢黜者前司𨽻李膺宗正劉猛太僕杜密廬江太守朱㝢等列於朝廷請前越嶲太守荀昱為從事中郎辟頴川陳寔為屬共定計䇿於是天下雄俊知其風㫖莫不延頸企踵思奮其智力續漢志曰桓}
