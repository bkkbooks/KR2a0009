  - {type: variant, offset: 597, length: 0, content: '', WYG: 退紹位又自責不能訓導當先受罪由是紹更遵節大小莫敢違犯時國政多失内官専寵李膺杜密等為黨事考逮永康元年上疏諫曰臣聞明主不諱譏刺之言以探幽暗之實忠臣不恤諫爭之患以暢萬端之事是以君臣並熙名奮百世熙盛也臣幸得遭盛明之世逄文武之化豈敢懐禄逃罪不竭其誠陛下初從藩國爰登聖祚天下逸豫謂當中興自即位以来未聞善政梁孫冦鄧雖或誅滅梁冀孫夀寇榮鄧萬世見桓紀也而常侍黃門續為禍虐欺㒺陛下競行譎詐自造制度妄爵非人朝政日衰姦臣日彊伏尋西京放恣王氏佞臣執政終喪天下今不慮前事之失復循覆車之軌臣恐二世之難必將復及二世即胡亥趙髙之變不朝則夕趙髙使女壻閻樂弑胡亥於望夷宫近者姦臣牢脩造設黨議遂收前司𨽻校尉李膺太僕杜密御史中丞陳翔太尉掾范滂等逮考連及數百人曠年拘録事無効驗臣惟膺等建忠抗節志經王室此誠陛下稷卨伊吕之佐而虛為姦臣賊子之所誣枉天下寒心海内失望惟陛下留神澄省時見理出時謂即時也以厭人鬼喁喁之心臣聞古之明君必須賢佐以成政道今臺閣近臣尚書令陳蕃僕射胡廣尚書朱㝢荀緄音古本反劉祐魏朗劉矩尹勲等皆國之貞士朝之良佐尚書郎張陵媯皓苑康楊喬邊韶戴恢等文質彬彬明逹國典内外之職羣才並列而陛下委任近習専樹饕餮外典州郡内幹心膂宜以次貶黜案罪紏罰抑奪宦官欺國之封案其無狀誣㒺之罪信任忠良平決臧否使邪正毁譽各得其所寳愛天官唯善是授如此咎徴可消天應可待間者有嘉禾芝草黄龍之見夫瑞生必於嘉士嘉士猶善人也福至實由善人在徳為瑞無徳為災陛下所行不合天意不宜稱慶書奏因以病上還城門校尉槐里侯印綬上音時文反帝不許有詔原李膺杜密等自黃門北寺若盧都内諸獄繫囚罪輕者皆出之都内主藏官名前書有都内令丞屬大司農也其冬帝崩無嗣武召侍御史河間劉儵參問其國中王子侯之賢者儵稱解瀆亭侯宏武入白太后遂徴立之是為靈帝拜武為大將軍常居禁中帝既立論定䇿功更封武為聞喜侯子機渭陽侯拜侍中兄子紹鄠侯遷歩兵校尉紹弟靖西鄉侯為侍中監羽林左騎武既輔朝政常有誅翦宦官之意太傅陳蕃亦素有謀時共㑹朝堂蕃以私謂武曰中常侍曹節王甫等自先帝時操弄國權濁亂海内百姓匈匈}
