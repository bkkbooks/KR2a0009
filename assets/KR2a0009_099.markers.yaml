  - {type: variant, offset: 2845, length: 791, content: 年薨單于比之子適立僮尸逐侯鞮單于適永平二年立五年冬北匈奴六七千騎入于五原塞遂寇雲中至原陽南單于擊却之西河長史馬襄赴救虜乃引去單于適立四年薨單于莫子蘇立是為丘除車林鞮單于數月復薨單于適之弟長立胡邪尸逐侯鞮單于長永平六年立時北匈奴猶盛數寇邊朝廷以為憂會北單于欲合巿遣使求和親顯宗冀其交通不復為寇乃許之八年遣越騎司馬鄭衆北使報命而南部須卜骨都侯等知漢與北虜交使懷嫌怨欲畔密因北使令遣兵迎之鄭衆出塞疑有異伺候果得須卜使人乃上言宜更置大將以防二虜交通由是始置度遼營以中郎將吳棠行度遼將軍事副校尉來苗左校尉閻章右校尉張國將黎陽虎牙營士屯五原曼柏又遣騎都尉秦彭將兵屯美稷其年秋北虜果遣二千騎候望朔方作馬革船欲度迎南部畔者以漢有備乃引去復數寇鈔邊郡焚燒城邑殺略甚衆河西城門晝閉帝患之十六年乃大發緣邊兵遣諸將四道出塞北征匈奴南單于遣左賢王信隨太僕祭肜及吳棠出朔方高闕攻皋林溫禺犢王於涿邪山虜聞漢兵來悉度漠去肜棠坐不至涿邪山免以騎都尉來苗行度遼將軍其年北匈奴入雲中遂至漁陽太守廉范擊卻之詔遣使者高弘發三郡兵追之無所得建初元年來苗遷濟陰太守以征西大將軍耿秉行度遼將軍時皋林溫禺犢王復將衆還居涿邪山南單于聞知遣輕騎與緣邊郡及烏桓兵出塞擊之斬首數百級降者三四千人其年南部苦蝗大飢肅宗稟給其貧人三萬餘口七年耿秉遷執金吾以張掖太守鄧鴻行度遼將軍八年北匈奴三木樓訾大人稽留斯等率三萬八千人馬二萬匹牛羊十餘萬款五原塞降元和元年武威太守孟雲上言北單于復願與吏人合市詔書聽雲遣驛使迎呼慰納之北單于乃遣大且渠伊莫訾王等驅牛馬萬餘頭來與漢賈客交易諸王大人或前至所在郡縣為設官邸賞賜待遇之南單于聞乃遣輕騎出上郡遮略生口鈔掠牛馬驅還入塞二年正月北匈奴大人車利涿兵等亡來入塞凡七十三輩時北虜衰耗黨衆離畔南部攻其前丁零寇其後鮮卑擊其左西域侵其右不復自立乃遠引而去單于長立二十三年薨單于汗之子宣立伊屠於閭鞮單于宣元和二年立其歲單于遣兵, WYG: ''}
