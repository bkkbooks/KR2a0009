  - {type: variant, offset: 2026, length: 807, content: 十七年北單于遂遣使詣武威求和親天子召公卿廷議不決皇太子言曰南單于新附北虜懼於見伐故傾耳而聽爭欲歸義耳今未能出兵而反交通北虜臣恐南單于將有二心北虜降者且不復來矣帝然之告武威太守勿受其使二十八年北匈奴復遣使詣闕貢馬及裘更乞和親并請音樂又求率西域諸國胡客與俱獻見帝下三府議酬荅之宜司徒掾班彪奏曰臣聞孝宣皇帝勑邊守尉曰匈奴大國多變詐交接得其情則却敵折衝應對入其數則反為輕欺今北匈奴見南單于來附懼謀其國故數乞和親又遠驅牛馬與漢合巿重遣名王多所貢獻斯皆外示富強以相欺誕也臣見其獻益重知其國益虛歸親愈數為懼愈多然今既未獲助南則亦不宜絕北羈縻之義禮無不荅謂可頗加賞賜略與所獻相當明加曉告以前世呼韓邪郅支行事修和親以輔身安國計議甚高為單于嘉之往者匈奴數有乘亂呼韓邪郅支自相讎𨻶並蒙孝宣皇帝垂恩救護故各遣侍子稱藩保塞其後郅支忿戾自絕皇澤而呼韓附親忠孝彌著及漢滅郅支遂保國傳嗣子孫相繼今南單于攜衆南向款塞歸命自以呼韓嫡長次第當立而侵奪失職猜疑相背數請兵將歸埽北庭策謀紛紜無所不至惟念斯言不可獨聽又以北單于比年貢獻欲修和親故拒而未許將以成單于忠孝之義漢秉威信總率萬國日月所照皆為臣妾殊俗百蠻義無親疎服順者襃賞畔逆者誅罰善惡之効呼韓郅支是也今單于欲修和親款誠已達何嫌而欲率西域諸國俱來獻見西域國屬匈奴與屬漢何異單于數連兵亂國內虛耗貢物裁以通禮何必獻馬裘今齎雜繒五百匹弓鞬韥丸一矢四發遣遺單于又賜獻馬左骨都侯右谷蠡王雜繒各四百匹斬馬劒各一單于前言先帝時所賜呼韓邪竽瑟空侯皆敗願復裁賜念單于國尚未安方厲武節以戰攻為務竽瑟之用不如良弓利劒故未以齎朕不愛小物於單于便宜所欲遣驛以聞單于比立九年薨中郎將段郴將兵赴弔祭以酒米分兵衞護之比弟左賢王莫立帝遣使者齎璽書鎮慰拜授璽綬遺冠幘絳單衣三襲童子佩刀緄帶各一又賜繒綵四千匹令賞賜諸王骨都侯已下其後單于薨弔祭慰賜以此為常丘浮尤鞮單于莫中元元年立一年薨弟汗立伊伐於慮鞮單于汗中元二年立永平二年北匈奴護于丘率衆, WYG: ''}
