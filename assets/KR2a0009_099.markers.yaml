  - {type: variant, offset: 1058, length: 0, content: '', WYG: 數十年封侯貴寵膠固内外進新當重任素敬憚之雖外收大名而内不能斷故事久不決紹等又為畫䇿多召四方猛將及諸豪傑使並引兵向京城以脅太后進然之主簿陳琳入諫曰易稱即鹿無虞易屯卦六三爻辭也虞掌山澤之官即鹿猶從禽也無虞言不可得諺有掩目捕雀夫㣲物尚不可欺以得志况國之大事其可以詐立乎今將軍總皇威握兵要龍驤虎歩髙下在心此猶鼓洪爐燎毛髪耳夫違經合道天人所順而反委釋利噐更徴外助大兵聚㑹彊者為雄所謂倒持干戈授人以柄前書梅福上書曰倒持太阿授楚以柄功必不成秪為亂階進不聼遂西召前將軍董卓屯闗中上林苑又使府掾太山王匡東發其郡強弩幷召東郡太守橋瑁屯城臯使武猛都尉丁原燒孟津火照城中武猛謂有武蓺而勇猛者取其嘉名因以名官也皆以誅宦官為言太后猶不從苖謂進曰始共從南陽来俱以貧賤依省内以致貴富國家之事亦何容易覆水不收宜深思之且與省内和也進意更狐疑紹懼進變計乃脅之曰交搆已成形埶已露事留變生將軍復欲何待而不早決之乎進於是以紹為司𨽻校尉假節専命擊斷從事中郎王允為河南尹紹使洛陽方略武吏司察宦者而促董卓等使馳驛上欲進兵平樂觀太后乃恐悉罷中常侍小黃門使還里舍唯留進素所私人以守省中諸常侍小黄門皆詣進謝罪唯所措置進謂曰天下匈匈正患諸君耳今董卓垂至諸君何不早各就國袁紹勸進便於此決之至于再三進不許紹又為書告州郡詐宣進意使捕案中官親屬進謀積日頗泄中官懼而思變張讓子婦太后之妹也讓向子婦叩頭曰老臣得罪當與新婦俱歸私門唯受恩累世唯思念也今當逺離宫殿情懐戀戀願復一入直得暫奉望太后陛下顔色然後退就溝壑死不恨矣子婦言於舞陽君入白太后乃詔諸常侍皆復入直八月進入長樂白太后請盡誅諸常侍以下選三署郎入守宦官廬諸宦官}
