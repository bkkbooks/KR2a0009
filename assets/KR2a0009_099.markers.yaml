  - {type: variant, offset: 6271, length: 199, content: 以朔方太守王彪行度遼將軍南單于比歲遣兵擊逢侯多所虜獲收還生口前後以千數逢侯轉困迫十六年北單于遣使詣闕貢獻願和親脩呼韓邪故約和帝以其舊禮不備未許之而厚加賞賜不荅其使元興元年重遣使詣敦煌貢獻辭以國貧未能備禮願請大使當遣子入侍時鄧太后臨朝亦不荅其使但加賜而已永初三年夏漢人韓琮隨南單于入朝既還說南單于云關東水潦人民飢餓死盡可擊也單于信其言遂起兵反畔攻中郎將耿种於美稷秋王彪卒冬遣行車騎將軍何熙副中郎將龐雄, WYG: 苖出}
