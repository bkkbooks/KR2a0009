  - {type: variant, offset: 1435, length: 4, content: 弩隨單于, WYG: 竊自側闥入伏省中及進出因詐以太后詔召進入坐省閤譲等詰進曰天下憒憒亦非獨我曹罪也説文曰憒憒亂也先帝嘗與太后不快幾至成敗陳留王協母王羙人何后鴆殺之帝怒欲廢后宦官固請得止我曹涕泣救觧各出家財千萬為禮和悦上意但欲託卿門户耳今乃欲滅我曹種族不亦太甚乎卿言省内穢濁公卿以下忠清者為誰於是尚方監渠穆㧞劔斬進於嘉徳殿前譲珪等為詔以故太尉樊陵為司𨽻校尉少府許相為河南尹尚書得詔板疑之曰請大將軍出共議中黃門以進頭擲與尚書曰何進謀反已伏誅矣進部曲將吴匡張璋素}
