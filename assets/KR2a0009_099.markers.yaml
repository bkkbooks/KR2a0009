  - {type: variant, offset: 961, length: 2, content: 冬比, WYG: 屯兵袁紹復説進曰前竇武欲誅内寵而反為所害者以其言語漏洩而五營百官服畏中人故也今將軍既有元舅之重而兄弟並領勁兵部曲將吏皆英俊名士樂盡力命事在掌握此天贊之時也將軍宜一為天下除患名垂後世雖周之申伯何足道哉申伯周申后父也詩大雅曰唯申及甫唯周之翰今大行在前殿人主崩未有諡故稱大行也前書音義曰大行者不反之辭也將軍宜受詔領禁兵劉攽曰案文多一宜字不宜輕出入宫省進甚然之乃稱疾不入陪喪又不送山陵遂與紹定籌䇿而以其計白太后太后不聴曰中官統領禁省}
