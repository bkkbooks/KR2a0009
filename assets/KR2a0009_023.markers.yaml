  - {type: variant, offset: 180, length: 6, content: 千人城守更始, WYG: 月為嵗之朝自五月盡八月為嵗之中自九月盡十二月為嵗之夕上旬為月之朝中旬為月之中下旬為月之夕平旦至食時為日之朝隅中至日昳為日之中晡時至黄昏為日之夕受之受其凶咎也大傳又云其二辰以次相将其次受之鄭𤣥曰二辰謂日月也假令嵗之朝也日月中則上公受之日月夕則下公受之嵗之中也日月朝則孤卿受之日月夕則大夫受之嵗之夕也日月朝則上士受之日月中則下士受之其餘差以尊卑多少則悉矣管子曰明王有四禁春無殺伐無割大陵伐大木斬大山行大火誅大臣收榖賦錢夏無遏水逹名川塞大谷動土功射鳥獸秋無赦過釋罪緩刑冬無爵賞禄傷伐五藏故春政不禁則五榖不成夏政不禁則草木不榮秋政不禁則姦邪不勝冬政不禁則地氣不藏四者俱犯則隂陽不和風雨不時火流邑大風飄屋折樹木地草夭冬雷草木夏落而秋蟲不藏宜死者生宜蟄者鳴多螣蟇蟲也六畜不蕃民多夭死國貧法亂逆氣下生故曰臺榭相望者亡國之簾也馳車充國者追察之馬也翠羽朱飾者斬生之斧也五采纂組者蕃功之室也明王知其然故逺而不近能去此取彼則王道備也續漢書曰建武}
