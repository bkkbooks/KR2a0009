  - {type: variant, offset: 3947, length: 1, content: 卒, WYG: 無孑遺言自中興以來荆州無破亂及劉表為牧又豐樂至此逮八九年當始衰者謂劉表妻當死諸将並零落也十三年無孑遺者言十三年表又當死民當移詣冀州也干寶搜神記曰是時華容有女子忽啼呼云有大喪言語過差縣以為妖言繫獄百餘日忽於獄中哭曰劉荆州今日死華容去州數日即遣馬吏驗視表果死縣乃出之續又歌吟曰不意李立為貴人後無幾曹公平荆州以涿郡李立字建賢為荆州刺史順帝陽嘉元年十月中望都蒲隂狼殺童兒九十七人時李固對䇿引京房易傳曰君将無道害将及人去之深山全身厥災狼食人陛下覺寤比求隠滯故狼災息東觀書曰中山相朱遂到}
