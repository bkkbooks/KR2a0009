  - {type: variant, offset: 670, length: 0, content: '', WYG: 李傕郭氾鬬長安中傕迫劫天子移置傕塢盡燒宮殿城門官府民舍放兵寇鈔公卿以下冬天子東還雒陽傕氾追上到曹陽虜掠乘輿輜重殺光禄勲鄧淵廷尉宣璠少府田邠等數十人五行傳曰好攻戰鄭𤣥注曰參伐為武府攻戰之象輕百姓鄭𤣥注曰輕之者不重民命春秋傳曰師出不正反戰不正勝也飾城郭鄭𤣥注曰昴畢間為天街甘氏經曰天街保塞孔塗道衢保塞城郭之象也月令曰四鄙入保侵邊境鄭𤣥曰畢主邊兵則金不從革鄭𤣥注曰君行此四者為逆天西宮之政西宮於地為金金性從刑而革人所用為噐者也無故冶之不銷或入火飛亡或鑄之裂形是為不從革其他變異皆屬沴也洪範曰從革作辛馬融曰金之性從人而更可銷鑠也漢書音義曰言人君言不見從則金鐡亦不從人意謂金失其性而為災也又曰言不從是謂不乂鄭𤣥曰乂治也君言不從則是不能治其事也厥咎僭鄭𤣥曰君臣不治則僭差矣厥罰恒暘鄭𤣥曰金主秋秋氣殺殺氣失故常暘也春秋考異郵曰君行非是則言不見從言不見從則下不治下不治則僭差過制度奢侈驕泰天子僭天}
