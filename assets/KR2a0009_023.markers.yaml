  - {type: variant, offset: 2837, length: 1107, content: 邯鄲純即謁見世祖深接之純退見官屬將兵法度不與它將同遂求自結納獻馬及縑帛數百匹世祖北至中山留純邯鄲會王郎反世祖自薊東南馳純與從昆弟訢宿植共率宗族賓客二千餘人老病者皆載木自隨奉迎於育拜純為前將軍封耿鄉侯訢宿植皆偏將軍使與純居前降宋子從攻下曲陽及中山是時郡國多降邯鄲者純恐宗家懷異心迺使訢宿歸燒其廬舍世祖問純故對曰竊見明公單車臨河北非有府臧之蓄重賞甘餌可以聚人者也徒以恩德懷之是故士衆樂附今邯鄲自立北州疑惑純雖舉族歸命老弱在行猶恐宗人賓客半有不同心者故燔燒屋室絕其反顧之望世祖歎息及至鄗世祖止傳舍鄗大姓蘇公反城開門內王郎將李惲純先覺知將兵逆與惲戰大破斬之從平邯鄲又破銅馬時赤眉青犢上江大彤鐵脛五幡十餘萬衆並在射犬世祖引兵將擊之純軍在前去衆營數里賊忽夜攻純雨射營中士多死傷純勒部曲堅守不動選敢死二千人俱持彊弩各傅三矢使銜枚閒行繞出賊後齊聲呼譟彊弩並發賊衆驚走追擊遂破之馳騎白世祖世祖明旦與諸將俱至營勞純曰昨夜困乎純曰賴明公威德幸而獲全世祖曰大兵不可夜動故不相救耳軍營進退無常卿宗族不可悉居軍中迺以純族人耿伋為蒲吾長悉令將親屬居焉世祖即位封純高陽侯擊劉永於濟陰下定陶初純從攻王郎墯馬折肩時疾發迺還詣懷宮帝問卿兄弟誰可使者純舉從弟植於是使植將純營純猶以前將軍從時真定王劉揚復造作讖記云赤九之後癭揚為主揚病癭欲以惑衆與綿曼賊交通建武二年春遣騎都尉陳副游擊將軍鄧隆徵揚揚閉城門不內副等乃復遣純持節行赦令於幽冀所過並使勞慰王侯密勑純曰劉揚若見因而收之純從吏士百餘騎與副隆會元氏俱至真定止傳舍揚稱病不謁以純真定宗室之出遣使與純書欲相見純報曰奉使見王侯牧守不得先詣如欲面會宜出傳舍時揚弟林臨邑侯讓及從兄細各擁兵萬餘人揚自恃衆強而純意安靜即從官屬詣之兄弟並將輕兵在門外揚入見純純接以禮敬因延請其兄弟皆入迺閉閤悉誅之因勒兵而出真定震怖無敢動者帝憐揚讓謀未發並封其子復故國純還京師因自請曰臣本吏家子孫幸遭大漢復興聖帝受命備位列將爵為通侯天下略定臣無所用志願試治一郡盡力自效帝笑曰卿既治武復欲修文邪迺拜純為東郡太守時東郡未平純視事數月盜賊清寧四年詔純將兵擊更始東平太守范荊荊降進擊太山濟南及平原賊皆平之居東郡四歲時發干長有罪純案奏圍守之奏未下長自殺純坐免以列侯奉朝請從擊董憲道過東郡百姓老小數千隨車駕涕泣云願復得耿君帝謂公卿曰純年少被甲冑為軍吏耳治郡迺能見思若是乎六年定封為東光侯純辭就國帝曰文帝謂周勃丞相吾所重君為我率諸侯就國今亦然也純受詔而去至鄴賜穀萬斛到國弔死問病民愛敬之八年東郡濟陰盜賊羣起遣大司空李通橫野大將軍王常擊之帝以純威信著於衞地遣使拜太中大夫使與大兵會東郡東郡聞純入界盜賊九千餘人皆詣純降大兵不戰而還璽書復以為東郡太守吏民悅服, WYG: ''}
