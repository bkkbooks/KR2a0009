  - {type: variant, offset: 811, length: 3, content: 遷太僕, WYG: 東海魯國東平山陽濟隂陳留民訛言相驚有賊捕至京師民皆入城也世祖建武古今注曰建武三年七月雒陽大旱帝至南郊求雨即日雨五年夏旱京房傳曰欲德不用兹謂張厥災荒其旱隂雲不雨變而赤因四隂衆出過時兹謂廣其旱不生上下皆蔽兹謂隔其旱天赤三月時有雹殺飛禽上緣求妃兹謂僭其旱三月大温亡雲君高臺府兹謂犯隂侵陽其旱萬物根死有火災庶位踰節兹謂僭其旱澤物枯為火所傷春秋考異郵曰國大旱寃獄結旱者陽氣移精不施君上失制奢滛僭差氣亂感天則旱徴見又云隂厭陽移君滛民惡隂精不舒陽偏不施又云陽偏民怨徴也在所以感之者上奢則求多求多則下竭下竭則潰君不仁管子曰春不收枯骨伐枯木而起去之則夏旱方儲對策曰百姓苦士卒煩碎責租税失中暴師外營經歴三時内有怨女外有曠夫王者熟推其祥揆合於天圖之事情旱災可除夫旱者過日天王無意於百姓恩德不行萬民煩擾故天應以無澤是時天下僭逆者未盡誅軍多過時古今注曰建武六年六月九年春十二年五月二十一年六月明帝永平元年五月}
