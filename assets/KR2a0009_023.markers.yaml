  - {type: variant, offset: 653, length: 0, content: '', krp: 赤眉賊率樊崇逢安等共立劉盆子為天子然崇等視之如小兒百事自由初不恤録也後正旦至君臣欲共饗既坐酒食未下羣臣更起亂不可整時大司農楊音案劒怒曰小兒戱尚不如此其後遂破壞崇安等皆誅死唯音為闗内侯以夀終光武崩山陽王荆哭不哀作飛書與東海王勸使作亂明帝以荆同母弟大后在故隠之後徙王廣陵荆遂坐復謀反自殺也章帝時竇皇后兄憲以皇后甚幸於上故人人莫不畏憲憲於是強請奪沁水長公主田公主畏憲與之憲乃賤顧之後上幸公主田覺之問憲憲又上言借之上以后故但譴勅之不治其罪後章帝崩竇太后攝政憲秉機密忠直之臣與憲忤者憲多害之其後憲兄弟遂皆被誅桓帝時梁冀秉政兄弟貴盛自恣好驅馳過度至於歸家猶驅馳入門百姓號之曰梁氏滅門驅馳後遂誅滅和帝永元十年十三年十四年十五年皆淫雨傷稼古今注曰光武建武六年九月大雨連月苖稼更生鼠巢樹上十七年雒陽暴雨壊民廬舍壓殺人傷害禾稼安帝元年四年秋郡國十淫雨傷稼方儲對策曰雨不時節妄賞賜也永寧元年郡國三十三淫雨傷稼建光元年京都及郡國二十九淫雨傷稼是時羌反久未平百姓屯戍不解愁苦延光元年郡國二十七淫雨傷稼案本傳陳忠奏以為王侯二千石為女使伯榮獨拜車下柄在臣妾二年郡國五連雨傷稼順帝永建四年司隸荆豫兖冀部淫雨傷稼六年冀州淫雨傷稼桓帝延熹二年夏霖雨五十餘日是時大将軍梁冀秉政謀害上所幸鄧貴人母宣冀又擅殺議郎邴尊上欲誅冀懼其持權日久威勢強盛恐有逆命害及吏民密與近臣中常侍單超等圖其方畧其年八月冀卒伏罪誅滅案公沙穆傳永夀元年霖雨大水三輔以東莫不湮没靈帝建寧元年夏霖雨六十餘日是時大将軍竇武謀變廢中官其年九月長樂五官吏朱瑀等共與中常侍曹節起兵先誅武交兵闕下敗走追斬武兄弟死者數百人案武死無兄弟有兄子熹平元年夏霖雨七十餘日是時中常侍曹節等共誣曰勃海王悝謀反其十月誅悝中平六年夏霖雨八十餘日是時靈帝新棄羣臣大行尚在梓宮大将軍何進與佐軍校尉袁紹等共謀欲誅廢中官下文陵畢中常侍張讓等共殺進兵戰京都死者數千更始諸将軍過雒陽者數十軰皆幘而衣婦人衣繡擁􅜎時智者見之以為服之不中身之災也乃奔入邊郡避之是服妖也其後更始遂為赤眉所殺桓帝元嘉中京都婦女作愁眉啼粧墮馬䯻折要歩齲齒笑所謂愁眉者細而曲折啼粧者薄拭目下若啼處墮馬䯻者作一邊梁冀别傳曰冀婦女又有不聊生䯻折要歩者足不在體下齲齒笑者若齒痛樂不欣欣始自大将軍梁冀家所為京都歙然諸夏皆放效此近服妖也梁冀二}
  - {type: variant, offset: 654, length: 1, content: 祖, WYG: 上将㛰媾王室大作威福将危社稷天誡若曰兵馬将徃收捕婦女憂愁踧眉啼泣吏卒掣頓折其要脊令䯻傾邪雖強語笑無復氣味也到延熹二年舉宗誅夷延熹中梁冀誅後京都幘顔短耳長短上長下時中常侍單超左悺徐璜具瑗唐衡在帝左右縱其姦慝海内愠曰一将軍死五将軍出家有數侯子弟列布州郡賔客雜襲騰翥上短下長與梁冀同占到其八年桓帝因日蝕之變乃拜故司徒韓寅為司隸校尉以次誅鉏京都正清臣昭案本傳寅誅左悺貶具瑗雖尅折姦首羣閹相䝉京都未為正清延熹中京都長者皆着木屐婦女始嫁至作漆畫五采為系此服妖也到九年黨事始發傳黄門北寺臨時惶惑不能信天任命多有逃走不就考者九族拘繫及所過歴長少婦女皆被桎梏應木屐之象也靈帝建寧中京都長者皆以葦方笥為粧具下士盡然時有識者竊言葦方笥郡國讞篋也今珍用之此天下人皆當有罪讞於理官也到光和三年癸丑赦令詔書吏民依黨禁錮者赦除之有不見文他以類比疑者讞於是諸有黨郡皆讞廷尉人名悉}
