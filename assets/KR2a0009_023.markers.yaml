  - {type: variant, offset: 1089, length: 315, content: 特賜李忠諸卿得無望乎即以所乘大驪馬及繡被衣物賜之進圍鉅鹿未下王郎遣將攻信都信都大姓馬寵等開城內之收太守宗廣及忠母妻而令親屬招呼忠時寵弟從忠為校尉忠即時召見責數以背恩反城因格殺之諸將皆驚曰家屬在人手中殺其弟何猛也忠曰若縱賊不誅則二心也世祖聞而美之謂忠曰今吾兵已成矣將軍可歸救老母妻子宜自募吏民能得家屬者賜錢千萬來從我取忠曰蒙明公大恩思得効命誠不敢內顧宗親世祖迺使任光將兵救信都光兵於道散降王郎無功而還會更始遣將攻破信都忠家屬得全世祖因使忠還行太守事收郡中大姓附邯鄲者誅殺數百人及任光歸郡忠迺還復為都尉建武二年更封中水侯食邑三千戶其年徵拜五官中郎將從平龐萌董憲等六年遷丹陽太守是時海內新定南方海濱江淮多擁兵據土忠到郡招懷降附其不服者悉, WYG: 共}
