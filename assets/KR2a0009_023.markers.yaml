  - {type: variant, offset: 3951, length: 6, content: 成侯子阜嗣植, WYG: 災暴縁類符驗不虛政失厥中狼災為應至乃殘食孩幼朝廷愍悼思惟咎徴博訪其故山嶽尊靈國所望秩而遂比不奉祠怠慢廢典不務懇惻淫刑放濫害加孕婦毒流未生感和致災其詳思改救追復所失有不遵憲舉正以聞靈帝建寧中羣狼數十頭入晉陽南城門囓人袁山松書曰光和三年正月虎見平樂觀又見憲陵上囓衞士蔡邕封事曰政有苛暴則虎狼食人}
