  - {type: variant, offset: 658, length: 1, content: 遣, WYG: 無下而隂無上也天下未欲平也後還遂大亂袁山松曰禪位於魏靈帝光和元年南宮侍中寺雌雞欲化雄一身毛皆似雄但頭冠尙未變詔以問議郎蔡邕邕對曰貌之不恭則有雞禍宣帝黄龍元年未央宮雌雞化為雄不鳴無距是嵗元帝初即位立王皇后至初元元年丞相史家雌雞化為雄冠距鳴将是嵗后父禁為平陽侯女立為皇后至哀帝晏駕后攝政王莽以后兄子為}
  - {type: page-break, offset: 658, content: '', id: KR2a0009_WYG_023-10a, image: WYG0252/WYG0252-0319c.png}
  - {type: variant, offset: 658, length: 1, content: 遣, krp: 無下而隂無上也天下未欲平也後還遂大亂袁山松曰禪位於魏靈帝光和元年南宮侍中寺雌雞欲化雄一身毛皆似雄但頭冠尙未變詔以問議郎蔡邕邕對曰貌之不恭則有雞禍宣帝黄龍元年未央宮雌雞化為雄不鳴無距是嵗元帝初即位立王皇后至初元元年丞相史家雌雞化為雄冠距鳴将是嵗后父禁為平陽侯女立為皇后至哀帝晏駕后攝政王莽以后兄子為}
