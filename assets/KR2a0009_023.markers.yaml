  - {type: variant, offset: 106, length: 10, content: 尋王邑更始至洛陽以光, WYG: 之時牛足反出背上也此下欲伐上之禍時則有青𤯝青祥鄭𤣥曰青木色也𤯝生於此祥自外來也惟金沴木鄭𤣥曰沴殄也凡貌言視聽思心一事失則逆人之心人心逆則怨木金水火土氣}
