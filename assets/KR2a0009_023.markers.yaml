  - {type: variant, offset: 859, length: 0, content: '', WYG: 梁冀貪樹疏幼以為已功專國號令以贍其私大尉李固以為清河王雅性聰明敦詩悦禮加又屬親立長則順置善則固而冀建白太后策免固徴蠡吾侯遂即至尊固是日幽斃于獄暴屍道路而太尉胡廣封安樂鄉侯司徒趙戒厨亭侯司空袁湯安國亭侯云桓帝之初天下童謡曰小麥青青大麥枯誰當穫者婦與姑丈人何在西擊胡吏買馬君具車請為諸君鼓嚨胡案元嘉中涼州諸羌一時俱反南入蜀漢東抄三輔延及并冀大為民害命将出衆每戰常負中國益發甲卒麥多委棄但有婦女穫刈之也吏買馬君具車者言調發重及有秩者也請為諸君鼓嚨胡者不敢公言私咽語桓帝之初京都童謡曰城上烏尾畢逋公為吏子為徒一徒死百乘車車班班入河間河間姹女工數錢以錢為室金為堂石上慊慊舂黄粱梁下有懸鼓我欲擊之丞卿怒案此皆謂為政貪也城上烏尾畢逋者處高利獨食不與下共謂人主多聚斂也公為吏子為徒者言蠻夷将畔逆父既為軍吏其子又為卒徒徃擊之也一徒死百乘車者言前一人徃討胡既死矣後又遣百乘車徃臣昭曰志家此釋豈未盡乎徃徒一死何用百乘其後驗竟為靈帝作此言一徒似斥桓帝帝貴任羣閹參委機政左右前後莫非刑人有同囚徒之長故言寄一徒也且又弟則廢黜身無嗣魁然單獨非一而何百乘車者乃國之君解犢後徴正膺斯數繼以班班尤得以類焉車班班入河間者言上将崩乘輿班班入河間迎靈帝也應劭釋此句云徴靈帝者輪班擁節入河間也河間姹女工數錢一本作妖女以錢為室金為堂者靈帝既立其母永樂太后好聚金以為堂也石上慊慊舂黄粱者言永樂雖積金錢慊慊常若不足使人舂黄粱而食之也梁下有懸鼓我欲擊之丞卿怒者言永樂主教靈帝使賣官受錢所禄非其人天下忠篤之士怨望欲擊懸鼓以求見丞卿主鼓者亦復諂順怒而止我也桓帝之初京都童謡曰游平賣印自有平不辟豪賢及大姓案到延熹之末鄧皇后以譴自殺乃以}
