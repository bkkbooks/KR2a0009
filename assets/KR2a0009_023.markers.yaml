  - {type: variant, offset: 662, length: 2, content: 吳漢, WYG: 由是為亂臣竊推之頭元首人君之象今雞一身已變未至於頭而上知之是将有其事而不遂成之象也若應之不精政無所改頭冠或成為患兹大是後張角作亂稱黄巾遂破壊四方疲於賦役多叛者上不改政遂致天下大亂桓帝永興二年四月丙午光禄勲吏舍壁下夜有青氣視之得玉鉤玦各一鉤長七寸二分周五寸四分身中皆雕鏤此青祥也玉金類也七寸二分商數也五寸四分徴數也商為臣徴為事蓋為人臣引決事者不肅将有禍也是時梁冀秉政専恣後四嵗梁氏誅滅也延熹五年太學門無故自壊襄楷以為太學前疑所居本傳楷書無前疑之言也其門自壊文徳将喪教化廢也是後天下遂至喪亂永康元年十月壬戌南宮平城門内屋自壊金沴木木動也其十二月宮車晏駕靈帝光和元年南宮平城門内屋武庫屋及外東垣屋前後頓壊蔡邕對曰平城門正陽之門與宮連郊祀法駕所由從出門之最尊者也武庫禁兵所藏東垣庫之外障易傳曰小人在位上下咸悖厥妖城門内崩潛潭巴曰宮瓦自墮諸侯强陵主此皆小人顯位亂法之咎也其後黄巾賊先起東方庫兵大動皇后同父兄何進為大将軍同母弟苖為車騎将軍兄弟並貴盛皆綂兵在京都其後進欲誅廢中官為中常侍張讓叚珪}
