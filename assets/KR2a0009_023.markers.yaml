  - {type: variant, offset: 2377, length: 459, content: 因二郡之衆建入關之策委成業臨不測而世主未悟謀夫景同邳彤之廷對其為幾乎語曰一言可以興邦斯近之矣劉植字伯先鉅鹿昌城人也王郎起植與弟喜從兄歆率宗族賓客聚兵數千人據昌城聞世祖從薊還迺開門迎世祖以植為驍騎將軍喜歆偏將軍皆為列侯時真定王劉揚起兵以附王郎衆十餘萬世祖遣植說揚揚迺降世祖因留真定納郭后后即揚之甥也故以此結之迺與揚及諸將置酒郭氏漆里舍揚擊筑為歡因得進兵拔邯鄲從平河北建武二年更封植為昌城侯討密縣賊戰歿子向嗣帝使喜代將植營復為驍騎將軍封觀津侯喜卒復以歆為驍騎將軍封浮陽侯喜歆從征伐皆傳國于後向徙封東武陽侯卒子述嗣永平十五年坐與楚王英謀反國除耿純字伯山鉅鹿宋子人也父艾為王莽濟平尹純學於長安因除為納言士王莽敗更始立使舞陰王李軼降諸郡國純父艾降還為濟南太守時李軼兄弟用事專制方面賓客游說者甚衆純連求謁不得通久之迺得見因說軼曰大王以龍虎之姿遭風雲之時奮迅拔起期月之閒兄弟稱王而德信不聞於士民功勞未施於百姓寵祿暴興此智者之所忌也兢兢自危猶懼不終而況沛然自足可以成功者乎軼奇之且以其鉅鹿大姓迺承制拜為騎都尉授以節令安集趙魏會世祖度河, WYG: 衰}
