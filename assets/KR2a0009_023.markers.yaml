  - {type: variant, offset: 654, length: 1, content: 祖, krp: 上将㛰媾王室大作威福将危社稷天誡若曰兵馬将徃收捕婦女憂愁踧眉啼泣吏卒掣頓折其要脊令䯻傾邪雖強語笑無復氣味也到延熹二年舉宗誅夷延熹中梁冀誅後京都幘顔短耳長短上長下時中常侍單超左悺徐璜具瑗唐衡在帝左右縱其姦慝海内愠曰一将軍死五将軍出家有數侯子弟列布州郡賔客雜襲騰翥上短下長與梁冀同占到其八年桓帝因日蝕之變乃拜故司徒韓寅為司隸校尉以次誅鉏京都正清臣昭案本傳寅誅左悺貶具瑗雖尅折姦首羣閹相䝉京都未為正清延熹中京都長者皆着木屐婦女始嫁至作漆畫五采為系此服妖也到九年黨事始發傳黄門北寺臨時惶惑不能信天任命多有逃走不就考者九族拘繫及所過歴長少婦女皆被桎梏應木屐之象也靈帝建寧中京都長者皆以葦方笥為粧具下士盡然時有識者竊言葦方笥郡國讞篋也今珍用之此天下人皆當有罪讞於理官也到光和三年癸丑赦令詔書吏民依黨禁錮者赦除之有不見文他以類比疑者讞於是諸有黨郡皆讞廷尉人名悉}
  - {type: variant, offset: 656, length: 1, content: 洛, WYG: 方笥中靈帝好胡服胡帳胡牀胡坐胡飯胡箜篌胡笛胡舞京都貴戚皆競為之此服妖也其後董卓多擁胡兵填塞街衢虜掠宮掖發掘園陵靈帝於宮中西園駕四白驢躬自操轡驅馳周旋以為大樂於是公卿貴戚轉相放效至乘輜軿以為騎從互相侵奪賈與馬齊案易曰時乘六龍以御天行天者莫若龍行地者莫如馬詩云四牡騤騤載是常服檀車煌煌四牡彭彭夫驢乃服重致遠上下山谷野人之所用耳何有帝王君子而驂服之乎遲鈍之畜而今貴之天意若曰國且大亂賢愚倒植凡執政者皆如驢也其後董卓陵虐王室多援邊人以充本朝胡夷異種跨蹈中國熹平中省内冠狗帶綬以為笑樂有一狗突出走入司徒府門或見之者莫不驚怪袁山松書曰光和四年又於西園弄狗以配人京房易傳曰君不正臣欲簒厥妖狗冠出後靈帝寵用便嬖子弟永樂賔客鴻都羣小傳相汲引公卿牧守比肩是也又遣御史於西邸賣官闗内侯顧五百萬者賜與金紫詣闕上書占令長隨縣好醜豐約有賈强者貪如豺虎弱者畧不類物實狗而冠者也司徒古之丞相壹綂國政天戒若曰宰相多非其人尸禄素餐莫能據正持重阿意曲從今在位者皆如狗也故狗走入其門應劭曰靈帝數以車騎將軍過拜孽臣内孽又贈亡人顯號加於頑凶印綬汙於腐屍昔辛有睹被髮之祥知其為戎今假號雲集不亦宜乎靈帝數遊戲於西園中令後宮采女為客舍主人身為商賈服行至舍采女下酒食因共飲食以為戲樂此服妖也其後天下大亂風俗通曰時京師賔㛰嘉㑹皆作魁􅪡酒酣之後續以挽歌魁􅪡喪家之樂挽歌執紼相偶和之者天戒若曰國家當急殄悴諸貴樂皆死亡也自靈帝崩後京師壊滅戸有兼屍蟲而相食魁􅪡挽歌斯之效乎獻帝建安中男子之衣好為長躬而下甚短女子好為長裙而上甚短時益州從事莫嗣以為服妖是}
