  - {type: variant, offset: 834, length: 1, content: 空, WYG: 馬平定河北更始大臣並僭専權故謡妖作也後更始遂為赤眉所殺是更始之不諧在赤眉也世祖自河北興世祖建武六年蜀童謡曰黄牛白腹五銖當復是時公孫述僭號於蜀時人竊言王莽稱黄述欲繼之故稱曰五銖漢家貨明當復也述遂誅滅王莽末天水童謡曰出吳門望緹羣見一蹇人言欲上天令天可上地上安得民時}
