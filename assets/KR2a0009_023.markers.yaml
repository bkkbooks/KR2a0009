  - {type: variant, offset: 101, length: 4, content: 與世祖破, WYG: 騎官漢書音義曰遊田馳騁不反宮室飲食不享鄭𤣥曰享獻也禮志曰天子諸侯無事則嵗三田一為乾豆二為賔客三為充君之庖周禮獸人冬獻狼夏獻麋春秋獻獸物此獻禮之大畧也注五行稱鄭𤣥曰皆出注大傳也漢書音義曰無獻享之禮出入不節鄭𤣥曰角為天門房有三道出入之象也奪民農時鄭𤣥曰房心農時之候也季冬之月命農師計耦耕事是時房心晨中春秋傳曰辰為農祥后稷之所經緯也及有姦謀鄭𤣥曰亢為朝廷房心為明堂謀事出政之象則木不曲直鄭𤣥曰君行此五者為逆天東宮之政東宮於地為木木性或曲或直人所用為噐也無故生不暢茂多折槁是為木不曲直木金水火土謂之五材春秋傳曰天生五材民並用之其政逆則神怒神怒則材失性不為民用其他變異皆屬沴沴亦神怒凡神怒者日月五星既見謫于天矣洪範木曰曲直孔安國曰木可以揉曲直謂木失其性而為災也又曰貌之不恭是謂不肅鄭𤣥曰肅敬也君貌不恭則是不能敬其事也洪範曰貌曰恭厥咎狂鄭𤣥曰君臣不敬則倨慢如狂方儲對策曰君失制度下不恭承臣恣淫慢厥罰恒雨鄭𤣥曰貌曰木木主春春氣生生氣失則踰其節故常雨也管子曰冬作土功發地藏則夏多暴雨秋雨霖不止淮南子曰金不收則多淫雨厥極惡孔安國曰醜陋時則有服妖鄭𤣥曰服貌之飾也時則有龜孽鄭𤣥曰龜蟲之生於水而游於春者屬木時則有雞禍鄭𤣥曰雞畜之有冠翼者也屬貌洪範傳曰妖者敗胎也少小之類言其事之尚微也至孽則牙孽也至乎禍則著矣時則有下體生上之痾鄭𤣥曰痾病也貌氣失之病也漢書音義曰若梁孝}
