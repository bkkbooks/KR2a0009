  - {type: variant, offset: 867, length: 2, content: 內外, WYG: 甘陵有南北二部三輔尤甚由是博考黄門北寺始見廢閣茅田一頃者言羣賢衆多也中有井者言雖阨窮不失其法度也四方纎纎不可整者言姦慝大熾不可整理嚼復嚼者京都飲酒相强之辭也言食肉者鄙不恤王政徒耽宴飲歌呼而已也今年尚可者言但禁錮也後年鐃者陳竇被誅天下大壞桓帝之末京都童謡曰白蓋小車何延延河間來合諧河間來合諧案解犢亭屬饒陽河間縣也臣昭案郡國志饒陽本屬涿後屬安平靈帝既是河間王曾孫謡言自是有徴無俟明河間之縣為騐居無幾何而桓帝崩使者與解犢侯皆白蓋車從河間來延延衆貌也是時御史劉儵建議立靈帝以儵為侍中中常侍侯覽畏其親近必當間已白拜儵泰山太守因令司隸廹促殺之}
