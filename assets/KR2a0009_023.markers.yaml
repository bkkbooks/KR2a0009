  - {type: variant, offset: 32, length: 3, content: 少忠厚, WYG: 治尚書兼通諸經及圖緯州郡辟請皆不應耽古篤學誦讀典籍欣然獨笑以忘寢食蜀亡魏徴不至並撰建武以來災異今合而論之以續前志云五行傳曰田獵不宿鄭𤣥注尙書大傳曰不宿不宿禽也角主天兵周禮四時習兵因以田獵禮志曰天子不合圍諸侯不掩羣過此則暴天物}
