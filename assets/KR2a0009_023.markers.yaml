  - {type: variant, offset: 322, length: 327, content: 世祖從之拜光為左大將軍封武成侯留南陽宗廣領信都太守事使光將兵從光乃多作檄文曰大司馬劉公將城頭子路力子都兵百萬眾從東方來擊諸反虜遣騎馳至鉅鹿界中吏民得檄傳相告語世祖遂與光等投暮入堂陽界使騎各持炬火彌滿澤中光炎燭天地舉城莫不震驚惶怖其夜即降旬日之閒兵眾大盛因攻城邑遂屠邯鄲迺遣光歸郡城頭子路者東平人姓爰名曾字子路與肥城劉詡起兵盧城頭故號其兵為城頭子路曾自稱都從事詡稱校三老寇掠河濟閒眾至二十餘萬更始立曾遣使降拜曾東萊郡太守詡濟南太守皆行大將軍事是歲曾為其將所殺衆推詡為主更始封詡助國侯令罷兵歸本郡力子都者東海人也起兵鄉里鈔擊徐兗界衆有六七萬更始立遣使降拜子都徐州牧為其部曲所殺餘黨復相聚與諸賊會於鄉因號為鄉鄉渠帥董次仲始起茌平遂渡河入魏郡清河與五校合眾十餘萬, WYG: ''}
