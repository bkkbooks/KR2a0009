  - {type: variant, offset: 860, length: 2, content: 憲秉, WYG: 貴人代之其父名武字游平拜城門校尉及太后攝政為大将軍與太傅陳蕃合心戮力惟德是建印綬所加咸得其人豪賢大姓皆絶望矣桓帝之末京都童謡曰茅田一頃中有井四方纎纎不可整嚼復嚼今年尚可後年鐃風俗通作譊案易曰拔茅茹以其彚征吉茅喻羣賢也井者法也于時中常侍管霸蘇康憎疾海内英哲與長樂少府劉囂大常許永尚書柳分袁山松書曰柳分}
