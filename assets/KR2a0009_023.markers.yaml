  - {type: variant, offset: 832, length: 0, content: '', WYG: 春並旱案楊終傳建初元年大旱榖貴終以為廣陵楚淮陽濟南之獄徙者數萬人吏民怨曠上疏云久旱孔叢曰建初元年大旱天子憂之侍御史孔豐乃上疏曰臣聞為不善而災報得其應也為善而災至遭時運也陛下即位日淺視民如傷而不幸耗旱時運之㑹耳非政教所致也昔成湯遭旱因自責省畋散積減御損食而大有年意者陛下未為成湯之事焉天子納其言而從之三日雨即降轉}
  - {type: variant, offset: 832, length: 0, content: '', krp: 春並旱案楊終傳建初元年大旱榖貴終以為廣陵楚淮陽濟南之獄徙者數萬人吏民怨曠上疏云久旱孔叢曰建初元年大旱天子憂之侍御史孔豐乃上疏曰臣聞為不善而災報得其應也為善而災至遭時運也陛下即位日淺視民如傷而不幸耗旱時運之㑹耳非政教所致也昔成湯遭旱因自責省畋散積減御損食而大有年意者陛下未為成湯之事焉天子納其言而從之三日雨即降轉}
  - {type: variant, offset: 833, length: 0, content: '', WYG: 黄門郎典東觀事和帝永元六年秋京都旱時雒陽有寃囚和帝幸雒陽寺録囚徒理寃囚收令下獄抵罪行未還宮澍雨降古今注曰永元二年郡國十四旱十五年丹陽郡國二十二並旱或傷稼安帝古今注曰永初元年郡國八旱分遣議郎請雨案本紀二年五月旱皇太后幸雒陽寺録囚徒即日降雨六月京都及郡國四十大水雖去旱得水無救為災永初六年夏旱古今注曰三年郡國八旱四年五年夏並旱七年夏旱元初元年夏旱二年夏旱三年夏旱時西羗寇亂軍屯相繼連十餘年六年夏旱古今注曰建光元年郡國四旱延光元年郡國五並旱傷稼順帝永建三年夏旱五年夏旱陽嘉二年夏旱時李固對策以為奢僭所致也臣昭案本紀元年二月京師旱郎顗傳人君恩澤不施於民祿去公室臣下專權所致也又周舉傳三年河南三輔大旱五榖傷災天子親自露坐陽德殿東廂請雨沖帝永嘉元年夏旱時沖帝幼崩太尉李固勸太后及兄梁冀立嗣帝擇年長有德者天下頼之則功名不朽年幼未可知如後不善悔無所及時太后及冀貪立年幼欲久自專遂立質帝八嵗此不用德古今注曰本初元年二月京師旱桓帝元嘉元年夏旱是時梁冀秉政妻子並受封寵踰節延熹元年六月旱京房占曰人君無施澤惠利於下則致旱也不救必蝗蟲害榖其救也貰擿罰行寛大惠兆民勞功吏賜鰥寡禀不足案陳蕃上疏宮女多聚不御憂悲之感以致水旱之困也靈帝熹平五年夏旱蔡邕作伯夷叔齊碑曰熹平五年天下大旱禱請名山求獲答應時處士平陽蘇騰字𤣥成夢陟首陽有神馬之使在道明覺而思之以其夢陟狀上聞天子開三府請雨使者與郡縣户曹掾吏登山升祠手書要曰君況我聖主以洪澤之福天尋興雲即降甘雨也六年夏旱光和五年夏旱六年夏旱是時常侍黄門僭作威福獻帝興平元年秋長安旱是時李傕郭氾専權縱肆獻帝起居注曰建安十九年夏四月旱更始時南陽有童謡曰諧不諧在赤眉得不得在河北是時更始在長安世祖為大}
