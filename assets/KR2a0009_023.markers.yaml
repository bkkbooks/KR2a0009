  - {type: variant, offset: 1488, length: 352, content: 十九年卒子威嗣威卒子純嗣永平九年坐母殺純叔父國除永初七年鄧太后復封純琴亭侯純卒子廣嗣萬脩字君游扶風茂陵人也更始時為信都令與太守任光都尉李忠共城守迎世祖拜為偏將軍封造義侯及破邯鄲拜右將軍從平河北建武二年更封槐里侯與揚化將軍堅鐔俱擊南陽未剋而病卒于軍子普嗣徙封泫氏侯普卒子親嗣徙封扶柳侯親卒無子國除永初七年鄧太后紹封脩曾孫豐為曲平亭侯豐卒子熾嗣永建元年熾卒無子國除延熹二年桓帝紹封脩玄孫恭為門德亭侯邳彤字偉君信都人也父吉為遼西太守彤初為王莽和成卒正世祖徇河北至下曲陽彤舉城降復以為太守留止數日世祖北至薊會王郎兵起使其將徇地所到縣莫不奉迎唯和成信都堅守不下彤聞世祖從薊還失軍欲至信都乃先使五官掾張萬督郵尹綏選精騎二千餘匹掾路迎世祖軍彤尋與世祖會信都世祖雖得二郡之助而兵衆未合議者多言可因信都兵自送西還長安彤廷對, WYG: 童謡}
