  - {type: punctuation, offset: 1013, content: ▲, id: KR2a0009_ZHSJ_119-bkkpn595}
  - {type: variant, offset: 1013, length: 0, content: '', WYG: 匹馬之蹤匈奴既降朔方易水之地更無匈奴匹馬之蹤也六十餘年矣後王莽陵簒擾動戎夷自宣帝甘露二年至平帝末年北邊無匈奴之盗王莽陵簒之後狼心復生前書贊曰三世稱賔於漢庭是時邊城晏閉牛馬布野三世無犬吠之警黎庶㤀干戈之役後六十餘嵗之間遭王莽簒位始開邊隙三世謂元帝成帝各為一世哀平二帝皆元帝之孫共為一世故三世也王莽執政始開邊隙也續以更始之亂方}
  - {type: variant, offset: 1013, length: 0, content: '', krp: 匹馬之蹤匈奴既降朔方易水之地更無匈奴匹馬之蹤也六十餘年矣後王莽陵簒擾動戎夷自宣帝甘露二年至平帝末年北邊無匈奴之盗王莽陵簒之後狼心復生前書贊曰三世稱賔於漢庭是時邊城晏閉牛馬布野三世無犬吠之警黎庶㤀干戈之役後六十餘嵗之間遭王莽簒位始開邊隙三世謂元帝成帝各為一世哀平二帝皆元帝之孫共為一世故三世也王莽執政始開邊隙也續以更始之亂方}
  - {type: variant, offset: 1014, length: 1, content: 陽, WYG: 幅裂更始無道擾亂方内諸夏如布帛之裂也自是匈奴得志狼心復生乗間侵佚害流邊境及中興之初更通舊好及光武中興更通宣元之舊好報命連屬金幣載道報命相屬言其往來不絶金帛常載於道言其賞遺常行而單于驕踞益横内暴滋深世祖二年令中郎將韓統報命賂遺金帛以通舊好而單于驕踞自比冒頓對使者辭語悖慢也世祖以用事諸華未遑沙塞之外遑暇也忍愧思難徒報謝而已雖得驕踞悖慢之詞而忍其羞愧思其患難但以善言報謝而已徒但也因徙幽并之民増邊屯之卒移徙幽并之人増益邊屯之戍卒及關東稍定隴蜀已清其猛夫扞將莫不頓足攝手爭言衛霍之事爭言衛青霍去病世宗之代北伐匈奴之事也帝方厭兵間脩文政未之許也帝厭其用兵欲脩文政未許猛夫扞将之事其後匈奴爭立日逐來奔願脩呼韓之好以禦北夷之衝比季父單于輿以比為右薁鞬日逐王日逐即南匈奴單于比也奉藩稱臣永為外扞天子總攬羣䇿和而納焉總攬羣臣之策善均從衆與之和同而納其降款也乃詔}
