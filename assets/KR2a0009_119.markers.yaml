  - {type: variant, offset: 840, length: 1, content: 有, WYG: 虎牙都尉也西羌傳云置虎牙都尉於長安扶風都尉於雍漢官儀曰涼州近羌數犯三輔京兆虎牙扶風都尉將兵衞䕶園陵也殺上郡都尉及軍司馬遂寇掠并涼幽冀四州乃徙西河治離石離石即西河之屬縣也上郡治夏陽朔方治五原移朔方就五原郡冬遣中郎將張眈將幽州烏桓諸郡營兵擊畔虜車紐等戰於馬邑斬首三千級獲生口及兵器牛羊甚衆車紐等將諸豪帥骨都侯乞降而吾斯猶率其部曲與烏桓寇鈔六年春馬續率鮮卑五千騎到榖城擊之斬首數百級張眈性勇鋭而善撫士卒軍中皆為用命遂繩索相懸上通天山大破烏桓悉斬其渠帥還得漢民獲其畜生財物夏馬續復免以城門校尉呉武代為將軍漢安元年順帝永和七年改為漢安元年也秋吾斯與薁鞮臺耆且渠伯徳等復掠并部薁鞮或作薁鞬前書兩字通今依前書不改也呼蘭若尸逐就單于兠樓儲先在京師漢安二年立之天子臨軒大鴻臚持節拜授璽綬引上殿賜青蓋駕駟鼓車安車駙馬騎玉具刀劒什物玉具標首鐔衛盡用玉為之給綵布二千匹賜單于閼氏以下金錦錯雜具軿車馬二乘遣行中郎將持節䕶送單于歸南庭詔}
