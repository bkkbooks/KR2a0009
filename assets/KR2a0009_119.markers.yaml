  - {type: variant, offset: 852, length: 0, content: '', WYG: 人反攻殺單于單于羌渠立十年子右賢王於扶羅立於扶羅即是前趙劉元海之祖也其元海為亂晉之首持至尸逐侯單于於扶羅中平}
  - {type: variant, offset: 852, length: 0, content: '', krp: 人反攻殺單于單于羌渠立十年子右賢王於扶羅立於扶羅即是前趙劉元海之祖也其元海為亂晉之首持至尸逐侯單于於扶羅中平}
  - {type: variant, offset: 853, length: 0, content: '', WYG: 年立國人殺其父者遂畔共立須卜骨都侯為單于而於扶羅詣闕自訟㑹靈帝崩天下大亂單于將數}
  - {type: variant, offset: 853, length: 0, content: '', krp: 年立國人殺其父者遂畔共立須卜骨都侯為單于而於扶羅詣闕自訟㑹靈帝崩天下大亂單于將數}
  - {type: variant, offset: 854, length: 2, content: 五百, WYG: 騎與白波賊合兵寇河内諸郡時民皆保聚鈔掠無利而兵遂挫傷復欲歸國國人不受乃止河東遂止河東平陽也須卜骨都侯為單于一年而死南庭遂虚其位以老王行國事單于於扶羅立}
  - {type: page-break, offset: 854, content: '', id: KR2a0009_WYG_119-30a, image: WYG0253/WYG0253-0716a.png}
  - {type: variant, offset: 854, length: 2, content: 五百, krp: 騎與白波賊合兵寇河内諸郡時民皆保聚鈔掠無利而兵遂挫傷復欲歸國國人不受乃止河東遂止河東平陽也須卜骨都侯為單于一年而死南庭遂虚其位以老王行國事單于於扶羅立}
  - {type: variant, offset: 857, length: 122, content: 十四長安高帝所都鎬在上林菀中有細柳聚有蘭池有曲郵有杜郵霸陵有枳道亭有長門亭杜陵酆在西南鄭新豐有驪山東有鴻門亭及戲亭有嚴掫城藍田出美玉長陵故屬馮翊商故屬弘農上雒侯國有冢領山雒水出故屬弘農有菟和山有蒼野聚陽陵故屬馮翊五千一百九十五高陵池陽雲陽祋祤永, WYG: 年死弟呼厨泉立於扶羅即劉}
