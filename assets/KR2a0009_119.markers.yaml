  - {type: variant, offset: 311, length: 385, content: 陰穀城瀍水出有函谷關緱氏有鄔聚有轘轅關鞏有尋谷水有東訾聚今名訾城有坎埳聚有黃亭有湟水有明谿泉成睪有旃然水有瓶丘聚有漫水有汜水京密有大騩山有梅山有陘山新城有高都城有廣成聚有鄤聚古鄤氏今名蠻中匽師有尸鄉春秋時曰尸氏新鄭詩鄭國祝融墟平懷有隰城河陽有湛城軹有原鄉有湨梁波有絺城沁水野王有太行山有射犬聚有邘城溫蘇子所都濟水出王莽時大旱遂枯絕州平睾有邢丘故邢國周公子所封有李城山陽邑有雍城有蔡城武德獲嘉侯國脩武故南陽秦始皇更名有南陽城陽樊攢茅田有小脩武聚有隤城共本國淇水出有汎亭汲朝歌紂所都居南有牧野北有邶國南有寧鄉蕩陰有羑里城林慮故隆慮殤帝改有鐵安邑有鐵有鹽池楊有高梁亭平陽侯國有鐵堯都此臨汾有董亭汾陰有介山蒲坂有雷首山有沙丘亭大陽有吳山上有虞城有下陽城有茅津有顛軨坂解有桑泉城有臼城有解城有瑕城皮氏有耿鄉有鐵有冀亭聞喜邑本曲沃有董池陂古董澤有稷山亭有涑水有洮水絳邑有翼城永安故彘, WYG: 相宋漢代為度遼將軍}
