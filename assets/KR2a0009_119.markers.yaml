  - {type: variant, offset: 132, length: 1, content: 雒, WYG: 年薨弟拔立耿䕫復免以太原太守法度代為將軍劉攽曰案一傳中處處皆云度遼將軍惟三處没度遼字以後又復舉之明此三處脱漏也烏稽侯尸逐鞮單于拔延光三年立夏新降一部大人阿族等遂反畔脇呼尤徽欲與俱去呼尤徽曰我老矣受漢家恩寧死不能相隨衆欲殺之有救者得免阿族等遂將妻子輜重亡去中郎將馬翼遣兵與胡騎追擊破之斬首及自投河死者殆盡殆近也欲死盡所餘無幾獲馬牛羊萬餘頭冬法度卒四年漢}
