  - {type: variant, offset: 1012, length: 0, content: '', WYG: 獻帝初平五年改為興平元年劉攽曰案下文立字當屬此句立以兄被逐不得歸國數為鮮卑所鈔建安元年帝自長安東歸右賢王去卑與白波賊帥韓暹等侍衛天子拒擊李傕郭氾及車駕還洛陽又徙遷許然後歸國謂歸河東平陽也二十一年單于來朝曹操因留於鄴留呼厨泉於鄴而遣去卑歸平陽監其五部國而遣去卑歸監其國焉論曰漢初遭冒頓凶黠種衆强熾髙祖威加四海而窘平城之圍前書云髙祖自將兵三十二萬擊韓王信先至平城冒頓縱兵三十萬騎圍帝於白登七日漢兵中外不得相救餉故歌曰平城之事甚大苦七日不得食不能彎弓弩得陳平秘計然後得免也太宗政鄰刑措不雪憤辱之恥前書贊曰斷獄四百幾致刑措幾近也今言政鄰刑措鄰亦近也逮孝武亟興邊略有志匈奴赫然命將戎旗星屬如衆星之相連屬言其多候列郊甸火通甘泉列置候兵於近郊畿天子在甘泉宫而烽火時到甘泉宫也而猶鳴鏑揚塵出入畿内鳴鏑即匈奴之箭也謂匈奴白羊樓煩王在河南去京師一千餘里古者王畿千里言匈奴寇邊即出入畿内世宗逐樓煩白羊始得河南之地以築朔方今夏州是也按夏州去京師一千二百里至於窮竭武力單用天財單盡也言盡用天下之財厯紀嵗以攘之寇雖頗折而漢之疲耗略相當矣漢武好征戸口減半即是死亡與殺匈奴相當也宣帝值虜庭分爭呼韓邪來臣乃權納懐柔因為邊衛虜庭分爭謂五單于國呼韓邪遂來臣服因請款關永為邊衛前書云日逐王薄胥堂為屠耆單于呼揭王為呼揭單于薁鞬王為車犂單于烏籍都尉為烏籍單于并呼韓邪凡五單于也罷關徼之儆息兵民之勞匈奴既降北庭不儆備勞者並得休息也龍駕帝服鳴鐘傳鼓於清渭之上案前書宣帝甘露二年正月呼韓邪朝甘泉宫漢寵以殊禮位在諸侯王上贊謁者稱臣而不名禮畢使者導單于宿長平上自甘泉宿池陽宫詔單于毋謁左右當戸及羣臣皆列觀及諸蠻夷君長王侯數萬人咸迎於渭橋下夾道陳上登渭橋咸稱萬嵗劉攽曰注贊謁者案文多一者字南面而朝單于朔方無}
