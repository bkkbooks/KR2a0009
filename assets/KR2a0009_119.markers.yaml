  - {type: variant, offset: 7, length: 0, content: '', krp: 宋宣城太守范煜撰唐章懐太子賢注南匈奴傳第七十九南匈奴前書直言匈奴傳不言南北今稱南者明其為北生義也以南單于向化尤深故舉其順者以冠之東觀記稱匈奴南單于列傳范曄因去其單于二字南匈奴䤈落尸逐鞮單于比者䤈音火兮反呼韓邪單于之孫前書曰單于者廣大之貌也言其象天單于然也呼韓邪即冒頓單于八代孫虚閭權渠單于子也名稽侯㹪㹪音山諫反東觀記曰單于北匈奴頭曼十八代孫臣賢案頭曼即冐頓單于父自頭曼單于至此父子相承十代以單于相傳乃十八代也劉攽曰注單于北匈奴頭曼案北當作比烏珠留若鞮單于之子也匈奴謂孝為若鞮自呼韓邪單于降後與漢親密見漢帝諡常為孝慕之至其子復珠累單于以下皆稱若鞮南單于比以下直稱鞮也自呼韓邪後諸子以次立至比季父單于輿時以比為右薁鞬日逐王部領南邊及烏桓薁音於六反鞬音九言反下並同建武初彭寵反畔於漁陽單于與共連兵因復權立盧芳使入居五原東觀記芳安定人屬國胡數千畔在參蠻芳從之詐姓劉氏自稱西平王㑹匈奴句林王將兵來降參蠻胡芳因隨入匈奴留數年單于以中國未定欲輔立之遣母樓且王求入五原與假號將軍李興等結謀興北至單于庭迎芳芳外倚匈奴内因興等故能廣略邊}
  - {type: variant, offset: 8, length: 0, content: '', WYG: 光武初方平諸夏未遑外事遑暇也至六年始令歸徳侯劉颯使匈奴匈奴亦遣使來獻漢復令中郎將韓統報命賂遺金幣以通舊好舊好謂宣帝元帝之代與}
  - {type: variant, offset: 8, length: 0, content: '', krp: 光武初方平諸夏未遑外事遑暇也至六年始令歸徳侯劉颯使匈奴匈奴亦遣使來獻漢復令中郎將韓統報命賂遺金幣以通舊好舊好謂宣帝元帝之代與}
  - {type: variant, offset: 9, length: 5, content: 一河南河內, WYG: 和親而單于驕踞自比冒頓冒頓匈奴單于頭曼之子也即夏后氏之苖裔也其先曰淳維自淳維至頭曼千有餘嵗冒頓當始皇之時為鳴鏑弑頭曼代立控弦三十餘萬强盛與諸夏為敵國踞嫚無禮窘戹髙祖戲侮吕后事見前書對使者辭語悖慢前書更始二年冬遣中郎將歸徳侯颯大司馬䕶軍陳遵使匈奴授單于漢制璽綬單于輿驕謂遵颯曰匈奴本與漢為兄弟匈奴中亂孝宣帝輔立呼韓邪單于故稱臣以尊漢今漢亦大亂為王莽簒位匈奴亦出擊莽空其邊境今天下騷動思漢莽卒以敗而漢復興亦我力也當復尊我遵與颯相䟫距單于終持此論語詞悖慢即此類也帝待之如初初使命常通而匈奴數與盧芳共侵北邊九年遣大司馬呉漢等擊之經嵗無功而匈奴轉盛鈔暴日増十三年遂寇}
  - {type: page-break, offset: 9, content: '', id: KR2a0009_WYG_119-2b, image: WYG0253/WYG0253-0702b.png}
