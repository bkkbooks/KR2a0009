  - {type: variant, offset: 24, length: 0, content: '', WYG: 天水二十一年冬復寇上谷中山殺略鈔掠甚衆北邊無復寧嵗言縁邊之郡無安寧之嵗初單于弟}
  - {type: variant, offset: 24, length: 0, content: '', krp: 天水二十一年冬復寇上谷中山殺略鈔掠甚衆北邊無復寧嵗言縁邊之郡無安寧之嵗初單于弟}
  - {type: variant, offset: 25, length: 0, content: '', WYG: 谷蠡王伊屠知牙師谷音鹿蠡音離以次當左賢王左賢王即是單于儲副單于欲傳其子遂殺知牙師知牙師者王昭君之子也昭君字嬙南郡人也前書曰南郡秭歸人初元帝時以良家子選入掖庭時呼韓邪來朝帝𠡠以宫女五人賜之昭君入宫數嵗不得見御積悲怨乃請掖庭令求行呼韓邪臨辭大㑹帝召五女以示之昭君豐容靚飾光明漢宫顧景裴回竦動左右帝見大驚意欲留之而難於失信遂與匈奴生二子及呼韓邪死其前閼氏子代立欲妻之昭君上書求歸成帝𠡠令從胡俗遂復為後單于閼氏焉比見知牙師被誅出怨言曰以兄弟言之右谷蠡王次當立以子言之我前單于長子我當立遂内懐猜懼庭㑹稀闊單于疑之乃遣兩骨都侯監領比所部兵二十二年單于輿死子左賢王烏逹鞮侯立為單于復死弟左賢王蒲奴立為單于比不得立既懐憤恨而匈奴中連年旱蝗赤地數千里草木盡枯人畜飢疫死耗大半三分損二為大半單于畏漢乗其敝乃遣使詣漁陽求和親於是遣中郎將李茂報命而比密遣漢人郭衡奉匈奴地圖二十三年詣西河太守求内附兩骨都侯頗覺其意㑹五月龍祠前書曰匈奴法嵗正月諸長小㑹單于庭祠五月大㑹龍城祭其先天地鬼神八月大㑹蹛林課校人畜計蹛音帶又音多因白單于言薁鞬日逐夙來欲為不善若不誅且亂國時比弟斬將王在單于帳下聞之馳以報比比懼遂斂所主南邊八郡衆四五萬人待兩骨都侯還欲殺之骨都侯且到知其謀皆輕騎亡去以告單于單于遣萬騎擊之見比衆盛不敢進而還二十四年春八部大人共議立比為呼韓邪單于以其大父嘗依漢得安故欲襲其號於是欵五原塞願永為藩蔽扞禦北虜帝用五官中郎將耿國議乃許之其冬比自立為呼韓邪單于東觀記曰十二月癸丑匈奴始分為南北單于二十五年春遣弟左賢王莫將兵萬餘人擊北單于弟薁鞬左賢王生獲之又破北單于帳下并得其衆合萬餘人馬七千匹牛羊萬頭北單于震怖却地千里初帝造戰車可駕數牛上作樓櫓置於塞上以拒匈奴櫓即樓也釋名曰樓無屋為櫓時人見者或相謂曰䜟言漢九世當却北狄地千里豈謂此邪及是果拓地焉北部薁鞬骨都侯與右骨都侯率衆三萬餘人來歸南單于南單于復遣使詣闕奉藩稱臣獻國珍寳求使者監䕶遣侍子脩舊約二十六年遣中郎將叚郴丑吟反副校尉王郁使南單于立其庭去五原西部塞八十里單于乃延迎使者使者曰單于當伏拜受詔單于顧望有頃乃伏稱臣拜訖令譯曉使者曰單于新立誠慙於左右願使者衆中無相屈折也骨都侯等見皆泣下郴等反命詔乃聽南單于入居雲中遣使上書獻駱駞二頭文馬十匹杜預注左傳曰文馬畫馬為文也夏南單于所獲北虜薁鞬左賢王將其衆及南部五骨都侯合三萬餘人畔歸去北庭三百餘里共立薁鞬左賢王為單于月餘日更相攻擊五骨都侯皆死左賢王遂自殺諸骨都侯子各擁兵自守秋南單于遣子入侍奉奏詣闕詔賜單于冠帶衣裳黄金璽盭緺綬盭音戾草名以戾草染綬因以為名則漢諸侯王制戾緑色緺古蛙反説文曰紫青色也安車羽蓋華藻駕駟寳劒弓箭黒節三駙馬二黄金錦繡繒布萬匹絮萬斤樂器鼓車棨㦸甲兵飲食什器有衣之㦸曰棨又轉河東米糒二萬五千斛牛羊三萬六千頭以贍給之令中郎將置安集掾史將弛刑五十人持兵弩隨單于所處參辭訟察動静單于嵗盡輒遣奉奏劉攽曰案文少一使字送侍子入朝中郎將從事一人將領詣闕漢遣謁者送前侍子還單于庭交㑹道路元正朝賀拜祠陵廟畢漢乃遣單于使令謁者將送賜綵繒千匹錦四端金十斤大官御食醤及橙橘龍眼荔支賜單于母及諸閼氏單于子及左右賢王左右谷蠡王骨都侯有功善者繒綵合萬匹嵗以為常匈奴俗嵗有三龍祠常以正月五月九月戊日祭天神南單于既内附兼祠漢帝因㑹諸部議國事走馬及駱駞為樂其大臣貴者左賢王次左谷蠡王次右賢王次右谷蠡王謂之四角次左右日逐王次左右温禺鞮王次左右斬將王是為六角皆單于子弟次第當為單于者也異姓大臣左右骨都侯次左右尸逐骨都侯其餘日逐且渠當戸諸官號且音子余反各以權力優劣部衆多少為髙下次第焉單于姓虚連題前書曰單于姓攣鞮氏其國稱之曰摚犂孤屠匈奴謂天為摚犂謂子為孤屠與此不同異姓有呼衍氏須卜氏丘林氏蘭氏前書冒頓單于時大姓有呼衍氏蘭氏須卜氏三姓貴種也四姓為國中名族常與單于婚姻呼衍氏為左蘭氏須卜氏為右主斷獄聽訟當决輕重口白單于無文書簿領焉冬前畔五骨都侯子復將其衆三千人歸南部北單于使騎追擊悉獲其衆南單于遣兵拒之逆戰不利於是復詔單于徙居西河美稷因使中郎將叚郴及副校尉王郁留西河擁䕶之為設官府從事掾史令西河長史嵗將騎二千㢮刑五百人助中郎將衛䕶單于冬屯夏罷自後以為常及悉復縁邊八郡南單于既居西河亦列置諸部王助為扞戍使韓氏骨都侯屯北地右賢王屯朔方當于骨都侯屯五原呼衍骨都侯屯雲中郎氏骨都侯屯定襄左南將軍屯鴈門栗籍骨都侯屯代郡皆領部衆為郡縣偵羅耳目偵音丑政反羅音力賀反猶今言探候偵羅也北單于惶恐頗還所略漢人以示善意鈔兵每到南部下還過亭候輒謝曰自擊亡虜薁鞬日逐耳非敢犯漢人也二十七年北單于遂遣使詣武威求和親天子召公卿廷議不决皇太子言曰南單于新附北虜懼於見伐故傾耳而聽爭欲歸義耳今未能出兵而反交通北虜臣恐南單于將有志北虜降者且不復來矣帝然之告武威太守勿受其使二十八年北匈奴復遣使詣闕貢馬及裘更乞和親并請音樂又求率西域諸國胡客與俱獻見帝下三府議酬答之宜}
