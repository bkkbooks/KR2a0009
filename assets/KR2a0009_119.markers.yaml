  - {type: variant, offset: 7, length: 0, content: '', WYG: 宋宣城太守范煜撰唐章懐太子賢注南匈奴傳第七十九南匈奴前書直言匈奴傳不言南北今稱南者明其為北生義也以南單于向化尤深故舉其順者以冠之東觀記稱匈奴南單于列傳范曄因去其單于二字南匈奴䤈落尸逐鞮單于比者䤈音火兮反呼韓邪單于之孫前書曰單于者廣大之貌也言其象天單于然也呼韓邪即冒頓單于八代孫虚閭權渠單于子也名稽侯㹪㹪音山諫反東觀記曰單于北匈奴頭曼十八代孫臣賢案頭曼即冐頓單于父自頭曼單于至此父子相承十代以單于相傳乃十八代也劉攽曰注單于北匈奴頭曼案北當作比烏珠留若鞮單于之子也匈奴謂孝為若鞮自呼韓邪單于降後與漢親密見漢帝諡常為孝慕之至其子復珠累單于以下皆稱若鞮南單于比以下直稱鞮也自呼韓邪後諸子以次立至比季父單于輿時以比為右薁鞬日逐王部領南邊及烏桓薁音於六反鞬音九言反下並同建武初彭寵反畔於漁陽單于與共連兵因復權立盧芳使入居五原東觀記芳安定人屬國胡數千畔在參蠻芳從之詐姓劉氏自稱西平王㑹匈奴句林王將兵來降參蠻胡芳因隨入匈奴留數年單于以中國未定欲輔立之遣母樓且王求入五原與假號將軍李興等結謀興北至單于庭迎芳芳外倚匈奴内因興等故能廣略邊}
