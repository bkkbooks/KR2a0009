  - {type: variant, offset: 119, length: 0, content: '', krp: 十年臣等生長漢地開口仰食嵗時賞賜動輒億萬雖垂拱安枕慙無報效之地願發國中及諸部故胡新降精兵遣左谷蠡王師子左呼衍日逐王須訾將萬騎出朔方左賢王安國右大且渠王交勒蘇將萬騎出居延期十二月同㑹虜地臣將餘兵萬人屯五原朔方塞以為拒守臣素愚淺又兵衆單少不足以防内外願遣執金吾耿秉度遼將軍鄧鴻及西河雲中五原朔方上郡太守并力而北令北地安定太守各屯要害冀因聖帝威神一舉平定臣國成敗要在今年已𠡠諸部嚴兵馬訖九月龍祠悉集河上唯陛下裁哀省察太后以示耿秉秉上言昔武帝單極天下欲臣虜匈奴未遇天時事遂無成宣帝之世㑹呼韓來降故邊人獲安中外為一生人休息六十餘年及王莽簒位變更其號漢陽單于印文曰匈奴單于璽無漢字王莽改曰新匈奴單于章耗擾不止單于乃畔光武受命復懐納之縁邊壊郡得以還復烏桓鮮卑咸脇歸義威鎮四夷其效如此今幸遭天授北虜分爭以夷伐夷國家之利宜可聽許秉因自陳受恩分當出命效用太后從之永元元年以秉為征西將軍與車騎將軍竇憲率騎八千與度遼兵及南單于衆三萬騎出朔方擊北虜大破之北單于奔走首虜二十餘萬人劉攽曰案文多一人字事已具竇憲傳二年春鄧鴻遷大鴻臚以定襄太守皇甫稜行度遼將軍南單于復上求滅北庭於是遣左谷蠡王師子等將左右部八千騎出雞鹿塞塞在朔方郡窳渾縣北窳音愈中郎將耿譚遣從事將䕶之至涿邪山乃留輜重分為二部各引輕兵兩道襲之左部北過西海至河雲北河雲匈奴地名右部從匈奴河水劉攽曰案匈河自是水名妄出奴字西繞天山南度甘微河二軍俱㑹夜圍北單于大驚劉攽曰案文少單于二字率精兵千餘人合戰單于被創墯馬復上將輕騎數十遁走僅而免脱得其玉璽獲閼氏及男女五人斬首八千級生虜數千口而還是時南部連剋獲納降黨衆最盛領戸三萬四千口二十三萬七千三}
  - {type: variant, offset: 120, length: 0, content: '', WYG: 勝兵五萬一百七十故從事中郎將劉攽曰案文多從字言故事如此置從事二人耿譚以新降者多上増從事十二人三年北單于復為右校尉耿䕫所破逃亡不知所在其弟右谷蠡王於除鞬自立為單于將右温禺鞬王骨都侯以下衆數千人止蒲類海遣使欵塞大將軍竇憲上書立於除鞬為北單于朝廷從之四年遣耿䕫即授璽綬賜玉劒四具羽蓋一駟劉攽曰案玉劒四具非是當云玉具劒四又衍一駟字使中郎將任尚持節衛䕶屯伊吾如南單于故事方欲輔歸北庭㑹竇憲被誅五年於除鞬自畔還北帝遣將兵長史王輔以千餘騎與任尚共追誘將還斬之破滅其衆單于屯屠何立六年薨單于宣弟安國立單于安國永元五年立安國初為左賢王而無稱譽左谷蠡王師子素勇􅃛多知前單于宣及屯屠何皆愛其氣決故數遣將兵出塞掩擊北庭還受賞賜天子亦加殊異是以國中盡敬師子而不附安國由是疾師子欲殺之其諸新降胡初在塞外數為師子所驅掠皆多怨之安國因是委計降者與同謀議安國既立為單于師子以次轉為左賢王覺單于與新降者有謀乃别居五原界單于每龍㑹議事師子輒稱病不往皇甫稜知之亦擁䕶不遣單于懐憤益甚六年春皇甫稜免以執金吾朱徽行度遼將軍時單于與中郎將杜崇不相平廼上書告崇崇諷西河太守令斷單于章無由自聞而崇因與朱徽上言南單于安國疎逺故胡親近新降欲殺左賢王師子及左臺且渠劉利等又右部降者謀共迫脇安國起兵背畔請西河上郡安定為之儆備和帝下公卿議皆以為蠻夷反覆雖難測知然大兵聚㑹必未敢動揺今宜遣有方略使者之單于庭與杜崇朱徽及西河太守并力觀其動静如無它變可令崇等就安國㑹其左右大臣責其部衆横暴為邊害者共平罪誅若不從命令為權時方略事畢之後裁行客賜言以主客之禮裁量賜物不多與也亦足以威示百蠻帝從之於是徽崇遂發兵造其庭安國夜聞漢軍至大驚棄帳而去因舉兵及將新降者欲誅師子師子先知乃悉將盧落入曼柏城安國追到城下門閉不得入朱徽遣吏曉譬和之安國不聽城既不下乃引兵屯五原崇徽因發諸郡騎追赴之急衆皆大恐安國舅骨都侯喜為等慮并被誅乃格殺安國安國王立一年單于適之子師子立亭獨尸逐侯鞮單于師子永元六年立降胡五六百人夜襲師子安集掾王恬將衛䕶士與戰破之於是新降胡遂相驚動十五部二十餘萬人皆反畔脅立前單于屯屠何子右薁鞬日逐王逢侯為單于遂殺略吏人燔燒郵亭廬帳將軍重向朔方欲度漠北於是遣行車騎將軍鄧鴻越騎校尉馮柱行度遼將軍朱徽將左右羽林北軍五校士及郡國積射縁邊兵漢有迹射士言尋迹而射之積亦與迹同古字通也烏桓校尉任尚將烏桓鮮卑合四萬人討之時南單于及中郎將杜崇屯牧師城逢侯將萬餘騎攻圍之未下冬鄧鴻等至美稷逢侯乃乗氷度隘向滿夷谷南單于遣子將萬騎及杜崇所領四千騎與鄧鴻等追擊逢侯於大城塞斬首三千餘級得生口及降者萬餘人馮柱復分兵追擊其别部斬首四千餘級任尚率鮮卑大都䕶蘇拔廆胡罪反烏桓大人勿柯}
