  - {type: variant, offset: 1129, length: 0, content: '', WYG: 更立北虜反其故庭永元三年將軍竇憲上書請立於除鞬為北單于朝廷從之四年即授璽綬方欲輔歸北庭㑹竇憲被誅五年於除鞬自畔還北帝遣將兵長史王輔誘誅之並恩兩䕶以私已福棄蔑天公言竇憲斬日逐刋石紀功即宜滅其北庭以資南部重存􅏷緒滋生孽烖南北俱存即是並恩兩䕶以私已福乃招其禍斯則棄蔑天公之事也天公謂天子也前書云老秃翁何為首鼠兩端禿翁即天翁也髙祖云幾敗乃公事乃公即汝公也惇史直筆時復存其質言也坐樹大鯁永言前載何恨憤之深乎由竇憲請立北庭遂使匈奴滋蔓即是坐樹大鯁永言前事深可恨哉載事也自後經綸失方畔服不一其為疢毒胡可單言單盡也單與殫同也降及後世翫為常俗終於吞噬神鄉丘墟帝宅嗚呼千里之差興自毫端失得之原百世不磨矣既勒燕然之後若復南虜於漠北引侍子於京師混并匃奴之區使得專為一部則荒服無忿爭之跡邊服息征伐之勤此之不行遂為巨蠧自單于比入居西河美稷之後種類繁昌難以驅逼魏武雖分其衆為五部然大率皆居晉陽暨乎左賢王豹之子劉元海假稱天號縱盗中原吞噬神鄉丘墟帝宅愍懐二帝沈沒虜庭差之毫端一至於此百代無滅誠可痛心也贊曰匈奴既分謂分為南北庭也羽書稀聞檄書有急即挿鳥羽其上也野心難悔終亦紛紜紛紜之事具如上解劉攽曰章懐注書時分與諸臣此卷不知誰值之最為淺陋不與前同亦疑其將終篇故特草草耳後之讀者將以為傳寫之誤聊記之云後漢書卷一百十九考證南匈奴傳以征西大將軍耿秉行度遼將軍事劉攽曰按秉傳真為度遼行當作為何焯曰下文云鄧遵始真為度遼則耿秉耿䕫傳言拜者皆行度遼事行不當作為單于每龍㑹議事何焯曰龍下當有庭字棄蔑天公注天公謂天子也何焯曰李云天公非謂天子猶大公耳困學紀聞云劉貢父東漢刋誤謂列傳第七十九注最淺陋今觀注引前書謂秃翁即天公其謬甚矣後漢書卷一百十九考證}
