  - {type: variant, offset: 1128, length: 0, content: '', WYG: 竇太后臨朝單于屯屠何上言宜及北虜分爭出兵討伐破北成南并為一國令漢家長無北念既威北邊即宜搆成南部更請存立其何惑哉遂}
  - {type: variant, offset: 1128, length: 0, content: '', krp: 竇太后臨朝單于屯屠何上言宜及北虜分爭出兵討伐破北成南并為一國令漢家長無北念既威北邊即宜搆成南部更請存立其何惑哉遂}
