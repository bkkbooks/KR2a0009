  - {type: variant, offset: 845, length: 3, content: 十九口, WYG: 郡以張奐為北中郎將討之單于諸部悉降奐以單于不能統理國事乃拘之上立左谷蠡王張奐上書請立左谷蠡王為單于也桓帝詔曰春秋大居正春秋法五始之要故經曰元年春王正月言王者即位之年宜大開恩宥其居車兒即是桓帝即位之建和元年立自立以來一心向化宜寛宥之居車兒一心向化何罪而黜其遣還單于居車兒立}
