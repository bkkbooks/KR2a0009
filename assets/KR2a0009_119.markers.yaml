  - {type: variant, offset: 700, length: 0, content: '', WYG: 漢遷太僕以烏桓校尉耿曄代為度遼將軍永和元年陽嘉五年改為永和元年曄病徵以䕶羌校尉馬續代為度遼將軍五年夏南匈奴左部句龍王吾斯車紐等背畔率三千餘騎寇西河因復招誘右賢王合七八千騎圍美稷殺朔方代郡長吏馬續與中郎將梁並烏桓校尉王元發縁邊兵及烏桓鮮卑羌胡合二萬餘人掩擊破之吾斯等遂}
  - {type: page-break, offset: 700, content: '', id: KR2a0009_WYG_119-25a, image: WYG0253/WYG0253-0713c.png}
  - {type: variant, offset: 700, length: 0, content: '', krp: 漢遷太僕以烏桓校尉耿曄代為度遼將軍永和元年陽嘉五年改為永和元年曄病徵以䕶羌校尉馬續代為度遼將軍五年夏南匈奴左部句龍王吾斯車紐等背畔率三千餘騎寇西河因復招誘右賢王合七八千騎圍美稷殺朔方代郡長吏馬續與中郎將梁並烏桓校尉王元發縁邊兵及烏桓鮮卑羌胡合二萬餘人掩擊破之吾斯等遂}
  - {type: variant, offset: 701, length: 1, content: 名, WYG: 屯聚攻没城邑天子遣使責讓單于開以恩義令相招降單于本不豫謀乃脱帽避帳詣並謝罪並以病徵五原太守陳龜代為中郎將龜以單于不能制下吾斯等攻沒城邑單于雖不預謀殺然不能制下即是不堪其任逼迫之單于及其弟左賢王皆自殺單于休利立十三年龜又欲徙單于近親於内郡而降者遂更狐疑龜坐下獄死陳龜逼迫單于及弟皆令自殺又欲徙其親近者遂致狐疑此則陳龜之由也大將軍梁商以羌胡新反黨衆初合難以兵服宜用招降乃上表曰匈奴寇畔自知罪極窮烏困獸皆知救死况種類繁熾不可單盡單亦盡也猶書云謨謀孔安國曰謨亦謀也即是古書之重語今轉運日増三軍疲苦虚内給外非中國之利竊見度遼將軍馬續素}
  - {type: page-break, offset: 701, content: '', id: KR2a0009_WYG_119-25b, image: WYG0253/WYG0253-0713d.png}
