  - {type: variant, offset: 850, length: 1, content: 八, WYG: 五年薨子某立凡言某者史失其名故稱某以記之夷狄無字既無典誥故某者即是其名劉攽曰注案此是兩説中間當冇一説二字屠特若尸逐就單于某熹平元年立熹平靈帝之元年六年單于與中郎將臧旻出鴈門擊鮮卑檀石槐大敗而還是嵗單于薨子呼徵立單于呼徵光和元年靈帝熹平七年改為光和元年立二年中郎將張脩與單于不相能脩擅斬之更立右賢王羌渠為單于脩以不先請而擅誅殺檻車徵詣廷尉抵罪前書注曰抵至也殺人者死張脩擅斬單于呼徵故至其罪也單于羌渠光和二年立中平四年靈帝光和七年改為中平前中山太守張純反畔遂率鮮卑寇邊郡靈帝詔發南匈奴兵配幽州牧劉虞討之單于遣左賢王將騎詣幽州國人恐單于發兵無已五年右部䤈落與休著各胡白馬銅等十餘}
