  - {type: variant, offset: 118, length: 0, content: '', WYG: 人馬二萬匹牛羊十餘萬款五原塞降元和元年武威太守孟雲上言北單于復願與吏人合市詔書聽雲遣驛使迎呼慰納之劉攽曰案驛當作譯見上北單于乃遣大且渠伊莫訾王等且音子余反下並同驅牛馬萬餘頭來與漢賈客交易諸王大人或前至劉攽曰案文前當作隨所在郡縣為設官邸賞賜待遇之南單于聞乃遣輕騎出上郡遮略生口鈔掠牛馬驅還入塞二年正月北匈奴大人車利􅃰兵等亡來入塞凡七十三輩時北虜衰耗黨衆離畔南部攻其前丁零寇其後鮮卑擊其左西域侵其右不復自立乃逺引而去單于長立二十三年薨單于汗之子宣立伊屠於閭鞮單于宣元和二年立其嵗單于遣兵千餘人獵至􅃰邪山卒與北虜温禺犢王遇卒音七忽反因戰獲其首級而還冬孟雲上言北虜以前既和親而南部復往鈔掠北單于謂漢欺之謀欲犯塞謂宜還南所掠生口以慰安其意肅宗從太僕袁安議許之乃下詔曰昔玁狁獯粥之敵中國其所由來尚矣周曰玁狁堯曰獯粥秦曰匈奴往者雖有和親之名終無絲髪之效墝埆之人屢嬰塗炭墝埆謂險要之地塗苦也墝音苦交反埆音苦角反父戰於前子死於後弱女乗於亭障孤兒號於道路老母寡妻設虚祭飲泣淚想望歸魂於沙漠之表豈不哀哉父戰於前已下前書賈捐之之辭詔増損用之也傳曰江海所以能長百川者以其下之也老子曰江海所以能為百谷王者以其善下也少加屈下尚何足病况今與匈奴君臣分定辭順約明貢獻累至豈宜違信自受其曲其𠡠度遼及領中郎將龐奮倍雇南部所得生口以還北虜雇賞報也其南部斬首獲生計功受賞如常科於是南單于復令薁鞬日逐王師子將輕騎數千出塞掩擊北虜復斬獲千人北虜衆以南部為漢所厚又聞取降者嵗數千人章和元年鮮卑入左地擊北匈奴大破之斬優留單于取其匈奴皮而還劉攽曰案匈奴一種安能盡取其皮明多匈奴二字或云取其胷皮北庭大亂屈蘭儲卑胡都須等五十八部口二十萬勝兵八千人詣雲中五原朔方北地降單于宣立三年薨單于長之弟屯屠何立休蘭尸逐侯鞮單于屯屠何章和二年立時北虜大亂加以飢蝗降者前後而至南單于將并北庭㑹肅宗崩竇太后臨朝其年七月單于上言臣累世䝉恩不可勝數孝章皇帝聖思逺慮遂欲見成就故令烏桓鮮卑討北虜斬單于首級破壊其國今所新降虚渠等詣臣自言去嵗三月中發虜庭北單于創刈南兵又畏丁令鮮卑令音零遯逃逺去依安侯河西今年正月骨都侯等復共立單于異母兄右賢王為單于其人以兄弟爭立並各離散臣與諸王骨都侯及新降渠帥雜議方略皆曰宜及北虜分爭出兵討伐破北成南并為一國令漢家長無北念又今月八日新降右須日逐鮮堂輕從虜庭逺來詣臣言北虜諸郡多欲内顧但恥自發遣故未有至者若出兵奔擊必有響應今年不往恐復并壹臣伏念先父歸漢以來被䝉覆載嚴塞明候大兵擁䕶積}
