  - {type: variant, offset: 35, length: 0, content: '', WYG: 故於黎陽立營以謁者監領兵騎千人又遣騎都尉秦彭將兵屯美稷其年秋北虜果遣二千騎候望朔方作馬革船欲度迎南部畔者以漢有備乃引去復數寇鈔邊}
