  - {type: variant, offset: 16, length: 6, content: 弘農京兆馮翊, WYG: 州郡不能禁於是漸徙幽并邊人於常山關居庸關已東前書代郡有常山關上谷郡居庸縣有關匈奴左部遂復轉居塞内朝廷患之増縁邊兵郡數千人大築亭候脩烽火匈奴聞漢購求盧芳貪得財帛乃遣芳還降望得其賞而芳以自歸為功不稱匈奴所遣單于復恥言其計故賞遂不行由是大恨入寇尤深二十年遂至上黨}
