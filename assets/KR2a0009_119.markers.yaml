  - {type: punctuation, offset: 1015, content: ), id: KR2a0009_ZHSJ_119-bkkpn596}
  - {type: variant, offset: 1016, length: 1, content: 梁, WYG: 司開北鄙擇肥美之地量水草以處之馳中郎之使盡法度以臨之制衣裳備文物加璽紱之綬正單于之名於是匈奴分破始有南北二庭焉讎釁既深互伺便隙控弦抗戈覘望風塵雲屯烏散更相馳突至於䧟潰創傷者靡嵗或寧而漢之塞地晏然矣由南北二庭自相馳突而漢之塞地晏然無事矣後亦頗為出師并兵窮討命竇憲耿䕫之徒前後並進皆用果譎設竒數異道同㑹究掩其窟穴躡北追奔軍走日北也三千餘里北虜烏孫遂奔漠北乃空其地三千餘里也遂破龍祠焚􅄢幕阬十角梏閼氏械在手曰梏音古督反銘功封石倡呼而還為勒石立銘於燕然}
