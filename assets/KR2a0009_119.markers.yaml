  - {type: variant, offset: 123, length: 1, content: 口, WYG: 年北單于遣使詣闕貢獻願和親脩呼韓邪故約和帝以其舊禮不備未許之而厚加賞賜不答其使元興元年重遣使詣敦煌貢獻辭以國貧未能備禮願請大使當遣子入侍天子降大使至國即遣子隨大使入侍時鄧太后臨朝亦不答其使但加賜而已永初三年安帝即位之二年也夏漢人韓琮隨南單于入朝既還説南單于云關東水潦人民飢餓死盡可擊也單于信其言遂起兵反畔攻中郎將耿种於美稷秋王彪卒冬遣行車騎將軍何熙副中郎龎雄擊之劉攽曰案文少一將字四年春檀遣千餘騎寇常山中山以西域校尉梁慬行度遼將軍慬音勤與遼東太守耿䕫擊破之事已具慬䕫傳單于見諸軍並進大恐怖顧讓韓琮曰汝言漢人死盡今是何等人也顧反也讓責也反顧責韓琮也乃遣使乞降許之單于脱帽徒跣對龎雄等拜陳道死罪於是赦之遇待如初乃還所鈔漢民男女及羌所略轉賣入匈奴中者合萬餘人南單于檀信韓琮之言起兵反既被擊敗陳謝死罪還所鈔之男女五年梁慬免以雲中太守耿䕫行度遼將軍元初元年安帝永初六年改為元初元年夔免以烏桓校尉鄧遵為度遼將軍遵皇太后之從弟故始為真將軍焉自置度遼將軍以來皆權行其事今始以鄧遵為正度遼將軍此後更無行者也四年逢侯為鮮卑所破部衆分散皆歸北虜五年春逢侯將}
