  - {type: variant, offset: 703, length: 1, content: 霍, WYG: 謀謨且典邊日久深曉兵要每得續書與臣䇿合宜令續深溝髙壁以恩信招降宣示購賞明其期約如此則醜類可服醜等也國家無事矣帝從之乃詔續招降畔虜商又移書續等曰中國安寧忘戰日久良騎野合交鋒接矢决勝當時戎狄之所長而中國之所短也强弩乘城堅營固守以待其衰中國之所長而戎狄之所短也若夫平原易地輕車突騎則匈奴之衆易撓亂也勁弩長㦸射踈及逺則匈奴之弓不能格也堅甲利刄長短相雜㳺弩往來什伍俱前則匈奴之兵不能當也材官騶發矢道同的則匈奴之革笥木薦不能支也下馬歩鬬劎㦸相接去就相薄則匈奴之足不能給也此中國之長技也以此觀之匈奴之長技三中國之長技五並具鼂錯三章之兵體因梁商論其長短故備録之此乃兵家之要宜務先所長以觀其變設購開賞宣示反悔勿貪小功以亂}
