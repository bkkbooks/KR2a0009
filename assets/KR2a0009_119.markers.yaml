  - {type: variant, offset: 119, length: 0, content: '', WYG: 十年臣等生長漢地開口仰食嵗時賞賜動輒億萬雖垂拱安枕慙無報效之地願發國中及諸部故胡新降精兵遣左谷蠡王師子左呼衍日逐王須訾將萬騎出朔方左賢王安國右大且渠王交勒蘇將萬騎出居延期十二月同㑹虜地臣將餘兵萬人屯五原朔方塞以為拒守臣素愚淺又兵衆單少不足以防内外願遣執金吾耿秉度遼將軍鄧鴻及西河雲中五原朔方上郡太守并力而北令北地安定太守各屯要害冀因聖帝威神一舉平定臣國成敗要在今年已𠡠諸部嚴兵馬訖九月龍祠悉集河上唯陛下裁哀省察太后以示耿秉秉上言昔武帝單極天下欲臣虜匈奴未遇天時事遂無成宣帝之世㑹呼韓來降故邊人獲安中外為一生人休息六十餘年及王莽簒位變更其號漢陽單于印文曰匈奴單于璽無漢字王莽改曰新匈奴單于章耗擾不止單于乃畔光武受命復懐納之縁邊壊郡得以還復烏桓鮮卑咸脇歸義威鎮四夷其效如此今幸遭天授北虜分爭以夷伐夷國家之利宜可聽許秉因自陳受恩分當出命效用太后從之永元元年以秉為征西將軍與車騎將軍竇憲率騎八千與度遼兵及南單于衆三萬騎出朔方擊北虜大破之北單于奔走首虜二十餘萬人劉攽曰案文多一人字事已具竇憲傳二年春鄧鴻遷大鴻臚以定襄太守皇甫稜行度遼將軍南單于復上求滅北庭於是遣左谷蠡王師子等將左右部八千騎出雞鹿塞塞在朔方郡窳渾縣北窳音愈中郎將耿譚遣從事將䕶之至􅃰邪山乃留輜重分為二部各引輕兵兩道襲之左部北過西海至河雲北河雲匈奴地名右部從匈奴河水劉攽曰案匈河自是水名妄出奴字西繞天山南度甘微河二軍俱㑹夜圍北單于大驚劉攽曰案文少單于二字率精兵千餘人合戰單于被創墯馬復上將輕騎數十遁走僅而免脱得其玉璽獲閼氏及男女五人斬首八千級生虜數千口而還是時南部連剋獲納降黨衆最盛領戸三萬四千口二十三萬七千三}
