  - {type: variant, offset: 121, length: 0, content: '', WYG: 千騎要擊逢侯於滿夷谷復大破之前後凡斬萬七千餘級逢侯遂率衆出塞漢兵不能追七年正月軍還馮柱將虎牙營留屯五原罷遣鮮卑烏桓羌胡兵封蘇拔廆為率衆王又賜金帛鄧鴻還京師坐逗遛失利下獄死按軍法逗遛畏懦者斬後帝知朱徽杜崇失胡和又禁其上書以致反畔皆徵下獄死以鴈門太守龐奮行度遼將軍逢侯於塞外分為二部自領右部屯􅃰邪山下左部屯朔方西北相去數百里八年冬左部胡自相疑畔還入朔方塞龎奮迎受慰納之其勝兵四千人弱小萬餘口悉降以分處北邊諸部南單于以其右温禺犢王烏居戰温禺犢王名烏居戰始與安國同謀欲考問之烏居戰將數千人遂復反畔出塞外山谷間為吏民害秋龎奮馮柱與諸郡兵擊烏居戰其衆降於是徙烏居戰衆及諸還降者二萬餘人於安定北地馮柱還遷將作大匠逢侯部衆飢窮又為鮮卑所擊無所歸竄逃去塞者駱驛不絶單于師子立四年薨單于長之子檀立萬氏尸逐鞮單于檀永元十年立十二年龎奮遷河南尹以朔方太守王彪行度遼將軍南單于比嵗遣兵擊逢侯多所虜獲收還生口前後以千數逢侯轉困迫}
