  - {type: variant, offset: 28, length: 0, content: '', WYG: 合市重遣名王多所貢獻斯皆外示富强以相欺誕也臣見其獻益重知其國益虚歸親愈數為懼愈多然今既未獲助南則亦不宜絶北羈縻之義禮無不答謂可頗加賞賜略與所獻相當明加曉告以前世呼韓邪郅支行事呼韓單于稱臣受賞郅支單于背徳受誅以此二者行事曉告之也郅支即呼韓兄名呼屠吾斯自立為單于擊走呼韓邪單于者也報答之辭令必有適適猶所也言報答之辭必令得所也今立槀草并上曰單于不㤀漢恩追念先祖舊約欲脩和親以輔身安國計議甚髙為單于嘉之往者匈奴數有乖亂呼韓邪郅支自相讎隙並䝉孝宣皇帝垂恩救䕶故各遣侍子稱藩保塞其後郅支忿戾自絶皇澤而呼韓附親忠孝彌著及漢滅郅支元帝時郅支坐殺使者谷吉都䕶甘延夀與副陳湯發西域兵誅斬之遂保國傳嗣子孫相繼今南單于􅂝衆向南欵塞歸命自以呼韓嫡長次第當立而侵奪失職猜疑相背數請兵將歸埽北庭䇿謀紛紜無所不至惟念斯言不可獨聽又以北單于比年貢獻欲脩和親故拒而未許將以成單于忠孝之義漢秉威信總率萬國日月所照皆為臣妾殊俗百蠻義無親疎服順者襃賞畔逆者誅罰善惡之效呼韓郅支是也今單于欲脩和親欵誠已逹何嫌而欲率西域諸國俱來獻見西域國屬匈奴與屬漢何異單于數連兵亂國内虚耗貢物裁以通禮何必獻馬裘今齎雜繒五百匹弓鞬韥丸一矢四發遣遺單于鞬音居言反方言云藏弓為鞬藏箭為韥丸即箭箙也發四矢曰發見儀禮也劉攽曰正文矢四發遣遺單于案文多一遣字縁上文已有齎字也又賜獻馬左骨都侯右谷蠡王雜繒各四百匹斬馬劒各一尚方少府屬官作供御器物故有斬馬劎言劒利可以斬馬單于前言先帝時所賜呼韓邪竽瑟空侯皆敗願復裁賜言更請裁賜也念單于國尚未安方厲武節以戰攻為務竽瑟之用不如良弓利劒故未以齎言不齎持往遺也朕不愛小物於單于便宜所欲遣譯以聞帝悉納從之二十九年賜南單于羊數萬頭三十一年北匈奴復遣使如前乃璽}
