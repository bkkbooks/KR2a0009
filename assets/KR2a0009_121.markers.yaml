markers:
  front:
  - {type: variant, offset: 0, length: 0, content: '', WYG: 自序宋宣城太守范曄吾少嬾學問晩成人年三十許政始有向耳自爾以來轉為心化推老將至者亦當未已也往往有微解言乃不能自盡為性不尋注書心氣惡小苦思便憤悶口機又不調利以此無談功至於所通解處皆自得之於胷懐耳文章轉進但才少思難所以毎於操筆其所成篇殆無全稱者常耻作文士文患其事盡於形情急於藻義牽其旨韻移其意雖時有能者大較多不免此累政可類工巧圖繢竟無得也常謂情志所託故當以意為主以文傳意以意為主則其旨必見以文傳意則其詞不流然後抽其芬芳振其金石耳此中情性旨趣千條百品屈曲有成理自謂頗識其數嘗為人言多不能賞意或異故也性别宫商識清濁斯自然也觀古今文人多不全了此處縱有㑹此者不必從根本中來言之皆有實證非為空談年少中謝荘最有其分手筆差易文不拘韻故也吾思乃無定方特能濟難適輕重所禀之分猶當未盡但多公家之言少於事外逺致以此為恨亦由無意於文名故也本未關史書政恒覺其不可解耳既造}
