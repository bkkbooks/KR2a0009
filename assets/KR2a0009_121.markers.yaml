  - {type: page-break, offset: 0, content: '', id: KR2a0009_ZHSJ_121-3447a}
  - {type: line-break, offset: 0, content: '', id: ZHSJ__dup24140}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 轉得統緒詳觀古今著述及評論殆少可意者班氏最有髙名既任情無例不可甲乙辨後賛於理近無所得唯志可推耳博贍不可及之整理未必愧也吾雜傳論皆有精意深旨既有裁味故約其詞句至於循吏以下及六夷諸序論筆勢縱放實天下之竒作其中合者往往不減過秦篇嘗共比方班氏所作非但不愧之而已欲徧作諸志前漢所有者悉令備雖事不必多且使見文得盡又欲因事就卷内發論以正一代得失意復未果賛自是吾文之傑思殆無一字空設竒變不窮同含異體乃自不知所以稱之此}
