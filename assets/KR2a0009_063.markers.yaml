  - {type: variant, offset: 5012, length: 174, content: 不欲令久典禁兵復出為潁川太守未及至郡徵還京師時河南尹朱儁為卓陳軍事卓折儁曰我百戰百勝決之於心卿勿妄說且汙我刀勳曰昔武丁之明猶求箴諫況如卿者而欲杜人之口乎卓曰戲之耳勳曰不聞怒言可以為戲卓乃謝儁勳雖強直不屈而內厭於卓不得意疽發背卒時年五十一遺令勿受卓賻贈卓欲外示寬容表賜東園祕器賵襚送之如禮葬于安陵子順官至永陽太守臧洪字子源廣陵射陽人也父旻有幹事才熹平, WYG: 注章和}
