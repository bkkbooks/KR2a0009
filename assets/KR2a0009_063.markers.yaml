  - {type: variant, offset: 5657, length: 891, content: 軍各懷疑莫適先進遂使糧儲單竭兵衆乖散時討虜校尉公孫瓚與大司馬劉虞有𨻶超乃遣洪詣虞共謀其難行至河閒而值幽冀交兵行塗阻絕因寓於袁紹紹見洪甚奇之與結友好以洪領青州刺史前刺史焦和好立虛譽能清談時黃巾羣盜處處飈起而青部殷實軍革尚衆和欲與諸同盟西赴京師未及得行而賊已屠城邑和不理戎警但坐列巫史禜禱羣神又恐賊乘凍而過命多作陷冰丸以投于河衆遂潰散和亦病卒洪收撫離叛百姓復安在事二年袁紹憚其能徙為東郡太守都東武陽時曹操圍張超於雍丘甚危急超謂軍吏曰今日之事唯有臧洪必來救我或曰袁曹方穆而洪為紹所用恐不能敗好遠來違福取禍超曰子源天下義士終非背本者也或見制強力不相及耳洪始聞超圍及徒跣號泣並勒所領將赴其難自以衆弱從紹請兵而紹竟不聽之超城遂陷張氏族滅洪由是怨紹絕不與通紹興兵圍之歷年不下使洪邑人陳琳以書譬洪示其禍福責以恩義洪荅曰遺比辱雅況述禍福公私切至以子之才窮該典籍豈將闇於大道不達余趣哉是以損𠫓廾翰墨一無所酬亦冀遙忖褊心粗識鄙性重獲來命援引紛紜雖欲無對而義篤其言還接刃乎每登城臨兵觀主人之旗鼓瞻望帳幄感故友之周旋撫弦搦矢不覺涕流之覆面也何者自以輔佐主人無以為悔主人相接過絕等倫受任之初志同大事埽清寇逆共尊王室豈悟本州被侵郡將遘戹請師見拒辭行被拘使洪故君遂至淪滅區區微節無所獲申豈得復全交友之道重虧忠孝之名乎所以忍悲揮戈收淚告絕若使主人少垂古人忠恕之情來者側席去者克己則僕抗季札之志不為今日之戰矣獲傳之故不蒙觀過之貸而受夷滅之禍呂奉先討卓來奔請兵不獲告去何罪復見斫刺劉子璜奉使踰時辭不獲命畏君懷親以詐求歸可謂有志忠孝無損霸道亦復僵尸麾下不蒙虧除慕進者蒙榮違意者被戮此乃主人之利非遊士之願也是以鑒戒前人守死窮城亦以君子之違不適敵國故也義而傾覆也昔晏嬰不降志於白刃南史不曲筆以求存故身傳圖象名垂後世況僕據金城之固驅士人之力散三年之畜以為一年之資匡困補乏以悅天下何圖築室反耕哉但懼秋風揚塵伯珪馬首南向張揚飛燕旅力作難北鄙將告倒懸之急股肱奏乞歸之記耳主人當鑒戒曹輩反旌退師何宜久辱盛怒暴威於吾城之下哉創基兆於綠林卒能龍飛受命中興帝業苟可輔主興化夫何嫌哉況僕親奉璽書與之從事於長安子謂余身死而名滅僕亦笑子生死而無聞焉, WYG: ''}
