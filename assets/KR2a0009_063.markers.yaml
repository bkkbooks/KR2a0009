  - {type: variant, offset: 3451, length: 267, content: 者先殺程球次害鄙賊遂進圍漢陽城中兵少粮盡燮猶固守時北地胡騎數千隨賊攻郡皆夙懷燮恩共於城外叩頭求送燮歸鄉里子幹年十三從在官舍知燮性剛有高義恐不能屈志以免進諫曰國家昏亂遂令大人不容於朝今天下已叛而兵不足自守鄉里羌胡先被恩德欲令𠫓廾郡而歸願必許之徐至鄉里率厲義徒見有道而輔之以濟天下言未終燮慨然而歎呼幹小字曰別成汝知吾必死邪蓋聖達節次守節且殷紂之暴伯夷不食周粟而死仲尼稱其賢今朝廷不甚殷紂吾德亦豈絕伯夷世亂不能養浩然之志食祿又欲避其難乎吾行何之必死於此汝有才智勉之勉之主簿楊會吾之程嬰也幹哽咽不能復言左右皆泣下王國使故酒泉太守黃衍說燮曰成敗, WYG: 常}
