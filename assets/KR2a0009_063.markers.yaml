  - {type: variant, offset: 2550, length: 172, content: 仁德寬容多所不忍故閹豎弄權忠臣不進誠使張角梟夷黃巾變服臣之所憂甫益深耳何者夫邪正之人不宜共國亦猶冰炭不可同器彼知正人之功顯而危亡之兆見皆將巧辭飾說共長虛偽夫孝子疑於屢至巿虎成於三夫若不詳察真偽忠臣將復有杜郵之戮矣陛下宜思虞舜四罪之舉速行讒佞放殛之誅則善人思進姦凶自息臣聞忠臣之事君猶孝子之事父也子之事父焉得不盡其情使臣身備鈇鉞之戮陛下少用其言國, WYG: ''}
