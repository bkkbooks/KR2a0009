  - {type: variant, offset: 2831, length: 0, content: '', WYG: 限滿補縣長令史丞尉𢎞奏以為臺職雖尊而酬賞甚薄至於開選多無樂者樂音五孝反請使郎補千石令史為長劉攽曰案文少一令字但云千石不知何官但云史不合上文帝從其議𢎞前後所陳有補益王政者皆著之南宫以為故事出為平原相徵拜侍中建初八年代鄭衆為大司農舊交阯七郡貢獻運轉皆從東冶東冶縣屬㑹稽郡太康地理志云漢武帝名為東冶後改為東侯官今泉州閩縣是汎海而至風波艱阻沉溺相係𢎞奏開零陵桂陽嶠道於是夷通嶠嶺也夷平也至今遂為常路今謂范曄時也在職二年所息省三億萬計時歲天下遭旱邊方有警人食不足而帑藏殷積說文曰帑金布所藏之府𢎞又奏宜省貢獻減徭費以利飢人帝順其議元和元年代鄧彪為太尉時舉將第五倫為司空班次在下每正朔朝見𢎞曲躬而自卑帝問知其故遂聽置雲母屏風分隔其間以雲母飾屏風也由此以為故事在位四年奏尚書張林阿附侍中竇憲而素行臧穢又上洛陽令}
