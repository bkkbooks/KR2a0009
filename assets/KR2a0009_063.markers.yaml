  - {type: variant, offset: 1327, length: 178, content: 綏聚荒餘招還流散二三年閒遂增至四萬餘戶鹽米豐賤十倍於前坐法免永建元年代陳禪為司隸校尉數月閒奏太傅馮石太尉劉熹中常侍程璜陳秉孟生李閏等百官側目號為苛刻三公劾奏詡盛夏多拘繫無辜為吏人患詡上書自訟曰法禁者俗之堤防刑罰者人之銜轡今州曰任郡郡曰任縣更相委遠百姓怨窮以苟容為賢盡節為愚臣所發舉臧罪非一二府恐為臣所奏遂加誣罪臣將從史魚死即以尸諫耳順帝省其章乃為免司空陶敦, WYG: 王莽}
