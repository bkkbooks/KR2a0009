  - {type: variant, offset: 2435, length: 0, content: '', WYG: 日者衆陽之所宗君上之位也凡居官治民據郡典縣皆為陽為上為尊為長若陽上不明尊長不足則干動三光垂示王者干犯也三光日月星也五典紀國家之政禮記曰温柔敦厚詩敎也疏通知逺書敎也潔静精微易敎也恭儉莊敬禮敎也屬辭比事春秋敎也鴻範别災異之文鴻範尚書篇名箕子為武王陳政道陰陽之法災異即咎徵之類也皆宣明天道以徵來事者也徵驗也陛下哀愍海内新離禍毒保宥生人宥寛也使得蘇息而今牧人之吏多未稱職小違理實輒見斥罷豈不粲然黑白分明哉淮南子曰聖人見是非若黑白之别於目清濁之形於耳也然以堯舜之盛猶加三考考謂考其功最也尚書舜典曰三載考績三考黜陟幽明也大漢之興亦累功效吏皆積久養老於官至名子孫因為氏姓前書武帝時漢有}
