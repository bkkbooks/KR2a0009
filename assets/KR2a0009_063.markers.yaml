  - {type: variant, offset: 3720, length: 508, content: 已可知矣先起上有霸王之業下成伊呂之勳天下非復漢有府君寧有意為吾屬師乎燮案劒叱衍曰若剖符之臣反為賊說邪遂麾左右進兵臨陣戰歿謚曰壯節侯幹知名位至扶風太守蓋勳字元固敦煌廣至人也家世二千石初舉孝廉為漢陽長史時武威太守倚恃權埶恣行貪橫從事武都蘇正和案致其罪涼州刺史梁鵠畏懼貴戚欲殺正和以免其負乃訪之於勳勳素與正和有仇或勸勳可因此報𨻶勳曰不可謀事殺良非忠也乘人之危非仁也乃諫鵠曰夫紲食鷹鳶欲其鷙鷙而亨之將何用哉鵠從其言正和喜於得免而詣勳求謝勳不見曰吾為梁使君謀不為蘇正和也怨之如初中平元年北地羌胡與邊章等寇亂隴右刺史左昌因軍興斷盜數千萬勳固諫昌怒乃使勳別屯阿陽以拒賊鋒欲因軍事罪之而勳數有戰功邊章等遂攻金城殺郡守陳懿勳勸昌救之不從邊章等進圍昌於冀昌懼而召勳勳初與從事辛曾孔常俱屯阿陽及昌檄到曾等疑不肯赴勳怒曰昔莊賈後期穰苴奮劒今之從事豈重於古之監軍哉曾等懼而從之勳即率兵救昌到乃誚讓章等責以背叛之罪皆曰左使君若早從君言以兵臨我庶可自改今罪已重不得降也乃解圍而去昌坐斷盜徵以扶風宋梟代之梟患多寇叛謂勳曰涼州寡於學術故屢致反暴今欲多寫孝經令家家習之庶或使人知義勳諫曰昔太公封齊崔杼殺君伯禽侯魯慶父篡位此二國豈乏學者今不急靜難之術遽為, WYG: 必資}
