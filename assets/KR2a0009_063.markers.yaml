  - {type: variant, offset: 3077, length: 235, content: 傅南容前在東軍有功不侯故天下失望今將軍親當重任宜進賢理屈以副衆心忠納其言遣弟城門校尉延致殷勤延謂燮曰南容少荅我常侍萬戶侯不足得也燮正色拒之曰遇與不遇命也有功不論時也傅燮豈求私賞哉忠愈懷恨然憚其名不敢害權貴亦多疾之是以不得留出為漢陽太守初郡將范津明知人舉燮孝廉及津為漢陽與燮交代合符而去鄉邦榮之津字文淵南陽人燮善卹人叛羌懷其恩化並來降附乃廣開屯田列置四十餘營時刺史耿鄙委任治中程球球為通姦利士人怨之中平四年鄙率六郡兵討金城賊王國韓遂等燮知鄙失衆必敗諫曰使君統政日淺人未知教, WYG: ''}
