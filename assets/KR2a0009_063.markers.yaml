  - {type: variant, offset: 251, length: 114, content: 愚心未見其便先帝開拓土字劬勞後定而今憚小費舉而𠫓廾之涼州既𠫓廾即以三輔為塞三輔為塞則園陵單外此不可之甚者也喭曰關西出將關東出相觀其習兵壯勇實過餘州今羌胡所以不敢入據三輔為心腹之害者以涼州在後故也其土人所以推鋒執銳無反顧之心者為臣, WYG: ''}
