  - {type: variant, offset: 1506, length: 396, content: 中常侍張防特用權埶每請託受取詡輒案之而屢寑不報詡不勝其憤乃自繫廷尉奏言曰昔孝安皇帝任用樊豐遂交亂嫡統幾亡社稷今者張防復弄威柄國家之禍將重至矣臣不忍與防同朝謹自繫以聞無令臣襲楊震之跡書奏防流涕訴帝詡坐論輸左校防必欲害之二日之中傳考四獄獄吏勸詡自引詡曰寧伏歐刀以示遠近宦者孫程張賢等知詡以忠獲罪乃相率奏乞見程曰陛下始與臣等造事之時常疾姦臣知其傾國今者即位而復自為何以非先帝乎司隸校尉虞詡為陛下盡忠而更被拘繫常侍張防臧罪明正反搆忠良今客星守羽林其占宮中有姦臣宜急收防送獄以塞天變下詔出詡還假印綬時防立在帝後程乃叱防曰姦臣張防何不下殿防不得已趨就東箱程曰陛下急收防無令從阿母求請帝問諸尚書尚書賈朗素與防善證詡之罪帝疑焉謂程曰且出吾方思之於是詡子顗與門生百餘人舉幡候中常侍高梵車叩頭流血訴言枉狀梵乃入言之防坐徙邊賈朗等六人或死或黜即日赦出詡程復上書陳詡有大功語甚切激帝感悟復徵拜議郎數日遷尚書僕射是時長, WYG: 故}
