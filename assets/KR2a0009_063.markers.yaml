  - {type: variant, offset: 5281, length: 290, content: 父功拜童子郎知名太學洪體貌魁梧有異姿舉孝廉補即丘長中平末𠫓廾官還家太守張超請為功曹時董卓殺弒帝圖危社稷洪說超曰明府歷世受恩兄弟並據大郡今王室將危賊臣虎視此誠義士効命之秋也今郡境尚全吏人殷富若動桴鼓可得二萬人以此誅除國賊為天下唱義不亦宜乎超然其言與洪西至陳留見兄邈計事邈先謂超曰聞弟為郡委攻臧洪洪者何如人超曰臧洪海內奇士才略智數不比於超矣邈即引洪與語大異之乃使詣兗州刺史劉岱豫州刺史孔伷遂皆相善邈既先有謀約會超至定議乃與諸牧守大會酸棗設壇場將盟既而更相辭讓莫敢先登咸共推洪洪乃攝衣升壇操血而盟曰漢室不幸皇綱失統賊臣董卓乘釁縱害禍加至尊毒流百姓大懼淪喪社稷翦覆四海兗州刺史岱豫州刺史伷, WYG: ''}
