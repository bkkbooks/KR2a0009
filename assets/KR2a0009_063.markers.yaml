  - {type: variant, offset: 366, length: 741, content: 於漢故也若𠫓廾其境域徙其人庶安土重遷必生異志如使豪雄相聚席卷而東雖賁育為卒太公為將猶恐不足當禦議者喻以補衣猶有所完詡恐其疽食侵淫而無限極𠫓廾之非計脩曰吾意不及此微子之言幾敗國事然則計當安出詡曰今涼土擾動人情不安竊憂卒然有非常之變誠宜令四府九卿各辟彼州數人其牧守令長子弟皆除為官外以勸厲荅其功勤內以拘致防其邪計脩善其言更集四府皆從詡議於是辟西州豪桀為掾屬拜牧守長吏子弟為郎以安慰之鄧騭兄弟以詡異其議因此不平欲以吏法中傷詡後朝歌賊甯季等數千人攻殺長吏屯聚連年州郡不能禁乃以詡為朝歌長故舊皆弔詡曰得朝歌何衰詡笑曰志不求易事不避難臣之職也不遇槃根錯節何以別利器乎始到謁河內大守馬棱棱勉之曰君儒者當謀謨廟堂反在朝歌邪詡曰初除之日士大夫皆見弔勉以詡譸之知其無能為也朝歌者韓魏之郊背太行臨黃河去敖倉百里而青冀之人流亡萬數賊不知開倉招衆劫庫兵守城臯斷天下右臂此不足憂也今其衆新盛難與爭鋒兵不猒權願寬假轡策勿令有所拘閡而已及到官設令三科以募求壯士自掾史以下各舉所知其攻劫者為上傷人偷盜者次之帶喪服而不事家業為下收得百餘人詡為饗會悉貰其罪使入賊中誘令劫掠乃伏兵以待之遂殺賊數百人又潛遣貧人能縫者傭作賊衣以采綖縫其裾為幟有出巿里者吏輒禽之賊由是駭散咸稱神明遷懷令後羌寇武都鄧太后以詡有將帥之略遷武都太守引見嘉德殿厚加賞賜羌乃率衆數千遮詡於陳食崤谷詡即停軍不進而宣言上書請兵須到當發羌聞之乃分鈔傍縣詡因其兵散日夜進道兼行百餘里令吏士各作兩竈日增倍之羌不敢逼或問曰孫臏減竈而君增之兵法日行不過三十里以戒不虞而今日且二百里何也詡曰虜衆多吾兵少徐行則易為所及速進則彼所不測虜見吾竈日增必謂郡兵來迎衆多行速必憚追我孫臏見弱吾今示彊埶有不同故也既到郡兵不滿三千而羌衆萬餘攻圍赤亭數十日詡乃令軍中使彊弩勿發而潛發小弩羌, WYG: ''}
