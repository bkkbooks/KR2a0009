  - {type: variant, offset: 2725, length: 0, content: '', WYG: 天下非一時之用也海内非一旦之功也願陛下遊意於經年之外望化於一世之後孔子曰如有王者必世而後仁見論語天下幸甚帝下其議羣臣多同於浮自是牧守易代頗簡舊制州牧奏二千石長吏不任位者事皆先下三公三公遣掾史案驗然後黜退帝時用明察不復委任三府而權歸刺舉之吏刺舉即州牧也浮復上疏曰陛下清明履約率禮無違自宗室諸王外家后親皆奉遵繩墨無黨埶之名至或乗牛車齊於編人斯固法令整齊下無作威者也求之於事宜以和平而災異猶見者而豈徒然天道信誠不可不察竊見陛下疾往者上威不行下専國命即位以来不用舊典信刺舉之官黜鼎輔之任至於有所劾奏便加退免覆案不關三府罪譴不蒙澄察陛下以使者為腹心而使者以從事為耳目是為尚}
  - {type: page-break, offset: 2725, content: '', id: KR2a0009_WYG_063-7a, image: WYG0252/WYG0252-0758c.png}
