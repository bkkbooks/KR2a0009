  - {type: variant, offset: 2726, length: 0, content: '', WYG: 之平决於百石之吏使者刺史也續漢志曰每州有從事秩百石耳目謂令采察也平謂平决也故羣下苛刻各自為能兼以私情容長憎愛在職皆競張空虚以要時利故有罪者心不厭服無咎者坐被空文不可經盛衰貽後王也貽遺也夫事積久則吏自重重猶愛惜也吏安則人自靜傳曰五年再閏天道乃備周天三百六十五度四分度之一日行一度一年十二月除小月六日即一歳三百五十四日是為每歲日行天餘一十一度四分度之一不匝一年餘十一日四分日之一故三年即餘三十三日四分日之三閏月又小是五年即得再閏夫以天地之靈猶五載以成其化况人道哉臣浮愚戇不勝惓惓願陛下留心千里之任省察偏言之}
  - {type: page-break, offset: 2726, content: '', id: KR2a0009_WYG_063-8a, image: WYG0252/WYG0252-0759a.png}
