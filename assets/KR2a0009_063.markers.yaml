  - {type: variant, offset: 2727, length: 0, content: '', WYG: 七年轉太僕浮又以國學既興宜廣博士之選乃上書曰夫太學者禮義之宫敎化所由興也陛下尊敬先聖垂意古典宫室未飾干戈未休而先建太學造立横舍横學也或作黌義亦同比日車駕親臨觀饗將以𢎞時雍之化顯勉進之功也雍和也書曰黎民於變時雍乃勉勸也尋博士之官為天下宗師使孔聖之言傳而不絶舊事䇿試博士必廣求詳選爰自畿夏延及四方是以博舉明經唯賢是登畿王畿夏華夏也漢官儀曰博士秦官也武帝初置五經博士後增至十四人太常差選有聰明威重一人為祭酒總領綱紀其舉狀曰生事愛敬喪没如禮通易尚書孝經論語兼綜載籍窮微闡奥隐居樂道不求聞逹身無金痍痼疾世六屬不與妖惡交通王侯賞賜行應四科經任博士下言某官某甲保舉學者精勵逺近同慕伏聞詔書更試五人唯取見在洛陽城者臣恐自今以往將有所失求之宻邇容或未盡而四方之學無所勸樂凡䇿試之本貴得其眞非有期㑹不及逺方也又諸所徵試皆私自發遣非有傷費煩擾於事也語曰中國失禮求之於野劉歆移書太常曰夫禮失求之於野古文不猶愈於野乎臣浮幸得與講圖䜟與音預故敢越職帝然之二十年代竇融為大司空二十二年坐賣弄國恩免二十五年徙封新息侯帝以浮陵轢同列每衘之陵轢猶欺蔑也惜其功能不忍加罪永平中有人單辭告浮事者單辭謂無正據也書曰明清于單辭顯宗大怒賜浮死長水校尉樊儵言於帝曰唐堯大聖兆人獲所獲得也尚優游四凶之獄厭服海内之心優遊謂優柔也四凶者鯀共工驩兠三苖左傳曰舜流四凶族今云堯者舜為堯臣而流之也書曰四罪而天下咸服使天下咸知然後殛罰殛誅也音紀力反浮事雖昭明而未逹人聽宜下廷尉章著其事帝亦悔之論曰吳起與田文論功文不及者三朱買臣難公孫𢎞十䇿𢎞不得其一終之田文相魏公孫宰漢誠知宰相自有體也史記魏置相田文吳起不悅謂田文曰請與子論功可乎田文曰可起曰將三軍使士卒樂死敵國不敢謀子孰與起田文曰不如子起曰理百官親萬人實府庫子孰與起田文曰不如子吳起曰守西河秦人不敢東向韓趙賔從子孰與起田文曰不如子吳起曰此三者子皆出吾下而位加吾上何也田文曰主少國疑大臣未附百姓不信方是時屬之於子乎屬之於我乎呉起默然良久曰屬之於子矣田文曰此乃吾所以居子上也吳起方乃自知不如武帝時方築朔方公孫𢎞諫以為罷弊中國上使朱買臣難𢎞發十䇿𢎞不得一故曾子曰君子所貴乎道者三三謂動容貌正顔色出辭氣事見論語籩豆之事則有司存籩豆禮器也小細之務有司所主非人君之事也而光武明帝躬好吏事亦以課覈三公課其殿最竅其得失其人或失而其禮稍薄至有誅斥詰辱之累任職責過一至於此追感賈生之論不亦篤乎賈誼曰亷耻禮節以繩君子故有賜死而無戮辱是以黥劓之罪不及大夫以其離主上不逺也是時人告周勃謀反繫長安卒無事故誼以此譏上也朱浮議諷苛察欲速之弊然矣論語孔子曰無欲速無見小利欲速則不逹見小利則大事不成以光武帝明察煩刻故引之焉得長者之言哉前書龔遂為渤海郡太守王生謂遂曰君即見上問君何以化渤海宜曰聖主之德非小臣之力也既至前上果問遂對如王生言天子悦曰君安得長者之言而稱也馮魴傳馮魴字孝孫南陽湖陽人也其先魏之支别食菜馮城因以氏焉東觀記曰其先魏之别封曰華侯華侯孫長卿食菜馮城因以氏焉魴父名揚也劉攽曰食菜馮氏案菜當為采音乃為菜耳秦滅魏遷于湖陽為郡族姓王莽末四方潰畔魴乃聚賔客招豪傑作營壍以待所歸待眞主也是時湖陽大姓虞都尉反城稱兵先與同縣申屠季有仇而殺其兄謀滅季族季亡歸魴魴將季欲還其營道逄都尉從弟長卿來欲執季魴叱長卿曰我與季雖無素故士窮相歸要當以死任之卿為何言遂與俱歸季謝曰蒙恩得全死無以為報恩有牛馬財物願悉獻之魴作色曰吾老親弱弟皆在賊中今日相與尚無所顧何云財物乎季慙不敢復言魴自是為縣邑所敬信故能據營自固時天下未定而四方之士擁兵矯稱者甚衆唯魴自守兼有方略光武聞而嘉之建武三年徵詣行在所見於雲臺即南宫雲臺也拜虞令虞縣屬梁國本虞國舜後所封之邑今宋州虞城縣也為政敢殺伐以威信稱遷郟令後車駕西征隗囂潁川盗賊羣起郟賊延襃等衆三千餘人攻圍縣舍魴率吏士七十許人力戰連日弩矢盡城陷魴乃遁去帝聞郡國反即馳赴潁川魴詣行在所帝案行闘處知魴力戰乃嘉之曰此健令也所當討擊勿拘州郡襃等聞帝至皆自鬄剔剔音他狄反聲類曰亦鬄字音他計反謂剃去髮也負鈇鑕說文曰鈇剉刃也鑕椹也音質將其衆請罪帝且赦之使魴轉降諸聚落縣中平定詔乃悉以襃等還魴誅之魴責讓以行軍法皆叩頭曰今日受誅死無所恨魴曰汝知悔過伏罪今一切相赦聽各反農桑為令作耳目皆稱萬歲是時每有盗賊並為襃等所發無敢動者縣界清浄十三年遷魏郡太守二十七年以髙第入代趙熹為太僕中元元年從東封岱宗行衛尉事還代張純為司空賜爵關内侯二年帝崩使魴持節起原陵更封楊邑鄉侯食三百五十户永平四年坐考隴西太守鄧融聽任姦吏䇿免削爵土六年顯宗幸魯復行衛尉事七年代隂嵩為執金吾魴性矜嚴公正在位數進忠言多見納用十四年詔復爵土明年東廵郡國留魴宿衛南宫東觀記曰勑魴車駕發後將緹騎宿𤣥武門複道上領南宫吏士保官給牀蓆子孫得到魴所建初三年以老病乞身肅宗許之其冬為五更詔魴朝賀就列侯位元和二年卒時年八十六子柱嗣尚顯宗女獲嘉長公主少為侍中以恭肅謙約稱位至將作大匠柱卒子定嗣官至羽林郎將定卒無子國除定弟石襲母公主封獲嘉侯亦為侍中稍遷衛尉能取悅當世為安帝所寵帝嘗幸其府留飲十許日賜駁犀具劒佩刀以班犀飾劒也紫艾綬艾即盭緑色也其色似艾玉玦各一半環曰玦以飾帶也拜子世為黄門侍郎世弟二人皆郎中自永初兵荒王侯租秩多不充於是特詔以它縣租稅足石令如舊限足音即諭反歲入榖三萬斛錢四萬遷光禄勲遂代楊震為太尉及北鄉侯立章帝孫濟北惠王夀之子懿也遷太傅與太尉東萊劉喜參録尚書事順帝既立石與喜皆以阿黨閻顯江京等䇿免復為衛尉卒子代嗣劉攽曰子世為郎子代嗣案世本名代前拜為郎時作世後嗣立時作代盖後人見其名疑代以為避太宗諱所改遂還作世而忘其後尚皆作代也今前後不同遂似兩人當定從一所以知世即代者拜家一人為郎必是長子自然嗣立者非他人也代卒弟承嗣為歩兵校尉石弟珖珖音光和帝時詔封楊邑侯劉攽曰案侯國絶而復續者皆曰紹封前後非一今此曰詔誤亦以石寵官城門校尉卒子肅嗣為黄門侍郎虞延傳虞延字子大陳留東昏人也東昏縣故城在今汴州陳留縣東北東昏屬山陽郡俗本作緍者誤也延初生其上有物若一疋練遂上昇天占者以為吉及長長八尺六寸要帶十圍力能扛鼎說文曰扛鼎横關對舉也扛音江少為户牖亭長時王莽貴人魏氏謝承書曰莽貴人魏氏以椒房之寵威傾郡縣賔客放從劉攽曰案當作縱古文雖通而注不音明其當作縱也并下侈從同延率吏卒突入其家捕之以此見怨故位不升性敦朴不拘小節又無鄉曲之譽王莽末天下大亂延常嬰甲胄擁衛親族扞禦鈔盗賴其全者甚衆延從女弟年在孩乳其母不能活之棄於溝中延聞其號聲哀而收之養至成人謝承書曰養育成人以妻同縣人王氏建武初仕執金吾府除細陽令細陽縣屬汝南郡故城在今潁州汝隂縣西北每至歲時伏臘輒休遣徒繫各使歸家並感其恩德應期而還有囚於家被病自載詣獄既至而死延率吏掾史劉攽曰案郡有掾有史總名為吏此宜為史殯于門外百姓感悅之後去官還鄉里太守富宗聞延名召署功曹富姓宗名宗性奢靡車服器物多不中節延諫曰昔晏嬰輔齊鹿裘不完晏子曰晏子布衣鹿裘以朝公曰夫子之家若此之貧也奚衣之惡也季文子相魯妾不衣帛左傳曰季文子相魯妾不衣帛馬不食粟以約失之者鮮矣宗不悦延即辭退居有頃宗果以侈縱被誅臨當伏刑擥涕而歎曰恨不用功曹虞延之諫光武聞而奇之二十年東廵路過小黄高帝母昭靈后園陵在焉小黄縣屬陳留郡故城在今汴州陳留縣東北漢官儀注曰髙帝母起兵時死小黄北後為作陵廟於小黄陳留風俗傳云沛公起兵野戰喪皇妣于黄鄉天下平乃使使者梓宫招魂幽野有丹蛇在水自洗濯入于梓宫其浴處仍有遺髮故諡曰昭靈夫人因作園陵寢殿司馬門鐘簴衛守小黄有祭器籩豆鼎爼之屬十四種廟基尚存焉時延為部督郵詔呼引見問園陵之事延進止從容占拜可觀其陵樹株蘖皆諳其數株根也蘖伐木更生也爼豆犧牲頗曉其禮帝善之勑延從駕到魯還經封丘城門門下小不容羽盖封丘今汴州縣也帝怒使撻侍御史延因下見引咎以為罪在督郵言辭激揚有感帝意乃制詔曰以陳留督郵虞延故貰御史罪貰放也延從送車駕西盡郡界賜錢及劒帶佩刀還郡於是聲名遂振二十三年司徒玊况辟焉謝承書曰况字文伯京兆杜陵人也代為三輔名族該總五經志節髙亮為陳留太守性聰敏善行德教永平十五年蝗蟲起泰山彌衍兗豫過陳留界飛逝不集五穀獨豐章和元年詔以况為司徒玉姓音宿時元正朝賀帝望而識延遣小黄門馳問之即日召拜公車令明年遷洛陽令是時陰氏有客馬成者常為姦盗延收考之陰氏屢請獲一書輒加篣二百篣棰也音彭信陽侯陰就就光烈皇后弟也就本傳信作新乃訴帝譛延多所寃枉帝乃臨御道之館親録囚徒延陳其獄狀可論者在東無理者居西成乃回欲趨東延前執之謂曰爾人之巨蠧久依城社不畏熏燒齊景公問晏子曰理國何患對曰患社䑕公曰何謂社鼠對曰社鼠不可熏人君之左右亦國之社鼠也今考實未竟宜當盡法成大呼稱枉陛㦸郎以㦸刺延叱使置之續漢志曰凡郎官皆主執㦸宿衛也帝知延不私謂成曰汝犯王法身自取之呵使速去後數日伏誅於是外戚歛手莫敢干法在縣三年遷南陽太守永平初有新野功曹鄧衍以外戚小侯每豫朝㑹而容姿趨歩有出於衆顯宗目之顧左右曰朕之儀貌豈若此人特賜輿馬衣服延以衍雖有容儀而無實行未嘗加禮帝既異之乃詔衍令自稱南陽功曹詣闕謝承書曰帝賜輿馬衣服劒佩刀錢二萬南陽計吏歸具以啓延延知衍華不副實行不配容積三年不用於是上乃自勑衍稱南陽功曹詣闕既到拜郎中遷𤣥武司馬𤣥武宫之北門也每宫城門皆有司馬一人秩千石見續漢志衍在職不服父喪帝聞之乃歎曰知人則哲惟帝難之信哉斯言衍慙而退由是以延為明三年徵代趙熹為太尉八年代范遷為司徒厯位二府十餘年無異政績㑹楚王英謀反陰氏欲中傷之使人私以楚謀告延延以英藩戚至親不然其言又欲辟幽州從事公孫𢎞郡國有從事主督促文書察舉非法皆州自辟除故通為百石即功曹從事理中從事之類是也見續漢志以𢎞交通楚王而止並不奏聞及英事發覺詔書切讓延遂自殺家至清貧子孫不免寒餒餒餓也謝承書曰身沒之後家貧空子孫同衣而出并日而食延從曾孫放字子仲少為太尉楊震門徒及震被䜛自殺順帝初放詣闕追訟震罪由是知名桓帝時為尚書以議誅大將軍梁冀功封都亭侯後為司空坐水災免性疾惡}
