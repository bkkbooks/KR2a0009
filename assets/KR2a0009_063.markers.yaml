  - {type: variant, offset: 6684, length: 517, content: 斗請稍為饘粥洪曰何能獨甘此邪使為薄糜徧班士衆又殺其愛妾以食兵將兵將咸流涕無能仰視男女七八十人相枕而死莫有離叛城陷生執洪紹盛帷幔大會諸將見洪謂曰臧洪何相負若是今日服未洪據地瞋目曰諸袁事漢四世五公可謂受恩今王室衰弱無扶翼之意而欲因際會觖望非冀多殺忠良以立姦威洪親見將軍呼張陳留為兄則洪府君亦宜為弟而不能同心戮力為國除害坐擁兵衆觀人屠滅惜洪力劣不能推刃為天下報仇何謂服乎紹本愛洪意欲屈服赦之見其辭切知終不為用乃命殺焉洪邑人陳容少為諸生親慕於洪隨為東郡丞先城未敗洪使歸紹時容在坐見洪當死起謂紹曰將軍舉大事欲為天下除暴而專先誅忠義豈合天意臧洪發舉為郡將柰何殺之紹慙使人牽出謂曰汝非臧洪疇空復爾為容顧曰夫仁義豈有常所蹈之則君子背之則小人今日寧與臧洪同日死不與將軍同日生也遂復見殺在紹坐者無不歎息竊相謂曰如何一日戮二烈士先是洪遣司馬二人出求救於呂布比還城已陷皆赴敵死論曰雍丘之圍臧洪之感憤壯矣想其行跣且號束甲請舉誠足憐也夫豪雄之所趣舍其與守義之心異乎若乃締謀連衡懷詐筭以相尚者蓋惟利埶所在而已況偏城既危曹袁方穆洪徒指外敵之衡以紓倒縣之會忿悁之師兵家所忌可謂懷哭秦之節存荊則未聞也贊曰先零擾疆鄧崔𠫓廾涼詡燮令圖再全金方蓋勳抗董終然允剛洪懷偏節力屈志揚, WYG: 考證}
