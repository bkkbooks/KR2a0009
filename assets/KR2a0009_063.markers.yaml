  - {type: variant, offset: 1929, length: 2, content: 斂詡, WYG: 兵穀意計難量寵既積怨聞之遂大怒而舉兵攻浮浮以書質責之質正也曰盖聞知者順時而謀愚者逆理而動常竊悲京城太叔以不知足而無賢輔卒自棄於鄭也左傳曰鄭武公娶于申曰武姜生莊公及共叔段及莊公即位武姜為之請京使居謂之京城太叔既而太叔將襲鄭公命子封伐京京叛太叔段段出奔共也伯通以名字典郡伯通彭寵字也以名字顯著也有佐命之功光武初鎭河北寵遣吳漢等發歩兵三千人先歸光武及圍邯鄲寵轉食前後不絶也臨人親職愛惜倉庫而浮秉征伐之任欲權時救急二者皆為國耳即疑浮相譛何不詣闕自陳而為族滅之計乎朝廷之於伯通恩亦厚矣委以大郡任以威武光武賜寵號大將軍故云任以威武也事有柱石之寄情同子孫之親柱石以屋為喻也匹夫媵母尚能致命一餐左傳曰趙盾田於首山舍於翳桑見靈輒餓問曰三日不食矣食之後晉靈公欲殺趙盾輒為公甲士倒㦸以禦公徒而免盾媵母未詳也豈有身帶三綬職典大邦寵為漁陽太守建忠侯大將軍故帶三綬而不顧恩義生心外畔者乎伯通與吏人語何以為顔行歩拜起何以為容坐卧念之何以為心引鏡窺影何施眉目舉措建功何以為人惜乎棄休令之嘉名造梟鴟之逆謀梟鴟即鴟梟也其子適大還食其母說文云不孝鳥也捐傳世之慶祚招破敗之重災髙論堯舜之道不忍桀紂之性生為世笑死為愚鬼不亦哀乎伯通與耿俠遊俱起佐命同被國恩俠遊耿况字也况為上谷太守初與寵結謀共歸光武也俠遊謙讓屢有降挹之言挹損也而伯通自伐以為功髙天下往時遼東有豖生子白頭異而獻之行至河東見羣豕皆白懷慙而還若以子之功論於朝廷則為遼東豕也今乃愚妄自比六國六國之時其埶各盛廓土數千里勝兵將百萬故能據國相持多歴年世今天下幾里列郡幾城柰何以區區漁陽而結怨天子此猶河濱之人捧土以塞孟津多見其不知量也方今天下適定海内願安士無賢不肖皆樂立名於世而伯通獨中風狂走自捐盛時内聽驕婦之失計外信䜛邪之諛言浮密奏寵上徵之寵妻勸寵無應徵又與所親信計議吏皆怨浮勸寵止不應徵也長為羣后惡法永為功臣鑒戒豈不誤哉定海内者無私讐勿以前事自誤願留意顧老母㓜弟凡舉事無為親厚者所痛而為見讐者所快寵得書愈怒愈猶益也攻浮轉急明年涿郡太守張豐亦舉兵反時二郡畔戾北州憂恐浮以為天子必自將兵討之而但遣游擊將軍鄧隆陰助浮浮懐懼以為帝怠於敵不能救之乃}
