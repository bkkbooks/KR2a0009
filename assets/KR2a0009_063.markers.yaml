  - {type: variant, offset: 4249, length: 229, content: 也梟不從遂奏行之果被詔書詰責坐以虛慢徵時叛羌圍護羌校尉夏育於畜官勳與州郡合兵救育至狐槃為羌所破勳收餘衆百餘人為魚麗之陳羌精騎夾攻之急士卒多死勳被三創堅不動乃指木表曰必尸我於此句就種羌滇吾素為勳所厚乃以兵扞衆曰蓋長史賢人汝曹殺之者為負天勳仰罵曰死反虜汝何知促來殺我衆相視而驚滇吾下馬與勳勳不肯上遂為賊所執羌戎服其義勇不敢加害送還漢陽後刺史楊雍即表勳領漢陽太守時人飢相漁食勳調穀稟之先出家糧以率衆存活者千餘人後去官徵拜討虜校尉靈帝召見問天下何苦而反亂如此勳曰倖臣, WYG: 放歟孟}
