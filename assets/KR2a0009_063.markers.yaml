  - {type: variant, offset: 4574, length: 390, content: 勳時與宗正劉虞佐軍校尉袁紹同典禁兵勳謂虞紹曰吾仍見上上甚聰明但擁蔽於左右耳若共併力誅嬖倖然後徵拔英俊以興漢室功遂身退豈不快乎虞紹亦素有謀因相連結未及發而司隸校尉張溫舉勳為京兆尹帝方欲延接勳而蹇碩等心憚之並勸從溫奏遂拜京兆尹時長安令楊黨父為中常侍恃埶貪放勳案得其臧千餘萬貴戚咸為之請勳不聽具以事聞并連黨父有詔窮案威震京師時小黃門京兆高望為尚藥監倖於皇太子太子因蹇碩屬望子進為孝廉勳不肯用或曰皇太子副主望其所愛碩帝之寵臣而子違之所謂三怨成府者也勳曰選賢所以報國也非賢不舉死亦何悔勳雖在外每軍國密事帝常手詔問之數加賞賜甚見親信在朝臣右及帝崩董卓廢少帝殺何太后勳與書曰昔伊尹霍光權以立功猶可寒心足下小醜何以終此賀者在門弔者在廬可不慎哉卓得書意甚憚之徵為議郎時左將軍皇甫嵩精兵三萬屯扶風勳密相要結將以討卓會嵩亦被徵勳以衆弱不能獨立遂並還京師自公卿以下莫不卑下於卓唯勳長揖爭禮見者皆為失色卓問, WYG: ''}
