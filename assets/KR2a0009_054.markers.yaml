  - {type: variant, offset: 469, length: 0, content: '', WYG: 代天官人也故考績黜陟以明襃貶尚書曰三載考績三考黜陟幽明無功不黜明隂盛陵陽臣伏見方今刺史太守專州典郡不務奉事盡心為國而司察偏阿取與自己同則舉為尤異異則中以刑}
  - {type: variant, offset: 469, length: 0, content: '', krp: 代天官人也故考績黜陟以明襃貶尚書曰三載考績三考黜陟幽明無功不黜明隂盛陵陽臣伏見方今刺史太守專州典郡不務奉事盡心為國而司察偏阿取與自己同則舉為尤異異則中以刑}
  - {type: variant, offset: 470, length: 2, content: 天而, WYG: 中音丁仲反不即垂頭塞耳採取財賂今益州刺史朱酺揚州刺史倪說倪音五兮反說音悅凉州刺史尹業等每行考事輒有物故考按也又選舉不實曾無貶坐是使臣下得作威福也故事州郡所舉上奏司直察能否以懲虛實前書武帝元狩五年初置司直比二千石掌佐丞相舉不法續漢書曰光武以武帝故事置司直居丞相府助督錄諸州建武十八年省之今宜加防檢式遵前制舊丞相御史親治職事唯丙吉以年老優游不案吏罪丙吉字少卿魯人也宣帝時為丞相掾史有罪終無所驗公府不按吏自吉始也見前書於是宰府習為常俗更共罔養以崇虚名罔養猶依違也或未曉其職便復遷徙誠非}
