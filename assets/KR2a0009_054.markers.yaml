  - {type: variant, offset: 74, length: 0, content: '', krp: 候援兄況勃衣方領能矩歩續漢書曰勃能說韓詩前書音義曰頸下施衿領正方學者之服也矩歩者囬旋皆中規矩辭言嫺雅嫺音閑􅈺雅猶沈靜也司馬相如曰雍容嫺雅援裁知書見之自失況知其意乃自酌酒慰援曰朱勃小器速成智盡此耳卒當從汝禀學勿畏也禀受也朱勃未二十右扶風請試守渭城宰渭城縣名故城在今咸陽縣東北前書音義曰試守者試守一歲乃為眞食其全俸及援為將軍封侯而勃位不過縣令援後雖貴常待以舊恩而卑侮之勃愈身自親及援遇讒唯勃能終焉肅宗即位追賜勃子穀二千斛東觀記曰章帝下詔曰告平陵令丞縣人故雲陽令朱勃建武中以伏波將軍爵土不傳上書陳狀不顧罪戾懷旌善之志有烈士之風詩云無言不讎無德不報其以縣見穀二千斛賜勃子若孫勿令遠詣闕謝初援兄子壻王磐子石子石磐字也王莽從兄平阿侯仁之子也莽敗磐擁富貲居故國為人尚氣節而愛士好施有名江淮間後}
  - {type: variant, offset: 75, length: 0, content: '', WYG: 京師與衞尉隂興大司空朱浮齊王章共相友善援謂姊子曹訓曰王氏廢姓也子石當屏居自守而反游京師長者長者謂豪俠者也用氣自行多所陵折其敗必也後歲餘磐果與司𨽻校尉蘇鄴丁鴻事相連坐死}
  - {type: variant, offset: 75, length: 0, content: '', krp: 京師與衞尉隂興大司空朱浮齊王章共相友善援謂姊子曹訓曰王氏廢姓也子石當屏居自守而反游京師長者長者謂豪俠者也用氣自行多所陵折其敗必也後歲餘磐果與司𨽻校尉蘇鄴丁鴻事相連坐死}
  - {type: variant, offset: 77, length: 1, content: 市, WYG: 獄而磐子肅復出入北宮及王侯邸第援謂司馬呂种曰是援行軍之司馬也建武之元名為天下重開自今以往海内日當安耳但憂國家諸子並壯而舊防未立舊防諸侯王子不許交通賓客若多通賓客則大獄起矣卿曹戒愼之及郭后薨有上書者以為肅等受誅之家客因事生亂劉攽曰按肅即是受誅之家不當云客蓋是容字容有此事也慮致貫高任章之變張敖為趙王其相貫高高祖不禮趙王高恥之置人壁中欲害高祖又任章父宣霍氏女壻坐謀反誅宣帝祠昭帝廟章乃立服夜入廟待帝至欲為逆發覺伏誅並見前書帝怒乃下郡縣收捕諸王賓客更相牽引死者以千數呂种亦豫其禍臨命歎曰馬將軍誠神人也永平初援女立為皇后顯宗圖畫建武中名臣列將於雲臺雲臺在南宮也以椒房故獨不及援東平王蒼觀圖言於帝曰何故不畫伏波將軍像帝笑而不言至十七年援夫人卒乃更修封樹起祠堂建初三年肅宗使五官中郎將持節追䇿諡援曰忠成侯四子廖防光客卿客卿幼而岐嶷年六歲能應接諸公專對賓客嘗有死罪亡命者來過客卿逃匿不令人知外若訥而内沈敏援甚奇之以為將相器故以客卿字焉張儀虞卿並為客卿故取名焉事見史記援卒後客卿亦夭没論曰馬援騰聲三輔遨游二帝及定節立謀以干時主將懐負鼎之願蓋為千載之遇焉伊尹負鼎以干湯光武與竇融書曰千載之遇也然其戒人之禍智矣謂誡竇固梁松王磐呂种等皆如所言也而不能自免於讒隙豈功名之際理固然乎居功名之地讒構易興而能免之者少矣夫利不在身以之謀事則智慮不私己以之斷義必厲誠能囬觀物之智而為反身之察若施之於人則能恕自鑒其情亦明矣見人之謂智自見之謂明以自見之明為見人之用其於物理豈不通乎廖字敬平少以父任為郎東觀記曰廖少習易經清約沈靜援擊武谿無功卒于師廖不得嗣爵明德皇后旣立拜廖為羽林左監虎賁中郎將顯宗崩受遺詔典掌門禁遂代趙熹為衞尉肅宗甚尊重之時皇太后躬履節儉事從簡約廖慮美業難終上疏長樂宮以勸成德政曰臣案前世詔令以百姓不足起於世尚奢靡故元帝罷服官前書音義曰齊國舊有三服之官春獻冠幘縰為首服紈素為冬服輕綃為夏服元帝約省故罷之成帝御浣衣哀帝去樂府哀帝即位詔罷鄭衞之音減郊祭及武樂等人數也然而侈費不息至於衰亂者百姓從行不從言也書曰違上所命從厥攸好夫改政移風必有其本傳曰吳王好劒客百姓多創瘢楚王好細腰宮中多餓死墨子曰楚靈王好細腰而國多餓人也長安語曰當時諺也城中好高髻四方高一尺城中好廣眉四方且半額城中好大袖四方全匹帛斯言如戲有切事實前下制度未幾後稍不行劉攽曰案文有未幾則不當更有後字蓋本是復字也雖或吏不奉法良由慢起京師今陛下躬服厚繒斥去華飾素簡所安發自聖性言儉素約簡后之所安此誠上合天心下順民望浩大之福莫尚於此陛下旣已得之自然猶宜加以勉朂法太宗之隆德戒成哀之不終太宗孝文也𤣥黙為化身衣弋綈成帝下詔務崇儉約禁斷綺縠女樂嫁娶葬埋過制唯青綠人所常服不禁哀帝初即位易帷帳去錦繡乘輿席緣綈繒而已成帝以趙飛燕哀帝以董賢為儉並不終易曰不恒其德或承之羞恒卦九三爻辭也巽下震上鄭𤣥注云巽為進退不恒其德之象又互體兌兌為毁折後將有羞辱也誠令斯事一竟竟猶終也則四海誦德聲薰天地薫猶蒸也言芳聲薫天地也神明可通金石可勒而況於行仁心乎況於行令乎願置章坐側以當瞽人夜誦之音瞽人無目者也古者瞽師教國子誦六詩前書禮樂志云乃采詩夜誦夜誦者其辭或祕不可宣露故於夜中歌誦也太后深納之朝廷大議輒以詢訪廖性質誠畏愼不愛權埶聲名盡心納忠不屑毁譽王逸注楚詞云屑顧也有司連據舊典奏封廖等累讓不得已建初四年遂受封為順陽侯以特進就第每有賞賜輒辭讓不敢當京師以是稱之子豫為歩兵校尉太后崩後馬氏失埶廖性寛緩不能教勒子孫豫遂投書怨誹又防光奢侈好樹黨與八年有司奏免豫遣廖防光就封豫隨廖歸國考擊物故物無也故事也謂死也後詔還廖京師永元四年卒和帝以廖先帝之舅厚加􅈖賻使者弔祭王主㑹喪諡曰哀侯子遵嗣徙封程鄉侯遵卒無子國除元初三年鄧太后詔封廖孫度為潁陽侯防字江平永平十二年與弟光俱為黃門侍郎肅宗即位拜防中郎將稍遷城門校尉建初二年金城隴西保塞羌皆反羌東吾燒當之後也以其父滇吾降漢乃入居塞内故稱保塞拜防行車騎將軍事以長水校尉耿恭副將北軍五校兵及諸郡積射士三萬人擊之軍到冀而羌豪布橋等圍南部都尉於臨洮防欲救之臨洮道險車騎不得方駕防乃别使兩司馬將數百騎分為前後軍去臨洮十餘里為大營多樹幡幟揚言大兵旦當進羌候見之馳還言漢兵盛不可當明旦遂鼓譟而前羌虜驚走因追擊破之斬首虜四千餘人遂解臨洮圍防開以恩信燒當種皆降唯布橋等二萬餘人在臨洮西南望曲谷酈元注水經云望曲在臨洮西南去龍桑城二百里十二月羌又敗耿恭司馬及隴西長史於和羅谷死者數百人明年春防遣司馬夏駿將五千人從大道向其前潛遣司馬馬彭將五千人從間道衝其心腹又令將兵長史李調等將四千人繞其西三道俱擊復破之斬獲千餘人得牛羊十餘萬頭羌退走夏駿追之反為所敗防乃引兵與戰於索西又破之索西縣名故城在今岷州和政縣東亦名臨洮東城亦謂之赤城沙州記云從東洮至西洮一百二十里東洮即謂此城布橋迫急將種人萬餘降詔徵防還拜車騎將軍城門校尉如故防貴寵最盛與九卿絶席光自越騎校尉遷執金吾四年封防潁陽侯光為許陽侯兄弟二人各六千户防以顯宗寢疾入參醫藥又平定西羌增邑千三百五十户屢上表讓位俱以特進就第皇太后崩明年拜防光祿勲光為衞尉防數言政事多見採用是冬始施行十二月迎氣樂防所上也解見章帝紀子鉅為常從小侯以小侯故得常從也六年正月以鉅當冠禮記曰二十弱冠儀禮曰士冠筮於廟門主人𤣥冠朝服有司如主人服卒筮旅占告吉若不吉即筮遠日如初前期三日筮賓如筮日之儀陳服于房中西墉下東領北上始加緇布冠次皮弁次加爵弁嫡子冠于阼以著代也三加而彌尊冠而字之敬其名也祝曰令月吉辰加爾元服棄爾幼志順爾成德劉攽曰注士冠筮于廟門案文少一日字特拜為黃門侍郎肅宗親御章臺下殿陳鼎爼自臨冠之明年防復以病乞骸骨詔賜故中山王田廬中山王焉以郭太后少子故獨留京師建武三十年徙封中山永平二年就國故以其田廬賜防也以特進就第防兄弟貴盛奴婢各千人已上資產巨億皆買京師膏腴美田又大起第觀連閣臨道彌亘街路多聚聲樂曲度比諸郊廟曲度謂曲之節度也賓客奔湊四方畢至京兆杜篤之徒數百人常為食客居門下刺史守令多出其家歲時賑給鄉閭故人莫不周給防又多牧馬畜賦歛羌胡帝不喜之數加譴勅所以禁遏甚備由是權埶稍損賓客亦衰八年因兄子豫怨謗事有司奏防兄弟奢侈踰僭濁亂聖化悉免就國臨上路詔曰舅氏一門俱就國封四時陵廟無助祭先后者朕甚傷之其令許侯思愆田廬有司勿復請留之於京守田廬而思愆過也以慰朕渭陽之情渭陽詩秦風也秦康公送舅晉文公于渭之陽念母之不見也其詩曰我見舅氏如母存焉光為人小心周密喪母過哀東觀記曰光遭母喪哀慟感傷形骸骨立帝以是特親愛之乃復位特進子康黃門侍郎永元二年光為太僕康為侍中及竇憲誅光坐與厚善復免就封後憲奴誣光與憲逆自殺東觀記曰奴名玉當初竇氏有事玉當亡私從光乞不與恨去懷挾欲中光官捕得玉當因告言光與憲有惡謀光以被誣不能自明乃自殺光死後憲他奴郭扈自出證明光憲無惡謀光子朗上書迎光喪葬舊塋詔許之家屬歸本郡本郡復殺康而防及廖子遵皆坐徙封丹陽防為翟鄉侯租歲限三百萬不得臣吏民防後以江南下溼上書乞歸本郡和帝聽之十三年卒子鉅嗣後為長水校尉永初七年鄧太后詔諸馬子孫還京師隨四時見㑹如故事復紹封光子朗為合鄉侯嚴字威卿父余王莽時為揚州牧嚴少孤東觀記曰余卒時嚴七歲依姊壻父九江連率平河侯王述明年母復終㑹述失郡居沛郡建武三年余外孫右扶風曹貢為梧安侯相迎嚴歸養視之至四年叔父援從車駕東征過梧安乃將兄弟西嚴年十三至雒陽留寄郎朱仲孫舍大奴歩䕶視之也而好擊劒習騎射東觀記曰嚴從其故門生}
