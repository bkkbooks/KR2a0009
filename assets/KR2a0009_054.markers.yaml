  - {type: variant, offset: 46, length: 1, content: 孝, WYG: 善人斯可矣致求盈餘但自苦耳當吾在浪泊西里間虜未滅之時下潦上霧毒氣重蒸劉攽曰案文重當作熏仰視飛鳶跕跕墮水中鳶鴟也跕跕墮貌也跕音都牒泰牒二反卧念少游平生時語何可得也今賴士大夫之力被蒙大恩猥先諸君紆佩金紫且喜且慙吏士皆伏稱萬歲援將樓船大小二千餘艘戰士二萬餘人擊九眞賊徴側餘黨都羊等自無功至居風無功居風二縣名並屬九眞郡居風今愛州斬獲五千餘人嶠南悉平嶠嶺嶠也爾雅曰山銳而高曰嶠嶠音渠廟反廣州記曰援到交阯立銅柱為漢之極界也援奏言西于縣户有三萬二千西于縣屬交阯郡故城在今交州龍編縣東也遠界去庭千餘里庭縣庭也請分為封溪望海二縣許之封溪望海縣並屬交阯郡援所過輒為郡縣治城郭穿渠灌溉以利其民條奏越律與漢律駮者十餘事駮乖舛也與越人申明舊制以約束之自}
