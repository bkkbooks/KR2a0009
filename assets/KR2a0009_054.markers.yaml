  - {type: variant, offset: 62, length: 2, content: 博覽, WYG: 畤侯弇書曰前舒上書當先擊充糧雖難運而兵馬得用軍人數萬爭欲先奮今壺頭竟不得進大衆怫鬱行死誠可痛惜前到臨鄉賊無故自致若夜擊之即可殄滅伏波類西域賈胡到一處輒止言似商胡所至之處輒停留賈音古以是失利今果疾疫皆如舒言弇得書奏之帝乃使虎賁中郎將梁松乘驛責問援因代監軍㑹援病卒松宿懷不平以援往受其拜遂因事陷之帝大怒追收援新息侯印綬初兄子嚴敦並喜譏議並余之子也喜音許吏反而通輕俠客援前在交阯還書誡之曰吾欲汝曹聞人過失如聞父母之名耳可得聞口不可得言也好論議人長短妄是非正法謂譏刺時政也此吾所大惡也寧死不願聞子孫有此行也汝曹知吾惡之甚矣所以復言者施衿結褵申父母之戒說文曰衿交衽也詩云親結其褵毛萇注云褵婦人之褘也女施衿結帨爾雅曰褵緌也郭璞注曰即今之香纓也儀禮父戒女曰戒之敬之夙夜無違命母戒之曰戒之敬之夙夜無違宮事也欲使汝曹不忘之耳龍伯高敦厚周愼口無擇言謙約節儉廉公有威吾愛之重之願汝曹効之杜季良豪俠好義憂人之憂樂人之樂清濁無所失輕重合宜父喪致客數郡畢至吾愛之重之不願汝曹効也効伯高不得猶為謹勅之士所謂刻鵠不成尚類鶩者也鶩鴨也効季良不得陷為天下輕薄子所謂畫虎不成反類狗者也訖今季良尚未可知郡將下車輒切齒州郡以為言吾常為寒心是以不願子孫効也季良名保京兆人時為越騎司馬續漢書曰越騎司馬秩千石保仇人上書訟保為行浮薄亂羣惑衆伏波將軍萬里還書以誡兄子而梁松竇固以之交結將扇其輕偽敗亂諸夏書奏帝召責松固以訟書及援誡書示之松固叩頭流血而得不罪詔免保官伯高名述亦京兆人為山都長山都縣屬南陽郡故城在今襄州義清縣東北今名固城也由此擢拜零陵太守今永州也初援在交阯常餌薏苡實用能輕身省慾以勝瘴氣神農本草經曰薏苡味甘微寒主風濕痺下氣除筋骨邪氣久服輕身益氣南方薏苡實大援欲以為種軍還載之一車時人以為南土珍怪權貴皆望之援時方有寵故莫以聞及卒後有上書譖之者以為前所載還皆明珠文犀犀之有文彩也馬武與於陵侯侯昱等昱司徒侯霸之子也皆以章言其狀帝益怒援妻孥惶懼不敢以喪還舊塋裁買城西數畝地槀葬而已裁僅也與纔同槀草也以不歸舊塋時權葬故稱槀賓客故人莫敢弔㑹嚴與援妻子草索相連詣闕請罪帝乃出松書以示之方知所坐上書訴寃前後六上辭甚哀切然後得葬又前雲陽令同郡朱勃詣闕上書曰臣聞王德聖政不忘人之功周書曰記人之功忘人之過宜為君也採其一美不求備於衆論語周公謂魯公曰不使大臣怨乎不以無求備於一人故高祖赦蒯通而以王禮葬田橫蒯通說韓信背漢高祖徵通至釋不誅田橫初自稱齊王漢定天下橫猶以五百人保於海島高祖追橫橫自殺以王禮葬之並見前書也大臣曠然咸不自疑夫大將在外讒言在内㣲過輒記大功不計誠為國之所愼也故章邯畏口而奔楚章邯為秦將使人請事至咸陽趙高不見有不信之心使還報邯畏趙高讒之遂降項羽燕將據聊}
