  - {type: variant, offset: 2849, length: 481, content: 之方故疾可愈而壽可長也為國者必先知民之所苦禍之所起然後為之禁故姦可塞而國可安也今日賊良民之甚者莫大於數赦贖赦贖數則惡人昌而善人傷矣何以明之哉夫謹勑之人身不蹈非又有為吏正直不避彊禦而姦猾之黨橫加誣言者皆知赦之不久故也善人君子被侵怨而能至闕庭自明者萬無數人數人之中得省問者百不過一既對尚書而空遣去者復什六七矣其輕薄姦軌既陷罪法怨毒之家冀其辜戮以解畜憤而反一㮣悉蒙赦釋令惡人高會而誇咤老盜服臧而過門孝子見讎而不得討遭盜者覩物而不敢取痛莫甚焉夫養稂莠者傷禾稼惠姦軌者賊良民書曰文王作罰刑茲無赦先王之制刑法也非好傷人肌膚斷人壽命也貴威姦懲惡除人害也故經稱天命有德五服五章哉天討有罪五刑五用哉詩刺彼宜有罪汝反脫之古者唯始受命之君承大亂之極寇賊姦軌難為法禁故不得不有一赦與之更新頤育萬民以成大化非以養姦活罪放縱天賊也夫性惡之民民之豺狼雖得放宥之澤終無改悔之心旦脫重梏夕還囹圄嚴明令尹不能使其斷絕何也凡敢為大姦者才必有過於衆而能自媚於上者也多散誕得之財奉以諂諛之辭以轉相驅非有第五公之廉直孰不為顧哉論者多曰久不赦則姦軌熾而吏不制宜數肆眚以解散之此未昭政亂之本源不察禍福之所生也後, WYG: 䕶羌校尉遷}
