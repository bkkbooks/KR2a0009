  - {type: variant, offset: 530, length: 485, content: 君澤及草木仁被率土是以福祚流衍本支百世季世之臣以諂媚主不思順天專杖殺伐白起蒙恬秦以為功天以為賊息夫董賢主以為忠天以為盜易曰德薄而位尊智小而謀大鮮不及矣是故德不稱其禍必酷能不稱其殃必大夫竊位之人天奪其鑒雖有明察之資仁義之志一旦富貴則背親捐舊喪其本心疎骨肉而親便辟薄知友而厚犬馬寧見朽貫千萬而不忍貸人一錢情知積粟腐倉而不忍貸人一斗骨肉怨望於家細人謗讟於道前人以敗後爭襲之誠可傷也常失人君有常過嬰兒常病傷於飽也貴臣常禍傷於寵也哺乳多則生病富貴盛而致驕疾愛子而賊之驕臣而滅之者非一也極其罰者乃有仆死深牢銜刀都巿豈非無功於天有害於人者乎夫鳥以山為埤而增巢其上魚以泉為淺而穿穴其中卒所以得者餌也貴戚願其宅吉而制為令名欲其門堅而造作鐵樞卒其所以敗者非苦禁忌少而門樞朽也常苦崇財貨而行驕僭耳之危而圖太山之安為朝露之行而思傳世之功豈不惑哉豈不惑哉浮侈篇曰王者以四海為家兆人為子一夫不耕天下受其飢一婦不織天下受其寒今舉俗舍本農趨商賈牛馬車輿填塞道路游手為巧充盈都邑務本者少浮食者衆商邑翼翼四方是極今察洛陽資末業者什於農夫虛偽游手什於末業是則一夫耕百人食之一婦桑百人衣之以一奉百孰能供之天下百, WYG: 州}
