  - {type: variant, offset: 74, length: 0, content: '', WYG: 候援兄況勃衣方領能矩歩續漢書曰勃能說韓詩前書音義曰頸下施衿領正方學者之服也矩歩者囬旋皆中規矩辭言嫺雅嫺音閑􅈺雅猶沈靜也司馬相如曰雍容嫺雅援裁知書見之自失況知其意乃自酌酒慰援曰朱勃小器速成智盡此耳卒當從汝禀學勿畏也禀受也朱勃未二十右扶風請試守渭城宰渭城縣名故城在今咸陽縣東北前書音義曰試守者試守一歲乃為眞食其全俸及援為將軍封侯而勃位不過縣令援後雖貴常待以舊恩而卑侮之勃愈身自親及援遇讒唯勃能終焉肅宗即位追賜勃子穀二千斛東觀記曰章帝下詔曰告平陵令丞縣人故雲陽令朱勃建武中以伏波將軍爵土不傳上書陳狀不顧罪戾懷旌善之志有烈士之風詩云無言不讎無德不報其以縣見穀二千斛賜勃子若孫勿令遠詣闕謝初援兄子壻王磐子石子石磐字也王莽從兄平阿侯仁之子也莽敗磐擁富貲居故國為人尚氣節而愛士好施有名江淮間後}
