  - {type: variant, offset: 57, length: 0, content: '', WYG: 子阿受相馬骨法考之於行事輒有驗効臣愚以為傳聞不如親見視景不如察形今欲形之於生馬則骨法難備具又不可傳之於後孝武皇帝時善相馬者東門京東門姓也京名也鑄作銅馬法獻之有詔立馬於魯班門外則更名魯班門曰金馬門臣謹依儀氏䩭中帛氏口齒謝氏脣鬐丁氏身中備此數家骨相以為法援銅馬相法曰水火欲分明水火在鼻兩孔間也上脣欲急而方口中欲紅而有光此馬千里頷下欲深下脣欲緩牙欲前向牙欲去齒一寸則四百里牙劒鋒則千里目欲滿而澤腹欲充膁欲小季肋欲長縣薄欲厚而緩縣薄股也腹下欲平滿汗溝欲深長而膝本欲起肘腋欲開膝欲方蹄欲厚三寸堅如石䩭音居奇反劉攽曰注牙欲去齒一寸案文多欲字又汗溝欲深長而案文而當在長字上馬高三尺五寸圍四尺四寸有詔置於宣德殿下以為名馬式焉初援軍還將至故人多迎勞之平陵人孟冀名有計謀於坐賀援援謂之曰吾望子有善言反同衆人邪昔伏波將軍路博德開置七郡裁封數百户漢書曰平南越以為南海蒼梧鬱林合浦交阯九眞日南朱崖儋耳九郡今此言七郡則與前書不同也今我微勞猥饗大縣功薄賞厚何以能長久乎先生奚用相濟冀曰愚不及援曰方今匈奴烏桓尚擾北邊欲自請擊之男兒要當死於邊野以馬革裹屍還葬耳何能卧牀上在兒女子手中邪冀曰諒為烈士當如此矣還月餘㑹匈奴烏桓寇}
  - {type: page-break, offset: 57, content: '', id: KR2a0009_WYG_054-14a, image: WYG0252/WYG0252-0630a.png}
  - {type: page-break, offset: 57, content: '', id: KR2a0009_WYG_054-14b, image: WYG0252/WYG0252-0630b.png}
  - {type: variant, offset: 57, length: 0, content: '', krp: 子阿受相馬骨法考之於行事輒有驗効臣愚以為傳聞不如親見視景不如察形今欲形之於生馬則骨法難備具又不可傳之於後孝武皇帝時善相馬者東門京東門姓也京名也鑄作銅馬法獻之有詔立馬於魯班門外則更名魯班門曰金馬門臣謹依儀氏䩭中帛氏口齒謝氏脣鬐丁氏身中備此數家骨相以為法援銅馬相法曰水火欲分明水火在鼻兩孔間也上脣欲急而方口中欲紅而有光此馬千里頷下欲深下脣欲緩牙欲前向牙欲去齒一寸則四百里牙劒鋒則千里目欲滿而澤腹欲充膁欲小季肋欲長縣薄欲厚而緩縣薄股也腹下欲平滿汗溝欲深長而膝本欲起肘腋欲開膝欲方蹄欲厚三寸堅如石䩭音居奇反劉攽曰注牙欲去齒一寸案文多欲字又汗溝欲深長而案文而當在長字上馬高三尺五寸圍四尺四寸有詔置於宣德殿下以為名馬式焉初援軍還將至故人多迎勞之平陵人孟冀名有計謀於坐賀援援謂之曰吾望子有善言反同衆人邪昔伏波將軍路博德開置七郡裁封數百户漢書曰平南越以為南海蒼梧鬱林合浦交阯九眞日南朱崖儋耳九郡今此言七郡則與前書不同也今我微勞猥饗大縣功薄賞厚何以能長久乎先生奚用相濟冀曰愚不及援曰方今匈奴烏桓尚擾北邊欲自請擊之男兒要當死於邊野以馬革裹屍還葬耳何能卧牀上在兒女子手中邪冀曰諒為烈士當如此矣還月餘㑹匈奴烏桓寇}
  - {type: variant, offset: 59, length: 2, content: 班彪, WYG: 援以三輔侵擾園陵危逼因請行許之自九月至京師十二月復出屯襄國襄國縣名屬趙國今邢州龍崗縣也詔百官祖道援謂黃門郎梁松竇固曰凡人為貴當使可賤如卿等欲不可復賤居高堅自持勉思鄙言松後果以貴滿致災固亦幾不免明年秋援乃將三千騎出高栁行鴈門代郡上谷障塞烏桓候者見漢軍至虜遂散去援無所得而還援嘗有疾梁松來候之獨拜牀下援不答松去後諸子問曰梁伯孫帝壻松尚舞隂公主爾雅曰女子之夫為壻貴重朝廷公卿已下莫不憚之大人奈何獨不為禮援曰我乃松父友也松父統也雖貴何得失其序乎禮記曰見父之執不謂之進不敢進不謂之退不敢退不問不敢對鄭𤣥曰敬父同志如事父也松由是恨之二十四年武威將軍劉尚擊武陵五溪蠻夷酈元注水經云武陵有五溪謂雄溪樠溪西溪潕溪辰溪悉是蠻夷所居故謂五溪蠻皆槃瓠之子孫也土俗雄作熊樠作朗潕作武在今辰州界深入軍没援因復請行時年六十二帝愍其老未許之援自請曰臣尚能被甲上馬帝令試之援據鞍顧眄以示可用帝笑曰矍鑠哉是翁也矍鑠勇貌東觀記作矆哉是翁矆音許縛反遂遣援率中郎將馬武耿舒劉匡孫永等將十二郡募士及㢮刑四萬餘人征五溪援夜與送者訣謂友人謁者杜愔曰吾受厚恩年迫餘日索索盡也常恐不得死國事今獲所願甘心瞑目但畏長者家兒或在左右或與從事殊難得調介介獨惡是耳長者家兒謂權要子弟等介介猶耿耿也明年春軍至臨鄉東觀記曰二月到武陵臨鄉也遇賊攻縣援迎擊破之斬獲二千餘人皆散走入竹林中初軍次下雋下雋縣名屬長沙國故城今辰州沅陵縣雋音字兗反有兩道可入從壺頭則路近而水嶮壺頭山名也在今辰州沅陵東武陵記曰此山頭與東海方壺山相似神仙多所游集因名壺頭山也從充則塗夷而運遠充縣名屬武陵郡充音昌容反帝初以為疑及軍至耿舒欲從充道援以為弃日費糧不如進壺頭搤其喉咽搤拊也充賊自破以事上之帝從援策三月進營壺頭賊乘高守隘水疾舩不得上㑹暑甚士卒多疫死援亦中病遂困乃穿岸為室以避炎氣武陵記曰壺頭山邊有石窟即援所穿室也室内有蛇如百斛舩大云是援之餘靈也賊每升險鼓譟援輒曵足以觀之左右哀其壯意莫不為之流涕耿舒與兄}
