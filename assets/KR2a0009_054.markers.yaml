  - {type: variant, offset: 40, length: 0, content: '', krp: 東觀記曰徙茂陵成懽里曾祖父通以功封重合侯坐兄何羅反被誅重合縣屬勃海郡故城在今滄州樂陵縣東馬何羅與江}
  - {type: variant, offset: 41, length: 0, content: '', WYG: 相善充既誅遂懼罪及已謀反伏誅事見前書故援再世不顯祖及父不得為顯任東觀漢記通生賓宣帝時以郎持節號使君使君生仲仲官至𤣥武司馬仲生援援三兄況余員東觀記曰況字君平余字聖卿員字季主並有才能王莽時皆為二千石況河南太守余中壘校尉員增山連率援年十二而孤}
  - {type: variant, offset: 41, length: 0, content: '', krp: 相善充既誅遂懼罪及已謀反伏誅事見前書故援再世不顯祖及父不得為顯任東觀漢記通生賓宣帝時以郎持節號使君使君生仲仲官至𤣥武司馬仲生援援三兄況余員東觀記曰況字君平余字聖卿員字季主並有才能王莽時皆為二千石況河南太守余中壘校尉員增山連率援年十二而孤}
  - {type: variant, offset: 42, length: 1, content: 孤, WYG: 有大志諸兄竒之嘗受齊詩意不能守章句東觀記曰受齊詩師事潁川蒲昌乃辭況欲就邊郡田牧東觀記曰援以況出為河南太守次兩兄為吏京師見家用不足乃辭況欲就邊郡畜牧也況曰汝大才當晩成良工不示人以朴且從所好從其所請也㑹況卒援行服朞年不離墓所敬事寡㛮不冠不入廬廬舍也後為郡督郵送囚至司命府王莽置司命官上公已下皆糾察囚有重罪援哀而縱之遂亡命北地遇赦因留牧畜賓客多歸附者遂役屬數百家續漢書曰過北地任氏畜牧自援祖賓本客天水父仲又嘗為牧帥令是時員為䕶苑使者故人賓客皆依援轉游隴漢間嘗謂賓客曰丈夫為志窮當益堅老當益壯因處田牧至有牛馬羊數千頭穀數萬斛既而歎曰凡殖貨財產貴其能施賑也否則守錢虜耳乃盡散以班昆弟故舊身衣羊裘皮絝王莽末四方兵起莽從弟衞將軍林廣招雄俊乃辟援及同縣原渉為掾渉字巨先見前書薦之於莽莽以渉為鎭戎大尹王莽改天水為鎭戎改太守為大尹援為新成大尹莽改漢中為新成及莽敗援兄員時為增山連率莽改上郡為增山連卒亦太守也莽法典郡者公為牧侯稱卒正伯稱連率其無封爵者為尹也與援俱去郡復避地凉州世祖即位員先詣洛陽帝遣員復郡卒於官援因留西州隗囂甚敬重之以援為綏德將軍與決籌策是時公孫述稱帝於蜀囂使援往觀之援素與述同里閈說文曰閈閭也杜預注左傳閈閭門也相善以為既至當握手歡如平生而述盛陳陛衞以延援入交拜禮畢使出就館更為援制都布單衣東觀記曰都作荅史記曰荅布千匹前書音義曰荅布白疊布也何承天纂文曰都致錯履無極皆布名方言曰禪衣江淮南楚之間謂之褋關之東西謂之禪衣交讓冠㑹百官於宗廟中立舊交之位述鸞旗旄騎解在公孫述傳警蹕就車磬折而入磬折者屈身如磬之曲折敬也禮饗官屬甚盛欲授援以封侯大將軍位賓客皆樂留援曉之曰天下雄雌未定公孫不吐哺走迎國士哺食也史記周公誡伯禽曰吾一沐三握髮一食三吐哺猶恐失天下士心也與圖成敗反修飾邊幅言若布帛修整其邊幅也左傳曰如布帛之有幅焉為之度使無遷如俑人形禮記曰謂為俑者不仁鄭𤣥云俑偶人也有面目機發有似於生人也俑音勇此子何足久稽天下士乎稽留也因辭歸謂囂曰子陽井底蛙耳言述志識褊狹如坎井之蛙事見莊子而妄自尊大不如專意東方建武四年冬囂使援奉書洛陽援至引見於宣德殿世祖迎笑謂援曰卿遨遊二帝間今見卿使人大慙援頓首辭謝因曰當今之世非獨君擇臣也臣亦擇君矣家語曰君擇臣而任之臣亦擇君而事之臣與公孫述同縣少相善臣前至蜀述陛㦸而後進臣臣今遠來陛下何知非刺客姦人而簡易若是東觀記曰援初到勅令中黃門引入時上在宣德殿南廡下袒幘坐故云簡易也帝復笑曰卿非刺客顧說客耳援曰天下反覆盜名字者不可勝數盜猶竊也今見陛下恢廓大度同符高祖乃知帝王自有眞也帝甚壯之援從南幸黎丘轉至東海及還以為待詔使太中大夫來歙持節送援西歸隴右隗囂與援共卧起問以東方流言及京師得失流猶傳也援說囂曰前到朝廷上引見數十東觀記曰凡十四見每接讌語自夕至旦才明勇略非人敵也且開心見誠無所隱伏闊達多大節略與高帝同經學博覽政事文辯前世無比囂曰卿謂何如高帝援曰不如也高帝無可無不可此論語孔子自言己之所行也今上好吏事動如節度又不喜飲酒囂意不懌曰如卿言反復勝邪然雅信援故遂遣長子恂入質援因將家屬隨恂歸洛陽居數月而無它職任援以三輔地曠土沃而所將賓客猥多乃上書求屯田上林苑中許之㑹隗囂用王元計意更狐疑狐性多疑故曰狐疑援數以書記責譬於囂囂怨援背已得書增怒其後遂發兵拒漢援乃上疏曰臣援自念歸身聖朝奉事陛下本無公輔一言之薦左右為容之助鄒陽書曰蟠木成萬乘之器者左右為之容臣不自陳陛下何因聞之夫居前不能令人輊居後不能令人軒言為人無所輕重也詩云如輊如軒輊音丁利反與人怨不能為人患臣所恥也故敢觸冒罪忌昧死陳誠臣與隗囂本實交友初囂遣臣東謂臣曰本欲為漢願足下往觀之於汝意可即專心矣及臣還反報以赤心實欲導之於善非敢譎以非義而囂自挾姦心盜憎主人左傳晉伯宗妻曰盜憎主人民惡其上怨毒之情遂歸於臣臣欲不言則無以上聞願聽詣行在所極陳滅囂之術得空匈腹申愚策退就隴畝死無所恨帝乃召援計事援具言謀畫因使援將突騎五千往來游說囂將高峻任禹之屬下及羌豪為陳禍福以離囂友黨劉攽曰案文友當作支援又為書與囂將楊廣使曉勸於囂曰春卿無恙春卿楊廣字前别冀南天水冀縣也寂無音驛援間還長安因留上林竊見四海已定兆民同情而季孟閉拒背畔為天下表的表猶標也言為標準為射的也言背叛之罪為天下所指射也常懼海内切齒思相屠裂故遺書戀戀以致側隱之計乃聞季孟歸罪於援而納王游翁諂邪之說游翁王元字也自謂函谷以西舉足可定以今而觀竟何如邪援間至河内過存伯春存猶問也見其奴吉從西方還說伯春小弟仲舒望見吉欲問伯春無它否竟不能言曉夕號泣婉轉塵中又說其家悲愁之狀不可言也夫怨讎可刺不可毁援聞之不自知泣下也援素知季孟孝愛曾閔不過夫孝於其親豈不慈於其子可有子抱三木而跳梁妄作自同分羮之事乎三木者謂桎梏及械也司馬遷曰衣赭關三木分羮謂樂羊也觧見公孫述傳季孟平生自言所以擁兵衆者欲以保全父母之國而完墳墓也又言茍厚士大夫而已而今所欲全者將破亡之所欲完者將毁傷之所欲厚者將反薄之季孟嘗折愧子陽而不受其爵愧猶辱也今更共陸陸陸陸猶碌碌也欲往附之將難為顔乎若復責以重質當安從得子主給是哉往時子陽獨欲以王相待謂欲封為朔寧王也而春卿拒之今者歸老更欲低頭與小兒曹共槽櫪而食併肩側身於怨家之朝乎字林併音卑正反男兒溺死何傷而拘游哉游浮也今國家待春卿意深宜使牛孺卿與諸耆老大人大人謂豪傑也共說季孟若計畫不從眞可引領去矣前披輿地圖見天下郡國百有六所奈何欲以區區二邦以當諸夏百有四乎春卿事季孟外有君臣之義内有朋友之道言君臣邪固當諫爭語朋友邪應有切磋骨曰切象曰磋言朋友之道如切磋以成器也詩云如切如磋如琢如磨豈有知其無成而但萎腇咋舌义手從族乎萎腇耎弱也萎音於偽反腇音乃罪反及今成計殊尚善也過是欲少味矣以食為諭且來君叔天下信士朝廷重之其意依依常獨為西州言援商朝廷尤欲立信於此商度也必不負約援不得久留願急賜報廣竟不答八年帝自西征囂至漆漆縣屬右扶風諸將多以王師之重不宜逺入險阻計冘豫未決冘行貌也義見說文豫亦未定也冘音以林反㑹召援夜至帝大喜引入具以羣議質之廣雅曰質定也援因說隗囂將帥有土崩之勢兵進有必破之狀又於帝前聚米為山谷指畫形勢開示衆軍所從道徑往來分析曲折昭然可曉帝曰虜在吾目中矣明旦遂進軍至第一囂衆大潰第一解見竇融傳九年拜援為太中大夫副來歙監諸將平凉州自王莽末西羌寇邊遂入居塞内金城屬縣多為虜有來歙奏言隴西侵殘非馬援莫能定十一年夏璽書拜援隴西太守援廼發歩騎三千人擊破先零羌於臨洮斬首數百級獲馬牛羊萬餘頭守塞諸羌八千餘人詣援降諸種有數萬屯聚寇鈔拒浩亹隘浩亹音告門縣名屬金城郡浩水名也亹者水流夾山間兩岸深若門也詩曰鳬鷖在亹亦其義也今俗呼此水為閤門河蓋疾言之耳援與揚武將軍馬成擊之羌因將其妻子輜重移阻於允吾谷允吾音鈆牙援乃潛行間道掩赴其營羌大驚潰復遠徙唐翼谷中援復追討之羌引精兵聚北山上援陳軍向山而分遣數百騎繞襲其後乘夜放火擊鼓呌譟虜遂大潰凡斬首千餘級援以兵少不得窮追收其穀糧畜產而還援中矢貫脛帝以璽書勞之賜牛羊數千頭援盡班諸賓客是時朝臣以金城破羌之西破羌縣名屬金城郡故城在今鄯州湟水縣西塗遠多寇議欲棄之援上言破羌以西城多完牢易可依固其田土肥壤無塊曰壤灌溉流通如令羌在湟中湟水名據前書出金城臨羌縣東至允吾入河今鄯州湟水縣取其名也一名樂都水則為害不休不可棄也帝然之於是詔武威太守東觀記曰梁統也令悉還金城客民金城客人在武威者歸者三千餘口使各反舊邑援奏為置長吏繕城郭起塢候字林曰塢小障也一曰小城字或作隖音一古反開導水田勸以耕牧郡中樂業又遣羌豪楊封譬說塞外羌皆來和親又武都氐人背公孫述來降者援皆上復其侯王君長賜印綬帝悉從之乃罷馬成軍十三年武都參狼羌與塞外諸種為寇殺長吏援將四千餘人擊之至氐道縣氐道縣屬隴西郡縣管蠻夷曰道劉攽曰注管當作有是漢書本文後人不曉誤之羌在山上援軍據便地奪其水草不與戰羌遂窮困豪帥數十萬户亡出塞諸種萬餘人悉降於是隴右清靜援務開寛信恩以待下劉攽曰案此不成文理當云開恩信寛以待下任吏以職但總大體而已賓客故人日滿其門諸曹時白外事援輒曰此丞掾之任何足相煩續漢志曰郡當邊戍丞為長史又置諸曹掾史頗哀老子使得遨遊若大姓侵小民黠羌欲旅距此乃太守事耳旅距不從之貌傍縣嘗有報仇者吏民驚言羌反百姓奔入城郭狄道長詣門狄道縣屬隴西郡今蘭州縣也請閉城發兵援時與賓客飲大笑曰燒虜何敢復犯我燒虜即燒羌也曉狄道長歸守寺舍曉喻也寺舍官舍也良怖急者可牀下伏良甚也後稍定郡中服之視事六年徵入為虎賁中郎將初援在隴西上書言宜如舊鑄五銖錢事下三府三府奏以為未可許事遂寢及援還從公府求得前奏難十餘條乃隨牒解釋東觀記曰凡十三難援一一解之條奏其狀也更具表言帝從之天下賴其便援自還京師數被進見為人明須髮眉目如畫東觀記曰援長七尺五寸色理髪膚眉目容貌如畫閑於進對尤善述前世行事每言及三輔長者下至閭里少年皆可觀聽自皇太子諸王侍聞者莫不屬耳忘倦又善兵策帝常言伏波論兵與我意合每有所謀未嘗不用初卷人維汜卷縣名屬河南郡故城在今鄭州原武縣西北訞言稱神有弟子數百人坐伏誅後其弟子李廣等宣言汜神化不死以誑惑百姓十七年遂共聚㑹徒黨攻没皖城皖縣名屬廬江郡今舒州懷寧縣皖音下板反又下管反殺皖侯劉閔自稱南嶽太師遣謁者張宗將兵數千人討之復為廣所敗於是使援發諸郡兵合萬餘人擊破廣等斬之又交阯女子徵側及女弟徵貳反徵側者麊泠縣雒將之女也嫁為朱鳶人詩索妻甚雄勇交阯太守蘇定以法繩之側怨怒故反攻没其郡九眞日南合浦蠻夷皆應之寇略嶺外六十餘城側自立為王於是璽書拜援伏波將軍東觀記曰援上書臣所假伏波將軍印書伏字犬外嚮城臯令印臯字為白下羊丞印四下羊尉印白下人人下羊即一縣長吏印文不同恐天下不正者多符印所以為信也所宜齊同薦曉古文字者事下大司空正郡國印章奏可以扶樂侯劉隆為副扶樂縣名屬九眞郡督樓船將軍叚志等南擊交阯軍至合浦而志病卒詔援并將其兵遂緣海而進隨山刋道千餘里刋除也十八年春軍至浪泊上與賊戰破之斬首數千級降者萬餘人援追徵側等至禁谿數敗之賊遂散走明年正月斬徵側徵貳傳首洛陽越志云徵側兵起都麊泠縣及馬援討之奔入金溪穴中二年乃得之封援為新息侯食邑三千户援乃擊牛釃酒勞饗軍士釃酒濾也詩曰釃酒有藇毛萇注云以筐曰釃釃音所宜反從容謂官屬曰吾從弟少游常哀吾慷慨多大志曰士生一世但取衣食裁足乘下澤車周禮曰車人為車行澤者欲短轂行山者欲長轂短轂則利長轂則安也御款叚馬款猶緩也言形叚遲緩也為郡掾吏守墳墓}
