  - {type: variant, offset: 4024, length: 4036, content: 篇十餘萬言獻帝遜位之歲統卒時年四十一友人東海繆襲常稱統才章足繼西京董賈劉楊今簡撮其書有益政者略載之云理亂篇曰豪傑之當天命者未始有天下之分者也無天下之分故戰爭者競起焉于斯之時並偽假天威矯據方國擁甲兵與我角才智程勇力與我競雌雄不知去就疑誤天下蓋不可數也角知者皆窮角力者皆負形不堪復伉埶不足復校乃始羈首係頸就我之銜紲耳夫或曾為我之尊長矣或曾與我為等儕矣或曾臣虜我矣或曾執囚我矣彼之蔚蔚皆匈詈腹詛幸我之不成而以奮其前志詎肯用此為終死之分邪養子孫天下晏然皆歸心於我矣豪傑之心既絕士民之志已定貴有常家尊在一人當此之時雖下愚之才居之猶能使恩同天地威侔鬼神暴風疾霆不足以方其怒陽春時雨不足以喻其澤周孔數千無所復角其聖賁育百萬無所復奮其勇矣彼後嗣之愚主見天下莫敢與之違自謂若天地之不可亡也乃奔其私嗜騁其邪欲君臣宣淫上下同惡目極角觝之觀耳窮鄭衞之聲入則耽於婦人出則馳於田獵荒廢庶政𠫓廾亡人物澶漫彌流無所底極信任親愛者盡佞諂容說之人也寵貴隆豐者盡后妃姬妾之家也使餓狼守庖廚飢虎牧牢豚遂至熬天下之脂膏斲生人之骨髓怨毒無聊禍亂並起中國擾攘四夷侵叛土崩瓦解一朝而去昔之為我哺乳之子孫者今盡是我飲血之寇讎也至於運徙埶去猶不覺悟者豈非富貴生不仁沈溺致愚疾邪存亡以之迭代政亂從此周復天道常然之大數也以遠甚豈不然邪漢興以來相與同為編戶齊民而以財力相君長者世無數焉而清絜之士徒自苦於茨棘之閒無所益損於風俗也豪人之室連棟數百膏田滿野奴婢千羣徒附萬計船車賈販周於四方廢居積貯滿於都城琦賂寶貨巨室不能容馬牛羊豕山谷不能受妖童美妾填乎綺室倡謳樂列乎深堂賓客待見而不敢去車騎交錯而不敢進三牲之肉臭而不可食清醇之酎敗而不可飲睇盼則人從其目之所視喜怒則人隨其心之所慮此皆公侯之廣樂君長之厚實也苟能運智詐者則得之焉苟能得之者人不以為罪焉源發而橫流路開而四通矣求士之舍榮樂而居窮苦𠫓廾放逸而赴束縛夫誰肯為之者邪夫亂世長而化世短亂世則小人貴寵君子困賤當君子困賤之時跼高天蹐厚地猶恐有鎮厭之禍也逮至清世則復入於矯枉過正之檢老者耄矣不能及寬饒之俗少者方壯將復困於衰亂之時是使姦人擅無窮之福利而善士挂不赦之罪辜苟目能辯色耳能辯聲口能辯味體能辯寒溫者將皆以脩絜為諱惡設智巧以避之焉況肯有安而樂之者邪斯下世人主一切之愆也心屠裂天下吞食生人暴虐不已以招楚漢用兵之苦甚於戰國之時也漢二百年而遭王莽之亂計其殘夷滅亡之數又復倍乎秦項矣以及今日名都空而不居百里絕而無民者不可勝數此則又甚於亡新之時也悲夫不及五百年大難三起中閒之亂尚不數焉變而彌猜下而加酷推此以往可及於盡矣嗟乎不知來世聖人救此之道將何用也又不知天若窮此之數欲何至邪損益篇曰作有利於時制有便於物者可為也事有乖於數法有翫於時者可改也故行於古有其迹用於今無其功者不可不變變而不如前易有多所敗者亦不可不復也漢之初興分王子弟委之以士民之命假之以殺生之權於是驕逸自恣志意無厭魚肉百姓以盈其欲報蒸骨血以快其情上有篡叛不軌之姦下有暴亂殘賊之害雖藉親屬之恩蓋源流形埶使之然也降爵削土稍稍割奪卒至於坐食奉祿而已然其洿穢之行淫昏之罪猶尚多焉故淺其根本輕其恩義猶尚假一日之尊收士民之用況專之於國擅之於嗣豈可鞭笞叱咤而使唯我所為者乎時政彫敝風俗移易純樸已去智惠已來出於禮制之防放於嗜欲之域久矣固不可授之以柄假之以資者也是故收其奕世之權校其從橫之埶善者早登否者早去故下土無壅滯之士國朝無專貴之人此變之善可遂行者也辰龍章之服不為編戶一伍之長而有千室名邑之役榮樂過於封君埶力侔於守令財賂自營犯法不坐刺客死士為之投命至使弱力少智之子被穿帷敗寄死不斂冤枉窮困不敢自理雖亦由網禁疎闊蓋分田無限使之然也今欲張太平之紀綱立至化之基趾齊民財之豐寡正風俗之奢儉非井田實莫由也此變有所敗而宜復者也者無傷於人髡笞不足以懲中罪安得不至於死哉夫雞狗之攘竊男女之淫奔酒醴之賂遺謬誤之傷害皆非值於死者也殺之則甚重髡之則甚輕不制中刑以稱其罪則法令安得不參差殺生安得不過謬乎今患刑輕之不足以懲惡則假臧貨以成罪託疾病以諱殺科條無所準名實不相應恐非帝王之通法聖人之良制也或曰過刑惡人可也過刑善人豈可復哉曰若前政以來未曾枉害善人者則有罪不死也是為忍於殺人也而不忍於刑人也今令五刑有品輕重有數科條有序名實有正非殺人逆亂鳥獸之行甚重者皆勿殺嗣周氏之祕典續呂侯之祥刑此又宜復之善者也人上者也衆者為人下者也一伍之長才足以長一伍者也一國之君才足以君一國者也天下之王才足以王天下者也愚役於智猶枝之附幹此理天下之常法也制國以分人立政以分事人遠則難綏事總則難了今遠州之縣或相去數百千里雖多山陵洿澤猶有可居人種穀者焉當更制其境界使遠者不過二百里明版籍以相數閱審什伍以相連持限夫田以斷并兼定五刑以救死亡益君長以興政理急農桑以豐委積去末作以一本業敦教學以移情性表德行以厲風俗覈才蓺以官宜簡精悍以習師田修武器以存守戰嚴禁令以防僭差信實罰以驗懲勸糾游戲以杜姦邪察苛刻以絕煩暴審此十六者以為政務操之有常課之有限安寧勿懈墯有事不迫遽聖人復起不能易也狄居漢地者尚不在焉丁壯十人之中必有堪為其什伍之長推什長已上則百萬人也又十取之則佐史之才已上十萬人也又十取之則可使在政理之位者萬人也以筋力用者謂之人人求丁壯以才智用者謂之士士貴耆老充此制以用天下之人猶將有儲何嫌乎不足也故物有不求未有無物之歲也士有不用未有少士之世也夫如此然後可以用天性究人理興頓廢屬斷絕網羅遺漏拱柙天人矣也曰若是三代不足摹聖人未可師也君子用法制而至於化小人用法制而至於亂均是一法制也或以之化或以之亂行之不同也苟使豺狼牧羊豚盜跖主征稅國家昏亂吏人放肆則惡復論損益之閒哉夫人待君子然後化理國待蓄積乃無憂患君子非自農桑以求衣食者也蓄積非橫賦斂以取優饒者也奉祿誠厚則割剝貿易之罪乃可絕也蓄積誠多則兵寇水旱之灾不足苦也故由其道而得之民不以為奢由其道而取之民不以為勞天灾流行開倉庫以稟貸不亦仁乎衣食有餘損靡麗以散施不亦義乎彼君子居位為士民之長固宜重肉累帛朱輪四馬今反謂薄屋者為高藿食者為清既失天地之性又開虛偽之名使小智居大位庶績不咸熙未必不由此也得拘絜而失才能非立功之實也以廉舉而以貪去非士君子之志也夫選用必取善士善士富者少而貧者多祿不足以供養安能不少營私門乎從而罪之是設機置穽以待天下之君子也者猥萬里懸乏首尾不救徭役並起農桑失業兆民呼嗟於昊天貧窮轉死於溝壑矣今通肥饒之率計稼穡之入令畝收三斛斛取一斗未為甚多一歲之閒則有數年之儲雖興非法之役恣奢侈之欲廣愛幸之賜猶未能盡也不循古法規為輕稅及至一方有警一面被灾未逮三年校計騫短坐視戰士之蔬食立望餓殍之滿道如之何為君行此政也二十稅一名之曰貊況三十稅一乎夫薄吏祿以豐軍用緣於秦征諸侯續以四夷漢承其業遂不改更危國亂家此之由也今田無常主民無常居吏食日稟祿班祿未定可為法制畫一定科租稅十一更賦如舊今者土廣民稀中地未墾雖然猶當限以大家勿令過制其地有草者盡曰官田力堪農事乃聽受之若聽其自取後必為姦也法誡篇曰周禮六典冢宰貳王而理天下春秋之時諸侯明德者皆一卿為政爰及戰國亦皆然也秦兼天下則置丞相而貳之以御史大夫自高帝逮于孝成因而不改多終其身漢之隆盛是惟在焉夫任一人則政專任數人則相倚政專則和諧相倚則違戾和諧則太平之所興也違戾則荒亂之所起也光武皇帝慍數世之失權忿彊臣之竊命矯枉過直政不任下雖置三公事歸臺閣自此以來三公之職備員而已然政有不理猶加譴責而權移外戚之家寵被近習之豎親其黨類用其私人內充京師外布列郡顛倒賢愚貿易選舉疲駑守境貪殘牧民撓擾百姓忿怒四夷招致乖叛亂離斯瘼怨氣並作陰陽失和三光虧缺怪異數至蟲螟食稼水旱為灾此皆戚宦之臣所致然也反以策讓三公至於死免乃足為叫呼蒼天號咷泣血者也又中世之選三公也務於清売心謹慎循常習故者是婦女之檢柙鄉曲之常人耳惡足以居斯位邪埶既如彼選又如此而欲望三公勳立於國家績加於生民不亦遠乎昔文帝之於鄧通可謂至愛而猶展申徒嘉之志夫見任如此則何患於左右小臣哉至如近世外戚臣豎請託不行意氣不滿立能陷人於不測之禍惡可得彈正者哉曩者任之重而責之輕今者任之輕而責之重昔賈誼感絳侯之困辱因陳大臣廉恥之分開引自裁之端自此以來遂以成俗繼世之主生而見之習其所常曾莫之悟嗚呼可悲夫左手據天下之圖右手刎其喉愚者猶知難之況明哲君子哉光武奪三公之重至今而加甚不假后黨以權數世而不行蓋親疏之埶異也母后之黨左右之人有此至親之埶故其貴任萬世常然之敗無世而無之莫之斯鑒亦可痛矣未若置丞相自總之若委三公則宜分任責成夫使為政者不當與之婚姻婚姻者不當使之為政也如此在位病人舉用失賢百姓不安爭訟不息天地多變人物多妖然後可以分此罪矣或曰政在一人權甚重也曰人實難得何重之嫌昔者霍禹竇憲鄧騭梁冀之徒籍外戚之權管國家之柄及其伏誅以一言之詔詰朝而決何重之畏乎今夫國家漏神明於媟近輸權重於婦黨筭十世而為之者八九焉不此之罪而彼之疑何其詭邪論曰百家之言政者尚矣大略歸乎寧固根柢革易時敝也夫遭運無恆意見偏雜故是非之論紛然相乖嘗試妄論之以為世非胥庭人乖鷇飲化迹萬肇情故萌生雖周物之智不能研其推變山川之奧未足況其紆險則應俗適事難以常條如使用審其道則殊塗同會才爽其分則一豪以乖何以言之若夫玄聖御世則天同極施舍之道宜無殊典而損益異運文朴遞行用明居晦回泬於曩時興戈陳俎參差於上世及至戴黃屋服絺衣豐薄不齊而致化則一亦有宥公族黥國儲寬慘巨隔而防非必同此其分波而共源百慮而一致者也若乃偏情矯用則枉直必過故葛屨履霜敝由崇儉楚楚衣服戒在窮賒疎禁厚下以尾大陵弱斂威峻罰以苛薄分崩斯曹魏之刺所以明乎國風周秦末軌所以彰於微滅故用舍之端興敗資焉是以繁簡唯時寬猛相濟刑書鐫鼎事有可詳三章在令取貴能約太叔致猛政之襃國子流遺愛之涕宣孟改冬日之和平陽循畫一之法斯實薥張之弘致可以徵其統乎數子之言當世失得皆究矣然多謬通方之訓好申一隅之說貴清靜者以席上為腐議束名實者以柱下為誕辭或推前王之風可行於當年有引救敝之規宜流於長世稽之篤論將為敝矣如以舟無推陸之分瑟非常調之音不陽局以疑遠不拘玄以妨素則化樞各管其極理略可得而言與贊曰管視好偏羣言難一救朴雖文矯必疾舉端自理滯隅則失詳觀時蠹成昭政術, WYG: 考證}
  - {type: variant, offset: 4024, length: 4036, content: 篇十餘萬言獻帝遜位之歲統卒時年四十一友人東海繆襲常稱統才章足繼西京董賈劉楊今簡撮其書有益政者略載之云理亂篇曰豪傑之當天命者未始有天下之分者也無天下之分故戰爭者競起焉于斯之時並偽假天威矯據方國擁甲兵與我角才智程勇力與我競雌雄不知去就疑誤天下蓋不可數也角知者皆窮角力者皆負形不堪復伉埶不足復校乃始羈首係頸就我之銜紲耳夫或曾為我之尊長矣或曾與我為等儕矣或曾臣虜我矣或曾執囚我矣彼之蔚蔚皆匈詈腹詛幸我之不成而以奮其前志詎肯用此為終死之分邪養子孫天下晏然皆歸心於我矣豪傑之心既絕士民之志已定貴有常家尊在一人當此之時雖下愚之才居之猶能使恩同天地威侔鬼神暴風疾霆不足以方其怒陽春時雨不足以喻其澤周孔數千無所復角其聖賁育百萬無所復奮其勇矣彼後嗣之愚主見天下莫敢與之違自謂若天地之不可亡也乃奔其私嗜騁其邪欲君臣宣淫上下同惡目極角觝之觀耳窮鄭衞之聲入則耽於婦人出則馳於田獵荒廢庶政𠫓廾亡人物澶漫彌流無所底極信任親愛者盡佞諂容說之人也寵貴隆豐者盡后妃姬妾之家也使餓狼守庖廚飢虎牧牢豚遂至熬天下之脂膏斲生人之骨髓怨毒無聊禍亂並起中國擾攘四夷侵叛土崩瓦解一朝而去昔之為我哺乳之子孫者今盡是我飲血之寇讎也至於運徙埶去猶不覺悟者豈非富貴生不仁沈溺致愚疾邪存亡以之迭代政亂從此周復天道常然之大數也以遠甚豈不然邪漢興以來相與同為編戶齊民而以財力相君長者世無數焉而清絜之士徒自苦於茨棘之閒無所益損於風俗也豪人之室連棟數百膏田滿野奴婢千羣徒附萬計船車賈販周於四方廢居積貯滿於都城琦賂寶貨巨室不能容馬牛羊豕山谷不能受妖童美妾填乎綺室倡謳樂列乎深堂賓客待見而不敢去車騎交錯而不敢進三牲之肉臭而不可食清醇之酎敗而不可飲睇盼則人從其目之所視喜怒則人隨其心之所慮此皆公侯之廣樂君長之厚實也苟能運智詐者則得之焉苟能得之者人不以為罪焉源發而橫流路開而四通矣求士之舍榮樂而居窮苦𠫓廾放逸而赴束縛夫誰肯為之者邪夫亂世長而化世短亂世則小人貴寵君子困賤當君子困賤之時跼高天蹐厚地猶恐有鎮厭之禍也逮至清世則復入於矯枉過正之檢老者耄矣不能及寬饒之俗少者方壯將復困於衰亂之時是使姦人擅無窮之福利而善士挂不赦之罪辜苟目能辯色耳能辯聲口能辯味體能辯寒溫者將皆以脩絜為諱惡設智巧以避之焉況肯有安而樂之者邪斯下世人主一切之愆也心屠裂天下吞食生人暴虐不已以招楚漢用兵之苦甚於戰國之時也漢二百年而遭王莽之亂計其殘夷滅亡之數又復倍乎秦項矣以及今日名都空而不居百里絕而無民者不可勝數此則又甚於亡新之時也悲夫不及五百年大難三起中閒之亂尚不數焉變而彌猜下而加酷推此以往可及於盡矣嗟乎不知來世聖人救此之道將何用也又不知天若窮此之數欲何至邪損益篇曰作有利於時制有便於物者可為也事有乖於數法有翫於時者可改也故行於古有其迹用於今無其功者不可不變變而不如前易有多所敗者亦不可不復也漢之初興分王子弟委之以士民之命假之以殺生之權於是驕逸自恣志意無厭魚肉百姓以盈其欲報蒸骨血以快其情上有篡叛不軌之姦下有暴亂殘賊之害雖藉親屬之恩蓋源流形埶使之然也降爵削土稍稍割奪卒至於坐食奉祿而已然其洿穢之行淫昏之罪猶尚多焉故淺其根本輕其恩義猶尚假一日之尊收士民之用況專之於國擅之於嗣豈可鞭笞叱咤而使唯我所為者乎時政彫敝風俗移易純樸已去智惠已來出於禮制之防放於嗜欲之域久矣固不可授之以柄假之以資者也是故收其奕世之權校其從橫之埶善者早登否者早去故下土無壅滯之士國朝無專貴之人此變之善可遂行者也辰龍章之服不為編戶一伍之長而有千室名邑之役榮樂過於封君埶力侔於守令財賂自營犯法不坐刺客死士為之投命至使弱力少智之子被穿帷敗寄死不斂冤枉窮困不敢自理雖亦由網禁疎闊蓋分田無限使之然也今欲張太平之紀綱立至化之基趾齊民財之豐寡正風俗之奢儉非井田實莫由也此變有所敗而宜復者也者無傷於人髡笞不足以懲中罪安得不至於死哉夫雞狗之攘竊男女之淫奔酒醴之賂遺謬誤之傷害皆非值於死者也殺之則甚重髡之則甚輕不制中刑以稱其罪則法令安得不參差殺生安得不過謬乎今患刑輕之不足以懲惡則假臧貨以成罪託疾病以諱殺科條無所準名實不相應恐非帝王之通法聖人之良制也或曰過刑惡人可也過刑善人豈可復哉曰若前政以來未曾枉害善人者則有罪不死也是為忍於殺人也而不忍於刑人也今令五刑有品輕重有數科條有序名實有正非殺人逆亂鳥獸之行甚重者皆勿殺嗣周氏之祕典續呂侯之祥刑此又宜復之善者也人上者也衆者為人下者也一伍之長才足以長一伍者也一國之君才足以君一國者也天下之王才足以王天下者也愚役於智猶枝之附幹此理天下之常法也制國以分人立政以分事人遠則難綏事總則難了今遠州之縣或相去數百千里雖多山陵洿澤猶有可居人種穀者焉當更制其境界使遠者不過二百里明版籍以相數閱審什伍以相連持限夫田以斷并兼定五刑以救死亡益君長以興政理急農桑以豐委積去末作以一本業敦教學以移情性表德行以厲風俗覈才蓺以官宜簡精悍以習師田修武器以存守戰嚴禁令以防僭差信實罰以驗懲勸糾游戲以杜姦邪察苛刻以絕煩暴審此十六者以為政務操之有常課之有限安寧勿懈墯有事不迫遽聖人復起不能易也狄居漢地者尚不在焉丁壯十人之中必有堪為其什伍之長推什長已上則百萬人也又十取之則佐史之才已上十萬人也又十取之則可使在政理之位者萬人也以筋力用者謂之人人求丁壯以才智用者謂之士士貴耆老充此制以用天下之人猶將有儲何嫌乎不足也故物有不求未有無物之歲也士有不用未有少士之世也夫如此然後可以用天性究人理興頓廢屬斷絕網羅遺漏拱柙天人矣也曰若是三代不足摹聖人未可師也君子用法制而至於化小人用法制而至於亂均是一法制也或以之化或以之亂行之不同也苟使豺狼牧羊豚盜跖主征稅國家昏亂吏人放肆則惡復論損益之閒哉夫人待君子然後化理國待蓄積乃無憂患君子非自農桑以求衣食者也蓄積非橫賦斂以取優饒者也奉祿誠厚則割剝貿易之罪乃可絕也蓄積誠多則兵寇水旱之灾不足苦也故由其道而得之民不以為奢由其道而取之民不以為勞天灾流行開倉庫以稟貸不亦仁乎衣食有餘損靡麗以散施不亦義乎彼君子居位為士民之長固宜重肉累帛朱輪四馬今反謂薄屋者為高藿食者為清既失天地之性又開虛偽之名使小智居大位庶績不咸熙未必不由此也得拘絜而失才能非立功之實也以廉舉而以貪去非士君子之志也夫選用必取善士善士富者少而貧者多祿不足以供養安能不少營私門乎從而罪之是設機置穽以待天下之君子也者猥萬里懸乏首尾不救徭役並起農桑失業兆民呼嗟於昊天貧窮轉死於溝壑矣今通肥饒之率計稼穡之入令畝收三斛斛取一斗未為甚多一歲之閒則有數年之儲雖興非法之役恣奢侈之欲廣愛幸之賜猶未能盡也不循古法規為輕稅及至一方有警一面被灾未逮三年校計騫短坐視戰士之蔬食立望餓殍之滿道如之何為君行此政也二十稅一名之曰貊況三十稅一乎夫薄吏祿以豐軍用緣於秦征諸侯續以四夷漢承其業遂不改更危國亂家此之由也今田無常主民無常居吏食日稟祿班祿未定可為法制畫一定科租稅十一更賦如舊今者土廣民稀中地未墾雖然猶當限以大家勿令過制其地有草者盡曰官田力堪農事乃聽受之若聽其自取後必為姦也法誡篇曰周禮六典冢宰貳王而理天下春秋之時諸侯明德者皆一卿為政爰及戰國亦皆然也秦兼天下則置丞相而貳之以御史大夫自高帝逮于孝成因而不改多終其身漢之隆盛是惟在焉夫任一人則政專任數人則相倚政專則和諧相倚則違戾和諧則太平之所興也違戾則荒亂之所起也光武皇帝慍數世之失權忿彊臣之竊命矯枉過直政不任下雖置三公事歸臺閣自此以來三公之職備員而已然政有不理猶加譴責而權移外戚之家寵被近習之豎親其黨類用其私人內充京師外布列郡顛倒賢愚貿易選舉疲駑守境貪殘牧民撓擾百姓忿怒四夷招致乖叛亂離斯瘼怨氣並作陰陽失和三光虧缺怪異數至蟲螟食稼水旱為灾此皆戚宦之臣所致然也反以策讓三公至於死免乃足為叫呼蒼天號咷泣血者也又中世之選三公也務於清売心謹慎循常習故者是婦女之檢柙鄉曲之常人耳惡足以居斯位邪埶既如彼選又如此而欲望三公勳立於國家績加於生民不亦遠乎昔文帝之於鄧通可謂至愛而猶展申徒嘉之志夫見任如此則何患於左右小臣哉至如近世外戚臣豎請託不行意氣不滿立能陷人於不測之禍惡可得彈正者哉曩者任之重而責之輕今者任之輕而責之重昔賈誼感絳侯之困辱因陳大臣廉恥之分開引自裁之端自此以來遂以成俗繼世之主生而見之習其所常曾莫之悟嗚呼可悲夫左手據天下之圖右手刎其喉愚者猶知難之況明哲君子哉光武奪三公之重至今而加甚不假后黨以權數世而不行蓋親疏之埶異也母后之黨左右之人有此至親之埶故其貴任萬世常然之敗無世而無之莫之斯鑒亦可痛矣未若置丞相自總之若委三公則宜分任責成夫使為政者不當與之婚姻婚姻者不當使之為政也如此在位病人舉用失賢百姓不安爭訟不息天地多變人物多妖然後可以分此罪矣或曰政在一人權甚重也曰人實難得何重之嫌昔者霍禹竇憲鄧騭梁冀之徒籍外戚之權管國家之柄及其伏誅以一言之詔詰朝而決何重之畏乎今夫國家漏神明於媟近輸權重於婦黨筭十世而為之者八九焉不此之罪而彼之疑何其詭邪論曰百家之言政者尚矣大略歸乎寧固根柢革易時敝也夫遭運無恆意見偏雜故是非之論紛然相乖嘗試妄論之以為世非胥庭人乖鷇飲化迹萬肇情故萌生雖周物之智不能研其推變山川之奧未足況其紆險則應俗適事難以常條如使用審其道則殊塗同會才爽其分則一豪以乖何以言之若夫玄聖御世則天同極施舍之道宜無殊典而損益異運文朴遞行用明居晦回泬於曩時興戈陳俎參差於上世及至戴黃屋服絺衣豐薄不齊而致化則一亦有宥公族黥國儲寬慘巨隔而防非必同此其分波而共源百慮而一致者也若乃偏情矯用則枉直必過故葛屨履霜敝由崇儉楚楚衣服戒在窮賒疎禁厚下以尾大陵弱斂威峻罰以苛薄分崩斯曹魏之刺所以明乎國風周秦末軌所以彰於微滅故用舍之端興敗資焉是以繁簡唯時寬猛相濟刑書鐫鼎事有可詳三章在令取貴能約太叔致猛政之襃國子流遺愛之涕宣孟改冬日之和平陽循畫一之法斯實薥張之弘致可以徵其統乎數子之言當世失得皆究矣然多謬通方之訓好申一隅之說貴清靜者以席上為腐議束名實者以柱下為誕辭或推前王之風可行於當年有引救敝之規宜流於長世稽之篤論將為敝矣如以舟無推陸之分瑟非常調之音不陽局以疑遠不拘玄以妨素則化樞各管其極理略可得而言與贊曰管視好偏羣言難一救朴雖文矯必疾舉端自理滯隅則失詳觀時蠹成昭政術, krp: 考證}
