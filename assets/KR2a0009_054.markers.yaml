  - {type: variant, offset: 1016, length: 982, content: 千縣巿邑萬數類皆如此本末不足相供則民安得不飢寒飢寒並至則民安能無姦軌姦軌繁多則吏安能無嚴酷嚴酷數加則下安能無愁怨愁怨者多則咎徵並臻下民無聊而上天降灾則國危矣之誨之慎微防萌以斷其邪故易美節以制度不傷財不害民七月之詩大小教之終而復始由此觀之人固不可恣也事丁夫不扶犂鋤而懷丸挾彈攜手上山遨遊或好取土作丸賣之外不足禦寇盜內不足禁鼠雀或作泥車瓦狗諸戲弄之具以巧詐小兒此皆無益也舞事神以欺誣細民熒惑百姓妻女羸弱疾病之家懷憂憤憤易為恐懼至使奔走便時去離正宅崎嶇路側風寒所傷姦人所利盜賊所中或增禍重祟至於死亡而不知巫所欺誤反恨事神之晚此妖妄之甚者也截衆縷繞帶手腕或裁切綺縠繨紩成幡皆單費百縑用功千倍破牢為偽以易就難坐食嘉穀消損白日夫山林不能給野火江海不能實漏巵皆所宜禁也王制固亦甚矣且其徒御僕妾皆服文組綵牒錦繡綺紈葛子升越筩中女布犀象珠玉虎魄瑁石山隱飾金銀錯鏤窮極麗靡轉相誇咤其嫁娶者車軿數里緹帷竟道騎奴侍童夾轂並引富者競欲相過貧者恥其不逮一饗之所費破終身之業古者必有命然後乃得衣繒絲而乘車馬今雖不能復古宜令細民略用孝文之制槨桐木為棺葛采為緘下不及泉上不泄臭中世以後轉用楸梓槐柏杶樗之屬各因方土裁用膠漆使其堅足恃其用足任如此而已今者京師貴戚必欲江南檽梓豫章之木邊遠下土亦競相放効夫檽樟豫章所出殊遠伐之高山引之窮谷入海乘淮逆河泝洛工匠彫刻連累日月會衆而後動多牛而後致重且千斤功將萬夫而東至樂浪西達敦煌費力傷農於萬里之地古者墓而不墳中世墳而不崇仲尼喪母冢高四尺遇雨而崩弟子請修之夫子泣曰古不修墓及鯉也死有棺無椁文帝葬芷陽明帝葬洛南皆不臧珠寶不起山陵墓雖卑而德最高今京師貴戚郡縣豪家生不極養死乃崇喪或至金縷玉匣檽梓楩多埋珍寶偶人車馬造起大冢廣種松柏廬舍祠堂務崇華侈案鄗畢之陵南城之冢周公非不忠曾子非不孝以為襃君愛父不在於聚財揚名顯親無取於車馬昔晉靈公多賦以雕牆春秋以為非不君華元樂舉厚葬文公君子以為不臣況於羣司士庶乃可僭侈主上過天道乎實貢篇曰國以賢興以諂衰君以忠安以佞危此古今之常論而時所共知也然衰國危君繼踵不絕者豈時無忠信正直之士哉誠苦其道不得行耳夫十步之閒必有茂草十室之邑必有忠信是故亂殷有三仁小衞多君子今以大漢之廣土士民之繁庶朝廷之清明上下之脩正而官無善吏位無良臣此豈時之無賢諒由取之乖實夫志道者少與逐俗者多疇是以朋黨用私背實趨華其貢士者不復依其質幹準其才行但虛造聲譽妄生羽毛略計, WYG: ''}
