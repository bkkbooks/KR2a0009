  - {type: variant, offset: 66, length: 0, content: '', krp: 下史記曰燕將攻下聊城人或讒之於燕燕將懼誅因保}
  - {type: variant, offset: 67, length: 2, content: 章句, WYG: 聊城不敢歸聊即今博州聊城縣也豈其甘心末規哉悼巧言之傷類也未規猶下計也詩云巧言如簧類善也竊見故伏波將軍新息侯馬援拔自西州欽慕聖義間關險難間關猶崎嶇也觸冒萬死孤立羣貴之間傍無一言之佐馳深淵入虎口豈顧計哉戰國策曰魏安釐王畏秦將入朝周訢止之王曰許綰為我咒曰若入不出請徇寡人以首周訢對曰今有人謂臣入不測之泉而徇臣以鼠首可乎綰之首猶鼠首也内王于不測之秦而徇王以首竊為王不取也司馬遷書曰垂餌虎口又曰夫人臣出萬死不顧一生之計赴公}
  - {type: page-break, offset: 67, content: '', id: KR2a0009_WYG_054-20a, image: WYG0252/WYG0252-0633a.png}
