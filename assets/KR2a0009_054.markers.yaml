  - {type: variant, offset: 72, length: 0, content: '', krp: 悔吝之心吝猶恨也遂斬滅徵側克平一州南海蒼梧鬱林合浦交阯日南九眞皆屬交州間復南討立陷臨鄉師已有業未竟而死吏士雖疫援不獨存夫戰或以久而立功或以速而致敗深入未必為得不進未必為非人情豈樂久屯絶地不生歸哉惟援得事朝廷二十二年北出塞漠南渡江海觸冒害氣僵死軍事僵仆也名滅爵絶國土不傳海内不知其過衆庶未聞其毁卒遇三夫之言橫被誣罔之讒韓子曰龐共與魏太子質於邯鄲共謂魏王曰今一人言市有虎王信乎王曰否二人言信乎王曰否三人言王信乎曰寡人信龐共曰夫市無虎明矣然三人言誠市有虎今邯鄲去魏遠於市謗臣者過三人願主熟察之家屬杜門葬不歸墓怨隙並興宗親怖慄死者不能自列生者莫為之訟臣竊傷之夫明主醲於用賞約於用刑高祖嘗與陳平金四萬斤以間楚軍不問出入所為豈復疑以錢穀間哉夫操孔父之忠而不能自免於讒此鄒陽之所悲也史記鄒陽書曰昔者魯聽季孫之說而逐孔子宋信子罕之計而囚墨翟夫以孔墨之辯不能自免於讒諛詩云取彼讒人投畀豺虎豺虎不食投畀有北有北不受投畀有昊詩小雅巷伯篇也畀與也昊昊天也投與昊天制其罰也此言欲令上天而平其惡惟陛下留思豎儒之言言其僮豎無知也高祖曰豎儒幾敗吾事無使功臣懷恨黃泉臣聞春秋之義罪以功除公羊傳曰夏滅項孰滅之齊滅之曷為不言齊滅為桓公諱也以桓公常有繼絶存亡之功故君子為之諱也聖王之祀臣有五義禮記曰夫聖王之制祀也法施於人則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之能捍大患則祀之若援所謂以死勤事者也願下公卿平援功罪宜絶宜續以厭海内之望臣年已六十常伏田里竊感欒布哭彭越之義前書曰彭越為梁王欒布為梁大夫使於齊越以謀反梟首洛陽詔有收視者捕之布使還奏事越頭下祠而哭之冒陳悲憤戰慄闕庭書奏報歸田里勃字叔陽年十二能誦詩}
