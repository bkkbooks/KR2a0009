  - {type: variant, offset: 2077, length: 330, content: 平之時而云無士乎以石洗金以鹽濯錦以魚浣布以灰夫物固有以賤理貴以醜化好者矣智者𠫓廾短取長以致其功今使貢士必覈以實其有小疵勿彊衣飾出處默語各因其方則蕭曹周韓之倫何足不致吳鄧梁竇之屬企踵可待孔子曰未之思也夫何遠之有愛日篇曰國之所以為國者以有民也民之所以為民者以有穀也穀之所以豐殖者以有民功也功之所以能建者以日力也化國之日舒以長故其民閑暇而力有餘亂國之日促以短故其民困務而力不足舒長者非謂羲和安行乃君明民靜而力有餘也促短者非謂分度損減乃上闇下亂力不足也孔子稱既庶則富之既富乃教之是故禮義生於富足盜竊起於貧窮富足生於寬暇貧窮起於無日聖人深知力者民之本國之基也故務省徭役使之愛日是以堯勑羲和欽若昊天敬授民時明帝時公車以反支日不受章奏帝聞而怪曰民廢農桑遠來詣闕而復拘以禁忌豈, WYG: 叔}
