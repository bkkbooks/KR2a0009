  - {type: variant, offset: 51, length: 2, content: 受業, WYG: 軍吏經瘴疫死者十四五賜援兵車一乘朝見位次九卿援好騎善别名馬於交阯得駱越銅鼓乃鑄為馬式式法也裴氏廣州記曰狸獠鑄銅為皷皷唯高大為貴面闊丈餘初成懸於庭剋晨置酒招致同類來者盈門豪富子女以金銀為大釵執以叩鼔叩竟留遺主人也還上之因表曰夫行天莫如龍行地莫如馬史記平準書曰以為在天莫如龍在地莫如馬馬者甲兵之本國之大用安寧則以别尊卑之序有變則以濟遠近之難昔有騏驥一日千里伯樂見之昭然不惑伯樂秦穆公時善相馬者也桓寛鹽鐵論曰騏驥負鹽車垂頭於}
