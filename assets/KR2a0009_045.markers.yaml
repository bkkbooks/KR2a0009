  - {type: variant, offset: 36, length: 3, content: 矝夸館, WYG: 黄顯相善時顯為中郎将聞之謂守曰今關門禁嚴君状貎非凡将以此安之不如詣闕自歸事既未然脱可免禍守従其計即上書歸死章未及報留闕下㑹事發覺通得亡走莽聞之乃繫守於獄而黄顯為請曰守聞子無狀無状謂祸大不可名言其状也不敢逃亡守義自信歸命宫闕臣顯願質守俱東曉說其子如遂悖逆令守北向刎首以謝大恩刎割也莽然其言㑹前隊復上通起兵之狀莽怒欲殺守顯争之遂并被誅及守家在長安者盡殺之南陽亦誅通兄弟門宗六十四人皆焚屍宛市時漢兵亦已大合通與光武李軼相遇棘陽遂共破前隊殺甄阜梁丘賜更始立以通為柱國大将軍輔漢侯従至長安更拜為大将軍封西平王軼為舞隂王通従弟松為丞相更始使通持節還鎮荆州通因娶光武女弟伯姬是為寜平公主寜平縣屬淮陽國也光武即位徴通為衞尉建武二年封固始侯拜大司農帝每征討四方常令通居守京師鎮撫百姓修宫}
