  - {type: variant, offset: 1693, length: 0, content: '', WYG: 也王莽地皇元年下書曰方出軍行師有趨讙犯者斬無須時於是春夏斬人都市百姓震懼也劉攽曰注有趨讙犯者案前書犯字下少一法字往時㑹宛獨當應邪光武笑不荅及漢兵起晨將賔客㑹棘陽漢兵敗小長安諸將多亡家屬光武單馬遁走遇女弟伯姬與共騎而奔前行復見元趣令上馬元以手撝曰行矣不能相救無為兩沒也㑹追兵至元及三女皆遇害漢兵退保棘陽而新野宰乃汚晨宅焚其冢墓宗族皆恚怒曰家自富足何故隨婦家人入湯鑊中晨終無恨色更始立以晨為偏將軍與光武略地潁川俱夜出昆陽城擊破王尋王邑又别徇陽翟以東至京密皆下之京密二縣名屬河南郡京故城在今鄭州滎陽東鄭之京邑也密故城在滎陽東南也更始北都洛陽以晨為常山太守㑹王郎反光武自薊走信都晨亦間行㑹於鉅鹿下自請従擊邯鄲光武曰偉卿以一身従我不如以一郡為我北道主人乃遣晨歸郡光武追銅馬髙胡羣賊於冀州劉攽曰案賊本以地自名故當如他處}
