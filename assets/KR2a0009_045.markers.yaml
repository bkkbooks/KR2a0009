  - {type: variant, offset: 33, length: 1, content: 實, WYG: 孫尤謹閨門之内如官廷也初事劉歆好星歴讖記為王莽宗卿師平帝五年莽攝政郡國置宗師以主宗室盖特尊之故曰宗卿師也通亦為五威將軍従事出補巫丞有能名王莽置五威將軍従事謂驅使小官前書}
