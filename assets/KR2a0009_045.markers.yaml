  - {type: variant, offset: 1700, length: 0, content: '', WYG: 十一年歙與蓋延馬成進攻公孫述将王元環安扵河池下辯陷之乗勝遂進蜀人大懼使刺客刺歙未殊馳召蓋延延見歙因伏悲哀不能仰視歙叱延曰虎牙何敢然今使者中刺客無以報國故呼巨卿欲相屬以軍事而反效兒女子涕泣乎刃雖在身不能勒兵斬公邪延收淚强起受所誡歙自書表曰臣夜人定}
