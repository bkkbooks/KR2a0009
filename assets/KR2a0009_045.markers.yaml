  - {type: variant, offset: 1667, length: 0, content: '', WYG: 城南髙處望常戰力甚馳遣中黄門詔使引還賊遂降又别率騎都尉王霸共平沛郡賊東觀記曰沛郡賊苗虚也六年春徵還洛陽令夫人迎常於舞陽歸家上冡西屯長安拒隗囂七年使使者持璽書即拜常為横野大将軍位次與諸将絶席絶席謂尊顯之也漢官儀曰御史大夫尚書令司𨽻校尉皆専席號三獨坐常别擊破隗囂将高峻於朝那朝那縣屬安定郡也囂遣將過烏氏常要擊破之轉降保塞𦍑諸營壁皆平之九年擊内黄賊破降之後北屯故安拒盧芳故安縣屬涿郡故城在今易州易縣南也十二年薨于屯所謚曰節侯子廣嗣三十年徙封石城侯石城故城在今復州沔陽縣東南也永平十四年坐與楚事相連國除鄧晨傳鄧晨字偉卿南陽新野人也世吏二千石東觀記曰晨曽祖父隆揚州刺史祖父勲交趾刺史父宏豫章都尉晨初娶光武姊元王莽末光武嘗與兄伯升及晨俱之宛與穰人蔡少公等讌語少公頗學圖讖言劉秀當為天子或曰是國師公劉秀乎光武戲曰何用知非僕邪坐者皆大笑晨心獨喜東觀記曰晨與上共載出逢使者不下車使者怒頗加耻辱上稱江夏卒史晨更名侯家承使者}
