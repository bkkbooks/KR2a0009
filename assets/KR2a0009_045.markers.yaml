  - {type: variant, offset: 1694, length: 2, content: 賓戲, krp: 湖字晨發積射士千人積與迹同古字通用謂尋迹而射之又遣委輸給軍不絶光武即位封晨房子侯房子今趙州縣也帝又感悼姊沒於亂兵追封諡元為新野節義長公主立廟扵縣西封晨長子汎為呉房侯呉房今豫州縣也}
  - {type: variant, offset: 1697, length: 0, content: '', WYG: 奉公主之祀建武三年徵晨還京師數讌見説故舊平生為歡晨従容謂帝曰僕竟辯之光武前語晨云何用知非僕乎故晨有此言也帝大笑従幸章陵拜光祿大夫使持節監執金吾賈復等擊平邵陵新息賊新息今豫州縣也四年従幸夀春留鎮九江晨好樂郡職由是復拜為中山太守吏民稱之常為冀州髙第中山屬冀州於冀州所部郡課常為第一也十三年更封南䜌侯䜌音力全反入奉朝請復為汝南太守十八年行幸章陵徵晨行廷尉事従至新野置酒酣讌賞賜數百千萬復遣歸郡晨興鴻郤陂數千頃田鴻郤陂名在今豫州汝陽縣東成帝時闗東水陂溢為害翟方進為丞相奏罷之汝土以殷魚稻之饒流衍它郡衍饒也眀年定封西華侯復徵奉朝請二十五年卒詔遣中謁者備公主官屬禮儀漢官儀曰長公主官屬傅一人員吏五人騶僕射五人私府長食官長永巷令家令各一人也招迎新野主魂與晨合𦵏扵北芒乘輿與中宫親臨喪送葬謚曰恵侯小子棠嗣後徙封武當侯棠卒子固嗣固卒子國嗣國卒子福嗣永建元年卒無子國除來歙傳來歙字君叔歙音許及反南陽新野人也六世祖漢有才力武帝世以光禄大夫副樓舩将軍楊僕擊破南越朝鮮父仲東觀記仲作冲哀帝時為諌大夫娶光武祖姑生歙光武甚親敬之數共往来長安漢兵起王莽以歙劉氏外屬乃收繫之賔客共簒奪得免更始即位以歙為吏従入關數言事不用以病去歙女弟為漢中王劉嘉妻嘉遣人迎歙因南之漢中更始敗歙勸嘉歸光武遂與嘉俱東詣洛陽帝見歙大歡即解衣以衣之東觀記曰解所被襜襦以衣歙也拜為太中大夫是時方以隴蜀為憂獨謂歙曰今西州未附西州謂隗囂也子陽稱帝道里阻逺諸將方務關東思西州方略未知所任其謀若何歙因}
