  - {type: variant, offset: 2201, length: 0, content: '', WYG: 失色薛皓先頓首曰固宜如眀詔歷怫然字林曰怫鬱也怫音扶勿反廷詰皓曰屬通諌何言而今復背之屬近也通猶共也近言共諌何乃相背也大臣乗朝車處國事固復輾轉若此乎周禮曰卿乗夏縵大夫乗墨車輾轉不定也詩云展轉反側乃各稍自引起歷獨守闕連日不肯去帝大怒乃免歷兄弟官削國租黜公主不得㑹見歷遂杜門不與親戚通時人為之震慄及帝崩閻太后起歷為將作大匠順帝即位朝廷咸稱社稷臣於是遷為衞尉祋諷劉瑋閭丘𢎞等先卒皆拜其子為郎朱倀倀音丑良反施延陳光趙代等並為公卿任職徵王男邴吉家屬還京師厚加賞賜籍建髙梵等悉䝉顯擢永建元年拜歷車騎將軍弟祉為歩兵校尉超為黄門侍郎三年母長公主薨歴稱病歸第服闋復為大鴻臚陽嘉二年卒官子定嗣定尚安帝妺平氏長公主順帝時為虎賁中郎将定卒子虎嗣桓帝時為屯騎校尉弟豔字季徳少好學下士}
