  - {type: variant, offset: 1752, length: 0, content: '', WYG: 謀哉而能獨以信稱者良其誠心在乎使兩義俱安而已不私其功也歴字伯􅈿少襲爵以公主子永元中為侍中監羽林右騎羽林騎武帝置宣帝令中郎將騎都尉監羽林見前書永初三年遷射聲校尉永寜元年代馮石為執金吾延光元年尊歴母為長公主二年遷歴太僕眀年中常侍樊豐與大將軍耿寳侍中周廣謝惲等共讒陷太尉楊震震遂自殺歴謂侍御史虞詡曰耿寳託元舅}
