  - {type: variant, offset: 1876, length: 7, content: 接者也故自建武, WYG: 通時皇太子驚病不安避幸安帝乳母野王君王聖舎太子乳母王男厨監邴吉等以為聖舎新繕修犯土禁不可久御聖及其女永與大長秋江京及中常侍樊豐王男邴吉等互相是非聖永遂誣譖男吉皆幽囚死家屬徙比景太子思男等數為歎息京豐懼有後害妄造虚無構讒太子及東宫官屬帝怒召公卿以下㑹議廢立耿寳等承旨皆以為太子當廢歴與太常桓焉廷尉張皓議曰經説年未滿十五過惡不在其身且男吉}
