  - {type: variant, offset: 2654, length: 662, content: 不弘厥道至乎經緯乾坤出入三光外運混元內浸豪芒性類循理品物咸亨其已久矣謙兢兢業業貶成抑定不敢論制作至令遷正黜色賓監之事煥揚宇內而禮官儒林屯朋篤論之士而不傳祖宗之仿佛雖云優慎無乃葸歟天經惇睦辯章之化洽巡靖黎蒸懷保魚眾寡之惠浹燔瘞縣沈肅祗羣神之禮備是以鳳皇來儀集羽族於觀魏肉角馴毛宗於外囿擾緇文皓質於郊升黃暉采鱗於沼甘露宵零於豐草三足軒翥於茂樹若乃嘉穀靈草奇獸神禽應圖合諜窮祥極瑞者朝夕坰牧日月邦畿卓犖乎方州羨溢乎要荒昔姬有素雉朱烏玄秬黃之事耳君臣動色左右相趨濟濟翼翼峨峨如也蓋用昭明寅畏承聿懷之福亦以寵靈文武貽燕後昆覆以懿鑠豈其為身而有顓辭也若然受之宜亦勤恁旅力以充厥道啟恭館之金縢御東序之祕寶以流其占也順命以創制定性以和神荅三靈之繁祉展放唐之明文茲事體大而允寤寐次于聖心瞻前顧後豈蔑清廟憚勑天乎伊考自邃古乃降戾爰茲作者七十有四人有不俾而假素罔光度而遺章今其如台而獨闕也源肴覈仁義之林藪以望元符之臻焉既成羣后之讜辭又悉經五繇之碩慮矣將絣萬嗣煬洪暉奮景炎扇遺風播芳烈久而愈新用而不竭汪汪乎丕天之大律其疇能亘之哉唐哉皇哉皇哉唐哉固後以母喪去官永元初大將軍竇憲出征匈奴以固為中護軍與參議北單于聞漢軍出遣使款居延塞欲脩呼韓邪故事朝見天子請大使憲上遣固行中郎將事將數百騎與虜使俱出居延塞迎之會南匈奴掩破北庭固至私渠海聞虜中亂引還及竇憲敗固先坐免官固不教學諸子諸子多不遵法度吏人苦之初洛陽令种兢嘗行固奴干其車騎吏椎呼之奴醉罵兢大怒畏憲不敢發心銜之及竇氏賓客皆逮考兢因此捕繫固遂死獄中時年六十一詔以譴責兢抵主者吏罪固所著典引賓戲應譏詩賦銘誄頌, WYG: ''}
