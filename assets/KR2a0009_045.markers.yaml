  - {type: variant, offset: 1663, length: 0, content: '', WYG: 篤焉論曰子曰富與貴是人之所欲不以其道得之不處也李通豈知夫所欲而未識以道者乎夫天道性命聖人難言之况乃億測微隠猖狂無妄之福㣲隠謂䜟文也荘子曰猖狂妄行易无妄卦曰无妄之往何之矣鄭𤣥注云妄之言望人所望宜正行必有所望行而無所望是失其正何可往也即史記朱英曰代有無望之福又有無望之禍是也汙滅親宗以觖一切之功哉停水曰汙言族滅而汙池之也觖望也音丘瑞反一切謂權時也昔蒙穀負書不徇楚難戰國策曰呉楚戰於栢舉呉師入郢蒙穀奔入宫負離次之典浮江逃於雲夢之中後昭王反郢五官失法百姓昬亂䝉穀獻典五官得法百姓大化校䝉穀之功與存國相若封之執圭蒙穀怒曰穀非人臣也社稷之臣也茍社稷血食余豈患無君乎遂棄於歴山也即墨用齊義雪燕恥史記曰燕昭王伐齊湣王敗出亡燕人入臨菑盡取齊寳燒其宫室宗廟下齊七十餘城其不下者唯獨莒即墨後齊田單以即墨擊破燕軍悉復所亡城故曰雪也彼之趣舎所立其殆與通異乎王常傳王常字顔卿潁川舞陽人也東觀記曰其先鄠人常父博成哀間轉客潁川舞陽因家焉王莽末為弟報仇亡命江夏命者名也言背其名籍而逃亡也久之與王鳳王匡等起兵雲杜綠林中聚衆數萬人以常為偏裨攻傍縣後與成丹張卬别入南郡藍口號下江兵續漢志曰南郡編縣有藍口聚王莽遣嚴尤陳茂擊破之常與丹卬收散卒入蔞谿蔞音力于反劫略鍾龍間盛𢎞之荆州記曰永陽縣北有石龍山在今安州應山縣東北又随州随縣東北有三鍾山也衆復振引軍與荆州牧戰於上唐大破之上唐郷名故城在今随州棗陽縣東北也遂北至宜秋續漢志曰南郡有宜秋聚也是時漢兵與新市平林衆俱敗於小長安各欲解去伯升聞下江軍在宜秋即與光武及李通俱造常壁曰願見下江一賢将議大事成丹張卬共推遣常伯升見常說以合從之利以利合曰從也常大悟曰王莽簒弑殘虐天下百姓思漢故豪傑並起今劉氏復興即真主也誠思出身為用輔成大功伯升曰如事成豈敢獨饗之哉遂與常深相結而去常還具為丹卬言之丹卬負其衆皆曰大丈夫既起當各自為主何故受人制乎常心獨歸漢乃稍曉説其将帥曰往者成哀衰微無嗣故王莽得承間簒位既有天下而政令苛酷積失百姓之心民之謳吟思漢非一日也故使吾屬因此得起夫民所怨者天所去也民所思者天所與也舉大事必當下順民心上合天意功乃可成若負强恃勇觸情恣欲雖得天下必復失之以秦項之埶尚至夷覆况今布衣相聚草澤以此行之滅亡之道也今南陽諸劉舉宗起兵觀其來議事者皆有深計大慮王公之才與之并合必成大功此所以祐吾屬也下江諸将雖屈强少識然素敬常乃皆謝曰無王将軍吾屬㡬陷於不義願敬受教即引兵與漢軍及新市平林合於是諸部齊心同力鋭氣益壮遂俱進破殺甄阜梁丘賜及諸将議立宗室唯常與南陽士大夫同意欲立伯升而朱鮪張卬等不聼及更始立以常為廷尉大将軍封知命侯别徇汝南沛郡劉攽曰案沛在山東王常此時力未及往盖是南郡沛南絶相類也還入昆陽與光武共擊破王尋王邑更始西都長安以常行南陽太守事令専命誅賞東觀記曰誅不従命封拜有功封為鄧王食八縣賜姓劉氏常性恭儉遵法度南方稱之更始敗建武二年夏常将妻子詣洛陽肉袒自歸光武見常}
