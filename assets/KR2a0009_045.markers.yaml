  - {type: variant, offset: 1694, length: 2, content: 賓戲, WYG: 湖字晨發積射士千人積與迹同古字通用謂尋迹而射之又遣委輸給軍不絶光武即位封晨房子侯房子今趙州縣也帝又感悼姊沒於亂兵追封諡元為新野節義長公主立廟扵縣西封晨長子汎為呉房侯呉房今豫州縣也}
