  - {type: variant, offset: 3328, length: 191, content: 一篇論曰司馬遷班固父子其言史官載籍之作大義粲然著矣議者咸稱二子有良史之才遷文直而事覈固文贍而事詳若固之序事不激詭不抑抗贍而不穢詳而有體使讀之者亹亹而不猒信哉其能成名也彪固譏遷以為是非頗謬於聖人然其論議常排死節否正直而不殺身成仁之為美則輕仁義賤守節愈矣固傷遷博物洽聞不能以智免極刑然亦身陷大戮智及之而不能守之嗚呼古人所以致論於目睫也贊曰二班懷文裁成帝墳比良遷董兼麗卿雲彪識皇命固迷世紛, WYG: 五考證}
