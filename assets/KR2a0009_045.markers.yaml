  - {type: variant, offset: 1697, length: 0, content: '', krp: 奉公主之祀建武三年徵晨還京師數讌見説故舊平生為歡晨従容謂帝曰僕竟辯之光武前語晨云何用知非僕乎故晨有此言也帝大笑従幸章陵拜光祿大夫使持節監執金吾賈復等擊平邵陵新息賊新息今豫州縣也四年従幸夀春留鎮九江晨好樂郡職由是復拜為中山太守吏民稱之常為冀州髙第中山屬冀州於冀州所部郡課常為第一也十三年更封南䜌侯䜌音力全反入奉朝請復為汝南太守十八年行幸章陵徵晨行廷尉事従至新野置酒酣讌賞賜數百千萬復遣歸郡晨興鴻郤陂數千頃田鴻郤陂名在今豫州汝陽縣東成帝時闗東水陂溢為害翟方進為丞相奏罷之汝土以殷魚稻之饒流衍它郡衍饒也眀年定封西華侯復徵奉朝請二十五年卒詔遣中謁者備公主官屬禮儀漢官儀曰長公主官屬傅一人員吏五人騶僕射五人私府長食官長永巷令家令各一人也招迎新野主魂與晨合𦵏扵北芒乘輿與中宫親臨喪送葬謚曰恵侯小子棠嗣後徙封武當侯棠卒子固嗣固卒子國嗣國卒子福嗣永建元年卒無子國除來歙傳來歙字君叔歙音許及反南陽新野人也六世祖漢有才力武帝世以光禄大夫副樓舩将軍楊僕擊破南越朝鮮父仲東觀記仲作冲哀帝時為諌大夫娶光武祖姑生歙光武甚親敬之數共往来長安漢兵起王莽以歙劉氏外屬乃收繫之賔客共簒奪得免更始即位以歙為吏従入關數言事不用以病去歙女弟為漢中王劉嘉妻嘉遣人迎歙因南之漢中更始敗歙勸嘉歸光武遂與嘉俱東詣洛陽帝見歙大歡即解衣以衣之東觀記曰解所被襜襦以衣歙也拜為太中大夫是時方以隴蜀為憂獨謂歙曰今西州未附西州謂隗囂也子陽稱帝道里阻逺諸將方務關東思西州方略未知所任其謀若何歙因}
  - {type: variant, offset: 1698, length: 0, content: '', WYG: 請曰臣嘗與隗囂相遇長安其人始起以漢為名今陛下聖徳隆興臣願得奉威命開以丹青之信楊子法言曰聖人之言眀若丹青也囂必束手自歸則述自亡之勢不足圖也帝然之建武三年歙始使隗囂五年復持節送馬援因奉璽書於囂既還復往説囂囂遂遣子恂隨歙入質拜歙為中郎將時山東略定帝謀西收囂兵與俱伐蜀復使歙喻旨囂將王元説囂多設疑故久冘豫不决冘豫不定之意也説文曰冘冘行貎也音滛東觀記曰狐疑不决也歙素剛毅遂發憤質責囂曰質正也國家以君知臧否曉廢興故以手書暢意足下推忠誠遣伯春委質囂子恂字伯春是臣主之交信也今反欲用佞惑之言為族滅之計叛主負子違背忠信乎吉凶之決在扵今日欲前刺囂囂起入部勒兵将殺歙歙徐杖節就車而去囂愈怒王元勸囂殺歙使牛邯将兵圍守之囂将王遵諌曰愚聞為國者慎器與名為家者畏怨重禍噐車服也名爵號也言名與器不可妄授也俱慎名器則下服其命輕用怨禍則家受其殃今将軍遣子質漢内懐它志名器逆矣外人有議欲謀漢使輕怨禍矣古者列國兵交使在其間左傳曰晉欒書伐鄭鄭人使伯蠲行成晉人殺之非禮也兵交使在其間可也所以重兵貴和而不任戰也何況承王命籍重質而犯之哉君叔雖單車逺使而陛下之外兄也光武之姑子故曰外兄也害之無損扵漢而随以族滅昔宋執楚使遂有析骸易子之禍左傳曰楚使申舟聘齊不假道於宋華元曰楚不假道鄙我也乃殺之楚子聞之遂圍宋宋人懼使華元夜入楚師告子反曰寡君使元以病告敝邑易子而食析骸以爨也小國猶不可辱況於萬乗之主重以伯春之命哉歙為人有信義言行不違及往来游説皆可案覆西州士大夫皆信重之多為其言故得免而東歸八年春歙與征虜將軍祭遵襲略陽遵道病還分精兵随歙合二千餘人伐山開道従番須回中番須回中並地名也番音盤武帝元封四年幸雍通回中道前書音義曰回中在汧汧今隴州汧源縣也徑至略陽徑直也斬囂守將金梁因保其城囂大驚曰何其神也東觀記曰上聞得略陽甚悦左右怪上數破大敵今得小城何足以喜然上以略陽囂所依阻心腹已壊則制其支體也乃悉兵數萬人圍略陽斬山築堤激水灌城歙與将士固死堅守矢盡乃發屋斷木以為兵囂盡鋭攻之自春至秋其士卒疲弊帝乃大發關東兵自将上隴囂衆潰走圍解扵是置酒髙㑹勞賜歙班坐絶席在諸將之右賜歙妻縑千匹詔使留屯長安悉監䕶諸將歙因上書曰公孫述以隴西天水為藩蔽故得延命假息今二郡平蕩則述智計窮矣宜益選兵馬儲積資糧昔趙之將帥多賈人髙帝懸之以重賞髙帝十年陳豨反於趙代其将多賈人帝多以金購豨将皆降今西州新破兵人疲饉若招以財穀則其衆可集臣知國家所給非一用度不足然有不得已也帝然之於是大轉糧運東觀記曰詔於汧積穀六萬斛驢四百頭負䭾詔歙率征西大將軍馮異建威大將軍耿弇虎牙大將軍蓋延揚武將軍馬成武威將軍劉尚入天水擊破公孫述將田弇趙匡眀年攻㧞落門聚名也解見光武紀隗囂支黨周宗趙恢及天水屬縣皆降初王莽世羌虜多背叛而隗囂招懐其酋豪遂得為用及囂亡後五谿先零諸種數為宼掠皆營塹自守州郡不能討歙乃大修攻具率蓋延劉尚及太中大夫馬援等進擊羌扵金城大破之斬首虜數千人獲牛羊萬餘頭穀數十萬斛又擊破襄武賊傅栗卿等襄武縣屬隴西郡也隴西雖平而人饑流者相望流謂流離以就食也歙乃傾倉廩轉運諸縣以賑贍之於是隴右遂安而凉州流}
