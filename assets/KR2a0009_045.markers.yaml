  - {type: variant, offset: 1668, length: 23, content: 二世才術位不過郎感東方朔楊雄自論以不遭蘇張范蔡, WYG: 其詐将至亭欲罪之新野宰潘叔為請得免及光武與家屬避吏新野舎晨廬甚相親愛晨因謂光武曰王莽悖暴盛夏斬人此天亡}
