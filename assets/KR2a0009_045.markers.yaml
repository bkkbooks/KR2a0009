  - {type: variant, offset: 1748, length: 3, content: 匈奴變, WYG: 朝廷羞夫理國以得賢為本太中大夫叚襄骨鯁可任骨鯁喻正直也説文曰鯁魚骨也食骨留咽中為鯁願陛下裁察又臣兄弟不肖終恐被罪肖似也不似猶不賢也陛下哀憐數賜教督投筆抽刃而絶帝聞大驚省書覽涕乃賜䇿曰中郎将来歙攻戰連年平定羌隴憂國忘家忠孝彰著遭命遇害嗚呼哀哉使太中大夫贈歙中郎將征羌侯印綬謚曰節侯謁者護喪事喪還洛陽乗輿縞素臨弔送𦵏以歙有平羌隴之功故改汝南之當鄉縣為征羌國焉征羌故城在今豫州郾城縣東南也子裦嗣十三年帝嘉歙忠節復封歙弟由為宜西侯東觀記曰宜西鄉侯裦子稜尚顯宗女武安公主稜早歿裦卒以稜子歴為嗣論曰世稱來君叔天下信士夫専使乎二國之間豈厭}
  - {type: page-break, offset: 1748, content: '', id: KR2a0009_WYG_045-17a, image: WYG0252/WYG0252-0516c.png}
