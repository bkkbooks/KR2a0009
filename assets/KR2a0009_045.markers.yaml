  - {type: variant, offset: 33, length: 1, content: 實, krp: 孫尤謹閨門之内如官廷也初事劉歆好星歴讖記為王莽宗卿師平帝五年莽攝政郡國置宗師以主宗室盖特尊之故曰宗卿師也通亦為五威將軍従事出補巫丞有能名王莽置五威將軍従事謂驅使小官前書}
  - {type: variant, offset: 35, length: 0, content: '', WYG: 御史監郡與蕭何従事辨之巫縣屬南郡故城在今䕫州巫山縣北也莽末百姓愁怨通素聞守說讖云劉氏復興李氏為輔私常懐之且居家富逸為閭里雄以此不樂為吏乃自免歸及下江新市兵起南陽騷動騷亦動也通從弟軼亦素好事乃共計議曰今四方擾亂新室且亡漢當更興南陽宗室獨劉伯升兄弟汎愛容衆可與謀大事通笑曰吾意也㑹光武避事在宛通聞之即遣軼往迎光武續漢書曰先是李通同母弟申徒臣能為醫難使伯升殺之上恐其怨不欲與軼相見軼數請上乃强見之軼深達通意上乃許往意不安買半臿佩刀懐之至通舎通甚恱握上手得半臿刀謂上曰一何武也上曰倉卒時以備不虞耳光武初以通士君子相慕也故往荅之及相見共語移日握手極歡通因具言讖文事光武初殊不意未敢當之時守在長安光武乃微觀通曰即如此當如宗卿師何通曰已自有度矣度計度也音大各反因復備言其計光武既深知通意乃遂相約結定謀議期以材官都試騎士日漢法以立秋日都試騎士謂課殿最也翟義誅王莽以九月都試日勒車騎材官士是也欲劫前隊大夫及屬正前隊大夫謂南陽太守甄阜也屬正謂梁丘賜也因以號令大衆乃使光武與軼歸舂陵舉兵以相應遣従兄子季之長安以事報守季於道病死守密知之欲亡歸素與邑}
  - {type: page-break, offset: 35, content: '', id: KR2a0009_WYG_045-2a, image: WYG0252/WYG0252-0509a.png}
  - {type: page-break, offset: 35, content: '', id: KR2a0009_WYG_045-2b, image: WYG0252/WYG0252-0509b.png}
