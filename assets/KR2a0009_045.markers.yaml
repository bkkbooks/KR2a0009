  - {type: variant, offset: 2287, length: 362, content: 乖彝倫斁而舊章缺故先命玄聖使綴學立制宏亮洪業表相祖宗贊揚迪哲備哉燦爛真神明之式也雖前聖臯夔衡旦密勿之輔比茲褊矣是以高光二聖辰居其域時至氣動乃龍見淵躍拊翼而未舉則威靈紛紜海內雲蒸雷動電熛胡縊莽分不莅其誅然後欽若上下恭揖羣后正位度宗有于德不台淵穆之讓靡號師矢敦奮撝之容蓋以膺當天之正統受克讓之歸運蓄炎上之烈精蘊孔佐之弘陳云爾也並開迹於一匱同受侯甸之所服奕世勤民以伯方統牧乘其命賜彤弧黃戚之威用討韋顧黎崇之不格至乎三五華夏京遷鎬亳遂自北面虎離其師革滅天邑是故義士偉而不敦武稱未盡護有慙德不其然與然猶於穆猗那翕純皦繹以崇嚴祖考殷薦宗祀配帝發祥流慶對越天地者舄奕乎千載豈不克自神明哉誕略有常審言行於篇籍光藻朗而不渝耳重光襲四宗之緝熙神靈日燭光被六幽仁風翔乎海表威靈行於鬼區慝亡迥而不泯微胡瑣而不頤故夫顯定三才昭登之績匪堯不興鋪聞遺策在, WYG: 王遵曰君叔陛}
