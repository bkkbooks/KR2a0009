  - {type: variant, offset: 290, length: 1355, content: 之荒屯因造化之盪滌體元立制繼天而作系唐統接漢緒茂育羣生恢復疆宇動兼乎在昔事勤乎三五豈特方軌並迹紛綸后辟理近古之所務蹈一聖之險易云爾哉且夫建武之元天地革命四海之內更造夫婦有父子君臣初建人倫寔始斯乃虙羲氏之所以基皇德也分州土立市朝作舟車造器械斯軒轅氏之所以開帝功也龔行天罰應天順民人斯乃湯武之所以昭王業也遷都改邑有殷宗中興之則焉即土之中有周成隆平之制焉不階尺土一人之柄同符乎高祖克己復禮以奉終始允恭乎孝文憲章稽古封岱勒成儀炳乎世宗案六經而校德妙古昔而論功仁聖之事既該帝王之道備矣廟正予樂人神之和允洽君臣之序既肅乃動大路遵皇衢省方巡狩窮覽萬國之有無考聲教之所被散皇明以燭幽然後增周舊修洛邑翩翩巍巍顯顯翼翼光漢京于諸夏總八方而為之極是以皇城之內宮室光明闕庭神麗奢不可踰儉不能侈外則因原野以作苑順流泉而為沼發蘋藻以潛魚豐圃草以毓獸制同乎梁騶義合乎靈囿若乃順時節而蒐狩簡車徒以講武則必臨之以王制考之以風雅歷騶虞覽四驖嘉車攻采吉日禮官正儀乘輿乃出於是發鯨魚鏗華鍾登玉輅乘時龍鳳蓋颯灑和鸞玲瓏天官景從祲威盛容山靈護野屬御方神雨師汎灑風伯清塵千乘雷起萬騎紛紜元戎竟野戈鋋彗雲羽旄掃霓旌旗拂天焱焱炎炎揚光飛文吐爓生風吹野燎山日月為之奪明丘陵為之搖震遂集乎中囿陳師案屯駢部曲列校隊勒三軍誓將帥然後舉烽伐鼓以命三驅輕車霆發驍騎電騖游基發射范氏施御弦不失禽轡不詭遇飛者未及翔走者未及去指顧倏忽獲車已實樂不極般殺不盡物馬踠餘足士怒未泄先驅復路屬車案節於是薦三犧效五牲禮神祇懷百靈御覲明堂臨辟雍揚緝熙宣皇風登靈臺考休徵俯仰乎乾坤參象乎聖躬目中夏而布德瞰四裔而抗棱西盪河源東澹海漘北動幽崖南趯朱垠殊方別區界絕而不鄰自孝武所不能征孝宣所不能臣莫不陸讋水慄奔走而來賓遂綏哀牢開永昌春王三朝會同漢京是日也天子受四海之圖籍膺萬國之貢珍內撫諸夏外接百蠻乃盛禮樂供帳置乎雲龍之庭陳百僚而贊羣后究皇儀而展帝容於是庭實千品旨酒萬鍾列金罍班玉觴嘉珍御大牢饗爾乃食舉雍徹太師秦樂陳金石布絲竹鐘鼓鏗鎗管絃曄煜抗五聲極六律歌九功舞八佾韶武備太古畢四夷閒奏德廣所及仱兜離罔不具集萬樂備百禮暨皇歡浹羣臣醉降烟熅調元氣然後撞鍾告罷百僚遂退也乃申舊章下明詔命有司班憲度昭節儉示大素去後宮之麗飾損乘輿之服御除工商之淫業興農桑之上務遂令海內𠫓廾末而反本背偽而歸真女脩織紝男務耕耘器用陶匏服尚素玄恥纖靡而不服賤奇麗而不珍捐金於山沈珠於淵於是百姓滌瑕盪穢而鏡至清形神寂漠耳目不營嗜欲之原滅廉正之心生莫不優游而自得玉潤而金聲是以四海之內學校如林庠序盈門獻酬交錯俎豆莘莘下舞上歌蹈德詠仁登降飫宴之禮既畢因相與嗟歎玄德讜言弘說咸含和而吐氣頌曰盛哉乎斯世清濁究漢德之所由唯子頗識舊典又徒馳騁乎末流溫故知新已難而知德者鮮矣且夫辟界西戎險阻四塞脩其防禦孰與處乎土中平夷洞達萬方輻湊秦領九嵕涇渭之川曷若四瀆五岳帶河泝洛圖書之淵建章甘泉館御列仙孰與靈臺明堂統和天人太液昆明鳥獸之囿曷若辟雍海流道德之富游俠踰侈犯義侵禮孰與同履法度翼翼濟濟也子徒習秦阿房之造天而不知京洛之有制也識函谷之可關而不知王者之無外也位今將喻子五篇之詩賓既卒業乃稱曰美哉乎此詩義正乎楊雄事實乎相如非唯主人之好學蓋乃遭遇乎斯時也小子狂簡不知所裁既聞正道請終身誦之其詩曰及肅宗雅好文章固愈得幸數入讀書禁中或連日繼夜每行巡狩輒獻上賦頌, WYG: 郎}
