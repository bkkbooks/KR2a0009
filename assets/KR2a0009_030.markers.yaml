  - {type: variant, offset: 18, length: 0, content: '', WYG: 蔡本蔡國南頓本頓國汝陰本胡國杜預曰縣西北有胡城地道記有陶丘鄉詩所謂汝墳汝陽新息國北宜春㶏强侯國灈陽期思有蔣鄉古蔣國陽安道亭故國杜預曰在縣南袁山松書有朔山魏氏春秋曰初平三年分二縣置陽安都尉項故國左傳僖十七年魯所滅地道記曰有公路城袁術所築西華細陽安城侯國有武城亭吳房有棠谿亭左傳曰房國楚靈王所滅又楚封吳夫概王於棠谿地道記有吳城鮦陽侯國皇覽曰縣有葛陂鄉城東北有楚武王冢民謂之楚王岑永平中葛陂城北祝里社下於土中得銅鼎而銘曰楚武王之冢民傳言秦項赤眉之時欲發之輒頽壞厭不得發慎陽慎新蔡有大吕亭地道記曰故吕侯國左傳昭四年吳伐楚入櫟杜預曰縣東北有櫟亭安陽侯國有江亭故國嬴姓富波侯國永元中復宜祿永元中復朗陵侯國左傳成六年楚拒晉桑隧杜預曰縣東有桑里亭弋陽侯國有黄亭故黄國嬴姓召陵左傳昭十三年楚蔡公與子干子晳盟于鄧杜預曰縣西南有鄧城有陘亭左傳僖四年齊伐楚次陘杜預曰在縣南蘇秦説韓宣惠王曰南有陘山有安陵鄉征羌侯國有安陵亭史記無忌説魏安釐王曰王之使者出過而惡安陵氏於秦博物記曰故安陵君也思善侯國宋公國周名郪丘漢改為新郪章帝建初四年徙宋公於此有繁陽亭左傳襄四年楚師繁陽杜預曰鮦陽南有繁陽亭褒信侯國有頼亭故國史記楚封王孫勝白公杜預曰褒信縣有白亭原鹿侯國春秋左氏傳僖二十一年宋盟鹿上杜預曰原鹿縣也定潁侯國固始侯國故寢也光武中興更名有寢丘史記曰楚莊王封孫叔敖子又䝉恬破楚軍山桑侯國故屬沛有下城父聚有垂惠聚蘇茂奔垂惠王劉紆城父故屬沛春秋時曰夷楚屬陳左傳僖二十三年楚所取有乾谿在縣南有章華臺杜預曰章華宫在華容縣城内梁國秦碭郡髙帝改其三縣元和元年屬雒陽東南八百五十里九城户八萬三千三百口四十三萬一千二百八十三下邑左傳哀七年築黍丘杜預曰縣西南有黍丘亭睢陽北征記曰城周三十七里南臨濊水凡二十四門地道記曰梁孝王築城十二里小鼓唱節杵下而和之稱睢陽曲本宋國閼伯墟有盧門亭左傳}
