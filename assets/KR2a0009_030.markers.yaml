  - {type: variant, offset: 28, length: 0, content: '', WYG: 意發視之得古文策書曰亂吾書董仲舒治吾堂鍾離意璧有七張伯盜一意尋案未了而卒張伯者治中庭治地得六璧上之意曰此有七何以不遂伯懼探璧懷中魯咸以為神意别傳曰意省堂有孔子小車乗皆朽敗意自糶俸雇漆膠之直請魯民治之及䕶几席劒履後得甕中素書曰䕶吾履鍾離意又禮記矍相之圃亦在城中西南近孔子廟而仲尼墓在魯城門北之外泗水上去城一里葬地蓋一頃墓墳南北十步東西十三步髙一丈二尺墓前有瓴甓為祠壇方六尺與地平塋中異木以百數魯人莫能識皇覽曰孔子本無祠堂塋中不生荆棘及刺人草伯魚冢在孔子冢東與孔子冢近大小相望子思冡在孔子冢南案今墓書孫在祖前謂此為驕孫祔有牛首亭左傳曰桓十四年宋伐鄭取牛首有五}
  - {type: variant, offset: 28, length: 0, content: '', krp: 意發視之得古文策書曰亂吾書董仲舒治吾堂鍾離意璧有七張伯盜一意尋案未了而卒張伯者治中庭治地得六璧上之意曰此有七何以不遂伯懼探璧懷中魯咸以為神意别傳曰意省堂有孔子小車乗皆朽敗意自糶俸雇漆膠之直請魯民治之及䕶几席劒履後得甕中素書曰䕶吾履鍾離意又禮記矍相之圃亦在城中西南近孔子廟而仲尼墓在魯城門北之外泗水上去城一里葬地蓋一頃墓墳南北十步東西十三步髙一丈二尺墓前有瓴甓為祠壇方六尺與地平塋中異木以百數魯人莫能識皇覽曰孔子本無祠堂塋中不生荆棘及刺人草伯魚冢在孔子冢東與孔子冢近大小相望子思冡在孔子冢南案今墓書孫在祖前謂此為驕孫祔有牛首亭左傳曰桓十四年宋伐鄭取牛首有五}
  - {type: variant, offset: 29, length: 0, content: '', WYG: 衢地道記曰在城東騶本邾國有騶山髙五里秦始皇刻石焉劉薈騶山記曰邾城在山南去山二里城東門外有韋賢墓北有繹山左傳文十三年邾遷於繹郭璞曰繹山純石積構連屬城北有牙山牙山北有唐口山唐口山北有陽山城北有孟軻冢蕃有南梁水左傳襄四年戰狐台杜預曰縣東南有目台亭薛本國地道記曰夏車正奚仲所封冢在城南二十里山上皇覽曰靖郭君冢在城中東南陬孟嘗君冢在城中向門東北邊六國時曰徐州史記曰齊宣王九年與魏襄王㑹徐州而相王卞有盜泉有郚鄉城左傳文公七年城郚杜預曰縣南有郚鄉城隱元年盟于蔑杜預曰蔑地名縣南有姑城襄十七年齊圍桃杜預曰縣東南有桃墟汶陽左傳桓十二年盟曲池杜預曰縣北有曲水亭地道記臨淄縣西南門曰曲門其側有池案魯桓與杞莒盟不往齊地地道記為妄右豫州刺史部郡國六縣邑侯國九十九魏郡髙帝置雒陽東北七百里魏志曰建安十七年割河内之蕩陰朝歌林慮東郡之衞國頓丘東武陽發干鉅鹿之廮陶曲陽南和廣平之廣平任城趙國之襄國邯鄲易陽以益魏郡十八年分置東西都尉十五城户十二萬九千三百一十口六十九萬五千六百六鄴帝王世紀曰縣西南有上司馬殷太甲常居焉魏都賦注曰縣西北有鼓山時時自鳴鳴則兵又交谷水在縣南案本傳有西唐山又鄴北太行山西北去亦不知山所極處亦如東海不知水所窮盡也有故大河有滏水魏都賦曰北臨漳滏則冬夏異沼注云水經鄴西北滏水熱故名滏口有汙水有汙城史記曰項羽破秦軍汙水上有平陽城史記曰靳歙别下平陽有武城有九侯城徐廣曰一作鬼侯與文王為紂三公繁陽内黄左傳襄十九年㑹于柯杜預注曰縣東北有柯城昭九年荀盈卒于戲陽杜預曰縣北有戲陽城清河水出有羛陽聚世祖破五校處有黄澤前志曰在縣西魏元城左傳}
