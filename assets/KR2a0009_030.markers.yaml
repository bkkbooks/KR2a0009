  - {type: variant, offset: 34, length: 0, content: '', WYG: 原中山國髙祖置雒陽北一千四百里十三城户九萬七千四百一十二口六十五萬八千一百九十五盧奴北平有鐵毋極新市有鮮虞亭故國子姓杜預曰白狄别種望都左傳晉伐鮮虞及中人杜預曰縣西北有中人城晉地道記有馬安關唐有中人亭博物記曰唐關在中人西北百里中人在縣西四十里列子曰趙襄子使新穉穆子攻翟取左人中人有左人鄉帝王世紀曰堯封唐堯山在北唐水西入河南有望都山即堯母慶都所居相去五十里都山一名豆山博物記曰左人唐西北四十里安國安憙本安險章帝更名漢昌本苦陘章帝更名蠡吾侯國故屬涿上曲陽故屬常山恒山在西北有泉水于吉得神書晉地道記自縣北行四百二十五里恒多山坂名飛狐口蒲隂本曲逆章帝更名有陽城晉地道記曰有陽安關陽城蒲陽山蒲水出也廣昌故屬代郡安平國故信都髙帝置明帝名}
