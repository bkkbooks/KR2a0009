  - {type: variant, offset: 31, length: 2, content: 時為, WYG: 置建武十三年省真定國以其縣屬十三城户九萬七千五百口六十三萬一千一百八十四元氏晉地道記有石塞三公塞髙邑故鄗光武更名刺史治漢官曰去雒陽一千里有千秋亭五成陌縣西七里光武即位於此矣都鄉侯國有鐵南行唐有石臼谷房子贊皇山在縣西南六十里濟水所出晉地道記有礫塞中谷塞平棘有塞欒城在縣西北四十里九門史記趙武靈王出九門如野臺以望齊中山之境碣石山戰國策云在縣界靈夀衞水出蒲吾史記番吾君杜預曰晉之蒲邑也古今注曰永平十年作常山呼沱河蒲吾渠通漕船也井陘真定上艾故屬}
