  - {type: variant, offset: 21, length: 1, content: 君, WYG: 與貫字相似穀熟有新城左傳曰文十四年諸侯㑹新城帝王世紀有南亳有邳亭古邳國􅋣故屬陳留寧陵故屬陳留左傳成十六年㑹沙隨杜預曰縣北有沙隨亭有葛鄉故葛伯國左傳曰在縣東北薄故屬}
