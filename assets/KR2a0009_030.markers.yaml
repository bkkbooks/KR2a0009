  - {type: variant, offset: 26, length: 0, content: '', WYG: 左傳桓十五年㑹于袲杜預曰在縣西南一名犖蕭本國北征記城周十四里南臨汙水沛有泗水亭亭有髙祖碑班固為文見固集地道記有許城左傳定八年鄭伐許豐地道記曰去國二百六十州六百雒千二十五里西有大澤髙祖斬白蛇於此有枌榆亭案前志注枌榆社在縣東北十五里或鄉名髙祖里社戴延之西征記曰縣西北有漢祖廟為亭長所處酇左傳昭四年吳伐楚入棘杜預曰縣東北有棘亭襄元年鄭侵宋取犬丘杜預曰縣東北有犬丘城帝王世紀曰曹騰封費亭侯縣有費亭是也有鄍聚左傳曰冀為不道伐鄍三門服䖍曰鄍晉别都杜預曰是虞邑地處闕則非此鄍矣博物記曰諸侯㑹于鄍亭穀陽譙平陽邑左傳僖二十三年楚所取乾谿在南刺史治漢官曰去雒陽千二十里洨有垓下聚髙祖破項羽地蘄有大澤鄉陳涉起此史記曰髙祖擊黥布於㑹甀徐廣曰在縣西銍鄲建平臨睢故芒光武更名竹邑侯國故竹公丘本滕國杜預曰在縣東南龍亢地道記曰左傳隱二年入向城在縣東南向本國符離紅地道記云左傳昭八年大蒐于紅太丘杼秋故屬梁國有澶淵聚左傳襄二十年盟于澶淵陳國髙帝置為淮陽章和二年改雒陽東南七百里九城户十一萬二千六百五十三口百五十四萬七千五百七十二陳帝王世紀曰庖犧氏所都舜後所封左傳僖元年㑹于檉杜預曰縣西北有檉城爾雅曰丘上有丘曰宛丘陳有株邑蓋朱襄之地博物記曰卭地在縣北防亭在焉詩曰卭有㫖苕防有鵲巢陽夏有固陵聚史記髙祖五年追項羽至固陵晉灼漢書注云汝南固始縣寧平苦春秋時曰相有頼鄉伏滔北征記曰有老子廟廟中有九井水相通古史考曰有曲仁里老子里也地道記曰城南三十里有平城柘新平扶樂武平左傳成十六年諸侯侵陳鳴鹿杜預曰縣西南有鹿邑長平故屬汝南左傳宋華氏戰于鬼閻杜預曰縣西北有閻亭有辰亭左傳宣十一年盟辰陵杜預曰縣東南有辰亭有赭丘城魯國秦薛郡髙后改本屬徐州光武改屬豫州六城户七萬八千四百四十七口四十一萬一千五百九十魯國古奄國帝王世紀曰黄帝生於夀丘在魯東門之北少昊自窮桑登帝位窮桑在魯北後徙曲阜應劭曰曲阜在魯城中委曲長七八里左傳曰伯禽封少昊之墟僖二十九年介葛盧舎于昌衍杜預曰縣東南有昌平城皇覽曰奄里伯公冢在城内祥舍中民傳言魯五徳奄里伯公𦵏其宅有大庭氏庫杜預曰大庭氏古國名在城内魯於其處作庫有鐵有闕里孔子所居漢晉春秋曰鍾離意相魯見仲尼廟頽毁㑹諸生於廟中慨然歎曰蔽芾甘棠勿翦勿伐況見聖}
