  - {type: variant, offset: 3108, length: 1, content: 衍, WYG: 元二年復故雒陽北二千五百里十一城户九萬三千七百五十四口六十三萬四千四百二十一樂成弓髙易故屬涿武垣故屬涿中水故屬涿鄚故屬涿髙陽故屬涿有葛城文安故屬勃海束州故屬勃海成平故屬勃海東平舒故屬勃海清河國髙帝置桓帝建和二年改為甘陵雒陽北千二百八十里七城户十二萬三千九百六十四口七十六萬四百一十八甘陵故厝安帝更名具丘東武城鄃靈和帝}
