  - {type: variant, offset: 4, length: 0, content: '', WYG: 三十梁剡令劉昭補并注郡國志第二十郡國二豫州潁川沛國汝南陳國梁國魯國冀州魏郡河間鉅鹿清河常山趙國中山勃海安平潁川郡秦置雒陽東南五百里十七城户二十六萬三千四百四十口百四十三萬六千五百一十三陽翟禹所都汲冢書禹都陽城古史考曰鄭厲公入櫟即此也晉地道記云去雒陽二百八十六里屬河南有鈞臺左傳曰夏啓有鈞臺之享杜預曰有鈞臺陂帝王世紀云在縣西有髙氏亭左傳成十七年衛侵鄭至髙氏杜預曰縣西南有雍氏城左傳襄十八年楚伐鄭侵雍梁杜預曰在縣東北史記齊湣王十二年攻魏楚圍雍氏襄有養陰里襄城左傳定四年盟臯鼬杜預曰縣東南有城臯亭有西不羮杜預曰有不羮城有汜城杜預曰在縣南周襄王所處有汾丘左傳襄十八年楚治兵於汾杜預曰縣東北有汾丘城有魚齒山左傳謂魚陵杜預曰魚齒山也在犨縣北昆陽有湛水左傳襄十六年楚公子格與晉戰於湛陂定陵有東不羮杜預曰縣西北有不羮亭地道記曰髙陵山汝水所出舞陽邑郾臨潁潁陽潁隂左傳文九年楚伐鄭師於狼淵杜預曰縣西有狼陂獻帝遣御史大夫張音奉皇帝璽綬策書禪帝位於魏是文帝繼王位南廵在潁隂有司乃為壇於潁隂庚午登壇魏相國華歆跪受璽綬以進於王王既受畢降壇視燎成禮而反帝王世紀云魏文帝登禪于曲蠡之繁陽亭為縣曰繁昌亦禹貢豫州之域今許之封内今潁川繁昌是也北征記曰城在許之南七十里東有臺髙七丈方五十步臺南有壇髙二丈方三十步即受終之壇也案北征記云是外黄縣繁昌城非也有狐宗鄉或曰古狐人亭有岸亭史記魏哀王五年秦伐魏走犀首岸門徐廣曰岸亭許左傳莊}
