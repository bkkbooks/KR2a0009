  - {type: variant, offset: 7, length: 3, content: 上桓譚, WYG: 年楚伐鄭鄭奔桐丘杜預曰縣東北有桐丘城獻帝徙都改許昌新汲左傳文元年衞孔達侵鄭伐緜訾及匡杜預曰縣東北有匡城成十七年伐齊至曲洧杜預曰縣治曲洧城臨洧水􅋣陵春秋時曰􅋣鄭叔段所保故曰克段于鄢又成十六年晉敗楚於􅋣陵李竒曰六國曰安陵長社有長葛城左傳隠五年宋伐鄭圍長葛縣本名長葛地道記曰社中樹暴長漢改名有向鄉左傳襄十一年諸侯師于向杜預曰在縣東北有蜀城有蜀津史記曰魏惠王元年韓趙合軍伐魏蜀澤陽城帝王世紀曰陽城有啓母冢有嵩髙山山海經謂為太室之山禹貢有外方山鄭𤣥毛詩譜云外方之山即嵩也孟子曰益避禹之子於箕山之隂注云嵩髙之北洧水潁水出晉地道記曰潁水出陽乾山有鐵有負黍聚史記曰周敬王十九年鄭伐負黍}
