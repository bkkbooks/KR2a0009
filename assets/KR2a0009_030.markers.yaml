  - {type: variant, offset: 3110, length: 6, content: 衍等疑不肯降, WYG: 元九年復地道記曰有鳴犢河繹幕廣川故屬信都有棘津城太公吕尚困於棘津城琅邪海曲非此城也案永初元年鄧太后分置廣川王國後王薨國除太后崩還益清河趙國秦邯鄲郡髙帝改名雒陽北千一百里五城户三萬二千七百一十九口一十八萬八千三百八十一邯鄲張華曰趙奢冢在邯鄲西山上謂之馬服山有叢臺有洪波臺易陽魏都賦曰溫泉毖涌}
