  - {type: variant, offset: 30, length: 0, content: '', WYG: 七年㑹馬陵杜預曰縣東南有地名馬陵史記曰龎涓死處墟故沙鹿左傳沙鹿崩穀梁傳曰林屬於山曰沙鹿山名也有沙亭左傳定七年盟于沙亭杜預曰在縣東南十年盟于瑣晉地道記曰縣南有瑣陽城黎陽左傳定十四年㑹于牽杜預曰縣東北有牽城陰安邑館陶清淵平恩沙侯國魏都賦注曰有龍山斥丘有葛杜預曰有乾侯魯昭公所處武安有鐵即臺孝威隱于縣山曲梁侯國左傳宣十五年敗赤狄于曲梁故屬廣平有雞澤左傳襄三年諸侯㑹雞澤杜預曰在縣西南梁期鉅鹿郡秦置建武十三年省廣平國以其縣屬雒陽北千一百里十五城户十萬九千五百一十七口六十萬二千九十六廮陶有薄落亭鉅鹿故大鹿有大陸澤有廣阿澤吕氏春秋九藪趙之鉅鹿髙誘注云廣阿澤也山海經曰大陸之水史記紂盈鉅橋之粟許慎云鉅鹿之大橋也鉅鹿南有棘原章邯所軍處前書曰沙丘臺在縣東北七十里楊氏鄡下曲陽有鼓聚故翟鼓子國杜預曰縣西南有肥累城古肥國白狄别種有昔陽亭左傳昭十二年晉荀吳入昔陽杜預曰沾縣東有昔陽城肥古都也任南和廣平斥章廣宗曲周列人廣年平鄉南􅒋常山國髙}
