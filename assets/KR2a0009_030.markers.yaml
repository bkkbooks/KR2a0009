  - {type: variant, offset: 3505, length: 174, content: 齡之期未有能至老壯之閒相去幾何誠使故朝尚在忠義可立雖老親受戮妻兒橫分邑之願也閒者上黨黠賊大衆圍城義兵兩輩入據井陘邑親潰敵圍拒擊宗正自試智勇非不能當誠知故朝為兵所害新帝司徒已定三輔隴西北地從風響應其事昭昭日月經天河海帶地不足以比死生有命富貴在天天下存亡誠云命也邑雖沒身能如命何亡義無其誰為老母拘執恩所當留而厲以貪權誘以策馬抑其利心必其不顧何其愚乎邑年, WYG: 後漢書卷}
