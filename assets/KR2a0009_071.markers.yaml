  - {type: variant, offset: 3428, length: 2, content: 振旅, WYG: 山陽楚沛多蝗其飛至九江界者輒東西散去由是名稱遠近浚遒縣有唐后二山民共祠之浚遒縣屬廬江郡故城在今廬州愼縣南衆巫遂取百姓男女一以為公嫗以男爲山公以女爲山嫗猶祭之有尸主也歲歲改易既}
