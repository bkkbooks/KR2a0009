  - {type: variant, offset: 3409, length: 17, content: 內移唯奐因功特聽故始為弘農人焉建寧, WYG: 侈長長音直亮反禁之不得奢侈有餘均曰夫送終踰制失之輕者今有不義之民尚未循化而遽罰過禮非政之先竟不肯施行遷九江太守郡多虎暴數爲民患常募設檻穽而猶多傷害檻爲機以捕獸穽謂穿地䧟之均到下記屬縣曰夫虎豹在山黿鼉在水各有所托且江淮之有猛獸猶北土之有雞豚也今爲民害咎在殘吏而勞勤張捕非憂恤之本也其務退姦貪思進忠善可一去檻穽除削課制其後傳言虎相與東游度江中元}
