  - {type: variant, offset: 1258, length: 17, content: 三四規親入菴廬巡視將士三軍感悅東羌, WYG: 五年遷堂邑令堂邑故城在今博州堂邑縣西北縣人防廣爲父報讎繋獄其母病死廣哭泣不食意憐傷之乃聽廣歸家使得殯歛丞掾皆爭意曰罪自我歸義不累下}
