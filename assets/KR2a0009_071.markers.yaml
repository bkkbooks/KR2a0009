  - {type: variant, offset: 1257, length: 0, content: '', WYG: 萬數疫癘氣也意獨身自隱親經給醫藥隱親謂親自隱恤之經給謂經營濟給之所部多䝉全濟舉孝廉再選辟大司徒侯霸府詔部送徒詣河内時冬寒徒病不能行路過𢎞農意輒移屬縣使作徒衣縣不得已與之而上書言狀意亦具以聞光武得奏以見霸曰君所使掾何乃仁於用心誠良吏也意遂於道解徒桎梏在手日梏在足曰桎恣所欲過與尅期俱至無或違者還以病免後除瑕丘令瑕丘今兗州縣也吏有檀建者盜竊縣内意屏人問狀建叩頭服罪不忍加刑遣令長休建父聞之爲建設酒謂曰吾聞無道之君以刃殘人有道之君以義行誅子罪命也遂令建進藥而死二}
