  - {type: variant, offset: 4610, length: 897, content: 詔熲熲於道偽退潛於還路設伏虜以為信然乃入追熲熲因大縱兵悉斬獲之坐詐璽書伏重刑以有功論司寇刑竟徵拜議郎時太山琅邪賊東郭竇公孫舉等聚衆三萬人破壞郡縣遣兵討之連年不克永壽二年桓帝詔公卿選將有文武者司徒尹訟頌薦熲乃拜為中郎將擊竇舉等大破斬之獲首萬餘級餘黨降散封熲為列侯賜錢五十萬除一子為郎中延熹二年遷護羌校尉會燒當燒何當煎勒姐等八種羌寇隴西金城塞熲將兵及湟中義從羌萬二千騎出湟谷擊破之追討南度河使軍吏田晏夏育募先登懸索相引復戰於羅亭大破之斬其酋豪以下二千級獲生口萬餘人虜皆奔走明年春餘羌復與燒何大豪寇張掖攻沒鉅鹿塢殺屬國吏民又招同種千餘落并兵晨奔熲軍熲下馬大戰至日中刀折矢盡虜亦引退熲追之且鬬且行晝夜相攻割肉食雪四十餘日遂至河首積石山出塞二千餘里斬燒何大帥首虜五千餘人又分兵擊石城羌斬首溺死者千六百人燒當種九十餘口詣熲降又雜種羌屯聚白石熲復進擊首虜三千餘人冬勒姐零吾種圍允街殺略吏民熲排營救之斬獲數百人四年冬上郡沈氐隴西牢姐烏吾諸種羌共寇并涼二州熲將湟中義從討之涼州刺史郭閎貪共其功稽固熲軍使不得進義從役久戀鄉舊皆悉反叛郭閎歸罪於熲熲坐徵下獄輸作左校羌遂陸梁覆沒營塢轉相招結唐突諸郡於是吏人守闕訟熲以千數朝廷知熲為郭閎所誣詔問其狀熲但謝罪不敢言枉京師稱為長者起於徒中復拜議郎遷并州刺史時滇那等諸種羌五六千人寇武威張掖酒泉燒人廬舍六年寇埶轉盛涼州幾亡冬復以熲為護羌校尉乘驛之職明年春羌封僇良多滇那等酋豪三百五十五人率三千落詣熲降當煎勒姐種猶自屯結冬熲將萬餘人擊破之斬其酋豪首虜四千餘人八年春熲復擊勒姐種斬首四百餘級降者二千餘人夏進軍擊當煎種於湟中熲兵敗被圍三日用隱士樊志張策潛師夜出鳴鼓還戰大破之首虜數千人熲遂窮追展轉山谷閒自春及秋無日不戰虜遂飢困敗散北略武威閒熲凡破西羌斬首二萬三千級獲生口數萬人馬牛羊八百萬頭降者萬餘落封熲都鄉侯邑五百戶永康元年當煎諸種復反合四千餘人欲攻武威熲復追擊於鸞鳥大破之殺其渠帥斬首三千餘級西羌於此弭定而東羌先零等自覆沒征西將軍馬賢後朝廷不能討遂數寇擾三輔其後度遼將軍皇甫規中郎將張奐招之連年既降又叛桓帝詔問熲曰先零東羌造惡反逆而皇甫規張奐各擁強衆不時輯定欲熲移兵東討未識其宜, WYG: ''}
