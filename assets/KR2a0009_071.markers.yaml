  - {type: variant, offset: 3389, length: 1, content: 為, WYG: 女侍史二人皆選端正者伯使從至止車門還女侍史絜被服執香爐燒燻從入臺中給使護衣服也崧官至南陽太守宋均傳族子意宋均字叔庠南陽安衆人也父伯建武初爲五官中}
