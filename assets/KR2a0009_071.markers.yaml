  - {type: variant, offset: 1940, length: 1, content: 人, WYG: 孔子忍渇於盜泉之水曾參回車於勝母之閭惡其名也說苑曰邑名勝母曾子不入水名盜泉仲尼不飲醜其名也尸子又載其言也此臧穢之寳誠不敢拜帝嗟歎曰淸乎尚書之言乃更以庫錢三十萬賜意轉爲尚書僕射車駕數幸廣成苑意以爲從禽廢政常當車陳諫般樂遊田之事天子卽時還宮永平三年夏旱而大起北宫意詣闕免冠上疏曰伏見陛下以天時小旱憂念元元降避正殿躬自克責而比日密雲遂}
