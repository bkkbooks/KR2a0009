  - {type: variant, offset: 92, length: 2, content: 賢果, WYG: 竇氏始貴倫復上疏曰臣得以空虚之質當輔弼之任素性駑怯位尊爵重拘廹大義思自䇿厲雖遭百死不敢擇地又況親遇危言之世哉論語孔子曰邦有道危言危行邦無道危行言遜鄭𤣥注云危猶髙也據時髙言髙行必見危故以}
