  - {type: 'tls:seg', offset: 3452, content: '', id: KR2a0009_ZHSJ_071-d71p37s5}
  - {type: variant, offset: 3452, length: 0, content: '', WYG: 儀曰字伯儷也寒朗傳寒朗字伯竒魯國薛人也生三日遭天下亂棄之荆棘數日兵解母往視猶尚氣息遂收養之及長好經學博通書傳以尚書教授舉孝廉永平中以謁者守侍御史與三府掾屬共考案楚獄顔忠王平等辭連及隧鄉侯耿建朗陵侯臧信䕶澤侯鄧鯉曲成侯劉建建等辭未嘗與忠平相見是時顯宗怒甚吏皆惶恐諸所連及率一切陷入無敢以情恕者朗心傷其寃試以建等物色獨問忠平物色謂形狀也而二人錯愕不能對錯愕猶倉卒也錯音七故反愕音五故反朗知其詐乃上言建等無姦專爲忠平所誣疑天下無辜類多如此帝乃召朗入問曰建等即如是忠平何故引之朗對曰忠平自知所犯不道故多有虛引冀以自明帝曰即如是四侯無}
