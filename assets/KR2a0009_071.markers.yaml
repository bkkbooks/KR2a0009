  - {type: variant, offset: 73, length: 2, content: 布衣, WYG: 俗敝羣下不稱故也光武承王莽之餘頗以嚴猛為政後代因之遂成風化郡國所舉類多辨職俗吏殊未有寛博之選以應上求者也陳留令劉豫冠軍令駟協竝以刻薄之姿臨人宰邑專念掠殺務為嚴苦吏民愁怨莫不疾之而今之議者反以爲能違天心失經義誠不可不愼也非徒應坐豫協亦當宜譴舉者譴責也務進仁賢以任時政不過數人則風俗自化矣臣甞讀書記知秦以酷急亡國又目}
