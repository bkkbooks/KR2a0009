  - {type: variant, offset: 72, length: 0, content: '', WYG: 峭直峭峻也然常疾俗吏苛刻及爲三公値帝長者屢有善政乃上疏褒稱盛美因以勸成風德曰陛下即位躬天然之德體晏晏之姿以寛𢎞臨下尚書考靈耀曰堯文塞晏晏爾雅曰晏晏温和也出入四年前歳誅刺史二千石貪殘者六人東觀漢記曰去年伏誅者刺史一人太守三人减死罪二人凡六人斯皆明聖所鑒非羣下所及然詔書每下寛和而政急不解務存節儉而奢侈不止者咎}
