  - {type: variant, offset: 6062, length: 1396, content: 人為郎中勑中藏府調金錢綵物增助軍費拜熲羌將軍夏熲復追羌出橋門至走馬水上尋聞虜在奢延澤乃將輕兵兼行一日一夜二百餘里晨及賊擊破之餘虜走向落川復相屯結熲乃分遣騎司馬田晏將五千人出其東假司馬夏育將二千人繞其西羌分六七千人攻圍晏等晏等與戰羌潰走熲急進與晏等共追之於令鮮水上熲士卒飢渴乃勒衆推方奪其水虜復散走熲遂與相連綴且鬬且引及於靈武谷熲乃被甲先登士卒無敢後者羌遂大敗𠫓廾兵而走追之三日三夜士皆重繭既到涇陽餘寇四千落悉散入漢陽山谷閒時張奐上言東羌雖破餘種難盡熲性輕果慮負敗難常宜且以恩降可無後悔詔書下熲熲復上言臣本知東羌雖衆而輭弱易制所以比陳愚慮思為永寧之筭而中郎將張奐說虜強難破宜用招降聖朝明監信納瞽言故臣謀得行奐計不用事埶相反遂懷猜恨信叛羌之訴飾潤辭意云臣兵累見折衂又言羌一氣所生不可誅盡山谷廣大不可空靜血流汙野傷和致災臣伏念周秦之際戎狄為害中興以來羌寇最盛誅之不盡雖降復叛今先零雜種累以反覆攻沒縣邑剽略人物發冢露尸禍及生死上天震怒假手行誅昔邢為無道衞國伐之師興而雨臣動兵涉夏連獲甘澍歲時豐稔人無疵疫上占天心不為災傷下察人事衆和師克自橋門以西落川以東故宮官縣邑更相通屬非為深險絕域之地車騎安行無應折衂案奐為漢吏身當武職駐軍二年不能平寇虛欲修文戢戈招降獷敵誕辭空說僭而無徵何以言之昔先零作寇趙充國徙令居內煎當亂邊馬援遷之三輔始服終叛至今為鯁故遠識之士以為深憂今傍郡戶口單少數為羌所創毒而欲令降徒與之雜居是猶種枳棘於良田養虺蛇於室內也故臣奉大漢之威建長久之策欲絕其本根不使能殖本規三歲之費用五十四億今適朞年所耗未半而餘寇殘燼將向殄滅臣每奉詔書軍不內御願卒斯言一以任臣臣時量宜不失權便二年詔遣謁者馮禪說降漢陽散羌熲以春農百姓布野羌雖暫降而縣官無廩必當復為盜賊不如乘虛放兵埶必殄滅夏熲自進營去羌所屯凡亭山四五十里遣田晏夏育將五千人據其山上羌悉衆攻之厲聲問曰田晏夏育在此不湟中義從羌悉在何面今日欲決死生軍中恐晏等勸激兵士殊死大戰遂破之羌衆潰東奔復聚射虎谷分兵守諸谷上下門熲規一舉滅之不欲復令散走乃遣千人於西縣結木為柵廣二十步長四十里遮之分遣晏育等將七千人銜枚夜上西山結營穿塹去虜一里許又遣司馬張愷等將三千人上東山虜乃覺之遂攻晏等分遮汲水道熲自率步騎進擊水上羌却走因與愷等挾東西山縱兵擊破之羌復敗散熲追至谷上下門窮山深谷之中處處破之斬其渠帥以下萬九千級獲牛馬驢騾氈裘廬帳什物不可勝數馮禪等所招降四千人分置安定漢陽隴西三郡於是東羌悉平凡百八十戰斬三萬八千六百餘級獲牛馬羊騾驢駱駝四十二萬七千五百餘頭費用四十四億軍士死者四百餘人更封新豐縣侯邑萬戶熲行軍仁愛士卒疾病者親自瞻省手為裹創在邊十餘年未嘗一日蓐寢與將士同苦故皆樂為死戰三年春徵還京師將秦胡步騎五萬餘人及汗血千里馬生口萬餘人詔遣大鴻臚持節慰勞於鎬軍至拜侍中轉執金吾河南尹有盜發馮貴人冢坐左轉諫議大夫再遷司隸校尉熲曲意宦官故得保其富貴遂黨中常侍王甫枉誅中常侍鄭颯董騰等增封四千戶并前萬四千戶明年伐李咸為太尉其冬病罷復為司隸校尉數歲轉潁川太守徵拜太中大夫光和二年復代橋玄為太尉在位月餘會日食自劾有司舉奏詔收印綬詣廷尉時司隸校尉陽球奏誅王甫并及熲就獄中詰責之遂飲鴆死家屬徙邊後中常侍呂強上疏追訟熲功靈帝詔熲妻子還本郡初熲與皇甫威明張然明並知名顯達京師稱為涼州三明云贊曰山西多猛三明儷蹤戎驂糾結塵斥河潼規奐審策亟遏囂凶文會志比更相為容段追兩狄束馬縣鋒紛紜騰突谷靜山空, WYG: 考證}
