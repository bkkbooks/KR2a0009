  - {type: variant, offset: 3391, length: 2, content: 並辭, WYG: 將均以父任爲郎時年十五好經書每休沐日輒受業博士通詩禮善論難至二十餘調補辰陽長辰陽今辰州辰溪縣其俗少學者而信巫鬼均爲立學校禁絶淫祀人皆安之以祖母喪去官客游潁川後爲謁者㑹武陵蠻反圍武威將軍劉尚詔使均乘傳發江夏奔命三千人往救之前書音義曰擢選精勇聞命奔走謂之奔命也既至而尚已没㑹伏波將軍馬援至詔因令均監軍與諸將俱進賊拒阸不得前及馬援卒於師軍士多溫濕疾病死者太半均慮軍遂不反乃與諸將議曰今道遠士病不可以戰欲權承制降之何如諸將皆伏地莫敢應均曰夫忠臣出竟有可以安國家專之可也公羊傳曰聘禮大夫受命}
