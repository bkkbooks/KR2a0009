  - {type: variant, offset: 95, length: 1, content: 羌, WYG: 諭也今承百王之敝人尚文巧咸趨邪路莫能守正伏見虎賁中郎將竇憲椒房之親后妃以椒塗壁取其繁衍多子故曰椒房典司禁兵出入省闈年盛志美卑謙樂善此誠其好士交結之方然諸出入貴戚者類多瑕釁禁錮之人尤少守約安貧之節士大夫無志之徒更相販賣雲集其門衆喣飄山聚蚊成雷前書中山靖王之言蓋驕佚}
