  - {type: 'tls:seg', offset: 3432, content: '', id: KR2a0009_ZHSJ_071-d71p37s3}
  - {type: variant, offset: 3432, length: 0, content: '', WYG: 者數千人顯宗以其能七年徵拜尚書令每有駮議多合上㫖均甞刪翦疑事帝以爲有姦大怒收郎縳格之諸尚書惶恐皆叩頭謝罪均顧厲色曰蓋忠臣執義無有二心若畏威失正均雖死不易志小黄門在傍入具以聞帝善其不撓即令貰郎遷均司𨽻校尉數月出爲河内太守政化大行均常寢病百姓耆老爲禱請旦夕問起居其爲民愛若此以疾上書乞免詔除子條爲太子舍人均自扶輿詣闕謝恩帝使中黄門慰問因留養疾司徒缺帝以均才任宰相召入視其疾令兩騶扶之騶養馬者亦曰騶騎均拜謝曰天罰有罪所苦浸篤不復奉望帷幄因流涕而辭帝甚傷之召條扶侍均出賜錢三十萬均性寛和不喜文法常以爲吏能𢎞厚雖貪汙放縱猶無所害至於苛察之人身或廉法而巧􅃛刻削毒加百姓災害流亡所由而作及在尚書恒欲叩頭爭之以時方嚴切故遂不敢陳帝後聞其言而追悲之建初元年卒於家族子意意字伯志父京以大夏侯尚書教授夏侯勝也至遼東太守意少傳父業顯宗時舉孝廉以召對合㫖擢拜阿陽侯相阿陽縣屬天水郡故城在今秦州隴城縣西北建初中徵爲尚書肅宗性寛仁而親親之恩篤故叔父濟南中山二王每數入朝特加恩寵及諸昆弟竝留京師不遣就國意以爲人臣有節不宜踰禮過恩乃上疏諫曰陛下至孝烝烝恩愛隆深以濟南王康中山王焉先帝昆弟特䝉禮寵聖情戀戀不忍遠離比年朝見久留京師崇以叔父之尊同之家人之禮車入殿門即席不拜分甘損膳賞賜優渥昔周公懐聖人之德有致太平之功然後王曰叔父加以賜幣詩魯頌曰王曰叔父建爾元子俾侯于魯尚書曰周公既成洛邑成王命召公出取幣錫周公也今康焉幸以支庶享食大國陛下即位蠲除前過還所削黜衍食它縣衍謂流衍傍食它縣男女少長竝受爵邑恩寵踰制禮敬過度春秋之義諸父昆弟無所不臣所以尊尊卑卑彊幹弱枝者也陛下德業隆盛當爲萬世典法不宜以私恩損上下之序失君臣之正又平西王羡等六王皆妻子成家官屬備具當早就蕃國爲子孫基阯而室第相望久磐京邑磐謂盤桓不去婚姻之盛過於本朝僕馬之衆充塞城郭驕奢僭擬寵祿隆過今諸國之封竝皆膏腴風氣平調道路夷近朝聘有期行來不難宜割情不忍以義斷恩禮記曰門内之政恩掩義門外之政義斷恩發遣康焉各歸蕃國令羡等速就便時行日取便利之時也以塞衆望帝納之章和二年鮮卑擊破北匈奴而南單于乘此請兵北伐因欲還歸舊庭}
