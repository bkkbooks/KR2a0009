  - {type: variant, offset: 335, length: 574, content: 以安不能久敗則經年臣所以搏手叩心而增歎者也願假臣兩營二郡屯列坐食之兵五千出其不意與護羌校尉趙沖共相首尾土地山谷臣所曉習兵埶巧便臣已更之可不煩方寸之印尺帛之賜高可以滌患下可以納降若謂臣年少官輕不足用者凡諸敗將非官爵之不高年齒之不邁臣不勝至誠沒死自陳時帝不能用沖質之閒梁太后臨朝規舉賢良方正對策曰伏惟孝順皇帝初勤王政紀綱四方幾以獲安後遭姦偽威分近習畜貨聚馬戲謔是聞又因緣嬖倖受賂賣爵輕使賓客交錯其閒天下擾擾從亂如歸故每有征戰鮮不挫傷官民並竭上下窮虛臣在關西竊聽風聲未聞國家有所先後而威福之來咸歸權倖陛下體兼乾坤聰哲純茂攝政之初拔用忠貞其餘維綱多所改正遠近翕然望見太平而地震之後霧氣白濁日月不光旱魃為虐大賊從橫流血丹野庶品不安譴誠累至殆以姦臣權重之所致也其常侍尤無狀者亟便黜遣披埽凶黨收入財賄以塞痛怨以荅天誡今日立號雖尊可也實宜增脩謙節輔以儒術省去遊娛不急之務割減廬第無益之飾夫君者舟也人者水也羣臣乘舟者也將軍兄弟操檝者也若能平志畢力以度元元所謂福也如其怠薥將淪波濤可不慎乎夫德不稱祿猶鑿墉之趾以益其高豈量力審功安固之道哉凡諸宿猾酒徒戲客皆耳納邪聲口出諂言甘心逸遊唱造不義亦宜貶斥以懲不軌令冀等深思得賢之福失人之累又在位素餐尚書怠職有司依違莫肯糾察故使陛下專受諂諛之言不聞戶牖之外臣誠知阿諛有福深言近禍豈敢隱心以避誅責乎臣生長邊遠希涉紫庭怖慴失守言不盡心, WYG: ''}
