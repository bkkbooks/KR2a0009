  - {type: variant, offset: 95, length: 1, content: 羌, krp: 諭也今承百王之敝人尚文巧咸趨邪路莫能守正伏見虎賁中郎將竇憲椒房之親后妃以椒塗壁取其繁衍多子故曰椒房典司禁兵出入省闈年盛志美卑謙樂善此誠其好士交結之方然諸出入貴戚者類多瑕釁禁錮之人尤少守約安貧之節士大夫無志之徒更相販賣雲集其門衆喣飄山聚蚊成雷前書中山靖王之言蓋驕佚}
  - {type: variant, offset: 97, length: 1, content: 沒, WYG: 從生也三輔議論者至云以貴戚廢錮當復以貴戚浣濯之猶解酲當以酒也病酒曰酲詖險趣埶之徒誠不可親近蒼頡篇曰詖倿謟也臣愚願陛下中宮嚴𠡠憲等閉門自守無妄交通士大夫防其未萌慮於無形令憲永保福祿君臣交歡無纖介之隙此臣之至所願也劉攽曰案文當云是所至願也多一之字倒一所字倫奉公盡節言事無所依違諸子或時諫止輒叱遣之吏人奏記及便宜者亦并封上其無私若此性質慤少文采在位以貞白稱時人方之前朝貢禹前書曰貢禹字少翁琅邪人也以明經潔行著聞然少蘊藉不修威儀蘊藉猶寛博也亦以此見輕或問倫曰公有私乎對曰昔人有與吾千里馬者吾雖不受每三公有所選舉心不能忘而亦終不用也吾兄子常病一夜十往劉攽曰麻延年云唐睿宗下詔用十起作元子事夲出於此明當作起也退而安寢吾子有疾雖不省視而竟夕不眠若是者豈可謂無私乎連以老病上疏乞身元和三年賜策罷以二千石奉終其身加賜錢五十萬公宅一區後數年卒時年八十餘詔賜秘器衣衾錢布少子頡嗣劉攽曰案倫未嘗有爵無縁言嗣明多此一字歴桂陽廬江南陽太守所在見稱順帝之爲太子廢也樊豐等譖之廢爲濟陰王頡爲太中大夫與太僕來歴等共守闕固爭帝即位擢爲將作大匠卒官三輔決録注曰頡字子陵爲}
