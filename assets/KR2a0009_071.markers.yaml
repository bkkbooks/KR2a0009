  - {type: variant, offset: 2652, length: 728, content: 下東觀以疾去官復舉賢良對策第一擢拜議郎永壽元年遷安定屬國都尉初到職而南匈奴左薁鞬臺耆且渠伯德等七千餘人寇美稷東羌復舉種應之而奐壁唯有二百許人聞即勒兵而出軍吏以為力不敵叩頭爭止之奐不聽遂進屯長城收集兵士遣將王衞招誘東羌因據龜茲使南匈奴不得交通東羌諸豪遂相率與奐和親共擊薁鞬等連戰破之伯德惶恐將其衆降郡界以寧羌豪帥感奐恩德上馬二十匹先零酋長又遺金鐻八枚奐並受之而召主簿於諸羌前以酒酹地曰使馬如羊不以入廏使金如粟不以入懷悉以金馬還之羌性貪而貴吏清前有八都尉率好財貨為所患苦及奐正身絜己威化大行遷使匈奴中郎將時休屠各及朔方烏桓並同反叛燒度遼將軍門引屯赤阬烟火相望兵衆大恐各欲亡去奐安坐帷中與弟子講誦自若軍士稍安乃潛誘烏桓陰與和通遂使斬屠各渠帥襲破其衆諸胡悉降延熹元年鮮卑寇邊奐率南單于擊之斬首數百級明年梁冀被誅奐以故吏免官禁錮奐與皇甫規友善奐既被錮凡諸交舊莫敢為言唯規薦舉前後七上在家四歲復拜武威太守平均徭賦率厲散敗常為諸郡最河西由是而全其俗多妖忌凡二月五月產子及與父母同月生者悉殺之奐示以義方嚴加賞罰風俗遂改百姓生為立祠舉尤異遷度遼將軍數載閒幽并清靜九年春徵拜大司農鮮卑聞奐去其夏遂招結南匈奴烏桓數道入塞或五六千騎或三四千騎寇掠緣邊九郡殺略百姓秋鮮卑復率八九千騎入塞誘引東羌與共盟詛於是上郡沈氐安定先零諸種共寇武威張掖緣邊大被其毒朝廷以為憂復拜奐為護匈奴中郎將以九卿秩督幽并涼三州及度遼烏桓二營兼察刺史二千石能否賞賜甚厚匈奴烏桓聞奐至因相率還降凡二十萬口奐但誅其首惡餘皆慰納之唯鮮卑出塞去永康元年春東羌先零五六千騎寇關中圍祋祤掠雲陽夏復攻沒兩營殺千餘人冬羌岸尾摩蟞等脅同種復鈔三輔奐遣司馬尹端董卓並擊大破之斬其酋豪首虜萬餘人三州清定論功當封奐不事宦官故賞遂不行唯, WYG: 嗟歎}
