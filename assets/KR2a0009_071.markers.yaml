  - {type: variant, offset: 110, length: 0, content: '', WYG: 州從事公府辟舉髙第爲侍御史南頓令桂陽南陽廬江三郡太守諫議大夫洛陽無主人鄉里無田宅客止靈臺中或十日不炊司𨽻校尉南陽左雄太史令張衡尚書廬江朱建孟興皆與頡故舊各致禮餉頡終不受倫曾孫種論曰第五倫峭覈爲方峭覈謂其性峻急好窮覈事情非夫愷悌之士省其奏議惇惇歸諸寛厚惇惇純厚之貎也音敦將懲苛切之敝}
