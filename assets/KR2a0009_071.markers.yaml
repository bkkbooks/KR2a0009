  - {type: variant, offset: 111, length: 2, content: 率甲, WYG: 其然乎昔人以弦韋爲佩蓋猶此矣韓子曰西門豹性急佩韋以自緩董安于性緩佩弦以自急也然而君子侈不僭上儉不偪下禮記曰管仲鏤簋而朱紘旅樹而反玷山節藻梲賢大夫也而難爲上也晏平仲祀其先人豚肩不掩豆賢大夫也而難爲下也君子上不僭上下不偪下豈尊臨千里而與牧圉等庸乎詎非矯激則未可以中和言也種字興先少厲志義為吏冠名州郡永夀中以司徒掾淸詔使冀州廉察灾害風俗通曰汝南周勃辟太尉淸詔使荆州又此言以司徒淸詔使冀州蓋三公府有淸詔員以承詔使也廉察也舉奏刺史二千石以下所刑免甚衆棄官奔走者數十人還以奉使稱職拜高密侯相是時徐兗二州盜賊羣軰高密在二州之郊種乃大儲糧稸勤厲吏}
