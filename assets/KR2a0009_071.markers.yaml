  - {type: 'tls:seg', offset: 3438, content: '', id: KR2a0009_ZHSJ_071-d71p37s4}
  - {type: variant, offset: 3438, length: 0, content: '', WYG: 議欲從之意上疏曰夫戎狄之隔遠中國幽處北極爾雅曰東至於泰遠西至於邠國南至於濮鈆北至於祝栗謂之四極也界以沙漠簡賤禮義無有上下彊者爲雄弱即屈服自漢興以來征伐數矣其所尅獲曾不補害光武皇帝躬服金革之難深昭天地之明故因其來降羈縻畜養邉人得生勞役休息於兹四十餘年矣今鮮卑奉順斬獲萬數中國坐享大功享受也而百姓不知其勞漢興功烈於斯爲盛所以然者夷虜相攻無損漢兵者也臣察鮮卑侵伐匈奴止是利其抄掠及歸功聖朝實由貪得重賞今若聽南虜還都北庭則不得不禁制鮮卑鮮卑外失暴掠之願内無功勞之賞豺狼貪婪必爲邊患今北虜西遁請求和親宜因其歸附以爲外扞巍巍之業無以過此若引兵費賦以順南虜則坐失上略去安即危矣誠不可許㑹南單于竟不北徙遷司𨽻校尉永元初}
