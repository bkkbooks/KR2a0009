  - {type: variant, offset: 3387, length: 0, content: '', WYG: 貧爲郎常獨直臺上無被枕杫杫音思潰反謂爼几也方言云蜀漢之郊曰杫食糟糠帝每夜入臺輒見崧問其故甚嘉之自此詔太官賜尚書以下朝夕餐給帷被皂袍及侍史二人蔡質漢官儀曰尚書郎入直臺中官供新靑縑白綾被或錦被晝夜更宿帷帳晝通中枕卧旃蓐冬夏隨時改易大官供食五日}
