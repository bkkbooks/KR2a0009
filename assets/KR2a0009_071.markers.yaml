  - {type: variant, offset: 3428, length: 2, content: 振旅, krp: 山陽楚沛多蝗其飛至九江界者輒東西散去由是名稱遠近浚遒縣有唐后二山民共祠之浚遒縣屬廬江郡故城在今廬州愼縣南衆巫遂取百姓男女一以為公嫗以男爲山公以女爲山嫗猶祭之有尸主也歲歲改易既}
  - {type: variant, offset: 3431, length: 0, content: '', WYG: 不敢嫁娶前後守令莫敢禁均乃下書曰自今以後爲山娶者皆娶巫家勿擾良民於是遂絶永平元年遷東海相在郡五年坐法免官客授潁川而東海吏民思均恩化爲之作歌詣闕乞}
