  - {type: variant, offset: 5741, length: 320, content: 四億如此則可令羣羌破盡匈奴長服內徙郡縣得反本土伏計永初中諸羌反叛十有四年用二百四十億永和之末復經七年用八十餘億費耗若此猶不誅盡餘孽復起于茲作害今不暫疲人則永寧無期臣庶竭駑劣伏待節度帝許之悉聽如所上建寧元年春熲將兵萬餘人齎十五日糧從彭陽直指高平與先零諸種戰於逢義山虜兵盛熲衆恐熲乃令軍中張鏃利刃長矛三重挾以強弩列輕騎為左右翼淚怒兵將曰今去家數千里進則事成走必盡死努力共功名因大呼衆皆應騰赴熲馳騎於傍突而擊之虜衆大潰斬首八千餘級獲牛馬羊二十八萬頭時竇太后臨朝下詔曰先零東羌歷載為患熲前陳狀欲必埽滅涉履霜雪兼行晨夜身當矢石感厲吏士曾未浹日凶醜奔破連尸積俘掠獲無筭洗雪百年之逋負以慰忠將之亡魂功用顯著朕甚嘉之須東羌盡定當并錄功勤今且賜熲錢二十萬以家, WYG: ''}
