  - {type: variant, offset: 1307, length: 399, content: 稟多殺降羌涼州刺史郭閎漢陽太守趙熹並老弱不堪任職而皆倚恃權貴不遵法度規到州界悉條奏其罪或免或誅羌人聞之翕然反善沈氐大豪滇昌飢恬等十餘萬口復詣規降規出身數年持節為將擁衆立功還督鄉里既無它私惠而多所舉奏又惡絕宦官不與交通於是中外並怨遂共誣規貨賂羣羌令其文降天子璽書誚讓相屬規懼不免上疏自訟曰四年之秋戎醜蠢戾爰自西州侵及涇陽舊都懼駭朝廷西顧明詔不以臣愚駑急使軍就道幸蒙威靈遂振國命羌戎諸種大小稽首輒移書營郡以訪誅納所省之費一億以上以為忠臣之義不敢告勞故恥以片言自及微効然比方先事庶免罪悔前踐州界先奏郡守孫儁次及屬國都尉李翕督軍御史張稟旋師南征又上涼州刺史郭閎漢陽太守趙熹陳其過惡執據大辟凡此五臣支黨半國其餘墨綬下至小吏所連及者復有百餘吏託報將之怨子思復父之恥載贄馳車懷糧步走交搆豪門競流謗讟云臣私報諸羌謝其錢貨若臣以私財則家無擔石如物出於官則文簿易考就臣愚惑信如言者前世尚遺匈奴以宮姬鎮烏孫以公主今臣但費, WYG: 恢坐臧}
