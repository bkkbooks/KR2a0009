  - {type: variant, offset: 31, length: 3, content: 棱度遼, WYG: 少遭飢亂實不敢妄過人食華嶠書曰上復曰聞卿爲市掾人有遺母一笥餅者卿從外來見之奪母笥探口中餅信乎倫對曰實無此衆人以臣愚蔽故爲生是語也帝大笑倫出有詔以爲扶夷長扶夷縣屬零陵郡故城在今邵州武岡縣東北未到官追拜㑹稽太守雖爲二千石躬自斬芻養馬妻執炊㸑受俸裁留一月糧餘皆賤貿與民之貧羸者㑹稽俗多滛祀好卜筮民常以牛祭神百姓財産以之困匱其自食牛肉而不以薦祠者發病且死先爲牛鳴前後郡將莫敢禁倫到官移書屬縣曉告百姓其巫祝有依託鬼神詐怖愚民皆案論之有妄屠牛者吏輒行罰民初恐懼或祝詛妄言倫案之愈急後遂斷絶百姓以安永平五年坐法徵老小攀車叩馬嗁呼相隨日裁行數里不得前倫乃偽止亭舍隂乘船去衆知復追之及詣廷尉吏民上書守闕者千餘人是時顯宗方案梁松事亦多爲松訟者帝患之詔公車諸爲梁氏及㑹稽太守上書者勿復受㑹帝幸廷尉錄囚徒得免歸田里身自耕種不交通人物數歳拜為宕渠令宕渠縣故城在今渠州流江縣東北顯㧞鄉佐𤣥賀賀後為九江沛二郡守以淸潔稱所在化行終於大司農倫在職四年遷蜀郡太守蜀地肥饒人吏富實掾史家貲多至千萬皆鮮車怒馬以財貨自達怒馬謂馬之肥壯其氣憤怒也倫悉簡其豐贍者遣還之更選孤貧志行之人以處曹任於是爭賕抑絶以財相貨曰賕音其又反又音求文職修理所舉吏多至九卿二千石時以爲知人視事七歲肅宗初立擢自遠郡代牟融為司空帝以明德太后故尊崇舅氏馬廖兄弟竝居職任廖等傾身交結冠葢之士爭赴趣之倫以后族過盛欲令朝廷抑損其權上疏曰臣聞忠不隱諱直不避害不勝愚狷昧死自表狷狂狷也書曰臣無作威作福其害于而家凶于而國尚書洪範之言傳曰大夫無境外之交束脩之饋穀梁傳之文也束帛也脩脯也饋遺也近代光烈皇后雖友愛天至而卒使隂就歸國徙廢隂興賔客其後梁竇之家互有非法明帝即位竟多誅之自是洛中無復權戚書記請託一皆斷絶又譬諸外戚曰譬猶諭也苦身待士不如為國戴盆望天事不兩施司馬遷書曰僕以為戴盆何以望天也臣常刻著五藏書諸紳帶刻著五藏謂銘之於心也紳謂大帶垂之三尺論語曰子張書諸紳也而今之議者復以馬氏爲言竊聞衞尉廖以布三千匹城門校尉防以錢二百萬私贍三輔衣冠知與不知莫不畢給又聞臘月亦遺其在洛中者錢各五千越騎校尉光臘用羊三百頭米四百斛肉五千斤臣愚以爲不應經義惶恐不敢以不聞陛下情欲厚之亦宜所以安之臣今言此誠欲上忠陛下下全后家裁䝉省察裁與纔同及馬防爲車騎}
