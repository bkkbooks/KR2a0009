  - {type: variant, offset: 29, length: 1, content: 祖, WYG: 其先齊諸田史記曰陳公子完奔齊以陳字為田氏應劭注云始食采於田改姓田氏諸田徙園陵者多故以次第爲氏倫少介然有義行王莽末盗賊起宗族閭里爭往附之倫乃依險固築營壁有賊輒奮厲其衆引彊持滿以拒之引彊謂弓弩之多力者控引之持滿不發也銅馬赤眉之屬前後數十軰皆不能下東觀記曰時米石萬錢人相食倫獨收養孤兄子外孫分糧共食死生相守鄉里以此賢之倫始以營長詣郡尹鮮于褒風俗通曰武王封箕子于朝鮮其子食采於朝鮮因氏焉褒見而異之署爲吏後褒坐事左轉髙唐令髙唐縣屬平原郡故城在今齊州祝阿縣西臨去握倫臂訣曰恨相知晚訣别也東觀記曰倫歩擔往候之留十餘日將倫上堂令妻子出相對以屬託焉倫後爲鄉嗇夫平徭賦理怨結得人歡心自以爲久宦不達遂將家屬客河東變名姓自稱王伯齊載鹽往來太原上黨所過輒爲糞除而去糞除猶掃除也陌上號爲道士親友故人莫知其處數年鮮于襃薦之於京兆尹閻興興卽召倫爲主簿時長安鑄錢多姦巧乃署倫爲督鑄錢掾領長安市東觀漢記曰時長安市未有秩又鑄錢官姦輕所集無能整齊理之者興署倫督鑄錢掾領長安市其後小人爭訟皆云第五掾所平市無姦枉劉攽曰注姦輕所集案姦輕無理當是軌字倫平銓衡正斗斛市無阿枉百姓悦服每讀詔書常歎息曰此聖主也一見決矣等軰笑之曰爾説將尚不下安能動萬乘乎華嶠書曰蓋延代鮮于襃為馮翊多非法倫數切諫延恨之故滯不得舉將謂州將倫曰未遇知已道不同故耳建武二十七年舉孝亷補淮陽國醫工長隨王之國光武召見甚異之二十九年從王朝京師隨官屬得㑹見帝問以政事倫因此酬對政道帝大悅明日復特召入與語至夕帝戯謂倫曰聞卿為吏篣婦公不過從兄飯寧有之邪倫對曰臣三娶妻皆無}
