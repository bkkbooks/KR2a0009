  - {type: 'tls:seg', offset: 2317, content: '', id: KR2a0009_ZHSJ_019-d19p15s2}
  - {type: variant, offset: 2317, length: 382, content: 公孫述遣將程焉將數萬人就呂鮪出屯陳倉異與趙匡迎擊大破之焉退走漢川異追戰於箕谷復破之還擊破呂鮪營保降者甚衆其後蜀復數遣將閒出異輒摧挫之懷來百姓申理枉結出入三歲上林成都異自以久在外不自安上書思慕闕廷願親帷幄帝不許後人有章言異專制關中斬長安令威權至重百姓歸心號為咸陽王帝使以章示異異惶懼上書謝曰臣本諸生遭遇受命之會充備行伍過蒙恩私位大將爵通侯受任方面以立微功皆自國家謀慮愚臣無所能及臣伏自思惟以詔勑戰攻每輒如意時以私心斷決未嘗不有悔國家獨見之明久而益遠乃知性與天道不可得而聞也當兵革始起擾攘之時豪傑競逐迷惑千數臣以遭遇託身聖明在傾危溷殽之中尚不敢過差而況天下平定上尊下卑而臣爵位所蒙巍巍不測乎誠冀以謹勑遂自終始見所示臣章戰慄怖懼伏念明主知臣愚性固敢因緣自陳詔報曰將軍之於國家義為君臣恩猶父子何嫌何疑而有懼意六年春異朝京師引見帝謂公卿曰是我起兵時主簿也為吾披荊棘定關中既罷, WYG: 七月}
