  - {type: variant, offset: 62, length: 798, content: 略地潁川攻父城不下屯兵巾車鄉異閒出行屬縣為漢兵所執時異從兄孝及同郡丁綝呂晏並從光武因共薦異得召見異曰異一夫之用不足為彊弱有老母在城中願歸據五城以効功報德光武曰善異歸謂苗萌曰今諸將皆壯士屈起多暴橫獨有劉將軍所到不虜掠觀其言語舉止非庸人也可以歸身苗萌曰死生同命敬從子計光武南還宛更始諸將攻父城者前後十餘輩異堅守不下及光武為司隸校尉道經父城異等即開門奉牛酒迎光武署異為主簿苗萌為從事異因薦邑子銚期叔壽段建左隆等光武皆以為掾史從至洛陽更始數欲遣光武徇河北諸將皆以為不可是時左丞相曹竟子詡為尚書父子用事異勸光武厚結納之及度河北詡有力焉自伯升之敗光武不敢顯其悲戚每獨居輒不御酒肉枕席有涕泣處異獨叩頭寬譬哀情光武止之曰卿勿妄言異復因閒進說曰天下同苦王氏思漢久矣今更始諸將從橫暴虐所至虜掠百姓失望無所依戴今公專命方面施行恩德夫有桀紂之亂乃見湯武之功人久飢渴易為充飽宜急分遣官屬徇行郡縣理冤結布惠澤光武納之至邯鄲遣異與銚期乘傳撫循屬縣錄囚徒存魚眾寡亡命自詣者除其罪陰條二千石長吏同心及不附者上之及王郎起光武自薊東南馳晨夜草舍至饒陽無蔞亭時天寒烈衆皆飢疲異上豆粥明旦光武謂諸將曰昨得公孫豆粥飢寒俱解及至南宮遇大風雨光武引車入道傍空舍異抱薪鄧禹𤎮火光武對竈燎衣異復進麥飯菟肩因復度虖沱河至信都使異別收河閒兵還拜偏將軍從破王郎封應侯異為人謙退不伐行與諸將相逢輒引車避道進止皆有表識軍中號為整齊每所止舍諸將並坐論功異常獨屏樹下軍中號曰大樹將軍及破邯鄲乃更部分諸將各有配隸軍士皆言願屬大樹將軍光武以此多之別擊破鐵脛於北平又降匈奴于林闟頓王因從平河北時更始遣舞陰王李軼廩丘王田立大司馬朱鮪白虎公陳僑將兵號三十萬與河南太守武勃共守洛陽光武將北徇燕趙以魏郡河內獨不逢兵而城邑完倉廩實乃拜寇恂為河內太守異為孟津將軍統二郡軍河上與恂合埶以拒朱鮪等異乃遺李軼書曰愚聞明鏡所以照形往事所以知今昔微子去殷而入周項伯畔楚而歸漢周勃迎代王而黜少, WYG: ''}
