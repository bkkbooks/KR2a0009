  - {type: variant, offset: 7152, length: 571, content: 二創帝以復敢深入希令遠征而壯其勇節常自從之故復少方面之勳諸將每論功自伐復未嘗有言帝輒曰賈君之功我自知之十三年定封膠東侯食郁秩壯武下密即墨梃胡觀陽凡六縣復知帝欲偃干戈修文德不欲功臣擁衆京師乃與高密侯鄧禹並剽甲兵敦儒學帝深然之遂罷左右將軍復以列侯就第加位特進復為人剛毅方直多大節既還私第闔門養威重朱祐等薦復宜為宰相帝方以吏事責三公故功臣並不用是時列侯唯高密固始膠東三侯與公卿參議國家大事恩遇甚厚三十一年卒謚曰剛侯子忠嗣忠卒子敏嗣建初元年坐誣告母殺人國除肅宗更封復小子邯為膠東侯邯弟宗為即墨侯各一縣邯卒子育嗣育卒子長嗣宗字武孺少有操行多智略初拜郎中稍遷建初中為朔方太守舊內郡徙人在邊者率多貧弱為居人所僕役不得為吏宗擢用其任職者與邊吏參選轉相監司以擿發其姦或以功次補長吏故各願盡死匈奴畏之不敢入塞徵為長水校尉宗兼通儒術每讌見常使與少府丁鴻等論議於前章和二年卒朝廷愍惜焉子參嗣參卒子建嗣元初元年尚和帝女臨潁長公主主兼食潁陰許合三縣數萬戶時鄧太后蟈癒光寵最盛以建為侍中順帝時為光祿勳論曰中興將帥立功名者衆矣唯岑彭馮異建方面之號自函谷以西方城以南兩將之功實為大焉若馮賈之不伐岑公之義信乃足以感三軍而懷敵人故能剋成遠業終全其慶也昔高祖忌柏人之名違之以全福征南惡彭亡之地留之以生災豈幾慮自有明惑將期數使之然乎贊曰陽夏師克實在和德膠東鹽吏征南宛賊奇鋒震敵遠圖謀國, WYG: 九考證}
