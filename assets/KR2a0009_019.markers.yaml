  - {type: variant, offset: 5096, length: 1356, content: 功者百餘人彭攻秦豐三歲斬首九萬餘級豐餘兵裁千人又城中食且盡帝以豐轉弱令朱祐代彭守之使彭與傅俊南擊田戎大破之遂拔夷陵追至秭歸戎與數十騎亡入蜀盡獲其妻子士衆數萬人彭以將伐蜀漢而夾川穀少水險難漕運留威虜將軍馮駿軍江州都尉田鴻軍夷陵領軍李玄軍夷道自引兵還屯津鄉當荊州要會喻告諸蠻夷降者奏封其君長初彭與交阯牧鄧讓厚善與讓書陳國家威德又遣偏將軍屈充移檄江南班行詔命於是讓與江夏太守侯登武陵太守王堂長沙相韓福桂陽太守張隆零陵太守田翕蒼梧太守杜穆交阯太守錫光等相率遣使貢獻悉封為列侯或遣子將兵助彭征伐於是江南之珍始流通焉六年冬徵彭詣京師數召讌見厚加賞賜復南還津鄉有詔過家上冢大長秋以朔望問太夫人起居八年彭引兵從車駕破天水與吳漢圍隗囂於西城時公孫述將李育將兵救囂守上邽帝留蓋延耿弇圍之而車駕東歸勑彭書曰兩城若下便可將兵南擊蜀虜人苦不知足既平隴復望蜀每一發兵頭鬚為白彭遂壅谷水灌西城城未沒丈餘囂將行巡周宗將蜀救兵到囂得出還冀漢軍食盡燒輜重引兵下隴延弇亦相隨而退囂出兵尾擊諸營彭殿為後拒故諸將能全師東歸彭還津鄉九年公孫述遣其將任滿田戎程汎將數萬人乘枋箄下江關擊破馮駿及田鴻李玄等遂拔夷道夷陵據荊門虎牙橫江水起浮橋鬬樓立欑柱絕水道結營山上以拒漢兵彭數攻之不利於是裝直進樓船冒突露橈數千艘十一年春彭與吳漢及誅虜將軍劉隆輔威將軍臧宮驍騎將軍劉歆發南陽武陵南郡兵又發桂陽零陵長沙委輸棹卒凡六萬餘人騎五千匹皆會荊門吳漢以三郡棹卒多費糧穀欲罷之彭以蜀兵盛不可遣上書言狀帝報彭曰大司馬習用步騎不曉水戰荊門之事一由征南公為重而已彭乃令軍中募攻浮橋先登者上賞於是偏將軍魯奇應募而前時天風狂急彭奇船逆流而上直浮橋而欑柱鉤不得去奇等乘埶殊死戰因飛炬焚之風怒火盛橋樓崩燒彭復悉軍順風並進所向無前蜀兵大亂溺死者數千人斬任滿生獲程汎而田戎亡保江州彭上劉隆為南郡太守自率臧宮劉歆長驅入江關令軍中無得虜掠所過百姓皆奉牛酒迎勞彭見諸耆老為言大漢哀愍巴蜀久見虜役故興師遠伐以討有罪為人除害讓不受其牛酒百姓皆大喜悅爭開門降詔彭守益州牧所下郡輒行太守事彭到江州以田戎食多難卒拔留馮駿守之自引兵乘利直指墊江攻破平曲收其米數十萬石公孫述使其將延岑呂鮪王元及其弟恢悉兵拒廣漢及資中又遣將侯丹率二萬餘人拒黃石彭乃多張疑兵使護軍楊翕與臧宮拒延岑等自分兵浮江下還江州泝都江而上襲擊侯丹大破之因晨夜倍道兼行二千餘里徑拔武陽使精騎馳廣都去成都數十里埶若風雨所至皆奔散初述聞漢兵在平曲故遣大兵逆之及彭至武陽繞出延岑軍後蜀地震駭述大驚以杖擊地曰是何神也彭所營地名彭亡聞而惡之欲徙會日暮蜀刺客詐為亡奴降夜刺殺彭彭首破荊門長驅武陽持軍整齊秋豪無犯邛穀王任貴聞彭威信數千里遣使迎降會彭已薨帝盡以任貴所獻賜彭妻子謚曰壯侯蜀人憐之為立廟武陽歲時祠焉子遵嗣徙封細陽侯十三年帝思彭功復封遵弟淮為穀陽侯遵永平中為屯騎校尉遵卒子伉嗣伉卒子嵵嗣元初三年坐事失國建光元年安帝復封嵵細陽侯順帝時為光祿勳嵵卒子熙嗣尚安帝妹涅陽長公主少為侍中虎賁中郎將朝廷多稱其能遷魏郡太守招聘隱逸與參政事無為而化視事二年輿人歌之曰我有枳棘岑君伐之我有蟊賊岑君遏之狗吠不驚足下生氂含哺鼓腹焉知凶災我喜我生獨丁斯時美矣岑君於戲休茲熙卒子福嗣為黃門侍郎賈復字君文南陽冠軍人也少好學習尚書事舞陰李生李生奇之謂門人曰賈君之容貌志氣如此而勤於學將相, WYG: 金玉銀銅}
