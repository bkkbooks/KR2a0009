  - {type: variant, offset: 4369, length: 4, content: 使彭擊荊, WYG: 立大社稷於雒陽在宗廟之右馬融周禮注曰社稷在右宗廟在左或曰王者五社大社在中門之外惟松東社八里惟栢西社九里惟栗南社七里惟梓北社六里惟槐禮郊特牲曰社祭土而主隂氣也王肅注曰五行之主也能吐生百榖者也馬昭曰列為五官直一行之名耳自不専主隂氣隂氣地可以為之主曰五行之主也若社則為五行之主何復言社稷五祀乎土自列於五祀社亦自復有祀不得同也昭又曰土地同也焉得有二書曰禹敷土又曰句龍能平九土九土九}
