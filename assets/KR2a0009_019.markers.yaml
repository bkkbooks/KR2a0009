  - {type: variant, offset: 4593, length: 0, content: '', WYG: 因而不可已者也屯有經綸之義暌有異同之辭歸於建國立家通志㫁類也意則欲廣其微以宗實備其論以求真先難而後易出異而歸同乎難曰社祭土主隂氣正所謂句龍土行之官為社則主隂明矣不與記説有違錯也答曰今記之言社輙與郊連體有本末辭有上下謂之不錯不可得禮運曰政必本於天殽以降命命降于社之謂殽地參於天地並於鬼神又曰祭帝於郊所以定天位也祀社於國所以列地利也郊特牲曰社所以神地之道也地載萬物天垂象取財於地取法於天是以尊天而親地家主中霤國主社示本也相此之類元尚不道配食者也主以為句龍無乃失歟難曰信如此所言土尊故以為首在於上宗伯之體所當列上下之叙上句當言天神地祗人鬼何反先人而後地上文如此至下何以獨不可而云社非句龍當為地哉答曰此形成著體數自上來之次言之耳豈足據使從人鬼之例邪三科之祭各指其體今獨擿出社稷以為但句龍有烈山氏之子恐非其本意也案記言社土而云何得之為句龍則傳雖言祀句龍為社亦何嫌反獨不可謂之配食乎祭法曰周人禘嚳郊稷祖文王宗武王皆以為配食者若復可須謂之不祭天乎備讀傳者則真土獨據記者則疑句龍未若交錯參伍致其義以相成之為善也雖曰再特於郊牛者后稷配故也社于新邑牛一羊一豕一所以用二牲者立社位祀句龍縁人事之也如此非祀地明矣以宫室新成故立社耳又曰軍行載社者當行賞罰明不自専故告祖而行賞造社而行戮二主明皆人鬼人鬼故以告之必若所云當言載地主於齋車又當言用命賞於天不用命戮于地非其謂也所以有死社稷之義者凡賜命受國造建宫室無不立社是奉言所受立不可棄捐茍免而去當死之也易句龍為其社傳有見文今欲易神之相令記附食冝明其徴祀國大事不可不重㩀經依傳庶無咎悔答曰郊特牲者天至尊無物以稱専誠而社稷太牢者土於天為卑縁人事以牢祭也社禮今亡并特之義未可得明也昭告之文皆於天地何獨人鬼此言則未敢取者也郊社之次天地之序也今使句龍載冒其名耦文於天以度言之不可謂安矣土者人所依以固而最近者也故立以為守祀居則事之時軍則告之以行戳自順義也何為當平於社不言用命賞于天乎帝王兩儀之参宇中之莫尊者也而盛一官之臣以為土之貴神置之宗廟之上接之郊禘之次俾守之者有死無失何聖人制法之参差用禮之偏頗其列在先王人臣之位其於四官爵侔班同比之司徒於數居二縱復令王者不同禮儀相變或有尊之則不過當若五卿之與冢宰此坐之上下行之先後耳不得同祖與社言俱坐處尊位也周禮為禮之經而禮記為禮之傳案經傳求索見文在於此矣鈞之兩者未知孰是去本神而不祭與貶句龍為土配比其輕重何謂為甚經有條例記有明義先儒未能正不可稱是鉤校典籍論本考始矯}
