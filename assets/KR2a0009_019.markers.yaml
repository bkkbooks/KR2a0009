  - {type: variant, offset: 4382, length: 1, content: 時, WYG: 五行土官之名耳方壇白虎通曰春秋文義天子社廣五丈諸侯半之其色東方青}
  - {type: variant, offset: 4382, length: 1, content: 時, krp: 五行土官之名耳方壇白虎通曰春秋文義天子社廣五丈諸侯半之其色東方青}
  - {type: variant, offset: 4385, length: 0, content: '', WYG: 赤西方白北方黒上冒以黄土故将封東方諸侯取青土苴以白茅各取其靣以為封社明土謹敬絜淨也祭社有樂禮記曰樂之施於金石越於聲音用於宗廟社稷獨㫁曰天子太社封諸侯者取其土苞以白茅授之以立社其國故謂之受茅土漢興唯皇子封為王者得茅土其他功臣以户數租入為節不受茅土不立社也無屋有牆門而已禮記曰天子太社必受霜露風雨以逹天地之氣也盧植曰謂無屋二月八月及臘一嵗三祠皆太牢具使有司祠禮記曰地載萬物天垂象取財於地取法於天是以尊天而親地故敎民美報焉家主中霤而國主社示本也盧植曰諸主祭以土地為本也中霤其神后土即句龍也既祀於社又祀中霤古今注曰建武二十一年二月乙酉徙立社稷上東門内漢舊儀使者監祠南向立不拜也孝經援神契曰社者土地之主也稷者五榖之長也月令章句曰稷秋夏乃熟歴四時備隂陽榖之貴者禮記及國語皆謂共工氏之子曰句龍為后土官能平九土故祀以為社烈山氏之子曰柱能植百榖蔬自夏以上祀以為稷至殷以柱久逺而堯時棄為后稷亦植百榖故廢柱祀棄為稷案前志立官社以夏禹配王莾奏立官稷后稷配也大司農鄭𤣥説古者官有大功則配食其神故勾龍配食於社棄配食於稷白虎通曰王者所以有社稷何為天下求福報功人非土不立非榖不食土地廣博不可徧敬五榖衆多不可一一而祭故封土立社示有土也稷五榖之長故封稷而祭之也稷者得隂陽中和之氣而用}
