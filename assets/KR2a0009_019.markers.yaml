  - {type: variant, offset: 861, length: 568, content: 霍光尊孝宣而廢昌邑彼皆畏天知命覩存亡之符見廢興之事故能成功於一時垂業於萬世也笱令長安尚可扶助延期歲月疏不閒親遠不踰近季文豈能居一隅哉今長安壞亂赤眉臨郊王侯搆難大臣乖離綱紀已絕四方分崩異姓並起是故蕭王跋涉霜雪經營河北方今英俊雲集百姓風靡雖邠岐憬不足以喻季文誠能覺悟成敗亟定大計論功古人轉禍為福在此時矣如猛將長驅嚴兵圍城雖有悔恨亦無及已初軼與光武首結謀約加相親愛及更始立反共陷伯升雖知長安已危欲降又不自安乃報異書曰軼本與蕭王首謀造漢結死生之約同榮枯之計今軼守洛陽將軍鎮孟津俱據機軸千載一會思成斷金唯深達蕭王願進愚策以佐國安人軼自通書之後不復與異爭鋒故異因此得北攻天井關拔上黨兩城又南下河南成臯已東十三縣及諸屯聚皆平之降者十餘萬武勃將萬餘人攻諸畔者異引軍度河與勃戰於士鄉下大破斬勃獲首五千餘級軼又閉門不救異見其信效具以奏聞光武故宣露軼書令朱鮪知之鮪怒遂使人刺殺軼由是城中乖離多有降者鮪乃遣討難將軍蘇茂將數萬人攻溫鮪自將數萬人攻平陰以綴異異遣校尉護軍將軍將兵與寇恂合擊茂破之異因度河擊鮪鮪走異追至洛陽環城一帀而歸移檄上狀諸將皆入賀并勸光武即帝位光武乃召異詣鄗問四方動靜異曰三王反畔更始敗亡天下無主宗廟之憂在於大王宜從衆議上為社稷下為百姓光武曰我昨夜夢乘赤龍上天覺悟心中動悸異因下席再拜賀曰此天命發於精神心中動悸大王重慎之性也異遂與諸將定議上尊號, WYG: ''}
