  - {type: variant, offset: 2204, length: 112, content: 百姓飢餓人相食黃金一斤易豆五升道路斷隔委輸不至軍士悉以果實為糧詔拜南陽趙匡為右扶風將兵助異并送縑穀軍中皆稱萬歲異兵食漸盛乃稍誅擊豪傑不從令者襃賞降附有功勞者悉遣其渠帥詣京師散其衆歸本業威行關中唯呂鮪張邯蔣震遣使降蜀其餘悉平明, WYG: 各且因故園廟祭祀古今注曰建武十八}
