  - {type: variant, offset: 3426, length: 4, content: 將佐命虎, WYG: 太牢皆有副倅故高廟三主親毁之後亦但殷祭之嵗奉祠决疑要注曰毁廟主藏廟外户之外西牖之中有石函名曰宗祏函中有笥以盛主親盡則廟毁毁廟之主藏於始祖之廟一世為祧祧猶四時祭之二世為壇三世為墠四世為鬼祫乃祭之有禱亦祭之祫於始祖之廟禱則迎主出陳於壇墠而祭之事訖還藏故室迎送皆蹕禮也靈帝崩獻帝即位初平中相國董卓左中郎将蔡邕等以和帝以下功徳無殊而有過差不應為宗及餘非宗者追尊三后皆奏毁之袁山松書載邕議曰漢承亡秦滅學之後宗廟之制不用周禮每帝即位輙立一廟不止於七貢不列昭穆不定迭毁元皇帝時丞相匡衡御史大夫禹始建大議請依典禮孝文孝武孝宣皆以功徳茂盛為宗不毁孝宣尊崇孝武歴稱世宗中正大}
