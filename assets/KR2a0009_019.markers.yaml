  - {type: variant, offset: 3314, length: 0, content: '', WYG: 大祫祭子孫諸帝以昭穆坐于高廟諸隳廟神皆合食設左右坐高祖南面幄繡帳望堂上西北隅帳中坐長一丈廣六尺繡絪厚一尺著之以絮四百觔曲几黄金釦器高后右坐亦幄帳却六寸白銀釦器每牢中分之左辨上帝右辨上后爼餘委肉積於前數千觔名曰惟爼子為昭孫為穆昭西靣曲屛風穆東靣皆曲几如高祖饌陳其右各配其祖坐如祖妣之法太常導皇帝入北門羣臣陪者皆舉手班辟抑首伏大鴻臚大行令九儐傳曰起復位而皇帝上堂􅏕侍中以巾奉觯酒從帝進拜謁賛饗曰嗣曽孫皇帝敬再拜前上酒却行至昭穆之坐次上酒子為昭孫為穆各父子相對也畢却西靣坐坐如乘輿坐賛饗奉高祖賜夀皇帝起再拜即席以太牢之左辨賜皇帝如祠其夜半入行禮平明上九巵畢羣臣皆拜因賜胙皇帝出即}
  - {type: variant, offset: 3314, length: 0, content: '', krp: 大祫祭子孫諸帝以昭穆坐于高廟諸隳廟神皆合食設左右坐高祖南面幄繡帳望堂上西北隅帳中坐長一丈廣六尺繡絪厚一尺著之以絮四百觔曲几黄金釦器高后右坐亦幄帳却六寸白銀釦器每牢中分之左辨上帝右辨上后爼餘委肉積於前數千觔名曰惟爼子為昭孫為穆昭西靣曲屛風穆東靣皆曲几如高祖饌陳其右各配其祖坐如祖妣之法太常導皇帝入北門羣臣陪者皆舉手班辟抑首伏大鴻臚大行令九儐傳曰起復位而皇帝上堂盥侍中以巾奉觯酒從帝進拜謁賛饗曰嗣曽孫皇帝敬再拜前上酒却行至昭穆之坐次上酒子為昭孫為穆各父子相對也畢却西靣坐坐如乘輿坐賛饗奉高祖賜夀皇帝起再拜即席以太牢之左辨賜皇帝如祠其夜半入行禮平明上九巵畢羣臣皆拜因賜胙皇帝出即}
  - {type: variant, offset: 3315, length: 2, content: 封彰, WYG: 衣中詔罷當從者奉承丁孚漢儀有桓帝祠恭懐皇后祝文曰孝曽孫皇帝志使有司臣太常撫夙興夜處小心畏忌不墮其身一不寜敢用絜牲一元大武柔毛剛鬛啇祭明視薌萁嘉薦普淖醎鹺豐本明粢醪用薦酎事于恭懐皇后尚饗嘏辭賜皇帝福恭懐皇后命工祝承致多福無疆于爾孝曽孫皇帝使爾受禄于天冝稼于田眉夀萬年介爾景福俾守爾民勿替引之太常再拜太牢左辨以致皇帝光武皇帝崩明帝即位以光武帝撥亂中興更為起廟尊號曰世祖廟蔡邕表志曰孝明立世祖廟以明再受命祖有功之義後嗣遵儉不復改立皆藏主其中聖明所制一王之法也自執事之吏下至學士莫能知其所以兩廟之意誠冝具録本事建武乙未元和丙寅詔書下宗廟儀及齋令冝入郊祀志永為典式}
  - {type: page-break, offset: 3315, content: '', id: KR2a0009_WYG_019-4a, image: WYG0252/WYG0252-0284c.png}
