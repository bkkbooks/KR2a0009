  - {type: variant, offset: 1706, length: 340, content: 數十日雖屢獲雄將餘衆尚多可稍以恩信傾誘難卒用兵破也上今使諸將屯黽池要其東而異擊其西一舉取之此萬成計也禹弘不從弘遂大戰移日赤眉陽敗棄輜重走車皆載土以豆覆其上兵士飢爭取之赤眉引還擊弘弘軍潰亂異與禹合兵救之赤眉小卻異以士卒飢倦可且休禹不聽復戰大為所敗死傷者三千餘人禹得脫歸宜陽異棄馬步走上回谿阪與麾下數人歸營復堅壁收其散卒招集諸營保數萬人與賊約期會戰使壯士變服與赤眉同伏於道側旦日赤眉使萬人攻異前部異裁出兵以救之賊見埶弱遂悉衆攻異異乃縱兵大戰日昃賊氣衰伏兵卒起衣服相亂赤眉不復識別衆遂驚潰追擊大破於崤底降男女八萬人餘衆尚十餘萬東走宜陽降璽書勞異曰赤眉破平士吏勞苦始雖垂翅回谿終能奮翼黽池可謂失之東隅收之桑榆方論功賞以荅大勳時赤眉雖降衆寇猶盛延岑據藍田王歆據下邽芳丹據新豐蔣震據霸陵張邯據, WYG: 祠祭}
