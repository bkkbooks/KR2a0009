  - {type: variant, offset: 3407, length: 2, content: 夙夜, WYG: 哀懼戰慄無所奉承愛而勞之所望於王也謝沈書曰上以公卿所奏明徳皇后在世祖廟坐位駁議示蒼上言文武宣元祖祫食高廟皆以配先帝所制典法設張大雅曰昭哉來御慎其祖武又曰不愆不忘率由舊章明徳皇后冝配孝明皇帝於世祖廟同席而供饌章帝臨崩遺詔無起寝廟廟如先帝故事和帝即位不敢違上尊號曰肅宗後帝承尊皆藏主於世祖廟積多無别是後顕宗但為陵寝之號}
