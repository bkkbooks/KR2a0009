  - {type: variant, offset: 4170, length: 195, content: 矣公雖嬰城固守將何待乎鮪曰大司徒被害時鮪與其謀又諫更始無遣蕭王北伐誠自知罪深彭還具言於帝帝曰夫建大事者不忌小怨鮪今若降官爵可保況誅罰乎河水在此吾不食言彭復往告鮪鮪從城上下索曰必信可乘此上彭趣索欲上鮪見其誠即許降後五日鮪將輕騎詣彭顧敕諸部將曰堅守待我我若不還諸君徑將大兵上轘轅歸郾王乃面縛與彭俱詣河陽帝即解其縛召見之復令彭夜送鮪歸城明旦悉其衆出降拜鮪為平狄將軍封扶溝侯鮪淮陽人後為少府傳封累代, WYG: 仙道未或易罔也}
