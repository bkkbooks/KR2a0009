  - {type: variant, offset: 3412, length: 7, content: 惟勳烈披圖案籍, WYG: 尊其母梁貴人曰恭懐皇后陵以竇后配食章帝恭懐皇后别就陵寝祭之和帝崩上尊號曰穆宗殤帝生三百餘日而崩鄧太后攝政以尚嬰孫故不列於廟就陵寝祭之而已安帝以清河孝王子即位建光元年追尊其祖母宋貴人曰敬隠后陵曰敬北陵亦就陵寝祭太常領如西陵追尊父清河孝王曰孝徳皇母曰孝徳后清河嗣王奉祭而已安帝以䜛害大臣廢太子及崩無上宗之奏後以自}
  - {type: page-break, offset: 3412, content: '', id: KR2a0009_WYG_019-6b, image: WYG0252/WYG0252-0285d.png}
  - {type: variant, offset: 3412, length: 7, content: 惟勳烈披圖案籍, krp: 尊其母梁貴人曰恭懐皇后陵以竇后配食章帝恭懐皇后别就陵寝祭之和帝崩上尊號曰穆宗殤帝生三百餘日而崩鄧太后攝政以尚嬰孫故不列於廟就陵寝祭之而已安帝以清河孝王子即位建光元年追尊其祖母宋貴人曰敬隠后陵曰敬北陵亦就陵寝祭太常領如西陵追尊父清河孝王曰孝徳皇母曰孝徳后清河嗣王奉祭而已安帝以䜛害大臣廢太子及崩無上宗之奏後以自}
