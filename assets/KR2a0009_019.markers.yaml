  - {type: variant, offset: 4386, length: 2, content: 亂南, WYG: 多故稷為長也嵗再祭之何春求秋報也祭社稷以三牲重功也天子社稷皆太牢諸侯社稷皆少牢王者諸侯所以俱兩社何俱有土之君也故禮記三正曰王者二社為天下立社曰太社自為立社曰王社諸侯為百姓立社曰國社自為立社曰侯社太社為天下報功王社為京師報功也孔鼂云周祀一社一稷漢及魏初亦一社一稷至景初中既立帝社二社到於今是祀而後諸儒論之其文衆矣}
