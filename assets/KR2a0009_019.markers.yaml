  - {type: variant, offset: 3379, length: 2, content: 恢弘, WYG: 撥亂反正武暢方外震服百蠻戎狄奉貢宇内治平登封告成修建三雍肅修典祀功徳巍巍比隆前代以兵平亂武功盛大歌所以詠徳舞所以象功世祖廟樂名冝曰大武之舞元命包曰緣天地之所雜樂為之文典文王之時民樂其興師征伐而詩人稱其武功樞機鈐曰有帝漢出徳洽作樂名予虞韶禹夏湯濩周武無異不冝以名舞叶圗徴曰大樂必易詩傳曰頌言成也一章成篇冝列徳故登歌清廟一章也漢書曰百官頌所登御者一章十四句依書文始五行武徳昭真修之舞節損益前後之冝六十四節為舞曲副八佾之數十月烝祭始御用其文始五行之舞如故勿進武徳舞歌詩曰於穆世廟肅雍顕清俊又翼翼秉文之成越序上帝駿奔來寜建立三雍封禪㤗山章明圗䜟放唐之文休矣惟徳罔射協同本支百世永保厥功詔書曰驃騎将軍議可進武徳之舞如故以元帝於光武為穆故雖非宗不毁也後遂為常明帝臨終遺詔遵儉無起寝廟藏主於世祖廟更衣孝章即位不敢違以更衣有小别上尊號曰顯宗廟間祠於更衣四時合祭於世祖廟語在章紀東觀書曰章帝初即位賜東平憲王蒼書曰朕夙夜伏思念先帝躬履九徳對於八政勞謙克己終始之度比放三宗誠有其羙今廹遺詔誡不起寝廟臣子悲結僉以為雖於更衣猶冝有所宗之號以克配功徳宗廟至重朕㓜無知寤寐憂懼先帝每有著述典義之事未嘗不延問王以定厥中願王悉明處乃敢安之公卿議駁今皆并送及有可以持危扶顛冝勿隠思有所承公無困我太尉熹等奏禮祖有功宗有徳孝明皇帝功徳茂盛冝上尊號曰顕宗四時祫食於世祖廟如孝文皇帝在高廟之禮奏武徳文始五行之舞蒼上言昔者孝文廟樂曰昭徳之舞孝武廟樂曰盛徳之舞今皆祫食於高廟昭徳盛徳之舞不進與高廟同樂今孝明皇帝主在世祖廟當同樂盛徳之樂無所施如自立廟當作舞樂者不當與世祖廟盛徳之舞同名即不改作舞樂當進武徳之舞臣愚戇鄙陋廟堂之論誠非所當聞所冝言陛下體純徳之妙奮至謙之意猥歸羙於載列之臣故不敢隠蔽愚請披露腹心誠知愚鄙之言不可以仰四門賔于之議伏惟陛下以至徳當成康之隆天下乂安刑措之時也百姓盛歌元首之徳股肱貞良庶事寜康臣欽仰}
