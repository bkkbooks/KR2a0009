  - {type: variant, offset: 3421, length: 3, content: 元功二, WYG: 以來無毁者故遂常祭因以其陵號稱恭宗順帝即位追尊其母曰恭愍后陵曰恭北陵就陵寝祭如敬北陵順帝崩上尊號曰敬宗東觀書曰有司奏言孝順皇帝𢎞秉聖哲龍興統業稽乾則古欽奉鴻烈寛裕晏晏宣恩以極躬自菲薄以崇𤣥黙遺詔貽約顧念萬國衣無製新玩好不餙塋陵損狹不起寝廟遵履前制敬勅慎終有始有卒孝經曰愛敬盡於事親而徳敎加於百姓詩云敬慎威儀惟民之則臣請上尊號曰敬宗廟天子世世獻奉藏主祫祭進武徳之舞如祖宗故事露布奏可沖質帝皆小崩梁太后攝政以殤帝故事就陵寝祭凡祠廟訖三公分祭之桓帝以河間孝王孫蠡吾侯即位亦追尊祖考王國奉祀語在章和八王傳桓帝崩上尊號曰威宗無嗣靈帝以河間孝王曾孫解犢侯即位亦追尊祖考語在章和八王傳靈帝時京都四時所祭高廟五主世祖廟七主少帝三陵追尊后三陵凡牲用}
