  - {type: variant, offset: 4396, length: 6, content: 稱楚黎王略十, WYG: 漢諸儒論句龍即是社主或云是配其議甚衆後荀彧問仲長統以社所祭者何神也統答所祭者土神也侍中鄧義以為不然而難之彧令統答焉統答義曰前見逮及敢不敬對退熟惟省郊社之祭國之大事誠非學淺思薄者所冝興論重復亦以鄧君難事}
