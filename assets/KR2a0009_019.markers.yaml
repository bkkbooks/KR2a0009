  - {type: variant, offset: 4146, length: 5, content: 地百姓歸心, WYG: 居前有朝後有寝也月令有先薦寝廟詩稱寝廟奕奕言相通也廟以藏主以四時祭寝有衣冠几杖象生之具以薦新物秦始出寝起於墓側漢因而弗改故陵上稱寝殿起居衣服象生人之具古寝之意也建武以來闗西諸陵以轉乆逺但四時特牲祠帝每幸長安謁諸陵乃太牢祠自雒陽諸陵至靈帝皆以晦望二十四氣伏臘及四時祠廟日上飯太官送用物園令食監典省其親陵所宫人隨鼓漏理被枕具盥水陳嚴具蔡邕表志曰宗廟迭毁議奏國家大體班固録漢書乃置韋}
