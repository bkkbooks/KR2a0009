  - {type: variant, offset: 4137, length: 5, content: 平定燕趙盡, WYG: 中興廟稱世祖孝明皇帝聖徳聰明政參文宣廟稱顯宗孝章皇帝至孝烝烝仁恩博大廟稱肅宗皆方前世得禮之冝自此以下政事多釁權移臣下嗣帝殷勤各欲褒崇至親而已臣下懦弱莫能執夏侯之直今聖朝尊古復禮以求厥中誠合禮議元帝世在第八光武世在第九故以元帝為考廟尊而奉之孝明遵述亦不敢毁孝和以下穆宗威宗之號皆省去五年而再殷祫食於太祖以遵先典議遂施行四時所祭高廟一祖二宗及近帝四凡七帝古不墓祭漢諸陵皆}
