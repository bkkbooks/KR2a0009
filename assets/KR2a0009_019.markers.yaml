  - {type: variant, offset: 2830, length: 309, content: 巡將二萬餘人下隴因分遣巡取栒邑異即馳兵欲先據之諸將皆曰虜兵盛而新乘勝不可與爭宜止軍便地徐思方略異曰虜兵臨境忸忕小利遂欲深入若得栒邑三輔動搖是吾憂也夫攻者不足守者有餘今先據城以逸待勞非所以爭也潛往閉城偃旗鼓行巡不知馳赴之異乘其不意卒擊鼓建旗而出巡軍驚亂奔走追搫數十里大破之祭遵亦砟萱齗撠於是北地諸豪長耿定等悉畔隗囂降異上書言狀不敢自伐諸將或欲分其功帝患之乃下璽書曰制詔大司馬虎牙建威漢中忠捕虜武威將軍虜兵猥下三輔驚恐栒邑危亡在於旦夕北地營保按兵觀望今偏城獲全虜兵挫折使耿定之屬復念君臣之義征西功若丘山猶自以為不足孟之反奔而殿亦何異哉今遣太中大夫賜征西吏士死傷者醫藥棺斂大司馬已下親弔死問疾以崇謙讓於是使異進軍義渠并領北地, WYG: ''}
