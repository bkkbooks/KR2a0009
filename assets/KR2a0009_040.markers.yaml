  - {type: variant, offset: 1176, length: 410, content: 上師唐虞下覽齊晉以成屈己從衆之德以濟羣臣讓善之功而月臣象君亢急則臣下促迫故行疾也今年正月繁霜自爾以來率多寒日此亦急咎之罰天於賢聖之君猶慈父之於孝子也丁寧申戒欲其反政故灾變仍見此乃國之福也今陛下高明而羣臣惶促宜留思柔剋之政垂意洪範之法博採廣謀納羣下之策帝嘗問興郊祀事曰吾欲以讖斷之何如興對曰臣不為讖帝怒曰卿之不為讖非之邪興惶恐曰臣於書有所未學而無所非也帝意乃解興數言政事依經守義文章溫雅然以不善讖故不能任九年使監征南積弩營於津鄉會征南將軍岑彭為刺客所殺興領其營遂與大司馬吳漢俱擊公孫述述死詔興留屯成都頃之侍御史舉奏興奉使私買奴婢坐左轉蓮勺令是時喪亂之餘郡縣殘荒興方欲築城郭修禮教以化之會以事免興好古學尤明左氏周官長於歷數自杜林桓譚衞宏之屬莫不斟酌焉世言左氏者多祖於興而賈逵自傳其父業故有鄭賈之學興去蓮勺後遂不復仕客授閿鄉三公連辟不肯應卒于家子衆衆字仲師年十二從父受左氏春秋精力於學明三統歷作春秋難記條例兼通易詩知名於世建武, WYG: 車服制度}
