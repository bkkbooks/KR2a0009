  - {type: variant, offset: 78, length: 0, content: '', WYG: 曰佩上有雙衝下有雙璜琚瑀以雜之衝牙蠙珠以納其間玉藻曰右徴角左宫羽進則揖之退則揚之然後玉瑲鳴焉纂要曰琚瑀所以納間在玉之間今白珠也乗輿落以白珠公卿諸侯以采絲其視冕旒為祭服云佩刀乗輿黄金通身貂錯半鮫魚鱗金漆錯雌黄室五色罽隠室華諸侯王黄金錯環挾半鮫黒室公卿百官皆純黒不半鮫小黄門雌黄室中黄門朱室童子皆虎爪文虎賁黄室虎文其將白虎文皆以白珠鮫為􅝑口之飾通俗文曰刀鋒曰􅝑乗輿者加翡翠山紆嬰其側左}
