  - {type: variant, offset: 46, length: 1, content: 達, WYG: 直豎不常服唯郊天黄門從官四人冠之在鹵簿中次乗輿車前以備宦者四星云獨斷曰禮無文却非冠制似長冠下促宫殿門吏僕射冠之負赤幡青翅燕尾諸僕射幡皆如之獨斷曰禮無文却敵冠前髙四寸通長四寸後髙三寸制似進賢衞士服之獨斷曰禮無文樊噲冠漢將樊噲造次所冠以入項羽軍廣九寸髙七寸前後出各四寸制似冕司馬殿門大難衞士服之或曰樊噲常持鐵楯聞項羽有意殺漢王噲裂裳以裹楯冠之入軍門立漢王旁視項羽術氏冠前圓吳制差池邐迆四重趙武靈王好服之今不施用官有}
