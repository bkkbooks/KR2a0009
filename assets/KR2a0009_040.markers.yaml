  - {type: variant, offset: 4, length: 0, content: '', WYG: 四十梁剡令劉昭補并注輿服志第三十輿服下冕冠冠爵弁長冠冠通天委貌冠逺遊冠皮弁冠高山冠進賢冠方山冠法冠冠巧士武冠冠却非建華冠却敵冠樊噲冠佩刀術氏冠印鶡冠綬黄赤幘綬赤綠綬黄綬紫綬綸青紺青綬人服黒綬后夫上古穴居而野處衣毛而冒皮未有制度後世聖人易之以絲麻觀翬翟之文榮華之色乃染帛以效之始作五采成以為服見鳥獸有冠角􅏋胡之制遂作冠冕纓蕤以為首飾凡十二章故易曰庖犧氏之王天下也仰觀象於天俯觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物於是始作八卦以通神明之徳以類萬物之情黄帝堯舜垂衣裳而天下治蓋取諸乾巛乾巛有文故上衣𤣥下裳黄日月星辰山龍華蟲孔安國注尚書曰華象草華蟲雉也作繢宗彝古文尚書繢作㑹孔安國曰以五采成此畫焉宗廟彝樽亦以山龍華蟲為飾藻火粉米孔安國曰藻水草有文者火為火字粉若粟米米若聚米黼黻絺繡孔安國曰黼若斧形黻為兩已相背葛之精者曰絺五色備曰繡杜預注左傳曰白與黒謂之黼黒與青謂之黻以五采章施于五色作服孔安國曰以五采明施于五色作尊卑之服天子備章鄭𤣥周禮注曰此古天子冕服十二章公自山以下侯伯自華蟲以下子男自藻火以下卿大夫自粉米以下至周而變之以三辰為旂旗王祭上帝則大裘而冕鄭衆曰大裘羔裘服以祀天示質也公侯卿大夫之服用九章以下鄭𤣥曰華蟲五色之蟲周禮繢人職曰鳥獸蛇雜四時五色之位以章之謂是也王者相變至周而以日月星辰畫於旌旗所謂三辰旂旗昭其明也而冕服九章初一曰龍次二曰山次三曰華蟲次四曰火次五曰宗彝皆畫以為繢次六曰藻次七曰粉米次八曰黼次九曰黻皆絺以為繡則衮之衣五章裳四章凡九也鷩畫以雉為華蟲也其衣三章裳四章凡七也毳畫虎蜼謂宗彝也其衣三章裳二章凡五也絺刺粉米無畫也其衣一章裳二章凡三也法言曰聖人文質備也車服以章之藻色以明之聲音以揚之詩書以光之籩豆不陳玉帛不分琴瑟不鏗鐘鼔不鏘吾無以見乎聖也秦以戰國即天子位滅去禮學郊祀之服皆以袀𤣥漢承秦故至世祖踐祚都于土中始修三雍正兆七郊顯宗遂就大業初服旒冕衣裳文章赤舄絇屨以祠天地養三老五更於三雍于時致治平矣天子三公九卿特進侯侍祠侯祀天地明堂皆冠旒冕衣裳𤣥上纁下東觀書曰永平二年正月公卿議春南北郊東平王蒼議曰孔子曰行夏之時乗殷之輅服周之冕為漢制法髙皇帝始受命創業制長冠以入宗廟光武受命中興建明堂立辟雍陛下以聖明奉遵以禮服龍衮祭五帝禮缺樂崩久無祭天地冕服之制按尊事神祇絜齋盛服敬之至也日月星辰山龍華藻天王衮冕十有二旒以則天數旂有龍章日月以備其文今祭明堂宗廟圓以法天方以則地服以華文象其物宜以降神明肅雍備思博其類也天地之禮冕冠裳衣宜如明堂之制乗輿備文日月星辰十二章三公諸侯用山龍九章九卿以下用華蟲七章皆備五采大佩赤舄絇履以承大祭百官執事者冠長冠皆祗服五嶽四瀆山川宗廟社稷諸沾秩祠皆袀𤣥長冠五郊各如方色云百官不執事各服常冠袀𤣥以從冕冠垂旒前後􅃉延䆳垂也延冕上覆玉藻周禮曰五采繅十有二就皆五采王十有二玉笄朱紘鄭𤣥注曰繅雜文之名也合五采絲為之繩垂於延之前後各十二所謂䆳延也就成也繩之每一帀而貫五采王十有二旒則十二玉也每就間蓋一寸朱紘以朱組為紘也紘一條屬兩端於武此為衮衣之冕十二旒則用玉二百八十八鷩衣之冕繅九旒用玉二百一十六毳衣之冕七旒用玉百六十八絺衣之冕五旒用玉百二十𤣥衣之冕三旒用玉七十二孝明皇帝永平二年初詔有司采周官禮記尚書臯陶篇乗輿服從歐陽氏説公卿以下從大小夏侯氏説冕皆廣七寸長尺二寸前圓後方朱綠裏𤣥上前垂四寸後垂三寸係白玉珠為十二旒以其綬采色為組纓説文曰組綬屬也小者以為冕纓焉禮記曰𤣥冠朱組纓天子之服是也三公諸侯七旈青玉為珠卿大夫五旈黒玉為珠獨斷曰三公諸侯九旈卿七旒與此不同皆有前無後各以其綬采色為組纓旁垂黈纊吕忱曰黈黄色也黄綿為之禮緯曰旒垂目纊塞耳王者示不聴讒不視非也薛綜曰以珩玉為充耳也詩云充耳琇瑩毛萇傳曰充耳謂之瑱天子玉瑱琇瑩美石也諸侯以石郊天地宗祀明堂則冠之蔡邕曰鄙人不識謂之平天冠衣裳玉佩備章采乗輿刺史公侯九卿以下皆織成陳留襄邑獻之云長冠一曰齋冠髙七寸廣三寸促漆纚為之制如板以竹為裏初髙祖微時以竹皮為之謂之劉氏冠楚冠制也民謂之鵲尾冠非也祀宗廟諸祀則冠之皆服袀𤣥獨斷曰袀紺繒也吳都賦曰袀皁服也絳緣領袖為中衣絳絝􅙋示其赤心奉神也五郊衣幘絝􅙋各如其色此冠髙祖所造故以為祭服尊敬之至也委貌冠皮弁冠同制長七寸髙四寸制如覆杯前髙廣後卑銳所謂夏之母追殷之章甫也委貌以皁絹為之皮弁以鹿皮為之行大射禮於辟雍公卿諸侯大夫行禮者冠委貌衣𤣥端素裳鄭衆周禮傳曰衣有􅃭裳者為端鄭𤣥曰謂之端取其正也正者士之衣袂皆二尺二寸而屬幅是廣袤等也其袪尺二寸大夫以上侈之侈之者蓋半而益一焉半而益一則其袂三尺三寸袪尺八寸執事者冠皮弁衣緇麻衣皁領袖下素裳所謂皮弁素積者也皮弁質也石渠論𤣥冠朝服戴聖曰𤣥冠委貌也朝服布上素下緇帛帶素韋韠白虎通曰三王共皮弁素積素積者積素以為裳也言要中辟積也爵弁一名冕廣八寸長尺二寸如爵形前小後大繒其上似爵頭色有収持笄所謂夏収殷冔者也獨斷曰殷黒而微白前大而後小夏純黒亦前小而後大皆以}
