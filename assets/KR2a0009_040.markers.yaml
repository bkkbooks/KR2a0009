  - {type: variant, offset: 13, length: 0, content: '', WYG: 陛位堪欲令比大夫兩梁冠不宜許臣伏惟太官令職在典掌王饔統六清之飲列八珍之饌正百品之羞納四方之貢所奉尤重用思又勤明詔慎口實之御防有敗之姦増崇其選侍御史主捕案太醫令奉方藥供養符節令掌幡信金虎故位從大夫車有韜沂冠有兩梁所以殊親疎别内外也太官令以供養言之為最親近以職事言之為最煩多令又髙選又執法比太醫令科同服等而冠二人殊名實不副又博士秩卑以其}
