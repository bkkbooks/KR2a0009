  - {type: punctuation, offset: 1804, content: 「, id: KR2a0009_ZHSJ_040-bkkpn433}
  - {type: variant, offset: 1805, length: 355, content: 伏聞北單于所以要致漢使者欲以離南單于之衆堅三十六國之心也又當揚漢和親誇示鄰敵令西城欲歸化者局促狐疑懷土之人絕望中國耳漢使既到便偃蹇自信若復遣之虜必自謂得謀其羣臣駮議者不敢復言如是南庭動搖烏桓有離心矣南單于久居漢地具知形埶萬分離析旋為邊害今幸有度遼之衆揚威北垂雖勿報荅不敢為患帝不從復遣衆衆因上言臣前奉使不為匈奴拜單于恚恨故遣兵圍臣今復銜命必見陵折臣誠不忍持大漢節對氈裘獨拜如令匈奴遂能服臣將有損大漢之強帝不聽衆不得已既行在路連上書固爭之詔切責衆追還繫廷尉會赦歸家其後帝見匈奴來者問衆與單于爭禮之狀皆言匈奴中傳衆意氣壯勇雖蘇武不過乃復召衆為軍司馬使與虎賁中郎將馬廖擊車師至敦煌拜為中郎將使護西域會匈奴脅車師圍戊己校尉衆發兵救之遷武威太守謹修邊備虜不敢犯遷左馮翊政有名迹建初六年代鄧彪為大司農是時肅宗議復鹽鐵官衆諫, WYG: ''}
