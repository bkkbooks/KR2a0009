  - {type: variant, offset: 2410, length: 328, content: 為是而不言則過小矣知而從令則過大矣二者於公無可以免宜乎天下歸怨於公矣朝以遠者不服為至念升以近者不悅為重憂今動與時戾事與道反馳騖覆車之轍探湯敗事之後後出益可怪晚發愈可懼耳方春歲首而動發遠役藜藿不充田荒不耕穀價騰躍斛至數千吏人陷於湯火之中非國家之人也如此則胡貊守關青徐之寇在於帷帳矣升有一言可以解天下倒縣免元元之急不可書傳願蒙引見極陳所懷邑雖然其言而竟不用升稱病乞身邑不聽令乘傳使上黨升遂與漢兵會因留不還建武二年光武徵詣懷宮拜議郎遷博士上疏讓曰臣與博士梁恭山陽太守呂羌俱修梁丘易二臣年並耆艾經學深明而臣不以時退與恭並立深知羌學又不能達慙負二老無顏於世誦而不行知而不言不可開口以為人師願推博士以避恭羌帝不許然由是重之數詔引見每有大議輒見訪問時尚書令韓歆上疏欲為費, WYG: 依宋本改術}
