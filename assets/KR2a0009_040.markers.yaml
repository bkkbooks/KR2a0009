  - {type: variant, offset: 81, length: 0, content: '', WYG: 劒如為未備佩雙印長寸二分方六分乗輿諸侯王公列侯以白玉中二千石以下至四百石皆以黒犀二百石以至私學弟子皆以象牙上合絲乗輿以縢貫白珠赤罽㽔諸侯王以下以綔赤絲㽔縢綔各如其印質刻書文曰正月剛卯既決靈殳四方赤青白黄四色是當帝令祝融以教􅇪龍庶疫剛癉莫我敢當疾日嚴卯帝令􅇪化慎爾周伏化茲靈殳既正既直既觚既方庶疫剛癉莫我敢當凡六十六字前書注云以正月卯日作乗輿黄赤綬四采黄赤紺縹淳黄圭長丈九尺九寸五百首漢舊儀曰璽皆白玉螭虎紐文曰皇帝行璽皇帝之璽皇帝信璽天子行璽天子之璽天子信璽凡六璽皇帝行璽凡封之璽賜諸侯王書信璽發兵徴大臣天子行璽策拜外國事天地鬼神璽皆以武都紫泥封青嚢白素裏兩端無縫尺一板中約署皇帝帶綬黄地六采不佩璽璽以金銀縢組侍中組負以從秦以前民皆佩綬金玉銀銅犀象為方寸璽各服所好奉璽書使者乗馳傳其驛騎也三騎行晝夜千里為程吳書曰漢室之亂天子北詣河上六璽不自隨掌璽者投井中孫堅北討董卓頓軍城南官署有井每旦有五色氣從井出堅使人浚得傳國璽其文曰受命于天既夀永昌方圍四寸上有紐文槃五龍瑨七寸管龍上一角缺獻帝起居注曰時六璽不自隨及還於閣上得晉陽秋曰冉閔大將軍蔣幹以傳國璽付河南太守戴施施獻之百僚皆賀璽光照洞徹上蟠螭文隠起書曰昊天之命皇帝夀昌秦舊璽也徐廣曰傳國璽文曰受天之命皇帝夀昌諸侯王赤綬徐廣曰太子及諸王金印龜組纁朱綬四采赤黄縹紺淳赤圭長二丈一尺三百首荀綽晉百官表注曰皇太子朱綬三百二十首太皇太后皇太后其綬皆與乗輿同皇后亦如之長公主天子貴人與諸侯王同綬者加特也諸國貴人相國皆綠綬三采綠紫紺淳綠圭長二丈一尺二百四十首前書曰相國丞相皆秦官金印紫綬髙帝相國綠綬徐廣曰金印綠綟綬綟音戾草名也以染似綠又云似紫紫綬名緺緺音𤓰其色青紫綟字亦盩音同也傳寫者誤作縶公加殊禮皆服之何承天云緺音媧青紫色綬綟紫色也公侯將軍紫綬二采紫白淳紫圭長丈七尺百八十首前書曰太尉金印紫綬御史大夫位上卿銀印青綬成帝更名大司空金印紫綬將軍亦金印漢官儀曰馬防為車騎將軍銀印青綬在卿上絶席和帝以竇憲為車騎將軍始加金印次司空公主封君服紫綬九卿中二千石二千石青綬三采青白紅淳青圭長丈七尺百二十首一號青緺綬自青綬以上縌皆長三尺二寸與綬同采而首半之縌者古佩璲也佩綬相迎受故曰縌紫綬以上縌綬之間得施玉環鐍云通俗文曰缺環曰鐍漢舊儀曰其斷獄者印為章也千石六百石黒綬三采青赤紺淳青圭長丈六尺八十首四百石三百石長同漢官曰尚書僕射銅印青綬四百石三百石二百石黄綬淳黄圭一采長丈五尺六十首自黒綬以下縌綬皆長三尺與綬同采而首半之百石青紺綸一采宛轉繆織長丈二尺丁孚漢儀載太僕太中大夫襄言乗輿綬黄地冒白羽青絳綠五采四百首長二丈三尺詔所下王綬冒亦五采上下無差諸王綬四采絳地冒白羽青黄去緑二百六十首長二丈二尺公主綬如王侯絳地紺縹三采百二十首長丈八尺二千石綬羽青地桃華縹三采百二十首長丈八尺黒綬羽青地絳二采八十首長一丈七尺黄綬一采八十首長丈七尺以為常式民織綬不如式沒入官犯者為不敬二千石綬以上禁民無得織以粉組皇太后詔可王綬如所下凡先合單紡為一系四系為一扶五扶為一首五首為一文文采淳為一圭首多者系細少者系麤皆廣尺六寸東觀書曰建武元年復設諸侯王金璽綟綬公侯金印紫綬九卿執金吾河南尹秩皆中二千石大長秋將作大匠度遼諸將軍郡太守國傅相皆秩二千石}
