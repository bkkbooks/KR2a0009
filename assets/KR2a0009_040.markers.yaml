  - {type: variant, offset: 4886, length: 1820, content: 圖讖明劉氏為堯後者而左氏獨有明文五經家皆言顓頊代黃帝而堯不得為火德左氏以為少昊代黃帝即圖讖所謂帝宣也如令堯不得為火則漢不得為赤其所發明補益實多遝猶朝夕恪勤遊情六蓺研機綜微靡不審覈若復留意廢學以廣聖見庶幾無所遺失矣逵母常有疾帝欲加賜以校書例多特以錢二十萬使潁陽侯馬防與之謂防曰賈逵母病此子無人事於外屢空則從孤竹之子於首陽山矣逵數為帝言古文尚書與經傳爾雅詁訓相應詔令撰歐陽大小夏侯尚書古文同異逵集為三卷帝善之復令撰齊魯韓詩與毛氏異同并作周官解故遷逵為衞士令八年乃詔諸儒各選高才生受左氏穀梁春秋古文尚書毛詩由是四經遂行於世皆拜逵所選弟子及門生為千乘王國郎朝夕受業黃門署學者皆欣欣羨慕焉和帝即位永元三年以逵為左中郎將八年復為侍中領騎都尉內備帷幄兼領祕書近署甚見信用逵薦東萊司馬均陳國汝郁帝即徵之並蒙優禮均字少賓安貧好學隱居教授不應辟命信誠行乎州里鄉人有所計爭輒令祝少賓不直者終無敢言位至侍中以老病乞身帝賜以大夫祿歸鄉里郁字叔異性仁孝及親歿遂隱處山澤後累遷為魯相以德教化百姓稱之流人歸者八九千戶逵所著經傳義詁及論難百餘萬言又作詩頌誄書連珠酒令凡九篇學者宗之後世稱為通儒然不修小節當世以此頗譏焉故不至大官永元十三年卒時年七十二朝廷愍惜除兩子為太子舍人論曰鄭賈之學行乎數百年中遂為諸儒宗亦徒有以焉爾桓譚以不善讖流亡鄭興以遜辭僅免賈逵能附會文致最差貴顯世主以此論學悲矣哉張霸字伯饒蜀郡成都人也年數歲而知孝讓雖出入飲食自然合禮鄉人號為張曾子七歲通春秋復欲進餘經父母曰汝小未能也霸曰我饒為之故字曰饒焉後就長水校尉樊儵鯈受嚴氏公羊春秋遂博覽五經諸生孫林劉固段著等慕之各市宅其傍以就學焉舉孝廉光祿主事稍遷永元中為會稽太守表用郡人處士顧奉公孫松等奉後為潁川太守松為司隸校尉並有名稱其餘有業行者皆見擢用郡中爭厲志節習經者以千數道路但聞誦聲初霸以樊儵鯈刪嚴氏春秋猶多繁辭乃減定為二十萬言更名張氏學霸始到越賊未解郡界不寧乃移書開購明用信賞賊遂束手歸附不煩士卒之力童謠曰𠫓廾我戟捐我矛盜賊盡吏皆休視事三年謂掾史曰太守起自孤生致位郡守蓋日中則移月滿則虧老氏有言知足不辱遂上病後徵四遷為侍中時皇后兄虎賁中郎將鄧騭當朝貴盛聞霸名行欲與為交霸逡巡不荅衆人笑其不識時務後當為五更會疾卒年七十遺勑諸子曰昔延州使齊子死嬴博因坎路側遂以葬焉今蜀道阻遠不宜歸塋可止此葬足藏髮齒而已務遵速朽副我本心人生一世但當畏敬於人若不善加己直為受之諸子承命葬於河南梁縣因遂家焉將作大匠翟酺等與諸儒門人追錄本行謚曰憲文中子楷楷字公超通嚴氏春秋古文尚書門徒常百人賓客慕之自父黨夙儒偕造門焉車馬填街徒從無所止黃門及貴戚之家皆起舍巷次以候過客往來之利楷疾其如此輒徙避之家貧無以為業常乘驢車至縣賣藥足給食者輒還鄉里司隸舉茂才除長陵令不至官隱居弘農山中學者隨之所居成市後華陰山南遂有公超市五府連辟舉賢良方正不就漢安元年順帝特下詔告河南尹曰故長陵令張楷行慕原憲操擬夷齊輕貴樂賤竄跡幽藪高志確然獨拔羣俗前比徵命盤桓未至將主者翫習於常優賢不足使其難進歟郡時以禮發遣楷復告疾不到性好道術能作五里霧時關西人裴優亦能為三里霧自以不如楷從學之楷避不肯見桓帝即位優遂行霧作賊事覺被考引楷言從學術楷坐繫廷尉詔獄積二年恆諷誦經籍作尚書注後以事無驗見原還家建和三年下詔安車備禮聘之辭以篤疾不行年七十終於家子陵陵字處沖官至尚書元嘉中歲首朝賀大將軍梁冀帶劒入省陵呵叱令出勑羽林虎賁奪冀劒冀跪謝陵不應即劾奏冀請廷尉論罪有詔以一歲俸贖而百僚肅然初冀弟不疑為河南尹舉陵孝廉不疑疾陵之奏冀因謂曰昔舉君適所以自罰也陵對曰明府不以陵不肖誤見擢序今申公憲以報私恩不疑有愧色陵弟玄玄字處虛沈深有才略以時亂不仕司空張溫數以禮辟不能致中平二年溫以車騎將軍出征涼州賊邊章等將行玄自田廬被褐帶索要說溫曰天下寇賊雲起豈不以黃門常侍無道故乎聞中貴人公卿已下當出祖道於平樂觀明公總天下威重握六師之要若於中坐酒酣鳴金鼓整行陣召軍正執有罪者誅之引兵還屯都亭以次翦除中官解天下之倒縣報海內之怨毒然後顯用隱逸忠正之士則邊章之徒宛轉股掌之上矣溫聞大震不能對良久謂玄曰處虛非不悅子之言顧吾不能行如何玄乃歎曰事行則為福不行則為賊今與公長辭矣即仰藥欲飲之溫前執其手曰子忠於我我不能用是吾罪也子何為當然且出口入耳之言誰今知之玄遂去隱居魯陽山中及董卓秉政聞之辟以為掾舉侍御史不就卓臨之以兵不得已彊起至輪氏道病終贊曰中世儒門賈鄭名學衆馳一介爭禮氈幄升元守經義偏情較霸貴知止辭交戚里公超善術所舍成市, WYG: ''}
