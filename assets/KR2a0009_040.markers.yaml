  - {type: variant, offset: 867, length: 14, content: 河南鄭興執義堅固敦悅詩書好古, WYG: 㑹衣服加步揺公主大手結皆有簪珥衣服同制自公主封君以上皆帶綬以采組為緄帶各如其綬色黄金辟邪首為帶鐍飾以白珠公卿列侯中二千石二千石夫人紺繒蔮黄金龍首䘖白珠魚須擿長一尺為簪珥入廟佐祭者皁絹上下助蠶者縹絹上下皆深衣制緣自二千石夫人以上至皇后皆以蠶衣為朝服公主貴人妃以上嫁娶得服錦綺羅縠繒采十二色重綠袍特進列侯以上錦繒采十二色六百石以上重練采九色禁丹紫紺三百石以上五色采青絳黄紅綠二百石以上四采青黄紅綠賈人緗縹而已}
