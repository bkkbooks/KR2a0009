  - {type: variant, offset: 35, length: 2, content: 晚善, WYG: 之義大於復古如堪言合典可施行克厭帝心即聴用之獻帝起居注曰中平六年令三府長史兩梁冠五時衣袍事位從千石六百石法冠一曰柱後獨斷曰柱後惠文髙五寸以纚為展筩前書注曰纚今之縰通俗文幘裏曰纚鐵柱卷荀綽晉百官表注曰鐵柱言其厲直不曲撓執法者服之侍御史廷尉正監平也或謂之獬豸冠獬豸神羊能别曲直楚王嘗獲之故以為冠異物志曰東北荒中有獸名獬豸一角性忠見人鬪則觸不直者聞人論則咋不正者楚執法者所服也今冠兩角非豸也臣昭曰或謂獬豸廼非定名在兩角未足斷正安不存其豎飾令兩為冠乎胡廣説曰春秋}
  - {type: page-break, offset: 35, content: '', id: KR2a0009_WYG_040-7b, image: WYG0252/WYG0252-0454b.png}
