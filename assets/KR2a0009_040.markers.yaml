  - {type: 'tls:seg', offset: 40, content: '', id: KR2a0009_ZHSJ_040-d40p2s5}
  - {type: variant, offset: 40, length: 0, content: '', WYG: 有南冠而縶者則楚冠也秦滅楚以其君服賜執法近臣御史服之武冠一云古緇布冠之象也或曰繁冠一曰武弁大冠諸武官冠之晉公卿禮秩曰大司馬將軍尉驃騎車騎衞軍諸大將軍開府從公者著武冠平上幘侍中中常侍加黄金璫附蟬為文貂尾為飾謂之趙惠文冠又名駿鸃冠胡廣説曰趙武靈王效胡服以金璫飾首前揷貂尾為貴職秦滅趙以其君冠賜近臣應劭漢官曰説者以金取堅剛百鍊不耗蟬居髙飲潔口在腋下貂内勁捍而外溫潤此因物生義也徐廣曰趙武靈王胡服有此秦即趙而用之説者蟬取其清髙飲露而不食貂紫蔚柔潤而毛采不彰灼故於義亦取胡廣又曰意謂北方寒涼本以貂皮暖額附施於冠因}
  - {type: page-break, offset: 40, content: '', id: KR2a0009_WYG_040-8a, image: WYG0252/WYG0252-0454c.png}
  - {type: variant, offset: 40, length: 0, content: '', krp: 有南冠而縶者則楚冠也秦滅楚以其君服賜執法近臣御史服之武冠一云古緇布冠之象也或曰繁冠一曰武弁大冠諸武官冠之晉公卿禮秩曰大司馬將軍尉驃騎車騎衞軍諸大將軍開府從公者著武冠平上幘侍中中常侍加黄金璫附蟬為文貂尾為飾謂之趙惠文冠又名駿鸃冠胡廣説曰趙武靈王效胡服以金璫飾首前揷貂尾為貴職秦滅趙以其君冠賜近臣應劭漢官曰説者以金取堅剛百鍊不耗蟬居髙飲潔口在腋下貂内勁捍而外溫潤此因物生義也徐廣曰趙武靈王胡服有此秦即趙而用之説者蟬取其清髙飲露而不食貂紫蔚柔潤而毛采不彰灼故於義亦取胡廣又曰意謂北方寒涼本以貂皮暖額附施於冠因}
  - {type: variant, offset: 41, length: 4, content: 積精深思, WYG: 變成首飾建武時匈奴内屬世祖賜南單于衣服以中常侍惠文冠中黄門童子佩刀云建華冠以鐵為柱卷貫大銅珠九枚制似鏤鹿獨斷曰其狀若婦人縷鹿薛綜曰下輪大上輪小記曰知天者冠述知地者履絇春秋左傳曰鄭子臧好鷸冠前圓以為此則是也説文曰鷸知天將雨鳥也天地五郊明堂育命舞樂人服之方山冠似進賢以五采縠為之祠宗廟大予八佾四時五行樂人服之冠衣各如其行方之色而舞焉巧士冠髙七寸要後相}
