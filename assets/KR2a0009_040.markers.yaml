  - {type: punctuation, offset: 3472, content: 、, id: KR2a0009_ZHSJ_040-bkkpn821}
  - {type: variant, offset: 3478, length: 555, content: 世故詔立左氏博詢可否示不專己盡之羣下也今論者沈溺所習翫守舊聞固執虛言傳受之辭以非親見實事之道左氏孤學少與遂為異家之所覆冒夫至音不合衆聽故伯牙絕弦至寶不同衆好故卞和泣血仲尼聖德而不容於世況於竹帛餘文其為雷同者所排固其宜也非陛下至明孰能察之所言前後相違皆斷小文媟黷微辭以年數小差掇為巨謬遺脫纖微指為大尤抉瑕擿釁掩其弘美所謂小辯破言小言破道者也升等又曰先帝不以左氏為經故不置博士後主所宜因襲臣愚以為若先帝所行而後主必行者則盤庚不當遷于殷周公不當營洛邑陛下不當都山東也往者孝武皇帝好公羊衞太子好穀梁有詔詔太子受公羊不得受穀梁孝宣皇帝在人閒時聞衞太子好穀梁於是獨學之及即位為石渠論而穀梁氏興至今與公羊並存此先帝後帝各有所立不必其相因也孔子曰純儉吾從衆至於拜下則違之夫明者獨見不惑於朱紫聽者獨聞不謬於清濁故離朱不為巧眩移目師曠不為新聲易耳方今干戈少弭戎事略戰留思聖蓺眷顧儒雅採孔子拜下之義卒淵聖獨見之旨分明白黑建立左氏解釋先聖之積結洮汰學者之累惑使基業垂於萬世後進無復狐疑則天下幸甚宿冤若辭不合經事不稽古退就重誅雖死之日生之年也元以才高著名辟司空李通府時大司農江馮上言宜令司隸校尉督察三公事下三府元上疏曰臣聞師臣者帝賓臣者霸故武王以太公為師齊桓以夷吾為仲父孔子曰百官總己聽於冢宰近則高帝優相國之禮太宗假宰輔之權及亡新王莽遭, WYG: ''}
