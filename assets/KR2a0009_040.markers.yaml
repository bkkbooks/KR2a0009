  - {type: variant, offset: 263, length: 586, content: 使安集關西及朔方涼益三州還拜涼州刺史會天水有反者攻殺郡守興坐免時赤眉入關東道不通興乃西歸隗囂囂虛心禮請而興恥為之屈稱疾不起囂矝己自飾常以為西伯復作乃與諸將議自立為王興聞而說囂曰春秋傳云口不道忠信之言為嚚耳不聽五聲之和為聾閒者諸將集會無乃不道忠信之言大將軍之聽無乃阿而不察乎昔文王承積德之緒加之以睿聖三分天下尚服事殷及武王即位八百諸侯不謀同會皆曰紂可伐矣武王以未知天命還兵待時高祖征伐累年猶以沛公行師今令德雖明世無宗周之祚威略雖振未有高祖之功而欲舉未可之事昭速禍患無乃不可乎惟將軍察之囂竟不稱王後遂廣置職位以自尊高興復止囂曰夫中郎將太中大夫使持節官皆王者之器非人臣所當制也孔子曰唯器與名不可以假人不可以假人者亦不可以假於人也無益於實有損於名非尊上之意也囂病之而止及囂遣子恂入侍將行興因恂求歸葬父母囂不聽而徙興舍益其秩禮興入見囂曰前遭赤眉之亂以將軍僚舊故敢歸身明德幸蒙覆載之恩復得全其性命興聞事親之道生事之以禮死葬之以禮祭之以禮奉以周旋弗敢失墜今為父母未葬請乞骸骨若以增秩徙舍中更停留是以親為餌無禮甚矣將軍焉用之囂曰囂將不足留故邪興曰將軍據七郡之地擁羌胡之衆以戴本朝德莫厚焉威莫重焉居則為專命之使入必為鼎足之臣興從俗者也不敢深居屏處因將軍求進不患不達因將軍求入何患不親此興之計不逆將軍者也興業為父母請不可以已願留妻子獨歸葬將軍又何猜焉囂曰幸甚促為辨裝遂令與妻子俱東時建武六年也, WYG: ''}
