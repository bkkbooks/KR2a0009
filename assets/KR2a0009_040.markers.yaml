  - {type: variant, offset: 79, length: 1, content: 詁, WYG: 曰藻繂鞞鞛杜預曰鞞佩刀削上飾鞛下飾也鄭𤣥詩箋曰既爵命賞賜而加賜容刀有飾顯其能制斷也春秋繁露曰劒之在左青龍之象也刀之在右白虎之象也韍之在前朱鳥之象也冠之在首𤣥武之象也四者人之盛飾也臣昭案自天子至于庶人咸皆帶劒劒之與刀形制不同名稱各異故蕭何劒履上殿不稱為刀而此志言不}
