  - {type: variant, offset: 61, length: 1, content: 從, krp: 見始進幘服之羣臣皆隨焉然尚無巾故言王莽禿幘施屋冠進賢者宜長耳冠惠文者宜短耳各隨其宜漢舊儀曰幘齋紺幘耕青幘秋貙}
  - {type: variant, offset: 63, length: 3, content: 歆講正, WYG: 服緗古者君臣佩玉尊卑有度上有韍徐廣曰韍如今蔽膝貴賤有殊佩所以章徳服之衷也韍所以執事禮之共也故禮有其度威儀之制三代同之五伯迭興戰兵不息佩非戰器韍非兵旗於是解去韍佩留其係璲徐廣曰今名璲為縌以為章表故詩曰鞙鞙佩璲此之謂也鞙鞙佩玉貌璲瑞也鄭𤣥箋曰佩璲者以瑞玉為佩佩之鞙鞙然韍佩既廢秦乃以采組連結於璲光明章表轉相結受故謂之綬漢承秦制用而弗改故加之以雙印佩刀之飾至孝明皇帝乃為}
