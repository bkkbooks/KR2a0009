  - {type: variant, offset: 1634, length: 170, content: 舊防蕃王不宜私通賓客遂辭不受松復風衆以長者意不可逆衆曰犯禁觸罪不如守正而死太子及荊聞而奇之亦不強也及梁氏事敗賓客多坐之唯衆不染於辭永平初辟司空府以明經給事中再遷越騎司馬復留給事中是時北匈奴遣使求和親八年顯宗遣衆持節使匈奴衆至北庭虜欲令拜衆不為屈單于大怒圍守閉之不與水火欲脅服衆衆拔刀自誓單于恐而止乃更發使隨衆還京師朝議復欲遣使報之衆上疏諫曰, WYG: 秩品當傳萬世揚光聖徳}
