  - {type: variant, offset: 7, length: 0, content: '', WYG: 升漆布為之詩云常服黼冔書曰王與大夫盡弁上古皆以布中古以絲孔子曰麻冕禮也今也純儉祠天地五郊明堂雲翹舞樂人服之禮曰朱干玉鏚}
  - {type: variant, offset: 7, length: 0, content: '', krp: 升漆布為之詩云常服黼冔書曰王與大夫盡弁上古皆以布中古以絲孔子曰麻冕禮也今也純儉祠天地五郊明堂雲翹舞樂人服之禮曰朱干玉鏚}
  - {type: variant, offset: 8, length: 1, content: 范, WYG: 𤣥曰朱干赤大盾也鏚斧也冕而舞大夏此之謂也通天冠髙九寸正豎頂少邪却乃直下為鐵卷梁前有山展筩為述乗輿所常服獨斷曰漢受之秦禮無文服衣深衣制有袍隨五時色袍者或曰周公抱成王宴居故施袍禮記孔子衣縫掖之衣縫掖其袖合而縫大之近今袍者也今下至賤更小史皆通制袍單衣皁緣領袖中衣為朝服云逺遊冠制如通天有展筩横之於前無山述諸王所服也獨斷曰禮無文髙山冠一曰側注制如通天不邪却直豎無山述展筩獨斷曰鐵為卷梁髙九寸漢書音義曰其體側立而曲注中外官謁者僕射所服太傅胡廣說曰髙山冠蓋齊王冠也秦滅齊以其君冠賜近臣謁者服之史記酈生初見髙祖儒衣而冠側注漢舊儀曰乗輿官髙山冠飛月之纓幘耳赤丹紈裏衣帶七尺斬蛇劒履虎尾絇履案此則亦通于天子進賢冠古緇布冠也文儒者之服也前髙七寸後髙三寸長八寸公侯三梁胡廣曰車駕廵狩幸其國諸侯衣𤣥端之衣冠九旒之冕其盛法服以就位也今列侯自不奉朝請侍祠祭者不得服此皆當三梁冠皁單衣其歸國流黄衣皁云晉公卿禮秩曰太傅司空司徒著進賢三梁冠黒介幘中二千石以下至博士兩梁自博士以下至小史私學弟子皆一梁宗室劉氏亦兩梁冠示加服也獨斷曰漢制禮無文荀綽晉百官表注曰建光中尚書}
