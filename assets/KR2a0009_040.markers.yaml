  - {type: variant, offset: 46, length: 1, content: 達, krp: 直豎不常服唯郊天黄門從官四人冠之在鹵簿中次乗輿車前以備宦者四星云獨斷曰禮無文却非冠制似長冠下促宫殿門吏僕射冠之負赤幡青翅燕尾諸僕射幡皆如之獨斷曰禮無文却敵冠前髙四寸通長四寸後髙三寸制似進賢衞士服之獨斷曰禮無文樊噲冠漢將樊噲造次所冠以入項羽軍廣九寸髙七寸前後出各四寸制似冕司馬殿門大難衞士服之或曰樊噲常持鐵楯聞項羽有意殺漢王噲裂裳以裹楯冠之入軍門立漢王旁視項羽術氏冠前圓吳制差池邐迆四重趙武靈王好服之今不施用官有}
  - {type: variant, offset: 48, length: 2, content: 旨同, WYG: 圖注淮南子曰楚莊王所服讎冠者是蔡邕曰其説未聞諸冠皆有纓蕤執事及武吏皆縮纓垂五寸武冠俗謂之大冠環纓無㽔以青系為緄加雙鶡尾豎左右為鶡冠云莊子曰縵胡之纓武士之服是也五官左右虎賁羽林五中郎將羽林左右監皆冠鶡冠紗縠單衣虎賁將虎文絝白虎文劒佩刀虎賁武騎皆鶡冠虎文單衣襄邑嵗獻織成虎文云鶡者勇雉也其鬪對一死乃止故趙武靈王以表武士秦施安焉徐廣曰鶡似黒雉出於上黨荀綽晉百官表注曰冠挿兩鶡鷙鳥之暴疏者也毎所攫撮應爪摧衂天子武騎故以冠焉傅𤣥賦注曰羽騎騎者戴鶡安帝立皇太子太子謁髙祖廟世祖廟門大夫從冠兩梁進賢洗馬冠髙山罷廟侍御史任方奏請非乗從時皆冠一梁不宜以為常服事下有司尚書陳忠奏門大夫職如諫大夫洗馬職如謁者故皆服其服先帝之舊也方言可寢奏可謁者古者一名洗馬古今注曰建武十三年初令令長皆小冠獨斷曰公卿侍中尚書衣皁而入朝者曰朝臣諸營校尉將大夫以下不為朝臣古者有冠無幘其戴也加首有頍所以安物故詩曰有頍者弁此之謂也三代之世法制滋彰下至戰國文武並用秦雄諸侯乃加其武將首飾為絳袙以表貴賤其後稍稍作顔題漢興續其顔却摞之施巾連題却覆之今喪幘是其制也名之曰幘幘者賾也頭首嚴賾也至孝文乃髙顔題續之為耳崇其巾為屋合後施収上下羣臣貴賤皆服之文者長耳武者短耳稱其冠也尚書賾収方三寸名曰納言示以忠正顯近職也迎氣五郊各如其色從章服也皁衣羣吏春服青幘立夏乃止助微順氣尊其方也武吏常赤幘成其威也未冠童子幘無屋者示未成人也入}
