  - {type: variant, offset: 51, length: 0, content: '', WYG: 小童幘也句卷屋者示尚幼少未逺冐也喪幘却摞反本禮也升數如冠與冠偕也期喪起耳有収素幘亦如之禮輕重有制變除從漸文也獨斷曰幘古者卑賤執事不冠者之所服也董仲舒止雨書曰執事}
