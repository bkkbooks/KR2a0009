  - {type: variant, offset: 4336, length: 549, content: 一篇逵悉傳父業弱冠能誦左氏傳及五經本文以大夏侯尚書教授雖為古學兼通五家穀梁之說自為兒童常在太學不通人閒事身長八尺二寸諸儒為之語曰問事不休賈長頭性愷悌多智思俶儻有大節尤明左氏傳國語為之解詁五十一篇永平中上疏獻之顯宗重其書寫藏祕舘時有神雀集宮殿官府冠羽有五采色帝異之以問臨邑侯劉復復不能對薦逵博物多識帝乃召見逵問之對曰昔武王終父之業鸑鷟在岐宣帝威懷戎狄神雀仍集此胡降之徵也帝勑蘭臺給筆札使作神雀頌拜為郎與班固並校祕書應對左右肅宗立降意儒術特好古文尚書左氏傳建初元年詔逵入講北宮白虎觀南宮雲臺帝善逵說使發出左氏傳大義長於二傳者逵於是具條奏之曰臣謹擿出左氏三十事尤著明者斯皆君臣之正義父子之紀綱其餘同公羊者什有七八或文簡小異無害大體至如祭仲紀季伍子胥叔術之屬左氏義深於君父父羊多任於權變其相殊絕固以甚遠而冤抑積久莫肯分明書建平中侍中劉歆欲立左氏不先暴論大義而輕移太常恃其義長詆挫諸儒諸儒內懷不服相與排之孝哀皇帝重逆衆心故出歆為河內太守從是攻擊左氏遂為重讎至光武皇帝奮獨見之明興立左氏穀梁會二家先師不曉圖讖故令中道而廢凡所以存先王之道者要在安上理民也今左氏崇君父卑臣子彊幹弱枝勸善戒惡至明至切至直至順且三代異物損益隨時故先帝博觀異家各有所採易有施孟復立梁丘尚書歐陽復有大小夏侯今三傳之異亦猶是也又五經家皆無以, WYG: 考}
