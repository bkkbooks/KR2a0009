  - {type: variant, offset: 2764, length: 0, content: '', WYG: 夫齋則不入側室之門也所謂宫中有卒三月不祭者謂士庶人數堵之室共處其中耳儀禮曰有死於宮中者則為之三月不舉祭豈謂皇居之曠臣妾之衆哉自今齋制宜如故典庶答風霆災妖之異二事臣聞國之将興至言數聞内知己政外}
  - {type: page-break, offset: 2764, content: '', id: KR2a0009_WYG_090-34b, image: WYG0253/WYG0253-0268b.png}
  - {type: variant, offset: 2764, length: 0, content: '', krp: 夫齋則不入側室之門也所謂宫中有卒三月不祭者謂士庶人數堵之室共處其中耳儀禮曰有死於宮中者則為之三月不舉祭豈謂皇居之曠臣妾之衆哉自今齋制宜如故典庶答風霆災妖之異二事臣聞國之将興至言數聞内知己政外}
  - {type: variant, offset: 2765, length: 0, content: '', WYG: 民情是故先帝雖有聖明之姿而猶廣求得失又因災異援引幽隱重賢良方正敦朴有道之選危言極諫不絶}
  - {type: variant, offset: 2765, length: 0, content: '', krp: 民情是故先帝雖有聖明之姿而猶廣求得失又因災異援引幽隱重賢良方正敦朴有道之選危言極諫不絶}
  - {type: variant, offset: 2766, length: 3, content: 南宮雲, WYG: 朝陛下親政以來頻年災異而未聞特舉博選之旨誠當思省述修舊事使抱忠之臣展其狂直以解易傳政悖德隱之言三事夫求賢之道未必一塗或以德顯或以言揚頃者立朝之士曾不以忠信見賞恒被謗訕之誅遂使羣下結口莫圖正辭郎中張文前獨盡狂言聖聽納受以責三司臣子曠然衆庶解悅漢名臣奏張文上疏其略曰春秋義曰蝗者貪擾之氣所生天意若曰貪狼之人蠶食百姓若蝗食禾稼而擾萬民獸齧人者象暴政若獸而齧人京房易傳曰小人不義而反尊榮則虎食人辟歴殺人亦象暴政妄有喜怒政以賄成刑放於寵推類叙意探指求源皆象羣下貪狼威教妄施或若蝗蟲宜勅正衆邪清審選舉退屏貪暴魯僖公小國諸侯勅政修己斥退邪臣尚獲其報六月甚雨之應豈況萬乗之主修善求賢宜舉敦朴以輔善政陛下參堯舜之聖秉獨見之明恢太平之業敦經好學流布逺近可留須臾神慮則可致太平招休徵矣制曰下太尉司徒司空夫瑞不虛至災必有緣朕以不徳秉統未明以招祅偽將何以昭顯憲法哉三司任政者也所當夙夜而各拱黙訖未有聞將何以奉答天意救寧我人其各悉心思所崇改務消復之術稱朕意焉劉攽曰注則可致太平案文多一可字又曰救寧我人案救當作敉敉寧出尚書臣愚以為宜擢文右職以勸忠謇右用事之便謂樞要之官宣聲海内博開政路四事夫司隸校尉諸州刺史所以督察姦枉分别白黑者也伏見幽州刺史楊憙益州刺史龎芝凉州刺史劉䖍各有奉公疾姦之心憙等所糾其効尤多餘皆枉橈不能稱職或有抱罪懷瑕與下同疾綱網弛縱莫相舉察公府}
