  - {type: variant, offset: 2744, length: 2, content: 納忠, WYG: 月冀州部有大賊天子思敞功使使者召拜為冀州刺史三公明知二州之要所宜速定當越禁取能以救時敝而不顧爭臣之義茍避輕微之科選用稽滯以失其人臣願陛下上則先帝蠲除近禁其諸州刺史器用可換者無拘日月三互以差厥中書奏不省初帝好學自造皇羲篇五十章因引諸生能為文賦者本頗以經學相招後諸為尺牘及工書鳥篆者皆加引召遂至數十人說文曰牘書板也長一尺藝文志曰六體者古文竒字篆書隸書繆篆蟲書音義曰古文謂孔子壁中書也竒字即古文而異者也篆書謂小篆盖秦始皇使程邈所作也隸書亦程邈所獻主於徒隸從簡易也繆篆謂其文屈曲纒繞所以摹印章蟲書謂為蟲鳥之形所以書旅信也侍中祭酒樂松賈䕶多引無行趣埶之徒並待制鴻都門下憙陳方俗閭里小事帝甚悅之待以不次之位又市賈小民為宣陵孝子者復數十人悉除為郎中太子舎人時頻有雷霆疾風傷樹㧞木地震隕雹蝗蟲之害又鮮卑犯境役賦及民六年七月制書引咎誥羣臣各陳政要所當施行邕上封事曰臣伏讀聖旨雖周成遇風訊諸執事宣王遭旱密勿祗畏無以或加尚書金縢曰秋大熟未穫天大雷電以風王乃問諸史百執事詩大雅雲漢篇序曰宣王遇旱側身修行欲消去之故大夫仍叔作雲漢之詩以美之密勿祗畏}
