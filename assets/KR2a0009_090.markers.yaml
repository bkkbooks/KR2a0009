  - {type: variant, offset: 5108, length: 2, content: 堪痛, WYG: 為報屬猶勸也音燭智者中常侍王甫弟也素貴驕慙於賔客詬邕曰徒敢輕我邕拂衣而去智銜之密告邕怨於囚放謗訕朝廷内寵惡之邕慮卒不免乃亡命江海逺跡吳㑹張騭文士傳曰邕告吳人曰吾昔嘗經會稽髙遷亭見屋椽竹東問第十六可以為笛取用果有異聲伏滔長笛賦序云柯亭之觀以竹為椽邕取為笛竒聲獨絶也往來依太山羊氏積十二年在吳吳人有燒桐以㸑者邕聞火烈之聲知其良木因請而裁為琴果有美音而其尾猶焦故時人名曰焦尾琴焉傅𤣥琴賦序曰齊桓公有鳴琴曰號鍾}
