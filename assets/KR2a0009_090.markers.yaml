  - {type: variant, offset: 1684, length: 4, content: 年詔書求, WYG: 輔弼賢知崇英逸偉不墜於地德𢎞者建宰相而裂土才羡者荷榮禄而蒙賜羡音以戰反本或作美盍亦回塗要至俛仰取容回曲也要音一遥反言履直道則不能有所至也輯當世之利定不㧞之功榮家宗於此時遺不滅之令蹤遺猶留也夫獨未之思邪何為守彼而不通此彼謂貧賤此謂榮禄胡老慠然而笑曰若公子所謂覩曖昧之利而忘昭晢之害專必成之功而忽蹉跌之敗者已公子謖然斂袂而興曰胡為其然也謖然翕斂之貎音所六反胡老曰居吾將釋汝居猶坐也釋解也昔自太極君臣始基太極天地之始也易曰易有太極是生兩儀有羲皇之洪寧唐虞之至時洪大也三代之隆亦有緝熙五伯扶微勤而撫之于斯已降天網縱人紘弛王塗壞太極陁賈逵注國語曰小崩曰陁君臣土崩上下瓦解淮南子曰武王伐紂左操黄鉞右執白旄麾之則瓦解而走遂土崩而下於是智者騁詐辯者馳說武夫奮略戰士講銳講習也電駭風馳霧散雲披變詐乖詭以合時宜或畫一策而綰萬金或談崇朝而錫瑞珪戰國策曰秦昭王見頓弱頓弱曰韓}
  - {type: page-break, offset: 1684, content: '', id: KR2a0009_WYG_090-23a, image: WYG0253/WYG0253-0262c.png}
