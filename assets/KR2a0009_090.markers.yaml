  - {type: variant, offset: 1242, length: 333, content: 子見危授命何乃誘以高位重餌哉融見業辭志不屈復曰宜呼室家計之業曰丈夫斷之於心久矣何妻子之為遂飲毒而死述聞業死大驚又恥有殺賢之名乃遣使弔祠賻贈百匹業子翬逃辭不受蜀平光武下詔表其閭益部紀載其高節圖畫形象初平帝時蜀郡王皓為美陽令王嘉為郎王莽篡位並𠫓廾官西歸及公孫述稱帝遣使徵皓嘉恐不至遂先繫其妻子使者謂嘉曰速裝妻子可全對曰犬馬猶識主況於人乎王皓先自刎以首付使者述怒遂誅皓家屬王嘉聞而歎曰後之哉乃對使者伏劒而死是時犍為任永君及業同郡馮信並好學博古公孫述連徵命待以高位皆託青盲以避世難永妻淫於前匿情無言見子入井忍而不救信侍婢亦對信姦通及聞述誅皆盥洗更視曰世適平目即清淫者自殺光武聞而徵之並會病卒劉茂字子衛太原晉陽人也少孤獨侍母居家貧以筋力致養孝行著於鄉里及長能習禮經教授常數百人, WYG: 曾祖父動}
