  - {type: variant, offset: 1661, length: 5, content: 俱奔盂縣晝, WYG: 宿於郭門飯牛車下望見桓公乃擊牛角而商歌桓公聞之曰異哉歌者非常人也命後車載之三齊記載其歌曰南山矸白石爛生不遭堯與舜禪短布單衣適至骭從昬飯牛薄夜半長夜漫漫何時旦公悅之以為大夫矸音岸骭音户諫反百里奚虞大夫也史記趙良曰百里奚自鬻於秦衣褐食牛期年而後穆公知之舉之牛口之下說文曰豢養也夫如是}
