  - {type: variant, offset: 2779, length: 0, content: '', WYG: 三年一貢士一適謂之攸好德再適謂之賢賢三適謂之有功注云適猶得也孝武之世郡舉孝亷又有賢良文學之選於是名臣輩出文武並興漢之得人數路而已數路謂孝㢘賢良文學之類也夫書畫辭賦才之小者匡國理政未有其能陛下即位之初先渉經術聽政餘日觀省篇章聊以游意當代博弈非以教化取士之本而諸生競利作者鼎沸其高者頗引經訓風喻之言下則連偶俗語有類俳優或竊成文虛冒名氏臣毎受詔於盛化門差次錄第其未及者亦復隨輩皆見拜擢既加之恩難復收改但守奉祿於義己𢎞不可復使理人及仕州郡昔孝宣會諸儒於石渠章帝集學士於白虎通經釋義其事優大文武之道所宜從之若乃小能小善雖有可觀孔子以為致逺則泥君子故當志其大者論語子夏曰雖小道必有可觀者焉致逺恐泥鄭𤣥注云小道如今諸子書也泥謂滯陷不通此邕以為孔子之言當别有所據也六事墨綬長吏職典理人漢書儀曰秩六百石銅章墨綬也皆當以惠利為績日月為勞襃責之科所宜分明而今在任無復能省及其還者多召拜議郎郎中若器用優美不宜處之冗散如有釁故自當極其刑誅豈有伏罪懼考反求遷轉更相放効臧否無章先帝舊典未嘗有此可皆斷絶以覈眞偽七事伏見前一切以宣陵孝子者}
