  - {type: variant, offset: 2782, length: 0, content: '', WYG: 舎人劉攽曰案文多一者字臣聞孝文皇帝制喪服三十六日雖繼體之君父子至親公卿列臣受恩之重皆屈情從制不敢踰越今虛偽小人本非骨肉既無幸私之恩又無禄仕之實惻隱思慕情何緣生而羣聚山陵假名稱孝行不隱心義無所依至有姦軌之人通容其}
