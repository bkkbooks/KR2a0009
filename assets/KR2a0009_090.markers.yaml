  - {type: variant, offset: 3877, length: 1045, content: 夷不患其陋貧者士之宜豈為鄙哉式勑縣代嵩嵩以為先傭未竟不肯去嵩在阿里正身厲行街中子弟皆服其訓化遂辟公府之京師道宿下亭盜共竊其馬尋問知其嵩也乃相責讓曰孔仲山善士豈宜侵盜乎於是送馬謝之嵩官至南海太守式後遷廬江太守有威名卒於官李善字次孫南陽淯陽人本同縣李元蒼頭也建武中疫疾元家相繼死沒唯孤兒續始生數旬而貲財千萬諸奴婢私共計議欲謀殺續分其財產善深傷李氏而力不能制乃潛負續逃去隱山陽瑕丘界中親自哺養乳為生湩推燥居溼備嘗艱勤續雖在孩抱奉之不異長君有事輒長跪請白然後行之閭里感其行皆相率脩義續年十歲善與歸本縣脩理舊業告奴婢於長吏悉收殺之時鍾離意為瑕丘令上書薦善行狀光武詔拜善及續並為太子舍人善顯宗時辟公府以能理劇再遷日南太守從京師之官道經淯陽過李元冢未至一里乃脫朝服持鉏去草及拜墓哭泣甚悲身自炊爨埶鼎俎以脩祭祀垂泣曰君夫人善在此盡哀數日乃去到官以愛惠為政懷來異俗遷九江太守未至道病卒續至河閒相王忳字少林廣漢新都人也忳嘗詣京師於空舍中見一書生疾困臣攵心而視之書生謂忳曰我當到洛陽而被病命在須臾下有金十斤願以相贈死後乞藏骸骨未及問姓名而絕忳即鬻金一斤營其殯葬餘金悉置棺下人無知者後歸數年縣署忳大度亭長初到之日有馬馳入亭中而止其日大風飄一繡被復墯忳前即言之於縣縣以歸忳忳後乘馬到雒縣馬遂奔走牽忳入它舍主人見之喜曰今禽盜矣問忳所由得馬忳具說其狀并及繡被主人悵然良久乃曰被隨旋風與馬俱亡卿何陰德而致此二物忳自念有葬書生事因說之并道書生形貌及埋金處主人大驚號曰是我子也姓金名彥前往京師不知所在何意卿乃葬之大恩久不報天以此章卿德耳忳悉以被馬還之彥父不取又厚遺忳忳辭讓而去時彥父為州從事因告新都令假忳休自與俱迎彥喪餘金俱存忳由是顯名仕郡功曹州治中從事舉茂才除郿令到官至斄亭亭長曰亭有鬼數殺過客不可宿也忳曰仁勝凶邪德除不祥何鬼之避即入亭止宿夜中聞有女子稱冤之聲忳呪曰有何枉狀可前求理乎女子曰無衣不敢進忳便投衣與之女子乃前訴曰妾夫為涪令之官過宿此亭亭長無狀賊殺妾家十餘口埋在樓下悉取財貨忳問亭長姓名女子曰即今門下游徼者也忳曰汝何故數殺過客對曰妾不得白日自訴每夜陳冤客輒眠不見應不勝感恚故殺之忳曰當為汝理此冤勿復殺良善也因解衣於地忽然不見明旦召游徼詰問具服罪即收繫及同謀十餘人悉伏辜遣吏送其喪歸鄉里於是亭遂清安張武者吳郡由拳人也父業郡門下掾送太守妻子還鄉里至河內亭盜夜劫之業與賊戰死遂亡失屍骸武時年幼不及識父後之太學受業每節常持父遺劒至亡處祭醊泣而還太守第五倫嘉其行舉孝廉遭母喪過毀傷父魂靈不返因哀慟絕命陵續字智初會稽吳人也世為, WYG: ''}
