  - {type: variant, offset: 2208, length: 5, content: 序主簿韓遵, WYG: 公張弓東向而射矢踰西霜之山集彭城之東其餘力逸勁飲羽於石梁呂氏春秋曰荆人佽飛入江斬蛟前書武帝時吾邱壽王字子贛以善格五待制格五今之簺也東方朔以善談笑俳優得幸班固曰朔應諧似優杜預注左傳曰優調戲也上官効力於執蓋𢎞羊據相於運籌僕不能參跡於若人故抱璞而優遊前書上官桀武帝封為期門郎}
