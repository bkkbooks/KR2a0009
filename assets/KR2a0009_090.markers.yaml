  - {type: variant, offset: 20, length: 0, content: '', krp: 禁令察羣吏之理左傳云晉趙盾為國政由質要杜預注曰由用也質要契劵也刊音苦寒反采清原嘉岐陽登俊傑命賢良舉淹滯㧞幽荒清原地在河東聞喜縣北左傳曰晉蒐于清原作五軍又楚椒舉曰周武有孟津之誓成有岐陽之蒐禮記月令孟夏命大尉贊傑俊遂賢良左傳楚平王詰姦慝舉淹滯杜預注云淹滯有才徳而未叙者也察淫侈之華譽顧介特之實功聘畎畝之羣雅宗重淵之潛龍華譽虛譽也介特謂孤介特立也畎畝謂隱於隴畝之中也司馬相如上林賦曰掩羣雅音義云謂大雅小雅之人也潛龍喻賢人隱也乃儲精山藪歴思河澤目矖鼎俎耳聽康衢營傅説於胥靡求伊尹於庖廚索膠鬲於魚鹽聽寗戚於大車矖視也音所解反鼎俎謂伊尹負鼎以干湯也墨子曰湯舉伊尹於庖廚之中康衢謂寗戚也説苑曰寗戚飯牛於康衢擊車輻而歌碩鼠傅説代胥靡刑人築於傅巖之野髙宗夢得之孟子曰膠鬲舉於魚鹽也俾之昌言而宏議軼越三家馳騁五帝悉覽休祥揔括羣瑞俾使也昌當也宏大也前書揚雄曰宏言崇議軼過也三家三皇也遂棲鳯皇於高梧宿麒麟於西園納僬僥之珍羽受王母之白環韓詩外傳曰黄帝時鳯皇止帝東園集帝梧桐食帝竹實尚書中候曰黄帝時麒麟在園帝王記曰堯時僬僥氏來貢没羽西王母慕舜之徳來獻白環也永逍遥乎宇内與二儀乎無疆貳造化於后土參神施於昊乾超特達而無儔煥巍巍而無原論語孔子曰堯之為君煥乎其有文章巍巍乎其有成功豐千億之子孫歴萬載而永延詩大雅曰天錫百禄子孫千億也禮樂既闋北轅反斾至自新城背伊闕反洛京闋止也音苦穴反新城縣屬河南郡今伊闕縣頌奏忤鄧氏滯於東觀十年}
