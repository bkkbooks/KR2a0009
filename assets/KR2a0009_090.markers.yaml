  - {type: variant, offset: 2115, length: 0, content: '', WYG: 善乃資萬金使東遊韓魏入其将相北逰燕趙而殺李牧齊王入朝四國畢從頓子說之也史記曰虞卿說趙孝成王一見賜黄金百鎰再見賜白璧一雙連衡者六印磊落合從者騈組流離連衡謂張儀合從謂蘇秦竝佩六國之印騈竝也組綬也流離光彩貎也隆貴翕習積富無崖據巧蹈機以忘其危夫華離蔕而萎條去幹而枯女冶容而淫士背道而辜人毁其滿神疾其邪利端始萌害漸亦牙速速方轂夭夭是加詩小雅曰速速方穀夭夭是㧻毛萇注云速速陋也鄭𤣥注云穀祿也言鄙陋小人將貴而得禄也夭殺也㧻破之也韓詩亦同此作轂者盖謂小人乗寵方轂而行方猶竝劉攽曰正文夭夭是加案上夭當作天據今詩文正然欲豐其屋乃蔀其家易豐卦上六曰豐其屋蔀其家王弼注云蔀覆也屋厚覆暗之甚也蔀音部是故天地否閉聖哲潛形易文言曰天地閉賢人隱石門守晨沮溺耦耕論語曰子路宿於石門晨門曰奚自子路曰自孔氏鄭𤣥注云石門魯城外門也晨門主晨夜開閉者又曰長沮桀溺耦而耕竝隱遁人也顏歜抱璞蘧瑗保生戰國策齊宣王謂顏歜曰願先生與寡人遊歜辭曰玉生於山制則毁焉非不寶也然大璞不完士生鄙野選而禄焉非不貴也而形神不全歜願得晚食以當肉安歩以當車無罪以當貴清靜以自娛知足以歸反於璞則終身不辱論語孔子曰蘧伯玉邦有道則仕邦無道則可卷而懷之此為保其生也齊人歸樂孔子斯征雍渠驂乘逝而遺輕論語曰齊人饋女樂季桓子}
