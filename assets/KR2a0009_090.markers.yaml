  - {type: variant, offset: 2744, length: 2, content: 納忠, krp: 月冀州部有大賊天子思敞功使使者召拜為冀州刺史三公明知二州之要所宜速定當越禁取能以救時敝而不顧爭臣之義茍避輕微之科選用稽滯以失其人臣願陛下上則先帝蠲除近禁其諸州刺史器用可換者無拘日月三互以差厥中書奏不省初帝好學自造皇羲篇五十章因引諸生能為文賦者本頗以經學相招後諸為尺牘及工書鳥篆者皆加引召遂至數十人說文曰牘書板也長一尺藝文志曰六體者古文竒字篆書隸書繆篆蟲書音義曰古文謂孔子壁中書也竒字即古文而異者也篆書謂小篆盖秦始皇使程邈所作也隸書亦程邈所獻主於徒隸從簡易也繆篆謂其文屈曲纒繞所以摹印章蟲書謂為蟲鳥之形所以書旅信也侍中祭酒樂松賈䕶多引無行趣埶之徒並待制鴻都門下憙陳方俗閭里小事帝甚悅之待以不次之位又市賈小民為宣陵孝子者復數十人悉除為郎中太子舎人時頻有雷霆疾風傷樹㧞木地震隕雹蝗蟲之害又鮮卑犯境役賦及民六年七月制書引咎誥羣臣各陳政要所當施行邕上封事曰臣伏讀聖旨雖周成遇風訊諸執事宣王遭旱密勿祗畏無以或加尚書金縢曰秋大熟未穫天大雷電以風王乃問諸史百執事詩大雅雲漢篇序曰宣王遇旱側身修行欲消去之故大夫仍叔作雲漢之詩以美之密勿祗畏}
  - {type: punctuation, offset: 2747, content: ，, id: KR2a0009_ZHSJ_090-bkkpn687}
  - {type: 'tls:seg', offset: 2747, content: '', id: KR2a0009_ZHSJ_090-d90p29s7}
  - {type: variant, offset: 2747, length: 0, content: '', WYG: 勤勞戒懼也臣聞天降災異緣象而至辟歴數發辟音普歴反史記曰霹靂陽氣之動也殆刑誅繁多之所生也風者天之號令所以教人也翼氏風角曰風者天之號令所以譴告人君者夫昭事上帝則自懷多福詩大雅曰昭事上帝聿懷多福聿遂也懷來也宗廟致敬則鬼神以著國之大事實先祀典左傳曰國之大事在祀與戎天子聖躬所當恭事臣自在宰府及備朱衣宰府謂司徒橋𤣥府也朱衣謂祭官也漢官儀曰漢家赤行齊者絳絝韤韤音文伐反迎氣五郊而車駕稀出四時至敬劉攽曰案文當作致敬屢委有司雖有解除猶為疎廢解除謂謝過也故皇天不悅顯此諸異鴻範傳曰政悖德隱厥風發屋折木坤為地道易稱安貞易坤文言曰地道也妻道也其彖曰安貞之吉應地無疆隂氣憤盛則當靜反動法為下叛夫權不在上則雹傷物政有苛暴則虎狼食人貪利傷民則蝗蟲損稼去六月二十八日太白與月相迫兵事惡之鮮卑犯塞所從來逺今之出師未見其利上違天文下逆人事誠當博覽衆議從其安者臣不勝憤懣謹條宜所施行七事表左表左謂陳之於表左也猶今云如左知右一事明堂月令天子以四立及季夏之節迎五帝於郊天子居明堂各依其月布政故云明堂月令四立謂立春立夏立秋立冬各以其日天子親迎氣於其方幷祭其方之帝季夏之末祭中央帝也所以導致神氣祈福豐年清廟祭祀追往孝敬養老辟雍示人禮化皆帝者之大業祖宗所祗奉也而有司數以蕃國疎喪宫内產生及吏卒小汚屢生忌故小汚謂病及死也竊見南郊齊戒未嘗有廢至於它祀輙興異議豈南郊卑而它祀尊哉孝元皇帝策書曰禮之至敬莫重於祭所以竭心親奉以致肅祗者也又元和故事復申先典章帝元和二年制曰山川百神應典禮者尚未咸秩其議修羣祀以祈豐年又宗祀五帝于汶上明堂三年望祀華霍東柴岱宗為人祈福前}
