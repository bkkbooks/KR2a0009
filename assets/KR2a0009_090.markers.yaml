  - {type: variant, offset: 7432, length: 237, content: 將軍何進移書陳留太守累行論謚僉曰宜為貞節先生會葬者二千餘人刺史郡守各為立碑表墓焉戴就字景成會稽上虞人也仕郡倉曹掾楊州刺史歐陽參奏太守成公浮臧罪遣部從事薛安案倉庫簿領收就於錢唐縣獄幽囚考掠五毒參至就慷慨直辭色不變容又燒鋘斧使就挾於肘腋就語獄卒可熟燒斧勿令冷每上彭考因止飯食不肯下肉焦毀墯地者掇而食之主者窮竭酷慘無復餘方乃臥就覆船下以馬通薰之一夜二日皆謂已死發船視之就方張眼大罵曰何不益火而使滅絕又復燒地以大鍼刺指爪中使以把土爪悉墯落主者以狀白安安呼見就謂曰太守罪穢狼藉受命考實, WYG: 賊幾傾漢室}
