  - {type: variant, offset: 3063, length: 0, content: '', WYG: 張華太史令單颺詣金商門引入崇徳殿洛陽記曰南宫有崇徳殿太極殿西有金商門也使中常侍曹節王甫就問災異及消改變故所宜施行邕悉心以對事在五行天文志其志今亡續漢書曰}
  - {type: page-break, offset: 3063, content: '', id: KR2a0009_WYG_090-39a, image: WYG0253/WYG0253-0270c.png}
  - {type: variant, offset: 3063, length: 0, content: '', krp: 張華太史令單颺詣金商門引入崇徳殿洛陽記曰南宫有崇徳殿太極殿西有金商門也使中常侍曹節王甫就問災異及消改變故所宜施行邕悉心以對事在五行天文志其志今亡續漢書曰}
  - {type: variant, offset: 3064, length: 1, content: 武, WYG: 和元年詔問曰連年蝗蟲其咎焉在邕對曰易傳云大作不時天降災厥咎蝗蟲來河圖秘徵篇曰帝貪則政暴吏酷則誅慘生蝗蟲貪苛之所致也又南宫侍中寺雌雞欲化為雄一身毛皆似雄但頭冠尚未變詔以問邕對曰貎之不恭則有雞禍宣帝黄龍元年未央宫雌雞化為雄不鳴無距是嵗元帝初即位将立王皇后至初元元年丞相史家雌雞化為雄距而鳴將是后父禁為平陽侯女立為后至哀帝晏駕后攝政王莽以后兄子為大司馬由是為亂臣竊推之頭為元首人君之象今雞一身已變未至於頭而止是將有其事而不遂成之象也若應之不精政無所改頭冠或成為患滋大也劉攽曰注是后父禁為平陽侯案如上文此處少一嵗字又當作陽平侯非平陽也又特詔問曰比災變互生未知厥咎朝廷焦心載懷恐懼每訪羣公卿士庶聞忠言而各存括囊莫肯盡心括囊喻閉口而不言易曰括囊無咎王弼注云括結也以邕經學深奥故密特稽問宜披露失得指陳政要勿有依違自生疑諱具對經術以皁囊封上漢官儀曰凡章表皆啟封其言密事得皁囊也邕對曰臣伏惟陛下聖徳允明深悼災咎襃臣末學特垂訪及非臣螻蟻所能堪副斯誠輸寫肝膽出命之秋豈可以顧患避害使陛下不聞至戒哉臣伏思諸異皆亡國之怪也天於大漢殷勤不已故屢出祅變以當譴責欲令人君感悟改危即安今災眚之發不於它所逺則門垣近在寺署其為監戒可謂至切蜺墮雞化皆婦人干政之所致也前者乳母趙嬈貴重天下嬈音女鳥反生則貲藏侔於天府死則邱墓踰於園陵兩子受封兄弟典郡續以永樂門史霍玉依阻城社又為姦邪今者道路紛紛復云有程大人者察其風聲将為國患宜高為隄防明設禁令深惟趙霍以為至戒趙嬈及霍玉也今聖意勤勤思明邪正而聞太尉張顥為玉所進光祿勲姓璋姓姓也璋名也漢有姓偉有名貪濁又長水校尉趙玹音𤣥蔡邕集玹作𤣥屯騎校尉蓋升並叨時幸榮富優足宜念小人在位之咎退思}
