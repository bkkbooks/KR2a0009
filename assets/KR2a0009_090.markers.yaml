  - {type: variant, offset: 2116, length: 0, content: '', WYG: 之三日不朝孔子行史記曰衛靈公與夫人同車宦者雍渠參乘孔子曰吾未見好德如好色者也於是醜之去衛適曹遺輕謂若弃輕細之物而去言惡之甚也夫豈慠主而背}
