  - {type: variant, offset: 5103, length: 0, content: '', WYG: 考吏張靜謂邕曰省君章云欲讎怨未有所施法令無此以詔書又刋章家姓名不得對相指斥考事君學多所見古今如此豈一事乎荅曰曉是吏遂飲章為文書臣賢案俗本有不解飲字或改為報或改為款並非也死期垂至冒昧自陳願身當辜戮匄質不幷坐匄乞也則身死之日更生之年也惟陛下加餐為萬姓自愛於是下邕質於洛陽獄劾以仇怨奉公議害大臣大不敬弃市事奏中常侍呂强愍邕無罪請之帝亦更思其章有詔減死一等與家屬髠鉗徙朔方不得以赦令除楊球使客追路刺邕客感其義皆莫為用球又賂其部主使加毒害所賂者反以其情戒邕故每得免焉居五原安陽縣即西安陽懸也故城在今勝州銀城縣邕前在東觀與盧植韓說等撰補後漢記會遭事流離不及得成因上書自陳奏其所著十意猶前書十志也邕别傳曰邕昔作漢記十意未及奏上遭事流離因上書自陳曰臣既到徙所乘塞守烽職在候望憂怖焦灼無心能復操筆成草致章闕廷誠知聖朝不責臣謝但懷愚心有所不竟臣自在布衣常以為漢書十志下盡王莽而止光武以來唯記紀傳無續志者臣所事師故太傅胡廣知臣頗識其門户略以所有舊事與臣雖未備悉粗見首尾積累思惟二十餘年不在其位非外史庶人所得擅述天誘其𠂻得備著作郎建言十志皆當撰錄會臣被罪逐放邊野恐所懷隨軀朽腐抱恨黄泉遂不設施謹先顚踣科條諸志臣欲刪定者一所當接續者四前志所無臣欲著者五及經典羣書所宜捃摭本奏詔書所當依據分别首目幷書章左惟陛下留神省察臣謹因臨戎長霍圉封上有律歴意第一禮意第二樂意第三郊祀意第四天文意第五車服意第六分别首目連置章左帝嘉其才高會明年大赦乃宥邕還本郡邕自徙及歸凡九月焉将}
