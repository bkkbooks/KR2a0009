  - {type: variant, offset: 7008, length: 217, content: 路奐識其聲即下車與相揖對奐曰行路倉卒非陳契闊之所可共到前亭宿息以分隔冉曰子前在考城思欲相從以賤質自絕豪友耳今子遠適千里會面無期故輕行相候以展訣別如其相追將有慕貴之譏矣便起告違拂衣而去奐瞻望弗及冉長逝不顧桓帝時以冉為萊蕪長遭母憂不到官後辟太尉府以狷急不能從俗常佩韋於朝議者欲以為侍御史因遁身逃命於梁沛之閒徒行敝服賣卜於巿遭黨人禁錮遂推鹿車載妻子捃拾自資或寓息客廬或依宿樹蔭如此十餘年乃結草室而居焉所止單陋有時粮粒盡窮居自若言貌無改閭里歌, WYG: 色允勃然叱}
