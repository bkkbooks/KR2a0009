  - {type: variant, offset: 2608, length: 1, content: 尚, WYG: 能心計為侍中於是公子仰首降階忸怩而避忸怩心慙也忸音女六反怩音尼胡老乃揚衡含笑援琴而歌衡眉目之間也歌曰練余心兮浸太清滌穢濁兮存正靈和液暢兮神氣寧情志泊兮心亭亭嗜欲息兮無由生踔宇宙而遺俗兮𦕈翩翩而獨征太清謂天也和液謂和氣靈液也亭亭孤峻之貎踔猶越也音丑教反建寧三年辟司徒橋𤣥府𤣥甚敬待之出補河平長召拜郎中校}
