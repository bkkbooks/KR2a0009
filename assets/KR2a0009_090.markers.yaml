  - {type: variant, offset: 2776, length: 2, content: 歸除, WYG: 八使又令三公謡言奏事漢官儀曰三公聽採長吏臧否人所疾苦條奏之是為舉謡言者也是時奉公者欣然得志邪枉者憂悸失色未詳斯議所因寢息昔劉向奏曰夫執狐疑之計者開羣枉之門養不斷之慮者來䜛邪之口語見前書今始聞善政旋復變易足令海内測度朝政宜追定八使糾舉非法更選忠清平章賞罰平和也章明也三公歳盡差其殿最使吏知奉公之福營私之禍則衆災之原庶可塞矣五事臣聞古者取士必使諸侯歲貢尚書大傳曰古者諸侯之於天}
