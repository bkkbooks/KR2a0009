  - {type: variant, offset: 1812, length: 296, content: 兵馬掾嚴授慮有伏兵苦諫止不聽顯蹙令進授不獲已前戰伏兵發授身被十創歿於陣顯拔刃追散兵不能制虜射中顯主簿衛福功曹徐咸遽起赴之顯遂墮馬福以身擁蔽虜并殺之朝廷愍授等節詔書襃歎厚加賞賜各除子一人為郎中永初二年劇賊畢豪等入平原界縣令劉雄將吏士乘船追之至厭次河與賊合戰雄敗執雄以矛刺之時小吏所輔前叩頭求哀願以身代雄豪等縱雄而刺輔貫心洞背即死東郡太守捕得豪等具以狀上詔書追傷之賜錢二十萬除父奉為郎中溫序字次房太原祁人也仕州從事建武二年騎都尉弓里戍將兵平定北州到太原歷訪英俊大人問以策謀戍見序奇之上疏薦焉於是徵為侍御史遷武陵都尉病免官六年拜謁者遷護羌校尉序行部至襄武為隗囂別將苟宇所拘劫宇謂序曰子若與我并威同力, WYG: ''}
