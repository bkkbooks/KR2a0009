  - {type: variant, offset: 1660, length: 0, content: '', WYG: 是而矯其非韙亦是也作釋誨以戒厲云爾有務世公子誨於華顚胡老曰顚頂也華顚謂白首也新序齊王對閭邱卭曰士亦華髮墮顚而後可用耳左傳宋司馬子魚曰雖及胡耉獲即取之杜預注曰胡耉元老之稱蓋聞聖人之大寶曰位故以仁守位以財聚人易曰聖人之大寶曰位何以守位曰仁何以聚人曰財也然則有位斯貴有財斯富行義逹道士之司也故伊摯有負鼎之􅃷仲尼設執鞭之言摯伊尹名也史記曰伊尹欲干湯而無由乃為有莘媵臣負鼎爼以滋味說湯致於王道衒自媒􅃷也論語孔子曰行義以達其道又曰富而可求雖執鞭之士吾亦為之周禮滌狼氏下士八人執鞭以辟道也寗子有清商之歌百里有豢牛之事淮南子曰寗戚欲干齊桓公窮困無以自達於是為商旅将車以適於齊}
