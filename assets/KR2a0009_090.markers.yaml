  - {type: variant, offset: 2117, length: 1, content: 重, WYG: 乎道不可以傾也且我聞之日南至則黄鍾應融風動而魚上冰蕤賔統則微隂萌蒹葭蒼而白露凝月令仲冬律中黄鍾融風艮之風也月令孟春東風解凍魚上冰又仲夏之月律中㽔賔㣲隂謂一隂爻生也詩秦風曰蒹葭蒼蒼白露為霜爾雅曰蒹薕也葭蘆也寒暑相推隂陽代興運極則化理亂相承今大漢紹陶唐之洪烈盪四海之殘災隆隱天之高拆絙地之基絙音古鄧反絙與亘同皇道惟融帝猷顯丕汦汦庶類含甘吮滋汦汦齊貎檢六合之羣品濟之乎雍熙羣僚恭己於職司聖主垂拱乎兩楹君臣穆穆守之以平濟濟多士端委縉綎端委禮衣也左傳曰太伯端委以持周禮說文曰縉赤白色也綎系綬也音它丁反鴻漸盈階振鷺充庭易曰鴻漸于陸鴻水鳥也漸出於陸喻君子仕進於朝詩曰振振鷺鷺于下注云鷺白鳥也喩絜白之士羣集君之朝也譬猶鍾山之玉泗濵之石累珪璧不為之盈採浮磬不為之索山海經曰黄帝取密山之玉策投之鍾山之陽尚書曰泗濵浮磬注云水中見石可以為磬言鍾山多玉泗水多石喩漢多賢人索盡也音所洛反曩者洪源辟而四隩集武功定而干戈戢獫狁攘而吉甫宴城濮捷而晉凱入辟開也音頻亦反謂禹理洪水而開道之尚書曰四隩既宅隩居也音於六反武功定謂武王伐紂詩周頌曰載戢干戈詩小雅曰薄伐獫狁至于太原吉甫燕喜既多受祉鄭元注曰吉甫既伐獫狁而歸天子以燕禮樂之也左傳晉與楚戰於城濮楚師敗績故晉凱樂而歸也故當其有事也則簑笠竝載擐甲揚鋒不給於務簑音素和反詩小雅曰荷簑荷笠毛萇注云荷揭也簑所以備雨笠所以禦暑擐貫也當其無事也則舒紳緩佩鳴玉以歩綽有餘裕夫世臣門子暬御之族詩小雅曰曾我暬御毛萇注云暬御侍御也天隆其祐主豐其禄抱膺從容爵位自從攝須理髯餘官委貴其進取也順傾轉圓不足以喻其便逡巡放屣不足以況其易夫有逸羣之才人人有優贍之智童子不問疑於老成瞳矇不稽謀於先生心恬澹於守高意無為於持盈老子曰持而盈之不如其已河上公注云持滿必傾不如止也粲乎煌煌莫非華榮明哲泊焉不失所寧泊猶靜也狂淫振蕩乃亂其情貪夫殉財夸者死權賈誼鵩鳥賦之文也言夸華者必死於權埶也瞻仰此事體躁心煩闇謙盈之効迷損益之數易曰天道虧盈而益謙又曰損益盈虛與時偕行王弼注云自然之質各定其分短者不為不足長者不為有餘損益將何加焉騁駑駘於修路慕騏驥而增驅卑俯乎外戚之門乞助乎近貴之譽榮顯未副從而顚踣踣音歩北反叶韻音赴下獲熏胥之辜高受滅家之誅詩小雅曰若此無罪勲胥以痡勲帥也胥相也痡病也言此無罪之人而使有罪者相帥而病之是其大甚見韓詩前書曰史遷薰胥以刑音義云謂相薰蒸得罪也誅協韻音丁注反前車已覆襲軌而騖曾不鑒禍以知畏懼予惟悼哉害其若是害何也音曷天高地厚跼而蹐之詩小雅曰謂天盖髙不敢不跼謂地盖厚不敢不蹐怨豈在明患生不思戰戰兢兢必愼厥尤且用之則行聖訓也舎之則藏至順也論語孔子曰用則行舎則藏故言聖訓也九河盈溢非一凷所防九河謂河水分為九道爾雅曰徒駭太史馬頰覆鬴胡蘇簡絜鈎般鬲津是為九河也帶甲百萬非一勇所抗協韻音苦郎反今子責匹夫以清宇宙庸可以水旱而累堯湯乎懼煙炎之毁熸何光芒之敢揚哉烟炎烟火之微細者言常懼微細以致毁滅杜預注左傳曰吳楚之間謂火滅為熸音子亷反炎音熖且夫地将震而樞星直井無景則日隂食晏子見伯常騫問曰昔吾見維星絶樞星散地其動乎見晏子春秋隂食謂不顯食也凡日隂食則井無影也元首寛則望舒脁侯王肅則月側匿望舒月也尚書大傳曰晦而月見西方謂之朓朔而月見東方謂之側匿側匿則侯王肅朓則侯王舒注肅急也舒緩也是以君子推微達著尋端見緒履霜知冰踐露知暑時行則行時止則止消息盈沖取諸天紀易坤文言曰履霜堅氷至艮卦曰時行則行時止則止豐卦曰天地盈虚與時消息利用遭泰可與處否樂天知命持神}
