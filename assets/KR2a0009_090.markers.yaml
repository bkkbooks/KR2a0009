  - {type: variant, offset: 2234, length: 371, content: 賜城傍為冢地賻穀千斛縑五百匹除三子為郎中長子壽服竟為鄒平侯相夢序告之曰久客思鄉里壽即𠫓廾官上書乞骸骨歸葬帝許之乃反舊塋焉彭脩字子陽會稽毗陵人也年十五時父為郡吏得休與脩俱歸道為盜所劫脩困迫乃拔佩刀前持盜帥曰父辱子死卿不顧死邪盜相謂曰此童子義士也不宜逼之遂辭謝而去鄉黨稱其名後仕郡為功曹時西部都尉宰鼂行太守事以微過收吳縣獄吏將殺之主簿鐘離意爭諫甚切鼂怒使收縛意欲案之掾吏史莫敢諫脩排閤直入拜於庭曰明府發雷霆於主簿請聞其過鼂曰受教三日初不奉行廢命不忠豈非過邪脩因拜曰昔任座面折文侯朱雲攀毀欄檻自非賢君焉得忠臣今慶明府為賢君主簿為忠臣鼂遂原意罰貰獄吏罪後州辟從事時賊張子林等數百人作亂郡言州請脩守吳令脩與太守俱出討賊賊望見車馬競交射之飛矢雨集脩障扞太守而為流矢所中死太守得全賊素聞其恩信即殺弩中脩者餘悉降散言曰自為彭君故降不為太守服也索盧放字君陽東郡, WYG: 賈}
