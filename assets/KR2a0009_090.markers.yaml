  - {type: variant, offset: 551, length: 3, content: 遷中散, WYG: 重在東觀著述以病去官融才高博洽為世通儒教養諸生常有千數涿郡盧植北海鄭𤣥皆其徒也善鼓琴好吹笛達生任性不拘儒者之節居宇器服多存侈飾常坐高堂施綘紗帳前授生徒後列女樂弟子以次相傳鮮有入其室者嘗欲訓左氏春秋及見賈逵鄭衆注乃曰賈君精而不博鄭君博而不精既精既博吾何加焉但著三傳異同說注孝經論語詩易三禮尚書列女傳老子淮南子離騷所著賦頌碑誄書記表奏七言琴歌對策遺令凡二十一篇初融懲於鄧氏不敢復違忤埶家遂為梁冀草奏李固又作}
