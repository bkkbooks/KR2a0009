  - {type: variant, offset: 293, length: 0, content: '', WYG: 大將軍梁商表為從事中郎轉武都太守時西羌反叛征西將軍馬賢與䕶羌校尉胡疇征之而稽久不進融知其將敗上疏乞自効曰今雜種諸羌轉相鈔盜宜及其未幷亟遣深入破其支黨而馬賢等處處留滯羌胡百里望塵千里聽聲今逃匿避囘漏出其後則必侵寇三輔為民大害臣願請賢所不可用關東兵五千裁假部隊之號盡力率厲埋根行首以先吏士埋根言不退三旬之中必克破之臣少習學蓺不更武職猥陳此言必受誣罔之辜昔毛遂厮養為衆所蚩終以一言克定從要毛遂趙平原君趙勝客也居門下三年時平原将與楚合從以毛遂備二十人}
