  - {type: variant, offset: 14, length: 0, content: '', WYG: 上馬融傳馬融字季長扶風茂陵人也融集云茂陵成懽里人也將作大匠嚴之子嚴援兄余之子為人美辭貎有俊才初京兆摯恂以儒術教授隱於南山不應徵聘名重關西三輔決錄注曰恂字季直好學善屬文隱於南山之隂融從其遊學博通經籍恂竒融才以女妻之永初二年大將軍鄧騭聞融名召為舍人非其好也遂不應命客於涼州武都漢陽界中會羌虜飈起邊方擾亂米穀踴貴自關以西道殣相望左傳曰叔向云道殣相望杜注云餓死為殣也音覲融既飢困乃悔而歎息謂其友人曰古人有言左手據天下之圖右手刎其喉愚夫不為荘子曰言不以名害其生者所以然者生貴於天下也今以曲俗咫尺之羞滅無貲之軀殆非老荘所謂也故往應騭召四年拜為校書郎中謝承及續漢書並云為校書郎又拜郎中也詣東觀典校祕書是時鄧太后臨朝騭兄弟輔政而俗儒世士以為文德可興武功宜廢遂寢蒐狩之禮息戰陳之法故猾賊從横乗此無備融乃感激以為文武之道聖賢不墜五才之用無或可廢五才金木水火土也左傳曰宋子罕曰天生五材人並用之廢}
