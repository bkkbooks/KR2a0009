  - {type: variant, offset: 7670, length: 292, content: 何故以骨肉拒扞邪就據地荅言太守剖符大臣當以死報國卿雖銜命固宜申斷冤毒柰何誣枉忠良強相掠理令臣謗其君子證其父薛安庸騃忸行無義就考死之日當白之於天與羣鬼殺汝於亭中如蒙生全當手刃相裂安深奇其壯節即解械更與美談表其言辭解釋郡事徵浮還京師免歸鄉里太守劉寵舉就孝廉光祿主事病卒趙苞字威豪甘陵東武城人從兄忠為中常侍苞深恥其門族有宦官名埶不與忠交通初仕州郡舉孝廉再遷廣陵令視事三年政教清明郡表其狀遷遼西太守抗厲威嚴名振邊俗以到官明年遣使迎母及妻子垂當到郡道經柳城值鮮卑萬餘人入塞寇鈔苞母及妻子遂為所劫質載以擊郡苞率步騎二萬與賊對陣賊出母以示苞苞悲號謂母曰為子無狀欲以微祿奉養朝夕不圖為母作禍昔為母子今, WYG: ''}
