  - {type: variant, offset: 1667, length: 9, content: 逃隱夜求糧食積百餘, WYG: 聖哲之通趣古人之明志也夫子生清穆之世秉醇和之靈覃思典籍韞櫝六經安貧樂賤與世無營沈精重淵抗志高㝠包括無外綜析無形其已久矣曾不能㧞萃出羣揚芳飛文孟子曰若仲尼者拔乎其萃出乎其類登天庭序彝倫掃六合之穢慝清宇宙之埃塵連光芒於白}
