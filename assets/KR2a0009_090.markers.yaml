  - {type: variant, offset: 18, length: 0, content: '', krp: 奢則不遜儉則固奢儉之中以禮為界界猶限也是以蟋蟀山樞之人並刺國君諷以太康馳驅之節詩國風序曰蟋蟀刺晉僖公也儉不中禮其詩曰無己太康職思其居毛萇注云己甚也鄭箋云君雖當自樂亦無甚太樂欲其用禮以為節也又序曰山有樞刺晉昭公也有才不能用其詩曰子有車馬弗馳弗驅宛其死矣他人是愉言僖公以太康貽戒昭公以不能馳驅被譏言文武之道須折𠂻也樞音謳劉攽曰註有才不能用案文才當作財夫樂而不荒憂而不困左傳曰吳季札聘於魯魯為之歌頌季札曰樂而不荒為之歌衛曰憂而不困先王所以平和府藏頥養精神致之無疆韓詩外傳曰人有五藏六府何謂五藏精藏於腎神藏於心魂藏於肝魄藏於肺志藏於脾此之謂五藏也何謂六府喉咽者量腸之府也胃者五榖之府也大腸者轉輸之府也小腸者受成之府也膽者積精之府也旁光者湊液之府也詩曰天生蒸民有物有則故戞擊鳴球載於虞謨吉日車攻序於周詩戞敔也音古八反形如伏獸背上有二十七刻以木長尺櫟之所以止樂擊柷也象桶中有椎柄連底揺之所以作樂見三禮圖球玉磬也虞謨舜典也詩小雅曰吉日維戊既伯既禱田車既好四牡孔阜又曰我車既攻我馬既同聖主賢君以增盛美豈徒為奢淫而已哉伏見元年已來遭値戹運元年謂安帝即位年也戹運謂地震大水雨雹之類陛下戒懼災異躬自菲薄荒棄禁苑廢弛樂懸勤憂潛思十有餘年以過禮數重以皇太后體唐堯親九族篤睦之德陛下履有虞烝烝之孝外舍諸家毎有憂疾聖恩普勞遣使交錯稀有曠絶時時寧息又無以自娛樂殆非所以逢迎太和裨助萬福也臣愚以為雖尚頗有蝗蟲今年五月以來雨露時澍祥應将至方渉冬節農事間隙宜幸廣成覽原隰觀宿麥勸收藏因講武校獵使寮庶百姓復覩羽旄之美聞鐘鼓之音歡欣喜樂鼓舞疆畔孟子對齊宣王曰今王頗鼓樂於此百姓聞王鐘鼓之聲舉欣欣然有喜色而相告曰吾王庻幾無疾病歟何以能鼓樂也今王田獵於此百姓見羽旄之美欣欣有喜色而相告曰吾王庶幾無疾病歟何以能田獵也此無佗與人同樂也劉攽曰注今王頗鼓樂案文多一頗字以迎和氣招致休慶小臣螻蟻不勝區區職在書籍謹依舊文重述蒐狩之義作頌一篇幷封上淺陋鄙薄不足觀省臣聞昔命師於鞬櫜偃伯於靈臺或人嘉而稱焉鞬以藏箭櫜以藏弓鞬音紀言反櫜音髙禮記孔子曰武王剋殷倒載干戈包以獸皮名之曰建櫜鄭注云建讀為鍵音其蹇反謂藏閉之也此馬鄭異議司馬法曰古者武軍三年不興則凱樂凱歌偃伯靈臺答人之勞告不興也偃休也伯謂師節也靈臺望氣之臺也彼固未識夫雷霆之為天常金革之作昬明也左傳鄭子太叔曰為刑罰威獄以類天之震耀殺戮杜預注曰雷霆震耀天之威也聖人作刑獄以象類之又宋子罕曰兵之設乆矣所以威不軌而昭文徳也聖人以興亂人以廢廢興存亡昬明之術皆兵之由也自黄炎之前傳道罔記三五以來越可略聞且區區之酆郊猶廓七十里之囿盛春秋之苖酆周文王所都孟子曰文王之囿方七十里爾雅曰春獵為蒐夏曰苖秋曰獮冬曰狩詩詠圃草樂奏騶虞韓詩曰東有圃草駕言行狩毛詩曰彼茁者葭一發五豝于嗟乎騶虞毛萇注云騶虞義獸也白虎黑文不食生物有至信之德則應之周禮大司樂王大射則奏騶虞是以大漢之初基也宅兹天邑揔風雨之會交隂陽之和周禮曰風雨之所會也隂陽之所和也乃建王國焉天邑謂洛陽也揆厥靈囿營于南郊揆度也詩大雅曰王在靈囿言作廣成苑以比之徒觀其埛場區宇恢胎曠蕩􅀢夐勿罔寥豁鬱泱􅀢音眇泱音烏朗反並廣大貎騁望千里天與地莽於是周阹環瀆右矕三塗左概嵩嶽阹音欺於反上林賦曰江河為阹郭璞注曰因山谷遮禽獸曰阹爾雅曰矕視也音馬板反三塗山名在陸渾縣西南靣據衡隂箕背王屋浸以波溠夤以滎洛衡隂衡山之北山海經曰雉山澧水出焉東曰衡山多青臒地里志云雉縣衡山澧水所出在今鄧州向城縣北王屋山在今王屋縣北周禮曰豫州其浸波溠其川滎洛水經注云溠水出黄山在今隨州棗陽縣東北又云波水出歇馬嶺即應劭所謂孤山波水所出者今在汝州魯山西北滎水在滎陽縣東是也金山石林殷起乎其中峨峨磑磑鏘鏘􅞐􅞐隆穹槃回嵎峗錯崔金山金門山也水經注云在澠池縣南石林大石山也一名萬安山在河南郡境薄云洛陽縣南大石山中有雜樹木有祠名大石祠山髙二百丈也殷音於謹反磑音五來反􅞐音徂回反嵎音隅峗音魚軌反並髙峻貌神泉側出丹水湼池怪石浮磬燿焜于其陂爾雅曰汍泉穴出穴出側出也丹水湼水在今鄧州怪石怪異好石似玉者浮磬若泗水中石可以為磬也燿焜光也其土毛則㩁牧薦草芳茹甘荼毛草也左傳云楚芊尹無宇曰食土之毛誰非君臣㩁相傳音角㩁牧未詳荘子曰麋鹿食薦一曰草稠曰薦茹菜也爾雅曰荼苦菜也詩曰堇荼如飴飴亦甘也茈萁芸蒩昌本深蒲茈音紫萁音其爾雅曰綦月爾郭璞注曰即紫綦也似蕨可食芸香草也説文云似苜蓿蒩音資云都反廣雅曰蕺蒩也其根似茅根可食昌本昌蒲根也深蒲謂蒲白生深水之中芝荋堇荁蘘荷芋渠芝荋草也禮記曰芝栭菱椇荋音而堇菜花紫葉可食而滑荁音户官反禮記曰堇荁枌榆鄭注云荁堇類也蘘荷苖似薑根色紅紫似芙蓉可食芋渠即芋魁也一名蹲鴟大葉其根亦可食也桂荏鳬葵格韮葅于爾雅曰蘇桂荏方言曰蘇亦荏也爾雅曰茆鳬葵葉團似蓴生水中今俗名水葵爾雅曰茖山葱格與茖古字通菹音子閭反即巴苴一名芭蕉于軒于也一名蕕生於水中涘其植物則𤣥林包竹藩陵蔽京珍林嘉樹建木叢生𤣥猶幽也包叢生也爾雅曰大阜曰陵絶髙曰京藩亦蔽也建木長木也椿梧栝栢柜柳楓楊並木名也柜音矩楊協韻音以征反豐彤對蔚崟頟槮爽並林木貎也對音徒對反崟音吟槮音所金反爽叶韻音生翕習春風含津吐榮鋪于布蓶扈蘳熒惡可殫形鋪音敷蓶音以揆反郭璞注爾雅云草木花初出為笋與蓶通其字從唯本作從荏者誤也扈音户蘳音胡瓦反字從圭並花葉貎本作黊說文云黊黄花也廣雅曰好色也熒光也惡何也音烏至于陽月隂慝害作百草畢落林衡戒田焚萊柞木爾雅曰十月為陽孫炎注曰純隂用事嫌於無陽故以名云左傳曰唯正月之朔慝未作杜注云慝隂氣也害作言隂氣肅殺害於百草也周禮曰林衡掌巡林麓之禁令又曰牧師掌牧地凡田事贊焚萊除草也柞音士雅反邪斫木也周禮柞氏掌攻草木及林麓然後舉天網頓八紘揫斂九藪之動物繯橐四野之飛征揫聚也子由反周禮職方氏掌九藪揚州具區荆州雲夢豫州圃田青州孟諸兗州大野雍州弦蒲幽州貕養冀州楊紆幷州昭余祁鄭𤣥注云澤無水曰藪動物謂禽獸也繯音胡犬反又胡串反說文曰繯落也國語曰繯於山有罕賈逵注云繯還也橐囊也音託四野四方之野飛征飛走也鳩之乎兹囿之中山敦雲移羣鳴膠膠鄙騃譟讙子野聽聳離朱目眩隸首策亂陳子籌昬鳩聚也敦音屯亦積聚也鄙騃獸奮迅貌也鄙音普美反騃音俟韓詩曰駓駓俟俟或羣或友眩亂也叶韻音𤣥隸首黄帝時善筭者也陳子陳平善於籌策也昬亂也言禽獸多不可筭計於時營圍烣廓充斥川谷罦罝羅羉彌綸阬澤臯牢陵山罦音浮雉網也置罟也羉彘網也音力官反並見爾雅阬音苦庚反蒼頡篇曰阬壑也臯牢猶牢籠也孫卿子曰臯牢天下而制之若制子孫也諸本有作牢柵者非也校隊案部前後有屯甲乙相伍戊己為堅周禮司馬職曰前後有屯甲乙謂相次也伍伍長也戊己居中為中堅也乘輿乃以吉月之陽朔登于疏鏤之金路六驌騻之𤣥龍建雄虹之旌夏揭鳴鳶之修橦陽朔十月朔也疏鏤謂彫鏤也周遷輿服雜記曰玉路重輅也金路玉路形制如一六駕六馬也續漢志曰天子五路駕六馬驌騻馬名左傳云唐成公有兩驌騻馬周禮曰馬髙八尺曰龍禮記曰孟冬乘𤣥輅駕鐵驪今此亦順冬氣而乘𤣥也郭璞注爾雅云虹䨇出色鮮盛者為雄左傳云舞師題以旌夏杜預注云旌夏大旌也揭舉也音渠列反禮記曰前有塵埃則載鳴鳶鳶鴟也音緣鳴則風動故畫之於旌旗以候埃塵也橦者旗之竿也音直江反曵長庚之飛髾載日月之太常棲招揺與𤣥弋注枉矢於天狼長庚即太白星髾音所交反即旌旗所垂之羽毛也太常天子所建大旗也畫之日月周禮云日月為常招揺𤣥弋天狼並星名也枉矢妖星蛇行有尾目赤畫於旌旗也劉攽曰案妖星可見尾目而已又言其赤非也赤當作亦上文大常畫日月故云亦畫也羽毛紛其髟鼬揚金㚇而拖玉瓖髟鼬羽旄飛揚貎也髟音必由反鼬音羊救反蔡邕獨斷曰金㚇者馬冠也髙廣各四寸在馬鬉前㚇音無犯反一音子公反瓖馬𢃄以玉飾之音襄屯田車於平原播同徒於高岡旃旝摻其如林錯五色以摛光詩小雅曰我車既好又曰射夫既同言徒衆齊同也旝亦旃也音古㑹反左傳曰旝動而鼓摻音所金反與森字同劉攽曰注我車既好案我當作田清氛埃埽野塲誓六師搜雋良野塲謂除其草萊令得驅馳也左傳曰天子六軍雋良馬之善者司徒勒卒司馬平行車攻馬同教達戒通周禮曰司徒若將有軍旅㑹同田役之戒則受法于司馬以作其衆又曰司馬狩田以旌為左右和之門前後有屯百歩有司巡其前後鄭注云正其士之行列詩小雅曰我車既攻我馬既同毛萇注云攻堅也同齊也戎事齊力尚强也田獵齊足尚疾也伐咎鼓撞華鍾獵徒縱赴榛叢咎鼓大鼓也音公刀反周禮􅀢鼓長尋有四尺徽嫿霍奕别騖分奔騷擾聿皇往來交舛紛紛回回南北東西嫿音呼獲反並奔馳貎風行雲轉匈礚隱訇黄塵勃滃闇若霧昬礚音苦蓋反訇音火宏反並聲也滃音烏董反日月為之籠光列宿為之翳昧僄狡課才勁勇程氣僄狡勇捷僄匹妙反狗馬角逐鷹鸇競鷙驍騎旁佐輕車横厲相與陸梁聿皇于中原絹猑蹏鏦特肩脰完羝撝介鮮散毛族梏羽羣絹繫也與冐通工犬反猑蹏野馬也爾雅曰騉蹄趼善升甗猑音昆鏦猶撞也揚雄方言曰吳楚之間或謂矛為鏦音楚江反韓詩齊風曰並驅從兩肩兮薛君傳曰獸三嵗曰肩脰頸也謂中其頸也脰音豆完羝野羊也臣賢案字書作羦音户官反與完通梏諸家並古酷反案字書梏從手即古文攪字謂攪擾也然後飛鋋電激流矢雨墜各指所質不期俱殪竄伏扔輪發作梧轊鋋矛也周禮曰王弓以授射甲革椹質者鄭𤣥云質正也正音征扔音人證反聲類曰扔摧也言為輪所摧也梧支梧也音悟謂支著車也轊車軸頭也音衛謂車軸轥而殺之祋殳狂擊頭陷顱碎獸不得猭禽不得瞥祋亦殳也音丁外反顱額也音盧猭走也音丑戀反瞥視也叶韻音疋例反殳音殊或夷由未殊顚狽頓躓蝡蝡蟫蟫充衢塞隧葩華䓑布不可勝計夷由不行也楚詞曰君不行兮夷由未殊謂未死蝡音而兗反說文曰動也蟫音似林反亦動貎也若夫鷙獸毅蟲倨牙黔口大匈哨後縕巡歐紆負隅依阻莫敢嬰禦爾雅曰駮如馬倨牙食虎豹黔黒也周禮考工記曰大匈燿後有力而不能走鄭𤣥注曰燿讀曰哨哨小也音稍縕巡並行貎也縕音於粉反孟子曰有衆逐虎虎負隅莫之敢攖攖迫也禦扞也乃使鄭叔晉婦之徒睽孤刲刺裸裎袒裼鄭叔鄭荘公弟太叔叚也詩鄭風曰大叔于田乗乗馬禮裼暴虎獻于公所孟子曰晉人有馮婦者善搏虎攘臂下車衆皆悅之睽離也孤獨也謂挺身刺獸刲亦刺也音苦圭反爾雅曰袒裼肉袒也孟子曰袒裼裸裎於我側説文曰裎裸也其字從衣冒􅩆柘搓棘枳窮浚谷底幽嶰暴斥虎搏狂兕獄􅀢熊抾封狶爾雅曰􅩆山桑也音一染反搓斫也音仕雅反嶰謂山澗也蒼頡篇曰斥大也􅀢亦狂也音吉曵反說文曰兕似野牛而青色抾音刼古字通封大也狶豬也虛起反或輕訬趬悍廋疏㟺領犯歴嵩巒陵喬松履修樠踔攳枝杪標端尾蒼蜼掎𤣥猨木産盡寓屬單訬輕捷也音初稍反趬音丘昭反說文曰趬行輕貎廋疏猶搜索也廋音所由反字林曰㟺山巓也音力于反爾雅曰山大而髙曰嵩山小而髙銳曰戀襔音莫寒反踔跳也音勅教反􅔨音尋謂長枝也杪音亡小反標音必遥反並木末也蜼音以蘂反爾雅曰蜼卬鼻而長尾郭璞注曰似獮猴而大黄黑色尾長數尺末有兩岐两則自懸於樹以尾塞鼻零陵南康人呼之音餘建平人呼之音相贈遺之遺也又音余救反皆土俗輕重不同耳掎音居螘反說文曰偏引一足也木産謂巢栖之類也寓屬謂穴居之屬也罕罔合部􅊻弋同曲類行並驅星布麗屬曹伍相保各有分局罕亦網也相如上林賦曰戴雲罕續漢志曰将軍有部部下有曲罾魚網也音增弋繳射也分音扶問反矰碆飛流纎羅絡縸遊雉羣驚晨鳬軰作翬然雲起霅爾雹落矰弋矢也碆與磻同音補何反又補佐反説文曰以石著隿繳也絡縸張羅貎也縸與幕通翬飛也音揮霅音素洽反廣雅曰霅雨也言鳥中繳如雨之落爾乃􅀢觀高蹈改乗回轅泝恢方撫馮夷策句芒超荒忽出重陽厲雲漢横天潢􅀢逺也音名小反田獵既罷故改乗回轅也左傳曰改乗轅而北之泝上也恢大也馮夷河伯也句芒東方之神也荒忽幽逺也重陽天也雲漢天河也天潢星也導鬼區徑神場詔靈保召方相驅厲疫走蜮祥靈保神巫也楚辭九歌曰思靈保兮賢姱周禮方相氏掌執戈揚楯帥百𨽻以敺疫洪範五行傳曰蜮射人生於南越謂之短狐詩蟲魚疏曰一名射景如鼈三足今俗謂之水弩也劉攽曰正文案導當作道捎罔兩拂游光枷天狗緤墳羊捎音所交反鄭注周禮曰捎除也國語曰木石之怪曰䕫罔兩游光神也兄弟八人天狗星名也春秋元命包日天狗主守財緤繫也音息列反墳羊土之怪其形似羊見家語然後緩節舒容裴回安歩降集波籞川衡澤虞矢魚陳罟波籞池籞也前書音義曰籞在池中作室可用栖鳥入則捕之又曰折竹以繩綿連禁禦使人不得往來也周禮川衡掌川澤之禁令澤虞掌國澤之政令也左傳曰魯隱公矢魚於棠矢亦陳也國語曰魯宣公夏濫罟於泗川里革斷其罟而棄之曰古者大寒降水虞於是登川禽而嘗之於廟行諸國助宣氣也今魚方孕又行罟貪無蓺也公曰吾之過也籞音圉兹飛宿沙田開古蠱音冶翬終葵揚關斧刋重冰撥蟄户測潛鱗踵介旅兹飛即佽飛也呂氏春秋曰荆人佽飛渉江中流兩蛟繞其船佽飛㧞劒赴江刺蛟殺之魯連子曰古善漁者宿沙渠子使漁山側雖十宿沙子不得魚焉宿沙非暗於漁道也彼山者非魚之所生也晏子春秋曰公孫捷田開彊古冶子事景公以勇晏子勸景公餽之二桃曰計功而食之公孫捷持楯而再搏乳虎若捷之功可以食桃田開彊曰吾仗兵禦三軍者再可以食桃古冶子曰吾嘗濟河黿銜左驂以入砥柱之流吾逆而百歩順流九里得黿頭鶴躍而出可以食桃矣二子皆反其桃契領而死古冶子曰二子死之吾獨生不仁亦契領而死蠱與冶通翬亦揮也廣雅曰終葵椎也關斧斧名也刋除也踵猶尋也介謂鱗蟲之屬也旅衆也劉攽曰注公孫捷持楯而再搏乳虎案如下文則此少曰吾二字逆獵湍瀨渀薄汾撓淪滅潭淵左挈䕫龍右提蛟鼉春獻王鮪夏薦鼈黿渀音蒲良反撓奴教反並入水貎也淪滅謂没於水中也鼉音壇鮪鱣屬也大者為王鮪小者為叔鮪禮記季春之月天子始乗舟薦鮪於寢廟季夏之月令漁師取黿也於是流覽徧照殫變極態上下究竟山谷蕭條原野嵺愀上無飛鳥下無走獸虞人植旍獵者効具車弊田罷旋入禁囿流覽謂周流觀覽也周禮曰植虞旌以屬禽鄭注曰植猶樹也田上樹旗令獲者皆致其禽也又曰車弊獻禽以享礿注曰車弊車止也嵺音力救反愀音七救反亦蕭條貎也棲遲乎昭明之觀休息乎高光之榭以臨乎宏池宏大也鎭以瑶臺純以金堤樹以蒲柳被以綠莎瀇瀁沆漭錯紾槃委天地虹洞固無端涯大明生東月朔西陂純緣也音之尹反蒲亦柳也瀇音胡廣反瀁音養沆音胡朗反漭音莽並水貎也錯紾交結也紾音之忍反委音於危反虹洞相連也虹音胡貢反朔生也禮記曰大明生於東月生於西鄭注曰大明日也言池水廣大日月出於其中也乃命壺涿驅水蠱逐罔螭滅短狐簎鯨鯢周禮壺涿氏掌除水蠱涿音丁角反蠱音公户反罔謂罔兩也螭龍也短狐即蜮也簎音七亦反説文曰刺也周禮鼈人掌以時籍魚鼈龜蜃鄭衆注云簎謂以杖刺泥中搏取之然後方餘皇連舼舟張雲帆施蜺幬靡颸風陵迅流發櫂歌縱水謳淫魚出蓍蔡浮湘靈下漢女游方猶並也餘皇吳之船名也見左傳舼小舟也音渠恭反淮南子曰越舼蜀艇不能無水而浮帆音凡幬帳也音直由反颸疾風也音楚疑反武帝秋風詞曰簫鼓鳴兮發櫂歌劉向列女傳曰津吏之女中流奏河激之歌韓詩外傳曰瓠巴鼓琴淫魚出聽淮南子曰上有叢蓍下有伏龜論語曰臧文仲居蔡注云龜出蔡地故以為名也湘靈舜妃溺於湘水為湘夫人也見楚詞漢女漢水之神女詩云漢有游女水禽鴻鵠鴛鴦鷗鷖鶬鴰鸕鷁鷺鴈鷿鷉乃安斯寢戢翮其涯鴛鴦匹鳥也鷗白鷗也鷖鳬屬也爾雅曰鶬麋鴰今謂之鴰鹿音括鸕鸕鷀也楊孚異物志云能没於深水取魚而食之不生卵而孕雛於池澤間既胎而又吐生多者生八九少生五六相連而出若絲緒焉水鳥而巢髙樹之上鷁白鶂也鷺白鷺也鷿音歩歴反鷉音梯揚雄方言曰野鳬也甚小好没水中膏可以瑩刀劒寢宿也詩曰乃安斯寢涯水濵也魴鱮鱏鯿鰋鯉鱨魦樂我純德騰踊相隨雖靈沼之白鳥孟津之躍魚方斯蔑矣鱮音緒似魴而弱鱗鱏音徐林反口在頷下大者長七八尺鯿音卑連反魴之類也鰋音匽今鰋額白魚也鱨音嘗詩蟲魚疏曰今黄頰魚也魦音沙或作鯊郭義恭廣志曰吹沙魚大如指沙中行詩大雅曰王在靈沼於牣魚躍鄭𤣥注云靈沼之水魚盈滿其中也皆以跳躍又曰白鳥翯翯翯肥澤也音學言並得其所也尚書中候曰武王度孟津白魚躍入于王舟中也然猶詠歌於伶簫載陳於方策豈不哀哉伶樂官也詩國風序曰衛之賢者仕於伶官禮記曰文武之道布在方策又曰百名以上書之於策不滿百名書之於方鄭注云方板也於是宗廟既享庖厨既充車徒既簡器械既攻禮記曰天子嵗三田一為乾豆二為賔客三為充君之庖然後擺牲班禽淤賜犒功羣師疊伍伯校千重山罍常滿房俎無空廣雅曰擺開也字書擺布字也音歩買反班固西都賦曰置互擺牲班布也淤與飫同左傳曰加饍則飫賜犒勞也山罍畫為山文禮記曰山罍夏后氏之樽也又曰周以房俎鄭𤣥注云房謂足下跗也有似於堂房矣酒正案隊膳夫巡行清醪車湊燔炙騎将鼓駭舉爵鍾鳴既觴周禮酒正中士辯五齊之名三酒之物膳夫上士掌王之食飲膳羞説文曰醪汁滓酒也大雅曰或燔或炙將行也既盡也流俗本爵字作爝旣字作暨皆誤若乃陽阿衰斐之晉制闡􅀢華羽之南音淮南子曰歌采菱發陽阿禮記曰嘽諧慢易之音作而人康樂鶡冠子曰南方萬物華羽焉故以調羽也所以洞蕩匈臆發明耳目疏越藴慉駭恫底伏越散也蘊慉猶積聚也慉與畜通恫音洞底伏猶滯伏也呂氏春秋曰昔隂康氏之始隂多滯伏湛積故作為舞以宣導之此言作樂亦以疏散滯伏之象鍠鍠鎗鎗奏于農郊大路之衢與百姓樂之鍠鍠鎗鎗鍾鼔之聲也鍠音横鎗音測庚反孟子謂齊宣王曰今王與百姓同其樂則王矣農郊田野也是以明德耀乎中夏威靈暢乎四荒東鄰浮巨海而入享西旅越葱嶺而來王南徼因九譯而致貢朔狄屬象胥而來同入享來助祭也孔安國注尚書曰西旅西戎逺國也葱嶺西域山也西河舊事曰嶺上多葱因以名焉徼塞之道也九譯謂九重譯語而通中國也尚書大傳曰周成王時越裳氏重九譯而貢白雉朔狄北狄也周禮象胥掌蠻夷戎翟之國使傳王之言而諭説焉以和親之鄭注云通夷狄之言者曰象胥其有才智者也此類之本名東方曰寄南方曰象西方曰狄鞮北方曰譯此官正為象者周始有南越重譯來貢獻是以名通言語之官為象胥胥音諝劉攽曰注名通言語之官為象胥案文當作通名謂總稱言語之官為象胥也盖安不忘危治不忘亂道在乎兹斯固帝王之所以曜神武而折遐衝者也晏子春秋曰晉平公欲攻齊使范昭觀焉景公觴之范昭曰願請君之棄酌景公曰諾范昭已飲晏子命徹尊更之范昭歸以報晉平公曰齊未可伐也吾欲慙其君而晏子知之仲尼聞之曰起於尊俎之間而折衝千里之外方今大漢收功於道德之林致平於仁義之淵忽蒐狩之禮闕槃虞之佃槃樂也虞與娛同闇昧不覩日月之光聾昬不聞雷霆之震于今十二年為日久矣亦方将刋禁臺之祕藏發天府之官常由質要之故業率典刑之舊章周禮八法四曰官常以聽官理天府掌祖廟之守藏}
  - {type: variant, offset: 20, length: 0, content: '', WYG: 禁令察羣吏之理左傳云晉趙盾為國政由質要杜預注曰由用也質要契劵也刊音苦寒反采清原嘉岐陽登俊傑命賢良舉淹滯㧞幽荒清原地在河東聞喜縣北左傳曰晉蒐于清原作五軍又楚椒舉曰周武有孟津之誓成有岐陽之蒐禮記月令孟夏命大尉贊傑俊遂賢良左傳楚平王詰姦慝舉淹滯杜預注云淹滯有才徳而未叙者也察淫侈之華譽顧介特之實功聘畎畝之羣雅宗重淵之潛龍華譽虛譽也介特謂孤介特立也畎畝謂隱於隴畝之中也司馬相如上林賦曰掩羣雅音義云謂大雅小雅之人也潛龍喻賢人隱也乃儲精山藪歴思河澤目矖鼎俎耳聽康衢營傅説於胥靡求伊尹於庖廚索膠鬲於魚鹽聽寗戚於大車矖視也音所解反鼎俎謂伊尹負鼎以干湯也墨子曰湯舉伊尹於庖廚之中康衢謂寗戚也説苑曰寗戚飯牛於康衢擊車輻而歌碩鼠傅説代胥靡刑人築於傅巖之野髙宗夢得之孟子曰膠鬲舉於魚鹽也俾之昌言而宏議軼越三家馳騁五帝悉覽休祥揔括羣瑞俾使也昌當也宏大也前書揚雄曰宏言崇議軼過也三家三皇也遂棲鳯皇於高梧宿麒麟於西園納僬僥之珍羽受王母之白環韓詩外傳曰黄帝時鳯皇止帝東園集帝梧桐食帝竹實尚書中候曰黄帝時麒麟在園帝王記曰堯時僬僥氏來貢没羽西王母慕舜之徳來獻白環也永逍遥乎宇内與二儀乎無疆貳造化於后土參神施於昊乾超特達而無儔煥巍巍而無原論語孔子曰堯之為君煥乎其有文章巍巍乎其有成功豐千億之子孫歴萬載而永延詩大雅曰天錫百禄子孫千億也禮樂既闋北轅反斾至自新城背伊闕反洛京闋止也音苦穴反新城縣屬河南郡今伊闕縣頌奏忤鄧氏滯於東觀十年}
