  - {type: variant, offset: 8006, length: 902, content: 使伏劒以固其志爾其勉之苞即時進戰賊悉摧破其母妻皆為所害苞殯斂母畢自上歸葬靈帝遣策弔慰封鄃侯苞葬訖謂鄉人曰食祿而避難非忠也殺母以全義非孝也如是有何面目立於天下遂歐血而死向栩字甫興河內朝歌人向長之後也少為書生性卓詭不倫恆讀老子狀如學道又似狂生好被髮著絳綃頭常於竈北坐板牀上如是積久板乃有膝踝足指之處不好語言而喜長嘯賓客從就輒伏而不視有弟子名為顏淵子貢季路冉有之輩或騎驢入市乞匄於人或悉要諸乞兒俱歸止宿為設酒食時人莫能測之郡禮請辟舉孝廉賢良方正有道公府辟皆不到又與城姜肱京兆韋著並徵栩不應後特徵到拜趙相及之官時人謂其必當脫素從儉而栩更乘鮮車御良馬世疑其始偽及到官略不視文書舍中生蒿萊徵拜侍中每朝廷大事侃然正色百官憚之會張角作亂栩上便宜頗譏刺左右不欲國家興兵但遣將於河上北向讀孝經賊自當消滅中常侍張讓讒栩不欲令國家命將出師疑與角同心欲為內應收送黃門北寺獄殺之諒輔字漢儒廣漢新都人也仕郡為五官掾時夏大旱太守自出祈禱山川連日而無所降輔乃自暴庭中慷慨呪曰輔為股肱不能進諫納忠薦賢退惡和調陰陽承順天意至令天地否隔萬物焦枯百姓喁喁無所訴告咎盡在輔今郡太守改服責己為民祈福精誠懇到未有感徹輔今敢自祈請若至日中不雨乞以身塞無狀於是積薪柴聚茭茅以自環搆火其傍將自焚焉未及日中時而天雲晦合須臾澍雨一郡沾潤世以此稱其至誠劉翊字子相潁川潁陰人也家世豐產常能周施而不有其惠曾行於汝南界中有陳國張季禮遠赴師喪遇寒冰車毀頓滯道路翊見而謂曰君慎終赴義行宜速達即下車與之不告姓名自策馬而去季禮意其子相也後故到潁陰還所假乘翊閉門辭行不與相見常守志臥疾不屈聘命河南种拂臨郡引為功曹翊以拂名公之子乃為起焉拂以其擇時而仕甚敬任之陽翟黃綱恃程夫人權力求占山澤以自營植拂召翊問曰程氏貴盛在帝左右不聽則恐見怨與之則奪民利為之柰何翊曰名山大澤不以封蓋為民也明府聽之則被佞倖之名矣若以此獲禍貴子申甫則自以不孤也拂從翊言遂不與之乃舉翊為孝廉不就後黃巾賊起郡縣飢荒翊救給乏絕資其食者數百中鄉族貧者死亡則為具殯葬嫠獨則助營妻娶獻帝遷都西京翊舉上計掾是時寇賊興起道路隔絕使驛稀有達者翊夜行晝伏乃到長安詔書嘉其忠勤特拜議郎遷陳留太守翊散所握珍玩唯餘車馬自載東歸出關數百里見, WYG: 史}
