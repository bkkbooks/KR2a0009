  - {type: variant, offset: 2743, length: 0, content: '', WYG: 馬日磾議郎張馴韓說太史令單颺等堂谿姓也先賢行狀曰典字子度潁川人為西鄂長奏求正定六經文字靈帝許之邕乃自書冊於碑使工鐫刻立於太學門外洛陽記曰太學在洛城南開陽門外講堂長十丈廣二丈堂前石經四部本碑凡四十六枚西行尚書周易公羊傳十六碑存十二碑毁南行禮記十五碑悉崩壞東行論語三碑二碑毁禮記碑上有諫議大夫馬日磾議郎蔡邕名劉攽曰注論語二碑毁案文當是一碑毁若二碑毁者當云皆毁而已於是後儒晩學咸取正焉及碑始立其觀視及摹寫者車乘日千餘兩塡塞街陌初朝議以州郡相黨人情比周乃制婚姻之家及兩州人士不得對相監臨至是復有三互法三互謂婚姻之家及兩州人不得交互為官也謝承書曰史弼遷山陽太守其妻鉅野薛氏女以三互自上轉拜平原相是也禁忌轉密選用艱難幽冀二州久缺不補邕上疏曰伏見幽冀舊壤鎧馬所出鎧甲也周禮考工記曰燕無函函亦甲也言幽燕之地家家皆能為函故無函匠也左傳曰冀之北士馬之所生比年兵飢漸至空耗今者百姓虛縣萬里蕭條縣音𤣥闕職經時吏人延屬而三府選舉踰月不定臣經怪其事而論者云避三互十一州有禁當取二州而已又二州之士或復限以歲月狐疑遲淹以失事會愚以為三互之禁禁之薄者今但申以威靈明其憲令在任之人豈不戒懼而當坐設三互自生留閡邪昔韓安國起自徒中朱買臣出於幽賤竝以才宜還守本邦前書安國字長孺梁人坐法抵罪居無幾天子使使者拜安國為梁内史起徒中為二千石買臣字翁子吳人家貧負薪賣以給食歌謳道中後拜㑹稽太守又張敞亡命擢授劇州豈復顧循三互繼以末制乎前書敞字子髙河東人也為京兆尹坐與楊惲厚善制免為庶人從闕下亡命}
