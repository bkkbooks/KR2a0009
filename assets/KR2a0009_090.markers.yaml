  - {type: variant, offset: 49, length: 197, content: 道而取諸偏至之端者也然則有所不為亦將有所必為者矣既云進取亦將有所不取者矣如此性尚分流為否異適矣中世偏行一介之夫能成名立方者蓋亦衆也或志剛金石而剋扞於強禦或意嚴冬霜而甘心於小諒亦有結朋協好幽明共心蹈義陵險死生等節雖事非通圓良其風軌有足懷者而情迹殊雜難為條品片辭特趣不足區別措之則事或有遺載之則貫序無統以其名體雖殊而操行俱絕故總為獨行篇焉庶備諸闕文紀志漏脫云爾譙玄字君黃巴郡閬中人也少好學能說易春秋, WYG: 怒謂融羞薄詔除欲}
