  - {type: variant, offset: 2119, length: 0, content: '', WYG: 己羣車方奔乎險路安能與之齊軌思危難而自豫故在賤而不恥方将騁馳乎典籍之崇塗休息乎仁義之淵藪前書司馬相如曰游于六藝之園馳騖乎仁義之塗班固曰肴覈仁義之林藪也槃旋乎周孔之庭宇揖儒墨而與為友舒之足以光四表收之則莫能知其所有若乃丁千載之運應神靈之符闓閶闔乘天衢擁華蓋而奉皇樞古今注曰華盖黄帝所作也與蚩尤戰於涿鹿之野常有五色雲氣金枝玉葉因而作華蓋納𤣥策於聖德宣太平於中區計合謀從己之圖也勲績不立予之辜也龜鳳山翳霧露不除踴躍草萊秪見其愚不我知者將謂之迂龜鳯喩聖人霧露喩昏闇也迂曲也修業思眞棄此焉如靜以俟命不斁不渝斁厭也渝變也百歲之後歸乎其居詩晉風也毛萇注云居墳墓也幸其獲稱天所誘也謂小人妄得稱舉者天之所誘後必遇害也罕漫而已非己咎也罕漫猶無所知聞也非君子之咎也昔伯翳綜聲於鳥語葛盧辯音於鳴牛董父受氏於豢龍奚仲供徳於衡輈伯翳即秦之先伯益也能與鳥語見史記葛盧東夷介國之君也介葛盧聘於魯聞牛鳴曰是生三犧皆用之矣問之如其言晉太史蔡墨曰昔有董父實甚好龍能求嗜欲以飲食之以服事帝舜帝賜姓曰董氏曰豢龍竝見左傳奚仲薛之祖也世本曰奚仲作車衡軛也輈轅也倕氏興政於巧工造父登御於驊騮非子享土於善圉狼瞫取右於禽囚倕舜之巧人也見尚書造父者秦之先也為周穆王御驊騮騄耳之乘非子亦秦之先善養馬周孝王使主馬於汧渭之間馬大蕃息}
