  - {type: variant, offset: 3067, length: 0, content: '', WYG: 廷尉郭禧純厚老成光祿大夫橋𤣥聰達方直故太尉劉寵忠實守正並宜為謀主數見訪問夫宰相大臣君之四體謂股肱也委任責成優劣已分不宜聽納小吏雕琢大臣也雕琢猶鐫削以成其罪也又尚方工技之作鴻都篇賦之文可且消息以示惟憂詩云畏天之怒不敢戲豫天戒誠不可戲也宰府孝廉士之高選近者以辟召不愼切責三公而今並以小文超取選舉開請託之門違明王之典衆心不厭莫之敢言厭伏也音一葉反臣願陛下忍而絶之思惟萬機以荅天望聖朝既自約厲左右近臣亦宜從化人自抑損以塞咎戒則天道虧滿鬼神福謙矣臣以愚戇感激忘身敢觸忌諱手書具對夫君臣不密上有漏言之戒下有失身之禍易曰君不密則失臣臣不密則失身願寢臣表無使盡忠之吏受怨姦仇章奏帝覽而歎息因起更衣曹節於後竊視之悉宣語左右事遂漏露其為邕所裁黜者皆側目思報初邕與司徒劉郃素不相平叔父衞尉質質字子文著漢職儀又與将作大匠楊球有隙球即中常侍程璜女夫也璜遂使人飛章言邕質數以私事請託於郃郃不聽邕含隱切志欲相中中傷也於是詔下尚書召邕詰狀邕上書自陳曰臣被召}
