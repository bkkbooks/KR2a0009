  - {type: variant, offset: 3209, length: 445, content: 張劭為友劭字元伯二人並告歸鄉里式謂元伯曰後二年當還將過拜尊親見孺子焉乃共剋期日後期方至元伯具以白母請設饌以候之母曰二年之別千里結言爾何相信之審邪對曰巨卿信士必不乖違母曰若然當為爾醞酒至其日巨卿果到升堂拜飲盡歡而別式仕為郡功曹後元伯寢疾篤同郡郅君章殷子徵晨夜省視之元伯臨盡歎曰恨不見吾死友子徵曰吾與君章盡心於子是非死友復欲誰求元伯曰若二子者吾生友耳山陽范巨卿所謂死友也尋而卒式忽夢見元伯玄冕垂纓屣履而呼曰巨卿吾以某日死當以爾時葬永歸黃泉子未我忘豈能相及式怳然覺寤悲歎泣下具告太守請往奔喪太守雖心不信而重違其情許之式便服朋友之服投其葬日馳往赴之式未及到而喪已發引既至壙將窆而柩不肯進其母撫之曰元伯豈有望邪遂停柩移時乃見有素車白馬號哭而來其母望之曰是必范巨卿也巨卿既至叩喪言曰行矣元伯死生路異永從此辭會葬者千人咸為揮涕式因執紼而引柩於是乃前式遂留止冢次為脩墳樹然後乃去後到京師受業太學時諸生長沙陳平子亦同在學與式未相見而平子被病將亡謂其妻曰吾聞山陽范巨卿烈士也可以託死吾歿後但以屍埋巨卿戶前乃裂素, WYG: 李竒}
