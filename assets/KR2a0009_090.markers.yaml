  - {type: variant, offset: 9052, length: 2, content: 遺劒, WYG: 相保見淮南子也屬其慶者夫豈無懷慶謂恩遇也懷思也荷恩遇者豈不思之乎君子斷刑尚或為之不舉左傳鄭伯見虢叔曰夫司寇行戮君為之不舉杜注云不舉盛饌也況國憲倉卒慮不先圖矜情變容而罰同邪黨執政乃追怨子長謗書流後執政謂王允也放此為戮放音甫往反未或聞之典刑贊曰季長戚氏才通情侈苑囿典文流恱音伎侈謂紗帳女樂之類音伎謂鼓琴吹笛之屬也邕實慕靜心精辭綺斥言金商南徂北徙謂對事}
