  - {type: variant, offset: 4937, length: 9, content: 美姿貌喜著越布單衣, WYG: 文書不覺郃被詔書考胡母班等辭與陟為黨質及邕頻詣郃問班所及郃不應遂懷怨恨欲必中傷郃制曰下司隸校尉正處上邕集作綦母班也臣征營怖悸肝膽塗地不知死命所在竊自尋案實屬宛竒不及陟班凡休假小吏非結恨之本與陟姻家豈敢申助私黨如臣父子欲相傷陷當明言臺閣具陳恨狀所緣内無寸事而謗書外發宜以臣對與郃參驗臣得以學問特蒙襃異執事祕館操管御前姓名貎狀微簡聖心今年七月召詣金商門問以災異齎詔申旨誘臣使言齎猶持也與賫通臣實愚戇唯識忠藎出命忘軀不顧後害遂譏刺公卿内及寵臣實欲以上對聖問救消災異䂓為陛下建康寧之計陛下不念忠臣直言宜加掩蔽誹謗卒至便用疑怪盡心之吏豈得容哉詔書毎下百官各上封事欲以改政思譴除凶致吉而言者不蒙延納之福旋被陷破之禍今皆杜口結舌以臣為戒誰敢為陛下盡忠孝乎臣季父質連見拔擢位在上列臣被蒙恩渥數見訪逮言事者因此欲陷臣父子破臣門户非復發糾姦伏補益國家者也臣年四十有六孤特一身得託名忠臣死有餘榮恐陛下於此不復聞至言矣臣之愚冗職當咎患但前者所對質不及聞前在金商門對事之時質為下邳相故不聞也而衰老白首横見引逮隨臣摧没幷入阬埳誠寃誠痛臣一入牢獄當為楚毒所迫趣以飲章辭情何緣復聞趣音促飲猶隱郤告人姓名無可對問章者今之表也邕集曰}
