  - {type: variant, offset: 555, length: 0, content: '', WYG: 将軍西第頌以此頗為正直所羞年八十八延熹九年卒于家遺令薄葬族孫日磾獻帝時位至太傅三輔決錄注云日磾字翁叔論曰馬融辭命鄧氏逡巡隴漢之間將有意於居貞乎隴漢之間謂客於漢陽時易屯卦初九曰磐桓利居貞既而羞曲士之節惜不貲之軀荘子曰曲士不可語於道者束於教也終以奢樂恣性黨附成譏固知識能匡欲者鮮矣識性也匡正也}
