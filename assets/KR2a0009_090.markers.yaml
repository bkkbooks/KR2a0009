  - {type: variant, offset: 5362, length: 491, content: 太學師事鄮令東海申君申君卒送喪到東海道當經其家父母以封當還豫為娶妻封暫過拜親不宿而去還京師卒業時同學石敬平溫病卒封養視殯斂以所齎糧巿小棺送喪到家家更斂見敬平行時書物皆在棺中乃大異之封後遇賊財物悉被略奪唯餘縑七匹賊不知處封乃追以與之曰知諸君乏故送相遺賊驚曰此賢人也盡還其器物後舉孝廉光祿主事遭伯父喪去官詔書求賢良方正直言之士有至行能消災伏異者公卿郡守各舉一人郡及大司農俱舉封公車徵陛見對策第一擢拜議郎遷西華令時汝潁有蝗災獨不入西華界時督郵行縣蝗忽大至督郵其日即去蝗亦頓除一境奇之其年大旱封禱請無獲乃積薪坐其上以自焚火起而大雨暴至於是遠近歎服遷中山相時諸縣囚四百餘人辭狀已定當行刑封哀之皆遣歸家與剋期日皆無違者詔書策美焉永元十二年徵拜太常卒官李充字大遜陳留人也家貧兄弟六人同食遞衣妻竊謂充曰今貧居如此難以久安妾有私財願思分異充偽酬之曰如欲別居當醞酒具會請呼鄉里內外共議其事婦從充置酒讌客充於坐中前跪白母曰此婦無狀而教充離閒母兄罪合遣斥便呵叱其婦逐令出門婦銜涕而去坐中驚肅因遂罷散充後遭母喪行服墓次人有盜其墓樹者充手自殺之服闋立精舍講授太守魯平請署功曹不就平怒乃援充以捐溝中因讁署縣都亭長, WYG: 府邕}
