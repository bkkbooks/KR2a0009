  - {type: variant, offset: 5991, length: 996, content: 之士頗有不合騭欲絕其說以肉啖之充抵肉於地曰說士猶甘於肉遂出徑去騭甚望之同坐汝南張孟舉往讓充曰一日聞足下與鄧將軍說士未究激刺面折不由中和出言之責非所以光祚子孫者也充曰大丈夫居世貴行其意何能遠為子孫計哉由是見非於貴戚遷左中郎將年八十八為國三老安帝常特進見賜以几杖卒於家繆肜字豫公汝南召陵人也少孤兄弟四人皆同財業及各娶妻諸婦遂求分異又數有鬬爭之言肜深懷憤歎乃掩戶自撾曰繆肜汝脩身謹行學聖人之法將以齊整風俗柰何不能正其家乎弟及諸婦聞之悉叩頭謝罪遂更為敦睦之行仕縣為主簿時縣令被章見考吏皆畏懼自誣而肜獨證據其事掠考苦毒至乃體生蟲蛆因復傳換五獄踰涉四年令卒以自免太守隴西梁湛召為決曹史安帝初湛病卒官肜送喪還隴西始葬會西羌反叛湛妻子悉避亂它郡肜獨留不去為起墳冢乃潛穿井旁以為窟室晝則隱竄夜則負土及賊平而墳已立其妻子意肜已死還見大驚關西咸稱傳之共給車馬衣資肜不受而歸鄉里辟公府舉尤異遷中牟令縣近京師多權豪肜到誅諸姦吏及託名貴戚賓客者百有餘人威名遂行卒於官陳重字景公豫章宜春人也少與同郡雷義為友俱學魯詩顏氏春秋太守張雲舉重孝廉重以讓義前後十餘通記雲不聽義明年舉孝廉重與俱在郎署有同署郎負息錢數十萬責主日至詭求無已重乃密以錢代還郎後覺知而厚辭謝之重曰非我之為將有同姓名者終不言惠又同舍郎有告歸寧者誤持隣舍郎絝以去主疑重所取重不自申說而巿絝以償之後寧喪者歸以絝還主其事乃顯重後與義俱拜尚書郎義代同時人受罪以此黜退重見義去亦以病免後舉茂才除細陽令政有異化舉尤異當遷為會稽太守遭姊憂去官後為司徒所辟拜侍御史卒雷義字仲公豫章鄱陽人也初為郡功曹皆嘗擢舉善人不伐其功義嘗濟人死罪罪者後以金二斤謝之義不受金主伺義不在默投金於承塵上後葺理屋宇乃得之金主已死無所復還義乃以付縣曹後舉孝廉拜尚書侍郎有同時郎坐事當居刑作義默自表取其罪以此論司寇同臺郎覺之委位自上乞贖義罪順帝詔皆除刑義歸舉茂才讓於陳重刺史不聽義遂陽狂被髮走不應命鄉里為之語曰膠漆自謂堅不如雷與陳三府同時俱辟二人義遂為守灌謁者使持節督郡國行風俗太守令長坐者凡七十人旋拜侍御史除南頓令卒官子授官至蒼梧太守范冉字史雲陳留外黃人也少為縣小吏年十八奉檄迎督郵冉恥之乃遁去到南陽受業於樊英又遊三輔就馬融通經歷年乃還冉好違時絕俗為激詭之行常慕梁伯鸞閔仲叔之為人與漢中李固河內王奐親善而鄙賈偉節郭林宗焉奐後為考城令境接外黃屢遣書請冉冉不至及奐遷漢陽太守將行冉乃與弟協步齎麥酒於道側設壇, WYG: 逺難達且遯逃山東}
