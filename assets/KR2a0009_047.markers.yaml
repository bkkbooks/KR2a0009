  - {type: variant, offset: 3711, length: 0, content: '', WYG: 受易經起大義帝深然之遂罷左右將軍復以列侯􅈬第加位特進東觀記曰上以天下既定思念欲完功臣爵土不令以吏職為過故皆以列侯就第也復為人剛毅方直多大節既還私第闔門養威重朱祐等薦復宜為宰相帝方以吏事責三公故功臣並不用是時列侯唯髙密固始膠東三侯與公卿參議國家大事}
