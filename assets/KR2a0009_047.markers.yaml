  - {type: variant, offset: 104, length: 1, content: 皇, WYG: 征西大将軍㑹鄧禹率車騎将軍鄧𢎞等引歸與異相遇禹𢎞要異共攻赤眉異曰異與賊相拒且數十日雖屢獲雄将餘衆尚多可稍以恩信傾誘難卒用兵破也上今使諸将屯黽池要其東而異擊其西一舉取之此萬成計也禹𢎞不従𢎞遂大戰移日赤眉陽敗棄輜重走車皆載土以豆覆其上兵士饑爭取之赤眉引還擊𢎞𢎞軍潰亂異與禹合兵救之赤眉小郤異以士卒饑倦可且休禹不聼復戰大為所敗死傷者三千餘人禹得脱歸宜陽異棄馬歩走上回谿阪回谿今俗所謂回阬在今洛州永寕縣東北其谿長四里闊二丈深二丈五尺也與麾下數人歸營復堅壁收其散卒招集諸營保數萬人與賊約期㑹戰使壯士變服與赤眉同伏於道側旦日赤眉使萬人攻異前部異裁出兵以救之裁小出兵所以示弱也賊見埶弱遂悉衆攻異異乃縦兵大戰日昃賊氣衰伏兵卒起衣服相亂赤眉不復識别衆遂驚潰追擊大破於崤底降男女八萬人餘衆尚十餘萬東走宜陽降璽書勞異曰赤眉破平士吏勞苦始雖垂翅回谿終能奮翼黽池以鳥為喻可謂失之東隅收之桑榆淮南子曰至於衡陽是謂隅中又前書谷子雲曰}
