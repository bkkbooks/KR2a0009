  - {type: variant, offset: 108, length: 1, content: 七, krp: 日法當參天今已過期尚在桑榆間桑榆謂晚也方論功賞以答大勲時赤眉雖降衆㓂猶盛延岑據藍田王歆據下邽秦武公伐邽戎致之也隴西有上邽故此有下也芳丹據新豐續漢書芳作茅蒋震據霸陵霸陵文帝陵因以為縣名故秦芒陽縣張邯據長安公孫守據長陵楊周據谷口谷口縣名屬左馮翊故城在今醴泉縣東北呂鮪據陳倉角閎據汧駱蓋延據盩厔任良據鄠汝章據槐里各稱將軍擁兵多者萬餘少者數千人轉相攻擊異且戰且行屯軍上林苑中延岑既破赤眉自稱武安王拜置牧守欲據闗中引張邯任良共攻異異擊破之斬首千餘級諸營保守附岑者皆來降歸異岑走攻析析縣名椘之白羽邑也即今鄧州内郷縣異遣復漢将軍鄧曄輔漢将軍于匡要擊岑大破之降其將蘇臣等八千餘人岑遂自武闗走南陽時百姓饑餓人相食黄金一斤易豆五升道路斷隔委輸不至軍士悉以果實為糧詔拜南陽趙匡為右扶風將兵助異并送縑穀軍中皆稱萬嵗異兵食漸盛乃稍誅擊豪傑不従令者襃賞降附有功勞者悉遣其渠帥詣京師散其衆歸本業威行闗中唯呂鮪張邯蔣震遣使降蜀其餘悉平眀}
  - {type: variant, offset: 110, length: 8, content: 而郭后廢彊常慼慼, WYG: 公孫述遣將程焉將數萬人就呂鮪出屯陳倉異與趙匡迎擊大破之焉退走漢川異追戰於箕谷復破之還擊破呂鮪營保降者甚衆其後蜀復數遣將間出異輙摧挫之賈逵注國語曰折其鋒曰挫懐來百姓申理枉結出入三嵗上林成都成都言歸附之多也史記曰一年成邑三年成都異自以久在外}
