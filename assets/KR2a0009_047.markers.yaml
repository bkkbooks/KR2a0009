  - {type: variant, offset: 4280, length: 1654, content: 大夫奉使親聞動靜嘉之何已歲月騖過山陵浸遠孤心悽愴如何如何閒饗衞士於南宮因閱視舊時衣物聞於師曰其物存其人亡不言哀而哀自至信矣惟王孝友之德亦豈不然今送光烈皇后假紒帛巾各一及衣一篋可時奉瞻以慰凱風寒泉之思又欲令後生子孫得見先后衣服之製今魯國孔氏尚有仲尼車輿冠履明德盛者光靈遠也其光武皇帝器服中元二年已賦諸國故不復送并遺宛馬一匹血從前髆上小孔中出常聞武帝歌天馬霑赤汗今親見其然也頃反虜尚屯將帥在外憂念遑遑未有閒寧願王寶精神加供養苦言至戒望之如渴六年冬蒼上疏求朝明年正月帝許之特賜裝錢千五百萬其餘諸王各千萬帝以蒼冒涉寒露遣謁者賜貂裘及太官食物珍果使大鴻臚竇固持節郊迎帝乃親自循行邸第豫設帷牀其錢帛器物無不充備下詔曰禮云伯父歸寧乃國詩云叔父建爾元子敬之至也昔蕭相國加以不名優忠賢也況兼親尊者乎其沛濟南東平中山四王讚皆勿名蒼既至升殿乃拜天子親荅之其後諸王入宮輒以輦迎至省閤乃下蒼以受恩過禮情不自寧上疏辭曰臣聞貴有常尊賤有等威卑高列序上下以理陛下至德廣施慈愛骨肉既賜奉朝請咫尺天儀而親屈至尊降禮下臣每賜讌見輒興席改容中宮親拜事過典故臣惶怖戰慄誠不自安每會見踧踖無所措置此非所以章示羣下安臣子也帝省奏歎息愈襃貴焉舊典諸王女皆封鄉主乃獨封蒼五女為縣公主三月大鴻臚奏遣諸王歸國帝特留蒼賜以祕書列僊圖道術祕方至八月飲酎畢有司復奏遣蒼乃許之手詔賜蒼曰骨肉天性誠不以遠近為親疎然數見顏色情重昔時念王久勞思得還休欲署大鴻臚奏不忍下筆顧授小黃門中心戀戀惻然不能言於是車駕祖送流涕而訣復賜乘輿服御珍輿馬錢布以億萬計蒼還國疾病帝馳遣名醫小黃門侍疾使者冠蓋不絕於道又置驛馬千里傳問起居明年正月薨詔告中傅封上蒼自建武以來章奏及所作書記賦頌七言別字歌詩並集覽焉遣大鴻臚持節五官中郎將副監喪及將作使者凡六人令四姓小侯諸國王主悉會詣東平奔喪賜錢前後一億布九萬匹及葬策曰惟建初八年三月己卯皇帝曰咨王丕顯勤勞王室親受策命昭于前世出作蕃輔克慎明德率禮不越傅聞在下昊天不弔不報上仁俾屏余一人夙夜焭焭靡有所終今詔有司加賜鸞輅乘馬龍旂九旒虎賁百人奉送王行匪我憲王其孰離之魂而有靈保茲寵榮嗚呼哀哉立四十五年子懷王忠嗣明年帝乃分東平國封忠弟尚為任城王餘五人為列侯忠立十一年薨子孝王敞嗣元和三年行東巡守幸東平宮帝追感念蒼謂其諸子曰思其人至其鄉其處在其人亡因泣下沾襟遂幸蒼陵為陳虎賁鸞輅龍旂以章顯之祠以太牢親拜祠坐哭泣盡哀賜御劒于陵前初蒼歸國驃騎時吏丁牧周栩以蒼敬賢下士不忍去之遂為王家大夫數十年事祖及孫帝聞皆引見於前既愍其淹滯且欲揚蒼德美即皆擢拜議郎牧至齊相栩上蔡令永元十年封蒼孫梁為矜陽亭侯敞弟六人為列侯敞喪母至孝國相陳珍上其行狀永寧元年鄧太后增邑五千戶又封蒼孫二人為亭侯敞立四十八年薨子頃王端嗣立四十七年薨子凱嗣立四十一年魏受禪以為崇德侯論曰孔子稱貧而無諂富而無驕未若貧而樂富而好禮者也若東平憲王可謂好禮者也若其辭至戚去母后豈欲苟立名行而忘親遺義哉蓋位疑則𨻶生累近則喪大斯蓋明哲之所為歎息嗚呼遠𨻶以全忠釋累以成孝夫豈憲王之志哉東海恭王遜而知廢為吳太伯不亦可乎任城孝王尚元和元年封食任城亢父樊三縣立十八年薨子貞王安嗣永元十四年封母弟福為桃鄉侯永初四年封福弟亢為當塗鄉侯安性輕易貪吝數微服出入游觀國中取官屬車馬刀劒下至衞士米肉皆不與直元初六年國相行弘奏請廢之安帝不忍以一歲租五分之一贖罪安立十九年薨子節王崇嗣順帝時羌虜數反崇輒上錢帛佐邊費及帝崩復上錢三百萬助山陵用度朝廷嘉而不受立三十一年薨無子國絕延熹四年桓帝立河閒孝王子恭為參戶亭侯博為任城王以奉其祀博有孝行喪母服制如禮增封三千戶立十三年薨無子國絕熹平四年靈帝復立河閒貞王遜建子新昌侯子佗為任城王奉孝王後立四十六年魏受禪以為崇德侯阜陵質王延建武十五年封淮陽公十七年進爵為王二十八年就國三十年以汝南之長平西華新陽扶樂四縣益淮陽國延性驕奢而遇下嚴烈永平中有上書告延與姬兄謝弇及姊館陶主婿駙馬都尉韓光招姦猾作圖讖祠祭祝詛事下案驗光弇被殺辭所連及死徙者甚衆有司奏請誅延顯宗以延罪薄於楚王英故特加恩徙為阜陵王食二縣延既徙封數懷怨望, WYG: 稍遷}
