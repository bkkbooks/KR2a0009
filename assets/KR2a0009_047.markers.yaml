  - {type: variant, offset: 1493, length: 1560, content: 十七年進爵為王二十八年就國母許氏無寵故英國最貧小三十年以臨淮之取慮須昌二縣益楚國自顯宗為太子時英常獨歸附太子太子特親愛之及即位數受賞賜永平元年特封英舅子許昌為龍舒侯英少時好游俠交通賓客晚節更喜黃老學為浮屠齋戒祭祀八年詔令天下死罪皆入縑贖英遣郎中令奉黃縑白紈三十匹詣國相曰託在蕃輔過惡累積歡喜大恩奉送縑帛以贖愆罪國相以聞詔報曰楚王誦黃老之微言尚浮屠之仁祠絜齋三月與神為誓何嫌何疑當有悔吝其還贖以助伊蒲塞桑門之盛饌因以班示諸國中傅英後遂大交通方士作金龜玉鶴刻文字以為符瑞十三年男子燕廣告英與漁陽王平顏忠等造作圖書有逆謀事下案驗有司奏英招聚姦猾造作圖讖相官秩置諸侯王公將軍二千石大逆不道請誅之帝以親親不忍乃廢英徙丹陽涇縣賜湯沐邑五百戶遣大鴻臚持節護送使伎人奴婢妓士工技鼓吹悉從得乘輜軿持兵弩行道射獵極意自娛男女為侯主者食邑如故楚太后勿上璽綬留住楚宮明年英至丹陽自殺立三十三年國除詔遣光祿大夫持節弔祠贈賵如法加賜列侯印綬以諸侯禮葬於涇遣中黃門占護其妻子悉出楚官屬無辭語者制詔許太后曰國家始聞楚事幸其不然既知審實懷用悼灼庶欲宥全王身令保卒天年而王不念顧太后竟不自免此天命也無可柰何太后其保養幼弱勉強飲食諸許願王富貴人情也已詔有司出其有謀者令安田宅於是封燕廣為折姦侯楚獄遂至累年其辭語相連自京師親戚諸侯州郡豪桀及考案吏阿附相陷坐死徙者以千數十五年帝幸彭城見許太后及英妻子於內殿悲泣感動左右建初二年肅宗封英子种楚侯种五弟皆為列侯並不得置相臣吏人元和三年許太后薨復遣光祿大夫持節弔祠因留護喪事賻錢五百萬又遣謁者備王官屬迎英喪改葬彭城加王赤綬羽蓋華藻如嗣王儀追爵謚曰楚厲侯章和元年帝幸彭城見英夫人及六子厚加贈賜种後徙封六侯卒子度嗣度卒子拘嗣傳國于後濟南安王康建武十五年封濟南公十七年進爵為王二十八年就國三十年以平原之祝阿安德朝陽平昌隰陰重丘六縣益濟南國中元二年封康子德為東武城侯康在國不循法度交通賓客其後人上書告康招來州郡姦猾漁陽顏忠劉子產等又多遺其繒帛案圖書謀議不軌事下考有司舉奏之顯宗以親親故不忍窮竟其事但削祝阿隰陰東朝陽安德西平昌五縣建初八年肅宗復還所削地康遂多殖財貨大修宮室奴婢至千四百人廄馬千二百匹私田八百頃奢侈恣欲游觀無節永元初國傅何敞上疏諫康曰蓋聞諸侯之義制節謹度然後能保其社稷和其民人大王以骨肉之親享食茅土當施張政令明其典法出入進止宜有期度輿馬臺隸應為科品而今奴婢廄馬皆有千餘增無用之口以自蠶食宮婢閉隔失其天性惑亂和氣又多起內第觸犯防禁費以巨萬而功猶未半夫文繁者質荒木勝者人亡皆非所以奉禮承上傳福無窮者也故楚作章華以凶吳興姑蘇而滅景公千駟民無稱焉今數游諸第晨夜無節又非所以遠防未然臨深履薄之法也願大王修恭儉遵古制省奴婢之口減乘馬之數斥私田之富節游觀之宴以禮起居則敞乃敢安心自保惟大王深慮愚言康素敬重敞雖無所嫌啎然終不能改立五十九年薨子簡王錯嗣錯為太子時愛康鼓吹妓女宋閏使醫張尊招之不得錯怒自以劒刺殺尊國相舉奏有詔勿案永元十一年封錯弟七人為列侯錯立六年薨子孝王香嗣永初二年封香弟四人為列侯香篤行好經書初叔父篤有罪不得封西平昌侯昱坐法失侯香乃上書分爵土封篤子丸昱子嵩皆為列侯香立二十年薨無子國絕永建元年順帝立錯子阜陽侯顯為嗣是為釐王立三年薨子悼王廣嗣永建五年封廣弟文為樂城亭侯廣立二十五年永興元年薨無子國除東平憲王蒼建武十五年封東平公十七年進爵為王蒼少好經書雅有智思為人美須要帶八圍顯宗甚愛重之及即位拜為驃騎將軍置長史掾史員四十人位在三公上永平元年封蒼子二人為縣侯二年以東郡之壽張須昌山陽之南平陽橐湖陵五縣益東平國是時中興三十餘年四方無虞蒼以天下化平宜修禮樂乃與公卿共議定南北郊冠冕車服制度及光武廟登歌八佾舞數語在禮樂輿服志帝每巡狩蒼常留鎮侍衞皇太后四年春車駕近出觀覽城第尋聞當遂校獵河內蒼即上書諫曰臣聞時令盛春農事不聚衆興功, WYG: 羊}
