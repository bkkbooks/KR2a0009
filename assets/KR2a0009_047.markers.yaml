  - {type: variant, offset: 3709, length: 0, content: '', WYG: 拜為執金吾封冠軍侯先度河攻朱鮪於洛陽與白虎公陳僑戰連破降之建武二年益封穰朝陽二縣更始郾王尹}
  - {type: variant, offset: 3709, length: 0, content: '', krp: 拜為執金吾封冠軍侯先度河攻朱鮪於洛陽與白虎公陳僑戰連破降之建武二年益封穰朝陽二縣更始郾王尹}
  - {type: variant, offset: 3710, length: 0, content: '', WYG: 及諸大將在南方未降者尚多帝召諸將議兵事未有言沈吟久之乃以檄叩地曰郾最彊宛為次誰當擊之復率然對曰臣請擊郾帝笑曰執金吾擊郾吾復何憂大司馬當撃宛遂遣復與騎都尉陰識驍騎將軍劉植南度五社津擊郾連破之月餘尹尊降盡定其地引東擊更始淮陽太守暴氾氾降屬縣悉定其秋南擊召陵新息平定之新息縣名屬汝南郡故城在今豫州新息縣西南也明年春遷左將軍别擊赤眉於新城澠池間連破之新城今伊闕縣與帝㑹宜陽降赤眉復従征伐未嘗喪敗數與諸將潰圍解急身被十二創帝以復敢深入希令逺征而壯其勇節常自従之故復少方面之勲東觀記曰吴漢擊蜀未破上書請復自助上不遣諸將每論功自伐復未嘗有言帝輙曰賈君之功我自知之十三年定封膠東侯食郁秩壯武下密卽墨梃胡觀陽凡六縣六縣皆屬膠東國壯武故城在今萊州即墨縣西下密在今青州北海縣東北即墨在今萊州膠水縣東南梃胡故城在今萊州昌陽縣西北觀陽在昌陽縣東梃一音廷復知帝欲偃干戈脩文徳不欲功臣擁衆京師乃與髙密侯鄧禹並剽甲兵敦儒學廣雅曰剽削也謂削除甲兵東觀記曰復闔門養威}
