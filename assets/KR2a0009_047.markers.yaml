  - {type: variant, offset: 3890, length: 350, content: 原陵顯節陵起縣邑蒼聞之遽上疏諫曰伏聞當為二陵起立郭邑臣前頗謂道路之言疑不審實近令從官古霸問涅陽主疾使還乃知詔書已下竊見光武皇帝躬履儉約之行深覩始終之分勤勤懇懇以葬制為言故營建陵地具稱古典詔曰無為山陵陂池裁令流水而已孝明皇帝大孝無違奉承貫行至於自所營創尤為儉省謙德之美於斯為盛臣愚以園邑之興始自彊秦古者丘隴且不欲其著明豈況築郭邑建都郛哉上違先帝聖心下造無益之功虛費國用動搖百姓非所以致和氣祈豐年也又以吉凶俗數言之亦不欲無故繕修丘墓有所興起考之古法則不合稽之時宜則違人求之吉凶復未見其福陛下履有虞之至性追祖禰之深思然懼左右過議以累聖心臣蒼誠傷二帝純德之美不暢於無窮也惟蒙哀覽帝從而止自是朝廷每有疑政輒驛使諮問蒼悉心以對皆見納用三年帝饗衞士於南宮因從皇太后周行掖庭池閣乃閱陰太后舊時器服愴然動容乃命留五時衣, WYG: 即墨侯}
