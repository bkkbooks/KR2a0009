  - {type: variant, offset: 95, length: 4, content: 立母郭氏, WYG: 春定封異陽夏侯夏音賈引撃陽翟賊劉攽曰案文少一軍字他傳中言引軍者甚多嚴終趙根破之詔異歸家上冢使太中大夫齎牛酒續漢志曰太中大夫秩千石掌顧問論議屬光禄令二百里内太守都尉已下及宗族㑹焉時赤眉延岑暴亂三輔郡縣大姓各擁兵衆大司徒鄧禹不能定乃遣異代禹討之車駕送至河南賜以乗輿七尺具劒具謂以寳玉装飾之東觀記作玉具劒勑異曰三輔遭王莽更始之亂重以赤眉延岑之酷元元塗炭無所依訴今之征伐非必畧地屠城要在平定安集之耳諸将非不徤鬬然好虜掠卿本能御吏士念自脩勑無}
