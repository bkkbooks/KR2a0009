  - {type: variant, offset: 3687, length: 1, content: 善, WYG: 愍之其條二十八将無嗣絶世若犯罪奪國其子孫應當綂後者分别署狀上將及景風章叙舊徳顯兹遺功焉春秋考異郵曰夏至四十五日景風至宋均注曰景風至則封有功也於是紹封普子晨為平郷侯眀年二十八將絶國者皆紹封焉岑彭傳岑彭字君然南陽棘陽人也棘音紀力反王莽時守本縣長漢兵起攻拔棘陽彭將家屬奔前隊大夫甄阜阜怒彭不能固守拘彭母妻令効功自補彭將賔客戰鬭甚力及甄阜死彭被創亡歸宛與前隊貳嚴説共城守前隊大夫貳甄阜之副也姓嚴名説東觀記云貳師嚴尤共城守計嚴尤為大司馬又非貳師與此不同漢兵攻之數月城中糧盡人相食彭乃與説舉城降諸將欲誅之大司徒伯升曰彭郡之大吏執心堅守是其節也今舉大事當表義士不如封}
