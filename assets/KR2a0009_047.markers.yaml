  - {type: variant, offset: 3696, length: 0, content: '', krp: 軍中募攻浮橋先登者上賞於是偏將軍魯竒應募而前時天風狂急彭竒船逆流而上直衝浮橋而欑柱鉤不得去續漢書曰時天東風其攢柱有反把鉤竒船不得去竒等乗埶殊死戰因飛炬焚之風怒火盛橋樓崩燒彭復悉軍順風並進所向無前蜀兵大亂溺死者數千人斬任滿生獲程汎而田戎亡保江州彭上劉隆為南郡太守自率臧宫劉歆長驅入江闗令軍中無得虜掠所過百姓皆奉牛酒迎勞彭見諸耆老為言大漢哀愍巴蜀乆見虜役故興師逺伐以討有罪為人除害讓不受其牛酒百姓皆大喜悦爭開門降詔彭守益州牧所下郡輙行太守事東觀記曰彭若出界即以太守號付後將軍選官屬守州中長史劉攽曰注長史案長史是王國官守令皆長吏也此宜作吏彭到江州以田戎食多難卒拔留馮駿守之自引兵乗利直指墊江攻破平曲墊江縣名屬巴郡今忠州縣也墊音徒協反平曲地闕收其米數十萬石公孫述使其將延岑呂鮪王元及其弟恢悉兵拒廣漢及資中資中縣名屬犍為郡其地在今資州資陽縣又遣將侯丹率二萬餘人拒黄石彭乃多張疑兵使護軍楊翕與臧宮拒延岑等自分兵浮江下還江州泝都江而上都江成都江也襲擊侯丹大破之因晨夜倍道兼行二千餘里徑拔武陽武陽觧見光武紀使精騎馳廣都廣都縣名屬蜀郡故城在今益州成都縣東南去成都數十里埶若風雨所至皆奔散初述聞漢兵在平曲故遣大兵逆之及彭至武陽繞出延岑軍後蜀地震駭述大驚以杖擊地曰是何神也彭所營地名彭亡聞而惡之欲徙㑹日暮蜀刺客詐為亡奴降夜刺殺彭彭首破荆門長驅武陽持軍整齊秋豪無犯豪毛也秋毛喻細也髙祖曰吾入闗秋豪無所取卭穀王任貴聞彭威信數千里遣使迎降前書音義曰任貴越嶲夷殺太守枚根自立為卭穀王㑹彭已薨帝盡以任貴所獻賜彭妻子謚曰壯侯蜀人憐之為立廟武陽嵗時祠焉子遵嗣徙封細陽侯細陽縣名屬汝南郡故城在今潁川汝陰縣西十三年帝思彭功復封遵弟淮為榖陽侯榖陽縣名屬沛郡遵永平中為屯騎}
  - {type: variant, offset: 3697, length: 1, content: 書, WYG: 尉遵卒子伉嗣伉音口葬反伉卒子杞嗣東觀記曰杞作起元初中坐事免元初三年坐事失國建光元年安帝復封杞細陽侯順帝時為光禄勲杞卒子熙嗣尚安帝妹涅陽長公主少為侍中虎賁中郎將朝廷多稱其能遷魏郡太守魏郡秦時置故城在今相州安陽縣東北招聘隱逸與參政事無為而化視事二年輿人歌之曰我有枳棘岑君伐之枳棘多搸梗以喻宼盜充斥也我有蟊賊岑君遏之蟊賊食禾稼蟲名以喻姦吏侵漁也狗吠不驚足下生氂氂長毛也犬無追吠故足下生􅈊含哺鼓腹焉知凶災哺食也鼓撃也我喜我生獨丁斯時丁猶當也美矣岑君於戲休兹於戲歎美之詞見爾雅於音烏戲音許宜反熙卒子福嗣為黄門侍}
  - {type: page-break, offset: 3697, content: '', id: KR2a0009_WYG_047-25a, image: WYG0252/WYG0252-0550c.png}
  - {type: variant, offset: 3697, length: 1, content: 書, krp: 尉遵卒子伉嗣伉音口葬反伉卒子杞嗣東觀記曰杞作起元初中坐事免元初三年坐事失國建光元年安帝復封杞細陽侯順帝時為光禄勲杞卒子熙嗣尚安帝妹涅陽長公主少為侍中虎賁中郎將朝廷多稱其能遷魏郡太守魏郡秦時置故城在今相州安陽縣東北招聘隱逸與參政事無為而化視事二年輿人歌之曰我有枳棘岑君伐之枳棘多搸梗以喻宼盜充斥也我有蟊賊岑君遏之蟊賊食禾稼蟲名以喻姦吏侵漁也狗吠不驚足下生氂氂長毛也犬無追吠故足下生氂含哺鼓腹焉知凶災哺食也鼓撃也我喜我生獨丁斯時丁猶當也美矣岑君於戲休兹於戲歎美之詞見爾雅於音烏戲音許宜反熙卒子福嗣為黄門侍}
  - {type: variant, offset: 3700, length: 1, content: 逵, WYG: 復傳賈復字君文南陽冠軍人也少好學習尚書事舞陰李生李生竒之謂門人曰賈君之容貌志氣如此而勤於學將相之器也王莽末}
  - {type: variant, offset: 3700, length: 1, content: 逵, krp: 復傳賈復字君文南陽冠軍人也少好學習尚書事舞陰李生李生竒之謂門人曰賈君之容貌志氣如此而勤於學將相之器也王莽末}
  - {type: variant, offset: 3702, length: 0, content: '', WYG: 縣掾迎鹽河東㑹遇盗賊等比十餘人皆放散其鹽復獨完以還縣縣中稱其信時下江新市兵起復亦聚衆數百人於羽山自號將軍更始立乃將其衆歸漢中王劉嘉以為校尉復見更始政亂諸將放縦乃説嘉曰臣聞圖堯舜}
  - {type: page-break, offset: 3702, content: '', id: KR2a0009_WYG_047-25b, image: WYG0252/WYG0252-0550d.png}
  - {type: variant, offset: 3702, length: 0, content: '', krp: 縣掾迎鹽河東㑹遇盗賊等比十餘人皆放散其鹽復獨完以還縣縣中稱其信時下江新市兵起復亦聚衆數百人於羽山自號將軍更始立乃將其衆歸漢中王劉嘉以為校尉復見更始政亂諸將放縦乃説嘉曰臣聞圖堯舜}
  - {type: variant, offset: 3703, length: 4, content: 訓詁肅宗, WYG: 事而不能至者湯武是也堯禪舜舜禪禹湯乃放桀武王誅紂故言不能至者圖湯武之事而不能至者桓文是也齊桓公小白晉文公重耳春秋之時周衰二君霸有海内圖桓文之事而不能至者六國是也六國謂韓趙魏燕齊椘分裂中夏各自跨據又不逮桓文定六國之規欲安守之而不能至者亡六國是也今漢室中興大王以親戚為藩輔天下未定而安守所保所保得無不可保乎嘉曰卿言大非吾任也大司馬劉公在河北必能相施第持我書往施用也第但也復遂辭嘉受書北度河及光武於栢人因鄧禹得召見光武竒之禹亦稱有將帥節於是署復破虜將軍督盗賊復馬羸羸力佳反光武觧左驂以賜之驂者服外之馬也東觀記續漢書左並作右官屬以復後来而好陵折等輩調補鄗尉光武曰賈督有折衝千里之威方任以職勿得擅除東觀記曰時上置兩府官屬復與叚孝共坐孝謂復曰卿將軍督我大司馬督不得共坐復曰俱劉公吏有何尊卑官屬以復不遜上調官屬補長吏共白欲以復為鄗尉上署報不許也光武至信都以復為偏將軍及拔邯鄲遷都護將軍従擊青犢於射犬大戰至日中賊陳堅不郤光武傳召復曰吏士皆饑可且朝飯復曰先破之然後食耳於是被羽先登被猶負也析羽為旌旗將軍所執先登先赴敵也所向皆靡賊乃敗走諸將咸服其勇又北與五校戰於真定大破之復傷創甚光武大驚曰我所以不令賈復别將者為其輕敵也果然失吾名將聞其婦有孕生女邪我子娶之生男邪我女嫁之不令其憂妻子也復病尋愈追及光武於薊相見甚懽大饗士卒令復居前擊鄴賊破之光武}
