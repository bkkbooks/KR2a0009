  - {type: variant, offset: 23, length: 0, content: '', WYG: 帀而歸移檄上狀諸將皆入賀并勸光武即帝位光武乃召異詣鄗問四方動静異曰三王反畔更始敗亡三王謂張卭為淮陽王廖湛為穰王胡殷為随王更始欲殺卭等遂勒兵掠東西市入戰於宫中更始大敗天下無主宗廟之憂在於大王宜従衆議上為社稷下為百姓光武曰我昨夜夢乗赤龍上天覺悟心中動悸異因下席再拜賀曰此天命發於精神周易乾卦九五曰飛龍在天大人造也荘}
