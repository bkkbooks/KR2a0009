  - {type: variant, offset: 6607, length: 264, content: 君王為之主鼓行無前功易於太山破雞子輕於四馬載鴻毛此湯武兵也今年軒轅星有白氣星家及喜事者皆云白氣者喪軒轅女主之位又太白前出西方至午兵當起又太子星色黑至辰日輒變赤夫黑為病赤為兵王努力卒事高祖起亭長陛下興白水何況於王陛下長子故副主哉上以求天下事必舉下以雪除沈沒之恥報死母之讎精誠所加金石為開當為秋霜無為檻羊雖欲為檻羊又可得乎竊見諸相工言王貴天子法也人主崩亡閭閻之伍尚為盜賊欲有所望何況王邪夫受命之君天之所立不可謀也今新帝人之所置彊者為右願君王為高祖陛下所志無為扶蘇將閭叫呼天也彊得書惶怖即執其使封書上之顯宗以荊母弟祕其事遣荊出止河南宮, WYG: 戸}
