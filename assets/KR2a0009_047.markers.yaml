  - {type: variant, offset: 6872, length: 507, content: 西羌反荊不得志冀天下因羌驚動有變私迎能為星者與謀議帝聞之乃徙封荊廣陵王遣之國其後荊復呼相工謂曰我貌類先帝先帝三十得天下我今亦三十可起兵未相者詣吏告之荊惶恐自繫獄帝復加恩不考極其事下詔不得臣屬吏人唯食租如故使相中尉謹宿衞之荊猶不改其後使巫祭祀祝詛有司舉奏請誅之荊自殺立二十九年死帝憐傷之賜謚曰思王十四年封荊子元壽為廣陵侯服王璽綬食荊故國六縣又封元壽弟三人為鄉侯明年帝東巡狩徵元壽兄弟會東平宮班賜御服器物又取皇子輿馬悉以與之建初七年肅宗詔元壽兄弟與諸王俱朝京師元壽卒子商嗣商卒子條嗣傳國于後臨淮懷公衡建武十五年立未及進爵為王而薨無子國除中山簡王焉建武十五年封左馮翊公十七年進爵為王焉以郭太后少子故獨留京師三十年徙封中山王永平二年冬諸王來會辟雍事畢歸蕃詔焉與俱就國從以虎賁官騎焉上疏辭讓顯宗報曰凡諸侯出境必備左右故夾谷之會司馬以從今五國各官騎百人稱娖前行皆北軍胡騎便兵善射弓不空發中必決眥夫有文事必有武備所以重蕃職也王其勿辭帝以焉郭太后偏愛特加恩寵獨得往來京師十五年焉姬韓序有過焉縊殺之國相舉奏坐削安險縣元和中肅宗復以安險還中山立五十二年永元二年薨自中興至和帝時皇子始封薨者皆賻錢三千萬布三萬匹嗣王薨賻錢千萬布萬匹是時竇, WYG: 鄧}
