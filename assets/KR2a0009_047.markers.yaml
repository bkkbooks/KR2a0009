  - {type: variant, offset: 3055, length: 195, content: 田獵不宿食飲不享出入不節則木不曲直此失春令者也臣知車駕今出事從約省所過吏人諷誦甘棠之德雖然動不以禮非所以示四方也惟陛下因行田野循視稼穡消搖仿佯弭節而旋至秋冬乃振威靈整法駕備周衞設羽旄詩云抑抑威儀惟德之隅臣不勝憤懣伏自手書乞詣行在所極陳至誠帝覽奏即還宮蒼在朝數載多所隆益而自以至親輔政聲望日重意不自安上疏歸職曰臣蒼疲駑特為陛下慈恩覆護在家備教導之仁升朝蒙爵命之首制書襃美班之四海舉負薪之才升君, WYG: 善善及}
