  - {type: variant, offset: 14, length: 0, content: '', WYG: 七馮異傳馮異字公孫潁川父城人也父城縣名故城在今許州葉縣東北汝州郟城縣亦有父城好讀書通左氏春秋孫子兵法孫子名武善用兵吳王闔廬之將也作兵法十三篇見史記漢兵起異以郡掾監五縣與父城長苗萌共城守為王莽拒漢光武畧地潁川攻父城不下屯兵巾車郷巾車郷名在父城界異間出行屬縣間出猶㣲行行音下孟反為漢兵所執時異従兄孝及同郡丁綝呂晏東觀記曰綝字㓜春定陵人伉健有武畧綝音丑心反並従光武因共薦異得召見異曰異一夫之用不足為彊弱有老母在城中願歸據五城以効功報德光武曰善異歸謂苗萌曰今諸將皆壯士屈起多暴横獨有劉將軍所到不虜掠觀其言語舉止非庸人也可以歸身苗萌曰死生同命敬従子計光武南還宛更始諸將攻父城者前後十餘輩異堅守不下及光武為司𨽻校尉道經父城異等即開門奉牛酒迎光武署異為主簿苗萌為従事異因薦邑子銚期音姚叔夀叚建左隆等東觀記及續漢書叚並作殷字光武皆以為掾史従至洛陽更始數欲遣光武徇河北諸将皆以為不可是時左丞相曹竟子詡為尚書竞字子期山陽人後死於赤眉之難見前書詡音虛羽反父子用事異勸光武厚結納之及度河北詡有力焉自伯升之敗光武不敢顯其悲戚每獨居輙不御酒肉枕席有涕泣䖏異獨叩頭寛譬哀情光武止之曰卿勿妄言異復因間進説曰天下同苦王氏思漢乆矣今更始諸将従横㬥虐従音子用反横音胡孟反所至虜掠百姓失望無所依戴今公専命方面施行恩徳夫有桀紂之亂乃見湯武之功人久饑渴易為充飽猶言凋殘之後易流徳澤宜急分遣官屬循行郡縣理寃結布恵澤光武納之至邯鄲遣異與銚期乗𫝊撫循屬縣録囚徒存鰥寡亡命自詣者除其罪陰條二千石長吏同心及不附者上之及王郎起光武自薊東南馳晨夜草舍舍止息也至饒陽無蔞亭無蔞亭名在今饒陽縣東北蔞音力于反時天寒烈衆皆饑疲異上豆粥明旦光武謂諸将曰昨得公孫豆粥饑寒俱解及至南宮南宮縣名屬信都國今冀州縣也遇大風雨光武引車入道傍空舍異抱薪鄧禹􅉯火􅉯音而悦反光武對竈燎衣燎炙也異復進麥飯莵肩因復度虖沱河至信都光武紀云度虖沱河至下愽城西見白衣老父曰信都去此八十里耳是自北而南此傳先言至南宫後言度虖沱河南宮在虖沱河南百有餘里又似自南而北紀傳兩文全相乖背迹其地理紀是傳非諸家之書並然亦未詳其故使異别收河間兵還拜偏将軍従破王郎封應侯應國名周武王子所封也杜預注春秋曰應國在㐮城成父縣西南異為人謙退不伐行與諸将相逢輙引車避道東觀記續漢書云異勑吏士非交戰受敵常行諸營之後相逢引車避之由是無争道變鬭者也進止皆有表識言其進退有常䖏也軍中號為整齊每所止舍諸将並坐論功異常獨屏樹下軍中號曰大樹将軍及破邯鄲乃更部分諸将各有配𨽻𨽻屬也袁山松曰先時諸将同營吏卒多犯法軍士皆言願屬大樹将軍光武以此多之多重也别擊破鐵脛於北平北平縣名屬中山國故城在今易州永樂縣也又降匈奴于林闟頓王匈奴王號山陽公載記曰頓字作碓前書音義闟音蹋頓音碓因従平河北時更始遣舞陰王李軼廪丘王田立大司馬朱鮪白虎公陳僑東觀記僑字作矯将兵號}
