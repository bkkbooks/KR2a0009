  - {type: variant, offset: 19, length: 1, content: 皇, WYG: 将北徇燕趙以魏郡河内獨不逢兵而城邑完全倉廪實乃拜寇恂為河内太守異為孟津将軍孟地名古今以為津綂二郡軍河上與恂合埶以拒朱鮪等異乃遺李軼書曰愚聞眀鏡所以照形往事所以知今孔子家語曰孔子觀周明堂四門之墉有堯舜桀紂之象謂従者曰明鏡所以察形古事所以知今昔㣲子去殷而入周項伯畔椘而歸漢史記曰㣲子名啓紂之庻兄周武王伐紂㣲子乃持祭噐肉袒靣縛造于軍門武王乃釋其縛復其位項伯名纒項籍之季父素善張良髙祖因良與伯結婚項籍謀害漢王伯以身翊蔽之籍誅乃歸漢也周勃迎代王而黜少}
