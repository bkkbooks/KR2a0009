  - {type: variant, offset: 100, length: 3, content: 皇后彊, WYG: 郡縣所苦異頓首受命引而西所至皆布威信𢎞農羣盗稱将軍者十餘軰皆率衆降異東觀記曰黽池霍郎陜主長湖濁恵華陰陽沈等稱将軍者皆降異與赤眉遇於華陰相拒六十餘日戰數十合降其将劉始王宣等東觀記宣作重五千餘人三年春遣使者即拜異}
  - {type: variant, offset: 100, length: 3, content: 皇后彊, krp: 郡縣所苦異頓首受命引而西所至皆布威信𢎞農羣盗稱将軍者十餘軰皆率衆降異東觀記曰黽池霍郎陜主長湖濁恵華陰陽沈等稱将軍者皆降異與赤眉遇於華陰相拒六十餘日戰數十合降其将劉始王宣等東觀記宣作重五千餘人三年春遣使者即拜異}
