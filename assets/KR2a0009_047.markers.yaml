  - {type: variant, offset: 6290, length: 316, content: 十年薨子懷王恢嗣延光三年封恢兄弟五人為鄉亭侯恢立十年薨子節王代嗣陽嘉二年封代兄便親為勃亭侯代立十四年薨無子國絕建和元年桓帝立勃亭侯便親為恢嗣是為恭王立十三年薨子孝王統嗣立八年薨子王赦立建安中薨無子國除廣陵思王荊建武十五年封山陽公十七年進爵為王荊性刻急隱害有才能而喜文法光武崩大行在前殿荊哭不哀而作飛書封以方底令蒼頭詐稱東海王彊舅大鴻臚郭況書與彊曰君王無罪猥被斥廢而兄弟至有束縛入牢獄者太后失職別守北宮及至年老遠斥居邊海內深痛觀者鼻酸及太后尸柩在堂洛陽吏以次捕斬賓客至有一家三尸伏堂者痛甚矣今天下有喪弓弩張設甚備閒梁松勑虎賁史曰吏以便宜見非勿有所拘封侯難再得也郎官竊悲之為王寒心累息今天下爭欲思刻賊王以求功寧有量邪若歸并二國之衆可聚百, WYG: 縣數}
