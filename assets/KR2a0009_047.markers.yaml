  - {type: variant, offset: 6099, length: 163, content: 行幸九江賜延書與車駕會壽春帝見延及妻子愍然傷之乃下詔曰昔周之爵封千有八百而姬姓居半者所以楨幹王室也朕南巡望淮海意在阜陵遂與侯相見侯志意衰落形體非故瞻省懷感以喜以悲今復侯為阜陵王增封四縣并前為五縣以阜陵下溼徙都壽春加賜錢千萬布萬匹安車一乘夫人諸子賞賜各有差明年入朝立五十一年薨子殤王沖嗣永元二年下詔盡削除前班下延事沖立二年薨無嗣, WYG: 尚}
