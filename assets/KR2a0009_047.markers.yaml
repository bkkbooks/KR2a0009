  - {type: variant, offset: 3692, length: 1, content: 典, krp: 當為中軍將召見彭彭因進説曰今赤眉入關更始危殆權臣放縦矯稱詔制道路阻塞四方蜂起羣雄競逐百姓無所歸命竊聞大王平河北開王業此誠皇天祐漢士人之福也彭幸蒙司徒公所見全濟未有報徳旋被禍難永恨於心今復遭遇願出身自效光武深接納之彭因言韓歆南陽大人大人謂大家豪右可以為用乃貰歆貰寛也以為鄧禹軍師更始大將軍呂植將兵屯淇園彭説降之於是拜彭為刺姦大將軍使督察衆營續漢書曰時更始尚書令謝躬將六將軍屯鄴兵横暴為百姓所苦上先遣吴漢往收之故拜彭為刺姦將軍授以常所持節従平河北光武即位拜彭廷尉歸徳侯如故行大將軍事續漢書曰彭鎮河内馮異先攻洛陽朱鮪大出軍欲撃彭時天霧鮪以為彭已去令其兵皆穫黍彭乃進撃大破之與大司馬吴漢大司空王梁建義大將軍朱祐右將軍萬脩執金吾賈復驍騎將軍劉植揚化將軍堅鐔積射將軍侯進偏將軍馮異祭遵王霸等圍洛陽數月朱鮪等堅守不肯下帝以彭嘗為鮪校尉令往説之鮪在城上彭在城下相勞苦歡語如平生彭因曰彭往者得執鞭侍従蒙薦舉拔擢常思有以報恩今赤眉已得長安更始為三王所反觧見上文皇帝受命平定燕趙盡有幽冀之地百姓歸心賢俊雲集親率大兵来攻洛陽天下之事逝其去矣公雖嬰城固守將何待乎嬰繞也謂以城自嬰繞而守之鮪曰大司徒被害時鮪與其謀與音預又諫更始無遣蕭王北伐誠自知罪深彭還具言於帝帝曰夫建大事者不忌小怨鮪今若降官爵可保况誅罸乎河水在此吾不食言指河以為信言其眀白也彭復往告鮪鮪従城上下索曰必信可乗此上彭趣索欲上趣向也鮪見其誠即許降後五日鮪將輕騎詣彭顧勑諸部將曰堅守待我我若不還諸君徑將大兵上轘轅歸郾王更始傳尹尊為郾王乃面縛與彭俱詣河陽東觀記曰詣行在所河津亭帝即觧其縛召見之復令彭夜送鮪歸城眀旦悉其衆出降拜鮪為平狄將軍封扶溝侯鮪淮陽人後為少府前書曰少府秦官秩二千石續漢書曰少府掌中服御諸物衣服寳貨珍膳之屬傳封累代建武二年使彭擊荆州下犨葉等十餘城犨縣名屬南陽郡故城在今汝州魯山縣東南葉今許州葉縣也續漢書曰彭南擊荆州至城安昆陽犨葉舞陽堵陽平氏棘陽胡陽䖏䖏皆破其屯聚是時南方尤亂南郡人秦豐據黎邱自稱楚黎王畧十有二縣東觀記曰豐邔縣人少學長安受律令歸為縣吏更始元年起兵攻得邔宜城若編臨沮中沮廬襄陽鄧新野穰湖陽蔡陽兵合萬人邔音求紀反董訢起堵郷許邯起杏南陽復陽縣有杏聚又更始諸將各擁兵據南陽諸城帝遣吴漢伐之漢軍所過多侵暴時破虜將軍鄧奉謁歸新野怒吴漢掠其郷里遂返撃破漢軍𫉬其輜重屯據淯陽與諸賊合従秋彭破杏降許邯遷征南大將軍復遣朱祐賈復及建威大將軍耿弇漢中將軍王常劉攽曰中當作忠武威將軍郭守越騎將軍劉宏偏將軍劉嘉耿植等與彭并力討鄧奉先擊堵郷而奉將萬餘人救董訢訢奉皆南陽精兵彭等攻之連月不剋三年夏帝自將南征至葉董訢別將將數千人遮道車騎不可得前彭奔擊大破之帝至堵陽鄧奉夜逃歸淯陽續漢書曰奉令候伏道旁見車将一日不絶歸語奉奉遂夜遁董訢降彭復與耿弇賈復及積弩將軍傅俊騎都尉臧宫等従追鄧奉於小長安小長安觧見光武紀帝率諸將親戰大破之奉迫急乃降帝憐奉舊功臣且釁起吴漢欲全宥之彭與耿弇諌曰鄧奉背恩反逆暴師經年致賈復傷痍朱祐見𫉬陛下既至不知悔善而親在行陳兵敗乃降若不誅奉無以懲惡於是斬之奉者西華侯鄧晨之兄子也車駕引還令彭率傅俊臧宮劉宏等三萬餘人南擊秦豐拔黄郵黄郵聚名也在南陽新都縣豐與其大將蔡宏拒彭等於鄧數月不得進帝怪以讓彭彭懼於是夜勒兵馬申令軍中使眀旦西擊山都山都縣名屬南陽郡舊南陽之赤郷秦以為縣故城在今㐮州義清縣東北乃緩所𫉬虜令得逃亡歸以告豐豐即悉其軍西邀彭彭乃潛兵度沔水擊其將張楊於阿頭山大破之沔水源出武都東狼谷中即漢水之上源也阿頭山在㐮陽也従川谷間伐木開道直襲黎丘擊破諸屯兵豐聞大驚馳歸救之彭與諸將依東山為營豐與蔡宏夜攻彭彭豫為之備出兵逆擊之豐敗走追斬蔡宏更封彭為舞陰侯秦豐相趙京舉宜城降拜為成漢將軍與彭共圍豐於黎丘時田戎擁衆夷陵東觀記曰田戎西平人與同郡人陳義客夷陵為羣盗更始元年義戎將兵陷夷陵陳義自稱黎丘大將軍戎自稱掃地大將軍襄陽耆舊記曰戎號周成王義稱臨江王聞秦豐𬒳圍懼大兵方至欲降而妻兄辛臣諫戎曰今四方豪傑各據郡國洛陽地如掌耳續漢書曰辛臣為戎作地圗圖彭寵張歩董憲公孫述等所得郡國云洛陽所得如掌耳不如按甲以觀其變戎曰以秦王之彊猶為征南所圍豈况吾邪降計决矣四年春戎乃留辛臣守夷陵自將兵㳂江泝沔止黎丘刻期日當降而辛臣於後盗戎珍寳従間道先降於彭而以書招戎戎疑必賣已遂不敢降東觀記曰戎至期日灼龜卜降兆中拆遂止不降而反與秦豐合彭出兵攻戎數月大破之其大將伍公詣彭降戎亡歸夷陵帝幸黎丘勞軍封彭吏士有功者百餘人彭攻秦豐三嵗斬首九萬餘級豐餘兵裁千人又城中食且盡帝以豐轉弱令朱祐代彭守之使彭與傅俊南撃田戎大破之遂㧞夷陵追至秭歸秭歸縣名今歸州觧見和紀戎與數十騎亡入蜀盡獲其妻子士衆數萬人彭以將伐蜀漢而夾川谷少水險難漕運留威虜將軍馮駿軍江州江州縣名今渝州巴縣也東觀記曰長沙中尉馮駿將兵詣彭璽書拜駿為威虜將軍都尉田鴻軍夷陵領軍李𤣥軍夷道自引兵還屯津郷當荆州要㑹津郷縣名所謂江津也柬觀記曰津郷當荆楊之咽喉喻告諸蠻夷降者奏封其君長初彭與交趾牧鄧讓厚善與讓書陳國家威徳東觀記曰讓夫人光烈皇后姊也又遣偏將軍屈充移檄江南班行詔命於是讓與江夏太守侯登武陵太守王堂長沙相韓福桂陽太守張隆零陵太守田翕蒼梧太守杜穆交趾太守錫光等相率遣使貢獻悉封為列侯或遣子將兵助彭征伐續漢書曰張隆遣子曄將兵詣彭助征伐上以曄為率義侯不總遣子故言或於是江南之珍始流通焉六年冬徴彭詣京師數召讌見厚加賞賜復南還津郷有詔過家上冢大長秋以朔望問太夫人起居大長秋皇后屬官漢法列侯之母方稱太夫人也八年彭引兵従車駕破天水與吴漢圍隗囂於西城時公孫述將李育將兵救囂守上邽帝留蓋延耿弇圍之而車駕東歸勑彭書曰兩城若下便可將兵南撃蜀虜人苦不知足既平隴復望蜀每一發兵頭鬚為白彭遂壅谷水灌西城城未没丈餘東觀記曰時以縑囊盛土為堤灌西城谷水従地中數丈涌出故城不拔續漢書云以縑盛土為堤囂將行巡周宗將蜀救兵到囂得出還冀漢軍食盡燒輜重引兵下隴延弇亦相隨而退囂出兵尾撃諸營彭殿為後拒尾謂尋其後而擊之凡軍在前曰啓在後曰殿東觀記曰彭東入𢎞農界百姓持酒肉迎軍曰蒙將軍為後拒全子弟得生還也故諸將能全師東歸彭還津郷九年公孫述遣其將任滿田戎程汎將數萬人乗枋箄下江闗枋箄以竹木為之浮於水上爾}
