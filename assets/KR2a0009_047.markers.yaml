  - {type: variant, offset: 3694, length: 1, content: 特, krp: 曰舫泭也郭景純曰水中竺二稗筏也華陽國志曰巴楚相攻故置江闗舊在赤甲城後移在江南岸對白帝城故基在今夔州魚復縣南枋即舫字古通用耳箄音歩佳反泭音匹俱反擊破馮駿及田鴻李𤣥等遂拔夷道夷陵據荆門虎牙觧見光武紀横江水起浮橋鬬樓立欑柱絶水道結營山上以拒漢兵彭數攻之不利於是裝直進樓船冐突露橈數千艘並船名樓船之上施樓橈小檝也爾雅曰檝謂之橈露橈謂露檝在外人在船中冐突取其觸冐而唐突也橈音饒十一年春彭與吴漢及誅虜將軍劉隆輔威將軍臧宫驍騎將軍劉歆發南陽武陵南郡兵又發桂陽零陵長沙委輸棹卒凡六萬餘人棹卒持棹行船也東觀記作櫂前書鄧通以櫂船為黄頭郎櫂音直教反騎五千匹皆㑹荆門吴漢以三郡棹卒多費糧穀欲罷之彭以蜀兵盛不可遣上書言狀帝報彭曰大司馬習用歩騎不曉水戰荆門之事一由征南公為重而已彭乃}
  - {type: variant, offset: 3696, length: 0, content: '', WYG: 軍中募攻浮橋先登者上賞於是偏將軍魯竒應募而前時天風狂急彭竒船逆流而上直衝浮橋而欑柱鉤不得去續漢書曰時天東風其攢柱有反把鉤竒船不得去竒等乗埶殊死戰因飛炬焚之風怒火盛橋樓崩燒彭復悉軍順風並進所向無前蜀兵大亂溺死者數千人斬任滿生獲程汎而田戎亡保江州彭上劉隆為南郡太守自率臧宫劉歆長驅入江闗令軍中無得虜掠所過百姓皆奉牛酒迎勞彭見諸耆老為言大漢哀愍巴蜀乆見虜役故興師逺伐以討有罪為人除害讓不受其牛酒百姓皆大喜悦爭開門降詔彭守益州牧所下郡輙行太守事東觀記曰彭若出界即以太守號付後將軍選官屬守州中長史劉攽曰注長史案長史是王國官守令皆長吏也此宜作吏彭到江州以田戎食多難卒拔留馮駿守之自引兵乗利直指墊江攻破平曲墊江縣名屬巴郡今忠州縣也墊音徒協反平曲地闕收其米數十萬石公孫述使其將延岑呂鮪王元及其弟恢悉兵拒廣漢及資中資中縣名屬犍為郡其地在今資州資陽縣又遣將侯丹率二萬餘人拒黄石彭乃多張疑兵使護軍楊翕與臧宮拒延岑等自分兵浮江下還江州泝都江而上都江成都江也襲擊侯丹大破之因晨夜倍道兼行二千餘里徑拔武陽武陽觧見光武紀使精騎馳廣都廣都縣名屬蜀郡故城在今益州成都縣東南去成都數十里埶若風雨所至皆奔散初述聞漢兵在平曲故遣大兵逆之及彭至武陽繞出延岑軍後蜀地震駭述大驚以杖擊地曰是何神也彭所營地名彭亡聞而惡之欲徙㑹日暮蜀刺客詐為亡奴降夜刺殺彭彭首破荆門長驅武陽持軍整齊秋豪無犯豪毛也秋毛喻細也髙祖曰吾入闗秋豪無所取卭穀王任貴聞彭威信數千里遣使迎降前書音義曰任貴越嶲夷殺太守枚根自立為卭穀王㑹彭已薨帝盡以任貴所獻賜彭妻子謚曰壯侯蜀人憐之為立廟武陽嵗時祠焉子遵嗣徙封細陽侯細陽縣名屬汝南郡故城在今潁川汝陰縣西十三年帝思彭功復封遵弟淮為榖陽侯榖陽縣名屬沛郡遵永平中為屯騎}
