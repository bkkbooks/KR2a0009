  - {type: variant, offset: 21, length: 0, content: '', krp: 霍光尊孝宣而廢昌邑少帝孝恵後宫之子名𢎞恵帝崩周勃以𢎞非恵帝之子乃黜之迎立代王昭帝崩無嗣霍光乃迎立武帝孫昌邑王賀賀無道光廢之而立宣帝彼皆畏天知命覩存亡之符見廢興之事故能成功扵一時垂業扵萬世也茍令長安尚可扶助延期嵗月疏不間親逺不踰近季文豈能居一隅哉長安謂更始季文李軼字言軼與更始疏逺獨居一隅理難支久欲其早圖去就今長安壊亂赤眉臨郊王侯搆難大臣乖離綱紀已絶時更始大臣張卬申屠建隗囂等以赤眉入闗謀劫更始歸南陽是大臣乖離也四方分崩異姓並起是故蕭王跋渉霜雪經營河北方今英俊雲集百姓風靡雖邠岐慕周不足以喻史記曰古公亶父修后稷之業積徳行義國人皆戴之戎翟攻之不忍戰其人乃與其私屬去邠止於岐下邠人舉國扶老携弱盡復歸古公於岐山之下季文誠能覺悟成敗亟定大計論功古人亟急也古人即謂㣲子項伯等轉禍為福在此時矣如猛将長驅嚴兵圍城雖有悔恨亦無及已初軼與光武首結謀約加相親愛及更始立反共陷伯升雖知長安已危欲降又不自安乃報異書曰軼本與蕭王首謀造漢結死生之約同榮枯之計今軼守洛陽将軍鎮孟津俱㩀機軸機弩牙也軸車軸也皆在物之要故取諭焉千載一㑹思成斷金易曰二人同心其利斷金唯深逹蕭王願進愚䇿以佐國安人軼自通書之後不復與異爭鋒故異因此得北攻天井闗㧞上黨兩城天井闗在大行山下觧見章紀又南下河南成臯以東}
  - {type: variant, offset: 22, length: 0, content: '', WYG: 三縣及諸屯聚皆平之降者十餘萬武勃將萬餘人攻諸畔者異引軍度河與勃戰於士郷下續漢書曰士郷亭名屬河南郡大破斬勃獲首五千餘級軼又閉門不救異見其信效具以奏聞光武故宣露軼書東觀記曰上報異曰軼多詐不信人不能得其要領令移其書令朱鮪知之鮪怒遂使人刺殺軼由是城中乖離多有降者鮪乃遣討難将軍蘇茂将數萬人攻温鮪自将數萬人攻平陰以綴異平陰縣名屬河南郡綴謂連綴也異遣校尉護軍将軍将兵劉攽曰案異為孟津將軍軍有護軍爾云護軍将軍非也緣下有将兵字明衍将軍二字與宼恂合撃茂破之異因度河撃鮪鮪走異追至洛陽環城}
