  - {type: variant, offset: 3694, length: 1, content: 特, WYG: 曰舫泭也郭景純曰水中􅗝筏也華陽國志曰巴楚相攻故置江闗舊在赤甲城後移在江南岸對白帝城故基在今夔州魚復縣南枋即舫字古通用耳箄音歩佳反泭音匹俱反擊破馮駿及田鴻李𤣥等遂拔夷道夷陵據荆門虎牙觧見光武紀横江水起浮橋鬬樓立欑柱絶水道結營山上以拒漢兵彭數攻之不利於是裝直進樓船冐突露橈數千艘並船名樓船之上施樓橈小檝也爾雅曰檝謂之橈露橈謂露檝在外人在船中冐突取其觸冐而唐突也橈音饒十一年春彭與吴漢及誅虜將軍劉隆輔威將軍臧宫驍騎將軍劉歆發南陽武陵南郡兵又發桂陽零陵長沙委輸棹卒凡六萬餘人棹卒持棹行船也東觀記作櫂前書鄧通以櫂船為黄頭郎櫂音直教反騎五千匹皆㑹荆門吴漢以三郡棹卒多費糧穀欲罷之彭以蜀兵盛不可遣上書言狀帝報彭曰大司馬習用歩騎不曉水戰荆門之事一由征南公為重而已彭乃}
