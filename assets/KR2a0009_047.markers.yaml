  - {type: variant, offset: 7402, length: 302, content: 重於禮加賻錢一億詔濟南東海二王皆會大為修冢塋開神道平夷吏人冢墓以千數作者萬餘人發常山鉅鹿涿郡柏黃腸雜木三郡不能備復調餘州郡工徒及送致者數千人凡徵發搖動六州十八郡制度餘國莫及子夷王憲嗣永元四年封憲弟十一人為列侯憲立二十二年薨子孝王弘嗣永寧元年封弘二弟為亭侯弘立二十八年薨子穆王暢嗣永和六年封暢弟荊為南鄉侯暢立三十四年薨子節王稚嗣無子國除琅邪孝王京建武十五年封琅邪公十七年進爵為王京性恭孝好經學顯宗尤愛幸賞賜恩寵殊異莫與為比永平二年以太山之蓋南武陽華東萊之昌陽盧鄉東牟六縣益琅邪五年乃就國光烈皇后崩帝悉以太后遺金寶財物賜京京都莒好修宮室窮極伎巧殿館壁帶皆飾以金銀數上詩賦頌德帝嘉美下之史官京國中有城陽景王祠吏, WYG: 降義謂荆}
