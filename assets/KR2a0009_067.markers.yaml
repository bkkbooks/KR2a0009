  - {type: variant, offset: 6457, length: 7, content: 地震免七年疾篤, WYG: 家事廢王事春秋衛靈公卒孫輒立父蒯瞶與輒争國公羊傳曰輒者曷為蒯瞶之子然則曷為不立蒯瞶而立輒蒯瞶無道靈公逐之而立輒然則輒之義可以立乎曰可不以父命辭於王命不以家事辭於王事故駿引以為言也今子以兄弟私恩而絶父不滅之基可謂智乎鴻感悟垂涕歎息乃還就國開門敎授鮑駿亦}
