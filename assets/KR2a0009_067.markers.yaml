  - {type: variant, offset: 4965, length: 320, content: 闋五府俱辟連年不應永建中公卿多薦瓊者於是與會稽賀純廣漢楊厚俱公車徵瓊至綸氏稱疾不進有司劾不敬詔下縣以禮慰遣遂不得已先是徵聘處士多不稱望李固素慕於瓊乃以書逆遺之曰聞已度伊洛近在萬歲亭豈即事有漸將順王命乎蓋君子謂伯夷隘柳下惠不恭故傳曰不夷不惠可否之閒蓋聖賢居身之所珍也誠遂欲枕山棲谷擬跡巢由斯則可矣若當輔政濟民今其時也自生民以來善政少而亂俗多必待堯舜之君此為志士終無時矣常聞語曰嶢嶢者易缺皦皦者易汙陽春之曲和者必寡盛名之下其實難副近魯陽樊君被徵初至朝廷設壇席猶待神明雖無大異而言行所守無缺而毀謗布流應時折減者豈非觀聽望深聲名太盛乎自頃徵聘之士胡元安薛孟嘗朱仲昭顧季鴻等其功業皆無所採是故俗論皆言處士純盜虛聲願先生弘此遠謨令衆人歎服一雪此言耳瓊至, WYG: ''}
