  - {type: variant, offset: 7970, length: 233, content: 賢貶爵土升之司馬辯論其才論定然後官之任官然後祿之故王者得其人進仕勸其行經邦弘務所由久矣漢初詔舉賢良方正州郡察孝廉秀才斯亦貢士之方也中興以後復增敦朴有道賢能直言獨行高節質直清白敦厚之屬榮路既廣觖望難裁自是竊名偽服浸以流競權門貴仕請謁繁興自左雄任事限年試才雖頗有不密固亦因識時宜而黃瓊胡廣張衡崔瑗之徒泥滯舊方互相詭駮循名者屈其短筭實者挺其効故雄在尚書天下不敢妄選十餘年閒稱為得人斯亦効實之徵乎順帝始以童弱反政而號令自出知能任使故士得用情天下喁喁仰其風采遂乃備玄纁玉帛以聘, WYG: ''}
