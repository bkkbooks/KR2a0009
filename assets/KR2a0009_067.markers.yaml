  - {type: variant, offset: 7766, length: 1, content: 遷, WYG: 是時竇太后臨政憲兄弟各擅威權鴻因日食上封事曰臣聞日者陽精守實不虧君之象也月者隂精盈毁有常臣之表也故日食者臣乘君隂陵陽月滿不虧下驕盈也昔周室衰季皇甫之屬專權於外黨類彊盛侵奪主勢則日月薄食周室衰謂幽王時也皇甫即幽王后之黨也詩小雅曰皇甫卿士番維司徒家伯冢宰仲允膳夫其類非一故言之屬也故詩曰十月之交朔日辛卯日有食之亦孔之醜十月之交詩小雅篇名也孔甚也醜惡也周之十月夏之八月也八月朔日月交而日食隂侵陽臣侵君之象也日辰之義日為君辰為臣辛金也卯木也又以卯侵金故甚惡也春秋日食三十六弑君三十二變不空生各以類應夫威柄不以放下利器不以假人劉向上書云弑君三十六今據春秋與劉向同而東觀及續漢范氏諸本皆云三十二盖誤也威柄謂周禮之八柄即爵禄生置子奪廢誅也利器謂國之權勢假借也左傳曰唯器與名不可以假人也覽觀往古近察漢興傾危之禍靡不由之是以三桓専魯田氏擅齊六卿分晉諸吕握權統嗣㡬移哀平之末廟不血食三桓謂季孫氏叔孫氏仲孫氏三家皆出自魯桓公故言三桓並専權魯國至魯昭公遂為季氏所逐平子乃攝行君事田氏陳敬仲之後因自陳奔齊改為田氏遂執齊政至田和乃簒齊六卿謂晉之智氏中行氏范氏韓氏趙氏魏氏並専晉政韓趙魏卒三分晉國也諸呂謂呂産呂禄也産領南軍禄領北軍謀危劉氏故曰統嗣㡬移故雖有周公之親而無其徳不得行其勢也言親賢兼重方可執政孟子曰有伊尹之志則可無伊尹之志則簒也今大將軍雖欲勑身自約不敢僣差然而天下逺近皆惶怖承㫖刺史二千石初除謁辭求通待報雖奉符璽受臺勑不敢便去久者至數十日背王室向私門此乃上威損下權盛也人道悖於下效驗見於天雖有隐謀神照其情垂象見戒以告人君間者月滿先節過望不虧易曰天垂象見吉凶故言見戒也月滿先節謂未及望而滿也東觀記亦云作先節俗本作失節字之誤也此臣驕溢背君専功獨行也陛下未深覺悟故天重見戒誠宜畏懼以防其禍詩云敬天之怒不敢戲豫詩大雅也雷電震耀天怒也戲豫猶逸豫也不敢自逸所以敬天也若勑政責躬杜漸防萌則凶妖銷滅害除福湊矣夫壊崖破巖之水源自涓涓干雲蔽日之木起於葱青禁㣲則易救末者難人莫不忽於㣲細以致其大恩不忍誨義不忍割去事之後未然之眀鏡也臣愚以為左官外附之臣前書左官附益阿黨之法設左官者人道尚右舍天子而事諸侯為左官外附謂背正法而附私家依託權門傾覆諂䛕以求容媚者宜行一切之誅間者大將軍再出威振州郡莫不賦斂吏人遣使貢獻大將軍雖不受而物不還主部署之吏無所畏憚縱行非法不伏罪辜故海内貪猾競為姦吏小民吁嗟怨氣滿腹臣聞天不可以不剛不剛則三光不明三光日月星也天道尚剛周易曰乾健也天道終日乾乾是其剛也王不可以不彊不彊則宰牧從横宜因大變改政匡失以塞天意書奏十餘日帝以鴻行}
