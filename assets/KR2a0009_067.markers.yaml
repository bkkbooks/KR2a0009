  - {type: variant, offset: 7129, length: 305, content: 朱紫共色粉墨雜蹂所謂扺金玉於沙礫碎珪璧於泥塗四方聞之莫不憤歎昔曾子大孝慈母投杼伯奇至賢終於流放夫讒諛所舉無高而不可升阿黨相抑無深而不可淪可不察歟臣至頑駑世荷國恩身輕位重勤不補過然懼於永歿負釁益深敢以垂絕之日陳不諱之言庶有萬分無恨三泉其年卒時年七十九贈車騎將軍謚曰忠侯孫琬琬字子琰少失父早而辯慧祖父瓊初為魏郡太守建和元年正月日食京師不見而瓊以狀聞太后詔問所食多少瓊思其對而未知所況琬年七歲在傍曰何不言日食之餘如月之初瓊大驚即以其言應詔而深奇愛之後瓊為司徒琬以公孫拜童子郎辭病不就知名京師時司空盛允有疾瓊遣琬候問會江夏上蠻賊事副府允發書視畢微戲琬曰江夏大邦而蠻多士少琬奉手對曰蠻夷猾夏責在司空因拂衣辭去允甚奇之稍遷, WYG: ''}
