  - {type: variant, offset: 510, length: 539, content: 是以吏稱其職人安其業漢世良吏於茲為盛故能降來儀之瑞建中興之功動無常各懷一切莫慮長久謂殺害不辜為威風聚斂整辨為賢能以理己安民為劣弱以奉法循理為不化髡鉗之戮生於睚眥覆尸之禍成於喜怒視民如寇讎稅之如豺虎監司項背相望與同疾疢見非不舉聞惡不察觀政於亭傳責成於朞月言善不稱德論功不據實虛誕者獲譽拘檢者離毀或因罪而引高或色斯以求名州宰不覆競共辟召踊躍升騰超等踰匹或考奏捕案而亡不受罪會赦行賂復見洗滌朱紫同色清濁不分故使姦猾枉濫輕忽去就拜除如流缺動百數鄉官部吏職斯祿薄車馬衣服一出於民廉者取足貪者充家特選橫調紛紛不絕送迎煩費損政傷民和氣未洽灾眚不消咎皆在此今之墨綬猶古之諸侯拜爵王庭輿服有庸而齊於匹豎叛命避負非所以崇憲明理惠育元元也臣愚以為守相長吏惠和有顯効者可就增秩勿使移徙非父母喪不得去官其不從法禁不式王命錮之終身雖會赦令不得齒列若被劾奏亡不就法者徙家邊郡以懲其後鄉部親民之吏皆用儒生清白任從政者寬其負筭增其秩祿吏職滿歲宰府州郡乃得辟舉如此威福之路塞虛偽之端絕送迎之役損賦斂之源息循理之吏得成其化率土之民各寧其所追配文宣中興之軌流光垂祚永世不刊帝感其言申下有司考其真偽詳所施行雄之所言皆明達政體而宦豎權終不能用自是選代交互令長月易迎新送舊勞擾無已或官寺空曠無人案事每選部劇乃至逃亡永建三年京, WYG: 先}
