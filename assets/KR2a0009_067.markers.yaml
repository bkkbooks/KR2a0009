  - {type: variant, offset: 7798, length: 162, content: 昔周公營洛邑以寧姬光武卜東都以隆漢天之所啟神之所安大業既定豈宜妄有遷動以虧四海之望時人懼卓暴怒琬必及害固諫之琬對曰昔白公作亂於楚屈廬冒刃而前崔杼弒君於齊晏嬰不懼其盟吾雖不德誠慕古人之節琬竟坐免卓猶敬其名德舊族不敢害後與楊彪同拜光祿大夫及徙西都轉司隸校尉與司徒王允同謀誅卓及卓將李傕郭汜攻破長安遂收琬下獄死時年五十二論曰古者諸, WYG: 魯陽鄉在尋陽部也臣㑹汾按傳言鄉}
