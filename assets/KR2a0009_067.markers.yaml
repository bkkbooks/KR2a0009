  - {type: variant, offset: 28, length: 0, content: '', WYG: 續漢書曰榮本齊人遷于龍亢至榮六葉東觀記曰榮本齊桓公後也桓公作伯支庶用其諡立族命氏焉少學長}
  - {type: variant, offset: 28, length: 0, content: '', krp: 續漢書曰榮本齊人遷于龍亢至榮六葉東觀記曰榮本齊桓公後也桓公作伯支庶用其諡立族命氏焉少學長}
  - {type: variant, offset: 29, length: 0, content: '', WYG: 習歐陽尚書事博士九江朱普朱普字公文受業於平當為博士徒衆尤盛見前書貧窶無資字林曰窶空也常客傭以自給精力不倦十五年不闚家園至王莽簒位乃歸㑹朱普卒榮奔喪九江負土成墳因留敎授徒衆數百人莽敗天下亂榮抱其經書與弟子逃匿山谷雖常飢困而講論不輟後復客授江淮間建武十九年年六十餘始辟大司徒府時顯宗始立為皇太子選求明經乃擢榮弟子豫章何湯為虎賁中郎將以尚書授太子世祖從容問湯從音七容反本師為誰湯對曰事沛國桓榮}
