  - {type: variant, offset: 8217, length: 365, content: 奉引延問失得急登賢之舉虛降己之禮於是處士鄙生忘其拘儒拂巾衽褐以企旌車之招矣至乃英能承風俊乂咸事若李固周舉之淵謨弘深左雄黃瓊之政事貞固桓焉楊厚以儒學進崔瑗馬融以文章顯吳祐蘇章种暠欒巴牧民之良幹龐參虞詡將帥之宏規王龔張皓虛心以推士張綱杜喬直道以糾違郎顗陰陽詳密張衡機術特妙東京之士於茲盛焉向使廟堂納其高謀彊場埸宣其智力帷幄容其謇辭舉厝稟其成式則武宣之軌豈其遠而詩云靡不有初鮮克有終可為恨哉及孝桓之時碩德繼興陳蕃楊秉處稱賢宰皇甫張段出號名將王暢李膺彌縫袞闕朱穆劉陶獻替匡時郭有道奬鑒人倫陳仲弓弘道下邑其餘宏儒遠智高心絜行激揚風流者不可勝言而斯道莫振文武陵隊在朝者以正議嬰戮謝事者以黨錮致灾往車雖折而來軫方遒所以傾而未顛決而未潰豈非仁人君子心力之為乎嗚呼贊曰雄作納言古之八元舉升以彙越自下蕃登朝理政並紓灾昏瓊名夙知累章國疵琬亦早秀位及志差, WYG: 卷六十七考證}
