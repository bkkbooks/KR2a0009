  - {type: variant, offset: 3949, length: 809, content: 歷顯位亦以政事稱舉出為蜀郡太守坐事免大將軍梁商表為從事中郎甚敬重焉六年三月上巳日商大會賓客讌于洛水舉時稱疾不往商與親暱酣飲極歡及酒闌倡罷繼以露之歌坐中聞者皆為掩涕太僕張种時亦在焉會還以事告舉舉歎曰此所謂哀樂失時非其所也殃將及乎商至秋果薨商疾篤帝親臨幸問以遺言對曰人之將死其言也善臣從事中郎周舉清高忠正可重任也由是拜舉諫議大夫時連有灾異帝思商言召舉於顯親殿問以變眚舉對曰陛下初立遵脩舊典興化致政遠近肅然頃年以來稍違於前朝多寵倖祿不序德觀天察人準今方古誠可危懼書曰僭恆暘若夫僭差無度則言不從而下不正陽無以制則上擾下竭宜密嚴勑州郡察彊宗大姦以時禽討其後江淮猾賊周生徐鳳等處處並起如舉所陳時詔遣八使巡行風俗皆選素有威名者乃拜舉為侍中舉侍中杜喬守光祿大夫周栩前青州刺史馮羨尚書欒巴侍御史張綱兗州刺史郭遵太尉長史劉班並守光祿大夫分行天下其刺史二千石有臧罪顯明者驛馬上之墨綬以下便輒收舉其有清忠惠利為百姓所安宜表異者皆以狀上於是八使同時俱拜天下號曰八俊舉於是劾奏貪猾表薦公清朝廷稱之遷河內太守徵為大鴻臚及梁太后臨朝詔以殤帝幼崩廟次宜在順帝下太常馬訪奏宜如詔書諫議大夫呂勃以為應依昭穆之序先殤帝後順帝詔下公卿舉議曰春秋魯閔公無子庶兄僖公代立其子文公遂躋僖於閔上孔子譏之書曰有事于太廟躋僖公傳曰逆祀也及定公正其序經曰從祀先公為萬世法也今殤帝在先於秩為父順帝在後於親為子先後之義不可改昭穆之序不可亂呂勃議是也太后下詔從之遷光祿勳會遭母憂去職後拜光祿大夫建和三年卒朝廷以舉清公亮直方欲以為宰相深痛惜之乃詔告光祿勳汝南太守曰昔在前世求賢如渴封墓軾閭以光賢哲故公叔見誄翁歸蒙述所以昭忠厲俗作範後昆故光祿大夫周舉性侔夷魚忠踰隨管前授牧守及還納言出入京輦有欽哉之績在禁闈有密靜之風予錄乃勳用登九列方欲式序百官亮協三事不永夙終用乖遠圖朝廷愍悼良為愴然詩不云乎肇敏戎功用錫爾祉其令將大夫以下到喪發日復會弔加賜錢十萬以旌委蛇素絲之節焉子勰勰字巨勝少尚玄虛, WYG: ''}
