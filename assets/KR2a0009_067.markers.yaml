  - {type: punctuation, offset: 6456, content: ，, id: KR2a0009_ZHSJ_067-bkkpn1478}
  - {type: 'tls:seg', offset: 6456, content: '', id: KR2a0009_ZHSJ_067-d67p58s34}
  - {type: variant, offset: 6456, length: 0, content: '', WYG: 也今綝能薄功㣲得鄉亭厚矣帝從之封定陵新安鄉侯食邑五千戸後徙封陵陽侯鴻年十三從桓榮受歐陽尚書三年而明章句善論難為都講遂篤志精銳布衣荷擔不逺千里初綝從世祖征伐鴻獨與弟盛居憐盛㓜小而共寒苦及綝卒鴻當襲封上書讓國於盛不報既𦵏乃挂縗絰於冢廬而逃去留書與盛曰鴻貪經書不顧恩義弱而随師弱少也生不供養死不飯唅皇天先祖並不祐助身被大病不任茅土任堪也前上疾狀願辭爵仲公仲公盛之字也章寢不報廹且當襲封謹自放棄逐求良醫如遂不瘳永歸溝壑鴻初與九江人鮑駿同事桓榮甚相友善及鴻亡封與駿遇於東海陽狂不識駿駿乃止而讓之曰昔伯夷吳札亂世權行故得申其志耳伯夷孤竹君之子讓其弟叔齊餓死於首陽之山吳札呉王夀夢之季子也諸兄欲讓其國季子乃舍其室而耕是皆權時所行非常之道也伯夷當紂時吳札當周之末故言亂世春秋之義不}
  - {type: page-break, offset: 6456, content: '', id: KR2a0009_WYG_067-14b, image: WYG0252/WYG0252-0815b.png}
