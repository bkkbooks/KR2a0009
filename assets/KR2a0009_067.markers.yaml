  - {type: variant, offset: 3041, length: 3, content: 露坐德, WYG: 執業每言輒曰太師在是凍觀記曰時執經生避位發難上謙曰太師在是也既罷悉以大官供具賜太常家其恩禮若此永平二年三雍初成拜榮為五更三雍宫也謂明堂靈臺辟雍前書音義曰皆叶天人雍和之氣為之故謂三雍五更觧見明紀每大射養老禮畢帝輒引榮及弟子升堂執經自為下說下說謂下語而講說之也乃封榮為關内侯食邑五千戸東觀記曰榮以尚書授朕十有餘年詩云日就月將示我顯徳行乃封之榮每疾病帝輙遣使者存問大官太醫相望於道及篤上疏謝恩讓還爵土帝幸其家問起居入街下車擁經而前撫榮垂涕賜以牀茵帷帳刀劒衣被良久乃去自是諸侯將軍大夫問疾者不敢復乗車到門皆拜牀下榮卒帝親自變服臨喪送𦵏賜冡塋于首山之}
