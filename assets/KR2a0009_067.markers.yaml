  - {type: variant, offset: 6455, length: 0, content: '', WYG: 楊賜夫人初鸞卒姑歸寧赴哀將至止於傳舍整飾從者而後入曄心非之及姑勞問終無所言號哭而已賜遣吏奉祠因縣發取祠具曄拒不受後每至京師未嘗舍宿楊氏其貞忮若此忮堅也賔客從者皆祗其志行一餐不受於人仕為郡功曹後舉孝廉有道方正茂才三公並辟皆不應初平中天下亂避地㑹稽遂浮海客交阯柬觀記曰礹到吳郡揚州刺史劉繇振給榖食衣服所乏者悉不受後東適㑹稽住止山隂縣故魯相鍾離意舍太守王朗餉給糧食布帛牛羊一無所留臨去之際屋中尺寸之物悉疏付主人纎㣲不漏移居揚州從事屈豫室中中庭橘樹一株遇實熟乃以竹籓樹四靣風吹落兩實以繩繫著樹枝每當危亡之急其志彌固賔客從者皆肅其行也越人化其節至閭里不為訟為凶人所誣遂死于合浦獄彬字彦林焉之兄孫也父麟字元鳯早有才恵華嶠書曰酆生麟也桓帝初為議郎入侍講禁中以直道牾左右出為許令許縣名今許州許昌縣也病免㑹母終麟不勝喪未祥而卒年四十一所著碑誄讃説書凡二十一篇案摯虞文章志麟文見在者十八篇有碑九首誄七首七說一首沛相郭府君書一首彬少與蔡邕齊名初舉孝廉拜尚書郎時中常侍曹節女壻馮方亦為郎彬厲志操與左丞劉歆右丞杜希同好交善未嘗與方共酒食之會方深怨之遂章言彬等為酒黨事下尚書令劉猛猛雅善彬等不舉正其事節大怒劾奏猛以為阿黨請收下詔獄在朝者為之寒心猛意氣自若旬日得出免官禁錮彬遂以廢光和元年卒於家年四十六諸儒莫不傷之所著七説及書凡三篇蔡邕等共論序其志僉以為彬有過人者四夙智早成岐嶷也夙早也岐行貌也嶷然有所識也詩曰克岐克嶷也劉攽曰案蔡邕本以早成為一徳傳寫之誤反以岐嶷在下當云夙智岐嶷早成也學優文麗至通也仕不茍禄絶髙也辭隆從窊潔操也窊下也音烏𤓰反乃共樹碑而頌焉劉猛琅邪人桓帝時為宗正直道不容自免歸家靈帝即位太傅陳蕃大將軍竇武輔政復徴用之論曰伏氏自東西京相襲為名儒以取爵位謂伏生已後至伏湛也中興而桓氏尤盛自榮至典世宗其道父子兄弟代作帝師受其業者皆至卿相顯乎當世孔子曰古之學者為已今之學者為人論語云也為人者憑譽以顯物為已者因心以㑹道桓榮之累世見宗豈其為已乎丁鴻傳丁鴻字孝公潁川定陵人也父綝字㓜春王莽末守潁陽尉世祖略地潁陽潁陽城守不下綝說其宰遂與俱降世祖大喜厚加賞勞以綝為偏將軍因從征伐綝將兵先渡河移檄郡國攻營略地下河南陳留潁川二十一縣建武元年拜河南太守及封功臣帝令各言所樂諸將皆占豐邑美縣唯綝願封本鄉或謂綝曰人皆欲縣子獨求鄉何也綝曰昔孫叔敖勑其子受封必求墝埆之地孫叔敖楚相也墝埆瘠薄之地叔敖將死戒其子曰王封汝必無居利地也楚越之間有寢丘者甚惡可長有以食也見呂氏春}
