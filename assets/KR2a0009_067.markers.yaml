  - {type: variant, offset: 1755, length: 1282, content: 君莫不好忠正而惡讒諛然而歷世之患莫不以忠正得罪讒諛蒙倖者蓋聽忠難從諛易也夫刑罪人情之所甚惡貴寵人情之所甚欲是以時俗為忠者少而習諛者多故令人主數聞其美稀知其過迷而不悟至於危亡臣伏見詔書顧念阿母舊德宿恩欲特加顯賞案尚書故事無乳母爵邑之制唯先帝時阿母王聖為野王君聖造生讒賊廢立之禍生為天下所咀嚼死為海內所歡快桀紂貴為天子而庸僕羞與為比者以其無義也夷齊賤為匹夫而王侯爭與為伍者以其有德也今阿母躬蹈約儉以身率下羣僚蒸庶莫不向風而與王聖並同爵號懼違本操失其常願臣愚以為凡人之心理不相遠其所不安古今一也百姓深懲王聖傾覆之禍民萌之命危於累卵常懼時世復有此類怵惕之念未離於心恐懼之言未絕乎口乞如前議歲以千萬給奉阿母內足以盡恩愛之歡外可不為吏民所怪梁冀之封事非機急宜過灾戹之運然後平議可否會復有地震緱氏山崩之異雄復上疏諫曰先帝封野王君漢陽地震今封山陽君而京城復震專政在陰其灾尤大臣前後瞽言封爵至重王者可私人以財不可以官宜還阿母之封以塞灾異今冀已高讓山陽君亦宜崇其本節雄言數切至娥亦畏懼辭讓而帝戀戀不能已卒封之後阿母遂以交遘失爵是時大司農劉據以職事被譴召詣尚書傳呼促步又加以捶撲雄上言九卿位亞三事班在大臣行有佩玉之節動有庠序之儀孝明皇帝始有撲罰皆非古典帝從而改之其後九卿無復捶撲者自雄掌納言多所匡肅每有章表奏議臺閣以為故事遷司隸校尉初雄薦周舉為尚書舉既稱職議者咸稱焉及在司隸又舉故冀州刺史馮直以為將帥而直嘗坐臧受罪舉以此劾奏雄雄悅曰吾嘗事馮直之父而又與直善今宣光以此奏吾乃是韓厥之舉也由是天下服焉明年坐法免後復為尚書永和三年卒周舉字宣光汝南汝陽人陳留太守防之子防在儒林傳舉姿貌短陋而博學洽聞為儒者所宗故京師為之語曰五經從橫周宣光延熹光四年辟司徒李郃府時宦者孫程等既立順帝誅滅諸閻議郎陳禪以為閻太后與帝無母子恩宜徙別館絕朝見羣臣議者咸以為宜舉謂郃曰昔鄭武姜謀殺嚴公嚴公誓之黃泉秦始皇怨母失行久而隔絕後感潁考叔茅焦之言循復子道書傳美之今諸閻新誅太后幽在離宮若悲愁生疾一日不虞主上將何以令於天下如從禪議後世歸咎明公宜密表朝廷令奉太后率厲羣臣朝覲如舊以厭天心以荅人望郃即上疏陳之明年正月帝乃朝于東宮太后由此以安後長樂少府朱倀代郃為司徒舉猶為吏時孫程等坐懷表上殿爭功帝怒悉徙封遠縣勑洛陽令促期發遣舉說朱倀曰朝廷在西鍾下時非孫程等豈立雖韓彭吳賈之功何以加諸今忘其大德錄其小過如道路夭折帝有殺功臣之譏及今未去宜急表之倀曰今詔怒二尚書已奏其事吾獨表此必致罪譴舉曰明公年過八十位為台輔不於今時竭忠報國惜身安寵欲以何求祿位雖全必陷佞邪之譏諫而獲罪猶有忠貞之名若舉言不足採請從此辭倀乃表諫帝果從之舉後舉茂才為平丘令上書言當世得失辭甚切正尚書郭虔應賀等見之歎息共上疏稱舉忠直欲帝置章御坐以為規誡舉稍遷并州刺史太原一郡舊俗以介子推焚骸有龍忌之禁至其亡月咸言神靈不樂舉火由是士民每冬中輒一月寒食莫敢煙爨老小不堪歲多死者舉既到州乃作弔書以置子推之廟言盛冬去火殘損民命非賢者之意以宣示愚民使還溫食於是衆惑稍解風俗頗革轉冀州刺史陽嘉三年司隸校尉左雄薦舉徵拜尚書舉與僕射黃瓊同心輔政名重朝廷左右憚之是歲河南三輔大旱五穀灾傷, WYG: ''}
