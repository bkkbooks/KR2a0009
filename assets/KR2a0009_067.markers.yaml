  - {type: variant, offset: 7769, length: 0, content: '', WYG: 兼衛尉屯南北宫於是收竇憲大將軍印綬憲及諸弟皆自殺時大郡口五六十萬舉孝廉二人小郡口二十萬并有蠻夷者亦舉二人帝以為不均下公卿㑹議鴻與司空劉方上言凡口率之科宜有階品蠻夷錯雜不得為數自今郡國率二十萬口嵗舉孝廉一人四十萬二人六十萬三人八十萬四人百萬五人百二十萬六人不滿二十萬二嵗一人不滿十萬三嵗一人帝從之六年鴻薨賜贈有加常禮子湛嗣湛卒子浮嗣浮卒子夏嗣東觀記及續漢書夏字作䕫也論曰孔子曰泰伯三以天下讓民無徳而稱焉此上論語載孔子之言也鄭𤣥注云泰伯周太王之長子次子仲雍次子季歴太王見季歴賢又生文王有聖人表故欲立之而未有命太王疾泰伯因適吳越採藥太王殁而不返季歴為喪主一讓也季歴赴之不来奔喪二讓也免喪之後遂斷髮文身三讓也三讓之美皆蔽隐不著故人無徳而稱焉孟子曰聞伯夷之風者貪夫廉懦夫有立志若乃泰伯以天下而違周伯夷率絜情以去國並未始有其讓也違去也未始猶未嘗也言泰伯伯夷率性清絜超然去國未嘗故有求讓之名故泰伯稱至徳伯夷稱賢人後世聞其讓而慕其風徇其名而昧其致所以激詭行生而取與妄矣狥營也言二子非故立讓風以求聲譽故至徳稱於前古後代之人直欲營慕其名而昧其深致所以激射詭譎之行生而取與之間多詐妄矣至夫鄧彪劉愷讓其弟以取義使弟受非服而已厚其名於義不亦薄乎彪讓國異母弟荆及鳳愷以國讓弟憲帝皆許焉弟不當襲爵故言非服而彪愷豈獨受美名而陷弟於不義也君子立言非茍顯其理將以啓天下之方悟者立行非獨善其身將以訓天下之方動者言行之所開塞可無慎哉原丁鴻之心主於忠愛乎何其終悟而從義也異夫數子類乎狥名者焉賛曰五}
