  - {type: variant, offset: 50, length: 0, content: '', WYG: 四百餘人湯為髙弟以才明知名榮年四十無子湯乃去榮妻為更娶生三子榮甚重之後拜郎中守開陽門候上微行夜還湯}
  - {type: variant, offset: 50, length: 0, content: '', krp: 四百餘人湯為髙弟以才明知名榮年四十無子湯乃去榮妻為更娶生三子榮甚重之後拜郎中守開陽門候上微行夜還湯}
  - {type: variant, offset: 53, length: 0, content: '', WYG: 納更從中東門入明旦召詣大官賜食諸門候皆奪俸建武十六年夏旱公卿皆暴露請雨洛陽令著車盖出門湯將衛士鉤令車收案有詔免令官拜湯虎賁中郎將上嘗歎曰糾糾武夫公侯干城何湯之謂也湯以明經嘗授太子推薦榮榮拜五更封闗内侯榮嘗言曰此皆何仲弓之力也拜為議郎賜錢十萬入使授太子劉攽曰案文入使當作使入每朝㑹輒令榮於公卿前敷奏經書帝稱善曰得生㡬晚㑹歐陽博士缺帝欲用榮榮叩頭讓曰臣經術淺薄不如同門生郎中彭閎揚州從事臯𢎞帝曰俞往汝諧續漢書曰閎字作明俞然也然其所舉勑令往言汝能和諧此官謝承書曰臯𢎞字奉卿吳郡人也家代為冠族少有英才}
  - {type: page-break, offset: 53, content: '', id: KR2a0009_WYG_067-2b, image: WYG0252/WYG0252-0809b.png}
  - {type: variant, offset: 53, length: 0, content: '', krp: 納更從中東門入明旦召詣大官賜食諸門候皆奪俸建武十六年夏旱公卿皆暴露請雨洛陽令著車盖出門湯將衛士鉤令車收案有詔免令官拜湯虎賁中郎將上嘗歎曰糾糾武夫公侯干城何湯之謂也湯以明經嘗授太子推薦榮榮拜五更封闗内侯榮嘗言曰此皆何仲弓之力也拜為議郎賜錢十萬入使授太子劉攽曰案文入使當作使入每朝㑹輒令榮於公卿前敷奏經書帝稱善曰得生㡬晚㑹歐陽博士缺帝欲用榮榮叩頭讓曰臣經術淺薄不如同門生郎中彭閎揚州從事臯𢎞帝曰俞往汝諧續漢書曰閎字作明俞然也然其所舉勑令往言汝能和諧此官謝承書曰臯𢎞字奉卿吳郡人也家代為冠族少有英才}
  - {type: variant, offset: 54, length: 1, content: 交, WYG: 桓榮相善子徽至司徒長史也因拜榮為博士引閎𢎞為議郎車駕幸太學㑹諸博士論難於前榮被服儒衣温恭有藴藉藴藉猶言寛博有餘也藴音於問反辯明經義每以禮讓相厭不以辭長勝人儒者莫之及厭服也音一葉反特加賞賜又詔諸生雅吹擊磬盡日乃罷吹管奏雅頌也後榮入㑹庭中詔賜竒果受者皆懐之榮獨舉手捧之以拜帝笑指之曰此真儒生也以是愈見敬厚常令止宿太子宫積五年榮薦門下生九江胡憲侍講乃聽得出旦一入而已榮嘗寢病太子朝夕遣中傅問病賜以珍羞帷帳奴婢謂曰如有不諱無憂家室也不諱謂死也死者人之常故言不諱也後病愈復入侍講二十八年大㑹百官詔問誰可傅太子者羣臣承望上意皆言太子舅執金吾原鹿侯隂識可言可任也博士張佚正色曰今陛下立太子為隂氏乎為天下乎即為隂氏則隂侯可為天下則固宜用天下之賢才帝稱善曰欲置傅者以輔太子也今博士不難正朕况太子乎即拜佚為太子太傅而以榮為少傅賜以輜車乗馬榮大㑹諸生陳其車馬印綬曰今日所蒙稽古之力也可不勉哉榮以太子經學成畢上疏謝曰臣幸得侍帷幄執經連年而智學淺短無以補益萬分今皇太子以聰叡之姿}
