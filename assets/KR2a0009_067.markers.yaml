  - {type: variant, offset: 4800, length: 1, content: 廉, WYG: 昭皇帝八嵗即位大臣輔政亦選名儒韋賢蔡義夏侯勝等入授於前平成聖徳韋賢字長孺魯國鄒人治魯詩蔡義河内温人也為韓詩給事中也夏侯勝魯人也字長公治歐陽尚書並見前書近建初元年張酺魏應召訓亦講禁中酺等並自有傳臣伏惟皇帝陛下躬天然之姿宜漸敎學而獨對左右小臣未聞典義昔五更桓榮親為帝師子郁結髮敦尚繼傳父業故再以校尉入授先帝父子給事禁省更歴四世今白首好禮經行篤備又宗正劉方宗室之表善為詩經先帝所襃宜令郁方並入敎授以崇本朝光示大化由是遷長樂少府}
