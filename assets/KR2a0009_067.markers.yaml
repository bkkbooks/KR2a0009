  - {type: variant, offset: 3786, length: 155, content: 風之應北鄉侯親為天子而葬以王禮故數有灾異宜加尊謚列於昭穆羣臣議者多謂宜如詔旨舉獨對曰昔周公有請命之應隆太平之功故皇天動威以章聖德北鄉侯本非正統姦臣所立立不踰歲年號未改皇天不祐大命夭昏春秋王子猛不稱崩魯子野不書葬今北鄉侯無它功德以王禮葬之於事已崇不宜稱謚灾眚之來弗由此也於是司徒黃尚太常桓焉等七十人同舉議帝從之尚, WYG: 郁}
