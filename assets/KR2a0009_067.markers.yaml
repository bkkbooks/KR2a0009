  - {type: variant, offset: 7770, length: 0, content: '', WYG: 待問應若鳴鐘禮記曰夙夜强學以待問又曰善待問者如撞鐘扣之以小者則小鳴扣之以大者則大鳴待其從容而後盡其聲不善答問者反此也庭列輜駕堂修禮容穆穆帝則擁經以從從就也丁鴻翼翼讓而不飾髙論白虎深言日食春秋經書日有食之杜預注云日食者月掩日聖人不言月掩日而以日食為文闕於所不見也後漢書卷六十七後漢書卷六十七考證丁鴻傳徙}
