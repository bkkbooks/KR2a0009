  - {type: variant, offset: 6763, length: 265, content: 太平而即位以來未有勝政諸梁秉權豎宦充朝重封累職傾動朝廷卿校牧守之選皆出其門羽毛齒革明珠南金之寶殷滿其室富擬王府埶回天地言之者必族附之者必榮忠臣懼死而杜口萬夫怖禍而木舌塞陛下耳目之明更為聾瞽之主故太尉李固杜喬忠以直言德以輔政念國亡身隕歿為報而坐陳國議遂見殘滅賢愚切痛海內傷懼又前白馬令李雲指言宦官罪穢宜誅皆因衆人之心以救積薪之敝弘農杜衆知雲所言宜行懼雲以忠獲罪故上書陳理之乞同日而死所以感悟國家庶雲獲免而雲既不辜衆又并坐天下尤痛益以怨結故朝野之人以忠為諱昔趙殺鳴犢孔子臨河而反夫覆巢破卵則鳳皇不翔刳牲夭胎則麒麟不臻誠物類相感理使其然, WYG: ''}
