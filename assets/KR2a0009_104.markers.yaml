  - {type: variant, offset: 996, length: 0, content: '', WYG: 說高祖曰順徳者昌逆徳者亡兵出無名事故不成音義曰有名伐有罪也竊為公懼之圖等曰武王伐紂不為不義况兵加曹操而云無名且公師徒精勇将士思奮而不及時早定大業所謂天與不取反受其咎史記范蠡謂句踐曰天與不取反受其咎此越之所以霸吳之所以滅也監軍之計在於持牢而非見時知幾之變也紹納圖言圖等因是譖沮授曰授監統内外威震三軍若其浸盛何以制之夫臣與主同者亡此黄石之所忌也臣與主同者權在於主也主與臣同者權在臣也黄石者即張良於下邳圯上所得者三畧也圯音以之反劉攽曰注案文但當云臣與主同者權在臣也誤出於主也主與臣同者權在十字且御衆於外不宜知内淮南子曰國不可從外理軍不可從中御紹乃分授所綂為三都督使授及郭圖淳于瓊各典一軍未及行}
