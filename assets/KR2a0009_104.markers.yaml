  - {type: variant, offset: 1131, length: 0, content: '', WYG: 莫不假以為名及臨場決敵則悍夫爭命悍勇也深籌髙議則智士傾心盛哉乎其所資也韓非曰狠剛而不和愎過而好勝嫡子輕而庶子重斯之謂亡徴韓非亡徴篇曰狠剛而不和愎諫而好勝不顧社稷而輕為信者可亡也又曰太子輕庻子伉可亡也又曰太子卑而庶子尊可亡也劉表道不相越而欲臥收天運擬蹤三分其猶木禺之於人也}
  - {type: page-break, offset: 1131, content: '', id: KR2a0009_WYG_104-50a, image: WYG0253/WYG0253-0467a.png}
