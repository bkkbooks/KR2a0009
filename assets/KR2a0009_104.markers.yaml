  - {type: variant, offset: 1011, length: 0, content: '', WYG: 年長沙太守張羡率零陵桂陽三郡畔表表遣兵攻圍破羡平之英雄記曰張羡南陽人先作零陵桂陽守甚得江湘間心然性屈彊不順表薄其為人不甚禮也羡因是懷恨遂畔表於是開土遂廣南接五嶺裴氏廣州記云大庾始安臨賀桂陽揭陽是謂五嶺鄧徳明南康記曰大庾一也桂陽甲騎二也九眞都龐三也臨賀萌渚四也始安越城五也北據漢川地方數千里帯甲十餘萬初荆州人情好擾加四方駭震冦賊相扇處處麋沸表招誘有方威懷兼洽其姦猾宿賊更為效用萬里肅清大小咸悅而服之關西兗豫學士歸者蓋有千數表安慰賑贍皆得資全遂起立學校博求儒術綦母闓宋忠等闓音開撰立五經章句謂之後定愛民養士從容自保及曹操與袁紹相持於官度紹遣人求助表許之不至亦不援曹操且欲觀天下之變從事中郎南陽韓嵩先賢行狀曰嵩字徳髙義陽人少好學貧不改操别駕劉先說表零陵先賢傳曰先字始宗博學强記尤好黄}
  - {type: page-break, offset: 1011, content: '', id: KR2a0009_WYG_104-46a, image: WYG0253/WYG0253-0465a.png}
