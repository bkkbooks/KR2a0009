  - {type: variant, offset: 1144, length: 0, content: '', WYG: 下文云操至乃釋嵩之囚此史家欲歸美於操而不顧上下文之相戾也何焯曰魏志云知嵩無他乃止是則嵩未嘗見囚實勸琮降也封者十五人焉知嵩不在其中范書兼採傅子弗誅而囚之說後又補釋嵩之囚一語而仍陳氏越嵩及東曹掾云云乃不覺違反也韓嵩二字宜存而論之後漢書卷一百四下考證}
