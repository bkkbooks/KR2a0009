  - {type: variant, offset: 845, length: 1, content: 月, WYG: 子譚字顯思熙字顯雍尚字顯甫譚長而惠尚少而美紹後妻劉有寵而偏愛尚數稱於紹紹亦竒其姿容欲使傳嗣乃以譚繼兄後出為青州刺史沮授諫曰世稱萬人逐兔一人獲之貪者悉止分定故也愼子曰走於街百人追之貪人俱存人莫之非者以為未定分也積兔滿市過不能顧非不欲也分定之後雖鄙不争子思子商君書並載其詞畧同且年均以賢徳均則卜古之制也左傳曰王后無嫡則擇立長年鈞以徳徳鈞以卜願}
