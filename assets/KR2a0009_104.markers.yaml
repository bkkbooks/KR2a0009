  - {type: variant, offset: 992, length: 1, content: 車, WYG: 我取其逸如此可坐定也郭圖審配曰兵書之法十圍五攻敵則能戰十倍則圍之五倍則攻之今以明公之神武連河朔之强衆以伐曹操兵埶譬若覆手前書陸賈謂南越王曰越殺王降漢如反覆手耳今不時取後難圖也授曰蓋救亂誅㬥謂之義兵恃衆憑强謂之驕兵義者無敵驕者先滅前書魏相上書曰救亂誅㬥謂之義兵兵義者王敵加於已不得已而起者謂之應兵兵應者勝争恨小故不勝忿怒者謂之忿兵兵忿者敗利人土地貨寳者謂之貪兵兵貪者破恃國家之大矜人庶之衆欲見威於敵者謂之驕兵兵驕者滅此非但人事乃天道也曹操奉}
