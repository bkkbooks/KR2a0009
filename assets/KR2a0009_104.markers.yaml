  - {type: variant, offset: 991, length: 0, content: '', WYG: 殺蒙恬恬不肯死使者即以屬吏繫於陽周恬喟然太息曰恬罪當死矣起臨洮屬之遼東城萬餘里此其中不能無絶地脉此乃恬之罪也遂吞藥自殺白起歔欷於杜郵也史記曰秦王免白起為士伍遷之隂宻白起既行出咸陽西門十里至杜郵秦王乃使使者賜之劒自裁太傅日磾位為師保任配東征而耗亂王命三輔決錄注曰馬日磾字翁叔馬融之族子少傳融業以才學進歴位九卿遂登台輔獻帝春秋曰日磾假節東征循撫州郡術在夀春不肅王命侮慢日磾借節觀之因奪不還從術求去而術不遣既以失節屈辱憂恚而死寵任非所凡所舉用皆衆所捐棄而容納其策以為謀主令臣骨肉兄弟還為讎敵交鋒接刃搆難滋甚臣雖欲釋甲投戈事不得已誠恐陛下日月之明有所不照四聰之聽有所不聞乞下臣章咨之羣賢使三槐九棘議臣罪戾周官曰三槐三公位焉左九棘孤卿大夫位焉右九棘公侯伯子男位焉鄭𤣥注曰槐之言懷也言懷來人於此欲與謀也樹棘以為位者取其赤心而外刺象以赤心有刺也若以臣今行權為釁則桓文當有誅絶之刑齊桓晉文時周室弱諸侯不朝桓文權行征伐率諸侯以朝天子若以衆不討賊為賢則趙盾可無書弑之貶矣臣雖小人志守一介若使得申明本心不愧先帝則伏首歐刀褰衣就鑊臣之願也惟陛下垂尸鳩之平尸鳩鴶鵴也詩國風曰尸鳩在桑其子七兮淑人君子其儀一兮毛萇注曰尸鳩之養其子旦從上下暮從下上平均如一言善人君子執義亦如此絶邪謟之論無令愚臣結恨三泉三者數之小終言深也前書曰下錮三泉於是以紹為太尉封鄴侯獻帝春秋曰使將作大匠孔融持節之鄴拜太尉紹為大將軍改封鄴侯時曹操自為大將軍紹耻為之下太尉位在大將軍上初武帝以衛青征伐有功以為大將軍欲尊寵之故置大司馬官號以冠之其後霍光王鳯等皆然明帝以弟東平王蒼有賢材以為驃騎大將軍以王故位公上和帝以舅竇憲征匈奴還遷大將軍在公上以勲戚者不拘常例焉偽表辭不受操大懼乃讓位於紹二年使將作大匠孔融持節拜紹大將軍錫弓矢節鉞虎賁百人禮含文嘉曰九錫一曰車馬二曰衣服三曰樂器四曰朱户五曰納陛六曰虎賁之士百人七曰斧鉞八曰弓矢九曰秬鬯春秋元命苞曰賜虎賁得專征伐賜斧鉞得誅也兼督冀青幽幷四州然後受之紹毎得詔書患有不便於己乃欲移天子自近使說操以許下埤埤亦下也音婢溼洛陽殘破宜徙都甄城甄音絹劉攽曰案文溼字當屬上句以就全實操拒之田豐說紹曰徙都之計既不克從宜早圖許奉迎天子動託詔令響號海内此筭之上者不爾終為人所禽雖悔無益也紹不從四年春擊公孫瓚遂定幽土事在瓚傳紹既幷四州之地衆數十萬而驕心轉盛貢御稀簡主簿耿包宻白紹曰赤徳衰盡袁為黄𦙍宜順天意獻帝春秋曰袁舜後黄應代赤故包有此言以從民心紹以包白事示軍府僚屬議者以包妖妄宜誅紹知衆情未同不得已乃殺包以弭其迹於是簡精兵十萬騎萬匹欲出攻許以審配逢紀統軍事田豐荀諶及南陽許攸為謀主顏良文醜為將帥沮授進說曰近討公孫師出歴年百姓疲敝倉庫無積賦役方殷此國之深憂也宜先遣使獻㨗天子務農逸人若不得通乃表曹操隔我王路然後進屯黎陽漸營河南益作舟舩繕脩器械分遣精騎抄其邊鄙令彼不得}
