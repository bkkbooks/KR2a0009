  - {type: variant, offset: 1038, length: 0, content: '', WYG: 假嵩一職不獲辭命劉攽曰案文當云辭不獲命則成天子之臣將軍之故吏耳在君為君不復為將軍死也惟加重思表以為憚使强之至許果拜嵩侍中零陵太守及還盛稱朝廷曹操之德勸遣子入侍表大怒以為懷貳陳兵詬嵩將斬之詬罵也嵩不為動容徐陳臨行之言表妻蔡氏知嵩賢諫止之表猶怒乃考殺從行者知無它意但囚嵩而已傅子曰表妻蔡氏諫之曰韓嵩楚國之望且其言直誅之無辭表乃不誅而囚之六年劉備自袁紹奔荆州表厚相待結而不能用也十三年曹操自将征表未至八月表疽發背卒代語曰表死後八十餘年晉太康中冡見發表及妻身形如生芬香聞數里也在荆州幾二十年家無餘積二子琦琮表初以琦貎類於己甚愛之後為琮娶其後妻蔡氏之姪蔡氏遂愛琮而惡琦毁譽之言日聞於表表寵躭後妻毎信受焉又妻弟蔡瑁及外甥張允並得幸於表又睦於琮而琦不自寧甞與琅邪人諸葛亮謀自安之術亮初不對後乃共升髙樓因令去梯謂亮曰今日上不至天下不至地言出子口而入吾耳可以言未亮曰君不見申生在内而危重耳居外而安乎申生晉獻公之太子為麗姬所譛乃自縊死重耳申生之弟懼麗姬之䜛出奔獻公卒重耳入是為文公遂為霸主見左氏傳𤦺意感悟隂䂓出計㑹表將江夏太守黄祖為孫權所殺𤦺遂求代其任及表病甚琦歸省疾素慈孝允等恐其見表而父子相感更有託後之意乃謂𤦺曰將軍命君撫臨江夏其任至重今釋衆擅來必見譴怒傷}
