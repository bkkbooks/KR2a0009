  - {type: variant, offset: 994, length: 0, content: '', WYG: 天子建宫許都今舉師南向於義則違且廟勝之策不在彊弱淮南子曰運籌於廟堂之中決勝乎千里之外曹操法令既行士卒精練非公孫瓚坐受圍者也今棄萬安之術而興無名之師前書曰新城}
