  - {type: variant, offset: 343, length: 1, content: 設, WYG: 韓融少府隂循執金吾胡母班将作大匠吳循越騎校尉王瓌譬解紹等諸軍紹使王匡殺班瓌吳循等海内先賢傳曰韓融字元長潁川人楚國先賢傳曰隂循字元基南陽新野人也漢末名士錄曰胡母班字季友泰山人名在八厨謝承書曰班王匡之妹夫匡受紹㫖收班繫獄欲殺以徇軍班與匡書畧曰足下拘僕於獄欲以釁鼓此何悖暴無道之甚者也僕與董卓何親戚義豈同惡足下張虎狼之口吐長蛇之毒恚卓遷怒何其酷哉死者人之所難然耻為狂夫所害若亡者有靈當訴足下於皇天夫婚姻者禍福之幾今日著矣曩為一體今為血讐亡人二女則君之甥身沒之後愼勿令臨僕尸骸匡得書抱班二子哭班遂死於獄袁術亦執殺隂循惟韓融以名德免是時豪傑既多附紹且感其家禍人思為報州郡蜂起莫不以袁氏為名韓馥見人情歸紹忌方得衆劉攽曰案方字無義蓋是其字恐將圖已常遣從事守紹門不聽發兵橋瑁乃詐作三公移書傳驛州郡說董卓罪惡天子危逼企望義兵以釋國難馥於是方聽紹舉兵乃謀於衆曰助袁氏乎助董氏乎治中劉惠勃然曰興兵為國安問袁董英雄記曰劉子惠中山人兗州刺史劉岱與其書道卓無道天下所共攻死在旦暮不足為憂但卓死之後當復回師討文節擁強兵何凶逆寜可得置封書與馥馥得此大懼歸咎子惠欲斬之别駕從事耿武等排閤伏子惠上願幷見斬得不死作徒被赭衣掃除宫門外劉攽曰注何凶逆案文何當作阿馥意猶深疑於紹毎貶節軍糧欲使離散明年馥將麴義反畔馥與戰失利紹既恨馥乃與義相結紹客逢紀謂紹曰英雄記曰紀字元圖初紹去董卓與許攸及紀俱詣冀州以紀聰達有計策甚親信之逢音龎夫舉大事非據一州無以自立今冀部强實而韓馥庸才可宻要公孫瓚将兵南下馥聞必駭懼幷遣辯士為陳禍福馥迫於倉卒必可因據其位紹然之益親紀即以書與瓚瓚遂引兵而至外託董卓劉攽曰案文少一討字緣託字誤脫而隂謀襲馥紹乃使外甥陳留高幹及潁川荀諶等魏志云諶荀彧之弟說馥曰公孫瓚乘勝來南而諸郡應之袁車騎引軍東向其意未可量也竊為將軍危之馥懼曰然則為之奈何諶曰君自料寛仁容衆為天下所附孰與袁氏馥曰不如也臨危吐決智勇邁於人又孰與袁氏馥曰不如也世布恩徳天下家受其惠又孰與袁氏馥曰不如也諶曰勃海雖郡其實州也言土廣也今將軍資三不如之埶久處其上袁氏一時之傑必不為將軍下也且公孫提燕代之卒其鋒不可當夫冀州天下之重資若兩軍幷力兵交城下危亡可立而待也夫袁氏將軍之舊且為同盟當今之計莫若舉冀州以讓袁氏必厚徳将軍公孫瓚不能復與之爭矣是將軍有讓賢之名而身安於太山也願勿有疑馥素性恇怯因然其計馥長史耿武别駕閔純騎都尉沮授聞而諫曰獻帝傳曰沮授廣平人少有大志多謀畧英雄記曰耿武字文威閔純字伯典後袁紹至馥從事十人棄馥去唯恐在後獨武純杖刀拒兵不能禁紹後令田豐殺此二人冀州雖鄙𢃄甲百萬穀支十年袁紹孤客窮軍仰我鼻息譬如嬰兒在股掌之上絶其哺乳立可餓殺柰何欲以州與之馥曰吾袁氏故吏且才不如本初度徳而讓古人所貴諸君獨何病焉先是馥從事趙浮程渙将强弩萬人屯孟津聞之率兵馳還請以拒紹馥又不聽英雄記曰紹在朝歌清水口浮等從後來船數百艘衆萬餘人整兵駭鼓過紹營紹甚惡之浮等到謂馥曰袁本初軍無斗糧各欲離散旬曰之間必土崩瓦解明将軍但閉户高枕何憂何懼乃避位出居中常侍趙忠故舍遣子送印綬以讓紹紹遂領冀州牧承制以馥為奮威將軍而無所將御引沮授為别駕因謂授曰今賊臣作亂朝廷遷移吾歴世受寵志竭力命興復漢室然齊桓非夷吾不能成霸句踐非范蠡不能存國今欲與卿戮力同心共安社稷將何以匡濟之乎授進曰將軍弱冠登朝播名海内値廢立之際忠義奮發單騎出奔董卓懷懼濟河而北勃海稽服稽音啓擁一郡之卒撮冀州之衆廣雅曰撮持也威陵河朔名重天下若舉軍東向則黄巾可掃還討黑山則張燕可滅黑山在今衛州衛縣西北}
