  - {type: variant, offset: 929, length: 0, content: '', WYG: 位尊倉卒之時功多者賞厚陛下播越非所洛邑乏祀海内傷心志士憤惋是以忠臣肝腦塗地肌膚横分而無悔心者義之所感故也今賞加無勞以擕有徳擕離也杜黜忠功以疑衆望斯豈腹心之逺圖将乃䜛慝之邪說使之然也臣爵為通侯位二千石殊恩厚徳臣既叨之豈敢闚覬重禮以希彤弓玈矢之命哉左氏傳曰王命尹氏策晉文公為侯伯賜之大路之服彤弓}
