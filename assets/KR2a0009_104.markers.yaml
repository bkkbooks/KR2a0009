  - {type: variant, offset: 1005, length: 0, content: '', krp: 鬬其間以求一朝之利願塞耳勿聽也若斬佞臣數人復相親睦以御四方可横行於天下譚不從尚復自將攻譚譚戰大敗嬰城固守前書蒯通曰必將嬰城固守音義曰嬰謂以城自繞也尚圍之急譚奔平原而遣潁川辛毗詣曹操請救魏志曰辛毗潁川陽翟人也譚使毗詣太祖求和毗見太祖致譚意太祖恱謂毗曰譚可信尚必可克不毗對曰明公無問信與詐也直言當論其埶耳袁氏本兄弟相伐非謂他人能間其間乃謂天下可定於已也一旦求救於明公此可知也劉攽曰注直言當論其埶耳案文多一言字劉表以書諫譚曰天降災害禍難殷流初交殊族卒成同盟使王室震蕩彛倫攸斁左傳曰震蕩播越書曰彛倫攸斁彛常也倫理也攸所也斁敗也是以智達之士莫不痛心入骨傷時人不能相忍也然孤與太公志同願等言太公者尊之謂紹也雖楚魏絶邈山河逈逺楚荆州也魏冀州也戮力乃心共奬王室左傳曰同好惡奨王室杜預曰奨助也使非族不干吾盟異類不絶吾好此孤與太公無貳之所致也功績未卒太公殂殞賢𦙍承統以繼洪業宣奕世之德履丕顯之祚奕重也國語曰奕代載德摧嚴敵於鄴都揚休烈於朔土顧定疆宇虎視河外凡我同盟莫不景附何悟青蠅飛於竿旌無忌游於二壘詩小雅曰營營青蠅止于榛䜛人罔極構我二人史記費無忌得寵於楚平王為太子建少傅無寵於太子日夜䜛太子於王欲誅太子太子亡奔宋左傳作無極竿旌二壘者謂譚尚也使股肱分成二體匈膂絶為異身初聞此問尚謂不然定聞信來乃知閼伯實沈之忿已成棄親即讎之計已決左傳子産曰髙辛氏有二子伯曰閼伯季曰實沈居於曠林不相能也日尋干戈以相征討旃斾交於中原暴尸累於城下聞之哽咽若存若亡昔三王五伯下及戰國君臣相弑父子相殺兄弟相殘親戚相滅蓋時有之然或欲以成王業若周公誅管蔡之類或欲以定霸功若齊桓公殺子糾也皆所謂逆取順守而徼富彊於一世也未有棄親即異兀其根本而能全於長世者也昔齊襄公報九世之讎公羊傳曰紀侯大去其國大去者何滅之也孰滅之也齊滅之曷為不言齊滅之為襄公諱也春秋為賢者諱何賢於襄公復讎也何讎爾逺祖也衆公烹於周紀侯譛之逺祖者幾代九代矣史記曰紀侯譛齊哀公於周周夷王烹哀公其弟靖立是為胡公弟獻公立子武公立子厲公立子文公立子成公立子荘公立子釐公立子襄公八年紀遷去其邑是為九代也士匄卒荀偃之事是故春秋美其義君子稱其信夫伯游之恨於齊未若太公之忿於曹也宣子之臣承業未若仁君之繼統也荀偃晋大夫也左傳曰荀偃将中軍士匄佐之伐齊濟河病目出及卒而視不可唅欒盈曰其為未卒事於齊故也士匄撫之曰主茍終所不嗣事於齊有如河乃暝受含伯游荀偃字也宣子即士匄也士爕之子士㑹之孫且君子違難不適讎國交絶不出惡聲左傳曰公山不狃曰君子違難不適讎國杜預曰違奔亡也史記樂毅遺燕恵王書曰臣聞古之君子交絶不出惡聲況忘先人之讎棄親戚之好而為萬世之戒遺同盟之耻哉蠻夷戎狄将有誚讓之言況我族類而不痛心邪夫欲立竹帛於當時全宗祀於一世豈宜同生分謗爭校得失乎若冀州有不弟之慠左傳曰叚不弟故不言弟無慙順之節仁君當降志辱身以濟事為務事定之後使天下平其曲直不亦為高義邪今仁君見憎於夫人未若鄭莊之於姜氏昆弟之嫌未若重華之於象敖然莊公卒崇大隧之樂象敖終受有鼻之封願捐棄百痾追攝舊義復為母子昆弟如初鄭武公娶於申曰武姜生莊公及叔段莊公寤生驚姜氏遂惡之愛叔段欲立之武公弗許及莊公立姜氏為請京使居之段繕甲兵将襲鄭夫人将啓之莊公遂寘姜氏於城潁而誓之曰不及黄泉無相見也既而悔之潁考叔曰君何患焉若闕地及泉隧而相見其誰曰不然從之公入而賦大隧之中其樂也融融姜出而賦大隧之外其欒也洩洩遂為母子如初事見左傳史記曰舜名重華父瞽叟盲而舜母死瞽叟更娶妻生象瞽叟愛後妻子常欲殺舜舜踐帝位封弟象為諸侯孟子曰象至不仁封諸有鼻仁人之於其弟也不藏怒焉不宿怨焉親愛之而已矣鼻國在永州營道縣北今猶謂之鼻亭今整勒士馬瞻望鵠立又與尚書諫之並不從魏氏春秋載表遺尚書曰知變起辛郭禍結同生追閼伯實沈之蹤忘常棣死喪之義親尋干戈僵尸流血聞之哽咽若存若亡昔軒轅有涿鹿之戰周公有商奄之師皆所以翦除穢害而定王業非強弱之爭喜怒之忿也故雖滅親不尤誅兄不傷今二君初承洪業纂繼前軌進有國家傾危之慮退有先公遺恨之負當唯曹是務唯國是康何者金木水火剛柔相濟然後剋得其和能為人用今青州天性峭急迷於曲直仁君度數𢎞廣綽然有餘當以大苞小以優容劣先除曹操以平先公之恨事定之後乃議曲直之評不亦善乎若留神逺圖剋己復}
