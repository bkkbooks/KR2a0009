  - {type: variant, offset: 345, length: 2, content: 賓隨, WYG: 州春秋曰燕本姓褚黄巾賊起燕聚少年為羣盜愽陵張牛角亦起與燕合燕推牛角為帥俱攻癭陶牛角為飛矢所中被創且死大會其衆告曰必以燕為帥牛角死衆奉燕故改姓張性剽悍㨗速過人故軍中號曰飛燕其後人衆浸廣常山趙郡中山上黨河内諸山谷皆相通號曰黑山也回師北首則公孫必禽震脇戎狄則匈奴}
  - {type: variant, offset: 345, length: 2, content: 賓隨, krp: 州春秋曰燕本姓褚黄巾賊起燕聚少年為羣盜愽陵張牛角亦起與燕合燕推牛角為帥俱攻癭陶牛角為飛矢所中被創且死大會其衆告曰必以燕為帥牛角死衆奉燕故改姓張性剽悍㨗速過人故軍中號曰飛燕其後人衆浸廣常山趙郡中山上黨河内諸山谷皆相通號曰黑山也回師北首則公孫必禽震脇戎狄則匈奴}
