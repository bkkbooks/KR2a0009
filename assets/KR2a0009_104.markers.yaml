  - {type: variant, offset: 81, length: 4, content: 禮儀志禮, WYG: 然乃遣授紹勃海太守封邟鄉侯前書潁川有周承休侯國元帝置元始二年更名邟音口浪反紹猶稱兼司隸初平元年紹遂以勃海起兵以從弟後将軍術劉攽曰以從案文以當作與冀州牧韓馥馥字文節潁川人也豫州刺史孔伷兗州刺史劉岱陳留太守張邈廣陵太守張超河内太守王匡山陽太守袁遺東郡太守橋瑁英雄記曰孔伷字公緒陳留人也王匡字公節泰山人也袁遺字伯業紹從弟術字公路汝南汝陽人也橋瑁字元瑋橋𤣥族子先為兗州刺史甚有}
