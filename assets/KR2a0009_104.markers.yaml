  - {type: variant, offset: 888, length: 0, content: '', WYG: 以中子熙為幽州刺史外甥高幹為幷州刺史建安元年曹操迎天子都許乃下詔書於紹責以地廣兵多而專自樹黨不聞勤王之師而但擅相討伐紹上書曰臣聞昔有哀歎而霜隕淮南子曰鄒衍事燕惠王盡忠左右譖之仰天而哭夏五月天為降霜悲哭而崩城者齊莊公攻莒為五乘之賔而杞梁獨不預歸而不食其母曰食汝生而無義死而無名則雖非五乘孰不汝笑生而有義死而有名則五乘之賔盡汝下也及與莒戰梁遂鬬殺二十}
  - {type: page-break, offset: 888, content: '', id: KR2a0009_WYG_104-12b, image: WYG0253/WYG0253-0448b.png}
  - {type: variant, offset: 888, length: 0, content: '', krp: 以中子熙為幽州刺史外甥高幹為幷州刺史建安元年曹操迎天子都許乃下詔書於紹責以地廣兵多而專自樹黨不聞勤王之師而但擅相討伐紹上書曰臣聞昔有哀歎而霜隕淮南子曰鄒衍事燕惠王盡忠左右譖之仰天而哭夏五月天為降霜悲哭而崩城者齊莊公攻莒為五乘之賔而杞梁獨不預歸而不食其母曰食汝生而無義死而無名則雖非五乘孰不汝笑生而有義死而有名則五乘之賔盡汝下也及與莒戰梁遂鬬殺二十}
  - {type: variant, offset: 889, length: 1, content: 郊, WYG: 人而死妻聞而哭城為之陁而隅為之崩見説苑毎讀其書謂為信然於今況之乃知妄作何者臣出身為國破家立事至於懷忠獲釁抱信見疑晝夜長吟剖肝泣血曾無崩城隕霜之應故鄒衍杞婦何能感徹臣以負薪之資負薪謂賤人也}
  - {type: page-break, offset: 889, content: '', id: KR2a0009_WYG_104-13a, image: WYG0253/WYG0253-0448c.png}
  - {type: variant, offset: 889, length: 1, content: 郊, krp: 人而死妻聞而哭城為之陁而隅為之崩見説苑毎讀其書謂為信然於今況之乃知妄作何者臣出身為國破家立事至於懷忠獲釁抱信見疑晝夜長吟剖肝泣血曾無崩城隕霜之應故鄒衍杞婦何能感徹臣以負薪之資負薪謂賤人也}
  - {type: variant, offset: 891, length: 3, content: 樂三雍, WYG: 記曰問士之子長幼長曰能負薪矣幼曰未能負薪拔於陪隸之中陪重也左傳曰王臣公公臣卿卿臣大夫大夫臣士士臣皁皁臣隸隸臣僚僚臣僕僕臣臺又曰是無陪臺也陪隸猶陪臺奉職憲臺擢授戎校常侍張讓等淊亂天常侵奪朝威賊害忠徳扇動姦黨故大將軍何進忠國疾亂義心赫怒以臣頗有一介之節可責以鷹犬之功故授臣以督司諮臣以方畧臣不敢畏憚强禦避禍求福與進合圖事無違異忠策未盡而元帥受敗元帥謂何進太后被質宫室焚燒陛下聖徳幼冲親遭戹困時進既被害師徒喪沮臣獨將家兵百餘人抽戈承明竦劒翼室山陽公載記曰紹與王匡等幷力入端門於承明堂上格殺中常侍高望等二人尚書曰延入翼室孔安國注翼明也室謂路寝虎叱羣司奮擊凶醜曾不浹辰罪人斯殄浹帀也左傳曰浹辰之間杜預曰十二日也此誠愚臣效命之一驗也會董卓乘虛所圖不軌臣父兄親從並當大位謂叔隗為太傅從兄基為太僕不憚一室之禍茍惟寧國}
  - {type: page-break, offset: 891, content: '', id: KR2a0009_WYG_104-13b, image: WYG0253/WYG0253-0448d.png}
  - {type: variant, offset: 891, length: 3, content: 樂三雍, krp: 記曰問士之子長幼長曰能負薪矣幼曰未能負薪拔於陪隸之中陪重也左傳曰王臣公公臣卿卿臣大夫大夫臣士士臣皁皁臣隸隸臣僚僚臣僕僕臣臺又曰是無陪臺也陪隸猶陪臺奉職憲臺擢授戎校常侍張讓等淊亂天常侵奪朝威賊害忠徳扇動姦黨故大將軍何進忠國疾亂義心赫怒以臣頗有一介之節可責以鷹犬之功故授臣以督司諮臣以方畧臣不敢畏憚强禦避禍求福與進合圖事無違異忠策未盡而元帥受敗元帥謂何進太后被質宫室焚燒陛下聖徳幼冲親遭戹困時進既被害師徒喪沮臣獨將家兵百餘人抽戈承明竦劒翼室山陽公載記曰紹與王匡等幷力入端門於承明堂上格殺中常侍高望等二人尚書曰延入翼室孔安國注翼明也室謂路寝虎叱羣司奮擊凶醜曾不浹辰罪人斯殄浹帀也左傳曰浹辰之間杜預曰十二日也此誠愚臣效命之一驗也會董卓乘虛所圖不軌臣父兄親從並當大位謂叔隗為太傅從兄基為太僕不憚一室之禍茍惟寧國}
  - {type: variant, offset: 896, length: 0, content: '', WYG: 故遂解節出奔創謀河外河外河南時卓方貪結外援招恱英豪故即臣勃海申以軍號即謂就拜也山陽公載記曰董卓以紹為前将軍封邟鄉侯紹受侯不受前將軍則臣之與卓未有纖芥之嫌若使茍欲滑泥揚波偷榮求利滑混也楚詞滑其泥揚其波則進可以享竊禄位退無門户之患然臣愚所守志無傾奪故遂引會英雄興師百萬飲馬孟津㰱血漳河獻帝春秋曰紹合冀州十郡守相衆數十萬登臺㰱血盟曰賊臣董卓承漢室之微負兵甲之衆陵越帝城跨蹈王朝幽鴆太后戮殺𢎞農提挈幼主越遷秦地殘害朝臣斬刈忠良焚燒宫室烝亂宫人發掘陵墓虐及鬼神過惡烝皇天濁穢薫后土神祗怨恫無所憑恃兆人泣血無所控告仁賢之士痛心疾首義士奮發雲興霧合咸欲奉辭伐罪躬行天誅凡我同盟之後畢力致命以伐凶醜同奨王室翼戴天子有渝此盟神明是殛俾墜其師無克祚國劉攽曰注凡我同盟之後案文當云同盟之人既盟之後此盟書常文也誤脫四字會故冀州牧韓馥懷挾逆謀欲專權埶絶臣軍糧不得踵係至使猾虜肆毒害及一門尊卑大小同日幷戮鳥獸之情猶知號呼禮記曰凡生天地之間者有血氣之屬必有知有知之屬莫不知愛其類今是夫鳥獸則失喪其羣匹越月踰時焉則必反巡過其故鄉翔回馬鳴號焉蹢躅焉踟蹰焉然後乃能去之小者至於燕爵猶有啁噍之頃焉然後乃能去之臣所以蕩然忘哀貎無隱戚者隱憂也誠以忠孝之節道不兩立顧私懷己不能全功斯亦愚臣破家徇國之二驗也又黄巾十萬焚燒青兗黑山張楊蹈藉冀域臣乃旋師奉辭伐畔金鼓未震狡敵知亡故韓馥懷懼謝咎歸土張楊黑山同時乞降臣時輙承制竊比竇融以議郎曹操權領兗州牧竇融行西河五郡大將軍事以梁綂為武威太守會公孫瓚師旅南馳陸掠北境臣即星駕席卷與瓚交鋒假天之威毎戰輙克臣}
