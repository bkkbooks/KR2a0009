  - {type: variant, offset: 4, length: 0, content: '', WYG: 今不早圖必為所制其新至疲勞襲之可禽也紹畏卓不敢發頃之卓議欲廢立謂紹曰天下之主宜得賢明每念靈帝令人憤毒毒恨也董侯似可今當立之紹曰今上富於春秋未有不善宣於天下若公違禮任情廢嫡立庶恐衆議未安卓按劒叱紹曰豎子敢然天下之事豈不在我我欲為之誰敢不從紹詭對曰此國之大事請出與太傅議之卓復言劉氏種不足復遺紹勃然曰天下健者豈惟董公横刀長揖徑出英雄記曰紹揖卓去坐中驚愕卓新至見紹大家故不敢害懸節於上東門洛陽城東北靣頭門也山陽公載記曰卓以袁紹棄節改}
