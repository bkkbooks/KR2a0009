  - {type: variant, offset: 1012, length: 6, content: 升自賓階至階, WYG: 明習漢家典故曰今豪桀並爭兩雄相持天下之重在於将軍若欲有為起乘其敝可也如其不然固将擇所宜從豈可擁甲十萬坐觀成敗求援而不能助見賢而不肯歸此兩怨必集於將軍恐不得中立矣曹操善用兵且賢俊多歸之其埶必舉袁紹然後移兵以向江漢恐将軍不能禦也今之勝計莫若舉荆州以附曹操操必重徳將軍長享福祚垂之後嗣此萬全之策也蒯越亦勸之表狐疑不斷乃遣嵩詣操觀望虛實謂嵩曰今天下未知所定而曹操擁}
