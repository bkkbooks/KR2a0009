  - {type: variant, offset: 1002, length: 0, content: '', WYG: 瓊等瓊等時宿在烏巢烏巢地名在滑州酸棗城東去紹軍四十里操自将歩騎五千人夜往攻破瓊等悉斬之曹瞞傳曰公聞許攸來跣出迎之攸勸公襲瓊等公大喜乃選精銳歩騎皆執袁軍旗幟銜枚縛馬口夜從間道出人把束薪所歴道問者語之曰袁公恐曹操鈔掠後軍還兵以益備問者信以為然既至圍屯大放火營中驚亂大破之盡燔其粮穀寶貨斬督將睢元進等割得將軍淳于仲簡鼻殺士卒千餘人皆取鼻牛馬割唇舌以示紹軍将士皆惶懼初紹聞操擊瓊謂長子譚曰就操破瓊吾拔其營彼固無所歸矣乃使高覽張郃等攻操營不下魏志曰張郃字雋文河間鄚人也郃說紹曰曹公精兵徃必破瓊等則事去矣郭圓曰郃計非也不如攻其本營郃曰曹公營固攻之必不拔若瓊等見禽吾屬盡為虜矣紹但遣輕騎救瓊而以重兵攻太祖營不能下太祖果破瓊等紹軍潰圖慙又更譛郃快軍敗郃懼歸太祖二将聞瓊等敗遂奔操於是紹軍驚擾大潰紹與譚等幅巾乗馬與八百騎度河至黎陽北岸入其將軍􅃽義渠營至帳下把其手曰孤以首領相付矣義渠避帳而處之使宣令焉衆聞紹在稍復集餘衆偽降曹操盡阬之前後所殺八萬人沮授為操軍所執乃大呼曰授不降也為所執耳操見授謂曰分野殊異遂用圯絶不圖今日乃相得也授對曰冀州失策自取奔北授知力俱困宜其見禽操曰本初無謀不相用計今喪亂過紀國家未定十二年曰紀方當與君圖之授曰叔父母弟懸命袁氏若蒙公靈速死為福操歎曰孤早相得天下不足慮也遂赦而厚遇焉授尋謀歸袁氏乃誅之紹外寛雅有局度憂喜不形於色而性矜愎自高愎音平逼反短於從善故至於敗及軍還或謂田豐曰君必見重豐曰公貎寛而内忌不亮吾忠而吾數以至言迕之若勝而喜必能赦我戰敗而怨内忌將發若軍出有利當蒙全耳今既敗矣吾不望生紹還曰吾不用田豐言果為所笑遂殺之先賢行状曰紹謂逢紀曰冀州人聞吾軍敗皆當念吾唯田别駕前諫止吾與衆不同吾亦慙之紀復曰豐聞将軍之退拍手大笑喜其言之中也紹於是有害豐之意􅀄太祖聞豐不從戎喜曰紹必敗矣及紹奔遁復曰向使紹用其别駕計尚未可知也官渡之敗審配二子為曹操所禽孟岱與配有隙因􅃽竒言於紹曰配在位專政族大兵强且二子在南必懷反畔郭圖辛評亦為然紹遂以岱為監軍代配守鄴䕶軍逢紀與配不睦英雄記曰審配任用與紀不睦辛評郭圖皆比於譚評辛昆兄也見魏志紹以問之紀對曰配天性烈直毎所言行慕古人之節不以二子在南為不義也公勿疑之紹曰君不惡之邪紀曰先所争者私情今所陳者國事紹曰善乃不廢配配由是更協冀州城邑多畔紹復擊定之自軍敗後發病七年夏薨魏志曰紹自軍破後發病歐血死獻帝春秋曰紹為人政寛百姓德之河北士女莫不傷怨市巷揮淚如或喪親典論曰袁紹妻劉氏性酷妒紹死僵尸未殯寵妾五人盡殺之為死者有知當復見紹於地下乃髠頭墨靣以毁其形尚又為盡殺死者之家未及定嗣逢紀審配宿以驕侈為譚所病辛評郭圖皆比於譚而與配紀有隙衆以譚長欲立之配等恐譚立而評等為害遂矯紹遺命奉尚為嗣後漢書卷一百四上後漢書卷一百四上考證袁紹傳紹壮徤好交結大将軍梁冀以下莫不善之何焯曰此指其父成衍紹字今不早圖必為所制其新至疲勞襲之可禽也何焯校本其字上増一及字将作大匠吳循魏志作吳脩在於持牢諸本皆作在於将軍臣良裘按三國志注中載獻帝傳作監軍之計在於持牢將軍二字傳寫之誤矣今改父嵩乞匄攜養注曹瞞傳及郭頒代語並云嵩夏侯氏子惇之叔父魏太祖於惇為從父兄弟也何焯曰惇淵之子皆與魏室締姻有以知曹瞞傳及郭頒代語之妄後漢書卷一百四上考證欽定四庫全書後漢書卷一百四下宋宣城太守范煜撰唐章懷太子賢注袁紹劉表列傳第六十四下袁紹傳子譚譚自稱車騎將軍出軍黎陽尚少與其兵而使逢紀隨之譚求益兵審配等又議不與譚怒殺逢紀曹操度河攻譚譚告急於尚尚乃留審配守鄴自将助譚與操相拒於黎陽自九月至明年二月大戰城下郭緣生述征記曰黎陽城西袁譚城城南又有一城是曹公攻譚之所築譚尚敗退操將圍之乃夜遁還鄴操進軍尚逆擊破操操軍還許譚謂尚曰我鎧甲不精故前為曹操所敗今操軍退人懷歸志及其未濟出兵掩之可令大潰此策不可失也尚疑而不許既不益兵又不易甲譚大怒郭圖辛評因此謂譚曰使先公出將軍為兄後者皆是審配之所搆也譚然之遂引兵攻尚戰於外}
