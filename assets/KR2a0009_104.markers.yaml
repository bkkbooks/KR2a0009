  - {type: variant, offset: 844, length: 0, content: '', WYG: 拜紹右将軍其冬車駕為李傕等所追於曹陽沮授說紹曰将軍累葉台輔世濟忠義今朝廷播越宗廟殘毁觀諸州郡雖外託義兵内實相圖未有憂存社稷䘏人之意且今州城粗定兵强士附西迎大駕即宫鄴都挾天子而令諸侯稸士馬以討不庭誰能禦之左傳周襄王出奔於鄭狐偃言於晉文公曰求諸侯莫如勤王諸侯信之且大義也繼文之業而信宣於諸侯今為可矣文公從之納襄王遂成霸業紹将從其計潁川郭圖淳于瓊曰九州春秋圖字公則漢室陵遲為日久矣今欲興之不亦難乎且英雄並起各據州郡連徒聚衆動有萬計所謂秦失其鹿先得者王史記曰蒯通曰秦失其鹿天下共追之高才者先得焉今迎天子動輒表聞從之則權輕違之則拒命非計之善者也授曰今迎朝廷於義為得於時為宜若不早定必有先之者焉夫權不失幾功不厭速願其圖之帝立既非紹意竟不能從紹有}
  - {type: page-break, offset: 844, content: '', id: KR2a0009_WYG_104-11b, image: WYG0253/WYG0253-0447d.png}
