  - {type: variant, offset: 1128, length: 2, content: 絜絜, WYG: 鴻臚以交友禮待之蒯越光禄勲劉先尚書令初表之結袁紹也侍中從事鄧義諫不聼義以疾退終表世不仕操以為侍中其餘多至大官操後敗於赤壁赤壁山名也在今鄂州蒲圻縣劉備表琦為荆州刺史明年卒論曰袁紹初以豪俠得衆遂懷雄霸之圖天下勝兵舉旗}
