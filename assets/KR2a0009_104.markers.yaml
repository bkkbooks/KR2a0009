  - {type: variant, offset: 1006, length: 0, content: '', krp: 當振旅長驅共奨王室若迷而不返遵而無改則胡夷將有誚讓之言況我同盟復能戮力仁君之役哉此韓盧東郭自困於前而遺田父之獲者也憤躍鶴望冀聞和同之聲若其泰也則袁族其與漢升降乎如其否也則同盟永無望矣表二書並見王粲傳曹操遂還救譚十月至黎陽尚聞操度河乃釋平原還鄴尚將呂曠高翔畔歸曹氏譚復隂刻将軍印以假曠翔操知譚詐乃以子整聘譚女以安之魏志曰整建安二十二年封郿侯二十三年薨無子黄初二年追進爵諡曰戴公而引軍還九年三月尚使審配守鄴復攻譚於平原配獻書於譚曰配聞良藥苦口而利於病忠言逆耳而便於行孔子家語曰忠言逆耳而利於行願將軍緩心抑怒終省愚辭蓋春秋之義國君死社稷忠臣死君命左傳晏嬰曰君為社稷死則死之為社稷亡則亡之晉解揚曰受命以出有死無隕死而成命臣之祿也茍圖危宗廟剝亂國家親疎一也左傳曰天實剝亂也是以周公垂涕以斃管蔡之獄左傳曰鄭子太叔曰周公殺管叔放蔡叔夫豈不愛王室故也季友歔欷而行叔牙之誅公羊傳曰公子牙卒何以不稱弟殺也為季子諱殺也莊公病叔牙曰魯一生一及君以知之慶父存也季子曰夫何敢是將為亂和藥而飲之曰公子從吾言而飲此則可以無為天下戮笑必有後於魯國誅不避兄弟君臣之義也劉攽曰注慶父存也案公羊云慶父也存何則義重人輕事不獲已故也昔先公廢黜將軍以續賢兄立我將軍以為嫡嗣上告祖靈下書譜牒海内逺近誰不備聞何意凶臣郭圖妄畫蛇足戰國策曰楚有祠者賜其舍人酒一巵相謂曰數人飲之不足一人飲之有餘請各畫地為蛇先成者飲酒一人蛇先成引酒且飲乃左手持酒右手畫蛇曰吾能為之足未成一人蛇成奪其巵曰蛇固無足子安能為足遂飲酒為蛇足者終亡其酒曲辭謟媚交亂懿親至令將軍忘孝友之仁襲閼沈之迹放兵鈔突屠城殺吏寃魂痛於幽㝠創痍被於草棘又乃圖獲鄴城許賞賜秦胡其財物婦女豫有分數又云孤雖有老母趣使身體完具而已聞此言者莫不悼心揮涕使太夫人憂哀憤隔我州君臣監寐悲歎誠拱黙以聼執事之圖則懼違春秋死命之節貽太夫人不測之患損先公不世之業我将軍辭不獲命以及館陶之役貽遺也不世猶言非常也獻帝春秋曰譚尚遂尋干戈以相征討譚軍不利保于平原尚乃軍于館陶譚擊之敗尚走保險譚追攻之尚設竒伏大破譚軍僵屍流血不可勝計譚走還平原伏惟將軍至孝蒸蒸發於岐嶷友于之性生於自然章之以聰明行之以敏達覽古今之舉措覩興敗之徴符輕榮財於糞土貴名位於丘岳何意奄然迷沈墮賢哲之操墮音許規反積怨肆忿取破家之禍翹企延頸待望讎敵委慈親於虎狼之牙以逞一朝之志豈不痛哉若乃天啓尊心革圖易慮則我將軍匍匐悲號於將軍股掌之上配等亦當敷躬布體以聼斧鑕之刑如又不悛禍将及之願熟詳吉凶以賜環玦孫卿子曰絶人以玦反人以環譚不納曹操因此進攻鄴審配將馮札為内應開突門内操兵三百餘人墨子備突篇曰城百歩一突門突門用車兩輪以木束之塗其上維置突門内度門廣狹之令人入門四尺中置窐突門旁為橐充竈狀又置艾寇即入下輪而塞之鼔橐薰之也配覺之從城上以大石擊門門閉入者皆死操乃鑿壍圍城周回四十里初令淺示若可越配望見笑而不出爭利操一夜濬之廣深二丈引漳水以灌之自五月至八月城中餓死者過半尚聞鄴急將軍萬餘人還救城操逆擊破之尚走依曲漳為營漳水之曲操復圍之未合尚懼遣隂䕫陳琳求降不聽尚還走藍口相州安陽縣界有藍嵯山與鄴相近蓋藍山之口操復進急圍之尚將馬延等臨陣降衆大潰尚奔中山盡收其輜重得尚印綬節鉞及衣物以示城中城中崩沮審配令士卒曰堅守死戰操軍疲矣幽州方至何憂無主操出行圍配伏弩射之幾中幾音祈中音竹仲反以其兄子榮為東門校尉榮夜開門内操兵配拒戰城中生獲配操謂配曰吾近行圍弩何多也配曰猶恨其少操曰卿忠於袁氏亦自不得不爾意欲活之配意氣壯烈終無撓辭見者莫不歎息遂斬之先賢行狀曰是日先縛配將詣帳下辛毗等逆以馬鞭擊其頭罵之曰奴汝今日眞死矣配顧曰狗輩由汝曹破冀州恨不得殺汝太祖既有意活配配無撓辭辛毗等號哭不已乃殺之全尚母妻子還其財寶高幹以幷州降復為刺史曹操之圍鄴也譚復背之因略取甘陵安平勃海河間攻尚於中山尚敗走故安從熙而譚悉收其衆還屯龍湊十二月曹操討譚軍其門譚夜遁奔南皮臨清河而屯明年正月急攻之譚欲出戰軍未合而破譚被髪驅馳追者意非恒人趨奔之趨音促譚墮馬顧曰咄兒過我我能富貴汝言未絶口頭已斷地於是斬郭圖等戮其妻子熙尚為其將焦觸張南所攻奔遼西烏桓觸自號幽州刺史驅率諸郡太守令長背袁向曹陳兵數萬殺白馬盟令曰違者斬衆莫敢仰視各以次㰱至别駕代郡韓珩珩音行曰吾受袁公父子厚恩今其破亡智不能救勇不能死於義闕矣若乃北面曹氏所不能為也一坐為珩失色觸曰夫舉大事當立大義事之濟否不待一人可卒珩志以厲事君先賢行狀曰珩字子佩代郡人清粹有雅量少喪父母奉養兄姊宗族稱弟也曹操聞珩節甚高之屢辟不至卒於家高幹復叛執上黨太守舉兵守壺口關潞州上黨縣有壺山口因其險而置關焉十一年曹操自征幹幹乃留其将守城自詣匈奴求救不得獨與數騎亡欲南奔荆州上洛都尉捕斬之典論曰上洛都尉王琰獲高幹以功封侯其妻哭於室以為琰富貴將更娶妾媵故也十二年曹操征遼西擊烏桓尚熙與烏桓逆操軍戰敗走乃與親兵數千人奔公孫康於遼東尚有勇力先與熙謀曰今到遼東康必見我我獨為兄手擊之且據其郡猶可以自廣也康亦心䂓取尚以為功乃先置精勇於廐中然後請尚熙熙疑不欲進尚彊之遂與俱入未及坐康叱伏兵禽之坐於凍地尚謂康曰未死之間寒不可忍可相與席康曰卿頭顱方行萬里何席之為遂斬首送之康遼東人父度初避吏為𤣥小吏稍仕劉攽曰𤣥案郡名皆作菟中平元年還為本郡守在職敢殺伐郡中名豪與已夙無恩者遂誅滅百餘家因東擊高句驪西攻烏桓威行海畔時王室方亂度恃其地逺隂獨懷幸㑹襄平社生大石丈餘下有三小石為足度以為已瑞襄平縣屬遼東郡故城在今平州盧龍縣西南魏志曰時襄平延里社生大石或謂度曰此漢宣帝冠石祥也里名與先君同社主土地明當有土地有三公輔也度益喜初平元年乃分遼東為遼西中遼郡並置太守越海收東萊諸縣為營州刺史為猶置也自立為遼東侯平州牧追封父延為建義侯立漢二祖廟承制設壇墠於襄平城南郊祀天地藉田理兵乘鸞輅九旒旄頭羽騎建安九年司空曹操表為奮威將軍封永寧郷侯度死康嗣故遂據遼土焉劉表傳劉表字景升山陽高平人魯恭王之後也恭王景帝子名餘身長八尺餘姿貎溫偉與同郡張儉等俱被訕議號為八顧詔書捕案黨人表亡走得免黨禁解辟大将軍何進掾初平元年長沙太守孫堅殺荆州刺史王叡王氏譜曰叡字通曜晉太保祥之伯父也吳錄曰叡見執驚曰我何罪堅曰坐無所知叡窮迫刮金飲之而死詔書以表為荆州刺史時江南宗賊大盛宗黨共為賊又袁術阻兵屯魯陽表不能得至乃單馬入宜城宜城縣屬南郡本鄢惠帝三年改名宜城請南郡人蒯越襄陽人蔡瑁與共謀畫傅子曰越字異度魏太祖平荆州與荀彧書曰不喜得荆州喜得異度耳表謂越曰宗賊雖盛而衆不附若袁術因之禍必至矣吾欲徴兵恐不能集其策焉出對曰理平者先仁義理亂者先權謀兵不在多貴乎得人袁術驕而無謀宗賊率多貪暴越有所素養者使人示之以利必持衆來使君誅其無}
  - {type: variant, offset: 1007, length: 0, content: '', WYG: 施其才用威德既行襁負而至矣兵集衆附南据江陵北守襄陽荆州八郡漢官儀曰荆州管長沙零陵桂陽南陽江陵武陵南郡章陵等是也可傳檄而定公路雖至無能為也表曰善乃使越遣人誘宗賊帥至者十五人皆斬之而襲取其衆唯江夏賊張虎陳坐擁兵據襄陽城表使越與龐季往譬之乃降江南悉平諸守令聞表威名多解印綬去表遂理兵襄陽以觀時變袁術與其從兄紹有隙而紹與表相結故術共孫堅合從襲表表敗堅遂圍襄陽㑹表将黄祖救至堅為流箭所中死餘衆退走典畧曰劉表夜遣將黄祖潛出兵堅逆與戰祖敗走􅇡峴山中堅乘勝夜追祖祖部兵從竹木間射堅殺之英雄記劉表將呂介將兵緣山向堅堅輕騎尋山討介介下兵射中堅頭應時物故與此不同及李傕等入長安冬表遣使奉貢傕以表為鎭南将軍荆州牧封成武侯假節以為已援建安元年驃騎將軍張濟}
