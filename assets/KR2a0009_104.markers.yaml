  - {type: variant, offset: 3, length: 0, content: '', WYG: 卷一百四上宋宣城太守范煜撰唐章懷太子賢注袁紹列傳第六十四上袁紹傳袁紹字本初汝南汝陽人司徒湯之孫父成五官中郎將袁山松書曰紹司空逢之孽子出後伯父成魏書亦同英雄記成字文開與梁冀結好言無不從京師諺曰事不諧問文開紹壯健好交結大将軍梁冀以下莫不善之紹少為郎除濮陽長遭母憂去官三年禮竟追感幼孤又行父服英雄記曰凡在冢廬六年服闋徙居洛陽紹有姿貎威容愛士養名英雄記曰紹不妄通賔客非海内知名不得相見又好游俠與張孟卓何伯求吳子卿許子逺皆為奔走之友既累世台司賔客所歸加傾心折節莫不爭赴其庭士無貴賤與之抗禮輜軿柴轂塡接街陌説文曰軿車衣車也鄭𤣥注周禮曰軿猶屏也取其自蔽隱柴轂賤者之車内官皆惡之中常侍趙忠言於省内曰袁本初坐作聲價好養死士不知此兒終欲何作叔父太傅隗聞而呼紹以忠言責之紹終不改後辟大将軍何進掾為侍御史虎賁中郎將中平五年初置西園八校尉以紹為佐軍校尉樂資山陽公載記曰小黄門蹇碩為上軍校尉虎賁中郎將袁紹為中軍校尉屯騎校尉鮑鴻為下軍校尉議郎曹操為典軍校尉趙融為助軍左校尉馮芳為助軍右校尉諫議大夫夏牟為左校尉淳于䕫為右校尉凡八人謂之西園軍皆統於碩此云佐軍與彼文不同靈帝崩紹勸何進徵董卓等衆軍脇太后誅諸宦官轉紹司隸校尉語已見何進傳及卓將兵至騎都尉太山鮑信說紹曰魏書曰信太山陽平人也少有大節寛厚愛人沈毅有謀說紹不從乃引軍還鄉里劉攽曰注案鮑信還鄉里安得引軍蓋軍當作歸或云軍字衍董卓擁制强兵將有異}
