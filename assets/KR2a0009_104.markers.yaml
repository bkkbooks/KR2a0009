  - {type: variant, offset: 348, length: 2, content: 寢殿, WYG: 定横大河之北合四州之地四州見下收英雄之士擁百萬之衆迎大駕於長安復宗廟於洛邑號令天下誅討未服以此爭鋒誰能禦之比及數年其功不難紹喜曰此吾心也左傳秦伯曰是吾心也即表授為奮武將軍使監護諸將魏郡審配鉅鹿田豐先賢行状曰配字正南少忠烈慷慨有不可犯之節紹領冀州委腹心之任豐字元皓天姿瓌傑雄畧多竒紹軍之敗也土崩奔走徒衆畧盡軍將皆撫膝而泣曰向使田豐在此不至於是並以正直不得志於韓馥紹乃以豐為别駕配為治中甚見器任馥自懷猜懼辭紹索去英雄記曰紹以河内朱漢為都官從事漢先時為馥所不禮内懷忿恨且欲徼迎紹意擅發城郭兵圍守馥第拔刃登屋馥走上樓收得馥大兒搥折兩脚紹亦立收漢殺之馥猶憂怖故報紹索去往依張邈後紹遣使詣邈有所計議因共耳語馥時在坐謂見圖謀無何如厠自殺九州春秋曰至厠因以書刀自殺其冬公孫讚大破黄巾還屯槃河爾雅有九河鉤槃是其一也故河道在今徳州昌平縣界入滄州樂陵縣今名枯槃河威震河北翼州諸城無不望風響應紹乃自擊之瓚兵三萬列為方陳分突騎萬匹翼軍左右其鋒甚銳紹先令麴義領精兵八百強弩千張以為}
