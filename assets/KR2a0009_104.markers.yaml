  - {type: variant, offset: 1137, length: 2, content: 物訖, WYG: 一劉表使備襲許悔無及也郭嘉曰劉表坐談客耳自知才不足以御備重任之則恐不能制輕之則備不為用雖違國逺征無憂矣公遂征之回皇冢嬖身穨業喪冢嫡也嬖愛也後漢書卷一百四下後漢書卷一百四下考證袁紹子譚初交殊族卒成同盟文義難曉疑有脫誤宣子之臣承業以魏氏春秋參校衍一臣字劉表傳與同郡張儉等俱被訕議號為八顧臣世駿按黨錮傳表儉二人列於八及前後不同時江南宗賊大盛注宗黨共為賊宗焯曰宗恐與巴賨之賨同義江夏賊張虎陳坐何焯校本坐改生蒯越韓嵩及東曹掾傅巽等說琮歸降劉攽曰按下文云釋嵩之囚此時嵩方見囚何得有說明多韓嵩二字若嵩有說亦當見封也日知錄曰是表卒之後琮已赦嵩而}
