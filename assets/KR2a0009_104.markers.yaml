  - {type: variant, offset: 1003, length: 1, content: 屏, WYG: 郛郭之門譚敗乃引兵還南皮南皮今滄州縣也章武有北皮亭故此曰南皮别駕王脩率吏人自青州往救譚譚還欲更攻尚問脩曰計将安出脩曰兄弟者左右手也譬人将鬬而斷其右手曰我必勝若如是者可乎夫棄兄弟而不親天下其誰親之屬有䜛人}
  - {type: variant, offset: 1003, length: 1, content: 屏, krp: 郛郭之門譚敗乃引兵還南皮南皮今滄州縣也章武有北皮亭故此曰南皮别駕王脩率吏人自青州往救譚譚還欲更攻尚問脩曰計将安出脩曰兄弟者左右手也譬人将鬬而斷其右手曰我必勝若如是者可乎夫棄兄弟而不親天下其誰親之屬有䜛人}
