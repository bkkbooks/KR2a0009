  - {type: variant, offset: 351, length: 3, content: 鍾鳴謁, WYG: 登瓚輕其兵少縱騎騰之義兵伏楯下一時同發瓚軍大敗斬其所置冀州刺史嚴綱獲甲首千餘級麴義追至界橋九州春秋曰還屯廣宗界橋今貝州宗城縣東有古界城此城近枯漳水則界橋蓋當在此之側也瓚歛兵還戰義復破之遂到瓚營拔其牙門眞人水鏡經曰凡軍始出立牙竿必令完堅若有折將軍不利牙門旗竿軍之精也即周禮司常職云軍旅會同置旌門是也餘衆皆走紹在後十數里聞瓚已破發鞍息馬唯衛帳下强弩數十張大㦸士百許人瓚散兵二千餘騎卒至圍紹數重射矢雨下田豐扶紹使却入空垣紹脫兠鍪抵地曰大丈夫當前鬬死而反逃垣墻間邪促使諸弩競發多傷瓚騎衆不知是紹頗稍引却會麴義來迎騎乃散退三年瓚又遣兵至龍湊挑戰紹復擊破之瓚遂還幽州不敢復出四年初天子遣太僕趙岐和解關東使各罷兵瓚因此以書譬紹曰趙太僕以周召之徳銜命來征宣掦朝恩示以和睦曠若開雲見日何喜如之昔賈復寇恂爭相危害遇世祖解紛遂同輿並出釁難既釋時人美之自惟邊鄙得與将軍共同斯好此誠將軍之羞而瓚之願也紹於是引軍南還三月上已大會賔徒於薄落津歴法三月建辰巳卯退除可以拂除災也韓詩曰溱與洧方洹洹兮薛君注云鄭國之俗三月上巳之辰兩水之上招䰟續魄拂除不祥故詩人願與所説}
