  - {type: variant, offset: 1132, length: 4, content: 陽氣布暢, WYG: 其如刻木為人無所知也前書有木禺龍一音義曰禺寄也寄龍形于木賛曰紹姿𢎞雅表亦長者稱雄河外擅彊南夏魚儷漢舳雲屯冀馬魚儷猶相次比也左傳曰奉公為魚儷之陳前書音義曰舳舡後持施處也左傳曰冀之北土馬之所生闚圖訊鼎禋天類社闚圖謂若劉歆圖書改名秀訊鼎謂楚子問王孫滿鼎輕重也國語曰精意以享謂之禋爾雅曰是類是禡師祭也社者隂類將興師故祭之旣云天工亦資人亮工者官也亮信也尚書曰天工人其代之又曰惟時亮天工矜彊少成坐談奚望九州春秋曰曹公征烏桓諸將曰今深入逺征}
  - {type: variant, offset: 1132, length: 4, content: 陽氣布暢, krp: 其如刻木為人無所知也前書有木禺龍一音義曰禺寄也寄龍形于木賛曰紹姿𢎞雅表亦長者稱雄河外擅彊南夏魚儷漢舳雲屯冀馬魚儷猶相次比也左傳曰奉公為魚儷之陳前書音義曰舳舡後持施處也左傳曰冀之北土馬之所生闚圖訊鼎禋天類社闚圖謂若劉歆圖書改名秀訊鼎謂楚子問王孫滿鼎輕重也國語曰精意以享謂之禋爾雅曰是類是禡師祭也社者隂類將興師故祭之旣云天工亦資人亮工者官也亮信也尚書曰天工人其代之又曰惟時亮天工矜彊少成坐談奚望九州春秋曰曹公征烏桓諸將曰今深入逺征}
