  - {type: variant, offset: 997, length: 1, content: 更, krp: 年左將軍劉備殺徐州刺史車胄據沛以背曹操操懼乃自将征備田豐說紹曰與公争天下者曹操也操今東擊劉備兵連未可卒解今舉軍而襲其後可一往而定兵以幾動斯其時也紹辭以子疾未得行豐舉杖擊地曰嗟乎事去矣夫遭難遇之幾而以嬰兒疾失其㑹惜哉紹聞而怒之從此遂疏焉曹操畏紹過河乃急擊備遂破之備奔紹紹於是進軍攻許田豐以既失前幾不宜便行諫紹曰曹操既破劉備則許下非復空虛且操善用兵變化無方衆雖少未可輕也今不如久持之将軍據山河之固擁四州之衆外結英雄内修農戰然後簡其精銳分為竒兵孫子兵法曰凡戰者以正合以竒勝也注云正者當敵竒者擊其不備乗虛迭出以擾河南救右則擊其左救左則擊其右使敵疲於奔命人不得安業我未勞而彼已困不及三年可坐剋也今釋廟勝之策而决成敗於一戰若不如志悔無及也紹不從豐强諫忤紹紹以為沮衆遂械繫之乃先宣檄曰蓋聞明主圖危以制變忠臣慮難以立權曩者强秦弱主趙高執柄專制朝命威福由己終有望夷之禍汙辱至今始皇崩胡亥立趙髙為丞相胡亥夢白虎齧其左驂馬殺之心不樂問占夢卜涇水為崇胡亥乃齋望夷宫趙髙令其壻閻樂逼胡亥使自殺張華云望夷之宫在長陵西北長平觀東臨涇水作之以望北夷事見史記及臻吕后禄產專政擅斷萬機決事禁省下陵上替海内寒心於是綘侯朱虛興威奮怒誅夷逆暴尊立太宗故能道化興隆光明融顯此則大臣立權之明表也吕后專制以兄子禄為趙王上将軍產為梁王相國各領南北軍吕后崩欲為亂綘侯周勃朱虛侯劉章等共誅之立文帝廟稱太宗左傳閔子馬曰下陵上替能無亂乎司空曹操祖父騰故中常侍與左悺徐璜並作妖孽饕餮放横傷化虐人貪財為饕貪食為餮悺音烏板反父嵩乞匄攜養續漢志曰嵩字巨髙靈帝時賣官嵩以貨得拜大司農大鴻臚代崔烈為太尉魏志曰嵩騰養子莫能審其生出本末曹瞞傳及郭頒代語並云嵩夏侯氏子惇之叔父魏太祖於惇為從父兄弟也匄亦乞也因臧買位輿金輦寶輸貨權門竊盜鼎司傾覆重器操姦閹遺醜本無令徳僄狡鋒俠好亂樂禍方言曰僄輕也魏志曰操少機警有權數而任俠放蕩不修行業鋒俠言其如鋒之利也僄音方妙反或作剽劫財物也音同幕府董綂鷹揚埽夷凶逆謂紹誅諸閹人無少長皆斬之續遇董卓侵官暴國左傳侵官冐也於是提劍揮鼓發命東夏廣羅英雄棄瑕錄用故遂與操參咨策略謂其鷹犬之才爪牙可任至乃愚佻短慮輕進易退傷夷折衂數喪師徒字書曰佻輕也魏志曰操引兵西将據成臯到滎陽汴水過卓將徐榮戰不利士卒死傷多操為流矢所中所乘馬被創曹洪以馬與操得夜遁又為呂布所敗幕府輙復分兵命銳修完補輯表行東郡太守兗州刺史被以虎文續漢志曰虎賁将冠鶡冠虎文單衣襄邑嵗獻織成虎文衣授以偏帥奨就威柄冀獲秦師一克之報秦穆公使孟明視西乞術白乙丙伐鄭晉襄公敗諸殽執孟明等文嬴請而舍之歸於秦穆公復用孟明伐晉晉人不敢出封殽尸而還事見左傳而遂乗資䟦扈肆行酷烈割剝元元殘賢害善太公金匱曰天道無親常與善人今海内陸沈於殷久矣何乃急於元元哉故九江太守邊讓英才儁逸以直言正色論不阿諂身被梟懸之戮妻孥受灰滅之咎自是士林憤痛人怨天怒一夫奮臂舉州同聲故躬破於徐方地奪於呂布魏志曰陶謙為徐州牧操初征之下十餘城後復征謙收五城遂畧地至東海還過郯會張邈與陳宫畔迎呂布郡縣皆應布西屯濮陽而操攻之布出兵戰操兵奔陳亂馳突火出墜馬燒左手掌司馬樓異扶操上馬遂得引去彷徨東裔蹈據無所幕府惟强幹弱枝之義且不登畔人之黨强幹弱枝解見班固傳左傳宋大夫魚石等以宋彭城畔屬楚經書宋彭城傳曰非宋地追書也且不登畔人也杜預注曰登成也故復援旍擐甲席卷赴征金鼓響震布衆破沮左傳曰擐甲執兵杜預注曰擐貫也前書揚雄曰雲徹席卷後無餘災魏志曰操襲定陶未拔會布至擊破之布將薛蘭李封屯鉅野操攻之布救蘭敗布走布復與陳宫將萬餘人來戰操時兵少設伏縱竒兵擊大破之布夜走東奔劉備拯其死亡之患復其方伯之任是則幕府無徳於兗土而有大造於操也左傳使呂相絶秦曰秦師克還無害則是我有大造於西也杜預注曰造成也會後鑾駕東反羣虜亂政時冀州方有北鄙之警匪遑離局北鄙之儆謂公孫瓚攻紹也左傳曰局部也杜預注曰逺其部曲為離局故使從事中郎徐勲就發遣操使繕修郊廟翼衛幼主而便放志專行威劫省禁卑侮王僚敗法亂紀坐召三臺專制朝政晉書曰漢官尚書為中臺御史為憲臺謁者為外臺是謂三臺爵賞由心刑戮在口所愛光五宗所怨滅三族五宗謂上至髙祖下及孫三族謂父族母族妻族羣談者受顯誅腹議者䝉隱戮大農顏異與張湯有隙人告異湯推異與客言詔令下有不便者異不言微反唇湯遂奏異九卿見令不便不入言而腹非論死見前書道路以目百辟鉗口國語曰厲王虐國人謗王召公告王曰人不堪命矣王怒得衛巫使監謗以告則殺之國人莫敢言道路以目周書曰賢哲鉗口小人鼓舌何休注公羊傳曰鉗以木銜其口也鉗或作拑音渠亷反尚書記期會公卿充員品而已前書賈誼曰大臣特以簿書不報期會之間以為大故故太尉楊彪歴典二司元綱極位續漢書曰彪代董卓為司空又代黄琬為司徒時袁術僣亂操託彪與術婚姻誣以欲圖廢置奏收下獄劾以大逆操因睚眦被以非罪篣楚幷兼五毒俱至獻帝春秋曰收彪下獄考實遂以策罷觸情放慝不顧憲章又議郎趙彥忠諫直言議有可納故聖朝含聽改容加錫操欲迷奪時明杜絶言路擅收立殺不俟報聞又梁孝王先帝母弟墳陵尊顯松柏桑梓猶宜恭肅操率將吏士親臨發掘破棺裸尸掠取金寶至令聖朝流涕士民傷懷前書曰孝文皇帝竇皇后生孝景帝梁孝王武又署發丘中郎將摸金校尉所過毁突無骸不露身處三公之官而行桀虜之態汙國虐民毒施人鬼加其細政苛慘科防互設矰繳充蹊阬穽塞路舉手挂網羅動足蹈機塪是以兗豫有無聊之人帝都有呼嗟之怨管子曰天下無道人在爵位者皆不自聊生歴觀古今書籍所載貪殘虐烈無道之臣於操為甚幕府方詰外姦未及整訓加意含覆冀可彌縫左傳曰彌縫敝邑杜預注曰彌縫猶補合而操豺狼野心潜包禍謀左傳曰楚司馬子良生子越椒令尹子文曰必殺之是子也熊虎之状而豺狼之聲弗殺必滅若敖氏諺曰狼子野心是乃狼也其可畜乎乃欲橈折棟梁孤弱漢室周易棟橈之凶不可有以輔也除忠害善專為梟雄往歲伐鼓北征討公孫瓚强禦桀逆拒圍一年操因其未破隂交書命欲託助王師以見掩襲故引兵造河方舟北濟會行人發露瓚亦梟夷故使鋒芒挫縮厥圖不果屯據敖倉阻河為固獻帝春秋曰操引軍造河託言助紹實圖襲鄴以為瓚援會瓚破滅紹亦覺之以軍退屯守敖倉乃欲運螳蜋之斧禦隆車之隧韓詩外傳曰齊荘公獵有螳蜋舉足將持其輪問其御曰此何蟲對曰此螳蜋也此蟲知進而不知退不量其力而輕就敵公曰此為天下勇士矣廻車避之勇士歸馬亦見淮南子又荘子曰螳蜋怒臂以當車轍不知其不勝任也隧道也幕府奉漢威靈折衝宇宙長㦸百萬胡騎千羣奮中黄育獲之士尸子曰黄伯曰我左執太行之獶右執彫虎唯象未試史記范睢說秦昭王烏獲任鄙之力慶忌夏育之勇也劉攽曰注尸子曰黄伯曰案文少一中字騁良弓勁弩之埶文子曰狡兔得而獵犬烹髙鳥盡而良弓藏史記蘇秦說韓王曰天下之强弓勁弩皆從韓出幷州越太行紹甥髙幹為幷州刺史故言越太行山而來助青州渉濟漯紹長子譚為青州刺史濟漯二水名在今齊州界漯音他合反大軍汎黄河以角其前荆州下宛葉而掎其後賈逵注國語曰從後牽曰掎音居蟻反左傳曰晉人角之諸戎掎之是也荆州謂劉表也與紹交故云下宛葉雷震虎歩並集虜廷若舉炎火以焚飛蓬楚詞曰離憂患而乃寤若縱火於秋蓬覆滄海而注熛炭黄石公三畧曰夫以義而討不義若决河而沈熒火其剋必也有何不消滅者哉當今漢道陵遲綱㢮網絶操以精兵七百圍守宫闕外稱陪衛内以拘質懼簒逆之禍因斯而作乃忠臣肝膽塗地之秋烈士立功之會也可不朂哉據陳琳集此檄陳琳之詞也魏志曰琳字孔璋廣陵人避難冀州袁紹使典文章紹敗歸太祖太祖謂曰卿昔為本初移書但可罪狀孤而已惡惡止其身何乃上及父祖邪琳謝罪太祖愛其才而不咎也流俗本此下有陳琳之辭者非也乃先遣顏良攻曹操别將劉延於白馬白馬縣屬東郡今滑州縣也故城在今縣東紹自引兵至黎陽沮授臨行會其宗族散資財以與之曰埶存則威無不加埶亡則不保一身哀哉其弟宗曰曹操士馬不敵君何懼焉授曰以曹兗州之明略又挾}
