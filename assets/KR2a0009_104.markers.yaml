  - {type: variant, offset: 1000, length: 0, content: '', krp: 以為資我雖剋伯珪衆實疲敝而主驕將忲軍之破敗在此舉矣揚雄有言六國蚩蚩為嬴弱姬今之謂乎法言之文也嬴秦姓也姬周姓方言蚩悖也六國悖惑侵弱周室遂為秦所倂也曹操遂救劉延擊顏良斬之蜀志曰曹公使張遼及關羽為先鋒羽望見良麾盖策馬刺良萬衆之中斬其首還諸將莫能當遂解白馬圍紹乃度河壁延津南酈元水經注曰漢孝文時河決酸棗東潰金堤大發卒塞之武帝作瓠子之歌皆謂此口也又東北謂之延津杜預注左傳陳留酸棗縣北有延津沮授臨舩歎曰上盈其志下務其功悠悠黄河吾其濟乎遂以疾退紹不許而意恨之復省其所部幷屬郭圖紹使劉備文醜挑戰曹操又擊破之斬文醜再戰而禽二将紹軍中大震操還屯官渡官渡在今鄭州中牟縣北酈元水經云莨蕩渠經曹公壘北有髙臺謂之官渡臺在中牟城北俗謂之中牟臺紹進保陽武陽武今鄭州縣沮授又說紹曰北兵雖衆而勁果不及南軍南軍穀少而資儲不如北南幸於急戰北利在緩師宜徐持久曠以日月紹不從連營稍前漸逼官渡遂合戰操軍不利魏志曰連營稍進前依沙塠東西四十里為屯操亦分營與相當復還堅壁紹為高櫓起土山射營中釋名曰樓櫓者露上無覆屋也今官度臺北土山猶在臺之東紹舊營遺基並在焉皆蒙楯而行楯今之旁排也揚雄羽獵賦曰蒙楯負羽獻帝春秋曰紹令軍中各持三尺繩曹操誠禽但當縛之劉攽曰注誠案文當作成操乃發石車擊紹樓皆破軍中呼曰霹靂車以其發石聲震烈呼為霹靂即今之抛車也抛音普孝反紹為地道欲襲操操輒於内為長壍以拒之又遣竒兵襲紹運車大破之盡焚其穀食相持百餘日河南人疲困多畔應紹紹遣淳于瓊等將兵萬餘人北}
  - {type: variant, offset: 1001, length: 0, content: '', WYG: 糧運沮授說紹可遣蔣竒别為支軍於表以絶曹操之鈔以支軍為瓊等表援紹不從許攸進曰曹操兵少而悉師拒我許下餘守埶必空弱若分遣輕軍星行掩襲許拔則操為成禽劉攽曰案文為成不須並出盖多為字如其未潰可令首尾奔命破之必也紹又不能用會攸家犯法審配收繫之攸不得志遂奔曹操而說使襲取淳}
