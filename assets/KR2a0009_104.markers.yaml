  - {type: variant, offset: 1007, length: 0, content: '', krp: 施其才用威德既行襁負而至矣兵集衆附南据江陵北守襄陽荆州八郡漢官儀曰荆州管長沙零陵桂陽南陽江陵武陵南郡章陵等是也可傳檄而定公路雖至無能為也表曰善乃使越遣人誘宗賊帥至者十五人皆斬之而襲取其衆唯江夏賊張虎陳坐擁兵據襄陽城表使越與龐季往譬之乃降江南悉平諸守令聞表威名多解印綬去表遂理兵襄陽以觀時變袁術與其從兄紹有隙而紹與表相結故術共孫堅合從襲表表敗堅遂圍襄陽㑹表将黄祖救至堅為流箭所中死餘衆退走典畧曰劉表夜遣將黄祖潛出兵堅逆與戰祖敗走竄峴山中堅乘勝夜追祖祖部兵從竹木間射堅殺之英雄記劉表將呂介將兵緣山向堅堅輕騎尋山討介介下兵射中堅頭應時物故與此不同及李傕等入長安冬表遣使奉貢傕以表為鎭南将軍荆州牧封成武侯假節以為已援建安元年驃騎將軍張濟}
  - {type: variant, offset: 1008, length: 2, content: 阼階, WYG: 關中走南陽因攻穰城中飛矢而死荆州官屬皆賀表曰濟以窮來主人無禮至於交鋒此非牧意牧受弔不受賀也使人納其衆衆聞之喜遂皆服從獻帝春秋曰濟引衆入荆州賈翊隨之歸劉表襄陽城守不受濟因攻之為流矢所中濟從子繡收衆而退劉表自責以為己無賔主禮遣使招繡繡遂屯襄陽為表北藩}
