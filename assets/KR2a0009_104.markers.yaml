  - {type: variant, offset: 897, length: 2, content: 矣養, WYG: 公族子弟生長京輦頗聞爼豆不習干戈加自乃祖先臣以來世作輔弼咸以文徳盡忠得免罪戾臣非與瓚角戎馬之埶争戰陳之功者也誠以賊臣不誅春秋所貶公羊傳曰趙盾弑其君夷臯弑者趙穿也曷為加之趙盾不討賊也趙盾曰天乎予無辜史曰爾為仁為義人弑爾君而復國不討賊非弑如何茍云利國專之不疑左傳曰茍利社稷專之可也故冒踐霜雪不憚劬勤實庶一㨗之福以立終身之功社稷未定臣誠耻之太僕趙岐衘命來征宣明陛下含𢎞之施蠲除細故與下更新奉詔之日引師南轅左傳曰令尹南轅反斾杜預曰回軍南向是臣畏怖天威不敢怠慢之}
