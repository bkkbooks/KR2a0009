  - {type: variant, offset: 1049, length: 3, content: 酳祝鯁, WYG: 傷焉遂以琮為嗣琮以侯印授琦𤦺怒投之地將因奔喪作難㑹曹操軍至新野𤦺走江南蒯越韓嵩及東曹掾傅巽等說琮歸降傅子曰巽字公悌瓌瑋博達有知人鑒識劉攽曰正文蒯越韓嵩及東曹掾傅巽案下文云釋嵩之囚則此時嵩方見囚何得有說明多韓嵩二字若嵩有說亦當見封也琮曰今與諸君據全楚之地守先君之業以觀天下何為不可巽曰逆順有大體彊弱有定埶以人臣而拒人主逆道也以新造之楚而禦中國必危也以劉備而敵曹公不當也三者皆短欲以抗王師之鋒必亡之道也将軍自料何與劉備琮曰不若也巽曰誠以劉備不足禦曹公則雖全楚不能以自存也誠以劉備足禦曹公則備不為將軍下也願將軍勿疑及操軍到襄陽琮舉州請降劉備奔夏口夏口城今之鄂州也左傳吳伐楚楚沈尹戌奔命於夏汭杜預注曰漢水入口今夏口也劉攽曰注漢水入口案口當作江操以琮為青州刺史封列侯蒯越等侯者十五人乃釋嵩之囚劉攽曰案韓嵩事}
