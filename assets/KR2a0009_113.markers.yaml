  - {type: variant, offset: 1616, length: 288, content: 正臣欲篡厥妖狗冠出後靈帝寵用便嬖子弟永樂賓客鴻都羣小傳相汲引公卿牧守比肩是也又遣御史於西鄉邸賣官關內侯顧五百萬者賜與金紫詣闕上書占令長隨縣好醜豐約有賈強者貪如豺虎弱者略不類物實狗而冠者也司徒古之丞相壹統國政天戒若曰宰相多非其人尸祿素餐莫能據正持重阿意曲從今在位者皆如狗也故狗走入其門靈帝數遊戲於西園中令後宮采女為客舍主人身為商賈服行至舍采女下酒食因共飲食以為戲樂此服妖也其後天下大亂獻帝建安中男子之衣好為長躬而下甚短女子好為長裙而上甚短時益州從事莫嗣以為服妖是陽無下而陰無上也天下未欲平也後還遂大亂靈帝光和元年南宮侍中寺雌雞欲化雄一身毛皆似雄但頭冠尚未變詔以問議郎蔡邕邕對曰貌, WYG: 祀忽諸德}
