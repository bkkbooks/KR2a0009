  - {type: variant, offset: 323, length: 1, content: 荊, WYG: 人也少學黄老隐遯山谷因穴為室仰慕松喬導引之術與馬融蘇章鄉里並時融以才博顯名章以亷直為稱然皆推先於愼汝南吳蒼甚重之因遺書以觀其志曰仲彦足下勤處隐約雖乘雲行泥棲宿不同每有西風何嘗不歎汝南在扶風之東盖聞黄老之言乘虛入㝠藏身逺遯亦有理國養人施於為政老子曰致虛極守静篤又曰窈兮㝠兮其中有精又曰理大國若烹小鮮又曰非所以愛人治國也至如登山絶跡神不著其證人不覩其驗吾欲先生從其可者於意何如昔伊尹不懐道以待堯舜之君孟子曰湯使人以幣聘伊尹伊尹曰我何以湯之幣聘為哉豈若處畎畝之中由是以樂堯舜之道吾豈若使君為堯舜之君哉豈若使是人為堯舜之人哉劉攽曰注與我豈若處畎畝之中案文多豈若二字方今明明四海開闢巢許無為箕山夷齊悔入首陽足下審能騎龍弄鳳翔嬉雲間者列仙傳曰蕭史秦繆公時善吹簫公女弄玉好之以妻之}
