  - {type: variant, offset: 1260, length: 250, content: 寧中京都長者皆以葦方笥為具下士盡然時有識者竊言葦方笥郡國讞篋也今珍用之此天下人皆當有罪讞於理官也到光和三年癸丑赦令詔書吏民依黨禁錮者赦除之有不見文他以類比疑者讞於是諸有黨郡皆讞廷尉人名悉入方笥中靈帝好胡服胡帳胡牀胡坐胡飯胡空侯胡笛胡舞京都貴戚皆競為之此服妖也其後董卓多擁胡兵填塞街衢虜掠宮掖發掘園陵靈帝於宮中西園駕四白驢躬自操轡驅馳周旋以為大樂於是公卿貴戚轉相放效至乘輜軿以為騎從互相侵奪賈與馬齊案易曰時乘六龍以御天行天者莫若龍行地者莫如馬詩云四牡騤騤載是常服檀車煌煌四牡彭彭夫驢乃服重致遠上下山谷野, WYG: ''}
