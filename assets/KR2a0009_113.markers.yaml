  - {type: variant, offset: 2273, length: 361, content: 外東垣屋前後頓壞蔡邕對曰平城門正陽之門與宮連郊祀法駕所由從出門之最尊者也武庫禁兵所藏東垣庫之外障易傳曰小人在位上下咸悖厥妖城門內崩潛潭巴曰宮瓦自墮諸侯強陵主此皆小人顯位亂法之咎也其後黃巾賊先起東方庫兵大動皇后同父兄何進為大將軍同母弟苗為車騎將軍兄弟並貴盛皆統兵在京都其後進欲誅廢中官為中常侍張讓段珪等所殺兵戰宮中闕下更相誅滅天下兵大起三年二月公府駐駕廡自壞南北三十餘閒中平二年二月癸亥廣陽城門外上屋自壞也獻帝初平二年三月長安宣平城門外屋無故自壞至三年夏司徒王允使中郎將呂布殺太師董卓夷三族興平元年十月長安市門無故自壞至二年春李傕郭汜鬬長安中傕迫劫天子移置傕塢盡燒宮殿城門官府民舍放兵寇鈔公卿以下冬天子東還雒陽傕汜追上到曹陽虜掠乘輿輜重殺光祿勳鄧淵廷尉宣璠少府田邠等數十人五行傳曰好攻戰輕百姓飾城郭侵邊境則金不從革謂金失其性, WYG: 矣言雖泣}
