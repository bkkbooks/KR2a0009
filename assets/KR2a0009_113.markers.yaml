  - {type: variant, offset: 53, length: 2, content: 應劭, WYG: 范煜撰唐章懷太子賢注逸民列傳第七十三易稱遯之時義大矣哉又曰不事王侯高尚其事是以堯稱則天不屈潁陽之高潁陽謂巢許也武盡美矣終全孤竹之潔孤竹謂夷齊也自兹以降風流彌繁長往之軌未殊而感致之數匪一或隱居以求其志或曲避以全其道論語孔子曰隱居以求其志行義以達其道求志謂長沮桀溺全道若薛方詭對王莽也或靜已以鎭其躁謂逢萌之類也或去危以圖其安四皓之類也或垢俗以動其槩謂申徒狄鮑焦之流也或疵物以激其清梁鴻嚴光之流然觀其甘心畎畝之中憔悴江海之上莊子曰舜以天下讓北人無擇無擇曰異哉后之為人也居於畎畝之中而遊堯之門不若是而已又曰就藪澤處間曠此江海之士避代之人閒暇者之所好也豈必親魚鳥樂林草哉亦云性分所至而已分音符問反故䝉恥之賓屢黜不去其國列女傳曰桞下惠死其妻誄之曰蒙恥救人德彌大兮雖遇三黜終不敝兮蹈海之節千乘莫移其情史記曰魯連謂新垣衍曰秦即為帝則魯連蹈東海死耳魯連下聊城田單爵之魯連逃隱於海上也適使矯易去就則不能相為矣人各有所尚不能改其志孔子聞長沮桀溺之言乃告子路曰天下有道丘不與易也彼雖硜硜有類沽名者論語曰孔子擊磬于衞有荷蕢而過孔氏之門者曰有心哉擊磬乎既而曰鄙哉硜硜乎莫已知也又子貢曰有美玉於斯蘊櫝而藏諸求善價而沽諸子曰沽之哉沽之哉我待價者也沽謂衒賣也然而蟬蛻囂埃之中自致寰區之外異夫飾智巧以逐浮利者乎荀卿有言曰志意脩則驕富貴道義重則輕王公也荀卿子之文也漢室中微王莽簒位士之蘊藉義憤甚矣是時裂冠毁冕相􅂝持而去之者蓋不可勝數左傳曰王使詹桓伯辭於晉曰伯父若裂冠毁冕㧞本塞源毛詩序曰百姓莫不相攜持而去之也揚雄曰鴻飛㝠㝠弋者何簒焉言其違患之遠也簒字諸本或作慕法言作簒宋𠂻曰簒取也鴻高飛㝠㝠薄天雖有弋人何施巧而取也喻賢者隱處不離暴亂之害也然今人謂以計數取物為簒簒亦取也光武側席幽人求之若不及國語曰越王夫人去筓側席而坐韋昭註云側猶特也禮憂者側席而坐前書公孫𢎞贊曰上方欲用文武求之如弗及旌帛蒲車之所徵賁相望於巖中矣毛詩序曰干旄美好善也其詩曰孑孑干旌在浚之城易賁卦六五曰賁于丘園東帛戔戔蒲車以蒲裹輪取其安前書武帝以蒲車徵魯申公也若薛方逢萌聘而不肯至前書薛方字子容嚴光周黨王霸至而不能屈羣方咸遂志士懷仁斯固所謂舉逸民天下歸心者乎論語文也肅宗亦禮鄭均而徵高鳳以成其節自後帝德稍衰邪㜸當朝處子耿介羞與卿相等列至乃抗憤而不顧多失其中行焉蓋錄其絶塵不反莊子曰顔回問於仲尼曰夫子歩亦歩夫子趨亦趨夫子馳亦馳夫子奔軼絶塵則回瞠若乎後矣司馬彪注云言不可及也韓詩外傳曰山林之士往而不能反同夫作者列之此篇論語曰賢者辟世其次辟地其次辟色其次辟言子曰作者七人矣野王二老傳野王二老者不知何許人也初光武貳於更始會關中擾亂遣前將軍鄧禹西征送之於道旣反因於野王獵路見二老者即禽即就也易曰即鹿無虞也光武問曰禽何向並舉手西指言此中多虎臣每即禽虎亦即臣大王勿往也光武曰茍有其備虎亦何患父曰何大王之謬邪昔湯即桀於鳴條而大城於亳帝王紀曰按孟子桀卒於鳴條乃在東夷之地或言陳留平丘今有鳴條亭也唯孔安國注尚書云鳴條在安邑西考三說之驗孔為近之武王亦即紂於牧野而大城於郟鄏杜預注左傳曰今河南也河南縣西有郟鄏陌彼二王者其備非不深也是以即人者人亦即之雖有其備庸可忽乎光武悟其旨顧左右曰此隱者也將用之辭而去莫知所在向長傳向長字子平高士傳向字作尚河内朝歌人也隱居不仕性尚中和好通老易貧無資食好事者更饋焉受之取足而反其餘王莽大司空王邑辟之連年乃至欲薦之於莽固辭乃止潛隱於家讀易至損益卦喟然歎曰吾已知富不如貧貴不如賤但未知死何如生耳易損卦曰二簋可用享損益盈虚與時偕行益卦曰損上益下民說无彊也建武中男女娶嫁既畢勅斷家事勿相關當如我死也於是遂肆意與同好北海禽慶前書慶字子夏俱遊五嶽名山竟不知所終逢萌傳逢萌字子慶北海都昌人也劉攽曰案萌北海人則當是蓬非逢也家貧}
