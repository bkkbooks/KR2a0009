  - {type: variant, offset: 4661, length: 151, content: 年無孑遺言自中興以來荊州無破亂及劉表為牧民又豐樂至此逮八九年當始衰者謂劉表妻當死諸將並零落也十三年無孑遺者言十三年表又當死民當移詣冀州也順帝陽嘉元年十月中望都蒲陰狼殺童兒九十七人時李固對策引京房易傳曰君將無道害將及人去之深山以全身厥災妖狼食人陛下覺寤比求隱滯故狼災息靈帝建寧中羣狼數十頭入晉陽南城門齧人, WYG: 考證}
