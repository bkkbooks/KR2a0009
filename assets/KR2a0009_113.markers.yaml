  - {type: variant, offset: 335, length: 1, content: 竇, WYG: 為侍御史王莽簒位稱病歸鄉里家富好給施尚俠氣食客嘗三四百人時人為之語曰關東大豪戴子高良少誕節母憙驢鳴憙音虛記反良嘗學之以娛樂焉及母卒兄伯鸞居廬啜粥非禮不行良獨食肉飲酒哀至乃哭而二人俱有毁容或問良曰子之居喪禮乎良曰然禮所以制情佚也情茍不佚何禮之論夫食㫖不甘故致毁容之實若味不存口食之可也論者不能奪之良才旣髙逹而論議尚竒多駭流俗同郡謝季孝問曰子自視天下孰可為比良曰我若仲尼長東魯大禹出西羌帝王紀曰夏禹生於石紐長於西羌西夷之人也獨歩天下誰與為偶舉孝亷不就再辟司空府彌年不到州郡迫之乃遯辭詣府遯遜也悉將妻子既行在道因逃入江夏山中優游不仕以壽終初良五女並賢每有求姻輙便許嫁疎裳布被竹笥木屐以遣之五女能遵其訓皆有隐者之風焉法眞傳法眞字髙卿髙一作喬扶風郿人南郡太守雄之子也好學而無常家博通内外圖典為關西大儒弟子自逺方至者陳留范冉等數百人性恬静寡欲不交人間事太守請見之眞乃幅巾詣謁太守曰昔魯哀公雖為不肖而仲尼稱臣太守虛薄欲以功曹相屈光贊本朝何如眞曰以明府見待有禮故敢自同賓末若欲吏之眞將在北山之北南山之南矣太守戄然不敢復言戄音紀具反辟公府舉賢良皆不就同郡田羽薦眞曰處士法眞體兼四業謂詩書禮樂也學窮典奥幽居恬泊樂以忘憂將蹈老氏之髙蹤不為𤣥纁屈也臣願聖朝就加衮職毛詩曰衮職有闕謂三公也必能唱清廟之歌致來儀之鳳矣詩清廟曰於穆清廟肅雍顯相濟濟多士秉文之德尚書曰簫韶九成鳳}
