  - {type: variant, offset: 57, length: 0, content: '', WYG: 縣為亭長時尉行過亭萌候迎拜謁既而擲楯歎曰亭長主捕盜賊故執楯也大丈夫安能為人役哉遂去之長安學通春秋經時王莽殺其子宇前書莽隔絶平帝外家衞氏宇恐帝大後見怨以為莽不可諫而好鬼神即夜持血灑莽第門吏發覺之莽執宇送獄飲藥而死萌謂友人曰三綱絶矣謂君臣夫婦父子不去禍將及人即解冠掛東都城門漢宫殿名東都門今名青門也前書音義曰長安東都城北頭第一門歸將家屬浮海客於遼東萌素明陰陽知莽將敗有頃乃首戴瓦盎盎盆也哭於市曰新乎新乎王莽為新都侯及簒號新室故哭之因遂潛藏及光武即位乃之琅邪勞山在今萊州即墨縣東南有大勞小勞山養志脩道人皆化其德北海太守素聞其高遣吏奉謁致禮萌不荅太守懐憤而使捕之吏叩頭曰子慶大賢天下共聞所在之處人敬如父往必不獲秪自毁辱太守怒收之繫獄更發它吏行至勞山人果相率以兵弩捍禦吏被傷流血奔而還後詔書徵萌託以老耄迷路東西語使者云朝廷所以徵我者以其有益於政尚不知方靣所在安能濟時乎即便駕歸連徵不起以壽終初萌與同郡徐房平原李子雲王君公相友善並曉陰陽懷德穢行房與子雲養徒各千人君公遭亂獨不去儈牛自隐儈謂平會两家賣買之價時人謂之論劉攽曰案謂之論都不是當作為之語曰避世牆東王君公嵇康髙士傳曰君公明易為郎數言事不用乃自汙與官婢通免歸詐狂儈牛口無二價也周黨傳周黨字伯况太原廣武人也家産千金少孤為宗人所養而遇之不以理及長又不還其財黨詣鄉縣訟主乃歸之旣而散與宗族悉免遣奴婢遂至長安遊學初鄉佐嘗衆}
