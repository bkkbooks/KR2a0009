  - {type: variant, offset: 3651, length: 1008, content: 乘車車班班入河閒河閒姹女工數錢以錢為室金為堂石上慊慊舂黃粱梁下有懸鼓我欲擊之丞卿怒案此皆謂為政貪也城上烏尾畢逋者處高利獨食不與下共謂人主多聚斂也公為吏子為徒者言蠻夷將畔逆父既為軍吏其子又為卒徒往擊之也一徒死百乘車者言前一人往討胡既死矣後又遣百乘車往車班班入河閒者言上將崩乘輿班班入河閒迎靈帝也河閒姹女工數錢以錢為室金為堂者靈帝既立其母永樂太后好聚金以為堂也石上慊慊舂黃粱者言永樂雖積金錢慊慊常苦不足使人舂黃粱而食之也梁下有懸鼓我欲擊之丞卿怒者言永樂主教靈帝使賣官受錢所祿非其人天下忠篤之士怨望欲擊懸鼓以求見丞卿主鼓者亦復諂順怒而止我也桓帝之初京都童謠曰游平賣印自有平不辟豪賢及大姓案到延熹之末鄧皇后以譴自殺乃以竇貴人代之其父名武字游平拜城門校尉及太后攝政為大將軍與太傅陳蕃合心戮力惟德是建印綬所加咸得其人豪賢大姓皆絕望矣桓帝之末京都童謠曰茅田一頃中有井四方纖纖不可整嚼復嚼今年尚可後年鐃案易曰拔茅茹以其彙征吉茅喻羣賢也井者法也于時中常侍管霸蘇康憎疾海內英哲與長樂少府劉囂太常許詠尚書柳分尋穆史佟司隸唐珍等代作脣齒河內牢川詣闕上書汝潁南陽上采虛譽專作威福甘陵有南北二部三輔尤甚由是傳考黃門北寺始見廢閣茅田一頃者言羣賢衆多也中有井者言雖阨窮不失其法度也四方纖纖不可整者言姦慝大熾不可整理嚼復嚼者京都飲酒相強之辭也言食肉者鄙不恤王政徒耽宴飲歌呼而已也今年尚可者言但禁錮也後年鐃者陳竇被誅天下大壞桓帝之末京都童謠曰白蓋小車何延延河閒來合諧河閒來合諧案解犢亭屬饒陽河閒縣也居無幾何而桓帝崩使者與解犢侯皆白蓋車從河閒來延延衆貌也是時御史劉儵建議立靈帝以儵為侍中中常侍侯覽畏其親近必當閒己白拜儵泰山太守因令司隸迫促殺之朝廷必少長思其功效乃拔用其弟郃致位司徒此為合諧也靈帝之末京都童謠曰侯非侯王非王千乘萬騎上北芒案到中平六年史侯登躡至尊獻帝未有爵號為中常侍段珪等數十人所執公卿百官皆隨其後到河上乃得來還此為非侯非王上北芒者也靈帝中平中京都歌曰承樂世董逃遊四郭董逃蒙天恩董逃帶金紫董逃行謝恩董逃整車騎董逃垂欲發董逃與中辭董逃出西門董逃瞻宮殿董逃望京城董逃日夜絕董逃心摧傷董逃案董謂董卓也言雖跋扈縱其殘暴終歸逃竄至於滅族也獻帝踐祚之初京都童謠曰千里草何青青十日卜不得生案千里草為董十日卜為卓凡別字之體皆從上起左右離合無有從下發端者也今二字如此者天意若曰卓自下摩上以臣陵君也青青者暴盛之貌也不得生者亦旋破亡建安初荊州童謠曰八九年閒始欲衰至, WYG: ''}
