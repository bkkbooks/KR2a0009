  - {type: variant, offset: 653, length: 233, content: 持權日久威勢強盛恐有逆命害及吏民密與近臣中常侍單超等圖其方略其年八月冀卒伏罪誅滅靈帝建寧元年夏霖雨六十餘日是時大將軍竇武謀變廢中官其年九月長樂五官史朱瑀等共與中常侍曹節起兵先誅武交兵闕下敗走追斬武兄弟死者數百人熹平元年夏霖雨七十餘日是時中侍曹節等共誣曰白勃海王悝謀反其十月誅悝中平六年夏霖雨八十餘日是時靈帝新棄羣臣大行尚在梓宮大將軍何進與佐軍校尉袁紹等共謀欲誅廢中官下文陵畢中常侍張讓等共殺進兵戰京都死者數千更始諸將軍過雒陽者數十輩皆幘而衣婦人衣繡擁時智者見之以為服, WYG: 去朝乎夫德}
