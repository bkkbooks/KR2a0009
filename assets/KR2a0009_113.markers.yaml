  - {type: variant, offset: 58, length: 2, content: 董巴, WYG: 辱黨黨久懐之續漢志鄉佐主收賦税者後讀春秋聞復讐之義春秋經書紀侯大去其國公羊傳曰大去者何滅也孰滅之齊滅之曷為不言齊滅之為襄公諱也齊襄公九世祖哀公亨於周紀侯譖之也故襄公讐於紀九世猶可復讐乎雖百世可也便輟講而還與鄉佐相聞期剋鬬日旣交刃而黨爲鄉佐所傷困頓鄉佐服其義輿歸養之數日方蘇既悟而去自此勅身脩志州里稱其高及王莽竊位託疾杜門自後賊暴從横殘滅郡縣唯至廣武過城不入建武中徴為議郎以病去職遂將妻子居黽池復被徴不得已乃著短布單衣榖皮綃頭待見尚書以榖樹皮為綃頭也綃頭解見向栩傳黨服此尚書以待見也劉攽曰注服此尚書以待見也案文少一詣字及光武引見黨伏而不謁自陳願守所志帝乃許焉博士范升奏毁黨曰臣聞堯不須許由巢父而建號天下周不待伯夷叔齊而王道以成伏見太原周黨東海王良山陽王成等蒙受厚恩使者三聘乃肯就車及陛見帝廷黨不以禮屈伏而不謁􅅯蹇驕悍同時俱逝黨等文不能演義武不能死君釣采華名庻㡬三公之位臣願與坐雲臺之下考試圖國之道不如臣言伏虛妄之罪而敢私竊虛名誇上求髙皆大不敬書奏天子以示公卿詔曰自古明王聖主必有不賓之士伯夷叔齊不食周粟太原周黨不受朕祿亦各有志焉其賜帛四十匹黨遂隐居黽池著書上下篇而終邑人賢而祠之初黨與同郡譚賢伯升鴈門殷謨君長俱守節不仕王莽世建武中徴並不到王霸傳王霸字儒仲太原廣武人也少有清節及王莽簒位棄冠帶絕交宦建武中徴到尚書拜稱名不稱臣有司問其故霸曰天子有所不臣諸侯有所不友禮記曰儒有上不臣天子下不事諸侯司徒侯霸譲位於霸閻陽毁之曰太原俗黨儒仲頗有其風遂止皇甫謐高士傳曰故梁令閻陽也前書曰太原多晉公族子孫以詐力相傾矜夸功名報仇過直漢興號為難化常擇嚴猛將或任殺伐為威父兄被誅子弟怨憤至告訐刺史二千石以病歸隐居守志茅屋蓬戸連徴不至以壽終嚴光傳嚴光字子陵一名遵會稽餘姚人也少有高名與光武同遊學及光武即位光乃變名姓隐身不見帝思其賢乃令以物色訪之以其形貎求之後齊國上言有一男子披羊裘釣澤中帝疑其光乃備安車𤣥纁遣使聘之三反而後至舎於北軍給牀褥太官朝夕進膳司徒侯霸與光素舊遣使奉書皇甫謐髙士傳曰霸使西曹屬侯子道奉書光不起於牀上箕踞抱膝發書讀訖問子道曰君房素癡今為三公寕小差否子道曰位已鼎足不癡也光曰遣卿來何言子道傳霸言光曰卿言不癡是非癡語也天子徴我三乃來人主尚不見當見人臣乎子道求報光曰我手不能書乃口授之使者嫌少可更足光曰買菜乎求益也使人因謂光曰公聞先生至區區欲即詣造迫於典司是以不獲願因日暮自屈語言光不荅乃投札與之口授曰君房足下位至鼎足甚善懷仁輔義天下悅阿諛順旨要領絶霸得書封奏之帝笑曰狂奴故態也車駕即日幸其館光臥不起帝即其臥所撫光腹曰咄咄子陵不可相助為理邪光又眠不應良久乃張目熟視曰昔唐堯著德巢父洗耳士故有志何至相迫乎帝曰子陵我竟不能下汝邪於是升輿歎息而去復引光入論道舊故相對累日帝從容問光曰朕何如昔時對曰陛下差增於往因共偃臥光以足加帝腹上明日太史奏客星犯御座甚急帝笑曰朕故人嚴子陵共臥耳除為諫議大夫不屈乃耕於富春山今杭州富陽縣也本漢富春縣避晉簡文帝鄭太后諱改曰富陽後人名其釣處為嚴陵瀨焉顧野王輿地志曰七里灘在東陽江下與嚴陵瀨相接有嚴山桐廬縣南有嚴子陵漁釣處今山邊有石上平可坐十人臨水名為嚴陵釣壇也建武十七年復特徵不至年八十終於家帝傷惜之詔下郡縣賜錢百萬穀千斛井丹傳井丹字大春扶風郿人也少受業太學通五經善談論故京師為之語曰五經紛綸井大春紛綸猶浩博也性清高未嘗脩刺候人建武末沛王輔等五王居北宫皆好賓客更遣請丹不能致信陽侯隂就光烈皇后弟也以外戚貴盛乃詭説五王求錢千萬約能致丹而别使人要劫之丹不得已旣至就故為設麥飯葱葉之食丹推去之曰以君侯能供甘旨故來相過何其薄乎更致盛饌乃食及就起左右進輦丹笑曰吾聞桀駕人車豈此邪帝王紀曰桀以人駕車坐中皆失色就不得已而令去輦自是隐閉不關人事以壽終梁鴻傳梁鴻字伯鸞扶風平陵人也父讓王莽時為城門校尉封脩遠伯使奉少昊後寓於北地而卒前書莽改允吾為脩逺少昊金天氏之號次黄帝者北地今寕州也鴻時尚㓜以遭亂世因卷席而葬後受業太學家貧而尚節介博覽無不通而不為章句學畢乃收豕於上林苑中曾誤遺火延及它舎鴻乃尋訪燒者問所去失去亡也悉以豕償之其主猶以為少鴻曰無它財願以身居作主人許之因為執勤不懈朝夕隣家耆老見鴻非恒人乃共責讓主人而稱鴻長者於是始敬異焉悉還其豕鴻不受而去歸鄉里勢家慕其髙節多欲女之以女妻人曰女音尼慮反鴻並絶不娶同縣孟氏有女狀肥醜而黑力舉石臼擇對不嫁至年三十父母問其故女曰欲得賢如梁伯鸞者鴻聞而聘之女求作布衣麻屨織作筐緝績之具及嫁始以装餙入門七日而鴻不荅妻乃跪牀下請曰竊聞夫子髙義簡斥數婦斥逺也妾亦偃蹇數夫矣今而見擇敢不請罪鴻曰吾欲裘褐之人可與俱隐深山者爾今乃衣綺縞傅粉墨豈鴻所願哉妻曰以觀夫子之志耳妾自有隐居之服乃更為椎䯻著布衣操作而前鴻大喜曰此眞梁鴻妻也能奉我矣字之曰徳曜名孟光居有頃妻曰常聞夫子欲隐居避患今何為默默無乃欲低頭就之乎鴻曰諾乃共入霸陵山中以耕織為業詠詩書弹琴以自娛仰慕前世高士而為四皓以來二十四人作頌因東出闗過京師作五噫之歌曰陟彼北芒兮噫顧覽帝京兮噫宫室崔嵬兮噫人之劬勞兮噫遼遼未央兮噫肅宗聞而非之求鴻不得乃易姓運期名燿字侯光與妻子居齊魯之間有頃又去適吳將行作詩曰逝舊邦兮遐征將遥集兮東南心惙怛兮傷悴志菲菲兮升降爾雅注惙怛憂也菲菲髙下不定也惙音丁劣反降音下江反詩曰我心則降欲乘策兮縱邁疾吾俗兮作讒競舉枉兮措直咸先佞兮唌唌論語曰舉直措諸枉則人服舉枉措諸直則人不服唌音延讒言㨗急之貌固靡慙兮獨建冀異州兮尚賢建立也言已無慙於獨立所以適吳者冀異州之人貴尚賢德聊逍搖兮遨嬉纘仲尼兮周流儻云覩兮我悅遂舎車兮即浮舎其車而就舟船過季札兮延陵求魯連兮海隅雖不察兮光貌幸神靈兮與休光貌光儀也言雖不察見季札及魯連然冀幸其神靈與之同美也惟季春兮華阜麥含含兮方秀哀茂時兮逾邁愍芳香兮日臭茂盛也臭敗也悼吾心兮不獲長委結兮焉究委結懐恨也究窮也口囂囂兮余訕嗟恇恇兮誰留訕謗也鄭𤣥注禮記曰恇恇恐也遂至吳依大家臯伯通居廡下説文曰廡堂下周屋也釋名大屋曰廡為人賃舂每歸妻為具食不敢於鴻前仰視舉案齊眉伯通察而異之曰彼傭能使其妻敬之如此非凡人也乃方舎之於家鴻潛閉著書十餘篇疾且困告主人曰昔延陵季子葬子於嬴博之間不歸鄉里愼勿令我子持喪歸去及卒伯通等為求葬地於吳要離冢傍咸曰要離烈士而伯鸞清髙可令相近要離刺吳王僚子慶忌者冢在今蘇州吳縣西伯鸞墓在其北葬畢妻子歸扶風初鴻友人京兆髙恢少好老子隐於華隂山中及鴻東遊思恢作詩曰鳥嚶嚶兮友之期毛詩曰伐木丁丁鳥鳴嚶嚶出自幽谷遷于喬木嚶其鳴矣求其友聲念髙子兮僕懐思想念恢兮爰集兹二人遂不復相見恢亦高抗終身不仕高士傳曰恢字伯通髙鳳傳髙鳳字文通南陽葉人也少為書生家以農畝為業而專精誦讀晝夜不息妻嘗之田曝麥於庭令鳳䕶鷄時天暴雨而鳳持竿誦經不覺潦水流麥妻還怪問鳳方悟之其後遂為名儒乃教授業於西唐山中山在今唐州湖陽縣西北酈元注水經云即髙鳳所隐之西唐山也劉攽曰正文按教授業不成文理明衍此一業字若存業則可去教字也鄰里有爭財者持兵而鬬鳳往解之不已乃脱巾叩頭固請曰仁義遜譲奈何棄之於是争者懐感投兵謝罪鳳年老執志不倦名聲著聞太守連召請恐不得免自言本巫家不應為吏又詐與寡嫂訟田遂不仕建初中將作大匠任隗舉鳳直言到公車託病逃歸推其財産悉與孤兄子隐身漁釣終於家論曰先大夫宣侯沈約宋書曰范泰字伯倫祖汪父寗宋髙祖受命拜金紫光禄大夫加}
