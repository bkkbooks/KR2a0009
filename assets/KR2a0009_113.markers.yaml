  - {type: variant, offset: 611, length: 8, content: 二年夏霖雨五十餘, WYG: 中幸竟陵過雲夢臨沔水百姓莫不觀者有老父獨耕不輟尚書郎南陽張溫異之使問曰人皆來觀老父獨不輟何邪老父笑而不對溫下道百歩自與言老父曰我野人耳不達斯語請問天下亂而立天子邪理而立天子邪立天子以父天下邪役天下以奉天子邪昔聖王宰世茅茨采椽而萬人以寧韓子曰堯舜采掾不刮茅茨不剪今子之君勞人自縱逸遊無忌吾為子羞之子何忍欲人觀之乎溫大慙問其姓名不告而去陳留老父傳陳留老父者不知何許人也桓帝世黨錮事起守外黄令陳留張升去官歸鄉里道逢友人共班草而言班布也升曰吾聞趙殺鳴犢仲尼臨河而反覆巢竭淵龍鳳逝而不至解見獨行傳今宦豎}
