  - {type: variant, offset: 888, length: 371, content: 中身之災也乃奔入邊郡避之是服妖也其後更始遂為赤眉所殺桓帝元嘉中京都婦女作愁眉啼墮馬髻折要步齲齒笑所謂愁眉者細而曲折啼者薄拭目下若啼處墮馬髻者作一邊折要步者足不在體下齲齒笑者若齒痛樂不欣欣始自大將軍梁冀家所為京都歙然諸夏皆放效此近服妖也梁冀二世上將媾王室大作威福將危社稷天誡若曰兵馬將往收捕婦女憂愁踧眉啼泣吏卒掣頓折其要脊令髻傾邪雖強語笑無復氣味也到延熹二年舉宗誅夷延熹中梁冀誅後京都幘顏短耳長短上長下時中常侍單超左悺徐璜具瑗唐衡在帝左右縱其姦慝海內慍曰一將軍死五將軍出家有數侯子弟列布州郡賓客雜襲騰翥上短下長與梁冀同占到其八年桓帝因日蝕之變乃拜故司徒韓寅為司隸校尉以次誅鉏京都正清延熹中京都長者皆著木屐婦女始嫁至作漆畫五采為系此服妖也到九年黨事始發傳黃門北寺臨時惶惑不能信天任命多有逃走不就考者九族拘繫及所過歷長少婦女皆被桎梏應木屐之象也靈帝, WYG: ''}
