  - {type: variant, offset: 4317, length: 0, content: '', WYG: 遷侍中出為平原相徃謁卓時欲徙都長安乃謂紀曰三輔平敞四面險固土地肥羙號為陸海前書曰東方朔曰三輔之地南有江淮北有河渭汧隴以東商洛以西厥壤肥饒此所謂天府陸海之地今關東兵起恐洛陽不可久居長安猶有宫室今欲西遷何如紀曰天下有道守在四夷左傳曰楚沈尹戍曰古者天子守在四夷天子卑守在諸侯也宜脩徳政以懐不附遷移至尊誠計之末者愚以公宜事委}
  - {type: page-break, offset: 4317, content: '', id: KR2a0009_WYG_092-19b, image: WYG0253/WYG0253-0303b.png}
  - {type: variant, offset: 4317, length: 0, content: '', krp: 遷侍中出為平原相徃謁卓時欲徙都長安乃謂紀曰三輔平敞四面險固土地肥羙號為陸海前書曰東方朔曰三輔之地南有江淮北有河渭汧隴以東商洛以西厥壤肥饒此所謂天府陸海之地今關東兵起恐洛陽不可久居長安猶有宫室今欲西遷何如紀曰天下有道守在四夷左傳曰楚沈尹戍曰古者天子守在四夷天子卑守在諸侯也宜脩徳政以懐不附遷移至尊誠計之末者愚以公宜事委}
  - {type: variant, offset: 4319, length: 0, content: '', WYG: 專精外任其有違命則威之以武今關東兵起民不堪命若謙逺朝政率師討伐則塗炭之民庶幾可全若欲徙萬乘以自安將有累卵之危崢嶸之險也累卵解見皇后紀崢音上耕反卓意甚忤而敬紀名行無所復言時議欲以為司徒紀見禍亂方作不復辨嚴嚴讀曰裝也即時之郡璽書追拜太僕又徴為尚書令建安初袁紹為太尉讓於紀紀不受拜大鴻臚年七十一卒於官子羣為魏司空羣字長文魏志曰魯國孔融才髙倨傲年在羣紀之間先與紀友後與羣交更為紀拜由是顯名天下以為公慙卿卿慚長弟諶字季方與紀齊徳同行父子並著髙名時號三君每宰府辟召常同時旌命羔鴈成羣古者諸侯朝天子卿執羔大夫執鴈士執雉成羣言衆多也當世者靡不榮之諶早終先賢行狀曰豫州百城皆圖畫寔紀諶形像焉劉攽曰案正文多一者字論曰漢自中世}
  - {type: page-break, offset: 4319, content: '', id: KR2a0009_WYG_092-20a, image: WYG0253/WYG0253-0303c.png}
  - {type: variant, offset: 4319, length: 0, content: '', krp: 專精外任其有違命則威之以武今關東兵起民不堪命若謙逺朝政率師討伐則塗炭之民庶幾可全若欲徙萬乘以自安將有累卵之危崢嶸之險也累卵解見皇后紀崢音上耕反卓意甚忤而敬紀名行無所復言時議欲以為司徒紀見禍亂方作不復辨嚴嚴讀曰裝也即時之郡璽書追拜太僕又徴為尚書令建安初袁紹為太尉讓於紀紀不受拜大鴻臚年七十一卒於官子羣為魏司空羣字長文魏志曰魯國孔融才髙倨傲年在羣紀之間先與紀友後與羣交更為紀拜由是顯名天下以為公慙卿卿慚長弟諶字季方與紀齊徳同行父子並著髙名時號三君每宰府辟召常同時旌命羔鴈成羣古者諸侯朝天子卿執羔大夫執鴈士執雉成羣言衆多也當世者靡不榮之諶早終先賢行狀曰豫州百城皆圖畫寔紀諶形像焉劉攽曰案正文多一者字論曰漢自中世}
  - {type: variant, offset: 4321, length: 1, content: 候, WYG: 閹豎擅恣故俗遂以遁身矯絜放言為髙放肆其言不拘節制也論語曰隐居放言士有不談此者則芸夫牧豎已呌呼}
