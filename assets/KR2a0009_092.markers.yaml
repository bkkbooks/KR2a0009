  - {type: variant, offset: 1361, length: 0, content: '', krp: 傳曰靖字叔慈少有俊才動止以禮靖弟爽亦以才顯於當時或問汝南許章曰爽與靖孰賢章曰皆玉也慈明外朗叔慈内潤及卒學士惜之誄靖者二十六人潁隂令丘禎追號靖曰𤣥行先生也淑兄子昱字伯條曇字元智昱為沛相曇為廣陵太守兄弟皆正身疾惡志除閹官其支黨賔客有在二郡者纎罪必誅昱後共大將軍竇武謀誅中官與李膺俱死曇亦禁錮終身爽字慈明一名諝音息汝反幼而好學年十二能通春秋論語太尉杜喬見而稱之曰可為人師爽遂耽思經書慶弔不行徴命不應潁川為之語曰荀氏八龍慈明無䨇延熹元年太常趙典舉爽至孝拜郎中對䇿陳便宜曰臣聞之於師曰漢為火徳火生於木木盛於火故其徳為孝火木之子夏火之位木至夏而盛故為孝其象在周易之離夫在地為火在天為日易說卦曰離為火為日也在天者用其精在地者用其形夏則火王其精在天温暖之氣養生百木是其孝也冬時則廢其形在地酷烈之氣焚燒山林是其不孝也故漢制使天下誦孝經選吏舉孝廉平帝時王莽作書八篇戒子孫令學官以教授吏能誦者比孝經音義云言用之得選舉之也夫喪親自盡孝之終也盡謂盡其哀戚也今之公卿及二千石三年之喪不得即去殆非所以增崇孝道而克稱火徳者也徃者孝文勞謙行過乎儉易謙卦九三爻勞謙君子有終吉故其遺詔以日易月此當時之宜不可貫之萬世古今之制雖有損益而諒闇之禮未嘗改移以示天下莫遺其親遺忘也今公卿羣寮皆政教所瞻而父母之喪不得奔赴夫仁義之行自上而始敦厚之俗以應乎下傳曰喪祭之禮闕則人臣之恩薄背死忘生者衆矣曾子曰人未有自致者必也親喪乎事見論語致猶盡也極也春秋傳曰上之所為民之歸也左氏傳臧武仲之言夫上所不為而民或為之故加刑罰若上之所為民亦為之又何誅焉昔翟方進以自備宰相而不敢踰制劉攽曰案文以自當作自以至遭母憂三十六日而除前書翟方進為丞相遭後母憂行服三十六日起視事曰不敢踰國制也夫失禮之源自上而始古者大喪三年不呼其門公羊傳之文也何休注云重奪孝子之恩所以崇國厚俗篤化之道也事失宜正過勿憚改憚難也天下通喪可如舊禮禮記曰三年之喪天下之通喪也臣聞有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後有禮義禮義備則人知所厝矣語見易序卦也夫婦人倫之始王化之端故文王作易上經首乾坤下經首咸恒易乾坤至離為上經咸恒至未濟為下經孔子曰天尊地卑乾坤定矣易繫辭也夫婦之道所謂順也堯典曰釐降二女於媯汭嬪于虞降者下也嬪者婦也言雖帝堯之女下嫁於虞猶屈體降下勤脩婦道易曰帝乙歸妹以祉元吉易泰卦六五爻辭也王輔嗣注云婦人謂嫁曰歸泰者隂陽交通之時五處尊位履中居順降身應二帝乙歸妹誠合斯義也案史記紂父名帝乙此文以帝乙為湯湯名天乙也婦人謂嫁曰歸言湯以娶禮歸其妹於諸侯也春秋之義王姬嫁齊使魯主之不以天子之尊加於諸侯也公羊傳曰夏單伯逆王姬單伯者何吾大夫之命于天子者何以不稱使天子召而使逆之逆之者何使我主之也曷為使我主之天子嫁女於諸侯必使同姓諸侯主之何休注云不自為主尊卑不敵也今漢承秦法設尚主之儀以妻制夫以卑臨尊違乾坤之道失陽唱之義易緯曰陽唱而隂和也孔子曰昔聖人之作易也仰則觀象於天俯則察法於地覩鳥獸之文與地之宜近取諸身逺取諸物以通神明之徳以類萬物之情皆易繫之文也今觀法於天則北極至尊四星妃后北極北辰也軒轅四星女主之象也察法於地則崐山象夫卑澤象妻崐猶髙也易艮下兑上為咸艮為山夫象也兑為澤妻象也咸感也山澤通氣夫婦之相感也覩鳥獸之文鳥則雄者鳴雊雌能順服獸則牡為唱導牝乃相從近取諸身則乾為人首坤為人腹易說卦之文也逺取諸物則木實屬天根荄屬地荄音該陽尊隂卑蓋乃天性且詩初篇實首關雎禮始冠婚先正夫婦儀禮士冠禮為始士婚禮次之天地六經其㫖一揆宜改尚主之制以稱乾坤之性遵法堯湯式是周孔式法也合之天地而不謬質之鬼神而不疑人事如此則嘉瑞降天吉符出地五韙咸備各以其叙矣韙是也史記曰休徴曰肅時雨若曰乂時晹若曰哲時燠若曰謀時寒若曰聖時風若五是來備各以其叙也昔者聖人建天地之中而謂之禮禮者所以興福祥之本而止禍亂之源也人能枉欲從禮者則福歸之順情廢禮者則禍歸之推禍福之所應知興廢之所由來也衆禮之中婚禮為首故天子娶十二天之數也諸侯以下各有等差事之降也白虎通曰天子娶十二法天則有十二月百物畢生也又曰諸侯娶九女也陽性純而能施隂體順而能化以禮濟樂節宣其氣左傳曰昔晉侯有疾醫和視之曰疾不可為也是為近女室疾如蠱非鬼非食惑以喪志公曰女不可近乎對曰節之先王之樂所以節百事也天有六氣過則為災於是乎節宣其氣也劉攽曰注昔晉侯有疾玩文多一昔字故能豐子孫之祥致老夀之福及三代之季淫而無節瑶臺傾宫陳妾數百列女傳曰夏桀為璇室瑶臺以臨雲雨紂為傾宫觧見桓帝紀陽竭於上隂隔於下故周公之戒曰不知稼穡之艱難不聞小人之勞惟耽樂之從時亦罔或克夀是其明戒事見尚書無逸篇其詞與此微有不同也後世之人好福不務其本惡禍不易其軌傳曰截趾適屨孰云其愚何與斯人追欲喪軀誠可痛也適猶從也言喪身之愚甚於截趾也臣竊聞後宫采女五六千人從官侍使復在其外冬夏衣服朝夕稟糧耗費縑帛空竭府藏徴調增倍十而稅一空賦不辜之民以供無用之女百姓窮困於外隂陽隔塞於内故感動和氣災異屢臻臣愚以為諸非禮聘未曾幸御者一皆遣出使成妃合一曰通怨曠和隂陽二曰省財用實府庫三曰脩禮制綏眉夀四曰配陽施祈螽斯螽斯蚣蝑也其性不妒故能子孫衆多詩曰螽斯羽詵詵兮宜爾子孫振振兮五曰寛役賦安黎民此誠國家之𢎞利天人之大福也夫寒熱晦明所以為嵗尊卑奢儉所以為禮故以晦明寒暑之氣尊卑侈約之禮為其節也易曰天地節而四時成節卦彖辭文也春秋傳曰唯器與名不可以假人杜預注左氏云器謂車服名謂爵號孝經曰安上治民莫善於禮禮者尊卑之差上下之制也昔季氏八佾舞於庭非有傷害困於人物而孔子猶曰是可忍也孰不可忍洪範曰惟辟作威惟辟作福惟辟玉食凡此三者君所獨行而臣不得同也今臣僭君服下食上珍所謂害于而家凶于而國者也宜略依古禮尊卑之差及董仲舒制度之别前書董仲舒曰王者正法度之宜别上下之序以防欲也嚴督有司必行其命此則禁亂善俗足用之要奏聞即弃官去後遭黨錮隠於海上又南遁漢濵積十餘年以著述為事遂稱為碩儒黨禁解五府並辟司空袁逄舉}
