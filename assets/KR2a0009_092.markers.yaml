  - {type: variant, offset: 2051, length: 257, content: 逆見自相謂曰客車邊有物必是逢我翁也及客進顧視壁北懸蛇以十數乃知其奇又有一郡守篤病久佗以為盛怒則差乃多受其貨而不加功無何𠫓廾去又留書罵之太守果大怒令人追殺佗不及因瞋恚吐黑血數升而愈又有疾者詣佗求療佗曰君病根深應當剖破腹然君壽亦不過十年病不能相殺也病者不堪其苦必欲除之佗遂下療應時愈十年竟死廣陵太守陳登忽患匈中煩懣面赤不食佗脉之曰府君胃中有蟲欲成內疽腥物所為也即作湯二升再服須臾吐出三升許蟲頭赤而動半身猶是生魚膾所苦便愈佗曰此病後三朞當發遇良醫可救登至期疾動時佗不在遂死曹操聞而召佗常在左右操積苦頭風眩佗針隨手而差有李, WYG: 郎}
