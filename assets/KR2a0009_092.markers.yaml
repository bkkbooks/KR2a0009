  - {type: variant, offset: 1114, length: 240, content: 事免後拜尚書卒於官初熹平末黃龍見譙光祿大夫橋玄問颺此何祥也颺曰其國當有王者興不及五十年龍當復見此其應也魏郡人殷登密記之至建安二十五年春黃龍復見譙其冬魏受禪韓說字叔儒會稽山陰人也博通五經尤善圖緯之學舉孝廉與議郎蔡邕友善數陳灾眚及奏賦頌連珠稍遷侍中光和元年十月說言於靈帝云其晦日必食乞百官嚴裝帝從之果如所言中平二年二月又上封事剋期宮中有灾至日南宮大火遷說江夏太守公事免年七十卒於家董扶字茂安廣漢綿竹人也少遊太學與鄉人任安齊名俱事同郡楊厚學圖讖還家講授弟子自遠而至前後宰府十辟公車三徵再, WYG: 卿}
