  - {type: variant, offset: 1410, length: 1, content: 求, WYG: 譛武子而逐之事見左傳劉攽曰正文案昭當作招卒保身全家爾道為貴其體訓所安多此類也年六十九終於家諸儒頌之曰林慮懿徳非禮不處恱此詩書弦琴樂古五就州招九膺台輔逡巡王命卒嵗容與皓孫繇建安中為司𨽻校尉海内先賢傳曰繇字元常郡主薄迪之子也魏志曰舉孝亷為尚書郎辟三府為廷尉正黄門侍郎陳寔傳陳寔字仲弓潁川許人也}
