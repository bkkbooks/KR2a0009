  - {type: variant, offset: 1449, length: 5, content: 後劉備稱天, WYG: 於家何進遣使弔祭海内赴者三萬餘人制衰麻者以百數共刋石立碑諡為文範先生先賢行狀曰將軍何進遣官屬弔祠為諡有六}
  - {type: variant, offset: 1449, length: 5, content: 後劉備稱天, krp: 於家何進遣使弔祭海内赴者三萬餘人制衰麻者以百數共刋石立碑諡為文範先生先賢行狀曰將軍何進遣官屬弔祠為諡有六}
  - {type: variant, offset: 1455, length: 391, content: 於蜀皆如扶言蜀丞相諸葛亮問廣漢秦密董扶及任安所長密曰董扶襃秋毫之善貶纖介之惡任安記人之善忘人之過云郭玉者廣漢雒人也初有老父不知何出常漁釣於涪水因號涪翁乞食人閒見有疾者時下針石輒應時而效乃著針經診脉法傳於世弟子程高尋求積年翁乃授之高亦隱跡不仕玉少師事高學方診六微之技陰陽隱側之術和帝時為太醫丞多有效應帝奇之仍試令嬖臣美手腕者與女子雜處帷中使玉各診一手問所疾苦玉曰左陽右陰脉有男女狀若異人臣疑其故帝歎息稱善玉仁愛不矜雖貧賤廝養必盡其心力而醫療貴人時或不愈帝乃令貴人羸服變處一針即差召玉詰問其狀對曰醫之為言意也腠理至微隨氣用巧針石之閒毫芒即乖神存於心手之際可得解而不可得言也夫貴者處尊高以臨臣臣懷怖懾以承之其為療也有四難焉自用意而不任臣一難也將身不謹二難也骨節不彊不能使藥三難也好逸惡勞四難也針有分寸時有破漏重以恐懼之心加以裁慎之志臣意且猶不盡何有於病哉此其所為不愈也帝善其對年老卒官華佗, WYG: 紀諶最賢紀}
