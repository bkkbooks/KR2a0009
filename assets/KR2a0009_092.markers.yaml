  - {type: variant, offset: 1409, length: 0, content: '', WYG: 止善罰不懲謂之縱惡在上者能不止下為善不縱下為惡則國法立矣是謂統法四患既蠲五政又立行之以誠守之以固簡而不怠疎而不失無為為之使自施之無事事之使自交之老子曰為無為事無事又曰故徳交歸也不肅而成不嚴而化垂拱揖譲而海内平矣是謂為政之方又言尚主之制非古也釐降二女陶唐之典歸妹元吉帝乙之訓王姬歸齊宗周之禮以隂乗陽違天以婦陵夫違人違天不祥違人不義又古者天子諸侯有事必告于廟朝有二史左史記言右史書事禮記曰天子朝日于東門之外聽朔于南門之外閏月則闔門左扉立于其中言則左史書之動則右史書之也事為春秋言為尚書君舉必記善惡成敗無不存焉下及士庶茍有茂異咸在載籍或欲顯而不得或欲隠而名章得失一朝而榮辱千載善人勸焉淫人懼焉淫過也左氏傳或求名而不得或欲蓋而名章書齊豹盗三叛人名以懲不義也宜於今者備置史官掌其典丈紀其行事每於嵗盡舉之尚書以助賞罰以𢎞法敎帝覽而善之帝好典籍常以班固漢書文繁難省乃令恱依左氏傳體以為漢紀三十篇詔尚書給筆札辭約事詳論辨多羙其序之曰昔在上聖惟建皇極經緯天地觀象立法乃作書契以通宇宙揚于王庭厥用大焉先王光演大業肆于時夏詩周頌曰我求懿徳肆于時夏鄭𤣥注曰懿羙也肆陳也我武王也求羙徳之士而任用之故陳于是夏而歌之也亦惟厥後永世作典夫立典有五志焉一曰達道義二曰章法式三曰通古今四曰著功勲五曰表賢能於是天人之際事物之宜粲然顯著罔不備矣世濟其軌不隕其業濟成也損益盈虚與時消息臧否不同其揆一也漢四百有六載撥亂反正統武興文永惟祖宗之洪業思光啓乎萬嗣聖上穆然惟文之恤瞻前顧後是紹是繼闡崇大猷命立國典於是綴叙舊書以述漢紀中興以前明主賢臣得失之軌亦足以觀矣又著崇徳正論及諸論數十篇年六十二建安十四年卒韓韶傳韓韶字仲黄潁川舞陽人也少仕郡辟司徒府時太山賊公孫舉偽號歴年守令不能破散多為坐法尚書選三府掾能理劇者乃以韶為贏長贏縣故城今在兖州愽城縣東北賊聞其賢相戒不入贏境餘縣多被寇盗廢耕桑其流入縣界求索衣糧者甚衆韶愍其飢困乃開倉賑之所稟贍萬餘戶主者爭謂不可韶曰長活溝壑之人而以此伏罪含笑入地矣太守素知韶名徳竟無所坐以病卒官同郡李膺陳寔杜密荀淑等為立碑頌焉子融字元長少能辨理而不為章句學聲名甚盛五府並辟獻帝初至太僕年七十卒鍾皓傳鍾皓字季明潁川長社人也為郡著姓世善刑律皓少以篤行稱公府連辟為二兄未仕避隠密山密縣山也以詩律敎授門徒千餘人同郡陳寔年不及皓皓引與為友皓為郡功曹會辟司徒府臨辭太守問誰可代卿者皓曰明府欲必得其人西門亭長陳寔可寔聞之曰鍾君似不察人不知何獨識我皓頃之自劾去前後九辟公府徴為廷尉正博士林慮長皆不就時皓及荀淑並為士大夫所歸慕李膺常嘆曰荀君清識難尚鍾君至徳可師皓兄子瑾母膺之姑也瑾好學慕古有退讓風與膺同年俱有聲名膺祖太尉脩常言瑾似我家性邦有道不廢邦無道免於刑戮復以膺妹妻之瑾辟州府未嘗屈志膺謂之曰孟子以為人無是非之心非人也孟子曰人無惻隠之心非人也無羞惡之心非人也無辭讓之心非人也無是非之心非人也弟何期不與孟軻同邪瑾常以膺言白皓皓曰昔國武子好昭人過以致怨本國武子齊大夫齊慶克通於齊君之母國武子知之面責慶克夫人}
