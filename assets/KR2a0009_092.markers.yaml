  - {type: variant, offset: 1383, length: 0, content: '', WYG: 必危社稷其所辟舉皆取才略之士將共圗之亦與司徒王允及卓長史何顒等為内謀㑹病薨年六十三著禮易傳詩傳尚書正經春秋條例又集漢事成敗可為鑒戒者謂之漢語又作公羊問及辨讖并它所論叙題為新書凡百餘篇今多所亡缺兄子恱彧並知名彧自有傳論曰荀爽鄭𤣥申屠蟠俱以儒行為處士累徴並謝病不詣及董卓當朝復備禮召之蟠𤣥竟不屈以全其髙爽己黄髮矣獨至焉未十旬而取卿相意者疑其乖趣舍余竊商其情以為出處君子之大致也平運則𢎞道以求志陵夷則濡跡以匡時濡跡解}
