  - {type: variant, offset: 2386, length: 1928, content: 死血脉不復歸必燥著母脊乃為下針并令進湯婦因欲產而不通佗曰死胎枯燥埶不自生使人探之果得死始人形可識但其色已黑佗之絕技皆此類也為人性惡難得意且恥以醫見業又去家思歸乃就操求還取方因託妻疾數期不反操累書呼之又勑郡縣發遣佗恃能厭事猶不肯至操大怒使人廉之知妻詐疾乃收付獄訊考驗首服荀彧請曰佗方術實工人命所懸宜加全宥操不從竟殺之佗臨死出一卷書與獄吏曰此可以活人吏畏法不敢受佗不強與索火燒之初軍吏李成苦欬晝夜不寐佗以為腸與散兩錢服之即吐二升膿血於此漸愈乃戒之曰後十八歲疾當發動若不得此藥不可差也復分散與之後五六歲有里人如成先病請藥甚急成愍而與之乃故往譙更從佗求適值見收意不忍言後十八年成病發無藥而死廣陵吳普彭城樊阿皆從佗學普依準佗療多所全濟佗語普曰人體欲得勞動但不當使極耳動搖則穀氣得銷血脉流通病不得生譬猶戶樞終不朽也是以古之仙者為導引之事熊經鴟顧引挽體動諸關節以求難老吾有一術名五禽之戲一曰虎二曰鹿三曰熊四曰猨五曰鳥亦以除疾兼利蹏足以當導引體有不快起作一禽之戲怡而汗出因以著粉身體輕便而欲食普施行之年九十餘耳目聰明齒牙完堅阿善針術凡醫咸言背及匈藏之閒不可妄針針之不可過四分而阿針背入一二寸巨闕匈藏乃五六寸而病皆瘳阿從佗求方可服食益於人者佗授以漆葉青散漆葉屑一斗青十四兩以是為率言久服去三蟲利五藏輕體使人頭不白阿從其言壽百餘歲漆葉處所而有青生於豐沛彭城及朝歌閒漢世異術之士甚衆雖云不經而亦有不可誣故簡其美者列于傳末泠壽光唐虞魯女生三人者皆與華佗同時壽光年可百五六十歲行容成公御婦人法常屈頸鷮息須髮盡白而色理如三四十時死於江陵唐虞道赤眉張步家居里落若與相及死於鄉里不其縣魯女生數說顯宗時事甚明了議者疑其時人也董卓亂後莫知所在徐登者閩中人也本女子化為丈夫善為巫術又趙炳字公阿東陽人能為越方時遭兵亂疾疫大起二人遇於烏傷溪水之上遂結言約共以其術療病各相謂曰今既同志且可各試所能登乃禁溪水水為不流炳復次禁枯樹樹即生荑二人相視而笑共行其道焉登年長炳師事之貴尚清儉禮神唯以東流水為酌削桑皮為脯但行禁架所療皆除後登物故炳東入章安百姓未之知也炳乃故升茅屋梧鼎而爨主人見之驚懅炳笑不應既而爨孰屋無損異又嘗臨水求度船人不和之炳乃張蓋坐其中長嘯呼風亂流而濟於是百姓神服從者如歸章安令惡其惑衆收殺之人為立祠室於永康至今蚊蚋不能入也費長房者汝南人也曾為市掾市中有老翁賣藥懸一壺於肆頭及市罷輒跳入壺中市人莫之見唯長房於樓上覩之異焉因往再拜奉酒脯翁知長房之意其神也謂之曰子明日可更來長房旦日復詣翁翁乃與俱入壺中唯見玉堂嚴麗旨酒甘肴盈衍其中共飲畢而出翁約不聽與人言之後乃就樓上候長房曰我神仙之人以過見責今事畢當去子寧能相隨乎樓下有少酒與卿為別長房使人取之不能勝又令十人扛之猶不舉翁聞笑而下樓以一指提之而上視器如一升許而二人飲之終日不盡長房遂欲求道而顧家人為憂翁乃斷一青竹度與長房身齊使懸之舍後家人見之即長房形也以為縊死大小驚號遂殯葬之長房立其傍而莫之見也於是遂隨從入深山踐荊棘於羣虎之中留使獨處長房不恐又臥於空室以朽索懸萬斤石於心上衆蛇競來齧索且斷長房亦不移翁還撫之曰子可教也復使食糞糞中有三蟲臭穢特甚長房意惡之翁曰子幾得道恨於此不成如何長房辭歸翁與一竹杖曰騎此任所之則自至矣既至可以杖投葛陂中也又為作一符曰以此主地上鬼神長房乘杖須臾來歸自謂去家適經旬日而已十餘年矣即以杖投陂顧視則龍也家人謂其久死不信之長房曰往日所葬但竹杖耳乃發冢剖棺杖猶存焉遂能醫療衆病鞭笞百鬼及驅使社公或在它坐獨自恚怒人問其故曰吾責鬼魅之犯法者耳汝南歲歲常有魅偽作太守章服詣府門椎鼓者郡中患之時魅適來而逢長房謁府君惶懼不得退便前解衣冠叩頭乞活長房呵之云便於中庭正汝故形即成老鼈大如車輪頸長一丈長房復令就太守服罪付其一札以勑葛陂君魅叩頭流涕持札植於陂邊以頸繞之而死後東海君來見葛陂君因淫其夫人於是長房劾繫之三年而東海大旱長房至海上見其人請雨乃謂之曰東海君有罪吾前繫於葛陂今方出之使作雨也於是雨立注長房曾與人共行見一書生黃巾被裘無鞍騎馬下而叩頭長房曰還它馬赦汝死罪人問其故長房曰此狸也盜社公馬耳又嘗坐客而使至宛市鮓須臾還乃飯或一日之閒人見其在千里之外者數處焉後失其符為衆鬼所殺薊子訓者不知所由來也建安中客在濟陰宛句有神異之道嘗抱鄰家嬰兒故失手墯地而死其父母驚號怨痛不可忍聞而子訓唯謝以過誤終無它說遂埋藏之後月餘子訓乃抱兒歸焉父母大恐曰死生異路雖思我兒乞不用復見也兒識父母軒渠笑悅欲往就之母不覺攬取乃實兒也雖大喜慶心猶有疑乃竊發視死兒但見衣被方乃信焉於是子訓流名京師士大夫皆承風向慕之後乃駕驢車與諸生俱詣許下道過滎陽止主人舍而所駕之驢忽然卒僵蛆蟲流出主遽白之子訓曰乃爾乎方安坐飯食畢徐出以杖扣之驢應聲奮起行步如初即復進道其追逐觀者常有千數既, WYG: ''}
