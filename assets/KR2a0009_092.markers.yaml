  - {type: variant, offset: 4819, length: 811, content: 端語頃即得薑還并獲操使報命後操使蜀反驗問增錦之狀及時日早晚若符契焉後操出近郊士大夫從者百許人慈乃為齎酒一升脯一斤手自斟酌百官莫不醉飽操怪之使尋其故行視諸鑪悉亡其酒脯矣操懷不喜因坐上收欲殺之慈乃卻入壁中霍然不知所在或見於市者又捕之而市人皆變形與慈同莫知誰是後人逢慈於陽城山頭因復逐之遂入走羊羣操知不可得乃令就羊中告之曰不復相殺本試君術耳忽有一老羝屈前兩膝人立而言曰遽如許即競往赴之而羣羊數百皆變為羝並屈前膝人立云遽如許遂莫知所取焉計子勳者不知何郡縣人皆謂數百歲行來於人閒一旦忽言日中當死主人與之葛衣子勳服而正寢至日中果死上成公者宓密縣人也其初行久而不還後歸語其家云我已得仙因辭家而去家人見其舉步稍高良久乃沒云陳寔韓韶同見其事解奴辜張貂者亦不知是何郡國人也皆能隱淪出入不由門戶奴辜能變易物形以誑幻人又河南有麴聖卿善為丹書符劾厭殺鬼神而使命之又有編盲意亦與鬼物交通初章帝時有壽光侯者能劾百鬼衆魅令自縛見形其鄉人有婦為魅所病侯為劾之得大蛇數丈死於門外又有神樹人止者輒死鳥過者必墜侯復劾之樹盛夏枯落見大蛇長七八丈懸死其閒帝聞而徵之乃試問之吾殿下夜半後常有數人絳衣被髮持火相隨豈能劾之乎侯曰此小怪易銷耳帝偽使三人為之侯劾三人登時仆地無氣帝大驚曰非魅也朕相試耳解之而蘇甘始東郭延年封君達三人者皆方士也率能行容成御婦人術或飲小便或自倒懸愛嗇精氣不極視大言甘始元放延年皆為操所錄問其術而行之君達號青牛師凡此數人皆百餘歲及二百歲也王真郝孟節者皆上黨人也王真年且百歲視之面有光澤似未五十者自云周流登五岳名山悉能行胎息胎食之方嗽舌下泉咽之不絕房室孟節能含棗核不食可至五年十年又能結氣不息身不動搖狀若死人可至百日半年亦有室家為人質謹不妄言似士君子曹操使領諸方士焉北海王和平性好道術自以當仙濟南孫邕少事之從至京師會和平病歿邕因葬之東陶有書百餘卷藥數囊悉以送之後弟子夏榮言其尸解邕乃恨不取其寶書仙藥焉贊曰幽貺罕徵明數難校不探精遠曷感靈效如或遷訛實乖玄奧, WYG: 考證}
