  - {type: variant, offset: 1405, length: 1, content: 氣, WYG: 恭己而已恱志在獻替而謀無所用乃作申鑒五篇其所論辨通見政體既成而奏之其大略曰夫道之本仁義而已矣易曰立人之道曰仁與義五典以經之羣籍以緯之詠之歌之弦之舞之前監既明後復申之故古之聖王其於仁義也申重而已致政之術先屏四患乃崇五政一曰偽二曰私三曰放四曰奢偽亂俗私壊法放越軌奢敗制四者不除則政末由行矣夫俗亂則道荒雖天地不得保其性矣法壊則世傾雖人主不得守其度矣軌越則禮亡雖聖人不得全其道矣制敗則欲肆雖四表不得充其求矣肆放也是謂四患興農桑以養其性審好惡以正其俗宣文敎以章其化立武備以秉其威明賞罰以統其法是謂五政人不畏死不可懼以罪人不樂生不可勸以善雖使契布五敎臯陶作士政不行}
