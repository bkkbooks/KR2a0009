  - {type: punctuation, offset: 335, content: 「, id: KR2a0009_ZHSJ_092-bkkpn76}
  - {type: variant, offset: 335, length: 487, content: 方今之世以貨自通吾奉百萬與子為資何如對曰來意厚矣夫富貴在天得之有命以貨求位吾不忍也後舉孝廉以高第為主事遷繒相時繒侯劉敞東海恭王之後也所為多不法廢嫡立庶傲很放恣穆到官謁曰臣始除之日京師咸謂臣曰繒有惡侯以弔小相明侯何因得此醜聲之甚也幸承先人之支體傳茅土之重不戰戰兢兢而違越法度故朝廷使臣為輔願改往修來自求多福乃上沒敞所侵官民田地廢其庶子還立嫡嗣其蒼頭兒客犯法皆收考之因苦辭諫敞敞涕泣為謝多從其所規遷弘農令縣界有螟蟲食稼百姓惶懼穆乃設壇謝曰百姓有過罪穆之由請以身禱於是暴雨既霽而螟蟲自銷百姓稱曰神明永壽元年霖雨大水三輔以東莫不湮沒穆明曉占候乃豫告令百姓徙居高地故弘農人獨得免害遷遼東屬國都尉善得吏人歡心年六十六卒官六子皆知名許曼者汝南平輿人也祖父峻字季山善卜占之術多有顯驗時人方之前世京房自云少嘗篤病三年不愈乃謁太山請命行遇道士張巨君授以方術所著易林至今行於世曼少傳峻學桓帝時隴西太守馮緄始拜郡開綬笥有兩赤蛇分南北走緄令曼筮之卦成曼曰三歲之後君當為邊將官有東名當東北行三千里復五年更為大將軍南征延熹元年緄出為遼東太守討鮮卑至五年復拜車騎將軍擊武陵蠻賊皆如占其餘多此類云趙彥者琅邪人, WYG: 孫}
