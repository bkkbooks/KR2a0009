  - {type: variant, offset: 1407, length: 0, content: '', WYG: 尚書舜謂契曰汝作司徒敬敷五敎在寛謂臯陶曰汝作士明于五刑故在上者先豐人財以定其志帝耕籍田后桑蠶宫籍田事解見明紀禮記曰季春之月后妃齋戒親東向桑以勸蠶事古者天子諸侯必有公桑蠶室近川而為之宫仭有三尺也國無遊人野無荒業財不賈用言自足也力不妄加以周人事是謂養生周給也君子之所以動天地應神明正萬物而成王化者必乎眞定而已故在上者審定好醜焉善惡要乎功罪毁譽効於凖驗聽言責事舉名察實無惑詐偽以蕩衆心故事無不覈物無不切善無不顯惡無不章俗無姦怪民無淫風百姓上下覩利害之存乎已也故肅恭其心愼脩其行内不回惑外無異望則民志平矣是謂正俗君子以情用小人以刑用榮辱者賞罰之精華也故禮敎榮辱以加君子化其情也桎梏鞭撲以加小人化其刑也君子不犯辱况於刑乎小人不忌刑况於辱乎若敎化之廢推中人而墜於小人之域教化之行引中人而納於君子之塗是謂章化章明也小人之情緩則驕驕則恣恣則怨怨則叛危則謀亂安則思欲非威强無以懲之故在上者必有武備以戒不虞以遏寇虐安居則寄之内政有事則用之軍旅國語齊桓公問管仲曰國安可乎管仲曰未可君若正卒伍脩甲兵則大國亦將脩之小國設備可作内政而寄軍令焉注云政國政也言脩國政而寄軍令隣國不知是謂秉威賞罰政之柄也韓子曰二柄者刑徳也殺戮之謂刑慶賞之謂徳明賞必罰審}
