  - {type: variant, offset: 1442, length: 0, content: '', krp: 復再遷除太丘長太丘縣屬沛國故城在今亳州永城縣西北也脩徳清静百姓以安鄰縣人戸歸附者寔輙訓導譬解發遣各令}
  - {type: variant, offset: 1443, length: 1, content: 家, WYG: 本司官行部司官謂主司之官也吏慮有訟者白欲禁之寔曰訟以求直禁之理將何申其勿有所拘司官聞而歎息曰陳君所言若是豈有怨於人乎亦竟無訟者以沛相賦斂違法乃解印綬去吏人追思之及後逮捕黨人事亦連寔餘人多逃避求免寔曰吾不就獄衆無所恃乃請囚焉遇赦得出靈帝初大將軍竇武辟以為掾屬時中常侍張讓權傾天下讓父死歸葬潁川雖一郡畢至而名士無徃者讓甚恥之寔乃獨弔焉及後復誅黨人讓感寔故多所全宥寔在鄉閭平心率物其有爭訟輙求判正曉譬曲直退無怨者至乃歎曰寜為刑罰所加不為陳君所短時嵗荒民儉有盗夜入其室止於梁上寔隂見乃起自整拂呼命子孫正色訓之曰夫人不可不自勉不善之人未必本惡習以性成遂至於此梁上君子者是矣盗大驚自投於地稽顙歸罪寔徐譬之曰視君狀貌不似惡人宜深剋己反善然此當由貧困令遺絹二匹自是一縣無復盗竊太尉楊賜司徒陳耽每拜公卿羣僚畢賀賜等常歎寔大位未登愧於先之及黨禁始解大將軍何進司徒袁隗遣人敦寔敦勸也欲特表以不次之位寔乃謝使者曰寔久絶人事飾巾待終而已時三公每缺議者歸之累見徴命遂不起閉門懸車棲遲養老中平四年}
