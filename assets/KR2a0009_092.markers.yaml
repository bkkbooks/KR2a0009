  - {type: variant, offset: 1421, length: 0, content: '', WYG: 西門亭長尋轉功曹時中常侍侯覽託太守髙倫用吏倫教署為文學掾寔知非其人懐檄請見檄板書謂以髙倫之敎書之於檄而懐之者懼洩事也言曰此人不宜用而侯常侍不可違寔乞從外署不足以塵明徳倫從之請從外署之舉不欲䧟倫於請託也於是鄉論怪其非舉寔終無所言倫後被徴為尚書郡中士大夫送至輪氏傳舍輪氏縣名}
