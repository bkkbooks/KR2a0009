  - {type: variant, offset: 1359, length: 1, content: 博, WYG: 光禄勲杜喬少府房植舉淑對䇿譏刺貴倖為大將軍梁冀所忌出補朗陵侯相續漢書曰淑對䇿刺梁氏故出也莅事明理稱為神君頃之弃官歸閒居養志產業每增輒以贍宗族知友年六十七建和三年卒李膺時為尚書自表師喪禮記曰事師無犯無隠左右就養無方服勤至死心喪三年二縣皆為立祠有子八人儉緄靖燾汪爽肅專並有名稱時人謂八龍緄音昆燾音道汪音烏光反說文云汪深廣也俗本改作注非專本或作敷初荀氏舊里名西豪今許州城内西南有荀淑故宅相傳云即舊西豪里也潁隂令渤海苑康以為昔髙陽氏有才子八人左傳曰昔髙陽氏有才子八人蒼舒隤敳檮戭大臨尨降庭堅仲容叔逹今荀氏亦有八子故改其里曰髙陽里靖有至行不仕年五十而終號曰𤣥行先生皇甫謐髙}
