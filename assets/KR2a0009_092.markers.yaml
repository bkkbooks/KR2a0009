  - {type: variant, offset: 1422, length: 13, content: 國都尉相與入蜀去後一歲帝崩, WYG: 潁川郡今故嵩陽縣是倫謂衆人言曰吾前為侯常侍用吏陳君密持教還而於外白署比聞議者以此少之此咎由故人畏憚强禦陳君可謂善則稱君過則稱己者也寔固自引愆聞者方歎息由是}
