  - {type: variant, offset: 1370, length: 0, content: '', WYG: 地東西萬四千餘里網羅山川水澤鹽池永夀二年秋檀石槐遂將三四千騎寇雲中延熹元年鮮卑寇北邊冬使匈奴中郎將張奐率南單于出塞擊之斬首二百級二年復入鴈門殺數百人大抄掠而去六年夏千餘騎寇遼東}
  - {type: variant, offset: 1370, length: 0, content: '', krp: 地東西萬四千餘里網羅山川水澤鹽池永夀二年秋檀石槐遂將三四千騎寇雲中延熹元年鮮卑寇北邊冬使匈奴中郎將張奐率南單于出塞擊之斬首二百級二年復入鴈門殺數百人大抄掠而去六年夏千餘騎寇遼東}
  - {type: variant, offset: 1371, length: 2, content: 信都, WYG: 國九年夏遂分騎數萬人入縁邊九郡並殺掠吏人於是復遣張奐擊之鮮卑乃出塞去朝廷積患之而不能制遂遣使持印綬封檀石槐為王欲與和親檀石槐不肯受而寇抄滋甚乃自分其地為三部從右北平以東至遼東接夫餘濊貊二十餘邑為東部從右北平以西上谷十餘邑為中部從上谷以西至敦煌烏孫二十餘邑為西部各置大人主領之皆屬檀石槐靈帝立幽并涼三州縁邊諸郡無嵗不被鮮卑寇抄殺略不可勝數熹平三年冬鮮卑入北地太守夏育率休著屠各追擊破之遷育為䕶烏桓校尉五年鮮卑寇幽州六年夏鮮卑寇三邊秋夏育上言鮮卑寇邊自春以來二十餘發請徵幽州諸郡兵出塞擊之一冬二春必能禽滅朝廷未許先是䕶羌校尉田晏坐事論刑被原欲立功自效乃請中常侍王甫求得為將甫因此議遣兵與育并力討賊帝乃拜晏為破鮮卑中郎將大臣多有不同乃召百官議朝堂議郎蔡邕議曰書戒猾夏湯伐鬼方尚書舜典曰蠻夷猾夏寇賊姦宄猾亂也易既濟九三爻辭曰髙宗伐鬼方三年而克之前書淮南王安曰鬼方小蠻夷也音義曰鬼方逺方也周有獫狁蠻荆之師詩小雅曰顯允方叔征伐獫狁蠻荆來威漢有闐顔瀚海之事武帝使大將軍衛青擊匈奴至闐顔山斬首萬餘級使霍去病擊匈奴封狼居胥山登臨瀚海也征討殊類所由尚矣然而時有同異埶有可否故謀有得失事有成敗不可齊也武帝情存逺略志闢四方南誅百越北討强胡西伐大宛東并朝鮮因文景之蓄藉天下之饒數十年間官民俱匱乃興鹽鐵酒𣙜之利設告緡重税之令武帝使東郭咸陽等領天下鹽鐵敢私鑄錢賣鹽者釱左趾搉專也官自賣酒人不得賣也又算緡錢率緡錢二千而算一令各以其物自占占不悉聽人告緡以半與之音義曰緡絲也用以貫錢故曰緡錢一算百二十也民不堪命起為盗賊關東紛擾道路不通武帝天漢二年泰山琅邪羣盗徐勃等阻山攻城道路不通繡衣直指之使奮鈇鉞而並出武帝使直指使者暴勝之等衣繡仗斧分道逐捕也既而覺悟乃息兵罷役封丞相為富人侯封丞相車千秋為富人侯以明休息思富養人故主父偃曰夫務戰勝窮武事未有不悔者也武帝時齊相主父偃諫伐匈奴之辭夫以世宗神武將帥良猛財富充實劉攽曰案富字當作賦所拓廣逺猶有悔焉况今人財並乏事劣昔時乎自匈奴遁逃鮮卑强盛據其故地稱兵十萬才力勁健意智益生加以關塞不嚴禁網多漏精金良鐵皆為賊有漢人逋逃為之謀主兵利馬疾過於匈奴昔叚熲良將習兵善戰有事西羌猶十餘年今育晏才䇿未必過熲鮮卑種衆不弱于曩時而虚計二載自許有成若禍結兵連豈得中休當復徵發衆人轉運無已是為耗竭諸夏并力蠻夷夫邊垂之患手足之蚧搔中國之困胷背之瘭疽蚧音介搔音新到反埤蒼曰瘭音必燒反杜預注左傳曰疽猶惡創也方今郡縣盗賊尚不能禁况此醜虜而可伏乎昔髙祖忍平城之耻吕后棄慢書之詬詬耻也音許豆反方之於今何者為甚天設山河秦築長城漢起塞垣所以别内外異殊俗也茍無䠞國内侮之患則可矣䠞國解見西域傳豈與蟲螘校寇計爭往來哉雖或破之豈可殄盡而方今本朝為之旰食乎旰晚也左傳伍子胥曰楚君大夫其旰食乎劉攽曰今本朝案文今當作令夫專勝者未必克挾疑者未必敢衆所謂危聖人不任朝議有嫌明主不行也昔淮南王安諫伐越曰天子之兵有征無戰言其莫敢校也校報也如使越人蒙死以逆執事厮輿之卒前書音義曰厮微也輿衆也有一不備而歸者雖得越王之首而猶為大漢羞之而欲以齊民易醜虜皇威辱外夷就如其言猶已危矣况乎得失不可量邪昔珠崖郡反孝元皇帝納賈捐之言而下詔曰珠崖背畔今議者或曰可討或曰棄之朕日夜惟思羞威不行則欲誅之通於時變復憂萬民夫萬民之饑與逺蠻之不討何者為大宗廟之祭凶年猶有不備况避不嫌之辱哉今關東大困無以相贍又當動兵非但勞民而已其罷珠崖郡此元帝所以發徳音也夫恤民救急雖成郡列縣尚猶棄之况障塞之外未嘗為民居者乎守邊之術李牧善其略史記李牧趙北邊良將也常居代鴈門備匈奴以便宜置吏市租不入幕府為士卒費謹烽火邊無失亡也保塞之論嚴尤申其要前書王莽發三十萬衆十道出擊匈奴莽將嚴尤諫曰匈奴為害所從來久未聞上代冇征之者也後世三家周秦漢征之然皆未有得上䇿者也周宣王時獫狁内侵至于涇陽命將出征之盡境而還是得中䇿武帝選將練兵深入逺戍兵連禍結三十餘年是為下䇿秦始皇不忍小耻築長城之固以喪社稷是為無䇿班固曰若乃征伐之功秦漢行事嚴尤論之當矣遺業猶在文章具存循二子之䇿守先帝之規臣曰可矣帝不從左傳曰楚大夫薳啓疆對楚靈王曰晉之事君臣曰可矣遂遣夏育出髙栁田晏出雲中匈奴中郎將臧旻率南單于出鴈門各將萬騎三道出塞二千餘里檀石槐命三部大人各率衆逆戰育等大敗喪其節傳輜重各將數千騎奔還死者十七八三將檻車徵下獄贖為庶人冬鮮卑寇遼西光和元年冬又寇酒泉縁邊莫不被毒種衆日多田畜射獵不足給食檀石槐乃自徇行見烏集秦水廣從數百里水停不流從音子用反其中有魚不能得之聞倭人善網捕於是東擊倭人國得千餘家徙置秦水上令捕魚以助糧食光和中檀石槐死時年四十五子和連代立和連才力不及父亦數為寇抄性貪淫斷法不平衆畔者半後出攻北地㢘人善弩射者㢘縣名屬北地郡射中和連即死其子騫曼年小兄子魁頭立後騫曼長大與魁頭爭國衆遂離散魁頭死弟歩度根立自檀石槐後諸大人遂世相傳襲論曰四夷之暴其埶互疆矣匈奴熾於隆漢西羌猛於中興而靈獻之間二虜迭盛石槐驍猛盡有單于之地蹋頓凶傑公據遼西之土其陵跨中國結患生人者靡世而寧焉然制御上略厯世無聞周漢之䇿僅得中下將天之㝠數以至於是乎贊曰二虜首施鯁我北垂道暢則馴時薄先離後漢書卷一百二十後漢書卷一百二十考證鮮卑傳野馬原羊何焯校本原改羱時漁陽赤山烏桓歆志賁等歆魏志注中作欽湯伐鬼方臣徳潜按此又誤以髙宗為湯各將數千騎奔還數千通鑑作數十為是見烏集秦水廣從數百里烏集魏志注中作烏侯後漢書卷一百二十考證}
