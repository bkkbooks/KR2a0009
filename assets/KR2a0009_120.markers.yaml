  - {type: variant, offset: 1297, length: 0, content: '', WYG: 遼東鮮卑攻肥如縣肥如縣故城在今平州也太守祭參坐沮敗下獄死十三年遼東鮮卑寇右北平因入漁陽漁陽太守擊破之延平元年鮮卑}
