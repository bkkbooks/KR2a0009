  - {type: variant, offset: 1172, length: 2, content: 樂成, WYG: 部大人有所召呼則刻木為信雖無文字而部衆不敢違犯氏姓無常以大人健者名字為姓大人以下各自畜牧營産不相徭役其嫁娶則先略女通情杜預注左傳曰不以道取為略或半嵗百日然後送牛馬羊畜以為聘幣壻隨妻還家妻家無尊卑旦旦拜之而不拜其父母為妻家僕役一二年間妻家乃厚遣送女居處財物一皆為辦其俗妻後母報寡嫂死則歸其故夫計謀從用婦人唯鬭戰之事乃自決之父子男女相對踞蹲以髠頭為輕便婦人至嫁時乃養髪分為髻著句決飾以金碧猶中國有簂歩揺簂音吉悔反字或為幗婦人首飾也續漢輿服志曰公卿列侯夫人紺繒幗釋名云皇后首飾上有垂珠歩則揺之婦人能刺韋作文繡織氀毼廣雅曰氀毼􅄢也氀音力于反毼音胡逹反男子能作}
