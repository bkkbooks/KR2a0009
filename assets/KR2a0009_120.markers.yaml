  - {type: variant, offset: 1295, length: 0, content: '', WYG: 中大將軍竇憲遣右校尉耿䕫擊破匈奴北單于逃走鮮卑因此轉徙據其地匈奴餘種留者尚有十餘萬落皆自號鮮卑鮮卑由此漸盛}
