  - {type: variant, offset: 1175, length: 2, content: 高易, WYG: 矢鞍勒勒馬銜也鍜金鐵為兵器其土地宜穄及東牆東牆似蓬草實如穄子至十月而熟見鳥獸孕乳以别四節俗貴兵死斂屍以棺有哭泣之哀至葬則歌舞相送肥養一犬以彩繩纓牽并取死者所乘馬衣物皆燒而送之言以屬累犬屬累乃託付也屬音之欲反累音力瑞反使䕶死者神靈歸赤山赤山在遼東西北數千里如中國人死者魂神歸岱山也博物志太山天帝孫也主召人魂東方萬物始}
  - {type: variant, offset: 1175, length: 2, content: 高易, krp: 矢鞍勒勒馬銜也鍜金鐵為兵器其土地宜穄及東牆東牆似蓬草實如穄子至十月而熟見鳥獸孕乳以别四節俗貴兵死斂屍以棺有哭泣之哀至葬則歌舞相送肥養一犬以彩繩纓牽并取死者所乘馬衣物皆燒而送之言以屬累犬屬累乃託付也屬音之欲反累音力瑞反使䕶死者神靈歸赤山赤山在遼東西北數千里如中國人死者魂神歸岱山也博物志太山天帝孫也主召人魂東方萬物始}
