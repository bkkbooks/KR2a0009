  - {type: variant, offset: 1178, length: 0, content: '', WYG: 知人生命敬鬼神祠天地日月星辰山川及先大人有健名者祠用牛羊畢皆燒之其約法違大人言者罪至死若相賊殺者令部落自相報不止詣大人告之聽出馬牛羊以贖死其自殺父兄則無罪若亡畔為大人所捕者邑落不得受之皆徙逐於雍狂之地沙漠之中其土多蝮蛇在丁令西南烏孫東北焉前書音義曰丁令匈奴别種也令音零烏桓自為冒頓所破衆遂孤弱常臣伏匈奴嵗輸牛馬羊皮過時不具輙沒其妻子及武帝遣驃騎將軍霍去病擊破匈奴左地因徙烏桓於上谷漁陽右北平遼東五郡塞外為漢偵察匈奴動静偵覘也音丑政反其大人嵗一朝見於是始置䕶烏桓校尉秩二千石擁節監領之使不得與匈奴交通昭帝時烏桓漸强乃發匈奴單于冡墓以報冒頓之怨匈奴大怒乃東擊破烏桓大將軍霍光聞之因遣度遼將軍范明友將二萬騎出遼東邀匈奴而虜已引去明友乘烏桓新敗遂進擊之斬首六千餘級獲其三王首而還由是烏桓復寇幽州明友輙破之宣帝時乃稍保塞降附及王莽簒位欲擊匈奴興十二部軍使東域將嚴尤領烏桓丁令兵屯代郡皆質其妻子於郡縣烏桓不便水土懼久屯不休數求謁去莽不肯遣遂自亡畔還為抄盗而諸郡盡殺其質由是結怨於莽匈奴因誘其豪帥以為吏餘者皆羈縻}
