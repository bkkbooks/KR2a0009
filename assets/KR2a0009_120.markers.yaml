  - {type: variant, offset: 1171, length: 0, content: '', WYG: 宋宣城太守范煜撰唐章懐太子賢注烏桓鮮卑列傳第八十烏桓烏桓者本東胡也漢初匈奴冒頓滅其國餘類保烏桓山因以為號焉俗善騎射弋獵禽獸為事隨水草放牧居無常處以穹廬為舍東開向日食肉飲酪以毛毳為衣鄭𤣥注周禮曰毛之縟細者為毳也貴少而賤老其性悍塞説文曰悍勇也塞謂不通怒則殺父兄而終不害其母以母有族類父兄無相仇報故也有勇健能理決鬭訟者推為大人無世業相繼邑落各有小帥數百千落自為}
