  - {type: variant, offset: 1235, length: 0, content: '', WYG: 永壽中朔方烏桓與休著屠各並畔中郎將張奐擊平之延熹九年夏烏桓復與鮮卑及南匈奴鮮卑寇縁邉九郡俱反張奐討之皆出塞去靈帝初烏桓大人上谷有難樓者衆九千餘落遼西有丘力居者衆五千餘落皆自稱王又遼東蘇僕延衆千餘落自稱峭王峭音七笑反右北平烏延衆八百餘落自稱汗魯王並勇健而多計䇿中平四年前中山太守張純畔入丘力居衆中自號彌天安定王遂為諸郡烏桓元帥寇掠青徐幽冀四州五年以劉虞為幽州牧虞購募斬純首北州乃定獻帝初平中丘力居死子樓班年少從子蹋頓有武略代立蹋音大蠟反總攝三郡衆皆從其號令}
