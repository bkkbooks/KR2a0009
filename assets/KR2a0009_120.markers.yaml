  - {type: variant, offset: 1181, length: 2, content: 垣故, krp: 初烏桓與匈奴連兵為寇代郡以東尤被其害居止近塞朝發穹廬暮至城郭五郡民庶家受其辜至於郡縣損壊百姓流亡其在上谷塞外白山者最為强富建武二十一年遣伏波將軍馬援將三千騎出五阮關掩擊之關在代郡烏桓逆知悉相率逃走追斬百級而還烏桓復尾擊援後援遂晨夜奔歸比入塞馬死者千餘匹二十二年匈奴國亂烏桓乘弱擊破之匈奴轉北徙數千里漠南地空帝乃以幣帛賂烏桓二十五年遼西烏桓大人郝旦等九百二十二人率衆向化詣闕朝貢獻奴婢牛馬及弓虎豹貂皮是時四夷朝賀絡驛而至天子乃命大㑹勞饗賜以珍寳烏桓或願留宿衛於是封其渠帥為侯王君長者八十一人皆居塞内布於縁邊諸郡令招來種人給其衣食遂為漢偵候助擊匈奴鮮卑時司徒掾班彪上言烏桓天性輕黠好為寇賊若久放縱而無總領者必復侵掠居人但委主降掾史葢當時權置也下兵馬掾亦同也恐非所能制臣愚以為宜復置烏桓校尉誠有益於附集省國家之邊慮帝從之於是始復置校尉於上谷寗城寗城縣名前書寗縣作寧史記寗城亦作寧寧寗兩字通也開營府并領鮮卑賞賜質子嵗時互市焉及明章和三世皆保塞無事安帝永初三年夏漁陽烏桓與右北平胡千餘寇代郡上谷秋鴈門烏桓率衆王無何允劉攽曰案魏志名無何而已無允字此下文降時亦無之縁下有乞字遂此誤有允也與鮮卑大人丘倫等及南匈奴骨都侯合七千騎寇五原與太守戰於九原髙渠谷九原縣名}
