  - {type: variant, offset: 1298, length: 2, content: 繹幕, WYG: 寇漁陽太守張顯率數百人出塞追之兵馬掾嚴授諫曰前道險阻賊埶難量宜且結營先令輕騎偵視之顯意甚鋭怒欲斬之因復進兵遇虜伏發士卒悉走唯授力戰身被十創手殺數人而死顯中流矢主簿衛福功曹徐咸皆自投赴顯俱歿陣鄧太后䇿書褒歎賜顯錢六十萬以家二人為郎授福咸各錢十萬除一子為郎安帝永初中鮮卑大人燕荔陽詣闕朝賀鄧太后賜燕荔陽王印綬赤車參駕令止烏桓校尉所居寗城下通胡市因築南北兩部質館築館以受降質鮮卑邑落百二十部各遣入質是後或降或畔與匈奴烏桓更相攻擊元初二年秋遼東鮮卑圍無慮縣無慮縣屬遼東郡也州郡合兵固保清野鮮卑無所得清野謂收斂積聚不令寇得之也復攻扶黎營殺長吏扶黎縣屬遼東屬國故城在今營州東南四年遼西鮮卑連休等遂燒塞門寇百姓烏桓大人於秩居等與連休有宿怨共郡兵奔擊大破之斬首千三百級悉獲其生口牛馬財物五年秋代郡鮮卑萬餘騎遂穿塞入寇分攻城邑燒宫寺殺長吏而去乃發縁邊甲卒黎陽營兵屯上谷以備之冬鮮卑入上谷攻居庸關復發縁邊諸郡黎陽營兵積射士歩騎二萬人屯列衝要六年秋鮮卑入馬城塞殺長吏馬城縣名屬代郡也度遼將軍鄧遵發積射士三千人及中郎將馬續率南單于與遼西右北平兵馬㑹出塞追擊鮮卑大破之獲生口及牛羊財物甚衆又發積射士三千人馬三千匹詣度遼營屯守永寧元年遼西鮮卑大人烏倫其至鞬率衆詣鄧遵降奉貢獻詔封烏倫為率衆王其至鞬為率衆侯賜綵繒各有差建光元年秋其至鞬復畔寇居庸雲中太守成嚴擊之兵敗散功曹楊穆以身捍嚴與俱戰歿鮮卑於是圍烏桓校尉徐常於馬城度遼將軍耿䕫與幽州刺史龎參發}
