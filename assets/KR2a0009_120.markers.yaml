  - {type: variant, offset: 1368, length: 1, content: 脩, WYG: 寇鴈門定襄遂攻太原掠殺百姓二年冬其至鞬自將萬餘騎入東領侯分為數道攻南匈奴於曼柏縣名屬五原郡也薁鞬日逐王戰死殺千餘人三年秋復寇髙栁擊破南匈奴殺斬將王順帝永建元年秋鮮卑其至鞬寇代郡太守李超戰死明年春中郎將張國遣從事將南單于兵歩騎萬餘人出塞擊破之獲其資重二千餘種時遼東鮮卑六千餘騎亦寇遼東𤣥莵烏桓校尉耿曅發縁邊諸郡兵及烏桓率衆王出塞擊之斬首數百級大獲其生口牛馬什物鮮卑乃率種衆三萬人詣遼東乞降三年四年鮮卑頻寇漁陽朔方六年秋耿曅遣司馬將胡兵數千人出塞擊破之冬漁陽太守又遣烏桓兵擊之斬首八百級獲牛馬生口烏桓豪人扶漱官勇健漱音所救反每與鮮卑戰輒䧟敵詔賜號率衆君陽嘉元年冬耿曅遣烏桓親漢都尉戎朱廆率衆王侯咄歸等劉攽曰案魏志此衆字作將字言率將胡王等出塞後乃封為率衆王侯長也出塞抄擊鮮卑大斬獲而還賜咄歸等已下為率衆王侯長賜綵繒各有差鮮卑後寇遼東屬國於是曅乃移屯遼東無慮城拒之二年春匈奴中郎將趙稠遣從事將南匈奴骨都侯夫沈等出塞擊鮮卑破之斬獲甚衆詔賜夫沈金印紫綬及縑綵各有差秋鮮卑穿塞入馬城代郡太守擊之不能克後其至鞬死鮮卑抄盗差稀桓帝時鮮卑檀石槐者其父投鹿侯初從匈奴軍三年其妻在家生子投鹿侯歸怪欲殺之妻言嘗晝行聞雷震仰天視而雹入其口因吞之遂姙身十月而産此子必有竒異且宜長視投鹿侯不聼遂弃之妻私語家令收養焉名檀石槐年十四五勇健有智略異部大人抄取其外家牛羊檀石槐單騎追擊之所向無前悉還得所亡者由是部落畏服乃施法禁平曲直無敢犯者遂推以為大人檀石槐乃立庭於彈汗山歠仇水上歠音昌悦反去髙栁北三百餘里兵馬甚盛東西部大人皆歸焉因南抄縁邊北拒丁零東郤夫餘西擊烏孫盡據匈奴}
