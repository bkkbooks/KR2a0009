  - {type: variant, offset: 3829, length: 0, content: '', WYG: 制度奢廣多壞吏民冡尚書欒巴諌事太后怒癸卯詔書收巴下獄欲殺之丙午地震於是太后乃出巴免為庻人桓帝建和元年四月庚寅京都地震九月丁卯京都地震是時梁太后攝政兄冀持權至和平元年太后崩然冀猶秉政專事至延熹二年乃誅滅三年九月己卯地震庚寅又震元嘉元年十一月辛巳京都地震二年正月丙辰京都地震十月乙亥京都地震永興二年二月癸卯京都地震永夀二年十二月京都地震延熹四年京都右扶風涼州地震}
