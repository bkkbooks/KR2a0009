  - {type: variant, offset: 5479, length: 5, content: 封侯而勃位, WYG: 梁商争權為商作飛語欲䧟之桓帝建和元年四月郡國六地裂水涌出井溢壊寺屋殺人時梁太后攝政兄冀枉殺李固杜喬三年郡國五山崩和平元年七月廣漢梓潼山崩永興二年六月東海朐山崩冬十二月泰山琅邪盜賊羣起永夀三年七月河東地裂時梁皇后兄冀秉政桓帝欲自由内患之延熹元年七月乙巳左馮翊雲陽地裂三年五月戊申漢中山崩是時上寵恣中常侍單超等四年六月庚子泰山博尤來山判解八年六月丙辰緱氏地裂永康元年五月丙午雒陽髙平永夀亭上黨泫工𤣥反氏地各裂是時朝臣患中常侍王甫等專恣冬桓帝崩明年竇氏等欲誅常侍黄門}
