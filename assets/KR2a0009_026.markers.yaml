  - {type: variant, offset: 4210, length: 749, content: 即可殄滅伏波類西域賈胡到一處輒止以是失利今果疾疫皆如舒言弇得書奏之帝乃使虎賁中郎將梁松乘驛責問援因代監軍會援病卒松宿懷不平遂因事陷之帝大怒追收援新息侯印綬初兄子嚴敦並喜譏議而通輕俠客援前在交阯還書誡之曰吾欲汝曹聞人過失如聞父母之名耳可得聞口不可得言也好論議人長短妄是非正法此吾所大惡也寧死不願聞子孫有此行也汝曹知吾惡之甚矣所以復言者施衿結褵申父母之戒欲使汝曹不忘之耳龍伯高敦厚周慎口無擇言謙約節儉廉公有威吾愛之重之願汝曹効之杜季良豪俠好義憂人之憂樂人之樂清濁無所失父喪致客數郡畢至吾愛之重之不願汝曹効也効伯高不得猶為謹勑之士所謂刻鵠不成尚類鶩者也效季良不得陷為天下輕薄子所謂畫虎不成反類狗者也訖今季良尚未可知郡將下車輒切齒州郡以為言吾常為寒心是以不願子孫効也季良名保京兆人時為越騎司馬保仇人上書訟保為行浮薄亂羣惑衆伏波將軍萬里還書以誡兄子而梁松竇固以之交結將扇其輕偽敗亂諸夏書奏帝召責松固以訟書及援誡書示之松固叩頭流血而得不罪詔免保官伯高名述亦京兆人為山都長由此擢拜零陵太守初援在交阯常餌薏苡實用能輕身省慾以勝瘴氣南方薏苡實大援欲以為種軍還載之一車時人以為南土珍怪權貴皆望之援時方有寵故莫以聞及卒後有上書譖之者以為前所載還皆明珠文犀馬武與於陵侯侯昱等皆以章言其狀帝益怒援妻孥惶懼不敢以喪還舊塋裁買城西數畝地葬而已賓客故人莫敢弔會嚴與援妻子草索相連詣闕請罪帝乃出松書以示之方知所坐上書訴冤前後六上辭甚哀切然後得葬又前雲陽令同郡朱勃詣闕上書曰臣聞王德聖政不忘人之功採其一美不求備於衆故高祖赦蒯通而以王禮葬田橫大臣曠然咸不自疑夫大將在外讒言在內微過輒記大功不計誠為國之所慎也故章邯畏口而奔楚燕將據聊而不下豈其甘心末規哉悼巧言之傷類也羣貴之閒傍無一言之佐馳深淵入虎口豈顧計哉寧自知當要七郡之使徼封侯之福邪八, WYG: 元興元}
