  - {type: variant, offset: 4960, length: 405, content: 車駕西討隗囂國計狐疑衆營未集援建宜進之策卒破西州及吳漢下隴冀路斷隔唯獨狄道為國堅守士民飢困寄命漏刻援奉詔西使鎮慰邊衆乃招集豪傑曉誘羌戎謀如涌泉埶如轉規遂救倒縣之急存幾亡之城兵全師進因糧敵人隴冀略平而獨守空郡兵動有功師進輒克銖鋤先零緣入山谷猛怒力戰飛矢貫脛又出征交阯土多瘴氣援與妻子生訣無悔吝之心遂斬滅徵側克平一州閒復南討立陷臨鄉師已有業未竟而死吏士雖疫援不獨存夫戰或以久而立功或以速而致敗深入未必為得不進未必為非人情豈樂久屯絕地不生歸哉惟援得事朝廷二十二年北出塞漠南度江海觸冒害氣僵死軍事名滅爵絕國土不傳海內不知其過衆庶未聞其毀卒遇三夫之言橫被誣罔之讒家屬杜門葬不歸墓怨𨻶並興宗親怖慄死者不能自列生者莫為之訟臣竊傷之豈復疑以錢穀閒哉夫操孔父之忠而不能自免於讒此鄒陽之所悲也詩云取彼讒人投畀豺虎犲虎不食投畀有北有北不受投畀有昊此言欲令上天而平其惡惟陛下留思豎儒之言無使功臣懷恨黃泉臣聞春秋之義罪以功除聖王之祀臣有, WYG: ''}
