  - {type: variant, offset: 5751, length: 703, content: 怒乃下郡縣收捕諸王賓客更相牽引死者以千數呂种亦豫其禍臨命嘆曰馬將軍誠神人也永平初援女立為皇后顯宗圖畫建武中名臣列將於雲臺以椒房故獨不及援東平王蒼觀圖言於帝曰何故不畫伏波將軍像帝笑而不言至十七年援夫人卒乃更脩封樹起祠堂建初三年肅宗使五官中郎將持節追策謚援曰忠成侯四子廖防光客卿客卿幼而歧嶷年六歲能應接諸公專對賓客嘗有死罪亡命者來過客卿逃匿不令人知外若訥而內沈敏援甚奇之以為將相器故以客卿字焉援卒後客卿亦夭沒論曰馬援騰聲三輔遨游二帝及定節立謀以干時主將懷負鼎之願蓋為千載之遇焉然其戒人之禍智矣而不能自免於讒隙豈功名之際理固然乎夫利不在身以之謀事則智慮不私己以之斷義必厲誠能回觀物之智而為反身之察若施之於人則能恕自鑒其情亦明矣廖字敬平少以父任為郎明德皇后既立拜廖為羽林左監虎賁中郎將顯宗崩受遺詔典掌門禁遂代趙憙為衞尉肅宗甚尊重之時皇太后躬履節儉事從約廖慮美業難終上疏長樂宮以勸成德政曰臣案前世詔令以百姓不足起於世尚奢靡故元帝罷服官成帝御浣衣哀帝去樂府然而侈費不息至於衰亂者百姓從行不從言也夫改政移風必有其本傳曰吳王好劒客百姓多創瘢楚王好細宮中多餓死長安語曰城中好高髻四方高一尺城中好廣眉四方且半額城中好大袖四方全匹帛斯言如戲有切事實前下制度未幾後稍不行雖或吏不奉法良由慢起京師今陛下躬服厚繒斥去華飾素所安發自聖性此誠上合天心下順民望浩大之福莫尚於此陛下既已得之自然猶宜加以勉勗法太宗之隆德戒成哀之不終易曰不恆其德或承之羞誠令斯事一竟則四海誦德聲薰天地神明可通金石可勒而況於行仁心乎況於行令乎願置章坐側以當瞽人夜誦之音太后深納之朝廷大議輒以詢訪廖性質誠畏慎不愛權埶聲名盡心納忠不屑毀譽有司連據舊典奏封廖等累讓不得已, WYG: ''}
