  - {type: variant, offset: 6622, length: 1803, content: 年與弟光俱為黃門侍郎肅宗即位拜防中郎將稍遷城門校尉建初二年金城隴西保塞羌皆反拜防行車騎將軍事以長水校尉耿恭副將北軍五校兵及諸郡積射士三萬人擊之軍到冀而羌豪布橋等圍南部都尉於臨洮防欲救之臨洮道險車騎不得方駕防乃別使兩司馬將數百騎分為前後軍去臨洮十餘里為大營多樹幡幟揚言大兵旦當進羌候見之馳還言漢兵盛不可當明旦遂鼓譟而前羌虜驚走因追擊破之斬首虜四千餘人遂解臨洮圍防開以恩信燒當種皆降唯布橋等二萬餘人在臨洮西南望曲谷十二月羌又敗耿恭司馬及隴西長史於和羅谷死者數百人明年春防遣司馬夏駿將五千人從大道向其前潛遣司馬馬彭將五千人從閒道衝其心腹又令將兵長史李調等將四千人繞其西三道俱擊復破之斬獲千餘人得牛羊十餘萬頭羌退走夏駿追之反為所敗防乃引兵與戰於索西又破之布橋迫急將種人萬餘降詔徵防還拜車騎將軍城門校尉如故防貴寵最盛與九卿絕席光自越騎校尉遷執金吾四年封防潁陽侯光為許侯兄弟二人各六千戶防以顯宗寑疾入參醫藥又平定西羌增邑千三百五十戶屢上表讓位俱以特進就第皇太后崩明年拜防光祿勳光為衞尉防數言政事多見採用是冬始施行十二月迎氣樂防所上也子鉅為常從小侯六年正月以鉅當冠特拜為黃門侍郎肅宗親御章臺下殿陳鼎俎自臨冠之明年防復以病乞骸骨詔賜故中山王田廬以特進就第防兄弟貴盛奴婢各千人已上資產巨億皆買京師膏腴美田又大起第觀連閣臨道彌亙街路多聚聲樂曲度比諸郊廟賓客奔湊四方畢至京兆杜篤之徒數百人常為食客居門下刺史守令多出其家歲時賑給鄉閭故人莫不周洽防又多牧馬畜賦斂羌胡帝不喜之數加譴勑所以禁遏甚備由是權埶稍損賓客亦衰八年因兄子豫怨謗事有司奏防光兄弟奢侈踰僭濁亂聖化悉免就國臨上路詔曰舅氏一門俱就國封四時陵廟無助祭先后者朕甚傷之其令許侯思田廬有司勿復請以慰朕渭陽之情光為人小心周密喪母過哀帝以是特親愛之乃復位特進子康黃門侍郎永元二年光為太僕康為侍中及竇憲誅光坐與厚善復免就封後憲奴誣光與憲逆自殺家屬歸本郡本郡復殺康而防及廖子遵皆坐徙封丹陽防為翟鄉侯租歲限三百萬不得臣吏民防後以江南下溼上書乞歸本郡和帝聽之十三年卒子鉅嗣後為長水校尉永初七年鄧太后詔諸馬子孫還京師隨四時見會如故事復紹封光子朗為合鄉侯嚴字威卿父余王莽時為楊州牧嚴少孤而好擊劒習騎射後乃白援從平原楊太伯講學專心墳典能通春秋左氏因覽百家羣言遂交結英賢京師大人咸器異之仕郡督郵援常與計議委以家事弟敦字孺卿亦知名援卒後嚴乃與敦俱歸安陵居鉅下三輔稱其義行號曰鉅下二卿明德皇后既立嚴乃閉門自守猶復慮致譏嫌遂更徙北地斷絕賓客永平十五年皇后勑使移居洛陽顯宗召見嚴進對閑雅意甚異之有詔留仁壽闥與校書郎杜撫班固等雜定建武注記常與宗室近親臨邑侯劉復等論議政事甚見寵幸後拜將軍長史將北軍五校士羽林禁兵三千人屯西河美稷衞護南單于聽置司馬從事牧守謁敬同之將軍勑嚴過武庫祭蚩尤帝親御阿閣觀其士衆時人榮之肅宗即位徵拜侍御史中丞除子鱄為郎令勸學省中其冬有日食之災嚴上封事曰臣聞日者衆陽之長食者陰侵之徵書曰無曠庶官天工人其代之言王者代天官人也故考績黜陟以明襃貶無功不黜則陰盛陵陽臣伏見方今刺史太守專州典郡不務奉事盡心為國而司察偏阿取與自己同則舉為尤異異則中以刑法不即垂頭塞耳採求財賂今益州刺史朱酺楊州刺史倪說涼州刺史尹業等每行考事輒有物故又選舉不實曾無貶坐是使臣下得作威福也故事州郡所舉上奏司直察能否以懲虛實今宜加防檢式遵前制舊丞相御史親治職事唯丙吉以年老優游不案吏罪於是宰府習為常俗更共罔養以崇虛名或未曉其職便復遷徙誠非建官賦祿之意宜勑正百司各責以事州郡所舉必得其人若不如言裁以法令傳曰上德以寬服民其次莫如猛故火烈則人望而畏之水懦則人狎而翫之為政者寬以濟猛猛以濟寬如此綏御有體災眚消矣書奏帝納其言而免酺等官建初元年遷五官中郎將除三子為郎嚴數薦達賢能申解冤結多見納用復以五官中郎將行長樂衞尉事二年拜陳留太守嚴當之職乃言於帝曰昔顯親侯竇固誤先帝出兵西域置伊吾盧屯煩費無益又竇勳受誅其家不宜親近京師是時勳女為皇后竇氏方寵時有側聽嚴言者以告竇憲兄弟由是失權貴心嚴下車明賞罰發姦慝郡界清靜時京師訛言賊從東方來百姓奔走轉相驚動諸郡遑急各以狀聞嚴察其虛妄獨不為備詔書勑問使驛係道嚴固執無賊後卒如言典郡四年坐與宗正劉軼少府丁鴻等更相屬託徵拜太中大夫十餘日遷將作大匠七年復坐事免後既為竇氏所忌遂不復在位及帝崩竇太后臨朝嚴乃退居自守訓教子孫永元十年卒於家時年八十二弟敦官至虎賁中郎將嚴七子唯續融知名續字季則七歲能通論語十三明尚書, WYG: ''}
