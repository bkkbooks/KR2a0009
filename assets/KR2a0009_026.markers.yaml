  - {type: variant, offset: 5468, length: 4, content: 請試守渭, WYG: 雍地裂是後西羌大宼涼州殤帝延平元年五月壬辰河東恒山崩是時鄧太后專政秋八月殤帝崩安帝永初元年六月丁巳河東楊地䧟東西百四十步南北百二十步深三丈五尺六年六月壬辰豫章員谿原山崩各六十三所元初元年三月己卯日南地坼長百八十二里其後三年正月蒼梧鬱林合浦盜賊群起劫略吏民二年六月河南雒陽新}
  - {type: page-break, offset: 5468, content: '', id: KR2a0009_WYG_026-8a, image: WYG0252/WYG0252-0343c.png}
  - {type: variant, offset: 5468, length: 4, content: 請試守渭, krp: 雍地裂是後西羌大宼涼州殤帝延平元年五月壬辰河東恒山崩是時鄧太后專政秋八月殤帝崩安帝永初元年六月丁巳河東楊地䧟東西百四十步南北百二十步深三丈五尺六年六月壬辰豫章員谿原山崩各六十三所元初元年三月己卯日南地坼長百八十二里其後三年正月蒼梧鬱林合浦盜賊群起劫略吏民二年六月河南雒陽新}
  - {type: variant, offset: 5473, length: 1, content: 宰, WYG: 地裂延光二年七月丹陽山崩四十七所三年六月庚午巴郡閬中山崩四年十月丙午蜀郡越嶲山崩殺四百餘人丙午天子㑹日也是時閻太后攝政其十一月中黄門孫程等殺江京立順帝誅閻后兄弟明年閻后崩順帝陽嘉二年六月丁丑雒陽宣徳亭地坼長八十五丈近郊地時李固對䇿以為隂類專恣將有分離之象所以附郊城者是上帝示象以誡陛下也是時宋娥}
