  - {type: variant, offset: 2742, length: 1078, content: 合萬餘人擊破廣等斬之又交阯女子徵側及女弟徵貳反攻沒其郡九真日南合浦蠻夷皆應之寇略嶺外六十餘城側自立為王於是璽書拜援伏波將軍以扶樂侯劉隆為副督樓船將軍段志等南擊交阯軍至合浦而志病卒詔援并將其兵遂緣海而進隨山刊道千餘里十八年春軍至浪泊上與賊戰破之斬首數千級降者萬餘人援追徵側等至禁谿數敗之賊遂散走明年正月斬徵側徵貳傳首洛陽封援為新息侯食邑三千戶援乃擊牛釃酒勞饗軍士從容謂官屬曰吾從弟少游常哀吾慷慨多大志曰士生一世但取衣食裁足乘下澤車御款段馬為郡掾史守墳墓鄉里稱善人斯可矣致求盈餘但自苦耳當吾在浪泊西里閒虜未滅之時下潦上霧毒氣重蒸仰視飛鳶跕跕墯水中臥念少游平生時語何可得也今賴士大夫之力被蒙大恩猥先諸君紆佩金紫且喜且慙吏士皆伏稱萬歲援將樓船大小二千餘艘戰士二萬餘人進擊九真賊徵側餘黨都羊等自無功至居風斬獲五千餘人嶠南悉平援奏言西于縣戶有三萬二千遠界去庭千餘里請分為封溪望海二縣許之援所過輒為郡縣治城郭穿渠灌溉以利其民條奏越律與漢律駮者十餘事與越人申明舊制以約束之自後駱越奉行馬將軍故事二十年秋振旅還京師軍吏經瘴疫死者十四五賜援兵車一乘朝見位次九卿援好騎善別名馬於交阯得駱越銅鼓乃鑄為馬式還上之因表曰夫行天莫如龍行地莫如馬馬者甲兵之本國之大用安寧則以別尊卑之序有變則以濟遠近之難昔有騏驥一日千里伯樂見之昭然不惑近世有西河子輿亦明相法子輿傳西河儀長孺長孺傳茂陵丁君都君都傳成紀楊子阿臣援嘗師事子阿受相馬骨法考之於行事輒有驗効臣愚以為傳聞不如親見視景不如察形今欲形之於生馬則骨法難備具又不可傳之於後孝武皇帝時善相馬者東門京鑄作銅馬法獻之有詔立馬於魯班門外則更名魯班門曰金馬門臣謹依儀氏中帛氏口齒謝氏脣丁氏身中備此數家骨相以為法馬高三尺五寸圍四尺五寸有詔置於宣德殿下以為名馬式焉初援軍還將至故人多迎勞之平陵人孟冀名有計謀於坐賀援援謂之曰吾望子有善言反同衆人邪昔伏波將軍路博德開置七郡裁封數百戶今我微勞猥饗大縣功薄賞厚何以能長久乎先生奚用相濟冀曰愚不及援曰方今匈奴烏桓尚擾北邊欲自請擊之男兒要當死於邊野以馬革裹屍還葬耳何能臥牀上在兒女子手中邪冀曰諒為烈士當如此矣還月餘會匈奴烏桓寇扶風援以三輔侵擾園陵危逼因請行許之自九月至京師十二月復出屯襄國詔百官祖道援謂黃門郎梁松竇固曰凡人為貴當使可賤如卿等欲不可復賤居高堅自持勉思鄙言松後果以貴滿致災固亦幾不免明年秋援乃將三千騎出高柳行鴈門代郡上谷障塞烏桓候者見漢軍至虜遂散去援無所得而還援嘗有疾梁松來候之獨拜牀下援不荅松去後諸子問曰梁伯孫帝壻貴重朝廷公卿已下莫不憚之大人柰何獨不為禮援曰我乃松父友也雖貴何得失其序乎松由是恨之二十四年, WYG: 遣}
