  - {type: variant, offset: 3916, length: 292, content: 征五溪援夜與送者訣謂友人謁者杜愔曰吾受厚恩年迫餘日索常恐不得死國事今獲所願甘心瞑目但畏長者家兒或在左右或與從事殊難得調介介獨惡是耳明年春軍至臨鄉遇賊攻縣援迎擊破之斬獲二千餘人皆散走入竹林中初軍次下雋有兩道可入從壺頭則路近而水嶮從充則塗夷而運遠帝初以為疑及軍至耿舒欲從充道援以為𠫓廾日費糧不如進壺頭搤其喉咽充賊自破以事上之帝從援策三月進營壺頭賊乘高守隘水疾船不得上會暑甚士卒多疫死援亦中病遂困乃穿岸為室以避炎氣賊每升險鼓譟援輒曳足以觀之左右哀其壯意莫不為之流涕耿舒與兄好畤侯弇書曰前舒上書當先擊充糧雖難運而兵馬得用軍人數萬爭欲先奮今壺頭竟不得進大衆怫鬱行死誠可痛惜前到臨鄉賊無故自致若夜, WYG: ''}
