  - {type: variant, offset: 972, length: 1, content: 遂, krp: 武谿蠻夷反為宼害至南郡}
  - {type: variant, offset: 974, length: 764, content: 兵拒漢援乃上疏曰臣援自念歸身聖朝奉事陛下本無公輔一言之薦左右為容之助臣不自陳陛下何因聞之夫居前不能令人輊居後不能令人軒與人怨不能為人患臣所恥也故敢觸冒罪忌昧死陳誠臣與隗囂本實交友初囂遣臣東謂臣曰本欲為漢願足下往觀之於汝意可即專心矣及臣還反報以赤心實欲導之於善非敢譎以非義而囂自挾姦心盜憎主人怨毒之情遂歸於臣臣欲不言則無以上聞願聽詣行在所極陳滅囂之術得空匈腹申愚策退就隴畝死無所恨帝乃召援計事援具言謀畫因使援將突騎五千往來游說囂將高峻任禹之屬下及羌豪為陳禍福以離囂友支黨援又為書與囂將楊廣使曉勸於囂曰春卿無恙前別冀南寂無音驛援閒還長安因留上林竊見四海已定兆民同情而季孟閉拒背畔為天下表的常懼海內切齒思相屠裂故遺書戀戀以致惻隱之計乃聞季孟歸罪於援而納王游翁諂邪之說自謂函谷以西舉足可定以今而觀竟何如邪援閒至河內過存伯春見其奴吉從西方還說伯春小弟仲舒望見吉欲問伯春無它否竟不能言曉夕號泣婉轉塵中又說其家悲愁之狀不可言也夫怨讎可刺不可毀援聞之不自知泣下也援素知季孟孝愛曾閔不過夫孝於其親豈不慈於其子可有子抱三木而跳梁妄作自同分羹之事乎季孟平生自言所以擁兵衆者欲以保全父母之國而完墳墓也又言苟厚士大夫而已而今所欲全者將破亡之所欲完者將毀傷之所欲厚者將反薄之季孟嘗折愧子陽而不受其爵今更共陸陸欲往附之將難為顏乎若復責以重質當安從得子主給是哉往時子陽獨欲以王相待而春卿拒之今者歸老更欲低頭與小兒曹共槽櫪而食併肩側身於怨家之朝乎男兒溺死何傷而拘游哉今國家待春卿意深宜使牛孺卿與諸耆老大人共說季孟若計畫不從真可引領去矣前披輿地圖見天下郡國百有六所柰何欲以區區二邦以當諸夏百有四乎春卿事季孟外有君臣之義內有朋友之道言君臣邪固當諫爭語朋友邪應有切磋豈有知其無成而但萎腇咋舌叉手從族乎及今成計殊尚善也過是欲少味矣且來君叔天下信士朝廷重之其意依依常獨為西, WYG: 荆}
