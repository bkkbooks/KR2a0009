  - {type: variant, offset: 1739, length: 1000, content: 言援商朝廷尤欲立信於此必不負約援不得久留願急賜報廣竟不荅八年帝自西征囂至漆諸將多以王師之重不宜遠入險阻計冘豫未決會召援夜至帝大喜引入具以羣議質之援因說隗囂將帥有土崩之埶兵進有必破之狀又於帝前聚米為山谷指畫形埶開示衆軍所從道徑往來分析曲折昭然可曉帝曰虜在吾目中矣明旦遂進軍至第一囂衆大潰九年拜援為太中大夫副來歙監諸將平涼州自王莽末西羌寇邊遂入居塞內金城屬縣多為虜有來歙奏言隴西侵殘非馬援莫能定十一年夏璽書拜援隴西太守援迺發步騎三千人擊破先零羌於臨洮斬首數百級獲馬牛羊萬餘頭守塞諸羌八千餘人詣援降諸種有數萬屯聚寇鈔拒浩亹隘援與揚武將軍馬成擊之羌因將其妻子輜重移阻於允吾谷援乃潛行閒道掩赴其營羌大驚壞復遠徙唐翼谷中援復追討之羌引精兵聚北山上援陳軍向山而分遣數百騎繞襲其後乘夜放火擊鼓叫譟虜遂大潰凡斬首千餘級援以兵少不得窮追收其穀糧畜產而還援中矢貫脛帝以璽書勞之賜牛羊數千頭援盡班諸賓客是時朝臣以金城破羌之西塗遠多寇議欲棄之援上言破羌以西城多完牢易可依固其田土肥壤灌溉流通如令羌在湟中則為害不休不可𠫓廾也帝然之於是詔武威太守令悉還金城客民歸者三千餘口使各反舊邑援奏為置長吏繕城郭起塢候開導水田勸以耕牧郡中樂業又遣羌豪楊封譬說塞外羌皆來和親又武都氐人背公孫述來降者援皆上復其侯王君長賜印綬帝悉從之乃罷馬成軍十三年武都參狼羌與塞外諸種為寇殺長吏援將四千餘人擊之至氐道縣羌在山上援軍據便地奪其水草不與戰羌遂窮困豪帥數十萬戶亡出塞諸種萬餘人悉降於是隴右清靜援務開寬恩信恩寬以待下任吏以職但總大體而已賓客故人日滿其門諸曹時白外事援輒曰此丞掾之任何足相煩頗哀老子使得遨游若大姓侵小民黠羌欲旅距此乃太守事耳傍縣嘗有報仇者吏民驚言羌反百姓奔入城郭狄道長詣門請閉城發兵援時與賓客飲大笑曰燒虜何敢復犯我曉狄道長歸守寺舍良怖急者可牀下伏後稍定郡中服之視事六年徵入為虎賁中郎將初援在隴西上書言宜如舊鑄五銖錢事下三府三府奏以為未可許事遂寑及援還從公府求得前奏難十餘條乃隨牒解釋更具表言帝從之天下賴其便援自還京師數被進見為人明須髮眉目如畫閑於進對尤善述前世行事每言及三輔長者下至閭里少年皆可觀聽自皇太子諸王侍聞者莫不屬耳忘倦又善兵策帝常言伏波論兵與我意合每有所謀未嘗不用初卷人維汜訞言稱神有弟子數百人坐伏誅後其弟子李廣等宣言汜神化不死以誑惑百姓十七年遂共聚會徒黨攻沒晥城殺晥侯劉閔自稱南岳大師遣謁者張宗將兵數千人討之復為廣所敗於是使援發, WYG: ''}
