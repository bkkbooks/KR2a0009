  - {type: variant, offset: 3829, length: 0, content: '', krp: 制度奢廣多壞吏民冡尚書欒巴諌事太后怒癸卯詔書收巴下獄欲殺之丙午地震於是太后乃出巴免為庻人桓帝建和元年四月庚寅京都地震九月丁卯京都地震是時梁太后攝政兄冀持權至和平元年太后崩然冀猶秉政專事至延熹二年乃誅滅三年九月己卯地震庚寅又震元嘉元年十一月辛巳京都地震二年正月丙辰京都地震十月乙亥京都地震永興二年二月癸卯京都地震永夀二年十二月京都地震延熹四年京都右扶風涼州地震}
  - {type: variant, offset: 3830, length: 1, content: 溪, WYG: 年五月乙亥京都地震是時桓帝與中常侍單超等謀誅除梁冀聽之並使用事專權又鄧皇后本小人性行無恒茍有顔色立以為后後卒坐執左道廢以憂死八年九月丁未京都地震靈帝建寜四年二月癸卯地震是時中常侍曹節王甫等皆專權熹平二年六月地震六年十月辛丑地震光和元年二月辛未地震四月丙辰地震靈帝時宦者專恣二年三月京兆地震三年自秋至明年春酒泉表氏地八十餘動涌水出城中官寺民舎皆䪺縣易處更築城郭獻帝初平二年六月丙戌地震興平元年六月丁丑地震和帝永元元年七月㑹稽南山崩㑹稽南方大名山也京房易傳曰山崩隂乘陽弱勝强也劉向以為山陽君也水陰民也君道崩壊百姓失所也劉歆以為崩猶地也是時竇太后攝政兄竇顯專權七年七月趙國易陽地裂京房易傳曰地裂者臣下分離不肯相從也是時南單于衆乖離漢軍追討十二年夏閏四月戊辰南郡秭歸山髙四百丈崩塡谿殺百餘人明年冬至}
