  - {type: variant, offset: 5633, length: 3, content: 磐果與, WYG: 年二年六月京都及郡國四十八大風拔樹三年五月癸酉京都大風拔南郊道梓樹九十六枚七年八月丙寅京都大風拔樹元初二年二月癸亥京都大風拔樹六年夏四月沛國勃海大風拔樹三萬餘枚延光二年三月丙申河東潁川大風拔樹六月壬午郡國十一大風拔樹是時安帝親讒曲直不分三年京都及郡國三十六大風拔樹靈帝建寜二年四月癸巳京都大風雨雹拔郊道樹十圍已上百餘枚其後晨迎氣東郊道於雒水西橋逢暴風雨道鹵簿車或發蓋百官霑濡還不至郊使有}
  - {type: page-break, offset: 5633, content: '', id: KR2a0009_WYG_026-11a, image: WYG0252/WYG0252-0345a.png}
  - {type: variant, offset: 5633, length: 3, content: 磐果與, krp: 年二年六月京都及郡國四十八大風拔樹三年五月癸酉京都大風拔南郊道梓樹九十六枚七年八月丙寅京都大風拔樹元初二年二月癸亥京都大風拔樹六年夏四月沛國勃海大風拔樹三萬餘枚延光二年三月丙申河東潁川大風拔樹六月壬午郡國十一大風拔樹是時安帝親讒曲直不分三年京都及郡國三十六大風拔樹靈帝建寜二年四月癸巳京都大風雨雹拔郊道樹十圍已上百餘枚其後晨迎氣東郊道於雒水西橋逢暴風雨道鹵簿車或發蓋百官霑濡還不至郊使有}
  - {type: variant, offset: 5637, length: 1, content: 隸, WYG: 行禮迎氣西郊亦壹如此中平五年六月丙寅大風拔樹獻帝初平四年六月右扶風大風發屋拔木中興以來脂夜之妖無録者章帝七八年間郡縣大螟傷稼語在魯㳟傳而紀不録也是時章帝用竇皇后讒害宋梁二貴人廢皇太子靈帝熹平四年六月𢎞農三輔螟蟲為害是時靈帝用中常侍曹節等讒言禁錮海内清英之士謂之黨人中平二年七月三輔螟蟲為害明帝永平十八年牛疫死是嵗遣竇固等征西域置都護戊巳}
