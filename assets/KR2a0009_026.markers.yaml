  - {type: variant, offset: 152, length: 818, content: 以朴且從所好會況卒援行服朞年不離墓所敬事寡不冠不入廬後為郡督郵送囚至司命府囚有重罪援哀而縱之遂亡命北地遇赦因留牧畜賓客多歸附者遂役屬數百家轉游隴漢閒常謂賓客曰丈夫為志窮當益堅老當益壯因處田牧至有牛馬羊數千頭穀數萬斛既而歎曰凡殖貨財產貴其能施賑也否則守錢虜耳乃盡散以班昆弟故舊身衣羊裘皮絝王莽末四方兵起莽從弟衛將軍林廣招雄俊乃辟援及同縣原涉為掾薦之於莽莽以涉為鎮戎大尹援為新成大尹及莽敗援兄員時為增山連率與援俱去郡復避地涼州世祖即位員先詣洛陽帝遣員復郡卒於官援因留西州隗囂甚敬重之以援為綏德將軍與決籌策是時公孫述稱帝於蜀囂使援往觀之援素與述同里閈相善以為既至當握手歡如平生而述盛陳陛衛以延援入交拜禮畢使出就館更為援制都布單衣交讓冠會百官於宗廟中立舊交之位述鸞旗旄騎警蹕就車磬折而入禮饗官屬甚盛欲授援以封侯大將軍位賓客皆樂留援曉之曰天下雄雌未定公孫不吐哺走迎國士與圖成敗反修飾邊幅如偶人形此子何足久稽天下士乎因辭歸謂囂曰子陽井底蛙耳而妄自尊大不如專意東方建武四年冬囂使援奉書洛陽援至引見於宣德殿世祖迎笑謂援曰卿遨遊二帝閒今見卿使人大慙援頓首辭謝因曰當今之世非獨君擇臣也臣亦擇君矣臣與公孫述同縣少相善臣前至蜀述陛戟而後進臣臣今遠來陛下何知非刺客姦人而簡易若是帝復笑曰卿非刺客顧說客耳援曰天下反覆盜名字者不可勝數今見陛下恢廓大度同符高祖乃知帝王自有真也帝甚壯之援從南幸黎丘轉至東海及還以為待詔使太中大夫來歙持節送援西歸隴右隗囂與援共臥起問以東方流言及京師得失援說囂曰前到朝廷上引見數十每接讌語自夕至旦才明勇略非人敵也且開心見誠無所隱伏闊達多大節略與高帝同經學博覽政事文辯前世無比囂曰卿謂何如高帝援曰不如也高帝無可無不可今上好吏事動如節度又不喜飲酒囂意不懌曰如卿言反復勝邪然雅信援故遂遣長子恂入質援因將家屬隨恂歸洛陽居數月而無它職任援以三輔地曠土沃而所將賓客猥多乃上書求屯田上林苑中帝許之會隗囂用王元計意更狐疑援數以書記責譬於囂囂怨援背己得書增怒, WYG: ''}
