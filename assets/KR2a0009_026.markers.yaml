  - {type: variant, offset: 3827, length: 1, content: 武, WYG: 之爲夷所圍復發兵赴之尚遂為所没章帝建初元年三月甲申山陽東平地震和帝永元四年六月丙辰郡國十三地震春秋漢含孳曰女主盛臣制命則地動坼畔震起山崩淪是時竇太后攝政兄竇憲專權將以是受禍也後五日詔牧憲印綬兄弟就國逼廹皆自殺五年二月戊午隴西地震儒說民安土者也將大動行大震九月匈奴單于於除難鞬叛遣使發邉郡兵討之七年九月癸卯京都地震儒説奄官無陽施猶婦人也是時和帝與中常侍鄭衆謀奪竇氏權徳之因任用之及幸常侍蔡倫二人始並用權九年三月庚辰隴西地震閏月塞外羌犯塞殺略吏民使征西將軍劉尚擊之安帝永初元年郡國十八地震李固曰地者隂也法當安靜今乃越隂之職專陽之政故應以震動是時鄧太后攝政專事訖建光中太后崩安帝乃得制政於是隂類並勝西羌亂夏連十餘年二年郡國十二地震三年十二月辛酉郡國九地震四年三月癸巳郡國四地震五年正月丙戌郡國十地震七年正月壬寅二月丙午郡國十八地震元初元年郡國十五地震二年十一月庚申郡國十地震三年二月郡國十地震十一月癸卯郡國九地震四年郡國十三地震五年郡國十四地震六年二月乙巳京都郡國四十二地震或地坼裂涌水敗壞城郭民室屋壓人冬郡國八地震永寜元年郡國二十三地震建光元年九月己丑郡國三十五地震或地坼裂壞城郭室屋壓殺人是時安帝不能明察信宫人及阿母聖等讒云破壞鄧太后家於是專聽信聖及宦者中常侍江京樊豐等皆得擅權延光元年七月癸卯京都郡國十三地震九月戊申郡國二十七地震二年京都郡國三十二地震三年京都郡國二十三地震是時以讒免太尉楊震廢太子四年十月丁巳京都郡國十六地震時安帝既崩閻太后攝政兄弟閻顯等並用事遂斥安帝子更徴諸國王子未至中黄門遂誅顯兄弟順帝永建三年正月丙子京都漢陽地震漢陽屋壞殺人地坼涌水出是時順帝阿母宋娥及中常侍張昉等用權陽嘉二年四月己亥京都地震是時爵號宋娥為山陽君四年十二月甲寅京都地震永和二年四月庚申京都地震是時宋娥構姦誣罔五月事覺収印綬歸田里十一月丁卯京都地震是時太尉王龔以中常侍張昉等專弄國權欲奏誅之時龔宗親有以楊震行事諌之止云三年二月乙亥京都金城隴西地震裂城郭室屋多壞壓殺人閏月己酉京都地震十月西羌二千餘騎入金城塞爲涼州害四年三月乙亥京都地震五年二月戊申京都地震建康元年正月凉州都郡六地震從去年九月以來至四月凡百八十日震山谷坼裂壞敗城寺傷害人物三月護羌校尉趙冲為叛胡所殺九月丙午京都地震是時順帝崩梁太后攝政欲為順帝作}
