  - {type: variant, offset: 16, length: 0, content: '', WYG: 八張宗傳張宗字諸君南陽魯陽人也王莽時為縣陽泉鄉佐續漢書曰鄉佐主佐鄉收稅賦㑹莽敗義兵起宗乃率陽泉民三四百人起兵略地西至長安更始以宗為偏將軍宗見更始政亂因將家屬客安邑及大司徒鄧禹西征定河東宗詣禹自歸禹聞宗數多權謀乃表為偏將軍禹軍到栒邑赤眉大衆且至禹以栒邑不足守欲引師進就堅城而衆人多畏賊追憚為後拒禹乃書諸將名於竹簡署其前後亂著笥中令各探之笥以竹為之鄭𤣥注禮記云圓曰簟方曰笥宗獨不肯探曰死生有命張宗豈辭難就逸乎禹歎息謂曰將軍有親弱在營奈何不顧宗曰愚聞一卒畢力百人不當萬夫致死可以横行宗今擁兵數千以承大威何遽其必敗乎遂留為後拒諸營既引兵宗方勒厲軍士堅壘壁以死當之禹到前縣議曰以張將軍之衆當百萬之師猶以小雪投沸湯雖欲戮力其勢不全也乃遣歩騎}
  - {type: page-break, offset: 16, content: '', id: KR2a0009_WYG_068-1b, image: WYG0252/WYG0252-0819b.png}
  - {type: page-break, offset: 16, content: '', id: KR2a0009_WYG_068-2a, image: WYG0252/WYG0252-0819c.png}
