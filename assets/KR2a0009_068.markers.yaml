  - {type: variant, offset: 17, length: 2, content: 荀淑, WYG: 千人反還迎宗宗引兵始發而赤眉卒至宗與戰郤之乃得歸營於是諸將服其勇及還到長安宗夜將銳士入城襲赤眉中矛貫胛胛背上兩膊間又轉攻諸營保為流矢所激皆㡬至於死及鄧禹徴還光武以宗為京輔都尉秦每郡有尉一人典兵禁景帝更名都尉武帝元鼎四年置京輔都尉各一人二千石見前書也劉攽曰按武帝置三輔都尉此注下文又有各}
