  - {type: variant, offset: 4747, length: 1, content: 嘉, WYG: 此云初平當是元初之誤滕撫傳磐牙連嵗牙字是㸦字之誤築營於當塗山中注當塗縣之山也在今宣州刋誤補遺曰按有兩當塗縣一在九江郡一在宣州宣之當塗晉成帝始置東都固未之有度尚傳㓂益陽注益陽縣名在益水之陽臣㑹汾按在益水之陽此前書音義中語也監本在字下加今字無義理去之初試守宣城長悉移深林逺藪椎髻鳥語之人置于縣下注宣城縣故城在今宣州南陵縣東諸本同臣㑹汾按宣城屬丹陽郡}
