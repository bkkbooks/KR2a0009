  - {type: variant, offset: 1891, length: 1436, content: 空爽自被徵命及登台司九十五日因從遷都長安爽見董卓忍暴滋甚必危社稷其所辟舉皆取才略之士將共圖之亦與司徒王允及卓長史何顒等為內謀會病薨年六十三著禮易傳詩傳尚書正經春秋條例又集漢事成敗可為鑒戒者謂之漢語又作公羊問及辯讖并它所論題為新書凡百餘篇今多所亡缺兄子悅彧並知名彧自有傳論曰荀爽鄭玄申屠蟠俱以儒行為處士累徵並謝病不詣及董卓當朝復備禮召之蟠玄竟不屈以全其高爽已黃髮矣獨至焉未十旬而取卿相意者疑其乖趣舍余竊商其情以為出處君子之大致也平運則弘道以求志陵夷則濡跡以匡時荀公之急急自勵其濡跡乎不然何為違貞吉而履虎尾焉觀其遜言遷都之議以救楊黃之禍及後潛圖董氏幾振國命所謂大直若屈道固逶迤也悅字仲豫儉之子也儉早卒悅年十二能說春秋家貧無書每之人閒所見篇牘一覽多能誦記性沈靜美姿容尤好著述靈帝時閹官用權士多退身窮處悅乃託疾隱居時人莫之識雖從弟彧特稱敬焉初辟鎮東將軍曹操府遷黃門侍郎獻帝頗好文學悅與彧及少府孔融侍講禁中旦夕談論累遷祕書監侍中時政移曹氏天子恭己而已悅志在獻替而謀無所用乃作申鑒五篇其所論辯通見政體既成而奏之其大略曰夫道之本仁義而已矣五典以經之群籍以緯之詠之歌之弦之舞之前監既明後復申之故古之聖王其於仁義也申重而已則政末由行矣夫俗亂則道荒雖天地不得保其性矣法壞則世傾雖人主不得守其度矣軌越則禮亡雖聖人不得全其道矣制敗則欲肆雖四表不得充其求矣是謂四患賞罰以統其法是謂五政人不畏死不可懼以罪人不樂生不可勸以善雖使契布五教臯陶作士政不行焉故在上者先豐人財以定其志帝耕籍田后桑蠶宮國無遊人野無荒業財不賈用力不妄加以周人事是謂養生好醜焉善惡要乎功罪毀譽効於準驗聽言責事舉名察實無惑詐偽以蕩衆心故事無不覈物無不切善無不顯惡無不章俗無姦怪民無淫風百姓上下覩利害之存乎己也故肅恭其心慎修其行內不回惑外無異望則民志平矣是謂正俗君子以情用小人以刑用榮辱者賞罰之精華也故禮教榮辱以加君子化其情也桎梏鞭撲以加小人化其刑也君子不犯辱況於刑乎小人不忌刑況於辱乎若教化之廢推中人而墜於小人之域教化之行引中人而納於君子之塗是謂章化小人之情緩則驕驕則恣恣則怨怨則叛危則謀亂安則思欲非威強無以懲之故在上者必有武備以戒不虞以遏寇虐安居則寄之內政有事則用之軍旅是謂秉威徒愛其財也賞妄行則善不勸矣不妄罰非矜其人也罰妄行則惡不懲矣賞不勸謂之止善罰不懲謂之縱惡在上者能不止下為善不縱下為惡則國法立矣是謂統法施之無事事之使自交之不肅而成不嚴而化垂拱揖讓而海內平矣是謂為政之方禮以陰乘陽違天以婦陵夫違人違天不祥違人不義又古者天子諸侯有事必告于廟朝有二史左史記言右史書事事為春秋言為尚書君舉必記善惡成敗無不存焉下及士庶苟有茂異咸在載籍或欲顯而不得或欲隱而名章得失一朝而榮辱千載善人勸焉淫人懼焉宜於今者備置史官掌其典文紀其行事每於歲盡舉之尚書以助賞罰以弘法教帝好典籍常以班固漢書文繁難省乃令悅依左氏傳體以為漢紀三十篇詔尚書給筆札辭約事詳論辨多美其序之曰昔在上聖惟建皇極經緯天地觀象立法乃作書契以通宇宙揚于王庭厥用大焉先王光演大業肆于時夏亦惟厥後永世作典夫立典有五志焉一曰達道義二曰章法式三曰通古今四曰著功勳五曰表賢能於是天人之際事物之宜粲然顯著罔不備矣世濟其軌不隕其業損益盈虛與時消息臧否不同其揆一也漢四百有六載撥亂反正統武興文永惟祖宗之洪業思光啟乎萬嗣聖上穆然惟文之恤瞻前顧後是紹是繼闡崇大猷命立國典於是綴舊書以述漢紀中興以前明主賢臣得失之軌亦足以觀矣又著崇德正論及諸論數十篇年六十二建安十四年卒韓韶字仲黃潁川舞陽人也少仕郡辟司徒府時, WYG: 馬擊}
