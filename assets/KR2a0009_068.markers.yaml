  - {type: variant, offset: 601, length: 795, content: 世古今之制雖有損益而諒闇之禮未嘗改移以示天下莫遺其親今公卿羣寮皆政教所瞻而父母之喪不得奔赴夫仁義之行自上而始敦厚之俗以應乎下傳曰喪祭之禮闕則人臣之恩薄背死忘生者衆矣曾子曰人未有自致者必也親喪乎春秋傳曰上之所為民之歸也夫上所不為而民或為之故加刑罰若上之所為民亦為之又何誅焉昔丞相翟方進以自備宰相而不敢踰制至遭母憂三十六日而除夫失禮之源自上而始古者大喪三年不呼其門所以崇國厚俗篤化之道也事失宜正過勿憚改天下通喪可如舊禮禮義禮義備則人知所厝矣夫婦人倫之始王化之端故文王作易上經首乾坤下經首咸恆孔子曰天尊地卑乾坤定矣夫婦之道所謂順也堯典曰釐降二女於媯汭嬪于虞降者下也嬪者婦也言雖帝堯之女下嫁於虞猶屈體降下勤修婦道易曰帝乙歸妹以祉元吉婦人謂嫁曰歸言湯以娶禮歸其妹於諸侯也春秋之義王姬嫁齊使魯主之不以天子之尊加於諸侯也今漢承秦法設尚主之儀以妻制夫以卑臨尊違乾坤之道失陽唱之義孔子曰昔聖人之作易也仰則觀象於天俯則察法於池覩鳥獸之文與地之宜近取諸身遠取諸物以通神明之德以類萬物之情今觀法於天則北極至尊四星妃后察法於地則崐山象夫卑澤象妻覩鳥獸之文鳥則雄者鳴鴝雌能順服獸則牡為唱導牝乃相從近取諸身則乾為人首坤為人腹遠取諸物則木實屬天根荄屬地陽尊陰卑蓋乃天性且詩初篇實首關雎禮始冠婚先正夫婦天地六經其旨一揆宜改尚主之制以稱乾坤之性遵法堯湯式是周孔合之天地而不謬質之鬼神而不疑人事如此則嘉瑞降天吉符出地五韙咸備各以其矣枉欲從禮者則福歸之順情廢禮者則禍歸之推禍福之所應知興廢之所由來也衆禮之中婚禮為首故天子娶十二天之數也諸侯以下各有等差事之降也陽性純而能施陰體順而能化以禮濟樂節宣其氣故能豐子孫之祥致老壽之福及三代之季淫而無節瑤臺傾宮陳妾數百陽竭於上陰隔於下故周公之戒曰不知稼穡之艱難不聞小人之勞惟耽樂之從時亦罔或克壽是其明戒後世之人好福不務其本惡禍不易其軌傳曰趾適履孰云其愚何與斯人追欲喪軀誠可痛也臣竊聞後宮采女五, WYG: ''}
