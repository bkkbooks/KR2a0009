  - {type: variant, offset: 3495, length: 1126, content: 七十卒鍾皓字季明潁川長社人也為郡著姓世善刑律皓少以篤行稱公府連辟為二兄未仕避隱密山以詩律教授門徒千餘人同郡陳寔年不及皓皓引與為友皓為郡功曹會辟司徒府臨辭太守問誰可代卿者皓曰明府欲必得其人西門亭長陳寔可寔聞之曰鍾君似不察人不知何獨識我皓頃之自劾去前後九辟公府徵為廷尉正博士林慮長皆不就時皓及荀淑並為士大夫所歸慕李膺常歎曰荀君清識難尚鍾君至德可師皓兄子瑾母膺之姑也瑾好學慕古有退讓風與膺同年俱有聲名膺祖太尉脩常言瑾似我家性邦有道不廢邦無道免於刑戮復以膺妹妻之瑾辟州府未嘗屈志膺謂之曰孟子以為人無是非之心非人也弟何期不與孟軻同邪瑾常以膺言白皓皓曰昔國武子好昭人過以致怨本卒保身全家爾道為貴其體訓所安多此類也年六十九終於家諸儒頌之曰林慮懿德非禮不處悅此詩書弦琴樂古五就州招九應台輔逡巡王命卒歲容與皓孫繇建安中為司隸校尉陳寔字仲弓潁川許人也出於單微自為兒童雖在戲弄為等類所歸少作縣吏常給事廝役後為都亭刺佐而有志好學坐立誦讀縣令鄧邵試與語奇之聽受業太學後令復召為吏乃避隱陽城山中時有殺人者同縣楊吏以疑寔縣遂逮繫考掠無實而後得出及為督郵乃密託許令禮召楊吏遠近聞者咸歎服之家貧復為郡西門亭長尋轉功曹時中常侍侯覽託太守高倫用吏倫教署為文學掾寔知非其人懷檄請見言曰此人不宜用而侯常侍不可違寔乞從外署不足以塵明德倫從之於是鄉論怪其非舉寔終無所言倫後被徵為尚書郡中士大夫送至輪氏傳舍倫謂衆人言曰吾前為侯常侍用吏陳君密持教還而於外白署比聞議者以此少之此咎由故人畏憚強禦陳君可謂善則稱君過則稱己者也寔固自引愆聞者方歎息由是天下服其德司空黃瓊辟選理劇補聞喜長旬月以朞喪去官復再遷除太丘長修德清靜百姓以安鄰縣人戶歸附者寔輒訓導譬解發遣各令還本司官行部吏慮有訟者白欲禁之寔曰訟以求直禁之理將何申其勿有所拘司官聞而歎息曰陳君所言若是豈有怨於人乎亦竟無訟者以沛相賦斂違法及解印綬去吏人追思之及後逮捕黨人事亦連寔餘人多逃避求免寔曰吾不就獄衆無所恃乃請囚焉遇赦得出靈帝初大將軍竇武辟以為掾屬時中常侍張讓權傾天下讓父死歸葬潁川雖一郡畢至而名士無往者讓甚恥之寔乃獨弔焉乃後復誅黨人讓感寔故多所全宥寔在鄉閭平心率物其有爭訟輒求判正曉譬曲直退無怨者至乃歎曰寧為刑罰所加不為陳君所短時歲荒民儉有盜夜入其室止於梁上寔陰見乃起自整拂呼命子孫正色訓之曰夫人不可不自勉不善之人未必本惡習以性成遂至於此梁上君子者是矣盜大驚自投於地稽顙歸罪寔徐譬之曰視君狀貌不似惡人宜深剋己反善然此當由貧困令遺絹二匹自是一縣無復盜竊太尉楊賜司徒陳耽每拜公卿羣僚畢賀賜等常歎寔大位未登愧於先之及黨禁始解大將軍何進司徒袁隗遣人敦寔欲特表以不次之位寔乃謝使者曰寔久絕人事飾巾待終而已時三公每缺議者歸之累見徵命遂不起閉門懸車棲養老中平四年年, WYG: 庚午凡}
