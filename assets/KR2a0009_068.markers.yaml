  - {type: variant, offset: 4885, length: 199, content: 有違命則威之以武今關東兵起民不堪命若謙遠朝政率師討伐則塗炭之民庶幾可全若欲徙萬乘以自安將有累卵之危崢嶸之險也卓意甚忤而敬紀名行無所復言時議欲以為司徒紀見禍亂方作不復辨嚴即時之郡璽書追拜太僕又徵為尚書令建安初袁紹為太尉讓於紀紀不受拜大鴻臚年七十一卒於官子羣為魏司空天下以為公慙卿卿慙長弟諶字季方與紀齊德同行父子並著高名時號三君每宰府辟召常同時旌命羔鴈成羣當世者靡不榮之諶早終論曰漢自中世以下閹豎恣故俗, WYG: 膽智語}
