  - {type: variant, offset: 1468, length: 357, content: 諸非禮聘未曾幸御者一皆遣出使成妃合一曰通怨曠和陰陽二曰省財用實府藏三曰脩禮制綏眉壽四曰配陽施祈螽斯五曰寬役賦安黎民此誠國家之弘利天人之大福也為其節也易曰天地節而四時成春秋傳曰唯器與名不可以假人孝經曰安上治民莫善於禮禮者尊卑之差上下之制也昔季氏八佾舞於庭非有傷害困於人物而孔子猶曰是可忍也孰不可忍洪範曰惟辟作威惟辟作福惟辟玉食凡此三者君所獨行而臣不得同也今臣僭君服下食上珍所謂害于而家凶於而國者也宜略依古禮尊卑之差及董仲舒制度之別嚴篤督有司必行其命此則禁亂善俗足用之要奏聞即𠫓廾官去後遭黨錮隱於海上又南遁漢濱積十餘年以著述為事遂稱為碩儒黨禁解五府並辟司空袁逢舉有道不應及逢卒爽制服三年當世往往化以為俗時人多不行妻服雖在親憂猶有弔問喪疾者又私謚其君父及諸名士爽皆引據大義正之經典雖不悉變亦頗有改後公車徵為大將軍何進從事, WYG: ''}
