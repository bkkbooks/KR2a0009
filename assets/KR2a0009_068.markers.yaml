  - {type: variant, offset: 62, length: 1, content: 徵, krp: 為幽州刺史疾忌姦惡數致其罪時𤣥莵太守姚光亦失人和建光元年怨者乃詐作璽書譴責煥光賜以歐刀又下遼東都尉龎奮使速行刑奮即斬光收煥煥欲自殺緄疑詔文有異止煥曰大人在州志欲去惡實無他故必是凶人妄詐規肆姦毒願以事自上甘罪無晚煥從其言上書自訟果詐者所為徴奮抵罪㑹煥病死獄中帝愍之賜煥光錢各十萬以子為郎中緄由是知名家富好施賑赴窮急為州里所歸愛初舉孝廉七遷為廣漢屬國都尉徴拜御史中丞順帝末以緄持節督揚州諸郡軍事與中郎將滕撫擊破羣賊遷隴西太守後鮮卑寇邊以緄為遼東太守曉喻降集虜皆弭散弭止也徴拜京兆尹轉司𨽻校尉所在立威刑遷廷尉太常時長沙蠻寇益陽屯聚積久至延熹五年衆轉盛而零陵蠻賊復反應之合二萬餘人攻燒城郭殺傷長吏又武陵蠻夷悉反寇掠江陵間荆州刺史劉度南郡太守李肅並奔走荆南皆没於是拜緄為車騎將軍將兵十餘萬討之詔䇿緄曰蠻夷猾夏久不討攝猾亂也夏華夏也攝持也書曰蠻夷猾夏各焚都城蹈藉官人州郡將吏死職之臣相逐奔竄曾不反顧可愧言也將軍素有威猛是以擢授六師六師猶六軍也詩云整我六師以修我戎也前代陳湯馮傅之徒以寡擊衆陳湯字子公山陽瑕丘人也元帝時為西域副校尉矯發西域諸國兵四萬人誅斬郅支單于傳首長安懸於藁街馮奉世字子明上黨潞人也宣帝時以衛尉持節送大宛諸國客到伊修城時莎車王萬年殺漢使者子明乃以節告諸國王發兵五千人擊莎車殺其王傳首詣長安傅介子北地人昭帝時為平樂監時樓蘭國數反覆霍光白遣介子與士卒齎金幣以賜外國為名至樓蘭樓蘭王與介子飲乃令壯士二人刺殺之持首詣闕郅支夜郎樓蘭之戎頭懸都街夜郎西南夷之國也成帝時夜郎王興數不從命牂柯太守陳立行縣至夜郎召興興從邑君數十人見立立數責因斷興頭案夜郎王首不傳京師殺之者陳立又非陳湯馮傅此盖泛論誅戮戎夷耳衛霍北征功列金石是皆將軍所究覽也衛青霍去病俱出擊匈奴青至寘顔山斬首九千級去病斬首七萬餘級次封狼居胥山迺還也今非將軍誰與修復前迹進赴之宜權時之策將軍一之出郊之事不復内御一猶専也言出郊以外不復由内制御也淮南子曰凡命將主親授鉞曰從此上至天將軍制之將答曰國不可從外理軍不可從中御也已命有司祖于國門祖道祭也鄭𤣥注禮記云天子九門路門也應門也雉門也庫門也臯門也國門也近郊門也逺郊門也闗門也詩不云乎進厥虎臣闞如虓虎敷敦淮濆仍執醜虜將軍其勉之詩大雅也當周宣王時徐方淮夷反叛宣王乃進其虎猛之臣謂方叔召虎之類也虓虎怒聲也水涯曰濆敷布也醜衆也仍因也言布兵敦逼淮水之涯因執得衆虜引詩戒緄令其勉也時天下饑饉帑蔵虚盡每出征伐常減公卿奉禄假王侯租賦前後所遣將帥宦官輒陷以折耗軍資往往扺罪緄性烈直不行賄賂懼為所中乃上疏曰勢得容姦伯夷可疑茍曰無猜盗跖可信莊子曰孔子與栁下季為友弟名曰盗跖從卒九千人横行侵暴諸侯驅人馬牛取人婦女貪得無親萬人苦之故樂羊陳功文侯示以謗書樂羊魏將軍也史記曰魏文侯令樂羊將而攻中山三年而㧞之樂羊反而論功文侯示之謗書一箧樂羊再拜曰此非臣之功也願請中常侍一人監軍財費尚書朱穆奏緄以財自嫌失大臣之節有詔勿劾緄軍至長沙賊聞悉詣營道乞降營道今道州縣也進擊武陵蠻夷斬首四千餘級受降十萬餘人荆州平定詔書賜錢一億固讓不受振旅還京師推功於從事中郎應奉薦以為司隸校尉而上書乞骸骨朝廷不許監軍使者張敞承宦官旨奏緄將傅婢二人戎服自隨又輒於江陵刻石紀功請下吏案理尚書令黄儁奏議以為罪無正法不合致糾㑹長沙賊復起攻桂陽武陵緄以軍還盗賊復發策免頃之拜將作大匠轉河南尹上言舊典中官子弟不得為牧人職帝不納復為廷尉時山陽太守單遷以罪繫獄緄考致其死遷故車騎將軍單超之弟中官相黨遂共誹章誣緄坐與司隸校尉李膺大司農劉祐俱輸左校應奉上疏理緄等得免後拜屯騎校尉復為廷尉卒於官緄弟允清白有孝行能理尚書善推歩之術推歩謂究日月五星之度昬旦節氣之差拜降虜校尉終於家謝承書曰緄子鸞舉孝廉除郎中度尚傳度尚字博平山陽湖陸人也家貧不修學行不為鄉里所推舉續漢書曰尚少喪父事母至孝通京氏易古文尚書為吏清潔有文武才略與此不同積困窮乃為宦者同郡侯覽視田得為郡上計吏}
