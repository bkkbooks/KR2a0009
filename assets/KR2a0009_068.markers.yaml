  - {type: variant, offset: 3333, length: 0, content: '', WYG: 等破平之斬首三千餘級封烏程東鄉侯五百户烏程今湖州縣遷太山都尉寇盗望風奔亡及在長沙宿賊皆平卒於官桓帝下詔追增封徐五百户并前千户復以尚為荆州刺史尚見胡蘭餘黨南走蒼梧懼為已負乃}
  - {type: variant, offset: 3333, length: 0, content: '', krp: 等破平之斬首三千餘級封烏程東鄉侯五百户烏程今湖州縣遷太山都尉寇盗望風奔亡及在長沙宿賊皆平卒於官桓帝下詔追增封徐五百户并前千户復以尚為荆州刺史尚見胡蘭餘黨南走蒼梧懼為已負乃}
  - {type: variant, offset: 3334, length: 2, content: 號歷, WYG: 上言蒼梧賊入荆州界於是徴交阯刺史張磐下廷尉辭狀未正㑹赦見原磐不肯出獄方更牢持械節獄吏謂磐曰天恩曠然而君不出何也磐因自列曰前長沙賊胡蘭作難荆州餘黨散入交阯磐身膺甲胄渉危履險討擊凶患斬殄渠帥餘燼鳥竄冐遁還奔荆州刺史度尚懼磐先言怖畏罪戾戾亦罪也伏奏見誣磐備位方伯為國爪牙爪牙以猛獸為喻言為國之捍衛也詩曰祈父予王之爪牙也而為尚所枉受罪牢獄大事有虚實劉攽曰案文大當作夫法有是非磐實不辜赦無所除如忍以苟免永受侵辱之耻生為惡吏死為敝鬼乞傳尚詣廷尉靣對曲直足明真偽尚不徴者磐埋骨牢檻終不虚出望塵受枉廷尉以其狀上詔書徴尚到廷尉辭窮受罪以先有功得原磐字子石丹陽人以清白稱終於廬江太守尚後為遼東太守數月鮮卑率兵攻尚與戰破之戎狄憚畏}
