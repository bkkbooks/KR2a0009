  - {type: variant, offset: 24, length: 2, content: 潁陰, WYG: 桑中盗賊羣起宗將兵擊定之後青冀盗賊屯聚山澤宗以謁者督諸郡兵討平之十六年琅邪北海盗賊復起宗督二郡兵討之乃設方略明購賞皆悉破散於是沛楚東海臨淮羣賊懼其威武相捕斬者數千人青徐震慄後遷琅邪相其政好嚴猛敢殺伐永平二年卒於官法雄傳法雄字文彊扶風郿}
