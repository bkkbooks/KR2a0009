  - {type: variant, offset: 3337, length: 0, content: '', WYG: 五十延熹九年卒於官楊璇傳楊璇字機平㑹稽烏傷人也髙祖父茂本河東人從光武征伐為威寇將軍封烏傷新陽鄉侯建武中就國傳封三世有罪國除因而家焉父扶交阯刺史有理能名兄喬為尚書容儀偉麗數上言政事桓帝愛其才貌詔妻以公主喬固辭不聽遂閉口不食七日而死璇初舉孝廉稍遷靈帝時為零陵太}
