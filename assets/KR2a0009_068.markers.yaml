  - {type: variant, offset: 28, length: 1, content: 荀, WYG: 齊襄王法章之後秦滅齊子孫不敢稱田姓故以法為氏法章齊湣王子也法章子建立為秦所滅見史記宣帝時徙三輔世為二千石雄初仕郡功曹續漢志曰郡皆置諸曹掾史功曹史主選功勞也辟太傅張禹府舉雄髙第除平氏長平氏縣屬南陽郡故城今唐州平氏縣也善政事好發擿姦伏盗賊稀發吏人畏愛之南陽太守鮑得上其理狀遷宛陵令永初三年海賊張伯路等三千餘人冠赤幘服絳衣自稱將軍寇濵海九郡殺二千石令長初遣侍御史龎雄督州郡兵擊之伯路等乞降尋復屯聚明年伯路復與平原劉文河等三百餘人稱使者攻厭次城殺長吏厭次今棣州縣是也轉入髙唐髙唐今博州縣燒宫寺出繫囚渠帥皆稱將軍共朝謁伯路伯路冠五梁冠佩印綬漢官儀曰諸侯冠進賢三梁}
  - {type: page-break, offset: 28, content: '', id: KR2a0009_WYG_068-3b, image: WYG0252/WYG0252-0820b.png}
  - {type: variant, offset: 28, length: 1, content: 荀, krp: 齊襄王法章之後秦滅齊子孫不敢稱田姓故以法為氏法章齊湣王子也法章子建立為秦所滅見史記宣帝時徙三輔世為二千石雄初仕郡功曹續漢志曰郡皆置諸曹掾史功曹史主選功勞也辟太傅張禹府舉雄髙第除平氏長平氏縣屬南陽郡故城今唐州平氏縣也善政事好發擿姦伏盗賊稀發吏人畏愛之南陽太守鮑得上其理狀遷宛陵令永初三年海賊張伯路等三千餘人冠赤幘服絳衣自稱將軍寇濵海九郡殺二千石令長初遣侍御史龎雄督州郡兵擊之伯路等乞降尋復屯聚明年伯路復與平原劉文河等三百餘人稱使者攻厭次城殺長吏厭次今棣州縣是也轉入髙唐髙唐今博州縣燒宫寺出繫囚渠帥皆稱將軍共朝謁伯路伯路冠五梁冠佩印綬漢官儀曰諸侯冠進賢三梁}
  - {type: variant, offset: 30, length: 1, content: 十, WYG: 大夫尚書二千石冠兩梁千石以下至小吏冠}
  - {type: variant, offset: 30, length: 1, content: 十, krp: 大夫尚書二千石冠兩梁千石以下至小吏冠}
  - {type: variant, offset: 32, length: 0, content: '', WYG: 梁無五梁制者也黨衆浸盛乃遣御史中丞王宗持節發幽冀諸郡兵合數萬人乃徴雄為青州刺史與王宗并力討之連戰破賊斬首溺死者數百人餘皆奔走收器械財物甚衆㑹赦詔到賊猶以軍甲未觧不敢歸降於是王宗召刺史太守共議皆以為當遂擊之雄曰不然兵凶器戰危事史記范蠡之辭勇不可恃勝不可必賊若乗船浮海深入逺島攻之未易也及有赦令可且罷兵以慰誘其心勢必觧散然後圖之可不戰而定也宗善其言即罷兵賊聞大喜乃還所略人而東莱郡兵獨未觧甲賊復驚恐遁走遼東止海島上五年春乏食復抄東莱間雄率郡兵擊破之賊逃還遼東遼東人李久等共斬平之於是州界清静雄每行部録囚徒察顔色多得情偽長吏不奉法者皆觧印綬去在州四年遷南郡太守斷獄省少户口益増郡濵帶江沔水經曰沔水出武都沮縣東狼谷中至江夏沙羡縣北南入于江羡音夷又有雲夢藪澤雲夢澤今在安州永初中多虎狼之暴前太守賞募張捕反為所害者甚衆雄乃移書屬縣曰凡虎狼之在山林猶人之居城市古者至化之}
  - {type: page-break, offset: 32, content: '', id: KR2a0009_WYG_068-4a, image: WYG0252/WYG0252-0820c.png}
  - {type: page-break, offset: 32, content: '', id: KR2a0009_WYG_068-4b, image: WYG0252/WYG0252-0820d.png}
