  - {type: variant, offset: 35, length: 0, content: '', krp: 皆由恩信寛澤仁及飛走太守雖不徳敢忘斯義記到其毁壊檻穽不得妄捕山林檻謂捕獸之機也穽謂穽地陷獸也是後虎害稍息人以獲安在郡數嵗嵗常豐稔稔熟也初平中卒官子真在逸人傳滕撫傳滕撫字叔輔北海劇人也初仕州郡稍遷為涿令有文武才用太守以其能委任郡職兼領六縣續漢志涿郡領七縣除涿以外有逎故安范陽良鄉北新城方城六縣使撫兼領之風政修明流愛于人在事七年道不拾遺順帝末揚徐盗賊羣起磐牙連嵗磐牙謂相連結建康元年九江范容周生等相聚反亂屯據歴陽歴陽今和州縣為江淮巨患遣御史中丞馮緄將兵督揚州刺史尹燿九江太守鄧顯討之燿顯軍敗為賊所殺又隂陵人徐鳳馬勉等復㓂郡縣殺略吏人鳳衣絳衣帶黑綬稱無上將軍勉皮冠黄衣帶玉印稱皇帝築營於當塗山中當塗縣之山也在今宣州乃建年號置百官遣别帥黄虎攻没合肥合肥故城在今廬州北也明年廣陵賊張嬰等復聚衆數千人反據廣陵朝廷博求將帥三公舉撫有文武才拜為九江都尉與中郎將趙序助馮緄合州郡兵數萬人共討之又廣開賞募錢邑各有差梁太后慮羣賊屯結諸將不能制又議遣太尉李固未及行會撫等進擊大破之斬馬勉范容周生等千五百級徐鳳遂將餘衆攻燒東城縣東城縣故城在今豪州定逺縣東南下邳人謝安應募率其宗親設伏擊鳯斬之封安為平鄉侯邑三千户拜撫中郎將督揚徐二州事撫復進擊張嬰斬獲千餘人趙序坐畏懦不進詐增首級徴還棄市又歴陽賊華孟自稱黑帝攻九江殺郡守撫乗勝進擊破之斬孟等三千八百級虜獲七百餘人牛馬財物不可勝筭於是東南悉平振旅而還以撫為左馮翊除一子為郎撫所得賞賜盡分於麾下性方直不交權勢宦官懐忿及論功當封太尉胡廣時録尚書事承㫖奏黜撫天下怨之卒於家馮緄傳馮緄字鴻卿巴郡宕渠人也宕渠縣故城在今渠州東北緄音古本反}
