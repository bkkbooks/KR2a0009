  - {type: variant, offset: 33, length: 1, content: 孫, WYG: 猛獸不擾禮記曰大道之行四靈以為畜龍以為畜故魚鮪不淰鳳以為畜故鳥不獝麟以為畜故獸不狘是不擾之}
  - {type: page-break, offset: 33, content: '', id: KR2a0009_WYG_068-5a, image: WYG0252/WYG0252-0821a.png}
