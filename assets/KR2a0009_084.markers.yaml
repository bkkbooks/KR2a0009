  - {type: variant, offset: 2059, length: 1, content: 禮, WYG: 廟致孝享也萃卦詞也假至也假音格諸侯如臣之家春秋尚列其誡左傳齊荘公如崔杼之家為杼所殺也况以先王法服而私出槃游法服謂天子服日月星辰山龍華蟲藻火粉米黼黻十二章降亂尊卑等威無序等威謂威儀有等差也左傳曰貴有常尊賤有等威也侍衛守空宫紱璽委女妾設有非常之變任章之謀前書曰代郡太守任宣坐謀反誅宣子章為公車丞亡在渭城界中夜𤣥服八廟居廊間執㦸立}
