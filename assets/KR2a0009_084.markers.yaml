  - {type: variant, offset: 2671, length: 1, content: 擊, WYG: 竭忠盡情極言其要而反留意少子乞還女壻張禹成帝時為丞相以師傅恩禹每疾輙以起居聞車駕日臨問之拜禹牀下禹頓首謝恩言老臣有四男一女愛女甚於男逺嫁為張掖太守蕭咸妻不勝父子私情思與女相近上即時徙咸為𢎞農太守又屬少子未有官上臨候禹禹數視其少子上即禹牀下拜為黄門給事中也朱游欲得尚方斬馬劔以理之固其宜也朱雲字游張禹以帝師尊重雲上書求見公卿在前雲曰今朝廷大臣不能匡主臣願得尚方斬馬}
