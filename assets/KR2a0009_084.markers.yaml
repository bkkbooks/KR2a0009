  - {type: variant, offset: 2652, length: 9, content: 陽球字方正漁陽泉州, WYG: 俊乂在職三載考績尚書曰三載考績黜陟幽明也以觀厥成而今所序用無他徳有形埶者旬日累遷守真之徒歴載不轉勞逸無别善惡同流北山之詩所為訓作詩小雅曰陟彼北山言採其把偕偕士子朝夕從事大夫不均我從事獨賢又聞數微行出幸苑囿觀鷹犬之埶極槃遊之荒槃樂也詩云槃于遊田書曰内作色荒外作禽荒政事日墮許規切大化陵遲陛下不顧二祖之勤止二祖髙祖光武也詩云文王既勤止追慕五宗之美蹤文帝太宗武帝世宗宣帝中宗明帝顯宗章帝肅宗也而欲以望太平是由曲表而欲直景郤行而求及前}
