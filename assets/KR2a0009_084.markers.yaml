  - {type: variant, offset: 2663, length: 0, content: '', WYG: 孫卿子曰猶立枉木而求其影之直也韓詩外傳曰夫明鏡所以照形也徃古所以知今也夫知惡徃古之惡而不知修今之善惡徃古之所以危亡而不知襲積其所以安存則無以異乎却行而求逮於前人也宜絶慢慠之戲念官人之重割用板之恩愼貫魚之次板謂詔書也易剥卦曰貫魚以宫人寵言王者御宫人如貫魚之有次序也無令醜女有四殆之歎劉向列女傳曰鍾離春者齊無鹽邑之女齊宣王之正后也其為人也極醜無䨇白頭深目長壮大節卭鼻結喉肥項少髪折腰凸胷皮膚若漆年四十行嫁不售自謁宣王舉手拊膝曰殆哉殆哉曰今王之國西有衡秦之患南有强楚之讐外有二國之難一旦山陵崩㢮社稷不安此一殆也漸臺五重萬人罷極此二殆也賢者伏匿於山林諂諛被强於左右此三殆也飲酒沈湎以夜繼晝外不修諸侯之禮内不秉國}
