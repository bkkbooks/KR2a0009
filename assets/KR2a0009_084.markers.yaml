  - {type: variant, offset: 3609, length: 0, content: '', WYG: 位憂重責深也延光之間震為上相抗直方以臨權枉坤六二曰直方大不習旡不利也先公道而後身名可謂懷王臣之節易曰王臣謇謇匪躬之故識所任之體矣遂累葉載徳易曰徳積載載重也繼踵宰相信哉積善之家必有餘慶先世韋平方之蔑矣韋賢平當父子並相繼為丞相贊曰楊氏載徳仍世柱國言世為國柱臣也震畏四知秉去三惑賜亦無諱彪誠匪忒忒差也脩雖木子渝我淳則渝變也劉攽曰案楊氏有兩族赤泉氏從木子雲自叙其受氏從才而楊修書稱曰修家子雲又似震族亦是掦氏不知文士聊如此云其亦實然也今書中華隂之族從木從才相半未知所從學者辨之後漢書巻八十四後漢書卷八十四考證楊震傳八世祖喜髙祖敞何焯曰前書楊敞不云是喜之後河間男子趙騰詣闕上書指陳得失帝發怒收考詔獄結以罔上不道震復上疏救之日至帝不省一叚日知録曰此乃安帝時事而張晧傳以為清河趙騰上言災變譏刺朝政收騰擊考晧上疏諫帝悟减騰死罪一等又以為順帝事豈有兩趙騰耶於是柴門絶賓客諸本同臣㑹汾按全書及他史言杜門絶賔客杜門謝客杜門稱疾者甚衆此柴字疑杜字之誤}
