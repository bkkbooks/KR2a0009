  - {type: variant, offset: 2051, length: 0, content: '', WYG: 錮棄世之徒復得顯用有臧賄禁錮之人也白黒溷淆清濁同源天下讙譁咸曰財貨上流為朝結譏臣聞師言上之所取財盡則怨力盡則叛怨叛之人不可復使故曰百姓不足君誰與足論語有若對魯哀公之詞惟陛下度之豐惲等見震連切諫不從無所顧忌遂詐作詔書調發司農錢榖大匠見徒材木各起家舍園池廬觀役費無數震因地震復上疏曰臣蒙恩備台輔不能奉宣政化調和隂陽去年十一月四日京師地動臣聞師言地者隂精當安静承陽而今動揺者隂道盛也其日戊辰三者皆土位在中宫戊干辰支皆土也并地動故言三者此中臣近官盛於持權用事之象也臣伏惟陛下以邊境未寧躬自菲薄宫殿垣屋傾倚枝柱而已倚邪也柱音竹主反無所興造欲令逺近咸知政化之清流商邑之翼翼也詩商頌商邑翼翼四方之極也而親近倖臣未崇斷金易繫辭曰二人同心其利斷金言邪佞之臣不與上同心驕溢踰法多請徒士盛修第舍賣弄威福道路讙譁衆所聞見地動之變近在城郭殆為此發又冬無宿雪春節未雨百僚燋心而繕修不止誠致旱之徴也書曰僣恒𤾉若臣無作威作福玉食尚書洪範之詞也僣差也若順也君行僣差則常暘順之也言唯君得專威福為羙食唯陛下奮乾剛之徳易曰大哉乾乎剛健中正純粹精也棄驕奢之臣以掩訞言之口奉承皇天之戒無令威福久移於下震前後所上轉有切至帝既不平之而樊豐等皆側目憤怨俱以其名儒未敢加害尋有河間男子趙騰詣闕上書指陳得失帝發怒遂收考詔獄結以罔上不道震復上疏救之曰臣聞堯舜之世諫皷謗木立之於朝帝皇紀曰堯置敢諫之皷舜立誹謗之木殷周哲王小人怨詈則還自敬徳尚書曰自殷王中宗及高宗及祖甲及我周}
