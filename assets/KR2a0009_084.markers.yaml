  - {type: variant, offset: 2050, length: 0, content: '', WYG: 政以得賢為本理以去穢為務墨子曰夫尚賢者政本也左傳曰為國者如農夫之務去草焉是以唐虞俊乂在官四凶流放天下咸服以致雍熈尚書曰四罪而天下咸服又曰黎人於變時雍庻績咸熈雍和也熈廣也方今九徳未事尚書臯繇謨曰亦行有九徳寛而栗柔而立愿而龔亂而敬擾而毅直而温簡而廉剛而塞强而誼又曰九徳咸事俊乂在官嬖倖充庭諡法曰賤而得愛曰嬖阿母王聖出自賤微得遭千載奉養聖躬雖有推燥居溼之勤孝經援神契曰母之於子也鞠養殷勤推燥居溼絶少分甘也前後賞惠過報勞苦而無厭之心不知紀極左傳曰縉雲氏有不材子聚歛積實不知紀極外交屬託擾亂天下損辱清朝塵㸃日月書試牝雞牡鳴牝雌也牡雄也尚書古人有言牝雞無晨牝雞之晨唯家之索詩刺哲婦喪國詩大雅曰哲夫成城哲婦傾城昔鄭嚴分從母氏之欲恣驕弟之情幾至危國然後加討春秋貶之以為失教嚴公荘公也避明帝諱改焉左傳鄭荘公殺母弟叚稱鄭伯譏失教也夫女子小人近之喜逺之怨實為難養論語曰唯女子與小人為難養近之則不遜逺之則怨也易曰無攸遂在中饋家人卦六二爻辭也鄭𤣥注曰二為隂爻得正於内五陽爻也得正於外猶婦人自脩正於内丈夫脩正於外無攸遂言婦人無敢自遂也爻體離又互體坎火位在下水在上餁之象也饋食也故云在中饋也言婦人不得與於政事也宜速出阿母令居外舍斷絶伯榮莫使徃來令恩徳兩隆上下俱美惟陛下絶婉孌之私割不忍之心詩國風候人篇序曰曹共公逺君子而近小人其詩曰婉兮孌兮季女斯飢婉少貌孌好貌也留神萬機誡慎拜爵减省獻御損節徴發令野無鶴鳴之歎詩小雅序曰鶴鳴誨宣王也鄭𤣥注云教周宣王求賢人之未仕者其詩曰鶴鳴于九臯聲聞于野言身隱而名著喻賢者雖隱居人咸知之朝無小明之悔詩小雅序曰小明大夫悔仕於亂也小明者言周幽王日小其明損其政事以至於亂大東不興於今詩小雅序大東刺亂也其詩曰小東大東杼柚其空鄭𤣥注云小亦於東大亦於東言賦歛多也勞止不怨於下詩小雅序曰人勞刺厲王也其詩曰民亦勞止迄可小康擬蹤徃古比徳哲王豈不休哉奏御帝以示阿母等内倖皆懷忿恚而伯榮驕滛尤甚與故朝陽侯劉護從兄瓌交通護泗水王歙之從曽孫瓌遂以為妻得襲護爵位至侍中震深疾之復詣闕上疏曰臣聞高祖與羣臣約非功臣不得封故經制父死子繼兄亡弟及以防簒也公羊傳曰劉子單子以王猛入于王城者何西周也其言入何篡辭也冬十月王子猛卒此未踰年之君其稱王子猛卒何不予當也不予當者不與當父死子繼兄亡弟及也伏見詔書封故朝陽侯劉護再從兄瓌襲護爵為侯護同産弟威今猶見在臣聞天子專封封有功諸侯專爵爵有徳今瓌無他功行但以配阿母女一時之間既位侍中又至封侯不稽舊制不合經義行人諠譁百姓不安陛下宜覽鏡既徃順帝之則書奏不省延光二年代劉愷為太尉帝舅大鴻臚耿寶薦中常侍李閏兄於震震不從寶乃自徃候震曰李常侍國家所重欲令公辟其兄寶唯傳上意耳言非己本心傳在上之意震曰如朝廷欲令三府辟召故宜有尚書勑遂拒不許寶大恨而去皇后兄執金吾閻顯亦薦所親厚於震震又不從司空劉授聞之漢官儀授字孟春武原人即辟此二人旬日中皆見㧞擢由是震益見怨時詔遣使者大為阿母修第中常侍樊豐及侍中周廣謝惲等更相扇動傾揺朝廷震復上疏曰臣聞古者九年耕必有三年之儲故堯遭洪水人無菜色言有儲蓄人無食菜之飢色也臣伏念方今灾害發起彌彌滋甚彌彌猶稍稍也韋孟詩曰彌彌其失也百姓空虚不能自贍重以螟蝗羌虜鈔掠三邊震擾戰鬬之役至今未息兵甲軍糧不能復給大司農帑藏匱乏殆非社稷安寧之時伏見詔書為阿母興起津城門内第舍津城門洛陽南面西頭門也合兩為一連里竟街合兩坊而為一宅里即坊也雕修繕飾窮極巧伎今盛夏土王而攻山採石其大匠左校别部將作合數十處續漢志將作大匠秩二千石左校令秩六百石轉相迫促為費巨億周廣謝惲兄弟與國無肺腑枝葉之屬依倚近倖姦佞之人與樊豐王永等分威共權屬託州郡傾動大臣宰司辟召承望㫖意招來海内貪汙之人受其貨賂至有}
