  - {type: variant, offset: 3593, length: 1, content: 球, WYG: 年諸以恩澤為侯者皆奪封彪父賜以師傅封臨晉侯彪見漢祚将終遂稱脚攣不復行積十年後子修為曹操所殺操見彪問曰公何痩之甚對曰愧無日磾先見之明猶懷老牛䑛犢之愛前書曰金日磾子二人武帝所愛以為弄兒其後弄兒壮大不謹自殿下與宫人戲日磾適見之惡其滛亂遂殺弄兒操為之改容修字徳祖好學有俊才為丞相曹操主簿典略曰修建安中舉孝廉除郎中丞相請署倉曹屬主簿是時軍國多事修摠知内外事皆稱意自魏太子以下並爭與交好用事曹氏及操自平漢中欲因討劉備而不得進欲守之又難為功護軍不知進止何依操於是出教唯曰雞肋而已外曹莫能曉修獨曰夫雞肋食之則無所得弃之則如可惜公歸計决矣乃令外白稍嚴操於此廻師修之幾决多有此類修又常出行籌操有問外事乃逆為答記勑守舍兒若有令出依次通之既而果然如是者三操怪其速使廉之知状廉察也於此忌修且以袁術之甥慮為後患遂因事殺之續漢書曰人有白修與臨淄侯曹植飲醉共載從司馬門出謗訕鄢陵侯章太祖聞之大怒故遂收殺之時年四十五矣修所著賦頌碑讃詩哀辭表記書凡十五篇及魏文帝受禪欲以彪為太尉先遣吏示㫖彪辭曰彪備漢三公遭世傾亂不能有所補益耄年}
