  - {type: variant, offset: 518, length: 265, content: 賊故辱斯任今勒兵界首檄到幸思自安之宜喜等聞懼即時降散外戚陰氏為郡都尉宣輕慢之坐免後特徵為洛陽令時湖陽公主蒼頭白日殺人因匿主家吏不能得及主出行而以奴驂乘宣於夏門亭候之乃駐車叩馬以刀畫地大言數主之失叱奴下車因格殺之主即還宮訴帝帝大怒召宣欲箠殺之宣叩頭曰願乞一言而死帝曰欲何言宣曰陛下聖德中興而縱奴殺良人將何以理天下乎臣不須箠請得自殺即以頭擊楹流血被面帝令小黃門持之使宣叩頭謝主宣不從彊使頓之宣兩手據地終不肯俯主曰文叔為白衣時臧亡匿死吏不敢至門今為天子威不能行一令乎帝笑曰天子不與白衣同因勑彊項令出賜錢三十萬宣悉以班諸吏由是搏擊豪彊莫不, WYG: 賂}
