  - {type: variant, offset: 2684, length: 0, content: '', WYG: 充先師之末累世見寵無以報國猥當大問死而後已乃書對曰臣聞之經傳或得神以昌或得神以亡左傳曰有神降于莘周内史過曰國之將興明神降之監其徳也将亡神又降之觀其惡也故有得神以興亦有以亡國語曰昔夏之興也祝融降於崇山其亡也回祿信於黔遂商之興也檮杌次於㔻山其亡也夷羊在牧周之興也鸞鷟鳴於岐山其衰也杜伯射王於鄗也國家休明則鑒其徳邪辟昬亂則視其禍今殿前之氣應為虹蜺皆妖邪所生不正之象詩人所謂蝃蝀者也韓詩序曰蝃蝀刺奔女也蝃蝀在東莫之敢指詩人言蝃蝀在東者邪色乗陽人君滛佚之徴臣子為君父隱藏故言莫之敢指蝃音帝蝀音董於中孚經曰蜺之比無徳以色親易稽覽圖中孚經之文也比類也鄭𤣥注曰蜺邪氣也隂無徳以好色得親幸於陽也方今内多嬖倖外任小臣上下並怨諠譁盈路是以灾異屢見前後丁寕今復投蜺可謂孰矣孰成也案春秋讖曰天投蜺天下怨海内亂春秋演孔圖曰霓者斗之亂精也失度投霓見宋均注曰投霓投應也加四百之期亦復垂及漢終于四百年觧見獻帝紀昔虹貫牛山管仲諌桓公無近妃宫春秋文曜鉤口白虹貫牛山管仲諌曰無近妃宫君恐失權齊侯大懼退去色黨更立賢輔使后出望上牛山四面聽之以厭神宋均注曰山君位也虹蜺隂氣也隂氣貫之君惑於妻黨之象也望謂祭以謝過也流俗本山作升者誤也易曰天垂象見吉凶聖人則之上繫之詞則效也今妾媵嬖人閹尹之徒共專國朝欺罔日月又鴻都門下招㑹羣小造作賦説以蟲篆小技見寵於時法言曰賦者童子雕蟲篆刻壮夫不為也如驩兠共工更相薦説尚書驩兠曰都共工方鳩孱功旬月之間並各㧞擢樂松處常伯任芝居納言郄儉梁鵠俱以便辟之性佞辯之心各受豐爵不次之寵而令搢紳之徒委伏畎畝口誦堯舜之言身蹈絶俗之行棄捐溝壑不見逮及冠履倒易陵谷代處楚詞曰冠履兮雜處詩曰髙岸為谷深谷為陵也從小人之邪意順無知之私欲不念板蕩之作虺蜴之誡詩大雅序曰板凡伯刺厲王也其詩曰上帝板板下民卒癉蕩召穆公傷周室大壊也其詩曰蕩蕩上帝下民之辟又云哀今之人胡為虺蜴注云蜴蠑螈也虺蜴之性見人則走哀哉今之人何為如是傷時政也殆哉之危莫過於今無鹽女之詞觧見上幸頼皇天垂象譴告周書曰天子見怪則修徳諸侯見怪則修政卿大夫見怪則修職士庻人見怪則修身唯陛下慎經典之誡圖變復之道謂變改而銷復之斥逺佞巧之臣速徴鶴鳴之士内親張仲外任山甫詩曰張仲孝友又曰衮職有闕仲山甫補之皆周宣王賢臣也斷絶尺一抑止槃游留思庻政無敢怠遑冀上天還威衆變可弭老臣過受師傅之任數蒙寵異之恩豈敢愛惜垂没之年而不盡其慺慺之心哉慺慺猶勤勤也音力侯反書奏甚忤曹節等蔡邕坐直對抵罪徙朔方賜以師傅之恩故得免咎其冬行辟雍禮引賜為三老復拜少府光禄勲代劉郃為司徒帝欲造畢圭靈琨苑賜復上疏諌曰竊聞使者並出規度城南人田欲以為苑昔先王造囿裁足以修三驅之禮薪萊芻牧皆悉徃焉先帝之制左開鴻池右作上林鴻池在洛陽東上林在西不奢不約以合禮中今猥規郊城之地以為苑囿壊沃衍杜預注左傳曰衍沃平美之地也廢田園驅居人畜禽獸殆非所謂若保赤子之義書曰若保赤子唯人其康乂也今城外之苑已有五六陽嘉元年起西苑延熹二年造顯陽苑洛陽宫殿名有平樂苑上林苑桓帝延熹元年置鴻徳苑也可以逞情意順四節也逞快也四節謂春蒐夏苖秋獮冬狩也宜惟夏禹卑宫孔子曰禹惡衣服卑宫室也太宗露臺之意文帝欲作露臺召匠計之直百金帝曰百金中人十家之産吾奉先帝宫室常恐羞之何以臺為也以尉下民之勞書奏帝欲止以問侍中任芝中常侍樂松松等曰昔文王之囿百里人以為小齊宣五里人以為大孟子齊宣王問曰文王之囿方七十里人猶以為小寡人之囿方四十里人猶以為大何也曰文王之囿方七十里芻蕘者徃焉雉兔者徃焉與人同之人以為小不亦宜乎此云文王百里齊宣五里與孟子不同也今與百姓共之無害於政也帝悦遂令築苑四年賜以病罷居無何拜太常詔賜御府衣一襲衣單複具曰襲自所服冠幘綬玉壺革帯金錯鉤佩金錯以金間錯其文五年冬復拜太尉中平元年黄巾賊起賜被召㑹議詣省閣切諌忤㫖因以冦賊免先是黄巾帥張角等執左道稱大賢以誑燿百姓天下繦負歸之賜時在司徒召掾劉陶告曰張角等遭赦不悔而稍益滋蔓今若下州}
