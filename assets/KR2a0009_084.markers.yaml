  - {type: variant, offset: 3585, length: 2, content: 召拜, WYG: 建安元年從東都許時天子新遷大㑹公卿兖州刺史曹操上殿見彪色不悦恐於此圖之未得讌設託疾如厠因出還營彪以疾罷時袁術僭亂操託彪與術婚姻誣以欲圖廢置奏收下獄劾以大逆獻帝春秋曰操刑之不濫君之明也楊彪獲罪懼者甚衆劉攽曰案此注當在見操曰下又當云融見操曰云云少融見曰三字将作大匠孔融聞之不及朝服徃見操曰楊公四世清徳海内所瞻周書父子兄弟罪不相及左傳曰康誥曰父不慈子不祗兄不友弟不恭不相及也况以袁氏歸罪楊公易稱積善餘慶徒欺人耳易文言曰積善之家必有餘慶操曰此國家之意融曰假使成王殺邵公周公可得言不知邪今天下纓緌搢紳説文曰纓冠索也鄭𤣥注禮記曰緌冠飾也紳帯也搢揷也揷笏於紳也或作縉者淺赤言帯之色所以瞻仰明公者以公聰明仁智輔相漢朝舉直厝枉致之雍熈也今横殺無辜則海内觀聽誰不觧體左傳曰季文子謂晉韓穿曰四方諸侯誰不觧體杜預注曰言不復肅敬也孔融魯國男子明日便當拂衣而去不復朝矣若以非罪殺彪融則還為魯國一男子不復更來朝也操}
