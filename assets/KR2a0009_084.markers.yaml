  - {type: variant, offset: 2666, length: 4, content: 姓冠蓋球, WYG: 夫光和元年有虹蜺晝降於嘉徳殿前洛陽記殿在九龍門内郭景純注爾雅曰雙出色鮮盛者為雄曰虹闇者為雌曰蜺帝惡之引賜及議郎蔡邕等入金商門崇徳署戴延之西征記曰太極殿西有金商門使中常侍曹節王甫問以祥異禍福所在賜仰天而歎謂節等曰吾每讀張禹傳未嘗不憤恚歎息不}
