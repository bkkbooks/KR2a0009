  - {type: variant, offset: 2399, length: 0, content: '', WYG: 池澆濯釁穢宜絶横拜以塞覬覦之端左傳曰下無覬覦杜預注曰無冀望上位自此終桓帝世計吏無復留拜者七年南廵園陵特詔秉從南陽太守張彪與帝微時有舊恩以車駕當至因傍發調多以入私秉聞之下書責讓荆州刺史以状副言公府南陽郡荆州所部也及行至南陽左右並通姦利詔書多所除拜秉復上疏諌曰臣聞先王建國順天制官尚書曰明王奉若天道建邦設都孔安國注云天有日月北斗五星二十八宿皆有尊卑相正之法明王奉順此道建邦設都太微積星名為郎位史記天官書曰太微宮五帝坐後聚二十五星蔚然曰郎位積聚也入奉宿衛出牧百姓臯陶誠虞在於官人尚書臯陶誡舜曰在知人在官人也頃者道路拜除恩加豎隸爵以貨成化由此敗所以俗夫巷議白駒逺逝孔子曰天下有道庶人不議詩小雅曰皎皎白駒食我塲苗所謂伊人於焉逍遥言宣王官失其人賢者乘白駒而去之穆穆清朝逺近莫觀宜割不忍之恩以}
  - {type: page-break, offset: 2399, content: '', id: KR2a0009_WYG_084-15a, image: WYG0253/WYG0253-0172c.png}
