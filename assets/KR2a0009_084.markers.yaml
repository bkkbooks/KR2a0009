  - {type: variant, offset: 784, length: 1261, content: 慄京師號為臥虎歌之曰枹鼓不鳴董少平在縣五年年七十四卒於官詔遣使者臨視唯見布被覆屍妻子對哭有大麥數斛敝車一乘帝傷之曰董宣廉絜死乃知之以宣嘗為二千石賜艾綬葬以大夫禮拜子並為郎中後官至齊相樊曄字仲華南陽新野人也與光武少游舊建武初徵為侍御史遷河東都尉引見雲臺初光武微時嘗以事拘於新野曄為市吏餽餌一笥帝德之不忘仍賜曄御食及乘輿服物因戲之曰一笥餌得都尉何如曄頓首辭謝及至郡誅討大姓馬適匡等盜賊清吏人畏之數年遷楊州牧教民耕田種樹理家之術視事十餘年坐法左轉軹長隗囂滅後隴右不安乃拜曄為天水太守政嚴猛好申韓法善惡立斷人有犯其禁者率不生出獄吏人及羌胡畏之道不拾遺行旅至夜聚衣裝道傍曰以付樊公涼州為之歌曰游子常苦貧力子天所富寧見乳虎穴不入冀府寺大笑期必死忿怒或見置嗟我樊府君安可再遭值視事十四年卒官永平中顯宗追思曄在天水時政能以為後人莫之及詔賜家錢百萬子融有俊才好黃老不肯為吏李章字第公河內懷人也五世二千石章習嚴氏春秋經明教授歷州郡吏光武為大司馬平定河北召章置東曹屬數從征伐光武即位拜陽平令時趙魏豪右往往屯聚清河大姓趙綱遂於縣界起塢壁繕甲兵為在所害章到乃設饗會而延謁綱綱帶文劒被羽衣從士百餘人來到章與對讌飲有頃手劒斬綱伏兵亦悉殺其從者因馳詣塢壁掩擊破之吏人遂安遷千乘太守坐誅斬盜賊過濫徵下獄免歲中拜侍御史出為琅邪太守時北海安丘大姓夏長思等反遂囚太守處興而據營陵城章聞即發兵千人馳往擊之掾吏史止章曰二千石行不得出界兵不得發章按劒怒曰逆虜無狀囚劫郡守此何可忍若坐討賊而死吾不恨也遂引兵安丘城下募勇敢燒城門與長思戰斬之獲三百餘級得牛馬五百餘頭而還興歸郡以狀上帝悉以所得班勞吏士後坐度人田不實徵以章有功但司寇論月餘免刑歸復徵會病卒周字文通下邳徐人也為人刻削少恩好韓非之術少為廷尉史永平中補南行唐長到官曉吏人曰朝廷不以長不肖使牧黎民而性讎猾吏志除豪賊且勿相試遂殺縣中尤無狀者數十人吏人大震遷博平令收考姦臧無出獄者以威名遷齊相亦頗嚴酷專任刑法而善為辭案條教為州內所則後坐殺無辜復左轉博平令建初中為勃海太守每赦令到郡輒隱閉不出先遣使屬縣盡決刑罪乃出詔書坐徵詣廷尉免歸廉絜無資常築墼以自給肅宗聞而憐之復以為郎再遷召陵侯相廷掾憚嚴明欲損其威乃晨取死人斷手足立寺門聞便往至死人邊若與死人共語狀陰察視口眼有稻芒乃密問守門人曰悉誰載藁入城者門者對唯有廷掾耳又問鈴下外頗有疑令與死人語者不對曰廷掾疑君乃收廷掾考問具服不殺人取道邊死人後人莫敢欺者徵拜洛陽令下車先問大姓主名吏數閭里豪彊以對厲聲怒曰本問貴戚若馬竇等輩豈能知此賣菜傭乎於是部吏望風旨爭以激切為事貴戚跼蹐京師肅清皇后弟黃門郎竇篤從宮中歸夜至止姦亭亭長霍延遮止篤篤蒼頭與爭延遂拔劒擬篤而肆詈恣口篤以表聞詔召司隸校尉河南尹詣尚書譴問遣劒戟士收送廷尉詔獄數日貰出帝知奉法疾姦不事貴戚然苛慘失中數為有司所奏八年遂免官後為御史中丞和帝即位太傅鄧彪奏在任過酷不宜典司京輦免歸田里後竇氏貴盛篤兄弟秉權睚眦宿怨無不僵仆自謂無全乃柴門自守以待其禍然篤等以公正而怨𨻶有素遂不敢害永元五年復徵為御史中丞諸竇雖誅而夏陽侯瓌猶尚在朝疾之乃, WYG: ''}
