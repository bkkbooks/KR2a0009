  - {type: variant, offset: 2651, length: 0, content: '', krp: 華光殿中洛陽宫殿名曰華光殿在崇光殿北遷少府光禄勲熹平元年青蛇見御坐帝以問賜賜上封事曰臣聞和氣致祥乖氣致灾休徴則五福應休美也徴騐也五福一曰壽二曰富三曰康寕四曰攸好徳五曰考終命咎徴則六極至咎惡也六極一曰凶短折二曰疾三曰憂四曰貧五曰惡六曰弱並見尚書夫善不妄來灾不空發王者心有所惟意有所想雖未形顔色而五星以之推移隂陽為其變度以此而觀天之與人豈不符哉尚書曰天齊乎人假我一日是其明徴也我謂君也天意欲整齊于人必假於君也今尚書文假作俾俾使也義亦通夫皇極不建則有蛇龍之孽洪範五行傳曰皇大也極中也建立也孽灾也君不合大中是謂不立蛇龍隂類也詩云惟虺惟蛇女子之祥詩小雅也虺蛇穴居隂之類故為女子之祥也故春秋兩蛇鬬於鄭門昭公殆以女敗洪範五行傳曰初鄭厲公劫相祭仲而簒兄昭公立為鄭君後雍糺之難厲公出奔鄭人立昭公既立内蛇與外蛇鬭鄭南門中内蛇死是時傅瑕仕於鄭欲内厲公故内蛇死者昭公将敗厲公將勝之象也是時昭公宜布恩施惠以撫百姓舉賢崇徳以厲羣臣觀察左右以省姦謀則内變不得生外謀無由起矣昭公不覺果殺於傅瑕二子死而厲公入此其効也詩云惟虺惟蛇女子之祥鄭荘公殆以女子敗矣康王一朝晏起關雎見幾而作前書曰佩玉晏鳴關雎歎之音義曰后夫人雞鳴佩玉去君所周康王后不然故詩人歎而傷之此事見魯詩今亡失也夫女謁行則讒夫冒讒夫昌則苞苴通故殷湯以之自戒終濟亢旱之灾説苑曰湯自伐桀後大旱七年洛川竭使人持三足鼎祝於山川曰政不節邪使人疾邪苞苴行邪讒夫昌邪宫室榮邪女謁行邪何不雨之極言未已而天大雨惟陛下思乾剛之道别内外之宜崇帝乙之制受元吉之祉易泰卦六五日帝乙歸妹以祉元吉也抑皇甫之權割豔妻之愛豔妻周幽王后褒姒也皇甫卿士等皆后之黨用后嬖寵而居位也詩云皇甫卿士豔妻煽方處也則蛇變可消禎祥立應殷戊宋景其事甚明殷王太戊時桑榖共生於朝修徳而桑榖死景公時熒惑守心修徳而星退舍並見史記二年代唐珍為司空以灾異免復拜光祿大夫秩中二千石五年代袁隗為司徒是時朝廷爵授多不以次而帝好微行遊幸外苑賜復上疏曰臣聞天生蒸民不能自理蒸衆也故立君長使司牧之司主也牧養也是以唐虞兢兢業業兢兢戒慎業業危懼尚書臯陶謨日兢兢業業一日二日萬幾周文日昃不暇尚書曰文王自朝至於日中昃弗遑暇食明慎庶}
