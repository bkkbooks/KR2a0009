  - {type: variant, offset: 2148, length: 0, content: '', WYG: 受其年冬復徴拜河南尹先是中常侍單超弟匡為濟隂太守以臧罪為刺史第五種所劾窘急乃賂客任方刺兖州從事衛羽事己見種傳及捕得方囚繫洛陽匡慮秉當窮竟其事密令方等得突獄亡走尚書召秉詰責秉對曰春秋不誅黎比而魯多盜左傳曰邾庻其以漆閭丘來奔於是魯多盜臣賢案黎比莒國之君恐别有所據也方等無状釁由單匡刺執法之吏害奉公之臣復令得逃竄寛縱罪身元惡大憝終}
