  - {type: variant, offset: 3292, length: 2, content: 吉球, WYG: 也遷都於亳殷人相與怨恨湯遷毫仲丁遷囂河亶甲居相祖乙居耿并盤庚五遷也昔闗中遭王莽變亂宫室焚燒民庻塗炭百不一在光武受命更都洛邑今天下無虞虞度也言無可度之事也書曰四方無虞百姓樂安明公建立聖主光隆漢祚無故捐宗廟棄園陵恐百姓驚動必有麋沸之亂如麋粥之沸也詩曰如沸如羮石包室䜟妖邪之書豈可信用卓曰關中肥饒故秦得并吞六國且隴右材木}
