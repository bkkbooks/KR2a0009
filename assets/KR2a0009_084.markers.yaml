  - {type: variant, offset: 2400, length: 0, content: '', WYG: 求欲之路於是詔除乃止時中常侍侯覽弟參為益州刺史累有臧罪暴虐一州明年秉劾奏參檻車徴詣廷尉參惶恐道自殺謝承書曰秉奏參取受罪臧累億牂柯男子張攸居為富室參横加非罪云造訛言殺攸家八人没入廬宅又與同郡諸生李元之官共飲酒醉飽之後戲故相犯誣言有􅁋慝之罪應時棰殺以人臣之勢行桀紂之態傷和逆}
  - {type: page-break, offset: 2400, content: '', id: KR2a0009_WYG_084-15b, image: WYG0253/WYG0253-0172d.png}
  - {type: variant, offset: 2400, length: 0, content: '', krp: 求欲之路於是詔除乃止時中常侍侯覽弟參為益州刺史累有臧罪暴虐一州明年秉劾奏參檻車徴詣廷尉參惶恐道自殺謝承書曰秉奏參取受罪臧累億牂柯男子張攸居為富室參横加非罪云造訛言殺攸家八人没入廬宅又與同郡諸生李元之官共飲酒醉飽之後戲故相犯誣言有淫慝之罪應時棰殺以人臣之勢行桀紂之態傷和逆}
