  - {type: variant, offset: 2649, length: 1, content: 卒, WYG: 居上傍怠慢丞相申屠嘉罷朝坐府中召通至不為禮責曰通小臣戲殿上大不敬當斬通頓首首盡出血上使使持節召通而謝丞相此吾弄臣君釋之漢世故事三公之職無所不統尚書不能詰帝不得已竟免覽官而削瑗國每朝廷有得失輙盡忠規諌多見納用秉性不飲酒又早䘮夫人遂不復娶所在以淳白稱嘗從容言曰我有三不惑酒色財也八年薨時年七十四賜塋陪陵子賜賜字伯獻少傳家學篤志博聞常退居隱約教授門徒不答州郡禮命後辟大将軍梁冀府非其好也出除陳倉令因病不行公車徴不至連辭三公之命後以司空高第再遷侍中越騎校尉建寕初靈帝當受學詔太傅三公選通尚書桓君章句宿有重名者三公舉賜乃侍講}
