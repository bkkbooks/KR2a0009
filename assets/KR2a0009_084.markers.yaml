  - {type: variant, offset: 2401, length: 1, content: 莫, WYG: 痛感天地宜當糺持以謝一州又曰京兆尹袁逢於長安客舍中得參重車三百餘乘金銀珍玩}
  - {type: variant, offset: 2401, length: 1, content: 莫, krp: 痛感天地宜當糺持以謝一州又曰京兆尹袁逢於長安客舍中得參重車三百餘乘金銀珍玩}
  - {type: variant, offset: 2403, length: 6, content: 得所密捕盜帥, WYG: 可稱紀秉因奏覽及中常侍具瑗曰臣案國舊典宦豎之官本在給使省闥司昬守夜而今猥受過寵執政操權其阿䛕取容者則因公襃舉以報私惠有忤逆於心者必求事中傷肆其凶忿居法王公富擬國家飲食極肴饍僕妾盈紈素雖季氏專魯穰侯擅秦何以尚兹季氏魯卿世專魯政孔子曰季氏富於周公史記曰穰侯魏冉者秦昭王母宣太后弟也為秦相國侈富於王室尚猶加也案中常侍侯覽弟參貪殘元惡自取禍滅覽固知釁重必有自疑之意臣愚以為不宜復見親近昔懿公刑邴歜之父奪閻職之妻而使二人參乗卒有竹中之難春秋書之以為至戒左傳曰齊懿公之為公子也與邴歜之父爭田弗勝及即位乃倔而刖之而使歜僕納閻職之妻而使職驂乗夏五月公游于申池歜以扑扶職職怒歜曰人奪汝妻而不怒}
