  - {type: variant, offset: 14, length: 1, content: 七, WYG: 四楊震傳子秉孫賜曽孫彪𤣥孫脩楊震字伯起𢎞農華隂人也八世祖喜高祖時有功封赤泉侯史記曰喜追殺項羽以功封高祖敞昭帝時為丞相封安平侯父寶續齊諧記曰寶年九嵗時至華隂山北見一黄雀為鴟梟所搏墜於樹下為螻蟻所困寳取之以歸置巾箱中唯食黄花百餘日毛羽成乃飛去其夜有黄衣童子向寶再拜曰我西王母使者君仁愛救拯實感成濟以白環四枚與寶令君子孫潔白位登三事當如此環矣習歐陽尚書哀平之世隱居教授居攝二年與兩龔蒋詡俱徴遂遁逃不知所處龔勝字君賔龔舍字君倩􅃽詡字元卿並以高節著名見前書光武高其節建武中公車特徴老病不到卒於家震少好學受歐陽尚書於太常桓郁明經博覽無不窮究諸儒為之語曰關西孔子楊伯起常客居於湖今湖城縣不答州郡禮命數十年續}
