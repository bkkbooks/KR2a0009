  - {type: variant, offset: 2141, length: 1, content: 戮, WYG: 也上負先帝下悔靡及臣奕世受恩奕猶重也得備納言納言尚書又以薄學充在講勸特䝉哀識見照日月恩重命輕義使士死敢憚摧折略陳其愚帝不納秉以病乞退出為右扶風太尉黄瓊惜其去朝廷上秉勸講帷幄不宜外遷留拜光禄大夫是時大将軍梁冀用權秉稱病六年冀誅後乃拜太僕遷太常延熹三年白馬令李雲以諌受罪秉爭之不能得坐免官歸田里謝承書曰秉免歸雅素清儉家至貧窶并日}
