  - {type: variant, offset: 3595, length: 2, content: 召急, WYG: 病豈可贊惟新之朝遂固辭乃授光祿大夫賜几杖衣袍續漢書曰魏文帝詔曰先王制几杖之賜所以賔禮黄耇太尉楊彪乃祖以來世著名績其賜公延年杖延請之日便使杖入也}
