  - {type: variant, offset: 2051, length: 0, content: '', krp: 錮棄世之徒復得顯用有臧賄禁錮之人也白黒溷淆清濁同源天下讙譁咸曰財貨上流為朝結譏臣聞師言上之所取財盡則怨力盡則叛怨叛之人不可復使故曰百姓不足君誰與足論語有若對魯哀公之詞惟陛下度之豐惲等見震連切諫不從無所顧忌遂詐作詔書調發司農錢榖大匠見徒材木各起家舍園池廬觀役費無數震因地震復上疏曰臣蒙恩備台輔不能奉宣政化調和隂陽去年十一月四日京師地動臣聞師言地者隂精當安静承陽而今動揺者隂道盛也其日戊辰三者皆土位在中宫戊干辰支皆土也并地動故言三者此中臣近官盛於持權用事之象也臣伏惟陛下以邊境未寧躬自菲薄宫殿垣屋傾倚枝柱而已倚邪也柱音竹主反無所興造欲令逺近咸知政化之清流商邑之翼翼也詩商頌商邑翼翼四方之極也而親近倖臣未崇斷金易繫辭曰二人同心其利斷金言邪佞之臣不與上同心驕溢踰法多請徒士盛修第舍賣弄威福道路讙譁衆所聞見地動之變近在城郭殆為此發又冬無宿雪春節未雨百僚燋心而繕修不止誠致旱之徴也書曰僣恒𤾉若臣無作威作福玉食尚書洪範之詞也僣差也若順也君行僣差則常暘順之也言唯君得專威福為羙食唯陛下奮乾剛之徳易曰大哉乾乎剛健中正純粹精也棄驕奢之臣以掩訞言之口奉承皇天之戒無令威福久移於下震前後所上轉有切至帝既不平之而樊豐等皆側目憤怨俱以其名儒未敢加害尋有河間男子趙騰詣闕上書指陳得失帝發怒遂收考詔獄結以罔上不道震復上疏救之曰臣聞堯舜之世諫皷謗木立之於朝帝皇紀曰堯置敢諫之皷舜立誹謗之木殷周哲王小人怨詈則還自敬徳尚書曰自殷王中宗及高宗及祖甲及我周}
  - {type: variant, offset: 2052, length: 1, content: 仲, WYG: 王兹四人廸哲厥或告之曰小人怨汝詈汝則皇自敬徳也所以達聰明開不諱博採負薪盡極下情也今趙騰所坐激訐謗語為罪與手刃犯法有差乞為虧除全騰之命以誘芻蕘輿人之言輿衆也詩曰詢于芻蕘左氏傳曰聽輿人之謀也帝不省騰竟伏尸都市㑹三年春東廵岱宗樊豐等因乘輿在外競修第宅震部掾高舒召大匠令史考校之史謂府吏也得豐等所詐下詔書具奏須行還上之豐等聞惶怖㑹太史言星變逆行遂共譖震云自趙騰死後深用怨懟懟怨怒也且鄧氏故吏有恚恨之心震初鄧隲辟之故曰故吏及車駕行還便時太學且於太學待吉時而後入也故曰便時前書便時上林延夀門也夜遣使者䇿收震太尉印綬於是柴門絶賔客豐等復惡之乃請大將軍耿寶奏震大臣不服罪懷恚望有詔遣歸本郡震行至城西夕陽亭乃慷慨謂其諸子門人曰慷慨悲歎死者士之常分吾䝉恩居上司疾姦臣狡猾而不能誅惡嬖女傾亂而不能禁何面目復見日月身死之日以雜木為棺布單被裁足蓋形勿歸冢次勿設祭祠因飲酖而卒時年七十餘𢎞農太守移良風俗通日齊公子雍食菜於移其後氏焉承樊豐等㫖遣吏於陜縣留停震喪露棺道側謝承書曰震臨没謂諸子以牛車薄簀載柩還歸讁震諸子代郵行書道路皆為隕涕説文郵境上行書舍也廣雅曰郵驛也歳餘順帝即位樊豐周廣等誅死震門生虞放陳翼詣闕追訟震事朝廷咸稱其忠乃下詔除二子為郎贈錢百萬以禮改𦵏於華隂潼亭墓在今潼關西大道之北其碑尚存逺近畢至先𦵏十餘日有大鳥高丈餘集震喪前俯仰悲鳴淚下霑地𦵏畢乃飛去郡以状上續漢書曰大鳥來止亭樹下地安行到柩前正立低頭淚出衆人更共摩撫抱持終不驚駭謝承書曰其鳥五色高丈餘兩翼長二丈三尺人莫知其名也時連有灾異帝感震之枉乃下詔䇿曰故太尉震正直是與俾匡時政而青蠅㸃素同兹在藩藩樊也詩云營營青蠅止于樊愷悌君子無信讒言青蠅汚白使黒汙黒使白喻佞人變亂善惡也上天降威灾眚屢作爾卜爾筮惟震之故朕之不徳用彰厥咎山崩棟折我其危哉禮記曰孔子将終歌曰泰山其頽乎梁木其壞乎今使太守丞以中牢具祠魂而有靈儻其歆享於是時人立石鳥象於其墓所震之被譖也高舒亦得罪以減死論及震事顯舒拜侍御史至荆州刺史震五子長子牧富波相富波縣屬汝南郡牧孫奇靈帝時為侍中帝嘗從容問奇曰朕何如桓帝對曰陛下之於桓帝亦猶虞舜比徳唐堯帝不悦曰卿强項真楊震子孫强項言不低屈也光武謂董宣為强項令也死後必復致大鳥矣出為汝南太守帝崩後復入為侍中衛尉從獻帝西遷有功勤及李傕脅帝歸其營奇與黄門侍郎鍾繇誘傕部曲將宋曄楊昻令反傕傕由此孤弱帝乃得東魏志曰繇為黄門侍即傕脅天子繇與尚書郎韓斌同䇿謀天子得出長安繇有力焉後徙都許追封竒子亮為陽成亭侯亮舊宅在閿鄉縣西南震少子奉奉子敷篤志博聞議者以為能世其家敷早卒子衆亦傳先業以謁者僕射從獻帝入關累遷御史中丞及帝東遷夜走度河衆率諸官屬歩從至太陽拜侍中太陽縣屬河東郡建安二年追前功封蓩亭侯郡國志桃林縣有蓩鄉音莫老反震中子秉秉字叔節少傳父業兼明京氏易博通書傳常隱居教授年四十餘乃應司空辟拜侍御史頻出為豫荆徐兖四州刺史遷任城相自為刺史二千石計日受奉餘禄不入私門故吏齎錢百萬遺之閉門不受以廉潔稱桓帝即位以明尚書徴入勸講勸講猶侍講也拜太中大夫左中郎將遷侍中尚書帝時微行私過幸河南尹梁𦙍府舍𦙍梁冀子也是日大風㧞樹晝昏秉因上疏諌曰臣聞瑞由徳至灾應事生傳曰禍福無門唯人所召左傳閔子騫之詞天不言語以灾異譴告是以孔子迅雷風烈必有變動詩云敬天之渝不敢馳驅詩大雅曰敬天之怒無敢戲豫敬天之渝無敢馳驅與此文稍異也王者至尊出入有常警蹕而行靜室而止蹕止行人也靜室謂先使清宫也前書音義曰漢有靜室令也自非郊廟}
