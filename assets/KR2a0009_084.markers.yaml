  - {type: variant, offset: 3988, length: 183, content: 世所謂酷能者蓋有聞也皆以敢捍精敏巧附文理風行霜烈威譽諠赫與夫斷斷守道之吏何工否之殊乎故嚴君蚩黃霸之術密人笑卓茂之政猛既窮矣而猶或未勝然朱邑不以笞辱加物袁安未嘗鞫人臧罪而猾惡自禁人不欺犯何者以為威辟既用而苟免之行興仁信道孚故感被之情著苟免者威𨻶則姦起感被者人亡而思存由一邦以言天下則刑訟繁措可得而求乎贊曰大道既往刑禮為薄斯人散矣機詐萌作去殺由仁濟寬非虐末暴雖勝崇本或略, WYG: 書卷八十四考證}
