  - {type: variant, offset: 2664, length: 1, content: 世, WYG: 之政此四殆也遐邇有憤怨之聲臣受恩偏特忝任師傅不敢自同凡臣括囊避咎括結也易曰括囊無咎無譽謹自手書密上後坐辟黨人免復拜光禄}
