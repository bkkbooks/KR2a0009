  - {type: variant, offset: 2685, length: 1, content: 吏, WYG: 捕討恐更騷擾速成其患且欲切勑刺史二千石簡别流人各護歸本郡以孤弱其黨然後誅其渠帥可不勞而定何如陶對曰此孫子所謂不戰而屈人之兵廟勝之術也孫子曰未戰而廟勝得算多也未戰而廟不勝得算少也賜遂上書言之㑹去位事留中謂所論事留在禁中未施用之後帝徙南宫閲錄故事得賜所上張角奏及前侍講注籍所注之籍錄乃感悟下詔封賜臨晉侯邑千五百戸臨晉縣屬馮翊故城在今同州朝邑縣西南初賜與太尉劉寛司空張濟濟字元江細陽人濟張輔曽孫並入侍講自以不宜獨受封賞上書願分戸邑於寛濟帝嘉歎復封寛及濟子拜賜尚書令數日出為廷尉賜自以代非法家言曰三后成功惟殷于民臯陶不與焉蓋吝之也吝耻也殷盛也尚書曰伯夷降典折人惟刑禹平水土主名山川稷降播種農植嘉榖三后成功惟殷於人言臯陶不預其數者蓋耻之遂固辭以特進就第二年九月復代張温為司空其月薨天子素服三日不臨朝贈東園梓器禭服賜錢三百萬布五百疋䇿曰故司空臨晉侯賜華嶽所挺九徳純備挺生也九徳即臯陶謨九徳三葉宰相輔國以忠朕昔初載授道帷幄詩大雅曰文王初載毛萇注云載職也遂階成勲以陟大猷師範之功昭于内外庻官之務勞亦勤止七在卿校殊位特進五登衮職弭難乂寜雖受茅土未荅厥勲哲人其萎将誰諮度朕甚懼焉禮記曰孔子負手曵杖消揺於門歌曰太山其穨乎梁木其壊乎哲人其萎乎禮設殊等物}
