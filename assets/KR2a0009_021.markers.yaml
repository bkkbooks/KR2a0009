  - {type: variant, offset: 5758, length: 416, content: 塞羌固請迎恭諸將不敢前乃分兵二千人與羌從山北迎恭遇大雪丈餘軍僅能至城中夜聞兵馬聲以為虜來大驚羌乃遙呼曰我范羌也漢遣軍迎校尉耳城中皆稱萬歲開門共相持涕泣明日遂相隨俱歸虜兵追之且戰且行吏士素飢困發疏勒時尚有二十六人隨路死沒三月至玉門唯餘十三人衣屨穿決形容枯槁中郎將鄭衆為恭已下洗沐易衣冠上疏曰耿恭以單兵固守孤城當匈奴之對數萬之衆連月踰年心力困盡鑿山為井煮弩為糧出於萬死無一生之望前後殺傷醜虜數千百計卒全忠勇不為大漢恥恭之節義古今未有宜蒙顯爵以厲將帥及恭至雒陽鮑昱奏恭節過蘇武宜蒙爵賞於是拜為騎都尉以恭司馬石修為雒陽市丞張封為雍營司馬軍吏范羌為共丞餘九人皆補羽林恭母先卒及還追行喪制有詔使五官中郎將齎牛酒釋服明年遷長水校尉其秋金城隴西羌反恭上疏言方略詔召入問狀乃遣恭將五校士三千人副車騎將軍馬防討西羌恭屯枹罕數與羌接戰明年秋燒當羌降防還京師恭留擊諸未服者首虜千餘人獲牛羊四萬餘頭勒姐燒何羌等十三種數萬人皆詣恭降初恭出隴西上言故安豐侯竇融昔, WYG: 考章帝紀}
