  - {type: variant, offset: 4667, length: 1, content: 與, WYG: 三年正月庚戍月犯心後星河圖曰亂臣在旁己亥太白入斗中古今注曰三月壬寅熒惑入輿鬼中五月丙寅太白入畢中石氏經曰太白守畢國多淫刑也十二月彗星起天苑南東北指長六七尺色蒼白太白晝見為強臣前志曰太白晝見強國弱小國強女主昌是時鄧氏方盛月犯心後星不利子心為宋五月丁酉沛王牙薨太白入斗中為貴相凶臣昭案楊厚對曰以為諸王子多在京師容有非常宜亟發遣還本國太后從之星尋滅不見以斯而言太白入之災在貴相天苑為外軍彗星出其南為外兵是後使羌氐討賊李貴又使烏桓擊鮮卑又使中郎將任尚䕶羌校尉馬賢擊羌皆降四年古今注曰二月丙寅月犯軒轅大星六月丙子客星大如李蒼白芒氣長二尺西南指上階星癸酉太白入輿鬼指上階為三公後太尉張敏免官太白入輿鬼為將凶後中郎將任尚坐贓千萬檻車徴棄市韓揚占曰太白入輿鬼亂臣在内臣昭以占為明堂任尚所能感也五年六月辛丑太白晝見經天春秋漢含孳曰陽弱辰逆太白經天注云陽弱君柔不堪鈎命決曰天失仁太白經天元初元年三月癸酉熒惑入輿鬼二年九月辛酉熒惑入輿鬼中三年三月熒惑入輿鬼中五月丙寅太白入畢口黄帝占曰火攻近期十五日遠期四十日又曰大臣當之亂國易主七月甲寅嵗星入輿鬼閏月己未太白犯太微左執法十一月甲午客星見西方己亥在虛危南至胃昴郗萌曰客星入虚大人當之又曰客星守危強臣執國命在后族又且大風有危敗黄帝星經曰客星入守若出危大饑民食貴四年正月丙戍嵗星留輿鬼中石氏經曰嵗星入留輿鬼五十日不下民有大喪百日不下民半死黄帝星經曰守鬼十日金錢散諸侯郗萌曰五榖多傷民以饑死者無數乙未太白晝見丙上四月壬戍太白入輿鬼中石氏占太白入鬼一曰病在女主一曰將戮死己巳辰星入輿鬼中郗萌曰以罪誅大臣一曰后疾一曰大人憂五月己卯辰星犯嵗星六月丙申熒惑入輿鬼中戊戍犯輿鬼大星九月辛巳太白入南斗口中黄帝經曰大人當之國易政五年三月丙申鎮星犯東井鉞星五月庚午辰星犯輿鬼質星丙戌太白犯鉞星六年四月癸丑太白入輿鬼郗萌曰太白守輿鬼疾在女主六月丙戌熒惑在輿鬼中黄帝經曰熒惑犯守鬼國有大喪有女喪大將有死者荆州星占曰熒惑犯鬼忠臣戮死不出一年中丁卯鎮星在輿鬼中黄帝經曰鎮八鬼中大臣誅海中石氏曰大人憂辛巳太白犯左執法自永初五年到永寧十年之中太白一晝見經天再入輿鬼一守畢再犯左執法入南斗犯鉞星熒惑五入輿鬼鎮星一犯東井鉞星一入輿鬼嵗星辰星再入輿鬼凡五星入輿鬼中皆為死喪熒惑太白甚犯鉞質星為誅戮斗為貴將執法為近臣客星在虛危為喪為哭泣星占曰不一年遠期二年昴畢為邊兵又為獄事至建光元年三月癸巳鄧太后崩五月庚辰太后兄}
