  - {type: variant, offset: 2935, length: 1, content: 愍, WYG: 閏九月辛未火在太微左執法星所光芒相及十一月辛未土逆行乘東井北軒轅第二星二年十二月戊辰月食火星黄帝星經曰出入井為人主一曰陽爵禄事三年六月丁卯彗星出天舩北長二尺所稍北行至亢南百三十五日去天舩為水彗出之為大水是嵗伊雒水溢到津城門壞伊橋郡七縣三十二皆大水四年八月辛酉客星出梗河西北指貫索七十日去梗河為胡兵至五年十一月北匈奴七千騎入五原塞十二月又入雲中至原陽貫索貴人之牢其十二月陵鄉}
