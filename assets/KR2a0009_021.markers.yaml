  - {type: variant, offset: 250, length: 270, content: 日歸發突騎以轔烏合之衆如摧枯折腐耳觀公等不識去就族滅不久也倉包不從遂亡降王郎弇道聞光武在盧奴乃馳北上謁光武留署門下吏弇因說護軍朱祐求歸發兵以定邯鄲光武笑曰小兒曹乃有大意哉因數召見加恩慰弇因從光武北至薊聞邯鄲兵方到光武將欲南歸召官屬計議弇曰今兵從南來不可南行漁陽太守彭竉公之邑人上谷太守即弇父也發此兩郡控弦萬騎邯鄲不足慮也光武官屬腹心皆不肯曰死尚南首柰何北行入囊中光武指弇曰是我北道主人也會薊中亂光武遂南馳官屬各分散弇走昌平就況因說況使寇恂東約彭寵各發突騎二千匹步兵千人弇與景丹寇恂及漁陽兵合軍而南所過擊斬王郎大將九卿校尉以下四百餘級得印綬百, WYG: 和三十三順}
