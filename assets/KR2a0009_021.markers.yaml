  - {type: variant, offset: 4, length: 141, content: 十九耿弇列傳第九弟國國子秉秉弟夔國弟子恭耿弇字伯昭扶風茂陵人也其先武帝時以吏二千石自鉅鹿徙焉父況字俠游以明經為郎與王莽從弟伋共學老子於安丘先生後為朔調連率弇少好學習父業常見郡尉試騎士建旗鼓肄馳射由是好將帥之事及王莽敗更始立諸將略地者前後多擅威權輒改易守令況自以莽之所置懷不自安時弇年, WYG: ''}
