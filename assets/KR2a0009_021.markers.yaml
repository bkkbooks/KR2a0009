  - {type: variant, offset: 528, length: 268, content: 萬級定涿郡中山鉅鹿清河河閒凡二十二縣遂及光武於廣阿是時光武方攻王郎傳言二郡兵為邯鄲來衆皆恐既而悉詣營上謁光武見弇等說曰當與漁陽上谷士大夫共此大功乃皆以為偏將軍使還領其兵加況大將軍興義侯得自置偏禆弇等遂從拔邯鄲時更始徵代郡太守趙永而況勸永不應召令詣于光武光武遣永復郡永北還而代令張曄據城反畔乃招迎匈奴烏桓以為援助光武以弇弟舒為復胡將軍使擊曄破之永乃得復郡時五校賊二十餘萬北寇上谷況與舒連擊破之賊皆退走更始見光武威聲日盛君臣疑慮乃遣使立光武為蕭王令罷兵與諸將有功者還長安遣苗曾為幽州牧韋順為上谷太守蔡充為漁陽太守並北之部時光武居邯鄲宮晝臥溫, WYG: 殤一質三孝}
