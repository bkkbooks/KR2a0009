  - {type: variant, offset: 4673, length: 3, content: 熙共擊, WYG: 國也下史於獄其後公子牙謀弑君血書端門如史所言乃月十三日有客星氣象彗孛歴天市梗河招揺槍棓十六日入紫宮廹北辰十七日復過文昌泰陵至天舩積水間稍微不見客星一占曰魯星歴天市者為榖貴梗河三星備非常泰陵八星為凶喪紫宮北辰為至尊如占恐宮廬}
