  - {type: variant, offset: 3536, length: 278, content: 公卿議者皆以為天下初定中國空虛夷狄情偽難知不可許國獨曰臣以為宜如孝宣故事受之令東扞鮮卑北拒匈奴率厲四夷完復邊郡使塞下無晏開之警萬世有安寧之策也帝從其議遂立比為南單于由是烏桓鮮卑保塞自守北虜遠遁中國少事二十七年代馮勤為大司馬農又上言宜置度遼將軍左右校尉屯五原以防逃亡永平元年卒官顯宗追思國言後遂置度遼將軍左右校尉如其議焉國二子秉夔秉字伯初有偉體帶八圍博通書記能說司馬兵法尤好將帥之略以父任為郎數上言兵事常以中國虛費邊陲不寧其患專在匈奴以戰去戰盛王之道顯宗既有志北伐陰然其言永平中召詣省闥問前後所上便宜方略拜謁者僕射遂見親幸每公卿會議常引秉上殿訪以邊事多簡帝心, WYG: 獄伏誅}
