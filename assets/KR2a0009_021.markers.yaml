  - {type: variant, offset: 4229, length: 0, content: '', WYG: 野命東西南北紫宮天子宮文昌少微為貴臣天津為水北斗主殺流星起歴紫宮文昌少微天津文昌為天子使出有兵誅也竇憲為大將軍憲弟篤景等皆卿校尉憲女弟壻郭舉為侍中射聲校尉與衛尉鄧疊母元俱出入宮中謀為不軌至四年六月丙寅發覺和帝幸北宮詔執金吾五校勒兵屯南北宮閉城門捕舉舉父長樂少府璜及疊疊弟歩兵校尉磊母元皆下獄誅憲弟篤景等皆自殺金犯軒轅女主失勢竇氏被誅太后失勢五年古今注曰正月甲戍月乘嵗星四月癸巳太白熒惑辰星俱在東井巫咸曰太白守井五榖不成黄帝經曰五星及客星守井皆為水石氏曰為旱又曰太白入東井留一日以上乃占大臣當之期三月若一年遠五年古今注曰木在輿鬼七月壬午嵗星犯軒轅大星九月金在南斗魁中為水石氏曰為旱火犯房北第一星東井秦地為法三星合内外有兵又為法令及水金入斗口中為大将将死火犯房北第一星為将相其六年正月司徒丁鴻薨古今注曰六年六月丁亥金在東井閏月己丑流星大如桃起參北西至參肩南稍有光七月水大漂殺人民傷五榖許侯馬光有罪自殺九月行車騎将軍}
