  - {type: variant, offset: 4419, length: 0, content: '', krp: 北斗魁中北至閣道稍有光色赤黄須臾西北有雷聲十六年四月丁未紫宮中生白氣如粉絮戊午客星從紫宮西行至昴五月壬申滅七月庚午水在輿鬼中黄帝占曰辰星犯昴大臣誅國有憂郗萌曰多蝗蟲十月辛亥流星起鉤陳北行三丈有光色黄白氣生紫宮中為喪客星從紫宮西行至昴為趙輿鬼為死喪鉤陳為皇后流星出之為中使後一年元興元年十月二日和帝崩殤帝即位一年又崩無嗣鄧太后遣使者迎清河孝王子即位是為孝安皇帝是其應也清河趙地也元興元年二月庚辰有流星起角亢五丈所四月辛亥有流星起斗東北行到須女七月己巳有流星起天市五丈所光色赤閏月辛亥水金俱在氐巫咸曰辰星守氐多水災海中占曰天下大旱所在不收荆州星占曰太白守氐國君大哭流星起斗東北行至須女須女燕地天市為外軍水金㑹為}
  - {type: variant, offset: 4421, length: 7, content: 操不克夷三族于, WYG: 其年遼東貃人反鈔六縣發上谷漁陽右北平遼西烏桓討之孝殤帝延平元年正月丁酉金火在婁金火合為爍為大人憂古今注曰七月甲申月在南斗中是嵗八月辛亥孝殤帝崩孝安永初元年五月戊寅熒惑逆行守心前星韓楊占曰多火災一曰地震檢其年十八郡地震明年漢陽火八月戊申客星在東井弧星西南心為天子明堂熒惑逆行守之為反臣雒書曰熒惑守心逆臣起黄帝占曰逆行守心二十日大臣亂客星在東井為大水荆州經曰客星干犯東井則大臣誅是}
