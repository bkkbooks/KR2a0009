  - {type: variant, offset: 797, length: 2131, content: 殿弇入造牀下請閒因說曰今更始失政君臣淫亂諸將擅命於畿內貴戚縱橫於都內天子之命不出城門所在牧守輒自遷易百姓不知所從士人莫敢自安虜掠財物劫掠婦女懷金玉者至不生歸元元叩心更思莽朝又銅馬赤眉之屬數十輩輩數十百萬聖公不能辦也其敗不久公首事南陽破百萬之軍今定河北北據天府之地以義征伐發號響應天下可傳檄而定天下至重不可令它姓得之聞使者從西方來欲罷兵不可從也今吏士死亡者多弇願歸幽州益發精兵以集其大計光武大說乃拜弇為大將軍與吳漢北發幽州十郡兵弇到上谷收韋順蔡充斬之漢亦誅苗曾於是悉發幽州兵引而南從光武擊破銅馬高湖赤眉青犢又追尤來大槍五幡於元氏弇常將精騎為軍鋒輒破走之光武乘勝戰慎順水上虜危急殊死戰時軍士疲弊遂大敗奔還壁范陽數日乃振賊亦退去從追至容城小廣陽安次連戰破之光武還薊復遣弇與吳漢景丹蓋延朱祐邳彤耿純劉植岑彭祭遵堅鐔王霸陳俊馬武十三將軍追賊至潞東及平谷再戰斬首萬三千餘級遂窮追於右北平無終土垠之閒至浚俊靡而還賊散入遼西遼東或為烏桓貊人所鈔擊略盡光武即位拜弇為建威大將軍與驃騎大將軍景丹彊弩將軍陳俊攻厭新賊於敖倉皆破降之建武二年更封好畤侯食好畤美陽二縣三年延岑自武關出攻南陽下數城穰人杜弘率其衆以從岑弇與岑等戰於穰大破之斬首三千餘級生獲其將士五千餘人得印綬三百杜弘降岑與數騎遁走東陽弇從幸舂陵因見自請北收上谷兵未發者定彭竉於漁陽取張豐於涿郡還收富平獲索東攻張步以平齊地帝壯其意乃許之四年詔弇進攻漁陽弇以父據上谷本與彭寵同功又兄弟無在京師者自疑不敢獨進上書求詣洛陽詔報曰將軍出身舉宗為國所向陷敵功効尤著何嫌何疑而欲求徵且與王常共屯涿郡勉思方略況聞弇求徵亦不自安遣舒弟國入侍帝善之進封況為隃麋侯乃命弇與建義大將軍朱祐漢忠將軍王常等擊望都故安西山賊十餘營皆破之時征虜將軍祭遵屯良鄉驍騎將車劉喜屯陽鄉以拒彭寵寵遣弟純將匈奴二千餘騎寵自引兵數萬分為兩道以擊遵喜胡騎經軍都舒襲破其衆斬匈奴兩王寵乃退走況復與舒攻寵取軍都五年寵死天子嘉況功使光祿大夫持節迎況賜甲第奉朝請封舒為牟平侯遣弇與吳漢擊富平獲索賊於平原大破之降者四萬餘人因詔弇進討張步弇悉收集降卒結部曲置將吏率騎都尉劉歆太山太守陳俊引兵而東從朝陽橋濟河以度張步聞之乃使其大將軍費邑軍歷下又分兵屯祝阿別於太山鐘城列營數十以侍弇弇度河先擊祝阿自旦攻城日未中而拔之故開圍一角令其衆得奔歸鐘城鐘城人聞祝阿已潰大恐懼遂空壁亡去費邑分遣弟敢守巨里弇進兵先脅巨里使多伐樹木揚言以填塞阬數日有降者言邑聞弇欲攻巨里謀來救之弇乃嚴令軍中趣修攻具宣勑諸部後三日當悉力攻巨里城陰緩生口令得亡歸歸者以弇期告邑邑至日果自將精兵三萬餘人來救之弇喜謂諸將曰吾所以修攻具者欲誘致邑耳今來適其所求也即分三千人守巨里自行精兵上岡阪乘高合戰大破之臨陳斬邑既而收首級以示巨里城中城中兇懼費敢悉衆亡歸張步弇復收其積聚縱兵擊諸未下者平四十餘營遂定濟南時張步都劇使其弟藍將精兵二萬守西安諸郡太守合萬餘人守臨淄相去四十里盒進軍畫中居二城之閒弇視西安城小而堅且藍兵又精臨淄名雖大而實易攻乃勑諸校會後五日攻西安藍聞之晨夜儆守至期夜半弇勑諸將皆蓐食會明至臨淄城護軍荀梁等爭之以為宜速攻西安弇曰不然西安聞吾欲攻之日夜為備臨淄出不意而至必驚擾吾攻之一日必拔拔臨淄即西安孤張藍與步隔絕必復亡去所謂擊一而得二者也若先攻西安不卒下頓兵堅城死傷必多縱能拔之藍引軍還奔臨淄并兵合埶觀人虛實吾深入敵地後無轉輸旬月日之閒不戰而困諸君之言未見其宜遂攻臨淄半日拔之入據其城張藍聞之大懼遂將其衆亡歸劇弇乃令軍中無得妄掠劇下須張步至乃取之以激怒步步聞大笑曰以尤來大彤十餘萬衆吾皆即其營而破之今大耿兵少於彼又皆疲勞何足懼乎乃與三弟藍弘壽及故大彤渠帥重異等兵號二十萬至臨淄大城東將攻弇弇先出淄水上與重異遇突騎欲縱弇恐挫其鋒令步不敢進故示弱以盛其氣乃引歸小城陳兵於內步氣盛直攻弇營與劉歆等合戰弇升王宮壞臺望之視歆等鋒交乃自引精兵以橫突步陳於東城下大破之飛矢中弇股以佩刀截之左右無知者至暮罷弇明旦復勒兵出是時帝在魯聞弇為步所攻自往救之未至陳俊謂弇曰劇虜兵盛可且閉營休士以須上來弇曰乘輿且到臣子當擊牛釃酒以待百官反欲以賊虜遺君父邪乃出兵大戰自旦及昏復大破之殺傷無數城中溝皆滿弇知步困將退豫置左右翼為伏以待之人定時步果引去伏兵起縱擊追至鉅昧水上八九十里僵尸相屬收得輜重二千餘兩步還劇兄弟各分兵散去後數日車駕至臨淄自勞軍羣臣大會帝謂弇曰昔韓信破歷下以開基今將軍攻祝阿以發迹此皆齊之西界功足相方而韓信襲擊已降將軍獨拔勍敵其功乃難於信也又田橫亨酈生及田橫降高帝詔衞尉不聽為仇張步前亦殺伏隆若步來歸命吾當詔大司徒釋其怨又事尤相類也將軍前在南陽建此大策常以為落落難合有志者事竟成也弇因復追步步奔平壽乃肉袒負斧鑕於軍門弇傳步詣行在所而勒兵入據其城樹十二郡旗鼓令步兵各以郡人詣旗下衆尚十餘萬輜重七千餘兩皆罷遣歸鄉里弇復引兵至城陽降五校餘黨齊地悉平振旅還京師六年西拒隗囂屯兵於漆八年從上隴明年與中郎將來歙分部徇安定北地諸營保皆下之弇凡所平郡四十六屠城三百未常嘗挫折十二年況疾病乘輿數自臨幸復以國弟廣舉並為中郎將弇兄弟六人皆垂青紫省侍醫藥當代以為榮及況卒謚烈侯少子霸襲況爵十三年增弇戶邑上大將軍印綬罷以列侯奉朝請每有四方異議輒召入問籌策年五十六, WYG: ''}
