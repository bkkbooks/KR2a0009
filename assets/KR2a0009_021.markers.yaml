  - {type: variant, offset: 4672, length: 0, content: '', WYG: 騭等七侯皆免官自殺是其應也延光古今注曰元年四月丙午太白晝見二年八月己亥熒惑出太微端門三年二月辛未太白犯昴石氏星占太白守昴兵從門闕入主人走郗萌曰不有亡國必有謀主又云入昴大赦五月癸丑太白入畢郗萌曰太白入畢馬馳人走又曰有中䘮九月壬寅鎮星犯左執法四年太白入輿鬼中古今注曰四月甲辰入六月壬辰太白出太微九月甲子太白入斗口中十一月客星見天市熒惑出太微為亂臣太白犯昴畢為近兵一曰大人當之鎮星犯左執法有誅臣太白入輿鬼中為大喪太白出太微為中宮有兵入斗口為貴将相有誅者客星見天市中為貴喪是時大将軍耿寳中常侍江京樊豊小黄門劉安與阿母王聖聖子女永等并構譖太子保并惡太子乳母男厨監邴吉三年九月丁酉廢太子為濟隂王以北鄉侯懿代殺男吉徙其父母妻子日南四年三月丁卯安帝廵狩從南陽還道寢疾至葉崩閻后與兄衛尉顯中常侍江京等共隠匿不令羣臣知上崩遣司徒劉喜等分詣郊廟告天請命載入北宮庚午夕發喪尊閻氏為太后北鄉侯懿病薨京等又不欲立保白太后更徴諸王子擇所立中黄門孫程王國王康等十九人共合謀誅顯京等立保為天子是為孝順皇帝皆姦人强臣狂亂王室其於死亡誅戮兵起宮中是其應古今注曰永建元年二月甲午客星入太微五月甲子月入斗李氏家書曰時天有變氣李郃上書諫曰臣聞天不言縣象以示吉凶挺災變異以為譴誡昔齊桓公遭虹貫牛斗之變納管仲之謀令齊去婦無近妃宮桓公聽用齊以大安趙有尹史見月生齒齕畢大星占有兵變趙君曰天下共一畢知為}
