  - {type: variant, offset: 4227, length: 1, content: 破, WYG: 出流殺人二年正月乙卯金木俱在奎丙寅水又在奎巫咸曰辰守奎多水火災亦為旱古今注曰土在東井奎主武庫兵三星㑹又為兵喪辛未水金木在婁亦為兵又為匿謀郗萌曰辰守婁有兵兵罷兵起巫咸石氏云多火災古今注曰丙寅水在奎土在東井金在婁木火在昴二月丁酉有流星大如桃起紫宮東蕃西北行五丈稍滅古今注曰三月甲子火在亢南端門第一星南乙亥金在東井四月丙辰有流星大如𤓰起文昌東北西南行至少微西滅有頃音如雷聲已而金在軒轅大星東北二尺所古今注曰丁丑火在氐東南星東南八月丁未有流星如雞子起太微西東南行四丈所消十月癸未有流星大如桃起天津西行六丈所消十一月辛酉有流星大如拳起紫宮西行到胃消三年九月丁卯有流星大如鷄子起紫宮西南至北斗柄間消星紫宮占曰有流星出紫宮天子使也色赤言兵色白言喪色黄言吉色青言憂色黑言水出皆以所}
