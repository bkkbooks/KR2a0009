  - {type: variant, offset: 5380, length: 250, content: 筋革恭與士推誠同死生故皆無二心而稍稍死亡餘數十人單于知恭已困欲必降之復遣使招恭曰若降者當封為白屋王妻以女子恭乃誘其使上城手擊殺之炙諸城上虜官屬望見號哭而去單于大怒更益兵圍恭不能下初關寵上書求救時肅宗新即位乃詔公卿會議司空第五倫以為不宜救司徒鮑昱議曰今使人於危難之地急而棄之外則縱蠻夷之暴內則傷死難之臣誠令權時後無邊事可也匈奴如復犯塞為寇陛下將何以使將又二部兵人裁各數十匈奴圍之歷旬不下是其寡弱盡力之効也可令敦煌酒泉太守各將精騎二千多其幡幟倍道兼行以赴其急匈奴疲極之兵必不敢當四十日閒足還入塞帝然之乃遣, WYG: 六年}
