  - {type: variant, offset: 4288, length: 0, content: '', WYG: 八年九月辛丑夜有流星大如拳起婁十月北海王威自殺十二月陳王羡薨其九年閏月皇太后竇氏崩遼東鮮卑太守祭參不追虜徴下獄誅九月司徒劉方坐事免官自殺隴西羌反遣執金吾劉尚行征西將軍事越騎校尉節鄉侯趙世發北軍五校黎陽雍營及邊胡兵三萬騎征西羌十一年五月丙午流星大如𤓰起氐西南行稍有光白色古今注曰六月庚辰月入畢中占曰流星白為有使客大為大使小亦小使疾期疾遲亦遲大如𤓰為近小行稍有光為遲也又正王日邊方有受王命者也明年二月蜀郡旄牛徼外夷白狼樓薄種王唐繒等率種人口十七萬歸義内屬賜金印紫綬錢帛十}
