  - {type: variant, offset: 4419, length: 0, content: '', WYG: 北斗魁中北至閣道稍有光色赤黄須臾西北有雷聲十六年四月丁未紫宮中生白氣如粉絮戊午客星從紫宮西行至昴五月壬申滅七月庚午水在輿鬼中黄帝占曰辰星犯昴大臣誅國有憂郗萌曰多蝗蟲十月辛亥流星起鉤陳北行三丈有光色黄白氣生紫宮中為喪客星從紫宮西行至昴為趙輿鬼為死喪鉤陳為皇后流星出之為中使後一年元興元年十月二日和帝崩殤帝即位一年又崩無嗣鄧太后遣使者迎清河孝王子即位是為孝安皇帝是其應也清河趙地也元興元年二月庚辰有流星起角亢五丈所四月辛亥有流星起斗東北行到須女七月己巳有流星起天市五丈所光色赤閏月辛亥水金俱在氐巫咸曰辰星守氐多水災海中占曰天下大旱所在不收荆州星占曰太白守氐國君大哭流星起斗東北行至須女須女燕地天市為外軍水金㑹為}
