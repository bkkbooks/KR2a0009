  - {type: variant, offset: 4213, length: 0, content: '', WYG: 羌又阜陵王延與子男魴謀反大逆無道得不誅廢為侯二月九日古今注曰甲申金入斗魁甲寅流星過紫宮中長數丈散為三滅十二月戊寅彗星出婁三度長八九尺稍入紫宮中百六日稍滅流星過入紫宮皆大人忌後四年六月癸丑明德皇后崩古今注曰五年二月戊辰木火俱在參三月戊寅木火在東井六年七月丁酉夜有流星起軒轅大如拳歴文昌餘氣正白句曲西如文昌久久乃滅黄帝星經曰木守東井有土功之事一曰大水郗萌曰嵗星守參后當之熒惑守大人當之元和元年四月丁巳客星晨出東方在胃八度長三尺歴閣道入紫宮留四十日滅閣道紫宮天子之宮也客星犯入留久為大喪後四年孝章皇帝崩孝和永元元年正月辛卯有流星起參長四丈古今注曰大如拳起參東南有光色黄白古今注曰癸亥鎮在參又流星大如桃色赤起太微東蕃石氏曰鎮守參有土功事二月流星起天棓東北行三丈所滅色青白壬申夜有流星起太微東蕃長三丈三月古今注曰戊子土在參丙辰流星起天津古今注曰星大如桃起天津東至斗黃白頻有光壬戌有流星起天}
