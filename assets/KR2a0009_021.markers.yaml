  - {type: variant, offset: 5641, length: 1, content: 守, WYG: 白晝見八月己酉熒惑入太微斗為貴相為揚州熒惑犯入之為兵喪其六年大將軍商薨九江丹陽賊周生馬勉等起兵攻沒郡縣梁氏又專權於天廷中六年二月丁巳彗星見東方長六七尺色青白西南指營室及墳墓星郗萌占曰彗星出而中營室天下亂易政以五色占之吉凶丁丑彗星在奎一度長六尺癸未昬見河圗曰彗星出貫奎庫兵悉出禍在强侯外夷胡應逆首謀也西北歴昴畢甲申在東井遂歴輿鬼栁七星張光炎及三台至軒轅中滅古今注曰五月庚寅太白晝見十一月甲午太白晝見營室者天子常宮墳墓主死彗星起而在營室墳墓不出五年天下有大喪後四年孝順帝崩昴為邊兵又為趙羌周馬父子後遂為寇又劉文刦清河相謝暠欲立王蒜為天子暠不聽殺暠王閉門距文官兵捕誅文蒜以惡人所刦廢為尉氏侯又徙為犍陽都鄉侯薨國絶歴東井輿鬼為秦皆羌所攻鈔炎及三台為三公是時太尉杜喬及故太尉李固為梁冀所陷入坐文書死及至注張為周滅於軒轅中為後宮其後懿獻后以憂死梁氏被誅是其應也漢安古今注曰元年二月壬午嵗星在太㣲中八月癸丑月犯南斗入魁中二年正月己亥太白晝見五月丁亥辰星犯輿鬼古今注曰丙辰月入斗中六月乙丑熒惑光芒犯鎮星七月甲申太白晝見辰星犯輿鬼為大喪熒惑犯鎮星為大人忌明年八月孝順帝崩孝沖古今注曰建康元年九月己亥太白晝見韓揚占曰天下有喪一曰有白衣之㑹明年正月又崩孝質本初元年古今注曰三月丁丑月八南斗三月癸丑熒惑入輿鬼四月辛巳太白入輿鬼皆為大喪五月庚戍太白犯熒惑為逆謀閏月一日孝質帝為梁冀所鴆崩後漢書卷二十一後漢書卷二十一考證天文志中攻蕉唐城臣召南按文當作嶲唐城嶲唐永昌郡屬縣也二月九日甲寅流星過紫宮臣良裘按書日例惟甲子此兼言九日訛也上書八月庚寅彗星出天市此不應更紀二月}
