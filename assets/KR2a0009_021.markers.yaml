  - {type: variant, offset: 4230, length: 1, content: 并, krp: 鄧鴻越騎校尉馮柱發左右羽林北軍五校士及八郡跡射烏桓鮮卑合四萬騎與度遼將軍朱徴䕶烏桓校尉任尚中郎將杜崇征叛胡十二月車騎將軍鴻坐追虜失利下獄死度遼將軍徴中郎將崇皆抵罪七年正月丁未有流星起天津入紫宮中滅色青黃有光二月癸酉金火俱在參巫咸占曰熒惑守參多火災海中占曰為旱太白守參國有反臣郗萌曰有攻戰伐國也戊寅金火俱在東井郗萌曰熒惑守井百川皆滿太白又從舍蓋二十日流國又曰雜糴貴又將相死八月甲寅水土金俱在軫春秋緯曰五星有入軫者皆為兵大起巫咸占曰五星入軫者司其出日而數之期二十日皆為兵發司始八處之率一日期十日軍罷石氏星經曰辰星守軫嵗水郗萌曰鎮星出入留舍軫六十日不下必有大喪春秋緯曰太白八軫兵太起郗萌曰太白守軫必有死亡十一月甲戍金火俱在心雒書曰太白守心後九年大饑十二月己卯有流星起文昌入紫宮消丙辰火金水俱在斗流星入紫宮金火在心皆為大喪三星合軫為白衣之㑹金火俱在參東井皆為外兵有死將三星俱在斗有戮將若有死相八年四月樂成王黨七月樂成王宗皆薨將兵長史吳棽坐}
  - {type: variant, offset: 4232, length: 54, content: 憲傳封秉美陽侯食邑三千戶秉性勇壯而簡易於事軍行常自被甲在前休止不結營部然遠斥候明要誓有警軍陳立成士卒皆樂為死, WYG: 徴下獄誅古今注曰}
