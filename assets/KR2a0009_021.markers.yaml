  - {type: variant, offset: 2991, length: 444, content: 霸卒子文金嗣文金卒子喜嗣喜卒子顯嗣為羽林左監顯卒子援嗣尚桓帝妹長社公主為河陽東太守後曹操誅耿氏唯援孫弘存焉牟平侯舒卒子襲嗣尚顯宗女隆慮公主襲卒子寶嗣寶女弟為清河孝王妃及安帝立尊孝王母為孝德皇后以妃為甘園大貴人帝以寶元舅之重使監羽林左車騎位至大將軍而附事內寵與中常侍樊豐帝乳母王聖等譖廢皇太子為濟陰王及排陷太尉楊震議者怨之寶弟子承襲公主爵為林慮侯位至侍中安帝崩閻太后以寶等阿附嬖倖共為不道策免及承皆貶爵為亭侯遣就國寶於道自殺國除大貴人數為耿氏請陽嘉三年順帝遂詔紹封寶子箕牟平侯為侍中以恆為陽亭侯承為羽林中郎將其後貴人薨大將軍梁冀從承求貴人珍玩不能得冀怒風有司奏奪其封承惶恐遂亡匿於穰數年冀推迹得之乃并族其家十餘人論曰淮陰廷論項王審料成埶則知高祖之廟勝矣耿弇決策河北定計南陽亦見光武之業成矣然弇自剋拔全齊而無復尺寸功夫豈不懷將時之度數不足以相容乎三世為將道家所忌而耿氏累葉以功名自終將其用兵欲以殺止殺乎何其獨能隆也國字叔慮建武四年初入侍光武拜為黃門侍郎應對左右帝以為能遷射聲校尉七年射聲官罷拜, WYG: 竇固}
