  - {type: variant, offset: 4486, length: 174, content: 尉將精騎八百出居延塞直奔北單于廷於金微山斬閼氏名王已下五千餘級單于與數騎脫亡盡獲其匈奴珍寶財畜去塞五千餘里而還自漢出師所未嘗至也乃封夔粟邑侯會北單于弟左鹿蠡王於除鞬自立為單于衆八部二萬餘人來居蒲類海上遣使款塞以夔為中郎將持節衞護之及竇憲敗夔亦免官奪爵土後復為長水校尉拜五原太守遷遼東太守元興元年貊人寇郡界夔追擊斬其渠帥永初三年南單于檀反畔使夔率鮮卑, WYG: ''}
