  - {type: variant, offset: 31, length: 2, content: 烏氏, WYG: 隴西漢陽北地武都武威金城西平西郡張掖張掖屬國酒泉敦煌西海漢興永陽東安南凡二十二郡省交州以其郡屬荆州荆州得交州之蒼梧南海九真交趾日南與其舊所部南陽章陵南郡江夏武陵長沙零陵桂陽凡十三郡益州本部郡有廣漢漢中巴郡犍為蜀郡牂牁越巂益州永昌犍為屬國蜀郡屬國廣漢屬國今并得交州之鬱林合浦凡十四郡豫州部郡本有潁川陳國汝南沛國梁國魯國今并得河南榮陽都尉凡八郡徐州部郡得下邳廣陵彭城東海琅邪利城城陽東莞凡八郡青州得齊國北海東萊濟南樂安凡五郡獻帝春秋曰孫權以步隲行交州刺史東觀書曰交趾刺史持節諸州常以八月廵行所部郡國胡廣注曰廵謂驛馬也縣次傳駕之以走疾猶言古附遂錄囚徒胡廣曰縣邑囚徒皆閲錄視參考辭狀實其真偽有侵寃者即時平理也考殿最胡廣曰課第長吏不稱職者為殿舉免之其有治能者為最察上尤異州又狀州中吏民茂才異等嵗舉一}
  - {type: page-break, offset: 31, content: '', id: KR2a0009_WYG_038-2b, image: WYG0252/WYG0252-0435b.png}
  - {type: variant, offset: 31, length: 2, content: 烏氏, krp: 隴西漢陽北地武都武威金城西平西郡張掖張掖屬國酒泉敦煌西海漢興永陽東安南凡二十二郡省交州以其郡屬荆州荆州得交州之蒼梧南海九真交趾日南與其舊所部南陽章陵南郡江夏武陵長沙零陵桂陽凡十三郡益州本部郡有廣漢漢中巴郡犍為蜀郡牂牁越巂益州永昌犍為屬國蜀郡屬國廣漢屬國今并得交州之鬱林合浦凡十四郡豫州部郡本有潁川陳國汝南沛國梁國魯國今并得河南榮陽都尉凡八郡徐州部郡得下邳廣陵彭城東海琅邪利城城陽東莞凡八郡青州得齊國北海東萊濟南樂安凡五郡獻帝春秋曰孫權以步隲行交州刺史東觀書曰交趾刺史持節諸州常以八月廵行所部郡國胡廣注曰廵謂驛馬也縣次傳駕之以走疾猶言古附遂錄囚徒胡廣曰縣邑囚徒皆閲錄視參考辭狀實其真偽有侵寃者即時平理也考殿最胡廣曰課第長吏不稱職者為殿舉免之其有治能者為最察上尤異州又狀州中吏民茂才異等嵗舉一}
