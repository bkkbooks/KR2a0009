  - {type: variant, offset: 34, length: 1, content: 晉, WYG: 初嵗盡詣京都奏事胡廣曰所察有條應繩異者輒覆問之不茹柔吐剛也嵗盡齎所狀納京師名奏事差其逺近各有常㑹中興但因計吏胡廣曰不復自詣京師其所道皆如舊典東觀書曰和帝初張酺上言臣聞王者法天熒惑奏事太微故州牧刺史入奏事所以通下問知外事也數十年以來重其道歸煩擾故時止勿奏事今因以為故事臣愚以為刺史視事滿嵗可令奏事如舊典問州中風俗恐好惡過所道事所聞見考課衆職下章所告及所自舉有意者賞異之其尤無狀逆詔書行罪法冀勅戒其餘令各敬慎所職於以衰滅貪邪便佞韓詩外傳曰王者必立牧方三人所以使窺逺牧衆也逺方之民有饑寒而不得衣食獄訟而寃失職賢而不舉者入告天子天子於其君之朝也揖而進之曰意朕之政教有不得爾者邪如何乃有饑寒而不得衣食獄訟而寃失職賢而不舉然後其君退而與其卿}
