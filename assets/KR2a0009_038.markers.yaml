  - {type: variant, offset: 24, length: 5, content: 梁統字仲寧, WYG: 州得魏郡安平鉅鹿河間清河博陵常山趙國渤海甘陵平原太原上黨西河定襄鴈門雲中五原朔方河東河内涿郡漁陽廣陽右北平上谷代郡遼東遼東屬國遼西𤣥菟樂浪凡三十二郡省司𨽻校尉以司𨽻部分屬豫州冀州雍州省涼州刺史以并雍州部郡得𢎞農京兆左馮翊右扶風上郡}
