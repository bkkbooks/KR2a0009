  - {type: variant, offset: 4382, length: 569, content: 士之淵藪自侍坐以來未聞稱一長者而多託非人誠非敢聞冀嘿然不悅樹到縣遂誅殺冀客為人害者數十人由是深怨之樹後為荊州刺史臨去辭冀冀為設酒因鴆之樹出死車上又遼東太守侯猛初拜不謁冀託以它事乃斬之時郎中汝南袁著年十九見冀凶縱不勝其憤乃詣闕上書曰臣聞仲尼歎鳳鳥不至河不出圖自傷卑賤不能致也今陛下居得致之位又有能致之資而和氣未應賢愚失序者埶分權臣上下壅隔之故也夫四時之運功成則退高爵厚寵鮮不致災今大將軍位極功成可為至戒宜遵懸車之禮高枕頤神傳曰木實繁者披枝害心若不抑損權盛將無以全其身矣左右聞臣言將側目切齒臣特以童蒙見拔故敢忘忌諱昔舜禹相戒無若丹朱周公戒成王無如殷王紂願除誹謗之罪以開天下之口書得奏御冀聞而密遣掩捕著著乃變易姓名後託病偽死結蒲為人市棺殯送冀廉問知其詐陰求得笞殺之隱蔽其事學生桂陽劉常當世名儒素善於著冀召補令史以辱之時太原郝絜胡武皆危言高論與著友善先是絜等連名奏記三府薦海內高士而不詣冀冀追怒之又疑為著黨勑中都官移檄捕前奏記者並殺之遂誅武家死者六十餘人絜初逃亡知不得免因輿櫬奏書冀門書入仰藥而死家乃得全及冀誅有詔以禮祀著等冀諸忍忌皆此類也不疑好經書善待士冀陰疾之因中常侍白帝轉為光祿勳又諷衆人共薦其子胤為河南尹胤一名胡狗時年十六容貌甚陋不勝冠帶道路見者莫不蚩笑焉不疑自恥兄弟有隙遂讓位歸第與弟蒙閉門自守冀不欲令與賓客交通陰使人變服至門記往來者南, WYG: 尉注過}
