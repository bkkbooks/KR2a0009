  - {type: variant, offset: 1930, length: 277, content: 夫孝莫大於尊尊親親其義一也詩云父兮生我母兮鞠我撫我畜我長我育我顧我復我出入腹我欲報之德昊天罔極朕不敢興事覽于前世太宗中宗寔有舊典追命外祖以篤親親其追封謚皇太后父竦為襃親愍侯比靈文順成恩成侯魂而有靈嘉斯寵榮好爵顯服以慰母心遣中謁者與嫕及扈備禮西迎竦喪詣京師改殯賜東園畫棺玉匣衣衾建塋於恭懷皇后陵傍帝親臨送葬百官畢會徵還竦妻子封子棠為樂平侯棠弟雍乘氏侯雍弟翟單父侯邑各五千戶位皆特進賞賜第宅奴婢車馬兵弩什物以巨萬計寵遇光於當世諸梁內外以親疎並補郎謁者棠官至大鴻臚雍少府棠卒子安國嗣延光中為侍中有罪免官諸梁為郎吏者皆坐免商字伯夏雍之子也少以外戚拜郎中遷黃門侍郎, WYG: ''}
