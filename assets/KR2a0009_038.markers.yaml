  - {type: variant, offset: 5582, length: 190, content: 餘萬萬以充王府用減天下稅租之半散其苑囿以業窮民錄誅冀功者封尚書令尹勳以下數十人論曰順帝之世梁商稱為賢輔豈以其地居亢滿而能以愿謹自終者乎夫宰相運動樞極感會天人中於道則易以興政乖於務則難乎御物商協回天之埶屬彫弱之期而匡朝卹患未聞上術憔悴之音載謠人口雖輿粟盈門何救阻飢之戹永言終制未解尸官之尤況乃傾側孽臣傳寵凶嗣以至破家傷國而豈徒然哉贊曰河西佐漢統亦定筭襃親幽憤升高累歎商恨善柔冀遂貪亂, WYG: 八考證}
