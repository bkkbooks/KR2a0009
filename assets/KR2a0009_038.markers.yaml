  - {type: variant, offset: 2393, length: 688, content: 貧餧不宣己惠檢御門族未曾以權盛干法而性慎弱無威斷頗溺於內豎以小黃門曹節等用事於中遂遣子冀不疑與為交友然宦者忌商寵任反欲陷之永和四年中常侍張逵蘧政內者令石光尚方令傅福從僕射杜永連謀共譖商及中常侍曹騰孟賁云欲徵諸王子圖議廢立請收商等案罪帝曰大將軍父子我所親騰賁我所愛必無是但汝曹共妒之耳逵等知言不用懼迫遂出矯詔收縛騰賁於省中帝聞震怒勑宦者李歙急呼騰賁釋之收逵等悉伏誅辭所連染及在位大臣商懼多侵枉乃上疏曰春秋之義功在元帥罪止首惡故賞不僭溢刑不淫濫五帝三王所以同致康乂也竊聞考中常侍張逵等辭語多所牽及大獄一起無辜者衆死囚久繫纖微成大非所以順迎和氣平政成化也宜早訖竟以止逮捕之煩帝乃納之罪止坐者六年秋商病篤勑子冀等曰吾以不德享受多福生無以輔益朝廷死必耗費帑臧衣衾飯唅玉匣珠貝之屬何益朽骨百僚勞擾紛華道路秖增塵垢雖云禮制亦有權時方今邊境不寧盜賊未息豈宜重為國損氣絕之後載至冢舍即時殯斂斂以時服皆以故衣無更裁制殯已開冢冢開即葬祭食如存無用三牲孝子善述父志不宜違我言也及薨帝親臨喪諸子欲從其誨朝廷不聽賜以東園朱壽之器銀鏤黃腸玉匣什物二十八種錢二百萬布三千匹皇后錢五百萬布萬匹及葬贈輕車介士賜謚忠侯中宮親送帝幸宣陽亭瞻望車騎子冀嗣冀字伯卓為人鳶肩豺目洞精矘眄口吟舌言裁能書計少為貴戚逸游自恣性嗜酒能挽滿彈格五六博蹴鞠意錢之戲又好臂鷹走狗騁馬鬬雞初為黃門侍郎轉侍中虎賁中郎將越騎步兵校尉執金吾永和元年拜河南尹冀居職暴恣多非法父商所親客洛陽令呂放頗與商言及冀之短商以讓冀冀即遣人於道刺殺放而恐商知之乃推疑於放之怨仇請以放弟禹為洛陽令使捕之盡滅其宗親賓客百餘人商薨未及葬順帝乃拜冀為大將軍弟侍中不疑為, WYG: ''}
