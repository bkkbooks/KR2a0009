  - {type: variant, offset: 328, length: 0, content: '', krp: 品為十八級合關内侯列侯凡二十等其制因古義古者天子寄軍政於六卿居則以田警則以戰所謂入使治之出使長之素信者與衆相得也故啓伐有扈乃召六卿大夫之在軍為將者也及周之六卿亦以居軍在國也則以比長閭胥族師黨正州長鄉大夫為稱其在軍也則以卒伍司馬將軍為號所以異在國之名也秦依古制其在軍賜爵為等級其帥人皆更卒也有功賜爵則在軍吏之例自一爵以上至不更四等皆士也大夫以上至五大夫五等比大夫也九等依九命之義也自左庶長以上至大庶長九卿之義也關内侯者依古圻内子男之義也秦都山西以關内為王畿故曰關内侯也列侯者依古列國諸侯之義也然則卿大夫士下之品皆放古比朝之制而異其名亦所以殊軍國也古者以車戰兵車一乗步卒七十二人分翼左右車大夫在左御者處中勇士居右凡七十五人一爵曰公士者步卒之有爵為公士者二爵曰上造造成也古者成士升於司徒曰造士雖依此名皆步卒也三爵曰簪褭御駟馬者要褭古之名馬也駕駟馬者其形似簮故曰簮褭也四爵曰不更不更者為車右不復與凡更卒同也五爵曰大夫大夫者在車左者也六爵為官大夫七爵為公大夫八爵為公乗九爵為五大夫皆軍吏也吏民爵不得過公乗者得貰與子若同産然則公乗者軍吏之爵最髙者也雖非臨戰得公卒車故曰公乗也十爵為左庶長十一爵為右庶長十二爵為左更十三爵為中更十四爵為右更十五爵為少上造十六爵為大上造十七爵為駟車庶長十八爵為大庶長十九爵為關内侯二十爵為列侯自左庶長以上至大庶長皆卿以下皆軍將也所將皆庶人更卒也故以庶更為名大庶長即大將軍也左右庶長即左右偏裨將軍也古今注曰成帝鴻嘉二年}
