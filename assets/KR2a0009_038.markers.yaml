  - {type: variant, offset: 772, length: 411, content: 姓于刑之衷孔子曰刑罰不衷則人無所厝手足衷之為言不輕不重之謂也春秋之誅不避親戚所以防患救亂全安衆庶豈無仁愛之恩貴絕殘賊之路也斷獄益少至初元建平所減刑罰百有餘條而盜賊浸多歲以萬數閒者三輔從橫羣輩並起至燔燒茂陵火見未央其後隴西北地西河之賊越州度郡萬里交結攻取庫兵劫略吏人詔書討捕連年不獲是時以天下無難百姓安平而狂狡之埶猶至於此皆刑罰不衷愚人易犯之所致也擇賢臣孔光師丹等議後出為九江太守定封陵鄉侯統在郡亦有治迹吏人畏愛之卒於官子松嗣松字伯孫少為郎尚光武女舞陰長公主再遷虎賁中郎將松博通經書明習故事與諸儒脩明堂辟廱郊祀封禪禮儀常與論議寵幸莫比光武崩受遺詔輔政永平元年遷太僕松數為私書請託郡縣二年發覺免官遂懷怨望四年冬乃縣飛書誹謗下獄死國除子扈後以恭懷皇后從兄永元中擢為黃門侍郎歷位卿校尉溫恭謙讓亦敦詩書永初中為長樂少府松弟竦竦字叔敬少習孟氏易弱冠能教授後坐兄松事與弟恭俱徙九真既徂南土歷江湖濟沅湘感悼子胥屈原以非辜沈身乃作悼騷賦繫玄, WYG: ''}
