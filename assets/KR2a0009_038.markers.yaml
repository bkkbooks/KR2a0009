  - {type: variant, offset: 1184, length: 603, content: 而沈之顯宗後詔聽還本郡竦閉門自養以經籍為娛著書數篇名曰七序班固見而稱曰孔子著春秋而亂臣賊子懼梁竦作七序而竊位素餐者慙性好施不事產業長嫂舞陰公主贍給諸梁親疎有序特重敬竦雖衣食器物必有加異竦悉分與親族自無所服竦生長京師不樂本土自負其才鬱鬱不得意嘗登高遠望歎息言曰大丈夫居世生當封侯死當廟食如其不然閑居可以養志詩書足以自娛州郡之職徒勞人耳後辟命交至並無所就有三男三女肅宗納其二女皆為貴人小貴人生和帝竇皇后養以為子而竦家私相慶後諸竇聞之恐梁氏得志終為己害建初八年遂譖殺二貴人而陷竦等以惡逆詔使漢陽太守鄭據傳考竦罪死獄中家屬復徙九真辭語連及舞陰公主坐徙新城使者護守宮省事密莫有知和帝梁氏生者永元九年竇太后崩松子扈遣從兄奏記三府以為漢家舊典崇貴母氏而梁貴人親育聖躬不蒙尊號求得申議太尉張酺引訊問事理會後召見因白奏記之狀帝感慟良久曰於君意若何酺對曰春秋之義母以子貴漢興以來母氏莫不隆顯臣愚以為宜上尊號追慰聖靈存錄諸舅以明親親帝悲泣曰非君孰為朕思之會貴人姊南陽樊調妻嫕上書自訟曰妾同產女弟貴人前充後宮蒙先帝厚恩得見寵幸皇天授命誕生聖明而為竇憲兄弟所見譖訴使妾父竦冤死牢獄骸骨不掩老母孤弟遠徙萬里獨妾遺脫逸伏草野常恐沒命無由自達今遭值陛下神聖之運親統萬機羣物得所憲兄弟姦惡既伏辜誅海內曠然各獲其宜妾得蘇息拭目更視乃敢昧死自陳所天妾聞太宗即位薄氏蒙榮宣帝繼統史族復興妾門雖有薄史之親獨無外戚餘恩誠自悼傷妾父既冤不可復生母氏年殊, WYG: 奉月}
