  - {type: variant, offset: 3236, length: 285, content: 侯冀子胤襄邑侯各萬戶和平元年重增封冀萬戶并前所襲合三萬戶弘農人宰宣素性佞邪欲取媚於冀乃上言大將軍有周公之功今既封諸子則其妻宜為邑君詔遂封冀妻孫壽為襄城君兼食陽翟租歲入五千萬加賜赤紱比長公主壽色美而善為妖態作愁眉嗁墯馬髻折步齲齒笑以為媚惑冀亦改易輿服之制作平上軿車埤幘狹冠折上巾擁身扇狐尾單衣壽性鉗忌能制御冀冀甚寵憚之初父商獻美人友通期於順帝通期有微過帝以歸商商不敢留而出嫁之冀即遣客盜還通期會商薨冀行服於城西私與之居壽伺冀出多從倉頭篡取通期歸截髮刮面笞掠之欲上書告其事冀大恐頓首請於壽母壽亦不得已而止冀猶復與私通生子伯玉匿不敢出壽尋知之使子胤誅滅友氏冀慮壽害伯玉常置複壁, WYG: ''}
