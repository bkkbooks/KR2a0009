  - {type: variant, offset: 37, length: 0, content: '', krp: 謀之逺方之民聞皆曰誠天子也夫我居之辟見我之近也我居之幽見我之明也可欺乎哉故牧者所以開四目通四聰皆有從事史假佐本注曰員職略與司𨽻同無都官從事其功曹從事為治中從事豫州部郡國六冀州部九兖州部八徐州部五青州部六荆州部七揚州部六益州部十二涼州部十二并州部九幽州部十一交州部七凡九十八其二十七王國相其七十一郡太守其屬國都尉屬國分郡離逺縣置之如郡差小置本郡名世祖并省郡縣四百餘所後世稍復增之臣昭曰昔在先代列爵殊等九服不同畿荒制異雖連帥相司牧伯分長而封疆置限兼庸有數如身之使臂手之使指故能髙卑相固逺近維緝羣后克穆共康兆庶爰及周衰稍競吞廣邦國侵爭遞懷貪畧猶歴數百年乃能成其并一豈非樹之有本使其然乎秦兼天下開設郡縣孤立獨王即以顛亡漢祖因循雖不頓革分置子弟終龕諸吕之難漸剖列郡以減大都之權後嚴安之徒猶忼慨發憤謂千里之威即古之强國慮非安本無窮之計也孝武之末始置刺史監糾非法不過六條傳車周流匪有定鎮秩裁數百威望輕寡得有舉察之勤未生陵犯之釁成帝改牧其萌始大既非識治之主故無取焉耳世祖中興監乎政本復約其職還遵舊制斷親奏事省入惜煩漸得自重之路因茲以降彌於嵗年母后當朝多以弱守六合危動四海潰弊財盡力竭綱維撓毁而八方不能内侵諸侯莫敢入伐豈非榦强枝弱控制素重之所致乎至孝靈在位横流既及劉焉徼偽自為身謀非有憂國之心專懷狼據之策抗論昏世薦議愚主盛稱宜重牧伯謂足鎮壓萬里扶姦樹算茍罔一時豈可永為國本長期勝術哉夫聖主御世莫不大庇生民承其休謀傳其典制猶云事久弊生無或通貫故改變正服革異質文分爵三五參差不一況在豎騃之君挾姦詐之臣共所創置哉焉可仍因大建尊州之規竟無一日之治故焉牧益土造帝服於岷峨袁紹取冀下制書於燕朔劉表制南郊天祀地魏祖據兖遂搆皇業漢之殄滅禍原乎此及臻後代任寄彌廣委之邦宰之命授之斧鉞之重假之都督之威開之征討之畧晉太康之初武帝亦疑其然乃詔曰上古及中代或置州牧或置刺史置監御史皆總綱紀而不賦政治民之事任之諸侯郡守昔漢末四海分崩因以吳蜀自擅自是刺史内親民事外領兵馬此一時之宜爾今頼宗廟之靈士大夫之力江表平定天下合之為一當韜戢干戈與天下休息諸州無事者罷其兵刺史分職皆如漢氏故事出頒詔條入奏事京城二千石專治民之重監司清峻於上此經久之體也其便省州牧晉武帝又見其弊矣雖有其言不卒其事後嗣纘繼牧鎮愈重據地分爭竟覆天下昔王畿之大不過千里州之所司廣袤兼逺爭强虎視之辰遷鼎革終之日未嘗不藉蕃兵之權挾董司之力逼迫伺隙陵奪沖幼其甚者臣主揚兵骨肉戰野昆弟梟懸伯叔屠裂末壯披心尾大不掉既用此始亦病以終傾輈愈襲莫或途改致雒京有銜璧之痛秦臺有不守之酷胡羌遞興氐鮮更起摩滅羣黎流禍百世堅冰所漸兼緣茲蠧嗚呼後之聖王必不久滯斯迹靈長之終當有神算不然則雄捍反拒之事懼甚於此心憑强作害之謀方盛於後意凡州所監都為京都置尹一人二千石丞一人每郡置太守一人二千石丞一人郡當邊戍者丞為長史古今注曰建武六年三月令郡太守諸侯相病丞長史行事十四年罷邊郡太守丞長史領丞職王國之相亦如之每屬國置都尉一人比二千石丞一人本注曰凡郡國皆掌治民進賢勸功決訟檢姦常以春行所主縣勸民農桑振救乏絶秋冬遣無害吏案訊諸囚平其罪法論課殿最案律有無害都吏如今言公平吏漢書音義曰文無所枉害蕭何以文無害為沛主吏掾嵗盡遣吏上計盧植禮注曰計斷九月因秦以十月為正故并舉孝亷郡口二十萬舉一人典兵禁備盜賊景帝更名都尉武帝又置三輔都尉各一人譏出入邊郡置農都尉主屯田殖穀又置屬國都尉主蠻夷降者中興建武六年省諸郡都尉并職太守無都試之役古今注曰六年八月省都尉官應劭曰每有劇職郡臨時置都尉事訖罷之省關都尉唯邊郡往往置都尉及屬國都尉稍有分縣治民比郡安帝以羌犯法三輔有陵園之守乃復置右扶風都尉京兆虎牙都尉應劭漢官曰蓋天生五材民並用之廢一不可誰能去兵兵之設尚矣易稱弦木為弧剡木為矢弧矢之利以威天下春秋三時務農一時講武詩美公劉匪居匪康入耕出戰乃裹餱糧干戈載揚四方莫當自郡國罷材官騎士之後官無警備實啓㓂心一方有難三面救之發興雷震煙蒸電激一切取辦黔首囂然不及講其射御用其戒誓一旦驅之以即强敵猶鳩鵲捕鷹鸇豚羊弋豺虎是以每戰常負王旅不振張角懷挾妖偽遐邇摇蕩八州幷發煙炎絳天牧守梟裂流血成川爾乃逺徴三邊殊俗之兵非我族類忿鷙縱横多僵良善以為己功財貨糞土哀夫民氓遷流之咎見出在茲不教而戰是謂棄之跡其禍敗豈虚也哉春秋家不藏甲所以一國威抑私力也今雖四海殘壞王命未洽可折衝壓難若指於掌故置右扶風皆置諸曹掾史新論曰王莽時置西海郡令其吏皆百石親事一曰為四百石二嵗而遷補本注曰諸曹略如公府曹無東西曹蔡質漢儀曰河南尹掾出考案與從事同有功曹史主選署功勞有五官掾署功曹及諸曹事其監屬縣有五部督郵曹掾一人正門有亭長一人主記室史主錄記書催期㑹無令史閣下及諸曹各有書佐幹主文書漢官曰河南尹員吏九百二十七人十二人百石諸縣有秩三十五人官屬掾史五人四部督郵吏部掾二十六人案獄仁恕三人監津渠漕水掾二十五人百石卒吏二百五十人文學守助掾六十人書佐五十人循行二百三十人幹小史二百三十一人屬官每縣邑道大者置令一人千石其次置長四百石小者置長三百石侯國之相秩次亦如之應劭漢官曰前書百官表云萬户以上為令萬户以下為長三邊始孝武皇帝所開縣户數百而或為令荆陽江南七郡唯有臨湘南昌吳三令爾及南陽穰中土沃民稠四五萬户而為長桓帝時以江南陽安為女公主邑改號為令主薨復復其故若此為繫其本俗説令長以水土為之及秩髙下皆無明文班固通儒述一代之書斯近其真本注曰皆掌治民顯善勸義禁姦罰惡理訟平賊恤民時務秋冬集謀上計於所屬郡國胡廣曰秋冬嵗盡各計縣户口墾田錢穀出入盜賊多少上其集簿丞尉以下嵗詣郡課校其功功多尤為最者於廷尉勞勉之以勸其後負多尤為殿者於後曹别責以糾怠慢也諸對辭窮尤困収主者掾史關白太守使取法丞尉縛責以明下轉相督勅為民除害也明帝詔書不得僇辱黄綬以别小人吏也凡縣主蠻夷曰道公主所食湯沐曰國縣萬户以上為令不滿為長侯國為相皆秦制也史記秦并天下夷郡縣銷兵刃示不復用丞各一人尉大縣二人小縣一人本注曰丞署文書典知倉獄尉主盜賊凡有賊發主名不立則推索行尋案察姦宄以起端緒應劭漢官曰大縣丞左右尉所謂命卿三人小縣一尉一丞命卿二人各署諸曹掾史本注曰諸曹略如郡員五官為廷掾監鄉五部春夏為勸農掾秋冬為制度掾漢官曰雒陽令秩千石丞三人四百石孝亷左尉四百石孝亷右尉四百石員吏七百九十六人十三人四百石鄉有秩獄史五十六人佐史鄉佐七十七人斗食令史嗇夫假五十人官掾史幹小史二百五十人書佐九十人循行二百六十人鄉置有秩三老游徼本注曰有秩郡所署秩百石漢官曰鄉户五千則置有秩掌一鄉人風俗通曰秩則田間大夫言其官裁有秩耳其鄉小者縣置嗇夫一人風俗通曰嗇者省也夫賦也言消息百姓均其役賦皆主知民善惡為役先後知民貧富為賦多少平其差品三老掌教化凡有孝子順孫貞女義婦讓財救患及學士為民法式者皆扁表其門以興善行游徼掌徼循禁司姦盜又有鄉佐屬鄉主民収賦稅風俗通曰國家制度大率十里一鄉亭有亭長以禁盜賊本注曰亭長主求捕盜賊承望都尉漢官儀曰民年二十三為正一嵗以為衞士一嵗為材官騎士習射御騎馳戰陣八月太守都尉令長相丞尉㑹都試課殿最水家為樓船亦習戰射行船過郡太守各將萬騎行鄣塞烽火追虜置長史一人丞一人治兵民當兵行長領置部尉千人司馬候農都尉皆不治民不給衞士材官樓船年五十六老衰乃得免為民就田應合選為亭長亭長課徼廵尉游徼亭長皆習設備五兵五兵弓弩㦸楯刀劒甲鎧鼓吏赤幘行縢帶劒佩刀持楯被甲設矛㦸習射設十里一亭亭長亭候五里一郵郵間相去二里半司姦盜亭長持二尺板以劾賊索繩以収執賊風俗通曰漢家因秦大率十里一亭亭留也蓋行旅宿㑹之所館亭吏舊名負弩改為長或謂亭父里有里魁民有什伍善惡以告本注曰里魁掌一里百家什主十家伍主五家以相檢察民有善事惡事以告監官風俗通曰周禮五家為鄰四鄰為里里者止也里有司司五十家共居止同事春秋通其所也邊縣有障塞尉本注曰掌禁備羌夷犯塞太公隂符曰武王問太公願聞治亂之要太公曰其本在吏武王曰吏者治也所以為治其亂者何太公曰故吏重罪有十武王問吏之重罪太公曰一吏苛刻二吏不平三吏貪汚四吏以威力迫脅於民五吏與史合姦六吏與人亡情七吏作盜賊使人為耳目八吏賤買賣貴於民九吏増易於民十吏振懼於民夫治者有三罪則國亂而民愁盡有之則民流亡而君失其國武王曰民亦有罪乎太公曰民有十大於此除者則國治而民安武王曰十大何如太公曰民勝吏厚大臣一大也民宗强侵陵羣下二大也民甚富傾國家三大也民尊親其君天下歸慕四大也衆暴寡五大也民有百里之譽千里之交六大也民以吏威為權七大也恩行於吏八大也民服信以少為多奪人田宅贅人妻子九大也民之基業畜産為人所苦十大也所謂一家害一里一里害諸侯諸侯害天下武王曰絶吏之罪塞民之大奈何太公曰察民之暴吏明其賞審其誅則吏不敢犯罪民不敢大也武王曰是民吏相伺上下不和而結其讎太公曰為君守成為吏守職為民守事如此各居其道則國治國治則都治都治則里治里治則家治家治則善惡分明善惡分明則國無事國無事則吏民外不懷怨内不徼事其郡有鹽官鐵官工官都水官者隨事廣狹置令長及丞秩次皆如縣道無分士給均本吏本注曰凡郡縣出鹽多者置鹽官主鹽稅出鐵多者置鐵官主鼓鑄胡廣曰鹽官掊坑而得鹽或有鑿井煮海水而以得之者鑄銅為器械當鑄冶之時扇熾其火謂之鼓鑄有工多者置工官主工稅物有水池及魚利多者置水官主平水収漁稅在所諸縣均差吏更給之置吏隨事不具縣員使匈奴中郎將一人比二千石本注曰主䕶南單于置從事二人有事隨事増之掾隨事為員䕶羌烏桓校尉所置亦然應劭漢官曰擁節屯中步南設官府掾史單于嵗遣侍子來朝謁者常送迎焉得賂弓馬氊罽他物百餘萬謁者事訖還具表付帑藏詔書勅自受䕶烏桓校尉一人比二千石本注曰主烏桓胡應劭漢官曰擁節長史一人司馬二人皆六百石并領鮮卑客賜質子嵗時胡市馬晉書曰漢置東夷校尉以撫鮮卑䕶羌校尉一人比二千石本注曰主西羌應劭漢官曰擁節長史司馬二人皆六百石皇子封王其郡為國每置傅一人相一人皆二千石本注曰傅主導王以善禮如師不臣也相如太守有長史如郡丞漢初立諸王因項羽所立諸王之制地既廣大且至千里又其官職傅為太傅相為丞相又有御史大夫及諸卿皆秩二千石百官皆如朝廷國家唯為置丞相其御史大夫以下皆自置之胡廣曰後漢妾數無限别乃制設正適曰妃取小夫人不得過四十人至景帝時吳楚七國恃其國大遂以作亂㡬危漢室及其誅滅景帝懲之遂令諸王不得治民令内史主治民改丞相曰相省御史大夫廷尉少府宗正博士官武帝改漢内史中尉郎中令之名前書曰改漢内史為京兆尹中尉為執金吾郎中令為光祿勲而王國如故員職皆朝廷為署不得自置至漢成帝省内史治民更令相治民漢舊儀曰大司空何武奏罷内史相如太守中尉如都尉參職是後中尉爭權與王相奏常不和也太傅但曰傅臣昭曰觀夫髙祖之創業也豈直鴻勲碩徳大庇羣生蕩其毒虐厝之和泰而已哉至於謀深慮久封建子弟蕃維盤固規謀𢎞逺及於三趙不終燕靈夭絶齊代淮楚皆為外重故宋昌曰外畏齊楚淮南斯非效與事過則弊孰或通之全國之難誠固財物之富作衞之益亦既得之於前矣故賜以几杖用息姦謀嗣隕局下怨生有以逮連師搆亂兵交}
