  - {type: variant, offset: 3784, length: 182, content: 使人復乘埶橫暴妻略婦女敺擊吏卒所在怨毒冀乃大起第舍而壽亦對街為宅殫極土木互相誇競堂寢皆有陰陽奧室連房洞戶柱壁雕鏤加以銅漆窻牖皆有綺疎青瑣圖以雲氣仙靈臺閣周通更相臨望飛梁石蹬陵跨水道金玉珠璣異方珍怪充積臧室遠致汗血名馬又廣開園囿採土築山十里九坂以像二崤深林絕澗有若自然奇禽馴獸飛走其閒冀壽共乘輦車張羽蓋飾以金銀游觀第內多從倡伎鳴鍾吹管酣謳竟路或連繼日夜以騁娛恣客到門, WYG: 軍師用度非一公卿已下}
