  - {type: variant, offset: 15, length: 0, content: '', WYG: 夷國列侯奉百官外十有二州每州刺史一人六百石本注曰秦有監御史監諸郡漢興省之但遣丞相史分刺諸州無常官孝武帝初置刺史十三人秩六百石古今注曰常以春分行部郡國各遣一吏迎界上諸書不同也成帝更為牧秩二千石建武十八年復為刺史十二人各主一州其一州屬司𨽻校尉蔡質漢儀曰詔書舊典刺史班宣周行郡國省察治政黜陟能否斷理寃獄以六條問事非條所問即不省一條强宗豪右田宅踰制以强凌弱以衆暴寡二條二千石不奉詔書遵承典制倍公向私旁詔守利侵漁百姓聚歛為姦三條二千石不䘏疑獄風厲殺人怒則任刑喜則任賞煩擾苛暴剝戮黎元為百姓所疾山崩石裂妖祥訛言四條二千石選署不平茍阿所愛蔽賢寵頑五條二千石}
  - {type: page-break, offset: 15, content: '', id: KR2a0009_WYG_038-1b, image: WYG0252/WYG0252-0434b.png}
