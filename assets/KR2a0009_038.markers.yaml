  - {type: variant, offset: 316, length: 2, content: 郎統, WYG: 猥諸侯諸王封者受茅土歸以立社稷禮也胡廣曰諸王受封皆受茅土歸立社稷本朝為宫室自有制度至於列侯歸國者不受茅土不立宫室各隨貧富裁制黎庶以守其寵列土特進朝侯賀正月執璧云每國置相一人其秩各如本縣本注曰主治民如令長不臣也但納租於侯以户數為限其家臣置家臣庶子各一人本注曰主侍侯使理家事列侯舊有行人洗馬門大夫凡五官中興以來食邑千户已上置家丞庶子各一人不滿千户不置家丞又悉省行人洗馬門大夫關内侯如淳曰列侯出關就國侯但爵身其有家累者與之關内之邑食其租税也古今注曰建武六年初令關内侯食邑者俸月二十五斛承秦賜爵十九等為關内侯無土寄食}
