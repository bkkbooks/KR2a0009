  - {type: variant, offset: 4978, length: 256, content: 髡笞徙朔方融自刺不殊明遂死於路永興二年封不疑子馬為潁陰侯胤子桃為城父侯冀一門前後七封侯三皇后六貴人二大將軍夫人女食邑稱君者七人尚公主者三人其餘卿將尹校五十七人在位二十餘年窮極滿盛威行內外百僚側目莫敢違命天子恭己而不得有所親豫帝既不平之延熹元年太史令陳授因小黃門徐璜陳災異日食之變咎在大將軍冀聞之諷洛陽令收考授死於獄帝由此發怒初掖庭人鄧香妻宣生女猛香卒宣更適梁紀梁紀者冀妻壽之舅也壽引進猛入掖庭見幸為貴人冀因欲認猛為其女以自固乃易猛姓為梁時猛姊壻邴尊為議郎冀恐尊沮敗宣意乃結刺客於偃城刺殺尊而又欲殺宣宣家在延熹里與, WYG: 半錢半穀注}
