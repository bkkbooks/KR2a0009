  - {type: variant, offset: 1101, length: 11, content: 六月壬申雒陽男子劉倉居, WYG: 與北宫伯玉等反殺䕶羌校尉冷徵金城太守陳懿遂寇亂隴右焉論曰羌戎之患自三代尚矣漢世方之匈奴頗為衰寡而中興以後邊難漸大朝規失綏御之和戎帥騫然諾之信其内屬者或倥􅘓於豪右之手或屈折於奴僕之勤塞候時清則憤怒而思禍桴革暫動則屬鞬以鳥驚桴擊鼓槌也革甲也鞬箭服也左傳晉文公曰右屬櫜鞬鞬音紀言反故永初之間羣種蜂起遂解仇嫌結盟詛招引山豪轉相嘯聚揭木為兵負柴為械榖馬揚埃陸梁於三輔建號稱制恣睢於北地前書班固曰乃始恣睢奮其威詐恣睢肆怒之貌也睢音火季反東犯趙魏之郊南入漢蜀之鄙塞湟中斷隴道燒陵園剽城市傷敗踵係羽書日聞羽書即檄書也魏武奏事曰邊有驚急即挿羽以示急也并凉之士特衝殘斃壯悍則委身於兵場女婦則徽纆而為虜説文曰徽紏繩也纆索也發冢露胔死生塗炭胔音才賜反自西戎作逆未有陵斥}
  - {type: page-break, offset: 1101, content: '', id: KR2a0009_WYG_117-35b, image: WYG0253/WYG0253-0684d.png}
