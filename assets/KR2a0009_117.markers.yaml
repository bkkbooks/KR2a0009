  - {type: variant, offset: 168, length: 3, content: 近射妖, WYG: 獵為事湟水出金城郡臨羌縣爰劒教之田畜遂見敬信廬落種人依之者日益衆羌人謂奴為無弋以爰劒嘗為奴隸故因名之其後世世為豪至爰劒曽孫忍時秦獻公初立欲復穆公之迹穆公霸冇西戎公今欲復之兵臨渭首滅狄䝠戎䝠音丸忍季父卬畏秦之威將其種人附落而南出賜支河曲西數千里與衆羌絶逺不復交通其後子孫分别各自為種任隨所之或為氂牛種越嶲羌是也或為白馬種廣漢羌是也或為參狼種武都羌是也忍及弟舞獨留湟中並多娶妻婦忍生九子為九種舞生十七子為十七種羌之興盛從此起矣及忍子研立時秦孝公雄强威服羌戎孝公使太子駟率戎狄九十二國朝周顯王研至豪健故羌中號其後為研種及秦始皇時務并六國以諸侯為事兵不西行故種人得以繁息秦既兼天下使䝉恬將兵略地西逐諸戎北郤衆狄築長城以界之衆羌不復南度至于漢興匈奴冒頓兵强破東胡走月氐威震百蠻臣服諸羌景帝時研種留何率種人求守隴西塞於是徙留何等於狄道安故至臨洮氐道羌道縣氐音丁兮反五縣並屬隴西郡及武帝征伐四夷開地廣境北郤匈奴西逐諸羌乃度河湟築令居塞令居縣屬金城郡令音零初開河西列置四郡酒泉武威張掖敦煌也通道玉門隔絶羌胡使南北不得交關於是障塞亭燧出長城外數千里時先零羌與封養牢姐種解仇結盟姐音紫與匈奴通合兵十餘萬共攻令居安故遂圍枹䍐安故縣屬隴西郡枹䍐縣屬金城郡枹音鈇漢遣將軍李息郎中令徐自為將兵十萬人擊平之始置䕶羌校尉持節統領焉羌乃去湟中依西海鹽池左右金城郡臨羌縣有鹽池也漢遂因山為塞河西地空稍徙人以實之至宣帝時遣光禄大夫義渠安國義渠姓也覘行諸羌其先零種豪言願得度湟水逐人所不田處以為畜牧安國以事奏聞後將軍趙充國以為不可聽後因緣前言遂度湟水郡縣不能禁至元康三年先零乃與諸羌大共盟誓將欲寇邊帝聞復使安國將兵觀之安國至召先零豪四十餘人斬之因放兵擊其種斬首千餘級於是諸羌怨怒遂寇金城乃遣趙充國與諸將將兵六萬人擊破平之至研十三世孫燒當立元帝時彡姐等七種羌寇隴西彡音先亷反又所亷反姐音紫遣右將軍馮奉世擊破降之從爰劒種五世至研研最豪健自後以研為種號十三世至燒當復豪健其子孫更以燒當為種號自彡姐羌降之後數十年四夷賔服邊塞無事至王莽輔政欲燿威徳以懐逺為名乃令譯諷㫖諸羌使共獻西海之地初開以為郡築五縣邊海亭燧相望焉燧烽也滇良者燒當之𤣥孫也時王莽末四夷内侵及莽敗衆羌遂還據西海為寇更始赤眉之際羌遂放縱寇金城隴西隗囂雖擁兵而不能討之乃就慰納因發其衆與漢相拒建武九年隗囂死司徒掾班彪上言今凉州部皆有降羌羌胡被髮左袵而與漢人雜處習俗既異言語不通數為小吏􅃛人所見侵奪窮恚無聊故致反叛夫蠻夷寇亂皆為此也舊制益州部置蠻夷騎都尉幽州部置領烏桓校尉凉州部置䕶羌校尉皆持節領䕶理其怨結嵗時循行問所疾苦又數遣使譯通動靜使塞外羌夷為吏耳目州郡因此可得儆備今宜復如舊以明威防光武從之即以牛邯為䕶羌校尉持節如舊及邯卒而職省十年先零豪與諸種相結復寇金城隴西遣中郎將來歙等擊之大破事已具歙傳十一年夏先零種復寇臨洮隴西太守馬援破降之後悉歸服徙置天水隴西扶風三郡明年武都參狼羌反援又破降之事已具援傳自燒當至滇良世居河北大允谷種小人貧而先零卑湳並皆强富數侵犯之湳音乃感反滇良父子積見陵易憤怒而素有恩信於種中於是集㑹附落及諸雜種乃從大榆入掩擊先零卑湳大破之殺三千人掠取財畜奪居其地大榆中由是始强滇良子滇吾立中元元年武都參狼羌反殺掠吏人太守與戰不勝隴西太守劉盱遣從事辛都監軍掾李苞將五千人赴武都與羌戰斬其酋豪首虜千餘人時武都兵亦更破之斬首千餘級餘悉降時滇吾附落轉盛常雄諸羌每欲侵邊者滇吾轉教以方畧為其渠帥二年秋燒當羌滇吾與弟滇岸率歩騎五千寇隴西塞劉盱遣兵於枹䍐擊之不能克又戰於允街允音鈆街音階縣名屬金城郡爲羌所敗殺五百餘人於是守塞諸羌皆復相率為寇遣謁者張鴻領諸郡兵擊之戰於允吾唐谷允音鈆吾音牙縣名屬金城郡唐谷故城在今鄯州湟水縣西也軍敗鴻及隴西長史田颯皆没又天水兵為牢姐種所敗於白石死者千餘人白石縣名屬金城郡有白石山時燒何豪有婦人比銅鉗者年百餘嵗多智算為種人所信向皆從取計䇿時為盧水胡所擊比銅鉗乃將其衆來依郡縣種人頗有犯法者臨羌長收繫比銅鉗而誅殺其種六七百人顯宗憐之乃下詔曰昔桓公伐戎而無仁惠故春秋貶曰齊人春秋莊公三十年齊人伐山戎公羊傳曰此齊侯}
