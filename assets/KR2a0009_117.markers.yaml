  - {type: variant, offset: 173, length: 0, content: '', krp: 稱人何貶也何休注曰戎亦天地之所生乃迫殺之惡不仁也今國家無德恩不及遠羸弱何辜而當并命夫長平之暴非帝者之功言帝王好生惡殺故不以為功也史記曰白起昭王時為上將軍擊趙趙不利將軍趙括與六十萬人請降起乃盡坑之遺其小者二百四十人咎由太守長吏妄加殘戮比銅鉗尚生者所在致醫藥養視令招其種人若欲歸故地者厚遣送之其小種若束手自詣欲効功者皆除其罪若有逆謀為吏所捕而獄狀未斷悉以賜有功者永平元年復遣中郎將竇固捕虜將軍馬武等擊滇吾於西邯大破之事已具武等傳滇吾逺引去餘悉散降徙七千口置三輔以謁者竇林領䕶羌校尉居狄道林為諸羌所信而滇岸遂詣林降林為下吏所欺謬奏上滇岸以為大豪承制封為歸義侯加號漢大都尉明年滇吾復降林復奏其第一豪與俱詣闕獻見帝怪一種兩豪疑其非實以事詰林林辭窘窘窮也乃偽對曰滇岸即滇吾隴西語不正耳帝窮驗知之怒而免林官㑹凉州刺史又奏林臧罪遂下獄死謁者郭襄代領校尉事到隴西聞凉州羌盛還詣闕抵罪於是復省校尉官滇吾子東吾立以父降漢乃入居塞内謹愿自守而諸弟迷吾等數為寇盗肅宗建初元年安夷縣吏略妻卑湳種羌婦吏為其夫所殺安夷長宗延追之出塞安夷縣名屬金城郡種人恐見誅遂共殺延而與勒姐及吾良二種相結為寇隴西太守孫純遣從事李睦及金城兵㑹和羅谷與卑湳等戰斬首虜數百人}
  - {type: variant, offset: 174, length: 0, content: '', WYG: 拜故度遼將軍呉棠領䕶羌校尉居安夷二年夏迷吾遂與諸衆聚兵欲叛出塞金城太守郝崇追之戰於荔谷崇兵大敗崇輕騎得脱死者二千餘人於是諸種及屬國盧水胡悉與相應呉棠不能制坐徵免武威太守傅育代為校尉移居臨羌迷吾又與封養種豪布橋等五萬餘人共寇隴西漢陽於是遣行}
