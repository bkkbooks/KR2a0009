  - {type: variant, offset: 257, length: 0, content: '', WYG: 來降戸不滿數千東號子麻奴立初隨父降居安定時諸降羌布在郡縣皆為吏人豪右所徭役積}
  - {type: page-break, offset: 257, content: '', id: KR2a0009_WYG_117-19a, image: WYG0253/WYG0253-0676c.png}
  - {type: variant, offset: 257, length: 0, content: '', krp: 來降戸不滿數千東號子麻奴立初隨父降居安定時諸降羌布在郡縣皆為吏人豪右所徭役積}
  - {type: variant, offset: 258, length: 447, content: 為太子信讒廢之是皇不中故有龍孽是時多用佞媚故以為瑞應明年正月東郡又言黃龍二見濮陽桓帝延熹七年六月壬子河內野王山上有龍死長可數十丈襄楷以為夫龍者為帝王瑞易論大人天鳳中黃山宮有死龍漢兵誅莽而世祖復興此易代之徵也至建安二十五年魏文帝代漢永康元年八月巴郡言黃龍見時吏傅堅以郡欲上言內白事以為走卒戲語不可太守不聽嘗見堅語云時民以天熱欲就池浴見池水濁因戲相恐此中有黃龍語遂行人閒聞郡欲以為美故言時史以書帝紀桓帝時政治衰缺而在所多言瑞應皆此類也又先儒言瑞興非時則為妖孽而民訛言生龍語皆龍孽也熹平元年四月甲午青蛇見御坐上是時靈帝委任宦者王室微弱更始二年二月發雒陽欲入長安司直李松奉引車奔觸北宮鐵柱門三馬皆死馬禍也時更始失道將亡桓帝延熹五年四月驚馬與逸象突入宮殿近馬禍也是時桓帝政衰缺靈帝光和元年司徒長史馮巡馬生人京房易傳曰上亡天子諸侯相伐厥妖馬生人後馮巡遷甘陵相黃巾初起為所殘殺而國家亦四面受敵其後關東州郡各舉義兵卒相攻伐天子西移王政隔塞其占與京房同光和中雒陽水西橋民馬逸走遂齧殺人是時公卿大臣及左右數有被誅者, WYG: 愁怨}
