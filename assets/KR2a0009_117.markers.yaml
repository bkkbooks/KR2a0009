  - {type: variant, offset: 214, length: 0, content: '', krp: 討之五營即五校也雍營即扶風都尉屯也黎陽營解見南匈奴傳也尚屯狄道代屯枹䍐尚遣司馬寇盱監諸郡兵四面並㑹迷唐懼棄老弱奔入臨洮南尚等追至髙山迷唐窮迫率其精强大戰盱斬虜千餘人得牛馬羊萬餘頭迷唐引去漢兵死傷亦多不能復追乃還入塞明年尚代並坐畏懦徵下獄免謁者王信領尚營屯枹䍐謁者耿譚領代營屯白石譚乃設購賞諸種頗來内附迷唐恐乃請降信譚遂受降罷兵遣迷唐詣闕其餘種人不滿二千飢窘不立入居金城和帝令迷唐將其種人還大小榆谷迷唐以為漢作河橋兵來無常故地不可復居辭以種人飢餓不肯遠出呉祉等乃多賜迷唐金帛令糴榖市畜促使出塞種人更懐猜驚十二年遂復背叛乃脇將湟中諸胡寇鈔而去王信耿譚呉祉皆坐徵以酒泉太守周鮪代為校尉明年迷唐復還賜支河曲初累姐種附漢迷唐怨之遂擊殺其酋豪由是與諸種為讎黨援益疎其秋迷唐復將兵向塞周鮪與金城太守侯覇及諸郡兵屬國湟中月氏諸胡隴西牢姐羌合三萬人出塞至允川與迷唐戰周鮪還營自守唯侯覇兵陷陳斬首四百餘級羌衆折傷種人瓦解降者六千餘口分徙漢陽安定隴西迷唐遂弱其種衆不滿千人逺踰賜支河首依發羌居明年周鮪坐畏懦徵侯覇代為校尉安定降羌}
  - {type: variant, offset: 215, length: 2, content: 盡安, WYG: 何種脇諸羌數百人反叛郡兵擊滅之悉没入弱口為奴婢時西海及大小榆谷左右無復羌寇隃麋相曹鳳上言隃麋縣名屬右扶風西戎為害前世所患臣不能紀古且以近事言之自建武以來其犯法者常從燒當種起所以然者以其居大小榆谷土地肥美又近塞内諸種易以為非難以攻伐南得鍾存以廣其衆北阻大河因以為固又有西海魚鹽之利縁山濵水以廣田畜故能彊大常雄諸種恃其權勇招誘羌胡今者衰困黨援壊沮親屬離叛餘勝兵者不過數百逃亡棲竄逺依發羌臣愚以為宜及此時建復西海郡縣規固二榆廣設屯田隔塞羌胡交關之路遏絶狂狡窺欲之源又殖榖富邊省委輸之役國家可以無西方之憂於是拜鳳為金城西部都尉將徙士屯龍耆龍耆即龍支也今鄯州縣後金城長史上官鴻上開置歸義建威屯田二十七部侯覇復上置東西邯屯田五部邯水名邯分流左右在今廓州増留逢二部}
