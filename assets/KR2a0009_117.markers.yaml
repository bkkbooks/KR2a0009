  - {type: variant, offset: 720, length: 0, content: '', WYG: 多奔南度河使北軍中候朱寵將五營士屯孟津詔魏郡趙國常山中山繕作塢候六百一十六所羌既轉盛而二千石令長多内郡人並無戰守意皆爭上徙郡縣以避寇難朝廷從之遂移隴西徙襄武縣名屬隴西郡安定徙美陽縣名屬右扶風北地徙池陽縣名屬左馮翊上郡徙衙縣名屬馮翊衙音牙百姓戀土不樂去舊遂乃刈其禾稼發徹室屋夷營壁破積聚時連旱蝗飢荒而驅䠞劫略流離分散隨道死亡或棄捐老弱或為人僕妾喪其大半復以任尚為侍御史擊衆羌於上黨羊頭山破之羊頭山在上黨郡榖逺縣誘殺降者二百餘人乃罷孟津屯其秋漢陽人杜𤦺及弟季貢同郡王信等與羌通謀聚衆人上邽城𤦺自稱安漢將軍於是詔購募得琦首者封列侯賜錢百萬羌胡斬𤦺者賜金百斤銀二百斤漢陽太守趙博遣刺客杜習刺殺𤦺封習討姦侯賜錢百萬而杜季貢王信等將其衆據樗泉營侍御史唐喜領諸郡兵討破之斬王信等六百餘級没入妻子五百餘人收金銀綵帛一億已上杜季貢亡從滇零六年任尚復坐徵免滇零死子零昌代立年尚幼少同種狼莫為其計策以杜季貢為將軍别居丁奚城七年夏騎都尉馬賢與侯覇掩擊零昌别部牢羌於安定首虜千人得驢騾駱駝馬牛羊二萬餘頭以畀得者畀音必四反元初元年春遣兵屯河内通谷衝要三十三所皆作塢壁設鳴鼓零昌遣兵寇雍城又號多與當煎勒姐大豪共脅諸種分兵鈔掠武都漢中巴郡板楯蠻將兵救之漢中五官掾程信率壯士與蠻共擊破之號多退}
