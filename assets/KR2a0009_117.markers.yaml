  - {type: variant, offset: 1113, length: 0, content: '', WYG: 國若斯其熾也和熹以女君親政威不外接朝議憚兵力之損情存茍安或以邊州難援宜見捐棄或懼疽食浸淫莫知所限謀夫回遑猛士疑慮遂徙}
  - {type: page-break, offset: 1113, content: '', id: KR2a0009_WYG_117-36a, image: WYG0253/WYG0253-0685a.png}
  - {type: variant, offset: 1113, length: 0, content: '', krp: 國若斯其熾也和熹以女君親政威不外接朝議憚兵力之損情存茍安或以邊州難援宜見捐棄或懼疽食浸淫莫知所限謀夫回遑猛士疑慮遂徙}
  - {type: variant, offset: 1114, length: 1, content: 門, WYG: 河四郡之人雜寓關右之縣發屋伐樹塞其戀土之心燔破胔積以防顧還之思於是諸將鄧騭任尚馬賢皇甫規張奐之徒爭設雄規更奉征討之命徵兵㑹衆以圖其隙馳騁東西奔救首尾揺動數州之境日耗千金之資至於假人増賦借奉侯王引金錢縑綵之珍徵糧粟鹽鐵之積所以賂遺購賞轉輸勞來之費前後數十巨萬或梟尅酋健摧破附落降俘載路牛羊滿山軍書未奏其利害而離叛之狀已言矣奏猶上也故得不酬失功不半勞暴露師徒連年而無所勝官人屈竭烈士憤喪叚熲受事專掌軍任資山西之猛性練戎俗之態情窮武思盡飈鋭以事之被羽前登身當百死之陳前書揚雄曰䝉盾負羽也䝉没氷雪經履千折之道始殄西種卒定東寇若乃䧟擊之所殱傷追走之所崩籍頭顱斷落於萬丈之山支革判解於重崖之上不可校計顱音盧廣雅曰顱䫳類也支謂四支革皮也其能穿竄草石自脱於鋒鏃者百不一二而張奐盛稱戎狄一氣所生不宜誅盡流血汙野傷和致妖是何言之迂乎羌雖}
