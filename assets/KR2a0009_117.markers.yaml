  - {type: variant, offset: 7, length: 0, content: '', WYG: 宋宣城太守范煜撰唐章懐太子賢注西羌傳第七十七西羌西羌之本出自三苖姜姓之别也其國近南岳衡山也及舜流四凶徙之三危三危山在今沙州敦煌縣東南山有三峰故曰三危也河關之西南羌地是也河關縣屬金城郡已上並續漢書文濵於賜支至乎河首綿地千里賜支者禹貢所謂析支者也南接蜀漢徼外蠻夷西北鄯善車師諸國所居無常依隨水草地少}
  - {type: page-break, offset: 7, content: '', id: KR2a0009_WYG_117-1b, image: WYG0253/WYG0253-0667b.png}
  - {type: variant, offset: 7, length: 0, content: '', krp: 宋宣城太守范煜撰唐章懐太子賢注西羌傳第七十七西羌西羌之本出自三苖姜姓之别也其國近南岳衡山也及舜流四凶徙之三危三危山在今沙州敦煌縣東南山有三峰故曰三危也河關之西南羌地是也河關縣屬金城郡已上並續漢書文濵於賜支至乎河首綿地千里賜支者禹貢所謂析支者也南接蜀漢徼外蠻夷西北鄯善車師諸國所居無常依隨水草地少}
  - {type: variant, offset: 8, length: 0, content: '', WYG: 榖以産牧為業其俗氏族無定或以父名母姓為種號十二世後相與婚姻父沒則妻後母兄亡則納釐嫂寡婦曰釐力之反故國無鰥寡種類繁熾不立君臣無相長一强則分種為酋豪弱則為人附落更相抄暴以力為雄殺人償死無它禁令其兵長在山谷短於平地不能持久而果於觸突以戰死為吉利病終為不祥堪耐寒苦同之禽獸雖婦人産子亦不避風雪性堅剛勇猛得西方金}
  - {type: page-break, offset: 8, content: '', id: KR2a0009_WYG_117-2a, image: WYG0253/WYG0253-0668a.png}
  - {type: variant, offset: 8, length: 0, content: '', krp: 榖以産牧為業其俗氏族無定或以父名母姓為種號十二世後相與婚姻父沒則妻後母兄亡則納釐嫂寡婦曰釐力之反故國無鰥寡種類繁熾不立君臣無相長一强則分種為酋豪弱則為人附落更相抄暴以力為雄殺人償死無它禁令其兵長在山谷短於平地不能持久而果於觸突以戰死為吉利病終為不祥堪耐寒苦同之禽獸雖婦人産子亦不避風雪性堅剛勇猛得西方金}
  - {type: variant, offset: 9, length: 0, content: '', WYG: 之氣焉黄帝素問曰西方者金玉之域沙石之處其人山居而多風水土剛强王政脩則賔服徳教失則宼亂昔夏后氏太康失國太康夏啟之子盤于游田不恤人事為羿所逐不得反國也四夷背叛及后相即位乃征畎夷后相即太康孫仲康之子七年然後來賔至於后泄始加爵命由是服從泄啟八代孫帝芒之子也后桀之亂畎夷入居邠岐之間邠今豳州也岐即岐州也成湯既興伐而攘之及殷室中衰諸夷皆叛至於武丁征西羌鬼方三年乃克武丁殷王也易曰高宗伐鬼方前書音義曰鬼方逺方也故其詩曰自彼氐羌莫敢不來王殷頌之文及武乙暴虐犬戎寇邊帝武乙即武丁}
  - {type: page-break, offset: 9, content: '', id: KR2a0009_WYG_117-2b, image: WYG0253/WYG0253-0668b.png}
