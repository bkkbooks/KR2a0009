  - {type: variant, offset: 118, length: 0, content: '', WYG: 後二年晉人敗北戎于汾隰二水名戎人滅姜侯之邑明年王征申戎破之後十年幽王命伯士伐六濟之戎軍敗伯士死焉並見竹書紀年其年戎圍犬丘虜秦襄公之兄伯父時幽王昏虐四夷交侵遂廢申后而立襃姒申侯怒與戎宼周殺幽王於酈山周乃東遷洛邑秦襄公攻戎救周後二年邢侯大破北戎及平王之末周遂陵遲戎逼諸夏自隴山}
