  - {type: variant, offset: 716, length: 1, content: 民, krp: 於北地招集武都參狼上郡西河諸雜種衆遂大盛東犯趙魏南入益州殺漢中太守董炳遂寇鈔三輔斷隴道湟中諸縣粟石萬錢百姓死亡不可勝數朝廷不能制而}
  - {type: variant, offset: 718, length: 0, content: '', WYG: 運難劇遂詔騭還師留任尚屯漢陽為諸軍節度朝廷以鄧太后故迎拜騭為大將軍封任尚樂亭侯食邑三百戸三年春復遣騎都尉任仁督諸郡屯兵救三輔仁戰每不利衆羌乘勝漢兵數挫當煎勒姐種攻没破羌縣鍾羌又没臨洮縣生得隴西南部都尉明年春滇零遣人寇襃中縣名屬漢中郡燔燒郵亭大掠百姓於是漢中太守鄭勤移屯襃中軍營久出無功有廢農桑乃詔任尚將吏兵還屯長安罷遣南陽潁川汝南吏士置京兆虎牙都尉於長安扶風都尉於雍如西京三輔都尉故事西京左輔都尉都髙陵右輔都尉都郿也時羌復攻襃中鄭勤欲擊之主簿叚崇諫以為虜乘勝鋒不可當宜堅守待之勤不從出戰大敗死者三千餘人叚崇及門下史王宗原展以身扞刃與勤俱死於是徙金城郡居襄武襄武縣名屬隴西郡任仁戰累敗而兵士放縱檻軍徵詣廷尉詔獄死叚禧病卒復以前校尉侯覇代之遂移居張掖五年春任尚坐無功徵免羌遂入寇河東至河内百姓}
  - {type: page-break, offset: 718, content: '', id: KR2a0009_WYG_117-20b, image: WYG0253/WYG0253-0677b.png}
  - {type: page-break, offset: 718, content: '', id: KR2a0009_WYG_117-21a, image: WYG0253/WYG0253-0677c.png}
