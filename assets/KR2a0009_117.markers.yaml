  - {type: variant, offset: 214, length: 0, content: '', WYG: 討之五營即五校也雍營即扶風都尉屯也黎陽營解見南匈奴傳也尚屯狄道代屯枹䍐尚遣司馬寇盱監諸郡兵四面並㑹迷唐懼棄老弱奔入臨洮南尚等追至髙山迷唐窮迫率其精强大戰盱斬虜千餘人得牛馬羊萬餘頭迷唐引去漢兵死傷亦多不能復追乃還入塞明年尚代並坐畏懦徵下獄免謁者王信領尚營屯枹䍐謁者耿譚領代營屯白石譚乃設購賞諸種頗來内附迷唐恐乃請降信譚遂受降罷兵遣迷唐詣闕其餘種人不滿二千飢窘不立入居金城和帝令迷唐將其種人還大小榆谷迷唐以為漢作河橋兵來無常故地不可復居辭以種人飢餓不肯遠出呉祉等乃多賜迷唐金帛令糴榖市畜促使出塞種人更懐猜驚十二年遂復背叛乃脇將湟中諸胡寇鈔而去王信耿譚呉祉皆坐徵以酒泉太守周鮪代為校尉明年迷唐復還賜支河曲初累姐種附漢迷唐怨之遂擊殺其酋豪由是與諸種為讎黨援益疎其秋迷唐復將兵向塞周鮪與金城太守侯覇及諸郡兵屬國湟中月氏諸胡隴西牢姐羌合三萬人出塞至允川與迷唐戰周鮪還營自守唯侯覇兵陷陳斬首四百餘級羌衆折傷種人瓦解降者六千餘口分徙漢陽安定隴西迷唐遂弱其種衆不滿千人逺踰賜支河首依發羌居明年周鮪坐畏懦徵侯覇代為校尉安定降羌}
