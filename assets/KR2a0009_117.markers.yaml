  - {type: variant, offset: 892, length: 2, content: 男子, WYG: 勝兵合可二十萬人無慮猶都凡也發羌唐旄等絶逺未嘗往來氂牛白馬羌在蜀漢其種别名號皆不可紀知也建武十三年廣漢塞外白馬羗豪樓登等率種人五千餘戸内屬光武封樓登為歸義君長至和帝永元六年蜀郡徼外大牂夷種羌豪造頭等率種人五十餘萬口内屬拜造頭為邑君長賜印綬至安帝永初元年蜀郡徼外羌龍橋等六種萬七千二百八十口内屬明年蜀郡徼外羌薄申等八種三萬六千九百口復舉土内屬冬廣漢塞外參狼種羌二千四百口復來内屬桓帝建和三年白馬羌千餘人寇廣漢屬國殺長吏益州刺史率板楯蠻討破之湟中月氐胡其先大月氐之别也舊在張掖酒泉地月氐}
