  - {type: variant, offset: 724, length: 1, content: 去, krp: 自零昌狼莫死後諸羌瓦解三輔益州無復寇儆自羌叛十餘年間兵連師老不暫寧息軍旅之費轉運委輸用二百四十餘億府帑空竭延及内郡邊民死者不可勝數并凉二州遂至虚耗六年春勒姐種與隴西種羌號良等通謀欲反馬賢逆擊之於安故斬號良及種人數百級皆降散永寧元年春上郡沈氐種羌五千餘人復寇張掖其夏馬賢將萬人擊之初戰失利死者數百人明日復戰破之斬首千八百級獲生口千餘人馬牛羊以萬數餘虜悉降時當煎種大豪飢五等以賢兵在張掖乃乘虚寇金城賢還軍追之出塞斬首數千級而還燒當燒何種聞賢軍還率三千餘人復寇張掖殺長吏初飢五同種大豪盧忽忍良等千餘戸别留允街而首施兩端首施謂首鼠也建光元年春馬賢率兵召盧忽斬之因放兵擊其種人首虜二千餘人掠馬牛羊十萬頭忍良等皆亡出塞璽書封賢安亭侯食邑千戸忍良等以麻奴兄弟本燒當世嫡而賢撫恤不至常有怨心秋遂相結共脅將諸種歩騎三千人寇湟中攻金城諸縣賢將先零種赴擊之戰於牧苑兵敗死者四百餘人麻奴等又敗武威張掖郡兵於令居因脅將先零沈氐諸種四千餘戸緣山西走寇武威賢追到鸞鳥招引之鸞鳥縣名屬武威郡鸞音爵諸種降者數千麻奴南還湟中延光元年春賢追到湟中麻奴出塞度河賢復追擊戰破之種衆散遁詣凉州刺史宗漢降麻奴等孤弱飢困其年冬將種衆三千餘戸詣漢陽太守耿种降安帝假金印紫綬賜金銀綵繒各有差是嵗䖍人種羌與上郡胡反攻榖羅城度遼將軍耿䕫將諸郡兵及烏桓騎赴擊破之三年秋隴西郡始還狄道焉麻奴弟犀苦立順帝永建元年隴西鍾羌反校尉馬賢將七千餘人擊之戰於臨洮斬首千餘級皆率種人降進封賢都鄉侯自是凉州無事至四年尚書僕射虞詡上疏曰臣聞子孫以奉祖為孝君上以安民為明此髙宗周宣所以上配湯武也禹貢雍州之域厥田惟上且沃野千里榖稼殷積又有龜兹鹽池以為民利上郡龜兹縣有鹽官即雍州之域也水草豐美土宜産牧牛馬銜尾羣羊塞道北阻山河乘阸據險因渠以溉水舂河漕水舂即水碓也用功省少而軍糧饒足故孝武皇帝及光武築朔方開西河置上郡皆為此也而遭元元無妄之灾衆羌内潰前書音義曰無妄者無所望也萬物無所望於天灾異之大也郡縣兵荒二十餘年夫棄沃壤之饒損自然之財不可謂利離河山之阻守無險之處難以為固今三郡未復園陵單外園陵謂長安諸陵園也單外謂無守固而公卿選懦容頭過身前書音義選懦柔怯也懦音而掾反張解設難但計所費不圖其安宜開聖徳考行所長書奏帝乃復三郡使謁者郭璜督促徙者各歸舊縣繕城郭置候驛既而激河浚渠為屯田省内郡費嵗一億計遂令安定北地上郡及隴西金城常儲榖粟令周數年馬賢以犀苦兄弟數背叛因繫質於令居其冬賢坐徵免右扶風韓皓代為校尉明年犀苦詣皓自言求歸故地皓復不遣因轉湟中屯田置兩河間以逼羣羌皓復坐徵張掖太守馬續代為校尉兩河間羌以屯田近之恐必見圖乃解仇詛盟各自儆備續欲先示恩信乃上移屯田還湟中羌意乃安至陽嘉元年以湟中地廣更増置屯田五部并為十部二年夏復置隴西南部都尉如舊制前書南部都尉都隴西郡臨洮縣三年鍾羌良封等復寇隴西漢陽詔拜前校尉馬賢為謁者鎮撫諸種馬續遣兵擊良封斬首數百級四年馬賢亦發隴西吏士及羌胡兵擊殺良封斬首千八百級獲馬牛羊五萬餘頭良封親屬並詣賢降賢復進擊種羗且昌且昌等率諸種十餘萬詣涼州刺史降永和元年馬續遷度遼將軍復以馬賢代為校尉初武都塞上白馬羌攻破屯官反叛連年二年春廣漢屬國都尉擊破之斬首六百餘級馬賢又擊斬其渠帥飢指累祖等三百級於是隴右復平明年冬燒當種那離等三千餘騎寇金城塞馬賢將兵赴擊斬首四百餘級獲馬千四百匹那離等復西招羌胡殺傷吏民四年馬賢將湟中義從兵及羌胡萬餘騎掩擊那離等斬之獲首虜千二百餘級得馬騾羊十萬餘頭徵賢為𢎞農太守以來機為并州刺史劉秉為凉州刺史並當之職大將軍梁商謂機等曰戎狄荒服蠻夷要服荒服在九州之外也言其荒忽無常要服在九州之内侯衛之外言以文徳要來之言其荒忽無常而統領之道亦無常法臨事制宜略依其俗今三君素性疾惡劉攽曰三君案時與二人語何縁得三明是二字欲分明白黑孔子曰人而不仁疾之已甚亂也論語文也鄭𤣥注云不仁之人當以風化之疾之已甚是又使之為亂行况戎狄乎其務安羌胡防其大故忍其小過機等天性虐刻遂不能從虐或作庸庸薄也到州之日多所擾發五年夏且凍傅難種羌等遂反叛攻金城與西塞及湟中雜種羌胡大寇三輔殺害長吏機秉並坐徵於是發京師近郡及諸州兵討之拜馬賢為征西將軍以騎都尉耿叔副將左右羽林五校士及諸州郡兵十萬人屯漢陽又於扶風漢陽隴道作塢壁三百所置屯兵以保聚百姓且凍分遣種人寇武都燒隴關掠苑馬六年春馬賢將五六千騎擊之到射姑山射音夜賢軍敗賢及二子皆戰殁順帝愍之賜布三千匹榖千斛封賢孫光為舞陽亭侯租入嵗百萬遣侍御史督録征西營兵存恤死傷於是東西羌遂大合鞏唐種三千餘騎寇隴西又燒園陵掠關中殺傷長吏郃陽令任頵追擊戰死郃陽同州縣也頵音於筠反遣中郎將龎浚募勇士千五百人頓美陽為凉州援武威太守趙冲追擊鞏唐羌斬首四百餘級得馬牛羊驢萬八千餘頭羌二千餘人降詔冲督河西四郡兵為節度罕種羌千餘寇北地北地太守賈福與趙冲擊之不利秋諸種八九千騎寇武威涼部震恐於是復徙安定居扶風北地居馮翊遣行車騎將軍執金吾張喬將左右羽林五校士及河内南陽汝南兵萬五千屯三輔漢安元年以趙冲為䕶羌校尉冲招懐叛羌罕種乃率邑落五千餘戸詣冲降於是罷張喬軍屯唯燒何種三千餘落據參􅒋北界參䜌縣名屬安定郡䜌音力全反三年夏趙冲與漢陽太守張貢掩擊之斬首千五百級得牛羊驢十八萬頭冬冲擊諸種斬首四千餘級詔冲一子為郎冲復追擊於阿陽斬首八百級阿陽縣屬漢陽郡於是諸種前後三萬餘戸詣凉州刺史降建康元年春䕶羌從事馬𤣥遂為諸羌所誘將羌衆亡出塞領䕶羌校尉衛瑤追擊𤣥等斬首八百餘級得牛馬羊二十餘萬頭趙冲復追叛羌到建威鸇隂河續漢書建威作武威鸇隂縣名屬安定郡軍渡未竟所將降胡六百餘人叛走冲將數百人追之遇羌伏兵與戰殁冲雖身死而前後多所斬獲羌由是衰耗永嘉元年封冲子愷義陽亭侯以漢陽太守張貢代為校尉左馮翊梁並稍以恩信招誘之於是離湳狐奴等五萬餘戸詣並降隴右復平並大將軍冀之宗人封為鄠侯邑二千戸自永和羌叛至乎是嵗十餘年間費用八十餘億諸將多斷盗牢禀私自潤入前書音義曰牢價直皆以珍寳貨賂左右上下放縱不恤軍事士卒不得其死者白骨相望於野桓帝建和二年白馬羌寇廣漢屬國殺長吏是時西羌及湟中胡復畔為寇益州刺史率板楯蠻討破之斬首招降二十萬人永夀元年校尉張貢卒以前南陽太守第五訪代為校尉甚有威恵西垂無事延熹二年訪卒以中郎將叚熲代為校尉時燒當八種寇隴右熲擊大破之四年零吾復與先零及上郡沈氐牢姐諸種并力寇并凉及三輔㑹叚熲坐事徵以濟南相胡閎代為校尉閎無威略羌遂陸梁覆没營塢寇患轉盛中郎將皇甫規擊破之五年沈氐諸種復寇張掖酒泉皇甫規招之皆降事已具規傳鳥吾種復寇漢陽隴西金城諸郡兵共擊破之各還降附至冬滇那等五六千人復攻武威張掖酒泉燒民}
