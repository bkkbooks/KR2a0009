  - {type: variant, offset: 711, length: 4, content: 十一月戊, WYG: 夏遣騎都尉王𢎞發金城隴西漢陽羌數百千騎征西域𢎞迫促發遣羣羌懼逺屯不還行到酒泉多有散叛諸郡各發兵徼遮或覆其廬落於是勒姐當煎大豪東岸等愈驚遂同時奔潰麻奴兄弟因此遂與種人俱西出塞先零别種滇零與鍾羌諸種大為寇掠斷隴道時羌歸附既久無復器甲或持竹竿木枝以代戈矛或負板案以為楯或執銅鏡以象兵郡縣畏懦不能制冬遣車騎將軍鄧騭征西校尉任尚副將五營及三河三輔汝南南陽潁川太原上黨兵合五萬人屯漢陽明年春諸郡兵未及至鍾羌數千人先擊敗騭軍於冀西殺千餘人校尉侯覇坐衆羌反叛徵免以西域都䕶叚禧代為校尉其冬騭使任尚及從事中郎司馬鈞率諸郡兵與滇零等數萬人戰於平襄縣名屬漢陽郡尚軍大敗死者八千餘人於是滇零等自稱天}
