  - {type: variant, offset: 121, length: 0, content: '', WYG: 秦師于洛後四年義渠國亂秦惠王遣庶長操將兵定之操名也庶長秦爵也事見左傳義渠遂臣於秦後八年秦伐義渠取郁郅縣名屬北地郡後二年義渠敗秦師于李伯李伯地名未詳明年秦伐義渠取徒涇二十五城徒涇縣名屬西河郡及昭王立義渠王朝秦遂與昭王母宣太后通生二子至赧王四十三年宣太后誘殺義渠王於甘泉宫因起兵滅之始置隴西北地上郡焉戎本無君長夏后氏末及商周之際或從侯伯征伐有功天子爵之以}
