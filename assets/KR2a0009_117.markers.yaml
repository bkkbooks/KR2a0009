  - {type: variant, offset: 1116, length: 8, content: 妻生男兩頭共身靈, WYG: 患實深内疾若攻之不根是養疾痾於心腹也根謂盡其根本惜哉寇敵略定矣而漢祚亦衰焉嗚呼昔先王疆理九土判别畿荒知夷貊殊性難以道御故斥逺諸華薄其貢職唯與辭要而已若二漢御戎之方失其本矣何則先零侵境趙充國遷之内地宣}
