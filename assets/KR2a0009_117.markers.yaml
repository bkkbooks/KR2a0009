  - {type: variant, offset: 11, length: 6, content: 妖龍蛇孽馬禍, WYG: 之命曰射天遂被雷震而死周古公踰梁山而避于岐下梁山在今雍州好畤縣西北古公文王之祖也岐山在扶風郡也及子季厯遂伐西落鬼戎竹書紀年武乙三十五年周王季伐西落鬼戎俘二十翟王也太丁之時季厯復伐燕京之戎戎}
