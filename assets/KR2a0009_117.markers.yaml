  - {type: variant, offset: 204, length: 0, content: '', WYG: 走因譯使欲降紆納之遂將衆人詣臨羌縣紆設兵大㑹施毒酒中羌飲醉紆因自擊伏兵起劉攽曰案文當云自擊鼔起伏兵誅殺酋豪八百餘人斬迷吾等五人頭以祭育冢復放兵擊在山谷間者斬首四百餘人得生口二千餘人迷吾子迷唐及其種人向塞號哭與燒何當煎當闐等相結以子女及金銀聘納諸種解仇交質將五千人寇隴西塞太守寇盱與戰於白石迷唐不利引還大小榆谷北招屬國諸胡㑹集附落種衆熾盛張紆不能討永元元年紆坐徵以張掖太守鄧訓代為校尉稍以賞賂離間之由是諸種少解東吾子東號立是時號吾將其種人降校尉鄧訓遣兵擊迷唐迷唐去大小榆谷徙居頗巖谷和帝永元四年訓病卒蜀郡太守聶尚代為校尉尚見前人累征不克欲以文徳服之乃遣譯使招呼迷唐使還居大小榆谷迷唐既還遣祖母卑缺詣尚尚自送至塞下為設祖道令譯田汜等五人䕶送至廬落迷唐因而反叛遂與諸種共生屠裂汜等以血盟詛復寇金城塞五年尚坐徵免居延都尉貫友代為校尉友以迷唐難用徳懐終於叛亂乃遣譯使搆離諸種誘以財貨由是解散友乃遣兵出塞攻迷唐於大小榆谷獲首虜八百餘人收麥數萬斛遂夾逢留大河築城塢作大航造河橋欲度兵擊迷唐迷唐乃率部落逺依賜支河曲至八年友病卒漢陽太守史充代為校尉充至遂發湟中羌胡出塞擊迷唐而羌迎敗充兵}
