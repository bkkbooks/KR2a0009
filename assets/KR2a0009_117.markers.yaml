  - {type: variant, offset: 721, length: 0, content: '', krp: 還斷隴道與零昌通謀侯覇馬賢將湟中吏人及降羌胡於枹䍐擊之斬首二百餘級凉州刺史皮楊擊羌於狄道大敗死者八百餘人楊坐徵免侯覇病卒漢陽太守龎參代為校尉參以恩信招誘之二年春號多等率衆七千餘人詣參降遣詣闕賜號多侯印綬遣之參始還居令居通河西道而零昌種衆復分寇益州遣中郎將尹就將南陽兵因發益部諸郡屯兵擊零昌黨吕叔都等至秋蜀人陳省羅横應募刺殺叔都皆封侯賜錢又使屯騎校尉班雄屯三輔遣左馮翊司馬鈞行征西將軍督右扶風仲光安定太守杜恢北地太守盛包京兆虎牙都尉耿溥右扶風都尉皇甫旗等合八千餘人又龎參將羌胡兵七千餘人與鈞分道並北擊零昌參兵至勇士東為杜季貢所敗勇士縣名屬天水郡於是引退鈞等獨進攻拔丁奚城大克獲杜季貢率衆偽逃鈞令光恢包等收羌禾稼光等違鈞節度散兵深入羌乃設伏要擊之鈞在城中怒而不救光並没死者三千餘人鈞乃遁還坐徵自殺參以失期軍敗抵罪以馬賢代領校尉事後遣任尚為中郎將將羽林緹騎五營子弟三千五百人代班雄屯三輔尚臨行懐令虞詡説尚曰使君頻奉國命討逐寇賊三州屯兵二十餘萬人}
  - {type: variant, offset: 722, length: 1, content: 什, WYG: 農桑疲苦徭役而未有功効勞費日滋若此出不克誠為使君危之尚曰憂惶久矣不知所如詡曰兵法弱不攻强走不逐飛自然之勢也今虜皆馬騎日行數百來如風雨去如絶弦以歩追之勢不相及所以曠而無功也為使君計者莫如罷諸郡兵各令出錢數千二十人共市一馬如此可捨甲胄馳輕兵以萬騎之衆逐數千之虜追尾掩截尾猶尋也其道自窮便人利事大功立矣尚大喜即上言用其計乃遣輕騎鈔擊杜季貢於丁奚城斬首四百餘級獲牛馬羊數千頭明年夏度遼將軍鄧遵率南單于及左鹿蠡王須沈萬騎擊零昌於靈州縣名屬北地郡斬首八百餘級封須沈為破虜侯金印紫綬賜金帛各有差任尚遣兵擊破先零羌於丁奚城秋築馮翊北界候塢五百所任尚又遣假司馬募陷陳士擊零昌於北地殺其妻子得牛馬羊二萬頭燒其廬落斬首七百餘級得僭號文書及所没諸將印綬四年春尚遣當闐種羌榆鬼等五人刺殺杜季貢封榆鬼為破羌侯其夏尹就以不能定益州坐徵抵罪以益州刺史張喬領尹就軍屯招誘叛羌稍稍降散秋任尚復募効功種號封刺殺零昌封號封為羌王冬任尚將諸郡兵與馬賢並進北地擊狼莫賢先至安定青石岸狼莫逆擊敗之㑹尚兵到髙平縣名屬安定郡因合勢俱進狼莫等引退乃轉營迫之至北地相持六十餘日戰於富平河上大破之富平縣屬北地郡斬首五千級還得所掠人男女千餘人牛馬驢羊駱駝十餘萬頭狼莫逃走於是西河䖍人種羌萬一千口詣鄧遵降五年鄧遵募上部全無種羌雕何等刺殺狼莫賜雕何為羌侯封遵武陽侯三千戸遵以太后從弟故爵封優大任尚與遵爭功又詐増首級受賕枉法臧千萬已上檻車徴弃市没入田廬奴婢財}
