  - {type: variant, offset: 118, length: 0, content: '', krp: 後二年晉人敗北戎于汾隰二水名戎人滅姜侯之邑明年王征申戎破之後十年幽王命伯士伐六濟之戎軍敗伯士死焉並見竹書紀年其年戎圍犬丘虜秦襄公之兄伯父時幽王昏虐四夷交侵遂廢申后而立襃姒申侯怒與戎宼周殺幽王於酈山周乃東遷洛邑秦襄公攻戎救周後二年邢侯大破北戎及平王之末周遂陵遲戎逼諸夏自隴山}
  - {type: variant, offset: 119, length: 0, content: '', WYG: 東及乎伊洛往往有戎於是渭首有狄䝠邽冀之戎狄即狄道䝠即䝠道邽即上邽縣冀即冀縣也涇北有義渠之戎義渠縣屬北地郡也洛川有大荔之戎洛川即洛水大荔古戎國秦獲之改曰臨晉今同州城是也渭南有驪戎伊洛間有楊拒泉臯之戎杜預注左傳云楊拒戎邑也潁首以西有蠻氏之戎左傳曰單浮餘國蠻氏杜預注云梁南有霍陽山皆蠻子之邑當春秋時間在中國與諸夏盟㑹魯莊公伐秦取邽冀之戎後十餘嵗晉滅驪戎是時伊洛戎强東侵曹魯左傳莊公十八年公追戎于濟西杜預注戎侵魯魯人不知去乃追之二十四年戎侵曹也後十九年遂入王城於是秦晉伐戎以救周事並見左傳僖公十一年後二年又宼京師齊桓公徵諸侯戍周後九年陸渾戎}
  - {type: page-break, offset: 119, content: '', id: KR2a0009_WYG_117-4b, image: WYG0253/WYG0253-0669b.png}
  - {type: variant, offset: 119, length: 0, content: '', krp: 東及乎伊洛往往有戎於是渭首有狄䝠邽冀之戎狄即狄道䝠即䝠道邽即上邽縣冀即冀縣也涇北有義渠之戎義渠縣屬北地郡也洛川有大荔之戎洛川即洛水大荔古戎國秦獲之改曰臨晉今同州城是也渭南有驪戎伊洛間有楊拒泉臯之戎杜預注左傳云楊拒戎邑也潁首以西有蠻氏之戎左傳曰單浮餘國蠻氏杜預注云梁南有霍陽山皆蠻子之邑當春秋時間在中國與諸夏盟㑹魯莊公伐秦取邽冀之戎後十餘嵗晉滅驪戎是時伊洛戎强東侵曹魯左傳莊公十八年公追戎于濟西杜預注戎侵魯魯人不知去乃追之二十四年戎侵曹也後十九年遂入王城於是秦晉伐戎以救周事並見左傳僖公十一年後二年又宼京師齊桓公徵諸侯戍周後九年陸渾戎}
  - {type: variant, offset: 120, length: 0, content: '', WYG: 瓜州遷于伊川瓜州今瓜州也事見僖公二十二年允姓戎遷于渭汭允姓隂戎之祖與三苖俱放三危見左傳東及轘轅在河南山北者號曰隂戎隂戎之種遂以滋廣左傳哀公四年蠻子赤奔晉隂地杜預注曰隂地河南山北自上雒以東至陸渾晉文公欲脩霸業乃賂戎狄通道以匡王室秦穆公得戎人由余遂霸西戎開地千里由余其先晉人也亡入戎戎王聞穆公賢使由余觀秦秦穆公以客禮待之秦遺戎王以女樂由余諫不聽由余乃降秦為謀伐戎及晉悼公又使魏絳和諸戎復脩霸業魏絳晉大夫見左傳襄公十三年是時楚晉强盛威服諸戎陸渾伊洛隂戎事晉而蠻氏從楚後陸渾叛晉晉令荀呉滅之荀呉晉大夫中行穆子也見左傳昭公元年後四十四年楚執蠻氏而盡囚其人是時義渠大荔最强築城數十皆自稱王至周貞王八年秦厲公滅大荔取其地趙亦滅代戎即北戎也韓魏復共稍并伊洛隂戎滅之其遺脱者皆逃走西踰汧隴汧山隴山之間也在今隴州汧源縣自是中國無戎寇唯餘義渠種焉至貞王二十五年秦伐義渠虜其王即厲公二十三年伐也後十四年義渠侵秦至渭隂後百許年義渠}
  - {type: page-break, offset: 120, content: '', id: KR2a0009_WYG_117-5a, image: WYG0253/WYG0253-0669c.png}
