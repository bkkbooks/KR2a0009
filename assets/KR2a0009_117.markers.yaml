  - {type: variant, offset: 1481, length: 3, content: 比無德, WYG: 東遷也大夫辛有適伊川見被髪而祭於野者曰不及百年此其戎乎後秦遷陸渾戎于伊川言中國之地不宜徙戎狄居之後將為患也贊曰金行氣剛播生西羌氐豪分種遂用殷彊䖍劉隴北假僣涇陽涇陽縣屬安定郡朝勞内謀兵憊外攘憊疾亟也音自拜反後漢書卷一百十七後漢書卷一百十七考證西羌傳至於武丁征西羌鬼方三年乃克故其詩曰自彼氐羌莫敢不來王臣徳潛按商頌殷武之詩祀髙宗之樂也首章叙其伐荆楚功二章言昔有成湯自彼氐羌云云蓋舉成湯時逺夷慕化}
