  - {type: variant, offset: 721, length: 0, content: '', WYG: 還斷隴道與零昌通謀侯覇馬賢將湟中吏人及降羌胡於枹䍐擊之斬首二百餘級凉州刺史皮楊擊羌於狄道大敗死者八百餘人楊坐徵免侯覇病卒漢陽太守龎參代為校尉參以恩信招誘之二年春號多等率衆七千餘人詣參降遣詣闕賜號多侯印綬遣之參始還居令居通河西道而零昌種衆復分寇益州遣中郎將尹就將南陽兵因發益部諸郡屯兵擊零昌黨吕叔都等至秋蜀人陳省羅横應募刺殺叔都皆封侯賜錢又使屯騎校尉班雄屯三輔遣左馮翊司馬鈞行征西將軍督右扶風仲光安定太守杜恢北地太守盛包京兆虎牙都尉耿溥右扶風都尉皇甫旗等合八千餘人又龎參將羌胡兵七千餘人與鈞分道並北擊零昌參兵至勇士東為杜季貢所敗勇士縣名屬天水郡於是引退鈞等獨進攻拔丁奚城大克獲杜季貢率衆偽逃鈞令光恢包等收羌禾稼光等違鈞節度散兵深入羌乃設伏要擊之鈞在城中怒而不救光並没死者三千餘人鈞乃遁還坐徵自殺參以失期軍敗抵罪以馬賢代領校尉事後遣任尚為中郎將將羽林緹騎五營子弟三千五百人代班雄屯三輔尚臨行懐令虞詡説尚曰使君頻奉國命討逐寇賊三州屯兵二十餘萬人}
