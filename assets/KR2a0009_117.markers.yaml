  - {type: variant, offset: 181, length: 2, content: 兄大, WYG: 弟號吾諸雜種反畔秋號吾先輕入寇隴西界郡督􅇏掾李章追之生得號吾將詣郡號吾曰獨殺我無損於羌誠得生歸必悉罷兵不復犯塞隴西太守張紆權宜放遣羌即為解散各歸故地迷吾退居河北歸義城𫝊育不欲失信伐之乃募人鬬諸羌胡羌胡不肯遂復叛出塞更依迷吾章和元年育上請發隴西張掖酒泉各五千人諸郡太守將之育自領漢陽金城五千人合二萬兵與諸郡剋期擊之令隴西兵據河南張掖酒泉兵遮其西並未及㑹育軍獨進迷吾聞之徙廬落去育選精騎三千窮追之夜至建威南三兠谷去虜數里須旦擊之不設備迷吾乃伏兵三百人夜突育營營中驚壊散走育下馬手戰殺十餘人而死死者八百八十人及諸郡兵到羌遂引去育北地人也顯宗初為臨羌長與捕虜}
