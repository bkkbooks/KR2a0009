  - {type: variant, offset: 716, length: 1, content: 民, WYG: 於北地招集武都參狼上郡西河諸雜種衆遂大盛東犯趙魏南入益州殺漢中太守董炳遂寇鈔三輔斷隴道湟中諸縣粟石萬錢百姓死亡不可勝數朝廷不能制而}
