  - {type: variant, offset: 1215, length: 0, content: '', WYG: 匈奴種羌並擅其地是為癰疽伏疾留滯脅下如不加誅轉就滋大今若以騎五千歩萬人車三千兩三冬二夏足以破定無慮用費為錢五十四億無慮都凡也如此則可令羣羌破盡匈奴長服内徙郡縣得反本土伏計永初中諸羌反叛十有四年用二百四十億永和之末復經七年用八十餘億費耗若此猶不誅盡餘孽復起于兹作害今不暫疲人則永寜無期臣庶竭駑劣伏待節度帝許之悉聽如所上建寜元年春熲將兵萬餘人齎十五日糧從彭陽直指髙平彭陽髙平並縣名屬安定郡彭陽縣即今原州彭原縣也髙平縣今原州也與先零諸種戰於逢義山虜兵盛熲衆恐熲乃令軍中張鏃劉攽曰案文鏃非可張未知何字利刃長矛三重挾以强弩列輕騎為左右翼激怒兵將曰今去家數千里進則事成走必盡死努力共功名因大呼衆皆應聲騰赴熲馳騎於傍突而撃之虜衆大潰斬首八千餘級獲牛馬羊二十八萬頭時竇太后臨朝下詔曰先零}
  - {type: page-break, offset: 1215, content: '', id: KR2a0009_WYG_095-22a, image: WYG0253/WYG0253-0342a.png}
  - {type: variant, offset: 1215, length: 0, content: '', krp: 匈奴種羌並擅其地是為癰疽伏疾留滯脅下如不加誅轉就滋大今若以騎五千歩萬人車三千兩三冬二夏足以破定無慮用費為錢五十四億無慮都凡也如此則可令羣羌破盡匈奴長服内徙郡縣得反本土伏計永初中諸羌反叛十有四年用二百四十億永和之末復經七年用八十餘億費耗若此猶不誅盡餘孽復起于兹作害今不暫疲人則永寜無期臣庶竭駑劣伏待節度帝許之悉聽如所上建寜元年春熲將兵萬餘人齎十五日糧從彭陽直指髙平彭陽髙平並縣名屬安定郡彭陽縣即今原州彭原縣也髙平縣今原州也與先零諸種戰於逢義山虜兵盛熲衆恐熲乃令軍中張鏃劉攽曰案文鏃非可張未知何字利刃長矛三重挾以强弩列輕騎為左右翼激怒兵將曰今去家數千里進則事成走必盡死努力共功名因大呼衆皆應聲騰赴熲馳騎於傍突而撃之虜衆大潰斬首八千餘級獲牛馬羊二十八萬頭時竇太后臨朝下詔曰先零}
  - {type: variant, offset: 1216, length: 1, content: 濱, WYG: 羌歴載為患熲前陳狀欲必掃滅渉履霜雪兼行晨夜身當矢石感厲吏士曾未浹日凶醜奔破浹匝也浹音子牒反謂匝十二辰也連尸積俘掠獲無算洗雪百年之逋負以慰忠將之亡魂東觀記曰太后詔云此以慰种光馬賢等亡魂也功用顯著朕甚嘉之湏東羌盡定當并録功勤今且賜熲錢二十萬以家一人為郎中勑中藏府調金錢綵物增助軍費拜熲破羌將軍夏熲復追羌出橋門至走馬水上東觀記段熲傳曰出橋門谷也尋聞虜在奢延澤即上郡奢延縣界也乃將輕兵兼行一日一夜二百餘里晨及賊擊破之餘虜走向落川復相屯結熲乃分遣騎司馬田晏將五千人出其東假司馬夏育將二千人繞其西羌分六七千人攻圍晏等晏等與戰羌潰走熲急進與晏等共追之於令鮮水上令鮮水名在今甘州張掖縣界一名合黎水一名羌谷水也熲士卒饑渴乃勒衆推方奪其水推方謂方頭競進也虜復散走熲遂與相連綴且鬬且引及於靈武谷靈武縣名有谷在今靈州懐逺縣西北熲乃被甲先登士卒無敢後者羌遂}
