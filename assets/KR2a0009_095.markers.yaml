  - {type: variant, offset: 1135, length: 0, content: '', WYG: 秋叛羌零吾等與先零别種寇鈔關中護羌校尉段熲坐徴熲擊羌坐為凉州刺史郭閎留兵不進下獄後先零諸種陸梁覆沒營塢説文曰塢小障也一曰庳城也音烏古反規素悉羌事志自奮効乃上疏曰自臣受任志竭愚鈍實頼兖州刺史牽顥之清猛中郎將宗資之信義得承節度幸無咎譽今猾賊就滅太山畧平復聞羣羌並皆反逆臣生長邠岐年五十有九昔為郡吏再更叛羌預籌其事有誤中之言臣素有固疾恐犬馬齒窮不報大恩願乞冗官備單車一介之使勞來三輔宣國威澤以所習地形兵埶佐助諸軍臣窮居孤危之中坐觀郡將已數十年矣自鳥鼠至於東岱其病一也郡將郡守也鳥鼠山名在今渭西即先零羌寇鈔處也東岱謂泰山叔孫無忌反處也皆由郡守不加綏撫致使反叛其疾同也力求猛敵不如清平勤明吳孫未若奉法吳起魏將也孫武吳將也言若求猛將不如撫以清平之政明習兵書不如郡守奉法使之無反也前變未逺臣誠戚之戚憂也前變謂羌反是以越職盡其區區至冬𦍑遂大合朝廷為憂三公舉規為中郎將持節監關西兵討零吾等破之斬首八百級先零諸種羌慕規威信相勸降者十餘萬明年規因發其騎共討隴右而道路隔絶軍中大疫死者十三四規親入菴盧巡視将士三軍咸悦東羌遂}
