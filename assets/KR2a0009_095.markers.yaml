  - {type: variant, offset: 1153, length: 5, content: 寇玄菟玄菟, WYG: 三州清定論功當封奐不事宦官故賞遂不行唯賜錢二十萬除家一人為郎並辭不受而願徙屬𢎞農華隂舊制邊人不得内移唯奐因功特聽故始為𢎞農人焉建寜元年振旅而還時竇太后臨朝大將軍竇武與太傅陳蕃謀誅宦官事泄中常侍曹節等於中作亂以奐新徴不知本謀矯制使奐與少府周靖率五營士圍武武自殺蕃因見害奐遷少府又拜大司農以功封侯奐深病為節所賣上書固讓封還印綬卒不肯當明年夏青蛇見於御坐軒前軒殿楹䦨板也又大風雨雹霹靂拔樹詔使百寮各言災應奐上疏曰臣聞風為號令動物通氣翼氏風角曰凡風者天之號令所以譴告人君者也木生於火相須乃明蛇能屈申配龍騰蟄易曰龍蛇之蟄以存身也愼子曰騰蛇游霧飛龍乘雲雲罷霧散與蚯蚓同也順至為休徴逆來為殃咎隂氣專用則凝精為雹故大將軍竇武太傅陳蕃或志寜社稷或方直不回前以䜛勝並伏誅戮海内黙黙人懐震憤昔周公葬不如禮天乃動威尚書大傳周公薨成王欲葬之於成周天乃雷電以風禾即盡偃大木斯拔國人大恐王葬周公於畢示不敢臣也今武蕃忠貞未被明宥妖𤯝之来皆為此也宜急為改葬徙還家屬其從坐禁錮一切蠲除又皇太后雖居南宫而恩禮不接朝臣莫言逺近失望宜思大義顧復之報顧旋視也復反覆也小雅曰父兮生我母兮鞠我顧我復我出入腹我天子深納奐言以問諸黄門常侍左右皆惡之帝不得自從轉奐太常與尚書劉猛刁韙衞良同薦王暢李膺可參三公之選而曹節等彌疾其言遂下詔切責之奐等皆自囚廷尉數日乃得出並以三月俸贖罪司𨽻校尉王寓出於宦官欲借寵公卿以求薦舉百僚畏憚莫不許諾唯奐獨拒之寓怒因此遂陷以黨罪禁錮歸田里奐前為度遼將軍與叚熲爭撃羌不相平及熲為司𨽻校尉欲逐奐歸敦煌將害之奐憂懼奏記謝熲曰小人不明得過州將千里委命以情相歸漢官儀曰司𨽻州部河南雒陽管三輔三河𢎞農七郡所以奐屈於熲稱曰州將焉足下仁篤照其辛苦使人未反復獲郵書恩詔分明前以寫白而州期切促郡縣惶懼屏營延企側待歸命父母朽骨孤魂相託若䝉矜憐壹惠咳唾則澤流黄泉施及冥寞非奐生死所能報塞夫無毛髮之勞而欲求人丘山之用此淳于髠所以拍髀仰天而笑者也拍音片百反髀音歩弟反史記楚發兵伐齊齊威王使淳于髠齎百金車馬十駟之趙請救髠仰天大笑冠纓索絶王曰先生少之乎髠曰今者臣從東方來見道傍有禳田者操一豚蹏酒一盂而祝曰甌婁滿篝汙邪滿車五穀蕃熟穰穰滿家臣見其所持者狹所求者奢故笑於是王乃益黄金千鎰白璧十䨇車馬百駟也誠知言必見譏然猶未能無望何者朽骨無益於人而文王葬之新序曰文王作靈臺掘得死人骨吏以聞文王曰葬之吏曰此無主矣文王曰有天下者天下之主也有一國者一國之主也寡人固其主焉令吏以棺葬之天下聞之曰文王賢矣凙及朽骨又况人乎死馬無所復用而燕昭寳之新序曰燕昭王即位卑身求賢謂郭隗曰齊因孤國之亂而襲燕欲得賢士與共國以雪先王之醜孤之願也先生視可者得身事之隗曰臣聞古之人君有以千金求千里馬者三年不得涓人言於君請求之君遣焉三月得千里馬馬已死乃以五百金買其首以報君大怒曰所求者生馬安市死馬而捐五百金乎對曰死馬且市之况生馬乎天下必以王為能市馬馬今至矣不出朞年千里馬至者三今王誠欲必致士從隗始隗且見事况賢於隗者乎於是王為隗築宫而師之樂毅自魏往鄒衍自齊往劇辛自趙往士爭歸燕焉黨同文昭之徳豈不大哉黨音佗朗反凡人之情寃則呼天窮則叩心今呼天不聞叩心無益誠自傷痛俱生聖世獨為匪人詩小雅曰哀我征夫獨為匪人也孤微之人無所告訴如不哀憐便為魚肉言將為人所吞噬也企心東望無所復言熲雖剛猛省書哀之卒不忍也時禁錮者多不能守靜或死或徙奐閉門不出養徒千人著尚書記難三十餘萬言奐少立志節嘗與士友言曰大丈夫處世當為國家立功邊境及為將帥果有勲名董卓慕之使其兄遺縑百匹奐惡卓為人絶而不受光和四年卒年七十八遺命曰吾前後仕進十要銀艾銀印緑綬也以艾草染之故曰艾也不能和光同塵為䜛邪所忌老子曰和其光同其塵也通塞命也始終常也但地底冥冥長無曉期而復纒以纊綿牢以釘密為不喜耳幸有前窀朝殞夕下措屍靈牀幅巾而已奢非晉文陸翽鄴中記曰永嘉末發齊桓公墓得水銀池金蠶數十箔珠􅃭玉匣繒綵不可勝數左傳曰晉文公朝王請隧王不許曰王章也未有代徳而有二王亦叔父之所惡也晉文既臣請用王禮是其奢也儉非王孫武帝時楊王孫死誡其子為布囊盛屍入地七尺脫去其囊以身親土推情從意庶無咎吝諸子從之武威多為立祠世世不絶所著銘頌書敎誡述志對䇿章表二十四篇長子芝字伯英最知名王愔文字志曰芝少持髙操以名臣子勤學文為儒宗武為將表太尉辟公車有道徴皆不至號張有道尤好草書學崔杜之法家之衣帛必書而後練臨池學書水為之黑下筆則為楷則號怱怱不暇草書為世所寳寸紙不遺韋仲將謂之草聖也芝及弟昶字文舒並善草書至今稱傳之初奐為武威}
