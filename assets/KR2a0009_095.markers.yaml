  - {type: variant, offset: 1149, length: 0, content: '', WYG: 軍梁冀府乃上書桓帝奏其章句詔下東觀以疾去官復舉賢良對䇿第一擢拜議郎永壽元年遷安定屬國都尉初到職而南匈奴左薁鞬臺耆且渠伯徳等七十餘人寇美稷東羌復舉種應之而奐壁唯有}
  - {type: variant, offset: 1149, length: 0, content: '', krp: 軍梁冀府乃上書桓帝奏其章句詔下東觀以疾去官復舉賢良對䇿第一擢拜議郎永壽元年遷安定屬國都尉初到職而南匈奴左薁鞬臺耆且渠伯徳等七十餘人寇美稷東羌復舉種應之而奐壁唯有}
  - {type: variant, offset: 1150, length: 0, content: '', WYG: 百許人聞即勒兵而出軍吏以為力不敵叩頭争止之奐不聽遂進屯長城收集兵士遣將王衞招誘東羌因據龜兹龜兹音丘慈縣名屬上郡前書音義曰龜兹國人來降之因以名縣也使南匈奴不得交通東羌諸豪遂相率與奐和親共擊薁鞬等連戰破之伯徳惶恐將其衆降郡界以寜羌豪帥感奐恩徳上馬二十匹先零酋長又遺金鐻八枚奐並受之郭璞注山海經云鐻音渠金食器名未詳形制也而召主簿於諸羌前以酒酹地曰以酒沃地謂之酹音力外反使馬如羊不以入廐使金如粟不以入懐悉以金馬還之如羊如粟喻多也羌性貪而貴吏清前有八都尉率好財貨為所患苦及奐正身絜已威化大行遷使匈奴中郎將時休屠各屠音直於反及朔方烏桓並同反叛燒度遼將軍門時度遼將軍屯五原引屯赤阬烟火相望兵衆大恐各欲亡去奐安坐帷中與弟子講誦自若軍士稍安乃潛誘烏桓隂與和通遂使斬屠各渠帥襲破其衆諸胡悉降延熹元年鮮卑寇邊奐率南單于襲之斬首數百級明年梁冀被誅奐以故吏免官禁錮奐與皇甫規友善奐既被錮凡諸交舊莫敢為言唯規薦舉前後七上在家四嵗復拜武威太守平均徭賦率厲散敗常為諸郡最河西由是而全其俗多妖忌凡二月五月產子及與父母同月生者悉殺之奐示以義方嚴加賞罰風俗遂改百姓生為立祠舉尤異遷度遼將軍數載間幽并清靜九年春徴拜大司農鮮卑聞奐去其夏遂招結南匈奴烏桓數道入塞或五六千騎或三四千騎寇掠縁邊九郡殺畧百姓秋鮮卑復率八九千騎入塞誘引東羌與共盟詛於是上郡沈氏安定先零諸種共寇武威張掖縁邊大被其毒朝廷以為憂復拜奐為䕶匈奴中郎將以九卿秩督幽并凉三州及度遼烏桓二營明帝永平八年初置度遼將軍屯五原郡曼柏縣漢官儀曰烏桓校尉屯上谷郡寗縣故曰二營兼察刺史二千石能否賞賜甚厚匈奴烏桓聞奐至因相率還降凡二十萬口奐但誅其首惡餘皆慰納之唯鮮卑出塞去永康元年春東羌先零五六千騎寇關中圍祋祤掠雲陽夏復攻没兩營殺千餘人冬羌岸尾摩蟞等蟞音必薛反脅同種復鈔三輔奐遣司馬尹端董卓並撃大破之斬其酋豪首虜}
