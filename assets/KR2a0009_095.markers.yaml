  - {type: variant, offset: 1146, length: 0, content: '', krp: 者如君之於臣父之於子也誡以災妖使從福祥陛下八年之中三斷大獄謂誅梁冀誅鄧萬鄧㑹誅李膺等黨事也一除内嬖無徳而寵曰嬖謂廢鄧皇后也再誅外臣殺桂陽太守任𦙍殺南陽太守成瑨太原太守劉質等也而災異猶見人情未安者殆賢愚進退威刑所加有非其理也前太尉陳蕃劉矩漢官儀曰矩字叔方忠謀髙世廢在里巷劉祐馮緄古本反趙典尹勲正直多怨流放家門李膺王暢孔翊潔身守禮終無宰相之階至於鉤黨之釁事起無端鉤引也謂李膺等事也虐賢傷善哀及無辜今興改善政易於覆手而羣臣杜口鑒畏前害互相瞻顧莫肯正言伏願陛下暫留聖明容受謇直則前責可弭後福必降對奏不省遷規𢎞農太守封壽成亭侯邑二百戸讓封不受再轉為䕶羌校尉熹平三年以疾名還未至卒於穀城年七十一所著賦銘碑讚禱文弔章表敎令書檄牋記凡二十七篇論曰孔子稱其言之不怍則其為之也難察皇甫規之言其心不怍哉}
  - {type: variant, offset: 1147, length: 1, content: 台, WYG: 其審已則干禄見賢則委位故干禄不為貪而委位不求讓稱已不疑伐而讓人無懼情故能功成於戎狄身全於邦家也張奐傳張奐字然明敦煌酒泉人也酒泉縣名地多泉水故城在今永州晉昌縣東北也劉攽曰注在今永州案下文永當作𤓰永州無晉昌也父惇為漢陽太守奐少遊三輔師事太尉朱寵學歐陽尚書初牟氏章句浮辭繁多時牟卿受書於張堪為博士故有牟氏章句有四十五萬餘言奐减為九萬言後辟大}
