  - {type: variant, offset: 1171, length: 0, content: '', WYG: 西羌於此弭定而東羌先零等自覆沒征西將軍馬賢後朝廷不能討遂數寇擾三輔其後度遼將軍皇甫規中郎將張奐招之連年既降又叛桓帝詔問熲曰先零東羌造惡反逆而皇甫規張奐各擁强衆不時輯定欲熲移兵東討未識其宜可參思術畧熲因上言曰臣伏見先零東羌雖數叛逆而降於皇甫規者已二萬許落善惡既分餘寇無幾今張奐躊躇久不進者當慮外離内合兵徃必驚且自冬踐春屯結不散人畜疲羸自亡之埶徒更招降坐制强敵耳臣以為狼子野心難以恩納左傳晉叔向母曰狼子野心也勢窮雖服兵去復動唯當長矛挾脅白刃加頸耳計東種所餘三萬餘落居近塞内路無險折非有燕齊秦趙從横之勢而久亂并凉累侵三輔西河上郡已各内徙安定北地復}
