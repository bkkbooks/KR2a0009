  - {type: variant, offset: 2635, length: 305, content: 為夷貊所侵徙郡於高句驪西北更以沃沮為縣屬樂浪東部都尉至光武罷都尉官後皆以封其渠帥為沃沮侯其土迫小介於大國之閒遂臣屬句驪句驪復置其中大人遂為使者以相監領貴責其租稅貂布魚鹽海中食物發美女為婢妾焉又有北沃沮一名置溝婁去南沃沮八百餘里其俗皆與南同界南接挹婁挹婁人憙乘船寇抄北沃沮畏之每夏輒臧於巖穴至冬船道不通乃下居邑落其耆老言嘗於海中得一布衣其形如中人衣而兩袖長三丈又於岸際見一人乘破船頂中復有面與語不通不食而死又說海中有女國無男人或傳其國有神井闚之輒生子云濊北與高句驪沃沮南與辰韓接東窮大海西至樂浪濊及沃沮句驪本皆朝鮮之地也昔武王封箕子於朝鮮箕子教以禮義田蠶又制八條之教其人終不相盜無門戶之閉婦人貞信飲食以籩豆其後四, WYG: 漢書卷九}
