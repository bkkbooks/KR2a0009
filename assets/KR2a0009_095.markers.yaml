  - {type: variant, offset: 21, length: 4, content: 夷夷者柢, WYG: 伏惟孝順皇帝初勤王政紀綱四方㡬以獲安後遭姦偽威分近習近習謂佞倖親近小人也禮記曰雖有貴戚近習畜貨聚馬戲謔是聞又因縁嬖倖受賂賣爵輕使賓客交錯其間天下擾擾從亂如歸左傳曰人患王之無厭也故從亂如歸也故每有征戰鮮不挫傷官民並竭上下窮虛臣在關西竊聼風聲未聞國家有所先後先後謂進退}
