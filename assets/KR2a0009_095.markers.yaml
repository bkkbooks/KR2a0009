  - {type: variant, offset: 15, length: 0, content: '', krp: 皇甫規傳皇甫規字威眀安定朝那人也祖父稜度遼將軍父旗扶風都尉永和六年西羌大寇三輔圍安定征西將軍馬賢将諸郡兵擊之不能克規雖在布衣見賢不䘏軍事審其必敗乃上書言状尋而賢果為羌所沒郡将知規有兵畧乃命為功曹使率甲士八百與羌交戰斬首數級賊遂退郤舉規上計掾其後𦍑衆大合攻燒隴西朝廷患之規乃上疏求自効曰臣比年以來數陳便宜羌戎未動䇿其將反馬賢始出頗知必敗誤中之言在可考校臣每惟賢等擁衆四年未有成功懸師之費且百億計懸猶停也出於平人回入姦吏平人齊人也故江湖之人羣為盗賊青徐荒饑襁負流散夫羌戎潰叛不由承平皆由邉将失於綏御乘常守安則加侵暴茍競小利則致大害微勝則虛張首級軍敗則隐匿不言軍士勞怨困於猾吏進不得快戰以徼功退不得温飽以全命餓死溝渠暴骨中原徒見}
  - {type: variant, offset: 16, length: 3, content: 制云東, WYG: 師之出不聞振旅之聲振整旅衆也穀梁傳曰出曰治兵入曰振旅酋豪泣血驚懼生變是以安不能久敗則經年臣所以搏手叩心而增歎者也願假臣兩營二郡兩營謂馬賢及趙冲等二郡安定隴西也屯列坐食之兵五千出其不意與護羌校尉趙冲共相首尾土地山谷臣所曉習兵埶巧便臣已更之可不煩}
