  - {type: variant, offset: 1135, length: 0, content: '', krp: 秋叛羌零吾等與先零别種寇鈔關中護羌校尉段熲坐徴熲擊羌坐為凉州刺史郭閎留兵不進下獄後先零諸種陸梁覆沒營塢説文曰塢小障也一曰庳城也音烏古反規素悉羌事志自奮効乃上疏曰自臣受任志竭愚鈍實頼兖州刺史牽顥之清猛中郎將宗資之信義得承節度幸無咎譽今猾賊就滅太山畧平復聞羣羌並皆反逆臣生長邠岐年五十有九昔為郡吏再更叛羌預籌其事有誤中之言臣素有固疾恐犬馬齒窮不報大恩願乞冗官備單車一介之使勞來三輔宣國威澤以所習地形兵埶佐助諸軍臣窮居孤危之中坐觀郡將已數十年矣自鳥鼠至於東岱其病一也郡將郡守也鳥鼠山名在今渭西即先零羌寇鈔處也東岱謂泰山叔孫無忌反處也皆由郡守不加綏撫致使反叛其疾同也力求猛敵不如清平勤明吳孫未若奉法吳起魏將也孫武吳將也言若求猛將不如撫以清平之政明習兵書不如郡守奉法使之無反也前變未逺臣誠戚之戚憂也前變謂羌反是以越職盡其區區至冬𦍑遂大合朝廷為憂三公舉規為中郎將持節監關西兵討零吾等破之斬首八百級先零諸種羌慕規威信相勸降者十餘萬明年規因發其騎共討隴右而道路隔絶軍中大疫死者十三四規親入菴盧巡視将士三軍咸悦東羌遂}
  - {type: variant, offset: 1137, length: 0, content: '', WYG: 乞降凉州復通先是安定太守孫儁受取狼籍屬國都尉李翕督軍御史張禀多殺降羌凉州刺史郭閎漢陽太守趙熹並老弱不堪任職而皆倚恃權貴不遵法度規到州界悉條奏其罪或免或誅羌人聞之翕然反善沈氐大豪滇昌饑恬等十餘萬口復詣規降規出身數年持節為將擁衆立功還督鄉里既無它私惠而多所舉奏又惡絶宦官不與交通於是中外並怨遂共誣規貨賂羣羌令其文降以文簿虗降非眞心也天子璽書誚讓相屬規懼不免上疏自訟曰四年之秋戎醜蠢戾蠢動也戾乖也爰自西州侵及涇陽縣名屬安定郡其故城在今原州平源縣南也舊都懼駭}
  - {type: page-break, offset: 1137, content: '', id: KR2a0009_WYG_095-6a, image: WYG0253/WYG0253-0334a.png}
  - {type: variant, offset: 1137, length: 0, content: '', krp: 乞降凉州復通先是安定太守孫儁受取狼籍屬國都尉李翕督軍御史張禀多殺降羌凉州刺史郭閎漢陽太守趙熹並老弱不堪任職而皆倚恃權貴不遵法度規到州界悉條奏其罪或免或誅羌人聞之翕然反善沈氐大豪滇昌饑恬等十餘萬口復詣規降規出身數年持節為將擁衆立功還督鄉里既無它私惠而多所舉奏又惡絶宦官不與交通於是中外並怨遂共誣規貨賂羣羌令其文降以文簿虗降非眞心也天子璽書誚讓相屬規懼不免上疏自訟曰四年之秋戎醜蠢戾蠢動也戾乖也爰自西州侵及涇陽縣名屬安定郡其故城在今原州平源縣南也舊都懼駭}
  - {type: variant, offset: 1138, length: 3, content: 賀貢獻, WYG: 廷西顧明詔不以臣愚駑急使軍就道就猶上也劉攽曰案文軍上少一字或督或領也幸䝉威靈遂振國命羌戎諸種大小稽首輙移書營郡以訪誅納訪問也規言羌種既服臣即移書軍營及郡勘問誅殺并納受多少之數目也所省之費一億以上以為忠臣之義不敢告勞詩小雅曰密勿從事不敢告勞無罪無辜䜛口嗸嗸故恥以片言自及㣲効然比方先事庶免罪悔先事謂前輩敗將也前踐州界先奏郡守孫儁次及屬國都尉李翕督軍御史張禀旋師南征又上凉州刺史郭閎漢陽太守趙熹陳其過惡執據大辟凡此五臣支黨半國其餘墨綬下至小吏所連及者復有百餘吏託報將之怨子思復父之恥載贄馳車懐糧歩走交搆豪門競流謗讟云臣私報諸羌謝其錢貨謝猶讎也若臣以私財則家無擔石如物出於官則文簿易考就臣愚惑信如言者前世尚遺匈奴以宫姬元帝賜呼韓邪單于待詔掖庭王嬙為閼氏也鎭烏孫以公主武帝以江都王建女細君妻烏孫王昆莫為夫人也今臣但費千萬以懐叛羌則良臣之才畧兵家之所貴將有何罪負義違理乎自永初以來將出不少覆軍有五動資巨億有旋車完封寫之權門言覆軍之将族師之日多載珍寳封印完全便入權門而名成功立厚加爵封今臣還督本土糺舉諸郡絶交離親戮辱舊故衆謗隂害固其宜也臣雖汙穢亷絜無聞今見覆沒恥痛實深傳稱鹿死不擇音謹冒昧畧上左傳曰鹿死不擇音挺而走險急何能擇也其年冬徴還拜議郎論功當封而中常侍徐璜左悺欲從求貨數遣賓客就問功狀規終不答璜等忿怒陷以前事下之於吏官屬欲賦歛請謝規誓而不聼遂以餘寇不絶坐繫廷尉論輸左校漢官儀曰左校署屬將作大匠也諸公及太學生張鳳等三百餘人詣闕訟之㑹赦歸家徴拜度遼將軍至營數月上書薦中郎將張奐以自代曰臣聞人無常俗而政有治亂兵無強弱而將有能否伏見中郎將張奐才畧兼優宜正元帥以從衆望若猶謂愚臣宜充軍事者願乞冗官以為奐副朝廷從之以奐代為度遼将軍規為使匈奴中郎將及奐遷大司農規復代為度遼將軍規為人多意算自以連在大位欲退身避第數上病不見聽㑹友人上郡太守王旻䘮還規縞素越界到下亭迎之因令客密告并州刺史胡芳言規擅逺軍營公違禁憲當急舉奏芳曰威明欲避第仕塗故激發我耳言欲歸第避仕宦之塗也吾當為朝廷愛才何能申此子計邪遂無所問及黨事大起天下名賢多見染逮規雖為名將素譽不髙自以西州豪傑恥不得豫乃先自上言臣前薦故大司農張奐是附黨也又臣昔論輸左校時太學生張鳳等上書訟臣是為黨人所附也臣宜坐之朝廷知而不問時人以為規賢劉攽曰案文以為規賢非是當云以規為賢在事數歳北邊威服}
