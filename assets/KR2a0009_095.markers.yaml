  - {type: variant, offset: 1556, length: 436, content: 其置官有相加對盧沛者古鄒大加主簿優台使者帛衣先人武帝滅朝鮮以高句驪為縣使屬玄菟賜鼓吹伎人其俗淫皆絜淨自憙暮夜輒男女羣聚為倡樂好祠鬼神社稷零星以十月祭天大會名曰東盟其國東有大穴號禭神亦以十月迎而祭之其公會衣服皆錦繡金銀以自飾大加主簿皆著幘如冠幘而無後其小加著折風形如弁無牢獄有罪諸加評議便殺之沒入妻子為奴婢其昏姻皆就婦家生子長大然後將還便稍營送終之具金銀財幣盡於厚葬積石為封亦種松柏其人性凶急有氣力習戰鬬好寇鈔沃沮東濊皆屬焉句驪一名貊耳有別種依小水為居因名曰小水貊出好弓所謂貊弓是也王莽初發句驪兵以伐匈奴其人不欲行彊迫遣之皆亡出塞為寇盜遼西大尹田譚追擊戰死莽令其將嚴尤擊之誘句驪侯騶入塞斬之傳首長安莽大說更名高句驪王為下句驪侯於是貊人寇邊愈甚建武八年高句驪遣使朝貢光武復其王號二十三年冬句驪蠶支落大加戴升等萬餘口詣樂浪內屬二十五年春句驪寇右北平漁陽上谷太原而遼東太守祭肜以恩信招之皆復款塞後句驪王宮生而開目能視國人懷之及長勇壯數犯邊境和帝元興元年春復入遼東寇略六縣太守耿夔擊, WYG: 中處處}
