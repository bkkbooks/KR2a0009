  - {type: variant, offset: 1160, length: 0, content: '', krp: 其妻懐孕夢帶奐印綬登樓而歌訊之占者曰必將生男復臨兹邦命終此樓既而生子猛以建安中為武威太守殺刺史邯鄲商州兵圍之急猛恥見擒乃登樓自燒而死卒如占云論曰自鄛鄉之封中官世盛宦者鄭衆封鄛鄉侯也暴恣數十年間四海之内莫不切齒憤盈願投兵於其族陳蕃竇武奮義草謀徴㑹天下名士有識所共聞也而張奐見欺豎子揚戈以斷忠烈奐被曹節等矯制使率五營士圍殺陳蕃竇武等雖恨毒在心辭爵謝咎詩云啜其泣矣何嗟及矣詩國風也啜泣貌也音知劣反叚熲傳叚熲字紀明武威姑臧人也其先出鄭共叔段西域都䕶會宗之從曾孫也㑹宗字子松天水上邽人元帝時為西域都䕶死城郭諸國為發喪立祠熲少便習弓馬尚遊俠輕財賄長乃折節好古學初舉孝亷為憲陵園丞陽陵令憲陵順帝陵陽陵景帝陵漢官儀曰丞秩三百石令秩六百石也所在能政劉攽曰案文單言能政不成文理當有一有字遷遼東屬國都尉時鮮卑犯塞熲即率所領馳赴之既而恐賊驚去乃使驛騎詐齎璽書詔熲熲於道偽退潛於還路設伏虜以為信然乃入追熲熲因大縱兵悉斬獲之坐詐璽書伏重刑以有功論司寇刑竟徴拜議郎時太山琅邪賊東郭竇}
  - {type: variant, offset: 1162, length: 1, content: 域, WYG: 舉等聚衆三萬人破壊郡縣遣兵討之連年不克永壽二年桓帝詔公卿選將有文武者司徒尹訟薦熲漢官儀曰訟字公孫鞏人也乃拜為中郎將擊竇舉等大破斬之獲首萬餘級餘黨降散封熲為列侯賜錢五十萬除一子為郎中延熹二年遷護羌校尉㑹燒當燒何當煎勒姐等八種羌姐音紫且反寇隴西金城塞熲將兵及湟中義從羌萬二千騎出湟谷撃破之追討南渡河使軍吏田晏夏育募先登懸索相引復戰於羅亭大破之斬其酋豪以下二千級獲生口萬餘人虜皆奔走明年春餘羌復與燒何大豪寇張掖攻没鉅鹿塢殺屬國吏民又招同種千餘落并兵晨奔熲軍熲下馬大戰至日中刀折矢盡虜亦引退熲追之且鬭且行晝夜相攻割肉食雪四十餘日遂至河首積石山出塞二千餘里斬燒何大帥首虜五千餘人又分兵擊石城羌斬首溺死者千六百人燒當種九十餘口詣熲降劉攽曰案燒當一種不止九十餘口其種中九十口降亦不足記當作千字又雜種羌屯聚白石白石山在今蘭州狄道縣東熲復進擊首虜三千餘人冬勒姐零吾種圍允街允音鈆街音階殺畧吏民熲排營救之斬獲數百人四年冬上郡沈氐隴西牢姐烏吾諸種羌共寇并凉二州熲將湟中義從討之凉州刺史郭閎貪共其功稽固熲軍使不得進稽固猶停留也義從役久戀鄉舊皆悉反叛郭閎歸罪於熲熲坐徴下獄輸作左校羌遂陸梁覆没營塢轉相招結唐突諸郡於是吏人守闕訟熲以千數朝廷知熲為郭閎所誣詔問其狀熲但謝罪不敢言枉京師稱為長者起於徒中復拜議郎遷并州刺史時滇那等諸種羌五六千人寇武威張掖酒泉燒人廬舍六年寇埶轉盛凉州幾亡冬復以熲為䕶羌校尉乘驛之職明年春羌封僇良多滇那等僇音良逐反又力救反酋豪三百五十五人率三千落詣熲降當煎勒姐種猶自屯結冬熲將萬餘人}
