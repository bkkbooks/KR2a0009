  - {type: variant, offset: 1160, length: 0, content: '', WYG: 其妻懐孕夢帶奐印綬登樓而歌訊之占者曰必將生男復臨兹邦命終此樓既而生子猛以建安中為武威太守殺刺史邯鄲商州兵圍之急猛恥見擒乃登樓自燒而死卒如占云論曰自鄛鄉之封中官世盛宦者鄭衆封鄛鄉侯也暴恣數十年間四海之内莫不切齒憤盈願投兵於其族陳蕃竇武奮義草謀徴㑹天下名士有識所共聞也而張奐見欺豎子揚戈以斷忠烈奐被曹節等矯制使率五營士圍殺陳蕃竇武等雖恨毒在心辭爵謝咎詩云啜其泣矣何嗟及矣詩國風也啜泣貌也音知劣反叚熲傳叚熲字紀明武威姑臧人也其先出鄭共叔段西域都䕶會宗之從曾孫也㑹宗字子松天水上邽人元帝時為西域都䕶死城郭諸國為發喪立祠熲少便習弓馬尚遊俠輕財賄長乃折節好古學初舉孝亷為憲陵園丞陽陵令憲陵順帝陵陽陵景帝陵漢官儀曰丞秩三百石令秩六百石也所在能政劉攽曰案文單言能政不成文理當有一有字遷遼東屬國都尉時鮮卑犯塞熲即率所領馳赴之既而恐賊驚去乃使驛騎詐齎璽書詔熲熲於道偽退潛於還路設伏虜以為信然乃入追熲熲因大縱兵悉斬獲之坐詐璽書伏重刑以有功論司寇刑竟徴拜議郎時太山琅邪賊東郭竇}
