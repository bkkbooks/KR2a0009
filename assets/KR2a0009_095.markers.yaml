  - {type: variant, offset: 532, length: 263, content: 鈔桓靈失政漸滋曼焉自中興之後四夷來賓雖時有乖畔而使驛不絕故國俗風土可得略記東夷率皆土著憙飲酒歌舞或冠弁衣錦器用俎豆所謂中國失禮求之四夷者也凡蠻夷戎狄總名四夷者猶公侯伯子男皆號諸侯云夫餘國在玄菟北千里南與高句驪東與挹婁西與鮮卑接北有弱水地方二千里本濊地也初北夷索離國王出行其侍兒於後身王還欲殺之侍兒曰前見天上有氣大如雞子來降我因以有身王囚之後遂生男王令置於豕牢豕以口氣噓之不死復徙於馬蘭馬亦如之王以為神乃聽母收養名曰東明東明長而善射王忌其猛復欲殺之東明奔走南至掩水以弓擊水魚鼈皆聚浮水上東明乘之得度因至夫餘而王之焉於東夷之域最為, WYG: 虜悉}
