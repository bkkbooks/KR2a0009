  - {type: variant, offset: 3048, length: 1215, content: 年罷臨屯真番以并樂浪玄菟玄菟復徙居句驪自單單大領已東沃沮濊貊悉屬樂浪後以境土廣遠復分領東七縣置樂浪東部都尉自內屬已後風俗稍薄法禁亦浸多至有六十餘條建武六年省都尉官遂棄領東地悉封其渠帥為縣侯皆歲時朝賀無大君長其官有侯邑君三老耆舊自謂與句驪同種言語法俗大抵相類其人性愚売心少嗜欲不請匄男女皆衣曲領其俗重山川山川各有部界不得妄相干涉同姓不昏多所忌諱疾病死亡輒捐棄舊宅更造新居知種麻養蠶作緜布曉候星宿豫知年歲豐約常用十月祭天晝夜飲酒歌舞名之為舞天又祠虎以為神邑落有相侵犯者輒相罰責生口牛馬名之為責禍殺人者償死少寇盜能步戰作矛長三丈或數人共持之樂浪弓出其地又多文豹有果下馬海出班魚使來皆獻之韓有三種一曰馬韓二曰辰韓三曰弁辰馬韓在西有五十四國其北與樂浪南與倭接辰韓在東十有二國其北與濊貊接弁辰在辰韓之南亦十有二國其南亦與倭接凡七十八國伯濟是其一國焉大者萬餘戶小者數千家各在山海閒地合方四千餘里東西以海為限皆古之辰國也馬韓最大共立其種為辰王都目支國盡王三韓之地其諸國王先皆是馬韓種人焉馬韓人知田蠶作緜布出大栗如梨有長尾雞尾長五尺邑落雜居亦無城郭作土室形如冢開戶在上不知跪拜無長幼男女之別不貴金寶錦罽不知騎乘牛馬唯重瓔珠以綴衣為飾及縣頸垂耳大率皆魁頭露紒布袍草履其人壯勇少年有築室作力者輒以繩貫脊皮縋以大木嚾呼為健常以五月田竟祭鬼神晝夜酒會羣聚歌舞舞輒數十人相隨蹋地為節十月農功畢亦復如之諸國邑各以一人主祭天神號為天君又立蘇塗建大木以縣鈴鼓事鬼神其南界近倭亦有文身者辰韓耆老自言秦之亡人避苦役適韓國馬韓割東界地與之其名國為邦弓為弧賊為寇行酒為行觴相呼為徒有似秦語故或名之為秦韓有城柵屋室諸小別邑各有渠帥大者名臣智次有儉側次有樊秖次有殺奚次有邑借土地肥美宜五穀知蠶桑作縑布乘駕牛馬嫁娶以禮行者讓路國出鐵濊倭馬韓並從巿之凡諸貨貿易皆以鐵為貨俗憙歌舞飲酒鼓瑟兒生欲令其頭扁皆押之以石弁辰與辰韓雜居城郭衣服皆同言語風俗有異其人形皆長大美髮衣服絜清而刑法嚴峻其國近倭故頗有文身者初朝鮮王準為衞滿所破乃將其餘衆數千人走入海攻馬韓破之自立為韓王準後滅絕馬韓人復自立為辰王建武二十年韓人廉斯人蘇馬諟等詣樂浪貢獻光武封蘇馬諟為漢廉斯邑君使屬樂浪郡四時朝謁靈帝末韓濊並盛郡縣不能制百姓苦亂多流亡入韓者馬韓之西海上有州胡國其人短小髡頭衣韋衣有上無下好養牛豕乘船往來貨市韓中倭在韓東南大海中依山為居凡百餘國自武帝滅朝鮮使驛通於漢者三十許國國皆稱王世世傳統其大倭王居邪馬臺國樂浪郡徼去其國萬二千里去其西北界拘邪韓國七千餘里其地大較在會稽東冶之東與朱崖儋耳相近故其法俗多同土宜禾稻麻紵蠶桑知織績為縑布出白珠青玉其山有丹土氣溫冬夏生菜茹無牛馬虎豹羊鵲其兵有矛楯木弓竹矢或以骨為鏃男子皆黥面文身以其文左右大小別尊卑之差其男衣皆橫幅結束相連女人被髮屈紒衣如單被貫頭而著之並以丹朱坋身如中國之用粉也有城柵屋室父母兄弟異處唯會同男女無別飲食以手而用籩豆俗皆徒跣以蹲踞為恭敬人性嗜酒多壽, WYG: ''}
