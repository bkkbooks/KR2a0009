  - {type: variant, offset: 796, length: 335, content: 敞土宜五穀出名馬赤玉貂豽大珠如酸棗以員柵為城有宮室倉庫牢獄其人麤大彊勇而謹厚不為寇鈔以弓矢刀矛為兵以六畜名官有馬加牛加狗加其邑落皆主屬諸加食飲用俎豆會同拜爵洗爵揖讓升降以臘月祭天大會連日飲食歌舞名曰迎鼓是時斷刑獄解囚徒有軍事亦祭天殺牛以蹏占其吉凶行人無晝夜好歌吟音聲不絕其俗用刑嚴急被誅者皆沒其家人為奴婢盜一責十二男女淫皆殺之尤治惡妒婦既殺復尸於山上兄死妻嫂死則有椁無棺殺人殉葬多者以百數其王葬用玉匣漢朝常豫以玉匣付玄菟郡王死則迎取以葬焉建武中東夷諸國皆來獻見二十五年夫餘王遣使奉貢光武厚荅報之於是使命歲通至安帝永初五年夫餘王始將步騎七八千人寇鈔樂浪殺傷吏民後復歸附永寧元年乃遣嗣子尉仇台印詣闕貢獻天子賜尉仇台印綬金綵順帝永和元年其王來朝京師帝作黃門鼓吹角抵戲以遣之桓帝, WYG: ''}
