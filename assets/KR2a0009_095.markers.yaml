  - {type: variant, offset: 1168, length: 0, content: '', WYG: 虜四千餘人八年春熲復撃勒姐種斬首四百餘級降者二千餘人夏進軍撃當煎種於湟中熲兵敗被圍三日用隱士樊志張䇿潛師夜出鳴鼓還戰大破之首虜數千人熲遂窮追展轉山谷間自春及秋無日不戰虜遂饑困敗散北畧武威間熲凡破西羌斬首二萬三千級獲生口數萬人馬牛羊八百萬頭降者萬餘落封熲都鄉侯邑五百戸永康元年當煎諸種復反合四千餘人欲攻武威熲復追擊於鸞鳥大破之鳥音爵縣名屬武威郡故城在今凉州昌松縣北也殺其渠帥斬首三}
