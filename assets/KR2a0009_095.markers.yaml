  - {type: variant, offset: 4264, length: 637, content: 至百餘歲者甚衆國多女子大人皆有四五妻其餘或兩或三女人不淫不妒又俗不盜竊少爭訟犯法者沒其妻子重者滅其門族其死停喪十餘日家人哭泣不進酒食而等類就歌舞為樂灼骨以卜用決吉凶行來度海令一人不櫛沐不食肉不近婦人名曰持衰若在塗吉利則雇以財物如病疾遭害以為持衰不謹便共殺之建武中元二年倭奴國奉貢朝賀使人自稱大夫倭國之極南界也光武賜以印綬安帝永初元年倭國王帥升等獻生口百六十人願請見桓靈閒倭國大亂更相攻伐歷年無主有一女子名曰卑彌呼年長不嫁事鬼神道能以妖惑衆於是共立為王侍婢千人少有見者唯有男子一人給飲食傳辭語居處宮室樓觀城柵皆持兵守衞法俗嚴峻自女王國東度海千餘里至拘奴國雖皆倭種而不屬女王自女王國南四千餘里至朱儒國人長三四尺自朱儒東南行船一年至裸國黑齒國使驛所傳極於此矣會稽海外有東鯷人分為二十餘國又有夷洲及澶洲傳言秦始皇遣方士徐福將童男女數千人入海求蓬萊神仙不得徐福畏誅不敢還遂止此洲世世相承有數萬家人民時至會稽市會稽東冶縣人有入海行遭風流移至澶洲者所在絕遠不可往來論曰昔箕子違衰殷之運避地朝鮮始其國俗未有聞也及施八條之約使人知禁遂乃邑無淫盜門不夜扃回頑薄之俗就寬略之法行數百千年故東夷通以柔謹為風異乎三方者也苟政之所暢則道義存焉仲尼懷憤以為九夷可居或疑其陋子曰君子居之何陋之有亦徒有以焉爾其後遂通接商賈漸交上國而燕人衞滿擾雜其風於是從而澆異焉老子曰法令滋章盜賊多有若箕子之省文條而用信義其得聖賢作法之原矣贊曰宅是嵎夷曰乃暘谷巢山潛海厥區九族嬴末紛亂燕人違難雜華澆本遂通有漢眇眇偏譯或從或畔, WYG: 證}
