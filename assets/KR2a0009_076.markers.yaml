  - {type: variant, offset: 6273, length: 342, content: 故得反斾冀土克平四州向使臣退軍官度紹必鼓行而前敵人懷利以自百臣衆怯沮以喪氣有必敗之形無一捷之埶復若南征劉表委𠫓廾兗豫飢軍深入踰越江沔利既難要將失本據而彧建二策以亡為存以禍為福謀殊功異臣所不及是故先帝貴指縱之功薄搏獲之賞古人尚帷幄之規下攻拔之力原其績効足享高爵而海內未喻其狀所受不侔其功臣誠惜之乞重平議增疇戶邑彧深辭讓操譬之曰昔介子推有言竊人之財猶謂之盜況君奇謨拔出興亡所係可專有之邪雖慕魯連冲高之迹將為聖人達節之義乎於是增封千戶并前二千戶又欲授以正司彧使荀攸深自陳讓至于十數乃止操將伐劉表問彧所策彧曰今華夏以平荊漢知亡矣可聲出宛葉而閒行輕進以掩其不意操從之會表病死十七年董昭等欲共進操爵國公九錫備物密以訪彧彧曰曹公本興義兵以匡振漢朝雖勳庸崇著猶秉忠貞之節君子愛人以德不宜如此事遂寑操心, WYG: ''}
