  - {type: variant, offset: 5234, length: 289, content: 表𩹉堅壁清野以待將軍將軍攻之不拔掠之無獲不出一旬則十萬之衆未戰而自困矣夫事固有𠫓廾彼取此以權一時之埶願將軍慮焉操於是大收孰麥復與布戰布敗走因分定諸縣兗州遂平建安元年獻帝自河東還洛陽操議欲奉迎車駕徙都於許衆多以山東未定韓暹楊奉負功恣睢未可卒制彧乃勸操曰昔晉文公納周襄王而諸侯景從漢高祖為義帝縞素而天下歸心自天子蒙塵將軍首唱義兵徒以山東擾亂未遑遠赴雖禦難於外乃心無不在王室今鑾駕旋軫東京榛蕪義士有存本之思兆人懷感舊之哀誠因此時奉主上以從人望大順也秉至公以服天下大略也扶弘義以致英俊大德也四方雖有逆節其何能為韓暹楊奉安足恤哉若不時定使豪桀生心後雖為慮亦無及矣操從之及帝都許以彧為侍中守, WYG: ''}
