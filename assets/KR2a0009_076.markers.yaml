  - {type: variant, offset: 3907, length: 0, content: '', WYG: 一逋字前年勃海張伯路可為至戒覆車之軌其迹不遠蓋失之末流求之本源宜糺增舊科以防來事自今彊盜為上官若它郡縣所糺覺一發部吏皆正法上官謂郡府也若及也部吏謂督郵游徼也正法依法也尉貶秩一等令長三月奉贖罪二發尉免官令長貶秩一等三發以上令長免官便可撰立科條處為詔文切勑刺史嚴加糺罸冀以猛濟寛驚懼姦慝頃季夏大暑而消息不協前書音義曰息卦曰太陽消卦曰太陰其餘雜卦曰少陰太陽寒氣錯時水涌為變天之降異必有其故所舉有道之士可策問國}
