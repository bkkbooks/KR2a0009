  - {type: variant, offset: 1077, length: 359, content: 居不妄接士賓客勑外自非當世名人及與通家皆不得白融欲觀其人故造膺門語門者曰我是李君通家子弟門者言之膺請融問曰高明祖父嘗與僕有恩舊乎融曰然先君孔子與君先人李老君同德比義而相師友則融與君累世通家衆坐莫不歎息太中大夫陳煒後至坐中以告煒煒曰夫人小而聰了大未必奇融應聲曰觀君所言將不早惠乎膺大笑曰高明必為偉器年十三喪父哀悴過毀扶而後起州里歸其孝性好學博涉多該覽山陽張儉為中常侍侯覽所怨覽為刊章下州郡以名捕儉儉與融兄襃有舊亡抵於襃不遇時融年十六儉少之而不告融見其有窘色謂曰兄雖在外吾獨不能為君主邪因留舍之後事泄國相以下密就掩捕儉得脫走遂并收襃融送獄二人未知所坐融曰保納舍藏者融也當坐之襃曰彼來求我非弟之過請甘其罪吏問其母母曰家事任長妾當其辜一門爭死郡縣疑不能決乃上讞之詔書竟坐襃焉融由是顯名與平原陶丘洪陳留邊讓齊聲稱州郡禮命皆不就辟, WYG: 孤宦致位}
