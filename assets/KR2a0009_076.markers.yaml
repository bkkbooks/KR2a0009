  - {type: variant, offset: 3711, length: 0, content: '', WYG: 咸曰旱之所由咎在改律臣以為殷周斷獄不以三微而化致康平無有災害自元和以前皆用三冬而水旱之異徃徃為患由此言之災害自為它應不以改律秦為虐政四時行刑聖漢初興改從簡易蕭何草律季秋論囚俱避立春之月草謂創造之也論決也而不計天地之正二王之春實頗有違言蕭何不論天地之正及殷周之春實乖正道陛下探幽析微允執其中允信也中正也言信執中正之道語見尚書革百載之失建永年之功尚書曰立功立事可以永年上有迎承之敬下有奉微之惠三正之月不用斷獄敬承天意奉順三微也稽春秋之文當月令之意春秋於春每月書王所以通三統也何休注云二月三月皆有王者二月殷正月三月夏正月也聖功美業不宜中疑書奏帝納之遂不復改寵性周宻常稱人臣之義苦不畏愼自在樞機謝遣門人拒絶知友惟在公家而已朝廷器之器重也皇后弟侍中竇憲臣賢案竇后紀及憲傳並云憲竇后兄今諸本皆言弟蓋誤也薦眞定令張林為尚書帝以問寵寵對林雖有才能而素行貪濁憲以此深恨寵林卒被用而以臧汙抵罪及帝崩憲等秉權常銜寵乃白太后令典喪事}
