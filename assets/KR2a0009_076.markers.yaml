  - {type: variant, offset: 2574, length: 271, content: 領荊州牧劉表桀逆放恣所為不軌至乃郊祭天地擬儀社稷雖昏僭惡極罪不容誅至於國體宜且諱之何者萬乘至重天王至尊身為聖躬國為神器陛級縣遠祿位限絕猶天之不可階日月之不可踰也每有一豎臣輒云圖之若形之四方非所以杜塞邪萌愚謂雖有重戾必宜隱忍賈誼所謂擲鼠忌器蓋謂此也是以齊兵次楚唯責包茅王師敗績不書晉人前以露袁術之罪今復下劉表之事是使跛牂欲闚高岸天險可得而登也案表跋扈誅列侯遏絕詔命斷盜貢篚招呼元惡以自營衛專為羣逆主萃淵藪郜鼎在廟章孰甚焉桑落瓦解其埶可見臣愚以為宜隱郊祀之事以崇國防五年南陽王馮東海王祗薨帝傷其早歿欲為脩四時之祭以訪於融融對曰聖恩敦睦感時增思悼二, WYG: 先}
