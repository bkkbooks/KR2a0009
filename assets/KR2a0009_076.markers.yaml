  - {type: variant, offset: 3705, length: 5, content: 相似或矜埶, WYG: 稽天意月令曰孟冬之月趣獄刑無留罪臣賢案月令及淮南子皆言季秋趣獄刑無留罪今言孟冬未詳其故明大刑畢在立冬也又孟冬之月身欲寧事欲靜月令仲冬君子齋戒身欲寧事欲靜以待隂陽之所定也劉攽曰案文并注意孟當作仲若以降威怒不可謂寧若以行大刑不可謂靜議}
  - {type: variant, offset: 3705, length: 5, content: 相似或矜埶, krp: 稽天意月令曰孟冬之月趣獄刑無留罪臣賢案月令及淮南子皆言季秋趣獄刑無留罪今言孟冬未詳其故明大刑畢在立冬也又孟冬之月身欲寧事欲靜月令仲冬君子齋戒身欲寧事欲靜以待隂陽之所定也劉攽曰案文并注意孟當作仲若以降威怒不可謂寧若以行大刑不可謂靜議}
