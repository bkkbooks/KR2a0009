  - {type: variant, offset: 4408, length: 2, content: 猛獸, WYG: 敬愛之心則天下歸順之也運掌言易也臣願陛下登高北望以甘陵之思揆度臣子之心則海内咸得其所甘陵安帝母陵陵在清河故言北望也宦豎不便之竟寢忠奏而從諷布議遂著于令忠以久次轉為僕射時帝數遣黄門常侍及中使伯榮徃來甘陵伯榮帝乳母王聖女也而伯榮負寵驕蹇所經郡國莫不迎為禮謁又霖雨積時河水涌溢百姓騷動忠上疏曰臣聞位非其人則庶事不叙庶事不叙則政有得失政有得失則感動陰陽妖變為應陛下每引災自厚不責臣司臣司狃恩莫以為負狃音女九反詩曰將叔無狃注云狃習也言屢被恩貸不以災變為憂負也故天心未得隔并屢臻隔并謂水旱不節也尚書曰一極備凶一極亡凶并音必姓反青冀之域滛雨漏河漏溢也徐岱之濵海水盆溢兖豫蝗蝝滋生蝝螽子也荆揚稻收儉薄并凉二州羗戎叛戾加以百姓不足府帑虚匱自西徂東杼柚將空杼柚謂機也小雅大東詩曰小東大東杼柚其空也臣聞洪範五事一曰貎貎以恭恭作肅貎傷則狂而致常雨洪範五行傳辭春秋大水皆為君上威儀不穆臨莅不嚴臣下輕慢貴倖擅權陰氣盛彊陽不能禁故為滛雨陛下以不得親奉孝德皇園廟孝徳皇安帝父清河王慶也比遣中使致敬甘陵朱軒軿馬相望道路可謂孝至矣朱軒車使}
