  - {type: variant, offset: 6856, length: 174, content: 立言策崇明王略以急國艱豈云因亂假義以就違正之謀乎誠仁為己任期紓民於倉卒也及阻董昭之議以致非命豈數也夫世言荀君者通塞或過矣常以為中賢以下道無求備智筭有所研疎原始未必要末斯理之不可全詰者也夫以衞賜之賢一說而斃兩國彼非薄於仁而欲之蓋有全必有喪也斯又功之不兼者也方時運之屯邅非雄才無以濟其溺功高埶彊則皇器自移矣此又時之不可並也蓋取其歸正而已亦殺身以成仁之義, WYG: ''}
