  - {type: variant, offset: 3836, length: 2, content: 性寬, krp: 諫曰不可夫宣室者先帝之正處也非法度之正不得入焉上曰善更置酒北宫也元帝}
  - {type: variant, offset: 3839, length: 0, content: '', WYG: 薛廣德自刎之切元帝酎祭宗廟出便門欲御樓船御史大夫薛廣德當車免冠諫曰宜從橋詔曰大夫冠廣德曰陛下不聽臣臣自刎以血汙車輪帝乃從橋昔晉平公問於叔向曰國家之患孰為大對曰大臣重禄不極諫小臣畏罪不敢言下情不上通此患之大者公曰善於是下令曰吾欲進善有謁而不通罪至死此已上皆見新序今明詔崇高宗之德高宗殷王武丁也有雉登鼎耳而雊懼而修德位以永年推宋景之誠史記曰宋景公時熒惑守心星太史子韋請移之大臣國人與歲公皆不聼天感其誠熒惑為之退三舍也引咎克躬諮訪羣吏言事者見杜根成翊世等新蒙表錄顯列二臺謂杜根為侍御史成翊世為尚書郎也必承風饗應爭為切直若嘉謀異策宜輒納用如其管穴妄有譏刺管穴言小也史記扁鵲曰若以管窺天以隙視文隙即穴也雖苦口逆耳不得事實且優游寛容以示聖朝無諱之美若有道之士對問高者宜垂省覽特遷一等以廣直言之路書御有詔拜有道高第士沛國施延為侍中延後位至太尉謝承書曰延字君子蘄縣人也}
