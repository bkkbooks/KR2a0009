  - {type: variant, offset: 3664, length: 0, content: '', WYG: 正夏以為歲首也月令孟春天氣下降地氣上騰天地和同草木萌動東風解凍蟄蟲始振也三微成著以通三統統者統一歲之事王者三正遞用周環無窮故曰通三統三禮義宗曰三微三正也言十一月陽氣始施萬物動於黃泉之下微而未著其色皆赤赤者陽氣故周以天正為歳色尚赤夜半為朔十二月萬物始芽色白白者陰氣故殷以地正為歳色尚白雞鳴為朔十三月萬物始達其色皆黒人得加功以展其業夏以人正為歲色尚黑平旦為朔故曰三微王者奉而成之各法其一以改正朔也易乾鑿度曰三微而成著三著而體成當此之時天地交萬物通也周以天元殷以地元夏以人元若以此時行刑則殷周歲首皆當流血}
