  - {type: variant, offset: 3712, length: 0, content: '', WYG: 因過中之黄門侍郎鮑德素敬寵說憲弟夏陽侯瓌曰陳寵奉事先帝深見納任故久留臺閣賞賜有殊今不蒙忠能之賞而計幾微之故幾微言微細也誠傷輔政容貸之德瓌亦好士深然之故得出為太山太守後轉廣漢太守西州豪右并兼吏多姦貪訴訟日百數寵到顯用良吏王渙鐔顯等}
