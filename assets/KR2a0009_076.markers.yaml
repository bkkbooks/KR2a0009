  - {type: variant, offset: 3799, length: 3, content: 念況恃, WYG: 葬儻在於是寵愴然矜歎即勑縣盡收歛葬之自是哭聲遂絶及竇憲為大將軍征匈奴公卿以下及郡國無不遣吏子弟奉獻遺者而寵與中山相汝南張郴光武子中山王焉相也東平相應順東平王蒼孫敞之相也守正不阿後和帝聞之擢寵為大司農郴太僕順左馮翊永元六年寵代郭躬為廷尉性仁矜及為理官數議疑獄常親自為奏每附經典務從寛恕帝輒從之濟活者甚衆其深文刻敝於此少衰寵又鉤校律令條法溢於甫刑者除之鉤猶動也前書曰鉤校得其姦賊鉤音工候反溢出也孔安國注尚書曰呂侯後為甫侯故或稱甫刑也曰臣聞禮經三百威儀三千禮記曰禮經三百曲禮三千鄭𤣥注云禮篇多亡本數未聞其中事儀有三千也故甫刑大辟二百五刑之屬三千禮之所去刑之所取去禮之人刑以加之故曰取也失禮則入刑相為表裏者也今律令死刑六百一十耐罪千六百九十八耐者輕刑之名也贖罪以下二千六百八十一溢於甫刑者千九百八十九其四百一十大辟千五百耐罪七十九贖罪春秋保乾圖曰王者三百年一蠲法漢興以來三百二年憲令稍增科條無限又律有三家其說各異宜令三公廷尉平定律令應經合義者可使大辟二百而耐罪贖罪二千八百并為三千悉刪除其餘令與禮相應以易萬人視聽以致刑措之美傳之無窮未及施行會坐詔獄吏與囚交通抵罪詔特免刑拜為尚書遷大鴻臚寵歴二郡三卿所在有迹見稱當時十六年代徐防為司空寵雖傳法律而兼通經書奏議溫粹號為任職相在位三年薨以太常南陽尹勤代為司空勤字叔梁篤性好學屏居人外荆棘生門時人重其節後以定策立安帝封福亭侯五百戸永初元年以雨水傷稼策免就國病卒無子國除寵子忠忠字伯始永初中辟司徒府三遷廷尉正正廷尉屬官也秩千石也以才能有聲稱司徒劉愷舉忠明習法律宜備機密於是擢拜尚書使居三公曹成帝置五尚書三公曹尚書主知斷獄也忠自以世典刑法用心務在寛詳初父寵在廷尉上除漢法溢於甫刑者未施行上音時掌反及寵免後遂寢而苛法稍繁人不堪之忠畧依寵意奏上二十三條為決事比比例也必寐反以省請讞之敝又上除蠶室刑蠶室宮刑名也或云犗刑也音奇敗反作窨室畜火如蠶室說文曰犗騬牛也騬音繒漢}
