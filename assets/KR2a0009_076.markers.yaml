  - {type: variant, offset: 3828, length: 4, content: 歲餘復拜, WYG: 譬周昌為御史大夫嘗燕入奏事高帝方擁戚姬昌走出高帝逐得騎昌項問曰我何如主也昌仰曰陛下桀紂之主也上笑不之罪也孝文嘉爰盎人豕之譏文帝幸慎夫人常與皇后同坐後幸上林愼夫人從盎為中郎將却慎夫人坐愼夫人怒不坐帝亦起盎前說曰陛下為愼夫人適所以禍之也獨不見人豕乎上大悅人豕解見皇后紀也武帝納東方朔宣室之正武帝為館陶公主私人董偃置酒宣室東方朔為}
