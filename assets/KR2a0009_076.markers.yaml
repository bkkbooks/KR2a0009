  - {type: variant, offset: 4381, length: 1, content: 篇, WYG: 月是以春秋臣有大喪君三年不呼其門閔子雖要絰服事以赴公難退而致位以究私恩故稱君使之非也臣行之禮也自此已上至臣有大喪並公羊傳之文也閔子騫孔子弟子也遭喪君使之從軍騫乃要絰而服以從軍役事了退家致位喪次極盡私恩故君使之雖非臣從君命有禮也周室陵遲禮制不序蓼莪之人作詩自傷曰瓶之罄矣惟罍之恥小雅蓼莪之詩也蓼蓼長大貎也莪蘿也言孝子憂思中心不精不識莪蘿誤以為蒿也其詩曰蓼蓼者莪匪莪伊蒿哀哀父母生我劬勞瓶之罄矣惟罍之恥注云瓶小而罍大也罄盡也瓶小而盡罍大而盈言為罍恥者刺幽王不使富分貧衆恤寡也言已不得終竟子道者亦上之恥也高祖受命蕭何創制大臣有寧告之科合於致憂之義論語曾子曰吾聞夫子人未有自致者也必也親喪乎建武之初新承大亂凡諸國政多趣簡易大臣既不得告寧而羣司營祿念私鮮循三年之喪以報顧復之恩者禮義之方實為彫損大漢之興雖承衰敝而先王之制稍以施行故籍田之耕起於孝文}
