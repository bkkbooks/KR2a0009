  - {type: variant, offset: 98, length: 0, content: '', krp: 江京等而立濟隂王鎭率羽林士擊殺衞尉閻景以成大功事在宦者傳再遷尚書令太傅三公奏鎭冒犯白刃手劔賊臣姦黨殄滅宗廟以寧功比劉章章齊王肥子也高帝孫誅諸呂有功封朱虚侯也宜顯爵土以勵忠貞乃封鎭為定潁侯食邑二千戸拜河南尹轉廷尉免永建四年卒於家詔賜冢塋地長子賀當嗣爵讓與小弟時而逃去積數年詔大鴻臚下州郡追之賀不得已乃出受封累遷復至廷尉及賀卒順帝追思鎮功下詔賜鎭諡曰昭武侯賀曰成侯賀弟禎亦以能法律至廷尉鎭弟子僖許其反少明習家業兼好儒學有名譽延熹中亦為廷尉建寧二年代劉寵為太尉禧子鴻至司隸校尉封城安鄉侯郭氏自𢎞後數世皆傳法律子孫至公者一人廷尉七人侯者三人刺史二千石侍中}
