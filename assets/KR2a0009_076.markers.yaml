  - {type: variant, offset: 2932, length: 274, content: 號謚者宜稱上恩祭祀禮畢而後絕之至於一歲之限不合禮意又違先帝已然之法所未敢處初曹操攻屠鄴城袁氏婦子多見侵略而操子丕私納袁熙妻甄氏融乃與操書稱武王伐紂以妲己賜周公操不悟後問出何經典對曰以今度之想當然耳後操討烏桓又嘲之曰大將軍遠征蕭條海外昔肅慎不貢楛矢丁零盜蘇武牛羊可并案也時年飢兵興操表制酒禁融頻書爭之多侮慢之辭既見操雄詐漸著數不能堪故發辭偏宕多致乖忤又嘗奏宜準古王畿之制千里寰內不以封建諸侯操疑其所論建漸廣益憚之然以融名重天下外相容忍而潛忌正議慮鯁大業山陽郗慮承望風旨以微法奏免融官因顯明讎怨操故書激厲融曰蓋聞唐虞之朝有克讓之臣故麟鳳來而頌聲作也後世, WYG: 成三}
