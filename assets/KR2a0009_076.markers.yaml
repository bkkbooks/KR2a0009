  - {type: variant, offset: 4822, length: 399, content: 潛迎呂布布既至諸城悉應之邈乃使人譎彧曰呂將軍來助曹使君擊陶謙宜亟供軍實彧知邈有變即勒兵設備故邈計不行豫州刺史郭貢率兵數萬來到城下求見彧彧將往東郡太守夏侯惇等止之曰何知貢不與呂布同謀而輕欲見之今君為一州之鎮往必危也彧曰貢與邈等分非素結今來速者計必未定及其猶豫宜時說之縱不為用可使中立若先懷疑嫌彼將怒而成謀不如往也貢既見彧無懼意知城不可攻遂引而去彧乃使程昱說范東阿使固其守卒全三城以待操焉二年陶謙死操欲遂取徐州還定呂布彧諫曰昔高祖保關中光武據河內皆深根固本以制天下進可以勝敵退足以堅守故雖有困敗而終濟大業將軍本以兗州首事故能平定山東此實天下之要地而將軍之關河也若不先定之根本將何寄乎宜急分討陳宮使虜不得西顧乘其閒而收熟麥約食穀以資一舉則呂布不足破也今舍之而東未見其便多留兵則力不勝敵少留兵則後不足固布乘虛寇暴震動人心縱數城或全其餘非復己有則將軍尚安歸乎且前討徐州威罰實行其子弟念父兄之恥必人自為守就能破, WYG: 憐}
