  - {type: variant, offset: 83, length: 0, content: '', WYG: 行有伍部部有曲也今彭專軍别將有異於此兵事呼吸不容先關督帥且漢制棨㦸即為斧鉞於法不合罪有衣之㦸曰棨帝從躬議又有兄弟共殺人者而罪未有所歸帝以兄不訓弟故報兄重而減弟死中常侍孫章宣詔誤言兩報重尚書奏章矯制罪當腰斬帝復召躬問之躬對章應罸金帝曰章矯詔殺人}
  - {type: variant, offset: 83, length: 0, content: '', krp: 行有伍部部有曲也今彭專軍别將有異於此兵事呼吸不容先關督帥且漢制棨㦸即為斧鉞於法不合罪有衣之㦸曰棨帝從躬議又有兄弟共殺人者而罪未有所歸帝以兄不訓弟故報兄重而減弟死中常侍孫章宣詔誤言兩報重尚書奏章矯制罪當腰斬帝復召躬問之躬對章應罸金帝曰章矯詔殺人}
  - {type: variant, offset: 84, length: 2, content: 進輔, WYG: 謂罸金躬曰法令有故誤章傳命之繆於事為誤誤者其文則輕帝曰章與囚同縣疑其故也躬曰周道如砥其直如矢詩小雅也如砥貢賦平如矢賞罸平君子不逆詐論語孔子之言君王法天刑不可以委曲生意帝曰善遷躬廷尉正坐法免後三遷元和三年拜為廷尉躬家世掌法務在寛平及典理官決獄斷刑多依矜恕乃條諸重文可從輕者四十一事奏之事皆施行著于令章和元年赦天下繫囚在四月丙子以前減死罪一等勿笞詣金城而文不及亡命未發覺者躬上封事曰聖恩所以減死罪使戍邉者重人命也今死罪亡命無慮萬人廣雅曰無慮都凡也又自赦以來捕得甚衆而詔令不及皆當重論伏惟天恩莫不蕩宥死罪已下並蒙更生而亡命捕得獨不沾澤臣以為赦前犯死罪而繫在赦後者可皆勿笞詣金城以全人命有益於邊肅宗善之即下詔赦焉躬奏讞法科多所生全永元六年卒官中子晊亦明法律晊音質至南陽太守}
