  - {type: variant, offset: 5623, length: 577, content: 敵以謀於彧彧量紹雖強終為操所制乃說先取呂布然後圖紹操從之三年遂擒呂布定徐州五年袁紹率大衆以攻許操與相距紹甲兵甚盛議者咸懷惶懼少府孔融謂彧曰袁紹地廣兵彊田豐許攸智計之士為其謀審配逢紀盡忠之臣任其事顏良文醜勇冠三軍統其兵殆難克乎彧曰紹兵雖多而法不整田豐剛而犯上許攸貪而不正審配專而無謀逢紀果而自用顏良文醜匹夫之勇可一戰而擒也後皆如彧之籌事在袁紹傳操保官度與紹連戰雖勝而軍糧方盡書與彧議欲還許以致紹師彧報曰今穀食雖少未若楚漢在滎陽成皐閒也是時劉項莫肯先退者以為先退則埶屈也公以十分居一之衆畫地而守之搤其喉而不得進已半年矣情見埶竭必將有變此用奇之時不可失也操從之乃堅壁持之遂以奇兵破紹紹退走封彧萬歲亭侯邑一千戶六年操以紹新破未能為患但欲留兵衞之自欲南征劉表以計問彧彧對曰紹既新敗衆懼人擾今不因而定之而欲遠兵江漢若紹收離糾散乘虛以出則公之事去矣操乃止九年操拔鄴自領冀州牧有說操宜復置九州者以為冀部所統既廣則天下易服操將從之彧言曰今若依古制是為冀州所統悉有河東馮翊扶風西河幽并之地也公前屠鄴城海內震駭各懼不得保其土宇守其兵衆今若一處被侵必謂以次見奪人心易動若一旦生變天下未可圖也願公先定河北然後脩復舊京南臨楚郢責王貢之不入天下咸知公意則人人自安須海內大定乃議古制此社稷長久之利也操報曰微足下之相難所失多矣遂寑九州議十二年操上書表彧曰昔袁紹作逆連兵官度時衆寡糧單圖欲還, WYG: ''}
