  - {type: variant, offset: 103, length: 346, content: 進將誅閹官欲召并州牧董卓為助公業謂進曰董卓彊忍寡義志欲無猒若借之朝政授以大事將恣凶慾必危朝廷明公以親德之重據阿衡之權秉意獨斷誅除有罪誠不宜假卓以為資援也且事留變生殷鑒不遠又為陳時務之所急數事進不能用乃𠫓廾官去謂潁川人荀攸曰何公未易輔也進尋見害卓果作亂公業等與侍中伍瓊卓長史何顒共說卓以袁紹為勃海太守以發山東之謀及義兵起卓乃會公卿議大發卒討之羣僚莫敢忤旨公業恐其衆多益橫凶彊難制獨曰夫政在德不在衆也卓不悅曰如卿此言兵為無用邪公業懼乃詭詞更對曰非謂無用以為山東不足加大兵耳如有不信試為明公略陳其要今山東合謀州郡連結人庶相動非不強盛然光武以來中國無警百姓優逸忘戰日久仲尼有言不教人戰是謂𠫓廾之其衆雖多不能為害一也明公出自西州少為國將閑習軍事數踐戰埸名振當世人懷懾服二也袁本初公卿子弟生處京師張孟卓東, WYG: 正監}
