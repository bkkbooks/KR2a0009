  - {type: variant, offset: 4081, length: 297, content: 本意實為情欲發耳子之於母亦復奚為譬如寄物中出則離矣既而與衡更相贊揚衡謂融曰仲尼不死融荅曰顏回復生大逆不道宜極重誅書奏下獄𠫓廾市時年五十六妻子皆被誅初女年七歲男年九歲以其幼弱得全寄它舍二子方弈融被收而不動左右曰父執而不起何也荅曰安有巢毀而卵不破乎主人有遺肉汁男渴而飲之女曰今日之禍豈得久活何賴知肉味乎兄號泣而止或言於曹操遂盡殺之及收至謂兄曰若死者有知得見父母豈非至願乃延頸就刑顏色不變莫不傷之初京兆人脂習元升與融相善每戒融剛直及被害許下莫敢收者習往撫尸曰文舉舍我死吾何用生為操聞大怒將收習殺之後得赦出魏文帝深好融文辭每歎曰楊班儔也募天下有上融文章者輒賞以金帛所著詩頌碑文論議六言策文表檄教令書記凡, WYG: 節制服}
