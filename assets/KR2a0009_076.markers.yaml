  - {type: variant, offset: 3431, length: 231, content: 之相美不樂人之相傷是以區區思協歡好又知二君羣小所搆孤為人臣進不能風化海內退不能建德和人然撫養戰士殺身為國破浮華交會之徒計有餘矣融報曰猥惠書教告所不逮融與鴻豫州里比郡知之最早雖嘗陳其功美欲以厚於見私信於為國不求其覆過掩惡有罪望不坐也前者黜退懽欣受之昔趙宣子朝登韓厥夕被其戮喜而求賀況無彼人之功而敢枉當官之平哉忠非三閭智非鼂錯竊位為過免罪為幸乃使餘論遠聞所以慙懼也朱彭寇賈為世壯士愛惡相攻能為國憂至於輕弱薄劣猶昆蟲之相囓適足還害其身誠無所至也晉侯嘉其臣所爭者大而師曠, WYG: ''}
