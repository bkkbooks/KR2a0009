  - {type: variant, offset: 1550, length: 2, content: 鮮卑, WYG: 布戰布敗走因分定諸縣兖州遂平建安元年獻帝自河東還洛陽操議欲奉迎車駕徙都於許衆多以山東未定韓暹楊奉負功恣雎恣雎肆怒貌雎音火季反又火佳反史記盜跖日殺不辜暴戾恣雎未可卒制彧乃勸操曰昔晉文公納周襄王而諸侯景從左傳卜偃言於晉侯曰求諸侯莫如勤王諸侯信之且大義也晉侯以左師逆王王入於王城取太叔於温殺之於隰城遂定覇業天下服從也漢髙祖為義帝縞素而天下歸心項羽殺義帝於郴髙祖為義帝發䘮髙祖大哭發使告諸侯曰天下共立義帝北面事之今項羽放殺義帝大逆無道寡人親為發䘮兵皆縞素自天子䝉塵蒙冐也左傳臧文仲曰天子䝉塵於外敢不奔問官守將軍首唱義兵徒以山東擾亂未遑逺赴雖禦難於外乃心無不在王室尚書曰雖爾身在外乃心無不在王室乃汝也今鑾駕旋軫鄭𤣥注周禮曰軫輿後横木也東京榛蕪義士有存本之思兆人懐感舊之哀誠因此時奉主上以從人望大順也秉至公以服天下大略也扶𢎞義以致英雄大徳也四方雖有逆節其何能為韓暹楊奉安足恤哉若不時定使豪桀生心後雖為慮亦無}
