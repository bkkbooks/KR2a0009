  - {type: variant, offset: 1486, length: 8, content: 人阿堅羌渠等與南, WYG: 將軍逺征蕭條海外昔肅慎氏不貢楛矢國語曰昔武王剋商通于九夷百蠻於是肅慎氏貢楛矢石砮其長尺有咫肅慎國記曰肅慎氏其地在夫餘國北東濱大海魏畧曰挹婁一名肅慎氏說文曰楛木也今遼左有楛木狀如荆葉如榆也丁零盜蘇武牛羊可并案也山海經曰北海之内有丁零之國前書蘇武使}
