  - {type: variant, offset: 129, length: 4, content: 繼邑落各, WYG: 師友家語曰孔子謂南宫敬叔曰吾聞老􅅨博古而逹今通禮樂之源明道徳之歸即吾之師也今將往矣遂至周問禮於老􅅨焉則融與君累世通家衆坐莫不歎息太中大夫陳煒後至煒音于匭反坐中以告煒煒曰夫人小而聰了大未必竒融應聲曰觀君所言將不早慧乎膺大笑曰髙明必為偉器年十三䘮父哀悴過毁扶而後起州里歸其孝性好學博渉多該覽山陽張儉為中常侍侯覽所怨覽為刋章下州郡以名捕儉刋削也謂削去告人姓名劉攽曰正文案覽何能刋章下州郡葢是詔字張儉傳中可見也儉與融兄襃}
