  - {type: variant, offset: 40, length: 10, content: 號焉俗善騎射弋獵禽獸, WYG: 爪牙譬驅虎兕以赴犬羊七也又明公將帥皆中表腹心周旋日久恩信淳著忠誠可任智謀可恃以膠固之衆膠亦固也當解合之埶猶以烈風掃彼枯葉八也夫戰有三亡以亂攻理者亡以邪攻正者亡以逆攻順者亾今明公秉國平正討滅宦豎忠義克立以此三徳待彼三亾奉辭伐罪誰敢禦之九也東州鄭𤣥學該古今𤣥北海人故云東州北海邴原清髙直亮魏志原字根矩北海朱虛人也與管寧俱以􅋵尚稱皆儒生所仰羣士楷式彼諸將若詢其計畫足知彊弱且燕趙齊梁非不盛也終滅於秦吳楚七國非不衆也卒敗滎陽前書吴王濞楚王戊趙王遂淄川王賢濟南王辟光膠西王印膠東王雄渠景帝三年反大將軍條侯周亞夫將兵破之滎陽况今徳政赫赫股肱惟良彼豈讚成其謀造亂長寇哉其不然十也若其所陳少有可採無事徴兵以驚天下使患役之民相聚}
