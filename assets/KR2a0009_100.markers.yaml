  - {type: variant, offset: 2239, length: 1904, content: 仇賁滿頭等率種人詣闕朝賀慕義內屬帝封於仇賁為王滿頭為侯時漁陽赤山烏桓歆志賁等數寇上谷永平元年祭肜復賂偏何擊歆志賁破斬之於是鮮卑大人皆來歸附並詣遼東受賞賜青徐二州給錢歲二億七千萬為常明章二世保塞無事和帝永元中大將軍竇憲遣右校尉耿夔擊破匈奴北單于逃走鮮卑因此轉徙據其地匈奴餘種留者尚有十餘萬落皆自號鮮卑鮮卑由此漸盛九年遼東鮮卑攻肥如縣太守祭參坐沮敗下獄死十三年遼東鮮卑寇右北平因入漁陽漁陽太守擊破之延平元年鮮卑復寇漁陽太守張顯率數百人出塞追之兵馬掾嚴授諫曰前道險阻賊埶難量宜且結營先令輕騎偵視之顯意甚銳怒欲斬之因復進兵遇虜伏發士卒悉走唯授力戰身被十創手殺數人而死顯中流矢主簿衞福功曹徐咸皆自投赴顯俱歿於陣鄧太后策書襃歎賜顯錢六十萬以家二人為郎授福咸各錢十萬除一子為郎安帝永初中鮮卑大人燕陽詣闕朝賀鄧太后賜燕陽王印綬赤車參駕令止烏桓校尉所居宀心城下通胡市因築南北兩部質館鮮卑邑落百二十部各遣入質是後或降或畔與匈奴烏桓更相攻擊元初二年秋遼東鮮卑圍無慮縣州郡合兵固保清野鮮卑無所得攻扶黎營殺長吏四年遼西鮮卑連休等遂燒塞門寇百姓烏桓大人於秩居等與連休有宿怨共郡兵奔擊大破之斬首千三百級悉獲其生口牛馬財物五年秋代郡鮮卑萬餘騎遂穿塞入寇分攻城邑燒官寺殺長吏而去乃發緣邊甲卒黎陽營兵屯上谷以備之冬鮮卑入上谷攻居庸關復發緣邊諸郡黎陽營兵積射士步騎二萬人屯列衝要六年秋鮮卑入馬城塞殺長吏度遼將軍鄧遵發積射士三千人及中郎將馬續率南單于與遼西右北平兵馬會出塞追擊鮮卑大破之獲生口及牛羊財物甚衆又發積射士三千人馬三千匹詣度遼營屯守永寧元年遼西鮮卑大人烏倫其至鞬率衆詣鄧遵降奉貢獻詔封烏倫為率衆王其至鞬為率衆侯賜綵繒各有差建光元年秋其至鞬復畔寇居庸雲中太守成嚴擊之兵敗功曹楊穆以身捍嚴與俱戰歿鮮卑於是圍烏桓校尉徐常於馬城度遼將軍耿夔與幽州刺史龐參發廣陽漁陽涿郡甲卒分為兩道救之常夜得潛出與夔等并力並進攻賊圍解之鮮卑既累殺郡守膽意轉盛控弦數萬騎延光元年冬復寇鴈門定襄遂攻太原掠殺百姓二年冬其至鞬自將萬餘騎入東領候分為數道攻南匈奴於曼柏薁鞬日逐王戰死殺千餘人三年秋復寇高柳擊破南匈奴殺漸將王順帝永建元年秋鮮卑其至鞬寇代郡太守李超戰死明年春中郎將張國遣從事將南單于兵步騎萬餘人出塞擊破之獲其資重二千餘種時遼東鮮卑六千餘騎亦寇遼東玄菟烏桓校尉耿曄發緣邊諸郡兵及烏桓率衆王出塞擊之斬首數百級大獲其生口牛馬什物鮮卑乃率種衆三萬人詣遼東乞降三年四年鮮卑頻寇漁陽朔方六年秋耿曄遣司馬將胡兵數千人出塞擊破之冬漁陽太守又遣烏桓兵擊之斬首八百級獲牛馬生口烏桓豪人扶漱官勇健每與鮮卑戰輒陷敵詔賜號率衆君陽嘉元年冬耿曄遣烏桓親漢都尉戎朱廆率衆王侯咄歸等出塞抄擊鮮卑大斬獲而還賜咄歸等已下為率衆王侯長賜綵繒各有差鮮卑後寇遼東屬國於是耿曄乃移屯遼東無慮城拒之二年春匈奴中郎將趙稠遣從事將南匈奴骨都侯夫沈等出塞擊鮮卑破之斬獲甚衆詔賜夫沈金印紫綬及縑綵各有差秋鮮卑穿塞入馬城代郡太守擊之不能克後其至鞬死鮮卑抄盜差稀桓帝時鮮卑石槐者其父投鹿侯初從匈奴軍三年其妻在家生子投鹿侯歸怪欲殺之妻言嘗晝行聞雷震仰天視而雹入其口因吞之遂身十月而產此子必有奇異且宜長視投鹿侯不聽遂𠫓廾之妻私語家令收養焉名石槐年十四五勇健有智略異部大人抄取其外家牛羊石槐單騎追擊之所向無前悉還得所亡者由是部落畏服乃施法禁平曲直無敢犯者遂推以為大人石槐乃立庭於彈汗山歠仇水上去高柳北三百餘里兵馬甚盛東西部大人皆歸焉因南抄緣邊北拒丁零東卻夫餘西擊烏孫盡據匈奴故地東西萬四千餘里南北七千餘里網羅山川水澤鹽池永壽二年秋石槐遂將三四千騎寇雲中延熹元年鮮卑寇北邊冬使匈奴中郎將張奐率南單于出塞擊之斬首二百級二年復入鴈門殺數百人大抄掠而去六年夏千餘騎寇遼東屬國九年夏遂分騎數萬人入緣邊九郡並殺掠吏人於是復遣張奐擊之鮮卑乃出塞去朝廷積患之而不能制遂遣使持印綬封石槐為王欲與和親石槐不肯受而寇抄滋甚乃自分其地為三部從右北平以東至遼東接夫餘濊貊二十餘邑為東部從右北平以西至上谷十餘邑為中部從上谷以西至敦煌烏孫二十餘邑為西部各置大人主領之皆屬石槐靈帝立幽并涼三州緣邊諸郡無歲不被鮮卑寇抄殺略不可勝數熹平三年冬鮮卑入北地太守夏育率休著屠各追擊破之遷育為護烏桓校尉五年鮮卑寇幽州六年夏鮮卑寇三邊秋夏育上言鮮卑寇邊自春以來三十餘發請徵幽州諸郡兵出塞擊之一冬二春必能禽滅朝廷未許先是護羌校尉田晏坐事論刑被原欲立功自効乃請中常侍王甫求得為將甫因此議遣兵與育并力討賊帝乃拜晏為破鮮卑中郎將大臣多有不同乃召百官議朝堂議郎蔡邕議曰書戒猾夏易伐鬼方周有獫狁蠻荊之師漢有闐顏瀚海之事征討殊類所由尚矣然而時有同異埶有可否故謀有得失事有成敗不可齊也蓄藉, WYG: ''}
