  - {type: variant, offset: 1924, length: 0, content: '', WYG: 上書表彧曰昔袁紹作逆連兵官度時衆寡糧單圖欲還許尚書令荀彧深建宜往之便逺恢進討之略恢大也起發臣心革易愚慮堅營固守徼其軍實徼邀也音古堯反遂摧撲大寇濟危以安紹既破敗臣糧亦盡將舍河北之規改就荆南之䇿彧復備陳得失用移臣議故得反斾冀土左傳南轅反斾杜預曰軍門前大旂克平四州謂冀青幽并也向使臣退軍官度紹必鼓行而前鼓行謂鳴鼓而行言無所畏也敵人懐利以}
