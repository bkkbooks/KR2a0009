  - {type: variant, offset: 22, length: 2, content: 漢初, WYG: 未有孟賁之勇慶忌之㨗說苑曰孟賁水行不避蛟龍陸行不避虎狼發怒吐氣聲響動天許慎注淮南子曰孟賁衛人也吕氏春秋曰孟賁過河先於其伍船人怒以楫虓其頭不知其孟賁故也中河孟賁瞋目視船人髮植目裂舡中人盡播入河慶忌吴玉僚子也射之矢滿把不能中駟馬追之不能及聊城之守史記燕將攻下聊城因保守之齊將田單攻之嵗餘不下良平之謀可任以偏師責以成功四也就有其人而尊卑無序王爵不加若恃衆怙力怙亦恃也將各基峙峙止也劉攽曰案文基當作棊謂如棊不動作基無理以觀成敗不肯同心共膽與齊進退五也闗西諸郡頗習兵事自頃以来數與羌戰婦女猶戴㦸操矛挟弓負矢挟持也況其壯勇之士以當妄戰之人乎其勝可必六也且天下彊勇百姓所畏者有并涼之人劉攽曰案文多一有字緣者字生之及}
