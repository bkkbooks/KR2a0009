  - {type: variant, offset: 4150, length: 5, content: 閒官民俱匱, WYG: 董昭等昭字公仁濟隂人也欲共進操爵國公九錫備物禮含文嘉曰九錫一曰車馬二曰衣服三曰樂器四曰朱戸五曰納陛六曰虎賁百人七曰斧鉞八曰弓矢九曰秬鬯謂之九錫錫與也九錫皆如其徳左傳曰分魯公以大輅大旂夏后氏之璜封谷父之繁弱祝宗卜史備物典䇿密以訪彧彧曰曹公本興義兵以匡振漢朝雖勳庸崇著猶秉忠貞之節君子愛人以徳不宜如此事遂寢禮記曰君子之愛人也以徳細人之愛人也以姑息也操心不能平㑹南征孫權表請彧勞軍于譙因表留彧曰臣聞古之遣將上設監督之重下建副二之任史記齊景公以田穰苴為將軍扞燕苴曰臣素卑賤擢之閭伍之中加之大夫之上士卒未附百姓不信權輕願得君之寵臣國之所尊以監軍}
