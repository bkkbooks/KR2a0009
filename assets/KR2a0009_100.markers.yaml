  - {type: variant, offset: 1212, length: 7, content: 復置烏桓校尉誠, WYG: 隐郊祀之事以崇國防五年南陽王馮東海王祗薨並獻帝子帝傷其早殁欲為修四時之祭以訪於融融對曰聖恩敦睦感時増思悼二王之靈發哀愍之詔稽度前典以正禮制竊觀故事前梁懐王臨江愍王齊哀王臨淮懐王並薨無後同産昆弟即景武昭明四帝是也梁懐王相景帝弟也立十年薨臨江愍王榮武帝兄也為皇太子四嵗廢為王坐侵廟壖地自殺齊懐王閎武帝子昭帝異母兄立八年薨臣賢案齊哀王悼恵王之子髙帝之孫非昭帝兄弟當為懐王作哀者誤也臨淮公衡明帝弟建武十五年立未及進爵為王而薨融家傳及本傳皆作公此為王者亦誤也未聞前朝修立祭祀若臨時所施則不列傳紀臣愚以為諸在沖齓聖慈哀悼禮同成人加以號謚者宜稱上恩稱音尺證反祭祀禮畢而後絶之至於一嵗之限不合禮意又違先帝已然之法所未敢處處猶安也初曹操攻屠鄴城袁氏婦子多見侵畧而操子丕私納袁熙妻甄氏袁紹傳熙紹之中子也甄氏中山無極人漢太保甄邯後也父逸上蔡令魏畧曰熙出在幽州甄氏侍姑及鄴城破文帝入紹舍后怖伏姑膝上帝令舉頭就視見其顔色非凡太祖聞其意為迎取之融乃與操書稱武王伐紂以妲己賜周公妲音丁末反又音旦紂之妃}
