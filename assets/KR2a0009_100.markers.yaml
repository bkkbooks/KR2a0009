  - {type: variant, offset: 1503, length: 1, content: 畔, WYG: 見論語知同其愛訓誨發中言曹公與己同愛郗慮故發於中心而訓誨雖懿伯之忌猶不得念禮記檀弓曰滕成公之䘮使子叔敬叔弔子服惠伯為介及郊為懿伯之忌不入惠伯曰政也不可以叔父之私不將公事遂入鄭𤣥注曰懿伯惠伯之叔父也忌怨也况恃舊交而欲自外於賢吏哉賢吏謂慮也輒布腹心脩好如初苦言至意終身誦之嵗餘復拜太中大夫性寛容少忌好士喜誘益後進及退閑職太中大夫職在言議故云閑職賓客日盈其門常歎曰坐上客常滿尊中酒不空吾無憂矣與蔡邕素善邕卒後有虎賁士貎類於邕漢官典職儀曰虎賁}
