  - {type: variant, offset: 938, length: 2, content: 姓流, WYG: 仞而跛牂牧其上矣樓季而難五丈之限豈跛牂而易百仞之髙哉峭漸之勢異也爾雅曰羊牝曰牂易曰天險不可升地險山川丘陵也案表䟦扈擅誅列侯遏絶詔命斷盜貢篚鄭𤣥注儀禮曰篚竹器如筐也書曰厥篚𤣥纁璣組招呼元惡以自營衛專為羣逆主萃淵藪書曰今商王受}
