  - {type: variant, offset: 445, length: 0, content: '', WYG: 今青州臨昫縣東北為賊管亥所圍融逼急乃遣東莱太史慈求救於平原相劉備吴志慈字子義東莱人也避事之}
  - {type: variant, offset: 445, length: 0, content: '', krp: 今青州臨昫縣東北為賊管亥所圍融逼急乃遣東莱太史慈求救於平原相劉備吴志慈字子義東莱人也避事之}
  - {type: variant, offset: 447, length: 0, content: '', WYG: 北海相孔融聞而竒之數遣人訊問其母并致餉遺時融為管亥所圍慈從遼東還母謂之曰汝與孔北海未甞相見至汝行後贍恤殷勤過於故舊今為賊所圍汝宜赴之慈單歩見融既而求救於劉備得兵以解圍焉備驚曰孔北海乃復知天下有劉備邪即遣兵三千救之賊乃散走時袁曹方盛而融無所協附左丞黄祖者稱有意謀勸融有所結納融知紹操終圖漢室不欲與同故怒而殺之融負其髙氣志在靖難而才踈意廣迄無成功迄竟也在郡六年劉備表領青州刺史建安元年為袁譚所攻自春至夏戰士所餘裁數百人流矢雨集戈矛内接融隠几讀書隠憑也莊子曰南郭子綦隠几而坐談笑自若城夜䧟乃奔山東妻子為譚所虜及獻帝都許徴融為將作大匠遷少府每朝㑹訪對融輒引正定議公卿大夫皆𨽻名而已說文云𨽻附著初太傅馬日磾奉使山東及至淮南數有意於袁術術輕侮之遂奪取其節求去又不聽因欲逼為軍師日磾深自恨遂嘔血而斃三輔決錄曰日磾字翁叔馬融之族子少傳融業以才學進與楊彪盧植蔡邕等典校中書歴位九卿遂登台輔厭帝春秋曰術從日磾借節觀之因奪不還條軍中十餘人使促辟之日磾謂術曰卿先代諸公辟士云何而言促之謂公府掾可劫得乎從術求去而術不遣既以失節屈辱憂恚及䘮還朝廷議欲加禮融乃獨議曰日磾以上公之尊秉髦節之使銜命直指直指無屈撓也前書有錦衣直指寧輯東夏輯和也而曲媚姦臣為所牽率章表署用輒使首名所上章表及署補用皆以日磾名為首也附下罔上前書曰附下罔上者刑姦以事君左傳叔向曰姦以事君者吾所能禦昔國佐當晉軍而不撓公羊傳曰鞌之戰齊師大敗齊侯使國佐如師郤克曰與我紀侯之甗及魯衛之侵地使耕者東}
