  - {type: variant, offset: 455, length: 0, content: '', WYG: 佐曰與我紀侯之甗請諾使反魯衛之侵請諾使耕者東西其畆是則土齊也蕭同叔子者齊君母也齊君母猶晉君之母也曰不可請戰一戰而不勝請再戰再戰而不勝請三戰三戰而不勝則齊國盡子之有也何必蕭同叔子為質揖而去之劉攽曰注及魯衛之侵地使耕者東西其畆又云使反魯衛之侵請諾使耕者東西其畆案公羊本文及當作反又但云東其畆多西字下文又多一使字却少一地字及多一西字宜僚臨白刃而正色楚白公勝欲為亂謂石乞曰王卿士皆以五百}
