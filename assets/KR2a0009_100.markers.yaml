  - {type: variant, offset: 1497, length: 3, content: 部句龍, WYG: 傳秦伯之弟鍼如晉脩成叔向命召行人子員行人子朱曰朱也當御三云叔向不應子朱怒曰班爵同何以黜朱於朝撫劍從之叔向曰秦晉不和乆矣今日之事幸而集晉國頼之不集三軍暴骨子員道二國之言無私子常易之姦以事君者}
  - {type: variant, offset: 1497, length: 3, content: 部句龍, krp: 傳秦伯之弟鍼如晉脩成叔向命召行人子員行人子朱曰朱也當御三云叔向不應子朱怒曰班爵同何以黜朱於朝撫劍從之叔向曰秦晉不和乆矣今日之事幸而集晉國頼之不集三軍暴骨子員道二國之言無私子常易之姦以事君者}
  - {type: variant, offset: 1501, length: 1, content: 斯, WYG: 所能禦也拂衣從之人救之平公曰晉其庶乎吾臣之所争者大師曠曰公室懼卑臣不心競而力争也性既遲緩與人無傷雖出胯下之負韓信貧賤淮隂少年侮之令信出胯下榆次之辱史記荆軻甞㳺榆次與葢聶論劍葢聶怒而目之荆軻出去不知貶毁之扵已猶蚊虻之過也蚊音文虻音䖟蚊虻之暫過未以為害子産謂人心不相似左傳曰子産謂子皮曰人心不同其如面焉吾豈敢謂子面如吾面乎或矜埶者欲以取勝為榮不念宋人待四海之客大鑪不欲令酒酸也鑪累土為之以居酒瓮四邉隆起一面髙如鍜鑪故名鑪字或作壚韓子曰宋人有沽酒者斗槩甚平遇客甚謹為酒甚羙而酒不售酒酸者怪其故問所知閭長者楊倩二人曰汝狗猛耶曰狗猛何故不售曰人畏焉令孺子懐錢挈壼往沽狗逆齕之酒所以酸而不售至於屈糓巨瓠堅而無竅當以無用罪之耳韓子曰齊有居士田仲宋人屈糓往見之曰糓聞先生之義不待仰人而食今糓有樹瓠之法堅如石厚而無竅願獻先生田仲曰夫子徒謂我也凡貴於樹瓠者為可以盛也今厚而無竅則不可以盛物而任堅如石則不可以割而斟吾無以此瓠為也將棄之今仲不待仰人而食亦無益人國亦堅瓠之類它者奉尊嚴教不敢失墜郗為故吏融所推進趙衰之拔郤縠左傳晉文公謀元帥趙衰曰郤縠可乃使郤縠將中軍不輕公叔之升臣也公叔文子衛大夫其家臣名僎行與文子同升之於公與之並為大夫僎音士眷}
