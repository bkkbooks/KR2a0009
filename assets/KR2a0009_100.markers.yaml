  - {type: variant, offset: 4234, length: 2, content: 世宗, WYG: 衛賜之賢一說而斃兩國兩國謂齊與吳也端木賜字子貢衛人也田常欲伐魯仲尼令出使勸田常伐吴常許之賜又至吴請夫差伐齊又之越說勾踐將兵助吴又之晉說以兵待吴伐齊之弊吴既勝齊與晉争强晉果敗吴越襲其後遂殺夫差故子貢一出存魯亂齊破吴强晉覇越彼非薄於仁而欲之葢有全必有䘮也斯又功之不兼者也子貢不欲違仁義而致晉但其事不兼濟也言彧豈願强曹氏令代漢哉事不得已也方時運之屯邅易曰屯如邅如邅音竹連反非雄才無以濟其溺功髙埶彊則皇器自移矣謂魏太祖功業大而}
