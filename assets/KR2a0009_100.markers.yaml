  - {type: variant, offset: 4285, length: 167, content: 主兵利馬疾過於匈奴昔段熲良將習兵善戰有事西羌猶十餘年今育晏才策未必過熲鮮卑種衆不弱于曩時而虛計二載自許有成若禍結兵連豈得中休當復徵發衆人轉運無已是為耗竭諸夏并力蠻夷夫邊垂之患手足之蚧搔中國之困背之瘭疽方今郡縣盜賊尚不能禁況此醜虜而可伏乎矣豈與蟲螘校狡寇計爭往來哉雖或破之豈可殄盡而方今令本朝為之旰食乎昔淮南王安諫伐越曰天子之兵有征無戰, WYG: 誰佐直轡直道也}
