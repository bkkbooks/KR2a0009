  - {type: variant, offset: 1507, length: 0, content: '', krp: 主武賁千五百人融每酒酣引與同坐曰雖無老成人且有典刑詩大雅曰雖無老成人尚有典刑也融聞人之善若出諸已言有可採必演而成之面告其短而退稱所長薦達賢士多所奬進知而未言以為己過故海内英俊皆信服之曹操既積嫌忌而郗慮復搆成其罪遂令丞相軍謀祭酒路粹典畧曰粹字文蔚陳留人少學於蔡邕建安初以髙第擢拜尚書郎後為軍謀祭酒與陳琳阮瑀等典記室融誅之後人覩粹所作無不嘉其才而忌其筆也枉狀奏融曰少府孔融昔在北海見王室不静而招合徒衆欲規不軌云我大聖之後而見滅於宋史記曰魯大夫孟釐子曰孔丘聖人之後滅於宋服䖍注曰聖人謂商湯也孔子六代祖孔父嘉為宋華督所殺其子奔魯也有天下者何必卯金刀及與孫權使語謗訕朝廷訕音所諫反訕謂謗毁也蒼頡篇曰訕非也又融為九列不遵朝議秃巾㣲行謂不加幘唐突宮掖又前與白衣襧衡跌蕩放言跌蕩無儀檢也放縱也云父之於子當有何親論其本意實為情欲發耳子之於母亦復奚為譬如寄物瓶中說文曰瓶缶也字書曰瓶似缶而髙出則離矣既而與衡更相賛揚衡謂融曰仲尼不死融答曰顔囬復生大逆不道宜極重誅書奏下獄棄市時年五十六妻子皆被誅初女年七歳男年九歳以其幼弱得全寄它舍二子方奕棊融被收而不動左右曰父執而不起何也答曰安有巢毁而卵不破乎主人有遺肉汁男渇而飲之女曰今日之禍豈得久活何頼知肉味乎兄號泣而止或言於曹操遂盡殺之及收至謂兄曰若死者有知得見父母豈非至願乃延頸就刑顔色不變莫不傷之初京兆人脂習元升與融相善每戒融剛直魏畧曰曹操為司空威徳日盛融故以舊意書䟽倨傲習常賁融令改節融不從之及被害許下莫敢收者習往撫尸曰文舉舍我死吾何用生為操聞大怒將收習殺之後得赦出魏文帝深好融文辭歎曰楊班儔也募天下有上融文章者輒賞以金帛所著詩頌碑文論議六言䇿文表檄教令書記凡二十五篇文帝以習有欒布之節加中散大夫前書曰欒布梁人也為梁王彭越大夫使於齊未反漢誅越梟首雒陽下布還奏事越頭下祠而哭之論曰昔諫大夫鄭昌有言山有猛獸者藜藿為之不採宣帝時司𨽻校尉葢寛饒以直言得罪鄭昌愍傷寛饒忠直憂國以言事不當意而為文吏所詆挫故上書訟之是以孔父正色不容弑虐之謀公羊傳曰孔父正色而立于朝則人莫敢過而致難於其君者孔父可謂義形於色矣平仲立朝有紓盜齊之望紓音舒解也緩也盜齊謂田常也莊子曰田成子一旦弑齊君而盜其國左傳齊景公坐於路寢公歎曰羙哉室其誰有此乎晏子對曰如君之言其陳氏乎公曰是可若何對曰唯禮可以已之若夫文舉之髙志直情其足以動義槩而忤雄心忤逆也故使移鼎之迹事隔於人存移鼎謂遷漢之鼎也人存謂曹􅋵身在不得簒位也左傳曰桀有昏徳鼎遷于商商紂暴虐鼎遷于周代終之規啓機於身後也代終謂代漢祚之終也身後謂曹丕受禪也夫嚴氣正性覆折而已豈有員园委屈可以每其生哉园即刓字音五丸反前書音義曰刓謂刓團無稜角也每貪也言寧正直以傾覆摧折不能委曲以貪生也賈誼曰品庶每生懔懔焉皜皜焉其與琨玉秋霜比質可也懔懍言勁烈如秋霜也皜皜言堅貞如白玉也皜音古老反荀彧傳荀彧字文若袁宏漢紀彧作郁潁川潁隂人朗陵令淑之孫也朗陵縣屬汝南郡故城在今豫州朗山縣西南父緄為濟南相緄音古本反緄畏憚宦官乃為彧娶中常侍唐衡女典畧曰衡欲以女妻汝南傅公明公明不取轉以妻彧彧以少有才名故得免於譏議南陽何顒名知人見彧而異之曰王佐才也中平六年舉孝廉再遷亢父令亢父縣屬梁國故城在今兗州任城縣南亢音剛父音甫董卓之亂棄官歸郷里同郡韓融時將宗親千餘家避亂密西山中密縣西山也彧謂父老曰潁川四戰之地也四面通也天下有變常為兵衝密雖小固不足以扞大難宜亟避之亟音紀力反郷人多懐土不能去㑹冀州牧同郡韓馥遣騎迎之彧乃獨將宗族從馥留者後多為董卓將李傕所殺畧焉彧比至冀州而袁紹已奪馥位紹待彧以上賓之禮彧明有意數數計數也劉攽曰案文但云明有意數不成文史筆不如此葢有一聰字見漢室崩亂毎懐匡佐之義時曹操在東郡彧聞操有雄畧而度紹終不能定大業初平二年乃去紹從操操與語大恱曰吾子房也比之}
  - {type: variant, offset: 1508, length: 1, content: 耽, WYG: 良以為奮武司馬時年二十九明年又為操鎮東司馬興平元年操東}
  - {type: variant, offset: 1508, length: 1, content: 耽, krp: 良以為奮武司馬時年二十九明年又為操鎮東司馬興平元年操東}
  - {type: variant, offset: 1510, length: 0, content: '', WYG: 陶謙使彧守甄城縣名屬齊東郡今濮州縣也甄今作鄄音絹任以留事㑹張邈陳宫以兗州反操典畧宫字公臺東郡人剛直烈壯少與海内知名之士皆相連結也而潜迎呂布布既至諸城悉應之邈乃使人譎彧譎詐也曰呂將軍来助曹使君擊陶謙宜亟供軍實彧知邈有變即勒兵設備故邈計不行豫州刺史郭貢率兵數萬来到城下求見彧彧將往東郡太守夏侯惇等止之魏志曰惇字元譲沛國人曰何知貢不與呂布同謀而輕欲見之今君為一州之鎮往必危也彧曰貢與邈等分非素結今来速者計未必定及其猶豫宜時說之縱不為用可使中立不令其有去就也若先懐疑嫌彼將怒而成謀不如往也貢既見彧無懼意知城不可攻遂引而去彧乃使程昱說范東阿魏志昱字仲徳東郡東阿人范縣屬東郡今濮陽縣也東阿縣屬東郡今濟州縣也使固其守卒全三城以待操焉三城謂甄范東阿也二年陶謙死操欲遂取徐州還定呂布彧諫曰昔髙祖保闗中髙祖拒項羽常留蕭何守關中光武據河内皆深根固本以制天下進可以勝敵退足以堅守故雖有困敗而終濟大業將軍本以兖州首事故能平定山東曹操初從東郡守鮑信等迎領兖州牧遂進兵}
