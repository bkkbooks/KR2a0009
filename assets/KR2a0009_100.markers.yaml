  - {type: variant, offset: 933, length: 1, content: 郡, krp: 國體宜且諱之體謂國家之大體也何者萬乗至重天王至尊身為聖躬國為神器老子曰天下神器不可為也陛級}
  - {type: variant, offset: 935, length: 2, content: 損壞, WYG: 逺祿位限絶賈誼曰人主之尊譬如堂羣臣如陛衆庶如地故陛乃九級上廉逺地則髙堂也猶天之不可階日月之不可踰也論語曰夫子之不可及也猶天之不可階而升也又曰仲尼如日月無得而踰焉每有一豎臣輒去圖之若形之四方非所以杜塞邪萌形見也愚謂雖有重戾必宜隐忍賈誼所謂擲䑕忌器盖謂此也前書賈誼曰里諺云欲投䑕而忌器此善諭也鼠近於器尚惮不投恐傷其器况乎貴臣之近主乎是以齊兵次楚唯責包茅左傳齊桓伐楚責以包茅不入王祭不供無以縮酒杜預注曰包裹束也茅菁茅也束茅而灌之以酒為縮酒也王師敗績不書晉人公羊傳成公元年秋王師敗績于眢戎孰敗之葢晉敗之曷為不言晉敗之王者無敵莫敢當也前以露袁術之罪今復下劉表之事是使跛牂欲闚髙岸天險可得而登也史記李斯曰故城髙五丈而樓季不輕犯也太山之髙}
  - {type: page-break, offset: 935, content: '', id: KR2a0009_WYG_100-13b, image: WYG0253/WYG0253-0396d.png}
