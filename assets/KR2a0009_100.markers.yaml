  - {type: variant, offset: 464, length: 4, content: 敬鬼神祠, WYG: 公子遂即襄仲也鄭人討幽公之亂斵子家之棺左傳鄭子家卒鄭人討幽公之亂斵子家之棺而逐其族杜預注曰斵薄其棺不使從卿禮為其殺君故也聖上哀矜舊臣未忍追案不宜加禮朝廷從之而論者多欲復肉刑融乃建議曰古者敦龎善否不别左傳楚申叔時曰人生敦龎杜預注龎厚大也吏端刑清端直也政無過失百姓有罪皆自取之末世陵遲風化壊亂政撓其俗法害其人故曰上失其道民散久矣而欲䋲之以古刑投之以殘棄殘其支體而棄廢之非所謂與時消息者也易曰}
