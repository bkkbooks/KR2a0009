  - {type: variant, offset: 1496, length: 0, content: '', WYG: 單于徙北海上丁零盜蘇武牛羊武遂窮戹也時年飢兵興操表制酒禁融頻書爭之多侮慢之辭融集與操書云酒之為徳久矣古先哲王類帝禋宗和神定人以濟萬國非酒莫以也故天垂酒星之耀地列酒泉之郡人著㫖酒之徳堯不千鍾無以建太平孔非百觚無以堪上聖樊噲解戹鴻門非豕肩鍾酒無以奮其怒趙之厮養東迎其王非引巵酒無以激其氣髙祖非醉斬白蛇無以暢其靈景帝非醉幸唐姬無以開中興袁盎非醇醪之力無以脫其命定國不酣飲一斛無以決其法故酈生以髙陽酒徒著功於漢屈原不餔糟歠醨取困於楚由是觀之酒何負於政哉又書曰昨承訓答陳二代之禍及衆人之敗以酒亡者實如来誨雖然徐偃王行仁義而亡今令不絶仁義燕噲以讓失社稷今令不禁謙退魯因儒而損今令不棄文學夏商亦以婦人失天下今令不斷婚姻而將酒獨急者疑但惜糓耳非以亡王為戒也既見操雄詐漸著數不能堪故發辭偏宕多致乖忤偏邪跌宕不拘正理又甞奏宜凖古王畿之制千里寰内不以封建諸侯周禮方千里曰國畿其外五百里侯畿鄭𤣥注畿限也操疑其所論建漸廣益憚之然以融名重天下外相容忍而潜忌正議慮鯁大業山陽郗慮續漢書慮字鴻豫山陽髙平人少受學於鄭𤣥虞浦江表傳曰獻帝甞時見慮及少府孔融問融曰鴻豫何所優長融曰可與適道未可與權慮舉笏曰融昔宰北海政散人流其權安在遂與融互相長短以至不穆曹操以書和解之慮從光祿勲遷御史大夫劉攽曰注獻帝嘗時見慮案文時當作特承望風旨以㣲法奏免融官因顯明讎怨操故書激厲融曰葢聞唐虞之朝有克讓之臣尚書曰舜以伯禹為司空禹讓稷契暨臯陶以益為朕虞益讓于朱虎熊羆以伯夷為秩宗伯夷讓于夔龍故麟鳳来而頌聲作也史記曰於是禹興九韶之樂致異物鳳皇来儀後世徳薄猶有殺身為君若齊孟陽代君居牀以待賊西漢紀信乗黄屋誑楚之類也破家為國若要離焚妻子以徇吴李通誅宗族以從漢之類也及至其敝睚眦之怨必讎一餐之惠必報史記范雎一餐之徳必償睚眦之怨必報故鼂錯念國遘禍於袁盎景帝時錯為御史大夫以諸侯國大請削其土吴楚七國反以誅錯為名袁盎素與錯不相善盎乃進說請斬錯以謝七國景帝遂斬錯也屈原悼楚受譛於椒蘭屈平楚懐王時為三閭大夫秦昭王使張儀譎詐懐王令絶齊交又誘請㑹武闗平諫王不聽其言卒客死於秦懐王子子椒子蘭䜛之於襄王而放逐之見史記彭寵傾亂起自朱浮朱浮與寵不相能數譛之光武寵遂反鄧禹威損失於宗馮鄧禹征赤眉令宗欽馮愔守栒邑二人爭權相攻遂殺欽因反擊禹今流俗本宗誤作宋也由此言之喜怒怨愛禍福所因可不慎與音余昔廉藺小國之臣猶能相下趙惠文王與秦昭王㑹黽池歸拜藺相如為上卿位在亷頗右頗曰吾不忍為之下必辱之相如每朝常避之頗聞之肉􅃝負荆謝之相與為刎頸之交事見史記寇賈倉卒武夫屈節崇好光武不問升伯之怨齊侯不疑射鉤之虜公子紏與桓公争立管仲射桓公中鈎後桓公即位以管仲為相也夫立大操者豈累細故哉往聞二君有執法之平以為小介介猶蔕芥也公法雖平私情為蔕芥者也當收舊好而怨毒漸積志相危害聞之憮然中夜而起憮音舞憮失意貌也昔國家東遷文舉盛歎鴻豫名實相副綜逹經學出於鄭𤣥又明司馬法史記齊威王使大夫追論古者司馬法其法論田及兵之法也鴻豫亦稱文舉竒逸博聞誠怪今者與始相違孤與文舉既非舊好又於鴻豫亦無恩紀然願人之相羙不樂人之相傷是以區區思協歡好又知二君羣小所搆孤為人臣進不能風化海内退不能建徳和人然撫養戰士殺身為國破浮華交㑹之徒計有餘矣融報曰猥惠書教猥曲也告所不逮融與鴻豫州里比鄰山陽與魯郡相鄰比知之最早雖甞陳其功羙欲以厚於見私信於為國不求其覆過掩惡有罪望不坐也前者黜退懽欣受之昔趙宣子朝登韓厥夕被其戮喜而求賀宣子趙盾謚也國語曰宣子言韓厥於靈公以為司馬河曲之役趙宣子使人以其乗車干行韓厥執而戮之衆咸曰韓厥必不沒矣其主朝升之而暮戮其車其誰安之宣子召而禮之謂諸大夫曰二三子可以賀我矣吾舉厥也中吾乃今知免於罪矣况無彼人之功而敢枉當官之平哉忠非三閭即屈原也掌王族三姓曰昭屈景故曰三閭智非鼂錯竊位為過免罪為幸乃使餘論逺聞所以慙懼也朱彭寇賈為世壯士愛惡相攻能為國憂至於輕弱薄劣猶昆蟲之相囓適足還害其身夏小正云昆衆也孫卿子曰昆蟲亦有知誠無所至也晉侯嘉其臣所爭者大而師曠以為不如心競}
