  - {type: variant, offset: 4210, length: 0, content: '', WYG: 軍事至濡須濡須水名也在今和州歴陽縣西南吳錄曰孫權聞操来夹水立塢狀如偃月以相拒月餘乃退彧病留壽春壽春縣屬淮南郡今夀州郡也操饋之食發視之乃空器也於是飲藥而卒時年五十獻帝春秋董承之誅伏后與父完書言司空殺董承帝方}
  - {type: variant, offset: 4210, length: 0, content: '', krp: 軍事至濡須濡須水名也在今和州歴陽縣西南吳錄曰孫權聞操来夹水立塢狀如偃月以相拒月餘乃退彧病留壽春壽春縣屬淮南郡今夀州郡也操饋之食發視之乃空器也於是飲藥而卒時年五十獻帝春秋董承之誅伏后與父完書言司空殺董承帝方}
  - {type: variant, offset: 4211, length: 1, content: 富, WYG: 報怨完得書以示彧彧惡之隐而不言完以示其妻弟樊普普封以呈太祖太祖隂為之備彧恐事覺欲自發之因求使至鄴勸太祖以女配帝太祖曰今朝廷有伏后吾女何得配上彧曰伏后無子性又凶邪往甞與父書言辭醜惡可因此廢也太祖曰卿昔何不道之彧陽驚曰昔已甞為公言也太祖曰此豈小事而吾忘之太祖以此恨彧而外含容之至董昭建魏公議彧意不同欲言之於太祖乃齎璽書犒軍飲享禮畢彧請間太祖知彧欲言揖而遣之遂不得留之卒於夀春帝哀惜之祖日為之廢讌樂祖日謂祭祖神之日因為讌樂也風俗通曰共工氏之子曰修好逺遊祀以為祖神漢以午日祖謚曰敬侯明年操遂稱魏公云論曰自遷帝西京山東騰沸詩曰百川沸騰天下之命倒懸矣趙岐注孟子曰倒懸猶困苦也荀君乃越河冀間闗以從曹氏間闗猶展轉也察其定舉措立言䇿措置也崇明王略以急國艱豈云因亂假義以就違正之謀乎言彧本心不背漢也誠仁為己任期紓}
