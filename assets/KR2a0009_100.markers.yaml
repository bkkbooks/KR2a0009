  - {type: variant, offset: 565, length: 1, content: 土, WYG: 左足及文王即位和又奉其璞玉人又曰石也又刖其右足文王薨成王即位和乃抱其璞而哭於楚山之下三日三夜泣盡而繼以血王使玉人攻璞而得寳焉荆王封和為陵陽侯和辭不就而去乃作怨歌琴操曰進寳得刑足離分兮去封立信守休芸兮斷者不續豈不寃兮智如孫臏史記孫臏與龎涓學兵法涓事魏惠王為將軍自以不能及臏隂使召臏斷其兩足而黥之臏後入齊威王問兵法以為師魏與趙攻韓齊使田忌將而往龎涓聞去韓而歸臏謂田忌曰三晉之兵素悍勇而輕齊軍半至使齊軍入魏地為十萬竈明日為五萬竈明日為二萬竈龎涓行三日大喜曰我固知齊卒怯入吾地三日士卒亡者過半矣乃棄其歩兵與其輕銳倍日并行逐之孫子度其行暮當至馬陵馬陵道狭旁}
