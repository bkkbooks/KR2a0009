  - {type: variant, offset: 458, length: 5, content: 魂神歸岱山, WYG: 若得之可以當五百人矣乃從白公而見之與言悦告之故辭承之以劍不動事見左傳王室大臣豈得以見脅為辭又袁術僣逆非一朝一夕日磾隨從周旋歴歳漢律與罪人交闗三日已上皆應知情春秋魯叔孫得臣卒以不發揚襄仲之罪貶不書日公羊傳曰叔孫得臣卒何休注曰不日者知公子遂欲殺君而為人臣知賊而不言明當誅}
