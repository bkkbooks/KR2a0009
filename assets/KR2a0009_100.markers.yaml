  - {type: variant, offset: 51, length: 0, content: '', WYG: 非棄徳恃衆自虧威重卓乃悦以公業為將軍使統諸軍討擊闗東或說卓曰鄭公業智畧過人而結謀外寇今資之士馬就其黨與竊為明公懼之卓乃收還其兵留拜議郎卓既遷都長安天下饑亂士大夫多不得其命而公業家有餘資日引賔客髙㑹倡樂所膽救者甚衆乃與何顒荀攸共謀殺卓}
