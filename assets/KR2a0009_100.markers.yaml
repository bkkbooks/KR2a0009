  - {type: variant, offset: 814, length: 3, content: 將嚴尤, WYG: 副校尉矯制發諸國兵斬郅支單于於都賴水上魏尚之守邉文帝時尚為靈中守坐上首虜差六級下吏削爵趙人馮唐為郎為言文帝赦尚復為雲中守也無所復施也漢開改惡之路凡為此也故明徳之君逺度深惟棄短就長不茍革其政者也朝廷善之卒不改焉是時荆州牧劉表不供職貢多行僣偽遂乃郊祀天地擬斥乗輿斥指也詔書班下其事融上疏曰竊聞}
