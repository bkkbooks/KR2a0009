  - {type: variant, offset: 430, length: 0, content: '', WYG: 忤卓􅈲轉為議郎時黄巾寇數州而北海最為賊衝卓乃諷三府同舉融為北海相融到郡收合士民起兵講武馳檄飛翰引謀州郡賊張饒等羣軰二十萬衆從冀州還融逆擊為饒所敗乃收散兵保朱虛縣稍復鳩集吏民為黄巾所誤者男女四萬餘人更置城邑立學校表顯儒術薦舉賢良鄭𤣥彭璆邴原等璆音巨秋反又音求郡人甄子然臨孝存知名早卒融恨不及之乃命配食縣社其餘雖一介之善莫不加禮焉郡人無後及四方㳺士有死亡者皆為棺具而歛葬之時黄巾復来侵暴融乃出屯都昌都昌縣}
  - {type: page-break, offset: 430, content: '', id: KR2a0009_WYG_100-7b, image: WYG0253/WYG0253-0393d.png}
  - {type: variant, offset: 430, length: 0, content: '', krp: 忤卓旨轉為議郎時黄巾寇數州而北海最為賊衝卓乃諷三府同舉融為北海相融到郡收合士民起兵講武馳檄飛翰引謀州郡賊張饒等羣軰二十萬衆從冀州還融逆擊為饒所敗乃收散兵保朱虛縣稍復鳩集吏民為黄巾所誤者男女四萬餘人更置城邑立學校表顯儒術薦舉賢良鄭𤣥彭璆邴原等璆音巨秋反又音求郡人甄子然臨孝存知名早卒融恨不及之乃命配食縣社其餘雖一介之善莫不加禮焉郡人無後及四方㳺士有死亡者皆為棺具而歛葬之時黄巾復来侵暴融乃出屯都昌都昌縣}
