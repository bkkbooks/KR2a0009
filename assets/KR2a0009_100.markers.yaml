  - {type: variant, offset: 1513, length: 0, content: '', WYG: 要地而將軍之闗河也若不先定之根本將何寄乎宜急分討陳宫使虜不得西顧乗其間而收熟麥約食稸糓以資一舉則呂布不足破也今舍之而東未見其便多留兵則力不勝敵少留兵則後不足固布乗虛寇暴震動人心縱數城或全其}
