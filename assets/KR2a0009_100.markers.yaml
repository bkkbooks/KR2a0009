  - {type: variant, offset: 234, length: 0, content: '', WYG: 告融見其有窘色窘迫也謂曰兄雖在外吾獨不能為君主邪因留舍之舍止也後事泄國相以下密就掩捕儉得脱走遂并收襃融送獄二人未知所坐融曰保納舍藏者融也當坐之襃曰彼来求我非弟之過請甘其罪吏問其母母曰家事任長妾當其辜一門爭死郡縣疑不能決乃上讞之前書音義曰讞請也音宜傑反詔書竟坐襃焉融由是顯名與平原陶邱洪陳留邉譲齊聲稱州郡禮命皆不就辟司徒楊賜府時隠覈官僚之貪濁者將加貶黜融多舉中官親族尚書畏迫内寵召掾屬詰責之融陳對罪惡言無阿撓撓曲也音乃孝反河南尹何進當遷為大將軍楊賜遣融奉謁賀進不時通融即奪謁還府投劾而去河南官屬恥之私遣劍客欲追殺融客有言於進曰孔文舉有重名融家傳曰客言於進曰孔文舉於時英雄特傑譬諸物類猶衆星之有北辰百榖之有黍稷天下莫不屬目也將軍若造怨此人則四方之士引領而去矣不如因而禮之可以示廣於天下進然之既}
