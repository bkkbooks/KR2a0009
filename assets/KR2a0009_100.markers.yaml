  - {type: variant, offset: 15, length: 2, content: 烏桓, WYG: 鄭太傳鄭太字公業河南開封人司農衆之曽孫也開封縣故城在今汴州南少有才畧靈帝末知天下將亂隂交結豪桀家富於財有田四百頃而食常不足名聞山東初舉孝廉三府辟公車徴皆不就及大將軍何進輔政徴用名士以公業為尚書侍郎續漢志曰尚書凡六曹侍郎三十六人四百石一曹有六人主作文書起草遷侍御史進將誅閹宦欲召并州牧董卓為助公業謂進曰董卓彊忍寡義志欲無猒若借之朝政授以大事借音子夜反將恣凶慾必危朝廷明公以親徳之重據阿衡之權秉意獨斷誅除有罪誠不宜假卓以為資援也且事㽞變生殷鍳不逺又為陳時務之所急數事進不能用乃棄官去謂潁川人荀攸曰何公未易輔也進尋見害卓果作亂公業等與侍中伍瓊卓長史何顒共說卓以袁紹為勃海太守以發山東之謀及義兵起卓乃㑹公卿議大發卒討之羣僚莫敢忤􅈲公業恐其衆多益横凶彊難制獨曰夫政在徳不在衆也卓不悅曰如卿此言兵為無用邪公業懼乃詭詞更對曰詭猶詐也非謂無用以為山東不足加大兵耳如有不信試為明公畧陳其要今山東合謀州郡連結人庻相動非不强盛然光武以来中國無警百姓優逸忘戰日久仲尼有言不教人戰是謂棄之其衆雖多不能為害一也明公出自西州少為國將閑習軍事數踐戰塲名振當世人懐懾服二也袁本初公卿子弟生處京師張孟卓東平長}
