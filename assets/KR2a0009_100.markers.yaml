  - {type: variant, offset: 18, length: 1, content: 本, WYG: 孟卓名邈坐不闚堂言不妄視也孔公緒孔伷清談髙論噓枯吹生枯者噓之使生生者吹之使枯言談論有所抑揚也並無軍旅之才執銳之幹臨鋒決敵非公之儔三也山}
