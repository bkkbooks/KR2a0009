  - {type: variant, offset: 5931, length: 3, content: 徙左翊, krp: 詔曰昔歳五穀登衍鄭𤣥注周禮云五穀黍稷麥麻尗也登成也衍饒也音以戰反今兹蠶麥善収其大赦天下方盛夏長養之時蕩滌宿惡以報農功百姓勉務桑稼以備災害吏敬厥職無令愆墯閏月甲午南廵狩幸南陽祠章陵日北至又祠舊宅北至夏至也禮畢召校官弟子作雅樂奏鹿鳴校學也鹿鳴詩小雅篇名宴羣臣嘉賔之詩帝自御塤箎和之以娛嘉賔鄭𤣥注周禮云塤燒土為之大如鴈子鄭衆曰有六孔世本曰暴辛公作箎以竹為之長尺四寸有八孔還幸南頓勞饗三老官屬冬十月徵淮陽}
