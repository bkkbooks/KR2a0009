  - {type: variant, offset: 3833, length: 894, content: 亦欲以柔道行之乃悉為舂陵宗室起祠堂有五鳳皇見於潁川之郟縣十二月至自章陵是歲莎車國遣使貢獻十八年春二月蜀郡守將史歆叛遣大司馬吳漢率二將軍討之圍成都甲寅西巡狩幸長安三月壬午祠高廟遂有事十一陵歷馮翊界進幸蒲坂祠后土夏四月甲戌癸酉車駕還宮癸酉甲戌詔曰今邊郡盜穀五十斛罪至於死開殘吏妄殺之路其蠲除此法同之內郡遣伏波將軍馬援率樓船將軍段志等擊交阯賊徵側等戊甲申幸河內戊子至自河內五月旱盧芳復亡入匈奴秋七月吳漢拔成都斬史歆等壬戌赦益州所部殊死已下冬十月庚辰幸宜城還祠章陵十二月乙丑車駕還宮是歲罷州牧置刺史十九年春正月庚子追尊孝宣皇帝曰中宗始祠昭帝元帝於太廟成帝哀帝平帝於長安舂陵節侯以下四世於章陵妖巫單臣傅鎮等反據原武遣太中大夫臧宮圍之夏四月拔原武斬臣鎮等伏波將軍馬援破交阯斬徵側等因擊破九真賊都陽等降之閏月戊申進趙齊魯三國公爵為王六月戊申詔曰春秋之義立子以貴東海王陽皇后之子宜承大統皇太子彊崇執謙退願備藩國父子之情重久違之其以彊為東海王立陽為皇太子改名莊秋九月南巡狩壬申幸南陽進幸汝南南頓縣舍置酒會賜吏人復南頓田租歲父老前叩頭言皇考居此日久陛下識知寺舍每來輒加厚恩願賜復十年帝曰天下重器常恐不任日復一日安敢遠期十歲乎吏人又言陛下實惜之何言謙也帝大笑復增一歲進幸淮陽梁沛西南夷寇益州郡遣武威將軍劉尚討之越巂太守任貴謀叛十二月劉尚襲貴誅之是歲復置函谷關都尉修西京宮室二十年春二月戊子車駕還宮夏四月庚辰大司徒戴涉下獄死大司空竇融免五月辛亥大司馬吳漢薨匈奴寇上黨天水遂至扶風六月庚寅廣漢太守蔡茂為大司徒太僕朱浮為大司空壬辰左中郎將劉隆為驃騎將軍行大司馬事乙未徙中山王輔為沛王秋東夷韓國人率衆詣樂浪內附冬十月東巡狩甲午幸魯進幸東海楚沛國十二月匈奴寇天水壬寅車駕還宮是歲省五原郡徙其吏人置河東復濟陽縣傜役六歲二十一年春正月武威將軍劉尚破益州夷平之夏四月安定屬國胡叛屯聚青山遣將兵長史陳訢討平之秋鮮卑寇遼東遼東太守祭肜大破之冬十月遣伏波將軍馬援出塞擊烏桓不克匈奴寇上谷中山其冬鄯善王車師王等十六國皆遣子入侍奉獻願請都護帝以中國初定未遑外事乃還其侍子厚加賞賜二十二年春閏月丙戌幸長安祠高廟遂有事十一陵二月己巳至自長安, WYG: ''}
