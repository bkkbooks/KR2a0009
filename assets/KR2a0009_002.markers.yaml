  - {type: variant, offset: 5887, length: 0, content: '', WYG: 五日乃去秋八月戊辰改大樂為大予樂尚書璇璣鈐曰有帝漢出德洽作樂名予故據璇璣鈐改之漢官儀曰大予樂令一人秩六百石壬申晦日有食之詔曰朕奉承祖業無有善政日月薄蝕彗孛見天水旱不節稼穡不成人無宿儲下生愁墊儲積也墊溺也音丁念反雖夙夜勤思而智能不逮昔楚莊無災以致戒懼説苑曰楚莊王見天不見妖而地不出孽則禱于山川曰天其忘余歟此能求過于天必不逆諌矣魯哀禍大天不降譴春秋感精符曰魯哀公時政彌亂絶不日食政亂之類當致日食之變而不應者譴之何益告之不悟故哀公之篇絶無日食之異今之動變儻尚可救有司勉思厥職以匡無德古者卿士獻詩百工箴諫國語曰天子聽政公卿至於庶士獻詩師箴百工諫庶人傳語近臣盡規而後王斟酌事焉其言事者靡有所諱冬十月蒸祭光武廟禮記曰冬祭曰蒸蒸衆也冬物畢成可祭者衆初奏文始五行武德之舞前書曰文始舞者本舜韶舞也高祖六年更名曰文始其舞人執羽籥五行者本周舞也秦始皇二十六年更名曰五行其舞人冠冕衣服法五行色武德者高祖四年作言行武以除亂也其舞人執千戚光武草創禮樂未備今始奏之故云初也甲子車駕從皇太后幸章陵觀舊廬十二月戊辰至自章陵是歲起北宮及諸官府京師及郡國七大水四年春二月辛亥詔曰朕親耕藉田以祈農事禮記曰天子親耕於東郊為藉田千畝冕而朱紘躬秉耒耜五經要義曰天子藉田以供上帝之粢盛所以先百姓而致孝敬也藉蹈也言親自蹈履于田而耕之續漢志云正月始耕既事告祠先農漢舊儀曰先農即神農炎帝也祠以太牢百官皆從皇帝親執耒耜而耕天子三推三公五孤卿十大夫十二士庶人終畝乃致藉田倉置令丞以給祭天地宗廟以為粢盛京師冬無宿雪春不燠沐燠暖也音於六反沐潤澤也言無暄潤之氣也煩勞羣司積精禱求積精猶儲積也説文云告事求福曰禱而比再得時雨宿麥潤澤其賜公卿半奉有司勉遵時政務平刑罰秋九月戊寅千乗王建薨冬十月乙卯司徒郭丹司空馮魴免丙辰河南尹范遷為司徒太僕伏恭為司空十二月陵鄉侯梁松下獄死坐縣飛書誹謗五年春二月庚戍驃騎將軍東平王蒼罷歸藩琅邪王京就國冬十月行幸鄴與趙王栩㑹鄴常山三老言於帝曰上生於元氏願䝉優復詔曰豐沛濟陽受命所由加恩報德適其宜也今永平之政百姓怨結而吏人求復令人愧笑重逆此縣之拳拳重難也拳拳猶勤勤也禮記曰得一善則拳拳服膺而不息其復元氏縣田租更賦六歳勞賜縣掾史及門䦨走卒續漢志曰五伯鈴下待閣門闌部署街里走卒皆有程品多少随所典領至自鄴十一月北匈奴寇五原十二月寇雲中南單于擊却之是歳發遣邊人在内郡者賜裝錢人二萬六}
