  - {type: variant, offset: 6155, length: 243, content: 辰司空張純薨夏四月癸酉車駕還宮己卯大赦天下復嬴博梁父奉高勿出今年田租芻改年為中元行幸長安戊子祀長陵五月乙丑至自長安六月辛卯太僕馮魴為司空乙未司徒馮勤薨是夏京師醴泉涌出飲之者固疾皆愈惟眇蹇者不瘳又有赤草生於水崖郡國頻上甘露羣臣奏言地祇靈應而朱草萌生孝宣帝每有嘉瑞輒以改元神爵五鳳甘露黃龍列為年紀蓋以感致神祇表彰德信是以化致升平稱為中興今天下清寧靈物仍降陛下情存損挹推而不居豈可使祥符顯慶沒而無聞宜令太史撰集以傳來世帝不納常自謙無德每郡國所上輒抑而不當故史官罕得記焉秋郡國三蝗冬十月辛未司隸, WYG: 巳}
