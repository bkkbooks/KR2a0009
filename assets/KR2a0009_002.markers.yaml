  - {type: punctuation, offset: 6852, content: ：, id: KR2a0009_ZHSJ_002-bkkpn1668}
  - {type: variant, offset: 6854, length: 358, content: 南頓君初為濟陽令以建平元年十二月甲子夜生光武於縣舍有赤光照室中欽異焉使卜者王長占之長辟左右曰此兆吉不可言是歲縣界有嘉禾生一莖九穗因名光武曰秀明年方士有夏賀良者上言哀帝云漢家歷運中衰當再受命於是改號為太初元年稱陳聖劉太平皇帝以厭勝之及王莽篡位忌惡劉氏以錢文有金刀故改為貨泉或以貨泉字文為白水真人後望氣者蘇伯阿為王莽使至南陽遙望見舂陵郭唶曰氣佳哉鬱鬱葱葱然及始起兵還舂陵遠望舍南火光赫然屬天有頃不見初道士西門君惠李守等亦云劉秀當為天子其王者受命信有符乎不然何以能乘時龍而御天哉贊曰炎正中微大盜移國九縣飆回三精霧塞人厭淫詐神思反德光武誕命靈貺自甄沈幾先物深略緯文尋邑百萬貔虎為羣長轂雷野高鋒彗雲英威既振新都自焚虔劉庸代紛紜梁趙三河未澄四關重擾神旌乃顧遞行天討金湯失險車書共道靈慶既啟人謀咸贊明明廟謨赳赳雄斷於赫有命系隆我漢, WYG: 證}
