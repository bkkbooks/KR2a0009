  - {type: variant, offset: 5822, length: 5, content: 出繫囚庚申, WYG: 死是嵗始迎氣於五郊續漢書曰迎氣五郊之兆四方之兆各依其位中央之兆在未壇皆三尺立春之日迎春於東郊祭青帝勾芒車服皆青歌靑陽八佾舞雲翹之舞立夏之日迎夏於南郊祭赤帝祝融車服皆赤歌朱明八佾舞雲翹之舞先立秋十八日迎黄靈於中兆祭黄帝后土車服皆黃歌朱明八佾舞雲翹育命之舞立秋之日迎秋於西郊祭白帝蓐收車服皆白歌白藏八佾舞育命之舞立冬之日迎冬於北郊祭黒帝𤣥㝠車服皆黑歌𤣥㝠八佾舞育命之舞少府隂就子豐殺其妻酈邑公主就坐自殺酈縣屬南陽郡酈音櫟三年春正月癸巳詔曰朕奉郊祀登靈臺見史官正儀度儀謂渾儀以銅為之置於靈臺王者正天文之器也度謂日月星辰之行度也史官即太史掌天文之官也夫春者歲之始也始得其正則三時有成正謂日月五星不失其次也三時謂春夏秋左傳曰務其三時比者水旱不節邊人食寡政失於上人受其咎有司其勉順時氣勸督農桑去其螟蜮以及蝥賊爾雅曰食苖心曰螟食根曰蝥蜮一名短狐今之水弩含沙射人為災言此者欲令臣下順時行政勿侵擾也詳刑愼罰明察單辭單辭猶偏辭也夙夜匪懈以稱朕意二月甲寅太尉趙憙司徒李訢免丙辰左馮翊郭丹為司徒己未南陽太守虞延為太尉甲子立貴人馬氏為皇后皇子炟音丁逹反為皇太子}
