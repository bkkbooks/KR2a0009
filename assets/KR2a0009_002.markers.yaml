  - {type: variant, offset: 180, length: 1, content: 陵, WYG: 右庻長十二左更十三中更大夫十四右更十五小上造十六大上造十七駟車庻長十八大庻長十九闗内侯二十徹侯人賜爵者有罪得贖貧者得賣與人三老孝悌力田人三級三老孝悌力田三者皆郷官之名三老高帝置孝悌力田高后置所以勸導鄉里助成風化也文帝詔曰孝悌天下之大順也力田為生之本也三老衆人之師也其以户口率置員事見前書爵過公乘得移與子若同産同産子漢置賜爵自公士已上不得過公乗故過者得移授也同産同母兄弟也及流人無名數欲自占者人一級無名數謂無文簿也占謂自歸首也劉攽曰及流人無名數案他處詔書皆上有脱無名數則云及流人云云此無故不當有及字三年詔亦無可互驗鰥寡孤獨篤癃粟人十斛其施刑及郡國徒在中元元年四月己卯赦前所犯而後捕繫者悉免其刑又邉人遭亂為内郡人妻在己卯赦前一切}
