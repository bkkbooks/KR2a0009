  - {type: variant, offset: 5919, length: 0, content: '', WYG: 宫東平王蒼琅邪王京從駕來朝皇太后七年春正月癸卯皇太后隂氏崩二月庚申葬光烈皇后秋八月戊辰北海王興薨是歳北匈奴遣使乞和親八年春正月己卯司徒范遷薨漢官儀曰遷字子馬沛人也三月辛卯太尉虞延為司徒衞尉趙憙行太尉事遣越騎司馬鄭衆報使北匈奴初置度遼將軍屯五原曼柏武帝拜范明友為度遼将軍至此復置焉以中郎將吳常行度遼將軍曼柏縣在今勝州銀城縣也秋郡國十四雨水冬十月北宫成丙子臨辟雍養三老五更禮畢詔三公募郡國中都官死罪繫囚減罪一等勿笞詣度遼將軍營屯朔方五原之邊縣妻子自隨便占著邊縣占著謂附名藉父母同産欲相代者恣聽之其大逆無道殊死者一切募下蠶室亡命者令贖罪各有差凡徙者賜弓弩衣糧壬寅晦日有食之既既盡也詔曰朕以無德奉承大業而下貽人怨上動三光日食之變其災尤大春秋圖讖所為至譴春秋感精符曰人主含天光據璣衡齊七政操八極故君明聖人道得正則日月光明五星有度日明則政理不明則政亂故常戒以自勑厲日食皆象君之進退為盈縮當春秋撥亂日食三十六故曰至譴也劉攽曰正文春秋圖讖所為至譴案文為當作謂永思厥咎在予一人羣司勉修職事極言無諱於是在位者皆上封事各言得失宣帝始令羣臣得奏封事以知下情封有正有副領尚書者先發副封所言不善屏而不奏後魏相奏去副封以防壅蔽帝覽章深自引咎乃以所上班示百官詔曰羣僚所言皆朕之過人寃不能理吏黠不能禁而輕用人力繕修}
