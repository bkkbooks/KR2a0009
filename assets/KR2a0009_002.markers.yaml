  - {type: variant, offset: 6626, length: 1, content: 六, WYG: 四十八遣詔無起寢廟藏主於光烈皇后更衣别室禮藏主於廟既不起寢廟故藏於后之易衣别室更易也帝初作壽陵制令流水而已石槨廣一丈二尺長二丈五尺無得起墳東觀記曰陵東北作廡長三丈五歩外為小厨財足祠祀劉攽曰註案三丈五歩不成文理當作五尺萬年之後埽地而祭杅水脯糒而已説文曰杅飲器音于方言曰盌謂之盂説文曰糒乾飯也過百日惟四時設奠置吏卒數人供給灑掃勿開修道敢有所興作者以擅議宗廟法從事前書曰擅議宗廟者棄市帝遵奉建武制度無敢違者後宮之家不得封侯與政東觀記曰光武閔傷前代權臣大盛外戚與政上濁明主下危臣子后族隂郭之家不過九卿親屬榮位不能及許史王氏之半耳劉攽曰注上濁明主案文當作上濁主明館陶公主光武女為子求郎不許而賜錢千萬謂羣臣曰郎官上應列宿出宰百里史記曰太㣲宮後二十五星郎位也茍非其人則民受其殃是以難之故吏稱其官民安其業逺近肅服户口滋殖焉論曰明帝善刑理法令分明日晏坐朝幽枉必逹内外無倖曲之私在上無矜大之色斷獄得情號居前代}
