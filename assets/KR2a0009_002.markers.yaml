  - {type: variant, offset: 5906, length: 0, content: '', WYG: 詔曰昔禹収九牧之金鑄鼎以象物使人知神姦不逄惡氣夏禹之時令遠方圖畫山川竒異之物使九州之牧貢金鑄鼎以象之令人知鬼神百物之形状而備之故人入山林川澤魑魅罔兩莫能逄之惡氣謂罔兩之類事見左傳遭德則興遷於商周周德既衰鼎乃淪亡史記曰周鼎亡入泗水中秦始皇過彭城齋戒欲出周鼎於泗水使千人沒水求之不得祥瑞之降以應有德方今政化多僻何以致兹易曰鼎象三公易曰鼎折足覆公餗豈公卿奉職得其理邪太常其以礿祭之日禮記曰夏祭曰礿音藥礿薄也夏物未成祭尚薄陳鼎於廟以備器用賜三公帛五十匹九卿二千石半之先帝詔書禁人上事言聖而間者章奏頗多浮詞自今若有過稱虛譽尚書皆宜抑而不省示不為謟子蚩也冬十月行}
