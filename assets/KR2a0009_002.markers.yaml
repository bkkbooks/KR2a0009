  - {type: variant, offset: 2997, length: 409, content: 室尊事天子享國永長為後世法故詩云大啟爾宇為周室輔高祖聖德光有天下亦務親親封立兄弟諸子不違舊章陛下德橫天地興復宗統襃德賞勳親睦九族功臣宗室咸蒙封爵多受廣地或連屬縣今皇子賴天能勝衣趨拜陛下恭謙克讓抑而未議羣臣百姓莫不失望宜因盛夏吉時定號位以廣藩輔明親親尊宗廟重社稷應古合舊厭塞衆心臣請大司空上輿地圖太常擇吉日具禮儀制曰可夏四月戊申以太牢告祠宗廟丁巳使大司空融告廟封皇子輔為右翊公英為楚公陽為東海公康為濟南公蒼為東平公延為淮陽公荊為山陽公衡為臨淮公焉為左翊公京為琅邪公癸丑追謚兄伯升為齊武公兄仲為魯哀公六月庚午復置屯騎長水射聲三校尉官改青巾左校尉為越騎校尉詔下州郡檢覈墾田頃畝及戶口年紀又考實二千石長吏阿枉不平者冬十一月甲戌大司徒歐陽歙下獄死十二月庚午關內侯戴涉為大司徒盧芳自匈奴入居高柳是歲驃騎大將軍杜茂免虎牙大將軍蓋延薨十六年春二月交阯女子徵側反略有城邑三月辛丑晦日有蝕之秋九月河南尹張伋及諸郡守十餘人坐度田不實皆下獄死, WYG: ''}
  - {type: variant, offset: 2997, length: 409, content: 室尊事天子享國永長為後世法故詩云大啟爾宇為周室輔高祖聖德光有天下亦務親親封立兄弟諸子不違舊章陛下德橫天地興復宗統襃德賞勳親睦九族功臣宗室咸蒙封爵多受廣地或連屬縣今皇子賴天能勝衣趨拜陛下恭謙克讓抑而未議羣臣百姓莫不失望宜因盛夏吉時定號位以廣藩輔明親親尊宗廟重社稷應古合舊厭塞衆心臣請大司空上輿地圖太常擇吉日具禮儀制曰可夏四月戊申以太牢告祠宗廟丁巳使大司空融告廟封皇子輔為右翊公英為楚公陽為東海公康為濟南公蒼為東平公延為淮陽公荊為山陽公衡為臨淮公焉為左翊公京為琅邪公癸丑追謚兄伯升為齊武公兄仲為魯哀公六月庚午復置屯騎長水射聲三校尉官改青巾左校尉為越騎校尉詔下州郡檢覈墾田頃畝及戶口年紀又考實二千石長吏阿枉不平者冬十一月甲戌大司徒歐陽歙下獄死十二月庚午關內侯戴涉為大司徒盧芳自匈奴入居高柳是歲驃騎大將軍杜茂免虎牙大將軍蓋延薨十六年春二月交阯女子徵側反略有城邑三月辛丑晦日有蝕之秋九月河南尹張伋及諸郡守十餘人坐度田不實皆下獄死, krp: ''}
