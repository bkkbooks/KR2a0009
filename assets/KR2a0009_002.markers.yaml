  - {type: variant, offset: 6020, length: 0, content: '', WYG: 癃貧無家屬不能自存者粟人三斛詔曰昔曽閔奉親竭歡致養曽參字子輿閔損字子騫並孔子弟子皆有孝行也仲尼葬子有棺無槨論語曰鯉也死有棺而無槨䘮貴致哀禮存寧儉今百姓送終之制競為奢靡生者無擔石之儲而財力盡於墳土前書音義曰擔音丁濫反言一擔之儲方言作甔云罃也齊東北海岱之間謂之甔郭璞注曰所謂家無甔石之儲者也埤蒼曰大罌也字或作儋音丁甘反伏臘無糟糠而牲牢兼於一奠史記曰秦德公始為伏祠歴忌曰伏者何也金氣伏藏之日也四氣代謝皆以相生至于立秋以金代火金畏于火故庚日必伏月令孟冬之月臘先祖説文云臘冬至後祭百神始皇更臘曰嘉平奠䘮祭也糜破積世之業以供終朝之費子孫饑寒絶命於此豈祖考之意哉又車服制度恣極耳目田荒不耕游食者衆㳺食謂浮食者有司其申明科禁宜於今者宣下郡國秋七月乙亥司空伏恭罷乙未大司農牟融為司空冬十月司隸校尉王康下獄死是歳天下安平人無徭役嵗比登稔百姓殷富粟斛三十牛羊被野十三年春二月帝耕於藉田禮畢賜觀者食三月河南尹薛昭下獄死夏四月汴渠成辛巳行幸滎陽廵行河渠乙酉詔曰自汴渠決敗六十餘嵗王景傳曰平帝時汴河決壞加頃年以來雨水不時汴流東侵日月益甚水門故處皆在河中漭瀁廣溢莫測坼岸圻堮也蕩蕩極望不知綱紀今兖豫之人多被水患乃云縣官不先人急好興它役又或以為河流入汴幽冀䝉利故曰左隄彊則右隄傷左右俱彊則下方傷宜任水埶所之使人隨高而處公家息壅塞之費百姓無陷溺之患議者不同南北異論朕不知所從乆而不決今既築隄理渠絶水立門河汴分流復其舊迹陶丘之北漸就壤墳爾雅曰丘再成曰陶丘孫炎曰形如累兩盂也郭璞曰今濟隂定陶城中有陶丘也尚書曰厥土為壤下土墳壚孔安國曰無塊曰壤墳起也故薦嘉玉絜牲以禮河神禮記曰凡祭玉曰嘉玉儀禮曰絜牲剛鬛東過洛汭歎禹之績水北曰汭洛汭洛水入河處也績功也河洛皆禹所加功故歎之今五土之宜反其正色周禮曰山林川澤丘陵墳衍原隰謂之五土也色謂其黄白青黑之類孔安國曰水所去土復其性也濵渠下田賦與貧人無令豪右得固其利濵近也豪右大家也庶繼世宗瓠子之作瓠子隄名也武帝元封二年發卒數萬人塞瓠子決河沈白馬玉璧令羣臣皆負薪塡河在今濮州濮陽縣西也因遂度河登太行進幸上黨壬寅車駕還宫冬十月壬辰晦日有食之三公免冠自劾制曰冠履勿劾災異屢見咎在朕躬憂懼遑遑未知其方將有司陳事多所隠諱使君上壅蔽下有不暢乎昔衛有忠臣靈公得守其位論語孔子曰衛靈公無道季康子曰夫如是奚其不䘮孔子曰仲叔圉治賔客祝佗主宗廟王孫賈主軍旅夫如是奚其䘮今何以和穆隂陽消伏災譴刺史太守詳刑理寃存恤鰥孤勉思職焉十一月楚王英謀反廢國除遷於涇縣涇縣屬丹陽郡今宣州縣故城在縣東有涇水出蕪湖因水立名所連及死徙者數十人是歳齊王石薨十四年春三月甲戍司徒虞延免自殺夏四月丁巳鉅鹿太守南陽邢穆為司徒穆字綏公宛人前楚王英自殺夏五月封故廣陵王荆子元夀為廣陵侯初作夀陵十五年春二月庚子東廵狩辛丑幸偃師詔亡命自殊死以下贖死罪縑四十匹右趾至髠鉗城旦舂十匹完城旦至司㓂五匹犯罪未發覺詔書到日自告者半入贖徵沛王輔㑹睢陽進幸彭城癸亥帝耕於下邳三月徵琅邪王京㑹良成良成縣名屬東海故城在今泗州下邳縣北徵東平王蒼㑹陽都陽都縣名屬琅邪郡故城在今沂州沂水縣南又徴廣陵侯及其三弟㑹魯祠東海恭王陵還幸孔子宅祠仲尼及七十二弟子親御講堂孔子宅在今兖州曲阜縣故魯城中歸德門内闕里之中背洙靣泗矍相圃之東北也七十二弟子顔閔之徒漢春秋曰帝時升廟立羣臣中庭北靣皆再拜帝進爵而後坐命皇太子諸王説經又幸東平東平國名故城在今鄆州東辛卯進幸大梁大梁城魏惠王所築故城在今汴州至定陶祠定陶恭王陵恭王元帝子康夏四月庚子車駕還宫改信都為樂成國臨淮為下邳國封皇子恭為鉅鹿王黨為樂成王衍為下邳王暢為汝南王昞為常山王長為濟隂王濟隂郡今曹州賜天下男子爵人三級郎從官二十嵗已上帛百匹十嵗已上二十匹十嵗已下十匹官府吏五匹書佐小史三匹令天下大酺五日前書音義曰漢律三人已上無故羣飲罰金四兩今恩詔横賜得令聚㑹飲食五日酺布也言天子布恩於天下史記趙惠文王三年大赦置酒大酺五日劉攽曰正文從官二十嵗以上又云十嵗以下案郎從官不可年十嵗以下者以十七年事校之脱視事二字乙巳大赦天下其謀反大逆及諸不應宥者皆赦除之冬車騎校獵上林苑周禮校人掌王田獵之馬故曰校獵謂以木相貫穿為欄校以遮禽獸十二月遣奉車都尉竇固駙馬都尉耿秉屯凉州前書曰奉車都尉掌乗輿駙馬都尉掌天子之副馬駙副也並武帝置秩二千石十六年春二月遣太僕祭彤出高闕髙闕山名因以名塞在朔方北奉車都尉竇固出酒泉駙馬都尉耿秉出居延本匈奴地名也武帝因以名縣屬張掖郡在今甘州張掖縣東北騎都尉來苖出平城伐北匈奴竇固破呼衍王於天山呼衍匈奴王號天山即祈連山一名雪山今名折羅漢山在伊州北祁音時留兵屯伊吾盧城本匈奴中地名既破呼衍即其地置宜禾都尉以為屯田今伊州細職縣伊吾故城是也耿秉來苖祭彤並無功而還夏五月淮陽王延謀反發覺癸丑司徒邢穆駙馬都尉韓光坐事下獄死所連及誅死者甚衆坐與延同謀戊午晦日有食之六月丙寅大司農西河王敏為司徒漢官儀曰敏字叔公并州隰城人也秋七月淮陽王延徙封阜陵王阜陵縣名屬九江郡故城在今滁州全椒縣南九月丁卯詔令郡國中都官死罪繫囚減死罪一等勿笞詣軍營屯朔方敦煌妻子自隨父母同産欲求從者恣聽之女子嫁為人妻勿與俱謀反大逆無道不用此書是嵗北匈奴寇雲中雲中太守亷范擊破之十七年春正月甘露降於甘陵北海王睦薨二月乙巳司徒王敏薨三月癸丑汝南太守鮑昱為司徒是嵗甘露仍降樹枝内附仍頻也内附謂木連理也前書終軍曰衆枝内附是無外也芝草生殿前神雀五色翔集京師西南夷哀牢儋耳僬僥槃木白狼動黏諸種前後慕義貢獻山海經曰周僥國在三首國東為人短小冠帶一名僬僥國語曰僬僥氏三尺短之至也楊浮異物志曰儋耳南方夷生則鏤其頰皮連耳匡分為數支状如雞膓纍纍下垂至肩西域諸國遣子入侍夏五月戊子公卿百官以帝威德懷遠祥物顯應乃並集朝堂奉觴上壽夀者人之所欲故卑下奉觴進酒皆言上夀制曰天生神物以應王者逺人慕化實由有德朕以虛薄何以享斯惟高祖光武聖德所被不敢有辭其敬舉觴太常擇吉日䇿告宗廟其賜天下男子爵人二級三老孝悌力田人三級流人無名數欲占者人一級鰥寡孤獨篤癃}
