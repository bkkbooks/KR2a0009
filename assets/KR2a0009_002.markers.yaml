  - {type: variant, offset: 5920, length: 0, content: '', WYG: 宇出入無節喜怒過差昔應門失守關雎刺世春秋説題辭曰人主不正應門失守故歌關雎以感之宋均注曰應門聽政之處也言不以政事為務則}
  - {type: variant, offset: 5920, length: 0, content: '', krp: 宇出入無節喜怒過差昔應門失守關雎刺世春秋説題辭曰人主不正應門失守故歌關雎以感之宋均注曰應門聽政之處也言不以政事為務則}
  - {type: variant, offset: 5921, length: 2, content: 星孛, WYG: 宣滛之心闗雎樂而不滛思得賢人與之共化修應門之政者也薛君韓詩章句曰詩人言雎鳩貞潔愼匹以聲相求隱蔽於無人之處故人君退朝入於私宮后妃御見有度應門擊柝鼓人上堂退反宴處體安志明今時大人内傾}
  - {type: variant, offset: 5921, length: 2, content: 星孛, krp: 宣滛之心闗雎樂而不滛思得賢人與之共化修應門之政者也薛君韓詩章句曰詩人言雎鳩貞潔愼匹以聲相求隱蔽於無人之處故人君退朝入於私宮后妃御見有度應門擊柝鼓人上堂退反宴處體安志明今時大人内傾}
  - {type: variant, offset: 5924, length: 2, content: 紫宮, WYG: 色賢人見其萌故詠闗雎説淑女正容儀以刺時飛蓬隨風微子所歎管子曰無儀法程式飛摇而無所定謂之飛蓬飛蓬之間明主不聽此言微子未詳永覽前戒竦然兢懼徒恐薄德乆而致怠耳北匈奴寇西河諸郡九年春三月辛丑詔郡國死罪囚減罪與妻子詣五原朔方占著所在死者皆賜妻父若男同産一人復終身其妻無父兄獨有母者賜其母錢六萬又復其口算口算已見光武紀夏四月甲辰詔郡國以公田賜貧人各有差令司隸校尉部刺史歳上墨綬長吏視事三歳以上理狀尤異者各一人與計偕上偕俱也所徴之人令與計吏俱上及尤不政理者亦以聞是歳大有年穀梁傳曰五穀皆熟書大有年為四姓小侯開立學校置五經師袁宏漢記曰永平中崇尚儒學自皇太子諸王侯及功臣子弟莫不受經又為外戚樊氏郭氏隂氏馬氏諸子弟立學號四姓小侯置五經師以非列侯故曰小侯禮記曰庶方小十年春二月廣陵王荆有罪自殺國除}
