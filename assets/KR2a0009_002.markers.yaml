  - {type: variant, offset: 4931, length: 817, content: 青州蝗匈奴薁鞬日逐王比遣使詣漁陽請和親使中郎將李茂報命烏桓擊破匈奴匈奴北徙幕南地空詔罷諸邊郡亭候吏卒二十三年春正月南郡蠻叛遣武威將軍劉尚討破之徙其種人於江夏夏五月丁卯大司徒蔡茂薨秋八月丙戌大司空杜林薨九月辛未陳留太守玉況為大司徒冬十月丙申太僕張純為大司空高句麗率種人詣樂浪內屬十二月武陵蠻叛寇掠郡縣遣劉尚討之戰於沅水尚軍敗歿是歲匈奴薁鞬日逐王比率部曲遣使詣西河內附二十四年春正月乙亥大赦天下匈奴薁鞬日逐王比遣使款五原塞求扞禦北虜秋七月武陵蠻寇臨沅遣謁者李嵩中山太守馬成討蠻不克於是伏波將軍馬援率四將軍討之詔有司申明舊制阿附蕃王法冬十月匈奴薁鞬日逐王比自立為南單于於是分為南北匈奴二十五春正月遼東徼外貊人寇右北平漁陽上谷太原遼東太守祭肜招降之烏桓大人來朝南單于遣使詣闕貢獻奉蕃稱臣又遣其左賢王擊破北匈奴卻地千餘里三月南單于遣子入侍戊申晦日有食之伏波將軍馬援等破武陵蠻於臨沅冬十月叛蠻悉降夫餘王遣使奉獻是歲烏桓大人率衆內屬詣闕朝貢二十六年春正月詔有司增百官奉其千石已上減於西京舊制六百石已下增於舊秩初作壽陵將作大匠竇融上言園陵廣袤無慮所用帝曰古者帝王之葬皆陶人瓦器木車茅馬使後世之人不知其處太宗識終始之義景帝能述遵孝道遭天下反覆而霸陵獨完受其福豈不美哉今所制地不過二三頃無為山陵陂池裁令流水而已遣中郎將段郴授南單于璽綬令入居雲中始置使匈奴中郎將將兵衞護之南單于遣子入侍奉奏詣闕於是雲中五原朔方北地定襄鴈門上谷代八郡民歸於本土遣謁者分將施刑補理城郭發遣邊民在中國者布還諸縣皆賜以裝錢轉輸給食二十七年夏四月戊午大司徒玉況薨五月丁丑詔曰昔契作司徒禹作司空皆無大名其令二府去大又改大司馬為太尉驃騎大將軍行大司馬劉隆即日罷太僕趙憙為太尉大司農馮勤為司徒益州郡徼外蠻夷率種人內屬北匈奴遣使詣武威乞和親冬魯王興齊王石始就國二十八年春正月己巳徙魯王興為北海王以魯國益東海賜東海王彊虎賁旄頭鍾虡之樂夏六月丁卯沛太后郭氏薨因詔郡縣捕王侯賓客坐死者數千人秋八月, WYG: ''}
