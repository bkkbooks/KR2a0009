  - {type: variant, offset: 6061, length: 3, content: 宮是歲, WYG: 爵人二級及流民無名數劉攽曰及流民無名數多一及字欲占者人一級鰥寡孤獨篤癃貧不能自存者粟人三斛理寃獄録輕繫二千石分禱五岳四瀆郡界有名山大川能興雲致雨者周禮職方氏掌天下之地揚州其山曰㑹稽其川曰三江荆州其山曰衡山其川曰江漢豫州其山曰華山其川曰榮洛青州其山曰沂山其川曰淮泗兖州其山曰岱山其川曰河泲雍州其山曰嶽其川者涇汭幽州其山曰醫無閭其川曰河泲冀州其山曰霍其川曰漳并州其山曰恒其川曰滹沱此謂九州名山大川也長吏各絜齋禱請冀䝉嘉澍説文曰時雨所以澍生萬物淮南子曰春雨之灌萬物無地不澍無物不生澍音之戍反六月己未有星孛于太微焉耆龜兹攻西域都䕶}
