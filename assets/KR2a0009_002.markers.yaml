  - {type: variant, offset: 1408, length: 900, content: 征西大將軍馮異等五將軍討隗純於天水驃騎大將軍杜茂與賈覽戰於繁畤茂軍敗績是歲省關都尉復置護羌校尉官十年春正月大司馬吳漢率捕虜將軍王霸等五將軍擊賈覽於高柳匈奴遣騎救覽諸將與戰卻之修理長安高廟夏征西大將軍馮異破公孫述將趙匡於天水斬之征西大將軍馮異薨秋八月己亥幸長安祠高廟遂有事十一陵戊戌進幸汧隗囂將高峻降冬十月中郎將來歙等大破隗純於落門其將王元奔蜀純與周宗降隴右平先零羌寇金城隴西來歙率諸將擊羌於五谿大破之庚寅車駕還宮是歲省定襄郡徙其民於西河泗水王歙薨淄川王終薨十一年春二月己卯詔曰天地之性人為貴其殺奴婢不得減罪三月己酉幸南陽還幸章陵祠園陵城陽王祉薨庚午車駕還宮閏月征南大將軍岑彭率三將軍與公孫述將田戎任滿戰於荊門大破之獲任滿威虜將軍馮駿圍田戎於江州岑彭遂率舟師伐公孫述平巴郡夏四月丁卯省大司徒司直官先零羌寇臨洮六月中郎將來歙率揚武將軍馬成破公孫述將王元環安於下辯安遣閒人刺殺中郎將來歙帝自將征公孫述秋七月次長安八月岑彭破公孫述將侯丹於黃石輔威將軍臧宮與公孫述將延岑戰於沈水大破之王元降至自長安癸亥詔曰敢灸灼奴婢論如律免所灸灼者為庶民人冬十月壬午詔除奴婢射傷人𠫓廾市律公孫述遣閒人刺殺征南大將軍岑彭馬成平武都因隴西太守馬援擊破先零羌徙致天水隴西扶風十二月大司馬吳漢率舟師伐公孫述是歲省朔方牧并并州初斷州牧自還奏事十二年春正月大司馬吳漢與公孫述將史興戰於武陽斬之三月癸酉詔隴蜀民被略為奴婢自訟者及獄官未報一切免為庶民人夏甘露降南行唐六月黃龍見東阿秋七月威虜將軍馮駿拔江州獲田戎九月吳漢大破公孫述將謝豐于廣都斬之輔威將軍臧宮拔涪城斬公孫恢大司空李通罷冬十一月戊寅吳漢臧宮與公孫述戰於成都大破之述被創夜死辛巳吳漢屠成都夷述宗族及延岑等十二月辛卯揚武將軍馬成行大司空事是歲九真徼外蠻夷張遊率種人內屬封為歸漢里君省金城郡屬隴西參狼羌寇武都隴西太守馬援討降之詔邊吏力不足戰則守追虜料敵不拘以逗留法橫野大將軍王常薨遣驃騎大將軍杜茂將衆郡施刑屯北邊築亭候修烽燧十三年春正月庚申大司徒侯霸薨戊子詔曰往忖勑郡國異味不得有所獻御今猶未止非徒有豫養導擇之勞至乃煩擾道上疲費過所其令太官勿復受明勑下以遠方口實所以薦宗廟自如舊制二月遣, WYG: ''}
