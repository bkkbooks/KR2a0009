  - {type: variant, offset: 5754, length: 0, content: '', krp: 薨遣司空馮魴持節視䘮事賜升龍旄頭鑾輅龍旂旄頭見光武紀鑾鈴也在鑣交龍為旂唯天子用之今特賜以葬六月乙卯葬東海恭王秋七月捕虜將軍馬武等與燒當羌戰大破之募士卒戍隴右賜錢人三萬八月戊子徙山陽王荆為廣陵王遣就國是歳遼東太守祭彤使鮮卑擊赤山烏桓大破之斬其渠帥赤山在遼東西北數千里越嶲姑復夷叛姑復縣名州郡討平之二年春正月辛未宗祀光武皇帝於明堂帝及公卿列侯始服冠冕衣裳玉佩絇屨以行事漢官儀曰天子冠通天諸侯王冠遠遊三公諸侯冠進賢三梁卿大夫尚書二千石博士冠兩梁二千石以下至小吏冠一梁天子公卿特進諸侯祀天地明堂皆冠平冕天子十二旒三公九卿諸侯七其纓各如其綬色𤣥衣纁裳周禮曰王祀昊天上帝則服大裘而冕祀五帝亦如之三禮圖曰冕以三十升布染而為之廣八寸長尺六寸前圜後方前下後高有俛伏之形故謂之冕欲人之位彌高而志彌下故以名焉董巴輿服志曰顯宗初服冕衣裳以祀天地衣裳以𤣥上纁下乗輿備文日月星辰十二章三公諸侯用山龍九章卿以下用華蟲七章皆五色采乗輿刺繡公卿已下皆織成陳留襄邑獻之徐廣車服注曰漢明帝案古禮備其服章天子郊廟衣皂上絳下前三幅後四幅衣盡而裳繡禮記曰古之君子必佩玉君子於玉比德焉天子佩白玉諸侯佩山𤣥玉大夫佩水蒼玉世子佩瑜玉周禮履人掌王赤舄青絇鄭𤣥注云赤舄為上冕服之舄也絇屨鼻頭以青絲飾之絇音劬三禮圖曰屨複下曰舄其色各隨裳色劉攽曰註二千石已下至小吏案上文已云二千石冠兩梁此則多一二字禮畢登靈臺使尚書令持節詔驃騎將軍三公曰今令月吉日宗祀光武皇帝於明堂以配五帝五經通義曰蒼帝靈威仰赤帝赤熛怒黃帝含樞紐白帝白招矩黒帝叶光紀牲幣及玉各依方色劉攽曰注白招矩案禮作白招拒音矩不便作矩也禮備法物樂和八音詠祉福舞功德祉亦福也詠謂詩云降福穰穰之類景帝詔曰歌者所以發德舞者所以明功其班時令勑羣后班布也時令謂月令也四時各有令若有乖舛必致妖災故告之劉攽曰正文案此詔方叙行禮事未有勑下語則此其字為衍文下文自有其令天下云云事畢升靈臺望元氣吹時律觀物變元氣天氣也王者承天心理禮樂通上下四時之氣也故望之焉時律者即月令孟春律中太蔟仲春律中夾鍾之類大戴禮曰聖人截十二管察八音之清濁謂之律呂律呂不正則諸氣不和周禮保章氏以五雲之色辨吉凶水旱豐荒之祲象鄭司農注云以二至二分觀雲色青為蟲白為䘮赤為兵荒黒為水黃為豐故春秋傳曰凡分至啓閉必書雲物為備故也杜預注云物謂氣色災變也羣僚藩輔宗室子孫衆郡奉計百蠻貢職奉計謂計吏也詩曰因時百蠻百言衆多也獨言蠻通四夷也烏桓濊貊咸來助祭單于侍子骨都侯亦皆陪位斯固聖祖功德之所致也朕以闇陋奉承大業親執圭璧恭祀天地周禮曰四圭尺有二寸以祀天又曰以蒼璧禮天以黃琮禮地以青圭禮東方以赤璋禮南方以白琥禮西方以𤣥璜禮北方仰惟先帝受命中興撥亂反正以寧天下撥理也公羊傳曰撥亂世反之正莫近於春秋封泰山建明堂立辟雍起靈臺恢𢎞大道被之八極淮南子曰九州之外有八寅八寅之外有八紘八紘之外有八極而𦙍子無成康之質羣臣無呂旦之謀明帝自謂無成康之時刑措不用四十餘年劉攽曰注案文意當更有成康之質曰字然後云成康之時盥洗進爵踧踖惟慙鄭𤣥注論語云踧踖敬恭貌盥音管素性頑鄙臨事益懼故君子坦蕩蕩小人長戚戚坦蕩明逹之貌戚戚常憂懼也其令天下自殊死已下謀反大逆皆赦除之百僚師尹其勉修厥職順行時令敬若昊天以綏兆人若順也三月臨辟雍初行大射禮儀禮曰大射之禮王將祭射宮擇士以助祭也張虎侯熊侯豹侯其制若今之射的矣謂之為侯者天子射中之可以服諸侯也天子侯中一丈八尺畫以雲氣焉王以六耦射三侯樂以騶虞九節諸侯以四耦射二侯樂以貍首七節孤卿大夫以三耦射一侯樂以采蘋五節士以二耦射豻侯樂以采蘩三節劉攽曰注儀禮曰大射之禮案此非儀禮本文不合著曰字秋九月}
  - {type: punctuation, offset: 5757, content: ､, id: KR2a0009_ZHSJ_002-bkkpn1378}
  - {type: punctuation, offset: 5760, content: ､, id: KR2a0009_ZHSJ_002-bkkpn1379}
  - {type: punctuation, offset: 5764, content: ､, id: KR2a0009_ZHSJ_002-bkkpn1380}
  - {type: variant, offset: 5768, length: 0, content: '', WYG: 東海王政來朝冬十月壬子幸辟雍初行養老禮詔曰光武皇帝建三朝之禮而未及臨饗三朝之禮謂中元元年初起明堂辟雍靈臺也眇眇小子屬當聖業尚書康王曰眇眇予末小子孔安國注云眇眇猶㣲㣲也間暮春吉辰初行大射今月元日東觀記曰十月元日復踐辟雍尊事三老兄事五更安車輭輪供綏執授侯王設醬公卿饌珍朕親􅃝割執爵而酳孝經援神契曰尊事三老父象也宋均注曰老人知天地之事者安車坐乘之車輭輪以蒲裹輪輭音而兖反三老就車天子親執綏授之説文綏車中把也五更老人知五行更代事者漢官儀曰三老五更皆取有首妻男女全具者續漢志曰養三老五更先吉日司徒上太傅若講師故三公人名用其德行年耆高者三公一人為三老次卿一人為五更皆服絺紵大袍單衣皂緣領袖中衣冠進賢扶玉杖五更亦如之不杖皆齋於太學講堂其日乘輿先到辟雍禮畢殿坐于東廂遣使者安車迎三老五更天子迎於門屏交拜導自阼階三老自賔階升東靣三公設几杖九卿正履天子親􅃝割爼執醬而饋執爵而酳五更南靣三公進供禮亦如之明日皆詣闕謝以其於已禮太隆也醬醢也珍謂肴饈之屬即周禮八珍之類鄭𤣥注儀禮云酳潄也所以潔口音靷劉攽曰注老人知天地之事案本以知天地人三才故謂之三老則此之字當作人也祝哽在前祝噎在後老人食多哽咽故置人於前後祝之令其不哽咽也升歌鹿鳴下管新宮鹿鳴小雅篇名也新宫小雅逸篇也升登也登堂而歌所以重人聲也燕禮曰升歌鹿鳴下管新宮八佾具修萬舞於庭佾列也謂舞者行列也左氏傳曰天子八佾諸侯六大夫四士二夫舞所以節八音而行八風故自八以下萬亦舞也詩云公庭萬舞朕固薄德何以克當易陳負乗詩刺彼其易曰負且乗致㓂至負也者小人之事也乗也者君子之器也小人而乗君子之器盜思奪之矣詩曰彼其之子不稱其服也永念慙疾無忘厥心三老李躬年耆學明五更桓榮授朕尚書詩曰無德不報無言不酬詩大雅也其賜榮爵關内侯食邑五千戸三老五更皆以二千石禄養終厥身其賜天下三老酒人一石肉四十斤有司其存耆耋禮記曰六十曰耆七十曰耋釋名曰耆指也不從力役指事使人也耋鐡也皮膚變黑色如鐡也恤幼孤惠鰥寡稱朕意焉中山王焉}
