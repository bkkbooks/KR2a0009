  - {type: punctuation, offset: 5754, content: ､, id: KR2a0009_ZHSJ_002-bkkpn1377}
  - {type: variant, offset: 5754, length: 0, content: '', WYG: 薨遣司空馮魴持節視䘮事賜升龍旄頭鑾輅龍旂旄頭見光武紀鑾鈴也在鑣交龍為旂唯天子用之今特賜以葬六月乙卯葬東海恭王秋七月捕虜將軍馬武等與燒當羌戰大破之募士卒戍隴右賜錢人三萬八月戊子徙山陽王荆為廣陵王遣就國是歳遼東太守祭彤使鮮卑擊赤山烏桓大破之斬其渠帥赤山在遼東西北數千里越嶲姑復夷叛姑復縣名州郡討平之二年春正月辛未宗祀光武皇帝於明堂帝及公卿列侯始服冠冕衣裳玉佩絇屨以行事漢官儀曰天子冠通天諸侯王冠遠遊三公諸侯冠進賢三梁卿大夫尚書二千石博士冠兩梁二千石以下至小吏冠一梁天子公卿特進諸侯祀天地明堂皆冠平冕天子十二旒三公九卿諸侯七其纓各如其綬色𤣥衣纁裳周禮曰王祀昊天上帝則服大裘而冕祀五帝亦如之三禮圖曰冕以三十升布染而為之廣八寸長尺六寸前圜後方前下後高有俛伏之形故謂之冕欲人之位彌高而志彌下故以名焉董巴輿服志曰顯宗初服冕衣裳以祀天地衣裳以𤣥上纁下乗輿備文日月星辰十二章三公諸侯用山龍九章卿以下用華蟲七章皆五色采乗輿刺繡公卿已下皆織成陳留襄邑獻之徐廣車服注曰漢明帝案古禮備其服章天子郊廟衣皂上絳下前三幅後四幅衣盡而裳繡禮記曰古之君子必佩玉君子於玉比德焉天子佩白玉諸侯佩山𤣥玉大夫佩水蒼玉世子佩瑜玉周禮履人掌王赤舄青絇鄭𤣥注云赤舄為上冕服之舄也絇屨鼻頭以青絲飾之絇音劬三禮圖曰屨複下曰舄其色各隨裳色劉攽曰註二千石已下至小吏案上文已云二千石冠兩梁此則多一二字禮畢登靈臺使尚書令持節詔驃騎將軍三公曰今令月吉日宗祀光武皇帝於明堂以配五帝五經通義曰蒼帝靈威仰赤帝赤熛怒黃帝含樞紐白帝白招矩黒帝叶光紀牲幣及玉各依方色劉攽曰注白招矩案禮作白招拒音矩不便作矩也禮備法物樂和八音詠祉福舞功德祉亦福也詠謂詩云降福穰穰之類景帝詔曰歌者所以發德舞者所以明功其班時令勑羣后班布也時令謂月令也四時各有令若有乖舛必致妖災故告之劉攽曰正文案此詔方叙行禮事未有勑下語則此其字為衍文下文自有其令天下云云事畢升靈臺望元氣吹時律觀物變元氣天氣也王者承天心理禮樂通上下四時之氣也故望之焉時律者即月令孟春律中太蔟仲春律中夾鍾之類大戴禮曰聖人截十二管察八音之清濁謂之律呂律呂不正則諸氣不和周禮保章氏以五雲之色辨吉凶水旱豐荒之祲象鄭司農注云以二至二分觀雲色青為蟲白為䘮赤為兵荒黒為水黃為豐故春秋傳曰凡分至啓閉必書雲物為備故也杜預注云物謂氣色災變也羣僚藩輔宗室子孫衆郡奉計百蠻貢職奉計謂計吏也詩曰因時百蠻百言衆多也獨言蠻通四夷也烏桓濊貊咸來助祭單于侍子骨都侯亦皆陪位斯固聖祖功德之所致也朕以闇陋奉承大業親執圭璧恭祀天地周禮曰四圭尺有二寸以祀天又曰以蒼璧禮天以黃琮禮地以青圭禮東方以赤璋禮南方以白琥禮西方以𤣥璜禮北方仰惟先帝受命中興撥亂反正以寧天下撥理也公羊傳曰撥亂世反之正莫近於春秋封泰山建明堂立辟雍起靈臺恢𢎞大道被之八極淮南子曰九州之外有八寅八寅之外有八紘八紘之外有八極而𦙍子無成康之質羣臣無呂旦之謀明帝自謂無成康之時刑措不用四十餘年劉攽曰注案文意當更有成康之質曰字然後云成康之時盥洗進爵踧踖惟慙鄭𤣥注論語云踧踖敬恭貌盥音管素性頑鄙臨事益懼故君子坦蕩蕩小人長戚戚坦蕩明逹之貌戚戚常憂懼也其令天下自殊死已下謀反大逆皆赦除之百僚師尹其勉修厥職順行時令敬若昊天以綏兆人若順也三月臨辟雍初行大射禮儀禮曰大射之禮王將祭射宮擇士以助祭也張虎侯熊侯豹侯其制若今之射的矣謂之為侯者天子射中之可以服諸侯也天子侯中一丈八尺畫以雲氣焉王以六耦射三侯樂以騶虞九節諸侯以四耦射二侯樂以貍首七節孤卿大夫以三耦射一侯樂以采蘋五節士以二耦射豻侯樂以采蘩三節劉攽曰注儀禮曰大射之禮案此非儀禮本文不合著曰字秋九月}
