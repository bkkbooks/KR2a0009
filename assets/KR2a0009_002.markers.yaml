  - {type: variant, offset: 496, length: 904, content: 人百僚並上封事無有隱諱有司修職務遵法度十一月丁卯詔王莽時吏人沒入為奴婢不應舊法者皆免為庶人十二月壬辰大司空宋弘免癸巳詔曰頃者師旅未解用度不足故行什一之稅今軍士屯田糧儲差積其令郡國收見田租三十稅一如舊制隗囂遣將行巡寇扶風征西大將軍馮異拒破之是歲初罷郡國都尉官始遣列侯就國匈奴遣使來獻使中郎將報命七年春正月丙申詔中都官三輔郡國出繫囚非犯殊死皆一切勿案其罪見徒免為庶民人耐罪亡命吏以文除之又詔曰世以厚葬為德薄終為鄙至于富者奢僭貧者單財法令不能禁禮義不能止倉卒乃知其咎其布告天下令知忠臣孝子慈兄悌弟薄葬送終之義二月辛巳罷護漕都尉官三月丁酉詔曰今國有衆軍並多精勇宜且罷輕車騎士材官樓船士及軍假吏令還復民伍公孫述立隗囂為朔寧王癸亥晦日有食之避正殿寑兵不聽事五日詔曰吾德薄致災謫見日月戰慄恐懼夫何言哉今方念愆庶消厥咎其令有司各修職任奉遵法度惠茲元元百僚各上封事無有所諱其上書者不得言聖夏四月壬午詔曰比陰陽錯謬日月薄食百姓有過在予一人大赦天下公卿司隸州牧舉賢良方正各一人遣詣公車朕將覽試焉五月戊戌前將軍李通為大司空甲寅詔吏人遭饑亂及為青徐賊所略為奴婢下妻欲去留者恣聽之敢拘制不還以賣人法從事是夏連雨水漢忠將軍王常為橫野大將軍八月丁亥封前河閒王邵為河閒王隗囂寇安定征西大將軍馮異征虜將軍祭遵擊卻之冬盧芳所置朔方太守田颯雲中太守喬扈各舉郡降是歲省長水射聲二校尉官八年春正月中郎將來歙襲略陽殺隗囂守將而據其城夏四月司隸校尉傅抗下獄死隗囂攻來歙不能下閏月帝自征囂河西太守大將軍竇融率五郡太守與車駕會高平隴右潰隗囂奔西城遣大司馬吳漢征南大將軍岑彭圍之進幸上邽不降命虎牙大將軍蓋延建威大將軍耿弇攻之潁川盜賊寇沒屬縣河東守守兵亦叛京師騷動秋大水八月帝自上邽晨夜東馳九月乙卯車駕還宮庚申帝自征潁川盜賊皆降安丘侯張步叛歸琅邪琅邪太守陳俊討獲之戊寅至自潁川冬十月丙午幸懷十一月乙丑至自懷公孫述遣兵救隗囂吳漢蓋延等還軍長安天水隴西復反歸囂十二月高句麗王遣使奉貢是歲大水九年春正月隗囂病死其將王元周宗復立囂子純為王徙鴈門吏人於太原三月辛亥初置青巾左校尉官公孫述遣將田戎任滿據荊門夏六月丙戌幸緱氏登轘轅遣大司馬吳漢率四將軍擊盧芳將賈覽於高柳戰不利秋八, WYG: ''}
