  - {type: variant, offset: 3629, length: 194, content: 月乙卯南巡狩皇太子及右翊公輔楚公英東海公陽濟南公康東平公蒼從幸潁川進幸葉章陵五月乙卯車駕還宮六月癸巳臨淮公衡薨秋七月妖巫李廣等羣起據皖城遣虎賁中郎將馬援驃騎將軍段志討之九月破皖城斬李廣等冬十月辛巳廢皇后郭氏為中山太后立貴人陰氏為皇后進右翊公輔為中山王食常山郡其餘九國公皆即舊封進爵為王甲申幸章陵脩園廟祠舊宅觀田廬置酒作樂賞賜時宗室諸母因酣悅相與語曰文叔少時謹信與人不款曲唯直柔耳今乃能如此, WYG: 方改易欲先}
