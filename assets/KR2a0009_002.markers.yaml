  - {type: variant, offset: 2314, length: 253, content: 屯虖沱河以備匈奴盧芳自五原亡入匈奴丙辰詔曰長沙王興真定王得河閒王邵中山王茂皆襲爵為王不應經義其以興為臨湘侯得為真定侯邵為樂成侯茂為單父侯其宗室及絕國封侯者凡一百三十七人丁巳降趙王良為趙公太原王章為齊公魯王興為魯公庚午以殷紹嘉公孔安為宋公周承休公姬常武為衞公省并西京十三國廣平屬鉅鹿真定屬常山河閒屬信都城陽屬琅邪泗水屬廣陵淄川屬高密膠東屬北海六安屬廬江廣陽屬上谷三月辛未沛郡太守韓歆為大司徒丙子行大司空馬成罷夏四月大司馬吳漢自蜀還京師於是大饗將士班勞策勳功臣增邑更封凡三百六十五人其外戚恩澤封者四十五人罷左右, WYG: 等二}
