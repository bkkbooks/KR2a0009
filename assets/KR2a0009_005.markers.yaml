  - {type: variant, offset: 5417, length: 237, content: 老孝悌力田人三級民無名數及流民欲占者人一級魚眾寡孤獨篤貧不能自存者粟人三斛自竇憲誅後帝躬親萬機每有灾異輒延問公卿極言得失前後符瑞八十一所自稱德薄皆抑而不宣舊南海獻龍眼荔支十里一置五里一候奔騰阻險死者繼路時臨武長汝南唐羌縣接南海乃上書陳狀帝下詔曰遠國珍羞本以薦奉宗廟苟有傷害豈愛民之本其勑太官勿復受獻由是遂省焉論曰自中興以後逮于永元雖頗有薥張而俱存不擾是以齊民歲增聞土世廣偏師出塞則漠北地空都護西指則通譯四萬豈其道遠三代術長前世將服叛去來自有數也孝殤皇帝諱隆和帝少子也元興元年, WYG: ''}
