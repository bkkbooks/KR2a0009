  - {type: variant, offset: 1189, length: 1, content: 奉, WYG: 客死無家屬及棺槨朽敗者皆為設祭其有家屬尤貧無以𦵏者賜錢人五千辛酉詔三輔河内河東上黨趙國太原各修理舊渠通利水道以漑公私田疇前書音義曰羙田曰疇三月癸亥京師大風先零羌寇益州遣中郎將尹就討之夏四月丙午立貴人閻氏為皇后五月京師旱河南及郡國十九蝗甲戌詔曰}
  - {type: variant, offset: 1189, length: 1, content: 奉, krp: 客死無家屬及棺槨朽敗者皆為設祭其有家屬尤貧無以𦵏者賜錢人五千辛酉詔三輔河内河東上黨趙國太原各修理舊渠通利水道以漑公私田疇前書音義曰羙田曰疇三月癸亥京師大風先零羌寇益州遣中郎將尹就討之夏四月丙午立貴人閻氏為皇后五月京師旱河南及郡國十九蝗甲戌詔曰}
  - {type: variant, offset: 1191, length: 4, content: 請者黃金, WYG: 廷不明庶事失中災異不息憂心惶懼被蝗以來七年于兹而州郡隱匿裁言頃畝裁與纔同古字通今羣飛蔽天為害廣逺所言所見寕相副邪三司之職内外是監旣不奏聞又無舉正天災至重欺罔辠大今方盛夏且復假貸以觀厥後假貸猶寛容也盛夏不可卽加刑罰故且寛容其務消救災眚安輯黎元六月丙戌太尉司馬苞薨謝承書曰苞為太尉常食麤飯著布衣妻子不歴官舍㑹司徒楊震為樊豊等所譛連及苞苞乞骸骨未見聴以疾薨也洛陽新城地裂秋七月辛巳太僕太山馬英為太尉英字文思兗州蓋縣人也八月遼東鮮卑圍無慮縣屬遼東郡慮音閭有醫無閭山因以為名焉九月又攻夫犂營殺縣令夫犂縣名屬遼東屬國壬午晦日有食之冬十月遣中郎}
