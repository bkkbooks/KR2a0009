  - {type: variant, offset: 6158, length: 9, content: 寅勑司隸校尉部刺史, WYG: 地庚與康相似但少許不同然檢續漢志亦作康陵又質帝年叙康陵在恭陵上都是康字不知此字自章懷已前誤之耶或者後人傳寫一處誤之遂都改令同也然章懷注語則似作庚無疑後漢書卷五後漢書卷五考證安帝紀調揚州五郡租米注揚州領六郡㑹稽最逺蓋不調也日知錄}
