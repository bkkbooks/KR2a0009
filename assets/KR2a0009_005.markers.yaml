  - {type: variant, offset: 1103, length: 5, content: 竇憲出屯涼, WYG: 與先零諸種羌攻䧟上邽城十二月漢陽太守趙博遣客刺殺杜琦東觀記曰漢陽故吏杜習手刺殺之是歲九}
