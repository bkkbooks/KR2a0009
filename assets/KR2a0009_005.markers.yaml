  - {type: variant, offset: 1376, length: 2, content: 魚眾, WYG: 己酉司徒夏勤罷庚戌司空劉愷為司徒光禄勲袁敞為司空三年春正月甲戌修理太原舊溝渠漑灌官私田酈元水經注曰晉智伯遏晉水以灌晉陽後人踵其遺跡蓄以為沼分為二𣲖北瀆即智氏故渠也其瀆乘高東北注入晉陽城以漑灌東南出城注於汾水今所修溝渠即謂此東平陸上言木連理東平陸縣名古厥國也屬東平國今兗州平陸縣也序例曰凡瑞應自和帝以上政事多羙近於有實故書見於某處自安帝以下王道衰缺容或虛飾故書某處上言也蒼梧鬱林合浦蠻夷反叛蒼梧郡今梧州縣也合浦郡今廉州縣也二月遣侍御史任逴督州郡兵討之逴音丁角反郡國十地震三月辛亥日有食之丙辰赦蒼梧鬱林合浦南海吏人為賊所迫者夏四月京師旱五月武陵蠻復叛州郡討破之癸酉度遼將軍鄧遵率南匈奴擊先零羌於靈州破之靈州縣名屬北地郡故城在今慶州馬領縣西北越嶲徼外夷舉種内屬六月中郎將任尚遣兵擊破先零羌於丁奚城秋七月武陵蠻復叛州郡討平之緱氏地坼九月辛巳趙王宏薨冬十一月蒼梧鬱林合浦蠻夷降丙戌初聽大臣二千石刺史行三年喪文帝遺詔以日易月於後大臣遂以為常至此復遵古制也癸夘郡國九地震十二月丁巳任尚遣兵擊破先零羌於北地四年春二月乙巳朔日有食之乙夘大赦天下壬戌武庫災夏四月戊申司空袁敞薨己巳鮮卑寇遼西遼西郡兵與烏桓擊破之遼西郡故城在今平州東陽樂城是五月丁丑太常李郃為司空六月戊辰三郡雨雹秋七月辛丑陳王鈞薨京師及郡國十雨水詔曰今年秋稼茂好垂可收穫而連雨未霽霽雨止也懼必淹傷夕惕惟憂思念厥咎夫霖雨者人怨之所致左傳曰凡雨三日以上為霖京房别對災異曰人勞怨苦雨水絶道其武吏以威暴下文吏妄行苛刻鄉吏因公生姦為百姓所患苦者有司顯明其罰又月令仲秋養衰老授几杖行糜粥鄭𤣥注云助老氣也行猶賜也方今案比之時東觀記曰方今八月案比之時謂案騐户口次比之也郡縣多不奉行雖有糜粥糠粃相半長吏怠事莫有躬親甚違詔書飬老之意其務崇仁恕賑護寡獨稱朕意焉九月護羌校尉任尚使客刺殺叛羌零昌冬十一月己邜彭城王恭薨十二月越嶲夷寇遂乆殺縣令遂乆縣屬越嶲郡甲子任尚及騎都尉馬賢與先零羌戰于富平上河大破之富平縣屬北地郡故城在今靈州回樂縣西南酈元水經注曰河水於此有上河之名也䖍人羌率衆降䖍人羌號也東觀記曰䖍人種羌大豪恬狼等詣度遼將軍降隴右平是歲郡國十三地震五年春正月越嶲夷叛二月壬戌中山王憲薨三月京師及郡國五旱詔稟遭旱貧人夏六月高句驪與穢貊寇𤣥菟郡名在遼東秋七月越嶲蠻夷及旄牛豪叛殺長吏旄牛縣屬蜀郡華陽國志曰在卭崍山表也丙子詔曰舊令制度各有科品漢令今亡欲令百姓務崇節約遭永初之際人離荒戹朝廷躬自菲薄去絶奢飾食不兼味衣無二綵比年雖獲豊穰尚乏儲積而小人無慮不圖乆長嫁娶送終紛華靡麗至有走卒奴婢被綺縠著珠璣綺文繒縠紗也璣珠不圓者也京師尚若斯何以示四逺設張法禁懇惻分明而有司惰任訖不奉行秋節旣立鷙鳥將用鷙鳥鷹鸇之類也廣雅曰鷙執也以其能服執衆鳥月令孟秋鷹乃祭鳥始用行戮言有司怠惰不遵法令將欲紏其罪順秋行誅同鷹鸇之鷙擊也且復重申以觀後效八月丙申朔日有食之鮮卑寇代郡殺長吏冬十月鮮卑寇上谷十二月丁巳中郎將任尚有辠棄市是歲郡國十四地震六年春二月乙巳京師及郡國四十二地震或坼裂水泉涌出壬子詔三府選掾屬高第能惠利牧養者各五人光禄勳與中郎將選孝廉郎寛博有謀清白行高者五十人出補令長丞尉乙邜詔曰夫政先京師後諸夏月令仲春養幼小存諸孤季春賜貧窮賑乏絶省婦使表貞女所以順陽氣崇生長也鄭𤣥云婦使謂組紃之事其賜民尤貧困孤弱單獨榖人三斛貞婦有節義十斛甄表門閭旌顯厥行節謂志操義謂推讓甄明旌章也里門謂之閭旌表者若今樹闕而顯之三月庚辰始立六宗祀於洛城西北續漢志曰元初六年以尚書歐陽家説謂六宗者在天地四方之中為上下四方之宗以元始中故事謂六宗易六子之氣日月雷公風伯山澤者非也乃更六宗祠於戌亥之地禮比大社也夏四月㑹稽大疫遣光祿大夫將太醫循行疾病賜棺木漢官儀大醫令一人秩六百石除田租口賦沛國勃海大風雨雹五月京師旱六月丁丑樂成王賔薨丙戌平原王得薨秋七月鮮卑寇馬城搜神記曰昔秦人築城於武周塞以備胡將成而崩者數矣有馬馳走周旋反覆父老異之因依以築城城乃不崩遂以名焉其故城今朔州也度遼將軍鄧遵率南單于擊破之九月癸巳陳王竦薨十二月戊午朔日有食之旣郡國八地震是歲永昌益州蜀郡夷叛與越嶲夷殺長吏燔城邑益州刺史張喬討破降之永寜元年春正月甲辰任城王安薨三月丁酉濟北王壽薨車師後王叛殺部司馬沈氐羌寇張掖沈氐羌號也續漢志曰羌在上郡西河者號沈氐也夏四月丙寅立皇子保為皇太子改元永寜大赦天下賜王主三公列侯下至郎吏從官金帛又賜民爵及布粟各有差已已詔封陳王羡子崇為陳王濟北王子萇為樂成王河間王子翼為平原王壬午琅邪王壽薨六月沈氐種羌叛寇張掖護羌校尉馬賢討沈氐羌破之秋七月乙酉朔日有食之冬十月己巳司空李郃免癸酉衞尉廬江陳襃為司空襃字伯仁舒縣人也自三月至是月京師及郡國三十三大風雨水十二月永昌徼外撣國遣使貢獻撣音擅戊辰司徒劉愷罷遼西鮮卑降癸酉太常楊震為司徒是歲郡國二十三地震夫餘王遣子詣闕貢獻燒當羌叛建光元年春正月幽州刺史馮煥率二郡太守討髙句驪穢貊不尅二月癸亥大赦天下賜諸園貴人謂宫人無子守園陵者也王主公卿以下錢布各有差以公卿校尉尚書子弟一人為郎舍人三月癸巳皇太后鄧氏崩丙午葬和熹皇后丁未安樂王寵薨戊申追尊皇考清河孝王曰孝德皇皇妣左氏曰孝德皇后祖妣宋貴人曰敬隱皇后夏四月穢貊復與鮮卑寇遼東遼東太守蔡諷追擊戰歿丙辰以廣川幷清河國丁巳尊孝徳皇元妃耿氏為甘陵大貴人甘陵孝徳皇后之陵因以為縣今貝州清河縣東也甲子樂成王萇有罪廢為臨湖侯續漢書曰坐輕慢不孝故貶臨湖縣名屬廬江郡也已已令公卿特進侯中二千石二千石郡國守相舉有道之士各一人賜鰥寡孤獨貧不能自存者榖人三斛甲戌遼東屬國都尉龎奮承偽璽書殺𤣥莬太守姚光五月庚申特進鄧騭及度遼將軍鄧遵竝以譖自殺乳母王聖與中黄門李閏等誣告尚書鄧訪等謀廢立宗族皆免官騭與遵皆自殺丙申貶平原王翼為都鄉侯秋七月己夘改元建光大赦天下壬寅太尉馬英薨八月護羌校尉馬賢討燒當羌於金城不利甲子前司徒劉愷為太尉鮮卑寇居庸闗九月雲中太守成嚴擊之戰歿鮮卑圍烏桓校尉於馬城度遼將軍耿夔救之戊子幸衞尉馮石府續漢書曰賜賞寳劒玉玦雜繒布等劉攽曰注按文多一賞字贊語注可騐是秋京師及郡國二十九雨水冬十一月己丑郡國三十五地震或坼裂詔三公已下各上封事陳得失遣光祿大夫案行賜死者錢人二千除今年田租其被災甚者勿收口賦鮮卑寇𤣥菟庚子復斷大臣二千石以上服三年喪癸夘詔三公特進侯卿校尉舉武猛堪將帥者各五人丙午詔京師及郡國被水雨傷稼者隨頃畆減田租甲子初置漁陽營兵伏侯古今注曰置營兵千人也冬十二月高句驪馬韓穢貊圍𤣥菟城夫餘王遣子與州郡幷力討破之延光元年春二月夫餘王遣子將兵救𤣥菟夫餘王子尉仇台也擊高句驪馬韓穢貊破之遂遣使貢獻三月丙午改元延光大赦天下還徙者復户邑屬籍賜民爵及三老孝悌力田人二級加賜鰥}
