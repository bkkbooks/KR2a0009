  - {type: variant, offset: 1185, length: 1, content: 孫, WYG: 朔日有食之先零羌敗涼州刺史皮陽於狄道乙邜詔除三輔三歲田租更賦口算解見光武紀也十一月是歲郡國十五地震二年春正月詔稟三輔及幷涼六郡流冗貧人蜀郡青衣道夷奉獻内屬青衣道縣名}
  - {type: variant, offset: 1185, length: 1, content: 孫, krp: 朔日有食之先零羌敗涼州刺史皮陽於狄道乙邜詔除三輔三歲田租更賦口算解見光武紀也十一月是歲郡國十五地震二年春正月詔稟三輔及幷涼六郡流冗貧人蜀郡青衣道夷奉獻内屬青衣道縣名}
  - {type: variant, offset: 1187, length: 0, content: '', WYG: 大江青衣二水之㑹今嘉州龍遊縣也東觀記曰青衣蠻夷唐律等歸義脩理西門豹所分漳水為支渠以漑民田史記曰西門豹為鄴令發人鑿十二渠引水灌田所鑿之渠在今相州鄴縣西也二月戊戌遣中謁者收𦵏}
