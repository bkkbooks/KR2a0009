  - {type: variant, offset: 1857, length: 384, content: 廣成囿悉以假貧民恣得采捕不收其稅丁未詔曰去年秋麥入少恐民食不足其上尤貧不能自給者戶口人數往者郡國上貧民以衣履釜為貲而豪右得其饒利詔書實覈欲有以益之而長吏不能躬親反更徵召會聚令失農作愁擾百姓若復有犯者二千石先坐甲寅太傅鄧彪薨戊午隴西地震三月戊子詔曰選舉良才為政之本科別行能必由鄉曲而郡國舉吏不加簡擇故先帝明勑在所令試之以職乃得充選又德行尤異不須經職者別署狀上而宣布以來出入九年二千石曾不承奉恣心從好司隸刺史訖無糾察今新蒙赦令且復申勑後有犯者顯明其罰在位不以選舉為憂督察不以發覺為負非獨州郡也是以庶官多非其人下民被姦邪之傷由法不行故也庚寅遣使者分行貧民舉實流開倉賑稟三十餘郡夏四月壬子封阜陵王种兄魴為阜陵王六月丁酉郡國三雨雹秋九月辛酉廣宗王萬歲薨無子國除匈奴單于於除鞬叛遣中郎將任尚討滅之壬午令郡縣勸民蓄蔬食以助五穀其官有陂池令得采取勿收假稅二歲冬十月辛未太尉尹睦薨十一月, WYG: 府君}
