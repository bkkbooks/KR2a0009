  - {type: variant, offset: 1392, length: 0, content: '', WYG: 貞婦帛人二匹夏四月癸未京師郡國二十一雨雹癸巳司空陳襃免五月庚戌宗正彭城劉授為司空漢官儀曰宗正卿秩中二千石授字孟春徐州武原人也己巳改樂成國為安平封河間王開子得為安平王六月郡國蝗秋七月癸夘京師及郡國十三地震高句驪降䖍人羌叛攻穀羅城榖羅屬西河郡度遼將軍耿夔討破之八月戊子陽陵園寢火景帝陵也辛夘九眞言黄龍見無功無功縣屬九真郡己亥詔三公中二千石舉刺史二千石令長相視事一歲已上至十歲清白愛利能勑身率下防姦理煩有益於人者無拘官簿清白謂貞正也愛利謂愛人而利之也無拘官簿謂受超遷之不拘常牒也劉攽曰注案文受當作將刺史舉所部郡國太守相舉墨綬隠親悉心勿取浮華墨綬謂令長之屬也隱親猶親自隱也悉盡也言令三公以下各舉所知皆隱審盡心勿取浮華不實者九月甲戌郡國二十七地震冬十月鮮卑寇鴈門定襄}
