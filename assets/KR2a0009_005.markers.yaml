  - {type: variant, offset: 6157, length: 0, content: '', WYG: 西域長史班勇西域都護之長史也擊車師後王斬之丙午東海王肅薨冬十月丙午越嶲山崩辛亥少帝薨是冬京師大疫論曰孝安雖稱尊享御而權歸鄧氏至乃損徹膳服克念政道然令自房帷威不逮逺始失根統歸成陵敝遂復計金授官永初元年令吏人入錢穀得至闗内侯也移民逃寇羌既轉盛詔隴西徙襄武安定徙羙陽北地徙池陽推咎台衡以答天眚台謂三台三公象也衡平也言天下所取平伊尹為阿衡即其義也旣云哲婦亦惟家之索矣哲智也索盡也謂鄧后專制國柄也詩曰哲夫成城哲婦傾城書曰牝雞之晨惟家之索贊曰安德不升秕我王度秕榖不成也諭政敎之穢左傳祈招之詩曰思我王度降奪儲嫡開萌邪蠧儲嫡謂太子也邪蠧謂江京等也馮石承歡楊公逢怒續漢志曰上賜衞尉馮石寶劒玉玦雜繒布等故曰承歡也楊公楊震逢怒謂樊豐等譖震云有恚恨心帝免之劉攽曰注續漢志案前又作漢書今此作志志不記如此事作書是彼日而微遂祲天路日君道也微不明也祲陰陽相侵之氣也詩曰彼月而微此日而微言君道闇亂政化陵遲漢祚衰微自此而始故言遂祲天路也紀書殤帝𦵏康陵臣攽案前書平帝已名康陵不當重複章懷注云在慎陵瑩中}
