  - {type: variant, offset: 2309, length: 307, content: 鴻薨二月乙未遣謁者分行稟貸三河兗冀青州貧民許陽侯馬光自殺丁未司空劉方為司徒太常張奮為司空三月庚寅詔流民所過郡國皆實稟之其有販賣者勿出租稅又欲就賤還歸者復一歲田租更賦丙寅詔曰朕以眇末承奉鴻烈陰陽不和水旱違度濟河之域凶饉流亡而未獲忠言至謀所以匡救之策寤寐永歎用思孔疚惟官人不得於上黎民不安于下有司不念寬和而競為苛刻覆案不急以妨民事甚非所以上當天心下濟元元也思得忠良之士以輔朕之不逮其令三公中二千石二千石內郡守相舉賢良方正能直言極諫之士各一人昭巖穴披幽隱遣詣公車朕將悉聽焉帝乃親臨策問選補郎吏夏四月蜀郡徼外羌率種人遣使內附五月城陽王淑薨無子國除六月己酉初令伏閉盡日秋七月京師旱詔中都官徒各除半刑讁其未竟五月已下皆免遣丁巳, WYG: 夘}
