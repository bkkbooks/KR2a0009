  - {type: variant, offset: 6183, length: 6, content: 水灾妨害秋稼, WYG: 一令字何焯曰按下云各使指變以聞則不當有令字也皇太后率大臣命婦謁宗廟注東觀續漢袁山松謝沈書臣承蒼按東觀下脱一記字續漢下脱一書字大尉司馬苞薨注謝承書曰司徒楊震為樊豐等所譖連及苞苞乞骸骨未見聽以疾薨也何焯曰按永寜元年十二月劉愷罷楊震始為司徒苞之薨在其前六年甚矣謝書之失實也太常李郃為司徒監本郃訛邵今改正北海王普來}
