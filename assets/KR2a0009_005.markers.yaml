  - {type: variant, offset: 923, length: 0, content: '', WYG: 稟河南下邳東萊河内貧民古今注曰時州郡大饑米石二千人相食老弱相棄道路車騎大將軍鄧騭為種羌所敗於冀西續漢書曰種羌九千餘户在隴西臨洮谷冀縣屬天水郡也劉攽曰正文案官無車騎大將軍者明大字衍騭後乃為大將軍耳二月乙丑遣光祿大夫樊準呂倉分行冀兖二州稟貸流民夏四月甲寅漢陽城中火燒殺三千五百七十人五月旱丙寅皇太后幸洛陽寺及若盧獄錄囚徒賜河南尹廷尉卿及官屬以下各有差即日降雨六月京師及郡國四十大水大風雨雹東觀記曰雹大如芋魁雞子風拔樹發屋秋七月戊辰詔曰昔在帝王承天理民莫不據璇璣玉衡以齊七政孔安國尚書注曰璇羙玉也以璇為璣以玉為衡二者正天文之器也七政日月五星各異其政制即今之渾儀朕以不徳遵奉大業而陰陽差越變異並見萬民饑流羌貊叛戾夙夜克己憂心京京詩小雅曰憂心京京爾雅曰京京憂也間令公卿郡國舉賢良方正遠求博選開不諱之路冀得至謀以鑒不逮而所對皆循尚浮言無卓爾異聞卓爾髙遠之貌也論語曰如有所立卓爾其百僚及郡國吏人劉攽曰案此不成文理當有一令字有道術明習災異陰陽之度璇璣之數者各使指變以聞二千石長吏明以詔書博衍幽隱衍猶引也朕將親覽待以不次冀獲嘉謀以承天誡閏月辛丑廣川王常保薨無子國除癸未蜀郡徼外羌舉土内屬東觀記曰徼外羌薄申等八種舉衆降九月庚子詔王主官屬墨綬下至郎謁者續漢書曰王國有中大夫秩比六百石謁者比四百石郎中二百石劉攽曰正文二漢諸侯王未嘗有主稱蓋是國字前書多言王國此注中亦有王國文主字作國無疑也或謂主指公主案公主但有家令無郎謁者又此詔文但言國相移名其非公主明矣或者傳寫見後有王主之文遂誤於此其經明任博士居鄉里有廉清孝順之稱才任理人者國相歲移名與計偕上尚書公府通調令得外補移書也調選也冬十月庚寅稟濟陰山陽𤣥莬貧民征西校尉任尚與先零羌戰于平襄尚軍敗績平襄縣屬天水郡故襄戎邑也十一月辛酉拜鄧騭為大將軍徵還京師留任尚屯隴右先零羌滇零稱天子於北地滇零羌名音丁田反遂寇三輔東犯趙魏南入益州殺漢中太守董炳十二月辛夘稟東郡鉅鹿廣陽安定定襄沛國貧民廣漢塞外參狼羌降分廣漢北部為屬國都尉是歲郡國十二地震三年春正月庚子皇帝加元服元服謂加冠也士冠禮曰令月吉辰加爾元服鄭𤣥云元首也大赦天下賜王主貴人公卿以下金帛各有差男子為父後及三老孝悌力田爵人二級流民欲占者人一級遣騎都尉任仁討先零羌不利羌遂破沒臨洮縣名屬隴西郡高句驪遣使貢獻三月京師大饑民相食壬辰公卿詣闕謝詔曰朕以幼沖奉承鴻業不能宣流風化而感逆陰陽至令百姓饑荒更相噉食永懐悼歎若墜淵水咎在朕躬非羣司之責而過自貶引重朝廷之不德貶引謂貶損引過也重音直用反其務思變復以助不逮癸巳詔以鴻池假與貧民續漢書曰鴻池在洛陽東二十里假借也令得漁采其中壬寅司徒魯恭免夏四月丙寅大鴻臚九江夏勤為司徒勤字伯宗夀春人也三公以國用不足奏令吏人入錢榖得為闗内侯虎賁羽林郎五大夫官府吏緹騎營士各有差續漢志曰執金吾緹騎二百人緹赤黄色營士謂五校營士也漢官儀曰屯騎越騎歩兵射聲各領士七百人長水領士千三百六十七人也己巳詔上林廣城苑可墾闢者賦與貧民甲申清河王虎威薨五月丙申封樂安王寵子延平為清河王丁酉沛王正薨癸丑京師大風六月烏桓寇代郡上谷涿郡秋七月海賊張伯路等寇略緣海九郡遣侍御史龐雄督州郡兵討破之庚子詔長吏案行在所皆令種宿麥蔬食務盡地力其貧者給種餉九月鴈門烏桓及鮮卑叛敗五原郡兵於髙渠谷東觀記曰戰九原髙梁谷渠梁相類必有誤也冬十月南單于叛圍中郎將耿种於羙稷十一月遣行車騎將軍何熈討之劉攽曰案文少一事字十二月辛酉郡國九地震乙亥有星孛于天苑天苑星名是歲京師及郡國四十一雨水雹續漢書曰雹大如鴈子也并涼二州大饑人相食四年春正月元日㑹徹樂不陳充庭車每大朝㑹必陳乘輿法物車輦於庭故曰充庭車也以年饑故不陳辛夘詔以三輔比遭寇亂人庶流冗除三年逋租過更口算芻槀前書音義曰天下人皆戌邉三日不可人人自行行者自戌三日不可往復還因便住一歲諸不行者出錢三百入官官以給戌者言過其本更之日故曰過更又日人年十五至五十六出賦錢人百二十為一算也稟上郡貧民各有差海賊張伯路復與勃海平原劇賊劉文河周文光等攻厭次殺縣令遣御史中丞王宗督靑州刺史法雄討破之度遼將軍梁慬遼東太守耿夔討破南單于於屬國故城丙午詔減百官及州郡縣奉各有差二月丁巳稟九江貧民南匈奴寇常山乙丑初置長安雍二營都尉官漢官儀曰京兆虎牙扶風都尉以涼州近羌數犯三輔将兵衛護園陵扶風都尉居雍縣故俗人稱雍營焉西羌傳云虎牙都尉居長安乙亥詔自建初以來諸祅言它過坐徙邊者各歸本郡其沒入官為奴婢者免為庶人詔謁者劉珍及五經博士校定東觀五經諸子傳記百家蓺術整齊脱誤是正文字洛陽宫殿名曰南宫有東觀前書曰凡諸子百八十九家言百家舉全數也三月南單于降先零羌寇襃中縣名屬漢中郡今梁州襃城縣漢中太守鄭勤戰歿徙金城郡都襄武襄武縣名屬隴西郡今渭州郡戊子杜陵園火癸巳郡國九地震夏四月六州蝗東觀記曰司𨽻豫兗徐青冀六州}
