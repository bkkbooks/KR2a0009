  - {type: variant, offset: 2617, length: 2771, content: 洛陽寺錄囚徒舉冤獄收洛陽令下獄抵罪司隸校尉河南尹皆左降未及還宮而澍雨西域都護班超大破焉耆尉犁斬其王自是西域降服納質者五十餘國南單于安國從弟子逢侯率叛胡亡出塞九月癸丑以光祿勳鄧鴻行車騎將軍事與越騎校尉馮柱行度遼將軍朱徽使匈奴中郎將杜崇討之冬十一月護烏桓校尉任尚率烏桓鮮卑大破逢侯馮柱遣兵追擊復破之詔以勃海郡屬冀州武陵漊中蠻叛郡兵討平之七年春正月行車騎將軍鄧鴻度遼將軍朱徽中郎將杜崇皆下獄死夏四月辛亥朔日有食之帝引見公卿問得失令將大夫御史謁者博士議郎郎官會廷中各言封事詔曰元首不明化流無良政失於民讁見于天深惟庶事五教在寬是以舊典因孝廉之舉以求其人有司詳選郎官寬博有謀才任典城者三十人既而悉以所選郎出補長相五月辛卯改千乘國為樂安國六月丙寅沛王定薨秋七月乙巳易陽地裂九月癸卯京師地震八收二月己丑立貴人陰氏為皇后賜天下男子爵人二級三老孝悌力田三級民無名數及流民欲占者一級魚眾寡孤獨篤貧不能自存者粟人五斛夏四月癸亥樂成王黨薨甲子詔賑貸并州四郡貧民五月河內陳留蝗南匈奴右溫禺犢王叛為寇秋七月行度遼將軍龐奮越騎校尉馮柱追討之斬右溫禺犢王車師後王叛擊其前王八月辛酉飲酎詔郡國中都官繫打謢漱等詣敦煌戍其犯大逆募下蠶室其女子宮自死罪已下至司寇及亡命者入贖各有差九月京師蝗吏民言事者多歸責有司詔曰蝗蟲之異殆不虛生萬方有罪在予一人而言事者專咎自下非助我者也朕寤寐恫矝思弭憂釁昔楚嚴無灾而懼成王出郊而反風將何以匡朕不逮以塞灾變百僚師尹勉修厥職刺史二千石詳刑辟理冤虐恤魚眾寡矝孤弱思惟致灾興蝗之咎庚子復置廣陽郡冬十月乙丑北海王威有罪自殺十二月辛亥陳王羨薨丁巳南宮宣室殿火九年春正月永昌徼外蠻夷及撣國重譯奉貢三月庚辰隴西地震癸巳濟南王康薨西域長史王林擊車師後王斬之夏四月丁卯封樂成王黨子巡為樂成王六月蝗旱戊辰詔今年秋稼為蝗蟲所傷皆勿收租更芻若有所損失以實除之餘當收租者亦半入其山林饒利陂池漁採以贍元元勿收假稅秋七月蝗蟲飛過京師八月鮮卑寇肥如遼東太守祭參下獄死閏月辛巳皇太后竇氏崩丙申葬章德皇后燒當羌寇隴西殺長吏遣行征西將軍劉尚越騎校尉趙世等討破之九月庚申司徒劉方策免自殺甲子追尊皇妣梁貴人為皇太后冬十月乙酉改葬恭懷梁皇后于西陵十一月癸卯光祿勳河南呂蓋為司徒十二月丙寅司空張奮罷壬申太僕韓稜為司空己丑復置若盧獄官十年春三月壬戌詔曰隄防溝渠所以順助地理通利壅塞今廢慢懈薥不以為負刺史二千石其隨宜疏導勿因緣妄發以為煩擾將顯行其罰夏五月京師大水秋七月己巳司空韓稜薨八月丙子太常太山巢堪為司空九月庚戌復置廩犧官冬十月五州雨水十二月燒當羌豪迷唐等率種人詣闕貢獻戊寅梁王暢薨十一年春二月遣使循行郡國稟貸被灾害不能自存者令得漁采山林池澤不收假稅丙午詔郡國中都官徒及篤老小女徒各除半刑其未竟三月者皆免歸田里夏四月丙寅大赦天下己巳復置右校尉官秋七月辛卯詔曰吏民踰僭厚死傷生是以舊令節之制度頃者貴戚近親百僚師尹莫肯率從有司不舉怠放日甚又商賈小民或忘法禁奇巧靡貨流積公行其在位犯者當先舉正巿道小民但且申明憲綱勿因科令加虐羸弱十二年春二月旄牛徼外白狼貗薄夷率種人內屬詔貸被灾諸郡民種糧賜下貧魚眾寡孤獨不能自存者及郡國流民聽入陂池漁采以助蔬食三月丙申詔曰比年不登百姓虛匱京師去冬無宿雪今春無澍雨黎民流離困於道路朕痛心疾首靡知所濟瞻仰昊天何辜今人三公朕之腹心而未獲承天安民之策數詔有司務擇良吏今猶不改競為苛暴侵愁小民以求虛名委任下吏假埶行邪是以令下而姦生禁至而詐起巧法析律飾文增辭貨行於言罪成乎手朕甚病焉公卿不思助明好惡將何以救其咎罰咎罰既至復令灾及小民若上下同心庶或有瘳其賜天下男子爵人二級三老孝悌力田三級民無名數及流民欲占者人一級魚眾寡孤獨篤貧不能自存者粟人三斛壬子賜博士員弟子在太學者布人三匹夏四月日南象林蠻夷反郡兵討破之閏月脤貸敦煌張掖五原民下貧者穀戊辰賑歸山崩六月舞陽大水賜被水灾尤貧者穀人三斛秋七月辛亥朔日有食之九月戊午太尉張酺免丙寅大司農張禹為太尉冬十一月西域蒙奇兜勒二國遣使內附賜其王金印紫綬是歲燒當羌復叛十三年春正月丁丑帝幸東觀覽書林閱篇籍博選術蓺之士以充其官二月任城王忿屆丙午賑貸張掖居延朔方日南貧民及孤寡羸弱不能自存者秋八月詔象林民失農桑業者賑貸種糧稟賜下貧穀食己亥北宮盛饌門閣火護羌校尉周鮪擊燒當羌破之荊州雨水九月壬子詔曰荊州比歲不節今茲淫水為害餘雖頗登而多不均浹深惟四民農食之本慘然懷矜其令天下半入今年田租芻有宜以實除者如故事貧民假種食皆勿收責冬十一月安息國遣使獻師子及條枝大爵丙辰詔曰幽涼州戶口率少邊役衆劇束脩良吏進仕路狹撫接夷狄以人為本其令緣邊郡口十萬以上歲舉孝廉一人不滿十萬二歲舉一人五萬以下三歲舉一人鮮卑寇右北平遂入漁陽漁陽太守擊破之戊辰司徒呂蓋罷十二月丁丑光祿勳魯恭為司徒辛卯巫蠻叛寇南郡十四年春二月乙卯東海王政薨繕修故西海郡徙金城西部都尉以戍之三月戊辰臨辟雍饗射大赦天下夏四月遣使者督荊州兵討巫蠻破降之庚辰賑貸張掖居延敦煌五原漢陽會稽流民下貧穀各有差五月丁未初置象林將兵長史官六月辛卯廢皇后陰氏后父特進綱自殺秋七月甲寅詔復象林縣更賦田租芻二歲壬子常山王側薨是秋三州雨水冬十月甲申詔兗豫荊州今年水雨淫過多傷農功其令被害什四以上皆半入田租芻其不滿者以實除之辛卯立貴人鄧氏為皇后丁酉司空巢堪罷十一月癸卯大司農徐防為司空是歲初復郡國上計補郎官十五年春閏月乙未詔流民欲還歸本而無糧食者過所實稟之疾病加致醫藥其不欲還歸者勿強二月詔稟貸潁川汝南陳留江夏梁國敦煌貧民夏四月甲子晦日有食之五月戊寅南陽大風六月詔令百姓魚眾寡漁采陂池勿收假稅二歲秋七月丙寅濟南王錯薨復置涿郡故安鐵官九月壬午南巡狩清河王慶濟北王壽河閒王開並從賜所過二千石長吏以下三老官屬及民百年者錢布各有差是秋四州雨水冬十月戊申幸章陵祠舊宅癸丑祠園廟會宗室於舊廬勞賜作樂戊午進幸雲夢臨漢水而還十一月甲申車駕還宮賜從臣及留者公卿以下錢布各有差十二月庚子琅邪王宇薨有司奏以為夏至則微陰起靡草死可以決小事是歲初令郡國以日北至案薄刑十六年春正月己卯詔貧民有田業而以匱乏不能自農者貸種糧二月己未詔兗豫徐冀四州比年雨多傷稼禁沽酒夏四月遣三府掾分行四州貧民無以耕者為雇犂牛直五月壬午趙王商薨秋七月旱戊午詔曰今秋稼方穗而旱雲雨不霑疑吏行慘刻不宣恩澤妄拘無罪幽閉良善所致其一切囚徒於法疑者勿決以奉秋令方察煩苛之吏顯明其罰辛酉司徒魯恭免庚午光祿勳張酺為司徒辛巳詔令天下皆半入今年田租芻其被灾害者以實除之貧民受貸種糧及田租芻皆勿收責八月己酉司徒張酺薨冬十月辛卯司空徐防為司徒大鴻臚陳寵為司空十一月己丑行幸緱氏登百岯山賜百官從臣布各有差北匈奴遣使稱臣貢獻十二月復置遼東西部都尉官元興元年春正月戊午引三署郎召見禁中選除七十五人補謁者長相高句驪寇郡界夏四月庚午大赦天下改元元興宗室以罪絕者悉復屬籍五月癸酉雍地裂秋九月遼東太守耿夔擊貊人破之冬十二月辛未, WYG: 葉}
  - {type: variant, offset: 2617, length: 2771, content: 洛陽寺錄囚徒舉冤獄收洛陽令下獄抵罪司隸校尉河南尹皆左降未及還宮而澍雨西域都護班超大破焉耆尉犁斬其王自是西域降服納質者五十餘國南單于安國從弟子逢侯率叛胡亡出塞九月癸丑以光祿勳鄧鴻行車騎將軍事與越騎校尉馮柱行度遼將軍朱徽使匈奴中郎將杜崇討之冬十一月護烏桓校尉任尚率烏桓鮮卑大破逢侯馮柱遣兵追擊復破之詔以勃海郡屬冀州武陵漊中蠻叛郡兵討平之七年春正月行車騎將軍鄧鴻度遼將軍朱徽中郎將杜崇皆下獄死夏四月辛亥朔日有食之帝引見公卿問得失令將大夫御史謁者博士議郎郎官會廷中各言封事詔曰元首不明化流無良政失於民讁見于天深惟庶事五教在寬是以舊典因孝廉之舉以求其人有司詳選郎官寬博有謀才任典城者三十人既而悉以所選郎出補長相五月辛卯改千乘國為樂安國六月丙寅沛王定薨秋七月乙巳易陽地裂九月癸卯京師地震八收二月己丑立貴人陰氏為皇后賜天下男子爵人二級三老孝悌力田三級民無名數及流民欲占者一級魚眾寡孤獨篤貧不能自存者粟人五斛夏四月癸亥樂成王黨薨甲子詔賑貸并州四郡貧民五月河內陳留蝗南匈奴右溫禺犢王叛為寇秋七月行度遼將軍龐奮越騎校尉馮柱追討之斬右溫禺犢王車師後王叛擊其前王八月辛酉飲酎詔郡國中都官繫打謢漱等詣敦煌戍其犯大逆募下蠶室其女子宮自死罪已下至司寇及亡命者入贖各有差九月京師蝗吏民言事者多歸責有司詔曰蝗蟲之異殆不虛生萬方有罪在予一人而言事者專咎自下非助我者也朕寤寐恫矝思弭憂釁昔楚嚴無灾而懼成王出郊而反風將何以匡朕不逮以塞灾變百僚師尹勉修厥職刺史二千石詳刑辟理冤虐恤魚眾寡矝孤弱思惟致灾興蝗之咎庚子復置廣陽郡冬十月乙丑北海王威有罪自殺十二月辛亥陳王羨薨丁巳南宮宣室殿火九年春正月永昌徼外蠻夷及撣國重譯奉貢三月庚辰隴西地震癸巳濟南王康薨西域長史王林擊車師後王斬之夏四月丁卯封樂成王黨子巡為樂成王六月蝗旱戊辰詔今年秋稼為蝗蟲所傷皆勿收租更芻若有所損失以實除之餘當收租者亦半入其山林饒利陂池漁採以贍元元勿收假稅秋七月蝗蟲飛過京師八月鮮卑寇肥如遼東太守祭參下獄死閏月辛巳皇太后竇氏崩丙申葬章德皇后燒當羌寇隴西殺長吏遣行征西將軍劉尚越騎校尉趙世等討破之九月庚申司徒劉方策免自殺甲子追尊皇妣梁貴人為皇太后冬十月乙酉改葬恭懷梁皇后于西陵十一月癸卯光祿勳河南呂蓋為司徒十二月丙寅司空張奮罷壬申太僕韓稜為司空己丑復置若盧獄官十年春三月壬戌詔曰隄防溝渠所以順助地理通利壅塞今廢慢懈薥不以為負刺史二千石其隨宜疏導勿因緣妄發以為煩擾將顯行其罰夏五月京師大水秋七月己巳司空韓稜薨八月丙子太常太山巢堪為司空九月庚戌復置廩犧官冬十月五州雨水十二月燒當羌豪迷唐等率種人詣闕貢獻戊寅梁王暢薨十一年春二月遣使循行郡國稟貸被灾害不能自存者令得漁采山林池澤不收假稅丙午詔郡國中都官徒及篤老小女徒各除半刑其未竟三月者皆免歸田里夏四月丙寅大赦天下己巳復置右校尉官秋七月辛卯詔曰吏民踰僭厚死傷生是以舊令節之制度頃者貴戚近親百僚師尹莫肯率從有司不舉怠放日甚又商賈小民或忘法禁奇巧靡貨流積公行其在位犯者當先舉正巿道小民但且申明憲綱勿因科令加虐羸弱十二年春二月旄牛徼外白狼貗薄夷率種人內屬詔貸被灾諸郡民種糧賜下貧魚眾寡孤獨不能自存者及郡國流民聽入陂池漁采以助蔬食三月丙申詔曰比年不登百姓虛匱京師去冬無宿雪今春無澍雨黎民流離困於道路朕痛心疾首靡知所濟瞻仰昊天何辜今人三公朕之腹心而未獲承天安民之策數詔有司務擇良吏今猶不改競為苛暴侵愁小民以求虛名委任下吏假埶行邪是以令下而姦生禁至而詐起巧法析律飾文增辭貨行於言罪成乎手朕甚病焉公卿不思助明好惡將何以救其咎罰咎罰既至復令灾及小民若上下同心庶或有瘳其賜天下男子爵人二級三老孝悌力田三級民無名數及流民欲占者人一級魚眾寡孤獨篤貧不能自存者粟人三斛壬子賜博士員弟子在太學者布人三匹夏四月日南象林蠻夷反郡兵討破之閏月脤貸敦煌張掖五原民下貧者穀戊辰賑歸山崩六月舞陽大水賜被水灾尤貧者穀人三斛秋七月辛亥朔日有食之九月戊午太尉張酺免丙寅大司農張禹為太尉冬十一月西域蒙奇兜勒二國遣使內附賜其王金印紫綬是歲燒當羌復叛十三年春正月丁丑帝幸東觀覽書林閱篇籍博選術蓺之士以充其官二月任城王忿屆丙午賑貸張掖居延朔方日南貧民及孤寡羸弱不能自存者秋八月詔象林民失農桑業者賑貸種糧稟賜下貧穀食己亥北宮盛饌門閣火護羌校尉周鮪擊燒當羌破之荊州雨水九月壬子詔曰荊州比歲不節今茲淫水為害餘雖頗登而多不均浹深惟四民農食之本慘然懷矜其令天下半入今年田租芻有宜以實除者如故事貧民假種食皆勿收責冬十一月安息國遣使獻師子及條枝大爵丙辰詔曰幽涼州戶口率少邊役衆劇束脩良吏進仕路狹撫接夷狄以人為本其令緣邊郡口十萬以上歲舉孝廉一人不滿十萬二歲舉一人五萬以下三歲舉一人鮮卑寇右北平遂入漁陽漁陽太守擊破之戊辰司徒呂蓋罷十二月丁丑光祿勳魯恭為司徒辛卯巫蠻叛寇南郡十四年春二月乙卯東海王政