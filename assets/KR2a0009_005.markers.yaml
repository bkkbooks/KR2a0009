  - {type: variant, offset: 1392, length: 0, content: '', krp: 貞婦帛人二匹夏四月癸未京師郡國二十一雨雹癸巳司空陳襃免五月庚戌宗正彭城劉授為司空漢官儀曰宗正卿秩中二千石授字孟春徐州武原人也己巳改樂成國為安平封河間王開子得為安平王六月郡國蝗秋七月癸夘京師及郡國十三地震高句驪降䖍人羌叛攻穀羅城榖羅屬西河郡度遼將軍耿夔討破之八月戊子陽陵園寢火景帝陵也辛夘九眞言黄龍見無功無功縣屬九真郡己亥詔三公中二千石舉刺史二千石令長相視事一歲已上至十歲清白愛利能勑身率下防姦理煩有益於人者無拘官簿清白謂貞正也愛利謂愛人而利之也無拘官簿謂受超遷之不拘常牒也劉攽曰注案文受當作將刺史舉所部郡國太守相舉墨綬隠親悉心勿取浮華墨綬謂令長之屬也隱親猶親自隱也悉盡也言令三公以下各舉所知皆隱審盡心勿取浮華不實者九月甲戌郡國二十七地震冬十月鮮卑寇鴈門定襄}
  - {type: variant, offset: 1395, length: 0, content: '', WYG: 鮮卑寇太原燒當羌豪降十二月九真徼外蠻夷貢獻内屬是歲京師及郡國二十七雨水大風殺人詔賜壓溺死者年七歲以上錢人二千其壞敗廬舍失亡穀食粟人三斛又田被淹傷者一切勿收田租若一家皆被災害而弱小存者郡縣為收斂之䖍人羌反攻穀羅城度遼將軍耿夔討破之二年春正月旄牛夷叛寇靈闗殺縣令靈闗道屬越嶲郡益州刺史蜀郡西部都尉討之詔選三署郎三署解見和帝紀及吏人能通古文尚書毛詩穀梁春秋各一人丙辰河東潁川大風夏六月壬午郡國十一大風九真言嘉禾生東觀記曰禾百五十六本七百六十八穗丙申北海王普薨秋七月丹陽山崩八月庚午初令三署郎通達經術任牧民者視事三歲以上皆得察舉九月郡國五雨水冬十月辛未太尉劉愷罷甲戌司徒楊震為太尉光禄勳東萊劉熹為司徒熹字季明青州長廣人也十一月甲辰校獵上林苑鮮卑敗南匈奴於曼栢是歲分蜀郡西部為屬國都尉京師及郡國三地震三年春二月丙子東廵狩丁丑告陳留太守祠南頓君光武皇帝于濟陽復濟陽今年田租芻槀庚寅遣使者祠唐堯於成陽古成伯國也故城在今濮州雷澤縣北述征記云成陽東南有堯冢戊子濟南上言鳳皇集臺縣丞霍收舍樹上臺縣屬濟南郡故城在今齊州平陵縣北賜臺長帛五十匹丞三十匹尉半之吏卒人三匹鳳皇所過亭郡無出今年田租賜男子爵人二級辛夘幸太山柴告岱宗太山王者告岱之處為五嶽之宗故曰岱宗燔柴以告天齊王無忌北海王普樂安王延來朝壬辰宗祀五帝于汶上明堂}
