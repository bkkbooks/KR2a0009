  - {type: variant, offset: 1180, length: 4, content: 列侯宗室, WYG: 二千石郡守舉敦厚質直者各一人五月先零羌寇雍城六月丁巳河東地陷秋七月蜀郡夷寇蠶陵殺縣令蠶陵縣屬蜀郡故城在今翼州翼水縣西有蠶陵山因以為名焉九月乙丑大尉李脩罷先陵羌寇武都漢中絶隴道辛未大司農山陽司馬苞為太尉謝承書曰苞字仲成東緡人也冬十月戊}
