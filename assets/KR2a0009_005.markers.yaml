  - {type: variant, offset: 857, length: 0, content: '', WYG: 災異屢見也辛未司空尹勤免以水雨漂流也癸酉調揚州五郡租米五郡謂九江丹陽廬江吳郡豫章也揚州領六郡㑹稽最逺蓋不調也贍給東郡濟陰陳留梁國陳國下邳山陽丁丑詔曰自今長吏被考竟未報考謂考問其狀也報謂斷決也自非父母䘮無故輙去職者劇縣十歲平縣五歲以上乃得次用壬午詔太僕少府減黄門鼓吹以補羽林士漢官儀曰黄門鼓吹百四十五人羽林左監主羽林八百人右監主九百人廐馬非乗輿常所御者皆減半食乗輿天子所乗}
