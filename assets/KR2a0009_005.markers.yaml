  - {type: variant, offset: 1109, length: 0, content: '', WYG: 蝗郡國八雨水六年春正月庚申詔越嶲置長利髙望始昌三苑又令益州郡置萬歲苑犍為置漢平苑犍為郡名前書音義曰故夜郎國也故城在今眉州隆山縣西北也三月十州蝗夏四月乙丑司空張敏罷己邜大常劉凱為司空五月旱丙寅詔令中二千石下至黄綬一切復秩還贖賜爵各有差戊辰皇太后幸雒陽寺錄囚徒理寃獄六月壬辰豫章員谿原山崩員谿闕也辛巳大赦天下遣侍御史唐喜討漢陽賊王信破斬之續漢書曰傳信首詣洛陽梟榖城門外冬十一月辛丑護烏桓校尉吳祉下獄死是歲先零羌滇零死子零昌復襲偽號七年春正月庚戌皇太后率大臣命婦謁宗廟喪服傳曰命夫者其男子之為大夫也命婦者其大夫之妻也臣賢案東觀續漢袁山松謝沈書古今注皆云六年正月甲寅謁宗廟此云七年庚戌疑紀誤也二月丙午郡國十八地震夏四月乙未平原王勝薨丙申晦日有食之五月庚子京師大雩左傳曰龍見而雩杜預注云謂建巳之月龍星角亢見東方雩逺也逺為百穀求膏雨周禮司巫職曰若國大旱則帥巫而舞雩鄭𤣥注云雩吁也嗟而求雨秋護羌校尉侯霸騎都尉馬賢破先零羌八月丙寅京師大風蝗蟲飛過洛陽詔賜民爵郡國被蝗傷稼十五以上勿收今年田租不滿者以實除之}
  - {type: page-break, offset: 1109, content: '', id: KR2a0009_WYG_005-12b, image: WYG0252/WYG0252-0114b.png}
  - {type: page-break, offset: 1109, content: '', id: KR2a0009_WYG_005-13a, image: WYG0252/WYG0252-0114c.png}
