  - {type: variant, offset: 1395, length: 0, content: '', krp: 鮮卑寇太原燒當羌豪降十二月九真徼外蠻夷貢獻内屬是歲京師及郡國二十七雨水大風殺人詔賜壓溺死者年七歲以上錢人二千其壞敗廬舍失亡穀食粟人三斛又田被淹傷者一切勿收田租若一家皆被災害而弱小存者郡縣為收斂之䖍人羌反攻穀羅城度遼將軍耿夔討破之二年春正月旄牛夷叛寇靈闗殺縣令靈闗道屬越嶲郡益州刺史蜀郡西部都尉討之詔選三署郎三署解見和帝紀及吏人能通古文尚書毛詩穀梁春秋各一人丙辰河東潁川大風夏六月壬午郡國十一大風九真言嘉禾生東觀記曰禾百五十六本七百六十八穗丙申北海王普薨秋七月丹陽山崩八月庚午初令三署郎通達經術任牧民者視事三歲以上皆得察舉九月郡國五雨水冬十月辛未太尉劉愷罷甲戌司徒楊震為太尉光禄勳東萊劉熹為司徒熹字季明青州長廣人也十一月甲辰校獵上林苑鮮卑敗南匈奴於曼栢是歲分蜀郡西部為屬國都尉京師及郡國三地震三年春二月丙子東廵狩丁丑告陳留太守祠南頓君光武皇帝于濟陽復濟陽今年田租芻槀庚寅遣使者祠唐堯於成陽古成伯國也故城在今濮州雷澤縣北述征記云成陽東南有堯冢戊子濟南上言鳳皇集臺縣丞霍收舍樹上臺縣屬濟南郡故城在今齊州平陵縣北賜臺長帛五十匹丞三十匹尉半之吏卒人三匹鳳皇所過亭郡無出今年田租賜男子爵人二級辛夘幸太山柴告岱宗太山王者告岱之處為五嶽之宗故曰岱宗燔柴以告天齊王無忌北海王普樂安王延來朝壬辰宗祀五帝于汶上明堂}
  - {type: variant, offset: 1396, length: 1, content: 卯, WYG: 巳告祀二祖六宗二祖髙祖光武也六宗謂孝文曰太宗孝武曰代宗孝宣曰中宗孝元曰髙宗孝明曰顯宗孝章曰肅宗勞賜郡縣作樂三月甲午陳王崇薨戊戍祀孔子及七十二弟子於闕里自魯相令丞尉及孔氏親屬婦女諸生悉㑹賜襃成侯以下帛各有差還幸東平至東郡歴魏郡河内壬戌車駕還京師幸太學是日太尉楊震免夏四月乙丑車駕入宮假于祖禰假音格格至也壬戌沛國言甘露降豐縣戊辰光禄勳馮石為太尉五月南匈奴左日逐王叛使匈奴中郎將馬翼討破之日南徼外蠻夷内屬六月鮮卑寇𤣥菟庚午閬中山崩閬中縣屬巴郡臨閬中水因以為名今隆州縣也辛未扶風言白鹿見雍辛巳遣侍御史分行青冀二州災害督錄盗賊秋七月丁酉初復右校令左校丞官續漢志曰將作大匠屬官有左右校皆有令丞中興未置今始復日南徼外蠻豪帥詣闕貢獻馮翊言甘露降頻陽衙頻陽縣故城在今雍州羙原縣西南衙見上潁川上言木連理白鹿麒麟見陽翟鮮卑寇髙栁梁王堅薨明帝孫節王暢之子也八月辛巳大鴻臚耿寶為大將軍戊子潁川上言麒麟一白虎二見陽翟九月丁酉廢皇太子保為濟陰王常侍江京等譖之也乙巳詔郡國中都官死辠繫囚減罪一等詔敦煌隴西及度遼營漢官儀曰度遼將軍屯五原曼栢縣也劉攽曰正文詔敦煌案文詔當作詣其右趾以下及亡命者贖各有差辛亥濟南上言黄龍見歴城歴城縣屬濟南國今齊州縣也庚申晦日有食之冬十月行幸長安壬午新豐上言鳳皇集西界亭今新豐縣西南有鳳皇原俗傳云即此時鳳皇所集之處也丁亥㑹三輔守令掾史於長安作樂閏月乙未}
