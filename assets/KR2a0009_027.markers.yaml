  - {type: variant, offset: 894, length: 2, content: 國師, WYG: 天子步欲前収取因忽不見劭曰尚書春秋左傳曰伯益佐禹治水封於梁飂叔安有裔子曰董父實甚好龍龍多歸之帝舜嘉之賜姓董氏董氏之祖與梁同焉到光熹元年董卓自外入因間乘釁廢帝殺后百官總已號令自由殺戮決前威重於主梁夲安定而卓隴西人俱凉州也天戒若曰卓不當專制奪矯如白衣無冝䦨入宫也白衣見黄門寺及卓之末中黄門誅滅之際事類如此可謂無乎袁山松曰案張角一時狡亂不足致此大妖斯乃曹氏滅漢之徴也案劭所述與志或有不同年月舛異故俱載焉臣昭注曰檢觀前通各有未直尋梁即魏地之名伯夏明於中夏非溥天之稱以内臣孫夫得稱王徴驗有應有若符契復云伯夏教我為天子後曹公曰若天命在吾吾為周文王矣此乃魏文帝受我成䇿而陟帝位也風俗通云見中黄門寺曹騰之家尤見其證二年雒陽上西門外女子生兒両頭異肩共胸俱前向以為不祥堕地棄之自此之後朝廷霿亂政在私門上下無别二頭之象後董卓戮太后被以不孝之名放廢天子後復害之漢元以來禍莫踰此四年魏郡男子張博送鐵盧詣太官博上書室殿山居屋後宫禁落屋讙呼上収縳考門辭忽不自覺知臣昭曰魏人入宫既奪漢之徴至後宫而讙呼終亦禍廢母后中平元年六月壬申雒陽男子劉倉居上西門外妻生男兩頭共身靈帝時江夏黄氏之母浴而化為黿入于深淵其後時出見初浴簮一銀釵及見猶在其首臣昭曰黄者代漢之色女人臣妾之體化為黿黿者元也入于深淵水實制火夫君徳尊陽利見九五飛在于天乃備光盛俯等龜黿有愧潛躍首從戴釵卑弱未盡後帝者王不專權極天德雖謝蜀猶傍纉推求斯異女為曉著矣獻帝初平中長沙有人姓桓氏死棺歛月餘其母聞棺中聲發之}
