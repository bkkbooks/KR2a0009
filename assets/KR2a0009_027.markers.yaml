  - {type: variant, offset: 3115, length: 474, content: 辟之科盡冬月乃斷其立春在十二月中者勿以報囚如故事恭再在公位選辟高第至列卿郡守者數十人而其耆舊大姓或不蒙薦舉至有怨望者恭聞之曰學之不講是吾憂也諸生不有鄉舉者乎終無所言恭性謙退奏議依經潛有補益然終不自顯故不以剛直為稱三年以老病策罷六年年八十一卒於家以兩子為郎長子謙為隴西太守有名績謙子旭官至太僕從獻帝西入關與司徒王允同謀共誅董卓及李傕入長安旭與允俱遇害丕字叔陵性沈深好學孳孳不倦遂杜絕交游不荅候問之禮士友常以此短之而丕欣然自得遂兼通五經以魯詩尚書教授為當世名儒後歸郡為督郵功曹所事之將無不師友待之建初元年肅宗詔舉賢良方正大司農劉寬舉丕時對策者百有餘人唯丕在高第除為議郎遷新野令視事朞年州課第一擢拜青州刺史務在表賢明慎刑罰七年坐事下獄司寇論元和元年徵再遷拜趙相門生就學者常百餘人關東號之曰五經復興魯叔陵趙王商嘗欲避疾便時移住學官丕止不聽王乃上疏自言詔書下丕丕奏曰臣聞禮諸侯薨於路寢大夫卒於嫡室死生有命未有逃避之典也學官傳五帝之道修先王禮樂教化之處王欲廢塞以廣游讌事不可聽詔從丕言王以此憚之其後帝巡狩之趙特被引見難問經傳厚加賞賜在職六年嘉瑞屢降吏人重之永元, WYG: 疫熹平}
