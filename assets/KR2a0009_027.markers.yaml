  - {type: variant, offset: 3649, length: 961, content: 夫時侍中賈逵薦丕道蓺深明宜見任用和帝因朝會召見諸儒丕與侍中賈逵尚書令黃香等相難數事帝善丕說罷朝特賜冠幘履韈衣一襲丕因上疏曰臣以愚頑顯備大位犬馬氣衰猥得進見論難於前無所甄明衣服之賜誠為優過臣聞說經者傳先師之言非從己出不得相讓相讓則道不明若規矩權衡之不可枉也難者必明其據說者務立其義浮華無用之言不陳於前故精思不勞而道術愈章法異者各令自說師法博觀其義覽詩人之旨意察雅頌之終始明舜禹臯陶之相戒顯周公箕子之所陳觀乎人文化成天下陛下既廣納謇謇以開四聰無令芻蕘以言得罪既顯巖穴以求仁賢無使幽遠獨有遺失十三年遷為侍中免永初二年詔公卿舉儒術篤學者大將軍鄧騭舉丕再遷復為侍中左中郎將再為三老五年年七十五卒於官魏霸字喬卿濟陰句陽人也世有禮義霸少喪親兄弟同居州里慕其雍和建初中舉孝廉八遷和帝時為鉅鹿太守以簡朴寬恕為政掾史有過要霸先誨其失不改者乃罷之吏或相毀訴霸輒稱它吏之長終不及人短言者懷慙譖訟遂息永元十六年徵拜將作大匠明年和帝崩典作順陵時盛冬地凍中使督促數罰縣吏以厲霸霸撫循而已初不切責而反勞之曰令諸卿被辱大匠過也吏皆懷恩力作倍功延平元年代尹勤為太常明年以病致仕為光祿大夫永初五年拜長樂衞尉以病乞身復為光祿大夫卒於官劉寬字文饒弘農華陰人也父崎順帝時為司徒寬嘗行有人失牛者乃就寬車中認之寬無所言下駕步歸有頃認者得牛而送還叩頭謝曰慙負長者隨所刑罪寬曰物有相類事容脫誤幸勞見歸何為謝之州里服其不校桓帝時大將軍辟五遷司徒長史時京師地震特見詢問再遷出為東海相延熹八年徵拜尚書令遷南陽太守典歷三郡溫仁多恕雖在倉卒未嘗疾言遽色常以為齊之以刑民免而無恥吏人有過但用蒲鞭罰之示辱而已終不加苦事有功善推之自下災異或見引躬克責每行縣止息亭傳輒引學官祭酒及處士諸生執經對講見父老慰以農里之言少年勉以孝悌之訓人感德興行日有所化靈帝初徵拜太中大夫侍講華光殿遷侍中賜衣一襲轉屯騎校尉遷宗正轉光祿勳熹平五年代許訓為太尉靈帝頗好學蓺每引見寬常令講經寬嘗於坐被酒睡伏帝問太尉醉邪寬仰對曰臣不敢醉但任重責大憂心如醉帝重其言寬簡略嗜酒不好盥浴京師以為諺嘗坐客遣蒼頭市酒迂久大醉而還客不堪之罵曰畜產寬須臾遣人視奴疑必自殺顧左右曰此人也罵言畜產辱孰甚焉故吾懼其死也夫人欲試寬令恚伺當朝會裝嚴已訖使侍婢奉肉羹飜汙朝衣婢遽收之寬神色不異乃徐言曰羹爛汝手其性度如此海內稱為長者後以日食策免拜衞尉, WYG: 疫}
