  - {type: variant, offset: 16, length: 6, content: 魯恭弟丕卓茂, WYG: 行五射妖人化龍蛇孽死復生馬禍疫人痾投蜺五行傳曰皇之不極是謂不建尚書大傳皇作王鄭𤣥曰王君也不名體而言王者五事象五行則王極象天也天變化為隂為陽覆成五行經曰歴象日月星辰敬授人時論語曰為政以徳譬如北辰是則天之道於人政也孔子説春秋曰政以不由王出不得為政則王君出政之號也極中也建立也王象天以情性覆成五事為中和之政也王政不中和則是不能立其事也古文尚書皇極皇建其有極孔安國曰大中之道大立其有中謂行九疇之義馬融對䇿曰大中之道在天為北辰在地為人君厥咎眊尚書大傳作瞀鄭𤣥曰瞀與思心之咎同耳故傳曰眊眊亂也君臣不立則上下亂矣}
