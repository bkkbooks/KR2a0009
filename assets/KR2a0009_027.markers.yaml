  - {type: variant, offset: 78, length: 207, content: 同而皆愛慕欣欣焉初辟丞相府史事孔光光稱為長者時嘗出行有人認其馬茂問曰子亡馬幾何時對曰月餘日矣茂有馬數年心知其謬嘿解與之挽車而去顧曰若非公馬幸至丞相府歸我他日馬主別得亡者乃詣府送馬叩頭謝之茂性不好爭如此後以儒術舉為侍郎給事黃門遷密令勞心諄諄視人如子舉善而教口無惡言吏人親愛而不忍欺之人嘗有言部亭長受其米肉遺者茂辟左右問之曰亭長為從汝求乎為汝有事囑之而受乎將平居自以恩意遺之乎人曰往遺之耳茂曰遺之而受何故言邪人曰竊聞賢, WYG: ''}
