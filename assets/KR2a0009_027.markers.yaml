  - {type: variant, offset: 1289, length: 12, content: 西因留新豐教授建初初丕舉, WYG: 書不可曉乃請費長房讀之曰告佗當從府君出案行當以八月八日日中時武陵城南溝水畔頓汝是時必往到期悉将大小於城南待之湏臾果至但聞人馬隐隱之聲詣溝水便聞有呼聲曰佗來汝得我所寄李娥書不邪曰即得之故來至此伯文以次呼家中大小問之悲傷斷絶曰死生異路不能數得汝消息吾亡後兒孫乃爾許人良乆謂佗曰來春大病與此一丸藥以塗門户則辟來年妖厲矣言訖忽去竟不得見其形至前春武陵果大病白日見鬼唯伯文之家鬼不敢向費長房視藥曰此}
