  - {type: variant, offset: 4665, length: 0, content: '', WYG: 月丁丑有黒氣堕北宫温明殿東庭中黒如車蓋起奮訊身五色有頭體長十餘丈形貌似龍上問蔡邕對曰所謂天投蜺者也不見足尾不得稱龍易傳曰蜺之比無德以色親也潛潭巴曰虹出后妃陰脅王者又曰五色迭至照于宫殿有兵革之事演孔圖曰天子外苦兵威内奪臣無忠則天投蜺案邕集稱曰演孔圖曰蜺者斗之精也失度投蜺見態主惑於毁譽合誠圖曰天子外苦兵者也變不空生占不空言邕對又曰意者陛下樞機之内袵席之上獨有以色見進陵尊踰制以昭變象若羣臣有所毁譽聖意低廻未知誰是兵戎未息威權漸移忠言不聞則虹蜺所在生也抑内寵任中正決毁譽分直邪各得其所勤守衛整武傋威權之機不以假人則其救也先是立皇后何氏皇后每齋當謁祖廟輙有變異不得謁中平元年黄巾賊張角等立三}
