  - {type: variant, offset: 1167, length: 0, content: '', WYG: 聞娥死復生召見問事状娥對曰聞謬為司命所召到得遣出過西門適見外兄劉伯文為相勞問涕泣悲哀娥語曰伯丈一日誤見召今得遣歸既不知道又不能獨行為我得一伴不又我見召在此已十餘日形體又當見埋藏歸當那得自出伯文曰當為問之即遣門}
  - {type: variant, offset: 1167, length: 0, content: '', krp: 聞娥死復生召見問事状娥對曰聞謬為司命所召到得遣出過西門適見外兄劉伯文為相勞問涕泣悲哀娥語曰伯丈一日誤見召今得遣歸既不知道又不能獨行為我得一伴不又我見召在此已十餘日形體又當見埋藏歸當那得自出伯文曰當為問之即遣門}
  - {type: variant, offset: 1168, length: 14, content: 官時恭年十二弟丕七歲晝夜號踴, WYG: 與户曹相問司命一日誤召武陵大女李娥今得遣還娥在此積日尸喪又當殯歛當作何等得出又女弱獨行豈當有伴邪是吾外妹幸為便安之答曰今武陵西男民李黒亦得遣還便可為伴輒令黒過勑娥比舎蔡仲令發出娥也於是娥遂得出與伯文别伯文曰書一封以與兒佗娥遂與黒俱歸事狀如此太守慨然嘆曰天下事眞}
