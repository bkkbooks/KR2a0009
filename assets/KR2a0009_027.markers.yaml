  - {type: variant, offset: 23, length: 0, content: '', WYG: 林曰目少精曰眊厥罰恒隂鄭𤣥曰王極象天天隂養萬物陰氣失故常陰厥極弱鄭𤣥曰天為剛徳剛氣失故於人為弱易説亢龍之行曰貴而無位髙而無民賢人在下位而無輔此之謂弱或云懦不敬也時則有射妖鄭𤣥曰射王極之度也射人將發矢必先於此儀之發則中於彼矣君將出政亦先於朝廷度之出則應於民心射其象也時則有龍蛇之孽鄭𤣥曰龍蟲之生於淵行無形遊於天者也屬天蛇龍之類也或曰龍無角者曰蛇時則有馬禍鄭𤣥曰天行健馬畜之疾行者也屬王極時則有下人伐上之痾鄭𤣥曰夏侯勝説伐宜為代書亦或作代陰陽之神曰精氣情性之神曰䰟魄君行不由常侜張無度則是䰟魄傷也王極氣失之病也天於不中之人恒耆其毒増以為病將以開賢代之也春秋傳所謂奪伯有魄者是也不名病者病不著於身體也時則有日月亂行星辰逆行鄭𤣥曰亂謂薄食鬬並見逆謂縮反明經天守舎之類也太公六韜曰人主好武事兵革則日月薄食太白失行皇君也極中也眊不明也說云此沴天也不言沴天者至尊之辭也春秋王師敗績以自敗爲文恒陰中興以來無録者臣昭案本傳陽嘉二年郎顗上書云正月以來陰闇連日乆陰不雨亂氣也得賢不用猶乆陰不雨也靈帝光和中雒陽男}
