  - {type: variant, offset: 1698, length: 1071, content: 親勞聖思日不食憂在軍役誠欲以安定北垂為人除患定萬世之計也臣伏獨思之未見其便社稷之計萬人之命在於一舉數年以來秋稼不熟人食不足倉庫空虛國無畜積會新遭大憂人懷恐懼陛下躬大聖之德履至孝之行盡諒陰三年聽於冢宰百姓闕然三時不聞警蹕之音莫不懷思皇皇若有求而不得今乃以盛春之月興發軍役擾動天下以事戎夷誠非所以垂恩中國改元正時由內及外也之舛錯況於人乎故愛人者必有天報昔太王重人命而去邠故獲上天之祐夫戎狄者四方之異氣也蹲夷踞肆與鳥獸無別若雜居中國則錯亂天氣汙辱善人是以聖王之制羈縻不絕而已則陰陽和於上祥風時雨覆被遠方夷狄重譯而至矣易曰有孚盈缶終來有它吉言甘雨滿我之缶誠來有我而吉已夫以德勝人者昌以力勝人者亡今匈奴為鮮卑所殺遠臧於史侯河西去塞數千里而欲乘其虛耗利其微弱是非義之所出也前太僕祭肜遠出塞外卒不見一胡而兵已困矣白山之難不絕如綖都護陷沒士卒死者如積迄今被其辜毒孤寡哀思之心未弭仁者念之以為累息柰何復欲襲其迹不顧患難乎今始徵發而大司農調度不足使者在道分部督趣上下相迫民閒之急亦已甚矣三輔并涼少雨麥根枯焦牛死日甚此其不合天心之效也羣僚百姓咸曰不可陛下獨柰何以一人之計𠫓廾萬人之命不卹其言乎上觀天心下察人志足以知事之得失臣恐中國不為中國豈徒匈奴而已哉惟陛下留聖恩休罷士卒以順天心其後拜為魯詩博士由是家法學者日盛遷侍中數召讌見問以得失賞賜恩禮寵異焉遷樂安相是時東州多盜賊羣輩攻劫諸郡患之恭到重購賞開恩信其渠帥張漢等率支黨降恭上以漢補博昌尉其餘遂自相捕擊盡破平之州郡以安永元九年徵拜議郎八月飲酎齋會章臺詔使小黃門特引恭前其夜拜侍中勑使陪乘勞問甚渥冬遷光祿勳選舉清平京師貴戚莫能枉其正十二三年代呂蓋為司徒十五年從巡狩南陽除子撫為郎中賜駙馬從駕時弟丕亦為侍中兄弟父子並列朝廷後坐事策免殤帝即位以恭為長樂衞尉永初元年復代梁鮪為司徒初和帝末下令麥秋得案驗薄刑而州郡好以苛察為政因此遂盛夏斷獄恭上疏諫曰臣伏見詔書敬若天時憂念萬民為崇和氣罪非殊死且勿案驗進柔良退貪殘奉時令所以助仁德順昊天致和氣利黎民者也事之原進良退殘之化因以盛夏徵召農人拘對考驗連滯無已司隸典司京師四方是則而近於春月分行諸部託言勞來貧人而無隱惻之實煩擾郡縣廉考非急逮捕一人罪延十數上逆時氣下傷農業案易五月姤用事經曰后以施令誥四方言君以夏至之日施命令止四方行者所以助微陰也行者尚止之況於逮召考掠奪其時哉比年水旱傷稼人飢流今始夏百穀權輿陽氣胎養之時自三月以來陰寒不暖物當化變而不被和氣月令孟夏斷薄刑出輕繫行秋令則苦雨數來五穀不熟又曰仲夏挺重囚益其食行秋令則草木零落人傷於疫夫斷薄刑者謂其輕罪已正不欲令久繫故時斷之也, WYG: ''}
