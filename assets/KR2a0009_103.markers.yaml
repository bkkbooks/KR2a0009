  - {type: variant, offset: 263, length: 0, content: '', WYG: 之義子以母貴公羊傳曰桓公幼而貴隱公長而卑子以母貴母以子貴也紹母親為傅婢地實微賤據職高重享福豐隆有茍進之志無虛退之心紹罪九也又長沙太守孫堅前領豫州刺史遂能驅走董卓掃除陵廟忠勤王室其功莫大紹遣小将盜居其位斷絶堅糧不得深入使董卓久不服誅紹罪十也昔姬周政弱王道陵遲天子遷徙諸侯背畔故齊桓立柯會之盟春秋公會齊侯盟于柯公羊傳曰齊桓公之信著於天下自柯之盟始也晉文為踐土之會踐土鄭地也左傳周襄王出居於鄭晉文公重耳為踐土之㑹率諸侯朝天子以成霸功伐荆楚以致菁茅菁茅靈茅以供祭祀也左傳曰僖四年齊桓伐楚責之曰爾貢苞茅不入王祭不供無以縮酒寡人是徵誅曹衛以章無禮左傳僖二十八年晉侯伐曹假道於衛衛人不許還自河南濟侵曹伐衛責其無禮也臣雖闒茸名非先賢闒猶下也茸細也闒音吐盍反茸音人勇反蒙被朝恩負荷重任職在鈇鉞奉辭伐罪鈇音方于反莖刃也鉞斧也輙與諸將州郡共討紹等若大事克㨗罪人斯得尚書周公東征三年罪人斯得庶續桓文忠誠之效遂舉兵攻紹於是冀州諸城悉畔從瓚紹懼乃以所佩勃海太守印綬授瓚從弟範遣之郡欲以相結而範遂背紹領勃海兵以助瓚瓚乃自署其將帥為青冀兗三州刺史又悉置郡縣守令與紹大戰於界橋橋名解見獻帝紀瓚軍敗還薊紹遣将崔巨業将兵數萬攻圍故安不下退軍南還瓚将歩騎三萬人追擊於巨馬水水在幽州歸義縣界自易州遒縣界流入大破其衆死者七八千人乘勝而南攻下郡縣遂至平原乃遣其青州刺史田楷據有齊地紹復遣兵數萬與楷連戰二年糧食並盡士卒疲困互掠百姓野無青草左傳齊侯伐魯語展喜曰室如懸磬野無青草何恃而不恐紹乃遣子譚為青州刺史楷與戰敗退還是歲瓚破禽劉虞盡有幽州之地猛志益盛前此有童謠曰燕南垂趙北際中央不合大如礪唯有此中可避世瓚自以為易地當之遂徙鎭焉前書易縣屬涿郡續漢志曰屬河間瓚所居易京故城在今幽州歸義縣南十八里乃盛脩營壘樓觀數十臨易河通遼海劉虞從事漁陽鮮于輔等合率州兵欲共報瓚輔以燕國閻柔素有恩信推為烏桓司馬柔招誘胡漢數萬人與瓚所置漁陽太守鄒丹戰於潞北斬丹等四千餘級烏桓峭王感虞恩徳率種人及鮮卑七千餘騎共輔南迎虞子和與袁紹将麴義合兵十萬共攻瓚興平二年破瓚於鮑丘鮑丘水名也又名路水在今幽州漁陽縣斬首二萬餘級瓚遂保易京開置屯田稍得自支相持歲餘麴義軍糧盡士卒飢困餘衆數千人退走瓚徼破之盡得其車重是時旱蝗榖貴民相食瓚恃其才力不恤百姓記過忘善睚眦必報州里善士名在其右者必以法害之常言衣冠皆自以職}
