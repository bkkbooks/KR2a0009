  - {type: variant, offset: 344, length: 531, content: 周之章以明之蔀以部之紀以記之元以原之然後雖有變化萬殊贏朒無方莫不結系于此而禀正焉極建其中道營于外琁衡追日以察發斂光道生焉孔壺為漏浮箭為刻下漏數刻以考中星昬明生焉日有光道月有九行九行出入而交生焉朔會望衡鄰於所交虧薄生焉月有晦朔星有合見月有弦望星有留逆其歸一也步術生焉金水承陽先後日下速則先日而後留留而後逆逆與日違違而後速速與日競競又先日速順逆晨夕生焉日月五緯各有終原而七元生焉見伏有日留行有度而率數生焉參差齊之多少均之會終生焉引而伸之觸而長之探賾索隱鉤深致遠無幽辟潛伏而不以其精者然故陰陽有分寒暑有節天地貞觀日月貞明若夫祐術開業淳燿天光重黎其上也承聖帝之命若昊天典曆象三辰以授民事立閏定時以成歲功羲和其隆也取象金火革命創制治曆明時應天順民湯武其盛也及王德之衰也無道之君亂之於上頑愚之史失之於下夏后之時羲和淫湎廢時亂日胤乃征之紂作淫虐喪其甲子武王誅之夫能貞而明之者其興也勃焉回而敗之者其亡也忽焉巍巍乎若道天地之綱紀帝王之壯事是以聖人寶焉君子勤之夫曆有聖人之德六焉以本氣者尚其體以綜數者尚其文以考類者尚其象以作事者尚其時以占往者尚其源以知來者尚其流大業載之吉凶生焉是以君子將有興焉咨焉而以從事受命而莫之違也若夫用天因地揆時施教頒諸明堂以為民極者莫大乎月令帝王之大司備矣, WYG: 待}
