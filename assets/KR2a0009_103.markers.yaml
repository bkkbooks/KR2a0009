  - {type: variant, offset: 23, length: 98, content: 運三光之行道之發斂景之長短斗綱之所建青龍所躔參伍以變錯綜其數而制術焉天之動也一晝一夜而運過周星從天而西日違天而東日之所行與運周在天成度在曆成日居以列宿終于四七受以甲乙終于六旬日月相推日舒月速當其同, WYG: 瓚必悔禍謝罪}
