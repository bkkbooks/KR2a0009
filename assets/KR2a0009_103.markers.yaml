  - {type: variant, offset: 7161, length: 7, content: 重黎記註象應著, WYG: 會徐州黄巾起以謙為徐州刺史擊黄巾大破走之境内晏然時董卓雖誅而李傕郭氾作亂關中是時四方斷絶謙毎遣使間行奉貢西京詔遷為徐州牧加安東将軍封溧陽侯溧陽今宣州縣也溧音栗是時徐方百姓殷盛穀實甚豐流民多歸之而謙信用非所刑政不理别駕從事趙昱知}
