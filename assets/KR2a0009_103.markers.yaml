  - {type: variant, offset: 986, length: 6154, content: 漢曆又上兩元而月食五星之元並發端焉曆數之生也乃立儀表以校日景景長則日遠天度之端也日發其端周而為歲然其景不復四周千四百六十一日而景復初是則日行之終以周除日得三百六十五四分度之一為歲之日數日日行一度亦為天度察日月俱發度端日行十九周月行二百五十四周復會于端是則月行之終也以日周除月周得一歲周天之數以日一周減之餘十二十九分之七則月行過周及日行之數也為一歲之月以除一歲日為一月之數月之餘分積滿其法得一月月成則其歲大月大四時推移故置十二中以定月位有朔而無中者為閏月中之始日曰節與中為二十四氣以除一歲日為一氣之日數也其分積而成日為沒并歲氣之分如法為一歲沒沒分于終中中終于冬至冬至之分積如其法得一日四歲而終月分成閏閏七而盡其歲十九名之曰章章首分盡四之俱終名之曰蔀以一歲日乘之為蔀之日數也以甲子命之二十而復其初是以二十蔀為紀紀歲青龍未終三終歲後復青龍為元元法四千五百六十紀法千五百二十紀月萬八千八百蔀法七十六蔀月九百四十章法十九章月二百三十五周天千四百六十一日法四蔀日二萬七千七百五十九沒數二十一為章閏通法四百八十七沒法七因為章閏日餘百六十八中法四三十二大周三十四萬三千三百三十五月周千一十六月食數之生也乃記月食之既者率二十三食而復既其月食百三十五率之相除得五百月二十三之二十而一食以除一歲之月得歲有再食五百一十三分之五十五也分終其法因以與蔀相約得四與二十七互之會二千五十二二十而與元會元會四萬一千四十蔀會三二千五十三二歲數五百一十三食數千八十一月數百二三十五食法二十二三推入蔀術曰以元法除去上元其餘以紀法除之所得數從天紀筭外則所入紀也不滿紀法者入紀年數也以蔀法除之所得數從甲子蔀起筭外所入紀歲名命之筭上即所求年太歲所在推月食所入蔀會年以元會除去上元其餘以蔀會除之所得以七二十二七乘之滿六十除去之餘以二十除所得數從天紀筭之起外所以入紀不滿二十者數從甲子蔀起筭外所入蔀會也其初不滿蔀會者入蔀會年數也各以不所入紀歲名命之筭上即所求年蔀太歲所在天紀歲名地紀歲名人紀歲名蔀首庚辰庚子庚申甲子一丙申丙辰丙子癸卯二壬子壬申壬辰壬午三戊辰戊子戊申辛酉四甲申甲辰甲子庚子五庚子庚申庚辰己卯六丙辰丙子丙申戊午七壬申壬辰壬子丁酉八戊子戊申戊辰丙子九甲辰甲子甲申乙卯十庚申庚辰庚子甲午十一丙子丙申丙辰癸酉十二壬辰壬午子壬申壬子十三戊申戊辰戊子辛卯十四甲子甲申甲辰庚午十五庚辰庚子庚申乙己酉十六丙申丙辰丙子戊子十七壬子壬申壬辰丁卯十八戊辰戊子戊申丙午十九甲申甲辰甲子乙酉二十推天正術置入蔀年減一以章月乘之滿章法得一名為積月不滿為閏餘十二以上其歲有閏推天正朔日置入蔀積月以蔀日乘之滿蔀月得一名為積日不滿為小餘積日以六十除去之其餘為大餘以所入蔀名命之筭盡之外則前年天正十一月朔日也小餘四百四十一以上其月大求後月朔加大餘二十九小餘四百九十九小餘滿蔀月得一上加大餘命之如前一術以大周乘年周天乘閏餘減之餘滿蔀日月則天正朔日也推二十四氣術曰置入蔀年減一以月日餘乘之滿中法得一名曰大餘不滿為小餘大餘滿六十除去之其餘以蔀名命之筭盡之外則前年冬至之日也求次氣加大餘十五小餘七除命之如前小寒日也推閏月所在以閏餘減章法餘以十二乘之滿章閏數得一滿四以上亦得一筭之數從前年十一月起筭盡之外閏月也或進退以中氣定之推弦望日因其月朔大小餘之數皆加大餘七小餘三百五十九四分三小餘滿蔀月得一加大餘大餘命如法得上弦又加得望次下弦又後月朔其弦望小餘二百六十以下每以百刻乘之滿蔀月得一刻不滿其數所近節氣夜漏之半者以筭上為日推沒滅術置入蔀年減一以沒數乘之滿日法得一名為積沒不盡為沒餘以通法乘積沒滿沒法得一名為大餘不盡為小餘大餘滿六十除去之其餘以蔀名命之筭盡之外前年冬至前沒日也求後沒加大餘六十九小餘四小餘滿沒法從大餘命之如前無分為滅一術以為十五乘冬至小餘以減通法餘滿沒法得一則天正後沒也推合朔所在度置入蔀積月日以日蔀月乘之滿大周除去之其餘滿蔀月得一名為積度不盡為餘分積度加斗二十一度加二百三十五分以宿次除之不滿宿則日月合朔所在星度也求後合朔加度二十九加分四百九十九分滿蔀月得一度經斗除二百三十五分一術以閏餘乘周天以減大周餘滿蔀月得一合以斗二十一度四分一則天正合朔日月所在度推日所在度置入蔀積日之數以蔀法乘之滿蔀日除去之其餘滿蔀法得一為積度不盡為餘分積度加斗二十一度加十九分以宿次除去之則夜半日所在宿度也求次日加一度求次月大加三十度小加二十九度經斗除十九分一術以朔小餘減合朔度分即日夜半所在其分三二百二三十五約之十九乘之推月所在度置入蔀積日之數以月周乘之滿蔀日除去之其餘滿蔀法得一為積度不盡為餘分積度加斗二十一十九分除如上法則所求之日夜半月所在宿度也求次日加十三度二十八分求次月大加三十五度六十一分月小二十二度三十三分分滿法得一度經斗除十九分其冬下旬月在張心署之謂盡晝漏分後盡漏盡也一術以蔀法除朔小餘所得以減日半度也餘以減分即月夜半所在度也推日明所入度分術曰置其月節氣夜漏之數以蔀法乘之二百除之得一分即夜半到明所行分也以增夜半日所在度分為明所在度分也求昬日所入度以夜半到明日所行分分減蔀法其餘即夜半到昬所行分也以加夜半所在度分為昬日所在度也推月明所入度分術曰置其節氣夜半漏之數以月周乘之以二百除之為積分積分滿蔀法得一以增夜半度即明月明所在度也求昬月所入度以明積分減月周其餘滿蔀法得一度加夜半則昬月所在度也推弦望日所入星度術曰置合朔度分之數加七度三百五十九分四分之三以宿次除之即得上弦日所入宿度分也求望下弦加除如前法小分滿四從大分大分滿蔀月從度推弦望月所入星度術曰置月合朔度分之數加度九十八加分六百五十三半以宿次除之即上弦月所入宿度分也求望下弦加除如前分滿蔀月從度推月食術曰置入蔀會年數減一以食數乘之滿歲數得一名曰積食不滿為食餘以月數乘積食滿食法得一名為積月不滿為月餘分積月以章月除去之其餘為入章月數當先除入章閏乃以十二除去之不滿者命以十一月筭盡之外則前年十一月前食月也求入章閏者置入章月以章閏乘之滿章月得一則入章閏數也餘分滿二百二十四以上至二百三十一為食在閏月閏或進退以朔日定之求後食加五百月二十分滿法得一月數命之如法其分盡食筭上推月食朔日術曰置食積月之數以二十九乘之為積日又以四百九十九乘積月滿蔀月得一以并積日以六十除之其餘以所會蔀名命之筭盡之外則前年天正前食月朔日也求食日加大餘十四小餘七百一十九半小餘滿蔀月為大餘大餘命如前則食日也求後食朔及日皆加大餘二十七小餘六百一十五其月餘分不滿二十者又加大餘二十九小餘四百九十九其食小餘者當以漏刻課之夜漏未盡以筭上為日一術以歲數去上元餘以為積月以百一十二乘之滿月數去之餘滿食法得一則天正後食推諸加時以十二乘小餘先減如法之半得一時其餘乃以法除之所得筭之數從夜半子起筭盡之外則所加時也推諸上水漏刻以百乘其小餘滿其法得一刻不滿法法什之滿法得一分積刻先減所入節氣夜漏之半其餘為晝上水之數過晝漏去之餘為夜上水數其刻不滿夜漏半者乃減之餘為昨夜未晝盡其弦望其日五星數之生也各記於日與周天度相約而為率以章法乘周率為用月法章月乘日率如月法為積月月餘以月之月日乘積月為朔大小餘乘為入月日餘以日法乘周率為日度法以周率去日率餘以乘周天如日度法為積度之度餘也日率相約取之得二千九百九十萬一千六百二十一億五十八萬二千三百而五星終如蔀之數與元通木周率四千三百二十七日率四千七百二十五合積月十三月餘四萬一千六百六月法八萬二千二百一十三大餘二十三小餘八百四十七虛分九十三入月日十五日餘萬四千六百四十七一日度法萬七千三百八積度三十三度餘萬三百一十四火周率八百七十九日率千八百七十六合積月二十六月餘六千六百三十四月法萬六千七百一大餘四十七小餘七百五十四虛分一百八十六入月日十一二日餘千八百七十二日度法三千五百一十六積度四十九度餘一百一十四土周率九千九十六日率九千四百一十五合積月十二月餘十三萬八千六百三十七月法十七萬二千八百二十四大餘五十四小餘三百四十八虛分五百九十二入月日二十三四日餘二千一百六十三日度法三萬六千三百八十四積度十二度餘二萬九千四百五十一金周率五千八百三十日率四千六百六十一合積月九月餘九萬八千四百五月法十一萬七百七十大餘二十五小餘七百三十一虛分二百九入月日二十六日餘二百八十一日度法二萬三千三百二十積度二百九十二度餘二百八十一水周率萬一千九百八日率千八百八十九合積月一月餘二十一萬七千六百六十三月法二十二萬六千二百五十二大餘二十九小餘四百九十九虛分四百四十九一入月日二十七八日餘四萬四千八百五日度法四萬七千六百三十一二積度五十七度餘四萬四千八百五推五星術置上元以來盡所求年以周率乘之滿日率得一名為積合不盡名為合餘合餘以周率除之不得焉退歲無所得星合其年得一合前年二合前二年金水積合奇為晨偶為夕其不滿周率者反減之餘為度分推星合月以合積月乘積合為小積又以月餘乘積合滿其月法得一從小積為積月不盡為月餘積月滿紀月去之餘為入紀月每以章閏乘之滿章月得一為閏不盡為閏餘以閏減入紀月其餘以十二去之餘為入歲月數從天正十一月起筭外星合所在之月也其閏餘滿二百二十四以上至二百三十一星合閏月閏或進退以朔制之推朔日以蔀日乘之入紀月滿蔀月得一為積日不盡為小餘積日滿六十去之餘為大餘命以甲子筭外星合月朔日推入月日以蔀日乘月餘以其月法乘朔小餘從之以四千四百六十五約之所得得滿日度法得一為入月日不盡為日餘以朔命入月日筭外星合日也推合度以周天乘度分滿日度法得一為積度不盡為度餘以斗二十一四分之一命度筭外星合所在度也一術加退歲一以減上元滿八十除去之餘以沒數乘之滿日法得一為大餘不盡為小餘以甲子命大餘則星合歲天正冬至日也以周率乘小餘并度餘餘滿日度法從度即正至後星合日數也命以冬至求後合月加合積月於入歲月加月餘於月餘滿其月法得一從入歲月入歲月滿十二去之有閏計焉餘命如前筭外後合月也餘一金水加晨得夕