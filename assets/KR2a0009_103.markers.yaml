  - {type: variant, offset: 879, length: 2, content: 事畢, WYG: 相守者顧戀其老小而恃將軍為主故耳堅守曠日或可使紹自退若舍之而出後無鎭重易京之危可立待也瓚乃止紹漸相攻逼瓚衆日䠞乃却築三重營以自固四年春黑山賊帥張燕與續率兵十萬三道來救瓚未及至瓚乃宻使行人齎書告續曰昔周末喪亂僵屍蔽地以意而推猶為否也不圖今日親當其鋒袁氏之攻状若鬼神梯衝舞吾樓上鼓角鳴於地中日窮月急不遑啟處鳥戹歸人滀水陵高滀音丑六反喻急也汝當碎首於張燕馳驟以告急父子天性不言而動言相感也且厲五千鐵騎於北隰之中下溼曰隰起火為應吾當自内出奮揚威武決命於斯不然吾亡之後天下雖廣不容汝足}
