  - {type: variant, offset: 4, length: 4, content: 第三律曆, WYG: 曰田疇字子春右北平無終人好讀書善擊劒劉虞署為從事太祖北征烏桓令疇将衆上徐無出盧龍歴平剛登白狼堆去柳城二百餘里虜乃驚太祖與戰大斬獲論功封疇疇上疏自陳大祖令夏侯惇喻之疇曰豈可費盧龍塞以易賞禄哉蒙險間行奉使長安獻帝既思東歸見疇等大悅時虞子和為侍中因此遣和潛從武關出告虞将兵來迎道由南陽後将軍袁術聞其狀遂質和使報虞遣兵俱西虞乃使數千騎就和奉迎天子而術竟不遣之初公孫瓚知術詐固止虞遣兵虞不從瓚乃隂勸術執和使奪其兵自是與瓚仇怨益深和尋得逃術還北復為袁紹所留瓚既累為紹所敗而猶攻之不已虞患其黷武黷猶慢也數也尚書曰黷於祭祀也且慮得志不可復制固不許行而稍節其稟假瓚怒屢違節度又復侵犯百姓虞所賚賞典當胡夷當音丁浪反瓚數抄奪之積不能禁乃遣驛使奉章陳其暴掠之罪瓚亦上虞稟糧不周二奏交馳互相非毁朝廷依違而已瓚乃築京於薊城以備虞京高丘也言高築丘壘以備虞焉解見獻帝紀虞數請瓚輒稱病不應虞乃密謀討之以告東曹掾右北平魏攸攸曰今天}
