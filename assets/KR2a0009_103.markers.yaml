  - {type: variant, offset: 136, length: 1, content: 弦, WYG: 排其字從木昔亡新僭侈漸以即眞亡新王莽觀紹所擬將必階亂階梯也詩曰職為亂階紹罪五也紹令星工伺望祥妖星工善星者賂遺財貨與共飲食尅㑹期日攻鈔郡縣此豈大臣所當施為紹罪六也紹與故虎牙都尉劉勲首共造兵勲降服張楊累有功效而以小忿枉加酷害信用䜛慝濟其無道紹罪七也故上谷太守高焉故甘陵}
