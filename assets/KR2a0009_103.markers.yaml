  - {type: variant, offset: 132, length: 1, content: 遠, WYG: 也卓既無禮帝主見質紹不能開設權謀以濟君父而棄置節傳傳音丁戀反迸竄逃亡忝辱爵命背違人主紹罪二也紹為勃海當攻董卓而黙選戎馬不告父兄至使太傅一門纍然同斃不仁不孝紹罪}
