  - {type: variant, offset: 7402, length: 0, content: '', WYG: 曹操復擊謙略定琅邪東海諸縣謙懼不免欲走歸丹陽會張邈迎吕布據兗州操還擊布是歲謙病死初同郡人笮融笮音側格反聚衆數百往依於謙謙使督廣陵下邳彭城運糧遂斷三郡委輸大起浮屠寺浮屠佛也解見西羌傳上累金盤下為重樓又堂閣周囘可容三千許人作黄金塗像衣以錦綵毎浴佛輙多設飲飯布席於路其有就食及觀者且萬餘人獻帝春秋曰融敷席方四五里費以巨萬及曹操擊謙徐方不安融乃将男女萬口馬三千匹走廣陵廣陵太守趙昱待以賓禮融利廣陵資貨遂乘酒酣殺昱放兵大掠因以過江南奔豫章殺郡守朱皓入據其城後為揚州刺史劉繇所破走入山}
