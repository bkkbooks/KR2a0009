  - {type: variant, offset: 123, length: 0, content: '', WYG: 不戰而服人者也虞以緒臨事沮議遂斬}
  - {type: variant, offset: 123, length: 0, content: '', krp: 不戰而服人者也虞以緒臨事沮議遂斬}
  - {type: variant, offset: 124, length: 0, content: '', WYG: 以徇戒軍士曰無傷餘人殺一伯珪而巳時州從事公孫紀者瓚以同姓厚待遇之紀知虞謀而夜告瓚瓚時部曲放散在外倉卒自懼不免乃掘東城欲走虞兵不習戰又愛人廬舎勑不聽焚燒急攻圍不下瓚乃簡募銳士數百人因風縱火直衝突之虞遂大敗與官屬北奔居庸縣居庸縣屬上谷郡有關瓚追攻之三日城陷遂執虞幷妻子還薊猶使領州文書會天子遣使者段訓增虞封邑督六州事拜瓚前將軍封易侯假節督幽幷青冀瓚乃誣虞前與袁紹等欲稱尊號脅訓斬虞於薊市先坐而呪曰若虞應為天子者天當風雨以相救時旱埶炎盛遂斬焉傳首京師故吏尾敦於路劫虞首歸葬之尾敦姓名瓚乃上訓為幽州刺史虞以恩厚得衆懷被北州百姓流舊莫不痛惜焉初虞以儉素為操冠敝不改乃就補其穿及遇害瓚兵搜其内而妻妾服羅紈盛綺飾時人以此疑之和後從袁紹報瓚云公孫瓚公孫瓚字伯珪遼西令支人也令音力定反支音巨移反家世二千石瓚以母賤遂為郡小吏為人羙姿貎大音聲言事辯慧典略曰瓚性辯慧每白事常兼數曹無有忘誤太守竒其才以女妻之魏志云侯太守妻之以女後從涿郡盧植學於緱氏山中略見書傳舉上計吏太守劉君坐事檻車徵官法不聽吏下親近瓚乃改容服詐稱侍卒身執徒養御車到洛陽太守當徙日南瓚具豚酒於北芒上祭辭先人酹觴祝曰昔為人子今為人臣當詣日南日南多瘴氣恐或不還便當長辭墳塋慷慨悲泣再拜而去觀者莫不歎息既行於道得赦瓚還郡舉孝亷除遼東屬國長史嘗從數十騎出行塞下卒逢鮮卑數百騎瓚乃退入空亭約其從者曰今不奔之則死盡矣乃自持兩刃矛馳出衝賊殺傷數十人瓚左右亦亡其半遂得免中平中以瓚督烏桓突騎車騎将軍張溫討涼州賊賊即邊章等會烏桓反畔與賊張純等攻擊薊中瓚率所領追討純等有功遷騎都尉張純復與畔胡丘力居等寇漁陽河間勃海入平原多所殺畧瓚追擊戰於屬國石門石門山名在今營州柳城縣西南虜遂大敗棄妻子踰塞走悉得其所畧男女瓚深入無繼反為丘力居等所圍於遼西管子城二百餘日糧盡食馬馬盡煮弩楯力戰不敵乃與士卒辭訣各分散還時多雨雪墜阬死者十五六虜亦飢困遠走柳城劉攽曰案逺當作還詔拜瓚降虜校尉封都亭侯復兼領屬國長史職統戎馬連接邊寇毎聞有驚劉攽曰驚當作警瓚輒厲色憤怒如赴讎敵望塵奔逐或繼之以夜戰虜識瓚聲憚其勇莫敢抗犯瓚常與善射之士數十人皆乗白馬以為左右翼自號白馬義從烏桓更相告語避白馬長史乃畫作瓚形馳騎射之中者咸稱萬歲虜自此之後遂遠竄塞外瓚志埽滅烏桓而劉虞欲以恩信招降由是與虞相忤初平二年青徐黄巾三十萬衆入勃海界欲與黑山}
