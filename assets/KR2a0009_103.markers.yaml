  - {type: variant, offset: 128, length: 3, content: 速後近, WYG: 軌爵任崇厚而性本淫亂情行浮薄昔為司隸値國多難太后承攝何氏輔朝謂何進也紹不能舉直錯枉而專為邪媚招來不軌疑誤社稷至令丁原焚燒孟津續漢書曰何進欲誅中常侍趙忠等進乃詐令武猛都尉丁原放兵數千人為賊於河内稱黑山伯上事以誅忠等為辭燒平隂河津莫府人舍以怖動太后董卓造為亂始紹罪}
