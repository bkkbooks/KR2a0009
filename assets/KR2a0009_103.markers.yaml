  - {type: variant, offset: 125, length: 2, content: 朔舒, WYG: 瓚率歩騎二萬人逆擊於東光南大破之東光今滄州縣斬首三萬餘級賊棄其車重數萬兩奔走渡河瓚因其半濟薄之賊復大破死者數萬流血丹水收得生口七萬餘人車甲財物不可勝算威名大震拜奮武将軍封薊侯瓚既諫劉虞遣兵就袁術而懼術知怨之乃使從弟越將千餘騎詣術自結術遣越隨其将孫堅擊袁紹将周昕越為流矢所中死瓚因此怒紹遂出軍屯槃河将以報紹槃即爾雅九河鉤槃之河其枯河在今滄州樂陵縣東南乃上疏曰臣聞皇羲已來君臣道著張禮以導人設刑以禁暴今車騎將軍袁紹託承}
