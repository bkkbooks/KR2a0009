  - {type: variant, offset: 3, length: 0, content: '', WYG: 卷一百三宋宣城太守范煜撰唐章懷太子賢注劉虞公孫瓚陶謙列傳第六十三劉虞傳劉虞字伯安東海郯人也謝承書曰虞父舒丹陽太守虞通五經東海王恭之後劉攽曰注案王恭當作恭王祖父嘉光禄勲虞初舉孝亷稍遷幽州刺史民夷感其徳化自鮮卑烏桓夫餘穢貊之輩皆隨時朝貢無敢擾邊者百姓歌悅之公事去官中平初黄巾作亂攻破冀州諸郡拜虞甘陵相綏撫荒餘以蔬儉率下遷宗正後車騎将軍張溫討賊邊章等發幽州烏桓三千突騎而牢稟逋懸皆畔還本國前書音義曰牢賈直也稟食也言軍糧不續也前中山相張純私謂前太山太守張舉曰今烏桓既畔皆願為亂涼州賊起朝廷不能禁又洛陽人妻生子兩頭此漢祚衰盡天下有兩主之徴也子若與吾共率烏桓之衆以起兵庶幾可定大業舉因然之四年純等遂與烏桓大人共連盟攻薊下燔燒城郭虜略百姓殺䕶烏桓校尉箕稠右北平太守劉政遼東太守陽終等衆至十餘萬屯肥如肥如縣屬遼西郡故城在今平州舉稱天子純稱彌天將軍安定王移書州郡云舉當代漢告天子避位勑公卿奉迎純又使烏桓峭王等峭音七笑反歩騎五萬入青冀二州攻破清河平原殺害吏民朝廷以虞威信素著恩積北方明年復拜幽州牧虞到薊罷省屯兵務廣恩信遣使告峭王等以朝恩寛𢎞開許善路又設賞購舉純舉純走出塞餘皆降散純為其客王政所殺送首詣虞靈帝遣使者就拜太尉封容丘侯容丘縣屬東海郡及董卓秉政遣使者授虞大司馬進封襄賁侯初平元年復徵代袁隗為太傅道路隔塞王命竟不得達舊幽部應接荒外資費甚廣歲常割青冀賦調二億有餘以給足之時處處斷絶委輸不至而虞務存寛政勸督農植開上谷胡市之利通漁陽鹽鐵之饒民悅年登穀石三十青徐士庶避黄巾之難歸虞者百餘萬口皆收視溫恤為安立生業流民皆忘其遷徙虞雖為上公天性節約敝衣繩履食無兼肉遠近豪俊夙僭奢者莫不改操而歸心焉夙猶舊也初詔令公孫瓚討烏桓受虞節度瓚但務會徒衆以自强大而縱任部曲頗侵擾百姓而虞為政仁愛念利民物由是與瓚漸不相平二年冀州刺史韓馥勃海太守袁紹及山東諸将議以朝廷幼冲逼於董卓時獻帝年十歲遠隔關塞不知存否以虞宗室長者欲立為主乃遣故樂浪太守張岐等齎議上虞尊號虞見岐等厲色叱之曰今天下崩亂主上蒙塵左傳曰周襄王出奔于鄭魯臧文仲曰天子蒙塵于外吾被重恩未能清雪國恥諸君各據州郡宜共勠力說文曰勠力幷力也左傳曰勠力同心音力凋反又音六盡心王室而反造逆謀以相垢誤邪固拒之馥等又請虞領尚書事承制封拜復不聽遂收斬使人於是選掾右北平田疇從事鮮于銀魏}
