  - {type: variant, offset: 134, length: 0, content: '', WYG: 也左傳曰兩釋纍囚杜預曰纍繫也前書音義曰諸不以罪死曰纍斃踣也董卓恨紹起兵山東乃誅紹叔父太傅隗及宗族在京師者盡誅滅之紹既興兵渉歴二載不恤國難廣自封植乃多引資糧專為不急割刻無方考責百姓其為痛怨莫不咨嗟紹罪四也逼迫韓馥竊奪其州矯刻金玉以為印璽毎有所下輒皁囊施檢文稱詔書漢官儀曰凡章表皆啟封其言密事得皁囊説文曰檢書署也今俗}
  - {type: page-break, offset: 134, content: '', id: KR2a0009_WYG_103-9b, image: WYG0253/WYG0253-0437b.png}
