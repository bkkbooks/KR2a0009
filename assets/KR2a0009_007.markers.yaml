  - {type: variant, offset: 3509, length: 11, content: 所諱己巳宗祀明堂登靈臺, WYG: 中郎侍郎郎中又詔大將軍公卿郡國舉至孝篤行之士各一人壬辰詔州郡不得廹脅驅逐長吏長吏臧滿三十萬而不紏舉者刺史二千石以縱避為罪若有擅相假印綬者與殺人同棄市論丙午詔郡國繫囚減死罪一等勿笞唯謀反大逆不用此書又詔曰比起陵塋作静陵也彌歴時歳力役旣廣徒隸尤勤頃雨澤不沾密雲復散儻或在兹易曰密雲不雨自我西郊其令徒作陵者減刑各六月是月立阜陵王代兄勃遒亭侯便為阜陵王便光武𤣥孫也阜陵王恢之子以順帝陽嘉中封勃為遒亭侯今}
