  - {type: variant, offset: 5912, length: 225, content: 不明每失厥中自春涉夏大旱炎赫憂心京京故得禱祈明祀冀蒙潤澤前雖得雨而宿麥頗傷比日陰雲還復開霽寤寐永歎重懷慘結將二千石令長不崇寬和暴刻之為乎其令中都官繫囚罪非殊死考未竟者一切任出以須立秋郡國有名山大澤能興雲雨者二千石長吏各絜齊請禱謁誠盡禮又兵役連年死亡流離或支骸不斂或停棺莫收朕甚愍焉昔文王葬枯骨人賴其德今遣使者案行若無家屬及貧無資者隨宜賜卹以慰孤魂是月下邳人謝安應募擊徐鳳等斬之丙辰詔曰孝殤皇帝雖不永休祚而即位踰年君臣禮成孝安皇帝承襲統業而前世遂令恭陵, WYG: 當}
