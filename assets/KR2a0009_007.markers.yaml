  - {type: variant, offset: 6469, length: 104, content: 庚辰詔曰九江廣陵二郡數離寇害殘夷最甚生者失其資業死者委尸原野昔之為政一物不得其所若己為之況我元元嬰此困毒方春戒節賑濟乏戹掩骼埋胔之時其調比郡見穀出稟窮弱收葬枯骸務加埋卹以稱朕意夏四月庚辰令郡國舉明經年五十以上, WYG: 疑日有訛後漢書卷}
