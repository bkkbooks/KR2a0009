  - {type: variant, offset: 1785, length: 1654, content: 子遣使實覈死亡收斂稟賜丁巳太尉劉光司空張皓免九月復安定北地上郡歸舊土癸酉大鴻臚龐參為太尉錄尚書事太常王龔為司空冬十一月庚辰司徒許敬免鮮卑寇朔方十二月乙卯宗正劉崎為司徒是歲分會稽為吳郡拘彌國遣使貢獻五年春正月疏勒王遣侍子及大宛莎車王皆奉使貢獻夏四月京師旱辛巳詔郡國貧人被灾者勿收責今年過更京師及郡國十二蝗冬十月丙辰詔郡國中都官死罪繫囚皆減罪一等詣北地上郡安定戍乙亥定遠侯班始坐殺其妻陰城公主腰斬同產皆𠫓廾市六年春二月庚午河閒王開薨三月辛亥復伊吾屯田復置伊吾司馬一人秋九月辛巳繕起太學護烏桓校尉耿曄遣兵擊鮮卑破之丁酉于闐王遣侍子貢獻冬十一月辛亥詔曰連年灾潦冀部尤甚比蠲除實傷贍恤窮匱而百姓猶有𠫓廾業流亡不絕疑郡縣用心怠惰恩澤不宣易美損上益下書稱安民則惠其令冀部勿收今年田租芻十二月日南徼外葉調國撣國遣使貢獻壬申客星出牽牛于闐王遣侍子詣闕貢獻陽嘉元年春正月乙巳立皇后梁氏賜爵人二級三老孝悌力田三級爵過公乘得移與子若同產同產子民無名數及流民欲占著者人一級魚眾寡孤獨篤貧不能自存者粟人五斛二月海賊曾旌等寇會稽殺句章鄞鄮三縣長攻會稽東部都尉詔緣海縣各屯兵戍丁巳皇后謁高廟光武廟詔稟甘陵貧人大小口各有差京師旱庚申勑郡國二千石各禱名山岳瀆遣大夫謁者詣嵩高首陽山并祠河洛請雨戊辰雩以冀部比年水潦民食不贍詔案行稟貸勸農功賑乏絕甲戌詔曰政失厥和陰陽隔并冬鮮宿雪春無澍雨分禱祈請靡神不禜深恐在所慢違如在之義今遣侍中王輔等持節分詣岱山東海滎陽河洛盡心祈焉三月楊州六郡妖賊章河等寇四十九縣殺傷長吏庚寅帝臨辟雍饗射大赦天下改元陽嘉詔宗室絕屬籍者一切復籍稟冀州尤貧民勿收今年更租口賦夏五月戊寅阜陵王恢薨秋七月史官始作候風地動銅儀丙辰以太學新成試明經下第者補弟子增甲乙科員各十人除郡國耆儒九十人補郎舍人九月詔郡國中都官繫囚皆減死一等亡命者贖各有差鮮卑寇遼東冬十一月甲申望都蒲陰狼殺女子九十七人詔賜狼所殺者錢人三千辛卯初令郡國舉孝廉限年四十以上諸生通章句文吏能牋奏乃得應選其有茂才異行若顏淵子奇不拘年齒十二月丁未東平王敞薨庚戌復置玄菟郡屯田六郡部閏月丁亥令諸以詔除為郎年四十以上課試如孝廉科者得參廉選歲舉一人戊子客星出天苑辛卯詔曰閒者以來吏政不勤故灾咎屢臻盜賊多有退省所由皆以選舉不實官非其人是以天心未得人情多怨書歌股肱詩刺三事今刺史二千石之選歸任三司其簡序先後精覈高下歲月之次文武之宜務存厥衷庚子恭陵百丈廡灾是歲起西苑修飾宮殿二年春二月甲申詔以吳郡會稽飢荒貸人種糧三月使匈奴中郎將王稠率左骨都侯等擊鮮卑破之辛酉除京師耆儒年六十以上四十八人補郎舍人及諸王國郎夏四月復置隴西南部都尉官己亥京師地震五月庚子詔曰朕以不德統奉鴻業無以奉順乾坤協序陰陽灾眚屢見咎徵仍臻地動之異發自京師矜矜祗畏不知所裁羣公卿士將何以匡輔不逮奉荅戒異異不空設必有所應其各悉心直言厥咎靡有所諱戊午司空王龔免六月辛未太常魯國孔扶為司空䟽勒國獻師子封牛丁丑洛陽地陷是月旱秋七月己未太尉龐參免八月己巳大鴻臚沛國施延為太尉鮮卑寇代郡冬十月庚午行禮辟雍奏應鍾始復黃鍾作樂器隨月律三年春二月己丑詔以久旱京師諸獄無輕重皆且勿考竟須得澍雨三月庚戌益州盜賊劫質令長殺列侯夏四月丙寅車師後部司馬率後部王加特奴等掩擊匈奴大破之獲其季母五月戊戌制詔曰昔我太宗丕顯之德假于上下儉以恤民政致康朕秉事不明政失厥道天地譴怒大變仍見春夏連旱寇賊彌繁元元被害朕甚愍之嘉與海內洗心更始其大赦天下自殊死以下謀反大逆諸犯不當得赦者皆赦除之賜民年八十以上米人一斛肉二十斤酒五斗九十以上加賜帛人二匹絮三斤秋七月庚戌鍾羌寇隴西漢陽冬十月護羌校尉馬續擊砟均十一月壬寅司徒劉崎司空孔扶免乙巳大司農南郡黃尚為司徒光祿勳河東王卓為司空丙午武都塞上屯羌及外羌攻破屯官驅略人畜四年春二月丙子初聽中官得以養子為後世襲封爵自去冬旱至于是月謁者馬賢擊鍾羌大破之夏四月甲子太尉施延免戊寅執金吾梁商為大將軍前太尉龐參為太尉六月己未梁王匡薨秋七月己亥濟北王登薨閏月丁亥朔日有食之冬十月烏桓寇雲中十一月圍度遼將軍耿曄於蘭池發諸郡兵救之烏桓退走十二月甲, WYG: ''}
