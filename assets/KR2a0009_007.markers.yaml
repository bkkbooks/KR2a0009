  - {type: variant, offset: 6138, length: 329, content: 康陵之上先後相踰失其次序非所以奉宗廟之重垂無窮之制昔定公追正順祀春秋善之其令恭陵次康陵憲陵次恭陵以序親秩為萬世法六月鮮卑寇代郡秋七月庚寅阜陵王代薨廬江盜賊攻尋陽又攻盱台滕撫遣司馬王章擊破之九月庚戌太傅趙峻薨冬十一月己丑南陽太守韓昭坐贓下獄死丙午中郎將滕撫擊廣陵賊張嬰破之丁未中郎將趙序坐事𠫓廾巿歷陽賊華孟自稱黑帝攻殺九江太守楊岑滕撫率諸將擊孟等大破斬之本初元年春正月丙申詔曰昔堯命四子以欽天道鴻範九疇休咎有象夫瑞以和降異因逆感禁微應大前聖所重頃者州郡輕慢憲防競逞殘暴造設科條陷入無罪或以喜怒驅逐長吏恩阿所私罰枉仇𨻶至令守闕訴訟前後不絕送故迎新人離其害怨氣傷和以致灾眚書云明德慎罰方春東作育微敬始其勑有司罪非殊死且勿案驗以崇在寬壬子廣陵太守王喜坐討賊逗留下獄死, WYG: ''}
