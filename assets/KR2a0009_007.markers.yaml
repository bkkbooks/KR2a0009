  - {type: variant, offset: 3582, length: 0, content: '', WYG: 甲子皇帝加元服庚午大赦天下賜河間勃海二王黄金各百斤河間王建勃海王悝彭城諸國王各五十斤彭城王定公主大將軍三公特進侯中二千石二千石將大夫郎吏從官四姓及梁鄧小侯諸夫人以下帛各有差年八十以上賜米酒肉九十以上加帛二匹綿三斤三月戊辰帝從皇太后幸大將軍梁冀府白馬羌寇廣漢屬國殺長吏益州刺史率板楯蠻討破之板楯西南蠻之號夏四月丙子封帝弟顧為平原王奉孝崇皇祀尊孝崇皇夫人馬氏為孝崇園貴人嘉禾生大司農帑藏説文曰帑者金布所藏之府也帑佗朗反五月癸丑北宮掖廷中德陽殿及左掖門火車駕移幸南宮六月改清河為甘陵立安平王得子經侯理為甘陵王安平今定州縣也經今貝州經城縣秋七月京師大水河東言木連理冬十月長平陳景自號皇帝子署置官屬又南頓管伯亦稱真人並圖舉兵悉伏誅三年春三月甲申彭城王定薨夏四月丁夘晦日有食之續漢志曰在東井二十三度東井主法梁太后枉殺公卿犯天法也五月乙亥詔曰蓋聞天生蒸民不能相理為之立君使司牧之君道得於下則休祥著乎上庶事失其序則咎徵見乎象已上畧成帝詔詞間者日食毁缺陽光晦暗朕祗懼潛思匪遑啓處遑暇也啓跪也詩小雅曰王事靡盬不遑啓處傳不云乎日食脩德月食脩刑公羊傳之文也昔孝章帝愍前世禁徙故建初之元並蒙恩澤流徙者使還故郡沒入者免為庶民先皇德政可不務乎其自永建元年迄于今歳凡諸妖惡支親從坐及吏民減死徙邊者悉歸本郡唯沒入者不從此令六月庚子詔大將軍三公特進侯其與卿校尉舉賢良方正能直言極諫之士各一人乙夘震憲陵寢屋秋七月庚申廉縣雨肉續漢志曰肉似羊肺或大如手五行傳云棄法律逐功臣時則有羊禍時則有赤眚赤祥是時梁太后攝政兄冀専權枉誅李固杜喬天下寃之廉縣屬北地郡也八月乙丑有星孛于天市前書曰旗星中四星名曰天市京師大水九月己夘地震庚寅地又震詔死罪以下及亡命者贖各有差郡國五山崩冬十月太尉趙戒免司徒袁湯為太尉大司農河内張歆為司徒歆字敬讓十一月甲申詔曰朕攝政失中災眚連仍三光不明隂陽錯序監寐寤歎疢如疾首監寐言雖寢而不寐也寤覺也今京師厮舍死者相枕厮舍賤役人之舍也郡縣阡陌處處有之甚違周文掩胔之義其有家屬而貧無以𦵏者給直人三千喪主布三匹若無親屬可於官壖地𦵏之壖官之餘地也前書音義曰壖城郭旁地音奴喚而變二反表識姓名為設祠祭又徒在作部疾病致醫藥死亡厚埋藏民有不能自振及流移者稟榖如科州郡檢察務崇恩施以康我民和平元年春正月甲子大赦天下改元和平己亥詔曰曩者遭家不造先帝早世謂順帝崩詩周頌曰閔予小子遭家不造鄭𤣥注云造成也言成王遭武王崩家道未成永惟太宗之重深思嗣續之福詢謀台輔稽之兆占旣建明哲克定統業天人協和萬國咸寜元服已加將即委付而四方盜竊頗有未靜故假延臨政以須安謐幸頼股肱禦侮之助殘醜消蕩謂建和二年長安陳景反南頓管伯等謀反並伏誅民和年稔普天率土遐邇洽同遠覽復子明辟之義尚書曰周公曰朕復子明辟復還也子謂成王也辟君也謂周公攝政已乆故復還明君之政於成王今太后亦還政於帝也近慕先姑歸授之法先姑謂安帝閻皇后也爾雅曰婦人謂夫之父曰舅夫之母曰姑在則曰君舅君姑歿則曰先舅先姑也及今令辰皇帝稱制羣公卿士䖍恭爾位戮力一意勉同斷金金者剛之物也言人能同心則其利可以斷之也易曰二人同心其利斷金展也大成則所望矣詩小雅曰允矣君子展也大成鄭𤣥注云允信也展誠也大成謂致太平也言誠能致太平是所望也二月扶風妖賊裴優自稱皇帝伏誅裴姓優名也風俗通曰裴伯益之後甲寅皇太后梁氏崩三月車駕徙幸北宮甲午𦵏順烈皇后夏五月庚辰尊博園匽貴人曰孝崇皇后秋七月梓潼山崩梓潼縣屬廣漢郡今始州縣也有梓潼水冬十一月減天下死罪一等徙邊戍元嘉元年春正月京師疾疫使光禄大夫將醫藥案行癸酉大赦天下改元元嘉二月九江廬江大疫甲午河間王建薨夏四月己丑安平王得薨河間孝王開之子初為樂成王後改曰安平京師旱任城梁國饑民相食司徒張歆罷光禄勳呉雄為司徒秋七月}
