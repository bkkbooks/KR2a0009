  - {type: variant, offset: 5395, length: 222, content: 于憲陵廟曰敬宗是日京師及太原鴈門地震三郡水涌土裂庚戌詔三公特進侯卿校尉舉賢良方正幽逸修道之士各一人百僚皆上封事己未九江太守丘騰有罪下獄死楊州刺史尹耀九江太守鄧顯討賊范容等於歷陽軍敗耀顯為賊所歿冬十月日南蠻夷攻燒城邑交阯刺史夏方招誘降之壬申常山王儀薨己卯零陵太守劉康坐殺無辜下獄死十一月九江盜賊徐鳳馬勉等稱無上將軍攻燒城邑己酉令郡國中都官繫囚減死一等徙邊謀反大逆不用此令十二月九江賊黃虎等攻合肥是歲羣盜發憲陵護羌校尉趙沖追撀叛羌於鸇陰河戰歿永嘉憙, WYG: 子皇監本作黄今從宋本臣會汾按黄帝子義亦可通猶前書言白帝子赤帝子也和平}
