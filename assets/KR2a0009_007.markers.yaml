  - {type: variant, offset: 789, length: 343, content: 坐法當徙勿徙亡捕穚勿傳宗室以罪絕皆復屬籍其與閻顯江京等交通者悉勿考勉修厥職以康我民辛未皇太后閻氏崩辛巳太傅馮石太尉劉熹司徒李郃免二月甲申葬安思皇后丙戌太常桓焉為太傅大鴻臚朱寵為太尉參錄尚書事長樂少府九江朱倀為司徒賜百官隨輦宿衞及拜除者布各有差隴西鐘羌叛護羌校尉馬賢討破之夏五月丁丑詔幽并涼州刺史使各實二千石以下至黃綬年老劣弱不任軍事者上名嚴勑障塞繕設屯備立秋之後簡習戎馬六月己亥封濟南王錯子顯為濟南王秋七月庚午衞尉來歷為車騎將軍八月鮮卑寇代郡代郡太守李超戰歿九月辛亥初令三公尚書入奏事冬十月辛巳詔減死罪以下徙邊其亡命贖各有差丁亥司空陶敦免鮮卑犯邊庚寅遣黎陽營兵出屯中山北界告幽州刺史其令緣邊郡增置步兵列屯塞下調五營弩師郡舉五人令教習戰射壬寅廷尉張皓為司空甲辰詔以疫癘水潦令人半輸今年田租, WYG: 災害所}
