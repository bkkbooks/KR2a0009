  - {type: variant, offset: 521, length: 5, content: 益州刺史罷, WYG: 曰孝廉廉吏皆當典城牧民禁姦舉善興化之本恒必由之詔書連下分明懇惻而所在翫習遂至怠慢選舉乖錯害及元元頃雖頗繩正猶未懲改方今淮夷未殄軍師屢出本初元年廬江賊攻盱台廣陵賊張嬰等殺江都長盱台江都並近淮故言淮夷時中郎將滕撫屢擊破之其餘衆猶未殄也百姓疲悴困於徵發庶望羣吏恵我勞民蠲滌貪穢以祈休祥其令秩滿百石十歳以上有殊才異行乃得參選臧吏}
