  - {type: variant, offset: 3754, length: 1, content: 卯, krp: 亥詔無事之官權絶奉豐年如故冬十一月日南蠻賊率衆詣郡降勒姐羌圍允街勒姐羌號也姐音子野反段熲擊破之太山賊叔孫無忌攻殺都尉侯章十二月遣中郎將宗資討破之武陵蠻宼江陵車騎將軍馮緄討皆降㪚荆州刺史度尚討長沙蠻平之四年春正月辛酉南宫嘉德殿火戊子丙署火丙署署名也續漢志曰丙署長七人秩四百石黄綬宦者為之主中宮别處大疫二月壬辰武庫火司徒盛允免大司農种暠為司徒三月省冗從右僕射官永夀三年置太尉黄瓊免夏四月太常劉矩為太尉甲寅封河間王開子博為任城王五月辛酉有星孛于心丁夘原陵長壽門火己夘京師雨雹東觀記曰大如雞子續漢志曰誅殺過差寵小人也六月京兆扶風及涼州地震庚子岱山及博尤來山並頺裂博今博城縣也太山有徂來山一名尤來己酉大赦天下司空虞放免前太尉黄瓊為司空犍為屬國夷寇鈔百姓益州刺史山昱擊破之零吾羌與先零諸種並叛宼三輔秋七月京師雩減公卿以下奉貣王侯半租占賣闗内侯虎賁羽林緹騎營士五大夫錢各有差九月司空黄瓊免大鴻臚劉寵為司空冬十月天竺國來獻南陽黄武與襄城惠得昆陽樂季訞言相署皆伏誅先零沈氐羌與諸種羌寇幷涼二州十一月中郎將皇甫規擊破之十二月夫餘王遣使來獻五年春正月省大官右監丞永夀三年置壬午南宮丙署火三月沈氐羌寇張掖酒泉壬午濟北王次薨夏四月長沙賊起宼桂陽蒼梧東觀記曰時攻没蒼梧取銅虎符太守甘定刺史侯輔各奔出城桂陽郡在桂水之陽今連州縣驚馬逸象突入宮殿乙丑恭陵東闕火安帝陵也戊辰虎賁掖門火己巳太學西門自壞五月康陵園寢火殤帝陵也長沙零陵賊起攻桂陽蒼梧南海交阯遣御史中丞盛脩督州郡討之不剋乙亥}
