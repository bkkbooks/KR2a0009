  - {type: variant, offset: 6574, length: 245, content: 十以下詣太學自大將軍至六百石皆遣子受業歲滿課試以高第五人補郎中次五人太子舍人又千石六百石四府掾屬三署郎四姓小侯先能通經者各令隨家法其高第者上名牒當以次賞進五月庚寅徙樂安王為勃海王海水溢戊申使謁者案行收葬樂安北海人為水所漂沒死者又稟給貧羸庚戌太白犯熒惑六月丁巳大赦天下賜民爵及粟帛各有差閏月甲申大將軍梁冀潛行鴆弒帝崩于玉堂前殿年九歲丁亥太尉李固免戊子司徒胡廣為太尉司空趙戒為司徒與梁冀參錄尚書事太僕袁湯為司空贊曰孝順初立時髦允集匪砥匪革終淪嬖習保阿傳土后家世及沖夭未識質弒以聰陵折在運天緒三終, WYG: 考證}
