  - {type: variant, offset: 4603, length: 367, content: 庚子以執金吾張喬行車騎將軍事將兵屯三輔漢安元年春正月癸巳宗祀明堂大赦天下改元漢安二月丙辰詔大將軍公卿舉賢良方正能探賾索隱者各一人秋七月始置承華八月南匈奴左部大人句龍吾斯與薁鞬臺耆等反叛丁卯遣侍中杜喬光祿大夫周舉守光祿大夫郭遵馮羨欒巴張綱周栩劉班等八人分行州郡班宣風化舉實臧否九月庚寅廣陵盜賊張嬰等寇郡縣冬十月辛未太尉桓焉司徒劉壽免甲戌行車騎將軍張喬罷十一月壬午司隸校尉趙峻為太尉大司農胡廣為司徒癸卯詔大將軍三公選武猛試用有效驗任為將校者各一人是歲廣陵賊張嬰等詣太守張綱降二年春二月丙辰鄯善國遣使貢獻夏四月庚戌護羌校尉趙沖與漢陽太守張貢擊燒當何羌於參破之六月乙丑熒惑犯鎮星丙寅立南匈奴守義王兜樓儲為南單于冬十月辛丑令郡國中都官繫囚殊死以下出縑贖各有差其不能入贖者遣詣臨羌縣居作二歲甲辰減百官奉丙午禁沽酒又貸王侯國租一歲閏月趙沖擊燒當羌於, WYG: 西}
