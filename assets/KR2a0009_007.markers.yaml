  - {type: variant, offset: 5363, length: 2, content: 丁丑, WYG: 是歳復博陵河間二郡比豐沛論曰前史稱桓帝好音樂善琴笙前史謂東觀記飾芳林而考濯龍之宮薛綜注東京賦云濯龍殿名芳林謂両旁樹木蘭也考成也既成而祭之左傳曰考仲子之宮設華蓋}
  - {type: variant, offset: 5363, length: 2, content: 丁丑, krp: 是歳復博陵河間二郡比豐沛論曰前史稱桓帝好音樂善琴笙前史謂東觀記飾芳林而考濯龍之宮薛綜注東京賦云濯龍殿名芳林謂両旁樹木蘭也考成也既成而祭之左傳曰考仲子之宮設華蓋}
