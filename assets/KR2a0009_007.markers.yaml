  - {type: variant, offset: 3596, length: 0, content: '', WYG: 薨無子國除秋七月郡國三十二蝗河水溢百姓飢窮流冗道路至有數十萬户冀州尤甚詔在所賑給乏絶安慰居業冬十月太尉袁湯免太常胡廣為太尉司徒呉雄罷司空趙戒免以太僕黄瓊為司徒光祿勳房植為司空十一月丁丑詔減天下死罪一等徙邊戍是歳武陵太守應奉招誘叛蠻降之二年春正月甲午大赦天下二月辛丑初聽刺史二千石行三年喪服癸夘京師地震詔公卿校尉舉賢良方正能直言極諫者各一人詔曰比者星辰繆越坤靈震動災異之降必不空發勑已脩政庶望有補其輿服制度有踰侈長飾者皆宜損省長音直亮反郡縣務存儉約申明舊令如永平故事六月彭城泗水増長逆流張衡對策曰水者五行之首逆流者人君之恩不能下及而致逆也詔司隸校尉部刺史曰蝗災為害水變仍至五榖不登人無宿儲其令所傷郡國種蕪菁以助人食京師蝗東海朐山崩朐山名也在今海州朐山縣南九月丁夘朔日有食之詔曰朝政失中雲}
