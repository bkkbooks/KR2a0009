  - {type: variant, offset: 5027, length: 204, content: 詔曰隴西漢陽張掖北地武威武都自去年九月已來地百八十震山谷坼裂壞敗城寺殺害民庶夷狄叛逆賦役重數內外怨曠惟咎歎息其遣光祿大夫案行宣暢恩澤惠此下民勿為煩擾三月庚子沛王廣薨領護羌校尉衞琚追討叛羌破之南郡江夏盜賊寇掠城邑州郡討平之夏四月使匈奴中郎將馬寔擊南匈奴左部破之於是胡羌烏桓悉詣寔降辛巳立皇子炳為皇太子改年建康大赦天下賜人爵各有差秋七月丙午清河王延平薨八月楊徐盜賊范容周生等寇掠城邑遣御史中丞馮赦督州郡兵討之庚午, WYG: ''}
