  - {type: variant, offset: 3693, length: 1, content: 甲, WYG: 校獵廣成遂幸上林苑十二月鮮卑寇邊使匈奴中郎將張奐率南單于擊破之二年春二月鮮卑寇鴈門己亥阜陵王便薨蜀郡夷寇蠶陵殺縣令三月復斷刺史二千石行三年喪夏京師雨水六月鮮卑寇遼東秋七月初造顯陽苑置丞丙午皇后梁氏崩乙丑𦵏懿獻皇后于懿陵大將軍梁冀謀為亂八月丁丑帝御前殿詔司隸校尉張彪將兵圍冀第收大將軍印綬冀與妻皆自殺衞尉梁淑河南尹梁𦙍屯騎校尉梁讓越騎校尉梁忠長水校尉梁㦸等及中外宗親數十人皆伏誅太尉胡廣坐免司徒韓縯司空孫朗下獄東觀記曰並坐不衞宮止長壽亭減死一等以爵贖之壬午立皇后鄧氏追廢懿陵為貴人冢詔曰梁冀奸暴濁亂王室孝質皇帝聰敏早茂冀心懷忌畏私行殺毒永樂太后親尊莫二和平元年有司奏太后所居皆以永樂為稱置官屬太僕少府焉冀又遏絶禁還京師謂太后常居博園不得在洛陽使朕離母子之愛隔顧復之恩禍害深大罪釁日滋頼宗廟之靈及中常侍單超徐璜具瑗左悺説文曰悺憂也音工奐反今作心旁官即悹字也今相傳音綰唐衡尚書令尹勳等激憤建策内外協同漏刻之間桀逆梟夷梟縣首於木也斯誠社稷之祐臣下之力宜班慶賞以酬忠勳其封超等五人為縣侯勳等七人為亭侯五縣侯謂單超新豐侯徐璜武原侯具瑗東武陽侯左悺上蔡侯唐衡汝陽侯七亭侯謂尹勳宜陽都鄉霍諝鄴都亭張敬山陽西鄉歐陽參脩武仁亭李瑋宜陽金門虞放寃句呂都亭周永下邳高遷鄉於是舊故恩私多受封爵大司農黄瓊為太尉光祿大夫中山祝恬為司徒恬字伯休盧奴人大鴻臚梁國盛允為司空允字伯代初置祕書監官漢官儀祕書監一人秩六百石冬十月壬}
