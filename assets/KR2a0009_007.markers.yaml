  - {type: variant, offset: 5366, length: 4, content: 太尉趙峻, krp: 祠浮圖老子浮圖今佛也續漢志曰祀老子於濯龍宮文罽}
  - {type: variant, offset: 5371, length: 5, content: 太傅大司農, WYG: 壇飾淳金銀器設華蓋之坐用郊天樂斯將所謂聽於神乎左傳曰史嚚曰國將興聽於人將亡聽於神及誅梁冀奮威怒天下猶企其休息而五邪嗣虐流衍四方五邪謂單超徐璜左悺唐衡具瑗也自非忠賢力爭屢折姦鋒忠賢謂李膺陳蕃竇武黄瓊朱穆劉淑劉陶等各上書極諫以折宦官等姦謀之鋒也雖願依斟流彘亦不可得已帝王紀曰夏帝相為羿所逐相乃都啇丘依同姓諸侯斟灌斟尋氏史記曰周厲王好利暴虐周人相與畔而襲厲王王出奔于彘言帝寵幸宦豎令執威權頼忠臣李膺等竭力諫爭以免簒弑之禍不然則雖願如夏相依斟周王流彘不可得也斟灌斟尋國故城在今青州彘晉地也贊曰桓自宗支越躋天祿越謂非次也躋升也天祿天位也左傳子家覊曰天祿不再政移五倖刑淫三獄倖佞也淫濫也五倖即上五邪也三獄謂}
