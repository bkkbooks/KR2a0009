  - {type: variant, offset: 3596, length: 0, content: '', krp: 薨無子國除秋七月郡國三十二蝗河水溢百姓飢窮流冗道路至有數十萬户冀州尤甚詔在所賑給乏絶安慰居業冬十月太尉袁湯免太常胡廣為太尉司徒呉雄罷司空趙戒免以太僕黄瓊為司徒光祿勳房植為司空十一月丁丑詔減天下死罪一等徙邊戍是歳武陵太守應奉招誘叛蠻降之二年春正月甲午大赦天下二月辛丑初聽刺史二千石行三年喪服癸夘京師地震詔公卿校尉舉賢良方正能直言極諫者各一人詔曰比者星辰繆越坤靈震動災異之降必不空發勑已脩政庶望有補其輿服制度有踰侈長飾者皆宜損省長音直亮反郡縣務存儉約申明舊令如永平故事六月彭城泗水増長逆流張衡對策曰水者五行之首逆流者人君之恩不能下及而致逆也詔司隸校尉部刺史曰蝗災為害水變仍至五榖不登人無宿儲其令所傷郡國種蕪菁以助人食京師蝗東海朐山崩朐山名也在今海州朐山縣南九月丁夘朔日有食之詔曰朝政失中雲}
  - {type: variant, offset: 3597, length: 0, content: '', WYG: 作旱雲漢詩大雅篇名也周宣王時大旱故作詩曰倬彼雲漢昭回于天鄭𤣥注云雲漢天河也倬然轉運於天時旱渴雨故宣王夜視天河望其候焉川靈涌水蝗蟲孳蔓殘我百榖太陽虧光饑饉荐臻其不被害郡縣當為飢餒者儲天下一家趣不糜爛則為國寶其禁郡國不得賣酒祠祀裁足太尉胡廣免司徒黄瓊為太尉閏月光祿勳尹頌為司徒頌字公孫鞏人減天下死罪一等徙邊戌蜀郡李伯詐稱宗室當立為太初皇帝伏誅冬十一月甲辰校獵上林苑遂至函谷闗賜所過道傍年九十以上錢各有差太山琅邪賊公孫舉等反叛殺長吏永壽元年春正月戊申大赦天下改元永壽二月司隸冀州饑人相食司隸州即洛陽勑州郡賑給貧弱若王侯吏民有積榖者一切貣得十分之三貣音吐得反又音徒得反以助稟貸其百姓吏民者以見錢雇直雇猶酬也王侯須新租乃償須待也夏四月白烏見齊國六月洛水溢壞鴻德苑續漢志曰水溢至津城門漂流人物時梁冀専政疾害忠良威權震主後遂誅滅也南陽大水司空房植免太常韓縯為司空縯音翼善反詔太山琅邪遇賊者勿收租賦復更算三年又詔被水死流失屍骸者令郡縣鉤求收𦵏及所唐突壓溺物故七歳以上賜錢人二千壞敗廬舍亡失榖食尤貧者稟人二斛巴郡益州郡山崩益州郡名也武帝置諸本無郡字者誤也秋七月初置太山琅邪都尉官漢官儀曰秦郡有尉一人典兵禁捕盜賊景帝更名都尉建武七年省唯邊郡往往置都尉及}
