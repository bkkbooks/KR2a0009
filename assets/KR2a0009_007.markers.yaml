  - {type: variant, offset: 1409, length: 375, content: 癸卯遣光祿大夫案行漢陽及河內魏郡陳留東郡稟貸貧人六月旱遣使者錄囚徒理輕繫甲寅濟南王顯薨秋七月丁酉茂陵園寑灾帝縞素避正殿辛亥使太常王龔持節告祠茂陵九月鮮卑寇漁陽冬十二月己亥太傅桓焉免是歲車騎將軍來歷罷四年春正月丙寅詔曰朕託王公之上涉道日寡政失厥中陰陽氣隔寇盜肆暴庶獄彌繁憂悴永歎疢如疾首詩云君子如祉亂庶遄已三朝之會朔旦立春嘉與海內洗心自新其赦天下從甲寅赦令已來復秩屬籍三年正月已來還贖其閻顯江京等知識婚姻禁錮一原除之務崇寬和敬順時令遵典去苛以稱朕意丙子帝加元服賜王主貴人公卿以下金帛各有差賜男子爵及流民欲占者人一級為父後三老孝悌力田人二級魚眾寡孤獨篤貧不能自存帛人一匹二月戊戌詔以民入山鑿石發洩藏氣勑有司檢察所當禁絕如建武永平故事夏五月壬辰詔曰海內頗有灾異朝廷修政太官減膳珍玩不御而桂陽太守文礱不惟竭忠宣暢本朝而遠獻大珠以求幸媚今封以還之五州雨水秋八月, WYG: ''}
