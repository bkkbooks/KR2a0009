  - {type: variant, offset: 3775, length: 0, content: '', krp: 康陵東署火五月鮮卑寇遼東屬國秋七月甲申平陵園寢火平陵昭帝陵也桂陽盜賊李研等宼郡界武陵蠻復叛太守陳奉與戰大破降之隴西太守孫羌討滇那羌破之八月車騎將軍馮緄免冬十月丙辰校獵廣成遂幸函谷闗上林苑十一月司空劉寵免南海賊宼郡界十二月衛尉周景為司空七年春正月庚寅沛王榮薨三月癸亥隕石于鄠夏四月丙寅梁王成薨五月己丑京師雨雹秋七月辛夘趙王乾薨野王山上有死龍荆州刺史度尚擊零陵桂陽盜賊及蠻夷大破平之冬十月壬寅南廵狩庚申幸章陵祠舊宅遂有事于園廟賜守令以下各有差戊辰幸雲夢臨漢水還幸新野祠湖陽新野公主魯哀王壽張敬侯廟光武姊湖陽長公主新野長公主兄魯哀王舅壽張敬侯樊重並光武時立廟䕶羌校尉段熲擊當煎羌破之十二月辛丑車駕還宮八年春正月遣中常侍左悺之苦縣祠老子史記曰老子者楚苦縣厲鄉曲仁里人也名耳字𥅆姓李氏為周守藏史有神廟故就祠之苦縣屬陳國故城在今亳州谷陽縣也苦音戸又如字勃海王悝謀反降為廮陶王廮陶縣屬鉅鹿郡故城在今趙州廮陶縣西南丙申晦日有食之詔公卿校尉舉賢良方正己酉南宮嘉德署黄龍見千秋萬歳殿火太僕左稱有辠自殺癸亥皇后鄧氏廢河南尹鄧萬世鄧后之叔父也虎賁中郎將鄧㑹下獄死鄧后之兄子䕶羌校尉段熲擊勒姐羌破之三月辛巳大赦天下夏四月甲寅安陵園寢火惠帝陵也丁巳壞郡國諸房祀房謂祠堂也王渙傳曰時唯密縣存故太傳卓茂廟洛陽留令王渙祠濟隂東郡濟北河水清五月壬申罷太山都尉官永壽元年置丙戌太尉楊秉薨丙辰緱氏地裂桂陽胡蘭朱蓋等復反攻沒郡縣轉宼零陵零陵太守陳球拒之遣中郎將度尚長沙太守抗徐等擊蘭蓋大破斬之謝承書曰抗徐字伯徐丹陽人少為郡佐史有膽智策畧三府表徐有將率之任特遷長沙太守風俗通曰衛大夫三抗之後漢有抗喜為漢中太守蒼梧太守張叙為賊所執又桂陽太守任𦙍背敵畏懦皆棄市閏月甲午南宫長秋和歡殿後鉤楯掖庭朔平署火長秋宮名漢官儀曰朔平署司馬一人六月段熲擊當煎羌於湟中大破之湟水名在今鄯州湟水縣秋七月太中大夫陳蕃為太尉八月戊辰初令郡國有田者畝斂税錢畝十錢也九月丁未京師地震冬十月司空周景免太常劉茂為司空茂字叔盛彭城人也辛巳立貴人竇氏為皇后勃海妖賊蓋登等蓋古盍反稱太上皇帝有玉印珪璧鐵劵相署置皆伏誅續漢書曰時登等有玉印五皆如白石文曰皇帝信璽皇帝行璽其三無文字璧二十二珪五鐵劵十一開王廟帶玉綬衣絳衣相署置也十一月壬子德陽殿西閤黄門北寺火延及廣義神虎門燒殺人廣義神虎洛陽宮西門在金商門外袁山松書曰是時連月火災諸宫寺或一日三發又夜有訛言擊鼓相驚陳蕃等上疏諫曰唯善政可以己之書奏不省使中常侍管霸之苦縣祠老子九年春正月辛亥朔日有食之詔公卿校尉郡國舉至孝沛國戴異得黄金印無文字遂與廣陵人龍尚等共祭井作符書稱太上皇伏誅東觀記曰戴異鉏田得金印到廣陵以與龍尚己酉詔曰比歳不登人多飢窮又有水旱疾疫之困盜賊徵發南州尤甚謂長沙桂陽零陵等郡也並屬荆州災異日食譴告累至政亂在予仍獲咎徵其令大司農絶今歳調度徵求及前年所調未畢者勿復收責其災旱盜賊之郡勿收租餘郡悉半入三月癸巳京師有火光轉行人相驚譟司隸豫州飢死者什四五至有滅户者遣三府掾賑稟之陳留太守韋毅坐臧自殺夏四月濟隂東郡濟北平原河水清司徒許栩免五月太常胡廣為司徒六月南匈奴及烏桓鮮卑寇縁邊九郡秋七月沈氐羌寇武威張掖詔舉武猛三公各二人卿校尉各一人太尉陳蕃免庚午祠黄老於濯龍宮遣使匈奴中郎將張奐擊南匈奴烏桓鮮卑九月光祿勲周景為大尉南陽太守成瑨太原太守劉質並以譖棄市時小黄門趙津犯法質考殺之宦官怨恚有司承㫖奏質等司空劉茂免大秦國王遣使奉獻時國王安敦獻象牙犀角玳瑁冬十二月洛城傍竹柏枯傷光祿勳汝南宣酆為司空酆字伯應封東陽亭侯南匈奴烏桓率衆詣張奐降司隸校尉李膺等二百餘人受誣為黨人並坐下獄書名王府河内牢脩告之事具劉淑傳永康元年春正月先零羌寇三輔中郎將張奐破平之當煎羌宼武威䕶羌校尉段熲追擊於鸞鳥大破之鸞鳥縣名屬武威郡鸞音雚西羌悉平夫餘王寇𤣥莬太守公孫域與戰破之夏四月先零羌宼三輔五月丙申}
