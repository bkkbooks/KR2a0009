  - {type: variant, offset: 4021, length: 250, content: 燒當羌寇金城護羌校尉馬賢擊破之羌遂相招而叛十二月戊戌朔日有食之四年春正月庚辰中常侍張逵蘧政楊定等有罪誅連及弘農太守張鳳安平相楊晧下獄死三月乙亥京師地震夏四月癸卯護羌校尉馬賢討燒當羌大破之戊午大赦天下賜民爵及粟帛各有差五月戊辰封故濟北惠王壽子安為濟北王秋八月太原郡旱民庶流癸丑遣光祿大夫案行稟貸除更賦冬十月戊午校獵上林苑歷函谷關而還十一月丙寅幸廣成苑五年春二月戊申京師地震夏四月庚子中山王弘薨南匈奴左部句龍大人吾斯車紐等叛圍美稷五月度遼將軍馬續討吾斯車紐破之使匈奴中郎將陳龜迫殺南單于己丑晦日有食之且凍, WYG: 先零}
