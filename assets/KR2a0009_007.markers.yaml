  - {type: variant, offset: 3759, length: 0, content: '', WYG: 詔公卿各上封事甲申中藏府丞祿署火秋七月己未南宮承善闥火爾雅曰宮中門謂之闈廣雅曰闈謂之闥鳥吾羌宼漢陽隴西金城諸郡兵討破之八月庚子詔減虎賁羽林住寺不任事者半奉勿與冬衣東觀記曰以京師水旱疫病帑藏空虚虎賁羽林不任事者住寺減半奉據此謂簡選疲弱不勝軍事者留住寺也其公卿以下給冬衣之半艾縣賊焚燒長沙郡縣宼益陽殺令東觀記曰時賊乘刺史車屯據臨湘居太守舍賊萬人以上屯益陽殺長吏艾縣名屬豫章郡故城在今洪州建昌縣又零陵蠻亦叛宼長沙己夘罷琅邪都尉官永壽元年置冬}
