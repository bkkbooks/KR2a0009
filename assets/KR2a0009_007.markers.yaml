  - {type: variant, offset: 3753, length: 0, content: '', WYG: 壬寅中常侍單超為車騎將軍十二月己巳至自長安賜長安民粟人十斛園陵人五斛行所過縣三斛燒當等八種𦍑叛寇隴右䕶羌校尉段熲追擊於羅亭破之東觀記曰追到積石山卽與羅亭相近在今鄯州也天竺國來獻三年春正月丙申大赦天下丙午車騎將軍單超薨閏月燒當𦍑叛寇張掖護羌校尉段熲追擊於積石大破之積石山在今鄯州龍支縣南即禹貢云導河積石是也白馬令李雲坐直諌下獄死夏四月上郡言甘露降五月甲戌漢中山崩六月辛丑司徒祝恬薨七月司空盛允為司徒太常虞放為司空放字子仲陳留人也長沙蠻宼郡界九月太山琅邪賊勞丙等復叛宼掠百姓遣御史中丞趙某史闕名也持節督州郡討之}
