  - {type: variant, offset: 55, length: 0, content: '', WYG: 霍光輔政其子禹及兄孫雲山等皆中郎將奉車都尉昆弟諸壻皆奉朝請給事中唯昭帝外家趙氏無一在位者結貴據權至堅至固終没之後受禍滅門霍光薨後其子禹宣帝時}
  - {type: page-break, offset: 55, content: '', id: KR2a0009_WYG_059-3b, image: WYG0252/WYG0252-0702d.png}
  - {type: variant, offset: 55, length: 0, content: '', krp: 霍光輔政其子禹及兄孫雲山等皆中郎將奉車都尉昆弟諸壻皆奉朝請給事中唯昭帝外家趙氏無一在位者結貴據權至堅至固終没之後受禍滅門霍光薨後其子禹宣帝時}
  - {type: variant, offset: 56, length: 1, content: 丞, WYG: 大司馬謀反發覺禹腰斬母顯及諸女昆弟皆棄市方今師傅皆以伊周之位據賢保之任以此思化則功何不至不思其危則禍何不到損益之際孔父攸歎說苑曰孔子讀易至損益則喟然而歎子夏問曰夫子何為歎孔子曰夫自損者益自益者缺吾是以歎之矣持滿之戒老氏所愼老子曰持而盈之不如其巳已止也言埶滿必傾不如止也蓋功冠天下者不安威震人主者不全今承衰亂之後繼重敝之世公家屈竭賦歛重數苛吏奪其時貪夫侵其財百姓困乏疾疫夭命盗賊羣輩且以萬數軍行衆止竊號自立興軍而行擁衆而止無畏憚於危亾也攻犯京師燔燒縣邑謂平帝元始三年陽陵人任横等自稱將軍盗武庫兵攻宫寺出囚徒也至乃訛言積弩入宮宿衛驚懼自漢興以來誠未有也國家微弱姦謀不禁六極之效危於累卵尚書大傳曰貌之不恭厥極惡言之不從厥極憂視之不眀厥極疾聽之不聰厥極貧心之不睿厥極凶短折皇極不建厥極弱也王者承天順地典爵主刑不敢以天官私其宗不敢以天罸輕其親陛下宜遂聖明之徳昭然覺悟逺述帝王之迹近遵孝文之業文帝即位使將軍薄昭迎薄太后於代剛欲使平帝迎中山太后至京師也差五品之屬納至親之序五品五常之教也尚書舜命契曰汝作司徒敬敷五教左傳史克曰舜舉八元使布五教于四方父義母慈兄友弟恭子孝亟遣使者徵中山太后置之别宫令時朝見又召馮衛二族裁與冗職冗散也使得執㦸親奉宿衛以防未然之符以抑患禍之端上安社稷下全保傅内和親戚外絶邪謀書奏莽令元后下詔曰剛所言僻經妄說元后元帝后王莽之姑也違背大義其罷歸田里後莽簒位剛遂避地河西轉入巴蜀徃來二十餘年及隗囂據隴右欲背漢而附公孫述剛說之曰愚聞人所歸者天所與人所畔者天所去也伏念本朝謂光武也躬聖德舉義兵共行天罸所當必摧誠天之所福非人力也將軍本無尺土孤立一隅宜推誠奉順與朝并力上應天心下醻人望爲國立功可以永年今文尚書曰立功立事可以永年也嫌疑之事聖人所絶以將軍之威重逺在千里動作舉措可不愼與今璽書數到委國歸信欲與將軍共同吉凶布衣}
