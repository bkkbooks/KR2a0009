  - {type: variant, offset: 5468, length: 404, content: 六可以逞情意順四節也宜惟夏禹卑宮太宗露臺之意以尉下民之勞書奏帝欲止以問侍中任芝中常侍樂松松等曰昔文王之囿百里人以為小齊宣五里人以為大今與百姓共之無害於政也帝悅遂令築苑四年賜以病罷居無何拜太常詔賜御府衣一襲自所服冠幘綬玉壺革帶金錯鉤佩五年冬復拜太尉中平元年黃巾賊起賜被召會議詣省閤切諫忤旨因以寇賊免先是黃巾帥張角等執左道稱大賢以誑燿百姓天下繈負歸之賜時在司徒召掾劉陶告曰張角等遭赦不悔而稍益滋蔓今若下州郡捕討恐更騷擾速成其患且欲切勑刺史二千石簡別流人各護歸本郡以孤弱其黨然後誅其渠帥可不勞而定何如陶對曰此孫子所謂不戰而屈人之兵廟勝之術也賜遂上書言之會去位事留中後帝徙南宮閱錄故事得賜所上張角奏及前侍講注籍乃感悟下詔封賜臨晉侯邑千五百戶初賜與太尉劉寬司空張濟並入侍講自以不宜獨受封賞上書願分戶邑於寬濟帝嘉歎復封寬及濟子拜賜尚書令數日出為廷尉賜自以代非法家言曰三后成功惟殷于民臯陶不與焉蓋吝之也遂固辭以特進就第二年, WYG: 十}
