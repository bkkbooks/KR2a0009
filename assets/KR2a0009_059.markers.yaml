  - {type: variant, offset: 4350, length: 769, content: 鄭門昭公殆以女敗康王一朝晏起關睢見幾而作夫女謁行則讒夫昌讒夫昌則苞苴通故殷湯以之自戒終濟亢旱之灾惟陛下思乾剛之道別內外之宜崇帝乙之制受元吉之祉抑皇甫之權割豔妻之愛則蛇變可消禎祥立應殷戊宋景其事甚明二年代唐珍為司空以灾異免復拜光祿大夫秩中二千石五年代袁隗為司徒是時朝廷爵授多不以次而帝好微行遊幸外苑賜復上疏曰臣聞天生蒸民不能自理故立君長使司牧之是以唐虞兢兢業業周文日不暇明慎庶官俊乂在職三載考績以觀厥成而今所序用無佗德有形埶者旬日累遷守真之徒歷載不轉勞逸無別善惡同流北山之詩所為訓作又聞數微行出幸苑囿觀鷹犬之埶極槃遊之荒政事日墮大化陵陛下不顧二祖之勤止追慕五宗之美蹤而欲以望太平是由曲表而欲直景卻行而求及前人也宜絕慢之戲念官人之重割用板之恩慎貫魚之次無令醜女有四殆之歎遐邇有憤怨之聲臣受恩偏特忝任師傅不敢自同凡臣括囊避咎謹自手書密上後坐辟黨人免復拜光祿大夫光和元年有虹蜺晝降於嘉德殿前帝惡之引賜及議郎蔡邕等入金商門崇德署使中常待曹節王甫問以祥異禍福所在賜仰天而歎謂節等曰吾每讀張禹傳未嘗不憤恚歎息既不能竭忠盡情極言其要而反留意少子乞還女壻朱游欲得尚方斬馬劒以理之固其宜也吾以微薄之學充先師之末累世見寵無以報國猥當大問死而後已乃書對曰臣聞之經傳或得神以昌或得神以亡國家休明則鑒其德邪辟昏亂則視其禍今殿前之氣應為虹蜺皆妖邪所生不正之象詩人所謂蝃蝀者也於中孚經曰蜺之比無德以色親方今內多嬖倖外任小臣上下並怨諠譁盈路是以灾異屢見前後丁寧今復投蜺可謂孰矣案春秋讖曰天投蜺天下怨海內亂加四百之期亦復垂及昔虹貫牛山管仲諫桓公無近妃宮易曰天垂象見吉凶聖人則之今妾媵嬖人閹尹之徒共專國朝欺罔日月又鴻都門下招會羣小造作賦說以蟲篆小技見寵於時如驩兜共工更相薦說旬月之閒並各拔擢樂松處常伯任芝居納言郄儉梁鵠俱以便辟之性佞辯之心各受豐爵不次之寵而令搢紳之徒委伏畝口誦, WYG: ''}
