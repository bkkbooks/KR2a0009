  - {type: variant, offset: 2362, length: 1, content: 侍, WYG: 謀吾不能忍見子有不容君之危盍去之乎惲曰孟軻以彊其君之所不能為忠量其君之所不能為賊孟子對齊宣王曰力足以舉百釣而不足以舉一羽明足以察秋毫之末而不見輿薪則王許之乎曰否孟子曰今恩足以及禽獸而功不至於百姓者獨何與然則一羽之不舉為不用力焉輿薪之不見為不用明焉百姓之不見保為不用恩焉故王之不王不為也非不能也曰不為者與不能者之形何以異曰挟太山以超北海語人曰我不能是誠不能也為長者折枝語人曰我不能是不為也非不能也此彊其君之所不能為也又曰惻隱之心仁之端也羞惡之心義之端也辭讓之心禮之端也是非之心智之端也人之有是四端也猶其有四體也有是四端自謂不能者自賊者也謂其君不能者賊其君者也惲業已彊之矣障君於朝障蔽也君謂歙也言歙將以牛酒賞繇延而惲障蔽不聽之旣有其直而不死職罪也延退而惲又去不可敬乃獨隱於弋陽山}
