  - {type: variant, offset: 61, length: 1, content: 侯, WYG: 不宜宴安逸豫諫不見聽遂以頭軔乘輿輪帝遂爲止軔謂以頭止車輪也王逸注楚辭曰軔止輪木也時内外羣官多帝自選舉加以法理嚴察職事過苦尚書近臣至乃捶撲牽曵於前羣臣莫敢正言剛每輒極諫又數言皇太子宜時就東宫簡任賢保以成其徳帝並不納以數切諫失㫖數年出爲平隂令復徵拜太中大夫以病去官卒於家鮑永傳子昱鮑永字君長上黨屯留人也屯留今潞州縣也}
