  - {type: variant, offset: 2359, length: 0, content: '', krp: 繇音遙天資忠貞禀性公方摧破姦凶不嚴而理今與衆儒共論延功顯之于朝太守敬嘉厥休牛酒飬德主簿讀書教户曹引延受賜惲於下坐愀然前曰司正舉觥愀變色貌司正主禮儀者觥罸爵也以角為之詩小雅曰兕觥其觩㫖酒思柔觥音古横反以君之罪告謝於天按延資性貪邪外方内員言延外示方直而内實柔弱也孔子曰色厲而内荏朋黨搆姦罔上害人所在荒亂怨慝並作明府以惡為善股肱以直從曲此旣無君又}
  - {type: variant, offset: 2360, length: 1, content: 入, WYG: 無臣惲敢再拜奉觥歙色慙動不知所言門下掾鄭敬進曰君明臣直功曹言切明府德也可無受觥哉歙意少解曰實歙罪也敬奉觥遂受罸也惲乃免冠謝曰昔虞舜輔堯四罪咸服左傳曰舜臣堯乃流四凶族尚書曰舜流共工于幽州放驩兠于崇山竄三苗于三危殛鯀于羽山四罪而天下咸服也䜛言弗庸孔任不行庸用也孔甚也任佞也故能作股肱帝用有歌尚書曰股肱喜哉元首起哉惲不忠孔任是昭昭顯也惲自責不忠故使甚佞之人昭顯也豺虎從政豺虎貪獸以比繇延也旣䧟誹謗又露所言露顯也又對衆顯言繇延之罪也罪莫重焉請收惲延以明好惡歙曰是重吾過也重再也遂不讌而罷惲歸府稱病延亦自退鄭敬素與惲厚見其言忤歙乃相招去曰子廷爭繇延君猶不納延今雖去其埶必還言歙後必召延也直心無諱誠三代之道三代夏殷周也論語曰三代之所以直道而行也然道不同者不相}
