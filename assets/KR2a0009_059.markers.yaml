  - {type: variant, offset: 5185, length: 282, content: 曰天子見怪則修德諸侯見怪則修政卿大夫見怪則修職士庶人見怪則修身惟陛下慎經典之誡圖變復之道斥遠佞巧之臣速徵鶴鳴之士內親張仲外任山甫斷絕尺一抑止槃游留思庶政無敢怠遑冀上天還威衆變可弭老臣過受師傅之任數蒙寵異之恩豈敢愛惜垂沒之年而不盡其慺慺之心哉書奏甚忤曹節等蔡邕坐直對抵罪徙朔方賜以師傅之恩故得免咎其冬行辟雍禮引賜為三老復拜少府光祿勳代劉郃為司徒帝欲造畢圭靈琨苑賜復上疏諫曰竊聞使者並出規度城南人田欲以為苑昔先王造囿裁足以脩三驅之禮薪萊芻牧皆悉往焉先帝之制左開鴻池右作上林不奢不約以合禮中今猥規郊城之地以為苑囿壞沃衍廢田園驅居人畜禽獸殆非所謂若保赤子之義今城外之苑已有, WYG: 卷}
