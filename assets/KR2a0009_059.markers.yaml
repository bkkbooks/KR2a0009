  - {type: variant, offset: 2357, length: 1, content: 崩, krp: 詔言大獄一起寃者過半又諸徙者骨肉離分孤䰟不祀一人呼嗟王政為虧宜一切還諸徙家屬蠲除禁錮興滅繼絶死生獲所如此和氣可致帝納其言東觀記曰時司徒辭訟久者至十數年比例輕重非其事類錯雜難知昱奏定辭訟七卷決事都目八卷以齊同法令息遏人訟也四年代牟融爲太尉六年薨年七十餘子德修志節有名稱累官為南陽太守時歲多荒災唯南陽豐穰吏人愛悅號為神父時郡學久廢德乃修起横舎横學也字又作黌備俎豆黼冕行禮奏樂又尊饗國老宴會諸儒百姓觀者莫不勸服在職九年徵拜大司農卒于官子昻字叔雅有孝義節行初德被病數年昻俯伏左右衣不緩帶及處喪毁瘠三年抱負乃行服闋遂潜于墓次不關時務舉孝㢘辟公府連徵不至卒于家郅惲傳子夀郅惲字君章汝南西平人也潛夫論曰周先姞氏封於燕河東有郅都汝南有郅君章音與古姞同而其字異然前書音義郅音之日反年十二失母居喪過禮及長理韓詩嚴氏春秋韓韓嬰也作詩内外傳嚴嚴彭祖也受公羊於睦孟專門教授見儒林傳明天文厯數王莽時宼賊羣發惲乃仰占𤣥象歎謂友人曰方今鎮嵗熒惑並在漢分翼軫之域爾雅曰中央鎮星東方嵗星南方熒惑翼軫者南方鶉尾之宿楚之分野演孔圖曰卯金刀名為劉中國東南出荊州故爲漢分也去而復來漢必再受命福歸有德如有順天發策者必成大功時左隊大夫逯並素好士王莽以潁川為左隊郡守為大夫逯姓並名也風俗通曰逯秦邑也其大夫氏焉逯音禄惲說之曰當今上天垂象智者以昌愚者以亡昔伊尹自鬻輔商立功全人鬻自衒賣也史記曰伊尹欲干湯而無因乃為有莘氏媵臣負鼎爼以滋味說湯乃任以國政也惲竊不遜敢希伊尹之蹤應天人之變明府儻不疑逆俾成天德並竒之使署為吏惲不謁曰昔文王㧞吕尚於渭濵髙宗禮傅說於巖築桓公取管仲於射鉤故能立𢎞烈就元勲未聞師相仲父而可為吏位也師吕望也相傅説也仲父管仲也非闚天者不可與圖逺君不授驥以重任驥亦俛首裹足而去耳惲以驥自喻因自稱驥史記曰吳兵入郢申包胥走秦求救晝夜馳驅足腫蹠盭裂裳裹足鵠立秦庭盭音戾遂不受署西至長安乃上書王莽曰臣聞天地重其人惜其物故運機衡垂日月機衡北斗也含元包一甄陶品類前書志曰太極元氣含三為一謂三才未分包而為一甄也者陶人旋轉之輪也言天地造化品物如陶匠之成衆品者也劉攽曰注包而為一甄也者案文也字當在甄上顯表紀世圖錄豫設表明也紀年也言天豫設圖錄之書顯明帝王之年代也漢歴久長孔為赤制言孔丘作緯著歴運之期為漢家之制漢火徳尚赤故云為赤制卽春秋感精符云墨孔生為赤制是也不使愚惑殘人亂時智者順以成德愚者逆以取害神器有命不可虚獲上天垂戒欲悟陛下令就臣位轉禍為福上天垂戒謂鎭歲熒惑並在漢分也劉氏享天永命陛下順節盛衰享受也永長也漢家受天長命運祚未絶勸莽當順其時之盛衰衰則取之盛則還也取之以天還之以天可謂知命矣若不早圖是不免於竊位也竊盗也孔子曰臧文仲其竊位者與且堯舜不以天顯自與故禪天下堯舜盛德天之所顯猶不自與以位禪人言堯之禪舜舜禪於禹也陛下何貪非天顯以自累也天為陛下嚴父臣為陛下孝子父敎不敢廢子諌不可拒惟陛下留神莽大怒卽收繫詔獄劾以大逆猶以惲據經䜟難卽害之使黄門近臣脅惲令自告狂病恍惚不覺所言惲乃瞋目詈曰所陳皆天文聖意非狂人所能造遂繫須冬㑹赦得出乃與同郡鄭敬南遁蒼梧遁隱也蒼梧山名也山海經曰南方蒼梧之㐀蒼梧之川其中有九疑山焉舜之所葬也在今永州唐興縣東南建武三年又至廬江因遇積弩將軍傅俊東徇揚州俊素聞惲名乃禮請之上為將兵長史授以軍政惲乃誓衆曰無掩人不備窮人於戹不得斷人支體裸人形骸放淫婦女俊軍士猶發冢陳尸掠奪百姓惲諫俊曰昔文王不忍露白骨解見順紀武王不以天下易一人之命吕氏春秋曰武王伐紂至鮪水紂使膠鬲候周問武王曰何日至武王曰將以甲子日至膠鬲行天大雨日夜不休武王疾行不輟軍吏諫之武王曰吾疾行以救膠鬲之死也故能獲天地之應剋商如林之旅天地之應謂夜雨止畢陳白魚入舟之類剋勝也商殷號也旅衆也如林言衆多尚書曰武王伐紂率其旅若林㑹於牧野劉攽曰注武王伐紂率其旅若林案文伐字下少一殷字將軍如何不師法文王而犯逆天地之禁多傷人害物虐及枯尸取罪神明今不謝天改政無以全命願將軍親率士卒收傷葬死哭所殘暴以明非將軍本意也從之百姓悅服所向皆下七年俊還京師而上論之上音時掌反惲耻以軍功取位遂辭歸鄉里縣令卑身崇禮請以為門下掾惲友人董子張者父先為鄉人所害東觀記曰子張父及叔父為鄉里盛氏一時所害也及子張病將終惲徃候之子張垂殁視惲歔欷不能言惲曰吾知子不悲天命而痛讐不復也子在吾憂而不手子亡吾手而不憂也言子在吾憂子仇未能報而不須手自揮鋒子若亡吾直為子手刃仇人更不須心懐憂也子張但目擊而已目擊謂熟視之也荘子曰目擊而道存也惲即起將客遮仇人取其頭以示子張子張見而氣絶惲因而詣縣以狀自首令應之遲縣令不欲其自首詣獄故應對之緩也惲曰爲友報讐吏之私也奉法不阿君之義也虧君以生非臣節也趨出就獄令跣而追惲不及遂自至獄令㧞刀自向以要惲曰子不從我出敢以死明心惲若不出欲自刺以明心也惲得此乃出因病去久之太守歐陽歙請為功曹汝南舊俗十月享會百里内縣皆齎牛酒到府讌飲時臨享禮訖歙敎曰西部督郵繇延繇姓咎繇之}
