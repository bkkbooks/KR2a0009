  - {type: variant, offset: 3134, length: 714, content: 請下所屬正其罪尚書令周景與尚書邊韶議奏秉儒學侍講常在謙虛著隱居行義以退讓為節俱徵不至誠違側席之望然逶迤退食足抑苟進之風夫明王之世必有不召之臣聖朝弘養宜用優游之禮可告在所屬喻以朝庭恩意如遂不至詳議其罰於是重徵乃到拜太常五年冬代劉矩為太尉是時宦官方熾任人及子弟為官布滿天下競為貪淫朝野嗟怨秉與司空周景上言內外吏職多非其人自頃所徵皆特拜不試致盜竊縱恣怨訟紛錯舊典中臣子弟不得居位秉埶而今枝葉賓客布列職署或年少庸人典據守宰上下忿患四方愁毒可遵用舊章退貪殘塞灾謗請下司隸校尉中二千石二千石城門五營校尉北軍中候各實覈所部應當斥罷自以狀言三府廉察有遺漏續上帝從之於是秉條奏牧守以下匈奴中郎將燕瑗青州刺史羊亮遼東太守孫諠等五十餘人或死或免天下莫不肅然時郡國計吏多留拜為郎秉上言三署見郎七百餘人帑臧空虛浮食者衆而不良守相欲因國為池澆濯釁穢宜絕橫拜以塞覬覦之端自此終桓帝世計吏無復留拜者七年南巡園陵特詔秉從南陽太守張彪與帝微時有舊恩以車駕當至因傍發調多以入私秉聞之下書責讓荊州刺史以狀副言公府及行至南陽左右並通姦利詔書多所除拜秉復上疏諫曰臣聞先王建國順天制官太微積星名為郎位入奉宿衞出牧百姓臯陶誡虞在於官人頃者道路拜除恩加豎隸爵以貨成化由此敗所以俗夫巷議白駒遠逝穆穆清朝遠近莫觀宜割不忍之恩以斷求欲之路於是詔除乃止時中常侍侯覽弟參為益州刺史累有臧罪暴虐一州明年秉劾奏參檻車徵詣廷尉參惶恐道自殺秉因奏覽及中常侍具瑗曰臣案國舊典宦豎之官本在給使省闥司昏守夜而今猥受過寵執政操權其阿諛取容者則因公襃舉以報私惠有忤逆於心者必求事中傷肆其凶忿居法王公富擬國家飲食極肴饍僕妾盈紈素雖季氏專魯穰侯擅秦何以尚茲案中常侍侯覽弟參貪殘元惡自取禍滅覽顧知釁重必有自疑之意, WYG: ''}
