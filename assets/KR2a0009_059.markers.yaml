  - {type: variant, offset: 1946, length: 2, content: 西几, WYG: 臯詔書迎拜爲兗州牧便道之官東觀記詔書迎下永曰君晨夜冒犯霜露精神亦已勞矣以君帷幄近臣其以永為兗州牧也視事三年病卒子昱論曰鮑永守義於故主斯可以事新主矣耻以其衆受寵斯可以受大寵矣若乃言之者雖誠而聞之未譬譬猶曉也豈茍進之悅易以情納持正之忤難以理求乎言謟曲則易入剛直則難進也誠能釋利以循道居方以從義方直也君子之槩也昱字文泉少傳父學客授於東平建武初太行山中有劇賊太守戴渉聞昱鮑永子有智略乃就謁請署守髙都長髙都縣屬上黨郡故城在今澤州也昱應之遂討擊羣賊誅其渠帥道路開通由是知名後爲泚}
