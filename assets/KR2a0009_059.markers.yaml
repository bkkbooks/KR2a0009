  - {type: variant, offset: 60, length: 0, content: '', WYG: 而西州發兵人人懷憂騷動惶懼莫敢正言羣衆疑惑人懐顧望非徒無精銳之心其患無所不至夫物窮則變生事急則計易其埶然也夫離道德逆人情而能有國有家者古今未有也將軍素以忠孝顯聞是以士大夫不逺千里慕樂德義今茍欲決意徼幸此何如哉夫天所祐者順人所助者信易繫辭之言也如未蒙祐助令小人受塗地之禍毁壞終身之徳敗亂君臣之節汚傷父子之恩不從光武是亂君臣之節也遣子恂入質而背之是傷父子之恩也衆賢破膽可不愼哉囂不納剛到拜侍御史遷尚書令光武嘗欲出游剛以隴蜀未}
  - {type: page-break, offset: 60, content: '', id: KR2a0009_WYG_059-6b, image: WYG0252/WYG0252-0704b.png}
