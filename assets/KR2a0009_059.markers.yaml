  - {type: variant, offset: 2364, length: 1, content: 衞, WYG: 弋陽縣屬汝南郡前書云弋陽山在縣西北也居數月歙果復召延惲於是乃去從敬止漁釣自娛留數十日惲志在從政旣乃喟然而歎謂敬曰天生俊士以為人也鳥獸不可與同羣論語孔子之言子從我為伊吕乎將為巢許乎而父老堯舜也若為巢父許由則以堯舜為父老之人也敬曰吾足矣初從生歩重華於南野歩猶尋也重華舜字也南野謂蒼梧也謂來歸為松子赤松子也敬以歸鄉隱逸自謂同之劉向列仙傳曰赤松子神農時雨師至崑崙山常止西王母石室隨風上下炎帝少女追之得仙俱去也今幸得全軀樹類樹類謂有𦙍嗣還奉墳墓盡學問道敬汝南人今隱弋陽不離墳墓雖不從政施之有政是亦為政也論語孔子之言也言隱遁好道在家孝悌亦從政之義也吾年耄矣安得從子子勉正性命弗勞神以害生惲於是告别而去敬字次都清志髙世光武連徵不到謝沈書曰敬閑居不修人倫新遷都}
