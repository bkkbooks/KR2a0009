  - {type: variant, offset: 5873, length: 1590, content: 月復代張溫為司空其月薨天子素服三日不臨朝贈東園梓器襚服賜錢三百萬布五百匹策曰故司空臨晉侯賜華嶽所挺九德純備三葉宰相輔國以忠朕昔初載授道帷幄遂階成勳以陟大猷師範之功昭于內外庶官之務勞亦勤止七在卿校殊位特進五登袞職弭難乂寧雖受茅土未荅厥勳哲人其萎將誰諮度朕甚懼焉禮設殊等物有服章今使左中郎將郭儀持節追位特進贈司空驃騎將軍印綬及葬又使侍御史持節送喪蘭臺令史十人發羽林騎輕車介士前後部鼓吹又勑驃騎將軍官屬司空法駕送至舊塋公卿已下會葬謚文烈侯及小祥又會焉子彪嗣彪字文先少傳家學初舉孝廉州舉茂才辟公府皆不應熹平中以博習舊聞公車徵拜議郎遷侍中京兆尹光和中黃門令王甫使門生於郡界辜榷官財物七千餘萬彪發其姦言之司隸司隸校尉陽球因此奏誅甫天下莫不愜心徵還為侍中五官中郎將遷潁川南陽太守復拜侍中三遷永樂少府太僕衞尉中平六年代董卓為司空其冬代黃琬為司徒明年關東兵起董卓懼欲遷都以違其難乃大會公卿議曰高祖都關中十有一世光武宮洛陽於今亦十世矣案石包讖宜徙都長安以應天人之意百官無敢言者彪曰移都改制天下大事故盤庚五遷殷民胥怨昔關中遭王莽變亂宮室焚蕩民庶塗炭百不一在光武受命更都洛邑今天下無虞百姓樂安明公建立聖主光隆漢祚無故捐宗廟棄園陵恐百姓驚動必有糜沸之亂石包室讖妖邪之書豈可信用卓曰關中肥饒故秦得并吞六國且隴右材木自出致之甚易又杜陵南山下有武帝故瓦陶竈數千所并功營之可使一朝而辨百姓何足與議若有前却我以大兵驅之可令詣滄海彪曰天下動之至易安之甚難惟明公慮焉卓作色曰公欲沮國計邪太尉黃琬曰此國之大事楊公之言得無可思卓不荅司空荀爽見卓意壯恐害彪等因從容言曰相國豈樂此邪山東兵起非一日可禁故當遷以圖之此秦漢之埶也卓意小解爽私謂彪曰諸君堅爭不止禍必有歸故吾不為也議罷卓使司隸校尉宣播以灾異奏免彪等詣闕謝即拜光祿大夫十餘日遷大鴻臚從入關轉少府太常以病免復為京兆尹光祿勳再遷光祿大夫三年秋代淳于嘉為司空以地震免復拜太常興平元年代朱儁為太尉錄尚書事及李傕郭汜之亂彪盡節衞主崎嶇危難之閒幾不免於害語在董卓傳及車駕還洛陽復守尚書令建安元年從東都許時天子新遷大會公卿兗州刺史曹操上殿見彪色不悅恐於此圖之未得讌設託疾如廁因出還營彪以疾罷時袁術僭亂操託彪與術婚姻誣以欲圖廢置奏收下獄劾以大逆將作大匠孔融聞之不及朝服往見操曰楊公四世清德海內所瞻周書父子兄弟罪不相及況以袁氏歸罪楊公易稱積善餘慶徒欺人耳操曰此國家之意融曰假使成王殺邵公周公可得言不知邪今天下纓緌搢紳所以瞻仰明公者以公聰明仁智輔相漢朝舉直厝枉致之雍熙也今橫殺無辜則海內觀聽誰不解體孔融魯國男子明日便當拂衣而去不復朝矣操不得已遂理出彪四年復拜太常十年免十一年諸以恩澤為侯者皆奪封彪見漢祚將終遂稱脚攣不復行積十年後子脩為曹操所殺操見彪問曰公何瘦之甚對曰愧無日磾先見之明猶懷老牛舐犢之愛操為之改容脩字德祖好學有俊才為丞相曹操主簿用事曹氏及操自平漢中欲因討劉備而不得進欲守之又難為功護軍不知進止何依操於是出教唯曰雞肋而已外曹莫能曉脩獨曰夫雞肋食之則無所得𠫓廾之則如可惜公歸計決矣乃令外白稍嚴操於此迴師脩之幾決多有此類脩又嘗出行籌操有問外事乃逆為荅記勑守舍兒若有令出依次通之既而果然如是者三操怪其速使廉之知狀於此忌脩且以袁術之甥慮為後患遂因事殺之脩所著賦頌碑讚詩哀辭表記書凡十五篇及魏文帝受禪欲以彪為太尉先遣使示旨彪辭曰彪備漢三公遭世傾亂不能有所補益耄年被病豈可贊惟新之朝遂固辭乃授光祿大夫賜几杖衣袍因朝會引見令彪著布單衣鹿皮冠杖而入待以賓客之禮年八十四黃初六年卒于家自震至彪四世太尉德業相繼與袁氏俱為東京名族云論曰孔子稱危而不持顛而不扶則將焉用彼相矣誠以負荷之寄不可以虛冒崇高之位憂重責深也延光之閒震為上相抗直方以臨權枉先公道而後身名可謂懷王臣之節識所任之體矣遂累葉載德繼踵宰相信哉積善之家必有餘慶先世韋平方之蔑矣贊曰楊氏載德仍世柱國震畏四知秉去三惑賜亦無諱彪誠匪忒脩雖才子渝我淳則, WYG: 考證}
