  - {type: variant, offset: 2614, length: 261, content: 帝時微行私過幸河南尹梁胤府舍是日大風拔樹晝昏秉因上疏諫曰臣聞瑞由德至灾應事生傳曰禍福無門唯人所召天不言語以灾異譴告是以孔子迅雷風烈必有變動詩云敬天之威不敢驅馳王者至尊出入有常警蹕而行靜室而止自非郊廟之事則鑾旗不駕故詩稱自郊徂宮易曰王假有廟致孝享也諸侯如臣之家春秋尚列其誡況以先王法服而私出槃游降亂尊卑等威無序侍衞守空宮紱璽委女妾設有非常之變任章之謀上負先帝下悔靡及臣奕世受恩得備納言又以薄學充在講勤特蒙哀識見照日月恩重命輕義使士死敢憚摧折略陳其愚帝不納秉以病乞退出為右扶風太尉黃瓊惜其去朝廷上秉勸講帷幄不宜外遷留拜光祿大夫, WYG: 僕射}
