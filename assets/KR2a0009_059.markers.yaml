  - {type: variant, offset: 4078, length: 212, content: 我有三不惑酒色財也八年薨時年七十四賜塋陪陵子賜賜字伯獻少傳家學篤志博聞常退居隱約教授門徒不荅州郡禮命後辟大將軍梁冀府非其好也出除陳倉令因病不行公車徵不至連辭三公之命後以司空高第再遷侍中越騎校尉建寧初靈帝當受學詔太傅三公選通尚書桓君章句宿有重名者三公舉賜乃侍講于華光殿中遷少府光祿勳熹平元年青見御坐帝以問賜賜上封事曰臣聞和氣致祥乖氣致灾休徵則五福應咎徵則六極至夫善不妄來灾不空發王者心有所惟意有所想雖未形顏色而五星以之推移陰陽, WYG: ''}
