  - {type: variant, offset: 2359, length: 0, content: '', WYG: 繇音遙天資忠貞禀性公方摧破姦凶不嚴而理今與衆儒共論延功顯之于朝太守敬嘉厥休牛酒飬德主簿讀書教户曹引延受賜惲於下坐愀然前曰司正舉觥愀變色貌司正主禮儀者觥罸爵也以角為之詩小雅曰兕觥其觩㫖酒思柔觥音古横反以君之罪告謝於天按延資性貪邪外方内員言延外示方直而内實柔弱也孔子曰色厲而内荏朋黨搆姦罔上害人所在荒亂怨慝並作明府以惡為善股肱以直從曲此旣無君又}
