  - {type: variant, offset: 12, length: 0, content: '', WYG: 十九申屠剛傳申屠剛字巨卿扶風茂陵人也七世祖嘉文帝時爲丞相剛質性方直常慕史鰌汲黯之爲人史記曰史鰌字子魚衛大夫也論語孔子曰直哉史魚邦有道如矢邦無道如矢前書汲黯字長孺武帝時為主爵都尉好直諫時人謂之汲直仕郡功曹平帝時王莽専政朝多猜忌遂隔絶帝外家馮衛二族不得交官剛常疾之馮謂馮昭儀平帝祖母也衛謂衛姬平帝母也號中山太后王莽專政馮衛二族皆不得至京師交通仕宦見前書及舉賢良方正因對䇿曰臣聞王事失則神祗怨怒姦邪亂正故隂陽謬錯此天所以譴告王者欲令失道之君曠然覺悟懷邪之臣懼然自刻者也懼驚也音紀住反刻猶責也今朝廷不考功校德而虛納毁譽數下詔書張設重法抑斷誹謗禁割論議罪之重者乃至腰斬傷忠臣之情挫直士之銳殆乖建進善之旌縣敢諫之鼓旌旛也淮南子曰禹縣鐘鼓磬鐸置鞀以待}
  - {type: page-break, offset: 12, content: '', id: KR2a0009_WYG_059-1b, image: WYG0252/WYG0252-0701d.png}
  - {type: page-break, offset: 12, content: '', id: KR2a0009_WYG_059-2a, image: WYG0252/WYG0252-0702a.png}
  - {type: variant, offset: 12, length: 0, content: '', krp: 十九申屠剛傳申屠剛字巨卿扶風茂陵人也七世祖嘉文帝時爲丞相剛質性方直常慕史鰌汲黯之爲人史記曰史鰌字子魚衛大夫也論語孔子曰直哉史魚邦有道如矢邦無道如矢前書汲黯字長孺武帝時為主爵都尉好直諫時人謂之汲直仕郡功曹平帝時王莽専政朝多猜忌遂隔絶帝外家馮衛二族不得交官剛常疾之馮謂馮昭儀平帝祖母也衛謂衛姬平帝母也號中山太后王莽專政馮衛二族皆不得至京師交通仕宦見前書及舉賢良方正因對䇿曰臣聞王事失則神祗怨怒姦邪亂正故隂陽謬錯此天所以譴告王者欲令失道之君曠然覺悟懷邪之臣懼然自刻者也懼驚也音紀住反刻猶責也今朝廷不考功校德而虛納毁譽數下詔書張設重法抑斷誹謗禁割論議罪之重者乃至腰斬傷忠臣之情挫直士之銳殆乖建進善之旌縣敢諫之鼓旌旛也淮南子曰禹縣鐘鼓磬鐸置鞀以待}
  - {type: variant, offset: 13, length: 0, content: '', WYG: 方之士為幡曰教道寡人以道者擊鼓喻以義者擊鐘告以事者振鐸語以憂者擊磬有獄訟者揺鞀帝王紀曰堯置敢諫之鼓闢四門之路明四目之義也孔安國注尚書曰開闢四方之門未開者謂廣致衆賢也明四日謂廣視於四方使下無壅塞也臣聞成王㓜少周公攝政聽言下賢均權布寵無舊無新唯仁是親尚書大傳曰武王入殷周公曰各安其宅各田其田無故無新唯仁之親動順天地舉措不失然近則召公不悅逺則四國流言尚書曰周公為師相成王為左右召公不悅言周公既還政成王宜其自退今復為相故不悅也四國謂管蔡商奄也成王㓜小周公攝政四國流言曰公將不利於孺子劉攽曰注云周公為師相成王為左右案文少召公為保四字夫子母之性天道至親今聖主㓜少始免繦緥免離也平帝即位時年九歲故云始免繦緥前書音義曰繦落也緥被也緥或作褓也卽位以来至親分離外戚杜隔恩不得通且漢家之制雖任英賢猶援姻戚親疏相錯杜塞間隙誠所以安宗廟重社稷也今馮衛無罪久廢不錄或處窮僻不若民庶誠非慈愛忠孝承上之意夫爲人後者自有正義至尊至卑其埶不嫌是以人無賢愚莫不爲怨姦臣賊子以之爲便不諱之變誠難其慮今之保傅非古之周公周公至聖猶尚有累何况事失其𠂻不合天心者哉昔周公先遣伯禽守封於魯以義割恩寵不加後伯禽周公旦之子也周公相成王先封伯禽於魯令就國守封後謂伯禽也周公身既尊寵不令伯禽復加榮貴以自挹損也東觀記曰昔周公豫防禍首先遣伯禽守封於魯離斷至親以義割恩使已尊寵不加其後故配天郊祀三十餘世自伯禽至頃公為楚考烈王所滅凡三}
