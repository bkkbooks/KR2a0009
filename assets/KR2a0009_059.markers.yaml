  - {type: variant, offset: 366, length: 1178, content: 不亦厚乎元初四年徵入為太僕遷太常先是博士選舉多不以實震舉薦明經名士陳留楊倫等顯傳學業諸儒稱之永寧元年代劉愷為司徒明年鄧太后崩內寵始橫安帝乳母王聖因保養之勤緣恩放恣聖子女伯榮出入宮掖傳通姦賂震上疏曰臣聞政以得賢為本理以去穢為務是以唐虞俊乂在官四凶流放天上咸服以致雍熙方今九德未事嬖倖充庭阿母王聖出自賤微得遭千載奉養聖躬雖有推燥居溼之勤前後賞惠過報勞苦而無厭之心不知紀極外交屬託擾亂天下損辱清朝塵點日月書誡牝雞牡鳴詩刺哲婦喪國昔鄭嚴公從母氏之欲恣驕弟之情幾至危國然後加討春秋貶之以為失教夫女子小人近之喜遠之怨實為難養易曰無攸遂在中饋言婦人不得與於政事也宜速出阿母令居外舍斷絕伯榮莫使往來令恩德兩隆上下俱美惟陛下絕婉孌之私割不忍之心留神萬機誡慎拜爵減省獻御損節徵發令野無鶴鳴之歎朝無小明之悔大東不興於今勞止不怨於下擬蹤往古比德哲王豈不休哉奏御帝以示阿母等內倖皆懷忿恚而伯榮驕淫尤甚與故朝陽侯劉護從兄瓌交通瓌遂以為妻得襲護爵位至侍中震深疾之復詣闕上疏曰臣聞高祖與羣臣約非功臣不得封故經制父死子繼兄亡弟及以防篡也伏見詔書封故朝陽侯劉護再從兄瓌襲護爵為侯護同產弟威今猶見在臣聞天子專封封有功諸侯專爵爵有德今瓌無佗功行但以配阿母女一時之閒既位侍中又至封侯不稽舊制不合經義行人諠譁百姓不安陛下宜覽鏡既往順帝之則書奏不省延光二年代劉愷為太尉帝舅大鴻臚耿寶薦中常侍李閏兄於震震不從寶乃自往候震曰李常侍國家所重欲令公辟其兄寶唯傳上意耳震曰如朝廷欲令三府辟召故宜有尚書勑遂拒不許寶大恨而去皇后兄執金吾閻顯亦薦所親厚於震震又不從司空劉授聞之即辟此二人旬日中皆見拔擢由是震益見怨時詔遣使者大為阿母脩第中常侍樊豐及侍中周廣謝惲等更相扇動傾搖朝廷震復上疏曰臣聞古者九年耕必有三年之儲故堯遭洪水人無菜色臣伏念方今灾害發起彌彌滋甚百姓空虛不能自贍重以螟蝗羌虜鈔掠三邊震擾戰鬬之役至今未息兵甲軍糧不能復給大司農帑藏匱乏殆非社稷安寧之時伏見詔書為阿母興起津城門內第舍合兩為一連里竟街雕修繕飾窮極巧伎今盛夏土王而攻山採石其大匠左校別部將作合數十處轉相迫促為費巨億周廣謝惲兄弟與國無肺腑枝葉之屬依倚近倖姦佞之人與樊豐王永等分威共權屬託州郡傾動大臣宰司辟召承望旨意招來海內貪汙之人受其貨賂至有臧錮棄世之徒復得顯用白黑溷淆清濁同源天下讙譁咸曰財貨上流為朝結譏臣聞師言上之所取財盡則怨力盡則叛怨叛之人不可復使故曰百姓不足君誰與足惟陛下度之豐惲等見震連切諫不從無所顧忌遂詐作詔書調發司農錢穀大匠見徒材木各起家舍園池廬觀役費無數震因地震復上疏曰臣蒙恩備台輔不能奉宣政化調和陰陽去年十月四日京師地動臣聞師言地者陰精當安靜承陽而今動搖者陰道盛也其日戊辰三者皆土位在中宮此中臣近官盛於持權用事之象也臣伏惟陛下以邊境未寧躬自菲薄宮殿垣屋傾倚枝柱而已無所興造欲令遠近咸知政化之清流商邑之翼翼也而親近倖臣未崇斷金驕溢踰法多, WYG: 禮}
