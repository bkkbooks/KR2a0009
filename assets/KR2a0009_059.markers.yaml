  - {type: variant, offset: 227, length: 3, content: 鄧騭聞, WYG: 事持節將兵安集河東并州朔部得自置偏裨輒行軍法永至河東因擊青犢大破之更始封爲中陽侯中陽縣屬西河郡今汾州孝義縣也永雖爲將率而車服敝素爲道路所識東觀記曰永好文德雖行將軍常衣皂襜褕路稱鮑尚書兵馬俗本或有為上加不者誤也時赤眉害更始三輔道絶光武卽位遣諫議大夫儲大伯風俗通曰儲姓齊大夫儲子之後也持節徵永詣行在所永疑不從乃收繫大伯東觀記曰封大伯所持節於晉陽傳合壁中遣信人馳至長安也劉攽曰注文傳合案文傳合當作舍遣使馳至長安旣知更始已亾乃發喪出大伯等封上將軍列侯印綬悉罷兵但幅巾與諸將及同心客百餘人詣河内幅巾謂不著冠但幅巾束首也帝見永問曰卿衆所在永離席叩頭曰臣事更始不能令全誠慙以}
