  - {type: variant, offset: 1049, length: 1632, content: 上疏陳事曰臣聞人非天地無以為生天地非人無以為靈是故帝非人不立人非帝不寧夫天之與帝帝之與人猶頭之與足相須而行也伏惟陛下年隆德茂中天稱號襲常存之慶循不易之制目不視鳴條之事耳不聞車之聲天災不有痛於肌膚震食不即損於聖體故蔑三光之謬輕上天之怒伏念高祖之起始自布衣拾暴秦之敝追亡周之鹿合散扶傷克成帝業功既顯矣勤亦至矣流福遺祚至於陛下陛下既不能增明烈考之軌而忽高祖之勤妄假利器委授國柄使羣醜刑隸芟刈小民彫敝諸夏虐流遠近故天降衆異以戒陛下陛下不悟而競令虎豹窟於麑場豺狼乳於春囿斯豈唐咨禹稷益典朕虞議物賦土蒸民之意哉又令今牧守長吏上下交競封豕長蛇蠶食天下貨殖者為窮冤之魂貧餒者作飢寒之鬼高門獲東觀之辜豐室羅妖叛之罪死者悲於窀穸生者戚於朝野是愚臣所為咨嗟長懷歎息者也且秦之將亡正諫者誅諛進者賞嘉言結於忠舌國命出於讒口閻樂於咸陽授趙高以車府權去己而不知威離身而不顧古今一揆成敗同埶願陛下遠覽強秦之傾近察哀平之變得失昭然禍福可見甫以濟夷厲之荒竊見故冀州刺史南陽朱穆前烏桓校尉臣同郡李膺皆履正清平貞高絕俗穆前在冀州奉憲操平摧破姦黨掃清萬里膺歷典牧守正身率下及掌戎馬威揚朔北斯實中興之良佐國家之柱臣也宜還本朝挾輔王室上齊七燿下鎮萬國臣敢吐不時之義於諱言之朝猶冰霜見日必至消滅臣始悲天下之可悲今天下亦悲臣之愚惑也時有上書言人以貨輕錢薄故致貧困宜改鑄大錢事下四府羣僚及太學能言之士陶上議曰聖王承天制物與人行止建功則衆悅其事興戎而師樂其旅是故靈臺有子來之人武旅有鳧藻之士皆舉合時宜動順人道也臣伏讀鑄錢之詔平輕重之議訪覃幽微不遺窮賤是以藿食之人謬延逮及觀象育物敬授民時使男不逋畝女不下機故君臣之道行王路之教通由是言之食者乃有國之所寶生民之至貴也竊見比年已來良苗盡於蝗螟之口杼柚空於公私之求所急朝夕之餐所患靡盬之事豈謂錢貨之厚薄銖兩之輕重哉就使當今沙礫化為南金瓦石變為和玉使百姓渴無所飲飢無所食雖皇羲之純德唐虞之文明猶不能以保蕭牆之內也蓋民可百年無貨不可一朝有飢故食為至急也議者不達農殖之本多言鑄冶之便或欲因緣行詐以賈國利國利將盡取者爭競造鑄之端於是乎生蓋萬人鑄之一人奪之猶不能給況今一人鑄之則萬人奪之乎雖以陰陽為炭萬物為銅役不食之民使不飢之士猶不能足無猒之求也夫欲民殷財阜要在止役禁奪則百姓不勞而足陛下聖德愍海內之憂戚傷天下之艱難欲鑄錢齊貨以救其敝此猶養魚沸鼎之中棲鳥烈火之上水木本魚鳥之所生也用之不時必至燋爛願陛下寬鍥薄之禁後冶鑄之議聽民庶之謠吟問路叟之所憂瞰三光之文耀視山河之分流天下之心國家大事粲然皆見無有遺惑者矣夫飢勞之聲甚於斯歌是以追悟匹婦吟魯之憂始於此乎見白駒之意屏營傍偟不能監寐伏念當今地廣而不得耕民衆而無所食羣小競進秉國之位鷹揚天下鳥烏鈔求飽吞肌及骨並噬無猒誠恐卒有役夫窮匠起於板築之閒投斤攘臂登高遠呼使愁怨之民嚮應雲合八方分崩中夏魚潰雖方尺之錢何能有救其危猶舉函牛之鼎絓纖枯之末詩人所以眷然顧之潸焉出涕者也後陶舉孝廉除順陽長縣多姦猾陶到官宣募吏民有氣力勇猛能以死易生者不拘亡命姦臧於是剽輕劒客之徒過晏等十餘人皆來應募陶責其先過要以後效使各結所厚少年得數百人皆嚴兵待命於是覆案姦軌所發若神以病免吏民思而歌之曰邑然不樂思我劉君何時復來安此下民陶明尚書春秋為之訓詁推三家尚書及古文是正文字七百餘事名曰中文尚書頃之拜侍御史靈帝宿聞其名數引納之時鉅鹿張角偽託大道妖惑小民陶與奉車都尉樂松議郎袁貢連名上疏言之曰聖王以天下耳目為視聽故能無不聞見今張角支黨不可勝計前司徒楊賜奏下詔書切勑州郡護送流民會賜去位不復捕錄唯會赦令而謀不解散四方私言云角等竊入京師覘視朝政鳥聲獸心私共鳴呼州郡忌諱不欲聞之但更相告語莫肯公文宜下明詔重募角等賞以國土有敢回避與之同罪帝殊不悟方詔陶次第春秋條例明年張角反亂海內鼎沸帝思陶言封中陵鄉侯三遷尚書令以所舉將為尚書難與齊列乞從散拜侍中以數切諫為權臣所憚徙為京兆尹到職當出脩宮錢直千萬陶既清貧而恥以錢買職稱疾不聽政帝宿重陶才原其罪徵拜諫議大夫是時天下日危寇賊方熾陶憂致崩亂復, WYG: ''}
