  - {type: variant, offset: 5382, length: 2, content: 隸校, WYG: 馬興叩頭流涕固讓曰臣不敢惜身誠虧捐聖德不可茍冒至誠發中感動左右帝遂聽之二十三年卒時年三十九興素與從兄嵩不相能然敬其威重興疾病帝親臨問以政事及羣臣能不興頓首曰臣愚不足以知之然伏見議郎席廣謁者陰嵩並經行明深踰於公卿興沒後帝思其言遂擢廣為光禄勲嵩為中郎將監羽林十餘年以謹勅見幸顯宗即位拜長樂衞}
