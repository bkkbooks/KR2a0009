  - {type: variant, offset: 5381, length: 0, content: '', WYG: 卒贈以本官印綬諡曰貞侯子躬嗣躬卒子璜嗣永初七年為奴所殺無子國絶永寜元年鄧太后以璜弟淑紹封淑卒子鮪嗣躬弟子綱女為和帝皇后封綱吳房侯位特進三子軼輔敞皆黄門侍郎后坐巫蠱事廢綱自殺輔下獄死軼敞徙日南識弟興興字君陵光烈皇后母弟也為人有膂力建武二年為黄門侍郎守期門僕射典將武騎從征伐平定郡國興每從出入常操持小盖障翳風雨躬履塗泥率先期門光武所幸之處輒先入清宫甚見親信雖好施接賔然門無俠客與同郡張宗上谷鮮于裒不相好知其有用猶稱所長而逹之友人張氾杜禽與興厚善以為華而少實但私之以財終不為言是以世稱其忠平第宅茍完裁蔽風雨九年遷侍中賜爵關内侯帝後召興欲封之置印綬於前興固讓曰臣未有先登䧟陣之功而一家數人並蒙爵土令天下觖望誠為盈溢觖音羌志反前書音義曰觖猶兾也一音决猶望之也臣蒙陛下貴人恩澤至厚富貴已極不可復加至誠不願帝嘉興之讓不奪其志貴人問其故興曰貴人不讀書記邪亢龍有悔易乾卦上九爻曰亢龍有悔窮之災也亢極也龍以喻君言居上體之極則有悔吝之災也夫外戚家苦不知謙退嫁女欲配侯王取婦眄睨公主愚心實不安也富貴有極人當知足夸奢益為觀聽所譏貴人感其言深自降挹卒不為宗親求位十九年拜衛尉亦輔導皇太子明年夏帝風眩疾甚後以興領侍中受顧命於雲臺廣室尚書曰成王將崩命召公作顧命孔安國注云臨終之命曰顧命洛陽南宫有雲臺廣德殿㑹疾瘳召見興欲以代呉漢為大}
