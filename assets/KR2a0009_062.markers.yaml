  - {type: variant, offset: 42, length: 8, content: 入太學號奇童京師, WYG: 年封弟丹為射陽侯在射水之陽水經注曰泚水西南流射水注之水出射城北建武十三年封樊重少子丹為射陽侯即其國也按臨淮郡别有射陽縣疑逺非此地也兄子尋𤣥鄉侯族兄忠更父侯十五年定封宏夀張侯十八年帝南祠章陵過湖陽祠重墓追爵諡為夀張敬侯立廟於湖陽車駕每南廵常幸其墓賞賜大㑹宏為人謙柔畏愼不求茍進常戒其子曰富貴盈溢未有能終者吾非不喜榮埶也天道惡滿而好謙前世}
