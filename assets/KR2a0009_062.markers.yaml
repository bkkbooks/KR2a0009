  - {type: variant, offset: 67, length: 0, content: '', WYG: 病困車駕臨視留宿問其所欲言宏頓首自陳無功享食大國誠恐子孫不能保全厚恩令臣魂神慙負黄泉願還夀張食小鄉亭帝悲傷其言而竟不許二十七年卒遺勅薄𦵏一無所用以為棺柩一臧不宜復見如有腐敗傷孝子之心使與夫人同墳異臧帝善其令以書示百官因曰今不順夀張侯意無以彰其德且吾萬歲之}
  - {type: page-break, offset: 67, content: '', id: KR2a0009_WYG_062-4a, image: WYG0252/WYG0252-0749a.png}
  - {type: variant, offset: 67, length: 0, content: '', krp: 病困車駕臨視留宿問其所欲言宏頓首自陳無功享食大國誠恐子孫不能保全厚恩令臣魂神慙負黄泉願還夀張食小鄉亭帝悲傷其言而竟不許二十七年卒遺勅薄𦵏一無所用以為棺柩一臧不宜復見如有腐敗傷孝子之心使與夫人同墳異臧帝善其令以書示百官因曰今不順夀張侯意無以彰其德且吾萬歲之}
  - {type: variant, offset: 68, length: 1, content: 捕, WYG: 欲以為式賻錢千萬布萬匹諡曰恭侯贈以印綬車駕親送𦵏子儵嗣帝悼宏不已復封少子茂為平望侯平望縣屬北海郡故城在今青州北海縣西北俗名平望䑓也樊氏侯者凡五國明年賜儵弟鮪及從昆弟七人合錢五千萬論曰昔楚頃襄王問陽陵君曰君子之富何如對曰假人不德不責食人不使不役親戚愛之衆人善之假貸人者不自以為德不責其報也食善人者不使役之故衆人稱善也說苑曰楚王問荘辛之言也劉攽曰注食善人者不使役之}
  - {type: page-break, offset: 68, content: '', id: KR2a0009_WYG_062-4b, image: WYG0252/WYG0252-0749b.png}
  - {type: variant, offset: 68, length: 1, content: 捕, krp: 欲以為式賻錢千萬布萬匹諡曰恭侯贈以印綬車駕親送𦵏子儵嗣帝悼宏不已復封少子茂為平望侯平望縣屬北海郡故城在今青州北海縣西北俗名平望䑓也樊氏侯者凡五國明年賜儵弟鮪及從昆弟七人合錢五千萬論曰昔楚頃襄王問陽陵君曰君子之富何如對曰假人不德不責食人不使不役親戚愛之衆人善之假貸人者不自以為德不責其報也食善人者不使役之故衆人稱善也說苑曰楚王問荘辛之言也劉攽曰注食善人者不使役之}
  - {type: variant, offset: 70, length: 0, content: '', WYG: 食人而已何故輒擇善人明此是養字或云當云善食人者若乃樊重之折契止訟其庶幾君子之富乎分地以用天道實廪以崇禮節管子曰倉廩實而知禮節取諸理化則亦可以施於政也與夫愛而畏者何殊間哉左傳曰是以其人畏而愛之何殊間哉言不異也間音古莧反儵字長魚劉攽曰樊儵字長魚按儵非魚類與名不合疑本是鯈字鯈即魚名可為字也又按儵弟名鮪知作鯈無疑謹約有父風事後母至孝及母卒哀思過禮毁病不自支世祖常遣中黄門朝暮送饘粥饘縻也服闋就侍中丁㳟受公羊嚴氏春秋嚴彭祖也建武中禁網尚闊諸王既長各招引賓客以儵外戚爭遣致之而儵清靜自保無所結交及沛王輔事發}
  - {type: page-break, offset: 70, content: '', id: KR2a0009_WYG_062-5a, image: WYG0252/WYG0252-0749c.png}
