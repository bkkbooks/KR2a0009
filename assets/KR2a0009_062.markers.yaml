  - {type: variant, offset: 4762, length: 550, content: 侍中八年中常侍具瑗左悺等有罪免奪封邑因黜勳等爵瑜誅後宦官悉焚其上書以為訛言子琬傳瑜學明占候能著災異舉方正不行謝弼字輔宣東郡武陽人也中直方正為鄉邑所宗師建寧二年詔舉有道之士弼與東海陳敦玄菟公孫度俱對策皆除郎中時青蛇見前殿大風拔木詔公卿以下陳得失弼上封事曰臣聞和氣應於有德妖異生乎失政上天告譴則王者思其愆政道或虧則姦臣當其罰夫蛇者陰氣所生鱗者甲兵之符也鴻範傳曰厥極弱時則有蛇龍之孼又熒惑守亢裴回不去法有近臣謀亂發於左右不知陛下所與從容帷幄之內親信者為誰宜急斥黜以消天戒臣又聞惟虺惟蛇女子之祥伏惟皇太后定策宮闥援立聖明書云父子兄弟罪不相及竇氏之誅豈宜咎延太后幽隔空宮愁感天心如有霧露之疾陛下當何面目以見天下昔周襄王不能敬事其母戎狄遂至交侵孝和皇帝不絕竇后之恩前世以為美談禮為人後者為之子今以桓帝為父豈得不以太后為母哉援神契曰天子行孝四夷和平方今邊境日蹙兵革蜂起自非孝道何以濟之願陛下仰慕有虞蒸蒸之化俯思凱風慰母之念母寵私乃享大封大風雨雹亦由於茲又故太傅陳蕃輔相陛下勤身王室夙夜匪懈而見陷羣邪一旦誅滅其為酷濫駭動天下而門生故吏並離徙錮蕃身已往人百何贖宜還其家屬解除禁網夫台宰重器國命所繼今之四公唯司空劉寵斷斷守善餘皆素餐致寇之人必有折足覆餗之凶可因災異並加罷黜徵故司空王暢長樂少府李膺並居政事庶災變可消國祚惟, WYG: 執金吾位特進}
