  - {type: variant, offset: 38, length: 1, content: 節, WYG: 行王莽末義兵起劉伯升與族兄賜俱將兵攻湖陽城守不下賜女弟為宏妻湖陽由是收繫宏妻子令出辟伯升宏因留不反湖陽軍帥欲殺其妻子長吏以下共相謂曰樊重子父禮義恩德行於鄉里雖有罪且當有後㑹漢兵日盛湖陽惶急未敢殺之遂得免脫更始立欲以宏為將宏叩頭辭曰書生不習兵事竟得免歸與宗家親屬作營壍自守老弱歸之者千餘家時赤眉賊掠唐子鄉多所踐殺欲前攻宏營宏遣人持牛酒米穀勞遺赤眉赤眉長老先聞宏仁厚皆稱曰樊君素善且今見待如此何心攻之引兵而去遂免宼難世祖即位拜光禄大夫位特進次三公建武五}
  - {type: page-break, offset: 38, content: '', id: KR2a0009_WYG_062-2b, image: WYG0252/WYG0252-0748b.png}
