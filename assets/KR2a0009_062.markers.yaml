  - {type: variant, offset: 52, length: 1, content: 慕, WYG: 皆明戒也易曰天道虧盈而益謙人道惡盈而好謙也保身全已豈不樂哉每當朝㑹輒迎期先到俯伏待事時至乃起帝聞之常勅騶騎臨朝乃告勿令豫到宏所上便宜及言得失輒手自書寫毁削草本公朝訪逮不敢衆對宗族染}
