  - {type: variant, offset: 350, length: 1, content: 順, WYG: 且爾一子柰何棄之於楚乎鮪不從十年儵卒賵贈甚厚諡曰哀侯帝遣小黄門張音問所遺言先是河南縣亡失官錢典負者典謂主典負謂欠負坐死及罪徙者甚衆遂委責於人以償其耗鄉部吏司因此為姦儵常疾之又野王歲獻甘醪膏餳醪醇酒汁滓相將也每輒擾人吏以為利儵並欲奏罷之疾病未及得上音歸具以聞帝覽之而悲歎勅二郡並令從之長子氾嗣以次子郴梵為郎其後楚事發覺帝追念儵謹恪又聞其止鮪婚事故其諸子得不坐焉梵字文髙為郎二十餘年三署服其重愼三署解見和帝紀悉推財物二千餘萬與孤兄子官至大鴻臚氾卒子時嗣時卒子建嗣建卒無子國絶永寜元年鄧太后復封建弟盼盼卒子尚嗣初儵刪定公羊嚴氏春秋章句世號樊侯學教授門徒前後三千餘人弟子潁川李脩九江夏勤皆為三公勤字伯宗為京宛二縣令零陵太守所在有理能稱安}
