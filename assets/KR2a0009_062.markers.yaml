  - {type: variant, offset: 5391, length: 2, content: 求報, WYG: 即墓賜䇿追諡興曰翼侯琴卒子萬全嗣萬全卒子桂嗣興弟就嗣父封宣恩侯後改封為新陽侯新陽縣屬汝南郡故城在今豫州眞陽縣西南就善談論朝臣莫及然性剛慠不得衆譽顯宗即位以就為少府位特進就子豐尚酈邑公主光武女也公主嬌妒豐亦狷急狷疾也音絹永平二年遂殺主被誅父母當坐皆自殺國除帝以舅氏故不極}
