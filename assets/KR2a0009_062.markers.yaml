  - {type: variant, offset: 5401, length: 0, content: '', WYG: 祀謂為相君宣帝時陰子方者至孝有仁恩臘日晨炊而竈神形見雜五行書曰竈神名禪字子郭衣黄衣夜被髪從竈中出知其名呼之可除凶惡宜市猪肝泥竈令婦孝子方再拜受慶家有黄羊因以祀之自是已後暴至巨富田有七百餘頃輿馬僕𨽻比於邦君子方常言我子孫必將彊大至識三世而遂繁昌故後常以臘日祀竈而祀黄羊焉}
