  - {type: variant, offset: 3670, length: 234, content: 中常侍管霸與御史廷尉雜考之時弘農五官掾杜衆傷雲以忠諫獲罪上書願與雲同日死帝愈怒遂并下廷尉大鴻臚陳蕃上疏救雲曰李雲所言雖不識禁忌干上逆旨其意歸於忠國而已昔高祖忍周昌不諱之諫成帝赦朱雲領之誅今日殺雲臣恐剖心之譏復議於世矣故敢觸龍鱗冒昧以請太常楊秉洛陽市長沐茂郎中上官資並上疏請雲帝恚甚有司奏以為大不敬詔切責蕃秉免歸田里茂資貶秩二等時帝在濯龍池管霸奏雲等事霸跪詭言曰李雲野澤愚儒杜衆郡中小吏出於狂戇不足加罪帝謂霸曰帝欲不諦是何等語而常侍欲原之邪顧使小黃門可其奏雲衆皆死獄中後, WYG: ''}
