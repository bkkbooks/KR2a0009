  - {type: variant, offset: 4346, length: 264, content: 相驚懼孰不悉然無緣空生此謗鄒衍匹夫嵵氏匹婦尚有城崩霜隕之異況乃羣輩咨怨能無感乎嚴刑威以法正法民無罪而覆入之民有田而覆奪之州郡官府各自考事姦情賕賂皆為吏餌民悉鬱結起入賊黨官輒興兵誅討其罪貧困之民或有賣其首級以要酬賞父兄相代殘身妻孥相見視分裂窮之如彼伐之如此豈不痛哉灼道路因此暴縱無所不容今三公在位皆博達道蓺而各正諸己莫或匡益者非不智也畏死罰也惟陛下設置七臣以廣諫道及開東序金縢史官之書從堯舜禹湯文武致興之道遠佞邪之人放鄭衞之聲則政致和平德感祥風矣臣悾悾推情言不足採懼以觸忤征營慴悸及帝崩大將軍竇武欲大誅宦官乃引瑜為侍中又以侍中尹勳, WYG: ''}
