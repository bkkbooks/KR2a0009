  - {type: variant, offset: 5385, length: 5, content: 趙謙訟弼忠, WYG: 遷執金吾永平元年詔曰故侍中衞尉關内侯興典領禁兵從平天下當以軍功顯受封爵又諸舅比例應蒙恩澤興固讓安乎里巷輔導朕躬有周昌之直前書曰周昌沛人也為御史大夫為人强力敢直言極諫也在家仁孝有曾閔之行不幸早卒朕甚傷之賢者子孫宜加優異其以汝南之鮦陽封興子慶為鮦陽侯鮦陽故城在今豫州新蔡縣北在鮦水之陽也音紂慶弟博為㶏強侯㶏强縣屬汝南郡在㶏水之北博弟員丹並為郎慶推田宅財物悉與員丹帝以慶義讓擢為黄門侍郎慶卒子琴嗣建初五年興夫人卒肅宗使五官中郎將持}
