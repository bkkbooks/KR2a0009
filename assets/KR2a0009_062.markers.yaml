  - {type: punctuation, offset: 2684, content: 「, id: KR2a0009_ZHSJ_062-bkkpn588}
  - {type: variant, offset: 2686, length: 0, content: '', WYG: 賈誼有言人君不可以不學故雖大舜聖德孳孳為善孟子曰雞鳴而起孳孳為善者舜之徒也成王賢主崇明師傅尚書曰召公為保周公為師相成王為左右也及光武皇帝受命中興羣雄崩擾旌旗亂野東西誅戰不遑啟處然猶投戈講蓺息馬論道至孝明皇帝兼天地之姿用日月之明庶政萬幾無不簡心而垂情古典游意經蓺每饗射禮畢正坐自講諸儒並聽四方欣欣雖闕里之化矍相之事誠不足言孔子闕里人也禮記云孔子射於矍相之圃盖觀者如堵墻也又多徵名儒以充禮官如沛國趙孝琅邪承宫等或安車結駟告歸鄉里安車坐乗之車也告歸謂休假歸也或豐衣博帶從見宗廟其餘以經術見優者布在廊廟故朝多皤皤之良華首之老皤皤白首貌也音歩河反書曰皤皤良士華首謂白首也每讌㑹則論難衎衎共求政化衎衎和樂貌也詳覽羣言響如振玉孟子曰金聲而玉振之也朝者進而思政罷者退而備問小大随化雍雍可嘉期門羽林介胄之士悉通孝經博士議郎一人開門徒衆百數開門謂開一家之說化自聖躬流及蠻荒匈奴遣伊秩訾王大車且渠來入就學八方肅清上下無事是以議者每稱盛時咸言永平今學者盖少劉攽曰案文盖當作益逺方尤甚博士倚席不講儒者競論浮麗忘謇謇之忠習諓諓之辭諓諓謟言也音踐前書曰昔秦穆公說諓諓之言也文吏則去法律而學詆欺詆亦欺也銳錐刀之鋒斷刑辟之重德陋俗薄以致苛刻左傳曰鄭人鑄刑書叔向使貽子産書曰今子相鄭立謗政鑄刑書人知爭端矣将棄禮而徵於書錐刀之末将盡爭之鄭其敗乎杜預注云錐刀喻小事也昔孝文竇后性好黄老而清靜之化流景武之間臣愚以為宜下明詔博求幽隠發揚巖穴寵進儒雅有如孝宫者徵詣公車以俟聖上講習之期公卿各舉明經及舊儒子孫進其爵位使纘其業復詔郡國書佐使讀律令如此則延頸者日有所見傾耳者月有所聞伏願陛下推述先帝進業之道周易曰君子進德修業太后深納其言是後屢舉方正敦樸仁賢之士凖再遷御史中丞永平之初連年水旱災異郡國多被飢困凖上疏曰臣聞傳曰飢而不損兹曰太厥災水洪範五行傳之文也言下人飢饉君上不能損減謂之為太太猶甚也春秋穀梁傳曰五穀不登謂之大侵大侵之禮百官備而不製官職備列不造作也羣神禱而不祠禱請而已無祭祀也由是言之調和陰陽實在儉節朝廷雖勞心元元事從省約而在職之吏尚未奉承夫建化致理由近及逺故詩曰京師翼翼四方是則韓詩之文也翼翼然盛也今可先令太官尚方考功劉攽曰案功當作工考工官名見前書上林池籞諸官實減無}
