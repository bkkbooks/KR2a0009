  - {type: variant, offset: 3376, length: 293, content: 將軍梁冀而中常侍單超等五人皆以誅冀功並封列侯專權選舉又立掖庭民女亳氏為皇后數月閒后家封者四人賞賜巨萬是時地數震裂衆災頻降雲素剛憂國將危心不能忍乃露布上書移副三府曰臣聞皇后天下母德配坤靈得其人則五氏來備不得其人則地動搖宮比年災異可謂多矣皇天之戒可謂至矣高祖受命至今三百六十四歲君期一周當有黃精代見姓陳項虞田許氏不可令此人居太尉太傅典兵之官舉厝至重不可不慎班功行賞宜應其實梁冀雖持權專虐流天下今以罪行誅猶召家臣搤殺之耳而猥封謀臣萬戶以上高祖聞之得無見非西北列將得無解體孔子曰帝者諦也今官位錯亂小人諂進財貨公行政化日損尺一拜用不經御省是帝欲不諦乎帝得奏震怒下有司逮雲詔尚書都護劒戟送黃門北寺獄, WYG: 夫凖}
