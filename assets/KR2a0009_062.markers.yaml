  - {type: variant, offset: 2718, length: 86, content: 每聞羽書告急之聲心灼內熱四體驚竦今西羌逆類私署將帥皆多段熲時吏曉習戰陳識知山川變詐萬端臣常懼其輕出河東馮翊鈔西軍之後東之函谷據高望今果已攻河東恐遂轉更豕突上京如是則南道斷絕, WYG: 害遣}
