  - {type: variant, offset: 33, length: 2, content: 伯夷, WYG: 君雲世善農稼好貨殖重性温厚有法度三世共財子孫朝夕禮敬常若公家其營理産業物無所棄課役童𨽻各得其宜故能上下戮力財利歲倍至乃開廣田土三百餘頃其所起廬舍皆有重堂髙閤陂渠灌注酈元水經注曰湖水支分東北為樊氏陂東西十里南北五里亦謂之凡亭陂東樊氏故宅樊氏既滅庾氏取其陂故諺曰陂汪汪下田良樊氏失業庾氏昌其陂至今猶名為樊陂在今鄧州新野縣之西南也又池魚牧畜有求必給嘗欲作器物先種梓漆時人嗤之然積以歲月皆得其用向之笑者咸求假焉貲至巨萬而賑贍宗族恩加鄉閭外孫何氏兄弟爭財重恥之以田二頃解其忿訟縣中稱美推為三老年八十餘終其素所假貸人間數百萬遺令焚削文契責家聞者皆慙爭往償之責音側界反諸子從勅竟不肯受宏}
  - {type: page-break, offset: 33, content: '', id: KR2a0009_WYG_062-1b, image: WYG0252/WYG0252-0747d.png}
  - {type: page-break, offset: 33, content: '', id: KR2a0009_WYG_062-2a, image: WYG0252/WYG0252-0748a.png}
