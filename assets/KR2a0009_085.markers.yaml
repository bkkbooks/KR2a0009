  - {type: variant, offset: 4962, length: 217, content: 誹書言直不肯急捕月餘主名不立猛坐左轉諫議大夫以御史中丞段熲代猛乃四出逐捕及太學游生繫者千餘人節等怨猛不已使熲以它事奏猛抵罪輸左校朝臣多以為言乃免刑復公車徵之節遂與王甫等誣奏桓帝弟勃海王悝謀反誅之以功封者十二人甫封冠軍侯節亦增邑四千六百戶并前七千六百戶父兄子弟皆為公卿列校牧守令長布滿天下節弟破石為越騎校尉越騎營五百妻有美色破石從求之五百不敢違妻執意不肯行遂自殺其淫暴無道多此類也光和二年司隸校尉陽球奏誅王甫及子長樂少府萌沛相吉皆死獄中, WYG: 嵗}
