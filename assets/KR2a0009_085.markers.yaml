  - {type: variant, offset: 961, length: 1, content: 竊, krp: 為清河中大夫續漢書曰中大夫秩六百石無員掌奉王使至京師慶到國下令寡人生於深宫長於朝廷魯哀公與孔子言曰寡人生于深宫之中長於婦人之手事見孫卿子也劉攽曰正文到國下令寡人案文少一曰字仰恃明主垂拱受成垂拱言無為也尚書曰垂拱仰成既以薄祜早離顧復屬遭大憂屬近也悲懷感傷䝉恩大國職惟藩輔新去京師憂心焭焭夙夜屏營未知所立焭焭孤特也屏營仿偟也蓋聞智不獨理必湏明賢今官屬並居爵任失得是均庶望上遵策戒下免悔咎其紏督非枉明察典禁無令孤獲怠慢之罪焉鄧太后以殤帝襁抱逺慮不虞襁以繒帛為之即今之小兒繃也繃音必衡反留慶長子祐與嫡母耿姬居清河邸至秋帝崩立祐為嗣是為安帝太后使中黄門送耿姬歸國帝所生母左姬字小娥小娥姊字大娥犍為人初伯父聖坐妖言伏誅家屬没官二娥數嵗入掖庭及長並有才色小娥善史書喜辭賦和帝賜諸王宫人因入清河第慶初聞其美賞傅母以求之及後幸愛極盛姬妾莫比姊妹皆卒葬於京師慶立凡二十五年乃歸國其年病篤謂宋衍等曰清河埤薄埤音婢欲乞骸骨於貴人冡傍下棺而已朝廷大恩猶當應有祠室庶母子并食魂靈有所依庇死復何恨乃上書太后曰臣國土下溼願乞骸骨下從貴人於樊濯雖没且不朽矣及今口目尚能言視冒昧干請命在呼吸願䝉哀憐遂薨年二十九遣司空持節與宗正奉弔祭又使長樂謁者僕射中謁者二人副䕶喪事賜龍旂九旒虎賁百人儀比東海恭王旂有九旒天子制也恭王彊葬贈以殊禮升龍旄頭鸞輅龍旂虎賁百人太后使掖庭丞送左姬喪與王合葬廣丘子愍王虎}
  - {type: variant, offset: 963, length: 86, content: 權朝臣上下莫不附之而衆獨一心王室不事豪黨帝親信焉及憲兄弟圖作不軌衆遂首謀誅之以功遷大長秋策勳班賞每辭多受少由是常與議事中官用權自衆始焉十四年帝念衆功美封為鄛鄉侯食邑千五百戶, WYG: 嗣}
