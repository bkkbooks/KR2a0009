  - {type: variant, offset: 2910, length: 1172, content: 安帝時除黃門從官順帝在東宮鄧太后以騰年少謹厚使侍皇太子書特見親愛及帝即位騰為小黃門遷中常侍桓帝得立騰與長樂太僕州輔等七人以定策功皆封亭侯騰為費亭侯遷大長秋加位特進騰用事省闥三十餘年奉事四帝未嘗有過其所進達皆海內名人陳留虞放邊韶南陽延固張溫弘農張奐潁川堂谿典等時蜀郡太守因計吏賂遺於騰益州刺史种暠於斜谷關搜得其書上奏太守并以劾騰請下廷尉案罪帝曰書自外來非騰之過遂寢暠奏騰不為纖介常稱暠為能吏時人嗟美之騰卒養子嵩嗣种暠後為司徒告賓客曰今身為公乃曹常侍力焉嵩靈帝時貨賂中官及輸西園錢一億萬故位至太尉及子操起兵不肯相隨乃與少子疾避亂琅邪為徐州刺史陶謙所殺單超河南人徐璜下邳良城人具瑗魏郡元城人左悺河南平陰人唐衡潁川郾人也桓帝初超璜瑗為中常侍悺衡為小黃門史初梁冀兩妹為順桓二帝皇后冀代父商為大將軍再世權戚威振天下冀自誅太尉李固杜喬等驕橫益甚皇后乘埶忌恣多所鴆毒上下鉗口莫有言者帝逼畏久恆懷不平恐言泄不敢謀之延熹二年皇后崩帝因如廁獨呼衡問左右與外舍不相得者皆誰乎衡對曰單超左悺前詣河南尹不疑禮敬小簡不疑收其兄弟送洛陽獄二人詣門謝乃得解徐璜具瑗常私忿疾外舍放橫口不敢道於是帝呼超悺入室謂曰梁將軍兄弟專固國朝迫脅外內公卿以下從其風旨今欲誅之於常侍意何如超等對曰誠國姦賊當誅日久臣等弱劣未知聖意何如耳帝曰審然者常侍密圖之對曰圖之不難但恐陛下復中狐疑帝曰姦臣脅國當伏其罪何疑乎於是更召璜瑗等五人遂定其議帝齧超臂出血為盟於是詔收冀及宗親黨與悉誅之悺衡遷中常侍封超新豐侯二萬戶璜武原侯瑗東武陽侯各萬五千戶賜錢各千五百萬悺上蔡侯衡汝陽侯各萬三千戶賜錢各千三百萬五人同日封故世謂之五侯又封小黃門劉普趙忠等八人為鄉侯自是權歸宦官朝廷日亂矣超病帝遣使者就拜車騎將軍明年薨賜東園祕器棺中玉具贈侯將軍印綬使者理喪及葬發五營騎士將軍侍御史護喪將作大匠起冢塋其後四侯轉橫天下為之語曰左回天具獨坐徐臥虎唐兩墯皆競起第宅樓觀壯麗窮極伎巧金銀罽毦施於犬馬多取良人美女以為姬妾皆珍飾華侈擬則宮人其僕從皆乘牛車而從列騎又養其疏屬或乞嗣異姓或買蒼頭為子並以傳國襲封兄弟姻戚皆宰州臨郡辜較百姓與盜賊無異超弟安為河東太守弟子匡為濟陰太守璜弟盛為河內太守悺弟敏為陳留太守瑗兄恭為沛相皆為所在蠹害璜兄子宣為下邳令暴虐尤甚先是求故汝南太守下邳李暠女不能得及到縣遂將吏卒至暠家載其女歸戲射殺之埋著寺內時下邳縣屬東海汝南黃浮為東海相有告言宣者浮乃收宣家屬無少長悉考之掾史以下固諫爭浮曰徐宣國賊今日殺之明日坐死足以瞑目矣即案宣罪棄市暴其尸以示百姓郡中震慄璜於是訴怨於帝帝大怒浮坐髡鉗輸作右校五侯宗族賓客虐徧天下民不堪命起為寇賊七年衡卒亦贈車騎將軍如超故事璜卒賻贈錢布賜冢塋地明年司隸校尉韓演因奏悺罪惡及其兄太僕南鄉侯稱請託州郡聚斂為姦賓客放縱侵犯吏民悺稱皆自殺演又奏瑗兄沛相恭臧罪徵詣廷尉瑗詣獄謝上還東武侯印綬詔, WYG: ''}
