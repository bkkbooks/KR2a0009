  - {type: variant, offset: 177, length: 6, content: 官然亦引用士, WYG: 王甫求復國許謝錢五千萬帝臨崩遺詔復為勃海王悝知非甫功不肯還謝錢甫怒隂求其過初迎立靈帝道路流言悝恨不得立欲鈔徵書而中常侍鄭颯音立中黄門董騰並任侠通剽輕數與悝交通剽疾也王甫伺察以為有姦密告司𨽻校尉叚熲熹平元年遂收颯送北寺獄北寺獄名屬黄門署前書音義曰即若盧獄也使尚書令亷忠誣奏颯等謀迎立悝大逆不道遂詔冀州刺史收悝考實又遣大鴻臚持節與宗正廷尉之勃海迫責悝悝自殺妃妾十一}
