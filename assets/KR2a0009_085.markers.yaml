  - {type: variant, offset: 1291, length: 0, content: '', WYG: 立戰鄉侯安國為濟北王是為釐王釐音僖也安國立十年薨子孝王次嗣本初元年封次弟猛為亭侯次九嵗喪父至孝建和元年梁太后下詔曰濟北王次以㓜年守藩躬履孝道父没哀慟焦毁過禮草廬土席衰杖在身頭不枇沐體生瘡腫諒闇已来二十八月自諸國有憂未之聞也朝廷甚嘉焉書不云乎用德章厥善尚書盤庚之辭也言以道德明之使競為善也詩云孝子不匱永錫爾類詩大雅也匱竭也類善也永長也孝子之行無有匱竭長賜與汝之族類教道天下今増次封五千户廣其土宇以慰孝子惻隠之勞次立七年薨子鸞嗣鸞薨子政嗣政薨無子建安十一年國除河間孝王開傳河間孝王開以永元二年封分樂成勃海涿郡為國延平元年就國奉遵法度吏人敬之永寧元年鄧太后封開子翼為平原王奉懷王勝祀勝和帝子子德為安平王奉樂成王黨祀黨明帝子也開立四十二年薨子惠王政嗣政慠狠不奉法憲順}
  - {type: page-break, offset: 1291, content: '', id: KR2a0009_WYG_085-11b, image: WYG0253/WYG0253-0188d.png}
