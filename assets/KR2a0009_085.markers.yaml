  - {type: variant, offset: 948, length: 0, content: '', WYG: 不安帝朝夕問訊進膳藥所以垂意甚備慶小心恭孝自以廢黜尤畏事慎法每朝謁陵廟常夜分嚴裝衣冠待明分半也約𠡠官屬不得與諸王車騎競驅常以貴人葬禮有闕每竊感恨至四節伏臘輙祭於私室竇氏誅後始使乳母於城北遥祠及}
