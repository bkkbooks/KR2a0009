  - {type: variant, offset: 322, length: 602, content: 中始置員數中常侍四人小黃門十人和帝即祚幼弱而竇憲兄弟專總權威內外臣僚莫由親接所與居者唯閹宦而已故鄭衆得專謀禁中終除大憝遂享分土之封超登宮卿之位於是中官始盛焉自明帝以後迄乎延平委用漸大而其員稍增中常侍至有十人小黃門二十人改以金璫右貂兼領卿署之職鄧后以女主臨政而萬機殷遠朝臣國議無由參斷帷幄稱制下令不出房闈之閒不得不委用刑人寄之國命手握王爵口含天憲非復掖廷永巷之職閨牖房闥之任也其後孫程定立順之功曹騰參建桓之策續以五侯合謀梁冀受鉞迹因公正恩固主心故中外服從上下屏氣或稱伊霍之勳無謝於往載或謂良平之畫復興於當今雖時有忠公而竟見排斥舉動回山海呼吸變霜露阿旨曲求則光寵三族直情忤意則參夷五宗漢之綱紀大亂矣若夫高冠長劒紆朱懷金者布滿宮闈苴茅分虎南面臣人者蓋以十數府署第館列於都鄙子弟支附過半於州國南金和寶冰紈霧縠之積盈仞珍臧嬙媛侍兒歌童舞女之玩充備綺室狗馬飾雕文土木被緹繡皆剝割萌黎競恣奢欲搆害明賢專樹黨類其有更相援引希附權彊者皆腐身熏子以自衒達同敝相濟故其徒有繁敗國蠹政之事不可單書所以海內嗟毒志士窮棲寇劇緣閒搖亂區夏雖忠良懷憤時或奮發而言出禍從旋見孥戮因復大考鉤黨轉相誣染凡稱善士莫不離被災毒竇武何進位崇戚近乘九服之囂怨協羣英之埶力而以疑留不斷至於殄敗斯亦運之極乎雖袁紹龔行芟夷無餘然以暴易亂亦何云及自曹騰說梁冀竟立昏弱魏武因之遂遷龜鼎所謂君以此始必以此終信乎其然矣鄭衆字季產南陽犨人也為人謹敏有心幾永平中初給事, WYG: 末選入}
