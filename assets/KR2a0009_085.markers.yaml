  - {type: variant, offset: 935, length: 1, content: 遷, WYG: 蔡倫考實之皆承風㫖傅致其事傅讀曰附乃載送暴室二貴人同時飲藥自殺續漢志曰暴室署名主中婦人疾病也帝猶傷之勑掖庭令葬於樊濯聚在洛陽城北也於是免楊歸本郡郡縣因事復捕繋之楊友人前懐令山陽張峻左馮翊沛國劉均等奔走觧釋得以免罪楊失志憔悴卒于家慶時雖㓜而知避嫌畏禍言不敢及宋氏帝更憐之勅皇后令衣服與太子齊等太子特親愛慶入則共室出則同輿及太子即位是為和帝待慶尤渥諸王莫得為比常共議私事後慶以長别居丙舍永元四年帝移幸北宫章徳殿講於白虎觀慶得入省宿止帝將誅竇氏欲得外戚傳前書外戚傳也懼左右不敢使乃令慶私從千乘王求夜獨内之又令慶傳語}
