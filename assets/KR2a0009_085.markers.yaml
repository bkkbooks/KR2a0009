  - {type: variant, offset: 1627, length: 515, content: 王以嫡統本無失德先帝用讒遂至廢黜若北鄉疾不起共斷江京閻顯事乃可成渠等然之又中黃門南陽王康先為太子府史自太子之廢常懷歎憤又長樂太官丞京兆王國並附同於程至二十七日北鄉侯薨閰顯白太后徵諸王子簡為帝嗣未及至十一月二日程遂與王康等十八人聚謀於西鍾下皆單衣為誓四日夜程等共會崇德殿上因入章臺門時江京劉安及李閏陳達等俱坐省門下程與王康共就斬京安達以李閏權埶積為省內所服欲引為主因舉刃脅閏曰今當立濟陰王無得搖動閏曰諾於是扶閏起俱於西鍾下迎濟陰王立之是為順帝召尚書令僕射以下從輦幸南宮雲臺程等留守省門遮扞內外閻顯時在禁中憂迫不知所為小黃門樊登勸顯發兵以太后詔召越騎校尉馮詩虎賁中郎將閻崇屯朔平門以禦程等誘詩入省太后使授之印曰能得濟陰王者封萬戶侯得李閏者五千戶侯顯以詩所將衆少使與登迎吏士于左掖門外詩因格殺登歸營屯守顯弟衛尉景遽從省中還外府收兵至盛德門程傳召諸尚書使收景尚書郭鎮時臥病聞之即率直宿羽林出南止車門逢景從吏士拔白刃呼曰無干兵鎮即下車時節詔之景曰何等詔因斫鎮不中鎮引劒擊景墯車左右以戟叉其匈遂禽之送廷尉獄即夜死旦日令侍御史收顯等送獄於是遂定下詔曰夫表功錄善古今之通義也故中常侍長樂太僕江京黃門令劉安鉤盾令陳達與故車騎將軍閻顯兄弟謀議惡逆傾亂, WYG: ''}
