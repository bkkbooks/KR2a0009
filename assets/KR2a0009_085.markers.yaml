  - {type: variant, offset: 2225, length: 684, content: 謀首康國協同其封程為浮陽侯食邑萬戶康為華容侯國為酈侯各九千戶黃龍為湘南侯五千戶彭愷為西平昌侯孟叔為中廬侯李建為復陽侯各四千二百戶王成為廣宗侯張賢為祝阿侯史汎為臨沮侯馬國為廣平侯王道為范縣侯李元為襃信侯楊佗為山都侯陳予為下雋侯趙封為析縣侯李剛為枝江侯各四千戶魏猛為夷陵侯二千戶苗光為東阿侯千戶是為十九侯加賜車馬金銀錢帛各有差李閏以先不豫謀故不封遂擢拜程騎都尉永建元年程與張賢孟叔馬國等為司隸校尉虞詡訟罪懷表上殿呵叱左右帝怒遂免程官因悉遣十九侯就國後徙封程為宜城侯程既到國怨恨恚懟封還印綬符策亡歸京師往山中詔書追求復故爵土賜車馬衣物遣還國三年帝念程等功勳悉徵還京師程與王道李元皆拜騎都尉餘悉奉朝請陽嘉元年程病甚即拜奉車都尉位特進及卒使五官中郎將追贈車騎將軍印綬賜謚剛侯侍御史持節監護喪事乘輿幸北部尉傳瞻望車騎程臨終遺言上書以國傳弟美帝許之而分程半封程養子壽為浮陽侯後詔書錄微功封興渠為高望亭侯四年詔宦官養子悉聽得為後襲封爵定著乎令王康王國彭愷王成趙封魏猛六人皆早卒黃龍楊佗孟叔李建張賢史汎王道李元李剛九人與阿母山陽君宋娥更相貨賂求高官增邑又誣罔中常侍曹騰孟賁等永和二年發覺並遣就國減租四分之一宋娥奪爵歸田舍唯馬國陳予苗光保全封邑初帝見廢監太子家小黃門籍建傅高梵長秋長趙熹丞良賀藥長夏珍皆以無過獲罪建等坐徙朔方及帝即位並擢為中常侍梵坐臧罪減死一等建後封東鄉侯三百戶賀清儉退厚位至大長秋陽嘉中詔九卿舉武猛賀獨無所薦帝引問其故對曰臣生自草茅長於宮掖既無知人之明又未嘗交知士類昔衛鞅因景監以見有識知其不終今得臣舉者匪榮伊辱固辭之及卒帝思賀忠封其養子為都鄉侯三百戶曹騰字季興沛國譙人, WYG: ''}
