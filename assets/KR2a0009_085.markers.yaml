  - {type: variant, offset: 1307, length: 7, content: 劉珍及博士良史, WYG: 邪王慙而更服景然後拜出住宫門外請王傅責之曰前發京師陛下見受詔以王不恭使相檢督諸君空受爵祿而無訓導之義因奏治罪詔書譲政而詰責傅景因捕諸姦人上案其罪上奏上也音市文反殺戮尤惡者數十人出寃獄百餘人政遂為改節悔過自脩陽嘉元年封政弟十三人皆為亭侯政立十年薨子貞王建嗣建立十年薨子安王利嗣利立二十八年薨子陔嗣陔立四十一年魏受禪以為崇德侯蠡吾侯翼元初六年鄧太后徴濟北河間王諸子}
