  - {type: variant, offset: 954, length: 5, content: 兄大將軍憲, WYG: 之嫌遂不敢言恭懷梁后和帝母梁貴人常泣向左右以為没齒之恨没終齒年也後上言外祖母王年老遭憂病下土無毉藥願乞詣洛陽療疾於是詔宋氏悉歸京師除慶舅衍俊蓋暹䓁皆為郎十五年有司以日食隂盛奏遣諸王侯就國詔曰甲子之異責由一人諸王㓜稚早離顧復弱冠相育詩小雅曰父兮生我母兮鞠我顧我復我出入腹我常有蓼莪凱風之哀詩小雅曰蓼蓼者莪匪莪伊蒿哀哀父母生我劬勞詩國風曰凱風自南吹彼棘心棘心夭夭母氏劬勞選懦之恩知非國典且復湏留選懦仁弱慈戀不决之意也懦音仁兖反東觀記湏留作宿留至冬從祠章陵詔假諸王羽林騎各四十人後中傅衛訢私為臧盗千餘萬詔使案理之并責慶不舉之狀慶曰訢以師傅之尊選自聖朝臣愚唯知言從事聽不甚有所糾察帝嘉其對悉以訢臧財賜慶及帝崩慶號泣前殿嘔血數升因以發病明年諸王就國鄧太后特聽清河王置中尉内史賜什物皆取乗輿上御以宋衍}
  - {type: page-break, offset: 954, content: '', id: KR2a0009_WYG_085-6a, image: WYG0253/WYG0253-0186a.png}
  - {type: variant, offset: 954, length: 5, content: 兄大將軍憲, krp: 之嫌遂不敢言恭懷梁后和帝母梁貴人常泣向左右以為没齒之恨没終齒年也後上言外祖母王年老遭憂病下土無毉藥願乞詣洛陽療疾於是詔宋氏悉歸京師除慶舅衍俊蓋暹䓁皆為郎十五年有司以日食隂盛奏遣諸王侯就國詔曰甲子之異責由一人諸王㓜稚早離顧復弱冠相育詩小雅曰父兮生我母兮鞠我顧我復我出入腹我常有蓼莪凱風之哀詩小雅曰蓼蓼者莪匪莪伊蒿哀哀父母生我劬勞詩國風曰凱風自南吹彼棘心棘心夭夭母氏劬勞選懦之恩知非國典且復湏留選懦仁弱慈戀不决之意也懦音仁兖反東觀記湏留作宿留至冬從祠章陵詔假諸王羽林騎各四十人後中傅衛訢私為臧盗千餘萬詔使案理之并責慶不舉之狀慶曰訢以師傅之尊選自聖朝臣愚唯知言從事聽不甚有所糾察帝嘉其對悉以訢臧財賜慶及帝崩慶號泣前殿嘔血數升因以發病明年諸王就國鄧太后特聽清河王置中尉内史賜什物皆取乗輿上御以宋衍}
  - {type: variant, offset: 961, length: 1, content: 竊, WYG: 為清河中大夫續漢書曰中大夫秩六百石無員掌奉王使至京師慶到國下令寡人生於深宫長於朝廷魯哀公與孔子言曰寡人生于深宫之中長於婦人之手事見孫卿子也劉攽曰正文到國下令寡人案文少一曰字仰恃明主垂拱受成垂拱言無為也尚書曰垂拱仰成既以薄祜早離顧復屬遭大憂屬近也悲懷感傷䝉恩大國職惟藩輔新去京師憂心焭焭夙夜屏營未知所立焭焭孤特也屏營仿偟也蓋聞智不獨理必湏明賢今官屬並居爵任失得是均庶望上遵策戒下免悔咎其紏督非枉明察典禁無令孤獲怠慢之罪焉鄧太后以殤帝襁抱逺慮不虞襁以繒帛為之即今之小兒繃也繃音必衡反留慶長子祐與嫡母耿姬居清河邸至秋帝崩立祐為嗣是為安帝太后使中黄門送耿姬歸國帝所生母左姬字小娥小娥姊字大娥犍為人初伯父聖坐妖言伏誅家屬没官二娥數嵗入掖庭及長並有才色小娥善史書喜辭賦和帝賜諸王宫人因入清河第慶初聞其美賞傅母以求之及後幸愛極盛姬妾莫比姊妹皆卒葬於京師慶立凡二十五年乃歸國其年病篤謂宋衍等曰清河埤薄埤音婢欲乞骸骨於貴人冡傍下棺而已朝廷大恩猶當應有祠室庶母子并食魂靈有所依庇死復何恨乃上書太后曰臣國土下溼願乞骸骨下從貴人於樊濯雖没且不朽矣及今口目尚能言視冒昧干請命在呼吸願䝉哀憐遂薨年二十九遣司空持節與宗正奉弔祭又使長樂謁者僕射中謁者二人副䕶喪事賜龍旂九旒虎賁百人儀比東海恭王旂有九旒天子制也恭王彊葬贈以殊禮升龍旄頭鸞輅龍旂虎賁百人太后使掖庭丞送左姬喪與王合葬廣丘子愍王虎}
