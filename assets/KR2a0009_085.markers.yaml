  - {type: variant, offset: 931, length: 1, content: 拜, WYG: 並為貴人建初三年大貴人生慶明年立為皇太子徵楊為議郎褒賜甚渥貴人長於人事供奉長樂宫身執饋饌太后憐之太后崩後竇皇后寵盛以貴人姊妹並幸慶為太子心内惡之與母比陽主謀䧟宋氏比陽主東海王疆女外令兄弟求其纎過内使御者偵伺得失偵候也音丑政反廣雅曰偵問也後於掖庭門邀遮得貴人書云病思生莬令家求之因誣言欲作蠱道祝詛以莬為厭勝之術日夜毁譖貴人母子遂漸見疏慶出居承祿觀數月竇后諷掖庭令誣奏前事請加驗實七年帝遂廢太子慶而立皇太子肇肇梁貴人子也乃下詔曰皇太子有失惑無常之性爰自孩乳至今益章恐襲其母凶惡之風不可以奉宗廟為天下主大義滅親况降退乎左傳衛石碏殺其子厚君子曰石碏純臣也惡州吁而厚預焉大義滅親其是之謂乎今廢慶為清河王皇子肇保育皇后承訓懐衽導逹善性將成其器葢庶子慈母尚有終身之恩儀禮喪服曰慈母如母謂妾子之無母父命妾飬之故曰慈母如母者貴父之命也豈若嫡后事正義明哉今以肇為皇太子遂出貴人姊妹置丙舍使}
