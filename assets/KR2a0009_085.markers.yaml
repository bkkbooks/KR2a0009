  - {type: variant, offset: 5978, length: 255, content: 無逮所以冒死干觸陳愚忠者實願陛下損改既謬從此一止當貴而今更賤者由賦發繁數以解縣官寒不敢衣飢不敢食民有斯戹而莫之卹宮女無用填積後庭天下雖復盡力耕桑猶不能供昔楚女悲愁則西宮致災況終年積聚豈無憂怨乎夫天生蒸民立君以牧之君道得則民戴之如父母仰之猶日月雖時有征稅猶望其仁恩之惠易曰悅以使民民忘其勞悅以犯難民忘其死儲君副主宜諷誦斯言南面當國宜履行其事豈宜有顧戀之意且河閒疏遠解瀆絕而當勞民單力未見其便又今外戚四姓貴倖之家及中官公族無功德者造起館舍凡有萬數樓閣連接丹青素堊雕刻之飾不可單言喪葬踰制奢麗過禮競相放效莫肯矯拂穀梁, WYG: 名左}
