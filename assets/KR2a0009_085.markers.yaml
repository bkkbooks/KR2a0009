  - {type: variant, offset: 951, length: 2, content: 秉政, WYG: 崩慶求上冢致哀帝許之詔太官四時給祭具慶垂涕曰生雖不獲供飬終得奉祭祀私願足矣欲求作祠堂恐有自同恭懷梁}
