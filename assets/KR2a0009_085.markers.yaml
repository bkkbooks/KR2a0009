  - {type: variant, offset: 6351, length: 2009, content: 極對毀刺貴臣譏呵豎宦陛下不密其言至令宣露羣邪項領膏脣拭舌競欲咀嚼造作飛條陛下回受誹謗致邕刑罪室家徙放老幼流離豈不負忠臣哉今羣臣皆以邕為戒上畏不測之難下懼劒客之害臣知朝廷不復得聞忠言矣故太尉段熲武勇冠世習於邊事垂髮服戎功成皓首歷事二主勳烈獨昭陛下既已式序位登台司而為司隸校尉陽球所見誣脅一身既斃而妻子遠播天下惆悵功臣失望宜徵邕更授任反熲家屬則忠貞路開衆怨以弭矣時帝多私臧收天下之珍每郡國貢獻先輸中署名為導行費強上疏諫曰郡之寶中御府積天下之繒西園引司農之臧中聚太僕之馬而所輸之府輒有導行之財調廣民困費多獻少姦吏因其利百姓受其敝又阿媚之臣好獻其私容諂姑息自此而進以成功若無可察然後付之尚書尚書舉劾請下廷尉覆案虛實行其誅罰今但任尚書或復勑用如是三公得免選舉之負尚書亦復不坐責賞無歸豈肯空自苦勞乎之見玼則不當照也願陛下詳思臣言不以記過見玼為責中平元年黃巾賊起帝問強所宜施行強欲先誅左右貪濁者大赦黨人料簡刺史二千石能否帝納之乃先赦黨人於是諸常侍人人求退又各自徵還宗親子弟在州郡者中常侍趙忠夏惲等遂共搆強云與黨人共議朝廷數讀霍光傳強兄弟所在並皆貪穢帝不悅使中黃門持兵召強強聞帝召怒曰吾死亂起矣丈夫欲盡忠國家豈能對獄吏乎遂自殺忠惲復譖曰強見召未知所問而就外草自屏有姦明審遂收捕宗親沒入財產焉時宦者濟陰丁肅下邳徐衍南陽郭耽汝陽李巡北海趙祐等五人稱為清忠皆在里巷不爭威權巡以為諸博士試甲乙科爭弟高下更相告言至有行賂定蘭臺漆書經字以合其私文者乃白帝與諸儒共刻五經文於石於是詔蔡邕等正其文字自後五經一定爭者用息趙祐博學多覽著作校書諸儒稱之又小黃門甘陵吳伉善為風角博達有奉公稱知不得用常託病還寺舍從容養志云張讓者潁川人趙忠者安平人也少皆給事省中桓帝時為小黃門忠以與誅梁冀功封都鄉侯延熹八年黜為關中內侯食本縣租千斛靈帝時讓忠並遷中常侍封列侯與曹節王甫等相為表𩹉節死後忠領大長秋讓有監奴典任家事交通貨賂威形諠赫扶風人孟佗資產饒贍與奴朋結傾竭饋問無所遺愛奴咸德之問佗曰君何所欲力能辦也曰吾望汝曹為我一拜耳時賓客求謁讓者車恆數百千兩佗時詣讓後至不得進監奴乃率諸倉頭迎拜於路遂共轝車入門賓客咸驚謂佗善於讓皆爭以珍玩賂之佗分以遺讓讓大喜遂以佗為涼州刺史是時讓忠及夏惲郭勝孫璋畢嵐栗嵩段珪高望張恭韓悝宋典十二人皆為中常侍封侯貴寵父兄子弟布列州郡所在貪殘為人蠹害黃巾既作盜賊糜沸郎中中山張鈞上書曰竊惟張角所以能興兵作亂萬人所以樂附之者其源皆由十常侍多放父兄子弟婚親賓客典據州郡辜榷財利侵掠百姓百姓之冤無所告訴故謀議不軌聚為盜賊宜斬十常侍縣頭南郊以謝百姓又遣使者布告天下可不須師旅而大寇自消天子以鈞章示讓等皆免冠徒跣頓首乞自致洛陽詔獄並出家財以助軍費有詔皆冠履視事如故帝怒鈞曰此真狂子也十常侍固當有一人善者不鈞復重上猶如前章輒寢不報詔使廷尉侍御史考為張角道者御史承讓等旨遂誣奏鈞學黃巾道收掠死獄中而讓等實多與張角交通後中常侍封諝徐奏奉事獨發覺坐誅帝因怒詰讓等曰汝曹常言黨人欲為不軌皆令禁錮或有伏誅今黨人更為國用汝曹反與張角通為可斬未皆叩頭云故中常侍王甫侯覽所為帝乃止明年南宮災讓忠等說帝令斂天下田畝稅十錢以修宮室發太原河東狄道諸郡材木及文石每州郡部送至京師黃門常侍輒令譴呵不中者因強折賤買十分雇一因復貨之於宦官復不為即受材木遂至腐積宮室連年不成刺史太守復增私調百姓呼嗟凡詔所徵求皆令西園騶密約勑號曰中使恐動州郡多受賕賂刺史二千石及茂才孝廉遷除皆責助軍修宮錢大郡至二三千萬餘各有差當之官者皆先至西園諧價然後得去有錢不畢者或至自殺其守清者乞不之官皆迫遣之時鉅鹿太守河內司馬直新除以有清名減責三百萬直被詔悵然曰為民父母而反割剝百姓以稱時求吾不忍也辭疾不聽行至孟津上書極陳當世之失古今禍敗之戒即吞藥自殺書奏帝為暫絕修宮錢又造萬金堂於西園引司農金錢繒帛仞積其中又還河閒買田宅起第觀帝本侯家宿貧每歎桓帝不能作家居故聚為私臧復臧寄小黃門常侍錢各數千萬常云張常侍是我公趙常侍是我母宦官得志無所憚畏並起第宅擬則宮室帝常登永安侯臺宦官恐其望見居處乃使中大人尚但諫曰天子不當登高登高則百姓虛散自是不敢復升臺榭明年遂使鉤盾令宋典繕修南宮玉堂又使掖庭令畢嵐鑄銅人四列於倉龍玄武闕又鑄四鐘皆受二千斛縣於玉堂及雲臺殿前又鑄天祿蝦吐水於平門外橋東轉水入宮又作翻車渴烏施於橋西用灑南北郊路以省百姓灑道之費又鑄四出文錢錢皆四道識者竊言侈虐已甚形象兆見此錢成必四道而去及京師大亂錢果流布四海復以忠為車騎將軍百餘日罷六年帝崩中軍校尉袁紹說大將軍何進令誅中官以悅天下謀泄讓忠等因進入省遂共殺進而紹勒兵斬忠捕宦官無少長悉斬之讓等數十人劫質天子走河上追急讓等悲哭辭曰臣等殄滅天下亂矣惟陛下自愛皆投河而死論曰自古喪大業絕宗禋者其所漸有由矣三世代以嬖色取禍嬴氏以奢虐致災西京自外戚失祚東都緣閹尹傾國成敗之來先史商之久矣至於釁起宦夫其略猶或可言何者刑餘之醜理謝全生聲榮無暉於門閥肌膚莫傳於來體推情未鑒其敝即事易以取, WYG: ''}
