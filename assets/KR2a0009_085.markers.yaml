  - {type: punctuation, offset: 4093, content: 、, id: KR2a0009_ZHSJ_085-bkkpn947}
  - {type: variant, offset: 4096, length: 509, content: 者並降為鄉侯租入歲皆三百萬子弟分封者悉奪爵土劉普等貶為關內侯侯覽者山陽防東人桓帝初為中常侍以佞猾進倚埶貪放受納貨遺以巨萬計延熹中連歲征伐府帑空虛乃假百官奉祿王侯租稅覽亦上縑五千匹賜爵關內侯又託以與議誅梁冀功進封高鄉侯小黃門段珪家在濟陰與覽並立田業近濟北界僕從賓客侵犯百姓劫掠行旅濟北相滕延一切收捕殺數十人陳尸路衢覽珪大怨以事訴帝延坐多殺無辜徵詣廷尉免延字伯行北海人後為京兆尹有理名世稱為長者覽等得此愈放縱覽兄參為益州刺史民有豐富者輒誣以大逆皆誅滅之沒入財物前後累億計太尉楊秉奏參檻車徵於道自殺京兆尹袁逢於旅舍閱參車三百餘兩皆金銀錦帛珍玩不可勝數覽坐免旋復復官建寧二年喪母還家大起塋冢督郵張儉因舉奏覽貪侈奢縱前後請奪人宅三百八十一所田百一十八頃立第宅十有六區皆有高樓池苑堂閣相望飾以綺畫丹漆之屬制度重深僭類宮省又豫作壽冢石椁雙闕高廡百尺破人居室發掘墳墓虜奪良人妻略婦子及諸罪釁請誅之而覽伺候遮章竟不上儉遂破覽冢宅藉沒資財具言罪狀又奏覽母生時交通賓客干亂郡國復不得御覽遂誣儉為鉤黨及故長樂少府李膺太僕杜密等皆夷滅之遂代曹節領長樂太僕熹平元年有司舉奏覽專權驕奢策收印綬自殺阿黨者皆免曹節字漢豐南陽新野人也其本魏郡人世吏二千石, WYG: 翼}
