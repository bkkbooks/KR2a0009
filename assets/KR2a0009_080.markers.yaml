  - {type: variant, offset: 2046, length: 0, content: '', WYG: 入失䋲墨不敢復有所横費租入有餘乞裁食雎陽榖孰虞蒙寧陵五縣還餘所食四縣臣暢小妻三十七人其無子者願還本家自選擇謹勑奴婢二百人其餘所受虎賁官騎及諸工技鼓吹蒼頭奴婢兵弩廐馬皆上還本署臣暢以骨肉近親亂聖化汙清流既得生活誠無心靣目以凶惡復居大宫食大國張官屬藏什物願陛下加大恩開臣自悔之門假臣遷善之路令天下知臣䝉恩得去死就生頗能自悔臣以公卿所奏臣罪惡詔書常置於前晝夜誦讀臣小人貪見明時不能即時自引惟陛下哀臣令得喘息漏刻若不聼許臣實無顔以久生下入黄泉無以見先帝此誠臣至心臣欲多還所受恐天恩不聼許節量所留於臣暢饒足詔報曰朕惟王至親之屬淳淑之美傅相不良不能防邪至令有司紛紛有言今王深思悔過端自克責朕惻然傷之志匪由于咎在彼小子謂由卞忌及王禮等也一日克己復禮天下歸仁王其安心静意茂率休徳易不云乎一謙而四益小有言終吉易謙卦曰天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙為謙是一而天地神人皆益之故曰一謙而四益訟卦初六曰小有言終吉言王雖小有訟言而終吉也强食自愛暢固讓章數上卒不許立二十七年薨子恭王堅嗣永元十六年封堅弟二人為鄉亭侯堅立二十六年薨子懐王匡嗣永建二年封匡兄弟七人為鄉亭侯匡立十一年薨無子順帝封匡弟孝陽亭侯成為梁王是為夷王立二十九年薨子敬王元嗣立十六年薨子彌嗣立四十年魏受禪以為崇徳侯淮陽頃王昞傳淮陽頃王昞永平五年封常山王建初}
