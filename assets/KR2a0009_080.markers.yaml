  - {type: variant, offset: 37, length: 1, content: 父, WYG: 安國為耕亭侯鈞立二十一年薨子懐王竦嗣立二年薨無子國絶永寧元年立敬王子安夀亭侯崇為陳王是為頃王立五年薨子孝王承嗣承薨子愍王寵嗣熹平二年國相師遷追奏前相魏愔與寵共祭天神希幸非冀罪至不道有司奏遣使者案騐是時新誅勃海王悝靈帝熹平元年悝被誣謀反自殺也靈帝不忍復加法詔檻車傳送愔遷詣北寺詔獄使中常侍王酺華嶠書及宦者傳諸本並作甫此云酺未詳孰是也與尚書令侍御史雜考愔辭與王共祭黄老君劉攽曰案文黄老君不}
