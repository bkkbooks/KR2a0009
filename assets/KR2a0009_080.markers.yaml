  - {type: variant, offset: 578, length: 12, content: 守封邟鄉侯紹猶稱兼司隸初, WYG: 子生為立賢師傅以訓導之是以目不見惡耳不聞非能保其社稷高明令終萇少長藩國内無過庭之訓外廡師傅之道血氣方剛卒受榮爵幾㣲生過遂䧟不義臣聞周官議親惷愚見赦萇不殺無辜以譴呵為非無赫赫大惡可裁削奪損其租賦令得改過自新革心向道案黄香集香與宏共奏此香之辭也延光元年以河間孝王子得嗣靖王後以樂成比廢絶故改國曰安平是為安平孝王立三十年薨子續立中}
