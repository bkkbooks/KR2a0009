  - {type: variant, offset: 36, length: 0, content: '', WYG: 憎怨敬王夫人李儀等永元十一年遂使客隗久久或作文殺儀家屬吏捕得久繫長平獄長平縣屬陳國鈞欲斷絶辭語復使結客簒殺久事發覺有司舉奏鈞坐削西華項新陽三縣西華故城在今陳州溵水縣西北項今陳州項城縣也新陽故城今在豫州真陽縣西南也十二年封鈞六弟為列侯伏侯古今注曰番為陽都鄉侯千秋為新平侯參為周亭侯夀為樂陽亭侯寳為博平侯旦為高亭侯也後鈞取掖庭出女李嬈為小妻嬈音寧了反復坐削圉宜禄扶溝三縣圉扶溝並屬陳留郡宜禄屬汝南郡永初七年封敬王}
