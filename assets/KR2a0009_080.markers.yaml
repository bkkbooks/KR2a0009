  - {type: variant, offset: 2048, length: 0, content: '', WYG: 徙為淮陽王以汝南之新安西華益淮陽國立十六年薨未及立嗣永元二年和帝立昞小子側復為常山王奉昞後是為殤王立十三年薨父子皆未之國並葬京師側無子其月立兄防子侯章為常山王和帝憐章早孤數加賞賜延平元年就國立二十五年薨是為靖王子頃王儀嗣永建二年封儀兄二人為亭侯儀立十七年薨子節王豹嗣永嘉元年封豹兄四人為亭侯豹立八年薨子暠嗣三十二年遭黄巾賊棄國走建安十一年國除濟隂悼王長傳濟隂悼王長永平十五年封建}
