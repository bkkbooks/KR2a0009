  - {type: variant, offset: 6157, length: 602, content: 里操自將步騎五千人夜往攻破瓊等悉斬之初紹聞操擊瓊謂長子譚曰就操破瓊吾拔其營彼固無所歸矣乃使高覽張郃等攻操營不下二將聞瓊等敗遂奔操於是紹軍驚擾大潰紹與譚等幅巾乘馬與八百騎度河至黎陽北岸入其將軍蔣義渠營至帳下把其手曰孤以首領相付矣義渠避帳而處之使宣令焉衆聞紹在稍復集餘衆偽降曹操盡阬之前後所殺八萬人沮授為操軍所執乃大呼曰授不降也為所執耳操見授謂曰分野殊異遂用圮絕不圖今日乃相得也授對曰冀州失策自取奔北授知力俱困宜其見禽操曰本初無謀不相用計今喪亂過紀國家未定方當與君圖之授曰叔父母弟懸命袁氏若蒙公靈速死為福操歎曰孤早相得天下不足慮也遂赦而厚遇焉授尋謀歸袁氏乃誅之紹外寬雅有局度憂喜不形於色而性矜愎自高短於從善故至於敗及軍還或謂田豐曰君必見重豐曰公貌寬而內忌不亮吾忠而吾數以至言迕之若勝而喜必能赦我戰敗而怨內忌將發若軍出有利當蒙全耳今既敗矣吾不望生紹還曰吾不用田豐言果為所笑遂殺之官度之敗審配二子為曹操所禽孟岱與配有𨻶因蔣奇言於紹曰配在位專政族大兵強且二子在南必懷反畔郭圖辛評亦為然紹遂以岱為監軍代配守鄴護軍逢紀與配不睦紹以問之紀對曰配天性烈直每所言行慕古人之節不以二子在南為不義也公勿疑之紹曰君不惡之邪紀曰先所爭者私情今所陳者國事紹曰善乃不廢配配紀由是更協冀州城邑多畔紹復擊定之自軍敗後發病七年夏薨未及定嗣逢紀審配宿以驕侈為譚所病辛評郭圖皆比於譚而與配紀有𨻶衆以譚長欲立之配等恐譚立而評等為害遂矯紹遺命奉尚為嗣, WYG: 考證}
