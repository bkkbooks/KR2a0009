  - {type: variant, offset: 593, length: 1, content: 紹, WYG: 黄巾賊起為所劫質囚于廣宗今貝州宗城縣也随室諱改焉賊平復國其年秋坐不道被誅立三十四年國除下邳恵王衍傳下邳恵王衍永平十五年封衍有容貎肅宗即位常在左右建初初冠詔賜衍師傅已下官屬金帛各有差四年以臨淮郡及九江之鍾離當塗東城歴陽全椒合十七縣益下邳國鍾離在今濠州鍾離縣東當塗在縣西南東城在定逺縣東南歴陽和州縣也全椒今滁州縣也帝崩其年就國衍後病荒忽而太子卭有罪廢諸姬争欲立子為嗣連上書相告言和帝憐之使彭城靖王恭至下邳正其嫡庶立子成為太子東觀記載賜恭詔曰皇帝問彭城王始夏無恙盖聞堯親九族萬國協和書典之所美也下邳王被病沈滯之疾昏亂不明家用不寜姬妾嫡庶諸子分爭紛紛至今前太子卭頑凶失道陷于大辟是後諸子更相誣告迄今適嗣未知所定朕甚傷之惟王與下邳王恩義至親正此國嗣非王而誰禮重適庶之序春秋之義大居正孔子曰惟仁者能好人能惡人貴仁者所好惡得其中也太子國之儲嗣可不愼歟王其差次下邳諸子可為太子者上名將及景風拜授印綬焉衍立五十四年薨子貞王成嗣永建元年封成兄二人及恵王孫二人皆為列侯成立二年薨子愍王意嗣陽嘉元年封意弟八人為鄉亭侯中平元年意遭黄巾棄國走賊平復國數月薨立五十七年年九十子哀王宜嗣數月薨無子建安十一年國除梁節王暢傳梁節王暢永平十五年封為汝南王母隂貴人有寵暢尤被愛幸國土租入倍於諸國肅宗立縁先帝之意賞賜恩寵甚篤建初二年封暢舅隂棠為西陵侯西陵縣屬江夏郡四年徙為梁王以陳留之郾寧陵濟隂之薄單父己氏成武凡六縣益梁國郾今許州郾陵縣也寜陵今宋州縣也薄故城在今曺州考城縣東北單父今宋州縣也已氏今宋州楚丘縣也成武今􅈠州縣也帝崩其年就國暢性聰惠然少貴驕頗不遵法度歸國後數有惡夢從官卞忌自言能使六丁善占夢六丁謂六甲中丁神也若甲子旬中則丁卯為神甲寅旬中則丁巳為神之類也役使之法先齋戒然後其神至可使致遠方物及知吉凶也暢數使卜筮又暢乳母王禮等因此自言能見鬼神事}
