  - {type: variant, offset: 5235, length: 921, content: 記期會公卿充員品而已至觸情放慝不顧憲章又議郎趙彥忠諫直言議有可納故聖朝含聽改容加錫操欲迷奪時明杜絕言路收立殺不俟報聞又梁孝王先帝母弟墳陵尊顯松栢桑梓猶宜恭肅操率將吏士親臨發掘破棺裸尸掠取金寶至令聖朝流涕士民傷懷又署發丘中郎將摸金校尉所過毀突無骸不露身處三公之官而行桀虜之態汙國虐民毒施人鬼加其細政苛慘科防互設矰繳充蹊阬穽塞路舉手挂網羅動足蹈機埳是以兗豫有無聊之人帝都有呼嗟之怨意含覆冀可彌縫而操豺狼野心潛包禍謀乃欲橈折棟梁孤弱漢室除忠害善專為梟雄往歲伐鼓北征討公孫瓚強禦桀逆拒圍一年操因其未破陰交書命欲託助王師以見掩襲故引兵造河方舟北濟會行人發露瓚亦梟夷故使鋒芒挫縮厥圖不果屯據敖倉阻河為固乃欲運螳蜋之斧禦隆車之隧莫府奉漢威靈折衝宇宙長戟百萬胡騎千羣奮中黃育獲之士騁良弓勁弩之埶并州越太行青州涉濟漯大軍汎黃河以角其前荊州下宛葉而掎其後雷震虎步並集虜廷若舉炎火以焚飛蓬覆滄海而注熛炭有何不消滅者哉之禍因斯而作乃忠臣肝腦塗地之秋烈士立功之會也可不勗哉乃先遣顏良攻曹操別將劉延於白馬紹自引兵至黎陽沮授臨行會其宗族散資財以與之曰埶存則威無不加埶亡則不保一身哀哉其弟宗曰曹操士馬不敵君何懼焉授曰以曹兗州之明略又挾天子以為資我雖剋伯珪衆實疲敝而主驕將軍之破敗在此舉矣楊雄有言六國蚩蚩為嬴弱姬今之謂乎曹操遂救劉延擊顏良斬之紹乃度河壁延津南沮授臨船歎曰上盈其志下務其功悠悠黃河吾其濟乎遂以疾退紹不許而意恨之復省其所部并屬郭圖紹使劉備文醜挑戰曹操又擊破之斬文醜再戰而禽二將紹軍中大震操還屯官度紹進保陽武沮授又說紹曰北兵雖衆而勁果不及南軍南軍穀少而資儲不如北南幸於急戰北利在緩師宜徐持久曠以日月紹不從連營稍前漸逼官度遂合戰操軍不利復還堅壁紹為高櫓起土山射營中營中皆蒙楯而行操乃發石車擊紹樓皆破軍中呼曰霹靂車紹為地道欲襲操操輒於內為長以拒之又遣奇兵襲紹運車大破之盡焚其穀食相持百餘日河南人疲困多畔應紹紹遣淳于瓊等將兵萬餘人北迎粮運沮授說紹可遣蔣奇別為支軍於表以絕曹操之鈔紹不從許攸進曰曹操兵少而悉師拒我許下餘守埶必空弱若分遣輕軍星行掩襲許拔則操為成禽如其未潰可令首尾奔命破之必也紹又不能用會攸家犯法審配收繫之攸不得志遂奔曹操而說使襲取淳于瓊等瓊等時宿在烏巢去紹軍四, WYG: 巻八}
