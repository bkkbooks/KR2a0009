  - {type: variant, offset: 2333, length: 188, content: 又擊劉石青牛角黃龍左校郭大賢李大目于氐根等復斬數萬級皆屠其屯壁遂與黑山賊張燕及四營屠各鴈門烏桓戰於常山燕精兵數萬騎數千匹連戰十餘日燕兵死傷雖多紹軍亦疲遂各退麴義自恃有功驕縱不軌紹召殺之而并其衆興平二年拜紹右將軍其冬車駕為李傕等所追於曹陽沮授說紹曰將軍累葉台輔世濟忠義今朝廷播越宗廟殘毀觀諸州郡雖外託義兵內實相圖未有憂存社稷卹人之意且今州城粗定兵強士附西迎大駕即宮鄴都挾天子而令, WYG: 難極也故東京}
