  - {type: variant, offset: 452, length: 7, content: 董卓購募求紹時, WYG: 刺史與國相舉奏萇罪至不道安帝詔曰萇有靦其面而放逸其心􅌤姡也言靣姡然無媿姡音胡八反知陵廟至重承繼有禮不惟致敬之節肅穆之慎乃敢擅損犠牲不備苾芬詩小雅曰苾苾芬芬祀事孔明慢易大姬不震厥教大姬即萇所繼之母震懼也出入顛覆風滛于家娉取人妻饋遺婢妾歐擊吏人專已凶暴愆罪莫大甚可恥也朕覽八辟之議不忍致之于理周禮司宼以八辟麗邦法一曰議親之辟二曰議故之辟三曰議賢之辟四曰議能之辟五曰議功之辟六曰議貴之辟七曰議勤之辟八曰議賓之辟其貶萇爵為臨湖侯臨湖屬廬江郡朕無則哲之明致簡統失序罔以尉承大姬増懐永歎袁宏紀曰尚書}
