  - {type: variant, offset: 460, length: 108, content: 中周珌城門校尉伍瓊為卓所信待瓊等陰為紹說卓曰夫廢立大事非常人所及袁紹不達大體恐懼出奔非有它志今急購之埶必為變袁氏樹恩四世門生故吏徧於天下若收豪傑以聚徒衆英雄因之而起則山東非公之有也不如赦之拜一郡守紹喜於免罪必無患矣卓, WYG: 郎冷宏議}
