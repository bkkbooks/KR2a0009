  - {type: variant, offset: 1442, length: 600, content: 送印綬以讓紹紹遂領冀州牧承制以馥為奮威將軍而無所將御引沮授為別駕因謂授曰今賊臣作亂朝廷遷移吾歷世受寵志竭力命興復漢室然齊桓非夷吾不能成霸句踐非范蠡無以存國今欲與卿戮力同心共安社稷將何以匡濟之乎授進曰將軍弱冠登朝播名海內值廢立之際忠義奮發單騎出奔董卓懷懼濟河而北勃海稽服擁一郡之卒撮冀州之衆威陵河朔名重天下若舉軍東向則黃巾可埽還討黑山則張燕可滅回師北首則公孫必禽震脅戎狄則匈奴立定橫大河之北合四州之地收英雄之士擁百萬之衆迎大駕於長安復宗廟於洛邑號令天下誅討未服以此爭鋒誰能御之比及數年其功不難紹喜曰此吾心也即表授為奮武將軍使監護諸將魏郡審配鉅鹿田豐並以正直不得志於韓馥紹乃以豐為別駕配為治中甚見器任馥自懷猜懼辭紹索去往依張邈後紹遣使詣邈有所計議因共耳語馥時在坐謂見圖謀無何如廁自殺其冬公孫瓚大破黃巾還屯槃河威震河北冀州諸城無不望風響應紹乃自擊之瓚兵三萬列為方陳分突騎萬匹翼軍左右其鋒甚銳紹先令麴義領精兵八百強弩千張以為前登瓚輕其兵少縱騎騰之義兵伏楯下一時同發瓚軍大敗斬其所置冀州刺史嚴綱獲甲首千餘級麴義追至界橋瓚斂兵還戰義復破之遂到瓚營拔其牙門餘衆皆走紹在後十數里聞瓚已破發鞌息馬唯衞帳下強弩數十張大戟士百許人瓚散兵二千餘騎卒至圍紹數重射矢雨下田豐扶紹使却入空垣紹脫兜鍪抵地曰大丈夫當前鬬死而反逃垣牆閒邪促使諸弩競發多傷瓚騎衆不知是紹頗稍引却會麴義來迎騎乃散退三年瓚又遣兵至龍湊挑戰紹復擊破之瓚遂還幽州, WYG: ''}
