  - {type: variant, offset: 673, length: 196, content: 名紹與王匡屯河內伷屯潁川馥屯鄴餘軍咸屯酸棗約盟遙推紹為盟主紹自號車騎將軍領司隸校尉董卓聞紹起山東乃誅紹叔父隗及宗族在京師者盡滅之卓乃遣大鴻臚韓融少府陰循執金吾胡母班將作大匠吳循越騎校尉王瓌譬解紹等諸軍紹使王匡殺班瓌吳循等袁術亦執殺陰循惟韓融以名德免是時豪傑既多附紹且感其家禍人思為報州郡蜂起莫不以袁氏為名韓馥見人情歸紹忌方其得衆恐將圖己常遣從事守紹門不聽發兵橋瑁乃詐作三公移書傳驛州郡說董卓罪, WYG: 惡故言收}
