  - {type: variant, offset: 3690, length: 1386, content: 一介若使得申明本心不愧先帝則伏首歐刀褰衣就鑊臣之願也惟陛下垂尸鳩之平絕邪諂之論無令愚臣結恨三泉於是以紹為太尉封鄴侯時曹操自為大將軍紹恥為之下偽表辭不受操大懼乃讓位於紹二年使將作大匠孔融持節拜紹大將軍錫弓矢節鉞虎賁百人兼督冀青幽并四州然後受之紹每得詔書患有不便於己乃欲移天子自近使說操以許下埤溼洛陽殘破宜徙都甄城以就全實操拒之田豐說紹曰徙都之計既不克從宜早圖許奉迎天子動託詔令響號海內此筭之上者不爾終為人所禽雖悔無益也紹不從四年春擊公孫瓚遂定幽土事在瓚傳紹既并四州之地衆數十萬而驕心轉盛貢御稀簡主簿耿包密白紹曰赤德衰盡袁為黃胤宜順天意以從民心紹以包白事示軍府僚屬議者以包妖妄宜誅紹知衆情未同不得已乃殺包以弭其迹於是簡精兵十萬騎萬匹欲出攻許以審配逢紀統軍事田豐荀諶及南陽許攸為謀主顏良文醜為將帥沮授進說曰近討公孫師出歷年百姓疲敝倉庫無積賦役方殷此國之深憂也宜先遣使獻捷天子務農逸人若不得通乃表曹操隔我王路然後進屯黎陽漸營河南益作舟船繕修器械分遣精騎抄其邊鄙令彼不得安我取其逸如此可坐定也郭圖審配曰兵書之法十圍五攻敵則能戰今以明公之神武連河朔之強衆以伐曹操兵其埶譬若覆手今不時取後難圖也授曰蓋救亂誅暴謂之義兵恃衆憑強謂之驕兵義者無敵驕者先滅曹操奉迎天子建宮許都今舉師南向於義則違且廟勝之策不在彊弱曹操法令既行士卒精練非公孫瓚坐受圍者也今𠫓廾萬安之術而興無名之師竊為公懼之圖等曰武王伐紂不為不義況兵加曹操而云無名且公師徒精勇將士思奮而不及時早定大業所謂天與不取反受其咎此越之所以霸吳之所以滅也監軍之計在於將軍持牢而非見時知幾之變也紹納圖言圖等因是譖沮授曰授監統內外威震三軍若其浸盛何以制之夫臣與主同者昌主與臣同者亡此黃石之所忌也且御衆於外不宜知內紹乃分授所統為三都督使授及郭圖淳于瓊各典一軍未及行五年左將軍劉備殺徐州刺史車冑據沛以背曹操操懼乃自將征備田豐說紹曰與公爭天下者曹操也操今東擊劉備兵連未可卒解今舉軍而襲其後可一往而定兵以幾動斯其時也紹辭以子疾未得行豐舉杖擊地曰嗟乎事去矣夫遭難遇之幾而以嬰兒病失其會惜哉紹聞而怒之從此遂疏焉曹操畏紹過河乃急擊備遂破之備奔紹紹於是進軍攻許田豐以既失前幾不宜便行諫紹曰曹操既破劉備則許下非復空虛且操善用兵變化無方衆雖少未可輕也今不如久持之將軍據山河之固擁四州之衆外結英雄內修農戰然後簡其精銳分為奇兵乘虛迭出以擾河南救右則擊其左救左則擊其右使敵疲於奔命人不得安業我未勞而彼已困不及三年可坐剋也今釋廟勝之策而決成敗於一戰若不如志悔無及也紹不從豐強諫忤紹紹以為沮衆遂械繫之乃先宣檄曰福由己終有望夷之禍汙辱至今及臻呂后祿產專政斷萬機決事禁省下陵上替海內寒心於是絳侯朱虛興威奮怒誅夷逆暴尊立太宗故能道化興隆光明融顯此則大臣立權之明表也嵩乞匄攜養因臧買位輿金輦寶輸貨權門竊盜鼎司傾覆重器操姦贅閹遺醜本無令德僄狡鋒俠好亂樂禍幕府董統鷹揚埽夷凶逆續遇董卓侵官暴國於是提劒揮鼓發命東夏廣羅英雄𠫓廾瑕錄用故遂與操參咨策略謂其鷹犬之才爪牙可任至乃愚佻短慮輕進易退傷夷折衂數喪師徒幕府輒復分兵命銳修完補輯表行東郡太守兗州刺史被以虎文授以偏師奬就威柄冀獲秦師一克之報而遂乘資跋扈肆行酷烈割剝元元殘賢害善故九江太守邊讓英才儁逸以直言正色論不阿諂身被梟懸之戮妻孥受灰滅之咎自是士林憤痛人怨天怒一夫奮臂舉州同聲故躬破於徐方地奪於呂布彷徨東裔蹈據無所幕府惟強幹弱枝之義且不登畔, WYG: 素真}
