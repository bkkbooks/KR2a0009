  - {type: variant, offset: 2760, length: 899, content: 則敗之誡下思逐兔分定之義若其不改禍始此矣紹曰吾欲令諸子各據一州以視其能於是以中子熙為幽州刺史外甥高幹為并州刺史建安元年曹操迎天子都許乃下詔書於紹責以地廣兵多而專自樹黨不聞勤王之師而但相討伐紹上書曰臣聞昔有哀歎而霜隕悲哭而崩城者每讀其書謂為信然於今況之乃知妄作何者臣出身為國破家立事至乃懷忠獲釁抱信見疑晝夜長吟剖肝泣血曾無崩城隕霜之應故鄒衍嵵婦何能感徹義故遂解節出奔創謀河外時卓方貪結外援招悅英豪故即臣勃海申以軍號則臣之與卓未有纖芥之嫌若使苟欲滑泥揚波偷榮求利則進可以享竊祿位退無門戶之患然臣愚所守志無傾奪故遂引會英雄興師百萬飲馬孟津歃血漳河會故冀州牧韓馥懷挾逆謀欲專權埶絕臣軍糧不得踵係至使猾虜肆毒害及一門尊卑大小同日并戮鳥獸之情猶知號呼臣所以蕩然忘哀貌無隱戚者誠以忠孝之節道不兩立顧私懷己不能全功斯亦愚臣破家徇國之二驗也狡敵知亡故韓馥懷懼謝咎歸土張楊黑山同時乞降臣時輒承制竊比竇融以議郎曹操權領兗州牧會公孫瓚師旅南馳陸掠北境臣即星駕席卷與瓚交鋒假天之威每戰輒克臣備公族子弟生長京輦頗聞俎豆不習干戈加自乃祖先臣以來世作輔弼咸以文德盡忠得免罪戾臣非與瓚角戎馬之埶爭戰陣之功者也誠以賊臣不誅春秋所貶苟云利國專之不疑故冒踐霜雪不憚劬勤實庶一捷之福以立終身之功社稷未定臣誠恥之太僕趙岐銜命來征宣明陛下含弘之施蠲除細故與下更新奉詔之日引師南轅是臣畏怖天威不敢怠慢之三驗也列而州郡牧守競盜聲名懷持二端優游顧望皆列土錫圭跨州連郡是以遠近狐疑議論紛錯者也臣聞守文之世德高者位尊倉卒之時功多者賞厚陛下播越非所洛邑乏祀海內傷心志士憤惋是以忠臣肝腦塗地肌膚橫分而無悔心者義之所感故也今賞加無勞以攜有德杜黜忠功以疑衆望斯豈腹心之遠圖將乃讒慝之邪說使之然也臣爵為通侯位二千石殊恩厚德臣既叨之豈敢闚覬重禮以希彤弓玈矢之命哉誠傷偏裨列校勤不見紀盡忠為國飜成重愆斯蒙恬所以悲號於邊獄白起歔欷於杜郵也太傅日磾位為師保任配東征而耗亂王命寵任非所凡所舉用皆衆所捐𠫓廾而容納其策以為謀主令臣骨肉兄弟還為讎敵交鋒接刃搆難滋甚臣雖欲釋甲投戈事不得已誠恐陛下日月之明有所不照四聰之聽有所不聞乞下臣章咨之羣賢使三槐九棘議臣罪戾若以臣今行權為釁則桓, WYG: ''}
