  - {type: variant, offset: 31, length: 0, content: '', WYG: 郡其年就國立三十七年薨子思王鈞嗣鈞立多不法遂行天子大射禮天子將祭擇土而祭謂之大射大射之禮張三侯虎侯熊侯豹侯示服猛也皆以其皮方制之樂用騶虞九節謝承書曰陳國户曹史髙慎諫國相曰諸侯射豕天子射熊八彛六樽禮數不同昔季氏設朱干玉戚以舞大夏左傳曰唯名與器不可以假}
