  - {type: variant, offset: 528, length: 1, content: 地, krp: 云少年未多年也哀牢夷者其先有婦人名沙壹居于牢山嘗捕魚水中觸沈木若有感因懷􅗖十月產子男十人後沈木化為龍出水上沙壹忽聞龍語曰若為我生子今悉何在九子見龍驚走獨小子不能去背龍而坐龍因䑛之其母鳥語謂背為九謂坐為隆因名子曰九隆及後長大諸兄以九隆能為父所䑛而黠遂共推以為王後牢山下有一夫一婦復生十女子九隆兄弟皆娶以為妻後漸相滋長種人皆刻畫其身象龍文衣著尾自此以上並見風俗通也九隆死世世相繼哀牢傳曰九隆代代相傳名號不可得而數至於禁高乃可記知禁高死子吸代吸死子建非代建非死子哀牢代哀牢死子桑藕代桑藕死子栁承代栁承死子栁貌代栁貌死子扈栗代乃分置小王往往邑居散在谿谷絶域荒外山川阻深生人以來未嘗交通中國建武二十三年其王賢栗遣兵乘箄舩箄音蒲佳反縛竹木為箄以當舩也南下江漢擊附塞夷鹿茤茤音多其種今見在鹿茤人弱為所禽獲於是}
