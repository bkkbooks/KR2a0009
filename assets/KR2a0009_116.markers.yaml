  - {type: variant, offset: 258, length: 0, content: '', WYG: 臨朝下詔增進秩二千石賜錢二十萬桓帝元嘉元年秋武陵蠻詹山等四千餘人反叛拘執縣令屯結深山至永興元年太守應奉以恩信招誘皆悉降散永壽三年十一月長沙蠻反叛屯益陽至延熹三年秋遂抄掠郡界衆至萬餘人殺傷長吏又零陵蠻入長沙冬武陵蠻六千餘人寇江陵荆州刺史劉度謁者馬睦南郡太守李肅皆奔走肅主簿胡爽扣馬首諫曰蠻夷見郡無儆備故敢乘間而進明府為國大臣連城千里舉旄鳴鼓應聲十萬奈何委符守之重而為逋逃之人乎肅拔刃向爽曰掾促去太守今急何暇此計爽抱馬固諫肅遂殺爽而走帝聞之徵肅棄市度睦減死一等復爽門閭拜家一人為郎於是以右校令度尚為荆州刺史討長沙賊平之又遣車騎將軍馮緄討武陵蠻並皆降散軍還賊復寇桂陽太守廖祈奔走廖音力弔反武陵蠻亦更攻其郡太守陳奉率吏人擊破之斬首三千餘級降者二千餘人至靈帝中平三年武陵蠻復叛寇郡界州郡擊破之禮記稱南方曰蠻雕題交阯其俗男女同川而浴故曰交阯題額也雕之謂刻其肌以丹青湼也其西有噉人國生首子輙解而食之謂之宜弟味㫖則以遺其君君喜而賞其父取妻美則讓其兄今烏滸人是也萬震南州異物志曰烏滸地名也在廣州之南交州之北恒出道間伺候行旅輙出擊之利得人食之不貪其財貨並以其肉為肴葅又取其髑髏破之以飲酒以人掌趾為珍異以食老也交阯之南有越裳國周公居}
