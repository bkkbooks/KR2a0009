  - {type: variant, offset: 58, length: 2, content: 思心, WYG: 蠢爾蠻荆大邦為讎毛詩小雅序曰采芑宣王南征也薄言采芑于彼新田顯允方叔振旅闐闐蠢爾蠻荆大邦為讎注云方叔卿士命而為將也明其黨衆繁多是以抗敵諸夏也平王東遷蠻遂侵暴上國晉文侯輔政乃率蔡共侯擊破之晉文侯仇也至楚武王時蠻與羅子共敗楚師殺其將屈瑕左傳楚屈瑕伐羅及鄢亂次以濟其水遂無次且}
  - {type: variant, offset: 58, length: 2, content: 思心, krp: 蠢爾蠻荆大邦為讎毛詩小雅序曰采芑宣王南征也薄言采芑于彼新田顯允方叔振旅闐闐蠢爾蠻荆大邦為讎注云方叔卿士命而為將也明其黨衆繁多是以抗敵諸夏也平王東遷蠻遂侵暴上國晉文侯輔政乃率蔡共侯擊破之晉文侯仇也至楚武王時蠻與羅子共敗楚師殺其將屈瑕左傳楚屈瑕伐羅及鄢亂次以濟其水遂無次且}
  - {type: variant, offset: 61, length: 1, content: 容, WYG: 設備羅與盧戎兩軍之大敗之莫敖縊于荒谷羣帥囚于冶父也莊王初立莊王名旅桓王之子民飢兵弱復為所寇楚師既振然後乃服自是遂屬於楚鄢陵之役蠻與恭王合兵擊晉左傳晉楚戰于鄢陵晉卻至曰楚二卿相惡王卒以舊鄭陳而不整蠻軍而不陳也及吳起相悼王南幷蠻越遂有洞庭蒼梧秦昭王使白起伐楚畧取蠻夷始置黔中郡漢興改為武陵黔中故城在今辰州沅陵縣西歲令大人輸布一匹小口二丈}
