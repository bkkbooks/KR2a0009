  - {type: variant, offset: 1834, length: 0, content: '', WYG: 春旄牛夷叛攻零關郡國志零關道屬越巂郡殺長吏益州刺史張喬與西部都尉擊破之於是分置蜀郡屬國都尉領四縣如太守桓帝永夀二年蜀郡夷叛殺畧吏民延熹三年蜀郡三襄夷寇蠶陵殺長吏四年犍為屬國夷寇郡界益州刺史山昱擊破之斬首千四百級餘皆解散靈帝時以蜀郡屬國為漢嘉郡冉駹夷者武帝所開元鼎六年以為汶山郡至地節三年宣帝年也夷人以立郡賦重宣帝乃省幷蜀郡為北部都尉其山有六夷}
