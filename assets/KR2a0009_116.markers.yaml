  - {type: variant, offset: 1310, length: 1, content: 右, WYG: 尉一居旄牛主徼外夷一居青衣主漢人永平中益州刺史梁國朱輔好立功名慷慨有大畧東觀記輔作酺梁國寧陵人在州數歲宣示漢德威懷遠夷自汶山以西前世所不至正朔所未加白狼槃木唐菆等百餘國戸百三十餘萬口六百萬以上舉種奉貢稱為臣僕輔上疏曰臣聞詩云彼徂者岐有夷之行詩周頌也傳曰岐道雖僻而人不遠韓詩薛君傳曰徂往也夷易也行道也彼百姓歸文王者皆曰岐有易道可往歸矣易道謂仁義之道而易行故岐道阻險而人不難詩人誦詠以為符驗今白狼王唐菆等慕化歸義作詩三章路經卭來大山零高坂山海經曰崍山江水出焉郭璞曰中江所出也華陽國志曰卭來山一名卭莋故卭人莋人界也巖阻峻回曲折乃至山上凝氷夏結冬則劇寒王陽行部至此而退者也有長貧苦採八度之難陽毋閎峻並坂名峭危峻險百倍岐道言詩人雖歎岐道之阻但以文王之道人以為夷易今卭來峭危甚於岐繦負老㓜若歸慈母遠夷之語辭意難正草木異種鳥獸殊類有犍為郡掾田恭與之習狎頗曉其言臣輒令訊其風俗譯其辭語今遣從事史李陵與恭護送詣闕幷上其樂詩昔在聖帝舞四夷之樂解見陳禪傳今之所上庶備其一帝嘉之事下史官錄其歌焉東觀記載其歌並載夷人本語並重譯訓詁為華言今范史所載者是也今錄東觀夷言以為此注也遠夷樂德歌詩曰大漢是治提官隗搆與天意合魏冒踰糟吏譯平端罔譯劉脾不從我來旁莫支留聞風向化徵衣隨旅所見奇異知唐桑艾多賜繒布邪毗􅀈䋠甘美酒食推潭僕遠昌樂肉飛拓拒蘇便屈伸悉備局後仍離蠻夷貧薄僂讓龍洞無所報嗣莫支度由願主長壽陽雒僧鱗子孫昌熾莫穉角存遠夷慕德歌詩曰蠻夷所處僂讓皮尼日入之部且交陵悟慕義向化繩動隨旅歸日出主路且倲雒聖德深恩聖德渡諾與人富厚魏菌度洗冬多霜雪綜邪流藩夏多和雨莋邪尋螺寒溫時適藐潯瀘灕部人多有菌補邪推渉危歴險辟危歸險不遠萬里莫受萬栁去俗歸德術疊附德心歸慈母仍路孳摸遠夷懷德歌曰荒服之外荒服之儀土地墝埆犁籍憐憐食肉衣皮阻蘇邪犁不見鹽穀莫碭麤沐吏譯傳風罔譯傳微大漢安樂是漢夜拒􅂝負歸仁蹤優路仁觸冒險陜雷折險龍高山岐峻倫狼藏幢緣崖磻石}
