  - {type: variant, offset: 526, length: 0, content: '', krp: 縣徙呂氏以充之因置不韋縣華陽}
  - {type: variant, offset: 527, length: 0, content: '', WYG: 志曰武帝通博南置不韋縣徙南越相呂嘉子孫宗族資之因名不韋以章其先人之惡行也劉攽曰注通博南出直不韋又宗族資之案文出直本共是置字資當作實斬棟蠶帥凡首虜七千餘人得生口五千七百人馬三千匹牛羊三萬餘頭諸夷悉平肅宗元和中蜀郡王追為太守政化尤異有神馬四匹出滇池河中甘露降白烏見始興起學校漸遷其俗靈帝熹平五年諸夷反叛執太守雍陟遣御史中丞朱龜討之不能剋朝議以為郡在邊外蠻夷喜叛勞師遠役不如棄之大尉掾巴郡李顒建策討伐乃拜顒益州太守與刺史龐芝發板楯蠻擊破平之還得雍陟顒卒後夷人復叛以廣漢景毅為太守討定之毅初到郡米斛萬錢漸以仁恩少年間米至數}
