  - {type: variant, offset: 2023, length: 380, content: 涌出井溢壞寺屋殺人時梁太后攝政兄冀枉殺李固杜喬三年郡國五山崩和平元年七月廣漢梓潼山崩永興二年六月東海朐山崩冬十二月泰山琅邪盜賊羣起永壽三年七月河東地裂時梁皇后兄冀秉政桓帝欲自由內患之延熹元年七月乙巳左馮翊雲陽地裂三年五月戊申甲戌漢中山崩是時上寵恣中常侍單超等四年六月庚子泰山博尤來山判解八年六月丙辰緱氏地裂永康元年五月丙午雒陽高平永壽亭上黨泫氏地各裂是時朝臣患中常侍王甫等專恣冬桓帝崩明年竇氏等欲誅常侍黃門不果更為所誅靈帝建寧四年五月河東地裂十二處裂合長十里百七十步廣者三十餘步深不見底和帝永元五年五月戊寅南陽大風拔樹木安帝永初元年大風拔樹是時鄧太后攝政以清河王子年少號精耳故立之是為安帝不立皇太子勝以為安帝賢必當德鄧氏也後安帝親讒廢免鄧氏令郡縣迫切死者八九人家至破壞此為瞉霿也是後西羌亦大亂涼州十有餘年二年六月京都及郡國四十大風拔樹三年五月癸酉京都大風拔南郊, WYG: 經云羊腸盤}
