  - {type: variant, offset: 530, length: 0, content: '', WYG: 雷疾雨南風飄起水為逆流翻涌二百餘里箄船沈没哀牢之衆溺死數千人賢栗復遣其六王將萬人以攻鹿茤鹿茤王與戰殺其六王哀牢耆老共埋六王夜虎復出其尸而食之餘衆驚怖引去賢栗惶恐謂其耆老曰我曹入邊塞自古有之今攻鹿多輒被天誅中國其有聖帝乎天祐助之何其明也二十}
  - {type: variant, offset: 530, length: 0, content: '', krp: 雷疾雨南風飄起水為逆流翻涌二百餘里箄船沈没哀牢之衆溺死數千人賢栗復遣其六王將萬人以攻鹿茤鹿茤王與戰殺其六王哀牢耆老共埋六王夜虎復出其尸而食之餘衆驚怖引去賢栗惶恐謂其耆老曰我曹入邊塞自古有之今攻鹿多輒被天誅中國其有聖帝乎天祐助之何其明也二十}
  - {type: variant, offset: 532, length: 0, content: '', WYG: 賢栗等遂率種人戸二千七百七十口萬七千六百五十九詣越巂太守鄭鴻降求内屬光武封賢栗等為君長自是歲來朝貢永平十二年哀牢王桞貌遣子率種人内屬其稱邑王者七十七人戸五萬一千八百九十口五十五萬三千七百一十一西南去洛陽七千里顯宗以其地置哀牢博南二縣割益州郡西部都尉所領六縣古今注曰永平十年置益州西部都尉居巂唐續漢志六縣謂不韋巂唐比蘇楪榆邪龍雲南也合為永昌郡始通博南山度蘭倉水華陽國志曰博南縣西山高三十里越之度蘭滄水也行者苦之歌曰漢德廣開不賔度博南越蘭津度蘭倉為它人哀牢人皆穿鼻儋耳其渠帥自謂王者耳皆下肩三寸庶人則至肩而已土地沃美宜五穀蠶桑知染采文繡􅄢毲􅄢解見李恂傳毲未詳帛疊外國傳曰諸薄國女子織作白疊花布蘭干細布華陽國志曰蘭干獠言紵織成文章如綾錦有梧桐木華績以為布廣志曰梧桐有白者剽國有桐木其華有白毳取其毳淹漬緝織以為布也幅廣五尺潔白不受垢汙先以覆亡人然後服之其竹節相去一丈名曰濮竹見華陽國志出銅鐵鉛錫金銀光珠華陽國志曰蘭滄水有金沙洗取融為金有光珠穴博物志曰光珠即江珠也虎魄廣雅曰虎魄生地中其上及旁不生草深者八九尺大如斛削去皮成虎魄如斗初時如桃膠凝堅乃成博物志曰松脂淪入地千年化為茯苓茯苓千歲化為虎魄今大山有茯苓而無虎魄永昌有虎魄而無茯苓也水精瑠璃軻蟲蚌珠徐衷南方草物狀曰凡採珠常三月用五牲祈禱若祠祭有失則風攬海水或有大魚在蚌左右蚌珠長三寸半凡二品珠也孔雀翡翠犀象猩猩貊獸酈元水經注曰猩猩形若狗而人靣頭顏端}
