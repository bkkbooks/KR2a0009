  - {type: variant, offset: 533, length: 3, content: 月壬寅, WYG: 善與人言音聲妙麗如婦人對語聞之無不酸楚南中志曰猩猩在山谷中行無常路百數為羣土人以酒若糟設於路又喜屩子土人織草為屩數十䩫相連結猩猩在山谷見酒及屩知其設張者即知張者先祖名字乃呼其名而罵云奴欲張我捨之而去去而又還相呼試共嘗酒初嘗少許又取屩子著之若進兩三升便大醉人出收之屩子相連不得去執還内牢中人欲取者到牢邊語云猩猩汝可自相推肥者出之既擇肥竟相對而泣即左思賦云猩猩啼而就禽者也昔有人以猩猩餉封溪令令問餉何物猩猩自於籠中曰但有酒及僕耳無它飲食南中八郡志曰貊大如驢狀頗似熊多力食鐵所觸無不拉廣志曰貊色蒼白其皮溫煖雲南縣有神鹿兩頭能食毒草見華陽國志先是西部都尉廣漢鄭純為政清絜化行夷貊君長感慕皆獻土珍頌德美天子嘉之即以為永昌太守純與哀牢夷人約邑豪歲輸布貫頭衣}
