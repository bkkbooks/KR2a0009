  - {type: variant, offset: 510, length: 0, content: '', WYG: 刺史朱儁擊破之六年日南徼外國復來貢獻巴郡南郡蠻本有五姓巴氏樊氏瞫氏音審相氏鄭氏皆出於武落鍾離山代本曰廪君之先故出巫誕也其山有赤黑二穴巴氏之子生於赤穴四姓之子皆生黑穴未有君長俱事鬼神乃共擲劒於石穴約能中者奉以為君巴氏子務相乃獨中之衆皆歎又令各乘土舩約能浮者當以為君餘姓悉沈唯務相獨浮因共立之是為廪君乃乘土舩從夷水至鹽陽荆州圖曰副夷縣西有溫泉古老相傳此泉原出鹽于今水有鹽氣縣西一獨山有石穴有二大石並立穴中相去可一丈俗名為陰陽石陰石常濕陽石常燥盛𢎞之荆州記曰昔廪君浮夷水射鹽神于陽石之上按今施州清江縣水一名鹽水源出清江縣西都亭山水經云夷水巴郡魚復縣注云水色清照十文分沙石蜀人見澄清因名清江也劉攽曰注夷水巴郡魚復縣按文少一經字鹽水有神女謂廪君曰此地廣大魚鹽所出願留共居廪君不許鹽神暮輒來取宿旦即化為蟲與諸蟲羣飛掩蔽日光天地晦㝠積十餘日廪君思其便因射殺之天乃開明代本曰廪君使人操青縷以遺鹽神曰嬰此即相宜云與女俱生宜將去鹽神受縷而嬰之廪君即立陽石上應青縷而射之中鹽神鹽神死天乃大開也劉攽曰注即相宜云與女俱生宜將去按文少一不字廪君於是君乎夷城此已上並見代本也四姓皆臣之廪君死魂魄世為白虎巴氏以虎飲人血遂以人祠焉及秦惠王幷巴中以巴氏為蠻夷君長世尚秦女其民爵比不更劉攽曰巴氏之君可有爵耳民何故輒得之明衍民字有罪得以爵除其君長歲出賦二千一十六錢三歲一出義賦千八百錢其民戸出幏布八丈二尺雞羽三十鍭說文幏南蠻夷布也音公亞反毛詩四鍭既均儀禮矢鍭一乘鄭𤣥注曰鍭猶候也候物而射之也三十鍭一百四十九俗本幏作䝉鍭作鏃者並誤也劉攽曰注按鍭三羽當九十若四矢為一鍭則三百六十無緣得一百四十九未詳漢興南郡太守靳彊請一依秦時故事至建武二十三年南郡潳山蠻雷遷等始反叛潳音屠寇掠百姓遣武威將軍劉尚將萬餘人討破之徙其種人七千餘口置江夏界中今酒中蠻是也和帝永元十三年巫蠻許聖等巫縣屬南郡以郡收稅不均懷怨恨遂屯聚反叛明年夏遣使者督荆州諸郡兵萬餘人討之聖等依憑阻隘久不破諸軍乃分道並進或自巴郡魚復數路攻之蠻乃散走斬其渠帥乘勝追之大破聖等聖等乞降復悉徙置江夏靈帝建寧二年江夏蠻叛州郡討平之光和三年江夏蠻復反與廬江賊黄穰相連結十餘萬人攻没四縣寇患累年廬江太守陸康討破之餘悉降散板楯蠻夷者秦昭襄王時有一白虎常從羣虎數遊秦蜀巴漢之境傷害千餘人昭王乃重募國中有能殺虎者賞邑萬家金百鎰時有巴郡閬中夷人能作白竹之弩乃登樓射殺白虎華陽國志曰巴夷廖仲等射殺之也昭王嘉之而以其夷人不欲加封乃刻石盟要復夷人頃田不租十妻不算優寵之故一戸免其一頃田之稅雖有十妻不輸口算之錢復音福傷人者論殺人者得以倓錢贖死何承天纂文曰倓蠻夷贖罪貨也音徒濫反盟曰秦犯夷輸黃龍一雙夷犯秦輸清酒一鍾夷人安之至高祖為漢王發夷人還伐三秦秦地旣定乃遣還巴中復其渠帥羅朴督鄂度夕龔七姓不輸租賦餘戸乃歲入賨錢口四十世號為板楯蠻夷閬中有渝水其人多居水左右天性勁勇初為漢前鋒數陷陳俗喜歌舞喜音虚記反高祖觀之曰此武王伐紂之歌也乃命樂人習之所謂巴渝舞也遂世世服從至於中興郡守常率以征伐桓帝之世板楯數反太守蜀郡趙溫以恩信降服之靈帝光和三年巴郡板楯復叛寇掠三蜀及漢中諸郡靈帝遣御史中丞蕭瑗督益州兵討之連年不能剋帝欲大發兵乃問益州計吏考以征討方畧漢中上計程包對曰板楯七姓射殺白虎立功先世復為義人其人勇猛善於兵戰昔永初中羌入漢川郡縣破壞得板楯救之羌死敗殆盡故號為神兵羌人畏忌傳語種輩勿復南行至建和二年羌復大入實賴板楯連摧破之前車騎將軍馮緄南征武陵雖受丹陽精兵之銳史記曰周成王封楚熊繹始居丹陽今歸州秭歸縣東南故城是也至楚文王始自丹陽遷於郢續漢志云南郡枝江縣有丹陽聚也亦倚板楯以成其功近益州郡亂太守李顒亦以板楯討而平之忠功如此本無惡心長吏鄉亭更賦至重僕役箠楚過於奴虜亦有嫁妻賣子或乃至自頸割雖陳寃州郡而牧守不為通理闕庭悠遠不能自聞含怨呼天叩心窮谷愁苦賦役困罹酷刑故邑落相聚以致叛戾非有謀主僭號以圖不軌今但選明能牧守自然安集不煩征伐也帝從其言遣太守曹謙宣詔赦之即皆降服至中平五年巴郡黄巾賊起板楯蠻夷因此復叛寇掠城邑遣西園上軍别部司馬趙瑾討平之西南夷西南夷者在蜀郡徼外有夜郎國東接交阯西有滇國北有卭都國各立君長其人皆椎結左袵邑聚而居能耕田其外又有巂昆明諸落西極同師東北至葉榆葉榆縣屬益州郡葉或作楪臣賢按前書曰西自同師以東北至葉榆名為巂昆明今流俗諸本並作布舊昆明蓋巂字誤分為布舊也地方數千里無君長辮髮隨畜遷徙無常自巂東北有莋都國東北有冉駹國或土著或隨畜遷徙自冉駹東北有白馬國氐種是也此三國亦有君長夜郎者初有女子浣於遯水有三節大竹流入足間聞其中有號聲剖竹視之得一男兒歸而養之及長有才武自立為夜郎侯以竹為姓見華陽國志武帝元鼎六年平南夷為牂柯郡夜郎侯迎降天子賜其王印綬後遂殺之夷獠咸以竹王非血氣所生甚重之求為立後牂柯太守吳霸以聞天子乃封其三子為侯死配食其父今夜郎縣有竹王三郎神是也前書地理志曰夜郎縣有遯水東至廣鬱華陽國志云遯水通鬱林有三郎祠皆有靈響又云竹王所捐破竹於野成竹林今王祠竹林是也王嘗從人止大石上命作􅅅從者白無水王以劒擊石出水今竹王水是也初楚頃襄王時遣將莊豪從沅水伐夜郎軍至且蘭椓舩於岸而歩戰既滅夜郎因留王滇池以且蘭有椓舩牂柯處乃改其名為牂柯異物志曰牂柯繫舩杙也牂柯地多雨潦俗好巫鬼禁忌寡畜生又無蠶桑故其郡􅇰貧句町縣有桄桹木可以為麫百姓資之臨海異物志曰桄桹术外皮有毛似栟櫚而散生其木剛作鋘鋤利如鐵中石更利唯中蕉根乃致敗耳皮中有似擣稻米片又似麥麫中作餅餌廣志曰桄桹樹大四五圍長五六丈洪直旁無枝條其顚生葉不過數十似㯶葉破其木肌堅難傷入數寸得麫赤黄密緻可食也公孫述時大姓龍傅尹董氏與郡功曹謝暹保境為漢乃遣使從番禺江奉貢南越志曰番禺縣之西有江浦焉光武嘉之並加襃賞桓帝時郡人尹珍自以生於荒裔不知禮義乃從汝南許愼應奉受經書圖緯學成還鄉里教授於是南域始有學焉珍官至荆州刺史華陽國志曰尹珍字道眞母斂縣人也滇王者莊蹻之後也元封二年武帝平之以其地為益州郡割牂柯越巂各數縣配之後數年復幷昆明地皆以屬之此郡有池周回二百餘里水源深廣而末更淺狹有似倒流故謂之滇池河土平敞多出鸚鵡孔雀有鹽池田漁之饒金銀畜產之富人俗豪忲忲奢侈也居官者皆富及累世及王莽政亂益州郡夷棟蠶若豆等起兵殺郡守越巂姑復夷人大牟亦皆叛殺畧吏人莽遣寧始將軍廉丹發巴蜀吏人及轉兵穀卒徒十餘萬擊之吏士飢疫連年不能剋而還以廣漢文齊為太守造起陂池開通溉灌墾田二千餘頃率厲兵馬脩障塞降集羣夷甚得其和及公孫述據益土齊固守拒險述拘其妻子許以封侯齊遂不降聞光武即位乃間道遣使自聞蜀平徵為鎭遠將軍封成義侯取其嘉名於道卒詔為起祠堂郡人立廟祀之建武十八年夷渠帥棟蠶與姑復楪榆挵棟連然滇池建怜昆明諸種反叛殺長吏姑復縣屬越巂郡餘六縣並屬益州郡也益州太守繁勝與戰而敗退保朱提縣屬犍為郡朱音殊提音匙十九年遣武威將軍劉尚等發廣漢犍為蜀郡人及朱提夷合萬三千人擊之尚軍遂渡瀘水入益州界瀘水一名若水出旄牛徼外經朱提至􅈎道入江在今巂州南特有瘴氣}
