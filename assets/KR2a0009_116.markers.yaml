  - {type: variant, offset: 226, length: 5, content: 國十三地震, WYG: 也著赤幘稱將軍燒官寺抄掠百姓州郡募善蠻討平之順帝永和元年武陵太守上書以蠻夷率服可比漢人増其租賦議者皆以為可尚書令虞詡獨奏曰自古聖王不臣異俗非德不能及威不能加知其獸心貪婪難率以禮是故羇縻而綏撫之附則受而不逆叛則棄而不追先帝舊典貢税多少所由來久矣今猥增之必有怨叛計其所得不償所費必有後悔帝不從其冬澧中漊中蠻果爭貢布非舊約遂殺鄉吏舉種反叛明年}
