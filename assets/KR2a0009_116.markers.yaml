  - {type: variant, offset: 1240, length: 0, content: '', WYG: 郡徼外夷大羊等八種戸三萬一千口十六萬七千六百二十慕義内屬時郡縣賦斂煩數五年以巻夷大牛種封離等反畔殺遂久令遂久故縣在今靡州界明年永昌益州及蜀郡夷皆叛應之衆遂十餘萬破壞二十餘縣殺長吏燔燒邑郭剽畧百姓骸骨委積千里無人詔益州刺史張喬選堪能從事討之喬乃遣從事楊竦將兵至楪榆擊之賊盛未敢進先以詔書告示三郡密徵求武士重其購賞乃進軍與封離等戰大破之斬首三萬餘級獲生口千五百人資財四千餘萬悉以賞軍士封離等惶怖斬其同謀渠帥詣竦乞降竦厚加慰納其餘三十六種皆求降附竦因奏長吏姦猾侵犯蠻夷者}
  - {type: page-break, offset: 1240, content: '', id: KR2a0009_WYG_116-27b, image: WYG0253/WYG0253-0662b.png}
  - {type: variant, offset: 1240, length: 0, content: '', krp: 郡徼外夷大羊等八種戸三萬一千口十六萬七千六百二十慕義内屬時郡縣賦斂煩數五年以巻夷大牛種封離等反畔殺遂久令遂久故縣在今靡州界明年永昌益州及蜀郡夷皆叛應之衆遂十餘萬破壞二十餘縣殺長吏燔燒邑郭剽畧百姓骸骨委積千里無人詔益州刺史張喬選堪能從事討之喬乃遣從事楊竦將兵至楪榆擊之賊盛未敢進先以詔書告示三郡密徵求武士重其購賞乃進軍與封離等戰大破之斬首三萬餘級獲生口千五百人資財四千餘萬悉以賞軍士封離等惶怖斬其同謀渠帥詣竦乞降竦厚加慰納其餘三十六種皆求降附竦因奏長吏姦猾侵犯蠻夷者}
  - {type: variant, offset: 1241, length: 3, content: 月己卯, WYG: 十人皆減死州中論功未及上會竦病創卒張喬深痛惜之乃刻石勒銘圖畫其像天子以張翕有遺愛乃拜其子湍為太守夷人懽喜奉迎道路曰郎君儀貌類我府君後湍頗失其心有欲叛者諸夷耆老相曉語曰當為先府君故遂以得安後順桓間廣漢馮顥為太守政化尤多異迹云莋都夷者武帝所開以為莋都縣其人皆被髪左袵言語多好譬類居處畧與汶山夷同土出長年神藥仙人山圖所居焉劉向列仙傳曰山圖隴西人好乘馬馬蹋折脚山中道士教服}
