  - {type: variant, offset: 1835, length: 1, content: 月, WYG: 羌九氐各有部落其王侯頗知文書而法嚴重貴婦人黨母族死則燒其尸土氣多寒在盛夏氷猶不釋故夷人冬則避寒入蜀為傭夏則違暑反其邑衆皆依山居止累石為室高者至十餘丈為卭籠按今彼土夷人呼為雕也又土地剛鹵不生穀粟麻菽唯以麥為資而宜畜牧有旄牛無角一名童牛肉重千斤毛可為眊出名馬有靈羊可療毒本草經曰靈羊角味鹹無毒主療青肓蠱毒去惡鬼安心氣彊筋骨也又有食藥鹿鹿麑有胎者其腸中糞亦療毒疾又有五角羊麝香輕毛毼雞牲牲郭璞注山海經曰毼雞似雉而大青色有毛角鬭敵死乃止其人能作旄氈班􅄢青頓毞毲羊羧之屬青頓毲羧並未詳字書無此二字周書伊尹為四方獻令曰正西昆侖狗國鬼親枳已闒茸貫匈雕題離丘漆齒請令以}
