  - {type: variant, offset: 998, length: 219, content: 金城隴西地震裂城郭室屋多壞壓殺人閏月己酉京都地震十月西羌二千餘騎入金城塞為涼州害四年三月乙亥京都地震五年二月戊申京都地震建康元年正月涼州都部郡六地震從去年九月以來至四月凡百八十日地震山谷坼裂壞敗城寺傷害人物三月護羌校尉趙沖為叛胡所殺九月丙午京都地震是時順帝崩梁太后攝政欲為順帝作陵制度奢廣多壞吏民冢尚書欒巴諫事太后怒癸卯詔書收巴下獄欲殺之丙午地震於是太后乃出巴免為庶人桓帝建和元年四月庚寅京都地震九月丁卯京都地震是時梁太后攝政兄冀持權至和, WYG: 永}
