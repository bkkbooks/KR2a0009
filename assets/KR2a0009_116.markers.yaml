  - {type: variant, offset: 7, length: 0, content: '', WYG: 宋宣城太守范煜撰唐章懷太子賢注南蠻西南夷傳第七十六南蠻昔高辛氏有犬戎之寇高辛帝嚳帝患其侵暴而征伐不剋乃訪募天下有能得犬戎之將吳將軍頭者購黄金千鎰邑萬家又妻以少女時帝有畜狗其毛}
  - {type: page-break, offset: 7, content: '', id: KR2a0009_WYG_116-1b, image: WYG0253/WYG0253-0649b.png}
  - {type: variant, offset: 7, length: 0, content: '', krp: 宋宣城太守范煜撰唐章懷太子賢注南蠻西南夷傳第七十六南蠻昔高辛氏有犬戎之寇高辛帝嚳帝患其侵暴而征伐不剋乃訪募天下有能得犬戎之將吳將軍頭者購黄金千鎰邑萬家又妻以少女時帝有畜狗其毛}
  - {type: variant, offset: 8, length: 0, content: '', WYG: 采名曰槃瓠魏畧曰高辛氏有老婦居王室得耳疾挑之乃得物大如繭婦人盛瓠中覆之以槃俄頃化為犬其文五色因名槃瓠下令之後槃瓠遂銜人頭造闕下羣臣怪而診之乃吳將軍首也診候視也帝大喜而計槃瓠不可妻之以女又無封爵之道議欲有報而未知所宜女聞之以為帝皇下令不可違信因請}
  - {type: variant, offset: 8, length: 0, content: '', krp: 采名曰槃瓠魏畧曰高辛氏有老婦居王室得耳疾挑之乃得物大如繭婦人盛瓠中覆之以槃俄頃化為犬其文五色因名槃瓠下令之後槃瓠遂銜人頭造闕下羣臣怪而診之乃吳將軍首也診候視也帝大喜而計槃瓠不可妻之以女又無封爵之道議欲有報而未知所宜女聞之以為帝皇下令不可違信因請}
  - {type: variant, offset: 9, length: 2, content: 四地, WYG: 帝不得已乃以女配槃瓠槃瓠得女負而走入南山止石室中所處險絶人跡不至今辰州盧溪縣西有武山黄閔武陵記曰山高可萬仞山半有槃瓠石室可容數萬人中有石牀槃瓠行跡今案山窟前有石羊石獸古跡奇異尤多望石窟大如三間屋遙見一石仍似狗形蠻俗相傳云是槃瓠象也於是女解去衣裳為僕鑒之結著獨力之衣僕鑒獨力皆未詳流俗本或有改鑒字為䜿者妄穿鑿也結音髻帝悲思之遣使尋求輒遇風雨}
  - {type: page-break, offset: 9, content: '', id: KR2a0009_WYG_116-2a, image: WYG0253/WYG0253-0649c.png}
  - {type: variant, offset: 9, length: 2, content: 四地, krp: 帝不得已乃以女配槃瓠槃瓠得女負而走入南山止石室中所處險絶人跡不至今辰州盧溪縣西有武山黄閔武陵記曰山高可萬仞山半有槃瓠石室可容數萬人中有石牀槃瓠行跡今案山窟前有石羊石獸古跡奇異尤多望石窟大如三間屋遙見一石仍似狗形蠻俗相傳云是槃瓠象也於是女解去衣裳為僕鑒之結著獨力之衣僕鑒獨力皆未詳流俗本或有改鑒字為䜿者妄穿鑿也結音髻帝悲思之遣使尋求輒遇風雨}
