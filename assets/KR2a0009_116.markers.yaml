  - {type: variant, offset: 461, length: 1, content: 訖, WYG: 中郎李固駮曰若荆揚無事發之可也今二州盜賊槃結不散武陵南郡蠻夷未輯長沙桂陽數被徵發如復擾動必更生患其不可一也又兗豫之人卒被徵發遠赴萬里無有還期詔書迫促必致叛亡其不可二也南州水土溫暑加有瘴氣致死亡者十必四五其不可三也遠渉萬里士卒疲勞比至領南不復堪鬭其不可四也軍行三十里為程而去日南九千餘里三百日乃到計人禀五升古升小故曰五升也用米六十萬斛不計將吏驢馬之食但負甲自致費便若此其不可五也設軍到所在死亡必衆既不足禦敵當復更發此為刻割心腹以補四支其不可六也九眞日南相去千里發其吏民猶尚不堪何况乃苦四州之卒以赴萬里之艱哉其不可七也前中郎將尹就討益州叛羌益州諺曰虜來尚可尹來殺我後就徵還以兵付刺史張喬喬因其將吏旬月之間破殄寇虜此發將無益之效州郡可任之驗也宜更選有勇畧仁惠任將帥者以為刺史太守悉使共住交阯今日南兵單無穀守既不足戰又不能可一切徙其吏民北依交阯事靜之後乃命歸本還募蠻夷使自相攻轉輸金帛以為其資有能反間致頭首者許以封侯列土之賞故幷州刺史長沙祝良性多勇决又南陽張喬前在益州有破虜之功皆可任用昔太宗就加魏尚為雲中守前書曰槐里人魏尚為雲中守以斬首捕虜上功不實免馮唐言之於文帝帝令唐持節赦尚復以為雲中守劉攽曰注前書曰案文多一曰字哀帝即拜龔舍為太山太守前書曰舍字君倩初徴為諫大夫病免復徴為博士又病去頃之哀帝遣使即楚拜舍為太山太守宜即拜良等便道之官四府悉從固議即拜祝良為九眞太守張喬為交阯刺史喬至開示慰誘並皆降散良到九眞單車入賊中設方畧招以威信降者數萬人皆為良築起府寺由是嶺外復平}
