  - {type: variant, offset: 12, length: 0, content: '', WYG: 晦使者不得進經三年生子一十二人六男六女槃瓠死後因自相夫妻織績木皮染以草實好五色衣服製裁皆有尾形干寳晉紀曰武陵長沙廬江郡夷槃瓠之後也雜處五溪之内憑}
  - {type: variant, offset: 12, length: 0, content: '', krp: 晦使者不得進經三年生子一十二人六男六女槃瓠死後因自相夫妻織績木皮染以草實好五色衣服製裁皆有尾形干寳晉紀曰武陵長沙廬江郡夷槃瓠之後也雜處五溪之内憑}
  - {type: variant, offset: 13, length: 4, content: 崩地陷大, WYG: 阻險每每常為害糅雜魚肉叩槽而號以祭槃瓠俗稱赤髀横裙即其子孫其母後歸以狀白帝於是使迎致諸子衣裳斑蘭語言侏離侏離蠻夷語聲也好入山壑不樂平曠帝順其意賜以名山廣澤其後滋蔓號曰蠻夷外癡内黠安土重舊以先父有功母帝之女田作賈販無關梁符傳租稅之賦優寵之故蠲其賦役也荆州記曰沅陵縣居酉口有上就武陽二鄉唯此是槃瓠子孫狗種也二鄉在武溪之北有邑君長皆賜印綬冠用獺皮名渠帥曰精夫相呼為姎徒說文曰姎女人自稱姎我也音胡朗反此已上並見}
