  - {type: variant, offset: 457, length: 3, content: 攝政專, krp: 遣侍御史任逴音卓奉詔赦之賊皆降散延光元年九眞徼外蠻貢獻内屬三年日南徼外蠻復來内屬順帝永建六年日南徼外葉調王便遣使貢獻帝賜調便金印紫綬劉攽曰按國名葉調其王名便此作調便衍一調字也永和二年日南象林徼外蠻夷區憐等數千人攻象林縣燒城寺殺長吏交阯刺史樊演發交阯九眞二郡兵萬餘人救之兵士憚遠役遂反攻其府二郡雖擊破反者而賊勢轉盛會侍御史賈昌使在日南即與州郡幷力討之不利遂為所攻圍歲餘而兵穀不繼帝以為憂明年召公卿百官及四府掾屬問其方畧皆議遣大將發荆揚兗豫四萬人赴之大將軍從}
