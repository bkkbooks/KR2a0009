  - {type: variant, offset: 2748, length: 4, content: 陳睦戊己, WYG: 部守之曹劉攽曰案此部字合作郡動以數百萬計若乃藏山隱海之靈物沉沙棲陸之瑋寶珠玉金碧珊瑚虎珀之類莫不呈表怪麗雕被宮幄焉又其賨幏火毳馴禽封獸之賦軨積於内府火毳即火浣布也馴禽鸚鵡也封獸象也神異經曰南方有火山長四十里廣四五里生不燼之木晝夜火然得烈風不猛暴雨不滅火中有鼠重百斤毛長二尺餘細如絲恒居火中時時出外而色白以水逐沃之即死績其毛織以作布用之若汙以火燒之則清潔也傅子曰長老說漢桓時梁冀作火浣布單衣會賓客行酒公卿朝臣前佯爭酒失杯而沃之冀偽怒解衣而燒之布得火爗然而熾如燒凡布垢盡火滅粲然潔白如水澣也劉攽曰正文軨積於内府按軨字誤當作駢字夷歌巴舞殊音異節之技列倡於外門豈柔服之道必足於斯然亦云致遠者矣蠻夷雖附阻巖谷而䫫有土居連渉荆交之區布護巴庸之外不可量極然其凶勇}
