  - {type: variant, offset: 527, length: 0, content: '', krp: 志曰武帝通博南置不韋縣徙南越相呂嘉子孫宗族資之因名不韋以章其先人之惡行也劉攽曰注通博南出直不韋又宗族資之案文出直本共是置字資當作實斬棟蠶帥凡首虜七千餘人得生口五千七百人馬三千匹牛羊三萬餘頭諸夷悉平肅宗元和中蜀郡王追為太守政化尤異有神馬四匹出滇池河中甘露降白烏見始興起學校漸遷其俗靈帝熹平五年諸夷反叛執太守雍陟遣御史中丞朱龜討之不能剋朝議以為郡在邊外蠻夷喜叛勞師遠役不如棄之大尉掾巴郡李顒建策討伐乃拜顒益州太守與刺史龐芝發板楯蠻擊破平之還得雍陟顒卒後夷人復叛以廣漢景毅為太守討定之毅初到郡米斛萬錢漸以仁恩少年間米至數}
  - {type: variant, offset: 528, length: 1, content: 地, WYG: 云少年未多年也哀牢夷者其先有婦人名沙壹居于牢山嘗捕魚水中觸沈木若有感因懷􅗖十月產子男十人後沈木化為龍出水上沙壹忽聞龍語曰若為我生子今悉何在九子見龍驚走獨小子不能去背龍而坐龍因䑛之其母鳥語謂背為九謂坐為隆因名子曰九隆及後長大諸兄以九隆能為父所䑛而黠遂共推以為王後牢山下有一夫一婦復生十女子九隆兄弟皆娶以為妻後漸相滋長種人皆刻畫其身象龍文衣著尾自此以上並見風俗通也九隆死世世相繼哀牢傳曰九隆代代相傳名號不可得而數至於禁高乃可記知禁高死子吸代吸死子建非代建非死子哀牢代哀牢死子桑藕代桑藕死子栁承代栁承死子栁貌代栁貌死子扈栗代乃分置小王往往邑居散在谿谷絶域荒外山川阻深生人以來未嘗交通中國建武二十三年其王賢栗遣兵乘箄舩箄音蒲佳反縛竹木為箄以當舩也南下江漢擊附塞夷鹿茤茤音多其種今見在鹿茤人弱為所禽獲於是}
