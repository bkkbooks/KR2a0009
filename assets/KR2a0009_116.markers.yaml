  - {type: variant, offset: 283, length: 2, content: 逼迫, WYG: 貪其珍賂漸相侵侮故率數歲一反元帝初元三年遂罷之凡立郡六十五歲逮王莽輔政元始二年日南之南黄支國來獻犀牛凡交阯所統雖置郡縣而言語各異重譯乃通人如禽獸長㓜無别項髻徒跣為髻於項上也以布貫頭而著之後頗徙中國罪人使雜居其間乃稍知言語漸見禮化光武中興錫光為交阯任延守九眞於是教其耕稼制為冠履初設媒娉始知姻娶建立學校導之禮義建武十二年九眞徼外蠻里張游里蠻之别號今呼為俚人率種人慕化内屬封為歸漢里君明年南越徼外蠻夷獻白雉白莵至十六年交阯女子徵側及其妹徵貳反攻郡徵側者麊泠縣雒將之女也麊音莫支反泠音零嫁為朱䳒人詩索妻甚雄勇交阯太守蘇定以法繩之側忿故反於是九眞日南合浦蠻里}
