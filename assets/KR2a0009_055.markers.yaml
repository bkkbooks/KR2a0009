  - {type: variant, offset: 152, length: 0, content: '', WYG: 郡國螟傷稼犬牙縁界不入中牟河南尹袁安聞之疑其不寔使仁恕掾肥親往廉之仁恕掾主獄屬河南尹見漢官儀廉察也恭隨行阡陌俱坐桑下有雉過止其傍傍有童兒親曰兒何不捕之兒言雉方将雛親瞿然而起瞿音久住反與恭訣曰所以來者欲察君之政迹耳今蟲不犯境此一異也化及鳥獸此二異也豎子有仁心此三異也久留徒擾賢者耳還府具以狀白安是嵗嘉禾生恭便坐廷中便坐於便側之䖏非正室也續漢書云恭謙不矜功封以言府府即奏上尹以檄勞曰君以名徳久屈中牟物產之化流行天降休瑞應行而生尹甚嘉之安因上書言狀}
