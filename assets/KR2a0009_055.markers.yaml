  - {type: variant, offset: 250, length: 0, content: '', WYG: 人罪延十數逮及也辭所連及即追捕之上逆時氣下傷農業案易五月姤用事東觀記曰五月姤卦用事姤卦巽下乾上初六一陰爻生五月之卦也本多作后古字通經曰后以施令誥四方誥理也易姤卦象曰天下有風姤后以施令誥四方乾為天君之象也巽為風號令之象也后君也故以喻人君施令也言君以夏至之曰施命令止四方行者所以助微陰也易復卦曰先王以至日閉關商旅不行故夏至宜止行也五月陰氣始生故曰微陰行者尚止之况於逮召考掠奪其時哉比}
