  - {type: variant, offset: 149, length: 1, content: 殿, WYG: 觀恭特以經明得召與其議與音豫熹復舉恭直言待詔公車拜中牟令恭専以徳化為理不任刑罰訟人許伯等争田累守令不䏻决恭為平理曲直皆退而自責輟耕相讓亭長從人借牛而不肯還之牛主訟於恭恭召亭長勑令歸牛者再三猶不從恭歎曰是教化不行也欲解印綬去掾史泣涕共留之續漢志曰縣置掾史如郡亭長乃慙悔還牛詣獄受罪恭貰不問貰寛貸也音時夜反於是吏人信服建初}
