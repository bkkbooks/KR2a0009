  - {type: variant, offset: 251, length: 5, content: 遂使客隗久, WYG: 水旱傷稼人饑流宂宂散也今始夏百榖權輿陽氣胎飬之時爾雅曰權輿始也萬物皆含胎長飬之時自三月以来隂寒不暖物當化變而不被和氣月令孟夏斷薄刑出輕繫行秋令則苦雨數來五榖不熟鄭𤣥注禮記云申之氣乗之也苦雨白露之類也時物得而傷也又曰仲夏挺重囚益其食挺猶寛也行秋令則草木零落酉之氣乗之也八月宿直昴為獄主}
