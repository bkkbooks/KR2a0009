  - {type: variant, offset: 2714, length: 0, content: '', krp: 年卒年六十六贈車騎将軍印綬位特進諡曰昭列侯子松嗣官至宗正贊曰卓魯款款情慤徳滿款款忠誠也仁感昆蟲愛及胎卵童兒不捕雉也寛霸臨政亦稱優緩後漢書卷五}
  - {type: variant, offset: 2716, length: 248, content: 年薨是為靖王子頃王儀嗣永建二年封儀兄二人為亭侯儀立十七年薨子節王豹嗣永元嘉元年封豹兄四人為亭侯豹立八年薨子暠嗣三十二年遭黃巾賊𠫓廾國走建安十一年國除濟陰悼王長永平十五年封建初四年以東郡之離狐陳留之長垣益濟陰國立十三年薨于京師無子國除論曰晏子稱夫人生厚而用利於是乎正德以幅之謂之幅利言人情須節以正其德亦由布帛須幅以成其度焉明帝封諸子租歲不過二千萬馬后為言而不得也賢哉豈徒儉約而已乎知驕貴之無猒嗜欲之難極也故東京諸侯鮮有至於禍敗者也贊曰孝明傳胤維城八國陳敬嚴重彭城厚德下邳嬰痾梁節邪惑三藩夙齡黨惟荒忒, WYG: ''}
