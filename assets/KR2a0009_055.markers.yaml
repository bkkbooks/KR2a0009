  - {type: variant, offset: 6, length: 4, content: 孝明八王, krp: 五宋宣城太守范煜撰唐章懐太子賢注卓魯魏劉}
  - {type: variant, offset: 13, length: 0, content: '', WYG: 十五卓茂傳卓茂字子康南陽宛人也父祖皆至郡守茂元帝時學於長安事博士江生江生魯人江翁也昭帝時為博士號魯詩宗見前書習詩禮及歴算究極師法稱為通儒性寛仁恭愛鄉黨故舊雖行能與茂不同而皆愛慕欣欣焉東觀記曰茂爲人恬蕩樂道雅實不為華貌行已在於清濁之間自束髪至白首與人未嘗有爭競初辟丞相府史事孔光光稱為長者時嘗出行有人認其馬茂問曰子亡馬幾何時對曰月餘日矣茂有馬數年心知其謬嘿解與之挽車去頋曰若非公馬幸至丞相府歸我他日馬主别得亡者乃詣府送馬叩頭謝之茂性不好争如此後以儒術舉為侍郎給事黄門遷密令密今洛州密縣也勞心諄諄視人如子諄諄忠謹之貌也詩曰誨爾諄諄音之順反舉善而教口無惡言吏人親愛而不忍欺之家語曰宓子賤為單父宰人不忍欺人常有言部亭長受其米肉遺者部謂所部也茂辟左右問之曰亭長為從汝求乎為汝有事囑之而受乎将平居自以恩意遺之乎人曰往遺之耳茂曰遺之而受何故言邪人曰竊聞賢眀之君使人不畏吏吏不取人今我畏吏是以遺之吏既卒受故来言耳茂曰汝為敝人矣凡人所以貴於禽獸者以有仁愛知相敬事也今鄰里長老尚致饋遺此乃人道所以相親况吏與民乎吏顧不當乗威力強請求耳凡人之生羣居雜處故有經紀禮義以相交接汝獨不欲修之寧能高飛逺走不在人間邪亭長素善吏歳時遺之禮也人曰茍如此律何故禁之茂笑曰律設大法禮順人情今我以禮教汝汝必無怨惡以律治汝何所措其手足乎一門之内小者可論大者可殺也且歸念之於是人納其訓吏懐其恩初茂到縣有所廢置吏人笑之鄰城聞者皆嗤其不􅀎河南郡為置守令茂不為嫌理事自若東觀記曰守令與茂並居久之吏人不歸往守令數年教化大行道不拾遺平帝時天下大蝗河南二十餘縣皆被其災獨不入密縣界督郵言之漢書志曰郡監縣有五部部有督郵掾以察諸縣也太守不信自出案行見乃服焉是時王莽秉政置大司農六部丞勸課農桑王莽攝政置大司農部丞十三人人部一州勸課農桑今書及東觀記並言六部遷茂為京部丞密人老少皆涕泣随送及莽居攝以病免歸郡常為門下掾祭酒不肯作職吏更始立以茂為侍中祭酒續漢志曰侍中無員掌侍左右顧問應對夲有僕射一人中興轉為祭酒從至長安知更始政亂以年老乞骸骨歸時光武初即位先訪求茂茂詣河陽謁見東觀記曰茂時年七十餘矣乃下詔曰前密令卓茂束身自脩執節淳固誠䏻為人所不䏻為夫名冠天下當受天下重賞故武王誅紂封比干之墓表商容之閭王子比干紂殺之商容殷賢臣武王入殷命閎天封比干之墓命畢公表商容之閭表旌顯也閭里門也事見史記今以茂為太傅封褒徳侯食邑二千戸東觀記續漢書皆作宣德侯賜几杖車馬衣一襲絮五百斤單複具謂之襲復以茂長子戎為太中大夫次子崇為中郎給事黄門建武}
