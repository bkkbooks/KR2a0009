  - {type: variant, offset: 2710, length: 0, content: '', WYG: 代尹勤為太常明年以病致仕為光禄大夫永初五年拜長樂衛尉以病乞身復為光禄大夫卒於官劉寛傳劉寛字文饒𢎞農華陰人也謝承書曰寛少學歐陽尚書京氏易尤明韓詩外傳星官風角算歴皆究極師法稱為通儒未嘗與人争埶利之事也角隅也觀四隅之風占之也父崎順帝時為司徒崎音丘宜反寛嘗行有人失牛者乃}
  - {type: variant, offset: 2710, length: 0, content: '', krp: 代尹勤為太常明年以病致仕為光禄大夫永初五年拜長樂衛尉以病乞身復為光禄大夫卒於官劉寛傳劉寛字文饒𢎞農華陰人也謝承書曰寛少學歐陽尚書京氏易尤明韓詩外傳星官風角算歴皆究極師法稱為通儒未嘗與人争埶利之事也角隅也觀四隅之風占之也父崎順帝時為司徒崎音丘宜反寛嘗行有人失牛者乃}
  - {type: variant, offset: 2711, length: 2, content: 國立, WYG: 寛車中認之寛無所言下駕歩歸有頃認者得牛而送還叩頭謝曰慙負長者隨所刑罪寛曰物有相類事容脫誤幸勞見歸何為謝之州里服其不校校報也論語曰曾子曰犯而不校桓帝時大將軍辟五遷司徒長史大將軍梁冀也時京師地震特見詢問再遷出為東海相東海王彊曾孫臻之相也延熹八年徴拜尚書令遷南陽太守典歴三郡温仁多恕雖在倉卒未嘗疾言遽色常以為齊之以刑民免而無恥吏人有過但用蒲鞭罰之示辱而已終不加苦事有功善推之自下災異或見引躬克責每行縣止息亭傳輙引學官祭酒及處士諸生執經對講續漢書曰博士祭酒秩六百石祭酒夲僕射也中興改為祭酒處士有道蓺而在家者見父老慰以農里之言少年勉以孝悌之訓人感徳興行日有所化靈帝初徴拜太中大夫侍講華光殿洛陽宫殿簿云華光殿在華林園内遷侍中賜衣一襲轉屯騎校尉遷宗正轉光禄勲嘉平五年代許訓為太尉漢官儀曰許訓字季師平輿人靈帝頗好學蓺每引見寛常令講經寛常於坐被酒睡伏被加也為酒所加也被音平寄反帝問太尉醉邪寛仰對曰臣不敢醉但任重責大憂心如醉帝重其言寛簡略嗜酒不好盥浴說文曰澡手曰盥音管京師以為諺嘗坐客遣蒼頭市酒迂久大醉而還迂久猶良久也客不堪之罵曰畜産寛須㬰遣人視奴疑必自殺頋左右曰此人也罵言畜産辱孰甚焉故吾懼其死也夫人欲試寛令恚伺當朝㑹装嚴己訖使侍婢奉肉羮翻汙朝衣婢遽收之寛神色不異乃徐言曰羮爛汝手其性度如此海内稱為長者後以日食䇿免拜衛尉光和三年復代叚潁為太尉在職三年以日變免又拜永樂少府遷光禄勲以先䇿黄巾逆謀先䇿謂預知也以事上聞封逯鄉侯六百戸逯音録中平}
