  - {type: variant, offset: 265, length: 1, content: 長, WYG: 故時斷之也臣愚以為今孟夏之制可從此令其决獄案考皆以立秋為斷以順時節育成萬物則天地以和刑罰以清矣初肅宗時斷獄皆以冬至之前自後論者互多駮異鄧太后詔公卿以下㑹議恭議奏曰夫陰陽之氣相扶而行發動用事各有時節若不當其時則物隨而傷王者雖質文不同而兹道無變四時之政行之若一月令周世所造而所據皆夏之時也謂氣候及星辰昬旦皆夏時也其變者唯正朔服色犧牲徽號器械而巳夏以建寅為正服色犧牲徽號器械皆尚黒殷以建丑為正尚白周以建子為正尚赤周以夜半為朔殷以雞鳴為朔夏以}
