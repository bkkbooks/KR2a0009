  - {type: variant, offset: 863, length: 1030, content: 朝廷以其素著行義令考實無徵牧坐下獄會赦免死恭立四十六年薨子考王道嗣元初五年封道弟三人為鄉侯恭孫順為東安亭侯道立二十八年薨子頃王定嗣本初元年封定兄弟九人皆為亭侯定立四年薨子孝王和嗣和性至孝太夫人薨行喪陵次毀胔過禮傅相以聞桓帝詔使奉牛酒迎王還宮和敬賢樂施國中愛之初平中天下大亂和為賊昌務所攻避奔東阿後得還國立六十四年薨孫祗嗣立七年魏受禪以為崇德侯樂成靖王黨永平九年賜號重熹王十五年封樂成王黨聰惠善史書喜正文字與肅宗同年尤相親愛建初四年以清河之游觀津勃海之東光成平涿郡之中水饒陽安平南深澤八縣益樂成國及帝崩其年就國黨急刻不遵法度舊禁宮人出嫁不得適諸國有故掖庭技人哀置嫁為男子章初妻黨召哀置入宮與通初欲上書告之黨恐懼乃密賂哀置姊焦使殺初事發覺黨乃縊殺內侍三人以絕口語又取故中山簡王傅婢李羽生為小妻永元七年國相舉奏之和帝詔削東光鄡二縣立二十五年薨子哀王崇嗣立二月薨無子國絕明年和帝立崇兄脩侯巡為樂成王是為釐王立十五年薨子隱王賓嗣立八年薨無子國絕明年復立濟北惠王子萇為樂成王後萇到國數月驕淫不法愆過累積冀州刺史與國相舉奏萇罪至不道安帝詔曰萇有靦其面而放逸其心知陵廟至重承繼有禮不惟致敬之節肅穆之慎乃敢擅損犧牲不備苾芬慢易大姬不震厥教出入顛覆風淫于家娉取人妻饋遺婢妾毆擊吏人專己凶暴愆罪莫大甚可恥也朕覽八辟之議不忍致之于理其貶萇爵為臨湖侯朕無則哲之明致簡統失序罔以尉承大姬增懷永歎延光元年以河閒孝王子得嗣靖王後以樂成比廢絕故改國曰安平是為安平孝王立三十年薨子續立中平元年黃巾賊起為所劫質囚于廣宗賊平復國其年秋坐不道被誅立三十四年國除下邳惠王衍永平十五年封衍有容貌肅宗即位常在左右建初初冠詔賜衍師傅已下官屬金帛各有差四年以臨淮郡及九江之鍾離當塗東城歷陽全椒合十七縣益下邳國帝崩其年就國衍後病荒忽而太子卬有罪廢諸姬爭欲立子為嗣連上書相告言和帝憐之使彭城靖王恭至下邳正其嫡庶立子成為太子衍立五十四年薨子貞王成嗣永建元年封成兄二人及惠王孫二人皆為列侯成立二年薨子愍王意嗣陽嘉元年封意弟八人為鄉亭侯中平元年意遭黃巾𠫓廾國走賊平復國數月薨立五十七年年九十子哀王宜嗣數月薨無子建安十一年國除梁節王暢永平十五年封為汝南王母陰貴人有寵暢尤被愛幸國土租入倍於諸國肅宗立緣先帝之意賞賜恩寵甚篤建初二年封暢舅陰棠為西陵侯四年徙為梁王以陳留之郾寧陵濟陰之薄單父己氏成武凡六縣益梁國帝崩其年就國暢性聰惠然少貴驕頗不遵法度歸國後數有惡夢從官卞忌自言能使六丁善占夢暢數使卜筮又暢乳母王禮等因此自言能見鬼神事, WYG: ''}
