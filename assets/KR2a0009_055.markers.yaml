  - {type: variant, offset: 300, length: 0, content: '', WYG: 月陽氣潛藏未得用事雖煦噓萬物飬其根荄荄草根也荄音該又音皆而猶盛隂在上地凍水冰陽氣否隔閉而成冬故曰履霜堅冰隂始凝也馴致其道至堅冰也易坤卦象辭也馴順也言陰以卑順為道漸至顯著猶自履霜而至堅冰言五月微陰始起至十一月堅冰至也夫王者之作因時為法孝章皇帝深惟古人之道助三正之微定律著令三正三微也前書音義曰言陽氣始施萬物微而未著故曰微一曰天統謂周十一月建子為正天始施之端也二曰地統謂殷十二月建丑為正地始化之端也三曰人統謂夏十三月建寅為正人始成之端也冀承天心順物性命以致時雍然從變改以来}
