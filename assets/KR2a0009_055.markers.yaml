  - {type: variant, offset: 69, length: 1, content: 三, WYG: 陵人也其先出於魯頃公為楚所滅遷於下邑因氏焉世吏二千石哀平間自魯而徙祖父匡王葬時為羲和有權數號曰智囊匡設六筦之法以窮工商故曰權數父某建武初為武陵太守卒官時恭}
