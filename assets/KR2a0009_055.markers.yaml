  - {type: variant, offset: 71, length: 4, content: 封廣平王, WYG: 十二弟丕七歳晝夜號踴不絶聲郡中賻贈無所受公羊傳曰貨財曰賻乃歸服䘮禮過成人鄉里奇之十五與母及丕俱居太學習魯詩髙祖時魯申公詩也閉戸講誦絶人間事兄弟俱為諸儒所稱學士爭歸之太尉趙熹慕其志每歳時遣子問以酒糧皆辭不受問遺也恭憐丕小欲先就其名託疾不仕郡數以禮請謝不肯應母强遣之恭不得已而西因留新豐教授}
