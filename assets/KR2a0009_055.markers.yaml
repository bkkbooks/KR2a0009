  - {type: variant, offset: 2117, length: 386, content: 筋骨不相連臣暢知大貸不可再得自誓束身約妻子不敢復出入失繩墨不敢復有所橫費租入有餘乞裁食睢陽穀孰虞蒙寧陵五縣還餘所食四縣臣暢小妻三十七人其無子者願還本家自選擇謹勑奴婢二百人其餘所受虎賁官騎及諸工技鼓吹倉頭奴婢兵弩廄馬皆上還本署臣暢以骨肉近親亂聖化汙清流既得生活誠無心面目以凶惡復居大宮食大國張官屬藏什物願陛下加大恩開臣自悔之門假臣小善之路令天下知臣蒙恩得去死就生頗能自悔臣以公卿所奏臣罪惡詔書常置於前晝夜誦讀臣小人貪見明時不能即時自引惟陛下哀臣令得喘息漏刻若不聽許臣實無顏以久生下入黃泉無以見先帝此誠臣至心臣欲多還所受恐天恩不聽許節量所留於臣暢饒足詔報曰朕惟王至親之屬淳淑之美傅相不良不能防邪至令有司紛紛有言今王深思悔過端自克責朕惻然傷之志匪由于王咎在彼小子一日克己復禮天下歸仁王其安心靜意茂率休德易不云乎一謙而四益小有言終吉強食自愛暢固讓章數上卒不許立二十七年薨子恭王堅嗣, WYG: ''}
