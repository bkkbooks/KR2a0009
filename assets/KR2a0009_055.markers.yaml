  - {type: variant, offset: 237, length: 2, content: 憎怨, WYG: 恭到重購賞開恩信說文曰以財相賕曰購其渠帥張漢等率支黨降恭上以漢補博昌尉博昌尉屬千乗國今青州縣也其餘遂自相捕擊盡破平之州郡以安永元九年徴拜議郎八月飲酎齋㑹章䑓詔使小黄門特引恭前其夜拜侍中勑使陪乗勞問甚渥冬遷光禄勲選舉清平京師貴戚莫能枉其正十二年代呂蓋為司徒漢官儀曰呂蓋字君上苑陵人十五年從廵狩南陽除子撫為郎中賜駙馬從駕駙副也非正所乗皆為副說文曰駙馬副馬也時弟丕亦為侍中兄弟父子並列朝廷後坐事䇿免續漢書曰坐族弟𢎞農都尉炳事免官也殤帝即位以恭為長樂衛尉永初元年復代梁鮪為司徒漢官儀曰鮪字伯元河東平陽人也初和帝末下令麥秋得案騐薄刑而州郡好以苛察為政因此遂盛夏斷獄恭上疏諌曰臣伏見詔書}
