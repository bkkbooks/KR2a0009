  - {type: variant, offset: 473, length: 0, content: '', WYG: 黄香等相難數事帝善丕說罷朝特賜冠幘履韤衣一襲丕因上疏曰臣以愚頑顯備大位犬馬氣衰猥得進見論難於前無所甄明甄别也衣服之賜誠為優過臣聞說經者傳先師之言非從己出不得相讓相讓則道不眀若規矩權衡之不可枉也規圓也矩方也權秤錘衡秤衡難者必明其據說者務立其義浮華無用之言不陳於前故精思不勞而道術愈章法異者各令自說師法博觀其義覽詩人之旨意察雅頌之終始明舜禹臯陶之相戒尚書帝舜謂禹曰臣作朕股肱耳目禹戒舜曰安汝止慎乃在位咎繇戒禹曰慎厥身修思永惇叙九族在知人禹曰吁咸若時惟帝其難之是相戒也顯周公箕子之所陳周公作無逸立政二篇以戒成王箕子為武王陳洪範九疇之義並見尚書觀乎人文化成天下易賁卦曰觀乎天文以察時變觀乎人文以化成天下注云解天之文則時變可知解人之文則化成可為也陛下既廣納謇謇以開四聰無令芻蕘以言得罪芻蕘採薪者也大雅板詩曰詢於芻蕘也既顯巖穴以求仁賢無使幽逺獨有遺失十三年遷為}
