  - {type: variant, offset: 66, length: 2, content: 羨永, WYG: 莽時並名重當時劉攽曰案文多一時字前後言不仕王莽者多矣不湏時字也休字子泉哀帝初守新都令新都縣也屬南陽郡後王莽秉權休去官歸家及莽篡位遣使齎𤣥纁束帛請為國師遂歐血託病杜門自絶光武即位求休勲子孫賜榖以旌顯之劉宣字子高安衆侯崇之從弟知王莽當篡乃變名姓抱經書𨼆避林藪建武初乃出光武以宣襲封安衆侯擢龔勝子賜為上谷太守勝鮑宣事在前書勲事在𤣥孫邕傳論曰建武之初雄豪方擾虓呼者連響嬰城者相望虓虎怒也詩曰闞如虓虎嬰城言以城自嬰繞斯固倥傯不暇給之日字書曰倥傯窮困也給足也日促事多不暇給足也卓茂斷斷小宰無它庸䏻斷斷猶専一也書斷斷猗無他技時已七十餘矣而首加聘命優辭重禮其與周燕之君表閭立館何異哉史記燕昭王即位欲雪齊恥以招賢者得郭隗為築宮而師事之於是蘊憤歸道之賔蘊積也越闗阻捐宗族以排金門者衆矣夫厚性寛中近於仁犯而不校鄰於恕校報也鄰近也曾子曰犯而不校率斯道也怨悔曷其至乎怨謂為人所怨也悔恨也魯恭傳弟丕魯恭字仲康扶風}
