  - {type: variant, offset: 249, length: 0, content: '', WYG: 五年以来改用孟夏而刺史太守不深惟憂民息事之原進良退殘之化月令曰孟夏命太尉贊桀俊遂賢良舉長大行爵出禄必當其位因以盛夏徴召農人拘對考驗連滯無已司𨽻典司京師四方是則漢官儀曰司𨽻校尉董領京師及三輔三河𢎞農而近於春月分行諸部託言勞来貧人而無隠惻之實煩擾郡縣廉考非急逮捕}
