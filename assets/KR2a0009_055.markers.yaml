  - {type: variant, offset: 217, length: 4, content: 性隱賊喜, WYG: 記檀弓曰魯人顔丁善居䘮始死皇皇然如有求而不得言百姓思帝故恭引之今乃以盛春之月興發軍役擾動天下以事戎狄誠非所以垂恩中國改元正時由内及外也萬民者天之所生天愛其所生猶父母愛其子一物有不得其所者則天氣為之舛錯况於人乎故愛人者必有天報昔太王重人命而去邠故獲上天之祐史記古公脩后稷公劉之業國人皆戴之戎翟攻之人人皆怒欲戰古公曰人以我故戰殺人父子予不忍為乃與私屬盡去邠止于岐下邠人舉國扶老携弱盡復歸於岐下旁國聞之亦多歸附古公乃營築城郭室屋而邑之人皆歌頌其德武王即位追尊古公為太王夫戎狄者四方之異氣也蹲夷踞肆與鳥獸無别夷平也肆放也言平坐踞傲肆放無禮也若雜居中國則錯亂天氣汙辱善人是以聖王之制羇縻不絶而已字書曰羇馬絡頭也蒼頡篇曰縻牛繮也今邊境無事冝當脩仁行義尚於無為令家給人足安業樂産夫人道乂於下則隂陽和於上祥風時雨覆被逺方夷狄重譯而至矣易曰有孚盈缶終来有它吉易比卦辭也孚誠信也缶土器也王弼注云親乎天下著信盈缶應者豈一道而來故必有他吉也言甘雨滿我之缶誠來有我而吉已比卦坤下坎上坤為土缶之象也坎為水雨之象也坎在坤上故曰甘雨滿我之缶有誠信則它人来附而吉也劉攽曰誠來有我而吉巳案}
