  - {type: variant, offset: 222, length: 1, content: 法, WYG: 此我當為它注文甚明夫以徳勝人者昌以力勝人者亡今匈奴為鮮卑所殺逺臧於史侯河西去塞數千里而欲乗其虚耗利其微弱是非義之所出也前太僕祭彤逺出塞外卒不見一胡而兵已困矣永平十六年竇固祭彤耿秉來苗等四道出擊匈奴固至天山擊走呼衍王彤坐不至涿邪山無所見而還下獄免為庶人也白山之難不絶如綖白山即天山言彤固俱擊匈奴固至天山彤還下獄同歴艱危故曰如綖公羊傳曰中}
