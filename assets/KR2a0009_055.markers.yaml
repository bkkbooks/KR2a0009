  - {type: variant, offset: 301, length: 2, content: 封鈞, WYG: 嵗不熟榖價常貴人不寧安小吏不與國同心者率入十一月得死罪賊不問曲直便即格殺雖有疑罪不復讞正一夫吁嗟王道為虧况於衆乎易十二月君子以議獄緩死易中孚象辭也稽覽圖中孚十二月卦也可令疑罪使詳其法大辟之科盡冬月乃斷其立春在十二月中者勿以報囚如故事報囚謂奏請報决也後卒施行恭再在公位選辟高第至列卿郡守者數十人而其耆舊大姓或不蒙薦舉至有怨望者恭聞之曰學之不講是吾憂也講習也論語孔子之言也諸生不有鄉舉者乎終無所言言人患學之不習耳若能究習自有鄉里之舉豈待要三公之辟乎恭性謙退奏議依經潛有補益然終不自顯故不以剛直為稱三年以老病䇿罷}
