  - {type: variant, offset: 2714, length: 0, content: '', WYG: 年卒年六十六贈車騎将軍印綬位特進諡曰昭列侯子松嗣官至宗正贊曰卓魯款款情慤徳滿款款忠誠也仁感昆蟲愛及胎卵童兒不捕雉也寛霸臨政亦稱優緩後漢書卷五}
