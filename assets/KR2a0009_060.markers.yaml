  - {type: variant, offset: 3408, length: 8, content: 譖鄧騭兄弟及翼云, WYG: 曰尚書百官之本宜以公正處之武帝游晏後廷故用宦者非古制也宜罷中書宦官應古不近刑人之法後稍見任至於順帝遂益繁熾今陛下爵之十倍於前至今無繼嗣者豈獨好之而使之然乎尚書上其對詔下有司處正尚書承㫖奏曰宦者之官非近世所置漢初張澤為大謁者佐絳侯誅諸吕張澤閹人也絳侯周勃誅諸吕乃迎立代王入宫顧麾左右執㦸皆罷兵有數人不肯去宦者令張澤喻告之乃去此其佐誅諸吕之功見前書孝文使趙談參乗而子孫昌盛文帝使宦者趙談參乘袁盎㐲車前曰陛下獨柰何}
