  - {type: variant, offset: 3300, length: 0, content: '', krp: 四卦更直日用事以風雨寒温為候音義云分卦直日之法爻主一日即}
  - {type: variant, offset: 3301, length: 0, content: '', WYG: 日九日並為三公之日也三公上應台階下同元首春秋元命包曰魁下六星兩兩而比曰三台前書音義曰泰階三台也又黄帝泰階六符經曰泰階者天之三階也上階為天子中階為諸侯公卿大夫下階為士庶}
  - {type: variant, offset: 3301, length: 0, content: '', krp: 日九日並為三公之日也三公上應台階下同元首春秋元命包曰魁下六星兩兩而比曰三台前書音義曰泰階三台也又黄帝泰階六符經曰泰階者天之三階也上階為天子中階為諸侯公卿大夫下階為士庶}
  - {type: variant, offset: 3302, length: 0, content: '', WYG: 三階平則陰陽和風雨時尚書曰君為元首臣作股肱言三公上象天之台階下與人君同體也政失其道則陰陽反節節彼南山詠自周詩詩小雅曰節彼南山維石巖巖赫赫師尹民具爾膽注云節高峻貎也喻三公之位人所髙巖也赫赫顯盛也師尹三公也言三公之位天下之人共瞻視之股肱良哉著於虞典而今之在位競託髙虚納累鍾之奉忘天下之憂六斛四斗曰鍾左傳曰四斗為豆四豆為區四區為釡四釡為鍾也劉攽曰注四斗為豆按斗當作升又云四釡為鍾四當作十棲遲偃仰寢疾自逸被䇿文得賜錢即復起矣何疾之易而愈之速以此消伏灾眚興致升平其可得乎今選舉牧守委任三府三公也長吏不良既咎州郡州郡有失豈得不歸責舉者而陛下崇之彌優自下慢事愈甚所謂大網踈小網數謂緩於三公切於州郡也三公非臣之仇臣非狂夫之作所以發憤忘食懇懇不已者誠念朝廷欲致興平非不能面譽也臣生長草野不曉禁忌披露肝膽書不擇言伏鑕鼎鑊死不敢恨謹詣闕奉章伏待重誅書奏帝復使對尚書使就尚書更對也顗對曰臣聞明王聖主好聞其過忠臣孝子言無隱情臣備生人倫視聽之類而稟性愚戇不識忌諱故出死忘命懇懇重言重再也誠欲陛下脩乾坤之德開日月之明披圖籍案經典覽帝王之務識先後之政如有闕遺退而自改本文武之業擬堯舜之道攘災延慶號令天下此誠臣顗區區之願夙夜夢寐盡心所計謹條序前章暢其㫖趣謂前詣闕所上章也條便宜七事具如狀對一事陵園至重聖神攸馮而灾火炎赫迫近寢殿魂而有靈猶將驚動尋宫殿官府近始永平歲時未積便更修造又西苑之設禽畜是處離房别觀本不常居而}
