  - {type: variant, offset: 3381, length: 2, content: 原懷, krp: 今天垂異地吐妖人厲疫三者並時而有河清猶春秋麟不當見而見孔子書之以為異也公羊傳曰西狩獲麟何以書記異也何以異麟非中國獸也劉攽曰注何以異案文當云何異爾臣前上琅邪宫崇受于吉神書不合明德于姓吉名也神書即今道家太平經也其經以甲乙丙丁戊巳庚辛壬癸為部每部一十七卷也臣聞布穀鳴於孟夏蟋蟀吟於始秋物有微而志信人有賤而言忠布穀一名戴絍一名戴勝蟋蟀促織也春秋考異郵曰孟夏戴勝降立秋促織鳴言雖微物不失信也絍音汝林反臣雖至賤誠願賜清間極盡所言書奏不省十餘日復上書曰臣伏見太白北入數日復出東方其占當有大兵中國弱四夷彊臣又推歩熒惑今當出而潛必有陰謀皆由獄多寃結忠臣被戮德星所以久守執法亦為此也德星歲星也陛下宜承天意理察寃獄為劉瓆成瑨虧除罪辟追錄李雲杜衆等子孫夫天子事天不孝則日食星鬭比年日食於正朔延熹八年正月辛巳朔日食九年正月辛邜朔日食三光不明五緯錯戾前者宫崇所獻神書專以奉天地順五行為本亦有興國廣嗣之術其文易曉參同經典而順帝不行故國𦙍不興太平經典帝}
  - {type: line-break, offset: 3384, content: '', id: ZHSJ__dup13124}
  - {type: variant, offset: 3384, length: 1, content: 後, WYG: 篇曰眞人問神人曰吾欲使帝王立致太平豈可聞邪神人言但順天地之道不失銖分則立致太平元氣有三名為太陽太陰中和形體有三名為天地人天有三名為日月星北極為中也地有三名為山川與平土人有三名為父母子政有三名為君臣人此三者常相得腹心不失銖分使其同一憂合成一家立致太平延年不疑也又問曰今何故其生子少也天師曰善哉子之言也但施不得其意耳如令施其人欲生也開其玉户施種於中比若春種於地也十十相應和而生其施不以其時比若十月種物於地也十十盡死固無生者眞人欲重知其審今無子之女雖日百施其中猶無所生也不得其所生之處比若此矣是故古者聖賢不妄施於不生之地也名為亡種竭氣而無所生成今太平氣到或有不生子者反斷絶天地之統使國少人理國之道多人則國富少人則國貧今天上皇之氣已到天皇氣生物乃當萬倍其初天地孝冲孝質頻世短祚臣又聞之得主所好自非正道神為生虐故周衰諸侯以力征相尚於是夏育申休宋萬彭生任鄙之徒生於其時並多力之人也夏育衛人力舉千鈞宋萬宋人殺湣公遇大夫仇牧於門批而殺之齒著門闔彭生齊人拉魯桓公幹而殺之范雎曰以任鄙之力}
