  - {type: 'tls:seg', offset: 100, content: '', id: KR2a0009_ZHSJ_060-d60p4s5}
  - {type: variant, offset: 103, length: 356, content: 八年薨是為夷王父子薨于京師皆葬洛陽子鴻嗣安帝崩始就國鴻生質帝質帝立梁太后下詔以樂安國土卑溼租委鮮薄改封鴻封勃海王立二十六年薨是為孝王無子太后立桓帝弟蠡吾侯悝為勃海王奉鴻嗣祀延熹八年悝謀為不道有司請廢之帝不忍乃貶為廮陶王食一縣悝後因中常侍王甫求復國許謝錢五千萬帝臨崩遺詔復為勃海王悝知非甫功不肯還謝錢甫怒陰求其過初迎立靈帝道路流言悝恨不得立欲鈔徵書而中常侍鄭颯中黃門董騰並任俠通剽輕數與悝交通王甫司察以為有姦密告司隸校尉段熲熹平元年遂收颯送北寺獄使尚書令廉忠誣奏颯等謀迎立悝大逆不道遂詔冀州刺史收悝考實又遣大鴻臚持節與宗正廷尉之勃海迫責悝悝自殺妃妾十一人子女七十人伎女二十四人皆死獄中傅相以下以輔導王不忠悉伏誅悝立二十五年國除衆庶莫不憐之平春悼王全以建初四年封其年薨葬於京師無子國除清河孝王慶母宋貴人貴人宋昌八世孫, WYG: 上蘇竟傳蘇竟字伯况}
