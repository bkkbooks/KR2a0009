  - {type: line-break, offset: 3298, content: '', id: ZHSJ__dup13120}
  - {type: variant, offset: 3298, length: 1, content: 弟, WYG: 京房作易飛候以為立夏之後當有震裂涌水之害又比熒惑失度盈縮往來渉歴輿鬼環繞軒轅天官書曰輿鬼南方之宿軒轅黄龍體女主後宫之象也火精南方夏之政也政有失禮不從夏令則熒惑失行熒惑南方主夏為禮為視禮虧視失不行夏令則熒惑逆行也見天文志正月三日至乎九日三公卦也凡卦法一為元士二為大夫三為三公四為諸侯五為王位六為宗廟前書曰梁人焦延夀字贛長於灾變分六}
