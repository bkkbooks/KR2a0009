  - {type: variant, offset: 3358, length: 1, content: 鄧, WYG: 隕石于宋五隕星也至二十年諸侯㑹宋公于盂於是楚執宋公以伐宋秦之亡也石隕東郡史記始皇三十六年有墜星下東郡至地為石人或刻其石曰始皇死而地分始皇聞之盡取石傍舍誅之因燔其石劉攽曰注盡取石傍舍誅之按史記作石傍居人舍字誤今隕扶風與先帝園陵相近桓帝延熹七年隕石于鄠鄠屬扶風與髙帝諸陵相近也不有大䘮必有畔逆案春秋以來及古帝王未有河清及學門自壞者也延熹五年}
