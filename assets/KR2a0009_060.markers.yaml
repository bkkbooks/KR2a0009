  - {type: variant, offset: 3225, length: 0, content: '', WYG: 躬日􅉴之聽温三省之勤論語曾子曰吾日三省吾身也思過念咎務消祗悔祗大也易復卦初九曰無祗悔元吉方今時俗奢佚淺恩薄義夫救奢必於儉約拯薄無若敦厚安上理人莫善於禮脩禮遵約盖惟上興革文變薄事不在下故周南之德關雎政本周南詩序曰關雎風之始也所以風天下而正夫婦也故夫婦為政之本也本立道生風行草從澄其源者流清溷其本者末濁天地之道其猶鼓籥以虚為德自近及逺者也籥如笛六孔鼓籥其形内虚而氣無窮老子曰天地之間其猶槖籥虚而不屈動而愈出伏}
