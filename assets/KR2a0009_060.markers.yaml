  - {type: variant, offset: 3312, length: 1, content: 貞, WYG: 逺覽防微慮萌老子曰人之飢也以其上食稅之多也故孝文皇帝綈袍革舄木器無文前書曰孝文帝身衣弋綈足履革舄兵木無刃衣緼無文約身薄賦時致升平今陛下聖德中興宜遵前典惟節惟約天下幸甚易曰天道無親常與善人是故髙宗以享福髙宗殷}
