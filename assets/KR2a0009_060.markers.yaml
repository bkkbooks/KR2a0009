  - {type: variant, offset: 3345, length: 0, content: '', WYG: 禹與稷契咎繇之屬並在朝文武創德周召作輔是以能建天地之功增日月之耀者也詩曰肅肅王命仲山甫将之邦國若否仲山甫明之詩大雅也将行也若順也順否猶臧否謂善惡也言國有善惡仲山甫皆明之宣王是賴以致雍熙陛下踐祚以來懃心衆政而三九之位未見其人三公九卿也是以灾害屢臻四國未寜四方之國臣考之國典驗之聞見莫不以得賢為功失事為敗且賢者出處翔而後集論語色斯舉矣翔而後集爵以德進則其情不茍然後使君子恥貧賤而樂富貴矣若有德不報有言不醻來無所樂進無所趨無爵賞也則皆懐歸藪澤修其故志矣夫求賢者上以承天下}
  - {type: page-break, offset: 3345, content: '', id: KR2a0009_WYG_060-26a, image: WYG0252/WYG0252-0726a.png}
  - {type: variant, offset: 3345, length: 0, content: '', krp: 禹與稷契咎繇之屬並在朝文武創德周召作輔是以能建天地之功增日月之耀者也詩曰肅肅王命仲山甫将之邦國若否仲山甫明之詩大雅也将行也若順也順否猶臧否謂善惡也言國有善惡仲山甫皆明之宣王是賴以致雍熙陛下踐祚以來懃心衆政而三九之位未見其人三公九卿也是以灾害屢臻四國未寜四方之國臣考之國典驗之聞見莫不以得賢為功失事為敗且賢者出處翔而後集論語色斯舉矣翔而後集爵以德進則其情不茍然後使君子恥貧賤而樂富貴矣若有德不報有言不醻來無所樂進無所趨無爵賞也則皆懐歸藪澤修其故志矣夫求賢者上以承天下}
  - {type: variant, offset: 3347, length: 0, content: '', WYG: 人不用之則逆天綂違人望逆天綂則灾眚降違人望則化不行灾眚降則下吁嗟化不行則君道虧四始之缺五際之戹其咎由此四始為關雎為國風之始鹿鳴為小雅之始文王為大雅之始清廟為頌之始缺猶廢也翼奉傳曰易有陰陽五際孟康曰韓詩外傳云五際邜酉午戌亥也陰陽終始際㑹之歲於此則有變改之政豈可不剛健篤實矜矜慄慄以守天功盛德大業乎易繫辭曰日新之謂盛德富有之謂大業臣伏見光禄大夫江夏黃瓊耽樂道術清亮自然被褐懐寳含味經籍家語子路問於孔子曰有人於此被褐而懐玉何如子曰國無道隐可也國有道則衮冕而執玉也又果於從政明逹變復言明於變異消復之術也朝廷前加優寵賔於上位瓊入朝日淺謀謨未就因以喪病致命遂志老子曰大音希聲大器晩成聲震宇内謂之大音其動有時故希聲也無所不容謂之大器其功既博故晚成也善人為國三年乃立論語孔子曰茍有用我者期月而已可也三年乃成功又曰善人為邦百年可以勝殘去殺天下莫不嘉朝廷有此良人而復怪其不時還任陛下宜加隆崇之恩極養賢之禮徵反京師以慰天下又處士漢中李固年四十通游夏之蓺履顔閔之仁絜白之節情同皦日忠貞之操好是正直卓冠古人當世莫及元精所生王之佐臣元為天精謂之精氣春秋演孔圖曰正氣為帝間氣為臣宫商為佐秀氣為人也天之生固必為聖漢宜蒙特徵以示四方夫有出倫之才不應限以官次昔顔子十八天下歸仁論語曰顏淵問仁孔子曰克已復禮為仁一日克已復禮天下歸仁焉子奇穉齒化阿有聲子奇齊人年十八為阿邑宰出倉廪以振貧乏邑内大化見説苑若還瓊徵固任以時政伊尹傅說不足為比則可垂景光致休祥矣臣顗明不知人伏聽衆言百姓所歸臧否共歎願汎問百僚覈其名行有一不合則臣為欺國惟留聖神不以人廢言謹復條便宜四事附奏於左一事孔子作春秋書正月者敬歲之始也公羊傳曰元年春正月元年者何君之始年也春者何歲之始也王者則天之象因時之序宜開發德號爵賢命士流寛大之澤垂仁厚之德禮記正月迎春於東郊還乃賞公卿諸侯大夫於朝命相布德和令行慶施惠下及兆人慶賞遂行無有不當順助元氣含養庻類如此則天文昭爛星辰顯列五緯循軌四時和睦五緯五星不則太陽不光天地溷濁時氣錯逆霾霧蔽日爾雅曰風而雨土為霾自立春以來累經旬朔未見仁德有所施布但聞罪罰考掠之聲夫天之應人疾於影響而自從入歲常有蒙氣月不舒光日不宣曜日者太陽以象人君政變於下日應於天清濁之占隨政抑揚天之見異事無虚作豈獨陛下倦於萬機帷幄之政有所闕歟帷幄謂謀謨之臣也何天戒之數見也臣願陛下發揚乾剛援引賢能勤求機衡之寄以獲斷金之利易曰二人同心其利斷金臣之所陳輒以太陽為先者明其不可久闇急當改正其異雖微其事甚重臣言雖約其旨甚廣惟陛下乃眷臣章深留明意二事孔子曰靁之始發大壯始君弱臣彊從解起今月九日至十四日大壯用事消息之卦也於此六日之中靁當發聲發聲則歲氣和王道興也周書時訓曰春分之日𤣥鳥至又五日靁乃發聲靁不發聲諸侯失人也易曰靁出地奮豫豫卦坤下震上坤為地震為靁靁出地上故曰靁出地豫奮動也豫喜也先王以作樂}
