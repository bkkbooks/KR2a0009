  - {type: variant, offset: 471, length: 3, content: 於鄉閭, WYG: 神也自是朝廷災異多以訪之綂作家法章句及内䜟二卷解說位至光禄大夫為國三老年九十卒綂生厚厚母初與前妻子博不相安厚年九歲思令和親乃託疾不言不食母知其㫖懼然改意懼音九具反恩養加篤博後至光禄大夫厚少學綂業精力思述初安帝永初二年太白入北斗洛陽大水續漢志曰時正月己亥太白入北斗中以為貴相凶也又京師及郡國四十一雨水鄧太后専政也時綂為侍中厚随在京師朝廷以問綂綂對年老耳目不明子厚曉讀圖書粗識其意鄧太后使中常侍承制問之厚對以為諸王子多在京師容有非常宜亟發遣各還本國亟音紀力反太后從之星尋滅不見又剋水退日期皆如所言除為中郎太后特引見問以圖䜟厚對不合免歸袁山松書曰鄧后問厚曰大將軍鄧隲應輔臣以不對曰不應以此不合其㫖復習業犍為}
