  - {type: variant, offset: 3296, length: 1, content: 封, WYG: 冬恭陵百丈廡灾永建元年秋茂陵園寢灾炎光熾猛驚動神靈易天人應曰君子不思遵利茲謂無澤厥灾孽火燒其宫又曰君髙臺府犯陰侵陽厥灾火又曰上不儉下不節炎火並作燒居室自頃繕理西苑修復太學永建六年修太學也宫殿官府多所搆飾昔盤庚遷殷去奢即儉帝王紀曰盤庚以耿在河北迫近山川自祖辛以來奢淫不絶乃度河将徙都亳之殷地人咨嗟相怨不欲徙盤庚乃作書三篇以告喻之今尚書盤庚三篇是也亳在偃師夏后卑室盡力致美論語孔子曰禹惡衣服而致美乎黻冕卑宫室而盡力乎溝洫又魯人為長府閔子騫曰仍舊貫何必改作長府魯之府名也仍因也貫事也言因舊事則可何必更作見論語臣愚以為諸所繕修事可省減稟䘏貧人賑贍孤寡此天之意也人之慶也仁之本也儉之要也焉有應天養人為仁為儉而不降福者哉土者地祗陰性澄静宜以施化之時敬而勿擾竊見正月以來陰闇連日易内傳曰久陰不雨亂氣也蒙之比也蒙者君臣上下相冒亂也易稽覽圖曰日食之比陰得陽蒙之比也陰冒陽也鄭𤣥注云蒙氣也比非一也邪臣謀覆冒其君先霧從夜昏起或從夜半或平旦君不覺悟日中不解遂成蒙君復不覺悟下為霧也比音庇劉攽曰注云陰得陽案得當作復又陽字下合有也字又曰賢德不用厥異常陰夫賢者化之本雲者雨之具也得賢而不用猶久陰而不雨也又頃前數日寒過其節氷既解釋還復凝合夫寒往則暑來暑往則寒來易繫辭之文也此言日月相推寒暑相避以成物也今立春之後火卦用事當温而寒違反時節由功賞不至而刑罰必加也宜須立秋順氣行罰臣伏案飛候參察衆}
