  - {type: variant, offset: 3306, length: 0, content: '', WYG: 不旋時大夫不過朞鄭𤣥注云陽者天子為善一日天立應以善為惡一日天立應以惡諸侯為善一時天立應以善為惡一時天立應以惡大夫為善一歲天亦立應以善為惡一歲天亦立應以惡一說云不旋日立應之不過時三辰間不過朞從今旦至明旦也陽即指天子也如是則景雲降集眚沴息矣景雲五色雲也一曰慶雲孝經援神契曰德至山陵則景雲出顗以陵園火灾故引之也眚沴謂灾氣二事去年以來兌卦用事類多不効易傳曰有貎無實佞人也有實無貎道人也寒温為實清濁為貎易稽覽圖曰有實無貎屈道人也有貌無實佞人也鄭𤣥注曰有寒温無貌濁清静此賢者屈道仕于不肖君也有貌濁清静無寒温此佞人以便巧仕於世也今三公皆令色足恭外厲内荏以虚事上無佐國之實故清濁効而寒温不効也是以陰寒侵犯消息易稽覧圖曰侵消息者或陰専}
  - {type: page-break, offset: 3306, content: '', id: KR2a0009_WYG_060-17a, image: WYG0252/WYG0252-0721c.png}
  - {type: page-break, offset: 3306, content: '', id: KR2a0009_WYG_060-17b, image: WYG0252/WYG0252-0721d.png}
