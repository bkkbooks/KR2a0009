  - {type: variant, offset: 2416, length: 496, content: 中常侍曹騰謁蒜蒜不為禮宦者由此惡之及帝崩公卿皆正議立蒜而曹騰說梁冀不聽遂立桓帝語在李固傳蒜由此得罪建和元年甘陵人劉文與南郡妖賊劉鮪交通訛言清河王當統天子欲共立蒜事發覺文等遂劫清河相謝暠將至王宮司馬門曰當立王為天子暠為公暠不聽罵之文因刺殺暠於是捕文鮪誅之有司因劾奏蒜坐貶爵為尉氏侯徙桂陽自殺立三年國絕梁冀惡清河名明年乃改為甘陵梁太后立安平孝王子經侯理為甘陵王奉孝德皇祀是為威王理立二十五年薨子貞王定嗣定立四年薨子獻王忠嗣黃巾賊起忠為國人所執既而釋之靈帝以親親故詔復忠國忠立十三年薨嗣子為黃巾所害建安十一年以無後國除濟北惠王壽母申貴人潁川人也世吏二千石貴人年十三入掖庭壽以永元二年封分太山郡為國和帝遵肅宗故事兄弟皆留京師恩寵篤密有司請遣諸王歸藩不忍許之及帝崩乃就國永初元年鄧太后封壽舅申轉為新亭侯壽立三十一年薨自永初已後戎狄叛亂國用不足始封王薨減賻錢為千萬布萬匹嗣王薨五百萬布五千匹時唯壽最尊親特賻錢三千萬布三萬匹子節王登嗣永寧元年封登弟五人為鄉侯皆別食太山邑登立十五年薨子哀王多嗣多立三年薨無子永和四年立戰鄉侯安國為濟北王是為釐王安國立十七年薨子孝王次嗣本初元年封次弟猛為亭侯次九歲喪父至孝建和, WYG: ''}
