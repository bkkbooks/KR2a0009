  - {type: variant, offset: 3302, length: 0, content: '', krp: 三階平則陰陽和風雨時尚書曰君為元首臣作股肱言三公上象天之台階下與人君同體也政失其道則陰陽反節節彼南山詠自周詩詩小雅曰節彼南山維石巖巖赫赫師尹民具爾膽注云節高峻貎也喻三公之位人所髙巖也赫赫顯盛也師尹三公也言三公之位天下之人共瞻視之股肱良哉著於虞典而今之在位競託髙虚納累鍾之奉忘天下之憂六斛四斗曰鍾左傳曰四斗為豆四豆為區四區為釡四釡為鍾也劉攽曰注四斗為豆按斗當作升又云四釡為鍾四當作十棲遲偃仰寢疾自逸被䇿文得賜錢即復起矣何疾之易而愈之速以此消伏灾眚興致升平其可得乎今選舉牧守委任三府三公也長吏不良既咎州郡州郡有失豈得不歸責舉者而陛下崇之彌優自下慢事愈甚所謂大網踈小網數謂緩於三公切於州郡也三公非臣之仇臣非狂夫之作所以發憤忘食懇懇不已者誠念朝廷欲致興平非不能面譽也臣生長草野不曉禁忌披露肝膽書不擇言伏鑕鼎鑊死不敢恨謹詣闕奉章伏待重誅書奏帝復使對尚書使就尚書更對也顗對曰臣聞明王聖主好聞其過忠臣孝子言無隱情臣備生人倫視聽之類而稟性愚戇不識忌諱故出死忘命懇懇重言重再也誠欲陛下脩乾坤之德開日月之明披圖籍案經典覽帝王之務識先後之政如有闕遺退而自改本文武之業擬堯舜之道攘災延慶號令天下此誠臣顗區區之願夙夜夢寐盡心所計謹條序前章暢其㫖趣謂前詣闕所上章也條便宜七事具如狀對一事陵園至重聖神攸馮而灾火炎赫迫近寢殿魂而有靈猶將驚動尋宫殿官府近始永平歲時未積便更修造又西苑之設禽畜是處離房别觀本不常居而}
  - {type: variant, offset: 3303, length: 0, content: '', WYG: 務精土木營建無已消功單賄巨億}
  - {type: variant, offset: 3303, length: 0, content: '', krp: 務精土木營建無已消功單賄巨億}
  - {type: variant, offset: 3304, length: 1, content: 亭, WYG: 計易内傳曰人君奢侈多飾宫室其時旱其灾火是故魯僖遭旱脩政自勑下鍾鼓之縣休繕治之官春秋考異郵曰僖公三年春夏不雨於是僖公憂閔𤣥服避舍釋更徭之逋罷軍寇之誅去苛刻峻文慘毒之敎所蠲浮令四十五事曰方今大旱野無生稼寡人當死百姓何罪不敢煩人請命願撫萬人害以身塞無狀禱已舍齊南郊雨大澍也雖則不寜而時雨自降左傳僖公六月雨由此言之天之應人敏於影響敏疾也今月十七日戊午徵日也陽嘉二年正月日加申日在申時也風從寅來丑時而止丑寅申皆徵也不有火灾必當為旱南方為徵故為火及旱也願陛下校計繕修之費永念百姓之勞罷將作之官減彫文之飾損庖厨之饌退宴私之樂易中孚傳曰陽感天不旋日易中孚傳曰陽感天不旋日諸}
  - {type: page-break, offset: 3304, content: '', id: KR2a0009_WYG_060-16b, image: WYG0252/WYG0252-0721b.png}
