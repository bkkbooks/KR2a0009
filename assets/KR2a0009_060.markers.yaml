  - {type: variant, offset: 465, length: 0, content: '', krp: 平帝世竟以明易為博士講書祭酒王莽置六經祭酒秩上卿每經各一人竟為講尚書祭酒善圖緯能通百家之言王莽時劉歆等共典校書劉攽曰案文劉歆上少一與字拜代郡中尉劉攽曰按郡無中尉當作都時匈奴擾亂北邊多罹其禍竟終完輯一郡光武即位就拜代郡太守使固塞以拒匈奴建武五年冬盧芳略得北邊諸郡帝使偏將軍隨弟屯代郡隨姓弟名也弟音悌竟病篤以兵屬弟詣京師謝罪拜侍中數月以病免初延岑護軍鄧仲况擁兵據南陽陰縣為宼陰縣名屬南陽郡故城在今襄州穀城縣界北而劉歆兄子龔為其謀主臣賢案前書及三輔決録並云向曾孫今言歆兄子則不同也竟時在南陽與龔書曉之曰君執事無恙執事猶言左右也敬前人故呼其執事者爾雅曰恙憂也走昔以摩研編削之才走謂馳走之人謙稱也猶司馬遷與任少卿書云牛馬走之類也説文曰編次也削謂簡也一曰削書刀也研音午見反與國師公從事出入校定祕書劉歆為王莽國師公也竊自依依末由自逺盖聞君子愍同類而傷不遇人無智愚莫不先避害然後求利先定志然後求名昔智果見智伯窮兵必亡故變名逺逝智果智伯臣也逝去也戰國䇿曰智伯與韓魏共圍趙智伯之臣智果説智伯曰韓魏二主色動而喜必背君矣不如殺之智伯曰晉陽旦暮将㧞之而饗其利乃有他心不可子勿復言智果見言之不聽出更其姓為輔氏遂去不見其後韓魏乃反殺智伯三分其地果或作過陳平知項王為天所棄故歸心髙祖皆智之至也陳平初事項羽後知羽必敗乃仗劍渡河歸漢見前書也聞君前權時屈節北面延牙延岑字牙屈節謂臣事也乃後覺悟棲遲養德爾雅曰棲遲息偃也言後息偃養德不復事延牙也詩小雅曰或棲遲偃仰先世數子又何以加謂智果陳平也君處陰中土多賢士若以須㬰之間研考異同揆之圖書測之人事則得失利害可陳於目何自負畔亂之困不移守惡之名乎與君子之道何其反也世之俗儒末學醒醉不分而稽論當時疑誤視聽或謂天下迭興未知誰是稱兵據土可圖非兾或曰聖王未啟宜觀時變倚彊附大顧望自守二者之論豈其然乎夫孔丘祕經為漢赤制祕經幽祕之經即緯書也赤制解見郅惲傳𤣥包幽室文隱事明包藏也言緯書𤣥祕藏於幽室文雖微隱事甚明驗且火德承堯雖昧必亮昧暗也亮明也言漢承唐堯劉累之後以火德王雖遭王莽簒奪一時暗昧今光武中興必盛明也承積世之祚握無窮之符王氏雖乗間偷簒而終嬰大戮支分體解宗氏屠滅非其効歟王莽傳曰校尉公賔就斬莽首軍人分裂莽身支節肌肉臠分三輔舊事曰臠切千叚皇天所以眷顧踟蹰憂漢子孫者也踟蹰猶裴回也論者若不本之於天參之於聖猥以師曠雜事輕自眩惑說士作書亂夫大道焉可信哉師曠雜事雜占之書也前書曰陰陽書十六家有師曠八篇也諸儒或曰今五星失晷天時謬錯五星謂東方歲星南方熒惑星西方太白星北方辰星中央填星失晷失於常度辰星久而不効不効謂出入失度也太白出入過度熒惑進退見態塡星繞帯天街歲星不舍氐房前書曰昴畢間為天街氐房東方之宿歲星歲舍一次當次舍於氐房今不舍之是變常也以為諸如此占歸之國家盖災不徒設皆應之分野各有所主夫房心即宋之分東海是也前書天文志曰夘為房心宋之分也尾為燕分漁陽是也前書天文志曰寅為尾箕燕之分也東海董憲迷惑未降漁陽彭寵逆亂擁兵王赫斯怒命將並征故熒惑應此憲寵受殃太白辰星自亡新之末失行算度以至於今或守東井或沒羽林東井南方之宿天官書曰北宫虚危南方有衆星曰羽林天軍算或作舛或裴回藩屏或躑躅帝宫帝宫北辰也藩屏兩旁之星也裴回謂縈繞淹留躑躅謂上下不去也或經天反明或潛藏久沈或衰微闇昧或煌煌北南或盈縮成鉤或偃蹇不禁盈縮猶進退曲如鉤形也偃蹇髙而明大無禁制皆大運蕩除之祥聖帝應符之兆也賊臣亂子往往錯互指麾妄說傳相壊誤劉攽曰案文壊當作詿詿音卦壊音怪聲相近故誤之由此論之天文安得遵度哉乃者五月甲申天有白虹自子加午廣可十丈長可萬丈正臨倚彌倚彌即黎丘秦豐之都也盖秦豐黎丘一名倚彌也是時月入于畢畢為天網畢西方宿也主網羅無道之君故武王將伐紂上祭于畢求助天也史記曰周武王即位九年上祭于畢東觀兵於孟津也夫仲夏甲申為八魁厯法春三月己巳丁丑夏三月甲申壬辰秋三月己亥丁未冬三月甲寅壬戌為八魁八魁上帝開塞之將也主退惡攘逆流星狀似蚩尤旗或曰營頭或曰天槍出奎而西北行至延牙營上散為數百而滅奎為毒螫主庫兵春秋合誠圖曰奎主武庫之兵也此二變郡中及延牙士衆所共見也是故延牙遂之武當今均州縣也託言發兵實避其殃今年比卦部歲坤主立冬坎主冬至水性滅火南方之兵受歲禍也比卦坤下坎上坎為水也德在中宫刑在木木勝土刑制德今年兵事畢已中國安寧之效也五七之家三十五姓彭秦延氏不得豫焉春秋運斗樞曰五七三十五人皆共一德如何怪惑依而恃之葛藟之詩求福不回其若是乎詩大雅曰莫莫葛藟施于條枚愷悌君子求福不回注云葛延蔓于木之枝而茂盛喻子孫依緣先人之功而起也回違也言不違先祖之道圖䜟之占衆變之驗皆君所明善惡之分去就之决不可不察無忽鄙言夫周公之善康叔以不從管蔡之亂也史記曰周公以成王命伐殷殺管叔放蔡叔以殷餘人封康叔為衛君景帝之悅濟北以不從呉濞之畔也濟北王志髙帝孫齊王肥之子也呉楚反時堅守不從景帝賢之徙封為淄川王也自更始以來孤恩背逆歸義向善臧否粲然可不察歟良醫不能救無命彊梁不能與天爭扁鵲之見桓侯項王之敵漢祖也故天之所壊人不得支支持也左傳曰晋女叔寛曰天之所壊不可支也衆之所為不可干也宜密與太守劉君共謀降議仲尼棲棲墨子遑遑憂人之甚也班固曰棲棲遑遑孔席不煖墨突不黔也屠羊救楚非要爵禄莊子曰楚昭王失國屠羊說走而從於王昭王反國將賞從亡者及屠羊說屠羊說曰大王失國說失屠羊大王反國說亦反屠羊臣之爵禄已復矣又何賞之有遂不受也茅焦干秦豈求報利秦始皇遷太后於咸陽宫又撲殺兩弟齊人茅焦觧衣伏質入諫始皇乃迎太后歸於咸陽爵茅焦為上卿焦辭不受事見説苑也盡忠博愛之誠憤滿不能已耳又與仲况書諫之文多不載於是仲況與龔遂降龔字孟公長安人善論議扶風馬援班彪並器重之三輔决録注曰唯有孟公論可觀者班叔皮與京兆丞郭季通書曰劉孟公藏器於身用心篤固實瑚璉之器宗廟之寳也竟終不伐其功潛樂道術作記誨篇及文章傳於世年七十卒于家楊厚傳楊厚字仲桓廣漢新都人也祖}
  - {type: variant, offset: 466, length: 1, content: 楊, WYG: 春卿善圖䜟學為公孫述將漢兵平蜀春卿自殺臨命戒子綂曰吾綈袠中說文曰綈厚繒也綈音提有先祖所傳祕記為漢家用爾其修之綂感父遺言服闋辭家從犍為周循學習先法又就同郡鄭伯山受河洛書及天文推歩之術益部耆舊傳曰綂字仲通曾祖父仲續舉河東方正拜祁令甚有德惠人為立祠樂益部風俗因留家新都代修儒學}
