  - {type: variant, offset: 3307, length: 0, content: '', WYG: 或陰侵陽鄭𤣥注温卦以温侵寒卦以寒侵陽者君也陰者臣也専君政事亦陰侵陽也占曰日乗則有妖風日蒙則有地裂如是三年則致日食陰侵其陽漸積所致}
  - {type: variant, offset: 3307, length: 0, content: '', krp: 或陰侵陽鄭𤣥注温卦以温侵寒卦以寒侵陽者君也陰者臣也専君政事亦陰侵陽也占曰日乗則有妖風日蒙則有地裂如是三年則致日食陰侵其陽漸積所致}
  - {type: variant, offset: 3308, length: 0, content: '', WYG: 春前後温氣應節者詔令寛也其後復寒者無寛之實也夫}
  - {type: variant, offset: 3308, length: 0, content: '', krp: 春前後温氣應節者詔令寛也其後復寒者無寛之實也夫}
  - {type: variant, offset: 3309, length: 0, content: '', WYG: 室之邑必有忠信率土之人豈無貞賢未聞朝廷有所賞拔非所以求善贊務𢎞濟元元宜採納良臣以助聖化三事臣聞天道不逺三五復反春秋合誠圖曰至道不逺三五而反宋均注云三三正也五五行也三正五行王者改代之際會也能於此際自新如初則通無窮也今}
  - {type: page-break, offset: 3309, content: '', id: KR2a0009_WYG_060-18a, image: WYG0252/WYG0252-0722a.png}
  - {type: variant, offset: 3309, length: 0, content: '', krp: 室之邑必有忠信率土之人豈無貞賢未聞朝廷有所賞拔非所以求善贊務𢎞濟元元宜採納良臣以助聖化三事臣聞天道不逺三五復反春秋合誠圖曰至道不逺三五而反宋均注云三三正也五五行也三正五行王者改代之際會也能於此際自新如初則通無窮也今}
  - {type: variant, offset: 3310, length: 1, content: 薨, WYG: 少陽之歲法當乗起恐後年已往將遂驚動渉歴天門灾成戊己戌亥之間為天門也劉攽曰案文戊當作戌注云戌亥之間是也今春當旱夏必有水臣以六日七分候之可知夫灾眚之來縁類而應行有玷缺則氣逆于天精感變出以戒人君王者之義時有不登則損滋徹膳數年以來穀收稍減家貧户饉歲不如昔百姓不足君誰與足水旱之灾雖尚未至然君}
