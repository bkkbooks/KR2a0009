  - {type: variant, offset: 3314, length: 4, content: 建嗣建立, WYG: 武丁也尚書大傳曰武丁祭成湯有雉飛升鼎耳而雊祖己曰雉者野鳥升于鼎者欲為用也無則逺方将有來朝者故武丁内反諸已以思先王之道三年編髪重譯來朝者六國孔子曰吾於髙宗肜日見德之有報之疾也帝王紀曰髙宗饗國五}
