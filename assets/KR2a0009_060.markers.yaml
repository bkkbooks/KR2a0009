  - {type: variant, offset: 3343, length: 0, content: '', WYG: 天官書曰參為白虎下有三星曰罰為斬刈之事故主兵昴畢之間趙魏之分也變見西方亦應三輔凡金氣為變發在秋節西方白氣入玉井是金氣之變也臣恐立秋以後趙魏關西將有羌寇畔戾之患宜豫宣告諸郡使敬授人時輕徭役薄賦歛勿妄繕起堅倉獄備守衛回選賢能以鎭撫之回易也金精之變責歸上司上司謂司馬也建武二十七年改為太尉韓詩外傳曰司馬主天陰陽不調星辰失度責之司馬故云責歸上司也宜以五月丙午遣太尉服干戚建井旟干楯也戚斧也西方主兵故太尉執持楯斧所以厭金氣也井南方火宿也鳥隼曰旟也以火勝金故畫井星之文於旟而建之也書玉板之䇿引白氣之異書祝辭於玉板也於西郊責躬求愆謝咎皇天消滅妖氣盖以火勝金轉禍為福也以五月丙午日火勝金也六事臣竊見今月十四日乙邜巳時白虹貫日凡日傍氣色白而純者名為虹貫日中者侵太陽也見於春者政變常也方今中官外司各各考事考劾也其所考者或非急務又恭陵火灾主名未立立猶定也時考問延火者姓名未定也多所收捕備經考毒尋火為天戒以悟人君可順而不可違可敬而不可慢陛下宜恭已内省以備後灾凡諸考案幷湏立秋又易傳曰公能其事序賢進士後必有喜反之則白虹貫日以甲乙見者則譴在中台譴責也韓詩外傳曰三公者何司空司徒司馬也司馬主天司空主地司徒主人故陰陽不調星辰失度責之司馬山陵崩絶川谷不流責之司空五穀不殖草木不茂責之司徒甲乙東方主春生殖五穀之時也而白虹以甲乙日見明責在司徒也自司徒居位陰陽多謬時劉崎為司徒至陽嘉三年䇿免久無虚已進賢之䇿天下興議異人同咨咨嗟歎也且立春以來金氣再見謂元年閏十二月己丑夜有白氣入玉井二年正月乙邜白虹貫日此金氣再見金能勝木必有兵氣宜黜司徒以應天意陛下不早禳之将負臣言遺患百姓七事臣伏惟漢興以來三百三十九歲於詩三基髙祖起亥仲二年今在戌仲十年基當作朞謂以三朞之法推之也詩氾厯樞曰凡推其數皆從亥之仲起此天地所定位陰陽氣周而復始萬物死而復蘇大綂之始故王命一節為之十歲也詩氾歴樞曰卯酉為革政午亥為革命神在天門出入候聽宋均注云神陽氣君象也天門戍亥之間乾所據者言神在戌亥司候帝王興衰得失厥善則昌厥惡則亡於易雄雌祕歴今値困乏凡九二困者衆小人欲共困害君子也經曰困而不失其所其唯君子乎易困卦之辭也唯獨賢聖之君遭困遇險能致命遂志不去其道易困卦曰澤無水困君子以致命遂志困卦坎下兑上坎為水兌為澤水在澤下是謂竭涸之象故以喻困致命遂志謂君子委命固窮不離於道也陛下乃者潛龍養德幽隱屈戹謂順帝為太子時廢為濟陰王即位之元紫宫驚動歴運之㑹時氣已應然猶恐妖祥未盡君子思患而豫防之臣以為戌仲巳竟來年入季文帝改法除肉刑之罪漢法肉刑三謂黥也劓也左右趾也文帝除之當黥者髠鉗城旦舂當劓者笞三百當左右趾者笞五百也至今適三百載自文帝十三年除肉刑至順帝陽嘉二年合三百年也宜因斯際大蠲法令官名稱號輿服器械事有所更變大為小去奢就儉機衡之政除煩為簡改元更始招求幽隱舉方正徵有道博採異謀開不諱之路臣陳引際㑹恐犯忌諱書不盡言未敢䆒暢臺詰顗曰對云白虹貫日政變常也朝廷率由舊章何所變易而言變常又言當大蠲法令革易官號或云變常以致灾或改舊以除異何也又陽嘉初建復欲改元據何經典其以實對顗對曰方春東作布德之元陽氣開發養導萬物王者因天視聽奉順時氣宜務崇温柔遵其行令禮記月令孟春天子命相布德和令行慶施惠下及兆民仲春安萌牙養幼少存諸孤省囹圄去桎梏止獄訟是遵其行令也而今立春之後考事不息秋冬之政行乎春夏故白虹春見掩蔽日曜凡邪氣乗陽則虹蜺在日斯皆臣下執事刻急所致殆非朝廷優寛之本此其變常之咎也又今選舉皆歸三司非有周召之才而當則哲之重尚書曰知人則哲每有選用輒參之掾屬參豫也公府門巷賔客填集送去迎來財貨無已其當遷者競相薦謁各遣子弟充塞道路開長姦門興致浮偽非所謂率由舊章也尚書職在機衡宫禁嚴密北斗魁星第三為機第五為衡於天文為喉舌李固對䇿曰陛下之有尚書猶天有北斗主為喉舌斟酌元氣運平四時出納王命也私曲之意差不得通偏黨之恩或無所用選舉之任不如還在機密欲使尚書専掌選也臣誠愚戇不知折中斯固逺近之論當今之宜又孔子曰漢三百載計歴改憲春秋保乾圖曰陽起於一天帝為北辰氣成於三以立五神三五展轉機以動運故三百歲斗歴改憲也劉攽曰按文計當作斗注文可見盖斗字似草書計字後人因誤之三百四歲為一德五德千五百二十歲五行更用易乾鑿度孔子曰立德之數先立木金水火土德各三百四歲五德備凡千五百二十歲太終復初故曰五行更用更猶變改也王者随天譬猶自春徂夏改青服絳者也禮記月令孟春天子衣青衣服蒼玉孟夏則衣朱衣服赤玉也自文帝省刑適三百年而輕微之禁漸以殷積王者之法譬猶江河當使易避而難犯也故易曰易則易知簡則易從易簡而天下之理得矣今去奢即儉以先天下改易名號随事稱謂易曰君子之道或出或處同歸殊塗一致百慮是知變常而善可以除灾變常而惡必致於異今年仲竟來年入季仲終季始歴運變改故可改元所以順天道也臣顗愚蔽不足以荅聖問顗又上書薦黃瓊李固并陳消灾之術曰臣前對七事要政急務宜於今者所當施用誠知愚淺不合聖聽人賤言廢當受誅罰論語孔子曰不以人廢言怔營惶怖靡知厝身臣聞刳舟剡楫将欲濟江海也易曰黄帝刳木為舟剡木為楫聘賢選佐将以安天下也昔唐堯在上羣龍為用羣龍喻賢臣也鄭𤣥注易乾卦云爻皆體乾羣龍之象舜既}
