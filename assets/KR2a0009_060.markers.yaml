  - {type: variant, offset: 3349, length: 2, content: 侯蠡, krp: 殷薦之上帝殷盛也薦進也上帝天帝也靁動於地萬物喜豫作樂之象靁者所以開發萌牙辟陰除害萬物湏靁而解資雨而潤易解卦曰天地解而靁雨作靁雨作而百果草木皆甲坼也故經曰靁以動之雨以潤之易說卦文王者崇寛大順春令則靁應節不則發動於冬當震反潛故易傳曰當靁不靁太陽弱也今蒙氣不除日月變色則其效也天網恢恢疏而不失老子之文也随時進退應政得失大人者與天地合其德與日月合其明易乾卦文言之辭也大人天子也璇璣動作與天相應靁者號令其德生養號令殆廢當生而殺則靁反作其時無歲靁以冬鳴則歲飢也陛下若欲除灾昭祉順天致和宜察臣下尤酷害者亟加斥黜以安黎元則太皓悅和靁聲乃發太皓天也三事去年十月二十日癸亥太白與歲星合於房心太白在北歲星在南相離數寸光芒交接房心者天帝明堂布政之宫春秋元命包曰房四星心三星孝經鉤命决曰歲星守心年穀豐歲星守心為重華故年豐也尚書洪範記曰月行中道移節應期德厚受福重華留之天官書曰歲星一曰攝提一曰重華也重華者謂歲星在心也今太白從之交合明堂金木相賊而反同合太白金也歲星木也金克木故相賊也此以陰陵陽臣下専權之異也房心東方其國主宋夘為房心宋之分也石氏經曰石氏魏人石中夫也見藝文志劉攽曰案前書中夫當作申夫歲星出左有年出右無年今金木俱東歲星在南是為出右恐年穀不成宋人飢也陛下宜審詳明堂布政之務然後妖異可消五緯順序矣五緯五星也四事易傳曰陽無德則旱陰僣陽亦旱陽無德者人君恩澤不施於人也陰僣陽者禄去公室臣下専權也自冬渉春訖無嘉澤數有西風反逆時節春當東風也朝廷勞心廣為禱祈薦祭山川暴龍移市董仲舒春秋繁露曰春旱以甲乙日為蒼龍一長八尺居中央為小龍五各長四尺於東方皆東向其問相去八尺小童八人皆齋三日服青衣而舞之夏以丙丁日為赤龍服赤衣季夏以戊巳日為黄龍服黄衣秋以庚辛日為白龍服白衣冬以壬癸日為黑龍服黑衣牲各依其方色皆燔雄雞燒豭豬尾於里北門及市中以祈焉禮記歲旱魯穆公問於縣子縣子曰為之徙市不亦可乎見檀弓臣聞皇天感物不為偽動灾變應人要在責己若令雨可請降水可禳止則歲無隔并太平可待然而灾害不息者患不在此也不在祈禱立春以來未見朝廷賞録有功表顯有德存問孤寡賑恤貧弱而但見洛陽都官奔車東西收繫纎介牢獄充盈臣聞恭陵火處比有光曜比頻也時恭陵百丈廡災仍有光曜不絶明此天灾非人之咎丁丑大風掩蔽天地風者號令天之威怒皆所以感悟人君忠厚之戒又連月無雨将害粟麥若一穀不登則飢者十三四矣陛下誠宜廣被恩澤貸贍元元昔堯遭九年之水人有十載之蓄者簡稅防灾為其方也簡少也方法也願陛下早宣德澤以應天功若臣言不用朝政不改者立夏之後乃有澍雨於今之際未可望也若政變於朝而天不雨則臣為誣上愚不知量分當鼎鑊書奏特詔拜郎中辭病不就即去歸家至四月京師地震遂䧟陽嘉二年四月己亥地震六月丁丑洛陽地䧟是月旱也其夏大旱秋鮮卑入馬邑城破代郡兵明年西羌㓂隴右陽嘉二年七月種羌宼隴西皆略如顗言後復公車徵不行同郡孫禮者積惡凶暴好游俠與其同里人常慕顗名德欲與親善顗不顧以此結怨遂為禮所殺襄楷傳襄楷字公矩平原隰陰人也風俗通曰襄姓楚大夫襄老之後隰陰縣在隰水之南故城在今齊州臨邑縣西也好學博古善天文陰陽之術桓帝時宦官専朝政刑暴濫又比失皇子灾異尤數延熹九年楷自家詣闕上疏曰臣聞皇天不言以文象設敎堯舜雖聖必歴象日月星辰察五緯所在故能享百年之夀為萬世之法堯年一百一十七歲舜年一百一十二歲言百年舉全數臣切見去歲五月熒惑入太微犯帝座出端門不軌常道天官書曰太微南四星中為端門軌猶依也其閏月庚辰太白入房犯心小星震動中耀中耀天王也傍小星者天王子也夫太微天廷五帝之坐而金火罰星揚光其中太白金也熒惑火也天文志曰逆夏令傷火氣罰見熒惑逆秋令傷金氣罰見太白故金火並為罰星也於占天子凶又俱入房心法無繼嗣今年歲星久守太微逆行西至掖門還切執法天官書曰端門左右星為掖門太微南四星為執法切謂迫近也歲為木精好生惡殺而淹留不去者咎在仁德不脩誅罰太酷前七年十二月熒惑與歲星俱入軒轅逆行四十餘日而鄧皇后誅其冬大寒殺鳥獸害魚鼈城傍竹栢之葉有傷枯者續漢志曰延熹元年洛陽城傍竹栢葉有傷者臣聞於師曰栢傷竹枯不出三年天子當之今洛陽城中人夜無故呌呼云有火光人聲正諠續漢志曰桓帝延熹九年三月京師有火光轉行人相驚譟於占亦與竹栢枯同自春夏以來連有霜雹及大雨靁而臣作威作福刑罰急刻之所感也太原太守劉瓆南陽太守成瑨志除姦邪其所誅翦皆合人望謝承書曰劉瓆字文理平原人也遷太原太守郡有豪强中官親戚為百姓所患瓆深疾之到官收其魁帥殺之所臧匿主人悉坐伏誅桓帝徵詣廷尉以瓆宗室不忍致之于刑使自殺成瑨字㓜平𢎞農人遷南陽太守時桓帝美人外親張子禁怙恃榮貴不畏法網瑨與功曹岑晊捕子禁付宛獄笞殺之桓帝徵瑨詣廷尉下獄死瓆音質瑨音晉而陛下受閹豎之譛乃逺加考逮三公上書乞哀瓆等不見採察時太尉陳蕃司徒劉矩司空劉茂共上書訟瓆等帝不納而嚴被譴讓憂國之臣將遂杜口矣臣聞殺無罪誅賢者禍及三世黄石公三畧曰傷賢者殃及三世蔽賢者身當其害逹賢者福流子孫疾賢者名不全自陛下即位以來頻行誅伐梁宼孫鄧並見族滅梁冀宼榮孫夀鄧萬世等也其從坐者又非其數李雲上書明主所不當諱杜衆乞死諒以感悟聖朝時𢎞農五官掾杜衆傷雲以忠諫獲罪遂上書云願與李雲同日死也曾無赦宥而并被殘戮天下之人咸知其寃漢興以來未有拒諫誅賢用刑太深如今者也永平舊典諸當重論皆湏冬獄先請後刑所以重人命也頃數十歲以來州郡翫習又欲避請讞之煩廣雅曰讞疑也謂罪有疑者讞於廷尉也輒託疾病多死牢獄長吏殺生自己死者多非其罪魂神寃結無所歸訴滛厲疾疫自此而起淫過也左傳曰陰淫寒疾陽淫熱疾昔文王一妻誕致十子史記曰太姒文王正妃也其長子伯邑考次武王發次管叔鮮次周公旦次蔡叔度次曹叔振鐸次成叔武次霍叔處次康叔封冉季載同母兄弟十人也今宫女數千未聞慶育宜脩德省刑以廣螽斯之祚詩國風序曰螽斯后妃子孫衆多也言若螽斯不妬忌則子孫衆多也注云螽斯蚣蝑也凡有情慾者無不妬忌唯蚣蝑不爾各得受氣而生子故以喻焉祚福也又七年六月十三日河内野王山上有龍死長可數十丈延熹七年也袁山松書曰長可百餘尺扶風有星隕為石聲聞三郡夫龍形狀不一小大無常故周易况之大人帝王以為符瑞大人天子也乾卦九五曰飛龍在天大人造也九五處天子之位故以飛龍喻焉尚書中候曰舜沈璧於清河黄龍負圖出水或聞河内龍死諱以為蛇夫龍能變化蛇亦有神皆不當死昔秦之將衰華山神操璧以授鄭客曰今年祖龍死祖龍謂秦始皇也樂資春秋後傳曰使者鄭客入函谷至平舒見素車白馬曰}
