  - {type: variant, offset: 2917, length: 0, content: '', WYG: 詔備古禮以聘厚古禮謂以束帛加璧安車蒲輪等遂辭疾不就建和三年太后復詔徵之經四年不至年八十二卒於家䇿書弔祭鄉人諡曰文父門人為立廟郡文學掾史春秋饗射常祠之後漢書卷六十上後漢書卷六十上考證蘇竟傳夫仲夏甲寅為八魁注冬三月甲寅壬戌監本壬戌作壬寅臣㑹汾按上文言春三月己巳丁丑夏三月甲寅壬辰秋三月己亥丁未則十二支中皆越四位取之獨除去子午卯酉不用也冬甲寅當配以壬戌作壬寅者非是定從宋本後漢書卷六十上考證欽定四庫全書後漢書卷六十}
