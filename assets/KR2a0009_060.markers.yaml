  - {type: variant, offset: 3380, length: 0, content: '', WYG: 河者諸侯位也孝經援神契曰五岳視三公四凟視諸侯也清者屬陽濁者屬陰河當濁而反清者陰欲為陽諸侯欲為帝也太學天子教化之宫其門無故自壞者言文德將䘮教化廢也京房易傳曰河水清天下}
  - {type: variant, offset: 3380, length: 0, content: '', krp: 河者諸侯位也孝經援神契曰五岳視三公四凟視諸侯也清者屬陽濁者屬陰河當濁而反清者陰欲為陽諸侯欲為帝也太學天子教化之宫其門無故自壞者言文德將䘮教化廢也京房易傳曰河水清天下}
  - {type: variant, offset: 3381, length: 2, content: 原懷, WYG: 今天垂異地吐妖人厲疫三者並時而有河清猶春秋麟不當見而見孔子書之以為異也公羊傳曰西狩獲麟何以書記異也何以異麟非中國獸也劉攽曰注何以異案文當云何異爾臣前上琅邪宫崇受于吉神書不合明德于姓吉名也神書即今道家太平經也其經以甲乙丙丁戊巳庚辛壬癸為部每部一十七卷也臣聞布穀鳴於孟夏蟋蟀吟於始秋物有微而志信人有賤而言忠布穀一名戴絍一名戴勝蟋蟀促織也春秋考異郵曰孟夏戴勝降立秋促織鳴言雖微物不失信也絍音汝林反臣雖至賤誠願賜清間極盡所言書奏不省十餘日復上書曰臣伏見太白北入數日復出東方其占當有大兵中國弱四夷彊臣又推歩熒惑今當出而潛必有陰謀皆由獄多寃結忠臣被戮德星所以久守執法亦為此也德星歲星也陛下宜承天意理察寃獄為劉瓆成瑨虧除罪辟追錄李雲杜衆等子孫夫天子事天不孝則日食星鬭比年日食於正朔延熹八年正月辛巳朔日食九年正月辛邜朔日食三光不明五緯錯戾前者宫崇所獻神書專以奉天地順五行為本亦有興國廣嗣之術其文易曉參同經典而順帝不行故國𦙍不興太平經典帝}
