  - {type: variant, offset: 1212, length: 1167, content: 給祭具慶垂涕曰生雖不獲供養終得奉祭祀私願足矣欲求作祠堂恐有自同恭懷梁后之嫌遂不敢言常泣向左右以為沒齒之恨後上言外祖母王年老遭憂病下土無毉藥願乞詣洛陽療疾於是詔宋氏悉歸京師除慶舅衍俊蓋暹等皆為郎十五年有司以日食陰盛奏遣諸王侯就國詔曰甲子之異責由一人諸王幼稚早離顧復弱冠相育常有蓼莪凱風之哀選懦之恩知非國典且復須留至冬從祠章陵詔假諸王羽林騎各四十人後中傅衞訢私為臧盜千餘萬詔使案理之并責慶不舉之狀慶曰訢以師傅之尊選自聖朝臣愚唯知言從事聽不甚有所糺察帝嘉其對悉以訢臧財賜慶及帝崩慶號泣前殿嘔血數升因以發病明年諸王就國鄧太后特聽清河王置中尉內史賜什物皆取乘輿上御以宋衍等並為清河中大夫慶到國下令寡人生於深宮長於朝廷仰恃明主垂拱受成既以薄祐早離顧復屬遭大憂悲懷感傷蒙恩大國職惟藩輔新去京師憂心煢煢夙夜屏營未知所立蓋聞智不獨理必須明賢今官屬並居爵任失得是均庶望上遵策戒下免悔咎其糺督非枉明察典禁無令孤獲怠慢之罪焉鄧太后以殤帝襁抱遠慮不虞留慶長子祐與嫡母耿姬居清河邸至秋帝崩立祐為嗣是為安帝太后使中黃門送耿姬歸國帝所生母左姬字小娥小娥姊字大娥犍為人也初伯父聖坐妖言伏誅家屬沒官二娥數歲入掖庭及長並有才色小娥善史書喜辭賦和帝賜諸王宮人因入清河第慶初聞其美賞傅母以求之及後幸愛極盛姬妾莫比姊妹皆卒葬於京師慶立凡二十五年乃歸國其年病篤謂宋衍等曰清河埤薄欲乞骸骨於貴人冢傍下棺而已朝廷大恩猶當應有祠室庶母子并食魂靈有所依庇死復何恨乃上書太后曰臣國土下溼願乞骸骨下從貴人於樊濯雖歿且不朽矣及今口目尚能言視冒昧干請命在呼吸願蒙哀憐遂薨年二十九遣司空持節與宗正奉弔祭又使長樂謁者僕射中謁者二人副護喪事賜龍旂九旒虎賁百人儀比東海恭王太后使掖庭丞送左姬喪與王合葬廣丘子愍王虎威嗣永初元年太后封宋衍為盛鄉侯分清河為二國封慶少子常保為廣川王子女十一人皆為鄉公主食邑奉明年常保薨無子國除虎威立三年薨亦無子鄧太后復立樂安王寵子延平為清河王是為恭王太后崩有司上言清河孝王至德淳懿載育明聖承天奉祚為郊廟主漢興高皇帝尊父為太上皇宣帝號父為皇考序昭穆置園邑太大宗之義舊章不忘宜上尊號曰孝德皇皇妣左氏曰孝德后孝德皇母宋貴人追謚曰敬隱后乃告祠高廟使司徒持節與大鴻臚奉策書璽綬之清河追上尊號又遣中常侍奉太牢祠典護禮儀侍中劉珍等及宗室列侯皆往會事尊陵曰甘陵廟曰昭廟置令丞設兵車周衞比章陵復以廣川益清河國尊耿姬為甘陵大貴人又封女弟侍男為涅陽長公主別得為舞陰長公主久長為濮陽長公主直得為平氏長公主餘七主並早卒故不及進爵追贈敬隱后女弟小貴人印綬追封謚宋楊為當陽穆侯楊四子皆為列侯食邑各五千戶宋氏為卿校侍中大夫謁者郎吏十餘人孝德后異母弟次及達生二人諸子九人皆為清河國郎中耿貴人者牟平侯舒之孫也貴人兄寶襲封牟平侯帝以寶嫡舅寵遇甚渥位至大將軍事已見耿舒傳延平立三十五年薨子蒜嗣冲帝崩徵蒜詣京師將議為嗣會, WYG: ''}
