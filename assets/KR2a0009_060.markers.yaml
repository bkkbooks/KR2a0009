  - {type: variant, offset: 3342, length: 0, content: '', WYG: 矣熒惑果退三舍也四事臣竊見皇子未立儲宫無主仰觀天文太子不明洪範五行傳曰心之大星天王也其前星太子也後星庶子也熒惑以去年春分後十六日在婁五度婁西方宿也推歩三綂熒惑今當在翼九度翼南方宿也今反在桞三度桞東方宿也則不及五十餘度言熒惑行遲也去年八月二十四日戊辰熒惑厯輿鬼東入軒轅出后星北東去四度北旋復還軒轅者後宫也熒惑者至陽之精也天之使也熒惑南方火盛陽之精也天文要集曰天有五帝五星為之使而出入軒轅繞還往來易曰天垂象見吉凶其意昭然可見矣禮天子一娶九女嫡媵畢具今宫人侍御動以千計或生而幽隔人道不通鬱積之氣上感皇天故遣熒惑入軒轅理人倫垂象見異以悟主上昔武王下車出傾宮之女表商容之閭尚書大傅曰武王入殷表商容之閭歸傾宮之女以理人倫以表賢德故天授以聖子成王是也今陛下多積宮人以違天意故皇𦙍多夭嗣體莫寄詩云敬天之怒不敢戲豫詩大雅板篇之文也注云戲豫逸豫也方今之福莫若廣嗣廣嗣之術可不深思宜簡出宮女恣其姻嫁則天自降福子孫千億惟陛下丁寜再三留神於此左右貴倖亦宜惟臣之言以悟陛下盖善言古者合於今善言天者合於人前書武帝詔曰善言天者必有徵於人善言古者必有驗於今願訪問百僚有違臣言者臣當受茍言之罪論語孔子曰君子于其言無所茍而已矣五事臣竊見去年閏十月十七日己丑夜有白氣從西方天苑趨左足入玉井數日乃滅續漢志曰時客星氣白廣二尺長五丈起天苑西南天官書曰西方勾曲九星三處羅一曰犬旗二曰天苑三曰九斿參星下四小星為玉井其外四星左右肩股也春秋曰有星孛于大辰大辰者何大火也春秋昭十七年有星孛于大辰爾雅曰大辰房心尾也孫炎曰龍星明者可以為時候故曰大辰大火為大辰罰又為大辰爾雅曰罰謂之大辰也北極亦為大辰爾雅曰北極謂之北辰李廵曰北極天心也居北方正四時謂之北辰也所以孛一宿而連三宿者言北辰王者之宫也凡中宫無節政教亂逆威武衰微則此三星以應之也罰者白虎其宿主兵其國趙}
