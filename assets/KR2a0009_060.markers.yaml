  - {type: variant, offset: 3402, length: 1, content: 中, WYG: 沉湎於酒事見列女傳葉公好龍眞龍游廷子張見魯哀公七日哀公不禮子張曰君之好士有似葉公子髙之好龍也葉公子髙好畫龍天龍聞之降之窺頭於牖葉公子髙見之棄而反走五色無主是葉公子髙好夫似龍而非好眞龍也事見新序今黄門}
  - {type: variant, offset: 3402, length: 1, content: 中, krp: 沉湎於酒事見列女傳葉公好龍眞龍游廷子張見魯哀公七日哀公不禮子張曰君之好士有似葉公子髙之好龍也葉公子髙好畫龍天龍聞之降之窺頭於牖葉公子髙見之棄而反走五色無主是葉公子髙好夫似龍而非好眞龍也事見新序今黄門}
  - {type: variant, offset: 3405, length: 2, content: 江京, WYG: 天刑之人陛下愛待兼倍常寵繼嗣未兆豈不為此天官宦者星不在紫宫而在天市明當給使主市里也山陽公載記曰市垣二十二星而帝座居其中宦者四星唯供市買之事也今乃反處常伯之位實非天意常伯侍中也尚書曰常伯常任又聞宫中立黄老浮屠之祠浮屠即佛陀但聲轉耳並謂佛也解見楚王英傳此道清虛貴尚無為好生惡殺省慾去奢今陛下嗜慾不去殺罰過理既乖其道豈獲其祚哉或言老子入夷狄為浮屠或言當時言也老子西入夷狄始為浮屠之化浮屠不三宿桑下不欲久生恩愛精之至也言浮屠之人寄桑下者不經三宿便即移去示無愛戀之心也天神遺以好女浮屠曰此但革囊盛血遂不盼之四十二章經天神獻玉女於佛佛曰此是革嚢盛衆穢耳其守一如此乃能成道今陛下婬女艶婦極天下之麗甘肥飲美單天下之味柰何欲如黄老乎書上即召詔尚書問狀劉攽曰案文詔當作詣楷曰臣聞古者本無宦官武帝末春秋髙數游後宫始置之耳元帝時任宦者石顯為中書令前將軍蕭望之}
