  - {type: variant, offset: 3352, length: 4, content: 侯翼元初, WYG: 華山君願以一牘致滈池君子之咸陽過滈池見一大梓樹有文石取以扣樹當有應者以書與之鄭客如其言見宫闕如王者居謁者出受書入有頃云今年祖龍死始皇逃之死於沙丘史記曰始皇崩於沙丘平臺沙丘在今邢州平鄉縣東北王莽天鳳二年訛言黄山宫有死龍之異王莽傳曰時訛言黄龍墮地死黄山宫中百姓奔走往觀者乃有萬數莽惡之捕繫詰語所從起而竟不得後漢誅莽光武復興虚言猶然况於實邪夫星辰麗天猶萬國之附王者也下將畔上故星亦畔天石者安類墜者失埶春秋五石隕宋其後襄公為楚所執左傳魯僖公十}
