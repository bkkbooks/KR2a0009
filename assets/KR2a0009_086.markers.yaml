  - {type: variant, offset: 2781, length: 0, content: '', WYG: 士若其好通汲善明發升薦仁人之情也夫士進則世收其器賢}
  - {type: variant, offset: 2781, length: 0, content: '', krp: 士若其好通汲善明發升薦仁人之情也夫士進則世收其器賢}
  - {type: variant, offset: 2782, length: 0, content: '', WYG: 則人獻其能能獻既已厚其功器收亦理兼天下言}
