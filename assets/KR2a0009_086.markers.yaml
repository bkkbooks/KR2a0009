  - {type: variant, offset: 4432, length: 134, content: 男子二十以上者六十三人命儒者講論語僖因自陳謝帝曰今日之會寧於卿宗有光榮乎對曰臣聞明王聖主莫不尊師貴道今陛下親屈萬乘辱臨敝里此乃崇禮先師增煇聖德至於光榮非所敢承帝大笑曰非聖者子孫焉有斯言乎遂拜僖郎中賜襃成侯損及孔氏男女錢帛詔僖從還京師使校書東觀冬拜臨晉令崔駰以家林筮之謂, WYG: 雖}
