  - {type: variant, offset: 5382, length: 1, content: 絕, WYG: 元康四年至世祖建武之元又八十七年晧猶為六世孫也又蜀志張翼傳晧作浩是翼之高祖亦不言其出於留侯如孔明之於豐鄧芝之於禹來敏之於歙也張晧子綱司徒高第辟為御史别本作司徒辟高第為御史王龔傳不至重問注成帝時丞相薛宣御史大夫翟方進成帝監本作武帝臣㑹汾按薛宣翟方進乃成帝時}
