  - {type: variant, offset: 1592, length: 406, content: 皆稱疾不就州牧劉焉表薦之時王塗隔塞詔命竟不至年七十九建安七年卒于家楊政字子行京兆人也少好學從代郡范升受梁丘易善說經書京師為之語曰說經鏗鏗楊子行教授數百人范升嘗為出婦所告坐繫獄政乃肉袒以箭貫耳抱升子潛伏道傍候車駕而持章叩頭大言曰范升三娶唯有一子今適三歲孤之可哀武騎虎賁懼驚乘輿舉弓射之猶不肯去旄頭又以戟叉政傷政猶不退哀泣辭請有感帝心詔曰乞楊生師即尺一出升政由是顯名為人嗜酒不拘小節果敢自矜然篤於義時帝壻梁松皇后弟陰就皆慕其聲名而請與交友政每共言論常切磋懇至不為屈撓嘗詣楊虛侯馬武武難見政稱疾不為起政入戶徑升牀排武把臂責之曰卿蒙國恩備位藩輔不思求賢以報殊寵而驕天下英俊此非養身之道也今日動者刀入脅武諸子及左右皆大驚以為見劫操兵滿側政顏色自若會陰就至責數武令為交友其剛果任情皆如此也建初中官至左中郎將張興字君上潁川鄢陵人也習梁丘易以教授建武中舉孝廉為郎謝病去復歸聚徒後辟司徒馮勤府勤舉為孝廉稍遷博士永平初遷侍中祭酒十年, WYG: ''}
