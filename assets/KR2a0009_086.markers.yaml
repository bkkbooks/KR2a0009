  - {type: variant, offset: 2782, length: 0, content: '', krp: 則人獻其能能獻既已厚其功器收亦理兼天下言}
  - {type: variant, offset: 2783, length: 1, content: 俊, WYG: 人見用即人競獻其所能但有能即獻動必有功功多賞厚故言己厚其功有才器必被收用用則海内蒙福故曰理兼天下其利甚博而人莫之先豈同折枝於長者以不為為難乎以不為為難言不之難也謂進賢逹士同折枝之易而不為之孟子謂齊宣王曰今恩足以及禽獸而不能加於百姓者何非力不能是不為也王曰不能不為二者謂何也孟子曰夫挟太山以超北海王能乎王曰不能為長者折枝王能乎曰不能也孟子曰夫挟太山以超北海是實不能不可彊也為長者折枝甚易而王不為非不能也老吾老以及人之老㓜吾㓜以及人之㓜天下可運諸掌何為不能加於百姓乎劉熙注孟子曰折枝若今之案摩也昔桞下惠見抑於臧文桞下惠姓展名禽字獲食邑於桞下諡曰惠臧文仲魯大夫姓臧孫名辰左傳仲尼曰臧文仲不仁者三下展禽廢六關妾織蒲言文仲知桞下惠之賢而使在下位故曰抑之淳于長受稱于方進成帝時定陵侯淳于長以太后姊子為九卿翟方進為丞相獨與長交稱薦之然則立德者以幽陋好遺顯登者以貴塗易引故晨門有抱關之夫論語子路宿於石門晨門曰奚自注云石門魯城外門也晨主守門晨夜開閉也史記侯嬴夷門抱關者守門必抱關故兼言之柱下無朱文之軫也神仙傳曰老子周宣王時為柱下史朱文畫車為文也軫車後横木也言貧賤之人多被淪弃所以晨門之下必有抱關之賢柱下之㣲永無朱文之轍也暢字叔茂少以清實為稱無所交黨初舉孝亷辭病不就大將軍梁商特辟舉茂才四遷尚書令出為齊相齊王喜之相徵拜司𨽻校尉轉漁陽太守所在以嚴明為稱坐事免官是時}
