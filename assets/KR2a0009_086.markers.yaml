  - {type: variant, offset: 597, length: 0, content: '', WYG: 冀河南尹不疑蒙外戚之援荷國厚恩以芻蕘之資居阿衡之任不能敷揚五教翼讃日月而專為封豕長蛇肆其貪叨左傳申包胥曰吳為封豕長蛇薦食上國也甘心好貨縱恣無底多樹謟諛以害忠良誠天威所不赦大辟所宜加也謹條其無君之心十五事斯皆臣子所切齒者也左傳曰有無君之心而後動于惡也前書鄒陽謂葢侯王信君曰太后怫鬰泣血切齒側目於貴臣矣書御京師震竦御進也時冀妺為皇后内寵方盛諸梁姻族滿朝帝雖知綱言直終不忍用時廣陵賊張嬰等衆數萬人殺刺史二千石寇亂揚徐間積十餘年朝廷不能討冀乃諷尚書以綱為廣陵太守因欲以事中之前遣郡守率多求兵馬綱獨請單車之職既到乃將吏卒十餘人徑造嬰壘以慰安之求得與長老相見申示國恩嬰初大驚既見綱誠信乃出拜謁綱延置上坐問所疾苦乃譬之曰前後二千石多肆貪暴二千石謂太守也故致公等懷憤相聚二千石信有罪矣然為之者又非義也今主上仁聖欲以文德服叛故遣太守思以爵祿相榮不願以刑罸相加今誠轉禍為福之時也若聞義不服天子赫然震怒荆揚兖豫大兵雲合豈不危乎若不料強弱非明也弃善取惡非智也去順效逆非忠也身絶血嗣非孝也凡祭皆用牲故曰血嗣背正從邪非直也見義不為非勇也六者成敗之幾利害所從公其深計之嬰聞泣}
