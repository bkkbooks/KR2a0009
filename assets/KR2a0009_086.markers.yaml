  - {type: variant, offset: 3499, length: 173, content: 所作其中多近鄙別字頗類世俗之辭恐疑誤後生帝不納敏因其闕文增之曰君無口為漢輔帝見而怪之召敏問其故敏對曰臣見前人增損圖書敢不自量竊幸萬一帝深非之雖竟不罪而亦以此沈滯與班彪親善每相遇輒日旰忘食夜分不寢自以為鍾期伯牙莊周惠施之相得也後三遷長陵令永平五年詔書捕男子周慮慮素有名稱而善於敏敏坐繫免官及出歎曰瘖聾之徒真世之有道者也何謂察察而遇斯患乎十一年除郎中, WYG: 冢左}
