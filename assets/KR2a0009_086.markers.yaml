  - {type: variant, offset: 5254, length: 0, content: '', WYG: 竇武同謀俱死故郃與球相結事未及發球復以書勸郃曰公出自宗室位登台鼎天下瞻望社稷鎮衛豈得雷同容容無違而已今曹節等放縱為害而乆在左右又公兄侍中受害節等永樂太后所親知也今可表徙衛尉陽球為司𨽻校尉以次收節等誅之政出聖主天下太平可翹足而待也又尚書劉納以正直忤宦官出為歩兵校尉亦深勸於郃郃曰凶豎多耳目恐事未㑹先受其禍納曰公為國棟}
