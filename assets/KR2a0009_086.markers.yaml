  - {type: variant, offset: 2791, length: 1, content: 封, WYG: 共飾匿莫復盡心言各飾偽辭隠匿真狀也梁太后省奏乃赦暠承罪免官而已後梁州羗動以暠為梁州刺史甚得百姓歡心被徵當遷吏人詣闕請留之太后歎曰未聞刺史得人心若是乃許之暠復留一年遷漢陽太守戎夷男女送至漢陽界暠與相揖謝千里不得乗車及到郡化行羌胡禁止侵掠遷使匈奴中郎將時遼東烏桓反叛復轉遼東太守烏桓望風率服迎拜於界上坐事免歸後司𨽻校尉舉暠賢良方正不應徵拜議郎遷南郡太守入為尚書㑹匈奴寇并涼二州桓帝擢暠為度遼將軍暠到營所先宣恩信誘降諸胡其有不服然後加討羌虜先時有生見獲質於郡縣者悉遣還之誠心懷撫信賞分明由是羌胡龜兹莎車烏孫䓁皆来順服暠乃去􅇏燧除候望畫舉􅇏}
