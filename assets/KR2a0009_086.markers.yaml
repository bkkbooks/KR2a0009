  - {type: variant, offset: 2602, length: 167, content: 都尉授族子始昌始昌傳族子勝為大夏侯氏學勝傳從兄子建建別為小夏侯氏學三家皆立博士又魯人孔安國傳古文尚書授都尉朝朝授膠東庸譚為尚書古文學未得立歐陽歙字正思樂安千乘人也自歐陽生傳伏生尚書至歙八世皆為博士歙既傳業而恭謙好禮讓王莽時為長社宰更始立為原武令世祖平河北到原武見歙在縣脩政遷河南都尉後行太守事世祖即位始為河南尹封被陽侯建武五年坐事免官, WYG: ''}
