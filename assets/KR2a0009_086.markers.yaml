  - {type: variant, offset: 3685, length: 134, content: 汝南汝陽人也父揚少孤微常脩逆旅以供過客而不受其報防年十六仕郡小吏世祖巡狩汝南召掾史試經防尤能誦讀拜為守丞防以未冠謁去師事徐州刺史蓋豫受古文尚書經明舉孝廉拜郎中撰尚書雜記三十二篇四十萬言太尉張禹薦補博士稍遷陳留太守坐法免年七十八卒於家子舉自有傳孔僖字仲和魯國魯人也自安國, WYG: 卿}
