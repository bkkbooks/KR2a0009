  - {type: variant, offset: 2786, length: 0, content: '', krp: 職暢深疾之下車奮厲威猛其豪黨有釁穢者莫不紏發㑹赦事得散暢追恨之更為設法諸受臧二千萬以上不自首實者盡入財物若其隐伏使吏發屋伐樹堙井夷竈豪右大震功曹張敞奏記諫曰五教在寛著之經典湯去三面八方歸仁史記曰湯為夏方伯得專征伐出見野張四面網祝曰自天下四方皆入吾網湯曰嘻盡之矣去其三面祝曰欲左左欲右右不用命乃入吾網諸侯聞曰湯德至禽獸於是諸侯畢服嘻音僖武王入殷先去炮烙之刑列女傳紂為銅柱以膏塗之加於炭之上使有罪縁焉足滑跌墯紂與妲己笑以為樂名曰炮烙之刑臣賢案史記及帝王代紀皆言文王為西伯獻洛西之地請除炮烙之刑今云武王與此不同高祖鑒秦唯定三章之法孝文皇帝感一緹縈蠲除肉刑文帝時太倉令淳于公有罪罪當刑淳于公無男有五女罵其女曰生女不生男緩急非有益也其少女緹縈自傷悲泣随父至長安上書請没官為婢以贖父文帝悲憐其意為除肉刑卓茂文翁召父之徒皆疾惡嚴刻務崇温厚景帝時文翁為蜀郡守仁愛教化宣帝時召信臣為南陽太守視人如子其化大行仁賢之政流聞後世夫明哲之君網漏吞舟之魚韓詩外傳曰夫吞舟之魚不居潛澤前書曰高祖約法三章號為網漏吞舟之魚也然後三光明於上人物悦於下言之若迂其效甚近迂遠也發屋伐樹將為嚴烈雖欲懲惡難以聞遠以明府上智之才日月之曜莊子曰飾智以驚愚脩身以明汚昭昭乎若掲日月而行也敷仁恵之政則海内改觀實有折枝之易而無挟山之難郡為舊都侯甸之國園廟出於章陵五百里甸服千里侯服南陽去洛千里故曰侯甸南頓君以上四廟在焉三后生自新野光烈皇后和帝隂后鄧后並新野人士女沾教化黔首仰風流自中興以来功臣將相繼世而隆愚以為懇懇用刑不如行恩孳孳求姦未若禮賢舜舉臯陶不仁者遠論語子夏之辭也随㑹為政晉盗奔秦左傳晉命随㑹將中軍且為太傅晉國之盜奔秦也虞芮入境譲心自生史記曰文王為西伯隂行善行諸侯皆来決平於是虞芮之人有獄不決乃如周入界見耕者譲畔少者譲長虞芮二人不見西伯慙而相謂曰吾所争周人所耻曷為取辱遂俱譲而還也化人在德不在用刑暢深納敞諫更崇寛政慎刑簡罸教化遂行郡中豪族多以奢靡相尚暢常布衣皮褥車馬嬴敗以矯其敝同郡劉表時年十七從暢受學進諫曰夫奢不僭上儉不逼下禮記曰君子上不僭上下不逼下也循道行禮貴處可否之間蘧伯玉恥獨為君子府君不希孔聖之明訓而慕夷齊之末操論語孔子曰奢則不遜儉則固言仲尼得奢儉之中而夷齊飢死是末操也無乃皎然自貴於世乎暢曰昔公儀休在魯㧞園葵去織婦史記曰魯相公儀休之其家見織帛怒而出其婦食於舍而茹葵愠而㧞其葵曰吾已食禄又奪園夫女子利乎孫叔敖相楚其子被裘刈薪史記曰孫叔敖為楚相且死囑其子曰我死汝貧困往見優孟言孫叔敖子也居數年其子貧負薪逢優孟優孟言之於王封之寢丘四百户也夫以約失之鮮矣論語孔子之辭也言儉則無失聞伯夷之風者貪夫亷懦夫有立志孟子之辭雖以不德敢慕遺烈後徵為長樂衛尉建寧元年遷司空數月以水災䇿免明年卒於家子謙為大將軍何進長史謙子粲以文才知名粲字仲宣蔡邕見而竒之時邕才學顯著貴重朝廷車騎填門賔客盈坐聞粲在門倒屣迎之旣至年幼容狀短小一座盡驚邕曰王公之孫有}
  - {type: variant, offset: 2787, length: 2, content: 迹九, WYG: 才吾不如也太祖辟粲為丞相掾後為侍中博物多識問無不對嘗與人行讀道邊碑人問卿能闇記乎因使背而誦之一字不失觀人圍棊粲為覆之棊者不信以帊蓋之更以它局為之不誤一道}
