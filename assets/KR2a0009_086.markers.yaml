  - {type: variant, offset: 2780, length: 0, content: '', WYG: 政崇温和好才愛士引進郡人黄憲陳蕃等憲雖不屈蕃遂就吏蕃性氣高明初到龔不即召見之乃留記謝病去龔怒使除其錄功曹袁閬請見言曰聞之傳曰人臣不見察於君不敢立於朝蕃既以賢見引不宜退以非禮龔改容謝曰是吾過也乃復厚遇待之由是後進知名之士莫不歸心焉閬字奉高數辭公府之命不脩異操而致名當時永建元年徵龔為太僕轉太常四年遷司空以地震䇿免永和元年拜太尉在位恭慎自非公事不通州郡書記其所辟命皆海内長者龔深疾宦官專權志在匡正乃上書極言其狀請加放斥諸黄門恐懼各使賔客誣奏龔罪順帝命亟自實亟急也音紀力反前掾李固時為大將軍梁商從事中郎乃奏記於商曰今旦聞下太尉王公勅令自實未審其事深淺何如王公束脩厲節敦樂蓺文不求茍得不為苟行前書曰揚子雲曰蜀嚴湛㝠不作苟見不為茍得但以堅貞之操違俗失衆横為䜛佞所構毁衆人聞知莫不歎慄夫三公尊重承天象極未有詣理訢寃之義三公承助天子位象三台故曰承天象極哀帝時丞相王嘉有罪召詣廷尉詔獄主簿曰將相不對理陳寃相踵以為故事君侯宜引決也纎㣲感槩輒引分決是以舊典不有大罪不至重問大臣獄重故曰重問成帝時丞相薛宣御史大夫翟方進有罪上使五二千石雜問音義云大獄重故以二千石五人同問之王公沈静内明不可加以非理卒有它變則朝廷獲害賢之名羣臣無救䕶之節矣昔綘侯得罪袁盎觧其過文帝時丞相綘侯周勃免就國人告以為反諸公莫敢為言唯郎中袁盎明綘侯無罪綘侯得釋盎有力也魏尚獲戾馮唐訴其寃馮唐安陵人文帝時為郎署長上與論將帥唐曰臣聞魏尚為雲中守坐丄功首虜差六級陛下下之吏削其爵罸作之臣愚以為陛下法太明罸太重文帝悦捨尚復官也時君善之列在書傳今將軍内倚至尊外典國柄言重信著指撝無違宜加表救濟王公之艱難語曰善人在患飢不及餐斯其時也商即言之於帝事乃得釋龔在位五年以老病乞骸骨卒於家子暢論曰張晧王龔稱為}
