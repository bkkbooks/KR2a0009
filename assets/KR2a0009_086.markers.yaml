  - {type: variant, offset: 2790, length: 0, content: '', WYG: 四十卒魏志有傳种暠傳种暠字景伯河南洛陽人仲山甫之後也父為定陶令有財三千萬父卒暠悉以賑䘏宗族及邑里之貧者其有進趣名利皆不與交通始為縣門下史時河南尹田歆外甥王諶名知人有知人之名也歆謂之曰今當舉六孝亷多得貴戚書命不冝相違欲自用一名士以報國家爾助我求之明日諶送客於大陽郭遥見暠異之還白歆曰為尹得孝亷矣近洛陽門下史也歆笑曰當得山澤隐滯近洛陽吏邪諶曰山澤不必有異士異士不必在山澤歆即召暠於庭辯詰職事暠辭對有序歆甚知之召署主簿遂舉孝亷辟太尉府舉高第順帝末為侍御史時所遣八使光祿大夫杜喬周舉等多所糾奏而大將軍梁冀及諸宦官互為請救事皆被寑遏暠自以職主刺舉志案姦違乃復劾諸為八使所舉蜀郡太守劉宣等罪惡章露宜伏歐刀又奏請勅四府條舉近臣父兄及知親為刺史二千石尤殘穢不勝任者免遣案罪帝乃從之擢暠監太子於承光宫中常侍高梵從中單駕出迎太子時太傅杜喬等疑不欲從惶惑不知所為暠乃手劍當車曰太子國之儲副人命所係今常侍来無詔信何以知非姦邪今日有死而已梵辭屈不敢對馳命奏之劉攽曰案文多一命字詔報太子乃得去喬退而歎息愧暠臨事不惑帝亦嘉其持重稱善者良乆出為益州刺史暠素慷慨好立功立事在職三年宣恩遠夷開曉殊俗岷山雜落皆懷服漢徳其白狼槃木唐菆卭􅈎諸國菆音側留反自前刺史朱輔卒後遂絶暠至乃復舉種向化時永昌太守冶鑄黄金為文蛇以獻梁冀暠糾發逮捕馳傳上言而二府畏懦不敢案之冀由是銜怒於暠㑹巴郡人服直聚黨百餘人自稱天王直或作宜暠與太守應承討捕不克吏人多被傷害冀因此䧟之傳逮暠承太尉李固上疏救曰臣伏聞討捕所傷本非暠承之意實由縣吏懼法畏罪廹逐深苦致此不詳比盜賊羣起處處未絶暠承以首舉大姦而相随受罪臣恐沮傷州縣糾發之意}
