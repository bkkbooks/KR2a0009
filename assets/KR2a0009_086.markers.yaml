  - {type: variant, offset: 754, length: 317, content: 以後參倍於前及董卓移都之際吏民擾亂自辟雍東觀蘭臺石室宣明鴻都諸藏典策文章競共剖散其縑帛圖書大則連為帷蓋小乃制為縢囊及王允所收而西者裁七十餘乘道路艱遠復𠫓廾其半矣後長安之亂一時焚蕩莫不泯盡焉東京學者猥衆難以詳載今但錄其能通經名家者以為儒林篇其自有列傳者則不兼書若師資所承宜標名為證者乃著之云前書云田何傳易授丁寬丁寬授田王孫王孫授沛人施讎東海孟喜琅邪梁丘賀由是易有施孟梁丘之學又東郡京房受易於梁國焦延壽別為京氏學又有東萊費直傳易授琅邪王橫為費氏學本以古字號古文易又沛人高相傳易授子康及蘭陵毋將永為高氏學施孟梁丘京氏四家皆立博士費高二家未得立劉昆字桓公陳留東昏人梁孝王之胤也少習容禮平帝時受施氏易於沛人戴賓能彈雅琴知清角之操王莽世教授弟子恆, WYG: 君張嬰等}
