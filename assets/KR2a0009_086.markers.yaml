  - {type: variant, offset: 4983, length: 268, content: 是時邵陵令任嘉在職貪穢因遷武威太守後有司奏嘉臧罪千萬徵考廷尉其所牽染將相大臣百有餘人倫乃上書曰臣聞春秋誅惡及本本誅則惡消振裘持領領正則毛理今任嘉所坐狼藉未受辜戮猥以垢身改典大郡自非案坐舉者無以禁絕姦萌往者湖陸令張疊蕭令駟賢徐州刺史劉福等釁穢既章咸伏其誅而豺狼之吏至今不絕者豈非本舉之主不加之罪乎昔齊威之霸殺姦臣五人并及舉者以弭謗讟當斷不斷黃石所戒夫聖王所以聽僮夫匹婦之言者猶塵加嵩岱霧集淮海雖未有益不為損也惟陛下留神省察奏御有司以倫言切宜辭不遜順下之尚書奏倫探知密事激以求直坐不敬結鬼薪詔書以倫數進忠言特原之免歸田里陽嘉二年徵拜太中大夫, WYG: 鯈與}
