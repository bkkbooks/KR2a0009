  - {type: variant, offset: 1999, length: 270, content: 太子少傅顯宗數訪問經術既而聲稱著聞弟子自遠至者著錄且萬人為梁丘家宗十四年卒於官子魴傳興業位至張掖屬國都尉戴憑字次仲汝南平輿人也習京氏易年十六郡舉明經徵試博士拜郎中時詔公卿大會羣臣皆就席憑獨立光武問其意憑對曰博士說經皆不如臣而坐居臣上是以不得就席帝即召上殿令與諸儒難說憑多所解釋帝善之拜為侍中數進見問得失帝謂憑曰侍中當匡補國政勿有隱情憑對曰陛下嚴帝曰朕何用嚴憑曰伏見前太尉西曹掾蔣遵清亮忠孝學通古今陛下納膚受之訴遂致禁錮世以是為嚴帝怒曰汝南子欲復黨乎憑出自繫廷尉有詔勑出後復引見憑謝曰臣無謇諤之節而有狂瞽之言不能以尸伏諫偷生苟活誠慙聖朝帝即勑, WYG: ''}
