  - {type: variant, offset: 121, length: 4, content: 唯與李膺, WYG: 典故未嘗有也恃神任筮既不必當賢就值其人猶非徳選夫岐嶷形於自然詩云克岐克嶷鄭𤣥注云岐岐然意有所知也其貌嶷然有所識别也俔天必有異表俔音苦見反説文曰俔譬諭也詩云文王嘉止俔天之妹文王聞大姒之賢則羙之言大邦有子女譬天之有女弟故求為之配焉宜參良家簡求有徳徳}
