  - {type: variant, offset: 98, length: 3, content: 是名震, WYG: 此𢎞廣經術尊重聖業有益於化雖從來乆六經衰微學問寖淺誠宜反本改矯其失詔書下公卿皆從防言十六年拜為司徒延平元年遷太尉與太傅張禹參録尚書事數受賞賜甚見優寵安帝即位以定策封龍鄉侯食邑千一百尸其年以灾異宼賊策免就國凡三公以灾異策免始自防也東觀記曰郡國被水灾比州湮沒死者以千數灾異數降西羗反畔殺略人吏}
