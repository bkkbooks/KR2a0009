  - {type: variant, offset: 1367, length: 2, content: 澤為, WYG: 持節奉策贈太傅安樂鄉侯印綬給東園梓器謁者䕶喪賜冡塋于原陵諡文恭侯拜家一人爲郎中故吏自公卿大夫博士議郎以下數百人皆縗絰殯位自終及葬漢興以來人臣之盛未嘗有也初揚雄依虞箴作十二州二十五官箴揚雄傳曰箴莫大於虞箴故遂作九州箴左傳曰昔周辛甲之爲太史也命百官官箴王闕於虞人之箴曰芒芒禹迹畫爲九州經啟九道人有寢廟獸有茂草各有攸處徳用不擾在帝夷羿冒于原獸忘其國恤而思其麀牡武不可重用不恢于夏家獸臣司原敢告僕夫其九箴亡闕後涿郡崔駰及子瑗又臨邑侯劉騊駼増補十六篇廣復繼作四篇文甚典羙乃悉撰次首目爲之解釋名曰百官箴凡四十八篇其餘所著詩賦銘頌箴弔及諸解詁凡二十二篇熹平六年靈帝思感舊德乃圖畫廣及太尉黄瓊於省内詔議郎蔡邕爲其頌云謝承書載其頌曰巖巖山嶽配天作輔降神有周生申及甫允兹漢室誕育二后曰胡曰黄方軌齊武惟道之淵惟徳之藪股肱元首}
