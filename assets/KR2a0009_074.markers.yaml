  - {type: variant, offset: 87, length: 3, content: 李膺膺, krp: 遣丞存問常以八月旦奉羊酒東觀記曰賜羊一頭酒二石也和帝卽位以彪為太傅録尚書事賜爵關中侯劉攽曰案漢無關中侯中當作内字永元初竇氏專權驕縱朝廷多有諫争而彪在位脩身而已不能有所匡正又嘗奏免御史中丞周紆紆前失竇氏㫖故頗以此致譏然當時宗其禮讓及竇氏誅以老病上還樞機職詔賜養牛酒而許焉五年春薨于位天子親臨弔臨張禹傳張禹字伯達趙國襄國人也祖父况族姊為皇祖考夫人皇祖考鉅鹿都尉四數徃來南頓見光武光武為}
