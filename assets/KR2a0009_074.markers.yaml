  - {type: variant, offset: 138, length: 0, content: '', WYG: 臣獻其否以成其可君所謂否而有可焉臣獻其可以去其否書載稽疑謀及卿士稽考也考正疑事謀及卿士見尚書詩羙先人詢于芻蕘詩大雅曰先人有言詢于芻蕘注云詢謀也芻蕘薪采者也言有疑事嘗與薪采者謀之也國有大政必議之於前訓諮之於故老叔向曰國有大事必順於典刑訪於耉老而後行之是以慮無失策舉無過事竊見尚書令左雄議郡舉孝亷皆限年四十以上諸生試章句文吏試牋奏周成雜字曰牋表也漢雜事曰凡羣臣之書通于天子者四品一曰章二曰奏三曰表四曰駮議章者需頭稱稽首上以聞謝恩陳事詣闕通者也奏者亦需頭其京師官但言稽首言下稽首以聞其中有所請若罪法劾案公府送御史臺卿校送謁者臺也表者不需頭上言臣某言下言誠惶誠恐頓首頓首死罪左方下附曰某官臣甲乙上明詔既許復令臣等得與相參竊惟王命之重載在篇典禮記曰動則左史書之言則右史書之尚書曰王言惟作命弗言臣下罔由禀令又曰令出惟行不惟反當令縣於日月固於金石遺則百王施之萬世詩云天難諶斯不易惟王可不慎與詩大雅也諶信也斯語詞天之意難信矣不可改易者天子也蓋選舉因才無拘定制六竒之策不出經學前書陳平設六竒策以佐高祖鄭阿之政非必章奏説苑曰子産相鄭内無國中之亂外無諸侯之患也子產從政也擇能而使之晏子化東阿三年景公召而數之晏子請改道易行明年上計景公迎而賀之晏子對曰臣前之化東阿也屬託不行貨賂不至君反以罪臣今則反是而更蒙賀景公下席而謝甘竒顯用年乖彊仕史記曰秦欲與燕共伐趙以廣河間之地甘羅年十二使於趙説趙王立割五城以廣河間秦乃封羅為上卿説苑曰子奇年十八齊君使主東阿東阿大化禮記曰四十强而仕終賈揚聲亦在弱冠前書終軍年十八為博士弟子自請願以長纓必覊南越王而致之闕下上竒其對擢為諫議大夫徃説越越聽命天子大悦賈誼年十八以誦詩屬文稱於郡中文帝召為博士漢承周秦兼覽殷夏祖徳師經參雜霸軌宣帝曰漢家自有制度本以霸王道雜理之聖主賢臣世以致理貢舉之制莫或回革今以一臣之言剗戾舊章剗削也戾乖也便利未明衆心不猒猒服也矯枉變常政之所重而不訪台司不謀卿士若事下之後議者剥異異之則朝失其便同之則王言已行臣愚以為可宣下百官參其同異然後覽擇勝否詳採厥衷敢以瞽言冒干天禁瞽無目者也不察人君顏色而言如無目之人也孔子曰未見顔色而言謂之瞽干犯也惟陛下納焉帝不從時陳留郡缺職尚書史敞等薦廣曰臣聞德以旌賢旌明也書曰徳懋懋官也爵以建事能建立事則與之爵明試以功典謨所羙明白考試之有功者則授之以官舜典咎繇謩皆有此言故云典謩所羙也五服五章天秩所作五服謂天子諸侯卿大夫士之服也五者之服必湏章明尚書咎繇謨曰天秩有禮自我五禮有庸哉天命有徳五服五章哉秩序也是以臣竭其忠君豐其寵豐厚也舉不失徳下忘其死竊見尚書僕射胡廣體具履規謙虚溫雅博物洽聞探賾窮理六經典奥舊章憲式無所不覽柔而不犯文而有體柔而不犯謂性和柔而不可犯以非義也忠貞之性憂公如家不矜其能不伐其勞翼翼周慎行靡玷漏密勿夙夜密勿黽勉十有餘年心不外顧志不茍進臣等竊以為廣在尚書劬勞日乆後母年老既蒙簡照宜試職千里匡寜方國詩云厥徳不回以受方國陳留近郡今太守任缺廣才略深茂堪能撥煩願以參選紀綱頽俗使束脩守善有所勸仰廣典機事十年出爲濟隂太守以舉吏不實免復爲汝南太守入拜大司農漢安元年遷}
