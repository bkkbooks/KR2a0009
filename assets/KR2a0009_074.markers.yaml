  - {type: variant, offset: 1764, length: 379, content: 後果為輕薄子並以罪廢𠫓廾融益以知名州郡禮請舉孝廉公府連辟皆不應太守馮岱有名稱到官請融相見融一往薦達郡士范冉韓卓孔伷等三人因辭病自絕會有黨事亦遭禁錮妻亡貧無殯斂鄉人欲為具棺服融不肯受曰古之亡者𠫓廾之中野唯妻子可以行志但即土埋藏而已融同郡田盛字仲嚮與郭林宗同好亦名知人優遊不仕並以壽終許劭字子將汝南平輿人也少峻名節好人倫多所賞識若樊子昭和陽士者並顯名於世故天下言拔士者咸稱許郭初為郡功曹太守徐璆甚敬之府中聞子將為吏莫不改操飾行同郡袁紹公族豪俠去濮陽令歸車徒甚盛將入郡界乃謝遣賓客曰吾輿服豈可使許子將見遂以單車歸家劭嘗到潁川多長者之遊唯不候陳寔又陳蕃喪妻還葬鄉人必畢至而劭獨不往或問其故劭曰太后道廣廣則難周仲舉性峻峻則少通故不造也其多所裁量若此曹操微時常卑辭厚禮求為己目劭鄙其人而不肯對操乃伺𨻶脅劭劭不得已曰君清平之姦賊亂世之英雄操大悅而去劭從祖敬敬子訓訓子相並為, WYG: 凡}
