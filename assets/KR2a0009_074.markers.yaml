  - {type: variant, offset: 1457, length: 153, content: 言人情險於山川以其動靜可識而沈阻難徵故深厚之性詭於情貌則哲之鑒惟帝所難而林宗雅俗無所失將其明性特有主乎然而遜言危行終亨時晦恂恂善導使士慕成名雖墨孟之徒不能絕也符融字偉明陳留浚儀人也少為都官吏恥之委去後遊太學師事少府李膺膺風性高簡每見融輒絕它賓客聽其言論融幅巾奮褎談辭如雲膺每捧手歎息郭林宗始入京師時入莫識融, WYG: 兩張禹}
