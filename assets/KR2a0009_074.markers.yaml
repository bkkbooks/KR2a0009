  - {type: variant, offset: 94, length: 0, content: '', WYG: 誤為此字也專精務本儒學所先臣以爲博士及甲乙策試宜從其家章句開五十難以試之解釋多者為上第引文明者為高説若不依先師義有}
  - {type: variant, offset: 94, length: 0, content: '', krp: 誤為此字也專精務本儒學所先臣以爲博士及甲乙策試宜從其家章句開五十難以試之解釋多者為上第引文明者為高説若不依先師義有}
  - {type: variant, offset: 95, length: 2, content: 友善, WYG: 伐伐謂自相攻伐也皆正以為非五經各取上第六人論語不宜射策雖所失或乆差可矯革東觀記防上疏曰試論語本文章句但通度勿以射䇿冀令學者務本有所一心專精師門思核經意事得其實道得其真}
