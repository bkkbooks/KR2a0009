  - {type: variant, offset: 993, length: 357, content: 而謝之曰賈子厚誠實凶德然洗心向善仲尼不逆互鄉故吾許其進也淑聞之改過自厲終成善士鄉里有憂患者淑輒傾身營救為州閭所稱史叔賓者陳留人也少有盛名林宗見而告人曰牆高基下雖得必失後果以論議阿枉敗名云黃允字子艾濟陰人也以儁才知名林宗見而謂曰卿有絕人之才足成偉器然恐守道不篤將失之矣後司徒袁隗欲為從女求姻見允而歎曰得壻如是足矣允聞而黜遣其妻夏侯氏婦謂姑曰今當見𠫓廾方與黃氏長辭乞一會親屬以展離訣之情於是大集賓客三百餘人婦中坐攘袂數允隱匿穢惡十五事言畢登車而去允以此廢於時謝甄字子微汝南召陵人也與陳留邊讓並善談論俱有盛名每共候林宗未嘗不連日達夜林宗謂門人曰二子英才有餘而並不入道惜乎甄後不拘細行為時所毀讓以輕侮曹操操殺之王柔字叔優弟澤字季道林宗同郡晉陽縣人也兄弟總角共候林宗以訪才行所宜林宗曰叔優當以仕進顯季道當以經術通然違方改務亦, WYG: 送盈塗}
