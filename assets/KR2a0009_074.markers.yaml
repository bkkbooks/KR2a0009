  - {type: variant, offset: 98, length: 3, content: 是名震, krp: 此𢎞廣經術尊重聖業有益於化雖從來乆六經衰微學問寖淺誠宜反本改矯其失詔書下公卿皆從防言十六年拜為司徒延平元年遷太尉與太傅張禹參録尚書事數受賞賜甚見優寵安帝即位以定策封龍鄉侯食邑千一百尸其年以灾異宼賊策免就國凡三公以灾異策免始自防也東觀記曰郡國被水灾比州湮沒死者以千數灾異數降西羗反畔殺略人吏}
  - {type: punctuation, offset: 103, content: ．, id: KR2a0009_ZHSJ_074-bkkpn23}
  - {type: 'tls:seg', offset: 103, content: '', id: KR2a0009_ZHSJ_074-d74p2s19}
  - {type: variant, offset: 103, length: 0, content: '', WYG: 淫雨蟊賊傷稼穡防比上書自陳過咎遂策免防卒子衡當嗣譲封於其弟崇數歲不得已乃出就爵云張敏傳張敏字伯達河間鄚人也鄚今瀛州縣也音莫建初二年舉孝亷四遷五年為尚書建初中有人侮辱人父者而其子殺之肅宗貰其死刑而降宥之貰寛也音示夜反自}
  - {type: page-break, offset: 103, content: '', id: KR2a0009_WYG_074-8b, image: WYG0253/WYG0253-0050b.png}
  - {type: variant, offset: 103, length: 0, content: '', krp: 淫雨蟊賊傷稼穡防比上書自陳過咎遂策免防卒子衡當嗣譲封於其弟崇數歲不得已乃出就爵云張敏傳張敏字伯達河間鄚人也鄚今瀛州縣也音莫建初二年舉孝亷四遷五年為尚書建初中有人侮辱人父者而其子殺之肅宗貰其死刑而降宥之貰寛也音示夜反自}
  - {type: variant, offset: 104, length: 0, content: '', WYG: 因以爲比是時遂定其議以為輕侮法敏駮議曰夫輕侮之法先帝一切之恩不有成科班之律令也夫死生之決宜從上下猶天之四時有生有殺若開相容恕著為定法者則是故設姦萌生長罪隙孔子曰民可使由之不可使知之由從也言設政教可但使人從之若知其本末愚者或輕而不行事見論語春秋之義子不報讐非子也公羊傳曰父不受誅子復讐可也注云不受誅罪不當誅也而法令不為之減者以相殺之路不可開故也今託義者得減妄殺者有差使執憲之吏得設巧詐非所以導在醜不爭之義導教也醜類也又輕侮之比寖以繁滋至有四五百科轉相顧望彌復増甚難以垂之萬載臣聞師言救文莫如質故高帝去煩苛之法為三章之約建初詔書有改於古者可下三公廷尉蠲除其敝議寢不省敏復上疏曰臣敏蒙恩特見㧞擢愚心所不曉迷意所不解誠不敢茍隨衆議臣伏見孔子垂經典臯陶造法律史游急就篇曰臯陶造獄法律存也原其本意皆欲禁民為非也未曉輕侮之法將以何禁必不能使不相輕侮而更開相殺之路執憲之吏復容其姦枉議者或曰平法當先論生臣愚以為天地之性唯人為貴殺人者死三代通制今欲趣生反開殺路一人不死天下受敝記曰利一害百人去城郭夫春生秋殺天道之常春一物枯即為灾禮記月令曰孟春行夏令則風雨不時草木早落也秋一物華即為異月令曰仲秋行春令則秋雨不降草木生榮國乃有恐也王者承天地順四時法聖人從經律願陛下留意下民考尋利害廣令平議天下幸甚和帝從之九年拜司隸校尉視事二歲遷汝南太守清約不煩用刑平正有理能名坐事免延平元年拜議郎再遷潁川太守徵拜司空在位奉法而已視事三歲以病乞身不聼六年春行大射禮陪位頓仆乃策罷之東觀記載䇿曰今君所苦未瘳有司奏君年體衰羸郊廟禮儀仍有曠廢鼎足之任不可以缺重以職事留君其上司空印綬因病篤卒于家胡廣傳胡廣字伯始南郡華容人也華容縣故城在今荆州東六世祖剛清高有志節平帝時大司農馬宫辟之值王莽居攝剛解其衣冠縣府門而去遂亡命交阯隠於屠肆之間後莽敗乃}
