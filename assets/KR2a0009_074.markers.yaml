  - {type: variant, offset: 2188, length: 170, content: 為𨻶又與從兄靖不睦時議以此少之初劭與靖俱有高名好共覈論鄉黨人物每月輒更其品題故汝南俗有月旦評焉司空楊彪辟舉方正敦樸徵皆不就或勸劭仕對曰方今小人道長王室將亂吾欲避地淮海以全老幼乃南到廣陵徐州刺史陶謙禮之甚厚劭不自安告其徒曰陶恭祖外慕聲名內非真正待吾雖厚其埶必薄不如去之遂復投揚州刺史劉繇於曲阿其後陶謙果捕諸寓士及孫策平吳劭與繇南奔豫章而卒時年, WYG: 漢書卷七十}
