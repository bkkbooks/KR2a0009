  - {type: variant, offset: 110, length: 4, content: 儒送至河, WYG: 吏眞自於牗間密占察之乃指廣以白雄遂舉孝亷既到京師試以章奏安帝以廣為天下第一謝承書曰廣有雅才學究五經古今術蓺皆畢覧之年二十七舉孝亷續漢書曰故事孝亷高第三公及尚書輙優文特勞來其舉將於是公府下詔書勞來雄焉及拜郎恪勤職事所掌辨䕶也旬月拜尚書郎五遷尚書僕射順帝欲立皇后而貴人有寵者四人莫知所建議欲探籌以神定選廣與尚書郭䖍史敞}
