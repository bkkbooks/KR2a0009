  - {type: variant, offset: 91, length: 1, content: 奇, WYG: 司馬過邯鄲況為郡吏謁見光武光武大喜曰乃今得我大舅乎因與俱北到髙邑以為元氏令遷涿郡太守後為常山關長㑹赤眉攻關城況戰殁關縣屬常山郡今定州行唐縣西北有故關邑城東觀記曰況遷涿郡太守時年八十不任兵馬上疏乞身詔許之後詔問起居何如子歆對曰如故詔曰家人居不足贍且以一縣自養復以况為常山關長㑹赤眉攻關城况出戰死上甚哀之父歆初以報仇逃亡東觀記曰歆守臯長有報父仇賊自出歆召囚詣閣曰欲自受其辭既入解械飲食便發遣遂棄官亡命逢赦出由是鄉里服其髙義與此不同後仕為淮陽相終於汲令東觀記曰歆為相時王新歸國賓客放縱干亂法禁歆将令尉入宫搜捕王白上歆坐左遷為汲令卒官禹性篤厚節儉東觀記曰禹好學習歐陽尚書事太常桓榮惡衣食父卒汲吏人賻送前後數百萬悉無所受又以田宅推與伯父身自寄止永平八年舉孝亷稍遷建初中拜揚州刺史當過江行部中土民皆以江有子胥之神難於濟渉酈元水經注曰吳王賜子胥死浮尸於江夫差悔與羣臣臨江設祭修塘道及壇吳人因為立廟而祭焉禹將度吏固請不聼禹厲言曰子胥如有靈知吾志在理察枉訟豈危我哉遂鼓楫而過歴行郡邑深幽之處莫不畢到親録囚徒多所明舉吏民希見使者人懐喜悦怨德羙惡莫不自歸焉元和二年轉兖州刺史亦有清平稱三年遷下邳相徐縣北界有蒲陽坡東觀記曰坡水廣二十里徑且百里在道西其東有田可萬頃坡與陂同傍多良田而堙廢莫修禹為開水門通引灌溉遂成孰田数百頃勸率吏民假與種糧親自勉勞遂大收榖實鄰郡貧者歸之千餘户室廬相屬其居成市後嵗至墾千餘頃民用温給東觀記曰禹廵行守舍止大樹下食糒音憊糗也乾飯屑飲水而已後年鄰國貧人來歸之者茅屋草廬千户屠酤成市墾田千餘頃得穀百萬餘斛劉攽曰注禹廵行守舍止大樹下案文多一守字或云守當作常也功曹史戴閏故太尉掾也權動郡内有小譴禹令自致徐獄然後正其法徐縣名也東觀記曰閏當從行縣從書佐假車馬什物禹聞知令直符責問閏具以實對禹以宰士惶恐首實令自致徐獄也自長史以下莫不震肅永元六年入為大司農拜太尉和帝甚禮之十五年南廵祠園廟禹以太尉兼衞尉留守東觀記曰禹留守北宫太官朝夕送食賜闟登具物除子男盛為郎也聞車駕當進幸江陵以為不宜冒險逺驛馬上諌詔報曰祠謁既訖當南禮大江㑹得君奏臨漢回輿而旋及行還禹特䝉賞賜延平元年遷為太傅録尚書事鄧太后以殤帝初育育生也欲令重臣居禁内乃詔禹舍宫中給帷帳牀褥太官朝夕進食五日一歸府每朝見特贊與三公絶席禹上言方諒闇密静之時不宜依常有事於苑囿鄭𤣥注論語曰諒門謂凶廬也尚書曰帝乃徂落四海遏密八音也其廣成上林空地宜且以假貧民太后從之及安帝即位數上疾乞身詔遣小黄門問疾賜牛一頭酒十斛勸令就第其錢布刀劒衣物前後累至永初元年以定策功封安鄉侯食邑千二百户與太尉徐防司空尹勤同日俱封其秋以宼賊水雨策免防勤而禹不自安上書乞骸骨更拜太尉四年新野君病鄧太后母隂氏皇太后車駕幸其第禹與司徒夏勤司空張敏俱上表言新野君不安車駕連日宿止臣等誠竊惶懼臣聞王者動設先置止則交㦸清道而後行清室而後御前書曰舊典天子行幸所至必遣静室令先案行清静殿中以虞非常離宮不宿所以重宿衞也陛下體烝烝之至孝親省方藥恩情發中乆處單外百官露止議者所不安宜且還宫上為宗廟社稷下為萬國子民比三上固爭乃還宫後連嵗灾荒府藏虚空禹上疏求入三歲租税以助郡國稟假稟給也假貸也詔許之五年以隂陽不和策免七年卒于家使者弔祭除小子曜為郎中長子盛嗣徐防傳徐防字謁卿沛國銍人也銍故城今亳州臨渙縣也祖父宣為講學大夫以易教授王莽王莽置六經祭酒各一人秩上卿長安國由為講易祭酒宣為講學大夫蓋當屬於祭酒也父憲亦傳宣業防少習父祖學永平中舉孝廉除為郎防體貌矜嚴占對可觀顯宗異之特補尚書郎職典樞機周密畏愼奉事二帝未常有過和帝時稍遷司𨽻校尉出為魏郡太守永元十年遷少府大司農防勤曉政事所在有迹十四年拜司空防以五經乆逺聖意難明宜為章句以悟後學上疏曰臣聞詩書禮樂定自孔子發明章句始於子夏史記孔子沒子夏居西河教弟子三百人爲魏文侯師其後諸家分析各有異説前書仲尼沒而㣲言絶七十子喪而大義乖故春秋為五詩分為四易有數家之傳漢承亂秦經典廢絶本文略存或無章句收拾缺遺建立明經博徵儒術開置太學武帝時開學官置博士弟子員也孔聖既逺微㫖將絶故立博士十有四家漢官儀曰光武中興恢𢎞稽古易有施孟梁丘賀京房書有歐陽和伯夏侯勝建詩有申公轅固韓嬰春秋有嚴彭祖顔安樂禮有戴徳戴聖凡十四博士太常差選有聰明威重一人爲祭酒總領綱紀也設甲乙之科前書曰歲課甲科四十人為郎中乙科二十人為太子舍人丙科四十人補文學掌故以勉勸學者所以示人好惡改敝就善者也伏見太學試博士弟子皆以意説不脩家法諸經爲業各自名家私相容隠開生姦路每有策試輙興諍訟論議紛錯互相是非孔子稱述而不作但述先聖之言不自制作又曰吾猶及史之闕文古者史官於書事有不知則闕以待能者孔子言吾少時猶及見古史官之闕文今則無之疾時多穿鑿也見論語也疾史有所不知而不肯闕也今不依章句妄生穿鑿以遵師爲非義意説爲得理輕侮道術寖以成俗誠非詔書實選本意改薄從忠三世常道太史公曰夏之政忠忠之敝小人以野故殷人承之以敬敬之敝小人以鬼故周人承之以文文之敝小人以僿故救僿莫若以忠三王之道若循環周而復始僿音西志反史記僿或作薄劉攽曰三世常道案世與代全别縁太宗諱遂更世為代此合用代字乃誤為世蓋後人知此書中世字率皆換為代乃欲稍還正}
