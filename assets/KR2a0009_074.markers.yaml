  - {type: variant, offset: 650, length: 235, content: 等輩避雨樹下衆皆夷踞相對容獨危坐愈恭林宗行見之而奇其異遂與共言因請寓宿旦日容殺雞為饌林宗謂為己設既而以供其母自以草蔬與客同飯林宗起拜之曰卿賢乎哉因勸令學卒以成德孟敏字叔達鉅鹿楊氏人也客居太原荷甑墯地不顧而去林宗見而問其意對曰甑以破矣視之何益林宗以此異之因勸令遊學十年知名三公俱辟並不屈云庾乘字世遊潁川鄢陵人也少給事縣廷為門士林宗見而拔之勸遊學宮官遂為諸生傭後能講論自以卑第每處下坐諸生博士皆就讎問由是學中以下坐為貴後徵辟並不起號曰徵君宋果字仲乙扶風人也性輕悍憙與人報讎為, WYG: 州}
