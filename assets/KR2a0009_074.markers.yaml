  - {type: variant, offset: 1454, length: 2, content: 莊周, WYG: 爵任之於人重矣全喪之於生大矣懐禄以圖存者仕子之恒情審能而就列者出身之常體列位也夫紆於物則非已直於志則犯俗紆曲也辭其艱則乖義狥其節則失身狥營也綂之方軌易因險塗難御綂者總論上事也方軌謂平路也若履平路易可因循如踐險塗則難免顚覆也故昔人明慎於所受之分遲遲於岐路之間也呈材效職則受之分明矣遲遲疑不前之貌也明其分則不可妄進劉攽曰注呈材效職案文呈當作程又則受之分明矣當云則所受之分明矣如令志行無牽於物臨生不先其存後世何貶焉守志直道視死如歸則後之人何從而貶責矣古人以宴安爲戒豈數公之謂乎左傳曰宴安酖毒不可懐也贊曰鄧張作傳無咎無譽敏正疑律防議章句胡公庸庸餙情恭貌朝章雖理據正或橈橈曲也易曰棟橈凶也後漢書卷七十四後漢書卷七十四考證鄧彪傳天子親臨弔臨諸本同臣㑹汾按上臨字疑衍張禹傳封安鄉侯何焯校本云漢}
