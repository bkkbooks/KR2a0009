  - {type: variant, offset: 395, length: 2, content: 竇融, WYG: 王莽素聞其名大震懼購伯升邑五萬户黄金十萬斤位上公使長安中官署及天下鄉亭皆畫伯升像於塾旦起射之蕭該音義亦作塾引字林塾門側堂也東觀記續漢書並作埻案説文云射臬也廣雅埻的也埻音之允反自阜賜死後百姓日有降者衆至十餘萬諸將㑹議立劉氏}
  - {type: variant, offset: 395, length: 2, content: 竇融, krp: 王莽素聞其名大震懼購伯升邑五萬户黄金十萬斤位上公使長安中官署及天下鄉亭皆畫伯升像於塾旦起射之蕭該音義亦作塾引字林塾門側堂也東觀記續漢書並作埻案説文云射臬也廣雅埻的也埻音之允反自阜賜死後百姓日有降者衆至十餘萬諸將㑹議立劉氏}
  - {type: variant, offset: 398, length: 0, content: '', WYG: 從人望豪傑咸歸於伯升而新市平林將帥樂放縱憚伯升威明而貪聖公懦弱先共定策立之然後使騎召伯升示其議伯升曰諸將軍幸欲尊立宗室其徳甚厚然愚鄙之見竊有未同今赤眉起青徐衆數十萬聞南陽立宗室恐赤眉復有所立如此必將内爭今王莽未滅而宗室相攻是疑天下而自損權非所以破莽也且首兵唱號鮮有能遂陳勝項籍即其事也舂陵去宛三百里耳未足}
