  - {type: variant, offset: 17, length: 2, content: 都主, krp: 南攻梁丘賜至食時賜陳潰阜軍望見散走漢兵急追之却迫潢淳水斬首溺死者二萬餘}
  - {type: variant, offset: 20, length: 1, content: 以, WYG: 遂斬阜賜王莽納言將軍嚴尤秩宗將軍陳茂聞阜賜軍敗引欲據宛伯升乃陳兵誓衆焚積聚破釡甑鼓行而前破釡甑示必死也鼔行而前言無所畏也史記曰項羽北救趙渡河乗船破釡甑與尤茂遇育陽}
