  - {type: variant, offset: 2438, length: 277, content: 學者莫不諷誦焉自為郎後遂見親近時京師脩起宮室濬繕城隍而關中耆老猶望朝廷西顧固感前世相如壽王東方之徒造搆文辭終以諷勸乃上兩都賦盛稱洛邑制度之美以折西賓淫侈之論其辭曰弗康寔用西遷作我上都主人聞其故而覩其制乎主人曰未也願賓攄懷舊之蓄念發思古之幽情博我以皇道弘我以漢京賓曰唯唯之山右界襃斜隴首之險帶以洪河涇渭之川華實之毛則九州之上腴焉防禦之阻則天下之奧區焉是故橫被六合三成帝畿周以龍興秦以虎視及至大漢受命而都之也仰寤東井之精俯協河圖之靈奉春建策留侯演成天人合應以發皇明乃眷西顧寔惟作京於是睎秦領睋北阜挾酆霸據龍首圖皇基於億載度宏規而大起肇自高而終平世增飾以崇麗歷, WYG: 卷四}
