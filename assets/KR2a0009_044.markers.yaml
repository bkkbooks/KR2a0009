  - {type: variant, offset: 1815, length: 467, content: 莫及扶風掾李育經明行著教授百人客居杜陵茅室土階京兆扶風二郡更請徒以家貧數辭病去溫故知新論議通明廉清修絜行能純備雖前世名儒國家所器韋平孔翟無以加焉宜令考續以參萬事京兆督郵郭基孝行著於州里經學稱於師門政務之績有絕異之效如得及明時秉事下僚進有羽翮奮翔之用退有嵵梁一介之死涼州從事王雍躬卞嚴之節文之以術蓺涼州冠蓋未有宜先雍者也古者周公一舉則三方怨曰奚為而後己宜及府開以慰遠方弘農功曹史殷肅達學洽聞才能絕倫誦詩三百奉使專對此六子者皆有殊行絕才德隆當世如蒙徵納以輔高明此山梁之秋夫子所為歎也昔卞和獻寶以離斷趾靈均納忠終於沈身而和氏之璧千載垂光屈子之篇萬世歸善願將軍隆照微之明信日之聽少屈威神咨嗟下問令塵埃之中永無荊山汨羅之恨父彪卒歸鄉里固以彪所續前史未詳乃潛精研思欲就其業既而有人上書顯宗告固私改作國史者有詔下郡收固繫京兆獄盡取其家書先是扶風人蘇朗偽言圖讖事下獄死固弟超恐固為郡所覈考不能自明乃馳詣闕上書得召見具言固所著述意而郡亦上其書顯宗甚奇之召詣校書部除蘭臺令史與前睢陽令陳宗長陵令尹敏司隸從事孟異共成世祖本紀遷為郎典校祕書固又撰功臣平林新市, WYG: 破岑走天水}
