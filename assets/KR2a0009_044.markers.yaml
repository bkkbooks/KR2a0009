  - {type: variant, offset: 80, length: 312, content: 水彪乃避難從之囂問彪曰往者周亡戰國並爭天下分裂數世然後定意者從橫之事復起於今乎將承運迭興在於一人也願生試論之對曰周之廢興與漢殊異昔周爵五等諸侯從政本根既微枝葉彊大故其末流有從橫之事埶數然也漢承秦制改立郡縣主有專己之威臣無百年之柄至於成帝假借外家哀平短祚國嗣三絕故王氏朝因竊號位危自上起傷不及下是以即真之後天下莫不引領而歎十餘年閒中外搔擾遠近俱發假號雲合咸稱劉氏不謀同辭方今雄桀帶州域者皆無七國世業之資而百姓謳吟思仰漢德已可知矣囂曰生言周漢之埶可也至於但見愚人習識劉氏姓號之故而謂漢家復興疎矣昔秦失其鹿劉季逐而羈之時人復知漢乎彪既疾囂言又傷時方艱乃著王命論以為漢德承堯有靈命之符王者興祚非詐力所致欲以感之而囂終不寤遂避河西河西, WYG: ''}
