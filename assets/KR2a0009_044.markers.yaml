  - {type: variant, offset: 1266, length: 4, content: 崇簡其人, WYG: 可讙露明旦欲去前白良曰欲竟何時詣嚴將軍所良意下曰我為詐汝耳當復何苦乎曰汝與伯升志操不同今家欲危亡而反共謀如是既而不得已從軍至小長安漢兵大敗良妻及二子皆被害續漢書曰阜賜移書於良曰老子不率宗族單袴騎牛哭且行何足賴哉更始立以良為國三老從入關更始敗良聞光武即位乃亡奔洛陽建武二年封良為廣陽王五年徙為趙王始}
