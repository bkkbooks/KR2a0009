  - {type: variant, offset: 1226, length: 2, content: 詒厥, WYG: 敬之敬之命不易哉詩周頌也北海靖王興建武二年封為魯王嗣光武兄仲初南頓君娶同郡樊重女字嫺都􅈺胡間反説文嫺雅也嫺都性婉順自為童女不正容服不出於房宗族敬焉生三男三女長男伯升次仲次光武長女黄次元次伯姬皇妣以初起兵時病卒宗人樊巨公収斂焉建武二年封黄為湖陽長公主伯姬為寧平長公主元與仲俱歿於小長安追爵元為新野長公主十五年追諡仲為魯哀王興其嵗試守緱氏令為人有明略善聽訟甚得名稱遷𢎞農太守亦有善政續漢書曰𢎞農縣吏張申有伏罪興収申案論郡中震慄時年旱分遣文學循行屬縣理寃獄宥小過應時甘雨降澍視事四年上䟽乞骸骨徴還京師奉朝請二十七年始就國明年以魯國益東海續漢書曰二郡二十九縣租入倍諸王也故徙興為北海王三十年封興子復為臨邑侯臨邑縣屬東海故城在今濟州東亦名馬坊城也中元二年又封興二子為縣侯顯宗器重興每有異政輒乗驛問焉立三十九年薨子敬王睦嗣睦少好學博通書傳光武愛之數被延納顯宗之在東宫尤見幸待入侍諷誦出則執轡乗輿尊者居中執轡在左中興初禁網尚闊而睦性謙恭好士千里交結自名儒宿徳莫不造門由是聲價益廣永平中法憲頗峻睦乃謝絶賔客放心音樂然性好讀書常為愛翫嵗終遣中大夫奉璧朝賀中大夫王國官也續漢志曰中大夫比六百石無員掌奉王使京都奉璧賀正月及使諸國本皆持節後去節爾雅曰肉倍好謂之璧好孔也召而謂之曰朝廷設問寡人朝廷謂天子也大夫將何辭以對使者曰大王忠孝慈仁敬賢樂士臣雖螻蟻敢不以實睦曰吁子危我哉吁音于孔安國注尚書曰吁者疑怪之聲也此乃孤幼時進趣之行也東觀記續漢書並云是吾幼時狂惷之行也大夫其對以孤襲爵以來志意衰惰聲色是娛犬馬是好使者受命而行其能屈申若此初靖王薨悉推財産與諸弟雖王車服珍寳非列侯制皆以為分然後随以金帛贖之睦能屬文作春秋㫖義終始論及賦頌數十篇又善史書當世以為楷則及寢病帝驛馬令作草書尺牘十首説文云牘書版也蓋長一尺因取名焉立十年薨子哀王基嗣永平十八年封基二弟為縣侯二弟為鄉侯建初二年又封基弟毅為平望侯基立十四年薨無子肅宗憐之不除其國永元二年和帝封睦庶子斟鄉侯威為北海王奉睦後立七年威以非睦子又坐誹謗檻車徴詣廷尉道自殺永初元年鄧太后復封睦}
