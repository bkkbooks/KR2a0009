  - {type: variant, offset: 624, length: 0, content: '', WYG: 復封張子它人奉其祀晃及弟利侯剛與母太姬宗更相誣告章和元年有司奏請免晃剛爵為庶人徙丹陽丹陽故郡城在今潤州江寧縣東南帝不忍下詔曰朕聞人君正屏有所不聴白虎通曰所以設屏何以自障也示不極臣下之敬也天子徳大故外屏諸侯徳小故内屏宗尊為小君諸侯之妻稱曰小君宫衞周備出有輜軿之飾輜軿有擁蔽之車也列女傳曰齊孝公華孟姬謂公曰妾聞后妃踰閾必乗安車輜軿下堂必從傅母保阿進退則鳴玉珮内飾則結綢繆所以正心一意自歛制也入有牖户之固殆不至如譖者之言何休注公羊傳曰如其}
