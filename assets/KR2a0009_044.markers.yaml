  - {type: variant, offset: 2787, length: 1839, content: 合煙雲相連於是既庶且富娛樂無疆都人士女殊異乎五方游士擬於公侯列肆侈於姬姜鄉曲豪俊游俠之雄節慕原嘗名亞春陵連交合衆騁騖乎其中域黻冕所興冠蓋如雲七相五公與乎州郡之豪桀五都之貨殖三選七遷充奉陵邑蓋以彊幹弱枝隆上都而觀萬國封畿之內厥土千里逴犖諸夏兼其所有其陽則崇山隱天幽林穹谷陸海珍藏藍田美玉商洛緣其隈鄠杜濱其足源泉灌注陂池交屬竹林果園芳草甘木郊野之富號曰近蜀其陰則冠以九嵕陪以甘泉乃有靈宮起乎其中秦漢之所極觀淵雲之所頌歎於是乎存焉下有鄭白之沃衣食之源隄封五萬疆埸綺分溝塍刻鏤原隰龍鱗決渠降雨荷臿成雲五穀垂穎桑麻敷棻東郊則有通溝大漕潰渭洞河泛舟山東控引淮湖與海通波西郊則有上囿禁苑林麓藪澤陂池連乎蜀漢繚以周牆四百餘里離宮別館三十六所神池靈沼往往而在其中乃有九真之麟大宛之馬黃支之犀條枝之鳥踰崐崘越巨海殊方異類至三萬里中天之華闕豐冠山之朱堂因瑰材而究奇抗應龍之虹梁列棼橑以布翼荷棟桴而高驤雕玉瑱以居楹裁金璧以飾璫發五色之渥采光爓朗以景彰於是左墄右平重軒三階閨房周通門闥洞開列鍾虡於中庭立金人於端闈仍增崖而衡閾臨峻路而啟扉徇以離殿別寢承以崇臺閒舘煥若列星紫宮是環清涼宣溫神仙長年金華玉堂白虎麒麟區宇若茲不可殫論增槃業峨登降炤爛殊形詭制每各異觀乘茵步輦唯所息宴後宮則有掖庭椒房后妃之室合歡增成安處常寧茝若椒風披香發越蘭林蕙草鴛鸞飛翔之列昭陽特盛隆乎孝成屋不呈材牆不露形裛以藻繡絡以綸連隨侯明月錯落其閒金釭銜璧是為列錢翡翠火齊流燿含英懸黎垂棘夜光在焉於是玄墀釦切玉階彤庭磩采緻琳珉青熒珊瑚碧樹周阿而生紅羅颯纚綺組繽紛精曜華燭俯仰如神後宮之號十有四位窈窕繁華更盛迭貴處乎斯列者蓋以百數左右廷中朝堂百僚之位蕭曹魏邴謀謨乎其上佐命則垂統輔翼則成化流大漢之愷悌蕩亡秦之毒螫故令斯人揚樂和之聲作畫一之歌功德著於祖宗膏澤洽于黎庶又有天祿石渠典籍之府命夫諄誨故老名儒師傅講論乎六蓺稽合乎同異又有承明金馬著作之庭大雅宏達於茲為羣元元本本周見洽聞啟發篇章校理祕文周以鉤陳之位衞以嚴更之署總禮官之甲科羣百郡之廉孝虎賁贅衣閹尹閽寺陛戟百重各有攸司周廬千列徼道綺錯輦路經營脩涂飛閣自未央而連桂宮北彌明光而絙長樂陵墱道而超西墉混建章而外屬設璧門之鳳闕上柧棱而棲金雀內則別風之嶕嶢眇麗巧而竦擢張千門而立萬戶順陰陽以開闔爾乃正殿崔巍層構厥高臨乎未央經駘盪而出馺娑洞枍詣與天梁上反宇以蓋戴激日景而納光神明鬱其特起遂偃蹇而上躋軼雲雨於太半虹霓回帶於棼楣雖輕迅與僄狡猶愕眙而不敢階攀井幹而未半目眴轉而意迷舍櫺檻而卻倚若顛墜而復稽魂怳怳以失度巡回涂而下低既懲懼於登望降周流以彷徨步甬道以縈紆又杳窱而不見陽排飛闥而上出若游目於天表似無依之而洋洋前唐中而後太液攬滄海之湯湯揚波濤於碣石激神嶽之嶈嶈濫瀛洲與方壺蓬萊起乎中央於是靈草冬榮神木叢生巖峻崔崒金石崢嶸抗仙掌與以承露擢雙立之金莖軼埃壒之混濁鮮顥氣之清英騁文成之丕誕馳五利之所刑庶松喬之羣類時游從乎斯庭實列仙之攸館匪吾人之所寧起鳥詔梁野而驅獸毛羣內闐飛羽上覆接翼側足集禁林而屯聚水衡虞人理其營表種別羣分部曲有署罘罔連紘籠山絡野列卒周帀星羅雲布於是乘鑾輿備法駕帥羣臣披飛廉入苑門遂繞酆鎬歷上蘭六師發冑百獸駭殫震震爚爚雷奔電激草木塗地山淵反覆蹂蹸其十二三乃拗怒而少息爾乃期門佽飛列刃鑽鍭要趹追蹤鳥驚觸絲獸駭值鋒機不掎弦不再控矢無單殺中必疊雙颮颮紛紛矰繳相纏風毛雨血灑野蔽天平原赤勇士厲猨狖失木豺狼攝竄爾乃移師趨險並蹈潛穢窮虎奔突狂兕觸蹷許少施巧秦成力折掎僄狡猛噬脫角挫脰徒搏獨殺挾師豹拖熊螭頓犀犛曳豪羆超迥壑越峻崖蹷巉巖鉅石隤松栢仆叢林摧草木無餘禽獸殄夷於是天子乃登屬玉之館歷長楊之榭覽山川之體埶觀三軍之殺獲原野蕭條目極四裔禽相鎮厭獸相枕藉然後收禽會衆論功賜胙陳輕騎以行炰騰酒車而斟酌割鮮野食舉燧命爵饗賜畢勞逸齊大輅鳴鸞容與回集乎豫章之宇臨乎昆明之池左牽牛而右織女似雲漢之無崖茂樹蔭蔚芳草被堤蘭茝發色曄曄猗猗若摛錦布繡燭燿乎其陂玄鶴白鷺黃鵠鵁鸛鶬鴰鴇鶂鳧鷖鴻鴈朝發河海夕宿江漢沈浮往來雲集霧散於是後宮乘輚路登龍舟張鳳蓋建華旗袪黼帷鏡清流靡微風澹淡浮櫂女謳鼓吹震聲激越謍厲天鳥羣翔魚闚淵招白閒下雙鵠揄文竿出比目撫鴻幢御矰繳方舟並騖俛仰極樂遂風舉雲搖浮遊普覽前乘秦領後越九嵕東薄河華西涉岐雍宮館所歷百有餘區行所朝夕儲不改供禮上下而接山川究休祐之所用採遊童之歡謠第從臣之嘉頌于斯之時都都相望邑邑相屬國藉十世之基家承百年之業士食舊德之名氏農服先疇之畎畝商修族世之所鬻工用高曾之規矩粲乎隱隱各得其所, WYG: 考證}
