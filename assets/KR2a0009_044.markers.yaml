  - {type: 'tls:seg', offset: 1402, content: '', id: KR2a0009_ZHSJ_044-d44p35s5}
  - {type: variant, offset: 1402, length: 0, content: '', WYG: 年薨子惠王乾嗣元初五年封乾二弟為亭侯是嵗趙相奏乾居父䘮私娉小妻小妻妾也又白衣出司馬門坐削中丘縣王宫門有兵衛亦為司馬門東觀記曰乾私出國到魏郡鄴易陽止宿亭令奴金盗取亭席金與亭佐孟常爭言以刄傷常部吏追逐乾藏逃金絞殺之懸其屍道邊樹相國舉奏詔書削中丘縣屬趙國故城在今邢州内丘縣西随室諱忠故改為内焉劉攽曰注削中丘縣屬趙國案文當更有中丘二字時郎中南陽程堅素有志行拜為乾傅堅輔以禮義乾改悔前過堅列上復所削縣本初元年封乾一子為亭侯乾立四十八年薨子懷王豫嗣豫薨子獻王赦嗣赦薨子珪嗣建安十八年徙封博陵王立九年魏初以為崇徳侯城陽恭王祉傳城陽恭王祉字巨伯東觀記初名終後改為祉光武族兄舂陵康侯敞之子也敞曾祖父節侯買以長沙定王子封於零道之舂陵鄉為舂陵侯買}
  - {type: page-break, offset: 1402, content: '', id: KR2a0009_WYG_044-11b, image: WYG0252/WYG0252-0503b.png}
  - {type: variant, offset: 1402, length: 0, content: '', krp: 年薨子惠王乾嗣元初五年封乾二弟為亭侯是嵗趙相奏乾居父䘮私娉小妻小妻妾也又白衣出司馬門坐削中丘縣王宫門有兵衛亦為司馬門東觀記曰乾私出國到魏郡鄴易陽止宿亭令奴金盗取亭席金與亭佐孟常爭言以刄傷常部吏追逐乾藏逃金絞殺之懸其屍道邊樹相國舉奏詔書削中丘縣屬趙國故城在今邢州内丘縣西随室諱忠故改為内焉劉攽曰注削中丘縣屬趙國案文當更有中丘二字時郎中南陽程堅素有志行拜為乾傅堅輔以禮義乾改悔前過堅列上復所削縣本初元年封乾一子為亭侯乾立四十八年薨子懷王豫嗣豫薨子獻王赦嗣赦薨子珪嗣建安十八年徙封博陵王立九年魏初以為崇徳侯城陽恭王祉傳城陽恭王祉字巨伯東觀記初名終後改為祉光武族兄舂陵康侯敞之子也敞曾祖父節侯買以長沙定王子封於零道之舂陵鄉為舂陵侯買}
  - {type: variant, offset: 1403, length: 0, content: '', WYG: 子戴侯熊渠嗣熊渠卒子考侯仁嗣仁以舂陵地埶下溼山林毒氣上書求減邑内徙東觀記曰考侯仁於時見户四百七十六上書願減户徙南陽留子男昌守墳墓元帝許之元帝初元四年徙封南陽之白水鄉猶以舂陵為國名遂與從弟鉅鹿都尉回及宗族往家焉仁卒子敞嗣敞謙儉好義盡推父時金寳財産與昆弟荆州刺史上其義行拜廬江都尉南陽郡是荆州所管故刺史上其行義也續漢書曰侯等助祭明堂以例益户二百敞以有行義拜為廬江都尉也嵗餘㑹族兄安衆侯劉崇起兵安衆康侯丹長沙定王子崇即丹之𤣥孫之子王莽畏惡劉氏徴敞至長安免歸國東觀記曰敞臨廬江嵗餘遭旱行縣人持枯稻自言稻皆枯吏强責租敞應曰太守事也載枯稻至太守所酒數行以語太守太守曰無有敞以枯稻示之太守曰都尉事也敞怒叱太守曰䑕何敢爾刺史舉奏莽徴到長安免就國先是平帝時敞與崇俱朝京師助祭明堂平帝時王莽輔政祫祭明堂諸侯王二十八人列侯百二十人宗室子九百餘人徴助祭也崇見莽將危漢室私謂敞曰安漢公擅國權羣臣莫不回從回曲社稷傾覆至矣太后春秋髙天子幼弱謂元后平帝也髙皇帝所以分封子弟蓋為此也敞心然之及崇事敗敞懼欲結援樹黨乃為祉娶髙陵侯翟宣女為妻宣丞相方進之子也襲父侯爵東觀記曰敞為嫡子終娶宣子女習為妻宣使嫡子姬送女入門二十餘日義起兵也㑹宣弟義起兵欲攻莽南陽捕殺宣女祉坐繫獄敞因上書謝罪願率子弟宗族為士卒先莽新居攝欲慰安宗室故不被刑誅及莽簒立劉氏為侯者皆降稱子食孤卿祿孤者特也卑於公爵於卿特置之故曰孤禮記上農夫食九人諸侯下士視上農夫中士倍下士上士倍中士下大夫倍上士卿四大夫祿也後皆奪爵及敞卒祉遂特見廢又不得}
