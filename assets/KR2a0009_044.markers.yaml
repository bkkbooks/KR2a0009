  - {type: variant, offset: 774, length: 231, content: 至於採經摭傳分散百家之事甚多疎略不如其本務欲以多聞廣載為功論議淺而不篤其論術學則崇黃老而薄五經序貨殖則輕仁義而羞貧窮道游俠則賤守節而貴俗功此其大敝傷道所以遇極刑之咎也然善述序事理辯而不華質而不野文質相稱蓋良史之才也誠令遷依五經之法言同聖人之是非意亦庶幾矣所以知古後之所由觀前聖人之耳目也司馬遷序帝王則曰本紀公侯傳國則曰世家卿士特起則曰列傳又進項羽陳涉而黜淮南衡山細意委曲條列不經若遷之著作採獲古今貫穿經傳至廣博也一人之精文重思煩故其書刊落不盡尚有盈辭多不齊一若序, WYG: ''}
