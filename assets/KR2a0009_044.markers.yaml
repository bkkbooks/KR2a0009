  - {type: variant, offset: 1399, length: 1, content: 五, WYG: 復封栩十子為亭侯栩立四十年薨子頃王商嗣永元三年封商三弟為亭侯元年封商四子為亭侯商立二十三年薨子靖王宏立}
  - {type: variant, offset: 1399, length: 1, content: 五, krp: 復封栩十子為亭侯栩立四十年薨子頃王商嗣永元三年封商三弟為亭侯元年封商四子為亭侯商立二十三年薨子靖王宏立}
