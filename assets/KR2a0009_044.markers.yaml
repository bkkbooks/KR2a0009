  - {type: variant, offset: 647, length: 1, content: 王, WYG: 於明堂將以存其絶業復其祭祀及其發舉大謀在倉卒擾攘之中使信先成於敵人新野宰潘臨云請劉}
  - {type: variant, offset: 647, length: 1, content: 王, krp: 於明堂將以存其絶業復其祭祀及其發舉大謀在倉卒擾攘之中使信先成於敵人新野宰潘臨云請劉}
  - {type: variant, offset: 649, length: 0, content: '', WYG: 一言而降赦岑彭以顯義初彭守宛食盡降漢諸將欲誅之伯升曰今舉大事當表義士不如封之以勸其後更始封彭為歸徳}
