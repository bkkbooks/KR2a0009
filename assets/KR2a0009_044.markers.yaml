  - {type: variant, offset: 12, length: 0, content: '', krp: 四齊武王縯傳子北海靜王興齊武王縯字伯升縯引也音衍光武之長兄也性剛毅慷慨有大節自王莽簒漢常憤憤懷復社稷之慮不事家人居業傾身破産交結天下雄俊莽末盜賊羣起南方尤甚伯升召諸豪傑計議曰王莽暴虐百姓分崩今枯旱連年兵革並起東觀記曰王莽末年天下大旱蝗蟲蔽天盜賊羣起四方潰畔此亦天亡之時復髙祖之業定萬世之秋也衆皆然之於是分遣親客使鄧晨起新野光武與李通李軼起於宛伯升自發舂陵子弟合七八千人部署賔客自稱柱天都部柱天者若天之柱也都部者都統其衆也使宗室劉嘉往誘新市平林兵王匡陳牧等合軍而進屠長聚及唐子鄉殺湖陽尉進拔棘陽因欲攻宛至小長安與王莽前隊大夫甄阜屬正梁丘賜戰時天宻霧漢軍大敗姊元弟仲皆遇害宗從死者數十人伯升復収㑹兵衆還保棘陽阜賜乗勝留輜重於藍鄉比陽縣有藍鄉引精兵十萬南渡潢淳水酈元注水經曰諸水二湖流注合為黄水又南經棘陽縣之黄淳聚又謂之黄淳水在今唐州湖陽縣蕭該音淳作諄者誤劉攽曰潢字據注唯當作黄臨泚水阻兩川間為營絶後橋示無還心新市平林見漢兵數敗阜賜軍大至各欲解去伯升甚患之㑹下江兵五千餘人至宜秋宜秋聚名在泚陽縣乃往為説合從之埶下江從之語在王常傳伯升於是大饗軍士設盟約休卒}
