  - {type: variant, offset: 1404, length: 0, content: '', WYG: 為吏祉以故侯嫡子行淳厚宗室皆敬之及光武起兵祉兄弟相率從軍前隊大夫甄阜盡収其家屬繫宛獄及漢兵敗小長安祉挺身還保棘陽甄阜盡殺其母弟妻子更始立以祉為太常將軍紹封舂陵侯從西入關封為定陶王别將擊破劉嬰於臨涇及更始降於赤眉祉乃間行亡奔洛陽是時宗室唯祉先至光武見之歡甚東觀記曰祉以建武二年三月見於懷宫建武二年封為城陽王賜乗輿御物車馬衣服追諡敞為康侯十一年祉疾病上城陽王璽綬願以列侯奉先人祭祀帝自臨其疾祉薨年四十三謚曰恭王竟不之國𦵏於洛陽北芒十三年封祉嫡子平為蔡陽侯以奉祉祀平弟堅為髙鄉侯初建武二年以皇祖皇考墓為昌陵置陵令守視後改為章陵因以舂陵為章陵縣十八年立考侯康侯廟比園陵置嗇夫嗇夫本鄉官主知賦役多少平其差品園陵置之知祭祀徴求諸事詔零陵郡奉祠節侯戴侯廟以四時及臘嵗五祠焉臘嵗終祭神之名也置嗇夫佐吏各一人劉攽曰案後漢志縣小吏有嗇夫有佐史則此吏字當作史也平後坐與諸王交通國除永平五年顯宗更封平為竟陵侯平卒子真嗣真卒子禹嗣禹卒子嘉嗣泗水王歙傳泗水王歙字經孫歙音許及反光武族兄也歙子終與光武少相親愛漢兵起始及唐子終誘殺湖陽尉更始立歙從入關封為元氏王終為侍中更始敗歙終東奔洛陽建武二年立歙為泗水王終為淄川王今淄州縣也十年歙薨封小子燀為堂谿侯燀字林云灼也音充善反續漢志汝南吳房縣有堂谿亭燀或作憚奉歙後終居䘮思慕哭泣二十餘日亦薨封長子柱為邔侯邔縣屬南郡故城在今襄州邔音其紀反以奉終祀又封終子鳯曲陽侯曲陽縣屬東海郡故城在今海州朐山縣西南歙從父弟茂年十八漢兵之起茂自號劉先職續漢志曰茂自號為劉先職亦聚衆京宻間京縣屬河南郡鄭之京邑故城在今鄭州滎陽縣東南宻縣屬河南郡故城在今宻縣東南稱厭新將軍攻下潁川汝南衆十餘萬人光武既至河内茂率衆降封為中山王十三年宗室為王者皆降為侯更封茂為穰侯茂弟匡亦與漢兵俱起建武二年封宜春侯為人謙遜永平中為宗正子浮嗣封朝陽侯朝陽縣屬南郡故城在今鄧州穰縣南今謂之朝城浮弟尚永元中為征西將軍浮傳國至孫䕶無子封絶延光中䕶從兄瓌與安帝乳母王聖女伯榮私通遂取伯榮為妻得紹䕶封為朝陽侯位侍中及王聖敗貶爵為亭侯安城孝侯賜傳安城孝侯賜字子琴光武族兄也祖父利蒼梧太守蒼梧郡今梧州縣也賜少孤兄顯報怨殺人吏捕顯殺之賜與顯子信賣田宅同抛普交反財産結客報吏續漢書曰王莽時諸劉抑廢為郡縣}
