body:
  text: 後漢書卷七十二董卓列傳第六十二董卓字仲穎隴西臨洮人也性粗猛有謀少嘗遊羌中盡與豪帥相結後歸耕於野諸豪帥有來從之者卓為殺耕牛與共宴樂豪帥感其意歸相斂得雜畜千餘頭以遺之由是以健俠知名為州兵馬掾常徼守塞下卓膂力過人雙帶兩鞬左右馳射為羌胡所畏桓帝末以六郡良家子為羽林郎從中郎將張奐為軍司馬共擊漢陽叛羌破之拜郎中賜縑九千匹卓曰為者則己有者則士乃悉分與吏兵無所留稍遷西域戊己校尉坐事免後為并州刺史河東太守中平元年拜東中郎將持節代盧植擊張角於下曲陽軍敗抵罪其冬北地先零羌及枹罕河關羣盜反叛遂共立湟中義從胡北宮伯玉李文侯為將軍殺護羌校尉泠徵伯玉等乃劫致金城人邊章韓遂使專任軍政共殺金城太守陳懿攻燒州郡明年春將數萬騎入寇三輔侵逼園陵托誅宦官為名詔以卓為中郎將副左車騎將軍皇甫嵩征之嵩以無功免歸而邊章韓遂等大盛朝廷復以司空張溫為車騎將軍假節執金吾袁滂為副拜卓破虜將軍與蕩寇將軍周慎並統於溫并諸郡兵步騎合十餘萬屯美陽以衛園陵章遂亦進兵美陽溫卓與戰輒不利十一月夜有流星如火光長十餘丈照章遂營中驢馬盡鳴賊以為不祥欲歸金城卓聞之喜明日乃與右扶風鮑鴻等并兵俱攻大破之斬首數千級章遂敗走榆中溫乃遣周慎將三萬人追討之溫參軍事孫堅說慎曰賊城中無穀當外轉糧食堅願得萬人斷其運道將軍以大兵繼後賊必困乏而不敢戰若走入羌中并力討之則涼州可定也慎不從引軍圍榆中城而章遂分屯葵園狹反斷慎運道慎懼乃𠫓廾車重而退溫時亦使卓將兵三萬討先零羌卓於望垣北為羌胡所圍糧食乏絶進退逼急乃於所度水中僞立以為捕魚而潛從下過軍比賊追之決水已深不得度時衆軍敗退唯卓全師而還屯於扶風封斄鄉侯邑千戶三年春遣使者持節就長安拜張溫為太尉三公在外始之於溫其冬徵溫還京師韓遂乃殺邊章及伯玉文侯擁兵十餘萬進圍隴西太守李相如反與遂連和共殺涼州刺史耿鄙而鄙司馬扶風馬騰亦擁兵反叛又漢陽王國自號合衆將軍皆與韓遂合共推王國為主悉令領其衆寇掠三輔五年圍陳倉乃拜卓前將軍與左將軍皇甫嵩擊破之韓遂等復共廢王國而劫故信都令漢陽閻忠使督統諸部忠恥為衆所脅感恚病死遂等稍爭權利更相殺害其諸部曲並各分乖六年徵卓為少府不肯就上書言所將湟中義從及秦胡兵皆詣臣曰牢直不畢稟賜斷絶妻子飢凍牽挽臣車使不得行羌胡敝腸狗態臣不能禁止輒將順安慰增異復上朝廷不能制頗以為慮及靈帝寢疾璽書拜卓為并州牧令以兵屬皇甫嵩卓復上書言曰臣既無老謀又無壯事天恩誤加掌戎十年士卒大小相狎彌久戀臣畜養之恩為臣奮一旦之命乞將之北州效力邊垂於是駐兵河東以觀時變及帝崩大將軍何進司隸校尉袁紹謀誅閹宦而太后不許乃私呼卓將兵入朝以脅太后卓得召即時就道並上書曰中常侍張讓等竊幸承寵濁亂海內臣聞揚湯止沸莫若去薪潰雖痛勝於內食昔趙鞅興晉陽之甲以逐君側之惡人今臣輒鳴鍾鼓如洛陽請收讓等以清姦穢卓未至而何進敗虎賁中郎將袁術乃燒南宮欲討宦官而中常侍段圭等劫少帝及陳留王夜走小平津卓遠見火起引兵急進未明到城西聞少帝在北芒因往奉迎帝見卓將兵卒至恐怖涕泣卓與言不能辭對與陳留王語遂及禍亂之事卓以王為賢且為董太后所養卓自以與太后同族有廢立意初卓之入也步騎不過三千自嫌兵少恐不為遠近所服率四五日輒夜潛出軍近營明旦乃大陳旌鼓而還以為西兵復至洛中無知者尋而何進及弟苗先所領部曲皆歸於卓卓又使呂布殺執金吾丁原而并其衆卓兵士大盛乃諷朝廷策免司空劉弘而自代之因集議廢立百僚大會卓乃奮首而言曰大者天地其次君臣所以為政皇帝暗弱不可以奉宗廟為天下主今欲依伊尹霍光故事更立陳留王何如公卿以下莫敢對卓又抗言曰昔霍光定策延年案劒有敢沮大議皆以軍法從之坐者震動尚書盧植獨曰昔太甲既立不明昌邑罪過千餘故有廢立之事今上富於春秋行無失德非前事之比也卓大怒罷坐明日復集羣僚於崇德前殿遂脅太后策廢少帝曰皇帝在喪無人子之心威儀不類人君今廢為弘農王乃立陳留王是為獻帝又議太后迫永樂太后至令憂死逆婦姑之禮無孝順之節遷於永安宮遂以弒崩卓遷太尉領前將軍事加節傳斧鉞虎賁更封郿侯卓乃與司徒黃琬司空楊彪俱帶鈇鑕詣闕上書追理陳蕃竇武及諸黨人以從人望於是悉復蕃等爵位擢用子孫尋進卓為相國入朝不趨劒履上殿封母為池陽君置丞令丞是時洛中貴戚室第相望金帛財産家家殷積卓縱放兵士突其廬舍淫略婦女剽虜資物謂之搜牢人情崩恐不保朝夕及何后葬開文陵卓悉取藏中珍物又姦亂公主妻略宮人虐刑濫罰睚眦必死羣僚內外莫能自固卓嘗遣軍至陽城時人會於社下悉令就斬之駕其車重載其婦女以頭繫車轅歌呼而還又壞五銖錢更鑄小錢悉取洛陽及長安銅人鍾虡飛廉銅馬之屬以充鑄焉故貨賤物貴穀石數萬又錢無輪郭文章不便人用時人以為秦始皇見長人於臨洮乃鑄銅人卓臨洮人也而今毀之雖成毀不同凶暴相類焉卓素聞天下同疾閹官誅殺忠良及其在事雖行無道而猶忍性矯情擢用羣士乃任吏部尚書漢陽周珌侍中汝南伍瓊尚書鄭公業長史何顒等以處士荀爽為司空其染黨錮者陳紀韓融之徒皆為列卿幽滯之士多所顯拔以尚書韓馥為冀州刺史侍中劉岱為兗州刺史陳留孔胄為豫州刺史潁川張咨為南陽太守卓所親愛並不處顯職但將校而已初平元年馥等到官與袁紹之徒十餘人各興義兵同盟討卓而伍瓊周珌陰為內主初靈帝末黃巾餘黨郭太等復起西河白波谷轉寇太原遂破河東百姓流轉三輔號為白波賊衆十餘萬卓遣中郎將牛輔擊之不能却及聞東方兵起懼乃鴆殺弘農王欲徙都長安會公卿議太尉黃琬司徒楊彪廷爭不能得而伍瓊周珌又固諫之卓因大怒曰卓初入朝二子勸用善士故相從而諸君到官舉兵相圖此二君賣卓卓何用相負遂斬瓊珌而彪琬恐懼詣卓謝曰小人戀舊非欲沮國事也請以不及為罪卓既殺瓊珌旋亦悔之故表彪琬為光祿大夫於是遷天子西都初長安遭赤眉之亂宮室營寺焚滅無餘是時唯有高廟京兆府舍遂便時幸焉後移未央宮於是盡徙洛陽人數百萬口於長安步騎驅蹙更相蹈藉飢餓寇掠積尸盈路卓自屯留畢圭苑中悉燒宮廟官府居家二百里內無復孑遺又使呂布發諸帝陵及公卿已下冢墓收其珍寶時長沙太守孫堅亦率豫州諸郡兵討卓卓先遣將徐榮李蒙四出虜掠榮遇堅於梁與戰破堅生禽潁川太守李旻亨之卓所得義兵士卒皆以布纏裹倒立於地熱膏灌殺之時河內太守王匡屯兵河陽津將以圖卓卓遣疑兵挑戰而潛使鋭卒從小平津過津北破之死者略盡明年孫堅收合散卒進屯梁縣之陽人卓遣將胡軫呂布攻之布與軫不相能軍中自驚恐士卒散亂堅追擊之軫布敗走卓遣將李傕詣堅求和堅拒絶不受進軍大谷距洛九十里卓自出與堅戰於諸陵墓閒卓敗走却屯黽池聚兵於陝堅進洛陽宣陽城門更擊呂布布復破走堅乃掃除宗廟平塞諸陵分兵出函谷關至新安黽池閒以卓後卓謂長史劉艾曰關東諸將數敗矣無能為也唯孫堅小戇諸將軍宜慎之乃使東中郎將董越屯黽池中郎將段煨屯華陰中郎將牛輔屯安邑其餘中郎將校尉布在諸縣以禦山東卓諷朝廷使光祿勳宣璠持節拜卓為太師位在諸侯王上乃引還長安百官迎路拜揖卓遂僭擬車服乘金華青蓋爪畫兩轓時人號竿摩車言其服飾近天子也以弟旻為左將軍封鄠侯兄子璜為侍中中軍校尉皆典兵事於是宗族內外並居列位其子孫雖在髫男皆封侯女為邑君數與百官置酒宴會淫樂縱恣乃結壘於長安城東以自居又築塢於郿高厚七丈號曰萬歲塢積穀為三十年儲自云事成雄據天下不成守此足以畢老嘗至郿行塢公卿已下祖道於橫門外卓施帳幔飲設誘降北地反者數百人於坐中殺之先斷其舌次斬手足次鑿其眼目以鑊之未及得死偃轉柸杯案閒會者戰栗亡失匕箸而卓飲食自若諸將有言語蹉跌便戮於前又稍誅關中舊族陷以叛逆時太史望氣言當有大臣戮死者卓乃使人誣衛尉張溫與袁術交通遂笞溫於市殺之以塞天變前溫出屯美陽令卓與邊章等戰無功溫召又不時應命既到而辭對不遜時孫堅為溫參軍勸溫陳兵斬之溫曰卓有威名方倚以西行堅曰明公親帥王師威振天下何恃於卓而賴之乎堅聞古之名將杖鉞臨衆未有不斷斬以示威武者也故穰苴斬莊賈魏絳戮楊干今若縱之自虧威重後悔何及溫不能從而卓猶懷忌恨故及於難溫字伯慎少有名譽纍登公卿亦陰與司徒王允共謀誅卓事未及發而見害越騎校尉汝南伍孚忿卓凶毒志手刃之乃朝服懷佩刀以見卓孚語畢辭去卓起送至閣以手撫其背孚因出刀刺之不中卓自奮得免急呼左右執殺之而大詬曰虜欲反耶孚大言曰恨不得磔裂姦賊於都市以謝天地言未畢而斃時王允與呂布及僕射士孫瑞謀誅卓有人書呂字於布上負而行於市歌曰布乎有告卓者卓不悟三年四月帝疾新愈大會未央殿卓朝服升車既而馬驚墯泥還入更衣其少妻止之卓不從遂行乃陳兵夾道自壘及宮左步右騎屯衛周匝令呂布等扞衛前後王允乃與士孫瑞密表其事使瑞自書詔以授布令騎都尉李肅與布同心勇士十餘人僞著衛士服於北掖門內以待卓卓將至馬驚不行怪懼欲還呂布勸令進遂入門肅以戟刺之卓衷甲不入傷臂墯車顧大呼曰呂布何在布曰有詔討賊臣卓大罵曰庸狗敢如是邪布應聲持矛刺卓趣兵斬之主簿田儀及卓倉頭前赴其尸布又殺之馳齎赦書以令宮陛內外士卒皆稱萬歲百姓歌舞於道長安中士女賣其珠玉衣裝市酒肉相慶者填滿街肆使皇甫嵩攻卓弟旻於郿塢殺其母妻男女盡滅其族乃尸卓於市天時始熱卓素充肥脂流於地守尸吏然火置卓臍中光明達曙如是積日諸袁門生又聚董氏之尸焚灰揚之於路塢中珍藏有金二三萬斤銀八九萬斤錦綺繢縠紈素奇玩積如丘山初卓以牛輔子壻素所親信使以兵屯陝輔分遣其校尉李傕郭汜張濟將步騎數萬擊破河南尹朱俊於中牟因掠陳留潁川諸縣殺略男女所過無復遺類呂布乃使李肅以詔命至陝討輔等輔等逆與肅戰肅敗走弘農布誅殺之其後牛輔營中無故大驚輔懼乃齎金寶踰城走左右利其貨斬輔送首長安傕汜等以王允呂布殺董卓故忿怒并州人并州人其在軍者男女數百人皆誅殺也牛輔既敗衆無所依欲各散去傕等恐乃先遣使詣長安求乞赦免王允以為一歲不可再赦不許之傕等益懷憂懼不知所為武威人賈詡時在傕軍說之曰聞長安中議欲盡誅涼州人諸君若𠫓廾軍單行則一亭長能束君矣不如相率而西以攻長安為董公報仇事濟奉國家以正天下若其不合走未後也傕等然之各相謂曰京師不赦我我當以死決之若攻長安剋則得天下矣不剋則鈔三輔婦女財物西歸鄉里尚可延命衆以為然於是共結盟率軍數千晨夜西行王允聞之乃遣卓故將胡軫徐榮擊之於新豐榮戰死軫以衆降傕隨道收兵比至長安已十餘萬與卓故部曲樊稠李蒙等合圍長安城峻不可攻守之八日呂布軍有叟兵內反引傕衆得入城潰放兵虜掠死者萬餘人殺衛尉种拂等呂布戰敗出奔王允奉天子保宣平城門樓上於是大赦天下李傕郭汜樊稠等皆為將軍遂圍門樓共表請司徒王允出問太師何罪允窮蹙乃下後數日見殺傕等葬董卓於郿并收董氏所焚尸之灰合斂一棺而葬之葬日大風雨霆震卓墓流水入藏漂其棺木傕又遷車騎將軍開府領司隸校尉假節汜後將軍稠右將軍張濟為鎮東將軍並封列侯傕汜稠共秉朝政濟出屯弘農以賈詡為左馮翊欲侯之詡曰此救命之計何功之有固辭乃止更以為尚書典選明年夏大雨晝夜二十餘日漂沒人庶又風如冬時帝使御史裴茂訊詔獄原繫者二百餘人其中有為傕所枉繫者傕恐茂赦之乃表奏茂擅出囚徒疑有姦故請收之詔曰災異屢降陰雨為害使者銜命宣布恩澤原解輕微庶合天心欲釋冤結而復罪之乎一切勿問初卓之入關要韓遂馬騰共謀山東遂騰見天下方亂亦欲倚卓起兵興平元年馬騰從隴右來朝進屯霸橋時騰私有求於傕不獲而怒遂與侍中馬宇右中郎將劉範前涼州刺史种劭中郎將杜稟合兵攻傕連日不決韓遂聞之乃率衆來欲和騰傕既而復與騰合傕使兄子利共郭汜樊稠與騰等戰於長平觀下遂騰敗斬首萬餘級种劭劉範等皆死遂騰走還涼州稠等又追之韓遂使人語稠曰天下反覆未可知相與州里今雖小違要當大同欲共一言乃駢馬交臂相加笑語良久軍還利告傕曰樊韓駢馬笑語不知其辭而意愛甚密於是傕稠始相猜疑猶加稠及郭汜開府與三公合為六府皆參選舉時長安中盜賊不禁白日虜掠傕汜稠乃參分城內各備其界猶不能制而其子弟縱橫侵暴百姓是時穀一斛五十萬豆麥二十萬人相食啖白骨委樍臭穢滿路帝使侍御史侯汶出太倉米豆為飢人作糜經日而死者無降帝疑賦恤有虛乃親於御前自加臨檢既知不實使侍中劉艾出讓有司於是尚書令以下皆詣省閣謝奏收侯汶考實詔曰未忍致汶于理可杖五十自是後多得全濟明年春傕因會刺殺樊稠於坐由是諸將各相疑異傕汜遂復理兵相攻安西將軍楊定者故卓部曲將也懼傕忍害乃與汜合謀迎天子幸其營傕知其計即使兄子暹將數千人圍宮以車三乘迎天子皇后太尉楊彪謂暹曰古今帝王無在人臣家者諸君舉事當上順天心奈何如是暹曰將軍計決矣帝於是遂幸傕營彪等皆徒從亂兵入殿掠宮人什物傕又徙御府金帛乘輿器服而放火燒宮殿官府居人悉盡帝使楊彪與司空張喜等十餘人和傕汜汜不從遂質留公卿彪謂汜曰將軍達人閒事奈何君臣分爭一人劫天子一人質公卿此可行邪汜怒欲手刃彪彪曰卿尚不奉國家吾豈求生邪左右多諫汜乃止遂引兵攻傕矢及帝前又貫傕耳傕將楊奉本白波賊帥乃將兵救傕於是汜衆乃退是日傕復移帝幸其北塢唯皇后宋貴人俱傕使校尉監門隔絶內外尋復欲徙帝於池陽黃白城君臣惶懼司徒趙溫深解譬之乃止詔遣謁者僕射皇甫酈和傕汜酈先譬汜汜即從命又詣傕傕不聽曰郭多盜馬虜耳何敢欲與我同邪必誅之君觀我方略士衆足辦郭多不多又劫質公卿所為如是而君苟欲左右之邪汜一名多酈曰今汜質公卿而將軍脅主誰輕重乎傕怒呵遣酈因令虎賁王昌追殺之昌僞不及酈得以免傕乃自為大司馬與郭汜相攻連月死者以萬數張濟自陝來和解二人仍欲遷帝權幸弘農帝亦思舊京因遣使敦請傕求東歸十反乃許車駕即日發邁李傕出屯曹陽以張濟為驃騎將軍復還屯陝遷郭汜車騎將軍楊定後將軍楊奉興義將軍又以故牛輔部曲董承為安集將軍汜等並侍送乘輿汜遂復欲脅帝幸郿定奉承不聽汜恐變生乃𠫓廾軍還就李傕車駕進至華陰寧輯將軍段煨乃具服御及公卿以下資儲請帝幸其營初楊定與煨有隙遂誣煨欲反乃攻其營十餘日不下而煨猶奉給御膳稟贍百官終無二意李傕郭汜既悔令天子東乃來救段煨因欲劫帝而西楊定為汜所遮亡奔荊州而張濟與楊奉董承不相平乃反合傕汜共追乘輿大戰於弘農東澗承奉軍敗百官士卒死者不可勝數皆𠫓廾其婦女輜重御物符策典籍略無所遺射聲校尉沮俊被創墜馬李傕謂左右曰尚可活不俊罵之曰汝等凶逆逼迫天子亂臣賊子未有如汝者傕使殺之天子遂露次曹陽承奉乃譎傕等與連和而密遣閒使至河東招故白波帥李樂韓暹胡才及南胸奴右賢王去卑並率其衆數千騎來與承奉共擊傕等大破之斬首數千級乘輿乃得進董承李樂擁衛左右胡才楊奉韓暹去卑為後距傕等復來戰奉等大敗死者甚於東澗自東澗兵相連綴四十里中方得至陝乃結營自守時殘破之餘虎賁羽林不滿百人皆有離心承奉等夜乃潛議過河使李樂先度具舟船舉火為應帝步出營臨河欲濟岸高十餘丈乃以絹縋而下餘人或匍匐岸側或從上自投死亡傷殘不復相知爭赴船者不可禁制董承以戈擊披之斷手指於舟中者可掬同濟唯皇后宋貴人楊彪董承及后父執金吾伏完等數十人其宮女皆為傕兵所掠奪凍溺死者甚衆既到大陽止於人家然後幸李樂營百官飢餓河內太守張楊使數千人負米貢餉帝乃御牛車因都安邑河東太守王邑奉獻綿帛悉賦公卿以下封邑為列侯拜胡才征東將軍張楊為安國將軍皆假節開府其壘壁羣豎競求拜職刻印不給至乃以錐畫之或齎酒肉就天子燕飲又遣太僕韓融至弘農與傕汜等連和傕乃放遣公卿百官頗歸宮人婦女及乘輿器服初帝入關三輔戶口尚數十萬自傕汜相攻天子東歸後長安城空四十餘日強者四散羸者相食二三年閒關中無復人跡建安元年春諸將爭權韓暹遂攻董承承奔張楊楊乃使承先繕修洛宮七月帝還至洛陽幸楊安殿張楊以為己功故因以楊名殿乃謂諸將曰天子當與天下共之朝廷自有公卿大臣楊當出扞外難何事京師遂還野王楊奉亦出屯梁乃以張楊為大司馬楊奉為車騎將軍韓暹為大將軍領司隸校尉皆假節鉞暹與董承並留宿衛暹矜功恣睢干亂政事董承患之潛召兗州牧曹操操乃詣闕貢獻稟公卿以下因奏韓暹張楊之罪暹懼誅單騎奔楊奉帝以暹楊有翼車駕之功詔一切勿問於是封衛將軍董承輔國將軍伏完等十餘人為列侯贈沮俊為弘農太守曹操以洛陽殘荒遂移帝幸許楊奉韓暹欲要遮車駕不及曹操擊之奉暹奔袁術遂縱暴楊徐閒明年左將軍劉備誘奉斬之暹懼走還并州道為人所殺胡才李樂留河東才為怨家所害樂自病死張濟飢餓出至南陽攻穰戰死郭汜為其將伍習所殺三年使謁者僕射裴茂詔關中諸將段煨等討李傕夷三族以段煨為安南將軍封閺鄉侯四年張楊為其將楊醜所殺以董承為車騎將軍開府自都許之後權歸曹氏天子總己百官備員而已帝忌操專逼乃密詔董承使結天下義士共誅之承遂與劉備同謀未發會備出征承更與偏將軍王服長水校尉种輯議郎吳碩結謀事泄承服輯碩皆為操所誅韓遂與馬騰自還涼州更相戰爭乃下隴據關中操方事河北慮其乘閒為亂七年乃拜騰征南將軍遂征西將軍並開府後徵段煨為大鴻臚病卒復徵馬騰為衛尉封槐里侯騰乃應召而留子超領其部曲十六年超與韓遂舉關中背曹操操擊破之遂超敗走騰坐夷三族超攻殺涼州刺史韋康復據隴右十九年天水人楊阜破超超奔漢中降劉備韓遂走金城羌中為其帳下所殺初隴西人宗建在枹罕自稱河首平漢王署置百官三十許年曹操因遣夏侯淵擊建斬之涼州悉平論曰董卓初以虓闞為情因遭崩剝之藝故得蹈藉彝倫毀裂畿服夫以刳肝斫趾之性則羣生不足以厭其快然猶折意縉紳疑陵奪尚有盜竊之道焉及殘寇乘之倒山傾海崑岡之火自茲而焚版蕩之篇於焉而極嗚呼人之生也難矣天地之不仁甚矣贊曰百六有會過剝成災董卓滔天干逆三才方夏崩沸皇京烟埃無禮雖及餘祲遂廣矢延王輅兵纏魏象區服傾回人神波蕩
