body:
  text: 後漢書卷四十八楊李翟應霍爰徐列傳第三十八楊終字子山蜀郡成都人也年十三為郡小吏太守奇其才遣詣京師受業習春秋顯宗時徵詣蘭臺拜校書郎建初元年大旱穀貴終以為廣陵楚淮陽濟南之獄徙者萬數又遠屯絶域吏民怨曠乃上疏曰臣聞善善及子孫惡惡止其身百王常典不易之道也秦政酷烈違忤天心一人有罪延及三族高祖平亂約法三章太宗至仁除去收孥萬姓廓然蒙被更生澤及昆蟲功垂萬世陛下聖祖德被四表今以比年久旱災疫未息躬自菲薄廣訪失得三代之隆無以加焉臣竊桉春秋水旱之變皆應暴急惠不下流自永平以來仍連大獄有司窮考轉相牽引掠考冤濫家屬徙邊加以北征胸奴西開三十六國頻年服役轉輸煩費又遠屯伊吾樓蘭車師戊己民懷土思怨結邊域傳曰安土重居謂之衆庶昔殷民近遷洛邑且猶怨望何況去中土之肥饒寄不毛之荒極乎且南方暑濕障毒互生愁困之民足以感動天地移變陰陽矣陛下留念省察以濟元元書奏肅宗下其章司空第五倫亦同終議太尉牟融司徒鮑昱校書郎班固等難倫以施行既久孝子無改父之道先帝所建不宜回異終復上書曰秦築長城功役繁興胡亥不革卒亡四海故孝元𠫓廾珠崖之郡光武絶西域之國不以介鱗易我衣裳魯文公毀泉臺春秋譏之曰先祖為之而己毀之不如勿居而已以其無妨害於民也襄公作三軍昭公舍之君子大其復古以為不舍則有害於民也今伊吾之役樓蘭之屯久而未還非天意也帝從之聽還徙者悉罷邊屯終又言宣帝博徵羣儒論定五經於石渠閣方今天下少事學者得成其業而章句之徒破壞大體宜如石渠故事永為後世則於是詔諸儒於白虎觀論考同異焉會終坐事繫獄博士趙博校書郎班固賈逵等以終深曉春秋學多異聞表請之終又上書自訟即日貰出乃得與於白虎觀焉後受詔刪太史公書為十餘萬言時太后兄衛尉馬廖謹篤自守不訓諸子終與廖交善以書戒之曰終聞堯舜之民可比屋而封桀紂之民可比屋而誅何者堯舜為之隄防桀紂示之驕奢故也詩曰皎皎練絲在所染之上智下愚謂之不移中庸之流要在教化春秋殺太子母弟直稱君甚惡之者坐失教也禮制人君之子年八歲為置少傅教之書計以開其明十五置太傅教之經典以道其志漢興諸侯王不力教誨多觸禁忌故有亡國之禍而乏嘉善之稱今君位地尊重海內所望豈可不臨深履薄以為至戒黃門郎年幼血氣方盛既無長君退讓之風而要結輕狡無行之客縱而莫誨視成任性鑒念前往可為寒心君侯誠宜以臨深履薄為戒廖不納子豫後坐縣書誹謗廖以就國終兄鳳為郡吏太守廉范為州所考遣鳳候終終為范遊説坐徙北地帝東巡狩鳳皇黃龍並集終贊頌嘉瑞上述祖宗鴻業凡十五章奏上詔貰還故郡著春秋外傳十二篇改定章句十五萬言永元十二年徵拜郎中以病卒李法字伯度漢中南鄭人也博通羣書性剛而有節和帝永元九年應賢良方正對策除博士遷侍中光祿大夫歲餘上疏以為朝政苛碎違永平建初故事宦官權重椒房寵盛又譏史官記事不實後世有識尋功計德必不明信坐失旨下有司免為庶人還鄉里杜門自守故人儒生時有候之者言談之次問其不合上意之由法未嘗應對友人固問之法曰鄙夫可與事君乎哉苟患失之無所不至孟子有言夫仁者如射正己而後發發而不中不怨勝己者反諸身而已矣在家八年徵拜議郎諫議大夫正言極辭無改於舊出為汝南太守政有聲迹後歸鄉里卒於家翟酺字子超廣漢雒人也四世傳詩酺好老子尤善圖緯天文歷算以報舅讎當徙日南亡於長安為卜相工後牧羊涼州遇赦還仕郡徵拜議郎遷侍中時尚書有缺詔將大夫六百石以上試對政事天文道術以高第者補之酺自恃能高而忌故太史令孫懿恐其先用乃往候懿既坐言無所及唯涕泣流連懿怪而問之酺曰圖書有漢賊孫登將以才智為中官所害觀君表相似當應之酺受恩接悽愴君之禍耳懿憂懼移病不試由是酺對第一拜尚書時安帝始親政事追感祖母宋貴人悉封其家又元舅耿寶及皇后兄弟閻顯等並用威權酺上疏諫曰臣聞微子佯狂而去殷叔孫通背秦而歸漢彼非自疏其君時不可也臣荷殊絶之恩蒙值不諱之政豈敢雷同受寵而以戴天履地伏惟陛下應天履祚歷值中興當建太平之功而未聞致化之道蓋遠者難明請以近事徵之昔竇鄧之寵傾動四方兼官重紱盈金積貨至使議弄神器改更社稷豈不以藝尊威廣以致斯患乎及其破壞頭顙墯地願為孤豚豈可得哉夫致貴無漸失必暴受爵非道殃必疾今外戚寵幸功均造化漢元以來未有等比陛下誠仁恩周洽以親九族然祿去公室政移私門覆車重尋寧無摧折而朝臣在位莫肯正議翕翕訾訾更相佐附臣恐威權外假歸之良難虎翼一奮卒不可制故孔子曰吐珠於澤誰能不含老子稱國之利器不可以示人此最安危之極戒社稷之深計也儉者上曰朕為天下守財耳豈得妄用之哉至倉穀腐而不可食錢貫朽而不可校今自初政已來日月未久費用賞賜已不可算斂天下之財積無功之家帑藏單盡民物雕傷卒有不虞復當重賦百姓怨叛既生危亂可待也容耳聞正言一日即位天下曠然言其法度素定也今陛下有成王之尊而無數子之佐雖欲崇雍熙致太平其可得乎自去年已來災譴頻數地坼天崩高岸為谷修身恐懼則轉禍為福輕慢天戒則其害彌深願陛下親自勞恤研精致思勉求忠貞之臣誅遠佞諂之黨損玉堂之盛尊天爵之重割情欲之歡罷宴私之好帝王圖籍陳列左右心存亡國所以失之鑒觀興王所以得之庶災害可息豐年可招矣延光三年出為酒泉太守叛羌千餘騎徙敦煌來鈔郡界酺赴擊斬首九百級羌衆幾盡威名大震遷京兆尹順帝即位拜光祿大夫遷將作大匠損省經用歲息四五千萬屢因災異多所匡正由是權貴共誣酺及尚書令高堂芝等交通屬託坐減死歸家復被章云酺前與河南張楷等謀反逮詣廷尉及杜真等上書訟之事得明釋卒於家著援神鉤命解詁十二篇初酺之為大匠上言孝文皇帝始置一經博士武帝大合天下之書而孝宣論六經於石渠學者滋盛弟子萬數光武初興愍其荒廢起太學博士舍內外講堂諸生橫巷為海內所集明帝時辟雍始成欲毀太學太尉趙喜以為太學辟雍皆宜兼存故並傳至今而頃者穨廢至為園採芻牧之處宜更修繕誘進後學帝從之酺免後遂起太學更開拓房室學者為酺立碑銘於學云應奉字世叔汝南南頓人也曾祖父順字華仲和帝時為河南尹將作大匠公廉約己明達政事生十子皆有才學中子疊江夏太守疊生郴武陵太守郴生奉奉少聰明自為童兒及長凡所經履莫不暗記讀書五行並下為郡決曹史行部四十二縣録囚徒數百千人及還太守備問之奉口説罪繫姓名坐狀輕重無所遺脫時人奇之著漢書後序多所述載大將軍梁冀舉茂才先是武陵蠻詹山等四千餘人反叛執縣令屯結連年詔下公卿議四府舉奉才堪將帥永興元年拜武陵太守到官慰納山等皆悉降散於是興學校舉仄陋政稱變俗坐公事免延熹中武陵蠻復寇亂荊州車騎將軍馮緄以奉有威恩為蠻夷所服上請與俱征拜從事中郎奉勤設方略賊破軍罷緄推功於奉薦為司隸校尉糾舉姦違不避豪戚以嚴厲為名及鄧皇后敗而田貴人見幸桓帝有建立之議奉以田氏微賤不宜超登后位上書諫曰臣聞周納狄女襄王出居于鄭漢立飛燕成帝胤嗣泯絶母后之重興廢所因宜思關睢之所求遠五禁之所忌帝納其言竟立竇皇后及黨事起奉乃慨然以疾自退追愍屈原因以自傷著感騷三十篇數萬言諸公多薦舉會病卒子劭劭字仲遠少篤學博覽多聞靈帝時舉孝廉辟車騎將軍何苗掾中平二年漢陽賊邊章韓遂與羌胡為寇東侵三輔時遣車騎將軍皇甫嵩西討之嵩請發烏桓三千人北軍中候鄒靖上言烏桓衆弱宜開募鮮卑事下四府大將軍掾韓卓議以為烏桓兵寡而與鮮卑世為仇敵若烏桓被發則鮮卑必襲其家烏桓聞之當復𠫓廾軍還救非唯無益於實乃更沮三軍之情鄒靖居近邊塞究其態詐若令靖募鮮卑輕騎五千必有破敵之效劭駮之曰鮮卑隔在漠北犬羊為羣無君長之帥廬落之居而天性貪暴不拘信義故數犯障塞且無寧歲唯至互巿乃來靡服苟欲中國珍貨非為畏威懷德計獲事足旋踵為害是以朝家外而不內蓋為此也往者胸奴反叛度遼將軍馬續烏桓校尉王元發鮮卑五千餘騎又武威太守趙沖亦率鮮卑征討叛羌斬獲醜虜既不足言而鮮卑越溢多為不法裁以軍令則忿戾作亂制御小緩則陸掠殘害劫居人鈔商旅噉人牛羊略人兵馬得賞既多不肯去復欲以物買鐵邊將不聽便取縑帛聚欲燒之邊將恐怖畏其反叛辭謝撫順無敢拒違今狡寇未殄而羌為巨害如或致悔其可追乎臣愚以為可募隴西羌胡守善不叛者簡其精勇多其牢賞太守李參沈靜有謀必能奬厲得其死力當思漸消之略不可倉卒望也韓卓復與劭相難反覆於是詔百官大會朝堂皆從劭議三年舉高第再遷六年拜太山太守初平二年黃巾三十萬衆入郡界劭糾率文武連與賊戰前後斬首數千級獲生口老弱萬餘人輜重二千兩賊皆退却郡內以安興平元年前太尉曹嵩及子德從琅邪入太山劭遣兵迎之未到而徐州牧陶謙素怨嵩子操數擊之乃使輕騎追嵩德並殺之於郡界劭畏操誅𠫓廾郡奔冀州牧袁紹初安帝時河間人尹次潁川人史玉皆坐殺人當死次兄初及玉母軍並詣官曹求代其命因縊而物故尚書陳忠以罪疑從輕議活次玉劭後追駮之據正典刑有可存者其議曰尚書稱天秩有禮五服五章哉天討有罪五刑五用哉而孫卿亦云凡制刑之本將以禁暴惡且懲其末也凡爵列官秩賞慶刑威皆以類相從使當其實也若德不副位能不稱官賞不酬功刑不應罪不祥莫大焉殺人者死傷人者刑此百王之定制有法之成科高祖入關雖尚約法然殺人者死亦無寬降夫時化則刑重時亂則刑輕書曰刑罰時輕時重此之謂也軍愚狷妄自投斃昔召忽親死子糾之難而孔子曰經於溝瀆人莫之知朝氏之父非錯刻峻遂能自隕其命班固亦云不如趙母指括以全其宗傳曰僕妾感慨而致死者非能義勇顧無慮耳夫刑罰威獄以類天之震耀殺戮也溫慈和惠以放天之生殖長育也是故春一草枯則為災秋一木華亦為異今殺無罪之初軍而活當死之次玉其為枯華不亦然乎陳忠不詳制刑之本而信一時之仁遂廣引八議求生之端夫親故賢能功貴勤賓豈有次玉當罪之科哉若乃小大以情原心定罪此為求生非謂代死可以生也敗法亂政悔其可追劭凡為駮議三十篇皆此類也又刪定律令為漢儀建安元年乃奏之曰夫國之大事莫尚載籍載籍也者決嫌疑明是非賞刑之宜允獲厥中俾後之人永為監焉故膠東西相董仲舒老病致仕朝廷每有政議數遣廷尉張湯親至陋巷問其得失於是作春秋決獄二百三十二事動以經對言之詳矣逆臣董卓蕩覆王室典憲焚燎靡有孑遺開辟以來莫或茲酷今大駕東邁巡省許都拔出險難其命惟新臣纍世受恩榮祚豐衍竊不自揆貪少云補輒撰具律本章句尚書舊事廷尉板令決事比例司徒都目五曹詔書及春秋斷獄凡二百五十篇蠲去復重為之節文又集駮議三十篇以類相從凡八十二事其見漢書二十五漢記四皆刪潤色以全本體其二十六博採古今瓌瑋之士文章煥炳德義可觀其二十七臣所創造豈繄自謂必合道衷心焉憤邑聊以藉手昔鄭人以乾鼠為璞鬻之於周宋愚夫亦寶燕石緹十重夫覩之者掩口盧胡而笑斯文之族無乃類旃左氏實云雖有姬薑絲麻不𠫓廾憔悴菅蒯蓋所以代匱也是用敢露頑才廁于明哲之末雖未足綱紀國體宣洽時雍庶幾觀察增闡聖聽惟因萬機之餘暇遊意省覽焉獻帝善之二年詔拜劭為袁紹軍謀校尉時始遷都於許舊章堙沒書記罕存劭慨然歎息乃綴集所聞著漢官禮儀故事凡朝廷制度百官典式多劭所立初父奉為司隸時並下諸官府郡國各上前人像贊劭乃連綴其名録為狀人紀又論當時行事著中漢輯序撰風俗通以辨物類名號釋時俗嫌疑文雖不典後世服其洽聞凡所著述百三十六篇又集解漢書皆傳于時後卒於鄴弟子瑒璩並以文才稱中興初有應嫗者生四子而寡見神光照社試探之乃得黃金自是諸子宦學並有才名至瑒七世通顯霍諝字叔智魏郡鄴人也少為諸生明經有人誣諝舅宋光於大將軍梁商者以為妄刊章文坐繫洛陽詔獄掠考困極諝時年十五奏記於商曰將軍天覆厚恩愍舅光冤結前者溫教許為平議雖未下吏斷決其事已蒙神明顧省之聽皇天后土實聞德音竊獨踴躍私自慶幸諝聞春秋之義原情定過赦事誅意故許止雖弒君而不罪趙盾以縱賊而見書此仲尼所以垂王法漢世所宜遵前修也傳曰人心不同譬若其面斯蓋謂大小窳隆醜美之形至於鼻目衆竅毛髮之狀未有不然者也情之異者剛柔舒急倨敬之間至於趨利避害畏死樂生亦復均也諝與光骨肉義有相隱言其冤濫未必可諒且以人情平論其理書欲以何名就有所疑當求其便安豈有觸冒死禍以解細微譬猶療飢於附子止渴於鴆毒未入腸胃已絶咽喉豈可為哉昔東海孝婦見枉不辜幽靈感革天應枯旱光之所坐情既可原守闕連年而終不見理呼嗟紫宮之門泣血兩觀之下傷和致災為害滋甚凡事更赦令不應復案夫以罪刑明白尚蒙天恩豈有冤謗無徵反不得理是為刑宥正罪戮加誣侵也不偏不黨其若是乎明將軍德盛位尊人臣無二言行動天地舉厝移陰陽誠能留神沛然曉察必有于公高門之福和氣立應天下幸甚仕郡舉孝廉稍遷金城太守性明達篤厚能以恩信化誘殊俗甚為羌胡所敬服遭母憂自上歸行喪服闋公車徵再遷北海相入為尚書僕射是時大將軍梁冀貴戚秉權自公卿以下莫敢違忤諝與尚書令尹勳數奏其事又因陛見陳聞罪失及冀誅後桓帝嘉其忠節封鄴都亭侯前後固讓不許出為河南尹遷司隸校尉轉少府廷尉卒官子俊安定太守爰延字季平陳留外黃人也清苦好學能通經教授性質賣心少言辭縣令隴西牛述好士知人乃禮請延為廷掾范丹為功曹濮陽潛為主簿常共言談而已後令史昭以為鄉嗇夫仁化大行人但聞嗇夫不知郡縣在事二年州府禮請不就桓帝時徵博士太尉楊秉等舉賢良方正再遷為侍中帝遊上林苑從容問延曰朕何如主也對曰陛下為漢中主帝曰何以言之對曰尚書令陳蕃任事則化中常侍黃門豫政則亂是以知陛下可與為善可與為非帝曰昔朱雲廷折欄檻今侍中面稱朕違敬聞闕矣拜五官中郎將轉長水校尉遷魏郡太守徵拜大鴻臚帝以延儒生常特宴見時太史令上言客星經帝坐帝密以問延延因上封事曰臣聞天子尊無為上故天以為子位臨臣庶威重四海動靜以禮則星辰順序意有邪僻則晷度錯違陛下以河南尹鄧萬有龍潛之舊封為通侯恩重公卿惠豐宗室加頃引見與之對博上下媟黷有虧尊嚴臣聞之帝左右者所以咨政德也故周公戒成王曰其朋其朋言慎所與也昔宋閔公與強臣共博列婦人於側積此無禮以致大災武帝與幸臣李延年韓嫣同臥起尊爵重賜情欲無猒遂生驕淫之心行不義之事卒延年被戮嫣伏其辜夫愛之則不覺其過惡之則不知其善所以事多放濫物情生怨故王者賞人必酬其功爵人必甄其德善人同處則日聞嘉訓惡人從遊則日生邪情孔子曰益者三友損者三友邪臣惑君亂妾危主以非所言則悅於耳以非所行則玩於目故令人君不能遠之仲尼曰唯女子與小人為難養近之則不遜遠之則怨蓋聖人之明戒也昔光武皇帝與嚴光俱寢上天之異其夕即見夫以光武之聖德嚴光之高賢君臣合道尚降此變豈況陛下今所親幸以賤為貴以卑為尊哉惟陛下遠讒諛之人納謇謇之士除左右之權寤宦官之敝使積善日熙佞惡消殄則乾災可除帝省其奏因以病自上乞骸骨還家靈帝復特徵不行病卒子驥白馬令亦稱善士徐璆字孟玉廣陵海西人也父淑度遼將軍有名於邊璆少博學辟公府舉高第稍遷荊州刺史時董太后姊子張忠為南陽太守因藝放濫臧罪數億璆臨當之部太后遣中常侍以忠屬璆璆對曰臣身為國不敢聞命太后怒遽徵忠為司隸校尉以相威臨璆到州舉奏忠臧餘一億使冠軍縣上簿詣大司農以彰暴其事又奏五郡太守及屬縣有臧汙者悉徵案罪威風大行中平元年與中郎將朱俊擊黃巾賊於宛破之張忠怨璆與諸閹官構造無端璆遂以罪徵有破賊功得免官歸家後再徵遷汝南太守轉東海相所在化行獻帝遷許以廷尉徵當詣京師道為袁術所劫授璆以上公之位璆乃歎曰龔勝鮑宣獨何人哉守之必死術不敢逼術死軍破璆得其盜國璽及還許上之并送前所假汝南東海二郡印綬司徒趙溫謂璆曰君遭大難猶存此邪璆曰昔蘇武困於胸奴不隊七尺之節況此方寸印乎後拜太常使持節拜曹操為丞相操以相讓璆璆不敢當卒於官論曰孫懿以高明見忌而受欺於陰計翟酺資譎數取通而終之以謇諫豈性智自有周偏先後之要殊度乎應氏七世才聞而奉劭采章為盛及撰著篇籍甄紀異知雖云小道亦有可觀者焉延璆應對辨正而不可犯陵上之尤斯固辭之不可以已也贊曰楊終李法華陽有聞二應克聰亦表汝濆翟酺詐懿霍諝請舅延能訐帝璆亦忤后
