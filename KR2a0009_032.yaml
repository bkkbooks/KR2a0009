body:
  text: 後漢書卷二十九申屠剛鮑永郅惲列傳第十九申屠剛字巨卿扶風茂陵人也七世祖嘉文帝時為丞相剛質性方直常慕史鰌汲黯之為人仕郡功曹平帝時王莽專政朝多猜忌遂隔絶帝外家馮衛二族不得交宦剛常疾之及舉賢良方正因對策曰之君曠然覺悟懷邪之臣懼然自刻者也今朝廷不考功校德而虛納毀譽數下詔書張設重法抑斷誹謗禁割論議罪之重者乃至斬傷忠臣之情挫直士之鋭殆乖建進善之旌縣敢諫之鼓闢四門之路明四目之義也地舉措不失然近則召公不悅遠則四國流言夫子母之性天道至親今聖主幼少始免繈褓即位以來至親分離外戚杜隔恩不得通且漢家之制雖任英賢猶援姻戚親疏相錯杜塞間隙誠所以安宗廟重社稷也今馮衛無罪久廢不録或處窮僻不若民庶誠非慈愛忠孝承上之意夫為人後者自有正義至尊至卑其藝不嫌是以人無賢愚莫不為怨姦臣賊子以之為便不諱之變誠難其慮今之保傅非古之周公周公至聖猶尚有纍何況事失其衷不合天心者哉昔周公先遣伯禽守封於魯以義割恩寵不加後故配天郊祀三十餘世霍光秉政輔翼少主修善進士名為忠直而尊崇其宗黨摧抑外戚結貴據權至堅至固終沒之後受禍滅門方今師傅皆以伊周之位據賢保之任以此思化則功何不至不思其危則禍何不到損益之際孔父攸歎持滿之戒老氏所慎蓋功冠天下者不安威震人主者不全今承衰亂之後繼重敝之世公家屈竭賦斂重數苛吏奪其時貪夫侵其財百姓困乏疾疫夭命盜賊羣輩且以萬數軍行衆止竊號自立攻犯京師燔燒縣邑至乃訛言積弩入宮宿衛驚懼自漢興以來誠未有也國家微弱姦謀不禁六極之效危於纍卵王者承天順地典爵主刑不敢以天官私其宗不敢以天罰輕其親陛下宜遂聖明之德昭然覺悟遠述帝王之迹近遵孝文之業差五品之屬納至親之序亟遣使者徵中山太后置之別宮令時朝見又召馮衛二族裁與職使得執戟親奉宿衛以防未然之符以抑患禍之端上安社稷下全保傅內和親戚外絶邪謀後莽篡位剛遂避地河西轉入巴蜀往來二十許年及隗囂據隴右欲背漢而附公孫述剛説之曰愚聞人所歸者天所與人所畔者天所去也伏念本朝躬聖德舉義兵龔行天罰所當必摧誠天之所福非人力也將軍本無尺土孤立一隅宜推誠奉順與朝并力上應天心下酬人望為國立功可以永年嫌疑之事聖人所絶以將軍之威重遠在千里動作舉措可不慎與今璽書數到委國歸信欲與將軍共同吉凶布衣相與尚有沒身不負然諾之信況於萬乘者哉今何畏何利久疑如是卒有非常之變上負忠孝下愧當世夫未至豫言固常為虛及其已至又無所及是以忠言至諫希得為用誠願反覆愚老之言囂不納遂畔從述建武七年詔書徵剛剛將歸與囂書曰愚聞專己者孤拒諫者塞孤塞之政亡國之風也雖有明聖之姿猶屈己從衆故慮無遺策舉無過事夫聖人不以獨見為明而以萬物為心順人者昌逆人者亡此古今之所共也將軍以布衣為鄉里所推廊廟之計既不豫定動軍發衆又不深料今東方政教日睦百姓平安而西州發兵人人懷憂騷動惶懼莫敢正言羣衆疑惑人懷顧望非徒無精鋭之心其患無所不至夫物窮則變生事急則計易其藝然也夫離道德逆人情而能有國有家者古今未有也將軍素以忠孝顯聞是以士大夫不遠千里慕樂德義今苟欲決意徼幸此何如哉夫天所祐者順人所助者信如未蒙祐助令小人受塗地之禍毀壞終身之德敗亂君臣之節樜傷父子之恩衆賢破膽可不慎哉囂不納剛到拜侍御史遷尚書令光武嘗欲出遊剛以隴蜀未平不宜宴安逸豫諫不見聽遂以頭軔乘輿輪帝遂為止時內外羣官多帝自選舉加以法理嚴察職事過苦尚書近臣至乃捶撲牽曳於前羣臣莫敢正言剛每輒極諫又數言皇太子宜時就東宮簡任賢保以成其德帝並不納以數切諫失旨數年出為平陰令復徵拜太中大夫以病去官卒於家鮑永字君長上黨屯留人也父宣哀帝時任司隸校尉為王莽所殺永少有志操習歐陽尚書事後母至孝妻嘗於母前叱狗而永即去之初為郡功曹莽以宣不附己欲滅其子孫都尉路平承望風旨規欲害永太守苟諫擁護召以為吏常置府中永因數為諫陳興復漢室翦滅篡逆之策諫每戒永曰君長幾事不密禍倚人門永感其言及諫卒自送喪歸扶風路平遂收永弟升太守趙興到聞乃歎曰我受漢茅土不能立節而鮑宣死之豈可害其子也勑縣出升復署永功曹時有矯稱侍中止傳舍者興欲謁之永疑其詐諫不聽而出興遂駕往永乃拔佩刀截馬當胸乃止後數日莽詔書果下捕矯稱者永由是知名舉秀才不應更始二年徵再遷尚書僕射行大將軍事持節將兵安集河東并州朔部得自置偏裨輒行軍法永至河東因擊青犢大破之更始封為中陽侯永雖為將率而車服敝素為道路所識時赤眉害更始三輔道絶光武即位遣諫議大夫儲大伯持節徵永詣行在所永疑不從乃收繫大伯遣使馳至長安既知更始已亡乃發喪出大伯等封上將軍列侯印綬悉罷兵但幅巾與諸將及同心客百餘人詣河內帝見永問曰卿衆所在永離席叩頭曰臣事更始不能令全誠慙以其衆幸富貴故悉罷之帝曰卿言大而意不悅時攻懷未拔帝謂永曰我攻懷三日而兵不下關東畏服卿可且將故人自往城下譬之即拜永諫議大夫至懷乃説更始河內太守於是開城而降帝大喜賜永洛陽商里宅固辭不受時董憲裨將屯兵於魯侵害百姓乃拜永為魯郡太守永到擊討大破之降者數千人唯別帥彭豐虞休皮常等各千餘人稱將軍不肯下頃之孔子闕里無故荊棘自除從講堂至于里門永異之謂府丞及魯令曰方今危急而闕里自開斯豈夫子欲令太守行禮助吾誅無道邪乃會人衆修鄉射之禮請豐等共會觀視欲因此禽之豐等亦欲圖永乃持牛酒勞饗而潛挾兵器永覺之手格殺豐等禽破黨與帝嘉其略封為關內侯遷楊州牧時南土尚多寇暴永以吏人痍傷之後乃緩其銜轡示誅強橫而鎮撫其餘百姓安之會遭母憂去官悉以財産與孤弟子建武十一年徵為司隸校尉帝叔父趙王良尊戚貴重永以事劾良大不敬由是朝廷肅然莫不戒慎乃辟扶風鮑恢為都官從事恢亦抗直不避強禦帝常曰貴戚且宜斂手以避二鮑其見憚如此永行縣到霸陵路經更始墓引車入陌從事諫止之永曰親北面事人寧有過墓不拜雖以獲罪司隸所不避也遂下拜哭盡哀而去西至扶風椎牛上苟諫冢帝聞之意不平問公卿曰奉使如此何如太中大夫張湛對曰仁者行之宗忠者義之主也仁不遺舊忠不忘君行之高者也帝意乃釋後大司徒韓歆坐事永固請之不得以此忤帝意出為東海相坐度田事不實被徵諸郡守多下獄永至城成臯詔書逆拜為兗州牧便道之官視事三年病卒子昱論曰鮑永守義於故主斯可以事新主矣恥以其衆受寵斯可以受大寵矣若乃言之者雖誠而聞之未譬豈苟進之悅易以情納持正之忤難以理求乎誠能釋利以循道居方以從義君子之概也昱字文泉少傳父學客授於東平建武初太行山中有劇賊太守戴涉聞昱鮑永子有智略乃就謁請署守高都長昱應之遂討擊羣賊誅其渠帥道路開通由是知名後為沘陽長政化仁愛境內清淨荊州刺史表上之再遷中元元年拜司隸校尉詔昱詣尚書使封胡降檄光武遣小黃門問昱有所怪不對曰臣聞故事通官文書不著姓又當司徒露布怪使司隸下書而著姓也帝報曰吾故欲令天下知忠臣之子復為司隸也昱在職奉法守正有父風永平五年坐救火免後拜汝南太守郡多陂池歲歲決壞年費常三千餘萬昱乃上作方梁石洫水常饒足溉田倍多人以殷富十七年代王敏為司徒賜錢帛什器帷帳除子得為郎建初元年大旱穀貴肅宗召昱問曰旱既大甚將何以消復災眚對曰臣聞聖人理國三年有成今陛下始踐天位刑政未著如有失得何能致異但臣前在汝南典理楚事繫者千餘人恐未能盡當其罪先帝詔言大獄一起冤者過半又諸徙者骨肉離分孤魂不祀一人呼嗟王政為虧宜一切還諸徙家屬蠲除禁錮興滅繼絶死生獲所如此和氣可致帝納其言四年代牟融為太尉六年薨年七十餘子德修志節有名稱纍官為南陽太守時歲多荒災唯南陽豐穰吏人愛悅號為神父時郡學久廢德乃修起橫舍備俎豆黻冕行禮奏樂又尊饗國老宴會諸儒百姓觀者莫不勸服在職九年徵拜大司農卒于官子昂字叔雅有孝義節行初德被病數年昂俯伏左右衣不緩帶及處喪毀瘠三年抱負乃行服闋遂潛于墓次不關時務舉孝廉辟公府連徵不至卒於家郅惲字君章汝南西平人也年十二失母居喪過禮及長理韓詩嚴氏春秋明天文歷數王莽時寇賊羣發惲乃仰占玄象歎謂友人曰方今鎮歲熒惑並在漢分翼軫之域去而復來漢必再受命福歸有德如有順天發策者必成大功時左隊大夫逯並素好士惲説之曰當今上天垂象智者以昌愚者以亡昔伊尹自鬻輔商立功全人惲竊不遜敢希伊尹之蹤應天人之變明府儻不疑逆俾成天德並奇之使署為吏惲不謁曰昔文王拔呂尚於渭濱高宗禮傅説於巖築桓公取管仲於射鉤故能立弘烈就元勳未聞師相仲父而可為吏位也非窺天者不可與圖遠君不授驥以重任驥亦俯首裹足而去耳遂不受署西至長安乃上書王莽曰臣聞天地重其人惜其物故運機衡垂日月含元包一甄陶品類顯表紀世圖録豫設漢歷久長孔為赤制不使愚惑殘人亂時智者順以成德愚者逆以取害神器有命不可虛獲上天垂戒欲悟陛下令就臣位轉禍為福劉氏享天永命陛下順節盛衰取之以天還之以天可謂知命矣若不早圖是不免於竊位也且堯舜不以天顯自與故禪天下陛下何貪非天顯以自纍也天為陛下嚴父臣為陛下孝子父教不可廢子諫不可拒惟陛下留神莽大怒即收繫詔獄劾以大逆猶以惲據經讖難即害之使黃門近臣脅惲令自告狂病恍忽不覺所言惲乃瞋目詈曰所陳皆天文聖意非狂人所能造遂繫須冬會赦得出乃與同郡鄭敬南遁蒼梧建武三年又至廬江因遇積弩將軍傅俊東徇揚州俊素聞惲名乃禮請之上為將兵長史授以軍政惲乃誓衆曰無掩人不備窮人於厄不得斷人支體祼人形骸放淫婦女俊軍士猶發冢陳尸掠奪百姓惲諫俊曰昔文王不忍露白骨武王不以天下易一人之命故能獲天地之應剋商如林之旅將軍如何不師法文王而犯逆天地之禁多傷人害物虐及枯尸取罪神明今不謝天改政無以全命願將軍親率士卒收傷葬死哭所殘暴以明非將軍本意也從之百姓悅服所向皆下七年俊還京師而上論之惲恥以軍功取位遂辭歸鄉里縣令卑身崇禮請以為門下掾惲友人董子張者父先為鄉人所害及子張病將終惲往候之子張垂歿視惲歔欷不能言惲曰吾知子不悲天命而痛讎不復也子在吾憂而不手子亡吾手而不憂也子張但目擊而已惲即起將客遮仇人取其頭以示子張子張見而氣絶惲因而詣縣以狀自首令應之惲曰為友報讎吏之私也奉法不阿君之義也虧君以生非臣節也趨出就獄令跣而追惲不及遂自至獄令拔刃自向以要惲曰子不從我出敢以死明心惲得此乃出因病去久之太守歐陽歙請為功曹汝南舊俗十月饗會百里內縣皆齎牛酒到府宴飲時臨饗禮訖歙教曰西部督郵繇延天資忠貞稟性公方摧破姦凶不嚴而理今與衆儒共論延功顯之于朝太守敬嘉厥休牛酒養德主簿讀書教戶曹引延受賜惲於下坐愀然前曰司正舉觥以君之罪告謝于天案延資性貪邪外方內員朋黨搆姦罔上害人所在荒亂怨慝並作明府以惡為善股肱以直從曲此既無君又復無臣惲敢再拜奉觥歙色慙動不知所言門下掾鄭敬進曰君明臣直功曹言切明府德也可無受觥哉歙意少解曰實歙罪也敬奉觥惲乃免冠謝曰昔虞舜輔堯四罪咸服讒言弗庸孔任不行故能作股肱帝用有歌惲不忠孔任是昭豺虎從政既陷誹謗又露所言罪莫重焉請收惲延以明好惡歙曰是重吾過也遂不宴而罷惲歸府稱病延亦自退鄭敬素與惲厚見其言忤歙乃相招去曰子廷爭繇延君猶不納延今雖去其藝必還直心無諱誠三代之道然道不同者不相為謀吾不能忍見子有不容君之危盍去之乎惲曰孟軻以強其君之所不能為忠量其君之所不能為賊惲業已強之矣障君於朝既有其直而不死職罪也延退而惲又去不可敬乃獨隱於弋陽山中居數月歙果復召延惲於是乃去從敬止漁釣自娛留數十日惲志在從政既乃喟然而歎謂敬曰天生俊士以為人也烏獸不可與同羣子從我為伊呂乎將為巢許而父老堯舜乎敬曰吾足矣初從生步重華於南野謂來歸為松子今幸得全軀樹類還奉墳墓盡學問道雖不從政施之有政是亦為政也吾年耄矣安得從子子勉正性命勿勞神以害生惲於是告別而去敬字次都清志高世光武連徵不到惲遂客居江夏教授郡舉孝廉為上東城門候帝嘗出獵車駕夜還惲拒關不開帝令從者見面於門間惲曰火明遼遠遂不受詔帝乃回從東中門入明日惲上書諫曰昔文王不敢槃于遊田以萬人惟憂而陛下遠獵山林夜以繼晝其如社禝宗廟何暴虎馮河未至之戒誠小臣所竊憂也書奏賜布百匹貶東中門候為參封尉後令惲授皇太子韓詩侍講殿中及郭皇后廢惲乃言於帝曰臣聞夫婦之好父不能得之於子況臣能得之於君乎是臣所不敢言雖然願陛下念其可否之計無令天下有議社稷而已帝曰惲善恕己量主知我必不有所左右而輕天下也后既廢而太子意不自安惲乃説太子曰久處疑位上違孝道下近危殆昔高宗明君吉甫賢臣及有纖介放逐孝子春秋之義母以子貴太子宜因左右及諸皇子引愆退身奉養母氏以明聖教不背所生太子從之帝竟聽許惲再遷長沙太守先是長沙有孝子古初遭父喪未葬鄰人失火初匍匐柩上以身扞火火為之滅惲甄異之以為首舉後坐事左轉芒長又免歸避地教授著書八篇以病卒子壽壽字伯考善文章以廉能稱舉孝廉稍遷冀州刺史時冀部屬郡多封諸王賓客放縱類不檢節壽案察之無所容貸乃使部從事專住王國又徙督郵舍王宮外動靜失得即時騎驛言上奏王罪及劾傅相於是藩國畏懼並為遵節視事三年冀土肅清三遷尚書令朝廷每有疑議常獨進見肅宗奇其智策擢為京兆尹郡多強豪姦暴不禁三輔素聞壽在冀州皆懷震竦各相檢勑莫敢干犯壽雖威嚴而推誠下吏皆願效死莫有欺者以公事免復徵為尚書僕射是時大將軍竇憲以外戚之寵威傾天下憲嘗使門生齎書詣壽有所請託壽即送詔獄前後上書陳憲驕恣引王莽以誡國家是時憲征胸奴海內供其役費而憲及其弟篤景並起第宅驕奢非法百姓苦之壽以府臧空虛軍旅未休遂因朝會譏刺憲等厲音正色辭旨甚切憲怒陷壽以買公田誹謗下吏當誅侍御史何敞上疏理之曰臣聞聖王闢四門開四聰延直言之路下不諱之詔立敢諫之旗聽歌謠於路爭臣七人以自鑒照考知政理違失人心輒改更之故天人並應傳福無窮臣伏見尚書僕射郅壽坐於臺上與諸尚書論擊胸奴言議過差及上書請買公田遂繫獄考劾大不敬臣愚以為壽機密近臣匡救為職若懷默不言其罪當誅今壽違衆正議以安宗廟豈其私邪又臺閣平事分爭可否雖唐虞之隆三代之盛猶謂諤諤以昌不以誹謗為罪請買公田人情細過可裁隱忍壽若被誅臣恐天下以為國家橫罪忠直賊傷和氣忤逆陰陽臣所以敢犯嚴威不避夷滅觸死瞽言非為壽也忠臣盡節以死為歸臣雖不知壽度其甘心安之誠不欲聖朝行誹謗之誅以傷晏晏之化杜塞忠直垂譏無窮臣敞謬豫機密言所不宜罪名明白當填牢獄先壽僵仆萬死有餘書奏壽得減死論徙合浦未行自殺家屬得歸鄉里贊曰鮑永沈吟晚乃歸正志達義全先號後慶申屠對策郅惲上書有道雖直無道不愚
