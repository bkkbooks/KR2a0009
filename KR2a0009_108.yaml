body:
  text: 後漢書志第八祭祀中北郊明堂辟雍靈臺迎氣增祀六宗老子是年初營北郊明堂辟雍靈臺未用事遷呂太后于園上薄太后尊號曰高皇后當配地郊高廟語在光武紀北郊在雒陽城北四里為方壇四陛三十三年正月辛未郊別祀地祇位南面西上高皇后配西面北上皆在壇上地理羣神從食皆在壇下如元始中故事中嶽在未四嶽各在其方孟辰之地中營內海在東四瀆河西濟北淮東江南他山川各如其方皆在外營內四陛醊及中外營門封神如南郊地祇高后用犢各一頭五嶽共牛一頭海四瀆共牛一頭羣神共二頭奏樂亦如南郊既送神瘞俎實于壇北明帝即位永平二年正月辛未初祀五帝於明堂光武帝配五帝坐位堂上各處其方黃帝在未皆如南郊之位光武帝位在青帝之南少退西面牲各一犢奏樂如南郊卒事遂升靈臺以望雲物迎時氣五郊之兆自永平中以禮讖及月令有五郊迎氣服色因采元始中故事兆五郊于雒陽四方中兆在未壇皆三尺階無等立春之日迎春于東郊祭青帝句芒車旗服飾皆青歌青陽八佾舞雲翹之舞及因賜文官太傅司徒以下縑各有差立夏之日迎夏于南郊祭赤帝祝融車旗服飾皆赤歌朱明八佾舞雲翹之舞先立秋十八日迎黃靈于中兆祭黃帝后土車旗服飾皆黃歌朱明八佾舞雲翹育命之舞立秋之日迎秋于西郊祭白帝蓐收車旗服飾皆白歌西皓八佾舞育命之舞使謁者以一特牲先祭先虞于壇有事天子入囿射牲以祭宗廟名曰貙劉語在禮儀志立冬之日迎冬于北郊祭黑帝玄冥車旗服飾皆黑歌玄冥八佾舞育命之舞章帝即位元和二年正月詔曰山川百神應祀者未盡其議增修羣祀宜享祀者二月上東巡狩將至泰山道使使者奉一太牢祠帝堯於濟陰成陽靈臺上至泰山修光武山南壇兆辛未柴祭天地羣神如故事壬申宗祀五帝於孝武所作汶上明堂光武帝配如雒陽明堂祀禮癸酉更告祀高祖太宗世宗中宗世祖顯宗於明堂各一太牢卒事遂覲東后饗賜王侯羣臣因行郡國幸魯祠東海恭王及孔子七十二弟子四月還京都庚申告至祠高廟世祖各一特牛又為靈臺十二門作詩各以其月祀而奏之和帝無所增改安帝即位元初六年以尚書歐陽家說謂六宗者在天地四方之中為上下四方之宗以元始中故事謂六宗易六子之氣日月雷公風伯山澤者為非是三月庚辰初更立六宗祀於雒陽西北戌亥之地禮比太社也延光三年上東巡狩至泰山柴祭及祠汶上明堂如元和三二年故事順帝即位修奉常祀桓帝即位十八年好神僊事延熹八年初使中常侍之陳國苦縣祠老子九年親祠老子於濯龍文罽為壇飾淳金釦器設華蓋之坐用郊天樂也
