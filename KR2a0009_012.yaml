body:
  text: 後漢書卷十下皇后紀第十下安思閻皇后諱姬河南滎陽人也祖父章永平中為尚書以二妹為貴人章精力曉舊典久次當遷以重職顯宗為後宮親屬竟不用出為步兵校尉章生暢暢生后后有才色元初元年以選入掖庭甚見竉愛為貴人二年立為皇后后專房妒忌帝幸宮人李氏生皇子保遂鴆殺李氏三年以后父侍中暢為長水校尉封北宜春侯食邑五千戶四年暢卒諡曰文侯子顯嗣建光元年鄧太后崩帝始親政事顯及弟景耀晏並為卿校典禁兵延光元年更封顯長社縣侯食邑萬三千五百戶追尊后母宗為滎陽君顯景諸子年皆童齔並為黃門侍郎后寵既盛而兄弟頗與朝權后遂與大長秋江京中常侍樊豐等共譖皇太子保廢為濟陰王四年春后從帝幸章陵帝道疾崩於葉縣后顯兄弟及江京樊豐等謀曰今晏駕道次濟陰王在內邂逅公卿立之還為大害乃偽云帝疾甚徙御臥車行四日驅馳還宮明日詐遣司徒劉喜熹詣郊廟社稷告天請命其夕乃發喪尊后曰皇太后皇太后臨朝以顯為車騎將軍儀同三司太后欲久專國政貪立幼式與顯等定策禁中迎濟北惠王子北鄉侯懿立為皇帝顯忌大將軍耿寶位尊權重威行前朝乃風有司奏寶及其黨與中常樊豐虎賁中郎將謝惲惲弟侍中篤篤弟大將軍長史宓侍中周廣阿母野王君王聖聖女永永壻黃門侍郎樊嚴等更相阿黨互作威福探刺禁省更為唱和皆大不道豐惲廣皆下獄死家屬徙比景宓嚴減死髡鉗貶寶為則亭侯遣就國自殺王聖母子徙鴈門於是景為衛尉耀城門校尉晏執金吾兄弟權要威福自由少帝立二百餘日而疾篤顯兄弟及江京等皆在左右京引顯屏語曰北鄉侯病不解國嗣宜時有定前不用濟陰王今若立之後必當怨又何不早徵諸王子簡所置乎顯以為然及少帝薨京白太后徵濟北河間王子未至而中黃門孫程合謀殺江京等立濟陰王是為順帝顯景晏及黨與皆伏誅遷太后於離宮家屬徙比景明年太后崩在位十二年合葬恭陵帝母李氏瘞在洛陽城北帝初不知莫敢以聞及太后崩左右白之帝感悟發哀親到瘞所更以禮殯上尊諡曰恭愍皇后葬恭北陵為策書金匱藏于世祖廟順烈梁皇后諱妠大將軍商之女恭懷皇后弟之孫也后生有光景之祥少善女工好史書九歲能誦論語治韓詩大義略薄常以列女圖畫置於左右以自監戒父商深異之竊謂諸弟曰我先人全濟河西所活者不可勝數雖大位不究而積德必報若慶流子孫者儻興此女乎永建三年與姑俱選入掖庭時年十三相工茅通見后驚再拜賀曰此所謂日角偃月相之極貴臣所未嘗見也太史卜兆得壽房又筮得坤之比遂以為貴人常特被引御從容辭於帝曰夫陽以博施為德陰以不專為義螽斯則百福之所由興也願陛下思雲雨之均澤識貫魚之次序使小妾得免罪謗之纍由是帝加敬焉陽嘉元年春有司奏立長秋宮以乘氏侯商先帝外戚春秋之義娶先大國梁小貴人宜配天祚正位坤極帝從之乃於壽安殿立貴人為皇后后既少聰惠深覽前世得失雖以德進不敢有驕專之心每日月見謫輒降服求愆建康元年帝崩后無子美人虞氏子炳立是為沖帝尊后為皇太后太后臨朝沖帝尋崩復立質帝猶秉朝政時楊徐劇賊寇擾州郡西羌鮮卑及日南蠻夷攻城暴掠賦斂煩數官民困竭太后夙夜勤勞推心杖賢委任太尉李固等拔用忠良務崇節儉其貪叨罪慝多見誅廢分兵討伐羣寇消夷故海內肅然宗廟以寧而兄大將軍冀鴆殺質帝專權暴濫忌害忠良數以邪説疑誤太后遂立桓帝而誅李固太后又溺於宦官多所封寵以此天下失望和平元年春歸政於帝太后寢疾遂篤乃御輦幸宣德殿見宮省官屬及諸梁兄弟詔曰朕素有心下結氣從間以來加以浮腫逆害飲食寖以沈困比使內外勞心請禱私自忖度日夜虛劣不能復與羣公卿士共相終竟援立聖嗣恨不久育養見其終始今以皇帝將軍兄弟委付股肱其各自勉焉後二日而崩在位十九年年四十五合葬憲陵虞美人者以良家子年十三選入掖庭又生女舞陽長公主自漢興母氏莫不尊寵順帝既未加美人爵號而沖帝早夭大將軍梁冀秉政忌惡他族故虞氏抑而不登但稱大家而已陳夫人者家本魏郡少以聲伎入孝王宮得幸生質帝亦以梁氏故榮寵不及焉熹平四年小黃門趙祐議郎卑整上言春秋之義母以子貴隆漢盛典尊崇母氏凡在外戚莫不加寵今沖帝母虞大家質帝母陳夫人皆誕生聖皇而未有稱號夫臣子雖賤尚有追贈之典況二母見在不蒙崇顯之次無以述遵先世垂示後世也帝感其言乃拜虞大家為憲陵貴人陳夫人為渤海孝王妃使中常侍持節授印綬遣太常以三牲告憲陵懷陵靜陵焉孝崇匽皇后諱明為蠡吾侯翼媵妾生桓帝桓帝即位明年追尊翼為孝崇皇陵曰博陵以后為博園貴人和平元年梁太后崩乃就博陵尊后為孝崇皇后遣司徒持節奉策授璽綬齎乘輿器服備法物宮曰永樂置太僕少府以下皆如長樂宮故事又置虎賁羽林衛士起宮室分巨鹿九縣為后湯沐邑在位三年元嘉二年崩以帝弟平原王石為喪主斂以東園畫梓壽器玉匣飯含之具禮儀制度比恭懷皇后使司徒持節大長秋奉弔祠賻錢四千萬布四萬匹中謁者僕射典護喪事侍御史護大駕鹵簿詔安平王豹河間王建勃海王悝長社益陽二長公主與諸國侯三百里內者及中二千石二千石令長相皆會葬將作大匠復土繕廟合葬博陵桓帝懿獻梁皇后諱女瑩順烈皇后之女弟也帝初為蠡吾侯梁太后徵欲與后為婚未及嘉禮會質帝崩因以立帝明年有司奏太后曰春秋迎王后于紀在塗則稱后今大將軍冀女弟膺紹聖善結婚之際有命既集宜備禮章時進徵幣請下三公太常案禮儀奏可於是悉依孝惠皇帝納后故事聘黃金二萬斤納采鴈璧乘馬束帛一如舊典建和元年六月始入掖庭八月立為皇后時太后秉政而梁冀專朝故后獨得寵幸自下莫得進見后藉姊兄廕藝恣極奢靡宮幄雕麗服御珍華巧飾制度兼倍前世及皇太后崩恩愛稍衰后既無子潛懷怨忌每宮人孕育鮮得全者帝雖迫畏梁冀不敢譴怒然見御轉稀至延熹年后以憂恚崩在位十三年葬懿陵其歲誅梁冀廢懿陵為貴人冢焉桓帝鄧皇后諱猛女和熹皇后從兄子鄧香之女也母宣初適香生后改嫁梁紀紀者大將軍梁冀妻孫壽之舅也后少孤隨母為居因冒姓梁氏冀妻見后貌美永興中進入掖庭為采女絶幸明年封兄鄧演為南頓侯位特進演卒子康嗣及懿獻后崩梁冀誅立后為皇后帝惡梁氏改姓為薄封后母宣為長安君四年有司奏后本郎中鄧香之女不宜改易它姓於是復為鄧氏追封贈香車騎將軍安陽侯印綬更封宣康大縣宣為昆陽君康為沘陽侯賞賜巨萬計宣卒賵贈葬禮皆依后母舊儀以康弟統襲封昆陽侯位侍中統從兄會襲安陽侯為虎賁中郎將又封統弟秉為淯陽侯宗族皆列校郎將帝多內幸博採宮女至五六千人及役從使復兼倍於此而后恃尊驕忌與帝所幸郭貴人更相譖訴八年詔廢后送暴室以憂死立七年葬於北邙從父河南尹萬世及會皆下獄死統等亦繫暴室免官爵歸本郡財物沒入縣官桓思竇皇后諱妙章德皇后從祖弟之孫女也父諱武延熹八年鄧皇后廢后以選入掖庭為貴人其冬立為皇后而御見甚稀帝所寵唯采女田聖等永康元年冬帝寢疾遂以聖等九女皆為貴人及崩無嗣后為皇太后太后臨朝定策立解犢亭侯宏是為靈帝太后素忌忍積怒田聖等桓帝梓宮尚在前殿遂殺田聖又欲盡誅諸貴人中常侍管霸蘇康苦諫乃止時太后父大將軍武謀誅宦官而中常侍曹節矯詔殺武遷太后於南宮雲臺家屬徙比景竇氏雖誅帝猶以太后有援立之功建寧四年十月朔率羣臣朝于南宮親饋上壽黃門令董萌因此數為太后訴怨帝深納之供養資奉有加於前中常侍曹節王甫疾萌附助太后誣以謗訕永樂宮萌坐下獄死熹平元年太后母卒於比景太后感疾而崩立七式合葬宣陵孝仁董皇后諱某河間人為解犢亭侯萇夫人生靈帝建寧元年帝即位追尊萇為孝仁皇陵曰慎陵以后為慎園貴人及竇氏誅明年帝使中常侍迎貴人并徵貴人兄寵到京師上尊號曰孝仁皇后居南宮嘉德殿宮稱永樂拜寵執金吾後坐矯稱永樂后屬請下獄死及竇太后崩始與朝政使帝賣官求貨自納金錢盈滿堂室中平五年以后兄子衛尉修侯重為票騎將軍領兵千餘人初后自養皇子協數勸帝立為太子而何皇后恨之議未及定而帝崩何太后臨朝重與太后兄大將軍進權藝相害后每欲參干政事太后輒相禁塞后忿恚詈言曰汝今輈張怙汝兄耶當勑票騎斷何進頭來何太后聞以告進進與三公及弟車騎將軍苗等奏孝仁皇后使故中常侍夏惲永樂太僕封諝等交通州郡辜較在所珍寶貨賂悉入西省蕃后故事不得留京師輿服有章膳羞有品請永樂后遷宮本國奏可何進遂舉兵圍驃騎府收重重免官自殺后憂怖疾病暴崩在位二十二年民間歸咎何氏喪還河間合葬慎陵靈帝宋皇后諱某扶風平陵人也肅宗宋貴人之從曾孫也建寧三年選入掖庭為貴人明年立為皇后父酆執金封不其鄉侯后無寵而居正位後宮幸姬衆共譖毀初中常侍王甫枉誅勃海王悝及妃宋氏妃即后之姑也甫恐后怨之及與太中大夫程阿共構言皇后挾左道祝詛帝信之光和元年遂策收璽綬后自致暴室以憂死在位八年父及兄弟並被誅諸常侍小黃門在省闥者皆憐宋氏無辜共合錢物收葬廢后及酆父子歸宋氏舊塋臯門亭帝後夢見桓帝怒曰宋皇后有何罪過而聽用邪孽使絶其命勃海王悝既已自貶又受誅斃今宋氏及悝自訴於天上帝震怒罪在難救夢殊明察帝既覺而恐以事問於羽林左監許永曰此何祥其可攘乎永對曰宋皇后親與陛下共承宗廟母臨萬國歷年已久海內蒙化過惡無聞而虛聽讒妬之説以致無辜之罪身嬰極誅禍及家族天下臣妾咸為怨痛勃海王悝桓帝母弟也處國奉藩未嘗有過陛下曾不證審遂伏其辜昔晉侯失刑亦夢大厲被髮屬地天道明察鬼神難誣宜并改葬以安冤魂反宋后之徙家復勃海之先封以消厥咎帝弗能用尋亦崩焉靈思何皇后諱某南陽宛人家本屠者以選入掖庭長七尺一寸生皇子辨養於史道人家號曰史侯拜后為貴人甚有寵幸性強忌後宮莫不震懾光和三年立為皇后明年追號后父真為車騎將軍舞陽宣德侯因封后母興為舞陽君時王美人任娠畏后乃服藥欲除之而胎安不動又數夢負日而行四年生皇子協后遂鴆殺美人帝大怒欲廢后諸宦官固請得止董太后自養協號曰董侯王美人趙國人也祖父苞五官中郎將美人豐姿色聰敏有才明能書會計以良家子應法相選入掖庭帝愍協早失母又思美人作追德賦令儀頌中平六年帝崩皇子辨即位尊后為皇太后太后臨朝后兄大將軍進欲誅宦官反為所害舞陽君亦為亂兵所殺并州牧董卓被徵將兵入洛陽陵虐朝庭遂廢少帝為弘農王而立協是為獻帝扶弘農王下殿北面稱臣太后鯁涕羣臣含悲莫敢言董卓又議太后踧迫永樂宮至令憂死逆婦姑之禮乃遷於永安宮因進鴆弒而崩在位十年董卓令帝出奉常亭舉哀公卿皆白衣會不成喪也合葬文昭陵初太后新立當謁二祖廟欲齋輒有變故如此者數竟不克時有識之士心獨怪之後遂因何氏傾沒漢祚焉明年山東義兵大起討董卓之亂卓乃置弘農王於閣上使郎中令李儒進鴆曰服此藥可以辟惡王曰我無疾是欲殺我耳不肯飲強飲之不得已乃與妻唐姬及宮人飲宴別酒行王悲歌曰天道易兮我何薄棄萬乘兮退守蕃逆臣見迫兮命不延逝將去汝兮適幽玄因令唐姬起舞姬抗袖而歌曰皇天崩兮后土穨身為帝兮命夭摧死生路異兮從此乖奈我煢獨兮心中哀因泣下嗚咽坐者皆歔欷王謂姬曰卿王者妃藝不復為吏民妻自愛從此長辭遂飲藥而死時年十八唐姬潁川人也王薨歸鄉里父會稽太守瑁欲嫁之姬誓不許及李傕破長安遣兵鈔關東略得姬傕因欲妻之固不聽而終不自名尚書賈詡知之以狀白獻帝帝聞感愴乃下詔迎姬置園中使侍中持節拜為弘農王妃初平元年二月葬弘農王於故中常侍趙忠成壙中諡曰懷王帝求母王美人兄斌斌將妻子詣長安賜第宅田業拜奉車都尉興平元年帝加元服有司奏立長秋宮詔曰朕稟受不弘遭值禍亂未能紹先以光故典皇母前薨未卜宅兆禮章有闕中心如結三歲之戚蓋不言吉且須其後於是有司乃奏追尊王美人為靈懷皇后改葬文昭陵儀比敬恭二陵使光祿大夫持節行司空事奉璽綬斌與河南尹駱業復土斌還遷執金吾封都亭侯食邑五百戶病卒贈前將軍印綬謁者監護喪事長子端襲爵獻帝伏皇后諱壽琅邪東武人大司徒湛之八世孫也父完沈深有大度襲爵不其侯尚桓帝女陽安公主為侍中初平元年從大駕西遷長安后時入掖庭為貴人興平二式立為皇后完遷執金吾帝尋而東歸李傕郭汜等追敗乘輿於曹陽帝乃潛夜度河走六宮皆步行出營后手持縑數匹董承使符節令孫徽以刃脅奪之殺傍侍者血濺后衣既至安邑御服穿敝唯以棗栗為糧建安元年拜完輔國將軍儀比三司完以政在曹操自嫌尊戚乃上印綬拜中散大夫尋遷屯騎校尉十四年卒子典嗣自帝都許守位而已宿衛兵莫非曹氏黨舊姻戚議郎趙彥嘗為帝陳言時策曹操惡而殺之其餘內外多見誅戮操後以事入見殿中帝不任其憤因曰君若能相輔則厚不爾幸垂恩相捨操失色俯仰求出舊儀三公領兵朝見令虎賁執刃挾之操出顧左右汗流浹背自後不敢復朝請董承女為貴人操誅承而求貴人殺之帝以貴人有纍為請不能得后自是懷懼乃與父完書言曹操殘逼之狀令密圖之完不敢發至十九年事乃露泄操追大怒遂逼帝廢后假為策曰皇后壽得由卑賤登顯尊極自處椒房二紀于茲既無任姒徽音之美又乏謹身養己之福而陰懷妒害苞藏禍心弗可以承天命奉祖宗今使御史大夫郗慮持節策詔其上皇后璽綬退避中宮遷于它館嗚呼傷哉自壽取之未致于理為幸多焉又以尚書令華歆為郗慮副勒兵入宮收后閉戶藏壁中歆就牽后出時帝在外殿引慮於坐后被髮徒跣行泣過訣曰不能復相活邪帝曰我亦不知命在何時顧謂慮曰郗公天下寧有是邪遂將后下暴室以幽崩所生二皇子皆鴆殺之后在位二十年兄弟及宗族死者百餘人母盈等十九人徙涿郡獻穆曹皇后諱節魏公曹操之中女也建安十八年操進三女憲節華為夫人聘以束帛玄纁五萬匹小者待年於國十九年並拜為貴人及伏皇后被弒明年立節為皇后魏受禪遣使求璽綬后怒不與如此數輩后乃呼使者入親數讓之以璽抵軒下因涕泣橫流曰天不祚爾左右皆莫能仰視后在位七年魏氏既立以后為山陽公夫人自後四十一年魏景初元元年薨合葬禪陵車服禮儀皆依漢制論曰漢世皇后無諡皆因帝諡以為稱雖呂氏專政上官臨制亦無殊號中興明帝始建光烈之稱其後並以德為配至於賢愚優劣混同一貫故馬竇二后俱稱德焉其餘唯帝之庶母及蕃王承統以追尊之重特為其號如恭懷孝崇之比是也初平中蔡雍始追正和熹之諡其安思順烈以下皆依而加焉贊曰坤惟厚載陰正乎內詩美好逑易稱歸妹祁祁皇孋言觀貞淑媚茲良哲承我天祿班政蘭閨宣禮椒屋既云德升亦曰幸進身當隆極族漸河潤視景爭暉方山並峻乘剛多阻行地必順咎集驕滿福協貞信慶延自己禍成誰釁漢制皇女皆封縣公主儀服同列侯其尊崇者加號長公主儀服同蕃王諸王女皆封鄉亭公主儀服同鄉亭侯肅宗唯特封東平憲王蒼琅邪孝王京女為縣公主其後安帝桓帝妹亦封長公主同之皇女其皇女封公主者所生之子襲母封為列侯皆傳國於後鄉亭之封則不傳襲其職僚品秩事在百官志不足別載故附于后紀末皇女義王建武十五年封舞陽長公主適延陵鄉侯太僕梁松松坐誹謗誅皇女中禮十五年封涅陽公主適顯親侯大鴻臚竇固肅宗尊為長公主皇女紅夫十五年封館陶公主適駙馬都尉韓光光坐與淮陽王延謀反誅皇女禮劉十七年封淯陽公主適陽安侯長樂少府郭璜璜坐與竇憲謀反誅皇女綬二十一年封酈邑公主適新陽侯世子陰豐豐害主誅死皇女姬永平二年封獲嘉長公主適楊邑侯將作大匠馮柱皇女奴三年封平陽公主適大鴻臚馮順皇女迎三年封隆慮公主適牟平侯耿襲皇女次三年封平氏公主皇女致三年封沁水公主適高密侯鄧乾皇女小姬十二年封平臯公主適昌安侯侍中鄧蕃皇女仲十七年封浚儀公主適軮侯黃門侍郎王度皇女惠十七年封武安公主適征羌侯世子黃門侍郎來稜安帝尊為長公主皇女臣建初元年封魯陽公主皇女小迎元年封樂平公主皇女小民元年封成安公主皇女男建初四年封武德長公主皇女王四年封平邑公主適黃門侍郎馮由皇女吉永元五年封陰安公主皇女保延平元年封修武長公主皇女成元年封共邑公主皇女利元年封臨潁公主適即墨侯侍中賈建皇女興元年封聞喜公主皇女生永和三年封舞陽長公主皇女成男三年封冠軍長公主皇女廣永和六年封汝陽長公主皇女華延熹元年封陽安長公主適不其侯輔國將軍伏完皇女堅七年封潁陰長公主皇女修九年封陽翟長公主桓帝三女皇女某光和三年封萬年公主靈帝一女
