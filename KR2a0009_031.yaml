body:
  text: 後漢書卷二十八下馮衍傳第十八下建武末上疏自陳曰臣伏念高祖之略而陳平之謀毀之則疏譽之則親以文帝之明而魏尚之忠繩之以法則為罪施之以德則為功逮至晚世董仲舒言道德見妒於公孫弘李廣奮節於胸奴見排於衛青此忠臣之常所為流涕也臣衍自惟微賤之臣上無無知之薦下無馮唐之説乏董生之才寡李廣之藝而欲免讒口濟怨嫌豈不難哉敢回行求時之利事君無傾邪之謀將帥無虜掠之心衛尉陰興敬慎周密內自修勑外遠嫌疑故敢與交通興知臣之貧數欲本業之臣自惟無三益之才不敢處三損之地固讓而不受之昔在更始太原執貨財之柄居蒼卒之間據位食祿二十餘年而財産歲狹居處日貧家無布帛之積出無輿馬之飾於今遭清明之時飭躬力行之秋而怨讎叢興譏議橫世蓋富貴易為善貧賤難為工也疏遠壠畝之臣無望高闕之下惶恐自陳以救罪尤衍不得志退而作賦又自論曰馮子以為夫人之德不碌碌如玉落落如石風興雲蒸一龍一蛇與道翺翔與時變化夫豈守一節哉用之則行舍之則臧進退無主屈申無常故曰有法無法因時為業有度無度與物趣舍常務道德之實而不求當世之名闊略杪小之禮蕩佚人間之事正身直行恬然肆志顧嘗好俶儻之策時莫能聽用其謀喟然長歎自傷不遭久棲於小官不得舒其所懷抑心折節意悽情悲夫伐冰之家不利雞豚之息委積之臣不操市井之利況歷位食祿二十餘年而財産益狹居處益貧惟夫君子之仕行其道也慮時務者不能興其德為身求者不能成其功去而歸家復羇旅於州郡身愈據職家彌窮困卒離飢寒之災有喪元子之禍之中地藝高敞四通廣大南望酈山北屬涇渭東瞰河華龍門之陽三晉之路西顧酆鄗周秦之丘宮觀之墟通視千里覽見舊都遂定焉退而幽居蓋忠臣過故墟而歔欷孝子入舊室而哀歎每念祖考著盛德於前垂鴻烈於後遭時之禍墳墓蕪穢春秋蒸嘗昭穆無列年衰歲暮悼無成功將西田牧肥饒之野殖生産修孝道營宗廟廣祭祀然後闔門講習道德觀覽乎孔老之論庶幾乎松喬之福上隴阪陟高岡遊精宇宙流目八紘歷觀九州山川之體追覽上古得失之風愍道陵傷德分崩夫覩其終必原其始故存其人而詠其道疆理九野經營五山眇然有思陵雲之意乃作賦自厲命其篇曰顯志顯志者言光明風化之情昭章玄妙之思也其辭曰京陵飛廉而太息兮登平陽而懷傷悲時俗之險兮哀好惡之無常棄衡石而意量兮隨風波而飛揚紛綸流於權利兮親靁同而妒異獨耿介而慕古兮豈時人之所喜沮先聖之成論兮名賢之高風忽道德之珍麗兮務富貴之樂耽遵大路而回兮履孔德之窈冥固衆夫之所眩兮孰能觀於無形行徑直以離尤兮羌前人之所有內自省而不慙兮遂定志而弗改欣吾黨之唐虞兮愍吾生之愁勤聊發憤而揚情兮將以蕩夫憂心往者不可攀援兮來者不可與期病沒世之不稱兮願橫逝而無由而臨嶭兮聽涇渭之波聲顧鴻門而歔欷兮哀吾孤之早零何天命之不純兮信吾罪之所生傷誠善之無辜兮齎此恨而入冥嗟我思之不遠兮豈敗事之可悔雖九死而不眠兮恐余殃之有再淚汍瀾而雨集兮氣滂浡而雲披心怫鬱而紆結兮意沈抑而內悲而日邁兮壽冉冉其不與恥功業之無成兮赴原野而窮處昔伊尹之干湯兮七十説而乃信臯陶釣於靁澤兮賴虞舜而後親無二士之遭遇兮抱忠貞而莫達率妻子而耕耘兮委厥美而不伐韓盧抑而不縱兮騏驥絆而不試獨慷慨而遠覽兮非庸庸之所識卑衛賜之阜貨兮高顏回之所慕重祖考之洪烈兮故收功於此路循四時之代謝兮分五土之刑德相林麓之所産兮嘗水泉之所殖修神農之本業兮採軒轅之奇策追周棄之遺教兮軼范蠡之絶迹陟隴山以踰望兮眇然覽於八荒風波飄其並興兮情惆悵而增傷覽河華之泱漭兮望秦晉之故國憤馮亭之不遂兮慍去疾之遭惑之舊居兮歷宋楚之名都哀羣后之不祀兮痛列國之為墟馳中夏而升降兮路紆軫而多艱講聖哲之通論兮心愊憶而紛紜惟天路之同軌兮或帝王之異政堯舜煥其蕩蕩兮禹承平而革命并日夜而幽思兮終悇憛而洞疑高陽其超遠兮世孰可與論茲訊夏啓於甘澤兮傷帝典之始傾頌成康之載德兮詠南風之歌聲思唐虞之晏晏兮揖稷契與為朋苗裔紛其條暢兮至湯武而勃興昔三后之純粹兮每季世而窮禍弔夏桀於南巢兮哭殷紂於牧野詔伊尹於亳郊兮享呂望於酆洲功與日月齊光兮名與三王爭流識微兮愍王道之將崩拔周唐之盛德兮捃桓文之譎功忿戰國之遘禍兮憎權臣之強黜楚子於南郢兮執趙武於湨梁善忠信之救時兮惡詐謀之妄作聘申叔於陳蔡兮禽荀息於虞誅犂鉏之介聖兮討臧倉之訴知子反於彭城兮爵管仲於夷儀疾兵革之滋兮苦攻伐之萌生沈孫武於五湖兮斬白起於長平惡叢巧之亂世兮毒從橫之敗俗流蘇秦於洹水兮幽張儀於鬼谷澄德化之陵兮烈刑罰之峭峻燔商鞅之法術兮燒韓非之説論誚始皇之跋扈兮投李斯於四裔滅先王之法則兮禍淫而弘大援前聖以制中兮矯二主之驕奢饁女齊於絳臺兮饗椒舉於章華摛道德之光耀兮匡衰世之眇風褒宋襄於泓谷兮表季札於延陵托仁智之英華兮激亂國之末流觀鄭僑於溱洧兮訪晏嬰於營丘日曀曀其將暮兮獨於邑而煩惑夫何九州之博大兮迷不知路之南北駟素虯而馳騁兮乘翠雲而相佯就伯夷而折中兮得務光而愈明發子高於中野兮遇伯成而定慮欽真人之德美兮淹躊躇而弗去意斟愖而不淡兮俟回風而容與求善卷之所存兮遇許由於負黍軔吾車於箕陽兮秣吾馬於潁滸聞至言而曉領兮還吾反乎故宇於滄海兮豢白虎於金山鑿巖石而為室兮託高陽以養仙神雀翔於鴻崖兮玄武潛於嬰冥伏朱樓而四望兮採三秀之華英纂前修之夸節兮曜往昔之光勳披綺季之麗服兮揚屈原之靈芬高吾冠之岌岌兮長吾佩之洋洋飲六醴之清液兮食五芝之茂英雜蘼蕪兮搆木蘭與新夷光扈扈而煬耀兮紛郁郁而暢美華芳曄其發越兮時恍忽而莫貴非惜身之坎軻兮憐衆美之憔悴遊精神於大宅兮抗玄妙之常操處清靜以養志兮實吾心之所樂山峨峨而造天兮林冥冥而暢茂鸞回翔索其羣兮鹿哀鳴而求其友誦古今以散思兮覽聖賢以自鎮嘉孔丘之知命兮大老之貴玄德與道其孰寶兮名與身其孰親陂山谷而間處兮守寂寞而存神夫莊周之釣魚兮辭卿相之顯位於陵子之灌園兮似至人之髣佛蓋隱約而得道兮羌窮悟而入術離塵垢之窈冥兮配喬松之妙節惟吾志之所庶兮固與俗其不同既俶儻而高引兮願觀其從容顯宗即位又多短衍以文過其實遂廢於家衍娶北地女任氏女為妻悍忌不得畜媵妾兒女常自操井臼老竟逐之遂坎壈於時然有大志不戚戚於賤貧居常慷慨歎曰衍少事名賢經歷顯位懷金垂紫揭節奉使不求苟得常有陵雲之志三公之貴千金之富不得其願不概於懷貧而不衰賤而不恨年雖疲曳猶庶幾名賢之風修道德於幽冥之路以終身名為後世法居貧年老卒于家所著賦誄銘説問交德誥慎情書記説自序官録説策五十篇肅宗甚重其文子豹豹字仲文年十二母為父所出後母惡之嘗因豹夜寐欲行毒害豹逃走得免敬事愈謹而母疾之益深時人稱其孝長好儒學以詩春秋教麗山下鄉里為之語曰道德彬彬馮仲文舉孝廉拜尚書郎忠勤不懈每奏事未報常俯伏省閣或從昏至明肅宗聞而嘉之使黃門持被覆豹勑令勿驚由是數加賞賜是時方平西域以豹有才謀拜為河西副校尉和帝初數言邊事奏置戊己校尉城郭諸國復率舊職遷武威太守視事二年河西稱之復徵入為尚書永元十四年卒於官論曰夫貴者負藝而驕人才士負能而遺行其大略然也二子不其然乎馮衍之引挑妻之譬得矣夫納妻皆知取詈己者而取士則不能何也豈非反妒情易而恕義情難光武雖得之於鮑永猶失之於馮衍夫然義直所以見屈於既往守節故亦彌阻於來情嗚呼贊曰談非讖術衍晚委質道不相謀詭時同失體兼上才榮微下秩
