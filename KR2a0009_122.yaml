body:
  text: 後漢書志第二十二郡國四濟南平原樂安北海東萊齊國右青州南陽南郡江夏零陵桂陽武陵長沙右荊州九江丹陽廬江會稽吳郡豫章右揚州濟南國故齊文帝分雒陽東千八百里十城戶七萬八千五百四十四口四十五萬三千三百八東平陵有鐵有談城有天山著於陵臺菅有賴亭土鼓梁鄒鄒平東朝陽歷城有鐵有巨里聚八平原高唐濕水出般鬲侯國夏時有鬲君滅浞立少康祝阿春秋時曰祝柯有野井亭樂陵濕陰安德侯國厭次本富平明帝更名中聚有時水蓼城侯國利故屬齊益侯國故屬北海壽光故屬北海有灌亭四十一口八十五萬三千六百四劇有紀亭古紀國營陵平壽有斟城有寒亭古寒國浞封此都昌安丘有渠丘亭淳于永元九年復有密鄉平昌侯國故屬琅邪有蔞鄉朱虛侯國故屬琅邪永初元年屬東安平故屬葘川六國時曰安平有酅亭高密侯國昌安侯國安帝復夷安侯國安帝復膠東侯國即墨侯國有棠鄉壯武安帝復下密安帝復拒挺觀陽千三百九十三黃牟平惤侯國曲成侯國掖侯國有過鄉當利侯國東牟侯國昌陽盧鄉長廣故屬琅邪黔陬侯國故屬琅邪有介亭葛盧有尤涉亭不期其侯國故屬琅邪臨葘本齊刺史治西安有棘里亭有蘧丘里古渠丘昌國臨朐有三亭古郱邑廣般陽故屬濟南千六百一十八宛本申伯國有南就聚有瓜里津有夕陽聚有東武亭冠軍邑葉有長山曰方城有卷城新野有東鄉故新都有黃郵聚章陵故舂陵世祖更名有上唐鄉西鄂雉魯陽有魯山有牛蘭纍亭犨堵陽博望舞陰邑比陽復陽侯國有杏聚平氏桐柏大復山淮水出有宜秋聚棘陽有藍鄉有黃淳聚湖陽邑隨西有斷蛇丘育陽邑有小長安有東陽聚涅陽陰酇鄧有鄾聚山都侯國酈侯國穰朝陽蔡陽侯國安衆侯國筑陽侯國有涉都鄉武當有和成聚順陽侯國故博山有須聚成都襄鄉南鄉丹水故屬弘農有章密鄉有三戶亭析故屬弘農故楚白羽邑有武關在縣西有豐鄉城江陵有津鄉巫西有白帝城秭歸本歸國中盧侯國編有藍口聚當陽華容侯國雲夢澤在南襄陽有阿頭山邔侯國有犁丘城宜城侯國鄀侯國永平元年復臨沮侯國有荊山枝江侯國本羅國有丹陽聚夷道夷陵有荊門虎牙山州陵很山故屬武陵十四西陵西陽軑侯國鄳竟陵侯國有鄖鄉立有章山本內方雲杜沙羡邾下雉蘄春侯國鄂平春侯國南新市侯國安陸七十八泉陵零陵陽朔山湘水出營道南有九疑山營浦泠道洮陽都梁有路山夫夷侯國故屬長沙始安侯國重安侯國故鍾武永建三年更名湘鄉昭陽侯國蒸陽侯國故屬長沙四百三郴有客嶺山便耒陽有鐵陰山南平臨武桂陽含洭湞陽有苲領山曲江漢寧永和元年置十二口二十五萬九百一十三臨沅漢壽故索陽嘉三年更名刺史治孱陵零陽充沅陵先有壺頭山辰陽酉陽遷陵鐔成沅南建武二十六年置作唐七十二臨湘攸荼陵安城酃湘南侯國衡山在東南連道昭陵益陽下雋羅醴陵容陵十六陰陵壽春浚遒成德西曲陽合肥侯國歷陽侯國刺史治當塗有馬丘聚徐鳳反於此全椒鍾離侯國阜陵下蔡故屬沛平阿故屬沛有塗山義成故屬沛萬六千五百一十八口六十三萬五百四十五宛陵溧陽丹陽故鄣於潛涇歙黝陵陽蕪湖中江在西秣陵南有牛渚湖熟侯國句容江乘春穀石城一千三百九十二口四十二萬四千六百八十三舒有桐鄉雩婁侯國尋陽南有九江東合為大江潛臨湖侯國龍舒侯國襄安晥有鐵居巢侯國六安國蓼侯國安豐有大別山陽泉侯國安風侯國四十八萬一千一百九十六山陰會稽山在南上有禹冢有浙江鄮烏傷諸暨餘暨太末上虞剡餘姚句章鄞章安故治冶閩越地光武更名永寧永和三年以章安縣東甌鄉為縣東部侯國八十二吳本國震澤在西後名具區澤海鹽烏程餘杭毗陵季札所居北江在北丹徒曲阿由拳安富春陽羡邑無錫侯國婁千九百六南昌建城新淦宜春廬陵贛有豫章水雩都南野有臺領山南城鄱陽有鄱水黃金采歷陵有傅昜山餘汗鄡陽彭澤彭蠡澤在西柴桑艾海昏侯國平都侯國故安平石陽臨汝永元八年置建昌永元十六年分海昏置
