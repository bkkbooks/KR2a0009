body:
  text: 後漢書卷七十三劉虞公孫瓚陶謙列傳第六十三劉虞字伯安東海郯人也祖父嘉光祿勳虞初舉孝廉稍遷幽州刺史民夷感其德化自鮮卑烏桓夫餘穢貊之輩皆隨時朝貢無敢擾邊者百姓歌悅之公事去官中平初黃巾作亂攻破冀州諸郡拜虞甘陵相綏撫荒餘以蔬儉率下遷宗正後車騎將軍張溫討賊邊章等發幽州烏桓三千突騎而牢稟逋懸皆畔還本國前中山相張純私謂前太山太守張舉曰今烏桓既畔皆願為亂涼州賊起朝廷不能禁又洛陽人妻生子兩頭此漢祚衰盡天下有兩主之徵也子若與吾率烏桓之衆以起兵庶幾可定大業舉因然之四年純等遂與烏桓大人共連盟攻薊下燔燒城郭虜略百姓殺護烏桓校尉箕稠右北平太守劉政遼東太守陽終等衆至十餘萬屯肥如舉稱天子純稱彌天將軍安定王移書州郡云舉當代漢告天子避位勑公卿奉迎純又使烏桓峭王等步騎五萬入青冀二州攻破清河平原殺害吏民朝廷以虞威信素著恩積北方明年復拜幽州牧虞到薊罷省屯兵務廣恩信遣使告峭王等以朝恩寬弘開許善路又設賞購舉純舉純走出塞餘皆降散純為其客王政所殺送首詣虞靈帝遣使者就拜太尉封容丘侯及董卓秉政遣使者授虞大司馬進封襄賁侯初平元年復徵代袁隗為太傅道路隔塞王命竟不得達舊幽部應接荒外資費甚廣歲常割青冀賦調二億有餘以給足之時處處斷絶委輸不至而虞務存寬政勸督農植開上谷胡巿之利通漁陽鹽鐵之饒民悅年登穀石三十青徐士庶避黃巾之難歸虞者百餘萬口皆收視溫恤為安立生業流民皆忘其遷徙虞雖為上公天性節約敝衣繩履食無兼肉遠近豪俊夙僭奢者莫不改操而歸心焉初詔令公孫瓚討烏桓受虞節度瓚但務會徒衆以自強大而縱任部曲頗侵擾百姓而虞為政仁愛念利民物由是與瓚漸不相平二年冀州刺史韓馥勃海太守袁紹及山東諸將議以朝廷幼沖逼於董卓遠隔關塞不知存否以虞宗室長者欲立為主乃遣故樂浪太守張岐等齎議上虞尊號虞見岐等厲色叱之曰今天下崩亂主上蒙塵吾被重恩未能清雪國恥諸君各據州郡宜共勠力盡心王室而反造逆謀以相垢誤邪固拒之馥等又請虞領尚書事承制封拜復不聽遂收斬使人於是選掾右北平田疇從事鮮于銀蒙險間行奉使長安獻帝既思東歸見疇等大悅時虞子和為侍中因此遣和潛從武關出告虞將兵來迎道由南陽後將軍袁術聞其狀遂質和使報虞遣兵俱西虞乃使數千騎就和奉迎天子而術竟不遣之初公孫瓚知術詐固止虞遣兵虞不從瓚乃陰勸術執和使奪其兵自是與瓚仇怨益深和尋得逃術還北復為袁紹所留瓚既纍為紹所敗而猶攻之不已虞患其黷武且慮得志不可復制固不許行而稍節其稟假瓚怒屢違節度又復侵犯百姓虞所賚賞典當胡夷瓚數抄奪之積不能禁乃遣驛使奉章陳其暴掠之罪瓚亦上虞稟糧不周二奏交馳互相非毀朝廷依違而已瓚乃築京於薊城以備虞虞數請瓚輒稱病不應虞乃密謀討之以告東曹掾右北平魏攸攸曰今天下引領以公為歸謀臣爪牙不可無也瓚文武才力足恃雖有小惡固宜容忍虞乃止頃之攸卒而積忿不已四年冬遂自率諸屯兵衆合十萬人以攻瓚將行從事代郡程緒免胄而前曰公孫瓚雖有過惡而罪名未正明公不先告曉使得改行而兵起蕭牆非國之利加勝敗難保不如駐兵以武臨之瓚必悔禍謝罪所謂不戰而服人者也虞以緒臨事沮議遂斬之以徇戒軍士曰無傷餘人殺一伯圭而已時州從事公孫紀者瓚以同姓厚待遇之紀知虞謀而夜告瓚瓚時部曲放散在外倉卒自懼不免乃掘東城欲走虞兵不習戰又愛人廬舍勑不聽焚燒急攻圍不下瓚乃簡募鋭士數百人因風縱火直衝突之虞遂大敗與官屬北奔居庸縣瓚追攻之三日城陷遂執虞并妻子還薊猶使領州文書會天子遣使者段訓增虞封邑督六州事拜瓚前將軍封易侯假節督幽并司青冀瓚乃誣虞前與袁紹等欲稱尊號脅訓斬虞於薊市先坐而呪曰若虞應為天子者天當風雨以相救時旱藝炎盛遂斬焉傳首京師故吏尾敦於路劫虞首歸葬之瓚乃上訓為幽州刺史虞以恩厚得衆懷被北州百姓流舊莫不痛惜焉初虞以儉素為操冠敝不改乃就補其穿及遇害瓚兵搜其內而妻妾服羅紈盛綺飾時人以此疑之和後從袁紹報瓚云公孫瓚字伯圭遼西令支人也家世二千石瓚以母賤遂為郡小吏為人美姿貌大音聲言事辨慧太守奇其才以女妻之後從涿郡盧植學於緱氏山中略見書傳舉上計吏太守劉君坐事檻車徵官法不聽吏下親近瓚乃改容服詐稱侍卒身執徒養御車到洛陽太守當徙日南瓚具豚酒於北芒上祭辭先人酹觴祝曰昔為人子今為人臣當詣日南日南多瘴氣恐或不還便當長辭墳塋慷慨悲泣再拜而去觀者莫不歎息既行於道得赦瓚還郡舉孝廉除遼東屬國長史嘗從數十騎出行塞下卒逢鮮卑數百騎瓚乃退入空亭約其從者曰今不奔之則死盡矣乃自持兩刃矛馳出衝賊殺傷數十人瓚左右亦亡其半遂得免中平中以瓚督烏桓突騎車騎將軍張溫討涼州賊會烏桓反畔與賊張純等攻擊薊中瓚率所領追討純等有功遷騎都尉張純復與畔胡丘力居等寇漁陽河間勃海入平原多所殺略瓚追擊戰於屬國石門虜遂大敗𠫓廾妻子踰塞走悉得其所略男女瓚深入無繼反為丘力居等所圍於遼西管子城二百餘日糧盡食馬馬盡弩楯力戰不敵乃與士卒辭訣各分散還時多雨雪隊坑死者十五六虜亦飢困遠走柳城詔拜瓚降虜校尉封都亭侯復兼領屬國長史職統戎馬連接邊寇每聞有警瓚輒厲色憤怒如赴讎敵望塵奔逐或繼之以夜戰虜識瓚聲憚其勇莫敢抗犯瓚常與善射之士數十人皆乘白馬以為左右翼自號白馬義從烏桓更相告語避白馬長史乃畫作瓚形馳騎射之中者咸稱萬歲虜自此之後遂遠竄塞外瓚志掃滅烏桓而劉虞欲以恩信招降由是與虞相忤初平二年青徐黃巾三十萬衆入勃海界欲與黑山合瓚率步騎二萬人逆擊於東光南大破之斬首三萬餘級賊𠫓廾其車重數萬兩奔走度河瓚因其半濟薄之賊復大破死者數萬流血丹水收得生口七萬餘人車甲財物不可勝算威名大震拜奮武將軍封薊侯瓚既諫劉虞遣兵就袁術而懼術知怨之乃使從弟越將千餘騎詣術自結術遣越隨其將孫堅擊袁紹將周昕越為流矢所中死瓚因此怒紹遂出軍屯槃河將以報紹乃上疏曰臣聞皇羲已來君臣道著張禮以導人設刑以禁暴今車騎將軍袁紹託承先軌爵任崇厚而性本淫亂情行浮薄昔為司隸值國多難太后承攝何氏輔朝紹不能舉直措枉而專為邪媚招來不軌疑誤社稷至令丁原焚燒孟津董卓造為亂始紹罪一也卓既無禮帝主見質紹不能開設權謀以濟君父而𠫓廾置節傳迸竄逃亡忝辱爵命背違人主紹罪二也紹為勃海當攻董卓而默選戎馬不告父兄至使太傅一門纍然同斃不仁不孝紹罪三也紹既興兵涉歷二載不恤國難廣自封植乃多引資糧專為不急割刻無方考責百姓其為痛怨莫不咨嗟紹罪四也逼迫韓馥竊奪其州矯刻金玉以為印璽每有所下輒皂囊施檢文稱詔書昔亡新僭侈漸以即真觀紹所擬將必階亂紹罪五也紹令星工伺望祥妖賂遺財貨與共飲食剋會期日攻鈔郡縣此豈大臣所當施為紹罪六也紹與故虎牙都尉劉勳首共造兵勳降服張楊纍有功效而以小忿枉加酷害信用讒慝濟其無道紹罪七也故上谷太守高焉故甘陵相姚貢紹以貪婪橫責其錢錢不備畢二人并命紹罪八也春秋之義子以母貴紹母親為傅婢地實微賤據職高重享福豐隆有苟進之志無虛退之心紹罪九也又長沙太守孫堅前領豫州刺史遂能驅走董卓掃除陵廟忠勤王室其功莫大紹遣小將盜居其位斷絶堅糧不得深入使董卓久不服誅紹罪十也昔姬周政弱王道陵天子遷徙諸侯背畔故齊桓立柯會亭之盟晉文為踐土之會伐荊楚以致菁茅誅曹衛以章無禮臣雖闒茸名非先賢蒙被朝恩負荷重任職在鈇鉞奉辭伐罪輒與諸將州郡共討紹等若大事克捷罪人斯得庶續桓文忠誠之效遂舉兵攻紹於是冀州諸城悉畔從瓚紹懼乃以所佩勃海太守印綬授瓚從弟範遣之郡欲以相結而範遂背紹領勃海兵以助瓚瓚乃自署其將帥為青冀兗三州刺史又悉置郡縣守令與紹大戰於界橋瓚軍敗還薊紹遣將崔巨業將兵數萬攻圍故安不下退軍南還瓚將步騎三萬人追擊於巨馬水大破其衆死者七八千人乘勝而南攻下郡縣遂至平原乃遣其青州刺史田揩據有齊地紹復遣兵數萬與揩連戰二年糧食並盡士卒疲困互掠百姓野無青草紹乃遣子談為青州刺史揩與戰敗退還是歲瓚破禽劉虞盡有幽州之地猛志益盛前此有童謠曰燕南垂趙北際中央不合大如礪唯有此中可避世瓚自以為易地當之遂徙鎮焉乃盛修營壘樓觀數十臨易河通遼海劉虞從事漁陽鮮于輔等合率州兵欲共報瓚輔以燕國閻柔素有恩信推為烏桓司馬柔招誘胡漢數萬人與瓚所置漁陽太守鄒丹戰于潞北斬丹等四千餘級烏桓峭王感虞恩德率種人及鮮卑七千餘騎共輔南迎虞子和與袁紹將麴義合兵十萬共攻瓚興平二年破瓚於鮑丘斬首二萬餘級瓚遂保易京開置屯田稍得自支相持歲餘麴義軍糧盡士卒飢困餘衆數千人退走瓚徼破之盡得其車重是時旱蝗穀貴民相食瓚恃其才力不恤百姓記過忘善睚眥必報州里善士名在其右者必以法害之常言衣冠皆自以職分富貴不謝人惠故所寵愛類多商販庸兒所在侵暴百姓怨之於是代郡廣陽上谷右北平各殺瓚所置長吏復與輔和兵合瓚慮有非常乃居於高京以鐵為門斥去左右男人七歲以上不得入易門專侍姬妾其文簿書記皆汲而上之令婦人習為大言聲使聞數百步以傳宣教令疏遠賓客無所親信故謀臣猛將稍有乖散自此之後希復攻戰或問其故瓚曰我昔驅畔胡於塞表掃黃巾於孟津當此之時謂天下指麾可定至於今日兵革方始觀此非我所決不如休兵力耕以救凶年兵法百樓不攻今吾諸營樓千里積穀三百萬斛食此足以待天下之變建安三年袁紹復大攻瓚瓚遣子續請救於黑山諸帥而欲自將突騎直出傍西山以斷紹後長史關靖諫曰今將軍將士莫不懷瓦解之心所以猶能相守者顧戀其老小而恃將軍為主故耳堅守曠日或可使紹自退若舍之而出後無鎮重易京之危可立待也瓚乃止紹漸相攻逼瓚衆日蹙乃却築三重營以自固四年春黑山賊帥張燕與續率兵十萬三道來救瓚未及至瓚乃密使行人齎書告續曰昔周末喪亂僵尸蔽地以意而推猶為否也不圖今日親當其鋒袁氏之攻狀若鬼神梯衝舞吾樓上鼓角鳴於地中日窮月急不遑啓處鳥厄歸人滀水陵高汝當碎首於張燕馳驟以告急父子天性不言而動且厲五千鐵騎於北隰之中起火為應吾當自內出奮揚威武決命於斯不然吾亡之後天下雖廣不容汝足矣紹候得其書如期舉火瓚以為救至遂便出戰紹設伏瓚遂大敗復還保中小城自計必無全乃悉縊其姊妹妻子然後引火自焚紹兵趣登臺斬之關靖見瓚敗歎恨曰前若不止將軍自行未必不濟吾聞君子陷人於危必同其難豈可以獨生乎乃策馬赴紹軍而死續為屠各所殺田揩與袁紹戰死鮮于輔將其衆歸曹操操以輔為度遼將軍封都亭侯閻柔將部曲曹操擊烏桓拜護烏桓校尉封關內侯張燕既為紹所敗人衆稍散曹操將定冀州乃率衆詣鄴降拜平北將軍封安國亭侯論曰自帝室王公之胄皆生長脂腴不知稼穡其能厲行飭身卓然不羣者或未聞焉劉虞守道慕名以忠厚自牧美哉乎季漢之名宗子也若虞瓚無間同情共力糾人完聚保燕薊之饒繕兵昭武以臨羣雄之隙舍諸天運徵乎人文則古之休烈何遠之有陶謙字恭祖丹陽人也少為諸生仕州郡四遷為車騎將軍張溫司馬西討邊章會徐州黃巾起以謙為徐州刺史擊黃巾大破走之境內晏然時董卓雖誅而李傕郭汜作亂關中是時四方斷絶謙每遣使間行奉貢西京詔遷為徐州牧加安東將軍封溧陽侯是時徐方百姓殷盛穀實甚豐流民多歸之而謙信用非所刑政不理別駕從事趙昱知名士也而以忠直見疏出為廣陵太守曹宏等讒慝小人謙甚親任之良善多被其害由斯漸亂下邳閻闕宣自稱天子謙始與合從後遂殺之而并其衆初曹操父嵩避難琅邪時謙別將守陰平士卒利嵩財寶遂襲殺之初平四年曹操擊謙破彭城傅陽謙退保郯操攻之不能克乃還過拔取慮雎陵夏丘皆屠之凡殺男女數十萬人雞犬無餘泗水為之不流自是五縣城保無復行迹初三輔遭李傕亂百姓流移依謙者皆殲興平元年曹操復擊謙略定琅邪東海諸縣謙懼不免欲走歸丹陽會張邈迎呂布據兗州操還擊布是歲謙病死初同郡人笮融聚衆數百往依於謙謙使督廣陵下邳彭城運糧遂斷三郡委輪大起浮屠寺上纍金盤下為重樓又堂閣周回可容三千許人作黃金塗像衣以錦綵每浴佛輒多設飲飯布席於路其有就食及觀者且萬餘人及曹操擊謙徐方不安融乃將男女萬口馬三千匹走廣陵廣陵太守趙昱待以賓禮融利廣陵資貨遂乘酒酣殺昱放兵大掠因以過江南奔豫章殺郡守朱皓入據其城後為楊州刺史劉繇所破走入山中為人所殺昱字元達琅邪人清己疾惡潛志好學雖親友希得見之為人耳不邪聽目不妄視太僕种拂舉為方正贊曰襄賁勵德維城燕北仁能洽下忠以衛國伯圭疏獷武才趫猛虞好無終紹藝難並徐方殲耗實謙為梗
