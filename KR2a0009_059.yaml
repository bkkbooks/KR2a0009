body:
  text: 後漢書卷五十四楊震列傳第四十四子秉孫賜曾孫彪玄孫修楊震字伯起弘農華陰人也八世祖喜高祖時有功封赤泉侯高祖敞昭帝時為丞相封安平侯父寶習歐陽尚書哀平之世隱居教授居攝二年與兩龔蔣詡俱徵遂遁逃不知所處光武高其節建武中公車特徵老病不到卒於家震少好學受歐陽尚書於太常桓郁明經博覽無不窮究諸儒為之語曰關西孔子楊伯起常客居於湖不答州郡禮命數十年衆人謂之晚暮而震志愈篤後有冠雀銜三鱣魚飛集講堂前都講取魚進曰蛇鱣者卿大夫服之象也數三者法三台也先生自此升矣年五十乃始仕州郡大將軍鄧騭聞其賢而辟之舉茂才四遷荊州刺史東萊太守當之郡道經昌邑故所舉荊州茂才王密為昌邑令謁見至夜懷金十斤以遺震震曰故人知君君不知故人何也密曰暮夜無知者震曰天知神知我知子知何謂無知密愧而出後轉涿郡太守性公廉不受私謁子孫常蔬食步行故舊長者或欲令為開産業震不肯曰使後世稱為清白吏子孫以此遺之不亦厚乎元初四年徵入為太僕遷太常先是博士選舉多不以實震舉薦明經名士陳留楊倫等顯傳學業諸儒稱之永寧元年代劉愷為司徒明年鄧太后崩內寵始橫安帝乳母王聖因保養之勤緣恩放恣聖子女伯榮出入宮掖傳通姦賂震上疏曰臣聞政以得賢為本理以去穢為務是以唐虞俊乂在官四凶流放天上咸服以致雍熙方今九德未事嬖幸充庭阿母王聖出自賤微得遭千載奉養聖躬雖有推燥居溼之勤前後賞惠過報勞苦而無厭之心不知紀極外交屬託擾亂天下損辱清朝塵點日月書誡牝雞牡鳴詩刺哲婦喪國昔鄭嚴公從母氏之欲恣驕弟之情幾至危國然後加討春秋貶之以為失教夫女子小人近之喜遠之怨實為難養易曰無攸遂在中饋言婦人不得與於政事也宜速出阿母令居外舍斷絶伯榮莫使往來令恩德兩隆上下俱美惟陛下絶婉孌之私割不忍之心留神萬機誡慎拜爵減省獻御損節徵發令野無鶴鳴之歎朝無小明之悔大東不興於今勞止不怨於下擬蹤往古比德哲王豈不休哉奏御帝以示阿母等內幸皆懷忿恚而伯榮驕淫尤甚與故朝陽侯劉護從兄瓌交通瓌遂以為妻得襲護爵位至侍中震深疾之復詣闕上疏曰臣聞高祖與羣臣約非功臣不得封故經制父死子繼兄亡弟及以防篡也伏見詔書封故朝陽侯劉護再從兄瓌襲護爵為侯護同産弟威今猶見在臣聞天子專封封有功諸侯專爵爵有德今瓌無他功行但以配阿母女一時之閒既位侍中又至封侯不稽舊制不合經義行人喧譁百姓不安陛下宜覽鏡既往順帝之則書奏不省延光二年代劉愷為太尉帝舅大鴻臚耿寶薦中常侍李閏兄於震震不從寶乃自往候震曰李常侍國家所重欲令公辟其兄寶唯傳上意耳震曰如朝廷欲令三府辟召故宜有尚書勑遂拒不許寶大恨而去皇后兄執金吾閻顯亦薦所親厚於震震又不從司空劉授聞之即辟此二人旬日中皆見拔擢由是震益見怨時詔遣使者大為阿母修第中常侍樊豐及侍中周廣謝惲等更相扇動傾搖朝廷震復上疏曰臣聞古者九年耕必有三年之儲故堯遭洪水人無菜色臣伏念方今灾害發起彌彌滋甚百姓空虛不能自贍重以螟蝗羌虜鈔掠三邊震擾戰鬬之役至今未息兵甲軍糧不能復給大司農帑藏匱乏殆非社稷安寧之時伏見詔書為阿母興起津城門內第舍合兩為一連里竟街雕修繕飾窮極巧伎今盛夏土王而攻山採石其大匠左校別部將作合數十處轉相迫促為費巨億周廣謝惲兄弟與國無肺腑枝葉之屬依倚近幸姦佞之人與樊豐王永等分威共權屬託州郡傾動大臣宰司辟召承望旨意招來海內貪汙之人受其貨賂至有臧錮棄世之徒復得顯用白黑溷淆清濁同源天下歡譁咸曰財貨上流為朝結譏臣聞師言上之所取財盡則怨力盡則叛怨叛之人不可復使故曰百姓不足君誰與足惟陛下度之豐惲等見震連切諫不從無所顧忌遂詐作詔書調發司農錢穀大匠見徒材木各起家舍園池廬觀役費無數震因地震復上疏曰臣蒙恩備台輔不能奉宣政化調和陰陽去年十月四日京師地動臣聞師言地者陰精當安靜承陽而今動搖者陰道盛也其日戊辰三者皆土位在中宮此中臣近官盛於持權用事之象也臣伏惟陛下以邊境未寧躬自菲薄宮殿垣屋傾倚枝柱而已無所興造欲令遠近咸知政化之清流商邑之翼翼也而親近幸臣未崇斷金驕溢踰法多請徒士盛修第舍賣弄威福道路歡譁衆所聞見地動之變近在城郭殆為此發又冬無宿雪春節未雨百僚燋心而繕修不止誠致旱之徵也書曰僭恆陽若臣無作威作福玉食唯陛下奮乾剛之德棄驕奢之臣以掩訞言之口奉承皇天之戒無令威福久移於下震前後所上轉有切至帝既不平之而樊豐等皆側目憤怨俱以其名儒未敢加害尋有河閒男子趙騰詣闕上書指陳得失帝發怒遂收考詔獄結以罔上不道震復上疏救之曰臣聞堯舜之世諫鼓謗木立之於朝殷周哲王小人怨詈則還自敬德所以達聰明開不諱博採負薪盡極下情也今趙騰所坐激訐謗語為罪與手刃犯法有差乞為虧除全騰之命以誘芻蕘輿人之言帝不省騰竟伏尸都市會三年春東巡岱宗樊豐等因乘輿在外競修第宅震部掾高舒召大匠令史考校之得豐等所詐下詔書具奏須行還上之豐等聞惶怖會太史言星變逆行遂共譖震云自趙騰死後深用怨懟且鄧氏故吏有恚恨之心及車駕行還便時太學夜遣使者策收震太尉印綬於是柴門絶賓客豐等復惡之乃請大將軍耿寶奏震大臣不服罪懷恚望有詔遣歸本郡震行至城西几陽亭乃慷慨謂其諸子門人曰死者士之常分吾蒙恩居上司疾姦臣狡猾而不能誅惡嬖女傾亂而不能禁何面目復見日月身死之日以雜木為棺布單被裁足蓋形勿歸冢次勿設祭祠因飲鴆而卒時年七十餘弘農太守移良承樊豐等旨遣吏於陝縣留停震喪露棺道側謫震諸子代郵行書道路皆為隕涕歲餘順帝即位樊豐周廣等誅死震門生虞放陳翼詣闕追訟震事朝廷咸稱其忠乃下詔除二子為郎贈錢百萬以禮改葬於華陰潼亭遠近畢至先葬十餘日有大鳥高丈餘集震喪前俯仰悲鳴淚下霑地葬畢乃飛去郡以狀上時連有灾異帝感震之枉乃下詔策曰故太尉震正直是與俾匡時政而青蠅點素同茲在藩上天降威灾眚屢作爾卜爾筮惟震之故朕之不德用彰厥咎山崩棟折我其危哉今使太守丞以中牢具祠魂而有靈儻其歆享於是時人立石鳥象於其墓所震之被譖也高舒亦得罪以減死論及震事顯舒拜侍御史至荊州刺史震五子長子牧富波相牧孫奇靈帝時為侍中帝嘗從容問奇曰朕何如桓帝對曰陛下之於桓帝亦猶虞舜比德唐堯帝不悅曰卿強項真楊震子孫死後必復致大鳥矣出為汝南太守帝崩後復入為侍中衛尉從獻帝西遷有功勤及李傕脅帝歸其營奇與黃門侍郎鍾繇誘傕部曲將宋曄楊昂令反傕傕由此孤弱帝乃得東後徙都許追封奇子亮為陽成亭侯震少子奉奉子敷篤志博聞議者以為能世其家敷早卒子衆亦傳先業以謁者僕射從獻帝入關纍遷御史中丞及帝東還夜走度河衆率諸官屬步從至太陽拜侍中建安二年追前功封蓩亭侯震中子秉秉字叔節少傳父業兼明京氏易博通書傳常隱居教授年四十餘乃應司空辟拜待御史頻出為豫荊徐兗四州刺史遷任城相自為刺史二千石計日受奉餘祿不入私門故吏齎錢百萬遺之閉門不受以廉潔稱桓帝即位以明尚書徵入勸講拜太中大夫左中郎將遷侍中尚書帝時微行私過幸河南尹梁胤府舍是日大風拔樹晝昏秉因上疏諫曰臣聞瑞由德至灾應事生傳曰禍福無門唯人所召天不言語以灾異譴告是以孔子迅雷風烈必有變動詩云敬天之威不敢驅馳王者至尊出入有常警蹕而行靜室而止自非郊廟之事則鑾旗不駕故詩稱自郊徂宮易曰王假有廟致孝享也諸侯如臣之家春秋尚列其誡況以先王法服而私出槃游降亂尊卑等威無序侍衛守空宮紱璽委女妾設有非常之變任章之謀上負先帝下悔靡及臣奕世受恩得備納言又以薄學充在講勤特蒙哀識見照日月恩重命輕義使士死敢憚摧折略陳其愚帝不納秉以病乞退出為右扶風太尉黃瓊惜其去朝廷上秉勸講帷幄不宜外遷留拜光祿大夫是時大將軍梁冀用權秉稱病六年冀誅後乃拜太僕遷太常延熹三年白馬令李雲以諫受罪秉爭之不能得坐免官歸田里其年冬復徵拜河南尹先是中常侍單超弟匡為濟陰太守以臧罪為刺史第五種所劾窘急乃賂客任方刺兗州從事衛羽事已見種傳及捕得方囚繫洛陽匡慮秉當窮竟其事密令方等得突獄亡走尚書召秉詰責秉對曰春秋不誅黎比而魯多盜方等無狀釁由單匡刺執法之吏害奉公之臣復令逃竄寬縱罪身元惡大憝終為國害乞檻車徵匡考核其事則姦慝蹤緒必可立得而秉竟坐輸作左校以久旱赦出會日食太山太守皇甫規等訟秉忠正不宜久抑不用有詔公車徵秉及處士韋著二人各稱疾不至有司並劾秉著大不敬請下所屬正其罪尚書令周景與尚書邊韶議奏秉儒學侍講常在謙虛著隱居行義以退讓為節俱徵不至誠違側席之望然逶迤退食足抑苟進之風夫明王之世必有不召之臣聖朝弘養宜用優游之禮可告在所屬喻以朝庭恩意如遂不至詳議其罰於是重徵乃到拜太常五年冬代劉矩為太尉是時宦官方熾任人及子弟為官布滿天下競為貪淫朝野嗟怨秉與司空周景上言內外吏職多非其人自頃所徵皆特拜不試致盜竊縱恣怨訟紛錯舊典中臣子弟不得居位秉藝而今枝葉賓客布列職署或年少庸人典據守宰上下忿患四方愁毒可遵用舊章退貪殘塞灾謗請下司隸校尉中二千石二千石城門五營校尉北軍中候各實核所部應當斥罷自以狀言三府廉察有遺漏續上帝從之於是秉條奏牧守以下胸奴中郎將燕瑗青州刺史羊亮遼東太守孫喧等五十餘人或死或免天下莫不肅然時郡國計吏多留拜為郎秉上言三署見郎七百餘人帑臧空虛浮食者衆而不良守相欲因國為池澆濯釁穢宜絶橫拜以塞覬覦之端自此終桓帝世計吏無復留拜者七年南巡園陵特詔秉從南陽太守張彪與帝微時有舊恩以車駕當至因傍發調多以入私秉聞之下書責讓荊州刺史以狀副言公府及行至南陽左右並通姦利詔書多所除拜秉復上疏諫曰臣聞先王建國順天制官太微積星名為郎位入奉宿衛出牧百姓臯陶誡虞在於官人頃者道路拜除恩加豎隸爵以貨成化由此敗所以俗夫巷議白駒遠逝穆穆清朝遠近莫觀宜割不忍之恩以斷求欲之路於是詔除乃止時中常侍侯覽弟參為益州刺史纍有臧罪暴虐一州明年秉劾奏參檻車徵詣廷尉參惶恐道自殺秉因奏覽及中常侍具瑗曰臣案國舊典宦豎之官本在給使省闥司昏守夜而今猥受過寵執政操權其阿諛取容者則因公褒舉以報私惠有忤逆於心者必求事中傷肆其凶忿居法王公富擬國家飲食極肴膳僕妾盈紈素雖季氏專魯穰侯擅秦何以尚茲案中常侍侯覽弟參貪殘元惡自取禍滅覽顧知釁重必有自疑之意臣愚以為不宜復見親近昔懿公刑邴歜之父奪閻職之妻而使二人參乘卒有竹中之難春秋書之以為至戒蓋鄭詹來而國亂四佞放而衆服以此觀之容可近乎覽宜急屏斥投畀有豺虎若斯之人非恩所宥請免官送歸本郡書奏尚書召對秉掾屬曰公府外職而奏劾近官經典漢制有故事乎秉使對曰春秋趙鞅以晉陽之甲逐君側之惡傳曰除君之惡唯力是視鄧通懈慢申屠嘉召通詰責文帝從而請之漢世故事三公之職無所不統尚書不能詰帝不得已竟免覽官而削瑗國每朝廷有得失輒盡忠規諫多見納用秉性不飲酒又早喪夫人遂不復娶所在以淳白稱嘗從容言曰我有三不惑酒色財也八年薨時年七十四賜塋陪陵子賜賜字伯獻少傳家學篤志博聞常退居隱約教授門徒不答州郡禮命後辟大將軍梁冀府非其好也出除陳倉令因病不行公車徵不至連辭三公之命後以司空高第再遷侍中越騎校尉建寧初靈帝當受學詔太傅三公選通尚書桓君章句宿有重名者三公舉賜乃侍講于華光殿中遷少府光祿勳熹平元年青見御坐帝以問賜賜上封事曰臣聞和氣致祥乖氣致灾休徵則五福應咎徵則六極至夫善不妄來灾不空發王者心有所惟意有所想雖未形顏色而五星以之推移陰陽為其變度以此而觀天之與人豈不符哉尚書曰天齊乎人假我一日是其明徵也夫皇極不建則有蛇龍之孽詩云惟虺惟蛇女子之祥故春秋兩蛇鬬於鄭門昭公殆以女敗康王一朝晏起關睢見幾而作夫女謁行則讒夫昌讒夫昌則苞苴通故殷湯以之自戒終濟亢旱之灾惟陛下思乾剛之道別內外之宜崇帝乙之制受元吉之祉抑皇甫之權割豔妻之愛則蛇變可消禎祥立應殷戊宋景其事甚明二年代唐珍為司空以灾異免復拜光祿大夫秩中二千石五年代袁隗為司徒是時朝廷爵授多不以次而帝好微行遊幸外苑賜復上疏曰臣聞天生蒸民不能自理故立君長使司牧之是以唐虞兢兢業業周文日不暇明慎庶官俊乂在職三載考績以觀厥成而今所序用無他德有形藝者旬日纍遷守真之徒歷載不轉勞逸無別善惡同流北山之詩所為訓作又聞數微行出幸苑囿觀鷹犬之藝極槃遊之荒政事日墮大化陵陛下不顧二祖之勤止追慕五宗之美蹤而欲以望太平是由曲表而欲直景卻行而求及前人也宜絶慢之戲念官人之重割用板之恩慎貫魚之次無令醜女有四殆之歎遐邇有憤怨之聲臣受恩偏特忝任師傅不敢自同凡臣括囊避咎謹自手書密上後坐辟黨人免復拜光祿大夫光和元年有虹霓晝降於嘉德殿前帝惡之引賜及議郎蔡雍等入金商門崇德署使中常待曹節王甫問以祥異禍福所在賜仰天而歎謂節等曰吾每讀張禹傳未嘗不憤恚歎息既不能竭忠盡情極言其要而反留意少子乞還女壻朱游欲得尚方斬馬劒以理之固其宜也吾以微薄之學充先師之末纍世見寵無以報國猥當大問死而後已乃書對曰臣聞之經傳或得神以昌或得神以亡國家休明則鑒其德邪辟昏亂則視其禍今殿前之氣應為虹霓皆妖邪所生不正之象詩人所謂蝃蝀者也於中孚經曰霓之比無德以色親方今內多嬖幸外任小臣上下並怨喧譁盈路是以灾異屢見前後丁寧今復投霓可謂孰矣案春秋讖曰天投霓天下怨海內亂加四百之期亦復垂及昔虹貫牛山管仲諫桓公無近妃宮易曰天垂象見吉凶聖人則之今妾媵嬖人閹尹之徒共專國朝欺罔日月又鴻都門下招會羣小造作賦說以蟲篆小技見寵於時如歡兜共工更相薦說旬月之閒並各拔擢樂松處常伯任芝居納言郤儉梁鵠俱以便辟之性佞辨之心各受豐爵不次之寵而令搢紳之徒委伏畝口誦堯舜之言身蹈絶俗之行棄捐溝壑不見逮及冠履倒易陵谷代處從小人之邪意順無知之私欲不念板蕩之作虺蜴之誡殆哉之危莫過於今幸賴皇天垂象譴告周書曰天子見怪則修德諸侯見怪則修政卿大夫見怪則修職士庶人見怪則修身惟陛下慎經典之誡圖變復之道斥遠佞巧之臣速徵鶴鳴之士內親張仲外任山甫斷絶尺一抑止槃游留思庶政無敢怠遑冀上天還威衆變可弭老臣過受師傅之任數蒙寵異之恩豈敢愛惜垂沒之年而不盡其慺慺之心哉書奏甚忤曹節等蔡雍坐直對抵罪徙朔方賜以師傅之恩故得免咎其冬行辟雍禮引賜為三老復拜少府光祿勳代劉郃為司徒帝欲造畢圭靈琨苑賜復上疏諫曰竊聞使者並出規度城南人田欲以為苑昔先王造囿裁足以修三驅之禮薪萊芻牧皆悉往焉先帝之制左開鴻池右作上林不奢不約以合禮中今猥規郊城之地以為苑囿壞沃衍廢田園驅居人畜禽獸殆非所謂若保赤子之義今城外之苑已有五六可以逞情意順四節也宜惟夏禹卑宮太宗露臺之意以尉下民之勞書奏帝欲止以問侍中任芝中常侍樂松松等曰昔文王之囿百里人以為小齊宣五里人以為大今與百姓共之無害於政也帝悅遂令築苑四年賜以病罷居無何拜太常詔賜御府衣一襲自所服冠幘綬玉壺革帶金錯鉤佩五年冬復拜太尉中平元年黃巾賊起賜被召會議詣省閣切諫忤旨因以寇賊免先是黃巾帥張角等執左道稱大賢以誑耀百姓天下繈負歸之賜時在司徒召掾劉陶告曰張角等遭赦不悔而稍益滋蔓今若下州郡捕討恐更騷擾速成其患且欲切勑刺史二千石簡別流人各護歸本郡以孤弱其黨然後誅其渠帥可不勞而定何如陶對曰此孫子所謂不戰而屈人之兵廟勝之術也賜遂上書言之會去位事留中後帝徙南宮閲録故事得賜所上張角奏及前侍講注籍乃感悟下詔封賜臨晉侯邑千五百戶初賜與太尉劉寬司空張濟並入侍講自以不宜獨受封賞上書願分戶邑於寬濟帝嘉歎復封寬及濟子拜賜尚書令數日出為廷尉賜自以代非法家言曰三后成功惟殷于民臯陶不與焉蓋吝之也遂固辭以特進就第二年九月復代張溫為司空其月薨天子素服三日不臨朝贈東園梓器襚服賜錢三百萬布五百匹策曰故司空臨晉侯賜華嶽所挺九德純備三葉宰相輔國以忠朕昔初載授道帷幄遂階成勳以陟大猷師範之功昭于內外庶官之務勞亦勤止七在卿校殊位特進五登袞職弭難乂寧雖受茅土未答厥勳哲人其萎將誰咨度朕甚懼焉禮設殊等物有服章今使左中郎將郭儀持節追位特進贈司空驃騎將軍印綬及葬又使侍御史持節送喪蘭臺令史十人發羽林騎輕車介士前後部鼓吹又勑驃騎將軍官屬司空法駕送至舊塋公卿已下會葬諡文烈侯及小祥又會焉子彪嗣彪字文先少傳家學初舉孝廉州舉茂才辟公府皆不應熹平中以博習舊聞公車徵拜議郎遷侍中京兆尹光和中黃門令王甫使門生於郡界辜榷官財物七千餘萬彪發其姦言之司隸司隸校尉陽球因此奏誅甫天下莫不愜心徵還為侍中五官中郎將遷潁川南陽太守復拜侍中三遷永樂少府太僕衛尉中平六年代董卓為司空其冬代黃琬為司徒明年關東兵起董卓懼欲遷都以違其難乃大會公卿議曰高祖都關中十有一世光武宮洛陽於今亦十世矣案石包讖宜徙都長安以應天人之意百官無敢言者彪曰移都改制天下大事故盤庚五遷殷民胥怨昔關中遭王莽變亂宮室焚蕩民庶塗炭百不一在光武受命更都洛邑今天下無虞百姓樂安明公建立聖主光隆漢祚無故捐宗廟棄園陵恐百姓驚動必有糜沸之亂石包室讖妖邪之書豈可信用卓曰關中肥饒故秦得并吞六國且隴右材木自出致之甚易又杜陵南山下有武帝故瓦陶竈數千所并功營之可使一朝而辨百姓何足與議若有前却我以大兵驅之可令詣滄海彪曰天下動之至易安之甚難惟明公慮焉卓作色曰公欲沮國計邪太尉黃琬曰此國之大事楊公之言得無可思卓不答司空荀爽見卓意壯恐害彪等因從容言曰相國豈樂此邪山東兵起非一日可禁故當遷以圖之此秦漢之藝也卓意小解爽私謂彪曰諸君堅爭不止禍必有歸故吾不為也議罷卓使司隸校尉宣播以灾異奏免彪等詣闕謝即拜光祿大夫十餘日遷大鴻臚從入關轉少府太常以病免復為京兆尹光祿勳再遷光祿大夫三年秋代淳于嘉為司空以地震免復拜太常興平元年代朱俊為太尉録尚書事及李傕郭汜之亂彪盡節衛主崎嶇危難之閒幾不免於害語在董卓傳及車駕還洛陽復守尚書令建安元年從東都許時天子新遷大會公卿兗州刺史曹操上殿見彪色不悅恐於此圖之未得宴設託疾如廁因出還營彪以疾罷時袁術僭亂操託彪與術婚姻誣以欲圖廢置奏收下獄劾以大逆將作大匠孔融聞之不及朝服往見操曰楊公四世清德海內所瞻周書父子兄弟罪不相及況以袁氏歸罪楊公易稱積善餘慶徒欺人耳操曰此國家之意融曰假使成王殺邵公周公可得言不知邪今天下纓緌搢紳所以瞻仰明公者以公聰明仁智輔相漢朝舉直厝枉致之雍熙也今橫殺無辜則海內觀聽誰不解體孔融魯國男子明日便當拂衣而去不復朝矣操不得已遂理出彪四年復拜太常十年免十一年諸以恩澤為侯者皆奪封彪見漢祚將終遂稱腳攣不復行積十年後子修為曹操所殺操見彪問曰公何瘦之甚對曰愧無日磾先見之明猶懷老牛舐犢之愛操為之改容修字德祖好學有俊才為丞相曹操主簿用事曹氏及操自平漢中欲因討劉備而不得進欲守之又難為功護軍不知進止何依操於是出教唯曰雞肋而已外曹莫能曉修獨曰夫雞肋食之則無所得𠫓廾之則如可惜公歸計決矣乃令外白稍嚴操於此回師修之幾決多有此類修又嘗出行籌操有問外事乃逆為答記勑守舍兒若有令出依次通之既而果然如是者三操怪其速使廉之知狀於此忌修且以袁術之甥慮為後患遂因事殺之修所著賦頌碑讚詩哀辭表記書凡十五篇及魏文帝受禪欲以彪為太尉先遣使示旨彪辭曰彪備漢三公遭世傾亂不能有所補益耄年被病豈可贊惟新之朝遂固辭乃授光祿大夫賜几杖衣袍因朝會引見令彪著布單衣鹿皮冠杖而入待以賓客之禮年八十四黃初六年卒于家自震至彪四世太尉德業相繼與袁氏俱為東京名族云論曰孔子稱危而不持顛而不扶則將焉用彼相矣誠以負荷之寄不可以虛冒崇高之位憂重責深也延光之閒震為上相抗直方以臨權枉先公道而後身名可謂懷王臣之節識所任之體矣遂纍葉載德繼踵宰相信哉積善之家必有餘慶先世韋平方之蔑矣贊曰楊氏載德仍世柱國震畏四知秉去三惑賜亦無諱彪誠匪忒修雖才子渝我淳則
