body:
  text: 後漢書卷四孝和孝殤帝紀第四孝和皇帝諱肅宗第四子也母梁貴人為竇皇后所譖憂卒竇后養帝以為己子建初七年立為皇太子章和二年二月壬辰即皇帝位年十歲尊皇后曰皇太后太后臨朝三月丁酉改淮陽為陳國楚郡為彭城國西平汝南郡六安復為廬江郡遺詔徙西平王羡為陳王六安王恭為彭城王癸卯葬孝章皇帝于敬陵庚戌皇太后詔曰先帝以明聖奉承祖宗至德要道天下清靜庶事咸寧今皇帝以幼年在疚朕且佐助聽政外有大國賢王並為蕃屏內有公卿大夫統理本朝恭己受成夫何憂哉然守文之際必有內輔以參聽斷侍中憲朕之元兄行能兼備忠孝尤篤先帝所器親受遺詔當以舊典輔斯職焉憲固執謙讓節不可奪今供養兩宮宿衛左右厥事已重亦不可復勞以政事故太尉鄧彪元功之族三讓彌高海內歸仁為羣賢首先帝褒表欲以崇化今彪聰明康彊可謂老成黃耇矣其以彪為太傅賜爵關內侯録尚書事百官總己以聽朕庶幾得專心內位於戲羣公其勉率百僚各修厥職愛養元元綏以中和稱朕意焉辛酉有司上奏孝章皇帝崇弘鴻業德化普洽垂意黎民留念稼穡文加殊俗武暢方表界惟人面無思不服巍巍蕩蕩莫與比隆周頌曰於穆清廟肅雍顯相請上尊廟曰肅宗共進武德之舞制曰可癸亥陳王羡彭城王恭樂成王黨下邳王衍梁王暢始就國夏四月丙子謁高廟丁丑謁世祖廟戊寅詔曰昔孝武皇帝致誅胡越故權收鹽鐵之利以奉師旅之費自中興以來胸奴未賓永平末年復修征伐先帝即位務休力役然猶深思遠慮安不忘危探觀舊典復收鹽鐵欲以防備不虞寧安邊境而吏多不良動失其便以違上意先帝恨之故遺戒郡國罷鹽鐵之禁縱民煮鑄入稅縣官如故事其申勑刺史二千石奉順聖旨勉弘德化布告天下使明知朕意五月京師旱詔長樂少府桓郁侍講禁中冬十月乙亥以侍中竇憲為車騎將軍伐北胸奴安息國遣使獻師子扶拔永元元年春三月甲辰初令郎官詔除者得占丞尉以比秩為真夏六月車騎將軍竇憲出雞鹿塞度遼將軍鄧鴻出棝稒陽塞南單于出滿夷谷與北胸奴戰於稽落山大破之追至和私渠北比鞮海竇憲遂登燕然山刻石勒功而還北單于遣弟右溫禺鞮王奉奏貢獻秋七月乙未會稽山崩閏月丙子詔曰胸奴背叛為害久遠賴祖宗之靈師克有捷醜虜破碎遂掃厥庭役不再籍萬里清蕩非朕小子眇身所能克堪有司其案舊典告類薦功以章休烈九月庚申以車騎將軍竇憲為大將軍以中郎將劉尚為車騎將軍冬十月令郡國薥刑輸作軍營其徙出塞者刑雖未竟皆免歸田里庚子阜陵王延薨是歲郡國九大水二年春正月丁丑大赦天下二月壬午日有食之己亥復置西河上郡屬國都尉官夏五月庚戌分太山為濟北國分樂成涿郡勃海為河閒國丙辰封皇弟壽為濟北王開為河閒王淑為城陽王紹封故淮陽王昞子側為常山王賜公卿以下至佐史錢布各有差己未遣副校尉閻磐討北胸奴取伊吾盧地丁卯紹封故齊王晃子無忌為齊王北海王睦子威為北海王車師前後王並遣子入侍月氏國遣兵攻西域長史班超超擊降之六月辛卯中山王焉薨秋七月乙卯大將軍竇憲出屯涼州九月北胸奴遣使稱臣冬十月遣行中郎將班固報命南單于遣左谷蠡王師子出雞鹿塞擊北胸奴於河雲北大破之三年春正月甲子皇帝加元服賜諸侯王公將軍特進中二千石列侯宗室子孫在京師奉朝請者黃金將大夫郎吏從官帛賜民爵及粟帛各有差大酺五日郡國中都官繫囚死罪贖縑至司寇及亡命各有差庚辰賜京師民酺布兩戶共一匹二月大將軍竇憲遣左校尉耿夔出居延塞圍北單于於金微山大破之獲其母閼氏夏六月辛卯尊皇太后母比陽公主為長公主辛丑阜陵王种薨冬十月癸未行幸長安詔曰北狄破滅名王仍降西域諸國納質內附豈非祖宗迪哲重光之鴻烈歟寤寐歎息想望舊京其賜行所過二千石長吏已下及三老官屬錢帛各有差魚衆寡孤獨篤貧不能自存者粟人三斛十一月癸卯祠高廟遂有事十一陵詔曰高祖功臣蕭曹為首有傳世不絶之義曹相國後容城侯無嗣朕望長陵東門見二臣之壠循其遠節每有感焉忠義獲寵古今所同可遣使者以中牢祠大鴻臚求近親宜為嗣者須景風紹封以章厥功十二月復置西域都護騎都尉戊己校尉官庚辰至自長安減薥刑徒從駕者刑五月四年春正月北胸奴右谷蠡王於除鞬自立為單于款塞乞降遣大將軍左校尉耿夔授璽綬三月癸丑司徒袁安薨閏月丁丑太常丁鴻為司徒夏四月丙辰大將軍竇憲還至京師六月戊戌朔日有食之丙辰郡國十三地震竇憲潛圖弒逆庚申幸北宮詔收捕憲黨射聲校尉郭璜璜子侍中舉衛尉鄧弟步兵校尉磊皆下獄死使謁者僕射收憲大將軍印綬遣憲及弟篤景就國到皆自殺是夏旱蝗秋七月己丑太尉宋由坐黨憲自殺八月辛亥司空任隗薨癸丑大司農尹睦為太尉録尚書事丁巳賜公卿以下至佐史錢穀各有差冬十月己亥宗正劉方為司空十二月壬辰詔今年郡國秋稼為旱蝗所傷其什四以上勿收田租芻有不滿者以實除之武陵零陵澧中蠻叛燒當羌寇金城五年春正月乙亥宗祀五帝於明堂遂登靈臺望雲物大赦天下戊子千乘王伉薨辛卯封皇弟萬歲為廣宗王二月戊戌詔有司省減內外廄及涼州諸苑馬自京師離宮果園上林廣成囿悉以假貧民恣得采捕不收其稅丁未詔曰去年秋麥入少恐民食不足其上尤貧不能自給者戶口人數往者郡國上貧民以衣履釜為資而豪右得其饒利詔書實核欲有以益之而長吏不能躬親反更徵召會聚令失農作愁擾百姓若復有犯者二千石先坐甲寅太傅鄧彪薨戊午隴西地震三月戊子詔曰選舉良才為政之本科別行能必由鄉曲而郡國舉吏不加簡擇故先帝明勑在所令試之以職乃得充選又德行尤異不須經職者別署狀上而宣布以來出入九年二千石曾不承奉恣心從好司隸刺史訖無糾察今新蒙赦令且復申勑後有犯者顯明其罰在位不以選舉為憂督察不以發覺為負非獨州郡也是以庶官多非其人下民被姦邪之傷由法不行故也庚寅遣使者分行貧民舉實流開倉賑稟三十餘郡夏四月壬子封阜陵王种兄魴為阜陵王六月丁酉郡國三雨雹秋九月辛酉廣宗王萬歲薨無子國除胸奴單于於除鞬叛遣中郎將任尚討滅之壬午令郡縣勸民蓄蔬食以助五穀其官有陂池令得采取勿收假稅二歲冬十月辛未太尉尹睦薨十一月乙丑太僕張酺為太尉是歲武陵郡兵神蠻降之護羌校尉貫友討燒當羌羌乃遁去南單于安國叛骨都侯喜斬之六年春正月永昌徼外夷遣使譯獻犀牛大象己卯司徒丁鴻薨二月乙未遣謁者分行稟貸三河兗冀青州貧民許陽侯馬光自殺丁未司空劉方為司徒太常張奮為司空三月庚寅詔流民所過郡國皆實稟之其有販賣者勿出租稅又欲就賤還歸者復一歲田租更賦丙寅詔曰朕以眇末承奉鴻烈陰陽不和水旱違度濟河之域凶饉流亡而未獲忠言至謀所以匡救之策寤寐永歎用思孔疚惟官人不得於上黎民不安于下有司不念寬和而競為苛刻覆案不急以妨民事甚非所以上當天心下濟元元也思得忠良之士以輔朕之不逮其令三公中二千石二千石內郡守相舉賢良方正能直言極諫之士各一人昭巖穴披幽隱遣詣公車朕將悉聽焉帝乃親臨策問選補郎吏夏四月蜀郡徼外羌率種人遣使內附五月城陽王淑薨無子國除六月己酉初令伏閉盡日秋七月京師旱詔中都官徒各除半刑謫其未竟五月已下皆免遣丁巳幸洛陽寺録囚徒舉冤獄收洛陽令下獄抵罪司隸校尉河南尹皆左降未及還宮而澍雨西域都護班超大破焉耆尉犁斬其王自是西域降服納質者五十餘國南單于安國從弟子逢侯率叛胡亡出塞九月癸丑以光祿勳鄧鴻行車騎將軍事與越騎校尉馮柱行度遼將軍朱徽使胸奴中郎將杜崇討之冬十一月護烏桓校尉任尚率烏桓鮮卑大破逢侯馮柱遣兵追擊復破之詔以勃海郡屬冀州武陵漊中蠻叛郡兵討平之七年春正月行車騎將軍鄧鴻度遼將軍朱徽中郎將杜崇皆下獄死夏四月辛亥朔日有食之帝引見公卿問得失令將大夫御史謁者博士議郎郎官會廷中各言封事詔曰元首不明化流無良政失於民謫見于天深惟庶事五教在寬是以舊典因孝廉之舉以求其人有司詳選郎官寬博有謀才任典城者三十人既而悉以所選郎出補長相五月辛卯改千乘國為樂安國六月丙寅沛王定薨秋七月乙巳易陽地裂九月癸卯京師地震八收二月己丑立貴人陰氏為皇后賜天下男子爵人二級三老孝悌力田三級民無名數及流民欲占者一級魚衆寡孤獨篤貧不能自存者粟人五斛夏四月癸亥樂成王黨薨甲子詔賑貸并州四郡貧民五月河內陳留蝗南胸奴右溫禺犢王叛為寇秋七月行度遼將軍龐奮越騎校尉馮柱追討之斬右溫禺犢王車師後王叛擊其前王八月辛酉飲酎詔郡國中都官繫打謢漱等詣敦煌戍其犯大逆募下蠶室其女子宮自死罪已下至司寇及亡命者入贖各有差九月京師蝗吏民言事者多歸責有司詔曰蝗蟲之異殆不虛生萬方有罪在豫一人而言事者專咎自下非助我者也朕寤寐恫矝思弭憂釁昔楚嚴無灾而懼成王出郊而反風將何以匡朕不逮以塞灾變百僚師尹勉修厥職刺史二千石詳刑辟理冤虐恤魚衆寡矝孤弱思惟致灾興蝗之咎庚子復置廣陽郡冬十月乙丑北海王威有罪自殺十二月辛亥陳王羡薨丁巳南宮宣室殿火九年春正月永昌徼外蠻夷及撣國重譯奉貢三月庚辰隴西地震癸巳濟南王康薨西域長史王林擊車師後王斬之夏四月丁卯封樂成王黨子巡為樂成王六月蝗旱戊辰詔今年秋稼為蝗蟲所傷皆勿收租更芻若有所損失以實除之餘當收租者亦半入其山林饒利陂池漁採以贍元元勿收假稅秋七月蝗蟲飛過京師八月鮮卑寇肥如遼東太守祭參下獄死閏月辛巳皇太后竇氏崩丙申葬章德皇后燒當羌寇隴西殺長吏遣行征西將軍劉尚越騎校尉趙世等討破之九月庚申司徒劉方策免自殺甲子追尊皇妣梁貴人為皇太后冬十月乙酉改葬恭懷梁皇后于西陵十一月癸卯光祿勳河南呂蓋為司徒十二月丙寅司空張奮罷壬申太僕韓稜為司空己丑復置若盧獄官十年春三月壬戌詔曰隄防溝渠所以順助地理通利壅塞今廢慢懈薥不以為負刺史二千石其隨宜疏導勿因緣妄發以為煩擾將顯行其罰夏五月京師大水秋七月己巳司空韓稜薨八月丙子太常太山巢堪為司空九月庚戌復置廩犧官冬十月五州雨水十二月燒當羌豪迷唐等率種人詣闕貢獻戊寅梁王暢薨十一年春二月遣使循行郡國稟貸被灾害不能自存者令得漁采山林池澤不收假稅丙午詔郡國中都官徒及篤老小女徒各除半刑其未竟三月者皆免歸田里夏四月丙寅大赦天下己巳復置右校尉官秋七月辛卯詔曰吏民踰僭厚死傷生是以舊令節之制度頃者貴戚近親百僚師尹莫肯率從有司不舉怠放日甚又商賈小民或忘法禁奇巧靡貨流積公行其在位犯者當先舉正巿道小民但且申明憲綱勿因科令加虐羸弱十二年春二月旄牛徼外白狼貗薄夷率種人內屬詔貸被灾諸郡民種糧賜下貧魚衆寡孤獨不能自存者及郡國流民聽入陂池漁采以助蔬食三月丙申詔曰比年不登百姓虛匱京師去冬無宿雪今春無澍雨黎民流離困於道路朕痛心疾首靡知所濟瞻仰昊天何辜今人三公朕之腹心而未獲承天安民之策數詔有司務擇良吏今猶不改競為苛暴侵愁小民以求虛名委任下吏假藝行邪是以令下而姦生禁至而詐起巧法析律飾文增辭貨行於言罪成乎手朕甚病焉公卿不思助明好惡將何以救其咎罰咎罰既至復令灾及小民若上下同心庶或有瘳其賜天下男子爵人二級三老孝悌力田三級民無名數及流民欲占者人一級魚衆寡孤獨篤貧不能自存者粟人三斛壬子賜博士員弟子在太學者布人三匹夏四月日南象林蠻夷反郡兵討破之閏月脤貸敦煌張掖五原民下貧者穀戊辰賑歸山崩六月舞陽大水賜被水灾尤貧者穀人三斛秋七月辛亥朔日有食之九月戊午太尉張酺免丙寅大司農張禹為太尉冬十一月西域蒙奇兜勒二國遣使內附賜其王金印紫綬是歲燒當羌復叛十三年春正月丁丑帝幸東觀覽書林閲篇籍博選術藝之士以充其官二月任城王忿屆丙午賑貸張掖居延朔方日南貧民及孤寡羸弱不能自存者秋八月詔象林民失農桑業者賑貸種糧稟賜下貧穀食己亥北宮盛饌門閣火護羌校尉周鮪擊燒當羌破之荊州雨水九月壬子詔曰荊州比歲不節今茲淫水為害餘雖頗登而多不均浹深惟四民農食之本慘然懷矜其令天下半入今年田租芻有宜以實除者如故事貧民假種食皆勿收責冬十一月安息國遣使獻師子及條枝大爵丙辰詔曰幽涼州戶口率少邊役衆劇束修良吏進仕路狹撫接夷狄以人為本其令緣邊郡口十萬以上歲舉孝廉一人不滿十萬二歲舉一人五萬以下三歲舉一人鮮卑寇右北平遂入漁陽漁陽太守擊破之戊辰司徒呂蓋罷十二月丁丑光祿勳魯恭為司徒辛卯巫蠻叛寇南郡十四年春二月乙卯東海王政薨繕修故西海郡徙金城西部都尉以戍之三月戊辰臨辟雍饗射大赦天下夏四月遣使者督荊州兵討巫蠻破降之庚辰賑貸張掖居延敦煌五原漢陽會稽流民下貧穀各有差五月丁未初置象林將兵長史官六月辛卯廢皇后陰氏后父特進綱自殺秋七月甲寅詔復象林縣更賦田租芻二歲壬子常山王側薨是秋三州雨水冬十月甲申詔兗豫荊州今年水雨淫過多傷農功其令被害什四以上皆半入田租芻其不滿者以實除之辛卯立貴人鄧氏為皇后丁酉司空巢堪罷十一月癸卯大司農徐防為司空是歲初復郡國上計補郎官十五年春閏月乙未詔流民欲還歸本而無糧食者過所實稟之疾病加致醫藥其不欲還歸者勿強二月詔稟貸潁川汝南陳留江夏梁國敦煌貧民夏四月甲子晦日有食之五月戊寅南陽大風六月詔令百姓魚衆寡漁采陂池勿收假稅二歲秋七月丙寅濟南王錯薨復置涿郡故安鐵官九月壬午南巡狩清河王慶濟北王壽河閒王開並從賜所過二千石長吏以下三老官屬及民百年者錢布各有差是秋四州雨水冬十月戊申幸章陵祠舊宅癸丑祠園廟會宗室於舊廬勞賜作樂戊午進幸雲夢臨漢水而還十一月甲申車駕還宮賜從臣及留者公卿以下錢布各有差十二月庚子琅邪王宇薨有司奏以為夏至則微陰起靡草死可以決小事是歲初令郡國以日北至案薄刑十六年春正月己卯詔貧民有田業而以匱乏不能自農者貸種糧二月己未詔兗豫徐冀四州比年雨多傷稼禁沽酒夏四月遣三府掾分行四州貧民無以耕者為雇犂牛直五月壬午趙王商薨秋七月旱戊午詔曰今秋稼方穗而旱雲雨不霑疑吏行慘刻不宣恩澤妄拘無罪幽閉良善所致其一切囚徒於法疑者勿決以奉秋令方察煩苛之吏顯明其罰辛酉司徒魯恭免庚午光祿勳張酺為司徒辛巳詔令天下皆半入今年田租芻其被灾害者以實除之貧民受貸種糧及田租芻皆勿收責八月己酉司徒張酺薨冬十月辛卯司空徐防為司徒大鴻臚陳寵為司空十一月己丑行幸緱氏登百岯山賜百官從臣布各有差北胸奴遣使稱臣貢獻十二月復置遼東西部都尉官元興元年春正月戊午引三署郎召見禁中選除七十五人補謁者長相高句驪寇郡界夏四月庚午大赦天下改元元興宗室以罪絶者悉復屬籍五月癸酉雍地裂秋九月遼東太守耿夔擊貊人破之冬十二月辛未帝崩于章德前殿年二十七立皇子隆為皇太子賜天下男子爵人二級三老孝悌力田人三級民無名數及流民欲占者人一級魚衆寡孤獨篤貧不能自存者粟人三斛自竇憲誅後帝躬親萬機每有灾異輒延問公卿極言得失前後符瑞八十一所自稱德薄皆抑而不宣舊南海獻龍眼荔支十里一置五里一候奔騰阻險死者繼路時臨武長汝南唐羌縣接南海乃上書陳狀帝下詔曰遠國珍羞本以薦奉宗廟苟有傷害豈愛民之本其勑太官勿復受獻由是遂省焉論曰自中興以後逮于永元雖頗有薥張而俱存不擾是以齊民歲增聞土世廣偏師出塞則漠北地空都護西指則通譯四萬豈其道遠三代術長前世將服叛去來自有數也孝殤皇帝諱隆和帝少子也元興元年十二月辛未夜即皇帝位時誕育百餘日尊皇后曰皇太后太后臨朝北胸奴遣使稱臣詣敦煌奉獻延平元年春正月辛卯太尉張禹為太傅司徒徐防為太尉參録尚書事百官總己以聽封皇兄勝為平原王癸卯光祿勳梁鮪為司徒三月甲申葬孝和皇帝于慎陵尊廟曰穆宗丙戌清河王慶濟北王壽河閒王開常山王章始就國夏四月庚申詔罷祀官不在祀典者鮮卑寇漁陽漁陽太守張顯追擊戰沒丙寅以虎賁中郎將鄧騭為車騎將軍司空陳寵薨五月辛卯皇太后詔曰皇帝幼沖承統鴻業朕且權佐助聽政兢兢寅畏不知所濟深惟至治之本道化在前刑罰在後將稽中和廣施慶惠與吏民更始其大赦天下自建武以來諸犯禁錮詔書雖解有司持重多不奉行其皆復為平民壬辰河東垣山崩六月丁未太常尹勤為司空郡國三十七雨水己未詔曰自夏以來陰雨過節氣不效將有厥咎寤寐憂惶未知所由昔夏后惡衣服菲飲食孔子曰吾無閒然今新遭大憂且歲節未和徹膳損服庶有補焉其減太官導官尚方內署諸服御珍膳靡麗難成之物丁卯詔司徒大司農長樂少府曰朕以無德佐助統政夙夜經營懼失厥衷思惟治道由近及遠先內後外自建武之初以至于今八十餘年宮人歲增房御彌廣又宗室坐事沒入者猶託名公族甚可愍焉今悉免遣及掖庭宮人皆為庶民以抒幽隔鬱滯之情諸官府郡國王侯家奴婢姓劉及疲羸老皆上其名務令實悉秋七月庚寅勑司隸校尉部刺史曰夫天降灾戾應政而至閒者郡國或有水灾妨害秋稼朝廷惟咎憂惶悼懼而郡國欲獲豐穰虛飾之譽遂覆蔽灾害多張墾田不揣流亡競增戶口掩匿盜賊令姦惡無懲署用非次選舉乖宜貪苛慘毒延及平民刺史垂頭塞耳阿私下比不畏于天不愧于人假貸之恩不可數恃自今以後將糾其罰二千石長吏其各實核所傷害為除田租芻八月辛亥帝崩癸丑殯于崇德前殿年二歲贊曰孝和沈烈率由前則王赫自中賜命彊慝抑沒祥符登顯時德殤世何早平原弗克
