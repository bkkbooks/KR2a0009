body:
  text: 後漢書卷六十四吳延史盧趙列傳第五十四吳祐字季英陳留長垣人也父恢為南海太守祐年十二隨從到官恢欲殺青簡以寫經書祐諫曰今大人踰越五領遠在海濱其俗誠陋然舊多珍怪上為國家所疑下為權戚所望此書若成則載之兼兩昔馬援以薏苡興謗王陽以衣囊徼名嫌疑之閒誠先賢所慎也恢乃止撫其首曰吳氏世不乏季子矣及年二十喪父居無檐石而不受贍遺常牧豕於長垣澤中行吟經書遇父故人謂曰卿二千石子而自業賤事縱子無恥奈先君何祐辭謝而已守志如初後舉孝廉將行郡中為祖道祐越壇共小史雍丘黃真歡語移時與結友而別功曹以祐倨請黜之太守曰吳季英有知人之明卿且勿言真後亦舉孝廉除新蔡長世稱其清節時公沙穆來遊太學無資糧乃變服客傭為祐賃舂祐與語大驚遂共定交於杵臼之閒祐以光祿四行遷膠東侯相時濟北戴宏父為縣丞宏年十六從在丞舍祐每行園常聞諷誦之音奇而厚之亦與為友卒成儒宗知名東夏官至酒泉太守祐政唯仁簡以身率物民有爭訴者輒閉閣自責然後斷其訟以道譬之或身到閭里重相和解自是之後爭隙省息吏人懷而不欺嗇夫孫性私賦民錢市衣以進其父父得而怒曰有君如是何忍欺之促歸伏罪性慙懼詣閣持衣自首祐屏左右問其故性具談父言祐曰掾以親故受樜穢之名所謂觀過斯知人矣使歸謝其父還以衣遺之又安丘男子毋丘長與母俱行市道遇醉客辱其母長殺之而亡安丘追蹤於膠東得之祐呼長謂曰子母見辱人情所恥然孝子忿必慮難動不纍親今若背親逞怒白日殺人赦若非義刑若不忍將如之何長以械自繫曰國家制法囚身犯之明府雖加哀矝恩無所施祐問長有妻子乎對曰有妻未有子也即移安丘逮長妻妻到解其桎梏使同宿獄中妻遂懷孕至冬盡行刑長泣謂母曰負母應死當何以報吳君乎乃齧指而吞之含血言曰妻若生子名之吳生言我臨死吞指為誓屬兒以報吳君因投繯而死祐在膠東九年遷齊相大將軍梁冀表為長史及冀誣奏太尉李固祐聞而請見與冀爭之不聽時扶風馬融在坐為冀章草祐因謂融曰李公之罪成於卿手李公即誅卿何面目見天下之人乎冀怒而起入室祐亦徑去冀道出祐為河閒相因自免歸家不復仕躬灌園蔬以經書教授年九十八卒長子鳳官至樂浪太守少子愷新息令鳳子馮鮦陽侯相皆有名於世延篤字叔堅南陽犨人也少從潁川唐溪典受左氏傳旬日能諷之典深敬焉又從馬融受業博通經傳及百家之言能著文章有名京師舉孝廉為平陽侯相到官表龔遂之墓立銘祭祠擢用其後於畎畝之閒以師喪𠫓廾官奔赴五府並辟不就桓帝以博士徵拜議郎與朱穆邊韶共著作東觀稍遷侍中帝數問政事篤詭辭密對動依典義遷左馮翊又徙京兆尹其政用寬仁憂恤民黎擢用長者與參政事郡中歡愛三輔咨嗟焉先是陳留邊鳳為京兆尹亦有能名郡人為之語曰前有趙張三王後有邊延二君時皇子有疾下郡縣出珍藥而大將軍梁冀遣客齎書詣京兆并貨牛黃篤發書收客曰大將軍椒房外家而皇子有疾必應陳進醫方豈當使客千里求利乎遂殺之冀慙而不得言有司承旨欲求其事篤以病免歸教授家巷時人或疑仁孝前後之證篤乃論之曰觀夫仁孝之辨紛然異端互引典文代取事據可謂篤論矣夫人二致同源總率百行非復銖兩輕重必定前後之數也而如欲分其大較體而名之則孝在事親仁施品物施物則功濟於時事親則德歸於己於己則事寡濟時則功多推此以言仁則遠矣然物有出微而著事有由隱而章近取諸身刵耳有聽受之用目有察見之明足有致遠之勞手有飾衛之功功雖顯外本之者心也遠取諸物則草木之生始於萌牙終於彌蔓枝葉扶疏榮華紛縟末雖繁蔚致之者根也夫仁人之有孝猶四體之有心腹枝葉之有本根也聖人知之故曰夫孝天之經也地之義也人之行也君子務本本立而道生孝悌也者其為仁之本與然體大難備物性好偏故所施不同事少兩兼者也如必對其優劣則仁以枝葉扶疏為大孝以心體本根為先可無訟也或謂先孝後仁非仲尼序回參之意蓋以為仁孝同質而生純體之者則互以為稱虞舜顏回是也若偏而體之則各有其目公劉曾參是也夫曾閔以孝悌為至德管仲以九合為仁功未有論德不先回參考功不大夷吾以此而言各從其稱者也前越巂太守李文德素善於篤時在京師謂公卿曰延叔堅有王佐之才奈何屈千里之足乎欲令引進之篤聞乃為書止文德曰夫道之將廢所謂命也流聞乃欲相為求還東觀來命雖篤所未敢當吾嘗昧爽櫛梳坐於客堂朝則誦羲文之易虞夏之書歷公旦之典禮覽仲尼之春秋夕則消搖內階詠詩南軒百家衆氏投閒而作洋洋乎其盈耳也渙爛兮其溢目也紛紛欣欣兮其獨樂也當此之時不知天之為蓋地之為輿不知世之有人己之有軀也雖漸離擊筑傍若無人高鳳讀書不知暴雨方之於吾未足況也且吾自束修已來為人臣不陷於不忠為人子不陷於不孝上交不諂下交不黷從此而歿下見先君遠祖可不慙赧如此而不以善止者恐如教羿射者也慎勿迷其本𠫓廾其生也後遭黨事禁錮永康元年卒于家鄉里圖其形于屈原之廟篤論解經傳多所駮正後儒服虔等以為折中所著詩論銘書應訊表教令凡二十篇云史弼字公謙陳留考城人也父敞順帝時以佞辨至尚書郡守弼少篤學聚徒數百仕州郡辟公府遷北軍中候是時桓帝弟渤海王悝素行險辟僭傲多不法弼懼其驕悖為亂乃上封事曰臣聞帝王之於親戚愛雖隆必示之以威體雖貴必禁之以度如是和睦之道興骨肉之恩遂昔周襄王恣甘昭公孝景皇帝驕梁孝王而二弟階寵終用慢卒周有播蕩之禍漢有爰盎之變竊聞勃海王悝憑至親之屬恃偏私之愛失奉上之節有僭慢之心外聚剽輕不逞之徒內荒酒樂出入無常所與羣居皆有口無行或家之𠫓廾子或朝之斥臣必有羊勝伍被之變州司不敢彈糾傅相不能匡輔陛下隆於友于不忍遏絶恐遂滋蔓為害彌大乞露臣奏宣示百僚使臣得於清朝明言其失然後詔公卿平處其法法決罪定乃下不忍之詔臣下固執然後少有所許如是則聖朝無傷親之譏勃海有享國之慶不然懼大獄將興使者相望於路矣臣職典禁兵備禦非常而妄知藩國干犯至戚罪不容誅不勝憤悶謹冒死以聞帝以至親不忍下其事後悝竟坐逆謀貶為癭陶王弼遷尚書出為平原相時詔書下舉鉤黨郡國所奏相連及者多至數百唯弼獨無所上詔書前後切却州郡髡笞掾史從事坐傳責曰詔書疾惡黨人旨意懇惻青州六郡其五有黨近國甘陵亦考南北部平原何理而得獨無弼曰先王疆理天下畫界分境水土異齊風俗不同它郡自有平原自無胡可相比若承望上司誣陷良善淫刑濫罰以逞非理則平原之人戶可為黨相有死而已所不能也從事大怒即收郡僚職送獄道舉奏弼會黨禁中解弼以俸贖罪得免濟活者千餘人弼為政特挫抑彊豪其小民有罪多所容貸遷河東太守被一切詔書當舉孝廉弼知多權貴請託乃豫勑斷絶書屬中常侍侯覽果遣諸生齎書請之并求假鹽稅積日不得通生乃說以它事謁弼而因達覽書弼大怒曰太守忝荷重任當選士報國爾何人而僞詐無狀命左右引出楚捶數百府丞掾史十餘人皆諫於廷弼不對遂付安邑獄即日考殺之侯覽大怨遂詐作飛章下司隸誣弼誹謗檻車徵吏人莫敢近者唯前孝廉裴瑜送到崤澠之閒大言於道傍曰明府摧折虐臣選德報國如其獲罪足以垂名竹帛願不憂不懼弼曰誰謂荼苦其甘如薺昔人刎頸九死不恨及下廷尉詔獄平原吏人奔走詣闕訟之又前孝廉魏劭毀變形服詐為家僮瞻護於弼弼遂受誣事當𠫓廾市劭與郡人賣郡邸行賂於侯覽得減死罪一等論輸左校時人或譏曰平原行貨以免君無乃蚩乎陶丘洪曰昔文王牖里閎散懷金史弼遭患義夫獻寶亦何疑焉於是議者乃息刑竟歸田里稱病閉門不出數為公卿所薦議郎何休又訟弼有幹國之器宜登台相徵拜議郎侯覽等惡之光和中出為彭城相會病卒裴瑜位至尚書論曰夫剛烈表性鮮能優寬仁柔用情多乏貞直吳季英視人畏傷發言蒸蒸似夫儒者而懷憤激揚折讓權枉又何壯也仁以矝物義以退身君子哉語曰活千人者子孫必封史弼頡頏嚴吏終全平原之黨而其後不大斯亦未可論也盧植字子幹涿郡涿人也身長八尺二寸音聲如鍾少與鄭玄俱事馬融能通古今學好研精而不守章句融外戚豪家多列女倡歌舞於前植侍講積年未嘗轉眄融以是敬之學終辭歸闔門教授性剛毅有大節常懷濟世志不好辭賦能飲酒一石時皇后父大將軍竇武援立靈帝初秉機政朝議欲加封爵植雖布衣以武素有名譽乃獻書以規之曰植聞嫠有不恤緯之事漆室有倚楹之戚憂深思遠君子之情夫士立爭友義貴切磋書陳謀及庶人詩詠詢于芻蕘植誦先王之書久矣敢愛其瞽言哉今足下之於漢朝猶旦奭之在周室建立聖主四海有繫論者以為吾子之功於斯為重天下聚目而視攢耳而聽謂準之前事將有景風之祚尋春秋之義王后無嗣擇立親長年均以德德均則決之卜筮今同宗相後披圖案牒以次建之何勳之有豈橫叨天功以為己力乎宜辭大賞以全身名又比世祚不競仍外求嗣可謂危矣而四方未寧盜賊伺隙恆嶽勃碣特多姦盜將有楚人脅比尹氏立朝之變宜依古禮置諸子之官徵王侯愛子宗室賢才外崇訓道之義內息貪利之心簡其良能隨用爵之彊幹弱枝之道也武並不能用州郡數命植皆不就建寧中徵為博士乃始起焉熹平四年九江蠻反四府選植才兼文武拜九江太守蠻寇賓服以疾去官作尚書章句三禮解詁時始立太學石經以正五經文字植乃上書曰臣少從通儒故南郡太守馬融受古學頗知今之禮記特多回臣前以周禮諸經發起粃謬敢率愚淺為之解詁而家乏無力供繕寫上願得將書生二人共詣東觀就官財糧專心研精合尚書章句考禮記失得庶裁定聖典刊正碑文古文科斗近於為實而厭抑流俗降在小學中興以來通儒達士班固賈逵鄭興父子並敦悅之今毛詩左氏周禮各有傳記其興春秋共相表𩹉宜置博士為立學官以助後來以廣聖意會南夷反叛以植嘗在九江有恩信拜為廬江太守植深達政宜務存清靜弘大體而已歲餘復徵拜議郎與諫議大夫馬日磾議郎蔡雍楊彪韓說等並在東觀校中書五經記傳補續漢記帝以非急務轉為侍中遷尚書光和元年有日食之異植上封事諫曰臣聞五行傳日晦而月見謂之朓王侯其舒此謂君政舒緩故日食晦也春秋傳曰天子避位移時言其相掩不過移時而閒者日食自巳過午既食之後雲霧暗曖比年地震彗孛互見臣聞漢以火德化當寬明近色信讒忌之甚者如火畏水故也案今年之變皆陽失陰侵消禦災凶宜有其道謹略陳八事一曰用良二曰原禁三曰禦癘四曰備寇五曰修體六曰遵堯七曰御下八曰散利用良者宜使州郡核舉賢良隨方委用責求選舉原禁者凡諸黨錮多非其罪可加赦恕申宥回枉禦癘者宋后家屬並以無辜委骸橫尸不得收葬疫癘之來皆由於此宜勑收拾以安遊魂備寇者侯王之家賦稅減削愁窮思亂必致非宜使給足以防未然修禮者應徵有道之人若鄭玄之徒陳明洪範攘服災咎遵堯者今郡守刺史一月數遷宜依黜陟以章能否縱不九載可滿三歲御下者謂謁希爵一宜禁塞遷舉之事責成主者散利者天子之體理無私積宜弘大務蠲略細微帝不省中平元年黃巾賊起四府舉植拜北中郎將持節以護烏桓中郎將宗員副將北軍五校士發天下諸郡兵征之連戰破賊帥張角斬獲萬餘人角等走保廣宗植築圍鑿造作雲梯垂當拔之帝遣小黃門左豐詣軍觀賊形藝或勸植以賂送豐植不肯豐還言於帝曰廣宗賊易破耳盧中郎固壘息軍以待天誅帝怒遂檻車徵植減死罪一等及車騎將車皇甫嵩討平黃巾盛稱植行師方略嵩皆資用規謀濟成其功以其年復為尚書帝崩大將軍何進謀誅中官乃召并州牧董卓以懼太后植知卓凶悍難制必生後患固止之進不從及卓至果陵虐朝廷乃大會百官於朝堂議欲廢立羣僚無敢言植獨抗議不同卓怒罷會將誅植語在卓傳植素善蔡雍雍前徙朔方植獨上書請之雍時見親於卓故往請植事又議郎彭伯諫卓曰盧尚書海內大儒人之望也今先害之天下震怖卓乃止但免植官而已植以老病求歸懼不免禍乃詭道從轘轅出卓果使人追之到懷不及遂隱於上谷不交人事冀州牧袁紹請為軍師初平三年卒臨困勑其子儉葬於土穴不用棺椁附體單帛而已所著碑誄表記凡六篇建安中曹操北討柳城過涿郡告守令曰故北中郎將盧植名著海內學為儒宗士之楷模國之楨幹也昔武王入殷封商容之閭鄭喪子産仲尼隕涕孤到此州嘉其餘風春秋之義賢者之後宜有殊禮亟遣丞掾除其墳墓存其子孫并致薄醊以彰厥德子育知名論曰風霜以別草木之性危亂而見貞良之節則盧公之心可知矣夫螽蠆起懷雷霆駭耳雖賁育荊諸之倫未有不冘豫奪常者也當植抽白刃嚴閣之下追帝河津之閒排戈刃赴戕折豈先計哉君子之於忠義造次必於是顛沛必於是也趙岐字邠卿京兆長陵人也初名嘉生於御史臺因字臺卿後避難故自改名字示不忘本土也岐少明經有才藝娶扶風馬融兄女融外戚豪家岐常鄙之不與融相見仕州郡以廉直疾惡見憚年三十餘有重疾臥蓐七年自慮奄忽乃為遺令勑兄子曰大丈夫生世遁無箕山之操仕無伊呂之勳天不我與復何言哉可立一員石於吾墓前刻之曰漢有逸人姓趙名嘉有志無時命也奈何其後疾瘳永興二年辟司空掾議二千石得去官為親行服朝廷從之其後為大將軍梁冀所辟為陳損益求賢之策冀不納舉理劇為皮氏長會河東太守劉祐去郡而中常侍左悺兄勝代之岐恥疾宦官即日西歸京兆尹延篤復以為功曹先是中常侍唐衡兄玹為京兆虎牙都尉郡人以玹進不由德皆輕侮之岐及從兄襲又數為貶議玹深毒恨延熹元年玹為京兆尹岐懼禍及乃與從子戩逃避之玹果收岐家屬宗親陷以重法盡殺之岐遂逃難四方江淮海岱靡所不歷自匿姓名賣餅北海市中時安丘孫嵩年二十餘遊市見岐察非常人停車呼與共載岐懼失色嵩乃下帷令騎屏行人密問岐曰視子非賣餅者又相問而色動不有重怨即亡命乎我北海孫賓石闔門百口藝能相濟岐素聞嵩名即以實告之遂以俱歸嵩先入白母曰出行乃得死友迎入上堂饗之極歡藏岐復壁中數年岐作厄屯歌二十三章後諸唐死滅因赦乃出三府聞之同時並辟九年乃應司徒胡廣之命會南胸奴烏桓鮮卑反叛公卿舉岐擢拜并州刺史岐欲奏守邊之策未及上會坐黨事免因撰次以為禦寇論靈帝初復遭黨錮十餘歲中平元年四方兵起詔選故刺史二千石有文武才用者徵岐拜議郎車騎將軍張溫西征關中請補長史別屯安定大將軍何進舉為敦煌太守行至襄武岐與新除諸郡太守數人俱為賊邊章等所執賊欲脅以為帥岐詭辭得免展轉還長安及獻帝西都復拜議郎稍遷太僕及李傕專政使太傅馬日磾撫慰天下以岐為副日磾行至洛陽表別遣岐宣揚國命所到郡縣百姓皆喜曰今日乃復見使者車騎是時袁紹曹操與公孫瓚爭冀州紹及操聞岐至皆自將兵數百里奉迎岐深陳天子恩德宜罷兵安人之道又移書公孫瓚為言利害紹等各引兵去皆與岐期會洛陽奉迎車駕岐南到陳留得篤疾經涉二年期者遂不至興平元年詔書徵岐會帝當還洛陽先遣衛將軍董承修理宮室岐謂承曰今海內分崩唯有荊州境廣地勝西通巴蜀南當交址年穀獨登兵人差全岐雖迫大命猶志報國家欲自乘牛車南說劉表可使其身自將兵來衛朝廷與將軍并心同力共奬王室此安上救人之策也承即表遣岐使荊州督租糧岐至劉表即遣兵詣洛陽助修宮室軍資委輸前後不絶時孫嵩亦寓於表表不為禮岐乃稱嵩素行篤烈因共上為青州刺史岐以老病遂留荊州曹操時為司空舉以自代光祿勳桓典少府孔融上書薦之於是就拜岐為太常年九十餘建安六年卒先自為壽藏圖季札子産晏嬰叔向四像居賓位又自畫其像居主位皆為讚頌勑其子曰我死之日墓中聚沙為牀布簟白衣散髮其上覆以單被即日便下下訖便掩岐多所述作蓋孟子章句三輔決録傳於時贊曰吳翁溫愛義干剛烈延史字人風和恩結梁使顯刑誣黨潛絶子幹兼姿逢掖臨師邠卿出疆專出朝威
