body:
  text: 後漢書志第六禮儀下大喪諸侯王列侯始封貴人公主薨不豫太醫令丞將醫人就進所宜藥嘗藥監近臣中常侍小黃門皆先嘗藥過量十二公卿朝臣問起居無間太尉告請南郊司徒司空告請宗廟告五獄四瀆羣祀並禱求福疾病公卿復如禮兵虎賁羽林郎中署皆嚴宿衛宮府各警北軍五校繞宮屯兵黃門令尚書御史謁者晝夜行陳三公啓手足色膚如禮皇后皇太子皇子哭踊如禮沐浴如禮守宮令兼東園匠將女執事黃綿緹繒金縷玉柙如故事飯唅珠玉如禮槃冰如禮百官哭臨殿下是日夜下竹使符告郡國二千石諸侯王竹使符到皆伏哭盡哀小斂如禮東園匠考工令奏東園祕器表𩹉洞赤虡文畫日月鳥龜龍虎連璧偃月牙檜梓宮如故事大斂于兩楹之間五官左右虎賁羽林五將各將所部執虎賁戟屯殿端門陛左右廂中黃門持兵陛殿上夜漏羣臣入晝漏上水大鴻臚設九賓隨立殿下謁者引諸侯王立殿下西面北上宗室諸侯四姓小侯在後西面北上治禮引三公就位殿下北面特進次中二千石列侯次二千石六百石博士在後羣臣陪位者皆重行西上位定大鴻臚言具謁者以聞皇后東向貴人公主宗室婦女以次立後皇太子皇子在東西向皇子少退在南北面皆伏哭大鴻臚傳哭羣臣皆哭三公升自阼階安梓宮內圭璋諸物近臣佐如故事嗣子哭踊如禮東園匠武士下釘衽截去牙太常上太牢奠太官食監中黃門尚食次奠執事者如禮太常大鴻臚傳哭如儀三公奏尚書顧命太子即日即天子位于柩前請太子即皇帝位皇后為皇太后奏可羣臣皆出吉服入會如儀太尉升自阼階當柩御坐北面稽首讀策畢以傳國玉璽綬東面跪授皇太子即皇帝位中黃門掌兵以玉具隨侯珠斬蛇寶劒授太尉告令羣臣羣臣皆伏稱萬歲或大赦天下遣使者詔開城門宮門罷屯衛兵羣臣百官罷入成喪服如禮兵官戎三公太常如禮故事百官五日一會臨故吏二千石刺史在京都郡國上計掾史皆五日一會天下吏民發喪臨三日先葬二日皆旦晡臨既葬釋服無禁嫁娶祠祀佐史以下布衣冠幘絰帶無過三寸臨庭中武吏布幘大冠大司農出見錢穀給六丈布直以葬大紅十五日小紅十四日纖七日釋服部刺史二千石列侯在國者及關內侯宗室長吏及因郵奉奏諸侯王遣大夫一人奉奏弔臣請驛馬露布奏可以木為重高九尺廣容八歷裹以葦席巾門喪帳皆以簟車皆去輔轓疏布惡輪走卒皆布幘太僕駕四輪輈為賓車大練為屋幕中黃門虎賁各二十人執紼司空擇土造穿太史卜日謁者二人中謁者僕射中謁者副將作油緹帳以覆坑方石治黃腸題湊便房如禮大駕太僕御方相氏黃金四目蒙熊皮玄衣朱裳執戈揚楯立乘四馬先驅旗之制長三仞十有二遊曳地畫日月升龍書旐曰天子之柩謁者二人立乘六馬為次大駕甘泉鹵簿金根容車蘭臺法駕喪服大行載飾如金根車皇帝從送如禮太常上啓奠夜漏二十刻太尉冠長冠衣齋衣乘高車詣殿止車門外使者到南向立太尉進伏拜受詔太尉詣南郊未盡九刻大鴻臚設九賓隨立羣臣入位太尉行禮執事皆冠長冠衣齋衣太祝令跪讀諡策太尉再拜稽首治禮告事畢太尉奉諡策還詣殿端門太常上祖奠中黃門尚衣奉衣登容根車東園武士載大行司徒却行道立車前治禮引太尉入就位大行車西少南東面奉諡策太史令奉哀策立後太常跪曰進皇帝進太尉讀諡策藏金匱皇帝次科藏于廟太史奉哀策葦篋詣陵太尉旋復公位再拜立哭太常跪曰哭大鴻臚傳哭十五舉音止哭太常行遣奠皆如禮請哭止哭如儀晝漏上水請發司徒河南尹先引車轉太常跪曰請拜送載車著白系參繆紼長三十丈大七寸為挽六行行五十人公卿以下子弟凡三百人皆素幘委貌冠衣素裳校尉三百人皆赤幘不冠絳科單衣持幢幡候司馬丞為行首皆銜枚羽林孤兒巴俞擢歌者六十人為六列鐸司馬八人執鐸先大鴻臚設九賓隨立陵南羡門道東北面諸侯王公特進道西北面東上中二千石二千石列侯宜直九賓東北面西上皇帝白布幕素𩹉夾羡道東西向如禮容車幄坐羡道西南向車當坐南向中黃門尚衣奉衣就幄坐車少前太祝進醴獻如禮司徒跪曰大駕請舍太史令自車南北面讀哀策掌故在後已哀哭太常跪曰哭大鴻臚傳哭如儀司徒跪曰請就下位東園武士奉下車司徒跪曰請就下房都導東園武士奉車入房司徒太史令奉諡哀策東園武士執事下明器筲八盛容三升黍一稷一麥一粱一稻一麻一菽一小豆一甕三容三升醯一醢一屑一黍飴載以木桁覆以疏布甒二容三升醴一酒一載以木桁覆以功布瓦鐙一彤矢四軒輖中亦短衛彤矢四骨短衛彤弓一巵八牟八豆八籩八形方酒壺八槃匜一具杖几各一蓋一鍾十六無虡鎛四無虡磬十六無虡塤一簫四笙一箎一柷一敔一瑟六琴一竽一築一坎侯一干戈各一笮一甲一胄一挽車九乘芻靈三十六匹瓦竈二瓦釜二瓦甑一瓦鼎十二容五升匏勺一容一升瓦案九瓦大杯十六容三升瓦小杯二十容二升瓦飯槃十瓦酒樽二容五斗匏勺二容一升祭服衣送皆畢東園匠曰可哭在房中者皆哭太常大鴻臚請哭止哭如儀司徒曰百官事畢臣請罷從入房者皆再拜出就位太常導皇帝就贈位司徒跪曰請進贈侍中奉持鴻洞贈王圭長尺四寸薦以紫巾廣袤各三寸緹𩹉赤纁周緣贈幣玄三纁二各長尺二寸廣充幅皇帝進跪臨羡道房戶西向手下贈投鴻洞中三東園匠奉封入藏房中太常跪曰皇帝敬再拜請哭大鴻臚傳哭如儀太常跪曰贈事畢皇帝促就位容根車遊載容衣司徒至便殿并騎皆從容車玉帳下司徒跪曰請就幄導登尚衣奉衣以次奉器衣物藏於便殿太祝進醴獻凡下用漏十刻禮畢司空將校復土皇帝皇后以下皆去粗服服大紅還宮反廬立主如禮桑木主尺二寸不書諡虞禮畢祔於廟如禮先大駕日遊冠衣于諸宮諸殿渧皆吉服從會如儀皇帝近臣喪服如禮醳大紅服小紅十一升都布練冠醳小紅服纖醳纖服留黃冠常冠近臣及二千石以下皆服留黃冠百官衣皂每變服從哭詣陵會如儀祭以特牲不進毛血首司徒光祿勳備三爵如禮太皇太后皇太后崩司空以特牲告諡于祖廟如儀長樂太僕少府大長秋典喪事三公奉制度他皆如禮儀合葬羡道開通皇帝謁便房太常導至羡道去杖中常侍受至柩前謁伏哭止如儀辭太常導出中常侍授杖升車歸宮已下反虞立主如禮諸郊廟祭服皆下便房五時朝服各一襲在陵寢其餘及宴服皆封以篋笥藏宮殿後閣室諸侯王列侯始封貴人公主薨皆令贈印璽玉柙銀縷大貴人長公主銅縷諸侯王貴人公主公將軍特進皆賜器官中二十四物使者治喪穿作柏椁百官會送如故事諸侯王公主貴人皆樟棺洞朱雲氣畫公特進樟棺黑漆中二千石以下坎侯漆朝臣中二千石將軍使者弔祭郡國二千石六百石以至黃綬皆賜常車驛牛贈祭宜自佐史以上達大斂皆以朝服君臨弔若遣使者主人免絰去杖望馬首如禮免絰去杖不敢以戚凶服當尊者自王主貴人以下至佐史送車騎導從吏卒各如其官府載飾以蓋龍首魚尾華布牆纁上周交絡前後雲氣畫帷裳中二千石以上有輜左龍右虎朱鳥玄武公侯以上加倚鹿伏熊千石以下緇布蓋牆魚龍首尾而已二百石黃綬以下至于處士皆以簟席為牆蓋其正妃夫人妻皆如之諸侯王傅相中尉內史典喪事大鴻臚奏諡天子使者贈璧帛載日命諡如禮下陵羣臣醳粗服如儀主人如禮贊曰大禮雖簡鴻儀則容天尊地卑君莊臣恭質文通變哀敬交從元序斯立家邦乃隆
