body:
  text: 後漢書志第十四五行二災火草妖羽蟲孽羊禍五行傳曰棄法律逐功臣殺太子以妾為妻則火不炎上謂火失其性而為災也又曰視之不明是謂不哲厥咎舒厥罰常燠厥極疾時則有草妖時則有螺蟲之孽時則有羊禍時則有赤眚赤祥惟水沴火螺蟲劉歆傳以為羽蟲建武中漁陽太守彭寵被徵書至明日潞縣火災起城中飛出城外燔千餘家殺人京房易傳曰上不儉下不節盛火數起燔宮室儒說火以明為德而主禮時寵與幽州牧朱浮有隙疑浮見浸譖故意狐疑其妻勸無應徵遂反叛攻浮卒誅滅和帝永元八年十二月丁巳南宮宣室殿火是時和帝幸北宮竇太后在南宮明年竇太后崩十三年八月己亥北宮盛饌門閣火是時和帝幸鄧貴人陰后寵衰怨恨上有欲廢之意明年會得陰后挾僞道事遂廢遷于桐宮以憂死立鄧貴人為皇后十五年六月辛酉漢中城固南城門災此孝和皇帝將絶世之象也其後二年宮車晏駕殤帝及平原王皆早夭折和帝世絶安帝永初二年四月甲寅漢陽河阿陽城中失火燒殺三千五百七十人先是和帝崩有皇子二人皇子勝長鄧皇后貪殤帝少欲自養長立之延平元年殤帝崩勝有厥疾不篤羣臣咸欲立之太后以前既不立勝遂更立清河王子是為安帝司空周章等心不掩厭服謀欲誅鄧氏廢太后安帝而更立勝元年十一月事覺章等被誅其後涼州叛羌為害大甚涼州諸郡寄治馮翊扶風界及太后崩鄧氏被誅四年三月戊子杜陵園火元初四年二月壬戌武庫火是時羌叛大為寇害發天下兵以攻禦之積十餘年未已天下厭苦兵役延光元年八月戊子陽陵園寢殿火凡災發于先陵此太子將廢之象也若曰不當廢太子以自翦如火不當害先陵之寢也明年上以讒言廢皇太子為濟陰王後二年宮車晏駕中黃門孫程等十九人起兵殿省誅賊臣立濟陰王四年秋七月乙丑漁陽城門樓災順帝永建三年七月丁酉茂陵園寢災陽嘉元年恭陵廡災及東西莫府火太尉李固以為奢僭所致陵之初造禍及枯骨規廣治之尤飾又上欲更造宮室益臺觀故火起莫府燒材木永和元年十月丁未承福殿火先是爵號阿母宋娥為山陽君后父梁商本國侯又多益商封商長子冀當繼商爵以商生在復更封冀為襄邑侯追號后母為開封君皆過差非禮漢安元年三月甲午雒陽劉漢等百九十七家為火所燒後四年宮車比三晏駕建和元年君位乃定桓帝建和二年五月癸丑北宮掖庭中德陽殿火及左掖門先是梁太后兄冀挾姦枉以故太尉李固杜喬正直恐害其事令人誣奏固喬而誅滅之是後梁太后崩而梁氏誅滅延熹四年正月辛酉南宮嘉德殿火戊子丙署火二月壬辰武庫火五月丁卯原陵長壽門火先是亳后因賤人得幸號貴人為后上以后母宣為長安君封其兄弟愛寵隆崇又多封無功者去年春白馬令李雲坐直諫死至此彗除心尾火連作五年正月壬午南宮丙署火四月乙丑恭北陵東闕火戊辰虎賁掖門火五月康陵園寢火甲申中藏府承祿署火七月己未南宮承善闥內火六年四月辛亥康陵東署火七月甲申平陵園寢火八年二月己酉南宮嘉德署黃龍千秋萬歲殿皆火四月甲寅安陵園寢火閏月南宮長秋和歡殿後鉤盾掖庭朔平署各火十一月壬子德陽前殿西閣及黃門北寺火殺人九年三月癸巳京都夜有火光轉行民相驚譟靈帝熹平四年五月延陵園災光和四年閏月辛酉北宮東掖庭永巷署災五年五月庚申德陽前殿西北入門內永樂太后宮署火中平二年二月己酉南宮雲臺災庚戌樂城成門災延及北闕度道西燒嘉德和歡殿案雲臺之災自上起榱題數百同時並然若就縣華鐙其日燒盡延及白虎威興門尚書符節蘭臺夫雲臺者乃周家之所造也圖書術籍珍玩寶怪皆所藏在也京房易傳曰君不思道厥妖火燒宮是時黃巾作慝變亂天常七州二十八郡同時俱發命將出衆雖頗有所禽然宛廣宗曲陽尚未破壞役起負海杼柚空懸百姓死傷已過半矣而靈帝曾不克己復禮虐侈滋甚尺一雨布騶騎電激官非其人政以賄成內嬖鴻都並受封爵京都為之語曰今茲諸侯歲也天戒若曰放賢賞淫何以舊典為故焚其臺門祕府也其後三年靈帝暴崩續以董卓之亂火三日不絶京都為丘墟矣獻帝初平元年八月霸橋災其後三年董卓見殺庶徵之恆燠漢書以冬溫應之中興以來亦有冬溫而記不録云安帝元初三年有瓜異本共生一八瓜同蒂時以為嘉瓜或以為瓜者外延離本而實女子外屬之象也是時閻皇后初立後閻后與外親耿寶等共譖太子廢為濟陰王更外迎濟北王子犢立之草妖也桓帝延熹九年雒陽城局竹柏葉有傷者占曰天子凶靈帝熹平三年右校別作中有兩樗樹皆高四尺所其一株宿夕暴長長丈餘大一圍作胡人狀頭目鬢鬚髮備具京房易傳曰王德衰下人將起則有木生人狀五年十月壬午御所居殿後槐樹皆六七圍自拔倒豎根在上中平元年夏東郡陳留濟陽長垣濟陰冤句離狐縣界有草生其莖靡纍腫大如手指狀似鳩雀龍蛇鳥獸之形五色各如其狀毛羽頭目足翅皆具近草妖也是歲黃巾賊始起皇后兄何進異父兄朱苗皆為將軍領兵後苗封濟陽侯進苗遂秉威權持國柄漢遂微弱自此始焉中平中長安城西北六七里空樹中有人面生鬢獻帝興平元年九月桑復生椹可食安帝延光三年二月戊子有五色大鳥集濟南臺十月又集新豐時以為鳳皇或以為鳳皇陽明之應故非明主則隱不見凡五色大鳥似鳳者多羽蟲之孽是時安帝信中常侍樊豐江京阿母王聖及外屬耿寶等讒言免太尉楊震廢太子為濟陰王不哲之異也章帝末號鳳皇百四十九見時直臣何敞以為羽孽似鳳翺翔殿屋不察也記者以為其後章帝崩以為驗案宣帝明帝時五色鳥羣翔殿屋賈逵以為胡降徵也帝多善政雖有過不及至衰缺末年胡降二十萬口爾是其驗也帝之時羌胡外叛讒慝內興羽孽之時也樂叶圖徵說五鳳皆五色為瑞者一為孽者四桓帝元嘉元年十一月五色大鳥見濟陰己氏時以為鳳皇此時政治衰缺梁冀秉政阿枉上幸亳后皆羽孽時也靈帝光和四年秋五色大鳥見于新城衆鳥隨之時以為鳳皇時靈帝不恤政事常侍黃門專權羽孽之時也衆鳥之性見非常班駮好聚觀之至於小爵希見梟者暴見猶聚中平三年八月中懷陵上有萬餘爵先極悲鳴已因亂鬬相殺皆斷頭懸著樹枝枳棘到六年靈帝崩大將軍何進以內寵外嬖積惡日久欲悉糾黜以隆更始政而太后持疑事久不決進從中出於省內見殺因是有司蕩滌虔劉後祿而尊厚者無餘矣夫陵者高大之象也天戒若曰諸懷爵祿而尊厚者還自相害至滅亡也桓帝建和三年秋七月北地廉雨肉似羊肋或大如手近赤祥也是時梁太后攝政兄梁冀專權枉誅漢良臣故太尉李固杜喬天下寃之其後梁氏誅滅
