body:
  text: 後漢書志第二十三郡國五漢中巴郡廣漢蜀郡犍為牂牁越巂益州永昌廣漢屬國蜀郡屬國犍為屬國右益州隴西漢陽武都金城安定北地武威張掖酒泉敦煌張掖屬國張掖居延屬國右涼州上黨太原上郡西河五原雲中定襄鴈門朔方右并州涿郡廣陽代郡上谷漁陽右北平遼西遼東玄菟樂浪遼東屬國右幽州南海蒼梧鬱林合浦交趾九真日南右交州漢中郡秦置雒陽西千九百九十里九城戶五萬七千三百四十四口二十六萬七千四百二南鄭成固媯墟在西北西城褒中沔陽有鐵安陽錫有錫春秋時曰錫穴上庸本庸國房陵江州宕渠有鐵朐忍閬中魚復扞水有扦關臨江枳涪陵出丹墊江安漢平都充國永元二年分閬中置宣漢漢昌永元中置十八雒州刺史治新都綿竹什邡涪梓潼白水葭萌郪廣漢有沈水德陽成都郫江原繁廣都臨邛有鐵湔氐道岷山在西徼外汶江道八陵廣柔綿虒道口四十一萬一千三百七十八武陽有彭亡聚資中牛鞞南安有魚泣涪津僰道江陽荷符節南廣漢安故且蘭平夷鄨毋斂談指出丹夜郎出雄黃雌黃同並談漏江毋單宛溫鐔封漏臥句町進乘西隨邛都南山出銅遂久靈關道臺登出鐵青蛉有禺同山俗謂有金馬碧雞卑水三縫會無出鐵定莋闡蘇大莋莋秦姑復此等並皆未詳所在縣十七城戶二萬九千三十六口十一萬八百二滇池出鐵有池澤北有黑水祠勝休俞元裝山出銅律高石室山出錫盢町山出銀鉛賁古采山出銅錫羊山出銀鉛母掇毋棳建伶穀昌牧靡味昆澤同瀨同勞雙柏出銀連然梇棟秦臧不韋出鐵巂唐比蘇楪榆邪龍雲南哀牢永平中置故牢王國博南永平中置南界出金陰平道甸氐道剛氐道七萬五千六百二十九漢嘉故青衣陽嘉二年改有蒙山嚴道有邛僰九折坂者邛刻郵置徙旄牛朱提山出銀銅漢陽狄道安故氐道養水出此首陽有鳥鼠同穴山渭水出大夏襄武有五雞聚臨洮有西頃山枹罕故屬金城白石故屬金城鄣河關故屬金城積石山在西南河水出冀有朱圄山有緹羣山有雒門聚望阿陽略陽有街泉亭勇士成紀隴州刺史治有大坂名隴坻豲坻聚有秦亭豲道蘭干平襄顯親上邽故屬隴西西故屬隴西有嶓冢山西漢水下辨武都道上祿故道河池沮沔水出東狼谷羌道允吾浩亹令居枝陽金城榆中臨羌有昆崙山破羌安夷允街臨涇高平有第一城朝那烏枝有瓦亭出薄落谷三水陰盤彭陽鶉觚故屬北地富平泥陽有五柞亭弋居有鐵廉參故屬安定靈州姑臧張掖武威休屠揟次鸞鳥朴𥕏媼圍宣威倉松陰故屬安定租厲故屬安定顯美故屬張掖左騎千人官觻得昭武刪丹弱水出氐池屋蘭日勒驪靬番和酒泉郡武帝置陽西四千七百里九城戶萬二千七百六福祿表氏樂涫玉門會水沙頭安彌故曰緩綏彌乾齊延壽敦煌古瓜州出美瓜冥安效穀拼泉廣至龍勒有玉門關張掖屬國武帝置屬國都尉以主蠻夷降者安帝時別領五城戶四千六百五十六口萬六千九百五十二候官左騎千人司馬官千人官張掖居延屬國故郡都尉安帝別領一郡城戶一千五百六十口四千七百三十三居延有居延澤古流沙長子屯留絳水出銅鞮沾涅有閼與聚襄垣壺關有黎亭故黎國泫氏有長平亭高都潞本國猗氏陽阿侯國穀遠晉陽本唐國有龍山晉水所出刺史治界休有界山有綿上聚有千畝聚榆次有鑿壺中都于離茲氏狼孟塢盂平陶京陵春秋時九京陽曲大陵有鐵祁慮虒陽邑有箕城膚施白土漆垣奢延雕陰楨林定陽高奴龜茲屬國候官西河郡武帝置雒陽北千二百里也十三城戶五千六百九十八口二萬八百三十八離石平定美稷樂街中陽臯狼平周平陸益蘭圜陰藺圜陽廣衍五原郡秦置為九原武帝更名十城戶四千六百六十七口二萬二千九百五十七九原五原臨沃父文國河除陰武都宜梁曼柏成宜西安陽北有陰山雲中咸陽箕陵沙陵沙南北輿武泉原陽定襄故屬定襄成樂故屬定襄武進故屬定襄善無故屬鴈門桐過武成駱中陵故屬鴈門鴈門郡秦置雒陽北千五百里十四城戶三萬一千八百六十二口二十四萬九千陰館繁畤樓煩武州汪陶劇陽崞平城馬邑鹵城故屬代郡廣武故屬太原有夏屋山原平故屬太原強陰臨戎三封朔方沃野廣牧大城故屬西河右并州刺史部郡九縣邑侯國九十八涿乃侯國故安易水出雹水出范陽侯國良鄉北新城有汾水門方城故屬廣陽有臨鄉有督亢亭薊本燕國刺史治廣陽昌平故屬上谷軍都故屬上谷安次故屬勃海高柳桑乾道人當城馬城班氏狋氏北平邑永元八年復東安陽平舒代沮陽潘永元十一年復宀心廣宀心居庸雊瞀涿鹿下落漁陽有鐵狐奴潞雍奴泉州有鐵平谷安樂傂奚獷平右北平郡秦置雒陽東北二千三百里四城戶九千一百七十口五萬三千四百七十五土垠徐無俊靡無終遼西郡秦置雒陽東北三千三百里五城戶萬四千一百五十口八萬一千七百一十四陽樂海陽令支有孤竹城肥如臨渝襄平新昌無慮望平候城安巿平郭有鐵西安平汶番汗沓氏高句驪遼山遼水出西蓋鳥馬上殷台高顯故屬遼東候城故屬遼東遼陽故屬遼東朝鮮邯浿水含資占蟬遂城增地帶方駟望海冥列口長岑屯有昭明鏤方提奚渾彌樂都昌遼故天遼屬遼西賓徒故屬遼西徒河故屬遼西無慮有醫無慮山險瀆房番禺博羅中宿龍川四會揭陽增城有勞領山廣信謝沐高要封陽臨賀端溪馮乘富川荔浦猛陵鄣平布山安廣阿林廣鬱中溜桂林潭中臨塵定周增食領方合浦郡武帝置雒陽南九千一百九十一里五城戶二萬三千一百二十一口八萬六千六百一十七合浦徐聞高涼臨元朱崖龍編羸𥕟定安定苟漏麊泠曲陽北帶稽徐西于朱封溪建武十九年置望海建武十九年置百九十四胥浦居風咸歡無功無編十六西卷朱吾盧容象林比景漢書地理志承秦三十六郡縣邑數百後稍分析至于孝平凡郡國百三縣邑道侯國千五百八十七世祖中興惟官多役煩乃命并合省郡國十縣邑道侯國四百餘所至明帝置郡一章帝置郡國二和帝置三安帝又命屬國別領比郡者六又所省縣漸復分置至于孝順凡郡國百五縣邑道侯國千一百八十民戶九百六十九萬八千六百三十口四千九百一十五萬二百二十贊曰衆安后載政洽區分侯罷守列民無常君稱號遷隔封割糾紛略存減益多證前聞
