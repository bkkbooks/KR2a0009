body:
  text: 後漢書卷八十二上方術列傳第七十二上仲尼稱易有君子之道四焉曰卜筮者尚其占占也者先王所以定禍福決嫌疑幽贊於神明遂知來物者也若夫陰陽推步之學往往見於墳記矣然神經怪牒玉策金繩關扃於明靈之府封縢於瑤壇之上者靡得而窺也至乃河洛之文龜龍之圖箕子之術師曠之書緯候之部鈐決之符皆所以探抽冥賾參驗人區時有可聞者焉其流又有風角遁甲七政元氣六日七分逢占日者挺專須臾孤虛之術及望雲省氣推處祥妖時亦有以效於事也而斯道隱遠玄奧難原故聖人不語怪神罕言性命或開末而抑其端或曲辭以章其義所謂民可使由之不可使知之漢自武帝頗好方術天下懷協道藝之士莫不負策抵掌順風而屆焉後王莽矯用符命及光武尤信讖言士之赴趣時宜者皆騁馳穿鑿爭談之也故王梁孫咸名應圖籙越登槐鼎之任鄭興賈逵以附同稱顯桓談尹敏以乖忤淪敗自是習為內學尚奇文貴異數不乏於時矣是以通儒碩生忿其姦妄不經奏議慷慨以為宜見藏擯子長亦云觀陰陽之書使人拘而多忌蓋為此也夫物之所偏未能無蔽雖云大道其硋或同若乃詩之失愚書之失誣然則數術之失至於詭俗乎如令溫柔敦厚而不愚斯深於詩者也疏通知遠而不誣斯深於書者也極數知變而不詭俗斯深於數術者也故曰苟非其人道不虛行意者多迷其統取遣頗偏甚有雖流宕過誕亦失也中世張衡為陰陽之宗郎顗咎徵最密餘亦班班名家焉其徒亦有雅才偉德未必體極藝能今蓋糾其推變尤長可以弘補時事因合表之云任文公巴郡閬中人也父文孫明曉天官風角祕要文公少修父術州辟從事哀帝時有言越巂太守欲反刺史大懼遣文公等五從事檢行郡界潛伺虛實共止傳舍時暴風卒至文公遽趣白諸從事促去當有逆變來害人者因起駕速驅諸從事未能自發郡果使兵殺之文公獨得免後為治中從事時天大旱白刺史曰五月一日當有大水其變已至不可防救宜令吏人豫為其備刺史不聽文公獨儲大船百姓或聞頗有為防者到其日旱烈文公急命促載使白刺史刺史笑之日將中天北雲起須臾大雨至晡時湔水涌起十餘丈突壞廬舍所害數千人文公遂以占術馳名辟司空掾平帝即位稱疾歸家王莽篡後文公推數知當大亂乃課家人負物百斤環舍趨走日數十時人莫知其故後兵寇並起其逃亡者少能自脫惟文公大小負糧捷步悉得完免遂奔子公山十餘年不被兵革公孫述時蜀武擔石折文公曰噫西州智士死我乃當之自是常會聚子孫設酒食後三月果卒故益部為之語曰任文公智無雙郭憲字子橫汝南宋人也少師事東海王仲子時王莽為大司馬召仲子仲子欲往憲諫曰禮有來學無有往教之義今君賤道畏貴竊所不取仲子曰王公至重不敢違之憲曰今正臨講業且當訖事仲子從之日晏乃往莽問君來何仲子具以憲言對莽陰奇之及後篡位拜憲郎中賜以衣服憲受衣焚之逃于東海之濱莽深忿恚討逐不知所在光武即位求天下有道之人乃徵憲拜博士再遷建武七年代張堪為光祿勳從駕南郊憲在位忽回向東北含酒三潠執法奏為不敬詔問其故憲對曰齊國失火故以此厭之後齊果上火災與郊同日八年車駕西征隗囂憲諫曰天下初定車駕未可以動憲乃當車拔佩刀以斷車靷帝不從遂上隴其後潁川兵起乃回駕而還帝歎曰恨不用子橫之言時胸奴數犯塞帝患之乃召百僚廷議憲以為天下疲敝不宜動衆諫爭不合乃伏地稱眩瞀不復言帝令兩郎扶下殿憲亦不拜帝曰常聞關東觥觥郭子橫竟不虛也憲遂以病辭退卒於家許楊字偉君汝南平輿人也少好術數王莽輔政召為郎稍遷酒泉都尉及莽篡位楊乃變姓名為巫醫逃匿它界莽敗方還鄉里汝南舊有鴻郤陂成帝時丞相翟方進奏毀敗之建武中太守鄧晨欲修復其功聞楊曉水脈召與議之楊曰昔成帝用方進之言尋而自夢上天天帝怒曰何故敗我濯龍淵是後民失其利多致飢困時有謠歌曰敗我陂者翟子威飴我大豆亨我芋魁反乎覆陂當復昔大禹決江疏河以利天下明府今興立廢業富國安民童謠之言將有徵於此誠願以死效力晨大悅因署楊為都水掾使典其事楊因高下形藝起塘四百餘里數年乃立百姓得其便纍歲大稔初豪右大姓因緣陂役競欲辜較在所楊一無聽遂共譖楊受取賕賂晨遂收楊下獄而械輒自解獄吏恐遽白晨晨驚曰果濫矣太守聞忠信可以感靈今其效乎即夜出楊遣歸時天大陰晦道中若有火光照之時人異焉後以病卒晨於都官宮為楊起廟圖畫形像百姓思其功績皆祭祀之高獲字敬公汝南新息人也為人尼首方面少遊學京師與光武有舊師事司徒歐陽歙歙下獄當斷獲冠鐵冠帶鈇鑕詣闕請歙帝雖不赦而引見之謂曰敬公朕欲用子為吏宜改常性獲對曰臣受性於父母不可改之於陛下出便辭去三公爭辟不應後太守鮑昱請獲既至門令主簿就迎主簿曰但使騎吏迎之獲聞之即去昱遣追請獲獲顧曰府君但為主簿所欺不足與談遂不留時郡境大旱獲素善天文曉遁甲能役使鬼神昱自往問何以致雨獲曰急罷三部督郵明府當自北出到三十里亭雨可致也昱從之果得大雨每行縣輒軾其閭獲遂遠遁江南卒於石城石城人思之共為立祠王喬者河東人也顯宗世為葉令喬有神術每月朔望常自縣詣臺朝帝怪其來數而不見車騎密令太史伺望之言其臨至輒有雙鳧從東南飛來於是候鳧至舉羅張之但得一隻舄焉乃詔尚方視則四年中所賜尚書官屬履也每當朝時葉門下鼓不擊自鳴聞於京師後天下玉棺於堂前吏人推排終不搖動喬曰天帝獨召我邪乃沐浴服飾寢其中蓋便立覆宿昔葬於城東土自成墳其夕縣中牛皆流汗喘乏而人無知者百姓乃為立廟號葉君祠牧守每班録皆先謁拜之吏人祈禱無不如應若有違犯亦立能為祟帝乃迎取其鼓置都亭下略無復聲焉或云此即古仙人王子喬也謝夷吾字堯卿會稽山陰人也少為郡吏學風角占候太守第五倫擢為督郵時烏程長有臧釁倫使收案其罪夷吾到縣無所驗但望閣伏哭而還一縣驚怪不知所為及還白倫曰竊以占候知長當死近三十日遠不過六十日遊魂假息非刑所加故不收之倫聽其言至月餘果有驛馬齎長印綬上言暴卒倫以此益禮信之舉孝廉為壽張令稍遷荊州刺史遷巨鹿太守所在愛育人物有善績及倫作司徒令班固為文薦夷吾曰臣聞堯登稷契政隆太平舜用皋陶政致雍熙殷周雖有高宗昌發之君猶賴傅説呂望之策故能克崇其業允協大中竊見巨鹿太守會稽謝夷吾出自東州厥土塗泥而英姿挺特奇偉秀出才兼四科行包九德仁足濟時知周萬物加以少膺儒雅韜含六籍推考星度綜校圖録探賾聖祕觀變歷徵占天知地與神合契據其道德以經王務昔為陪隸與臣從事奮忠毅之操躬史魚之節董臣嚴綱勗臣懦弱得以免戾實賴厥勳及其應選作宰惠敷百里降福彌異流化若神爰牧荊州威行邦國奉法作政有周召之風居儉履約紹公儀之操尋功簡能為外臺之表聽聲察實為九伯之冠遷守巨鹿政合時雍德量績謀有伊呂管晏之任闡弘道奧同史蘇京房之倫雖密勿在公而身出心隱不殉名以求譽不馳騖以要寵念存遜遁演志箕山方之古賢實有倫序採之於今超焉絶俗誠社稷之元龜大漢之棟甍宜當拔擢使登鼎司上令三辰順軌於歷象下使五品咸訓于嘉時必致休徵克昌之慶非徒循法奉職而已臣以頑駑器非其疇尸祿負乘夕惕若厲願乞骸骨更授夷吾上以光七曜之明下以厭率土之望庶令微臣塞咎免悔後以行春乘柴車從兩吏冀州刺史上其儀序失中有損國典左轉下邳令豫剋死日如期果卒勑其子曰漢末當亂必有發掘露骸之禍使懸棺下葬墓不起墳時博士勃海郭鳳亦好圖讖善説災異吉凶占應先自知死期豫令弟子市棺斂具至其日而終楊由字哀侯蜀郡成都人也少習易并七政元氣風雲占候為郡文學掾時有大雀夜集於庫樓上太守廉范以問由由對曰此占郡內當有小兵然不為害後二十餘日廣柔縣蠻夷反殺傷長吏郡發庫兵擊之又有風吹削哺太守以問由由對曰方當有薦木實者其色黃赤頃之五官掾獻橘數包由嘗從人飲勑御者曰酒若三行便宜嚴駕既而趣去後主人舍有鬬相殺者人請問何以知之由曰向社中木上有鳩鬬此兵賊之象也其言多驗著書十餘篇名曰其平終于家李南字孝山丹陽句容人也少篤學明於風角和帝永元中太守馬稜坐盜賊事被徵當詣廷尉吏民不寧南特通謁賀稜意有恨謂曰太守不德今當即罪而君反相賀邪南曰旦有善風明日中時應有吉問故來稱慶旦日稜延望景晏以為無徵至晡乃有驛使齎詔書原停稜事南問其留之狀使者曰向度宛陵浦里斻馬踠足是以不得速稜乃服焉後舉有道辟公府病不行終於家南女亦曉家術為由拳縣人妻晨詣爨室卒有暴風婦便上堂從姑求歸辭其二親姑不許乃跪而泣曰家世傳術疾風卒起先吹竈突及井此禍為婦女主爨者妾將亡之應因著其亡日乃聽還家如期病卒李郃字孟節漢中南鄭人也父頡以儒學稱官至博士郃襲父業遊太學通五經善河洛風星外質朴人莫之識縣召署幕門候吏和帝即位分遣使者皆微服單行各至州縣觀採風謠使者二人當到益部投郃候舍時夏夕露坐郃因仰觀問曰二君發京師時寧知朝廷遣二使邪二人默然驚相視曰不聞也問何以知之郃指星示云有二使星向益州分野故知之耳後三年其使者一人拜漢中太守郃猶為吏太守奇其隱德召署戶曹史時大將軍竇憲納妻天下郡國皆有禮慶郡亦遣使郃進諫曰竇將軍椒房之親不修禮德而專權驕恣危亡之禍可翹足而待願明府一心王室勿與交通太守固遣之郃不能止請求自行許之郃遂所在留以觀其變行至扶風而憲就國自殺支黨悉伏其誅凡交通憲者皆為免官唯漢中太守不豫焉郃歲中舉孝廉五遷尚書令又拜太常元初四年代袁敞為司空數陳得失有忠臣節在位四年坐請託事免安帝崩北鄉侯立復為司徒及北鄉侯病郃陰與少府河南陶範步兵校尉趙直謀立順帝會孫程等事先成故郃功不顯明年坐吏民疾病仍有災異賜策免將作大匠翟酺上郃潛圖大計以安社稷於是録陰謀之功封郃涉都侯辭讓不受年八十餘卒於家門人上黨馮胄獨制服心喪三年時人異之胄字世威奉世之後也常慕周伯況閔仲叔之為人隱處山澤不應徵辟郃子固已見前傳弟子歷字季子清白有節博學善交與鄭玄陳紀等相結為新城長政貴無為亦好方術時天下旱縣界特雨官至奉車都尉段翳字元章廣漢新都人也習易經明風角時有就其學者雖未至必豫知其姓名嘗告守津吏曰某日當有諸生二人荷擔問翳舍處者幸為告之後竟如其言又有一生來學積年自謂略究要術辭歸鄉里翳為合膏藥并以簡書封於筒中告生曰有急發視之生到葭萌與吏爭度津吏檛破從者頭生開筒得書言到葭萌與吏鬬頭破者以此膏裹之生用其言創者即愈生歎服乃還卒業翳遂隱居竄迹終于家廖扶字文起汝南平輿人也習韓詩歐陽尚書教授常數百人父為北地太守永初中坐羌沒郡下獄死扶感父以法喪身憚為吏及服終而歎曰老子有言名與身孰親吾豈為名乎遂絶志世外專精經典尤明天文讖緯風角推步之術州郡公府辟召皆不應就問災異亦無所對扶逆知歲荒乃聚穀數千斛悉用給宗族姻親又斂葬遭疫死亡不能自收者常居先人冢側未曾入城市太守謁煥先為諸生從扶學後臨郡未到先遣吏修門人之禮又欲擢扶子弟固不肯當時人因號為北郭先生年八十終于家二子孟舉偉舉並知名折像字伯式廣漢雒人也其先張江者封折侯曾孫國為鬱林太守徙廣漢因封氏焉國生像國有資財二億家僮八百人像幼有仁心不殺昆蟲不折萌牙能通京氏易好黃老言及國卒感多藏厚亡之義乃散金帛資産周施親疏或諫像曰君三男兩女孫息盈前當增益産業何為坐自殫竭乎像曰昔鬬子文有言我乃逃禍非避富也吾門戶殖財日久盈滿之咎道家所忌今世將衰子又不才不仁而富謂之不幸牆隙而高其崩必疾也智者聞之咸服焉自知亡日召賓客九族飲食辭訣忽然而終時年八十四家無餘資諸子衰劣如其言云樊英字季齊南陽魯陽人也少受業三輔習京氏易兼明五經又善風角星算河洛七緯推步災異隱於壺山之陽受業者四方而至州郡前後禮請不應公卿舉賢良方正有道皆不行嘗有暴風從西方起英謂學者曰成都市火甚盛因含水西向漱之乃令記其日時客後有從蜀都來云是日大火有黑雲卒從東起須臾大雨火遂得滅於是天下稱其術藝安帝初徵為博士至建光元年復詔公車賜策書徵英及同郡孔喬李昺北海郎宗陳留楊倫東平王輔六人唯郎宗楊倫到洛陽英等四人並不至永建二年順帝策書備禮玄纁徵之復固辭疾篤乃詔切責郡縣駕載上道英不得已到京稱病不肯起乃強輿入殿猶不以禮屈帝怒謂英曰朕能生君能殺君能貴君能賤君能富君能貧君君何以慢朕命英曰臣受命於天生盡其命天也死不得其命亦天也陛下焉能生臣焉能殺臣臣見暴君如見仇讎立其朝猶不肯可得而貴乎雖在布衣之列環堵之中晏然自得不易萬乘之尊又可得而賤乎陛下焉能貴臣焉能賤臣臣非禮之祿雖萬鍾不受若申其志雖簞食不厭也陛下焉能富臣焉能貧臣帝不能屈而敬其名使出就太醫養疾月致羊酒至四年三月天子乃為英設壇席令公車令導尚書奉引賜几杖待以師傅之禮延問得失英不敢辭拜五官中郎將數月英稱疾篤詔以為光祿大夫賜告歸令在所送穀千斛常以八月致牛一頭酒三斛如有不幸祠以中牢英辭位不受有詔譬旨勿聽英初被詔命僉以為必不降志及後應對又無奇謨深策談者以為失望初河南張楷與英俱徵既而謂英曰天下有二道出與處也吾前以子之出能輔是君也濟斯人也而子始以不訾之身怒萬乘之主及其享受爵祿又不聞匡救之術進退無所據矣英既善術朝廷每有災異詔輒下問變復之效所言多驗初英著易章句世名樊氏學以圖緯教授潁川陳實少從英學嘗有疾妻遣婢拜問英下牀答拜實怪而問之英曰妻齊也共奉祭祀禮無不答其恭謹若是年七十餘卒於家孫陵靈帝時以諂事宦人為司徒陳郡郤巡學傳英業官至侍中論曰漢世之所謂名士者其風流可知矣雖薥張趣舍時有未純於刻情修容依倚道藝以就其聲價非所能通物方弘時務也及徵樊英楊厚朝廷若待神明至竟無它異英名最高毀最甚李固朱穆等以為處士純盜虛名無益於用故其所以然也然而後進希之以成名世主禮之以得衆原其無用亦所以為用則其有用或歸於無用矣何以言之夫煥乎文章時或乖用本乎禮樂適末或疏及其陶搢紳藻心性使由之而不知者豈非道邈用表乖之數迹乎而或者忽不踐之地賒無用之功至乃誚譟遠術賤斥國華以為力詐可以救淪敝文律足以致寧平智盡於猜察道足於法令雖濟萬世其將與夷狄同也孟軻有言曰以夏變夷不聞變夷於夏況有未濟者乎
