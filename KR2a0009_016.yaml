body:
  text: 後漢書卷十四宗室四王三侯列傳第四齊武王縯字伯升光武之長兄也性剛毅慷慨有大節自王莽篡漢常憤憤懷復社稷之慮不事家人居業傾身破産交結天下雄俊莽末盜賊羣起南方尤甚伯升召諸豪傑計議曰王莽暴虐百姓分崩今枯旱連年兵革並起此亦天亡之時復高祖之業定萬世之秋也衆皆然之於是分遣親客使鄧晨起新野光武與李通李軼起於宛伯升自發舂陵子弟合七八千人部署賓客自稱柱天都部使宗室劉嘉往誘新市平林兵王匡陳牧等合軍而進屠長聚及唐子鄉殺湖陽尉進拔棘陽因欲攻宛至小長安與王莽前隊大夫甄阜屬正梁丘賜戰時天密霧漢軍大敗姊元弟仲皆遇害宗從死者數十人伯升復收會兵衆還保棘陽阜賜乘勝留輜重於藍鄉引精兵十萬南渡黃淳水臨泚沘水阻兩川閒為營絶後橋示無還心新巿平林見漢兵數敗阜賜軍大至各欲解去伯升甚患之會下江兵五千餘人至宜秋乃往為說合從之藝下江從之語在王常傳伯升於是大饗軍士設盟約休卒三日分為六部潛師夜起襲取藍鄉盡獲其輜重明旦漢軍自西南攻甄阜下江兵自東南攻梁丘賜至食時賜陳潰阜軍望見散走漢兵急追之却迫黃淳水斬首溺死者二萬餘人遂斬阜賜王莽納言將軍嚴尤秩宗將軍陳茂聞阜賜軍敗引欲據宛伯升乃陳兵誓衆焚積聚破釜甑鼓行而前與尤茂遇育陽下戰大破之斬首三千餘級尤茂棄軍走伯升遂進圍宛自號柱天大將軍王莽素聞其名大震懼購伯升邑五萬戶黃金十萬斤位上公使長安中官署及天下鄉亭皆畫伯升像於孰旦起射之自阜賜死後百姓日有降者衆至十餘萬諸將會議立劉氏以從人望豪傑咸歸於伯升而新巿平林將帥樂放縱憚伯升威明而貪聖公懦弱先共定策立之然後使騎召伯升示其議伯升曰諸將軍幸欲尊立宗室其德甚厚然愚鄙之見竊有未同今赤眉起青徐衆數十萬聞南陽立宗室恐赤眉復有所立如此必將內爭今王莽未滅而宗室相攻是疑天下而自損權非所以破莽也且首兵唱號鮮有能遂陳勝項籍即其事也舂陵去宛三百里耳未足為功遽自尊立為天下準的使後人得承吾敝非計之善者也今且稱王以號令若赤眉所立者賢相率而往從之若無所立破莽降赤眉然後舉尊號亦未晚也願各詳思之諸將多曰善將軍張卬拔劒擊地曰疑事無功今日之議不得有二衆皆從之聖公既即位拜伯升為大司徒封漢信侯由是豪傑失望多不服平林後部攻新野不能下新野宰登城言曰得司徒劉公一信願先下及伯升軍至即開城門降五月伯升拔宛六月光武破王尋王邑自是兄弟威名益甚更始君臣不自安遂共謀誅伯升乃大會諸將以成其計更始取伯升寶劒視之繡衣御史申屠建隨獻玉玦更始竟不能發及罷會伯升舅樊宏謂伯升曰昔鴻門之會范增舉玦以示項羽今建此意得無不善乎伯升笑而不應初李軼諂事更始貴將光武深疑之常以戒伯升曰此人不可復信又不受伯升部將宗人劉稷數陷陳潰圍勇冠三軍時將兵擊魯陽聞更始立怒曰本起兵圖大事者伯升兄弟也今更始何為者邪更始君臣聞而心忌之以稷為抗威將軍稷不肯拜更始乃與諸將陳兵數千人先收稷將誅之伯升固爭李軼朱鮪因勸更始并執伯升即日害之有二子建武二年立長子章為太原王興為魯王十一年徙章為齊王十五年追諡伯升為齊武王章少孤光武感伯升功業不就撫育恩愛甚篤以其少貴欲令親吏事故使試守平陰令遷梁郡太守立二十一年薨諡曰哀王子煬王石嗣建武二十七年石始就國三十年封石弟張為下博侯永平十四年封石二子為鄉侯石立二十四年薨子晃嗣下博侯張以善論議十六年與奉車都尉竇固等並出擊胸奴後進者多害其能數被譖訴建初中卒肅宗下詔褒揚之復封張子它人奉其祀晃及弟利侯剛與母太姬宗更相誣告章和元年有司奏請免晃剛爵為庶人徙丹陽帝不忍下詔曰朕聞人君正屏有所不聽宗尊為小君宮衛周備出有輜軿之飾入有牖戶之固殆不至如譖者之言晃剛愆乎至行濁乎大倫甫刑三千莫大不孝朕不忍置之于理其貶晃爵為蕪湖侯削剛戶三千於戲小子不勗大道控于法理以墮宗緒其遣謁者收晃及太姬璽綬晃立十七年而降爵晃卒子無忌嗣帝以伯升首創大業而後嗣罪廢心常愍之時北海亦絶無後及崩遺詔令復二國永元二年乃復封無忌為齊王是為惠王立五十二年薨子頃王喜嗣立五年薨子承嗣建安十一年國除論曰大丈夫之鼓動拔起其志致蓋遠矣若夫齊武王之祚厚士豈游俠下客之為哉其慮將存乎配天之絶業而痛明堂之不祀也及其發舉大謀在倉卒擾攘之中使信先成於敵人赦岑彭以顯義若此足以見其度矣志高慮遠禍發所忽嗚呼古人以蜂蠆為戒蓋畏此也詩云敬之敬之命不易哉北海靖王興建武二年封為魯王嗣光武兄仲初南頓君娶同郡樊重女字羔天都羔天都性婉順自為童女不正容服不出於房宗族敬焉生三男三女長男伯升次仲次光武長女黃次元次伯姬皇妣以初起兵時病卒宗人樊巨公收斂焉建武二年封黃為湖陽長公主伯姬為寧平長公主元與仲俱歿於小長安追爵元為新野長公主十五年追諡仲為儕王興其歲試守緱氏令為人有明略善聽訟甚得名稱遷弘農太守亦有善政視事四年上疏乞骸骨徵還京師奉朝請二十七年始就國明年以魯國益東海故徙興為北海王三十式封興子復為臨邑侯中元二年又封興二子為縣侯顯宗器重興每有異政輒乘驛問焉立三十九年薨子敬王睦嗣睦少好學博通書傳光武愛之數被延納顯宗之在東宮尤見幸待入侍諷誦出則執轡中興初禁網尚闊而睦性謙恭好士千里交結自名儒宿德莫不造門由是聲價益廣永平中法憲頗峻睦乃謝絶賓客放心音樂然性好讀書常為愛玩歲終遣中大夫奉璧朝賀召而謂之曰朝廷設問寡人大夫將何辭以對使者曰大王忠孝慈仁敬賢樂士臣雖螻蟻敢不以實睦曰吁子危我哉此乃孤幼時進趣之行也大夫其對以孤襲爵以來志意衰惰聲色是娛犬馬是好使者受命而行其能屈申若此初靖王薨悉推財産與諸弟雖王車服珍寶非列侯制皆以為分然後隨以金帛贖之睦能屬文作春秋旨義終始論及賦頌數十篇又善史書當世以為楷則及寢病帝驛馬令作草書尺牘十首立十年薨子哀王基嗣永平十八年封基二弟為縣侯二弟為鄉侯建初二年又封基弟毅為平望侯基立十四年薨無子肅宗憐之不除其國永元二年和帝封睦庶子斟鄉侯威為北海王奉睦後立七年威以非睦子又坐誹謗檻車徵詣廷尉道自殺永初元年鄧太后復封睦孫壽光侯普為北海王是為頃王延光二年復封睦少子為亭侯普立十七年薨子恭王翼嗣立十四年薨子康王嗣無後建安十一年國除初臨邑侯復好學能文章永平中每有講學事輒令復典掌焉與班固賈逵共述漢史傅毅等皆宗事之復子騊駼及從兄平望侯毅並有才學永寧中鄧太后召毅及騊駼入東觀與謁者僕射劉珍著中興以下名臣列士傳騊駼又自造賦頌書論凡四篇趙孝王谷次伯光武之叔父也平帝時舉孝廉為蕭令光武兄弟少孤釆噹甚篤及光武起兵以事告良大怒曰汝與伯升志操不同今家欲危亡而反共謀如是既而不得已從軍至小長安漢兵大敗良妻及二子皆被害更始立以良為國三老從入關更始敗良聞光武即位乃亡奔洛陽建武二年封良為廣陽王五年徙為趙王始就國十三年降為趙公頻歲來朝十七年薨于京師凡立十六年子節王栩嗣建武三十年封栩二子為鄉侯建初二年復封栩十子為亭侯栩立四十年薨子頃王商嗣永元三年封商三弟為亭侯元年封商四子為亭侯商立二十三年薨子靖王宏嗣立十二年薨子惠王乾嗣元初五年封乾二弟為亭侯是歲趙相奏乾居父喪私娉小妻又白衣出司馬門坐削中丘縣時郎中南陽程堅素有志行拜為乾傅堅輔以禮義乾改悔前過堅列上復所削縣本初元年封乾一子為亭侯乾立四十八年薨子懷王豫嗣豫薨子獻王赦嗣赦薨子圭嗣建安十八年徙封博陵王立九年魏初以為崇德侯城陽恭王祉字巨伯光武族兄舂陵康侯敞之子也敞曾祖父節侯買以長沙定王子封於零道之舂陵鄉為舂陵侯買卒子戴侯熊渠嗣熊渠卒子考侯仁嗣仁以舂陵地藝下溼山林毒氣上書求減邑內徙元帝初元四年徙封南陽之白水鄉猶以舂陵為國名遂與從弟巨鹿都尉回及宗族往家焉仁卒子敞嗣敞謙儉好義盡推父時金寶財産與昆弟荊州刺史上其義行拜廬江都尉歲餘會族兄安衆侯劉崇起兵王莽畏惡劉氏徵敞至長安免歸國先是平帝時敞與崇俱朝京師助祭明堂崇見莽將危漢室私謂敞曰安漢公擅國權羣臣莫不回從社稷傾覆至矣太后春秋高天子幼弱高皇帝所以分封子弟蓋為此也敞心然之及崇事敗敞懼欲結援樹黨乃為祉娶高陵侯翟宣女為妻會宣弟義起兵欲攻莽南陽捕殺宣女祉坐繫獄敞因上書謝罪願率子弟宗族為士卒先莽新居攝欲慰安宗室故不被刑誅及莽篡立劉氏為侯者皆降稱子食孤卿祿後皆奪爵及敞卒祉遂特見廢又不得官為吏祉以故侯嫡子行淳厚宗室皆敬之及光武起兵祉兄弟相率從軍前隊大夫甄阜盡收其家屬繫宛獄及漢兵敗小長安祉挺身還保棘陽甄阜盡殺其母弟妻子更始立以祉為太常將軍紹封舂陵侯從西入關封為定陶王別將擊破劉嬰於臨涇及更始降於赤眉祉乃閒行亡奔洛陽是時宗室唯祉先至光武見之歡甚建武二年封為城陽王賜乘輿御物車馬衣服追諡敞為康侯十一年祉疾病上城陽王璽綬願以列侯奉先人祭祀帝自臨其疾祉薨年四十三諡曰恭王竟不之國葬於洛陽北芒十三年封祉嫡子平為蔡陽侯以奉祉祀平弟堅為高鄉侯初建武二年以皇祖皇考墓為昌陵置陵令守視後改為章陵因以舂陵為章陵縣十八年立考侯康侯廟比園陵置嗇夫詔零陵郡奉祠節侯戴侯廟以四時及臘歲五祠焉置嗇夫佐吏各一人平後坐與諸王交通國除永平五年顯宗更封平為竟陵侯平卒子真嗣真卒子禹嗣禹卒子嘉嗣泗水王歙字經孫光武族父也歙子終與光武少相親愛漢兵起始及唐子終誘殺湖陽尉更始立歙從入關封為元氏王終為侍中更始敗歙終東奔洛陽建武二年立歙為泗水王終為淄川王十年歙薨封小子燀為堂溪侯奉歙後終喪思慕哭泣二十餘日亦薨封長子柱為邔侯以奉終祀又封終子鳳曲陽侯歙從父弟茂年十八漢兵之起茂自號劉失職亦聚衆京密閒稱厭新將軍攻下潁川汝南衆十餘萬人光武既至河內茂率衆降封為中山王十三年宗室為王者皆降為侯更封茂為穰侯茂弟匡亦與漢兵俱起建武二年封宜春侯為人謙遜永平中為宗正子浮嗣封朝陽侯浮弟屆永元中為征西將軍浮傳國至孫護無子封絶延光中護從兄瓌與安帝乳母王聖女伯榮私通遂取伯榮為妻得紹護封為朝陽侯位侍中及王聖敗貶爵為亭侯安成孝侯賜字子琴光武族兄也祖父利蒼梧太守賜少孤兄顯報怨殺人吏捕顯殺之賜與顯子信賣田宅同拋財産結客報吏皆亡命逃伏遭赦歸會伯升起兵乃隨從攻擊諸縣更始既立以賜為光祿勳封廣漢侯及伯升被害代為大司徒將兵討汝南未及平更始又以信為奮威大將軍代賜擊汝南賜與更始俱到洛陽更始欲令親近大將徇河北未知所使賜言諸家子獨有文叔可用大司馬朱鮪等以為不可更始狐疑賜深勸之乃拜光武行大司馬持節過河是日以賜為丞相令先入關修宗廟宮室還迎更始都長安封賜為宛王拜前大司馬使持節鎮撫關東二年春賜就國於屆典將六部兵後赤眉破更始賜所領六部亦稍散畔乃去宛保育陽聞光武即位乃西之武關迎更始妻子將詣洛陽帝嘉賜忠建武二年封為慎侯十三年更增戶邑定封為安成侯奉朝請以賜有恩信故親厚之數蒙宴私時幸其第恩賜特異賜輒賑與故舊無有遺積帝為營冢堂起祠廟置吏卒如舂陵孝侯二十八年卒子閔嗣三十年帝復封閔弟嵩為白牛侯坐楚事辭語相連國除閔卒子商嗣徙封為白牛侯商卒子昌嗣初信為更始討平汝南因封為汝陰王信遂將兵平定江南據豫章光武即位桂陽太守張隆擊破之信乃詣洛陽降以為汝陰侯永平十三年亦坐楚事國除成武孝侯順字平仲光武族兄也父慶舂陵侯敞同産弟順與光武同里閈少相厚更始即位以慶為燕王順為虎牙將軍會更始降赤眉慶為亂兵所叔殺順乃閒行詣光武拜為南陽太守建武二年封成武侯邑戶最大租入倍宗室諸家八年使擊破六安賊因拜為六安太守數年帝欲徵之吏人上書請留十一年卒帝使使者迎喪親自臨弔子遵嗣坐與諸王交通降為端氏侯遵卒子弇嗣弇卒無嗣國除永平十年顯宗幸章陵追念舊恩封順弟子三人為鄉侯初順叔父弘娶於樊氏皇妣之從妹也生二子敏國與母隨更始在長安建武二年詣洛陽光武封敏為甘里侯國為弋陽侯敏通經有行永平初官至越騎校尉弘弟梁以俠氣聞更始元年起兵豫章欲徇江東自號就漢大將軍暴病卒順陽懷侯嘉字孝孫光武族兄也父憲舂陵侯敞同産弟嘉少孤性仁厚南頓君養視如子後與伯升俱學長安習尚書春秋及義兵起嘉隨更始征伐漢軍之敗小長安也嘉妻子遇害更始即位以為偏將軍及攻破宛封興德侯遷大將軍擊延岑於冠軍降之更始既都長安以嘉為漢中王扶威大將軍持節就國都於南鄭衆數十萬建武二年延岑復反攻漢中圍南鄭嘉兵敗走岑遂定漢中進兵武都為更始柱功侯李寶所破岑走天水公孫述遣將侯丹取南鄭嘉收散卒得數萬人以寶為相從武都南擊侯丹不利還軍河池下辨復與延岑連戰岑引北入散關至陳倉嘉追擊破之更始鄧王廖湛將赤眉十八萬攻嘉嘉與戰於谷口大破之嘉手殺湛遂到雲陽就穀李寶等聞鄧禹西征擁兵自守勸嘉且觀成敗光武聞之告禹曰孝孫素謹善少且親愛當是長安輕薄兒誘圻捸禹即宣帝旨嘉乃因來歙詣禹於雲陽三年到洛陽從征伐拜為千乘太守六年病上書乞骸骨徵詣京師十三年封為順陽侯秋復封嘉子牆為黃李侯十五年嘉卒子參嗣有罪削為南鄉侯永平中參為城門校尉參卒子循嗣循卒子章嗣贊曰齊武沈雄義戈乘風倉卒匪圖亡我天工城陽早協趙孝晚同泗水三侯或恩或功
