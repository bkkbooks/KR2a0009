body:
  text: 後漢書卷十九耿弇列傳第九弟國國子秉秉弟夔國弟子恭耿弇字伯昭扶風茂陵人也其先武帝時以吏二千石自巨鹿徙焉父況字俠遊以明經為郎與王莽從弟伋共學老子於安丘先生後為朔調連率弇少好學習父業常見郡尉試騎士建旗鼓肄馳射由是好將帥之事及王莽敗更始立諸將略地者前後多擅威權輒改易守令況自以莽之所置懷不自安時弇年二十一乃辭況奉奏詣更始因齎貢獻以求自固之宜及至宋子會王郎詐稱成帝子子輿起兵邯鄲弇從吏孫倉衛包於道共謀曰劉子輿成帝正統捨此不歸遠行安之弇按劒曰子輿弊賊卒為降虜耳我至長安與國家陳漁陽上谷兵馬之用還出太原代郡反覆數十日歸發突騎以轔烏合之衆如摧枯折腐耳觀公等不識去就族滅不久也倉包不從遂亡降王郎弇道聞光武在盧奴乃馳北上謁光武留署門下吏弇因説護軍朱祐求歸發兵以定邯鄲光武笑曰小兒曹乃有大意哉因數召見加恩慰弇因從光武北至薊聞邯鄲兵方到光武將欲南歸召官屬計議弇曰今兵從南來不可南行漁陽太守彭竉公之邑人上谷太守即弇父也發此兩郡控弦萬騎邯鄲不足慮也光武官屬腹心皆不肯曰死尚南首奈何北行入囊中光武指弇曰是我北道主人也會薊中亂光武遂南馳官屬各分散弇走昌平就況因説況使寇恂東約彭寵各發突騎二千匹步兵千人弇與景丹寇恂及漁陽兵合軍而南所過擊斬王郎大將九卿校尉以下四百餘級得印綬百二十五節二斬首三萬級定涿郡中山巨鹿清河河間凡二十二縣遂及光武於廣阿是時光武方攻王郎傳言二郡兵為邯鄲來衆皆恐既而悉詣營上謁光武見弇等説曰當與漁陽上谷士大夫共此大功乃皆以為偏將軍使還領其兵加況大將軍興義侯得自置偏禆弇等遂從拔邯鄲時更始徵代郡太守趙永而況勸永不應召令詣于光武光武遣永復郡永北還而代令張曄據城反畔乃招迎胸奴烏桓以為援助光武以弇弟舒為復胡將軍使擊曄破之永乃得復郡時五校賊二十餘萬北寇上谷況與舒連擊破之賊皆退走更始見光武威聲日盛君臣疑慮乃遣使立光武為蕭王令罷兵與諸將有功者還長安遣苗曾為幽州牧韋順為上谷太守蔡充為漁陽太守並北之部時光武居邯鄲宮晝臥溫明殿弇入造牀下請間因説曰今更始失政君臣淫亂諸將擅命於畿內貴戚縱橫於都內天子之命不出城門所在牧守輒自遷易百姓不知所從士人莫敢自安虜掠財物劫掠婦女懷金玉者至不生歸元元叩心更思莽朝又銅馬赤眉之屬數十輩輩數十百萬聖公不能辦也其敗不久公首事南陽破百萬之軍今定河北北據天府之地以義征伐發號響應天下可傳檄而定天下至重不可令它姓得之聞使者從西方來欲罷兵不可從也今吏士死亡者多弇願歸幽州益發精兵以集其大計光武大説乃拜弇為大將軍與吳漢北發幽州十郡兵弇到上谷收韋順蔡充斬之漢亦誅苗曾於是悉發幽州兵引而南從光武擊破銅馬高湖赤眉青犢又追尤來大槍五幡於元氏弇常將精騎為軍鋒輒破走之光武乘勝戰慎順水上虜危急殊死戰時軍士疲弊遂大敗奔還壁范陽數日乃振賊亦退去從追至容城小廣陽安次連戰破之光武還薊復遣弇與吳漢景丹蓋延朱祐邳彤耿純劉植岑彭祭遵堅鐔王霸陳俊馬武十三將軍追賊至潞東及平谷再戰斬首萬三千餘級遂窮追於右北平無終土垠之間至浚俊靡而還賊散入遼西遼東或為烏桓貊人所鈔擊略盡光武即位拜弇為建威大將軍與驃騎大將軍景丹強弩將軍陳俊攻厭新賊於敖倉皆破降之建武二年更封好畤侯食好畤美陽二縣三年延岑自武關出攻南陽下數城穰人杜弘率其衆以從岑弇與岑等戰於穰大破之斬首三千餘級生獲其將士五千餘人得印綬三百杜弘降岑與數騎遁走東陽弇從幸舂陵因見自請北收上谷兵未發者定彭竉於漁陽取張豐於涿郡還收富平獲索東攻張步以平齊地帝壯其意乃許之四年詔弇進攻漁陽弇以父據上谷本與彭寵同功又兄弟無在京師者自疑不敢獨進上書求詣洛陽詔報曰將軍出身舉宗為國所向陷敵功效尤著何嫌何疑而欲求徵且與王常共屯涿郡勉思方略況聞弇求徵亦不自安遣舒弟國入侍帝善之進封況為隃麋侯乃命弇與建義大將軍朱祐漢忠將軍王常等擊望都故安西山賊十餘營皆破之時征虜將軍祭遵屯良鄉驍騎將車劉喜屯陽鄉以拒彭寵寵遣弟純將胸奴二千餘騎寵自引兵數萬分為兩道以擊遵喜胡騎經軍都舒襲破其衆斬胸奴兩王寵乃退走況復與舒攻寵取軍都五年寵死天子嘉況功使光祿大夫持節迎況賜甲第奉朝請封舒為牟平侯遣弇與吳漢擊富平獲索賊於平原大破之降者四萬餘人因詔弇進討張步弇悉收集降卒結部曲置將吏率騎都尉劉歆太山太守陳俊引兵而東從朝陽橋濟河以度張步聞之乃使其大將軍費邑軍歷下又分兵屯祝阿別於太山鐘城列營數十以侍弇弇度河先擊祝阿自旦攻城日未中而拔之故開圍一角令其衆得奔歸鐘城鐘城人聞祝阿已潰大恐懼遂空壁亡去費邑分遣弟敢守巨里弇進兵先脅巨里使多伐樹木揚言以填塞坑數日有降者言邑聞弇欲攻巨里謀來救之弇乃嚴令軍中趣修攻具宣勑諸部後三日當悉力攻巨里城陰緩生口令得亡歸歸者以弇期告邑邑至日果自將精兵三萬餘人來救之弇喜謂諸將曰吾所以修攻具者欲誘致邑耳今來適其所求也即分三千人守巨里自行精兵上岡阪乘高合戰大破之臨陳斬邑既而收首級以示巨里城中城中凶懼費敢悉衆亡歸張步弇復收其積聚縱兵擊諸未下者平四十餘營遂定濟南時張步都劇使其弟藍將精兵二萬守西安諸郡太守合萬餘人守臨淄相去四十里盒進軍畫中居二城之間弇視西安城小而堅且藍兵又精臨淄名雖大而實易攻乃勑諸校會後五日攻西安藍聞之晨夜警守至期夜半弇勑諸將皆蓐食會明至臨淄城護軍荀梁等爭之以為宜速攻西安弇曰不然西安聞吾欲攻之日夜為備臨淄出不意而至必驚擾吾攻之一日必拔拔臨淄即西安孤張藍與步隔絶必復亡去所謂擊一而得二者也若先攻西安不卒下頓兵堅城死傷必多縱能拔之藍引軍還奔臨淄并兵合藝觀人虛實吾深入敵地後無轉輸旬月日之間不戰而困諸君之言未見其宜遂攻臨淄半日拔之入據其城張藍聞之大懼遂將其衆亡歸劇弇乃令軍中無得妄掠劇下須張步至乃取之以激怒步步聞大笑曰以尤來大彤十餘萬衆吾皆即其營而破之今大耿兵少於彼又皆疲勞何足懼乎乃與三弟藍弘壽及故大彤渠帥重異等兵號二十萬至臨淄大城東將攻弇弇先出淄水上與重異遇突騎欲縱弇恐挫其鋒令步不敢進故示弱以盛其氣乃引歸小城陳兵於內步氣盛直攻弇營與劉歆等合戰弇升王宮壞臺望之視歆等鋒交乃自引精兵以橫突步陳於東城下大破之飛矢中弇股以佩刀截之左右無知者至暮罷弇明旦復勒兵出是時帝在魯聞弇為步所攻自往救之未至陳俊謂弇曰劇虜兵盛可且閉營休士以須上來弇曰乘輿且到臣子當擊牛釃酒以待百官反欲以賊虜遺君父邪乃出兵大戰自旦及昏復大破之殺傷無數城中溝皆滿弇知步困將退豫置左右翼為伏以待之人定時步果引去伏兵起縱擊追至巨昧水上八九十里僵尸相屬收得輜重二千餘兩步還劇兄弟各分兵散去後數日車駕至臨淄自勞軍羣臣大會帝謂弇曰昔韓信破歷下以開基今將軍攻祝阿以發迹此皆齊之西界功足相方而韓信襲擊已降將軍獨拔勍敵其功乃難於信也又田橫亨酈生及田橫降高帝詔衛尉不聽為仇張步前亦殺伏隆若步來歸命吾當詔大司徒釋其怨又事尤相類也將軍前在南陽建此大策常以為落落難合有志者事竟成也弇因復追步步奔平壽乃肉袒負斧鑕於軍門弇傳步詣行在所而勒兵入據其城樹十二郡旗鼓令步兵各以郡人詣旗下衆尚十餘萬輜重七千餘兩皆罷遣歸鄉里弇復引兵至城陽降五校餘黨齊地悉平振旅還京師六年西拒隗囂屯兵於漆八年從上隴明年與中郎將來歙分部徇安定北地諸營保皆下之弇凡所平郡四十六屠城三百未常嘗挫折十二年況疾病乘輿數自臨幸復以國弟廣舉並為中郎將弇兄弟六人皆垂青紫省侍醫藥當代以為榮及況卒諡烈侯少子霸襲況爵十三年增弇戶邑上大將軍印綬罷以列侯奉朝請每有四方異議輒召入問籌策年五十六永平元年卒諡曰愍侯子忠嗣忠以騎都尉擊胸奴於天山有功忠卒子馮嗣馮卒子良嗣一名無禁延光中尚安帝妹濮陽長公主位至侍中良卒子協嗣隃麋侯霸卒子文金嗣文金卒子喜嗣喜卒子顯嗣為羽林左監顯卒子援嗣尚桓帝妹長社公主為河陽東太守後曹操誅耿氏唯援孫弘存焉牟平侯舒卒子襲嗣尚顯宗女隆慮公主襲卒子寶嗣寶女弟為清河孝王妃及安帝立尊孝王母為孝德皇后以妃為甘園大貴人帝以寶元舅之重使監羽林左車騎位至大將軍而附事內寵與中常侍樊豐帝乳母王聖等譖廢皇太子為濟陰王及排陷太尉楊震議者怨之寶弟子承襲公主爵為林慮侯位至侍中安帝崩閻太后以寶等阿附嬖幸共為不道策免及承皆貶爵為亭侯遣就國寶於道自殺國除大貴人數為耿氏請陽嘉三年順帝遂詔紹封寶子箕牟平侯為侍中以恆為陽亭侯承為羽林中郎將其後貴人薨大將軍梁冀從承求貴人珍玩不能得冀怒風有司奏奪其封承惶恐遂亡匿於穰數年冀推迹得之乃并族其家十餘人論曰淮陰廷論項王審料成藝則知高祖之廟勝矣耿弇決策河北定計南陽亦見光武之業成矣然弇自剋拔全齊而無復尺寸功夫豈不懷將時之度數不足以相容乎三世為將道家所忌而耿氏纍葉以功名自終將其用兵欲以殺止殺乎何其獨能隆也國字叔慮建武四年初入侍光武拜為黃門侍郎應對左右帝以為能遷射聲校尉七年射聲官罷拜駙馬都尉父況卒國於次當嗣上疏以先侯愛少子霸固自陳讓有詔許焉後歷頓丘陽翟上蔡令所在吏人稱之徵為五官中郎將是時烏桓鮮卑屢寇外境國素有籌策數言邊事帝器之及胸奴薁鞬日逐王比自立為呼韓邪單于款塞稱藩願扞禦北虜事下公卿議者皆以為天下初定中國空虛夷狄情偽難知不可許國獨曰臣以為宜如孝宣故事受之令東扞鮮卑北拒胸奴率厲四夷完復邊郡使塞下無晏開之警萬世有安寧之策也帝從其議遂立比為南單于由是烏桓鮮卑保塞自守北虜遠遁中國少事二十七年代馮勤為大司馬農又上言宜置度遼將軍左右校尉屯五原以防逃亡永平元年卒官顯宗追思國言後遂置度遼將軍左右校尉如其議焉國二子秉夔秉字伯初有偉體帶八圍博通書記能説司馬兵法尤好將帥之略以父任為郎數上言兵事常以中國虛費邊陲不寧其患專在胸奴以戰去戰盛王之道顯宗既有志北伐陰然其言永平中召詣省闥問前後所上便宜方略拜謁者僕射遂見親幸每公卿會議常引秉上殿訪以邊事多簡帝心十五年拜駙馬都尉十六年以騎都尉秦彭為副與奉車都尉竇固等俱伐北胸奴虜皆奔走不戰而還十七年夏詔秉與固合兵萬四千騎復出白山擊車師車師有後王前王前王即後王之子其廷相去五百餘里固以後王道遠山谷深士卒寒苦欲攻前王秉議先赴後王以為并力根本則前王自服固計未決秉奮身而起曰請行前乃上馬引兵北入衆軍不得已遂進並縱兵抄掠斬首數千級收馬牛十餘萬頭後王安得震怖從數百騎出迎秉而固司馬蘇安欲全功歸固即馳謂安得曰漢貴將獨有奉車都尉天子姊壻爵為通侯當先降之安得乃還更令其諸將迎秉秉大怒被甲上馬麾其精騎徑造固壁言曰車師王降訖今不至請往梟其首固大驚曰且止將敗事秉厲聲曰受降如受敵遂馳赴之安得惶恐走出門脫帽抱馬足降秉將以詣固其前王亦歸命遂定車師而還明年秋肅宗即位拜秉征西將軍遣案行涼州邊境勞賜保塞羌胡進屯酒泉救戊己校尉建初元年拜度遼將軍視事七年胸奴懷其恩信徵為執金吾甚見親重帝每巡郡國及幸宮觀秉常領禁兵宿衛左右除三子為郎章和二年復拜征西將軍副車騎將軍竇憲擊北胸奴大破之事并事憲傳封秉美陽侯食邑三千戶秉性勇壯而簡易於事軍行常自被甲在前休止不結營部然遠斥候明要誓有警軍陳立成士卒皆樂為死永元二年代桓虞為光祿勳明年夏卒時年五十餘賜以朱棺玉衣將作大匠穿冢假鼓吹五營騎士三百餘人送葬諡曰桓侯胸奴聞秉卒舉國號哭或至梨面流血長子沖嗣及竇憲敗以秉竇氏黨國除沖官至漢陽太守曾孫紀少有美名辟公府曹操甚敬異之稍遷少府紀以操將篡漢建安二十三年與大醫令吉丞相司直韋況晃曄謀起兵誅操不克夷三族于時衣冠盛門坐紀罹禍滅者衆矣夔字定公少有氣決永元初為車騎將軍竇憲假司馬北擊胸奴轉車騎都尉三年憲復出河西以夔為大將軍左校尉將精騎八百出居延塞直奔北單于廷於金微山斬閼氏名王已下五千餘級單于與數騎脫亡盡獲其胸奴珍寶財畜去塞五千餘里而還自漢出師所未嘗至也乃封夔粟邑侯會北單于弟左鹿蠡王於除鞬自立為單于衆八部二萬餘人來居蒲類海上遣使款塞以夔為中郎將持節衛護之及竇憲敗夔亦免官奪爵土後復為長水校尉拜五原太守遷遼東太守元興元年貊人寇郡界夔追擊斬其渠帥永初三年南單于檀反畔使夔率鮮卑及諸郡兵屯鴈門與車騎將軍何熙共擊之熙推夔為先鋒而遣其司馬耿溥劉祉將二千人與夔俱進到屬國故城單于遣薁鞬日逐王三千餘人遮漢兵夔自擊其左令鮮卑攻其右虜遂敗走追斬千餘級殺其名王六人獲穹廬車重千餘兩馬畜生口甚衆鮮卑馬多羸病遂畔出塞夔不能獨進以不窮追左轉雲中太守後遷行度遼將軍事夔勇而有氣數侵陵使胸奴中郎將鄭戩元初元年坐徵下獄以減死論笞二百建光中復拜度遼將軍時鮮卑攻殺雲中太守成嚴圍烏桓校尉徐常於馬城夔與幽州刺史龐參救之追虜出塞而還後坐法免卒於家恭字伯宗國弟廣之子也少孤慷慨多大略有將帥才永平十七年冬騎都尉劉張出擊車師請恭為司馬與奉車都尉竇固及從弟駙馬都尉秉破降之始置西域都護戊己校尉乃以恭為戊己校尉屯後王部金蒲城謁者關寵為戊己校尉屯前王柳中城屯各置數百人恭至部移檄烏孫示漢威德大昆彌已下皆歡喜遣使獻名馬及奉宣帝時所賜公主博具願遣子入侍恭乃發使齎金帛迎其侍子明年三月北單于遣左鹿蠡王二萬騎擊車師恭遣司馬將兵三百人救之道逢胸奴騎多皆為所歿胸奴遂破殺後王安得而攻金蒲城恭乘城搏戰以毒藥傅矢傳語胸奴曰漢家箭神其中瘡者必有異因發強弩射之虜中矢者視創皆沸遂大驚會天暴風雨隨雨擊之殺傷甚衆胸奴震怖相謂曰漢兵神真可畏也遂解去恭以疏勒城傍有澗水可固五月乃引兵據之七月胸奴復來攻恭恭募先登數千人直馳之胡騎散走胸奴遂於城下擁絶澗水恭於城中穿井十五丈不得水吏士渴乏笮馬糞汁而飲之恭仰歎曰聞昔二師將軍拔佩刀刺山飛泉涌出今漢德神明豈有窮哉乃整衣服向井再拜為吏士禱有頃水泉奔出衆皆稱萬歲乃令吏士揚水以示虜虜出不意以為神明遂引去時焉耆龜茲攻歿都護陳睦北虜亦圍關寵於柳中會顯宗崩救兵不至車師復畔與胸奴共攻恭恭厲士衆擊走之後王夫人先世漢人常私以虜情告恭又給以糧餉數月食盡窮困乃煮鎧弩食其筋革恭與士推誠同死生故皆無二心而稍稍死亡餘數十人單于知恭已困欲必降之復遣使招恭曰若降者當封為白屋王妻以女子恭乃誘其使上城手擊殺之炙諸城上虜官屬望見號哭而去單于大怒更益兵圍恭不能下初關寵上書求救時肅宗新即位乃詔公卿會議司空第五倫以為不宜救司徒鮑昱議曰今使人於危難之地急而棄之外則縱蠻夷之暴內則傷死難之臣誠令權時後無邊事可也胸奴如復犯塞為寇陛下將何以使將又二部兵人裁各數十胸奴圍之歷旬不下是其寡弱盡力之效也可令敦煌酒泉太守各將精騎二千多其幡幟倍道兼行以赴其急胸奴疲極之兵必不敢當四十日間足還入塞帝然之乃遣征西將軍耿秉屯酒泉行太守事遣秦彭與謁者王蒙皇甫援發張掖酒泉敦煌三郡及鄯善兵合七千餘人建初元年正月會柳中擊車師攻交河城斬首三千八百級獲生口三千餘人駝驢馬牛羊三萬七千頭北虜驚走車師復降會關寵已歿蒙等聞之便欲引兵還先是恭遣軍吏范羌至敦煌迎兵士寒服羌因隨王蒙軍俱出塞羌固請迎恭諸將不敢前乃分兵二千人與羌從山北迎恭遇大雪丈餘軍僅能至城中夜聞兵馬聲以為虜來大驚羌乃遙呼曰我范羌也漢遣軍迎校尉耳城中皆稱萬歲開門共相持涕泣明日遂相隨俱歸虜兵追之且戰且行吏士素飢困發疏勒時尚有二十六人隨路死沒三月至玉門唯餘十三人衣屨穿決形容枯稿中郎將鄭衆為恭已下洗沐易衣冠上疏曰耿恭以單兵固守孤城當胸奴之對數萬之衆連月踰年心力困盡鑿山為井煮弩為糧出於萬死無一生之望前後殺傷醜虜數千百計卒全忠勇不為大漢恥恭之節義古今未有宜蒙顯爵以厲將帥及恭至雒陽鮑昱奏恭節過蘇武宜蒙爵賞於是拜為騎都尉以恭司馬石修為雒陽市丞張封為雍營司馬軍吏范羌為共丞餘九人皆補羽林恭母先卒及還追行喪制有詔使五官中郎將齎牛酒釋服明年遷長水校尉其秋金城隴西羌反恭上疏言方略詔召入問狀乃遣恭將五校士三千人副車騎將軍馬防討西羌恭屯枹罕數與羌接戰明年秋燒當羌降防還京師恭留擊諸未服者首虜千餘人獲牛羊四萬餘頭勒姐燒何羌等十三種數萬人皆詣恭降初恭出隴西上言故安豐侯竇融昔在西州甚得羌胡腹心今大鴻臚固即其子孫前擊白山功冠三軍宜奉大使鎮撫涼部令車騎將軍防屯軍漢陽以為威重由是大忤於防及防還監營謁者李談承旨奏恭不憂軍事被詔怨望坐徵下獄免官歸本郡卒於家子溥為京兆虎牙都尉元初二年擊畔羌於丁奚城軍敗遂歿詔拜溥子宏譁並為郎曄字季遇順帝初為烏桓校尉時鮮卑寇緣邊殺代郡太守曄率烏桓及諸郡卒出塞討擊大破之鮮卑震怖數萬人詣遼東降自後頻出輒克獲威振北方遷度遼將軍耿氏自中興已後迄建安之末大將軍二人將軍九人卿十三人尚公主三人列侯十九人中郎將護羌校尉及刺史二千石數十百人遂與漢興衰云論曰余初讀蘇武傳感其茹毛窮海不為大漢羞後覽耿恭疏勒之事喟然不覺涕之無從嗟哉義重於生以至是乎昔曹子抗質於柯盟相如申威於河表蓋以決一旦之負異乎百死之地也以為二漢當疏高爵宥十世而蘇君恩不及嗣恭亦終填牢戶追誦龍蛇之章以為歎息贊曰好畤經武能畫能兵往收燕卒來集漢營請間趙殿釃酒齊城況舒率從亦既有成國圖久策分此凶狄秉洽胡情夔單虜迹慊慊伯宗枯泉飛液
