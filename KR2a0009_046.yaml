body:
  text: 後漢書卷四十一第五鍾離宋寒列傳第三十一第五倫曾孫種宋均族子意第五倫字伯魚京兆長陵人也其先齊諸田諸田徙園陵者多故以次第為氏倫少介然有義行王莽末盜賊起宗族閭里爭往附之倫乃依險固築營壁有賊輒奮厲其衆引強持滿以拒之銅馬赤眉之屬前後數十輩皆不能下倫始以營長詣郡尹鮮于褒褒見而異之署為吏後褒坐事左轉高唐令臨去握倫臂訣曰恨相知晚倫後為鄉嗇夫平徭賦理怨結得人歡心自以為久宦不達遂將家屬客河東變名姓自稱王伯齊載鹽往來太原上黨所過輒為糞除而去陌上號為道士親友故人莫知其處數年鮮于褒薦之於京兆尹閻興興即召倫為主簿時長安鑄錢多姦巧乃署倫為督鑄錢掾領長安巿倫平銓衡正斗斛巿無阿枉百姓悅服每讀詔書常歎息曰此聖主也一見決矣等輩笑之曰爾説將尚不下安能動萬乘乎倫曰未遇知己道不同故耳建武二十七年舉孝廉補淮陽國醫工長隨王之國光武召見甚異之二十九年從王朝京師隨官屬得會見帝問以政事倫因此酬對政道帝大悅明日復特召入與語至夕帝戲謂倫曰聞卿為吏篣婦公不過從兄飯寧有之邪倫對曰臣三娶妻皆無父少遭飢亂實不敢妄過人食帝大笑倫出有詔以為扶夷長未到官追拜會稽太守雖為二千石躬自斬芻養馬妻執炊爨受俸裁留一月糧餘皆賤貿與民之貧羸者會稽俗多淫祀好卜筮民常以牛祭神百姓財産以之困匱其自食牛肉而不以薦祠者發病且死先為牛鳴前後郡將莫敢禁倫到官移書屬縣曉告百姓其巫祝有依託鬼神詐怖愚民皆案論之有妄屠牛者吏輒行罰民初頗恐懼或祝詛妄言倫案之愈急後遂斷絶百姓以安永平五年坐法徵老小攀車叩馬啼呼相隨日裁行數里不得前倫乃偽止亭舍陰乘船去衆知復追之及詣廷尉吏民上書守闕者千餘人是時顯宗方案梁松事亦多為松訟者帝患之詔公車諸為梁氏及會稽太守上書者勿復受會帝幸廷尉録囚徒得免歸田里身自耕種不交通人物數歲拜為宕渠令顯拔鄉佐玄賀賀後為九江沛二郡守以清潔稱所在化行終於大司農倫在職四年遷蜀郡太守蜀地肥饒人吏富實掾史家資多至千萬皆鮮車怒馬以財貨自達倫悉簡其豐贍者遣還之更選孤貧志行之人以處曹任於是爭賕抑絶文職修理所舉吏多至九卿二千石時以為知人視事七歲肅宗初立擢自遠郡代牟融為司空帝以明德太后故尊崇舅氏馬廖兄弟並居職任廖等傾身交結冠蓋之士爭赴趣之倫以后族過盛欲令朝廷抑損其權上疏曰臣聞忠不隱諱直不避害不勝愚狷昧死自表書曰臣無作威作福其害于而家凶于而國傳曰大夫無境外之交束修之饋近代光烈皇后雖友愛天至而卒使陰就歸國徙廢陰興賓客其後梁竇之家互有非法明帝即位竟多誅之自是洛中無復權戚書記請託一皆斷絶又譬諸外戚曰苦身待士不如為國戴盆望天事不兩施臣常刻著五臧書諸紳帶而今之議者復以馬氏為言竊聞衛尉廖以布三千匹城門校尉防以錢三百萬私贍三輔衣冠知與不知莫不畢給又聞臘日亦遺其在洛中者錢各五千越騎校尉光臘用羊三百頭米四百斛肉五千斤臣愚以為不應經義惶恐不敢不以聞陛下情欲厚之亦宜所以安之臣今言此誠欲上忠陛下下全后家裁蒙省察及馬防為車騎將軍當出征西羌倫又上疏曰臣愚以為貴戚可封侯以富之不當職事以任之何者繩以法則傷恩私以親則違憲伏聞馬防今當西征臣以太后恩仁陛下至孝恐卒有纖介難為意愛聞防請杜篤為從事中郎多賜財帛篤為鄉里所廢客居美陽女弟為馬氏妻恃此交通在所縣令苦其不法收繫論之今來防所議者咸致疑怪況乃以為從事將恐議及朝廷今宜為選賢能以輔助之不可復令防自請人有損事望苟有所懷敢不自聞並不見省用倫雖峭直然常疾俗吏苛刻及為三公值帝長者屢有善政乃上疏褒稱盛美因以勸成風德曰陛下即位躬天然之德體晏晏之姿以寬弘臨下出入四年前歲誅刺史二千石貪殘者六人斯皆明聖所鑒非羣下所及然詔書每下寬和而政急不解務存節儉而奢侈不止者咎在俗敝羣下不稱故也光武承王莽之餘頗以嚴猛為政後代因之遂成風化郡國所舉類多辨職俗吏殊未有寬博之選以應上求者也陳留令劉豫冠軍令駟協並以刻薄之姿臨人宰邑專念掠殺務為嚴苦吏民愁怨莫不疾之而今之議者反以為能違天心失經義誠不可不慎也非徒應坐豫協亦當宜譴舉者務進仁賢以任時政不過數人則風俗自化矣臣嘗讀書記知秦以酷急亡國又目見王莽亦以苛法自滅故勤勸懇懇實在於此又聞諸王主貴戚驕奢踰制京師尚然何以示遠故曰其身不正雖令不行從以身教者從以言教者訟夫陰陽和歲乃豐君臣同心化乃成也其刺史太守以下拜除京師及道出洛陽者宜皆召見可因博問四方兼以觀察其人諸上書言事有不合者可但報歸田里不宜過加喜怒以明在寬臣愚不足採及諸馬得罪歸國而竇氏始貴倫復上疏曰臣得以空虛之質當輔弼之任素性駑怯位尊爵重拘迫大義思自策厲雖遭百死不敢擇地又況親遇危言之世哉今承百王之敝人尚文巧咸趨邪路莫能守正伏見虎賁中郎將竇憲椒房之親典司禁兵出入省闥年盛志美卑謙樂善此誠其好士交結之方然諸出入貴戚者類多瑕興八刀禁錮之人尤少守約安貧之節士大夫無志之徒更相販賣雲集其門衆喣飄山聚蚊成雷蓋驕佚所從生也三輔論議者至云以貴戚廢錮當復以貴戚浣濯之猶解酲當以酒也詖險趣藝之徒誠不可親近臣愚願陛下中宮嚴勑憲等閉門自守無妄交通士大夫防其未萌慮於無形令憲永保福祿君臣交歡無纖介之隙此臣之至所願也倫奉公盡節言事無所依違諸子或時諫止輒叱遣之吏人奏記及便宜者亦并封上其無私若此性質賣心少文采在位以貞白稱時人方之前朝貢禹然少蘊藉不修威儀亦以此見輕或問倫曰公有私乎對曰昔人有與吾千里馬者吾雖不受每三公有所選舉心不能忘而亦終不用也吾兄子常病一夜十往退而安寢吾子有疾雖不省視而竟夕不眠若是者豈可謂無私乎連以老病上疏乞身元和三年賜策罷以二千石奉終其身加賜錢五十萬公宅一區後數年卒時年八十餘詔賜祕器衣衾錢布少子頡嗣歷桂陽廬江南陽太守所在見稱順帝之為太子廢也頡為太中大夫與太僕來歷等共守闕固爭帝即位擢為將作大匠卒官倫曾孫種論曰第五倫峭核為方非夫愷悌之士省其奏議惇惇歸諸寬厚將懲苛切之敝使其然乎昔人以弦韋為佩蓋猶此矣然而君子侈不僭上儉不逼下豈尊臨千里而與牧圉等庸乎詎非矯激則未可以中和言也種字興先少厲志義為吏冠名州郡永壽中以司徒掾清詔使冀州廉察災害舉奏刺史二千石以下所刑免甚衆𠫓廾官奔走者數十人還以奉使稱職拜高密侯相是時徐兗二州盜賊群輩高密在二州之郊種乃大儲糧勤厲吏士賊聞皆憚之桴鼓不鳴流民歸者歲中至數千家以能換為衛相遷兗州刺史中常侍單超兄子匡為濟陰太守負藝貪放種欲收舉未知所使會聞從事衛羽素抗厲乃召羽具告之謂曰聞公不畏強禦今欲相委以重事若何對曰願庶幾於一割羽出遂馳至定陶閉門收匡賓客親吏四十餘人六七日中糾發其臧五六千萬種即奏匡并以劾超匡窘迫遣刺客刺羽羽覺其姦乃收繫客具得情狀州內震栗朝廷嗟歎之是時太山賊叔孫無忌等暴橫一境州郡不能討羽説種曰中國安寧忘戰日久而太山險阻寇猾不制今雖有精兵難以赴敵羽請往譬降之種敬諾羽乃往備説禍福無忌即帥其黨與三千餘人降單超積懷忿恨遂以事陷種竟坐徙朔方超外孫董援為朔方太守怒以待之初種為衛相以門下掾孫斌賢善遇之及當徙斥斌具聞超謀乃謂其友人同縣閭子直及高密甄子然曰蓋盜憎其主從來舊矣第五使君當投裔土而單超外屬為彼郡守夫危者易仆可為寒心吾今方追使君庶免其難若奉使君以還將以付子二人曰子其行矣是吾心也於是斌將俠客晨夜追種及之於太原遮險格殺送吏因下馬與種斌自步從一日一夜行四百餘里遂得脫歸種匿於閭甄氏數年徐州從事臧旻上書訟之曰臣聞士有忍死之辱必有就事之計故季布屈節於朱家管仲錯行於召忽此二臣以可死而不死者非愛身於須臾貪命於苟活隱其智力顧其權略庶幸逢時有所為耳卒遭高帝之成業齊桓之興伯遺其亡逃之行赦其射鉤之讎拔於囚虜之中信其佐國之謀勳效傳於百世君臣載於篇籍假令二主紀過於纖介則此二臣同死於犬馬沈名於溝壑當何由得申其補過之功建其奇奧之術乎伏見故兗州刺史第五種傑然自建在鄉曲無苞苴之嫌步朝堂無擇言之闕天性疾惡公方不曲故論者説清高以種為上序直士以種為首春秋之義選人所長𠫓廾其所短録其小善除其大過種所坐以盜賊公負筋力未就罪至徵徙非有大惡昔虞舜事親大杖則走故種逃亡苟全性命冀有朱家之路以顯季布之會願陛下無遺須臾之恩令種有持忠入地之恨會赦出卒於家鍾離意字子阿會稽山陰人也少為郡督郵時部縣亭長有受人酒禮者府下記案考之意封還記入言於太守曰春秋先內後外詩云刑於寡妻以御于家邦明政化之本由近及遠今宜先清府內且闊略遠縣細微之愆太守甚賢之遂任以縣事建武十四年會稽大疫死者萬數意獨身自隱親經給醫藥所部多蒙全濟舉孝廉再遷辟大司徒侯霸府詔部送徒詣河內時冬寒徒病不能行路過弘農意輒移屬縣使作徒衣縣不得已與之而上書言狀意亦具以聞光武得奏以見視霸曰君所使掾何乃仁於用心誠良吏也意遂於道解徒桎梏恣所欲過與剋期俱至無或違者還以病免後除瑕丘令吏有建者盜竊縣內意屏人問狀建叩頭服罪不忍加刑遣令長休建父聞之為建設酒謂曰吾聞無道之君以刃殘人有道之君以義行誅子罪命也遂令建進藥而死二十五年遷堂邑令縣人防廣為父報讎繫獄其母病死廣哭泣不食意憐傷之乃聽廣歸家使得殯斂丞掾皆爭意曰罪自我歸義不纍下遂遣之廣斂母訖果還入獄意密以狀聞廣竟得以減死論顯宗即位徵為尚書時交址太守張恢坐臧千金徵還伏法以資物簿入大司農詔班賜羣臣意得珠璣悉以委地而不拜賜帝怪而問其故對曰臣聞孔子忍渴於盜泉之水曾參回車於勝母之閭惡其名也此臧穢之寶誠不敢拜帝嗟歎曰清乎尚書之言乃更以庫錢三十萬賜意轉為尚書僕射車駕數幸廣成苑意以為從禽廢政常當車陳諫般樂遊田之事天子即時還宮永平三年夏旱而大起北宮意詣闕免冠上疏曰伏見陛下以天時小旱憂念元元降避正殿躬自克責而比日密雲遂無大潤豈政有未得應天心者邪昔成湯遭旱以六事自責曰政不節邪使人疾邪宮室榮邪女謁盛邪苞苴行邪讒夫昌邪竊見北宮大作人失農時此所謂宮室榮也自古非苦宮室小狹但患人不安寧宜且罷止以應天心臣意以匹夫之才無有行能久食重祿擢備近臣比受厚賜喜懼相并不勝愚戇征營罪當萬死帝策詔報曰湯引六事咎在一人其冠履勿謝比上天降旱密雲數會朕戚然慙懼思獲嘉應故分布禱請窺候風雲北祈明堂南設雩場今又勑大匠止作諸宮減省不急庶消災譴詔因謝公卿百僚遂應時澍雨焉時詔賜降胡子縑尚書案事誤以十為百帝見司農上簿大怒召郎將笞之意因入叩頭曰過誤之失常人所容若以懈慢為愆則臣位大罪重郎位小罪輕咎皆在臣臣當先坐乃解衣就格帝意解使復冠而貰郎帝性褊察好以耳目隱發為明故公卿大臣數被詆毀近臣尚書以下至見提拽常嘗以事怒郎藥嵩以杖撞之嵩走入牀下帝怒甚疾言曰郎出郎出嵩曰天子穆穆諸侯煌煌未聞人君自起撞郎帝赦之朝廷莫不悚栗爭為嚴切以避誅責唯意獨敢諫爭數封還詔書臣下過失輒救解之會連有變異意復上疏曰伏惟陛下躬行孝道修明經術郊祀天地畏敬鬼神憂恤黎元勞心不怠而天氣未和日月不明水泉湧溢寒暑違節者咎在羣臣不能宣化理職而以苛刻為俗吏殺良人繼踵不絶百官無相親之心吏人無雍雍之志至於骨肉相殘毒害彌深感逆和氣以致天災百姓可以德勝難以力服先王要道民用和睦故能致天下和平災害不生禍亂不作鹿鳴之詩必言宴樂者以人神之心洽然後天氣和也願陛下垂聖德揆萬機詔有司慎人命緩刑罰順時氣以調陰陽垂之無極帝雖不能用然知其至誠亦以此故不得久留出為魯相後德陽殿成百官大會帝思意言謂公卿曰鍾離尚書若在此殿不立意視事五年以愛利為化人多殷富以久病卒官遺言上書陳升平之世難以急化宜少寬假帝感傷其意下詔嗟歎賜錢二十萬藥嵩者河內人天性朴忠家貧為郎常獨直臺上無被枕食糟粳帝每夜入臺輒見嵩問其故甚嘉之自此詔太官賜尚書以下朝夕餐給帷被皂袍及侍史二人嵩官至南陽太守宋均字叔庠南陽安衆人也父伯建武初為五官中郎將均以父任為郎時年十五好經書每休沐日輒受業博士通詩禮善論難至二十餘調補辰陽長其俗少學者而信巫鬼均為立學校禁絶淫祀人皆安之以祖母喪去官客授潁川後為謁者會武陵蠻反圍武威將軍劉尚詔使均乘傳發江夏奔命三千人往救之既至而尚已沒會伏波將軍馬援至詔因令均監軍與諸將俱進賊拒不得前及馬援卒於師軍士多溫溼疾病死者太半均慮軍遂不反乃與諸將議曰今道遠士病不可以戰欲權承制降之何如諸將皆伏地莫敢應均曰夫忠臣出竟有可以安國家專之可也乃矯制調伏波司馬呂种守沅陵長命种奉詔書入虜營告以恩信因勒兵隨其後蠻夷震怖即共斬其大帥而降於是入賊營散其衆遣歸本郡為置長吏而還均未至先自劾矯制之罪光武嘉其功迎賜以金帛令過家上冢其後每有四方異議數訪問焉遷上蔡令時府下記禁人喪葬不得侈長均曰夫送終踰制失之輕者今有不義之民尚未循化而遽罰過禮非政之先竟不肯施行遷九江太守郡多虎暴數為民患常募設檻穽而猶多傷害均到下記屬縣曰夫虎豹在山黿鼉在水各有所託且江淮之有猛獸猶北土之有雞豚也今為民害咎在殘吏而勞勤張捕非憂恤之本也其務退姦貪思進忠善可一去檻穽除削課制其後傳言虎相與東遊度江中元元年山陽楚沛多蝗其飛至九江界者輒東西散去由是名稱遠近浚遒縣有唐后二山民共祠之衆巫遂取百姓男女以為公嫗歲歲改易既而不敢嫁娶前後守令莫敢禁均乃下書曰自今以後為山娶者皆娶巫家勿擾良民於是遂絶永平元年遷東海相在郡五年坐法免官客授潁川而東海吏民思均恩化為之作歌詣闕乞還者數千人顯宗以其能七年徵拜尚書令每有駮議多合上旨均嘗刪翦疑事帝以為有姦大怒收郎縛格之諸尚書惶恐皆叩頭謝罪均顧厲色曰蓋忠臣執義無有二心若畏威失正均雖死不易志小黃門在傍入具以聞帝善其不撓即令貰郎遷均司隸校尉數月出為河內太守政化大行均常嘗寢病百姓耆老為禱請旦夕問起居其為民愛若此以疾上書乞免詔除子條為太子舍人均自扶輿詣闕謝恩帝使中黃門慰問因留養疾司徒缺帝以均才任宰相召入視其疾令兩騶扶之均拜謝曰天罰有罪所苦浸篤不復奉望帷幄因流涕而辭帝甚傷之召條扶侍均出賜錢三十萬均性寬和不喜文法常以為吏能弘厚雖貪汙放縱猶無所害至於苛察之人身或廉法而巧黠刻削毒加百姓災害流亡所由而作及在尚書恆欲叩頭爭之以時方嚴切故遂不敢陳帝後聞其言而追悲之建初元年卒於家族子意意字伯志父京以大夏侯尚書教授至遼東太守意少傳父業顯宗時舉孝廉以召對合旨擢拜阿陽侯相建初中徵為尚書肅宗性寬仁而親親之恩篤故叔父濟南中山二王每數入朝特加恩寵及諸昆弟並留京師不遣就國意以為人臣有節不宜踰禮過恩乃上疏諫曰陛下至孝蒸蒸恩愛隆深以濟南王康中山王焉先帝昆弟特蒙禮寵聖情戀戀不忍遠離比年朝見久留京師崇以叔父之尊同之家人之禮車入殿門即席不拜分甘損膳賞賜優渥昔周公懷聖人之德有致太平之功然後王曰叔父加以錫幣今康焉幸以支庶享食大國陛下即位蠲除前過還所削黜衍食它縣男女少長並受爵邑恩寵踰制禮敬過度春秋之義諸父昆弟無所不臣所以尊尊卑卑強幹弱枝者也陛下德業隆盛當為萬世典法不宜以私恩損上下之序失君臣之正又西平王羡等六王皆妻子成家官屬備其當早就蕃國為子孫基址而室第相望久磐京邑婚姻之盛過於本朝僕馬之衆充塞城郭驕奢僭擬寵祿隆過今諸國之封並皆膏腴風氣平調道路夷近朝聘有期行來不難宜割情不忍以義斷恩發遣康焉各歸蕃國令羡等速就便時以塞衆望帝納之章和二年鮮卑擊破北胸奴而南單于乘此請兵北伐因欲還歸舊庭時竇太后臨朝議欲從之意上疏曰夫戎狄之隔遠中國幽處北極界以沙漠簡賤禮義無有上下強者為雄弱即屈服自漢興以來征伐數矣其所剋獲曾不補害光武皇帝躬服金革之難深昭天地之明故因其來降羈縻畜養邊人得生勞役休息於茲四十餘年矣今鮮卑奉順斬獲萬數中國坐享大功而百姓不知其勞漢興功烈於斯為盛所以然者夷虜相攻無損漢兵者也臣察鮮卑侵伐胸奴正是利其抄掠及歸功聖朝實由貪得重賞今若聽南虜還都北庭則不得不禁制鮮卑鮮卑外失暴掠之願內無功勞之賞豺狼貪婪必為邊患今北虜西遁請求和親宜因其歸附以為外扞巍巍之業無以過此若引兵費賦以順南虜則坐失上略去安即危矣誠不可許會南單于竟不北徙遷司隸校尉永元初大將軍竇憲兄弟貴盛步兵校尉鄧疊河南尹王調故蜀郡太守廉范等羣黨出入憲門負藝放縱意隨違舉奏無所回避由是與竇氏有隙二年病卒孫俱靈帝時為司空寒朗字伯奇魯國薛人也生三日遭天下亂𠫓廾之荊棘數日兵解母往視猶尚氣息遂收養之及長好經學博通書傳以尚書教授舉孝廉永平中以謁者守侍御史與三府掾屬共考案楚獄顏忠王平等辭連及隧鄉侯耿建朗陵侯臧信護澤侯鄧鯉曲成侯劉建建等辭未嘗與忠平相見是時顯宗怒甚吏皆惶恐諸所連及率一切陷入無敢以情恕者朗心傷其冤試以建等物色獨問忠平而二人錯不能對朗知其詐乃上言建等無姦專為忠平所誣疑天下無辜類多如此帝乃召朗入問曰建等即如是忠平何故引之朗對曰忠平自知所犯不道故多有虛引冀以自明帝曰即如是四侯無事何不早奏獄竟而久繫至今邪朗對曰臣雖考之無事然恐海內別有發其姦者故未敢時上帝怒罵曰吏持兩端促提下左右方引去朗曰願一言而死小臣不敢欺欲助國耳帝問曰誰與共為章對曰臣自知當必族滅不敢多樜染人誠冀陛下一覺悟而已臣見考囚在事者咸共言妖惡大故臣子所宜同疾今出之不如入之可無後責是以考一連十考十連百又公卿朝會陛下問以得失皆長跪言舊制大罪禍及九族陛下大恩裁止於身天下幸甚及其歸舍口雖不言而仰屋竊歎莫不知其多冤無敢忤陛下者臣今所陳誠死無悔帝意解詔遣朗出後二日車駕自幸洛陽獄録囚徒理出千餘人後平忠死獄中朗乃自繫會赦免官復舉孝廉建初中肅宗大會羣臣朗前謝恩詔以朗納忠先帝拜為易長歲餘遷濟陽令以母喪去官百姓追思之章和元年上行東巡狩過濟陽三老吏人上書陳朗前政治狀帝至梁召見朗詔三府為辟首由是辟司徒府永元中再遷清河太守坐法免永初三年太尉張禹薦朗為博士徵詣公車會卒時年八十四論曰左丘明有言仁人之言其利博哉晏子一言齊侯省刑若鍾離意之就格請過寒朗之廷爭冤獄篤矣乎仁者之情也夫正直本於忠誠則不詭本於諫爭則絞切彼二子之所本得乎天故言信而志行也贊曰伯魚子阿矯急去苛臨官以潔匡帝以奢宋均達政禁此妖禜禽蟲畏德子民請病意明尊尊割恩蕃屏惵惵楚黎寒君為命
