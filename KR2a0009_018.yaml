body:
  text: 後漢書卷十六鄧寇列傳第六鄧禹子訓孫騭寇恂曾孫榮鄧禹字仲華南陽新野人也年十三能誦詩受業長安時光武亦游學京師禹年雖幼而見光武知非常人遂相親附數年歸家及漢兵起更始立豪桀多薦舉禹禹不肯從及聞光武安集河北即杖策北渡追及於鄴光武見之甚歡謂曰我得專封拜生遠來寧欲仕乎禹曰不願也光武曰即如是何欲為禹曰但願明公威德加於四海禹得效其尺寸垂功名於竹帛耳光武笑因留宿閒語禹進說曰更始雖都關西今山東未安赤眉青犢之屬動以萬數三輔假號往往羣聚更始既未有所挫而不自聽斷諸將皆庸人屈起志在財幣爭用威力朝夕自快而已非有忠良明智深慮遠圖欲尊主安民者也四方分崩離析形藝可見明公雖建藩輔之功猶恐無所成立於今之計莫如延攬英雄務悅民心立高祖之業救萬民之命以公而慮天下不足定也光武大悅因令左右號禹曰鄧將軍常宿止於中與定計議及王郎起兵光武自薊至信都使禹發奔命得數千人令自將之別攻拔樂陽從至廣阿光武舍城樓上披輿地圖指示禹曰天下郡國如是今始乃得其一子前言以吾慮天下不足定何也禹曰方今海內殽亂人思明君猶赤子之慕慈母古之興者在德薄厚不以大小光武悅時任使諸將多訪於禹禹每有所舉者皆當其才光武以為知人使別將騎與蓋延等擊銅馬於清陽延等先至戰不利還保城為賊所圍禹遂進與戰破之生獲其大將從光武追賊至滿蒲陽連大克獲北州略定及赤眉西入關更始使定國上公王匡襄邑王成丹抗威將軍劉均及諸將分據河東弘農以拒之赤眉衆大集王匡等莫能當光武籌赤眉必破長安欲乘舋并關中而方自事山東未知所寄以禹沈深有大度故授以西討之略乃拜為前將軍持節中分麾下精兵二萬人遣西入關令自選偏裨以下可與俱者於是以韓歆為軍師李文李春程慮為祭酒馮愔為積弩將軍樊崇為驍騎將軍宗歆為車騎將軍鄧尋為建威將軍耿欣為赤眉將軍左于為軍師將軍引而西建武元年正月禹自箕關將入河東河東都尉守關不開禹攻十日破之獲輜重千餘乘進圍安邑數月未能下更始大將軍樊參將數萬人度大陽欲攻禹禹遣諸將逆擊於解南大破之斬參首於是王匡成丹劉均等合軍十餘萬復共擊禹禹軍不利樊崇戰死會日暮戰罷軍師韓歆及諸將見兵藝已摧皆勸禹夜去禹不聽明日癸亥匡等以六甲窮日不出禹因得更理兵勒衆明旦匡悉軍出攻禹禹令軍中無得妄動既至營下因傳發諸將鼓而並進大破之匡等皆棄軍亡走禹率輕騎急追獲劉均及河東太守楊寶持節中郎將弭彊皆斬之收得節六印綬五百兵器不可勝數遂定河東承制拜李文為河東太守悉更置屬縣令長以鎮撫之是月光武即位於鄗使使者持節拜禹為大司徒策曰制詔前將軍禹深執忠孝與朕謀謨帷幄決勝千里孔子曰自吾有回門人日親斬將破軍平定山西功效尤著百姓不親五品不訓汝作司徒敬敷五教五教在寬今遣奉車都尉授印綬封為酇侯食邑萬戶敬之哉禹時年二十四遂渡汾陰河入夏陽更始中郎將左輔都尉公乘歙引其衆十萬與左馮翊兵共拒禹於衙禹復破走之而赤眉遂入長安是時三輔連覆敗赤眉所過殘賊百姓不知所歸聞禹乘勝獨剋而師行有紀皆望風相攜負以迎軍降者日以千數衆號百萬禹所止輒停車住節以勞來之父老童稚垂髮戴白滿其車下莫不感悅於是名震關西帝嘉之數賜書褒美諸將豪傑皆勸禹徑攻長安禹曰不然今吾衆雖多能戰者少前無可仰之積後無轉饋之資赤眉新拔長安財富充實鋒鋭未可當也夫盜賊羣居無終日之計財穀雖多變故萬端寧能堅守者也上郡北地安定三郡土廣人稀饒穀多畜吾且休兵北道就糧養士以觀其弊乃可圖也於是引軍北至栒邑禹所到擊破赤眉別將諸營保郡邑皆開門歸附西河太守宗育遣子奉檄降禹遣詣京師帝以關中未定而禹久不進兵下勑曰司徒堯也亡賊桀也長安吏人遑遑無所依歸宜以時進討鎮慰西京繫百姓之心禹猶執前意乃分遣將軍別攻上郡諸縣更徵兵引穀歸至大要遣馮愔宗歆守栒邑二人爭權相攻愔遂殺歆因反擊禹禹遣使以聞帝帝問使人愔所親愛為誰對曰護軍黃防帝度愔防不能久和執必相忤因報禹曰縛馮愔者必黃防也乃遣尚書宗廣持節降之後月餘防果執愔將其衆歸罪更始諸將王匡胡殷成丹等皆詣廣降與共東歸至安邑道欲亡廣悉斬之愔至洛陽赦不誅二年春遣使者更封禹為梁侯食四縣時赤眉西走扶風禹乃南至長安軍昆明池大饗士卒率諸將齊戒擇吉日修禮謁祠高廟收十一帝神主遣使奉詣洛陽因循行園陵為置吏士奉守焉禹引兵與延岑戰於藍田不克復就穀雲陽漢中王劉嘉詣禹降嘉相李寶倨慢無禮禹斬之寶弟收寶部曲擊禹殺將軍耿欣自馮愔反後禹威稍損又乏食歸附者離散而赤眉復還入長安禹與戰敗走至高陵軍士飢餓者皆食棗菜帝乃徵禹還勑曰赤眉無穀自當來東吾折捶笞之非諸將憂也無得復妄進兵禹慙於受任而功不遂數以飢卒徼戰輒不利三年春與車騎將軍鄧弘擊赤眉遂為所敗衆皆死散事在馮異傳獨與二十四騎還詣宜陽謝上大司徒梁侯印綬有詔歸侯印綬數月拜右將軍延岑自敗於東陽遂與秦豐合四年春復寇順陽閒遣禹護復漢將軍鄧曄輔漢將軍于匡擊破岑於鄧追至武當復破之岑奔漢中餘黨悉降十三年天下平定諸功臣皆增戶邑定封禹為高密侯食高密昌安夷安淳于四縣帝以禹功高封弟寬為明親侯其後左右將軍官罷以特進奉朝請禹內文明篤行淳備事母至孝天下既定常欲遠名藝有子十三人各使守一藝修整閨門教養子孫皆可以為後世法資用國邑不修産利帝益重之中元元年復行司悄從東巡狩封岱宗顯宗即位以禹先帝元功拜為太傅進見東向甚見尊寵居歲餘寢疾帝數自臨問以子男二人為郎永平元年年五十七薨諡曰元侯帝分禹封為三國長子震為高密侯襲為昌安侯珍為夷安侯禹少子鴻好籌策永平中以為小侯引入與議邊事帝以為能拜將兵長史率五營士屯鴈門肅宗時為度遼將軍永元中與大將軍竇憲俱出擊胸奴有功徵行車騎將軍出塞追畔胡逢侯坐逗留下獄死高密侯震卒子乾嗣乾怵膌女沁水公主永元十四年陰皇后巫蠱事發乾從兄奉以后舅被誅乾從坐國除元興元年和帝復封乾本國拜侍中乾卒子成嗣成卒子褒嗣褒尚安帝妹舞陰長公主桓帝時為少府褒卒長子某嗣少子昌襲母爵為舞陰侯拜黃門侍郎昌安侯襲嗣子藩亦尚顯宗女平臯長公主和帝時為侍中夷安侯珍子康少有操行兄良襲封無後永初六年紹封康為夷安侯時諸紹封者皆食故國半租康以皇太后戚屬獨三分食二以侍祠侯為越騎校尉康以太后久臨朝政宗門盛滿數上書長樂宮諫爭宜崇公室自損私權言甚切至太后不從康心懷畏懼永寧元年遂謝病不朝太后使內侍者問之時宮人出入多能有所毀譽其中耆宿皆稱中大人所使者乃康家先婢亦自通中大人康聞詬之曰汝我家出亦敢爾邪婢怨恚還說康詐疾而言不遜太后大怒遂免康官遣歸國絶屬籍及從兄騭誅安帝徵康為侍中順帝立為太僕有方正稱名重朝廷以病免加位特進陽嘉三年卒諡曰義侯論曰夫變通之世君臣相擇斯最作事謀始之幾也鄧公嬴糧徒步觸紛亂而赴光武可謂識所從會矣於是中分麾下之軍以臨山西之隙至使關河響動懷赴如歸功雖不遂而道亦弘矣及其威損栒邑兵散宜陽褫龍章於終朝就侯服以卒歲榮悴交而下無二色進退用而上無猜情使君臣之美後世莫窺其閒不亦君子之致為乎訓字平叔禹第六子也少有大志不好文學禹常非之顯宗即位初以為郎中訓樂施下士士大夫多歸之永平中理呼沱石臼河從都慮至羊腸倉欲令通漕太原吏人苦役連年無成轉運所經三百八十九隘前後沒溺死者不可勝算建初三年拜訓謁者使監領其事訓考量隱括知大功難立具以上言肅宗從之遂罷其役更用驢輦歲省費億萬計全活徒士數千人楔谷太守任興欲誅赤沙烏桓烏桓怨恨謀反詔訓將黎陽營兵屯狐奴以防其變訓撫接邊民為幽部所歸六年遷護烏桓校尉黎陽故人多攜將老幼樂隨訓徙邊鮮卑聞其威恩皆不敢南近塞下八年舞陰公主子梁扈有罪訓坐私與扈通書徵免歸閭里元和三年盧水胡反畔以訓為謁者乘傳到武威拜張掖太守章和二年護羌校尉張紆誘誅燒當種羌迷吾等由是諸羌大怒謀欲報怨朝廷憂之公卿舉訓代紆為校尉諸羌激忿遂相與解仇結婚交質盟詛衆四萬餘人期冰合度河攻訓先是小月氏胡分居塞內勝兵者二三千騎皆勇健富彊每與羌戰常以少制多雖首施兩端漢亦時收其用時迷吾子迷唐別與武威種羌合兵萬騎來至塞下未敢攻訓先欲脅月氏胡訓擁衛稽故令不得戰議者咸以羌胡相攻縣官之利以夷伐夷不宜禁護訓曰不然今張紆失信衆羌大動經常屯兵不下二萬轉運之費空竭府帑涼州吏人命縣絲髮原諸胡所以難得意者皆恩信不厚耳今因其迫急以德懷之庶能有用遂令開城及所居園門悉驅羣胡妻子內之嚴兵守衛羌掠無所得又不敢逼諸胡因即解去由是湟中諸胡皆言漢家常欲鬬我曹今鄧使君待我以恩信開門內我妻子乃得父母咸歡喜叩頭曰唯使君所命訓遂撫養其中少年勇者數百人以為義從羌胡俗恥病死每病臨困輒以刃自刺訓聞有困疾者輒拘持縛束不與兵刃使醫藥療之愈者非一小大莫不感悅於是賞賂諸羌種使相招誘迷唐伯父號吾乃將其母及種人八百戶自塞外來降訓因發湟中秦胡羌兵四千人出塞掩擊迷唐於寫谷斬首虜六百餘人得馬牛羊萬餘頭迷唐乃去大小榆居頗巖谷衆悉破散其春復欲歸故地就田業訓乃發湟中六千人令長史任尚將之縫革為船置於箄上以度河掩擊迷唐廬落大豪多所斬獲復追逐奔北會尚等夜為羌所攻於是義從羌胡并力破之斬首前後一千八百餘級獲生口二千人馬牛羊三萬餘頭一種殆盡迷唐遂收其餘部遠徙廬落西行千餘里諸附落小種皆背畔之燒當豪帥東號稽顙歸死餘皆款塞納質於是綏接歸附威信大行遂罷屯兵各令歸郡唯置弛刑徒二千餘人分以屯田為貧人耕種修理城郭塢壁而已永元二式大將軍竇憲將兵鎮武威憲以訓曉羌胡方略上求俱行訓初厚於馬氏不為諸竇所親及憲誅故不離其禍訓雖寬中容衆而於閨門甚嚴兄弟莫不敬憚諸子進見未嘗賜席接以溫色四年冬病卒官時年五十三吏人羌胡愛惜旦夕臨者日數千人戎俗父母死恥悲泣皆騎馬歌呼至聞訓卒莫不吼號或以刀自割又刺殺其犬馬牛羊日鄧使君已死我曹亦俱死耳前烏桓吏士皆奔走道路至空城郭吏執不聽以狀白校尉徐傿傿歎息曰此義也乃釋之遂家家為訓立祠每有疾病輒此請禱求福元興元年和帝以訓皇后之父使謁者持節至訓墓賜策追封諡曰平壽敬侯中宮自臨百官大會訓五子騭京悝弘閶騭字昭伯少辟大將軍竇憲府及女弟為貴人騭兄弟皆除郎中及貴人立是為和熹皇后騭三遷虎賁中郎將京悝弘閶皆黃門侍郎京卒於官延平元年拜騭車騎將軍儀同三司儀同三司始自騭也悝虎賁中郎將弘閶皆侍中殤帝崩太后與騭等定策立安帝悝遷城門校尉弘虎賁中郎將自和帝崩後騭兄弟常居禁中騭謙遜不欲久在內連求還第歲餘太后乃許之永初元年封騭上蔡侯悝葉侯弘西平侯閶西華侯食邑各萬戶騭以定策功增邑三千戶騭等辭讓不獲遂逃避使者閒關詣闕上疏自陳曰臣兄弟汙濊無分可採過以外戚遭值明時託日月之末光被雲雨之渥澤並統列位光昭當世不能宣贊風美補助清化誠慙誠懼無以處心陛下躬天然之姿體仁聖之德遭國不造仍離大憂開日月之明運獨斷之慮援立皇統奉承大宗聖策定於神心休烈垂於不朽本非臣等所能萬一而猥推嘉美並享大封伏聞詔書驚惶慙怖追觀前世傾覆之誡退自惟念不寒而栗臣等雖無逮及遠見之慮猶有庶幾戒懼之情常母子兄弟內相勑厲冀以端賣心畏慎一心奉戴上全天恩下完性命刻骨定分有死無二終不敢橫受爵土以增罪纍惶窘征營昧死陳乞太后不聽騭頻上疏至於五六乃許之其夏涼部畔羌搖蕩西州朝廷憂之於是詔騭將左右羽林北軍五校士及諸部兵擊之車駕幸平樂觀餞送騭西屯漢陽使征西校尉任尚從事中郎司馬鈞與羌戰大敗時以轉輸疲弊百姓苦役冬徵騭班師朝廷以太后故遣五官中郎將迎拜騭為大將軍軍到河南使大鴻臚親迎中常侍齎牛酒郊勞王主以下候望於道既至大會羣臣賜束帛乘馬寵靈顯赫光震都鄙時遭元二之災人士荒飢死者相望盜賊羣起四夷侵畔騭等崇節儉罷力役推進天下賢士何熙祋諷羊浸李郃陶敦等列於朝廷辟楊震朱寵陳禪置之幕府故天下復安四年母新野君寢病騭兄弟並上書求還侍養太后以閶最少孝行尤著特聽之賜安車駟馬及新野君薨騭等復乞身行服章連上太后許之騭等既還里第並居冢次閶至孝骨立有聞當時及服闋詔喻騭還輔朝政更授前封騭等叩頭固讓乃止於是並奉朝請位次在三公下特進侯上其有大議乃詣朝堂與公卿參謀元初二年弘卒太后服齊衰帝絲麻並宿幸其第弘少治歐陽尚書授帝禁中諸儒多歸附之初疾病遺言悉以常服不得用錦衣玉匣有司奏贈弘驃騎將軍位特進封西平侯太后追思弘意不加贈位衣服但賜錢千萬布萬匹騭等復辭不受詔大鴻臚持節即弘殯封子廣德為西平侯將葬有司復奏發五營輕車騎士禮儀如霍光故事太后皆不聽但白蓋雙騎門生挽送後以帝師之重分西平之都鄉封廣德弟甫德為都鄉侯四年又封京子黃門侍郎珍為陽安侯邑三千五百戶五年悝閶相繼並卒皆遺言薄葬不受爵贈太后並從之乃封悝子廣宗為葉侯閶子忠為西華侯自祖父禹教訓子孫皆遵法度深戒竇氏檢勑宗族闔門靜居騭子侍中鳳嘗與尚書郎張龕書屬郎中馬融宜在臺閣又中郎將任尚嘗遺鳳馬後尚坐斷盜軍糧檻車徵詣廷尉鳳懼事泄先自首於騭騭畏太后遂髡妻及鳳以謝天下稱之建光元年太后崩未及大斂帝復申前命封騭為上蔡侯位特進帝少號聰敏及長多不德而乳母王聖見太后久不歸政慮有廢置常與中黃門李閏候伺左右及太后崩宮人先有受罰者懷怨恚因誣告悝弘閶先從尚書鄧訪取廢帝故事謀立平原王得帝聞追怒令有司奏悝等大逆無道遂廢西平侯廣德葉侯廣宗西華侯忠陽安侯珍都鄉侯甫德皆為庶人騭以不與謀但免特進遣就國宗族皆免官歸故郡沒入騭等資財田宅徙鄧訪及家屬於遠郡郡縣逼迫廣宗及忠皆自殺又徙封騭為羅侯騭與子鳳並不食而死騭從弟河南尹豹度遼將軍舞陽侯遵將作大匠暢皆自殺唯廣德兄弟以母閻后戚屬得留京師大司農朱寵痛騭無罪遇禍乃肉袒輿櫬上疏追訟騭曰伏惟和熹皇后聖善之德為漢文母兄弟忠孝同心憂國宗廟有主王室是賴功成身退讓國遜位歷世外戚無與為比當享積善履謙之祐而橫為宮人單辭所陷利口傾險反亂國家罪無申證獄不訊鞠遂令騭等罹此酷濫一門七人並不以命尸骸流離怨魂不反逆天感人率土喪氣宜收還冢次寵樹遺孤奉承血祀以謝亡靈寵知其言切自致廷尉詔免官歸田里衆庶多為騭稱枉帝意頗悟乃譴讓州郡還葬洛陽北芒舊塋公卿皆會喪莫不悲傷之詔遣使者祠以中牢諸從昆弟皆歸京師及順帝即位追感太后恩訓臣攴心騭無辜乃詔宗正復故大將軍鄧騭宗親內外朝見皆如故事除騭兄弟子及門從十二人悉為郎中擢朱竉為太尉録尚書事寵字仲威京兆人初辟騭府稍遷潁川太守治理有聲及拜太尉封安鄉侯甚加優禮廣德早卒甫德更召徵為開封令學傳父業喪母遂不仕閶妻耿氏有節操痛鄧氏誅廢子忠早卒乃養河南尹豹子嗣為閶後耿氏教之書學遂以通博稱永壽中與伏無忌延篤著書東觀官至屯騎校尉禹曾孫香子之女為桓帝后帝又紹封度遼將軍遵子萬世為南鄉侯拜河南尹及后廢萬世下獄死其餘宗親皆復歸故郡鄧氏自中興後纍世寵貴凡侯者二十九人公二人大將軍以下十三人中二千石十四人列校二十二人州牧郡守四十八人其餘侍中將大夫郎謁者不可勝數東京莫與為比論曰漢世外戚自東西京十有餘族非徒豪橫盈極自取災故必於貽釁後主以至顛敗者其數有可言焉何則恩非己結而權已先之情疏禮重而枉性圖之來竉方授地既害之隙藝謝讒亦勝之悲哉騭悝兄弟委遠時柄忠勞王室而終莫之免斯樂生所以泣而辭燕也寇恂字子翼上谷昌平人也世為著姓恂初為郡功曹太守耿況甚重之王莽敗更始立使使者徇郡國曰先降者復爵位恂從耿況迎使者於界上況上印綬使者納之一宿無還意恂勒兵入見使者就請之使者不與曰天王使者功曹欲脅之邪恂曰非敢脅使君竊傷計之不詳也今天下初定國信未宣使君建節銜命以臨四方郡國莫不延頸傾耳望風歸命今始至上谷而先墮大信沮向化之心生離畔之隙將復何以號令它郡乎且耿府君在上谷久為吏人所親今易之得賢則造次未安不賢則秖更生亂為使君計莫若復之以安百姓使者不應恂叱左右以使者命召況況至恂進取印綬帶況使者不得已乃承制詔之況受而歸及王郎起遣將徇上谷急況發兵恂與門下掾閔業共說況曰邯鄲拔起難可信向昔王莽時所難獨有劉伯升耳今聞大司馬劉公伯升母弟尊賢下士士多歸之可攀附也況曰邯鄲方盛力不能獨拒如何恂對曰今上谷完實控弦萬騎薑郡之資可以詳擇去就恂請東約漁陽齊心合衆邯鄲不足圖也況然之乃遣恂到漁陽結謀彭寵恂還至昌平襲擊邯鄲使者殺之奪其軍遂與況子弇等俱南及光武於廣阿拜恂為偏將軍號承義侯從破羣賊數與鄧禹謀議禹奇之因奉牛酒共交歡光武南定河內而更始大司馬朱鮪等盛兵據洛陽又并州未安光武難其守問於鄧禹曰諸將誰可使守河內者禹曰昔高祖任蕭何於關中無復西顧之憂所以得專精山東終成大業今河內帶河為固戶口殷實北通上黨南迫洛陽寇恂文武備足有牧人御衆之才非此子莫可使也乃拜恂河內太守行大將軍事光武謂恂曰河內完富吾將因是而起昔高祖留蕭何鎮關中吾今委公以河內堅守轉運給足軍糧率厲士馬防遏它兵勿令北度而已光武於是復北征燕代恂移書屬縣講兵肄射伐淇園之竹為矢百餘萬養馬二千匹收租四百萬斛轉以給軍朱鮪聞光武北而河內孤使討難將軍蘇茂副將賈彊將兵三萬餘人度鞏河攻溫檄書至恂即勒軍馳出並移告屬縣發兵會於溫下軍吏皆諫曰今洛陽兵度河前後不絶宜待衆軍畢集乃可出也恂曰溫郡之藩蔽失溫則郡不可守遂馳赴之旦日合戰而偏將軍馮異遣救及諸縣兵適至士馬四集幡旗蔽野恂乃令士卒乘城鼓噪大呼言曰劉公兵到蘇茂軍聞之陳動恂因奔擊大破之追至洛陽遂斬賈彊茂兵自投河死者數千生獲萬餘人恂與馮異過河而還自是洛陽震恐城門晝閉時光武傳聞朱鮪破河內有頃恂檄至大喜曰吾知寇子翼可任也諸將軍賀因上尊號於是即位時軍食急乏恂以輦車驪駕轉輸前後不絶尚書升斗以稟百官帝數策書勞問恂同門生茂陵董崇說恂曰上新即位四方未定而君侯以此時據大郡內得人心外破蘇茂威震鄰敵功名發聞此讒人側目怨禍之時也昔蕭何守關中悟鮑生之言而高祖悅今君所將皆宗族昆弟也無乃當以前人為鏡戒恂然其言稱疾不視事帝將攻洛陽先至河內恂求從軍帝曰河內未可離也數固請不聽乃遣兄子寇張姊子谷崇將突騎願為軍鋒帝善之皆以為偏將軍建武二年恂坐繫考上書者免是時潁川人嚴終趙敦聚衆萬餘與密人賈期連兵為寇恂免數月復拜潁川太守與破姦將軍侯進俱擊之數月斬期首郡中悉平定封恂雍奴侯邑萬戶執金吾賈復在汝南部將殺人於潁川恂捕得繫獄時尚草創軍營犯法率多相容恂乃戮之於市復以為恥歎還過潁川謂左右曰吾與寇恂並列將帥而今為其所陷大丈夫豈有懷侵怨而不決之者乎今見恂必手劒之恂知其謀不欲與相見谷崇曰崇將也得帶劒侍側卒有變足以相當恂曰不然昔藺相如不畏秦王而屈於廉頗者為國也區區之趙尚有此義吾安可以忘之乎乃勑屬縣盛供具儲酒醪執金吾軍入界一人皆兼二人之饌恂乃出迎於道稱疾而還賈復勒兵欲追之而吏士皆醉遂過去恂遣谷崇以狀聞帝乃徵恂恂至引見時復先在坐欲起相避帝曰天下未定兩虎安得私鬬今日朕分之於是並坐極歡遂共車同出結友而去恂歸潁川三年遣使者即拜為汝南太守又使驃騎將軍杜茂將兵助恂討盜賊盜賊清靜郡中無事恂素好學乃修鄉校教生徒聘能為左氏春秋者親受學焉七年代朱浮為執金吾明年從車駕擊隗囂而潁川盜賊羣起帝乃引軍還謂恂曰潁川迫近京師當以時定惟念獨卿能平之耳從九卿復出以憂國可知也恂對曰潁川剽輕聞陛下遠踰阻險有事隴蜀故狂狡乘閒相詿誤耳如聞乘輿南向賊必惶怖歸死臣願執鋭前驅即日車駕南征恂從至潁川盜賊悉降而竟不拜郡百姓遮道曰願從陛下復借寇君一年四乃留恂長社鎮撫吏人受納餘降初隗囂將安定高峻擁兵萬人據高平第一帝使待詔馬援招降峻由是河西道開中郎將來歙承制拜峻通路將軍封關內侯後屬大司馬吳漢共圍囂於冀及漢軍退峻亡歸故營復助囂拒隴阺及囂死峻據高平畏誅堅守建威大將軍耿弇率太中大夫竇士武威太守梁統等圍之一歲不拔十年帝入關將自征之恂時從駕諫曰長安道里居中應接近便安定隴西必懷震懼此從容一處可以制四方也今士馬疲倦方履險阻非萬乘之固前年潁川可為至戒帝不從進軍及汧峻猶不下帝議遣使降之乃謂恂曰卿前止吾此舉今為吾行也若峻不即降引耿弇等五營擊之恂奉璽書至第一峻遣軍師皇甫文出謁辭禮不屈恂怒將誅文諸將諫曰高峻精兵萬人率多彊弩西遮隴道連年不下今欲降之而反戮其使無乃不可乎恂不應遂斬之遣其副歸告峻曰軍師無禮已戮之矣欲降急降不欲固守峻惶恐即日開城門降諸將皆賀因曰敢問殺其使而降其城何也恂曰皇甫文峻之腹心其所取計者也今來辭意不屈必無降心全之則文得其計殺之則峻亡其膽是以降耳諸將皆曰非所及也遂傳峻還洛陽恂經明行修名重朝廷所得秩奉厚施朋友故人及從吏士常曰吾因士大夫以致此其可獨享之乎時人歸其長者以為有宰相器十二年卒諡曰威侯子損嗣恂同産弟及兄子姊子以軍功封列侯者凡八人終其身不傳於後初所與謀閔業者恂數為帝言其忠賜爵關內侯官至遼西太守十三年復封損庶兄壽為洨侯後徙封損扶柳侯損卒子釐嗣徙封商鄉侯釐卒子襲嗣恂女孫為大將軍鄧騭夫人由是寇氏得志於永初閒恂曾孫榮論曰傳稱喜怒以類者鮮矣夫喜而不比怒而思難者其唯君子乎子曰伯夷叔齊不念舊惡怨是用希於寇公而見之矣榮少知名桓帝時為侍中性矜潔自貴於人少所與以此見害於權寵而從兄子尚帝妹益陽長公主帝又聘其從孫女於後宮左右益惡之延熹中遂陷以罪辟與宗族免歸故郡吏承望風旨持之浸急榮恐不免奔闕自訟未至刺史張敬追劾榮以擅去邊有詔捕之榮逃竄數年會赦令不得除積窮困乃自亡命中上書曰人父母先慈愛後威武先寬容後刑辟自生齒以上咸蒙德澤而臣兄弟獨以無辜為專權之臣所見批扺青蠅之人所共搆會以臣婚姻王室謂臣將撫其背奪其位退其身受其藝於是遂作飛章以被於臣欲使墜萬仞之坑踐必死之地令陛下忽慈母之仁發投杼之怒尚書背繩墨案空劾不復質確其過置於嚴棘之下便奏正臣罪司隸校尉馮羡佞邪承旨廢於王命驅逐臣等不得旋踵臣奔走還郡沒齒無怨臣誠恐卒為豺狼橫見噬食故冒死欲詣闕披肝膽布腹心豹洛陽令袁騰並驅爭先若赴仇敵及死沒髡剔墳墓但未掘壙出尸剖棺露胔耳昔文王葬枯骨公劉敦行葦世稱其仁今殘酷容媚之吏無折中處平之心不顧無辜之害而興虛誣之誹欲使嚴朝必加濫罰是以不敢觸突天威而自竄山林以俟陛下發神聖之聽啓獨覩之明拒讒慝之謗絶邪巧之言救可濟之人援沒溺之命不意滯怒不為春夏息淹恚不為順時怠遂馳使郵驛布告遠近嚴文剋剝痛於霜雪張羅海內設罝萬里逐臣者窮人迹追臣者極車軌雖楚購伍員漢求季布無以過也力止則見掃滅行則為亡虜苟生則為窮人極死則為冤鬼天廣而無以自覆地厚而無以自載蹈陸土而有沈淪之憂遠巖牆而有鎮壓之患精誠足以感於陛下而哲王未肯悟如臣犯元惡大憝足以陳於原野備刀鋸陛下當班布臣之所坐以解衆論之疑臣思入國門坐於胏石之上使三槐九棘平臣之罪而閶闔九重陷穽步設舉趾觸罘罝動行絓羅網無緑至萬乘之前永無見信之期矣暖反寒春常凄風夏降霜雹又連年大風折拔樹木風為號令春夏布德議獄緩死之時願陛下思帝堯五教在寬之德企成湯避遠讒夫之誡以寧風旱以弭災兵臣聞勇者不逃死智者不重困固不為明朝惜垂盡之命願赴湘沅之波從屈原之悲沈江湖之流弔子胥之哀臣功臣苗緒生長王國懼獨含恨以葬江魚之腹無以自別於世不勝狐死首丘之情營魂識路之懷犯冒王怒觸突帝禁伏於兩觀陳訴毒痛然後登金鑊入沸湯糜爛於熾爨之下九死而未悔廩浚井之難申生不辭姬氏讒邪之謗臣敢忘斯議不自斃以解明朝之忿哉乞以身塞重責願陛下丐兄弟死命使臣一門頗有遺類以崇陛下寬饒之惠先死陳情臨章涕泣泣血連漣如帝省章愈怒遂誅榮寇氏由是衰廢贊曰元侯淵謨乃作司徒明啓帝略肇定秦都勳成智隱靜其如愚子翼守溫蕭公是係兵轉食以集鴻烈誅文屈賈有剛有折
