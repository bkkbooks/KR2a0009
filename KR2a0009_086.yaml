body:
  text: 後漢書卷七十九上儒林列傳第六十九上昔王莽更始之際天下散亂禮樂分崩典文殘落及光武中興愛好經術未及下車而先訪儒雅採求闕文補綴漏逸先是四方學士多懷協圖書遁逃林藪自是莫不抱負墳策雲會京師范升陳元鄭興杜林衛宏劉昆桓榮之徒繼踵而集於是立五經博士各以家法教授易有施孟梁丘京氏尚書歐陽大小夏侯詩齊魯韓禮大小戴春秋嚴顏凡十四博士太常差次總領焉建武五年乃修起太學稽式古典籩豆干戚之容備之於列服方領習矩步者委它乎其中中元元年初建三雍明帝即位親行其禮天子始冠通天衣日月備法物之駕盛清道之儀坐明堂而朝羣后登靈臺以望雲物袒割辟雍之上尊養三老五更饗射禮畢帝正坐自講諸儒執經問難於前冠帶縉紳之人圜橋門而觀聽者蓋億萬計其後復為功臣子孫四姓末屬別立校舍搜選高能以受其業自期門羽林之士悉令通孝經章句胸奴亦遣子入學濟濟乎洋洋乎盛於永平矣建初中大會諸儒於白虎觀考詳同異連月乃罷肅宗親臨稱制如石渠故事顧命史臣著為通義又詔高才生受古文尚書毛詩穀梁左氏春秋雖不立學官然皆擢高第為講郎給事近署所以網羅遺逸博存衆家孝和亦數幸東觀覽閲書林及鄧后稱制學者頗懈時樊準徐防並陳敦學之宜又言儒職多非其人於是制詔公卿妙簡其選三署郎能通經術者皆得察舉自安帝覽政薄於藝文博士倚席不講朋徒相視怠散學舍穨敝鞠為園蔬牧兒蕘豎至於薪刈其下順帝感翟酺之言乃更修黌宇凡所造構二百四十房千八百五十室試明經下第補弟子增甲乙之科員各十人除郡國耆儒皆補郎舍人本初元年梁太后詔曰大將軍下至六百石悉遣子就學每歲輒於鄉射月一饗會之以此為常自是遊學增盛至三萬餘生然章句漸疏而多以浮華相尚儒者之風蓋衰矣黨人既誅其高名善士多坐流廢後遂至忿爭更相言告亦有私行金貨定蘭臺漆書經字以合其私文熹平四年靈帝乃詔諸儒正定五經刊於石碑為古文篆隸三體書法以相參檢樹之學門使天下咸取則焉初光武遷還洛陽其經牒祕書載之二千餘兩自此以後參倍於前及董卓移都之際吏民擾亂自辟雍東觀蘭臺石室宣明鴻都諸藏典策文章競共剖散其縑帛圖書大則連為帷蓋小乃制為縢囊及王允所收而西者裁七十餘乘道路艱遠復𠫓廾其半矣後長安之亂一時焚蕩莫不泯盡焉東京學者猥衆難以詳載今但録其能通經名家者以為儒林篇其自有列傳者則不兼書若師資所承宜標名為證者乃著之云前書云田何傳易授丁寬丁寬授田王孫王孫授沛人施讎東海孟喜琅邪梁丘賀由是易有施孟梁丘之學又東郡京房受易於梁國焦延壽別為京氏學又有東萊費直傳易授琅邪王橫為費氏學本以古字號古文易又沛人高相傳易授子康及蘭陵毋將永為高氏學施孟梁丘京氏四家皆立博士費高二家未得立劉昆字桓公陳留東昏人梁孝王之胤也少習容禮平帝時受施氏易於沛人戴賓能彈雅琴知清角之操王莽世教授弟子恆五百餘人每春秋饗射常備列典儀以素木瓠葉為俎豆桑弧蒿矢以射菟首每有行禮縣宰輒率吏屬而觀之王莽以昆多聚徒衆私行大禮有僭上心乃繫昆及家屬於外黃獄尋莽敗得免既而天下大亂昆避難河南負犢山中建武五年舉孝廉不行遂逃教授於江陵光武聞之即除為江陵令時縣連年火灾昆輒向火叩頭多能降雨止風徵拜議郎稍遷侍中弘農太守先是崤黽驛道多虎灾行旅不通昆為政三年仁化大行虎皆負子度河帝聞而異之二十二年徵代杜林為光祿勳詔問昆曰前在江陵反風滅火後守弘農虎北度河行何德政而致是事昆對曰偶然耳左右皆笑其質訥帝歎曰此乃長者之言也顧命書諸策乃令入授皇太子及諸王小侯五十餘人二十七年拜騎都尉三十年以老乞骸骨詔賜洛陽第舍以千石祿終其身中元二年卒子軼字君文傳昆業門徒亦盛永平中為太子中庶子建初中稍遷宗正卒官遂世掌宗正焉窪丹字子玉南陽育陽人也世傳孟氏易王莽時常避世教授專志不仕徒衆數百人建武初為博士稍遷十一年為大鴻臚作易通論七篇世號窪君通丹學義研深易家宗之稱為大儒十七年卒於官年七十時中山觟陽鴻字孟孫亦以孟氏易教授有名稱永平中為少府任安字定祖廣漢綿竹人也少遊太學受孟氏易兼通數經又從同郡楊厚學圖讖究極其術時人稱曰欲知仲桓問任安又曰居今行古任定祖學終還家教授諸生自遠而至初仕州郡後太尉再辟除博士公車徵皆稱疾不就州牧劉焉表薦之時王塗隔塞詔命竟不至年七十九建安七年卒于家楊政字子行京兆人也少好學從代郡范升受梁丘易善說經書京師為之語曰說經鏗鏗楊子行教授數百人范升嘗為出婦所告坐繫獄政乃肉袒以箭貫耳抱升子潛伏道傍候車駕而持章叩頭大言曰范升三娶唯有一子今適三歲孤之可哀武騎虎賁懼驚乘輿舉弓射之猶不肯去旄頭又以戟叉政傷政猶不退哀泣辭請有感帝心詔曰乞楊生師即尺一出升政由是顯名為人嗜酒不拘小節果敢自矜然篤於義時帝壻梁松皇后弟陰就皆慕其聲名而請與交友政每共言論常切磋懇至不為屈撓嘗詣楊虛侯馬武武難見政稱疾不為起政入戶徑升牀排武把臂責之曰卿蒙國恩備位藩輔不思求賢以報殊寵而驕天下英俊此非養身之道也今日動者刀入脅武諸子及左右皆大驚以為見劫操兵滿側政顏色自若會陰就至責數武令為交友其剛果任情皆如此也建初中官至左中郎將張興字君上潁川鄢陵人也習梁丘易以教授建武中舉孝廉為郎謝病去復歸聚徒後辟司徒馮勤府勤舉為孝廉稍遷博士永平初遷侍中祭酒十年拜太子少傅顯宗數訪問經術既而聲稱著聞弟子自遠至者著録且萬人為梁丘家宗十四年卒於官子魴傳興業位至張掖屬國都尉戴憑字次仲汝南平輿人也習京氏易年十六郡舉明經徵試博士拜郎中時詔公卿大會羣臣皆就席憑獨立光武問其意憑對曰博士說經皆不如臣而坐居臣上是以不得就席帝即召上殿令與諸儒難說憑多所解釋帝善之拜為侍中數進見問得失帝謂憑曰侍中當匡補國政勿有隱情憑對曰陛下嚴帝曰朕何用嚴憑曰伏見前太尉西曹掾蔣遵清亮忠孝學通古今陛下納膚受之訴遂致禁錮世以是為嚴帝怒曰汝南子欲復黨乎憑出自繫廷尉有詔勑出後復引見憑謝曰臣無謇諤之節而有狂瞽之言不能以尸伏諫偷生苟活誠慙聖朝帝即勑尚書解遵禁錮拜憑虎賁中郎將以侍中兼領之正旦朝賀百僚畢會帝令羣臣能說經者更相難詰義有不通輒奪其席以益通者憑遂重坐五十餘席故京師為之語曰解經不窮戴侍中在職十八年卒於官詔賜東園梓器錢二十萬時南陽魏滿字叔牙亦習京氏易教授永平中至弘農太守孫期字仲彧濟陰成武人也少為諸生習京氏易古文尚書家貧事母至孝牧豕於大澤中以奉養焉遠人從其學者皆執經壟畔以追之里落化其仁讓黃巾賊起過期里陌相約不犯孫先生舍郡舉方正遣吏齎羊酒請期期驅豕入草不顧司徒黃琬特辟不行終於家建武中范升傳孟氏易以授楊政而陳元鄭衆皆傳費氏易其後馬融亦為其傳融授鄭玄玄作易注荀爽又作易傳自是費氏興而京氏遂衰前書云濟南伏生傳尚書授濟南張生及千乘歐陽生歐陽生授同郡兒寬寬授歐陽生之子世世相傳至曾孫歐陽高為尚書歐陽氏學張生授夏侯都尉都尉授族子始昌始昌傳族子勝為大夏侯氏學勝傳從兄子建建別為小夏侯氏學三家皆立博士又魯人孔安國傳古文尚書授都尉朝朝授膠東庸談為尚書古文學未得立歐陽歙字正思樂安千乘人也自歐陽生傳伏生尚書至歙八世皆為博士歙既傳業而恭謙好禮讓王莽時為長社宰更始立為原武令世祖平河北到原武見歙在縣修政遷河南都尉後行太守事世祖即位始為河南尹封被陽侯建武五年坐事免官明年拜楊州牧遷汝南太守推用賢俊政稱異迹九年更封夜侯歙在郡教授數百人視事九歲徵為大司徒坐在汝南臧罪千餘萬發覺下獄諸生守闕為歙求哀者千餘人至有自髡剔者平原禮震年十七聞獄當斷馳之京師行到河內獲嘉縣自繫上書求代歙死曰伏見臣師大司徒歐陽歙學為儒宗八世博士而以臧咎當伏重辜歙門單子幼未能傳學身死之後永為廢絶上令陛下獲殺賢之譏下使學者喪師資之益乞殺臣身以代歙命書奏而歙已死獄中歙掾陳元上書追訟之言甚切至帝乃賜棺木贈印綬賻縑三千匹子復嗣復卒無子國除濟陰曹曾字伯山從歙受尚書門徒三千人位至諫議大夫子祉河南尹傳父業教授又陳留陳弇字叔明亦受歐陽尚書於司徒丁鴻仕為蘄長牟長字君高樂安臨濟人也其先封牟春秋之末國滅因氏焉長少習歐陽尚書不仕王莽世建武二年大司空弘特辟拜博士稍遷河內太守坐墾田不實免長自為博士及在河內諸生講學者常有千餘人著録前後萬人著尚書章句皆本之歐陽氏俗號為牟氏章句復徵為中散大夫賜告一歲卒於家子紆又以隱居教授門生千人肅宗聞而徵之欲以為博士道物故宋登字叔陽京兆長安人也父由為太尉登少傳歐陽尚書教授數千人為汝陰令政為明能號稱神父遷趙相入為尚書僕射順帝以登明識禮樂使持節臨太學奏定典律轉拜侍中數上封事抑退權臣由是出為潁川太守市無二價道不拾遺病免卒于家汝陰人配社祠之張馴字子俊濟陰定陶人也少遊太學能誦春秋左氏傳以大夏侯尚書教授辟公府舉高第拜議郎與蔡雍共奏定六經文字擢拜侍中典領祕書近署甚見納異因便宜陳政得失朝廷嘉之遷丹陽太守化有惠政光和七年徵拜尚書遷大司農初平中卒於官尹敏字幼季南陽堵陽人也少為諸生初習歐陽尚書後受古文兼善毛詩穀梁左氏春秋建武二年上疏陳洪範消灾之術時世祖方草創天下未遑其事命敏待詔公車拜郎中辟大司空府帝以敏博通經記令校圖讖使蠲去崔發所為王莽著録次比敏對曰讖書非聖人所作其中多近鄙別字頗類世俗之辭恐疑誤後生帝不納敏因其闕文增之曰君無口為漢輔帝見而怪之召敏問其故敏對曰臣見前人增損圖書敢不自量竊幸萬一帝深非之雖竟不罪而亦以此沈滯與班彪親善每相遇輒日旰忘食夜分不寢自以為鍾期伯牙莊周惠施之相得也後三遷長陵令永平五年詔書捕男子周慮慮素有名稱而善於敏敏坐繫免官及出歎曰瘖聾之徒真世之有道者也何謂察察而遇斯患乎十一年除郎中遷諫議大夫卒於家周防字偉公汝南汝陽人也父揚少孤微常修逆旅以供過客而不受其報防年十六仕郡小吏世祖巡狩汝南召掾史試經防尤能誦讀拜為守丞防以未冠謁去師事徐州刺史蓋豫受古文尚書經明舉孝廉拜郎中撰尚書雜記三十二篇四十萬言太尉張禹薦補博士稍遷陳留太守坐法免年七十八卒於家子舉自有傳孔僖字仲和魯國魯人也自安國以下世傳古文尚書毛詩曾祖父子建少遊長安與崔篆友善及篆仕王莽為建新大尹嘗勸子建仕對曰吾有布衣之心子有袞冕之志各從所好不亦善乎道既乖矣請從此辭遂歸終於家僖與崔篆孫駰復相友善同遊太學習春秋因讀吳王夫差時事僖廢書歎曰若是所謂畫龍不成反為狗者駰曰然昔孝武皇帝始為天子年方十八崇信聖道師則先王五六年閒號勝文景及後恣己忘其前之為善僖曰書傳若此多矣鄰房生梁郁儳和之曰如此武帝亦是狗邪僖駰默然不對郁怒恨之陰上書告駰僖誹謗先帝刺譏當世事下有司駰詣吏受訊僖以吏捕方至恐誅乃上書肅宗自訟曰臣之愚意以為凡言誹謗者謂實無此事而虛加誣之也至如孝武皇帝政之美惡顯在漢史坦如日月是為直說書傳實事非虛謗也夫帝者為善則天下之善咸歸焉其不善則天下之惡亦萃焉斯皆有以致之故不可以誅於人也且陛下即位以來政教未過而德澤有加天下所具也臣等獨何譏刺哉假使所非實是則固應悛改儻其不當亦宜含容又何罪焉陛下不推原大數深自為計徒肆私忿以快其意臣等受戮死即死耳顧天下之人必回視易慮以此事窺陛下心自今以後苟見不可之事終莫復言者矣臣之所以不愛其死猶敢極言者誠為陛下深惜此大業陛下若不自惜則臣何賴焉齊桓公親揚其先君之惡以唱管仲然後羣臣得盡其心今陛下乃欲以十世之武帝遠諱實事豈不與桓公異哉臣恐有司卒然見構銜恨蒙枉不得自敘使後世論者擅以陛下有所方比寧可復使子孫追掩之乎謹詣闕伏待重誅帝始亦無罪僖等意及書奏立詔勿問拜僖蘭臺令史元和二年春帝東巡狩還過魯幸闕里以太牢祠孔子及七十二弟子作六代之樂大會孔氏男子二十以上者六十三人命儒者講論語僖因自陳謝帝曰今日之會寧於卿宗有光榮乎對曰臣聞明王聖主莫不尊師貴道今陛下親屈萬乘辱臨敝里此乃崇禮先師增輝聖德至於光榮非所敢承帝大笑曰非聖者子孫焉有斯言乎遂拜僖郎中賜褒成侯損及孔氏男女錢帛詔僖從還京師使校書東觀冬拜臨晉令崔駰以家林筮之謂為不吉止僖曰子盍辭乎僖曰學不為人仕不擇官凶吉由己而由卜乎在縣三年卒官遺令即葬二子長彥季彥並十餘歲蒲坂令許君然勸令反魯對曰今載柩而歸則違父令舍墓而去心所不忍遂留華陰長彥好章句學季彥守其家業門徒數百人延光元年河西大雨雹大者如斗安帝詔有道術之士極陳變眚乃召季彥見於德陽殿帝親問其故對曰此皆陰乘陽之徵也今貴臣擅權母后黨盛陛下宜修聖德慮此二者帝默然左右皆惡之舉孝廉不就三年年四十七終於家初平帝時王莽秉政乃封孔子後孔均為褒成侯追諡孔子為褒成宣尼及莽敗失國建武十三年世祖復封均子志為褒成侯志卒子損嗣永元四年徙封褒亭侯損卒子曜嗣曜卒子完嗣世世相傳至獻帝初國絶楊倫字仲理陳留東昏人也少為諸生師事司徒丁鴻習古文尚書為郡文學掾更歷數將志乖於時以不能人閒事遂去職不復應州郡命講授於大澤中弟子至千餘人元初中郡禮請三府並辟公車徵皆辭疾不就後特徵博士為清河王傅是歲安帝崩倫輒𠫓廾官奔喪號泣闕下不絶聲閻太后以其專擅去職坐抵罪順帝即位詔免倫刑遂留行喪于恭陵服闋徵拜侍中是時邵陵令任嘉在職貪穢因遷武威太守後有司奏嘉臧罪千萬徵考廷尉其所牽染將相大臣百有餘人倫乃上書曰臣聞春秋誅惡及本本誅則惡消振裘持領領正則毛理今任嘉所坐狼藉未受辜戮猥以垢身改典大郡自非案坐舉者無以禁絶姦萌往者湖陸令張疊蕭令駟賢徐州刺史劉福等釁穢既章咸伏其誅而豺狼之吏至今不絶者豈非本舉之主不加之罪乎昔齊威之霸殺姦臣五人并及舉者以弭謗讟當斷不斷黃石所戒夫聖王所以聽僮夫匹婦之言者猶塵加嵩岱霧集淮海雖未有益不為損也惟陛下留神省察奏御有司以倫言切宜辭不遜順下之尚書奏倫探知密事激以求直坐不敬結鬼薪詔書以倫數進忠言特原之免歸田里陽嘉二年徵拜太中大夫大將軍梁商以為長史諫諍不合出補常山王傅病不之官詔書勑司隸催促發遣倫乃留河內朝歌以疾自上曰有留死一尺無北行一寸刎頸不易九裂不恨匹夫所執彊於三軍固敢有辭帝及下詔曰倫出幽升高寵以藩傅稽留王命擅止道路託疾自從苟肆狷志遂徵詣廷尉有詔原罪倫前後三徵皆以直諫不合既歸閉門講授自絶人事公車復徵遜遁不行卒於家中興北海牟融習大夏侯尚書東海王良習小夏侯尚書沛國桓榮習歐陽尚書榮世習相傳授東京最盛扶風杜林傳古文尚書林同郡賈逵為之作訓馬融作傳鄭玄注解由是古文尚書遂顯于世
