body:
  text: 後漢書卷六十下蔡雍列傳第五十下蔡雍字伯喈陳留圉人也六世祖勳好黃老平帝時為郿令王莽初授以厭戎連率勳對印綬仰天歎曰吾策名漢室死歸其正昔曾子不受季孫之賜況可事二姓哉遂攜將家屬逃入深山與鮑宣卓茂等同不仕新室父棱亦有清白行諡曰貞定公雍性篤孝母常滯病三年雍自非寒暑節變未嘗解襟帶不寢寐者七旬母卒廬于冢側動靜以禮有菟馴擾其室傍又木生連理遠近奇之多往觀焉與叔父從弟同居三世不分財鄉黨高其義少博學師事太傅胡廣好辭章數術天文妙操音律桓帝時中常侍徐璜左悺等五侯恣聞雍善鼓琴遂白天子勑陳留太守督促發遣雍不得已行到偃師稱疾而歸間居玩古不交當世感東方朔客難及楊雄班固崔駰之徒設疑以自通及斟酌羣言韙其是而矯其非作釋誨以戒厲云爾人然則有位斯貴有財斯富行義達道士之司也故伊摯有負鼎之衒仲尼設執鞭之言寧子有清商之歌百里有豢牛之事夫如是則聖哲之通趣古人之明志也夫子生清穆之世稟醇和之靈覃思典籍韞櫝六經安貧樂賤與世無營沈精重淵抗志高冥包括無外綜析無形其已久矣曾不能拔萃出羣揚芳飛文登天庭序彝倫掃六合之穢慝清宇宙之埃塵連光芒於白日屬炎氣於景雲時逝歲暮默而無聞小子惑焉是以有云方今聖上寬明輔弼賢知崇英逸偉不墜於地德弘者建宰相而裂土才羡者荷榮祿而蒙賜盍亦回塗要至俯仰取容輯當世之利定不拔之功榮家宗於此時遺不滅之令蹤夫獨未之思邪何為守彼而不通此蹉跌之敗者已公子謖爾斂袂而興曰胡為其然也胡老曰居吾將釋汝昔自太極君臣始基有羲皇之洪寧唐虞之至時三代之隆亦有緝熙五伯扶微勤而撫之于斯已降天網縱人紘薥王塗壞太極君臣土崩上下瓦解於是智者騁詐辨者馳說武夫奮略戰士講鋭電駭風馳霧散雲披變詐乖詭以合時宜或畫一策而綰萬金或談崇朝而錫瑞圭連衡者六印磊落合從者駢組流離隆貴翕習積富無崖據巧蹈機以忘其危夫華離蒂而萎條去幹而枯女冶容而淫士背道而辜人毀其滿神疾其邪利端始萌害漸亦牙速速方轂夭夭是加欲豐其屋乃蔀其家是故天地否閉聖哲潛形石門守晨沮溺耦耕顏歜抱璞蘧瑗保生齊人歸樂孔子斯征雍渠驂乘逝而遺輕夫豈主而背國乎道不可以傾也凝寒暑相推陰陽代興運極則化理亂相承今大漢紹陶唐之洪烈蕩四海之殘灾隆隱天之高拆絙地之基皇道惟融帝猷顯汦汦庶類含甘吮滋檢六合之羣品濟之乎雍熙羣僚恭己於職司聖主垂拱乎兩楹君臣穆穆守之以平濟濟多士端委縉綎鴻漸盈階振鷺充庭譬猶鍾山之玉泗濱之石纍圭璧不為之盈探採浮磬不為之索曩者洪源辟而四隩集武功定而干戈戢獫狁攘而吉甫宴城濮捷而晉凱入故當其有事也則蓑笠並載擐甲揚鋒不給於務當其無事也則舒紳緩佩鳴玉以步綽有餘裕理髯餘官委貴其取進也順傾轉圓不足以喻其便逡巡放屣不足以況其易夫夫有逸羣之才人人有優贍之智童子不問疑於老成瞳矇不稽謀於先生心恬淡於守高意無為於持盈粲乎煌煌莫非華榮明哲泊焉不失所寧狂淫振蕩乃亂其情貪夫殉財夸者死權瞻仰此事體躁心煩暗謙盈之效迷損益之數騁駑駘於修路慕騏驥而增驅卑俯乎外戚之門乞助乎近貴之譽榮顯未副從而顛踣下獲熏胥之辜高受滅家之誅前車已覆襲軌而騖曾不鑒禍以知畏懼豫惟悼哉害其若是天高地厚局而蹐之怨豈在明患生不思戰戰兢兢必慎厥尤甲百萬非一勇所抗今子責匹夫以清宇宙庸可以水旱而纍堯湯乎懼煙炎之毀熸何光芒之敢揚哉且夫地將震而樞星直井無景則日陰食元首寬則望舒朓侯王肅則月側匿是以君子推微達著尋端見緒履霜知冰踐露知暑時行則行時止則止消息盈冲取諸天紀利用遭泰可與處否樂天知命持神任己羣車方奔乎險路安能與之齊軌思危難而自豫故在賤而不恥方將騁馳乎典籍之崇塗休息乎仁義之淵藪槃旋乎周孔之庭宇揖儒墨而與為友舒之足以光四表收之則莫能知其所有若乃丁千載之運應神靈之符闓閶闔乘天衢擁華蓋而奉皇樞納玄策於聖德宣太平於中區計合謀從己之圖也勳績不立豫之辜也鳳山翳霧露不除踊躍草萊祗見其愚不我知者將謂之迂修業思真𠫓廾此焉如靜以俟命不斁不渝百歲之後歸乎其居幸其獲稱天所誘也罕漫而已非己咎也昔伯翳綜聲於鳥語葛盧辨音於鳴牛董父受氏於豢龍奚仲供德於衡輈倕氏興政於巧工造父登御於驊騮非子享土於善圉狼瞫取右於禽囚弓父畢精於筋角佽非明勇於赴流壽王創基於格五東方要幸於談優上官效力於執蓋弘羊據相於運籌僕不能參跡於若人故抱璞而優遊心兮浸太清滌穢濁兮存正靈和液暢兮神氣寧情志泊兮心亭亭嗜欲息兮無由生踔宇宙而遺俗兮眇翩翩而獨征建寧三年辟司徒橋玄府玄甚敬待之出補河平長召拜郎中校書東觀遷議郎雍以經籍去聖久遠文字多謬俗儒穿鑿疑誤後學熹平四年乃與五官中郎將堂溪典光祿大夫楊賜諫議大夫馬日磾議郎張馴韓說太史令單揚等奏求正定六經文字靈帝許之雍乃自書冊丹於碑使工鐫刻立於太學門外於是後儒晚學咸取正焉及碑始立其觀視及摹寫者車乘日千餘兩填塞街陌初朝議以州郡相黨人情比周乃制婚姻之家及兩州人士不得對相監臨至是復有三互法禁忌轉密選用艱難幽冀二州久缺不補雍上疏曰伏見幽冀舊壤鎧馬所出比年兵飢漸至空耗今者百姓虛縣萬里蕭條闕職經時吏人延屬而三府選舉踰月不定臣經怪其事而論者云避三互十一州有禁當取二州而已又二州之士或復限以歲月狐疑淹以失事會愚以為三互之禁禁之薄者今但申以威靈明其憲令在任之人豈不戒懼而當坐設三互自生留閡邪昔韓安國起自徒中朱買臣出於幽賤並以才宜還守本邦又張敞亡命擢授劇州豈復顧循三互繼以末制乎三公明知二州之要所宜速定當越禁取能以救時敝而不顧爭臣之義苟避輕微之科選用稽滯以失其人臣願陛下上則先帝蠲除近禁其諸州刺史器用可換者無拘日月三互以差厥中書奏不省初帝好學自造皇羲篇五十章因引諸生能為文賦者本頗以經學相招後諸為尺牘及工書鳥篆者皆加引召遂至數十人侍中祭酒樂松賈護多引無行趣藝之徒並待制鴻都門下喜陳方俗閭里小事帝甚悅之待以不次之位又市賈小民為宣陵孝子者復數十人悉除為郎中太子舍人時頻有雷霆疾風傷樹拔木地震隕雹蝗蟲之害又鮮卑犯境役賦及民六年七月制書引咎誥羣臣各陳政要所當施行雍上封事曰降灾異緣象而至辟歷數發殆刑誅繁多之所生也風者天之號令所以教人也夫昭事上帝則自懷多福宗廟致敬則鬼神以著國之大事實先祀典天子聖躬所當恭事臣自在宰府及備朱衣迎氣五郊而車駕稀出四時至敬屢委有司雖有解除猶為疏廢故皇天不悅顯此諸異鴻範傳曰政悖德隱厥風發屋折木坤為地道易稱安貞陰氣憤盛則當靜反動法為下叛夫權不在上則雹傷物政有苛暴則虎狼食人貪利傷民則蝗蟲損稼去六月二十八日太白與月相迫兵事惡之鮮卑犯塞所從來遠今之出師未見其利上違天文下逆人事誠當博覽衆議從其安者臣不勝憤滿謹條宜所施行七事表左豐年清廟祭祀追往孝敬養老辟雍示人禮化皆帝者之大業祖宗所祗奉也而有司數以蕃國疏喪宮內産生及吏卒小汙屢生忌故竊見南郊齊戒未嘗有廢至於它祀輒興異議豈南郊卑而它祀尊哉孝元皇帝策書曰禮之至敬莫重於祭所以竭心親奉以致肅祗者也又元和故事復申先典前後制書推心懇惻而近者以來更任太史忘禮敬之大任禁忌之書拘信小故以虧大典禮妻妾産者齊則不入側室之門無廢祭之文也所謂宮中有卒三月不祭者謂士庶人數堵之室共處其中耳豈謂皇居之曠臣妾之衆哉自今齊制宜如故典庶答風霆灾妖之異而猶廣求得失又因灾異援引幽隱重賢良方正敦朴有道之選危言極諫不絶於朝陛下親政以來頻年灾異而未聞特舉博選之旨誠當思省述修舊事使抱忠之臣展其狂直以解易傳政悖德隱之言三事夫求賢之道未必一塗或以德顯或以言揚頃者立朝之士曾不以忠信見賞恆被謗訕之誅遂使羣下結口莫圖正辭郎中張文前獨盡狂言聖聽納受以責三司臣子曠然衆庶解悅臣愚以為宜擢文右職以勸忠謇宣聲海內博開政路喜益州刺史龐芝涼州刺史劉虔各有奉公疾姦之心喜等所糾其效尤多餘皆枉橈不能稱職或有抱罪懷瑕與下同疾綱網薥縱莫相舉察公府臺閣亦復默然五年制書議遣八使又令三公謠言奏事是時奉公者欣然得志邪枉者憂悸失色未詳斯議所因寢息昔劉向奏曰夫執狐疑之計者開羣枉之門養不斷之慮者來讒邪之口今始聞善政旋復變易足令海內測度朝政宜追定八使糾舉非法更選忠清平章賞罰三公歲盡差其殿最使吏知奉公之福營私之禍則衆灾之原庶可塞矣選於是名臣輩出文武並興漢之得人數路而已夫書畫辭賦才之小者匡國理政未有其能陛下即位之初先涉經術聽政餘日觀省篇章聊以游意當代博奕非以教化取士之本而諸生競利作者鼎沸其高者頗引經訓風喻之言下則連偶俗語有類俳優或竊成文虛冒名氏臣每受詔於盛化門差次録第其未及者亦復隨輩皆見拜擢既加之恩難復收改但守奉祿於義已弘不可復使理人及仕州郡昔孝宣會諸儒於石渠章帝集學士於白虎通經釋義其事優大文武之道所宜從之若乃小能小善雖有可觀孔子以為致遠則泥君子故當志其大者明而今在任無復能省及其還者多召拜議郎郎中若器用優美不宜處之冗散如有釁故自當極其刑誅豈有伏罪懼考反求遷轉更相放效臧否無章先帝舊典未嘗有此可皆斷絶以核真僞繼體之君父子至親公卿列臣受恩之重皆屈情從制不敢踰越今虛僞小人本非骨肉既無幸私之恩又無祿仕之實惻隱思慕情何緣生而羣聚山陵假名稱孝行不隱心義無所依至有姦軌之人通容其中桓思皇后祖載之時東郡有盜人妻者亡在孝中本縣追捕乃伏其辜虛僞雜穢難得勝言又前至得拜後輩被遺或經年陵次以暫歸見漏或以人自代亦蒙寵榮爭訟怨恨凶凶道路太子官屬宜搜選令德豈有但取丘墓凶醜之人其為不祥莫與大焉宜遣歸田里以明詐僞書奏帝乃親迎氣北郊及行辟雍之禮又詔宣陵孝子為舍人者悉改為丞尉焉光和元年遂置鴻都門學畫孔子及七十二弟子像其諸生皆勑州郡三公舉用辟召或出為刺史太守入為尚書侍中乃有封侯賜爵者士君子皆恥與為列焉時妖異數見人相驚擾其年七月詔召雍與光祿大夫楊賜諫議大夫馬日磾議郎張華太史令單揚詣金商門引入崇德殿使中常侍曹節王甫就問灾異及消改變故所宜施行雍悉心以對事在五行天文志又特詔問曰比災變互生未知厥咎朝廷焦心載懷恐懼每訪羣公卿士庶聞忠言而各存括囊莫肯盡心以雍經學深奧故密特稽問宜披露失得指陳政要勿有依違自生疑諱具對經術以皂囊封上雍對曰臣伏惟陛下聖德允明深悼災咎褒臣末學特垂訪及非臣螻蟻所能堪副斯誠輸寫肝膽出命之秋豈可以顧患避害使陛下不聞至戒哉臣伏思諸異皆亡國之怪也天於大漢殷勤不已故屢出祅變以當譴責欲令人君感悟改危即安今災眚之發不於它所遠則門垣近在寺署其為監戒可謂至切霓墯雞化皆婦人干政之所致也前者乳母趙嬈貴重天下生則資藏侔於天府死則丘墓踰於園陵兩子受封兄弟典郡續以永樂門史霍玉依阻城社又為姦邪今者道路紛紛復云有程大人者察其風聲將為國患宜高為隄防明設禁令深惟趙霍以為至戒今聖意勤勤思明邪正而聞太尉張皓為玉所進光祿勳姓璋有名貪濁又長水校尉趙玹屯騎校尉蓋升並叨時幸榮富優足宜念小人在位之咎退思引身避賢之福伏見廷尉郭禧純厚老成光祿大夫橋玄聰達方直故太尉劉寵忠實守正並宜為謀主數見訪問夫宰相大臣君之四體委任責成優劣已分不宜聽納小吏雕琢大臣也又尚方工技之作鴻都篇賦之文可且消息以示惟憂詩云畏天之怒不敢戲豫天戒誠不可戲也宰府孝廉士之高選近者以辟召不慎切責三公而今並以小文超取選舉開請託之門違明王之典衆心不厭莫之敢言臣願陛下忍而絶之思惟萬機以答天望聖朝既自約厲左右近臣亦宜從化人自抑損以塞咎戒則天道虧滿鬼神福謙矣臣以愚贛感激忘身敢觸忌諱手書具對夫君臣不密上有漏言之戒下有失身之禍願寢臣表無使盡忠之吏受怨姦仇章奏帝覽而歎息因起更衣曹節於後竊視之悉宣語左右事遂漏露其為雍所裁黜者皆側目思報初雍與司徒劉郃素不相平叔父衛尉質又與將作大匠楊陽球有隙球即中常侍程璜女夫也璜遂使人飛章言雍質數以私事請託於郃郃不聽雍含隱切志欲相中於是詔下尚書召雍詰狀雍上書自陳曰臣被召問以大鴻臚劉郃前為濟陰太守臣屬吏張宛長休百日郃為司隸又託河內郡吏李奇為州書佐及營護故河南尹羊陟侍御史胡母班郃不為用致怨之狀臣征營怖悸肝膽塗地不知死命所在竊自尋案實屬宛奇不及陟班凡休假小吏非結恨之本與陟姻家豈敢申助私黨如臣父子欲相傷陷當明言臺閣具陳恨狀所緣內無寸事而謗書外發宜以臣對與郃參驗臣得以學問特蒙褒異執事祕館操管御前姓名貌狀微簡聖心今年七月召詣金商門問以灾異齎詔申旨誘臣使言臣實愚贛唯識忠盡出命忘軀不顧後害遂譏刺公卿內及寵臣實欲以上對聖問救消災異規為陛下建康寧之計陛下不念忠臣直言宜加掩蔽誹謗卒至便用疑怪盡心之吏豈得容哉詔書每下百官各上封事欲以改政思譴除凶致吉而言者不蒙延納之福旋被陷破之禍今皆杜口結舌以臣為戒誰敢為陛下盡忠孝乎臣季父質連見拔擢位在上列臣被蒙恩渥數見訪逮言事者因此欲陷臣父子破臣門戶非復發糾姦伏補益國家者也臣年四十有六孤特一身得託名忠臣死有餘榮恐陛下於此不復聞至言矣臣之愚職當咎患但前者所對質不及聞而衰老白首橫見引逮隨臣摧沒入坑坎誠冤誠痛臣一入牢獄當為楚毒所迫趣以飲章辭情何緣復聞死期垂至冒昧自陳願身當辜戮丐質不并坐則身死之日更生之年也惟陛下加餐為萬姓自愛於是下雍質於洛陽獄劾以仇怨奉公議害大臣大不敬𠫓廾市事奏中常侍呂強愍雍無罪請之帝亦更思其章有詔減死一等與家屬髡鉗徙朔方不得以赦令除楊陽球使客追路刺雍客感其義皆莫為用球又賂其部主使加毒害所賂者反以其情戒雍故每得免焉居五原安陽縣雍前在東觀與盧植韓說等撰補後漢記會遭事流離不及得成因上書自陳奏其所著十意分別首目連置章左帝嘉其才高會明年大赦及宥雍還本郡雍自徙及歸凡九月焉將就還路五原太守王智餞之酒酣智起舞屬雍雍不為報智者中常侍王甫弟也素貴驕慙於賓客詬雍曰徒敢輕我雍拂衣而去智銜之密告雍怨於囚放謗訕朝廷內寵惡之雍慮卒不免乃亡命江海遠跡吳會往來依太山羊氏積十二年在吳吳人有燒桐以爨者雍聞火烈之聲知其良木因請而裁為琴果有美音而其尾猶焦故時人名曰焦尾琴焉初雍在陳留也其鄰人有以酒食召雍者比往而酒以酣焉客有彈琴於屏雍至門試潛聽之曰憘以樂召我而有殺心何也遂反將命者告主人曰蔡君向來至門而去雍素為邦鄉所宗主人遽自追而問其故雍具以告莫不憮然彈琴者曰我向鼓弦見螳蜋方向鳴蟬蟬將去而未飛螳蜋為之一前一卻吾心聳然惟恐螳蜋之失之也此豈為殺心而形於聲者乎雍莞然而笑曰此足以當之矣中平六年靈帝崩董卓為司空聞雍名高辟之稱疾不就卓大怒詈曰我力能族人蔡雍遂偃蹇者不旋踵矣又切勑州郡舉雍詣府雍不得已到署祭酒甚見敬重舉高第補侍御史又轉持書御史遷尚書三日之閒周歷三臺遷巴郡太守復留為侍中初平元年拜左中郎將從獻帝遷都長安封高陽鄉侯董卓賓客部曲議欲尊卓比太公稱尚父卓謀之於雍雍曰太公輔周受命翦商故特為其號今明公威德誠為巍巍然比之尚父愚意以為未可宜須關東平定車駕還反舊京然後議之卓從其言初平二年六月地震卓以問雍雍對曰地動者陰盛侵陽臣下踰制之所致也前春郊天公奉引車駕乘金華青蓋爪畫兩轓遠近以為非宜卓於是改乘皂蓋車卓重董雍才學厚相遇待每集宴輒令雍鼓琴贊事雍亦每存匡益然卓多自佷用雍恨其言少從謂從弟谷曰董公性剛而遂非終難濟也吾欲東奔兗州若道遠難達且遁逃山東以待之何如谷曰君狀異恆人每行觀者盈集以此自匿不亦難乎雍乃止及卓被誅雍在司徒王允坐殊不意言之而歎有動於色允勃然叱之曰董卓國之大賊幾傾漢室君為王臣所宜同忿而懷其私遇以忘大節今天誅有罪而反相傷痛豈不共為逆哉即收付廷尉治罪雍陳辭謝乞黥首刖足繼成漢史士大夫多矝救之不能得太尉馬日磾馳往謂允曰伯喈曠世逸才多識漢事當續成後史為一代大典且忠孝素著而所坐無名誅之無乃失人望乎允曰昔武帝不殺司馬遷使作謗書流於後世方今國祚中衰神器不固不可令佞臣執筆在幼主左右既無益聖德復使吾黨蒙其訕議日磾退而告人曰王公其不長世乎善人國之紀也制作國之典也滅紀廢典其能久乎雍遂死獄中允悔欲止而不及時年六十一搢紳諸儒莫不流涕北海鄭玄聞而歎曰漢世之事誰與正之兗州陳留聞閒皆畫像而頌焉其撰集漢事未見録以繼後史適作靈紀及十意又補諸列傳四十二篇因李傕之亂湮沒多不存所著詩賦碑誄銘讚連珠針弔論議獨斷勸學釋誨樂女訓篆藝祝文章表書記凡百四篇傳於世論曰意氣之感士所不能忘也流極之運有生所共深悲也當伯喈抱鉗扭徙幽裔仰日月而不見照燭臨風塵而不得經過其意豈及語平日幸全人哉及解刑衣竄歐越潛舟江壑不知其遠捷步深林尚苦不密但願北首舊丘歸骸先壟又可得乎董卓一旦入朝辟書先下分明枉結信宿三遷匡導既申狂僭屢革資同人之先號得北叟之後福屬其慶者夫豈無懷君子斷刑尚或為之不舉況國憲倉卒慮不先圖矜情變容而罰同邪黨執政乃追怨子長謗書流後放此為戮未或聞之典刑贊曰季長戚氏才通情侈苑囿典文流悅音伎雍實慕靜心精辭綺斥言金商南徂北徙籍梁懷董名澆身毀
