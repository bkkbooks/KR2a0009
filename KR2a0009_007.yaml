body:
  text: 後漢書卷六孝順孝沖孝質帝紀第六孝順皇帝諱保安帝之子也母李氏為閻皇后所害永寧元年立為皇太子延光三年安帝乳母王聖大長秋江京中常侍樊豐譖太子乳母王男廚監邴吉殺之太子數為歎息王聖等懼有後禍遂與豐京共搆陷太子太子坐廢為濟陰王明年三月安帝崩北鄉侯立濟陰王以廢黜不得上殿親臨梓宮悲號不食內外羣僚莫不哀之及北鄉侯薨車騎將軍閻顯及江京與中常侍劉安陳達等白太后祕不發喪而更徵立諸國王子乃閉宮門屯兵自守十一月丁巳京師及郡國十六地震是夜中黃門孫程等十九人共斬江京劉安陳達等迎濟陰王於德陽殿西鍾下即皇帝位年十一近臣尚書以下從輦到南宮登雲臺召百官尚書令劉光等奏言孝安皇帝聖德明茂早𠫓廾天下陛下正統當奉宗廟而姦臣交搆遂令陛下龍潛蕃國羣僚遠近莫不失望天命有常北鄉不永漢德盛明福祚孔章近臣建策左右扶翼內外同心稽合神明陛下踐祚奉遵鴻緒為郊廟主承續祖宗無窮之烈上當天心下猒民望而即位倉卒典章多缺請條案禮儀分別具奏制曰可乃召公卿百僚使虎賁羽林士屯南北宮諸門閻顯兄弟聞帝立率兵入北宮尚書郎郭鎮與交鋒刃遂斬顯弟衞尉景戊午遣使者入省奪得璽綬乃幸嘉德殿遣侍御史持節收閻顯及其弟城門校尉耀執金吾晏並下獄誅己未開門屯兵壬戌詔司隸校尉惟閻顯江京近親當伏辜誅其餘務崇寬貸壬申謁高廟癸酉謁光武廟乙亥詔益州刺史罷子午道通襃斜路己卯葬少帝以諸王禮司空劉授免賜公卿以下錢穀各有差十二月甲申以少府河南陶敦為司空其令郡國守相視事未滿歲者一切得舉孝廉吏癸卯尚書奏請下有司收還延光三年九月丁酉以皇太子為濟陰王詔書奏可京師大疫辛亥詔公卿郡守國相舉賢良方正能直言極諫之士各一人尚書令以下從輦幸南宮者皆增秩賜布各有差永建元年春正月甲寅詔曰先帝聖德享祚未永早𠫓廾鴻烈姦慝緣閒人庶怨讟上干和氣疫癘為災朕奉承大業未能寧濟蓋至理之本稽私德惠蕩滌宿惡與人更始其大赦天下賜男子爵人二級為父後三老孝悌力田人三級流民欲自占者一級魚眾寡孤獨篤貧不能自存者粟人五斛貞婦帛人三匹坐法當徙勿徙亡捕穚勿傳宗室以罪絕皆復屬籍其與閻顯江京等交通者悉勿考勉修厥職以康我民辛未皇太后閻氏崩辛巳太傅馮石太尉劉熹司徒李郃免二月甲申葬安思皇后丙戌太常桓焉為太傅大鴻臚朱寵為太尉參錄尚書事長樂少府九江朱倀為司徒賜百官隨輦宿衞及拜除者布各有差隴西鐘羌叛護羌校尉馬賢討破之夏五月丁丑詔幽并涼州刺史使各實二千石以下至黃綬年老劣弱不任軍事者上名嚴勑障塞繕設屯備立秋之後簡習戎馬六月己亥封濟南王錯子顯為濟南王秋七月庚午衞尉來歷為車騎將軍八月鮮卑寇代郡代郡太守李超戰歿九月辛亥初令三公尚書入奏事冬十月辛巳詔減死罪以下徙邊其亡命贖各有差丁亥司空陶敦免鮮卑犯邊庚寅遣黎陽營兵出屯中山北界告幽州刺史其令緣邊郡增置步兵列屯塞下調五營弩師郡舉五人令教習戰射壬寅廷尉張皓為司空甲辰詔以疫癘水潦令人半輸今年田租傷害什四以上勿收責不滿者以實除之十二月辛巳賜王主貴人公卿以下布各有差二年春正月戊申樂安王鴻來朝丁卯常山王章薨二月鮮卑寇遼東玄菟甲辰詔稟貸荊豫兗冀四州流貧人所在安業之疾病致醫藥護烏桓校尉耿曄率南單于擊鮮卑破之三月旱遣使者錄囚徒疏勒國遣使奉獻夏六月乙酉追尊謚皇妣李氏為恭愍皇后葬于恭北陵西域長史班勇敦煌太守張朗討焉耆尉犂危須三國破之並遣子貢獻秋七月甲戌朔日有食之壬午太尉朱寵司徒朱倀罷庚子太常劉光為太尉錄尚書事光祿勳許敬為司徒辛丑下邳王成薨三年春正月丙子京師地震漢陽地陷裂甲午詔實覈傷害者賜年七歲以上錢人二千一家被害郡縣為收斂乙未詔勿收漢陽今戎觓瓷口賦夏四月癸卯遣光祿大夫案行漢陽及河內魏郡陳留東郡稟貸貧人六月旱遣使者錄囚徒理輕繫甲寅濟南王顯薨秋七月丁酉茂陵園寑灾帝縞素避正殿辛亥使太常王龔持節告祠茂陵九月鮮卑寇漁陽冬十二月己亥太傅桓焉免是歲車騎將軍來歷罷四年春正月丙寅詔曰朕託王公之上涉道日寡政失厥中陰陽氣隔寇盜肆暴庶獄彌繁憂悴永歎疢如疾首詩云君子如祉亂庶遄已三朝之會朔旦立春嘉與海內洗心自新其赦天下從甲寅赦令已來復秩屬籍三年正月已來還贖其閻顯江京等知識婚姻禁錮一原除之務崇寬和敬順時令遵典去苛以稱朕意丙子帝加元服賜王主貴人公卿以下金帛各有差賜男子爵及流民欲占者人一級為父後三老孝悌力田人二級魚眾寡孤獨篤貧不能自存帛人一匹二月戊戌詔以民入山鑿石發洩藏氣勑有司檢察所當禁絕如建武永平故事夏五月壬辰詔曰海內頗有灾異朝廷修政太官減膳珍玩不御而桂陽太守文礱不惟竭忠宣暢本朝而遠獻大珠以求幸媚今封以還之五州雨水秋八月庚子遣使實覈死亡收斂稟賜丁巳太尉劉光司空張皓免九月復安定北地上郡歸舊土癸酉大鴻臚龐參為太尉錄尚書事太常王龔為司空冬十一月庚辰司徒許敬免鮮卑寇朔方十二月乙卯宗正劉崎為司徒是歲分會稽為吳郡拘彌國遣使貢獻五年春正月疏勒王遣侍子及大宛莎車王皆奉使貢獻夏四月京師旱辛巳詔郡國貧人被灾者勿收責今年過更京師及郡國十二蝗冬十月丙辰詔郡國中都官死罪繫囚皆減罪一等詣北地上郡安定戍乙亥定遠侯班始坐殺其妻陰城公主腰斬同產皆𠫓廾市六年春二月庚午河閒王開薨三月辛亥復伊吾屯田復置伊吾司馬一人秋九月辛巳繕起太學護烏桓校尉耿曄遣兵擊鮮卑破之丁酉于闐王遣侍子貢獻冬十一月辛亥詔曰連年灾潦冀部尤甚比蠲除實傷贍恤窮匱而百姓猶有𠫓廾業流亡不絕疑郡縣用心怠惰恩澤不宣易美損上益下書稱安民則惠其令冀部勿收今年田租芻十二月日南徼外葉調國撣國遣使貢獻壬申客星出牽牛于闐王遣侍子詣闕貢獻陽嘉元年春正月乙巳立皇后梁氏賜爵人二級三老孝悌力田三級爵過公乘得移與子若同產同產子民無名數及流民欲占著者人一級魚眾寡孤獨篤貧不能自存者粟人五斛二月海賊曾旌等寇會稽殺句章鄞鄮三縣長攻會稽東部都尉詔緣海縣各屯兵戍丁巳皇后謁高廟光武廟詔稟甘陵貧人大小口各有差京師旱庚申勑郡國二千石各禱名山岳瀆遣大夫謁者詣嵩高首陽山并祠河洛請雨戊辰雩以冀部比年水潦民食不贍詔案行稟貸勸農功賑乏絕甲戌詔曰政失厥和陰陽隔并冬鮮宿雪春無澍雨分禱祈請靡神不禜深恐在所慢違如在之義今遣侍中王輔等持節分詣岱山東海滎陽河洛盡心祈焉三月楊州六郡妖賊章河等寇四十九縣殺傷長吏庚寅帝臨辟雍饗射大赦天下改元陽嘉詔宗室絕屬籍者一切復籍稟冀州尤貧民勿收今年更租口賦夏五月戊寅阜陵王恢薨秋七月史官始作候風地動銅儀丙辰以太學新成試明經下第者補弟子增甲乙科員各十人除郡國耆儒九十人補郎舍人九月詔郡國中都官繫囚皆減死一等亡命者贖各有差鮮卑寇遼東冬十一月甲申望都蒲陰狼殺女子九十七人詔賜狼所殺者錢人三千辛卯初令郡國舉孝廉限年四十以上諸生通章句文吏能牋奏乃得應選其有茂才異行若顏淵子奇不拘年齒十二月丁未東平王敞薨庚戌復置玄菟郡屯田六郡部閏月丁亥令諸以詔除為郎年四十以上課試如孝廉科者得參廉選歲舉一人戊子客星出天苑辛卯詔曰閒者以來吏政不勤故灾咎屢臻盜賊多有退省所由皆以選舉不實官非其人是以天心未得人情多怨書歌股肱詩刺三事今刺史二千石之選歸任三司其簡序先後精覈高下歲月之次文武之宜務存厥衷庚子恭陵百丈廡灾是歲起西苑修飾宮殿二年春二月甲申詔以吳郡會稽飢荒貸人種糧三月使匈奴中郎將王稠率左骨都侯等擊鮮卑破之辛酉除京師耆儒年六十以上四十八人補郎舍人及諸王國郎夏四月復置隴西南部都尉官己亥京師地震五月庚子詔曰朕以不德統奉鴻業無以奉順乾坤協序陰陽灾眚屢見咎徵仍臻地動之異發自京師矜矜祗畏不知所裁羣公卿士將何以匡輔不逮奉荅戒異異不空設必有所應其各悉心直言厥咎靡有所諱戊午司空王龔免六月辛未太常魯國孔扶為司空䟽勒國獻師子封牛丁丑洛陽地陷是月旱秋七月己未太尉龐參免八月己巳大鴻臚沛國施延為太尉鮮卑寇代郡冬十月庚午行禮辟雍奏應鍾始復黃鍾作樂器隨月律三年春二月己丑詔以久旱京師諸獄無輕重皆且勿考竟須得澍雨三月庚戌益州盜賊劫質令長殺列侯夏四月丙寅車師後部司馬率後部王加特奴等掩擊匈奴大破之獲其季母五月戊戌制詔曰昔我太宗丕顯之德假于上下儉以恤民政致康朕秉事不明政失厥道天地譴怒大變仍見春夏連旱寇賊彌繁元元被害朕甚愍之嘉與海內洗心更始其大赦天下自殊死以下謀反大逆諸犯不當得赦者皆赦除之賜民年八十以上米人一斛肉二十斤酒五斗九十以上加賜帛人二匹絮三斤秋七月庚戌鍾羌寇隴西漢陽冬十月護羌校尉馬續擊砟均十一月壬寅司徒劉崎司空孔扶免乙巳大司農南郡黃尚為司徒光祿勳河東王卓為司空丙午武都塞上屯羌及外羌攻破屯官驅略人畜四年春二月丙子初聽中官得以養子為後世襲封爵自去冬旱至于是月謁者馬賢擊鍾羌大破之夏四月甲子太尉施延免戊寅執金吾梁商為大將軍前太尉龐參為太尉六月己未梁王匡薨秋七月己亥濟北王登薨閏月丁亥朔日有食之冬十月烏桓寇雲中十一月圍度遼將軍耿曄於蘭池發諸郡兵救之烏桓退走十二月甲寅京師地震永和元年春正月夫餘王來朝乙卯詔曰朕秉政不明灾眚屢臻典籍所忌震食為重今日變方遠地搖京師咎徵不虛必有所應羣公百僚其各上封事指陳得失靡有所諱己巳宗祀明堂登靈臺改元永和大赦天下秋七月偃師蝗冬十月丁亥承福殿火帝避御雲臺十一月丙子太尉龐參罷十二月象林蠻夷叛乙巳以前司空王龔為太尉二年春正月武陵蠻叛圍充縣又寇夷道二月廣漢屬國都尉擊破白馬羌武陵太守李進擊叛蠻破之三月辛亥北海王翼薨乙卯司空王卓薨丁丑光祿勳馮翊郭虔為司空夏四月丙申京師地震五月日南叛蠻攻郡府秋七月九真交阯二郡兵反八月庚子熒惑犯南斗江夏盜賊殺邾長冬十月甲申行幸長安所過魚眾寡孤獨貧不能自存者賜粟人五斛庚子幸未央宮會三輔郡守都尉及官屬勞賜作樂十一月丙午祠高廟丁未遂有事十一陵丁卯京師地震十二月乙亥至自長安三年春二月乙亥京師及金城隴西地震二郡山岸崩地陷戊子太白犯熒惑夏四月九江賊蔡伯流寇郡界及廣陵殺江都長戊戌遣光祿大夫案行金城隴西賜壓死者年七歲以上錢人二千一家皆被害為收斂之除今年田租尤甚者勿收口賦閏月蔡伯流等率衆詣徐州刺史應志降己酉京師地震五月吳郡丞羊珍反攻郡府太守王衡破斬之六月辛丑琅邪王遵薨九真太守祝良交阯刺史張喬慰誘日南叛蠻降之嶺外平秋七月丙戌濟北王多薨八月己未司徒黃尚免九月己酉光祿勳長沙劉壽為司徒丙戌令大將軍三公各舉故刺史二千石及見令長郎謁者四府掾屬剛毅武猛有謀謨任將帥者各二人特進卿校尉各一人冬十月燒當羌寇金城護羌校尉馬賢擊破之羌遂相招而叛十二月戊戌朔日有食之四年春正月庚辰中常侍張逵蘧政楊定等有罪誅連及弘農太守張鳳安平相楊晧下獄死三月乙亥京師地震夏四月癸卯護羌校尉馬賢討燒當羌大破之戊午大赦天下賜民爵及粟帛各有差五月戊辰封故濟北惠王壽子安為濟北王秋八月太原郡旱民庶流癸丑遣光祿大夫案行稟貸除更賦冬十月戊午校獵上林苑歷函谷關而還十一月丙寅幸廣成苑五年春二月戊申京師地震夏四月庚子中山王弘薨南匈奴左部句龍大人吾斯車紐等叛圍美稷五月度遼將軍馬續討吾斯車紐破之使匈奴中郎將陳龜迫殺南單于己丑晦日有食之且凍羌寇三輔殺令長丁丑令死罪以下及亡命贖各有差九月令扶風漢陽築隴道塢三百所置屯兵辛未太尉王龔罷且凍羌寇武都燒隴關壬午太常桓焉為太尉丁亥徙西河郡居離石上郡居夏陽朔方居五原句龍吾斯等東引烏桓西收羌胡寇上郡立車紐為單于冬十一月辛巳遣使匈奴中郎將張耽擊砟均車紐降六年春正月丙子征西將軍馬賢與且凍羌戰于射姑山賢軍敗沒安定太守郭璜下獄死詔貸王侯國租一歲閏月鞏唐羌寇隴西遂及三輔二月丁巳有星孛于營室三月武都威太守趙沖討鞏唐羌破之庚子司空郭虔免丁乙巳河閒王政薨丙午太僕趙戒為司空夏五月庚子齊王無忌薨使匈奴中郎將張耽大破烏桓羌胡於天山鞏唐羌寇北地秋七月甲午詔假民有貲者戶錢一千八月丙辰大將軍梁商薨壬戌河南尹梁冀為大將軍九月諸種羌寇武威辛亥晦日有食之冬十月癸丑徙安定居扶風北地居馮翊十一月庚子以執金吾張喬行車騎將軍事將兵屯三輔漢安元年春正月癸巳宗祀明堂大赦天下改元漢安二月丙辰詔大將軍公卿舉賢良方正能探賾索隱者各一人秋七月始置承華八月南匈奴左部大人句龍吾斯與薁鞬臺耆等反叛丁卯遣侍中杜喬光祿大夫周舉守光祿大夫郭遵馮羨欒巴張綱周栩劉班等八人分行州郡班宣風化舉實臧否九月庚寅廣陵盜賊張嬰等寇郡縣冬十月辛未太尉桓焉司徒劉壽免甲戌行車騎將軍張喬罷十一月壬午司隸校尉趙峻為太尉大司農胡廣為司徒癸卯詔大將軍三公選武猛試用有效驗任為將校者各一人是歲廣陵賊張嬰等詣太守張綱降二年春二月丙辰鄯善國遣使貢獻夏四月庚戌護羌校尉趙沖與漢陽太守張貢擊燒當何羌於參破之六月乙丑熒惑犯鎮星丙寅立南匈奴守義王兜樓儲為南單于冬十月辛丑令郡國中都官繫囚殊死以下出縑贖各有差其不能入贖者遣詣臨羌縣居作二歲甲辰減百官奉丙午禁沽酒又貸王侯國租一歲閏月趙沖擊燒當羌於河阿陽砟均十一月使匈奴中郎將馬寔遣人刺殺句龍吾斯十二月楊徐盜賊攻燒城寺殺略吏民是歲涼州地百八十震建康元年春正月辛丑詔曰隴西漢陽張掖北地武威武都自去年九月已來地百八十震山谷坼裂壞敗城寺殺害民庶夷狄叛逆賦役重數內外怨曠惟咎歎息其遣光祿大夫案行宣暢恩澤惠此下民勿為煩擾三月庚子沛王廣薨領護羌校尉衞琚追討叛羌破之南郡江夏盜賊寇掠城邑州郡討平之夏四月使匈奴中郎將馬寔擊南匈奴左部破之於是胡羌烏桓悉詣寔降辛巳立皇子炳為皇太子改年建康大赦天下賜人爵各有差秋七月丙午清河王延平薨八月楊徐盜賊范容周生等寇掠城邑遣御史中丞馮赦督州郡兵討之庚午帝崩于玉堂前殿時年三十遺詔無起寑廟斂以故服珠玉玩好皆不得下論曰古之人君離幽放而反國祚者有矣莫不矯鑒前違審識情偽無忘在外之憂故能中興其業夫順朝之政殆不然乎何其傚僻之多與孝沖皇帝諱炳順帝之子也母曰虞貴人建康元年立為皇太子其年八月庚午即皇帝位年二歲尊皇后曰皇太后太后臨朝丁丑以太尉趙峻為太傅大司農李固為太尉參錄尚書事九月丙午葬孝順皇帝于憲陵廟曰敬宗是日京師及太原鴈門地震三郡水涌土裂庚戌詔三公特進侯卿校尉舉賢良方正幽逸修道之士各一人百僚皆上封事己未九江太守丘騰有罪下獄死楊州刺史尹耀九江太守鄧顯討賊范容等於歷陽軍敗耀顯為賊所歿冬十月日南蠻夷攻燒城邑交阯刺史夏方招誘降之壬申常山王儀薨己卯零陵太守劉康坐殺無辜下獄死十一月九江盜賊徐鳳馬勉等稱無上將軍攻燒城邑己酉令郡國中都官繫囚減死一等徙邊謀反大逆不用此令十二月九江賊黃虎等攻合肥是歲羣盜發憲陵護羌校尉趙沖追撀叛羌於鸇陰河戰歿永嘉憙元年春正月戊戌帝崩于玉堂前殿年三歲清河王蒜徵至京師孝質皇帝諱纘肅宗玄孫曾祖父千乘貞王伉祖父樂安夷王寵父勃海孝王鴻母陳夫人沖帝不豫大將軍梁冀徵帝到洛陽都亭及沖帝崩皇太后與冀定策禁中丙辰使冀持節以王青蓋車迎帝入南宮丁巳封為建平侯其日即皇帝位年八歲己未葬孝沖皇帝于懷陵廣陵賊張嬰等復反攻殺堂邑江都長九江賊徐鳳等攻殺曲陽東城長甲申謁高廟乙酉謁光武廟二月豫章太守虞續坐贓下獄死乙酉大赦天下賜人爵及粟帛各有差還王侯所削戶邑彭城王道薨叛羌詣左馮翊梁並降三月九江賊馬勉稱黃帝九江都尉滕撫討馬勉范容周生大破斬之夏四月壬申雩庚辰濟北王安薨丹陽賊陸宮等圍城燒亭寺丹陽太守江漢擊破之五月甲午詔曰朕以不德託母天下布政不明每失厥中自春涉夏大旱炎赫憂心京京故得禱祈明祀冀蒙潤澤前雖得雨而宿麥頗傷比日陰雲還復開霽寤寐永歎重懷慘結將二千石令長不崇寬和暴刻之為乎其令中都官繫囚罪非殊死考未竟者一切任出以須立秋郡國有名山大澤能興雲雨者二千石長吏各絜齊請禱謁誠盡禮又兵役連年死亡流離或支骸不斂或停棺莫收朕甚愍焉昔文王葬枯骨人賴其德今遣使者案行若無家屬及貧無資者隨宜賜卹以慰孤魂是月下邳人謝安應募擊徐鳳等斬之丙辰詔曰孝殤皇帝雖不永休祚而即位踰年君臣禮成孝安皇帝承襲統業而前世遂令恭陵在康陵之上先後相踰失其次序非所以奉宗廟之重垂無窮之制昔定公追正順祀春秋善之其令恭陵次康陵憲陵次恭陵以序親秩為萬世法六月鮮卑寇代郡秋七月庚寅阜陵王代薨廬江盜賊攻尋陽又攻盱台滕撫遣司馬王章擊破之九月庚戌太傅趙峻薨冬十一月己丑南陽太守韓昭坐贓下獄死丙午中郎將滕撫擊廣陵賊張嬰破之丁未中郎將趙序坐事𠫓廾巿歷陽賊華孟自稱黑帝攻殺九江太守楊岑滕撫率諸將擊孟等大破斬之本初元年春正月丙申詔曰昔堯命四子以欽天道鴻範九疇休咎有象夫瑞以和降異因逆感禁微應大前聖所重頃者州郡輕慢憲防競逞殘暴造設科條陷入無罪或以喜怒驅逐長吏恩阿所私罰枉仇𨻶至令守闕訴訟前後不絕送故迎新人離其害怨氣傷和以致灾眚書云明德慎罰方春東作育微敬始其勑有司罪非殊死且勿案驗以崇在寬壬子廣陵太守王喜坐討賊逗留下獄死二月庚辰詔曰九江廣陵二郡數離寇害殘夷最甚生者失其資業死者委尸原野昔之為政一物不得其所若己為之況我元元嬰此困毒方春戒節賑濟乏戹掩骼埋胔之時其調比郡見穀出稟窮弱收葬枯骸務加埋卹以稱朕意夏四月庚辰令郡國舉明經年五十以上七十以下詣太學自大將軍至六百石皆遣子受業歲滿課試以高第五人補郎中次五人太子舍人又千石六百石四府掾屬三署郎四姓小侯先能通經者各令隨家法其高第者上名牒當以次賞進五月庚寅徙樂安王為勃海王海水溢戊申使謁者案行收葬樂安北海人為水所漂沒死者又稟給貧羸庚戌太白犯熒惑六月丁巳大赦天下賜民爵及粟帛各有差閏月甲申大將軍梁冀潛行鴆弒帝崩于玉堂前殿年九歲丁亥太尉李固免戊子司徒胡廣為太尉司空趙戒為司徒與梁冀參錄尚書事太僕袁湯為司空贊曰孝順初立時髦允集匪砥匪革終淪嬖習保阿傳土后家世及沖夭未識質弒以聰陵折在運天緒三終
