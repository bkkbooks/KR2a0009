body:
  text: 後漢書卷七十四下袁紹劉表列傳第六十四下紹子談談自稱車騎將軍出軍黎陽尚少與其兵而使逢紀隨之談求益兵審配等又議不與談怒殺逢紀曹操度河攻談談告急於尚尚乃留審配守鄴自將助談與操相拒於黎陽自九月至明年二月大戰城下談尚敗退操將圍之乃夜遁還鄴操進軍尚逆擊破操操軍還許談謂尚曰我鎧甲不精故前為曹操所敗今操軍退人懷歸志及其未濟出兵掩之可令大潰此策不可失也尚疑而不許既不益兵又不易甲談大怒郭圖辛評因此謂談曰使先公出將軍為兄後者皆是審配之所構也談然之遂引兵攻尚戰於外門談敗乃引兵還南皮別駕王修率吏人自青州往救談談還欲更攻尚問修曰計將安出修曰兄弟者左右手也譬人將鬬而斷其右手曰我必勝若如是者可乎夫𠫓廾兄弟而不親天下其誰親之屬有讒人交鬬其閒以求一朝之利願塞耳勿聽也若斬佞臣數人復相親睦以御四方可橫行於天下談不從尚復自將攻談談戰大敗嬰城固守尚圍之急談奔平原而遣潁川辛毗詣曹操請救劉表以書諫談曰天降災害禍難殷流初交殊族卒成同盟使王室震蕩彝倫攸斁是以智達之士莫不痛心入骨傷時人不能相忍也然孤與太公志同願等雖楚魏絶邈山河䄄遠戮力乃心共奬王室使非族不干吾盟異類不絶吾好此孤與太公無二之所致也功績未卒太公殂隕賢胤承統以繼洪業宣奕世之德履丕顯之祚摧嚴敵於鄴都揚休烈於朔土顧定疆宇虎視河外凡我同盟莫不景附何悟青蠅飛於竿旌無忌游於二壘使股肱分成二體胸膂絶為異身初聞此問尚謂不然定聞信來乃知閼伯實沈之忿已成𠫓廾親即讎之計已決旃斾交於中原暴尸纍於城下聞之哽咽若存若亡昔三王五伯下及戰國君臣相弒父子相殺兄弟相殘親戚相滅蓋時有之然或欲以成王業或欲以定霸功皆所謂逆取順守而徼富強於一世也未有𠫓廾親即異兀其根本而能全於長世者也游之恨於齊未若太公之忿於曹也宣子之臣承業未若仁君之繼統也且君子違難不適讎國交絶不出惡聲況忘先人之讎𠫓廾親戚之好而為萬世之戒遺同盟之恥哉蠻夷戎狄將有誚讓之言況我族類而不痛心邪之無慙順之節仁君當降志辱身以濟事為務事定之後使天下平其曲直不亦為高義邪今仁君見憎於夫人未若鄭莊之於姜氏昆弟之嫌未若重華之於象敖然莊公卒崇大隧之樂象敖終受有鼻之封願捐𠫓廾百痾追攝舊義復為母子昆弟如初今整勒士馬瞻望鵠立曹操遂還救談十月至黎陽尚聞操度河乃釋平原還鄴尚將呂曠高翔畔歸曹氏談復陰刻將軍印以假曠翔操知談詐乃以子整娉談女以安之而引軍還九年三月尚使審配守鄴復攻談於平原配獻書於談曰配聞良藥苦口而利於病忠言逆耳而便於行願將軍緩心抑怒終省愚辭蓋春秋之義國君死社稷忠臣死君命苟圖危宗廟剝亂國家親疏一也是以周公垂涕以斃蔽管蔡之獄季友歔欷而行叔牙之誅何則義重人輕事不獲已故也昔先公廢黜將軍以續賢兄立我將軍以為嫡嗣上告祖靈下書譜牒海內遠近誰不備聞何意凶臣郭圖妄畫蛇足曲辭諂媚交亂懿親至令將軍忘孝友之仁襲閼沈之迹放兵鈔突屠城殺吏冤魂痛於幽冥創痍被於草棘又乃圖獲鄴城許賞賜秦胡其財物婦女豫有分數又云孤雖有老母趣使身體完具而已聞此言者莫不悼心揮涕使太夫人憂哀憤隔我州君臣監寐悲歎誠拱默以聽執事之圖則懼違春秋死命之節詒太夫人不測之患損先公不世之業我將軍辭不獲命以及館陶之役伏惟將軍至孝蒸蒸發於岐嶷友于之性生於自然章之以聰明行之以敏達覽古今之舉措覩興敗之徵符輕榮財於糞土貴名高位於丘嶽何意奄然迷沈墮賢哲之操積怨肆忿取破家之禍翹企延頸待望讎敵委慈親於虎狼之牙以逞一朝之志豈不痛哉若乃天啓尊心革圖易慮則我將軍匍匐悲號於將軍股掌之上配等亦當躬布體以聽斧鑕之刑如又不悛禍將及之願熟詳吉凶以賜環玦談不納曹操因此進攻鄴審配將馮札禮為內應開突門內操兵三百餘人配覺之從城上以大石擊門門閉入者皆死操乃鑿圍城周回四十里初令淺示若可越配望見笑而不出爭利操一夜濬之廣深二丈引漳水以灌之自五月至八月城中餓死者過半尚聞鄴急將軍萬餘人還救城操逆擊破之尚走依曲漳為營操復圍之未合尚懼遣陰夔陳琳求降不聽尚還走藍口操復進急圍之尚將馬延等臨陳降衆大潰尚奔中山盡收其輜重得尚印綬節鉞及衣物以示城中城中崩沮審配令士卒曰堅守死戰操軍疲矣幽州方至何憂無主操出行圍配伏弩射之幾中以其兄子榮為東門校尉榮夜開門內操兵配拒戰城中生獲配操謂配曰吾近行圍弩何多也配曰猶恨其少操曰卿忠於袁氏亦自不得不爾意欲活之配意氣壯烈終無撓辭見者莫不歎息遂斬之全尚母妻子還其財寶高幹以并州降復為刺史曹操之圍鄴也談復背之因略取甘陵安平勃海河閒攻尚於中山尚敗走故安從熙而談悉收其衆還屯龍湊十二月曹操討談軍其門談夜遁奔走南皮臨清河而屯明年正月急攻之談欲出戰軍未合而破談被髮驅馳追者意非恆人趨奔之談墯馬顧曰咄兒過我我能富貴汝言未絶口頭已斷地於是斬郭圖等戮其妻子熙尚為其將焦觸張南所攻奔遼西烏桓觸自號幽州刺史驅率諸郡太守令長背袁向曹陳兵數萬殺白馬盟令曰違者斬衆莫敢仰視各以次歃至別駕代郡韓珩曰吾受袁公父子厚恩今其破亡智不能救勇不能死於義闕矣若乃北面曹氏所不能為也一坐為珩失色觸曰夫舉大事當立大義事之濟否不待一人可卒珩志以厲事君曹操聞珩節甚高之屢辟不至卒於家高幹復叛執上黨太守舉兵守壺口關十一年曹操自征幹幹乃留其將守城自詣胸奴求救不得獨與數騎亡欲南奔荊州上洛都尉捕斬之十二年曹操征遼西擊烏桓尚熙與烏桓逆操軍戰敗走乃與親兵數千人奔公孫康於遼東尚有勇力先與熙謀曰今到遼東康必見我我獨為兄手擊之且據其郡猶可以自廣也康亦心規取尚以為功乃先置精勇於廄中然後請尚熙熙疑不欲進尚彊之遂與俱入未及坐康叱伏兵禽之坐於凍地尚謂康曰未死之閒寒不可忍可相與席康曰卿頭顱方行萬里何席之為遂斬首送之康遼東人父度初避吏為玄兔小吏稍仕中平元年還為本郡守在職敢殺伐郡中名豪與己夙無恩者遂誅滅百餘家因東擊高句驪西攻烏桓威行海畔時王室方亂度恃其地遠陰獨懷幸會襄平社生大石丈餘下有三小石為足度以為己瑞初平元年乃分遼東為遼西中遼郡並置太守越海收東萊諸縣為營州刺史自立為遼東侯平州牧追封父延為建義侯立漢二祖廟承制設壇墠於襄平城南郊祀天地藉田理兵乘鸞輅九旒旄頭羽騎建安九年司空曹操表為奮威將軍封永寧鄉侯度死康嗣故遂據遼土焉劉表字景升山陽高平人魯恭王之後也身長八尺餘姿貌溫偉與同郡張儉等俱被訕議號為八顧詔書捕案黨人表亡走得免黨禁解辟大將軍何進掾初平元年長沙太守孫堅殺荊州刺史王睿詔書以表為荊州刺史時江南宗賊大盛又袁術阻兵屯魯陽表不能得至乃單馬入宜城請南郡人蒯越襄陽人蔡瑁與共謀畫表謂越曰宗賊雖盛而衆不附若袁術因之禍必至矣吾欲徵兵恐不能集其策焉出對曰理平者先仁義理亂者先權謀兵不在多貴乎得人袁術驕而無謀宗賊率多貪暴越有所素養者使人示之以利必持衆來使君誅其無道施其才用威德既行襁負而至矣兵集衆附南据江陵北守襄陽荊州八郡可傳檄而定公路雖至無能為也表曰善乃使越遣人誘宗賊帥至者十五人皆斬之而襲取其衆唯江夏賊張虎陳坐擁兵據襄陽城表使越與龐季往譬之乃降江南悉平諸守令聞表威名多解印綬去表遂理兵襄陽以觀時變袁術與其從兄紹有隙而紹與表相結故術共孫堅合從襲表表敗堅遂圍襄陽會表將黃祖救至堅為流箭所中死餘衆退走及李傕等入長安冬表遣使奉貢傕以表為鎮南將軍荊州牧封成武侯假節以為己援建安元年驃騎將軍張濟自關中走南陽因攻穰城中飛矢而死荊州官屬皆賀表曰濟以窮來主人無禮至於交鋒此非牧意牧受弔不受賀也使人納其衆衆聞之喜遂皆服從三年長沙太守張羡率零陵桂陽三郡畔表表遣兵攻圍破羡平之於是開土遂廣南接五領北據漢川地方數千里帶甲十餘萬初荊州人情好擾加四方駭震寇賊相扇處處麋沸表招誘有方威懷兼洽其姦猾宿賊更為效用萬里肅清大小咸悅而服之關西兗豫學士歸者蓋有千數表安慰賑贍皆得資全遂起立學校博求儒術綦母闓宋忠等撰立五經章句謂之後定愛民養士從容自保及曹操與袁紹相持於官度紹遣人求助表許之不至亦不援曹操且欲觀天下之變從事中郎南陽韓嵩別駕劉先說表曰今豪桀並爭兩雄相持天子之重在於將軍若欲有為起乘其敝可也如其不然固將擇所宜從豈可擁甲十萬坐觀成敗求援而不能助見賢而不肯歸此兩怨必集於將軍恐不得中立矣曹操善用兵且賢俊多歸之其藝必舉袁紹然後移兵以向江漢恐將軍不能禦也今之勝計莫若舉荊州以附曹操操必重德將軍長享福祚垂之後嗣此萬全之策也蒯越亦勸之表狐疑不斷乃遣嵩詣操觀望虛實謂嵩曰今天下未知所定而曹操擁天子都許君為我觀其釁嵩對曰嵩觀曹公之明必得志於天下將軍若欲歸之使嵩可也如其猶豫嵩至京師天子假嵩一職不獲辭命則成天子之臣將軍之故吏耳在君為君不復為將軍死也惟加重思表以為憚使強之至許果拜嵩侍中零陵太守及還盛稱朝廷曹操之德勸遣子入侍表大怒以為懷二陳兵詬嵩將斬之嵩不為動容徐陳臨行之言表妻蔡氏知嵩賢諫止之表猶怒乃考殺從行者知無它意但囚嵩而已六年劉備自袁紹奔荊州表厚相待結而不能用也十三年曹操自將征表未至八月表疽發背卒在荊州幾二十年家無餘積二子琦琮表初以琦貌類於己甚愛之後為琮娶其後妻蔡氏之姪蔡氏遂愛琮而惡琦毀譽之言日聞於表表寵耽後妻每信受焉又妻弟蔡瑁及外甥張允並得幸於表又睦於琮而琦不自寧嘗與琅邪人諸葛亮謀自安之術亮初不對後乃共升高樓因令去梯謂亮曰今日上不至天下不至地言出子口而入吾耳可以言未亮曰君不見申生在內而危重耳居外而安乎琦意感悟陰規出計會表將江夏太守黃祖為孫權所殺琦遂求代其任及表病甚琦歸省疾素慈孝允等恐其見表而父子相感更有託後之意乃謂琦曰將軍命君撫臨江夏其任至重今釋衆來必見譴怒傷親之歡重增其疾非孝敬之道也遂遏于戶外使不得見琦流涕而去人衆聞而傷焉遂以琮為嗣琮以侯印授琦琦怒投之地將因奔喪作難會曹操軍至新野琦走江南蒯越韓嵩及東曹掾傅巽等說琮歸降琮曰今與諸君據全楚之地守先君之業以觀天下何為不可巽曰逆順有大體強弱有定藝以人臣而拒人主逆道也以新造之楚而禦中國必危也以劉備而敵曹公不當也三者皆短欲以抗王師之鋒必亡之道也將軍自料何與劉備琮曰不若也巽曰誠以劉備不足禦曹公則雖全楚不能以自存也誠以劉備足禦曹公則備不為將軍下也願將軍勿疑及操軍到襄陽琮舉州請降劉備奔夏口操以琮為青州刺史封列侯蒯越等侯者十五人乃釋嵩之囚以其名重甚加禮待使條品州人優劣皆擢而用之以嵩為大鴻臚以交友禮待之蒯越光祿勳劉光先尚書令初表之結袁紹也侍中從事鄧義諫不聽義以疾退終表世不仕操以為侍中其餘多至大官操後敗於赤壁劉備表琦為荊州刺史明年卒論曰袁紹初以豪俠得衆遂懷雄霸之圖天下勝兵舉旗者莫不假以為名及臨場決敵則悍夫爭命深籌高議則智士傾心盛哉乎其所資也韓非曰佷剛而不和愎過而好勝嫡子輕而庶子重斯之謂亡徵劉表道不相越而欲臥收天運擬蹤三分其猶木禺之於人也贊曰紹姿弘雅表亦長者稱雄河外強南夏魚儷漢舳雲屯冀馬窺圖訊鼎禋天類社既云天工亦資人亮矜彊少成坐談奚望回皇冢嬖身穨業喪
