body:
  text: 後漢卷四十六郭陳列傳第三十六郭躬弟子鎮陳寵子忠郭躬字仲孫潁川陽翟人也家世衣冠父弘習小杜律太守寇恂以弘為決曹掾斷獄至三十年用法平諸為弘所決者退無怨情郡內比之東海于公年九十五卒躬少傳父業講授徒衆常數百人後為郡吏辟公府永平中奉車都尉竇固出擊胸奴騎都尉秦彭為副彭在別屯而輒以法斬人固奏彭專擅請誅之顯宗乃引公卿朝臣平其罪科躬以明法律召入議議者皆然固奏躬獨曰於法彭得斬之帝曰軍征校尉一統於督彭既無斧鉞可得專殺人乎躬對曰一統於督者謂在部曲也今彭專軍別將有異於此兵事呼吸不容先關督帥且漢制棨戟即為斧鉞於法不合罪帝從躬議又有兄弟共殺人者而罪未有所歸帝以兄不訓弟故報兄重而減弟死中常侍孫章宣詔誤言兩報重尚書奏章矯制罪當斬帝復召躬問之躬對章應罰金帝曰章矯詔殺人何謂罰金躬曰法令有故誤章傳命之謬於事為誤誤者其文則輕帝曰章與囚同縣疑其故也躬曰周道如砥其直如矢君子不逆詐君王法天刑不可以委曲生意帝曰善遷躬廷尉正坐法免後三遷元和三年拜為廷尉躬家世掌法務在寬平及典理官決獄斷刑多依矜恕乃條諸重文可從輕者四十一事奏之事皆施行著于令章和元年赦天下繫囚在四月丙子以前減死罪一等勿笞詣金城而文不及亡命未發覺者躬上封事曰聖恩所以減死罪使戍邊者重人命也今死罪亡命無慮萬人又自赦以來捕得甚衆而詔令不及皆當重論伏惟天恩莫不蕩宥死罪已下並蒙更生而亡命捕得獨不沾澤臣以為赦前犯死罪而繫在赦後者可皆勿笞詣金城以全人命有益於邊肅宗善之即下詔赦焉躬奏讞法科多所生全永元六年卒官中子晊亦明法律至南陽太守政有名迹弟子鎮鎮字桓鍾少修家業辟太尉府再遷延光中為尚書及中黃門孫程誅中常侍江京等而立濟陰王鎮率羽林士擊殺衛尉閻景以成大功事在宦者傳再遷尚書令太傅三公奏鎮冒犯白刃手劒賊臣姦黨殄滅宗廟以寧功比劉章宜顯爵土以勵忠貞乃封鎮為定潁侯食邑二千戶拜河南尹轉廷尉免永建四年卒於家詔賜冢塋地長子賀當嗣爵讓與小弟時而逃去積數年詔大鴻臚下州郡追之賀不得已乃出受封纍遷復至廷尉及賀卒順帝追思鎮功下詔賜鎮諡曰昭武侯賀曰成侯賀弟禎亦以能法律至廷尉鎮弟子禧少明習家業兼好儒學有名譽延熹中亦為廷尉建寧二年代劉寵為太尉禧子鴻至司隸校尉封城安鄉侯郭氏自弘後數世皆傳法律子孫至公者一人廷尉七人侯者三人刺史二千石侍中中郎將者二十餘人侍御史正監平者甚衆順帝時廷尉河南吳雄季高以明法律斷獄平起自孤宦致位司徒雄少時家貧喪母營人所不封土者擇葬其中喪事趣辨不問時日醫巫皆言當族滅而雄不顧及子欣孫恭三世廷尉為法名家初肅宗時司隸校尉下邳趙興亦不恤諱忌每入官舍輒更繕修館宇移穿改築故犯妖禁而家人爵祿益用豐熾官至潁川太守子峻太傅以才器稱孫安世魯相三葉皆為司隸時稱其盛桓帝時汝南有陳伯敬者行必矩步坐必端膝呵叱狗馬終不言死目有所見不食其肉行路聞凶便解駕留止還觸歸忌則寄宿鄉亭年老寢滯不過舉孝廉後坐女壻亡吏太守邵夔怒而殺之時人罔忌禁者多談為證焉論曰曾子云上失其道民散久矣如得其情則哀矜而勿喜夫不喜於得情則恕心用恕心用則可寄枉直矣夫賢人君子斷獄其必主於此乎郭躬起自佐史小大之獄必察焉原其平刑審斷庶於勿喜者乎若乃推己以議物捨狀以貪情法家之能慶延于世蓋由此也陳寵字昭公沛國洨人也曾祖父咸成哀閒以律令為尚書平帝時王莽輔政多改漢制咸心非之及莽因呂寬事誅不附己者何武鮑宣等咸乃歎曰易稱君子見幾而作不俟終日吾可以逝矣即乞骸骨去職及莽篡位召咸以為掌寇大夫謝病不肯應時三子參豐欽皆在位乃悉令解官父子相與歸鄉里閉門不出入猶用漢家祖臘人問其故咸曰我先人豈知王氏臘乎其後莽復徵咸遂稱病篤於是乃收斂其家律令書文皆壁藏之咸性仁恕常戒子孫曰為人議法當依於輕雖有百金之利慎無與人重比建武初欽子躬為廷尉左監早卒躬生寵明習家業少為州郡吏辟司徒鮑昱府是時三府掾屬專尚交遊以不肯視事為高寵常非之獨勤心物務數為昱陳當世便宜昱高其能轉為辭曹掌天下獄訟其所平決無不厭服衆心時司徒辭訟久者數十年事類溷錯易為輕重不良吏得生因緣寵為昱撰辭訟比七卷決事科條皆以事類相從昱奏上之其後公府奉以為法三遷肅宗初為尚書是時承永平故事吏政尚嚴切尚書決事率近於重寵以帝新即位宜改前世苛俗乃上疏曰臣聞先王之政賞不僭刑不濫與其不得已寧僭不濫故唐堯著典眚灾肆赦周公作戒勿誤庶獄伯夷之典惟敬五刑以成三德由此言之聖賢之政以刑罰為首往者斷獄嚴明所以威懲姦慝姦慝既平必宜濟之以寬陛下即位率由此義數詔羣僚弘崇晏晏而有司執事未悉奉承典刑用法猶尚深刻斷獄者急於篣格酷烈之痛執憲者煩於詆欺放濫之文或因公行私逞縱威福夫為政猶張琴瑟大弦急者小弦絶故子貢非臧孫之猛法而美鄭喬之仁政詩云不剛不柔布政優優方今聖德充塞假于上下宜隆先王之道蕩滌煩苛之法輕薄箠楚以濟羣生全廣至德以奉天心帝敬納寵言每事務於寬厚其後遂詔有司絶鉆鑽諸慘酷之科解妖惡之禁除文致之請讞五十餘事定著于令是後人俗和平屢有嘉瑞漢舊事斷獄報重常盡三冬之月是時帝始改用冬初十月而已元和二年旱長水校尉賈宗等上言以為斷獄不盡三冬故陰氣微弱陽氣發泄招致灾旱事在於此帝以其言下公卿議寵奏曰夫冬至之節陽氣始萌故十一月有蘭射干藝荔之應時令曰諸生蕩安形體天以為正周以為春十二月陽氣上通雉雊雞乳地以為正殷以為春十三月陽氣已至天地已交萬物皆出蟄蟲始振人以為正夏以為春三微成著以通三統周以天元殷以地元夏以人元若以此時行刑則殷周歲首皆當流血不合人心不稽天意月令曰孟冬之月趣獄刑無留罪明大刑畢在立冬也又孟仲冬之月身欲寧事欲靜若以降威怒不可謂寧若以行大刑不可謂靜議者咸曰旱之所由咎在改律臣以為殷周斷獄不以三微而化致康平無有災害自元和以前皆用三冬而水旱之異往往為患由此言之災害自為它應不以改律秦為虐政四時行刑聖漢初興改從簡易蕭何草律季秋論囚俱避立春之月而不計天地之正二王之春實頗有違陛下探幽析微允執其中革百載之失建永年之功上有迎承之敬下有奉微之惠稽春秋之文當月令之意聖功美業不宜中疑書奏帝納之遂不復改竉性周密常稱人臣之義苦不畏慎自在樞機謝遣門人拒絶知友唯在公家而已朝廷器之皇后弟侍中竇憲薦真定令張林為尚書帝以問竉竉對林雖有才能而素行貪濁憲以此深恨竉林卒被用而以臧汙抵罪及帝崩憲等秉權常銜寵乃白太后令典喪事欲因過中之黃門侍郎鮑德素敬寵說憲弟夏陽侯瓌曰陳寵奉事先帝深見納任故久留臺閣賞賜有殊今不蒙忠能之賞而計幾微之故誠傷輔政容貸之德瓌亦好士深然之故得出為太山太守後轉廣漢太守西州豪右并兼吏多姦貪訴訟日百數寵到顯用良吏王渙鐔顯等以為腹心訟者日減郡中清肅先是洛雒縣城南每陰雨常有哭聲聞於府中積數十年寵聞而疑其故使吏案行還言世衰亂時此下多死亡者而骸骨不得葬儻在於是寵愴然矜歎即勑縣盡收斂葬之自是哭聲遂絶及竇憲為大將軍征胸奴公卿以下及郡國無不遣吏子弟奉獻遺者而寵與中山相汝南張郴東平相應順守正不阿後和帝聞之擢寵為大司農郴太僕順左馮翊永元六年寵代郭躬為廷尉性仁矜及為理官數議疑獄常親自為奏每附經典務從寬恕帝輒從之濟活著甚衆其深文刻敝於此少衰寵又鉤校律令條法溢於甫刑者除之曰臣聞禮經三百威儀三千故甫刑大辟二百五刑之屬三千禮之所去刑之所取失禮則入刑相為表𩹉者也今律令死刑六百一十耐罪千六百九十八贖罪以下二千六百八十一溢於甫刑者千九百八十九其四百一十大辟千五百耐罪七十九贖罪春秋保乾圖曰王者三百年一蠲法漢興以來三百二年憲令稍增科條無限又律有三家其說各異宜令三公廷尉平定律令應經合義者可使大辟二百而耐罪贖罪二千八百并為三千悉刪除其餘令與禮相應以易萬人視聽以致刑措之美傳之無窮未及施行會坐詔獄吏與囚交通抵罪詔特免刑拜為尚書遷大鴻臚寵歷二郡三卿所在有迹見稱當時十六年代徐防為司空寵雖傳法律而兼通經書奏議溫粹號為任職相在位三年薨以太常南陽尹勤代為司空勤字叔梁篤性好學屏居人外荊棘生門時人重其節後以定策立安帝封福亭侯五百戶永初元年以雨水傷稼策免就國病卒無子國除竉子忠忠字伯始永始中辟司徒府三遷廷尉正以才能有聲稱司徒劉愷舉忠明習法律宜備機密於是擢拜尚書使居三公曹忠自以世典刑法用心務在寬詳初父寵在廷尉上除漢法溢於甫刑者未施行及寵免後遂寢而苛法稍繁人不堪之忠略依寵意奏上二十三條為決事比以省請讞之敝又上除蠶室刑解臧吏三世禁錮狂易殺人得減重論母子兄弟相代死聽赦所代者事皆施行及鄧太后崩安帝始親朝事忠以為臨政之初宜微聘賢才以宣助風化數上薦隱逸及直道之士馮良周燮杜根成翊世之徒於是公車禮聘良燮等後連有災異詔舉有道公卿百僚各上封事忠以詔書既開諫爭慮言事者必多激切或致不能容乃上疏豫通廣帝意曰臣聞仁君廣山藪之大納切直之謀忠臣盡謇諤之節不畏逆耳之害是以高祖舍周昌桀紂之譬孝文嘉爰盎人豕之譏武帝納東方朔宣室之正元帝容薛廣德自刎之切昔晉平公問於叔向曰國家之患孰為大對曰大臣重祿不極諫小臣畏罪不敢言下情不上通此患之大者公曰善於是下令曰吾欲進善有謁而不通者罪至死今明詔崇高宗之德推宋景之誠引咎克躬咨訪羣吏言事者見杜根成翊世等新蒙表録顯列二臺必承風響應爭為切直若嘉謀異策宜輒納用如其管穴妄有譏刺雖苦口逆耳不得事實且優遊寬容以示聖朝無諱之美若有道之士對問高者宜垂省覽特遷一等以廣直言之路書御有詔拜有道高第士沛國施延為侍中延後位至太尉常侍江京李閏等皆為列侯共秉權任帝又愛信阿母王聖封為野王君忠內懷懼悶而未敢陳諫乃作搢紳先生論以諷文多故不載自帝即位以後頻遭元二之厄百姓流亡盜賊並起郡縣更相飾匿莫肯糾發忠獨以為憂上疏曰臣聞輕者重之端小者大之源故隄潰蟻孔氣泄針芒是以明者慎微智者識幾書曰小不可不殺詩云無縱詭隨以謹無良蓋所以崇本絶末鉤深之慮也臣竊見元年以來盜賊連發攻亭劫掠多所傷殺夫穿窬不禁則致彊盜彊盜不斷則為攻盜攻盜成羣必生大姦故亡逃之科憲令所急至於通行飲食罪致大辟而頃者以來莫以為憂州郡督録怠慢長吏防禦不肅皆欲採獲虛名諱以盜賊為負雖有發覺不務清澄至有逞威濫怒無辜僵仆或有局蹐比伍轉相賦斂或隨吏追赴周章道路是以盜發之家不敢申告鄰舍比里共相壓迮或出私財以償所亡其大章著不可掩者乃肯發露陵遲之漸遂且成俗寇攘誅咎皆由於此前年勃海張伯路可為至戒覆車之軌其迹不遠蓋失之末流求之本源宜糾增舊科以防來事自今彊盜為上官若它郡縣所糾覺一發部吏皆正法尉貶秩一等令長三月奉贖罪二發尉免官令長貶秩一等三發以上令長免官便可撰立科條處為詔文切勑刺史嚴加糾罰冀以猛濟寬驚懼姦慝頃季夏大暑而消息不協寒氣錯時水涌為變天之降異必有其故所舉有道之士可策問國典所務王事過差令處暖氣不效之意庶有讜言以承天誡元初三年有詔大臣得行三年喪服闋還職忠因此上言孝宣皇帝舊令人從軍屯及給事縣官者大父母死未滿三月皆勿徭令得葬送請依此制太后從之至建光中尚書令祝諷尚書孟布等奏以為孝文皇帝定約禮之制光武皇帝絶告寧之典貽則萬世誠不可改宜復建武故事忠上疏曰臣聞之孝經始於愛親終於哀戚上自天子下至庶人尊卑貴賤其義一也夫父母於子同氣異息一體而分三年乃免於懷抱先聖緣人情而著其節制服二十五月是以春秋臣有大喪君三年不呼其門閔子雖要絰服事以赴公難退而致位以究私恩故稱君使之非也臣行之禮也周室陵禮制不序蓼莪之人作詩自傷曰瓶之罊矣惟罍之恥言己不得終竟子道者亦上之恥也高祖受命蕭何創制大臣有寧告之科合於致憂之義建武之初新承大亂凡諸國政多趣簡易大臣既不得告寧而羣司營祿念私鮮循三年之喪以報顧復之恩者禮義之方實為雕損大漢之興雖承衰敝而先王之制稍以施行故藉田之耕起於孝文孝廉之貢發於孝武郊祀之禮定於元成三雍之序備於顯宗大臣終喪成乎陛下聖功美業靡以尚茲孟子有言老吾老以及人之老幼吾幼以及人之幼天下可運於掌臣願陛下登高北望以甘陵之思揆度臣子之心則海內咸得其所宦豎不便之竟寢忠奏而從諷布議遂著于令忠以久次轉為僕射時帝數遣黃門常侍及中使伯榮往來甘陵而伯榮負寵驕蹇所經郡國莫不迎為禮謁又霖雨積時河水涌溢百姓騷動忠上疏曰臣聞位非其人則庶事不庶事不則政有得失政有得失則感動陰陽妖變為應陛下每引災自厚不責臣司臣司狃恩莫以為負故天心未得隔并屢臻青冀之域淫雨漏河徐岱之濱海水盆溢兗豫蝗蝝滋生荊楊稻收儉薄并涼二州羌戎叛戾加以百姓不足府帑虛匱自西徂東杼柚將空臣聞洪範五事一曰貌貌以恭恭作肅貌傷則狂而致常雨春秋大水皆為君上威儀不穆臨蒞不嚴臣下輕慢貴幸擅權陰氣盛彊陽不能禁故為淫雨陛下以不得親奉孝德皇園廟比遣中使致敬甘陵朱軒軿馬相望道路可謂孝至矣然臣竊聞使者所過威權翕赫震動郡縣王侯二千石至為伯榮獨拜車下儀體上僭侔於人主長吏惶怖譴責或邪諂自媚發人修道繕理亭傳多設儲跱徵役無度老弱相隨動有萬計賂遺僕從人數百匹頓踣呼嗟莫不叩心河閒託叔父之屬清河有陵廟之尊及剖符大臣皆猥為伯榮屈節車下陛下不問必以陛下欲其然也伯榮之威重於陛下陛下之柄在於臣妾水災之發必起於此昔韓嫣託副車之乘受馳視之使江都誤為一拜而嫣受歐刀之誅臣願明主嚴天元之尊正乾剛之位職事巨細皆任賢能不宜復令女使干錯萬機重察左右得無石顯泄漏之姦尚書納言得無趙昌譖崇之詐公卿大臣得無朱博阿傅之援外屬近戚得無王鳳害商之謀若國政一由帝命王事每決於己則下不得逼上臣不得干君常雨大水必當霽止四方衆異不能為害書奏不省時三府任輕機事專委尚書而灾眚變咎輒切免公台忠以為非國舊體上疏諫曰臣聞君使臣以禮臣事君以忠故三公稱曰冢宰王者待以殊敬在輿為下御坐為起入則參對而議政事出則監察而董是非漢典舊事丞相所請靡有不聽今之三公雖當其名而無其實選舉誅賞一由尚書尚書見任重於三公陵以來其漸久矣臣忠心常獨不安是故臨事戰懼不敢穴見有所興造又不希意同僚以謬平典而謗讟日聞罪足萬死近以地震策免司空陳褒今者灾異復欲切讓三公昔孝成皇帝以妖星守心移咎丞相使賁麗納說方進方進自引卒不蒙上天之福徒乖宋景之誠故知是非之分較然有歸矣又尚書決事多違故典罪法無例詆欺為先文慘言醜有乖章憲宜責求其意割而勿聽上順國典下防威福置方員於規矩審輕重於衡石誠國家之典萬世之法也忠意常在褒崇大臣待下以禮其九卿有疾使者臨問加賜錢布皆忠所建奏頃之遷尚書令延光三年拜司隸校尉糾正中官外戚賓客近幸憚之不欲忠在內明年出為江夏太守復留拜尚書令會疾卒初太尉張禹司徒徐防欲與忠父寵共奏追封和熹皇后父護羌校尉鄧訓寵以先世無奏請故事爭之連日不能奪乃從二府議及訓追加封諡禹防復約寵俱遣子奉禮於虎賁中郎將鄧騭寵不從騭心不平之故忠不得志于鄧氏及騭等敗衆庶多怨之而忠數上疏陷成其惡遂詆劾大司農朱寵順帝之為太子廢也諸名臣來歷祝諷等守闕固爭時忠為尚書令與諸尚書復共劾奏之及帝立司隸校尉虞詡追奏忠等罪過當世以此譏焉論曰陳公居理官則議獄緩死相幼主則正不僭寵可謂有宰相之器矣忠能承風亦庶乎明慎用刑而不留獄然其聽狂易殺人開父子兄弟得相代死斯大謬矣是則不善人多幸而善人常代其禍進退無所措也贊曰陳郭主刑人賴其平寵矜枯胔躬斷以情忠用詳密損益有程施于孫子且公且卿
