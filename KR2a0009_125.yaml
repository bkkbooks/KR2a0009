body:
  text: 後漢書志第二十五百官二太常光祿勳衛尉太僕廷尉大鴻臚太常卿一人中二千石本注曰掌禮儀祭祀每祭祀先奏其禮儀及行事常贊天子每選試博士奏其能否大射養老大喪皆奏其禮儀每月前晦察行陵廟丞一人比千石本注曰掌凡行禮及祭祀小事總署曹事其署曹掾史隨事為員諸卿皆然太史令一人六百石本注曰掌天時星曆凡歲將終奏新年曆凡國祭祀喪娶之事掌奏良日及時節禁忌凡國有瑞應災異掌記之丞一人明堂及靈臺丞一人二百石本注曰二丞掌守明堂靈臺靈臺掌候日月星氣皆屬太史博士祭酒一人六百石本僕射中興轉為祭酒博士十四人比六百石本注曰易四施孟梁丘京氏尚書三歐陽大小夏侯氏詩三魯齊韓氏禮二大小戴氏春秋二公羊嚴顏氏掌教弟子國有疑事掌承問對本四百石宣帝增秩太祝令一人六百石本注曰凡國祭祀掌讀祝及迎送神丞一人本注曰掌祝小神事太宰令一人六百石本注曰掌宰工鼎俎饌具之物凡國祭祀掌陳饌具丞一人大子豫樂令一人六百石本注曰掌伎樂凡國祭祀掌請奏樂及大饗用樂掌其陳序丞一人高廟令一人六百石本注曰守廟掌案行掃除無丞世祖廟令一人六百石本注曰如高廟先帝陵每陵園令各一人六百石本注曰掌守陵園案行掃除丞及校長各一人本注曰校長主兵戎盜賊事先帝陵每陵食官令各一人六百石本注曰掌望晦時節祭祀右屬太常本注曰有祠祀令一人後轉屬少府有太卜令六百石後省并太史中興以來省前凡十官光祿勳卿一人中二千石本注曰掌宿衛宮殿門戶典謁署郎更直執宿衛門戶考其德行而進退之郊祀之事掌三獻丞一人比千石五官中郎將一人比二千石本注曰主五官郎五官中郎比六百石本注曰無員五官侍郎比四百石本注曰無員五官郎中比三百石本注曰無員凡郎官皆主更直執戟宿衛諸殿門出充車騎唯議郎不在直中左中郎將比二千石本注曰主左署郎中郎比六百石侍郎比四百石郎中比三百石本注曰皆無員右中郎將比二千石本注曰主右署郎中郎比六百石侍郎比四百石郎中比三百石本注曰皆無員虎賁中郎將比二千石本注曰主虎賁宿衛左右僕射左右陛長各一人比六百石本注曰僕射主虎賁郎習射陛長主直虎賁朝會在殿中虎賁中郎比六百石虎賁侍郎比四百石虎賁郎中比三百石節從虎賁比二百石本注曰皆無員掌宿衛侍從自節從虎賁久者轉遷才能差高至中郎羽林中郎將比二千石本注曰主羽林郎羽林郎此三百石本注曰無員掌宿衛侍從常選漢陽隴西安定北地上郡西河凡六郡良家補本武帝以便馬從獵還宿殿陛巖下室中故號巖郎羽林左監一人六百石本注曰主羽林左騎丞一人羽林右監一人六百石本注曰主羽林右騎丞一人奉車都尉比二千石本注曰無員掌御乘輿車駙馬都尉比二千石本注曰無員掌駙馬騎都尉比二千石本注曰無員本監羽林騎光祿大夫比二千石本注曰無員凡大夫議郎皆掌顧問應對無常事唯詔令所使凡諸國嗣之喪則光祿大夫掌弔太中大夫千石本注曰無員中散大夫六百石本注曰無員諫議大夫六百石本注曰無員議郎六百石本注曰無員謁者僕射一人比千石本注曰為謁者臺率主謁者天子出奉引古重習武有主射以督録之故曰僕射常侍謁者五人比六百石本注曰主殿上時節威儀謁者三十人其給事謁者四百石其灌謁者郎中比三百石本注曰掌賓贊受事及上章報問將大夫以下之喪掌使弔本員七十人中興但三十人初為灌謁者滿歲為給事謁者衛尉卿一人中二千石本注曰掌宮門衛士宮中徼循事丞一人比千石公車司馬令一人六百石本注曰掌宮南闕門凡吏民上章四方貢獻及徵詣公車者丞尉各一人本注曰丞選曉諱掌知非法尉主闕門兵禁戒非常南宮衛士令一人六百石本注曰掌南宮衛士丞一人北宮衛士令一人六百石本注曰掌北宮衛士丞一人左右都候各一人六百石本注曰主劒戟士徼循宮及天子有所收考丞各一人宮掖門每門司馬一人比千石木注曰南宮南屯司馬主平城門北宮門蒼龍司馬主東門玄武司馬主玄武門北屯司馬主北門北宮朱爵司馬主南掖門東明司馬主東門朔平司馬主北門凡七門凡居宮中者皆有口籍於門之所屬宮名兩字為鐵印文符案省符乃內之若外人以事當入本宮官長史為封棨傳其有官位出入令御者言其官太僕卿一人中二千石本注曰掌車馬天子每出奏駕上鹵簿用大駕則執馭丞一人比千石考工令一人六百石本注曰主作兵器弓弩刀鎧之屬成則傳執金吾入武庫及主織綬諸雜工左右丞各一人車府令一人六百石本注曰主乘輿諸車丞一人未央廄令一人六百石本注曰主乘輿及廄中諸馬長樂廄丞一人廷尉卿一人中二千石本注曰掌平獄奏當所應凡郡國讞疑罪皆處當以報正左監各一人左平一人六百石本注曰掌平決詔獄右屬廷尉本注曰孝武帝以下置中都官獄二十六所各令長名世祖中興皆省唯廷尉及雒陽有詔獄大鴻臚卿一人中二千石本注曰掌諸侯及四方歸義蠻夷其郊廟行禮贊導請行事既可以命羣司諸王入朝當郊迎典其禮儀及郡國上計匡四方來亦屬焉皇子拜王贊授印綬及拜諸侯諸侯嗣子及四方夷狄封者臺下鴻臚召拜之王薨則使弔之及拜王嗣丞一人比千石大行令一人六百石本注曰主諸郎丞一人治禮郎四十七人右屬大鴻臚本注曰承秦有典屬國別主四方夷狄朝貢侍子成帝時省并大鴻臚中興省驛官別火二令丞及郡邸長丞但令郎治郡邸
