body:
  text: 後漢書卷七十七酷吏列傳第六十七漢承戰國餘烈多豪猾之民其并兼者則陵橫邦邑桀健者則雄張閭里且宰守曠遠戶口殷大故臨民之職專事威斷族滅姦軌先行後聞肆情剛烈成其不橈之威違衆用己表其難測之智至於重文橫入為窮怒之所遷及者亦何可勝言故乃積骸滿穽漂血十里致溫舒有虎冠之吏延年受屠伯之名豈虛也哉若其揣挫彊埶摧勒公卿碎裂頭腦而不顧亦為壯也自中興以後科網稍密吏人之嚴害者方於前世省矣而閹人親婭侵虐天下至使陽球磔王甫之屍張儉剖曹節之墓若此之類雖厭快衆憤亦云酷矣儉知名故附黨人篇董宣字少平陳留圉人也初為司徒侯霸所辟舉高第累遷北海相到官以大姓公孫丹為五官掾丹新造居宅而卜工以為當有死者丹乃令其子殺道行人置屍舍內以塞其咎宣知即收丹父子殺之丹宗族親黨三十餘人操兵詣府稱冤叫號宣以丹前附王莽慮交通海賊乃悉收繫劇獄使門下書佐水丘岑盡殺之青州以其多濫奏宣考岑宣坐徵詣廷尉在獄晨夜諷誦無憂色及當出刑官屬具饌送之宣乃厲色曰董宣生平未曾食人之食況死乎升車而去時同刑九人次應及宣光武馳使騶騎特原宣刑且令還獄遣使者詰宣多殺無辜宣具以狀對言水丘岑受臣旨意罪不由之願殺臣活岑使者以聞有詔左轉宣懷令令青州勿案岑罪岑官至司隸校尉後江夏有劇賊夏喜等寇亂郡境以宣為江夏太守到界移書曰朝廷以太守能禽姦賊故辱斯任今勒兵界首檄到幸思自安之宜喜等聞懼即時降散外戚陰氏為郡都尉宣輕慢之坐免後特徵為洛陽令時湖陽公主蒼頭白日殺人因匿主家吏不能得及主出行而以奴驂乘宣於夏門亭候之乃駐車叩馬以刀畫地大言數主之失叱奴下車因格殺之主即還宮訴帝帝大怒召宣欲箠殺之宣叩頭曰願乞一言而死帝曰欲何言宣曰陛下聖德中興而縱奴殺良人將何以理天下乎臣不須箠請得自殺即以頭擊楹流血被面帝令小黃門持之使宣叩頭謝主宣不從彊使頓之宣兩手據地終不肯俯主曰文叔為白衣時臧亡匿死吏不敢至門今為天子威不能行一令乎帝笑曰天子不與白衣同因勑彊項令出賜錢三十萬宣悉以班諸吏由是搏擊豪彊莫不震慄京師號為臥虎歌之曰枹鼓不鳴董少平在縣五年年七十四卒於官詔遣使者臨視唯見布被覆屍妻子對哭有大麥數斛敝車一乘帝傷之曰董宣廉絜死乃知之以宣嘗為二千石賜艾綬葬以大夫禮拜子並為郎中後官至齊相樊曄字仲華南陽新野人也與光武少游舊建武初徵為侍御史遷河東都尉引見雲臺初光武微時嘗以事拘於新野曄為市吏餽餌一笥帝德之不忘仍賜曄御食及乘輿服物因戲之曰一笥餌得都尉何如曄頓首辭謝及至郡誅討大姓馬適匡等盜賊清吏人畏之數年遷楊州牧教民耕田種樹理家之術視事十餘年坐法左轉軹長隗囂滅後隴右不安乃拜曄為天水太守政嚴猛好申韓法善惡立斷人有犯其禁者率不生出獄吏人及羌胡畏之道不拾遺行旅至夜聚衣裝道傍曰以付樊公涼州為之歌曰游子常苦貧力子天所富寧見乳虎穴不入冀府寺大笑期必死忿怒或見置嗟我樊府君安可再遭值視事十四年卒官永平中顯宗追思曄在天水時政能以為後人莫之及詔賜家錢百萬子融有俊才好黃老不肯為吏李章字第公河內懷人也五世二千石章習嚴氏春秋經明教授歷州郡吏光武為大司馬平定河北召章置東曹屬數從征伐光武即位拜陽平令時趙魏豪右往往屯聚清河大姓趙綱遂於縣界起塢壁繕甲兵為在所害章到乃設饗會而延謁綱綱帶文劒被羽衣從士百餘人來到章與對讌飲有頃手劒斬綱伏兵亦悉殺其從者因馳詣塢壁掩擊破之吏人遂安遷千乘太守坐誅斬盜賊過濫徵下獄免歲中拜侍御史出為琅邪太守時北海安丘大姓夏長思等反遂囚太守處興而據營陵城章聞即發兵千人馳往擊之掾吏史止章曰二千石行不得出界兵不得發章按劒怒曰逆虜無狀囚劫郡守此何可忍若坐討賊而死吾不恨也遂引兵安丘城下募勇敢燒城門與長思戰斬之獲三百餘級得牛馬五百餘頭而還興歸郡以狀上帝悉以所得班勞吏士後坐度人田不實徵以章有功但司寇論月餘免刑歸復徵會病卒周字文通下邳徐人也為人刻削少恩好韓非之術少為廷尉史永平中補南行唐長到官曉吏人曰朝廷不以長不肖使牧黎民而性讎猾吏志除豪賊且勿相試遂殺縣中尤無狀者數十人吏人大震遷博平令收考姦臧無出獄者以威名遷齊相亦頗嚴酷專任刑法而善為辭案條教為州內所則後坐殺無辜復左轉博平令建初中為勃海太守每赦令到郡輒隱閉不出先遣使屬縣盡決刑罪乃出詔書坐徵詣廷尉免歸廉絜無資常築墼以自給肅宗聞而憐之復以為郎再遷召陵侯相廷掾憚嚴明欲損其威乃晨取死人斷手足立寺門聞便往至死人邊若與死人共語狀陰察視口眼有稻芒乃密問守門人曰悉誰載藁入城者門者對唯有廷掾耳又問鈴下外頗有疑令與死人語者不對曰廷掾疑君乃收廷掾考問具服不殺人取道邊死人後人莫敢欺者徵拜洛陽令下車先問大姓主名吏數閭里豪彊以對厲聲怒曰本問貴戚若馬竇等輩豈能知此賣菜傭乎於是部吏望風旨爭以激切為事貴戚跼蹐京師肅清皇后弟黃門郎竇篤從宮中歸夜至止姦亭亭長霍延遮止篤篤蒼頭與爭延遂拔劒擬篤而肆詈恣口篤以表聞詔召司隸校尉河南尹詣尚書譴問遣劒戟士收送廷尉詔獄數日貰出帝知奉法疾姦不事貴戚然苛慘失中數為有司所奏八年遂免官後為御史中丞和帝即位太傅鄧彪奏在任過酷不宜典司京輦免歸田里後竇氏貴盛篤兄弟秉權睚眦宿怨無不僵仆自謂無全乃柴門自守以待其禍然篤等以公正而怨𨻶有素遂不敢害永元五年復徵為御史中丞諸竇雖誅而夏陽侯瓌猶尚在朝疾之乃上疏曰臣聞臧文仲之事君也見有禮於君者事之如孝子之養父母見無禮於君者誅之如鷹鸇之逐鳥雀案夏陽侯瓌本出輕薄志在邪僻學無經術而妄搆講舍外招儒徒實會姦桀輕忽天威侮慢王室又造作巡狩封禪之書惑衆不道當伏誅戮而主者營私不為國計夫涓流雖寡浸成江河爝火雖微卒能燎野履霜有漸可不懲革宜尋呂產專竊之亂永惟王莽篡逆之禍上安社稷之計下解萬夫之惑會瓌歸國遷司隸校尉六年夏旱車駕自幸洛陽錄囚徒二人被掠生蟲坐左轉騎都尉七年遷將作大匠九年卒於官黃昌字聖真會稽餘姚人也本出孤微居近學官數見諸生修庠序之禮因好之遂就經學又曉習文法仕郡為決曹刺史行部見昌甚奇之辟從事後拜宛令政尚嚴猛好發姦伏人有盜其車蓋者昌初無所言後乃密遣親客至門下賊曹家掩取得之悉收其家一時殺戮大姓戰懼皆稱神明朝廷舉能遷蜀郡太守先太守李根年老多悖政百姓侵冤及昌到吏人訟者七百餘人悉為斷理莫不得所密捕盜帥一人脅使條諸縣彊暴之人姓名居處乃分遣掩討無有遺脫宿惡大姦皆奔走它境初昌為州書佐其婦歸寧於家遇賊被獲遂流轉入蜀為人妻其子犯事乃詣昌自訟昌疑母不類蜀人因問所由對曰妾本會稽餘姚戴次公女州書佐黃昌妻也妾嘗歸家為賊所略遂至於此昌驚呼前謂曰何以識黃昌邪對曰昌左足心有黑子常自言當為二千石昌乃出足示之因相持悲泣還為夫婦視事四年徵再遷陳相縣人彭氏舊豪縱造起大舍高樓臨道昌每出行縣彭氏婦人輒升樓而觀昌不喜遂勑收付獄案殺之又遷為河內太守又再遷潁川太守永和五年徵拜將作大匠漢安元年進補大司農左轉太中大夫卒於官陽球字方正漁陽泉州人也家世大姓冠蓋球能擊劒習弓馬性嚴厲好申韓之學郡吏有辱其母者球結少年數十人殺吏滅其家由是知名初舉孝廉補尚書侍郎閑達故事其章奏處議常為臺閣所崇信出為高唐令以嚴苛過理郡守收舉會赦見原辟司徒劉寵府舉高第九江山賊起連月不解三府上球有理姦才拜九江太守球到設方略凶賊殄破收郡中姦吏盡殺之遷平原相出教曰相前莅高唐志埽姦鄙遂為貴郡所見枉舉昔桓公釋管仲射鉤之讎高祖赦季布逃亡之罪雖以不德敢忘前義況君臣分定而可懷宿昔哉今一蠲往愆期諸來効若受教之後而不改姦狀者不得復有所容矣郡中咸畏服焉時天下大旱司空張顥條奏長吏苛酷貪樜者皆罷免之球坐嚴苦徵詣廷尉當免官靈帝以球九江時有功拜議郎遷將作大匠坐事論頃之拜尚書令奏罷鴻都文學曰伏承有詔勑中尚方為鴻都文學樂松江覽等三十二人圖象立贊以勸學者臣聞傳曰君舉必書書而不法後嗣何觀案松覽等皆出於微蔑斗筲小人依憑世戚附託權豪俛眉承睫徼進明時或獻賦一篇或鳥篆盈簡而位升郎中形圖丹青亦有筆不點牘辭不辯心假手請字妖偽百品莫不被蒙殊恩蟬蛻滓濁是以有識掩口天下嗟歎臣聞圖象之設以昭勸戒欲令人君動鑒得失未聞豎子小人詐作文頌而可妄竊天官垂象圖素者也今太學東觀足以宣明聖化願罷鴻都之選以消天下之謗書奏不省時中常侍王甫曹節等姦虐弄權扇動外內球嘗拊髀發憤曰若陽球作司隸此曹子安得容乎光和二年遷為司隸校尉王甫休沐里舍球詣闕謝恩奏收甫及中常侍淳于登袁赦封中黃門劉毅小黃門龐訓朱禹齊盛等及子弟為守令者姦猾縱恣罪合滅族太尉段熲諂附佞倖宜並誅戮於是悉收甫熲等送洛陽獄及甫子永樂少府萌沛相吉球自臨考甫等五毒備極萌謂球曰父子既當伏誅少以楚毒假借老父球曰若罪惡無狀死不滅責乃欲求假借邪萌乃罵曰爾前奉事吾父子如奴奴敢反汝主乎今日困吾行自及也球使以土窒萌口箠朴交至父子悉死杖下熲亦自殺乃僵磔甫屍於夏城門大署牓曰賊臣王甫盡沒入財產妻子皆徙比景球既誅甫復欲以次表曹節等乃勑中都官從事曰且先去大猾當次案豪右權門聞之莫不屏氣諸奢飾之物皆各緘縢不敢陳設京師畏震時順帝虞貴人葬百官會喪還曹節見磔甫屍道次慨然抆淚曰我曹自可相食何宜使犬舐其汁乎語諸常侍今且俱入勿過里舍也節直入省白帝曰陽球故酷暴吏前三府奏當免官以九江微功復見擢用愆過之人好為妄作不宜使在司隸以騁毒虐帝乃徙球為衞尉時球出謁陵節勑尚書令召拜不得稽留尺一球被召急因求見帝叩頭曰臣無清高之行橫蒙鷹犬之任前雖糾誅王甫段熲蓋簡落狐狸未足宣示天下願假臣一月必令豺狼鴟梟各服其辜叩頭流血殿上呵叱曰衞尉扞詔邪至於再三乃受拜其冬司徒劉郃與球議收案張讓曹節節等知之共誣白郃等語已見陳球傳遂收球送洛陽獄誅死妻子徙邊王吉者陳留浚儀人中常侍甫之養子也甫在宦者傳吉少好誦讀書傳喜名聲而性殘忍以父秉權寵年二十餘為沛相曉達政事能斷察疑獄發起姦伏多出衆議課使郡內各舉姦吏豪人諸常有微過酒肉為臧者雖數十年猶加貶棄注其名籍專選剽悍吏擊斷非法若有生子不養即斬其父母合土棘埋之凡殺人皆磔屍車上隨其罪目宣示屬縣夏月腐爛則以繩連其骨周徧一郡乃止見者駭懼視事五年凡殺萬餘人其餘慘毒刺刻不可勝數郡中惴恐莫敢自保及陽球奏甫乃就收執死於洛陽獄論曰古者敦庬善惡易分至於畫衣冠異服色而莫之犯叔世偷薄上下相蒙德義不足以相洽化導不能以懲違遂乃嚴刑痛殺隨而繩之致刻深之吏以暴理姦倚疾邪之公直濟忍苛之虐情漢世所謂酷能者蓋有聞也皆以敢捍精敏巧附文理風行霜烈威譽諠赫與夫斷斷守道之吏何工否之殊乎故嚴君蚩黃霸之術密人笑卓茂之政猛既窮矣而猶或未勝然朱邑不以笞辱加物袁安未嘗鞫人臧罪而猾惡自禁人不欺犯何者以為威辟既用而苟免之行興仁信道孚故感被之情著苟免者威𨻶則姦起感被者人亡而思存由一邦以言天下則刑訟繁措可得而求乎贊曰大道既往刑禮為薄斯人散矣機詐萌作去殺由仁濟寬非虐末暴雖勝崇本或略
