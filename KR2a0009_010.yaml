body:
  text: 後漢書卷九孝獻帝紀第九孝獻皇帝諱協靈帝中子也母王美人為何皇后所害中平六年四月少帝即位封帝為勃海王徙封陳留王九月甲戌即皇帝位年九歲遷皇太后於永安宮大赦天下改昭寧為永漢丙子董卓殺皇太后何氏初令中給事黃門侍郎員各六人賜公卿以下至黃門郎家一人為郎以補宦官所領諸署於殿上乙酉以太尉劉虞為大司馬董卓自為太尉加鈇鉞虎賁丙戌太中大夫楊彪為司空甲午豫州牧黃琬為司徒遣使弔祠故太傅陳蕃大將軍竇武等冬十月乙巳葬靈思皇后白波賊寇河東董卓遣其將牛輔擊之十一月癸酉董卓自為相國十二月戊戌司徒黃琬為太尉司空楊彪為司徒光祿勳荀爽為司空省扶風都尉置漢安都護詔除光熹昭寧永漢三號還復中平六年初平元年春正月山東州郡起兵以討董卓辛亥大赦天下癸酉董卓殺弘農王白波賊寇東郡二月乙亥太尉黃琬司徒楊彪免庚辰董卓殺城門校尉伍瓊督軍校尉周珌以光祿勳趙謙為太尉太僕王允為司徒丁亥遷都長安董卓驅徙京師百姓悉西入關自留屯畢圭苑壬辰白虹貫日三月乙巳車駕入長安幸未央宮己酉董卓焚洛陽宮廟及人家戊午董卓殺太傅袁隗太僕袁基夷其族夏五月司空荀爽薨六月辛丑光祿大夫种拂為司空大鴻臚韓融少府陰修執金吾胡母班將作大匠吳修越騎校尉王瓌安集關東後將軍袁術河內太守王匡各執而殺之唯韓融獲免董卓壞五銖錢更鑄小錢冬十一月庚戌鎮星熒惑太白合於尾是歲有司奏和安順桓四帝無功德不宜稱宗又恭懷敬隱恭愍三皇后並非正嫡不合稱后皆請除尊號制曰可孫堅殺荊州刺史王睿又殺南陽太守張咨二年春正月辛丑大赦天下二月丁丑董卓自為太師袁術遣將孫堅與董卓將胡軫戰於陽人軫軍大敗董卓遂發掘洛陽諸帝陵夏四月董卓入長安六月丙戌地震秋七月司空种拂免光祿大夫濟南淳于嘉為司空太尉趙謙罷太常馬日磾為太尉九月蚩尤旗見于角亢冬十月壬戌董卓殺衛尉張溫十一月青州黃巾寇太山太山太守應劭擊破之黃巾轉寇勃海公孫瓚與戰於東光復大砟均是歲長沙有人死經月復活三年春正月丁丑大赦天下袁術遣將孫堅攻劉表於襄陽堅戰歿袁紹及公孫瓚戰于界橋瓚軍大敗夏四月辛巳誅董卓夷三族司徒王允録尚書事總朝政遣使者張种撫慰山東青州黃巾擊殺兗州刺史劉岱於東平東郡太守曹操大破黃巾於壽張降之五月丁酉大赦天下丁未征西將軍皇甫嵩為車騎將軍董卓部曲將李傕郭汜樊稠張濟等反攻京師六月戊午陷長安城太常种拂太僕魯旭大鴻臚周奐城門校尉崔烈越騎校尉王頎並戰歿吏民死者萬餘人李傕等並自為將軍己未大赦天下李傕殺司隸校尉黃琬甲子殺司徒王允皆滅其族丙子前將軍趙謙為司徒秋七月庚子太尉馬日磾為太傅録尚書事八月遣日磾及太僕趙岐持節慰撫天下車騎將軍皇甫嵩為太尉司徒趙謙罷九月李傕自為車騎將軍郭汜後將軍樊稠右將軍張濟鎮東將軍濟出屯弘農甲申司空淳于嘉為司徒光祿大夫楊彪為司空並録尚書事冬十二月太尉皇甫嵩免光祿大夫周忠為太尉參録尚書事四年春正月甲寅朔日有食之丁卯大赦天下三月袁術殺楊州刺史陳溫據淮南長安宣平城門外屋自壞夏五月癸酉無雲而雷六月扶風大風雨雹華山崩裂太尉周忠免太僕朱俊為太尉録尚書事下邳賊闕宣自稱天下雨水遣侍御史裴茂訊詔獄原輕繫六月辛丑天狗西北行九月甲午試儒生四十餘人上第賜位郎中次太子舍人下第者膜均詔曰孔子歎學之不講不講則所識日忘今耆儒年踰六十去離本土營求糧資不得專業結童入學白首空歸長委農野永絶榮望朕甚愍焉其依科罷者聽為太子舍人冬十月太學行禮車駕幸永福城門臨觀其儀賜博士以下各有差辛丑京師地震有星孛于天市司空楊彪免太常趙溫為司空公孫瓚殺大司馬劉虞十二月辛丑地震司空趙溫免乙巳衛尉張喜為司空是歲琅邪王容薨興平元年春正月辛酉大赦天下改元興平甲子帝加元服二月壬午追尊諡皇妣王氏為靈懷皇后甲申改葬于文昭陵丁亥帝耕于藉田三月韓遂馬騰與郭汜樊稠戰於長平觀遂騰敗績左中郎將劉範前益州刺史种劭戰歿夏六月丙子分涼州河西四郡為雍式丁丑地震戊寅又震乙巳晦日有食之帝避正殿寢兵不聽事五日大蝗秋七月壬子太尉朱俊免戊午太常楊彪為太尉録帑悃三輔大旱自四月至于是月帝避正殿請雨遣使者洛徒原輕繫是時穀一斛五十萬豆麥一斛二十萬人相食啖白骨委積帝使侍御史侯汶出太倉米豆為飢人作縻粥經日而死者無降帝疑賦恤有虛乃親於御坐前量試作糜乃知非實使侍中劉艾出讓有司於是尚書令以下皆詣省閣謝奏收侯汶考實詔曰未忍致汶于理可杖五十自是之後多得全濟八月馮翊羌叛寇屬縣郭汜樊稠擊破之九月桑復生椹人得以食司徒淳于嘉罷冬十月長安市門自壞以衛尉趙溫為司徒録尚書事十二月分安定扶風為新平郡是歲楊州刺史劉繇與袁術將孫策戰于曲阿繇軍敗績孫策遂據江東太傅馬日磾薨于壽春二年春正月癸丑大赦天下二月乙亥李傕殺樊稠而與郭汜相攻三月丙寅李傕脅帝幸其營焚宮室夏四月甲午立貴人伏氏為皇后丁酉郭汜攻李傕矢及御前是日李傕移帝幸北塢大旱五月壬午李傕自為大司馬六月庚午張濟自陝來和傕汜秋七月甲子車駕東歸郭汜自為車騎將軍楊定為後將軍楊奉為興義將軍董承為安集將軍並侍送乘輿張濟為票騎將軍還屯陝八月甲辰幸新豐冬十月戊戌郭汜使其將伍習夜燒所幸學舍逼脅乘輿楊定楊奉與郭汜戰破之壬寅幸華陰露次道南是夜有赤氣貫紫宮張濟復反與李傕郭汜合十一月庚午李傕郭汜等追乘輿戰於東澗王師敗績殺光祿勳鄧泉衛尉士孫瑞廷尉宣播大長秋苗祀步兵校尉魏桀侍中朱展射聲校尉沮俊壬申幸曹陽露次田中楊奉董承引白波帥胡才李樂韓暹及胸奴左賢王去卑率師奉迎與李傕等戰破之十二月庚辰車駕乃進李傕等復來追戰王師大敗殺略宮人少府田芬大司農張義等皆戰歿進幸陝夜度河乙亥幸安邑是歲袁紹遣將麴義與公孫瓚戰於鮑丘瓚軍大敗建安元年春正月癸酉郊祀上帝於安邑大赦天下改元建安二月韓暹攻衛將軍董承夏六月乙未幸聞喜秋七月甲子車駕至洛陽幸故中常侍趙忠宅丁丑郊祀上帝大赦天下己卯謁太廟八月辛丑幸南宮楊安殿癸卯安國將軍張楊為大司馬韓暹為將軍楊奉為車騎將軍是時宮室燒盡百官披荊棘依牆壁閒州郡各擁彊兵而委輸不至羣僚飢乏尚書郎以下自出採或飢死牆壁閒或為兵士所殺辛亥鎮東將軍曹操自領司隸校尉録尚書事曹操殺侍中臺崇尚書馮碩等封衛將軍董承為輔國將軍伏完等十三人為列侯贈沮俊為弘農太守庚申遷都許己巳幸曹操營九月太尉楊彪司空張喜罷冬十一月丙戌曹操自為司空行車騎將軍事百官總己以聽二年春袁術自稱天子三月袁紹自為大將軍夏五月蝗秋九月漢水溢是歲飢江淮閒民相食袁術殺陳王寵孫策遣使奉貢三年夏四月遣謁者裴茂率中郎將段煨討李傕夷三族呂布叛冬十一月盜殺大司馬張楊十二月癸酉曹操擊呂布於徐州斬之四年春三月袁紹攻公孫瓚于易京獲之衛將軍董承為車騎將軍夏六月袁術死是歲初置尚書左右僕射武陵女子死十四日復活五年春正月車騎將軍董承偏將軍王服越騎校尉种輯受密詔誅曹操事泄壬午曹操殺董承等夷三族秋七月立皇子馮為南陽王壬午南陽王馮薨九月庚午朔日有食之詔三公舉至孝二人九卿校尉郡國守相各一人皆上封事靡有所諱曹操與袁紹戰於官度紹敗走冬十月辛亥有星孛于大梁東海王祗薨是歲孫策死弟權襲其餘業六年春三二月丁卯朔日有食之七年夏五月庚戌袁紹薨于填國獻馴象是歲越巂男子化為女子八年冬十月己巳公卿初迎冬於北郊總章始復備八佾舞初置司直官督中都官九年秋八月戊寅曹操大破袁尚平冀州自領冀州牧冬十月有星孛于東井十二月賜三公已下金帛各有差自是三年一賜以為常制十年春正月曹操破袁談於青州斬之夏四月黑山賊張燕率衆降秋九月賜百官尤貧者金帛各有差十一年春正月有星孛于北斗三月曹操破高幹於并州獲之秋七月武威太守張猛殺雍州刺史邯鄲商是歲立故琅邪王容子熙為琅邪王齊北海阜陵下邳常山甘陵濟陰北平原八國皆除十二年秋八月曹操大破烏桓於柳城斬其踏頓冬十月辛卯有星孛于鶉尾乙巳黃巾賊殺濟南王贇十一月遼東太守公孫康殺袁尚袁熙十三年春正月司徒趙溫免夏六月罷三公官置丞相御史大夫癸巳曹操自為丞相秋七月曹操南征劉表八月丁未光祿勳郗慮為御史大夫壬子曹操殺太中大夫孔融夷其族是月劉表卒少子琮立琮以荊州降操冬十月癸未朔日有食之曹操以舟師伐孫權權將周瑜敗之於烏林赤壁十四年冬十月荊州地震十五年春二月乙巳朔日有食之十六年秋九月庚戌曹操與韓遂馬超戰於渭南遂等大敗關西平是歲趙王赦薨十七年夏五月癸未誅衛尉馬騰夷三族六月庚寅晦日有食之秋七月洧水潁水溢螟八月馬超破涼州殺刺史韋康九月庚戌立皇子熙為濟陰王懿為山陽王為濟北王敦為東海王冬十二月星孛于五諸侯十八年春正月庚寅復禹貢九州夏五月丙申曹操自立為魏公加九錫大雨水徙趙王圭為博陵王是歲歲星鎮星熒惑俱入太微彭城王和薨十九年夏四月旱五月雨水劉備破劉璋據益州冬十月曹操遣將夏侯淵討宋建于枹罕獲之十一月丁卯曹操殺皇后伏氏滅其族及二皇子二十年春正月甲子立貴人曹氏為皇后賜天下男子爵人一級孝悌力田二級賜諸王侯公卿以下穀各有差秋七月曹操破漢中張魯降二十一年夏四月甲午曹操自進號魏王五月己亥朔日有食之秋七月胸奴南單于來朝是歲曹操殺琅邪王熙國除二十二年夏六月丞相軍師華歆為御史大夫冬有星孛于東北是歲大疫二十三年春正月甲子少府耿紀丞相司直韋晃起兵誅曹操不克夷三族三月有星孛于東方二十四年春二月壬子晦日有食之夏五月劉備取漢中秋七月庚子劉備自稱漢中王八月漢水溢冬十一月孫權取荊州二十五年春正月庚子魏王曹操薨子丕襲位二月丁未朔日有食之三月改元延康冬十月乙卯皇帝遜位魏王丕稱天子奉帝為山陽公邑一萬戶位在諸侯王上奏事不稱臣受詔不拜以天子車服郊祀天地宗廟祖臘皆如漢制都山陽之濁鹿城四皇子封王者皆降為列侯明年劉備稱帝于蜀孫權亦自王於吳於是天下遂三分矣魏青龍二年三月庚寅山陽公薨自遜位至薨十有四年年五十四諡孝獻皇帝八月壬申以漢天子禮儀葬于禪陵置園邑令丞太子早卒孫康立五十一年晉太康六年薨子瑾立四年太康十年薨子秋立二十年永嘉中為胡賊所殺國除論曰傳稱鼎之為器雖小而重故神之所寶不可奪移至令負而趨者此亦窮運之歸乎天厭漢德久矣山陽其何誅焉贊曰獻生不辰身播國屯終我四百永作虞賓
