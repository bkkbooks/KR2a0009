body:
  text: 後漢書卷三十九劉趙淳于江劉周趙列傳第二十九孔子曰夫孝莫大於嚴父嚴父莫大於配天則周公其人也子路曰傷哉貧也生無以養死無以葬子曰啜菽飲水孝也夫鍾鼓非樂云之本而器不可去三牲非致孝之主而養不可廢存器而忘本樂之遁也調器以和聲樂之成也崇養以傷行孝之纍也修己以致祿養之大也故言能大養則周公之祀致四海之祭言以義養則仲由之菽甘於東鄰之牲夫患水菽之薄干祿以求養者是以恥祿親也存誠以盡行孝積而祿厚者此能以義養也中興廬江毛義少節家貧以孝行稱南陽人張奉慕其名往候之坐定而府檄適至以義守令義奉檄而入喜動顏色奉者志尚士也心賤之自恨來固辭而去及義母死去官行服數辟公府為縣令進退必以禮後舉賢良公車徵遂不至張奉歎曰賢者固不可測往日之喜乃為親屈也斯蓋所謂家貧親老不擇官而仕者也建初中章帝下詔褒寵義賜穀千斛常以八月長吏問起居加賜羊酒壽終于家安帝時汝南薛包孟嘗好學篤行喪母以至孝聞及父娶後妻而憎包分出之包日夜號泣不能去至被歐杖不得已廬於舍外旦入而灑掃父怒又逐之乃廬於里門昏晨不廢積歲餘父母慙而還之後行六年服喪過乎哀既而弟子求分財異居包不能止乃中分其財奴婢引其老者曰與我共事久若不能使也田廬取其荒頓者曰吾少時所理意所戀也器物取朽敗者曰我素所服食身口所安也弟子數破其産輒復賑給建光中公車特徵至拜侍中包性恬虛稱疾不起以死自乞有詔賜告歸加禮如毛義年八十餘以壽終若二子者推至誠以為行行信於心而感於人以成名受祿致禮斯可謂能以孝養也若夫江革劉般數公者之義行猶斯志也撰其行事著于篇劉平字公子楚郡彭城人也本名曠顯宗後改為平王莽時為郡吏守災丘長政教大行其後每屬縣有劇賊輒令平守之所至皆理由是一郡稱其能更始時天下亂平弟仲為賊所殺其後賊復忽然而至平扶侍其母奔走逃難仲遺腹女始一歲平抱仲女而𠫓廾其子母欲還取之平不聽曰力不能兩活仲不可以絶類遂去不顧與母俱匿野澤中平朝出求食逢餓賊將亨之平叩頭曰今旦為老母求菜老母待曠為命願得先歸食母異還就死因涕泣賊見其至誠哀而遣之平還既食母訖因白曰屬與賊期義不可欺遂還詣賊衆皆大驚相謂曰常聞烈士乃今見之子去矣吾不忍食子於是得全建武初平狄將軍龐萌反於彭城攻敗郡守孫萌平時復為郡吏冒白刃伏萌身上被七創困頓不知所為號泣請曰願以身代府君賊乃斂兵止曰此義士也勿殺遂解去萌傷甚氣絶有頃蘇渴求飲平傾其創血以飲之後數日萌竟死平乃裹創扶送萌喪至其本縣後舉孝廉拜濟陰郡丞太守劉育甚重之任以郡職上書薦平會平遭父喪去官服闋拜全椒長政有恩惠百姓懷感人或增資就賦或減年從役刺史太守行部獄無繫囚人自以得所不知所問唯班詔書而去後以病免顯宗初尚書僕射鍾離意上書薦平及琅邪王望東萊王扶曰臣竊見琅邪王望楚國劉曠東萊王扶皆年七十執性恬淡所居之處邑里化之修身行義應在朝次臣誠不足知人竊慕推士進賢之義書奏有詔徵平等特賜辦裝錢至皆拜議郎並數引見平再遷侍中永平三年拜宗正數薦達名士承宮郇恁等在位八年以老病上疏乞骸骨卒於家王望字慈卿客授會稽自議郎遷青州刺史甚有威名是時州郡災旱百姓窮荒望行部道見飢者裸行草食五百餘人愍然哀之因以便宜出所在布粟給其廩稟糧為作褐衣事畢上言帝以望不先表請章示百官詳議其罪時公卿皆以為望之專命法有常條鍾離意獨曰昔華元子反楚宋之良臣不稟君命平二國春秋之義以為美談今望懷義忘罪當仁不讓若繩之以法忽其本情將乖聖朝愛育之旨帝嘉意議赦而不罪王扶字子元掖人也少修節行客居琅邪不其縣所止聚落化其德國相張宗謁請不應欲強致之遂杖策歸鄉里連請固病不起太傅鄧禹辟不至後拜議郎會見恂恂似不能言然性沈正不可干以非義當世高之永平中臨邑侯劉復著漢德頌盛稱扶為名臣云趙孝字長平沛國蘄人也父普王莽時為田禾將軍任孝為郎每告歸常白衣步擔嘗從長安還欲止郵亭亭長先時聞孝當過以有長者客掃灑待之孝既至不自名長不肯內因問曰聞田禾將軍子當從長安來何時至乎孝曰尋到矣於是遂去及天下亂人相食孝弟禮為餓賊所得孝聞之即自縛詣賊曰禮久餓羸瘦不如孝肥飽賊大驚並放之謂曰可且歸更持米糒來孝求不能得復往報賊願就亨衆異之遂不害鄉黨服其義州郡辟召進退必以禮舉孝廉不應永平中辟太尉府顯宗素聞其行詔拜諫議大夫遷侍中又遷長樂衛尉復徵弟禮為御史中丞禮亦恭謙行己類於孝帝嘉其兄弟篤行欲寵異之詔禮十日一就衛尉府太官送供具令共相對盡歡數年禮卒帝令孝從官屬送喪歸葬後歲餘復以衛尉賜告歸卒于家孝無子拜禮兩子為郎時汝南有王琳巨尉者年十餘歲喪父母因遭大亂百姓奔逃唯琳兄弟獨守冢廬號泣不絶弟季出遇赤眉將為所哺琳自縛請先季死賊矝而放遣由是顯名鄉邑後辟司徒府薦士而退琅邪魏談少間者時亦為飢寇所獲等輩數十人皆束縛以次當亨賊見談似謹厚獨令主暮輒執縛賊有夷長公特哀念談密解其縛語曰汝曹皆應就食急從此去對曰談為諸君恆得遺餘餘人皆茹草萊不如食我長公義之相曉赦遣並得俱免談永平中為主家令又齊國兒萌子明梁郡車成子威二人兄弟並見執於赤眉將食之萌成叩頭乞以身代賊亦哀而兩釋焉淳于恭字孟孫北海淳于人也善説老子清靜不慕榮名家有山田果樹人或侵盜輒助為收採又見偷刈禾者恭念其愧因伏草中盜去乃起里落化之王莽末歲飢兵起恭兄崇將為盜所亨恭請代得俱免後崇卒恭養孤幼教誨學問有不如法輒反用杖自箠以感悟之兒慙而改過初遭賊寇百姓莫事農桑恭常獨力田耕鄉人止之曰時方淆亂死生未分何空自苦為恭曰縱我不得它人何傷墾耨不輟後州郡連召不應遂幽居養志潛於山澤舉動周旋必由禮度建武中郡舉孝廉司空辟皆不應客隱琅邪黔陬山遂數十年建初元年肅宗下詔美恭素行告郡賜帛二十匹遣詣公車除為議郎引見極日訪以政事遷侍中騎都尉禮待甚優其所薦名賢無不徵用進對陳政皆本道德帝與之言未嘗不稱善五年病篤使者數存問卒於官詔書褒歎賜穀千斛刻石表閭除子孝為太子舍人江革字次翁齊國臨淄人也少失父獨與母居遭天下亂盜賊並起革負母逃難備經阻險常採拾以為養數遇賊或劫欲將去革輒涕泣求哀言有老母辭氣願款有足感動人者賊以是不忍犯之或乃指避兵之方遂得俱全於難革轉客下邳窮貧裸跣行傭以供母便身之物莫不必給建武末年與母歸鄉里每至歲時縣當案比革以母老不欲搖動自在轅中挽車不用牛馬由是鄉里稱之曰江巨孝太守嘗備禮召革以母老不應及母終至性殆滅嘗寢伏冢廬服竟不忍除郡守遣丞掾釋服因請以為吏永平初舉孝廉為郎補楚太僕月餘自劾去楚王英馳遣官屬追之遂不肯還復使中傅贈送辭不受後數應三公命輒去建初初太尉牟融舉賢良方正再遷司空長史肅宗甚崇禮之遷五官中郎將每朝會帝常使虎賁扶侍及進拜恆目禮焉時有疾不會輒太官送醪膳恩寵有殊於是京師貴戚衛尉馬廖侍中竇憲慕其行各奉書致禮革無所報受帝聞而益善之後上書乞骸骨轉拜諫議大夫賜告歸因謝病稱篤元和中天子思革至行制詔齊相曰諫議大夫江革前以病歸今起居何如夫孝百行之冠衆善之始也國家每惟志士未嘗不及革縣以見穀千斛賜巨孝常以八月長吏存問致羊酒以終厥身如有不幸祠以中牢由是巨孝之稱行於天下及卒詔復賜穀千斛劉般字伯興宣帝之玄孫也宣帝封子囂於楚是為孝王孝王生思王衍衍生王紆紆生般自囂至般積纍仁義世有名節而紆尤慈篤早失母同産弟原鄉侯平尚幼紆親自鞠養常與共臥起飲食及成人未嘗離左右平病卒紆哭泣歐血數月亦歿初紆襲王封因值王莽篡位廢為庶人因家於彭城般數歲而孤獨與母居王莽敗天下亂太夫人聞更始即位乃將般俱奔長安會更始敗復與般轉側兵革中西行上隴遂流至武威般雖尚少而篤志修行講誦不怠其母及諸舅以為身寄絶域死生未必不宜苦精若此數以曉般般猶不改其業建武八年隗囂敗河西始通般即將家屬東至洛陽修經學於師門明年光武下詔封般為災丘侯奉孝王祀使就國後以國屬楚王徙封杼秋侯十九年行幸沛詔問郡中諸侯行能太守薦言般束修至行為諸侯師帝聞而嘉之乃賜般綬錢百萬繒二百匹二十年復與車駕會沛因從還洛陽賜穀什物留為侍祠侯永平元年以國屬沛徙封居巢侯復隨諸侯就國數年楊州刺史觀恂薦般在國口無擇言行無怨惡宜蒙旌顯顯宗嘉之十年徵般行執金吾事從至南陽還為朝侯明年兼屯騎校尉時五校官顯職間而府寺寬敞輿服光麗伎巧畢給故多以宗室肺腑居之每行幸郡國般常將長水胡騎從帝曾欲置常平倉公卿議者多以為便般對以常平倉外有利民之名而內實侵刻百姓豪右因緣為姦小民不能得其平置之不便帝乃止是時下令禁民二業又以郡國牛疫通使區種增耕而吏下檢結多失其實百姓患之般上言郡國以官禁二業至有田者不得漁捕今濱江湖郡率少蠶桑民資漁採以助口實且以冬春間月不妨農事夫漁獵之利為田除害有助穀食無關二業也又郡國以牛疫水旱墾田多減故詔勑區種增進頃畝以為民也而吏舉度田欲令多前至於不種之處亦通為租可申勑刺史二千石務令實核其有增加皆使與奪田同罪帝悉從之肅宗即位以為長樂少府建初二年遷宗正般妻卒厚加賵贈及賜冢塋地於顯節陵下般在位數言政事其收恤九族行義尤著時人稱之年六十建初三年卒子憲嗣憲卒子重嗣憲兄愷愷字伯豫以當襲般爵讓與弟憲遁逃避封久之章和中有司奏請絶愷國肅宗美其義特優假之愷猶不出積十餘歲至永元十年有司復奏之侍中賈逵因上書曰孔子稱能以禮讓為國於從政乎何有竊見居巢侯劉般嗣子愷素行孝友謙遜潔清讓封弟憲潛身遠迹有司不原樂善之心而繩以循常之法懼非長克讓之風成含弘之化前世扶陽侯韋玄成近有陵陽侯丁鴻鄳侯鄧彪並以高行潔身辭爵未聞貶削而皆登三事今愷景仰前修有伯夷之節宜蒙矜宥全其先功以增聖朝尚德之美和帝納之下詔曰故居巢侯劉般嗣子愷當襲般爵而稱父遺意致國弟憲遁亡七年所守彌篤蓋王法崇善成人之美其聽憲嗣爵遭事之宜後不得以為比乃徵愷拜為郎稍遷侍中愷之入朝在位者莫不仰其風行遷步兵校尉十三年遷宗正免復拜侍中遷長水校尉永初元年代周章為太常愷性篤古貴處士每有徵舉必先巖穴論議引正辭氣高雅永初六年代張敏為司空元初二年代夏勤為司徒舊制公卿二千石刺史不得行三年喪由是內外衆職並廢喪禮元初中鄧太后詔長吏以下不為親行服者不得典城選舉時有上言牧守宜同此制詔下公卿議者以為不便愷獨議曰詔書所以為制服之科者蓋崇化厲俗以弘孝道也今刺史一州之表二千石千里之師職在辨章百姓宣美風俗尤宜尊重典禮以身先之而議者不尋其端至於牧守則云不宜是猶濁其源而望流清曲其形而欲景直不可得也太后從之時征西校尉任尚以姦利被徵抵罪尚曾副大將軍鄧騭騭黨護之而太尉馬英司空李郃承望騭旨不復先請即獨解尚臧錮愷不肯與議後尚書案其事二府並受譴咎朝廷以此稱之視事五歲永寧元年稱病上書致仕有詔優許焉加賜錢三十萬以千石祿歸養河南尹常以歲八月致羊酒時安帝始親政事朝廷多稱愷之德帝乃遣問起居厚加賞賜會馬英策罷尚書陳忠上疏薦愷曰臣聞三公上則台階下象山嶽股肱元首鼎足居職協和陰陽調訓五品考功量才以序庶僚遭烈風不迷遇迅雨不惑位莫重焉而今上司缺職未議其人臣竊差次諸卿考合衆議咸稱太常朱倀少府荀遷臣父寵前忝司空倀遷並為掾屬具知其能倀能説經書而用心褊狹遷嚴毅剛直而薄於藝文伏見前司徒劉愷沈重淵懿道德博備克讓爵土致祚弱弟躬浮雲之志兼浩然之氣頻歷二司舉動得禮以疾致仕側身里巷處約思純進退有度百僚景式海內歸懷往者孔光師丹近世鄧彪張酺皆去宰相復序上司誠宜簡練卓異以猒衆望書奏詔引愷拜太尉安帝初清河相叔孫光坐臧抵罪遂增錮二世釁及其子是時居延都尉范邠復犯臧罪詔下三公廷尉議司徒楊震司空陳褒廷尉張皓議依光比愷獨以為春秋之義善善及子孫惡惡止其身所以進人於善也尚書曰上刑挾輕下刑挾重如今使臧吏禁錮子孫以輕從重懼及善人非先王詳刑之意也有詔太尉議是視事三年以疾乞骸骨久乃許之下河南尹禮秩如前歲餘卒于家詔使者護喪事賜東園祕器錢五十萬布千匹少子茂字叔盛亦好禮讓歷位出納桓帝時為司空會司隸校尉李膺等抵罪而南陽太守成太原太守劉下獄當死茂與太尉陳蕃司徒劉矩共上書訟之帝不悅有司承旨劾奏三公茂遂坐免建寧中復為太中大夫卒於官周磐字堅伯汝南安成人徵士燮之宗也祖父業建武初為天水太守磐少遊京師學古文尚書洪範五行左氏傳好禮有行非典謨不言諸儒宗之居貧養母儉薄不充嘗誦詩至汝墳之卒章慨然而歎乃解韋帶就孝廉之舉和帝初拜謁者除任城長遷陽夏重合令頻歷三城皆有惠政後思母𠫓廾官還鄉里及母歿哀至幾於毀滅服終遂廬于冢側教授門徒常千人公府三辟皆以有道特徵磐語友人曰昔方回支父嗇神養和不以榮利滑其生術吾親以沒矣從物何為遂不應建光元年年七十三歲朝會集諸生講論終日因令其二子曰吾日者夢見先師東里先生與我講於陰堂之奧既而長歎豈吾齒之盡乎若命終之日桐棺足以周身外椁足以周棺斂形懸封濯衣幅巾編二尺四寸簡寫堯典一篇并刀筆各一以置棺前云不忘聖道其月望日無病忽終學者以為知命焉磐同郡蔡順字君仲亦以至孝稱順少孤養母嘗出求薪有客卒至母望順不還乃噬其指順即心動𠫓廾薪馳歸跪問其故母曰有急客來吾噬指以悟汝耳母年九十以壽終未及得葬里中災火將逼其舍順抱伏棺柩號哭叫天火遂越燒它室順獨得免太守韓崇召為東閣祭酒母平生畏雷自亡後每有雷震順輒圜冢泣曰順在此崇聞之每雷輒為差車馬到墓所後太守鮑衆舉孝廉順不能遠離墳墓遂不就年八十終于家趙咨字文楚東郡燕人也父暢為博士咨少孤有孝行州郡召舉孝廉並不就延熹元年大司農陳奇舉咨至孝有道仍遷博士靈帝初太傅陳蕃大將軍竇武為宦者所誅咨乃謝病去太尉楊賜特辟使飾巾出入請與講議舉高第纍遷敦煌太守以病免還躬率子孫耕農為養盜嘗夜往劫之咨恐母驚懼乃先至門迎盜因請為設食謝曰老母八十疾病須養居貧朝夕無儲乞少置衣糧妻子物餘一無所請盜皆慙歎跪而辭曰所犯無狀干暴賢者言畢奔出咨追以物與之不及由此益知名徵拜議郎辭疾不到詔書切讓州郡以禮發遣前後再三不得已應召復拜東海相之官道經滎陽令敦煌曹皓咨之故孝廉也迎路謁候咨不為留皓送至亭次望塵不及謂主簿曰趙君名重今過界不見必為天下笑即𠫓廾印綬追至東海謁咨畢辭歸家其為時人所貴若此咨在官清簡計日受奉豪黨畏其儉節視事三年以疾自乞徵拜議郎抗疾京師將終告其故吏朱祇蕭建等使薄斂素棺籍以黃壤欲令速朽早歸后土不聽子孫改之乃遺書勑子胤曰夫含氣之倫有生必終蓋天地之常期自然之至數是以通人達士鑒茲性命以存亡為晦明死生為朝夕故其生也不為娛亡也不知戚夫亡者元氣去體貞魂遊散反素復始歸於無端既已消仆還合糞土土為𠫓廾物豈有性情而欲制其厚薄調其燥溼邪但以生者之情不忍見形之毀乃有掩骼埋窆之制易曰古之葬者衣以薪藏之中野後世聖人易之以棺椁棺椁之造自黃帝始爰自陶唐逮于虞夏猶尚簡朴或瓦或木及至殷人而有加焉周室因之制兼二代復重以牆翣之飾表以旌銘之儀招復含斂之禮殯葬宅兆之期棺椁周重之制衣衾稱襲之數其事煩而害實品物碎而難備然而秩爵異級貴賤殊等自成康以下其典稍乖至於戰國漸至穨陵法度衰毀上下僭雜終使晉侯請隧秦伯殉葬陳大夫設參門之木宋司馬造石椁之奢爰暨暴秦違道廢德滅三代之制興淫邪之法國資糜於三泉人力單於酈墓玩好窮於糞土伎巧費於窀穸自生民以來厚終之敝未有若此者雖有仲尼重明周禮墨子勉以古道猶不能禦也是以華夏之士爭相陵尚違禮之本事禮之末務禮之華𠫓廾禮之實單家竭財以相營赴廢事生而營終亡替所養而為厚葬豈云聖人制禮之意乎記曰喪雖有禮哀為主矣又曰喪與其易也寧戚今則不然并棺合椁以為孝愷豐資重襚以昭惻隱吾所不取也昔舜葬蒼梧二妃不從豈有匹配之會守常之所乎聖主明王其猶若斯況於品庶禮所不及古人時同即會時乖則別動靜應禮臨事合宜王孫裸葬墨夷露骸皆達於性理貴於速變梁伯鸞父沒卷席而葬身亡不反其尸彼數子豈薄至親之恩亡忠孝之道邪況我鄙暗不德不敏薄意內昭志有所慕上同古人下不為咎果必行之勿生疑異恐爾等目猒所見耳諱所議必欲改殯以乖吾志故遠采古聖近揆行事以悟爾心但欲制坎令容棺椁棺歸即葬平地無墳勿卜時日葬無設奠勿留墓側無起封樹於戲小子其勉之哉吾蔑復有言矣朱祇蕭建送喪到家子胤不忍父體與土并合欲更改殯祇建譬以顧命於是奉行時稱咨明達贊曰公子長平臨寇讓生淳于仁悌巨孝以名居巢好讀遂承家祿伯豫逡巡方迹孤竹文楚薄終喪朽惟速周能感親嗇神養福
