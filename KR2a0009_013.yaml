body:
  text: 後漢書卷十一劉玄劉盆子列傳第一劉玄字聖公光武族兄也弟為人所殺聖公結客欲報之客犯法聖公避吏於平林吏繫聖公父子張聖公詐死使人持喪歸舂陵吏乃出子張聖公因自逃匿王莽末南方飢饉人庶羣入野澤掘鳧茈而食之更相侵奪新市人王匡王鳳為平理諍訟遂推為渠帥衆數百人於是諸亡命馬武王常成丹等往從之共攻離鄉聚臧於緑林中數月間至七八千人地皇二年荊州牧某發奔命二萬人攻之匡等相率迎擊於雲杜大破牧軍殺數千人盡獲輜重遂攻拔竟陵轉擊雲杜安陸多略婦女還入緑林中至有五萬餘口州郡不能制三年大疾疫死者且半乃各分散引去王常成丹西入南郡號下江兵王匡王鳳馬武及其支黨朱鮪張卬等北入南陽號新市兵皆自稱將軍七月匡等進攻隨未能下平林人陳牧廖湛復聚衆千餘人號平林兵以應之聖公因往從牧等為其軍安集掾是時光武及兄伯升亦起舂陵與諸部合兵而進四年正月破王莽前隊大夫甄阜屬正梁丘賜斬之號聖公為更始將軍衆雖多而無所統一諸將遂共議立更始為天子二月辛巳設壇場於淯水上沙中陳兵大會更始即帝位南面立朝羣臣素懦弱羞愧流汗舉手不能言於是大赦天下建元曰更始元年悉拜置諸將以族父良為國三老王匡為定國上公王鳳成國上公朱鮪大司馬伯升大司徒陳牧大司空餘皆九卿將軍五月伯升拔宛六月更始入都宛城盡封宗室及諸將為列侯者百餘人更始忌伯升威名遂誅之以光祿勳劉賜為大司徒前鍾武侯劉望起兵略有汝南時王莽納言將軍嚴尤秩宗將軍陳茂既敗於昆陽往歸之八月望遂自立為天子以尤為大司馬茂為丞相王莽使太師王匡國將哀章守洛陽更始遣定國上公王匡攻洛陽西屏大將軍申屠建丞相司直李松攻武關三輔震動是時海內豪桀翕然響應皆殺其牧守自稱將軍用漢年號以待詔命旬月之間遍於天下長安中起兵攻未央宮九月東海人公賓就斬王莽於漸臺收璽綬傳首詣宛更始時在便坐黃堂取視之喜曰莽不如是當與霍光等寵姬韓夫人笑曰若不如是帝焉得之乎更始悅乃懸莽首於宛城市是月拔洛陽生縛王匡哀章至皆斬之十月使奮威大將軍劉信擊殺劉望於汝南并誅嚴尤陳茂更始遂北都洛陽以劉賜為丞相申屠建李松自長安傳送乘輿服御又遣中黃門從官奉迎遷都二年二月更始自洛陽而西初發李松奉引馬驚奔觸北宮鐵柱門三馬皆死初王莽敗唯未央宮被焚而已其餘宮館一無所毀宮女數千備列後庭自鍾鼓帷帳輿輦器服太倉武庫官府市里不改於舊更始既至居長樂宮升前殿郎吏以次列庭中更始羞怍俯首刮席不敢視諸將後至者更始問虜掠得幾何左右侍官皆宮省久吏各驚相視李松與棘陽人趙萌説更始宜悉王諸功臣朱鮪爭之以為高祖約非劉氏不王更始乃先封宗室太常將軍劉祉為定陶王劉賜為岸劉慶為燕王劉歙為元氏王大將軍劉嘉為漢中王劉信為汝陰王後遂立王匡為比陽王王鳳為宜城王朱鮪為膠東王衛尉大將軍張卬為淮陽王廷尉大將軍王常為鄧王執金吾大將軍廖湛為穰王申屠建為平氏王尚書胡殷為隨王桂天大將軍李通為西平王五威中郎將李軼為舞陰王水衡大將軍成丹為襄邑王大司空陳牧為陰平王驃騎大將軍宋佻為潁陰王尹尊為郾王唯朱鮪辭曰臣非劉宗不敢干典遂讓不受乃徙鮪為左大司馬劉賜為前大司馬使與李軼李通王常等鎮撫關東以李松為丞相趙萌為右大司馬共秉內任更始納趙萌女為夫人有寵遂委政於萌日夜與婦人飲宴後庭羣臣欲言事輒醉不能見時不得已乃令侍中坐帷內與語諸將識非更始聲出皆怨曰成敗未可知遽自縱放若此韓夫人尤嗜酒每侍飲見常侍奏事輒怒曰帝方對我飲正用此時持事來乎起扺祚悎蛂趙萌專權威福自己郎吏有説萌放縱者更始怒拔劒擊之自是無復敢言萌私忿侍中引下斬之更始救請不從時李軼朱鮪命山東王匡張卬橫暴三輔其所授官爵者皆羣小賈豎或有膳夫庖人多著繡面衣錦袴襜褕諸于罵詈道中長安為之語曰竈下養中郎將爛羊胃騎都尉爛羊頭關內侯軍帥將軍豫章李淑上書諫曰方今賊寇始誅王化未行百官有司宜慎其任夫三公上應台宿九卿下括河海故天工人其代之陛下定業雖因下江平林之藝斯蓋臨時濟用不可施之既安宜釐改制度更延英俊因才授爵以匡王國今公卿大位莫非戎陳尚書顯官皆出庸伍資亭長賊捕之用而當輔佐綱維之任唯名與器聖人所重今以所重加非其人望其毗益萬分興化致理譬猶緣木求魚升山採珠海內望此有以窺度漢祚臣非有憎疾以求進也但為階下惜此舉厝敗材傷錦所宜至慮惟割既往謬妄之失思隆周文濟濟之美更始怒繫淑詔獄自是關中離心四方怨叛諸將出征各自專置牧守州郡交錯不知所從十二月赤眉西入關三年正月平陵人方望立前孺子劉嬰為天子初望見更始政亂度其必敗謂安陵人弓林等曰前定安公嬰平帝之嗣雖王莽篡奪而嘗為漢主今皆云劉氏真人當更受命欲共定大功何如林等然之乃於長安求得嬰將至臨涇立之聚黨數千人望為丞相林為大司馬更始遣李松與討難將軍蘇茂等擊破皆斬之又使蘇茂拒赤眉於弘農茂軍敗死者千餘人三月遣李松會朱鮪與赤眉戰於蓩鄉松等大敗𠫓廾軍走死者三萬餘人時王匡張卬守河東為鄧禹所破還奔長安卬與諸將議曰赤眉近在鄭華陰間旦暮且至今獨有長安見滅不久不如勒兵掠城中以自富轉攻所在東歸南陽收宛王等兵事若不集復入湖池中為盜耳申屠建廖湛等皆以為然共入説更始更始怒不應莫敢復言及赤眉立劉盆子更始使王匡陳牧成丹趙萌屯新豐李松軍掫以拒之張卬廖湛胡殷申屠建等與御史大夫隗囂合謀欲以立秋日貙膢時共劫更始俱成前計侍中劉能卿知其謀以告之更始託病不出召張卬等卬等皆入將悉誅之唯隗囂不至更始狐疑使卬等四人且待於外廬卬與湛殷疑有變遂突出獨申屠建在更始斬之卬與湛殷遂勒兵掠東西市昏時燒門入戰於宮中更始大敗明旦將妻子車騎百餘東奔趙萌於新豐更始復疑王匡陳牧成丹與張卬等同謀乃並召入牧丹先至即斬之王匡懼將兵入長安與張卬等合李松還從更始與趙萌共攻匡卬於城內連戰月餘匡等敗走更始徙居長信宮赤眉至高陵匡等迎降之遂共連兵而進更始守城使李松出戰敗死者二千餘人赤眉生得松時松弟泛為城門校尉赤眉使使謂之曰開城門活汝兄泛即開門九月赤眉入城更始單騎走從廚城門出諸婦女從後連呼曰陛下當下謝城更始即下拜復上馬去初侍中劉恭以赤眉立其弟盆子自繫詔獄聞更始敗乃出步從至高陵止傳舍右輔都尉嚴本恐失更始為赤眉所誅將兵在外號為屯衛而實囚之赤眉下書曰聖公降者封長沙王過二十日勿受更始遣劉恭請降赤眉使其將謝祿往受之十月更始遂隨祿肉袒詣長樂宮上璽綬於盆子赤眉坐更始置庭中將殺之劉恭謝祿為請不能得遂引更始出劉恭追呼曰臣誠力極請得先死拔劒欲自刎赤眉帥樊崇等遽共救止之乃赦更始封為畏威侯劉恭復為固請竟得封長沙王更始常依謝祿居劉恭亦擁護之三輔苦赤眉暴虐皆憐更始而張卬等以為慮謂祿曰今諸營長多欲篡聖公者一旦失之合兵攻公自滅之道也於是祿使從兵與更始共牧馬於郊下因令縊殺之劉恭夜往收臧其尸光武聞而傷焉詔大司徒鄧禹葬之於霸陵有三子求歆鯉明年夏求兄弟與母東詣洛陽帝封求為襄邑侯奉更始祀歆為穀孰侯鯉為壽光侯求後徙封成陽侯求卒子巡嗣復徙封灌濩澤侯巡卒子姚嗣論曰周武王觀兵孟津退而還師以為紂未可伐斯時有未至者也漢起驅輕黠烏合之衆不當天下萬分之一而旌旃之所撝及書文之所通被莫不折戈頓顙爭受職命非唯漢人餘思固亦幾運之會也夫為權首鮮或不及陳項且猶未興況庸庸者乎劉盆子者太山式人城陽景王章之後也祖父憲元帝時封為式侯父萌嗣王莽篡位國除因為式人焉天鳳元年琅邪海曲有呂母者子為縣吏犯小罪宰論殺之呂母怨宰密聚客規以報仇母家素豐資産數百萬乃益釀醇酒買刀劒衣服少年來酤者皆賒與之視其乏者輒假衣裳不問多少數年財用稍盡少年欲相與償之呂母垂泣曰所以厚諸君者非欲求利徒以縣宰不道枉殺吾子欲為報怨耳諸君寧肯哀之乎少年壯其意又素受恩皆許諾其中勇士自號猛虎遂相聚得數十百人因與呂母入海中招合亡命衆至數千呂母自稱將軍引兵還攻破海曲執縣宰諸吏叩頭為宰請母曰吾子犯小罪不當死而為宰所殺殺人當死又何請乎遂斬之以其首祭子冢復還海中後數歲琅邪人樊崇起兵於莒衆百餘人轉入太山自號三老時青徐大飢寇賊蜂起衆盜以崇勇猛皆附之一歲間至萬餘人崇同郡人逄安東海人徐宣謝祿楊音各起兵合數萬人復引從崇共還攻莒不能下轉掠至姑幕因擊王莽探湯侯田況大破之殺萬餘人遂北入青州所過虜掠還至太山留屯南城初崇等以困窮為寇無攻城徇地之計衆既寖盛乃相與為約殺人者死傷人者償創以言辭為約束無文書旌旗部曲號令其中最尊者號三老次從事次卒吏史泛相稱曰臣巨人王莽遣平均公廉丹太師王匡擊之崇等欲戰恐其衆與莽兵亂乃皆朱其眉以相識別由是號曰赤眉赤眉遂大破丹匡軍殺萬餘人追至無鹽廉丹戰死王匡走崇又引其兵十餘萬復還圍莒數月或説崇曰莒父母之國奈何攻之乃解去時呂母病死其衆分入赤眉青犢銅馬中赤眉遂寇東海與王莽沂平大尹戰敗死者數千人乃引去掠楚沛汝南潁川還入陳留攻拔魯城轉至濮陽會更始都洛陽遣使降崇崇等聞漢室復興即留其兵自將渠帥二十餘人隨使者至洛陽降更始皆封為列侯崇等即未有國邑而留衆稍有離叛乃遂亡歸其營將兵入潁川分其衆為二部崇與逄安為一部徐宣謝祿楊音為一部崇安攻拔長社南擊宛斬縣令而宣祿等亦拔陽翟引之梁擊殺河南太守赤眉衆雖數戰勝而疲敝厭兵皆日夜愁泣思欲東歸崇等計議慮衆東向必散不如西攻長安更始二年冬崇安自武關宣等從陸渾關兩道俱入三年正月俱至弘農與更始諸將連戰剋勝衆遂大集乃分萬人為一營凡三十營營置三老從事各一人進至華陰軍中常有齊巫鼓舞祠城陽景王以求福助巫狂言景王大怒曰當為縣官何故為賊有笑巫者輒病軍中驚動時方望弟陽怨更始殺其兄乃逆説崇等曰更始荒亂政令不行故使將軍得至於此今將軍擁百萬之衆西向帝城而無稱號名為羣賊不可以久不如立宗室挾義誅伐以此號令誰敢不服崇等以為然而巫言益甚前及鄭乃相與議曰今迫近長安而鬼神如此當求劉氏共尊立之六月遂立盆子為帝自號建世元年初赤眉過式掠盆子及二兄恭茂皆在軍中恭少習尚書略通大義及隨崇等降更始即封為式侯以明經數言事拜侍中從更始在長安盆子與茂留軍中屬右校卒吏史劉俠卿主芻牧牛號曰牛吏及崇等欲立帝求軍中景王後者得七十餘人唯盆子與茂及前西安侯劉孝最為近屬崇等議曰聞古天子將兵稱上將軍乃書札為符曰上將軍又以兩空札置笥中遂於鄭北設壇場祠城陽景王諸三老從事皆大會陛下列盆子等三人居中立以年次探札盆子最幼後探得符諸將乃皆稱臣拜盆子時年十五被髮徒跣敝衣赭汗見衆拜恐畏欲啼茂謂曰善藏符盆子即齧折棄之復還依俠卿俠卿為制絳單衣半頭赤幘直綦履乘軒車大馬赤屏泥絳襜絡而猶從牧兒遨崇雖起勇力而為衆所宗然不知書數悍贋縣獄吏能通易經遂共推宣為丞相崇御史大夫逄安左大司馬謝祿右大司馬自楊音以下皆為列卿軍及高陵與更始叛將張卬等連和遂攻東都門入長安城更始來降盆子居長樂宮諸將日會論功爭言歡呼拔劒擊柱不能相一三輔郡縣營長遣使貢獻兵士輒剽奪之又數虜暴吏民百姓保壁由是皆復固守至臘日崇等乃設樂大會盆子坐正殿中黃門持兵在後公卿皆列坐殿上酒未行其中一人出刀筆書謁欲賀其餘不知書者起請之各各屯聚更相背向大司農楊音按劒罵曰諸卿皆老傭也今日設君臣之禮反更殽亂兒戲尚不如此皆可格殺更相辨鬬而兵衆遂各踰宮斬關入掠酒肉互相殺傷衛尉諸葛稚聞之勒兵入格殺百餘人乃定盆子惶恐日夜啼泣獨與中黃門共臥起唯得上觀閣而不聞外事時掖庭中宮女猶有數百千人自更始敗後幽閉殿內掘庭中蘆蔔根捕池魚而食之死者因相埋於宮中有故祠甘泉樂人尚共擊鼓歌舞衣服鮮明見盆子叩頭言飢盆子使中黃門稟之米人數斗後盆子去皆餓死不出劉恭見赤眉衆亂知其必敗自恐兄弟俱禍密教盆子歸璽綬習為辭讓之言建武二年正月朔崇等大會劉恭先曰諸君共立恭弟為帝德誠深厚立且一年肴亂日甚誠不足以相成恐死而無所益願得退為庶人更求賢知唯諸君省察崇等謝曰此皆崇等罪也恭復固請或曰此寧式侯事邪恭惶恐起去盆子乃下牀解璽綬叩頭曰今設置縣官而為賊如故吏人貢獻輒見剽劫流聞四方莫不怨恨不復信向此皆立非其人所致願乞骸骨避賢聖必欲殺盆子以塞責者無所離死誠冀諸君肯哀憐之耳因涕泣噓唏崇等及會者數百人莫不哀憐之乃皆避席頓首曰臣無狀負陛下請自今已後不敢復放縱因共抱持盆子帶以璽綬盆子號呼不得已既罷出各閉營自守三輔翕然稱天子聰明百姓爭還長安市里且滿得後二十餘日赤眉貪財物復出大掠城中糧食盡遂收載珍寶因大縱火燒宮室引兵而西過祠南郊車甲兵馬最為猛盛衆號百萬盆子乘王車駕三馬從數百騎乃自南山轉掠城邑與更始將軍嚴春戰於郿破春殺之遂入安定北地至陽城番須中逢大雪坑谷皆滿士多凍死乃復還發掘諸陵取其寶貨遂汙辱呂后尸凡賊所發有玉匣殮者率皆如生故赤眉得多行淫穢大司徒鄧禹時在長安遣兵擊之於郁夷反為所敗禹乃出之雲陽九月赤眉復入長安止桂宮時漢中賊延岑出散關屯杜陵逄安將十餘萬人擊之鄧禹以逄安精兵在外唯盆子與羸弱居城中乃自往攻之會謝祿救至夜戰街中禹兵敗走延岑及更始將軍李寶合兵數萬人與逄安戰於杜陵岑等大敗死者萬餘人寶遂降安而延岑收散卒走寶乃密使人謂岑曰子努力還戰吾當於內反之表𩹉合勢可大砟岑即還挑戰安等空營擊之寶從後悉拔赤眉旌幟更立己幡旗安等戰疲還營見旗幟皆白大驚亂走自投川谷死者十餘萬逄安與數千人脫歸長安時三輔大飢人相食城郭皆空白骨蔽野遺人往往聚為營保各堅守不下赤眉虜掠無所得十二月乃引而東歸衆尚二十餘萬隨道復散光武乃遣破姦將軍侯進等屯新安建威大將軍耿弇等屯宜陽分為二道以要其還路勑諸將曰賊若東走可引宜陽兵會新安賊若南走可引新安兵會宜陽明年正月鄧禹自河北度擊赤眉於湖禹復敗走赤眉遂出關南向征西大將軍馮異破之於崤底帝聞乃自將幸宜陽盛兵以邀其走路赤眉忽遇大軍驚震不知所為乃遣劉恭乞降曰盆子將百萬衆降陛下何以待之帝曰待汝以不死耳樊崇乃將盆子及丞相徐宣以下三十餘人肉袒降上所得傳國璽綬更始七尺寶劒及玉璧各一積兵甲宜陽城西與熊耳山齊帝令縣廚賜食衆積困餧十餘萬人皆得飽飫明旦大陳兵馬臨洛水令盆子君臣列而觀之謂盆子曰自知當死不對曰罪當應死猶幸上憐赦之耳帝笑曰兒大黠宗室無蚩者又謂崇等曰得無悔降乎朕今遣卿歸營勒兵鳴鼓相攻決其勝負不欲強相服也徐宣等叩頭曰臣等出長安東都門君臣計議歸命聖德百姓可與樂成難與圖始故不告衆耳今日得降猶去虎口歸慈母誠歡誠喜無所恨也帝曰卿所謂鐵中錚錚傭中佼佼者也又曰諸卿大為無道所過皆夷滅老弱溺社稷汙井竈然猶有三善攻破城邑周遍天下本故妻婦無所改易是一善也立君能用宗室是二善也餘賊立君迫急皆持其首降自以為功諸卿獨完全以付朕是三善也乃令各與妻子居洛陽賜宅人一區田二頃其夏樊崇逄安謀反誅死楊音在長安時遇趙王良有恩賜爵關內侯與徐宣俱歸鄉里卒於家劉恭為更始報殺謝祿自繫獄赦不誅帝憐盆子賞賜甚厚以為趙王郎中後病失明賜滎陽均輸官地以為列肆使食其稅終身贊曰聖公靡聞假我風雲始順歸歷終然崩分赤眉阻亂盆子探符雖盜皇器乃食均輸
