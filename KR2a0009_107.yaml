body:
  text: 後漢書志第七祭祀上光武即位告天郊封禪祭祀之道自生民以來則有之矣豺獺知祭祀而況人乎故人知之至於念想猶豺獺之自然也顧古質略而後文飾耳自古以來王公所為羣祀至於王莽漢書郊祀志既著矣故今但列自中興以來所修用者以為祭祀志建武元年光武即位于鄗為壇營於鄗之陽祭告天地采用元始中郊祭故事六宗羣神皆從未以祖配天地共犢餘牲尚約其文曰皇天上帝后土神祇眷顧降命屬秀黎元為民父母秀不敢當羣下百僚不謀同辭咸曰王莽篡弒竊位秀發憤興義兵破王邑百萬衆於昆陽誅王郎銅馬赤眉青犢賊平定天下海內蒙恩上當天心下為元元所歸讖記曰劉秀發兵捕不道卯金修德為天子秀猶固辭至于再至于三羣下曰皇天大命不可稽留敢不敬承二年正月初制郊兆於雒陽城南七里依鄗采元始中故事為圓壇八陛中又為重壇天地位其上皆南鄉西上其外壇上為五帝位青帝位在甲寅之地赤帝位在丙巳之地黃帝位在丁未之地白帝位在庚申之地黑帝位在壬亥之地其外為壝重營皆紫以像紫宮有四通道以為門日月在中營內南道日在東月在西北斗在北道之西皆別位不在羣神列中八陛陛五十八醊合四百六十四醊五帝陛郭帝七十二醊合三百六十醊中營四門門五十四神合二百一十六神外營四門門百八神合四百三十二神皆背營內鄉中營四門門封神四外營四門門封神四合三十二神凡千五百一十四神營即壝也封封土築也背中營神五星也及中宮官宿五官神及五嶽之屬也背外營神二十八宿外宮官星雷公先農風伯雨師四海四瀆名山大川之屬也至七年五月詔三公曰漢當郊堯其與卿大夫博士議時侍御史杜林上疏以為漢起不因緣堯與殷周異宜而舊制以高帝配方軍師在外且可如元年郊祀故事上從之語在林傳隴蜀平後乃增廣郊祀高帝配食位在中壇上西面北上天地高帝黃帝各用犢一頭青帝赤帝共用犢一頭白帝黑帝共用犢一頭凡用犢六頭日月北斗共用牛一頭四營羣神共用牛四頭凡用牛五頭凡樂奏青陽朱明西皓玄冥及雲翹育命舞中營四門門用席十八枚外營四門門用席三十六枚凡用席二百一十六枚皆莞簟率一席三神日月北斗無陛郭醊既送神燎俎實於壇南巳地建武三十年二月羣臣上言即位三十年宜封禪泰山詔書曰即位三十年百姓怨氣滿腹吾誰欺欺天乎曾謂泰山不如林放何事汙七十二代之編録桓公欲封管仲非之若郡縣遠遣吏上壽盛稱虛美必髡兼令屯田從此羣臣不敢復言三月上幸魯過泰山告太守以上過故承詔祭山及梁父時虎賁中郎將梁松等議記曰齊將有事泰山先有事配林蓋諸侯之禮也河獄視公侯王者祭焉宜無即事之漸不祭配林三十二年正月上齋夜讀河圖會昌符曰赤劉之九會命岱宗不慎克用何益於承誠善用之姦偽不萌感此文乃詔松等復案索河雒讖文言九世封禪事者松等列奏乃許焉初孝武帝欲求神仙以扶方者言黃帝由封禪而後仙於是欲封禪封禪不常時人莫知元封元年上以方士言作封禪器以示羣儒多言不合古於是罷諸儒不用三月上東上泰山乃上石立之泰山顛遂東巡海上求仙人無所見而還四月封泰山恐所施用非是乃祕其事語在漢書郊祀志上許梁松等奏乃求元封時封禪故事議封禪所施用有司奏當用方石再纍置壇中皆方五尺厚一尺用玉牒書藏方石牒厚五寸長尺三寸廣五寸有玉檢又用石檢十枚列於石傍東西各三南北各二皆長三尺廣一尺厚七寸檢中刻三處深四寸方五寸有蓋檢用金鏤五周以水銀和金以為泥王璽一方寸二分一枚方五寸方石四角又有距石皆再纍枚長一丈厚一尺廣二尺皆在圓壇上其下用距石十八枚皆高三尺厚一尺廣二尺如小碑環壇立之去壇三步距石下皆有石跗入地四尺又用石碑高九尺廣三尺五寸厚尺二寸立壇丙地去壇三丈以上以刻書上以用石功難又欲及二月封故詔松欲因故封石空檢更加封而已松上疏爭之以為登封之禮告功皇天垂後無窮以為萬民也承天之敬尤宜章明奉圖書之瑞尤宜顯著今因舊封竄寄玉牒故石下恐非重命之義受命中興宜當特異以明天意遂使泰山郡及魯趣石工宜取完青石無必五色時以印工不能刻玉牒欲用丹漆書之會求得能刻玉者遂書書祕刻方石中合容玉牒二月上至奉高遣侍御史與蘭臺令史將工先上山刻石文曰維建武三十有二年二月皇帝東巡狩至于岱宗柴望秩於山川班于羣神遂覲東后從臣太尉熹行司徒事特進高密侯禹等漢賓二王之後在位孔子之後褒成侯序在東后蕃王十二咸來助祭河圖赤伏符曰劉秀發兵捕不道四夷雲集龍鬬野四七之際火為主河圖會昌符曰赤帝九世巡省得中治平則封誠合帝道孔矩則天文靈出地祇瑞興帝劉之九會命岱宗誠善用之姦偽不萌赤漢德興九世會昌巡岱皆當天地扶九崇經之常漢大興之道在九世之主封于泰山刻石著紀禪于梁父退省考五河圖合古篇曰帝劉之秀九名之世帝行德封刻政河圖提劉豫曰九世之帝方明聖持衡拒九州平天下豫雒書甄曜度曰赤三德昌九世會修符合帝際勉刻封孝經鉤命決曰豫誰行赤劉用帝三建孝九會修專茲竭行封岱青河雒命后經讖所傳昔在帝堯聰明密微讓與舜庶後裔握機王莽以舅后之家三司鼎足冢宰之權勢依託周公霍光輔幼歸政之義遂以篡叛僭號自立宗廟墮壞社稷喪亡不得血食十有八年楊徐青三州首亂兵革橫行延及荊州豪傑并兼百里屯聚往往僭號北夷作寇千里無煙無雞鳴狗吠之聲皇天眷顧皇帝以匹庶受命中興年二十八載興兵起是以中次誅討十有餘年罪人則斯得黎庶得居爾田安爾宅書同文車同軌人同倫舟輿所通人迹所至靡不貢職建明堂立辟雍起靈臺設庠序同律度量衡修五禮五玉三帛二牲一死贄吏各修職復于舊典在位三十有二年年六十二乾乾日不敢荒寧涉危歷險親巡黎元恭肅神祇惠恤耆老理庶遵古聰允明恕皇帝唯慎河圖雒書正文是月辛卯柴登封泰山甲午禪于梁陰以承靈瑞以為兆民永茲一宇垂于後昆百寮從臣郡守師尹咸蒙祉福永永無極秦相李斯燔詩書樂崩禮壞建武元年已前文書散亡舊典不具不能明經文以章句細微相況八十一卷明者為驗又其十卷皆不昭子貢欲去告朔之餼羊子曰賜也爾愛其羊我愛其禮後有聖人正失誤刻石記二十二日辛卯晨燎祭天於泰山下南方羣神皆從用樂如南郊諸王王者後二公孔子後褒成君皆助祭位事也事畢將升封或曰泰山雖已從食於柴祭今親升告功宜有禮祭於是使謁者以一特牲於常祠泰山處告祠泰山如親耕貙劉先祠先農先虞故事至食時御輦升山日中後到山上更衣早晡時即位于壇北面羣臣以次陳後西上畢位升壇尚書令奉玉牒檢皇帝以寸二分璽親封之訖太常命人發壇上石尚書令藏玉牒已復石覆訖尚書令以五寸印封石檢事畢皇帝再拜羣臣稱萬歲命人立所刻石碑乃復道下二十五日甲午禪祭地于梁陰以高后配山川羣神從如元始中北郊故事四月己卯大赦天下以建武三十二年為建武中元元年復博奉高嬴勿出元年租芻以吉日刻玉牒書函藏金匱璽印封之乙酉使太尉行事以特告至高廟太尉奉匱以告高廟藏于廟室西壁石室高主室之下
