body:
  text: 後漢書卷四十四鄧張徐張胡列傳第三十四鄧彪字智伯南陽新野人太傅禹之宗也父邯中興初以功封鄳侯仕至勃海太守彪少勵志修孝行父卒讓國於異母弟荊鳳顯宗高其節下詔許焉後仕州郡辟公府五遷桂陽太守永平十七年徵入為太僕數年喪後母辭疾乞身詔以光祿大夫行服服竟拜奉車都尉遷大司農數月代鮑昱為太尉彪在位清白為百僚式視事四年以疾乞骸骨元和元年賜策罷贈錢三十萬在所以二千石奉終其身又詔太常四時致宗廟之胙河南尹遣丞存問常以八月旦奉羊酒和帝即位以彪為太傅録尚書事賜爵關中內侯永元初竇氏專權驕縱朝廷多有諫爭而彪在位修身而已不能有所匡正又嘗奏免御史中丞周紆紆前失竇氏旨故頗以此致譏然當時宗其禮讓及竇氏誅以老病上還樞機職詔賜養牛酒而許焉五年春薨于位天子親臨弔臨張禹字伯達趙國襄國人也祖父況族姊為皇祖考夫人數往來南頓見光武光武為大司馬過邯鄲況為郡吏謁見光武光武大喜曰乃今得我大舅乎因與俱北到高邑以為元氏令遷涿郡太守後為常山關長會赤眉攻關城況戰歿父歆初以報仇逃亡後仕為淮陽相終於汲令禹性篤厚節儉父卒汲吏人賻送前後數百萬悉無所受又以田宅推與伯父身自寄止永平八年舉孝廉稍遷建初中拜楊州刺史當過江行部中土民人皆以江有子胥之神難於濟涉禹將度吏固請不聽禹厲言曰子胥如有靈知吾志在理察枉訟豈危我哉遂鼓楫而過歷行郡邑深幽之處莫不畢到親録囚徒多所明舉吏民希見使者民人懷喜悅怨德美惡莫不自歸焉元和二年轉兗州刺史亦有清平稱三年遷下邳相徐縣北界有蒲陽坡傍多良田而堙廢莫修禹為開水門通引灌溉遂成孰田數百頃勸率吏民假與種糧親自勉勞遂大收穀實鄰郡貧者歸之千餘戶室廬相屬其下成巿後歲至墾千餘頃民用溫給功曹史戴閏故太尉掾也權動郡內有小譴禹令自致徐獄然後正其法自長史以下莫不震肅永元六年入為大司農拜太尉和帝甚禮之十五年南巡祠園廟禹以太尉兼衛尉留守聞車駕當進幸江陵以為不宜冒險遠驛馬上諫詔報曰祠謁既訖當南禮大江會得君奏臨漢回輿而旋及行還禹特蒙賞賜延平元年遷為太傅録尚書事鄧太后以殤帝初育欲令重臣居禁內乃詔禹舍宮中給帷帳牀褥太官朝夕進食五日一歸府每朝見特贊與三公絶席禹上言方諒暗密靜之時不宜依常有事於苑囿其廣成上林空地宜且以假貧民太后從之及安帝即位數上疾乞身詔遣小黃門問疾賜牛一頭酒十斛勸令就第其錢布刀劒衣物前後纍至永初元年以定策功封安鄉侯食邑千二百戶與太尉徐防司空尹勤同日俱封其秋以寇賊水雨策免防勤而禹不自安上書乞骸骨更拜太尉四年新野君病皇太后車駕幸其第禹與司徒夏勤司空張敏俱上表言新野君不安車駕連日宿止臣等誠竊惶懼臣聞王者動設先置止則交戟清道而後行清室而後御離宮不宿所以重宿衛也陛下體蒸蒸之至孝親省方藥恩情發中久處單外百官露止議者所不安宜且還宮上為宗廟社稷下為萬國子民比三上固爭乃還宮後連歲災荒府臧空虛禹上疏求入三歲租稅以助郡國稟假詔許之五年以陰陽不和策免七年卒于家使者弔祭除小子曜為郎中長子盛嗣徐防字謁卿沛國銍人也祖父宣為講學大夫以易教授王莽父憲亦傳宣業防少習父祖學永平中舉孝廉除為郎防體貌矜嚴占對可觀顯宗異之特補尚書郎職典樞機周密畏慎奉事二帝未嘗有過和帝時稍遷司隸校尉出為魏郡太守永元十年遷少府大司農防勤曉政事所在有迹十四年拜司空防以五經久遠聖意難明宜為章句以悟後學上疏曰臣聞詩書禮樂定自孔子發明章句始於子夏其後諸家分析各有異說漢承亂秦經典廢絶本文略存或無章句收拾缺遺建立明經博徵儒術開置太學孔聖既遠微旨將絶故立博士十有四家設甲乙之科以勉勸學者所以示人好惡改敝就善者也伏見太學試博士弟子皆以意說不修家法私相容隱開生姦路每有策試輒興諍訟論議紛錯互相是非孔子稱述而不作又曰吾猶及史之闕文疾史有所不知而不肯闕也今不依章句妄生穿鑿以遵師為非義意說為得理輕侮道術以成俗誠非詔書實選本意改薄從忠三世代常道專精務本儒學所先臣以為博士及甲乙策試宜從其家章句開五十難以試之解釋多者為上第引文明者為高說若不依先師義有相伐皆正以為非五經各取上第六人論語不宜射策雖所失或久差可矯革詔書下公卿皆從防言十六年拜為司徒延平元年遷太尉與太傅張禹參録尚書事數受賞賜甚見優寵安帝即位以定策封龍鄉侯食邑千一百戶其年以災異寇賊策免就國凡三公以災異策免始自防也防卒子衡當嗣讓封於其弟崇數歲不得已乃出就爵云張敏字伯達河閒鄚人也建初二年舉孝廉四遷五年為尚書建初中有人侮辱人父者而其子殺之肅宗貰其死刑而降宥之自後因以為比是時遂定其議以為輕侮法敏駮議曰夫輕侮之法先帝一切之恩不有成科班之律令也夫死生之決宜從上下猶天之四時有生有殺若開相容恕著為定法者則是故設姦萌生長罪隙孔子曰民可使由之不可使知之春秋之義子不報讎非子也而法令不為之減者以相殺之路不可開故也今託義者得減妄殺者有差使執憲之吏得設巧詐非所以導在醜不爭之義又輕侮之比以繁滋至有四五百科轉相顧望彌復增甚難以垂之萬載臣聞師言救文莫如質故高帝去煩苛之法為三章之約建初詔書有改於古者可下三公廷尉蠲除其敝議寢不省敏復上疏曰臣敏蒙恩特見拔擢愚心所不曉迷意所不解誠不敢苟隨衆議臣伏見孔子垂經典臯陶造法律原其本意皆欲禁民為非也未曉輕侮之法將以何禁必不能使不相輕侮而更開相殺之路執憲之吏復容其姦枉議者或曰平法當先論生臣愚以為天地之性唯人為貴殺人者死三代通制今欲趣生反開殺路一人不死天下受敝記曰利一害百人去城郭夫春生秋殺天道之常春一物枯即為災秋一物華即為異王者承天地順四時法聖人從經律願陛下留意下民考尋利害廣令平議天下幸甚和帝從之九年拜司隸校尉視事二歲遷汝南太守清約不煩用刑平正有理能名坐事免延平元年拜議郎再遷潁川太守永初元年徵拜司空在位奉法而已視事三歲以病乞身不聽六年春行大射禮陪位頓仆乃策罷之因病篤卒于家胡廣字伯始南郡華容人也六世祖剛清高有志節平帝時大司徒馬宮辟之值王莽居攝剛解其衣冠縣府門而去遂亡命交址隱於屠肆之閒後莽敗乃歸鄉里父貢交址都尉廣少孤貧親執家苦長大隨輩入郡為散吏太守法雄之子真從家來省其父真頗知人會歲終應舉雄勑真助其求其才雄因大會諸吏真自於牖閒密占察之乃指廣以白雄遂察孝廉既到京師試以章奏安帝以廣為天下第一旬月拜尚書郎五遷尚書僕射順帝欲立皇后而貴人有寵者四人莫知所建議欲探籌以神定選廣與尚書郭虔史敞上疏諫曰竊見詔書以立后事大謙不自專欲假之籌策決疑靈神篇籍所記祖宗典故未嘗有也恃神任筮既不必當賢就值其人猶非德選夫岐嶷形於自然俔天必有異表宜參良家簡求有德德同以年年鈞以貌稽之典經斷之聖慮政令猶汗往而不反詔文一下形之四方臣職在拾遺憂深責重是以焦心冒昧陳聞帝從之以梁貴人良家子定立為皇后時尚書令左雄議改察舉之制限年四十以上儒者試經學文吏試章奏廣復與敞虔上書駮之曰臣聞君以兼覽博照為德臣以獻可替否為忠書載稽疑謀及卿士詩美先人詢于芻蕘國有大政必議之於前訓咨之於故老是以慮無失策舉無過事竊見尚書令左雄議郡舉孝廉皆限年四十以上諸生試章句文吏試箋奏明詔既許復令臣等得與相參竊惟王命之重載在篇典當令縣於日月固於金石遺則百王施之萬世詩云天難諶斯不易惟王可不慎與蓋選舉因才無拘定制六奇之策不出經學鄭阿之政非必章奏甘奇顯用年乖彊仕終賈揚聲亦在弱冠漢承周秦兼覽殷夏祖德師經參雜霸軌聖主賢臣世以致理貢舉之制莫或回革今以一臣之言剗戾舊章便利未明衆心不猒矯枉變常政之所重而不訪台司不謀卿士若事下之後議者剝異異之則朝失其便同之則王言已行臣愚以為可宣下百官參其同異然後覽擇勝否詳採厥衷敢以瞽言冒干天禁惟陛下納焉帝不從時陳留郡缺職尚書史敞等薦廣曰臣聞德以旌賢爵以建事明試以功典謨所美五服五章天秩所作是以臣竭其忠君豐其寵舉不失德下忘其死竊見尚書僕射胡廣體真履規謙虛溫雅博物洽聞探賾窮理六經典奧舊章憲式無所不覽柔而不犯文而有禮忠貞之性憂公如家不矜其能不伐其勞翼翼周慎行靡玷漏密勿夙夜十有餘年心不外顧志不苟進臣等竊以為廣在尚書劬勞日久後母年老既蒙簡照宜試職千里匡寧方國陳留近郡今太守任缺廣才略深茂堪能撥煩願以參選紀綱頽俗使束修守善有所勸仰廣典機事十年出為濟陰太守以舉吏不實免復為汝南太守入拜大司農漢安元年遷司徒質帝崩代李固為太尉録尚書事以定策立桓帝封育陽安樂鄉侯以病遜位又拜司空告老致仕尋以特進徵拜太常遷太尉以日食免復為太常拜太尉延熹二年大將軍梁冀誅廣與司徒韓縯司空孫朗坐不衛宮皆減死一等奪爵土免為庶人後拜太中大夫太常九年復拜司徒靈帝立與太傅陳蕃參録尚書事復封故國以病自乞會蕃被誅代為太傅總録如故時年已八十而心力克壯繼母在堂朝夕瞻省傍無几杖言不稱老及母卒居喪盡哀率禮無愆性溫柔謹素常遜言恭色達練事體明解朝章雖無謇直之風屢有補闕之益故京師諺曰萬事不理問伯始天下中庸有胡公及共李固定策大議不全又與中常侍丁肅婚姻以此譏毀於時自在公台三十餘年歷事六帝禮任甚優每遜位辭病及免退田里未嘗滿歲輒復升進凡一履司空再作司徒三登太尉又為太傅其所辟命皆天下名士與故吏陳蕃李咸並為三司蕃等每朝會輒稱疾避廣時人榮之年八十二熹平元年薨使五官中郎將持節奉策贈太傅安樂鄉侯印綬給東園梓器謁者護喪事賜冢塋于原陵諡文恭侯拜家一人為郎中故吏自公卿大夫博士議郎以下數百人皆縗絰殯位自終及葬漢興以來人臣之盛未嘗有也初楊雄依虞針作十二州二十五官針其九針亡闕後涿郡崔駰及子瑗又臨邑侯劉騊駼增補十六篇廣復繼作四篇文甚典美乃悉撰次首目為之解釋名曰百官針凡四十八篇其餘所著詩賦銘頌針弔及諸解詁凡二十二篇熹平六年靈帝思感舊德乃圖畫廣及太尉黃瓊於省內詔議郎蔡雍為其頌云論曰爵任之於人重矣全喪之於生大矣懷祿以圖存者仕子之恆情審能而就列者出身之常體夫紆於物則非己直於志則犯俗辭其艱則乖義徇其節則失身統之方軌易因險塗難御故昔人明慎於所受之分於岐路之閒也如令志行無牽於物臨生不先其存後世何貶焉古人以宴安為戒豈數公之謂平贊曰鄧張作傅無咎無譽敏正疑律防議章句胡公庸庸飾情恭貌朝章雖理據正或橈
