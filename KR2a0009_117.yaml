body:
  text: 後漢書志第十七五行五射妖龍蛇孽馬禍人痾人化死復生疫投霓五行傳曰皇之不極是謂不建厥咎眊厥罰恆陰厥極弱時則有射妖時則有龍蛇之孽時則有馬禍時則有下人伐上之痾時則有日月亂行星辰逆行皇君也極中也眊不明也説云此沴天也不言沴天者至尊之辭也春秋王師敗績以自敗為文恆陰中興以來無録者靈帝光和中雒陽男子夜龍以弓箭射北闕吏收考問辭居貧負責無所聊生因買弓箭以射近射妖也其後車騎將軍何苗與兄大將軍進部兵還相猜疑對相攻擊戰於闕下苗死兵敗殺數千人雒陽宮室內人燒盡安帝延光三年濟南言黃龍見歷城琅邪言黃龍見諸是時安帝聽讒免太尉楊震震自殺又帝獨有一子以為太子信讒廢之是皇不中故有龍孽是時多用佞媚故以為瑞應明年正月東郡又言黃龍二見濮陽桓帝延熹七年六月壬子河內野王山上有龍死長可數十丈襄楷以為夫龍者為帝王瑞易論大人天鳳中黃山宮有死龍漢兵誅莽而世祖復興此易代之徵也至建安二十五年魏文帝代漢永康元年八月巴郡言黃龍見時吏傅堅以郡欲上言內白事以為走卒戲語不可太守不聽嘗見堅語云時民以天熱欲就池浴見池水濁因戲相恐此中有黃龍語遂行人間聞郡欲以為美故言時史以書帝紀桓帝時政治衰缺而在所多言瑞應皆此類也又先儒言瑞興非時則為妖孽而民訛言生龍語皆龍孽也熹平元年四月甲午青蛇見御坐上是時靈帝委任宦者王室微弱更始二年二月發雒陽欲入長安司直李松奉引車奔觸北宮鐵柱門三馬皆死馬禍也時更始失道將亡桓帝延熹五年四月驚馬與逸象突入宮殿近馬禍也是時桓帝政衰缺靈帝光和元年司徒長史馮巡馬生人京房易傳曰上亡天子諸侯相伐厥妖馬生人後馮巡遷甘陵相黃巾初起為所殘殺而國家亦四面受敵其後關東州郡各舉義兵卒相攻伐天子西移王政隔塞其占與京房同光和中雒陽水西橋民馬逸走遂齧殺人是時公卿大臣及左右數有被誅者安帝永初元年十一月戊子民轉相驚走棄什物去廬舍靈帝建寧三年春河內婦食夫河南夫食婦熹平二年六月雒陽民訛言虎賁寺東壁中有黃人形容鬚眉良是觀者數萬省內悉出道路斷絶到中平元年二月張角兄弟起兵冀州自號黃天三十六方四面出和將帥星布吏士外屬因其疲餧牽而勝之光和元年五月壬午何人白衣欲入德陽門辭我梁伯夏教我上殿為天子中黃門桓賢等呼門吏僕射欲收縛何人吏未到須臾還走求索不得不知姓名時蔡雍以成帝時男子王褒絳衣入宮上前殿非常室曰天帝令我居此後王莽篡位今此與成帝時相似而有異被服不同又未入雲龍門而覺稱梁伯夏皆輕於言以往況今將有狂狡之人欲為王氏之謀其事不成其後張角稱黃天作亂竟破壞二年雒陽上西門外女子生兒兩頭異肩共俱前向以為不祥墮地棄之自此之後朝廷霿亂政在私門上下無別二頭之象後董卓戮太后被以不孝之名放廢天子後復害之漢元以來禍莫踰此四年魏郡男子張博送鐵盧詣太官博上書室殿山居屋後宮禁落屋歡呼上收縛考問辭忽不自覺知中平元年六月壬申雒陽男子劉倉居上西門外妻生男兩頭共身靈帝時江夏黃氏之母浴而化為黿入于深淵其後時出見初浴簪一銀叉及見猶在其首獻帝初平中長沙有人姓桓氏死棺斂月餘其母聞棺中聲發之遂生占曰至陰為陽下人為上其後曹公由庶士起建安四年二月武陵充縣女子李娥年六十餘物故以其家杉木槥斂瘞於城外數里上已十四日有行聞其冢中有聲便語其家家往視聞聲便發出遂活七年越巂有男化為女子時周羣上言哀帝時亦有此異將有易代之事至二十五年獻帝封于山陽建安中女子生男兩頭共身安帝元初六年夏四月會稽大疫延光四年冬京都大疫桓帝元嘉元年正月京都大疫二月九江廬江又疫延熹四年正月大疫靈帝建寧四年三月大疫熹平二年正月大疫光和二年春大疫五年二月大疫中平二年正月大疫獻帝建安二十二年大疫靈帝光和元年六月丁丑有黑氣墮北宮溫明殿東庭中黑如車蓋起奮訊身五色有頭體長十餘丈形貌似龍上問蔡雍對曰所謂天投霓者也不見足尾不得稱龍易傳曰霓之比無德以色親也潛潭巴曰虹出后妃陰脅王者又曰五色迭至照于宮殿有兵革之事演孔圖曰天子外苦兵威內奪臣無忠則天投霓變不空生占不空言先是立皇后何氏皇后每齋當謁祖廟輒有變異不得謁中平元年黃巾賊張角等立三十六方起兵燒郡國山東七州處處應角遣兵外討角等內使皇后二兄為大將統兵其年宮車宴駕皇后攝政二兄秉權譴讓帝母永樂后令自殺陰呼并州牧董卓欲共誅中官中官逆殺大將軍進兵相攻討京都戰者塞道皇太后母子遂為太尉卓等所廢黜皆死天下之敗兵先興於宮省外延海內二三十歲其殃禍起自何氏
