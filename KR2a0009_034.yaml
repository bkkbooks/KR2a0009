body:
  text: 後漢書卷三十下郎顗襄楷列傳第二十下郎顗字雅光北海安丘人也父宗字仲綏學京氏易善風角星算六日七分能望氣占候吉凶常賣卜自奉安帝徵之對策為諸儒表後拜吳令時卒有暴風宗占知京師當有大火記識時日遣人參候果如其言諸公聞而表上以博士徵之宗恥以占驗見知聞徵書到夜縣印綬於縣廷而遁去遂終身不仕顗少傳父業兼明經典隱居海畔延致學徒常數百人晝研精義夜占象度勤心鋭思朝夕無倦州郡辟召舉有道方正不就順帝時災異屢見陽嘉二年正月公車徵顗乃詣闕拜章曰臣聞天垂妖象地見災符所以譴告人主責躬修德使正機平衡流化興政也易內傳曰凡災異所生各以其政變之則除消之亦除伏惟陛下躬日之聽溫三省之勤思過念咎務消祇悔禮修禮遵約蓋惟上興革文變薄事不在下故周南之德關雎政本本立道生風行草從澄其源者流清溷其本者末濁天地之道其猶鼓籥以虛為德自近及遠者也伏見往年以來園陵數災炎光熾猛驚動神靈易天人應曰君子不思遵利茲謂無澤厥災孽火燒其宮又曰君高臺府犯陰侵陽厥災火又曰上不儉下不節炎火並作燒君室自頃繕理西苑修復太學宮殿官府多所搆飾昔盤庚遷殷去奢即儉夏后卑室盡力致美又魯人為長府閔子騫曰仍舊貫何必改作臣愚以為諸所繕修事可省減稟恤貧人賑贍孤寡此天之意也人之慶也仁之本也儉之要也焉有應天養人為仁為儉而不降福者哉傳曰久陰不雨亂氣也蒙之比也蒙者君臣上下相冒亂也又曰欲德不用厥異常陰夫賢者化之本雲者雨之具也得賢而不用猶久陰而不雨也又頃前數日寒過其節冰既解釋還復凝合夫寒往則暑來暑往則寒來此言日月相推寒暑相避以成物也今立春之後火卦用事當溫而寒違反時節由功賞不至而刑罰必加也宜須立秋順氣行罰盈縮往來涉歷輿鬼環繞軒轅火精南方夏之政也政有失禮不從夏令則熒惑失行正月三日至乎九日三公卦也三公上應台階下同元首政失其道則寒陰反節節彼南山詠自周詩股肱良哉著於虞典而今之在位競託高虛納纍鐘之奉忘天下之憂棲偃仰寢疾自逸被策文得賜錢即復起矣何疾之易而愈之速以此消伏災眚興致升平其可得乎今選舉牧守委任三府長吏不良既咎州郡州郡有失豈得不歸責舉者而陛下崇之彌優自下慢事愈甚所謂大網疏小網數三公非臣之仇臣非狂夫之作所以發憤忘食懇懇不已者誠念朝廷欲致興平非不能面譽也伏待重誅書奏帝復使對尚書顗對曰愨不識忌諱故出死忘命懇懇重言誠欲陛下修乾坤之德開日月之明披圖籍案經典覽帝王之務識先後之政如有闕遺退而自改本文武之業擬堯舜之道攘災延慶號令天下此誠臣顗區區之願夙夜夢寤盡心所計謹條序前章暢其旨趣條便宜七事具如狀對官府近始永平歲時未積便更修造又西苑之設禽畜是處離房別觀本不常居而皆務精土木營建無已消功單賄巨億為計易內傳曰人君奢侈多飾宮室其時旱其災火是故魯僖遭旱修政自勑下鐘鼓之縣休繕治之官雖則不寧而時雨自降由此言之天之應人敏於景響今月十七日戊午徵日也日加申風從寅來丑時而止丑寅申皆徵也不有火災必當為旱願陛下校計繕修之費永念百姓之勞罷將作之官減雕文之飾損庖廚之饌退宴私之樂易中孚傳曰陽感天不旋日如是則景雲降集眚沴息矣道人也寒溫為實清濁為貌今三公皆令色足恭外厲內荏以虛事上無佐國之實故清濁效而寒溫不效也是以陰寒侵犯消息占曰日乘則有妖風日蒙則有地裂如是三年則致日食陰侵其陽漸積所致立春前後溫氣應節者詔令寬也其後復寒者無寬之實也夫十室之邑必有忠信率土之人豈無貞賢未聞朝廷有所賞拔非所以求善贊務弘濟元元宜採納良臣以助聖化驚動涉歷天門災成戊己今春當旱夏必有水臣以六日七分候之可知夫災眚之來緣類而應行有玷缺則氣逆于天精感變出以戒人君王者之義時有不登則損滋徹膳數年以來穀收稍減家貧戶饉歲不如昔百姓不足君誰與足水旱之災雖尚未至然君子遠覽防微慮萌老子曰人之飢也以其上食稅之多也故孝文皇帝綈袍革舄木器無文約身薄賦時致升平今陛下聖德中興宜遵前典惟節惟約天下幸甚易曰天道無親常與善人是故高宗以享福宋景以延年十六日在婁五度推步三統熒惑今當在翼九度今反在柳三度則不及五十餘度去年八月二十四日戊辰熒惑歷輿鬼東入軒轅出后星北東去四度北旋復還軒轅者後宮也熒惑者至陽之精也天之使也而出入軒轅繞還往來易曰天垂象見吉凶其意昭然可見矣禮天子一娶九女嫡媵畢具今宮人侍御動以千計或生而幽隔人道不通鬱積之氣上感皇天故遣熒惑入軒轅理人倫垂象見異以悟主上昔武王下車出傾宮之女表商容之閭以理人倫以表賢德故天授以聖子成王是也今陛下多積宮人以違天意故皇胤多夭嗣體莫寄詩云敬天之怒不敢戲豫方今之福莫若廣嗣廣嗣之術可不深思宜簡出宮女恣其姻嫁則天自降福子孫千億惟陛下丁寧再三留神於此左右貴幸亦宜惟臣之言以悟陛下蓋善言古者合於今善言天者合於人願訪問百僚有違臣言者臣當受苟言之罪日乃滅春秋曰有星孛于大辰大辰者何大火也大火為大辰伐又為大辰北極亦為大辰所以孛一宿而連三宿者言北辰王者之宮也凡中宮無節政教亂逆威武衰微則此三星以應之也罰者白虎其宿主兵其國趙魏變見西方亦應三輔凡金氣為變發在秋節臣恐立秋以後趙魏關西將有羌寇畔戾之患宜豫宣告諸郡使敬授人時輕徭役薄賦斂勿妄繕起堅倉獄備守衛回選賢能以鎮撫之金精之變責歸上司宜以五月丙午遣太尉服干戚建井旟書玉板之策引白氣之異於西郊責躬求愆謝咎皇天消滅妖氣蓋以火勝金轉禍為福也日中者侵太陽也見於春者政變常也方今中官外司各各考事其所考者或非急務又恭陵火災主名未立多所收捕備經考毒尋火為天戒以悟人君可順而不可違可敬而不可慢陛下宜恭己內省以備後災凡諸考案并須立秋又易傳曰公能其事序賢進士後必有喜反之則白虹貫日以甲乙見者則譴在中台自司徒居位陰陽多謬久無虛己進賢之策天下興議異人同咨且立春以來金氣再見金能勝木必有兵氣宜黜司徒以應天意陛下不早攘之將負臣言遺患百姓年詩泛歷樞曰卯酉為革政午亥為革命神在天門出入候聽言神在戌亥司候帝王興衰得失厥善則昌厥惡則亡於易雄雌祕歷今值困乏凡九二困者衆小人欲共困害君子也經曰困而不失其所其唯君子乎唯獨賢聖之君遭困遇險能致命遂志不去其道陛下乃者潛龍養德幽隱屈厄即位之元紫宮驚動歷運之會時氣已應然猶恐妖祥未盡君子思患而豫防之臣以為戌仲已竟來年入季文帝改法除肉刑之罪至今適三百載宜因斯際大蠲法令官名稱號輿服器械事有所更變大為小去奢就儉機衡之政除煩為簡改元更始招求幽隱舉方正徵有道博採異謀開不諱之路臣陳引際會恐犯忌諱書不盡言未敢究暢臺詰顗曰對云白虹貫日政變常也朝廷率由舊章何所變易而言變常又言當大蠲法令革易官號或云變常以致災或改舊以除異何也又陽嘉初建復欲改元據何經典其以實對顗對曰方春東作布德之元陽氣開發養導萬物王者因天視聽奉順時氣宜務崇溫柔遵其行令而今立春之後考事不息秋冬之政行乎春夏故白虹春見掩蔽日曜凡邪氣乘陽則虹霓在日斯皆臣下執事刻急所致殆非朝廷優寬之本此其變常之咎也又今選舉皆歸三司非有周召之才而當則哲之重每有選用輒參之掾屬公府門巷賓客填集送去迎來財貨無已其當遷者競相薦謁各遣子弟充塞道路開長姦門興致浮僞非所謂率由舊章也尚書職在機衡宮禁嚴密私曲之意羌不得通偏黨之恩或無所用選舉之任不如還在機密臣誠愚戇不知折中斯固遠近之論當今之宜又孔子曰漢三百載計斗歷改憲三百四歲為一德五德千五百二十歲五行更用王者隨天譬猶自春徂夏改青服絳者也自文帝省刑適三百年而輕微之禁漸已殷積王者之法譬猶江河當使易避而難犯也故易曰易則易知簡則易從易簡而天下之理得矣今去奢即儉以先天下改易名號隨事稱謂易曰君子之道或出或處同歸殊塗一致百慮是知變常而善可以除災變常而惡必致於異今年仲竟來年入季仲終季始歷運變改故可改元所以順天道也臣顗愚蔽不足以答聖問顗又上書薦黃瓊李固并陳消災之術曰臣前對七事要政急務宜於今者所當施用誠知愚淺不合聖聽人賤言廢當受誅罰征營惶怖靡知厝身為用文武創德周召作輔是以能建天地之功增日月之耀者也詩云赫赫王命仲山甫將之邦國若否仲山甫明之宣王是賴以致雍熙陛下踐祚以來勤心庶政而三九之位未見其人是以災害屢臻四國未寧臣考之國典驗之聞見莫不以得賢為功失士為敗且賢者出處翔而後集爵以德進則其情不苟然後使君子恥貧賤而樂富貴矣若有德不報有言不酬來無所樂進無所趨則皆懷歸藪澤修其故志矣夫求賢者上以承天下以為人不用之則逆天統違人望逆天統則災眚降違人望則化不行災眚降則下呼嗟化不行則君道虧四始之缺五際之厄其咎由此豈可不剛健篤實矜矜栗栗以守天功盛德大業乎從政明達變復朝廷前加優寵賓于上位瓊入朝日淺謀謨未就因以喪病致命遂志老子曰大音希聲大器晚成善人為國三年乃立天下莫不嘉朝廷有此良人而復怪其不時還任陛下宜加隆崇之恩極養賢之禮徵反京師以慰天下又處士漢中李固年四十通游夏之藝履顏閔之仁潔白之節情同皎日忠貞之操好是正直卓冠古人當世莫及元精所生王之佐臣天之生固必為聖漢宜蒙特徵以示四方夫有出倫之才不應限以官次昔顏子十八天下歸仁子奇稚齒化阿有聲若還瓊徵固任以時政伊尹傅說不足為比則可垂景光致休祥矣臣顗明不知人伏聽衆言百姓所歸臧否共歎願泛問百僚核其名行有一不合則臣為欺國惟留聖神不以人廢言發德號爵賢命士流寬大之澤垂仁厚之德順助元氣含養庶類如此則天文昭爛星辰顯列五緯循軌四時和睦不則太陽不光天地溷濁時氣錯逆霾霧蔽日自立春以來纍經旬朔未見仁德有所施布但聞罪罰考掠之聲夫天之應人疾於景響而自從入歲常有蒙氣月不舒光日不宣曜日者太陽以象人君政變於下日應於天清濁之占隨政抑揚天之見異事無虛作豈獨陛下倦於萬機帷幄之政有所闕歟何天戒之數見也臣願陛下發揚乾剛援引賢能勤求機衡之寄以獲斷金之利臣之所陳輒以太陽為先者明其不可久暗急當改正其異雖微其事甚重臣言雖約其旨甚廣惟陛下乃眷臣章深留明思事消息之卦也於此六日之中靁當發聲發聲則歲氣和王道興也易曰靁出地奮豫先王以作樂崇德殷薦之上帝靁者所以開發萌牙辟陰除害萬物須靁而解資雨而潤故經曰靁以動之雨以潤之王者崇寬大順春令則靁應節不則發動於冬當震反潛故易傳曰當靁不靁太陽弱也今蒙氣不除日月變色則其效也天網恢恢疏而不失隨時進退應政得失大人者與天地合其德與日月合其明琁璣動作與天相應靁者號令其德生養號令殆廢當生而殺則靁反作其時無歲陛下若欲除災昭祉順天致和宜察臣下尤酷害者亟加斥黜以安黎元則太皓悅和靁聲乃發數寸光芒交接房心者天帝明堂布政之宮孝經鉤命決曰歲星守心年穀豐尚書洪範記曰月行中道移節應期德厚受福重華留之重華者謂歲星在心也今太白從之交合明堂金木相賊而反同合此以陰陵陽臣下專權之異也房心東方其國主宋石氏經曰歲星出左有年出右無年今金木俱東歲星在南是為出右恐年穀不成宋人飢也陛下宜審詳明堂布政之務然後妖異可消五緯順序矣僭陽者祿去公室臣下專權也自冬涉春訖無嘉澤數有西風反逆時節朝廷勞心廣為禱祈薦祭山川暴龍移市臣聞皇天感物不為僞動災變應人要在責己若令雨可請降水可攘止則歲無隔并太平可待然而災害不息者患不在此也立春以來未見朝廷賞録有功表顯有德存問孤寡賑恤貧弱而但見洛陽都官奔車東西收繫纖介牢獄充盈臣聞恭陵火處比有光曜明此天災非人之咎丁丑大風掩蔽天地風者號令天之威怒皆所以感悟人君忠厚之戒又連月無雨將害宿麥若一穀不登則飢者十三四矣陛下誠宜廣被恩澤貸贍元元昔堯遭九年之水人有十載之蓄者簡稅防災為其方也願陛下早宣德澤以應天功若臣言不用朝政不改者立夏之後乃有澍雨於今之際未可望也若政變於朝而天不雨則臣為誣上愚不知量分當鼎鑊同縣孫禮者積惡凶暴好游俠與其同里人常慕顗名德欲與親善顗不顧以此結怨遂為禮所殺襄楷字公矩平原隰陰人也好學博古善天文陰陽之術桓帝時宦官專朝政刑暴濫又比失皇子災異尤數延熹九年楷自家詣闕上疏曰臣聞皇天不言以文象設教堯舜雖聖必歷象日月星辰察五緯所在故能享百年之壽為萬世之法臣竊見去歲五月熒惑入太微犯帝坐出端門不軌常道其閏月庚辰太白入房犯心小星震動中耀中耀天王也傍小星者天王子也夫太微天廷五帝之坐而金火罰星揚光其中於占天子凶又俱入房心法無繼嗣今年歲星久守太微逆行西至掖門還切執法歲為木精好生惡殺而淹留不去者咎在仁德不修誅罰太酷前七年十二月熒惑與歲星俱入軒轅逆行四十餘日而鄧皇后誅其冬大寒殺鳥獸害魚鱉城傍竹柏之葉有傷枯者臣聞於師曰柏傷竹枯不出三年天子當之今洛陽城中人夜無故叫呼云有火光人聲正喧於占亦與竹柏枯同自春夏以來連有霜雹及大雨靁而臣作威作福刑罰急刻之所感也之譖乃遠加考逮三公上書乞哀等不見採察而嚴被譴讓憂國之臣將遂杜口矣並見族滅其從坐者又非其數李雲上書明主所不當諱杜衆乞死諒以感悟聖朝曾無赦宥而并被殘戮天下之人咸知其冤漢興以來未有拒諫誅賢用刑太深如今者也習又欲避請讞之煩輒託疾病多死牢獄長吏殺生自己死者多非其罪魂神冤結無所歸訴淫厲疾疫自此而起昔文王一妻誕致十子今宮女數千未聞慶育宜修德省刑以廣螽斯之祚聞三郡夫龍形狀不一小大無常故周易況之大人帝王以為符瑞或聞河內龍死諱以為蛇夫龍能變化蛇亦有神皆不當死昔秦之將衰華山神操璧以授鄭客曰今年祖龍死始皇逃之死於沙丘王莽天鳳二年訛言黃山宮有死龍之異後漢誅莽光武復興虛言猶然況於實邪夫星辰麗天猶萬國之附王者也下將畔上故星亦畔天石者安類墜者失藝春秋五石隕宋其後襄公為楚所執秦之亡也石隕東郡今隕扶風與先帝園陵相近不有大喪必有畔逆清者屬陽濁者屬陰河當濁而反清者陰欲為陽諸侯欲為帝也太學天子教化之宮其門無故自壞者言文德將喪教化廢也京房易傳曰河水清天下平今天垂異地吐妖人厲疫三者並時而有河清猶春秋麟不當見而見孔子書之以為異也物有微而志信人有賤而言忠臣雖至賤誠願賜清閒極盡所言十餘日復上書曰臣伏見太白北入數日復出東方其占當有大兵中國弱四夷彊臣又推步熒惑今當出而潛必有陰謀皆由獄多冤結忠臣被戮德星所以久守執法亦為此也陛下宜承天意理察冤獄為劉成虧除罪辟追録李雲杜衆等子孫宮崇所獻神書專以奉天地順五行為本亦有興國廣嗣之術其文易曉參同經典而順帝不行故國胤不興孝沖孝質頻世短祚申休宋萬彭生任鄙之徒生於其時殷紂好色妲己是出葉公好龍真龍游廷今黃門常侍天刑之人陛下愛待兼倍常寵係嗣未兆豈不為此天官宦者星不在紫宮而在天市明當給使主市里也今乃反處常伯之位實非天意陛下嗜欲不去殺罰過理既乖其道豈獲其祚哉或言老子入夷狄為浮屠浮屠不三宿桑下不欲久生恩愛精之至也天神遺以好女浮屠曰此但革囊盛血遂不眄之其守一如此乃能成道今陛下淫女豔婦極天下之麗甘肥飲美單天下之味奈何欲如黃老乎書上即召詔詣尚書問狀楷曰臣聞古者本無宦臣武帝末春秋高數游後宮始置之耳後稍見任至於順帝遂益繁熾今陛下爵之十倍於前至今無繼嗣者豈獨好之而使之然乎尚書上其對詔下有司處正尚書承旨奏曰其宦者之官非近世所置漢初張澤為大謁者佐絳侯誅諸呂孝文使趙談參乘而子孫昌盛楷不正辭理指陳要務而析言破律違背經藝假借星宿僞託神靈造合私意誣上罔事請下司隸正楷罪法收送洛陽獄帝以楷言雖激切然皆天文恆象之數故不誅猶司寇論刑初順帝時琅邪宮崇詣闕上其師干吉於曲陽泉水上所得神書百七十卷皆縹白素朱介青首朱目號太平清領書其言以陰陽五行為家而多巫覡雜語有司奏崇所上妖妄不經乃收臧之後張角頗有其書焉及靈帝即位以楷書為然太傅陳蕃舉方正不就鄉里宗之每太守至輒致禮請中平中與荀爽鄭玄俱以博士徵不至卒于家論曰古人有云善言天者必有驗於人而張衡亦云天文歷數陰陽占候今所宜急也郎顗襄楷能仰瞻俯察參諸人事禍福吉凶既應引之教義亦明此蓋道術所以有補於時後人所當取鑒者也然而其敝好巫故君子不以專心焉贊曰仲桓術深蒲車屢尋蘇竟飛書清我舊陰襄郎災戒實由政淫
