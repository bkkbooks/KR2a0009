body:
  text: 後漢書卷六十三李杜列傳第五十三李固字子堅漢中南鄭人司徒郃之子也郃在數方術傳固貌狀有奇表鼎角匿犀足履龜文少好學常步行尋師不遠千里遂究覽墳籍結交英賢四方有志之士多慕其風而來學京師咸歎曰是復為李公矣司隸益州並命郡舉孝廉辟司空掾皆不就陽嘉二年有地動山崩火灾之異公卿舉固對策詔又特問當世之敝為政所宜固對曰斯皆關之天心效於成事者也夫化以職成官由能理古之進者有德有命今之進者唯財與力伏聞詔書務求寬博疾惡嚴暴而今長吏多殺伐致聲名者必加遷賞其存寬和無黨援者輒見斥逐是以淳厚之風不宣彫薄之俗未革雖繁刑重禁何能有益前孝安皇帝變亂舊典封爵阿母因造妖使樊豐之徒乘權放恣侵奪主威改亂嫡嗣至令聖躬狼狽親遇其艱既拔自困殆龍興即位天下喁喁屬望風政積敝之後易致中興誠當沛然思惟善道而論者猶云方今之事復同於前臣伏從山草痛心傷臆實以漢興以來三百餘年賢聖相繼十有八主豈無阿乳之恩豈忘貴爵之寵然上畏天威俯案經典知義不可故不封也今宋阿母雖有大功勤謹之德但加賞賜足以酬其勞苦至於裂土開國實乖舊典聞阿母體性謙虛必有遜讓陛下宜許其辭國之高使成萬安之福知自損故至顛仆先帝寵遇閻氏位號太疾故其受禍曾不旋時老子曰其進銳其退速也今梁氏戚為椒房禮所不臣尊以高爵尚可然也而子弟羣從榮顯兼加永平建初故事殆不如此宜令步兵校尉冀及諸侍中還居黃門之官使權去外戚政歸國家豈不休乎而中常侍日月之側聲埶振天下子弟祿仕曾無限極雖外託謙默不干州郡而諂偽之徒望風進舉今可為設常禁同之中臣昔館陶公主為子求郎明帝不許賜錢千萬所以輕厚賜重薄位者為官人失才害及百姓也竊聞長水司馬武宣開陽城門候羊迪等無它功德初拜便真此雖小失而漸壞舊章先聖法度所宜堅守政教一跌百年不復詩云上帝板板下民卒癉刺周王變祖法度故使下民將盡病也元氣運平四時尚書出納王命賦政四海權尊埶重責之所歸若不平心灾眚必至誠宜審擇其人以毗聖政今與陛下共理天下者外則公卿尚書內則常侍黃門譬猶一門之內一家之事安則共其福慶危則通其禍敗刺史二千石外統職事內受法則夫表曲者景必邪源清者流必絜猶叩樹本百枝皆動也周頌曰薄言振之莫不震疊此言動之於內而應於外者也猶由此言之本朝號令豈可蹉跌閒𨻶一開則邪人動心利競暫啟則仁義道塞刑罰不能復禁化導以之寑壞此天下之紀綱當今之急務陛下宜開石室陳圖書招會羣儒引問失得指擿變象以求天意其言有中理即時施行顯拔其人以表能者則聖聽日有所聞忠臣盡其所知又宜罷退宦官去其權重裁置常侍二人方直有德者省事左右小黃門五人才智閑雅者給事殿中如此則論者厭塞升平可致也臣所以敢陳愚瞽冒昧自聞者儻或皇天欲令微臣覺悟陛下陛下宜熟察臣言憐赦臣死出為廣漢雒令至白水關解印綬還漢中杜門不交人事歲中梁商請為從事中郎商以后父輔政而柔和自守不能有所整裁灾異數見下權日重固欲令商先正風化退辭高滿乃奏記曰春秋襃儀父以開義路貶無駭以閉利門夫義路閉則利門開利門開則義路閉也前孝安皇帝內任伯榮樊豐之屬外委周廣謝惲之徒開門受賂署用非次天下紛然怨聲滿道朝廷初立頗存清靜未能數年稍復墮損左右黨進者日有遷拜守死善道者滯涸窮路而未有改敝立德之方又即位以來十有餘年聖嗣未立羣下繼望可令中宮博簡嬪媵兼採微賤宜子之人進御至尊順助天意若有皇子母自乳養無委保妾醫巫以致飛燕之禍明將軍望尊位顯當以天下為憂崇尚謙省垂則萬方而新營祠堂費功億計非以昭明令德崇示清儉自數年以來灾怪屢見比無雨潤而沈陰鬱泱宮省之內容有陰謀孔子曰智者見變思刑愚者覩怪諱名天道無親可為祗畏加近者月食既於端門之側月者大臣之體也夫窮高則危大滿則溢月盈則缺日中則移凡此四者自然之數也天地之心福謙忌盛是以賢達功遂身退全名養壽無有怵迫之憂誠令王綱一整道行忠立明公踵伯成之高全不朽之譽豈與此外戚凡輩耽榮好位者同日而論哉固狂夫下愚不達大體竊感古人一飯之報況受顧遇而容不盡乎商不能用永和中荊州盜賊起彌年不定乃以固為荊州刺史固到遣吏勞問境內赦寇盜前釁與之更始於是賊帥夏密等斂其魁黨六百餘人自縛歸首固皆原之遣還使自相招集開示威法半歲閒餘類悉降州內清平上奏南陽太守高賜等臧穢賜等懼罪遂共重賂大將軍梁冀冀為千里移檄而固持之愈急冀遂令徙固為太山太守時太山盜賊屯聚歷年郡兵常千人追討不能制固到悉罷遣歸農但選留任戰者百餘人以恩信招誘之未滿歲賊皆弭散遷將作大匠上疏陳事曰臣聞氣之清者為神人之清者為賢養身者以練神為寶安國者以積賢為道昔秦欲謀楚王孫圉設壇西門陳列名臣秦使戄然遂為寑兵魏文侯師卜子夏友田子方軾段干木故羣俊競至名過齊桓秦人不敢闚兵於西河斯蓋積賢人之符也陛下撥亂龍飛初登大位聘南陽樊英江夏黃瓊廣漢楊厚會稽賀純策書嗟歎待以大夫之位是以巖穴幽人智術之士彈冠振衣樂欲為用四海欣然歸服聖德厚等在職雖無奇卓然夕惕孳孳志在憂國臣前在荊州聞厚純等以病免歸誠以悵然為時惜之一日朝會見諸侍中並皆年少無一宿儒大人可顧問者誠可歎息宜徵還厚等以副羣望瓊久處議郎已且十年衆人皆怪始隆崇今更滯也光祿大夫周舉才謨高正宜在常伯訪以言議侍中杜喬學深行直當世良臣久託疾病可勑令起又薦陳留楊倫河南尹存東平王惲陳國何臨清河房植等是日有詔徵用倫厚等而遷瓊舉以固為大司農先是周舉等八使案察天下多所劾奏其中並是宦者親屬輒為請乞詔遂令勿考又舊任三府選令史光祿試尚書郎時皆特拜不復選試固乃與廷尉吳雄上疏以為八使所糾宜急誅罰選舉署置可歸有司帝感其言乃更下免八使所舉刺史二千石自是稀復特拜切責三公明加考察朝廷稱善乃復與光祿勳劉宣上言自頃選舉牧守多非其人至行無道侵害百姓又宜止槃遊專心庶政帝納其言於是下詔諸州劾奏守令以下政有乖枉遇人無惠者免所居官其姦穢重罪收付詔獄及沖帝即位以固為太尉與梁冀參錄尚書事明年帝崩梁太后以楊徐盜賊盛強恐驚擾致亂使中常侍詔固等欲須所徵諸王侯到乃發喪固對曰帝雖幼少猶天下之父今日崩亡人神感動豈有臣子反共掩匿乎昔秦皇亡於沙丘胡亥趙高隱而不發卒害扶蘇以至亡國近北鄉侯薨閻后兄弟及江京等亦共掩祕遂有孫程手刃之事此天下大忌不可之甚者也太后從之即暮發喪固以清河王蒜年長有德欲立之謂梁冀曰今當立帝宜擇長年高明有德任親政事者願將軍審詳大計察周霍之立文宣戒鄧閻之利幼弱冀不從乃立樂安王子纘年八歲是為質帝時沖帝將北卜山陵固乃議曰今處處寇賊軍興用費加倍新創憲陵賦發非一帝尚幼小可起陵於憲陵塋內依康陵制度其於役費三分減一乃從固議時太后以比遭不造委任宰輔固所匡正每輒從用其黃門宦者一皆斥遣天下咸望遂平而梁冀猜專每相忌疾初順帝時諸所除官多不以次及固在事奏免百餘人此等既怨又希望冀旨遂共作飛章虛誣固罪曰臣聞君不稽古無以承天臣不述舊無以奉君昔堯殂之後舜仰慕三年坐則見堯於牆食則覩堯於羹斯所謂聿追來孝不失臣子之節者太尉李固因公假私依正行邪離閒近戚自隆支黨至於表舉薦達例皆門徒及所辟召靡非先舊或富室財賂或子壻婚屬其列在官牒者凡四十九人又廣選賈豎以補令史募求好馬臨窻呈試出入踰侈輜軿曜日大行在殯路人掩涕固獨胡粉飾貌搔頭弄姿槃旋偃仰從容冶步曾無慘怛傷悴之心山陵未成違矯舊政善則稱己過則歸君斥逐近臣不得侍送作威作福莫固之甚臣聞台輔之位實和陰陽琁機不平寇賊姦軌則責在太尉固受任之後東南跋扈兩州數郡千里蕭條兆人傷損大化陵而詆疵先主苟肆狂狷存無廷爭之忠沒有誹謗之說夫子罪莫大於累父臣惡莫深於毀君固之過釁事合誅辟事奏冀以白太后使下其事太后不聽得免冀忌帝聰慧恐為後患遂令左右進鴆帝苦煩甚使促召固固入前問陛下得患所由帝尚能言曰食餅今腹中悶得水尚可活時冀亦在側曰恐吐不可飲水語未絕而崩固伏尸號哭推舉侍醫冀慮其事泄大惡之因議立嗣固引司徒胡廣司空趙戒先與冀書曰天下不幸仍遭大憂皇太后聖德當朝攝統萬機明將軍體履忠孝憂存社稷而頻年之閒國祚三絕今當立帝天下重器誠知太后垂心將軍勞慮詳擇其人務存聖明然愚情眷眷竊獨有懷遠尋先世廢立舊儀近見國家踐祚前事未嘗不詢訪公卿廣求羣議令上應天心下合衆望且永初以來政事多謬地震宮廟彗星竟天誠是將軍用情之日傳曰以天下與人易為天下得人難昔昌邑之立昏亂日滋霍光憂愧發憤悔之折骨自非博陸忠勇延年奮發大漢之祀幾將傾矣至憂至重可不熟慮悠悠萬事唯此為大國之興衰在此一舉冀得書乃召三公中二千石列侯大議所立固廣戒及大鴻臚杜喬皆以為清河王蒜明德著聞又屬最尊親宜立為嗣先是蠡吾侯志當取冀妹時在京師冀欲立之衆論既異憤憤不得意而未有以相奪中常侍曹騰等聞而夜往說冀曰將軍累世有椒房之親秉攝萬機賓客縱橫多有過差清河王嚴明若果立則將軍受禍不久矣不如立蠡吾侯富貴可長保也冀然其言明日重會公卿冀意氣凶凶而言辭激切自胡廣趙戒以下莫不懾憚之皆曰惟大將軍令而固獨與杜喬堅守本議冀厲聲曰罷會固意既不從猶望衆心可立復以書勸冀冀愈激怒乃說太后先策免固竟立蠡吾侯是為桓帝後歲餘甘陵劉文魏郡劉鮪各謀立蒜為天子梁冀因此誣固與文鮪共為妖言下獄門生勃海王調貫械上書證固之枉河內趙承等數十人亦要鈇鑕詣闕通訴太后明之乃赦焉及出獄京師市里皆稱萬歲冀聞之大驚畏固名德終為己害乃更據奏前事遂誅之時年五十四臨命與胡廣趙戒書曰固受國厚恩是以竭其股肱不顧死亡志欲扶持王室比隆文宣何圖一朝梁氏迷謬公等曲從以吉為凶成事為敗乎漢家衰微從此始矣公等受主厚祿顛而不扶傾覆大事後之良史豈有所私固身已矣於義得矣夫復何言廣戒得書悲慙皆長歎流涕州郡收固二子基茲於郾城皆死獄中小子燮得脫亡命冀乃封廣戒而露固尸於四衢令有敢臨者加其罪固弟子汝南郭亮年始成童遊學洛陽乃左提章鉞右秉鈇鑕詣闕上書乞收固屍不許因往臨哭陳辭於前遂守喪不去夏門亭長呵之曰李杜二公為大臣不能安上納忠而興造無端卿曹何等腐生公犯詔書干試有司乎亮曰亮含陰陽以生戴乾履坤義之所動豈知性命何為以死相懼亭長歎曰居非命之世天高不敢不跼地厚不敢不蹐耳目適宜視聽口不可以妄言也太后聞而不誅南陽人董班亦往哭固而殉尸不肯去太后憐之乃聽得襚斂歸葬二人由此顯名三公並辟班遂隱身莫知所歸固所著章表奏議教令對策記銘凡十一篇弟子趙承等悲歎不已乃共論固言迹以為德行一篇燮字德公初固既策罷知不免禍乃遣三子歸鄉里時燮年十三姊文姬為同郡趙伯英妻賢而有智見二兄歸具知事本默然獨悲曰李氏滅矣自太公已來積德累仁何以遇此密與二兄謀豫藏匿燮託言還京師人咸信之有頃難作下郡收固三子二兄受害文姬乃告父門生王成曰君執義先公有古人之節今委君以六尺之孤李氏存滅其在君矣成感其義乃將燮乘江東下入徐州界內令變名姓為酒家傭而成賣卜於巿各為異人陰相往來燮從受學酒家異之意非恆人以女妻燮燮專精經學十餘年閒梁冀既誅而灾眚屢見明年史官上言宜有赦令又當存錄大臣冤死者子孫於是大赦天下并求固後嗣燮乃以本末告酒家酒家具車重厚遣之皆不受遂還鄉里追服姊弟相見悲感傍人既而戒燮曰先公正直為漢忠臣而遇朝廷傾亂梁冀肆虐令吾宗祀血食將絕今弟幸而得濟豈非天邪宜杜絕衆人勿妄往來慎無一言加於梁氏加梁氏則連主上禍重至矣唯引咎而已燮謹從其誨後王成卒燮以禮葬之感傷舊恩每四節為設上賓之位而祠焉州郡禮命四府並辟皆無所就後徵拜議郎及其在位廉方自守所交皆舍短取長好成人之美時潁川荀爽賈彪雖俱知名而不相能燮並交二子情無適莫世稱其平正靈帝時拜安平相先是安平王續為張角賊所略國家贖王得還朝廷議復其國燮上奏曰續在國無政為妖賊所虜守藩不稱損辱聖朝不宜復國時議者不同而續竟歸藩燮以謗毀宗室輸作左校未滿歲王果坐不道被誅乃拜燮為議郎京師語曰父不肯立帝子不肯立王擢遷河南尹時既以貨賂為官詔書復橫發錢三億以實西園燮上書陳諫辭義深切帝乃止先是潁川甄邵諂附梁冀為鄴令有同歲生得罪於冀亡奔邵邵偽納而陰以告冀冀即捕殺之邵當遷為郡守會母亡邵且埋屍於馬屋先受封然後發喪邵還至洛陽燮行塗遇之使卒投車於溝中笞捶亂下大署帛於其背曰諂貴賣友貪官埋母乃具表其狀邵遂廢錮終身燮在職二年卒時人感其世忠正咸傷惜焉杜喬字叔榮河內林慮人也少為諸生舉孝廉辟司徒楊震府稍遷為南郡太守轉東海相入拜侍中漢安元年以喬守光祿大夫使徇察兗州表奏太山太守李固政為天下第一陳留太守梁讓濟陰太守汜宮濟北相崔瑗等臧罪千萬以上讓即大將軍梁冀季父宮瑗皆冀所善還拜太子太傅遷大司農時梁冀子弟五人及中常侍等以無功並封喬上書諫曰陛下越從藩臣龍飛即位天人屬心萬邦攸賴不急忠賢之禮而先左右之封傷善害德興長佞諛臣聞古之明君襃罰必以功過末世闇主誅賞各緣其私今梁氏一門宦者微孽並帶無功之紱裂勞臣之土其為乖濫胡可勝言夫有功不賞為善失其望姦回不詰為惡肆其凶故陳資斧而人靡畏班爵位而物無勸苟遂斯道豈伊傷政為亂而已喪身亡國可不慎哉書奏不省益州刺史种暠舉劾永昌太守劉君世以金蛇遺梁冀事發覺以蛇輸司農冀從喬借觀之喬不肯與冀始為恨累遷大源臚時冀小女死令公卿會喪喬獨不往冀又銜之遷光祿勳建和元年代胡廣為太尉桓帝將納梁冀妹冀欲令以厚禮迎之喬據執舊典不聽又冀屬喬舉汜宮為尚書喬以宮臧罪明著遂不肯用因此日忤於冀先是李固見廢內外喪氣羣臣側足而立唯喬正色無所橈由是海內歎息朝野瞻望焉在位數月以地震免宦者唐衡左悺等因共譖於帝曰陛下前當即位喬與李固抗議言上不堪奉漢宗祀帝亦怨之及清河王蒜事起梁冀遂諷有司劾喬及李固與劉鮪等交通請逮案罪而梁太后素知喬忠但策免而已冀愈怒使人脅喬曰早從宜妻子可得全喬不肯明日冀遣騎至其門不聞哭者遂白執繫之死獄中妻子歸故郡與李固俱暴尸於城北家屬故人莫敢視者喬故掾陳留楊匡聞之號泣星行到洛陽乃著故赤幘託為夏門亭吏守衛尸喪驅護蠅蟲積十二日都官從事執之以聞梁太后義而不罪匡於是帶鈇鑕詣闕上書并乞李杜二公骸骨太后許之成禮殯殮送喬喪還家葬送行服隱匿不仕匡初好學常在外黃大澤教授門徒補蘄長政有異績遷平原令時國相徐曾中常侍璜之兄也匡恥與接事託疾牧豕云論曰夫稱仁人者其道弘矣立言踐行豈徒徇名安己而已哉將以定去就之㮣正天下之風使生以理全死與義合也夫專為義則傷生專為生則騫義專為物則害智專為己則損仁若義重於生舍生可也生重於義全生可也上以殘闇失君道下以篤固盡臣節臣節盡而死之則為殺身以成仁去之不為求生以害仁也順桓之閒國統三絕太后稱制賊臣虎視李固據位持重以爭大義確乎而不可奪豈不知守節之觸禍恥夫覆折之傷任也觀其發正辭及所遺梁冀書雖機失謀乖猶戀戀而不能已至矣哉社稷之心乎其顧視胡廣趙戒猶糞土也贊曰李杜司職朋心合力致主文宣抗情伊稷道亡時晦終離罔極燮同趙孤世載弦直
