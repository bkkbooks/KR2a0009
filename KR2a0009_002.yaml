body:
  text: 後漢書卷一下光武帝紀第一下六年春正月丙辰改舂陵鄉為章陵縣世世復傜役比豐沛無有所豫辛酉詔曰往歲水旱蝗蟲為灾穀價騰躍人用困乏朕惟百姓無以自贍惻然愍之其命郡國有穀者給稟高年魚眾寡孤獨及篤無家屬貧不能自存者如律二千石勉加循撫無令失職揚武將軍馬成等拔舒獲李憲二月大司馬吳漢拔朐獲董憲龐萌山東悉平諸將還京師置酒賞賜三月公孫述遣將任滿寇南郡夏四月丙子幸長安始謁高廟遂有事十一陵遣虎牙大將軍蓋延等七將軍從隴道伐公孫述五月己未至自長安隗囂反蓋延等因與囂戰於隴阺諸將敗績辛丑詔曰惟天水隴西安定北地吏人為隗囂所詿誤者又三輔遭難赤眉有犯法不道者自殊死以下皆赦除之六月辛卯詔曰夫張官置吏所以為人也今百姓遭難戶口耗少而縣官吏職所置尚繁其令司隸州牧各實所部省減吏員縣國不足置長吏可并合者上大司徒大司空二府於是條奏并省四百餘縣吏職減損十置其一代郡太守劉興擊盧芳將賈覽於高柳戰歿初樂浪人王調據郡不服秋遣樂浪太守王遵擊之郡吏殺調降遣前將軍李通率二將軍與公孫述將戰於西城破之夏蝗秋九月庚子赦樂浪謀反大逆殊死已下丙寅晦日有食之冬十月丁丑詔曰吾德薄不明寇賊為害彊弱相陵元元失所詩云日月告凶不用其行永念厥咎內疚於心其勑公卿舉賢良方正各一人百僚並上封事無有隱諱有司修職務遵法度十一月丁卯詔王莽時吏人沒入為奴婢不應舊法者皆免為庶人十二月壬辰大司空宋弘免癸巳詔曰頃者師旅未解用度不足故行什一之稅今軍士屯田糧儲差積其令郡國收見田租三十稅一如舊制隗囂遣將行巡寇扶風征西大將軍馮異拒破之是歲初罷郡國都尉官始遣列侯就國匈奴遣使來獻使中郎將報命七年春正月丙申詔中都官三輔郡國出繫囚非犯殊死皆一切勿案其罪見徒免為庶民人耐罪亡命吏以文除之又詔曰世以厚葬為德薄終為鄙至于富者奢僭貧者單財法令不能禁禮義不能止倉卒乃知其咎其布告天下令知忠臣孝子慈兄悌弟薄葬送終之義二月辛巳罷護漕都尉官三月丁酉詔曰今國有衆軍並多精勇宜且罷輕車騎士材官樓船士及軍假吏令還復民伍公孫述立隗囂為朔寧王癸亥晦日有食之避正殿寑兵不聽事五日詔曰吾德薄致災謫見日月戰慄恐懼夫何言哉今方念愆庶消厥咎其令有司各修職任奉遵法度惠茲元元百僚各上封事無有所諱其上書者不得言聖夏四月壬午詔曰比陰陽錯謬日月薄食百姓有過在予一人大赦天下公卿司隸州牧舉賢良方正各一人遣詣公車朕將覽試焉五月戊戌前將軍李通為大司空甲寅詔吏人遭饑亂及為青徐賊所略為奴婢下妻欲去留者恣聽之敢拘制不還以賣人法從事是夏連雨水漢忠將軍王常為橫野大將軍八月丁亥封前河閒王邵為河閒王隗囂寇安定征西大將軍馮異征虜將軍祭遵擊卻之冬盧芳所置朔方太守田颯雲中太守喬扈各舉郡降是歲省長水射聲二校尉官八年春正月中郎將來歙襲略陽殺隗囂守將而據其城夏四月司隸校尉傅抗下獄死隗囂攻來歙不能下閏月帝自征囂河西太守大將軍竇融率五郡太守與車駕會高平隴右潰隗囂奔西城遣大司馬吳漢征南大將軍岑彭圍之進幸上邽不降命虎牙大將軍蓋延建威大將軍耿弇攻之潁川盜賊寇沒屬縣河東守守兵亦叛京師騷動秋大水八月帝自上邽晨夜東馳九月乙卯車駕還宮庚申帝自征潁川盜賊皆降安丘侯張步叛歸琅邪琅邪太守陳俊討獲之戊寅至自潁川冬十月丙午幸懷十一月乙丑至自懷公孫述遣兵救隗囂吳漢蓋延等還軍長安天水隴西復反歸囂十二月高句麗王遣使奉貢是歲大水九年春正月隗囂病死其將王元周宗復立囂子純為王徙鴈門吏人於太原三月辛亥初置青巾左校尉官公孫述遣將田戎任滿據荊門夏六月丙戌幸緱氏登轘轅遣大司馬吳漢率四將軍擊盧芳將賈覽於高柳戰不利秋八月遣中郎將來歙監征西大將軍馮異等五將軍討隗純於天水驃騎大將軍杜茂與賈覽戰於繁畤茂軍敗績是歲省關都尉復置護羌校尉官十年春正月大司馬吳漢率捕虜將軍王霸等五將軍擊賈覽於高柳匈奴遣騎救覽諸將與戰卻之修理長安高廟夏征西大將軍馮異破公孫述將趙匡於天水斬之征西大將軍馮異薨秋八月己亥幸長安祠高廟遂有事十一陵戊戌進幸汧隗囂將高峻降冬十月中郎將來歙等大破隗純於落門其將王元奔蜀純與周宗降隴右平先零羌寇金城隴西來歙率諸將擊羌於五谿大破之庚寅車駕還宮是歲省定襄郡徙其民於西河泗水王歙薨淄川王終薨十一年春二月己卯詔曰天地之性人為貴其殺奴婢不得減罪三月己酉幸南陽還幸章陵祠園陵城陽王祉薨庚午車駕還宮閏月征南大將軍岑彭率三將軍與公孫述將田戎任滿戰於荊門大破之獲任滿威虜將軍馮駿圍田戎於江州岑彭遂率舟師伐公孫述平巴郡夏四月丁卯省大司徒司直官先零羌寇臨洮六月中郎將來歙率揚武將軍馬成破公孫述將王元環安於下辯安遣閒人刺殺中郎將來歙帝自將征公孫述秋七月次長安八月岑彭破公孫述將侯丹於黃石輔威將軍臧宮與公孫述將延岑戰於沈水大破之王元降至自長安癸亥詔曰敢灸灼奴婢論如律免所灸灼者為庶民人冬十月壬午詔除奴婢射傷人𠫓廾市律公孫述遣閒人刺殺征南大將軍岑彭馬成平武都因隴西太守馬援擊破先零羌徙致天水隴西扶風十二月大司馬吳漢率舟師伐公孫述是歲省朔方牧并并州初斷州牧自還奏事十二年春正月大司馬吳漢與公孫述將史興戰於武陽斬之三月癸酉詔隴蜀民被略為奴婢自訟者及獄官未報一切免為庶民人夏甘露降南行唐六月黃龍見東阿秋七月威虜將軍馮駿拔江州獲田戎九月吳漢大破公孫述將謝豐于廣都斬之輔威將軍臧宮拔涪城斬公孫恢大司空李通罷冬十一月戊寅吳漢臧宮與公孫述戰於成都大破之述被創夜死辛巳吳漢屠成都夷述宗族及延岑等十二月辛卯揚武將軍馬成行大司空事是歲九真徼外蠻夷張遊率種人內屬封為歸漢里君省金城郡屬隴西參狼羌寇武都隴西太守馬援討降之詔邊吏力不足戰則守追虜料敵不拘以逗留法橫野大將軍王常薨遣驃騎大將軍杜茂將衆郡施刑屯北邊築亭候修烽燧十三年春正月庚申大司徒侯霸薨戊子詔曰往忖勑郡國異味不得有所獻御今猶未止非徒有豫養導擇之勞至乃煩擾道上疲費過所其令太官勿復受明勑下以遠方口實所以薦宗廟自如舊制二月遣捕虜將軍馬武屯虖沱河以備匈奴盧芳自五原亡入匈奴丙辰詔曰長沙王興真定王得河閒王邵中山王茂皆襲爵為王不應經義其以興為臨湘侯得為真定侯邵為樂成侯茂為單父侯其宗室及絕國封侯者凡一百三十七人丁巳降趙王良為趙公太原王章為齊公魯王興為魯公庚午以殷紹嘉公孔安為宋公周承休公姬常武為衞公省并西京十三國廣平屬鉅鹿真定屬常山河閒屬信都城陽屬琅邪泗水屬廣陵淄川屬高密膠東屬北海六安屬廬江廣陽屬上谷三月辛未沛郡太守韓歆為大司徒丙子行大司空馬成罷夏四月大司馬吳漢自蜀還京師於是大饗將士班勞策勳功臣增邑更封凡三百六十五人其外戚恩澤封者四十五人罷左右將軍官建威大將軍耿弇罷益州傳送公孫述瞽師郊廟樂器葆車輿輦於是法物始備時兵革既息天下少事文書調役務從簡寡至乃十存一焉甲寅冀州牧竇融為大司空五月匈奴寇河東秋七月廣漢徼孕桹赤妡迆種人內屬九月日南徼外蠻夷獻白雉白兔冬十二月甲寅詔益州民自八年以來被略為奴婢者皆一切免為庶民人或依託為人下妻欲去者恣聽之敢拘留者比青徐二州以略人法從事復置金城郡十四年春正月起南宮前殿匈奴遣使奉獻使中郎將報命夏四月辛巳封孔子後志為襃成侯越巂人任貴自稱太守遣使奉計秋九月平城人賈丹殺盧芳將尹由來降是歲會稽大疫莎車國鄯善國遣使奉獻十二月癸卯詔益涼二州奴婢自八年以來自訟在所官一切免為庶民人賣者無還直十五年春正月辛丑大司徒韓歆免自殺丁未有星孛於昴汝南太守歐陽歙為大司徒建義大將軍朱祐罷丁未有星孛於營室二月徙鴈門代郡上谷三郡民置常山關居庸關以東初巴蜀既平大司馬吳漢上書請封皇子不許重奏連歲三月乃詔羣臣議大司空融固始侯通膠東侯復高密侯禹太常登等奏議曰古者封建諸侯以藩屏京師周封八百同姓諸姬並為建國夾輔王室尊事天子享國永長為後世法故詩云大啟爾宇為周室輔高祖聖德光有天下亦務親親封立兄弟諸子不違舊章陛下德橫天地興復宗統襃德賞勳親睦九族功臣宗室咸蒙封爵多受廣地或連屬縣今皇子賴天能勝衣趨拜陛下恭謙克讓抑而未議羣臣百姓莫不失望宜因盛夏吉時定號位以廣藩輔明親親尊宗廟重社稷應古合舊厭塞衆心臣請大司空上輿地圖太常擇吉日具禮儀制曰可夏四月戊申以太牢告祠宗廟丁巳使大司空融告廟封皇子輔為右翊公英為楚公陽為東海公康為濟南公蒼為東平公延為淮陽公荊為山陽公衡為臨淮公焉為左翊公京為琅邪公癸丑追謚兄伯升為齊武公兄仲為魯哀公六月庚午復置屯騎長水射聲三校尉官改青巾左校尉為越騎校尉詔下州郡檢覈墾田頃畝及戶口年紀又考實二千石長吏阿枉不平者冬十一月甲戌大司徒歐陽歙下獄死十二月庚午關內侯戴涉為大司徒盧芳自匈奴入居高柳是歲驃騎大將軍杜茂免虎牙大將軍蓋延薨十六年春二月交阯女子徵側反略有城邑三月辛丑晦日有蝕之秋九月河南尹張伋及諸郡守十餘人坐度田不實皆下獄死郡國大姓及兵長羣盜處處並起攻劫在所害殺長吏郡縣追討到則解散去復屯結青徐幽冀四州尤甚冬十月遣使者下郡國聽羣盜自相糾擿五人共斬一人者除其罪吏雖逗留回避故縱者皆勿問聽以禽討為效其牧守令長坐界內盜賊而不收捕者又以畏磱捐城委守者皆不以為負但取獲賊多少為殿最唯蔽匿者乃罪之於是更相追捕賊並解散徙其魁帥於它郡賦田受稟使安生業自是牛馬放牧邑門不閉盧芳遣使乞降十二月甲辰封芳為代王初王莽亂後貨幣雜用布帛金粟是歲始行五銖錢十七年春正月趙公良薨二月乙亥未晦日有食之夏四月乙卯南巡狩皇太子及右翊公輔楚公英東海公陽濟南公康東平公蒼從幸潁川進幸葉章陵五月乙卯車駕還宮六月癸巳臨淮公衡薨秋七月妖巫李廣等羣起據皖城遣虎賁中郎將馬援驃騎將軍段志討之九月破皖城斬李廣等冬十月辛巳廢皇后郭氏為中山太后立貴人陰氏為皇后進右翊公輔為中山王食常山郡其餘九國公皆即舊封進爵為王甲申幸章陵脩園廟祠舊宅觀田廬置酒作樂賞賜時宗室諸母因酣悅相與語曰文叔少時謹信與人不款曲唯直柔耳今乃能如此帝聞之大笑曰吾理天下亦欲以柔道行之乃悉為舂陵宗室起祠堂有五鳳皇見於潁川之郟縣十二月至自章陵是歲莎車國遣使貢獻十八年春二月蜀郡守將史歆叛遣大司馬吳漢率二將軍討之圍成都甲寅西巡狩幸長安三月壬午祠高廟遂有事十一陵歷馮翊界進幸蒲坂祠后土夏四月甲戌癸酉車駕還宮癸酉甲戌詔曰今邊郡盜穀五十斛罪至於死開殘吏妄殺之路其蠲除此法同之內郡遣伏波將軍馬援率樓船將軍段志等擊交阯賊徵側等戊甲申幸河內戊子至自河內五月旱盧芳復亡入匈奴秋七月吳漢拔成都斬史歆等壬戌赦益州所部殊死已下冬十月庚辰幸宜城還祠章陵十二月乙丑車駕還宮是歲罷州牧置刺史十九年春正月庚子追尊孝宣皇帝曰中宗始祠昭帝元帝於太廟成帝哀帝平帝於長安舂陵節侯以下四世於章陵妖巫單臣傅鎮等反據原武遣太中大夫臧宮圍之夏四月拔原武斬臣鎮等伏波將軍馬援破交阯斬徵側等因擊破九真賊都陽等降之閏月戊申進趙齊魯三國公爵為王六月戊申詔曰春秋之義立子以貴東海王陽皇后之子宜承大統皇太子彊崇執謙退願備藩國父子之情重久違之其以彊為東海王立陽為皇太子改名莊秋九月南巡狩壬申幸南陽進幸汝南南頓縣舍置酒會賜吏人復南頓田租歲父老前叩頭言皇考居此日久陛下識知寺舍每來輒加厚恩願賜復十年帝曰天下重器常恐不任日復一日安敢遠期十歲乎吏人又言陛下實惜之何言謙也帝大笑復增一歲進幸淮陽梁沛西南夷寇益州郡遣武威將軍劉尚討之越巂太守任貴謀叛十二月劉尚襲貴誅之是歲復置函谷關都尉修西京宮室二十年春二月戊子車駕還宮夏四月庚辰大司徒戴涉下獄死大司空竇融免五月辛亥大司馬吳漢薨匈奴寇上黨天水遂至扶風六月庚寅廣漢太守蔡茂為大司徒太僕朱浮為大司空壬辰左中郎將劉隆為驃騎將軍行大司馬事乙未徙中山王輔為沛王秋東夷韓國人率衆詣樂浪內附冬十月東巡狩甲午幸魯進幸東海楚沛國十二月匈奴寇天水壬寅車駕還宮是歲省五原郡徙其吏人置河東復濟陽縣傜役六歲二十一年春正月武威將軍劉尚破益州夷平之夏四月安定屬國胡叛屯聚青山遣將兵長史陳訢討平之秋鮮卑寇遼東遼東太守祭肜大破之冬十月遣伏波將軍馬援出塞擊烏桓不克匈奴寇上谷中山其冬鄯善王車師王等十六國皆遣子入侍奉獻願請都護帝以中國初定未遑外事乃還其侍子厚加賞賜二十二年春閏月丙戌幸長安祠高廟遂有事十一陵二月己巳至自長安夏五月乙未晦日有食之秋七月司隸校尉蘇鄴下獄死九月戊辰地震裂制詔曰日者地震南陽尤甚夫地者任物至重靜而不動者也而今震裂咎在君上鬼神不順無德灾殃將及吏人朕甚懼焉其令南陽勿輸今年田租芻遣謁者案行其死罪繫囚在戊辰以前減死罪一等徒皆薥解鉗衣絲絮賜郡中居人壓死者棺錢人三千其口賦逋稅而廬宅尤破壞者勿收責吏人死亡或在壞垣毀屋之下而家羸弱不能收拾者其以見錢穀取傭為尋求之冬十月壬子大司空朱浮免癸丑光祿勳杜林為大司空是歲齊王章薨青州蝗匈奴薁鞬日逐王比遣使詣漁陽請和親使中郎將李茂報命烏桓擊破匈奴匈奴北徙幕南地空詔罷諸邊郡亭候吏卒二十三年春正月南郡蠻叛遣武威將軍劉尚討破之徙其種人於江夏夏五月丁卯大司徒蔡茂薨秋八月丙戌大司空杜林薨九月辛未陳留太守玉況為大司徒冬十月丙申太僕張純為大司空高句麗率種人詣樂浪內屬十二月武陵蠻叛寇掠郡縣遣劉尚討之戰於沅水尚軍敗歿是歲匈奴薁鞬日逐王比率部曲遣使詣西河內附二十四年春正月乙亥大赦天下匈奴薁鞬日逐王比遣使款五原塞求扞禦北虜秋七月武陵蠻寇臨沅遣謁者李嵩中山太守馬成討蠻不克於是伏波將軍馬援率四將軍討之詔有司申明舊制阿附蕃王法冬十月匈奴薁鞬日逐王比自立為南單于於是分為南北匈奴二十五春正月遼東徼外貊人寇右北平漁陽上谷太原遼東太守祭肜招降之烏桓大人來朝南單于遣使詣闕貢獻奉蕃稱臣又遣其左賢王擊破北匈奴卻地千餘里三月南單于遣子入侍戊申晦日有食之伏波將軍馬援等破武陵蠻於臨沅冬十月叛蠻悉降夫餘王遣使奉獻是歲烏桓大人率衆內屬詣闕朝貢二十六年春正月詔有司增百官奉其千石已上減於西京舊制六百石已下增於舊秩初作壽陵將作大匠竇融上言園陵廣袤無慮所用帝曰古者帝王之葬皆陶人瓦器木車茅馬使後世之人不知其處太宗識終始之義景帝能述遵孝道遭天下反覆而霸陵獨完受其福豈不美哉今所制地不過二三頃無為山陵陂池裁令流水而已遣中郎將段郴授南單于璽綬令入居雲中始置使匈奴中郎將將兵衞護之南單于遣子入侍奉奏詣闕於是雲中五原朔方北地定襄鴈門上谷代八郡民歸於本土遣謁者分將施刑補理城郭發遣邊民在中國者布還諸縣皆賜以裝錢轉輸給食二十七年夏四月戊午大司徒玉況薨五月丁丑詔曰昔契作司徒禹作司空皆無大名其令二府去大又改大司馬為太尉驃騎大將軍行大司馬劉隆即日罷太僕趙憙為太尉大司農馮勤為司徒益州郡徼外蠻夷率種人內屬北匈奴遣使詣武威乞和親冬魯王興齊王石始就國二十八年春正月己巳徙魯王興為北海王以魯國益東海賜東海王彊虎賁旄頭鍾虡之樂夏六月丁卯沛太后郭氏薨因詔郡縣捕王侯賓客坐死者數千人秋八月戊寅東海王彊沛王輔楚王英濟南王康淮陽王延始就國冬十月癸酉詔死罪繫囚皆一切募下蠶室其女子宮北匈奴遣使貢獻乞和親二十九年春二月丁巳朔日有食之遣使者舉冤獄出繫囚庚申賜天下男子爵人二級魚眾寡孤獨篤貧不能自存者粟人五斛夏四月乙丑詔令天下繫囚自殊死已下及徒各減本罪一等其餘贖罪輸作各有差三十年春正月鮮卑大人內屬朝賀二月東巡狩甲子幸魯進幸濟南閏月癸丑車駕還宮有星孛于紫宮夏四月戊子徙左翊王焉為中山王五月大水賜天下男子爵人二級魚眾寡孤獨篤貧不能自存者粟人五斛秋七月丁酉幸魯國復濟陽縣是年傜役冬十一月丁酉至自魯三十一年夏五月大水戊辰賜天下男子爵人二級魚眾寡孤獨篤貧不能自存者粟人六斛癸酉晦日有食之是夏蝗秋九月甲辰詔令死罪繫囚皆一切募下蠶室其女子宮是歲陳留雨穀形如稗實北匈奴遣使奉獻中元元年春正月東海王彊沛王輔楚王英濟南王康淮陽王延趙王盱皆來朝丁卯東巡狩二月己卯幸魯進幸太山北海王興齊王石朝于東嶽辛卯柴望岱宗登封太山甲午禪于梁父三月戊辰司空張純薨夏四月癸酉車駕還宮己卯大赦天下復嬴博梁父奉高勿出今年田租芻改年為中元行幸長安戊子祀長陵五月乙丑至自長安六月辛卯太僕馮魴為司空乙未司徒馮勤薨是夏京師醴泉涌出飲之者固疾皆愈惟眇蹇者不瘳又有赤草生於水崖郡國頻上甘露羣臣奏言地祇靈應而朱草萌生孝宣帝每有嘉瑞輒以改元神爵五鳳甘露黃龍列為年紀蓋以感致神祇表彰德信是以化致升平稱為中興今天下清寧靈物仍降陛下情存損挹推而不居豈可使祥符顯慶沒而無聞宜令太史撰集以傳來世帝不納常自謙無德每郡國所上輒抑而不當故史官罕得記焉秋郡國三蝗冬十月辛未司隸校尉東萊李訢為司徒甲申使司空告祠高廟曰高皇帝與羣臣約非劉氏不王呂太后賊害三趙專王呂氏賴社稷之靈祿產伏誅天命幾墜危朝更安呂太后不宜配食高廟同祧至尊薄太后母德慈仁孝文皇帝賢明臨國子孫賴福延祚至今其上薄太后尊號曰高皇后配食地祇遷呂太后廟主于園四時上祭十一月甲子晦日有食之是歲初起明堂靈臺辟雍及北郊兆域宣布圖讖於天下復濟陽南頓是肋役參狼羌寇武都敗郡兵隴西太守劉盱遣軍救之及武都郡兵討叛羌皆破之二年春正月辛未初立北郊祀后土東夷倭奴國王遣使奉獻二月戊戌帝崩於南宮前殿年六十二遺詔曰朕無益百姓皆如孝文皇帝制度務從約省刺史二千石長吏皆無離城郭無遣吏及因郵奏初帝在兵閒久厭武事且知天下疲秏思樂息肩自隴蜀平後非儆急未嘗復言軍旅皇太子嘗問攻戰之事帝曰昔衞靈公問陳孔子不對此非爾所及每旦視朝日仄乃罷數引公卿郎將講論經理夜分乃寐皇太子見帝勤勞不怠承閒諫曰陛下有禹湯之明而失黃老養性之福願頤愛精神優游自寧帝曰我自樂此不為疲也雖身濟大業兢兢如不及故能明慎政體總㖿權綱量時度力舉無過事退功臣而進文吏戢弓矢而散馬牛雖道未方古斯亦止戈之武焉論曰皇考南頓君初為濟陽令以建平元年十二月甲子夜生光武於縣舍有赤光照室中欽異焉使卜者王長占之長辟左右曰此兆吉不可言是歲縣界有嘉禾生一莖九穗因名光武曰秀明年方士有夏賀良者上言哀帝云漢家歷運中衰當再受命於是改號為太初元年稱陳聖劉太平皇帝以厭勝之及王莽篡位忌惡劉氏以錢文有金刀故改為貨泉或以貨泉字文為白水真人後望氣者蘇伯阿為王莽使至南陽遙望見舂陵郭唶曰氣佳哉鬱鬱葱葱然及始起兵還舂陵遠望舍南火光赫然屬天有頃不見初道士西門君惠李守等亦云劉秀當為天子其王者受命信有符乎不然何以能乘時龍而御天哉贊曰炎正中微大盜移國九縣飆回三精霧塞人厭淫詐神思反德光武誕命靈貺自甄沈幾先物深略緯文尋邑百萬貔虎為羣長轂雷野高鋒彗雲英威既振新都自焚虔劉庸代紛紜梁趙三河未澄四關重擾神旌乃顧遞行天討金湯失險車書共道靈慶既啟人謀咸贊明明廟謨赳赳雄斷於赫有命系隆我漢
