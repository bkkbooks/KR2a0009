body:
  text: 後漢書志第十九郡國一河南河內河東弘農京兆馮翊扶風右司隸漢書地理志記天下郡縣本末及山川奇異風俗所由至矣今但錄中興以來郡縣改異及春秋三史會同征伐地名以為郡國志凡前志有縣名今所不載者皆世祖所并省也前無今有者後所置也凡縣名先書者郡所治也十萬八千四百八十六口百一萬八百二十七雒陽周時號成周有狄泉在城中有唐聚有上程聚有士鄉聚有褚氏聚有榮錡㵎有前亭有圉鄉有大解城河南周公時所城雒邑也春秋時謂之王城東城門名鼎門北城門名乾祭又有甘城有蒯鄉梁故國伯翳後有霍陽山有注城熒陽有鴻溝水有廣武城有亭叔國有隴城有薄亭有敖亭有費熒澤卷有長城經陽武到密有垣雝城或曰古衡雍有扈城亭原武陽武中牟有圃田澤有清口水有管城有曲遇聚有蔡亭開封菀陵有棐林有制澤有瑣侯亭平陰穀城瀍水出有函谷關緱氏有鄔聚有轘轅關鞏有尋谷水有東訾聚今名訾城有坎埳聚有黃亭有湟水有明谿泉成睪有旃然水有瓶丘聚有漫水有汜水京密有大騩山有梅山有陘山新城有高都城有廣成聚有鄤聚古鄤氏今名蠻中匽師有尸鄉春秋時曰尸氏新鄭詩鄭國祝融墟平懷有隰城河陽有湛城軹有原鄉有湨梁波有絺城沁水野王有太行山有射犬聚有邘城溫蘇子所都濟水出王莽時大旱遂枯絕州平睾有邢丘故邢國周公子所封有李城山陽邑有雍城有蔡城武德獲嘉侯國脩武故南陽秦始皇更名有南陽城陽樊攢茅田有小脩武聚有隤城共本國淇水出有汎亭汲朝歌紂所都居南有牧野北有邶國南有寧鄉蕩陰有羑里城林慮故隆慮殤帝改有鐵安邑有鐵有鹽池楊有高梁亭平陽侯國有鐵堯都此臨汾有董亭汾陰有介山蒲坂有雷首山有沙丘亭大陽有吳山上有虞城有下陽城有茅津有顛軨坂解有桑泉城有臼城有解城有瑕城皮氏有耿鄉有鐵有冀亭聞喜邑本曲沃有董池陂古董澤有稷山亭有涑水有洮水絳邑有翼城永安故彘陽嘉二年更名有霍大山河北詩魏國有韓亭猗氏垣有王屋山兗水出有壺丘亭有邵亭襄陵北屈有壺口山有采桑津蒲子濩澤侯國有祁析城山端氏弘農故秦函谷關燭水出有枯樅山有桃丘聚故桃林有務鄉有曹陽亭陝本仲國有焦城有陝陌黽池穀水出有二崤新安㵎水出宜陽陸渾西有略地盧氏有熊耳山伊水清水出湖故屬京兆有閺鄉華陰故屬京兆有太華山九十九口二十八萬五千五百七十四長安高帝所都鎬在上林菀中有細柳聚有蘭池有曲郵有杜郵霸陵有枳道亭有長門亭杜陵酆在西南鄭新豐有驪山東有鴻門亭及戲亭有嚴掫城藍田出美玉長陵故屬馮翊商故屬弘農上雒侯國有冢領山雒水出故屬弘農有菟和山有蒼野聚陽陵故屬馮翊五千一百九十五高陵池陽雲陽祋祤永元九年復頻陽萬年蓮勺重泉臨晉本大荔有河水祠有芮鄉有王城郃陽永平二年復夏陽有梁山龍門山衙粟邑永元九年復槐里周曰犬丘高帝改安陵平陵茂陵鄠豐水出有甘亭郿有邰亭武功永平八年復有太一山本終南垂山本敦物有斜谷陳倉汧有吳嶽山本名汧汧水出有回城名回中渝麋侯國雍有鐵栒邑有豳鄉美陽有岐山有周城漆有漆水有鐵杜陽永和二年復
