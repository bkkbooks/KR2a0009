body:
  text: 後漢書卷三十五張曹鄭列傳第二十五張純字伯仁京兆杜陵人也高祖父安世宣帝時為大司馬衛將軍封富平侯父放為成帝侍中純少襲爵土哀平間為侍中王莽時至列卿遭值篡偽多亡爵土純以敦謹守約保全前封建武初先來詣闕故得復國五年拜太中大夫使將潁川突騎安集荊徐楊部督委輸監諸將營後又將兵屯田南陽遷五官中郎將有司奏列侯非宗室不宜復國光武曰張純宿衛十有餘年其勿廢更封武始侯食富平之半純在朝歷世明習故事建武初舊章多闕每有疑議輒以訪純自郊廟婚冠喪紀禮儀多所正定帝甚重之以純兼虎賁中郎將數被引見一日或至數四純以宗廟未定昭穆失序十九年乃與太僕朱浮共奏言陛下興於匹庶蕩滌天下誅鉏暴亂興繼祖宗竊以經義所紀人事衆心雖實同創革而名為中興宜奉先帝恭承祭祀者也元帝以來宗廟奉祠高皇帝為受命祖孝文皇帝為太宗孝武皇帝為世宗皆如舊制又立親廟四世推南頓君以上盡於舂陵節侯禮為人後者則為之子既事大宗則降其私親今禘祫高廟陳序昭穆而舂陵四世君臣並列以卑廁尊不合禮意設不遭王莽而國嗣無寄推求宗室以陛下繼統者安得復顧私親違禮制乎昔高帝以自受命不由太上宣帝以孫後祖不敢私親故為父立廟獨羣臣侍祠臣愚謂宜除今親廟以則二帝舊典願下有司博採其議詔下公卿大司徒戴涉大司空竇融議宜以宣元成哀平五帝四世代今親廟宣元皇帝尊為祖父可親奉祠成帝以下有司行事別為南頓君立皇考廟其祭上至舂陵節侯羣臣奉祠以明尊尊之敬親親之恩帝從之是時宗廟未備自元帝以上祭於洛陽高廟成帝以下祠於長安高廟其南頓四世隨所在而祭焉明年純代朱浮為太僕二十三年代杜林為大司空在位慕曹參之迹務於無為選辟掾史皆知名大儒明年上穿陽渠引洛水為漕百姓得其利二十六年詔純曰禘祫之祭不行已久矣三年不為禮禮必壞三年不為樂樂必崩宜據經典詳為其制純奏曰禮三年一祫五年一禘春秋傳曰大祫者何合祭也毀廟及未毀廟之主皆登合食乎太祖五年而再殷漢舊制三年一祫毀廟主合食高廟存廟主未嘗合祭元始五年諸王公列侯廟會始為禘祭又前十八年親幸長安亦行此禮禮説三年一閏天氣小備五年再閏天氣大備故三年一祫五年一禘禘之為言諦諦定昭穆尊卑之義也禘祭以夏四月夏者陽氣在上陰氣在下故正尊卑之義也祫祭以冬十月冬者五穀成孰物備禮成故合聚飲食也斯典之廢於茲八年謂可如禮施行以時定議帝從之自是禘祫遂定時南單于及烏桓來降邊境無事百姓新去兵革歲仍有年家給人足純以聖王之建辟雍所以崇尊禮義既富而教者也乃案七經讖明堂圖河間古辟雍記孝武太山明堂制度及平帝時議欲具奏之未及上會博士桓榮上言宜立辟雍明堂章下三公太常而純議同榮帝乃許之三十年純奏上宜封禪曰自古受命而帝治世之隆必有封禪以告成功焉樂動聲儀曰以雅治人風成於頌有周之盛成康之間郊配封禪皆可見也書曰歲二月東巡狩至于岱宗祡則封禪之義也臣伏見陛下受中興之命平海內之亂修復祖宗撫存萬姓天下曠然咸蒙更生恩德雲行惠澤雨施黎元安寧夷狄慕義詩云受天之祜四方來賀今攝提之歲倉龍甲寅德在東宮宜及嘉時遵唐帝之典繼孝武之業以二月東巡狩封于岱宗明中興勒功勳復祖統報天神禪梁父祀地祇傳祚子孫萬世之基也中元元年帝乃東巡岱宗以純視御史大夫從并上元封舊儀及刻石文三月薨諡曰節侯子奮嗣奮字稚通父純臨終勑家丞曰司空無功於時猥蒙爵土身死之物勿議傳國奮兄根少被病光武詔奮嗣爵奮稱純遺勑固不肯受帝以奮違紹勑收下獄奮惶怖乃襲封永平四年隨例歸國奮少好學節儉行義常分損租奉贍恤宗親雖至傾匱而施與不怠十七年儋耳降附奮來朝上壽引見宣平殿應對合旨顯宗異其才以為侍祠侯建初元年拜左中郎將轉五官中郎將遷長水校尉七年為將作大匠章和元年免永元元年復拜城門校尉四年遷長樂衛尉明年代桓郁為太常六年代劉方為司空時歲災旱祈雨不應乃上表曰比年不登人用飢匱今復久旱秋稼未立陽氣垂盡歲月迫促夫國以民為本民以穀為命政之急務憂之重者也臣蒙恩尤深受職過任夙夜憂懼章奏不能敘心願對中常侍疏奏即時引見復口陳時政之宜明日和帝召太尉司徒幸洛陽獄録囚徒收洛陽令陳歆即大雨三日奮在位清白無它異績九年以病罷在家上疏曰聖人所美政道至要本在禮樂五經同歸而禮樂之用尤急孔子曰安上治民莫善於禮移風易俗莫善於樂又曰揖讓而化天下者禮樂之謂也先王之道禮樂可謂盛矣孔子謂子夏曰禮以修外樂以制內丘已矣夫又曰禮樂不興則刑罰不中刑罰不中則民無所厝其手足臣以為漢當制作禮樂是以先帝聖德數下詔書愍傷崩缺而衆儒不達議多駮異臣纍世台輔而大典未定私竊惟憂不忘寢食臣犬馬齒盡誠冀先死見禮樂之定十三年更召拜太常復上疏曰漢當改作禮樂圖書著明王者化定制禮功成作樂謹條禮樂異議三事願下有司以時考定昔者孝武皇帝光武皇帝封禪告成而禮樂不定事不相副先帝已詔曹褒今陛下但奉而成之猶周公斟酌文武之道非自為制誠無所疑久執謙謙令大漢之業不以時成非所以章顯祖宗功德建太平之基為後世法帝雖善之猶未施行其冬復以病罷明年卒於家子甫嗣官至津城門候甫卒子吉嗣永初三年吉卒無子國除自昭帝封安世至吉傳國八世經歷篡亂二百年間未嘗譴黜封者莫與為比曹褒字叔通魯國薛人也父充持慶氏禮建武中為博士從巡狩岱宗定封禪禮還受詔議立七郊三雍大射養老禮儀顯宗即位充上言漢再受命仍有封禪之事而禮樂崩闕不可為後嗣法五帝不相沿樂三王不相襲禮大漢當自制禮以示百世帝問制禮樂云何充對曰河圖括地象曰有漢世禮樂文雅出尚書琁機鈐曰有帝漢出德洽作樂名豫帝善之下詔曰今且改太樂官曰太豫樂歌詩曲操以俟君子拜充侍中作章句辨難於是遂有慶氏學褒少篤志有大度結髮傳充業博雅疏通尤好禮事常感朝廷制度未備慕叔孫通為漢禮儀晝夜研精沈吟專思寢則懷抱筆札行則誦習文書當其念至忘所之適初舉孝廉再遷圉令以禮理人以德化俗時它郡盜徒五人來入圉界吏捕得之陳留太守馬嚴聞而疾惡風縣殺之褒勑吏曰夫絶人命者天亦絶之臯陶不為盜制死刑管仲遇盜而升諸公今承旨而殺之是逆天心順府意也其罰重矣如得全此人命而身坐之吾所願也遂不為殺嚴奏褒耎弱免官歸郡為功曹徵拜博士會肅宗欲制定禮樂元和二年下詔曰河圖稱赤九會昌十世以光十一以興尚書琁機鈐曰述堯理世平制禮樂放唐之文豫末小子託于數終曷以纘興崇弘祖宗仁濟元元帝命驗曰順堯考德題期立象且三五步驟優劣殊軌況豫頑陋無以克堪雖欲從之末由也已每見圖書中心恧焉褒知帝旨欲有興作乃上疏曰昔者聖人受命而王莫不制禮作樂以著功德功成作樂化定制禮所以救世俗致禎祥為萬姓獲福於皇天者也今皇天降祉嘉瑞並臻制作之符甚於言語宜定文制著成漢禮丕顯祖宗盛德之美章下太常太常巢堪以為一世大典非褒所定不可許帝知羣僚拘攣難與圖始朝廷禮憲宜時刊立明年復下詔曰朕以不德膺祖宗弘烈乃者鸞鳳仍集麟龍並臻甘露宵降嘉穀滋生赤草之類紀于史官朕夙夜祗畏上無以彰于先功下無以克稱靈物漢遭秦餘禮壞樂崩且因循故事未可觀省有知其説者各盡所能褒省詔乃歎息謂諸生曰昔奚斯頌魯考甫詠殷夫人臣依義顯君竭忠彰主行之美也當仁不讓吾何辭哉遂復上疏具陳禮樂之本制改之意拜褒侍中從駕南巡既還以事下三公未及奏詔召玄武司馬班固問改定禮制之宜固曰京師諸儒多能説禮宜廣招集共議得失帝曰諺言作舍道邊三年不成會禮之家名為聚訟互生疑異筆不得下昔堯作大章一夔足矣章和元年正月乃召褒詣嘉德門令小黃門持班固所上叔孫通漢儀十二篇勑褒曰此制散略多不合經今宜依禮條正使可施行於南宮東觀盡心集作褒既受命乃次序禮事依準舊典雜以五經讖記之文撰次天子至於庶人冠婚吉凶終始制度以為百五十篇寫以二尺四寸簡其年十二月奏上帝以衆論難一故但納之不復令有司平奏會帝崩和帝即位褒乃為作章句帝遂以新禮二篇冠擢褒監羽林左騎永元四年遷射聲校尉後太尉張酺尚書張敏等奏褒制漢禮破亂聖術宜加刑誅帝雖寢其奏而漢禮遂不行褒在射聲營舍有停棺不葬者百餘所褒親自履行問其意故吏對曰此等多是建武以來絶無後者不得埋掩褒乃愴然為買空地悉葬其無主者設祭以祀之遷城門校尉將作大匠時有疾疫褒巡行病徒為致醫藥經理饘粥多蒙濟活七年出為河內太守時春夏大旱糧穀踊貴褒到乃省吏并職退去姦殘澍雨數降其秋大孰百姓給足流皆還後坐上災害不實免有頃徵再遷復為侍中褒博物識古為儒者宗十四年卒官作通義十二篇演經雜論百二十篇又傳禮記四十九篇教授諸生千餘人慶氏學遂行於世論曰漢初天下創定朝制無文叔孫通頗採經禮參酌秦法雖適物觀時有救崩敝然先王之容典蓋多闕矣是以賈誼仲舒王吉劉向之徒懷憤歎息所不能已也資文宣之遠圖明懿美而終莫或用故知自燕而觀有不盡矣孝章永言前王明發興作專命禮臣撰定國憲洋洋乎盛德之事焉而業絶天算議黜異端斯道竟復墜矣夫三王不相襲禮五帝不相樂所以咸莖異調中都殊絶況物運遷回情數萬化制則不能隨其流變品度未足定其滋章斯固世主所當損益者也且樂非夔襄而新音代起律謝臯蘇而制令亟易修補舊文獨何猜焉禮云禮云曷其然哉鄭玄字康成北海高密人也八世祖崇哀帝時尚書僕射玄少為鄉嗇夫得休歸常詣學官不樂為吏父數怒之不能禁遂造太學受業師事京兆第五元先始通京氏易公羊春秋三統歷九章算術又從東郡張恭祖受周官禮記左氏春秋韓詩古文尚書以山東無足問者乃西入關因涿郡盧植事扶風馬融融門徒四百餘人升堂進者五十餘生融素驕貴玄在門下三年不得見乃使高業弟子傳授於玄玄日夜尋誦未嘗怠倦會融集諸生考論圖緯聞玄善算乃召見於樓上玄因從質諸疑義問畢辭歸融喟然謂門人曰鄭生今去吾道東矣玄自遊學十餘年乃歸鄉里家貧客耕東萊學徒相隨已數百千人及黨事起乃與同郡孫嵩等四十餘人俱被禁錮遂隱修經業杜門不出時任城何休好公羊學遂著公羊墨守左氏膏肓穀梁廢疾玄乃發墨守針膏肓起廢疾休見而歎曰康成入吾室操吾矛以伐我乎初中興之後范升陳元李育賈逵之徒爭論古今學後馬融答北地太守劉瓌及玄答何休義據通深由是古學遂明靈帝末黨禁解大將軍何進聞而辟之州郡以進權戚不敢違意遂迫脅玄不得已而詣之進為設几杖禮待甚優玄不受朝服而以幅巾見一宿逃去時年六十弟子河內趙商等自遠方至者數千後將軍袁隗表為侍中以父喪不行國相孔融深敬於玄屣履造門告高密縣為玄特立一鄉曰昔齊置士鄉越有君子軍皆異賢之意也鄭君好學實懷明德昔太史公廷尉吳公謁者僕射鄧公皆漢之名臣又南山四皓有園公夏黃公潛光隱耀世嘉其高皆悉稱公然則公者仁德之正號不必三事大夫也今鄭君鄉宜曰鄭公鄉昔東海于公僅有一節猶或戒鄉人侈其門閭矧乃鄭公之德而無駟牡之路可廣開門衢令容高車號為通德門董卓遷都長安公卿舉玄為趙相道斷不至會黃巾寇青部乃避地徐州徐州牧陶謙接以師友之禮建安元年自徐州還高密道遇黃巾賊數萬人見玄皆拜相約不敢入縣境玄後嘗疾篤自慮以書戒子益恩曰吾家舊貧不為父母羣弟所容去廝役之吏遊學周秦之都往來幽并兗豫之域獲覲乎在位通人處逸大儒得意者咸從捧手有所受焉遂博稽六藝粗覽傳記時覩祕書緯術之奧年過四十乃歸供養假田播殖以娛朝夕遇閹尹藝坐黨禁錮十有四年而蒙赦令舉賢良方正有道辟大將軍三司府公車再召比牒併名早為宰相惟彼數公懿德大雅克堪王臣故宜式序吾自忖度無任於此但念述先聖之元意思整百家之不齊亦庶幾以竭吾才故聞命罔從而黃巾為害萍浮南北復歸邦鄉入此歲來已七十矣宿素衰落仍有失誤案之禮典便合傳家今我告爾以老歸爾以事將間居以安性覃思以終業自非拜國君之命問族親之憂展敬墳墓觀省野物胡嘗扶杖出門乎家事大小汝一承之咨爾焭焭一夫曾無同生相依其勗求君子之道研鑽勿替敬慎威儀以近有德顯譽成於僚友德行立於己志若致聲稱亦有榮於所生可不深念邪可不深念邪吾雖無紱冕之緒頗有讓爵之高自樂以論贊之功庶不遺後人之羞末所憤憤者徒以亡親墳壟未成所好羣書率皆腐敝不得於禮堂寫定傳與其人日西方暮其可圖乎家今差多於昔勤力務時無恤飢寒菲飲食薄衣服節夫二者尚令吾寡恨若忽忘不識亦已焉哉時大將軍袁紹總兵冀州遣使要玄大會賓客玄最後至乃延升上坐身長八尺飲酒一斛秀眉明目容儀溫偉紹客多豪俊並有才説見玄儒者未以通人許之競設異端百家互起玄依方辨對咸出問表皆得所未聞莫不嗟服時汝南應劭亦歸於紹因自贊曰故太山太守應中遠北面稱弟子何如玄笑曰仲尼之門考以四科回賜之徒不稱官閥劭有慙色紹乃舉玄茂才表為左中郎將皆不就公車徵為大司農給安車一乘所過長吏送迎玄乃以病自乞還家五年春夢孔子告之曰起起今年歲在辰來年歲在巳既寤以讖合之知命當終有頃寢疾時袁紹與曹操相拒於官度令其子談遣使逼玄隨軍不得已載病到元城縣疾篤不進其年六月卒年七十四遺令薄葬自郡守以下嘗受業者縗絰赴會千餘人門人相與撰玄答諸弟子問五經依論語作鄭志八篇凡玄所注周易尚書毛詩儀禮禮記論語孝經尚書大傳中候乾象歷又著天文七政論魯禮禘祫義六藝論毛詩譜駮許慎五經異義答臨孝存周禮難凡百餘萬言玄質於辭訓通人頗譏其繁至於經傳洽孰稱為純儒齊魯間宗之其門人山陽郗慮至御史大夫東萊王基清河崔琰著名於世又樂安國淵任嘏時並童幼玄稱淵為國器嘏有道德其餘亦多所鑒拔皆如其言玄唯有一子益恩孔融在北海舉為孝廉及融為黃巾所圍益恩赴難隕身有遺腹子玄以其手文似己名之曰小同論曰自秦焚六經聖文埃滅漢興諸儒頗修藝文及東京學者亦各名家而守文之徒滯固所稟異端紛紜互相詭激遂令經有數家家有數説章句多者或乃百餘萬言學徒勞而少功後生疑而莫正鄭玄括囊大典網羅衆家刪裁繁誣刊改漏失自是學者略知所歸王父豫章君每考先儒經訓而長於玄常以為仲尼之門不能過也及傳授生徒並專以鄭氏家法云贊曰富平之緒承家載世伯仁先歸釐我國祭玄定義乖褒修禮缺孔書遂明漢章中輟
