body:
  text: 後漢書卷三十上蘇竟楊厚列傳第二十上蘇竟字伯況扶風平陵人也平帝世竟以明易為博士講書祭酒善圖緯能通百家之言王莽時與劉歆等共典校書拜代郡中尉時胸奴擾亂北邊多罹其禍竟終完輯一郡光武即位就拜代郡太守使固塞以拒胸奴建武五年冬盧芳略得北邊諸郡帝使偏將軍隨弟屯代郡竟病篤以兵屬弟詣京師謝罪拜侍中數月以病免初延岑護軍鄧仲況擁兵據南陽陰縣為寇而劉歆兄子龔為其謀主竟時在南陽與龔書曉之曰自依依末由自遠蓋聞君子愍同類而傷不遇人無愚智莫不先避害然後求利先定志然後求名昔智果見智伯窮兵必亡故變名遠逝陳平知項王為天所棄故歸心高祖皆智之至也聞君前權時屈節北面延牙乃後覺悟棲養德先世數子又何以加君處陰中土多賢士若以須臾之閒研考異同揆之圖書測之人事則得失利害可陳於目何自負畔亂之困不移守惡之名乎與君子之道何其反也兵據土可圖非冀或曰聖王未啓宜觀時變倚彊附大顧望自守二者之論豈其然乎夫孔丘祕經為漢赤制玄包幽室文隱事明且火德承堯雖昧必亮承積世之祚握無窮之符王氏雖乘閒偷篡而終嬰大戮支分體解宗氏屠滅非其效歟皇天所以眷顧踟蹰憂漢子孫者也論者若不本之於天參之於聖猥以師曠雜事輕自眩惑說士作書亂夫大道焉可信哉退見態鎮星繞帶天街歲星不舍氐房以為諸如此占歸之國家蓋災不徒設皆應之分野各有所主夫房心即宋之分東海是也尾為燕分漁陽是也東海董憲迷惑未降漁陽彭竉逆亂擁兵王赫斯怒命將並征故熒惑應此憲寵受殃太白辰星自亡新之末失行算度以至于今或守東井或沒羽林或裴回藩屏或躑躅帝宮或經天反明或潛臧久沈或衰微暗昧或煌煌北南或盈縮成鉤或偃蹇不禁皆大運蕩除之祥聖帝應符之兆也賊臣亂子往往錯互指麾妄說傳相壞誤由此論之天文安得遵度哉丘秦豐之都也是時月入于畢畢為天網主網羅無道之君故武王將伐紂上祭于畢求助天也夫仲夏甲申為八魁八魁上帝開塞之將也主退惡攘逆流星狀似蚩尤旗或曰營頭或曰天槍出奎而西北行至延牙營上散為數百而滅奎為毒螫主庫兵此二變郡中及延牙士衆所共見也是故延牙遂之武當託言發兵實避其殃今年比卦部歲坤主立冬坎主冬至水性滅火南方之兵受歲禍也德在中宮刑在木木勝土刑制德今年兵事畢已中國安寧之效也五七之家三十五姓彭秦延氏不得豫焉如何怪惑依而恃之葛纍之詩求福不回其若是乎也自更始以來孤恩背逆歸義向善臧否粲然可不察歟良醫不能救無命彊梁不能與天爭故天之所壞人不得支宜密與太守劉君共謀降議仲尼棲棲墨子遑遑憂人之甚也屠羊救楚非要爵祿茅焦干秦豈求報利盡忠博愛之誠憤滿不能已耳又與仲況書諫之文多不載於是仲況與龔遂降龔字孟公長安人善論議扶風馬援班彪並器重之竟終不伐其功潛樂道術作記誨篇及文章傳於世年七十卒于家楊厚字仲桓廣漢新都人也祖父春卿善圖讖學為公孫述將漢兵平蜀春卿自殺臨命戒子統曰吾綈袠中有先祖所傳祕記為漢家用爾其修之統感父遺言服闋辭家從犍為周循學習先法又就同郡鄭伯山受河洛書及天文推步之術建初中為彭城令一州大旱統推陰陽消伏縣界蒙澤太守宗湛使統為郡求雨亦即降澍自是朝廷災異多以訪之統作家法章句及內讖二卷解說位至光祿大夫為國三老年九十卒統生厚厚母初與前妻子博不相安厚年九歲思令和親乃託疾不言不食母知其旨懼然改意恩養加篤博後至光祿大夫厚少學統業精力思述初安帝永初二三年太白入北斗洛陽大水時統為侍中厚隨在京師朝廷以問統統對年老耳目不明子厚曉讀圖書粗識其意鄧太后使中常侍承制問之厚對以為諸王子多在京師容有非常宜亟發遣各還本國太后從之星尋滅不見又剋水退期日皆如所言除為中郎太后特引見問以圖讖厚對不合免歸復習業犍為不應州郡三公之命方正有道公車特徵皆不就永建二年順帝特徵詔告郡縣督促發遣厚不得已行到長安以病自上因陳漢三百五十年之厄宜蠲法改憲之道及消伏災異凡五事制書褒述有詔太醫致藥太官賜羊酒及至拜議郎三遷為侍中特蒙引見訪以時政四年厚上言今夏必盛寒當有疾疫蝗蟲之害是歲果六州大蝗疫氣流行後又連上西北二方有兵氣宜備邊寇車駕臨當西巡感厚言而止至陽嘉三年西羌寇隴右明年烏桓圍度遼將軍耿曄永和元年復上京師應有水患又當火災三公有免者蠻夷當反畔是夏洛陽暴水殺千餘人至冬承福殿災太尉龐參免荊交二州蠻夷賊殺長吏寇城郭又言陰臣近戚妃黨當受禍明年宋阿母與宦者褒信侯李元等遘姦廢退後二年中常侍張逵等復坐誣罔大將軍梁商專恣悉伏誅每有災異厚輒上消救之法而閹宦專政言不得信時大將軍梁冀威權傾朝遣弟侍中不疑以車馬珍玩致遺於厚欲與相見厚不答固稱病求退帝許之賜車馬錢帛歸家修黃老教授門生上名録者三千餘人太尉李固數薦言之太本初元年梁太后詔備古禮以聘厚遂辭疾不就建和三年太后復詔徵之經四年不至年八十二卒於家策書弔祭鄉人諡曰文父門人為立廟郡文學掾史春秋饗射常祠之
