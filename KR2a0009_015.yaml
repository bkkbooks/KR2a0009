body:
  text: 後漢書卷十三隗囂公孫述列傳第三隗囂字季孟天水成紀人也少仕州郡王莽國師劉歆引囂為士歆死囂歸鄉里季父崔素豪俠能得衆聞更始立而莽兵連敗於是乃與兄義及上邽人楊廣冀人周宗謀起兵應漢囂止之曰夫兵凶事也宗族何辜崔不聽遂聚衆數千人攻平襄殺莽鎮戎大尹崔廣等以為舉事宜立主以一衆心咸謂囂素有名好經書遂共推為上將軍囂辭讓不得已曰諸父衆賢不量小子必能用囂言者乃敢從命衆皆曰諾囂既立遣使聘請平陵人方望以為軍師望至說囂曰足下欲承天順民輔漢而起今立者乃在南陽王莽尚據長安雖欲以漢為名其實無所受命將何以見信於衆乎宜急立高廟稱臣奉祠所謂神道設教求助人神者也且禮有損益質文無常削地開兆茅茨土階以致其肅敬雖未備物神明其舍諸囂從其言遂立廟邑東祀高祖太宗世宗囂等皆稱臣執事史奉璧而告祝畢有司穿坎于庭牽馬操刀奉盤錯鍉遂割牲而盟曰凡我同盟三十一將十有六姓允承天道興輔劉宗如懷姦慮明神殛之高祖文皇武皇俾墜厥命厥宗受兵族類滅亡有司奉血鍉進護軍舉手揖諸將軍曰鍉不濡血歃不入口是欺神明也厥罰如盟既而薶血加書一如古禮事畢移檄告郡國曰漢復元年七月己酉朔己巳上將軍隗囂白虎將軍隗崔左將軍隗義右將軍楊廣明威將軍王遵雲旗將軍周宗等告州牧部監郡卒正連率大尹尹尉隊大夫屬正屬令故新都侯王莽慢侮天地悖道逆理鴆殺孝平皇帝篡奪其位矯託天命偽作符書欺惑衆庶震怒上帝反戾飾文以為祥瑞戲弄神祇歌頌禍殃楚越之竹不足以書其惡天下昭然所共聞見今略舉大端以喻吏民詭亂天術援引史傳昔秦始皇毀壞謚法以一二數欲至萬世而莽下三萬六千歲之歷言身當盡此度循亡秦之軌推無窮之數是其逆天之大罪也起九廟窮極土作發冢河東攻劫丘壟此其逆地之大罪也辜妄族衆庶行炮格之刑除順時之法灌以醇醯裂以五毒政令日變官名月易貨幣歲改吏民昬亂不知所從商旅窮窘號泣市道設為六管增重賦斂刻剝百姓厚自奉養苞苴流行財入公輔上下貪賄莫相檢考民坐挾銅炭沒入鍾官徒隸殷積數十萬入工匠飢死長安皆臭既亂諸夏狂心益悖北攻強胡南擾勁越西侵羌戎東摘濊貊使四境之外並入為害緣邊之郡江海之瀕滌地無類故攻戰之所敗苛法之所陷飢饉之所夭疾疫之所及以萬萬計其死者則露屍不掩生者則奔亡流散幼孤婦女流離係虜此其逆人之大罪也馬董忠國師劉歆衞將軍王涉皆結謀內潰司命孔仁納言嚴尤秩宗陳茂舉衆外降今山東之兵二百餘萬已平齊楚下蜀漢定宛洛據敖倉守函谷威命四布宣風中岳興滅繼絕封定萬國遵高祖之舊制修孝文之遺德有不從命武軍平之馳使四夷復其爵號然後還師振旅櫜弓臥鼓申命百姓各安其所庶無負子之責囂乃勒兵十萬擊殺雍州牧陳慶將攻安定安定大尹王向莽從弟平阿侯譚之子也威風獨能行其邦內屬縣皆無叛者囂乃移書於向喻以天命反覆誨示終不從於是進兵虜之以徇百姓然後行戮安定悉降而長安中亦起兵誅王莽囂遂分遣諸將徇隴西武都金城武威張掖酒泉敦煌皆下之更始二年遣使徵囂及崔義等囂將行方望以為更始未可知固止之囂不聽望以書辭謝而去曰足下將建伊呂之業弘不世之功而大事草創英雄未集以望異域之人疵瑕未露欲先崇郭隗想望樂毅故欽承大旨順風不讓將軍以至德尊賢廣其謀慮動有功發中權基業已定大勳方緝今俊並會羽翮並肩望無耆耉之德而猥託賓客之上誠自愧也雖懷介然之節欲絜去就之分誠終不背其本貳其志也何則范蠡收責句踐乘偏舟於五湖舅犯謝罪文公亦逡巡於河上夫以二子之賢勒銘兩國猶削跡歸愆請命乞身望之無勞蓋其宜也望聞烏氏有龍池之山微徑南通與漢相屬其傍時有奇人聊及須廣求其真願將軍勉之囂等遂至長安更始以為右將軍崔義皆即舊號其冬崔義謀欲叛歸囂懼并禍即以事告之崔義誅死更始感囂忠以為御史大夫明年夏赤眉入關三輔擾亂流聞光武即位河北囂即說更始歸政於光武叔父國三老良更始不聽諸將欲劫更始東歸囂亦與通謀事發覺更始使使者召囂囂稱疾不入因會客王遵周宗等勒兵自守更始使執金吾鄧曄將兵圍囂囂閉門拒守至昬時遂潰圍與數十騎夜斬平城門關亡歸天水復招聚其衆據故地自稱西州上將軍及更始敗三輔耆老士大夫皆奔歸囂囂素謙恭愛士傾身引接為布衣交以前王莽平河大尹長安谷恭為掌野大夫平陵范逡為師友趙秉蘇衡鄭興為祭酒申屠剛杜林為持書楊廣王遵周宗及平襄人行巡阿陽人王捷長陵人王元為大將軍杜陵金丹之屬為賓客由此名震西州聞於山東建武二年大司徒鄧禹西擊赤眉屯雲陽禹裨將馮愔引兵叛禹西向天水囂逆擊破之於高平盡獲輜重於是禹承制遣使持節命囂為西州大將軍得專制涼州朔方事及赤眉去長安欲西上隴囂遣將軍楊廣迎擊破之又追敗之於烏氏涇陽閒囂既有功於漢又受鄧禹爵署其腹心議者多勸通使京師三年囂乃上書詣闕光武素聞其風聲報以殊禮言稱字用敵國之儀所以慰藉之良厚時陳倉人呂鮪擁衆數萬與公孫述通寇三輔囂復遣兵佐征西大將軍馮異擊之走鮪遣使上狀帝報以手書曰慕樂德義思相結納昔文王三分猶服事殷但駑馬鈆刀不可強扶數蒙伯樂一顧之價而蒼蠅之飛不過數步即託驥尾得以絕羣隔於盜賊聲問不數將軍操執款款扶傾救危南距公孫之兵北禦羌胡之亂是以馮異西征得以數千百人躑躅三輔微將軍之助則咸陽已為他人禽矣今關東寇賊往往屯聚志務廣遠多所不暇未能觀兵成都與子陽角力如令子陽到漢中三輔願因將軍兵馬鼓旗相當儻肯如言蒙天之福即智士計功割地之秋也管仲曰生我者父母成我者鮑子自今以後手書相聞勿用傍人解構之言自是恩禮愈篤其後公孫述數出兵漢中遣使以大司空扶安王印綬授囂囂自以與述敵國恥為所臣乃斬其使出兵擊之連破述軍以故蜀兵不復北出時關中將帥數上書言蜀可擊之狀帝以示囂因使討蜀以效其信囂乃遣長史上書盛言三輔單弱劉文伯在邊未宜謀蜀帝知囂欲持兩端不願天下統一於是稍黜其禮正君臣之儀初囂與來歙馬援相善故帝數使歙援奉使往來勸令入朝許以重爵囂不欲東連遣使深持謙辭言無功德須四方平定退伏閭里五年復遣來歙說囂遣子入侍囂聞劉永彭寵皆已破滅乃遣長子恂隨歙詣闕以為胡騎校尉封鐫羌侯而囂將王元王捷常以為天下成敗未可知不願專心內事元遂說囂曰昔更始西都四方響應天下喁喁謂之太平一旦敗壞大王幾無所厝今南有子陽北有文伯江湖海岱王公十數而欲牽儒生之說棄千乘之基羇旅危國以求萬全此循覆車之軌計之不可者也今天水完富士馬最強北收西河上郡東收三輔之地案秦舊迹表𩹉河山元請以一丸泥為大王東封函谷關此萬世一時也若計不及此且畜養士馬據隘自守曠日持久以待四方之變圖王不成其弊猶足以霸要之魚不可脫於淵神龍失埶即還與蚯蚓同囂心然元計雖遣子入質猶負其險欲專方面於是游士長者稍稍去之六年關東悉平帝積苦兵閒以囂子內侍公孫述遠據邊陲乃謂諸將曰且當置此兩子於度外耳因數騰書隴蜀告示禍福囂賓客掾史多文學生每所上事當世士大夫皆諷誦之故帝有所辭荅尤加意焉囂復遣使周游詣闕先到馮異營游為仇家所殺帝遣衞尉銚期持珍寶繒帛賜囂期至鄭被盜亡失財物帝常稱囂長者務欲招之聞而歎曰吾與隗囂事欲不諧使來見殺得賜道亡會公孫述遣兵寇南郡乃詔囂當從天水伐蜀因此欲以潰其心腹囂復上言白水險阻棧閣絕敗又多設支閡帝知其終不為用叵欲討之遂西幸長安遣建威大將軍耿弇等七將軍從隴道伐蜀先使來歙奉璽書喻旨囂疑懼即勒兵使王元據隴坻伐木塞道謀欲殺歙歙得亡歸諸將與囂戰大敗各引退囂因使王元行巡侵三輔征西大將軍馮異征虜將軍祭遵等擊破之囂乃上疏謝曰吏人聞大兵卒至驚恐自救臣囂不能禁止兵有大利不敢廢臣子之節親自追還昔虞舜事父大杖則走小杖則受臣雖不敏敢忘斯義今臣之事在於本朝賜死則死加刑則刑如遂蒙恩更得洗心死骨不朽有司以囂言慢請誅其子恂帝不忍復使來歙至汧賜囂書曰昔柴將軍與韓信書云陛下寬仁諸侯雖有亡叛而後歸輒復位號不誅也以囂文吏曉義理故復賜書深言則似不遜略言則事不決今若束手復遣恂弟歸闕庭者則爵祿獲全有浩大之福矣吾年垂四十在兵中十歲厭浮語虛辭即不欲勿報囂知帝審其詐遂遣使稱臣於公孫述明年述以囂為朔寧王遣兵往來為之援埶秋囂將步騎三萬侵安定至陰槃馮異率諸將拒之囂又令別將下隴攻祭遵於汧兵並無利乃引還帝因令來歙以書招王遵遵乃與家屬東詣京師拜為太中大夫封向義侯遵字子春霸陵人也父為上郡太守遵少豪俠有才辯雖與囂舉兵而常有歸漢意曾於天水私於來歙曰吾所以戮力不避矢石者豈要爵位哉徒以人思舊主先君蒙漢厚恩思効萬分耳又數勸囂遣子入侍前後辭諫切甚囂不從故去焉八年春來歙從山道襲得略陽城囂出不意懼更有大兵乃使王元拒隴坻行巡守番須口王孟塞雞頭道牛邯軍瓦亭囂自悉其大衆圍來歙公孫述亦遣其將李育田弇助囂攻略陽連月不下帝乃率諸將西征之數道上隴使王遵持節監大司馬吳漢留屯於長安遵知囂必敗滅而與牛邯舊故知其有歸義意以書喻之曰遵與隗王歃盟為漢自經歷虎口踐履死地已十數矣于時周洛以西無所統壹故為王策欲東收關中北取上郡進以奉天人之用退以懲外夷之亂數忖孜冀聖漢復存當挈河隴奉舊都以歸本朝生民以來臣人之埶未有便於此時者也而王之將吏羣居穴處之徒人人扺掌欲為不善之計遵與孺卿日夜所爭害幾及身者豈一事哉前計抑絕後策不從所以吟嘯腕垂涕登車幸蒙封拜得延論議每及西州之事未嘗敢忘孺卿之言今車駕大衆已在道路吳耿驍將雲集四境而孺卿以奔離之卒拒要當軍衝視其形埶何如哉夫智者覩危思變賢者泥而不滓是以功名終申策畫復得故夷吾束縛而相齊黥布杖劒以歸漢去愚就義功名並著今孺卿當成敗之際遇嚴兵之鋒可為怖慄宜斷之心參之有識邯得書沈吟十餘日乃謝士衆歸命洛陽拜為太中大夫於是囂大將十三人屬縣十六衆十餘萬皆降王元入蜀求救囂將妻子奔西城從楊廣而田弇李育保上邽詔告囂曰若束手自詣父子相見保無佗也高皇帝云橫來大者王小者侯若遂欲為黥布者亦自任也囂終不降於是誅其子恂使吳漢與征南大將軍岑彭圍西城耿弇與虎牙大將軍蓋延圍上邽車駕東歸月餘楊廣死囂窮困其大將王捷別在戎丘登城呼漢軍曰為隗王城守者皆必死無二心願諸軍亟罷請自殺以明之遂自刎頸死數月王元行巡周宗將蜀救兵五千餘人乘高卒至鼓譟大呼曰百萬之衆方至漢軍大驚未及成陳元等決圍殊死戰遂得入城迎囂歸冀會吳漢等食盡退去於是安定北地天水隴西復反為囂九年春囂病且餓出城餐糗糒恚憤而死王元周宗立囂少子純為王明年來歙耿弇蓋延等攻破落門周宗行巡苟宇趙恢等將純降宗恢及諸隗分徙京師以東純與巡宇徙弘農唯王元留為蜀將及輔威將軍臧宮破延岑元舉衆詣宮降元字惠孟初拜上蔡令遷東平相坐墾田不實下獄死牛邯字孺卿狄道人有勇力才氣雄於邊垂及降大司空徒司直杜林太中大夫馬援並薦之以為護羌校尉與來歙平隴右十八年純與賓客數十騎亡入胡至武威捕得誅之論曰隗囂援旗糺族假制明神迹夫創圖首事有以識其風矣終於孤立一隅介于大國隴坻雖隘非有百二之埶區區兩郡以禦堂堂之鋒至使窮廟策竭征徭身歿衆解然後定之則知其道有足懷者所以棲有四方之桀士至投死絕亢而不悔者矣夫功全則譽顯業謝則釁生回成喪而為其議者或未聞焉若囂命會符運敵非天力雖坐論西伯豈多嗤乎公孫述字子陽扶風茂陵人也哀帝時以父任為郎後父仁為河南都尉而述補清水長央仁以述年少遣門下掾隨之官月餘掾辭歸白仁曰述非待教者也後太守以其能使兼攝五縣政事修理姦盜不發郡中謂有鬼神王莽天鳳中為導江卒正居臨邛復有能名及更始立豪傑各起其縣以應漢南陽人宗成自稱虎牙將軍入略漢中又商人王岑亦起兵於雒縣自稱定漢將軍殺王莽庸部牧以應成衆合數萬人述聞之遣使迎成等成等至成都虜掠暴橫述意惡之召縣中豪桀謂曰天下同苦新室思劉氏久矣故聞漢將軍到馳迎道路今百姓無辜而婦子係獲室屋燒燔此寇賊非義兵也吾欲保郡自守以待真主諸卿欲并力者即留不欲者便去豪桀皆叩頭曰願效死述於是使人詐稱漢使者自東方來假述輔漢將軍蜀郡太守兼益州牧印綬乃選精兵千餘人西擊成等比至成都衆數千人遂攻成大破之成將垣副殺成以其衆降二年秋更始遣柱功侯李寶益州刺史張忠將兵萬餘人徇蜀漢述恃其地險衆附有自立志乃使其弟恢於綿竹擊寶忠大破走之由是威震益部功曹李熊說述曰方今四海波蕩匹夫橫議將軍割據千里地什湯武若奮威德以投天𨻶霸王之業成矣宜改名號以鎮百姓述曰吾亦慮之公言起我意於是自立為蜀王都成都蜀地肥饒兵力精強遠方士庶多往歸之邛笮君長皆來貢獻李熊復說述曰今山東飢饉人庶相食兵所屠滅城邑丘墟蜀地沃野千里土壤膏腴果實所生無穀而飽女工之業覆衣天下名材竹幹器械之饒不可勝用又有魚鹽銅銀之利浮水轉漕之便北據漢中杜襃斜之險東守巴郡拒扞關之口地方數千里戰士不下百萬見利則出兵而略地無利則堅守而力農東下漢水以窺秦地南順江流以震荊楊所謂用天因地成功之資今君王之聲聞於天下而名號未定志士狐疑宜即大位使遠人有所依歸述曰帝王有命吾何足以當之熊曰天命無常百姓與能能者當之王何疑焉述夢有人語之曰八𣒅子系十二為期覺謂其妻曰雖貴而祚短若何妻對曰朝聞道夕死尚可況十二乎會有龍出其府殿中夜有光耀述以為符瑞因刻其掌文曰公孫帝建武元年四月遂自立為天子號成家色尚白建元曰龍興元年以李熊為大司徒以其弟光為大司馬恢為大司空改益州為司隸校尉蜀郡為成都尹越巂任貴亦殺王莽大尹而據郡降述遂使將軍侯丹開白水關北守南鄭將軍任滿從閬中下江式東據扞關於是盡有益州之地自更始敗後光武方事山東未遑西伐關中豪桀呂鮪等往往擁衆以萬數莫知所屬多往歸述皆拜為將軍遂大作營壘陳車騎肄習戰射會聚兵甲數十萬人積糧漢中築宮南鄭又造十層赤樓帛蘭船多刻天下牧守印章備置公卿百官使將軍李育程烏將數萬衆出陳倉與呂鮪徇三輔三年征西將軍馮異擊鮪育於陳倉大敗之鮪育奔漢中五年延岑田戎為漢兵所敗皆亡入蜀岑字叔牙南陽人始起據漢中又擁兵關西關西所在破散走至南陽略有數縣戎汝南人初起兵夷陵轉寇郡縣衆數萬人岑戎並與秦豐合豐俱以女妻之及豐敗故二人皆降於述述以岑為大司馬封汝寧王戎翼江王六年述遣戎與將軍任滿出江關下臨沮夷陵閒招其故衆因欲取荊州諸郡竟不能剋是時述廢銅錢置鐵官錢百姓貨幣不行蜀中童謠言曰黃牛白腹五銖當復好事者竊言王莽稱黃述自號白五銖錢漢貨也言天下當并還劉氏述亦好為符命鬼神瑞應之事妄引讖記以為孔子作春秋為赤制而斷十二公明漢至平帝十二代歷數盡也一姓不得再受命又引錄運法曰廢昌帝立公孫括地象曰帝軒轅受命公孫氏握援神契曰西太守乙卯金謂西方太守而乙絕卯金也五德之運黃承赤而白繼黃金據西方為白德而代王氏得其正序又自言手文有奇及得龍興之瑞數移書中國冀以感動衆心帝患之乃與述書曰圖讖言公孫即宣帝也代漢者當塗高君豈高之身邪乃復以掌文為瑞王莽何足效乎君非吾賊臣亂子倉卒時人皆欲為君事耳何足數也君日月已逝妻子弱小當早為定計可以無憂天下神器不可力爭宜留三思署曰公孫皇帝述不荅明年隗囂稱臣於述述騎都尉平陵人荊邯見東方將平兵且西向說述曰兵者帝王之大器古今所不能廢也昔秦失其守豪桀並起漢祖無前人之迹立錐之地起於行陣之中躬自奮擊兵破身困者數矣然軍敗復合創愈復戰何則前死而成功踰於却就於滅亡也隗囂遭遇運會割有雍州兵強士附威加山東遇更始政亂復失天下衆庶引領四方瓦解囂不及此時推危乘勝以爭天命而退欲為西伯之事尊師章句賓友處士偃武息戈卑辭事漢喟然自以文王復出也令漢帝釋關隴之憂專精東伐四分天下而有其三使西州豪傑咸居心於山東發閒使招攜貳則五分而有其四若舉兵天水必至沮潰天水既定則九分而有其八陛下以梁州之地內奉萬乘外給三軍百姓愁困不堪上命將有王氏自潰之變臣之愚計以為宜及天下之望未絕豪傑尚可招誘急以此時發國內精兵令田戎據江陵臨江南之楚倚巫山之固築壘堅守傳檄吳楚長沙以南必隨風而靡令延岑出漢中定三輔天水隴西拱手自服如此海內震搖冀有大利述以問羣臣博士吳柱曰昔武王伐殷先觀兵孟津八百諸侯不期同辭然猶還師以待天命未聞無左右之助而欲出師千里之外以廣封疆者也邯曰今東帝無尺土之柄驅烏合之衆跨馬陷敵所向輒平不亟乘時與之分功而坐談武王之說是效隗囂欲為西伯也述然邯言欲悉發北軍屯士及山東客兵使延岑田戎分出兩道與漢中諸將合兵并埶蜀人及其弟光以為不宜空國千里之外決成敗於一舉固爭之述乃止延岑田戎亦數請兵立功終疑不聽述性苛細察於小事敢誅殺而不見大體好改易郡縣官名然少為郎習漢家制度出入法駕鑾旗旄騎陳置陛戟然後輦出房闥又立其兩子為王食犍為廣漢各數縣羣臣多諫以為成敗未可知戎士暴露而遽王皇子示無大志傷戰士心述不聽唯公孫氏得任事由此大臣皆怨八年帝使諸將攻隗囂述遣李育將萬餘人救囂囂敗并沒其軍蜀地聞之恐動述懼欲安衆心成都郭外有秦時舊倉述改名白帝倉自王莽以來常空述即詐使人言白帝倉出穀如山陵百姓空市里往觀之述乃大會羣臣問曰白帝倉竟出穀乎皆對言無述曰訛言不可信道隗王破者復如此矣俄而囂將王元降述以為將軍明年使元與領軍環安拒河池又遣田戎及大司徒任滿南郡太守程汎將兵下江關破威虜將軍馮駿等拔巫及夷陵夷道因據荊門十一年征南大將軍岑彭攻之滿等大敗述將王政斬滿首降于彭田戎走保江州城邑皆開門降彭遂長驅至武陽帝乃與述書陳言禍福以明丹青之信述省書歎息以示所親太常常少光祿勳張隆隆少皆勸降述曰廢興命也豈有降天子哉左右莫敢復言中郎將來歙急攻王元環安安使刺客殺歙述復令刺殺岑彭十二年述弟恢及子壻史興並為大司馬吳漢輔威將軍臧宮所破戰死自是將帥恐懼日夜離叛述雖誅滅其家猶不能禁帝必欲降之乃下詔喻述曰往年詔書比下開示恩信勿以來歙岑彭受害自疑今以時自詣則家族完全若迷惑不喻委肉虎口痛哉柰何將帥疲倦吏士思歸不樂久相屯守詔書手記不可數得朕不食言述終無降意九月吳漢又破斬其大司徒謝豐執金吾袁吉漢兵遂守成都述謂延岑曰事當柰何岑曰男兒當死中求生可坐窮乎財物易聚耳不宜有愛述乃悉散金帛募敢死士五千餘人以配岑於市橋偽建旗幟鳴鼓挑戰而潛遣奇兵出吳漢軍後襲擊破漢漢墯水緣馬尾得出十一月臧宮軍至咸門述視占書云虜死城下大喜謂漢等當之乃自將數萬人攻漢使延岑拒宮大戰岑三合三勝自旦及日中軍士不得食並疲漢因令壯士突之述兵大亂被刺洞墯馬左右輿入城述以兵屬延岑其夜死明旦岑降吳漢乃夷述妻子盡滅公孫氏并族延岑遂放兵大掠焚述宮室帝聞之怒以譴漢又讓漢副將劉尚曰城降三日吏人從服孩兒老母口以萬數一旦於兵縱火聞之可為酸鼻尚宗室子孫嘗更吏職何忍行此仰視天俯視地觀放麑啜羹二者孰仁良失斬將弔人之義也初常少張隆勸述降不從並以憂死帝下詔追贈少為太常隆為光祿勳以禮改葬之其忠節志義之士並蒙旌顯程烏李育以有才幹皆擢用之於是西土咸悅莫不歸心焉論曰昔趙佗自王番禺公孫亦竊帝蜀漢推其無他功能而至於後亡者將以地邊處遠非王化之所先乎述雖為漢吏無所馮資徒以文俗自憙遂能集其志計道未足而意有餘不能因𨻶立功以榆吇隉方乃坐飾邊幅以高深自安昔吳起所以慙魏侯也及其謝臣屬審廢興之命與夫泥首銜玉者異日談也贊曰公孫習吏隗王得士漢命已還二隅方跱天數有違江山難恃
