body:
  text: 後漢書志第三十輿服下冕冠長冠委貌冠皮辨冠爵辨冠通天冠遠遊冠高山冠進賢冠法冠武冠建華冠方山冠巧士冠却非冠却敵冠樊噲冠術氏冠鶡冠幘佩刀印黃赤綬赤綬緑綬紫綬青綬黑綬黃綬青紺綸后夫人服上古穴居而野處衣毛而冒皮未有制度後世聖人易之以絲麻觀翬翟之文榮華之色乃染帛以效之始作五采成以為服見鳥獸有冠角胡之制遂作冠冕纓蕤以為首飾凡十二章故易曰庖犧氏之王天下也仰觀象於天俯觀法於地觀鳥獸之文與地之宜近取諸身遠取諸物於是始作八卦以通神明之德以類萬物之情黃帝堯舜垂衣裳而天下治蓋取諸乾峍乾峍有文故上衣玄下裳黃日月星辰山龍華蟲作繢宗彝藻火粉米黼黻絺繡以五采章施于五色作服天子備章公自山以下侯伯自華蟲以下子男自藻火以下卿大夫自粉米以下至周而變之以三辰為旗旗王祭上帝則大裘而冕公侯卿大夫之服用九章以下秦以戰國即天子位滅去禮學郊祀之服皆以袀玄漢承秦故至世祖踐祚都于土中始修三雍正兆七郊顯宗遂就大業初服旒冕衣裳文章赤舄絇屨以祠天地養三老五更於三雍于時致治平矣天子三公九卿特進侯侍祠侯祀天地明堂皆冠旒冕衣裳玄上纁下乘輿備文日月星辰十二章三公諸侯用山龍九章九卿以下用華蟲七章皆備五采大佩赤舄絇履以承大祭百官執事者冠長冠皆祗服五獄四瀆山川宗廟社稷諸沾秩祠皆袀玄長冠五郊各如方色云百官不執事各服常冠袀玄以從冕冠垂旒前後邃延玉藻孝明皇帝永平二年初詔有司采周官禮記尚書皋陶篇乘輿服從歐陽氏説公卿以下從大小夏侯氏説冕皆廣七寸長尺二寸前圓後方朱緑𩹉玄上前垂四寸後垂三寸係白玉珠為十二旒以其綬采色為組纓三公諸侯七旒青玉為珠卿大夫五旒黑玉為珠皆有前無後各以其綬采色為組纓旁垂黈纊郊天地宗祀明堂則冠之衣裳玉佩備章采乘輿刺史繡公侯九卿以下皆織成陳留襄邑獻之云長冠一曰齋冠高七寸廣三寸促漆纚為之制如板以竹為𩹉初高祖微時以竹皮為之謂之劉氏冠楚冠制也民謂之鵲尾冠非也祀宗廟諸祀則冠之皆服袀玄絳緣領袖為中衣絳褲糸末示其赤心奉神也五郊衣幘褲糸末各如其色此冠高祖所造故以為祭服尊敬之至也委貌冠皮辨冠同制長七寸高四寸制如覆杯前高廣後卑鋭所謂夏之母毋追殷之章甫者也委貌以皂絹為之皮辨以鹿皮為之行大射禮於辟雍公卿諸侯大夫行禮者冠委貌衣玄端素裳執事者冠皮辨衣緇麻衣皂領袖下素裳所謂皮辨素積者也爵辨一名冕廣八寸長尺二寸如爵形前小後大繒其上似爵頭色有收持笄所謂夏收殷冔者也祠天地五郊明堂雲翹舞樂人服之禮曰朱干玉鏚冕而舞大夏此之謂也通天冠高九寸正豎頂少邪却乃直下為鐵卷梁前有山展筒為述乘輿所常服服衣深衣制有袍隨五時色袍者或曰周公抱成王宴居故施袍禮記孔子衣逢掖之衣縫掖其袖合而縫大之近今袍者也今下至賤更小史皆通制袍單衣皂緣領袖中衣為朝服云遠遊冠制如通天有展筒橫之於前無山述諸王所服也高山冠一曰側注制如通天頂不邪却直豎無山述展筒中外官謁者僕射所服太傅胡廣説曰高山冠蓋齊王冠也秦滅齊以其君冠賜近臣謁者服之進賢冠古緇布冠也文儒者之服也前高七寸後高三寸長八寸公侯三梁中二千石以下至博士兩梁自博士以下至小史私學弟子皆一梁宗室劉氏亦兩梁冠示加服也法冠一曰柱後高五寸以纚為展筒鐵柱卷執法者服之侍御史廷尉正監平也或謂之獬豸冠獬豸神羊能別曲直楚王嘗獲之故以為冠胡廣説曰春秋左氏傳有南冠而縶者則楚冠也秦滅楚以其君服賜執法近臣御史服之武冠一曰武辨大冠諸武官冠之侍中中常侍加黃金璫附蟬為文貂尾為飾謂之趙惠文冠胡廣説曰趙武靈王效胡服以金璫飾首前插貂尾為貴職秦滅趙以其君冠賜近臣建武時胸奴內屬世祖賜南單于衣服以中常侍惠文冠中黃門童子佩刀云建華冠以鐵為柱卷貫大銅珠九枚制似縷鹿記曰知天者冠述知地者履絇春秋左傳曰鄭子臧好鷸冠前圓以為此則是也天地五郊明堂育命舞樂人服之方山冠似進賢以五采縠為之祠宗朝大豫八佾四時五行樂人服之冠衣各如其行方之色而舞焉巧士冠前高七寸要後相通直豎不常服唯郊天黃門從官四人冠之在鹵簿中次乘輿車前以備宦者四星云却非冠制似長冠下促宮殿門吏僕射冠之負赤幡青翅燕尾諸僕射幡皆如之却敵冠前高四寸通長四寸後高三寸制似進賢衛士服之樊噲冠漢將樊噲造次所冠以入項羽軍廣九寸高七寸前後出各四寸制似冕司馬殿門大難衛士服之或曰樊噲常持鐵楯聞項羽有意殺漢王噲裂裳以裹楯冠之入軍門立漢王旁視項羽術氏冠前圓吳制差池邐迆四重趙武靈王好服之今不施用官有其圖注諸冠皆有纓蕤執事及武吏皆縮纓垂五寸武冠俗謂之大冠環纓無蕤以青系為緄加雙鶡尾豎左右為鶡冠云五官左右虎賁羽林五中郎將羽林左右監皆冠鶡冠紗縠單衣虎賁將虎文褲白虎文劒佩刀虎賁武騎皆鶡冠虎文單衣襄邑歲獻織成虎文云鶡者勇雉也其鬬對一死乃止故趙武靈王以表武士秦施之焉安帝立皇太子太子謁高祖廟世祖廟門大夫從冠兩梁進賢洗馬冠高山罷廟侍御史任方奏請非乘從時皆冠一梁不宜以為常服事下有司尚書陳忠奏門大夫職如諫大夫洗馬職如謁者故皆服其服先帝之舊也方言可寢奏可謁者古者一名洗馬古者有冠無幘其戴也加首有頍所以安物故詩曰有頍者辨此之謂也三代之世法制滋彰下至戰國文武並用秦雄諸侯乃加其武將首飾為絳袙以表貴賤其後稍稍作顏題漢興續其顏却摞之施巾連題却覆之今喪幘是其制也名之曰幘幘者賾也頭首嚴賾也至孝文乃高顏題續之為耳崇其巾為屋合後施收上下羣臣貴賤皆服之文者長耳武者短耳稱其冠也尚書幘收方三寸名曰納言示以忠正顯近職也迎氣五郊各如其色從章服也皂衣羣吏春服青幘立夏乃止助微順氣尊其方也武吏常赤幘成其威也未冠童子幘無屋者示未成人也入學小童幘也句卷屋者示尚幼少未遠冒也喪幘却摞反本禮也升數如冠與冠偕也期喪起耳有收素幘亦如之禮輕重有制變除從漸文也古者君臣佩玉尊卑有度上有韍貴賤有殊佩所以章德服之衷也韍所以執事禮之共也故禮有其度威儀之制三代同之五霸迭興戰兵不息佩非戰器韍非兵旗於是解去韍佩留其係璲以為章表故詩曰鞙鞙佩璲此之謂也韍佩既廢秦乃以采組連結於璲光明章表轉相結受故謂之綬漢承秦制用而弗改故加之以雙印佩刀之飾至孝明皇帝乃為大佩衝牙雙瑀璜皆以白玉乘輿落以白珠公卿諸侯以采絲其玉視冕旒為祭服云佩刀乘輿黃金通身貂錯半鮫魚鱗金漆錯雌黃室五色罽隱室華諸侯王黃金錯環挾半鮫黑室公卿百官皆純黑不半鮫小黃門雌黃室中黃門朱室童子皆虎爪文虎賁黃室虎文其將白虎文皆以白珠鮫為口之飾乘輿者加翡翠山紆嬰其側佩雙印長寸二分方六分乘輿諸侯王公列侯以白玉中二千石以下至四百石皆以黑犀二百石以至私學弟子皆以象牙上合絲乘輿以縢貫白珠赤罽蕤諸侯王以下以綔赤絲蕤縢綔各如其印質刻書文曰正月剛卯既決靈殳四方赤青白黃四色是當帝令祝融以教夔龍庶疫剛疸莫我敢當疾日嚴卯帝令夔化慎爾周伏化茲靈殳既正既直既觚既方庶疫剛疸莫我敢當凡六十六字乘輿黃赤綬四采黃赤紺縹紺淳黃圭長丈九尺九寸五百首諸侯王赤綬四采赤黃縹紺淳赤圭長二丈一尺三百首太皇太后皇太后其綬皆與乘輿同皇后亦如之長公主天子貴人與諸侯王同綬者加特也諸國貴人相國皆緑綬三采緑紫紺淳緑圭長二丈一尺二百四十首公侯將軍紫綬二采紫白淳紫圭長丈七尺百八十首公主封君服紫綬九卿中二千石二千石青綬三采青白紅淳青圭長丈七尺百二十首自青綬以上縌皆長三尺二寸與綬同采而首半之縌者古佩璲也佩綬相迎受故曰縌紫綬以上縌綬之間得施玉環鐍云千石六百石黑綬三采青赤紺淳青圭長丈六尺八十首四百石三百石長同四百石三百石二百石黃綬一采淳黃圭一采長丈五尺六十首自黑綬以下縌綬皆長三尺與綬同采而首半之百石青紺綸綬一采宛轉繆織圭長丈二尺凡先合單紡為一系四系為一扶五扶為一首五首成一文文采淳為一圭首多者系細少者系粗皆廣尺六寸太皇太后皇太后入廟服紺上皂下蠶青上縹下皆深衣制隱領袖緣以絛翦氂蔮簪珥珥耳璫垂珠也簪以瑁為擲長一尺端為華勝上為鳳皇爵以翡翠為毛羽下有白珠垂黃金鑷左右一橫簪之以安蔮結諸簪珥皆同制其擲有等級焉皇后謁廟服紺上皂下蠶青上縹下皆深衣制隱領袖緣以絛假結步搖簪珥步搖以黃金為山題貫白珠為桂枝相繆一爵九華熊虎赤羆天鹿辟邪南山豐大特六獸詩所謂副笄六珈者諸爵獸皆以翡翠為毛羽金題白珠璫繞以翡翠為華云貴人助蠶服純縹上下深衣制大手結墨瑁又加簪珥長公主見會衣服加步搖公主大手結皆有簪珥衣服同制自公主封君以上皆帶綬以采組為緄帶各如其綬色黃金辟邪首為帶鐍飾以白珠公卿列侯中二千石二千石夫人紺繒蔮黃金龍首銜白珠魚須擲長一尺為簪珥入廟佐祭者皂絹上下助蠶者縹絹上下皆深衣制緣自二千石夫人以上至皇后皆以蠶衣為朝服公主貴人妃以上嫁娶得服錦綺羅縠繒采十二色重緣袍特進列侯以上錦繒采十二色六百石以上重練采九色禁丹紫紺三百石以上五色采青絳黃紅緑二百石以上四采青黃紅緑賈人緗縹而已公列侯以下皆單緣襈制文繡為祭服自皇后以下皆不得服諸古麗圭襂閨緣加上之服建武永平禁絶之建初永元又復中重於是世莫能有制其裁者乃遂絶矣凡冠衣諸服旒冕長冠委貌皮辨爵辨建華方山巧士衣裳文繡赤舄服絇履大佩皆為祭服其餘悉為常用朝服唯長冠諸王國謁者以為常朝服云宗廟以下祠祀皆冠長冠皂繒袍單衣絳緣領袖中衣絳褲糸末五郊各從其色焉贊曰車輅各庸旌旗異局冠服致美佩紛璽玉敬敬報情尊尊下欲孰夸華文匪豪麗縟
