body:
  text: 後漢書卷五十八虞傅蓋臧列傳第四十八虞詡字升卿陳國武平人也祖父經為郡縣獄吏案法平允務存寬恕每冬月上其狀恆流涕隨之嘗稱曰東海于公高為里門而其子定國卒至丞相吾決獄六十年矣雖不及于公其庶幾乎子孫何必不為九卿邪故字詡曰升卿詡年十二能通尚書早孤孝養祖母縣舉順孫國相奇之欲以為吏詡辭曰祖母九十非詡不養相乃止後祖母終服闋辟太尉李修府拜郎中永初四年羌胡反亂殘破并涼大將軍鄧騭以軍役方費事不相贍欲𠫓廾涼州并力北邊乃會公卿集議騭曰譬若衣敗壞一以相補猶有所完若不如此將兩無所保議者咸同詡聞之乃説李修曰竊聞公卿定策當𠫓廾涼州求之愚心未見其便先帝開拓土字劬勞後定而今憚小費舉而𠫓廾之涼州既𠫓廾即以三輔為塞三輔為塞則園陵單外此不可之甚者也唁曰關西出將關東出相觀其習兵壯勇實過餘州今羌胡所以不敢入據三輔為心腹之害者以涼州在後故也其土人所以推鋒執鋭無反顧之心者為臣屬於漢故也若𠫓廾其境域徙其人庶安土重遷必生異志如使豪雄相聚席卷而東雖賁育為卒太公為將猶恐不足當禦議者喻以補衣猶有所完詡恐其疽食侵淫而無限極𠫓廾之非計修曰吾意不及此微子之言幾敗國事然則計當安出詡曰今涼土擾動人情不安竊憂卒然有非常之變誠宜令四府九卿各辟彼州數人其牧守令長子弟皆除為官外以勸厲答其功勤內以拘致防其邪計修善其言更集四府皆從詡議於是辟西州豪桀為掾屬拜牧守長吏子弟為郎以安慰之鄧騭兄弟以詡異其議因此不平欲以吏法中傷詡後朝歌賊寧季等數千人攻殺長吏屯聚連年州郡不能禁乃以詡為朝歌長故舊皆弔詡曰得朝歌何衰詡笑曰志不求易事不避難臣之職也不遇槃根錯節何以別利器乎始到謁河內大守馬稜稜勉之曰君儒者當謀謨廟堂反在朝歌邪詡曰初除之日士大夫皆見弔勉以詡譸之知其無能為也朝歌者韓魏之郊背太行臨黃河去敖倉百里而青冀之人流亡萬數賊不知開倉招衆劫庫兵守城臯斷天下右臂此不足憂也今其衆新盛難與爭鋒兵不猒權願寬假轡策勿令有所拘閡而已及到官設令三科以募求壯士自掾史以下各舉所知其攻劫者為上傷人偷盜者次之帶喪服而不事家業為下收得百餘人詡為饗會悉貰其罪使入賊中誘令劫掠乃伏兵以待之遂殺賊數百人又潛遣貧人能縫者傭作賊衣以采綖縫其裾為幟有出巿里者吏輒禽之賊由是駭散咸稱神明遷懷令後羌寇武都鄧太后以詡有將帥之略遷武都太守引見嘉德殿厚加賞賜羌乃率衆數千遮詡於陳食崤谷詡即停軍不進而宣言上書請兵須到當發羌聞之乃分鈔傍縣詡因其兵散日夜進道兼行百餘里令吏士各作兩竈日增倍之羌不敢逼或問曰孫臏減竈而君增之兵法日行不過三十里以戒不虞而今日且二百里何也詡曰虜衆多吾兵少徐行則易為所及速進則彼所不測虜見吾竈日增必謂郡兵來迎衆多行速必憚追我孫臏見弱吾今示強藝有不同故也既到郡兵不滿三千而羌衆萬餘攻圍赤亭數十日詡乃令軍中使強弩勿發而潛發小弩羌以為矢力弱不能至并兵急攻詡於是使二十強弩共射一人發無不中羌大震退詡因出城奮擊多所傷殺明日悉陳其兵衆令從東郭門出北郭門入貿易衣服回轉數周羌不知其數更相恐動詡計賊當退乃潛遣五百餘人於淺水設伏候其走路虜果大奔因掩擊大破之斬獲甚衆賊由是敗散南入益州詡乃占相地藝築營壁百八十所招還流亡假賑貧人郡遂以安先是運道艱險舟車不通驢馬負載僦五致一詡乃自將吏士案行川谷自沮至下辨數十里中皆燒石翦木開漕船道以人僦直雇借傭者於是水運通利歲省四千餘萬詡始到郡戶裁盈萬及綏聚荒餘招還流散二三年間遂增至四萬餘戶鹽米豐賤十倍於前坐法免永建元年代陳禪為司隸校尉數月間奏太傅馮石太尉劉熹中常侍程璜陳秉孟生李閏等百官側目號為苛刻三公劾奏詡盛夏多拘繫無辜為吏人患詡上書自訟曰法禁者俗之堤防刑罰者人之銜轡今州曰任郡郡曰任縣更相委遠百姓怨窮以苟容為賢盡節為愚臣所發舉臧罪非一二府恐為臣所奏遂加誣罪臣將從史魚死即以尸諫耳順帝省其章乃為免司空陶敦時中常侍張防特用權藝每請託受取詡輒案之而屢寢不報詡不勝其憤乃自繫廷尉奏言曰昔孝安皇帝任用樊豐遂交亂嫡統幾亡社稷今者張防復弄威柄國家之禍將重至矣臣不忍與防同朝謹自繫以聞無令臣襲楊震之迹書奏防流涕訴帝詡坐論輸左校防必欲害之二日之中傳考四獄獄吏勸詡自引詡曰寧伏歐刀以示遠近宦者孫程張賢等知詡以忠獲罪乃相率奏乞見程曰陛下始與臣等造事之時常疾姦臣知其傾國今者即位而復自為何以非先帝乎司隸校尉虞詡為陛下盡忠而更被拘繫常侍張防臧罪明正反搆忠良今客星守羽林其占宮中有姦臣宜急收防送獄以塞天變下詔出詡還假印綬時防立在帝後程乃叱防曰姦臣張防何不下殿防不得已趨就東箱程曰陛下急收防無令從阿母求請帝問諸尚書尚書賈朗素與防善證詡之罪帝疑焉謂程曰且出吾方思之於是詡子顗與門生百餘人舉幡候中常侍高梵車叩頭流血訴言枉狀梵乃入言之防坐徙邊賈朗等六人或死或黜即日赦出詡程復上書陳詡有大功語甚切激帝感悟復徵拜議郎數日遷尚書僕射是時長吏二千石聽百姓謫罰者輸贖號為義錢託為貧人儲而守令因以聚斂詡上疏曰元年以來貧百姓章言長吏受取百萬以上者胸胸不絶謫罰吏人至數千萬而三公刺史少所舉奏尋永平章和中州郡以走卒錢給貸貧人司空劾案州及郡縣皆坐免黜今宜遵前典蠲除權制於是詔書下詡章切責州郡謫罰輸贖自此而止先是寧陽主簿詣闕訴其縣令之枉積六七歲不省主簿乃上書曰臣為陛下子陛下為臣父臣章百上終不見省臣豈可北詣單于以告怨乎帝大怒持章示尚書尚書遂劾以大逆詡駮之曰主簿所訟乃君父之怨百上不達是有司之過愚蠢之人不足多誅帝納詡言笞之而已詡因謂諸尚書曰小人有怨不遠千里斷髮刻肌詣闕告訴而不為理豈臣下之義君與濁長吏何親而與怨人何仇乎聞者皆慙詡又上言臺郎顯職仕之通階今或一郡七八或一州無人宜令均平以厭天下之望及諸奏議多見從用詡好刺舉無所回容數以此忤權戚遂九見譴考三遭刑罰而剛正之性終老不屈永和初遷尚書令以公事去官朝廷思其忠復徵之會卒臨終謂其子恭曰吾事君直道行己無愧所悔者為朝歌長時殺賊數百人其中何能不有冤者自此二十餘年家門不增一口斯獲罪於天也恭有俊才官至上黨太守傅燮字南容北地靈州人也本字幼起慕南容三復白圭乃易字焉身長八尺有威容少師事太尉劉寬再舉孝廉聞所舉郡將喪乃𠫓廾官行服後為護軍司馬與左中郎將皇甫嵩俱討賊張角燮素疾中官既行因上疏曰臣聞天下之禍不由於外皆興於內是故虞舜升朝先除四凶然後用十六相明惡人不去則善人無由進也今張角起於趙魏黃巾亂於六州此皆釁發蕭牆而禍延四海者也臣受戎任奉辭伐罪始到潁川戰無不克寸黃巾雖盛不足為廟堂憂也臣之所懼在於治水不自其源末流彌增其廣耳陛下仁德寬容多所不忍故閹豎弄權忠臣不進誠使張角梟夷黃巾變服臣之所憂甫益深耳何者夫邪正之人不宜共國亦猶冰炭不可同器彼知正人之功顯而危亡之兆見皆將巧辭飾説共長虛偽夫孝子疑於屢至巿虎成於三夫若不詳察真偽忠臣將復有杜郵之戮矣陛下宜思虞舜四罪之舉速行讒佞放殛之誅則善人思進姦凶自息臣聞忠臣之事君猶孝子之事父也子之事父焉得不盡其情使臣身備鈇鉞之戮陛下少用其言國之福也書奏宦者趙忠見而忿惡及破張角燮功多當封忠訴譖之靈帝猶識燮言得不加罪竟亦不封以為安定都尉以疾免後拜議郎會西羌反邊章韓遂作亂隴右徵發天下役賦無已司徒崔烈以為宜𠫓廾涼州詔會公卿百官烈堅執先議燮厲言曰斬司徒天下乃安尚書郎楊贊奏燮廷辱大臣帝以問燮燮對曰昔冒頓至逆也樊噲為上將願得十萬衆橫行胸奴中憤激思奮未失人臣之節顧計當從與不耳季布猶曰噲可斬也今涼州天下要國家藩衛高祖初興使酈商別定隴右世宗拓境列置四郡議者以為斷胸奴右臂今牧御失和使一州叛逆海內為之騷動陛下臥不安寢烈為宰相不念為國思所以弭之之策乃欲割𠫓廾一方萬里之土臣竊惑之若使左衽之虜得居此地士徑甲堅因以為亂此天下之至慮社稷之深憂也若烈不知之是極蔽也知而故言是不忠也帝從燮議由是朝廷重其方格每公卿有缺為衆議所歸頃之趙忠為車騎將軍詔忠論討黃巾之功執金吾甄舉等謂忠曰傅南容前在東軍有功不侯故天下失望今將軍親當重任宜進賢理屈以副衆心忠納其言遣弟城門校尉延致殷勤延謂燮曰南容少答我常侍萬戶侯不足得也燮正色拒之曰遇與不遇命也有功不論時也傅燮豈求私賞哉忠愈懷恨然憚其名不敢害權貴亦多疾之是以不得留出為漢陽太守初郡將范津明知人舉燮孝廉及津為漢陽與燮交代合符而去鄉邦榮之津字文淵南陽人燮善恤人叛羌懷其恩化並來降附乃廣開屯田列置四十餘營時刺史耿鄙委任治中程球球為通姦利士人怨之中平四年鄙率六郡兵討金城賊王國韓遂等燮知鄙失衆必敗諫曰使君統政日淺人未知教孔子曰不教人戰是謂𠫓廾之今率不習之人越大隴之阻將十舉十危而賊聞大軍將至必萬人一心邊兵多勇其鋒難當而新合之衆上下未和萬一內變雖悔無及不若息軍養德明賞必罰賊得寬挺必謂我怯羣惡爭藝其離可必然後率已教之人討已離之賊其功可坐而待也今不為萬全之福而就必危之禍竊為使君不取鄙不從行至狄道果有反者先殺程球次害鄙賊遂進圍漢陽城中兵少糧盡燮猶固守時北地胡騎數千隨賊攻郡皆夙懷燮恩共於城外叩頭求送燮歸鄉里子幹年十三從在官舍知燮性剛有高義恐不能屈志以免進諫曰國家昏亂遂令大人不容於朝今天下已叛而兵不足自守鄉里羌胡先被恩德欲令𠫓廾郡而歸願必許之徐至鄉里率厲義徒見有道而輔之以濟天下言未終燮慨然而歎呼幹小字曰別成汝知吾必死邪蓋聖達節次守節且殷紂之暴伯夷不食周粟而死仲尼稱其賢今朝廷不甚殷紂吾德亦豈絶伯夷世亂不能養浩然之志食祿又欲避其難乎吾行何之必死於此汝有才智勉之勉之主簿楊會吾之程嬰也幹哽咽不能復言左右皆泣下王國使故酒泉太守黃衍説燮曰成敗之事已可知矣先起上有霸王之業下成伊呂之勳天下非復漢有府君寧有意為吾屬師乎燮案劒叱衍曰若剖符之臣反為賊説邪遂麾左右進兵臨陳戰歿諡曰壯節侯幹知名位至扶風太守蓋勳字元固敦煌廣至人也家世二千石初舉孝廉為漢陽長史時武威太守倚恃權藝恣行貪橫從事武都蘇正和案致其罪涼州刺史梁鵠畏懼貴戚欲殺正和以免其負乃訪之於勳勳素與正和有仇或勸勳可因此報隙勳曰不可謀事殺良非忠也乘人之危非仁也乃諫鵠曰夫紲食鷹鳶欲其鷙鷙而亨之將何用哉鵠從其言正和喜於得免而詣勳求謝勳不見曰吾為梁使君謀不為蘇正和也怨之如初中平元年北地羌胡與邊章等寇亂隴右刺史左昌因軍興斷盜數千萬勳固諫昌怒乃使勳別屯阿陽以拒賊鋒欲因軍事罪之而勳數有戰功邊章等遂攻金城殺郡守陳懿勳勸昌救之不從邊章等進圍昌於冀昌懼而召勳勳初與從事辛曾孔常俱屯阿陽及昌檄到曾等疑不肯赴勳怒曰昔莊賈後期穰苴奮劒今之從事豈重於古之監軍哉曾等懼而從之勳即率兵救昌到乃誚讓章等責以背叛之罪皆曰左使君若早從君言以兵臨我庶可自改今罪已重不得降也乃解圍而去昌坐斷盜徵以扶風宋梟代之梟患多寇叛謂勳曰涼州寡於學術故屢致反暴今欲多寫孝經令家家習之庶或使人知義勳諫曰昔太公封齊崔杼殺君伯禽侯魯慶父篡位此二國豈乏學者今不急靜難之術遽為非常之事既足結怨一州又當取笑朝廷勳不知其可也梟不從遂奏行之果被詔書詰責坐以虛慢徵時叛羌圍護羌校尉夏育於畜官勳與州郡合兵救育至狐槃為羌所破勳收餘衆百餘人為魚麗之陳羌精騎夾攻之急士卒多死勳被三創堅不動乃指木表曰必尸我於此句就種羌滇吾素為勳所厚乃以兵扞衆曰蓋長史賢人汝曹殺之者為負天勳仰罵曰死反虜汝何知促來殺我衆相視而驚滇吾下馬與勳勳不肯上遂為賊所執羌戎服其義勇不敢加害送還漢陽後刺史楊雍即表勳領漢陽太守時人飢相漁食勳調穀稟之先出家糧以率衆存活者千餘人後去官徵拜討虜校尉靈帝召見問天下何苦而反亂如此勳曰幸臣子弟擾之時宦者上軍校尉蹇碩在坐帝顧問碩碩懼不知所對而以此恨勳帝又謂勳曰吾已陳師於平樂觀多出中藏財物以餌士何如勳曰臣聞先王耀德不觀兵今寇在遠而設近陳不足昭果毅秪黷武耳帝曰善恨見君晚羣臣初無是言也勳時與宗正劉虞佐軍校尉袁紹同典禁兵勳謂虞紹曰吾仍見上上甚聰明但擁蔽於左右耳若共併力誅嬖幸然後徵拔英俊以興漢室功遂身退豈不快乎虞紹亦素有謀因相連結未及發而司隸校尉張溫舉勳為京兆尹帝方欲延接勳而蹇碩等心憚之並勸從溫奏遂拜京兆尹時長安令楊黨父為中常侍恃藝貪放勳案得其臧千餘萬貴戚咸為之請勳不聽具以事聞并連黨父有詔窮案威震京師時小黃門京兆高望為尚藥監幸於皇太子太子因蹇碩屬望子進為孝廉勳不肯用或曰皇太子副主望其所愛碩帝之寵臣而子違之所謂三怨成府者也勳曰選賢所以報國也非賢不舉死亦何悔勳雖在外每軍國密事帝常手詔問之數加賞賜甚見親信在朝臣右及帝崩董卓廢少帝殺何太后勳與書曰昔伊尹霍光權以立功猶可寒心足下小醜何以終此賀者在門弔者在廬可不慎哉卓得書意甚憚之徵為議郎時左將軍皇甫嵩精兵三萬屯扶風勳密相要結將以討卓會嵩亦被徵勳以衆弱不能獨立遂並還京師自公卿以下莫不卑下於卓唯勳長揖爭禮見者皆為失色卓問司徒王允曰欲得快司隸校尉誰可作者允曰唯有蓋京兆耳卓曰此人明智有餘然不可假以雄職乃以為越騎校尉卓又不欲令久典禁兵復出為潁川太守未及至郡徵還京師時河南尹朱俊為卓陳軍事卓折俊曰我百戰百勝決之於心卿勿妄説且汙我刀勳曰昔武丁之明猶求針諫況如卿者而欲杜人之口乎卓曰戲之耳勳曰不聞怒言可以為戲卓乃謝俊勳雖強直不屈而內厭於卓不得意疽發背卒時年五十一遺令勿受卓賻贈卓欲外示寬容表賜東園祕器賵襚送之如禮葬于安陵子順官至永陽太守臧洪字子源廣陵射陽人也父旻有幹事才熹平元年會稽妖賊許昭起兵句章自稱大將軍立其父生為越王攻破城邑衆以萬數拜旻揚州刺史旻率丹揚陽太守陳夤擊昭破之昭遂復更屯結大為人患旻等進兵連戰三年破平之獲昭父子斬首數千級遷旻為使胸奴中郎將洪年十五以父功拜童子郎知名太學洪體貌魁梧有異姿舉孝廉補即丘長中平末𠫓廾官還家太守張超請為功曹時董卓殺弒帝圖危社稷洪説超曰明府歷世受恩兄弟並據大郡今王室將危賊臣虎視此誠義士效命之秋也今郡境尚全吏人殷富若動桴鼓可得二萬人以此誅除國賊為天下唱義不亦宜乎超然其言與洪西至陳留見兄邈計事邈先謂超曰聞弟為郡委攻臧洪洪者何如人超曰臧洪海內奇士才略智數不比於超矣邈即引洪與語大異之乃使詣兗州刺史劉岱豫州刺史孔胄遂皆相善邈既先有謀約會超至定議乃與諸牧守大會酸棗設壇場將盟既而更相辭讓莫敢先登咸共推洪洪乃攝衣升壇操血而盟曰漢室不幸皇綱失統賊臣董卓乘釁縱害禍加至尊毒流百姓大懼淪喪社稷翦覆四海兗州刺史岱豫州刺史胄陳留太守邈東郡太守瑁廣陵太守超等糾合義兵並赴國難凡我同盟齊心一力以致臣節隕首喪元必無二志有渝此盟俾墜其命無克遺育皇天后土祖宗明靈實皆鑒之洪辭氣慷慨聞其言者無不激揚自是之後諸軍各懷疑莫適先進遂使糧儲單竭兵衆乖散時討虜校尉公孫瓚與大司馬劉虞有隙超乃遣洪詣虞共謀其難行至河間而值幽冀交兵行塗阻絶因寓於袁紹紹見洪甚奇之與結友好以洪領青州刺史前刺史焦和好立虛譽能清談時黃巾羣盜處處飈起而青部殷實軍革尚衆和欲與諸同盟西赴京師未及得行而賊已屠城邑和不理戎警但坐列巫史禜禱羣神又恐賊乘凍而過命多作陷冰丸以投于河衆遂潰散和亦病卒洪收撫離叛百姓復安在事二年袁紹憚其能徙為東郡太守都東武陽時曹操圍張超於雍丘甚危急超謂軍吏曰今日之事唯有臧洪必來救我或曰袁曹方穆而洪為紹所用恐不能敗好遠來違福取禍超曰子源天下義士終非背本者也或見制強力不相及耳洪始聞超圍及徒跣號泣並勒所領將赴其難自以衆弱從紹請兵而紹竟不聽之超城遂陷張氏族滅洪由是怨紹絶不與通紹興兵圍之歷年不下使洪邑人陳琳以書譬洪示其禍福責以恩義洪答曰遺比辱雅況述禍福公私切至以子之才窮該典籍豈將暗於大道不達余趣哉是以損𠫓廾翰墨一無所酬亦冀遙忖褊心粗識鄙性重獲來命援引紛紜雖欲無對而義篤其言還接刃乎每登城臨兵觀主人之旗鼓瞻望帳幄感故友之周旋撫弦搦矢不覺涕流之覆面也何者自以輔佐主人無以為悔主人相接過絶等倫受任之初志同大事掃清寇逆共尊王室豈悟本州被侵郡將遘厄請師見拒辭行被拘使洪故君遂至淪滅區區微節無所獲申豈得復全交友之道重虧忠孝之名乎所以忍悲揮戈收淚告絶若使主人少垂古人忠恕之情來者側席去者克己則僕抗季札之志不為今日之戰矣獲傳之故不蒙觀過之貸而受夷滅之禍呂奉先討卓來奔請兵不獲告去何罪復見斫刺劉子璜奉使踰時辭不獲命畏君懷親以詐求歸可謂有志忠孝無損霸道亦復僵尸麾下不蒙虧除慕進者蒙榮違意者被戮此乃主人之利非遊士之願也是以鑒戒前人守死窮城亦以君子之違不適敵國故也義而傾覆也昔晏嬰不降志於白刃南史不曲筆以求存故身傳圖象名垂後世況僕據金城之固驅士人之力散三年之畜以為一年之資匡困補乏以悅天下何圖築室反耕哉但懼秋風揚塵伯圭馬首南向張揚飛燕旅力作難北鄙將告倒懸之急股肱奏乞歸之記耳主人當鑒戒曹輩反旌退師何宜久辱盛怒暴威於吾城之下哉創基兆於緑林卒能龍飛受命中興帝業苟可輔主興化夫何嫌哉況僕親奉璽書與之從事於長安子謂余身死而名滅僕亦笑子生死而無聞焉本同末離努力努力夫復何言紹見洪書知無降意增兵急攻城中糧盡外無援救洪自度不免呼吏士謂曰袁紹無道所圖不軌且不救洪郡將洪於大義不得不死念諸君無事空與此禍可先城未破將妻子出將吏皆垂泣曰明府之於袁氏本無怨隙今為郡將之故自致危困吏人何忍當捨明府去也初尚掘鼠筋角後無所復食主簿啓內廚米三斗請稍為饘粥洪曰何能獨甘此邪使為薄糜遍班士衆又殺其愛妾以食兵將兵將咸流涕無能仰視男女七八十人相枕而死莫有離叛城陷生執洪紹盛帷幔大會諸將見洪謂曰臧洪何相負若是今日服未洪據地瞋目曰諸袁事漢四世五公可謂受恩今王室衰弱無扶翼之意而欲因際會觖望非冀多殺忠良以立姦威洪親見將軍呼張陳留為兄則洪府君亦宜為弟而不能同心戮力為國除害坐擁兵衆觀人屠滅惜洪力劣不能推刃為天下報仇何謂服乎紹本愛洪意欲屈服赦之見其辭切知終不為用乃命殺焉洪邑人陳容少為諸生親慕於洪隨為東郡丞先城未敗洪使歸紹時容在坐見洪當死起謂紹曰將軍舉大事欲為天下除暴而專先誅忠義豈合天意臧洪發舉為郡將奈何殺之紹慙使人牽出謂曰汝非臧洪疇空復爾為容顧曰夫仁義豈有常所蹈之則君子背之則小人今日寧與臧洪同日死不與將軍同日生也遂復見殺在紹坐者無不歎息竊相謂曰如何一日戮二烈士先是洪遣司馬二人出求救於呂布比還城已陷皆赴敵死論曰雍丘之圍臧洪之感憤壯矣想其行跣且號束甲請舉誠足憐也夫豪雄之所趣舍其與守義之心異乎若乃締謀連衡懷詐算以相尚者蓋惟利藝所在而已況偏城既危曹袁方穆洪徒指外敵之衡以紓倒縣之會忿悁之師兵家所忌可謂懷哭秦之節存荊則未聞也贊曰先零擾疆鄧崔𠫓廾涼詡燮令圖再全金方蓋勳抗董終然允剛洪懷偏節力屈志揚
