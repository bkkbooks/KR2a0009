body:
  text: 後漢書卷二十五卓魯魏劉列傳第十五魯恭弟丕卓茂字子康南陽宛人也父祖皆至郡守茂元帝時學於長安事博士江生習詩禮及歷筭究極師法稱為通儒性寬仁恭愛鄉黨故舊雖行能與茂不同而皆愛慕欣欣焉初辟丞相府史事孔光光稱為長者時嘗出行有人認其馬茂問曰子亡馬幾何時對曰月餘日矣茂有馬數年心知其謬嘿解與之挽車而去顧曰若非公馬幸至丞相府歸我他日馬主別得亡者乃詣府送馬叩頭謝之茂性不好爭如此後以儒術舉為侍郎給事黃門遷密令勞心諄諄視人如子舉善而教口無惡言吏人親愛而不忍欺之人嘗有言部亭長受其米肉遺者茂辟左右問之曰亭長為從汝求乎為汝有事囑之而受乎將平居自以恩意遺之乎人曰往遺之耳茂曰遺之而受何故言邪人曰竊聞賢明之君使人不畏吏吏不取人今我畏吏是以遺之吏既卒受故來言耳茂曰汝為敝人矣凡人所以貴於禽獸者以有仁愛知相敬事也今鄰里長老尚致饋遺此乃人道所以相親況吏與民乎吏顧不當乘威力強請求耳凡人之生羣居雜處故有經紀禮義以相交接汝獨不欲修之寧能高飛遠走不在人閒邪亭長素善吏歲時遺之禮也人曰苟如此律何故禁之茂笑曰律設大法禮順人情今我以禮教汝汝必無怨惡以律治汝何所措其手足乎一門之內小者可論大者可殺也且歸念之於是人納其訓吏懷其恩初茂到縣有所廢置吏人笑之鄰城聞者皆蚩其不能河南郡為置守令茂不為嫌理事自若數年教化大行道不拾遺平帝時天下大蝗河南二十餘縣皆被其災獨不入密縣界督郵言之太守不信自出案行見乃服焉是時王莽秉政置大司農六部丞勸課農桑遷茂為京部丞密人老少皆涕泣隨送及莽居攝以病免歸郡常為門下掾祭酒不肯作職吏更始立以茂為侍中祭酒從至長安知更始政亂以年老乞骸骨歸時光武初即位先訪求茂茂詣河陽謁見乃下詔曰前密令卓茂束身自修執節淳固誠能為人所不能為夫名冠天下當受天下重賞故武王誅紂封比干之墓表商容之閭今以茂為太傅封襃德侯食邑二千戶賜几杖車馬衣一襲絮五百斤復以茂長子戎為太中大夫次子崇為中郎給事黃門建武四年薨賜棺椁冢地車駕素服親臨送葬子崇嗣徙封汎鄉侯官至大司農崇卒子棽嗣棽卒子訢嗣訢卒子隆嗣永元十五年隆卒無子國除初茂與同縣孔休陳留蔡勳安衆劉宣楚國龔勝上黨鮑宣六人同志不仕王莽時並名重當時休字子泉哀帝初守新都令後王莽秉權休去官歸家及莽篡位遣使齎玄纁束帛請為國師遂歐血託病杜門自絕光武即位求休勳子孫賜穀以旌顯之劉宣字子高安衆侯崇之從弟知王莽當篡乃變名姓抱經書隱避林藪建武初乃出光武以宣襲封安衆侯擢龔勝子賜為上谷太守勝鮑宣事在前書勳事在玄孫邕傳論曰建武之初雄豪方擾虓呼者連響嬰城者相望斯固倥傯不暇給之日卓茂斷斷小宰無它庸能時已七十餘矣而首加聘命優辭重禮其與周燕之君表閭立館何異哉於是蘊憤歸道之賓越關阻捐宗族以排金門者衆矣夫厚性寬中近於仁犯而不校鄰於恕率斯道也怨悔曷其至乎魯恭字仲康扶風平陵人也其先出於魯傾頃公為楚所滅遷於下邑因氏焉世吏二千石哀平閒自魯而徙祖父匡王莽時為羲和有權數號曰智囊父某建武初為武陵太守卒官時恭年十二弟丕七歲晝夜號踴不絕聲郡中賻贈無所受乃歸服喪禮過成人鄉里奇之十五與母及丕俱居太學習魯詩閉戶講誦絕人閒事兄弟俱為諸儒所稱學士爭歸之太尉趙憙慕其志每歲時遣子問以酒糧皆辭不受恭憐丕小欲先就其名託疾不仕郡數以禮請謝不肯應母強遣之恭不得已而西因留新豐教授建初初丕舉方正恭始為郡吏太傅趙憙聞而辟之肅宗集諸儒於白虎觀恭特以經明得召與其議憙復舉恭直言待詔公車拜中牟令恭專以德化為理不任刑罰訟人許伯等爭田累守令不能決恭為平理曲直皆退而自責輟耕相讓亭長從人借牛而不肯還之牛主訟於恭恭召亭長勑令歸牛者再三猶不從恭歎曰是教化不行也欲解印綬去掾史泣涕共留之亭長乃慙悔還牛詣獄受罪恭貰不問於是吏人信服建初七年郡國螟傷稼犬牙緣界不入中牟河南尹袁安聞之疑其不實使仁恕掾肥親往廉之恭隨行阡陌俱坐桑下有雉過止其傍傍有童兒親曰兒何不捕之兒言雉方將雛親瞿然而起與恭訣曰所以來者欲察君之政迹耳今蟲不犯境此一異也化及鳥獸此二異也豎子有仁心此三異也久留徒擾賢者耳還府具以狀白安是歲嘉禾生恭便坐廷中安因上書言狀帝異之會詔百官舉賢良方正恭薦中牟名士王方帝即徵方詣公車禮之與公卿所舉同方致位侍中恭在事三年州舉尤異會遭母喪去官吏人思之後拜侍御史和帝初立議遣車騎將軍竇憲與征西將軍耿秉擊匈奴恭上疏諫曰陛下親勞聖思日不食憂在軍役誠欲以安定北垂為人除患定萬世之計也臣伏獨思之未見其便社稷之計萬人之命在於一舉數年以來秋稼不熟人食不足倉庫空虛國無畜積會新遭大憂人懷恐懼陛下躬大聖之德履至孝之行盡諒陰三年聽於冢宰百姓闕然三時不聞警蹕之音莫不懷思皇皇若有求而不得今乃以盛春之月興發軍役擾動天下以事戎夷誠非所以垂恩中國改元正時由內及外也之舛錯況於人乎故愛人者必有天報昔太王重人命而去邠故獲上天之祐夫戎狄者四方之異氣也蹲夷踞肆與鳥獸無別若雜居中國則錯亂天氣汙辱善人是以聖王之制羈縻不絕而已則陰陽和於上祥風時雨覆被遠方夷狄重譯而至矣易曰有孚盈缶終來有它吉言甘雨滿我之缶誠來有我而吉已夫以德勝人者昌以力勝人者亡今匈奴為鮮卑所殺遠臧於史侯河西去塞數千里而欲乘其虛耗利其微弱是非義之所出也前太僕祭肜遠出塞外卒不見一胡而兵已困矣白山之難不絕如綖都護陷沒士卒死者如積迄今被其辜毒孤寡哀思之心未弭仁者念之以為累息柰何復欲襲其迹不顧患難乎今始徵發而大司農調度不足使者在道分部督趣上下相迫民閒之急亦已甚矣三輔并涼少雨麥根枯焦牛死日甚此其不合天心之效也羣僚百姓咸曰不可陛下獨柰何以一人之計𠫓廾萬人之命不卹其言乎上觀天心下察人志足以知事之得失臣恐中國不為中國豈徒匈奴而已哉惟陛下留聖恩休罷士卒以順天心其後拜為魯詩博士由是家法學者日盛遷侍中數召讌見問以得失賞賜恩禮寵異焉遷樂安相是時東州多盜賊羣輩攻劫諸郡患之恭到重購賞開恩信其渠帥張漢等率支黨降恭上以漢補博昌尉其餘遂自相捕擊盡破平之州郡以安永元九年徵拜議郎八月飲酎齋會章臺詔使小黃門特引恭前其夜拜侍中勑使陪乘勞問甚渥冬遷光祿勳選舉清平京師貴戚莫能枉其正十二三年代呂蓋為司徒十五年從巡狩南陽除子撫為郎中賜駙馬從駕時弟丕亦為侍中兄弟父子並列朝廷後坐事策免殤帝即位以恭為長樂衞尉永初元年復代梁鮪為司徒初和帝末下令麥秋得案驗薄刑而州郡好以苛察為政因此遂盛夏斷獄恭上疏諫曰臣伏見詔書敬若天時憂念萬民為崇和氣罪非殊死且勿案驗進柔良退貪殘奉時令所以助仁德順昊天致和氣利黎民者也事之原進良退殘之化因以盛夏徵召農人拘對考驗連滯無已司隸典司京師四方是則而近於春月分行諸部託言勞來貧人而無隱惻之實煩擾郡縣廉考非急逮捕一人罪延十數上逆時氣下傷農業案易五月姤用事經曰后以施令誥四方言君以夏至之日施命令止四方行者所以助微陰也行者尚止之況於逮召考掠奪其時哉比年水旱傷稼人飢流今始夏百穀權輿陽氣胎養之時自三月以來陰寒不暖物當化變而不被和氣月令孟夏斷薄刑出輕繫行秋令則苦雨數來五穀不熟又曰仲夏挺重囚益其食行秋令則草木零落人傷於疫夫斷薄刑者謂其輕罪已正不欲令久繫故時斷之也臣愚以為今孟夏之制可從此令其決獄案考皆以立秋為斷以順時節育成萬物則天地以和刑罰以清矣初肅宗時斷獄皆以冬至之前自後論者互多駮異鄧太后詔公卿以下會議恭議奏曰夫陰陽之氣相扶而行發動用事各有時節若不當其時則物隨而傷王者雖質文不同而茲道無變四時之政行之若一月令周世所造而所據皆夏之時也其變者唯正朔服色犧牲徽號器械而已故曰殷因於夏禮周因於殷禮所損益可知也易曰潛龍勿用言十一月十二月陽氣潛臧未得用事雖煦噓萬物養其根荄而猶盛陰在上地涷水冰陽氣否隔閉而成冬故曰履霜堅冰陰始凝也馴致其道至堅冰也言五月微陰始起至十一月堅冰至也承天心順物性命以致時雍然從變改以來年歲不熟穀價常貴人不寧安小吏不與國同心者率入十一月得死罪賊不問曲直便即格殺雖有疑罪不復讞正一夫吁嗟王道為虧況於衆乎易十一月君子以議獄緩死可令疑罪使詳其法大辟之科盡冬月乃斷其立春在十二月中者勿以報囚如故事恭再在公位選辟高第至列卿郡守者數十人而其耆舊大姓或不蒙薦舉至有怨望者恭聞之曰學之不講是吾憂也諸生不有鄉舉者乎終無所言恭性謙退奏議依經潛有補益然終不自顯故不以剛直為稱三年以老病策罷六年年八十一卒於家以兩子為郎長子謙為隴西太守有名績謙子旭官至太僕從獻帝西入關與司徒王允同謀共誅董卓及李傕入長安旭與允俱遇害丕字叔陵性沈深好學孳孳不倦遂杜絕交游不荅候問之禮士友常以此短之而丕欣然自得遂兼通五經以魯詩尚書教授為當世名儒後歸郡為督郵功曹所事之將無不師友待之建初元年肅宗詔舉賢良方正大司農劉寬舉丕時對策者百有餘人唯丕在高第除為議郎遷新野令視事朞年州課第一擢拜青州刺史務在表賢明慎刑罰七年坐事下獄司寇論元和元年徵再遷拜趙相門生就學者常百餘人關東號之曰五經復興魯叔陵趙王商嘗欲避疾便時移住學官丕止不聽王乃上疏自言詔書下丕丕奏曰臣聞禮諸侯薨於路寢大夫卒於嫡室死生有命未有逃避之典也學官傳五帝之道修先王禮樂教化之處王欲廢塞以廣游讌事不可聽詔從丕言王以此憚之其後帝巡狩之趙特被引見難問經傳厚加賞賜在職六年嘉瑞屢降吏人重之永元二年遷東郡太守丕在二郡為人修通溉灌百姓殷富數薦達幽隱名士明年拜陳留太守視事三朞後坐稟貧人不實徵司寇論十一年復徵再遷中散大夫時侍中賈逵薦丕道蓺深明宜見任用和帝因朝會召見諸儒丕與侍中賈逵尚書令黃香等相難數事帝善丕說罷朝特賜冠幘履韈衣一襲丕因上疏曰臣以愚頑顯備大位犬馬氣衰猥得進見論難於前無所甄明衣服之賜誠為優過臣聞說經者傳先師之言非從己出不得相讓相讓則道不明若規矩權衡之不可枉也難者必明其據說者務立其義浮華無用之言不陳於前故精思不勞而道術愈章法異者各令自說師法博觀其義覽詩人之旨意察雅頌之終始明舜禹臯陶之相戒顯周公箕子之所陳觀乎人文化成天下陛下既廣納謇謇以開四聰無令芻蕘以言得罪既顯巖穴以求仁賢無使幽遠獨有遺失十三年遷為侍中免永初二年詔公卿舉儒術篤學者大將軍鄧騭舉丕再遷復為侍中左中郎將再為三老五年年七十五卒於官魏霸字喬卿濟陰句陽人也世有禮義霸少喪親兄弟同居州里慕其雍和建初中舉孝廉八遷和帝時為鉅鹿太守以簡朴寬恕為政掾史有過要霸先誨其失不改者乃罷之吏或相毀訴霸輒稱它吏之長終不及人短言者懷慙譖訟遂息永元十六年徵拜將作大匠明年和帝崩典作順陵時盛冬地凍中使督促數罰縣吏以厲霸霸撫循而已初不切責而反勞之曰令諸卿被辱大匠過也吏皆懷恩力作倍功延平元年代尹勤為太常明年以病致仕為光祿大夫永初五年拜長樂衞尉以病乞身復為光祿大夫卒於官劉寬字文饒弘農華陰人也父崎順帝時為司徒寬嘗行有人失牛者乃就寬車中認之寬無所言下駕步歸有頃認者得牛而送還叩頭謝曰慙負長者隨所刑罪寬曰物有相類事容脫誤幸勞見歸何為謝之州里服其不校桓帝時大將軍辟五遷司徒長史時京師地震特見詢問再遷出為東海相延熹八年徵拜尚書令遷南陽太守典歷三郡溫仁多恕雖在倉卒未嘗疾言遽色常以為齊之以刑民免而無恥吏人有過但用蒲鞭罰之示辱而已終不加苦事有功善推之自下災異或見引躬克責每行縣止息亭傳輒引學官祭酒及處士諸生執經對講見父老慰以農里之言少年勉以孝悌之訓人感德興行日有所化靈帝初徵拜太中大夫侍講華光殿遷侍中賜衣一襲轉屯騎校尉遷宗正轉光祿勳熹平五年代許訓為太尉靈帝頗好學蓺每引見寬常令講經寬嘗於坐被酒睡伏帝問太尉醉邪寬仰對曰臣不敢醉但任重責大憂心如醉帝重其言寬簡略嗜酒不好盥浴京師以為諺嘗坐客遣蒼頭市酒迂久大醉而還客不堪之罵曰畜產寬須臾遣人視奴疑必自殺顧左右曰此人也罵言畜產辱孰甚焉故吾懼其死也夫人欲試寬令恚伺當朝會裝嚴已訖使侍婢奉肉羹飜汙朝衣婢遽收之寬神色不異乃徐言曰羹爛汝手其性度如此海內稱為長者後以日食策免拜衞尉光和二年復代段熲為太尉在職三年以日變免又拜永樂少府遷光祿勳以先策黃巾逆謀以事上聞封逯鄉侯六百戶中平二年卒時年六十六贈車騎將軍印綬位特進謚曰昭烈侯子松嗣官至宗正贊曰卓魯款款情売心德滿仁感昆蟲愛及胎卵寬霸臨政亦稱優緩
