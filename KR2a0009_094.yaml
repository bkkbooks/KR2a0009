body:
  text: 後漢書卷八十四列女傳第七十四詩書之言女德尚矣若夫賢妃助國君之政哲婦隆家人之道高士弘清淳之風貞女亮明白之節則其徽美未殊也而世典咸漏焉故自中興以後綜其成事述為列女篇如馬鄧梁后別見前紀梁嫕李姬各附家傳若斯之類並不兼書餘但次才行尤高秀者不必專在一操而已勃海鮑宣妻者桓氏之女也字少君宣嘗就少君父學父奇其清苦故以女妻之裝送資賄甚盛宣不悅謂妻曰少君生富驕習美飾而吾實貧賤不敢當禮妻曰大人以先生修德守約故使賤妾侍執巾櫛既奉承君子唯命是從宣笑曰能如是是吾志也妻乃悉歸侍御服飾更著短布裳與宣共挽鹿車歸鄉里拜姑禮畢提甕出汲修行婦道鄉邦稱之宣哀帝時官至司隸校尉子永中興初為魯郡太守永子昱從容問少君曰太夫人寧復識挽鹿車時不對曰先姑有言存不忘亡安不忘危吾焉敢忘乎永昱已見前傳太原王霸妻者不知何氏之女也霸少立高節光武時連徵不仕霸已見逸人傳妻亦美志行初霸與同郡令狐子伯為友後子伯為楚相而其子為郡功曹子伯乃令子奉書於霸車馬服從雍容如也霸子時方耕於野聞賓至投耒而歸見令狐子沮怍不能仰視霸目之有愧容客去而久臥不起妻怪問其故始不肯告妻請罪而後言曰吾與子伯素不相若向見其子容服甚光舉措有適而我兒曹蓬髮歷齒未知禮則見客而有慙色父子恩深不覺自失耳妻曰君少修清節不顧榮祿今子伯之貴孰與君之高奈何忘宿志而慚兒女子乎霸屈起而笑曰有是哉遂共終身隱遁廣漢姜詩妻者同郡龐盛之女也詩事母至孝妻奉順尤篤母好飲江水水去舍六七里妻常泝流而汲後值風不時得還母渴詩責而遣之妻乃寄止鄰舍晝夜紡績市珍羞使鄰母以意自遺其姑如是者久之姑怪問鄰母鄰母具對姑感慙呼還恩養愈謹其子後因遠汲溺死妻恐姑哀傷不敢言而託以行學不在姑嗜魚鱠又不能獨食夫婦常力作供鱠呼鄰母共之舍側忽有涌泉味如江水每旦輒出雙鯉魚常以供二母之膳赤眉散賊經詩里薥兵而過曰驚大孝必觸鬼神時歲荒賊乃遺詩米肉受而埋之比落蒙其安全永平三年察孝廉顯宗詔曰大孝入朝凡諸舉者一聽平之由是皆拜郎中詩尋除江陽令卒于官所居治鄉人為立祀沛郡周郁妻者同郡趙孝之女也字阿少習儀訓間於婦道而郁驕淫輕躁多行無禮郁父偉謂阿曰新婦賢者女當以道匡夫郁之不改新婦過也阿拜而受命退謂左右曰我無樊衛二姬之行故君以責我我言而不用君必謂我不奉教令則罪在我矣若言而見用是為子違父而從婦則罪在彼矣生如此亦何聊哉乃自殺莫不傷之扶風曹世叔妻者同郡班彪之女也名昭字惠班一名姬博學高才世叔早卒有節行法度兄固著漢書其八表及天文志未及竟而卒和帝詔昭就東觀臧書閣踵而成之帝數召入宮令皇后諸貴人師事焉號曰大家每有貢獻異物輒詔大家作賦頌及鄧太后臨朝與聞政事以出入之勤特封子成關內侯官至齊相時漢書始出多未能通者同郡馬融伏於閣下從昭受讀後又詔融兄續繼昭成之永初中太后兄大將軍鄧騭以母憂上書乞身太后不欲許以問昭昭因上疏曰伏惟皇太后陛下躬盛德之美隆唐虞之政闢四門而開四聰采狂夫之瞽言納芻蕘之謀慮妾昭得以愚朽身當盛明敢不披露肝膽以效萬一妾聞謙讓之風德莫大焉故典墳述美神祇降福昔夷齊去國天下服其廉高太伯違邠孔子稱為三讓所以光昭令德揚名于後者也論語曰能以禮讓為國於從政乎何有由是言之推讓之誠其致遠矣今四舅深執忠孝引身自退而以方垂未靜拒而不許如後有毫毛加於今日誠恐推讓之名不可再得緣見逮及故敢昧死竭其愚情自知言不足采以示蟲蟻之赤心太后從而許之於是騭等各還里第焉作女誡七篇有助內訓其辭曰鄙人愚暗受性不敏蒙先君之餘寵賴母師之典訓年十有四執箕帚於曹氏于今四十餘載矣戰戰兢兢常懼黜辱以增父母之羞以益中外之纍夙夜劬心勤不告勞而今而後乃知免耳吾性疏頑教道無素恆恐子穀負辱清朝聖恩橫加猥賜金紫實非鄙人庶幾所望也男能自謀矣吾不復以為憂也但傷諸女方當適人而不漸訓誨不聞婦禮懼失容它門取恥宗族吾今疾在沈滯性命無常念汝曹如此每用惆悵閒作女誡七章願諸女各寫一通庶有補益裨助汝身去矣其勗勉之弱主下人也弄之瓦磚明其習勞主執勤也齊告先君明當主繼祭祀也三者蓋女人之常道禮法之典教矣謙讓恭敬先人後己有善莫名有惡莫辭忍辱含垢常若畏懼是謂卑弱下人也晚寢早作勿憚夙夜執務私事不辭劇易所作必成手迹整理是謂執勤也正色端操以事夫主清靜自守無好戲笑潔齊酒食以供祖宗是謂繼祭祀也三者苟備而患名稱之不聞黜辱之在身未之見也三者苟失之何名稱之可聞黜辱之可遠哉貴男女之際詩著關雎之義由斯言之不可不重也夫不賢則無以御婦婦不賢則無以事夫夫不御婦則威儀廢缺婦不事夫則義理墮闕方斯二事其用一也察今之君子徒知妻婦之不可不御威儀之不可不整故訓其男檢以書傳殊不知夫主之不可不事禮義之不可不存也但教男而不教女不亦蔽於彼此之數乎禮八歲始教之書十五而至於學矣獨不可依此以為則哉為美故鄙諺有云生男如狼猶恐其生女如鼠猶恐其虎然則修身莫若敬避彊莫若順故曰敬順之道婦人之大禮也夫敬非它持久之謂也夫順非它寬裕之謂也持久者知止足也寬裕者尚恭下也夫婦之好終身不離房室周旋遂生媟黷媟黷既生語言過矣語言既過縱恣必作縱恣既作則侮夫之心生矣此由於不知止足者也夫事有曲直言有是非直者不能不爭曲者不能不訟訟爭既施則有忿怒之事矣此由於不尚恭下者也侮夫不節譴呵從之忿怒不止楚撻從之夫為夫婦者義以和親恩以好合楚撻既行何義之存譴呵既宣何恩之有恩義俱廢夫婦離矣婦行第四女有四行一曰婦德二曰婦言三曰婦容四曰婦功夫云婦德不必才明絶異也婦言不必辨口利辭也婦容不必顏色美麗也婦功不必工巧過人也清間貞靜守節整齊行己有恥動靜有法是謂婦德擇辭而說不道惡語時然後言不厭於人是謂婦言盥浣塵穢服飾鮮潔沐浴以時身不垢辱是謂婦容專心紡績不好戲笑潔齊酒食以奉賓客是謂婦功此四者女人之大德而不可乏之者也然為之甚易唯在存心耳古人有言仁遠乎哉我欲仁而仁斯至矣此之謂也逃夫固不可離也行違神祇天則罰之禮義有愆夫則薄之故女憲曰得意一人是謂永畢失意一人是謂永訖由斯言之夫不可不求其心然所求者亦非謂佞媚苟親也固莫若專心正色禮義居潔耳無塗聽目無邪視出無冶容入無廢飾無聚會羣輩無看視門戶此則謂專心正色矣若夫動靜輕脫視聽陜輸入則亂髮壞形出則窈窕作態說所不當道觀所不當視此謂不能專心正色矣舅姑之心豈當可失哉物有以恩自離者亦有以義自破者也夫雖云愛舅姑云非此所謂以義自破者也然則舅姑之心奈何固莫尚於曲從矣姑云不爾而是固宜從令姑云爾而非猶宜順命勿得違戾是非爭分曲直此則所謂曲從矣故女憲曰婦如影響焉不可賞也由此言之我臧否譽毀一由叔妹叔妹之心復不可失也皆莫知叔妹之不可失而不能和之以求親其蔽也哉自非聖人鮮能無過故顏子貴於能改仲尼嘉其不二而況婦人者也雖以賢女之行聰哲之性其能備乎是故室人和則謗掩外內離則惡揚此必然之藝也易曰二人同心其利斷金同心之言其臭如蘭此之謂也夫嫂妹者體敵而尊恩疏而義親若淑媛謙順之人則能依義以篤好崇恩以結援使徽美顯章而瑕過隱塞舅姑矜善而夫主嘉美聲譽曜于邑鄰休光延於父母若夫憃愚之人於嫂則託名以自高於妹則因寵以驕盈驕盈既施何和之有恩義既乖何譽之臻是以美隱而過宣姑忿而夫慍毀訾布於中外恥辱集于厥身進增父母之羞退益君子之纍斯乃榮辱之本而顯否之基也可不慎哉然則求叔妹之心固莫尚於謙順矣謙則德之柄順則婦之行凡斯二者足以和矣詩云在彼無惡在此無射其斯之謂也昭女妹曹豐生亦有才惠為書以難之辭有可觀昭年七十餘卒皇太后素服舉哀使者監護喪事所著賦頌銘誄問注哀辭書論上疏遺令凡十六篇子婦丁氏為撰集之又作大家讚焉河南樂羊子之妻者不知何氏之女也羊子嘗行路得遺金一餅還以與妻妻曰妾聞志士不飲盜泉之水廉者不受嗟來之食況拾遺求利以樜其行乎羊子大慙乃捐金於野而遠尋師學一年來歸妻跪問其故羊子曰久行懷思無它異也妻乃引刀趨機而言曰此織生自蠶繭成於機杼一絲而纍以至於寸纍寸不已遂成丈匹今若斷斯織也則捐失成功稽廢時月夫子積學當日知其所亡以就懿德若中道而歸何異斷斯織乎羊子感其言復還終業遂七年不反妻常躬勤養姑又遠饋羊子嘗有它舍雞謬入園中姑盜殺而食之妻對雞不餐而泣姑怪問其故妻曰自傷居貧使食有它肉姑竟棄之後盜欲有犯妻者乃先劫其姑妻聞操刀而出盜人曰釋汝刀從我者可全不從我者則殺汝姑妻仰天而歎舉刀刎頸而死盜亦不殺其姑太守聞之即捕殺賊盜而賜妻縑帛以禮葬之號曰貞義漢中程文矩妻者同郡李法之姊也字穆姜有二男而前妻四子文矩為安衆令喪於官四子以母非所生憎毀日積而穆姜慈愛溫仁撫字益隆衣食資供皆兼倍所生或謂母曰四子不孝甚矣何不別居以遠之對曰吾方以義相導使其自遷善也及前妻長子興遇疾困篤母惻隱自然親調藥膳恩情篤密興疾久乃瘳於是呼三弟謂曰繼母慈仁出自天受吾兄弟不識恩養禽獸其心雖母道益隆我曹過惡亦已深矣遂將三弟詣南鄭獄陳母之德狀己之過乞就刑辟縣言之於郡郡守表異其母蠲除家徭遣散四子許以修革自後訓導愈明並為良士穆姜年八十餘卒臨終勑諸子曰吾弟伯度智達士也所論薄葬其義至矣又臨亡遺令賢聖法也令汝曹遵承勿與俗同增吾之纍諸子奉行焉孝女曹娥者會稽上虞人也父盱能絃歌為巫祝漢安二年五月五日於縣江泝濤迎婆娑迎神溺死不得尸骸娥年十四乃沿江號哭晝夜不絶聲旬有七日遂投江而死至元嘉元年縣長度尚改葬娥於江南道傍為立碑焉吳許升妻者呂氏之女也字榮升少為博徒不理操行榮嘗躬勤家業以奉養其姑數勸升修學每有不善輒流涕進規榮父積忿疾升乃呼榮欲改嫁之榮歎曰命之所遭義無離二終不肯歸升感激自厲乃尋師遠學遂以成名尋被本州辟命行至壽春道為盜所害刺史尹耀捕盜得之榮迎喪於路聞而詣州請甘心讎人耀聽之榮乃手斷其頭以祭升靈後郡遭寇賊賊欲犯之榮踰垣走賊拔刀追之賊曰從我則生不從我則死榮曰義不以身受辱寇虜也遂殺之是日疾風暴雨靁電晦冥賊惶懼叩頭謝罪乃殯葬之汝南袁隗妻者扶風馬融之女也字倫隗已見前傳倫少有才辨融家世豐豪裝遣甚盛及初成禮隗問之曰婦奉箕帚而已何乃過珍麗乎對曰慈親垂愛不敢逆命君若欲慕鮑宣梁鴻之高者妾亦請從少君孟光之事矣隗又曰弟先兄舉世以為笑今處姊未適先行可乎對曰妾姊高行殊未遭良匹不似鄙薄苟然而已又問曰南郡君學窮道奧文為辭宗而所在之職輒以貨財為損何邪對曰孔子大聖不免武叔之毀子路至賢猶有伯寮之訴家君獲此固其宜耳隗默然不能屈帳外聽者為慙隗既寵貴當時倫亦有名於世年六十餘卒倫妹芝亦有才義少喪親長而追感乃作申情賦云酒泉龐淯母者趙氏之女也字娥父為同縣人所殺而娥兄弟三人時俱病物故讎乃喜而自賀以為莫己報也娥陰懷感憤乃潛備刀兵常帷車以候讎家十餘年不能得後遇於都亭刺殺之因詣縣自首曰父仇已報請就刑戮福祿福長尹嘉義之解印綬欲與俱亡娥不肯去曰怨塞身死妾之明分結罪理獄君之常理何敢苟生以枉公法後遇赦得免州郡表其閭太常張奐嘉歎以束帛禮之沛劉長卿妻者同郡桓鸞之女也鸞已見前傳生一男五歲而長卿卒妻防遠嫌疑不肯歸寧兒年十五晚又夭歿妻慮不免乃豫刑其耳以自誓宗婦相與愍之共謂曰若家殊無它意假令有之猶可因姑姊妹以表其誠何貴義輕身之甚哉對曰昔我先君五更學為儒宗尊為帝師五更已來歷代不替男以忠孝顯女以貞順稱詩云無忝爾祖聿修厥德是以豫自刑翦以明我情沛相王吉上奏高行顯其門閭號曰行義桓釐縣邑有祀必膰焉安定皇甫規妻者不知何氏女也規初喪室家後更娶之妻善屬文能草書時為規答書記衆人怪其工及規卒時妻年猶盛而容色美後董卓為相國承其名娉以軿輜百乘馬二十匹奴婢錢帛充路妻乃輕服詣卓門跪自陳請辭甚酸愴卓使傅奴侍者悉拔刀圍之而謂曰孤之威教欲令四海風靡何有不行於一婦人乎妻知不免乃立罵卓曰君羌胡之種毒害天下猶未足邪妾之先人清德奕世皇甫氏文武上才為漢忠臣君親非其趣使走吏乎敢欲行非禮於爾君夫人邪卓乃引車庭中以其頭縣軛鞭撲交下妻謂持杖者曰何不重乎速盡為惠遂死車下後人圖畫號曰禮宗云南陽陰瑜妻者潁川荀爽之女也名采字女荀聰敏有才藝年十七適陰氏十九産一女而瑜卒采時尚豐少常慮為家所逼自防禦甚固後同郡郭奕喪妻爽以采許之因詐稱病篤召采既不得已而歸懷刃自誓爽令傅婢執奪其刃扶抱載之猶憂致憤激勑衛甚嚴女既到郭氏乃僞為歡悅之色謂左右曰我本立志與陰氏同穴而不免逼迫遂至於此素情不遂奈何乃命使建四燈盛裝飾請奕入相見共談言辭不輟亦奕敬憚之遂不敢逼至曙而出采因勑令左右辨浴既入室而掩戶權令侍人避之以粉書扉上曰尸還陰陰字未及成懼有來者遂以衣帶自縊左右玩之不為意比視已絶時人傷焉犍為盛道妻者同郡趙氏之女也字媛姜建安五年益部亂道聚衆起兵事敗夫妻執繫當死媛姜夜中告道曰法有常刑必無生望君可速潛逃建立門戶妾自留獄代君塞咎道依違未從媛姜便解道桎梏為齎糧貨子翔時年五歲使道攜持而走媛姜代道持夜應對不失度道已遠乃以實告吏應時見殺道父子會赦得歸道感其義終身不娶焉孝女叔先雄者犍為人也父泥和永建初為縣功曹縣長遣泥和拜檄謁巴郡太守乘船墯湍水物故尸喪不歸雄感念怨痛號泣晝夜心不圖存常有自沈之計所生男女二人並數歲雄乃各作囊盛珠環以繫兒數為訣別之辭家人每防間之經百許日後稍懈雄因乘小船於父墯處慟哭遂自投水死弟賢其夕夢雄告之卻後六日當共父同出至期伺之果與父相持浮於江上郡縣表言為雄立碑圖象其形焉陳留董祀妻者同郡蔡雍之女也名琰字文姬博學有才辨又妙於音律適河東衛仲道夫亡無子歸寧于家興平中天下喪亂文姬為胡騎所獲沒於南胸奴左賢王在胡中十二年生二子曹操素與雍善痛其無嗣乃遣使者以金璧贖之而重嫁於祀祀為屯田都尉犯法當死文姬詣曹操請之時公卿名士及遠方使驛坐者滿堂操謂賓客曰蔡伯喈女在外今為諸君見之及文姬進蓬首徒行叩頭請罪音辭清辨旨甚酸哀衆皆為改容操曰誠實相矜然文狀已去奈何文姬曰明公馬萬匹虎士成林何惜疾足一騎而不濟垂死之命乎操感其言乃追原祀罪時且寒賜以頭巾履襪操因問曰聞夫人家先多墳籍猶能憶識之不文姬曰昔亡父賜書四千許卷流離塗炭罔有存者今所誦憶裁四百餘篇耳操曰今當使十吏就夫人寫之文姬曰妾聞男女之別禮不親授乞給紙筆真草唯命於是繕書送之文無遺誤後感傷亂離追懷悲憤作詩二章其辭曰漢季失權柄董卓亂天常志欲圖篡弒先害諸賢良逼迫遷舊邦擁主以自彊海內興義師欲共討不祥卓衆來東下金甲耀日光平土人脆弱來兵皆胡羌獵野圍城邑所向悉破亡斬無孑遺尸骸相牚拒馬邊縣男頭馬後載婦女長驅西入關迥路險且阻還顧冥冥肝脾為爛腐所略有萬計不得令屯聚或有骨肉俱欲言不敢語失意機微閒輒言斃降虜要當以亭刃我曹不活汝豈復惜性命不堪其詈罵或便加棰杖毒痛參并下旦則號泣行夜則悲吟坐欲死不能得欲生無一可彼蒼者何辜乃遭此厄禍邊荒與華異人俗少義理處所多霜雪胡風春夏起翩翩吹我衣肅肅入我耳感時念父母哀歎無窮已有客從外來聞之常歡喜迎問其消息輒復非鄉里邂逅徼時願骨肉來迎己己得自解免當復棄兒子天屬綴人心念別無會期存亡永乖隔不忍與之辭兒前抱我頸問母欲何之人言母當去豈復有還時阿母常仁惻今何更不慈我尚未成人奈何不顧思見此崩五內恍惚生狂癡號泣手撫摩當發復回疑兼有同時輩相送告離別慕我獨得歸哀叫聲摧裂馬為立踟蹰車為不轉轍觀者皆歔欷行路亦嗚咽去去割情戀遄征日遐邁悠悠三千里何時復交會念我出腹子胸臆為摧敗既至家人盡又復無中外城郭為山林庭宇生荊艾白骨不知誰從橫莫覆蓋出門無人聲豺狼號且吠煢煢對孤景怛咤糜肝肺登高遠眺望魂神忽飛逝奄若壽命盡旁人相寬大為復彊視息雖生何聊賴託命於新人竭心自勗厲流離成鄙賤常恐復捐廢人生幾何時懷憂終年歲谷眇兮路曼曼眷東顧兮但悲歎冥當寢兮不能安飢當食兮不能餐常流涕兮眥不乾薄志節兮念死難雖苟活兮無形顏惟彼方兮遠陽精陰氣凝兮雪夏零沙漠壅兮塵冥冥有草木兮春不榮人似禽兮食臭腥言兜離兮狀窈停歲聿暮兮時邁征夜悠長兮禁門不能寐兮起屏營登胡殿兮臨廣庭玄雲合兮翳月星北風厲兮肅泠泠胡笳動兮邊馬鳴孤雁歸兮聲嚶嚶樂人興兮彈琴箏音相和兮悲且清心吐思兮胸憤盈欲舒氣兮恐彼驚含哀咽兮涕沾頸家既迎兮當歸寧臨長路兮捐所生兒呼母兮號失聲我掩耳兮不忍聽追持我兮走煢煢頓復起兮毀顏形還顧之兮破人情心怛絶兮死復生贊曰端操有蹤幽間有容區明風烈昭我管彤
