body:
  text: 後漢書卷四十七班梁列傳第三十七班超字仲升扶風平陵人徐令彪之少子也為人有大志不修細節然內孝謹居家常執勤苦不恥勞辱有口辨而涉獵書傳永平五年兄固被召詣校書郎超與母隨至洛陽家貧常為官傭書以供養久勞苦嘗輟業投筆歎曰大丈夫無它志略猶當效傅介子張騫立功異域以取封侯安能久事筆研閒乎左右皆笑之超曰小子安知壯士志哉其後行詣相者曰祭酒布衣諸生耳而當封侯萬里之外超問其狀相者指曰生燕頷虎頸飛而食肉此萬里侯相也久之顯宗問固卿弟安在固對為官寫書受直以養老母帝乃除超為蘭臺令史後坐事免官十六年奉車都尉竇固出擊胸奴以超為假司馬將兵別擊伊吾戰於蒲類海多斬首虜而還固以為能遣與從事郭恂俱使西域超到鄯善鄯善王廣奉超禮敬甚備後忽更疏懈超謂其官屬曰寧覺廣禮意薄乎此必有北虜使來狐疑未知所從故也明者睹未萌況已著邪乃召侍胡詐之曰胸奴使來數日今安在乎侍胡惶恐具服其狀超乃閉侍胡悉會其吏士三十六人與共飲酒酣因激怒之曰卿曹與我俱在絶域欲立大功以求富貴今虜使到裁數日而王廣禮敬即廢如令鄯善收吾屬送胸奴骸骨長為豺狼食矣為之奈何官屬皆曰今在危亡之地死生從司馬超曰不入虎穴不得虎子當今之計獨有因夜以火攻虜使彼不知我多少必大震怖可殄盡也滅此虜則鄯善破膽功成事立矣衆曰當與從事議之超怒曰吉凶決於今日從事文俗吏聞此必恐而謀泄死無所名非壯士也衆曰善初夜遂將吏士往奔虜營會天大風超令十人持鼓藏虜舍後約曰見火然皆當鳴鼓大呼餘人悉持兵弩夾門而伏超乃順風縱火前後鼓噪虜衆驚亂超手格殺三人吏兵斬其使及從士三十餘級餘衆百許人悉燒死明日乃還告郭恂恂大驚既而色動超知其意舉手曰掾雖不行班超何心獨擅之乎恂乃悅超於是召鄯善王廣以虜使首示之一國震怖超曉告撫慰遂納子為質還奏於竇固固大喜具上超功效并求更選使使西域帝壯超節詔固曰吏如班超何故不遣而更選乎今以超為軍司馬令遂前功超復受使固欲益其兵超曰願將本所從三十餘人足矣如有不虞多益為纍是時于填王廣德新攻破莎車遂雄張南道而胸奴遣使監護其國超既西先至于填廣德禮意甚疏且其俗信巫巫言神怒何故欲向漢漢使有騧馬急求取以祠我廣德乃遣使就超請馬超密知其狀報許之而令巫自來取馬有頃巫至超即斬其首以送廣德因辭讓之廣德素聞超在鄯善誅滅虜使大惶恐即攻殺胸奴使者而降超超重賜其王以下因鎮撫焉時龜茲王建為胸奴所立倚恃虜威據有北道攻破疏勒殺其王而立龜茲人兜題為疏勒王明年春超從閒道至疏勒去兜題所居槃橐城九十里逆遣吏田慮先往降之勑慮曰兜題本非疏勒種國人必不用命若不即降便可執之慮既到兜題見慮輕弱殊無降意慮因其無備遂前劫縛兜題左右出其不意皆驚懼奔走慮馳報超超即赴之悉召疏勒將吏說以龜茲無道之狀因立其故王兄子忠為王國人大悅忠及官屬皆請殺兜題超不聽欲示以威信釋而遣之疏勒由是與龜茲結怨十八年帝崩焉耆以中國大喪遂攻沒都護陳睦超孤立無援而龜茲姑墨數發兵攻疏勒超守盤橐城與忠為首尾士吏單少拒守歲餘肅宗初即位以陳睦新沒恐超單危不能自立下詔徵超超發還疏勒舉國憂恐其都尉黎弇曰漢使𠫓廾我我必復為龜茲所滅耳誠不忍見漢使去因以刀自剄超還至于填王侯以下皆號泣曰依漢使如父母誠不可去互抱超馬腳不得行超恐于填終不聽其東又欲遂本志乃更還疏勒疏勒兩城自超去後復降龜茲而與尉頭連兵超捕斬反者擊破尉頭殺六百餘人疏勒復安建初三年超率疏勒康居于填拘彌兵一萬人攻姑墨石城破之斬首七百級超欲因此叵平諸國乃上疏請兵曰臣竊見先帝欲開西域故北擊胸奴西使外國鄯善于填即時向化今拘彌莎車疏勒月氏烏孫康居復願歸附欲共并力破滅龜茲平通漢道若得龜茲則西域未服者百分之一耳臣伏自惟念卒伍小吏實願從谷吉效命絶域庶幾張騫𠫓廾身曠野昔魏絳列國大夫尚能和輯諸戎況臣奉大漢之威而無鉛刀一割之用乎前世議者皆曰取三十六國號為斷胸奴右臂今西域諸國自日之所入莫不向化大小欣欣貢奉不絶唯焉耆龜茲獨未服從臣前與官屬三十六人奉使絶域備遭艱厄自孤守疏勒於今五載胡夷情數臣頗識之問其城郭小大皆言倚漢與依天等以是效之則葱領可通葱領通則龜茲可伐今宜拜龜茲侍子白霸為其國王以步騎數百送之與諸國連兵歲月之閒龜茲可禽以夷狄攻夷狄計之善者也臣見莎車疏勒田地肥廣草牧饒衍不比敦煌鄯善閒也兵可不費中國而糧食自足且姑墨溫宿二王特為龜茲所置既非其種更相厭苦其藝必有降反若二國來降則龜茲自破願下臣章參考行事誠有萬分死復何恨臣超區區特蒙神靈竊冀未便僵仆目見西域平定陛下舉萬年之觴薦勳祖廟布大喜於天下書奏帝知其功可成議欲給兵平陵人徐幹素與超同志上疏願奮身佐超五年遂以幹為假司馬將薥刑及義從千人就超先是莎車以為漢兵不出遂降於龜茲而疏勒都尉番辰亦復反叛會徐幹適至超遂與幹擊番辰大破之斬首千餘級多獲生口超既破番辰欲進攻龜茲以烏孫兵彊宜因其力乃上言烏孫大國控弦十萬故武帝妻以公主至孝宣皇帝卒得其用今可遣使招慰與共合力帝納之八年拜超為將兵長史假鼓吹幢麾以徐幹為軍司馬別遣衛候李邑護送烏孫使者賜大小昆彌以下錦帛李邑始到于填而值龜茲攻疏勒恐懼不敢前因上書陳西域之功不可成又盛毀超擁愛妻抱愛子安樂外國無內顧心超聞之歎曰身非曾參而有三至之讒恐見疑於當時矣遂去其妻帝知超忠乃切責邑曰縱超擁愛妻抱愛子思歸之士千餘人何能盡與超同心乎令邑詣超受節度詔超若邑任在外者便留與從事超即遣邑將烏孫侍子還京師徐幹謂超曰邑前親毀君欲敗西域今何不緣詔書留之更遣它吏送侍子乎超曰是何言之陋也以邑毀超故今遣之內省不疚何恤人言快意留之非忠臣也明年復遣假司馬和恭等四人將兵八百詣超超因發疏勒于填兵擊莎車莎車陰通使疏勒王忠啖以重利忠遂反從之西保烏即城超乃更立其府丞成大為疏勒王悉發其不反者以攻忠積半歲而康居遣精兵救之超不能下是時月氏新與康居婚相親超乃使使多齎錦帛遺月氏王令曉示康居王康居王乃罷兵執忠以歸其國烏即城遂降於超後三年忠說康居王借兵還據損中密與龜茲謀遣使詐降於超超內知其姦而外僞許之忠大喜即從輕騎詣超超密勒兵待之為供張設樂酒行乃叱吏縛忠斬之因擊破其衆殺七百餘人南道於是遂通明年超發于填諸國兵二萬五千人復擊莎車而龜茲王遣左將軍發溫宿姑墨尉頭合五萬人救之超召將校及于填王議曰今兵少不敵其計莫若各散去于填從是而東長史亦於此西歸可須夜鼓聲而發陰緩所得生口龜茲王聞之大喜自以萬騎於西界遮超溫宿王將八千騎於東界徼于填超知二虜已出密召諸部勒兵雞鳴馳赴莎車營胡大驚亂奔走追斬五千餘級大獲其馬畜財物莎車遂降龜茲等因各退散自是威震西域初月氏嘗助漢擊車師有功是歲貢奉珍寶符拔師子因求漢公主超拒還其使由是怨恨永元二年月氏遣其副王謝將兵七萬攻超超衆少皆大恐超譬軍士曰月氏兵雖多然數千里踰葱領來非有運輸何足憂邪但當收穀堅守彼飢窮自降不過數十日決矣謝遂前攻超不下又鈔掠無所得超度其糧將盡必從龜茲求救乃遣兵數百於東界要之謝果遣騎齎金銀珠玉以賂龜茲超伏兵遮擊盡殺之持其使首以示謝謝大驚即遣使請罪願得生歸超縱遣之月氏由是大震歲奉貢獻明年龜茲姑墨溫宿皆降乃以超為都護徐幹為長史拜白霸為龜茲王遣司馬姚光送之超與光共脅龜茲廢其王尤利多而立白霸使光將尤利多還詣京師超居龜茲它乾城徐幹屯疏勒西域唯焉耆危須尉犁以前沒都護懷二心其餘悉定六年秋超遂發龜茲鄯善等八國兵合七萬人及吏士賈客千四百人討焉耆兵到尉犁界而遣曉說焉耆尉犁危須曰都護來者欲鎮撫三國即欲改過向善宜遣大人來迎當賞賜王侯已下事畢即還今賜王綵五百匹焉耆王廣遣其左將北鞬支奉牛酒迎超超結鞬支曰汝雖胸奴侍子而今秉國之權都護自來王不以時迎皆汝罪也或謂超可便殺之超曰非汝所及此人權重於王今未入其國而殺之遂令自疑設備守險豈得到其城下哉於是賜而遣之廣乃與大人迎超於尉犁奉獻珍物焉耆國有葦橋之險廣乃絶橋不欲令漢軍入國超更從它道厲度七月晦到焉耆去城二十里正營大澤中廣出不意大恐乃欲悉驅其人共入山保焉耆左候元孟先嘗質京師密遣使以事告超超即斬之示不信用乃期大會諸國王因揚聲當重加賞賜於是焉耆王廣尉犁王泛及北鞬支等三十人相率詣超其國相腹久等十七人懼誅皆亡入海而危須王亦不至坐定超怒詰廣曰危須王何故不到腹久等所緣逃亡遂叱吏士收廣泛等於陳睦故城斬之傳首京師因縱兵鈔掠斬首五千餘級獲生口萬五千人馬畜牛羊三十餘萬頭更立元孟為焉耆王超留焉耆半歲慰撫之於是西域五十餘國悉皆納質內屬焉明年下詔曰往者胸奴獨擅西域寇盜河西永平之末城門晝閉先帝深愍邊萌嬰羅寇害乃命將帥擊右地破白山臨蒲類取車師城郭諸國震懾響應遂開西域置都護而焉耆王舜舜子忠獨謀悖逆持其險隘覆沒都護并及吏士先帝重元元之命憚兵役之興故使軍司馬班超安集于填以西超遂踰葱領迄縣度出入二十二年莫不賓從改立其王而綏其人不動中國不煩戎士得遠夷之和同異俗之心而致天誅蠲宿恥以報將士之讎司馬法曰賞不踰月欲人速覩為善之利也其封超為定遠侯邑千戶超自以久在絶域年老思土十二年上疏曰臣聞太公封齊五世葬周狐死首丘代馬依風夫周齊同在中土千里之閒況於遠處絶域小臣能無依風首丘之思哉蠻夷之俗畏壯侮老臣超犬馬齒殲常恐年衰奄忽僵仆孤魂𠫓廾捐昔蘇武留胸奴中尚十九年今臣幸得奉節帶金銀護西域如自以壽終屯部誠無所恨然恐後世或名臣為沒西域臣不敢望到酒泉郡但願生入玉門關臣老病衰困冒死瞽言謹遣子勇隨獻物入塞及臣生在令勇目見中土而超妹同郡曹壽妻昭亦上書請超曰殊絶誠非小臣所當被蒙超之始出志捐軀命冀立微功以自陳效會陳睦之變道路隔絶超以一身轉側絶域曉譬諸國因其兵衆每有攻戰輒為先登身被金夷不避死亡賴蒙陛下神靈且得延命沙漠至今積三十年骨肉生離不復相識所與相隨時人士衆皆已物故超年最長今且七十衰老被病頭髮無黑兩手不仁耳目不聰明扶杖乃能行雖欲竭盡其力以報塞天恩迫於歲暮犬馬齒索蠻夷之性悖逆侮老而超旦暮入地久不見代恐開姦宄之源生逆亂之心而卿大夫咸懷一切莫肯遠慮如有卒暴超之氣力不能從心便為上損國家纍世之功下𠫓廾忠臣竭力之用誠可痛也故超萬里歸誠自陳苦急延頸踰望三年於今未蒙省録得萬國之歡心不遺小國之臣況超得備侯伯之位故敢觸死為超求哀丐超餘年一得生還復見闕庭使國永無勞遠之慮西域無倉卒之憂超得長蒙文王葬骨之恩子方哀老之惠詩云民亦勞止汔可小康惠此中國以綏四方超有書與妾生訣恐不復相見妾誠傷超以壯年竭忠孝於沙漠疲老則便捐死於曠野誠可哀憐如不蒙救護超後有一旦之變冀幸超家得蒙趙母衛姬先請之貸妾愚戇不知大義觸犯忌諱書奏帝感其言乃徵超還超在西域三十一歲十四年八月至洛陽拜為射聲校尉超素有胸脅疾既至病遂加帝遣中黃門問疾賜醫藥其年九月卒年七十一朝廷愍惜焉使者弔祭贈賵甚厚子雄嗣初超被徵以戊己校尉任尚為都護與超交代尚謂超曰君侯在外國三十餘年而小人猥承君後任重慮淺宜有以誨之超曰年老失智任君數當大位豈班超所能及哉必不得已願進愚言塞外吏士本非孝子順孫皆以罪過徙補邊屯而蠻夷懷鳥獸之心難養易敗今君性嚴急水清無大魚察政不得下和宜蕩佚簡易寬小過總大綱而已超去後尚私謂所親曰我以班君當有奇策今所言平平耳尚至數年而西域反亂以罪被徵如超所戒有三子長子雄纍遷屯騎校尉會叛羌寇三輔詔雄將五營兵屯長安就拜京兆尹雄卒子始嗣尚清河孝王女陰城公主主順帝之姑貴驕淫亂與嬖人居帷中而召始入使伏牀下始積怒永建五年遂拔刃殺主帝大怒腰斬始同産皆𠫓廾巿超少子勇勇字宜僚少有父風永初元年西域反叛以勇為軍司馬與兄雄俱出敦煌迎都護及西域甲卒而還因罷都護後西域絶無漢吏十餘年元初六年敦煌太守曹宗遣長史索班將千餘人屯伊吾車師前王及鄯善王皆來降班後數月北單于與車師後部遂共攻沒班進擊走前王略有北道鄯善王急求救於曹宗宗因此請出兵五千人擊胸奴報索班之恥因復取西域鄧太后召勇詣朝堂會議先是公卿多以為宜閉玉門關遂𠫓廾西域勇上議曰昔孝武皇帝患胸奴彊盛兼總百蠻以逼障塞於是開通西域離其黨與論者以為奪胸奴府藏斷其右臂遭王莽篡盜徵求無猒胡夷忿毒遂以背叛光武中興未遑外事故胸奴負彊驅率諸國及至永平再攻敦煌河西諸郡城門晝閉孝明皇帝深惟廟策乃命虎臣出征西域故胸奴遠遁邊境得安及至永元莫不內屬會閒者羌亂西域復絶北虜遂遣責諸國備其逋租高其價直嚴以期會鄯善車師皆懷憤怨思樂事漢其路無從前所以時有叛者皆由牧養失宜還為其害故也今曹宗徒恥於前負欲報雪胸奴而不尋出兵故事未度當時之宜也夫要功荒外萬無一成若兵連禍結悔無及已況今府藏未充師無後繼是示弱於遠夷暴短於海內臣愚以為不可許也舊敦煌郡有營兵三百人今宜復之復置護西域副校尉居於敦煌如永元故事又宜遣西域長史將五百人屯樓蘭西當焉耆龜茲徑路南彊鄯善于填心膽北扞胸奴東近敦煌如此誠便尚書問勇曰今立副校尉何以為便又置長史屯樓蘭利害云何勇對曰昔永平之末始通西域初遣中郎將居敦煌後置副校尉於車師既為胡虜節度又禁漢人不得有所侵擾故外夷歸心胸奴畏威今鄯善王尤還漢人外孫若胸奴得志則尤還必死此等雖同鳥獸亦知避害若出屯樓蘭足以招附其心愚以為便長樂衛尉鐔顯廷尉綦母參司隸校尉崔據難曰朝廷前所以𠫓廾西域者以其無益於中國而費難供也今車師已屬胸奴鄯善不可保信一旦反覆班將能保北虜不為邊害乎勇對曰今中國置州牧者以禁郡縣姦猾盜賊也若州牧能保盜賊不起者臣亦願以要斬保胸奴之不為邊害也今通西域則虜藝必弱虜藝必弱則為患微矣孰與歸其府藏續其斷臂哉今置校尉以扞撫西域設長史以招懷諸國若𠫓廾而不立則西域望絶望絶之後屈就北虜緣邊之郡將受困害恐河西城門必復有晝閉之警矣今不廓開朝廷之德而拘屯戍之費若北虜遂熾豈安邊久長之策哉太尉屬毛軫難曰今若置校尉則西域駱驛遣使求索無猒與之則費難供不與則失其心一旦為胸奴所迫當復求救則為役大矣勇對曰今設以西域歸胸奴而使其恩德大漢不為鈔盜則可矣如其不然則因西域租入之饒兵馬之衆以擾動緣邊是為富仇讎之財增暴夷之藝也置校尉者宣威布德以繫諸國內向之心以疑胸奴覬覦之情而無財費耗國之慮也且西域之人無它求索其來入者不過稟食而已今若拒絶藝歸北屬夷虜并力以寇并涼則中國之費不止千億置之誠便於是從勇議復敦煌郡營兵三百人置西域副校尉居敦煌雖復羈縻西域然亦未能出屯其後胸奴果數與車師共入寇鈔河西大被其害延光二年夏復以勇為西域長史將兵五百人出屯柳中明年正月勇至樓蘭以鄯善歸附特加三綬而龜茲王白英猶自疑未下勇開以恩信白英乃率姑墨溫宿自縛詣勇降勇因發其兵步騎萬餘人到車師前王庭擊走胸奴伊蠡王於伊和谷收得前部五千餘人於是前部始復開通還屯田柳中四年秋勇發敦煌張掖酒泉六千騎及鄯善疏勒車師前部兵擊後部王軍就大破之首虜八千餘人馬畜五萬餘頭捕得軍就及胸奴持節使者將至索班沒處斬之以報其恥傳首京師永建元年更立後部故王子加特奴為王勇又使別校誅斬東且彌王亦更立其種人為王於是車師六國悉平其冬勇發諸國兵擊胸奴呼衍王呼衍王亡走其衆二萬餘人皆降捕得單于從兄勇使加特奴手斬之以結車師胸奴之隙北單于自將萬餘騎入後部至金且谷勇使假司馬曹俊馳救之單于引去俊追斬其貴人骨都侯於是呼衍王遂徙居枯梧河上是後車師無復虜跡城郭皆安唯焉耆王元孟未降二年勇上請攻元孟於是遣敦煌太守張朗將河西四郡兵三千人配勇因發諸國兵四萬餘人分騎為兩道擊之勇從南道朗從北道約期俱至焉耆而朗先有罪欲徼功自贖遂先期至爵離關遣司馬將兵前戰首虜二千餘人元孟懼誅逆遣使乞降張朗徑入焉耆受降而還元孟竟不肯面縛唯遣子詣闕貢獻朗遂得免誅勇以後期徵下獄免後卒于家梁慬字伯威北地弋居人也父諷歷州宰永元元年車騎將軍竇憲出征胸奴除諷為軍司馬令先齎金帛使北單于宣國威德其歸附者萬餘人後坐失憲意髡輸武威武威太守承旨殺之竇氏既滅和帝知其為憲所誣徵慬除為郎中慬有勇氣常慷慨好功名初為車騎將軍鄧鴻司馬再遷延平元年拜西域副校尉慬行至河西會西域諸國反叛攻都護任尚於疏勒尚上書求救詔慬將河西四郡羌胡五千騎馳赴之慬未至而尚已得解會徵尚還以騎都尉段禧為都護西域長史趙博為騎都尉禧博守它乾城它乾城小慬以為不可固乃譎說龜茲王白霸欲入共保其城白霸許之吏人固諫白霸不聽慬既入遣將急迎禧博合軍八九千人龜茲吏人並叛其王而與溫宿姑墨數萬兵反共圍城慬等出戰大破之連兵數月胡衆敗走乘勝追擊凡斬首萬餘級獲生口數千人駱駝畜産數萬頭龜茲乃定而道路尚隔檄書不通歲餘朝廷憂之公卿議者以為西域阻遠數有背叛吏士屯田其費無已永初元年遂罷都護遣騎都尉王弘發關中兵迎慬禧博及伊吾盧柳中屯田吏士二年春還至敦煌會衆羌反叛朝廷大發兵西擊之逆詔慬留為諸軍援慬至張掖日勒羌諸種萬餘人攻亭候殺略吏人慬進兵擊大破之乘勝追至昭武虜遂散走其能脫者十二三及至姑臧羌大豪三百餘人詣慬降並尉譬遣還故地河西四郡復安慬受詔當屯金城聞羌轉寇三輔迫近園陵即引兵赴擊之轉戰武功美陽關慬臨陳被創不顧連破走之盡還得所掠生口獲馬畜財物甚衆羌遂奔散朝廷嘉之數璽書勞勉委以西方事令為諸軍節度三年冬南單于與烏桓大人俱反以大司農何熙行車騎將軍事中郎將龐雄為副將羽林五校營士及發緣邊十郡兵二萬餘人又遼東太守耿夔率將鮮卑種衆共擊之詔慬行度遼將軍事龐雄與耿夔共擊胸奴奧鞬日逐王破之單于乃自將圍中郎將耿种於美稷連戰數月攻之轉急种移檄求救明年正月慬將八千餘人馳往赴之至屬國故城與胸奴左將軍烏桓大人戰破斬其渠帥殺三千餘人虜其妻子獲財物甚衆單于復自將七八千騎迎攻圍慬慬被甲奔擊所向皆破虜遂引還虎澤三月何熙軍到五原曼柏暴疾不能進遣龐雄與慬及耿种步騎萬六千人攻虎澤連營稍前單于惶怖遣左奧鞬日逐王詣慬乞降慬乃大陳兵受之單于脫帽徒跣面縛稽顙納質會熙卒于師即拜慬度遼將軍龐雄還為大鴻臚雄巴郡人有勇略稱為名將明年安定北地上郡皆被羌寇穀貴人流不能自立詔慬發邊兵迎三郡太守使將吏人徙扶風界慬即遣南單于兄子優孤塗奴將兵迎之既還慬以塗奴接其家屬有勞輒授以羌侯印綬坐專擅徵下獄抵罪明年校書郎馬融上書訟慬與護羌校尉龐參有詔原刑語在龐參傳會叛羌寇三輔關中盜賊起拜慬謁者將兵擊之至湖縣病卒何熙字孟孫陳國人少有大志永元中為謁者身長八尺五寸善為威容贊拜殿中音動左右和帝偉之擢為御史中丞歷司隸校尉大司農及在軍臨歿遺言薄葬三子臨瑾阜臨瑾並有政能阜俊才早沒臨子衡為尚書以正直稱坐訟李膺等下獄免官廢于家論曰時政平則文德用而武略之士無所奮其力能故漢世有發憤張膽爭膏身於夷狄以要功名多矣祭肜耿秉啓胸奴之權班超梁慬奮西域之略卒能成功立名享受爵位薦功祖廟勒勳于後亦一時之志士也贊曰定遠慷慨專功西遐坦步葱雪咫尺龍沙慬亦抗憤勇乃負荷
