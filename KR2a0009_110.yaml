body:
  text: 後漢書志第十天文上王莽三光武十二易曰天垂象聖人則之庖犧氏之王天下仰則觀象於天俯則觀法於地觀象於天謂日月星辰觀法於地謂水土州分形成於下象見于上故曰天者北辰星合元垂耀建帝形運機授度張百精三階九列二十七大夫八十一元士斗衡太微攝提之屬百二十官二十八宿各布列下應十二子天地設位星辰之象備矣三皇邁化協神醇朴謂五星如連珠日月若合璧化由自然民不犯慝至於書契之興五帝是作軒轅始受河圖鬬苞授規日月星辰之象故星官之書自黃帝始至高陽氏使南正重司天北正黎司地唐虞之時羲仲和仲夏有昆吾湯則巫咸周之史佚萇弘宋之子韋楚之唐蔑魯之梓慎鄭之裨竈魏石申夫齊國甘公皆掌天文之官仰占俯視以佐時政步變擲微通洞密至採禍福之原覩成敗之勢秦燔詩書以愚百姓六經典籍殘為灰炭星官之書全而不毀故秦史書始皇之時彗孛大角大角以亡有大星與小星鬬于宮中是其廢亡之徵至漢興景武之際司馬談談子遷以世黎氏之後為太史令遷著史記作天官書成帝時中壘校尉劉向廣洪範災條作五紀皇極之論以參往行之事孝明帝使班固漢書而馬續述天文志今紹漢書作天文志起王莽居攝元年迄孝獻帝建安二十五年二百一十五載言其時星辰之變表象之應以顯天戒明王事焉王莽地皇三年十一月有星孛于張東南行五日不見孛星者惡氣所生為亂兵其所以孛德孛德者亂之象不明之表又參然孛焉兵之類也故名之曰孛孛之為言猶有所傷害有所妨蔽或謂之彗星所以除穢而布新也張為周地星孛于張東南行即翼軫之分翼軫為楚是周楚地將有兵亂後一年正月光武兵舂陵會下江新巿賊張卬王常及更始之兵亦至俱攻破南陽斬莽前隊大夫甄阜屬正梁丘賜等殺其士衆數萬人更始為天子都雒陽西入長安敗死光武興於河北復都雒陽居周地除穢布新之象四年六月漢兵起南陽至昆陽莽使司徒王尋司空王邑將諸郡兵號曰百萬衆已至者四十二萬人能通兵法者六十三家皆為將帥持其圖書器械軍出關東牽從羣象虎狼猛獸放之道路以示富強用怖山東至昆陽山作營百餘圍城數重或為衝車以撞城為雲車高十丈以瞰城中弩矢雨集城中負戶而汲求降不聽請出不得二公之兵自以必克不恤軍事不協計慮莽有覆敗之變見焉晝有雲氣如壞山墮軍上軍人皆厭所謂營頭之星也占曰營頭之所墮其下覆軍流血三千里是時光武將兵數千人赴救昆陽奔擊二公兵并力猋發號呼聲動天地虎豹驚怖敗振會天大風飛屋瓦雨如注水二公兵亂敗自相賊就死者數萬人競赴滍水死者委積滍水為之不流殺司徒王尋軍皆散走歸本郡王邑還長安莽敗俱誅死營頭之變覆軍流血之應也四年秋太白在太微中燭地如月光太白為兵太微為天廷太白贏而北入太微是大兵將入天子廷也是時莽遣二公之兵至昆陽已為光武所破莽又拜九人為將軍皆以虎為號九虎將軍至華陰皆為漢將鄧曄李松所破進攻京師倉將軍韓臣至長門十月戊申漢兵自宣平城門入二日己酉城中少年朱弟張魚等數千人起兵攻莽燒作室門斧敬法闥商人杜吳殺莽漸臺之上校尉公賓就斬莽首大兵蹈藉宮廷之中仍以更始入長安赤眉賊立劉盆子為天子皆以大兵入宮廷是其應也光武建武九年七月乙丑金犯軒轅大星十一月乙丑金又犯軒轅軒轅者後宮之官大星為皇后金犯之為失勢是時郭后已失勢見疏後廢為中山太后陰貴人立為皇后十年三月癸卯流星如月從太微出入北斗魁第六星色白旁有小星射者十餘枚滅則有聲如雷食頃止流星為貴使星大者使大星小者使小太微天子廷北斗魁主殺星從太微出抵北斗魁是天子大使將出有所伐殺十二月己亥大流星如缶出柳西南行入軫且滅時分為十餘如遺火狀須臾有聲隱隱如雷柳為周軫為秦蜀大流星出柳入軫者是大使從周入蜀是時光武帝使大司馬吳漢發南陽卒三萬人乘船泝江而上擊蜀白帝公孫述又命將軍馬武劉尚郭霸岑彭馮駿平武都巴郡十二年十月漢進兵擊述從弟衛尉永遂至廣都殺述女壻史興威虜將軍馮駿拔江州斬述將田戎吳漢又擊述大司馬謝豐斬首五千餘級臧宮破涪殺述弟大司空恢十一月丁丑漢護軍將軍高午刺述洞其夜死明日漢入屠蜀城誅述大將公孫晃延岑等所殺數萬人夷滅述妻宗族萬餘人以上是大將出伐殺之應也其小星射者及如遺火分為十餘皆小將隨從之象有聲如雷隱隱者兵將怒之徵也十二月年正月己未小星流百枚以上或西北或正北或東北二夜止六月戊戍晨小流星百枚以上四面行小星者庶民之類流行者移徙之象也或西北或東北或四面行皆小民流移之徵是時西北討公孫述北征盧芳胸奴助芳侵邊漢遣將軍馬武騎都尉劉納閻興軍下曲陽臨平呼沱以備胡胸奴入河東中國未安米穀荒貴民或流散後三年吳漢馬武又徙鴈門代郡上谷關西縣吏民六萬餘口置常山關居庸關以東以避胡寇是小民流移之應十五年正月丁未彗星見昴稍西北行入營室犯離宮三月乙未至東壁滅見四十九日彗星為兵入除穢昴為邊兵彗星出之為有兵至十一月定襄都尉陰承反太守隨誅之盧芳從胸奴入居高柳至十六年十月降上璽綬一日昴星為獄事是時大司徒歐陽歙以事繫獄踰歲死營室天子之常宮離宮妃后之所居彗星入營室犯離宮是除宮室也是時郭皇后已疏至十七年十月遂廢為中山太后立陰貴人為皇后除宮之象也三十年閏月甲午水在東井二十度生白氣東南指炎長五尺為彗東北行至紫宮西藩止五月甲子不見凡見三十一日水常以夏至放於東井閏月在四月尚未當見而見是贏而進也東井為水衡水出之為大水是歲五月及明年郡國大水壞城郭傷禾稼殺人民白氣為喪有炎作彗彗所以除穢紫宮天子之宮彗加其藩除宮之象後三年光武帝崩三十一年七月戊午火在輿鬼一度入鬼中出尸星南半度十月己亥犯軒轅大星又七日星間有客星炎二尺所西南行至明年二月二十二日在輿鬼東北六尺所滅凡見百一十三日熒惑為凶衰輿鬼尸星主死亡熒惑入之為大喪軒轅為後宮七星周地客星居之為死喪其後二年光武崩中元二年八月丁巳火犯太微西南角星相去二寸十月戊子大流星從西南東北行聲如雷火犯太微西南角星為將相後太尉趙喜司徒李欣坐事免官大流星為使中郎將竇固揚虛侯馬武揚鄉侯王賞將兵征西也
