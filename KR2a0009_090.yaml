body:
  text: 後漢書卷八十一獨行列傳第七十一孔子曰與其不得中庸必也狂狷乎又云狂者進取狷者有所不為也此蓋失於周全之道而取諸偏至之端者也然則有所不為亦將有所必為者矣既云進取亦將有所不取者矣如此性尚分流為否異適矣中世偏行一介之夫能成名立方者蓋亦衆也或志剛金石而剋扞於強禦或意嚴冬霜而甘心於小諒亦有結朋協好幽明共心蹈義陵險死生等節雖事非通圓良其風軌有足懷者而情迹殊雜難為條品片辭特趣不足區別措之則事或有遺載之則貫序無統以其名體雖殊而操行俱絶故總為獨行篇焉庶備諸闕文紀志漏脫云爾譙玄字君黃巴郡閬中人也少好學能說易春秋仕於州郡成帝永始二年有日食之災乃詔舉敦朴遜讓有行義者各一人州舉玄詣公車對策高第拜議郎帝始作期門數為微行立趙飛燕為皇后后專寵懷忌皇太子多橫夭玄上書諫曰臣聞王者承天繼宗統極保業延祚莫急胤嗣故易有幹蠱之義詩詠衆多之福今陛下聖嗣未立天下屬望而不惟社稷之計專念微行之事愛幸用於所惑曲意留於非正竊聞後宮皇子産而不育臣聞之怛然痛心傷剝竊懷憂國不忘須臾夫警衛不修則患生非常忽有醉酒狂夫分爭道路既無尊嚴之儀豈識上下之別此為胡狄起於轂下而賊亂發於左右也願陛下念天之至重愛金玉之身均九女之施存無窮之福天下幸甚時數有災異玄輒陳其變既不省納故久稽郎官後遷太常丞以弟服去職平帝元始元年日食又詔公卿舉敦朴直言大鴻臚左咸舉玄詣公車對策復拜議郎遷中散大夫四年選明達政事能班化風俗者八人時並舉玄為繡衣使者持節與太僕任王惲等分行天下觀覽風俗所至專行誅賞事未及終而王莽居攝玄於是縱使者車變易姓名閒竄歸家因以隱遁後公孫述僭號於蜀連聘不詣述乃遣使者備禮徵之若玄不肯起使陽便賜以毒藥太守乃自齎璽書至玄廬曰君高節已著朝廷垂意誠不宜復辭自招凶禍玄仰天歎曰唐堯大聖許由恥仕周武至德伯夷守餓彼獨何人我亦何人保志全高死亦奚恨遂受毒藥玄子瑛泣血叩頭於太守曰方今國家東有嚴敵兵師四出國用軍資或不常充足願奉家錢千萬以贖父死太守為請述聽許之玄遂隱藏田野終述之世時兵戈纍年莫能修尚學業玄獨訓諸子勤習經書建武十一年卒明年天下平定玄弟慶以狀詣闕自陳光武美之策詔本郡祠以中牢勑所在還玄家錢時亦有犍為費貽不肯仕述乃漆身為厲陽狂以避之退藏山藪十餘年述破後仕至合浦太守瑛善說易以授顯宗為北宮衛士令李業字巨游廣漢梓潼人也少有志操介特習魯詩師博士許晃元始中舉明經除為郎會王莽居攝業以病去官杜門不應州郡之命太守劉咸強召之業乃載病詣門咸怒出教曰賢者不避害譬猶殼彀弩射市薄命者先死聞業名稱故欲與之為治而反託疾乎令詣獄養病欲殺之客有說咸曰趙殺鳴犢孔子臨河而逝未聞求賢而脅以牢獄者也咸乃出之因舉方正王莽以業為酒士病不之官遂隱藏出谷絶匿名迹終莽之世及公孫述僭號素聞業賢徵之欲以為博士業固疾不起數年述羞不致之乃使大鴻臚尹融持毒酒奉詔命以劫業若起則受公侯之位不起賜之以藥融譬旨曰方今天下分崩孰知是非而以區區之身試於不測之淵乎朝廷貪慕名德曠官缺位于今七年四時珍御不以忘君宜上奉知己下為子孫身名俱全不亦優乎今數年不起猜疑寇心凶禍立加非計之得者也業乃歎曰危國不入亂國不居親於其身為不善者義所不從君子見危授命何乃誘以高位重餌哉融見業辭志不屈復曰宜呼室家計之業曰丈夫斷之於心久矣何妻子之為遂飲毒而死述聞業死大驚又恥有殺賢之名乃遣使弔祠賻贈百匹業子翬逃辭不受蜀平光武下詔表其閭益部紀載其高節圖畫形象初平帝時蜀郡王皓為美陽令王嘉為郎王莽篡位並𠫓廾官西歸及公孫述稱帝遣使徵皓嘉恐不至遂先繫其妻子使者謂嘉曰速裝妻子可全對曰犬馬猶識主況於人乎王皓先自刎以首付使者述怒遂誅皓家屬王嘉聞而歎曰後之哉乃對使者伏劒而死是時犍為任永君及業同郡馮信並好學博古公孫述連徵命待以高位皆託青盲以避世難永妻淫於前匿情無言見子入井忍而不救信侍婢亦對信姦通及聞述誅皆盥洗更視曰世適平目即清淫者自殺光武聞而徵之並會病卒劉茂字子衛太原晉陽人也少孤獨侍母居家貧以筋力致養孝行著於鄉里及長能習禮經教授常數百人哀帝時察孝廉再遷五原屬國候遭母憂去官服竟後為沮陽令會王莽篡位茂𠫓廾官避世弘農山中教授建武二年歸為郡門下掾時赤眉二十餘萬衆攻郡縣殺長吏及府掾史茂負太守孫福踰牆藏空穴中得免其暮俱奔盂縣晝則逃隱夜求糧食積百餘日賊去乃得歸府明年詔書求天下義士福言茂曰臣前為赤眉所攻吏民壞亂奔走趣山臣為賊所圍命如絲髮賴茂負臣踰城出保盂縣茂與弟觸冒兵刃緣山負食臣及妻子得度死命節義尤高宜蒙表擢以厲義士詔書即徵茂拜議郎遷宗正丞後拜侍中卒官元初延平中鮮卑數百餘騎寇漁陽太守張顯率吏士追出塞遙望虜營烟火急趣之兵馬掾嚴授慮有伏兵苦諫止不聽顯蹙令進授不獲已前戰伏兵發授身被十創歿於陳顯拔刃追散兵不能制虜射中顯主簿衛福功曹徐咸遽起赴之顯遂墮馬福以身擁蔽虜并殺之朝廷愍授等節詔書褒歎厚加賞賜各除子一人為郎中永初二年劇賊畢豪等入平原界縣令劉雄將吏士乘船追之至厭次河與賊合戰雄敗執雄以矛刺之時小吏所輔前叩頭求哀願以身代雄豪等縱雄而刺輔貫心洞背即死東郡太守捕得豪等具以狀上詔書追傷之賜錢二十萬除父奉為郎中溫序字次房太原祁人也仕州從事建武二年騎都尉弓里戍將兵平定北州到太原歷訪英俊大人問以策謀戍見序奇之上疏薦焉於是徵為侍御史遷武陵都尉病免官六年拜謁者遷護羌校尉序行部至襄武為隗囂別將苟宇所拘劫宇謂序曰子若與我并威同力天下可圖也序曰受國重任分當效死義不貪生苟背恩德宇等復曉譬之序素有氣力大怒叱宇等曰虜何敢迫脅漢將因以節檛殺數人賊衆爭欲殺之宇止之曰此義士死節可賜以劒序受劒銜鬚於口顧左右曰既為賊所迫殺無令鬚汙土遂伏劒而死序主簿韓遵從事王忠持尸歸斂光武聞而憐之命忠送喪到洛陽賜城傍為冢地賻穀千斛縑五百匹除三子為郎中長子壽服竟為鄒平侯相夢序告之曰久客思鄉里壽即𠫓廾官上書乞骸骨歸葬帝許之乃反舊塋焉彭修字子陽會稽毗陵人也年十五時父為郡吏得休與修俱歸道為盜所劫修困迫乃拔佩刀前持盜帥曰父辱子死卿不顧死邪盜相謂曰此童子義士也不宜逼之遂辭謝而去鄉黨稱其名後仕郡為功曹時西部都尉宰鼂行太守事以微過收吳縣獄吏將殺之主簿鐘離意爭諫甚切鼂怒使收縛意欲案之掾吏史莫敢諫修排閣直入拜於庭曰明府發雷霆於主簿請聞其過鼂曰受教三日初不奉行廢命不忠豈非過邪修因拜曰昔任座面折文侯朱雲攀毀欄檻自非賢君焉得忠臣今慶明府為賢君主簿為忠臣鼂遂原意罰貰獄吏罪後州辟從事時賊張子林等數百人作亂郡言州請修守吳令修與太守俱出討賊賊望見車馬競交射之飛矢雨集修障扞太守而為流矢所中死太守得全賊素聞其恩信即殺弩中修者餘悉降散言曰自為彭君故降不為太守服也索盧放字君陽東郡人也以尚書教授千餘人初署郡門下掾更始時使者督行郡國太守有事當就斬刑放前言曰今天下所以苦毒王氏歸心皇漢者實以聖政寬仁故也而傳車所過未聞恩澤太守受誅誠不敢言但恐天下惶懼各生疑變夫使功者不如使過願以身代太守之命遂前就斬使者義而赦之由是顯名建武六年徵為洛陽令政有能名以病乞身徙諫議大夫數納忠言後以疾去建武末復徵不起光武使人輿之見於南宮雲臺賜穀二千斛遣歸除子為太子中庶子卒於家周嘉字惠文汝南安城人也高祖父燕宣帝時為郡決曹掾太守欲枉殺人燕諫不聽遂殺囚而黜燕囚家守闕稱冤詔遣覆考燕見太守曰願謹定文書皆著燕名府君但言時病而已出謂掾史曰諸君被問悉當以罪推燕如有一言及於府君燕手劒相刃使者乃收燕繫獄屢被掠楚辭無屈橈當下蠶室乃歎曰我平王之後正公玄孫豈可以刀鋸之餘下見先君遂不食而死燕有五子皆至刺史太守嘉仕郡為主簿王莽末羣賊入汝陽城嘉從太守何敞討賊敞為流矢所中郡兵奔北賊圍繞數十重白刃交集嘉乃擁敞以身扞之因呵賊曰卿曹皆人隸也為賊既逆豈有還害其君者邪嘉請以死贖君命因仰天號泣羣賊於是兩兩相視曰此義士也給其車馬遣送之後太守寇恂舉為孝廉拜尚書侍郎光武引見問以遭難之事嘉對曰太守被傷命懸寇手臣實駑怯不能死難帝曰此長者也詔嘉尚公主嘉稱病篤不肯當稍遷零陵太守視事七年卒零陵頌其遺愛吏民為立祠焉嘉從弟暢字伯持性仁慈為河南尹永初二年夏旱久禱無應暢因收葬洛城傍客死骸骨凡萬餘人應時澍雨歲乃豐稔位至光祿勳范式字巨卿山陽金鄉人也一名泛少遊太學為諸生與汝南張劭為友劭字元伯二人並告歸鄉里式謂元伯曰後二年當還將過拜尊親見孺子焉乃共剋期日後期方至元伯具以白母請設饌以候之母曰二年之別千里結言爾何相信之審邪對曰巨卿信士必不乖違母曰若然當為爾醞酒至其日巨卿果到升堂拜飲盡歡而別式仕為郡功曹後元伯寢疾篤同郡郅君章殷子徵晨夜省視之元伯臨盡歎曰恨不見吾死友子徵曰吾與君章盡心於子是非死友復欲誰求元伯曰若二子者吾生友耳山陽范巨卿所謂死友也尋而卒式忽夢見元伯玄冕垂纓屣履而呼曰巨卿吾以某日死當以爾時葬永歸黃泉子未我忘豈能相及式恍然覺寤悲歎泣下具告太守請往奔喪太守雖心不信而重違其情許之式便服朋友之服投其葬日馳往赴之式未及到而喪已發引既至壙將窆而柩不肯進其母撫之曰元伯豈有望邪遂停柩移時乃見有素車白馬號哭而來其母望之曰是必范巨卿也巨卿既至叩喪言曰行矣元伯死生路異永從此辭會葬者千人咸為揮涕式因執紼而引柩於是乃前式遂留止冢次為修墳樹然後乃去後到京師受業太學時諸生長沙陳平子亦同在學與式未相見而平子被病將亡謂其妻曰吾聞山陽范巨卿烈士也可以託死吾歿後但以尸埋巨卿戶前乃裂素為書以遺巨卿既終妻從其言時式出行適還省書見瘞愴然感之向墳揖哭以為死友乃營護平子妻兒身自送喪於臨湘未至四五里乃委素書於柩上哭別而去其兄弟聞之尋求不復見長沙上計掾史到京師上書表式行狀三府並辟不應舉州茂才四遷荊州刺史友人南陽孔嵩家貧親老乃變名姓傭為新野縣阿里街卒式行部到新野而縣選嵩為導騎迎式式見而識之呼嵩把臂謂曰子非孔仲山邪對之歎息語及平生曰昔與子俱曳長裾遊集息帝學吾蒙國恩致位牧伯而子懷道隱身處於卒伍不亦惜乎嵩曰侯嬴長守於賤業晨門肆志於抱關子欲居九夷不患其陋貧者士之宜豈為鄙哉式勑縣代嵩嵩以為先傭未竟不肯去嵩在阿里正身厲行街中子弟皆服其訓化遂辟公府之京師道宿下亭盜共竊其馬尋問知其嵩也乃相責讓曰孔仲山善士豈宜侵盜乎於是送馬謝之嵩官至南海太守式後遷廬江太守有威名卒於官李善字次孫南陽淯陽人本同縣李元蒼頭也建武中疫疾元家相繼死沒唯孤兒續始生數旬而資財千萬諸奴婢私共計議欲謀殺續分其財産善深傷李氏而力不能制乃潛負續逃去隱山陽瑕丘界中親自哺養乳為生湩推燥居溼備嘗艱勤續雖在孩抱奉之不異長君有事輒長跪請白然後行之閭里感其行皆相率修義續年十歲善與歸本縣修理舊業告奴婢於長吏悉收殺之時鍾離意為瑕丘令上書薦善行狀光武詔拜善及續並為太子舍人善顯宗時辟公府以能理劇再遷日南太守從京師之官道經淯陽過李元冢未至一里乃脫朝服持鉏去草及拜墓哭泣甚悲身自炊爨藝鼎俎以修祭祀垂泣曰君夫人善在此盡哀數日乃去到官以愛惠為政懷來異俗遷九江太守未至道病卒續至河閒相王忳字少林廣漢新都人也忳嘗詣京師於空舍中見一書生疾困臣攴心而視之書生謂忳曰我當到洛陽而被病命在須臾下有金十斤願以相贈死後乞藏骸骨未及問姓名而絶忳即鬻金一斤營其殯葬餘金悉置棺下人無知者後歸數年縣署忳大度亭長初到之日有馬馳入亭中而止其日大風飄一繡被復墯忳前即言之於縣縣以歸忳忳後乘馬到雒縣馬遂奔走牽忳入它舍主人見之喜曰今禽盜矣問忳所由得馬忳具說其狀并及繡被主人悵然良久乃曰被隨旋風與馬俱亡卿何陰德而致此二物忳自念有葬書生事因說之并道書生形貌及埋金處主人大驚號曰是我子也姓金名彥前往京師不知所在何意卿乃葬之大恩久不報天以此章卿德耳忳悉以被馬還之彥父不取又厚遺忳忳辭讓而去時彥父為州從事因告新都令假忳休自與俱迎彥喪餘金俱存忳由是顯名仕郡功曹州治中從事舉茂才除郿令到官至斄亭亭長曰亭有鬼數殺過客不可宿也忳曰仁勝凶邪德除不祥何鬼之避即入亭止宿夜中聞有女子稱冤之聲忳呪曰有何枉狀可前求理乎女子曰無衣不敢進忳便投衣與之女子乃前訴曰妾夫為涪令之官過宿此亭亭長無狀賊殺妾家十餘口埋在樓下悉取財貨忳問亭長姓名女子曰即今門下游徼者也忳曰汝何故數殺過客對曰妾不得白日自訴每夜陳冤客輒眠不見應不勝感恚故殺之忳曰當為汝理此冤勿復殺良善也因解衣於地忽然不見明旦召游徼詰問具服罪即收繫及同謀十餘人悉伏辜遣吏送其喪歸鄉里於是亭遂清安張武者吳郡由拳人也父業郡門下掾送太守妻子還鄉里至河內亭盜夜劫之業與賊戰死遂亡失尸骸武時年幼不及識父後之太學受業每節常持父遺劒至亡處祭醊泣而還太守第五倫嘉其行舉孝廉遭母喪過毀傷父魂靈不返因哀慟絶命陵續字智初會稽吳人也世為族姓祖父閎字子春建武中為尚書令美姿貌喜著越布單衣光武見而好之自是常勑會稽郡獻越布續幼孤仕郡戶曹史時歲荒民飢太守尹興使續於都亭賦民饘粥續悉簡閲其民訊以名氏事畢興問所食幾何續因口說六百餘人皆分別姓字無有差謬興異之刺史行部見續辟為別駕從事以病去還為郡門下掾是時楚王英謀反陰疏天下善士及楚事覺顯宗得其録有尹興名乃徵興詣廷尉獄續與主簿梁宏功曹史駟勳及掾史五百餘人詣洛陽詔獄就考諸吏不堪痛楚死者大半唯續宏勳掠考五毒肌肉消爛終無異辭續母遠至京師覘候消息獄事特急無緣與續相聞母但作饋食付門卒以進之續雖見考苦毒而辭色慷慨未嘗易容唯對食悲泣不能自勝使者怪而問其故續曰母來不得相見故泣耳使者大怒以為門卒通傳意氣召將案之續曰因食餉羹識母所自調和故知來耳非人告也使者問何以知母所作乎續曰母嘗截肉未嘗不方斷葱以寸為度是以知之使者問諸謁舍續母果來於是陰嘉之上書說續行狀帝即赦興等事還鄉里禁錮終身續以老病卒長子稠廣陵太守有理名中子逢樂安太守少子褒力行好學不慕榮名連徵不就褒子康已見前傳戴封字平仲濟北剛人也年十五詣太學師事鄮令東海申君申君卒送喪到東海道當經其家父母以封當還豫為娶妻封暫過拜親不宿而去還京師卒業時同學石敬平溫病卒封養視殯斂以所齎糧巿小棺送喪到家家更斂見敬平行時書物皆在棺中乃大異之封後遇賊財物悉被略奪唯餘縑七匹賊不知處封乃追以與之曰知諸君乏故送相遺賊驚曰此賢人也盡還其器物後舉孝廉光祿主事遭伯父喪去官詔書求賢良方正直言之士有至行能消災伏異者公卿郡守各舉一人郡及大司農俱舉封公車徵陛見對策第一擢拜議郎遷西華令時汝潁有蝗災獨不入西華界時督郵行縣蝗忽大至督郵其日即去蝗亦頓除一境奇之其年大旱封禱請無獲乃積薪坐其上以自焚火起而大雨暴至於是遠近歎服遷中山相時諸縣囚四百餘人辭狀已定當行刑封哀之皆遣歸家與剋期日皆無違者詔書策美焉永元十二年徵拜太常卒官李充字大遜陳留人也家貧兄弟六人同食遞衣妻竊謂充曰今貧居如此難以久安妾有私財願思分異充僞酬之曰如欲別居當醞酒具會請呼鄉里內外共議其事婦從充置酒宴客充於坐中前跪白母曰此婦無狀而教充離閒母兄罪合遣斥便呵叱其婦逐令出門婦銜涕而去坐中驚肅因遂罷散充後遭母喪行服墓次人有盜其墓樹者充手自殺之服闋立精舍講授太守魯平請署功曹不就平怒乃援充以捐溝中因謫署縣都亭長不得已起親職役後和帝公車徵不行延平中詔公卿中二千石各舉隱士大儒務取高行以勸後進特徵充為博士時魯平亦為博士每與集會常歎服焉充遷侍中大將軍鄧騭貴戚傾時無所下借以充高節每卑敬之嘗置酒請充賓客滿堂酒酣騭跪曰幸託椒房位列上將幕府初開欲辟天下奇偉以匡不逮惟諸君博求其器充乃為陳海內隱居懷道之士頗有不合騭欲絶其說以肉啖之充抵肉於地曰說士猶甘於肉遂出徑去騭甚望之同坐汝南張孟舉往讓充曰一日聞足下與鄧將軍說士未究激刺面折不由中和出言之責非所以光祚子孫者也充曰大丈夫居世貴行其意何能遠為子孫計哉由是見非於貴戚遷左中郎將年八十八為國三老安帝常特進見賜以几杖卒於家繆肜字豫公汝南召陵人也少孤兄弟四人皆同財業及各娶妻諸婦遂求分異又數有鬬爭之言肜深懷憤歎乃掩戶自撾曰繆肜汝修身謹行學聖人之法將以齊整風俗奈何不能正其家乎弟及諸婦聞之悉叩頭謝罪遂更為敦睦之行仕縣為主簿時縣令被章見考吏皆畏懼自誣而肜獨證據其事掠考苦毒至乃體生蟲蛆因復傳換五獄踰涉四年令卒以自免太守隴西梁湛召為決曹史安帝初湛病卒官肜送喪還隴西始葬會西羌反叛湛妻子悉避亂它郡肜獨留不去為起墳冢乃潛穿井旁以為窟室晝則隱竄夜則負土及賊平而墳已立其妻子意肜已死還見大驚關西咸稱傳之共給車馬衣資肜不受而歸鄉里辟公府舉尤異遷中牟令縣近京師多權豪肜到誅諸姦吏及託名貴戚賓客者百有餘人威名遂行卒於官陳重字景公豫章宜春人也少與同郡雷義為友俱學魯詩顏氏春秋太守張雲舉重孝廉重以讓義前後十餘通記雲不聽義明年舉孝廉重與俱在郎署有同署郎負息錢數十萬責主日至詭求無已重乃密以錢代還郎後覺知而厚辭謝之重曰非我之為將有同姓名者終不言惠又同舍郎有告歸寧者誤持鄰舍郎褲以去主疑重所取重不自申說而巿褲以償之後寧喪者歸以褲還主其事乃顯重後與義俱拜尚書郎義代同時人受罪以此黜退重見義去亦以病免後舉茂才除細陽令政有異化舉尤異當遷為會稽太守遭姊憂去官後為司徒所辟拜侍御史卒雷義字仲公豫章鄱陽人也初為郡功曹皆嘗擢舉善人不伐其功義嘗濟人死罪罪者後以金二斤謝之義不受金主伺義不在默投金於承塵上後葺理屋宇乃得之金主已死無所復還義乃以付縣曹後舉孝廉拜尚書侍郎有同時郎坐事當居刑作義默自表取其罪以此論司寇同臺郎覺之委位自上乞贖義罪順帝詔皆除刑義歸舉茂才讓於陳重刺史不聽義遂陽狂被髮走不應命鄉里為之語曰膠漆自謂堅不如雷與陳三府同時俱辟二人義遂為守灌謁者使持節督郡國行風俗太守令長坐者凡七十人旋拜侍御史除南頓令卒官子授官至蒼梧太守范冉字史雲陳留外黃人也少為縣小吏年十八奉檄迎督郵冉恥之乃遁去到南陽受業於樊英又遊三輔就馬融通經歷年乃還冉好違時絶俗為激詭之行常慕梁伯鸞閔仲叔之為人與漢中李固河內王奐親善而鄙賈偉節郭林宗焉奐後為考城令境接外黃屢遣書請冉冉不至及奐遷漢陽太守將行冉乃與弟協步齎麥酒於道側設壇以待之冉見奐車徒駱驛遂不自聞惟與弟共辨論於路奐識其聲即下車與相揖對奐曰行路倉卒非陳契闊之所可共到前亭宿息以分隔冉曰子前在考城思欲相從以賤質自絶豪友耳今子遠適千里會面無期故輕行相候以展訣別如其相追將有慕貴之譏矣便起告違拂衣而去奐瞻望弗及冉長逝不顧桓帝時以冉為萊蕪長遭母憂不到官後辟太尉府以狷急不能從俗常佩韋於朝議者欲以為侍御史因遁身逃命於梁沛之閒徒行敝服賣卜於巿遭黨人禁錮遂推鹿車載妻子捃拾自資或寓息客廬或依宿樹蔭如此十餘年乃結草室而居焉所止單陋有時糧粒盡窮居自若言貌無改閭里歌之曰甑中生塵范史雲釜中生魚范萊蕪及黨禁解為三府所辟乃應司空命是時西羌反叛黃巾作難制諸府掾屬不得妄有去就冉首自劾退詔書特原不理罪又辟太尉府以疾不行中平二年年七十四卒於家臨命遺令敕其子曰吾生於昏暗之世值乎淫侈之俗生不得匡世濟時死何忍自同於世氣絶便斂斂以時服衣足蔽形棺足周身斂畢便穿穿畢便埋其明堂之奠干飯寒水飲食之物勿有所下墳封高下令足自隱知我心者李子堅王子炳也今皆不在制之在爾勿令鄉人宗親有所加也於是三府各遣令史奔弔大將軍何進移書陳留太守纍行論諡僉曰宜為貞節先生會葬者二千餘人刺史郡守各為立碑表墓焉戴就字景成會稽上虞人也仕郡倉曹掾楊州刺史歐陽參奏太守成公浮臧罪遣部從事薛安案倉庫簿領收就於錢唐縣獄幽囚考掠五毒參至就慷慨直辭色不變容又燒鋘斧使就挾於肘腋就語獄卒可熟燒斧勿令冷每上彭考因止飯食不肯下肉焦毀墯地者掇而食之主者窮竭酷慘無復餘方乃臥就覆船下以馬通薰之一夜二日皆謂已死發船視之就方張眼大罵曰何不益火而使滅絶又復燒地以大針刺指爪中使以把土爪悉墯落主者以狀白安安呼見就謂曰太守罪穢狼藉受命考實君何故以骨肉拒扞邪就據地答言太守剖符大臣當以死報國卿雖銜命固宜申斷冤毒奈何誣枉忠良強相掠理令臣謗其君子證其父薛安庸騃忸行無義就考死之日當白之於天與羣鬼殺汝於亭中如蒙生全當手刃相裂安深奇其壯節即解械更與美談表其言辭解釋郡事徵浮還京師免歸鄉里太守劉寵舉就孝廉光祿主事病卒趙苞字威豪甘陵東武城人從兄忠為中常侍苞深恥其門族有宦官名藝不與忠交通初仕州郡舉孝廉再遷廣陵令視事三年政教清明郡表其狀遷遼西太守抗厲威嚴名振邊俗以到官明年遣使迎母及妻子垂當到郡道經柳城值鮮卑萬餘人入塞寇鈔苞母及妻子遂為所劫質載以擊郡苞率步騎二萬與賊對陳賊出母以示苞苞悲號謂母曰為子無狀欲以微祿奉養朝夕不圖為母作禍昔為母子今為王臣義不得顧私恩毀忠節唯當萬死無以塞罪母遙謂曰威豪人各有命何得相顧以虧忠義昔王陵母對漢使伏劒以固其志爾其勉之苞即時進戰賊悉摧破其母妻皆為所害苞殯斂母畢自上歸葬靈帝遣策弔慰封鄃侯苞葬訖謂鄉人曰食祿而避難非忠也殺母以全義非孝也如是有何面目立於天下遂歐血而死向栩字甫興河內朝歌人向長之後也少為書生性卓詭不倫恆讀老子狀如學道又似狂生好被髮著絳綃頭常於竈北坐板牀上如是積久板乃有膝踝足指之處不好語言而喜長嘯賓客從就輒伏而不視有弟子名為顏淵子貢季路冉有之輩或騎驢入市乞丐於人或悉要諸乞兒俱歸止宿為設酒食時人莫能測之郡禮請辟舉孝廉賢良方正有道公府辟皆不到又與城姜肱京兆韋著並徵栩不應後特徵到拜趙相及之官時人謂其必當脫素從儉而栩更乘鮮車御良馬世疑其始僞及到官略不視文書舍中生蒿萊徵拜侍中每朝廷大事侃然正色百官憚之會張角作亂栩上便宜頗譏刺左右不欲國家興兵但遣將於河上北向讀孝經賊自當消滅中常侍張讓讒栩不欲令國家命將出師疑與角同心欲為內應收送黃門北寺獄殺之諒輔字漢儒廣漢新都人也仕郡為五官掾時夏大旱太守自出祈禱山川連日而無所降輔乃自暴庭中慷慨呪曰輔為股肱不能進諫納忠薦賢退惡和調陰陽承順天意至令天地否隔萬物焦枯百姓喁喁無所訴告咎盡在輔今郡太守改服責己為民祈福精誠懇到未有感徹輔今敢自祈請若至日中不雨乞以身塞無狀於是積薪柴聚茭茅以自環搆火其傍將自焚焉未及日中時而天雲晦合須臾澍雨一郡沾潤世以此稱其至誠劉翊字子相潁川潁陰人也家世豐産常能周施而不有其惠曾行於汝南界中有陳國張季禮遠赴師喪遇寒冰車毀頓滯道路翊見而謂曰君慎終赴義行宜速達即下車與之不告姓名自策馬而去季禮意其子相也後故到潁陰還所假乘翊閉門辭行不與相見常守志臥疾不屈聘命河南种拂臨郡引為功曹翊以拂名公之子乃為起焉拂以其擇時而仕甚敬任之陽翟黃綱恃程夫人權力求占山澤以自營植拂召翊問曰程氏貴盛在帝左右不聽則恐見怨與之則奪民利為之奈何翊曰名山大澤不以封蓋為民也明府聽之則被佞幸之名矣若以此獲禍貴子申甫則自以不孤也拂從翊言遂不與之乃舉翊為孝廉不就後黃巾賊起郡縣飢荒翊救給乏絶資其食者數百中鄉族貧者死亡則為具殯葬嫠獨則助營妻娶獻帝遷都西京翊舉上計掾是時寇賊興起道路隔絶使驛稀有達者翊夜行晝伏乃到長安詔書嘉其忠勤特拜議郎遷陳留太守翊散所握珍玩唯餘車馬自載東歸出關數百里見士大夫病亡道次翊以馬易棺脫衣斂之又逢知故困餒於路不忍委去因殺所駕牛以救其乏衆人止之翊曰視沒不救非志士也遂俱餓死王烈字彥方太原人也少師事陳實以義行稱鄉里有盜牛者主得之盜請罪曰刑戮是甘乞不使王彥方知也烈聞而使人謝之遺布一端或問其故烈曰盜懼吾聞其過是有恥惡之心既懷恥惡必能改善故以此激之後有老父遺劒於路行道一人見而守之至暮老父還尋得劒怪而問其姓名以事告烈烈使推求乃先盜牛者也諸有爭訟曲直將質之於烈或至塗而反或望廬而還其以德感人若此察孝廉三府並辟皆不就遭黃巾董卓之亂乃避地遼東夷人尊奉之太守公孫度接以昆弟之禮訪酬政事欲以為長史烈乃為商賈自穢得免曹操聞烈高名遣徵不至建安二十四年終於遼東年七十八贊曰乘方不忒臨義罔惑惟此剛潔果行育德
