body:
  text: 後漢書卷二顯宗孝明帝紀第二顯宗孝明皇帝諱莊光武第四子也母陰皇后帝生而豐下十歲能通春秋光武奇之建武十五年封東海公十七年進爵為王十九年立為皇太子師事博士桓榮學通尚書中元二年二月戊戌即皇帝位年三十尊皇后曰皇太后三月丁卯葬光武皇帝於原陵有司奏上尊廟曰世祖夏四月丙辰詔曰豫末小子奉承聖業夙夜震畏不敢荒寧先帝受命中興德侔帝王協和萬邦假於上下懷柔百神惠於魚衆寡朕承大運繼體守文不知稼穡之艱難懼有廢失聖恩遺戒顧重天下以元元為首公卿百僚將何以輔朕不逮其賜天下男子爵人二級三老孝悌力田人三級爵過公乘得移與子若同産同産子及流人無名數欲自占者人一級魚衆寡孤獨篤粟人十斛其施刑及郡國徒在中元元年四月己卯赦前所犯而後捕繫者悉免其刑又邊人遭亂為內郡人妻在己卯赦前一切遣還邊恣其所樂中二千石下至黃綬貶秩贖論者悉皆復秩還贖方今上無天子下無方伯若涉淵水而無舟楫夫萬乘至重而壯者慮輕實賴有德左右小子高密侯禹元功之首東平王蒼寬博有謀並可以受六尺之託臨大節而不撓其以禹為太傅蒼為驃騎將軍太尉喜告諡南郊司徒欣奉安梓宮司空魴將校復土其封喜為節鄉侯欣為安鄉侯魴為楊邑侯秋九月燒當羌寇隴西敗郡兵於允街赦隴西囚徒減罪一等勿收今旬祭捸又所發天水三千人亦復是歲更賦遣謁者張鴻討叛羌於允吾鴻軍大敗戰歿冬十一月遣中郎將竇固監捕虜將軍馬武等二將軍討燒當羌十二月甲寅詔曰方春戒節人以耕桑其勑有司務順時氣使無煩擾天下亡命殊死以下聽得贖論死罪入縑二十匹右趾至髡鉗城旦舂十匹完城旦舂至司寇作三匹其未發覺詔書到先自告者半入贖今選舉不實邪佞未去權門請託殘吏放手百姓愁怨情無告訴有司明奏罪名并正舉者又郡縣每因徵發輕為姦利詭責羸弱先急下貧其務在均平無令枉刻永平元年春正月帝率公卿已下朝於原陵如元會儀夏五月太傅鄧禹薨戊寅東海王彊薨遣司空馮魴持節視喪事賜升龍旄頭鑾輅龍旗六月乙卯葬東海恭王秋七月捕虜將軍馬武等與燒當羌戰大破之募士卒戍隴右賜錢人三萬八月戊子徙山陽王荊為廣陵王遣就國是歲遼東太守祭肜使鮮卑擊赤山烏桓大破之斬其渠帥越巂姑復夷叛州郡討平之二年春正月辛末宗祀光武皇帝於明堂帝及公卿列侯始服冠冕衣裳玉佩絇屨以行事禮畢登靈臺使尚書令持節詔驃騎將軍三公曰今令月吉日宗祀光武皇帝於明堂以配五帝禮備法物樂和八音詠祉福舞功德其班時令勑羣后事畢升靈臺望元氣吹時律觀物變羣僚藩輔宗室子孫衆郡奉計百蠻貢職烏桓濊貊咸來助祭單于侍子骨都侯亦皆陪位斯固聖祖功德之所致也朕以暗陋奉承大業親執圭璧恭祀天地仰惟先帝受命中興撥亂反正以寧天下封泰山建明堂立辟雍起靈臺恢弘大道被之八極而胤子無成康之質羣臣無呂旦之謀盥洗進爵踧踖惟慙素性頑鄙臨事益懼故君子坦蕩蕩小人長戚戚其令天下自殊死已下謀反大逆皆赦除之百僚師尹其勉修厥職順行時令敬若昊天以綏兆人三月臨辟雍初行大射禮秋九月沛王輔楚王英濟南王康淮陽王延東海王政來朝冬十月壬子幸辟雍初行養老禮詔曰光武皇帝建三朝之禮而未及臨饗眇眇小子屬當聖業閒暮春吉辰初行大射令月元日復踐辟雍尊事三老兄事五更安車軟輪供綏執授侯王設醬公卿饌珍朕親袒割執爵而酳祝哽在前祝噎在後升歌鹿鳴下管新宮八佾具修萬舞於庭朕固薄德何以克當易陳負乘詩刺彼己永念慙疚無忘厥心三老李躬年耆學明五更桓榮授朕尚書詩曰無德不報無言不酬其賜榮爵關內侯食邑五千戶三老五更皆以二千石祿養終厥身其賜天下三老酒人一石肉四十斤有司其存耆恤幼孤惠魚衆寡稱朕意焉中山王焉始就國甲子西巡狩幸長安祠高廟遂有事於十一陵歷覽館邑會郡縣吏勞賜作樂十一月甲申遣使者以中牢祠蕭何霍光帝謁陵園過式其墓進幸河東所過賜二千石令長已下至於掾史各有差癸卯車駕還宮十二月護羌校尉竇林下獄死是歲始迎氣於五郊少府陰就子豐殺其妻酈邑公主就坐自殺三年春正月癸巳詔曰朕奉郊祀登靈臺見史官正儀度夫春者歲之始也始得其正則三時有成比者水旱不節邊人食寡政失於上人受其咎有司其勉順時氣勸督農桑去其螟蜮以及蝥賊詳刑慎罰明察單辭夙夜匪懈以稱朕意二月甲寅太尉趙喜司徒李欣免丙辰左馮翊郭丹為司徒己未南陽太守虞延為太尉甲子立貴人馬氏為皇后皇子炟為皇太子賜天下男子爵人二級三老孝悌力田人三級流人無名數欲占者人一級魚衆寡孤獨篤貧不能自存者粟人五斛夏四月辛酉封皇子建為千乘王羡為廣平王六月丁卯有星孛于天船北秋八月戊辰改大樂為大豫樂壬申晦日有蝕之詔曰朕奉承祖業無有善政日月薄蝕彗孛見天水旱不節稼穡不成人無宿儲下生愁墊雖夙夜勤思而智能不逮昔楚莊無災以致戒懼魯哀禍大天不降譴今之動變儻岩救有司勉思厥職以匡無德古者卿士獻詩百工針諫其言事者靡有所諱冬十月蒸祭光武廟初奏文始五行武德之舞甲子車駕從皇太后幸章陵觀舊廬十二月戊辰至自章陵是歲起北宮及諸官府京師及郡國七大水四年春二月辛亥詔曰朕親耕藉田以祈農事京師冬無宿雪春不燠沐煩勞羣司積精禱求而比再得時雨宿麥潤澤其賜公卿半奉有司勉遵時政務平刑罰秋九月戊寅千乘王建薨冬十月乙卯司徒郭丹司空馮魴免丙辰河南尹范遷為司徒太僕伏恭為司空十二月陵鄉侯梁松下獄死五年春二月庚戌驃騎將軍東平王蒼罷歸藩琅邪王京就國冬十月行幸鄴與趙王栩會鄴常山三老言於帝曰上生於元氏願蒙優復詔曰豐沛濟陽受命所由加恩報德適其宜也今永平之政百姓怨結而吏人求復令人愧笑重逆此縣之拳拳其復元氏縣田租更賦六歲勞賜縣掾史及門闌走卒至自鄴十一月北胸奴寇五原十二月寇雲中南單于擊却之是歲發遣邊人在內郡者賜裝錢人二萬六年春正月沛王輔楚王英東平王蒼淮陽王延琅邪王京東海王政趙王盱北海王興齊王石來朝二月王雒山出寶鼎廬江太守獻之夏四月甲子詔曰昔禹收九牧之金鑄𣇓以象物使人知神姦不逢惡氣遭德則興遷于商周周德既衰𣇓乃淪亡祥瑞之降以應有德方今政化多僻何以致茲易曰𣇓象三公豈公卿奉職得其理邪太常其以礿祭之日陳𣇓於廟以備器用賜三公帛五十匹九卿二千石半之先帝詔書禁人上事言聖而閒者章奏頗多浮詞自今若有過稱虛譽尚書皆宜抑而不省示不為諂子蚩也冬十月行幸魯祠東海恭王陵會沛王輔楚王英濟南王康東平王蒼淮陽王延琅邪王京東海王政十二月還幸陽城遣使者祠中嶽壬午車駕還宮東平王蒼琅邪王京從駕來朝皇太后七年春正月癸卯皇太后陰氏崩二月庚申葬光烈皇后秋八月戊辰北海王興薨是歲北胸奴遣使乞和親八年春正月己卯司徒范遷薨三月辛卯太尉虞延為司徒衛尉趙喜行太尉事遣越騎司馬鄭衆報使北胸奴初置度遼將軍屯五原曼柏秋郡國十四雨水冬十月北宮成丙子臨辟雍養三老五更禮畢詔三公募郡國中都官死罪繫囚減罪一等勿笞詣度遼將軍營屯朔方五原之邊縣妻子自隨便占著邊縣父母同産欲相代者恣聽之其大逆無道殊死者一切募下蠶室亡命者令贖罪各有差凡徙者賜弓弩衣糧壬寅晦日有食之既詔曰朕以無德奉承大業而下貽人怨上動三光日食之變其災尤大春秋圖讖所為至譴永思厥咎在豫一人羣司勉修職事極言無諱於是在位者皆上封事各言得失帝覽章深自引咎乃以所上班示百官詔曰羣僚所言皆朕之過人冤不能理吏黠不能禁而輕用人力繕修宮宇出入無節喜怒過差昔應門失守關雎刺世飛蓬隨風微子所歎永覽前戒竦然兢懼徒恐薄德久而致怠耳北胸奴寇西河諸郡九年春三月辛丑詔郡國死罪囚減罪與妻子詣五原朔方占著所在死者皆賜妻父若男同産一人復終身其妻無父兄獨有母者賜其母錢六萬又復其口算夏四月甲辰詔郡國以公田賜貧人各有差令司隸校尉部刺史歲上墨綬長吏視事三歲已上理狀尤異者各一人與計偕上及尤不政理者亦以聞是歲大有年為四姓小侯開立學校置五經師十年春二月廣陵王荊有罪自殺國除夏四月戊子詔曰昔歲五穀登衍今茲蠶麥善收其大赦天下方盛夏長養之時蕩滌宿惡以報農功百姓勉務桑稼以備災害吏敬厥職無令愆墯閏月甲午南巡狩幸南陽祠章陵日北至又祠舊宅禮畢召校官弟子作雅樂奏鹿鳴帝自御塤篪和之以娛嘉賓還幸南頓勞饗三老官屬冬十一月徵淮陽王廷會平輿徵沛王輔會睢陽十二月甲午車駕還宮十一年春正月沛王輔楚王英濟南王康東平王蒼淮陽王延中山王焉琅邪王京東海王政來朝秋七月司隸校尉郭霸下獄死是歲漅湖出黃金廬江太守以獻時麒麟白雉醴泉嘉禾所在出焉十二年春正月益州徼外夷哀牢王相率內屬於是置永昌郡罷益州西部都尉夏四月遣將作謁者王吳修渠自滎陽至于千乘海口五月丙辰賜天下男子爵人二級三老孝悌力田人三級流民無名數欲占者人一級魚衆寡孤獨篤貧無家屬不能自存者粟人三斛詔曰昔曾閔奉親竭觀致養仲尼葬子有棺無椁喪貴致哀禮存寧儉今百姓送終之制競為奢靡生者無擔石之儲而財力盡於墳土伏臘無糟糠而牲牢兼於一奠糜破積世之業以供終朝之費子孫飢寒絶命於此豈祖考之意哉又車服制度恣極耳目田荒不耕游食者衆有司其申明科禁宜於今者宣下郡國秋七月乙亥司空伏恭罷乙未大司農牟融為司空冬十月司隸校尉王康下獄死是歲天下安平人無徭役歲比登稔百姓殷富粟斛三十牛羊被野十三年春二月帝耕於藉田禮畢賜觀者食三月河南尹薛昭下獄死夏四月渠成辛巳行幸滎陽巡行河渠乙酉詔曰自渠決敗六十餘歲加頃年以來雨水不時流東侵日月益甚水門故處皆在河中漭漾廣溢莫測圻岸蕩蕩極望不知綱紀今兗豫之人多被水患乃云縣官不先人急好興它役又或以為河流入幽冀蒙利故曰左隄彊則右隄傷左右俱彊則下方傷宜任水藝所之使人隨高而處公家息壅塞之費百姓無陷溺之患議者不同南北異論朕不知所從久而不決今既築隄理渠絶水立門河分流復其舊迹陶丘之北漸就壤墳故薦嘉玉潔牲以禮河神東過洛汭歎禹之績今五土之宜反其正色濱渠下田賦與貧人無令豪右得固其利庶繼世宗瓠子之作因遂度河登太行進幸上黨壬寅車駕還宮冬十月壬辰晦日有食之三公免冠自劾制曰冠履勿劾災異屢見咎在朕躬憂懼遑遑未知其方將有司陳事多所隱諱使君上壅蔽下有不暢乎昔衛有忠臣靈公得守其位今何以和穆陰陽消伏災譴刺史太守詳刑理冤存恤魚衆孤勉思職焉十一月楚王英謀反廢國除遷於涇縣所連及死徙者數千人是歲齊王石薨十四年春三月甲戌司徒虞延免自殺夏四月丁巳巨鹿太守南陽邢穆為司徒前楚王英自殺夏五月封故廣陵王荊子元壽為廣陵侯初作壽陵十五年春二月庚子東巡狩辛丑幸偃師詔亡命自殊死以下贖死罪縑四十匹右趾至髠鉗城旦舂十匹完城旦至司寇五匹犯罪未發覺詔書到日自告者半入贖徵沛王輔會睢陽進幸彭城癸亥帝耕于下邳三月徵琅邪王京會良成徵東平王蒼會陽都又徵廣陵侯及其三弟會魯祠東海恭王陵還幸孔子宅祠仲尼及七十二弟子親御講堂命皇太子諸王說經又幸東平辛卯進幸大梁至定陶祠定陶恭王陵夏四月庚子車駕還宮改信都為樂成國臨淮為下邳國封皇子恭為巨鹿王黨為樂成王衍為下邳王暢為汝南王昞為常山王長為濟陰王賜天下男子爵人三級郎從官視事二十歲已上帛百匹十歲已上二十匹十歲已下十匹官府吏五匹書佐小史三匹令天下大酺五日乙巳大赦天下其謀反大逆及諸不應宥者皆赦除之冬車騎校獵上林苑十二月遣奉車都尉竇固駙馬都尉耿秉屯涼州十六年春二月遣太僕祭肜出高闕奉車都尉竇固出酒泉駙馬都尉耿秉出居延騎都尉來苗出平城伐北胸奴竇固破呼衍王於天山留兵屯伊吾盧城耿秉來苗祭肜並無功而還夏五月淮陽王延謀反發覺癸丑司徒邢穆駙馬都尉韓光坐事下獄死所連及誅死者甚衆戊午晦日有食之六月丙寅大司農西河王敏為司徒秋七月淮陽王延徙封阜陵王九月丁卯詔令郡國中都官死罪繫囚減死罪一等勿笞詣軍營屯朔方敦煌妻子自隨父母同産欲求從者恣聽之女子嫁為人妻勿與俱謀反大逆無道不用此書是歲北胸奴寇雲中雲中太守廉范擊破之十七年春正月甘露降於甘陵北海王睦薨二月乙巳司徒王敏薨三月癸丑汝南太守鮑昱為司徒是歲甘露仍降樹枝內附芝草生殿前神雀五色翔集京師西南夷哀牢儋耳僬僥槃木白狼動黏諸種前後慕義貢獻西域諸國遣子入侍夏五月戊子公卿百官以帝威德懷遠祥物顯應乃並集朝堂奉觴上壽制曰天生神物以應王者遠人慕化實由有德朕以虛薄何以享斯唯高祖光武聖德所被不敢有辭其敬舉觴太常擇吉日策告宗廟其賜天下男子爵人二級三老孝悌力田人三級流人無名數欲占者人一級魚衆寡孤獨篤貧不能自存者粟人三斛郎從官視事十歲以上者帛十匹中二千石二千石下至黃綬貶秩奉贖在去年以來皆還贖秋八月丙寅令武威張掖酒泉敦煌及張掖屬國繫囚右趾已下任兵者皆一切勿治其罪詣軍營冬十一月遣奉車都尉竇固駙馬都尉耿秉騎都尉劉張出敦煌昆侖塞擊破白山虜於蒲類海上遂入車師初置西域都護戊己校尉是歲改天水為漢陽郡十八年春三月丁亥詔曰其令天下亡命自殊死已下贖死罪縑三十匹右趾至髡鉗城旦舂十匹完城旦至司寇五匹吏人犯罪未發覺詔書到自告者半入贖夏四月己未詔曰自春已來時雨不降宿麥傷旱秋種未下政失厥中憂懼而已其賜天下男子爵人二級及流民無名數欲占者人一級魚衆寡孤獨篤貧不能自存者粟人三斛理冤獄録輕繫二千石分禱五嶽四瀆郡界有名山大川能興雲致雨者長吏各潔齊禱請冀蒙嘉澍六月己未有星孛於太微焉耆龜茲攻西域都護陳睦悉沒其衆北胸奴及車師後王圍戊己校尉耿恭秋八月壬子帝崩於東宮前殿年四十八遺詔無起寢廟藏主於光烈皇后更衣別室帝初作壽陵制令流水而已石椁廣一丈二尺長二丈五尺無得起墳萬年之後掃地而祭杅水脯糒而已過百日唯四時設奠置吏卒數人供給灑掃勿開修道敢有所興作者以議宗廟法從事帝遵奉建武制度無敢違者後宮之家不得封侯與政館陶公主為子求郎不許而賜錢千萬謂羣臣曰郎官上應列宿出宰百里有非其人則民受其殃是以難之故吏稱其官民安其業遠近肅服戶口滋殖焉論曰明帝善刑理法令分明日晏坐朝幽枉必達內外無幸曲之私在上無矝大之色斷獄得情號居前代十二故後之言事者莫不先建武永平之政而鍾離意宋均之徒常以察慧為言夫豈弘人之度未優乎贊曰顯宗丕承業業兢兢危心恭德政察姦勝備章朝物省薄墳陵永懷廢典下身遵道登臺觀雲臨雍拜老懋惟帝績增光文考
