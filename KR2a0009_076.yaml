body:
  text: 後漢書卷七十鄭孔荀列傳第六十鄭太字公業河南開封人司農衆之曾孫也少有才略靈帝末知天下將亂陰交結豪桀家富於財有田四百頃而食常不足名聞山東初舉孝廉三府辟公車徵皆不就及大將軍何進輔政徵用名士以公業為尚書侍郎遷侍御史進將誅閹官欲召并州牧董卓為助公業謂進曰董卓強忍寡義志欲無猒若借之朝政授以大事將恣凶欲必危朝廷明公以親德之重據阿衡之權秉意獨斷誅除有罪誠不宜假卓以為資援也且事留變生殷鑒不遠又為陳時務之所急數事進不能用乃𠫓廾官去謂潁川人荀攸曰何公未易輔也進尋見害卓果作亂公業等與侍中伍瓊卓長史何顒共説卓以袁紹為勃海太守以發山東之謀及義兵起卓乃會公卿議大發卒討之羣僚莫敢忤旨公業恐其衆多益橫凶強難制獨曰夫政在德不在衆也卓不悅曰如卿此言兵為無用邪公業懼乃詭詞更對曰非謂無用以為山東不足加大兵耳如有不信試為明公略陳其要今山東合謀州郡連結人庶相動非不強盛然光武以來中國無警百姓優逸忘戰日久仲尼有言不教人戰是謂𠫓廾之其衆雖多不能為害一也明公出自西州少為國將間習軍事數踐戰埸名振當世人懷懾服二也袁本初公卿子弟生處京師張孟卓東平長者坐不窺堂孔公緒清談高論噓枯吹生並無軍旅之才藝鋭之幹臨鋒決敵非公之儔三也山東之士素乏精悍未有孟賁之勇慶忌之捷聊城之守良平之謀可任以偏師責以成功四也就有其人而尊卑無序王爵不加若恃衆怙力將各基峙以觀成敗不肯同心共膽與齊進退五也關西諸郡頗習兵事自頃以來數與羌戰婦女猶戴戟操矛挾弓負矢況其壯勇之士以當妄戰之人乎其勝可必六也且天下強勇百姓所畏者有并涼之人及胸奴屠各湟中義從西羌八種而明公擁之以為爪牙譬驅虎兕以赴犬羊七也又明公將帥皆中表腹心周旋日久恩信淳著忠誠可任智謀可恃以膠固之衆當解合之藝猶以烈風掃彼枯葉八也夫戰有三亡以亂攻理者亡以邪攻正者亡以逆攻順者亡今明公秉國平正討滅宦豎忠義克立以此三德持彼三亡奉辭伐罪誰敢禦之九也東州鄭玄學該古今北海邴原清高直亮皆儒生所仰羣士楷式彼諸將若詢其計畫足知強弱且燕趙齊梁非不盛也終滅於秦吳楚七國非不衆也卒敗滎陽況今德政赫赫股肱惟良彼豈讚成其謀造亂長寇哉其不然十也若其所陳少有可採無事徵兵以驚天下使患役之民相聚為非𠫓廾德恃衆自虧威重卓乃悅以公業為將軍使統諸軍討擊關東或説卓曰鄭公業智略過人而結謀外寇今資之士馬就其黨與竊為明公懼之卓乃收還其兵留拜議郎卓既遷都長安天下飢亂士大夫多不得其命而公業家有餘資日引賓客高會倡樂所贍救者甚衆乃與何顒荀攸共謀殺卓事泄顒等被執公業脫身自武關走東歸袁術術上以為楊州刺史未至官道卒年四十一孔融字文舉魯國人孔子二十世孫也七世祖霸為元帝師位至侍中父宙太山都尉融幼有異才年十歲隨父詣京師時河南尹李膺以簡重自居不妄接士賓客勑外自非當世名人及與通家皆不得白融欲觀其人故造膺門語門者曰我是李君通家子弟門者言之膺請融問曰高明祖父嘗與僕有恩舊乎融曰然先君孔子與君先人李老君同德比義而相師友則融與君纍世通家衆坐莫不歎息太中大夫陳煒後至坐中以告煒煒曰夫人小而聰了大未必奇融應聲曰觀君所言將不早惠乎膺大笑曰高明必為偉器年十三喪父哀悴過毀扶而後起州里歸其孝性好學博涉多該覽山陽張儉為中常侍侯覽所怨覽為刊章下州郡以名捕儉儉與融兄褒有舊亡抵於褒不遇時融年十六儉少之而不告融見其有窘色謂曰兄雖在外吾獨不能為君主邪因留舍之後事泄國相以下密就掩捕儉得脫走遂并收褒融送獄二人未知所坐融曰保納舍藏者融也當坐之褒曰彼來求我非弟之過請甘其罪吏問其母母曰家事任長妾當其辜一門爭死郡縣疑不能決乃上讞之詔書竟坐褒焉融由是顯名與平原陶丘洪陳留邊讓齊聲稱州郡禮命皆不就辟司徒楊賜府時隱核官僚之貪濁者將加貶黜融多舉中官親族尚書畏迫內寵召掾屬詰責之融陳對罪惡言無阿撓河南尹何進當遷為大將軍楊賜遣融奉謁賀進不時通融即奪謁還府投劾而去河南官屬恥之私遣劒客欲追殺融客有言於進曰孔文舉有重名將軍若造怨此人則四方之士引領而去矣不如因而禮之可以示廣於天下進然之既拜而辟融舉高第為侍御史與中丞趙舍不同託病歸家後辟司空掾拜中軍候在職三日遷虎賁中郎將會董卓廢立融每因對答輒有匡正之言以忤卓旨轉為議郎時黃巾寇數州而北海最為賊衝卓乃諷三府同舉融為北海相融到郡收合士民起兵講武馳檄飛翰引謀州郡賊張饒等羣輩二十萬衆從冀州還融逆擊為饒所敗乃收散兵保朱虛縣稍復鳩集吏民為黃巾所誤者男女四萬餘人更置城邑立學校表顯儒術薦舉賢良鄭玄彭璆邴原等郡人甄子然臨孝存知名早卒融恨不及之乃命配食縣社其餘雖一介之善莫不加禮焉郡人無後及四方遊士有死亡者皆為棺具而斂葬之時黃巾復來侵暴融乃出屯都昌為賊管亥所圍融逼急乃遣東萊太史慈求救於平原相劉備備驚曰孔北海乃復知天下有劉備邪即遣兵三千救之賊乃散走時袁曹方盛而融無所協附左丞祖者稱有意謀勸融有所結納融知紹操終圖漢室不欲與同故怒而殺之融負其高氣志在靖難而才疏意廣迄無成功在郡六年劉備表領青州刺史建安元年為袁談所攻自春至夏戰士所餘裁數百人流矢雨集戈矛內接融隱几讀書談笑自若城夜陷乃奔東山妻子為談所虜及獻帝都許徵融為將作大匠遷少府每朝會訪對融輒引正定議公卿大夫皆隸名而已初太傅馬日磾奉使山東及至淮南數有意於袁術術輕侮之遂奪取其節求去又不聽因欲逼為軍帥日磾深自恨遂嘔血而斃及喪還朝廷議欲加禮融乃獨議曰日磾以上公之尊秉髦節之使銜命直指寧輯東夏而曲媚姦臣為所牽率章表署用輒使首名附下罔上姦以事君昔國佐當晉軍而不撓宜僚臨白刃而正色王室大臣豈得以見脅為辭又袁術僭逆非一朝一夕日磾隨從周旋歷歲漢律與罪人交關三日已上皆應知情春秋魯叔孫得臣卒以不發揚襄仲之罪貶不書日鄭人討幽公之亂斫子家之棺聖上哀矜舊臣未忍追案不宜加禮朝廷從之時論者多欲復肉刑融乃建議曰古者敦厖善否不別吏端刑清政無過失百姓有罪皆自取之末世陵風化壞亂政撓其俗法害其人故曰上失其道民散久矣而欲繩之以古刑投之以殘𠫓廾非所謂與時消息者也紂斫朝涉之脛天下謂為無道夫九牧之地千八百君若各刖一人是下常有千八百紂也求俗休和弗可得已且被刑之人慮不念生志在思死類多趨惡莫復歸正夙沙亂齊伊戾禍宋趙高英布為世大患不能止人遂為非也適足絶人還為善耳雖忠如鬻拳信如卞和智如孫臏冤如巷伯才如史遷達如子政一離刀鋸沒世不齒是太甲之思庸穆公之霸秦南睢之骨立衛武之初筵陳湯之都賴魏尚之守邊無所復施也漢開改惡之路凡為此也故明德之君遠度深惟𠫓廾短就長不苟革其政者也朝廷善之卒不改焉是時荊州牧劉表不供職貢多行僭偽遂乃郊祀天地擬斥乘輿詔書班下其事融上疏曰竊聞領荊州牧劉表桀逆放恣所為不軌至乃郊祭天地擬儀社稷雖昏僭惡極罪不容誅至於國體宜且諱之何者萬乘至重天王至尊身為聖躬國為神器陛級縣遠祿位限絶猶天之不可階日月之不可踰也每有一豎臣輒云圖之若形之四方非所以杜塞邪萌愚謂雖有重戾必宜隱忍賈誼所謂擲鼠忌器蓋謂此也是以齊兵次楚唯責包茅王師敗績不書晉人前以露袁術之罪今復下劉表之事是使跛牂欲窺高岸天險可得而登也案表跋扈誅列侯遏絶詔命斷盜貢篚招呼元惡以自營衛專為羣逆主萃淵藪郜鼎在廟章孰甚焉桑落瓦解其藝可見臣愚以為宜隱郊祀之事以崇國防五年南陽王馮東海王祗薨帝傷其早歿欲為修四時之祭以訪於融融對曰聖恩敦睦感時增思悼二王之靈發哀愍之詔稽度前典以正禮制竊觀故事前梁懷王臨江愍王齊哀王臨淮懷王並薨無後同産昆弟即景武昭明四帝是也未聞前朝修立祭祀若臨時所施則不列傳紀臣愚以為諸在沖聖慈哀悼禮同成人加以號諡者宜稱上恩祭祀禮畢而後絶之至於一歲之限不合禮意又違先帝已然之法所未敢處初曹操攻屠鄴城袁氏婦子多見侵略而操子丕私納袁熙妻甄氏融乃與操書稱武王伐紂以妲己賜周公操不悟後問出何經典對曰以今度之想當然耳後操討烏桓又嘲之曰大將軍遠征蕭條海外昔肅慎不貢楛矢丁零盜蘇武牛羊可并案也時年飢兵興操表制酒禁融頻書爭之多侮慢之辭既見操雄詐漸著數不能堪故發辭偏宕多致乖忤又嘗奏宜準古王畿之制千里寰內不以封建諸侯操疑其所論建漸廣益憚之然以融名重天下外相容忍而潛忌正議慮鯁大業山陽郗慮承望風旨以微法奏免融官因顯明讎怨操故書激厲融曰蓋聞唐虞之朝有克讓之臣故麟鳳來而頌聲作也後世德薄猶有殺身為君破家為國及至其敝睚眥之怨必讎一餐之惠必報故鼂錯念國遘禍於袁盎屈平悼楚受譖於椒蘭彭寵傾亂起自朱浮鄧禹威損失於宗馮由此言之喜怒怨愛禍福所因可不慎與昔廉藺小國之臣猶能相下寇賈倉卒武夫屈節崇好光武不問伯升之怨齊侯不疑射鉤之虜夫立大操者豈纍細故哉往聞二君有執法之平以為小介當收舊好而怨毒漸積志相危害聞之憮然中夜而起昔國家東遷文舉盛歎鴻豫名實相副綜達經學出於鄭玄又明司馬法鴻豫亦稱文舉奇逸博聞誠怪今者與始相違孤與文舉既非舊好又於鴻豫亦無恩紀然願人之相美不樂人之相傷是以區區思協歡好又知二君羣小所搆孤為人臣進不能風化海內退不能建德和人然撫養戰士殺身為國破浮華交會之徒計有餘矣融報曰猥惠書教告所不逮融與鴻豫州里比郡知之最早雖嘗陳其功美欲以厚於見私信於為國不求其覆過掩惡有罪望不坐也前者黜退歡欣受之昔趙宣子朝登韓厥夕被其戮喜而求賀況無彼人之功而敢枉當官之平哉忠非三閭智非鼂錯竊位為過免罪為幸乃使餘論遠聞所以慙懼也朱彭寇賈為世壯士愛惡相攻能為國憂至於輕弱薄劣猶昆蟲之相囓適足還害其身誠無所至也晉侯嘉其臣所爭者大而師曠以為不如心競性既緩與人無傷雖出胯下之負榆次之辱不知貶毀之於己猶蚊虻之一過也子産謂人心不相似或矜藝者欲以取勝為榮不念宋人待四海之客大爐不欲令酒酸也至於屈穀巨瓠堅而無竅當以無用罪之耳它者奉遵嚴教不敢失墜郗為故吏融所推進趙衰之拔郤縠不輕公叔之升臣也知同其愛訓誨發中雖懿伯之忌猶不得念況恃舊交而欲自外於賢吏哉輒布腹心修好如初苦言至意終身誦之歲餘復拜太中大夫性寬容少忌好士喜誘益後進及退間職賓客日盈其門常歎曰坐上客恆滿尊中酒不空吾無憂矣與蔡雍素善雍卒後有虎賁士貌類於雍融每酒酣引與同坐曰雖無老成人且有典刑融聞人之善若出諸己言有可採必演而成之面告其短而退稱所長薦達賢士多所奬進知而未言以為己過故海內英俊皆信服之曹操既積嫌忌而郗慮復搆成其罪遂令丞相軍謀祭酒路粹枉狀奏融曰少府孔融昔在北海見王室不靜而招合徒衆欲規不軌云我大聖之後而見滅於宋有天下者何必卯金刀及與孫權使語謗訕朝廷又融為九列不遵朝儀禿巾微行唐突宮掖又前與白衣禰衡跌蕩於言云父之於子當有何親論其本意實為情欲發耳子之於母亦復奚為譬如寄物中出則離矣既而與衡更相贊揚衡謂融曰仲尼不死融答曰顏回復生大逆不道宜極重誅書奏下獄𠫓廾市時年五十六妻子皆被誅初女年七歲男年九歲以其幼弱得全寄它舍二子方奕融被收而不動左右曰父執而不起何也答曰安有巢毀而卵不破乎主人有遺肉汁男渴而飲之女曰今日之禍豈得久活何賴知肉味乎兄號泣而止或言於曹操遂盡殺之及收至謂兄曰若死者有知得見父母豈非至願乃延頸就刑顏色不變莫不傷之初京兆人脂習元升與融相善每戒融剛直及被害許下莫敢收者習往撫尸曰文舉舍我死吾何用生為操聞大怒將收習殺之後得赦出魏文帝深好融文辭每歎曰楊班儔也募天下有上融文章者輒賞以金帛所著詩頌碑文論議六言策文表檄教令書記凡二十五篇文帝以習有欒布之節加中散大夫論曰昔諫大夫鄭昌有言山有猛獸者藜藿為之不採是以孔父正色不容弒虐之謀平仲立朝有紓盜齊之望若夫文舉之高志直情其足以動義概而忤雄心故使移鼎之迹事隔於人存代終之規啓機於身後也夫嚴氣正性覆折而己豈有員委屈可以每其生哉懍懍焉皓皓焉其與琨玉秋霜比質可也苟彧字文若潁川潁陰人朗陵令淑之孫也父緄為濟南相緄畏憚宦官乃為彧娶中常侍唐衡女彧以少有才名故得免於譏議南陽何顒名知人見彧而異之曰王佐才也中平六年舉孝廉再遷亢父令董卓之亂𠫓廾官歸鄉里同邵韓融時將宗親千餘家避亂密西山中彧謂父老曰潁川四戰之地也天下有變常為兵衝密雖小固不足以扞大難宜亟避之鄉人多懷土不能去會冀州牧同郡韓馥遣騎迎之彧乃獨將宗族從馥留者後多為董卓將李傕所殺略焉彧比至冀州而袁紹已奪馥位紹待彧以上賓之禮彧明有意數見漢室崩亂每懷匡佐之義時曹操在東郡彧聞操有雄略而度紹終不能定大業初平二年乃去紹從操操與語大悅曰吾子房也以為奮武司馬時年二十九明年又為操鎮東司馬興平元年操東擊陶謙使彧守甄城任以留事會張邈陳宮以兗州反操而潛迎呂布布既至諸城悉應之邈乃使人譎彧曰呂將軍來助曹使君擊陶謙宜亟供軍實彧知邈有變即勒兵設備故邈計不行豫州刺史郭貢率兵數萬來到城下求見彧彧將往東郡太守夏侯惇等止之曰何知貢不與呂布同謀而輕欲見之今君為一州之鎮往必危也彧曰貢與邈等分非素結今來速者計必未定及其猶豫宜時説之縱不為用可使中立若先懷疑嫌彼將怒而成謀不如往也貢既見彧無懼意知城不可攻遂引而去彧乃使程昱説范東阿使固其守卒全三城以待操焉二年陶謙死操欲遂取徐州還定呂布彧諫曰昔高祖保關中光武據河內皆深根固本以制天下進可以勝敵退足以堅守故雖有困敗而終濟大業將軍本以兗州首事故能平定山東此實天下之要地而將軍之關河也若不先定之根本將何寄乎宜急分討陳宮使虜不得西顧乘其間而收熟麥約食穀以資一舉則呂布不足破也今舍之而東未見其便多留兵則力不勝敵少留兵則後不足固布乘虛寇暴震動人心縱數城或全其餘非復己有則將軍尚安歸乎且前討徐州威罰實行其子弟念父兄之恥必人自為守就能破之尚不可保彼若懼而相結共為表𩹉堅壁清野以待將軍將軍攻之不拔掠之無獲不出一旬則十萬之衆未戰而自困矣夫事固有𠫓廾彼取此以權一時之藝願將軍慮焉操於是大收孰麥復與布戰布敗走因分定諸縣兗州遂平建安元年獻帝自河東還洛陽操議欲奉迎車駕徙都於許衆多以山東未定韓暹楊奉負功恣睢未可卒制彧乃勸操曰昔晉文公納周襄王而諸侯景從漢高祖為義帝縞素而天下歸心自天子蒙塵將軍首唱義兵徒以山東擾亂未遑遠赴雖禦難於外乃心無不在王室今鑾駕旋軫東京榛蕪義士有存本之思兆人懷感舊之哀誠因此時奉主上以從人望大順也秉至公以服天下大略也扶弘義以致英俊大德也四方雖有逆節其何能為韓暹楊奉安足恤哉若不時定使豪桀生心後雖為慮亦無及矣操從之及帝都許以彧為侍中守尚書令操每征伐在外其軍國之事皆與彧籌焉彧又進操計謀之士從子攸及鍾繇郭嘉陳羣杜襲司馬懿戲志才等皆稱其舉唯嚴象為楊州韋康為涼州後並負敗焉袁紹既兼河朔之地有驕氣而操敗於張繡紹與操書甚倨操大怒欲先攻之而患力不敵以謀於彧彧量紹雖強終為操所制乃説先取呂布然後圖紹操從之三年遂擒呂布定徐州五年袁紹率大衆以攻許操與相距紹甲兵甚盛議者咸懷惶懼少府孔融謂彧曰袁紹地廣兵強田豐許攸智計之士為其謀審配逢紀盡忠之臣任其事顏良文醜勇冠三軍統其兵殆難克乎彧曰紹兵雖多而法不整田豐剛而犯上許攸貪而不正審配專而無謀逢紀果而自用顏良文醜匹夫之勇可一戰而擒也後皆如彧之籌事在袁紹傳操保官度與紹連戰雖勝而軍糧方盡書與彧議欲還許以致紹師彧報曰今穀食雖少未若楚漢在滎陽成皋間也是時劉項莫肯先退者以為先退則藝屈也公以十分居一之衆畫地而守之扼其喉而不得進已半年矣情見藝竭必將有變此用奇之時不可失也操從之乃堅壁持之遂以奇兵破紹紹退走封彧萬歲亭侯邑一千戶六年操以紹新破未能為患但欲留兵衛之自欲南征劉表以計問彧彧對曰紹既新敗衆懼人擾今不因而定之而欲遠兵江漢若紹收離糾散乘虛以出則公之事去矣操乃止九年操拔鄴自領冀州牧有説操宜復置九州者以為冀部所統既廣則天下易服操將從之彧言曰今若依古制是為冀州所統悉有河東馮翊扶風西河幽并之地也公前屠鄴城海內震駭各懼不得保其土宇守其兵衆今若一處被侵必謂以次見奪人心易動若一旦生變天下未可圖也願公先定河北然後修復舊京南臨楚郢責王貢之不入天下咸知公意則人人自安須海內大定乃議古制此社稷長久之利也操報曰微足下之相難所失多矣遂寢九州議十二年操上書表彧曰昔袁紹作逆連兵官度時衆寡糧單圖欲還許尚書令荀彧深建宜住之便遠恢進討之略起發臣心革易愚慮堅營固守徼其軍實遂摧撲大寇濟危以安紹既破敗臣糧亦盡將舍河北之規改就荊南之策彧復備陳得失用移臣議故得反斾冀土克平四州向使臣退軍官度紹必鼓行而前敵人懷利以自百臣衆怯沮以喪氣有必敗之形無一捷之藝復若南征劉表委𠫓廾兗豫飢軍深入踰越江沔利既難要將失本據而彧建二策以亡為存以禍為福謀殊功異臣所不及是故先帝貴指縱之功薄搏獲之賞古人尚帷幄之規下攻拔之力原其績效足享高爵而海內未喻其狀所受不侔其功臣誠惜之乞重平議增疇戶邑彧深辭讓操譬之曰昔介子推有言竊人之財猶謂之盜況君奇謨拔出興亡所係可專有之邪雖慕魯連沖高之迹將為聖人達節之義乎於是增封千戶并前二千戶又欲授以正司彧使荀攸深自陳讓至于十數乃止操將伐劉表問彧所策彧曰今華夏以平荊漢知亡矣可聲出宛葉而間行輕進以掩其不意操從之會表病死十七年董昭等欲共進操爵國公九錫備物密以訪彧彧曰曹公本興義兵以匡振漢朝雖勳庸崇著猶秉忠貞之節君子愛人以德不宜如此事遂寢操心不能平會南征孫權表請彧勞軍于譙因表留彧曰臣聞古之遣將上設監督之重下建副二之任所以尊嚴國命謀而鮮過者也臣今當濟江奉辭伐罪宜有大使肅將王命文武並用自古有之使持節侍中守尚書令萬歲亭侯彧國之望重臣德洽華夏既停軍所次便宜與臣俱進宣示國命威懷醜虜軍禮尚速不及先請臣輒留彧依以為重書奏帝從之遂以彧為侍中光祿大夫持節參丞相軍事至濡須彧病留壽春操饋之食發視乃空器也於是飲藥而卒時年五十帝哀惜之祖日為之廢宴樂諡曰敬侯明年操遂稱魏公云論曰自遷帝西京山東騰沸天下之命倒縣矣荀君乃越河冀間關以從曹氏察其定舉措立言策崇明王略以急國艱豈云因亂假義以就違正之謀乎誠仁為己任期紓民於倉卒也及阻董昭之議以致非命豈數也夫世言荀君者通塞或過矣常以為中賢以下道無求備智算有所研疏原始未必要末斯理之不可全詰者也夫以衛賜之賢一説而斃兩國彼非薄於仁而欲之蓋有全必有喪也斯又功之不兼者也方時運之屯邅非雄才無以濟其溺功高藝強則皇器自移矣此又時之不可並也蓋取其歸正而已亦殺身以成仁之義也贊曰公業稱豪駿聲升騰權詭時逼揮金僚朋北海天逸音情頓挫越俗易驚孤音少和直轡安歸高謀誰佐彧之有弼誠感國疾功申運改迹疑心一
