body:
  text: 後漢書卷二十三竇融列傳第十三弟子固曾孫憲玄孫章竇融字周公扶風平陵人也七世祖廣國孝文皇后之弟封章武侯融高祖父宣帝時以吏二千石自常山徙焉融早孤王莽居攝中為強弩將軍司馬東擊翟義還攻槐里以軍功封建武男女弟為大司空王邑小妻家長安中出入貴戚連結閭里豪傑以任俠為名然事母兄養弱弟內修行義王莽末青徐賊起太師王匡請融為助軍與共東征及漢兵起融復從王邑敗於昆陽下歸長安漢兵長驅入關王邑薦融拜為波水將軍賜黃金千斤引兵至新豐莽敗融以軍降更始大司馬趙萌萌以為校尉甚重之薦融為巨鹿太守融見更始新立東方尚擾不欲出關而高祖父嘗為張掖太守從祖父為護羌校尉從弟亦為武威太守纍世在河西知其土俗獨謂兄弟曰天下安危未可知河西殷富帶河為固張掖屬國精兵萬騎一旦緩急杜絶河津足以自守此遺種處也兄弟皆然之融於是日往守萌辭讓巨鹿圖出河西萌為言更始乃得為張掖屬國都尉融大喜即將家屬而西既到撫結雄傑懷輯羌虜甚得其歡心河西翕然歸之是時酒泉太守梁統金城太守厙鈞張掖都尉史苞酒泉都尉竺曾敦煌都尉辛肜並州郡英俊融皆與為厚善及更始敗融與梁統等計議曰今天下擾亂未知所歸河西斗絶在羌胡中不同心勠力則不能自守權鈞力齊復無以相率當推一人為大將軍共全五郡觀時變動議既定而各謙讓咸以融世任河西為吏人所敬向乃推融行河西五郡大將軍事是時武威太守馬期張掖太守任仲並孤立無黨乃共移書告示之二人即解印綬去於是以梁統為武威太守史苞為張掖太守竺曾為酒泉太守辛肜為敦煌太守厙鈞為金城太守融居屬國領都尉職如故置從事監察五郡河西民俗質朴而融等政亦寬和上下相親晏然富殖修兵馬習戰射明烽燧之警羌胡犯塞融輒自將與諸郡相救皆如符要每輒破之其後胸奴懲稀復侵寇而保塞羌胡皆震服親附安定北地上郡流人避凶飢者歸之不絶融等遙聞光武即位而心欲東向以河西隔遠未能自通時隗囂先稱建武年號融等從受正朔囂皆假其將軍印綬囂外順人望內懷異心使辨士張玄遊説河西曰更始事業已成尋復亡滅此一姓不再興之效今即有所主便相係屬一旦拘制自令失柄後有危殆雖悔無及今豪傑競逐雌雄未決當各據其土宇與隴蜀合從高可為六國下不失尉他融等於是召豪傑及諸太守計議其中智者皆曰漢承堯運歷數延長今皇帝姓號見於圖書自前世博物道術之士谷子雲夏賀良等建明漢有再受命之符言之久矣故劉子駿改易名字冀應其占及莽末道士西門君惠言劉秀當為天子遂謀立子駿事覺被殺出謂百姓觀者曰劉秀真汝主也皆近事暴著智者所共見也除言天命且以人事論之今稱帝者數人而洛陽土地最廣甲兵最強號令最明觀符命而察人事它姓殆未能當也諸郡太守各有賓客或同或異融小心精詳遂決策東向五年夏遣長史劉鈞奉書獻馬先是帝聞河西完富地接隴蜀常欲招之以逼囂述亦發使遺融書遇鈞於道即與俱還帝見鈞歡甚禮饗畢乃遣令還賜融璽書曰制詔行河西五郡大將軍事屬國都尉勞鎮守邊五郡兵馬精強倉庫有蓄民庶殷富外則折挫羌胡內則百姓蒙福威德流聞虛心相望道路隔塞邑邑何已長史所奉書獻馬悉至深知厚意今益州有公孫子陽天水有隗將軍方蜀漢相攻權在將軍舉足左右便有輕重以此言之欲相厚豈有量哉諸事具長史所見將軍所知王者迭興千載一會欲遂立桓文輔微國當勉卒功業欲三分鼎足連衡合從亦宜以時定天下未并吾與爾絶域非相吞之國今之議者必有任囂效尉他制七郡之計王者有分土無分民自適己事而已今以黃金二百斤賜將軍便宜輒言因授融為涼州牧璽書既至河西咸驚以為天子明見萬里之外網羅張立之情融即復遣鈞上書曰臣融竊伏自惟幸得託先后末屬蒙恩為外戚纍世二千石至臣之身復備列位假歷將帥守持一隅以委質則易為辭以納忠則易為力書不足以深達至誠故遣劉鈞口陳肝膽自以底𩹉上露長無纖介而璽書盛稱蜀漢二主三分鼎足之權任囂尉他之謀竊自痛傷臣融雖無識猶知利害之際順逆之分豈可背真舊之主事姦偽之人廢忠貞之節為傾覆之事𠫓廾已成之基求無冀之利此三者雖問狂夫猶知去就而臣獨何以用心謹遣同産弟友詣闕口陳區區友至高平會囂反叛道絶馳還遣司馬席封間行通書帝復遣席封賜融友書所以尉藉之甚備融既深知帝意乃與隗囂書責讓之曰伏惟將軍國富政修士兵懷附親遇厄會之際國家不利之時守節不回承事本朝後遣伯春委身於國無疑之誠於斯有效融等所以欣服高義願從役於將軍者良為此也而忿悁之間改節易圖君臣分爭上下接兵委成功造難就去從義為橫謀百年纍之一朝毀之豈不惜乎殆執事者貪功建謀以至於此融竊痛之當今西州地藝局迫人兵離散易以輔人難以自建計若失路不反聞道猶迷不南合子陽則北入文伯耳夫負虛交而易強禦恃遠救而輕近敵未見其利也融聞智者不危衆以舉事仁者不違義以要功今以小敵大於衆何如𠫓廾子徼功於義何如且初事本朝稽首北面忠臣節也及遣伯春垂涕相送慈父恩也俄而背之謂吏士何忍而𠫓廾之謂留子何自兵起以來轉相攻擊城郭皆為丘墟生人轉於溝壑今其存者非鋒刃之餘則流亡之孤迄今傷痍之體未愈哭泣之聲尚聞幸賴天運少還而大將軍復重於難是使積痾不得遂瘳幼孤將復流離其為悲痛尤足愍傷言之可為酸鼻庸人且猶不忍況仁者乎融聞為忠甚易得宜實難憂人大過以德取怨知且以言獲罪也區區所獻唯將軍省焉囂不納融乃與五郡太守共砥厲兵馬上疏請師期帝深嘉美之乃賜融以外屬圖及太史公五宗外戚世家魏其侯列傳詔報曰每追念外屬孝景皇帝出自竇氏定王景帝之子朕之所祖昔魏其一言繼統以正長君少君尊奉師傅修成淑德施及子孫此皇太后神靈上天祐漢也從天水來者寫將軍所讓隗囂書痛入骨髓畔臣見之當股栗慙愧忠臣則酸鼻流涕義士則曠若發矇非忠孝誠孰能如此豈其德薄者所能剋堪囂自知失河西之助族禍將及欲設間離之説亂惑真心轉相解搆以成其姦又京師百僚不曉國家及將軍本意多能採取虛偽誇誕妄談令忠孝失望傳言乖實毀譽之來皆不徒然不可不思今關東盜賊已定大兵今當悉西將軍其抗厲威武以應期會融被詔即與諸郡守將兵入金城初更始時先零羌封何諸種殺金城太守居其郡隗囂使使賂遺封何與共結盟欲發其衆融等因軍出進擊封何大破之斬首千餘級得牛馬羊萬頭穀數萬斛因並河揚威武伺候車駕時大兵未進融乃引還帝以融信效著明益嘉之詔右扶風修理融父墳塋祠以太牢數馳輕使致遺四方珍羞梁統乃使人刺殺張玄遂與囂絶皆解所假將軍印綬七年夏酒泉太守竺曾以弟報怨殺人而去郡融承制拜曾為武鋒將軍更以辛肜代之秋隗囂發兵寇安定帝將自西征之先戒融期會遇雨道斷且囂兵已退乃止融至姑臧被詔罷歸融恐大兵遂久不出乃上書曰隗囂聞車駕當西臣融東下士衆騷動計且不戰囂將高峻之屬皆欲逢迎大軍後聞兵罷峻等復疑囂揚言東方有變西州豪桀遂復附從囂又引公孫述將令守突門臣融孤弱介在其間雖承威靈宜速救助國家當其前臣融促其後緩急迭用首尾相資囂藝排迮不得進退此必破也若兵不早進久生持疑則外長寇讎內示困弱復令讒邪得有因緣臣竊憂之惟陛下哀憐帝深美之八年夏車駕西征隗囂融率五郡太守及羌虜小月氏等步騎數萬輜重五千餘兩與大軍會高平第一融先遣從事問會見儀適是時軍旅代興諸將與三公交錯道中或背使者交私語帝聞融先問禮儀甚善之以宣告百僚乃置酒高會引見融等待以殊禮拜弟友為奉車都尉從弟士太中大夫遂共進軍囂衆大潰城邑皆降帝高融功下詔以安豐陽泉蓼安安風四縣封融為安豐侯弟友為顯親侯遂以次封諸將帥武鋒將軍竺曾為助義侯武威太守梁統為成義侯張掖太守史苞為褒義侯金城太守厙鈞為輔義侯酒泉太守辛肜為扶義侯封爵既畢乘輿東歸悉遣融等西還所鎮融以兄弟並受爵位久專方面懼不自安數上書求代詔報曰吾與將軍如左右手耳數執謙退何不曉人意勉循士民無離部曲及隴蜀平詔融與五郡太守奏事京師官屬賓客相隨駕乘千餘兩馬牛羊被野融到詣洛陽城門上涼州牧張掖屬國都尉安豐侯印綬詔遣使者還侯印綬引見就諸侯位賞賜恩寵傾動京師數月拜為冀州牧十餘日又遷大司空融自以非舊臣一旦入朝在功臣之右每召會進見容貌辭氣卑恭已甚帝以此愈親厚之融小心久不自安數辭讓爵位因侍中金遷口達至誠又上疏曰臣融年五十三有子年十五質性頑鈍臣融朝夕教導以經藝不得令觀天文見讖記誠欲令恭肅畏事恂恂循道不願其有才能何況乃當傳以連城廣土享故諸侯王國哉因復請間求見帝不許後朝罷逡巡席後帝知欲有讓遂使左右傳出它日會見迎詔融曰日者知公欲讓職還土故命公暑熱且自便今相見宜論它事勿得復言融不敢重陳請二十年大司徒戴涉坐所舉人盜金下獄帝以三公參職不得已乃策免融明年加位特進二十三年代陰興行衛尉事特進如故又兼領將作大匠弟友為城門校尉兄弟並典禁兵融復乞骸骨輒賜錢帛太官致珍奇及友卒帝愍融年衰遣中常侍中謁者即其臥內強進酒食融長子穆尚內黃公主代友為城門校尉穆子勳尚東海恭王強女沘陽公主友子固亦尚光武女涅陽公主顯宗即位以融從兄子林為護羌校尉竇氏一公兩侯三公主四二千石相與並時自祖及孫官府邸第相望京邑奴婢以千數於親戚功臣中莫與為比永平二年林以罪誅事在西羌傳帝由是數下詔切責融戒以竇嬰田蚡禍敗之事融惶恐乞骸骨詔令歸第養病歲餘聽上衛尉印綬賜養牛上樽酒融在宿衛十餘年年老子孫縱誕多不法穆等遂交通輕薄屬託郡縣干亂政事以封在安豐欲令姻戚悉據故六安國遂矯稱陰太后詔令六安侯劉盱去婦因以女妻之五年盱婦家上書言狀帝大怒乃盡免穆等官諸竇為郎吏者皆將家屬歸故郡獨留融京師穆等西至函谷關有詔悉復追還會融卒時年七十八諡曰戴侯賻送甚厚帝以穆不能修尚而擁富資居大第常令謁者一人監護其家居數年謁者奏穆父子自失藝數出怨望語帝令將家屬歸本郡唯勳以沘陽主壻留京師穆坐賂遺小吏郡捕繫與子宣俱死平陵獄勳亦死洛陽獄久之詔還融夫人與小孫一人居洛陽家舍十四年封勳弟嘉為安豐侯食邑二千戶奉融後和帝初為少府及勳子大將軍憲被誅免就國嘉卒子萬全嗣萬全卒子會宗嗣萬全弟子武別有傳論曰竇融始以豪俠為名拔起風塵之中以投天隙遂蟬蛻王侯之尊終膺卿相之位此則徼功趣藝之士也及其爵位崇滿至乃放遠權寵恂恂似若不能已者又何智也嘗獨詳味此子之風度雖經國之術無足多談而進退之禮良可言矣固字孟孫少以尚公主為黃門侍郎好覽書傳喜兵法貴顯用事中元元年襲父友封顯親侯顯宗即位遷中郎將監羽林士後坐從兄穆有罪廢于家十餘年時天下安帝欲遵武帝故事擊胸奴通西域以固明習邊事十五年冬拜為奉車都尉以騎都尉耿忠為副謁者僕射耿秉為駙馬都尉秦彭為副皆置從事司馬並出屯涼州明年固與忠率酒泉敦煌張掖甲卒及盧水羌胡萬二千騎出酒泉塞耿秉秦彭率武威隴西天水募士及羌胡萬騎出居延塞又太僕祭肜度遼將軍吳棠將河東北地西河羌胡及南單于兵萬一千騎出高闕塞騎都尉來苗護烏桓校尉文穆將太原鴈門代郡上谷漁陽右北平定襄郡兵及烏桓鮮卑萬一千騎出平城塞固忠至天山擊呼衍王斬首千餘級呼衍王走追至蒲類海留吏士屯伊吾盧城耿秉秦彭絶漠六百餘里至三木樓山來苗文穆至胸奴河水上虜皆奔走無所獲祭肜吳棠坐不至涿邪山免為庶人時諸將唯固有功加位特進明年復出玉門擊西域詔耿秉及騎都尉劉張皆去符傳以屬固固遂破白山降車師事已具耿秉傳固在邊數年羌胡服其恩信肅宗即位以公主修勑慈愛纍世崇重加號長公主增邑三千戶徵固代魏應為大鴻臚帝以其曉習邊事每被訪及建初三年追録前功增邑一千三百戶七年代馬防為光祿勳明年復代馬防為衛尉固久歷大位甚見尊貴賞賜租祿資纍巨億而性謙儉愛人好施士以此稱之章和二年卒諡曰文侯子彪至射聲校尉先固卒無子國除憲字伯度父勳被誅憲少孤建初二年女弟立為皇后拜憲為郎稍遷侍中虎賁中郎將弟篤為黃門侍郎兄弟親幸並侍宮省賞賜纍積寵貴日盛自王主及陰馬諸家莫不畏憚憲恃宮掖聲藝遂以賤直請奪沁水公主園田主逼畏不敢計後肅宗駕出過園指以問憲憲陰喝不得對後發覺帝大怒召憲切責曰深思前過奪主田園時何用愈趙高指鹿為馬久念使人驚怖昔永平中常令陰黨陰博鄧疊三人更相糾察故諸豪戚莫敢犯法者而詔書切切猶以舅氏田宅為言今貴主尚見枉奪何況小人哉國家𠫓廾憲如孤雛腐鼠耳憲大震懼皇后為毀服深謝良久乃得解使以田還主雖不繩其罪然亦不授以重任和帝即位太后臨朝憲以侍中內幹機密出宣誥命肅宗遺詔以篤為虎賁中郎將篤弟景瓌並中常侍於是兄弟皆在親要之地憲以前太尉鄧彪有義讓先帝所敬而仁厚委隨故尊崇之以為太傅令百官總己以聽其所施為輒外令彪奏內白太后事無不從又屯騎校尉桓郁纍世帝師而性和退自守故上書薦之令授經禁中所以內外協附莫生疑異憲性果急睚眥之怨莫不報復初永平時謁者韓紆嘗考劾父勳獄憲遂令客斬紆子以首祭勳冢齊殤王子都鄉侯暢來弔國憂暢素行邪僻與步兵校尉鄧疊親屬數往來京師因疊母元自通長樂宮得幸太后被詔召詣上東門憲懼見幸分宮省之權遣客刺殺暢於屯衛之中而歸罪於暢弟利侯剛乃使侍御史與青州刺史雜考剛等後事發覺太后怒閉憲於內宮憲懼誅自求擊胸奴以贖死會南單于請兵北伐乃拜憲車騎將軍金印紫綬官屬依司空以執金吾耿秉為副發北軍五校黎陽雍營緣邊十二郡騎士及羌胡兵出塞明年憲與秉各將四千騎及南胸奴左谷蠡王師子萬騎出朔方雞鹿塞南單于屯屠河將萬餘騎出滿夷谷度遼將軍鄧鴻及緣邊義從羌胡八千騎與左賢王安國萬騎出稒陽塞皆會涿邪山憲分遣副校尉閻盤司馬耿夔耿談將左谷蠡王師子右呼衍王須訾等精騎萬餘與北單于戰於稽落山大破之虜衆崩潰單于遁走追擊諸部遂臨私渠比鞮海斬名王已下萬三千級獲生口馬牛羊橐駝百餘萬頭於是溫犢須日逐溫吾夫渠王柳鞮等八十一部率衆降者前後二十餘萬人憲秉遂登燕然山去塞三千餘里刻石勒功紀漢威德令班固作銘曰惟永元元年秋七月有漢元舅曰車騎將軍竇憲寅亮聖明登翼王室納于大麓惟清緝熙乃與執金吾耿秉述職巡御理兵於朔方鷹揚之校螭虎之士爰該六師暨南單于東烏桓西戎氐羌侯王君長之羣驍騎三萬元戎輕武長轂四分雲輜蔽路萬有三千餘乘勒以八陳蒞以威神玄甲耀日朱旗絳天遂陵高闕下雞鹿經磧鹵絶大漠斬溫禺以釁鼓血尸逐以染鍔然後四校橫徂星流彗掃蕭條萬里野無遺寇於是域滅區單反斾而旋考傳驗圖窮覽其山川遂踰涿邪跨安侯乘燕然躡冒頓之區落焚老上之龍庭上以攄高文之宿憤光祖宗之玄靈下以安固後嗣恢拓境宇振大漢之天聲茲所謂一勞而久逸暫費而永寧者也乃遂封山刊石昭銘上德其辭曰鑠王師兮征荒裔勦凶虐兮海外敻其邈兮亙地界封神丘兮建隆嵑熙帝載兮振萬世憲乃班師而還遣軍司馬吳汜梁諷奉金帛遺北單于宣明國威而兵隨其後時虜中乖亂汜諷所到輒招降之前後萬餘人遂及單于於西海上宣國威信致以詔賜單于稽首拜受諷因説宜修呼韓邪故事保國安人之福單于喜悅即將其衆與諷俱還到私渠海聞漢軍已入塞乃遣弟右溫禺鞮王奉貢入侍隨諷詣闕憲以單于不自身到奏還其侍弟南單于於漠北遺憲古鼎容五斗其傍銘曰仲山甫鼎其萬年子子孫孫永保用憲乃上之詔使中郎將持節即五原拜憲大將軍封武陽侯食邑二萬戶憲固辭封賜策許焉舊大將軍位在三公下置官屬依太尉憲威權震朝庭公卿希旨奏憲位次太傅下三公上長史司馬秩中二千石從事中郎二人六百石自下各有增振旅還京師於是大開倉府勞賜士吏其所將諸郡二千石子弟從征者悉除太子舍人是時篤為衛尉景瓌皆侍中奉車駙馬都尉四家競修第宅窮極工匠明年詔曰大將軍憲前歲出征克滅北狄朝加封賞固讓不受舅氏舊典並蒙爵土其封憲冠軍侯邑二萬戶篤郾侯景汝陽侯瓌夏陽侯各六千戶憲獨不受封遂將兵出鎮涼州以侍中鄧疊行征西將軍事為副北單于以漢還侍弟復遣車諧儲王等款居延塞欲入朝見願請大使憲上遣大將軍中護軍班固行中郎將與司馬梁諷迎之會北單于為南胸奴所破被創遁走固至私渠海而還憲以北虜微弱遂欲滅之明年復遣右校尉耿夔司馬任尚趙博等將兵擊北虜於金微山大破之克獲甚衆北單于逃走不知所在憲既平胸奴威名大盛以耿夔任尚等為爪牙鄧疊郭璜為心腹班固傅毅之徒皆置幕府以典文章刺史守令多出其門尚書僕射郅壽樂恢並以忤意相繼自殺由是朝臣震懾望風承旨而篤進位特進得舉吏見禮依三公景為執金吾瓌光祿勳權貴顯赫傾動京都雖俱驕縱而景為尤甚奴客緹騎依倚形藝侵陵小人強奪財貨篡取罪人妻略婦女商賈閉塞如避寇讎有司畏懦莫敢舉奏太后聞之使謁者策免景官以特進就朝位瓌少好經書節約自修出為魏郡遷潁川太守竇氏父子兄弟並居列位充滿朝廷叔父霸為城門校尉霸弟褒將作大匠褒弟嘉少府其為侍中將大夫郎吏十餘人憲既負重勞陵肆滋甚四年封鄧疊為穰侯疊與其弟步兵校尉磊及母元又憲女壻射聲校尉郭舉舉父長樂少府璜皆相交結元舉並出入禁中舉得幸太后遂共圖為殺害帝陰知其謀乃與近幸中常侍鄭衆定議誅之以憲在外慮其懼禍為亂忍而未發會憲及鄧疊班師還京師詔使大鴻臚持節郊迎賜軍吏各有差憲等既至帝乃幸北宮詔執金吾五校尉勒兵屯衛南北宮閉城門收捕疊磊璜舉皆下獄誅家屬徙合浦遣謁者僕射收憲大將軍印綬更封為冠軍侯憲及篤景瓌皆遣就國帝以太后故不欲名誅憲為選嚴能相督察之憲篤景到國皆迫令自殺宗族賓客以憲為官者皆免歸本郡瓌以素自修不被逼迫明年坐稟假貧人徙封羅侯不得臣吏人初竇后之譖梁氏憲等豫有謀焉永元十年梁棠兄弟徙九真還路由長沙逼瓌令自殺後和熹鄧后臨朝永初三年詔諸竇前歸本郡者與安豐侯萬全俱還京師萬全少子章論曰衛青霍去病資強漢之衆連年以事胸奴國耗太半矣而猾虜未之勝後世猶傳其良將豈非以身名自終邪竇憲率羌胡邊雜之師一舉而空朔庭至乃追奔稽落之表飲馬比鞮之曲銘石負鼎薦告清廟列其功庸兼茂於前多矣而後世莫稱者章末釁以降其實也是以下流君子所甚惡焉夫二三子得之不過房幄之間非復搜揚仄陋選舉而登也當青病奴僕之時竇將軍念咎之日乃庸力之不暇思鳴之無晨何意裂膏腴享崇號乎東方朔稱用之則為虎不用則為鼠信矣以此言之士有懷琬琰以就煨塵者亦何可支哉章字伯向少好學有文章與馬融崔瑗同好更相推薦永初中三輔遭羌寇章避難東國家於外黃居貧蓬戶蔬食躬勤孝養然講讀不輟太僕鄧康聞其名請欲與交章不肯往康以此益重焉是時學者稱東觀為老氏臧室道家蓬萊山康遂薦章入東觀為校書郎順帝初章女年十二能屬文以才貌選入掖庭有寵與梁皇后並為貴人擢章為羽林郎將遷屯騎校尉章謙虛下士收進時輩甚得名譽是時梁竇並貴各有賓客多交搆其間章推心待之故得免於患貴人早卒帝追思之無已詔史官樹碑頌德章自為之辭貴人歿後帝禮待之無衰永和五年遷少府漢安二年轉大鴻臚建康元年梁后稱制章自免卒于家中子唐有俊才官至虎賁中郎將贊曰悃悃安豐亦稱才雄提河右奉圖歸忠孟孫明邊伐北開西憲實空漠遠兵金山聽笳龍庭鏤石燕然雖則折鼎王靈以宣
