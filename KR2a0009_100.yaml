body:
  text: 後漢書卷九十烏桓鮮卑列傳第八十烏桓者本東胡也漢初胸奴冒頓滅其國餘類保烏桓山因以為號焉俗善騎射弋獵禽獸為事隨水草放牧居無常處以穹廬為舍東開向日食肉飲酪以毛毳為衣貴少而賤老其性悍塞怒則殺父兄而終不害其母以母有族類父兄無相仇報故也有勇健能理決鬬訟者推為大人無世業相繼邑落各有小帥數百千落自為一部大人有所召呼則刻木為信雖無文字而部衆不敢違犯氏姓無常以大人健者名字為姓大人以下各自畜牧營産不相徭役其嫁娶則先略女通情或半歲百日然後送牛馬羊畜以為娉幣壻隨妻還家妻家無尊卑旦旦拜之而不拜其父母為妻家僕役一二年閒妻家乃厚遣送女居處財物一皆為辦其俗妻後母報寡死則歸其故夫計謀從用婦人唯鬬戰之事乃自決之父子男女相對踞蹲以髡頭為輕便婦人至嫁時乃養髮分為髻著句決飾以金碧猶中國有簂步搖婦人能刺韋作文繡織氀毼男子能作弓矢鞍勒鍛金鐵為兵器其土地宜穄及東牆東牆似蓬草實如穄子至十月而熟見鳥獸孕乳以別四節俗貴兵死斂尸以棺有哭泣之哀至葬則歌舞相送肥養一犬以彩繩纓牽并取死者所乘馬衣物皆燒而送之言以屬纍犬使護死者神靈歸赤山赤山在遼東西北數千里如中國人死者魂神歸岱山也敬鬼神祠天地日月星辰山川及先大人有健名者祠用牛羊畢皆燒之其約法違大人言者罪至死若相賊殺者令部落自相報不止詣大人告之聽出馬牛羊以贖死其自殺父兄則無罪若亡畔為大人所捕者邑落不得受之皆徙逐於雍狂之地沙漠之中其土多蝮蛇在丁令西南烏孫東北焉烏桓自為冒頓所破衆遂孤弱常臣伏胸奴歲輸牛馬羊皮過時不具輒沒其妻子及武帝遣驃騎將軍霍去病擊破胸奴左地因徙烏桓於上谷漁陽右北平遼西遼東五郡塞外為漢偵察胸奴動靜其大人歲一朝見於是始置護烏桓校尉秩二千石擁節監領之使不得與胸奴交通昭帝時烏桓漸強乃發胸奴單于冢墓以報冒頓之怨胸奴大怒乃東擊破烏桓大將軍霍光聞之因遣度遼將軍范明友將二萬騎出遼東邀胸奴而虜已引去明友乘烏桓新敗遂進擊之斬首六千餘級獲其三王首而還由是烏桓復寇幽州明友輒破之宣帝時乃稍保塞降附及王莽篡位欲擊胸奴興十二部軍使東域將嚴尤領烏桓丁令兵屯代郡皆質其妻子於郡縣烏桓不便水土懼久屯不休數求謁去莽不肯遣遂自亡畔還為抄盜而諸郡盡殺其質由是結怨於莽胸奴因誘其豪帥以為吏餘者皆羈縻屬之光武初烏桓與胸奴連兵為寇代郡以東尤被其害居止近塞朝發穹廬暮至城郭五郡民庶家受其辜至於郡縣損壞百姓流亡其在上谷塞外白山者最為強富建武二十一年遣伏波將軍馬援將三千騎出五阮關掩擊之烏桓逆知悉相率逃走追斬百級而還烏桓復尾擊援後援遂晨夜奔歸比入塞馬死者千餘匹二十二年胸奴國亂烏桓乘弱擊破之胸奴轉北徙數千里漠南地空帝乃以幣帛賂烏桓二十五年遼西烏桓大人郝旦等九百二十二人率衆向化詣闕朝貢獻奴婢牛馬及弓虎豹貂皮是時四夷朝賀絡驛而至天子乃命大會勞饗賜以珍寶烏桓或願留宿衛於是封其渠帥為侯王君長者八十一人皆居塞內布於緣邊諸郡令招來種人給其衣食遂為漢偵候助擊胸奴鮮卑時司徒掾班彪上言烏桓天性輕黠好為寇賊若久放縱而無總領者必復侵掠居人但委主降掾史恐非所能制臣愚以為宜復置烏桓校尉誠有益於附集省國家之邊慮帝從之於是始復置校尉於上谷宀心城開營府并領鮮卑賞賜質子歲時互市焉及明章和三世皆保塞無事安帝永初三年夏漁陽烏桓與右北平胡千餘寇代郡上谷秋鴈門烏桓率衆王無何允與鮮卑大人丘倫等及南胸奴骨都侯合七千騎寇五原與太守戰於九原高渠谷漢兵大敗殺郡長吏乃遣車騎將軍何熙度遼將軍梁慬等擊大破之無何乞降鮮卑走還塞外是後烏桓稍復親附拜其大人戎朱廆為親漢都尉順帝陽嘉四年冬烏桓寇雲中遮截道上商賈車牛千餘兩度遼將軍耿曄率二千餘人追擊不利又戰於沙南斬首五百級烏桓遂圍曄於蘭池城於是發積射士二千人度遼營千人配上郡屯以討烏桓烏桓乃退永和五年烏桓大人阿堅羌渠等與南胸奴左部句龍吾斯反畔中郎將張耽擊破斬之餘衆悉降桓帝永壽中朔方烏桓與休著屠各並畔中郎將張奐搬平之延熹九年夏烏桓復與鮮卑及南胸奴鮮卑寇緣邊九郡俱反張奐討之皆出塞去靈帝初烏桓大人上谷有難樓者衆九千餘落遼西有丘力居者衆五千餘落皆自稱王又遼東蘇僕延衆千餘落自稱峭王右北平烏延衆八百餘落自稱汗魯王並勇建而多計策中平四年前中山太守張純畔入丘力居衆中自號彌天安定王遂為諸郡烏桓元帥寇掠青徐幽冀四州五年以劉虞為幽州牧虞購募斬純首北州乃定獻帝初平中丘力居死子樓班年少從子踏頓有武略代立總攝三郡衆皆從其號令建安初冀州牧袁紹與前將軍公孫瓚相持不決踏頓遣使詣紹求和親遂遣兵助擊瓚破之紹矯制賜踏頓難樓蘇僕延烏延等皆以單于印綬後難樓蘇僕延率其部衆奉樓班為單于踏頓為王然踏頓猶秉計策廣陽人閻柔少沒烏桓鮮卑中為其種人所歸信柔乃因鮮卑衆殺烏桓校尉邢舉而代之袁紹因寵慰柔以安北邊及紹子尚敗奔踏頓時幽冀吏人奔烏桓者十萬餘戶尚欲憑其兵力復圖中國會曹操平河北閻柔率鮮卑烏桓歸附操即以柔為校尉建安十二年曹操自征烏桓大破踏頓於柳城斬之首虜二十餘萬人袁尚與樓班烏延等皆走遼東遼東太守公康並斬送之其餘衆萬餘落悉徙居中國云鮮卑者亦東胡之支也別依鮮卑山故因號焉其言語習俗與烏桓同唯婚姻先髡頭以季春月大會於饒樂水上飲宴畢然後配合又禽獸異於中國者野馬原羊角端牛以角為弓俗謂之角端弓者又有貂豽鼲子皮毛柔蠕故天下以為名裘漢初亦為冒頓所破遠竄遼東塞外與烏桓相接未常通中國焉光武初胸奴強盛率鮮卑與烏桓寇抄北邊殺略吏人無有寧歲建武二十一年鮮卑與胸奴入遼東遼東太守祭肜擊破之斬獲殆盡事已具肜傳由是震怖及南單于附漢北虜孤弱二十五年鮮卑始通驛使其後都護偏何等詣祭肜求自效功因令擊北胸奴左伊育訾部斬首二千餘級其後偏何連歲出兵擊北虜還輒持首級詣遼東受賞賜三十年鮮卑大人於仇賁滿頭等率種人詣闕朝賀慕義內屬帝封於仇賁為王滿頭為侯時漁陽赤山烏桓歆志賁等數寇上谷永平元年祭肜復賂偏何擊歆志賁破斬之於是鮮卑大人皆來歸附並詣遼東受賞賜青徐二州給錢歲二億七千萬為常明章二世保塞無事和帝永元中大將軍竇憲遣右校尉耿夔擊破胸奴北單于逃走鮮卑因此轉徙據其地胸奴餘種留者尚有十餘萬落皆自號鮮卑鮮卑由此漸盛九年遼東鮮卑攻肥如縣太守祭參坐沮敗下獄死十三年遼東鮮卑寇右北平因入漁陽漁陽太守擊破之延平元年鮮卑復寇漁陽太守張顯率數百人出塞追之兵馬掾嚴授諫曰前道險阻賊藝難量宜且結營先令輕騎偵視之顯意甚鋭怒欲斬之因復進兵遇虜伏發士卒悉走唯授力戰身被十創手殺數人而死顯中流矢主簿衛福功曹徐咸皆自投赴顯俱歿於陳鄧太后策書褒歎賜顯錢六十萬以家二人為郎授福咸各錢十萬除一子為郎安帝永初中鮮卑大人燕陽詣闕朝賀鄧太后賜燕陽王印綬赤車參駕令止烏桓校尉所居宀心城下通胡市因築南北兩部質館鮮卑邑落百二十部各遣入質是後或降或畔與胸奴烏桓更相攻擊元初二年秋遼東鮮卑圍無慮縣州郡合兵固保清野鮮卑無所得攻扶黎營殺長吏四年遼西鮮卑連休等遂燒塞門寇百姓烏桓大人於秩居等與連休有宿怨共郡兵奔擊大破之斬首千三百級悉獲其生口牛馬財物五年秋代郡鮮卑萬餘騎遂穿塞入寇分攻城邑燒官寺殺長吏而去乃發緣邊甲卒黎陽營兵屯上谷以備之冬鮮卑入上谷攻居庸關復發緣邊諸郡黎陽營兵積射士步騎二萬人屯列衝要六年秋鮮卑入馬城塞殺長吏度遼將軍鄧遵發積射士三千人及中郎將馬續率南單于與遼西右北平兵馬會出塞追擊鮮卑大破之獲生口及牛羊財物甚衆又發積射士三千人馬三千匹詣度遼營屯守永寧元年遼西鮮卑大人烏倫其至鞬率衆詣鄧遵降奉貢獻詔封烏倫為率衆王其至鞬為率衆侯賜綵繒各有差建光元年秋其至鞬復畔寇居庸雲中太守成嚴擊之兵敗功曹楊穆以身捍嚴與俱戰歿鮮卑於是圍烏桓校尉徐常於馬城度遼將軍耿夔與幽州刺史龐參發廣陽漁陽涿郡甲卒分為兩道救之常夜得潛出與夔等并力並進攻賊圍解之鮮卑既纍殺郡守膽意轉盛控弦數萬騎延光元年冬復寇鴈門定襄遂攻太原掠殺百姓二年冬其至鞬自將萬餘騎入東領候分為數道攻南胸奴於曼柏薁鞬日逐王戰死殺千餘人三年秋復寇高柳擊破南胸奴殺漸將王順帝永建元年秋鮮卑其至鞬寇代郡太守李超戰死明年春中郎將張國遣從事將南單于兵步騎萬餘人出塞擊破之獲其資重二千餘種時遼東鮮卑六千餘騎亦寇遼東玄菟烏桓校尉耿曄發緣邊諸郡兵及烏桓率衆王出塞擊之斬首數百級大獲其生口牛馬什物鮮卑乃率種衆三萬人詣遼東乞降三年四年鮮卑頻寇漁陽朔方六年秋耿曄遣司馬將胡兵數千人出塞擊破之冬漁陽太守又遣烏桓兵擊之斬首八百級獲牛馬生口烏桓豪人扶漱官勇健每與鮮卑戰輒陷敵詔賜號率衆君陽嘉元年冬耿曄遣烏桓親漢都尉戎朱廆率衆王侯咄歸等出塞抄擊鮮卑大斬獲而還賜咄歸等已下為率衆王侯長賜綵繒各有差鮮卑後寇遼東屬國於是耿曄乃移屯遼東無慮城拒之二年春胸奴中郎將趙稠遣從事將南胸奴骨都侯夫沈等出塞擊鮮卑破之斬獲甚衆詔賜夫沈金印紫綬及縑綵各有差秋鮮卑穿塞入馬城代郡太守擊之不能克後其至鞬死鮮卑抄盜差稀桓帝時鮮卑石槐者其父投鹿侯初從胸奴軍三年其妻在家生子投鹿侯歸怪欲殺之妻言嘗晝行聞雷震仰天視而雹入其口因吞之遂身十月而産此子必有奇異且宜長視投鹿侯不聽遂𠫓廾之妻私語家令收養焉名石槐年十四五勇健有智略異部大人抄取其外家牛羊石槐單騎追擊之所向無前悉還得所亡者由是部落畏服乃施法禁平曲直無敢犯者遂推以為大人石槐乃立庭於彈汗山啜仇水上去高柳北三百餘里兵馬甚盛東西部大人皆歸焉因南抄緣邊北拒丁零東卻夫餘西擊烏孫盡據胸奴故地東西萬四千餘里南北七千餘里網羅山川水澤鹽池永壽二年秋石槐遂將三四千騎寇雲中延熹元年鮮卑寇北邊冬使胸奴中郎將張奐率南單于出塞擊之斬首二百級二年復入鴈門殺數百人大抄掠而去六年夏千餘騎寇遼東屬國九年夏遂分騎數萬人入緣邊九郡並殺掠吏人於是復遣張奐擊之鮮卑乃出塞去朝廷積患之而不能制遂遣使持印綬封石槐為王欲與和親石槐不肯受而寇抄滋甚乃自分其地為三部從右北平以東至遼東接夫餘濊貊二十餘邑為東部從右北平以西至上谷十餘邑為中部從上谷以西至敦煌烏孫二十餘邑為西部各置大人主領之皆屬石槐靈帝立幽并涼三州緣邊諸郡無歲不被鮮卑寇抄殺略不可勝數熹平三年冬鮮卑入北地太守夏育率休著屠各追擊破之遷育為護烏桓校尉五年鮮卑寇幽州六年夏鮮卑寇三邊秋夏育上言鮮卑寇邊自春以來三十餘發請徵幽州諸郡兵出塞擊之一冬二春必能禽滅朝廷未許先是護羌校尉田晏坐事論刑被原欲立功自效乃請中常侍王甫求得為將甫因此議遣兵與育并力討賊帝乃拜晏為破鮮卑中郎將大臣多有不同乃召百官議朝堂議郎蔡雍議曰書戒猾夏易伐鬼方周有獫狁蠻荊之師漢有闐顏瀚海之事征討殊類所由尚矣然而時有同異藝有可否故謀有得失事有成敗不可齊也蓄藉天下之饒數十年閒官民俱匱乃興鹽鐵酒榷之利設告緡重稅之令民不堪命起為盜賊關東紛擾道路不通繡衣直指之使奮鈇鉞而並出既而覺悟乃息兵罷役封丞相為富人侯故主父偃曰夫務戰勝窮武事未有不悔者也夫以世宗神武將相良猛財賦充實所拓廣遠猶有悔焉況今人財並乏事劣昔時乎嚴禁網多漏精金良鐵皆為賊有漢人逋逃為之謀主兵利馬疾過於胸奴昔段熲良將習兵善戰有事西羌猶十餘年今育晏才策未必過熲鮮卑種衆不弱于曩時而虛計二載自許有成若禍結兵連豈得中休當復徵發衆人轉運無已是為耗竭諸夏并力蠻夷夫邊垂之患手足之蚧搔中國之困背之瘭疽方今郡縣盜賊尚不能禁況此醜虜而可伏乎矣豈與蟲蟻校狡寇計爭往來哉雖或破之豈可殄盡而方今令本朝為之旰食乎昔淮南王安諫伐越曰天子之兵有征無戰言其莫敢校也如使越人蒙死以逆執事廝輿之卒有一不備而歸者雖得越王之首而猶為大漢羞之而欲以齊民易醜虜皇威辱外夷就如其言猶已危矣況乎得失不可量邪昔珠崖郡反孝元皇帝納賈捐之言而下詔曰珠崖背畔今議者或曰可討或曰𠫓廾之朕日夜惟思羞威不行則欲誅之通于時變復憂萬民夫萬民之飢與遠蠻之不討何者為大宗廟之祭凶年猶有不備況避不嫌之辱哉今關東大困無以相贍又當動兵非但勞民而已其罷珠崖郡此元帝所以發德音也夫恤民救急雖成郡列縣尚猶𠫓廾之況障塞之外未嘗為民居者乎守邊之術李牧善其略保塞之論嚴尤申其要遺業猶在文章具存循二子之策守先帝之規臣曰可矣光和中石槐死時年四十五子和連代立和連才力不及父亦數為寇抄性貪淫斷法不平衆畔者半後出攻北地廉人善弩射者射中和連即死其子騫曼年小兄子魁頭立後騫曼長大與魁頭爭國衆遂離散魁頭死弟步度根立自石槐後諸大人遂世相傳襲論曰四夷之暴其藝互彊矣胸奴熾於隆漢西羌猛於中興而靈獻之閒二虜迭盛石槐驍猛盡有單于之地踏頓凶桀公據遼西之土其陵跨中國結患生人者靡世而寧焉然制御上略歷世無聞周漢之策僅得中下將天之冥數以至於是乎贊曰二虜首施鯁我北垂道暢則馴時薄先離
