body:
  text: 後漢書卷六十九竇何列傳第五十九竇武字遊平扶風平陵人安豐戴侯融之玄孫也父奉定襄太守武少以經行著稱常教授於大澤中不交時事名顯關西延熹八年長女選入掖庭桓帝以為貴人拜武郎中其冬貴人立為皇后武遷越騎校尉封槐里侯五千戶明年冬拜城門校尉在位多辟名士清身疾惡禮賂不通妻子衣食裁充足而已是時羌蠻寇難歲儉民飢武得兩宮賞賜悉散與太學諸生及載肴糧於路丐施貧民兄子紹為虎賁中郎將性疏簡奢侈武每數切厲相戒猶不覺悟乃上書求退紹位又自責不能訓導當先受罪由是紹更遵節大小莫敢違犯時國政多失內官專寵李膺杜密等為黨事考逮永康元年上疏諫曰臣聞明主不諱譏刺之言以探幽暗之實忠臣不恤諫爭之患以暢萬端之事是以君臣並熙名奮百世臣幸得遭盛明之世逢文武之化豈敢懷祿逃罪不竭其誠陛下初從藩國爰登聖祚天下逸豫謂當中興自即位以來未聞善政梁孫寇鄧雖或誅滅而常侍黃門續為禍虐欺罔陛下競行譎詐自造制度妄爵非人朝政日衰姦臣日強伏尋西京放恣王氏佞臣執政終喪天下今不慮前事之失復循覆車之軌臣恐二世之難必將復及趙高之變不朝則夕近者姦臣牢修造設黨議遂收前司隸校尉李膺太僕杜密御史中丞陳翔太尉掾范滂等逮考連及數百人曠年拘録事無效驗臣惟膺等建忠抗節志經王室此誠陛下稷伊呂之佐而虛為姦臣賊子之所誣枉天下寒心海內失望惟陛下留神澄省時見理出以厭人鬼喁喁之心臣聞古之明君必須賢佐以成政道今臺閣近臣尚書令陳蕃僕射胡廣尚書朱𧜛荀緄劉祐魏朗劉矩尹勳等皆國之貞士朝之良佐尚書郎張陵媯皓苑康楊喬邊韶戴恢等文質彬彬明達國典內外之職羣才並列而陛下委任近習專樹叨餮外典州郡內幹心膂宜以次貶黜案罪糾罰抑奪宦官欺國之封案其無狀誣罔之罪信任忠良平決臧否使邪正毀譽各得其所寶愛天官唯善是授如此咎徵可消天應可待間者有嘉禾芝草黃龍之見夫瑞生必於嘉士福至實由善人在德為瑞無德為災陛下所行不合天意不宜稱慶書奏因以病上還城門校尉槐里侯印綬帝不許有詔原李膺杜密等自黃門北寺若盧都內諸獄繫囚罪輕者皆出之其冬帝崩無嗣武召侍御史河間劉倏參問其國中王子侯之賢者倏稱解瀆亭侯宏武入白太后遂徵立之是為靈帝拜武為大將軍常居禁中帝既立論定策功更封武為聞喜侯子機渭陽侯拜侍中兄子紹鄠侯遷步兵校尉紹弟靖西鄉侯為侍中監羽林左騎武既輔朝政常有誅翦宦官之意太傅陳蕃亦素有謀時共會朝堂蕃私謂武曰中常侍曹節王甫等自先帝時操弄國權濁亂海內百姓胸胸歸咎於此今不誅節等後必難圖武深然之蕃大喜以手推席而起武於是引同志尹勳為尚書令劉瑜為侍中馮述為屯騎校尉又徵天下名士廢黜者前司隸李膺宗正劉猛太僕杜密廬江太守朱𧜛等列於朝廷請前越巂太守荀翌為從事中郎辟潁川陳實為屬共定計策於是天下雄俊知其風旨莫不延頸企踵思奮其智力會五月日食蕃復説武曰昔蕭望之困一石顯近者李杜諸公禍及妻子況今石顯數十輩乎蕃以八十之年欲為將軍除害今可且因日食斥罷宦官以塞天變又趙夫人及女尚書旦夕亂太后急宜退絶惟將軍慮焉武乃白太后曰故事黃門常侍但當給事省內典門戶主近署財物耳今乃使與政事而任權重子弟布列專為貪暴天下胸胸正以此故宜悉誅廢以清朝廷太后曰漢來故事世有但當誅其有罪豈可盡廢邪時中常侍管霸頗有才略專制省內武先白誅霸及中常侍蘇康等竟死武復數白誅曹節等太后冘豫未忍故事久不發至八月太白出西方劉瑜素善天官惡之上書皇太后曰太白犯房左驂上將星入太微其占宮門當閉將相不利姦人在主傍願急防之又與武蕃書以星辰錯繆不利大臣宜速斷大計武蕃得書將發於是以朱𧜛為司隸校尉劉祐為河南尹虞祁為洛陽令武乃奏免黃門令魏彪以所親小黃門山冰代之使冰奏素狡猾尤無狀者長樂尚書鄭送北寺獄蕃謂武曰此曹子便當收殺何復考為武不從令冰與尹勳侍御史祝雜考辭連及曹節王甫勳冰即奏收節等使劉瑜內奏時武出宿歸府典中書者先以告長樂五官史朱瑀瑀盜發武奏罵曰中官放縱者自可誅耳我曹何罪而當盡見族滅因大呼曰陳蕃竇武奏白太后廢帝為大逆乃夜召素所親壯健者長樂從官史共普張亮等十七人喢血共盟誅武等曹節聞之驚起白帝曰外間切切請出御德陽前殿令帝拔劒踊躍使乳母趙嬈等擁衛左右取棨信閉諸禁門召尚書官屬脅以白刃使作詔板拜王甫為黃門令持節至北寺獄收尹勳山冰冰疑不受詔甫格殺之遂害勳出鄭還共劫太后奪璽書令中謁者守南宮閉門絶復道使鄭等持節及侍御史謁者捕收武等武不受詔馳入步兵營與紹共射殺使者召會北軍五校士數千人屯都亭下令軍士曰黃門常侍反盡力者封侯重賞詔以少府周靖行車騎將軍加節與護胸奴中郎將張奐率五營士討武夜漏盡王甫將虎賁羽林騶都候劒戟士合千餘人出屯朱雀掖門與奐等合明旦悉軍闕下與武對陳甫兵漸盛使其士大呼武軍曰竇武反汝皆禁兵當宿衛宮省何故隨反者乎先降有賞營府素畏服中官於是武軍稍稍歸甫自旦至食時兵降略盡武紹走諸軍追圍之皆自殺梟首洛陽都亭收捕宗親賓客姻屬悉誅之及劉瑜馮述皆夷其族徙武家屬日南遷太后於雲臺當是時凶豎得志士大夫皆喪其氣矣武府掾桂陽胡騰少師事武獨殯斂行喪坐以禁錮武孫輔時年二歲逃竄得全事覺節等捕之急胡騰及令史南陽張敞共逃輔於零陵界詐云已死騰以為己子而使聘娶焉後舉桂陽孝廉至建安中荊州牧劉表聞而辟焉以為從事使還竇姓以事列上會表卒曹操定荊州輔與宗人徙居於鄴辟丞相府從征馬超為流矢所中死初武母産武而并産一蛇送之林中後母卒及葬未窆有大蛇自榛草而出徑至喪所以頭擊柩涕血皆流俯仰蛣屈若哀泣之容有頃而去時人知為竇氏之祥騰字子升初桓帝巡狩南陽以騰為護駕從事公卿貴戚車騎萬計徵求費役不可勝極騰上言天子無外乘輿所幸即為京師臣請以荊州刺史比司隸校尉臣自同都官從事帝從之自是肅然莫敢妄有干欲騰以此顯名黨錮解官至尚書張敞者太尉溫之弟也何進字遂高南陽宛人也異母女弟選入掖庭為貴人有寵於靈帝拜進郎中再遷虎賁中郎將出為潁川太守光和二三年貴人立為皇后徵進入拜侍中將作大匠河南尹中平元年黃巾賊張角等起以進為大將軍率左右羽林五營士屯都亭修理器械以鎮京師張角別黨馬元義謀起洛陽進發其姦以功封慎侯四年滎陽賊數千人羣起攻燒郡縣殺中牟縣令詔使進弟河南尹苗出擊之苗攻破羣賊平定而還詔遣使者迎於成皋拜為車騎將軍封濟陽侯五年天下滋亂望氣者以為京師當有大兵兩宮流血大將軍司馬許涼假司馬伍宕説進曰太公六韜有天子將兵事可以威厭四方進以為然入言之於帝於是乃詔進大發四方兵講武於平樂觀下起大壇上建十二重五采華蓋高十丈壇東北為小壇復建九重華蓋高九丈列步兵騎士數萬人結營為陳天子親出臨軍駐大華蓋下進駐小華蓋下禮畢帝躬擐甲介馬稱無上將軍行陳三匝而還詔使進悉領兵屯於觀下是時置西園八校尉以小黃門蹇碩為上軍校尉虎賁中郎將袁紹為中軍校尉屯騎都尉鮑鴻為下軍校尉議郎曹操為典軍校尉趙融為助軍校尉淳于瓊為佐軍校尉又有左右校尉帝以蹇碩壯健而有武略特親任之以為元帥督司隸校尉以下雖大將軍亦領屬焉碩雖兵於中而猶畏忌於進乃與諸常侍共説帝遣進西擊邊章韓遂帝從之賜兵車百乘虎賁斧鉞進陰知其謀乃上遣袁紹東擊徐兗二州兵須紹還即戎事以稽行期初何皇后生皇子辨王貴人生皇子協羣臣請立太子帝以辨輕佻無威儀不可為人主然皇后有寵且進又居重權故久不決六年帝疾篤屬協於蹇碩碩既受遺詔且素輕忌於進兄弟及帝崩碩時在內欲先誅進而立協及進從外入碩司馬潘隱與進早舊迎而目之進驚馳從儳道歸營引兵入屯百郡邸因稱疾不入碩謀不行皇子辨乃即位何太后臨朝進與太傅袁隗輔政録尚書事進素知中官天下所疾兼忿蹇碩圖己及秉朝政陰規誅之袁紹亦素有謀因進親客張津勸之曰黃門常侍權重日久又與長樂太后專通姦利將軍宜更清選賢良整齊天下為國家除患進然其言又以袁氏纍世寵貴海內所歸而紹素善養士能得豪傑用其從弟虎賁中郎將術亦尚氣俠故並厚待之因復博徵智謀之士龐逄紀何顒荀攸等與同腹心蹇碩疑不自安與中常侍趙忠等書曰大將軍兄弟秉國專朝今與天下黨人謀誅先帝左右掃滅我曹但以碩典禁兵故且沈吟今宜共閉上閣急捕誅之中常侍郭勝進同郡人也太后及進之貴幸勝有力焉故勝親信何氏遂共趙忠等議不從碩計而以其書示進進乃使黃門令收碩誅之因領其屯兵袁紹復説進曰前竇武欲誅內寵而反為所害者以其言語漏泄而五營百官服畏中人故也今將軍既有元舅之重而兄弟並領徑兵部曲將吏皆英俊名士樂盡力命事在掌握此天贊之時也將軍宜一為天下除患名垂後世雖周之申伯何足道哉今大行在前殿將軍宜受詔領禁兵不宜輕出入宮省進甚然之乃稱疾不入陪喪又不送山陵遂與紹定籌策而以其計白太后太后不聽曰中官統領禁省自古及今漢家故事不可廢也且先帝新𠫓廾天下我奈何楚楚與士人對共事乎進難違太后意且欲誅其放縱者紹以為中官親近至尊出入號令今不悉廢後必為患而太后母舞陽君及苗數受諸宦官賂遺知進欲誅之數白太后為其障蔽又言大將軍專殺左右權以弱社稷太后疑以為然中官在省闥者或數十年封侯貴寵膠固內外進新當重任素敬憚之雖外收大名而內不能斷故事久不決紹等又為畫策多召四方猛將及諸豪傑使並引兵向京城以脅太后進然之主簿陳琳入諫曰易稱即鹿無虞諺有掩目捕雀夫微物尚不可欺以得志況國之大事其可以詐立乎今將軍總皇威握兵要龍驤虎步高下在心此猶鼓洪爐燎毛髮耳夫違經合道天人所順而反委釋利器更徵外助大兵聚會強者為雄所謂倒持干戈授人以柄功必不成秖為亂階進不聽遂西召前將軍董卓屯關中上林苑又使府掾太山王匡東發其郡強弩并召東郡太守橋瑁屯城皋使武猛都尉丁原燒孟津火照城中皆以誅宦官為言太后猶不從苗謂進曰始共從南陽來俱以貧賤依省內以致貴富國家之事亦何容易覆水不可收宜深思之且與省內和也進意更狐疑紹懼進變計乃脅之曰交搆已成形藝已露事留變生將軍復欲何待而不早決之乎進於是以紹為司隸校尉假節專命擊斷從事中郎王允為河南尹紹使洛陽方略武吏司察宦者而促董卓等使馳驛上欲進兵平樂觀太后乃恐悉罷中常侍小黃門使還里舍唯留進素所私人以守省中諸常侍小黃門皆詣進謝罪唯所措置進謂曰天下胸胸正患諸君耳今董卓垂至諸君何不早各就國袁紹勸進便於此決之至于再三進不許紹又為書告諸州郡詐宣進意使捕案中官親屬進謀積日頗泄中官懼而思變張讓子婦太后之妹也讓向子婦叩頭曰老臣得罪當與新婦俱歸私門惟受恩纍世今當遠離宮殿情懷戀戀願復一入直得暫奉望太后陛下顏色然後退就溝壑死不恨矣子婦言於舞陽君入白太后乃詔諸常侍皆復入直八月進入長樂白太后請盡誅諸常侍以下選三署郎入守宦官廬諸宦官相謂曰大將軍稱疾不臨喪不送葬今欻入省此意何為竇氏事竟復起邪又張讓等使人潛聽具聞其語乃率常侍段圭畢嵐等數十人持兵竊自側闥入伏省中及進出因詐以太后詔召進入坐省闥讓等詰進曰天下憒憒亦非獨我曹罪也先帝嘗與太后不快幾至成敗我曹涕泣救解各出家財千萬為禮和悅上意但欲託卿門戶耳今乃欲滅我曹種族不亦太甚乎卿言省內穢濁公卿以下忠清者為誰於是尚方監渠穆拔劒斬進於嘉德殿前讓圭等為詔以故太尉樊陵為司隸校尉少府許相為河南尹尚書得詔板疑之曰請大將軍出共議中黃門以進頭擲與尚書曰何進謀反已伏誅矣進部曲將吳匡張璋素所親幸在外聞進被害欲將兵入宮宮閣閉袁術與匡共斫攻之中黃門持兵守閣會日暮術因燒南宮九龍門及東西宮欲以脅出讓等讓等入白太后言大將軍兵反燒宮攻尚書闥因將太后天子及陳留王又劫省內官屬從復道走北宮尚書盧植執戈於閣道窗下仰數段圭段圭等懼乃釋太后太后投閣得免袁紹與叔父隗矯詔召樊陵許相斬之苗紹乃引兵屯朱雀闕下捕得趙忠等斬之吳匡等素怨苗不與進同心而又疑其與宦官同謀乃令軍中曰殺大將軍者即車騎也士吏能為報讎乎進素有仁恩士卒皆流涕曰願致死匡遂引兵與董卓弟奉車都尉旻攻殺苗𠫓廾其尸於苑中紹遂閉北宮門勒兵捕宦者無少長皆殺之或有無須而誤死者至自發露然後得免死者二千餘人紹因進兵排宮或上端門屋以攻省內張讓段圭等困迫遂將帝與陳留王數十人步出穀門奔小平津公卿並出平樂觀無得從者唯尚書盧植夜馳河上王允遣河南中部掾閔貢隨植後貢至手劒斬數人餘皆投河而死明日公卿百官乃奉迎天子還宮以貢為郎中封都亭侯董卓遂廢帝又迫殺太后殺舞陽君何氏遂亡而漢室亦自此敗亂論曰竇武何進藉元舅之資據輔政之權內倚太后臨朝之威外迎羣英乘風之藝卒而事敗閹豎身死功穨為世所悲豈智不足而權有餘乎傳曰天之廢商久矣君將興之斯宋襄公所以敗於泓也贊曰武生蛇祥進自屠羊惟女惟弟來儀紫房上惛下嬖人靈動怨將糾邪慝以合人願道之屈矣代離凶困
