body:
  text: 後漢書卷七十五劉焉袁術呂布列傳第六十五劉焉字君郎江夏竟陵人也魯恭王後也肅宗時徙竟陵焉少任州郡以宗室拜郎中去官居陽城山精學教授舉賢良方正稍遷南陽太守宗正太常時靈帝政化衰缺四方兵寇焉以為刺史威輕既不能禁且用非其人輒增暴亂乃建議改置牧伯鎮安方夏清選重臣以居其任焉乃陰求為交址以避時難議未即行會益州刺史郗儉在政煩擾謠言遠聞而并州刺史張懿涼州刺史耿鄙並為寇賊所害故焉議得用出焉為監軍使者領益州牧太僕黃琬為豫州牧宗正劉虞為幽州牧皆以本秩居職州任之重自此而始是時益州賊馬相亦自號黃巾合聚疲役之民數千人先殺綿竹令進攻雒縣殺郗儉又擊蜀郡犍為旬月之閒破壞三郡馬相自稱天子衆至十餘萬人遣兵破巴郡殺郡守趙部州從事賈龍先領兵數百人在犍為遂糾合吏人攻相破之龍乃遣吏卒迎焉焉到以龍為校尉徙居綿竹龍撫納離叛務行寬惠而陰圖異計沛人張魯母有恣色兼挾鬼道往來焉家遂任魯以為督義司馬遂與別部司馬張修將兵掩殺漢中太守蘇固斷絶斜谷殺使者魯既得漢中遂復殺張修而并其衆焉欲立威刑以自尊大乃託以他事殺州中豪彊十餘人士民皆怨初平二年犍為太守任岐及賈龍並反攻焉焉擊破皆殺之自此意氣漸盛遂造作乘輿車重千餘乘焉四子範為左中郎將誕治書御史璋奉車都尉並從獻帝在長安唯別部司馬瑁隨焉在益州朝廷使璋曉譬焉焉留璋不復遣興平元年征西將軍馬騰與範謀誅李傕焉遣叟兵五千助之戰敗範及誕並見殺焉既痛二子又遇天火燒其城府車重延及民家館邑無餘於是徙居成都遂疽發背疽卒州大吏趙韙等貪璋溫仁立為刺史詔書因以璋為監軍使者領益州牧以韙為征東中郎將先是荊州牧劉表表焉僭擬乘輿器服韙以此遂屯兵朐備表初南陽三輔民數萬戶流入益州焉悉收以為衆名曰東州兵璋性柔寬無威略東州人侵暴為民患不能禁制舊士頗有離怨趙韙之在巴中甚得衆心璋委之以權韙因人情不輯乃陰結州中大姓建安五年還共擊璋蜀郡廣漢犍為皆反應東州人畏見誅滅乃同心并力為璋死戰遂破反者進攻韙於江州斬之張魯以璋暗懦不復承順璋怒殺魯母及弟而遣其將龐羲等攻魯數為所破魯部曲多在巴土故以羲為巴郡太守魯因襲取之遂雄於巴漢十三年曹操自將征荊州璋乃遣使致敬操加璋振威將軍兄瑁平寇將軍璋因遣別駕從事張松詣操而操不相接禮松懷恨而還勸璋絶曹氏而結好劉備璋從之十六年璋聞曹操當遣兵向漢中討張魯內懷恐懼松復說璋迎劉備以拒操璋即遣法正將兵迎備璋主簿巴西黃權諫曰劉備有梟名今以部曲遇之則不滿其心以賓客待之則一國不容二主此非自安之道從事廣漢王纍自倒懸於州門以諫璋一無所納備自江陵馳至涪城璋率步騎數萬與備會張松勸備於會襲璋備不忍明年出屯葭萌松兄廣漢太守肅懼禍及己乃以松謀白璋收松斬之勑諸關戍勿復通備大怒還兵擊璋所在戰剋十九年進圍成都數十日城中有精兵三萬人穀支一年吏民咸欲拒戰璋言父子在州二十餘歲無恩德以加百姓而攻戰三載肌膏草野者以璋故也何心能安遂開城出降羣下莫不流涕備遷璋於公安歸其財寶後以病卒明年曹操破張魯定漢中魯字公旗初祖父陵順帝時客於蜀學道鶴鳴山中造作符書以惑百姓受其道者輒出米五斗故謂之米賊陵傳子衡衡傳於魯魯遂自號師君其來學者初名為鬼卒後號祭酒祭酒各領部衆衆多者名曰理頭皆校以誠信不聽欺妄有病但令首過而已諸祭酒各起義舍於路同之亭傳縣置米肉以給行旅食者量腹取足過多則鬼能病之犯法者先加三原然後行刑不置長吏以祭酒為理民夷信向朝廷不能討遂就拜魯鎮夷中郎將領漢寧太守通其貢獻韓遂馬超之亂關西民奔魯者數萬家時人有地中得玉印者羣下欲尊魯為漢寧王魯功曹閻圃諫曰漢川之民戶出十萬四面險固財富土沃上匡天子則為桓文次方竇融不失富貴今承制署置藝足斬斷遽稱王號必為禍先魯從之魯自在漢川垂三十年聞曹操征之至陽平欲舉漢中降其弟衛不聽率衆數萬拒關固守操破衛斬之魯聞陽平已陷將稽顙歸降閻圃說曰今以急往其功為輕不如且依巴中然後委質功必多也於是乃奔南山左右欲悉焚寶貨倉庫魯曰本欲歸命國家其意未遂今日之走以避鋒鋭非有惡意遂封藏而去操入南鄭甚嘉之又以魯本有善意遣人慰安之魯即與家屬出逆拜鎮南將軍封閬中侯邑萬戶將還中國待以客禮封魯五子及閻圃等皆為列侯魯卒諡曰原侯子富嗣論曰劉焉覩時方艱先求後亡之所庶乎見幾而作夫地廣則驕尊之心生財衍則僭奢之情用固亦恆人必至之期也璋能閉隘養力守案先圖尚可與歲時推移而遽輸利器靜受流斥所謂羊質虎皮見豺則恐吁哉袁術字公路汝南汝陽人司空逢之子也少以俠氣聞數與諸公子飛鷹走狗後頗折節舉孝廉纍遷至河南尹虎賁中郎將時董卓將欲廢立以術為後將軍術畏卓之禍出奔南陽會長沙太守孫堅殺南陽太守張咨引兵從術劉表上術為南陽太守術又表堅領豫州刺史使率荊豫之卒擊破董卓於陽人術從兄紹因堅討卓未反遠遣其將會稽周昕奪堅豫州術怒擊昕走之紹議欲立劉虞為帝術好放縱憚立長君託以公義不肯同積此釁隙遂成乃各外交黨援以相圖謀術結公孫瓚而紹連劉表豪桀多附於紹術怒曰羣豎不吾從而從吾家奴乎又與公孫瓚書云紹非袁氏子紹聞大怒初平三年術遣孫堅擊劉表於襄陽堅戰死公孫瓚使劉備與術合謀共逼紹紹與曹操會擊皆破之四年術引軍入陳留屯封丘黑山餘賊及胸奴於扶羅等佐術與曹操戰於匡亭大敗術退保雍丘又將其餘衆奔九江殺楊州刺史陳溫而自領之又兼稱徐州伯李傕入長安欲結術為援乃授以左將軍假節封陽翟侯初術在南陽戶口尚數十百萬而不修法度以鈔掠為資奢恣無猒百姓患之又少見識書言代漢者當塗高自云名字應之又以袁氏出陳為舜後以黃代赤德運之次遂有僭逆之謀又聞孫堅得傳國璽遂拘堅妻奪之興平二年冬天子播越敗於曹陽術大會群下因謂曰今海內鼎沸劉氏微弱吾家四世公輔百姓所歸欲應天順民於諸君何如衆莫敢對主簿閻象進曰昔周自后稷至于文王積德纍功參分天下猶服事殷明公雖奕世克昌孰若有周之盛漢室雖微未至殷紂之敝也術默然使召張範範辭疾遣弟承往應之術問曰昔周室陵則有桓文之霸秦失其政漢接而用之今孤以土地之廣士人之衆欲徼福於齊桓擬迹於高祖可乎承對曰在德不在衆苟能用德以同天下之欲雖云匹夫霸王可也若陵僭無度干時而動衆之所𠫓廾誰能興之術不說自孫堅死子策復領其部曲術遣擊楊州刺史劉繇破之策因據江東策聞術將欲僭號與書諫曰董卓無道陵虐王室禍加太后暴及弘農天子播越宮廟焚毀是以豪桀發憤沛然俱起元惡既斃幼主東顧乃使王人奉命宣明朝恩偃武修文與之更始然而河北異謀於黑山曹操毒被於東徐劉表僭亂於南荊公孫叛逆於朔北正禮阻兵玄德爭盟是以未獲從命櫜弓戢戈當謂使君與國同規而舍是弗恤完然有自取之志懼非海內企望之意也成湯討桀稱有夏多罪武王伐紂曰殷有重罰此二王者雖有聖德假使時無失道之過無由逼而取也今主上非有惡於天下徒以幼子脅於彊臣異於湯武之時也又聞幼主明智聰敏有夙成之德天下雖未被其恩咸歸心焉若輔而興之則旦奭之美率土所望也使君五世相承為漢宰輔榮寵之盛莫與為比宜效忠守節以報王室時人多惑圖緯之言妄牽非類之文苟以悅主為美不顧成敗之計古今所慎可不孰慮忠言逆耳駮議致憎苟有益於尊明無所敢辭術不納策遂絶之建安二年因河內張炯符命遂果僭號自稱仲家以九江太守為淮南尹置公卿百官郊祀天地乃遣使以竊號告呂布并為子娉布女布執術使送許術大怒遣其將張勳橋蕤攻布大敗而還術又率兵擊陳國誘殺其王寵及相駱俊曹操乃自征之術聞大駭即走度淮留張勳橋蕤於蘄陽以拒操操擊破斬蕤而勳退走術兵弱大將死衆情離叛加天旱歲荒士民凍餒江淮閒相食殆盡時舒仲應為術沛相術以米十萬斛與為軍糧仲應悉散以給飢民術聞怒陳兵將斬之仲應曰知當必死故為之耳寧可以一人之命救百姓於塗炭術下馬牽之曰仲應足下獨欲享天下重名不與吾共之邪術雖矜名尚奇而天性驕肆尊己陵物及竊僞號淫侈滋甚媵御數百無不兼羅紈厭粱肉自下飢困莫之簡恤於是資實空盡不能自立四年夏乃燒宮室奔其部曲陳簡雷薄於山復為簡等所拒遂大困窮士卒散走憂悶不知所為遂歸帝號於紹曰祿去漢室久矣天下提挈政在家門豪雄角逐分割疆宇此與周末七國無異唯彊者兼之耳袁氏受命當王符瑞炳然今君擁有四州人戶百萬以彊則莫與爭大以位則無所比高曹操雖欲扶衰奬微安能續絶運起已滅乎謹歸大命君其興之紹陰然其計術因欲北至青州從袁談曹操使劉備徼之不得過復走還壽春六月至江亭坐簀牀而歎曰袁術乃至是乎因憤慨結病歐血死妻子依故吏廬江太守劉勳孫策破勳復見收視術女入孫權宮子曜仕吳為郎中論曰天命符驗可得而見未可得而言也然大致受大福者歸於信順乎夫事不以順雖彊力廣謀不能得也謀不可得之事日失忠信變詐妄生矣況復苟肆行之其以欺天乎雖假符僭稱歸將安所容哉呂布字奉先五原九原人也以弓馬驍武給并州刺史丁原為騎都尉原屯河內以布為主簿甚見親待靈帝崩原受何進召將兵詣洛陽為執金吾會進敗董卓誘布殺原而并其兵卓以布為騎都尉誓為父子甚愛信之稍遷至中郎將封都亭侯卓自知凶恣每懷猜畏行止常以布自衛嘗小失卓意卓拔手戟擲之布拳捷得免而改容顧謝卓意亦解布由是陰怨於卓卓又使布守中閣而私與傅婢情通益不自安因往見司徒王允自陳卓幾見殺之狀時允與尚書僕射士孫瑞密謀誅卓因以告布使為內應布曰如父子何曰君自姓呂本非骨肉今憂死不暇何謂父子擲戟之時豈有父子情也布遂許之乃於門刺殺卓事已見卓傳允以布為奮威將軍假節儀同三司封溫侯允既不赦涼州人由是卓將李傕等遂相結還攻長安布與傕戰敗乃將數百騎以卓頭繫馬鞍走出武關奔南陽袁術待之甚厚布自恃殺卓有德袁氏遂恣兵鈔掠術患之布不安復去從張楊於河內時李傕等購募求布急楊下諸將皆欲圖之布懼謂楊曰與卿州里今見殺其功未必多不如生賣布可大得傕等爵寵楊以為然有頃布得走投袁紹紹與布擊張燕於常山燕精兵萬餘騎數千匹布常御良馬號曰赤菟能馳城飛塹與其健將成廉魏越等數十騎馳突燕陳一日或至三四皆斬首而出連戰十餘日遂破燕軍布既恃其功更請兵於紹紹不許而將士多暴橫紹患之布不自安因求還洛陽紹聽之承制使領司隸校尉遣壯士送布而陰使殺之布疑其圖己乃使人鼓箏於帳中潛自遁出夜中兵起而布已亡紹聞懼為患募遣追之皆莫敢逼遂歸張楊道經陳留太守張邈遣使迎之相待甚厚臨別把臂言誓邈字孟卓東平人少以俠聞初辟公府稍遷陳留太守董卓之亂與曹操共舉義兵及袁紹為盟主有驕色邈正義責之紹既怨邈且聞與布厚乃令曹操殺邈操不聽然邈心不自安興平元年曹操東擊陶謙令其將武陽人陳宮屯東郡宮因說邈曰今天下分崩雄桀並起君擁十萬之衆當四戰之地撫劒顧眄亦足以為人豪而反受制不以鄙乎今州軍東征其處空虛呂布壯士善戰無前迎之共據兗州觀天下形藝俟時事變通此亦從橫一時也邈從之遂與弟超及宮等迎布為兗州牧據濮陽郡縣皆應之曹操聞而引軍擊布纍戰相持百餘日是時旱蝗少穀百姓相食布移屯山陽二年閒操復盡收諸城破布於巨野布東奔劉備邈詣袁術求救留超將家屬屯雍丘操圍超數月屠之滅其三族邈未至壽春為其兵所害時劉備領徐州居下邳與袁術相拒於淮上術欲引布擊備乃與布書曰術舉兵詣闕未能屠裂董卓將軍誅卓為術報恥功一也昔金元休南至封丘為曹操所敗將軍伐之令術復明目於遐邇功二也術生年以來不聞天下有劉備備乃舉兵與術對戰憑將軍威靈得以破備功三也將軍有三大功在術術雖不敏奉以死生將軍連年攻戰軍糧苦少今送米二十萬斛非唯此止當駱驛復致凡所短長亦唯命布得書大悅即勒兵襲下邳獲備妻子備敗走海西飢困請降於布布又恚術運糧不復至乃具車馬迎備以為豫州刺史遣屯小沛布自號徐州牧術懼布為己害為子求婚布復許之術遣將紀靈等步騎三萬以攻備備求救於布諸將謂布曰將軍常欲殺劉備今可假手於術布曰不然術若破備則北連太山吾為在術圍中不得不救也便率步騎千餘馳往赴之靈等聞布至皆斂兵而止布屯沛城外遣人招備并請靈等與共饗飲布謂靈曰玄德布弟也為諸君所困故來救之布性不喜合鬬但喜解鬬耳乃令軍候植戟於營門布彎弓顧曰諸君觀布射戟小支中者當各解兵不中可留決鬬布即一發正中戟支靈等皆驚言將軍天威也明日復歡會然後各罷術遣韓胤以僭號事告布因求迎婦布遣女隨之沛相陳圭恐術報布成姻則徐楊合從為難未已於是往說布曰曹公奉迎天子輔贊國政將軍宜與協同策謀共存大計今與袁術結姻必受不義之名將有纍卵之危矣布亦素怨術而女已在塗乃追還絶婚執胤送許曹操殺之陳圭欲使子登詣曹操布固不許會使至拜布為左將軍布大喜即聽登行并令奉章謝恩登見曹操因陳布勇而無謀輕於去就宜早圖之操曰布狼子野心誠難久養非卿莫究其情僞即增圭秩中二千石拜登廣陵太守臨別操執登手曰東方之事便以相付令陰合部衆以為內應始布因登求徐州牧不得登還布怒拔戟斫機曰卿父勸吾協同曹操絶婚公路今吾所求無獲而卿父子並顯重但為卿所賣耳登不為動容徐對之曰登見曹公言養將軍譬如養虎當飽其肉不飽則將噬人公曰不如卿言譬如養鷹飢即為用飽則揚去其言如此布意乃解袁術怒布殺韓胤遣其大將張勳橋蕤等與韓暹楊奉連藝步騎數萬七道攻布布時兵有三千馬四百匹懼其不敵謂陳圭曰今致術軍卿之由也為之奈何圭曰暹奉與術卒合之師耳謀無素定不能相維子登策之比於連雞藝不俱棲立可離也布用圭策與暹奉書曰二將軍親拔大駕而布手殺董卓俱立功名當垂竹帛今袁術造逆宜共誅討奈何與賊還來伐布可因今者同力破術為國除害建功天下此時不可失也又許破術兵悉以軍資與之暹奉大喜遂共擊勳等於下邳大破之生禽橋蕤餘衆潰走其所殺傷墯水死者殆盡時太山臧霸等攻破莒城許布財幣以相結而未及送布乃自往求之其督將高順諫止曰將軍威名宣播遠近所畏何求不得而自行求賂萬一不剋豈不損邪布不從既至莒霸等不測往意固守拒之無獲而還順為人清白有威嚴少言辭將衆整齊每戰必剋布性決易所為無常順每諫曰將軍舉動不肯詳思忽有失得動輒言誤誤事豈可數乎布知其忠而不能從建安三年布遂復從袁術遣順攻劉備於沛破之曹操遣夏侯惇救備為順所敗操乃自將擊布至下邳城下遺布書為陳禍福布欲降而陳宮等自以負罪於操深沮其計而謂布曰曹公遠來藝不能久將軍若以步騎出屯於外宮將餘衆閉守於內若向將軍宮引兵而攻其背若但攻城則將軍救於外不過旬月軍食畢盡擊之可破也布然之布妻曰昔曹氏待公臺如赤子猶舍而歸我今將軍厚公臺不過於曹氏而欲委全城捐妻子孤軍遠出乎若一旦有變妾豈得為將軍妻哉布乃止而潛遣人求救於袁術自將千餘騎出戰敗走還保城不敢出術亦不能救曹操圍之壅沂泗以灌其城三月上下離心其將侯成使客牧其名馬而客策之以叛成追客得馬諸將合禮以賀成成分酒肉先入詣布而言曰蒙將軍威靈得所亡馬諸將齊賀未敢嘗也故先以奉貢布怒曰布禁酒而卿等醞釀為欲因酒共謀布邪成忿懼乃與諸將共執陳宮高順率其衆降布與麾下登白門樓兵圍之急令左右取其首詣操左右不忍乃下降布見操曰今日已往天下定矣操曰何以言之布曰明公之所患不過於布今已服矣令布將騎明公將步天下不足定也顧謂劉備曰玄德卿為坐上客我為降虜繩縛我急獨不可一言邪操笑曰縛虎不得不急乃命緩布縛劉備曰不可明公不見呂布事丁建陽董太師乎操頷之布目備曰大耳兒最叵信操謂陳宮曰公臺平生自謂智有餘今意何如宮指布曰是子不用宮言以至於此若見從未可量也操又曰奈卿老母何宮曰老母在公不在宮也夫以孝理天下者不害人之親操復曰奈卿妻子何宮曰宮聞霸王之主不絶人之祀固請就刑遂出不顧操為之泣涕布及宮順皆縊殺之傳首許市贊曰焉作庸牧以希後福曷云負荷地墮身逐術既叨貪布亦翻覆
