body:
  text: 後漢書卷三十一郭杜孔張廉王蘇羊賈陸列傳第二十一郭伋字細侯扶風茂陵人也高祖父解武帝時以任俠聞父梵為蜀郡太守伋少有志行哀平閒辟大司空府三遷為漁陽都尉王莽時為上谷大尹遷并州牧更始新立三輔連被兵寇百姓震駭強宗右姓各擁衆保營莫肯先附更始素聞伋名徵拜左馮翊使鎮撫百姓世祖即位拜雍州牧再轉為尚書令數納忠諫爭建武四年出為中山太守明年彭寵滅轉為漁陽太守漁陽既離王莽之亂重以彭寵之敗民多猾惡寇賊充斥伋到示以信賞糾戮渠帥盜賊銷散時胸奴數抄郡界邊境苦之伋整勒士馬設攻守之略胸奴畏憚遠迹不敢復入塞民得安業在職五歲戶口增倍後潁川盜賊羣起九年徵拜潁川太守召見辭謁帝勞之曰賢能太守去帝城不遠河潤九里冀京師并蒙福也君雖精於追捕而山道險自鬬當一士耳深宜慎之伋到郡招懷山賊陽夏趙宏襄城召吳等數百人皆束手詣伋降悉遣歸附農因自劾專命帝美其策不以咎之後宏吳等黨與聞伋威信遠自江南或從幽冀不期俱降駱驛不絶十一年省朔方刺史屬并州帝以盧芳據北土乃調伋為并州牧過京師謝恩帝即引見并召皇太子諸王宴語終日賞賜車馬衣服什物伋因言選補衆職當簡天下賢俊不宜專用南陽人帝納之伋前在并州素結恩德及後入界所到縣邑老幼相攜逢迎道路所過問民疾苦聘求耆德雄俊設几杖之禮朝夕與參政事始至行部到西河美稷有童兒數百各騎竹馬道次迎拜伋問兒曹何自遠來對曰聞使君到喜故來奉迎伋辭謝之及事訖諸兒復送至郭外問使君何日當還伋謂別駕從事計日當告之行部既還先期一日伋為違信於諸兒遂止于野亭須期乃入是時朝廷多舉伋可為大司空帝以并部尚有盧芳之警且胸奴未安欲使久於其事故不召伋知盧芳夙賊難卒以力制常嚴烽候明購賞以結寇心芳將隋昱遂謀脅芳降伋芳乃亡入胸奴伋以老病上書乞骸骨二十二年徵為太中大夫賜宅一區及帷帳錢穀以充其家伋輒散與宗親九族無所遺餘明年卒時年八十六帝親臨弔賜冢塋地杜詩字公君公河內汲人也少有才能仕郡功曹有公平稱更始時辟大司馬府建武元年歲中三遷為侍御史安集洛陽時將軍蕭廣放縱兵士暴橫民閒百姓惶擾詩勑曉不改遂格殺廣還以狀聞世祖召見賜以棨戟復使之河東誅降逆賊楊異等詩到大陽聞賊規欲北度乃與長史急焚其船部勒郡兵將突騎趁擊斬異等賊遂翦滅拜成臯令視事三歲舉政尤異再遷為沛郡都尉轉汝南都尉所在稱治七年遷南陽太守性節儉而政治清平以誅暴立威善於計略省愛民役造作水排鑄為農器用力少見功多百姓便之又修治陂池廣拓土田郡內比室殷足時人方於召信臣故南陽為之語曰前有召父後有杜母詩自以無勞不安久居大郡求欲降避功臣乃上疏曰陛下亮成天工克濟大業偃兵修文羣帥反旅海內合和萬世蒙福天下幸甚唯胸奴未譬聖德威侮二垂陵虐中國邊民虛耗不能自守臣恐武猛之將雖勤亦未得解甲櫜弓也夫勤而不息亦怨勞而不休亦怨怨恨之師難復責功臣伏覩將帥之情功臣之望冀一休足於內郡然後即戎出命不敢有恨臣愚以為師克在和不在衆陛下雖垂念北邊亦當頗泄用之昔湯武善御衆故無忿鷙之師陛下起兵十有三年將帥和睦士卒𧃡今若使公卿郡守出於軍壘則將帥自厲士卒之復比於宿衛則戎士自百何者天下已安各重性命大臣以下咸懷樂土不讎其功而厲其用無以勸也陛下誠宜虛數郡以俟振旅之臣重復厚賞加於久役之士如此緣邊屯戍之師競而忘死乘城拒塞之吏不辭其勞則烽火精明守戰堅固聖王之政必因人心今猥用愚薄塞功臣之望誠非其宜受大恩收牧養不稱奉職無效久竊祿位令功臣懷慍誠惶誠恐八年上書乞避功德陛下殊恩未許放退臣詩蒙恩尤深義不敢苟冒虛請誠不勝至願願退大郡受小職及臣齒壯力能經營劇事如使臣詩必有補益復受大位雖析圭授爵所不辭也惟陛下哀矜詩雅好推賢數進知名士清河劉統及魯陽長董崇等初禁網尚簡但以璽書發兵未有虎符之信詩上疏曰臣聞兵者國之凶器聖人所慎舊制發兵皆以虎符其餘徵調竹使而已符第合會取為大信所以明著國命斂持威重也閒者發兵但用璽書或以詔令如有姦人詐僞無由知覺愚以為軍旅尚興賊虜未殄徵兵郡國宜有重慎可立虎符以絶姦端昔魏之公子威傾鄰國猶假兵符以解趙圍若無如姬之仇則其功不顯事有煩而不可省費而不得已蓋謂此也書奏從之詩身雖在外盡心朝廷讜言善策隨事獻納視事七年政化大行十四年坐遣客為弟報仇被徵會病卒司隸校尉鮑永上書言詩貧困無田宅喪無所歸詔使治喪郡邸賻絹千匹孔奮字君魚扶風茂陵人也曾祖霸元帝時為侍中奮少從劉歆受春秋左氏傳歆稱之謂門人曰吾已從君魚受道矣遭王莽亂奮與老母幼弟避兵河西建武五年河西大將軍竇融請奮署議曹掾守姑臧長八年賜爵關內侯時天下擾亂唯河西獨安而姑臧稱為富邑通貨羌胡市日四合每居縣者不盈數月輒致豐積奮在職四年財産無所增事母孝謹雖為儉約奉養極求珍膳躬率妻子同甘菜茹時天下未定士多不修節操而奮力行清潔為衆人所笑或以為身處脂膏不能以自潤徒益苦辛耳奮既立節治貴仁平太守梁統深相敬待不以官屬禮之常迎於大門引入見母隴蜀既平河西守令咸被徵召財貨連轂竟川澤唯奮無資單車就路姑臧吏民及羌胡更相謂曰孔君清廉仁賢舉縣蒙恩如何今去不共報德遂相賦斂牛馬器物千萬以上追送數百里奮謝之而已一無所受既至京師除武都郡丞時隴西餘賊隗茂等夜攻府舍殘殺郡守賊畏奮追急乃執其妻子欲以為質奮年已五十唯有一子終不顧望遂窮力討之吏民感義莫不倍用命焉郡多氐人便習山谷其大豪齊鍾留者為羣氐所信向奮乃率厲鍾留等令要遮鈔擊共為表𩹉賊窘懼逼急乃推奮妻子以置軍前冀當退却而擊之愈厲遂禽滅茂等奮妻子亦為所殺世祖下詔褒美拜為武都太守奮自為府丞已見敬重及拜太守舉郡莫不改操為政明斷甄善疾非見有美德愛之如親其無行者忿之若讎郡中稱為清平弟奇游學洛陽奮以奇經明當仕上病去官守約鄉閭卒于家奇博通經典作春秋左氏刪奮晚有子嘉官至城門校尉作左氏說云張堪字君游南陽宛人也為郡族姓堪早孤讓先父餘財數百萬與兄子年十六受業長安志美行厲諸儒號曰聖童世祖微時見堪志操常嘉焉及即位中郎將來歙薦堪召拜郎中三遷為謁者使送委輸縑帛并領騎七千匹詣大司馬吳漢伐公孫述在道追拜蜀郡太守時漢軍餘七日糧陰具船欲遁去堪聞之馳往見漢說述必敗不宜退師之策漢從之乃示弱挑敵述果自出戰死城下成都既拔堪先入據其城撿閲庫藏收其珍寶悉條列上言秋毫無私慰撫吏民蜀人大悅在郡二年徵拜騎都尉後領票騎將軍杜茂營擊破胸奴於高柳拜漁陽太守捕擊姦猾賞罰必信吏民皆樂為用胸奴嘗以萬騎入漁陽堪率數千騎奔擊大破之郡界以靜乃於狐奴開稻田八千餘頃勸民耕種以致殷富百姓歌曰桑無附枝麥穗兩岐張君為政樂不可支視事八年胸奴不敢犯塞帝嘗召見諸郡計吏問其風土及前後守令能否蜀郡計掾樊顯進曰漁陽太守張堪昔在蜀其仁以惠下威能討姦前公孫述破時珍寶山積捲握之物足富十世而堪去職之日乘折轅車布被囊而已帝聞良久歎息拜顯為魚復長方徵堪會病卒帝深悼惜之下詔褒揚賜帛百匹廉范字叔度京兆杜陵人趙將廉頗之後也漢興以廉氏豪宗自苦陘徙焉世為邊郡守或葬隴西襄武故因仕焉曾祖父褒成哀閒為右將軍祖父丹王莽時為大司馬庸部牧皆有名前世范父遭喪亂客死於蜀漢范遂流寓西州西州平歸鄉里年十五辭母西迎父喪蜀郡太守張穆丹之故吏乃重資送范范無所受與客步負喪歸葭萌載船觸石破沒范抱持棺柩遂俱沈溺衆傷其義鉤求得之療救僅免於死穆聞復馳遣使持前資物追范范又固辭歸葬服竟詣京師受業事博士薛漢京兆隴西二郡更請召皆不應永平初隴西太守鄧融備禮謁范為功曹會融為州所舉案范知事譴難解欲以權相濟乃託病求去融不達其意大恨之范於是東至洛陽變名姓求代廷尉獄卒居無幾融果徵下獄范遂得衛侍左右盡心勸勞融怪其貌類范而殊不意乃謂曰卿何似我故功曹邪范訶之曰君困厄瞀亂邪語遂絶融繫出困病范隨而養視及死竟不言身自將車送喪致南陽葬畢乃去後辟公府會薛漢坐楚王事誅故人門生莫敢視范獨往收斂之吏以聞顯宗大怒召范入詰責曰薛漢與楚王同謀交亂天下范公府掾不與朝廷同心而反收斂罪人何也范叩頭曰臣無狀愚戇以為漢等皆已伏誅不勝師資之情罪當萬坐帝怒稍解問范曰卿廉頗後邪與右將軍褒大司馬丹有親屬乎范對曰褒臣之曾祖丹臣之祖也帝曰怪卿志膽敢爾因貰之由是顯名舉茂才數月再遷為雲中太守會胸奴大入塞烽火日通故事虜人入過五千人移書傍郡吏欲傳檄求救范不聽自率士卒拒之虜衆盛而范兵不敵會日暮令軍士各交縛兩炬三頭火營中星列虜遙望火多謂漢兵救至大驚待旦將退范乃令軍中蓐食晨往赴之斬首數百級虜自相轔藉死者千餘人由此不敢復向雲中後頻歷武威武都二郡太守隨俗化導各得治宜建初中遷蜀郡太守其俗尚文辨好相持短長范每厲以淳厚不受偷薄之說成都民物豐盛邑宇逼側舊制禁民夜作以防火灾而更相隱蔽燒者日屬范乃毀削先令但嚴使儲水而已百姓為便乃歌之曰廉叔度來何暮不禁火民安作平生無襦今五褲在蜀數年坐法免歸鄉里范世在邊廣田地積財粟悉以賑宗族朋友肅宗崩范奔赴敬陵時廬江郡掾嚴麟奉章弔國俱會於路麟乘小車塗深馬死不能自進范見而愍然命從騎下馬與之不告而去麟事畢不知馬所歸乃緣蹤訪之或謂麟曰故蜀郡太守廉叔度好周人窮急今奔國喪獨當是耳麟亦素聞范名以為然即牽馬造門謝而歸之世伏其好義然依倚大將軍竇憲以此為譏卒於家初范與洛慶鴻為刎頸交時人稱曰前有管鮑後有慶廉鴻慷慨有義節位至琅邪會稽二郡太守所在有異迹論曰張堪廉范皆以氣俠立名觀其振危急赴險有足壯者堪之臨財范之忘施亦足以信意而感物矣若夫高祖之召欒布明帝之引廉范加怒以發其志就戮更延其寵聞義能徙誠君道所尚然情理之樞亦有開塞之感焉王堂字敬伯廣漢郪人也初舉光祿茂才遷穀城令治有名迹永初中西羌寇巴郡為民患詔書遣中郎將尹就攻討連年不剋三府舉堂治劇拜巴郡太守堂馳兵赴賊斬虜千餘級巴庸清靜吏民生為立祠刺史張喬表其治能遷右扶風安帝西巡阿母王聖中常侍江京等並請屬於堂堂不為用掾吏史固諫之堂曰吾蒙國恩豈可為權寵阿意以死守之即日遣家屬歸閉閣上病果有誣奏堂者會帝崩京等悉誅堂以守正見稱永建二年徵入為將作大匠四年坐公事左轉議郎復拜魯相政存簡一至數年無辭訟遷汝南太守搜才禮士不苟自專乃教掾吏史曰古人勞於求賢逸於任使故能化清於上事緝於下其憲章朝右簡核才職委功曹陳蕃匡政理務拾遺補闕任主簿應嗣庶循名責實察言觀效焉自是委誠求當不復妄有辭教郡內稱治時大將軍梁商及尚書令袁湯以求屬不行並恨之後廬江賊迸入弋陽界堂勒兵追討即便奔散而商湯猶因此風州奏堂在任無警免歸家年八十六卒遺令薄斂瓦棺以葬子稚清行不仕曾孫商益州牧劉焉以為蜀郡太守有治聲蘇章字孺文扶風平陵人也八世祖建武帝時為右將軍祖父純字桓公有高名性強切而持毀譽士友咸憚之至乃相謂曰見蘇桓公患其教責人不見又思之三輔號為大人永平中為奉車都尉竇固軍出擊北胸奴車師有功封中陵鄉侯官至南陽太守章少博學能屬文安帝時舉賢良方正對策高第為議郎數陳得失其言甚直出為武原令時歲飢輒開倉廩活三千餘戶順帝時遷冀州刺史故人為清河太守章行部案其姦臧乃請太守為設酒肴陳平生之好甚歡太守喜曰人皆有一天我獨有二天章曰今夕蘇孺文與故人飲者私恩也明日冀州刺史案事者公法也遂舉正其罪州境知章無私望風畏肅換為并州刺吏以摧折權豪忤旨坐免隱身鄉里不交當世後徵為河南尹不就時天下日敝民多悲苦論者舉章有幹國才朝廷不能復用卒于家兄曾孫不韋不韋字公先父謙初為郡督郵時魏郡李皓為美陽令與中常侍具瑗交通貪暴為民患前後監司畏其藝援莫敢糾問及謙至部案得其臧論輸左校謙纍遷至金城太守去郡歸鄉里漢法免罷守令自非詔徵不得妄到京師而謙後私至洛陽時皓為司隸校尉收謙詰掠死獄中皓又因刑其尸以報昔怨不韋時年十八徵詣公車會謙見殺不韋載喪歸鄉里瘞而不葬仰天嘆曰伍子胥獨何人也乃藏母於武都山中遂變名姓盡以家財募劒客邀皓於諸陵閒不剋會皓遷大司農時右校芻廥在寺北垣下不韋與親從兄弟潛入廥中夜則鑿地晝則逃伏如此經月遂得傍達皓之寢室出其牀下值皓在廁因殺其妾并及小兒留書而去皓大驚懼乃布棘於室以板籍地一夕九徙雖家人莫知其處每出輒劒戟隨身壯士自衛不韋知皓有備乃日夜飛馳徑到魏郡掘其父阜冢斷取阜頭以祭父墳又標之於市曰李君遷父頭皓匿不敢言而自上退位歸鄉里私掩塞冢椁捕求不韋歷歲不能得憤恚感傷發病歐血死不韋後遇赦還家乃始改葬行喪士大夫多譏其發掘冢墓歸罪枯骨不合古義唯任城何休方之伍員太原郭林宗聞而論之曰子胥雖云逃命而見用強吳憑闔廬之威因輕悍之衆雪怨舊郢曾不終朝而但鞭墓戮尸以舒其憤竟無手刃後主之報豈如蘇子單特孑立靡因靡資強讎豪援據位九卿城闕天阻宮府幽絶埃塵所不能過霧露所不能沾不韋毀身燋慮出於百死冒觸嚴禁陷族禍門雖不獲逞為報己深況復分骸斷首以毒生者使皓懷忿結不得其命猶假手神靈以斃之也力唯匹夫功隆千乘比之於員不以優乎議者於是貴之後太傅陳蕃辟不應為郡五官掾初弘農張奐睦於蘇氏而武威段熲與皓素善後奐熲有隙及熲為司隸以禮辟不韋不韋懼之稱病不詣熲既積憤於奐因發怒乃追咎不韋前報皓事以為皓表治謙事被報見誅君命天也而不韋仇之又令長安男子告不韋多將賓客奪舅財物遂使從事張賢等就家殺之乃先以鴆與賢父曰若賢不得不韋便可飲此賢到扶風郡守使不韋奉謁迎賢即時收執并其一門六十餘人盡誅滅之諸蘇以是衰破及段熲為陽球所誅天下以為蘇氏之報焉羊續字興祖太山平陽人也其先七世二千石卿校祖父侵安帝時司隸校尉父儒桓帝時為太常續以忠臣子孫拜郎中去官後辟大將軍竇武府及武敗坐黨事禁錮十餘年幽居守靜及黨禁解復辟太尉府四遷為廬江太守後揚州黃巾賊攻舒焚燒城郭續發縣中男子二十以上皆持兵勒陳其小弱者悉使負水灌火會集數萬人并藝力戰大破之郡界平後安風賊戴風等作亂續復擊破之斬首三千餘級生獲渠帥其餘黨輩原為平民賦與佃器使就農業中平三年江夏兵趙慈反叛殺南陽太守秦頡攻沒六縣拜續為南陽太守當入郡界乃羸服閒行侍童子一人觀歷縣邑採問風謠然後乃進其令長貪潔吏民良猾悉逆知其狀郡內驚竦莫不震懾乃發兵與荊州刺史王敏共擊慈斬之獲首五千餘級屬縣餘賊並詣續降續為上言宥其枝附賊既清平乃班宣政令候民病利百姓歡服時權豪之家多尚奢麗續深疾之常敝衣薄食車馬羸敗府丞嘗獻其生魚續受而懸於庭丞後又進之續乃出前所懸者以杜其意續妻後與子祕俱往郡舍續閉門不內妻自將祕行其資藏唯有布衾敝袛裯鹽麥數斛而已顧勑祕曰吾自奉若此何以資爾母乎使與母俱歸六年靈帝欲以續為太尉時拜三公者皆輸東園禮錢千萬令中使督之名為左騶其所之往輒迎致禮敬厚加贈賂續乃坐使人於單席舉縕袍以示之曰臣之所資唯斯而已左驂白之帝不悅以此不登公位而徵為太常未及行會病卒時年四十八遺言薄斂不受賵遺舊典二千石卒官賻百萬府丞焦儉遵續先意一無所受詔書褒美勑太山太守以府賻錢賜續家云賈琮字孟堅東郡聊城人也舉孝廉再遷為京令有政理迹舊交址土多珍産明璣翠羽犀象瑁異香美木之屬莫不自出前後刺史率多無清行上承權貴下積私賂財計盈給輒復求見遷代故吏民怨叛中平元年交址屯兵反執刺史及合浦太守自稱柱天將軍靈帝特勑三府精選能吏有司舉琮為交址刺史琮到部訊其反狀咸言賦斂過重百姓莫不空單京師遙遠告冤無所民不聊生自活故聚為盜賊琮即移書告示各使安其資業招撫荒散蠲復徭役誅斬渠帥為大害者簡選良吏試守諸縣歲閒蕩定百姓以安巷路為之歌曰賈父來晚使我先反今見清平吏不敢飯在事三年為十三州最徵拜議郎時黃巾新破兵凶之後郡縣重斂因緣生姦詔書沙汰刺史二千石更選清能吏乃以琮為冀州刺史舊典傳車驂駕垂赤帷裳迎於州界及琮之部升車言曰刺史當遠視廣聽糾察美惡何有反垂帷裳以自掩塞乎乃命御者褰之百城聞風自然竦震其諸臧過者望風解印綬去唯癭陶長濟陰董昭觀津長梁國黃就當官待琮於是州界翕然靈帝崩大將軍何進表琮為度遼將軍卒於官陸康字季寧吳郡吳人也祖父續在獨行傳父褒有志操連徵不至康少仕郡以義烈稱刺史臧旻舉為茂才除高成令縣在邊垂舊制令戶一人具弓弩以備不虞不得行來長吏新到輒發民繕修城郭康至皆罷遣百姓大悅以恩信為治寇盜亦息州郡表上其狀光和元年遷武陵太守轉守桂陽樂安二郡所在稱之時靈帝欲鑄銅人而國用不足乃詔調民田畝斂十錢而比水旱傷稼百姓貧苦康上疏諫曰臣聞先王治世貴在愛民省徭輕賦以寧天下除煩就約以崇簡易故萬姓從化靈物應德末世衰主窮奢極侈造作無端興制非一勞割自下以從苟欲故黎民吁嗟陰陽感動陛下聖德承天當隆盛化而卒被詔書畝斂田錢鑄作銅人伏讀惆悵悼心失圖夫十一而稅周謂之徹徹者通也言其法度可通萬世而行也故魯宣稅畝而蝝灾自生哀公增賦而孔子非之豈有聚奪民物以營無用之銅人捐捨聖戒自蹈亡王之法哉傳曰君舉必書書而不法後世何述焉陛下宜留神省察改敝從善以塞兆民怨恨之望書奏內幸因此譖康援引亡國以譬聖明大不敬檻車徵詣廷尉侍御史劉岱典考其事岱為表陳解釋免歸田里復徵拜議郎會廬江賊黃穰等與江夏蠻連結十餘萬人攻沒四縣拜康廬江太守康申明賞罰擊破穰等餘黨悉降帝嘉其功拜康孫尚為郎中獻帝即位天下大亂康蒙險遣孝廉計吏奉貢朝廷詔書策勞加忠義將軍秩中二千石時袁術屯兵壽春部曲飢餓遣使求委輸兵甲康以其叛逆閉門不通內修戰備將以禦之術大怒遣其將孫策攻康圍城數重康固守吏士有先受休假者皆遁伏還赴暮夜緣城而入受敵二年城陷月餘發病卒年七十宗族百餘人遭離飢厄死者將半朝廷愍其守節拜子俊為郎中少子績仕吳為鬱林太守博學善政見稱當時糼年曾謁袁術懷橘墯地者也有名稱贊曰伋牧朔藩信立童昏詩守南楚民作謠言奮馳單乘堪駕毀轅范得其朋堂任良肱二蘇徑烈羊賈廉能季寧拒策城隕衝輣
