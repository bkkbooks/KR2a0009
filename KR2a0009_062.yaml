body:
  text: 後漢書卷五十七杜欒劉李劉謝列傳第四十七杜根字伯堅潁川定陵人也父安字伯夷少有志節年十三入太學號奇童京師貴戚慕其名或遺之書安不發悉壁藏之及後捕案貴戚賓客安開壁出書印封如故竟不離其患時人貴之位至巴郡太守政甚有聲根性方實好絞直永初元年舉孝廉為郎中時和熹鄧后臨朝權在外戚根以安帝年長宜親政事乃與同時郎上書直諫太后大怒收執根等令盛以縑囊於殿上撲殺之執法者以根知名私語行事人使不加力既而載出城外根得蘇太后使人檢視根遂詐死三日目中生蛆因得逃竄為宜城山中酒家保積十五年酒家知其賢厚敬待之及鄧氏誅左右皆言根等之忠帝謂根已死乃下詔布告天下錄其子孫根方歸鄉里徵詣公車拜侍御史初平原郡吏成翊世亦諫太后歸政坐抵罪與根俱徵擢為尚書郎並見納用或問根曰往者遇禍天下同義知故不少何至自苦如此根曰周旋民閒非絕跡之處邂逅發露禍及知親故不為也順帝時稍遷濟陰太守去官還家年七十八卒翊世字季明少好學深明道術延光中常侍樊豐帝乳母王聖共譖皇太子廢為濟陰王翊世連上書訟之又言樊豐王聖誣罔之狀帝既不從而豐等陷以重罪下獄當死有詔免官歸本郡及濟陰王立是為順帝司空張晧辟之晧以翊世前訟太子之廢薦為議郎翊世自以其功不顯恥於受位自劾歸三公比辟不應尚書僕射虞詡雅重之欲引與共參朝政乃上書薦之徵拜議郎後尚書令左雄僕射郭虔復舉為尚書在朝正色百僚敬之欒巴字叔元魏郡內黃人也好道順帝世以宦者給事掖庭補黃門令非其好也性質直學覽經典雖在中官不與諸常侍交接後陽氣通暢白上乞退擢拜郎中四遷桂楊太守以郡處南垂不閑典訓為吏人定婚姻喪紀之禮興立校學校以奬進之雖幹吏卑末皆課令習讀程試殿最隨能升授政事明察視事七年以病乞骸骨荊州刺史李固薦巴治迹徵拜議郎守光祿大夫與杜喬周舉等八人徇行州郡巴使徐州還再遷豫章太守郡土多山川鬼怪小人常破貲產以祈禱巴素有道術能役鬼神乃悉毀壞房祀翦理姦巫於是妖異自消百姓始頗為懼終皆安之遷沛相所在有績徵拜尚書會帝崩營起憲陵陵左右或有小人墳冢主者欲有所侵毀巴連上書苦諫時梁太后臨朝詔詰巴曰大行皇帝晏駕有日卜擇陵園務從省約塋域所極裁二十頃而巴虛言主者壞人冢墓事既非實寢不報下巴猶固遂其愚復上誹謗苟肆狂瞽益不可長巴坐下獄抵罪禁錮還家二十餘年靈帝即位大將軍竇武太傅陳蕃輔政徵拜議郎蕃武被誅巴以其黨復讁為永昌太守以功自劾辭病不行上書極諫理陳竇之冤帝怒下詔切責收付廷尉巴自殺子賀官至雲中太守劉陶字子奇一名偉潁川潁陰人濟北貞王勃之後陶為人居不脩小節所與交友必也同志好尚或殊富貴不求合情趣苟同貧賤不易意同宗劉愷以雅德知名獨深器陶時大將軍梁冀專朝而桓帝無子連歲荒飢災異數見陶時游太學乃上疏陳事曰臣聞人非天地無以為生天地非人無以為靈是故帝非人不立人非帝不寧夫天之與帝帝之與人猶頭之與足相須而行也伏惟陛下年隆德茂中天稱號襲常存之慶循不易之制目不視鳴條之事耳不聞車之聲天災不有痛於肌膚震食不即損於聖體故蔑三光之謬輕上天之怒伏念高祖之起始自布衣拾暴秦之敝追亡周之鹿合散扶傷克成帝業功既顯矣勤亦至矣流福遺祚至於陛下陛下既不能增明烈考之軌而忽高祖之勤妄假利器委授國柄使羣醜刑隸芟刈小民彫敝諸夏虐流遠近故天降衆異以戒陛下陛下不悟而競令虎豹窟於麑場豺狼乳於春囿斯豈唐咨禹稷益典朕虞議物賦土蒸民之意哉又令今牧守長吏上下交競封豕長蛇蠶食天下貨殖者為窮冤之魂貧餒者作飢寒之鬼高門獲東觀之辜豐室羅妖叛之罪死者悲於窀穸生者戚於朝野是愚臣所為咨嗟長懷歎息者也且秦之將亡正諫者誅諛進者賞嘉言結於忠舌國命出於讒口閻樂於咸陽授趙高以車府權去己而不知威離身而不顧古今一揆成敗同埶願陛下遠覽強秦之傾近察哀平之變得失昭然禍福可見甫以濟夷厲之荒竊見故冀州刺史南陽朱穆前烏桓校尉臣同郡李膺皆履正清平貞高絕俗穆前在冀州奉憲操平摧破姦黨掃清萬里膺歷典牧守正身率下及掌戎馬威揚朔北斯實中興之良佐國家之柱臣也宜還本朝挾輔王室上齊七燿下鎮萬國臣敢吐不時之義於諱言之朝猶冰霜見日必至消滅臣始悲天下之可悲今天下亦悲臣之愚惑也時有上書言人以貨輕錢薄故致貧困宜改鑄大錢事下四府羣僚及太學能言之士陶上議曰聖王承天制物與人行止建功則衆悅其事興戎而師樂其旅是故靈臺有子來之人武旅有鳧藻之士皆舉合時宜動順人道也臣伏讀鑄錢之詔平輕重之議訪覃幽微不遺窮賤是以藿食之人謬延逮及觀象育物敬授民時使男不逋畝女不下機故君臣之道行王路之教通由是言之食者乃有國之所寶生民之至貴也竊見比年已來良苗盡於蝗螟之口杼柚空於公私之求所急朝夕之餐所患靡盬之事豈謂錢貨之厚薄銖兩之輕重哉就使當今沙礫化為南金瓦石變為和玉使百姓渴無所飲飢無所食雖皇羲之純德唐虞之文明猶不能以保蕭牆之內也蓋民可百年無貨不可一朝有飢故食為至急也議者不達農殖之本多言鑄冶之便或欲因緣行詐以賈國利國利將盡取者爭競造鑄之端於是乎生蓋萬人鑄之一人奪之猶不能給況今一人鑄之則萬人奪之乎雖以陰陽為炭萬物為銅役不食之民使不飢之士猶不能足無猒之求也夫欲民殷財阜要在止役禁奪則百姓不勞而足陛下聖德愍海內之憂戚傷天下之艱難欲鑄錢齊貨以救其敝此猶養魚沸鼎之中棲鳥烈火之上水木本魚鳥之所生也用之不時必至燋爛願陛下寬鍥薄之禁後冶鑄之議聽民庶之謠吟問路叟之所憂瞰三光之文耀視山河之分流天下之心國家大事粲然皆見無有遺惑者矣夫飢勞之聲甚於斯歌是以追悟匹婦吟魯之憂始於此乎見白駒之意屏營傍偟不能監寐伏念當今地廣而不得耕民衆而無所食羣小競進秉國之位鷹揚天下鳥烏鈔求飽吞肌及骨並噬無猒誠恐卒有役夫窮匠起於板築之閒投斤攘臂登高遠呼使愁怨之民嚮應雲合八方分崩中夏魚潰雖方尺之錢何能有救其危猶舉函牛之鼎絓纖枯之末詩人所以眷然顧之潸焉出涕者也後陶舉孝廉除順陽長縣多姦猾陶到官宣募吏民有氣力勇猛能以死易生者不拘亡命姦臧於是剽輕劒客之徒過晏等十餘人皆來應募陶責其先過要以後效使各結所厚少年得數百人皆嚴兵待命於是覆案姦軌所發若神以病免吏民思而歌之曰邑然不樂思我劉君何時復來安此下民陶明尚書春秋為之訓詁推三家尚書及古文是正文字七百餘事名曰中文尚書頃之拜侍御史靈帝宿聞其名數引納之時鉅鹿張角偽託大道妖惑小民陶與奉車都尉樂松議郎袁貢連名上疏言之曰聖王以天下耳目為視聽故能無不聞見今張角支黨不可勝計前司徒楊賜奏下詔書切勑州郡護送流民會賜去位不復捕錄唯會赦令而謀不解散四方私言云角等竊入京師覘視朝政鳥聲獸心私共鳴呼州郡忌諱不欲聞之但更相告語莫肯公文宜下明詔重募角等賞以國土有敢回避與之同罪帝殊不悟方詔陶次第春秋條例明年張角反亂海內鼎沸帝思陶言封中陵鄉侯三遷尚書令以所舉將為尚書難與齊列乞從散拜侍中以數切諫為權臣所憚徙為京兆尹到職當出脩宮錢直千萬陶既清貧而恥以錢買職稱疾不聽政帝宿重陶才原其罪徵拜諫議大夫是時天下日危寇賊方熾陶憂致崩亂復上疏曰臣聞事之急者不能安言心之痛者不能緩聲竊見天下前遇張角之亂後遭邊章之寇每聞羽書告急之聲心灼內熱四體驚竦今西羌逆類私署將帥皆多段熲時吏曉習戰陳識知山川變詐萬端臣常懼其輕出河東馮翊鈔西軍之後東之函谷據高望今果已攻河東恐遂轉更豕突上京如是則南道斷絕車騎之軍孤立關東破膽四方動搖威之不來叫之不應雖有田單陳平之策計無所用臣前驛馬上便宜急絕諸郡賦調冀尚可安事付主者留連至今莫肯求問今三郡之民皆以奔亡南出武關北徙壺谷冰解風散唯恐在後今其存者尚十三四軍吏士民悲愁相守民有百走退死之心而無一前鬬生之計西寇浸前去營咫尺胡騎分布已至諸陵將軍張溫天性精勇而主者旦夕迫促軍無後殿假令失利其敗不救臣自知言數見厭而言不自裁者以為國安則臣蒙其慶國危則臣亦先亡也謹復陳當今要急八事乞須臾之閒深垂納省其八事大較言天下大亂皆由宦官宦官事急共讒陶曰前張角事發詔書示以威恩自此以來各各改悔今者四方安靜而陶疾害聖政專言妖孼州郡不上陶何緣知疑陶與賊通情於是收陶下黃門北寺獄掠按日急陶自知必死對使者曰朝廷前封臣云何今反受邪譖恨不與伊呂同疇而以三仁為輩遂閉氣而死天下莫不痛之陶著書數十萬言又作七曜論匡老子反韓非復孟軻及上書言當世便事條教賦奏書記辯疑凡百餘篇時司徒東海陳耽亦以非罪與陶俱死耽以忠正稱歷位三司光和五年詔公卿以謠言舉刺史二千石為民蠹害者時太尉許戫司空張濟承望內官受取貨賂其宦者子弟賓客雖貪汙穢濁皆不敢問而虛糺邊遠小郡清脩有惠化者二十六人吏人詣闕陳訴耽與議郎曹操上言公卿所舉率黨其私所謂放鴟梟而囚鸞鳳其言忠切帝以讓戫濟由是諸坐謠言徵者悉拜議郎宦官怨之遂誣陷耽死獄中李雲字行祖甘陵人也性好學善陰陽初舉孝廉再遷白馬令桓帝延熹二年誅大將軍梁冀而中常侍單超等五人皆以誅冀功並封列侯專權選舉又立掖庭民女亳氏為皇后數月閒后家封者四人賞賜巨萬是時地數震裂衆災頻降雲素剛憂國將危心不能忍乃露布上書移副三府曰臣聞皇后天下母德配坤靈得其人則五氏來備不得其人則地動搖宮比年災異可謂多矣皇天之戒可謂至矣高祖受命至今三百六十四歲君期一周當有黃精代見姓陳項虞田許氏不可令此人居太尉太傅典兵之官舉厝至重不可不慎班功行賞宜應其實梁冀雖持權專虐流天下今以罪行誅猶召家臣搤殺之耳而猥封謀臣萬戶以上高祖聞之得無見非西北列將得無解體孔子曰帝者諦也今官位錯亂小人諂進財貨公行政化日損尺一拜用不經御省是帝欲不諦乎帝得奏震怒下有司逮雲詔尚書都護劒戟送黃門北寺獄使中常侍管霸與御史廷尉雜考之時弘農五官掾杜衆傷雲以忠諫獲罪上書願與雲同日死帝愈怒遂并下廷尉大鴻臚陳蕃上疏救雲曰李雲所言雖不識禁忌干上逆旨其意歸於忠國而已昔高祖忍周昌不諱之諫成帝赦朱雲領之誅今日殺雲臣恐剖心之譏復議於世矣故敢觸龍鱗冒昧以請太常楊秉洛陽市長沐茂郎中上官資並上疏請雲帝恚甚有司奏以為大不敬詔切責蕃秉免歸田里茂資貶秩二等時帝在濯龍池管霸奏雲等事霸跪詭言曰李雲野澤愚儒杜衆郡中小吏出於狂戇不足加罪帝謂霸曰帝欲不諦是何等語而常侍欲原之邪顧使小黃門可其奏雲衆皆死獄中後冀州刺史賈琮使行部過祠雲墓刻石表之論曰禮有五諫諷為上若夫託物見情因文載旨使言之者無罪聞之者足以自戒貴在於意達言從理歸乎正曷其絞訐摩上以衒沽成名哉李雲草茅之生不識失身之義遂乃露布帝者班檄三公至於誅死而不顧斯豈古之狂也夫未信而諫則以為謗己故說者識其難焉劉瑜字季節廣陵人也高祖父廣陵靖王父辯清河太守瑜少好經學尤善圖讖天文歷筭之術州郡禮請不就延熹八年太尉楊秉舉賢良方正及到京師上書陳事曰臣瑜自念東國鄙陋得以豐沛枝胤被蒙復除不給卒伍故太尉楊秉知臣竊闚典籍猥見顯舉誠冀臣愚直有補萬一而秉忠謨不遂命先朝露臣在下土聽聞歌謠驕臣虐政之事遠近呼嗟之音竊為辛楚泣血漣如幸得引錄備荅聖問泄寫至情不敢庸回誠願陛下且以須臾之慮覽今往之事人何為咨嗟天曷為動變競立胤嗣繼體傳爵或乞子疎屬或買兒市道殆乖開國承家之義皆當盛其玩飾食空宮勞散精神生長六疾此國之費也生之傷也且天地之性陰陽正紀隔絕其道則水旱為并詩云五日為期六日不詹怨曠作歌仲尼所錄況從幼至長幽藏歿身又常侍黃門亦廣妻娶怨毒之氣結成妖眚行路之言官發略人女取而復置轉相驚懼孰不悉然無緣空生此謗鄒衍匹夫嵵氏匹婦尚有城崩霜隕之異況乃羣輩咨怨能無感乎嚴刑威以法正法民無罪而覆入之民有田而覆奪之州郡官府各自考事姦情賕賂皆為吏餌民悉鬱結起入賊黨官輒興兵誅討其罪貧困之民或有賣其首級以要酬賞父兄相代殘身妻孥相見視分裂窮之如彼伐之如此豈不痛哉灼道路因此暴縱無所不容今三公在位皆博達道蓺而各正諸己莫或匡益者非不智也畏死罰也惟陛下設置七臣以廣諫道及開東序金縢史官之書從堯舜禹湯文武致興之道遠佞邪之人放鄭衞之聲則政致和平德感祥風矣臣悾悾推情言不足採懼以觸忤征營慴悸及帝崩大將軍竇武欲大誅宦官乃引瑜為侍中又以侍中尹勳為尚書令共同謀畫及武敗瑜勳並被誅事在武傳勳字伯元河南人從祖睦為太尉睦孫頌為司徒勳為人剛毅直方少時每讀書得忠臣義士之事未嘗不投書而仰歎自以行不合於當時不應州郡公府禮命桓帝時以有道徵四遷尚書令延熹中誅大將軍梁冀帝召勳部分衆職甚有方略封宜陽鄉侯僕射霍諝尚書張敬歐陽參李偉虞放周永並封亭侯勳後再遷至九卿以病免拜為侍中八年中常侍具瑗左悺等有罪免奪封邑因黜勳等爵瑜誅後宦官悉焚其上書以為訛言子琬傳瑜學明占候能著災異舉方正不行謝弼字輔宣東郡武陽人也中直方正為鄉邑所宗師建寧二年詔舉有道之士弼與東海陳敦玄菟公孫度俱對策皆除郎中時青蛇見前殿大風拔木詔公卿以下陳得失弼上封事曰臣聞和氣應於有德妖異生乎失政上天告譴則王者思其愆政道或虧則姦臣當其罰夫蛇者陰氣所生鱗者甲兵之符也鴻範傳曰厥極弱時則有蛇龍之孼又熒惑守亢裴回不去法有近臣謀亂發於左右不知陛下所與從容帷幄之內親信者為誰宜急斥黜以消天戒臣又聞惟虺惟蛇女子之祥伏惟皇太后定策宮闥援立聖明書云父子兄弟罪不相及竇氏之誅豈宜咎延太后幽隔空宮愁感天心如有霧露之疾陛下當何面目以見天下昔周襄王不能敬事其母戎狄遂至交侵孝和皇帝不絕竇后之恩前世以為美談禮為人後者為之子今以桓帝為父豈得不以太后為母哉援神契曰天子行孝四夷和平方今邊境日蹙兵革蜂起自非孝道何以濟之願陛下仰慕有虞蒸蒸之化俯思凱風慰母之念母寵私乃享大封大風雨雹亦由於茲又故太傅陳蕃輔相陛下勤身王室夙夜匪懈而見陷羣邪一旦誅滅其為酷濫駭動天下而門生故吏並離徙錮蕃身已往人百何贖宜還其家屬解除禁網夫台宰重器國命所繼今之四公唯司空劉寵斷斷守善餘皆素餐致寇之人必有折足覆餗之凶可因災異並加罷黜徵故司空王暢長樂少府李膺並居政事庶災變可消國祚惟永臣山藪頑闇未達國典策曰無有所隱敢不盡愚用忘諱忌伏惟陛下裁其誅罰中常侍曹節從子紹為東郡太守忿疾於弼遂以它罪收考掠按死獄中時人悼傷焉初平二年司隸校尉趙謙訟弼忠節求報其怨魂乃收紹斬之贊曰鄧不明辟梁不損陵慊慊欒杜諷辭以興黃寇方熾子奇有識武謀允臧瑜亦協志弼忤宦情雲犯時忌成仁喪己同方殊事
