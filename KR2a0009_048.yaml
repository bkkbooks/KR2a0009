body:
  text: 後漢書卷四十三朱樂何列傳第三十三朱暉孫穆朱暉字文季南陽宛人也家世衣冠暉早孤有氣決年十三王莽敗天下亂與外氏家屬從田閒奔入宛城道遇羣賊白刃劫諸婦女略奪衣物昆弟賓客皆惶迫伏地莫敢動暉拔劒前曰財物皆可取耳諸母衣不可得今日朱暉死日也賊見其小壯其志笑曰童子內刀遂捨之而去初光武與暉父岑俱學長安有舊故及即位求問岑時已卒乃召暉拜為郎暉尋以病去卒業於太學性矜嚴進止必以禮諸儒稱其高永平初顯宗舅新陽侯陰就慕暉賢自往候之暉避不見復遣家丞致禮暉遂閉門不受就聞歎曰志士也勿奪其節後為郡吏太守阮況嘗欲市暉牛婢暉不從及況卒暉乃厚贈送其家人或譏焉暉曰前阮府君有求於我所以不敢聞命誠恐以財貨樜君今而相送明吾非有愛也驃騎將軍東平王蒼聞而辟之甚禮敬焉正月朔旦蒼當入賀故事少府給璧是時陰就為府卿貴驕吏不奉法蒼坐朝堂漏且盡而求璧不可得顧謂掾屬曰若之何暉望見少府主簿持璧即往紿之曰我數聞璧未嘗見試請觀之主簿以授暉暉顧召令史奉之主簿大驚遽以白就就曰朱掾義士勿復求更以它璧朝蒼既罷召暉謂曰屬者掾自視孰與藺相如帝聞壯之及當幸長安欲嚴宿衛故以暉為衛士令再遷臨淮太守暉好節概有所拔用皆厲行士其諸報怨以義犯率皆為求其理多得生濟其不義之囚即時僵仆吏人畏愛為之歌曰彊直自遂南陽朱季吏畏其威人懷其惠數年坐法免暉剛於為吏見忌於上所在多被劾自去臨淮屏居野澤布衣蔬食不與邑里通鄉黨譏其介建初中南陽大飢米石千餘暉盡散其家資以分宗里故舊之貧羸者鄉族皆歸焉初暉同縣張堪素有名稱嘗於太學見暉甚重之接以友道乃把暉臂曰欲以妻子託朱生暉以堪先達舉手未敢對自後不復相見堪卒暉聞其妻子貧困乃自往候視厚賑贍之暉少子頡怪而問曰大人不與堪為友平生未曾相聞子孫竊怪之暉曰堪嘗有知己之言吾以信於心也暉又與同郡陳揖交善揖早卒有遺腹子友暉常哀之及司徒桓虞為南陽太守召暉子駢為吏暉辭駢而薦友虞嘆息遂召之其義烈若此元和中肅宗巡狩告南陽太守問暉起居召拜為尚書僕射歲中遷太山太守暉上疏乞留中詔許之因上便宜陳密事深見嘉納詔報曰補公家之闕不纍清白之素斯善美之士也俗吏苟合阿意面從進無謇謇之志卻無退思之念患之甚久惟今所言適我願也生其勉之是時穀貴縣官經用不足朝廷憂之尚書張林上言穀所以貴由錢賤故也可盡封錢一取布帛為租以通天下之用又鹽食之急者雖貴人不得不須官可自𡞰又宜因交址益州上計吏往來市珍寶收采其利武帝時所謂均輸者也於是詔諸尚書通議暉奏據林言不可施行事遂寢後陳事者復重述林前議以為於國誠便帝然之有詔施行暉復獨奏曰王制天子不言有無諸侯不言多少祿食之家不與百姓爭利今均輸之法與賈販無異鹽利歸官則下人窮怨布帛為租則吏多姦盜誠非明主所當宜行帝卒以林等言為然得暉重議因發怒切責諸尚書暉等皆自繫獄三日詔敕出之曰國家樂聞駮議黃髮無愆詔書過耳何故自繫暉因稱病篤不肯復署議尚書令以下惶怖謂暉曰今臨得譴讓奈何稱病其禍不細暉曰行年八十蒙恩得在機密當以死報若心知不可而順旨雷同負臣子之義今耳目無所聞見伏待死命遂閉口不復言諸尚書不知所為乃共劾奏暉帝意解寢其事後數日詔使直事郎問暉起居太醫視疾太官賜食暉乃起謝復賜錢十萬布百匹衣十領後遷為尚書令以老病乞身拜騎都尉賜錢二十萬和帝即位竇憲北征胸奴暉復上疏諫頃之病卒子頡修儒術安帝時至陳相頡子穆穆字公叔年五歲便有孝稱父母有病輒不飲食差乃復常及壯耽學鋭意講誦或時思至不自知亡失衣冠顛隊坑岸其父常以為專愚幾不知數馬足穆愈更精篤初舉孝廉順帝末江淮盜賊羣起州郡不能禁或說大將軍梁冀曰朱公叔兼資文武海內奇士若以為謀主賊不足平也冀亦素聞穆名乃辟之使典兵事甚見親任及桓帝即位順烈太后臨朝穆以冀藝地親重望有以扶持王室因推災異奏記以勸戒冀曰穆伏念明年丁亥之歲刑德合於乾位易經龍戰之會其文曰龍戰于野其道窮也謂陽道將勝而陰道負也今年九月天氣鬱冒五位四候連失正氣此互相明也夫善道屬陽惡道屬陰若修正守陽摧折惡類則福從之矣穆每事不逮所好唯學傳受於師時有可試願將軍少察愚言申納諸儒而親其忠正絶其姑息專心公朝割除私欲廣求賢能斥遠佞惡夫人君不可不學當以天地順道漸漬其心宜為皇帝選置師傅及侍講者得小心忠篤敦禮之士將軍與之俱入參勸講授師賢法古此猶倚南山坐平原也誰能傾之今年夏月暈房星明年當有小厄宜急誅姦臣為天下所怨毒者以塞災咎議郎大夫之位本以式序儒術高行之士今多非其人九卿之中亦有乖其任者惟將軍察焉又薦种皓欒巴等而明年嚴鮪謀立清河王蒜又黃龍二見沛國冀無術學遂以穆龍戰之言為應於是請皓為從事中郎薦巴為議郎舉穆高第為侍御史時同郡趙康叔盛者隱于武當山清靜不仕以經傳教授穆時年五十乃奉書稱弟子及康歿喪之如師其尊德重道為當時所服常感時澆薄慕尚敦篤乃作崇厚論其辭曰夫俗之薄也有自來矣故仲尼歎曰大道之行也而丘不與焉蓋傷之也夫道者以天下為一在彼猶在己也故行違於道則愧生於心非畏義也事違於理則負結于意非憚禮也故率性而行謂之道得其天性謂之德德性失然後貴仁義是以仁義起而道德遷禮法興而淳朴散故道德以仁義為薄淳朴以禮法為賊也夫中世之所敦已為上世之所薄況又薄於此乎昔在仲尼不失舊於原壤楚嚴不忍章於絶纓由此觀之聖賢之德敦矣老氏之經曰大丈夫處其厚不處其薄居其實不居其華故去彼取此夫時有薄而厚施行有失而惠用故覆人之過者敦之道也救人之失者厚之行也往者馬援深昭此道可以為德誡其兄子曰吾欲汝曹聞人之過如聞父母之名耳可得聞口不得言斯言要矣遠則聖賢履之上世近則丙吉張子孺行之漢廷故能振英聲於百世播不滅之遺風不亦美哉其善悠悠者皆是其可稱乎凡此之類豈徒乖為君子之道哉將有危身纍家之禍焉悲夫行之者不知憂其然故害興而莫之及也斯既然矣又有異焉人皆見之而不能自遷何則務進者趨前而不顧後榮貴者矜己而不待人智不接愚富不賑貧貞士孤而不恤賢者厄而不存故田蚡以尊顯致安國之金淳于以貴藝引方進之言夫以韓翟之操為漢之名宰然猶不能振一貧賢薦一孤士又況其下者乎此禽息史魚所以專名於前而莫繼於後者也故時敦俗美則小人守正利不能誘也時否俗薄雖君子為邪義不能止也何則先進者既往而不反後來者復習俗而追之是以虛華盛而忠信微刻薄稠而純篤稀斯蓋谷風有棄豫之歎伐木有鳥鳴之悲矣二宰之失度美韓稜之抗正貴丙張之弘裕賤時俗之誹謗則道豐績盛名顯身榮載不刊之德播不滅之聲然後知薄者之不足厚者之有餘也彼與草木俱朽此與金石相傾豈得同年而語並日而談哉穆又著絶交論亦矯時之作梁冀驕暴不悛朝野嗟毒穆以故吏懼其釁積招禍復奏記諫曰古之明君必有輔德之臣規諫之官下至器物銘書成敗以防遺失故君有正道臣有正路從之如升堂違之如赴壑今明將軍地有申伯之尊位為羣公之首一日行善天下歸仁終朝為惡四海傾覆頃者官人俱匱加以水蟲為害京師諸官費用增多詔書發調或至十倍各言官無見財皆當出民搒掠割剝彊令充足公賦既重私斂又深牧守長吏多非德選貪聚無猒遇人如虜或絶命於箠楚之下或自賊於迫切之求又掠奪百姓皆託之尊府遂令將軍結怨天下吏人酸毒道路歎嗟昔秦政煩苛百姓土崩陳勝奮臂一呼天下鼎沸而面諛之臣猶言安耳諱惡不悛卒至亡滅昔永和之末綱紀少薥頗失人望四五歲耳而財空戶散下有離心馬免之徒乘敝而起荊揚之閒幾成大患幸賴順烈皇后初政清靜內外同力僅乃討定今百姓戚戚困於永和內非仁愛之心可得容忍外非守國之計所宜久安也夫將相大臣均體元首共輿而馳同舟而濟輿傾舟覆患實共之豈可以去明即昧履危自安主孤時困而莫之恤乎宜時易宰守非其人者減省第宅園池之費拒絶郡國諸所奉送內以自明外解人惑使挾姦之吏無所依託司察之臣得盡耳目憲度既張遠邇清一則將軍身尊事顯德耀無窮天道明察無言不信惟垂省覽冀不納而縱放日滋遂復賂遺左右交通宦者任其子弟賓客以為州郡要職穆又奏記極諫冀終不悟報書云如此僕亦無一可邪穆言雖切然亦不甚罪也永興元年河溢漂害人庶數十萬戶百姓荒饉流移道路冀州盜賊尤多故擢穆為冀州刺史州人有宦者三人為中常侍並以檄謁穆穆疾之辭不相見冀部令長聞穆濟河解印綬去者四十餘人及到奏劾諸郡至有自殺者以威略權宜盡誅賊渠帥舉劾權貴或乃死獄中有宦者趙忠喪父歸葬安平僭為璵璠玉匣偶人穆聞之下郡案驗吏畏其嚴明遂發墓剖棺陳尸出之而收其家屬帝聞大怒徵穆詣廷尉輸作左校太學書生劉陶等數千人詣闕上書訟穆曰伏見施刑徒朱穆處公憂國拜州之日志清姦惡誠以常侍貴寵父兄子弟布在州郡競為虎狼噬食小人故穆張理天網補綴漏目羅取殘禍以塞天意由是內官咸共恚疾謗讟煩興讒隙仍作極其刑謫輸作左校天下有識皆以穆同勤禹稷而被共鯀之戾若死者有知則唐帝怒於崇山重華忿於蒼墓矣當今中官近習竊持國柄手握王爵口含天憲運賞則使餓隸富於季孫呼吸則令伊顏化為桀跖而穆獨亢然不顧身害非惡榮而好辱惡生而好死也徒感王綱之不攝懼天網之久失故竭心懷憂為上深計臣願黥首繫趾代穆校作帝覽其奏乃赦之穆居家數年在朝諸公多有相推薦者於是徵拜尚書穆既深疾宦官及在臺閣旦夕共事志欲除之乃上疏曰案漢故事中常侍參選士人建武以後乃悉用宦者自延平以來浸益貴盛假貂璫之飾處常伯之任天朝政事一更其手灌傾海內寵貴無極子弟親戚並荷榮任故放濫驕溢莫能禁禦凶狡無行之徒媚以求官恃藝怙寵之輩漁食百姓窮破天下空竭小人愚臣以為可悉罷省遵復往初率由舊章更選海內清淳之士明達國體者以補其處即陛下可為堯舜之君衆僚皆為稷契之臣兆庶黎萌蒙被聖化矣帝不納後穆因進見口復陳曰臣聞漢家舊典置侍中中常侍各一人省尚書事黃門侍郎一人傳發書奏皆用姓族自和熹太后以女主稱制不接公卿乃以閹人為常侍小黃門通命兩宮自此以來權傾人主窮困天下宜皆罷遣博選耆儒宿德與參政事帝怒不應穆伏不肯起左右傳出良久乃趨而去自此中官數因事稱詔詆毀之穆素剛不得意居無幾憤悶發疽延熹六年卒時年六十四祿仕數十年蔬食布衣家無餘財公卿共表穆立節忠清虔恭機密守死善道宜蒙旌寵策詔褒述追贈益州太守所著論策奏教書詩記嘲凡二十篇穆前在冀州所辟用皆清德長者多至公卿州郡子野少有名節仕至河南尹初穆父卒穆與諸儒考依古義諡曰貞宣先生及穆卒蔡雍復與門人共述其體行諡為文忠先生論曰朱穆見比周傷義偏黨毀俗志抑朋游之私遂著絶交之論蔡雍以為穆貞而孤又作正交而廣其致焉蓋孔子稱上交不諂下交不黷又曰晏平仲善與人交子夏之門人亦問交於子張故易明斷金之義詩載宴朋之謠若夫文會輔仁直諒多聞之友時濟其益紵衣傾蓋彈冠結綬之夫遂隆其好斯固交者之方焉至乃田竇衛霍之游客廉頗翟公之門賓進由藝合退因衰異又專諸荊卿之感激侯生豫子之投身情為恩使命緣義輕皆以利害移心懷德成節非夫交照之本未可語失得之原也穆徒以友分少全因絶同志之求黨俠生敝而忘得朋之義蔡氏貞孤之言其為然也古之善交者詳矣漢興稱王陽貢禹陳遵張竦中世有廉范慶鴻陳重靁義云樂恢字伯奇京兆長陵人也父親為縣吏得罪於令收將殺之恢年十一常俯伏寺門晝夜號泣令聞而矜之即解出親恢長好經學事博士焦永永為河東太守恢隨之官閉廬精誦不交人物後永以事被考諸弟子皆以通關被繫恢獨皎曒然不樜於法遂篤志為名儒性廉直介立行不合己者雖貴不與交信陽侯陰就數致禮請恢恢絶不答後仕本郡吏太守坐法誅故人莫敢往恢獨奔喪行服坐以抵罪歸復為功曹選舉不阿請託無所容同郡楊政數衆毀恢後舉政子為孝廉由是鄉里歸之辟司空牟融府會蜀郡太守第五倫代融為司空恢以與倫同郡不肯留薦潁川杜安而退諸公多其行連辟之遂皆不應後徵拜議郎會車騎將軍竇憲出征胸奴恢數上書諫爭朝廷稱其忠入為尚書僕射是時河南尹王調洛陽令李阜與竇憲厚善縱舍自由恢劾奏調阜并及司隸校尉諸所刺舉無所回避貴戚惡之憲弟夏陽侯瓌欲往候恢恢謝不與通憲兄弟放縱而忿其不附己妻每諫恢曰昔人有容身避害何必以言取怨恢歎曰吾何忍素餐立人之朝乎遂上疏諫曰臣聞百王之失皆由權移於下大臣持國常以藝盛為咎伏念先帝聖德未永早棄萬國陛下富於春秋纂承大業諸舅不宜幹正王室以示天下之私經曰天地乖互衆物夭傷君臣失序萬人受殃政失不救其極不測方今之宜上以義自割下以謙自引四舅可長保爵土之榮皇太后永無慙負宗廟之憂誠策之上者也書奏不省時竇太后臨朝和帝未親萬機恢以意不得行乃稱疾乞骸骨詔賜錢太醫視疾恢薦任城郭均成陽高鳳而遂稱篤拜騎都尉上書辭謝曰仍受厚恩無以報效夫政在大夫孔子所疾世卿持權春秋以戒聖人懇惻不虛言也近世外戚富貴必有驕溢之敗今陛下思慕山陵未遑政事諸舅寵盛權行四方若不能自損誅罰必加臣壽命垂盡臨死竭愚惟蒙留神詔聽上印綬乃歸鄉里竇憲因是風厲州郡迫脅恢遂飲藥死弟子縗絰挽者數百人衆庶痛傷之後竇氏誅帝始親事恢門生何融等上書陳恢忠節除子己為郎中何敞字文高扶風平陵人也其先家于汝陰六世祖比干學尚書於朝錯武帝時為廷尉正與張湯同時湯持法深而比干務仁恕數與湯爭雖不能盡得然所濟活者以千數後遷丹楊陽都尉因徙居平陵敞父寵建武中為千乘都尉以病免遂隱居不仕敞性公正自以趣舍不合時務每請召常稱疾不應元和中辟太尉宋由府由待以殊禮敞論議高常引大體多所匡正司徒袁安亦深敬重之是時京師及四方纍有奇異鳥獸草木言事者以為祥瑞敞通經傳能為天官意甚惡之乃言於二公曰夫瑞應依德而至災異緣政而生故鸜鵒來巢昭公有乾侯之厄西狩獲麟孔子有兩楹之殯海鳥避風臧文祀之君子譏焉今異鳥翔於殿屋怪草生於庭際不可不察由安懼然不敢答居無何而肅宗崩時竇氏專政外戚奢侈賞賜過制倉帑為虛敞奏記由曰敞聞事君之義進思盡忠退思補過歷觀世主時臣無不各欲為化垂之無窮然而平和之政萬無一者蓋以聖主賢臣不能相遭故也今國家秉聰明之弘道明公履晏晏之純德君臣相合天下翕然治平之化有望於今孔子曰如有用我者三年有成今明公視事出入再朞宜當克己以酬四海之心禮一穀不升則損服徹膳天下不足若己使然而比年水旱人不收穫涼州緣邊家被凶害男子疲於戰陳妻女勞於轉運老幼孤寡歎息相依又中州內郡公私屈竭此實損膳節用之時國恩覆載賞賚過度但聞臘賜自郎官以上公卿王侯以下至於空竭帑藏損耗國資尋公家之用皆百姓之力明君賜賚宜有品制忠臣受賞亦應有度是以夏禹玄圭周公束帛今明公位尊任重責深負大上當匡正綱紀下當濟安元元豈但空空無違而已哉宜先正己以率羣下還所得賜因陳得失奏王侯就國除苑囿之禁節省浮費賑恤窮孤則恩澤下暢黎庶悅豫上天聰明必有立應使百姓歌誦史官紀德豈但子文逃祿公儀退食之比哉由不能用時齊殤王子都鄉侯暢奔弔國憂上書未報侍中竇憲遂令人刺殺暢於城門屯衛之中而主名不立敞又說由曰劉暢宗室肺府茅土藩臣來弔大憂上書須報親在武衛致此殘酷奉憲之吏莫適討捕蹤迹不顯主名不立敞備數股肱職典賊曹故欲親至發所以糾其變而二府以為故事三公不與賊盜昔陳平生於征戰之世猶知宰相之分云外鎮四夷內撫諸侯使卿大夫各得其宜今二府執事不深惟大義惑於所聞公縱姦慝莫以為咎惟明公運獨見之明昭然勿疑敞不勝所見請獨奏案由乃許焉二府聞敞行皆遣主者隨之於是推舉具得事實京師稱其正以高第拜侍御史時遂以竇憲為車騎將軍大發軍擊胸奴而詔使者為憲弟篤景並起邸第興造勞役百姓愁苦敞上疏諫曰臣聞胸奴之為桀逆久矣平城之圍嫚書之恥此二辱者臣子所為捐軀而必死高祖呂后忍怒還忿舍而不誅伏惟皇太后秉文母之操陛下履晏晏之姿胸奴無逆節之罪漢朝無可慙之恥而盛春東作興動大役元元怨恨咸懷不悅而猥復為衛尉篤奉車都尉景繕修館第彌街絶里臣雖斗筲之人誠竊懷怪以為篤景親近貴臣當為百僚表儀今衆軍在道朝廷焦脣百姓愁苦縣官無用而遽起大第崇飾玩好非所以垂令德示無窮也宜且罷工匠專憂北邊恤人之困書奏不省後拜為尚書復上封事曰夫忠臣憂世犯主嚴顏譏刺貴臣至以殺身滅家而猶為之者何邪君臣義重有不得已也臣伏見往事國之危亂家之將凶皆有所由較然易知昔鄭武姜之幸叔段衛莊公之寵州吁愛而不教終至凶戾由是觀之愛子若此猶飢而食之以毒適所以害之也伏見大將軍憲始遭大憂公卿比奏欲令典幹國事憲深執謙退固辭盛位懇懇勤勤言之深至天下聞之莫不悅喜今踰年無幾大禮未終卒然中改兄弟專朝憲秉三軍之重篤景總宮衛之權而虐用百姓奢侈僭逼誅戮無罪肆心自快今者論議凶凶咸謂叔段州吁復生於漢臣觀公卿懷持兩端不肯極言者以為憲等若有匪懈之志則己受吉甫褒申伯之功如憲等陷於罪辜則自取陳平周勃順呂后之權終不以憲等吉凶為憂也臣敞區區誠欲計策兩安絶其綿綿塞其涓涓上不欲令皇太后損文母之號陛下有誓泉之譏下使憲等得長保其福祐然臧獲之謀上安主父下存主母猶不免於嚴怒臣伏惟纍祖蒙恩至臣八世復以愚陋旬年之閒歷顯位備機近每念厚德忽然忘生雖知言必夷滅而冒死自盡者誠不忍目見其禍而懷默苟全駙馬都尉瓌雖在弱冠有不隱之忠比請退身願抑家權可與參謀聽順其意誠宗廟至計竇氏之福敞數切諫言諸竇罪過憲等深怨之時濟南王康尊貴驕甚憲乃白出敞為濟南太傅敞至國輔康以道義數引法度諫正之康敬禮焉歲餘遷汝南太守敞疾文俗吏以苛刻求當時名譽故在職以寬和為政立春日常召督郵還府分遣儒術大吏案行屬縣顯孝悌有義行者及舉冤獄以春秋義斷之是以郡中無怨聲百姓化其恩禮其出居者皆歸養其父母追行喪服推財相讓者二百許人置立禮官不任文吏又修理鮦陽舊渠百姓賴其利墾田增三萬餘頃吏人共刻石頌敞功德及竇氏敗有司奏敞子與夏陽侯瓌厚善坐免官永元十二年復徵三遷五官中郎將常忿疾中常侍蔡倫倫深憾之元興元年敞以祠廟嚴肅微疾不齊後鄧皇后上太傅禹冢敞起隨百官會倫因奏敞詐病坐抵罪卒于家論曰永元之際天子幼弱太后臨朝竇氏憑盛戚之權將有呂霍之變幸漢德未衰大臣方忠袁任二公正色立朝樂何之徒抗議柱下故能挾幼主之斷勦姦回之逼不然國家危矣夫竇氏之閒唯何敞可以免而特以子失交之故廢黜不顯大位惜乎過矣哉贊曰朱生受寄誠不愆義公叔辟梁允納明刺絶交面朋崇厚浮僞恢舉謗己敞非祥瑞永言國逼甘心彊詖
