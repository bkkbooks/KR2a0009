body:
  text: 後漢書卷八十八西域傳第七十八武帝時西域內屬有三十六國漢為置使者校尉領護之宣帝改曰都護元帝又置戊己二校尉屯田於車師前王庭哀平閒自相分割為五十五國王莽篡位貶易侯王由是西域怨叛與中國遂絶並復役屬胸奴胸奴斂稅重刻諸國不堪命建武中皆遣使求內屬願請都護光武以天下初定未遑外事竟不許之會胸奴衰弱莎車王賢誅滅諸國賢死之後遂更相攻伐小宛精絶戎廬且末為鄯善所并渠勒皮山為于填所統悉有其地郁立單桓孤胡烏貪訾離為車師所滅後其國並復立永平中北虜乃脅諸國共寇河西郡縣城門晝閉十六年明帝乃命將帥北征胸奴取伊吾盧地置宜禾都尉以屯田遂通西域于填諸國皆遣子入侍西域自絶六十五載乃復通焉明年始置都護戊己校尉及明帝崩焉耆龜茲攻沒都護陳睦悉覆其衆胸奴車師圍戊己校尉建初元年春酒泉太守段彭大破車師於交河城章帝不欲疲敝中國以事夷狄乃迎還戊己校尉不復遣都護二年復罷屯田伊吾胸奴因遣兵守伊吾地時軍司馬班超留于填綏集諸國和帝永元元年大將軍竇憲大破胸奴二年憲因遣副校尉閻槃將二千餘騎掩擊伊吾破之三年班超遂定西域因以超為都護居龜茲復置戊己校尉領兵五百人居車師前部高昌壁又置戊部候居車師後部候城相去五百里六年班超復擊破焉耆於是五十餘國悉納質內屬其條支安息諸國至于海瀕四萬里外皆重譯貢獻九年班超遣掾甘英窮臨西海而還皆前世所不至山經所未詳莫不備其風土傳其珍怪焉於是遠國蒙奇兜勒皆來歸服遣使貢獻及孝和晏駕西域背畔安帝永初元年頻攻圍都護任尚段禧等朝廷以其險遠難相應赴詔罷都護自此遂𠫓廾西域北胸奴即復收屬諸國共為邊寇十餘歲敦煌太守曹宗患其暴害元初六年乃上遣行長史索班將千餘人屯伊吾以招撫之於是車師前王及鄯善王來降數月北胸奴復率車師後部王共攻沒班等遂擊走其前王鄯善逼急求救於曹宗宗因此請出兵擊胸奴報索班之恥復欲進取西域鄧太后不許但令置護西域副校尉居敦煌復部營兵三百人羈縻而已其後北虜連與車師入寇河西朝廷不能禁議者因欲閉玉門陽關以絶其患延光二年敦煌太守張璫上書陳三策以為北虜呼衍王常展轉蒲類秦海之閒專制西域共為寇鈔今以酒泉屬國吏士二千餘人集昆侖塞先擊呼衍王絶其根本因發鄯善兵五千人脅車師後部此上計也若不能出兵可置軍司馬將士五百人四郡供其犂牛穀食出據柳中此中計也如又不能則宜𠫓廾交河城收鄯善等悉使入塞此下計也朝廷下其議尚書陳忠上疏曰臣聞八蠻之寇莫甚北虜漢興高祖窘平城之圍太宗屈供奉之恥故孝武憤怒深惟久長之計命遣虎臣浮河絶漠窮破虜庭當斯之役黔首隕於狼望之北財幣縻於盧山之壑府庫單竭杼柚空虛算至舟車資及六畜夫豈不懷慮久故也遂開河西四郡以隔絶南羌收三十六國斷胸奴右臂是以單于孤特鼠竄遠藏至於宣元之世遂備蕃臣關徼不閉羽檄不行由此察之戎狄可以威服難以化狎西域內附日久區區東望扣關者數矣此其不樂胸奴慕漢之效也今北虜已破車師藝必南攻鄯善𠫓廾而不救則諸國從矣若然則虜財賄益增膽藝益殖威臨南羌與之交連如此河西四郡危矣河西既危不得不救則百倍之役興不訾之費發矣議者但念西域絶遠恤之煩費不見先世苦心勤勞之意也方今邊境守禦之具不精內郡武衛之備不修敦煌孤危遠來告急復不輔助內無以慰勞吏民外無以威示百蠻蹙國減土經有明誡臣以為敦煌宜置校尉案舊增四郡屯兵以西撫諸國庶足折衝萬里震怖胸奴帝納之乃以班勇為西域長史將薥刑士五百人西屯柳中勇遂破平車師自建武至于延光西域三絶三通順帝永建二年勇復擊降焉耆於是龜茲疏勒于填莎車等十七國皆來服從而烏孫葱領已西遂絶六年帝以伊吾舊膏腴之地傍近西域胸奴資之以為鈔暴復令開設屯田如永元時事置伊吾司馬一人自陽嘉以後朝威稍損諸國驕放轉相陵伐元嘉二年長史王敬為于填所沒永興元年車師後王復反攻屯營雖有降首曾莫懲革自此浸以疏慢矣班固記諸國風土人俗皆已詳備前書今撰建武以後其事異於先者以為西域傳皆安帝末班勇所記云西域內屬諸國東西六千餘里南北千餘里東極玉門陽關西至葱領其東北與胸奴烏孫相接南北有大山中央有河其南山東出金城與漢南山屬焉其河有兩源一出葱領東流一出于填南山下北流與葱領河合東注蒲昌海蒲昌海一名鹽澤去玉門三百餘里自敦煌西出玉門陽關涉鄯善北通伊吾千餘里自伊吾北通車師前部高昌壁千二百里自高昌壁北通後部金滿城五百里此其西域之門戶也故戊己校尉更互屯焉伊吾地宜五穀桑麻蒲萄其北又有柳中皆膏腴之地故漢常與胸奴爭車師伊吾以制西域焉自鄯善踰葱領出西諸國有兩道傍南山北陂河西行至莎車為南道南道西踰葱領則出大月氏安息之國也自車師前王庭隨北山陂河西行至疏勒為北道北道西踰葱領出大宛康居奄蔡焉耆出玉門經鄯善且末精絶三千餘里至拘彌拘彌國居寧彌城去長史所居柳中四千九百里去洛陽萬二千八百里領戶二千一百七十三口七千二百五十一勝兵千七百六十人順帝永建四年于填王放前殺拘彌王興自立其子為拘彌王而遣使者貢獻於漢敦煌太守徐由上求討之帝赦于填罪令歸拘彌國放前不肯陽嘉元年徐由遣疏勒王臣槃發二萬人擊于填破之斬首數百級放兵大掠更立興宗人成國為拘彌王而還至靈帝熹平四年于填王安國攻拘彌大破之殺其王死者甚衆戊己校尉西域長史各發兵輔立拘彌侍子定興為王時人衆裁有千口其國西接于填三百九十里于填國居西城去長史所居五千三百里去洛陽萬一千七百里領戶三萬二千口八萬三千勝兵三萬餘人建武末莎車王賢強盛攻并于填徙其王俞林為驪歸王明帝永平中于填將休莫霸反莎車自立為于填王休莫霸死兄子廣德立後遂滅莎車其國轉盛從精絶西北至疏勒十三國皆服從而鄯善王亦始強盛自是南道自葱領以東唯此二國為大順帝永建六年于填王放前遣侍子詣闕貢獻元嘉元年長史趙評在于填病癰死評子迎喪道經拘彌拘彌王成國與于填王建素有隙乃語評子云于填王令胡醫持毒藥著創中故致死耳評子信之還入塞以告敦煌太守馬達明年以王敬代為長史達令敬隱核其事敬先過拘彌成國復說云于填國人欲以我為王今可因此罪誅建于填必服矣敬貪立功名且受成國之說前到于填設供具請建而陰圖之或以敬謀告建建不信曰我無罪王長史何為欲殺我旦日建從官屬數十人詣敬坐定建起行酒敬叱左右執之吏士並無殺建意官屬悉得突走時成國主簿秦牧隨敬在會持刀出曰大事已定何為復疑即前斬建于填侯將輸僰等遂會兵攻敬敬持建頭上樓宣告曰天子使我誅建耳于填侯將遂焚營舍燒殺吏士上樓斬敬懸首於巿輸僰欲自立為王國人殺之而立建子安國焉馬達聞之欲將諸郡兵出塞擊于填桓帝不聽徵達還而以宋亮代為敦煌太守亮到開募于填令自斬輸僰時輸僰死已經月乃斷死人頭送敦煌而不言其狀亮後知其詐而竟不能出兵于填恃此遂驕自于填經皮山至西夜子合德若焉西夜國一名漂沙去洛陽萬四千四百里戶二千五百口萬餘勝兵三千人地生白草有毒國人煎以為藥傅箭鏃所中即死漢書中誤云西夜子合是一國今各自有王子合國居呼鞬谷去疏勒千里領戶三百五十口四千勝兵千人德若國領戶百餘口六百七十勝兵三百五十人東去長史居三千五百三十里去洛陽萬二千一百五十里與子合相接其俗皆同自皮山西南經烏秅涉懸度歷罽賓六十餘日行至烏弋山離國地方數千里時改名排持復西南馬行百餘日至條支條支國城在山上周回四十餘里臨西海海水曲環其南及東北三面路絶唯西北隅通陸道土地暑溼出師子犀牛封牛孔雀大雀大雀其卵如甕轉北而東復馬行六十餘日至安息後役屬條支為置大將監領諸小城焉安息國居和櫝城去洛陽二萬五千里北與康居接南與烏弋山離接地方數千里小城數百戶口勝兵最為殷盛其東界木鹿城號為小安息去洛陽二萬里章帝章和元年遣使獻師子符拔符拔形似麟而無角和帝永元九年都護班超遣甘英使大秦抵條支臨大海欲度而安息西界船人謂英曰海水廣大往來者逢善風三月乃得度若遇風亦有二歲者故入海人皆齎三歲糧海中善使人思土戀慕數有死亡者英聞之乃止十三年安息王滿屈復獻師子及條支大鳥時謂之安息雀自安息西行三千四百里至阿蠻國從阿蠻西行三千六百里至斯賓國從斯賓南行度河又西南至于羅國九百六十里安息西界極矣自此南乘海乃通大秦其土多海西珍奇異物焉大秦國一名犂鞬以在海西亦云海西國地方數千里有四百餘城小國役屬者數十以石為城郭列置郵亭皆堊塈之有松柏諸木百草人俗力田作多種樹蠶桑皆髡頭而衣文繡乘輜軿白蓋小車出入擊鼓建旌旗幡幟所居城邑周圜百餘里城中有五宮相去各十里宮室皆以水精為柱食器亦然其王日游一宮聽事五日而後遍常使一人持囊隨王車人有言事者即以書投囊中王至宮發省理其枉直各有官曹文書置三十六將皆會議國事其王無有常人皆簡立賢者國中災異及風雨不時輒廢而更立受放者甘黜不怨其人民皆長大平正有類中國故謂之大秦土多金銀奇寶有夜光璧明月珠駭雞犀珊瑚虎魄琉璃琅玕朱丹青碧刺金縷繡織成金縷罽雜色綾作黃金塗火浣布又有細布或言水羊毳野蠶繭所作也合會諸香煎其汁以為蘇合凡外國諸珍異皆出焉以金銀為錢銀錢十當金錢一與安息天竺交巿於海中利有十倍其人質直巿無二價穀食常賤國用富饒鄰國使到其界首者乘驛詣王都至則給以金錢其王常欲通使於漢而安息欲以漢繒綵與之交市故遮閡不得自達至桓帝延熹九年大秦王安敦遣使自日南徼外獻象牙犀角瑁始乃一通焉其所表貢並無珍異疑傳者過焉或云其國西有弱水流沙近西王母所居處幾於日所入也漢書云從條支西行二百餘日近日所入則與今書異矣前世漢使皆自烏弋以還莫有至條支者也又云從安息陸道繞海北行出海西至大秦人庶連屬十里一亭三十里一置終無盜賊寇警而道多猛虎師子遮害行旅不百餘人齎兵器輒為所食又言有飛橋數百里可度海北諸國所生奇異玉石諸物譎怪多不經故不記云大月氏國居藍氏城西接安息四十九日行東去長史所居六千五百三十七里去洛陽萬六千三百七十里戶十萬口四十萬勝兵十餘萬人初月氏為胸奴所滅遂遷於大夏分其國為休密雙靡貴霜頓都密凡五部翖侯後百餘歲貴霜翖侯丘就卻攻滅四翖侯自立為王國號貴霜王侵安息取高附地又滅濮達罽賓悉有其國丘就卻年八十餘死子閻膏珍代為王復滅天竺置將一人監領之月氏自此之後最為富盛諸國稱之皆曰貴霜王漢本其故號言大月氏云高附國在大月氏西南亦大國也其俗似天竺而弱易服善賈販內富於財所屬無常天竺罽賓安息三國強則得之弱則失之而未嘗屬月氏漢書以為五翖侯數非其實也後屬安息及月氏破安息始得高附天竺國一名身毒在月氏之東南數千里俗與月氏同而卑溼暑熱其國臨大水乘象而戰其人弱於月氏修浮圖道不殺伐遂以成俗從月氏高附國以西南至西海東至磐起國皆身毒之地身毒有別城數百城置長別國數十國置王雖各小異而俱以身毒為名其時皆屬月氏月氏殺其王而置將令統其人土出象犀瑁金銀銅鐵鉛錫西與大秦通有大秦珍物又有細布好毾諸香石蜜胡椒薑黑鹽和帝時數遣使貢獻後西域反畔乃絶至桓帝延熹二年四年頻從日南徼外來獻世傳明帝夢見金人長大頂有光明以問羣臣或曰西方有神名曰佛其形長丈六尺而黃金色帝於是遣使天竺問佛道法遂於中國圖畫形像焉楚王英始信其術中國因此頗有奉其道者後桓帝好神數祀浮圖老子百姓稍有奉者後遂轉盛東離國居沙奇城在天竺東南三千餘里大國也其土氣物類與天竺同列城數十皆稱王大月氏伐之遂臣服焉男女皆長八尺而怯弱乘象駱往來鄰國有寇乘象以戰栗弋國屬康居出名馬牛羊蒲萄衆果其土水美故蒲萄酒特有名焉嚴國在奄蔡北屬康居出鼠皮以輸之奄蔡國改名阿蘭聊國居地城屬康居土氣溫和多楨松白草民俗衣服與康居同莎車國西經蒲犂無雷至大月氏東去洛陽萬九百五十里胸奴單于因王莽之亂略有西域唯莎車王延最強不肯附屬元帝時嘗為侍子長於京師慕樂中國亦復參其典法常勑諸子當世奉漢家不可負也天鳳五年延死諡忠武王子康代立光武初康率傍國拒胸奴擁衛故都護吏士妻子千餘口檄書河西問中國動靜自陳思慕漢家建武五年河西大將軍竇融乃承制立康為漢莎車建功懷德王西域大都尉五十五國皆屬焉九年康死諡宣成王弟賢代立攻破拘彌西夜國皆殺其王而立其兄康兩子為拘彌西夜王十四年賢與鄯善王安並遣使詣闕貢獻於是西域始通葱領以東諸國皆屬賢十七年賢復遣使奉獻請都護天子以問大司空竇融以為賢父子兄弟相約事漢款誠又至宜加號位以鎮安之帝乃因其使賜賢西域都護印綬及車旗黃金錦繡敦煌太守裴遵上言夷狄不可假以大權又令諸國失望詔書收還都護印綬更賜賢以漢大將軍印綬其使不肯易遵迫奪之賢由是始恨而猶詐稱大都護移書諸國諸國悉服屬焉號賢為單于賢浸以驕橫重求賦稅數攻龜茲諸國諸國愁懼二十一年冬車師前王鄯善焉耆等十八國俱遣子入侍獻其珍寶及得見皆流涕稽首願得都護天子以中國初定北邊未服皆還其侍子厚賞賜之是時賢自負兵強欲并兼西域攻擊益甚諸國聞都護不出而侍子皆還大憂恐乃與敦煌太守檄願留侍子以示莎車言侍子見留都護尋出冀且息其兵裴遵以狀聞天子許之二十二年賢知都護不至遂遺鄯善王安書令絶通漢道安不納而殺其使賢大怒發兵攻鄯善安迎戰兵敗亡入山中賢殺略千餘人而去其冬賢復攻殺龜茲王遂兼其國鄯善焉耆諸國侍子久留敦煌愁思皆亡歸鄯善王上書願復遣子入侍更請都護都護不出誠迫於胸奴天子報曰今使者大兵未能得出如諸國力不從心東西南北自在也於是鄯善車師復附胸奴而賢益橫媯塞王自以國遠遂殺賢使者賢擊滅之立其國貴人駟鞬為媯塞王賢又自立其子則羅為龜茲王賢以則羅年少乃分龜茲為烏壘國徙駟鞬為烏壘王又更以貴人為媯塞王數歲龜茲國人共殺則羅駟鞬而遣使胸奴更請立王胸奴立龜茲貴人身毒為龜茲王龜茲由是屬胸奴賢以大宛貢稅滅少自將諸國兵數萬人攻大宛大宛王延留迎降賢因將還國徙拘彌王橋塞提為大宛王而康居數攻之橋塞提在國歲餘亡歸賢復以為拘彌王而遣延留還大宛使貢獻如常賢又徙于填王俞林為驪歸王立其弟位侍為于填王歲餘賢疑諸國欲畔召位侍及拘彌姑墨子合王盡殺之不復置王但遣將鎮守其國位侍子戎亡降漢封為守節侯莎車將君得在于填暴虐百姓患之明帝永平三年其大人都末出城見野豕欲射之豕乃言曰無射我我乃為汝殺君得都末因此即與兄弟共殺君得而大人休莫霸復與漢人韓融等殺都末兄弟自立為于填王復與拘彌國人攻殺莎車將在皮山者引兵歸於是賢遣其太子國相將諸國兵二萬人擊休莫霸霸迎與戰莎車兵敗走殺萬餘人賢復發諸國數萬人自將擊休莫霸霸復破之斬殺過半賢脫身走歸國休莫霸進圍莎車中流矢死兵乃退于填國相蘇榆勒等共立休莫霸兄子廣德為王胸奴與龜茲諸國共攻莎車不能下廣德承莎車之敝使弟輔國侯仁將兵攻賢賢連被兵革乃遣使與廣德和先是廣德父拘在莎車數歲於是賢歸其父而以女妻之結為昆弟廣德引兵去明年莎車相且運等患賢驕暴密謀反城降于填于填王廣德乃將諸國兵三萬人攻莎車賢城守使使謂廣德曰我還汝父與汝婦汝來擊我何為廣德曰王我婦父也久不相見願各從兩人會城外結盟賢以問且運且運曰廣德女壻至親宜出見之賢乃輕出廣德遂執賢而且運等因內于填兵虜賢妻子而并其國鎖賢將歸歲餘殺之胸奴聞廣德滅莎車遣五將發焉耆尉黎龜茲十五國兵三萬餘人圍于填廣德乞降以其太子為質約歲給罽絮冬胸奴復遣兵將賢質子不居徵立為莎車王廣德又攻殺之更立其弟齊黎為莎車王章帝元和三年也時長史班超發諸國兵擊莎車大破之由是遂降漢事已具班超傳莎車東北至疏勒疏勒國去長史所居五千里去洛陽萬三百里領戶二萬一千勝兵三萬餘人明帝永平十六年龜茲王建攻殺疏勒王成自以龜茲左侯兜題為疏勒王冬漢遣軍司馬班超劫縛兜題而立成之兄子忠為疏勒王忠後反畔超擊斬之事已具超傳安帝元初中疏勒王安國以舅臣磐有罪徙於月氏月氏王親愛之後安國死無子母持國政與國人共立臣磐同産弟子遺腹為疏勒王臣磐聞之請月氏王曰安國無子種人微弱若立母氏我乃遺腹叔父也我當為王月氏乃遣兵送還疏勒國人素敬愛臣磐又畏憚月氏即共奪遺腹印綬迎臣磐立為王更以遺腹為磐城侯後莎車連畔于填屬疏勒疏勒以強故得與龜茲于填為敵國焉順帝永建二年臣磐遣使奉獻帝拜臣磐為漢大都尉兄子臣勳為守國司馬五年臣磐遣侍子與大宛莎車使俱詣闕貢獻陽嘉二年臣磐復獻師子封牛至靈帝建寧元年疏勒王漢大都尉於獵中為其季父和得所射殺和得自立為王五三年涼州刺史孟他遣從事任涉將敦煌兵五百人與戊己司馬曹寬西域長史張晏將焉耆龜茲車師前後部合三萬餘人討疏勒攻楨中城四十餘日不能下引去其後疏勒王連相殺害朝廷亦不能禁東北經尉頭溫宿姑墨龜茲至焉耆焉耆國王居南河城北去長史所居八百里東去洛陽八千二百里戶萬五千口五萬二千勝兵二萬餘人其國四面有大山與龜茲相連道險易守有海水曲入四山之內周匝其城三十餘里永平末焉耆與龜茲共攻沒都護陳睦副校尉郭恂殺吏士二千餘人至永元六年都護班超發諸國兵討焉耆危須尉黎山國遂斬焉耆尉黎二王首傳送京師縣蠻夷邸超乃立焉耆左侯候元孟為王尉黎危須山國皆更立其王至安帝時西域背畔延光中超子勇為西域長史復討定諸國元孟與尉黎危須不降永建二年勇與敦煌太守張朗擊破之元孟乃遣子詣闕貢獻蒲類國居天山西疏榆谷東南去長史所居千二百九十里去洛陽萬四百九十里戶八百餘口二千餘勝兵七百餘人廬帳而居逐水草頗知田作有牛馬駱羊畜能作弓矢國出好馬蒲類本大國也前西域屬胸奴而其王得罪單于單于怒徙蒲類人六千餘口內之胸奴右部阿惡地因號曰阿惡國南去車師後部馬行九十餘日人口貧羸逃亡山谷閒故留為國云移支國居蒲類地戶千餘口三千餘勝兵千餘人其人勇猛敢戰以寇鈔為事皆被髮隨畜逐水草不知田作所出皆與蒲類同東且彌國東去長史所居八百里去洛陽九千二百五十里戶三千餘口五千餘勝兵二千餘人廬帳居逐水草頗田作其所出有亦與蒲類同所居無常車師前王居交河城河水分流繞城故號交河去長史所居柳中八十里東去洛陽九千一百二十里領戶千五百餘口四千餘勝兵二千人後王居務塗谷去長史所居五百里去洛陽九千六百二十里領戶四千餘口萬五千餘勝兵三千餘人前後部及東且彌卑陸蒲類移支是為車師六國北與胸奴接前部西通焉耆北道後部西通烏孫建武二十一年與鄯善焉耆遣子入侍光武遣還之乃附屬胸奴明帝永平十六年漢取伊吾盧通西域車師始復內屬胸奴遣兵擊之復降北虜和帝永元二年大將軍竇憲破北胸奴車師震懾前後王各遣子奉貢入侍並賜印綬金帛八年戊己校尉索頵欲廢後部王涿鞮立破虜侯細致涿鞮忿前王尉卑大賣己因反擊尉卑大獲其妻子明年漢遣將兵長史王林發涼州六郡兵及羌虜胡二萬餘人以討涿鞮獲首虜千餘人涿鞮入北胸奴漢軍追擊斬之立涿鞮弟農奇為王至永寧元年後王軍就及母沙麻反畔殺後部司馬及敦煌行事至安帝延光四年長史班勇擊軍就大破斬之順帝永建元年勇率後王農奇子加特奴及八滑等發精兵擊北虜呼衍王破之勇於是上立加特奴為後王八滑為後部親漢侯陽嘉三年夏車師後部司馬率加特奴等千五百人掩擊北胸奴於閶吾陸谷壞其廬落斬數百級獲單于母季母及婦女數百人牛羊十餘萬頭車千餘兩兵器什物甚衆四年春北胸奴呼衍王率兵侵後部帝以車師六國接近北虜為西域蔽扞乃令敦煌太守發諸國兵及玉門關候伊吾司馬合六千三百騎救之掩擊北虜於勒山漢軍不利秋呼衍王復將二千人攻後部破之桓帝元嘉元年呼衍王將三千餘騎寇伊吾伊吾司馬毛愷遣吏兵五百人於蒲類海東與呼衍王戰悉為所沒呼衍王遂攻伊吾屯城夏遣敦煌太守司馬達將敦煌酒泉張掖屬國吏士四千餘人救之出塞至蒲類海呼衍王聞而引去漢軍無功而還永興元年車師後部王阿羅多與戊部候嚴皓不相得遂忿戾反畔攻圍漢屯田且固城殺傷吏士後部候炭遮領餘人畔阿羅多詣漢吏降阿羅多迫急將其母妻子從百餘騎亡走北胸奴中敦煌太守宋亮上立後部故王軍就質子卑君為後部王後阿羅多復從胸奴中還與卑君爭國頗收其國人戊校尉閻詳慮其招引北虜將亂西域乃開信告示許復為王阿羅多乃詣詳降於是收奪所賜卑君印綬更立阿羅多為王仍將卑君還敦煌以後部人三百帳別屬役之食其稅帳者猶中國之戶數也論曰西域風土之載前古未聞也漢世張騫懷致遠之略班超奮封侯之志終能立功西遐羈服外域自兵威之所肅服財賂之所懷誘莫不獻方奇納愛質露頂肘行東向而朝天子故設戊己之官分任其事建都護之帥總領其權先馴則賞籝金而賜龜綬後服則繫頭顙而釁北闕立屯田於膏腴之野列郵置於要害之路馳命走驛不絶於時月商胡販客日款於塞下其後甘英乃抵條支而歷安息臨西海以望大秦拒玉門陽關者四萬餘里靡不周盡焉若其境俗性智之優薄産載物類之區品川河領障之基源氣節涼暑之通隔梯山棧谷繩行沙度之道身熱首痛風災鬼難之域莫不備寫情形審求根實至於佛道神化興自身毒而二漢方志莫有稱焉張騫但著地多暑溼乘象而戰班勇雖列其奉浮圖不殺伐而精文善法導達之功靡所傳述余聞之後說也其國則殷乎中土玉燭和氣靈聖之所降集賢懿之所挺生神迹詭怪則理絶人區感驗明顯則事出天外而騫超無聞者豈其道閉往運數開叔葉乎不然何誣異之甚也漢自楚英始盛齊戒之祀桓帝又修華蓋之飾將微義未譯而但神明之邪詳其清心釋纍之訓空有兼遣之宗道書之流也且好仁惡殺蠲敝崇善所以賢達君子多愛其法焉然好大不經奇譎無已雖鄒衍談天之辨莊周蝸角之論尚未足以概其萬一又精靈起滅因報相尋若曉而昧者故通人多惑焉蓋導俗無方適物異會取諸同歸措夫疑說則大道通矣贊曰逖矣西胡天之外區土物琛麗人性淫虛不率華禮莫有典書若微神道何恤何拘
