body:
  text: 後漢書卷五孝安帝紀第五恭宗孝安皇帝諱祜肅宗孫也父清河孝王慶母左姬帝自在邸第數有神光照室又有赤蛇盤於牀笫之閒年十歲好學史書和帝稱之數見禁中延平元年慶始就國鄧太后特詔留帝清河邸八月殤帝崩太后與兄車騎將軍鄧騭定策禁中其夜使騭持節以王青蓋車迎帝齋于殿中皇太后御崇德殿百官皆吉服羣臣陪位引拜帝為長安侯皇太后詔曰先帝聖德淑茂早𠫓廾天下朕奉皇帝夙夜瞻仰日月冀望成就豈意卒然顛沛天年不遂悲痛斷心朕惟平原王素被痼疾念宗廟之重思繼嗣之統唯長安侯祜質性忠孝小心翼翼能通詩論篤學樂古仁惠愛下年已十三有成人之志親德係後莫宜於祜禮昆弟之子猶己子春秋之義為人後者為之子不以父命辭王父命其以祜為孝和皇帝嗣奉承祖宗案禮儀奏又作策命曰惟延平元收謅月癸丑皇太后曰咨長安侯祜孝和皇帝懿德巍巍光于四海大行皇帝不永天年朕惟侯孝章帝世嫡皇孫謙恭慈順在孺而勤宜奉郊廟承統大業今以侯嗣孝和皇帝後其審君漢國允執其中一人有慶萬民賴之皇帝其勉之哉讀策畢太尉奉上璽綬即皇帝位年十三太后猶臨朝九月庚子謁高廟辛丑謁光武廟六州大水己未遣謁者分行虛實舉灾害賑乏絕丙寅葬孝殤皇帝于康陵乙亥隕石于陳留西域諸國叛攻都護任尚遣副校尉梁慬救尚擊破之冬十月四州大水雨雹詔以宿麥不下賑賜貧人十二月甲子清河王薨使司空持節弔祭車騎將軍鄧騭護喪事乙酉罷魚龍曼延百戲永初元年春正月癸酉朔大赦天下蜀郡徼外羌內屬戊寅分犍為南部為屬國都尉稟司隸兗豫徐冀并州貧民二月丙午以廣成游獵地及被灾郡國公田假與貧民丁卯分清河國封帝弟常保為廣川王庚午司徒梁鮪薨三月癸酉日有食之詔公卿內外衆官郡國守相舉賢良方正有道術之士明政術達古今能直言極諫者各一人己卯永昌徼外僬僥種夷貢獻內屬甲申葬清河孝王贈龍旗虎賁夏五月甲戌長樂衞尉魯恭為司徒丁丑詔封北海王睦孫壽光侯普為北海王九真徼外夜郎蠻夷舉土內屬六月戊申爵皇太后母陰氏為新野君丁巳河東地陷壬戌罷西域都護先零種羌叛斷隴道大為寇掠遣車騎將軍鄧騭征西校尉任尚討之丁卯赦除諸羌相連結謀叛逆者罪秋九月庚午詔三公明申舊令禁奢侈無作浮巧之物殫財厚葬是日太尉徐防免辛未司空尹勤免癸酉調揚州五郡租米贍給東郡濟陰陳留梁國下邳山陽丁丑詔曰自今長吏被考竟未報自非父母喪無故輒去職者劇縣十歲平縣五歲以上乃得次用壬午詔太僕少府減黃門鼓吹以補羽林士廄馬非乘輿常所御者皆減半食諸所造作非供宗廟園陵之用皆且止丙戌詔死罪以下及亡命贖各有差庚寅太傅張禹為太尉太常周章為司空冬十月倭國遣使奉獻辛酉新城山泉水大出十一月丁亥司空周章密謀廢立策免自殺戊子勑司隸校尉冀并二州刺史民訛言相驚𠫓廾捐舊居老弱相攜窮困道路其各勑所部長吏躬親曉喻若欲歸本郡在所為封長檄不欲勿強十二月乙卯潁川太守張敏為司空是歲郡國十八地震四十一雨水或山水暴至二十八大風雨雹二年春正月稟河南下邳東萊河內貧民車騎大將軍鄧騭為種羌所敗於冀西二月乙丑遣光祿大夫樊準呂倉分行冀兗二州稟貸流民夏奶諝珣漢陽城中火燒殺三千五百七十人五月旱丙寅皇太后幸洛陽寺及若盧獄錄囚徒賜河南尹廷尉卿及官屬以下各有差即日降雨六月京師及郡國奶大水大風雨雹秋七月戊辰詔曰昔在帝王承天理民莫不據琁機玉衡以齊七政朕以不德遵奉大業而陰陽差越變異並見萬民飢流羌貊叛戾夙夜克己憂心京京閒令公卿郡國舉賢良方正遠求博選開不諱之路冀得至謀以鑒不逮而所對皆循尚浮言無卓爾異聞其百僚及郡國吏人有道術明習灾異陰陽之度琁機之數者各使指變以聞二千石長吏明以詔書博衍幽隱朕將親覽待以不次冀獲嘉謀以承天誡閏月辛丑廣川王常保薨無子國除癸未蜀郡徼外羌舉土內屬九月庚子詔王主國官屬墨綬下至郎謁者其經明任博士居鄉里有廉清孝順之稱才任理人者國相歲移名與計偕上尚書公府通調令得外補冬十月庚寅稟濟陰山陽玄菟貧民征西校尉任尚與先零羌戰于平襄尚軍敗績十一月辛酉拜鄧騭為大將軍徵還京師留任尚屯隴右先零羌滇零稱天子於北地遂寇三輔東犯趙魏南入益州殺漢中太守董炳十二月辛卯稟東郡鉅鹿廣陽安定定襄沛國貧民廣漢塞外參狼羌降分廣漢北部為屬國都尉是歲郡國十二地震三年春正月庚子皇帝加元服大赦天下賜王主貴人公卿以下金帛各有差男子為父後及三老孝悌力田爵人二級流民欲占者人一級遣騎都尉任仁討先零羌不利羌遂破沒臨洮高句驪遣使貢獻三月京師大飢民相食壬辰公卿詣闕謝詔曰朕以幼沖奉承鴻業不能宣流風化而感逆陰陽至令百姓飢荒更相噉食永懷悼歎若墜淵水咎在朕躬非羣司之責而過自貶引重朝廷之不德其務思變復以助不逮癸巳詔以鴻池假與貧民壬寅司徒魯恭免夏四月丙寅大鴻臚九江夏勤為司徒三公以國用不足奏令吏人入錢穀得為關內侯虎賁羽林郎五大夫官府吏緹騎營士各有差己巳詔上林廣成苑可墾闢者賦與貧民甲申清河王虎威薨五月丙申封樂安王寵子延平為清河王丁酉沛王正薨癸丑京師大風六月烏桓寇代郡上谷涿郡秋七月海賊張伯路等寇略緣海九郡遣侍御史龐雄督旭兵討破之庚子詔長吏案行在所皆令種宿麥蔬食務盡地力其貧者給種餉九月鴈門烏桓及鮮卑叛敗五原郡兵於高渠谷冬十月南單于叛圍中郎將耿种於美稷十一月遣行車騎將軍何熙討之十二月辛酉郡國九地震乙亥有星孛于天苑是歲京師及郡國四十一雨水雹并涼二州大飢人相食四年春正月元日會徹樂不陳充庭車辛卯詔以三輔比遭寇亂人庶流除三年逋租過更口筭芻稟上郡貧民各有差海賊張伯路復與勃海平原劇賊劉文河周文光等攻厭次殺縣令遣御史中丞王宗督青州刺史法雄討破之度遼將軍梁慬遼東太守耿夔討破南單于於屬國故城丙午詔減百官及州郡縣奉各有差二月丁巳稟九江貧民南匈奴寇常山乙丑初置長安雍二營都尉官乙亥詔自建初以來諸祅言它過坐徙邊者各歸本郡其沒入官為奴婢者免為庶人詔謁者劉珍及五經博士校定東觀五經諸子傳記百家蓺術整齊脫說是正文字三月南單于降先零羌寇襃中漢中太守鄭勤戰歿徙金城郡都襄武戊子杜陵園火癸巳郡國九地震夏四月六州蝗丁丑大赦天下秋七月乙酉三郡大水巳卯騎都尉任仁下獄死九月甲申益州郡地震冬十月甲戌新野君陰氏薨使司空持節護喪事大將軍鄧騭罷五年春正月庚辰朔日有食之丙戌郡國十地震己丑太尉張禹免甲申光祿勳李脩為太尉二月丁卯詔省減郡國貢獻太官口食先零羌寇河東遂至河內三月詔隴西徙襄武安定徙美陽北地徙池陽上郡徙衙夫餘夷犯塞殺傷吏人閏月丁酉赦涼州河西四郡戊戌詔曰朕以不德奉郊廟承大業不能興和降善為人祈福灾異蜂起寇賊縱橫夷狄猾夏戎事不息百姓匱乏疲於徵發重以蝗蟲滋生害及成麥秋稼方收甚可悼也朕以不明統理失中亦未獲忠良以毗闕政傳曰顛而不扶危而不持則將焉用彼相矣公卿大夫將何以匡救濟斯艱戹承天誡哉蓋為政之本莫若得人襃賢顯善聖制所先濟濟多士文王以寧思得忠良正直之臣以輔不逮其令三公特進侯中二千石二千石郡守諸侯相舉賢良方正有道術達於政化能直言極諫之士各一人及至孝與衆卓異者并遣詣公車朕將親覽焉六月甲辰樂成王巡薨秋七月己巳詔三公特進九卿校尉舉列將子孫明曉戰陳任將帥者九月漢陽人杜琦王信叛與先零諸種羌攻陷上邽城十二月漢陽太守趙博遣客刺殺杜琦是歲九州蝗郡國八雨水六年春正月庚申詔越巂置長利高望始昌三苑又令益州郡置萬歲苑犍為置漢平苑三月十州蝗夏四月乙丑司空張敏罷己卯太常劉凱愷為司空五月旱丙寅詔令中二千石下至黃綬一切復秩還贖賜爵各有差戊辰皇太后幸雒陽寺錄囚徒理冤獄六月壬辰豫章員谿原山崩辛巳大赦天下遣侍御史唐喜討漢陽賊王信破斬之冬十一月辛丑護烏桓校尉吳祉下獄死是歲先零羌滇零死子零昌復襲偽號七年春正月庚戌皇太后率大臣命婦謁宗廟二月丙午郡國十八地震夏四月乙未平原王勝薨丙申晦日有食之五月庚子京師大雩秋護羌校尉侯霸騎都尉馬賢破先零羌八月丙寅京師大風蝗蟲飛過洛陽詔賜民爵郡國被蝗傷稼十五以上勿收今年田租不滿者以實除之九月調零陵桂陽丹陽豫章會稽租米賑給南陽廣陵下邳彭城山陽廬江九江飢民又調濱水縣穀輸敖倉元初元年春正月甲子改元元初賜民爵人二級孝悌力田人三級爵過公乘得移與子若同產同產子民脫無名數及流民欲占者人一級魚眾寡孤獨篤貧不能自存者穀人三斛貞婦帛人一匹二月己卯日南地坼三月癸酉日有食之夏四月丁酉大赦天下京師及郡國五旱蝗詔三公特進列侯中二千石二千石郡守舉敦厚質直者各一人五月先零羌寇雍城六月丁巳河東地陷秋七月蜀郡夷寇蠶陵殺縣令九月乙丑太尉李脩罷先零羌寇武都漢中絕隴道辛未大司農山陽司馬苞為太尉冬十月戊子朔日有食之先零羌敗涼州刺史皮陽於狄道乙卯詔除三輔三歲田租更賦口筭十一月是歲郡國十五地震二年春正月詔稟三輔及式涼六郡流貧人蜀郡青衣道夷奉獻內屬修理西門豹所分漳水為支渠以溉民田二月戊戌遣中謁者收葬京師客死無家屬及棺椁朽敗者皆為設祭其有家屬尤貧無以葬者賜錢人五千辛酉詔三輔河內河東上黨趙國太原各修理舊渠通利水道以溉公私田疇三月癸亥京師大風先零羌寇益州遣中郎將尹就討之夏四月丙午立貴人閻氏為皇后五月京師旱河南及郡國十九蝗甲戌詔曰朝廷不明庶事失中灾異不息憂心悼懼被蝗以來七年于茲而州郡隱匿裁言頃畝今羣飛蔽天為害廣遠所言所見寧相副邪三司之職內外是監既不奏聞又無舉正天灾至重欺罔辠大今方盛夏且復假貸以觀厥後其務消救灾眚安輯黎元六月丙戌太尉司馬苞薨洛陽新城地裂秋七月辛巳太僕太山馬英為太尉八月遼東鮮卑圍無慮縣九月又攻夫犂營殺縣令壬午晦日有食之冬十月遣中郎將任尚屯三輔詔郡國中都官繫囚減死一等勿笞詣馮翊扶風屯妻子自隨占著所在女子勿輸亡命死辠以下贖各有差其吏人聚為盜賊有悔過者除其罪乙未右扶風仲光安定太守杜恢京兆虎牙都尉耿溥與先零羌戰於丁奚城光等大敗並沒左馮翊司馬鈞下獄自殺十一月庚申郡國十地震十二月武陵澧中蠻叛州郡擊破之己酉司徒夏勤罷庚戍司空劉愷為司徒光祿勳袁敞為司空三年春正月甲戌修理太原舊溝渠溉灌官私田東平陸上言木連理蒼梧鬱林合浦蠻夷反叛二月遣侍御史任逴督州郡兵討之郡國十地震三月辛亥日有食之丙辰赦蒼梧鬱林合浦南海吏人為賊所迫者夏四月京師旱五月武陵蠻復叛州郡討破之癸酉度遼將軍鄧遵率南匈奴擊先零羌於靈州破之越巂徼外夷舉種內屬六月中郎將任尚遣兵擊破先零羌於丁奚城秋七月武陵蠻復叛州郡討平之緱氏地坼九月辛巳趙王宏薨冬十一月蒼梧鬱林合浦蠻夷降丙戌初聽大臣二千石刺史行三年喪癸卯郡國九地震十二月丁巳任尚遣兵擊破先零羌於北地四年春二月乙巳朔日有食之乙卯大赦天下壬戌武庫灾夏四月戊申司空袁敞薨己巳鮮卑寇遼西遼西郡兵與烏桓擊砟均五月丁丑太常李郃為司空六月戊辰三郡雨雹秋七月辛丑陳王鈞薨京師及郡國十雨水詔曰今年秋稼茂好垂可收穫而連雨未霽懼必淹傷夕惕惟憂思念厥咎夫霖雨者人怨之所致其武吏以威暴下文吏妄行苛刻鄉吏因公生姦為百姓所患苦者有司顯明其罰又月令仲秋養衰老授几杖行糜粥方今案比之時郡縣多不奉行雖有糜粥糠秕相半長吏怠事莫有躬親甚違詔書養老之意其務崇仁恕賑護寡獨稱朕意焉九月護羌校尉任尚使客刺殺叛羌零昌冬十一月己卯彭城王恭薨十二月越巂夷寇遂久殺縣令甲子任尚及騎都尉馬賢與先零羌戰于富平上河大破之虔人羌率衆降隴右平是歲郡國十三地震五年春正月越巂夷叛二月壬戌中山王憲薨三月京師及郡國五旱詔稟遭旱貧人夏六月高句驪與穢貊寇玄菟秋七月越巂蠻夷及旄牛豪叛殺長吏丙子詔曰舊令制度各有科品欲令百姓務崇節約遭永初之際人離荒戹朝廷躬自菲薄去絕奢飾食不兼味衣無二綵比年雖獲豐穰尚乏儲積而小人無慮不圖久長嫁娶送終紛華靡麗至有走卒奴婢被綺縠著珠璣京師尚若斯何以示四遠設張法禁懇惻分明而有司惰任訖不奉行秋節既立鷙鳥將用且復重申以觀後效八月丙申朔日有食之鮮卑寇代郡殺長吏冬十月鮮卑寇上谷十二月丁巳中郎將任尚有辠𠫓廾市是歲郡國十四地震六年春二月乙巳京師及郡國四十二地震或坼裂水泉涌出壬子詔三府選掾屬高第能惠利牧養者各五人光祿勳與中郎將選孝廉郎寬博有謀清白行高者五十人出補令長丞尉乙卯詔曰夫政先京師後諸夏月令仲春養幼小存諸孤季春賜貧窮賑乏絕省婦使表貞女所以順陽氣崇生長也其賜人尤貧困孤弱單獨穀人三斛貞婦有節義十斛甄表門閭旌顯厥行三月庚辰始立六宗祀於洛城西北夏四月會稽大疫遣光祿大夫將太醫循行疾病賜棺木除田租口賦沛國勃海大風雨雹五月京師旱六月丁丑樂成王賓薨丙戌平原王得薨秋七月鮮卑寇馬城度遼將軍鄧遵率南單于擊破之九月癸巳陳王竦薨十二月戊午朔日有食之既郡國八地震是歲永昌益州蜀郡夷叛與越雟夷殺長吏燔城邑益州刺史張喬討破降之永寧元年春正月甲辰任城王安薨三月丁酉濟北王壽薨車師後王叛殺部司馬沈氐羌寇張掖夏四月丙寅立皇子保為皇太子改元永寧大赦天下賜王主三公列侯下至郎吏從官金帛又賜民爵及布粟各有差己巳紹封陳王羨子崇為陳王濟北王子萇為樂成王河閒王子翼為平原王壬午琅邪王壽薨六月沈氐種羌叛寇張掖護羌校尉馬賢討沈氐羌破之秋七月乙酉朔日有食之冬十月己巳司空李郃免癸酉衞尉廬江陳為司空自三月至是月京師及郡國三十三大風雨水十二月永昌徼外撣國遣使貢獻戊辰司徒劉愷罷遼西鮮卑降癸酉太常楊震為司徒是歲郡國二十三地震夫餘王遣子詣闕貢獻燒當羌叛建光元年春正月幽州刺史馮煥率二郡太守討高句驪穢貊不克二月癸亥大赦天下賜諸園貴人王主公卿以下錢布各有差以公卿校尉尚書子弟一人為郎舍人三月癸巳皇太后鄧氏崩丙午葬和熹皇后丁未樂安王寵薨戊申追尊皇考清河孝王曰孝德皇皇妣左氏曰孝德皇后祖妣宋貴人曰敬隱皇后夏四月穢貊復與鮮卑寇遼東遼東太守蔡諷追擊戰歿丙辰以廣川并清河國丁巳尊孝德皇元耿氏為甘陵大貴人甲子樂成王萇有罪廢為臨湖侯己巳令公卿特進侯中二千石二千石郡國守相舉有道之士各一人賜魚眾寡孤獨貧不能自存者穀人三斛甲戌遼東屬國都尉龐奮承偽璽書殺玄菟太守姚光五月庚辰特進鄧騭及度遼將軍鄧遵並以譖自殺丙申貶平原王翼為都鄉侯秋七月己卯改元建光大赦天下壬寅太尉馬英薨八月護羌校尉馬賢討燒當羌於金城不利甲子前司徒劉愷為太尉鮮卑寇居庸關九月雲中太守成嚴擊之戰歿鮮卑圍烏桓校尉於馬城度遼將軍耿夔救之戊子幸衞尉馮石府是秋京師及郡國二十九雨水冬十一月己丑郡國三十五地震或坼裂詔三公以下各上封事陳得失遣光祿大夫案行賜死者錢人二千除今年田租其被灾甚者勿收口賦鮮卑寇玄菟庚子復斷大臣二千石以上服三年喪癸卯詔三公特進侯卿校尉舉武猛堪將帥者各五人丙午詔京師及郡國被水雨傷稼者隨頃畝減田租甲子初置漁陽營兵冬十二月高句驪馬韓穢貊圍玄菟城夫餘王遣子與州郡并力討破之延光元年春二月夫餘王遣子將兵救玄菟擊高句驪馬韓穢貊破之遂遣使貢獻三月丙午改元延光大赦天下還徙者復戶邑屬籍賜民爵及三老孝悌力田人二級加賜魚眾寡孤獨篤貧不能自存者粟人三斛貞婦帛人二匹夏四月癸未京師郡國二十一雨雹癸巳司空陳免五月庚戌宗正彭城劉授為司空己巳改樂成國為安平封河閒王開子得為安平王六月郡國蝗秋七月癸卯京師及郡國十三地震高句驪降虔人羌叛攻穀羅城度遼將軍耿夔討破之八月戊子陽陵園寑火辛卯九真言黃龍見無功己亥詔三公中二千石舉刺史二千石令長相視事一歲以上至十歲清白愛利能勑身率下防姦理煩有益於人者無拘官簿刺史舉所部郡國太守相舉墨綬隱親悉心勿取浮華九月甲戌郡國二十七地震冬十月鮮卑寇鴈門定襄十一月鮮卑寇太原燒當羌豪降十二月九真徼外蠻夷貢獻內屬是歲京師及郡國二十七雨水大風殺人詔賜壓溺死者年七歲以上錢人二千其壞敗廬舍失亡穀食粟人三斛又田被淹傷者一切勿收田租若一家皆被灾害而弱小存者郡縣為收斂之虔人羌反攻穀羅城度遼將軍耿夔討破之二年春正月旄牛夷叛寇靈關殺縣令益州刺史蜀郡西部都尉討之詔選三署郎及吏人能通古文尚書毛詩穀梁春秋各一人丙辰河東潁川大風夏六月壬午郡國十一大風九真言嘉禾生丙申北海王普薨秋七月丹陽山崩八月庚午初令三署郎通達經術任牧民者視事三歲以上皆得察舉九月郡國五雨水冬十月辛未太尉劉愷罷甲戌司徒楊震為太尉光祿勳東萊劉熹為司徒十一月甲辰校獵上林苑鮮卑敗南匈奴於曼柏是歲分蜀郡西部為屬國都尉京師及郡國三地震三年春二月丙子東巡狩丁丑告陳留太守祠南頓君光武皇帝于濟陽復濟陽今年田租芻庚寅遣使者祠唐堯於成陽戊子濟南上言鳳皇集臺縣丞霍收舍樹上賜臺長帛五十匹丞二十匹尉半之吏卒人三匹鳳皇所過亭部無出今年田租賜男子爵人二級辛卯幸太山柴告岱宗齊王無忌北海王普翼樂安王延來朝壬辰宗祀五帝于汶上明堂癸巳告祀二祖六宗勞賜郡縣作樂三月甲午陳王崇薨戊戌祀孔子及七十二弟子於闕里自魯相令丞尉及孔氏親屬婦女諸生悉會賜襃成侯以下帛各有差還幸東平至東郡歷魏郡河內壬戌車駕還京師幸太學是日太尉楊震免夏四月乙丑車駕入宮假于祖禰壬戌沛國言甘露降豐縣戊辰光祿勳馮石為太尉五月南匈奴左日逐王叛使匈奴中郎將馬翼討破之日南徼外蠻夷內屬六月鮮卑寇玄菟庚午閬中山崩辛未扶風言白鹿見雍辛巳遣侍御史分行青冀二州灾害督錄盜賊秋七月丁酉初復右校令左校令丞官日南徼外蠻豪帥詣闕貢獻馮翊言甘露降頻陽衙潁川上言木連理白鹿麒麟見陽翟鮮卑寇高柳梁王堅薨八月辛巳大鴻臚耿寶為大將軍戊子潁川上言麒麟一白虎二見陽翟九月丁酉廢皇太子保為濟陰王乙巳詔郡國中都官死辠繫打賹一等詔詣敦煌隴西及度遼營其右趾以下及亡命者贖各有差辛亥濟南上言黃龍見歷城庚申晦日有食之冬十月行幸長安壬午新豐上言鳳皇集西界亭丁亥會三輔守令掾史於長安作樂閏月乙未祠高廟遂有事十一陵歷觀上林昆明池遣使者祠太上皇于萬年以中牢祠蕭何曹參霍光十一月乙丑至自長安十二月乙未琅邪言黃龍見諸縣是歲京師及諸郡國二十三地震三十六雨水疾風雨雹四年春正月壬午東郡言黃龍二麒麟一見濮陽二月乙亥下邳王衍薨甲辰南巡狩三月戊午朔日有食之庚申幸宛帝不豫辛酉令大將軍耿寶行太尉事祠章陵園廟告長沙零陵太守祠定王節侯鬱林府君乙丑自宛還丁卯幸葉帝崩于乘輿年三十二祕不敢宣所在上食問起居如故庚午還宮辛未夕乃發喪尊皇后為皇太后太后蟈癒以后兄大鴻臚閻顯為車騎將軍定策禁中立章帝孫濟北惠王壽子北鄉侯懿甲戌濟南王香薨乙酉北鄉侯即皇帝位夏四月丁酉太尉馮石為太傅司徒劉熹為太尉參錄帑悃前司空李郃為司徒辛卯大將軍耿寶中常侍樊豐侍中謝惲周廣乳母野王君王聖坐相阿黨豐惲廣下獄死寶自殺聖徙鴈門己酉葬孝安皇帝于恭陵廟曰恭宗六月乙巳大赦天下詔先帝巡狩所幸皆半入今戎觓瓷秋七月西域長史班勇擊車師後王斬之丙午東海王肅薨冬十月丙午越巂山崩辛亥少帝薨是冬京師大疫論曰孝安雖稱尊享御而權歸鄧氏至乃損徹膳服克念政道然令自房帷威不逮遠始失根統歸成陵敝遂復計金授官移民逃寇推咎台衡以荅天眚既云哲婦亦惟家之索矣贊曰安德不升秕我王度降奪儲嫡開萌邪蠹馮石承歡楊公逢怒彼日而微遂祲天路
