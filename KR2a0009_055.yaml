body:
  text: 後漢書卷五十孝明八王列傳第四十孝明皇帝九子賈貴人生章帝陰貴人生梁節王暢餘七王本書不載母氏千乘哀王建永平三年封明年薨年少無子國除陳敬王羡永平三年封廣平王建初三年有司奏遣羡與巨鹿王恭樂成王黨俱就國肅宗性篤愛不忍與諸王乖離遂皆留京師明年案輿地圖令諸國戶口皆等租入歲各八千萬羡博涉經書有威嚴與諸儒講論於白虎殿七年帝以廣平在北多有邊費乃徙羡為西平王分汝南八縣為國及帝崩遺詔徙封為陳王食淮陽郡其年就國立三十七年薨子思王鈞嗣鈞立多不法遂行天子大射禮性隱賊喜文法國相二千石不與相得者輒陰中之憎怨敬王夫人李儀等永元十一年遂使客隗久殺儀家屬吏捕得久繫長平獄鈞欲斷絶辭語復使結客篡殺久事發覺有司舉奏鈞坐削西華項新陽三縣十二年封鈞六弟為列侯後鈞取掖庭出女李嬈為小妻復坐削圉宜祿扶溝三縣永初七年封敬王孫安國為耕亭侯鈞立二十一年薨子懷王竦嗣立二年薨無子國絶永寧元年立敬王子安壽亭侯崇為陳王是為頃王立五年薨子孝王承嗣承薨子愍王寵嗣熹平二年國相師遷追奏前相魏愔與寵共祭天神希幸非冀罪至不道有司奏遣使者案驗是時新誅勃海王悝靈帝不忍復加法詔檻車傳送愔遷詣北寺詔獄使中常侍王酺與尚書令侍御史雜考愔辭與王共祭黃老君求長生福而已無它冀幸酺等奏愔職在匡正而所為不端遷誣告其王罔以不道皆誅死有詔赦寵不案寵善弩射十發十中中皆同處中平中黃巾賊起郡縣皆𠫓廾城走寵有彊弩數千張出軍都亭國人素聞王善射不敢反叛故陳獨得完百姓歸之者衆十餘萬人及獻帝初義兵起寵率衆屯陽夏自稱輔漢大將軍國相會稽駱俊素有威恩時天下飢荒鄰郡人多歸就之俊傾資賑贍並得全活後袁術求糧於陳而俊拒絶之術忿恚遣客詐殺俊及寵陳由是破敗是時諸國無復租祿而數見虜奪并日而食轉死溝壑者甚衆夫人姬妾多為丹陽陵兵烏桓所略云彭城靖王恭永平九年賜號靈壽王十五年封為巨鹿王建初三年徙封江陵王改南郡為國元和二年三公上言江陵在京師正南不可以封乃徙為六安王以廬江郡為國肅宗崩遺詔徙封彭城王食楚郡其年就國恭敦厚威重舉動有節度吏人敬愛之永初六年封恭子阿奴為竹邑侯元初三年恭以事怒子酺酺自殺國相趙牧以狀上因誣奏恭祠祀惡言大逆不道有司奏請誅之恭上書自訟朝廷以其素著行義令考實無徵牧坐下獄會赦免死恭立四十六年薨子考王道嗣元初五年封道弟三人為鄉侯恭孫順為東安亭侯道立二十八年薨子頃王定嗣本初元年封定兄弟九人皆為亭侯定立四年薨子孝王和嗣和性至孝太夫人薨行喪陵次毀胔過禮傅相以聞桓帝詔使奉牛酒迎王還宮和敬賢樂施國中愛之初平中天下大亂和為賊昌務所攻避奔東阿後得還國立六十四年薨孫祗嗣立七年魏受禪以為崇德侯樂成靖王黨永平九年賜號重熹王十五年封樂成王黨聰惠善史書喜正文字與肅宗同年尤相親愛建初四年以清河之游觀津勃海之東光成平涿郡之中水饒陽安平南深澤八縣益樂成國及帝崩其年就國黨急刻不遵法度舊禁宮人出嫁不得適諸國有故掖庭技人哀置嫁為男子章初妻黨召哀置入宮與通初欲上書告之黨恐懼乃密賂哀置姊焦使殺初事發覺黨乃縊殺內侍三人以絶口語又取故中山簡王傅婢李羽生為小妻永元七年國相舉奏之和帝詔削東光鄡二縣立二十五年薨子哀王崇嗣立二月薨無子國絶明年和帝立崇兄修侯巡為樂成王是為釐王立十五年薨子隱王賓嗣立八年薨無子國絶明年復立濟北惠王子萇為樂成王後萇到國數月驕淫不法愆過纍積冀州刺史與國相舉奏萇罪至不道安帝詔曰萇有靦其面而放逸其心知陵廟至重承繼有禮不惟致敬之節肅穆之慎乃敢擅損犧牲不備苾芬慢易大姬不震厥教出入顛覆風淫于家娉取人妻饋遺婢妾毆擊吏人專己凶暴愆罪莫大甚可恥也朕覽八辟之議不忍致之于理其貶萇爵為臨湖侯朕無則哲之明致簡統失序罔以尉承大姬增懷永歎延光元年以河閒孝王子得嗣靖王後以樂成比廢絶故改國曰安平是為安平孝王立三十年薨子續立中平元年黃巾賊起為所劫質囚于廣宗賊平復國其年秋坐不道被誅立三十四年國除下邳惠王衍永平十五年封衍有容貌肅宗即位常在左右建初初冠詔賜衍師傅已下官屬金帛各有差四年以臨淮郡及九江之鍾離當塗東城歷陽全椒合十七縣益下邳國帝崩其年就國衍後病荒忽而太子卬有罪廢諸姬爭欲立子為嗣連上書相告言和帝憐之使彭城靖王恭至下邳正其嫡庶立子成為太子衍立五十四年薨子貞王成嗣永建元年封成兄二人及惠王孫二人皆為列侯成立二年薨子愍王意嗣陽嘉元年封意弟八人為鄉亭侯中平元年意遭黃巾𠫓廾國走賊平復國數月薨立五十七年年九十子哀王宜嗣數月薨無子建安十一年國除梁節王暢永平十五年封為汝南王母陰貴人有寵暢尤被愛幸國土租入倍於諸國肅宗立緣先帝之意賞賜恩寵甚篤建初二年封暢舅陰棠為西陵侯四年徙為梁王以陳留之郾寧陵濟陰之薄單父己氏成武凡六縣益梁國帝崩其年就國暢性聰惠然少貴驕頗不遵法度歸國後數有惡夢從官卞忌自言能使六丁善占夢暢數使卜筮又暢乳母王禮等因此自言能見鬼神事遂共占氣祠祭求福忌等諂媚云神言王當為天子暢心喜與相應答永元五年豫州刺史梁相舉奏暢不道考訊辭不服有司請徵暢詣廷尉詔獄和帝不許有司重奏除暢國徙九真帝不忍但削成武單父二縣暢慙懼上疏辭謝曰臣天性狂愚生在深宮長養傅母之手信惑左右之言及至歸國不知防禁從官侍史利臣財物熒惑臣暢臣暢無所昭見與相然諾不自知陷死罪以至考案肌栗心悸自悔無所復及自謂當即時伏顯誅魂魄去身分歸黃泉不意陛下聖德枉法曲平不聽有司橫貸赦臣戰栗連月未敢自安上念以負先帝而令陛下為臣收汙天下誠無氣以息筋骨不相連臣暢知大貸不可再得自誓束身約妻子不敢復出入失繩墨不敢復有所橫費租入有餘乞裁食睢陽穀孰虞蒙寧陵五縣還餘所食四縣臣暢小妻三十七人其無子者願還本家自選擇謹勑奴婢二百人其餘所受虎賁官騎及諸工技鼓吹倉頭奴婢兵弩廄馬皆上還本署臣暢以骨肉近親亂聖化汙清流既得生活誠無心面目以凶惡復居大宮食大國張官屬藏什物願陛下加大恩開臣自悔之門假臣小善之路令天下知臣蒙恩得去死就生頗能自悔臣以公卿所奏臣罪惡詔書常置於前晝夜誦讀臣小人貪見明時不能即時自引惟陛下哀臣令得喘息漏刻若不聽許臣實無顏以久生下入黃泉無以見先帝此誠臣至心臣欲多還所受恐天恩不聽許節量所留於臣暢饒足詔報曰朕惟王至親之屬淳淑之美傅相不良不能防邪至令有司紛紛有言今王深思悔過端自克責朕惻然傷之志匪由于王咎在彼小子一日克己復禮天下歸仁王其安心靜意茂率休德易不云乎一謙而四益小有言終吉強食自愛暢固讓章數上卒不許立二十七年薨子恭王堅嗣永元十六年封堅弟二人為鄉亭侯堅立二十六年薨子懷王匡嗣永建二年封匡兄弟七人為鄉亭侯匡立十一年薨無子順帝封匡弟孝陽亭侯成為梁王是為夷王立二十九年薨子敬王元嗣立十六年薨子彌嗣立四十年魏受禪以為崇德侯淮陽頃王昞永平十五年封常山王建初四年徙為淮陽王以汝南之新安西華益淮陽國立十六年薨未及立嗣永元二年和帝立昞小子側復為常山王奉昞後是為殤王立十三年薨父子皆未之國並葬京師側無子其月立兄防子侯章為常山王和帝憐章早孤數加賞賜延平元年就國立二十五年薨是為靖王子頃王儀嗣永建二年封儀兄二人為亭侯儀立十七年薨子節王豹嗣永元嘉元年封豹兄四人為亭侯豹立八年薨子皓嗣三十二年遭黃巾賊𠫓廾國走建安十一年國除濟陰悼王長永平十五年封建初四年以東郡之離狐陳留之長垣益濟陰國立十三年薨于京師無子國除論曰晏子稱夫人生厚而用利於是乎正德以幅之謂之幅利言人情須節以正其德亦由布帛須幅以成其度焉明帝封諸子租歲不過二千萬馬后為言而不得也賢哉豈徒儉約而已乎知驕貴之無猒嗜欲之難極也故東京諸侯鮮有至於禍敗者也贊曰孝明傳胤維城八國陳敬嚴重彭城厚德下邳嬰痾梁節邪惑三藩夙齡黨惟荒忒
