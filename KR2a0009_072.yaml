body:
  text: 後漢書卷六十六陳王列傳第五十六陳蕃字仲舉汝南平輿人也祖河東太守蕃年十五嘗間處一室而庭宇蕪穢父友同郡薛勤來候之謂蕃曰孺子何不灑掃以待賓客蕃曰大丈夫處世當掃除天下安事一室乎勤知其有清世志甚奇之初仕郡舉孝廉除郎中遭母憂𠫓廾官行喪服闋刺史周景辟別駕從事以諫爭不合投傳而去後公府辟舉方正皆不就太尉李固表薦徵拜議郎再遷為樂安太守時李膺為青州刺史名有威政屬城聞風皆自引去蕃獨以清績留郡人周璆高潔之士前後郡守招命莫肯至唯蕃能致焉字而不名特為置一榻去則縣之璆字孟玉臨濟人有美名民有趙宣葬親而不閉埏隧因居其中行服二十餘年鄉邑稱孝州郡數禮請之郡內以薦蕃蕃與相見問及妻子而宣五子皆服中所生蕃大怒曰聖人制禮賢者俯就不肖企及且祭不欲數以其易黷故也況乃寢宿冢藏而孕育其中誑時惑衆誣汙鬼神乎遂致其罪大將軍梁冀威震天下時遣書詣蕃有所請託不得通使者詐求謁蕃怒笞殺之坐左轉修武令稍遷拜尚書時零陵桂陽山賊為害公卿議遣討之又詔下州郡一切皆得舉孝廉茂才蕃上疏駮之曰昔高祖創業萬邦息肩撫養百姓同之赤子今二郡之民亦陛下赤子也致令赤子為害豈非所在貪虐使其然乎宜嚴勑三府隱核牧守令長其有在政失和侵暴百姓者即便舉奏更選清賢奉公之人能班宣法令情在愛惠者可不勞王師而羣賊弭息矣又三署郎吏二千餘人三府掾屬過限未除但當擇善而授之簡惡而去之豈煩一切之詔以長請屬之路乎以此忤左右故出為豫章太守性方峻不接賓客士民亦畏其高徵為尚書令送者不出郭門遷大鴻臚會白馬令李雲抗疏諫桓帝怒當伏重誅蕃上書救雲坐免歸田里復徵拜議郎數日遷光祿勳時封賞踰制內寵猥盛蕃乃上疏諫曰臣聞有事社稷者社稷是為有事人君者容悅是為今臣蒙恩聖朝備位九列見非不諫則容悅也夫諸侯上象四七垂耀在天下應分土藩屏上國高祖之約非功臣不侯而聞追録河南尹鄧萬世父遵之微功更爵尚書令黃俊先人之絶封近習以非義授邑左右以無功傳賞授位不料其任裂土莫紀其功至乃一門之內侯者數人故緯象失度陰陽謬序稼用不成民用不康臣知封事已行言之無及誠欲陛下從是而止又比年收斂十傷五六萬人飢寒不聊生活而采女數千食肉衣綺脂油粉黛不可資計鄙諺言盜不過五女門以女貧家也今後宮之女豈不貧國乎是以傾宮嫁而天下化楚女悲而西宮災且聚而不御必生憂悲之感以致并隔水旱之困夫獄以禁止姦違官以稱才理物若法虧於平官失其人則王道有缺而令天下之論皆謂獄由怨起爵以賄成夫不有臭穢則蒼蠅不飛陛下宜採求失得擇從忠善尺一選舉委尚書三公使褒責誅賞各有所歸豈不幸甚帝頗納其言為出宮女五百餘人但賜俊爵關內侯而萬世南鄉侯延熹六年車駕幸廣城成校獵蕃上疏諫曰臣聞人君有事於苑囿唯仲秋西郊順時講武殺禽助祭以敦孝敬如或違此則為肆縱故皋陶戒舜無教逸遊周公戒成王無槃于遊田虞舜成王猶有此戒況德不及二主者乎夫安平之時尚宜有節況當今之世有三空之厄哉田野空朝廷空倉庫空是謂三空加兵戎未戢四方離散是陛下焦心毀顏坐以待旦之時也豈宜揚旗曜武騁心輿馬之觀乎又前秋前多雨民始種麥今失其勸種之時而令給驅禽除路之役非賢聖恤民之意也齊景公欲觀於海放乎琅邪晏子為陳百姓惡聞旌旗輿馬之音舉首嚬眉之感景公為之不行周穆王欲肆車轍馬跡祭公謀父為誦祈招之詩以止其心誠惡逸遊之害人也書奏不納自蕃為光祿勳與五官中郎將黃琬共典選舉不偏權富而為藝家郎所譖訴坐免歸頃之徵為尚僕射轉太中大夫八年代楊秉為太尉蕃讓曰不愆不忘率由舊章臣不如太常胡廣齊七政訓五典臣不如議郎王暢聰明亮達文武兼姿臣不如薥刑徒李膺帝不許中常侍蘇康管霸等復被任用遂排陷忠良共相阿媚大司農劉祐廷尉馮緄河南尹李膺皆以忤旨為之抵罪蕃因朝會固理膺等請加原宥升之爵任言及反覆誠辭懇切帝不聽因流涕而起時小黃門趙津南陽大猾張汜泛等奉事中官乘藝犯法二郡太守劉成考案其罪雖經赦令而並竟考殺之宦官怨恚有司承旨遂奏罪當𠫓廾市又山陽太守翟超沒入中常侍侯覽財産東海相黃浮誅殺下邳令徐宣超浮並坐髡鉗輸作左校蕃與司徒劉矩司空劉茂共諫請超浮等帝不悅有司劾奏之矩茂不敢復言蕃乃獨上疏曰臣聞齊桓修霸務為內政春秋於魯小惡必書宜先自整勑後以及人今寇賊在外四支之疾內政不理心腹之患臣寢不能寐食不能飽實憂左右日親忠言以疏內患漸積外難方深陛下超從列侯繼承天位小家畜産百萬之資子孫尚恥愧失其先業況乃産兼天下受之先帝而欲懈怠以自輕忽乎誠不愛己不當念先帝得之勤苦邪前梁氏五族毒遍海內天啓聖意收而戮之天下之議冀當小平明鑒未遠覆車如昨而近習之權復相扇結小黃門趙津大猾張汜泛等肆行貪虐姦媚左右前太原太守劉南陽太守成糾而戮之雖言赦後不當誅殺原其誠心在乎去惡至於陛下有何悁悁而小人道長營惑聖聽遂使天威為之發怒如加刑謫已為過甚況乃重罰令伏歐刀乎又前山陽太守翟超東海相黃浮奉公不橈疾惡如讎超沒侯覽財物浮誅徐宣之罪並蒙刑坐不逢赦恕覽之從橫沒財已幸宣犯釁過死有餘辜昔丞相申屠嘉召責鄧通洛陽令董宣折辱公主而文帝從而請之光武加以重賞未聞二臣有專命之誅而今左右羣豎惡傷黨類妄相交搆致此刑譴聞臣是言當復啼訴陛下深宜割塞近習豫政之源引納尚書朝省之事公卿大官五日一朝簡練清高斥黜佞邪如是天和於上地洽於下休禎符瑞豈遠乎哉陛下雖厭毒臣言凡人主有自勉強敢以死陳帝得奏愈怒竟無所納朝廷衆庶莫不怨之宦官由此疾蕃彌甚選舉奏議輒以中詔譴卻長吏史已下多至抵罪猶以蕃名臣不敢加害字文理高唐人字幼平陝人並有經術稱處位敢直言多所搏擊知名當時皆死於獄中九年李膺等以黨事下獄考實蕃因上疏極諫曰臣聞賢明之君委心輔佐亡國之主諱聞直辭故湯武雖聖而興於伊呂桀紂迷惑亡在失人由此言之君為元首臣為股肱同體相須共成美惡者也伏見前司隸校尉李膺太僕杜密太尉掾范滂等正身無玷死心社稷以忠忤旨橫加考案或禁錮閉隔或死徙非所杜塞天下之口聾盲一世之人與秦焚書坑儒何以為異昔武王克殷表閭封墓今陛下臨政先誅忠賢遇善何薄待惡何優夫讒人似實巧言如簧使聽之者惑視之者昏夫吉凶之效存乎識善成敗之機在於察言人君者攝天地之政秉四海之維舉動不可以違聖法進退不可以離道規謬言出口則亂及八方何況髡無罪於獄殺無辜於市乎昔禹巡狩蒼梧見市殺人下車而哭之曰萬方有罪在豫一人故其興也勃焉又青徐炎旱五穀損傷民物流遷茹菽不足而宮女積於房掖國用盡於羅紈外戚私門貪財受賂所謂祿去公室政在大夫昔春秋之末周德衰微數十年閒無復災眚者天所𠫓廾也天之於漢悢悢無已故殷勤示變以悟陛下除妖去孽實在修德臣位列台司憂責深重不敢尸祿惜生坐觀成敗如蒙採録使身首分裂異門而出所不恨也帝諱其言切託以蕃辟召非其人遂策免之永康元年帝崩竇后臨朝詔曰夫民生樹君使司牧之必須良佐以固王業前太尉陳蕃忠清直亮其以蕃為太傅録尚書事時新遭大喪國嗣未立諸尚書畏懼權官託病不朝蕃以書責之曰古人立節事亡如存今帝祚未立政事日蹙諸君奈何委荼蓼之苦息偃在牀於義不足焉得仁乎諸尚書惶怖皆起視事靈帝即位竇太后復優詔蕃曰蓋褒功以勸善表義以厲俗無德不報大雅所歎太傅陳蕃輔弼先帝出內纍年忠孝之美德冠本朝謇愕之操華首彌固今封蕃高陽鄉侯食邑三百戶蕃上疏讓曰使者即臣廬授高陽鄉侯印綬臣誠悼心不知所裁臣聞讓身之文德之昭也然不敢盜以為名竊惟割地之封功德是為臣孰自思省前後歷職無它異能合亦食祿不合亦食祿臣雖無素潔之行竊慕君子不以其道得之不居也若受爵不讓掩面就之使皇天震怒災流下民於臣之身亦何所寄顧惟陛下哀臣朽老戒之在得竇太后不許蕃復固讓章前後十上竟不受封初桓帝欲立所幸田貴人為皇后蕃以田氏卑微竇族良家爭之甚固帝不得已乃立竇后及后臨朝故委用於蕃蕃與后父大將軍竇武同心盡力徵用名賢共參政事天下之士莫不延頸想望太平而帝乳母趙嬈旦夕在太后側中常侍曹節王甫等與共交搆諂事太后太后信之數出詔命有所封拜及其支類多行貪虐蕃常疾之志誅中官會竇武亦有謀蕃自以既從人望而德於太后必謂其志可申乃先上疏曰臣聞言不直而行不正則為欺乎天而負乎人危言極意則羣凶側目禍不旋踵鈞此二者臣寧得禍不敢欺天也今京師囂囂道路喧譁言侯覽曹節公乘昕王甫鄭等與趙夫人諸女尚書並亂天下附從者升進忤逆者中傷方今一朝羣臣如河中木耳泛泛東西耽祿畏害陛下前始攝位順天行誅蘇康管霸並伏其辜是時天地清明人鬼歡喜奈何數月復縱左右元惡大姦莫此之甚今不急誅必生變亂傾危社稷其禍難量願出臣章宣示左右並令天下諸姦知臣疾之太后不納朝廷聞者莫不震恐蕃因與竇武謀之語在武傳及事泄曹節等矯詔誅武等蕃時年七十餘聞難作將官屬諸生八十餘人並拔刃突入承明門攘臂呼曰大將軍忠以衛國黃門反逆何云竇氏不道邪王甫時出與蕃相忤適聞其言而讓蕃曰先帝新𠫓廾天下山陵未成竇武何功兄弟父子一門三侯又多取掖庭宮人作樂飲宴旬月之閒資財億計大臣若此是為道邪公為棟梁枉橈阿黨復焉求賊遂令收蕃蕃拔劒叱甫甫兵不敢近乃益人圍之數十重遂執蕃送黃門北寺獄黃門從官騶踏踧蕃曰死老魅復能損我曹員數奪我曹稟假不即日害之徙其家屬於比景宗族門生故吏皆斥免禁錮蕃友人陳留朱震時為銍令聞而𠫓廾官哭之收葬蕃尸匿其子逸於甘陵界中事覺繫獄合門桎梏震受考掠誓死不言故逸得免後黃巾賊起大赦黨人乃追還逸官至魯相震字伯厚初為州從事奏濟陰太守單匡臧罪并連匡兄中常侍車騎將軍超桓帝收匡下廷尉以譴超超詣獄謝三府諺曰車如雞栖馬如狗疾惡如風朱伯厚論曰桓靈之世若陳蕃之徒咸能樹立風聲抗論惛俗而驅馳嶮之中與刑人腐夫同朝爭衡終取滅亡之禍者彼非不能潔情志違埃霧也愍夫世士以離俗為高而人倫莫相恤也以遁世為非義故屢退而不去以仁心為己任雖道遠而彌厲及遭際會協策竇武自謂萬世一遇也懍懍乎伊望之業矣功雖不終然其信義足以攜持民心漢世亂而不亡百餘年閒數公之力也王允字子師太原祁人也世仕州郡為冠蓋同郡郭林宗嘗見允而奇之曰王生一日千里王佐才也遂與定交年十九為郡吏時小黃門晉陽趙津貪橫放恣為一縣巨患允討捕殺之而津兄弟諂事宦官因緣譖訴桓帝震怒徵太守劉遂下獄死允送喪還平原終畢三年然後歸家復還仕郡人有路佛者少無名行而太守王球召以補吏允犯顏固爭球怒收允欲殺之刺史鄧盛聞而馳傳辟為別駕從事允由是知名而路佛以之廢𠫓廾允少好大節有志於立功常習誦經傳朝夕試馳射三公並辟以司徒高第為侍御史中平元年黃巾賊起特選拜豫州刺史辟荀爽孔融等為從事上除禁黨討擊黃巾別帥大破之與左中郎將皇甫嵩右中郎將朱儶等受降數十萬於賊中得中常侍張讓賓客書疏與黃巾交通允具發其姦以狀聞靈帝責怒讓讓叩頭陳謝竟不能罪之而讓懷協忿怨以事中允明年遂傳下獄會赦還復刺史旬日閒復以它罪被捕司徒楊賜以允素高不欲使更楚辱乃遣客謝之曰君以張讓之事故一月再徵凶慝難量幸為深計又諸從事好氣決者共流涕奉藥而進之允厲聲曰吾為人臣獲罪於君當伏大辟以謝天下豈有乳藥求死乎投杯而起出就檻車既至廷尉左右皆促其事朝臣莫不歎息大將軍何進太尉袁隗司徒楊賜共上疏請之曰夫內視反聽則忠臣竭誠寬賢矜能則義士厲節是以孝文納馮唐之說晉悼宥魏絳之罪允以特選受命誅逆撫順曾未期月州境澄清方欲列其庸勳請加爵賞而以奉事不當當肆大戮責輕罰重有虧衆望臣等備位宰相不敢寢默誠以允宜蒙三槐之聽以昭忠貞之心書奏得以減死論是冬大赦而允獨不在宥三公咸復為言至明年乃得解釋是時宦者橫暴睚眦觸死允懼不免乃變易名姓轉側河內陳留閒及帝崩乃奔喪京師時大將軍何進欲誅宦官召允與謀事請為從事中郎轉河南尹獻帝即位拜太僕再遷守尚書令初平元年代楊彪為司徒守尚書令如故及董卓遷都關中允悉收斂蘭臺石室圖書祕緯要者以從既至長安皆分別條上又集漢朝舊事所當施用者一皆奏之經籍具存允有力焉時董卓尚留洛陽朝政大小悉委之於允允矯情屈意每相承附卓亦推心不生乖疑故得扶持王室於危亂之中臣主內外莫不倚恃焉允見卓禍毒方深篡逆已兆密與司隸校尉黃琬尚書鄭公業等謀共誅之乃上護羌校尉楊瓚行左將軍事執金吾士孫瑞為南陽太守並將兵出武關道以討袁術為名實欲分路征卓而後拔天子還洛陽卓疑而留之允乃引內瑞為僕射瓚為尚書二年卓還長安録入關之功封允為溫侯食邑五千戶固讓不受士孫瑞說允曰夫執謙守約存乎其時公與董太師並位俱封而獨崇高節豈和光之道邪允納其言乃受二千戶三年春連雨六十餘日允與士孫瑞楊瓚登臺請霽復結前謀瑞曰自歲末以來太陽不照霖雨積時月犯執法彗孛仍見晝陰夜陽霧氣交侵此期應促盡內發者勝幾不可後公其圖之允然其言乃潛結卓將呂布使為內應會卓入賀呂布因刺殺之語在卓傳允初議赦卓部曲呂布亦數勸之既而疑曰此輩無罪從其主耳今若名為惡逆而特赦之適足使其自疑非所以安之之道也呂布又欲以卓財物班賜公卿將校允又不從而素輕布以劒客遇之布亦負其功勞多自誇伐既失意望漸不相平允性剛棱疾惡初懼董卓豺狼故折節圖之卓既殲滅自謂無復患難及在際會每乏溫潤之色杖正持重不循權宜之計是以羣下不甚附之董卓將校及在位者多涼州人允議罷其軍或說允曰涼州人素憚袁氏而畏關東今若一旦解兵關東則必人人自危可以皇甫義真為將軍就領其衆因使留陝以安撫之而徐與關東通謀以觀其變允曰不然關東舉義兵者皆吾徒耳今若距險屯陝雖安涼州而疑關東之心甚不可也時百姓訛言當悉誅涼州人遂轉相恐動其在關中者皆擁兵自守更相謂曰丁彥思蔡伯喈但以董公親厚並尚從坐今既不赦我曹而欲解兵今日解兵明日當復為魚肉矣卓部曲將李傕郭汜等先將兵在關東因不自安遂合謀為亂攻圍長安城陷呂布奔走布駐馬青瑣門外招允曰公可以去乎允曰若蒙社稷之靈上安國家吾之願也如其不獲則奉身以死之朝廷幼少恃我而已臨難苟免吾不忍也努力謝關東諸公勤以國家為念初允以同郡宋翼為左馮翊王宏為右扶風是時三輔民庶熾盛兵穀富實李傕等欲即殺允懼二郡為患乃先徵翼宏宏遣使謂翼曰郭汜李傕以我二人在外故未危王公今日就徵明日俱族計將安出翼曰雖禍福難量然王命所不得避也宏曰義兵鼎沸在於董卓況其黨與乎若舉兵共討君側惡人山東必應之此轉福為福之計也翼不從宏不能獨立遂俱就徵下廷尉傕乃收允及翼宏并殺之允時年五十六長子侍中蓋次子景定及宗族十餘人皆見誅害唯兄子晨陵得脫歸鄉里天子感慟百姓喪氣莫敢收允尸者唯故吏平陵令趙戩𠫓廾官營喪王宏字長文少有氣力不拘細行初為弘農太守考案郡中有事宦官買爵位者雖位至二千石皆掠考收捕遂殺數十人威動鄰界素與司隸校尉胡种有隙及宏下獄种遂迫促殺之宏臨命詬曰宋翼豎儒不足議大計胡种樂人之禍禍將及之种後眠輒見宏以杖擊之因發病數日死後遷都於許帝思允忠節使改殯葬之遣虎賁中郎將奉策弔祭賜東園祕器贈以本官印綬送還本郡封其孫黑為安樂亭侯食邑三百戶士孫瑞字君策扶風人頗有才謀瑞以允自專討董卓之勞故歸功不侯所以獲免於難後為國三老光祿大夫每三公缺楊彪皇甫嵩皆讓位於瑞興平二年從駕東歸為亂兵所殺趙戩字叔茂長陵人性質正多謀初平中為尚書典選舉董卓數欲有所私授戩輒堅拒不聽言色強厲卓怒召將殺之衆人悚栗而戩辭貌自若卓悔謝釋之長安之亂容於荊州劉表厚禮焉及曹操平荊州乃辟之執戩手曰恨相見晚卒相國鍾繇長史論曰士雖以正立亦以謀濟若王允之推董卓而引其權伺其閒而敝其罪當此之時天子懸解矣而終不以猜忤為釁者知者本於忠義之誠也故推卓不為失正分權不為苟冒伺閒不為狙詐及其謀濟意從則歸成於正也贊曰陳蕃蕪室志清天綱人謀雖緝幽運未當言觀殄瘁曷非云亡子師圖難晦心傾節功全元醜身殘餘孽時有隆夷事亦工拙
