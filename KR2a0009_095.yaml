body:
  text: 後漢書卷八十五東夷列傳第七十五王制云東方曰夷夷者柢也言仁而好生萬物柢地而出故天性柔順易以道御至有君子不死之國焉夷有九種曰畎夷于夷方夷黃夷白夷赤夷玄夷風夷陽夷故孔子欲居九夷也昔堯命羲仲宅嵎夷曰暘谷蓋日之所出也夏后氏太康失德夷人始畔自少康已後世服王化遂賓於王門獻其樂舞桀為暴虐諸夷內侵殷湯革命伐而定之至于仲丁藍夷作寇自是或服或畔三百餘年武乙衰敝東夷盛遂分遷淮岱漸居中土及武王滅紂肅慎來獻石砮楛矢管蔡畔周乃招誘夷狄周公征之遂定東夷康王之時肅慎復至後徐夷僭號乃率九夷以伐宗周西至河上穆王畏其方熾乃分東方諸侯命徐偃王主之偃王處潢池東地方五百里行仁義陸地而朝者三十有六國穆王後得驥騄之乘乃使造父御以告楚令伐徐一日而至於是楚文王大舉兵而滅之偃王仁而無權不忍鬬其人故致於敗乃北走彭城武原縣東山下百姓隨之者以萬數因名其山為徐山厲王無道淮夷入寇王命虢仲征之不克宣王復命召公伐而平之及幽王淫亂四夷交侵至齊桓修霸攘而卻焉及楚靈會申亦來豫盟後越遷琅邪與共征戰遂陵暴諸夏侵滅小邦秦并六國其淮泗夷皆散為民戶陳涉起兵天下崩潰燕人衛滿避地朝鮮因王其國百有餘歲武帝滅之於是東夷始通上京王莽篡位貊人寇邊建武之初復來朝貢時遼東太守祭肜威讋北方聲行海表於是濊貊倭韓萬里朝獻故章和已後使聘流通逮永初多難始入寇鈔桓靈失政漸滋曼焉自中興之後四夷來賓雖時有乖畔而使驛不絶故國俗風土可得略記東夷率皆土著喜飲酒歌舞或冠辨衣錦器用俎豆所謂中國失禮求之四夷者也凡蠻夷戎狄總名四夷者猶公侯伯子男皆號諸侯云夫餘國在玄菟北千里南與高句驪東與挹婁西與鮮卑接北有弱水地方二千里本濊地也初北夷索離國王出行其侍兒於後身王還欲殺之侍兒曰前見天上有氣大如雞子來降我因以有身王囚之後遂生男王令置於豕牢豕以口氣噓之不死復徙於馬蘭馬亦如之王以為神乃聽母收養名曰東明東明長而善射王忌其猛復欲殺之東明奔走南至掩水以弓擊水魚鱉皆聚浮水上東明乘之得度因至夫餘而王之焉於東夷之域最為平敞土宜五穀出名馬赤玉貂豽大珠如酸棗以員柵為城有宮室倉庫牢獄其人粗大彊勇而謹厚不為寇鈔以弓矢刀矛為兵以六畜名官有馬加牛加狗加其邑落皆主屬諸加食飲用俎豆會同拜爵洗爵揖讓升降以臘月祭天大會連日飲食歌舞名曰迎鼓是時斷刑獄解囚徒有軍事亦祭天殺牛以蹄占其吉凶行人無晝夜好歌吟音聲不絶其俗用刑嚴急被誅者皆沒其家人為奴婢盜一責十二男女淫皆殺之尤治惡妒婦既殺復尸於山上兄死妻嫂死則有椁無棺殺人殉葬多者以百數其王葬用玉匣漢朝常豫以玉匣付玄菟郡王死則迎取以葬焉建武中東夷諸國皆來獻見二十五年夫餘王遣使奉貢光武厚答報之於是使命歲通至安帝永初五年夫餘王始將步騎七八千人寇鈔樂浪殺傷吏民後復歸附永寧元年乃遣嗣子尉仇台印詣闕貢獻天子賜尉仇台印綬金綵順帝永和元年其王來朝京師帝作黃門鼓吹角抵戲以遣之桓帝延熹四年遣使朝賀貢獻永康元年王夫台將二萬餘人寇玄菟玄菟太守公孫域擊破之斬首千餘級至靈帝熹平三年復奉章貢獻夫餘本屬玄菟獻帝時其王求屬遼東云挹婁古肅慎之國也在夫餘東北千餘里東濱大海南與北沃沮接不知其北所極土地多山險人形似夫餘而言語各異有五穀麻布出赤玉好貂無君長其邑落各有大人處於山林之閒土氣極寒常為穴居以深為貴大家至接九梯好養豕食其肉衣其皮冬以豕膏塗身厚數分以禦風寒夏則裸袒以尺布蔽其前後其人臭穢不潔作廁於中圜之而居自漢興已後臣屬夫餘種衆雖少而多勇力處山險又善射發能入人目弓長四尺力如弩矢用楛長一尺八寸青石為鏃鏃皆施毒中人即死便乘船好寇盜鄰國畏患而卒不能服東夷夫餘飲食類此皆用俎豆唯挹婁獨無法俗最無綱紀者也高句驪在遼東之東千里南與朝鮮濊貊東與沃沮北與夫餘接地方二千里多大山深谷人隨而為居少田業力作不足以自資故其俗節於飲食而好修宮室東夷相傳以為夫餘別種故言語法則多同而跪拜曳一腳行步皆走凡有五族有消奴部絶奴部順奴部灌奴部桂婁部本消奴部為王稍微弱後桂婁部代之其置官有相加對盧沛者古鄒大加主簿優台使者帛衣先人武帝滅朝鮮以高句驪為縣使屬玄菟賜鼓吹伎人其俗淫皆潔淨自喜暮夜輒男女羣聚為倡樂好祠鬼神社稷零星以十月祭天大會名曰東盟其國東有大穴號禭神亦以十月迎而祭之其公會衣服皆錦繡金銀以自飾大加主簿皆著幘如冠幘而無後其小加著折風形如辨無牢獄有罪諸加評議便殺之沒入妻子為奴婢其昏姻皆就婦家生子長大然後將還便稍營送終之具金銀財幣盡於厚葬積石為封亦種松柏其人性凶急有氣力習戰鬬好寇鈔沃沮東濊皆屬焉句驪一名貊耳有別種依小水為居因名曰小水貊出好弓所謂貊弓是也王莽初發句驪兵以伐胸奴其人不欲行彊迫遣之皆亡出塞為寇盜遼西大尹田談追擊戰死莽令其將嚴尤擊之誘句驪侯騶入塞斬之傳首長安莽大說更名高句驪王為下句驪侯於是貊人寇邊愈甚建武八年高句驪遣使朝貢光武復其王號二十三年冬句驪蠶支落大加戴升等萬餘口詣樂浪內屬二十五年春句驪寇右北平漁陽上谷太原而遼東太守祭肜以恩信招之皆復款塞後句驪王宮生而開目能視國人懷之及長勇壯數犯邊境和帝元興元年春復入遼東寇略六縣太守耿夔擊破之斬其渠帥安帝永初五年宮遣使貢獻求屬玄菟元初五年復與濊貊寇玄菟攻華麗城建光元年春幽州刺史馮煥玄菟太守姚光遼東太守蔡諷等將兵出塞擊之捕斬濊貊渠帥獲兵馬財物宮乃遣嗣子遂成將二千餘人逆光等遣使詐降光等信之遂成因據險以遮大軍而潛遣三千人攻玄菟遼東焚城郭殺傷二千餘人於是發廣陽漁陽右北平涿郡屬國三千餘騎同救之而貊人已去夏復與遼東鮮卑八千餘人攻遼隊殺略吏人蔡諷等追擊於新昌戰歿功曹耿耗兵曹掾龍端兵馬掾公孫酺以身扞諷俱沒於陳死者百餘人秋宮遂率馬韓濊貊數千騎圍玄菟夫餘王遣子尉仇台將二萬餘人與州郡力討破之斬首五百餘級是歲宮死子遂成立姚光上言欲因其喪發兵擊之議者皆以為可許尚書陳忠曰宮前桀黠光不能討死而擊之非義也宜遣弔問因責讓前罪赦不加誅取其後善安帝從之明年遂成還漢生口詣玄菟降詔曰遂成等桀逆無狀當斬斷葅醢以示百姓幸會赦令乞罪請降鮮卑濊貊連年寇鈔驅略小民動以千數而裁送數十百人非向化之心也自今已後不與縣官戰鬬而自以親附送生口者皆與贖直縑人四十匹小口半之遂成死子伯固立其後濊貊率服東垂少事順帝陽嘉元年置玄菟郡屯田六部質桓之閒復犯遼東西安平殺帶方令掠得樂浪太守妻子建寧二年玄菟太守耿臨討之斬首數百級伯固降服乞屬玄菟云東沃沮在高句驪蓋馬大山之東東濱大海北與挹婁夫餘南與濊貊接其地東西夾南北長可折方千里土肥美背山向海宜五穀善田種有邑落長帥人性質直彊勇便持矛步戰言語食飲居處衣服有似句驪其葬作大木椁長十餘丈開一頭為戶新死者先假埋之令皮肉盡乃取骨置椁中家人皆共一椁刻木如主生隨死者為數焉武帝滅朝鮮以沃沮地為玄菟郡後為夷貊所侵徙郡於高句驪西北更以沃沮為縣屬樂浪東部都尉至光武罷都尉官後皆以封其渠帥為沃沮侯其土迫小介於大國之閒遂臣屬句驪句驪復置其中大人遂為使者以相監領貴責其租稅貂布魚鹽海中食物發美女為婢妾焉又有北沃沮一名置溝婁去南沃沮八百餘里其俗皆與南同界南接挹婁挹婁人喜乘船寇抄北沃沮畏之每夏輒臧於巖穴至冬船道不通乃下居邑落其耆老言嘗於海中得一布衣其形如中人衣而兩袖長三丈又於岸際見一人乘破船頂中復有面與語不通不食而死又說海中有女國無男人或傳其國有神井窺之輒生子云濊北與高句驪沃沮南與辰韓接東窮大海西至樂浪濊及沃沮句驪本皆朝鮮之地也昔武王封箕子於朝鮮箕子教以禮義田蠶又制八條之教其人終不相盜無門戶之閉婦人貞信飲食以籩豆其後四十餘世至朝鮮侯準自稱王漢初大亂燕齊趙人往避地者數萬口而燕人衛滿擊破準而自王朝鮮傳國至孫右渠元朔元年濊君南閭等畔右渠率二十八萬口詣遼東內屬武帝以其地為蒼海郡數年乃罷至元封三年滅朝鮮分置樂浪臨屯玄菟真番四部郡至昭帝始元五年罷臨屯真番以并樂浪玄菟玄菟復徙居句驪自單單大領已東沃沮濊貊悉屬樂浪後以境土廣遠復分領東七縣置樂浪東部都尉自內屬已後風俗稍薄法禁亦浸多至有六十餘條建武六年省都尉官遂棄領東地悉封其渠帥為縣侯皆歲時朝賀無大君長其官有侯邑君三老耆舊自謂與句驪同種言語法俗大抵相類其人性愚賣心少嗜欲不請丐男女皆衣曲領其俗重山川山川各有部界不得妄相干涉同姓不昏多所忌諱疾病死亡輒捐棄舊宅更造新居知種麻養蠶作綿布曉候星宿豫知年歲豐約常用十月祭天晝夜飲酒歌舞名之為舞天又祠虎以為神邑落有相侵犯者輒相罰責生口牛馬名之為責禍殺人者償死少寇盜能步戰作矛長三丈或數人共持之樂浪弓出其地又多文豹有果下馬海出班魚使來皆獻之韓有三種一曰馬韓二曰辰韓三曰辨辰馬韓在西有五十四國其北與樂浪南與倭接辰韓在東十有二國其北與濊貊接辨辰在辰韓之南亦十有二國其南亦與倭接凡七十八國伯濟是其一國焉大者萬餘戶小者數千家各在山海閒地合方四千餘里東西以海為限皆古之辰國也馬韓最大共立其種為辰王都目支國盡王三韓之地其諸國王先皆是馬韓種人焉馬韓人知田蠶作綿布出大栗如梨有長尾雞尾長五尺邑落雜居亦無城郭作土室形如冢開戶在上不知跪拜無長幼男女之別不貴金寶錦罽不知騎乘牛馬唯重瓔珠以綴衣為飾及縣頸垂耳大率皆魁頭露紒布袍草履其人壯勇少年有築室作力者輒以繩貫脊皮縋以大木嚾呼為健常以五月田竟祭鬼神晝夜酒會羣聚歌舞舞輒數十人相隨踏地為節十月農功畢亦復如之諸國邑各以一人主祭天神號為天君又立蘇塗建大木以縣鈴鼓事鬼神其南界近倭亦有文身者辰韓耆老自言秦之亡人避苦役適韓國馬韓割東界地與之其名國為邦弓為弧賊為寇行酒為行觴相呼為徒有似秦語故或名之為秦韓有城柵屋室諸小別邑各有渠帥大者名臣智次有儉側次有樊秖次有殺奚次有邑借土地肥美宜五穀知蠶桑作縑布乘駕牛馬嫁娶以禮行者讓路國出鐵濊倭馬韓並從巿之凡諸貨貿易皆以鐵為貨俗喜歌舞飲酒鼓瑟兒生欲令其頭扁皆押之以石辨辰與辰韓雜居城郭衣服皆同言語風俗有異其人形皆長大美髮衣服潔清而刑法嚴峻其國近倭故頗有文身者初朝鮮王準為衛滿所破乃將其餘衆數千人走入海攻馬韓破之自立為韓王準後滅絶馬韓人復自立為辰王建武二十年韓人廉斯人蘇馬諟等詣樂浪貢獻光武封蘇馬諟為漢廉斯邑君使屬樂浪郡四時朝謁靈帝末韓濊並盛郡縣不能制百姓苦亂多流亡入韓者馬韓之西海上有州胡國其人短小髡頭衣韋衣有上無下好養牛豕乘船往來貨市韓中倭在韓東南大海中依山為居凡百餘國自武帝滅朝鮮使驛通於漢者三十許國國皆稱王世世傳統其大倭王居邪馬臺國樂浪郡徼去其國萬二千里去其西北界拘邪韓國七千餘里其地大較在會稽東冶之東與朱崖儋耳相近故其法俗多同土宜禾稻麻紵蠶桑知織績為縑布出白珠青玉其山有丹土氣溫冬夏生菜茹無牛馬虎豹羊鵲其兵有矛楯木弓竹矢或以骨為鏃男子皆黥面文身以其文左右大小別尊卑之差其男衣皆橫幅結束相連女人被髮屈紒衣如單被貫頭而著之並以丹朱坌身如中國之用粉也有城柵屋室父母兄弟異處唯會同男女無別飲食以手而用籩豆俗皆徒跣以蹲踞為恭敬人性嗜酒多壽考至百餘歲者甚衆國多女子大人皆有四五妻其餘或兩或三女人不淫不妒又俗不盜竊少爭訟犯法者沒其妻子重者滅其門族其死停喪十餘日家人哭泣不進酒食而等類就歌舞為樂灼骨以卜用決吉凶行來度海令一人不櫛沐不食肉不近婦人名曰持衰若在塗吉利則雇以財物如病疾遭害以為持衰不謹便共殺之建武中元二年倭奴國奉貢朝賀使人自稱大夫倭國之極南界也光武賜以印綬安帝永初元年倭國王帥升等獻生口百六十人願請見桓靈閒倭國大亂更相攻伐歷年無主有一女子名曰卑彌呼年長不嫁事鬼神道能以妖惑衆於是共立為王侍婢千人少有見者唯有男子一人給飲食傳辭語居處宮室樓觀城柵皆持兵守衛法俗嚴峻自女王國東度海千餘里至拘奴國雖皆倭種而不屬女王自女王國南四千餘里至朱儒國人長三四尺自朱儒東南行船一年至裸國黑齒國使驛所傳極於此矣會稽海外有東鯷人分為二十餘國又有夷洲及澶洲傳言秦始皇遣方士徐福將童男女數千人入海求蓬萊神仙不得徐福畏誅不敢還遂止此洲世世相承有數萬家人民時至會稽市會稽東冶縣人有入海行遭風流移至澶洲者所在絶遠不可往來論曰昔箕子違衰殷之運避地朝鮮始其國俗未有聞也及施八條之約使人知禁遂乃邑無淫盜門不夜扃回頑薄之俗就寬略之法行數百千年故東夷通以柔謹為風異乎三方者也苟政之所暢則道義存焉仲尼懷憤以為九夷可居或疑其陋子曰君子居之何陋之有亦徒有以焉爾其後遂通接商賈漸交上國而燕人衛滿擾雜其風於是從而澆異焉老子曰法令滋章盜賊多有若箕子之省文條而用信義其得聖賢作法之原矣贊曰宅是嵎夷曰乃暘谷巢山潛海厥區九族嬴末紛亂燕人違難雜華澆本遂通有漢眇眇偏譯或從或畔
