body:
  text: 後漢書卷五十五章帝八王傳第四十五孝章皇帝八子宋貴人生清河孝王慶梁貴人生和帝申貴人生濟北惠王壽河閒孝王開四王不載母氏千乘貞王伉建初四年封和帝即位以伉長兄甚見尊禮立十五年薨子寵嗣一名伏胡永元七年改國名樂安立二十八年薨是為夷王父子薨于京師皆葬洛陽子鴻嗣安帝崩始就國鴻生質帝質帝立梁太后下詔以樂安國土卑溼租委鮮薄改封鴻封勃海王立二十六年薨是為孝王無子太后立桓帝弟蠡吾侯悝為勃海王奉鴻嗣祀延熹八年悝謀為不道有司請廢之帝不忍乃貶為廮陶王食一縣悝後因中常侍王甫求復國許謝錢五千萬帝臨崩遺詔復為勃海王悝知非甫功不肯還謝錢甫怒陰求其過初迎立靈帝道路流言悝恨不得立欲鈔徵書而中常侍鄭颯中黃門董騰並任俠通剽輕數與悝交通王甫司察以為有姦密告司隸校尉段熲熹平元年遂收颯送北寺獄使尚書令廉忠誣奏颯等謀迎立悝大逆不道遂詔冀州刺史收悝考實又遣大鴻臚持節與宗正廷尉之勃海迫責悝悝自殺妃妾十一人子女七十人伎女二十四人皆死獄中傅相以下以輔導王不忠悉伏誅悝立二十五年國除衆庶莫不憐之平春悼王全以建初四年封其年薨葬於京師無子國除清河孝王慶母宋貴人貴人宋昌八世孫扶風平陵人也父楊以恭孝稱於鄉閭不應州郡之命楊姑即明德馬后之外祖母也馬后聞楊二女皆有才色迎而訓之永平末選入太子宮甚有寵肅宗即位並為貴人建初三年大貴人生慶明年立為皇太子徵楊為議郎襃賜甚渥貴人長於人事供奉長樂宮身埶饋饌太后憐之太后崩後竇皇后寵盛以貴人姊妹並幸慶為太子心內惡之與母比陽主謀陷宋氏外令兄弟求其纖過內使御者偵伺得失後於掖庭門邀遮得貴人書云病思生菟令家求之因誣言欲作蠱道祝詛以菟為厭勝之術日夜毀譖貴人母子遂漸見疏慶出居承祿觀數月竇后諷掖庭令誣奏前事請加驗實七年帝遂廢太子慶而立皇太子梁貴人子也乃下詔曰皇太子有失惑無常之性爰自孩乳至今益章恐襲其母凶惡之風不可以奉宗廟為天下主大義滅親況降退乎今廢慶為清河王皇子保育皇后承訓懷袵導達善性將成其器蓋庶子慈母尚有終身之恩豈若嫡后事正義明哉今以為皇太子遂出貴人姊妹置丙舍使小黃門蔡倫考實之皆承諷旨傅致其事乃載送暴室二貴人同時飲藥自殺帝猶傷之勑掖庭令葬於樊濯聚於是免楊歸本郡郡縣因事復捕繫之楊友人前懷令山陽張峻左馮翊沛國劉均等奔走解釋得以免罪楊失志憔悴卒于家慶時雖幼而知避嫌畏禍言不敢及宋氏帝更憐之勑皇后令衣服與太子齊等太子特親愛慶入則共室出則同輿及太子即位是為和帝待慶尤渥諸王莫得為比常共議私事後慶以長別居丙舍永元四年帝移幸北宮章德殿講於白虎觀慶得入省宿止帝將誅竇氏欲得外戚傳懼左右不敢使乃令慶私從千乘王求夜獨內之又令慶傳語中常侍鄭衆求索故事及大將軍竇憲誅慶出居邸賜奴婢三百人輿馬錢帛帷帳珍寶玩好充仞其第又賜中傅以下至左右錢帛各有差慶多被病或時不安帝朝夕問訊進膳藥所以垂意甚備慶小心恭孝自以廢黜尤畏事慎法每朝謁陵廟常夜分嚴裝衣冠待明約勑官屬不得與諸王車騎競驅常以貴人葬禮有闕每竊感恨至四節伏臘輒祭於私室竇氏誅後始使乳母於城北遙祠及竇太后崩慶求上冢致哀帝許之詔太官四時給祭具慶垂涕曰生雖不獲供養終得奉祭祀私願足矣欲求作祠堂恐有自同恭懷梁后之嫌遂不敢言常泣向左右以為沒齒之恨後上言外祖母王年老遭憂病下土無毉藥願乞詣洛陽療疾於是詔宋氏悉歸京師除慶舅衍俊蓋暹等皆為郎十五年有司以日食陰盛奏遣諸王侯就國詔曰甲子之異責由一人諸王幼稚早離顧復弱冠相育常有蓼莪凱風之哀選懦之恩知非國典且復須留至冬從祠章陵詔假諸王羽林騎各四十人後中傅衞訢私為臧盜千餘萬詔使案理之并責慶不舉之狀慶曰訢以師傅之尊選自聖朝臣愚唯知言從事聽不甚有所糺察帝嘉其對悉以訢臧財賜慶及帝崩慶號泣前殿嘔血數升因以發病明年諸王就國鄧太后特聽清河王置中尉內史賜什物皆取乘輿上御以宋衍等並為清河中大夫慶到國下令寡人生於深宮長於朝廷仰恃明主垂拱受成既以薄祐早離顧復屬遭大憂悲懷感傷蒙恩大國職惟藩輔新去京師憂心煢煢夙夜屏營未知所立蓋聞智不獨理必須明賢今官屬並居爵任失得是均庶望上遵策戒下免悔咎其糺督非枉明察典禁無令孤獲怠慢之罪焉鄧太后以殤帝襁抱遠慮不虞留慶長子祐與嫡母耿姬居清河邸至秋帝崩立祐為嗣是為安帝太后使中黃門送耿姬歸國帝所生母左姬字小娥小娥姊字大娥犍為人也初伯父聖坐妖言伏誅家屬沒官二娥數歲入掖庭及長並有才色小娥善史書喜辭賦和帝賜諸王宮人因入清河第慶初聞其美賞傅母以求之及後幸愛極盛姬妾莫比姊妹皆卒葬於京師慶立凡二十五年乃歸國其年病篤謂宋衍等曰清河埤薄欲乞骸骨於貴人冢傍下棺而已朝廷大恩猶當應有祠室庶母子并食魂靈有所依庇死復何恨乃上書太后曰臣國土下溼願乞骸骨下從貴人於樊濯雖歿且不朽矣及今口目尚能言視冒昧干請命在呼吸願蒙哀憐遂薨年二十九遣司空持節與宗正奉弔祭又使長樂謁者僕射中謁者二人副護喪事賜龍旂九旒虎賁百人儀比東海恭王太后使掖庭丞送左姬喪與王合葬廣丘子愍王虎威嗣永初元年太后封宋衍為盛鄉侯分清河為二國封慶少子常保為廣川王子女十一人皆為鄉公主食邑奉明年常保薨無子國除虎威立三年薨亦無子鄧太后復立樂安王寵子延平為清河王是為恭王太后崩有司上言清河孝王至德淳懿載育明聖承天奉祚為郊廟主漢興高皇帝尊父為太上皇宣帝號父為皇考序昭穆置園邑太大宗之義舊章不忘宜上尊號曰孝德皇皇妣左氏曰孝德后孝德皇母宋貴人追謚曰敬隱后乃告祠高廟使司徒持節與大鴻臚奉策書璽綬之清河追上尊號又遣中常侍奉太牢祠典護禮儀侍中劉珍等及宗室列侯皆往會事尊陵曰甘陵廟曰昭廟置令丞設兵車周衞比章陵復以廣川益清河國尊耿姬為甘陵大貴人又封女弟侍男為涅陽長公主別得為舞陰長公主久長為濮陽長公主直得為平氏長公主餘七主並早卒故不及進爵追贈敬隱后女弟小貴人印綬追封謚宋楊為當陽穆侯楊四子皆為列侯食邑各五千戶宋氏為卿校侍中大夫謁者郎吏十餘人孝德后異母弟次及達生二人諸子九人皆為清河國郎中耿貴人者牟平侯舒之孫也貴人兄寶襲封牟平侯帝以寶嫡舅寵遇甚渥位至大將軍事已見耿舒傳延平立三十五年薨子蒜嗣冲帝崩徵蒜詣京師將議為嗣會大將軍梁冀與梁太后立質帝罷歸國蒜為人嚴重動止有度朝臣太尉李固等莫不歸心焉初中常侍曹騰謁蒜蒜不為禮宦者由此惡之及帝崩公卿皆正議立蒜而曹騰說梁冀不聽遂立桓帝語在李固傳蒜由此得罪建和元年甘陵人劉文與南郡妖賊劉鮪交通訛言清河王當統天子欲共立蒜事發覺文等遂劫清河相謝暠將至王宮司馬門曰當立王為天子暠為公暠不聽罵之文因刺殺暠於是捕文鮪誅之有司因劾奏蒜坐貶爵為尉氏侯徙桂陽自殺立三年國絕梁冀惡清河名明年乃改為甘陵梁太后立安平孝王子經侯理為甘陵王奉孝德皇祀是為威王理立二十五年薨子貞王定嗣定立四年薨子獻王忠嗣黃巾賊起忠為國人所執既而釋之靈帝以親親故詔復忠國忠立十三年薨嗣子為黃巾所害建安十一年以無後國除濟北惠王壽母申貴人潁川人也世吏二千石貴人年十三入掖庭壽以永元二年封分太山郡為國和帝遵肅宗故事兄弟皆留京師恩寵篤密有司請遣諸王歸藩不忍許之及帝崩乃就國永初元年鄧太后封壽舅申轉為新亭侯壽立三十一年薨自永初已後戎狄叛亂國用不足始封王薨減賻錢為千萬布萬匹嗣王薨五百萬布五千匹時唯壽最尊親特賻錢三千萬布三萬匹子節王登嗣永寧元年封登弟五人為鄉侯皆別食太山邑登立十五年薨子哀王多嗣多立三年薨無子永和四年立戰鄉侯安國為濟北王是為釐王安國立十七年薨子孝王次嗣本初元年封次弟猛為亭侯次九歲喪父至孝建和元年梁太后下詔曰濟北王次以幼年守藩躬履孝道父沒哀慟焦毀過禮草廬土席衰杖在身頭不枇沐體生瘡腫諒闇已來二十八月自諸國有憂未之聞也朝廷甚嘉焉書不云乎用德章厥善詩云孝子不匱永錫爾類今增次封五千戶廣其土宇以慰孝子惻隱之勞次立十七年薨子鸞嗣鸞薨子政嗣政薨無子建安十一年國除河閒孝王開以永元二年封分樂成勃海涿郡為國延平元年就國開奉遵法度吏人敬之永寧元年鄧太后封開子翼為平原王奉懷王勝祀子德為安平王奉樂成王黨祀開立四十二年薨子惠王政嗣政佷不奉法憲順帝以侍御史吳郡沈景有彊能稱故擢為河閒相景到國謁王王不正服箕踞殿上侍郎贊拜景峙不為禮問王所在虎賁曰是非王邪景曰王不服常人何別今相謁王豈謁無禮者邪王慙而更服景然後拜出住宮門外請王傅責之曰前發京師陛下見受詔以王不恭使檢督諸君空受爵祿而無訓導之義因奏治罪詔書讓政而詰責傅景因捕諸姦人上案其罪殺戮尤惡者數十人出冤獄百餘人政遂為改節悔過自脩陽嘉元年封政弟十三人皆為亭侯政立十年薨子貞王建嗣建立十年薨子安王利嗣利立二十八年薨子陔嗣陔立四十一年魏受禪以為崇德侯蠡吾侯翼元初六年鄧太后徵濟北河閒王諸子詣京師奇翼美儀容故以為平原懷王後焉留在京師歲餘太后崩安帝乳母王聖與中常侍江京等譖鄧騭兄弟及翼云與中大夫趙王謀圖不軌闚覦神器懷大逆心貶為都鄉侯遣歸河閒翼於是謝賓客閉門自處永建五年父開上書願分蠡吾縣以封翼順帝從之翼卒子志嗣為大將軍梁冀所立是為桓帝梁太后詔追尊河閒孝王為孝穆皇夫人趙氏曰孝穆后廟曰清廟陵曰樂成陵蠡吾先侯曰孝崇皇廟曰烈廟陵曰博陵皆置令丞使司徒持節奉策書璽綬祠以太牢建和二年更封帝兄弟都鄉侯碩為平原王留博陵奉翼後尊翼夫人馬氏為孝崇博園貴人以涿郡之良鄉故安河閒之蠡吾三縣為湯沐邑碩嗜酒多過失帝令馬貴人領王家事建安十一年國除解瀆亭侯淑以河閒孝王子封淑卒子長萇嗣長萇卒子宏嗣為大將軍竇武所立是為靈帝建寧元年竇太后詔追尊皇祖淑為孝元皇夫人夏氏曰孝元后陵曰敦陵廟曰靖廟皇考長為孝仁皇夫人董氏為慎園貴人陵曰慎陵廟曰奐廟皆置令丞使司徒持節之河閒奉策書璽綬祠以太牢常以歲時遣中常侍持節之河閒奉祠熹平三年使使拜河閒安王利子康為濟南王奉孝仁皇祀康薨子贇嗣建安十二年為黃巾賊所害子開嗣立十三年魏受禪以為崇德侯城陽懷王淑以永元二年分濟陰為國立五年薨葬於京師無子國除還并濟陰廣宗殤王萬歲以永元五年封分鉅鹿為國其年薨葬於京師無子國除還并鉅鹿平原懷王勝和帝長子也不載母氏少有痼疾延平元年封立八年薨葬於京師無子鄧太后立樂安夷王寵子得為平原王奉勝後是為哀王得立六年薨無子永寧元年太后又立河閒王開子都鄉侯翼為平原王嗣安帝廢之國除論曰傳稱吳子夷昧甚德而度有吳國者必其子孫章帝長者事從敦厚繼祀漢室咸其苗裔古人之言信哉贊曰章祚不已本枝流祉質惟伉孫安亦慶子河閒多福桓靈承祀濟北無驕皇恩寵饒平原抱痼三王薨朝振振子孫或秀或苗
