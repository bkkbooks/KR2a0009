body:
  text: 李陳龐陳橋列傳第四十一李恂李恂字叔英安定臨涇人也少習韓詩教授諸生常數百人太守潁川李鴻請署功曹未及到而州辟為從事會鴻卒恂不應州命而送鴻喪還鄉里既葬留起冢墳持喪三年辟司徒桓虞府後拜侍御史持節使幽州宣布恩澤慰撫北狄所過皆圖寫山川屯田聚落百餘卷悉封奏上肅宗嘉之拜兗州刺史以清約率下常席羊皮服布被遷張掖太守有威重名時大將軍竇憲將兵屯武威天下州郡遠近莫不修禮遺恂奉公不阿為憲所奏免後復徵拜謁者使持節領西域副校尉西域殷富多珍寶諸國侍子及督使賈胡數遺恂奴婢宛馬金銀香罽之屬一無所受北匈奴數斷西域車師伊吾隴沙以西使命不得通恂設購賞遂斬虜帥縣首軍門自是道路夷清威恩並行遷武威太守後坐事免步歸鄉里潛居山澤結草為廬獨與諸生織席自給會西羌反畔恂到田舍為所執獲羌素聞其名放遣之恂因詣洛陽謝時歲荒司空張敏司徒魯恭等各遣子饋糧悉無所受徙居新安關下拾橡實以自資年九十六卒陳禪陳禪字紀山巴郡安漢人也仕郡功曹舉善黜惡為邦內所畏察孝廉州辟治中從事時刺史為人所上受納臧賂禪當傳考無它所齎但持喪斂之具而已及至笞掠無算五毒畢加禪神意自若辭對無變事遂散釋車騎將軍鄧騭聞其名而辟焉舉茂才時漢中蠻夷反畔以禪為漢中太守夷賊素聞其名聲即時降服遷左馮翊入拜諫議大夫永寧元年西南夷撣國王獻樂及幻人能吐火自支解易牛馬頭明年元會作之於庭安帝與群臣共觀大奇之禪獨離席舉手大言曰昔齊魯為夾谷之會齊作侏儒之樂仲尼誅之又曰放鄭聲遠佞人帝王之庭不宜設夷狄之技尚書陳忠劾奏禪曰古者合歡之樂舞於堂四夷之樂陳於門故詩云以雅以南韎任朱離今撣國越流沙踰縣度萬里貢獻非鄭衛之聲佞人之比而禪廷訕朝政請劾禪下獄有詔勿收左轉為玄菟候城障尉詔敢不之官上妻子從者名禪既行朝廷多訟之會北匈奴入遼東追拜禪遼東太守胡憚其威彊退還數百里禪不加兵但使吏卒往曉慰之單于隨使還郡禪於學行禮為說道義以感化之單于懷服遺以胡中珍貨而去及鄧騭誅廢禪以故吏免復為車騎將軍閻顯長史順帝即位遷司隸校尉明年卒於官子澄有清名官至漢中太守禪曾孫寶亦剛壯有禪風為州別駕從事顯名州里龐參龐參字仲達河南緱氏人也初仕郡未知名河南尹龐奮見而奇之舉為孝廉拜左校令坐法輸作若盧永初元年涼州先零種羌反畔遣車騎將軍鄧騭討之參於徒中使其子俊上書曰方今西州流民擾動而徵發不絕水潦不休地力不復重之以大軍疲之以遠戍農功消於轉運資財竭於徵發田疇不得墾闢禾稼不得收入搏手困窮無望來秋百姓力屈不復堪命臣愚以為萬里運糧遠就羌戎不若總兵養眾以待其疲車騎將軍騭宜且振旅留征西校尉任尚使督涼州士民轉居三輔休徭役以助其時止煩賦以益其財令男得耕種女得織紝然後畜精銳乘懈沮出其不意攻其不備則邊人之仇報奔北之恥雪矣書奏會御史中丞樊準上疏薦參曰臣聞鷙鳥累百不如一鶚昔孝文皇帝悟馮唐之言而赦魏尚之罪使為邊守匈奴不敢南向夫以一臣之身折方面之難者選用得也臣伏見故左校令河南龐參勇謀不測卓爾奇偉高才武略有魏尚之風前坐微法輸作經時今羌戎為患大軍西屯臣以為如參之人宜在行伍惟明詔採前世之舉觀魏尚之功免赦參刑以為軍鋒必有成效宣助國威鄧太后納其言即擢參於徒中召拜謁者使西督三輔諸軍屯而徵鄧騭還四年羌寇轉盛兵費日廣且連年不登穀石萬餘參奏記於鄧騭曰比年羌寇特困隴右供徭賦役為損日滋官負人責數十億萬今復募發百姓調取穀帛衒賣什物以應吏求外傷羌虜內困徵賦遂乃千里轉糧遠給武都西郡塗路傾阻難勞百端疾行則鈔暴為害遲進則穀食稍損運糧散於曠野牛馬死於山澤縣官不足輒貸於民民已窮矣將從誰求名救金城而實困三輔三輔既困還復為金城之禍矣參前數言宜棄西域乃為西州士大夫所笑今苟貪不毛之地營恤不使之民暴軍伊吾之野以慮三族之外果破涼州禍亂至今夫拓境不寧無益於疆多田不耕何救飢敝故善為國者務懷其內不求外利務富其民不貪廣土三輔山原曠遠民庶稀疏故縣丘城可居者多今宜徙邊郡不能自存者入居諸陵田戍故縣孤城絕郡以權徙之轉運遠費聚而近之徭役煩數休而息之此善之善者也騭及公卿以國用不足欲從參議眾多不同乃止拜參為漢陽太守郡人任棠者有奇節隱居教授參到先候之棠不與言但以薤一大本水一盂置戶屏前自抱孫兒伏於戶下主簿白以為倨參思其微意良久曰棠是欲曉太守也水者欲吾清也拔大本薤者欲吾擊強宗也抱兒當戶欲吾開門恤孤也於是歎息而還參在職果能抑強助弱以惠政得民元初元年遷護羌校尉畔羌懷其恩信明年燒當羌種號多等皆降始復得還都令居通河西路時先零羌豪僭號北地詔參將降羌及湟中義從胡七千人與行征西將軍司馬鈞期會北地擊之參於道為羌所敗既已失期乃稱病引兵還坐以詐疾徵下獄校書郎中馬融上書請之曰伏見西戎反畔寇鈔五州陛下愍百姓之傷痍哀黎元之失業單竭府庫以奉軍師昔周宣獫狁侵鎬及方孝文匈奴亦略上郡而宣王立中興之功文帝建太宗之號非惟兩主有明叡之姿抑亦扞城有虓虎之助是以南仲赫赫列在周詩亞夫赳赳載於漢策竊見前護羌校尉龐參文武昭備智略弘遠既有義勇果毅之節兼以博雅深謀之姿又度遼將軍梁慬前統西域勤苦數年還留三輔功效克立閒在北邊單于降伏今皆幽囚陷於法網昔荀林父敗績於邲晉侯使復其位孟明視喪師於崤秦伯不替其官故晉景并赤狄之土秦穆遂霸西戎宜遠覽二君使參慬得在寬宥之科誠有益於折衝毗佐於聖化書奏赦參等後以參為遼東太守永建元年遷度遼將軍四年入為大鴻臚尚書僕射虞詡薦參有宰相器能以為太尉錄尚書事是時三公之中參名忠直數為左右所陷毀以所舉用忤帝旨司隸承風案之時當會茂才孝廉參以被奏稱疾不得會上計掾廣漢段恭因會上疏曰伏見道路行人農夫織婦皆曰太尉龐參竭忠盡節徒以直道不能曲心孤立群邪之閒自處中傷之地臣猶冀在陛下之世當蒙安全而復以讒佞傷毀忠正此天地之大禁人主之至誡昔白起賜死諸侯酌酒相賀季子來歸魯人喜其紓難夫國以賢化君以忠安今天下咸欣陛下有此忠賢願卒寵任以安社稷書奏詔即遣小黃門視參疾太醫致羊酒後參夫人疾前妻子投於井而殺之參素與洛陽令祝良不平良聞之率吏卒入太尉府案實其事乃上參罪遂因災異策免有司以良不先聞奏輒折辱宰相坐繫詔獄良能得百姓心洛陽吏人守闕請代其罪者日有數千萬人詔乃原刑陽嘉四年復以參為太尉永和元年以久病罷卒於家陳龜陳龜字叔珍上黨泫氏人也家世邊將便習弓馬雄於北州龜少有志氣永建中舉孝廉五遷五原太守永和五年拜使匈奴中郎將時南匈奴左部反亂龜以單于不能制下外順內畔促令自殺坐徵下獄免後再遷拜京兆尹時三輔強豪之族多侵枉小民龜到厲威嚴悉平理其怨屈者郡內大悅會羌胡寇邊殺長吏驅略百姓桓帝以龜世諳邊俗拜為度遼將軍龜臨行上疏曰臣龜蒙恩累世馳騁邊垂雖展鷹犬之用頓斃胡虜之庭魂骸不返薦享狐狸猶無以塞厚責荅萬分也臣至頑駑器無鈆刀一割之用過受國恩榮秩兼優生年死日永懼不報臣聞三辰不軌擢士為相蠻夷不恭拔卒為將臣無文武之才而忝鷹揚之任上慚聖明下懼素餐雖歿軀體無所云補今西州邊鄙土地塉埆鞍馬為居射獵為業男寡耕稼之利女乏機杼之饒守塞候望懸命鋒鏑聞急長驅去不圖反自頃年以來匈奴數攻營郡殘殺長吏侮略良細戰夫身膏沙漠居人首係馬鞍或舉國掩戶盡種灰滅孤兒寡婦號哭空城野無青草室如懸磬雖含生氣實同枯朽往歲并州水雨災螟互生稼穡荒耗租更空闕老者慮不終年少壯懼於困戹陛下以百姓為子品庶以陛下為父焉可不日昃勞神垂撫循之恩哉唐堯親舍其子以禪虞舜者是欲民遭聖君不令遇惡主也故古公杖策其民五倍文王西伯天下歸之豈復輿金輦寶以為民惠乎近孝文皇帝感一女子之言除肉刑之法體德行仁為漢賢主陛下繼中興之統承光武之業臨朝聽政而未留聖意且牧守不良或出中官懼逆上旨取過目前呼嗟之聲招致災害胡虜凶悍因衰緣隙而令倉庫單於豺狼之口功業無銖兩之效皆由將帥不忠聚姦所致前涼州刺史祝良初除到州多所糾罰太守令長貶黜將半政未踰時功效卓然實應賞異以勸功能改任牧守去斥姦殘又宜更選匈奴烏桓護羌中郎將校尉簡練文武授之法令除并涼二州今年租更寬赦罪隸埽除更始則善吏知奉公之祐惡者覺營私之禍胡馬可不窺長城塞下無候望之患矣帝覺悟乃更選幽并刺史自營郡太守都尉以下多所革易下詔為陳將軍除并涼一年租賦以賜吏民龜既到職州郡重足震慄鮮卑不敢近塞省息經用歲以億計大將軍梁冀與龜素有隙譖其沮毀國威挑取功譽不為胡虜所畏坐徵還遂乞骸骨歸田里復徵為尚書冀暴虐日甚龜上疏言其罪狀請誅之帝不省自知必為冀所害不食七日而死西域胡夷并涼民庶咸為舉哀弔祭其墓橋玄橋玄字公祖梁國雎陽人也七世祖仁從同郡戴德學著禮記章句四十九篇號曰橋君學成帝時為大鴻臚祖父基廣陵太守父肅東萊太守玄少為縣功曹時豫州刺史周景行部到梁國玄謁景因伏地言陳相羊昌罪惡乞為部陳從事窮案其姦景壯玄意署而遣之玄到悉收昌賓客具考臧罪昌素為大將軍梁冀所厚冀為馳檄救之景承旨召玄玄還檄不發案之益急昌坐檻車徵玄由是著名舉孝廉補洛陽左尉時梁不疑為河南尹玄以公事當詣府受對恥為所辱棄官還鄉里後四遷為齊相坐事為城旦刑竟徵再遷上谷太守又為漢陽太守時上邽令皇甫禎有臧罪玄收考髡笞死于冀市一境皆震郡人上邽姜岐守道隱居名聞西州玄召以為吏稱疾不就玄怒敕督郵尹益逼致之曰岐若不至趣嫁其母益固爭不能得遽曉譬岐岐堅臥不起郡內士大夫亦競往諫玄乃止時頗以為譏後謝病免復公車徵為司徒長史拜將作大匠桓帝末鮮卑南匈奴及高句驪嗣子伯固並畔為寇鈔四府舉玄為度遼將軍假黃鉞玄至鎮休兵養士然後督諸將守討擊胡虜及伯固等皆破散退走在職三年邊境安靜靈帝初徵入為河南尹轉少府大鴻臚建寧三年遷司空轉司徒素與南陽太守陳球有隙及在公位而薦球為廷尉玄以國家方弱自度力無所用乃稱疾上疏引眾災以自劾遂策罷歲餘拜尚書令時大中大夫蓋升與帝有舊恩前為南陽太守臧數億以上玄奏免升禁錮沒入財賄帝不從而遷升侍中玄託病免拜光祿大夫光和元年遷太尉數月復以疾罷拜太中大夫就醫里舍玄少子十歲獨游門次卒有三人持杖劫執之入舍登樓就玄求貨玄不與有頃司隸校尉陽球率河南尹洛陽令圍守玄家球等恐并殺其子未欲迫之玄瞋目呼曰姦人無狀玄豈以一子之命而縱國賊乎促令兵進於是攻之玄子亦死玄乃詣闕謝罪乞下天下凡有劫質皆并殺之不得贖以財寶開張姦路詔書下其章初自安帝以後法禁稍弛京師劫質不避豪貴自是遂絕玄以光和六年卒時年七十五玄性剛急無大體然謙儉下士子弟親宗無在大官者及卒家無居業喪無所殯當時稱之初曹操微時人莫知者嘗往候玄玄見而異焉謂曰今天下將亂安生民者其在君乎操嘗感其知己及後經過玄墓輒悽愴致祭自為其文曰故太尉橋公懿德高軌汎愛博容國念明訓士思令謨幽靈潛翳𢤧哉緬矣操以幼年逮升堂室特以頑質見納君子增榮益觀皆由獎勗猶仲尼稱不如顏淵李生厚歎賈復士死知己懷此無忘又承從容約誓之言徂沒之後路有經由不以斗酒隻雞過相沃酹車過三步腹痛勿怨雖臨時戲笑之言非至親之篤好何肯為此辭哉懷舊惟顧念之悽愴奉命東征屯次鄉里北望貴土乃心陵墓裁致薄奠公其享之玄子羽官至任城相論曰任棠姜岐世著其清結甕牖而辭三命殆漢陽之幽人乎龐參躬求賢之禮故民悅其政橋玄厲邦君之威而眾失其情夫豈力不足歟將有道在焉如令其道可忘則彊梁勝矣語曰三軍可奪帥匹夫不可奪志子貢曰寧喪千軍不失士心昔段干木踰牆而避文侯之命泄柳閉門不納穆公之請貴必有所屈賤亦有所申矣贊曰李叟勤身甘飢辭饋禪為君隱之死靡貳龜習邊功參起徒中橋公識運先覺時雄
