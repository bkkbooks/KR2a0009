body:
  text: 百官三宗正宗正卿一人中二千石本注曰掌序錄王國嫡庶之次及諸宗室親屬遠近郡國歲因計上宗室名籍若有犯法當髡以上先上諸宗正宗正以聞乃報決丞一人比千石諸公主每主家令一人六百石丞一人三百石本注曰其餘屬吏增減無常右屬宗正本注曰中興省都司空令丞大司農大司農卿一人中二千石本注曰掌諸錢穀金帛諸貨幣郡國四時上月旦見錢穀簿其逋未畢各具別之邊郡諸官請調度者皆為報給損多益寡取相給足丞一人比千石部丞一人六百石本注曰部丞主帑藏太倉令一人六百石本注曰主受郡國傳漕穀丞一人平準令一人六百石本注曰掌知物賈主練染作采色丞一人導官令一人六百石本注曰主舂御米及作乾糒導擇也丞一人右屬大司農本注曰郡國鹽官鐵官本屬司農中興皆屬郡縣又有廩犧令六百石掌祭祀犧牲雁鶩之屬及雒陽市長滎陽敖倉官中興皆屬河南尹餘均輸等皆省少府少府卿一人中二千石本注曰掌中服御諸物衣服寶貨珍膳之屬丞一人比千石太醫令一人六百石本注曰掌諸醫藥丞方丞各一人本注曰藥丞主藥方丞主藥方太官令一人六百石本注曰掌御飲食左丞甘丞湯官丞果丞各一人本注曰左丞主飲食甘丞主膳具湯官丞主酒果丞主果守宮令一人六百石本注曰主御紙筆墨及尚書財用諸物及封泥丞一人上林苑令一人六百石本注曰主苑中禽獸頗有民居皆主之捕得其獸送太官丞尉各一人侍中比二千石本注曰無員掌侍左右贊導眾事顧問應對法駕出則多識者一人參乘餘皆騎在乘輿車後本有僕射一人中興轉為祭酒或置或否中常侍千石本注曰宦者無員後增秩比二千石掌侍左右從入內宮贊導內眾事顧問應對給事黃門侍郎六百石本注曰無員掌侍從左右給事中關通中外及諸王朝見於殿上引王就坐小黃門六百石本注曰宦者無員掌侍左右受尚書事上在內宮關通中外及中宮已下眾事諸公主及王太妃等有疾苦則使問之黃門令一人六百石本注曰宦者主省中諸宦者丞從丞各一人本注曰宦者從丞主出入從黃門署長畫室署長玉堂署長各一人丙署長七人皆四百石黃綬本注曰宦者各主中宮別處中黃門冗從僕射一人六百石本注曰宦者主中黃門冗從居則宿衛直守門戶出則騎從夾乘輿車中黃門比百石本注曰宦者無員後增比三百石掌給事禁中掖庭令一人六百石本注曰宦者掌後宮貴人采女事左右丞暴室丞各一人本注曰宦者暴室丞主中婦人疾病者就此室治其皇后貴人有罪亦就此室永巷令一人六百石本注曰宦者典官婢侍使丞一人本注曰宦者御府令一人六百石本注曰宦者典官婢作中衣服及補浣之屬丞織室丞各一人本注曰宦者祠祀令一人六百石本注曰典中諸小祠祀丞一人本注曰宦者鉤盾令一人六百石本注曰宦者典諸近池苑囿遊觀之處丞永安丞各一人三百石本注曰宦者永安北宮東北別小宮名有園觀苑中丞果丞鴻池丞南園丞各一人二百石本注曰苑中丞主苑中離宮果丞主果園鴻池池名在雒陽東二十里南園在雒水南濯龍監直里監各一人四百石本注曰濯龍亦園名近北宮直里亦園名也在雒陽城西南角中藏府令一人六百石本注曰掌中幣帛金銀諸貨物丞一人內者令一人六百石本注曰掌宮中布張諸褻物左右丞各一人尚方令一人六百石本注曰掌上手工作御刀劍諸好器物丞一人尚書令一人千石本注曰承秦所置武帝用宦者更為中書謁者令成帝用士人復故掌凡選署及奏下尚書曹文書眾事尚書僕射一人六百石本注曰署尚書事令不在則奏下眾事尚書六人六百石本注曰成帝初置尚書四人分為四曹常侍曹尚書主公卿事二千石曹尚書主郡國二千石事民曹尚書主凡吏上書事客曹尚書主外國夷狄事世祖承遵後分二千石曹又分客曹為南主客曹北主客曹凡六曹左右丞各一人四百石本注曰掌錄文書期會左丞主吏民章報及騶伯史右丞假署印綬及紙筆墨諸財用庫藏侍郎三十六人四百石本注曰一曹有六人主作文書起草令史十八人二百石本注曰曹有三主書後增劇曹三人合二十一人符節令一人六百石本注曰為符節臺率主符節事凡遣使掌授節尚符璽郎中四人本注曰舊二人在中主璽及虎符竹符之半者符節令史二百石本注曰掌書御史中丞一人千石本注曰御史大夫之丞也舊別監御史在殿中密舉非法及御史大夫轉為司空因別留中為御史臺率後又屬少府治書侍御史二人六百石本注曰掌選明法律者為之凡天下諸讞疑事掌以法律當其是非侍御史十五人六百石本注曰掌察舉非法受公卿群吏奏事有違失舉劾之凡郊廟之祠及大朝會大封拜則二人監威儀有違失則劾奏蘭臺令史六百石本注曰掌奏及印工文書右屬少府本注曰職屬少府者自太醫上林凡四官自侍中至御史皆以文屬焉承秦凡山澤陂池之稅名曰禁錢屬少府世祖改屬司農考工轉屬太僕都水屬郡國孝武帝初置水衡都尉秩比二千石別主上林苑有離宮燕休之處世祖省之并其職於少府每立秋貙劉之日輒暫置水衡都尉事訖乃罷之少府本六丞省五又省湯官織室令置丞又省上林十池監胞人長丞宦者昆臺佽飛三令二十一丞又省水衡屬官令長丞尉二十餘人章和以下中官稍廣加嘗藥太官御者鉤盾尚方考工別作監皆六百石宦者為之轉為兼副或省故錄本官
