body:
  text: 方術列傳第七十二下唐檀唐檀字子產豫章南昌人也少遊太學習京氏易韓詩顏氏春秋尤好災異星占後還鄉里教授常百餘人元初七年郡界有芝草生太守劉祗欲上言之以問檀檀對曰方今外戚豪盛陽道微弱斯豈嘉瑞乎祗乃止永寧元年南昌有婦人生四子祗復問檀變異之應檀以為京師當有兵氣其禍發於蕭牆至延光四年中黃門孫程揚兵殿省誅皇后兄車騎將軍閻顯等立濟陰王為天子果如所占永建五年舉孝廉除郎中是時白虹貫日檀因上便宜三事陳其咎徵書奏棄官去著書二十八篇名為唐子卒於家公沙穆公沙穆字文乂北海膠東人也家貧賤自為兒童不好戲弄長習韓詩公羊春秋尤銳思河洛推步之術居建成山中依林阻為室獨宿無侶時暴風震雷有聲於外呼穆者三穆不與語有頃呼者自牖而入音狀甚怪穆誦經自若終亦無它妖異時人奇之後遂隱居東萊山學者自遠而至有富人王仲致產千金謂穆曰方今之世以貨自通吾奉百萬與子為資何如對曰來意厚矣夫富貴在天得之有命以貨求位吾不忍也後舉孝廉以高第為主事遷繒相時繒侯劉敞東海恭王之後也所為多不法廢嫡立庶傲很放恣穆到官謁曰臣始除之日京師咸謂臣曰繒有惡侯以弔小相明侯何因得此醜聲之甚也幸承先人之支體傳茅土之重不戰戰兢兢而違越法度故朝廷使臣為輔願改往修來自求多福乃上沒敞所侵官民田地廢其庶子還立嫡嗣其蒼頭兒客犯法皆收考之因苦辭諫敞敞涕泣為謝多從其所規遷弘農令縣界有螟蟲食稼百姓惶懼穆乃設壇謝曰百姓有過罪穆之由請以身禱於是暴雨既霽而螟蟲自銷百姓稱曰神明永壽元年霖雨大水三輔以東莫不湮沒穆明曉占候乃豫告令百姓徙居高地故弘農人獨得免害遷遼東屬國都尉善得吏人歡心年六十六卒官六子皆知名許曼許曼者汝南平輿人也祖父峻字季山善卜占之術多有顯驗時人方之前世京房自云少嘗篤病三年不愈乃謁太山請命行遇道士張巨君授以方術所著易林至今行於世曼少傳峻學桓帝時隴西太守馮緄始拜郡開綬笥有兩赤蛇分南北走緄令曼筮之卦成曼曰三歲之後君當為邊將官有東名當東北行三千里復五年更為大將軍南征延熹元年緄出為遼東太守討鮮卑至五年復拜車騎將軍擊武陵蠻賊皆如占其餘多此類云趙彥趙彥者琅邪人也少有術學延熹三年琅邪賊勞丙與太山賊叔孫無忌殺都尉攻沒琅邪屬縣殘害吏民朝廷以南陽宗資為討寇中郎將杖鉞將兵督州郡合討無忌彥為陳孤虛之法以賊屯在莒莒有五陽之地宜發五陽郡兵從孤擊虛以討之資具以狀上詔書遣五陽兵到彥推遁甲教以時進兵一戰破賊燔燒屯塢徐兗二州一時平夷樊志張樊志張者漢中南鄭人也博學多通隱身不仕嘗遊隴西時破羌將軍段熲出征西羌請見志張其夕熲軍為羌所圍數重因留軍中三日不得去夜謂熲曰東南角無復羌宜乘虛引出住百里還師攻之可以全勝熲從之果以破賊於是以狀表聞又說其人既有梓慎焦董之識宜翼聖朝咨詢奇異於是有詔特徵會病終單颺單颺字武宣山陽湖陸人也以孤特清苦自立善明天官算術舉孝廉稍遷太史令侍中出為漢中太守公事免後拜尚書卒於官初熹平末黃龍見譙光祿大夫橋玄問颺此何祥也颺曰其國當有王者興不及五十年龍當復見此其應也魏郡人殷登密記之至建安二十五年春黃龍復見譙其冬魏受禪韓說韓說字叔儒會稽山陰人也博通五經尤善圖緯之學舉孝廉與議郎蔡邕友善數陳災眚及奏賦頌連珠稍遷侍中光和元年十月說言於靈帝云其晦日必食乞百官嚴裝帝從之果如所言中平二年二月又上封事剋期宮中有災至日南宮大火遷說江夏太守公事免年七十卒於家董扶董扶字茂安廣漢綿竹人也少遊太學與鄉人任安齊名俱事同郡楊厚學圖讖還家講授弟子自遠而至前後宰府十辟公車三徵再舉賢良方正博士有道皆稱疾不就靈帝時大將軍何進薦扶徵拜侍中甚見器重扶私謂太常劉焉曰京師將亂益州分野有天子氣焉信之遂求出為益州牧扶亦為蜀郡屬國都尉相與入蜀去後一歲帝崩天下大亂乃去官還家年八十二卒後劉備稱天子於蜀皆如扶言蜀丞相諸葛亮問廣漢秦密董扶及任安所長密曰董扶襃秋豪之善貶纖芥之惡任安記人之善忘人之過云郭玉郭玉者廣漢雒人也初有老父不知何出常漁釣於涪水因號涪翁乞食人間見有疾者時下鍼石輒應時而效乃著鍼經診脉法傳於世弟子程高尋求積年翁乃授之高亦隱跡不仕玉少師事高學方診六微之技陰陽隱側之術和帝時為太醫丞多有效應帝奇之仍試令嬖臣美手腕者與女子雜處帷中使玉各診一手問所疾苦玉曰左陰右陽脈有男女狀若異人臣疑其故帝歎息稱善玉仁愛不矜雖貧賤廝養必盡其心力而醫療貴人時或不愈帝乃令貴人羸服變處一鍼即差召玉詰問其狀對曰醫之為言意也腠理至微隨氣用巧鍼石之間毫芒即乖神存於心手之際可得解而不可得言也夫貴者處尊高以臨臣臣懷怖懾以承之其為療也有四難焉自用意而不任臣一難也將身不謹二難也骨節不彊不能使藥三難也好逸惡勞四難也鍼有分寸時有破漏重以恐懼之心加以裁慎之志臣意且猶不盡何有於病哉此其所以為不愈也帝善其對年老卒官華陀華佗字元化沛國譙人也一名敷遊學徐土兼通數經曉養性之術年且百歲而猶有壯容時人以為仙沛相陳珪舉孝廉太尉黃琬辟皆不就精於方藥處齊不過數種心識分銖不假稱量鍼灸不過數處若疾發結於內鍼藥所不能及者乃令先以酒服麻沸散既醉無所覺因刳破腹背抽割積聚若在腸胃則斷截湔洗除去疾穢既而縫合傅以神膏四五日創愈一月之間皆平復佗嘗行道見有病咽塞者因語之曰向來道隅有賣餅人萍齏甚酸可取三升飲之病自當去即如佗言立吐一蛇乃懸於車而候佗時佗小兒戲於門中逆見自相謂曰客車邊有物必是逢我翁也及客進顧視壁北懸蛇以十數乃知其奇又有一郡守篤病久佗以為盛怒則差乃多受其貨而不加功無何棄去又留書罵之太守果大怒令人追殺佗不及因瞋恚吐黑血數升而愈又有疾者詣佗求療佗曰君病根深因當剖破腹然君壽亦不過十年病不能相殺也病者不堪其苦必欲除之佗遂下療應時愈十年竟死廣陵太守陳登忽患匈中煩懣面赤不食佗脈之曰府君胃中有蟲欲成內疽腥物所為也即作湯二升再服須臾吐出三升許蟲頭赤而動半身猶是生魚膾所苦便愈佗曰此病後三期當發遇良醫可救登至期疾動時佗不在遂死曹操聞而召佗常在左右操積苦頭風眩佗鍼隨手而差有李將軍者妻病呼佗視脈佗曰傷身而胎不去將軍言間實傷身胎已去矣佗曰案脈胎未去也將軍以為不然妻稍差百餘日復動更呼佗佗曰脈理如前是兩胎先生者去血多故後兒不得出也胎既已死血脈不復歸必燥著母脊乃為下鍼并令進湯婦因欲產而不通佗曰死胎枯燥埶不自生使人探之果得死胎人形可識但其色已黑佗之絕技皆此類也為人性惡難得意且恥以醫見業又去家思歸乃就操求還取方因託妻疾數期不反操累書呼之又敕郡縣發遣佗恃能厭事猶不肯至操大怒使人廉之知妻詐疾乃收付獄訊考驗首服荀彧請曰佗方術實工人命所懸宜加全宥操不從竟殺之佗臨死出一卷書與獄吏曰此可以活人吏畏法不敢受佗不強與索火燒之初軍吏李成苦欬晝夜不寐佗以為腸癰與散兩錢服之即吐二升膿血於此漸愈乃戒之曰後十八歲疾當發動若不得此藥不可差也復分散與之後五六歲有里人如成先病請藥甚急成愍而與之乃故往譙更從佗求適值見收意不忍言後十八年成病發無藥而死廣陵吳普彭城樊阿皆從佗學普依準佗療多所全濟佗語普曰人體欲得勞動但不當使極耳動搖則穀氣得銷血脈流通病不能生譬猶戶樞終不朽也是以古之仙者為導引之事熊經鴟顧引挽腰體動諸關節以求難老吾有一術名五禽之戲一曰虎二曰鹿三曰熊四曰猿五曰鳥亦以除疾兼利蹄足以當導引體有不快起作一禽之戲怡而汗出因以著粉身體輕便而欲食普施行之年九十餘耳目聰明齒牙完堅阿善鍼術凡醫咸言背及匈藏之間不可妄鍼鍼之不可過四分而阿鍼背入一二寸巨闕匈藏乃五六寸而病皆瘳阿從佗求方可服食益於人者佗授以漆葉青䴴散漆葉屑一斗青䴴十四兩以是為率言久服去三蟲利五藏輕體使人頭不白阿從其言壽百餘歲漆葉處所而有青䴴生於豐沛彭城及朝歌間漢世異術之士甚眾雖云不經而亦有不可誣故簡其美者列于傳末泠壽光唐虞魯女生三人者皆與華佗同時壽光年可百五六十歲行容成公御婦人法常屈頸鷮息須髮盡白而色理如三四十時死於江陵唐虞道赤眉張步家居里落若與相及死於鄉里不其縣魯女生數說顯宗時事甚明了議者疑其時人也董卓亂後莫知所在徐登徐登者閩中人也本女子化為丈夫善為巫術又趙炳字公阿東陽人能為越方時遭兵亂疾疫大起二人遇於烏傷溪水之上遂結言約共以其術療病各相謂曰今既同志且可各試所能登乃禁溪水水為不流炳復次禁枯樹樹即生荑二人相視而笑共行其道焉登年長炳師事之貴尚清儉禮神唯以東流水為酌削桑皮為脯但行禁架所療皆除後登物故炳東入章安百姓未之知也炳乃故升茅屋梧鼎而爨主人見之驚懅炳笑不應既而爨孰屋無損異又嘗臨水求度船人不和之炳乃張蓋坐其中長嘯呼風亂流而濟於是百姓神服從者如歸章安令惡其惑眾收殺之人為立祠室於永康至今蚊蚋不能入也費長房費長房者汝南人也曾為市掾市中有老翁賣藥懸一壺於肆頭及市罷輒跳入壺中市人莫之見唯長房於樓上睹之異焉因往再拜奉酒脯翁知長房之意其神也謂之曰子明日可更來長房旦日復詣翁翁乃與俱入壺中唯見玉堂嚴麗旨酒甘肴盈衍其中共飲畢而出翁約不聽與人言之後乃就樓上候長房曰我神仙之人以過見責今事畢當去子寧能相隨乎樓下有少酒與卿為別長房使人取之不能勝又令十人扛之猶不舉翁聞笑而下樓以一指提之而上視器如一升許而二人飲之終日不盡長房遂欲求道而顧家人為憂翁乃斷一青竹度與長房身齊使懸之舍後家人見之即長房形也以為縊死大小驚號遂殯葬之長房立其傍而莫之見也於是遂隨從入深山踐荊棘於群虎之中留使獨處長房不恐又臥於空室以朽索懸萬斤石於心上眾蛇競來齧索且斷長房亦不移翁還撫之曰子可教也復使食糞糞中有三蟲臭穢特甚長房意惡之翁曰子幾得道恨於此不成如何長房辭歸翁與一竹杖曰騎此任所之則自至矣既至可以杖投葛陂中也又為作一符曰以此主地上鬼神長房乘杖須臾來歸自謂去家適經旬日而已十餘年矣即以杖投陂顧視則龍也家人謂其久死不信之長房曰往日所葬但竹杖耳乃發冢剖棺杖猶存焉遂能醫療眾病鞭笞百鬼及驅使社公或在它坐獨自恚怒人問其故曰吾責鬼魅之犯法者耳汝南歲歲常有魅偽作太守章服詣府門椎鼓者郡中患之時魅適來而逢長房謁府君惶懼不得退便前解衣冠叩頭乞活長房呵之云便於中庭正汝故形即成老鱉大如車輪頸長一丈長房復令就太守服罪付其一札以敕葛陂君魅叩頭流涕持札植於陂邊以頸繞之而死後東海君來見葛陂君因淫其夫人於是長房劾繫之三年而東海大旱長房至海上見其人請雨乃謂之曰東海君有罪吾前繫於葛陂今方出之使作雨也於是雨立注長房曾與人共行見一書生黃巾被裘無鞍騎馬下而叩頭長房曰還他馬赦汝死罪人問其故長房曰此狸也盜社公馬耳又嘗坐客而使至宛市鮓須臾還乃飯或一日之間人見其在千里之外者數處焉後失其符為眾鬼所殺薊子訓薊子訓者不知所由來也建安中客在濟陰宛句有神異之道嘗抱鄰家嬰兒故失手墮地而死其父母悲號怨痛不可忍聞而子訓唯謝以過誤終無它說遂埋藏之後月餘子訓乃抱兒歸焉父母大恐曰死生異路雖思我兒乞不用復見也兒識父母軒渠笑悅欲往就之母不覺攬取乃實兒也雖大喜慶心猶有疑乃竊發視死兒但見衣被方乃信焉於是子訓流名京師士大夫皆承風向慕之後乃駕驢車與諸生俱詣許下道過滎陽止主人舍而所駕之驢忽然卒僵蛆蟲流出主遽白之子訓曰乃爾乎方安坐飯食畢徐出以杖扣之驢應聲奮起行步如初即復進道其追逐觀者常有千數既到京師公卿以下候之者坐上恆數百人皆為設酒脯終日不匱後因遁去遂不知所止初去之日唯見白雲騰起從旦至莫如是數十處時有百歲翁自說童兒時見子訓賣藥於會稽市顏色不異於今後人復於長安東霸城見之與一老翁共摩挲銅人相謂曰適見鑄此已近五百歲矣顧視見人而去猶駕昔所乘驢車也見者呼之曰薊先生小住並行應之視若遲徐而走馬不及於是而絕劉根劉根者潁川人也隱居嵩山中諸好事者自遠而至就根學道太守史祈以根為妖妄乃收執詣郡數之曰汝有何術而誣惑百姓若果有神可顯一驗事不爾立死矣根曰實無它異頗能令人見鬼耳祈曰促召之使太守目睹爾乃為明根於是左顧而嘯有頃祈之亡父祖近親數十人皆返縛在前向根叩頭曰小兒無狀分當萬坐顧而叱祈曰汝為子孫不能有益先人而反累辱亡靈可叩頭為吾陳謝祈驚懼悲哀頓首流血請自甘罪坐根嘿而不應忽然俱去不知在所左慈左慈字元放廬江人也少有神道嘗在司空曹操坐操從容顧眾賓曰今日高會珍羞略備所少吳松江鱸魚耳元放於下坐應曰此可得也因求銅盤貯水以竹竿餌釣於盤中須臾引一鱸魚出操大拊掌笑會者皆驚操曰一魚不周坐席可更得乎放乃更餌鉤沈之須臾復引出皆長三尺餘生鮮可愛操使目前鱠之周浹會者操又謂曰既已得魚恨無蜀中生薑耳放曰亦可得也操恐其近即所取因曰吾前遣人到蜀買錦可過敕使者增市二端語頃即得薑還并獲操使報命後操使蜀反驗問增錦之狀及時日早晚若符契焉後操出近郊士大夫從者百許人慈乃為齎酒一升脯一斤手自斟酌百官莫不醉飽操怪之使尋其故行視諸罏悉亡其酒脯矣操懷不喜因坐上欲收殺之慈乃卻入壁中霍然不知所在或見於市者又捕之而市人皆變形與慈同莫知誰是後人逢慈於陽城山頭因復逐之遂入走羊群操知不可得乃令就羊中告之曰不復相殺本試君術耳忽有一老羝屈前兩膝人立而言曰遽如許即競往赴之而群羊數百皆變為羝並屈前膝人立云遽如許遂莫知所取焉計子勳計子勳者不知何郡縣人皆謂數百歲行來於人間一旦忽言日中當死主人與之葛衣子勳服而正寢至日中果死上成公上成公者密縣人也其初行久而不還後歸語其家云我已得仙因辭家而去家人見其舉步稍高良久乃沒云陳寔韓詔同見其事解奴辜解奴辜張貂者亦不知是何郡國人也皆能隱淪出入不由門戶奴辜能變易物形以誑幻人又河南有麴聖卿善為丹書符劾厭殺鬼神而使命之又有編盲意亦與鬼物交通初章帝時有壽光侯者能劾百鬼眾魅令自縛見形其鄉人有婦為魅所病侯為劾之得大蛇數丈死於門外又有神樹人止者輒死鳥過者必墜侯復劾之樹盛夏枯落見大蛇長七八丈懸死其間帝聞而徵之乃試問之吾殿下夜半後常有數人絳衣被髮持火相隨豈能劾之乎侯曰此小怪易銷耳帝偽使三人為之侯劾三人登時仆地無氣帝大驚曰非魅也朕相試耳解之而蘇甘始甘始東郭延年封君達三人者皆方士也率能行容成御婦人術或飲小便或自倒懸愛嗇精氣不極視大言甘始元放延年皆為操所錄問其術而行之君達號青牛師凡此數人皆百餘歲及二百歲也王真王真郝孟節者皆上黨人也王真年且百歲視之面有光澤似未五十者自云周流登五岳名山悉能行胎息胎食之方嗽舌下泉咽之不絕房室孟節能含棗核不食可至五年十年又能結氣不息身不動搖狀若死人可至百日半年亦有室家為人質謹不妄言似士君子曹操使領諸方士焉王和平北海王和平性好道術自以當仙濟南孫邕少事之從至京師會和平病歿邕因葬之東陶有書百餘卷藥數囊悉以送之後弟子夏榮言其尸解邕乃恨不取其寶書仙藥焉贊曰幽貺罕徵明數難校不探精遠曷感靈效如或遷訛實乖玄奧
