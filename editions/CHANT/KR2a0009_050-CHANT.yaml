body:
  text: 袁張韓周列傳第三十五袁安袁安字邵公汝南汝陽人也祖父良習孟氏易平帝時舉明經為太子舍人建武初至成武令安少傳良學為人嚴重有威見敬於州里初為縣功曹奉檄詣從事從事因安致書於令安曰公事自有郵驛私請則非功曹所持辭不敢受從事瞿然而止後舉孝廉除陰平長任城令所在吏人畏而愛之永平十三年楚王英謀為逆事下郡覆考明年三府舉安能理劇拜楚郡太守是時英辭所連及繫者數千人顯宗怒甚吏案之急迫痛自誣死者甚眾安到郡不入府先往案獄理其無明驗者條上出之府丞掾史皆叩頭爭以為阿附反虜法與同罪不可安曰如有不合太守自當坐之不以相及也遂分別具奏帝感悟即報許得出者四百餘家歲餘徵為河南尹政號嚴明然未曾以臧罪鞫人常稱曰凡學仕者高則望宰相下則希牧守錮人於聖世尹所不忍為也聞之者皆感激自勵在職十年京師肅然名重朝廷建初八年遷太僕元和二年武威太守孟雲上書北虜既已和親而南部復往抄掠北單于謂漢欺之謀欲犯邊宜還其生口以安慰之詔百官議朝堂公卿皆言夷狄譎詐求欲無厭既得生口當復妄自誇大不可開許安獨曰北虜遣使奉獻和親有得邊生口者輒以歸漢此明其畏威而非先違約也雲以大臣典邊不宜負信於戎狄還之足示中國優貸而使邊人得安誠便司徒桓虞改議從安太尉鄭弘司空第五倫皆恨之弘因大言激勵虞曰諸言當還生口者皆為不忠虞廷叱之倫及大鴻臚韋彪各作色變容司隸校尉舉奏安等皆上印綬謝肅宗詔報曰久議沈滯各有所志蓋事以議從策由眾定誾誾衎衎得禮之容寢嘿抑心更非朝廷之福君何尤而深謝其各冠履帝竟從安議明年代第五倫為司空章和元年代桓虞為司徒和帝即位竇太后臨朝后兄車騎將軍憲北擊匈奴安與太尉宋由司空任隗及九卿詣朝堂上書諫以為匈奴不犯邊塞而無故勞師遠涉損費國用徼功萬里非社稷之計書連上輒寢宋由懼遂不敢復署議而諸卿稍自引止唯安獨與任隗守正不移至免冠朝堂固爭者十上太后不聽眾皆為之危懼安正色自若竇憲既出而弟衛尉篤執金吾景各專威權公於京師使客遮道奪人財物景又擅使乘驛施檄緣邊諸郡發突騎及善騎射有才力者漁陽雁門上谷三郡各遣吏將送詣景第有司畏憚莫敢言者安乃劾景擅發邊兵驚惑吏人二千石不待符信而輒承景檄當伏顯誅又奏司隸校尉河南尹阿附貴戚無盡節之義請免官案罪並寢不報憲景等日益橫盡樹其親黨賓客於名都大郡皆賦斂吏人更相賂遺其餘州郡亦復望風從之安與任隗舉奏諸二千石又它所連及貶秩免官者四十餘人竇氏大恨但安隗素行高亦未有以害之時竇憲復出屯武威明年北單于為耿夔所破遁走烏孫塞北地空餘部不知所屬憲日矜己功欲結恩北虜乃上立降者左鹿蠡王阿佟為北單于置中郎將領護如南單于故事事下公卿議太尉宋由太常丁鴻光祿勳耿秉等十人議可許安與任隗奏以為光武招懷南虜非謂可永安內地正以權時之算可得捍禦北狄故也今朔漠既定宜令南單于反其北庭并領降眾無緣復更立阿佟以增國費宗正劉方大司農尹睦同安議事奏未以時定安懼憲計遂行乃獨上封事曰臣聞功有難圖不可豫見事有易斷較然不疑伏惟光武皇帝本所以立南單于者欲安南定北之策也恩德甚備故匈奴遂分邊境無患孝明皇帝奉承先意不敢失墜赫然命將爰伐塞北至乎章和之初降者十餘萬人議者欲置之濱塞東至遼東太尉宋由光祿勳耿秉皆以為失南單于心不可先帝從之陛下奉承鴻業大開疆宇大將軍遠師討伐席卷北庭此誠宣明祖宗崇立鴻勳者也宜審其終以成厥初伏念南單于屯先父舉眾歸德自蒙恩以來四十餘年三帝積累以遺陛下陛下深宜遵述先志成就其業況屯首唱大謀空盡北虜輟而弗圖更立新降以一朝之計違三世之規失信於所養建立於無功由秉實知舊議而欲背棄先恩夫言行君子之樞機賞罰理國之綱紀論語曰言忠信行篤敬雖蠻貊行焉今若失信於一屯則百蠻不敢復保誓矣又烏桓鮮卑新殺北單于凡人之情咸畏仇讎今立其弟則二虜懷怨兵食可廢信不可去且漢故事供給南單于費直歲一億九十餘萬西域歲七千四百八十萬今北庭彌遠其費過倍是乃空盡天下而非建策之要也詔下其議安又與憲更相難折憲險急負埶言辭驕訐至詆毀安稱光武誅韓歆戴涉故事安終不移憲竟立匈奴降者右鹿蠡王於除鞬為單于後遂反叛卒如安策安以天子幼弱外戚擅權每朝會進見及與公卿言國家事未嘗不噫嗚流涕自天子及大臣皆恃賴之四年春薨朝廷痛惜焉後數月竇氏敗帝始親萬機追思前議者邪正之節乃除安子賞為郎策免宋由以尹睦為太尉劉方為司空睦河南人薨於位方平原人後坐事免歸自殺初安父沒母使安訪求葬地道逢三書生問安何之安為言其故生乃指一處云葬此地當世為上公須臾不見安異之於是遂葬其所占之地故累世隆盛焉安子京敞最知名子京京字仲譽習孟氏易作難記三十萬言初拜郎中稍遷侍中出為蜀郡太守子彭字伯楚少傳父業歷廣漢南陽太守順帝初為光祿勳行至清為吏麤袍糲食終於議郎尚書胡廣等追表其有清潔之美比前朝貢禹第五倫未蒙顯贈當時皆嗟歎之彭弟湯字仲河少傳家學諸儒稱其節多歷顯位桓帝初為司空以豫議定策封安國亭侯食邑五百戶累遷司徒太尉以災異策免卒謚曰康侯湯長子成左中郎將早卒次子逢嗣逢字周陽以累世三公子寬厚篤信著稱於時靈帝立逢以太僕豫議增封三百戶後為司空卒於執金吾朝廷以逢嘗為三老特優禮之賜以珠畫特詔祕器飯含珠玉二十六品使五官中郎將持節奉策贈以車騎將軍印綬加號特進謚曰宣文侯子基嗣位至太僕逢弟隗少歷顯官先逢為三公時中常侍袁赦隗之宗也用事於中以逢隗世宰相家推崇以為外援故袁氏貴寵於世富奢甚不與它公族同獻帝初隗為太傅成子紹逢子術自有傳董卓忿紹術背己遂誅隗及術兄基等男女二十餘人子敞敞字叔平少傳易經教授以父任為太子舍人和帝時歷位將軍大夫侍中出為東郡太守徵拜太僕光祿勳元初三年代劉愷為司空明年坐子與尚書郎張俊交通漏泄省中語策免敞廉勁不阿權貴失鄧氏旨遂自殺張俊者蜀郡人有才能與兄龕並為尚書郎年少勵鋒氣郎朱濟丁盛立行不修俊欲舉奏之二人聞恐因郎陳重雷義往請俊俊不聽因共私賂侍史使求俊短得其私書與敞子遂封上之皆下獄當死俊自獄中占獄吏上書自訟書奏而俊獄已報廷尉將出穀門臨行刑鄧太后詔馳騎以減死論俊假名上書謝曰臣孤恩負義自陷重刑情斷意其無所復望廷尉鞫遣歐刀在前棺絮在後魂魄飛揚形容已枯陛下聖澤以臣嘗在近密識其狀貌傷臣眼目留心曲慮特加徧覆喪車復還白骨更肉披棺發槨起見白日天地父母能生臣俊不能使臣俊當死復生陛下德過天地恩重父母誠非臣俊破碎骸骨舉宗腐爛所報萬一臣俊徒也不得上書不勝去死就生驚喜踴躍觸冒拜章當時皆哀其文朝廷由此薄敞罪而隱其死以三公禮葬之復其官子盱盱後至光祿勳時大將軍梁冀擅朝內外莫不阿附唯盱與廷尉邯鄲義正身自守及桓帝誅冀使盱持節收其印綬事已具梁冀傳玄孫閎閎字夏甫彭之孫也少勵操行苦身修節父賀為彭城相閎往省謁變名姓徒行無旅既至府門連日吏不為通會阿母出見閎驚入白夫人乃密呼見既而辭去賀遣車送之閎稱眩疾不肯乘反郡界無知者及賀卒郡閎兄弟迎喪不受賻賵縗絰扶柩冒犯寒露體貌枯毀手足血流見者莫不傷之服闋累徵聘舉召皆不應居處側陋以耕學為業從父逢隗並貴盛數饋之無所受閎見時方險亂而家門富盛常對兄弟歎曰吾先公福祚後世不能以德守之而競為驕奢與亂世爭權此即晉之三郤矣延熹末黨事將作閎遂散髮絕世欲投迹深林以母老不宜遠遁乃築土室四周於庭不為戶自牖納飲食而已旦於室中東向拜母母思閎時往就視母去便自掩閉兄弟妻子莫得見也及母歿不為制服設位時莫能名或以為狂生潛身十八年黃巾賊起攻沒郡縣百姓驚散閎誦經不移賊相約語不入其閭鄉人就閎避難皆得全免年五十七卒於上室二弟忠弘節操皆亞於閎忠字正甫與同郡范滂為友俱證黨事得釋語在滂傳初平中為沛相乘葦車到官以清亮稱及天下大亂忠棄官客會稽上虞一見太守王朗徒從整飾心嫌之遂稱病自絕後孫策破會稽忠等浮海南投交阯獻帝都許徵為衛尉未到卒弘字邵甫恥其門族貴埶乃變姓名徒步師門不應徵辟終於家忠子祕為郡門下議生黃巾起祕從太守趙謙擊之軍敗祕與功曹封觀等七人以身扞刃皆死於陳謙以得免詔祕等門閭號曰七賢封觀者有志節當舉孝廉以兄名位未顯恥先受之遂稱風疾喑不能言火起觀屋徐出避之忍而不告後數年兄得舉觀乃稱損而仕郡焉論曰陳平多陰謀而知其後必廢邴吉有陰德夏侯勝識其當封及子孫終陳掌不侯而邴昌紹國雖有不類未可致詰其大致歸然矣袁公竇氏之閒乃情帝室引義雅正可謂王臣之烈及其理楚獄未嘗鞫人於臧罪其仁心足以覃乎後昆子孫之盛不亦宜乎張酺張酺字孟侯汝南細陽人趙王張敖之後也敖子壽封細陽之池陽鄉後廢因家焉酺少從祖父充受尚書能傳其業又事太常桓榮勤力不怠聚徒以百數永平九年顯宗為四姓小侯開學於南宮置五經師酺以尚書教授數講於御前以論難當意除為郎賜車馬衣裳遂令入授皇大子酺為人質直守經義每侍講閒隙數有匡正之辭以嚴見憚及肅宗即位擢酺為侍中虎賁中郎將數月出為東郡太守酺自以嘗經親近未悟見出意不自得上疏辭曰臣愚以經術給事左右少不更職不曉文法猥當剖符典郡班政千里必有負恩辱位之咎臣竊私自分殊不慮出城闕冀蒙留恩託備宂官群僚所不安耳目所聞見不敢避好醜詔報曰經云身雖在外乃心不離王室典城臨民益所以報效也好醜必上不在遠近今賜莊三十萬其亟之官酺雖儒者而性剛斷下車擢用義勇搏擊豪強長吏有殺盜徒者酺輒案之以為令長受臧猶不至死盜徒皆飢寒傭保何足窮其法乎郡吏王青者祖父翁與前太守翟義起兵攻王莽及義敗餘眾悉降翁獨守節力戰莽遂燔燒之父隆建武初為都尉功曹青為小史與父俱從都尉行縣道遇賊隆以身衛全都尉遂死於難青亦被矢貫咽音聲流喝前郡守以青身有金夷竟不能舉酺見之歎息曰豈有一門忠義而爵賞不及乎遂擢用極右曹乃上疏薦青三世死節宜蒙顯異奏下三公由此為司空所辟自酺出後帝每見諸王師傅嘗言張酺前入侍講屢有諫正誾誾惻惻出於誠心可謂有史魚之風矣元和二年東巡守幸東郡引酺及門生并郡縣掾史並會庭中帝先備弟子之儀使酺講尚書一篇然後修君臣之禮賞賜殊特莫不沾洽酺視事十五年和帝初遷魏郡太守郡人鄭據時為司隸校尉奏免執金吾竇景景後復位遣掾夏猛私謝酺曰鄭據小人為所侵冤聞其兒為吏放縱狼藉取是曹子一人足以警百酺大怒即收猛繫獄檄言執金吾府疑猛與據子不平矯稱卿意以報私讎會有贖罪令猛乃得出頃之徵入為河南尹竇景家人復擊傷市卒吏捕得之景怒遣緹騎侯海等五百人歐傷市丞酺部吏楊章等窮究正海罪徙朔方景忿怨乃移書辟章等六人為執金吾吏欲因報之章等惶恐入白酺願自引臧罪以辭景命酺即上言其狀竇太后詔報自今執金吾辟吏皆勿遣及竇氏敗酺乃上疏曰臣實愚蠢不及大體以為竇氏雖伏厥辜而罪刑未著後世不見其事但聞其誅非所以垂示國典貽之將來宜下理官與天下平之方憲等寵貴群臣阿附唯恐不及皆言憲受顧命之託懷伊呂之忠至乃復比鄧夫人於文母今嚴威既行皆言當死不復顧其前後考折厥衷臣伏見夏陽侯瓌每存忠善前與臣言常有盡節之心檢敕賓客未嘗犯法臣聞王政骨肉之刑有三宥之義過厚不過薄今議者為瓌選嚴能相恐其迫切必不完免宜裁加貸宥以崇厚德和帝感酺言徙瓌封就國而已永元五年遷酺為太僕數月代尹睦為太尉數上疏以疾乞身薦魏郡太守徐防自代帝不許使中黃門問病加以珍羞賜錢三十萬酺遂稱篤時子蕃以郎侍講帝因令小黃門敕蕃曰陰陽不和萬人失所朝廷望公思惟得失與國同心而託病自潔求去重任誰當與吾同憂責者非有望於斷金也司徒固疾司空年老公其傴僂勿露所敕酺惶恐詣闕謝還復視事酺雖在公位而父嘗居田里酺每有遷職輒一詣京師嘗來候酺適會歲節公卿罷朝俱詣酺府舉酒上壽極歡卒日眾人皆慶羨之及父卒既葬詔遣使齋牛酒為釋服後以事與司隸校尉晏稱會於朝堂酺從容謂稱曰三府辟吏多非其人稱歸即奏令三府各實其掾史酺本以私言不意稱奏之甚懷恨會復共謝闕下酺因責讓於稱稱辭語不順酺怒遂廷叱之稱乃劾奏酺有怨言天子以酺先帝師有詔公卿博士朝臣會議司徒呂蓋奏酺位居三司知公門有儀不屏氣鞠躬以須詔命反作色大言怨讓使臣不可以示四遠於是策免酺歸里舍謝遣諸生閉門不通賓客左中郎將何敞及言事者多訟酺公忠帝亦雅重之十六年復拜為光祿勳數月代魯恭為司徒月餘薨乘輿縞素臨弔賜冢塋地賵贈恩寵異於它相酺病臨危敕其子曰顯節陵埽地露祭欲率天下以儉吾為三公既不能宣揚王化令吏人從制豈可不務節約乎其無起祠堂可作槀蓋廡施祭其下而已曾孫濟好儒學光和中至司空病罷及卒靈帝以舊恩贈車騎將軍關內侯印綬其年追濟侍講有勞封子根為蔡陽鄉侯濟弟喜初平中為司空韓棱韓稜字伯師潁川舞陽人弓高侯頹當之後也世為鄉里著姓父尋建武中為隴西太守棱四歲而孤養母弟以孝友稱及壯推先父餘財數百萬與從昆弟鄉里益高之初為郡功曹太守葛興中風病不能聽政棱陰代興視事出入二年令無違者興子嘗發教欲署吏稜拒執不從因令怨者章之事下案驗吏以稜掩蔽興病專典郡職遂致禁錮顯宗知其忠後詔特原之由是徵辟五遷為尚書令與僕射郅壽尚書陳寵同時俱以才能稱肅宗嘗賜諸尚書劍唯此三人特以寶劍自手署其名曰韓稜楚龍淵郅壽蜀漢文陳寵濟南椎成時論者為之說以棱淵深有謀故得龍淵壽明達有文章故得漢文寵敦朴善不見外故得椎成和帝即位侍中竇憲使人刺殺齊殤王子都鄉侯暢於上東門有司畏憲咸委疑於暢兄弟詔遣侍御史之齊案其事稜上疏以為賊在京師不宜捨近問遠恐為姦臣所笑竇太后怒以切責棱棱固執其議及事發果如所言憲惶恐白太后求出擊北匈奴以贖罪棱復上疏諫太后不從及憲有功還為大將軍威震天下復出屯武威會帝西祠園陵詔憲與車駕會長安及憲至尚書以下議欲拜之伏稱萬歲稜正色曰夫上交不諂下交不黷禮無人臣稱萬歲之制議者皆慚而止尚書左丞王龍私奏記上牛酒於憲棱舉奏龍論為城旦稜在朝數薦舉良吏應順呂章周紆等皆有名當時及竇氏敗稜典案其事深竟黨與數月不休沐帝以為憂國忘家賜布三百匹遷南陽太守特聽稜得過家上冢鄉里以為榮稜發擿姦盜郡中震慄政號嚴平數歲徵入為太僕九年冬代張奮為司空明年薨子輔安帝時至趙相棱孫演順帝時為丹陽太守政有能名桓帝時為司徒大將軍梁冀被誅演坐阿黨抵罪以減死論遣歸本郡後復徵拜司隸校尉周榮周榮字平孫廬江舒人也肅宗時舉明經辟司徒袁安府安數與論議甚器之及安舉奏竇景及與竇憲爭立北單于事皆榮所具草竇氏客太尉掾徐齮深惡之脅榮曰子為袁公腹心之謀排奏竇氏竇氏悍士刺客滿城中謹備之矣榮曰榮江淮孤生蒙先帝大恩以歷宰二城今復得備宰士縱為竇氏所害誠所甘心故常敕妻子若卒遇飛禍無得殯斂冀以區區腐身覺悟朝廷及竇氏敗榮由此顯名自郾令擢為尚書令出為潁川太守坐法當下獄和帝思榮忠節左轉共令歲餘復以為山陽太守所歷郡縣皆見稱紀以老病乞身卒于家詔特賜錢二十萬除子男興為郎中興少有名譽永寧中尚書陳忠上疏薦興曰臣伏惟古者帝王有所號令言必弘雅辭必溫麗垂於後世列於典經故仲尼嘉唐虞之文章從周室之郁郁臣竊見光祿郎周興孝友之行著於閨門清麗之志聞於州里蘊櫝古今博物多聞三墳之篇五典之策無所不覽屬文著辭有可觀採尚書出納帝命為王喉舌臣等既愚闇而諸郎多文俗吏鮮有雅才每為詔文宣示內外轉相求請或以不能而專己自由辭多鄙固興抱奇懷能隨輩棲遲誠可歎息詔乃拜興為尚書郎卒興子景孫景景字仲饗辟大將軍梁冀府稍遷豫州刺史河內太守好賢愛士其拔才薦善常恐不及每至歲時延請舉吏入上後堂與共宴會如此數四乃遣之贈送什物無不充備既而選其父兄子弟事相優異嘗稱曰臣子同貫若之何不厚先是司徒韓演在河內志在無私舉吏當行一辭而已恩亦不及其家曰我舉若可矣豈可令徧積一門故當時論者議此二人景後徵入為將作大匠及梁冀誅景以故吏免官禁錮朝廷以景素著忠正頃之復引拜尚書令遷太僕衛尉六年代劉寵為司空是時宦官任人及子弟充塞列位景初視事與太尉楊秉舉奏諸姦猾自將軍牧守以下免者五十餘人遂連及中常侍防東陽侯侯覽東武陽侯具瑗皆坐黜朝廷莫不稱之視事二年以地震策免歲餘復代陳蕃為太尉建寧元年薨以豫議定策立靈帝追封安陽鄉侯長子崇嗣至甘陵相中子忠少歷列位累遷大司農忠子暉前為洛陽令去官賜歸兄弟好賓客雄江淮間出入從車常百餘乘及帝崩暉聞京師不安來候忠董卓聞而惡之使兵劫殺其兄弟忠後代皇甫嵩為太尉錄尚書事以災異免復為衛尉從獻帝東歸洛陽贊曰袁公持重誠單所奉惟德不忘延世承寵孟侯經博侍言帝幙棱榮事君志同鸇雀
