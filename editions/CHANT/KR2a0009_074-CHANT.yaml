body:
  text: 郭符許列傳第五十八郭太郭太字林宗太原界休人也家世貧賤早孤母欲使給事縣廷林宗曰大丈夫焉能處斗筲之役乎遂辭就成皋屈伯彥學三年業畢博通墳籍善談論美音制乃游於洛陽始見河南尹李膺膺大奇之遂相友善於是名震京師後歸鄉里衣冠諸儒送至河上車數千兩林宗唯與李膺同舟而濟眾賓望之以為神仙焉司徒黃瓊辟太常趙典舉有道或勸林宗仕進者對曰吾夜觀乾象晝察人事天之所廢不可支也遂並不應性明知人好獎訓士類身長八尺容貌魁偉襃衣博帶周遊郡國嘗於陳梁間行遇雨巾一角墊時人乃故折巾一角以為林宗巾其見慕皆如此或問汝南范滂曰郭林宗何如人滂曰隱不違親貞不絕俗天子不得臣諸侯不得友吾不知其他後遭母憂有至孝稱林宗雖善人倫而不為危言覈論故宦官擅政而不能傷也及黨事起知名之士多被其害唯林宗及汝南袁閎得免焉遂閉門教授弟子以千數建寧元年太傅陳蕃大將軍竇武為閹人所害林宗哭之於野慟既而歎曰人之云亡邦國殄瘁瞻烏爰止不知于誰之屋耳明年春卒于家時年四十二四方之士千餘人皆來會葬同志者乃共刻石立碑蔡邕為其文既而謂涿郡盧植曰吾為碑銘多矣皆有慚德唯郭有道無愧色耳其獎拔士人皆如所鑒初太始至南州過袁奉高不宿而去從叔度累曰不去或以問太太曰奉高之器譬之泛濫雖清而易挹叔度之器汪汪千頃之波澄之不清擾之不濁不可量也已而果然太以是名聞天下後之好事或附益增張故多華辭不經又類卜相之書今錄其章章效於事者著之篇末左原者陳留人也為郡學生犯法見斥林宗嘗遇諸路為設酒肴以慰之謂曰昔顏涿聚梁甫之巨盜段干木晉國之大駔卒為齊之忠臣魏之名賢蘧瑗顏回尚不能無過況其餘乎慎勿恚恨責躬而已原納其言而去或有譏林宗不絕惡人者對曰人而不仁疾之已甚亂也原後忽更懷忿結客欲報諸生其日林宗在學原愧負前言因遂罷去後事露眾人咸謝服焉茅容字季偉陳留人也年四十餘耕於野時與等輩避雨樹下眾皆夷踞相對容獨危坐愈恭林宗行見之而奇其異遂與共言因請寓宿旦日容殺雞為饌林宗謂為己設既而以供其母自以草蔬與客同飯林宗起拜之曰卿賢乎哉因勸令學卒以成德孟敏字叔達鉅鹿楊氏人也客居太原荷甑墯地不顧而去林宗見而問其意對曰甑已破矣視之何益林宗以此異之因勸令遊學十年知名三公俱辟並不屈云庾乘字世遊潁川鄢陵人也少給事縣廷為門士林宗見而拔之勸遊學官遂為諸生傭後能講論自以卑第每處下坐諸生博士皆就讎問由是學中以坐下為貴後徵辟並不起號曰徵君宋果字仲乙扶風人也性輕悍憙與人報讎為郡縣所疾林宗乃訓之義方懼以禍敗果感悔叩頭謝罪遂改節自敕後以烈氣聞辟公府侍御史并州刺史所在能治賈淑字子厚林宗鄉人也雖世有冠冕而性險害邑里患之林宗遭母憂淑來修弔既而鉅鹿孫威直亦至威直以林宗賢而受惡人弔心怪之不進而去林宗追而謝之曰賈子厚誠實凶德然洗心向善仲尼不逆互鄉故吾許其進也淑聞之改過自厲終成善士鄉里有憂患者淑輒傾身營救為州閭所稱史叔賓者陳留人也少有盛名林宗見而告人曰牆高基下雖得必失後果以論議阿枉敗名云黃允字子艾濟陰人也以雋才知名林宗見而謂曰卿有絕人之才足成偉器然恐守道不篤將失之矣後司徒袁隗欲為從女求姻見允而歎曰得壻如是足矣允聞而黜遣其妻夏侯氏婦謂姑曰今當見棄方與黃氏長辭乞一會親屬以展離訣之情於是大集賓客三百餘人婦中坐攘袂數允隱匿穢惡十五事言畢登車而去允以此廢於時謝甄字子微汝南召陵人也與陳留邊讓並善談論俱有盛名每共候林宗未嘗不連日達夜林宗謂門人曰二子英才有餘而並不入道惜乎甄後不拘細行為時所毀讓以輕侮曹操操殺之王柔字叔優弟澤字季道林宗同郡晉陽縣人也兄弟總角共候林宗以訪才行所宜林宗曰叔優當以仕進顯季道當以經術通然違方改務亦不能至也後果如所言柔為護匈奴中郎將澤為代郡太守又識張孝仲芻牧之中知范特祖郵置之役召公子許偉康並出屠沽司馬子威拔自卒伍及同郡郭長信王長文韓文布李子政曹子元定襄周康子西河王季然雲中丘季智郝禮真等六十人並以成名論曰莊周有言人情險於山川以其動靜可識而沈阻難徵故深厚之性詭於情貌則哲之鑒惟帝所難而林宗雅俗無所失將其名姓特有主乎然而遜言危行終亨時晦恂恂善導使士慕成名雖墨孟之徒不能絕也符融符融字偉明陳留浚儀人也少為都官吏恥之委去後遊太學師事少府李膺膺風性高簡每見融輒絕它賓客聽其言論融幅巾奮袖談辭如雲膺每捧手歎息郭林宗始入京師時人莫識融一見嗟服因以介於李膺由是知名時漢中晉文經梁國王子艾並恃其才智炫曜上京臥託養疾無所通接洛中士大夫好事者承其聲名坐門問疾猶不得見三公所辟召者輒以詢訪之隨所臧否以為與奪融察其非真乃到太學并見李膺曰二子行業無聞以豪傑自置遂使公卿問疾王臣坐門融恐其小道破義空譽違實特宜察焉膺然之二人自是名論漸衰賓徒稍省旬日之間慚歎逃去後果為輕薄子並以罪廢棄融益以知名州郡禮請舉孝廉公府連辟皆不應太守馮岱有名稱到官請融相見融一往薦達郡士范冉韓卓孔冑等三人因辭病自絕會有黨事亦遭禁錮妻亡貧無殯斂鄉人欲為具棺服融不肯受曰古之亡者棄之中野唯妻子可以行志但即土埋藏而已融同郡田盛字仲嚮與郭林宗同好亦名知人優遊不仕並以壽終許劭許劭字子將汝南平輿人也少俊名節好人倫多所賞識若樊子昭和陽士者並顯名於世故天下言拔士者咸稱許郭初為郡功曹太守徐璆甚敬之府中聞子將為吏莫不改操飾行同郡袁紹公族豪俠去濮陽令歸車徒甚盛將入郡界乃謝遣賓客曰吾輿服豈可使許子將見遂以單車歸家劭常到潁川多長者之遊唯不候陳寔又陳蕃喪妻還葬鄉人畢至而劭獨不往或問其故劭曰太丘道廣廣則難周仲舉性峻峻則少通故不造也其多所裁量若此曹操微時常卑辭厚禮求為己目劭鄙其人而不肯對操乃伺隙脅劭劭不得已曰君清平之姦賊亂世之英雄操大悅而去劭從祖敬敬子訓訓子相並為三公相以能諂事宦官故自致台司封侯數遣請劭劭惡其薄行終不候之劭邑人李逵壯直有高氣劭初善之而後為隙又與從兄靖不睦時議以此少之初劭與靖俱有高名好共覈論鄉黨人物每月輒更其品題故汝南俗有月旦評焉司空楊彪辟舉方正敦樸徵皆不就或勸劭仕對曰方今小人道長王室將亂吾欲避地淮海以全老幼乃南到廣陵徐州刺史陶謙禮之甚厚劭不自安告其徒曰陶恭祖外慕聲名內非真正待吾雖厚其埶必薄不如去之遂復投揚州刺史劉繇於曲阿其後陶謙果捕諸寓士及孫策平吳劭與繇南奔豫章而卒時年四十六兄虔亦知名汝南人稱平輿淵有二龍焉贊曰林宗懷寶識深甄藻明發周流永言時道符融鑒真子將人倫守節好恥並亦逡巡
