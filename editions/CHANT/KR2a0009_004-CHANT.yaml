body:
  text: 卷三肅宗孝章皇帝諱炟顯宗第五子也母賈貴人永平三年立為皇太子少寬容好儒術顯宗器重之十八年八月壬子即皇帝位年十九尊皇后曰皇太后壬戌葬孝明皇帝于顯節陵冬十月丁未大赦天下賜民爵人二級為父後及孝悌力田人三級脫無名數及流人欲占者人一級爵過公乘得移與子若同產子鰥寡孤獨篤癃貧不能自存者粟人三斛詔曰朕以眇身託于王侯之上統理萬機懼失厥中兢兢業業未知所濟深惟守文之主必建師傅之官詩不云乎不愆不忘率由舊章行太尉事節鄉侯憙三世在位為國元老司空融典職六年勤勞不怠其以憙為太傅融為太尉並錄尚書事三事大夫莫肯夙夜小雅之所傷也予違汝弼汝無面從股肱之正義也群后百僚勉思厥職各貢忠誠以輔不逮申敕四方稱朕意焉十一月戊戌蜀郡太守第五倫為司空詔征西將軍耿秉屯酒泉遣酒泉太守段彭救戊己校尉耿恭甲辰晦日有食之於是避正殿寢兵不聽事五日詔有司各上封事十二月癸巳有司奏言孝明皇帝聖德淳茂劬勞日身御浣衣食無兼珍澤臻四表遠人慕化僬僥儋耳款塞自至克伐鬼方開道西域威靈廣被無思不服曰烝庶為憂不以天下為樂備三雍之教躬養老之禮作登歌正雅樂博貫六蓺不舍晝夜聰明淵塞著在圖讖至德所感通於神明功烈光於四海仁風行於千載而深執謙謙自稱不德無起寢廟埽地而祭除日祀之法省送終之禮遂藏主於光烈皇后更衣別室天下聞之莫不悽愴陛下至孝烝烝奉順聖德臣愚以為更衣在中門之外處所殊別宜尊廟曰顯宗其四時禘祫於光武之堂閒祀悉還更衣共進武德之舞如孝文皇帝祫祭高廟故事制曰可是歲牛疫京師及三州大旱詔勿收兗豫徐州田租芻稾其以見穀賑給貧人建初元年春正月詔三州郡國方春東作恐人稍受稟往來煩劇或妨耕農其各實覈尤貧者計所貸并與之流人欲歸本者郡縣其實稟令足還到聽過止官亭無雇舍宿長吏親躬無使貧弱遺脫小吏豪右得容姦妄詔書既下勿得稽留刺史明加督察尤無狀者丙寅詔曰比年牛多疾疫墾田減少穀價頗貴人以流亡方春東作宜及時務二千石勉勸農桑弘致勞來群公庶尹各推精誠專急人事罪非殊死須立秋案驗有司明慎選舉進柔良退貪猾順時令理冤獄五教在寬帝典所美愷悌君子大雅所歎布告天下使明知朕意酒泉太守段彭討擊車師大破之罷戊己校尉官二月武陵灃中蠻叛三月甲寅山陽東平地震己巳詔曰朕以無德奉承大業夙夜慄慄不敢荒寧而災異仍見與政相應朕既不明涉道日寡又選舉乖實俗吏傷人官職耗亂刑罰不中可不憂與昔仲弓季氏之家臣子游武城之小宰孔子猶誨以賢才問以得人明政無大小以得人為本夫鄉舉里選必累功勞今刺史守相不明真偽茂才孝廉歲以百數既非能顯而當授之政事甚無謂也每尋前世舉人貢士或起甽畝不繫閥閱敷奏以言則文章可採明試以功則政有異迹文質彬彬朕甚嘉之其令太傅三公中二千石二千石郡國守相舉賢良方正能直言極諫之士各一人夏五月辛酉初舉孝廉郎中寬博有謀任典城者以補長相秋七月辛亥詔以上林池籞田賦與貧人八月庚寅有星孛于天市九月永昌哀牢夷叛冬十月武陵郡兵討叛蠻破降之十一月阜陵王延謀反貶為阜陵侯二年春三月辛丑詔曰比年陰陽不調饑饉屢臻深惟先帝憂人之本詔書曰不傷財不害人誠欲元元去末歸本而今貴戚近親奢縱無度嫁娶送終尤為僭侈有司廢典莫肯舉察春秋之義以貴理賤今自三公並宜明糾非法宣振威風朕在弱冠未知稼穡之艱難區區管窺豈能照一隅哉其科條制度所宜施行在事者備為之禁先京師而後諸夏甲辰罷伊吾盧屯兵永昌越雟益州三郡民夷討哀牢破平之夏四月戊子詔還坐楚淮陽事徙者四百餘家令歸本郡癸巳詔齊相省冰紈方空縠吹綸絮六月燒當羌叛金城太守郝崇討之敗績羌遂寇漢陽秋八月遣行車騎將軍馬防討平之十二月戊寅有星孛于紫宮三年春正月己酉宗祀明堂禮畢登靈臺望雲物大赦天下三月癸巳立貴人竇氏為皇后賜爵人二級三老孝悌力田人三級民無名數及流民欲占者人一級鰥寡孤獨篤癃貧不能自存者粟人五斛夏四月己巳罷常山呼沱石臼河漕行車騎將軍馬防破燒當羌於臨洮閏月西域假司馬班超擊姑墨大破之冬十二月丁酉以馬防為車騎將軍武陵漊中蠻叛是歲零陵獻芝草四年春二月庚寅太尉牟融薨夏四月戊子立皇子慶為皇太子賜爵人二級三老孝悌力田人三級民無名數及流人欲自占者人一級鰥寡孤獨篤癃貧不能自存者粟人五斛己丑徙鉅鹿王恭為江陵王汝南王暢為梁王常山王昞為淮陽王辛卯封皇子伉為千乘王全為平春王五月丙辰車騎將軍馬防罷甲戌司徒鮑昱為太尉南陽太守桓虞為司徒六月癸丑皇太后馬氏崩秋七月壬戌葬明德皇后冬牛大疫十一月壬戌詔曰蓋三代導人教學為本漢承暴秦襃顯儒術建立五經為置博士其後學者精進雖曰承師亦別名家孝宣皇帝以為去聖久遠學不厭博故遂立大小夏侯尚書後又立京氏易至建武中復置顏氏嚴氏春秋大小戴禮博士此皆所以扶進微學尊廣道蓺也中元元年詔書五經章句煩多議欲減省至永平元年長水校尉儵奏言先帝大業當以時施行欲使諸儒共正經義頗令學者得以自助孔子曰學之不講是吾憂也又曰博學而篤志切問而近思仁在其中矣於戲其勉之哉於是下太常將大夫博士議郎郎官及諸生諸儒會白虎觀講議五經同異使五官中郎將魏應承制問侍中淳于恭奏帝親稱制臨決如孝宣甘露石渠故事作白虎議奏是歲甘露降泉陵洮陽二縣五年春二月庚辰朔日有食之詔曰朕新離供養愆咎眾著上天降異大變隨之詩不云乎亦孔之醜又久旱傷麥憂心慘切公卿已下其舉直言極諫能指朕過失者各一人遣詣公車將親覽問焉其以巖穴為先勿取浮華甲申詔曰春秋書無麥苗重之也去秋雨澤不適今時復旱如炎如焚凶年無時而為備未至朕之不德上累三光震慄忉忉痛心疾首前代聖君博思咨諏雖降災咎輒有開匱反風之應令予小子徒慘慘而已其令二千石理冤獄錄輕繫禱五嶽四瀆及名山能興雲致雨者冀蒙不崇朝徧雨天下之報務加肅敬焉三月甲寅詔曰孔子曰刑罰不中則人無所措手足今吏多不良擅行喜怒或案不以罪迫脅無辜致令自殺者一歲且多於斷獄甚非為人父母之意也有司其議糾舉之荊豫諸郡兵討破武陵漊中叛蠻夏五月辛亥詔曰朕思遲直士側席異聞其先至者各以發憤吐懣略聞子大夫之志矣皆欲置於左右顧問省納建武詔書又曰堯試臣以職不直以言語筆札今外官多曠並可以補任戊辰太傅趙憙薨冬始行月令迎氣樂是歲零陵獻芝草有八黃龍見於泉陵西域假司馬班超擊疏勒破之六年春二月辛卯琅邪王京薨夏五月辛酉趙王盱薨六月丙辰太尉鮑昱薨辛未晦日有食之秋七月癸巳以大司農鄧彪為太尉七年春正月沛王輔濟南王康東平王蒼中山王焉東海王政琅邪王宇來朝夏六月甲寅廢皇太子慶為清河王立皇子肇為皇太子己未徙廣平王羨為西平王秋八月飲酎高廟禘祭光武皇帝孝明皇帝甲辰詔曰書云祖考來假明哲之祀予末小子質又菲薄仰惟先帝烝烝之情前修禘祭以盡孝敬朕得識昭穆之序寄遠祖之思今年大禮復舉加以先帝之坐悲傷感懷樂以迎來哀以送往雖祭亡如在而空虛不知所裁庶或饗之豈亡克慎肅雍之臣辟公之相皆助朕之依依今賜公錢四十萬卿半之及百官執事各有差九月甲戌幸偃師東涉卷津至河內下詔曰車駕行秋稼觀收穫因涉郡界皆精騎輕行無它輜重不得輒修道橋遠離城郭遣吏逢迎刺探起居出入前後以為煩擾動務省約但患不能脫粟瓢飲耳所過欲令貧弱有利無違詔書遂覽淇園己酉進幸鄴勞饗魏郡守令已下至于三老門闌走卒賜錢各有差勞賜常山趙國吏人復元氏租賦三歲辛卯車駕還宮詔天下繫囚減死一等勿笞詣邊戍妻子自隨占著所在父母同產欲相從者恣聽之有不到者皆以乏軍興論及犯殊死一切募下蠶室其女子宮繫囚鬼薪白粲已上皆減本罪各一等輸司寇作亡命贖死罪入縑二十匹右趾至髡鉗城旦舂十匹完城旦至司寇三匹吏人有罪未發覺詔書到自告者半入贖冬十月癸丑西巡狩幸長安丙辰祠高廟遂有事十一陵遣使者祠太上皇於萬年以中牢祠蕭何霍光進幸槐里岐山得銅器形似酒樽獻之又獲白鹿帝曰上無明天子下無賢方伯人之無良相怨一方斯器亦曷為來哉又幸長平御池陽宮東至高陵造舟於涇而還每所到幸輒會郡縣吏人勞賜作樂十一月詔勞賜河東守令掾以下十二月丁亥車駕還宮是歲京師及郡國螟八年春正月壬辰東平王蒼薨三月辛卯葬東平憲王賜鑾輅龍旂夏六月北匈奴大人率眾款塞降冬十二月甲午東巡狩幸陳留梁國淮陽潁陽戊申車駕還宮詔曰五經剖判去聖彌遠章句遺辭乖疑難正恐先師微言將遂廢絕非所以重稽古求道真也其令群儒選高才生受學左氏穀梁春秋古文尚書毛詩以扶微學廣異義焉是歲京師及郡國螟元和元年春正月中山王焉來朝日南徼外蠻夷獻生犀白雉閏月辛丑濟陰王長薨二月甲戌詔曰王者八政以食為本故古者急耕稼之業致耒耜之勤節用儲蓄以備凶災是以歲雖不登而人無饑色自牛疫已來穀食連少良繇吏教未至刺史二千石不以為負其令郡國募人無田欲徙它界就肥饒者恣聽之到在所賜給公田為雇耕傭賃種餉貰與田器勿收租五歲除算三年其後欲還本鄉者勿禁夏四月己卯分東平國封憲王蒼子尚為任城王六月辛酉沛王輔薨秋七月丁未詔曰律云掠者唯得榜笞立又令丙箠長短有數自往者大獄已來掠考多酷鉆鑽之屬慘苦無極念其痛毒怵然動心書曰鞭作官刑豈云若此宜及秋冬理獄明為其禁八月甲子太尉鄧彪罷大司農鄭弘為太尉癸酉詔曰朕道化不德吏政失和元元未諭抵罪於下寇賊爭心不息邊野邑屋不修永惟庶事思稽厥衷與凡百君子共弘斯道中心悠悠將何以寄其改建初九年為元和元年郡國中都官繫囚減死一等勿笞詣邊縣妻子自隨占著在所其犯殊死一切募下蠶室其女子宮繫囚鬼薪白粲以上皆減本罪一等輸司寇作亡命者贖各有差丁酉南巡狩詔所經道上郡縣無得設儲跱命司空自將徒支柱橋梁有遣使奉迎探知起居二千石當坐其賜鰥寡孤獨不能自存者粟人五斛九月乙未東平王忠薨辛丑幸章陵祠舊宅園廟見宗室故人賞賜各有差冬十月己未進幸江陵詔廬江太守祠南嶽又詔長沙零陵太守祠長沙定王舂陵節侯鬱林府君還幸宛十一月己丑車駕還宮賜從者各有差十二月壬子詔曰書云父不慈子不祗兄不友弟不恭不相及也往者妖言大獄所及廣遠一人犯罪禁至三屬莫得垂纓仕宦王朝如有賢才而沒齒無用朕甚憐之非所謂與之更始也諸以前妖惡禁錮者一皆蠲除之以明棄咎之路但不得在宿衛而已二年春正月乙酉詔曰令云人有產子者復勿筭三歲今諸懷妊者賜胎養穀人三斛復其夫勿算一歲著以為令又詔三公曰方春生養萬物莩甲宜助萌陽以育時物其令有司罪非殊死且勿案驗及吏人條書相告不得聽受冀以息事寧人敬奉天氣立秋如故夫俗吏矯飾外貌似是而非揆之人事則悅耳論之陰陽則傷化朕甚饜之甚苦之安靜之吏悃愊無華日計不足月計有餘如襄城令劉方吏人同聲謂之不煩雖未有它異斯亦殆近之矣間敕二千石各尚寬明而今富姦行賂於下貪吏枉法於上使有罪不論而無過被刑甚大逆也夫以苛為察以刻為明以輕為德以重為威四者或興則下有怨心吾詔書數下冠蓋接道而吏不加理人或失職其咎安在勉思舊令稱朕意焉二月甲寅始用四分歷詔曰今山川鬼神應典禮者尚未咸秩其議增修群祀以祈豐年丙辰東巡狩己未鳳皇集肥城乙丑帝耕於定陶詔曰三老尊年也孝悌淑行也力田勤勞也國家甚休之其賜帛人一匹勉率農功使使者祠唐堯於成陽靈臺辛未幸太山柴告岱宗有黃鵠三十從西南來經祠壇上東北過于宮屋翱翔升降進幸奉高壬申宗祀五帝于汶上明堂癸酉告祠二祖四宗大會外內群臣丙子詔曰朕巡狩岱宗柴望山川告祠明堂以章先勳其二王之後先聖之胤東后蕃衛伯父伯兄仲叔季弟幼子童孫百僚從臣宗室眾子要荒四裔沙漠之北葱領之西冒耏之類跋涉懸度陵踐阻絕駿奔郊畤咸來助祭祖宗功德延及朕躬予一人空虛多疚纂承尊明盥洗享薦慚愧祗慄詩不云乎君子如祉亂庶遄已歷數既從靈燿著明亦欲與士大夫同心自新其大赦天下諸犯罪不當得赦者皆除之復博奉高嬴無出今年田租芻稾戊寅進幸濟南三月己丑進幸魯祠東海恭王陵庚寅祠孔子於闕里及七十二弟子賜襃成侯及諸孔男女帛壬辰進幸東平祠憲王陵甲午遣使者祠定陶太后恭王陵乙未幸東阿北登太行山至天井關夏四月乙巳客星入紫宮乙卯車駕還宮庚申假于祖禰告祠高廟五月戊申詔曰乃者鳳皇黃龍鸞鳥比集七郡或一郡再見及白烏神雀甘露屢臻祖宗舊事或班恩施其賜天下吏爵人三級高年鰥寡孤獨帛人一匹經曰無侮鰥寡惠此煢獨加賜河南女子百戶牛酒令天下大酺五日賜公卿已下錢帛各有差及洛陽人當酺者布戶一匹城外三戶共一匹賜博士員弟子見在太學者布人三匹令郡國上明經者口十萬以上五人不滿十萬三人改廬江為六安國江陵復為南郡徙江陵王恭為六安王秋七月庚子詔曰春秋於春每月書王者重三正慎三微也律十二月立春不以報囚月令冬至之後有順陽助生之文而無鞠獄斷刑之政朕咨訪儒雅稽之典籍以為王者生殺宜順時氣其定律無以十一月十二月報囚九月壬辰詔鳳皇黃龍所見亭部無出二年租賦加賜男子爵人二級先見者帛二十匹近者三匹太守三十匹令長十五匹丞尉半之詩云雖無德與汝式歌且舞它如賜爵故事丙申徵濟南王康中山王焉會烝祭冬十一月壬辰日南至初閉關梁三年春正月乙酉詔曰蓋君人者視民如父母有憯怛之憂有中和之教匍匐之救其嬰兒無父母親屬及有子不能養食者稟給如律丙申北巡狩濟南王康中山王焉西平王羨六安王恭樂成王黨淮陽王昞任城王尚沛王定皆從辛丑帝耕于懷二月壬寅告常山魏郡清河鉅鹿平原東平郡太守相曰朕惟巡狩之制以宣聲教考同遐邇解釋怨結也今四國無政不用其良駕言出游欲親知其劇易前祠園陵遂望祀華霍東祡岱宗為人祈福今將禮常山遂徂北土歷魏郡經平原升踐隄防詢訪耆老咸曰往者汴門未作深者成淵淺則泥塗追惟先帝勤人之德底績遠圖復禹弘業聖跡滂流至于海表不克堂構朕甚慚焉月令孟春善相丘陵土地所宜今肥田尚多未有墾闢其悉以賦貧民給與糧種務盡地力勿令游手所過縣邑聽半入今年田租以勸農夫之勞乙丑敕侍御史司空曰方春所過無得有所伐殺車可以引避引避之騑馬可輟解輟解之詩云敦彼行葦牛羊勿踐履禮人君伐一草木不時謂之不孝俗知順人莫知順天其明稱朕意戊辰進幸中山遣使者祠北嶽出長城癸酉還幸元氏祠光武顯宗於縣舍正堂明日又祠顯宗于始生堂皆奏樂三月丙子詔高邑令祠光武於即位壇復元氏七年徭役己卯進幸趙庚辰祠房山於靈壽辛卯車駕還宮賜從行者各有差夏四月丙寅太尉鄭弘免大司農宋繇為太尉五月丙子司空第五倫罷太僕袁安為司空秋八月乙丑幸安邑觀鹽池九月至自安邑冬十月北海王基薨燒當羌叛寇隴西是歲西域長史班超擊斬疏勒王章和元年春三月護羌校尉傅育追擊叛羌戰歿夏四月丙子令郡國中都官繫囚減死一等詣金城戍六月戊辰司徒桓虞免癸卯司空袁安為司徒光祿勳任隗為司空秋七月癸卯齊王晃有罪貶為蕪湖侯壬子淮陽王昞薨鮮卑擊破北單于斬之燒當羌寇金城護羌校尉劉盱討之斬其渠帥壬戌詔曰朕聞明君之德啟迪鴻化緝熙康乂光照六幽訖惟人面靡不率俾仁風翔于海表威霆行乎鬼區然後敬恭明祀膺五福之慶獲來儀之貺朕以不德受祖宗弘烈乃者鳳皇仍集麒麟並臻甘露宵降嘉穀滋生芝草之類歲月不絕朕夙夜祗畏上天無以彰于先功今改元和四年為章和元年秋令是月養衰老授几杖行糜粥飲食其賜高年二人共布帛各一匹以為醴酪死罪囚犯法在丙子赦前而後捕繫者皆減死勿笞詣金城戍八月癸酉南巡狩壬午遣使者祠昭靈后於小黃園甲申徵任城王尚會雎陽戊子幸梁己丑遣使祠沛高原廟豐枌榆社乙未幸沛祠獻王陵徵會東海王政乙未晦日有食之九月庚子幸彭城東海王政沛王定任城王尚皆從辛亥幸壽春壬子詔郡國中都官繫囚減死罪一等詣金城戍犯殊死者一切募下蠶室其女子宮繫囚鬼薪白粲已上減罪一等輸司寇作亡命者贖死罪縑二十匹右趾至髡鉗城旦舂七匹完城旦至司寇三匹吏民犯罪未發覺詔書到自告者半入贖復封阜陵侯延為阜陵王己未幸汝陰冬十月丙子車駕還宮北匈奴屋蘭儲等率眾降是歲西域長史班超擊莎車大破之月氏國遣使獻扶拔師子二年春正月濟南王康阜陵王延中山王焉來朝二月壬辰帝崩於章德前殿年三十三遺詔無起寢廟一如先帝法制論曰魏文帝稱明帝察察章帝長者章帝素知人厭明帝苛切事從寬厚感陳寵之義除慘獄之科深元元之愛著胎養之令奉承明德太后盡心孝道割裂名都以崇建周親平徭簡賦而人賴其慶又體之以忠恕文之以禮樂故迺蕃輔克諧群后德讓謂之長者不亦宜乎在位十三年郡國所上符瑞合於圖書者數百千所嗚呼懋哉贊曰肅宗濟濟天性愷悌於穆后德諒惟淵體左右蓺文斟酌律禮思服帝道弘此長懋儒館獻歌戎亭虛候氣調時豫憲平人富
