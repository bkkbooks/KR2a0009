body:
  text: 禮儀中立夏立夏之日夜漏未盡五刻京都百官皆衣赤至季夏衣黃郊其禮祠特祭竈請雨自立春至立夏盡立秋郡國上雨澤若少郡縣各埽除社稷其旱也公卿官長以次行雩禮求雨閉諸陽衣皁興土龍立土人舞僮二佾七日一變如故事反拘朱索縈社伐朱鼓禱賽以少牢如禮拜皇太子拜皇太子之儀百官會位定謁者引皇太子當御坐殿下北面司空當太子西北東面立讀策書畢中常侍持皇太子璽綬東向授太子太子再拜三稽首謁者贊皇太子臣某中謁者稱制曰可三公升階上殿賀壽萬歲因大赦天下供賜禮畢罷拜王公拜諸侯王公之儀百官會位定謁者引光祿勳前謁者引當拜者前當坐伏殿下光祿勳前一拜舉手曰制詔其以某為某讀策書畢謁者稱臣某再拜尚書郎以璽印綬付侍御史侍御史前東面立授璽印綬王公再拜頓首三贊謁者曰某王臣某新封某公某初除謝中謁者報謹謝贊者立曰皇帝為公興重坐受策者拜謝起就位供賜禮畢罷桃印仲夏之月萬物方盛日夏至陰氣萌作恐物不楙其禮以朱索連葷菜彌牟朴蠱鍾以桃印長六寸方三寸五色書文如法以施門戶代以所尚為飾夏后氏金行作葦茭言氣交也殷人水德以螺首慎其閉塞使如螺也周人木德以桃為更言氣相更也漢兼用之故以五月五日朱索五色印為門戶飾以難止惡氣日夏至禁舉大火止炭鼓鑄消石冶皆絕止至立秋如故事是日浚井改水日冬至鑽燧改火云黃郊先立秋十八日郊黃帝是日夜漏未盡五刻京都百官皆衣黃至立秋迎氣於黃郊樂奏黃鍾之宮歌帝臨冕而執干戚舞雲翹育命所以養時訓也立秋立秋之日夜漏未盡五刻京都百官皆衣白施皁領緣中衣迎氣於白郊禮畢皆衣絳至立冬貙劉立秋之日白郊禮畢始揚威武斬牲於郊東門以薦陵廟其儀乘輿御戎路白馬朱鬣躬執弩射牲牲以鹿麛太宰令謁者各一人載以獲車馳送陵廟於是乘輿還宮遣使者齎束帛以賜武官武官肄兵習戰陣之儀斬牲之禮名曰貙劉兵官皆肄孫吳兵法六十四陣名曰乘之立春遣使者齎束帛以賜文官貙劉之禮祠先虞執事告先虞已烹鮮時有司告乃逡巡射牲獲車畢有司告事畢案戶仲秋之月縣道皆案戶比民年始七十者授之以玉杖餔之糜粥八十九十禮有加賜玉杖長九尺端以鳩鳥為飾鳩者不噎之鳥也欲老人不噎是月也祀老人星于國都南郊老人廟祠星季秋之月祠星于城南壇心星廟立冬立冬之日夜漏未盡五刻京都百官皆衣皁迎氣於黑郊禮畢皆衣絳至冬至絕事冬至冬至前後君子安身靜體百官絕事不聽政擇吉辰而後省事絕事之日夜漏未盡五刻京都百官皆衣絳至立春諸王時變服執事者先後其時皆一日日冬至夏至陰陽晷景長短之極微氣之所生也故使八能之士八人或吹黃鍾之律間竽或撞黃鍾之鍾或度晷景權水輕重水一升冬重十三兩或擊黃鍾之磬或鼓黃鍾之瑟軫間九尺二十五絃宮處于中左右為商徵角羽或擊黃鍾之鼓先之三日太史謁之至日夏時四孟冬則四仲其氣至焉先氣至五刻太史令與八能之士即坐于端門左塾大予具樂器夏赤冬黑列前殿之前西上鍾為端守宮設席于器南北面東上正德席鼓南西面令晷儀東北三刻中黃門持兵引太史令八能之士入自端門就位二刻侍中尚書御史謁者皆陛一刻乘輿親御臨軒安體靜居以聽之太史令前當軒溜北面跪舉手曰八能之士以備請行事制曰可太史令稽首曰諾起立少退顧令正德曰可行事正德曰諾皆旋復位正德立命八能士曰以次行事間音以竽八能曰諾五音各三十為闋正德曰合五音律先唱五音並作二十五闋皆音以竽訖正德曰八能士各言事八能士各書板言事文曰臣某言今月若干日甲乙日冬至黃鍾之音調君道得孝道襃商臣角民徵事羽物各一板否則召太史令各板書封以皁囊送西陛跪授尚書施當軒北面稽首拜上封事尚書授侍中常侍迎受報聞以小黃門幡麾節度太史令前白禮畢制曰可太史令前稽首曰諾太史命八能士詣太官受賜陛者以次罷日夏至禮亦如之臘季冬之月星迴歲終陰陽以交勞農大享臘大儺先臘一日大儺謂之逐疫其儀選中黃門子弟年十歲以上十二以下百二十人為侲子皆赤幘皁製執大鼗方相氏黃金四目蒙熊皮玄衣朱裳執戈揚盾十二獸有衣毛角中黃門行之冗從僕射將之以逐惡鬼于禁中夜漏上水朝臣會侍中尚書御史謁者虎賁羽林郎將執事皆赤幘陛衛乘輿御前殿黃門令奏曰侲子備請逐疫於是中黃門倡侲子和曰甲作食凶胇胃食虎雄伯食魅騰簡食不祥攬諸食咎伯奇食夢強梁祖明共食磔死寄生委隨食觀錯斷食巨窮奇騰根共食蠱凡使十二神追惡凶赫女軀拉女幹節解女肉抽女肺腸女不急去後者為糧因作方相與十二獸舞嚾呼周徧前後省三過持炬火送疫出端門門外騶騎傳炬出宮司馬闕門門外五營騎士傳火棄雒水中百官官府各以木面獸能為儺人師訖設桃梗鬱櫑葦茭畢執事陛者罷葦戟桃杖以賜公卿將軍特侯諸侯云土牛是月也立土牛六頭於國都郡縣城外丑地以送大寒遣衛士饗遣故衛士儀百官會位定謁者持節引故衛士入自端門衛司馬執幡鉦護行行定侍御史持節慰勞以詔恩問所疾苦受其章奏所欲言畢饗賜作樂觀以角抵樂闋罷遣勸以農桑朝會每歲首正月為大朝受賀其儀夜漏未盡七刻鍾鳴受賀及贄公侯璧中二千石二千石羔千石六百石鴈四百石以下雉百官賀正月二千石以上上殿稱萬歲舉觴御坐前司空奉羹大司農奉飯奏食舉之樂百官受賜宴饗大作樂其每朔唯十月旦從故事者高祖定秦之月元年歲首也
