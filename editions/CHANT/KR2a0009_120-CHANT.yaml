body:
  text: 右豫州潁川潁川郡十七城戶二十六萬三千四百四十口百四十三萬六千五百一十三陽翟禹所都有鈞臺有高氏亭有雍氏城襄有養陰里襄城有西不羹有氾城有汾丘有魚齒山昆陽有湛水定陵有東不羹舞陽邑郾臨潁潁陽潁陰有狐宗鄉或曰古狐人亭有岸亭許新汲𨻳陵春秋時曰𨻳長社有長葛城有向鄉有蜀城有蜀津陽城有嵩高山洧水潁水出有鐵有負黍聚父城有應鄉輪氏建初四年置汝南郡三十七城戶四十萬四千四百四十八口二百一十萬七百八十八平輿有沈亭故國姬姓新陽侯國西平有鐵有柏亭故柏國上蔡本蔡國南頓本頓國汝陰本胡國汝陽新息侯國北宜春㶏強侯國灈陽期思有蔣鄉故蔣國陽安有道亭故國項西華細陽安城侯國有武城亭吳房有棠谿亭鮦陽侯國慎陽慎新蔡有大呂亭安陽侯國有江亭故國嬴姓富波侯國永元中復宜祿永元中復朗陵侯國弋陽侯國有黃亭故黃國嬴姓召陵有陘亭有安陵鄉征羌侯國有安陵亭思善侯國宋公國周名郪丘漢改為新郪章帝建初四年徙宋公於此有繁陽亭褒信侯國有賴亭故國原鹿侯國定潁侯國固始侯國故寢也光武中興更名有寢丘山桑侯國故屬沛有下城父聚有垂惠聚城父故屬沛春秋時曰夷有章華臺梁國梁國九城戶八萬三千三百口四十三萬一千二百八十三下邑雎陽本宋國閼伯墟有盧門亭有魚門有陽梁聚虞有空桐地有桐地有桐亭有綸城少康邑碭山出文石蒙有蒙澤穀熟有新城有邳亭𨻳故屬陳留寧陵故屬陳留有葛鄉故葛伯國薄故屬山陽湯所都沛國沛國二十一城戶二十萬四百九十五口二十五萬一千三百九十三相蕭本國沛有泗水亭豐西有大澤高祖斬白蛇於此有枌榆亭酇有鄍聚穀陽譙刺史治洨有垓下聚蘄有大澤鄉陳涉起此銍鄲建平臨雎故芒光武更名竹邑侯國故竹公丘本滕國龍亢向本國符離紅太丘杼秋故屬梁國有澶淵聚陳國陳國九城戶十一萬二千六百五十三口百五十四萬七千五百七十二陳陽夏有固陵聚寧平苦春秋時曰相有賴鄉柘新平扶樂武平長平故屬汝南有辰亭有赭丘城魯國魯國六城戶七萬八千四百四十七口四十一萬一千五百九十魯國古奄國有大庭氏庫有鐵有闕里孔子所居有牛首亭有五父衢騶本邾國蕃有南梁水薛本國六國時曰徐州卞有盜泉有郚鄉城汶陽右豫州右豫州刺史部郡國六縣邑公侯國九十九魏郡魏郡十五城戶十二萬九千三百一十口六十九萬五千六百六鄴有故大河有滏水有汙水有汙城有平陽城有武城有九侯城繁陽內黃清河水出有羛陽聚有黃澤魏元城五鹿墟故沙鹿有沙亭黎陽陰安邑館陶清淵平恩沙侯國斥丘有葛武安有鐵曲梁侯國故屬廣平有雞澤梁期鉅鹿鉅鹿郡十五城戶十萬九千五百一十七口六十萬二千九十六廮陶有薄落亭鉅鹿故大鹿有大陸澤楊氏鄡下曲陽有鼓聚故翟鼓子國有昔陽亭任南和廣平斥章廣宗曲周列人廣年平鄉南蠻常山國十三城戶九萬七千五百口六十三萬一千一百八十四元氏高邑故鄗光武更名刺史治有千秋亭五成陌光武即位於此矣都鄉侯國有鐵南行唐有石臼谷房子贊皇山濟水所出平棘有塞欒城九門靈壽衛水出蒲吾井陘真定上艾故屬太原中山中山國十三城戶九萬七千四百一十二口六十五萬八千一百九十五盧奴北平有鐵毋極新市有鮮虞亭故國子姓望都唐有中人亭有左人鄉安國安熹本安險章帝更名漢昌本苦陘章帝更名蠡吾侯國故屬涿上曲陽故屬常山恒山在西北蒲陰本曲逆章帝更名有陽城廣昌故屬代郡安平安平國十三城戶九萬一千四百四十口六十五萬五千一百一十八信都有絳水呼沱河阜城故昌城南宮扶柳下博武邑觀津經西有漳水津名薄落津堂陽故屬鉅鹿武遂故屬河間饒陽故名饒屬涿有無蔞亭安平故屬涿南深澤故屬涿河閒河間國十一城戶九萬三千七百五十四口六十三萬四千四百二十一樂成弓高易故屬涿武垣故屬涿中水故屬涿鄚故屬涿高陽故屬涿有葛城文安故屬勃海束州故屬勃海成平故屬勃海東平舒故屬勃海清河清河國七城戶十二萬三千九百六十四口七十六萬四百一十八甘陵故厝安帝更名貝丘東武城鄃靈和帝永元九年復繹幕廣川故屬信都有棘津城趙國趙國五城戶三萬二千七百一十九口十八萬八千三百八十一邯鄲有叢臺易陽襄國本邢國秦為信都項羽更名有檀臺有蘇人亭柏人中丘勃海勃海郡八城戶十三萬二千三百八十九口百一十萬六千五百南皮高城侯國重合侯國浮陽侯國東光章武陽信延光元年復修故屬信都右冀州右冀州刺史部郡國九縣邑侯國百
