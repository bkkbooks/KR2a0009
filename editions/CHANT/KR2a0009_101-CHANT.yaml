body:
  text: 律曆上律準古之人論數也曰物生而後有象象而後有滋滋而後有數然則天地初形人物既著則算數之事生矣記稱大橈作甲子隸首作數二者既立以比日表以管萬事夫一十百千萬所同用也律度量衡曆其別用也故體有長短檢以度物有多少受以量量有輕重平以權衡聲有清濁協以律呂三光運行紀以曆數然後幽隱之情精微之變可得而綜也漢興北平侯張蒼首治律曆孝武正樂置協律之官至元始中博徵通知鍾律者考其意義羲和劉歆典領條奏前史班固取以為志而元帝時郎中京房知五聲之音六律之數上使太子太傅玄成諫議大夫章雜試問房於樂府房對受學故小黃令焦延壽六十律相生之法以上生下皆三生二以下生上皆三生四陽下生陰陰上生陽終於中呂而十二律畢矣中呂上生執始執始下生去滅上下相生終於南事六十律畢矣夫十二律之變至於六十猶八卦之變至於六十四也宓羲作易紀陽氣之初以為律法建日冬至之聲以黃鍾為宮太蔟為商姑洗為角林鍾為徵南呂為羽應鍾為變宮蕤賓為變徵此聲氣之元五音之正也故各統一日其餘以次運行當日者各自為宮而商徵以類從焉禮運篇曰五聲六律十二管還相為宮此之謂也以六十律分期之日黃鍾自冬至始及冬至而復陰陽寒燠風雨之占生焉於以檢攝群音考其高下苟非革木之聲則無不有所合虞書曰律和聲此之謂也房又曰竹聲不可以度調故作準以定數準之狀如瑟長丈而十三弦隱閒九尺以應黃鍾之律九寸中央一弦下有畫分寸以為六十律清濁之節房言律詳於歆所奏其術施行於史官候部用之文多不悉載故總其本要以績前志律術曰陽以圓為形其性動陰以方為節其性靜動者數三靜者數二以陽生陰倍之以陰生陽四之皆三而一陽生陰曰下生陰生陽曰上生上生不得過黃鍾之濁下生不得及黃鍾之清皆參天兩地圓蓋方覆六耦承奇之道也黃鍾律呂之首而生十二律者也其相生也皆三分而損益之是故十二律之得十七萬七千一百四十七是為黃鍾之實又以二乘而三約之是為下生林鍾之實又以四乘而三約之是為上生太蔟之實推此上下以定六十律之實以九三之得萬九千六百八十三為法於律為寸於準為尺不盈者十之所得為分又不盈十之所得為小分以其餘正其強弱黃鍾十七萬七千一百四十七下生林鍾黃鍾為宮太蔟商林鍾徵一日律九寸準九尺色育十七萬六千七百七十六下生謙待色育為宮未知商謙待徵六日律八寸九分小分八微強準八尺九寸萬五千九百七十三執始十七萬四千七百六十二下生去滅執始為宮時息商去滅徵六日律八寸八分小分七大強準八尺八寸萬五千五百一十六丙盛十七萬二千四百一十下生安度丙盛為宮屈齊商安度徵六日律八寸七分小分六微弱準八尺七寸萬一千六百七十九分動十七萬八十九下生歸嘉分動為宮隨期商歸嘉徵六日律八寸六分小分四強準八尺六寸八千一百五十二質末十六萬七千八百下生否與質末為宮形晉商否與徵六日律八寸五分小分二半強準八尺五寸四千九百四十五大呂十六萬五千八百八十八下生夷則大呂為宮夾鍾商夷則徵八日律八寸四分小分三弱準八尺四寸五千五百八分否十六萬三千六百五十四下生解形分否為宮開時商解形徵八日律八寸三分小分一強準八尺三寸二千八百五十一凌陰十六萬一千四百五十二下生去南凌陰為宮族嘉商去南徵八日律八寸二分小分一弱準八尺二寸五百一十四少出十五萬九千二百八十下生分積少出為宮爭南商分積徵六日律八寸小分九強準八尺萬八千一百六十太蔟十五萬七千四百六十四下生南呂太蔟為宮姑洗商南呂徵一日律八寸準八尺未知十五萬七千一百三十四下生白呂未知為宮南授商白呂徵六日律七寸九分小分八強準七尺九寸萬六千三百八十三時息十五萬五千三百四十四下生結躬時息為宮變虞商結躬徵六日律七寸八分小分九少強準七尺八寸萬八千一百六十六屈齊十五萬三千二百五十三下生歸期屈齊為宮路時商歸期徵六日律七寸七分小分九弱準七尺七寸萬六千九百三十九隨期十五萬一千一百九十下生未卯隨期為宮形始商未卯徵六日律七寸六分小分八強準七尺六寸萬五千九百九十二形晉十四萬九千一百五十六下生夷汗形晉為宮依行商夷汗徵六日律七寸五分小分八弱準七尺五寸萬五千三百三十五夾鍾十四萬七千四百五十六下生無射夾鍾為宮中呂商無射徵六日律七寸四分小分九強準七尺四寸萬八千一十八開時十四萬五千四百七十下生閉掩開時為宮南中商閉掩徵八日律七寸三分小分九微強準七尺三寸萬七千八百四十一族嘉十四萬三千五百一十三下生鄰齊族嘉為宮內負商鄰齊徵八日律七寸二分小分九微強準七尺二寸萬七千九百五十四爭南十四萬一千五百八十二下生期保爭南為宮物應商期保徵八日律七寸一分小分九強準七尺一寸萬八千三百二十七姑洗十三萬九千九百六十八下生應鍾姑洗為宮蕤賓商應鍾徵一日律七寸一分小分一微強準七尺一寸二千一百八十七南授十三萬九千六百七十四下生分烏南授為宮南事商分烏徵六日律七寸小分九大強準七尺萬八千九百三十變虞十三萬八千八十四下生遲內變虞為宮盛變商遲內徵六日律七寸小分一半強準七尺三千三十路時十三萬六千二百二十五下生未育路時為宮離宮商未育徵六日律六寸九分小分二微強準六尺九寸四千一百二十三形始十三萬四千三百九十二下生遲時形始為宮制時商遲時徵五日律六寸八分小分三弱準六尺八寸五千四百七十六依行十三萬二千五百八十二上生色育依行為宮謙待商色育徵七日律六寸七分小分三半強準六尺七寸七千五十九中呂十三萬一千七十二上生執始中呂為宮去滅商執始徵八日律六寸六分小分六弱準六尺六寸萬一千六百四十二南中十二萬九千三百八上生丙盛南中為宮安度商丙盛徵七日律六寸五分小分七微弱準六尺五寸萬三千六百八十五內負十二萬七千五百六十七上生分動內負為宮歸嘉商分動徵八日律六寸四分小分八微強準六尺四寸萬五千九百五十八物應十二萬五千八百五十上生質末物應為宮否與商質末徵七日律六寸三分小分九強準六尺三寸萬八千四百七十一蕤賓十二萬四千四百一十六上生大呂蕤賓為宮夷則商大呂徵一日律六寸三分小分二微強準六尺三寸四千一百三十一南事十二萬四千一百五十四不生南事窮無商徵不為宮七日律六寸三分小分一弱準六尺三寸一千五百一十一盛變十二萬二千七百四十一上生分否盛變為宮解形商分否徵七日律六寸二分小分三半強準六尺二寸七千六十四離宮十二萬一千八十九上生凌陰離宮為宮去南商凌陰徵七日律六寸一分小分五微強準六尺一寸萬二百二十七制時十一萬九千四百六十上生少出制時為宮分積商少出徵八日律六寸小分七弱準六尺萬三千六百二十林鍾十一萬八千九十八上生太蔟林鍾為宮南呂商太蔟徵一日律六寸準六尺謙待十一萬七千八百五十一上生未知謙待為宮白呂商未知徵五日律五寸九分小分九弱準五尺九寸萬七千二百一十三去滅十一萬六千五百八上生時息去滅為宮結躬商時息徵七日律五寸九分小分二弱準五尺九寸三千七百八十三安度十一萬四千九百四十上生屈齊安度為宮歸期商屈齊徵六日律五寸八分小分四微弱準五尺八寸七千七百八十六歸嘉十一萬三千三百九十三上生隨期歸嘉為宮未卯商隨期徵六日律五寸七分小分六微強準五尺七寸萬一千九百九十九否與十一萬一千八百六十七上生形晉否與為宮夷汗商形晉徵五日律五寸六分小分八強準五尺六寸萬六千四百二十二夷則十一萬五百九十二上生夾鍾夷則為宮無射商夾鍾徵八日律五寸六分小分二弱準五尺六寸三千六百七十二解形十萬九千一百三上生開時解形為宮閉掩商開時徵八日律五寸五分小分四強準五尺五寸八千四百六十五去南十萬七千六百三十五上生族嘉去南為宮鄰齊商族嘉徵八日律五寸四分小分六大強準五尺四寸萬三千四百六十八分積十萬六千一百八十七上生爭南分積為宮期保商爭南徵七日律五寸三分小分九半強準五尺三寸萬八千六百七十一南呂十萬四千九百七十六上生姑洗南呂為宮應鍾商姑洗徵一日律五寸三分小分三強準五尺三寸六千五百六十一白呂十萬四千七百五十六上生南授白呂為宮分烏商南授徵五日律五寸三分小分二強準五尺三寸四千三百六十一結躬十萬三千五百六十三上生變虞結躬為宮遲內商變虞徵六日律五寸二分小分六強準五尺二寸萬二千一百一十四歸期十萬二千一百六十九上生路時歸期為宮未育商路時徵六日律五寸一分小分九微強準五尺一寸萬七千八百五十七未卯十萬七百九十四上生形始未卯為宮遲時商形始徵六日律五寸一分小分二微強準五尺一寸四千一百七夷汗九萬九千四百三十七上生依行夷汗為宮色育商依行徵七日律五寸小分五強準五尺萬二百二十無射九萬八千三百四上生中呂無射為宮執始商中呂徵八日律四寸九分小分九強準四尺九寸萬八千五百七十三閉掩九萬六千九百八十上生南中閉掩為宮丙盛商南中徵八日律四寸九分小分三弱準四尺九寸五千三百三十三鄰齊九萬五千六百七十五上生內負鄰齊為宮分動商內負徵七日律四寸八分小分六微強準四尺八寸萬一千九百六十六期保九萬四千三百八十八上生物應期保為宮質末商物應徵八日律四寸七分小分九半強準四尺七寸萬八千七百七十九應鍾九萬三千三百一十二上生蕤賓應鍾為宮大呂商蕤賓徵一日律四寸七分小分四微強準四尺七寸八千十九分烏九萬三千一百一十六上生南事分烏窮次無徵不為宮七日律四寸七分小分三微強準四尺七寸六千五十九遲內九萬二千五十六上生盛變遲內為宮分否商盛變徵八日律四寸六分小分八弱準四尺六寸萬五千一百四十二未育九萬八百一十七上生離宮未育為宮凌陰商離宮徵八日律四寸六分小分一少強準四尺六寸二千七百五十二遲時八萬九千五百九十五上生制時遲時為宮少出商制時徵六日律四寸五分小分五強準四尺五寸萬二百一十五截管為律吹以考聲列以物氣道之本也術家以其聲微而體難知其分數不明故作準以代之準之聲明暢易達分寸又麤然弦以緩急清濁非管無以正也均其中弦令與黃鍾相得案畫以求諸律無不如數而應者矣音聲精微綜之者解元和元年待詔候鍾律殷肜上言官無曉六十律以準調音者故待詔嚴崇具以準法教子男宣宣通習願召宣補學官主調樂器詔曰崇子學審曉律別其族協其聲者審試不得依託父學以聾為聰聲微妙獨非莫知獨是莫曉以律錯吹能知命十二律不失一方為能傳崇學耳太史丞弘試十二律其二中其四不中其六不知何律宣遂罷自此律家莫能為準施弦候部莫知復見熹平六年東觀召典律者太子舍人張光等問準意光等不知歸閱舊藏乃得其器形制如房書猶不能定其弦緩急音不可書以曉人知之者欲教而無從心達者體知而無師故史官能辯清濁者遂絕其可以相傳者唯大搉常數及候氣而已候氣夫五音生於陰陽分為十二律轉生六十皆所以紀斗氣效物類也天效以景地效以響即律也陰陽和則景至律氣應則灰除是故天子常以日冬夏至御前殿合八能之士陳八音聽樂均度晷景候鍾律權土炭效陰陽冬至陽氣應則樂均清景長極黃鍾通土炭輕而衡仰夏至陰氣應則樂均濁景短極蕤賓通土炭重而衡低進退於先後五日之中八能各以候狀聞太史封上效則和否則占候氣之法為室三重戶閉塗釁必周密布緹縵室中以木為案每律各一內庳外高從其方位加律其上以葭莩灰抑其內端案曆而候之氣至者灰動其為氣所動者其灰散人及風所動者其灰聚殿中候用玉律十二惟二至乃候靈臺用竹律六十候日如其律
