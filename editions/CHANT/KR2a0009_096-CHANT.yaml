body:
  text: 南蠻西南夷列傳第七十六南蠻昔高辛氏有犬戎之寇帝患其侵暴而征伐不克乃訪募天下有能得犬戎之將吳將軍頭者購黃金千鎰邑萬家又妻以少女時帝有畜狗其毛五采名曰槃瓠下令之後槃瓠遂銜人頭造闕下群臣怪而診之乃吳將軍首也帝大喜而計槃瓠不可妻之以女又無封爵之道議欲有報而未知所宜女聞之以為帝皇下令不可違信因請行帝不得已乃以女配槃瓠槃瓠得女負而走入南山止石室中所處險絕人跡不至於是女解去衣裳為僕鑒之結著獨力之衣帝悲思之遣使尋求輒遇風雨震晦使者不得進經三年生子一十二人六男六女槃瓠死後因自相夫妻織績木皮染以草實好五色衣服制裁皆有尾形其母後歸以狀白帝於是使迎致諸子衣裳班蘭語言侏離好入山壑不樂平曠帝順其意賜以名山廣澤其後滋蔓號曰蠻夷外癡內黠安土重舊以先父有功母帝之女田作賈販無關梁符傳租稅之賦有邑君長皆賜印綬冠用獺皮名渠帥曰精夫相呼為姎徒今長沙武陵蠻是也其在唐虞與之要質故曰要服夏商之時漸為邊患逮于周世黨眾彌盛宣王中興乃命方叔南伐蠻方詩人所謂蠻荊來威者也又曰蠢爾蠻荊大邦為讎明其黨眾繁多是以抗敵諸夏也平王東遷蠻遂侵暴上國晉文侯輔政乃率蔡共侯擊破之至楚武王時蠻與羅子共敗楚師殺其將屈瑕莊王初立民飢兵弱復為所寇楚師既振然後乃服自是遂屬於楚鄢陵之役蠻與恭王合兵擊晉及吳起相悼王南并蠻越遂有洞庭蒼梧秦昭王使白起伐楚略取蠻夷始置黔中郡漢興改為武陵歲令大人輸布一匹小口二丈是謂賨布雖時為寇盜而不足為郡國患光武中興武陵蠻夷特盛建武二十三年精夫相單程等據其險隘大寇郡縣遣武威將軍劉尚發南郡長沙武陵兵萬餘人乘船泝沅水入武溪擊之尚輕敵入險山深水疾舟船不得上蠻氏知尚糧少入遠又不曉道徑遂屯聚守險尚食盡引還蠻緣路徼戰尚軍大敗悉為所沒二十四年相單程等下攻臨沅遣謁者李嵩中山太守馬成擊之不能剋明年春遣伏波將軍馬援中郎將劉匡馬武孫永等將兵至臨沅擊破之單程等飢困乞降會援病卒謁者宗均聽悉受降為置吏司群蠻遂平肅宗建初元年武陵澧中蠻陳從等反叛入零陽蠻界其冬零陽蠻五里精夫為郡擊破從從等皆降三年冬漊中蠻覃兒健等復反攻燒零陽作唐孱陵界中明年春發荊州七郡及汝南潁川弛刑徒吏士五千餘人拒守零陽募充中五里蠻精夫不叛者四千人擊澧中賊五年春覃兒健等請降不許郡因進兵與戰於宏下大破之斬兒健首餘皆棄營走還漊中復遣乞降乃受之於是罷武陵屯兵賞賜各有差和帝永元四年冬漊中澧中蠻潭戎等反燔燒郵亭殺略吏民郡兵擊破降之安帝元初二年澧中蠻以郡縣徭稅失平懷怨恨遂結充中諸種二千餘人攻城殺長吏州郡募五里蠻六亭兵追擊破之皆散降賜五里六亭渠帥金帛各有差明年秋漊中澧中蠻四千人並為盜賊又零陵蠻羊孫陳湯等千餘人著赤幘稱將軍燒官寺抄掠百姓州郡募善蠻討平之順帝永和元年武陵太守上書以蠻夷率服可比漢人增其租賦議者皆以為可尚書令虞詡獨奏曰自古聖王不臣異俗非德不能及威不能加知其獸心貪婪難率以禮是故羇縻而綏撫之附則受而不逆叛則棄而不追先帝舊典貢稅多少所繇來久矣今猥增之必有怨叛計其所得不償所費必有後悔帝不從其冬澧中漊中蠻果爭貢布非舊約遂殺鄉吏舉種反叛明年春蠻二萬人圍充城八千人寇夷道遣武陵太守李進討破之斬首數百級餘皆降服進乃簡選良吏得其情和在郡九年梁太后臨朝下詔增進秩二千石賜錢二十萬桓帝元嘉元年秋武陵蠻詹山等四千餘人反叛拘執縣令屯結深山至永興元年太守應奉以恩信招誘皆悉降散永壽三年十一月長沙蠻反叛屯益陽至延熹三年秋遂抄掠郡界眾至萬餘人殺傷長吏又零陵蠻入長沙冬武陵蠻六千餘人寇江陵荊州刺史劉度謁者馬睦南郡太守李肅皆奔走肅主簿胡爽扣馬首諫曰蠻夷見郡無儆備故敢乘閒而進明府為國大臣連城千里舉旄鳴鼓應聲十萬奈何委符守之重而為逋逃之人乎肅拔刃向爽曰掾促去太守今急何暇此計爽抱馬固諫肅遂殺爽而走帝聞之徵肅棄市度睦減死一等復爽門閭拜家一人為郎於是以右校令度尚為荊州刺史討長沙賊平之又遣車騎將軍馮緄討武陵蠻並皆降散軍還賊復寇桂陽太守廖祈奔走武陵蠻亦更攻其郡太守陳奉率吏人擊破之斬首三千餘級降者二千餘人至靈帝中平三年武陵蠻復叛寇郡界州郡擊破之禮記稱南方曰蠻雕題交阯其俗男女同川而浴故曰交阯其西有噉人國生首子輒解而食之謂之宜弟味旨則以遺其君君喜而賞其父取妻美則讓其兄今烏滸人是也交阯之南有越裳國周公居攝六年制禮作樂天下和平越裳以三象重譯而獻白雉曰道路悠遠山川岨深音使不通故重譯而朝成王以歸周公公曰德不加焉則君子不饗其質政不施焉則君子不臣其人吾何以獲此賜也其使請曰吾受命吾國之黃耇曰久矣天之無烈風雷雨意者中國有聖人乎有則盍往朝之周公乃歸之於王稱先王之神致以薦于宗廟周德既衰於是稍絕及楚子稱霸朝貢百越秦并天下威服蠻夷始開領外置南海桂林象郡漢興尉佗自立為南越王傳國五世至武帝元鼎五年遂滅之分置九郡交阯刺史領焉其珠崖儋耳二郡在海洲上東西千里南北五百里其渠帥貴長耳皆穿而縋之垂肩三寸武帝末珠崖太守會稽孫幸調廣幅布獻之蠻不堪役遂攻郡殺幸幸子豹率善人還復破之自領郡事討擊餘黨連年乃平豹遣使封還印綬上書言狀制詔即以豹為珠崖太守威政大行獻命歲至中國貪其珍賂漸相侵侮故率數歲一反元帝初元三年遂罷之凡立郡六十五歲逮王莽輔政元始二年日南之南黃支國來獻犀牛凡交阯所統雖置郡縣而言語各異重譯乃通人如禽獸長幼無別項髻徒跣以布貫頭而著之後頗徙中國罪人使雜居其間乃稍知言語漸見禮化光武中興錫光為交趾任延守九真於是教其耕稼制為冠履初設媒娉始知姻娶建立學校導之禮義建武十二年九真徼外蠻里張游率種人慕化內屬封為歸漢里君明年南越徼外蠻夷獻白雉白菟至十六年交趾女子徵側及其妹徵貳反攻郡徵側者麊泠縣雒將之女也嫁為朱鳶人詩索妻甚雄勇交趾太守蘇定以法繩之側忿故反於是九真日南合浦蠻里皆應之凡略六十五城自立為王交趾刺史及諸太守僅得自守光武乃詔長沙合浦交阯具車船修道橋通障谿儲糧穀十八年遣伏波將軍馬援樓船將軍段志發長沙桂陽零陵蒼梧兵萬餘人討之明年夏四月援破交趾斬徵側徵貳等餘皆降散進擊九真賊都陽等破降之徙其渠帥三百餘口於零陵於是領表悉平肅宗元和元年日南徼外蠻夷究不事人邑豪獻生犀白雉和帝永元十二年夏四月日南象林蠻夷二千餘人寇掠百姓燔燒官寺郡縣發兵討擊斬其渠帥餘眾乃降於是置象林將兵長史以防其患安帝永初元年九真徼外夜郎蠻夷舉土內屬開境千八百四十里元初二年蒼梧蠻夷反叛明年遂招誘鬱林合浦蠻漢數千人攻蒼梧郡鄧太后遣侍御史任逴奉詔赦之賊皆降散延光元年九真徼外蠻貢獻內屬三年日南徼外蠻復來內屬順帝永建六年日南徼外葉調王便遣使貢獻帝賜調便金印紫綬永和二年日南象林徼外蠻夷區憐等數千人攻象林縣燒城寺殺長吏交阯刺史樊演發交阯九真二郡兵萬餘人救之兵士憚遠役遂反攻其府二郡雖擊破反者而賊執轉盛會侍御史賈昌使在日南即與州郡并力討之不利遂為所攻圍歲餘而兵穀不繼帝以為憂明年召公卿百官及四府掾屬問其方略皆議遣大將發荊揚兗豫四萬人赴之大將軍從事中郎李固駮曰若荊揚無事發之可也今二州盜賊槃結不散武陵南郡蠻夷未輯長沙桂陽數被徵發如復擾動必更生患其不可一也又兗豫之人卒被徵發遠赴萬里無有還期詔書迫促必致叛亡其不可二也南州水土溫暑加有瘴氣致死亡者十必四五其不可三也遠涉萬里士卒疲勞比至嶺南不復堪鬭其不可四也軍行三十里為程而去日南九千餘里三百日乃到計人稟五升用米六十萬斛不計將吏驢馬之食但負甲自致費便若此其不可五也設軍到所在死亡必眾既不足禦敵當復更發此為刻割心腹以補四支其不可六也九真日南相去千里發其吏民猶尚不堪何況乃苦四州之卒以赴萬里之艱哉其不可七也前中郎將尹就討益州叛羌益州諺曰虜來尚可尹來殺我後就徵還以兵付刺史張喬喬因其將吏旬月之間破殄寇虜此發將無益之效州郡可任之驗也宜更選有勇略仁惠任將帥者以為刺史太守悉使共住交阯今日南兵單無穀守既不足戰又不能可一切徙其吏民北依交阯事靜之後又命歸本還募蠻夷使自相攻轉輸金帛以為其資有能反間致頭首者許以封侯列土之賞故并州刺史長沙祝良性多勇決又南陽張喬前在益州有破虜之功皆可任用昔太宗就加魏尚為雲中守哀帝即拜龔舍為太山太守宜即拜良等便道之官四府悉從固議即拜祝良為九真太守張喬為交阯刺史喬至開示慰誘並皆降散良到九真單車入賊中設方略招以威信降者數萬人皆為良築起府寺由是嶺外復平建康元年日南蠻夷千餘人復攻燒縣邑遂扇動九真與相連結交阯刺史九江夏方開恩招誘賊皆降服時梁太后臨朝美方之功遷為桂陽太守桓帝永壽三年居風令貪暴無度縣人朱達等及蠻夷相聚攻殺縣令眾至四五千人進攻九真九真太守兒式戰死詔賜錢六十萬拜子二人為郎遣九真都尉魏朗討破之斬首二千級渠帥猶屯據日南眾轉彊盛延熹三年詔復拜夏方為交阯刺史方威惠素著日南宿賊聞之二萬餘人相率詣方降靈帝建寧三年鬱林太守谷永以恩信招降烏滸人十餘萬內屬皆受冠帶開置七縣熹平二年冬十二月日南徼外國重譯貢獻光和元年交阯合浦烏滸蠻反叛招誘九真日南合數萬人攻沒郡縣四年刺史朱雋擊破之六年日南徼外國復來貢獻巴郡南郡蠻巴郡南郡蠻本有五姓巴氏樊氏瞫氏相氏鄭氏皆出於武落鍾離山其山有赤黑二穴巴氏之子生於赤穴四姓之子皆生黑穴未有君長俱事鬼神乃共擲劍於石穴約能中者奉以為君巴氏子務相乃獨中之眾皆歎又令各乘土船約能浮者當以為君餘姓悉沈唯務相獨浮因共立之是為廩君乃乘土船從夷水至鹽陽鹽水有神女謂廩君曰此地廣大魚鹽所出願留共居廩君不許鹽神暮輒來取宿旦即化為蟲與諸蟲群飛掩蔽日光天地晦冥積十餘日廩君伺其便因射殺之天乃開明廩君於是君乎夷城四姓皆臣之廩君死魂魄世為白虎巴氏以虎飲人血遂以人祠焉及秦惠王并巴中以巴氏為蠻夷君長世尚秦女其民爵比不更有罪得以爵除其君長歲出賦二千一十六錢三歲一出義賦千八百錢其民戶出幏布八丈二尺雞羽三十鍭漢興南郡太守靳彊請一依秦時故事至建武二十三年南郡潳山蠻雷遷等始反叛寇掠百姓遣武威將軍劉尚將萬餘人討破之徙其種人七千餘口置江夏界中今沔中蠻是也和帝永元十三年巫蠻許聖等以郡收稅不均懷怨恨遂屯聚反叛明年夏遣使者督荊州諸郡兵萬餘人討之聖等依憑阻隘久不破諸軍乃分道並進或自巴郡魚復數路攻之蠻乃散走斬其渠帥乘勝追之大破聖等聖等乞降復悉徙置江夏靈帝建寧二年江夏蠻叛州郡討平之光和三年江夏蠻復反與廬江賊黃穰相連結十餘萬人攻沒四縣寇患累年廬江太守陸康討破之餘悉降散板楯蠻夷板楯蠻夷者秦昭襄王時有一白虎常從群虎數遊秦蜀巴漢之境傷害千餘人昭王乃重募國中有能殺虎者賞邑萬家金百鎰時有巴郡閬中夷人能作白竹之弩乃登樓射殺白虎昭王嘉之而以其夷人不欲加封乃刻石盟要復夷人頃田不租十妻不算傷人者論殺人者得以倓錢贖死盟曰秦犯夷輸黃龍一雙夷犯秦輸清酒一鍾夷人安之至高祖為漢王發夷人還伐三秦秦地既定乃遣還巴中復其渠帥羅朴督鄂度夕龔七姓不輸租賦餘戶乃歲入賨錢口四十世號為板楯蠻夷閬中有渝水其人多居水左右天性勁勇初為漢前鋒數陷陳俗喜歌舞高祖觀之曰此武王伐紂之歌也乃命樂人習之所謂巴渝舞也遂世世服從至于中興郡守常率以征伐桓帝之世板楯數反太守蜀郡趙溫以恩信降服之靈帝光和二年巴郡板楯復叛寇掠三蜀及漢中諸郡靈帝遣御史中丞蕭瑗督益州兵討之連年不能克帝欲大發兵乃問益州計吏考以征討方略漢中上計程包對曰板楯七姓射殺白虎立功先世復為義人其人勇猛善於兵戰昔永初中羌入漢川郡縣破壞得板楯救之羌死敗殆盡故號為神兵羌人畏忌傳語種輩勿復南行至建和二年羌復大入實賴板楯連摧破之前車騎將軍馮緄南征武陵雖受丹陽精兵之銳亦倚板楯以成其功近益州郡亂太守李顒亦以板楯討而平之忠功如此本無惡心長吏鄉亭更賦至重僕役箠楚過於奴虜亦有嫁妻賣子或乃至自剄割雖陳冤州郡而牧守不為通理闕庭悠遠不能自聞含怨呼天叩心窮谷愁苦賦役困罹酷刑故邑落相聚以致叛戾非有謀主僭號以圖不軌今但選明能牧守自然安集不煩征伐也帝從其言遣太守曹謙宣詔赦之即皆降服至中平五年巴郡黃巾賊起板楯蠻夷因此復叛寇掠城邑遣西園上軍別部司馬趙瑾討平之西南夷西南夷者在蜀郡徼外有夜郎國東接交阯西有滇國北有邛都國各立君長其人皆椎結左衽邑聚而居能耕田其外又有雟昆明諸落西極同師東北至葉榆地方數千里無君長辮髮隨畜遷徙無常自雟東北有莋都國東北有冉駹國或土著或隨畜遷徙自冉駹東北有白馬國氐種是也此三國亦有君長夜郎夜郎者初有女子浣於遯水有三節大竹流入足間聞其中有號聲剖竹視之得一男兒歸而養之及長有才武自立為夜郎侯以竹為姓武帝元鼎六年平南夷為牂牁郡夜郎侯迎降天子賜其王印綬後遂殺之夷獠咸以竹王非血氣所生甚重之求為立後牂牁太守吳霸以聞天子乃封其三子為侯死配食其父今夜郎縣有竹王三郎神是也初楚頃襄王時遣將莊豪從沅水伐夜郎軍至且蘭椓船於岸而步戰既滅夜郎因留王滇池以且蘭有椓船牂牁處乃改其名為牂牁牂牁地多雨潦俗好巫鬼禁忌寡畜生又無蠶桑故其郡最貧句町縣有桄桹木可以為麫百姓資之公孫述時大姓龍傅尹董氏與郡功曹謝暹保境為漢乃遣使從番禺江奉貢光武嘉之並加襃賞桓帝時郡人尹珍自以生於荒裔不知禮義乃從汝南許慎應奉受經書圖緯學成還鄉里教授於是南域始有學焉珍官至荊州刺史滇滇王者莊蹻之後也元封二年武帝平之以其地為益州郡割牂柯越雟各數縣配之後數年復并昆明地皆以屬之此郡有池周回二百餘里水源深廣而末更淺狹有似倒流故謂之滇池河土平敞多出鸚鵡孔雀有鹽池田漁之饒金銀畜產之富人俗豪忕居官者皆富及累世及王莽政亂益州郡夷棟蠶若豆等起兵殺郡守越雟姑復夷人大牟亦皆叛殺略吏人莽遣寧始將軍廉丹發巴蜀吏人及轉兵穀卒徒十餘萬擊之吏士飢疫連年不能剋而還以廣漢文齊為太守造起陂池開通溉灌墾田二千餘頃率厲兵馬修障塞降集群夷甚得其和及公孫述據益土齊固守拒險述拘其妻子許以封侯齊遂不降聞光武即位乃間道遣使自聞蜀平徵為鎮遠將軍封成義侯於道卒詔為起祠堂郡人立廟祀之建武十八年夷渠帥棟蠶與姑復楪榆梇棟連然滇池建伶昆明諸種反叛殺長吏益州太守繁勝與戰而敗退保朱提十九年遣武威將軍劉尚等發廣漢犍為蜀郡人及朱提夷合萬三千人擊之尚軍遂度瀘水入益州界群夷聞大兵至皆棄壘奔走尚獲其羸弱穀畜二十年進兵與棟蠶等連戰數月皆破之明年正月追至不韋斬棟蠶帥凡首虜七千餘人得生口五千七百人馬三千匹牛羊三萬餘頭諸夷悉平肅宗元和中蜀郡王追為太守政化尤異有神馬四匹出滇池河中甘露降白烏見始興起學校漸遷其俗靈帝熹平五年諸夷反叛執太守雍陟遣御史中丞朱龜討之不能剋朝議以為郡在邊外蠻夷喜叛勞師遠役不如棄之太尉掾巴郡李顒建策討伐乃拜顒益州太守與刺史龐芝發板楯蠻擊破平之還得雍陟顒卒後夷人復叛以廣漢景毅為太守討定之毅初到郡米斛萬錢漸以仁恩少年間米至數十云哀牢哀牢夷者其先有婦人名沙壹居于牢山嘗捕魚水中觸沈木若有感因懷妊十月產子男十人後沈木化為龍出水上沙壹忽聞龍語曰若為我生子今悉何在九子見龍驚走獨小子不能去背龍而坐龍因舐之其母鳥語謂背為九謂坐為隆因名子曰九隆及後長大諸兄以九隆能為父所舐而黠遂共推以為王後牢山下有一夫一婦復生十女子九隆兄弟皆娶以為妻後漸相滋長種人皆刻畫其身象龍文衣皆著尾九隆死世世相繼乃分置小王往往邑居散在谿谷絕域荒外山川阻深生人以來未嘗交通中國建武二十三年其王賢栗遣兵乘箄船南下江漢擊附塞夷鹿茤鹿茤人弱為所禽獲於是震雷疾雨南風飄起水為逆流翻涌二百餘里箄船沈沒哀牢之眾溺死數千人賢栗復遣其六王將萬人以攻鹿茤鹿茤王與戰殺其六王哀牢耆老共埋六王夜虎復出其尸而食之餘眾驚怖引去賢栗惶恐謂其耆老曰我曹入邊塞自古有之今攻鹿茤輒被天誅中國其有聖帝乎天祐助之何其明也二十七年賢栗等遂率種人戶二千七百七十口萬七千六百五十九詣越雟太守鄭鴻降求內屬光武封賢栗等為君長自是歲來朝貢永平十二年哀牢王柳貌遣子率種人內屬其稱邑王者七十七人戶五萬一千八百九十口五十五萬三千七百一十一西南去洛陽七千里顯宗以其地置哀牢博南二縣割益州郡西部都尉所領六縣合為永昌郡始通博南山度蘭倉水行者苦之歌曰漢德廣開不賓度博南越蘭津度蘭倉為它人哀牢人皆穿鼻儋耳其渠帥自謂王者耳皆下肩三寸庶人則至肩而已土地沃美宜五穀蠶桑知染采文繡罽毲帛疊蘭干細布織成文章如綾錦有梧桐木華績以為布幅廣五尺潔白不受垢汙先以覆亡人然後服之其竹節相去一丈名曰濮竹出銅鐵鉛錫金銀光珠虎魄水精瑠璃軻蟲蚌珠孔雀翡翠犀象猩猩貊獸雲南縣有神鹿兩頭能食毒草先是西部都尉廣漢鄭純為政清潔化行夷貊君長感慕皆獻土珍頌德美天子嘉之即以為永昌太守純與哀牢夷人約邑豪歲輸布貫頭衣二領鹽一斛以為常賦夷俗安之純自為都尉太守十年卒官建初元年哀牢王類牢與守令忿爭遂殺守令而反叛攻雟唐城太守王尋奔楪榆哀牢三千餘人攻博南燔燒民舍肅宗募發越雟益州永昌夷漢九千人討之明年春邪龍縣昆明夷鹵承等應募率種人與諸郡兵擊類牢於博南大破斬之傳首洛陽賜鹵承帛萬匹封為破虜傍邑侯永元六年郡徼外敦忍乙王莫延慕義遣使譯獻犀牛大象九年徼外蠻及撣國王雍由調遣重譯奉國珍寶和帝賜金印紫綬小君長皆加印綬錢帛永初元年徼外僬僥種夷陸類等三千餘口舉眾內附獻象牙水牛封牛永寧元年撣國王雍由調復遣使者詣闕朝賀獻樂及幻人能變化吐火自支解易牛馬頭又善跳丸數乃至千自言我海西人海西即大秦也撣國西南通大秦明年元會安帝作樂於庭封雍由調為漢大都尉賜印綬金銀綵繒各有差也邛都邛都夷者武帝所開以為邛都縣無幾而地陷為汙澤因名為邛池南人以為邛河後復反叛元鼎六年漢兵自越雟水伐之以為越雟郡其土地平原有稻田青蛉縣禺同山有碧雞金馬光景時時出見俗多游蕩而喜謳歌略與牂柯相類豪帥放縱難得制御王莽時郡守枚根調邛人長貴以為軍候更始二年長貴率種人攻殺枚根自立為邛穀王領太守事又降於公孫述述敗光武封長貴為邛穀王建武十四年長貴遣使上三年計天子即授越雟太守印綬十九年武威將軍劉尚擊益州夷路由越雟長貴聞之疑尚既定南邊威法必行己不得自放縱即聚兵起營臺招呼諸君長多釀毒酒欲先以勞軍因襲擊尚尚知其謀即分兵先據邛都遂掩長貴誅之徙其家屬於成都永平元年姑復夷復叛益州刺史發兵討破之斬其渠帥傳首京師後太守巴郡張翕政化清平得夷人和在郡十七年卒夷人愛慕如喪父母蘇祈叟二百餘人齊牛羊送喪至翕本縣安漢起墳祭祀詔書嘉美為立祠堂安帝元初三年郡徼外夷大羊等八種戶三萬一千口十六萬七千六百二十慕義內屬時郡縣賦斂煩數五年卷夷大牛種封離等反畔殺遂久令明年永昌益州及蜀郡夷皆叛應之眾遂十餘萬破壞二十餘縣殺長吏燔燒邑郭剽略百姓骸骨委積千里無人詔益州刺史張喬選堪能從事討之喬乃遣從事楊竦將兵至楪榆擊之賊盛未敢進先以詔書告示三郡密徵求武士重其購賞乃進軍與封離等戰大破之斬首三萬餘級獲生口千五百人資財四千餘萬悉以賞軍士封離等惶怖斬其同謀渠帥詣竦乞降竦厚加慰納其餘三十六種皆來降附竦因奏長吏姦猾侵犯蠻夷者九十人皆減死州中論功未及上會竦病創卒張喬深痛惜之乃刻石勒銘圖畫其像天子以張翕有遺愛乃拜其子湍為太守夷人懽喜奉迎道路曰郎君儀貌類我府君後湍頗失其心有欲叛者諸夷耆老相曉語曰當為先府君故遂以得安後順桓間廣漢馮顥為太守政化尤多異迹云莋都莋都夷者武帝所開以為莋都縣其人皆被髮左衽言語多好譬類居處略與汶山夷同土出長年神藥仙人山圖所居焉元鼎六年以為沈黎郡至天漢四年并蜀為西部置兩都尉一居旄牛主徼外夷一居青衣主漢人永平中益州刺史梁國朱輔好立功名慷慨有大略在州數歲宣示漢德威懷遠夷自汶山以西前世所不至正朔所未加白狼槃木唐菆等百餘國戶百三十餘萬口六百萬以上舉種奉貢稱為臣僕輔上疏曰臣聞詩云彼徂者岐有夷之行傳曰岐道雖僻而人不遠詩人誦詠以為符險今白狼王唐菆等募化歸義作詩三章路經邛來大山零高阪峭危峻險百倍岐道繈負老幼若歸慈母遠夷之語辭意難正草木異種鳥獸殊類有犍為郡掾田恭與之習狎頗曉其言臣輒令訊其風俗譯其辭語今遣從事史李陵與恭護送詣闕并上其樂詩昔在聖帝舞四夷之樂今之所上庶備其一帝嘉之事下史官錄其歌焉遠夷樂德歌詩曰大漢是治與天合意吏譯平端不從我來聞風向化所見奇異多賜繒布甘美酒食昌樂肉飛屈申悉備蠻夷貧薄無所報嗣願主長壽子孫昌熾遠夷慕德歌詩曰蠻夷所處日入之部慕義向化歸日出主聖德深恩與人富厚冬多霜雪夏多和雨寒溫時適部人多有涉危歷險不遠萬里去俗歸德心歸慈母遠夷懷德歌曰荒服之外土地墝埆食肉衣皮不見鹽穀吏譯傳風大漢安樂攜負歸仁觸冒險陝高山岐峻緣崖磻石木薄發家百宿到洛父子同賜懷抱匹帛傳告種人長願臣僕肅宗初輔坐事免是時郡尉府舍皆有雕飾畫山神海靈奇禽異獸以眩燿之夷人益畏憚焉和帝永元十二年旄牛徼外白狼樓薄蠻夷王唐繒等遂率種人十七萬口歸義內屬詔賜金印紫綬小豪錢帛各有差安帝永初元年蜀郡三襄種夷與徼外汙衍種并兵三千餘人反叛攻蠶陵城殺長吏二年青衣道夷邑長令田與徼外三種夷三十一萬口齎黃金旄牛毦舉土內屬安帝增令田爵號為奉通邑君延光二年春旄牛夷叛攻零關殺長吏益州刺史張喬與西部都尉擊破之於是分置蜀郡屬國都尉領四縣如太守桓帝永壽二年蜀郡夷叛殺略吏民延熹三年蜀郡三襄夷寇蠶陵殺長吏四年犍為屬國夷寇郡界益州刺史山昱擊破之斬首千四百級餘皆解散靈帝時以蜀郡屬國為漢嘉郡冉駹冉駹夷者武帝所開元鼎六年以為汶山郡至地節三年夷人以立郡賦重宣帝乃省并蜀郡為北部都尉其山有六夷七羌九氐各有部落其王侯頗知文書而法嚴重貴婦人黨母族死則燒其尸土氣多寒在盛夏冰猶不釋故夷人冬則避寒入蜀為傭夏則違暑反其聚邑眾皆依山居止累石為室高者至十餘丈為邛籠又土地剛鹵不生穀粟麻菽唯以麥為資而宜畜牧有旄牛無角一名童牛肉重千斤毛可為毦出名馬有靈羊可療毒又有食藥鹿鹿麑有胎者其腸中糞亦療毒疾又有五角羊麝香輕毛毼雞牲牲其人能作旄氈班罽青頓毞毲羊羧之屬特多雜藥地有鹹土煮以為鹽麡羊牛馬食之皆肥其西又有三河槃于虜北有黃石北地盧水胡其表乃為徼外靈帝時復分蜀郡北部為汶山郡云白馬氐白馬氐者武帝元鼎六年開分廣漢西部合以為武都土地險阻有麻田出名馬牛羊漆蜜氐人勇戇抵冒貪貨死利居於河池一名仇池方百頃四面斗絕數為邊寇郡縣討之則依固自守元封三年氐人反叛遣兵破之分徙酒泉郡昭帝元鳳元年氐人復叛遣執金吾馬適建龍侯韓增大鴻臚田廣明將三輔太常徒討破之及王莽篡亂氐人亦叛建武初氐人悉附隴蜀及隗囂滅其酋豪乃背公孫述降漢隴西太守馬援上復其王侯君長賜以印綬後囂族人隗茂反殺武都太守氐人大豪齊鍾留為種類所敬信威服諸豪與郡丞孔奮擊茂破斬之後亦時為寇盜郡縣討破之論曰漢氏征伐戎狄有事邊遠蓋亦與王業而終始矣至於傾沒疆垂喪師敗將者不出時歲卒能開四夷之境款殊俗之附若乃文約之所沾漸風聲之所周流幾將日所出入處也著自山經水志者亦略及焉雖服叛難常威澤時曠及其化行則緩耳雕腳之倫獸居鳥語之類莫不舉種盡落回面而請吏陵海越障累譯以內屬焉故其錄名中郎校尉之署編數都護部守之曹動以數百萬計若乃藏山隱海之靈物沈沙棲陸之瑋寶莫不呈表怪麗雕被宮幄焉又其賨幏火毳馴禽封獸之賦軨積於內府夷歌巴舞殊音異節之技列倡於外門豈柔服之道必足於斯然亦云致遠者矣蠻夷雖附阻巖谷而類有土居連涉荊交之區布護巴庸之外不可量極然其凶勇校算薄於羌狄故陵暴之害不能深也西南之徼尤為劣焉故關守永昌肇自遠離啟土立人至今成都焉贊曰百蠻蠢居仞彼方徼鏤體卉衣憑深阻峭亦有別夷屯彼蜀表參差聚落紆餘岐道往化既孚改襟輸寶俾建永昌同編億兆
