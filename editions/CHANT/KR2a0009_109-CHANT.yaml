body:
  text: 祭祀下宗廟光武帝建武二年正月立高廟于雒陽四時祫祀高帝為太祖文帝為太宗武帝為世宗如舊餘帝四時春以正月夏以四月秋以七月冬以十月及臘一歲五祀三年正月立親廟雒陽祀父南頓君以上至舂陵節侯時寇賊未夷方務征伐祀儀未設至十九年盜賊討除戎事差息於是五官中郎將張純與太僕朱浮奏議禮為人子事大宗降其私親禮之設施不授之與自得之異意當除今親廟四孝宣皇帝以孫後祖為父立廟於奉明曰皇考廟獨群臣侍祠願下有司議先帝四廟當代親廟者及皇考廟事下公卿博士議郎大司徒涉等議宜奉所代立平帝哀帝成帝元帝廟代今親廟兄弟以下使有司祠宜為南頓君立皇考廟祭上至舂陵節侯群臣奉祠時議有異不著上可涉等議詔曰以宗廟處所未定且祫祭高廟其成哀平且祠祭長安故高廟其南陽舂陵歲時各且因故園廟祭祀園廟去太守治所遠者在所令長行太守事侍祠惟孝宣帝有功德其上尊號曰中宗於是雒陽高廟四時加祭孝宣孝元凡五帝其西廟成哀平三帝主四時祭於故高廟東廟京兆尹侍祠冠衣車服如太常祠陵廟之禮南頓君以上至節侯皆就園廟南頓君稱皇考廟鉅鹿都尉稱皇祖考廟鬱林太守稱皇曾祖考廟節侯稱皇高祖考廟在所郡縣侍祠二十六年有詔問張純禘祫之禮不施行幾年純奏禮三年一祫五年一禘毀廟之主陳於太祖未毀廟之主皆升合食太祖五年再殷祭舊制三年一祫毀廟主合食高廟存廟主未嘗合元始五年始行禘禮父為昭南嚮子為穆北嚮父子不並坐而孫從王父禘之為言諦諦諟昭穆尊卑之義以夏四月陽氣在上陰氣在下故正尊卑之義祫以冬十月五穀成熟故骨肉合飲食祖宗廟未定且合祭今宜以時定語在純傳上難復立廟遂以合祭高廟為常後以三年冬祫五年夏禘之時但就陳祭毀廟主而已謂之殷太祖東面惠文武元帝為昭景宣帝為穆惠景昭三帝非殷祭時不祭光武皇帝崩明帝即位以光武帝撥亂中興更為起廟尊號曰世祖廟以元帝於光武為穆故雖非宗不毀也後遂為常明帝臨終遺詔遵儉無起寢廟藏主於世祖廟更衣孝章即位不敢違以更衣有小別上尊號曰顯宗廟間祠於更衣四時合祭於世祖廟語在章紀章帝臨崩遺詔無起寢廟廟如先帝故事和帝即位不敢違上尊號曰肅宗後帝承尊皆藏主于世祖廟積多無別是後顯宗但為陵寢之號永元中和帝追尊其母梁貴人曰恭懷皇后陵曰西陵以竇后配食章帝恭懷皇后別就陵寢祭之和帝崩上尊號曰穆宗殤帝生三百餘日而崩鄧太后攝政以尚嬰孩故不列于廟就陵寢祭之而已安帝以清河孝王子即位建光元年追尊其祖母宋貴人曰敬隱后陵曰敬北陵亦就陵寢祭太常領如西陵追尊父清河孝王曰孝德皇母曰孝德后清河嗣王奉祭而已安帝以讒害大臣廢太子及崩無上宗之奏後以自建武以來無毀者故遂常祭因以其陵號稱恭宗順帝即位追尊其母曰恭愍后陵曰恭北陵就陵寢祭如敬北陵順帝崩上尊號曰敬宗沖質帝皆小崩梁太后攝政以殤帝故事就陵寢祭凡祠廟訖三公分祭之桓帝以河間孝王孫蠡吾侯即位亦追尊祖考王國奉祀語在章和八王傳桓帝崩上尊號曰威宗無嗣靈帝以河間孝王曾孫解犢侯即位亦追尊祖考語在章和八王傳靈帝時京都四時所祭高廟五主世祖廟七主少帝三陵追尊后三陵凡牲用十八太牢皆有副倅故高廟三主親毀之後亦但殷祭之歲奉祠靈帝崩獻帝即位初平中相國董卓左中郎將蔡邕等以和帝以下功德無殊而有過差不應為宗及餘非宗者追尊三后皆奏毀之四時所祭高廟一祖二宗及近帝四凡七帝古不墓祭漢諸陵皆有園寢承秦所為也說者以為古宗廟前制廟後制寢以象人之居前有朝後有寢也月令有先薦寢廟詩稱寢廟弈弈言相通也廟以藏主以四時祭寢有衣冠几杖象生之具以薦新物秦始出寢起於墓側漢因而弗改故陵上稱寢殿起居衣服象生人之具古寢之意也建武以來關西諸陵以轉久遠但四時特牲祠帝每幸長安謁諸陵乃太牢祠自雒陽諸陵至靈帝皆以晦望二十四氣伏臘及四時祠廟日上飯太官送用物園令食監典省其親陵所宮人隨鼓漏理被枕具盥水陳嚴具社稷建武二年立大社稷于雒陽在宗廟之右方壇無屋有牆門而已二月八月及臘一歲三祠皆太牢具使有司祠孝經援神契曰社者土地之主也稷者五穀之長也禮記及國語皆謂共工氏之子曰句龍為后土官能平九土故祀以為社烈山氏之子曰柱能植百穀疏自夏以上祀以為稷至殷以柱久遠而堯時棄為后稷亦植百穀故廢柱祀棄為稷大司農鄭玄說古者官有大功則配食其神故句龍配食於社棄配食於稷郡縣置社稷太守令長侍祠牲用羊豕唯州所治有社無稷以其使官古者師行平有載社主不載稷也國家亦有五祀之祭有司掌之其禮簡於社稷云靈星漢興八年有言周興而邑立后稷之祀於是高帝令天下立靈星祠言祠后稷而謂之靈星者以后稷又配食星也舊說星謂天田星也一曰龍左角為天田官主穀祀用壬辰位祠之壬為水辰為龍就其類也牲用太牢縣邑令長侍祠舞者用童男十六人舞者象教田初為芟除次耕種芸耨驅爵及護刈舂簸之形象其功也先農縣邑常以乙未日祠先農於乙地以丙戌日祠風伯於戌地以己丑日祠雨師於丑地用羊豕迎春立春之日皆青幡幘迎春于東郭外令一童男冒青巾衣青衣先在東郭外野中迎春至者自野中出則迎者拜之而還弗祭三時不迎論曰臧文仲祀爰居而孔子以為不知漢書郊祀志著自秦以來迄今王莽典祀或有未修而爰居之類眾焉世祖中興蠲除非常修復舊祀方之前事邈殊矣嘗聞儒言三皇無文結繩以治自五帝始有書契至於三王俗化彫文詐偽漸興始有印璽以檢姦萌然而未有金玉銀銅之器也自上皇以來封泰山者至周七十二代封者謂封土為壇柴祭告天代興成功也禮記所謂因名山升中于天者也易姓則改封者著一代之始明不相襲也繼世之王巡狩則修封以祭而已自秦始皇孝武帝封泰山本由好仙信方士之言造為石檢印封之事也所聞如此雖誠天道難可度知然其大較猶有本要天道質誠約而不費者也故牲用犢器用陶匏殆將無事於檢封之間而樂難攻之石也且唯封為改代故曰岱宗夏康周宣由廢復興不聞改封世祖欲因孝武故封實繼祖宗之道也而梁松固爭以為必改乃當夫既封之後未有福而松卒被誅死雖罪由身蓋亦誣神之咎也且帝王所以能大顯于後者實在其德加於民不聞其在封矣言天地者莫大於易易無六宗在中之象若信為天地四方所宗是至大也而比太社又為失所難以為誠矣贊曰天地禋郊宗廟享祀咸秩無文山川具止淫乃國紊典惟皇紀肇自盛敬孰崖厥始
