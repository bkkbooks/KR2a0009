body:
  text: 卷八十九南匈奴醯落尸逐鞮單于比者呼韓邪單于之孫烏珠留若鞮單于之子也自呼韓邪後諸子以次立至比季父孝單于輿時以比為右薁鞬日逐王部領南邊及烏桓建武初彭寵反畔於漁陽單于與共連兵因復權立盧芳使入居五原光武初方平諸夏未遑外事至六年始令歸德侯劉颯使匈奴匈奴亦遣使來獻漢復令中郎將韓統報命賂遺金帛以通舊好而單于驕踞自比冒頓對使者辭語悖慢帝待之如初初使命常通而匈奴數與盧芳共侵北邊九年遣大司馬吳漢等擊之經歲無功而匈奴轉盛鈔暴日增十三年遂寇河東州郡不能禁於是漸徙幽并邊人於常山關居庸關已東匈奴左部遂復轉居塞內朝廷患之增緣邊兵郡數千人大築亭候修烽火匈奴聞漢購求盧芳貪得財帛乃遣芳還降望得其賞而芳以自歸為功不稱匈奴所遣單于復恥言其計故賞遂不行由是大恨入寇尤深二十年遂至上黨扶風天水二十一年冬復寇上谷中山殺略鈔掠甚眾北邊無復寧歲初單于弟右谷蠡王伊屠知牙師以次當為左賢王左賢王即是單于儲副單于欲傳其子遂殺知牙師知牙師者王昭君之子也昭君字嬙南郡人也初元帝時以良家子選入掖庭時呼韓邪來朝帝敕以宮女五人賜之昭君入宮數歲不得見御積悲怨乃請掖庭令求行呼韓邪臨辭大會帝召五女以示之昭君豐容靚飾光明漢宮顧景裴回竦動左右帝見大驚意欲留之而難於失信遂與匈奴生二子及呼韓邪死其前閼氏子代立欲妻之昭君上書求歸成帝敕令從胡俗遂復為後單于閼氏焉比見知牙師被誅出怨言曰以兄弟言之右谷蠡王次當立以子言之我前單于長子我當立遂內懷猜懼庭會稀闊單于疑之乃遣兩骨都侯監領比所部兵二十二年單于輿死子左賢王烏達鞮侯立為單于復死弟左賢王蒲奴立為單于比不得立既懷憤恨而匈奴中連年旱蝗赤地數千里草木盡枯人畜飢疫死耗太半單于畏漢乘其敝乃遣使詣漁陽求和親於是遣中郎將李茂報命而比密遣漢人郭衡奉匈奴地圖二十三年詣西河太守求內附兩骨都侯頗覺其意會五月龍祠因白單于言薁鞬日逐夙來欲為不善若不誅且亂國時比弟漸將王在單于帳下聞之馳以報比比懼遂斂所主南邊八部眾四五萬人待兩骨都侯還欲殺之骨都侯且到知其謀皆輕騎亡去以告單于單于遣萬騎擊之見比眾盛不敢進而還二十四年春八部大人共議立比為呼韓邪單于以其大父嘗依漢得安故欲襲其號於是款五原塞願永為蕃蔽扞禦北虜帝用五官中郎將耿國議乃許之其冬比自立為呼韓邪單于二十五年春遣弟左賢王莫將兵萬餘人擊北單于弟薁鞬左賢王生獲之又破北單于帳下并得其眾合萬餘人馬七千匹牛羊萬頭北單于震怖卻地千里初帝造戰車可駕數牛上作樓櫓置於塞上以拒匈奴時人見者或相謂曰讖言漢九世當卻北狄地千里豈謂此邪及是果拓地焉北部薁鞬骨都侯與右骨都侯率眾三萬餘人來歸南單于南單于復遣使詣闕奉藩稱臣獻國珍寶求使者監護遣侍子修舊約二十六年遣中郎將段郴副校尉王郁使南單于立其庭去五原西部塞八十里單于乃延迎使者使者曰單于當伏拜受詔單于顧望有頃乃伏稱臣拜訖令譯曉使者曰單于新立誠慚於左右願使者眾中無相屈折也骨都侯等見皆泣下郴等反命詔乃聽南單于入居雲中遣使上書獻駱駝二頭文馬十匹夏南單于所獲北虜薁鞬左賢王將其眾及南部五骨都侯合三萬餘人畔歸去北庭三百餘里共立薁鞬左賢王為單于月餘日更相攻擊五骨都侯皆死左賢王遂自殺諸骨都侯子各擁兵自守秋南單于遣子入侍奉奏詣闕詔賜單于冠帶衣裳黃金璽盭緺綬安車羽蓋華藻駕駟寶劍弓箭黑節三駙馬二黃金錦繡繒布萬匹絮萬斤樂器鼓車棨戟甲兵飲食什器又轉河東米糒二萬五千斛牛羊三萬六千頭以贍給之令中郎將置安集掾史將弛刑五十人持兵弩隨單于所處參辭訟察動靜單于歲盡輒遣奉奏送侍子入朝中郎將從事一人將領詣闕漢遣謁者送前侍子還單于庭交會道路元正朝賀拜祠陵廟畢漢乃遣單于使令謁者將送賜綵繒千匹錦四端金十斤太官御食醬及橙橘龍眼荔枝賜單于母及諸閼氏單于子及左右賢王左右谷蠡王骨都侯有功善者繒綵合萬匹歲以為常匈奴俗歲有三龍祠常以正月五月九月戊日祭天神南單于既內附兼祠漢帝因會諸部議國事走馬及駱駞為樂其大臣貴者左賢王次左谷蠡王次右賢王次右谷蠡王謂之四角次左右日逐王次左右溫禺鞮王次左右斬將王是為六角皆單于子弟次第當為單于者也異姓大臣左右骨都侯次左右尸逐骨都侯其餘日逐且渠當戶諸官號各以權力優劣部眾多少為高下次第焉單于姓虛連鞮異姓有呼衍氏須卜氏丘林氏蘭氏四姓為國中名族常與單于婚姻呼衍氏為左蘭氏須卜氏為右主斷獄聽訟當決輕重口白單于無文書簿領焉冬前畔五骨都侯子復將其眾三千人歸南部北單于使騎追擊悉獲其眾南單于遣兵拒之逆戰不利於是復詔單于徙居西河美稷因使中郎將段郴及副校尉王郁留西河擁護之為設官府從事掾史令西河長史歲將騎二千弛刑五百人助中郎將衛護單于冬屯夏罷自後以為常及悉復緣邊八郡南單于既居西河亦列置諸部王助為扞戍使韓氏骨都侯屯北地右賢王屯朔方當于骨都侯屯五原呼衍骨都侯屯雲中郎氏骨都侯屯定襄左南將軍屯鴈門栗籍骨都侯屯代郡皆領部眾為郡縣偵羅耳目北單于惶恐頗還所略漢人以示善意鈔兵每到南部下還過亭候輒謝曰自擊亡虜薁鞬日逐耳非敢犯漢人也二十七年北單于遂遣使詣武威求和親天子召公卿廷議不決皇太子言曰南單于新附北虜懼於見伐故傾耳而聽爭欲歸義耳今未能出兵而反交通北虜臣恐南單于將有二心北虜降者且不復來矣帝然之告武威太守勿受其使二十八年北匈奴復遣使詣闕貢馬及裘更乞和親並請音樂又求率西域諸國胡客與俱獻見帝下三府議酬荅之宜司徒掾班彪奏曰臣聞孝宣皇帝敕邊守尉曰匈奴大國多變詐交接得其情則卻敵折衝應對入其數則反為輕欺今北匈奴見南單于來附懼謀其國故數乞和親又遠驅牛馬與漢合市重遣名王多所貢獻斯皆外示富強以相欺誕也臣見其獻益重知其國益虛歸親愈數為懼愈多然今既未獲助南則亦不宜絕北羈縻之義禮無不荅謂可頗加賞賜略與所獻相當明加曉告以前世呼韓邪郅支行事報荅之辭令必有適今立稾草并上曰單于不忘漢恩追念先祖舊約欲修和親以輔身安國計議甚高為單于嘉之往者匈奴數有乖亂呼韓邪郅支自相讎隙並蒙孝宣皇帝垂恩救護故各遣侍子稱藩保塞其後郅支忿戾自絕皇澤而呼韓附親忠孝彌著及漢滅郅支遂保國傳嗣子孫相繼今南單于攜眾向南款塞歸命自以呼韓嫡長次第當立而侵奪失職猜疑相背數請兵將歸埽北庭策謀紛紜無所不至惟念斯言不可獨聽又以北單于比年貢獻欲修和親故拒而未許將以成單于忠孝之義漢秉威信總率萬國日月所照皆為臣妾殊俗百蠻義無親疏服順者襃賞畔逆者誅罰善惡之效呼韓郅支是也今單于欲修和親款誠已達何嫌而欲率西域諸國俱來獻見西域國屬匈奴與屬漢何異單于數連兵亂國內虛耗貢物裁以通禮何必獻馬裘今齎雜繒五百匹弓鞬韥丸一矢四發遣遺單于又賜獻馬左骨都侯右谷蠡王雜繒各四百匹斬馬劍各一單于前言先帝時所賜呼韓邪竽瑟空侯皆敗願復裁賜念單于國尚未安方厲武節以戰攻為務竽瑟之用不如良弓利劍故未以齎朕不愛小物於單于便宜所欲遣驛以聞帝悉納從之二十九年賜南單于羊數萬頭三十一年北匈奴復遣使如前乃璽書報荅賜以綵繒不遣使者單于比立九年薨中郎將段郴將兵赴弔祭以酒米分兵衛護之比弟左賢王莫立帝遣使者齎璽書鎮慰拜授璽綬遺冠幘絳單衣三襲童子佩刀緄帶各一又賜繒綵四千匹令賞賜諸王骨都侯已下其後單于薨弔祭慰賜以此為常丘浮尤鞮單于莫中元元年立一年薨弟汗立伊伐於慮鞮單于汗中元二年立永平二年北匈奴護于丘率眾千餘人來降南部單于汗立二年薨單于比之子適立醯僮尸逐侯鞮單于適永平二年立五年冬北匈奴六七千騎入于五原塞遂寇雲中至原陽南單于擊卻之西河長史馬襄赴救虜乃引去單于適立四年薨單于莫子蘇立是為丘除車林鞮單于數月復薨單于適之弟長立胡邪尸逐侯鞮單于長永平六年立時北匈奴猶盛數寇邊朝廷以為憂會北單于欲合市遣使求和親顯宗冀其交通不復為寇乃許之八年遣越騎司馬鄭眾北使報命而南部須卜骨都侯等知漢與北虜交使懷嫌怨欲畔密因北使令遣兵迎之鄭眾出塞疑有異伺候果得須卜使人乃上言宜更置大將以防二虜交通由是始置度遼營以中郎將吳棠行度遼將軍事副校尉來苗左校尉閻章右校尉張國將黎陽虎牙營士屯五原曼柏又遣騎都尉秦彭將兵屯美稷其年秋北虜果遣二千騎候望朔方作馬革船欲度迎南部畔者以漢有備乃引去復數寇鈔邊郡焚燒城邑殺略甚眾河西城門晝閉帝患之十六年乃大發緣邊兵遣諸將四道出塞北征匈奴南單于遣左賢王信隨太僕祭肜及吳棠出朔方高闕攻皋林溫禺犢王於涿邪山虜聞漢兵來悉度漠去肜棠坐不至涿邪山免以騎都尉來苗行度遼將軍其年北匈奴入雲中遂至漁陽太守廉范擊卻之詔遣使者高弘發三郡兵追之無所得建初元年來苗遷濟陰太守以征西將軍耿秉行度遼將軍時皋林溫禺犢王復將眾還居涿邪山南單于聞知遣輕騎與緣邊郡及烏桓兵出塞擊之斬首數百級降者三四千人其年南部苦蝗大飢肅宗稟給其貧人三萬餘口七年耿秉遷執金吾以張掖太守鄧鴻行度遼將軍八年北匈奴三木樓訾大人稽留斯等率三萬八千人馬二萬匹牛羊十餘萬款五原塞降元和元年武威太守孟雲上言北單于復願與吏人合市詔書聽雲遣驛使迎呼慰納之北單于乃遣大且渠伊莫訾王等驅牛馬萬餘頭來與漢賈客交易諸王大人或前至所在郡縣為設官邸賞賜待遇之南單于聞乃遣輕騎出上郡遮略生口鈔掠牛馬驅還入塞二年正月北匈奴大人車利涿兵等亡來入塞凡七十三輩時北虜衰耗黨眾離畔南部攻其前丁零寇其後鮮卑擊其左西域侵其右不復自立乃遠引而去單于長立二十三年薨單于汗之子宣立伊屠於閭鞮單于宣元和二年立其歲單于遣兵千餘人獵至涿邪山卒與北虜溫禺犢王遇因戰獲其首級而還冬孟雲上言北虜以前既和親而南部復往鈔掠北單于謂漢欺之謀欲犯塞謂宜還南所掠生口以慰安其意肅宗從太僕袁安議許之乃下詔曰昔玁狁獯粥之敵中國其所由來尚矣往者雖有和親之名終無絲髮之效墝埆之人屢嬰塗炭父戰於前子死於後弱女乘於亭障孤兒號於道路老母寡妻設虛祭飲泣淚想望歸魂於沙漠之表豈不哀哉傳曰江海所以能長百川者以其下之也少加屈下尚何足病況今與匈奴君臣分定辭順約明貢獻累至豈宜違信自受其曲其效度遼及領中郎將龐奮倍雇南部所得生口以還北虜其南部斬首獲生計功受賞如常科於是南單于復令薁鞬日逐王師子將輕騎數千出塞掩擊北虜復斬獲千人北虜眾以南部為漢所厚又聞取降者歲數千人章和元年鮮卑入左地擊北匈奴大破之斬優留單于取其匈奴皮而還北庭大亂屈蘭儲卑胡都須等五十八部口二十萬勝兵八千人詣雲中五原朔方北地降單于宣立三年薨單于長之弟屯屠何立休蘭尸逐侯鞮單于屯屠何章和二年立時北虜大亂加以飢蝗降者前後而至南單于將并北庭會肅宗崩竇太后臨朝其年七月單于上言臣累世蒙恩不可勝數孝章皇帝聖思遠慮遂欲見成就故令烏桓鮮卑討北虜斬單于首級破壞其國今所新降虛渠等詣臣自言去歲三月中發虜庭北單于創刈南兵又畏丁令鮮卑遯逃遠去依安侯河西今年正月骨都侯等復共立單于異母兄右賢王為單于其人以兄弟爭立並各離散臣與諸王骨都侯及新降渠帥雜議方略皆曰宜及北虜分爭出兵討伐破北成南并為一國令漢家長無北念又今月八日新降右須日逐鮮堂輕從虜庭遠來詣臣言北虜諸部多欲內顧但恥自發遣故未有至者若出兵奔擊必有響應今年不往恐復并壹臣伏念先父歸漢以來被蒙覆載嚴塞明候大兵擁護積四十年臣等生長漢地開口仰食歲時賞賜動輒億萬雖垂拱安枕慚無報效之地願發國中及諸部故胡新降精兵遣左谷蠡王師子左呼衍日逐王須訾將萬騎出朔方左賢王安國右大且渠王交勒蘇將萬騎出居延期十二月同會虜地臣將餘兵萬人屯五原朔方塞以為拒守臣素愚淺又兵眾單少不足以防內外願遣執金吾耿秉度遼將軍鄧鴻及西河雲中五原朔方上郡太守并力而北令北地安定太守各屯要害冀因聖帝威神一舉平定臣國成敗要在今年已敕諸部嚴兵馬訖九月龍祠悉集河上唯陛下裁哀省察太后以示耿秉秉上言昔武帝單極天下欲臣虜匈奴未遇天時事遂無成宣帝之世會呼韓來降故邊人獲安中外為一生人休息六十餘年及王莽篡位變更其號耗擾不止單于乃畔光武受命復懷納之緣邊壞郡得以還復烏桓鮮卑咸脅歸義威鎮四夷其效如此今幸遭天授北虜分爭以夷伐夷國家之利宜可聽許秉因自陳受恩分當出命效用太后從之永元元年以秉為征西將軍與車騎將軍竇憲率騎八千與度遼兵及南單于眾三萬騎出朔方擊北虜大破之北單于奔走首虜二十餘萬人事已具竇憲傳二年春鄧鴻遷大鴻臚以定襄太守皇甫棱行度遼將軍南單于復上求滅北庭於是遣左谷蠡王師子等將左右部八千騎出雞鹿塞中郎將耿譚遣從事將護之至涿邪山乃留輜重分為二部各引輕兵兩道襲之左部北過西海至河雲北右部從匈奴河水西繞天山南度甘微河二軍俱會夜圍北單于單于大驚率精兵千餘人合戰單于被創墮馬復上將輕騎數十遁走僅而免脫得其玉璽獲閼氏及男女五人斬首八千級生虜數千口而還是時南部連剋獲納降黨眾最盛領戶三萬四千口二十三萬七千三百勝兵五萬一百七十故事中郎將置從事二人耿譚以新降者多上增從事十二人三年北單于復為右校尉耿夔所破逃亡不知所在其弟右谷蠡王於除鞬自立為單于將右溫禺鞬王骨都侯已下眾數千人止蒲類海遣使款塞大將軍竇憲上書立於除鞬為北單于朝廷從之四年遣耿夔即授璽綬賜玉劍四具羽蓋一駟使中郎將任尚持節衛護屯伊吾如南單于故事方欲輔歸北庭會竇憲被誅五年於除鞬自畔還北帝遣將兵長史王輔以千餘騎與任尚共追誘將還斬之破滅其眾單于屯屠何立六年薨單于宣弟安國立單于安國永元五年立安國初為左賢王而無稱譽左谷蠡王師子素勇黠多知前單于宣及屯屠何皆愛其氣決故數遣將兵出塞掩擊北庭還受賞賜天子亦加殊異是以國中盡敬師子而不附安國安國由是疾師子欲殺之其諸新降胡初在塞外數為師子所驅掠皆多怨之安國因是委計降者與同謀議安國既立為單于師子以次轉為左賢王覺單于與新降者有謀乃別居五原界單于每龍會議事師子輒稱病不往皇甫棱知之亦擁護不遣單于懷憤益甚六年春皇甫棱免以執金吾朱徽行度遼將軍時單于與中郎將杜崇不相平乃上書告崇崇諷西河太守令斷單于章無由自聞而崇因與朱徽上言南單于安國疏遠故胡親近新降欲殺左賢王師子及左臺且渠劉利等又右部降者謀共迫脅安國起兵背畔請西河上郡安定為之儆備和帝下公卿議皆以為蠻夷反覆雖難測知然大兵聚會必未敢動搖今宜遣有方略使者之單于庭與杜崇朱徽及西河太守并力觀其動靜如無它變可令崇等就安國會其左右大臣責其部眾橫暴為邊害者共平罪誅若不從命令為權時方略事畢之後裁行客賜亦足以威示百蠻帝從之於是徽崇遂發兵造其庭安國夜聞漢軍至大驚棄帳而去因舉兵及將新降者欲誅師子師子先知乃悉將廬落入曼柏城安國追到城下門閉不得入朱徽遣吏曉譬和之安國不聽城既不下乃引兵屯五原崇徽因發諸郡騎追赴之急眾皆大恐安國舅骨都侯喜為等慮并被誅乃格殺安國安國立一年單于適之子師子立亭獨尸逐侯鞮單于師子永元六年立降胡五六百人夜襲師子安集掾王恬將衛護士與戰破之於是新降胡遂相驚動十五部二十餘萬人皆反畔脅立前單于屯屠何子右薁鞬日逐王逢侯為單于遂殺略吏人燔燒郵亭廬帳將車重向朔方欲度漠北於是遣行車騎將軍鄧鴻越騎校尉馮柱行度遼將軍朱徽將左右羽林北軍五校士及郡國積射緣邊兵烏桓校尉任尚將烏桓鮮卑合四萬人討之時南單于及中郎將杜崇屯牧師城逢侯將萬餘騎攻圍之未下冬鄧鴻等至美稷逢侯乃乘冰度隘向滿夷谷南單于遣子將萬騎及杜崇所領四千騎與鄧鴻等追擊逢侯於大城塞斬首三千餘級得生口及降者萬餘人馮柱復分兵追擊其別部斬首四千餘級任尚率鮮卑大都護蘇拔廆烏桓大人勿柯八千騎要擊逢侯於滿夷谷復大破之前後凡斬萬七千餘級逢侯遂率眾出塞漢兵不能追七年正月軍還馮柱將虎牙營留屯五原罷遣鮮卑烏桓羌胡兵封蘇拔廆為率眾王又賜金帛鄧鴻還京師坐逗留失利下獄死後帝知朱徽杜崇失胡和又禁其上書以致反畔皆徵下獄死以雁門太守龐奮行度遼將軍逢侯於塞外分為二部自領右部屯涿邪山下左部屯朔方西北相去數百里八年冬左部胡自相疑畔還入朔方塞龐奮迎受慰納之其勝兵四千人弱小萬餘口悉降以分處北邊諸郡南單于以其右溫禺犢王烏居戰始與安國同謀欲考問之烏居戰將數千人遂復反畔出塞外山谷間為吏民害秋龐奮馮柱與諸郡兵擊烏居戰其眾降於是徙烏居戰眾及諸還降者二萬餘人於安定北地馮柱還遷將作大匠逢侯部眾飢窮又為鮮卑所擊無所歸竄逃入塞者駱驛不絕單于師子立四年薨單于長之子檀立萬氏尸逐鞮單于檀永元十年立十二年龐奮遷河南尹以朔方太守王彪行度遼將軍南單于比歲遣兵擊逢侯多所虜獲收還生口前後以千數逢侯轉困迫十六年北單于遣使詣闕貢獻願和親修呼韓邪故約和帝以其舊禮不備未許之而厚加賞賜不荅其使元興元年重遣使詣敦煌貢獻辭以國貧未能備禮願請大使當遣子入侍時鄧太后臨朝亦不荅其使但加賜而已永初三年夏漢人韓琮隨南單于入朝既還說南單于云關東水潦人民飢餓死盡可擊也單于信其言遂起兵反畔攻中郎將耿种於美稷秋王彪卒冬遣行車騎將軍何熙副中郎將龐雄擊之四年春檀遣千餘騎寇常山中山以西域校尉梁慬行度遼將軍與遼東太守耿夔擊破之事已具慬夔傳單于見諸軍並進大恐怖顧讓韓琮曰汝言漢人死盡今是何等人也乃遣使乞降許之單于脫帽徒跣對龐雄等拜陳道死罪於是赦之遇待如初乃還所鈔漢民男女及羌所略轉賣入匈奴中者合萬餘人五年梁慬免以雲中太守耿夔行度遼將軍元初元年夔免以烏桓校尉鄧遵為度遼將軍遵皇太后之從弟故始為真將軍焉四年逢侯為鮮卑所破部眾分散皆歸北虜五年春逢侯將百餘騎亡還詣朔方塞降鄧遵奏徙逢侯於潁川郡建光元年鄧遵免復以耿夔代為度遼將軍時鮮卑寇邊夔與溫禺犢王呼尤徽將新降者連年出塞討擊鮮卑還復各令屯列衝要而耿夔徵發煩劇新降者皆悉恨謀畔單于檀立二十七年薨弟拔立耿夔復免以太原太守法度代為將軍烏稽侯尸逐鞮單于拔延光三年立夏新降一部大人阿族等遂反畔脅呼尤徽欲與俱去呼尤徽曰我老矣受漢家恩寧死不能相隨眾欲殺之有救者得免阿族等遂將妻子輜重亡去中郎將馬翼遣兵與胡騎追擊破之斬首及自投河死者殆盡獲馬牛羊萬餘頭冬法度卒四年漢陽太守傅眾代為將軍其冬傅眾復卒永建元年以遼東太守龐參代為將軍先是朔方以西障塞多不修復鮮卑因此數寇南部殺漸將王單于憂恐上言求復障塞順帝從之乃遣黎陽營兵出屯中山北界增置緣邊諸郡兵列屯塞下教習戰射單于拔立四年薨弟休利立去特若尸逐就單于休利永建三年立四年龐參遷大鴻臚以東平相宋漢代為度遼將軍陽嘉二年漢遷太僕以烏桓校尉耿曄代為度遼將軍永和元年曄病徵以護羌校尉馬續代為度遼將軍五年夏南匈奴左部句龍王吾斯車紐等背畔率三千餘騎寇西河因復招誘右賢王合七八千騎圍美稷殺朔方代郡長史馬續與中郎將梁並烏桓校尉王元發緣邊兵及烏桓鮮卑羌胡合二萬餘人掩擊破之吾斯等遂更屯聚攻沒城邑天子遣使責讓單于開以恩義令相招降單于本不豫謀乃脫帽避帳詣並謝罪並以病徵五原太守陳龜代為中郎將龜以單于不能制下逼迫之單于及其弟左賢王皆自殺單于休利立十三年龜又欲徙單于近親於內郡而降者遂更狐疑龜坐下獄免大將軍梁商以羌胡新反黨眾初合難以兵服宜用招降乃上表曰匈奴寇畔自知罪極窮鳥困獸皆知救死況種類繁熾不可單盡今轉運日增三軍疲苦虛內給外非中國之利竊見度遼將軍馬續素有謀謨且典邊日久深曉兵要每得續書與臣策合宜令續深溝高壁以恩信招降宣示購賞明其期約如此則醜類可服國家無事矣帝從之乃詔續招降畔虜商又移書續等曰中國安寧忘戰日久良騎野合交鋒接矢決勝當時戎狄之所長而中國之所短也強弩乘城堅營固守以待其衰中國之所長而戎狄之所短也宜務先所長以觀其變設購開賞宣示反悔勿貪小功以亂大謀續及諸郡並各遵行於是右賢王部抑鞮等萬三千口詣續降秋句龍吾斯等立句龍王車紐為單于東引烏桓西收羌戎及諸胡等數萬人攻破京兆虎牙營殺上郡都尉及軍司馬遂寇掠并涼幽冀四州乃徙西河治離石上郡治夏陽朔方治五原冬遣中郎將張耽將幽州烏桓諸郡營兵擊畔虜車紐等戰於馬邑斬首三千級獲生口及兵器牛羊甚眾車紐等將諸豪帥骨都侯乞降而吾斯猶率其部曲與烏桓寇鈔六年春馬續率鮮卑五千騎到穀城擊之斬首數百級張耽性勇銳而善撫士卒軍中皆為用命遂繩索相懸上通天山大破烏桓悉斬其渠帥還得漢民獲其畜生財物夏馬續復免以城門校尉吳武代為將軍漢安元年秋吾斯與薁鞬臺耆且渠伯德等復掠并部呼蘭若尸逐就單于兜樓儲先在京師漢安二年立之天子臨軒大鴻臚持節拜授璽綬引上殿賜青蓋駕駟鼓車安車駙馬騎玉具刀劍什物給綵布二千匹賜單于閼氏以下金錦錯雜具軿車馬二乘遣行中郎將持節護送單于歸南庭詔太常大鴻臚與諸國侍子於廣陽城門外祖會饗賜作樂角抵百戲順帝幸胡桃宮臨觀之冬中郎將馬實募刺殺句龍吾斯送首洛陽建康元年進擊餘黨斬首千二百級烏桓七十萬餘口皆詣實降車重牛羊不可勝數單于兜樓儲立五年薨伊陵尸逐就單于居車兒建和元年立至永壽元年匈奴左薁鞮臺耆且渠伯德等復畔寇鈔美稷安定屬國都尉張奐擊破降之事已具奐傳延熹元年南單于諸部並畔遂與烏桓鮮卑寇緣邊九郡以張奐為北中郎將討之單于諸部悉降奐以單于不能統理國事乃拘之上立左谷蠡王桓帝詔曰春秋大居正居車兒一心向化何罪而黜其遣還庭單于居車兒立二十五年薨子某立屠特若尸逐就單于某熹平元年立六年單于與中郎將臧旻出雁門擊鮮卑檀石槐大敗而還是歲單于薨子呼徵立單于呼徵光和元年立二年中郎將張修與單于不相能修擅斬之更立右賢王羌渠為單于修以不先請而擅誅殺檻車徵詣廷尉抵罪單于羌渠光和二年立中平四年前中山太守張純反畔遂率鮮卑寇邊郡靈帝詔發南匈奴兵配幽州牧劉虞討之單于遣左賢王將騎詣幽州國人恐單于發兵無已五年右部醯落與休著各胡白馬銅等十餘萬人反攻殺單于單于羌渠立十年子右賢王於扶羅立持至尸逐侯單于於扶羅中平五年立國人殺其父者遂畔共立須卜骨都侯為單于而於扶羅詣闕自訟會靈帝崩天下大亂單于將數千騎與白波賊合兵寇河內諸郡時民皆保聚鈔掠無利而兵遂挫傷復欲歸國國人不受乃止河東須卜骨都侯為單于一年而死南庭遂虛其位以老王行國事單于於扶羅立七年死弟呼廚泉立單于呼廚泉興平二年立以兄被逐不得歸國數為鮮卑所鈔建安元年獻帝自長安東歸右賢王去卑與白波賊帥韓暹等侍衛天子拒擊李傕郭汜及車駕還洛陽又徙遷許然後歸國二十一年單于來朝曹操因留於鄴而遣去卑歸監其國焉論曰漢初遭冒頓凶黠種眾強熾高祖威加四海而窘平城之圍太宗政鄰刑措不雪憤辱之恥逮孝武亟興邊略有志匈奴赫然命將戎旗星屬候列郊甸火通甘泉而猶鳴鏑揚塵出入畿內至於窮竭武力單用天財歷紀歲以攘之寇雖頗折而漢之疲耗略相當矣宣帝值虜庭分爭呼韓邪來臣乃權納懷柔因為邊衛罷關徼之儆息兵民之勞龍駕帝服鳴鐘傳鼓於清渭之上南面而朝單于朔易無復匹馬之蹤六十餘年矣後王莽陵篡擾動戎夷續以更始之亂方夏幅裂自是匈奴得志狼心復生乘間侵佚害流傍境及中興之初更通舊好報命連屬金幣載道而單于驕踞益橫內暴滋深世祖以用事諸華未遑沙塞之外忍愧思難徒報謝而已因徙幽并之民增邊屯之卒及關東稍定隴蜀已清其猛夫扞將莫不頓足攘手爭言衛霍之事帝方厭兵間修文政未之許也其後匈奴爭立日逐來奔願修呼韓之好以禦北狄之衝奉藩稱臣永為外扞天子總攬群策和而納焉乃詔有司開北鄙擇肥美之地量水草以處之馳中郎之使盡法度以臨之制衣裳備文物加璽紱之綬正單于之名於是匈奴分破始有南北二庭焉讎釁既深互伺便隙控弦抗戈覘望風塵雲屯鳥散更相馳突至於陷潰創傷者靡歲或寧而漢之塞地晏然矣後亦頗為出師并兵窮討命竇憲耿夔之徒前後並進皆用果譎設奇數異道同會究掩其窟穴躡北追奔三千餘里遂破龍祠焚罽幕阬十角梏閼氏銘功封石倡呼而還單于震懾屏氣蒙氈遁走於烏孫之地而漠北空矣若因其時埶及其虛曠還南虜於陰山歸西河於內地上申光武權宜之略下防戎羯亂華之變使耿國之算不謬於當世袁安之議見從於後王平易正直若此其弘也而竇憲矜三捷之效忽經世之規狼戾不端專行威惠遂復更立北虜反其故庭並恩兩護以私己福棄蔑天公坐樹大鯁永言前載何恨憤之深乎自後經綸失方畔服不一其為疢毒胡可單言降及後世翫為常俗終於吞噬神鄉丘墟帝宅嗚呼千里之差興自毫端失得之源百世不磨矣贊曰匈奴既分羽書稀聞野心難悔終亦紛紜
