body:
  text: 百官四執金吾執金吾一人中二千石本注曰掌宮外戒司非常水火之事月三繞行宮外及主兵器吾猶禦也丞一人比千石緹騎二百人本注曰無秩比吏食奉武庫令一人六百石本注曰主兵器丞一人右屬執金吾本注曰本有式道左右中候三人六百石車駕出掌在前清道還持麾至宮門宮門乃開中興但一人又不常置每出以郎兼式道候事已罷不復屬執金吾又省中壘寺互都船令丞尉及左右京輔都尉太子太傅太子太傅一人中二千石本注曰職掌輔導太子禮如師不領官屬大長秋大長秋一人二千石本注曰承秦將行宦者景帝更為大長秋或用士人中興常用宦者職掌奉宣中宮命凡給賜宗親及宗親當謁見者關通之中宮出則從丞一人六百石本注曰宦者中宮僕一人千石本注曰宦者主馭本注曰太僕秩二千石中興省太減秩二千石以屬長秋中宮謁者令一人六百石本注曰宦者中宮謁者三人四百石本注曰宦者主報中章中宮尚書五人六百石本注曰宦者主中文書中宮私府令一人六百石本注曰宦者主中藏幣帛諸物裁衣被補浣者皆主之丞一人本注曰宦者中宮永巷令一人六百石本注曰宦者主宮人丞一人本注曰宦者中宮黃門宂從僕射一人六百石本注曰宦者主中黃門宂從中宮署令一人六百石本注曰宦者主中宮請署天子數女騎六人丞復道丞各一人本注曰宦者復道丞主中閣道中宮藥長一人四百石本注曰宦者右屬大長秋本注曰承秦有詹事一人位在長秋上亦宦者主中諸官成帝省之以其職并長秋是後皇后當法駕出則中謁中宦者職吏權兼詹事奉引訖罷宦者誅後尚書選兼職吏一人奉引云其中長信長樂宮者置少府一人職如長秋及餘吏皆以宮名為號員數秩次如中宮本注曰帝祖母稱長信宮故有長信少府長樂少府位在長秋上及職吏皆宦者秩次如中宮長樂又有衛尉僕為太僕皆二千石在少府上其崩則省不常置太子少傅太子少傅二千石本注曰亦以輔導為職悉主太子官屬太子率更令一人千石本注曰主庶子舍人更直職似光祿太子庶子四百石本注曰無員如三署中郎太子舍人二百石本注曰無員更直宿衛如三署郎中太子家令一人千石本注曰主倉穀飲食職似司農少府太子倉令一人六百石本注曰主倉穀太子食官令一人六百石本注曰主飲食太子僕一人千石本注曰主車馬職如太僕太子廄長一人四百石本注曰主車馬太子門大夫六百石本注曰舊注云職比郎將舊有左右戶將別主左右戶直郎建武以來省之太子中庶子六百石本注曰員五人職如侍中太子洗馬比六百石本注曰舊注云員十六人職如謁者太子出則當直者在前導威儀太子中盾一人四百石本注曰主周衛徼循太子衛率一人四百石本注曰主門衛士右屬太子少傅本注曰凡初即位未有太子官屬皆罷唯舍人不省領屬少府將作大匠將作大匠一人二千石本注曰承秦曰將作少府景帝改為將作大匠掌修作宗廟路寢宮室陵園木土之功并樹桐梓之類列于道側丞一人六百石左校令一人六百石本注曰掌左工徒丞一人右校令一人六百石本注曰掌右工徒丞一人右屬將作大匠城門校尉城門校尉一人比二千石本注曰掌雒陽城門十二所司馬一人千石本注曰主兵城門每門候一人六百石本注曰雒陽城十二門其正南一門曰平城門北宮門屬衛尉其餘上西門雍門廣陽門津門小苑門開陽門耗門中東門上東門穀門夏門凡十二門右屬城門校尉北軍中候北軍中候一人六百石本注曰掌監五營屯騎校尉一人比二千石本注曰掌宿衛兵司馬一人千石越騎校尉一人比二千石本注曰掌宿衛兵司馬一人千石步兵校尉一人比二千石本注曰掌宿衛兵司馬一人千石長水校尉一人比二千石本注曰掌宿衛兵司馬胡騎司馬各一人千石本注曰掌宿衛主烏桓騎射聲校尉一人比二千石本注曰掌宿衛兵司馬一人千石右屬北軍中候本注曰舊有中壘校尉領北軍營壘之事有胡騎虎賁校尉皆武帝置中興省中壘但置中候以監五營胡騎并長水虎賁主輕車并射聲凡中二千石丞比千石真二千石丞長史六百石比二千石丞比六百石令相千石丞尉四百石其六百石丞尉三百石長相四百石及三百石丞尉皆二百石諸侯公主家丞秩皆比百石諸邊鄣塞尉諸陵校尉長皆二百石有常例者不署秩司隸校尉司隸校尉一人比二千石本注曰孝武帝初置持節掌察舉百官以下及京師近郡犯法者元帝去節成帝省建武中復置并領一州從事史十二人本注曰都官從事主察舉百官犯法者功曹從事主州選署及眾事別駕從事校尉行部則奉引錄眾事簿曹從事主財穀簿書其有軍事則置兵曹從事主兵事其餘部郡國從事每郡國各一人主督促文書察舉非法皆州自辟除故通為百石云假佐二十五人本注曰主簿錄閣下事省文書門亭長主州正門功曹書佐主選用孝經師主監試經月令師主時節祠祀律令師主平法律簿曹書佐主簿書其餘都官書佐及每郡國各有典郡書佐一人各主一郡文書以郡吏補歲滿一更司隸所部郡七河南尹一人主京都特奉朝請其京兆尹左馮翊右扶風三人漢初都長安皆秩中二千石謂之三輔中興都雒陽更以河南郡為尹以三輔陵廟所在不改其號但減其秩其餘弘農河內河東三郡其置尹馮翊扶風及太守丞奉之本位在地理志
