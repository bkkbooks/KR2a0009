body:
  text: 五行六日蝕光武帝建武二年正月甲子朔日有食之在危八度日蝕說曰日者太陽之精人君之象君道有虧為陰所乘故蝕蝕者陽不克也其候雜說漢書五行志著之必矣儒說諸侯專權則其應多在日所宿之國諸象附從則多為王者事人君改修其德則咎害除是時世祖初興天下賊亂未除虛危齊也賊張步擁兵據齊上遣伏隆諭步許降旋復叛稱王至五年中迺破三年五月乙卯晦日有蝕之在柳十四度柳河南也時世祖在雒陽赤眉降賊樊崇謀作亂其七月發覺皆伏誅六年九月丙寅晦日有蝕之史官不見郡以聞在尾八度七年三月癸亥晦日有蝕之在畢五度畢為邊兵秋隗囂反侵安定冬盧芳所置朔方雲中太守各舉郡降十六年三月辛丑晦日有蝕之在昴七度昴為獄事時諸郡太守坐度田不實世祖怒殺十餘人然後深悔之十七年二月乙未晦日有蝕之在胃九度胃為廩倉時諸郡新坐租之後天下憂怖以穀為言故示象或曰胃供養之官也其十月廢郭皇后詔曰不可以奉供養二十二年五月乙未晦日有蝕之在柳七度京都宿也柳為上倉祭祀穀也近輿鬼輿鬼為宗廟十九年中有司奏請立近帝四廟以祭之有詔廟處所未定且就高廟袷祭之至此三年遂不立廟有簡墮心奉祖宗之道有闕故示象也二十五年三月戊申晦日有蝕之在畢十五度畢為邊兵其冬十月以武谿蠻夷為寇害伏波將軍馬援將兵擊之二十九年二月丁巳朔日有蝕之在東壁五度東壁為文章一名娵訾之口先是皇子諸王各招來文章談說之士去年中有人上奏諸王所招待者或真偽雜受刑罰者子孫宜可分別於是上怒詔捕諸王客皆被以苛法死者甚多世祖不早為明設刑禁一時治之過差故天示象世祖於是改悔遣使悉海侵枉也三十一年五月癸酉晦日有蝕之在柳五度京都宿也自二十一年示象至此十年後二年宮車晏駕中元元年十一月甲子晦日有蝕之在斗二十度斗為廟主爵祿儒說十一月甲子時王日也又為星紀主爵祿其占重明帝永平三年八月壬申晦日有蝕之在氐二度氐為宿宮是時明帝作北宮八年十月壬寅晦日有蝕之既在斗十一度斗吳也廣陵於天文屬吳後二年廣陵王荊坐謀反自殺十三年十月甲辰晦日有蝕之在尾十七度十六年五月戊午晦日有蝕之在柳十五度儒說五月戊午猶十一月甲子也又宿在京都其占重後二歲宮車晏駕十八年十一月甲辰晦日有蝕之在斗二十一度是時明帝既崩馬太后制爵祿故陽不勝章帝建初五年二月庚辰朔日有蝕之在東壁八度例在前建武二十九年是時群臣爭經多相非毀者六年六月辛未晦日有蝕之在翼六度翼主遠客冬東平王蒼等來朝明年正月蒼薨章和元年八月乙未晦日有蝕之史官不見佗官以聞日在氐四度和帝永元二年二月壬午日有蝕之史官不見涿郡以聞日在奎八度四年六月戊戌朔日有蝕之在七星二度主衣裳又曰行近軒轅在左角為太后族是月十九日上免太后兄弟竇憲等官遣就國選嚴能相於國蹙迫自殺七年四月辛亥朔日有蝕之在觜觿為葆旅主收斂儒說葆旅宮中之象收斂貪妒之象是歲鄧貴人始入明年三月陰皇后立鄧貴人有寵陰后妒忌之後遂坐廢一曰是將入參參伐為斬刈明年七月越騎校尉馮柱捕斬匈奴溫禺犢王烏居戰十二年秋七月辛亥朔日有蝕之在翼八度荊州宿也明年冬南郡蠻夷反為寇十五年四月甲子晦日有蝕之在東井二十二度東井主酒食之宿也婦人之職無非無議酒食是議去年冬鄧皇后立有丈夫之性與知外事故天示象是年水雨傷稼安帝永初元年三月二日癸酉日有蝕之在胃二度胃主廩倉是時鄧太后專政去年大水傷稼倉廩為虛五年正月庚辰朔日有蝕之在虛八度正月王者統事之正日也虛空名也是時鄧太后攝政安帝不得行事俱不得其正若王者位虛故於正月陽不克示象也於是陰預乘陽故夷狄並為寇害西邊諸郡皆至空虛七年四月丙申晦日有蝕之在東井一度元初元年十月戊子朔日有蝕之在尾十度尾為後宮繼嗣之宮也是時上甚幸閻貴人將立故示不善將為繼嗣禍也明年四月遂立為后後遂與江京耿寶等共讒太子廢之二年九月壬午晦日有蝕之在心四度心為王者明久失位也三年三月二日辛亥日有蝕之在婁五度史官不見遼東以聞四年二月乙巳朔日有蝕之在奎九度史官不見七郡以聞奎主武庫兵其月十八日壬戌武庫火燒兵器也五年八月丙申朔日有蝕之在翼十八度史官不見張掖以聞六年十二月戊午朔日有蝕之幾盡地如昏狀在須女十一度女主惡之後二歲三月鄧太后崩永寧元年七月乙酉朔日有蝕之在張十五度史官不見酒泉以聞延光三年九月庚申晦日有蝕之在氐十五度氐為宿宮宮中宮也時上聽中常侍江京樊豐及阿母王聖等讒言廢皇太子四年三月戊午朔日有蝕之在胃十二度隴西酒泉朔方各以狀上史官不覺順帝永建二年七月甲戌朔日有蝕之在翼九度陽嘉四年閏月丁亥朔日有蝕之在角五度史官不見零陵以聞永和三年十二月戊戌朔日有蝕之在須女十一度史官不見會稽以聞明年中常侍張逵等謀譖皇后父梁商欲作亂推考逵等伏誅也五年五月己丑晦日有蝕之在東井三十三度東井三輔宿又近輿鬼輿鬼為宗廟其秋西羌為寇至三輔陵園六年九月辛亥晦日有蝕之在尾十一度尾主後宮繼嗣之宮也以為繼嗣不興之象桓帝建和元年正月辛亥朔日有蝕之在營室三度史官不見郡國以聞是時梁太后攝政三年四月丁卯晦日有食之在東井二十三度例在永元十五年東井主法梁太后又聽兄冀枉殺公卿犯天法也明年太后崩元嘉二年七月二日庚辰日有蝕之在翼四度史官不見廣陵以聞翼主倡樂時上好樂過永興二年九月丁卯朔日有蝕之在角五度角鄭宿也十一月泰山盜賊群起劫殺長吏泰山於天文屬鄭永壽三年閏月庚辰晦日有蝕之在七星二度史官不見郡國以聞例在永元四年後二歲梁皇后崩冀兄弟被誅延熹元年五月甲戌晦日有蝕之在柳七度京都宿也八年正月丙申晦日有蝕之在營室十三度營室之中女主象也其二月癸亥鄧皇后坐酗上送暴室令自殺家屬被誅呂太后崩時亦然九年正月辛卯朔日有蝕之在營室三度史官不見郡國以聞谷永以為三朝尊者惡之其明年宮車晏駕永康元年五月壬子晦日有蝕之在輿鬼一度儒說壬子淳水日而陽不克將有水害其八月六州大水勃海海溢靈帝建寧元年五月丁未朔日有蝕之冬十月甲辰晦日有蝕之二年十月戊戌晦日有蝕之右扶風以聞三年三月丙寅晦日有蝕之梁相以聞四年三月辛酉朔日有蝕之熹平二年十二月癸酉晦日有蝕之在虛二度是時中常侍曹節王甫等專權六年十月癸酉朔日有蝕之趙相以聞光和元年二月辛亥朔日有蝕之十月丙子晦日有蝕之在箕四度箕為後宮口舌是月上聽讒廢宋皇后二年四月甲戌朔日有蝕之四年九月庚寅朔日有蝕之在角六度中平三年五月壬辰晦日有蝕之六年四月丙午朔日有蝕之其月浹辰宮車晏駕獻帝初平四年正月甲寅朔日有蝕之在營室四度是時李傕郭氾專政興平元年六月乙巳晦日有蝕之建安五年九月庚午朔日有蝕之六年二月丁卯朔日有蝕之十三年十月癸未朔日有蝕之在尾十二度十五年二月乙巳朔日有蝕之十七年六月庚寅晦日有蝕之二十一年五月己亥朔日有蝕之二十四年二月壬子晦日有蝕之凡漢中興十二世百九十六年日蝕七十二朔三十二晦三十七月二日三日抱光武建武七年四月丙寅日有暈抱白虹貫暈在畢八度畢為邊兵秋隗囂反侵安定日赤無光靈帝時日數出東方正赤如血無光高二丈餘迺有景且入西方去地二丈亦如之其占曰事天不謹則日月赤是時月出入去地二三丈皆赤如血者數矣日黃珥光和四年二月己巳黃氣抱日黃白珥在其表日中黑中平四年三月丙申黑氣大如瓜在日中虹貫日五年正月日色赤黃中有黑氣如飛鵲數月迺銷六年二月乙未白虹貫日獻帝初平元年二月壬辰白虹貫日月蝕非其月桓帝永壽三年十二月壬戌月蝕非其月延熹八年正月辛巳月蝕非其月贊曰皇極惟建五事剋端罰咎入沴逆亂浸干火下水騰木弱金酸妖豈或妄氣炎以觀
