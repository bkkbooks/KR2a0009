body:
  text: 李王鄧來列傳第五李通李通字次元南陽宛人也世以貨殖著姓父守身長九尺容貌絕異為人嚴毅居家如官廷初事劉歆好星歷讖記為王莽宗卿師通亦為五威將軍從事出補巫丞有能名莽末百姓愁怨通素聞守說讖云劉氏復興李氏為輔私常懷之且居家富逸為閭里雄以此不樂為吏乃自免歸及下江新市兵起南陽騷動通從弟軼亦素好事乃共計議曰今四方擾亂新室且亡漢當更興南陽宗室獨劉伯升兄弟汎愛容眾可與謀大事通笑曰吾意也會光武避吏在宛通聞之即遣軼往迎光武光武初以通士君子相慕也故往荅之及相見共語移日掘手極歡通因具言讖文事光武初殊不意未敢當之時守在長安光武乃微觀通曰即如此當如宗卿師何通曰已自有度矣因復備言其計光武既深知通意乃遂相約結定謀議期以材官都試騎士日欲劫前隊大夫及屬正因以號令大眾乃使光武與軼歸舂陵舉兵以相應遣從兄子季之長安以事報守季於道病死守密知之欲亡歸素與邑人黃顯相善時顯為中郎將聞之謂守曰今關門禁嚴君狀貌非凡將以此安之不如詣闕自歸事既未然脫可免禍守從其計即上書歸死章未及報留闕下會事發覺通得亡走莽聞之乃繫守於獄而黃顯為請曰守聞子無狀不敢逃亡守義自信歸命宮闕臣顯願質守俱東曉說其子如遂悖逆令守北向刎首以謝大恩莽然其言會前隊復上通起兵之狀莽怒欲殺守顯爭之遂并被誅及守家在長安者盡殺之南陽亦誅通兄弟門宗六十四人皆焚屍宛市時漢兵亦已大合通與光武李軼相遇棘陽遂共破前隊殺甄阜梁丘賜更始立以通為柱國大將軍輔漢侯從至長安更拜為大將軍封西平王軼為舞陰王通從弟松為丞相更始使通持節還鎮荊州通因娶光武女弟伯姬是為寧平公主光武即位徵通為衛尉建武二年封固始侯拜大司農帝每征討四方常令通居守京師鎮撫百姓修宮室起學官五年春代王梁為前將軍六年夏領破姦將軍侯進捕虜將軍王霸等十營擊漢中賊公孫述遣兵赴救通等與戰於西城破之還屯田順陽時天下略定通思欲避榮寵以病上書乞身詔下公卿群臣議大司徒侯霸等曰王莽篡漢傾亂天下通懷伊呂蕭曹之謀建造大策扶助神靈輔成聖德破家為國忘身奉主有扶危存亡之義功德最高海內所聞通以天下平定謙讓辭位夫安不忘危宜令通居職療疾欲就諸侯不可聽於是詔通勉致醫藥以時視事其夏引拜為大司空通布衣唱義助成大業重以寧平公主故特見親重然性謙恭常欲避權埶素有消疾自為宰相謝病不視事連年乞骸骨帝每優寵之令以公位歸第養疾通復固辭積二歲乃聽上大司空印綬以特進奉朝請有司奏請封諸皇子帝感通首創大謀即日封通少子雄為召陵侯每幸南陽常遣使者以太牢祠通父冢十八年卒謚曰恭侯帝及皇后親臨弔送葬子音嗣音卒子定嗣定卒子黃嗣黃卒子壽嗣李軼後為朱鮪所殺更始之敗李松戰死唯通能以功名終永平中顯宗幸宛詔諸李隨安眾宗室會見並受賞賜恩寵篤焉論曰子曰富與貴是人之所欲不以其道得之不處也李通豈知夫所欲而未識以道者乎夫天道性命聖人難言之況乃億測微隱猖狂無妄之禍汙滅親宗以觖一切之功哉昔蒙穀負書不徇楚難即墨用齊義雪燕恥彼之取舍所立其殆與通異乎王常王常字顏卿潁川舞陰人也王莽末為弟報仇亡命江夏久之與王鳳王匡等起兵雲杜綠林中聚眾數萬人以常為偏裨攻傍縣後與成丹張卬別入南郡藍口號下江兵王莽遣嚴尤陳茂擊破之常與丹卬收散卒入蔞谿劫略鍾龍間眾復振引軍與荊州牧戰於上唐大破之遂北至宜秋是時漢兵與新市平林眾俱敗於小長安各欲解去伯升聞下江軍在宜秋即與光武及李通俱造常壁曰願見下江一賢將議大事成丹張卬共推遣常伯升見常說以合從之利常大悟曰王莽篡弒殘虐天下百姓思漢故豪桀並起今劉氏復興即真主也誠思出身為用輔成大功伯升曰如事成豈敢獨饗之哉遂與常深相結而去常還具為丹卬言之丹卬負其眾皆曰大丈夫既起當各自為主何故受人制乎常心獨歸漢乃稍曉說其將帥曰往者成哀衰微無嗣故王莽得承間篡位既有天下而政令苛酷積失百姓之心民之謳吟思漢非一日也故使吾屬因此得起夫民所怨者天所去也民所思者天所與也舉大事必當下順民心上合天意功乃可成若負強恃勇觸情恣欲雖得天下必復失之以秦項之埶尚至夷覆況今布衣相聚草澤以此行之滅亡之道也今南陽諸劉舉宗起兵觀其來議事者皆有深計大慮王公之才與之并合必成大功此天所以祐吾屬也下江諸將雖屈強少識然素敬常乃皆謝曰無王將軍吾屬幾陷於不義願敬受教即引兵與漢軍及新市平林合於是諸部齊心同力銳氣益壯遂俱進破殺甄阜梁丘賜及諸將議立宗室唯常與南陽士大夫同意欲立伯升而朱鮪張卬等不聽及更始立以常為廷尉大將軍封知命侯別徇汝南沛郡還入昆陽與光武共擊破王尋王邑更始西都長安以常行南陽太守事令專命誅賞封為鄧王食八縣賜姓劉氏常性恭儉遵法度南方稱之更始敗建武二年夏常將妻子詣洛陽肉袒自歸光武見常甚歡勞之曰王廷尉良苦每念往時共更艱戹何日忘之莫往莫來豈違平生之言乎常頓首謝曰臣蒙大命得以鞭策託身陛下始遇宜秋後會昆陽幸賴靈武輒成斷金更始不量愚臣任以南州赤眉之難喪心失望以為天下復失綱紀聞陛下即位河北心開目明今得見闕庭死無遺恨帝笑曰吾與廷尉戲耳吾見廷尉不憂南方矣乃召公卿將軍以下大會具為群臣言常以匹夫興義兵明于知天命故更始封為知命侯與吾相遇兵中尤相厚善特加賞賜拜為左曹封山桑侯後帝於大會中指常謂群臣曰此家率下江諸將輔翼漢室心如金石真忠臣也是日遷常為漢忠將軍遣南擊鄧奉董訢令諸將皆屬焉又詔常北擊河間漁陽平諸屯聚五年秋攻拔湖陵又與帝會任城因從破蘇茂龐萌進攻下邳常部當城門戰一日數合賊反走入城常追迫之城上射矢雨下帝從百餘騎自城南高處望常戰力甚馳遣中黃門詔使引還賊遂降又別率騎都尉王霸共平沛郡賊六年春徵還洛陽令夫人迎常於舞陽歸家上冢西屯長安拒隗囂七年使使者持璽書即拜常為橫野大將軍位次與諸將絕席常別擊破隗囂將高峻於朝那囂遣將過烏氏常要擊破之轉降保塞羌諸營壁皆平之九年擊內黃賊破降之後北屯故安拒盧芳十二年薨于屯所謚曰節侯子廣嗣三十年徙封石城侯永平十四年坐與楚事相連國除鄧晨鄧晨字偉卿南陽新野人也世吏二千石父宏豫章都尉晨初娶光武姊元王莽末光武嘗與兄伯升及晨俱之宛與穰人蔡少公等讌語少公頗學圖讖言劉秀當為天子或曰是國師公劉秀乎光武戲曰何用知非僕邪坐者皆大笑晨心獨喜及光武與家屬避吏新野舍晨廬甚相親愛晨因謂光武曰王莽悖暴盛夏斬人此天亡之時也往時會宛獨當應邪光武笑不答及漢兵起晨將賓客會棘陽漢兵敗小長安諸將多亡家屬光武單馬遁走遇女弟伯姬與共騎而奔前行復見元趣令上馬元以手撝曰行矣不能相救無為兩沒也會追兵至元及三女皆遇害漢兵退保棘陽而新野宰乃汙晨宅焚其冢墓宗族皆恚怒曰家自富足何故隨婦家人入湯鑊中晨終無恨色更始立以晨為偏將軍與光武略地潁川俱夜出昆陽城擊破王尋王邑又別徇陽翟以東至京密皆下之更始北都洛陽以晨為常山太守會王郎反光武自薊走信都晨亦間行會於鉅鹿下自請從擊邯鄲光武曰偉卿以一身從我不如以一郡為我北道主人乃遣晨歸郡光武追銅馬高胡群賊於冀州晨發積射士千人又遣委輸給軍不絕光武即位封晨房子侯帝又感悼姊沒於亂兵追封謚元為新野節義長公主立廟于縣西封晨長子汎為吳房侯以奉公主之祀建武三年徵晨還京師數讌見說故舊平生為歡晨從容謂帝曰僕竟辦之帝大笑從幸章陵拜光祿大夫使持節監執金吾賈復等擊平邵陵新息賊四年從幸壽春留鎮九江晨好樂郡職由是復拜為中山太守吏民稱之常為冀州高弟十三年更封南䜌侯入奉朝請復為汝南太守十八年行幸章陵徵晨行廷尉事從至新野置酒酣讌賞賜數百千萬復遣歸郡晨興鴻卻陂數千頃田汝土以殷魚稻之饒流衍它郡明年定封西華侯復徵奉朝請二十五年卒詔遣中謁者備公主官屬禮儀招迎新野主魂與晨合葬於北芒乘輿與中宮親臨喪送葬謚曰惠侯小子棠嗣後徙封武當侯棠卒子固嗣固卒子國嗣國卒子福嗣永建元年卒無子國除來歙來歙字君叔南陽新野人也六世祖漢有才力武帝世以光祿大夫副樓船將軍楊僕擊破南越朝鮮父仲哀帝時為諫大夫娶光武祖姑生歙光武甚親敬之數共往來長安漢兵起王莽以歙劉氏外屬乃收繫之賓客共篡奪得免更始即位以歙為吏從入關數言事不用以病去歙女弟為漢中王劉嘉妻嘉遣人迎歙因南之漢中更始敗歙勸嘉歸光武遂與嘉俱東詣洛陽帝見歙大歡即解衣以衣之拜為大中大夫是時方以隴蜀為憂獨謂歙曰今西州未附子陽稱帝道里阻遠諸將方務關東思西州方略未知所任其謀若何歙因自請曰臣嘗與隗囂相遇長安其人始起以漢為名今陛下聖德隆興臣願得奉威命開以丹青之信囂必束手自歸則述自亡之埶不足圖也帝然之建武三年歙始使隗囂五年復持節送馬援因奉璽書於囂既還復往說囂囂遂遣子恂遂歙入質拜歙為中郎將時山東略定帝謀西收囂兵與俱伐蜀復使歙喻旨囂將王元說囂多設疑故久冘豫不決歙素剛毅遂發憤質責囂曰國家以君知臧否曉廢興故以手書暢意足下推忠誠遣伯春委質是臣主之交信也今反欲用佞惑之言為族滅之計叛主負子違背忠信乎吉凶之決在於今日欲前刺囂囂起入部勒兵將殺歙歙徐杖節就車而去囂愈怒王元勸囂殺歙使牛邯將兵圍守之囂將王遵諫曰愚聞為國者慎器與名為家者畏怨重禍俱慎名器則下服其命輕用怨禍則家受其殃今將軍遣子質漢內懷它志名器逆矣外人有議欲謀漢使輕怨禍矣古者列國兵交使在其間所以重兵貴和而不任戰也何況承王命籍重職而犯之哉君叔雖單車遠使而陛下之外兄也害之無損於漢而隨以族滅昔宋執楚使遂有析骸易子之禍小國猶不可辱況於萬乘之主重以伯春之命哉歙為人有信義言行不違及往來游說皆可案覆西州士大夫皆信重之多為其言故得免而東歸八年春歙與征虜將軍祭遵襲略陽遵道病還分遣精兵隨歙合二千餘人伐山開道從番須回中徑至洛陽斬囂守將金梁因保其城囂大驚曰何其神也乃悉兵數萬人圍略陽斬山築堤激水灌城歙與將士固死堅守矢盡乃發屋斷木以為兵囂盡銳攻之自春至秋其士卒疲弊帝乃大發關東兵自將上隴囂眾潰走圍解於是置酒高會勞賜歙班坐絕席在諸將之右賜歙妻縑千匹詔使留屯長安悉監護諸將歙因上書曰公孫述以隴西天水為藩蔽故得延命假息今二郡平蕩則述智計窮矣宜益選兵馬儲積資糧昔趙之將帥多賈人高帝重之以重賞今西州新破兵人疲饉若招以財穀則其眾可集臣知國家所給非一用度不足然有不得已也帝然之於是大轉糧運詔歙率征西大將軍馮異建威大將軍耿弇虎牙大將軍蓋延揚武將軍馬成武威將軍劉尚入天水擊破公孫述將田弇趙匡明年攻拔落門隗囂支黨周宗趙恢及天水屬縣皆降初王莽世羌虜多背叛而隗囂招懷其酋豪遂得為用及囂亡後五谿先零諸種數為寇掠皆營塹自守州郡不能討歙乃休修攻具率蓋延劉尚及太中大夫馬援等進擊羌於金城大破之斬首虜數千人獲牛羊萬餘頭穀數十萬斛又擊破襄武賊傅栗卿等隴西雖平而人飢流者相望歙乃傾倉廩轉運諸縣以賑贍之於是隴右遂安而涼州流通焉十一年歙與蓋延馬成進攻公孫述將王元環安於河池下辨陷之乘勝遂進蜀人大懼使刺客刺歙未殊馳召蓋延延見歙因伏悲哀不能仰視歙叱延曰虎牙何敢然今使者中刺客無以報國故呼巨卿欲相屬以軍事而反效兒女子涕泣乎刃雖在身不能勒兵斬公邪延收淚強起受所誡歙自書表曰臣夜人定後為何人所賊傷中臣要害臣不敢自惜誠恨奉職不稱以為朝廷羞夫理國以得賢為本太中大夫段襄骨鯁可任願陛下裁察又臣兄弟不肖終恐被罪陛下哀憐數賜教督投筆抽刃而絕帝聞大驚省書攬涕乃賜策曰中郎將來歙攻戰連年平定隴羌憂國忘家忠孝彰著遭命遇害嗚呼哀哉使太中大夫贈歙中郎將征羌侯印綬謚曰節侯謁者護喪事喪還洛陽乘輿縞素臨弔送葬以歙有平羌隴之功故改汝南之當鄉縣為征羌國焉子襃嗣十三年帝嘉歙忠節復封歙弟由為宜西侯襃子稜尚顯宗女武安公主稜早歿襃卒以稜子歷為嗣論曰世稱來君叔天下信士夫專使乎二國之間豈厭詐謀哉而能獨以信稱者良其誠心在乎使兩義俱安而己不私其功也曾孫歷歷字伯珍少襲爵以公主子永元中為侍中監羽林右騎永初三年遷射聲校尉永寧元年代馮石為執金吾延光元年尊歷母為長公主二年遷歷太僕明年中常侍樊豐與大將軍耿寶侍中周廣謝惲等共讒陷太尉楊震震遂自殺歷謂侍御史虞詡曰耿寶託元舅之親榮寵過厚不念報國恩而傾側姦臣誣奏楊公傷害忠良其天禍亦將至矣遂絕周廣謝惲不與交通時皇太子驚病不安避幸安帝乳母野王君王聖舍太子乳母王男廚監邴吉等以為聖舍新繕修犯土禁不可久御聖及其女永與大長秋江京及中常侍樊豐王男邴吉等互相是非聖永遂誣譖男吉皆幽囚死家屬徙比景太子思男等數為歎息京豐懼有後害妄造虛無構讒太子及東宮官屬帝怒召公卿以下會議廢立耿寶等承旨皆以為太子當廢歷與太常桓焉廷尉張皓議曰經說年未滿十五過惡不在其身且男吉之謀皇太子容有不知宜選忠良保傅輔以禮義廢置事重此誠聖恩所宜宿留帝不從是日遂廢太子為濟陰王時監太子家小黃門籍建中傅高梵等皆以無罪徙朔方歷乃要結光祿勳祋諷宗正劉瑋將作大匠薛皓侍中閭丘弘陳光趙代施延太中大夫朱倀第五頡中散大夫曹成諫議大夫李尤符節令張敬持書侍御史龔調羽林右監孔顯城門司馬徐崇衛尉守丞樂闈長樂未央廄令鄭安世等十餘人俱詣鴻都門證太子無過龔調據法律明之以為男吉犯罪皇太子不當坐帝與左右患之乃使中常侍奉詔脅群臣曰父子一體天性自然以義割恩為天下也歷諷等不識大典而與群小共為讙譁外見忠直而內希後福飾邪違義豈事君之禮朝廷廣開言事之路故且一切假貸若懷迷不反當顯明刑書諫者莫不失色薛皓先頓首曰固宜如明詔歷怫然廷詰皓曰屬通諫何言而今復背之大臣乘朝車處國事固得輾轉若此乎乃各稍自引起歷獨守闕連日不肯去帝大怒乃免歷兄弟官削國租黜公主不得會見歷遂杜門不與親戚通時人為之震慄及帝崩閻太后起歷為將作大匠順帝即位朝廷咸稱社稷臣於是遷為衛尉祋諷劉瑋閭丘弘等先卒皆拜其子為郎朱倀施延陳光趙代等並為公卿任職徵王男邴吉家屬還京師厚加賞賜籍建高梵等悉蒙顯擢永建元年拜歷車騎將軍弟祉為步兵校尉超為黃門侍郎三年母長公主薨歷稱病歸弟服闋復為大鴻臚陽嘉二年卒官子定嗣定尚安帝妹平氏長公主順帝時為虎賁中郎將定卒子虎嗣桓帝時為屯騎校尉弟豔字季德少好學下士開館養徒少歷顯位靈帝時再遷司空贊曰李鄧豪贍舍家從讖少公雖孚宗卿未驗王常知命功惟帝念款款君叔斯言無玷方獻三捷永墜一劍
