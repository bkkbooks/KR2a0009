body:
  text: 卷七十九下儒林列傳第六十九下前書魯人申公受詩於浮丘伯為作詁訓是為魯詩齊人轅固生亦傳詩是為齊詩燕人韓嬰亦傳詩是為韓詩三家皆立博士趙人毛萇傳詩是為毛詩未得立高詡高詡字季回平原般人也曾祖父嘉以魯詩授元帝仕至上谷太守父容少傳嘉學哀平間為光祿大夫詡以父任為郎中世傳魯詩以信行清操知名王莽篡位父子稱盲逃不仕莽世光武即位大司空宋弘薦詡徵為郎除符離長去官後徵為博士建武十一年拜大司農在朝以方正稱十三年卒官賜錢及冢田包咸包咸字子良會稽曲阿人也少為諸生受業長安師事博士右師細君習魯詩論語王莽末去歸鄉里於東海界為赤眉賊所得遂見拘執十餘日咸晨夜誦經自若賊異而遣之因往東海立精舍講授光武即位迺歸鄉里太守黃讜署戶曹史欲召咸入授其子咸曰禮有來學而無往教讜遂遣子師之舉孝廉除郎中建武中入授皇太子論語又為其章句拜諫議大夫侍中右中郎將永平五年遷大鴻臚每進見錫以几杖入屏不趨贊事不名經傳有疑輒遣小黃門就舍即問顯宗以咸有師傅恩而素清苦常特賞賜珍玩束帛奉祿增於諸卿咸皆散與諸生之貧者病篤帝親輦駕臨視八年年七十二卒於官子福拜郎中亦以論語入授和帝魏應魏應字君伯任城人也少好學建武初詣博士受業習魯詩閉門誦習不交僚黨京師稱之後歸為郡吏舉明經除濟陰王文學以疾免官教授山澤中徒眾常數百人永平初為博士再遷侍中十三年遷大鴻臚十八年拜光祿大夫建初四年拜五官中郎將詔入授千乘王伉應經明行修弟子自遠方至著錄數千人肅宗甚重之數進見論難於前特受賞賜時會京師諸儒於白虎觀講論五經同異使應專掌難問侍中淳于恭奏之帝親臨稱制如石渠故事明年出為上黨太守徵拜騎都尉卒於官伏恭伏恭字叔齊琅邪東武人司徒湛之兄子也湛弟黯字稚文以明齊詩改定章句作解說九篇位至光祿勳無子以恭為後恭性孝事所繼母甚謹少傳黯學以任為郎建武四年除劇令視事十三年以惠政公廉聞青州舉為尤異太常試經第一拜博士遷常山太守敦修學校教授不輟由是北州多為伏氏學永平二年代梁松為太僕四年帝臨辟雍於行禮中拜恭為司空儒者以為榮初父黯章句繁多恭迺省減浮辭定為二十萬言在位九年以病乞骸骨罷詔賜千石奉以終其身十五年行幸琅邪引遇如三公儀建初二年冬肅宗行饗禮以恭為三老年九十元和元年卒賜葬顯節陵下子壽官至東郡太守任末任末字叔本蜀郡繁人也少習齊詩遊京師教授十餘年友人董奉德於洛陽病亡末迺躬推鹿車載奉德喪致其墓所由是知名為郡功曹辭以病免後奔師喪於道物故臨命敕兄子造曰必致我尸於師門使死而有知魂靈不慚如其無知得土而已造從之景鸞景鸞字漢伯廣漢梓潼人也少隨師學經涉七州之地能理齊詩施氏易兼受河洛圖緯作易說及詩解文句兼取河洛以類相從名為交集又撰禮內外記號曰禮略又抄風角雜書列其占驗作興道一篇及作月令章句凡所著述五十餘萬言數上書陳救災變之術州郡辟命不就以壽終薛漢薛漢字公子淮陽人也世習韓詩父子以章句著名漢少傳父業尤善說災異讖緯教授常數百人建武初為博士受詔校定圖讖當世言詩者推漢為長永平中為千乘太守政有異迹後坐楚事辭相連下獄死弟子犍為杜撫會稽澹臺敬伯鉅鹿韓伯高最知名杜撫杜撫字叔和犍為武陽人也少有高才受業於薛漢定韓詩章句後歸鄉里教授沈靜樂道舉動必以禮弟子千餘人後為驃騎將軍東平王蒼所辟及蒼就國掾史悉補王官屬未滿歲皆自劾歸時撫為大夫不忍去蒼聞賜車馬財物遣之辟太尉府建初中為公車令數月卒官其所作詩題約義通學者傳之曰杜君法云召馴召馴字伯春九江壽春人也曾祖信臣元帝時為少府父建武中為卷令倜儻不拘小節馴少習韓詩博通書傳以志義聞鄉里號之曰德行恂恂召伯春累仕州郡辟司徒府建初元年稍遷騎都尉侍講肅宗拜左中郎將入授諸王帝嘉其義學恩寵甚崇出拜陳留太守賜刀劍錢物元和二年入為河南尹章和二年代任隗為光祿勳卒於官賜冢塋陪園陵孫休位至青州刺史楊仁楊仁字文義巴郡閬中人也建武中詣師學習韓詩數年歸靜居教授仕郡為功曹舉孝廉除郎太常上仁經中博士仁自以年未五十不應舊科上府讓選顯宗特詔補北宮衛士令引見問當世政迹仁對以寬和任賢抑黜驕戚為先又上便宜十二事皆當世急務帝嘉之賜以縑錢及帝崩時諸馬貴盛各爭欲入宮仁被甲持戟嚴勒門衛莫敢輕進者肅宗既立諸馬共譖仁刻峻帝知其忠愈善之拜什邡令寬惠為政勸課掾史弟子悉令就學其有通明經術者顯之右署或貢之朝由是義學大興墾田千餘頃行兄喪去官後辟司徒桓虞府掾有宋章者貪奢不法仁終不與交言同席時人畏其節後為閬中令卒於官趙曄趙曄字長君會稽山陰人也少嘗為縣吏奉檄迎督郵曄恥於廝役遂棄車馬去到犍為資中詣杜撫受韓詩究竟其術積二十年絕問不還家為發喪制服撫卒迺歸州召補從事不就舉有道卒于家曄著吳越春秋詩細歷神淵蔡邕至會稽讀詩細而歎息以為長於論衡邕還京師傳之學者咸誦習焉時山陽張匡字文通亦習韓詩作章句後舉有道博士徵不就卒於家衛宏衛宏字敬仲東海人也少與河南鄭興俱好古學初九江謝曼卿善毛詩迺為其訓宏從曼卿受學因作毛詩序善得風雅之旨于今傳於世後從大司空杜林更受古文尚書為作訓旨時濟南徐巡師事宏後從林受學亦以儒顯由是古學大興光武以為議郎宏作漢舊儀四篇以載西京雜事又著賦頌誄七首皆傳於世中興後鄭眾賈逵傳毛詩後馬融作毛詩傳鄭玄作毛詩箋前書魯高堂生漢興傳禮十七篇後瑕丘蕭奮以授同郡后蒼蒼授梁人戴德及德兄子聖沛人慶普於是德為大戴禮聖為小戴禮普為慶氏禮三家皆立博士孔安國所獻禮古經五十六篇及周官經六篇前世傳其書未有名家中興以後亦有大小戴博士雖相傳不絕然未有顯於儒林者建武中曹充習慶氏學傳其子襃遂撰漢禮事在襃傳董鈞董鈞字文伯犍為資中人也習慶氏禮事大鴻臚王臨元始中舉明經遷稟犧令病去官建武中舉孝廉辟司徒府鈞博通古今數言政事永平初為博士時草創五郊祭祀及宗廟禮樂威儀章服輒令鈞參議多見從用當世稱為通儒累遷五官中郎將常教授門生百餘人復坐事左轉騎都尉年七十餘卒於家中興鄭眾傳周官經後馬融作周官傳授鄭玄玄作周官注玄本習小戴禮後以古經校之取其義長者故為鄭氏學玄又注小戴所傳禮記四十九篇通為三禮焉前書齊胡母子都傳公羊春秋授東平嬴公嬴公授東海孟卿孟卿授魯人眭孟眭孟授東海嚴彭祖魯人顏安樂彭祖為春秋嚴氏學安樂為春秋顏氏學又瑕丘江公傳穀梁春秋三家皆立博士梁太傅賈誼為春秋左氏傳訓詁授趙人貫公丁恭丁恭字子然山陽東緡人也習公羊嚴氏春秋恭學義精明教授常數百人州郡請召不應建武初為諫議大夫博士封關內侯十一年遷少府諸生自遠方至者著錄數千人當世稱為大儒太常樓望侍中承宮長水校尉樊鯈等皆受業於恭二十年拜侍中祭酒騎都尉與侍中劉昆俱在光武左右每事諮訪焉卒於官周澤周澤字稚都北海安丘人也少習公羊嚴氏春秋隱居教授門徒常數百人建武末辟大司馬府署議曹祭酒數月徵試博士中元元年遷黽池令奉公剋己矜恤孤羸吏人歸愛之永平五年遷右中郎將十年拜太常澤果敢直言數有據爭後北地太守廖信坐貪穢下獄沒入財產顯宗以信臧物班諸廉吏唯澤及光祿勳孫堪大司農常沖特蒙賜焉是時京師翕然在位者咸自勉勵堪字子稚河南緱氏人也明經學有志操清白貞正愛士大夫然一毫未嘗取於人以節介氣勇自行王莽末兵革並起宗族老弱在營保間堪常力戰陷敵無所回避數被創刃宗族賴之郡中咸服其義勇建武中仕郡縣公正廉潔奉祿不及妻子皆以供賓客及為長吏所在有迹為吏人所敬仰喜分明去就嘗為縣令謁府趨步遲緩門亭長譴堪御吏堪便解印綬去不之官後復仕為左馮翊坐御下促急司隸校尉舉奏免官數月徵為侍御史再遷尚書令永平十一年拜光祿勳堪清廉果於從政數有直言多見納用十八年以病乞身為侍中騎都尉卒於官堪行類於澤故京師號曰二稚十二年以澤行司徒事如真澤性簡忽威儀頗失宰相之望數月復為太常清潔循行盡敬宗廟常臥病齋宮其妻哀澤老病闚問所苦澤大怒以妻干犯齋禁遂收送詔獄謝罪當世疑其詭激時人為之語曰生世不諧作太常妻一歲三百六十日三百五十九日齋十八年拜侍中騎都尉後數為三老五更建初中致仕卒於家鍾興鍾興字次文汝南汝陽人也少從少府丁恭受嚴氏春秋恭薦興學行高明光武召見問以經義應對甚明帝善之拜郎中稍遷左中郎將詔令定春秋章句去其復重以授皇太子又使宗室諸侯從興受章句封關內侯興自以無功不敢受爵帝曰生教訓太子及諸王侯非大功邪興曰臣師丁恭於是復封恭而興遂固辭不受爵卒於官甄宇甄宇字長文北海安丘人也清靜少欲習嚴氏春秋教授常數百人建武中為州從事徵拜博士稍遷太子少傅卒於官傳業子普普傳子承承尤篤學未嘗視家事講授常數百人諸儒以承三世傳業莫不歸服之建初中舉孝廉卒於梁相子孫傳學不絕樓望樓望字次子陳留雍丘人也少習嚴氏春秋操節清白有稱鄉閭建武中趙節王栩聞其高名遣使齎玉帛請以為師望不受後仕郡功曹永平初為侍中越騎校尉入講省內十六年遷大司農十八年代周澤為太常建初五年坐事左轉太中大夫後為左中郎將教授不倦世稱儒宗諸生著錄九千餘人年八十永元十三年卒於官門生會葬者數千人儒家以為榮程曾程曾字秀升豫章南昌人也受業長安習嚴氏春秋積十餘年還家講授會稽顧奉等數百人常居門下著書百餘篇皆五經通難又作孟子章句建初三年舉孝廉遷海西令卒於官張玄張玄字君夏河內河陽人也少習顏氏春秋兼通數家法建武初舉明經補弘農文學遷陳倉縣丞清淨無欲專心經書方其講問迺不食終日及有難者輒為張數家之說令擇從所安諸儒皆伏其多通著錄千餘人玄初為縣丞嘗以職事對府不知官曹處吏白門下責之時右扶風琅邪徐業亦大儒也聞玄諸生試引見之與語大驚曰今日相遭真解矇矣遂請上堂難問極日後玄去官舉孝廉除為郎會顏氏博士缺玄試策第一拜為博士居數月諸生上言玄兼說嚴氏冥氏不宜專為顏氏博士光武且令還署未及遷而卒李育李育字元春扶風漆人也少習公羊春秋沈思專精博覽書傳知名太學深為同郡班固所重固奏記薦育於驃騎將軍東平王蒼由是京師貴戚爭往交之州郡請召育到輒辭病去常避地教授門徒數百頗涉獵古學嘗讀左氏傳雖樂文采然謂不得聖人深意以為前世陳元范升之徒更相非折而多引圖讖不據理體於是作難左氏義四十一事建初元年衛尉馬廖舉育方正為議郎後拜博士四年詔與諸儒論五經於白虎觀育以公羊義難賈逵往返皆有理證最為通儒再遷尚書令及馬氏廢育坐為所舉免歸歲餘復徵再遷侍中卒於官何休何休字邵公任城樊人也父豹少府休為人質朴訥口而雅有心思精研六經世儒無及者以列卿子詔拜郎中非其好也辭疾而去不仕州郡進退必以禮太傅陳蕃辟之與參政事蕃敗休坐廢錮迺作春秋公羊解詁覃思不闚門十有七年又注訓孝經論語風角七分皆經緯典謨不與守文同說又以春秋駮漢事六百餘條妙得公羊本意休善歷算與其師博士羊弼追述李育意以難二傳作公羊墨守左氏膏肓穀梁廢疾黨禁解又辟司徒群公表休道術深明宜侍帷幄倖臣不悅之迺拜議郎屢陳忠言再遷諫議大夫年五十四光和五年卒服虔服虔字子慎初名重又名祗後改為虔河南滎陽人也少以清苦建志入太學受業有雅才善著文論作春秋左氏傳解行之至今又以左傳駮何休之所駮漢事六十條舉孝廉稍遷中平末拜九江太守免遭亂行客病卒所著賦碑誄書記連珠九憤凡十餘篇潁容潁容字子嚴陳國長平人也博學多通善春秋左氏師事太尉楊賜郡舉孝廉州辟公車徵皆不就初平中避亂荊州聚徒千餘人劉表以為武陵太守不肯起著春秋左氏條例五萬餘言建安中卒謝該謝該字文儀南陽章陵人也善明春秋左氏為世名儒門徒數百千人建安中河東人樂詳條左氏疑滯數十事以問該皆為通解之名為謝氏釋行於世仕為公車司馬令以父母老託疾去官欲歸鄉里會荊州道斷不得去少府孔融上書薦之曰臣聞高祖創業韓彭之將征討暴亂陸賈叔孫通進說詩書光武中興吳耿佐命范升衛宏修述舊業故能文武並用成長久之計陛下聖德欽明同符二祖勞謙戹運三年迺讙今尚父鷹揚方叔翰飛王師電鷙群凶破殄始有櫜弓臥鼓之次宜得名儒典綜禮紀竊見故公車司馬令謝該體曾史之淑性兼商偃之文學博通群蓺周覽古今物來有應事至不惑清白異行敦悅道訓求之遠近少有疇匹若迺巨骨出吳隼集陳庭黃熊入寢亥有二首非夫洽聞者莫識其端也儁不疑定北闕之前夏侯勝辯常陰之驗然後朝士益重儒術今該實卓然比跡前列間以父母老疾棄官欲歸道路險塞無由自致猥使良才抱璞而逃踰越山河沈淪荊楚所謂往而不反者也後日當更饋樂以釣由余剋像以求傅說豈不煩哉臣愚以為可推錄所在召該令還楚人止孫卿之去國漢朝追匡衡於平原尊儒貴學惜失賢也書奏詔即徵還拜議郎以壽終建武中鄭興陳元傳春秋左氏學時尚書令韓歆上疏欲為左氏立博士范升與歆爭之未決陳元上書訟左氏遂以魏郡李封為左氏博士後群儒蔽固者數廷爭之及封卒光武重違眾議而因不復補許慎許慎字叔重汝南召陵人也性淳篤少博學經籍馬融常推敬之時人為之語曰五經無雙許叔重為郡功曹舉孝廉再遷除洨長卒于家初慎以五經傳說臧否不同於是撰為五經異義又作說文解字十四篇皆傳於世蔡玄蔡玄字叔陵汝南南頓人也學通五經門徒常千人其著錄者萬六千人徵辟並不就順帝特詔徵拜議郎講論五經異同甚合帝意遷侍中出為弘農太守卒官論曰自光武中年以後干戈稍戢專事經學自是其風世篤焉其服儒衣稱先王遊庠序聚橫塾者蓋布之於邦域矣若迺經生所處不遠萬里之路精廬暫建贏糧動有千百其耆名高義開門受徒者編牒不下萬人皆專相傳祖莫或訛雜至有分爭主庭樹朋私里繁其章條穿求崖穴以合一家之說故揚雄曰今之學者非獨為之華藻又從而繡其鞶帨夫書理無二義歸有宗而碩學之徒莫之或徙故通人鄙其固焉又雄所謂譊譊之學各習其師也且觀成名高第終能遠至者蓋亦寡焉而迂滯若是矣然所談者仁義所傳者聖法也故人識君臣父子之綱家知違邪歸正之路自桓靈之間君道秕僻朝綱日陵國隙屢啟自中智以下靡不審其崩離而權彊之臣息其闚盜之謀豪俊之夫屈於鄙生之議者人誦先王言也下畏逆順埶也至如張溫皇甫嵩之徒功定天下之半聲馳四海之表俯仰顧眄則天業可移猶鞠躬昏主之下狼狽折札之命散成兵就繩約而無悔心暨乎剝橈自極人神數盡然後群英乘其運世德終其祚跡衰敝之所由致而能多歷年所者斯豈非學之效乎故先師垂典文襃勵學者之功篤矣切矣不循春秋至迺比於殺逆其將有意乎贊曰斯文未陵亦各有承塗分流別專門並興精疏殊會通閡相徵千載不作淵源誰澄
