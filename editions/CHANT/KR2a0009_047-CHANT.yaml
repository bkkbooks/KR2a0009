body:
  text: 卷四十二光武十王列傳第三十二光武皇帝十一子郭皇后生東海恭王彊沛獻王輔濟南安王康阜陵質王延中山簡王焉許美人生楚王英光烈皇后生顯宗東平憲王蒼廣陵思王荊臨淮懷公衡琅邪孝王京東海恭王彊東海恭王彊建武二年立母郭氏為皇后彊為皇太子十七年而郭后廢彊常慼慼不自安數因左右及諸王陳其懇誠願備蕃國光武不忍遲回者數歲乃許焉十九年封為東海王二十八年就國帝以彊廢不以過去就有禮故優以大封兼食魯郡合二十九縣賜虎賁旄頭宮殿設鍾簴之縣擬於乘輿彊臨之國數上書讓還東海又因皇太子固辭帝不許深嘉歎之以彊章宣示公卿初魯恭王好宮室起靈光殿甚壯麗是時猶存故詔彊都魯中元元年入朝從封岱山因留京師明年春帝崩冬歸國永平元年彊病顯宗遣中常侍鉤盾令將太醫乘驛視疾詔沛王輔濟南王康淮陽王延詣魯及薨臨命上疏謝曰臣蒙恩得備蕃輔特受二國宮室禮樂事事殊異巍巍無量訖無報稱而自修不謹連年被疾為朝廷憂念皇太后陛下哀憐臣彊感動發中數遣使者太醫令丞方伎道術絡驛不絕臣伏惟厚恩不知所言臣內自省視氣力羸劣日夜浸困終不復望見闕庭奉承幃幄孤負重恩銜恨黃泉身既夭命孤弱復為皇太后陛下憂慮誠悲誠慚息政小人也猥當襲臣後必非所以全利之也誠願還東海郡天恩愍哀以臣無男之故處臣三女小國侯此臣宿昔常計今天下新罹大憂惟陛下加供養皇太后數進御餐臣彊困劣言不能盡意願並謝諸王不意永不復相見也天子覽書悲慟從太后出幸津門亭發哀使司空持節護喪事大鴻臚副宗正將作大匠視喪事贈以殊禮升龍旄頭鸞輅龍旂虎賁百人詔楚王英趙王栩北海王興館陶公主比陽公主及京師親戚四姓夫人小侯皆會葬帝追惟彊深執謙儉不欲厚葬以違其意於是特詔中常侍杜岑及東海傅相曰王恭謙好禮以德自終遣送之物務從約省衣足斂形茅車瓦器物減於制以彰王卓爾獨行之志將作大匠留起陵廟彊立十八年年三十四子靖王政嗣政淫欲薄行後中山簡王薨政詣中山會葬私取簡王姬徐妃又盜迎掖庭出女豫州刺史魯相奏請誅政有詔削薛縣立四十四年薨子頃王肅嗣永元十六年封肅弟二十一人皆為列侯肅性謙儉循恭王法度永初中以西羌未平上錢二千萬元初中復上縑萬匹以助國費鄧太后下詔襃納焉立二十三年薨子孝王臻嗣永建二年封臻二弟敏儉為鄉侯臻及弟蒸鄉侯儉並有篤行母卒皆吐血毀背至服練紅兄弟追念初喪父幼小哀禮有闕因復重行喪制臻性敦厚有恩常分租秩賑給諸父昆弟國相籍襃具以狀聞順帝美之制詔大將軍三公大鴻臚曰東海王臻以近蕃之尊少襲王爵膺受多福未知艱難而能克己率禮孝敬自然事親盡愛送終竭哀降儀從士寢苫三年和睦兄弟恤養孤弱至孝純備仁義兼弘朕甚嘉焉夫勸善厲俗為國所先曩者東平孝王敞兄弟行孝喪母如禮有增戶之封詩云永世克孝念茲皇祖今增臻封五千戶儉五百戶光啟土宇以酬厥德立三十一年薨子懿王祇嗣初平四年遣子琬至長安奉章獻帝封琬汶陽侯拜為平原相祇立四十四年薨子羨嗣二十年魏受禪以為崇德侯沛獻王輔沛獻王輔建武十五年封右翊公十七年郭后廢為中山太后故徙輔為中山王并食常山郡二十年復徙封沛王時禁網尚疏諸王皆在京師競修名譽爭禮四方賓客壽光侯劉鯉更始子也得幸於輔鯉怨劉盆子害其父因輔結客報殺盆子兄故式侯恭輔坐繫詔獄三日乃得出自是後諸王賓客多坐刑罰各循法度二十八年就國中元二年封輔子寶為沛侯永平元年封寶弟嘉為僮侯輔矜嚴有法度好經書善說京氏易孝經論語傳及圖讖作五經論時號之曰沛王通論在國謹節終始如一稱為賢王顯宗敬重數加賞賜立四十六年薨子釐王定嗣元和二年封定弟十二人為鄉侯定立十一年薨子節王正嗣元興元年封正弟二人為縣侯正立十四年薨子孝王廣嗣有固疾安帝詔廣祖母周領王家事周明正有法禮漢安中薨順帝下詔曰沛王祖母太夫人周秉心淑慎導王以仁使光祿大夫贈以妃印綬廣立三十五年薨子幽王榮嗣立二十年薨子孝王琮嗣薨子恭王曜嗣薨子契嗣魏受禪以為崇德侯楚王英楚王英以建武十五年封為楚公十七年進爵為王二十八年就國母許氏無寵故英國最貧小三十年以臨淮之取慮須昌二縣益楚國自顯宗為太子時英常獨歸附太子太子特親愛之及即位數受賞賜永平元年特封英舅子許昌為龍舒侯英少時好游俠交通賓客晚節更喜黃老學為浮屠齋戒祭祀八年詔令天下死罪皆入縑贖英遣郎中令奉黃縑白紈三十匹詣國相曰託在蕃輔過惡累積歡喜大恩奉送縑帛以贖愆罪國相以聞詔報曰楚王誦黃老之微言尚浮屠之仁祠潔齋三月與神為誓何嫌何疑當有悔吝其還贖以助伊蒲塞桑門之盛饌因以班示諸國中傅英後遂大交通方士作金龜玉鶴刻文字以為符瑞十三年男子燕廣告英與漁陽王平顏忠等造作圖書有逆謀事下案驗有司奏英招聚姦猾造作圖讖擅相官秩置諸侯王公將軍二千石大逆不道請誅之帝以親親不忍乃廢英徙丹陽涇縣賜湯沐邑五百戶遣大鴻臚持節護送使伎人奴婢工技鼓吹悉從得乘輜軿持兵弩行道射獵極意自娛男女為侯主者食邑如故楚太后勿上璽綬留住楚宮明年英至丹陽自殺立三十三年國除詔遣光祿大夫持節弔祠贈賵如法加賜列侯印綬以諸侯禮葬於涇遣中黃門占護其妻子悉出楚官屬無辭語者制詔許太后曰國家始聞楚事幸其不然既知審實懷用悼灼庶欲宥全王身令保卒天年而王不念顧太后竟不自免此天命也無可奈何太后其保養幼弱勉強飲食諸許願王富貴人情也已詔有司出其有謀者令安田宅於是封燕廣為折姦侯楚獄遂至累年其辭語相連自京師親戚諸侯州郡豪傑及考案吏阿附相陷坐死徙者以千數十五年帝幸彭城見許太后及英妻子於內殿悲泣感動左右建初二年肅宗封英子种楚侯五弟皆為列侯並不得置相臣吏人元和三年許太后薨復遣光祿大夫持節弔祠因留護喪事賻錢五百萬又遣謁者備王官屬迎英喪改葬彭城加王赤綬羽蓋華藻如嗣王儀追爵謚曰楚厲侯章和元年帝幸彭城見英夫人及六子厚加贈賜种後徙封六侯卒子度嗣度卒子拘嗣傳國于後濟南安王康濟南安王康建武十五年封濟南公十七年進爵為王二十八年就國三十年以平原之祝阿安德朝陽平昌隰陰重丘六縣益濟南國中元二年封康子德為東武城侯康在國不循法度交通賓客其後人上書告康招來州郡姦猾漁陽顏忠劉子產等又多遺其繒帛案圖書謀議不軌事下考有司舉奏之顯宗以親親故不忍窮竟其事但削祝阿隰陰東朝陽安德西平昌五縣建初八年肅宗復還所削地康遂多殖財貨大修宮室奴婢至千四百人廄馬千二百匹私田八百頃奢侈恣欲游觀無節永元初國傅何敞上疏諫康曰蓋聞諸侯之義制節謹度然後能保其社稷和其人民大王以骨肉之親享食茅土當施張政令明其典法出入進止宜有期度輿馬臺隸應為科品而今奴婢廄馬皆有千餘增無用之口以自蠶食宮婢閉隔失其天性感亂和氣又多起內第觸犯防禁費以巨萬而功猶未半夫文繁者質荒木勝者人亡皆非所以奉禮承上傳福無窮者也故楚作章華以凶吳興姑蘇而滅景公千駟民無稱焉今數游諸第晨夜無節又非所以遠防未然臨深履薄之法也願大王修恭儉遵古制省奴婢之口減乘馬之數斥私田之富節游觀之宴以禮起居則敞乃敢安心自保惟大王深慮愚言康素敬重敞雖無所嫌啎然終不能改立五十九年薨子簡王錯嗣錯為太子時愛康鼓吹妓女宋閏使醫張尊招之不得錯怒自以劍刺殺尊國相舉奏有詔勿案永元十二年封錯弟七人為列侯錯立六年薨子孝王香嗣永初二年封香弟四人為列侯香篤行好經書初叔父篤有罪不得封西平昌侯昱坐法失侯香乃上書分爵土封篤子丸昱子嵩皆為列侯香立二十年薨無子國絕永建元年順帝立錯子阜陽侯顯為嗣是為釐王立三年薨子悼王廣嗣永建五年封廣弟文為樂城亭侯廣立二十五年永興元年薨無子國除東平憲王蒼東平憲王蒼建武十五年封東平公十七年進爵為王蒼少好經書雅有智思為人美須髯要帶十圍顯宗甚愛重之及即位拜為驃騎將軍置長史掾史員四十人位在三公上永平元年封蒼子二人為縣侯二年以東郡之壽張須昌山陽之南平陽橐湖陵五縣益東平國是時中興三十餘年四方無虞蒼以天下化平宜修禮樂乃與公卿共議定南北郊冠冕車服制度及光武廟登歌八佾舞數語在禮樂輿服志帝每巡狩蒼嘗留鎮侍衛皇太后四年春車駕近出觀覽城第尋聞當遂校獵河內蒼即上書諫曰臣聞時令盛春農事不聚眾興功傳曰田獵不宿食飲不享出入不節則木不曲直此失春令者也臣知車駕今出事從約省所過吏人諷誦甘棠之德雖然動不以禮非所以示四方也惟陛下因行田野循視稼穡消搖仿佯弭節而旋至秋冬乃振威靈整法駕備周衛設羽旄詩云抑抑威儀惟德之隅臣愚不勝憤懣伏自手書乞詣行在所極陳至誠帝覽奏即還宮蒼在朝數載多所隆益而自以至親輔政聲望日重意不自安上疏歸職曰臣蒼疲駑特為陛下慈恩覆護在家被教導之仁升朝蒙爵命之首制書襃美班之四海舉負薪之才升君子之器凡匹夫一介尚不忘簞食之惠況臣居宰相之位同氣之親哉宜當暴骸膏野為百僚先而愚頑之質加以固病誠羞負乘辱汙輔將之位將被詩人三百赤紱之刺今方域晏然要荒無儆將遵上德無為之時也文官猶可併省武職尤不宜建昔象封有鼻不任以政誠由愛深不忍揚其過惡前事之不忘來事之師也自漢興以來宗室子弟無得在公卿位者惟陛下審覽虞帝優養母弟遵承舊典終卒厚恩乞上驃騎將軍印綬退就蕃國願蒙哀憐帝優詔不聽其後數陳乞辭甚懇切五年乃許還國而不聽上將軍印綬以驃騎長史為東平太傅掾為中大夫令史為王家郎加賜錢五千萬布十萬匹六年冬帝幸魯徵蒼從還京師明年皇太后崩既葬蒼乃歸國特賜宮人奴婢五百人布二十五萬匹及珍寶服御器物十一年蒼與諸王朝京師月餘還國帝臨送歸宮悽然懷思乃遣使手詔國中傅曰辭別之後獨坐不樂因就車歸伏軾而吟瞻望永懷實勞我心誦及采菽以增歎息日者問東平王處家何等最樂王言為善最樂其言甚大副是要腹矣今送列侯印十九枚諸王子年五歲已上能趨拜者皆令帶之十五年春行幸東平賜蒼錢千五百萬布四萬匹帝以所作光武本紀示蒼蒼因上光武受命中興頌帝甚善之以其文典雅特令校書郎賈逵為之訓詁肅宗即位尊重恩禮踰於前世諸王莫與為比建初元年地震蒼上便宜其事留中帝報書曰丙寅所上便宜三事朕親自覽讀反覆數周心開目明曠然發矇間吏人奏事亦有此言但明智淺短或謂儻是復慮為非何者災異之降緣政而見今改元之後年飢人流此朕之不德感應所致又冬春旱甚所被尤廣雖內用克責而不知所定得王深策快然意解詩不云乎未見君子憂心忡忡既見君子我心則降思惟嘉謀以次奉行冀蒙福應彰報至德特賜王錢五百萬後帝欲為原陵顯節陵起縣邑蒼聞之遽上疏諫曰伏聞當為二陵起立郭邑臣前頗謂道路之言疑不審實近令從官古霸問涅陽主疾使還乃知詔書已下竊見光武皇帝躬履儉約之行深睹始終之分勤勤懇懇以葬制為言故營建陵地具稱古典詔曰無為山陵陂池裁令流水而已孝明皇帝大孝無違奉承貫行至於自所營創尤為儉省謙德之美於斯為盛臣愚以園邑之興始自彊秦古者丘隴且不欲其著明豈況築郭邑建都郛哉上違先帝聖心下造無益之功虛費國用動搖百姓非所以致和氣祈豐年也又以吉凶俗數言之亦不欲無故繕修丘墓有所興起考之古法則不合稽之時宜則違人求之吉凶復未見其福陛下履有虞之至性追封禰之深思然懼左右過議以累聖心臣蒼誠傷二帝純德之美不暢於無窮也惟蒙哀覽帝從而止自是朝廷每有疑政輒驛使諮問蒼悉心以對皆見納用三年帝饗衛士於南宮因從皇太后周行掖庭池閣乃閱陰太后舊時器服愴然動容乃命留五時衣各一襲及常所御衣合五十篋餘悉分布諸王主及子孫在京師者各有差特賜蒼及琅邪王京書曰中大夫奉使親聞動靜嘉之何已歲月騖過山陵浸遠孤心悽愴如何如何閒饗衛士於南宮因閱視舊時衣物聞於師曰其物存其人亡不言哀而哀自至信矣惟王孝友之德亦豈不然今送光烈皇后假紒帛巾各一及衣一篋可時奉瞻以慰凱風寒泉之思又欲令後生子孫得見先后衣服之製今魯國孔氏尚有仲尼車輿冠履明德盛者光靈遠也其光武皇帝器服中元二年已賦諸國故不復送并遺宛馬一匹血從前髆上小孔中出常聞武帝歌天馬霑赤汗今親見其然也頃反虜尚屯將帥在外憂念遑遑未有間寧願王寶精神加供養苦言至戒望之如渴六年冬蒼上疏求朝明年正月帝許之特賜裝錢千五百萬其餘諸王各千萬帝以蒼冒涉寒露遣謁者賜貂裘及大官食物珍果使大鴻臚竇固持節郊迎帝乃親自循行邸第豫設帷床其錢帛器物無不充備下詔曰禮云伯父歸寧乃國詩云叔父建爾元子敬之至也昔蕭相國加以不名優忠賢也況兼親尊者乎其沛濟南東平中山四王讚皆勿名蒼既至升殿乃拜天子親答之其後諸王入宮輒以輦迎至省閤乃下蒼以受恩過禮情不自寧上疏辭曰臣聞貴有常尊賤有等威卑高列序上下以理陛下至德廣施慈愛骨肉既賜奉朝請咫尺天儀而親屈至尊降禮下臣每賜讌見輒興席改容中宮親拜事過典故臣惶怖戰慄誠不自安每會見踧踖無所措置此非所以章示群下安臣子也帝省奏歎息愈襃貴焉舊典諸王女皆封鄉主乃獨封蒼五女為縣公主三月大鴻臚奏遣諸王歸國帝特留蒼賜以祕書列仙圖道術祕方至八月飲酎畢有司復奏遣蒼乃許之手詔賜蒼曰骨肉天性誠不以遠近為親疏然數見顏色情重昔時念王久勞思得還休欲署大鴻臚奏不忍下筆顧授小黃門中心戀戀惻然不能言於是車駕祖送流涕而訣復賜乘輿服御珍寶輿馬錢布以億萬計蒼還國疾病帝馳遣名醫小黃門侍疾使者冠蓋不絕於道又置驛馬千里傳問起居明年正月薨詔告中傅封上蒼自建武以來章奏及所作書記賦頌七言別字歌詩並集覽焉遣大鴻臚持節五官中郎將副監喪及將作使者凡六人令四姓小侯諸國王主悉會詣東平奔喪賜錢前後一億布九萬匹及葬策曰惟建初八年三月己卯皇帝曰咨王丕顯勤勞王室親受策命昭于前世出作蕃輔克慎明德率禮不越傅聞在下昊天不弔不報上仁俾屏余一人夙夜焭焭靡有所終今詔有司加賜鸞輅乘馬龍旂九旒虎賁百人奉送王行匪我憲王其孰離之魂而有靈保茲寵榮嗚呼哀哉立四十五年子懷王忠嗣明年帝乃分東平國封忠弟尚為任城王餘五人為列侯忠立一年薨子孝王敞嗣元和三年行東巡守幸東平宮帝追感念蒼謂其諸子曰思其人至其鄉其處在其人亡因泣下沾襟遂幸蒼陵為陳虎賁鸞輅龍旂以章顯之祠以太牢親拜祠坐哭泣盡哀賜御劍于陵前初蒼歸國驃騎時吏丁牧周栩以蒼敬賢下士不忍去之遂為王家大夫數十年事祖及孫帝聞皆引見於前既愍其淹滯且欲揚蒼德美即皆擢拜議郎牧至齊相栩上蔡令永元十年封蒼孫梁為矜陽亭侯敞弟六人為列侯敞喪母至孝國相陳珍上其行狀永寧元年鄧太后增邑五千戶又封蒼孫二人為亭侯敞立四十八年薨子頃王端嗣立四十七年薨子凱嗣立四十一年魏受禪以為崇德侯論曰孔子稱貧而無諂富而無驕未若貧而樂富而好禮者也若東平憲王可謂好禮者也若其辭至戚去母后豈欲苟立名行而忘親遺義哉蓋位疑則隙生累近則喪大斯蓋名哲之所為歎息嗚呼遠隙以全忠釋累以成孝夫豈憲王之志哉東海恭王遜而知廢為吳太伯不亦可乎子任城孝王尚任城孝王尚元和元年封食任城亢父樊三縣立十八年薨子貞王安嗣永元十四年封母弟福為桃鄉侯永初四年封福弟亢為當塗鄉侯安性輕易貪吝數微服出入游觀國中取官屬車馬刀劍下至衛士米肉皆不與直元初六年國相行弘奏請廢之安帝不忍以一歲租五分之一贖罪安立十九年薨子節王崇嗣順帝時羌虜數反崇輒上錢帛佐邊費及帝崩復上錢三百萬助山陵用度朝廷嘉而不受立三十一年薨無子國絕延熹四年桓帝立河間孝王子參戶亭侯博為任城王以奉其祀博有孝行喪母服制如禮增封三千戶立十三年薨無子國絕熹平四年靈帝復立河間貞王建子新昌侯佗為任城王奉孝王後立四十六年魏受禪以為崇德侯阜陵質王延阜陵質王延建武十五年封淮陽公十七年進爵為王二十八年就國三十年以汝南之長平西華新陽扶桑四縣益淮陽國延性驕奢而遇下嚴烈永平中有上書告延與姬兄謝弇及姊館陶主壻駙馬都尉韓光招姦猾作圖讖祠祭祝詛事下案驗光弇被殺辭所連及死徙者甚眾有司奏請誅延顯宗以延罪薄於楚王英故特加恩徙為阜陵王食二縣延既徙封數懷怨望建初中復有告延與子男魴造逆謀者有司奏請檻車徵詣廷尉詔獄肅宗下詔曰王前犯大逆罪惡尤深有同周之管蔡漢之淮南經有正義律有明刑先帝不忍親親之恩枉屈大法為王受愆群下莫不惑焉今王曾莫悔悟悖心不移逆謀內潰自子魴發誠非本朝之所樂聞朕惻然傷心不忍致王于理今貶爵為阜陵侯食一縣獲斯辜者侯自取焉於戲誡哉赦魴等罪勿驗使謁者一人監護延國不得與吏人通章和元年行幸九江賜延書與車駕會壽春帝見延及妻子愍然傷之乃下詔曰昔周之爵封千有八百而姬姓居半者所以楨幹王室也朕南巡望淮海意在阜陵遂與侯相見侯志意衰落形體非故瞻省懷感以喜以悲今復侯為阜陵王增封四縣并前為五縣以阜陵下濕徙都壽春加賜錢千萬布萬匹安車一乘夫人諸子賞賜各有差明年入朝立五十一年薨子殤王沖嗣永元二年下詔盡削除前班下延事沖立二年薨無嗣和帝復封沖兄魴是為頃王永元八年封魴弟十二人為鄉亭侯魴立三十年薨子淮王恢嗣延光三年封恢兄弟五人為鄉亭侯恢立十年薨子節王代嗣陽嘉二年封代兄便親為勃遒亭侯代立十四年薨無子國絕建和元年桓帝立勃遒亭侯便親為恢嗣是為恭王立十三年薨子孝王統嗣立八年薨子王赦立建安中薨無子國除廣陵思王荊廣陵思王荊建武十五年封山陽公十七年進爵為王荊性刻急隱害有才能而喜文法光武崩大行在前殿荊哭不哀而作飛書封以方底令蒼頭詐稱東海王彊舅大鴻臚郭況書與彊曰君王無罪猥被斥廢而兄弟至有束縛入牢獄者太后失職別守北宮及至年老遠斥居邊海內深痛觀者鼻酸及太后尸柩在堂洛陽吏以次捕斬賓客至有一家三尸伏堂者痛甚矣今天下有喪弓弩張設甚備間梁松敕虎賁史曰吏以便宜見非勿有所拘封侯難再得也郎官竊悲之為王寒心累息今天下爭欲思刻賊王以求功寧有量邪若歸并二國之眾可聚百萬君王為之主鼓行無前功易於太山破雞子輕於四馬載鴻毛此湯武兵也今年軒轅星有白氣星家及喜事者皆云白氣者喪軒轅女主之位又太白前出西方至午兵當起又太子星色黑至辰日輒變赤夫黑為病赤為兵王努力卒事高祖起亭長陛下興白水何況於王陛下長子故副主哉上以求天下事必舉下以雪除沈沒之恥報死母之讎精誠所加金石為開當為秋霜無為檻羊雖欲為檻羊又可得乎竊見諸相工言王貴天子法也人主崩亡閭閻之伍尚為盜賊欲有所望何況王邪夫受命之君天之所立不可謀也今新帝人之所置彊者為右願君王為高祖陛下所志無為扶蘇將閭叫呼天也彊得書惶怖即執其使封書上之顯宗以荊母弟祕其事遣荊出止河南宮時西羌反荊不得志冀天下因羌驚動有變私迎能為星者與謀議帝聞之乃徙封荊廣陵王遣之國其後荊復呼相工謂曰我貌類先帝先帝三十得天下我今亦三十可起兵未相者詣吏告之荊惶恐自繫獄帝復加恩不考極其事下詔不得臣屬吏人唯食租如故使相中尉謹宿衛之荊猶不改其後使巫祭祀祝詛有司舉奏請誅之荊自殺立二十九年死帝憐傷之賜謚曰思王十四年封荊子元壽為廣陵侯服王璽綬食荊故國六縣又封元壽弟三人為鄉侯明年帝東巡狩徵元壽兄弟會東平宮班賜御服器物又取皇子輿馬悉以與之建初七年肅宗詔元壽兄弟與諸王俱朝京師元壽卒子商嗣商卒子條嗣傳國于後臨淮懷公衡臨淮懷公衡建武十五年立未及進爵為王而薨無子國除中山簡王焉中山簡王焉建武十五年封左翊公十七年進爵為王焉以郭太后少子故獨留京師三十年徙封中山王永平二年冬諸王來會辟雍事畢歸蕃詔焉與俱就國從以虎賁官騎焉上疏辭讓顯宗報曰凡諸侯出境必備左右故夾谷之會司馬以從今五國各官騎百人稱娖前行皆北軍胡騎便兵善射弓不空發中必決眥夫有文事必有武備所以重蕃職也王其勿辭帝以焉郭太后偏愛特加恩寵獨得往來京師十五年焉姬韓序有過焉縊殺之國相舉奏坐削安險縣元和中肅宗復以安險還中山立五十二年永元二年薨自中興至和帝時皇子始封薨者皆賻錢三千萬布三萬匹嗣王薨賻錢千萬布萬匹是時竇太后臨朝竇憲兄弟擅權太后及憲等東海出也故睦於焉而重於禮加賻錢一億詔濟南東海二王皆會大為修冢塋開神道平夷吏人冢墓以千數作者萬餘人發常山鉅鹿涿郡柏黃腸雜木三郡不能備復調餘州郡工徒及送致者數千人凡徵發搖動六州十八郡制度餘國莫及子夷王憲嗣永元四年封憲弟十一人為列侯憲立二十二年薨子孝王弘嗣永寧元年封弘二弟為亭侯弘立二十八年薨子穆王暢嗣永和六年封暢弟荊為南鄉侯暢立三十四年薨子節王稚嗣無子國除琅邪孝王京琅邪孝王京建武十五年封琅邪公十七年進爵為王京性恭孝好經學顯宗尤愛幸賞賜恩寵殊異莫與為比永平二年以泰山之蓋南武陽華東萊之昌陽盧鄉東牟六縣益琅邪五年乃就國光烈皇后崩帝悉以太后遺金寶財物賜京京都莒好修宮室窮極伎巧殿館壁帶皆飾以金銀數上詩賦頌德帝嘉美下之史官京國中有城陽景王祠吏人奉祠神數下言宮中多不便利京上書願徙宮開陽以華蓋南武陽厚丘贛榆五縣易東海之開陽臨沂肅宗許之立三十一年薨葬東海即丘廣平亭有詔割亭屬開陽子夷王宇嗣建初七年封宇弟十三人為列侯元和元年封孝王孫二人為列侯宇立二十年薨子恭王壽嗣永初元年封壽弟八人為列侯立十七年薨子貞王尊嗣延光二年封尊弟四人為鄉侯尊立十八年薨子安王據嗣永和五年封據弟三人為鄉侯據立四十七年薨子順王容嗣初平元年遣弟邈至長安奉章貢獻帝以邈為九江太守封陽都侯容立八年薨國絕初邈至長安盛稱東郡太守曹操忠誠於帝操以此德於邈建安十一年復立容子熙為王在位十一年坐謀欲過江被誅國除贊曰光武十子胙土分王沛獻尊節楚英流放延既怨詛荊亦觖望濟南陰謀琅邪驕宕中山臨淮無聞夭喪東平好善辭中委相謙謙恭王實惟三讓
