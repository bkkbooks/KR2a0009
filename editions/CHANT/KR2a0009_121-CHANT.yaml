body:
  text: 右兗州陳留陳留郡十七城戶十七萬七千五百二十九口八十六萬九千四百三十三陳留有鳴鴈亭浚儀本大梁尉氏雍丘本杞國襄邑有滑亭有承匡城外黃有葵丘聚齊桓公會此城中有曲棘里有繁陽城小黃東昏濟陽平丘有臨濟亭田儋死此有匡有黃池亭封丘有桐牢亭或曰古蟲牢酸棗長垣侯國有匡城有蒲城有祭城己吾有大棘鄉有首鄉考城故菑章帝更名故屬梁圉故屬淮陽有高陽亭扶溝故屬淮陽東郡東郡十五城戶十三萬六千八十八口六十萬三千三百九十三濮陽古昆吾國春秋時曰濮有鹹城或曰古鹹國有清丘有鉏城燕本南燕國有雍鄉有胙城古胙國有平陽亭有瓦亭有桃城白馬有韋鄉頓丘東阿有清亭東武陽濕水出范有秦亭臨邑有泲廟博平聊城有夷儀聚有聶城發干樂平侯國故清章帝更名陽平侯國有莘亭有罔成城衛公國本觀故國姚姓光武更名有河牧城有竿城穀城春秋時小穀有雟下聚東平東平國七城戶七萬九千一十二口四十四萬八千二百七十無鹽本宿國任姓有章城東平陸六國時曰平陸有闞亭有堂陽亭富成章壽張春秋曰良漢曰壽良光武改曰壽張有堂聚故聚屬東郡須昌故屬東郡有致密城古中都有陽榖城寧陽故屬泰山任城任城國三城戶三萬六千四百四十二口十九萬四千一百五十六任城本任國有桃聚亢父樊泰山泰山郡十二城戶八千九百二十九口四十三萬七千三百一十一奉高有明堂武帝造博有泰山廟岱山在西北有龜山有龍鄉城梁甫侯國有菟裘聚鉅平侯國有亭禪山有陽關亭嬴有鐵山荏侯國萊蕪有原山潘水出蓋沂水出南武陽侯國有顓臾城南城故屬東海有東陽城費侯國故屬東海有祊亭有台亭牟故國濟北濟北國五城戶四萬五千六百八十九口二十三萬五千八百九十七盧有平陰城有防門有光里有景茲山有敖山有清亭有長城至東海蛇丘有遂鄉有下讙亭有鑄鄉亭成本國荏平本屬東郡剛山陽山陽郡十城戶十萬九千八百九十八口六十萬六千九十一昌邑刺史治有梁丘城有甲父亭東緡春秋時曰緡鉅野有大野澤高平侯國故櫜章帝更名有茅鄉城湖陸故湖陵章帝更名南平陽侯國有漆亭有閭丘亭方與有武唐亭魯侯觀魚臺有泥母亭或曰古甯母瑕丘金鄉防東濟陰濟陰郡十一城戶十三萬三千七百一十五口六十五萬七千五百五十四定陶本曹國古陶堯所居有三鬷亭冤句有煮棗城成陽有堯冢靈臺有雷澤乘氏侯國有泗水有鹿城鄉句陽有垂亭鄄城離狐故屬東郡廩丘故屬東郡有高魚城有運城單父侯國故屬山陽成武故屬山陽有郜城己氏故屬梁右兗州右兗州刺史部郡國八縣邑公侯國八十東海東海郡十三城戶十四萬八千七百八十四口七十萬六千四百一十六郯本國刺史治蘭陵有次室亭戚胊有鐵有伊盧鄉襄賁昌慮有藍鄉承陰平利城合鄉祝其有羽山春秋時曰祝其夾谷地厚丘贛榆本屬琅邪建初五年復琅邪琅邪國十三城戶二萬八百四口五十七萬九百六十七開陽故屬東海建初五年屬東武琅邪東莞有鄆亭有邳鄉有公來山或曰古浮來西海諸莒本國故屬城陽有鐵有崢嶸谷東安故屬城陽陽都故屬城陽有牟臺臨沂故屬東海有叢亭即丘侯國故屬東海春秋曰祝丘繒侯國故屬東海有概亭姑幕彭城彭城國八城戶八萬六千一百七十口四十九萬三千二十七彭城有鐵武原傅陽有柤水呂留梧菑丘廣戚故屬沛廣陵廣陵郡十一城戶八萬三千九百七口四十一萬百九十廣陵有東陵亭江都有江水祠高郵平安淩故屬泗水東陽故屬臨淮有長洲澤吳王濞太倉在此射陽故屬臨淮鹽瀆故屬臨淮輿侯國故屬臨淮堂邑故屬臨淮有鐵春秋時曰堂海西故屬東海下邳下邳國十七城戶十三萬六千三百八十九口六十一萬一千八十三下邳本屬東海葛嶧山本嶧陽山有鐵徐本國有樓亭或曰古蔞林僮侯國雎陵下相淮陰淮浦盱台高山潘旌淮陵取慮有蒲姑陂東成曲陽侯國故屬東海司吾侯國故屬東海良成故屬東海春秋時曰良夏丘故屬沛右徐州刺史部郡國五縣邑侯國六十二
