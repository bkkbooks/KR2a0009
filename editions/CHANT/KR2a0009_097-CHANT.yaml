body:
  text: 卷八十七西羌傳第七十七西羌之本出自三苗姜姓之別也其國近南岳及舜流四凶徙之三危河關之西南羌地是也濱於賜支至乎河首綿地千里賜支者禹貢所謂析支者也南接蜀漢徼外蠻夷西北接鄯善車師諸國所居無常依隨水草地少五穀以產牧為業其俗氏族無定或以父名母姓為種號十二世後相與婚姻父沒則妻後母兄亡則納釐嫂故國無鰥寡種類繁熾不立君臣無相長一強則分種為酋豪弱則為人附落更相抄暴以力為雄殺人償死無它禁令其兵長在山谷短於平地不能持久而果於觸突以戰死為吉利病終為不祥堪耐寒苦同之禽獸雖婦人產子亦不避風雪性堅剛勇猛得西方金行之氣焉王政修則賓服德教失則寇亂昔夏后氏太康失國四夷背叛及后相即位乃征畎夷七年然後來賓至于后泄始加爵命由是服從后桀之亂畎夷入居邠岐之閒成湯既興伐而攘之及殷室中衰諸夷皆叛至于武丁征西戎鬼方三年乃克故其詩曰自彼氐羌莫敢不來王及武乙暴虐犬戎寇邊周古公踰梁山而避于岐下及子季歷遂伐西落鬼戎太丁之時季歷復伐燕京之戎戎人大敗周師後二年周人克余無之戎於是太丁命季歷為牧師自是之後更伐始呼翳徒之戎皆克之及文王為西伯西有昆夷之患北有獫狁之難遂攘戎狄而戍之莫不賓服乃率西戎征殷之叛國以事紂及武王伐商羌髳率師會于牧野至穆王時戎狄不貢王乃西征犬戎獲其五王又得四白鹿四白狼王遂遷戎于太原夷王衰弱荒服不朝乃命虢公率六師伐太原之戎至于俞泉獲馬千匹厲王無道戎狄寇掠乃入犬丘殺秦仲之族王命伐戎不克及宣王立四年使秦仲伐戎為戎所殺王乃召秦仲子莊公與兵七千人伐戎破之由是少卻後二十七年王遣兵伐太原戎不克後五年王伐條戎奔戎王師敗績後二年晉人敗北戎于汾隰戎人滅姜侯之邑明年王征申戎破之後十年幽王命伯士伐六濟之戎軍敗伯士死焉其年戎圍犬丘虜秦襄公之兄伯父時幽王昏虐四夷交侵遂廢申后而立襃姒申侯怒與戎寇周殺幽王於酈山周乃東遷洛邑秦襄公攻戎救周後二年邢侯大破北戎及平王之末周遂陵遲戎逼諸夏自隴山以東及乎伊洛往往有戎於是渭首有狄豲邽冀之戎涇北有義渠之戎洛川有大荔之戎渭南有驪戎伊洛閒有楊拒泉皋之戎潁首以西有蠻氏之戎當春秋時閒在中國與諸夏盟會魯莊公伐秦取邽冀之戎後十餘歲晉滅驪戎是時伊洛戎強東侵曹魯後十九年遂入王城於是秦晉伐戎以救周後二年又寇京師齊桓公徵諸侯戍周後九年陸渾戎自瓜州遷于伊川允姓戎遷于渭汭東及轘轅在河南山北者號曰陰戎陰戎之種遂以滋廣晉文公欲修霸業乃賂戎狄通道以匡王室秦穆公得戎人由余遂霸西戎開地千里及晉悼公又使魏絳和諸戎復修霸業是時楚晉強盛威服諸戎陸渾伊洛陰戎事晉而蠻氏從楚後陸渾叛晉晉令荀吳滅之後四十四年楚執蠻氏而盡囚其人是時義渠大荔最強築城數十皆自稱王至周貞王八年秦厲公滅大荔取其地趙亦滅代戎即北戎也韓魏復共稍并伊洛陰戎滅之其遺脫者皆逃走西踰汧隴自是中國無戎寇唯餘義渠種焉至貞王二十五年秦伐義渠虜其王後十四年義渠侵秦至渭陰後百許年義渠敗秦師于洛後四年義渠國亂秦惠王遣庶長操將兵定之義渠遂臣於秦後八年秦伐義渠取郁郅後二年義渠敗秦師于李伯明年秦伐義渠取徒涇二十五城及昭王立義渠王朝秦遂與昭王母宣太后通生二子至王赧四十三年宣太后誘殺義渠王於甘泉宮因起兵滅之始置隴西北地上郡焉戎本無君長夏后氏末及商周之際或從侯伯征伐有功天子爵之以為藩服春秋時陸渾蠻氏戎稱子戰國世大荔義渠稱王及其衰亡餘種皆反舊為酋豪云羌無弋爰劍羌無弋爰劍者秦厲公時為秦所拘執以為奴隸不知爰劍何戎之別也後得亡歸而秦人追之急藏於巖穴中得免羌人云爰劍初藏穴中秦人焚之有景象如虎為其蔽火得以不死既出又與劓女遇於野遂成夫婦女恥其狀被髮覆面羌人因以為俗遂俱亡入三河閒諸羌見爰劍被焚不死怪其神共畏事之推以為豪河湟閒少五穀多禽獸以射獵為事爰劍教之田畜遂見敬信廬落種人依之者日益眾羌人謂奴為無弋以爰劍嘗為奴隸故因名之其後世世為豪至爰劍曾孫忍時秦獻公初立欲復穆公之迹兵臨渭首滅狄豲戎忍季父卬畏秦之威將其種人附落而南出賜支河曲西數千里與眾羌絕遠不復交通其後子孫分別各自為種任隨所之或為氂牛種越雟羌是也或為白馬種廣漢羌是也或為參狼種武都羌是也忍及弟舞獨留湟中並多娶妻婦忍生九子為九種舞生十七子為十七種羌之興盛從此起矣及忍子研立時秦孝公雄強威服羌戎孝公使太子駟率戎狄九十二國朝周顯王研至豪健故羌中號其後為研種及秦始皇時務并六國以諸侯為事兵不西行故種人得以繁息秦既兼天下使蒙恬將兵略地西逐諸戎北卻眾狄築長城以界之眾羌不復南度至于漢興匈奴冒頓兵強破東胡走月氐威震百蠻臣服諸羌景帝時研種留何率種人求守隴西塞於是徙留何等於狄道安故至臨洮氐道羌道縣及武帝征伐四夷開地廣境北卻匈奴西逐諸羌乃度河湟築令居塞初開河西列置四郡通道玉門隔絕羌胡使南北不得交關於是障塞亭燧出長城外數千里時先零羌與封養牢姐種解仇結盟與匈奴通合兵十餘萬共攻令居安故遂圍枹罕漢遣將軍李息郎中令徐自為將兵十萬人擊平之始置護羌校尉持節統領焉羌乃去湟中依西海鹽池左右漢遂因山為塞河西地空稍徙人以實之至宣帝時遣光祿大夫義渠安國覘行諸羌其先零種豪言願得度湟水逐人所不田處以為畜牧安國以事奏聞後將軍趙充國以為不可聽後因緣前言遂度湟水郡縣不能禁至元康三年先零乃與諸羌大共盟誓將欲寇邊帝聞復使安國將兵觀之安國至召先零豪四十餘人斬之因放兵擊其種斬首千餘級於是諸羌怨怒遂寇金城乃遣趙充國與諸將將兵六萬人擊破平之至研十三世孫燒當立元帝時彡姐等七種羌寇隴西遣右將軍馮奉世擊破降之從爰劍種五世至研研最豪健自後以研為種號十三世至燒當復豪健其子孫更以燒當為種號自彡姐羌降之後數十年四夷賓服邊塞無事至王莽輔政欲燿威德以懷遠為名乃令譯諷旨諸羌使共獻西海之地初開以為郡築五縣邊海亭燧相望焉滇良滇良者燒當之玄孫也時王莽末四夷內侵及莽敗眾羌遂還據西海為寇更始赤眉之際羌遂放縱寇金城隴西隗囂雖擁兵而不能討之乃就慰納因發其眾與漢相拒建武九年隗囂死司徒掾班彪上言今涼州部皆有降羌羌胡被髮左衽而與漢人雜處習俗既異言語不通數為小吏黠人所見侵奪窮恚無聊故致反叛夫蠻夷寇亂皆為此也舊制益州部置蠻夷騎都尉幽州部置領烏桓校尉涼州部置護羌校尉皆持節領護理其怨結歲時循行問所疾苦又數遣使驛通動靜使塞外羌夷為吏耳目州郡因此可得儆備今宜復如舊以明威防光武從之即以牛邯為護羌校尉持節如舊及邯卒而職省十年先零豪與諸種相結復寇金城隴西遣中郎將來歙等擊之大破事已具歙傳十一年夏先零種復寇臨洮隴西太守馬援破降之後悉歸服徙置天水隴西扶風三郡明年武都參狼羌反援又破降之事已具援傳自燒當至滇良世居河北大允谷種小人貧而先零卑湳並皆強富數侵犯之滇良父子積見陵易憤怒而素有恩信於種中於是集會附落及諸雜種乃從大榆入掩擊先零卑湳大破之殺三千人掠取財畜奪居其地大榆中由是始強滇良子滇吾立中元元年武都參狼羌反殺掠吏人太守與戰不勝隴西太守劉盱遣從事辛都監軍掾李苞將五千人赴武都與羌戰斬其酋豪首虜千餘人時武都兵亦更破之斬首千餘級餘悉降時滇吾附落轉盛常雄諸羌每欲侵邊者滇吾轉教以方略為渠帥二年秋燒當羌滇吾與弟滇岸率步騎五千寇隴西塞劉盱遣兵於枹罕擊之不能克又戰於允街為羌所敗殺五百餘人於是守塞諸羌皆復相率為寇遣謁者張鴻領諸郡兵擊之戰於允吾唐谷軍敗鴻及隴西長史田颯皆沒又天水兵為牢姐種所敗於白石死者千餘人時燒何豪有婦人比銅鉗者年百餘歲多智算為種人所信向皆從取計策時為盧水胡所擊比銅鉗乃將其眾來依郡縣種人頗有犯法者臨羌長收繫比銅鉗而誅殺其種六七百人顯宗憐之乃下詔曰昔桓公伐戎而無仁惠故春秋貶曰齊人今國家無德恩不及遠羸弱何辜而當并命夫長平之暴非帝者之功咎由太守長吏妄加殘戮比銅鉗尚生者所在致醫藥養視令招其種人若欲歸故地者厚遣送之其小種若束手自詣欲效功者皆除其罪若有逆謀為吏所捕而獄狀未斷悉以賜有功者永平元年復遣中郎將竇固捕虜將軍馬武等擊滇吾於西邯大破之事已具武等傳滇吾遠引去餘悉散降徙七千口置三輔以謁者竇林領護羌校尉居狄道林為諸羌所信而滇岸遂詣林降林為下吏所欺謬奏上滇岸以為大豪承制封為歸義侯加號漢大都尉明年滇吾復降林復奏其第一豪與俱詣闕獻見帝怪一種兩豪疑其非實以事詰林林辭窘乃偽對曰滇岸即滇吾隴西語不正焉耳帝窮驗知之怒而免林官會涼州刺史又奏林臧罪遂下獄死謁者郭襄代領校尉事到隴西聞涼州羌盛還詣闕抵罪於是復省校尉官滇吾子東吾立以父降漢乃入居塞內謹愿自守而諸弟迷吾等數為寇盜肅宗建初元年安夷縣吏略妻卑湳種羌婦吏為其夫所殺安夷長宗延追之出塞種人恐見誅遂共殺延而與勒姐及吾良二種相結為寇隴西太守孫純遣從事李睦及金城兵會和羅谷與卑湳等戰斬首虜數百人復拜故度遼將軍吳棠領護羌校尉居安夷二年夏迷吾遂與諸眾聚兵欲叛出塞金城太守郝崇追之戰於荔谷崇兵大敗崇輕騎得脫死者二千餘人於是諸種及屬國盧水胡悉與相應吳棠不能制坐徵免武威太守傅育代為校尉移居臨羌迷吾又與封養種豪布橋等五萬餘人共寇隴西漢陽於是遣行車騎將軍馬防長水校尉耿恭副討破之於是臨洮索西迷吾等悉降防乃築索西城徙隴西南部都尉戍之悉復諸亭候至元和三年迷吾復與弟號吾諸雜種反叛秋號吾先輕入寇隴西界郡督烽掾李章追之生得號吾將詣郡號吾曰獨殺我無損於羌誠得生歸必悉罷兵不復犯塞隴西太守張紆權宜放遣羌即為解散各歸故地迷吾退居河北歸義城傅育不欲失信伐之乃募人鬭諸羌胡羌胡不肯遂復叛出塞更依迷吾章和元年育上請發隴西張掖酒泉各五千人諸郡太守將之育自領漢陽金城五千人合二萬兵與諸郡剋期擊之令隴西兵據河南張掖酒泉兵遮其西並未及會育軍獨進迷吾聞之徙廬落去育選精騎三千窮追之夜至建威南三兜谷去虜數里須旦擊之不設備迷吾乃伏兵三百人夜突育營營中驚壞散走育下馬手戰殺十餘人而死死者八百八十人及諸郡兵到羌遂引去育北地人也顯宗初為臨羌長與捕虜將軍馬武等擊羌滇吾功冠諸軍及在武威威聲聞於匈奴食祿數十年秩奉盡贍給知友妻子不免操井臼肅宗下詔追襃美之封其子毅為明進侯七百戶以隴西太守張紆代為校尉將萬人屯臨羌迷吾既殺傅育狃忕邊利章和元年復與諸種步騎七千人入金城塞張紆遣從事司馬防將千餘騎及金城兵會戰於木乘谷迷吾兵敗走因譯使欲降紆納之遂將種人詣臨羌縣紆設兵大會施毒酒中羌飲醉紆因自擊伏兵起誅殺酋豪八百餘人斬迷吾等五人頭以祭育冢復放兵擊在山谷閒者斬首四百餘人得生口二千餘人迷吾子迷唐及其種人向塞號哭與燒何當煎當闐等相結以子女及金銀娉納諸種解仇交質將五千人寇隴西塞太守寇盱與戰於白石迷唐不利引還大小榆谷北招屬國諸胡會集附落種眾熾盛張紆不能討永元元年紆坐徵以張掖太守鄧訓代為校尉稍以賞賂離閒之由是諸種少解東吾子東號立是時號吾將其種人降校尉鄧訓遣兵擊迷唐迷唐去大小榆谷徙居頗巖谷和帝永元四年訓病卒蜀郡太守聶尚代為校尉尚見前人累征不克欲以文德服之乃遣驛使招呼迷唐使還居大小榆谷迷唐既還遣祖母卑缺詣尚尚自送至塞下為設祖道令譯田氾等五人護送至廬落迷唐因而反叛遂與諸種共生屠裂氾等以血盟詛復寇金城塞五年尚坐徵免居延都尉貫友代為校尉友以迷唐難用德懷終於叛亂乃遣驛使搆離諸種誘以財貨由是解散友乃遣兵出塞攻迷唐於大小榆谷獲首虜八百餘人收麥數萬斛遂夾逢留大河築城塢作大航造河橋欲渡河擊迷唐迷唐乃率部落遠依賜支河曲至八年友病卒漢陽太守史充代為校尉充至遂發湟中羌胡出塞擊迷唐而羌迎敗充兵殺數百人明年充坐徵代郡太守吳祉代為校尉其秋迷唐率八千人寇隴西殺數百人乘勝深入脅塞內諸種羌共為寇盜眾羌復悉與相應合步騎三萬人擊破隴西兵殺大夏長遣行征西將軍劉尚越騎校尉趙代副將北軍五營黎陽雍營三輔積射及邊兵羌胡三萬人討之尚屯狄道代屯枹罕尚遣司馬寇盱監諸郡兵四面並會迷唐懼棄老弱奔入臨洮南尚等追至高山迷唐窮迫率其精強大戰盱斬虜千餘人得牛馬羊萬餘頭迷唐引去漢兵死傷亦多不能復追乃還入塞明年尚代並坐畏懦徵下獄免謁者王信領尚營屯枹罕謁者耿譚領代營屯白石譚乃設購賞諸種頗來內附迷唐恐乃請降信譚遂受降罷兵遣迷唐詣闕其餘種人不滿二千飢窘不立入居金城和帝令迷唐將其種人還大小榆谷迷唐以為漢作河橋兵來無常故地不可復居辭以種人飢餓不肯遠出吳祉等乃多賜迷唐金帛令糴穀市畜促使出塞種人更懷猜驚十二年遂復背叛乃脅將湟中諸胡寇鈔而去王信耿譚吳祉皆坐徵以酒泉太守周鮪代為校尉明年迷唐復還賜支河曲初累姐種附漢迷唐怨之遂擊殺其酋豪由是與諸種為讎黨援益疏其秋迷唐復將兵向塞周鮪與金城太守侯霸及諸郡兵屬國湟中月氏諸胡隴西牢姐羌合三萬人出塞至允川與迷唐戰周鮪還營自守唯侯霸兵陷陳斬首四百餘級羌眾折傷種人瓦解降者六千餘口分徙漢陽安定隴西迷唐遂弱其種眾不滿千人遠踰賜支河首依發羌居明年周鮪坐畏懦徵侯霸代為校尉安定降羌燒何種脅諸羌數百人反叛郡兵擊滅之悉沒入弱口為奴婢時西海及大小榆谷左右無復羌寇隃麋相曹鳳上言西戎為害前世所患臣不能紀古且以近事言之自建武以來其犯法者常從燒當種起所以然者以其居大小榆谷土地肥美又近塞內諸種易以為非難以攻伐南得鍾存以廣其眾北阻大河因以為固又有西海魚鹽之利緣山濱水以廣田蓄故能彊大常雄諸種恃其權勇招誘羌胡今者衰困黨援壞沮親屬離叛餘勝兵者不過數百逃亡棲竄遠依發羌臣愚以為宜及此時建復西海郡縣規固二榆廣設屯田隔塞羌胡交關之路遏絕狂狡窺欲之源又植穀富邊省委輸之役國家可以無西方之憂於是拜鳳為金城西部都尉將徙士屯龍耆後金城長史上官鴻上開置歸義建威屯田二十七部侯霸復上置東西邯屯田五部增留逢二部帝皆從之列屯夾河合三十四部其功垂立至永初中諸羌叛乃罷迷唐失眾病死有一子來降戶不滿數千東號子麻奴東號子麻奴立初隨父降居安定時諸降羌布在郡縣皆為吏人豪右所徭役積以愁怨安帝永初元年夏遣騎都尉王弘發金城隴西漢陽羌數百千騎征西域弘迫促發遣群羌懼遠屯不還行到酒泉多有散叛諸郡各發兵徼遮或覆其廬落於是勒姐當煎大豪東岸等愈驚遂同時奔潰麻奴兄弟因此遂與種人俱西出塞先零別種滇零與鍾羌諸種大為寇掠斷隴道時羌歸附既久無復器甲或持竹竿木枝以代戈矛或負版案以為楯或執銅鏡以象兵郡縣畏懦不能制冬遣車騎將軍鄧騭征西校尉任尚副將五營及三河三輔汝南南陽潁川太原上黨兵合五萬人屯漢陽明年春諸郡兵未及至鍾羌數千人先擊敗騭軍於冀西殺千餘人校尉侯霸坐眾羌反叛徵免以西域都護段禧代為校尉其冬騭使任尚及從事中郎司馬鈞率諸郡兵與滇零等數萬人戰於平襄尚軍大敗死者八千餘人於是滇零等自稱天子於北地招集武都參狼上郡西河諸雜種眾遂大盛東犯趙魏南入益州殺漢中太守董炳遂寇鈔三輔斷隴道湟中諸縣粟石萬錢百姓死亡不可勝數朝廷不能制而轉運難劇遂詔騭還師留任尚屯漢陽為諸軍節度朝廷以鄧太后故迎拜騭為大將軍封任尚樂亭侯食邑三百戶三年春復遣騎都尉任仁督諸郡屯兵救三輔仁戰每不利眾羌乘勝漢兵數挫當煎勒姐種攻沒破羌縣鍾羌又沒臨洮縣生得隴西南部都尉明年春滇零遣人寇襃中燔燒郵亭大掠百姓於是漢中太守鄭勤移屯襃中軍營久出無功有廢農桑乃詔任尚將吏兵還屯長安罷遣南陽潁川汝南吏士置京兆虎牙都尉於長安扶風都尉於雍如西京三輔都尉故事時羌復攻襃中鄭勤欲擊之主簿段崇諫以為虜乘勝鋒不可當宜堅守待之勤不從出戰大敗死者三千餘人段崇及門下史王宗原展以身扞刃與勤俱死於是徙金城郡居襄武任仁戰累敗而兵士放縱檻車徵詣廷尉詔獄死段禧病卒復以前校尉侯霸代之遂移居張掖五年春任尚坐無功徵免羌遂入寇河東至河內百姓相驚多奔南度河使北軍中候朱寵將五營士屯孟津詔魏郡趙國常山中山繕作塢候六百一十六所羌既轉盛而二千石令長多內郡人並無戰守意皆爭上徙郡縣以避寇難朝廷從之遂移隴西徙襄武安定徙美陽北地徙池陽上郡徙衙百姓戀土不樂去舊遂乃刈其禾稼發徹室屋夷營壁破積聚時連旱蝗飢荒而驅蹙劫略流離分散隨道死亡或棄捐老弱或為人僕妾喪其太半復以任尚為侍御史擊眾羌於上黨羊頭山破之誘殺降者二百餘人乃罷孟津屯其秋漢陽人杜琦及弟季貢同郡王信等與羌通謀聚眾入上邽城琦自稱安漢將軍於是詔購募得琦首者封列侯賜錢百萬羌胡斬琦者賜金百斤銀二百斤漢陽太守趙博遣刺客杜習刺殺琦封習討姦侯賜錢百萬而杜季貢王信等將其眾據樗泉營侍御史唐喜領諸郡兵討破之斬王信等六百餘級沒入妻子五百餘人收金銀綵帛一億已上杜季貢亡從滇零六年任尚復坐徵免滇零死子零昌代立年尚幼少同種狼莫為其計策以杜季貢為將軍別居丁奚城七年夏騎都尉馬賢與侯霸掩擊零昌別部牢羌於安定首虜千人得驢騾駱駝馬牛羊二萬餘頭以畀得者元初元年春遣兵屯河內通谷衝要三十三所皆作塢壁設鳴鼓零昌遣兵寇雍城又號多與當煎勒姐大豪共脅諸種分兵鈔掠武都漢中巴郡板楯蠻將兵救之漢中五官掾程信率壯士與蠻共擊破之號多退走還斷隴道與零昌通謀侯霸馬賢將湟中吏人及降羌胡於枹罕擊之斬首二百餘級涼州刺史皮楊擊羌於狄道大敗死者八百餘人楊坐徵免侯霸病卒漢陽太守龐參代為校尉參以恩信招誘之二年春號多等率眾七千餘人詣參降遣詣闕賜號多侯印綬遣之參始還居令居通河西道而零昌種眾復分寇益州遣中郎將尹就將南陽兵因發益部諸郡屯兵擊零昌黨呂叔都等至秋蜀人陳省羅橫應募刺殺叔都皆封侯賜錢又使屯騎校尉班雄屯三輔遣左馮翊司馬鈞行征西將軍督右扶風仲光安定太守杜恢北地太守盛包京兆虎牙都尉耿溥右扶風都尉皇甫旗等合八千餘人又龐參將羌胡兵七千餘人與鈞分道並北擊零昌參兵至勇士東為杜季貢所敗於是引退鈞等獨進攻拔丁奚城大克獲杜季貢率眾偽逃鈞令光恢包等收羌禾稼光等違鈞節度散兵深入羌乃設伏要擊之鈞在城中怒而不救光等並沒死者三千餘人鈞乃遁還坐徵自殺龐參以失期軍敗抵罪以馬賢代領校尉事後遣任尚為中郎將將羽林緹騎五營子弟三千五百人代班雄屯三輔尚臨行懷令虞詡說尚曰使君頻奉國命討逐寇賊三州屯兵二十餘萬人棄農桑疲苦徭役而未有功效勞費日滋若此出不克誠為使君危之尚曰憂惶久矣不知所如詡曰兵法弱不攻強走不逐飛自然之勢也今虜皆馬騎日行數百來如風雨去如絕弦以步追之勢不相及所以曠而無功也為使君計者莫如罷諸郡兵各令出錢數千二十人共市一馬如此可捨甲冑馳輕兵以萬騎之眾逐數千之虜追尾掩截其道自窮便人利事大功立矣尚大喜即上言用其計乃遣輕騎鈔擊杜季貢於丁奚城斬首四百餘級獲牛馬羊數千頭明年夏度遼將軍鄧遵率南單于及左鹿蠡王須沈萬騎擊零昌於靈州斬首八百餘級封須沈為破虜侯金印紫綬賜金帛各有差任尚遣兵擊破先零羌於丁奚城秋築馮翊北界候塢五百所任尚又遣假司馬募陷陳士擊零昌於北地殺其妻子得牛馬羊二萬頭燒其廬落斬首七百餘級得僭號文書及所沒諸將印綬四年春尚遣當闐種羌榆鬼等五人刺殺杜季貢封榆鬼為破羌侯其夏尹就以不能定益州坐徵抵罪以益州刺史張喬領尹就軍屯招誘叛羌稍稍降散秋任尚復募效功種號封刺殺零昌封號封為羌王冬任尚將諸郡兵與馬賢並進北地擊狼莫賢先至安定青石岸狼莫逆擊敗之會尚兵到高平因合勢俱進狼莫等引退乃轉營迫之至北地相持六十餘日戰於富平上河大破之斬首五千級還得所掠人男女千餘人牛馬驢羊駱駝十餘萬頭狼莫逃走於是西河虔人種羌萬一千口詣鄧遵降五年鄧遵募上郡全無種羌雕何等刺殺狼莫賜雕何為羌侯封遵武陽侯三千戶遵以太后從弟故爵封優大任尚與遵爭功又詐增首級受賕枉法臧千萬已上檻車徵棄市沒入田廬奴婢財物自零昌狼莫死後諸羌瓦解三輔益州無復寇儆自羌叛十餘年閒兵連師老不暫寧息軍旅之費轉運委輸用二百四十餘億府帑空竭延及內郡邊民死者不可勝數并涼二州遂至虛耗六年春勒姐種與隴西種羌號良等通謀欲反馬賢逆擊之於安故斬號良及種人數百級皆降散永寧元年春上郡沈種羌五千餘人復寇張掖其夏馬賢將萬人擊之初戰失利死者數百人明日復戰破之斬首千八百級獲生口千餘人馬牛羊以萬數餘虜悉降時當煎種大豪飢五等以賢兵在張掖乃乘虛寇金城賢還軍追之出塞斬首數千級而還燒當燒何種聞賢軍還率三千餘人復寇張掖殺長吏初飢五同種大豪盧忽忍良等千餘戶別留允街而首尾兩端建光元年春馬賢率兵召盧忽斬之因放兵擊其種人首虜二千餘人掠馬牛羊十萬頭忍良等皆亡出塞璽書封賢安亭侯食邑千戶忍良等以麻奴兄弟本燒當世嫡而賢撫恤不至常有怨心秋遂相結共脅將諸種步騎三千人寇湟中攻金城諸縣賢將先零種赴擊之戰於牧苑兵敗死者四百餘人麻奴等又敗武威張掖郡兵於令居因脅將先零沈氐諸種四千餘戶緣山西走寇武威賢追到鸞鳥招引之諸種降者數千麻奴南還湟中延光元年春賢追到湟中麻奴出塞度河賢復追擊戰破之種眾散遁詣涼州刺史宗漢降麻奴等孤弱飢困其年冬將種眾三千餘戶詣漢陽太守耿种降安帝假金印紫綬賜金銀綵繒各有差是歲虔人種羌與上郡胡反攻穀羅城度遼將軍耿夔將諸郡兵及烏桓騎赴擊破之三年秋隴西郡始還狄道焉麻奴弟犀苦立順帝永建元年隴西鍾羌反校尉馬賢將七千餘人擊之戰於臨洮斬首千餘級皆率種人降進封賢都鄉侯自是涼州無事至四年尚書僕射虞詡上疏曰臣聞子孫以奉祖為孝君上以安民為明此高宗周宣所以上配湯武也禹貢雍州之域厥田惟上且沃野千里穀稼殷積又有龜茲鹽池以為民利水草豐美土宜產牧牛馬銜尾群羊塞道北阻山河乘阸據險因渠以溉水舂河漕用功省少而軍糧饒足故孝武皇帝及光武築朔方開西河置上郡皆為此也而遭元元無妄之災眾羌內潰郡縣兵荒二十餘年夫棄沃壤之饒損自然之財不可謂利離河山之阻守無險之處難以為固今三郡未復園陵單外而公卿選懦容頭過身張解設難但計所費不圖其安宜開聖德考行所長書奏帝乃復三郡使謁者郭璜督促徙者各歸舊縣繕城郭置候驛既而激河浚渠為屯田省內郡費歲一億計遂令安定北地上郡及隴西金城常儲穀粟令周數年馬賢以犀苦兄弟數背叛因繫質於令居其冬賢坐徵免右扶風韓皓代為校尉明年犀苦詣皓自言求歸故地皓復不遣因轉湟中屯田置兩河閒以逼群羌皓復坐徵張掖太守馬續代為校尉兩河閒羌以屯田近之恐必見圖乃解仇詛盟各自儆備續欲先示恩信乃上移屯田還湟中羌意乃安至陽嘉元年以湟中地廣更增置屯田五部并為十部二年夏復置隴西南部都尉如舊制三年鍾羌良封等復寇隴西漢陽詔拜前校尉馬賢為謁者鎮撫諸種馬續遣兵擊良封斬首數百級四年馬賢以發隴西吏士及羌胡兵擊殺良封斬首千八百級獲馬牛羊五萬餘頭良封親屬並詣賢降賢復進擊鍾羌且昌且昌等率諸種十餘萬詣梁州刺史降永和元年馬續遷度遼將軍復以馬賢代為校尉初武都塞上白馬羌攻破屯官反叛連年二年春廣漢屬國都尉擊破之斬首六百餘級馬賢又擊斬其渠帥飢指累祖等三百級於是隴右復平明年冬燒當種那離等三千餘騎寇金城塞馬賢將兵赴擊斬首四百餘級獲馬千四百匹那離等復西招羌胡殺傷吏民四年馬賢將湟中義從兵及羌胡萬餘騎掩擊那離等斬之獲首虜千二百餘級得馬騾羊十萬餘頭徵賢為弘農太守以來機為并州刺史劉秉為涼州刺史並當之職大將軍梁商謂機等曰戎狄荒服蠻夷要服言其荒忽無常而統領之道亦無常法臨事制宜略依其俗今三君素性疾惡欲分明白黑孔子曰人而不仁疾之已甚亂也況戎狄乎其務安羌胡防其大故忍其小過機等天性虐刻遂不能從到州之日多所擾發五年夏且凍傅難種羌等遂反叛攻金城與西塞及湟中雜種羌胡大寇三輔殺害長吏機秉並坐徵於是發京師近郡及諸州兵討之拜馬賢為征西將軍以騎都尉耿叔副將左右羽林五校士及諸州郡兵十萬人屯漢陽又於扶風漢陽隴道作塢壁三百所置屯兵以保聚百姓且凍分遣種人寇武都燒隴關掠苑馬六年春馬賢將五六千騎擊之到射姑山賢軍敗賢及二子皆戰歿順帝愍之賜布三千匹穀千斛封賢孫光為舞陽亭侯租入歲百萬遣侍御史督錄征西營兵存恤死傷於是東西羌遂大合鞏唐種三千餘騎寇隴西又燒園陵掠關中殺傷長吏郃陽令任頵追擊戰死遣中郎將龐浚募勇士千五百人頓美陽為涼州援武威太守趙沖追擊鞏唐羌斬首四百餘級得馬牛羊驢萬八千餘頭羌二千餘人降詔沖督河西四郡兵為節度罕種羌千餘寇北地北地太守賈福與趙沖擊之不利秋諸種八九千騎寇武威涼部震恐於是復徙安定居扶風北地居馮翊遣行車騎將軍執金吾張喬將左右羽林五校士及河內南陽汝南兵萬五千屯三輔漢安元年以趙沖為護羌校尉沖招懷叛羌罕種乃率邑落五千餘戶詣沖降於是罷張喬軍屯唯燒何種三千餘落據參䜌北界三年夏趙沖與漢陽太守張貢掩擊之斬首千五百級得牛羊驢十八萬頭冬沖擊諸種斬首四千餘級詔沖一子為郎沖復追擊於阿陽斬首八百級於是諸種前後三萬餘戶詣涼州刺史降建康元年春護羌從事馬玄遂為諸羌所誘將羌眾亡出塞領護羌校尉衛瑤追擊玄等斬首八百餘級得牛馬羊二十餘萬頭趙沖復追叛羌到建威鸇陰河軍渡未竟所將降胡六百餘人叛走沖將數百人追之遇羌伏兵與戰沒沖雖身死而前後多所斬獲羌由是衰耗永嘉元年封沖子愷義陽亭侯以漢陽太守張貢代為校尉左馮翊梁並稍以恩信招誘之於是離湳狐奴等五萬餘戶詣並降隴右復平並大將軍冀之宗人封為鄠侯邑二千戶自永和羌叛至乎是歲十餘年閒費用八十餘億諸將多斷盜牢稟私自潤入皆以珍寶貨賂左右上下放縱不恤軍事士卒不得其死者白骨相望於野桓帝建和二年白馬羌寇廣漢屬國殺長吏是時西羌及湟中胡復畔為寇益州刺史率板楯蠻討破之斬首招降二十萬人永壽元年校尉張貢卒以前南陽太守第五訪代為校尉甚有威惠西垂無事延熹二年訪卒以中郎將段熲代為校尉時燒當八種寇隴右熲擊大破之四年零吾復與先零及上郡沈氐牢姐諸種并力寇并涼及三輔會段熲坐事徵以濟南相胡閎代為校尉閎無威略羌遂陸梁覆沒營塢寇患轉盛中郎將皇甫規擊破之五年沈氐諸種復寇張掖酒泉皇甫規招之皆降事已具規傳鳥吾種復寇漢陽隴西金城諸郡兵共擊破之各還降附至冬滇那等五六千人復攻武威張掖酒泉燒民廬舍六年隴西太守孫羌擊破之斬首溺死三千餘人胡閎疾復以段熲為校尉永康元年東羌岸尾等脅同種連寇三輔中郎將張奐追破斬之事已具奐傳當煎羌寇武威破羌將軍段熲復破滅之餘悉降散事已具熲傳靈帝建寧三年燒當羌奉使貢獻中平元年北地降羌先零種因黃巾大亂乃與湟中羌義從胡北宮伯玉等反寇隴右事已具董卓傳興平元年馮翊降羌反寇諸縣郭氾樊稠擊破之斬首數千級自爰劍後子孫支分凡百五十種其九種在賜支河首以西及在蜀漢徼北前史不載口數唯參狼在武都勝兵數千人其五十二種衰少不能自立分散為附落或絕滅無後或引而遠去其八十九種唯鍾最強勝兵十餘萬其餘大者萬餘人小者數千人更相鈔盜盛衰無常無慮順帝時勝兵合可二十萬人發羌唐旄等絕遠未嘗往來氂牛白馬羌在蜀漢其種別名號皆不可紀知也建武十三年廣漢塞外白馬羌豪樓登等率種人五千餘戶內屬光武封樓登為歸義君長至和帝永元六年蜀郡徼外大牂夷種羌豪造頭等率種人五十餘萬口內屬拜造頭為邑君長賜印綬至安帝永初元年蜀郡徼外羌龍橋等六種萬七千二百八十口內屬明年蜀郡徼外羌薄申等八種三萬六千九百口復舉土內屬冬廣漢塞外參狼種羌二千四百口復來內屬桓帝建和二年白馬羌千餘人寇廣漢屬國殺長吏益州刺史率板楯蠻討破之湟中月氏胡湟中月氏胡其先大月氏之別也舊在張掖酒泉地月氏王為匈奴冒頓所殺餘種分散西踰葱領其羸弱者南入山阻依諸羌居止遂與共婚姻及驃騎將軍霍去病破匈奴取西河地開湟中於是月氏來降與漢人錯居雖依附縣官而首施兩端其從漢兵戰鬭隨埶強弱被服飲食言語略與羌同亦以父名母姓為種其大種有七勝兵合九千餘人分在湟中及令居又數百戶在張掖號曰義從胡中平元年與北宮伯玉等反殺護羌校尉冷徵金城太守陳懿遂寇亂隴右焉論曰羌戎之患自三代尚矣漢世方之匈奴頗為衰寡而中興以後邊難漸大朝規失綏御之和戎帥騫然諾之信其內屬者或倥偬於豪右之手或屈折於奴僕之勤塞候時清則憤怒而思禍桴革暫動則屬鞬以鳥驚故永初之閒群種蜂起遂解仇嫌結盟詛招引山豪轉相嘯聚揭木為兵負柴為械轂馬揚埃陸梁於三輔建號稱制恣雎於北地東犯趙魏之郊南入漢蜀之鄙塞湟中斷隴道燒陵園剽城市傷敗踵係羽書日聞并涼之士特衝殘斃壯悍則委身於兵場女婦則徽纆而為虜發冢露胔死生塗炭自西戎作逆未有陵斥上國若斯其熾也和熹以女君親政威不外接朝議憚兵力之損情存苟安或以邊州難援宜見捐棄或懼疽食浸淫莫知所限謀夫回遑猛士疑慮遂徙西河四郡之人雜寓關右之縣發屋伐樹塞其戀土之心燔破胔積以防顧還之思於是諸將鄧騭任尚馬賢皇甫規張奐之徒爭設雄規更奉征討之命徵兵會眾以圖其隙馳騁東西奔救首尾搖動數州之境日耗千金之資至於假人增賦借奉侯王引金錢縑綵之珍徵糧粟鹽鐵之積所以賂遺購賞轉輸勞來之費前後數十巨萬或梟剋酋健摧破附落降俘載路牛羊滿山軍書未奏其利害而離叛之狀已言矣故得不酬失功不半勞暴露師徒連年而無所勝官人屈竭烈士憤喪段熲受事專掌軍任資山西之猛性練戎俗之態情窮武思盡飆銳以事之被羽前登身當百死之陳蒙沒冰雪經履千折之道始殄西種卒定東寇若乃陷擊之所殲傷追走之所崩籍頭顱斷落於萬丈之山支革叛解於重崖之上不可校計其能穿竄草石自脫於鋒鏃者百不一二而張奐盛稱戎狄一氣所生不宜誅盡流血汙野傷和致妖是何言之迂乎羌雖外患實深內疾若攻之不根是養疾疴於心腹也惜哉寇敵略定矣而漢祚亦衰焉嗚呼昔先王疆理九土判別畿荒知夷貊殊性難以道御故斥遠諸華薄其貢職唯與辭要而已若二漢御戎之方失其本矣何則先零侵境趙充國遷之內地煎當作寇馬文淵徙之三輔貪其暫安之埶信其馴服之情計日用之權宜忘經世之遠略豈夫識微者之為乎故微子垂泣於象箸辛有浩歎於伊川也贊曰金行氣剛播生西羌氐豪分種遂用殷彊虔劉隴北假僭涇陽朝勞內謀兵憊外攘
