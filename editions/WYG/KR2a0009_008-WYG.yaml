  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2a0009_WYG_008-1a, image: WYG0252/WYG0252-0150a.png}
body:
  text: 後漢書卷八宋宣城太守范煜撰唐章懷太子賢注靈帝紀第八孝靈皇帝諱宏謚法曰亂而不損曰靈伏侯古今注曰宏之字曰大肅宗𤣥孫也曾祖河間孝王開祖淑父萇世封解瀆亭侯淑以河間王子封為解瀆亭侯萇襲父封故言世封也解瀆亭在今定州義豐縣東北也帝襲侯爵母董夫人桓帝崩無子皇太后與父城門校尉竇武定䇿禁中使守光禄大夫劉儵持節將左右羽林至河間奉迎續漢志曰桓帝之初京都童謡曰城上烏尾畢逋公為吏子為徒一徒死百乘車車班班入河間河間奼女工數錢以錢爲室金為堂石上慊慊舂黄粱梁下有懸鼓我欲擊之丞卿怒城上烏者䖏髙獨食不與下共謂人主多聚斂也公為吏子為徒者言蠻夷叛逆父既為軍吏子弟又為卒徒往擊之也一徒死百乘車者言前一人討胡既死矣後又遣百乘車往也車班班者言乗輿班班入河間迎靈帝也奼女數錢言帝既立其母永樂太后好聚金以為堂室也石上慊慊者言太后雖積金錢猶慊慊常若不足使人舂黄粱而食之也我欲擊之者言太后敎帝使賣官受錢天下忠篤之士怨望欲擊鼓求見卿懸鼔者復怒而止我也建寜元年春正月壬午城門校尉竇武爲大將軍己亥帝到夏門亭東觀記曰到夏門外萬夀亭羣臣謁見使竇武持節以王青蓋車迎入殿中庚子卽皇帝位年十二改元建寜以前太尉陳蕃爲太傅與竇武及司徒胡廣叅録尚書事使護𦍑校尉叚熲討先零羌二月辛酉葬孝桓皇帝于宣陵在洛陽東南三十里髙十二丈周三百歩廟曰威宗庚午謁髙廟辛未謁世祖廟大赦天下賜民爵及帛各有差叚熲大破先零羌於逢義山山在今原州髙平縣逢一作途閏月甲午追尊皇祖爲孝元皇夫人夏氏爲孝元皇后考爲孝仁皇夫人董氏爲愼園貴人愼園在今瀛州樂夀縣東南俗呼爲二皇陵夏四月戊辰太尉周景薨司空宣酆免長樂衛尉王暢爲司空五月丁未朔日有食之詔公卿以下各上封事及郡國守相舉有道之士各一人又故刺史二千石清髙有遺恵爲衆所歸者皆詣公車太中大夫劉矩爲太尉六月京師雨水秋七月破羌將軍叚熲復破先零羌於涇陽涇陽縣名屬安定故城在原州涼縣南也八月司空王暢免宗正劉寵爲司空九月丁亥中常侍曹節矯詔誅太傅陳蕃大將軍竇武及尚書令尹勲侍中劉瑜屯騎校尉馮述皆夷其族皇太后遷于南宫太后與竇武宻謀欲誅曹節今武等既誅故太后被遷司徒胡廣爲太傅錄尚書事司空劉寵爲司徒大鴻臚許栩爲司空冬十月甲辰晦日有食之令天下繫囚罪未决入縑贖各有差十一月太尉劉矩免太僕沛國聞人襲為太尉姓聞人名襲字定卿風俗通曰少正卯魯之聞人其後氏焉十二月鮮卑及濊貊宼幽拜二州二年春正月丁丑大赦天下三月乙巳尊慎園董貴人爲孝仁皇后續漢志曰置永樂宫儀如桓帝尊匽貴人之禮夏四月癸巳大風雨雹詔公卿以下各上封事五月太尉聞人襲罷司空許栩免六月司徒劉寵為太尉太常許訓爲司徒訓字季師平輿人太僕長沙劉囂爲司空囂字重寜秋七月破羌將軍段熲大破先零羌於射虎塞外谷東羌悉平九月江夏蠻叛州郡討平之丹陽山越賊圍太守陳夤夤擊破之冬十月丁亥中常侍侯覽諷有司奏前司空虞放太僕杜密長樂少府李膺司隸校尉朱瑀潁川太守巴肅沛相荀翌河内太守魏朗山陽太守翟超皆爲鉤黨下獄鉤謂相牽引也事見劉淑李膺傳死者百餘人妻子徙邊諸附從者錮及五屬五屬謂五服内親也制詔州郡大舉鉤黨於是天下豪傑及儒學行義者一切結爲黨人續漢志曰建寜中京都長者皆以葦方笥爲裝具時有識者竊言葦笥郡國讞篋也後黨人禁錮㑹赦有疑者皆讞廷尉人名悉入方笥中庚子晦日有食之十一月太尉劉寵免太僕郭禧爲太尉字公房扶溝人也禧音僖鮮卑宼幷州是嵗長樂太僕曹節為車騎將軍百餘日罷三年春正月河内人婦食夫河南人夫食婦三月丙寅晦日有食之夏四月太尉郭禧罷太中大夫聞人襲為太尉秋七月司空劉囂罷八月大鴻臚橋𤣥爲司空九月執金吾董寵下獄死冬濟南賊起攻東平陵東平陵縣名屬濟南郡故城在今濟州東鬱林烏滸民相率内屬烏滸南方夷號也廣州記曰其俗食人以鼻飲水口中進噉如故四年春正月甲子帝加元服大赦天下賜公卿以下各有差唯黨人不赦二月癸夘地震海水溢河水清三月辛酉朔日有食之太尉聞人襲免太僕李咸爲太尉字元卓汝南西平人詔公卿至六百石各上封事大疫使中謁者廵行致醫藥司徒許訓免司空橋𤣥為司徒夏四月太常來豔爲司空豔字季徳南陽新野人五月河東地裂雨雹山水暴出秋七月司空来豔免癸丑立貴人宋氏爲皇后執金吾宋酆女前年入掖庭為貴人司徒橋𤣥免太常宗俱爲司空俱字伯儷南陽安定人前司空許栩為司徒冬鮮卑宼幷州熹平元年春三月壬戌太傅胡廣薨夏五月己巳大赦天下改元熹平長樂太僕侯覽有罪自殺六月京師雨水癸巳皇太后竇氏崩秋七月甲寅葬桓思皇后宦官諷司隸校尉叚熲捕繫太學諸生千餘人時有人書朱雀闕云天下大亂公卿皆尸祿故捕之事見宦者傳冬十月勃海王悝被誣謀反丁𤣥悝及妻子皆自殺十一月㑹稽人許生自稱越王宼郡縣東觀記曰㑹稽許昭聚衆自稱大將軍立父生為越王攻破郡縣遣揚州刺史臧旻丹陽太守陳夤討破之十二月司徒許栩罷大鴻臚袁隗爲司徒鮮卑宼幷州是嵗甘陵王恢薨二年春正月大疫使使者廵行致醫藥丁丑司空宗俱薨二月壬午大赦天下以光祿勲楊賜為司空三月太尉李咸免夏五月以司隸校尉叚熲為太尉沛相師遷坐誣罔國王下獄死國王陳愍王寵也臣賢案陳敬王傳云國相師遷又東觀記曰陳行相師遷奏沛相魏愔前爲陳相與陳王寵交通明魏愔為沛相此言師遷為沛相蓋誤也六月北海地震東莱北海海水溢續漢志曰時出大魚二枚各長八九丈髙二丈餘秋七月司空楊賜免太常潁川唐珍為司空冬十二月日南徼外國重譯貢獻太尉段熲罷鮮卑宼幽幷二州癸酉晦日有食之三年春正月夫餘國遣使貢獻二月己巳大赦天下太常陳耽爲太尉耽字漢公東海人也三月中山王暢薨無子國除夏六月封河間王利子康爲濟南王奉孝仁皇祀秋洛水溢冬十月癸丑令天下繫囚罪未决入縑贖十一月揚州刺史臧旻率丹陽太守陳夤大破許生於㑹稽斬之任城王博薨十二月鮮卑宼北地北地太守夏育追擊破之鮮卑又宼幷州司空唐珍罷永樂少府許訓爲司空四年春三月詔諸儒正五經文字刻石立于太學門外封河間王建孫佗為任城王建桓帝弟夏四月郡國七大水五月丁夘大赦天下延園陵災成帝陵也在今武陽縣西遣使者持節告祠延陵鮮卑宼幽州六月𢎞農三輔螟遣守宫令之鹽監穿渠為民興利前漢地理志及續漢郡國志並無鹽今蒲州安邑縣西南有鹽城劉攽曰注鹽城當作鹽池耳及無鹽字下當有一監字說文監字訓為鹽池然則注家案地志求鹽所在則無之二漢志不謂池為監也而據今所見則有池云令郡國遇災者減田租之半其傷害什四以上勿收責冬十月丁巳令天下繫囚罪未决入縑贖拜冲帝母虞羙人爲憲園貴人順帝虞羙人也憲園在洛陽東北質帝母陳夫人爲渤海孝王妃渤海孝王鴻之夫人也改平凖為中凖漢官儀曰平凖令一人秩六百石也使宦者為令列於内署自是諸署悉以閹人爲丞令五年夏四月癸亥大赦天下益州郡夷叛太守李顒討平之復崇髙山名爲嵩髙山前書武帝祠中嶽改嵩髙為崇髙東觀記曰使中郎将堂谿典請雨因上言改之名為嵩髙山大雩使侍御史行詔獄亭部理寃枉原輕繫休囚徒五月太尉陳耽罷司空許訓為太尉閏月永昌太守曹鸞坐訟黨人棄市訟謂申理之也其言切直帝怒檻車送槐里獄掠殺之也詔黨人門生故吏父兄子弟在位者皆免官禁錮六月壬戌太常南陽劉逸字大逈安衆人為司空秋七月太尉許訓罷光禄勲劉寛為太尉冬十月壬午御殿後槐樹自㧞倒豎司徒袁隗罷十一月丙戌光禄大夫楊賜為司徒十二月甘陵王定薨試太學生年六十以上百餘人除郎中太子舍人至王家郎郡國文學吏漢官儀曰太子舍人王家郎中並秩二百石無員是嵗鮮卑宼幽州沛國言黄龍見譙六年春正月辛巳大赦天下二月南宫平城門及武庫東垣屋自壊平城門洛陽城南門也蔡邕曰平城門正陽之門與宫連郊祀法駕所從出門之最尊者武庫禁兵所藏東垣庫之外障易傳曰小人在位厥妖城門自壊夏四月大旱七州蝗鮮卑宼三邊謂東西與北邉市賈民為宣陵孝子者數十人皆除太子舍人秋七月司空劉逸免衛尉陳球為司空八月遣破鮮卑中郎将田晏出雲中使匈奴中郎將臧旻與南單于出鴈門護烏桓校尉夏育出髙栁並伐鮮卑晏等大敗冬十月癸丑朔日有食之太尉劉寛免帝臨辟雍辛丑京師地震辛亥令天下繫囚罪未决入縑贖十一月司空陳球免十二月甲寅太常河南孟􅖢爲太尉􅖢字叔逹音乙六反庚辰司徒楊賜免太常陳耽為司空鮮卑宼遼西永安太僕王旻下獄死永安宫之太僕也光和元年春正月合浦交阯烏滸蠻叛招引九眞日南民攻沒郡縣太尉孟􅖢罷二月辛亥朔日有食之癸丑光祿勳陳國袁滂為司徒滂字公喜己未地震始置鴻都門學生鴻都門名也於内置學時其中諸生皆勑州郡三公舉召能為尺牘辭賦及工書鳥篆者相課試至千人焉三月辛丑大赦天下改元光和太常常山張顥為太尉顥字智眀捜神記曰顥為梁相新雨後有鵲飛翔近地令人擿之墮地化為圓石顥命椎破得一金印文曰忠孝侯印夏四月丙辰地震侍中寺雌雞化為雄司空陳耽免太常来豔為司空五月壬午有白衣人入徳陽殿門亡去不獲東觀記曰白衣人言梁伯夏敎我上殿與中黄門桓賢語因忽不見六月丁丑有黑氣墮所御温徳殿庭中東觀記曰墮所御温明殿庭中如車蓋隆起奮迅五色有頭體長十餘丈形貌似龍秋七月壬子青虹見御坐玉堂後殿庭中洛陽宫殿名南宫有玉堂前後殿據楊賜傳云墮嘉徳殿前八月有星孛于天市九月太尉張顥罷太常陳球為太尉司空来豔薨冬十月屯騎校尉袁逢爲司空皇后宋氏廢后父執金吾酆下獄死丙子晦日有食之十一月太尉陳球免十二月丁巳光祿大夫橋𤣥為太尉是嵗鮮卑宼酒泉京師馬生人京房易傳曰諸侯相伐厥妖馬生人初開西邸賣官自關内侯虎賁羽林入錢各有差山陽公載記曰時賣官二千石二千萬四百石四百萬其以徳次應選者半之或三分之一於西園立庫以貯之私令左右賣公卿公千萬卿五百萬二年春大疫使常侍中謁者廵行致醫藥三月司徒袁滂免大鴻臚劉郃為司徒郃字季承乙丑太尉橋𤣥罷太中大夫段熲為太尉京兆地震司空袁逢罷太常張濟為司空濟字元江細陽人夏四月甲戍朔日有食之辛巳中常侍王甫及太尉叚熲並下獄死丁酉大赦天下諸黨人禁錮小功以下皆除之時上禄長和浮上言黨人錮及五族有乖典訓帝従之東平王端薨五月衛尉劉寛為太尉秋七月使匈奴中郎將張修有罪下獄死時張修擅斬單于呼微更立羌渠為單于故坐死冬十月甲申司徒劉郃永樂少府陳球衛尉陽球歩兵校尉劉納謀誅宦者事泄皆下獄死巴郡板楯蠻叛遣御史中丞蕭瑗督益州刺史討之不剋十二月光禄勲楊賜為司徒鮮卑宼幽幷二州是嵗河間王利薨洛陽女子生兒兩頭四臂京房易傳曰二首下不一也厥妖人生两頭三年春正月癸酉大赦天下二月公府駐駕廡自壞公府三公府也駐駕停車䖏也廡廊屋也音無禹反續漢志云南北四十餘間壞三月梁王元薨夏四月江夏蠻叛六月詔公卿舉能通尚書毛詩左氏榖梁春秋各一人悉除議郎秋表是地震涌水出表是縣屬酒泉郡故城在今甘州張掖縣西北八月令繫囚罪未决入縑贖各有差冬閏月有星孛于狼弧二星名也鮮卑宼幽幷二州十二月己巳立貴人何氏為皇后南陽宛人也車騎將軍何貢女是歳作罼圭靈昆苑罼圭苑有二東單圭苑周一千五百歩中有魚梁臺西罼圭苑周三千三百歩並在洛陽宣平門外四年春正月初置騄驥廐丞領受郡國調馬騄驥善馬也調謂徴發也豪右辜𣙜馬一匹至二百萬前書音義曰辜障也𣙜専也謂障餘人賣買而自取其利二月郡國上芝英草夏四月庚子大赦天下交阯刺史朱儁討交阯合浦烏滸蠻破之六月庚辰雨雹續漢書曰雹大如雞子秋七月河南言鳯皇見新城羣鳥隨之賜新城令及三老力田帛各有差九月庚寅朔日有食之太尉劉寛免衛尉許􅖢為太尉閏月辛酉北宫東掖庭永巷署災永巷宫中署名也漢官儀曰令一人宦者為之秩六百石掌宫婢侍使劉攽曰注侍使案使當作史即給尚書郎侍史之類司徒楊賜罷冬十月太常陳耽為司徒鮮卑宼幽幷二州是歲帝作列肆於後宫使諸采女販賣更相盗竊爭鬭帝著商估服飲宴為樂又於西園弄狗著進賢冠帶綬三禮圖曰進賢冠文官服之前髙七寸後髙三寸長八寸續漢志曰靈帝寵用便嬖子弟轉相汲引賣關内侯直五百萬令長强者貪如豺狼弱者畧不類物實狗而冠也昌邑王見狗冠方山冠龔遂曰王之左右皆狗而冠又駕四驢帝躬自操轡驅馳周旋京師轉相放效續漢志曰驢者乃服重致逺上下山谷野人之所用耳何有帝王君子而驂駕之乎天意若曰國且大亂賢愚倒植凡執政者皆如驢也五年春正月辛未大赦天下二月大疫三月司徒陳耽免夏四月旱太常袁隗爲司徒五月庚申永樂宫署災續漢志曰徳陽前殿西北入門内永樂太后宫署災秋七月有星孛于太微巴郡板楯蠻詣太守曹謙降癸酉令繫囚罪未决入縑贖八月起四百尺觀於阿亭道冬十月太尉許􅖢罷太常楊賜爲太尉校獵上林苑歴函谷關遂廵狩于廣成苑十二月還幸太學六年春正月日南徼外國重譯貢獻二月復長陵縣比豐沛三月辛未大赦天下夏大旱秋金城河水溢五原山岸崩始置圃囿署以宦者為令冬東海東莱琅邪井中冰厚尺餘大有年中平元年春二月鉅鹿人張角自稱黄天其部師有三十六萬皆著黄巾同日反叛續漢書曰三十六萬餘人安平甘陵人各執其王以應之安平王續甘陵王忠三月戊申以河南尹何進為大將軍將兵屯都亭置八關都尉官都亭在洛陽八闗謂函谷廣城伊闕大谷轘轅旋門小平津孟津也壬子大赦天下黨人還諸徙者時中常侍吕彊言於帝曰黨錮久積若與黄巾合謀悔之無救帝懼皆赦之唯張角不赦詔公卿出馬弩舉列將子孫及吏民有明戰陣之畧者詣公車遣北中郎將盧植討張角左中郎將皇甫嵩右中郎將朱儁討潁川黄巾庚子南陽黄巾張曼成攻殺郡守褚貢夏四月太尉楊賜免太僕𢎞農鄧盛為太尉盛字伯能司空張濟罷大司農張温為司空朱儁為黄巾波才所敗侍中向栩張鈞坐言宦者下獄死時鈞上書曰今斬常侍懸其首於南郊以謝天下即兵自消也章以章示常侍故下獄也汝南黄巾敗太守趙謙於邵陵邵陵縣名屬汝南郡故城在今豫州郾城縣東廣陽黄巾殺幽州刺史郭勳及太守劉衛五月皇甫嵩朱儁復與波才等戰於長社大破之長社今許州縣也故城在長葛縣西六月南陽太守秦頡擊張曼成斬之交阯屯兵執刺史及合浦太守来逹自稱柱天將軍遣交阯刺史賈琮討平之皇甫嵩朱儁大破汝南黄巾於西華西華縣屬汝南郡故城在今陳州項城縣西詔嵩討東郡朱儁討南陽盧植破黄巾圍張角於廣宗宦官誣奏植抵罪植連破張角垂當㧞之小黄門左豐言扵帝曰盧中郎固壘息軍以待天誅帝怒遂檻車徵植減死一等遣中郎將董卓攻張角不剋洛陽女子生兒兩頭共身續漢志曰上西門外女子生兒兩頭異肩共胷以為不祥墮地棄之其後政在私門上下無别兩頭之象秋七月巴郡妖巫張修反宼郡縣劉艾紀曰時巴郡巫人張修療病愈者雇以五斗米號為五斗米師河南尹徐灌下獄死八月皇甫嵩與黄巾戰於倉亭獲其帥其帥卜己也倉亭在東郡乙巳詔皇甫嵩北討張角九月安平王續有罪誅國除冬十月皇甫嵩與黄巾賊戰于廣宗獲張角弟梁角先死乃戮其屍發棺斷頭傳送馬市以皇甫嵩爲左車騎將軍十一月皇甫嵩又破黄巾于下曲陽斬張角弟寳湟中義從胡北宫伯玉與先零羌叛以金城人邊章韓遂為軍帥攻殺護羌校尉伶徵金城太守陳懿伶姓也周有大夫伶州鳩癸巳朱儁㧞宛城斬黄巾别帥孫夏詔減太官珍羞御食一肉廐馬非郊祭之用悉出給軍十二月己巳大赦天下改元中平是嵗下邳王意薨無子國除郡國生異草備龍蛇鳥獸之形風俗通曰亦作人狀操持兵弩一一備具續漢志曰龍蛇鳥獸其狀毛羽頭目足翅皆具是嵗黄巾賊起漢遂微弱二年春正月大疫琅邪王據薨二月己酉南宫大災火半月乃滅續漢志曰時燒靈臺殿樂成殿延及北闕度道西燒嘉徳和驩殿己亥廣陽門外屋自壞洛陽城西面南頭門也稅天下田畝十錢以修宫室黑山賊張牛角等十餘軰並起所在宼鈔司徒袁隗免三月廷尉崔烈為司徒北宫伯玉等宼三輔遣左車騎將軍皇甫嵩討之不剋夏四月庚戌大風雨雹五月太尉鄧盛罷太僕河南張延為太尉延字公威歆之子秋七月三輔螟左車騎將軍皇甫嵩免八月以司空張温為車騎將軍討北宫伯玉九月特進楊賜為司空冬十月庚寅司空楊賜薨光禄大夫許相為司空相字公弼平輿人許訓之子前司徒陳耽諫議大夫劉陶坐直言下獄死十一月張温破北宫伯玉於羙陽因遣盪宼將軍周愼追擊之圍榆中縣名故城在今蘭州金城縣東也又遣中郎將董卓討先零羌愼卓並不剋鮮卑宼幽幷二州是嵗造萬金堂於西園洛陽民生兒兩頭肆臂三年春二月江夏兵趙慈反殺南陽太守秦頡庚戌大赦天下太尉張延罷車騎將軍張温為太尉中常侍趙忠爲車騎將軍復修玉堂殿鑄銅人四黄鍾四其音中黄鍾也子為黄鍾及天祿蝦蟆又鑄四出文錢天禄獸也時使掖廷令畢嵐鑄銅人列於蒼龍𤣥武闕外鍾懸於玉堂及雲臺殿前天禄蝦蟆吐水於平門外事具宦者傳案今鄧州南陽縣北有宗資碑旁有两石獸鐫其膞一曰天祿一曰辟邪據此即天禄辟邪並獸名也漢有天禄閣亦因獸以立名五月壬辰晦日有食之六月荆州刺史王敏討趙慈斬之車騎將軍趙忠罷秋八月懷陵上有雀萬數悲鳴因鬬相殺懐陵冲帝陵也續漢志曰天戒若曰諸懐爵禄而尊厚者還自相害也冬十月武陵蠻叛宼郡界郡兵討破之前太尉張延為宦人所譖下獄死十二月鮮卑宼幽幷二州四年春正月己夘大赦天下二月滎陽賊殺中牟令中牟今鄭州縣劉艾紀曰令落皓及主簿潘業臨陣不顧皆被害己亥南宫内殿罘罳自壞前書音義曰罘罳連闕曲閣也音浮思三月河南尹何苖討滎陽賊破之拜苖為車騎將軍夏四月凉州刺史耿鄙討金城賊韓遂鄙兵大敗遂宼漢陽漢陽太守傅爕戰沒扶風人馬騰漢陽人王國並叛宼三輔太尉張温免司徒崔烈為太尉五月司空許相為司徒光禄勳沛國丁宫為司空宫字元雄六月洛陽民生男兩頭共身劉艾紀曰上西門外劉倉妻生也漁陽人張純與同郡張舉舉兵叛劉攽曰案他處叛賊未嘗言舉兵者當由其人名舉故衍攻殺右北平太守劉政遼東太守楊終護烏桓校尉公綦稠等舉兵自稱天子宼幽冀二州劉攽曰案張舉自稱天子誤出一兵字秋九月丁酉令天下繫囚罪未决入縑贖冬十月零陵人觀鵠觀姓鵠名自稱平天將軍宼桂陽長沙太守孫堅擊斬之十一月太尉崔烈罷大司農曹嵩為太尉十二月休屠各胡叛是嵗賣闗内侯假金印紫綬傳世入錢五百萬五年春正月休屠各胡宼西河殺郡守郉紀丁酉大赦天下二月有星孛于紫宫黄巾餘賊郭大等起於西河白波谷宼太原河東三月休屠各胡攻殺并州刺史張懿遂與南匈奴左部胡合殺其單于夏四月汝南葛陂黄巾攻沒郡縣葛陂在今豫州新蔡縣西北太尉曹嵩罷五月永樂少府樊陵為太尉陵字徳雲胡陽人也六月丙寅大風太尉樊陵罷益州黄巾馬相攻殺刺史郗儉自稱天子又宼巴郡殺郡守趙部益州從事賈龍擊相斬之郡國七大水秋七月射聲校尉馬日磾為太尉八月初置西園八校尉樂資山陽公載記曰小黄門蹇碩為上軍校尉虎賁中郎將袁紹為中軍校尉屯騎校尉鮑鴻為下軍校尉議郎曹操為典軍校尉趙融為助軍左校尉馮芳為助軍右校尉諫議大夫夏牟為左校尉淳于瓊為右校尉凡八校尉皆統於蹇碩司徒許相罷司空丁宫為司徒光禄勳南陽劉𢎞為司空字子髙安衆人衛尉董重爲驃騎將軍九月南單于叛與白波賊宼河東遣中郎將孟益率騎都尉公孫瓚討漁陽賊張純等冬十月壬午御殿後槐樹自拔倒豎青徐黄巾復起宼郡縣甲子帝自稱無上將軍燿兵於平樂觀平樂觀在洛陽城西十一月凉州賊王國圍陳倉右將軍皇甫嵩救之遣下軍校尉鮑鴻討葛陂黄巾巴郡板楯蠻叛遣上軍别部司馬趙瑾討平之公孫瓚與張純戰於石門大破之時烏桓反叛與賊張純等攻薊中故瓚追擊之石門山名在今營州西南是嵗改刺史新置牧六年春二月左將軍皇甫嵩大破王國於陳倉三月幽州牧劉虞購斬漁陽賊張純下軍校尉鮑鴻下獄死夏四月丙午朔日有食之太尉馬日磾免幽州牧劉虞為太尉丙辰帝崩于南宫嘉徳殿年三十四戊午皇子辯即皇帝位年十七尊皇后曰皇太后太后臨朝大赦天下改元為光熹封皇弟協為渤海王後將軍袁隗為太傅與大將軍何進參録尚書事上軍校尉蹇碩下獄時蹇碩謀欲立渤海王協發覺劉攽曰正文蹇碩下獄案碩以此時誅明少一死字五月辛巳驃騎將軍董重下獄死董重皇后之弟子也六月辛亥孝仁皇后董氏崩辛酉𦵏孝靈皇帝于文陵在洛陽西北三十里陵髙十二文周回三百步雨水秋七月甘陵王忠薨庚寅孝仁皇后歸葬河間愼陵徙渤海王協為陳留王司徒丁宫罷八月戊辰中常侍張讓段珪等殺大將軍何進於是虎賁中郎將袁術燒東西宫攻諸宦者庚午張讓段珪等刼少帝及陳留王幸北宫徳陽殿何進部曲將吳匡與車騎將軍何苖戰於朱雀闕下苖敗斬之辛未司隸校尉袁紹勒兵收偽司隸校尉樊陵河南尹許相及諸閹人無少長皆斬之讓珪等復刼少帝陳留王走小平津小平津在今鞏縣西北續漢志曰時京師童謡曰侯非侯王非王千乗萬騎上北印案獻帝未有爵號為段珪等所執公卿百官皆隨其後到河上乃得還尚書盧植追讓珪等斬數人其餘投河而死獻帝春秋曰河南中部掾閔貢見天子出率騎追之北到河上天子飢渇貢宰羊進之厲聲責讓等曰君以閹宦之隸刀鋸之殘越從汚泥扶侍日月賣㺯國恩階賤為貴刼迫帝王蕩覆王室假息漏刻遊魂河津自亡新以来姦臣賊子未有如君者今不速死吾射殺汝譲等惶怖义手再拜叩頭向天子辭曰臣等死陛下自愛遂投河死帝與陳留王協夜歩逐螢光行數里得民家露車共乗之辛未還宫大赦天下改光熹為昭寧幷州牧董卓殺執金吾丁原司空劉𢎞免董卓自為司空九月甲戌董卓廢帝為𢎞農王自六月雨至于是月論曰秦本紀說趙髙譎二世指鹿為馬史記曰趙髙欲爲亂恐羣臣不聽乃先設驗持鹿獻胡亥曰馬也胡亥曰丞相誤也以問羣臣左右或言馬或言鹿者髙皆隂法中之自此左右不敢言之也而趙忠張讓亦紿靈帝不得登髙臨觀時宦官並起第宅擬則宫室帝常登永安侯臺宦官恐望見之乃使趙忠等諫曰人君不當登髙登髙則百姓散離自是不敢復登臺榭見宦者傳故知亡敝者同其致矣然則靈帝之為靈也優哉贊曰靈帝負乗委體宦孽易曰負且乘致寇至言帝以小人而乗君子之噐徵亡備兆小雅盡缺詩小雅曰小雅廢則四夷交侵中國㣲矣缺亦廢也麋鹿霜露遂棲宫衛史記曰伍子胥諌吳王吳王不聽子胥曰臣今見麋鹿逰於姑蘇之臺宫中生荆棘露沾衣也言帝為政貪亂任寄不得其人尋以獻帝遷播洛陽丘墟故麋鹿棲宫衛也協韻衛音于别反劉攽曰熹平五年書十月壬午御殿後槐樹自㧞倒豎中平五年又書十月壬午御殿後槐樹自㧞倒豎年數日月無少異者盖必有一誤臣攽案中平五年十月又書甲子帝稱無上將軍云云壬午到甲子凡四十五日非一月所能兼也則中平所記為衍矣又案續漢志中平五年亦無此異後漢書卷八後漢書卷八考證靈帝紀癸酉晦日有食之晦監夲訛朔從宋夲改臣㑹汾按上文已序冬十二月事係此語於年終當作晦字元年二年日食皆在十月晦晦而日食司天者失其御也六月詔公卿舉能通尚書毛詩左氏榖梁春秋各一人顧炎武曰尚書上脫古文二字其部師有三十六萬師當作帥萬當作方何焯曰三十六方見皇甫嵩傳不知何自訛寫爲万復縁注引續漢書語相沿不察也後漢書卷八考證
