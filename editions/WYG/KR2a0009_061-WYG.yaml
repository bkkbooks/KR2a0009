body:
  text: 後漢書卷六十一宋宣城太守范煜撰唐章懷太子賢注郭杜孔張廉王蘇羊賈陸列傳第二十一郭伋傳郭伋字細侯扶風茂陵人也髙祖父解前書曰解字翁伯河内軹人徙茂陵也武帝時以任俠聞父梵為蜀郡太守伋少有志行哀平間辟大司空府三遷為漁陽都尉王莽時為上谷大尹王莽改太守為大尹遷幷州牧更始新立三輔連被兵寇百姓震駭强宗右姓右姓猶髙姓也各擁衆保營莫肻先附更始素聞伋名徵拜左馮翊使鎭撫百姓世祖即位拜雍州牧再轉為尚書令數納忠諌争建武四年出為中山太守明年彭寵滅轉為漁陽太守漁陽既離王莽之亂重以彭寵之敗離猶遭也民多猾惡寇賊充斥杜預注左傳曰充滿斥見也伋到示以信賞糾戮渠帥盗賊銷散時匈奴數抄郡界邊境苦之伋整勒士馬設攻守之略匈奴畏憚逺迹不敢復入塞民得安業在職五歲户口增倍後潁川盗賊羣起九年徵拜潁川太守召見辭謁因辭而謁見也帝勞之曰賢能太守去帝城不逺河潤九里冀京師幷蒙福也莊子曰河潤九里澤及三族君雖精於追捕而山道險阸自鬭當一士耳深宜愼之伋到郡招懐山賊陽夏趙宏陽夏縣名屬陳國夏公雅反襄城召呉等數百人皆束手詣伋降悉遣歸務農因自劾専命謂擅放降賊也帝美其䇿不以咎之後宏呉等黨與聞伋威信逺自江南或從幽冀不期俱降駱驛不絶駱驛連續十一年省朔方刺史屬幷州帝以盧芳據北土乃調伋為幷州牧過京師謝恩帝即引見并召皇太子諸王宴語終日賞賜車馬衣服什物伋因言選補衆職當簡天下賢俊不宜專用南陽人帝納之伋前在并州素結恩德及後入界所到縣邑老㓜相攜逄迎道路所過問民疾苦聘求耆德雄俊設几杖之禮朝夕與參政事禮記曰謀於長者必操几杖以從之始至行部到西河美稷有童兒數百各騎竹馬於道次迎拜伋問兒曹何自逺來曹輩也對曰聞使君到喜故來奉迎伋辭謝之及事訖諸兒復送至郭外問使君何日當還伋謂别駕從事計日當告之劉攽曰案文多一當字上文問者可云當此下文著當字無理行部既還先期一日伋為違信於諸兒遂止于野亭湏期乃入是時朝廷多舉伋可為大司空帝以并部尚有盧芳之儆儆急也且匈奴未安欲使久於其事故不召伋知盧芳夙賊夙舊也難卒以力制常嚴􅇏候明購賞以結寇心芳將隋昱劉攽曰案随字至隋時方去之單作隋今此宜作隨遂謀脅芳降伋芳乃亡入匈奴伋以老病上書乞骸骨二十二年徵為太中大夫賜宅一區及帷帳錢穀以充其家伋輙散與宗親九族無所遺餘明年卒時年八十六帝親臨弔賜冢塋地杜詩傳杜詩字公君河内汲人也少有才能仕郡功曹有公平稱更始時辟大司馬府建武元年歲中三遷為侍御史安集洛陽時將軍蕭廣放縱兵士暴横民間百姓惶擾詩敕曉不改遂格殺廣還以狀聞世祖召見賜以棨㦸漢雜事曰漢制假棨㦸以代斧鉞崔豹古今注曰棨㦸前驅之器也以木為之後代刻偽無復典刑以赤油韜之亦謂之油㦸亦曰棨㦸王公已下通用之以前驅也復使之河東誅降逆賊楊異等詩到大陽大陽縣名屬河東郡聞賊規欲北度乃與長史急焚其船部勒郡兵將突騎趂擊斬異等賊遂翦滅拜成臯令成臯縣屬河南郡今洛州氾水縣是視事三歲舉政尤異再遷為沛郡都尉轉汝南都尉所在稱治七年遷南陽太守性節儉而政治清平以誅暴立威善於計略省愛民役造作水排鑄為農器排音蒲拜反冶鑄者為排以吹炭令激水以鼓之也排當作㰆古字通用也用力少見功多百姓便之又修治陂池廣拓土田郡内比室殷足時人方於召信臣比室猶比屋也前書曰召信臣字翁卿九江夀春人也遷南陽太守為人興利務在富之開通溝渠凡十數處故南陽為之語曰前有召父後有杜母詩自以無勞不安久居大郡求欲降避功臣乃上疏曰陛下亮成天工克濟大業偃兵修文羣帥反旅反旅謂班師也海内合和萬世蒙福天下幸甚唯匈奴未譬聖德威侮二垂譬猶曉也威虐也侮慢也二垂謂西與北也陵虐中國邊民虚耗不能自守臣恐猛武之將雖勤亦未得解甲櫜弓也櫜韜也音髙詩曰載櫜弓矢也夫勤而不息亦怨勞而不休亦怨怨恨之師難復責功臣伏覩將帥之情功臣之望冀一休足於内郡休足止行役也然後即戎出命不敢有恨臣愚以為師克在和不在衆春秋左氏傳文也陛下雖垂念北邊亦當頗泄用之泄猶雜也昔湯武善御衆故無忿鷙之師鷙擊也湯武順天應人其所征討皆弔伐而已故無忿怒而擊也陛下起兵十有三年將帥和睦士卒鳬薻言其和睦歡悦如鳬之戯於水薻也今若使公卿郡守出於軍壘則將帥自厲壘軍壁厲勉也士卒之復比於宿衛則戎士自百復謂優寛也音福續漢志曰羽林郎秩比三百石掌侍從宿衛言士卒得比於郎則人百其勇何者天下已安各重性命大臣以下咸懐樂土不讐其功而厲其用無以勸也陛下誠宜虚缺數郡以俟振旅之臣重復厚賞加於久役之士如此緣邊屯戍之師競而忘死乗城拒塞之吏不辭其勞則烽火精明守戰堅固聖王之政必因人心今猥用愚薄塞功臣之望誠非其宜臣詩伏自惟忖本以史吏一介之才史吏謂初為郡功曹也書曰如有一介臣也遭陛下創制大業賢俊在外空乏之間超受大恩收養不稱劉攽曰案收養無義合作牧養二漢通謂守令為牧養也奉職無效久竊禄位令功臣懐愠誠惶誠恐八年上書乞避功德陛下殊恩未許放退臣詩蒙恩尤深義不敢茍冒虛請誠不勝至願願退大郡受小職及臣齒壯力能經營劇事如使臣詩必有補益復受大位雖析珪授爵所不辭也惟陛下哀矜帝惜其能遂不許之詩雅好推賢數進知名士清河劉統及魯陽長董崇等初禁網尚簡但以璽書發兵未有虎符之信詩上疏曰臣聞兵者國之凶器聖人所慎舊制發兵皆以虎符其餘徵調竹使而已符䇿合㑹取為大信所以明著國命歛持威重也說文曰符信也漢制以竹長六寸分而相合前書文帝二年初與郡守為銅虎符竹使符音義曰銅虎第一至第五發兵遣使符合乃聽之竹使符以竹五寸鐫刻篆書亦第一至第五也間者發兵但用璽書或以詔令如有姦人詐偽無由知覺愚以為軍旅尚興賊虜未殄徵兵郡國宜有重慎可立虎符以絶姦端昔魏之公子威傾鄰國猶假兵符以解趙圍若無如姬之仇則其功不顯秦昭王已破趙長平又進圍邯鄲魏昭王之子無忌號信陵君其姊為趙惠文王弟平原君夫人平原君數遺公子書請救於魏魏王使將軍晉鄙将十萬衆救趙實持兩端以觀望平原君使者相屬謂公子曰今邯鄲旦暮降秦魏救不至獨不憐公子姊耶公子患之過侯嬴問之嬴屏人語曰嬴聞晉鄙兵符常在王卧内而如姬最幸力能竊之嬴聞如姬父為人所殺公子使客斬其仇頭敬進如姬姬為公子死無所辭公子誠一開口以請如姬姬必諾公子從其計如姬果盗晉鄙兵符與公子於是遂矯魏王令奪晉鄙兵進擊秦軍解去事見史記也事有煩而不可省費而不得已盖謂此也書奏從之詩身雖在外盡心朝廷讜言善䇿随事獻納視事七年政化大行十四年坐遣客為弟報仇被徵㑹病卒司𨽻校尉鮑永上書言詩貧困無田宅䘮無所歸詔使治䘮郡邸賻絹千匹孔奮傳孔奮字君魚扶風茂陵人也曾祖霸元帝時為侍中奮少從劉歆受春秋左氏傳歆稱之謂門人曰吾已從君魚受道矣言君魚之道已過於已矣遭王莽亂奮與老母㓜弟避兵河西建武五年河西大將軍竇融請奮署議曹掾守姑臧長八年賜爵關内侯時天下擾亂唯河西獨安而姑臧稱為富邑通貨羌胡市日四合古者為市一日三合周禮曰大市日側而市百族為主朝市朝時而市百賈為主夕市夕時而市販夫販婦為主今既人貨殷繁故一日四合也每至縣者不盈數月輒至豐積奮在職四年財産無所增事母孝謹雖為儉約奉養極求珍膳躬率妻子同甘菜茹廣雅曰茹食也時天下未定士多未修節操而奮力行清潔為衆人所笑或以為身處脂膏不能以自潤徒益苦辛耳劉攽曰案文益當在徒字上奮既立節治貴仁平太守梁統深相敬待不以官屬禮之常迎於大門引入見母隴蜀既平河西守令咸被徵召財貨連轂彌竟川澤唯奮無資單車就路姑臧吏民及羌胡更相謂曰孔君清廉仁賢舉縣蒙恩如何今去不共報德遂相賦歛牛馬器物千萬以上追送數百里奮謝之而已一無所受既至京師除武都郡丞時隴西餘賊隗茂等夜攻府舍殘殺郡守賊畏奮追急乃執其妻子欲以為質奮年已五十唯有一子終不顧望遂窮力討之吏民感義莫不倍用命焉郡多氐人便習山谷其大豪齊鍾留者為羣氐所信向奮乃率厲鍾留等令要遮鈔擊共為表裏賊窘懼逼急乃推奮妻子以置軍前冀當退却而擊之愈厲遂禽滅茂等奮妻子亦為所殺世祖下詔褒美拜為武都太守奮自為府丞已見敬重及拜太守舉郡莫不改操為政明斷甄善疾非甄明也見有美德愛之如親其無行者忿之若讐郡中稱為清平弟奇游學洛陽奮以奇經明當仕上病去官守約鄉閭卒于家奇博通經典作春秋左氏刪刪定其義也奮晚有子嘉官至城門校尉作左氏説云説猶今之疏也張堪傳張堪字君游南陽宛人也為郡族姓堪早孤讓先父餘財數百萬與兄子年十六受業長安志美行厲諸儒號曰聖童世祖微時見堪志操常嘉焉及即位中郎將來歙薦堪召拜郎中三遷為謁者使送委輸縑帛并領騎七千匹詣大司馬呉漢伐公孫述在道追拜蜀郡太守時漢軍餘七日糧陰具船欲遁去堪聞之馳往見漢説述必敗不宜退師之䇿漢從之乃示弱挑敵述果自出戰死城下成都既拔堪先入據其城撿閲庫藏收其珍寳悉條列上言秋毫無私秋毫者喻細也慰撫吏民蜀人大悦在郡二年徵拜騎都尉後領驃騎將軍杜茂營擊破匈奴於髙栁拜漁陽太守捕擊姦猾賞罰必信吏民皆樂為用匈奴嘗以萬騎入漁陽堪率數千騎奔擊大破之郡界以靜乃於狐奴開稻田八千餘頃勸民耕種以致殷富百姓歌曰桑無附枝麥穗兩岐張君為政樂不可支視事八年匈奴不敢犯塞帝嘗召見諸郡計吏問其風土及前後守令能否蜀郡計掾樊顯進曰漁陽太守張堪昔在蜀漢仁以惠下威能討姦前公孫述破時珍寳山積捲握之物足富十世捲握猶掌握也謂珠玉之類也而堪去職之日乗折轅車布被囊而已帝聞良久歎息良猶甚也拜顯為魚復長魚復縣屬巴郡故城在今䕫州人復縣北赤甲城是方徵堪㑹病卒帝深悼惜之下詔襃揚賜帛百匹廉范傳廉范字叔度京兆杜陵人趙將廉頗之後也漢興以廉氏豪宗自苦陘徙焉苦陘縣屬中山國章帝更名漢昌世為邊郡守或葬隴西襄武故因仕焉曾祖父裦成哀間為右將軍祖父丹王莽時為大司馬庸部牧王莽改益州為庸部皆有名前世范父遭喪亂客死於蜀漢范遂流寓西州謂巴屬也西州平歸鄉里年十五辭母西迎父喪蜀郡太守張穆丹之故吏乃重資送范范無所受與客歩負喪歸葭萌葭萌縣名屬廣漢郡今利州益昌縣即漢葭萌地也載船觸石破没范抱持棺柩遂俱沈溺衆傷其義鉤求得之療救僅免於死穆聞復馳遣使持前資物追范范又固辭歸葬服竟詣京師受業事博士薛漢漢字公子見儒林傳京兆隴西二郡更請召皆不應永平初隴西太守鄧融備禮謁范為功曹謁請也㑹融為州所舉案舉其罪案驗之范知事譴難解欲以權相濟乃託病求去融不逹其意大恨之范於是東至洛陽變名姓求代廷尉獄卒居無幾融果徵下獄范遂得衛侍左右盡心勤勞融怪其貌類范而殊不意乃謂曰卿何似我故功曹邪范訶之曰君困戹瞀亂邪鄭𤣥注禮記曰瞀目不明之貌語遂絶融繫出困病范隨而養視及死竟不言身自將車送喪至南陽葬畢乃去後辟公府㑹薛漢坐楚王事誅楚王英謀反也故人門生莫敢視范獨往收歛之吏以聞顯宗大怒召范入詰責曰薛漢與楚王同謀交亂天下范公府掾不與朝廷同心而反收斂罪人何也范叩頭曰臣無狀愚戇以為漢等皆已伏誅不勝師資之情罪當萬坐老子曰善人為不善人之師不善人為善人之資也帝怒稍解問范曰卿廉頗後邪與右將軍裦大司馬丹有親屬乎范對曰裦臣之曾祖丹臣之祖也帝曰怪卿志膽敢爾因貰之貰赦也由是顯名舉茂才數月再遷為雲中太守㑹匈奴大入塞烽火日通故事虜人過五千人劉攽曰按文人當作入移書傍郡吏欲傳檄求救范不聽自率士卒拒之虜衆盛而范兵不敵㑹日暮令軍士各交縛兩炬三頭爇火營中星列用兩炬交縛如十字爇其三頭手持一端使敵人望之疑兵士之多虜遙望火多謂漢兵救至大驚待旦將退范乃令軍中蓐食晨往赴之蓐食早起食於寢蓐中也斬首數百級虜自相轔藉死者千餘人轔轢也藉相蹈藉也由此不敢復向雲中後頻歴武威武都二郡太守隨俗化導各得治宜建初中遷蜀郡太守其俗尚文辯好相持短長范每厲以淳厚不受偸薄之說成都民物豐盛邑宇逼側舊制禁民夜作以防火災而更相隠蔽燒者日屬范乃毁削先令但嚴使儲水而已百姓為便乃歌之曰廉叔度來何暮不禁火民安作平生無襦今五絝作協韻音則護反在蜀數年坐法免歸鄉里范世在邊廣田地積財粟悉以賑宗族朋友肅宗崩范奔赴敬陵時廬江郡掾嚴麟奉章弔國俱㑹於路麟乗小車塗深馬死不能自進范見而愍然命從騎下馬與之不告而去麟事畢不知馬所歸乃緣縱訪之或謂麟曰故蜀郡太守廉叔度好周人窮急今奔國喪獨當是耳麟亦素聞范名以為然即牽馬造門謝而歸之世伏其好義然依倚大將軍竇憲以此為譏卒于家初范與洛陽慶鴻為刎頸交時人稱曰前有管鮑後有慶廉鴻慷慨有義節位至琅邪㑹稽二郡太守所在有異迹論曰張堪廉范皆以氣俠立名觀其振危急赴險阸有足壯者堪之臨財范之忘施亦足以信意而感物矣信音伸若夫髙祖之召欒布欒布梁人為人所略賣為奴梁王彭越贖為梁大夫使於齊漢召彭越以謀反夷三族詔有收視者輒捕之布還奏事彭越頭下祠而哭之吏捕以聞上召罵曰若與彭越反邪布曰今漢一徵兵於梁彭王不行而疑以為反則人人自危也上乃釋布拜為都尉也明帝之引廉范加怒以發其志就戮更延其寵聞義能徙誠君道所尚然情理之樞亦有開塞之感焉户之開闔必由於樞情之通塞必在於感言髙祖明帝初怒欒布廉范後感其義而赦之王堂傳王堂字敬伯廣漢郪人也初舉光禄茂才光禄舉之為茂才也遷穀城令治有名迹穀城縣屬東郡故城在今齊州東阿縣東永初中西羌寇巴郡為民患詔書遣中郎將尹就攻討連年不剋三府舉堂治劇拜巴郡太守堂馳兵赴賊斬虜千餘級巴庸清靜吏民生為立祠庸即上庸縣也故城在今房州清水縣西也刺史張喬表其治能遷右扶風安帝西廵阿母王聖中常侍江京等並請屬於堂堂不為用掾吏固諫之堂曰吾蒙國恩豈可為權寵阿意阿曲也以死守之即日遣家屬歸閉閤上病果有誣奏堂者㑹帝崩京等悉誅堂以守正見稱永建二年徵入為將作大匠四年坐公事左轉議郎續漢志曰議郎秩六百石無員復拜魯相政存簡一至數年無辭訟遷汝南太守搜才禮士不茍自専乃教掾史曰古人勞於求賢逸於任使故能化清於上事緝於下其憲章朝右簡覈才職委功曹陳蕃匡政理務拾遺補闕任主簿應嗣庶循名責實察言觀效焉自是委誠求當不復妄有辭教郡内稱治時大將軍梁商及尚書令袁湯以求屬不行並恨之後廬江賊迸入弋陽界堂勒兵追討即便奔散而商湯猶因此風州奏堂在任無警免歸家年八十六卒遺令薄歛瓦棺以葬子穉清行不仕曾孫商益州牧劉焉以為蜀郡太守有治聲蘇章傳族孫不韋蘇章字孺文扶風平陵人也八世祖建武帝時為右將軍前書曰建以校尉從大將軍青擊匃奴封平陵侯中子武最知名也祖父純字桓公有髙名性强切而持毁譽持執也執毁譽之論謂品藻其臧否士友咸憚之至乃相謂曰見蘇桓公患其教責人不見又思之三輔號為大人大人長老之稱言尊事之也永平中為奉車都尉竇固軍出擊北匈奴車師有功劉攽曰案竇固自為奉車都尉蘇純但從之耳為當作從封中陵鄉侯官至南陽太守章少博學能屬文安帝時舉賢良方正對䇿髙第為議郎數陳得失其言甚直出為武原令武原縣屬楚國故城在今泗州下邳縣北時歲飢輒開倉廪活三千餘户順帝時遷冀州刺史故人為清河太守章行部案其姦臧乃請太守為設酒肴陳平生之好甚歡太守喜曰人皆有一天我獨有二天章曰今夕蘇孺文與故人飲者私恩也明日冀州刺史案事者公法也遂舉正其罪州境知章無私望風畏肅換為幷州刺史以摧折權豪忤㫖坐免隐身鄉里不交當世後徵為河南尹不就時天下日敝民多悲苦論者舉章有幹國才朝廷不能復用卒于家兄曾孫不韋不韋字公先父謙初為郡督郵時魏郡李暠為美陽令與中常侍具瑗交通貪暴為民患前後監司畏其埶援莫敢糾問及謙至部案得其臧論輸左校謙累遷至金城太守去郡歸鄉里漢法免罷守令自非詔徵不得妄到京師而謙後私至洛陽時暠為司𨽻校尉收謙詰掠死獄中暠又因刑其屍以報昔怨不韋時年十八徵詣公車㑹謙見殺不韋載䘮歸鄉里瘞而不𦵏仰天歎曰伍子胥獨何人也子胥父伍奢為楚王所殺子胥復讐鞭平王之尸解見寇榮傳乃藏母於武都山中武都郡名其地在今成州上禄縣界有仇池山東西懸絶壁立百仞故藏於其中也遂變名姓盡以家財募劍客邀暠於諸陵間不剋㑹暠遷大司農時右校芻廥在寺北垣下說文云廥芻槀藏音工外反垣墻也不韋與親從兄弟潛入廥中夜則鑿地晝則逃伏如此經月遂得傍逹暠之寢室出其牀下値暠在厠因殺其妾并及小兒留書而去暠大驚懼乃布棘於室以板籍地一夕九徙雖家人莫知其處每出輒劍㦸隨身壯士自衛不韋知暠有備乃日夜飛馳徑到魏郡掘其父阜冢斷取阜頭以祭父墳又標之於市曰李君遷父頭暠匿不敢言而自上退位歸鄉里私掩塞冢椁捕求不韋厯歲不能得憤恚感傷發病毆血死不韋後遇赦還家乃始改𦵏行喪士大夫多譏其發掘冢墓歸罪枯骨不合古義唯任城何休方之伍員太原郭林宗聞而論之曰子胥雖云逃命而見用强呉慿闔廬之威因輕悍之衆雪怨舊郢曾不終朝而但鞭墓戮屍以舒其憤竟無手刃後主之報豈如蘇子單特孑立靡因靡資强讐豪援據位九卿城闕天阻宫府幽絶埃塵所不能過霧露所不能沾不韋毁身憔慮出於百死冒觸嚴禁陷族禍門雖不獲逞為報已深况復分骸斷首以毒生者毒苦也使暠懐忿結不得其命猶假手神靈以斃之也力唯匹夫功隆千乗比之於員不以優乎議者於是貴之後太傳陳蕃辟不應為郡五官掾初𢎞農張奐睦於蘇氏而武威叚熲與暠素善後奐熲有隙及熲為司𨽻以禮辟不韋不韋懼之稱病不詣熲既積憤於奐因發怒乃追咎不韋前報暠事以為暠表治謙事被報見誅君命天也而不韋仇之又令長安男子告不韋多將賓客奪舅財物遂使從事張賢等就家殺之乃先以鴆與賢父曰若賢不得不韋便同飲此賢到扶風郡守使不韋奉謁迎賢即時收執并其一門六十餘人盡誅滅之諸蘇以是衰破及叚熲為陽球所誅天下以為蘇氏之報焉羊續傅羊續字興祖太山平陽人也其先七世二千石卿校祖父侵安帝時司𨽻校尉父儒桓帝時為太常續以忠臣子孫拜郎中去官後辟大將軍竇武府及武敗坐黨事禁錮十餘年幽居守静及黨禁解復辟太尉府四遷為廬江太守後揚州黄巾賊攻舒焚燒城郭續發縣中男子二十以上皆持兵勒陳其小弱者悉使負水灌火㑹集數萬人并埶力戰大破之郡界平後安風賊戴風等作亂安風縣屬廬江郡續復擊破之斬首三千餘級生獲渠帥其餘黨輩原為平民原免也賦與佃器使就農業中平三年江夏兵趙慈反叛殺南陽太守秦頡攻没六縣拜續為南陽太守當入郡界乃羸服間行侍童子一人觀厯縣邑採問風謡然後乃進其令長貪潔吏民良猾悉逆知其狀郡内驚竦莫不震懾乃發兵與荆州刺史王敏共擊慈斬之獲首五千餘級屬縣餘賊並詣續降續為上言宥其枝附賊既清平乃班宣政令候民病利損於人曰病益於人曰利百姓歡服時權豪之家多尚奢麗續深疾之常敝衣薄食車馬羸敗府丞嘗獻其生魚續受而懸於庭丞後又進之續乃出前所懸者以杜其意續妻後與子祕俱詣郡舍續閉門不内妻自將祕行其資藏唯有布衾敝袛裯鹽麥數斛而已說文曰袛裯短衣也廣雅云即襜褕也袛音丁奚反裯音丁勞反顧敕祕曰吾自奉若此何以資爾母乎使與母俱歸六年靈帝欲以續為太尉時拜三公者皆輸東園禮錢千萬令中使督之名為左騶騶騎士也其所之往輒迎致禮敬厚加贈賂續乃坐使人於單席舉緼袍以示之緼故絮也曰臣之所資唯斯而已左騶白之帝不悦以此故不豋公位而徵為太常未及行㑹病卒時年四十八遺言薄歛不受賵遺舊典二千石卒官賻百萬府丞焦儉遵續先意一無所受詔書襃美敕太山太守以府賻錢賜續家云賈琮傳賈琮字孟堅東郡聊城人也聊城今博州縣舉孝廉再遷為京兆令劉攽曰案無京兆縣又未可為尹明多兆字是河南京縣令也有政理迹舊交阯土多珍産明璣翠羽犀象瑇瑁異香美木之屬莫不自出說文曰璣珠之不圓者異物志曰翠鳥形似鷰翡赤而翠青其羽可以為飾廣雅曰瑇瑁形似龜出南海巨延州也前後刺史率多無清行上承權貴下積私賂財計盈給輒復求見遷代故吏民怨叛中平元年交阯屯兵反執刺史及合浦太守自稱柱天將軍靈帝特敕三府精選能吏有司舉琮為交阯刺史琮到部訊其反狀咸言賦歛過重百姓莫不空單京師遙逺告寃無所民不聊生自活劉攽曰案文自活非本傳文是注以解聊生耳故聚為盗賊琮即移書告示各使安其資業招撫荒散蠲復徭役誅斬渠帥為大害者簡選良吏試守諸縣歲間蕩定百姓以安巷路為之歌曰賈父來晚使我先反今見清平吏不敢飯在事三年為十三州最徵拜議郎時黄巾新破兵凶之後郡縣重歛因緣生姦詔書沙汰刺史二千石更選清能吏乃以琮為冀州刺史舊與傳車驂駕垂赤帷裳迎於州界及琮之部升車言曰刺史當逺視廣聽糾察美惡何有反垂帷裳以自掩塞乎乃命御者褰之百城聞風自然竦震其諸臧過者望風解印綬去唯癭陶長濟陰董昭觀津長梁國黄就當官待琮於是州界翕然靈帝崩大將軍何進表琮為度遼將軍卒於官陸康傳陸康字季寜呉郡呉人也祖父續在獨行傳父襃有志操連徵不至康少仕郡以義烈稱刺史臧旻舉為茂才除髙城令髙城縣屬渤海郡也縣在邉垂舊制令户一人具弓弩以備不虞不得行來行來猶往來也長吏新到輒發民繕修城郭康至皆罷遣百姓大悅以恩信為治寇盗亦息州郡表上其狀光和元年遷武陵太守轉守桂陽樂安二郡所在稱之時靈帝欲鑄銅人而國用不足乃詔調民田畝斂十錢而比水旱傷稼百姓貧苦康上疏諌曰臣聞先王治世貴在愛民省徭輕賦以寜天下除煩就約以崇簡易易曰乾以易知坤以簡能而天下之理得矣故萬姓從化靈物應德末世衰主窮奢極侈造作無端興制非一勞割自下以從茍欲勞苦割剝於下人也故黎民吁嗟陰陽感動陛下聖德承天當隆盛化而卒被詔書畝歛田錢鑄作銅人伏讀惆悵悼心失圖夫什一而稅周謂之徹孟子曰夏后氏五十而貢殷人七十而助周人百畝而徹其實皆什一也徹者通也言其法度可通萬世而行也故魯宣稅畝而蝝災自生公羊傳曰初稅畝者何履畝而稅也何休注云宣公無恩信於人人不肯盡力於公田起履踐案行擇其畆穀好者稅取之蝝螽子也公羊傳冬蝝生此言蝝生何上變古易常也注云上謂宣公變易公田舊制而稅畝也哀公增賦而孔子非之左傳曰季孫欲以田賦使冉有訪諸仲尼仲尼私於冉有曰子季孫若欲行而法則周公之典在若欲茍而行之又何訪焉豈有聚奪民物以營無用之銅人捐捨聖戒自蹈亡王之法哉謂秦始皇鑄銅人十二卒致滅亡也傳曰君舉必書書而不法後世何述焉陛下宜留神省察改敝從善以塞兆民怨恨之望書奏内倖因此譖康援引亡國以譬聖明大不敬檻車徵詣廷尉侍御史劉岱典考其事岱為表陳解釋免歸田里復徵拜議郎㑹廬江賊黄穰等與江夏蠻連結十餘萬人攻没四縣拜康廬江太守康申明賞罰擊破穰等餘黨悉降帝嘉其功拜康孫尚為郎中獻帝即位天下大亂康蒙險遣孝廉計吏奉貢朝廷詔書䇿勞加忠義將軍秩中二千石時袁術屯兵夀春部曲飢餓遣使求委輸兵甲康以其叛逆閉門不通内修戰備將以禦之術大怒遣其將孫䇿攻康圍城數重康固守吏士有先受休假者皆遁伏還赴暮夜緣城而入受敵二年城陷月餘發病卒年七十宗族百餘人遭離飢戹死者將半朝廷愍其守節拜子儁為郎中少子績仕吳為鬱林太守博學善政見稱當時㓜年曾謁袁術懐橘墮地者也有名稱績字公紀呉志有傳贊曰伋牧朔藩信立童昏詩守南楚民作謠言奮馳單乗堪駕毁轅范得其朋易曰西南得朋廉范遷蜀郡太守百姓便之蜀在西南故曰得朋也堂任良肱謂委任功曹陳蕃主簿應嗣郡中大化也二蘇勁烈羊賈廉能季寜拒䇿城隕衝輣輣兵車也音彭協韻音普滕反後漢書卷六十一後漢書卷六十一考證杜詩傳造作水排鑄為農器注排當作櫜櫜字諸本皆誤作橐從宋本改廉范傳麟事畢不知馬所歸乃緣縱訪之臣㑹汾按緣縱謂縱馬任其所之随後訪之也諸本或作蹤則上下文義不貫從監本義長王堂傳簡覈才職職字應照宋本作識蘇章傳段熲為陽球所誅臣㑹汾按叚熲事具載陽球本傳諸本並誤作楊今改正陸康傳哀公增賦而孔子非之注季孫欲以田賦以字監本作益臣㑹汾按左氏傳本作以今從原文改正詩守南楚守字監本作定今從宋本改正後漢書卷六十一考證
