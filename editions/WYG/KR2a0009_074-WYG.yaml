body:
  text: 後漢書卷七十四宋宣城太守范煜撰唐章懐太子賢注鄧張徐張胡列傳第三十四鄧彪傳鄧彪字智伯南陽新野人續漢書曰其先楚人鄧况始居新野子孫以農桑為業太傅禹之宗也父邯中興初以功封鄳侯鄳音莫庚反仕至渤海太守彪少勵志脩孝行父卒讓國於異母弟荆鳯本或無荆顯宗高其節下詔許焉後仕州郡辟公府東觀記曰彪與同郡宗武伯翟敬伯陳綏伯張弟伯同志好齊名南陽號曰五伯五遷桂陽太守永平十七年徴入為太僕數年喪後母辭疾乞身詔以光禄大夫行服服竟拜奉車都尉遷大司農數月代鮑昱為太尉彪在位清白為百僚式視事四年以疾乞骸骨元和元年賜策罷贈錢三十萬在所以二千石奉終其身又詔太常四時致宗廟之胙胙祭廟肉也禮凡預祭異姓則歸之胙同姓則留之宴彪不預祭而賜胙重之河南尹遣丞存問常以八月旦奉羊酒東觀記曰賜羊一頭酒二石也和帝卽位以彪為太傅録尚書事賜爵關中侯劉攽曰案漢無關中侯中當作内字永元初竇氏專權驕縱朝廷多有諫争而彪在位脩身而已不能有所匡正又嘗奏免御史中丞周紆紆前失竇氏㫖故頗以此致譏然當時宗其禮讓及竇氏誅以老病上還樞機職詔賜養牛酒而許焉五年春薨于位天子親臨弔臨張禹傳張禹字伯達趙國襄國人也祖父况族姊為皇祖考夫人皇祖考鉅鹿都尉四數徃來南頓見光武光武為大司馬過邯鄲況為郡吏謁見光武光武大喜曰乃今得我大舅乎因與俱北到髙邑以為元氏令遷涿郡太守後為常山關長㑹赤眉攻關城況戰殁關縣屬常山郡今定州行唐縣西北有故關邑城東觀記曰況遷涿郡太守時年八十不任兵馬上疏乞身詔許之後詔問起居何如子歆對曰如故詔曰家人居不足贍且以一縣自養復以况為常山關長㑹赤眉攻關城况出戰死上甚哀之父歆初以報仇逃亡東觀記曰歆守臯長有報父仇賊自出歆召囚詣閣曰欲自受其辭既入解械飲食便發遣遂棄官亡命逢赦出由是鄉里服其髙義與此不同後仕為淮陽相終於汲令東觀記曰歆為相時王新歸國賓客放縱干亂法禁歆将令尉入宫搜捕王白上歆坐左遷為汲令卒官禹性篤厚節儉東觀記曰禹好學習歐陽尚書事太常桓榮惡衣食父卒汲吏人賻送前後數百萬悉無所受又以田宅推與伯父身自寄止永平八年舉孝亷稍遷建初中拜揚州刺史當過江行部中土民皆以江有子胥之神難於濟渉酈元水經注曰吳王賜子胥死浮尸於江夫差悔與羣臣臨江設祭修塘道及壇吳人因為立廟而祭焉禹將度吏固請不聼禹厲言曰子胥如有靈知吾志在理察枉訟豈危我哉遂鼓楫而過歴行郡邑深幽之處莫不畢到親録囚徒多所明舉吏民希見使者人懐喜悦怨德羙惡莫不自歸焉元和二年轉兖州刺史亦有清平稱三年遷下邳相徐縣北界有蒲陽坡東觀記曰坡水廣二十里徑且百里在道西其東有田可萬頃坡與陂同傍多良田而堙廢莫修禹為開水門通引灌溉遂成孰田数百頃勸率吏民假與種糧親自勉勞遂大收榖實鄰郡貧者歸之千餘户室廬相屬其居成市後嵗至墾千餘頃民用温給東觀記曰禹廵行守舍止大樹下食糒音憊糗也乾飯屑飲水而已後年鄰國貧人來歸之者茅屋草廬千户屠酤成市墾田千餘頃得穀百萬餘斛劉攽曰注禹廵行守舍止大樹下案文多一守字或云守當作常也功曹史戴閏故太尉掾也權動郡内有小譴禹令自致徐獄然後正其法徐縣名也東觀記曰閏當從行縣從書佐假車馬什物禹聞知令直符責問閏具以實對禹以宰士惶恐首實令自致徐獄也自長史以下莫不震肅永元六年入為大司農拜太尉和帝甚禮之十五年南廵祠園廟禹以太尉兼衞尉留守東觀記曰禹留守北宫太官朝夕送食賜闟登具物除子男盛為郎也聞車駕當進幸江陵以為不宜冒險逺驛馬上諌詔報曰祠謁既訖當南禮大江㑹得君奏臨漢回輿而旋及行還禹特䝉賞賜延平元年遷為太傅録尚書事鄧太后以殤帝初育育生也欲令重臣居禁内乃詔禹舍宫中給帷帳牀褥太官朝夕進食五日一歸府每朝見特贊與三公絶席禹上言方諒闇密静之時不宜依常有事於苑囿鄭𤣥注論語曰諒門謂凶廬也尚書曰帝乃徂落四海遏密八音也其廣成上林空地宜且以假貧民太后從之及安帝即位數上疾乞身詔遣小黄門問疾賜牛一頭酒十斛勸令就第其錢布刀劒衣物前後累至永初元年以定策功封安鄉侯食邑千二百户與太尉徐防司空尹勤同日俱封其秋以宼賊水雨策免防勤而禹不自安上書乞骸骨更拜太尉四年新野君病鄧太后母隂氏皇太后車駕幸其第禹與司徒夏勤司空張敏俱上表言新野君不安車駕連日宿止臣等誠竊惶懼臣聞王者動設先置止則交㦸清道而後行清室而後御前書曰舊典天子行幸所至必遣静室令先案行清静殿中以虞非常離宮不宿所以重宿衞也陛下體烝烝之至孝親省方藥恩情發中乆處單外百官露止議者所不安宜且還宫上為宗廟社稷下為萬國子民比三上固爭乃還宫後連嵗灾荒府藏虚空禹上疏求入三歲租税以助郡國稟假稟給也假貸也詔許之五年以隂陽不和策免七年卒于家使者弔祭除小子曜為郎中長子盛嗣徐防傳徐防字謁卿沛國銍人也銍故城今亳州臨渙縣也祖父宣為講學大夫以易教授王莽王莽置六經祭酒各一人秩上卿長安國由為講易祭酒宣為講學大夫蓋當屬於祭酒也父憲亦傳宣業防少習父祖學永平中舉孝廉除為郎防體貌矜嚴占對可觀顯宗異之特補尚書郎職典樞機周密畏愼奉事二帝未常有過和帝時稍遷司𨽻校尉出為魏郡太守永元十年遷少府大司農防勤曉政事所在有迹十四年拜司空防以五經乆逺聖意難明宜為章句以悟後學上疏曰臣聞詩書禮樂定自孔子發明章句始於子夏史記孔子沒子夏居西河教弟子三百人爲魏文侯師其後諸家分析各有異説前書仲尼沒而㣲言絶七十子喪而大義乖故春秋為五詩分為四易有數家之傳漢承亂秦經典廢絶本文略存或無章句收拾缺遺建立明經博徵儒術開置太學武帝時開學官置博士弟子員也孔聖既逺微㫖將絶故立博士十有四家漢官儀曰光武中興恢𢎞稽古易有施孟梁丘賀京房書有歐陽和伯夏侯勝建詩有申公轅固韓嬰春秋有嚴彭祖顔安樂禮有戴徳戴聖凡十四博士太常差選有聰明威重一人爲祭酒總領綱紀也設甲乙之科前書曰歲課甲科四十人為郎中乙科二十人為太子舍人丙科四十人補文學掌故以勉勸學者所以示人好惡改敝就善者也伏見太學試博士弟子皆以意説不脩家法諸經爲業各自名家私相容隠開生姦路每有策試輙興諍訟論議紛錯互相是非孔子稱述而不作但述先聖之言不自制作又曰吾猶及史之闕文古者史官於書事有不知則闕以待能者孔子言吾少時猶及見古史官之闕文今則無之疾時多穿鑿也見論語也疾史有所不知而不肯闕也今不依章句妄生穿鑿以遵師爲非義意説爲得理輕侮道術寖以成俗誠非詔書實選本意改薄從忠三世常道太史公曰夏之政忠忠之敝小人以野故殷人承之以敬敬之敝小人以鬼故周人承之以文文之敝小人以僿故救僿莫若以忠三王之道若循環周而復始僿音西志反史記僿或作薄劉攽曰三世常道案世與代全别縁太宗諱遂更世為代此合用代字乃誤為世蓋後人知此書中世字率皆換為代乃欲稍還正之遂誤為此字也專精務本儒學所先臣以爲博士及甲乙策試宜從其家章句開五十難以試之解釋多者為上第引文明者為高説若不依先師義有相伐伐謂自相攻伐也皆正以為非五經各取上第六人論語不宜射策雖所失或乆差可矯革東觀記防上疏曰試論語本文章句但通度勿以射䇿冀令學者務本有所一心專精師門思核經意事得其實道得其真於此𢎞廣經術尊重聖業有益於化雖從來乆六經衰微學問寖淺誠宜反本改矯其失詔書下公卿皆從防言十六年拜為司徒延平元年遷太尉與太傅張禹參録尚書事數受賞賜甚見優寵安帝即位以定策封龍鄉侯食邑千一百尸其年以灾異宼賊策免就國凡三公以灾異策免始自防也東觀記曰郡國被水灾比州湮沒死者以千數灾異數降西羗反畔殺略人吏京師淫雨蟊賊傷稼穡防比上書自陳過咎遂策免防卒子衡當嗣譲封於其弟崇數歲不得已乃出就爵云張敏傳張敏字伯達河間鄚人也鄚今瀛州縣也音莫建初二年舉孝亷四遷五年為尚書建初中有人侮辱人父者而其子殺之肅宗貰其死刑而降宥之貰寛也音示夜反自後因以爲比是時遂定其議以為輕侮法敏駮議曰夫輕侮之法先帝一切之恩不有成科班之律令也夫死生之決宜從上下猶天之四時有生有殺若開相容恕著為定法者則是故設姦萌生長罪隙孔子曰民可使由之不可使知之由從也言設政教可但使人從之若知其本末愚者或輕而不行事見論語春秋之義子不報讐非子也公羊傳曰父不受誅子復讐可也注云不受誅罪不當誅也而法令不為之減者以相殺之路不可開故也今託義者得減妄殺者有差使執憲之吏得設巧詐非所以導在醜不爭之義導教也醜類也又輕侮之比寖以繁滋至有四五百科轉相顧望彌復増甚難以垂之萬載臣聞師言救文莫如質故高帝去煩苛之法為三章之約建初詔書有改於古者可下三公廷尉蠲除其敝議寢不省敏復上疏曰臣敏蒙恩特見㧞擢愚心所不曉迷意所不解誠不敢茍隨衆議臣伏見孔子垂經典臯陶造法律史游急就篇曰臯陶造獄法律存也原其本意皆欲禁民為非也未曉輕侮之法將以何禁必不能使不相輕侮而更開相殺之路執憲之吏復容其姦枉議者或曰平法當先論生臣愚以為天地之性唯人為貴殺人者死三代通制今欲趣生反開殺路一人不死天下受敝記曰利一害百人去城郭夫春生秋殺天道之常春一物枯即為灾禮記月令曰孟春行夏令則風雨不時草木早落也秋一物華即為異月令曰仲秋行春令則秋雨不降草木生榮國乃有恐也王者承天地順四時法聖人從經律願陛下留意下民考尋利害廣令平議天下幸甚和帝從之九年拜司隸校尉視事二歲遷汝南太守清約不煩用刑平正有理能名坐事免延平元年拜議郎再遷潁川太守徵拜司空在位奉法而已視事三歲以病乞身不聼六年春行大射禮陪位頓仆乃策罷之東觀記載䇿曰今君所苦未瘳有司奏君年體衰羸郊廟禮儀仍有曠廢鼎足之任不可以缺重以職事留君其上司空印綬因病篤卒于家胡廣傳胡廣字伯始南郡華容人也華容縣故城在今荆州東六世祖剛清高有志節平帝時大司農馬宫辟之值王莽居攝剛解其衣冠縣府門而去遂亡命交阯隠於屠肆之間後莽敗乃歸鄉里父貢交阯都尉廣少孤貧親執家苦襄陽耆舊記廣父名寵寵妻生廣早卒寵更娶江陵黄氏生康字仲始長大隨輩入郡爲散吏太守法雄之子眞從家來省其父眞頗知人㑹歳終應舉雄勑眞助其求才雄因大㑹諸吏眞自於牗間密占察之乃指廣以白雄遂舉孝亷既到京師試以章奏安帝以廣為天下第一謝承書曰廣有雅才學究五經古今術蓺皆畢覧之年二十七舉孝亷續漢書曰故事孝亷高第三公及尚書輙優文特勞來其舉將於是公府下詔書勞來雄焉及拜郎恪勤職事所掌辨䕶也旬月拜尚書郎五遷尚書僕射順帝欲立皇后而貴人有寵者四人莫知所建議欲探籌以神定選廣與尚書郭䖍史敞上疏諫曰竊見詔書以立后事大謙不自專欲假之籌策决疑靈神篇籍所記祖宗典故未嘗有也恃神任筮既不必當賢就值其人猶非徳選夫岐嶷形於自然詩云克岐克嶷鄭𤣥注云岐岐然意有所知也其貌嶷然有所識别也俔天必有異表俔音苦見反説文曰俔譬諭也詩云文王嘉止俔天之妹文王聞大姒之賢則羙之言大邦有子女譬天之有女弟故求為之配焉宜參良家簡求有徳徳同以年年鈞以貌稽之典經斷之聖慮左傳曰昔先王之命曰王后無嫡則擇立長年鈞以徳徳鈞以􅁲也政令猶汗徃而不反易曰渙汗其大號王居無咎劉向曰汗出而不反者也詔文一下形之四方形見也臣職在拾遺憂深責重是以焦心冒昧陳聞帝從之以梁貴人良家子定立為皇后時尚書令左雄議改察舉之制限年四十以上儒者試經學文吏試章奏廣復與敞䖍上書駮之曰臣聞君以兼覽博照爲德即明四目逹四聰也臣以獻可替否爲忠左傳曰齊晏子曰君所謂可而有否焉臣獻其否以成其可君所謂否而有可焉臣獻其可以去其否書載稽疑謀及卿士稽考也考正疑事謀及卿士見尚書詩羙先人詢于芻蕘詩大雅曰先人有言詢于芻蕘注云詢謀也芻蕘薪采者也言有疑事嘗與薪采者謀之也國有大政必議之於前訓諮之於故老叔向曰國有大事必順於典刑訪於耉老而後行之是以慮無失策舉無過事竊見尚書令左雄議郡舉孝亷皆限年四十以上諸生試章句文吏試牋奏周成雜字曰牋表也漢雜事曰凡羣臣之書通于天子者四品一曰章二曰奏三曰表四曰駮議章者需頭稱稽首上以聞謝恩陳事詣闕通者也奏者亦需頭其京師官但言稽首言下稽首以聞其中有所請若罪法劾案公府送御史臺卿校送謁者臺也表者不需頭上言臣某言下言誠惶誠恐頓首頓首死罪左方下附曰某官臣甲乙上明詔既許復令臣等得與相參竊惟王命之重載在篇典禮記曰動則左史書之言則右史書之尚書曰王言惟作命弗言臣下罔由禀令又曰令出惟行不惟反當令縣於日月固於金石遺則百王施之萬世詩云天難諶斯不易惟王可不慎與詩大雅也諶信也斯語詞天之意難信矣不可改易者天子也蓋選舉因才無拘定制六竒之策不出經學前書陳平設六竒策以佐高祖鄭阿之政非必章奏説苑曰子産相鄭内無國中之亂外無諸侯之患也子產從政也擇能而使之晏子化東阿三年景公召而數之晏子請改道易行明年上計景公迎而賀之晏子對曰臣前之化東阿也屬託不行貨賂不至君反以罪臣今則反是而更蒙賀景公下席而謝甘竒顯用年乖彊仕史記曰秦欲與燕共伐趙以廣河間之地甘羅年十二使於趙説趙王立割五城以廣河間秦乃封羅為上卿説苑曰子奇年十八齊君使主東阿東阿大化禮記曰四十强而仕終賈揚聲亦在弱冠前書終軍年十八為博士弟子自請願以長纓必覊南越王而致之闕下上竒其對擢為諫議大夫徃説越越聽命天子大悦賈誼年十八以誦詩屬文稱於郡中文帝召為博士漢承周秦兼覽殷夏祖徳師經參雜霸軌宣帝曰漢家自有制度本以霸王道雜理之聖主賢臣世以致理貢舉之制莫或回革今以一臣之言剗戾舊章剗削也戾乖也便利未明衆心不猒猒服也矯枉變常政之所重而不訪台司不謀卿士若事下之後議者剥異異之則朝失其便同之則王言已行臣愚以為可宣下百官參其同異然後覽擇勝否詳採厥衷敢以瞽言冒干天禁瞽無目者也不察人君顏色而言如無目之人也孔子曰未見顔色而言謂之瞽干犯也惟陛下納焉帝不從時陳留郡缺職尚書史敞等薦廣曰臣聞德以旌賢旌明也書曰徳懋懋官也爵以建事能建立事則與之爵明試以功典謨所羙明白考試之有功者則授之以官舜典咎繇謩皆有此言故云典謩所羙也五服五章天秩所作五服謂天子諸侯卿大夫士之服也五者之服必湏章明尚書咎繇謨曰天秩有禮自我五禮有庸哉天命有徳五服五章哉秩序也是以臣竭其忠君豐其寵豐厚也舉不失徳下忘其死竊見尚書僕射胡廣體具履規謙虚溫雅博物洽聞探賾窮理六經典奥舊章憲式無所不覽柔而不犯文而有體柔而不犯謂性和柔而不可犯以非義也忠貞之性憂公如家不矜其能不伐其勞翼翼周慎行靡玷漏密勿夙夜密勿黽勉十有餘年心不外顧志不茍進臣等竊以為廣在尚書劬勞日乆後母年老既蒙簡照宜試職千里匡寜方國詩云厥徳不回以受方國陳留近郡今太守任缺廣才略深茂堪能撥煩願以參選紀綱頽俗使束脩守善有所勸仰廣典機事十年出爲濟隂太守以舉吏不實免復爲汝南太守入拜大司農漢安元年遷司徒質帝崩代李固爲太尉録尚書事以定策立桓帝封育陽安樂鄉侯以病遜位又拜司空告老致仕尋以特進徵拜太常遷太尉以日食免復爲太常拜太尉延熹二年大將軍梁冀誅廣與司徒韓縯司空孫朗坐不衞宫皆减死一等奪爵土免爲庶人後拜太中大夫太常九年復拜司徒靈帝立與太傅陳蕃參録尚書事復封故國以病自乞㑹蕃被誅代爲太傅總録如故時年已八十而心力克壯盛𢎞之荆州記曰菊水出穰縣芳菊被涯水極甘香谷中皆飲此水上夀百二十七八十者猶以爲夭太尉胡廣所患風疾休沐南歸恒飲此水後疾遂瘳年八十二薨也繼母在堂朝夕瞻省傍無几杖言不稱老禮記曰夫爲人子者恒言不稱老及母卒居喪盡哀率禮無愆性溫柔謹素常遜言恭色遜順也達練事體明解朝章雖無謇直之風屢有補闕之益故京師諺曰萬事不理問伯始天下中庸有胡公庸常也中和可常行之徳也孔子曰中庸之爲徳其至矣乎及共李固定策大議不全質帝崩固爲太尉與廣及司空趙戒議欲立清河王蒜梁冀以蒜年長有徳恐爲後患盛意立蠡吾侯志廣戒等懾憚不能與爭而固與杜喬堅守本議劉攽曰大議不全案文議當作義又與中常侍丁肅婚姻以此譏毁於時自在公台三十餘年歴事六帝廣以順帝漢安元年為司空至靈帝熹平元年薨三十一年也六帝謂安順冲質桓靈也禮任甚優每遜位辭病及免退田里未嘗滿嵗輙復升進凡一履司空再作司徒三登太尉又爲太傅其所辟命皆天下名士與故吏陳蕃李咸並爲三司謝承書曰咸字元卓汝南西平人孤特自立家貧母老常躬耕稼以奉養學魯詩春秋公羊傳三禮三府並辟司徒胡廣舉茂才除高密令政多竒異青州表其狀建寜三年自大鴻臚拜太尉自在相位約身率下常食脫粟飯醤菜而已不與州郡交通刺史二千石牋記非公亊不發省以老乞骸骨見許悉還所賜物乘敝牛車使子男御晨發京師百僚追送盈塗不能得見家舊貧狹庇䕃草廬蕃等每朝㑹輙稱疾避廣時人榮之年八十二熹平元年薨使五官中郎將持節奉策贈太傅安樂鄉侯印綬給東園梓器謁者䕶喪賜冡塋于原陵諡文恭侯拜家一人爲郎中故吏自公卿大夫博士議郎以下數百人皆縗絰殯位自終及葬漢興以來人臣之盛未嘗有也初揚雄依虞箴作十二州二十五官箴揚雄傳曰箴莫大於虞箴故遂作九州箴左傳曰昔周辛甲之爲太史也命百官官箴王闕於虞人之箴曰芒芒禹迹畫爲九州經啟九道人有寢廟獸有茂草各有攸處徳用不擾在帝夷羿冒于原獸忘其國恤而思其麀牡武不可重用不恢于夏家獸臣司原敢告僕夫其九箴亡闕後涿郡崔駰及子瑗又臨邑侯劉騊駼増補十六篇廣復繼作四篇文甚典羙乃悉撰次首目爲之解釋名曰百官箴凡四十八篇其餘所著詩賦銘頌箴弔及諸解詁凡二十二篇熹平六年靈帝思感舊德乃圖畫廣及太尉黄瓊於省内詔議郎蔡邕爲其頌云謝承書載其頌曰巖巖山嶽配天作輔降神有周生申及甫允兹漢室誕育二后曰胡曰黄方軌齊武惟道之淵惟徳之藪股肱元首代作心膂天之烝人有則有類我胡我黄鍾厥純懿巍巍特進仍踐其位赫赫三事七佩其紱弈弈四牡沃若六轡衮職龍章其文有蔚參曜乾台窮寵極貴功加八荒羣生以遂超哉邈乎莫與爲二論曰爵任之於人重矣全喪之於生大矣懐禄以圖存者仕子之恒情審能而就列者出身之常體列位也夫紆於物則非已直於志則犯俗紆曲也辭其艱則乖義狥其節則失身狥營也綂之方軌易因險塗難御綂者總論上事也方軌謂平路也若履平路易可因循如踐險塗則難免顚覆也故昔人明慎於所受之分遲遲於岐路之間也呈材效職則受之分明矣遲遲疑不前之貌也明其分則不可妄進劉攽曰注呈材效職案文呈當作程又則受之分明矣當云則所受之分明矣如令志行無牽於物臨生不先其存後世何貶焉守志直道視死如歸則後之人何從而貶責矣古人以宴安爲戒豈數公之謂乎左傳曰宴安酖毒不可懐也贊曰鄧張作傳無咎無譽敏正疑律防議章句胡公庸庸餙情恭貌朝章雖理據正或橈橈曲也易曰棟橈凶也後漢書卷七十四後漢書卷七十四考證鄧彪傳天子親臨弔臨諸本同臣㑹汾按上臨字疑衍張禹傳封安鄉侯何焯校本云漢有兩張禹一安昌一安鄉徐防傳凡三公以災異策免始自防也監本脱去凡三公以災異策免八字從諸本増後漢書卷七十四考證
