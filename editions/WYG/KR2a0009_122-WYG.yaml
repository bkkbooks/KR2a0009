body:
  text: 後漢書注補志序梁剡令劉昭臣昭曰昔司馬遷作史記爰建八書班固因廣是曰十志天人經緯帝政紘維區分源奥開廓著述創藏山之秘寳肇刋石之遐貫誠有繁於春秋亦自敏於改作至乎永平執簡東觀紀傳雖􅂋書志未聞推檢舊記先有地理張衡欲存炳發未有成功靈憲精逺天文已煥自蔡邕大𢎞鳴條寔多紹宣協妙元卓律厯以詳承洽伯始禮儀克舉郊廟社稷祭祀該明輪騑冠章車服贍列於是應譙纉其業董巴襲其軌司馬續書總為八志律歴之篇仍乎洪邕所構車服之本即依董蔡所立儀祀得於往制百官就乎故簿並籍據前脩以濟一家者也王教之要國典之源粲然略備可得而知矣既接繼班書通其流貫體裁淵深雖難踰等序致膚約有傷懸越後之名史弗能罷意叔駿之書是謂十典矜緩殺青竟亦不成二子平業俱稱麗富華轍亂亡典則偕泯雅言邃義於是俱絶沈松因循尤解功創時改見句非更捜求加藝文以矯前棄流書品採自近録初平永嘉圗籍焚喪塵消煙滅焉識其限借南晉之新虚為東漢之故實是以學者亦無取焉范曄後漢良誠跨衆氏序或未周志遂全闕國史鴻曠須寄勤閑天才富博猶俟改具若草昩厥始無相憑據窮其身世少能已畢遷有承考之言固深資父之力太初以前班用馬史十志所因寔多往制升入校部出二十載續志昭表以助其間成父述者夫何易哉况曄思雜風塵心撓成毁弗克員就豈以兹乎夫辭潤婉贍可得起改覈求見事必應寫襲故序例所論備精與奪及語八志頗襃其美雖出拔前羣歸相㳂也又尋本書當作禮樂志其天文五行百官車服為名則同此外諸篇不著紀傳律厯郡國必依往式曄遺書自序應徧作諸志前漢有者悉欲備製卷中發論以正得失書雖未明其大㫖也曾臺雲構所缺過乎榱桷為山霞髙不終踰乎一㙺鬰絶斯作吁可痛哉徒懐纉緝理慙鈎逺廼借舊志注以補之狹見寡陋匪同博逺及其所值微得論列分為三十卷以合范史求於齊工孰曰文類比兹闕恨庶賢乎已昔褚先生補子長之削少馬氏接孟堅之不畢相成之義古有之矣引彼先志又何猜焉而嵗代逾邈立言湮散義存廣求一隅未覿兼鍾律之妙素揖校讎參厯算之微有慙證辨星候祕阻圖緯藏嚴是須甄明每用疑略時或有見頗邀傍遇非覧正部事乖詳宻今令行禁止此書外絶其有疏漏諒不足誚
