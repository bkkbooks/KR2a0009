body:
  text: 後漢書卷七十上宋宣城太守范煜撰唐章懐太子賢注班彪列傳第三十上自東都主人以下分為下卷班彪傳子固班彪字叔皮扶風安陵人也祖況成帝時為越騎校尉父稚哀帝時為廣平太守廣平郡今洺州永平縣也隋室諱廣改焉彪性沈重好古年二十餘更始敗三輔大亂時隗囂擁衆天水彪乃避難從之囂問彪曰往者周亡戰國並争天下分裂數世然後定意者従横之事復起于今乎將承運迭興在於一人也願生試論之對曰周之廢興與漢殊異昔周爵五等諸侯従政本根既微枝葉彊大故其末流有従横之事勢數然也漢承秦制改立郡縣主有専已之威臣無百年之柄至於成帝假借外家外家謂王鳳王商䓁並輔政領尚書事也哀平短祚國嗣三絶哀帝在位六年平帝在位五年故曰短祚成哀平俱無子是三絶也故王氏擅朝因竊位號危自上起傷不及下成帝威權借于外家是危自上起也漢徳無害于百姓是傷不及下也是以即真之後天下莫不引領而歎十餘年間中外騷擾逺近俱發假號雲合咸稱劉氏不謀同辭謂王郎盧芳等並詐稱劉氏也方今雄傑帶州域者皆無七國世業之資而百姓謳吟思仰漢徳已可知矣囂曰生言周漢之勢可也至於但見愚人習識劉氏姓號之故而謂漢家復興踈矣昔秦失其鹿劉季逐而羈之時人復知漢乎太公六韜曰取天下如逐鹿鹿得天下共分其肉也彪旣疾囂言又傷時方艱乃著王命論以為漢徳承堯有靈命之符王者興祚非詐力所致欲以感之而囂終不寤遂避地河西河西大將軍竇融以為従事深敬待之接以師友之道彪乃為融畫䇿事漢總河西以拒隗囂及融徵還亰師光武問曰所上章奏誰與叅之融對曰皆従事班彪所為帝雅聞彪材因召入見舉司𨽻茂才拜徐令以病免司𨽻舉為茂才也徐縣屬臨淮郡後數應三公之命輙去彪旣才髙而好述作遂専心史籍之間武帝時司馬遷著史記自太初以後闕而不錄太初武帝年號後好事者頗㦯綴集時事然多鄙俗不足以踵繼其書好事者謂揚雄劉歆陽城衡褚少孫史孝山之徒也彪乃繼採前史遺事傍貫異聞作後傳數十篇因斟酌前史而譏正得失其略論曰唐虞三代詩書所及世有史官以司典籍禮記曰動則左史書之言則右史書之見于史籍者夏太史終古殷太史向摯周太史儋也見呂氏春秋暨於諸侯國自有史左傳魯季孫召外史掌惡臣衛史華龍滑曰我太史也楚有左史倚相故孟子曰楚之檮杌晉之乘魯之春秋其事一也乘者興于田賦乘馬之事檮杌者嚚凶之類興于記惡之誡春秋以二始舉四時以記萬事遂各因以為名其記事一也見趙岐孟子注定哀之間魯定公哀公也魯君子左丘眀論集其文作左氏傳三十篇又撰異同號曰國語二十篇由是乘檮杌之事遂闇不行于時為闇也其書今亡而左氏國語獨章又有記錄黄帝以來至春秋時帝王公侯卿大夫號曰世本一十五篇春秋之後七國並争秦幷諸侯則有戰國䇿三十三篇漢興定天下太中大夫陸賈記錄時功作楚漢春秋九篇孝武之世太史令司馬遷採左氏國語刪世本戰國䇿據楚漢列國時事上自黄帝下訖獲麟武帝泰始二年登隴首獲白麟遷作史記絶筆于此年也作本紀世家列傳書表凡百三十篇而十篇缺焉十篇謂遷歿之後亡景紀武紀禮書樂書兵書将相年表日者傳三王世家龜策傳傅靳列傳遷之所記従漢元至武以絶則其功也至於採經摭傳分散百家之事甚多踈略不如其本務欲以多聞廣載為功論議淺而不篤其論術學則崇黄老而薄五經黄帝老子道家也五經儒家也遷序傳曰道家使人精神専一動合無形贍足萬物此謂崇黄老也又曰儒者博而寡要勞而少功此為薄五經也序貨殖則輕仁義而羞貧窮史記貨殖傳序曰家貧親老妻子輭弱嵗時無以祭祀飲食被服不足以自適如此不慙耻則無所比矣無巖處竒士之行而長貧賤語仁義亦足羞也道㳺俠則賤守節而貴俗功史記㳺俠傳序曰季次原憲行君子之徳義不苟合當世當世亦笑之終身空室蓬户褐衣疏食不厭今㳺狹其行雖不軌于正義然其言必信其行必果已諾必誠不愛其軀赴士之戹盖有足道者今拘學或抱咫尺之義久孤于世豈若卑論齊俗與世沈浮而取榮名哉此其大敝傷道所以遇極刑之咎也極刑謂遷被腐刑也遷與任安書曰最下腐刑極矣然善述序事理辯而不華質而不俚文質相稱蓋良史之才也誠令遷依五經之法言同聖人之是非意亦庶幾矣易曰顔氏之子其殆庶幾乎夫百家之書猶可法也若左氏國語世本戰國䇿楚漢春秋太史公書今之所以知古後之所由觀前聖人之耳目也司馬遷序帝王則曰本紀公侯傳國則曰世家卿士特起則曰列傳又進項羽陳渉而黜淮南衡山謂遷著項羽本紀又陳渉起于隴畝數月被殺無子孫相繼者為世家淮南衡山漢室之王𦙍當世家而編之列傳言進退之失也細意委曲條例不經若遷之著作採獲古今貫穿經傳至廣博也一人之精文重思煩故其書刋落不盡尚有盈辭多不齊一刋削也謂削落繁蕪仍有不盡若序司馬相如舉郡縣著其字至蕭曹陳平之屬及董仲舒並時之人不記其字㦯縣而不郡者盖不暇也史記衛靑者平陽人也張釋之堵陽人並不顯郡之類也今此後篇慎覈其事整齊其文不為世家惟紀傳而已傳曰殺史見極平易正直春秋之義也彪復辟司徒玊況府玊音肅時東宮初建諸王國並開建武二十三年玊況為司徒十九年建眀帝為太子十七年封諸王而官屬未備師保多闕彪上言曰孔子稱性相近習相逺也見論語賈誼以為習與善人居不能無為善猶生長于齊不能無齊言也習與惡人居不能無惡猶生長于楚不能無楚言也賈誼上疏之辭是以聖人審所與居而戒慎所習昔成王之為孺子出則周公召公太公史佚入則太顛閎夭南宫括散宜生左右前後禮無違者左傳曰自郊勞至于贈賄禮無違者故成王一日即位天下曠然太平是以春秋愛子教以義方不納於邪驕奢滛佚所自邪也左傳衛大夫石碏諌衛莊公之辭也詩云詒厥孫謀以宴翼子言武王之謀遺子孫也詩大雅也詒遺也宴安也翼敬也言文王遺其孫以善謀武王以安敬之道遺其子子謂成王也漢興太宗使鼂錯導太子以法術文帝時鼂錯為博士上言曰人主所以顯功揚名者以知術數也今皇太子所讀書多矣而未知術數願陛下擇聖人之術以賜太子上善之拜錯為太子家令賈誼教梁王以詩書賈誼為梁王太傅梁王文帝之少子名揖愛而好書故令誼傅之及至中宗亦令劉向王褒蕭望之周堪之徒以文章儒學保訓東宫以下中宗宣帝也時元帝為太子宣帝使王褒劉向張子僑等之太子宫娛侍太子朝夕讀誦蕭望之為太傅周堪為少傅並見前書莫不崇簡其人就成徳器今皇太子諸王雖結髮學問脩習禮樂而傅相未置賢才官屬多闕舊典宜博選名儒有威重明通政事者以為太子太傅東宮及諸王國備置官屬又舊制太子食湯沐十縣設周衛交㦸五日一朝因坐東箱省視膳食其非朝日使僕中允旦旦請問而已眀不媟黷廣其敬也漢官儀曰皇太子五日一至臺因坐東箱省視膳食以法制勑太官尚食宰吏其非朝曰使僕中允旦旦請問眀不媟黷所以廣敬也太子僕一人秩千石中允一人四百石主門衛徼廵書奏帝納之後察司徒㢘為望都長吏民愛之察舉也司徒薦為㢘建武三十年年五十二卒官所著賦論書記奏事合九篇二子固超超别有傳論曰班彪以通儒上才傾側危亂之間行不踰方論語孔子曰可謂仁之方鄭𤣥注云方猶道也言不失正仕不急進貞不違人敷文華以緯國典守賤薄而無悶容彼將以世運未𢎞非所謂賤焉耻乎何其守道恬淡之篤也孔子曰邦有道貧且賤焉耻也言彪當中興之初時運未泰故不以貧賤為耻何守道清静之固也恬淡猶清静也篤固也固字孟堅年九嵗能屬文誦詩書及長遂博貫載籍九流百家之言無不窮究九流謂道儒墨名法隂陽農術縦横所學無常師不為章句舉大義而已性寛和容衆不以才能高人諸儒以此慕之謝承書曰固年十三王充見之拊其背謂彪曰此兒必記漢事永平初東平王蒼以至戚為驃騎将軍輔政開東閣延英雄時固始弱冠奏記說蒼曰奏進也記書也前書待詔鄭朋奏記于蕭望之奏記自朋始也将軍以周召之徳立乎本朝承休眀之䇿建威靈之號號驃騎将軍也昔在周公今也将軍詩書所載未有三此者也惟蒼與周公二人而已傳曰必有非常之人然後有非常之事有非常之事然後有非常之功司馬相如喻蜀之辭固幸得生于清眀之世豫在視聴之末私以螻螘竊觀國政螻螘謂細㣲也誠羙将軍擁千載之任躡先聖之蹤千載謂自周公至眀帝時千餘載也先聖謂周公也體𢎞懿之姿據髙眀之勢博貫世事服膺六藝白黑簡心求善無厭淮南子曰聖人見是非若白黑之别于目左傳曰求善不厭也採擇狂夫之言不逆負薪之議負薪賤人也三畧曰負薪之語廊廟之言也竊見幕府新開廣延羣俊四方之士顛倒衣裳詩曰東方未眀顛倒衣裳言士争歸之急遽也将軍宜詳唐殷之舉察伊臯之薦舜舉臯陶湯舉伊尹令逺近無偏幽隐必達期於總覧賢才收集眀智為國得人以寧本朝則将軍飬志和神優㳺廟堂光眀宣於當世遺烈著于無窮竊見故司空掾桓梁宿儒盛名冠徳州里七十従心行不踰矩論語孔子曰七十而従心所欲不踰矩言恣心之所為皆闇合於法則盖清廟之光輝當世之俊彦也詩周頌曰於穆清廟肅雍顯相濟濟多士秉文之徳鄭𤣥注曰顯光也言桓梁可參多士助祭于清廟為光輝也爾雅曰髦俊也羙士為彦亰兆祭酒晉馮結髮脩身白首無違好古樂道𤣥默自守古人之羙行時俗所莫及扶風掾李育育字元春見儒林傳經眀行著教授百人客居杜陵茅室土階亰兆扶風二郡更請徒以家貧數辭病去温故知新論議通眀㢘清修潔行能純備雖前世名儒國家所器韋平孔翟無以加焉韋賢平當孔光翟方進也流俗本平字作𤣥誤宜令考績以叅萬事亰兆督郵郭基孝行著於州里經學稱於師門政務之績有絶異之效如得及眀時秉事下僚進有羽翮奮翔之用退有杞梁一介之死說苑曰趙簡子㳺于西河而嘆曰安得賢士而與處焉舟人吉桑對曰鴻鵠髙飛所恃者六翮也背上之毛腹下之毳加之滿把飛不能為之益髙不知門下左右客千人亦有六翮之用乎将盡毛毳也又曰齊荘公攻莒杞梁與華周進鬬壊軍陷陣三軍不敢當至莒城下殺二十七人而死也涼州従事王雍躬卞嚴之節文之以術藝卞嚴卞荘子也新序曰卞荘子好勇飬母戰而三北交㳺非之國君辱之荘子受命顔色不變及母死三年齊與魯戰荘子請従至見于将軍曰初獨與母處是以戰而三北今母歿矣請塞責遂赴敵而鬬獲甲首而獻曰夫三北以飬母也吾聞之莭士不以辱生遂殺十人而死論語孔子曰卞荘子之勇冉求之藝文之以禮樂涼州冠蓋未有宜先雍者也古者周公一舉則三方怨曰奚為而後已孫卿子曰周公東征西國怨曰何獨不來也南征而北國怨曰何獨後我也宜及府開以慰逺方𢎞農功曹史殷肅固集殷作叚達學洽聞才能絶倫誦詩三百奉使専對此六子者皆有殊行絶才徳隆當世如蒙徵納以輔髙眀此山梁之秋夫子所為歎也秋猶時也論語孔子曰山梁雌雉時哉昔卞和獻寳以離㫁趾離被也斷趾刖足也事見韓子靈均納忠終於沈身屈原字靈均納忠于楚終不見信自沈于汨羅之水而死而和氏之璧千載垂光屈子之篇萬世歸善願将軍隆照微之眀信日昃之聴信音申少屈威神咨嗟下問令塵埃之中永無荆山汨羅之恨蒼納之父彪卒歸鄉里固以彪所續前史未詳乃潜精研思欲就其業旣而有人上書顯宗告固私改作國史者有詔下郡收固繫亰兆獄盡取其家書先是扶風人蘇朗偽言圖䜟事下獄死固弟超恐固為郡所覈考不能自眀乃馳詣闕上書得召見具言固所著述意而郡亦上其書顯宗甚竒之召詣校書部前書固叙傳曰永平中為郎典校秘書除蘭臺令史漢官儀曰蘭臺令史六人秩百石掌書劾奏與前雎陽令陳宗長陵令尹敏司𨽻従事孟異共成世祖本紀遷為郎典校秘書固又撰功臣平林新市公孫述事作列傳載記二十八篇奏之帝乃復使終成前所著書固以為漢紹堯運以建帝業至於六世史臣六代謂武帝史臣謂司馬遷也乃追述功徳私作本紀編於百王之末厠於秦項之列史記起自黄帝漢最居其末也太初以後闕而不錄故探撰前紀綴集所聞以為漢書起元髙祖終于孝平王莽之誅十有二世二百三十年高惠呂后文景武昭宣元成哀平十二代也幷王莽合二百三十年綜其行事旁貫五經上下洽通為春秋考紀表志傳凡百篇紀十二表八志十列傳七十合百萹前書音義曰春秋考紀謂帝紀也言考覈時事具四時以立言如春秋之經固自永平中始受詔潜精積思二十餘年至建初中乃成當世甚重其書學者莫不諷誦焉自為郎後遂見親近時亰師脩起宮室濬繕城隍而闗中耆老猶望朝廷西顧固感前世相如壽王東方之徒造搆文辭終以諷勸相如作上林子虚賦吾丘壽王作士大夫論及驃騎将軍頌東方朔作客難及非有先生論其辝並以諷諭為主也乃上兩都賦盛稱洛邑制度之羙以折西賔淫侈之論其辭曰有西都賔問於東都主人曰中興都洛陽故以東都為主而謂西都為賔也盖聞皇漢之初經營也嘗有意乎都河洛矣輟而弗康實用西遷作我上都主人聞其故而覩其制乎皇大也尚書曰厥既得吉卜則經營高祖五年婁敬說上都闗中上疑之左右大臣皆山東人多勸都洛陽此為有意都河洛矣張良曰洛陽其中小不過數百里四面受敵非用武之國關中金城千里天府之國也於是上即日西都關中此為輟而弗康也輟止也康安也主人曰未也願賔據懐舊之蓄念發思古之幽情廣雅曰攄舒也博我以皇道𢎞我以漢亰賔曰唯唯漢之西都在于雍州實曰長安前書音義曰長安本秦之鄉名髙祖都焉左據函谷二崤之阻表以泰華終南之山函谷關名也左傳曰崤有二陵其南陵夏后臯之墓其北陵文王之所避風雨故曰二崤太華山也山海經曰華首之西六十里曰太華終南長安南山也詩曰終南何有注云終南周之名山中南也右界襃斜隴首之險帶以洪河涇渭之川襃斜谷名南口曰襃北口曰斜在今梁州隴首山名在今秦州洪大也華實之毛則九州之上腴焉防禦之阻則天下之奥區焉華實之毛謂草木也左傳曰食土之毛前書曰秦地九州膏腴尚書雍州厥田上上防禦謂闗禁也揚雄衛尉箴曰設置山險盡為防禦奥深也言秦地險固為天下深奥之區域是故横被六合三成帝畿前書音義曰闗西為横被猶及也呂氏春秋曰神眀通于六合髙誘注云四方上下為六合周禮曰方千里曰王畿三成謂周秦漢並都之也周以龍興秦以虎視及至大漢受命而都之也龍興虎視喻盛彊也孔安國尚書序曰漢室龍興易曰虎視耽耽仰寤東井之精俯協河圖之靈寤猶曉也協合也髙祖至覇上五星聚于東井又河圖曰帝劉季日角戴勝斗匈龍股長七尺八寸昌光出軫五星聚井期之興天授圖地出道予張兵鈐劉季起東井秦之分野眀漢當代秦都關中奉春建䇿留侯演成奉春君婁敬也春者四時之始婁敬亦始建遷都之䇿故以號焉留侯張良也蒼頡篇曰演者引也天人合應以發皇眀乃眷西頋實惟作京天謂五星聚東井也人謂婁敬等進說也皇明謂髙祖也西頋謂入關也詩云乃眷西顧於是睎秦嶺睋北阜挾酆霸據龍首睎望也音希睋視也音蛾秦嶺在今藍田東南北阜即今三原縣北有髙阜東西横亘者是也酆水出鄠縣南山豐谷霸水出藍田谷三秦記曰龍首山六十里頭入渭水尾達樊川在傍曰挾在上曰據也圖皇基於億載度宏規而大起肇自髙而終平世增飾以崇麗歴十二之延祚故窮奢而極侈肇始也始自高祖終於平帝為十二代也建金城其萬雉呀周池而成淵披三條之廣路立十二之通門金城言堅固也張良曰金城千里杜預注左傳云方丈為堵三堵為雉字林曰呀大空也音火加反周禮國方九里旁三門每門為大路故曰三條鄭𤣥注周禮云司門若今城門校尉主王城十二門也内則街衢洞達閭閻且千九市開場貨别隧分人不得頋車不得旋闐城溢郭傍流百廛紅塵四合煙雲相連字林曰閭里門也閻里中門也且千言多也漢宮闕疏曰長安九市其六在道西三在道東隧列肆道也鄭𤣥注禮記曰廛市邸舍也於是旣庶且富娛樂無疆都人士女殊異乎五方㳺士擬於公侯列肆侈於姫姜論語子適衛冉有僕子曰庶矣哉冉有曰既庶矣又何加焉曰富之詩周頌云惠我無疆疆境也詩小雅曰彼都人士毛萇注云城郭之域曰都五方謂四方及中央也前書曰秦地三方雜錯鄭𤣥注周禮曰肆市中陳物處也杜元凱注左傳云姫姜大國之女也鄉曲豪俊㳺俠之雄節慕原嘗名亞春陵連交合衆騁騖乎其中豪俊㳺俠謂朱家郭觧原渉之類也原嘗謂平原君趙勝孟嘗君田文也春陵謂春申君黄歇信陵君無忌也並招致賔客名髙天下也若乃觀其四郊浮游近縣則南望杜霸北眺五陵名都對郭邑居相承英俊之域黻冕所興冠蓋如雲七相五公浮游謂周流也杜霸謂杜陵霸陵在城南故南望也五陵謂長陵安陵陽陵茂陵平陵在渭北故北眺也並徙人以置縣邑故云名都對郭蒼頡篇曰黻綬也冕冠也其所徙者皆豪右富貲吏二千石故多英俊冠盖之人如雲言多也詩云出其東門有女如雲七相謂丞相車千秋長陵人黄霸王商並杜陵人也韋賢平當魏相王嘉並平陵人也五公謂田蚡為太尉長陵人張安世為大司馬朱博為司空並杜陵人平晏為司徒韋賢為大司馬並平陵人也與乎州郡之豪傑五都之貨殖三選七遷充奉陵邑蓋以彊幹弱枝隆上都而觀萬國前書音義曰五都謂洛陽邯鄲臨淄宛成都也三選選三等之人謂徙吏二千石及髙貲富人及豪傑幷兼之家於諸陵盖以彊幹弱枝非獨為奉山園也見前書自元帝已後不遷故唯七焉爾雅曰觀指示也選㦯為徙義亦通封畿之内厥土千里逴犖諸夏兼其所有前書曰秦地沃野千里人以富饒逴犖猶超絶也逴音卓犖音呂角反諸夏謂中國也其陽則崇山隐天幽林穹谷陸海珍蔵藍田羙玉商洛緣其隈鄠杜濵其足穹谷深谷東方朔曰漢興去三河之地止灞滻之西都涇渭之南此謂天下陸海之地也范子計然曰玉出藍田商及上洛皆縣名隈山曲也濵猶近也鄠杜二縣名近南山之足爾雅云麓山足也源泉灌注陂池交屬竹林果園芳草甘木郊野之富號曰近蜀孔安國注尚書曰澤障曰陂停水曰池前書曰巴蜀土肥羙有山林竹樹蔬食果實之饒今南山亦有之與巴蜀相類故曰近蜀爾雅曰邑外曰郊郊外曰野其隂則冠以九嵕陪以甘泉乃有靈宮起乎其中秦漢之所極觀淵雲之所頌歎於是乎存焉陰謂北也九嵕山尤髙峻故稱冠云甘泉山在雲陽北秦始皇於上置林光宮漢又起甘泉宮益壽延壽館通天臺故云秦漢之所極觀王褒字子淵作甘泉頌揚子雲作甘泉賦故云淵雲頌歎下有鄭白之沃衣食之源隄封五萬疆埸綺分溝塍刻鏤原隰龍鱗决渠降雨荷臿成雲五穀垂頴桑麻敷棻史記曰韓使水工鄭國說秦令引涇水為渠傍北山東注洛溉田四萬餘頃名曰鄭國渠武帝時趙中大夫白公奏穿渠引涇水首起谷口尾入櫟陽溉田四千餘頃因名白渠時人歌之曰田於何所池陽谷口鄭國在前白渠起後舉臿為雲决渠為兩涇水一石其泥數斗且溉且糞長我禾黍衣食亰師億萬之口前書曰天子畿方千里隄封百萬井音義曰隄謂積土為封限也音丁兮反廣雅曰埸界也音亦周禮曰夫間有遂十夫有溝說文曰塍田畦也音繩刻鏤謂交錯如鏤也爾雅曰髙平曰原下濕曰隰言如龍鱗之五色也五榖黍稷菽麥稻也爾雅曰禾穗謂之頴爾雅曰敷布也棻茂盛也音芬東郊則有通溝大漕潰渭洞河泛舟山東控引淮湖與海通波漕水運也蒼頡篇曰潰傍決也前書武帝穿漕渠通渭史記曰滎陽下引河東南為鴻溝以與淮泗㑹西郊則有上囿禁苑林麓藪澤陂池連乎蜀漢繚以周墻四百餘里離宮别館三十六所神池靈沼徃往而在上囿謂上林苑也榖梁傳曰林屬于山為麓鄭𤣥注周禮曰澤無水曰藪繚猶繞也音了三輔黄圖曰上林有建章承光等一十一宮平樂蘭觀等二十五凡三十六所三秦記曰昆眀池中有神池通白鹿原詩曰王在靈沼其中乃有九真之麟大宛之馬黄支之犀條枝之鳥踰崐崘越巨海殊方異類至三萬里宣帝詔曰九真郡獻竒獸晋灼漢書注云駒形麟色牛角武帝時李廣利斬大宛王首獲汗血馬來又黄支國自三萬里貢生犀條枝國臨西海有大鳥卵如甕條枝與安息接武帝時安息國發使來獻之又曰崑崙山髙二千五百里並見前書其宮室也體象乎天地經緯乎隂陽據坤靈之正位放泰紫之圎方圎象天方象地南北為經東西為緯揚雄司空箴曰普彼坤靈侔天作合放象也太紫謂太微紫宮也劉向七畧曰眀堂之制内有太室象紫宮南出明堂象太微春秋合誠圖曰太微其星十二四方史記天官書曰環之匡衛十二星藩臣皆曰紫宮是太微方而紫宮圎也樹中天之華闕豐冠山之朱堂因瑰材而䆒竒抗應龍之虹梁列棼橑以布翼荷棟桴而高驤列子曰周穆王作中天之臺說文曰闕門觀也前書簫何作東闕北闕豐大也冠山謂在山之上也埤蒼曰瑰瑋珍竒也廣雅曰有翼曰應龍梁作應龍之形而又曲如虹也説文曰棼複屋之棟橑椽也翼屋之四阿也荷負也驤舉也爾雅曰棟謂之桴音浮雕玉瑱以居楹裁金璧以飾璫發五色之渥采光爓朗以景彰廣雅曰瑱礩也音田瑱與磌通楹柱也雕玉為礩以承柱也上林賦曰華榱璧璫韋昭注曰璫榱頭也渥光潤也爓音豔於是左墄右平重軒三階閨房周通門闥洞開列鍾虡於中庭立金人於端闈仍増崖而衡閾臨峻路而啟扉摯虞决疑要注曰墄者為階級平者以文塼相亞次也域亦作墄言階級勒墄然音七則反王逸楚辭注曰軒樓板也周禮夏后氏世室九階鄭𤣥注云南靣三階三靣各二也爾雅曰宮中之門謂之闈小者謂之闥簴以懸鍾也史記秦始皇收天下兵器聚之咸陽銷以為金人十二置宮中端闈宫正門也三輔黄圖曰秦宮殿端門四達以則紫宮仍因也衡横也閾門限劉攽曰注域亦作墄案文當云亦作域言墄字有作域者也下又云墄言階級勒墄是觧墄義耳徇以離殿别寝承以崇臺閒館煥若列星紫宮是環徇猶繞也崇髙也閒音閑煥明也言周回宮館眀若列星之環繞紫宮也環協韻音宦清凉宣溫神僊長年金華玉堂白虎麒麟區宇若兹不可殫論三輔黄圖曰未央宮有清涼殿宣室殿中溫室殿金華殿大玉堂殿中白虎殿麒麟殿長樂宮有神仙殿殫盡也増槃業峨登降炤爛殊形詭制每各異觀乘茵歩輦唯所息宴増重也槃屈也業峨髙也業音五臘反峨音我詭異也茵褥也駕人曰輦後宮則有掖庭椒房后妃之室合歡増成安處常寕茝若椒風披香發越蘭林蕙草鴛鸞飛翔之列漢官儀曰婕妤以下皆居掖庭三輔黄圖曰長樂宮有椒房殿前書曰班婕妤居増成舍桓譚新論曰董賢女弟為昭儀居舍號曰椒風漢宮闕名長安有披香殿鴛鸞殿飛翔殿餘未詳昭陽特盛隆乎孝成屋不呈材墻不露形裛以藻繡絡以綸連隨侯眀月錯落其間金釭銜璧是為列錢翡翠火齊流燿含英懸黎垂棘夜光在焉昭陽殿成帝趙昭儀所居也說文曰裛纏也音於業反綸紏青絲綬也綸㦯作編淮南子曰隨侯之珠和氏之璧高誘注云隨侯行見大蛇傷以藥傅之後蛇銜珠以報之因曰隨侯珠說文曰釭轂鐡也音江又音工謂以黄金為釭其中銜璧納之于壁帶為行列歴歴如錢也前書曰昭陽殿壁帶徃徃為黄金釭函藍田玉璧明珠翠羽飾之異物志曰翠鳥形如燕赤而雄曰翡青而雌曰翠其羽可以飾愇帳韻集曰火齊珠也戰國策曰應侯謂秦王曰梁有懸黎左傳曰晉荀息請以垂棘之璧假道于虞言懸黎垂棘之玉並夜有光輝也於是𤣥墀釦切玉階彤庭碝磩采緻琳珉青熒珊瑚碧樹周阿而生前書曰昭陽殿中庭彤朱而殿上髹漆髹音休漆黒故曰𤣥墀殿上地也又曰切皆銅沓黄金塗白玉階釦音口碝磩琳珉並石次玉者碝音而兗反磩音戚綵緻其文理宻也青熒其光色也漢武故事曰武帝起神堂植玉樹茸珊瑚為枝以碧玉為葉淮南子曰崑崙山有碧樹在其北高誘注云碧青石也謂以珠玉假為樹而植之於殿曲阿曲也紅羅颯纚綺組繽紛精曜華燭俯仰如神薛綜注西亰賦曰颯纚長袖貌颯音素合反纚音山綺反綺文繒也組綬也繽紛盛貌燭照也言精彩華飾照曜也戰國䇿張儀謂秦王曰彼周鄭之女粉白黛黑立於衢非知而見之者以為神也後宮之號十有四位窈窕繁華更盛迭貴處乎斯列者蓋以百數前書曰漢興因秦之稱號正嫡稱皇后妾皆稱夫人凡十四等有昭儀婕妤娙娥傛華羙人八子充衣七子良人長使少使五官順常是為十三等又有無涓共和娛靈保林良使夜者秩祿同共為一等合十四位也窈窕幽閑也繁華美麗也百數謂以百而數之也左右廷中朝堂百僚之位蕭曹魏邴謀謨乎其上蕭何曹參並沛人魏相字弱翁濟隂人邴吉字少卿魯國人並為丞相佐命則垂統輔翼則成化流大漢之愷悌蕩亡秦之毒螫李陵書曰其餘佐命立功之士司馬相如曰垂統理順易繼也統業也禮記曰保者慎其身以輔翼之愷樂也悌易也揚雄長楊賦曰今朝廷出愷悌行簡易王褒四子講徳論曰秦之處位任政者並施毒螫前書曰孝惠髙后之時海内得離戰國之苦君臣俱欲無為而天下晏然衣食滋殖又曰近觀漢相髙祖開基蕭曹為冠孝宣中興邴魏有聲是時黜陟有序衆職修理公卿多稱其位海内興于禮譲也故令斯人揚和樂之聲作畫一之歌功徳著於祖宗膏澤洽於黎庶孔叢子曰古之帝王功成作樂其功善者其樂和前書曰蕭何薨曹参代之百姓歌之曰蕭何為法較若畫一曹参代之守而弗失祖宗謂髙祖中宗也又有天祿石渠典籍之府命夫諄誨故老名儒師傅講論乎六藝稽合乎同異三輔故事曰天祿石渠並閣名在未央宮北以閣祕書諄誨謂殷勤教告也詩大雅曰誨爾諄諄鄭𤣥注云我教告王口語諄諄然諄音之純反六蓺謂詩書禮樂易春秋也稽考也前書甘露中詔諸儒講五經同異令蕭望之平奏其議又有承眀金馬著作之庭大雅宏逹於兹為羣元元本本周見洽聞啟發篇章校理秘文承明殿前之廬也金馬署名也門有銅馬故名金馬門待詔者皆居之宏亦大也元其元本其本秘文秘書也孝經鉤命決曰丘掇秘文也周以鉤陳之位衛以嚴更之署總禮官之甲科羣百郡之㢘孝周環也前書音義曰鉤陳紫官外星也宮衛之位亦象之嚴更之署行夜之司也禮官奉常也有博士掌試䇿考其優劣為甲乙之科即前書曰太常以公孫𢎞為下第是也言百郡舉全數前書又曰興㢘舉孝虎賁贅衣閹尹閽寺陛㦸百重各有攸司虎賁宿衛之臣贅衣主衣之官贅綴也音之銳反尚書曰綴衣虎賁閹尹閽寺並宦官周禮有閽人寺人陛㦸執㦸于陛也百重言多也攸所也司主也協韻音伺周廬千列徼道綺錯廬謂宿衛之廬周於宮也千列言多也史記衛令曰周廬設卒甚謹徼道徼廵之道綺錯交錯也前書曰中尉掌徼廵京師也輦路經營脩涂飛閣前書音義曰輦道閣道也涂亦塗也古字通用自未央而連桂宮北彌眀光而絙長樂陵墱道而超西墉混建章而外屬設璧門之鳳闕上柧棱而棲金雀未央宮在西長樂宮在東桂宮眀光宮在北言飛閣相連也墱陛級也音丁鄧反墉城也混同也建章宮在城西屬連也前書曰建章宮其東則鳳闕門髙二十餘丈其南有璧門之屬說文曰柧棱殿堂上最髙之處也柧音孤棱音力登反其上棲金雀焉三輔故事曰建章宮闕上有銅鳳凰即金雀也劉攽曰注鳳闕門案文多一門字内則别風之嶕嶢眇麗巧而竦擢張千門而立萬户順隂陽以開闔三輔故事曰建章宮東有折風闕闗中記曰折風一名别風嶕嶢髙也嶕音焦嶢音堯前書曰建章宮庭為千門萬户闔謂之陰開謂之陽易曰闔户謂之坤闢户謂之乾爾乃正殿崔巍層構厥髙臨乎未央經駘盪而出馺娑洞枍詣與天梁上反宇以蓋戴激日景而納光正殿即前殿也層重也臨乎未央言髙之極也闢中記建章宮有駘盪馺娑枍詣殿天梁亦宮名也駘音殆盪音蕩馺音素合反娑音素可反枍音烏計反爾雅曰蓋戴覆也反宇謂飛檐上反也激日謂日激入于殿内也神眀鬱其特起遂偃蹇而上躋軼雲雨於太半虹霓回帶於棼楣雖輕信與僄狡猶愕眙而不敢階神眀臺名也躋升也偃蹇髙貎也軼過也前書音義曰凡數三分有二為太半說文曰棼棟也爾雅曰楣謂之梁郭璞云門户上横梁也方言曰僄輕也音匹妙反鄭𤣥注禮記曰狡疾也字書曰愕驚也音五各反字林曰眙驚貌也音丑吏反攀井幹而未半目眴轉而意迷舍櫺檻而郤倚若顛墜而復稽魂怳怳以失度廵回涂而下低井幹樓名也前書曰武帝作井幹樓髙五十丈輦道相屬焉蒼頡篇曰眴視不眀也音眩櫺檻樓上欄楯也櫺音零稽㽞也旣懲懼於登望降周流以彷徨歩甬道以縈紆又杳窱而不見陽淮南子曰甬道相連髙誘注云甬道飛閣複道也廣雅曰窈窱深也杳與窈通窱音它鳥反陽明也旣創前之登望乃下廵于複道宮宇深䆳又不見眀也排飛闥而上出若㳺目於天表似無依之洋洋飛闥閣上門也王逸注楚辭曰洋洋無所歸貌前唐中而後太液攬滄海之湯湯揚波濤於碣石激神嶽之嶈嶈濫瀛洲與方壺蓬萊起乎中央前書曰建章宮其西唐中數十里音義曰唐庭也其北太液池中有蓬萊方丈瀛州壺梁象海中神山湯湯流貌也蒼頡篇曰濤大波也碣石海畔山也說文曰濫泛也列子曰海中有神山一曰岱輿二曰貟嶠三曰方壺四曰瀛洲五曰蓬萊於是靈草冬榮神木叢生巖峻崔崒金石峥嶸靈草神木謂不死藥也史記曰海中神山仙人不死藥在焉峥嶸髙峻也崔音阻回反崒音才律反峥音仕耕反嶸音宏抗僊掌以承露擢雙立之金莖軼埃壒之混濁鮮顥氣之清英前書曰武帝時作銅柱承露仙人掌之屬三輔故事云建章宮承露盤髙二十丈大七圍以銅為之上有仙人掌承露和玉屑飲之金莖即銅柱也軼過也埃壒塵也鮮潔也說文曰顥白貌音皓騁文成之丕誕馳五利之所刑庶松喬之羣類時游従乎斯庭實列僊之攸館匪吾人之所寕丕大也誕欺也前書曰齊人李少翁以方士見上上拜為文成将軍言于上曰即欲與神通宮室被服非象神神物不至乃作甘泉宮中為臺畫天地泰一諸鬼神而置祭具以致天神又曰膠東人樂大多方畧而敢為大言言曰臣常往東海中見安期羡門之屬乃拜為五利将軍刑法也列僊傳曰赤松子者神農時雨師也服水玉以教神農又曰王子喬者周靈王太子晋道士浮丘公接以上嵩山爾乃盛娛游之壯觀奮大武乎上囿因兹以威戎夸狄耀威而講事大武謂大陳武事也月令孟冬之月天子乃命将帥講武習射御也命荆州使起鳥詔梁野而驅獸毛羣内闐飛羽上覆接翼側足集禁林而屯聚荆州江湘之地其俗習于捕鳥故使起之梁野巴漢之人其俗習于逐獸故使其人驅之闐音田聚音才諭反水衡虞人理其營表種别羣分部曲有署前書曰上林苑屬水衡都尉虞人掌山澤之官周禮曰虞人萊所田之野為表鄭司農曰表所以識正行列也續漢書将軍領軍皆有部大将軍營五部部校尉一人部下有曲曲有軍候一人也罘罔連紘籠山絡野列卒周帀星羅雲布鄭𤣥注禮記曰獸罟曰罘音浮紘罘之網於是乘鑾輿備法駕帥羣臣披飛㢘入苑門蔡邕獨斷曰天子至尊不敢渫瀆言之故託于乘輿天子車駕有大駕法駕小駕大駕則公卿奉引備千乘萬騎法駕公卿不在鹵簿中惟執金吾奉引侍中驂乘飛㢘館名也武帝所作前書音義曰飛㢘神禽能致風氣身似鹿頭如雀有角而蛇尾文如豹文于館上作之因以名焉劉攽曰乘鑾輿案注所觧乘輿之義則多此鑾字遂繞酆鎬歴上蘭六師發胄百獸駭殫震震爚爚雷奔電激草木塗地山淵反覆蹂蹸其十二三乃拗怒而少息酆文王所都在鄠縣東鎬武王所都在上林苑中三輔黄圖云上林苑有上蘭觀尚書曰司馬掌邦政統六師又曰百獸率舞駭殫言驚懼也震震爚爚奔走之貎爚音躍塗汚也反覆猶傾動也車騎旣多視之眩亂有似傾動蹂踐也音汝九反蹸轢也音力刃反拗猶抑也音於少反言且抑六師之怒而少停也爾乃期門佽飛列刃鑚鍭要趹追蹤鳥驚觸絲獸駭值鋒機不虚掎弦不再控矢無單殺中必疊雙颮颮紛紛矰繳相纒風毛雨血灑野蔽天前書曰武帝與北地良家子期于殿門故號期門又曰募佽飛射士音義佽飛本秦左弋官也武帝改為飲飛官有一令九丞在上林中紡矰繳弋鳬雁嵗萬頭以供宗廟蒼頡篇曰攅聚也鑚與攅通爾雅曰金鏃剪羽謂之鍭音侯廣雅曰趹奔也音決機弩牙也說文曰掎偏引也音居綺反颮颮紛紛衆多也說文曰颮古飈字鄭𤣥注周禮曰結繳于矢謂之矰矰髙也平原赤勇士厲猨􅎜失木豺狼懾竄郭璞注山海經曰猿似猴而大臂長便㨗色黑蒼頡書曰􅎜似狸音以救反淮南子曰猨􅎜顚蹷而失木枝懾懼也音之葉反竄走也協韻音七外反爾乃移師趨險並蹈潜穢窮虎奔突狂兕觸蹷潜深也穢謂榛蕪之林虎兕之所居也爾雅曰兕似牛郭璞曰一角青色重千斤廣雅曰蹷跳也音居衛反許少施巧秦成力折掎僄狡㧖猛噬脫角挫脰徒摶獨殺許少秦成並未詳僄狡獸之輕捷者說文曰搤捉也音戹搤與㧖通噬囓挫折也脰頸也徒空也謂空手摶殺之也爾雅曰暴虎徒摶也殺音所界反挟師豹拖熊螭頓犀犛曳豪羆超逈壑越峻崖蹷巉巗鉅石隤松栢仆叢林摧草木無餘禽獸殄夷師師子也說文曰拖曳也音徒可反杜預注左傳云螭山神獸形郭璞注山海經曰犀似牛而猪頭黑色有三角一在頂上一在額上一在鼻上犛牛黑色出西南徼外犛音力之反爾雅曰羆似熊而黄巉巗山石髙峻之貌也殄盡也夷猶殺也於是天子乃登屬玉之館歴長楊之榭覧山川之體埶觀三軍之殺獲原野蕭條目極四裔禽相鎮厭獸相枕藉前書宣帝幸萯陽宮屬玉觀音義曰屬玉水鳥也似鵁鶄於觀上作之因以名焉三輔黄啚曰上林有長楊宮鄭𤣥注禮記曰土髙曰臺有木曰榭獲協韻音胡卦反楚詞曰山蕭條而無獸然後收禽㑹衆論功賜胙陳輕騎以行炰騰酒車而斟酌割鮮野食舉燧命爵胙餘肉也左傳曰歸胙于公詩小雅曰炰之燔之毛萇注曰以毛曰炰音歩交反子虚賦曰割鮮染輪孔安國注尚書曰鳥獸新殺曰鮮饗賜畢勞逸齊大輅鳴鸞容與裴回集乎豫章之宇臨乎昆眀之池大輅玉輅也周禮曰凡馭輅儀以鑾和為節鄭𤣥注曰鸞在衡和在軾皆金鈴也三輔黄圖曰上林苑有豫章觀左牽牛而右織女似雲漢之無涯茂樹䕃蔚芳草被堤蘭茝發色曄曄猗猗若摛錦布繡燭耀乎其陂漢宮閣疏曰昆明池有二石人牽牛織女之象也雲漢天河也郭璞注爾雅云茝香草音昌改反曄曄猗猗羙茂之貎說文曰摛舒也𤣥鶴白鷺黄鵠鵁鸛鶬鴰鳵鶂鳬鷖鴻雁朝發河海夕宿江漢沈浮往來雲集霧散郭璞注爾雅云鵁似鳬脚近尾略不能地行江東謂之魚鵁音火交反說文曰鸛鸛雀也爾雅曰鶬麋鴰音括郭璞注曰即鶬鴰也今關西呼為鴰鹿鳵似雁而大無趾音保鶂水鳥也荘子曰白鶂之相視眸子不運而風化李巡注爾雅曰在野曰鳬在家曰鶩並鴨也鄭𤣥注詩云鷖鳬屬也音一兮反周處風土記曰鷖鷖􅀈也以名自呼大如雞生卵于荷葉上毛萇注詩云大曰鴻小曰鴈於是後宮乘輚路登龍舟張鳳蓋建華旗祛黼帷鏡清流靡微風澹淡浮埤蒼曰輚卧車也音仕板反淮南子曰龍舟鷁首浮次以虞桓譚新論曰乘車玉瓜華芝及鳳凰三蓋上林賦曰乘法駕建華旗髙誘注淮南子曰祛舉也澹隨風之貌也澹音徒濫反淡音徒敢反櫂女謳鼓吹震聲激越謍厲天鳥羣翔魚闚淵櫂楫也謳歌也震協韻音真謍聲也音火宏反招白閒下雙鵠揄文竿出比目招猶舉也弩有黄閒之名此言白閒盖弓弩之屬本或作白鷼謂鳥也西京雜記曰越王獻髙帝白鷼黑鷼各一雙說文曰揄引也音投文竿翠羽為文飾也闞子曰魯人有好釣者以桂為餌鍜黄金之釣錯以銀碧垂翡翠之綸爾雅曰東方有比目魚不比不行撫鴻幢御矰繳方舟並鶩俛仰極樂廣雅曰幢謂之懤幢音直江反即舟中之幢盖也本或作罿罿鳥網也音衡矰弋矢也繳以繫箭也方舟並两舟也遂風舉雲揺浮㳺普覽前乘秦領後越九􅉄協韻音綜東薄河華西渉岐雍宮館所歴百有餘區行所朝夕儲不改供薄廹也岐山雍縣在扶風儲積也供協韻音九用反禮上下而接山川究休祐之所用採游童之歡謠第從臣之嘉頌上下謂天地也接亦祭也究盡也用謂犧牲玉帛之物也列子曰堯理天下五十年不知天下理歟亂歟堯乃微服游于康衢聞兒童謠曰立我蒸人莫非爾極不識不知順帝之則言今同于堯也前書曰宣帝頗好神仙王褒張子僑等並待詔所幸宮館輙為歌頌第其髙下以差賜帛焉于斯之時都都相望邑邑相屬國藉十世之基家承百年之業士食舊徳之名氏農服先疇之畎畆商修族世之所鬻工用髙曽之規矩粲乎隐隐各得其所十代百年並舉全数也易曰食舊徳貞厲終吉穀梁傳曰古者有士人商人農人工人淮南子曰古者至徳之時賈便其肆農安其業大夫安其職而處士修其道也若臣者徒觀迹乎舊墟聞之乎故老什分而未能得其一端故不能徧舉也後漢書卷七十上後漢書卷七十上考證班彪傳後好事者頗或綴集時事何焯校本引史通云其後劉向向子歆及諸好事者若馮商衛衡揚雄史岑梁審肆仁晋馮叚肅金丹馮衍韋融蕭奮劉恂等相次撰續迄于哀平間猶名史記從漢元至武以絶則其功也舊本作從漢元至武則絶其功也毛本作従漢元至武則以絶其功也皆不成文理今従監本黜淮南衡山何焯校本云淮南衡山之不為世家與淮陰黥彭同例性相近習相遠也注見論語臣㑹汾按宋本作見何論盖何晏注論語故唐人以何氏本為何論後人不考所由認為錯誤改作論語義雖無害要湏仍古人之舊不必竄易也後察司徒㢘注云司徒薦為㢘諸本同臣㑹汾按正文及注㢘字上皆脫一孝字前云舉司𨽻茂才注司𨽻舉為茂才也文法正與此同班彪子固不可殫論注三輔黄圖曰未央宮有清凉殿宣室殿中溫室殿一本作宣寳中溫殿誤今従宋本増改珊瑚碧樹周阿而生注漢武故事曰武帝起神堂植玉樹茸珊瑚為枝茸字一本作葺臣㑹汾按茸與葺皆非也此字當作叢因與茸同音故誤不知者又妄改為葺耳雖輕信與僄狡臣㑹汾按信字義未妥當従文選作迅後漢書卷七十上考證欽定四庫全書後漢書卷七十下宋宣城太守范煜撰唐章懐太子賢注班固列傳第三十下班固傳主人喟然而歎曰痛乎風俗之移人也子實秦人矜夸館室保界河山信識昭㐮而知始皇矣惡睹大漢之云為乎喟歎貎也前書曰人有剛柔緩急音聲不同繫水土之風氣謂之風好惡取舎動静無常隨君上之情欲謂之俗保守也謂守河山之險以為界昭㐮昭王㐮王也惡安也音烏夫大漢之開原也奮布衣以登皇極繇數期而創萬世蓋六籍所不能談前聖靡得而言焉漢髙祖曰吾以布衣提三尺劔取天下髙祖起兵五年而即帝位故云由數期繇即由也孔安國注尚書云匝四時曰期萬世盛言之也六籍六經也當此之時功有横而當天討有逆而順人故婁敬度埶而獻其說蕭公權宜以拓其制時豈泰而安之哉計不得以已也横音胡孟反髙祖入關秦王子嬰降而五星聚于東井此功有横而當天也逆謂以臣伐君前書陸賈曰湯武逆取而以順守之及髙祖入關秦人争獻牛酒此謂討有逆而順人也婁敬已見上又曰蕭何脩未央宮上見壮麗甚怒何對曰天下未定故可因遂就宮室且天子以四海為家非令壮麗無以威重且無令後代有以加也時豈奢侈而安之哉言天下初定計不得已而都西亰也吾子曾不是睹頋燿後嗣之末造不亦闇乎顧反也燿炫燿也言吾子曽不睹度埶權宜之由而反炫燿後嗣子孫末代之所造非其盛稱武帝成帝神僊昭陽之事也今將語子以建武之理永平之事監乎泰清以變子之或志淮南子曰太清之化也和順以寂漠質直以素樸髙誘注曰太清無為之化也往者王莽作逆漢祚中缺天人致誅六合相滅天人謂天意人事共相誅也于時之亂生民㡬亡鬼神泯絶壑無完柩郛罔遺室原野猒人之肉川谷流人之血秦項之災猶不克半書契以來未之或紀也人者神之主生人既亡故鬼神亦絶也楊子法言曰秦将白起長平之戰坑四十萬人原野猒人之肉川谷流人之血也故下民號而上愬上帝懐而降鑒致命於聖皇上帝天也聖皇光武也懐猶愍念也降下也鍳視也言上天愍念下人之上愬故下視四海可以為君者而致命於光武也於是聖皇乃握乾符闡坤珍披皇圖稽帝文赫爾發憤應若興雲霆發昆陽憑怒雷震乾符坤珍謂天地符瑞也皇圗帝文謂圖緯之文也霆疾雷也發于昆陽謂破王尋王邑憑盛也言盛怒如雷之震協韻音真遂超大河跨北嶽立號髙邑建都河洛跨㩀也言光武渡河㩀北嶽遂即位於鄗而改鄗為髙邑也紹百王之荒屯因造化之盪滌體元立制繼天而作紹繼也屯難也高誘注淮南子云造化天地也滌除也作起也杜預注左傳云凡人君即位欲體元以居正穀梁傳曰為天下主者天也繼天者君也系唐統接漢緒茂育羣生恢復疆宇􅈴兼乎在昔事勤乎三五爾雅曰系繼也緒業也前書曰漢帝本系出自唐帝言光武能繼唐堯之統業也恢大也三五三皇五帝也豈特方軌並迹紛綸后辟理近古之所務蹈一聖之險易云爾哉軌轍也紛綸猶雜蹂也爾雅曰后辟君也險易猶理亂也言光武功徳勤勞兼於前代百王非直一聖帝也且夫建武之元天地革命四海之内更造夫婦肇有父子君臣初建人倫實始斯乃虙羲氏之所以基皇徳也易曰天地革而四時成又曰湯武革命爾雅曰九夷八狄七戎六蠻謂之四海基始也帝王紀曰庖犧氏風姓也制嫁娶之禮取犠牲以充庖厨以食天下故號庖犧後或謂之伏犧言光武更造夫婦如伏犧時也分州土立市朝作舟車造器械斯軒轅氏之所以開帝功也黄帝號軒轅氏前書昔在黄帝畫野分州易繋辭曰神農氏日中為市黄帝堯舜垂衣裳而天下治刳木為舟剡木為楫服牛乘馬引重致逺以利天下弦木為弧剡木為矢弧矢之利以威天下言光武利人如軒轅也龔行天罸應天順民斯乃湯武之所以昭王業也尚書武王曰今子惟龔行天之罸易曰湯武革命順乎天而應乎人言光武征伐如湯武者也遷都改邑有殷宗中興之則焉即土之中有周成隆平之制焉尚書曰盤庚遷于殷史記曰帝陽甲之時殷衰諸侯莫朝陽甲崩弟盤庚立自河北度河南居湯之故地行湯之政殷道復興尚書曰王來紹上帝自服于土中孔安國曰洛邑地埶之中也春秋命歴序曰成康之隆醴泉湧出言都洛陽如殷宗周成之制也不階尺土一人之柄同符乎髙祖孟子曰紂去武丁未久也尺地莫非其有也一人莫非其臣也又曰舜文王相去千有餘嵗若合符契克己復禮以奉終始允恭乎孝文左傳仲尼曰古有志克已復禮仁也孫卿子曰生人之始死人之終也終始俱善人道畢矣尚書允恭克譲謂躬自儉約同於文帝也憲章稽古封岱勒成儀炳乎世宗憲章猶法則也禮記曰仲尼憲章文武尚書曰若稽古帝堯言法乎考古而封泰山勒石以記成功也炳眀也其禮儀眀乎武帝也案六經而校徳妙古昔而論功仁聖之事旣該帝王之道備矣六經謂詩書禮樂易春秋妙猶羙也或作眇眇逺也該偹也至于永平之際重熈而累洽盛三雍之上儀脩袞龍之法服敷洪藻信景鑠揚世廟正予樂人神之和允洽君臣之序既肅熈光也洽浹也三雍謂眀堂辟雍靈䑓也永平二年正月宗祀光武皇帝于眀堂禮畢登靈䑓三月臨辟雍行大射禮周禮王之吉服享先王即袞冕鄭𤣥注曰袞卷龍衣也永平二年帝及公卿列侯始服冕冠衣裳敷布也鴻大也藻文藻也謂明帝禮畢登靈䑓之後布詔于天下曰建明堂立辟雍起靈䑓恢𢎞大道被之八極此為布鴻藻也信讀曰申景大也鑠羙也揚世廟謂上尊號光武廟曰世祖正予樂謂依讖文改大樂為大予樂也乃動大路遵皇衢省方廵狩窮覧萬國之有無考聲教之所被散皇眀以燭幽大路玉路也皇衢馳道也易曰先王以省方觀人設教尚書曰嵗二月東廵狩又曰朔南暨聲教皇大也燭照也然後增周舊脩洛邑翩翩巍巍顯顯翼翼光漢亰于諸夏總八方而為之極周成王都洛邑漢又増而修之故曰増焉翩翩巍巍顯顯翼翼並宮闕顯盛之貎論語曰不如諸夏之亡詩商頌曰商邑翼翼四方之極極中也洛陽土之中也是以皇城之内宮室光眀闕庭神麗奢不可踰儉不能侈言奢儉合禮也外則因原野以作苑順流泉而為沼發蘋藻以潜魚豐圃草以毓獸制同乎梁騶義合乎靈囿蘋藻並水草也詩小雅曰魚在在藻韓詩曰東冇圃草駕言行狩薛君傳曰圃博也有博大之茂草也毓亦育也魯詩傳曰古有梁騶者天子之田也詩大雅曰王在靈囿麀鹿攸伏毛萇注云囿所以域飬禽獸也此言魚獸各得其所如文王之靈囿也若乃順時節而蒐狩簡車徒以講武則必臨之以王制考之以風雅左傳臧僖伯曰春蒐夏苖秋獮冬狩皆于農隙以講事也杜預注云各隨時之閑也禮記王制曰天子諸侯無事則嵗三田田不以禮曰暴天物也歴騶虞覽駟驖嘉車攻采吉日禮官正儀乘輿乃出詩國風序曰騶虞蒐田以時仁如騶虞毛萇注曰騶虞義獸白虎黑文不食生物又曰駟鐵羙㐮公也始命有田狩之事其詩曰駟驖孔阜注曰驖驪也阜大也又小雅序曰車攻宣王復古也修車馬備器械復㑹諸侯於東都因田獵而選車徒焉其詩曰我車既攻我馬既同注云攻堅也又吉日詩曰我車既好四牡孔阜宣帝詔曰禮官具禮儀也於是發鯨魚鏗華鍾登玉輅乘時龍鳳蓋颯灑和鸞玲瓏天官景從祲威盛容鯨魚謂刻杵作鯨魚形也鏗謂擊之也音苦耕反尚書大傳曰天子将出則撞黄鍾右五鍾皆應薛綜注西京賦云海中有大魚名鯨又有獸名蒲牢蒲牢素畏鯨魚鯨魚擊蒲牢蒲牢輙大鳴呼凡鍾欲令其聲大者故作蒲牢于其上撞鍾者名為鯨魚鍾有篆刻之文故曰華爾雅曰馬髙八尺以上曰龍月令春駕蒼龍各隨四時之色故曰時也玲瓏聲也蔡邕獨斷曰百官小吏曰天官祲亦盛也山靈䕶野屬御方神雨師汎灑風伯清塵千乘雷起萬騎紛紜元戎竟野戈鋋彗雲羽旄掃電旌旗拂天山靈山神也屬連也音燭方四方也雨師畢星也風伯箕星也韓子師曠謂晉平公曰黄帝合鬼神于泰山風伯進掃雨師灑道蔡邕獨斷曰天子大駕偹千乘萬騎元戎戎車也詩小雅曰元戎十乘以先啓行毛萇注曰元大也夏后氏曰鉤車先正也殷曰寅車先疾也周曰元戎先良也說文曰鋋小矛也音市延反彗掃也音似銳反焱焱炎炎揚光飛文吐爓生風吹野燎山日月為之奪眀丘陵為之摇震焱焱炎炎並戈矛車馬之光也說文曰焱火華也音以瞻反震讀曰真遂集乎中囿陳師案屯駢部曲列校隊勒三軍誓將帥中囿囿中也續漢志曰大将軍營五部校尉一人部下有曲曲下有屯長一人駢猶陳列也杜預注左傳曰百人為隊鄭𤣥周禮注云天子六軍三軍一偏故此言勒三軍也周禮曰羣吏聽誓于前斬牲以狥陳曰不用命者斬之鄭𤣥注云羣吏将帥也然後舉烽伐鼓以命三驅輕車霆發驍騎電騖㳺基發射范氏施御弦不失禽彎不詭遇飛者未及翔走者未及去穀梁傳曰三驅之禮一為乾豆二為賔客三為充君之庖霆發電騖並言疾也游基飬由基也淮南子曰楚有神白猨王自射之則摶而嬉使飬由基射之始調弓矯矢未發而猨擁木號矣范氏趙之御人也孟子曰趙簡子使王良御終日不獲一禽反曰天下賤工也王良曰吾為範我馳驅終日不獲一爲之詭遇一朝而獲十趙岐注曰範法也為法度之御應禮之射終日不得遇詭遇非禮射也則能獲十弦不失禽謂由基也彎不詭遇謂范氏也指顧倐忽獲車已實樂不及般殺不盡物馬踠餘足士怒未泄先驅復路屬車案節高唐賦曰舉功先得獲車已實爾雅曰般樂也禮記曰樂不可極踠猶屈也方言曰泄歇也漢官儀大駕屬車八十一乘子虚賦曰案節未舒謂駐車徐行也於是薦三犧效五牲禮神祗懐百靈覲眀堂臨辟雍揚緝熙宣皇風登靈臺考休徴左傳鄭子太叔曰為五牲三犧杜預注云五牲麋鹿麏狼兎三犧祭天地宗廟之犧也郊祭天也天神曰神地神曰祗百靈百神也詩曰懐柔百神覲朝也謂朝諸侯於眀堂詩大雅曰維清緝熈文王之典鄭𤣥注云緝熈光眀也尚書曰休徴孔安國注云叙羙行之騐俯仰乎乾坤參象乎聖躬目中夏而布徳瞰四裔而抗稜易繫辭曰仰則觀象于天俯則觀法於地近取諸身逺取諸物聖躬謂天子也中夏中國也瞰音苦暫反四裔四夷也稜威也左傳曰徳以柔中國刑以威四夷也西盪河源東澹海漘北動幽崖南趯朱垠盪滌也河源在崑崙山前書曰威稜澹乎鄰國音義曰澹猶動也音徒濫反漘水涯音脣郭璞注爾雅曰涯上平坦而下水深者為漘趯躍也音他歴反說文曰垠界也音銀殊方别區界絶而不鄰自孝武所不能征孝宣所不能臣莫不陸讋水慄奔走而來賔爾雅曰讋懼也音之涉反遂綏哀牢開永昌綏安也哀牢西南夷號永平十二年其國王栁貎相率内屬以其地置永昌郡也春王三朝㑹同漢亰是日也天子受四海之圖籍膺萬國之貢珍内撫諸夏外接百蠻春王猶左傳云春王正月也三朝元日也朝音陟遙反謂嵗之朝月之朝日之朝前書谷永曰今年正月翔日食於三朝之㑹周禮曰時見曰㑹殷眺曰同賈逵注曰膺猶受也詩曰因時百蠻也乃盛禮樂供帳置乎雲龍之庭陳百僚而賛羣后究皇儀而展帝容供帳供設帷帳也供音九用反前書曰三輔長無供悵之勞戴延之記曰端門東有崇賢門次外有雲龍門賛引也於是庭實千品㫖酒萬鍾列金罍班玉觴嘉珍御太牢饗庭實貢獻之物也左傳孟獻子曰臣聞聘而獻物於是有庭實旅百千品言多也說文曰鍾器也孔叢子曰堯飲千鍾罍酒器也詩曰我姑酌彼金罍珍八珍也太牢牛羊豕也饗協韻音香爾乃食舉雍徹太師奏樂陳金石布絲竹鐘鼓鏗鏘管弦曄煜食舉謂當食舉樂也蔡邕禮樂志曰大予樂郊祀陵廟殿中諸食舉樂也雍詩篇名也謂食訖歌雍詩以徹也論語曰三家者以雍徹太師樂官也周禮太師掌六律六呂以合隂陽之聲也鏗音苦耕反鏘音楚庠反曄煜盛貎也煜音育抗五聲極六律歌九功舞八佾韶武備太古畢左傳晏子曰五聲六律杜預注云五聲宮商角徴羽六律黄鍾太簇姑洗蕤賔夷則無射尚書曰九功惟序九序惟歌九功謂金木水火土榖正徳利用厚生也佾舞行也榖梁傳曰天子八佾韶舜樂名武武王樂名太古逺古也四夷間奏徳廣所及仱佅兜離罔不具集間迭也音古莧反詩國風曰漢廣徳廣所及也鄭𤣥注周禮云四夷之樂東方曰韎南方曰任西方曰株離北方曰禁禁字書作仱音渠禁反佅音摩葛反周禮仱作禁佅作韎兜作㭑也萬樂備百禮暨皇歡浹羣臣醉降烟煴調元氣然後撞鐘告罷百僚遂退萬樂百禮盛言之也暨至也易曰天地絪緼萬物化醇禮統曰天地者元氣之所生萬物之祖尚書大傳曰天子将入撞㽔賔之鍾左五鍾皆應撞音直江反於是聖上親萬方之歡娛久沐浴乎膏澤懼其侈心之將萌而怠於東作也尚書曰平秩東作注云嵗起於春而始就耕乃申舊章下眀詔命有司班憲度昭節儉示太素詩大雅曰率由舊章鄭𤣥注云舊典文章左傳臧哀伯曰大路越席大羮不和昭其儉也列子曰太素者質之始也去後宮之麗飾損乘輿之服御除工商之淫業興農桑之上務遂令海内棄末而反本背偽而歸真女修織絍男務耕耘器用陶匏服尚素𤣥耻纎靡而不服賤竒麗而不珍捐金於山沈珠於淵前書文帝詔曰農天下之本也而人或不務本而事末音義曰夲農也末賈也背偽去雕飾也歸真尚質素也杜預注左傳曰織絍織繒布也禮記曰器用陶匏陶瓦器也匏瓠也陸賈新語曰聖人不用珠玉而寳其身故舜棄黄金於嶄巖之山捐珠玉於五湖之川以杜淫邪之欲也於是百姓滌瑕盪穢而鏡至清形神寂寞耳目不營嗜欲之原滅㢘正之心生莫不優游而自得玉潤而金聲瑕穢猶過惡也揚雄集曰滌瑕盪穢淮南子曰形者生之舍神者生之制也又曰和順以寂寞尚書曰弗役耳目百度惟貞淮南子曰吾所謂有天下者自得而已禮記孔子曰君子比徳於玉焉溫潤而澤仁也孟子曰孔子徳如金聲也是以四海之内學校如林庠序盈門獻酬交錯爼豆莘莘下舞上歌蹈徳詠仁前書平帝立舉學官郡國曰學縣道邑及侯國曰校鄉曰庠聚曰序詩曰獻酬交錯莘莘衆多也音所巾反禮記曰歌者在上貴人聲也又嗟歎之不足故手之舞之足之蹈之劉邠曰注平帝立舉學官案文多一舉字登降飫宴之禮既畢因相與嗟歎𤣥徳讜言𢎞說咸含和而吐氣頌曰盛哉乎斯世詩曰飲酒之飫毛萇注云不脫屨升堂謂之飫飫私也尚書曰𤣥徳升聞字林曰讜美言也音黨今論者但知誦虞夏之書詠殷周之詩講羲文之易論孔氏之春秋罕能精古今之清濁䆒漢徳之所由伏羲畫八卦文王作卦辭孔子作春秋清濁猶善惡也唯子頗識舊典又徒馳騁乎末流溫故知新已難而知徳者鮮矣末流猶下流也謂諸子也前書曰不入于道徳放縱于末流論語孔子曰温故知新可以為師矣又曰由知徳者鮮矣且夫辟界西戎險阻四塞修其防禦孰與處乎土中平夷洞達萬方輻湊辟逺也音匹亦反戰國䇿蘇秦說孟嘗君曰秦四塞之國也髙誘注云四靣有山關之固故曰四塞之國防禦謂闗禁也輻湊如輻之湊於轂也前書武帝詔吾丘壽王曰子在朕前之時知略輻湊也秦領九􅉄涇渭之川曷若四瀆五嶽帯河泝洛圖書之淵四瀆江河淮濟也河圖曰天有四表以布精魄地有四瀆以出圖書爾雅曰泰山為東嶽衡山為南嶽華山為西嶽􅁪山為北嶽圖書之淵謂河洛也易繋辭曰河出圖洛出書也建章甘泉館御列仙孰與靈臺眀堂統和天人館御謂設臺以進御神仙也禮含文嘉曰禮天子靈臺以考觀天人之際法隂陽之㑹也太液昆眀鳥獸之囿曷若辟雍海流道徳之富三輔黄啚曰辟雍水四周於外象四海也游俠踰侈犯義侵禮孰與同履法度翼翼濟濟也游俠即西賔云鄉曲豪俊游俠之雄踰侈謂列肆侈於姫姜等也爾雅曰翼翼敬也詩曰濟濟多士毛萇注云濟濟多威儀也子習秦阿房之造天而不知亰洛之有制也識函谷之可闗而不知王者之無外也史記曰秦始皇作阿房宮造至也公羊傳曰王者無外也主人之辭未終西都賔矍然失容逡廵降階惵然意下捧手欲辭主人曰復位今將喻子五篇之詩說文曰矍視遽之貎音許縛反周書曰臨攝以威而惵惵者猶恐懼也音徒頰反喻告也賔既卒業乃稱曰羙哉乎此詩義正乎揚雄事實乎相如非惟主人之好學蓋乃遭遇乎斯時也揚雄作長楊羽獵賦司馬相如作子虚上林賦並文雖藻麗其事迂誕不如主人之言義正事實也小子狂簡不知所裁既聞正道請終身誦之其詩曰論語孔子曰吾黨之小子狂簡斐然成章不知所以裁之又曰不忮不求何用不臧子路終身誦之眀堂詩於昭眀堂眀堂孔陽聖皇宗祀穆穆煌煌於音烏歎羙之辭也詩周頌曰於昭于天孔甚也陽眀也國風曰我朱孔陽聖皇宗祀謂祭光武于眀堂也詩曰穆穆煌煌宜君宜王穆穆猶敬也煌煌猶羙也上帝宴饗五位時序誰其配之世祖光武前書曰天神貴者太一太一佐曰五帝五位五帝也河圖曰蒼帝威靈仰赤帝赤熛怒黄帝含樞紐白帝白招矩黑帝叶光紀揚雄河東賦曰靈祗既饗五位時序謂各依其方而祭之普天率土各以其職猗與緝熙允懐多福詩小雅曰溥天之下莫非王土率土之濵莫非王臣溥亦普也孝經曰四海之内各以其職來助祭詩商頌曰猗與那與猗羙也允信也懐來也詩大雅曰聿懐多福辟雍詩廼流辟雍辟雍湯湯聖皇莅止造舟為梁湯湯水流貎莅臨也詩小雅曰方叔莅止大雅曰造舟為梁毛萇注云天子造舟造至也謂連舟為浮梁也皤皤國老廼父廼兄抑抑威儀孝友光眀説文曰皤皤老人貌也音歩何反孝經援神契曰天子尊事三老兄事五更抑抑羙也詩曰威儀抑抑爾雅曰善父母為孝善兄弟為友於赫太上示我漢行鴻化惟神永觀厥成於赫歎羙也太上謂太古立徳賢聖之人並著飬老之禮今我漢家遵行之也鴻大也文子曰執𤣥徳于心化馳如神詩周頌曰我客戾止永觀厥成爾雅曰觀示也靈臺詩廼經靈臺靈臺既崇帝勤時登爰考休徴詩大雅曰經始靈臺崇髙也時登以時登之休美也徴騐也三光宣精五行布序習習祥風祁祁甘雨三光日月星也宣布也精眀也五行水火金木土布序謂各順其性無謬沴也習習和也詩小雅曰習習谷風禮斗威儀曰君政頌平則祥風至宋均注曰即景風也祁祁徐也詩小雅曰興雨祁祁尚書考靈燿曰熒惑順行甘雨時也百穀溱溱庶卉蕃蕪屢惟豐年於皇樂胥百言非一也尚書洪範曰百穀用成溱溱盛貎尚書曰庶草蕃蕪爾雅曰蕃蕪豐也詩周頌曰綏萬邦屢豐年又曰於皇時周於音烏詩小雅曰君子樂胥受天之祜注云胥有才智之名寳鼎詩嶽修貢兮川效珍吐金景兮歊浮雲寳鼎見兮色紛緼煥其炳兮被龍文謂永平六年王雒山得寳鼎廬江太守獻之景光也說文曰歊氣出貎音火驕反史記曰秦武王與孟恱舉龍文之鼎登柤廟兮享聖神昭靈徳兮彌億年時眀帝詔曰其以礿祭之日陳鼎于廟以備器用彌終也萬萬曰億尚書曰公其以予萬億年敬天之休白雉詩啓靈篇兮披瑞圖獲白雉兮效素烏靈篇謂河洛之書也固集此題篇云白雉素烏歌故兼言效素烏發皓羽兮奮翹英容絜朗兮於淳精皓白也翹尾也春秋元命包曰烏者陽之精章皇徳兮侔周成永延長兮膺天慶章眀也侔等也孝經援神契曰周成王時越裳獻白雉慶讀曰卿及肅宗雅好文章固愈得幸數入讀書禁中㦯連日繼夜每行廵狩輙獻上賦頌朝廷有大議使難問公卿辯論於前賞賜恩寵甚渥固自以二世才術位不過郎二代謂彪及固感東方朔揚雄自論以不遭蘓張范蔡之時作賔戯以自通焉東方􅃋答客難曰使蘓秦張儀與僕並生曽不得掌故安敢望侍郎乎揚雄觧嘲曰范睢魏之亡命也蔡澤山東之匹夫也有談范蔡於許史之間則狂矣固所作賔戯事見前書後遷𤣥武司馬續漢志曰宮掖門每門司馬一人秩比千石𤣥武司馬主𤣥武門天子㑹諸儒講論五經作白虎通徳論令固撰集其事章帝建初四年詔諸王諸儒㑹白虎觀講議五經同異時北單于遣使貢獻求欲和親詔問羣僚議者㦯以為匈奴變詐之國無内向之心徒以畏漢威靈逼憚南虜南匈奴也故希望報命以安其離叛今若遣使恐失南虜親附之歡而成北狄猜詐之計不可固議曰竊自惟思漢興以來曠世歴年兵纒夷狄尤事匈奴綏御之方其塗不一㦯修文以和之㦯用武以征之㦯卑下以就之文帝與匈奴通關市妻以漢女増厚其賂也㦯臣服而致之宣帝時匈奴稽首臣服遣子入侍雖屈申無常所因時異然未有拒絶棄放不與交接者也故自建武之始復修舊典數出重使前後相繼建武二年日逐王遣使詣漁陽請和親使中郎将李茂報命二十六年遣中郎将叚郴授南單于印綬至於其末始乃暫絶永平八年復議通之而廷争連日異同紛回多執其難少言其易先帝聖徳逺覧瞻前顧後遂復出使事同前世先帝謂眀帝也永平八年遣越騎司馬鄭衆報使北匈奴以此而推未有一世闕而不修者也今烏桓就闕稽首譯官康居月氐自逺而至匈奴離析名王來降三方歸服不以兵威此誠國家通於神眀自然之徴也臣愚以為宜依故事復遣使者上可繼五鳳甘露致逺人之㑹宣帝五鳳三年單于名王将衆五萬餘人來降稱臣朝賀甘露元年匈奴呼韓邪遣子右賢王入侍下不失建武永平覊縻之義虜使再來然後一徃既眀中國主在忠信且知聖朝禮義有常豈可逆詐示猜孤其善意乎絶之未知其利通之不聞其害設後北虜稍彊能為風塵相侵擾則風塵起方復求為交通將何所及不若因今施惠為䇿近長固又作典引篇述敘漢徳典謂堯典引猶續也漢承堯後故述漢徳以續堯典以為相如封禪靡而不典文雖靡麗而體無古典揚雄羙新典而不實體雖典則而其事虚偽謂王莽事不實盖自謂得其致焉其辤曰太極之原兩儀始分烟烟熅熅有沈而奥有浮而清易繫辭曰易有太極是生兩儀又曰天地絪縕萬物化醇蔡邕曰絪縕隂陽和一相扶貎也奥濁也易乾鑿度曰清輕者為天濁沈者為地沈浮交錯庶類混成庶類萬物也混猶同也老子曰有物混成先天地生肇命人主五徳初始同乎草昩𤣥混之中人主謂天子也尚書曰成湯簡代夏作民主五徳五行也初始謂伏義始以木徳王也木生火故神農以火徳五行相生周而復始草昧謂草創暗昧也易曰天地草昧幽𤣥混沌之中謂三皇初起之時也踰䋲越契寂寥而亡詔者系不得而綴也易繫辭曰上古結䋲而化後代聖人易之以書契踰越並過也詔告也言過䋲契以上既無父子故寂寥而無文誥系謂易繫辭也故易繫而不得綴連也厥有氏號紹天闡繹者氏號謂太昊號庖犧氏炎帝號神農氏黄帝號軒轅氏之類紹繼也謂王者繼而作闡開也繹陳也莫不開元於太昊皇初之首上哉夐乎其書猶可得而修也易曰帝出於震始以木徳王天下故曰皇初之首又曰古者庖犧氏之王天下也仰則觀象于天俯則觀法于地是其書可得而修也亞斯之世通變神化函光而未曜亞斯之代謂少昊顓頊髙辛等雖通變神化而易繫不載其事故曰函光未曜若夫上稽乾則降承龍翼而炳諸典謨以冠徳卓蹤者莫崇乎陶唐稽考乾天也論語孔子曰惟天為大惟堯則之龍翼謂稷契等為堯之羽翼易乾上九曰用九見羣龍無首吉鄭𤣥注云六爻皆體龍羣龍象也謂禹與稷契咎陶之屬並在于朝炳眀也典謨謂堯典臯陶謨也為道徳之冠首蹤跡之卓異者莫異于陶唐爾雅曰崇髙也陶唐舍𦙍而禪有虞虞亦命夏后稷契熙載越成湯武舍𦙍謂堯舍其𦙍子丹朱而禪於舜舜亦舍其子商均而禪禹書曰熙帝之載孔安國注云熙廣也載事也言稷契並能廣立功事於堯舜之朝越於也於是成其子孫湯武之業並得為天子也湯契之後武王后稷之後股肱既周天乃歸功元首將授漢劉股肱謂稷契也既周謂其子孫並周徧得為天子元首堯也言天更歸功于堯又将授漢以帝位俾其承三季之荒末值亢龍之災孽懸象暗而恒文乖彞倫斁而舊章缺俾使也三季三王之季也易乾文言曰亢龍有悔窮之災也孽亦災也易曰懸象著眀莫大於日月乖謂失於常度也倫理也斁敗也尚書曰彞倫攸斁舊章缺謂秦燔詩書故先命𤣥聖使綴學立制宏亮洪業表相祖宗賛揚廸哲備㦲燦爛真神眀之式也𤣥聖謂孔丘也春秋演孔啚曰孔子母徴在夢感黑帝而生故曰𤣥聖荘子曰恬澹𤣥聖素王之道綴學立制謂為漢家法制也宏洪並大也亮信也表眀也相助也廸蹈也哲智也言賛揚蹈履哲智之君謂髙祖等也尚書曰兹四人廸哲燦爛盛眀也式法也雖前聖臯䕫衡旦宻勿之輔比兹褊矣臯臯陶也䕫舜之典樂者衡謂阿衡即伊尹也旦周公也宻勿猶黽勉也兹謂孔子言臯䕫等比之為褊小矣是以髙光二聖辰居其域時至氣動乃龍見淵躍論語孔子曰譬如北辰居其所而衆星拱之時至氣動謂髙祖聚彤雲於碭山光武發佳氣於白水易乾卦九二曰見龍在田九四曰㦯躍在淵並喻漢初起拊翼而未舉則威靈紛紜海内雲蒸雷動電熛胡縊莽分不莅其誅拊翼以雞為喻言知将旦則鼓其翼而鳴前書曰張陳之交拊翼俱起以喻髙祖光武也紛紜盛貎也如雲之蒸言天下英傑為漢者多矣熛光也胡縊謂胡亥縊死也莽分謂公賔就斬莽也莅臨也言天下先為漢誅之髙祖光武不親臨也然後欽若上下恭揖羣后正位度宗有于徳不台淵穆之譲靡號師矢敦奮撝之容尚書曰欽若昊天欽敬也若順也上下謂天地也書曰格于上下羣后諸侯也易曰君子正位凝命也尚書曰延入翼室恤度宗度居也宗尊也前書曰舜譲于徳不台音義曰台讀曰嗣言二祖初即位居尊之時並譲言于徳不能嗣成帝功有此淵深穆敬之譲髙祖初即位曰寡人聞帝者賢者有也虛言無實之名非所取也光武即位固辭至于再三靡無也矢陳也敦猶廹逼也詩云矢于牧野又曰敷敦淮濆言漢取天下無號令陳師敦廹奮武撝旄之容詩曰奮伐荆楚尚書曰王秉白旄以麾撝亦麾也言並天人所推不尚威力也盖以膺當天之正統受克譲之歸運蓄炎上之烈精蘊孔佐之𢎞陳云爾正統謂漢承周為火徳尚書堯典曰允恭克譲謂漢承堯克譲之後歸運謂堯歸運于漢也炎上謂火徳烈精言盛也蘊藏也孔佐謂孔丘制作春秋及緯書以佐漢也即春秋演孔啚曰夘金刀名為劉中國東南出荆州赤帝後次代周是也謂大陳漢之期運也洋洋乎若徳帝者之上儀誥誓所不及已洋洋羙也若如也儀法也謂如此羙徳可謂五帝之上法也穀梁傳曰誥誓不及五帝盟詛不及三王交質不及五伯上下不相信服方有誥誓五帝之時上下和睦故誓不及鋪觀二代洪纎之度其賾可探也鋪徧也二代殷周也洪纎猶大小也度法度也賾幽深也言徧觀殷周大小之法其幽深可探知之並開迹於一匱同受侯甸之所服奕世勤民以伯方統牧孔子曰譬如平地雖覆一匱鄭𤣥注云匱盛土籠也侯服甸服謂諸侯也湯為桀之諸侯文王為紂之諸侯奕猶重也自契至湯十四代后稷至文王十五代並積勤勞于人也伯方猶方伯也謂湯為夏伯文王為殷伯並統領州牧乘其命賜彤弧黄戚之威用討韋顧黎崇之不格周禮九命作伯彤弧赤弓黄戚黄金飾斧也禮記曰諸侯賜弓矢然後專征伐賜斧鉞然後菽韋顧並國名湯滅之詩殷頌曰韋顧既伐黎崇亦國名史記文王伐崇尚書曰西伯既戡黎格來也至乎三五華夏亰遷鎬亳遂自北靣虎離其師革滅天邑三五未詳京師京都也武王都鎬湯都亳詩云宅是鎬亰武王成之尚書曰湯始居亳從先王居自從也北靣謂臣也湯武並以臣伐君史記曰如虎如羆如豺如離於商郊音義曰離與螭同革改也易曰湯武革命天邑天子所都也尚書曰肆予敢求爾于天邑商劉攽曰注京師京都也案文多一師字是故義士偉而不敦武稱未盡䕶有慙徳不其然與左傳曰武王克商遷九鼎于洛邑義士猶曰薄徳杜預注曰伯夷之屬也史記曰伯夷叔齊逢武王伐紂叩馬諌曰以臣弑君可謂仁乎偉猶異也敦厚也武周武王樂也論語孔子曰謂武盡羙矣未盡善也䕶湯樂也左傳延陵季子聘魯觀樂見舞大䕶者曰聖人之𢎞也而猶有慙徳然猶於穆猗那翕純皦繹以崇嚴祖考殷薦宗祀配帝發祥流慶對越天地者舄奕乎千載豈不克自神眀哉於歎辭也穆美也歎羙周家之徳詩周頌曰於穆清廟猗亦歎之辭也那多也歎羙湯之徳多也殷頌曰猗與那與論語子語魯太師樂曰樂其可知也始作翕如也縱之純如也皦如也繹如也以成何晏注曰翕盛也純和諧也皦其音莭眀也鄭𤣥注云繹調達之貎此言殷周之代尚有於穆猗那之頌播之於翕純皦繹之樂尊祖嚴父宗祀配天於眀堂之中詩商頌曰濬哲惟啇長發其祥言發禎祥以流慶於子孫周頌曰秉文之徳對越在天舄奕猶蟬聫不絶也誕略有常審言行於篇籍光藻朗而不渝爾誕大也言殷周二代改化之迹大略有常也篇籍謂詩書也朗眀也渝變也言光彩文藻朗眀而不變耳其餘殊異不能及於漢也矧夫赫赫聖漢巍巍唐基泝測其源乃先孕虞育夏甄殷陶周矧況也漢承唐虞之基逆流曰泝孕懐也育飬也甄陶謂造成也前書音義曰陶人作瓦器謂之甄言虞夏殷周之先祖並嘗為堯臣劉攽曰注漢承唐虞之基案注觧唐基耳何故輙出虞字明當作堯然後宣二祖之重光襲四宗之緝熙神靈日燭光被六幽仁風翔乎海表威靈行於鬼區慝亡逈而不泯微胡瑣而不頤二祖髙祖世祖也尚書曰宣重光襲重也四宗文帝為太宗武帝為代宗宣帝為中宗明帝為顯宗燭照也言如日之照六幽六合幽逺之地鬼區逺方也易曰髙宗伐鬼方慝惡也逈逺也泯滅也瑣小也頤飬也言凶惡者無逺而不滅微細者何小而不飬也故夫顯定三才昭登之績匪堯不興鋪聞遺筞在下之訓匪漢不𢎞三才天地人也易曰兼三才而兩之登升也績功也言升天之功非堯不能興也尚書曰昭升于上鋪布也遺策堯之餘策謂堯典也在下謂後代子孫也言堯典為子孫之訓非漢不能𢎞大也厥道至乎經緯乾坤出入三光外運混元内浸豪芒性類循理品物咸亨其已久矣經緯天地言隂陽交泰也出入三光言日月星得其度也混元天地之總名也豪芒纎微也老子曰和隂陽節四時潤乎草木浸乎金石毫毛潤澤性生也循順也含生之熲皆順於理尚書曰别生分類品物萬殊亨通也易曰含𢎞光大品物咸亨盛㢤皇家帝世徳臣列辟功君百王榮鏡宇宙尊無與抗皇家帝代謂漢家歴代也列辟謂古之帝王也言漢家徳可以臣彼列辟功可以君彼百王相如封禪書曰歴選列辟鏡猶光明也抗猶敵也讀曰康乃始䖍鞏勞謙兢兢業業貶成抑定不敢論制作爾雅曰䖍鞏固也易曰勞謙君子有終吉言帝固為勞謙也兢兢戒慎也業業危懼也禮記曰王者功成作樂理定制禮今不敢論制禮作樂之事言謙之甚也至令遷正黜色賔監之事煥揚宇内而禮官儒林屯朋篤論之士而不傳祖宗之彷彿雖云優慎無乃葸歟遷正改正朔也黜色易服色也賔謂殷周二王之後謂漢之賔監視也視殷周之事以為監戒論語孔子曰周監于二代屯衆也朋羣也不傳謂不制作篇藉以紀功徳也彷彿猶梗槩也論語孔子曰慎而無禮則葸鄭𤣥注云葸質慤貎也言雖優游謙慎無乃太質慤也於是三事嶽牧之僚僉爾而進曰陛下仰監唐典中述祖則俯蹈宗軌三事三公也僉皆也躬奉天經惇睦辯章之化洽天經謂孝也孔子曰夫孝天之經謂章帝初即位四時禘袷宗祀於明堂也尚書曰惇叙九族又曰九族既睦辯章百姓鄭𤣥注云辯别也章眀也惇厚也睦親也章帝性篤愛不忍與諸王乖離皆㽞京師也廵靖黎蒸懐保鰥寡之恵浹廵撫也靖安也黎蒸皆衆也懐思也保安也浹洽也尚書曰懐保小人惠鮮鰥寡謂章帝在位凡四廵狩賜人爵鰥寡孤獨不能自存者粟燔瘞縣沈肅祗羣神之禮備爾雅曰祭天曰燔柴祭地曰瘞埋祭山曰庋縣祭川曰浮沈肅祗恭敬也封禪書曰湯武至尊不失肅敬元和中詔曰朕廵狩岱宗柴望山川庋音居毁反是以鳳凰來儀集羽族於觀魏肉角馴毛宗於外囿擾緇文皓質於郊升黄暉采鱗於沼甘露霄零於豐草三足軒翥於茂樹尚書曰鳳凰来儀元和二年詔曰乃者鳳凰鸞鳥比集七郡羽族謂羣鳥隨之也觀魏門闕也肉角謂麟也伏侯古今注曰建初二年北海得一角獸大如麕有角在耳間端有肉又元和二年麒麟見陳一角端如葱葉色赤黄櫌馴也緇文皓質謂騶虞也說文曰騶虞白虎黑文尾長于身古今注曰元和三年白虎見彭城黄暉采鱗謂黄龍也建初五年有八黄龍見于零陵古今注曰元和二年甘露降河南三足烏集沛國軒翥謂飛翔上下也若乃嘉穀靈草竒獸神禽應圖合牒窮祥極瑞者朝夕坰牧日月邦畿卓犖乎方州羡溢乎要荒嘉穀嘉禾靈草芝屬古今注曰元和二年芝生沛如人冠大坐状章和九年詔曰嘉榖滋生芝草之類嵗月不絶竒獸神禽謂白虎白雉之屬也建初七年獲白鹿元和元年日南獻生犀白雉言應於瑞圖又合乎史諜也坰牧郊野也卓犖殊絶也羡音以戰反劉攽曰注如人冠大坐案文大當作衣冠如人衣冠坐也昔姬有素雉朱烏𤣥秬黄之事耳君臣動色左右相趨濟濟翼翼峨峨如也孝經援神契曰周成王時越裳來獻白雉朱烏謂赤烏也尚書中候曰大子發渡孟津有火自天止于王屋流為赤烏𤣥秬黑黍也詩大雅曰誕降嘉種惟秬惟秠黄麥也謂赤烏銜牟麥而至也詩頌曰貽我來牟詩大雅曰濟濟多士又曰惟此文王小心翼翼又曰奉璋峨峨盖用昭眀寅畏承聿懐之福亦以寵靈文武貽燕後昆覆以懿鑠豈其為身而有顓辭也詩大雅曰昭明有融寅敬也尚書曰嚴恭寅畏聿述也懐思也詩大雅曰昭事上帝聿懐多福貽遺也燕安也後昆子孫也言此並以光寵神靈文王武王之徳遺燕安于子孫也詩大雅曰貽厥孫謀以燕翼子覆猶重也懿鑠並羙也詩大雅曰我求懿徳又曰於鑠王師言詩人歌頌周之盛徳當成康之時其成王康王豈獨為身而有自専之辭也並上寵文武之業下遺子孫之基也言今章帝既獲符瑞之應亦宜同成康之事也若然受之宜亦勤恁旅力以充厥道啓恭館之金縢御東序之祕寳以流其占受之謂漢受此符瑞也說文曰恁念也音人甚反旅陳也允當也恭肅之館謂廟中也金縢以金緘匱藏符瑞之書於其中也御猶陳也東序東箱也秘寳謂河啚之屬尚書曰天球河啚在東序孔安國注曰河啚八卦是也言啓金縢之書及河啚之卦以占之也流猶徧也夫圖書亮章天哲也孔猷先命聖孚也體行徳本正性也逄吉丁辰景命也啚書河啚洛書也亮信章眀哲智言天便啚書者為天子所知也孔孔丘也猷啚也孚信也孔丘之啚先命漢家當湏封禪此聖人之信也體行猶躬行也孔子曰夫孝徳之本也易曰乾道變化各正性命丁當也辰時也景大也逄休吉之代當封禪之時此為天子之大命也順命以創制定性以和神答三靈之繁祉展放唐之眀文兹事體大而允寤寐次于聖心瞻前顧後豈蔑清廟憚勑天乎命謂符瑞也荅對也三靈天地人之神也繁多也祉福也展陳也放效也音甫往反效唐堯之文謂封禅也尚書璇璣鈐曰平制禮樂放唐之文兹事謂封禪之事大而且信次止也寤寐常止于聖心言不可忘之也前謂前代帝王後謂子孫也蔑輕也彈難也勑正也言封禪之事皆述祖宗之徳今乃推譲豈輕清廟而難正天命乎尚書曰勑天之命惟時惟㡬伊考自􅃉古乃降戾爰兹作者七十有四人有不俾而假素罔光度而遺章今其如台而獨闕也伊維也䆳古猶逺古也楚詞曰䆳古之初戾至也言自逺古以來至於此也作者謂封禪者史祀管仲曰自古封禅七十二君并武帝及光武為七十四君俾使也有天下不使其封禪而假為竹素之文者無有光揚法度而棄其文章不封禪者也台我也今其如我何獨闕也是時聖上固已垂精游神包舉蓺文屢訪羣儒諭咨故老與之乎斟酌道徳之淵源肴覈仁義之林藪以望元符之臻焉聖上謂章帝也論告咨謨也道徳仁義人所常行故以酒食為喻焉淵源林藪喻深䆳也元天也符瑞也詩曰肴核惟旅覈亦核也謂果實之屬既成羣后之讜辭又悉經五繇之碩慮矣将絣萬嗣煬洪暉奮炎景扇遺風播芳烈久而愈新用而不竭汪汪乎丕天之大律其疇能亘之哉唐㢤皇㢤皇哉唐哉讜直言也繇兆辭音胄左傳曰先王卜征五年而嵗習其祥不習則増修其徳而改卜碩大也慮思也廣雅曰絣續也音方盟反景大也炎謂火徳汪汪猶深也今文尚書泰誓篇曰立功立事可以永年丕天之大律鄭𤣥注云丕大也律法也疇誰也亘猶竟也唐哉謂堯也皇哉謂漢也言唯唐與漢唯漢與唐固後以母喪去官永元初大將軍竇憲出征匈奴以固為中䕶軍與叅議北單于聞漢軍出遣使欵居延塞欲修呼韓邪故事朝見天子請大使憲上遣固行中郎將事將數百騎與虜使俱出居延塞迎之㑹南匈奴掩破北庭永元二年南單于出雞鹿塞擊北匈奴於河雲大破之固至私渠海聞虜中亂引還及竇憲敗固先坐免官固不教學諸子諸子多不遵法度吏人苦之初洛陽令种兢嘗行固奴干其車騎吏推呼之奴醉罵兢大怒畏憲不敢發心衘之及竇氏賔客皆逮考兢因此捕繋固遂死獄中時年六十一詔以譴責兢抵主者吏罪固所著典引賔戯應譏詩賦銘誄頌書文記論議六言在者凡四十一篇論曰司馬遷班固父子其言史官載籍之作大義粲然著矣論者咸稱二子有良史之才遷文直而事覈固文贍而事詳若固之序事不激詭不抑抗激揚也詭毁也抑退也抗進也贍而不穢詳而有體使讀之者亹亹而不猒信哉其能成名也爾雅曰舋亹猶勉也彪固譏遷以為是非頗謬於聖人言遷所是非皆與聖人乖謬即崇黄老而薄五經輕仁義而賤守莭是也然其論議常排死節否正直而不叙殺身成仁之為羙固序游俠傳曰劇孟郭觧之徒馳騖於閭閻雖其䧟于刑辟自與殺身成名若季路仇牧而不悔也古之正法五伯三王之罪人六國五伯之罪人四豪者又六國之罪人況於郭觧之倫以匹夫之細竊殺生之權其罪不容於誅也則輕仁義賤守節愈矣愈猶甚也固傷遷博物洽聞不能以智免極刑謂下蠶室然亦身陷大戮此已上略華嶠之辭智及之而不能守之論語孔子之言也言有智而不能自守其身嗚呼古人所以致論於目睫也史記齊使者至越曰幸也越之不亡也吾不遺其智之如目見毫毛而不見其睫也今越王知晉之失計不自知越人之過是目論也言班固譏遷被刑而不知身自遇禍賛曰二班懐文裁成帝墳沈約宋書曰初謝儼作此賛云裁成典墳以示范曄曄改為帝墳比良遷董謂司馬遷董狐也左傳曰董狐古之良史也兼麗卿雲司馬長卿揚子雲彪識王命固迷世紛後漢書卷七十下
