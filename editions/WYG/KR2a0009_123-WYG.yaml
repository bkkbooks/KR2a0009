body:
  text: 景祐元年九月祕書丞余靖上言國子監所印兩漢書文字舛譌恐誤後學臣謹參括衆本旁據他書列而辯之望行刋正詔送翰林學士張觀等詳定聞奏又命國子監直講王洙與靖偕赴崇文院讎對謹按後漢明帝詔班固陳宗尹敏孟冀作世祖本紀及建武時功臣列傳後有劉珍李充雜作建武已後至永初間紀傳又命伏無忌黄景作諸王王子恩澤侯并單于西羌地理志又邊韶崔寔朱穆曹夀作皇后外戚傳百官表及順帝功臣傳成一百一十四篇號曰漢紀嘉平中馬日磾蔡邕楊劇盧植續為東觀漢紀呉武陵太守謝承作漢書一百三十卷晉散騎常侍薛塋作後漢紀一百卷泰始中祕書丞司馬彪始取衆説首光武至孝獻作續漢書又散騎常侍華嶠刪定東觀記為漢後書九十七篇祠部郎謝沈作後漢書一百二十二卷祕書監袁山松作一百卷至宋宣城太守范曄益集諸家作十紀十志八十列傳凡百篇十志未成曄被誅至梁世有剡令劉昭者補成之唐章懐太子賢詔集當時學者右庶子張太安洗馬劉訥言洛州司戸參軍革希𤣥學士許叔牙成𤣥一史藏諸周寳寧等同註范曄後漢書儀鳯初上之詔付祕書省傳之至今靖洙悉取館閣諸本參校二年九月校畢凡増五百一十二字損一百四十三字改正四百一十一字
