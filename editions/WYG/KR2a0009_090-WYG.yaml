body:
  text: 後漢書卷九十上宋宣城太守范煜撰唐章懷太子賢注馬融列傳第五十上馬融傳馬融字季長扶風茂陵人也融集云茂陵成懽里人也將作大匠嚴之子嚴援兄余之子為人美辭貎有俊才初京兆摯恂以儒術教授隱於南山不應徵聘名重關西三輔決錄注曰恂字季直好學善屬文隱於南山之隂融從其遊學博通經籍恂竒融才以女妻之永初二年大將軍鄧騭聞融名召為舍人非其好也遂不應命客於涼州武都漢陽界中會羌虜飈起邊方擾亂米穀踴貴自關以西道殣相望左傳曰叔向云道殣相望杜注云餓死為殣也音覲融既飢困乃悔而歎息謂其友人曰古人有言左手據天下之圖右手刎其喉愚夫不為荘子曰言不以名害其生者所以然者生貴於天下也今以曲俗咫尺之羞滅無貲之軀殆非老荘所謂也故往應騭召四年拜為校書郎中謝承及續漢書並云為校書郎又拜郎中也詣東觀典校祕書是時鄧太后臨朝騭兄弟輔政而俗儒世士以為文德可興武功宜廢遂寢蒐狩之禮息戰陳之法故猾賊從横乗此無備融乃感激以為文武之道聖賢不墜五才之用無或可廢五才金木水火土也左傳曰宋子罕曰天生五材人並用之廢一不可誰能去兵也元初二年上廣成頌以諷諫其辭曰廣成苑在今汝州梁縣西臣聞孔子曰奢則不遜儉則固奢儉之中以禮為界界猶限也是以蟋蟀山樞之人並刺國君諷以太康馳驅之節詩國風序曰蟋蟀刺晉僖公也儉不中禮其詩曰無己太康職思其居毛萇注云己甚也鄭箋云君雖當自樂亦無甚太樂欲其用禮以為節也又序曰山有樞刺晉昭公也有才不能用其詩曰子有車馬弗馳弗驅宛其死矣他人是愉言僖公以太康貽戒昭公以不能馳驅被譏言文武之道須折𠂻也樞音謳劉攽曰註有才不能用案文才當作財夫樂而不荒憂而不困左傳曰吳季札聘於魯魯為之歌頌季札曰樂而不荒為之歌衛曰憂而不困先王所以平和府藏頥養精神致之無疆韓詩外傳曰人有五藏六府何謂五藏精藏於腎神藏於心魂藏於肝魄藏於肺志藏於脾此之謂五藏也何謂六府喉咽者量腸之府也胃者五榖之府也大腸者轉輸之府也小腸者受成之府也膽者積精之府也旁光者湊液之府也詩曰天生蒸民有物有則故戞擊鳴球載於虞謨吉日車攻序於周詩戞敔也音古八反形如伏獸背上有二十七刻以木長尺櫟之所以止樂擊柷也象桶中有椎柄連底揺之所以作樂見三禮圖球玉磬也虞謨舜典也詩小雅曰吉日維戊既伯既禱田車既好四牡孔阜又曰我車既攻我馬既同聖主賢君以增盛美豈徒為奢淫而已哉伏見元年已來遭値戹運元年謂安帝即位年也戹運謂地震大水雨雹之類陛下戒懼災異躬自菲薄荒棄禁苑廢弛樂懸勤憂潛思十有餘年以過禮數重以皇太后體唐堯親九族篤睦之德陛下履有虞烝烝之孝外舍諸家毎有憂疾聖恩普勞遣使交錯稀有曠絶時時寧息又無以自娛樂殆非所以逢迎太和裨助萬福也臣愚以為雖尚頗有蝗蟲今年五月以來雨露時澍祥應将至方渉冬節農事間隙宜幸廣成覽原隰觀宿麥勸收藏因講武校獵使寮庶百姓復覩羽旄之美聞鐘鼓之音歡欣喜樂鼓舞疆畔孟子對齊宣王曰今王頗鼓樂於此百姓聞王鐘鼓之聲舉欣欣然有喜色而相告曰吾王庻幾無疾病歟何以能鼓樂也今王田獵於此百姓見羽旄之美欣欣有喜色而相告曰吾王庶幾無疾病歟何以能田獵也此無佗與人同樂也劉攽曰注今王頗鼓樂案文多一頗字以迎和氣招致休慶小臣螻蟻不勝區區職在書籍謹依舊文重述蒐狩之義作頌一篇幷封上淺陋鄙薄不足觀省臣聞昔命師於鞬櫜偃伯於靈臺或人嘉而稱焉鞬以藏箭櫜以藏弓鞬音紀言反櫜音髙禮記孔子曰武王剋殷倒載干戈包以獸皮名之曰建櫜鄭注云建讀為鍵音其蹇反謂藏閉之也此馬鄭異議司馬法曰古者武軍三年不興則凱樂凱歌偃伯靈臺答人之勞告不興也偃休也伯謂師節也靈臺望氣之臺也彼固未識夫雷霆之為天常金革之作昬明也左傳鄭子太叔曰為刑罰威獄以類天之震耀殺戮杜預注曰雷霆震耀天之威也聖人作刑獄以象類之又宋子罕曰兵之設乆矣所以威不軌而昭文徳也聖人以興亂人以廢廢興存亡昬明之術皆兵之由也自黄炎之前傳道罔記三五以來越可略聞且區區之酆郊猶廓七十里之囿盛春秋之苖酆周文王所都孟子曰文王之囿方七十里爾雅曰春獵為蒐夏曰苖秋曰獮冬曰狩詩詠圃草樂奏騶虞韓詩曰東有圃草駕言行狩毛詩曰彼茁者葭一發五豝于嗟乎騶虞毛萇注云騶虞義獸也白虎黑文不食生物有至信之德則應之周禮大司樂王大射則奏騶虞是以大漢之初基也宅兹天邑揔風雨之會交隂陽之和周禮曰風雨之所會也隂陽之所和也乃建王國焉天邑謂洛陽也揆厥靈囿營于南郊揆度也詩大雅曰王在靈囿言作廣成苑以比之徒觀其埛場區宇恢胎曠蕩􅀢夐勿罔寥豁鬱泱􅀢音眇泱音烏朗反並廣大貎騁望千里天與地莽於是周阹環瀆右矕三塗左概嵩嶽阹音欺於反上林賦曰江河為阹郭璞注曰因山谷遮禽獸曰阹爾雅曰矕視也音馬板反三塗山名在陸渾縣西南靣據衡隂箕背王屋浸以波溠夤以滎洛衡隂衡山之北山海經曰雉山澧水出焉東曰衡山多青臒地里志云雉縣衡山澧水所出在今鄧州向城縣北王屋山在今王屋縣北周禮曰豫州其浸波溠其川滎洛水經注云溠水出黄山在今隨州棗陽縣東北又云波水出歇馬嶺即應劭所謂孤山波水所出者今在汝州魯山西北滎水在滎陽縣東是也金山石林殷起乎其中峨峨磑磑鏘鏘􅞐􅞐隆穹槃回嵎峗錯崔金山金門山也水經注云在澠池縣南石林大石山也一名萬安山在河南郡境薄云洛陽縣南大石山中有雜樹木有祠名大石祠山髙二百丈也殷音於謹反磑音五來反􅞐音徂回反嵎音隅峗音魚軌反並髙峻貌神泉側出丹水湼池怪石浮磬燿焜于其陂爾雅曰汍泉穴出穴出側出也丹水湼水在今鄧州怪石怪異好石似玉者浮磬若泗水中石可以為磬也燿焜光也其土毛則㩁牧薦草芳茹甘荼毛草也左傳云楚芊尹無宇曰食土之毛誰非君臣㩁相傳音角㩁牧未詳荘子曰麋鹿食薦一曰草稠曰薦茹菜也爾雅曰荼苦菜也詩曰堇荼如飴飴亦甘也茈萁芸蒩昌本深蒲茈音紫萁音其爾雅曰綦月爾郭璞注曰即紫綦也似蕨可食芸香草也説文云似苜蓿蒩音資云都反廣雅曰蕺蒩也其根似茅根可食昌本昌蒲根也深蒲謂蒲白生深水之中芝荋堇荁蘘荷芋渠芝荋草也禮記曰芝栭菱椇荋音而堇菜花紫葉可食而滑荁音户官反禮記曰堇荁枌榆鄭注云荁堇類也蘘荷苖似薑根色紅紫似芙蓉可食芋渠即芋魁也一名蹲鴟大葉其根亦可食也桂荏鳬葵格韮葅于爾雅曰蘇桂荏方言曰蘇亦荏也爾雅曰茆鳬葵葉團似蓴生水中今俗名水葵爾雅曰茖山葱格與茖古字通菹音子閭反即巴苴一名芭蕉于軒于也一名蕕生於水中涘其植物則𤣥林包竹藩陵蔽京珍林嘉樹建木叢生𤣥猶幽也包叢生也爾雅曰大阜曰陵絶髙曰京藩亦蔽也建木長木也椿梧栝栢柜柳楓楊並木名也柜音矩楊協韻音以征反豐彤對蔚崟頟槮爽並林木貎也對音徒對反崟音吟槮音所金反爽叶韻音生翕習春風含津吐榮鋪于布蓶扈蘳熒惡可殫形鋪音敷蓶音以揆反郭璞注爾雅云草木花初出為笋與蓶通其字從唯本作從荏者誤也扈音户蘳音胡瓦反字從圭並花葉貎本作黊說文云黊黄花也廣雅曰好色也熒光也惡何也音烏至于陽月隂慝害作百草畢落林衡戒田焚萊柞木爾雅曰十月為陽孫炎注曰純隂用事嫌於無陽故以名云左傳曰唯正月之朔慝未作杜注云慝隂氣也害作言隂氣肅殺害於百草也周禮曰林衡掌巡林麓之禁令又曰牧師掌牧地凡田事贊焚萊除草也柞音士雅反邪斫木也周禮柞氏掌攻草木及林麓然後舉天網頓八紘揫斂九藪之動物繯橐四野之飛征揫聚也子由反周禮職方氏掌九藪揚州具區荆州雲夢豫州圃田青州孟諸兗州大野雍州弦蒲幽州貕養冀州楊紆幷州昭余祁鄭𤣥注云澤無水曰藪動物謂禽獸也繯音胡犬反又胡串反說文曰繯落也國語曰繯於山有罕賈逵注云繯還也橐囊也音託四野四方之野飛征飛走也鳩之乎兹囿之中山敦雲移羣鳴膠膠鄙騃譟讙子野聽聳離朱目眩隸首策亂陳子籌昬鳩聚也敦音屯亦積聚也鄙騃獸奮迅貌也鄙音普美反騃音俟韓詩曰駓駓俟俟或羣或友眩亂也叶韻音𤣥隸首黄帝時善筭者也陳子陳平善於籌策也昬亂也言禽獸多不可筭計於時營圍烣廓充斥川谷罦罝羅羉彌綸阬澤臯牢陵山罦音浮雉網也置罟也羉彘網也音力官反並見爾雅阬音苦庚反蒼頡篇曰阬壑也臯牢猶牢籠也孫卿子曰臯牢天下而制之若制子孫也諸本有作牢柵者非也校隊案部前後有屯甲乙相伍戊己為堅周禮司馬職曰前後有屯甲乙謂相次也伍伍長也戊己居中為中堅也乘輿乃以吉月之陽朔登于疏鏤之金路六驌騻之𤣥龍建雄虹之旌夏揭鳴鳶之修橦陽朔十月朔也疏鏤謂彫鏤也周遷輿服雜記曰玉路重輅也金路玉路形制如一六駕六馬也續漢志曰天子五路駕六馬驌騻馬名左傳云唐成公有兩驌騻馬周禮曰馬髙八尺曰龍禮記曰孟冬乘𤣥輅駕鐵驪今此亦順冬氣而乘𤣥也郭璞注爾雅云虹䨇出色鮮盛者為雄左傳云舞師題以旌夏杜預注云旌夏大旌也揭舉也音渠列反禮記曰前有塵埃則載鳴鳶鳶鴟也音緣鳴則風動故畫之於旌旗以候埃塵也橦者旗之竿也音直江反曵長庚之飛髾載日月之太常棲招揺與𤣥弋注枉矢於天狼長庚即太白星髾音所交反即旌旗所垂之羽毛也太常天子所建大旗也畫之日月周禮云日月為常招揺𤣥弋天狼並星名也枉矢妖星蛇行有尾目赤畫於旌旗也劉攽曰案妖星可見尾目而已又言其赤非也赤當作亦上文大常畫日月故云亦畫也羽毛紛其髟鼬揚金㚇而拖玉瓖髟鼬羽旄飛揚貎也髟音必由反鼬音羊救反蔡邕獨斷曰金㚇者馬冠也髙廣各四寸在馬鬉前㚇音無犯反一音子公反瓖馬𢃄以玉飾之音襄屯田車於平原播同徒於高岡旃旝摻其如林錯五色以摛光詩小雅曰我車既好又曰射夫既同言徒衆齊同也旝亦旃也音古㑹反左傳曰旝動而鼓摻音所金反與森字同劉攽曰注我車既好案我當作田清氛埃埽野塲誓六師搜雋良野塲謂除其草萊令得驅馳也左傳曰天子六軍雋良馬之善者司徒勒卒司馬平行車攻馬同教達戒通周禮曰司徒若將有軍旅㑹同田役之戒則受法于司馬以作其衆又曰司馬狩田以旌為左右和之門前後有屯百歩有司巡其前後鄭注云正其士之行列詩小雅曰我車既攻我馬既同毛萇注云攻堅也同齊也戎事齊力尚强也田獵齊足尚疾也伐咎鼓撞華鍾獵徒縱赴榛叢咎鼓大鼓也音公刀反周禮􅀢鼓長尋有四尺徽嫿霍奕别騖分奔騷擾聿皇往來交舛紛紛回回南北東西嫿音呼獲反並奔馳貎風行雲轉匈礚隱訇黄塵勃滃闇若霧昬礚音苦蓋反訇音火宏反並聲也滃音烏董反日月為之籠光列宿為之翳昧僄狡課才勁勇程氣僄狡勇捷僄匹妙反狗馬角逐鷹鸇競鷙驍騎旁佐輕車横厲相與陸梁聿皇于中原絹猑蹏鏦特肩脰完羝撝介鮮散毛族梏羽羣絹繫也與冐通工犬反猑蹏野馬也爾雅曰騉蹄趼善升甗猑音昆鏦猶撞也揚雄方言曰吳楚之間或謂矛為鏦音楚江反韓詩齊風曰並驅從兩肩兮薛君傳曰獸三嵗曰肩脰頸也謂中其頸也脰音豆完羝野羊也臣賢案字書作羦音户官反與完通梏諸家並古酷反案字書梏從手即古文攪字謂攪擾也然後飛鋋電激流矢雨墜各指所質不期俱殪竄伏扔輪發作梧轊鋋矛也周禮曰王弓以授射甲革椹質者鄭𤣥云質正也正音征扔音人證反聲類曰扔摧也言為輪所摧也梧支梧也音悟謂支著車也轊車軸頭也音衛謂車軸轥而殺之祋殳狂擊頭陷顱碎獸不得猭禽不得瞥祋亦殳也音丁外反顱額也音盧猭走也音丑戀反瞥視也叶韻音疋例反殳音殊或夷由未殊顚狽頓躓蝡蝡蟫蟫充衢塞隧葩華䓑布不可勝計夷由不行也楚詞曰君不行兮夷由未殊謂未死蝡音而兗反說文曰動也蟫音似林反亦動貎也若夫鷙獸毅蟲倨牙黔口大匈哨後縕巡歐紆負隅依阻莫敢嬰禦爾雅曰駮如馬倨牙食虎豹黔黒也周禮考工記曰大匈燿後有力而不能走鄭𤣥注曰燿讀曰哨哨小也音稍縕巡並行貎也縕音於粉反孟子曰有衆逐虎虎負隅莫之敢攖攖迫也禦扞也乃使鄭叔晉婦之徒睽孤刲刺裸裎袒裼鄭叔鄭荘公弟太叔叚也詩鄭風曰大叔于田乗乗馬禮裼暴虎獻于公所孟子曰晉人有馮婦者善搏虎攘臂下車衆皆悅之睽離也孤獨也謂挺身刺獸刲亦刺也音苦圭反爾雅曰袒裼肉袒也孟子曰袒裼裸裎於我側説文曰裎裸也其字從衣冒􅩆柘搓棘枳窮浚谷底幽嶰暴斥虎搏狂兕獄􅀢熊抾封狶爾雅曰􅩆山桑也音一染反搓斫也音仕雅反嶰謂山澗也蒼頡篇曰斥大也􅀢亦狂也音吉曵反說文曰兕似野牛而青色抾音刼古字通封大也狶豬也虛起反或輕訬趬悍廋疏㟺領犯歴嵩巒陵喬松履修樠踔攳枝杪標端尾蒼蜼掎𤣥猨木産盡寓屬單訬輕捷也音初稍反趬音丘昭反說文曰趬行輕貎廋疏猶搜索也廋音所由反字林曰㟺山巓也音力于反爾雅曰山大而髙曰嵩山小而髙銳曰戀襔音莫寒反踔跳也音勅教反􅔨音尋謂長枝也杪音亡小反標音必遥反並木末也蜼音以蘂反爾雅曰蜼卬鼻而長尾郭璞注曰似獮猴而大黄黑色尾長數尺末有兩岐两則自懸於樹以尾塞鼻零陵南康人呼之音餘建平人呼之音相贈遺之遺也又音余救反皆土俗輕重不同耳掎音居螘反說文曰偏引一足也木産謂巢栖之類也寓屬謂穴居之屬也罕罔合部􅊻弋同曲類行並驅星布麗屬曹伍相保各有分局罕亦網也相如上林賦曰戴雲罕續漢志曰将軍有部部下有曲罾魚網也音增弋繳射也分音扶問反矰碆飛流纎羅絡縸遊雉羣驚晨鳬軰作翬然雲起霅爾雹落矰弋矢也碆與磻同音補何反又補佐反説文曰以石著隿繳也絡縸張羅貎也縸與幕通翬飛也音揮霅音素洽反廣雅曰霅雨也言鳥中繳如雨之落爾乃􅀢觀高蹈改乗回轅泝恢方撫馮夷策句芒超荒忽出重陽厲雲漢横天潢􅀢逺也音名小反田獵既罷故改乗回轅也左傳曰改乗轅而北之泝上也恢大也馮夷河伯也句芒東方之神也荒忽幽逺也重陽天也雲漢天河也天潢星也導鬼區徑神場詔靈保召方相驅厲疫走蜮祥靈保神巫也楚辭九歌曰思靈保兮賢姱周禮方相氏掌執戈揚楯帥百𨽻以􅇌疫洪範五行傳曰蜮射人生於南越謂之短狐詩蟲魚疏曰一名射景如鼈三足今俗謂之水弩也劉攽曰正文案導當作道捎罔兩拂游光枷天狗緤墳羊捎音所交反鄭注周禮曰捎除也國語曰木石之怪曰䕫罔兩游光神也兄弟八人天狗星名也春秋元命包日天狗主守財緤繫也音息列反墳羊土之怪其形似羊見家語然後緩節舒容裴回安歩降集波籞川衡澤虞矢魚陳罟波籞池籞也前書音義曰籞在池中作室可用栖鳥入則捕之又曰折竹以繩綿連禁禦使人不得往來也周禮川衡掌川澤之禁令澤虞掌國澤之政令也左傳曰魯隱公矢魚於棠矢亦陳也國語曰魯宣公夏濫罟於泗川里革斷其罟而棄之曰古者大寒降水虞於是登川禽而嘗之於廟行諸國助宣氣也今魚方孕又行罟貪無蓺也公曰吾之過也籞音圉兹飛宿沙田開古蠱音冶翬終葵揚關斧刋重冰撥蟄户測潛鱗踵介旅兹飛即佽飛也呂氏春秋曰荆人佽飛渉江中流兩蛟繞其船佽飛㧞劒赴江刺蛟殺之魯連子曰古善漁者宿沙渠子使漁山側雖十宿沙子不得魚焉宿沙非暗於漁道也彼山者非魚之所生也晏子春秋曰公孫捷田開彊古冶子事景公以勇晏子勸景公餽之二桃曰計功而食之公孫捷持楯而再搏乳虎若捷之功可以食桃田開彊曰吾仗兵禦三軍者再可以食桃古冶子曰吾嘗濟河黿銜左驂以入砥柱之流吾逆而百歩順流九里得黿頭鶴躍而出可以食桃矣二子皆反其桃契領而死古冶子曰二子死之吾獨生不仁亦契領而死蠱與冶通翬亦揮也廣雅曰終葵椎也關斧斧名也刋除也踵猶尋也介謂鱗蟲之屬也旅衆也劉攽曰注公孫捷持楯而再搏乳虎案如下文則此少曰吾二字逆獵湍瀨渀薄汾撓淪滅潭淵左挈䕫龍右提蛟鼉春獻王鮪夏薦鼈黿渀音蒲良反撓奴教反並入水貎也淪滅謂没於水中也鼉音壇鮪鱣屬也大者為王鮪小者為叔鮪禮記季春之月天子始乗舟薦鮪於寢廟季夏之月令漁師取黿也於是流覽徧照殫變極態上下究竟山谷蕭條原野嵺愀上無飛鳥下無走獸虞人植旍獵者効具車弊田罷旋入禁囿流覽謂周流觀覽也周禮曰植虞旌以屬禽鄭注曰植猶樹也田上樹旗令獲者皆致其禽也又曰車弊獻禽以享礿注曰車弊車止也嵺音力救反愀音七救反亦蕭條貎也棲遲乎昭明之觀休息乎高光之榭以臨乎宏池宏大也鎭以瑶臺純以金堤樹以蒲柳被以綠莎瀇瀁沆漭錯紾槃委天地虹洞固無端涯大明生東月朔西陂純緣也音之尹反蒲亦柳也瀇音胡廣反瀁音養沆音胡朗反漭音莽並水貎也錯紾交結也紾音之忍反委音於危反虹洞相連也虹音胡貢反朔生也禮記曰大明生於東月生於西鄭注曰大明日也言池水廣大日月出於其中也乃命壺涿驅水蠱逐罔螭滅短狐簎鯨鯢周禮壺涿氏掌除水蠱涿音丁角反蠱音公户反罔謂罔兩也螭龍也短狐即蜮也簎音七亦反説文曰刺也周禮鼈人掌以時籍魚鼈龜蜃鄭衆注云簎謂以杖刺泥中搏取之然後方餘皇連舼舟張雲帆施蜺幬靡颸風陵迅流發櫂歌縱水謳淫魚出蓍蔡浮湘靈下漢女游方猶並也餘皇吳之船名也見左傳舼小舟也音渠恭反淮南子曰越舼蜀艇不能無水而浮帆音凡幬帳也音直由反颸疾風也音楚疑反武帝秋風詞曰簫鼓鳴兮發櫂歌劉向列女傳曰津吏之女中流奏河激之歌韓詩外傳曰瓠巴鼓琴淫魚出聽淮南子曰上有叢蓍下有伏龜論語曰臧文仲居蔡注云龜出蔡地故以為名也湘靈舜妃溺於湘水為湘夫人也見楚詞漢女漢水之神女詩云漢有游女水禽鴻鵠鴛鴦鷗鷖鶬鴰鸕鷁鷺鴈鷿鷉乃安斯寢戢翮其涯鴛鴦匹鳥也鷗白鷗也鷖鳬屬也爾雅曰鶬麋鴰今謂之鴰鹿音括鸕鸕鷀也楊孚異物志云能没於深水取魚而食之不生卵而孕雛於池澤間既胎而又吐生多者生八九少生五六相連而出若絲緒焉水鳥而巢髙樹之上鷁白鶂也鷺白鷺也鷿音歩歴反鷉音梯揚雄方言曰野鳬也甚小好没水中膏可以瑩刀劒寢宿也詩曰乃安斯寢涯水濵也魴鱮鱏鯿鰋鯉鱨魦樂我純德騰踊相隨雖靈沼之白鳥孟津之躍魚方斯蔑矣鱮音緒似魴而弱鱗鱏音徐林反口在頷下大者長七八尺鯿音卑連反魴之類也鰋音匽今鰋額白魚也鱨音嘗詩蟲魚疏曰今黄頰魚也魦音沙或作鯊郭義恭廣志曰吹沙魚大如指沙中行詩大雅曰王在靈沼於牣魚躍鄭𤣥注云靈沼之水魚盈滿其中也皆以跳躍又曰白鳥翯翯翯肥澤也音學言並得其所也尚書中候曰武王度孟津白魚躍入于王舟中也然猶詠歌於伶簫載陳於方策豈不哀哉伶樂官也詩國風序曰衛之賢者仕於伶官禮記曰文武之道布在方策又曰百名以上書之於策不滿百名書之於方鄭注云方板也於是宗廟既享庖厨既充車徒既簡器械既攻禮記曰天子嵗三田一為乾豆二為賔客三為充君之庖然後擺牲班禽淤賜犒功羣師疊伍伯校千重山罍常滿房俎無空廣雅曰擺開也字書擺布字也音歩買反班固西都賦曰置互擺牲班布也淤與飫同左傳曰加饍則飫賜犒勞也山罍畫為山文禮記曰山罍夏后氏之樽也又曰周以房俎鄭𤣥注云房謂足下跗也有似於堂房矣酒正案隊膳夫巡行清醪車湊燔炙騎将鼓駭舉爵鍾鳴既觴周禮酒正中士辯五齊之名三酒之物膳夫上士掌王之食飲膳羞説文曰醪汁滓酒也大雅曰或燔或炙將行也既盡也流俗本爵字作爝旣字作暨皆誤若乃陽阿衰斐之晉制闡􅀢華羽之南音淮南子曰歌采菱發陽阿禮記曰嘽諧慢易之音作而人康樂鶡冠子曰南方萬物華羽焉故以調羽也所以洞蕩匈臆發明耳目疏越藴慉駭恫底伏越散也蘊慉猶積聚也慉與畜通恫音洞底伏猶滯伏也呂氏春秋曰昔隂康氏之始隂多滯伏湛積故作為舞以宣導之此言作樂亦以疏散滯伏之象鍠鍠鎗鎗奏于農郊大路之衢與百姓樂之鍠鍠鎗鎗鍾鼔之聲也鍠音横鎗音測庚反孟子謂齊宣王曰今王與百姓同其樂則王矣農郊田野也是以明德耀乎中夏威靈暢乎四荒東鄰浮巨海而入享西旅越葱嶺而來王南徼因九譯而致貢朔狄屬象胥而來同入享來助祭也孔安國注尚書曰西旅西戎逺國也葱嶺西域山也西河舊事曰嶺上多葱因以名焉徼塞之道也九譯謂九重譯語而通中國也尚書大傳曰周成王時越裳氏重九譯而貢白雉朔狄北狄也周禮象胥掌蠻夷戎翟之國使傳王之言而諭説焉以和親之鄭注云通夷狄之言者曰象胥其有才智者也此類之本名東方曰寄南方曰象西方曰狄鞮北方曰譯此官正為象者周始有南越重譯來貢獻是以名通言語之官為象胥胥音諝劉攽曰注名通言語之官為象胥案文當作通名謂總稱言語之官為象胥也盖安不忘危治不忘亂道在乎兹斯固帝王之所以曜神武而折遐衝者也晏子春秋曰晉平公欲攻齊使范昭觀焉景公觴之范昭曰願請君之棄酌景公曰諾范昭已飲晏子命徹尊更之范昭歸以報晉平公曰齊未可伐也吾欲慙其君而晏子知之仲尼聞之曰起於尊俎之間而折衝千里之外方今大漢收功於道德之林致平於仁義之淵忽蒐狩之禮闕槃虞之佃槃樂也虞與娛同闇昧不覩日月之光聾昬不聞雷霆之震于今十二年為日久矣亦方将刋禁臺之祕藏發天府之官常由質要之故業率典刑之舊章周禮八法四曰官常以聽官理天府掌祖廟之守藏與其禁令察羣吏之理左傳云晉趙盾為國政由質要杜預注曰由用也質要契劵也刊音苦寒反采清原嘉岐陽登俊傑命賢良舉淹滯㧞幽荒清原地在河東聞喜縣北左傳曰晉蒐于清原作五軍又楚椒舉曰周武有孟津之誓成有岐陽之蒐禮記月令孟夏命大尉贊傑俊遂賢良左傳楚平王詰姦慝舉淹滯杜預注云淹滯有才徳而未叙者也察淫侈之華譽顧介特之實功聘畎畝之羣雅宗重淵之潛龍華譽虛譽也介特謂孤介特立也畎畝謂隱於隴畝之中也司馬相如上林賦曰掩羣雅音義云謂大雅小雅之人也潛龍喻賢人隱也乃儲精山藪歴思河澤目矖鼎俎耳聽康衢營傅説於胥靡求伊尹於庖廚索膠鬲於魚鹽聽寗戚於大車矖視也音所解反鼎俎謂伊尹負鼎以干湯也墨子曰湯舉伊尹於庖廚之中康衢謂寗戚也説苑曰寗戚飯牛於康衢擊車輻而歌碩鼠傅説代胥靡刑人築於傅巖之野髙宗夢得之孟子曰膠鬲舉於魚鹽也俾之昌言而宏議軼越三家馳騁五帝悉覽休祥揔括羣瑞俾使也昌當也宏大也前書揚雄曰宏言崇議軼過也三家三皇也遂棲鳯皇於高梧宿麒麟於西園納僬僥之珍羽受王母之白環韓詩外傳曰黄帝時鳯皇止帝東園集帝梧桐食帝竹實尚書中候曰黄帝時麒麟在園帝王記曰堯時僬僥氏來貢没羽西王母慕舜之徳來獻白環也永逍遥乎宇内與二儀乎無疆貳造化於后土參神施於昊乾超特達而無儔煥巍巍而無原論語孔子曰堯之為君煥乎其有文章巍巍乎其有成功豐千億之子孫歴萬載而永延詩大雅曰天錫百禄子孫千億也禮樂既闋北轅反斾至自新城背伊闕反洛京闋止也音苦穴反新城縣屬河南郡今伊闕縣頌奏忤鄧氏滯於東觀十年不得調因兄子喪自劾歸融集云時兄伉子在融舍物故融因是自劾而歸太后聞之怒謂融羞薄詔除欲仕州郡遂令禁錮之融集云時左將奏融遭兄子喪自劾而歸離署當免官制曰融典校祕書不推忠盡節而羞薄詔除希望欲仕州郡免官勿罪禁錮六年矣太后崩安帝親政召還郎署復在講部出為河間王廏長史時車駕東巡岱宗延光三年劉攽曰正文廏長史案廏長自是官名後人不知妄加史字融上東巡頌帝竒其文召拜郎中及北鄉侯即位融移病去為郡功曹陽嘉二年詔舉敦樸城門校尉岑起舉融徵詣公車對策拜議郎續漢書曰融對策於北宮端門大將軍梁商表為從事中郎轉武都太守時西羌反叛征西將軍馬賢與䕶羌校尉胡疇征之而稽久不進融知其將敗上疏乞自効曰今雜種諸羌轉相鈔盜宜及其未幷亟遣深入破其支黨而馬賢等處處留滯羌胡百里望塵千里聽聲今逃匿避囘漏出其後則必侵寇三輔為民大害臣願請賢所不可用關東兵五千裁假部隊之號盡力率厲埋根行首以先吏士埋根言不退三旬之中必克破之臣少習學蓺不更武職猥陳此言必受誣罔之辜昔毛遂厮養為衆所蚩終以一言克定從要毛遂趙平原君趙勝客也居門下三年時平原将與楚合從以毛遂備二十人數其十九人相與笑之比至楚毛遂果按劒與楚定從楚立發兵救趙事見史記厮養賤人也臣懼賢等專守一城言攻於西而羌出於東且其將士必有高克潰叛之變左傳曰鄭使髙克率師次於河上久而不召師潰而歸髙克奔陳朝廷不能用又陳星孛參畢參西方之宿畢為邊兵至於分野幷州是也參在申為晉分幷州之地西戎北狄殆將起乎宜備二方尋而隴西羌反烏桓寇上郡皆卒如融言三遷桓帝時為南郡太守先是融有事忤大将軍梁冀旨冀諷有司奏融在郡貪濁免官髠徙朔方自刺不殊得赦還復拜議郎重在東觀著述以病去官融才高博洽為世通儒教養諸生常有千數涿郡盧植北海鄭𤣥皆其徒也善鼓琴好吹笛達生任性不拘儒者之節居宇器服多存侈飾常坐高堂施綘紗帳前授生徒後列女樂弟子以次相傳鮮有入其室者嘗欲訓左氏春秋及見賈逵鄭衆注乃曰賈君精而不博鄭君博而不精既精既博吾何加焉但著三傳異同說注孝經論語詩易三禮尚書列女傳老子淮南子離騷所著賦頌碑誄書記表奏七言琴歌對策遺令凡二十一篇初融懲於鄧氏不敢復違忤埶家遂為梁冀草奏李固又作大将軍西第頌以此頗為正直所羞年八十八延熹九年卒于家遺令薄葬族孫日磾獻帝時位至太傅三輔決錄注云日磾字翁叔論曰馬融辭命鄧氏逡巡隴漢之間將有意於居貞乎隴漢之間謂客於漢陽時易屯卦初九曰磐桓利居貞既而羞曲士之節惜不貲之軀荘子曰曲士不可語於道者束於教也終以奢樂恣性黨附成譏固知識能匡欲者鮮矣識性也匡正也夫事苦則矜全之情薄生厚故安存之慮深老子曰人之輕死者以其求生生之厚也是以輕死登高不懼者胥靡之人也前書音義曰胥相也靡隨也謂相隨受刑之人也荘子曰胥靡登髙也不懼遺死生也此為矜全之情薄也劉攽曰注胥靡登髙也案文多也字坐不垂堂者千金之子也前書鼂錯曰千金之子坐不垂堂此為安存之慮深也原其大略歸於所安而已矣物我異觀亦更相笑也後漢書卷九十上欽定四庫全書後漢書卷九十下宋宣城太守范煜撰唐章懷太子賢注蔡邕列傳第五十下蔡邕傳蔡邕字伯喈陳留圉人也圉縣故城在今汴州陳留縣東南六世祖勲謝承書曰勲字君嚴好黄老平帝時為郿令王莽初授以厭戎連率王莽改隴西郡曰厭戎郡守曰連率勲對印綬仰天歎曰吾策名漢室死歸其正昔曾子不受季孫之賜况可事二姓哉禮記曰曾子有疾童子曰華而晥大夫之簀歟曾子曰然斯季孫之賜也我未之能易也元起易簀曾元曰幸而至於旦請敬易之曾子曰爾之愛我也不如彼也君子之愛人也以徳細人之愛人也以姑息吾何求哉吾得正而斃焉斯己矣舉扶而易之反席未安而没言雖臨死不失正道也劉攽曰注爾之愛我也不如彼也案文多一也字遂攜將家屬逃入深山與鮑宣卓茂等同不仕新室父棱亦有清白行諡曰貞定公邕祖攜碑云􅂝字叔業有周之胄昔蔡叔没成王命其子仲使踐諸侯之位以國氏姓君其後也君曾祖父動哀帝時以孝亷為長安邰長及君之身增修厥徳順帝時以司空髙弟遷新蔡長年七十九卒長子稜字伯直處俗孤黨不協于時垂翼華髮人爵不升年五十三卒諡法曰清白守節曰貞純行不差曰定邕性篤孝母常滯病三年邕自非寒暑節變未嘗解襟帶不寢寐者十旬母卒廬于冢側動靜以禮有馴擾其室傍又木生連理逺近竒之多往觀焉與叔父從弟同居三世不分財鄉黨高其義少博學師事太傅胡廣好辭章數術天文妙操音律桓帝時中常侍徐璜左悺等五侯擅恣聞邕善鼓琴遂白天子勅陳留太守督促發遣邕不得已行到偃師稱疾而歸閑居翫古不交當世感東方朔客難及揚雄班固崔駰之徒設疑以自通揚雄作解嘲班固作答賔戲崔駰作達旨乃斟酌羣言韙其是而矯其非韙亦是也作釋誨以戒厲云爾有務世公子誨於華顚胡老曰顚頂也華顚謂白首也新序齊王對閭邱卭曰士亦華髮墮顚而後可用耳左傳宋司馬子魚曰雖及胡耉獲即取之杜預注曰胡耉元老之稱蓋聞聖人之大寶曰位故以仁守位以財聚人易曰聖人之大寶曰位何以守位曰仁何以聚人曰財也然則有位斯貴有財斯富行義逹道士之司也故伊摯有負鼎之􅃷仲尼設執鞭之言摯伊尹名也史記曰伊尹欲干湯而無由乃為有莘媵臣負鼎爼以滋味說湯致於王道衒自媒􅃷也論語孔子曰行義以達其道又曰富而可求雖執鞭之士吾亦為之周禮滌狼氏下士八人執鞭以辟道也寗子有清商之歌百里有豢牛之事淮南子曰寗戚欲干齊桓公窮困無以自達於是為商旅将車以適於齊暮宿於郭門飯牛車下望見桓公乃擊牛角而商歌桓公聞之曰異哉歌者非常人也命後車載之三齊記載其歌曰南山矸白石爛生不遭堯與舜禪短布單衣適至骭從昬飯牛薄夜半長夜漫漫何時旦公悅之以為大夫矸音岸骭音户諫反百里奚虞大夫也史記趙良曰百里奚自鬻於秦衣褐食牛期年而後穆公知之舉之牛口之下說文曰豢養也夫如是則聖哲之通趣古人之明志也夫子生清穆之世秉醇和之靈覃思典籍韞櫝六經安貧樂賤與世無營沈精重淵抗志高㝠包括無外綜析無形其已久矣曾不能㧞萃出羣揚芳飛文孟子曰若仲尼者拔乎其萃出乎其類登天庭序彝倫掃六合之穢慝清宇宙之埃塵連光芒於白日屬炎氣於景雲瑞應圖曰景雲者太平之應也一曰慶雲也時逝嵗暮黙而無聞小子惑焉是以有云方今聖上寛明輔弼賢知崇英逸偉不墜於地德𢎞者建宰相而裂土才羡者荷榮禄而蒙賜羡音以戰反本或作美盍亦回塗要至俛仰取容回曲也要音一遥反言履直道則不能有所至也輯當世之利定不㧞之功榮家宗於此時遺不滅之令蹤遺猶留也夫獨未之思邪何為守彼而不通此彼謂貧賤此謂榮禄胡老慠然而笑曰若公子所謂覩曖昧之利而忘昭晢之害專必成之功而忽蹉跌之敗者已公子謖然斂袂而興曰胡為其然也謖然翕斂之貎音所六反胡老曰居吾將釋汝居猶坐也釋解也昔自太極君臣始基太極天地之始也易曰易有太極是生兩儀有羲皇之洪寧唐虞之至時洪大也三代之隆亦有緝熙五伯扶微勤而撫之于斯已降天網縱人紘弛王塗壞太極陁賈逵注國語曰小崩曰陁君臣土崩上下瓦解淮南子曰武王伐紂左操黄鉞右執白旄麾之則瓦解而走遂土崩而下於是智者騁詐辯者馳說武夫奮略戰士講銳講習也電駭風馳霧散雲披變詐乖詭以合時宜或畫一策而綰萬金或談崇朝而錫瑞珪戰國策曰秦昭王見頓弱頓弱曰韓天下之喉咽也魏天下之胷臆也王資臣萬金而游之天下可圖也秦王曰善乃資萬金使東遊韓魏入其将相北逰燕趙而殺李牧齊王入朝四國畢從頓子說之也史記曰虞卿說趙孝成王一見賜黄金百鎰再見賜白璧一雙連衡者六印磊落合從者騈組流離連衡謂張儀合從謂蘇秦竝佩六國之印騈竝也組綬也流離光彩貎也隆貴翕習積富無崖據巧蹈機以忘其危夫華離蔕而萎條去幹而枯女冶容而淫士背道而辜人毁其滿神疾其邪利端始萌害漸亦牙速速方轂夭夭是加詩小雅曰速速方穀夭夭是㧻毛萇注云速速陋也鄭𤣥注云穀祿也言鄙陋小人將貴而得禄也夭殺也㧻破之也韓詩亦同此作轂者盖謂小人乗寵方轂而行方猶竝劉攽曰正文夭夭是加案上夭當作天據今詩文正然欲豐其屋乃蔀其家易豐卦上六曰豐其屋蔀其家王弼注云蔀覆也屋厚覆暗之甚也蔀音部是故天地否閉聖哲潛形易文言曰天地閉賢人隱石門守晨沮溺耦耕論語曰子路宿於石門晨門曰奚自子路曰自孔氏鄭𤣥注云石門魯城外門也晨門主晨夜開閉者又曰長沮桀溺耦而耕竝隱遁人也顏歜抱璞蘧瑗保生戰國策齊宣王謂顏歜曰願先生與寡人遊歜辭曰玉生於山制則毁焉非不寶也然大璞不完士生鄙野選而禄焉非不貴也而形神不全歜願得晚食以當肉安歩以當車無罪以當貴清靜以自娛知足以歸反於璞則終身不辱論語孔子曰蘧伯玉邦有道則仕邦無道則可卷而懷之此為保其生也齊人歸樂孔子斯征雍渠驂乘逝而遺輕論語曰齊人饋女樂季桓子受之三日不朝孔子行史記曰衛靈公與夫人同車宦者雍渠參乘孔子曰吾未見好德如好色者也於是醜之去衛適曹遺輕謂若弃輕細之物而去言惡之甚也夫豈慠主而背國乎道不可以傾也且我聞之日南至則黄鍾應融風動而魚上冰蕤賔統則微隂萌蒹葭蒼而白露凝月令仲冬律中黄鍾融風艮之風也月令孟春東風解凍魚上冰又仲夏之月律中㽔賔㣲隂謂一隂爻生也詩秦風曰蒹葭蒼蒼白露為霜爾雅曰蒹薕也葭蘆也寒暑相推隂陽代興運極則化理亂相承今大漢紹陶唐之洪烈盪四海之殘災隆隱天之高拆絙地之基絙音古鄧反絙與亘同皇道惟融帝猷顯丕汦汦庶類含甘吮滋汦汦齊貎檢六合之羣品濟之乎雍熙羣僚恭己於職司聖主垂拱乎兩楹君臣穆穆守之以平濟濟多士端委縉綎端委禮衣也左傳曰太伯端委以持周禮說文曰縉赤白色也綎系綬也音它丁反鴻漸盈階振鷺充庭易曰鴻漸于陸鴻水鳥也漸出於陸喻君子仕進於朝詩曰振振鷺鷺于下注云鷺白鳥也喩絜白之士羣集君之朝也譬猶鍾山之玉泗濵之石累珪璧不為之盈採浮磬不為之索山海經曰黄帝取密山之玉策投之鍾山之陽尚書曰泗濵浮磬注云水中見石可以為磬言鍾山多玉泗水多石喩漢多賢人索盡也音所洛反曩者洪源辟而四隩集武功定而干戈戢獫狁攘而吉甫宴城濮捷而晉凱入辟開也音頻亦反謂禹理洪水而開道之尚書曰四隩既宅隩居也音於六反武功定謂武王伐紂詩周頌曰載戢干戈詩小雅曰薄伐獫狁至于太原吉甫燕喜既多受祉鄭元注曰吉甫既伐獫狁而歸天子以燕禮樂之也左傳晉與楚戰於城濮楚師敗績故晉凱樂而歸也故當其有事也則簑笠竝載擐甲揚鋒不給於務簑音素和反詩小雅曰荷簑荷笠毛萇注云荷揭也簑所以備雨笠所以禦暑擐貫也當其無事也則舒紳緩佩鳴玉以歩綽有餘裕夫世臣門子暬御之族詩小雅曰曾我暬御毛萇注云暬御侍御也天隆其祐主豐其禄抱膺從容爵位自從攝須理髯餘官委貴其進取也順傾轉圓不足以喻其便逡巡放屣不足以況其易夫有逸羣之才人人有優贍之智童子不問疑於老成瞳矇不稽謀於先生心恬澹於守高意無為於持盈老子曰持而盈之不如其已河上公注云持滿必傾不如止也粲乎煌煌莫非華榮明哲泊焉不失所寧泊猶靜也狂淫振蕩乃亂其情貪夫殉財夸者死權賈誼鵩鳥賦之文也言夸華者必死於權埶也瞻仰此事體躁心煩闇謙盈之効迷損益之數易曰天道虧盈而益謙又曰損益盈虛與時偕行王弼注云自然之質各定其分短者不為不足長者不為有餘損益將何加焉騁駑駘於修路慕騏驥而增驅卑俯乎外戚之門乞助乎近貴之譽榮顯未副從而顚踣踣音歩北反叶韻音赴下獲熏胥之辜高受滅家之誅詩小雅曰若此無罪勲胥以痡勲帥也胥相也痡病也言此無罪之人而使有罪者相帥而病之是其大甚見韓詩前書曰史遷薰胥以刑音義云謂相薰蒸得罪也誅協韻音丁注反前車已覆襲軌而騖曾不鑒禍以知畏懼予惟悼哉害其若是害何也音曷天高地厚跼而蹐之詩小雅曰謂天盖髙不敢不跼謂地盖厚不敢不蹐怨豈在明患生不思戰戰兢兢必愼厥尤且用之則行聖訓也舎之則藏至順也論語孔子曰用則行舎則藏故言聖訓也九河盈溢非一凷所防九河謂河水分為九道爾雅曰徒駭太史馬頰覆鬴胡蘇簡絜鈎般鬲津是為九河也帶甲百萬非一勇所抗協韻音苦郎反今子責匹夫以清宇宙庸可以水旱而累堯湯乎懼煙炎之毁熸何光芒之敢揚哉烟炎烟火之微細者言常懼微細以致毁滅杜預注左傳曰吳楚之間謂火滅為熸音子亷反炎音熖且夫地将震而樞星直井無景則日隂食晏子見伯常騫問曰昔吾見維星絶樞星散地其動乎見晏子春秋隂食謂不顯食也凡日隂食則井無影也元首寛則望舒脁侯王肅則月側匿望舒月也尚書大傳曰晦而月見西方謂之朓朔而月見東方謂之側匿側匿則侯王肅朓則侯王舒注肅急也舒緩也是以君子推微達著尋端見緒履霜知冰踐露知暑時行則行時止則止消息盈沖取諸天紀易坤文言曰履霜堅氷至艮卦曰時行則行時止則止豐卦曰天地盈虚與時消息利用遭泰可與處否樂天知命持神任己羣車方奔乎險路安能與之齊軌思危難而自豫故在賤而不恥方将騁馳乎典籍之崇塗休息乎仁義之淵藪前書司馬相如曰游于六藝之園馳騖乎仁義之塗班固曰肴覈仁義之林藪也槃旋乎周孔之庭宇揖儒墨而與為友舒之足以光四表收之則莫能知其所有若乃丁千載之運應神靈之符闓閶闔乘天衢擁華蓋而奉皇樞古今注曰華盖黄帝所作也與蚩尤戰於涿鹿之野常有五色雲氣金枝玉葉因而作華蓋納𤣥策於聖德宣太平於中區計合謀從己之圖也勲績不立予之辜也龜鳳山翳霧露不除踴躍草萊秪見其愚不我知者將謂之迂龜鳯喩聖人霧露喩昏闇也迂曲也修業思眞棄此焉如靜以俟命不斁不渝斁厭也渝變也百歲之後歸乎其居詩晉風也毛萇注云居墳墓也幸其獲稱天所誘也謂小人妄得稱舉者天之所誘後必遇害也罕漫而已非己咎也罕漫猶無所知聞也非君子之咎也昔伯翳綜聲於鳥語葛盧辯音於鳴牛董父受氏於豢龍奚仲供徳於衡輈伯翳即秦之先伯益也能與鳥語見史記葛盧東夷介國之君也介葛盧聘於魯聞牛鳴曰是生三犧皆用之矣問之如其言晉太史蔡墨曰昔有董父實甚好龍能求嗜欲以飲食之以服事帝舜帝賜姓曰董氏曰豢龍竝見左傳奚仲薛之祖也世本曰奚仲作車衡軛也輈轅也倕氏興政於巧工造父登御於驊騮非子享土於善圉狼瞫取右於禽囚倕舜之巧人也見尚書造父者秦之先也為周穆王御驊騮騄耳之乘非子亦秦之先善養馬周孝王使主馬於汧渭之間馬大蕃息分土為附庸邑之於秦竝見史記圉養馬人也見周禮左傳曰戰於殽晉襄公縛秦囚使萊駒以戈斬之囚呼萊駒失戈狼瞫取戈斬之遂以為車右瞫音舒餁反弓父畢精於筋角佽飛明勇於赴流壽王創基於格五東方要幸於談優弓父弓工也闕子曰宋景公使弓工為弓九年來見公公曰為弓亦遲矣對曰臣精盡於弓矣獻弓而歸三日而死公張弓東向而射矢踰西霜之山集彭城之東其餘力逸勁飲羽於石梁呂氏春秋曰荆人佽飛入江斬蛟前書武帝時吾邱壽王字子贛以善格五待制格五今之簺也東方朔以善談笑俳優得幸班固曰朔應諧似優杜預注左傳曰優調戲也上官効力於執蓋𢎞羊據相於運籌僕不能參跡於若人故抱璞而優遊前書上官桀武帝封為期門郎從上甘泉大風車不得行解蓋授桀雖風蓋常屬車桑𢎞羊洛陽賈人也以能心計為侍中於是公子仰首降階忸怩而避忸怩心慙也忸音女六反怩音尼胡老乃揚衡含笑援琴而歌衡眉目之間也歌曰練余心兮浸太清滌穢濁兮存正靈和液暢兮神氣寧情志泊兮心亭亭嗜欲息兮無由生踔宇宙而遺俗兮𦕈翩翩而獨征太清謂天也和液謂和氣靈液也亭亭孤峻之貎踔猶越也音丑教反建寧三年辟司徒橋𤣥府𤣥甚敬待之出補河平長召拜郎中校書東觀遷議郎邕以經籍去聖久逺文字多謬俗儒穿鑿疑誤後學熹平四年乃與五官中郎将堂谿典光禄大夫楊賜諫議大夫馬日磾議郎張馴韓說太史令單颺等堂谿姓也先賢行狀曰典字子度潁川人為西鄂長奏求正定六經文字靈帝許之邕乃自書冊於碑使工鐫刻立於太學門外洛陽記曰太學在洛城南開陽門外講堂長十丈廣二丈堂前石經四部本碑凡四十六枚西行尚書周易公羊傳十六碑存十二碑毁南行禮記十五碑悉崩壞東行論語三碑二碑毁禮記碑上有諫議大夫馬日磾議郎蔡邕名劉攽曰注論語二碑毁案文當是一碑毁若二碑毁者當云皆毁而已於是後儒晩學咸取正焉及碑始立其觀視及摹寫者車乘日千餘兩塡塞街陌初朝議以州郡相黨人情比周乃制婚姻之家及兩州人士不得對相監臨至是復有三互法三互謂婚姻之家及兩州人不得交互為官也謝承書曰史弼遷山陽太守其妻鉅野薛氏女以三互自上轉拜平原相是也禁忌轉密選用艱難幽冀二州久缺不補邕上疏曰伏見幽冀舊壤鎧馬所出鎧甲也周禮考工記曰燕無函函亦甲也言幽燕之地家家皆能為函故無函匠也左傳曰冀之北士馬之所生比年兵飢漸至空耗今者百姓虛縣萬里蕭條縣音𤣥闕職經時吏人延屬而三府選舉踰月不定臣經怪其事而論者云避三互十一州有禁當取二州而已又二州之士或復限以歲月狐疑遲淹以失事會愚以為三互之禁禁之薄者今但申以威靈明其憲令在任之人豈不戒懼而當坐設三互自生留閡邪昔韓安國起自徒中朱買臣出於幽賤竝以才宜還守本邦前書安國字長孺梁人坐法抵罪居無幾天子使使者拜安國為梁内史起徒中為二千石買臣字翁子吳人家貧負薪賣以給食歌謳道中後拜㑹稽太守又張敞亡命擢授劇州豈復顧循三互繼以末制乎前書敞字子髙河東人也為京兆尹坐與楊惲厚善制免為庶人從闕下亡命數月冀州部有大賊天子思敞功使使者召拜為冀州刺史三公明知二州之要所宜速定當越禁取能以救時敝而不顧爭臣之義茍避輕微之科選用稽滯以失其人臣願陛下上則先帝蠲除近禁其諸州刺史器用可換者無拘日月三互以差厥中書奏不省初帝好學自造皇羲篇五十章因引諸生能為文賦者本頗以經學相招後諸為尺牘及工書鳥篆者皆加引召遂至數十人說文曰牘書板也長一尺藝文志曰六體者古文竒字篆書隸書繆篆蟲書音義曰古文謂孔子壁中書也竒字即古文而異者也篆書謂小篆盖秦始皇使程邈所作也隸書亦程邈所獻主於徒隸從簡易也繆篆謂其文屈曲纒繞所以摹印章蟲書謂為蟲鳥之形所以書旅信也侍中祭酒樂松賈䕶多引無行趣埶之徒並待制鴻都門下憙陳方俗閭里小事帝甚悅之待以不次之位又市賈小民為宣陵孝子者復數十人悉除為郎中太子舎人時頻有雷霆疾風傷樹㧞木地震隕雹蝗蟲之害又鮮卑犯境役賦及民六年七月制書引咎誥羣臣各陳政要所當施行邕上封事曰臣伏讀聖旨雖周成遇風訊諸執事宣王遭旱密勿祗畏無以或加尚書金縢曰秋大熟未穫天大雷電以風王乃問諸史百執事詩大雅雲漢篇序曰宣王遇旱側身修行欲消去之故大夫仍叔作雲漢之詩以美之密勿祗畏言勤勞戒懼也臣聞天降災異緣象而至辟歴數發辟音普歴反史記曰霹靂陽氣之動也殆刑誅繁多之所生也風者天之號令所以教人也翼氏風角曰風者天之號令所以譴告人君者夫昭事上帝則自懷多福詩大雅曰昭事上帝聿懷多福聿遂也懷來也宗廟致敬則鬼神以著國之大事實先祀典左傳曰國之大事在祀與戎天子聖躬所當恭事臣自在宰府及備朱衣宰府謂司徒橋𤣥府也朱衣謂祭官也漢官儀曰漢家赤行齊者絳絝韤韤音文伐反迎氣五郊而車駕稀出四時至敬劉攽曰案文當作致敬屢委有司雖有解除猶為疎廢解除謂謝過也故皇天不悅顯此諸異鴻範傳曰政悖德隱厥風發屋折木坤為地道易稱安貞易坤文言曰地道也妻道也其彖曰安貞之吉應地無疆隂氣憤盛則當靜反動法為下叛夫權不在上則雹傷物政有苛暴則虎狼食人貪利傷民則蝗蟲損稼去六月二十八日太白與月相迫兵事惡之鮮卑犯塞所從來逺今之出師未見其利上違天文下逆人事誠當博覽衆議從其安者臣不勝憤懣謹條宜所施行七事表左表左謂陳之於表左也猶今云如左知右一事明堂月令天子以四立及季夏之節迎五帝於郊天子居明堂各依其月布政故云明堂月令四立謂立春立夏立秋立冬各以其日天子親迎氣於其方幷祭其方之帝季夏之末祭中央帝也所以導致神氣祈福豐年清廟祭祀追往孝敬養老辟雍示人禮化皆帝者之大業祖宗所祗奉也而有司數以蕃國疎喪宫内產生及吏卒小汚屢生忌故小汚謂病及死也竊見南郊齊戒未嘗有廢至於它祀輙興異議豈南郊卑而它祀尊哉孝元皇帝策書曰禮之至敬莫重於祭所以竭心親奉以致肅祗者也又元和故事復申先典章帝元和二年制曰山川百神應典禮者尚未咸秩其議修羣祀以祈豐年又宗祀五帝于汶上明堂三年望祀華霍東柴岱宗為人祈福前後制書推心懇惻而近者以來更任太史忘禮敬之大任禁忌之書拘信小故以虧大典禮妻妾産者齋則不入側室之門無廢祭之文也禮記曰妻將生子及月辰居側室夫使人日再問之夫齋則不入側室之門也所謂宫中有卒三月不祭者謂士庶人數堵之室共處其中耳儀禮曰有死於宮中者則為之三月不舉祭豈謂皇居之曠臣妾之衆哉自今齋制宜如故典庶答風霆災妖之異二事臣聞國之将興至言數聞内知己政外見民情是故先帝雖有聖明之姿而猶廣求得失又因災異援引幽隱重賢良方正敦朴有道之選危言極諫不絶於朝陛下親政以來頻年災異而未聞特舉博選之旨誠當思省述修舊事使抱忠之臣展其狂直以解易傳政悖德隱之言三事夫求賢之道未必一塗或以德顯或以言揚頃者立朝之士曾不以忠信見賞恒被謗訕之誅遂使羣下結口莫圖正辭郎中張文前獨盡狂言聖聽納受以責三司臣子曠然衆庶解悅漢名臣奏張文上疏其略曰春秋義曰蝗者貪擾之氣所生天意若曰貪狼之人蠶食百姓若蝗食禾稼而擾萬民獸齧人者象暴政若獸而齧人京房易傳曰小人不義而反尊榮則虎食人辟歴殺人亦象暴政妄有喜怒政以賄成刑放於寵推類叙意探指求源皆象羣下貪狼威教妄施或若蝗蟲宜勅正衆邪清審選舉退屏貪暴魯僖公小國諸侯勅政修己斥退邪臣尚獲其報六月甚雨之應豈況萬乗之主修善求賢宜舉敦朴以輔善政陛下參堯舜之聖秉獨見之明恢太平之業敦經好學流布逺近可留須臾神慮則可致太平招休徵矣制曰下太尉司徒司空夫瑞不虛至災必有緣朕以不徳秉統未明以招祅偽將何以昭顯憲法哉三司任政者也所當夙夜而各拱黙訖未有聞將何以奉答天意救寧我人其各悉心思所崇改務消復之術稱朕意焉劉攽曰注則可致太平案文多一可字又曰救寧我人案救當作敉敉寧出尚書臣愚以為宜擢文右職以勸忠謇右用事之便謂樞要之官宣聲海内博開政路四事夫司隸校尉諸州刺史所以督察姦枉分别白黑者也伏見幽州刺史楊憙益州刺史龎芝凉州刺史劉䖍各有奉公疾姦之心憙等所糾其効尤多餘皆枉橈不能稱職或有抱罪懷瑕與下同疾綱網弛縱莫相舉察公府臺閣亦復黙然五年制書議遣八使又令三公謡言奏事漢官儀曰三公聽採長吏臧否人所疾苦條奏之是為舉謡言者也是時奉公者欣然得志邪枉者憂悸失色未詳斯議所因寢息昔劉向奏曰夫執狐疑之計者開羣枉之門養不斷之慮者來䜛邪之口語見前書今始聞善政旋復變易足令海内測度朝政宜追定八使糾舉非法更選忠清平章賞罰平和也章明也三公歳盡差其殿最使吏知奉公之福營私之禍則衆災之原庶可塞矣五事臣聞古者取士必使諸侯歲貢尚書大傳曰古者諸侯之於天子三年一貢士一適謂之攸好德再適謂之賢賢三適謂之有功注云適猶得也孝武之世郡舉孝亷又有賢良文學之選於是名臣輩出文武並興漢之得人數路而已數路謂孝㢘賢良文學之類也夫書畫辭賦才之小者匡國理政未有其能陛下即位之初先渉經術聽政餘日觀省篇章聊以游意當代博弈非以教化取士之本而諸生競利作者鼎沸其高者頗引經訓風喻之言下則連偶俗語有類俳優或竊成文虛冒名氏臣毎受詔於盛化門差次錄第其未及者亦復隨輩皆見拜擢既加之恩難復收改但守奉祿於義己𢎞不可復使理人及仕州郡昔孝宣會諸儒於石渠章帝集學士於白虎通經釋義其事優大文武之道所宜從之若乃小能小善雖有可觀孔子以為致逺則泥君子故當志其大者論語子夏曰雖小道必有可觀者焉致逺恐泥鄭𤣥注云小道如今諸子書也泥謂滯陷不通此邕以為孔子之言當别有所據也六事墨綬長吏職典理人漢書儀曰秩六百石銅章墨綬也皆當以惠利為績日月為勞襃責之科所宜分明而今在任無復能省及其還者多召拜議郎郎中若器用優美不宜處之冗散如有釁故自當極其刑誅豈有伏罪懼考反求遷轉更相放効臧否無章先帝舊典未嘗有此可皆斷絶以覈眞偽七事伏見前一切以宣陵孝子者為太子舎人劉攽曰案文多一者字臣聞孝文皇帝制喪服三十六日雖繼體之君父子至親公卿列臣受恩之重皆屈情從制不敢踰越今虛偽小人本非骨肉既無幸私之恩又無禄仕之實惻隱思慕情何緣生而羣聚山陵假名稱孝行不隱心義無所依至有姦軌之人通容其中恒思皇后祖載之時周禮曰喪祝掌大喪及祖飾棺及載遂御之鄭𤣥注云祖謂将葬祖祭於庭載謂升柩於車也劉攽曰正文恒思皇后案恒當作桓謂桓帝后也東郡有盜人妻者亡在孝中本縣追捕乃伏其辜虛偽雜穢難得勝言又前至得拜後輩被遺或經年陵次以暫歸見漏或以人自代亦蒙寵榮爭訟怨恨凶凶道路太子官屬宜搜選令徳豈有但取邱墓凶醜之人其為不祥莫與大焉宜遣歸田里以明詐偽書奏帝乃親迎氣北郊及行辟雍之禮又詔宣陵孝子為舎人者悉改為丞尉焉光和元年遂置鴻都門學畫孔子及七十二弟子像其諸生皆勅州郡三公舉用辟召或出為刺史太守入為尚書侍中乃有封侯賜爵者士君子皆恥與爲列焉時妖異數見人相驚擾其年七月詔召邕與光禄大夫楊賜諫議大夫馬日磾議郎張華太史令單颺詣金商門引入崇徳殿洛陽記曰南宫有崇徳殿太極殿西有金商門也使中常侍曹節王甫就問災異及消改變故所宜施行邕悉心以對事在五行天文志其志今亡續漢書曰光和元年詔問曰連年蝗蟲其咎焉在邕對曰易傳云大作不時天降災厥咎蝗蟲來河圖秘徵篇曰帝貪則政暴吏酷則誅慘生蝗蟲貪苛之所致也又南宫侍中寺雌雞欲化為雄一身毛皆似雄但頭冠尚未變詔以問邕對曰貎之不恭則有雞禍宣帝黄龍元年未央宫雌雞化為雄不鳴無距是嵗元帝初即位将立王皇后至初元元年丞相史家雌雞化為雄距而鳴將是后父禁為平陽侯女立為后至哀帝晏駕后攝政王莽以后兄子為大司馬由是為亂臣竊推之頭為元首人君之象今雞一身已變未至於頭而止是將有其事而不遂成之象也若應之不精政無所改頭冠或成為患滋大也劉攽曰注是后父禁為平陽侯案如上文此處少一嵗字又當作陽平侯非平陽也又特詔問曰比災變互生未知厥咎朝廷焦心載懷恐懼每訪羣公卿士庶聞忠言而各存括囊莫肯盡心括囊喻閉口而不言易曰括囊無咎王弼注云括結也以邕經學深奥故密特稽問宜披露失得指陳政要勿有依違自生疑諱具對經術以皁囊封上漢官儀曰凡章表皆啟封其言密事得皁囊也邕對曰臣伏惟陛下聖徳允明深悼災咎襃臣末學特垂訪及非臣螻蟻所能堪副斯誠輸寫肝膽出命之秋豈可以顧患避害使陛下不聞至戒哉臣伏思諸異皆亡國之怪也天於大漢殷勤不已故屢出祅變以當譴責欲令人君感悟改危即安今災眚之發不於它所逺則門垣近在寺署其為監戒可謂至切蜺墮雞化皆婦人干政之所致也前者乳母趙嬈貴重天下嬈音女鳥反生則貲藏侔於天府死則邱墓踰於園陵兩子受封兄弟典郡續以永樂門史霍玉依阻城社又為姦邪今者道路紛紛復云有程大人者察其風聲将為國患宜高為隄防明設禁令深惟趙霍以為至戒趙嬈及霍玉也今聖意勤勤思明邪正而聞太尉張顥為玉所進光祿勲姓璋姓姓也璋名也漢有姓偉有名貪濁又長水校尉趙玹音𤣥蔡邕集玹作𤣥屯騎校尉蓋升並叨時幸榮富優足宜念小人在位之咎退思引身避賢之福尚書曰君子在野小人在位伏見廷尉郭禧純厚老成光祿大夫橋𤣥聰達方直故太尉劉寵忠實守正並宜為謀主數見訪問夫宰相大臣君之四體謂股肱也委任責成優劣已分不宜聽納小吏雕琢大臣也雕琢猶鐫削以成其罪也又尚方工技之作鴻都篇賦之文可且消息以示惟憂詩云畏天之怒不敢戲豫天戒誠不可戲也宰府孝廉士之高選近者以辟召不愼切責三公而今並以小文超取選舉開請託之門違明王之典衆心不厭莫之敢言厭伏也音一葉反臣願陛下忍而絶之思惟萬機以荅天望聖朝既自約厲左右近臣亦宜從化人自抑損以塞咎戒則天道虧滿鬼神福謙矣臣以愚戇感激忘身敢觸忌諱手書具對夫君臣不密上有漏言之戒下有失身之禍易曰君不密則失臣臣不密則失身願寢臣表無使盡忠之吏受怨姦仇章奏帝覽而歎息因起更衣曹節於後竊視之悉宣語左右事遂漏露其為邕所裁黜者皆側目思報初邕與司徒劉郃素不相平叔父衞尉質質字子文著漢職儀又與将作大匠楊球有隙球即中常侍程璜女夫也璜遂使人飛章言邕質數以私事請託於郃郃不聽邕含隱切志欲相中中傷也於是詔下尚書召邕詰狀邕上書自陳曰臣被召問以大鴻臚劉郃前為濟隂太守臣屬吏張宛長休百日休假也前書音義曰吏病滿百日當免也郃為司隸又託河内郡吏李竒為州書佐續漢志曰書佐主幹文書及營䕶故河南尹羊陟侍御史胡母班郃不為用致怨之狀邕集其奏曰邕屬張宛長休百日郃假宛五日復屬河南李竒為書佐郃不為召太山黨魁羊陟與邕季父衛尉質對門九族質為尚書營䕶阿擁令文書不覺郃被詔書考胡母班等辭與陟為黨質及邕頻詣郃問班所及郃不應遂懷怨恨欲必中傷郃制曰下司隸校尉正處上邕集作綦母班也臣征營怖悸肝膽塗地不知死命所在竊自尋案實屬宛竒不及陟班凡休假小吏非結恨之本與陟姻家豈敢申助私黨如臣父子欲相傷陷當明言臺閣具陳恨狀所緣内無寸事而謗書外發宜以臣對與郃參驗臣得以學問特蒙襃異執事祕館操管御前姓名貎狀微簡聖心今年七月召詣金商門問以災異齎詔申旨誘臣使言齎猶持也與賫通臣實愚戇唯識忠藎出命忘軀不顧後害遂譏刺公卿内及寵臣實欲以上對聖問救消災異䂓為陛下建康寧之計陛下不念忠臣直言宜加掩蔽誹謗卒至便用疑怪盡心之吏豈得容哉詔書毎下百官各上封事欲以改政思譴除凶致吉而言者不蒙延納之福旋被陷破之禍今皆杜口結舌以臣為戒誰敢為陛下盡忠孝乎臣季父質連見拔擢位在上列臣被蒙恩渥數見訪逮言事者因此欲陷臣父子破臣門户非復發糾姦伏補益國家者也臣年四十有六孤特一身得託名忠臣死有餘榮恐陛下於此不復聞至言矣臣之愚冗職當咎患但前者所對質不及聞前在金商門對事之時質為下邳相故不聞也而衰老白首横見引逮隨臣摧没幷入阬埳誠寃誠痛臣一入牢獄當為楚毒所迫趣以飲章辭情何緣復聞趣音促飲猶隱郤告人姓名無可對問章者今之表也邕集曰光和元年都官從事張恕以辛卯詔書收邕送雒陽詔獄考吏張靜謂邕曰省君章云欲讎怨未有所施法令無此以詔書又刋章家姓名不得對相指斥考事君學多所見古今如此豈一事乎荅曰曉是吏遂飲章為文書臣賢案俗本有不解飲字或改為報或改為款並非也死期垂至冒昧自陳願身當辜戮匄質不幷坐匄乞也則身死之日更生之年也惟陛下加餐為萬姓自愛於是下邕質於洛陽獄劾以仇怨奉公議害大臣大不敬弃市事奏中常侍呂强愍邕無罪請之帝亦更思其章有詔減死一等與家屬髠鉗徙朔方不得以赦令除楊球使客追路刺邕客感其義皆莫為用球又賂其部主使加毒害所賂者反以其情戒邕故每得免焉居五原安陽縣即西安陽懸也故城在今勝州銀城縣邕前在東觀與盧植韓說等撰補後漢記會遭事流離不及得成因上書自陳奏其所著十意猶前書十志也邕别傳曰邕昔作漢記十意未及奏上遭事流離因上書自陳曰臣既到徙所乘塞守烽職在候望憂怖焦灼無心能復操筆成草致章闕廷誠知聖朝不責臣謝但懷愚心有所不竟臣自在布衣常以為漢書十志下盡王莽而止光武以來唯記紀傳無續志者臣所事師故太傅胡廣知臣頗識其門户略以所有舊事與臣雖未備悉粗見首尾積累思惟二十餘年不在其位非外史庶人所得擅述天誘其𠂻得備著作郎建言十志皆當撰錄會臣被罪逐放邊野恐所懷隨軀朽腐抱恨黄泉遂不設施謹先顚踣科條諸志臣欲刪定者一所當接續者四前志所無臣欲著者五及經典羣書所宜捃摭本奏詔書所當依據分别首目幷書章左惟陛下留神省察臣謹因臨戎長霍圉封上有律歴意第一禮意第二樂意第三郊祀意第四天文意第五車服意第六分别首目連置章左帝嘉其才高會明年大赦乃宥邕還本郡邕自徙及歸凡九月焉将就還路五原太守王智餞之酒酣智起舞屬邕邕不為報屬猶勸也音燭智者中常侍王甫弟也素貴驕慙於賔客詬邕曰徒敢輕我邕拂衣而去智銜之密告邕怨於囚放謗訕朝廷内寵惡之邕慮卒不免乃亡命江海逺跡吳㑹張騭文士傳曰邕告吳人曰吾昔嘗經會稽髙遷亭見屋椽竹東問第十六可以為笛取用果有異聲伏滔長笛賦序云柯亭之觀以竹為椽邕取為笛竒聲獨絶也往來依太山羊氏積十二年在吳吳人有燒桐以㸑者邕聞火烈之聲知其良木因請而裁為琴果有美音而其尾猶焦故時人名曰焦尾琴焉傅𤣥琴賦序曰齊桓公有鳴琴曰號鍾楚莊有鳴琴曰繞梁司馬相如綠綺蔡邕有焦尾皆名器也初邕在陳留也其鄰人有以酒食召邕者比往而主以酣焉客有彈琴於屛邕至門試潛聽之曰憘歎聲也音僖以樂召我而有殺心何也遂反將命者告主人曰蔡君向來至門而去邕素為邦鄉所宗主人遽自追而問其故邕具以告莫不憮然憮猶怪也音武彈琴者曰我向鼓絃見螳蜋方向鳴蟬蟬将去而未飛螳蜋為之一前一郤吾心聳然惟恐螳蜋之失之也此豈為殺心而形於聲者乎邕莞然而笑曰莞笑貎也音胡板反此足以當之矣中平六年靈帝崩董卓為司空聞邕名高辟之稱疾不就卓大怒詈曰我力能族人蔡邕遂偃蹇者不旋踵矣又切勅州郡舉邕詣府邕不得已到署祭酒甚見敬重舉高第補侍御史又轉侍書御史遷尚書三日之間周歴三臺遷巴郡太守復留為侍中初平元年拜左中郎将從獻帝遷都長安封高陽鄉侯董卓賔客部曲議欲尊卓比太公稱尚父卓謀之於邕邕曰太公輔周受命翦商故特為其號今明公威德誠為巍巍然比之尚父愚意以為未可宜須關東平定車駕還反舊京然後議之卓從其言初平二年六月地震卓以問邕邕對曰地震者隂盛侵陽臣下踰制之所致也前春郊天公奉引車駕乘金華青蓋𤓰畫兩轓逺近以為非宜續漢志曰乘輿大駕公卿奉引皇大子皇子皆安車朱輪青盖金華𤓰畫轓廣雅轓箱也卓於是改乘皁蓋車續漢志曰中二千石二千石皆皁蓋朱兩轓卓重邕才學厚相遇待毎集讌輒令邕鼓琴賛事邕亦毎存匡益然卓多自佷用劉攽曰案文多自佷用不成文理當云卓佷多自用邕恨其言少從謂從弟谷曰董公性剛而遂非終難濟也吾欲東奔兖州若道逺難達且遯逃山東以待之何如谷曰君状異恒人每行觀者盈集以此自匿不亦難乎邕乃止及卓被誅邕在司徒王允坐殊不意言之而歎有動於色允勃然叱之曰董卓國之大賊幾傾漢室君為王臣所宜同忿而懷其私遇以忘大節今天誅有罪而反相傷痛豈不共為逆哉即收付廷尉治罪邕陳辭謝乞黥首刖足繼成漢史士大夫多矜救之不能得太尉馬日磾馳往謂允曰伯喈曠世逸才多識漢事當續成後史為一代大典且忠孝素著而所坐無名誅之無乃失人望乎允曰昔武帝不殺司馬遷使作謗書流於後世凡史官記事善惡必書謂遷所著史記但是漢家不善之事皆為謗也非獨指武帝之身即髙祖善家令之言武帝筭緍𣙜酤之類是也班固集云司馬遷著書成一家之言至以身陷刑故微文刺譏貶損當世非誼士也方今國祚中衰神器不固不可令佞臣執筆在幼主左右既無益聖德復使吾黨䝉其訕議日磾退而告人曰王公其不長世乎善人國之紀也制作國之典也滅紀廢典其能久乎邕遂死獄中允悔欲止而不及時年六十一搢紳諸儒莫不流涕北海鄭𤣥聞而歎曰漢世之事誰與正之兖州陳留聞皆畫像而頌焉其撰集漢事未見錄以繼後史適作靈紀及十意又補諸列傳四十二篇因李傕之亂湮没多不存所著詩賦碑誄銘讚連珠箴弔論議獨斷勸學釋誨敘樂女訓篆埶祝文章表書記凡百四篇傳於世論曰意氣之感士所不能忘也流極之運有生所共深悲也流極皆放也極音紀力反當伯喈抱鉗扭徙幽裔仰日月而不見照燭臨風塵而不得經過謂廹促之令不得避風塵也其意豈及語平日倖全人哉及解刑衣竄甌越潛舟江壑不知其逺捷歩深林尚苦不密但願北首舊邱歸骸先壟又可得乎董卓一旦入朝辟書先下分明枉結信宿三遷謂三日之間位歴三臺也匡導既申狂僭屢革資同人之先號得北叟之後福易同人卦曰先號咷而後笑北叟塞上叟也其馬亡入胡中人皆弔之叟曰何知非福居數月其馬引胡駿馬而歸人皆賀之叟曰何知非禍及家富馬良其子好騎墮而折髀人皆弔之叟曰何知非福居一年胡夷大入丁壯皆戰死者十九其子獨以跛之故子父相保見淮南子也屬其慶者夫豈無懷慶謂恩遇也懷思也荷恩遇者豈不思之乎君子斷刑尚或為之不舉左傳鄭伯見虢叔曰夫司寇行戮君為之不舉杜注云不舉盛饌也況國憲倉卒慮不先圖矜情變容而罰同邪黨執政乃追怨子長謗書流後執政謂王允也放此為戮放音甫往反未或聞之典刑贊曰季長戚氏才通情侈苑囿典文流恱音伎侈謂紗帳女樂之類音伎謂鼓琴吹笛之屬也邕實慕靜心精辭綺斥言金商南徂北徙謂對事於金商門指斥而言無隱諱也籍梁懷董名澆身毁籍梁謂融因籍梁冀貴幸為作西第頌懷董謂邕懷董卓之恩也澆薄也劉攽曰此卷内詔字多改作制字待詔作待制是也又言誥羣臣各言政要亦本是詔字盖武太后諱照此時悉回避照字後人既已改還本字尚有遺者故爾後漢書卷九十下後漢書卷九十下考證蔡邕傳不寢寐者十旬宋本作七旬奏求正定六經文字臣世駿按此與張馴傳皆云奏求正定六經文字而靈帝紀云詔諸儒正五經文字儒林傳序云詔諸儒正定五經刻於石碑盧植傳云時始立太學石經以正五經文字李廵傳云乃白帝與諸儒共刻五經文於石考邕傳注引洛陽記亦祗有尚書周易公羊傳禮記論語晉羊欣筆法魏酈元水經注亦祗言五經意憙平四年邕等所奏求定者六經暨光和六年書丹立石祗五經耳邕乃自書冊於碑冊字何焯校本改丹皆屈情從制屈情二字監本訛作出清從宋本改奏其所著十意注唯記紀傳記字一本作有後漢書卷九十下考證
