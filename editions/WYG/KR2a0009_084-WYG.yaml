body:
  text: 後漢書卷八十四宋宣城太守范煜撰唐章懷太子賢注楊震列傳第四十四楊震傳子秉孫賜曽孫彪𤣥孫脩楊震字伯起𢎞農華隂人也八世祖喜高祖時有功封赤泉侯史記曰喜追殺項羽以功封高祖敞昭帝時為丞相封安平侯父寶續齊諧記曰寶年九嵗時至華隂山北見一黄雀為鴟梟所搏墜於樹下為螻蟻所困寳取之以歸置巾箱中唯食黄花百餘日毛羽成乃飛去其夜有黄衣童子向寶再拜曰我西王母使者君仁愛救拯實感成濟以白環四枚與寶令君子孫潔白位登三事當如此環矣習歐陽尚書哀平之世隱居教授居攝二年與兩龔蒋詡俱徴遂遁逃不知所處龔勝字君賔龔舍字君倩􅃽詡字元卿並以高節著名見前書光武高其節建武中公車特徴老病不到卒於家震少好學受歐陽尚書於太常桓郁明經博覽無不窮究諸儒為之語曰關西孔子楊伯起常客居於湖今湖城縣不答州郡禮命數十年續漢志曰教授二十餘年州請召數稱病不就少孤貧獨與母居假地種植以給供養諸生嘗有助種藍者震輙㧞更以距其後鄉里稱孝也衆人謂之晩暮而震志愈篤後有冠雀銜三鱣魚飛集講堂前冠音貫即鸛雀也鱣音善韓子云鱣似蛇臣賢案續漢及謝承書鱣皆作鱓然則鱣鱓古字通也鱣魚長者不過三尺黄地黒文故都講云蛇鱓卿大夫之服象也郭璞云鱓魚長二三丈音知然反安有鸛雀能勝二三丈乎此為鱣明矣都講取魚進曰蛇鱣者卿大夫服之象也數三者法三台也先生自此升矣年五十乃始仕州郡大将軍鄧隲聞其賢而辟之舉茂才四遷荆州刺史東萊太守當之郡道經昌邑昌邑故城在今兖州金鄉縣西北故所舉荆州茂才王密為昌邑令謁見至夜懷金十斤以遺震震曰故人知君君不知故人何也密曰暮夜無知者震曰天知神知我知子知何謂無知密愧而出後轉涿郡太守性公廉不受私謁子孫常蔬食歩行故舊長者或欲令為開産業震不肯曰使後世稱為清白吏子孫以此遺之不亦厚乎元初四年徴入為太僕遷太常先是博士選舉多不以實震舉薦明經名士陳留楊倫等倫字仲桓謝承書云薦楊仲桓等五人各從家拜博士顯傳學業諸儒稱之永寧元年代劉愷為司徒明年鄧太后崩内寵始横安帝乳母王聖因保養之勤緣恩放恣聖子女伯榮出入宫掖傳通姦賂震上疏曰臣聞政以得賢為本理以去穢為務墨子曰夫尚賢者政本也左傳曰為國者如農夫之務去草焉是以唐虞俊乂在官四凶流放天下咸服以致雍熈尚書曰四罪而天下咸服又曰黎人於變時雍庻績咸熈雍和也熈廣也方今九徳未事尚書臯繇謨曰亦行有九徳寛而栗柔而立愿而龔亂而敬擾而毅直而温簡而廉剛而塞强而誼又曰九徳咸事俊乂在官嬖倖充庭諡法曰賤而得愛曰嬖阿母王聖出自賤微得遭千載奉養聖躬雖有推燥居溼之勤孝經援神契曰母之於子也鞠養殷勤推燥居溼絶少分甘也前後賞惠過報勞苦而無厭之心不知紀極左傳曰縉雲氏有不材子聚歛積實不知紀極外交屬託擾亂天下損辱清朝塵㸃日月書試牝雞牡鳴牝雌也牡雄也尚書古人有言牝雞無晨牝雞之晨唯家之索詩刺哲婦喪國詩大雅曰哲夫成城哲婦傾城昔鄭嚴分從母氏之欲恣驕弟之情幾至危國然後加討春秋貶之以為失教嚴公荘公也避明帝諱改焉左傳鄭荘公殺母弟叚稱鄭伯譏失教也夫女子小人近之喜逺之怨實為難養論語曰唯女子與小人為難養近之則不遜逺之則怨也易曰無攸遂在中饋家人卦六二爻辭也鄭𤣥注曰二為隂爻得正於内五陽爻也得正於外猶婦人自脩正於内丈夫脩正於外無攸遂言婦人無敢自遂也爻體離又互體坎火位在下水在上餁之象也饋食也故云在中饋也言婦人不得與於政事也宜速出阿母令居外舍斷絶伯榮莫使徃來令恩徳兩隆上下俱美惟陛下絶婉孌之私割不忍之心詩國風候人篇序曰曹共公逺君子而近小人其詩曰婉兮孌兮季女斯飢婉少貌孌好貌也留神萬機誡慎拜爵减省獻御損節徴發令野無鶴鳴之歎詩小雅序曰鶴鳴誨宣王也鄭𤣥注云教周宣王求賢人之未仕者其詩曰鶴鳴于九臯聲聞于野言身隱而名著喻賢者雖隱居人咸知之朝無小明之悔詩小雅序曰小明大夫悔仕於亂也小明者言周幽王日小其明損其政事以至於亂大東不興於今詩小雅序大東刺亂也其詩曰小東大東杼柚其空鄭𤣥注云小亦於東大亦於東言賦歛多也勞止不怨於下詩小雅序曰人勞刺厲王也其詩曰民亦勞止迄可小康擬蹤徃古比徳哲王豈不休哉奏御帝以示阿母等内倖皆懷忿恚而伯榮驕滛尤甚與故朝陽侯劉護從兄瓌交通護泗水王歙之從曽孫瓌遂以為妻得襲護爵位至侍中震深疾之復詣闕上疏曰臣聞高祖與羣臣約非功臣不得封故經制父死子繼兄亡弟及以防簒也公羊傳曰劉子單子以王猛入于王城者何西周也其言入何篡辭也冬十月王子猛卒此未踰年之君其稱王子猛卒何不予當也不予當者不與當父死子繼兄亡弟及也伏見詔書封故朝陽侯劉護再從兄瓌襲護爵為侯護同産弟威今猶見在臣聞天子專封封有功諸侯專爵爵有徳今瓌無他功行但以配阿母女一時之間既位侍中又至封侯不稽舊制不合經義行人諠譁百姓不安陛下宜覽鏡既徃順帝之則書奏不省延光二年代劉愷為太尉帝舅大鴻臚耿寶薦中常侍李閏兄於震震不從寶乃自徃候震曰李常侍國家所重欲令公辟其兄寶唯傳上意耳言非己本心傳在上之意震曰如朝廷欲令三府辟召故宜有尚書勑遂拒不許寶大恨而去皇后兄執金吾閻顯亦薦所親厚於震震又不從司空劉授聞之漢官儀授字孟春武原人即辟此二人旬日中皆見㧞擢由是震益見怨時詔遣使者大為阿母修第中常侍樊豐及侍中周廣謝惲等更相扇動傾揺朝廷震復上疏曰臣聞古者九年耕必有三年之儲故堯遭洪水人無菜色言有儲蓄人無食菜之飢色也臣伏念方今灾害發起彌彌滋甚彌彌猶稍稍也韋孟詩曰彌彌其失也百姓空虚不能自贍重以螟蝗羌虜鈔掠三邊震擾戰鬬之役至今未息兵甲軍糧不能復給大司農帑藏匱乏殆非社稷安寧之時伏見詔書為阿母興起津城門内第舍津城門洛陽南面西頭門也合兩為一連里竟街合兩坊而為一宅里即坊也雕修繕飾窮極巧伎今盛夏土王而攻山採石其大匠左校别部將作合數十處續漢志將作大匠秩二千石左校令秩六百石轉相迫促為費巨億周廣謝惲兄弟與國無肺腑枝葉之屬依倚近倖姦佞之人與樊豐王永等分威共權屬託州郡傾動大臣宰司辟召承望㫖意招來海内貪汙之人受其貨賂至有臧錮棄世之徒復得顯用有臧賄禁錮之人也白黒溷淆清濁同源天下讙譁咸曰財貨上流為朝結譏臣聞師言上之所取財盡則怨力盡則叛怨叛之人不可復使故曰百姓不足君誰與足論語有若對魯哀公之詞惟陛下度之豐惲等見震連切諫不從無所顧忌遂詐作詔書調發司農錢榖大匠見徒材木各起家舍園池廬觀役費無數震因地震復上疏曰臣蒙恩備台輔不能奉宣政化調和隂陽去年十一月四日京師地動臣聞師言地者隂精當安静承陽而今動揺者隂道盛也其日戊辰三者皆土位在中宫戊干辰支皆土也并地動故言三者此中臣近官盛於持權用事之象也臣伏惟陛下以邊境未寧躬自菲薄宫殿垣屋傾倚枝柱而已倚邪也柱音竹主反無所興造欲令逺近咸知政化之清流商邑之翼翼也詩商頌商邑翼翼四方之極也而親近倖臣未崇斷金易繫辭曰二人同心其利斷金言邪佞之臣不與上同心驕溢踰法多請徒士盛修第舍賣弄威福道路讙譁衆所聞見地動之變近在城郭殆為此發又冬無宿雪春節未雨百僚燋心而繕修不止誠致旱之徴也書曰僣恒𤾉若臣無作威作福玉食尚書洪範之詞也僣差也若順也君行僣差則常暘順之也言唯君得專威福為羙食唯陛下奮乾剛之徳易曰大哉乾乎剛健中正純粹精也棄驕奢之臣以掩訞言之口奉承皇天之戒無令威福久移於下震前後所上轉有切至帝既不平之而樊豐等皆側目憤怨俱以其名儒未敢加害尋有河間男子趙騰詣闕上書指陳得失帝發怒遂收考詔獄結以罔上不道震復上疏救之曰臣聞堯舜之世諫皷謗木立之於朝帝皇紀曰堯置敢諫之皷舜立誹謗之木殷周哲王小人怨詈則還自敬徳尚書曰自殷王中宗及高宗及祖甲及我周文王兹四人廸哲厥或告之曰小人怨汝詈汝則皇自敬徳也所以達聰明開不諱博採負薪盡極下情也今趙騰所坐激訐謗語為罪與手刃犯法有差乞為虧除全騰之命以誘芻蕘輿人之言輿衆也詩曰詢于芻蕘左氏傳曰聽輿人之謀也帝不省騰竟伏尸都市㑹三年春東廵岱宗樊豐等因乘輿在外競修第宅震部掾高舒召大匠令史考校之史謂府吏也得豐等所詐下詔書具奏須行還上之豐等聞惶怖㑹太史言星變逆行遂共譖震云自趙騰死後深用怨懟懟怨怒也且鄧氏故吏有恚恨之心震初鄧隲辟之故曰故吏及車駕行還便時太學且於太學待吉時而後入也故曰便時前書便時上林延夀門也夜遣使者䇿收震太尉印綬於是柴門絶賔客豐等復惡之乃請大將軍耿寶奏震大臣不服罪懷恚望有詔遣歸本郡震行至城西夕陽亭乃慷慨謂其諸子門人曰慷慨悲歎死者士之常分吾䝉恩居上司疾姦臣狡猾而不能誅惡嬖女傾亂而不能禁何面目復見日月身死之日以雜木為棺布單被裁足蓋形勿歸冢次勿設祭祠因飲酖而卒時年七十餘𢎞農太守移良風俗通日齊公子雍食菜於移其後氏焉承樊豐等㫖遣吏於陜縣留停震喪露棺道側謝承書曰震臨没謂諸子以牛車薄簀載柩還歸讁震諸子代郵行書道路皆為隕涕説文郵境上行書舍也廣雅曰郵驛也歳餘順帝即位樊豐周廣等誅死震門生虞放陳翼詣闕追訟震事朝廷咸稱其忠乃下詔除二子為郎贈錢百萬以禮改𦵏於華隂潼亭墓在今潼關西大道之北其碑尚存逺近畢至先𦵏十餘日有大鳥高丈餘集震喪前俯仰悲鳴淚下霑地𦵏畢乃飛去郡以状上續漢書曰大鳥來止亭樹下地安行到柩前正立低頭淚出衆人更共摩撫抱持終不驚駭謝承書曰其鳥五色高丈餘兩翼長二丈三尺人莫知其名也時連有灾異帝感震之枉乃下詔䇿曰故太尉震正直是與俾匡時政而青蠅㸃素同兹在藩藩樊也詩云營營青蠅止于樊愷悌君子無信讒言青蠅汚白使黒汙黒使白喻佞人變亂善惡也上天降威灾眚屢作爾卜爾筮惟震之故朕之不徳用彰厥咎山崩棟折我其危哉禮記曰孔子将終歌曰泰山其頽乎梁木其壞乎今使太守丞以中牢具祠魂而有靈儻其歆享於是時人立石鳥象於其墓所震之被譖也高舒亦得罪以減死論及震事顯舒拜侍御史至荆州刺史震五子長子牧富波相富波縣屬汝南郡牧孫奇靈帝時為侍中帝嘗從容問奇曰朕何如桓帝對曰陛下之於桓帝亦猶虞舜比徳唐堯帝不悦曰卿强項真楊震子孫强項言不低屈也光武謂董宣為强項令也死後必復致大鳥矣出為汝南太守帝崩後復入為侍中衛尉從獻帝西遷有功勤及李傕脅帝歸其營奇與黄門侍郎鍾繇誘傕部曲將宋曄楊昻令反傕傕由此孤弱帝乃得東魏志曰繇為黄門侍即傕脅天子繇與尚書郎韓斌同䇿謀天子得出長安繇有力焉後徙都許追封竒子亮為陽成亭侯亮舊宅在閿鄉縣西南震少子奉奉子敷篤志博聞議者以為能世其家敷早卒子衆亦傳先業以謁者僕射從獻帝入關累遷御史中丞及帝東遷夜走度河衆率諸官屬歩從至太陽拜侍中太陽縣屬河東郡建安二年追前功封蓩亭侯郡國志桃林縣有蓩鄉音莫老反震中子秉秉字叔節少傳父業兼明京氏易博通書傳常隱居教授年四十餘乃應司空辟拜侍御史頻出為豫荆徐兖四州刺史遷任城相自為刺史二千石計日受奉餘禄不入私門故吏齎錢百萬遺之閉門不受以廉潔稱桓帝即位以明尚書徴入勸講勸講猶侍講也拜太中大夫左中郎將遷侍中尚書帝時微行私過幸河南尹梁𦙍府舍𦙍梁冀子也是日大風㧞樹晝昏秉因上疏諌曰臣聞瑞由徳至灾應事生傳曰禍福無門唯人所召左傳閔子騫之詞天不言語以灾異譴告是以孔子迅雷風烈必有變動詩云敬天之渝不敢馳驅詩大雅曰敬天之怒無敢戲豫敬天之渝無敢馳驅與此文稍異也王者至尊出入有常警蹕而行靜室而止蹕止行人也靜室謂先使清宫也前書音義曰漢有靜室令也自非郊廟之事則鑾旗不駕漢官儀曰前驅有雲罕皮軒鑾旗車也故詩稱自郊徂宫詩大雅雲漢之詞也郊祭天也易曰王假有廟致孝享也萃卦詞也假至也假音格諸侯如臣之家春秋尚列其誡左傳齊荘公如崔杼之家為杼所殺也况以先王法服而私出槃游法服謂天子服日月星辰山龍華蟲藻火粉米黼黻十二章降亂尊卑等威無序等威謂威儀有等差也左傳曰貴有常尊賤有等威也侍衛守空宫紱璽委女妾設有非常之變任章之謀前書曰代郡太守任宣坐謀反誅宣子章為公車丞亡在渭城界中夜𤣥服八廟居廊間執㦸立於廟門待上至欲為逆發覺伏誅也上負先帝下悔靡及臣奕世受恩奕猶重也得備納言納言尚書又以薄學充在講勸特䝉哀識見照日月恩重命輕義使士死敢憚摧折略陳其愚帝不納秉以病乞退出為右扶風太尉黄瓊惜其去朝廷上秉勸講帷幄不宜外遷留拜光禄大夫是時大将軍梁冀用權秉稱病六年冀誅後乃拜太僕遷太常延熹三年白馬令李雲以諌受罪秉爭之不能得坐免官歸田里謝承書曰秉免歸雅素清儉家至貧窶并日而食任城故孝廉景慮齎錢百餘萬就以餉秉秉閉門距絶不受其年冬復徴拜河南尹先是中常侍單超弟匡為濟隂太守以臧罪為刺史第五種所劾窘急乃賂客任方刺兖州從事衛羽事己見種傳及捕得方囚繫洛陽匡慮秉當窮竟其事密令方等得突獄亡走尚書召秉詰責秉對曰春秋不誅黎比而魯多盜左傳曰邾庻其以漆閭丘來奔於是魯多盜臣賢案黎比莒國之君恐别有所據也方等無状釁由單匡刺執法之吏害奉公之臣復令得逃竄寛縱罪身元惡大憝終為國害乞檻車徴匡考覈其事則姦慝蹤緒必可立得而秉竟坐輸作左校以久旱赦出㑹日食太山太守皇甫規等訟秉忠正不宜久抑不用有詔公車徴秉及處士韋著二人各稱疾不至有司並劾秉著大不敬請下所屬正其罪尚書令周景與尚書邊韶議奏秉儒學侍講常在謙虛著隱居行義以退讓為節俱徴不至誠違側席之望然逶迤退食足抑茍進之風詩國風羔羊詩曰退食自公委蛇委蛇退食謂减膳也從於公謂正直順於事也委蛇委曲自得之貌也夫明王之世必有不召之臣堯時許由禹時伯成子高湯時務光等聖朝𢎞養宜用優游之禮可告在所屬劉攽曰案文多一在字喻以朝廷恩意如遂不至詳議其罰於是重徴乃到拜太常五年冬代劉矩為太尉是時宦官方熾任人及子弟為官任謂保任布滿天下競為貪滛朝野嗟怨秉與司空周景上言内外吏職多非其人自頃所徴皆特拜不試致盜竊縱恣怨訟紛錯舊典中臣子弟不得居位秉埶而今枝葉賔客布列職署或年少庸人典據守宰上下忿患四方愁毒可遵用舊章退貪殘塞灾謗請下司隸校尉中二千石城門五營校尉北軍中候各實覈所部應當斥罷自以状言三府廉察有遺漏續上帝從之於是秉條奏牧守以下匈奴中郎将燕瑗青州刺史羊亮遼東太守孫諠等五十餘人或死或免天下莫不肅然時郡國計吏多留拜為郎秉上言三署見郎七百餘人三署郎觧見安帝紀帑臧空虛浮食者衆而不良守相欲因國為池澆濯釁穢宜絶横拜以塞覬覦之端左傳曰下無覬覦杜預注曰無冀望上位自此終桓帝世計吏無復留拜者七年南廵園陵特詔秉從南陽太守張彪與帝微時有舊恩以車駕當至因傍發調多以入私秉聞之下書責讓荆州刺史以状副言公府南陽郡荆州所部也及行至南陽左右並通姦利詔書多所除拜秉復上疏諌曰臣聞先王建國順天制官尚書曰明王奉若天道建邦設都孔安國注云天有日月北斗五星二十八宿皆有尊卑相正之法明王奉順此道建邦設都太微積星名為郎位史記天官書曰太微宮五帝坐後聚二十五星蔚然曰郎位積聚也入奉宿衛出牧百姓臯陶誠虞在於官人尚書臯陶誡舜曰在知人在官人也頃者道路拜除恩加豎隸爵以貨成化由此敗所以俗夫巷議白駒逺逝孔子曰天下有道庶人不議詩小雅曰皎皎白駒食我塲苗所謂伊人於焉逍遥言宣王官失其人賢者乘白駒而去之穆穆清朝逺近莫觀宜割不忍之恩以斷求欲之路於是詔除乃止時中常侍侯覽弟參為益州刺史累有臧罪暴虐一州明年秉劾奏參檻車徴詣廷尉參惶恐道自殺謝承書曰秉奏參取受罪臧累億牂柯男子張攸居為富室參横加非罪云造訛言殺攸家八人没入廬宅又與同郡諸生李元之官共飲酒醉飽之後戲故相犯誣言有􅁋慝之罪應時棰殺以人臣之勢行桀紂之態傷和逆理痛感天地宜當糺持以謝一州又曰京兆尹袁逢於長安客舍中得參重車三百餘乘金銀珍玩不可稱紀秉因奏覽及中常侍具瑗曰臣案國舊典宦豎之官本在給使省闥司昬守夜而今猥受過寵執政操權其阿䛕取容者則因公襃舉以報私惠有忤逆於心者必求事中傷肆其凶忿居法王公富擬國家飲食極肴饍僕妾盈紈素雖季氏專魯穰侯擅秦何以尚兹季氏魯卿世專魯政孔子曰季氏富於周公史記曰穰侯魏冉者秦昭王母宣太后弟也為秦相國侈富於王室尚猶加也案中常侍侯覽弟參貪殘元惡自取禍滅覽固知釁重必有自疑之意臣愚以為不宜復見親近昔懿公刑邴歜之父奪閻職之妻而使二人參乗卒有竹中之難春秋書之以為至戒左傳曰齊懿公之為公子也與邴歜之父爭田弗勝及即位乃倔而刖之而使歜僕納閻職之妻而使職驂乗夏五月公游于申池歜以扑扶職職怒歜曰人奪汝妻而不怒一抶汝庸何傷職曰與刖其父而弗能病者何如乃謀殺懿公納諸竹中歸舍爵而行也蓋鄭詹來而國亂四佞放而衆服公羊傳曰鄭詹自齊逃來何以書甚佞也曰佞人來後魯荘公取齊滛女卒為後敗四佞即四凶也以此觀之容可近乎覽宜急屏斥投畀有虎畀與也詩小雅曰取彼譖人投畀豺虎劉攽曰正文有當作豺注無它説知與詩同若斯之人非恩所宥請免官送歸本郡書奏尚書召對秉掾屬曰召秉掾屬問之公府外職而奏劾近官經典漢制有故事乎秉使對曰春秋趙鞅以晉陽之甲逐君側之惡公羊傳曰趙鞅取晉陽之甲以逐荀寅士吉射曷為此逐君側之惡人也傳曰除君之惡唯力是視左傳曰晉寺人披言也鄧通懈慢申屠嘉召通詰責文帝從而請之前書鄧通文帝幸臣為太中大夫居上傍怠慢丞相申屠嘉罷朝坐府中召通至不為禮責曰通小臣戲殿上大不敬當斬通頓首首盡出血上使使持節召通而謝丞相此吾弄臣君釋之漢世故事三公之職無所不統尚書不能詰帝不得已竟免覽官而削瑗國每朝廷有得失輙盡忠規諌多見納用秉性不飲酒又早䘮夫人遂不復娶所在以淳白稱嘗從容言曰我有三不惑酒色財也八年薨時年七十四賜塋陪陵子賜賜字伯獻少傳家學篤志博聞常退居隱約教授門徒不答州郡禮命後辟大将軍梁冀府非其好也出除陳倉令因病不行公車徴不至連辭三公之命後以司空高第再遷侍中越騎校尉建寕初靈帝當受學詔太傅三公選通尚書桓君章句宿有重名者三公舉賜乃侍講於華光殿中洛陽宫殿名曰華光殿在崇光殿北遷少府光禄勲熹平元年青蛇見御坐帝以問賜賜上封事曰臣聞和氣致祥乖氣致灾休徴則五福應休美也徴騐也五福一曰壽二曰富三曰康寕四曰攸好徳五曰考終命咎徴則六極至咎惡也六極一曰凶短折二曰疾三曰憂四曰貧五曰惡六曰弱並見尚書夫善不妄來灾不空發王者心有所惟意有所想雖未形顔色而五星以之推移隂陽為其變度以此而觀天之與人豈不符哉尚書曰天齊乎人假我一日是其明徴也我謂君也天意欲整齊于人必假於君也今尚書文假作俾俾使也義亦通夫皇極不建則有蛇龍之孽洪範五行傳曰皇大也極中也建立也孽灾也君不合大中是謂不立蛇龍隂類也詩云惟虺惟蛇女子之祥詩小雅也虺蛇穴居隂之類故為女子之祥也故春秋兩蛇鬬於鄭門昭公殆以女敗洪範五行傳曰初鄭厲公劫相祭仲而簒兄昭公立為鄭君後雍糺之難厲公出奔鄭人立昭公既立内蛇與外蛇鬭鄭南門中内蛇死是時傅瑕仕於鄭欲内厲公故内蛇死者昭公将敗厲公將勝之象也是時昭公宜布恩施惠以撫百姓舉賢崇徳以厲羣臣觀察左右以省姦謀則内變不得生外謀無由起矣昭公不覺果殺於傅瑕二子死而厲公入此其効也詩云惟虺惟蛇女子之祥鄭荘公殆以女子敗矣康王一朝晏起關雎見幾而作前書曰佩玉晏鳴關雎歎之音義曰后夫人雞鳴佩玉去君所周康王后不然故詩人歎而傷之此事見魯詩今亡失也夫女謁行則讒夫冒讒夫昌則苞苴通故殷湯以之自戒終濟亢旱之灾説苑曰湯自伐桀後大旱七年洛川竭使人持三足鼎祝於山川曰政不節邪使人疾邪苞苴行邪讒夫昌邪宫室榮邪女謁行邪何不雨之極言未已而天大雨惟陛下思乾剛之道别内外之宜崇帝乙之制受元吉之祉易泰卦六五日帝乙歸妹以祉元吉也抑皇甫之權割豔妻之愛豔妻周幽王后褒姒也皇甫卿士等皆后之黨用后嬖寵而居位也詩云皇甫卿士豔妻煽方處也則蛇變可消禎祥立應殷戊宋景其事甚明殷王太戊時桑榖共生於朝修徳而桑榖死景公時熒惑守心修徳而星退舍並見史記二年代唐珍為司空以灾異免復拜光祿大夫秩中二千石五年代袁隗為司徒是時朝廷爵授多不以次而帝好微行遊幸外苑賜復上疏曰臣聞天生蒸民不能自理蒸衆也故立君長使司牧之司主也牧養也是以唐虞兢兢業業兢兢戒慎業業危懼尚書臯陶謨日兢兢業業一日二日萬幾周文日昃不暇尚書曰文王自朝至於日中昃弗遑暇食明慎庶官俊乂在職三載考績尚書曰三載考績黜陟幽明也以觀厥成而今所序用無他徳有形埶者旬日累遷守真之徒歴載不轉勞逸無别善惡同流北山之詩所為訓作詩小雅曰陟彼北山言採其把偕偕士子朝夕從事大夫不均我從事獨賢又聞數微行出幸苑囿觀鷹犬之埶極槃遊之荒槃樂也詩云槃于遊田書曰内作色荒外作禽荒政事日墮許規切大化陵遲陛下不顧二祖之勤止二祖髙祖光武也詩云文王既勤止追慕五宗之美蹤文帝太宗武帝世宗宣帝中宗明帝顯宗章帝肅宗也而欲以望太平是由曲表而欲直景郤行而求及前人也孫卿子曰猶立枉木而求其影之直也韓詩外傳曰夫明鏡所以照形也徃古所以知今也夫知惡徃古之惡而不知修今之善惡徃古之所以危亡而不知襲積其所以安存則無以異乎却行而求逮於前人也宜絶慢慠之戲念官人之重割用板之恩愼貫魚之次板謂詔書也易剥卦曰貫魚以宫人寵言王者御宫人如貫魚之有次序也無令醜女有四殆之歎劉向列女傳曰鍾離春者齊無鹽邑之女齊宣王之正后也其為人也極醜無䨇白頭深目長壮大節卭鼻結喉肥項少髪折腰凸胷皮膚若漆年四十行嫁不售自謁宣王舉手拊膝曰殆哉殆哉曰今王之國西有衡秦之患南有强楚之讐外有二國之難一旦山陵崩㢮社稷不安此一殆也漸臺五重萬人罷極此二殆也賢者伏匿於山林諂諛被强於左右此三殆也飲酒沈湎以夜繼晝外不修諸侯之禮内不秉國家之政此四殆也遐邇有憤怨之聲臣受恩偏特忝任師傅不敢自同凡臣括囊避咎括結也易曰括囊無咎無譽謹自手書密上後坐辟黨人免復拜光禄大夫光和元年有虹蜺晝降於嘉徳殿前洛陽記殿在九龍門内郭景純注爾雅曰雙出色鮮盛者為雄曰虹闇者為雌曰蜺帝惡之引賜及議郎蔡邕等入金商門崇徳署戴延之西征記曰太極殿西有金商門使中常侍曹節王甫問以祥異禍福所在賜仰天而歎謂節等曰吾每讀張禹傳未嘗不憤恚歎息不能竭忠盡情極言其要而反留意少子乞還女壻張禹成帝時為丞相以師傅恩禹每疾輙以起居聞車駕日臨問之拜禹牀下禹頓首謝恩言老臣有四男一女愛女甚於男逺嫁為張掖太守蕭咸妻不勝父子私情思與女相近上即時徙咸為𢎞農太守又屬少子未有官上臨候禹禹數視其少子上即禹牀下拜為黄門給事中也朱游欲得尚方斬馬劔以理之固其宜也朱雲字游張禹以帝師尊重雲上書求見公卿在前雲曰今朝廷大臣不能匡主臣願得尚方斬馬劒斷佞臣一人頭以厲其餘上問誰也對曰安昌侯張禹尚方少府之屬官也作供御噐物故有斬馬劒利可以斬馬也並見前書吾以微薄之學充先師之末累世見寵無以報國猥當大問死而後已乃書對曰臣聞之經傳或得神以昌或得神以亡左傳曰有神降于莘周内史過曰國之將興明神降之監其徳也将亡神又降之觀其惡也故有得神以興亦有以亡國語曰昔夏之興也祝融降於崇山其亡也回祿信於黔遂商之興也檮杌次於㔻山其亡也夷羊在牧周之興也鸞鷟鳴於岐山其衰也杜伯射王於鄗也國家休明則鑒其徳邪辟昬亂則視其禍今殿前之氣應為虹蜺皆妖邪所生不正之象詩人所謂蝃蝀者也韓詩序曰蝃蝀刺奔女也蝃蝀在東莫之敢指詩人言蝃蝀在東者邪色乗陽人君滛佚之徴臣子為君父隱藏故言莫之敢指蝃音帝蝀音董於中孚經曰蜺之比無徳以色親易稽覽圖中孚經之文也比類也鄭𤣥注曰蜺邪氣也隂無徳以好色得親幸於陽也方今内多嬖倖外任小臣上下並怨諠譁盈路是以灾異屢見前後丁寕今復投蜺可謂孰矣孰成也案春秋讖曰天投蜺天下怨海内亂春秋演孔圖曰霓者斗之亂精也失度投霓見宋均注曰投霓投應也加四百之期亦復垂及漢終于四百年觧見獻帝紀昔虹貫牛山管仲諌桓公無近妃宫春秋文曜鉤口白虹貫牛山管仲諌曰無近妃宫君恐失權齊侯大懼退去色黨更立賢輔使后出望上牛山四面聽之以厭神宋均注曰山君位也虹蜺隂氣也隂氣貫之君惑於妻黨之象也望謂祭以謝過也流俗本山作升者誤也易曰天垂象見吉凶聖人則之上繫之詞則效也今妾媵嬖人閹尹之徒共專國朝欺罔日月又鴻都門下招㑹羣小造作賦説以蟲篆小技見寵於時法言曰賦者童子雕蟲篆刻壮夫不為也如驩兠共工更相薦説尚書驩兠曰都共工方鳩孱功旬月之間並各㧞擢樂松處常伯任芝居納言郄儉梁鵠俱以便辟之性佞辯之心各受豐爵不次之寵而令搢紳之徒委伏畎畝口誦堯舜之言身蹈絶俗之行棄捐溝壑不見逮及冠履倒易陵谷代處楚詞曰冠履兮雜處詩曰髙岸為谷深谷為陵也從小人之邪意順無知之私欲不念板蕩之作虺蜴之誡詩大雅序曰板凡伯刺厲王也其詩曰上帝板板下民卒癉蕩召穆公傷周室大壊也其詩曰蕩蕩上帝下民之辟又云哀今之人胡為虺蜴注云蜴蠑螈也虺蜴之性見人則走哀哉今之人何為如是傷時政也殆哉之危莫過於今無鹽女之詞觧見上幸頼皇天垂象譴告周書曰天子見怪則修徳諸侯見怪則修政卿大夫見怪則修職士庻人見怪則修身唯陛下慎經典之誡圖變復之道謂變改而銷復之斥逺佞巧之臣速徴鶴鳴之士内親張仲外任山甫詩曰張仲孝友又曰衮職有闕仲山甫補之皆周宣王賢臣也斷絶尺一抑止槃游留思庻政無敢怠遑冀上天還威衆變可弭老臣過受師傅之任數蒙寵異之恩豈敢愛惜垂没之年而不盡其慺慺之心哉慺慺猶勤勤也音力侯反書奏甚忤曹節等蔡邕坐直對抵罪徙朔方賜以師傅之恩故得免咎其冬行辟雍禮引賜為三老復拜少府光禄勲代劉郃為司徒帝欲造畢圭靈琨苑賜復上疏諌曰竊聞使者並出規度城南人田欲以為苑昔先王造囿裁足以修三驅之禮薪萊芻牧皆悉徃焉先帝之制左開鴻池右作上林鴻池在洛陽東上林在西不奢不約以合禮中今猥規郊城之地以為苑囿壊沃衍杜預注左傳曰衍沃平美之地也廢田園驅居人畜禽獸殆非所謂若保赤子之義書曰若保赤子唯人其康乂也今城外之苑已有五六陽嘉元年起西苑延熹二年造顯陽苑洛陽宫殿名有平樂苑上林苑桓帝延熹元年置鴻徳苑也可以逞情意順四節也逞快也四節謂春蒐夏苖秋獮冬狩也宜惟夏禹卑宫孔子曰禹惡衣服卑宫室也太宗露臺之意文帝欲作露臺召匠計之直百金帝曰百金中人十家之産吾奉先帝宫室常恐羞之何以臺為也以尉下民之勞書奏帝欲止以問侍中任芝中常侍樂松松等曰昔文王之囿百里人以為小齊宣五里人以為大孟子齊宣王問曰文王之囿方七十里人猶以為小寡人之囿方四十里人猶以為大何也曰文王之囿方七十里芻蕘者徃焉雉兔者徃焉與人同之人以為小不亦宜乎此云文王百里齊宣五里與孟子不同也今與百姓共之無害於政也帝悦遂令築苑四年賜以病罷居無何拜太常詔賜御府衣一襲衣單複具曰襲自所服冠幘綬玉壺革帯金錯鉤佩金錯以金間錯其文五年冬復拜太尉中平元年黄巾賊起賜被召㑹議詣省閣切諌忤㫖因以冦賊免先是黄巾帥張角等執左道稱大賢以誑燿百姓天下繦負歸之賜時在司徒召掾劉陶告曰張角等遭赦不悔而稍益滋蔓今若下州郡捕討恐更騷擾速成其患且欲切勑刺史二千石簡别流人各護歸本郡以孤弱其黨然後誅其渠帥可不勞而定何如陶對曰此孫子所謂不戰而屈人之兵廟勝之術也孫子曰未戰而廟勝得算多也未戰而廟不勝得算少也賜遂上書言之㑹去位事留中謂所論事留在禁中未施用之後帝徙南宫閲錄故事得賜所上張角奏及前侍講注籍所注之籍錄乃感悟下詔封賜臨晉侯邑千五百戸臨晉縣屬馮翊故城在今同州朝邑縣西南初賜與太尉劉寛司空張濟濟字元江細陽人濟張輔曽孫並入侍講自以不宜獨受封賞上書願分戸邑於寛濟帝嘉歎復封寛及濟子拜賜尚書令數日出為廷尉賜自以代非法家言曰三后成功惟殷于民臯陶不與焉蓋吝之也吝耻也殷盛也尚書曰伯夷降典折人惟刑禹平水土主名山川稷降播種農植嘉榖三后成功惟殷於人言臯陶不預其數者蓋耻之遂固辭以特進就第二年九月復代張温為司空其月薨天子素服三日不臨朝贈東園梓器禭服賜錢三百萬布五百疋䇿曰故司空臨晉侯賜華嶽所挺九徳純備挺生也九徳即臯陶謨九徳三葉宰相輔國以忠朕昔初載授道帷幄詩大雅曰文王初載毛萇注云載職也遂階成勲以陟大猷師範之功昭于内外庻官之務勞亦勤止七在卿校殊位特進五登衮職弭難乂寜雖受茅土未荅厥勲哲人其萎将誰諮度朕甚懼焉禮記曰孔子負手曵杖消揺於門歌曰太山其穨乎梁木其壊乎哲人其萎乎禮設殊等物有服章今使左中郎将郭儀持節追位特進前書張禹為丞相以老罷就第以列侯朝朔望位特進見禮如丞相漢雜事曰諸侯功徳優盛朝廷所敬異賜位特進在三公下贈司空驃騎将軍印綬及葬又使侍御史持節送䘮蘭臺令史十人發羽林騎輕車介士續漢書輕車古之戰車也彫朱輪輿不巾不蓋葘矛㦸幢麾菑音側事反菑謂揷也前後部鼔吹又勑驃騎将軍官屬司空法駕送至舊塋續漢志三公列侯車倚鹿伏熊黒轓朱斑輪鹿文飛軫九斿降龍騎吏四人皆𢃄劒持棨㦸為前列三百石長導從置門下五吏賊曹功曹皆帯劒車道主簿主記兩車為從也劉攽曰注案後漢志文此不合有三百石長四字又云賊曹督盗賊功曹皆𢃄劒三車道此文少督盗賊三字又少一三字又誤導字也蓋門下五吏賊曹一督盗賊一功曹一主簿一主記一凡五車也公卿已下㑹𦵏諡文烈侯及小祥又㑹焉子彪嗣禮朞而小祥又朞而大祥鄭𤣥注云祥吉也言其漸即吉也彪字文先少傳家學初舉孝廉州舉茂才辟公府皆不應熹平中以博習舊聞公車徴拜議郎華嶠書曰與馬日磾盧植蔡邕等著作東觀遷侍中京兆尹光和中黄門令王甫使門生於郡界辜𣙜官財物七千餘萬華嶠書曰甫使門生王翹辜𣙜觧見靈帝紀彪發其姦言之司隸司隸校尉楊球因此奏誅甫天下莫不愜心徴還為侍中五官中郎將遷潁川南陽太守復拜侍中三遷永樂少府太僕衛尉中平六年代董卓為司空其冬代黄琬為司徒明年闗東兵起董卓懼欲遷都以違其難違避也乃大㑹公卿議曰髙祖都闗中十有一世光武宫洛陽於今亦十世矣案石包䜟宜徙都長安以應天人之意百官無敢言者彪曰移都改制天下大事故盤庚五遷殷民胥怨盤庚殷王之名也胥相也遷都於亳殷人相與怨恨湯遷毫仲丁遷囂河亶甲居相祖乙居耿并盤庚五遷也昔闗中遭王莽變亂宫室焚燒民庻塗炭百不一在光武受命更都洛邑今天下無虞虞度也言無可度之事也書曰四方無虞百姓樂安明公建立聖主光隆漢祚無故捐宗廟棄園陵恐百姓驚動必有麋沸之亂如麋粥之沸也詩曰如沸如羮石包室䜟妖邪之書豈可信用卓曰關中肥饒故秦得并吞六國且隴右材木自出致之甚易又杜陵南山下有武帝故瓦陶竈數千所并功營之可使一朝而辦百姓何足與議若有前却我以大兵驅之可令詣滄海言不敢避險難也彪曰天下動之至易安之甚難惟明公慮焉卓作色曰公欲沮國計邪沮止也太尉黄琬曰此國之大事楊公之言得無可思卓不答司空荀爽見卓意壮恐害彪等因從容言曰相國豈樂此邪山東兵起非一日可禁故當遷以圖之此秦漢之埶也卓意小觧爽私謂彪曰諸君堅爭不止禍必有歸故吾不為也議罷卓使司隸校尉宣播以灾異奏免琬彪等詣闕謝即拜光祿大夫十餘日遷大鴻臚從入關轉少府太常以病免復為京兆尹光禄勲再遷光祿大夫三年秋代淳于嘉為司空以地震免復拜太常興平元年代朱儁為太尉錄尚書事及李傕郭汜之亂彪盡節衛主崎嶇危難之間㡬不免於害語在董卓傳及車駕還洛陽復守尚書令建安元年從東都許時天子新遷大㑹公卿兖州刺史曹操上殿見彪色不悦恐於此圖之未得讌設託疾如厠因出還營彪以疾罷時袁術僭亂操託彪與術婚姻誣以欲圖廢置奏收下獄劾以大逆獻帝春秋曰操刑之不濫君之明也楊彪獲罪懼者甚衆劉攽曰案此注當在見操曰下又當云融見操曰云云少融見曰三字将作大匠孔融聞之不及朝服徃見操曰楊公四世清徳海内所瞻周書父子兄弟罪不相及左傳曰康誥曰父不慈子不祗兄不友弟不恭不相及也况以袁氏歸罪楊公易稱積善餘慶徒欺人耳易文言曰積善之家必有餘慶操曰此國家之意融曰假使成王殺邵公周公可得言不知邪今天下纓緌搢紳説文曰纓冠索也鄭𤣥注禮記曰緌冠飾也紳帯也搢揷也揷笏於紳也或作縉者淺赤言帯之色所以瞻仰明公者以公聰明仁智輔相漢朝舉直厝枉致之雍熈也今横殺無辜則海内觀聽誰不觧體左傳曰季文子謂晉韓穿曰四方諸侯誰不觧體杜預注曰言不復肅敬也孔融魯國男子明日便當拂衣而去不復朝矣若以非罪殺彪融則還為魯國一男子不復更來朝也操不得已遂理出彪四年復拜太常十年免十一年諸以恩澤為侯者皆奪封彪父賜以師傅封臨晉侯彪見漢祚将終遂稱脚攣不復行積十年後子修為曹操所殺操見彪問曰公何痩之甚對曰愧無日磾先見之明猶懷老牛䑛犢之愛前書曰金日磾子二人武帝所愛以為弄兒其後弄兒壮大不謹自殿下與宫人戲日磾適見之惡其滛亂遂殺弄兒操為之改容修字徳祖好學有俊才為丞相曹操主簿典略曰修建安中舉孝廉除郎中丞相請署倉曹屬主簿是時軍國多事修摠知内外事皆稱意自魏太子以下並爭與交好用事曹氏及操自平漢中欲因討劉備而不得進欲守之又難為功護軍不知進止何依操於是出教唯曰雞肋而已外曹莫能曉修獨曰夫雞肋食之則無所得弃之則如可惜公歸計决矣乃令外白稍嚴操於此廻師修之幾决多有此類修又常出行籌操有問外事乃逆為答記勑守舍兒若有令出依次通之既而果然如是者三操怪其速使廉之知状廉察也於此忌修且以袁術之甥慮為後患遂因事殺之續漢書曰人有白修與臨淄侯曹植飲醉共載從司馬門出謗訕鄢陵侯章太祖聞之大怒故遂收殺之時年四十五矣修所著賦頌碑讃詩哀辭表記書凡十五篇及魏文帝受禪欲以彪為太尉先遣吏示㫖彪辭曰彪備漢三公遭世傾亂不能有所補益耄年被病豈可贊惟新之朝遂固辭乃授光祿大夫賜几杖衣袍續漢書曰魏文帝詔曰先王制几杖之賜所以賔禮黄耇太尉楊彪乃祖以來世著名績其賜公延年杖延請之日便使杖入也因朝㑹引見令彪著布單衣鹿皮冠杖而入待以賔客之禮年八十四黄初六年卒于家自震至彪四世太尉徳業相繼與袁氏俱為東京名族云華嶠書曰東京楊氏袁氏累世宰相為漢名族然袁氏車馬衣服極為奢僭能守家風為世所貴不及楊氏也論曰孔子稱危而不持顛而不扶則将焉用彼相矣論語載孔子之言也相扶持者諭臣當輔君也誠以負荷之寄不可以虚冒負荷之寄周公霍光之儔崇高之位憂重責深也延光之間震為上相抗直方以臨權枉坤六二曰直方大不習旡不利也先公道而後身名可謂懷王臣之節易曰王臣謇謇匪躬之故識所任之體矣遂累葉載徳易曰徳積載載重也繼踵宰相信哉積善之家必有餘慶先世韋平方之蔑矣韋賢平當父子並相繼為丞相贊曰楊氏載徳仍世柱國言世為國柱臣也震畏四知秉去三惑賜亦無諱彪誠匪忒忒差也脩雖木子渝我淳則渝變也劉攽曰案楊氏有兩族赤泉氏從木子雲自叙其受氏從才而楊修書稱曰修家子雲又似震族亦是掦氏不知文士聊如此云其亦實然也今書中華隂之族從木從才相半未知所從學者辨之後漢書巻八十四後漢書卷八十四考證楊震傳八世祖喜髙祖敞何焯曰前書楊敞不云是喜之後河間男子趙騰詣闕上書指陳得失帝發怒收考詔獄結以罔上不道震復上疏救之日至帝不省一叚日知録曰此乃安帝時事而張晧傳以為清河趙騰上言災變譏刺朝政收騰擊考晧上疏諫帝悟减騰死罪一等又以為順帝事豈有兩趙騰耶於是柴門絶賓客諸本同臣㑹汾按全書及他史言杜門絶賔客杜門謝客杜門稱疾者甚衆此柴字疑杜字之誤行至城西夕陽亭夕宋本作凡臣㑹汾按种暠傳亦有夕陽亭從監本是楊震子秉唯人所召注閔子騫之詞何焯曰注誤以閔子馬為子騫此傳寫致然文選注中亦如之春秋不誅黎比而魯多盗注臣賢案黎比莒國之君恐别有所據也臣會汾按左傳文公十八年莒僕以寶玉來奔納諸宣公季文子曰其人則盗賊也其噐則奸兆也但杜氏注不言莒僕名黎比又與此文不相當楊震孫賜並入侍講宋本作俱入侍中講入侍下不得再加中字宋本不可從楊震曽孫彪司隸校尉楊球楊應作陽後漢書卷八十四考證
