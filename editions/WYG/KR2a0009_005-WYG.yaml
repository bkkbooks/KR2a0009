body:
  text: 後漢書卷五宋宣城太守范煜撰唐章懷太子賢注安帝紀第五恭宗孝安皇帝諱祐謚法曰寛容和平曰安伏侯古今注曰祐之字曰福肅宗孫也父清河孝王慶母左姬帝自在邸第倉頡篇曰邸舍也説文云屬國之舍也前書音義曰第謂有甲乙之次第數有神光照室又有赤蛇盤於牀第之間第牀簀也年十歲好學史書史書者周宣王太史籕所作之書也凡五十五篇可以教童幼和帝常稱之數見禁中延平元年慶始就國鄧太后特詔留帝於清河邸八月殤帝崩太后與兄車騎將軍鄧騭定䇿禁中其夜使騭持節以王青蓋車迎帝齋于殿中續漢志曰皇太子皇子皆安車朱班輪青蓋金華蚤皇子為王錫以乗之故曰王青蓋車皇孫則綠車皇太后御崇德殿百官皆吉服洛陽南宫有崇徳殿不可以凶事臨朝故吉服也羣臣陪位引拜帝為長安侯不即立為天子而封侯者不欲從微即登皇位皇太后詔曰先帝聖徳淑茂早棄天下朕奉皇帝夙夜瞻仰日月冀望成就豈意卒然顚沛天年不遂悲痛斷心朕惟平原王素被痼疾念宗廟之重思繼嗣之統唯長安侯祐質性忠孝小心翼翼翼翼敬慎也詩曰惟此文王小心翼翼能通詩論篤學樂古仁惠愛下年已十三有成人之志親德係後莫宜於祐係即繼也禮昆弟之子猶己子禮記檀弓之文春秋之義為人後者為之子不以父命辭王父命為人後者謂出繼於人也王父謂祖也穀梁傳曰衛靈公廢太子蒯聵立孫輙不受父之命而受王父命其以祐為孝和皇帝嗣奉承祖宗案禮儀奏又作策命曰惟延平元年秋八月癸丑皇太后曰咨長安侯祐孝和皇帝懿德巍巍光于四海大行皇帝不永天年前書音義曰禮有大行人有小行人主謚號官也韋昭云大行者不反之辭也天子崩未有謚故稱大行也穀梁傳曰大行受大名風俗通曰天子新崩未有謚故且稱大行皇帝義兩通朕惟侯孝章帝世嫡皇孫謙恭慈順在孺而勤孺幼也或作在孺丕勤宜奉郊廟承統大業今以侯嗣孝和皇帝後其審君漢國允執其中一人有慶萬民頼之皇帝其勉之哉讀䇿畢太尉奉上璽綬即皇帝位年十三太后猶臨朝公羊傳曰猶者可止之辭也九月庚子謁髙廟辛五謁光武廟六州大水已未遣謁者分行虛實舉災害賑乏絶丙寅葬孝殤皇帝于康陵墳在慎陵塋中庚地髙五丈五尺周二百八歩乙亥隕石于陳留西域諸國叛攻都䕶任尚遣副校尉梁慬救尚擊破之慬音勤冬十月四州大水雨雹詔以宿麥不下宿舊也麥必經年而熟故稱宿賑賜貧人十二月甲子清河王薨使司空持節弔祭車騎將軍鄧騭護喪事乙酉罷魚龍曼延百戲漢官典職曰作九賔樂舍利之獸從西方來戲於庭入前殿激水化成比目魚𠻳水作霧化成黃龍長八丈出水遨戯於庭炫燿日光曼延者獸名也張衡西京賦所云巨獸百尋是為曼延音以戰反永初元年春正月癸酉朔大赦天下蜀郡徼外羌内屬東觀記曰徼外羌龍橋等六種慕義降附戊寅分犍為南郡為屬國都尉稟司隸兖豫徐冀幷州貧民司隸領河南河内河東𢎞農都於洛陽魏末因為司州二月丙午以廣成游獵地廣成苑名在汝州西及被災郡國公田假與貧民丁夘分清河國封帝弟常保為廣川王廣川縣屬信都國故城在今冀州棗彊縣東北庚午司徒梁鮪薨三月癸酉日有食之詔公卿内外衆官郡國守相舉賢良方正有道術之士明政術逹古今能直言極諫者各一人己夘永昌徼外僬僥種夷貢獻内屬甲申葬清河孝王贈龍旗虎賁夏五月甲戌長樂衛尉魯恭為司徒前書曰衞尉秦官掌宮門衞屯兵也長樂建章甘泉宫皆随所掌以為官名秩中二千石也丁丑詔封北海王睦孫夀光侯普為北海王九真徼外夜郎蠻夷舉土内屬九真郡名今愛州縣六月戊申爵皇太后母隂氏為新野君丁巳河東地陥壬戌罷西域都護先零種羌叛斷隴道大為寇掠遣車騎將軍鄧騭征西校尉任尚討之丁邜赦除諸羌相連結謀叛逆者罪秋九月庚午詔三公明申舊令禁奢侈無作浮巧之物殫財厚葬是日太尉徐防免以災異屢見也辛未司空尹勤免以水雨漂流也癸酉調揚州五郡租米五郡謂九江丹陽廬江吳郡豫章也揚州領六郡㑹稽最逺蓋不調也贍給東郡濟陰陳留梁國陳國下邳山陽丁丑詔曰自今長吏被考竟未報考謂考問其狀也報謂斷決也自非父母䘮無故輙去職者劇縣十歲平縣五歲以上乃得次用壬午詔太僕少府減黄門鼓吹以補羽林士漢官儀曰黄門鼓吹百四十五人羽林左監主羽林八百人右監主九百人廐馬非乗輿常所御者皆減半食乗輿天子所乗車輿也不敢斥言尊者故稱乘輿見蔡邕獨斷諸所造作非供宗廟園陵之用皆且止丙戌詔死罪以下及亡命贖各有差庚寅太傅張禹為太尉太常周章為司空漢官儀曰章字次叔荆州隨縣人也冬十月倭國遣使奉獻倭國去樂浪萬二千里男子黥面文身以其文左右大小别尊卑之差見本傳辛酉新城山泉水大出東觀記曰突壞人田水深三丈十一月丁亥司空周章密謀廢立策免自殺戊子勑司隸校尉冀并二州刺史民訛言相驚棄損舊居老弱相攜窮困道路其各勑所部長吏躬親曉諭若欲歸本郡在所為封長檄不欲勿強封謂印封之也長檄猶今長牒也欲歸者皆給以長牒為騐強音其兩反十二月乙夘潁川太守張敏為司空是歲郡國十八地震四十一雨水或山水暴至二十八大風雨雹二年春正月稟河南下邳東萊河内貧民古今注曰時州郡大饑米石二千人相食老弱相棄道路車騎大將軍鄧騭為種羌所敗於冀西續漢書曰種羌九千餘户在隴西臨洮谷冀縣屬天水郡也劉攽曰正文案官無車騎大將軍者明大字衍騭後乃為大將軍耳二月乙丑遣光祿大夫樊準呂倉分行冀兖二州稟貸流民夏四月甲寅漢陽城中火燒殺三千五百七十人五月旱丙寅皇太后幸洛陽寺及若盧獄錄囚徒賜河南尹廷尉卿及官屬以下各有差即日降雨六月京師及郡國四十大水大風雨雹東觀記曰雹大如芋魁雞子風拔樹發屋秋七月戊辰詔曰昔在帝王承天理民莫不據璇璣玉衡以齊七政孔安國尚書注曰璇羙玉也以璇為璣以玉為衡二者正天文之器也七政日月五星各異其政制即今之渾儀朕以不徳遵奉大業而陰陽差越變異並見萬民饑流羌貊叛戾夙夜克己憂心京京詩小雅曰憂心京京爾雅曰京京憂也間令公卿郡國舉賢良方正遠求博選開不諱之路冀得至謀以鑒不逮而所對皆循尚浮言無卓爾異聞卓爾髙遠之貌也論語曰如有所立卓爾其百僚及郡國吏人劉攽曰案此不成文理當有一令字有道術明習災異陰陽之度璇璣之數者各使指變以聞二千石長吏明以詔書博衍幽隱衍猶引也朕將親覽待以不次冀獲嘉謀以承天誡閏月辛丑廣川王常保薨無子國除癸未蜀郡徼外羌舉土内屬東觀記曰徼外羌薄申等八種舉衆降九月庚子詔王主官屬墨綬下至郎謁者續漢書曰王國有中大夫秩比六百石謁者比四百石郎中二百石劉攽曰正文二漢諸侯王未嘗有主稱蓋是國字前書多言王國此注中亦有王國文主字作國無疑也或謂主指公主案公主但有家令無郎謁者又此詔文但言國相移名其非公主明矣或者傳寫見後有王主之文遂誤於此其經明任博士居鄉里有廉清孝順之稱才任理人者國相歲移名與計偕上尚書公府通調令得外補移書也調選也冬十月庚寅稟濟陰山陽𤣥莬貧民征西校尉任尚與先零羌戰于平襄尚軍敗績平襄縣屬天水郡故襄戎邑也十一月辛酉拜鄧騭為大將軍徵還京師留任尚屯隴右先零羌滇零稱天子於北地滇零羌名音丁田反遂寇三輔東犯趙魏南入益州殺漢中太守董炳十二月辛夘稟東郡鉅鹿廣陽安定定襄沛國貧民廣漢塞外參狼羌降分廣漢北部為屬國都尉是歲郡國十二地震三年春正月庚子皇帝加元服元服謂加冠也士冠禮曰令月吉辰加爾元服鄭𤣥云元首也大赦天下賜王主貴人公卿以下金帛各有差男子為父後及三老孝悌力田爵人二級流民欲占者人一級遣騎都尉任仁討先零羌不利羌遂破沒臨洮縣名屬隴西郡高句驪遣使貢獻三月京師大饑民相食壬辰公卿詣闕謝詔曰朕以幼沖奉承鴻業不能宣流風化而感逆陰陽至令百姓饑荒更相噉食永懐悼歎若墜淵水咎在朕躬非羣司之責而過自貶引重朝廷之不德貶引謂貶損引過也重音直用反其務思變復以助不逮癸巳詔以鴻池假與貧民續漢書曰鴻池在洛陽東二十里假借也令得漁采其中壬寅司徒魯恭免夏四月丙寅大鴻臚九江夏勤為司徒勤字伯宗夀春人也三公以國用不足奏令吏人入錢榖得為闗内侯虎賁羽林郎五大夫官府吏緹騎營士各有差續漢志曰執金吾緹騎二百人緹赤黄色營士謂五校營士也漢官儀曰屯騎越騎歩兵射聲各領士七百人長水領士千三百六十七人也己巳詔上林廣城苑可墾闢者賦與貧民甲申清河王虎威薨五月丙申封樂安王寵子延平為清河王丁酉沛王正薨癸丑京師大風六月烏桓寇代郡上谷涿郡秋七月海賊張伯路等寇略緣海九郡遣侍御史龐雄督州郡兵討破之庚子詔長吏案行在所皆令種宿麥蔬食務盡地力其貧者給種餉九月鴈門烏桓及鮮卑叛敗五原郡兵於髙渠谷東觀記曰戰九原髙梁谷渠梁相類必有誤也冬十月南單于叛圍中郎將耿种於羙稷十一月遣行車騎將軍何熈討之劉攽曰案文少一事字十二月辛酉郡國九地震乙亥有星孛于天苑天苑星名是歲京師及郡國四十一雨水雹續漢書曰雹大如鴈子也并涼二州大饑人相食四年春正月元日㑹徹樂不陳充庭車每大朝㑹必陳乘輿法物車輦於庭故曰充庭車也以年饑故不陳辛夘詔以三輔比遭寇亂人庶流冗除三年逋租過更口算芻槀前書音義曰天下人皆戌邉三日不可人人自行行者自戌三日不可往復還因便住一歲諸不行者出錢三百入官官以給戌者言過其本更之日故曰過更又日人年十五至五十六出賦錢人百二十為一算也稟上郡貧民各有差海賊張伯路復與勃海平原劇賊劉文河周文光等攻厭次殺縣令遣御史中丞王宗督靑州刺史法雄討破之度遼將軍梁慬遼東太守耿夔討破南單于於屬國故城丙午詔減百官及州郡縣奉各有差二月丁巳稟九江貧民南匈奴寇常山乙丑初置長安雍二營都尉官漢官儀曰京兆虎牙扶風都尉以涼州近羌數犯三輔将兵衛護園陵扶風都尉居雍縣故俗人稱雍營焉西羌傳云虎牙都尉居長安乙亥詔自建初以來諸祅言它過坐徙邊者各歸本郡其沒入官為奴婢者免為庶人詔謁者劉珍及五經博士校定東觀五經諸子傳記百家蓺術整齊脱誤是正文字洛陽宫殿名曰南宫有東觀前書曰凡諸子百八十九家言百家舉全數也三月南單于降先零羌寇襃中縣名屬漢中郡今梁州襃城縣漢中太守鄭勤戰歿徙金城郡都襄武襄武縣名屬隴西郡今渭州郡戊子杜陵園火癸巳郡國九地震夏四月六州蝗東觀記曰司𨽻豫兗徐青冀六州丁丑大赦天下秋七月乙酉三郡大水己夘騎都尉任仁下獄死九月甲申益州郡地震冬十月甲戌新野君陰氏薨東觀記曰新野君薨贈以𤣥玉赤紱賻錢三千萬布三萬匹使司空持節護喪事大將軍鄧騭罷五年春正月庚辰朔日有食之丙戌郡國十二地震己丑太尉張禹免甲申光禄勲李脩為太尉漢官儀曰脩字伯游豫州襄城人也二月丁夘詔省減郡國貢獻太官口食先零羌寇河東遂至河内三月詔隴西徙襄武安定徙羙陽安定郡今涇州也羙陽縣故城在今武功縣北北地徙池陽北地郡今寜州也池陽縣故城在今涇陽縣北也上郡徙衙上郡今綏州也衙縣故城在同州白水縣東北左傳曰秦晋戰于彭衙即此也夫餘夷犯塞殺傷吏人閏月丁酉赦涼州河西四郡戊戌詔曰朕以不徳奉郊廟承大業不能興和降善為人祈福災異蜂起寇賊縱横夷狄猾夏猾亂也夏華夏也戎事不息百姓匱乏疲於徵發重以蝗蟲滋生害及成麥秋稼方收甚可悼也朕以不明統理失中亦未獲忠良以毗闕政傳曰顚而不扶危而不持則將焉用彼相矣公卿大夫將何以匡救濟斯艱戹承天誡哉蓋為政之本莫若得人襃賢顯善聖制所先濟濟多士文王以寜詩大雅之詞也思得忠良正直之臣以輔不逮其令三公特進侯中二千石二千石郡守諸侯相舉賢良方正有道術逹於政化能直言極諫之士各一人及至孝與衆卓異者幷遣詣公車朕將親覽焉六月甲辰樂成王廵薨秋七月己巳詔三公特進九卿校尉九卿奉常光禄衞尉太僕鴻臚廷尉少府宗正司農校尉謂城門屯騎越騎歩兵胡騎長水等劉攽曰注胡騎字誤當作射聲上三年注中甚明説又在後舉列將子孫明曉戰陣任將帥者九月漢陽人杜琦王信叛東觀記曰琦自稱安漢將軍與先零諸種羌攻䧟上邽城十二月漢陽太守趙博遣客刺殺杜琦東觀記曰漢陽故吏杜習手刺殺之是歲九州蝗郡國八雨水六年春正月庚申詔越嶲置長利髙望始昌三苑又令益州郡置萬歲苑犍為置漢平苑犍為郡名前書音義曰故夜郎國也故城在今眉州隆山縣西北也三月十州蝗夏四月乙丑司空張敏罷己邜大常劉凱為司空五月旱丙寅詔令中二千石下至黄綬一切復秩還贖賜爵各有差戊辰皇太后幸雒陽寺錄囚徒理寃獄六月壬辰豫章員谿原山崩員谿闕也辛巳大赦天下遣侍御史唐喜討漢陽賊王信破斬之續漢書曰傳信首詣洛陽梟榖城門外冬十一月辛丑護烏桓校尉吳祉下獄死是歲先零羌滇零死子零昌復襲偽號七年春正月庚戌皇太后率大臣命婦謁宗廟喪服傳曰命夫者其男子之為大夫也命婦者其大夫之妻也臣賢案東觀續漢袁山松謝沈書古今注皆云六年正月甲寅謁宗廟此云七年庚戌疑紀誤也二月丙午郡國十八地震夏四月乙未平原王勝薨丙申晦日有食之五月庚子京師大雩左傳曰龍見而雩杜預注云謂建巳之月龍星角亢見東方雩逺也逺為百穀求膏雨周禮司巫職曰若國大旱則帥巫而舞雩鄭𤣥注云雩吁也嗟而求雨秋護羌校尉侯霸騎都尉馬賢破先零羌八月丙寅京師大風蝗蟲飛過洛陽詔賜民爵郡國被蝗傷稼十五以上勿收今年田租不滿者以實除之九月調零陵桂陽丹陽豫章㑹稽租米零陵郡名今永州縣丹陽郡名今潤州江寜縣餘竝見上賑給南陽廣陵下邳彭城山陽廬江九江飢民又調濵水縣榖輸敖倉詩曰摶狩于敖即此也秦於此築太倉亦曰敖庾在今鄭州滎陽縣西北東觀記曰濵水縣彭城廣陽廬江九江榖九十萬斛送敖倉元初元年春正月甲子改元元初賜民爵人二級孝悌力田人三級爵過公乘得移與子若同産同産子民脱無民數及流民欲占者人一級鰥寡孤獨篤癃貧不能自存者榖人三斛貞婦帛人一匹二月己邜日南地坼東觀記曰坼長百八十二里廣五十六里三月癸酉日有食之夏四月丁酉大赦天下京師及郡國五旱蝗詔三公特進列侯中二千石二千石郡守舉敦厚質直者各一人五月先零羌寇雍城六月丁巳河東地陷秋七月蜀郡夷寇蠶陵殺縣令蠶陵縣屬蜀郡故城在今翼州翼水縣西有蠶陵山因以為名焉九月乙丑大尉李脩罷先陵羌寇武都漢中絶隴道辛未大司農山陽司馬苞為太尉謝承書曰苞字仲成東緡人也冬十月戊子朔日有食之先零羌敗涼州刺史皮陽於狄道乙邜詔除三輔三歲田租更賦口算解見光武紀也十一月是歲郡國十五地震二年春正月詔稟三輔及幷涼六郡流冗貧人蜀郡青衣道夷奉獻内屬青衣道縣名在大江青衣二水之㑹今嘉州龍遊縣也東觀記曰青衣蠻夷唐律等歸義脩理西門豹所分漳水為支渠以漑民田史記曰西門豹為鄴令發人鑿十二渠引水灌田所鑿之渠在今相州鄴縣西也二月戊戌遣中謁者收𦵏京師客死無家屬及棺槨朽敗者皆為設祭其有家屬尤貧無以𦵏者賜錢人五千辛酉詔三輔河内河東上黨趙國太原各修理舊渠通利水道以漑公私田疇前書音義曰羙田曰疇三月癸亥京師大風先零羌寇益州遣中郎將尹就討之夏四月丙午立貴人閻氏為皇后五月京師旱河南及郡國十九蝗甲戌詔曰朝廷不明庶事失中災異不息憂心惶懼被蝗以來七年于兹而州郡隱匿裁言頃畝裁與纔同古字通今羣飛蔽天為害廣逺所言所見寕相副邪三司之職内外是監旣不奏聞又無舉正天災至重欺罔辠大今方盛夏且復假貸以觀厥後假貸猶寛容也盛夏不可卽加刑罰故且寛容其務消救災眚安輯黎元六月丙戌太尉司馬苞薨謝承書曰苞為太尉常食麤飯著布衣妻子不歴官舍㑹司徒楊震為樊豊等所譛連及苞苞乞骸骨未見聴以疾薨也洛陽新城地裂秋七月辛巳太僕太山馬英為太尉英字文思兗州蓋縣人也八月遼東鮮卑圍無慮縣屬遼東郡慮音閭有醫無閭山因以為名焉九月又攻夫犂營殺縣令夫犂縣名屬遼東屬國壬午晦日有食之冬十月遣中郎將任尚屯三輔詔郡國中都官繫囚減死一等勿笞詣馮翊扶風屯妻子自隨占著所在女子勿輸不輸作也亡命死辠以下贖各有差其吏人聚為盗賊有悔過者除其罪乙未右扶風仲光安定太守杜恢京兆虎牙都尉耿溥與先零羌戰於丁奚城東觀記曰至北地靈州丁奚城也光等大敗並沒左馮翊司馬鈞下獄自殺東觀記曰安定太守杜恢與鈞等并威擊羌恢乘勝深入為虜所害鈞擁兵不救收鈞下獄也十一月庚申郡國十地震十二月武陵澧中蠻叛州郡擊破之東觀記曰蠻田山髙少等攻城殺長吏州郡募五里蠻夷六亭兵追擊山等皆降賜五里六亭渠率金帛各有差己酉司徒夏勤罷庚戌司空劉愷為司徒光禄勲袁敞為司空三年春正月甲戌修理太原舊溝渠漑灌官私田酈元水經注曰晉智伯遏晉水以灌晉陽後人踵其遺跡蓄以為沼分為二𣲖北瀆即智氏故渠也其瀆乘高東北注入晉陽城以漑灌東南出城注於汾水今所修溝渠即謂此東平陸上言木連理東平陸縣名古厥國也屬東平國今兗州平陸縣也序例曰凡瑞應自和帝以上政事多羙近於有實故書見於某處自安帝以下王道衰缺容或虛飾故書某處上言也蒼梧鬱林合浦蠻夷反叛蒼梧郡今梧州縣也合浦郡今廉州縣也二月遣侍御史任逴督州郡兵討之逴音丁角反郡國十地震三月辛亥日有食之丙辰赦蒼梧鬱林合浦南海吏人為賊所迫者夏四月京師旱五月武陵蠻復叛州郡討破之癸酉度遼將軍鄧遵率南匈奴擊先零羌於靈州破之靈州縣名屬北地郡故城在今慶州馬領縣西北越嶲徼外夷舉種内屬六月中郎將任尚遣兵擊破先零羌於丁奚城秋七月武陵蠻復叛州郡討平之緱氏地坼九月辛巳趙王宏薨冬十一月蒼梧鬱林合浦蠻夷降丙戌初聽大臣二千石刺史行三年喪文帝遺詔以日易月於後大臣遂以為常至此復遵古制也癸夘郡國九地震十二月丁巳任尚遣兵擊破先零羌於北地四年春二月乙巳朔日有食之乙夘大赦天下壬戌武庫災夏四月戊申司空袁敞薨己巳鮮卑寇遼西遼西郡兵與烏桓擊破之遼西郡故城在今平州東陽樂城是五月丁丑太常李郃為司空六月戊辰三郡雨雹秋七月辛丑陳王鈞薨京師及郡國十雨水詔曰今年秋稼茂好垂可收穫而連雨未霽霽雨止也懼必淹傷夕惕惟憂思念厥咎夫霖雨者人怨之所致左傳曰凡雨三日以上為霖京房别對災異曰人勞怨苦雨水絶道其武吏以威暴下文吏妄行苛刻鄉吏因公生姦為百姓所患苦者有司顯明其罰又月令仲秋養衰老授几杖行糜粥鄭𤣥注云助老氣也行猶賜也方今案比之時東觀記曰方今八月案比之時謂案騐户口次比之也郡縣多不奉行雖有糜粥糠粃相半長吏怠事莫有躬親甚違詔書飬老之意其務崇仁恕賑護寡獨稱朕意焉九月護羌校尉任尚使客刺殺叛羌零昌冬十一月己邜彭城王恭薨十二月越嶲夷寇遂乆殺縣令遂乆縣屬越嶲郡甲子任尚及騎都尉馬賢與先零羌戰于富平上河大破之富平縣屬北地郡故城在今靈州回樂縣西南酈元水經注曰河水於此有上河之名也䖍人羌率衆降䖍人羌號也東觀記曰䖍人種羌大豪恬狼等詣度遼將軍降隴右平是歲郡國十三地震五年春正月越嶲夷叛二月壬戌中山王憲薨三月京師及郡國五旱詔稟遭旱貧人夏六月高句驪與穢貊寇𤣥菟郡名在遼東秋七月越嶲蠻夷及旄牛豪叛殺長吏旄牛縣屬蜀郡華陽國志曰在卭崍山表也丙子詔曰舊令制度各有科品漢令今亡欲令百姓務崇節約遭永初之際人離荒戹朝廷躬自菲薄去絶奢飾食不兼味衣無二綵比年雖獲豊穰尚乏儲積而小人無慮不圖乆長嫁娶送終紛華靡麗至有走卒奴婢被綺縠著珠璣綺文繒縠紗也璣珠不圓者也京師尚若斯何以示四逺設張法禁懇惻分明而有司惰任訖不奉行秋節旣立鷙鳥將用鷙鳥鷹鸇之類也廣雅曰鷙執也以其能服執衆鳥月令孟秋鷹乃祭鳥始用行戮言有司怠惰不遵法令將欲紏其罪順秋行誅同鷹鸇之鷙擊也且復重申以觀後效八月丙申朔日有食之鮮卑寇代郡殺長吏冬十月鮮卑寇上谷十二月丁巳中郎將任尚有辠棄市是歲郡國十四地震六年春二月乙巳京師及郡國四十二地震或坼裂水泉涌出壬子詔三府選掾屬高第能惠利牧養者各五人光禄勳與中郎將選孝廉郎寛博有謀清白行高者五十人出補令長丞尉乙邜詔曰夫政先京師後諸夏月令仲春養幼小存諸孤季春賜貧窮賑乏絶省婦使表貞女所以順陽氣崇生長也鄭𤣥云婦使謂組紃之事其賜民尤貧困孤弱單獨榖人三斛貞婦有節義十斛甄表門閭旌顯厥行節謂志操義謂推讓甄明旌章也里門謂之閭旌表者若今樹闕而顯之三月庚辰始立六宗祀於洛城西北續漢志曰元初六年以尚書歐陽家説謂六宗者在天地四方之中為上下四方之宗以元始中故事謂六宗易六子之氣日月雷公風伯山澤者非也乃更六宗祠於戌亥之地禮比大社也夏四月㑹稽大疫遣光祿大夫將太醫循行疾病賜棺木漢官儀大醫令一人秩六百石除田租口賦沛國勃海大風雨雹五月京師旱六月丁丑樂成王賔薨丙戌平原王得薨秋七月鮮卑寇馬城搜神記曰昔秦人築城於武周塞以備胡將成而崩者數矣有馬馳走周旋反覆父老異之因依以築城城乃不崩遂以名焉其故城今朔州也度遼將軍鄧遵率南單于擊破之九月癸巳陳王竦薨十二月戊午朔日有食之旣郡國八地震是歲永昌益州蜀郡夷叛與越嶲夷殺長吏燔城邑益州刺史張喬討破降之永寜元年春正月甲辰任城王安薨三月丁酉濟北王壽薨車師後王叛殺部司馬沈氐羌寇張掖沈氐羌號也續漢志曰羌在上郡西河者號沈氐也夏四月丙寅立皇子保為皇太子改元永寜大赦天下賜王主三公列侯下至郎吏從官金帛又賜民爵及布粟各有差已已詔封陳王羡子崇為陳王濟北王子萇為樂成王河間王子翼為平原王壬午琅邪王壽薨六月沈氐種羌叛寇張掖護羌校尉馬賢討沈氐羌破之秋七月乙酉朔日有食之冬十月己巳司空李郃免癸酉衞尉廬江陳襃為司空襃字伯仁舒縣人也自三月至是月京師及郡國三十三大風雨水十二月永昌徼外撣國遣使貢獻撣音擅戊辰司徒劉愷罷遼西鮮卑降癸酉太常楊震為司徒是歲郡國二十三地震夫餘王遣子詣闕貢獻燒當羌叛建光元年春正月幽州刺史馮煥率二郡太守討髙句驪穢貊不尅二月癸亥大赦天下賜諸園貴人謂宫人無子守園陵者也王主公卿以下錢布各有差以公卿校尉尚書子弟一人為郎舍人三月癸巳皇太后鄧氏崩丙午葬和熹皇后丁未安樂王寵薨戊申追尊皇考清河孝王曰孝德皇皇妣左氏曰孝德皇后祖妣宋貴人曰敬隱皇后夏四月穢貊復與鮮卑寇遼東遼東太守蔡諷追擊戰歿丙辰以廣川幷清河國丁巳尊孝徳皇元妃耿氏為甘陵大貴人甘陵孝徳皇后之陵因以為縣今貝州清河縣東也甲子樂成王萇有罪廢為臨湖侯續漢書曰坐輕慢不孝故貶臨湖縣名屬廬江郡也已已令公卿特進侯中二千石二千石郡國守相舉有道之士各一人賜鰥寡孤獨貧不能自存者榖人三斛甲戌遼東屬國都尉龎奮承偽璽書殺𤣥莬太守姚光五月庚申特進鄧騭及度遼將軍鄧遵竝以譖自殺乳母王聖與中黄門李閏等誣告尚書鄧訪等謀廢立宗族皆免官騭與遵皆自殺丙申貶平原王翼為都鄉侯秋七月己夘改元建光大赦天下壬寅太尉馬英薨八月護羌校尉馬賢討燒當羌於金城不利甲子前司徒劉愷為太尉鮮卑寇居庸闗九月雲中太守成嚴擊之戰歿鮮卑圍烏桓校尉於馬城度遼將軍耿夔救之戊子幸衞尉馮石府續漢書曰賜賞寳劒玉玦雜繒布等劉攽曰注按文多一賞字贊語注可騐是秋京師及郡國二十九雨水冬十一月己丑郡國三十五地震或坼裂詔三公已下各上封事陳得失遣光祿大夫案行賜死者錢人二千除今年田租其被災甚者勿收口賦鮮卑寇𤣥菟庚子復斷大臣二千石以上服三年喪癸夘詔三公特進侯卿校尉舉武猛堪將帥者各五人丙午詔京師及郡國被水雨傷稼者隨頃畆減田租甲子初置漁陽營兵伏侯古今注曰置營兵千人也冬十二月高句驪馬韓穢貊圍𤣥菟城夫餘王遣子與州郡幷力討破之延光元年春二月夫餘王遣子將兵救𤣥菟夫餘王子尉仇台也擊高句驪馬韓穢貊破之遂遣使貢獻三月丙午改元延光大赦天下還徙者復户邑屬籍賜民爵及三老孝悌力田人二級加賜鰥寡孤獨篤癃貧不能自存者粟人三斛貞婦帛人二匹夏四月癸未京師郡國二十一雨雹癸巳司空陳襃免五月庚戌宗正彭城劉授為司空漢官儀曰宗正卿秩中二千石授字孟春徐州武原人也己巳改樂成國為安平封河間王開子得為安平王六月郡國蝗秋七月癸夘京師及郡國十三地震高句驪降䖍人羌叛攻穀羅城榖羅屬西河郡度遼將軍耿夔討破之八月戊子陽陵園寢火景帝陵也辛夘九眞言黄龍見無功無功縣屬九真郡己亥詔三公中二千石舉刺史二千石令長相視事一歲已上至十歲清白愛利能勑身率下防姦理煩有益於人者無拘官簿清白謂貞正也愛利謂愛人而利之也無拘官簿謂受超遷之不拘常牒也劉攽曰注案文受當作將刺史舉所部郡國太守相舉墨綬隠親悉心勿取浮華墨綬謂令長之屬也隱親猶親自隱也悉盡也言令三公以下各舉所知皆隱審盡心勿取浮華不實者九月甲戌郡國二十七地震冬十月鮮卑寇鴈門定襄十一月鮮卑寇太原燒當羌豪降十二月九真徼外蠻夷貢獻内屬是歲京師及郡國二十七雨水大風殺人詔賜壓溺死者年七歲以上錢人二千其壞敗廬舍失亡穀食粟人三斛又田被淹傷者一切勿收田租若一家皆被災害而弱小存者郡縣為收斂之䖍人羌反攻穀羅城度遼將軍耿夔討破之二年春正月旄牛夷叛寇靈闗殺縣令靈闗道屬越嶲郡益州刺史蜀郡西部都尉討之詔選三署郎三署解見和帝紀及吏人能通古文尚書毛詩穀梁春秋各一人丙辰河東潁川大風夏六月壬午郡國十一大風九真言嘉禾生東觀記曰禾百五十六本七百六十八穗丙申北海王普薨秋七月丹陽山崩八月庚午初令三署郎通達經術任牧民者視事三歲以上皆得察舉九月郡國五雨水冬十月辛未太尉劉愷罷甲戌司徒楊震為太尉光禄勳東萊劉熹為司徒熹字季明青州長廣人也十一月甲辰校獵上林苑鮮卑敗南匈奴於曼栢是歲分蜀郡西部為屬國都尉京師及郡國三地震三年春二月丙子東廵狩丁丑告陳留太守祠南頓君光武皇帝于濟陽復濟陽今年田租芻槀庚寅遣使者祠唐堯於成陽古成伯國也故城在今濮州雷澤縣北述征記云成陽東南有堯冢戊子濟南上言鳳皇集臺縣丞霍收舍樹上臺縣屬濟南郡故城在今齊州平陵縣北賜臺長帛五十匹丞三十匹尉半之吏卒人三匹鳳皇所過亭郡無出今年田租賜男子爵人二級辛夘幸太山柴告岱宗太山王者告岱之處為五嶽之宗故曰岱宗燔柴以告天齊王無忌北海王普樂安王延來朝壬辰宗祀五帝于汶上明堂癸巳告祀二祖六宗二祖髙祖光武也六宗謂孝文曰太宗孝武曰代宗孝宣曰中宗孝元曰髙宗孝明曰顯宗孝章曰肅宗勞賜郡縣作樂三月甲午陳王崇薨戊戍祀孔子及七十二弟子於闕里自魯相令丞尉及孔氏親屬婦女諸生悉㑹賜襃成侯以下帛各有差還幸東平至東郡歴魏郡河内壬戌車駕還京師幸太學是日太尉楊震免夏四月乙丑車駕入宮假于祖禰假音格格至也壬戌沛國言甘露降豐縣戊辰光禄勳馮石為太尉五月南匈奴左日逐王叛使匈奴中郎將馬翼討破之日南徼外蠻夷内屬六月鮮卑寇𤣥菟庚午閬中山崩閬中縣屬巴郡臨閬中水因以為名今隆州縣也辛未扶風言白鹿見雍辛巳遣侍御史分行青冀二州災害督錄盗賊秋七月丁酉初復右校令左校丞官續漢志曰將作大匠屬官有左右校皆有令丞中興未置今始復日南徼外蠻豪帥詣闕貢獻馮翊言甘露降頻陽衙頻陽縣故城在今雍州羙原縣西南衙見上潁川上言木連理白鹿麒麟見陽翟鮮卑寇髙栁梁王堅薨明帝孫節王暢之子也八月辛巳大鴻臚耿寶為大將軍戊子潁川上言麒麟一白虎二見陽翟九月丁酉廢皇太子保為濟陰王常侍江京等譖之也乙巳詔郡國中都官死辠繫囚減罪一等詔敦煌隴西及度遼營漢官儀曰度遼將軍屯五原曼栢縣也劉攽曰正文詔敦煌案文詔當作詣其右趾以下及亡命者贖各有差辛亥濟南上言黄龍見歴城歴城縣屬濟南國今齊州縣也庚申晦日有食之冬十月行幸長安壬午新豐上言鳳皇集西界亭今新豐縣西南有鳳皇原俗傳云即此時鳳皇所集之處也丁亥㑹三輔守令掾史於長安作樂閏月乙未祠髙廟遂有事十一陵歴觀上林昆明池遣使者祠太上皇于萬年以中牢祠蕭何曹參霍光十一月乙丑至自長安十二月乙未琅邪言黄龍見諸縣諸縣名故城在今密州諸城縣西南是歲京師及諸郡國二十三地震三十六雨水疾風雨雹劉攽曰案文衍一諸字史文未嘗有如此者四年春正月壬午東郡言黄龍二麒麟一見濮陽縣名屬東郡即古昆吾國帝顓頊之墟今濮州縣二月乙亥下邳王衍薨甲辰南廵狩三月戊午朔日有食之庚申幸宛帝不豫辛酉令大將軍耿寶行太尉事祠章陵園廟告長沙零陵太守祠定王節侯鬱林府君乙丑自宛還丁夘幸葉帝崩于乘輿年三十二祕不敢宣所在上食問起居如故庚午還宮辛未夕乃發喪尊皇后為皇太后太后臨朝以后兄太鴻臚閻顯為車騎將軍定策禁中立章帝孫濟北惠王壽子北鄉侯懿東觀記及續漢書竝曰北鄉侯犢今作懿蓋二名甲戌濟南王香薨光武曽孫簡王錯之子也乙酉北鄉侯即皇帝位夏四月丁酉太尉馮石為太傅石字次初荆州湖陽人也馮魴之孫司徒劉熹為太尉參錄尚書事前司空李郃為司徒辛夘大將軍耿寶中常侍樊豐侍中謝惲周廣乳母野王君王聖坐相阿黨豐惲廣下獄死寶自殺聖徙鴈門己酉𦵏孝安皇帝于恭陵在今洛陽東北二十七里伏侯古今注曰陵山周二百六十丈髙十五丈廟曰恭宗六月乙巳大赦天下詔先帝廵狩所幸皆半入今年田租秋七月西域長史班勇西域都護之長史也擊車師後王斬之丙午東海王肅薨冬十月丙午越嶲山崩辛亥少帝薨是冬京師大疫論曰孝安雖稱尊享御而權歸鄧氏至乃損徹膳服克念政道然令自房帷威不逮逺始失根統歸成陵敝遂復計金授官永初元年令吏人入錢穀得至闗内侯也移民逃寇羌既轉盛詔隴西徙襄武安定徙羙陽北地徙池陽推咎台衡以答天眚台謂三台三公象也衡平也言天下所取平伊尹為阿衡即其義也旣云哲婦亦惟家之索矣哲智也索盡也謂鄧后專制國柄也詩曰哲夫成城哲婦傾城書曰牝雞之晨惟家之索贊曰安德不升秕我王度秕榖不成也諭政敎之穢左傳祈招之詩曰思我王度降奪儲嫡開萌邪蠧儲嫡謂太子也邪蠧謂江京等也馮石承歡楊公逢怒續漢志曰上賜衞尉馮石寶劒玉玦雜繒布等故曰承歡也楊公楊震逢怒謂樊豐等譖震云有恚恨心帝免之劉攽曰注續漢志案前又作漢書今此作志志不記如此事作書是彼日而微遂祲天路日君道也微不明也祲陰陽相侵之氣也詩曰彼月而微此日而微言君道闇亂政化陵遲漢祚衰微自此而始故言遂祲天路也紀書殤帝𦵏康陵臣攽案前書平帝已名康陵不當重複章懷注云在慎陵瑩中庚地庚與康相似但少許不同然檢續漢志亦作康陵又質帝年叙康陵在恭陵上都是康字不知此字自章懷已前誤之耶或者後人傳寫一處誤之遂都改令同也然章懷注語則似作庚無疑後漢書卷五後漢書卷五考證安帝紀調揚州五郡租米注揚州領六郡㑹稽最逺蓋不調也日知錄曰順帝紀永建四年分㑹稽為吳郡安帝時未有吳郡止五郡無可疑者注非其百寮及郡國吏人注劉攽曰按此不成文理當有一令字何焯曰按下云各使指變以聞則不當有令字也皇太后率大臣命婦謁宗廟注東觀續漢袁山松謝沈書臣承蒼按東觀下脱一記字續漢下脱一書字大尉司馬苞薨注謝承書曰司徒楊震為樊豐等所譖連及苞苞乞骸骨未見聽以疾薨也何焯曰按永寜元年十二月劉愷罷楊震始為司徒苞之薨在其前六年甚矣謝書之失實也太常李郃為司徒監本郃訛邵今改正北海王普來朝何焯曰按北海王普於上年薨此乃恭王嗣位來朝普當作翼後漢書卷五考證
