body:
  text: 後漢書卷四十六宋宣城太守范煜撰唐章懐太子賢注鄧冦列傳第六鄧禹傳子訓孫隲鄧禹字仲華南陽新野人也年十三能誦詩受業長安時光武亦㳺學京師禹年雖幼而見光武知非常人遂相親附數年歸家及漢兵起更始立豪傑多薦舉禹禹不肯従及聞光武安集河北即杖䇿北渡追及扵鄴光武見之甚歡謂曰我得専封拜生逺来寜欲仕乎禹曰不願也光武曰即如是何欲為劉攽曰案文多一為字不然當云欲何為禹曰但願眀公威徳加扵四海禹得效其尺寸垂功名於竹帛耳光武笑因留宿閒語閒私也禹進說曰更始雖都關西今山東未安赤眉青犢之屬動以萬數三輔假號往往羣聚更始既未有所挫而不自聽斷諸將皆庸人屈起屈音求勿反志在財幣争用威力朝夕自快而已非有忠良眀智深慮逺圖欲尊主安民者也四方分崩離析形勢可見眀公雖建藩輔之功猶恐無所成立扵今之計莫如延攬英雄務恱民心立髙祖之業救萬民之命以公而慮天下不足定也光武大恱因令左右號禹曰鄧將軍常宿止於中與定計議及王郎起兵光武自薊至信都使禹發奔命得數千人令自將之别攻拔樂陽樂陽縣名屬常山郡從至廣阿東觀記曰上率禹等擊王郎横野將軍劉奉大破之上過禹營禹進炙魚上餐㗖勞勉吏士威嚴甚厲衆皆竊言劉公真天人也光武舎城樓上披輿地圖指示禹曰天下郡國如是今始乃得其一子前言以吾慮天下不足定何也禹曰方今海内殽亂人思眀君猶赤子之慕慈母古之興者在徳薄厚不以大小史記蘇秦説趙王曰堯無三夫之分舜無咫尺之地禹無百人之聚湯武之士不過三千立為天子誠得其道也光武悦時任使諸将多訪扵禹禹每有所舉者皆當其才光武以為知人使别將騎與蓋延等撃銅馬扵清陽延等先至戰不利還保城為賊所圍禹遂進與戰破之生獲其大將従光武追賊至滿陽連大克獲北州略定及赤眉西入關更始使定國上公王匡襄邑王成丹抗威將軍劉均及諸將分據河東𢎞農以拒之赤眉衆大集王匡等莫能當光武籌赤眉必破長安欲乗釁幷關中而方有事山東未知所寄以禹沉深有大度故授以西討之略乃拜為前將軍持節中分麾下精兵二萬人遣西入闗令自選偏裨以下可與俱者扵是以韓歆為軍師李文李春程慮為祭酒慮字或為憲字馮愔為積弩將軍樊崇為驍騎將軍宗歆為車騎將軍鄧尋為建威將軍耿訢為赤眉將軍左于為軍師將軍引而西建武元年正月禹自箕關將入河東箕關在今王屋縣東河東都尉守關不開禹攻十日破之獲輜重千餘乗進圍安邑數月未䏻下更始大將軍樊參將數萬人度大陽欲攻禹大陽縣屬河東郡前書音義曰大河之陽春秋秦伯伐晉自茅津濟杜預云河東大陽縣也禹遣諸將逆撃於解南大破之斬參首解縣屬河東郡故城在今蒲州桑泉縣東南也於是王匡成丹劉均等合軍十餘萬復共擊禹禹軍不利樊崇戰死㑹日暮戰罷軍師韓歆及諸將見兵勢已摧皆勸禹夜去禹不聼眀日癸亥匡等以六甲窮日不出禹因得更理兵勒衆眀旦匡悉軍出攻禹禹令軍中無得妄動既至營下因傳發諸將鼓而並進大破之匡等皆棄軍亡走禹率輕騎急追獲劉均及河東太守楊寳持節中郎將弭彊皆斬之收得節六印綬五百兵器不可勝數遂定河東承制拜李文為河東太守悉更置屬縣令長以鎮撫之是月光武即位於鄗使使者持節拜禹為大司徒䇿曰制詔前將軍鄧禹深執忠孝與朕謀謨帷幄決勝千里髙祖曰運籌帷幄之中决勝千里之外吾不如子房孔子曰自吾有回門人日親史記曰顔回年二十九髪白早死孔子哭之慟曰自吾有回門人益親也斬將破軍平定山西功効尤著百姓不親五品不訓汝作司徒敬敷五教五教在寛五品五常也父義母慈兄友弟恭子孝言五常之教務在寛也今遣奉車都尉授印綬封為鄼侯食邑萬户敬之哉鄼縣今屬南陽郡故城在襄州穀城縣東北禹時年二十四遂渡汾隂河入夏陽更始中郎將左輔都尉公乗歙左輔即左馮翊也三輔皆有都尉引其衆十萬與左馮翊兵共拒禹扵衙衙縣名屬左馮翊解見安紀禹復破走之而赤眉遂入長安是時三輔連覆敗赤眉所過殘賊百姓不知所歸聞禹乗勝獨剋而師行有紀紀綱紀也言有條貫而不殘暴皆望風相攜負以迎軍降者日以千數衆號百萬禹所止輒停車住節住或作拄以勞来之父老童穉垂髮戴白垂髮童㓜也戴白父老也滿其車下莫不感恱扵是名震關西帝嘉之數賜書褒美諸將豪傑皆勸禹徑攻長安禹曰不然今吾衆雖多能戰者少前無可仰之積仰猶恃也音魚向反後無轉饋之資赤眉新拔長安財富充實鋒鋭未可當也夫盗賊羣居無終日之計財穀雖多變故萬端寜䏻堅守者也上郡北地安定三郡土廣人稀饒穀多畜吾且休兵北道就糧養士以觀其弊乃可圖也於是引軍北至栒邑栒邑縣屬右扶風故城在今豳州三水縣東北栒音荀禹所到撃破赤眉别將諸營保郡邑皆開門歸附西河太守宗育遣子奉檄降禹遣詣京師京師謂洛陽也公羊傳曰天子所居曰京師帝以關中未定而禹久不進兵下勑曰司徒堯也亡賊桀也長安吏人遑遑無所依歸宜以時進討鎮慰西京繫百姓之心禹猶執前意乃分遣將軍别攻上郡諸縣更徴兵引穀歸至大要大要縣名屬北地郡遣馮愔宗歆守栒邑二人争權相攻愔遂殺歆因反擊禹禹遣使以聞帝劉攽曰案文遣使以聞即是白天子矣不須用帝字眀衍帝問使人愔所親愛為誰對曰護軍黄防帝度愔防不能久和勢必相忤因報禹曰縛馮愔者必黄防也乃遣尚書宗廣持節降之後月餘防果執愔將其衆歸罪更始諸將王匡胡殷成丹等皆詣廣降與共東歸至安邑道欲亡廣悉斬之愔至洛陽赦不誅二年春遣使者更封禹為梁侯食四縣時赤眉西走扶風禹乃南至長安軍昆眀池大饗士卒率諸將齋戒擇吉日修禮謁祠髙廟收十一帝神主遣使奉詣洛陽因循行園陵為置吏士奉守焉禹引兵與延岑戰於藍田不克復就穀雲陽漢中王劉嘉詣禹降嘉相李寳倨慢無禮禹斬之寳弟收寳部曲擊禹殺將軍耿訢自馮愔反後禹威稍損又乏食歸附者􅄐散而赤眉復還入長安禹與戰敗走至高陵軍士饑餓者皆食棗菜劉攽曰案文多一者字軍既饑餓例皆食棗菜若書者字則似有不餓者矣帝乃徴禹還勑曰赤眉無穀自當來東吾折箠笞之非諸將憂也無得復妄進兵禹慙於受任而功不遂數以饑卒徼戰輙不利三年春與車騎將軍鄧𢎞擊赤眉遂為所敗衆皆死散事在馮異傳獨與二十四騎還詣宜陽謝上大司徒梁侯印綬有詔歸侯印綬數月拜右將軍延岑自敗於東陽遂與秦豐合四年春復㓂順陽間遣禹護復漢將軍鄧曄輔漢將軍于匡擊破岑扵鄧追至武當復破之岑奔漢中餘黨悉降十三年天下平定諸功臣皆增户邑定封禹為髙密侯食髙密昌安夷安淳于四縣髙密國名今密州縣也昌安夷安並屬髙密國昌安故城在今密州安丘縣外城也夷安故城在今密州髙密縣外城也淳于縣名屬北海郡故城在今密州安丘縣東北也帝以禹功髙封弟寛為眀親侯其後左右將軍官罷續漢志曰前後左右将軍皆主征伐事訖皆罷也以特進奉朝請禹内文眀篤行淳備事母至孝天下既定常欲逺名勢有子十三人各使守一藝修整閨門教養子孫皆可以為後世法資用國邑不修産利帝益重之中元元年復行司徒事従東巡狩封岱宗顯宗即位以禹先帝元功拜為太傅進見東向甚見尊寵臣當北面尊如賔故令東向居嵗餘寝疾帝數自臨問以子男二人為郎永平元年年五十七薨諡曰元侯帝分禹封為三國長子震為髙密侯襲為昌安侯􅈿為夷安侯禹少子鴻好籌䇿永平中以為小侯引入與議邊事帝以為能拜將兵長史率五營士屯鴈門肅宗時為度遼將軍永元中與大將軍竇憲俱出擊匈奴有功徴行車騎將軍劉攽曰檢和帝紀有事字眀此少一事字也出塞追畔胡逄侯坐逗留下獄死髙密侯震卒子乾嗣乾尚顯宗女沁水公主永元十四年隂皇后巫蠱事發乾従兄奉以后舅被誅乾従坐國除元興元年和帝復封乾本國拜侍中乾卒子成嗣成卒子襃嗣襃尚安帝妺舞隂長公主桓帝時為少府襃卒長子某嗣少子昌襲母爵為舞隂侯拜黄門侍郎昌安侯襲嗣子藩亦尚顯宗女平臯長公主平臯縣名屬河内郡故城在今懐州武徳縣西和帝時為侍中夷安侯珍子康少有􅍾行兄良襲封無後永初六年紹封康為夷安侯時諸紹封者皆食故國半租康以皇太后戚屬獨三分食二以侍祠侯漢官儀曰諸侯功徳優盛朝廷所敬者位特進在三公下其次列侯在九卿下其次侍祠侯其次下士小國侯以肺腑親公主子孫奉墳墓於京師亦随時朝見是為隈諸侯也康太后從兄以親侍祀得紹封也劉攽曰注隈諸侯案隈當作偎事在獨斷也為越騎校尉康以太后久臨朝政宗門盛滿數上書長樂宫諫争宜崇公室自損私權言甚切至太后不従康心懐畏懼永寜元年遂謝病不朝太后使内侍者問之時宫人出入多􅀎有所毁譽其中耆宿皆稱中大人所使者乃康家先婢亦自通中大人康聞詬之詬駡也音許遘反曰汝我家出亦敢爾邪婢怨恚還說康詐疾而言不遜太后大怒遂免康官遣歸國絶屬籍及従兄隲誅隲音質安帝徴康為侍中順帝立為太僕有方正稱名重朝廷以病免加位特進陽嘉三年卒謚曰義侯論曰夫變通之世君臣相擇家語孔子曰君擇臣而任之臣亦擇君而事之斯最作事謀始之㡬也㡬者事之㣲也易訟卦曰君子以作事謀始鄧公贏糧徒歩觸紛亂而赴光武方言曰贏擔可謂識所従㑹矣於是中分麾下之軍以臨山西之隙至使關河響動懐赴如歸功雖不遂而道亦𢎞矣及其威損栒邑兵散宜陽褫龍章扵終朝就侯服以卒嵗褫音直紙反又勑紙反龍章衮龍之服也謂禹為赤眉所敗上司徒印綬也易訟卦曰或錫之鞶帶終朝三褫之榮悴交而下無二色進退用而上無猜情使君臣之羙後世莫闚其間不亦君子之致為乎訓字平叔禹第六子也少有大志不好文學禹常非之顯宗即位初以為郎中訓樂施下士士大夫多歸之東觀記曰訓謙恕下士無貴賤見之如舊朋友子往来門内視之如子有過加鞭朴之教大醫皮巡従獵上林還暮宿殿門下寒疝病發時訓直事聞巡聲起往問之巡曰冀得火以熨背訓身至太官門為求火不得乃以口噓其背復呼同廬郎共更嘘至朝遂愈也永平中理虖沱石臼河従都慮至羊腸倉酈元水經注云汾陽故城積粟所在謂之羊腸倉在晉陽西北石隥縈委若羊腸焉故以為名今嵐州界羊腸阪是也石臼河觧見眀紀欲令通漕水運曰漕太原吏人苦役連年無成轉運所經三百八十九隘隘音乙賣反前後沒溺死者不可勝算建初三年拜訓謁者使監領其事訓考量隠括隠審量括之也孫卿子曰拘木必待隠括蒸揉然後直也拘音鉤謂曲者也知大功難立具以上言肅宗従之遂罷其役更用驢輦嵗省費億萬計全活徒士數千人㑹上谷太守任興欲誅赤沙烏桓怨恨謀反詔訓將黎陽營兵屯狐奴以防其變漢官儀曰中興以幽冀并州兵克定天下故於黎陽立營以謁者監之狐奴縣屬漁陽郡也訓撫接邊民為幽部所歸六年遷護烏桓校尉黎陽故人多攜將老幼樂随訓徙邊東觀記曰訓故吏最貧羸者舉國念訓常所服藥北州少乏又知訓好青泥封書従黎陽歩推鹿車於洛陽市藥還過趙國易陽并載青泥一襆至上谷遺訓其得人心如是鮮卑聞其威恩皆不敢南近塞下東觀記曰吏士常大病瘧轉易至數十人訓身為煑湯藥咸得平愈其無妻者為適配偶八年舞隂公主子梁扈有罪訓坐私與扈通書徴免歸閭里東觀記曰燕人思慕為之作歌也元和三年盧水胡反畔以訓為謁者乗傳到武威拜張掖太守章和二年護羌校尉張紆誘誅燒當種羌迷吾等由是諸羌大怒謀欲報怨朝廷憂之公卿舉訓代紆為校尉諸羌激忿遂相與觧仇結婚交質盟詛鄭𤣥注周禮云大事曰盟小事曰詛衆四萬餘人期氷合渡河攻訓先是小月氏胡分居塞内勝兵者二三千騎劉攽曰案前書皆但言勝兵若干此誤出者字皆勇健富彊每與羌戰常以少制多雖首施兩端首施猶首鼠也漢亦時收其用時迷吾子迷唐别與武威種羌合兵萬騎来至塞下未敢攻訓先欲脅月氏胡訓擁衛稽故令不得戰稽故謂稽留事故也東觀記稽故字作諸故也議者咸以羌胡相攻縣官之利以夷伐夷不宜禁護訓曰不然今張紆失信衆羌大動經常屯兵不下二萬轉運之費空竭府帑説文曰帑金帛所蔵音它莽反涼州吏人命縣絲髮原諸胡所以難得意者皆恩信不厚耳今因其廹急以徳懐之庶䏻有用遂令開城及所居園門悉驅羣胡妻子内之嚴兵守衞羌掠無所得掠劫奪也又不敢逼諸胡因即觧去由是湟中諸胡湟中月氏胡所居今鄯州湟水縣也皆言漢家常欲鬭我曹今鄧使君待我以恩信開門内我妻子乃得父母咸歡喜叩頭曰唯使君所命訓遂撫養其中少年勇者數百人以為義従羌胡俗恥病死每病臨困輙以刀自刺訓聞有困疾者輙拘持縛束不與兵刄使醫藥療之愈者非一小大莫不感悦於是賞賂諸羌種使相招誘迷唐伯父號迷吾乃將其母及種人八百户自塞外来降訓因發湟中秦胡羌兵四千人出塞掩擊迷唐於寫谷東觀記曰寫作鴈斬首虜六百餘人得馬牛羊萬餘頭迷唐乃去大小榆兩谷名也見西羌傳居頗巖谷衆悉破散其春復欲歸故地就田業訓乃發湟中六千人令長史任尚將之縫革為船置於箄上以渡河箄木筏也音歩佳反掩擊迷唐廬落大豪多所斬獲復追逐奔北㑹尚等夜為羌所攻於是義従羌胡并力破之斬首前後一千八百餘級獲生口二千人馬牛羊三萬餘頭一種殆盡一種謂迷唐也迷唐遂收其餘部逺徙廬落西行千餘里諸附落小種皆背畔之燒當豪帥東號稽顙歸死東號羌名餘皆款塞納質於是綏接歸附威信大行遂罷屯兵各令歸郡唯置弛刑徒二千餘人分以屯田為貧人耕種修理城郭塢壁而已永元二年大將軍竇憲將兵鎮武威憲以訓曉羌胡方略上求俱行訓初厚扵馬氏不為諸竇所親及憲誅故不離其禍離遭也訓雖寛中容衆而於閨門甚嚴兄弟莫不敬惮諸子進見未甞賜席接以温色四年冬病卒官時年五十三吏人羌胡愛惜旦夕臨者日數千人戎俗父母死恥悲泣皆騎馬歌呼至聞訓卒莫不吼號或以刀自割又刺殺其犬馬牛羊曰鄧使君已死我曹亦俱死耳前烏桓吏士皆奔走道路訓前任烏桓校尉時吏士也至空城郭吏執不聼以状白校尉徐傿傿歎息曰此義也傿音於建反乃釋之遂家家為訓立祠每有疾病輙此請禱求福元興元年和帝以訓皇后之父使謁者持節至訓墓賜䇿追封諡曰平夀敬侯平夀縣屬北海郡故城在今青州北海縣中宫自臨百官大㑹訓五子騭京悝𢎞閶悝音口回反騭字昭伯東觀記隲作陟少辟大將軍竇憲府及女弟為貴人騭兄弟皆除郎中及貴人立是為和熹皇后騭三遷虎賁中郎將京悝𢎞閶皆黄門侍郎京卒扵官延平元年拜騭車騎將軍儀同三司始自騭也悝虎賁中郎將𢎞閶皆侍中殤帝崩太后與騭等定策立安帝悝遷城門校尉𢎞虎賁中郎將自和帝崩後騭兄弟常居禁中騭謙遜不欲久在内連求還第嵗餘太后乃許之永初元年封騭上蔡侯悝葉侯𢎞西平侯西平縣屬汝南郡故城在今豫州郾城縣南閶西華侯西華縣屬汝南郡食邑各萬户騭以定策功增邑三千户騭等辭讓不獲遂逃避使者間關詣闕間關猶崎嶇也上疏自陳曰臣兄弟汙穢無分可採言無分寸可收採也過以外戚遭值眀時過誤也託日月之末光被雲雨之渥澤易曰夫聖人者與天地合其徳日月齊其眀又云雲行雨施天下平也竝統列位光昭當世不䏻宣賛風羙補助清化誠慙誠懼無以處心陛下躬天然之姿體仁聖之徳遭國不造仍離大憂造成也仍頻也大憂和帝殤帝崩開日月之眀運獨斷之慮援立皇統奉承太宗聖䇿定於神心休烈垂扵不朽本非臣等所􅀎萬一而猥推嘉羙竝享大封猥曲也伏聞詔書驚惶慙怖追觀前世傾覆之誡前代外戚上官安霍禹之屬皆被誅戮也退自惟念不寒而慄惟思也不寒而慄言恐懼也前書曰義縦為定襄太守郡中不寒而慄也臣等雖無逮及逺見之慮猶有庶㡬戒懼之情常母子兄弟内相勑厲冀以端慤畏慎一心奉戴上全天恩下完性命刻骨定分有死無二終不敢横受爵土以增罪累惶窘征營昧死陳乞太后不聽騭頻上疏至扵五六乃許之其夏涼部畔羌揺蕩西州朝廷憂之於是詔騭將左右羽林北軍五校士及諸部兵撃之車駕幸平樂觀餞送騭西屯漢陽使征西校尉任尚従事中郎司馬鈞與羌戰大敗時以轉輸疲弊百姓苦役冬徴騭班師班還也朝廷以太后故遣五官中郎將迎拜騭為大將軍軍到河南使大鴻臚親迎中常侍齎牛酒郊勞王主以下候望於道既至大㑹羣臣賜束帛乗馬駟馬曰乗寵靈顯赫光震都鄙時遭元二之災臣賢案元二即元元也古書字當再讀者即扵止字之下為小二字言此字當兩度言之後人不曉遂讀為元二或同之陽九或附之百六良由不悟致斯乖舛今岐州石鼓銘凡重言者皆為二字眀驗也人士荒饑死者相望盗賊羣起四夷侵畔騭等崇節儉罷力役推進天下賢士何熙祋諷祋姓也音丁外反又音丁活反羊䘲李郃陶敦等列於朝廷辟楊震朱寵陳禪置之幕府故天下復安四年母新野君寝病騭兄弟竝上書求還侍養太后以閶最少孝行尤著特聽之賜安車駟馬及新野君薨騭等復乞身行服章連上太后許之騭等既還里第竝居冢次閶至孝骨立有聞當時及服闋詔喻騭還輔朝政更授前封騭等叩頭固讓乃止於是竝奉朝請位次在三公下特進侯上在特進及列侯之上其有大議乃詣朝堂與公卿參謀元初二年𢎞卒太后服齊衰帝緦麻竝宿幸其第𢎞少治歐陽尚書授帝禁中歐陽生字伯和千乗人事伏生武帝時人諸儒多歸附之初疾病遺言悉以常服不得用錦衣玉匣有司奏贈𢎞驃騎將軍位特進封西平侯太后追思𢎞意不加贈位衣服但賜錢千萬布萬匹騭等復辭不受詔大鴻臚持節即𢎞殯封子廣徳為西平侯將𦵏有司復奏發五營輕車騎士禮儀如霍光故事霍光薨宣帝遣太中大夫侍御史持節護喪事中二千石修幕府冢上賜玉衣梓宫便房黄腸題湊輼輬車黄屋左纛輕車材官五校士以送葬也太后皆不聽但白蓋雙騎門生輓送白蓋車也後以帝師之重分西平之都鄉封廣徳弟甫徳為都鄉侯四年又封京子黄門侍郎珍為陽安侯邑三千五百户五年悝閶相繼竝卒皆遺言薄葬不受爵贈太后竝從之乃封悝子廣宗為葉侯閶子忠為西華侯自祖父禹教訓子孫皆遵法度深戒竇氏章帝竇皇后竇勲女祖穆及叔父俱尚主穆交通輕薄屬託郡縣干亂政化後竝坐怨望謀不軌被誅故鄧氏深引為誡也檢勑宗族闔門靜居闔閉也騭子侍中鳯甞與尚書郎張龕書屬郎中馬融宜在臺閣又中郎將任尚嘗遺鳯馬後尚坐斷盗軍糧檻車徴詣廷尉檻車謂以板四周為檻無所見鳳懼事泄先自首於騭騭畏太后遂髠妻及鳳以謝天下稱之建光元年太后崩未及大歛帝復申前命封騭為上蔡侯位特進帝少號聰敏及長多不徳而乳母王聖見太后久不歸政慮有廢置常與中黄門李閏候伺左右及太后崩宫人先有受罰者懐怨恚因誣告悝𢎞閶先従尚書鄧訪取廢帝故事謀立平原王得和帝長子平原王勝無嗣鄧太后立樂安王寵子得為平原王帝聞追怒令有司奏悝等大逆無道遂廢西平侯廣德葉侯廣宗西華侯忠陽安侯珍都鄉侯甫徳皆為庶人騭以不與謀但免特進遣就國宗族皆免官歸故郡沒入騭等貲財田宅徙鄧訪及家屬於逺郡郡縣逼迫廣宗及忠皆自殺又徙封騭為羅侯羅縣屬長沙國騭與子鳳竝不食而死騭従弟河南尹豹度遼將軍舞陽侯遵將作大匠暢皆自殺唯廣德兄弟以母閻后戚屬得留京師大司農朱寵痛騭無罪遇禍乃肉袒輿櫬櫬親身棺也上疏追訟騭曰伏惟和熹皇后聖善之徳為漢文母詩凱風曰母氏聖善文母文王之母太任也言太后有聖智之善比於文母也兄弟忠孝同心憂國宗廟有主王室是賴殤帝崩太后與騭定立安帝故曰是賴功成身退讓國遜位歷世外戚無與為比當享積善履謙之祐易曰積善之家必有餘慶又曰鬼神害盈而福謙而横為宫人單辭所陷利口傾險反亂國家罪無申證申眀白也獄不訊鞫訊問也鞫窮也遂令騭等罹此酷濫一門七人竝不以命七人謂騭従弟豹遵暢騭子鳳鳳従弟廣宗忠也屍骸流離怨魂不反逆天感人率土喪氣宜收還冢次寵樹遺孤奉承血祀以謝亡靈血祀謂祭廟殺牲取血以告神也寵知其言切自致廷尉詔免官歸田里衆庶多為騭稱枉帝意頗悟乃譴讓州郡以逼迫廣宗等故也還𦵏洛陽北芒舊塋公卿皆㑹喪莫不悲傷之詔遣使者祠以中牢諸從昆弟皆歸京師及順帝即位追感太后恩訓愍騭無辜乃詔宗正復故大將軍鄧騭宗親内外朝見皆如故事除騭兄弟子及門従十二人悉為郎中擢朱寵為太尉錄尚書事寵字仲威京兆人初辟騭府稍遷潁川太守治理有聲劉攽曰案他處無治理竝出者蓋本以理字代治後入誤兩存之及拜太尉封安鄉侯甚加優禮廣徳早卒甫徳更召徴為開封令劉攽曰案已言召又云徴文理重疉蓋多一召字學傳父業喪母遂不仕閶妻耿氏有節操痛鄧氏誅廢子忠早卒乃養河南尹豹子嗣為閶後耿氏教之書學遂以通博稱永夀中與伏無忌延篤著書東觀官至屯騎校尉禹曾孫香子女為桓帝后帝又紹封度遼將軍遵子萬世為南鄉侯拜河南尹及后廢萬世下獄死其餘宗親皆復歸故郡鄧氏自中興後累世寵貴凡侯者二十九人公二人大將軍以下十三人中二千石十四人列校二十二人州牧郡守四十八人其餘侍中將大夫郎謁者不可勝數東京莫與為比論曰漢世外戚自東西京十有餘族髙帝吕后昭帝上官后宣帝霍后成帝趙后平帝王后章帝竇后和帝鄧后安帝閻后桓帝竇后順帝梁后靈帝何后等家或以貴盛驕奢或以攝位權重皆以盈極被誅也非徒豪横盈極自取災故必於貽釁後主以至顚敗者其數有可言焉後主謂嗣君也言外戚握權者當先帝時或容免禍必貽罪釁於嗣君以至傾覆數猶理也其致敗之理可得言焉何則恩非已結而權已先之言外戚之家承隆寵於先帝不結恩於後主故權勢先在其身也情疏禮重而枉性圖之圖謀也其人既居權要禮數不可不重故後主枉其本性與之圖謀政事非心所好也來寵方授地既害之後来寵者方欲授之要職而先代權臣見居其地必須除舊方得授新是地既害之也隙開勢謝讒亦勝之君臣有隙上下離心則權寵之人形勢漸謝於是讒人構㑹尋亦勝也悲哉騭悝兄弟委逺時柄忠勞王室而終莫之免斯樂生所以泣而辭燕也樂毅忠扵燕昭王其子恵王立而疑樂毅樂毅懼而奔趙趙王謂樂毅曰燕力竭扵齊其主信讒國人不附其可圖乎毅伏而垂涕曰臣事昭王猶事大王也臣若獲戾於它國没身不忍謀趙徒隸况其後嗣乎事見史記寇恂傳曾孫榮寇恂字子翼上谷昌平人也世為著姓恂初為郡功曹太守耿況甚重之王莽敗更始立使使者徇郡國曰先降者復爵位恂従耿況迎使者於界上況上印綬使者納之一宿無還意恂勒兵入見使者就請之使者不與曰天王使者功曹欲脅之邪恂曰非敢脅使君君者尊之稱也竊傷計之不詳也今天下初定國信未宣使君建節銜命以臨四方郡國莫不延頸傾耳望風歸命今始至上谷而先墮大信墮毀也沮向化之心生離畔之隙將復何以號令它郡乎且耿府君在上谷久為吏人所親今易之得賢則造次未安不賢則秖生亂為使君計莫若復之以安百姓使者不應恂叱左右以使者命召況況至恂進取印綬帶況使者不得已乃承制詔之況受而歸及王郎起遣將徇上谷急況發兵恂與門下掾閔業共説況曰邯鄲拔起難可信向拔卒也昔王莽時所難獨有劉伯升耳今聞大司馬劉公伯升母弟尊賢下士士多歸之可攀附也況曰邯鄲方盛力不䏻獨拒如何恂對曰今上谷完實控弦萬騎舉大郡之資可以詳擇去就恂請東約漁陽齊心合衆邯鄲不足圖也況然之乃遣恂到漁陽結謀彭寵恂還至昌平襲撃邯鄲使者殺之奪其軍遂與況子弇等俱南及光武於廣阿拜恂為偏將軍號承義侯從破羣賊數與鄧禹謀議禹竒之因奉牛酒共交歡光武南定河内而更始大司馬朱鮪等盛兵據洛陽又幷州未安光武難其守非其人不可故難之問於鄧禹曰諸將誰可使守河内者禹曰昔髙祖任蕭何扵關中無復西顧之憂所以得專精山東終成大業今河内帶河為固户口殷實北通上黨南迫洛陽寇恂文武備足有牧人禦衆之才非此子莫可使也乃拜恂河内太守行大將軍事光武謂恂曰河内完富吾將因是而起昔髙祖留蕭何鎮關中吾今委公以河内堅守轉運給足軍糧率厲士馬防遏它兵勿令北度而已光武於是復北征燕代恂移書屬縣講兵肄射肄習也伐淇園之竹為矢百餘萬前書音義曰淇園衞之苑多竹篠也養馬二千匹收租肆百萬斛轉以給軍朱鮪聞光武北而河内孤使討難將軍蘇茂副將賈彊將兵三萬餘人度鞏河攻温鞏温並今洛州縣臨黄河故曰鞏河檄書至恂即勒軍馳出並移告屬縣發兵㑹於温下軍吏皆諫曰今洛陽兵度河前後不絶宜待衆軍畢集乃可出也恂曰温郡之藩蔽失温則郡不可守遂馳赴之旦日合戰而偏將軍馮異遣救及諸縣兵適至士馬四集幡旗蔽野恂乃令士卒乗城鼓噪大呼言曰劉公兵到蘇茂軍聞之陳動恂因奔擊大破之追至洛陽遂斬賈彊茂兵自投河死者數千生獲萬餘人恂與馮異過河而還自是洛陽震恐城門晝閉時光武傳聞朱鮪破河内有頃恂檄至大喜曰吾知寇子翼可任也諸將軍賀因上尊號於是即位時軍食急乏恂以輦車驪駕轉輸前後不絶前書音義曰驪駕併駕也輦車人挽行也尚書升斗以稟百官帝數策書勞問恂同門生茂陵董崇説恂曰上新即位四方未定而君侯以此時據大郡内得人心外破蘇茂威震鄰敵功名發聞此讒人側目怨禍之時也昔蕭何守關中悟鮑生之言而髙祖恱漢王與項羽相拒京索蕭何留守關中上數使使勞苦何鮑生謂何曰今君王暴衣露盖數勞苦君者有疑君心為君計者遣君子孫昆弟䏻勝兵者悉詣軍何従其計髙祖大悦今君所將皆宗族昆弟也無乃當以前人為鏡戒恂然其言稱疾不視事帝將攻洛陽先至河内恂求從軍帝曰河内未可離也數固請不聽乃遣兄子寇張姊子谷崇將突騎願為軍鋒帝善之皆以為偏將軍建武二年恂坐繫考上書者免是時潁川人嚴終趙敦聚衆萬餘與密人賈期連兵為寇恂免數月復拜潁川太守與破姦將軍侯進俱擊之數月斬期首郡中悉平定封恂雍奴侯邑萬户執金吾賈復在汝南部將殺人於潁川部將謂軍部之下小將也恂捕得繫獄時尚草創軍營犯法率多相容恂乃戮之於市復以為恥還過潁川謂左右曰吾與寇恂並列將帥而今為其所䧟大丈夫豈有懐侵怨而不決之者乎今見恂必手劒之恂知其謀不欲與相見谷崇曰崇將也得帶劒侍側卒有變足以相當恂曰不然昔藺相如不畏秦王而屈於廉頗者爲國也史記曰秦王與趙王飲於澠池秦王請趙王鼓瑟秦御史書曰某年某月趙王為秦王鼓瑟藺相如前請秦王擊缶秦王怒不許相如曰五歩之内相如請得以頸血濺大王矣秦王不懌為擊缶相如顧趙御史書曰某年某月秦王為趙王擊缶秦羣臣曰請以趙十五城為秦王夀相如曰請以秦咸陽為趙王夀竟酒不􅀎相加既罷歸國趙拜相如為上卿位在廉頗之上頗曰我有攻城野戰之功相如徒以口舌為勞而位居我上我見必厚辱之相如出望見廉頗輙引車避之舎人諌相如曰夫以秦王相如能廷吒之何畏廉将軍哉吾念彊秦不敢加兵於趙者盖以吾兩人也今兩虎鬭必不俱全吾所以先公家之急而後私讎也區區之趙尚有此義吾安可以忘之乎乃勑屬縣盛供具儲酒醪説文曰醪兼汁滓酒執金吾軍入界一人皆兼二人之饌饌具也恂乃出迎扵道稱疾而還賈復勒兵欲追之而吏士皆醉遂過去恂遣谷崇以狀聞帝乃徴恂恂至引見時復先在坐欲起相避帝曰天下未定兩虎安得私鬬今日朕分之分猶解也於是並坐極歡遂共車同出結友而去恂歸潁川東觀記曰郡中政理盗賊不入三年遣使者即拜為汝南太守即就也又使驃騎將軍杜茂將兵助恂討盗賊盗賊清靜郡中無事恂素好學乃脩鄉校教生徒聘能為左氏春秋者親受學焉七年代朱浮為執金吾眀年從車駕擊隗囂而潁川盗賊羣起帝乃引軍還謂恂曰潁川迫近京師當以時定惟念獨卿能平之耳従九卿復出以憂國可知也恂對曰潁川剽輕聞陛下逺踰阻險有事隴蜀故狂狡乗間相詿誤耳狡猾也説文曰詿亦誤也音挂如聞乗輿南向賊必惶怖歸死臣願執銳前驅即日車駕南征恂從至潁川盗賊悉降而竟不拜郡百姓遮道曰願従陛下復借寇君一年恂前為潁川太守故曰復借也乃留恂長社鎮撫吏人受納餘降初隗囂將安定髙峻擁兵萬人據髙平第一髙平縣屬安定郡續漢志曰髙平有第一城也帝使待詔馬援招降峻由是河西道開中郎將来歙承制拜峻通路將軍封關内侯後屬大司馬呉漢共圍囂扵冀及漢軍退峻亡歸故營復助囂拒隴阺及囂死峻據髙平畏誅堅守建威大將軍耿弇率太中大夫竇士武威太守梁統等圍之一嵗不拔十年帝入關將自征之恂時従駕諫曰長安道里居中應接近便従洛陽至髙平長安為中安定隴西必懐震懼此從容一處可以制四方也今士馬疲倦方履險阻非萬乗之固前年潁川可為至戒帝不従進軍及汧汧縣屬扶風故城在今隴州汧源縣南也峻猶不下帝議遣使降之乃謂恂曰卿前止吾此舉今為吾行也若峻不即降引耿弇等五營擊之恂奉璽書至第一峻遣軍師皇甫文出謁辭禮不屈恂怒將誅文諸將諌曰髙峻精兵萬人率多彊弩西遮隴道連年不下今欲降之而反戮其使無乃不可乎恂不應遂斬之遣其副歸告峻曰軍師無禮已戮之矣欲降急降不欲固守峻惶恐即日開城門降諸將皆賀因曰敢問殺其使而降其城何也恂曰皇甫文峻之腹心其所取計者也今来辭意不屈必無降心全之則文得其計殺之則峻亡其膽是以降耳諸將皆曰非所及也遂傳峻還洛陽恂經眀行修名重朝廷所得秩奉厚施朋友故人及従吏士常曰吾因士大夫以致此其可獨享之乎時人歸其長者以為有宰相噐十二年卒諡曰威侯子損嗣恂同産弟及兄子姊子以軍功封列侯者凡八人終其身不傳於後初所與謀閔業者恂數為帝言其忠賜爵闗内侯官至遼西太守十三年復封損庶兄夀為洨侯洨縣屬沛郡洨音故交反後徙封損扶桞侯扶栁縣屬信都郡故城在今冀州信都縣西也損卒子釐嗣徙封商鄉侯釐卒子襲嗣恂女孫為大將軍鄧騭夫人由是寇氏得志於永初間安帝永初元年鄧太后臨朝故得志也恂曾孫榮論曰傳稱喜怒以類者鮮矣左傳曰晉范武子㑹將老召其子文子曰吾聞之喜怒以類者鮮矣而易者實多也夫喜而不比怒而思難者其惟君子乎子曰伯夷叔齊不念舊惡怨是用希於寇公而見之矣論語孔子之言榮少知名桓帝時為侍中性矜絜自貴扵人少所與與黨與也以此見害於權寵而從兄子尚帝妹益陽長公主帝又聘其從孫女於後宫左右益惡之延熹中遂陷以罪辟與宗族免歸故郡吏承望風旨持之浸急榮恐不免奔闕自訟未至刺史張敬追劾榮以擅去邊有詔捕之榮逃竄數年㑹赦令不得除積窮困乃自亡命中上書曰自從也臣聞天地之於萬物也好生帝王之於萬人也慈愛陛下統天理物為萬國覆作人父母先慈愛後威武先寛容後刑辟自生齒以上咸蒙徳澤大戴禮曰男子八月生齒女子七月生齒也而臣兄弟獨以無辜為專權之臣所見批抵説文曰抵側擊也批音片支反抵音之氏反青蠅之人所共搆㑹青蠅詩小雅曰營營青蠅止于樊愷悌君子無信讒言青蠅能汚白使黒汚黒使白喻佞人變亂善惡以臣婚姻王室謂臣將撫其背奪其位退其身受其埶於是遂作飛章以被扵臣欲使墜萬仞之阬踐必死之地令陛下忽參母之仁發投杼之怒史記曰昔曾參處費魯人有與曾參同姓名殺人人告其母曰曾參殺人其母織自若也又一人告之曰曾參殺人其母尚織自若也又一人告之曰曾參殺人其母乃投杼下機踰牆而走矣以曾參之賢其母猶生疑於三告尚書背繩墨案空劾繩墨謂法律也不復質确其過寘於嚴棘之下質正也确實也説文云确音胡角反此苦角反嚴棘謂獄也易坎上六曰繫用徽墨寘于叢棘也便奏正臣罪司隸校尉馮羡佞邪承旨廢於王命驅逐臣等不得旋踵臣奔走還郡沒齒無怨臣誠恐卒為豺狼横見噬食故冒死欲詣闕披肝膽布腹心刺史張敬好為謟諛張設機網復令陛下興靁電之怒司隸校尉應奉河南尹何豹洛陽令袁騰並驅爭先若赴仇敵罰及死沒髠剔墳墓但未掘壙出尸剖棺露胔耳胔謂骨之尚有肉者也月令曰掩骼理胔音才賜反又在侈反昔文王葬枯骨解見順紀公劉敦行葦世稱其仁大雅行葦之詩曰敦彼行葦牛羊勿踐履言公劉之時仁及草木敦然道傍之葦牧牛羊者無使踐履折傷之況於人乎故榮以自喻焉今殘酷容媚之吏無折中處平之心不顧無辜之害而興虗誣之誹欲使嚴朝必加濫罰是以不敢觸突天威而自竄山林以俟陛下發神聖之聽啓獨覩之眀拒讒慝之謗絶邪巧之言救可濟之人援沒溺之命不意滯怒不為春夏息春夏長養萬物故不宜怒矣淹恚不為順時怠遂馳使郵驛布告逺近嚴文剋剝痛扵霜雪張羅海内設置萬里逐臣者窮人迹追臣者極車􅁤雖楚購伍貟史記曰楚人伍奢為平王太子建太傅費無忌譛殺奢奢子貟字子胥奔呉楚購之得伍貟者賜粟五萬石爵執圭漢求季布無以過也季布為項羽將數窘漢王項羽滅髙祖購季布千金敢舎匿罪三族臣遇罰以来三赦再贖無驗之罪足以蠲除無驗謂無罪狀可按驗也而陛下疾臣愈深有司咎臣甫力甫始也力甚也止則見掃滅行則為亡虜茍生則為窮人極死則為寃鬼天廣而無以自覆地厚而無以自載蹈陸土而有沉淪之憂逺巖牆而有鎮壓之患精誠足以感於陛下而哲王未肯悟如臣犯元惡大憝憝惡也主言元惡之人大為人之所惡也足以陳於原野備刀鋸鋸刖刑也國語曰刑有五大者陳諸原野矣陛下當班布臣之所坐以解衆論之疑臣思入國門坐於胏石之上使三槐九棘平臣之罪周禮秋官云左九棘孤卿大夫位焉右九棘公侯伯子男位焉面三槐三公位焉左嘉石平罷人右胏石達窮人而閶闔九重閶闔天門也陷穽歩設穽阬穽也舉趾觸罘罝説文曰罘兎網也罝亦兎網也音浮嗟動行絓羅網無緣至萬乗之前永無見信之期矣國君不可讎匹夫讎之則一國盡懼左傳曰晉侯之竪頭須曰國君而讎匹夫懼者甚衆也臣奔走以来三離寒暑離厯隂陽易位當煖反寒春常凄風凄風寒風也左傳曰春無凄風夏降霜雹月令仲夏行冬令則雹凍傷穀又連年大風折拔樹木風為號令前書翼奉曰凡風者天之號令所以譴告人也春夏布徳月令春天子布徳行惠發倉廩賑窮乏夏行封慶賜無不欣悦也議獄緩死之時易中孚象曰君子以議獄緩死願陛下思帝堯五教在寛之徳企成湯避逺讒夫之誡劉向説苑曰湯大旱七年使人持鼎祀山川祝曰政不節邪苞苴行邪讒夫昌邪宫室崇邪女謁盛邪使人疾邪何不雨之極邪以寧風旱以弭灾兵臣聞勇者不逃死智者不重困重猶惜也固不為眀朝惜垂盡之命願赴湘沅之波從屈原之悲史記曰屈原事楚懐王王受讒流屈原於江南屈原憂愁悲思遂投湘沅而死沈江湖之流弔子胥之哀史記曰伍子胥為呉行人被宰嚭所譛呉王賜屬鏤之劒以死王取其尸盛以鴟夷浮之於江中臣功臣苗緒生長王國懼獨含恨以𦵏江魚之腹無以自别於世屈原曰寜赴湘流葬於江魚之腹也不勝狐死首丘之情營魂識路之懐禮檀弓曰古人有言狐死正首丘仁也楚詞曰願徑逝而未得魂識路之煢㷀老子曰載營魄猶營魂也犯冐王怒觸突帝禁伏於兩觀陳訴毒痛兩觀闕也孔子攝司㓂誅少正卯於兩觀之下然後登金鑊入沸湯麋爛於熾爨之下九死未悔楚詞曰雖九死而未悔也悲夫久生亦復何聊盖忠臣殺身以解君怒孝子殞命以寜親怨故大舜不避塗廩浚井之難廩倉也浚深也史記曰舜父瞽叟常欲殺舜使舜塗廩従下焚廩舜乃以兩笠自扞而下後又使穿井舜為匿空旁出舜既入深父乃與象共下土實之舜從旁空出去申生不辭姬氏讒邪之謗申生晉獻公太子獻公用驪姬之讒而殺申生事見左氏傳臣敢忘斯議劉攽曰案文議當作義不自斃以解眀朝之忿哉乞以身塞重責願陛下匄兄弟死命匄乞也音蓋使臣一門頗有遺類以崇陛下寛饒之恵先死陳情臨章涕泣泣血漣如易曰乗馬班如泣血漣如言居不獲安行無所適窮困闉戹無所委仰者帝省章愈怒遂誅榮寇氏由是衰廢賛曰元侯淵謨乃作司徒眀唘帝略肇定秦都勲成智隱靜其如愚論語孔子曰吾與回言終日不違如愚也子翼守温蕭公是埒埒等也係兵轉食以集鴻烈誅文屈賈有剛有折誅皇甫文屈扵賈復後漢書卷四十六後漢書卷四十六考證鄧禹傳從至廣阿注横野將軍劉發大破之發本或作奉敬敷五教五教在寛第六卷帝紀注引書亦複出五敎二字與今尚書文不同鄧禹孫騭時遭元二之災注元二即元元也古書字當再讀者即於上字之下為小二字後人不曉遂讀為元二臣世駿按王充論衡恢國篇云今上嗣位元二之間嘉徳布流三年零陵生芝草四年甘露降五縣五年芝復生六年黄龍見蓋章帝時事考之本紀所書建初三年以後諸瑞皆同則知所謂元二者謂建初元年二年也既稱嘉徳布流以致祥瑞其為非災𤯝之語益可决疑安帝永初元年二年先零滇羗寇叛郡國地震大水鄧騭以二年十一月拜大將軍則知所謂元二者謂永初元年二年也凡漢碑重文不皆用小二字豈有范史一部唯獨一處如此謀立平原王得臣承蒼按得當作翼安帝紀及章八王傳可據得又無子以翼為嗣安帝緣此貶翼為都鄉侯注失考正寇恂傳不賢則祗更生亂監本無更字諸將軍賀軍疑作畢後漢書卷四十六考證
