body:
  text: 後漢書卷三宋宣城太守范煜撰唐章懷太子賢注章帝紀第三肅宗孝章皇帝諱炟顯宗第五子也諡法曰温克令儀曰章伏侯古今注曰炟之字曰著音丁逹反母賈貴人永平三年立為皇太子少寛容好儒術顯宗器重之十八年八月壬子即皇帝位年十九尊皇后曰皇太后壬戌葬孝明皇帝于顯節陵帝王紀曰顯節陵方三百歩髙八丈其地故富夀亭也西北去洛陽三十七里冬十月丁未大赦天下賜民爵人二級為父後及孝悌力田人三級脫無名數及流人欲占者人一級爵過公乗得移與子若同産子鰥寡孤獨篤癃貧不能自存者粟人三斛詔曰朕以眇身託于王侯之上統理萬機懼失厥中兢兢業業未知所濟深惟守文之主必建師傅之官詩不云乎不愆不忘率由舊章詩大雅也鄭𤣥注云愆過也率循也由用也言成王之令德不過誤不違失皆循用舊典文章謂周公之禮法行太尉事節鄉侯憙三世在位為國元老趙憙光武時為太尉明帝時行太尉事故曰三代在位元長也詩曰方叔元老司空融融牟融典職六年勤勞不怠其以憙為太傅融為太尉並録尚書事武帝初以張子孺領尚書事録尚書事由此始三事大夫莫肯夙夜小雅之所傷也詩雨無正之文也三事三公也鄭𤣥注云幽王在外三公及諸侯随而行者皆無復君臣之禮不肯晨夜省王予違汝弼汝無面從尚書益稷之文也孔安國注云我違道汝當以義輔正我無面從我股肱之正義也羣后百僚勉思厥職各貢忠誠以輔不逮申勑四方稱朕意焉十一月戊戌蜀郡太守第五倫為司空詔征西將軍耿秉屯酒泉酒泉今肅州縣也前書音義曰城下有泉其味若酒因名酒泉焉遣酒泉太守段彭救戊巳校尉耿恭甲辰晦日有食之於是避正殿寢兵不聽事五日詔有司各上封事十二月癸巳有司奏言孝明皇帝聖德淳茂劬勞日昊身御浣衣日昊日昳尚書曰文王自朝至于日中􅉴不遑暇食食無兼珍澤臻四表尚書曰光被四表逺人慕化僬僥儋耳欵塞自至欵扣僬僥儋耳觧見明紀克伐鬼方開道西域鬼方逺方易曰髙宗伐鬼方三年克之威靈廣被無思不服以烝庶為憂不以天下為樂備三雍之教躬養老之禮作登歌正雅樂博貫六蓺周禮保氏教之六蓺一曰禮二曰樂三曰射四曰馭五曰書六曰數前書蓺文志曰以禮樂春秋易詩書為六蓺博貫謂䆒極深幽耳劉攽曰注前書蓺文志曰以禮樂春秋案文多一曰字不舎晝夜聰明淵塞著在圖讖河圖曰圖出代九天開明受用嗣興十代以光又括地象曰十代禮樂文雅竝出謂明帝也至德所感通於神明功烈光於四海仁風行於千載而深執謙謙自稱不德無起寢廟掃地而祭除日祀之法春秋外傳曰日祭月祀時享祖禰則日祭髙曾則月祀三祧則時享今此除日祀之法從時月之祭劉攽曰注三祧則時享案自古但有二祧無三祧明三字誤省送終之禮遂藏主於光烈皇后更衣别室天下聞之莫不悽愴陛下至孝烝烝奉順聖德臣愚以為更衣在中門之外處所殊别宜尊廟曰顯宗其四時禘祫於光武之堂間祀悉還更衣續漢書曰五年再殷祭三年一祫五年一禘父為昭南向子為穆北向禘以夏四月祫以冬十月禘之為言諦諦審昭穆尊卑之義祫者合也冬十月五穀成故骨肉合飲食於祖廟謂之殷祭四時正祭外有五月嘗麥三伏立秋嘗粢盛酎十月嘗稻等謂之間祀即各於更衣之殿更衣者非正處也園中有寢有便殿寢者陵上正殿便殿寢側之别殿即更衣也劉攽曰注立秋嘗粢盛酎案漢制立秋嘗粢粢稷也八月飲酎此文誤出一盛字少八月飲三字共進武德之舞如孝文皇帝祫祭髙廟故事前書高廟奏武德文始五行之舞制曰可是歲牛疫京師及三州大旱詔勿收兖豫徐州田租芻槀其以見穀賑給貧人劉攽曰案詔無它語不當有其字建初元年春正月詔三州郡國方春東作恐人稍受廪往來煩劇或妨耕農廪給也稍為少少給之不頓與劉攽曰注案文為當作謂其各實覈尤貧者計所貸并與之并音必政反流人欲歸本者郡縣其實稟令足還到聽過止官亭無雇舎宿長吏親躬無使貧弱遺脫小吏豪右得容姦妄前書曰百石已下有斗食佐史之秩言小吏也詔書既下勿得稽留刺史明加督察尤無狀者無狀謂其罪惡尤大其狀無可寄言故云無狀它皆類此丙寅詔曰比年牛多疾疫墾田減少穀價頗貴人以流亡方春東作宜及時務二千石勉勸農桑𢎞致勞來羣公庶尹各推精誠專急人事罪非殊死湏立秋案驗有司明愼選舉進柔良退貪猾順時令理寃獄五教在寛帝典所羙五教謂父義母慈兄友弟恭子孝也尚書舜典曰汝作司徒敬敷五教在寛愷悌君子大雅所歎愷樂悌易也詩大雅泂酌篇曰愷悌君子民之父母布告天下使明知朕意酒泉太守段彭討擊車師大破之罷戊巳校尉官二月武陵澧中蠻叛武陵郡今澧州水經曰澧水出武陵充縣西厯山之北也三月甲寅山陽東平地震己巳詔曰朕以無德奉承大業夙夜慄慄不敢荒寜孔安國注尚書曰不敢荒怠自安寧而災異仍見與政相應朕既不明渉道日寡又選舉乖實俗吏傷人官職耗亂刑罰不中可不憂與昔仲弓季氏之家臣子游武城之小宰孔子猶誨以賢才問以得人論語仲弓為季氏宰問政子曰赦小過舉賢才子游為武城宰孔子謂之曰汝得人焉耳乎明政無大小以得人為本夫鄉舉里選必累功勞今刺史守相不明眞偽茂才孝廉歲以百數既非能顯而當授之政事甚無謂也每尋前世舉人貢士或起甽畝不繫閥閱說文曰甽田中之溝音工犬反史記曰明其等曰閥積其功曰閲言前代舉人務取賢才不拘門地敷奏以言則文章可採明試以功則政有異迹敷陳奏進也令各陳進其言則知其能否也尚書曰敷奏以言明試以功則政之類文質彬彬朕甚嘉之彬彬雜半之貎其令太傅三公中二千石二千石郡國守相舉賢良方正能直言極諫之士各一人夏五月辛酉初舉孝廉郎中寛博有謀任典城者以補長相任堪使也典主也長謂縣長相謂侯相秋七月辛亥詔以上林池籞田賦與貧人籞禁苑也音語前書音義曰折竹以繩懸連之使人不得往來謂之籞八月庚寅有星孛于天市史記曰房為天駟東北曲十二星曰旗旗中四星曰天市九月永昌哀牢夷叛冬十月武陵郡兵討叛蠻破降之十一月阜陵王延謀反貶為阜陵侯二年春三月辛丑詔曰比年隂陽不調饑饉屢臻深惟先帝憂人之本本謂稼穡詔書曰不傷財不害人誠欲元元去末歸本而今貴戚近親奢縱無度嫁娶送終尤為僭侈有司廢典莫肯舉察春秋之義以貴理賤今自三公竝宜明糾非法宣振威風朕在弱冠未知稼穯之艱難區區管窺豈能照一隅哉史記扁鵲曰以管窺天以隙視文其科條制度所宜施行在事者備為之禁先京師而後諸夏公羊傳曰春秋内中國而外諸夏内諸侯而外夷狄王者欲一平天下曷以内外之辭言自近者始也劉攽曰注案公羊本文曷為以内外之辭言之言自近者始也少之言二字甲辰罷伊吾盧屯兵永平十六年置永昌越嶲益州三郡民夷討哀牢破平之夏四月戊子詔還坐楚淮陽事徙者四百餘家令歸本郡癸巳詔齊相省氷紈方空縠吹綸絮紈素也氷言色鮮潔如氷釋名曰縠紗也方空者紗薄如空也或曰空孔也即今之方日紗也綸似絮而細吹者言吹嘘可成亦紗也前書齊有三服官故詔齊相罷之六月燒當羌叛金城太守郝崇討之敗績羌遂宼漢陽秋八月遣行車騎將軍馬防討平之十二月戊寅有星孛于紫宫三年春正月己酉宗祀明堂禮畢登靈臺望雲物大赦天下三月癸巳立貴人竇氏為皇后賜爵人二級三老孝悌力田人三級民無名數及流民欲占者人一級鰥寡孤獨篤癃貧不能自存者粟人五斛夏四月己巳罷常山呼沱石臼河漕石臼河名也在今定州唐縣東北時鄧訓上言此漕難成遂罷之漕水運也音才到反行車騎將軍馬防破燒當羌於臨洮臨洮縣名屬隴西郡即今岷山之州閏月西域假司馬班超擊姑墨大破之姑墨西域國名去長安八千一百五十里冬十二月丁酉以馬防為車騎將軍武陵漊中蠻叛漊水名音婁源出今澧州崇義縣西北山是歲零陵獻芝草四年春二月庚寅太尉牟融薨夏四月戊子立皇子慶為皇太子賜爵人二級三老孝悌力田人三級民無名數及流人欲自占者人一級鰥寡孤獨篤癃貧不能自存者粟人五斛己丑徙鉅鹿王恭為江陵王汝南王暢為梁王常山王昞為淮陽王辛夘封皇子伉音抗為千乗王全為平春王平春縣屬江夏郡五月丙辰車騎將軍馬防罷甲戌司徒鮑昱為太尉南陽太守桓虞為司徒虞字仲春馮翊人六月癸丑皇太后馬氏崩秋七月壬戌葬明德皇太后劉攽曰案陰后不稱太則此太衍字也冬牛大疫十一月壬戌詔曰盖三代導人教學為本前書曰三代之道鄉里有教夏曰教殷曰庠周曰序劉攽曰夏曰教教當作校漢承暴秦襃顯儒術建立五經為置博士其後學者精進雖曰承師亦别名家言雖承一師之業其後觸類而長更為章句則别為一家之學孝宣皇帝以為去聖久逺學不厭博故遂立大小夏侯尚書後又立京氏易大小夏侯謂夏侯勝勝從兄子建也京氏京房也至建武中復置顔氏嚴氏春秋大小戴禮博士嚴氏謂嚴彭祖顔氏謂顔安樂大小戴戴德戴聖也此皆所以扶進微學尊廣道蓺也中元元年詔書五經章句煩多議欲減省至永平元年長水校尉儵樊儵奏言先帝大業當以時施行欲使諸儒共正經義頗令學者得以自助孔子曰學之不講是吾憂也又曰博學而篤志切問而近思仁在其中矣論語文也講猶習也篤厚也志記也言人能博渉學而後識之切問於已所未悟之事近思已所能及之事好學亦仁之一分故仁在其中矣於戲其勉之哉於是下太常將大夫博士議郎郎官博士屬太常故云下及諸生諸儒㑹白虎觀講議五經同異使五官中郎將魏應承制問續漢志曰五官中郎將比二千石侍中淳于恭奏帝親稱制臨决如孝宣甘露石渠故事前書甘露二年詔諸儒講五經異同蕭望之等平奏其議上親制臨决焉又曰施讎甘露中論五經於石渠閣三輔故事曰石渠閣在未央殿北藏祕書之所作白虎議奏今白虎通是嵗甘露降泉陵洮陽二縣二縣屬零陵郡泉陵城在今永州零陵縣北洮陽故城在今湘源縣西北五年春二月庚辰朔日有食之詔曰朕新離供養去年馬太后崩愆咎衆著上天降異大變隨之詩不云乎亦孔之醜詩小雅曰朔日辛邜日有食之亦孔之醜孔甚也醜惡也又久旱傷麥憂心慘切公卿已下其舉直言極諫能指朕過失者各一人遣詣公車將親覽問焉其以巖穴為先勿取浮華前書鄒陽曰顯巖穴之士甲申詔曰春秋書無麥苖重之也春秋莊公七年秋大水無麥苖公羊傳曰一災不書待無麥然後書無苖何休注曰不書穀至麥苖獨書人食最重也去秋雨澤不適今時復旱如炎如焚炎焚言熱氣甚韓詩旱魃為虐如炎如焚凶年無時而為備未至朕之不德上累三光震慄忉忉痛心疾首忉音刀詩曰憂心忉忉又曰疢如疾首前代聖君博思咨諏咨諏謀也音子余反雖降災咎輒有開匱反風之應武王有疾周公作請命之書藏於金匱後管蔡流言成王疑周公天乃大風禾木盡偃成王啟金匱得書乃郊天謝過天乃反風起禾事見尚書今予小子徒慘慘而已其令二千石理寃獄錄輕繫禱五嶽四瀆及名山能興雲致雨者冀蒙不崇朝徧雨天下之報尚書大傳曰五嶽皆觸石出雲膚寸而合不崇朝而雨天下務加肅敬焉三月甲寅詔曰孔子曰刑罰不中則人無所措手足今吏多不良擅行喜怒或案不以罪迫脅無辜致令自殺者一歲且多於斷獄甚非為人父母之意也書曰元后作人父母有司其議糾舉之荆豫諸郡兵討破武陵漊中叛蠻夏五月辛亥詔曰朕思遲直士側席異聞遲猶希望也音持二反側席謂不正坐所以待賢良也其先至者各以發憤吐懣略聞子大夫之志矣皆欲置於左右顧問省納建武詔書又曰堯試臣以職不直以言語筆札書舜典曰朕其試哉又曰歴試諸艱札簡也今外官多曠並可以補任戊辰太傅趙憙薨冬始行月令迎氣樂東觀記曰馬防上言聖人作樂所以宣氣致和順陰陽也臣愚以為可因歲首發大簇之律奏雅頌之音以迎和氣時以作樂器費多遂獨行十月迎氣樂也是歲零陵獻芝草有八黄龍見於泉陵伏侯古今注曰見零陵泉陵湘水中相與戲其二大如馬有角六枚大如駒無角西域假司馬班超擊疏勒破之六年春二月辛夘琅邪王京薨夏五月辛酉趙王盱薨六月丙辰大尉鮑昱薨辛未晦日有食之秋七月癸巳以大司農鄧彪為太尉七年春正月沛王輔濟南王康東平王蒼中山王焉東海王政琅邪王宇來朝夏六月甲寅廢皇太子慶為清河王立皇子肇為皇太子己未徙廣平王羡為西平王秋八月飲酎髙廟禘祭光武皇帝孝明皇帝前書髙廟飲酎奏武德五行之舞音義云正月旦作酒八月成名曰酎酎者言醇也武帝時因八月嘗酎令諸侯出金助祭所謂酎金也丁孚漢儀式曰九眞交趾日南者用犀角二長九寸若瑇瑁甲一鬱林用象牙一長三尺已上若翠羽各二十準以當金甲辰詔書云劉攽曰案文少一曰字祖考來假明哲之祀假音格格至也尚書䕫曰於予擊石拊石搏拊琴瑟以詠祖考來格言明哲祭祀則能致祖考之神來至予末小子質又菲薄仰惟先帝烝烝之情前修禘祭以盡孝敬朕得識昭穆之序寄逺祖之思今年大禮復舉加以先帝之坐言顯宗神坐今新加之悲傷感懐樂以迎來哀以送往雖祭亡如在而空虛不知所裁庻或饗之豈亡克愼肅雍之臣辟公之相肅敬雍和相助也詩大雅曰有來雍雍至止肅肅相維辟公天子穆穆言百辟諸侯來助祭皆有肅雍之德無懈慢也皆助朕之依依依依思慕之意今賜公錢四十萬卿半之及百官執事各有差九月甲戌幸偃師東渉卷津卷縣名屬河南郡也卷音邱權反至河内下詔曰車駕行秋稼觀收穫因渉郡界皆精騎輕行無它輜重不得輒修橋道逺離城郭遣吏逢迎刺探起居刺探謂候伺也探音湯勘反出入前後以為煩擾動務省約但患不能脱粟瓢飲耳晏子相齊食脱粟之飯孔子曰顏回一瓢飲所過欲令貧弱有利無違詔書遂覽淇園前書音義曰淇園衛之苑也己酉進幸鄴勞饗魏郡守令已下至于三老門闌走卒賜錢各有差勞賜常山趙國吏人復元氏租賦三歲辛夘車駕還宫詔天下繫囚減死一等勿笞詣邉戍妻子自随占著所在父母同産欲相從者恣聽之有不到者皆以乏軍興論軍興而致闕乏當死刑也及犯殊死一切募下蠶室其女子宫繫囚鬼薪白粲已上前書曰鬼薪白粲已上皆三歲刑也男子為鬼薪取薪以給宗廟女子為白粲使擇米白粲粲然皆減本罪各一等輸司宼作亡命贖死罪入縑二十匹右趾至髠鉗城旦舂十匹完城旦至司宼三匹吏人有罪未發覺詔書到自告者半入贖冬十月癸丑西巡狩幸長安丙辰祠髙廟遂有事十一陵遣使者祠太上皇於萬年太上皇髙祖父也名煓音它官反一名執嘉三輔黄圖曰髙祖初都洛陽太上皇崩葬櫟陽北原陵號萬年仍令置萬年縣在今櫟陽東北故祭祀焉以中牢祠蕭何霍光進幸槐里岐山得銅器形似酒罇獻之又獲白鹿帝曰上無明天子下無賢方伯已見明帝紀人之無良相怨一方詩小雅也良善也言王者所為無有善者各相與於一方而怨之義見韓詩斯器亦曷為來哉公羊傳曰孔子抱麟而泣曰孰為來哉孰為來哉又幸長平御池陽宫前書音義曰長平坂在池陽南有長平觀去長安五十餘里東至髙陵造舟於涇而還造至也謂次比舟令相至為橋而度也爾雅曰天子造舟諸侯維舟大夫方舟士特舟每所到幸輒㑹郡縣吏人勞賜作樂十一月詔勞賜河東守令掾以下十二月丁亥車駕還宫是歲京師及郡國螟八年春正月壬辰東平王蒼薨三月辛夘葬東平憲王賜鑾輅龍旂夏六月北匈奴大人率衆欵塞降冬十二月甲午東巡狩幸陳留梁國淮陽潁陽戊申車駕還宫詔曰五經剖判去聖彌逺章句遺辭乖疑難正恐先師微言將遂廢絶非所以重稽古求道眞也其令羣儒選髙才生受學左氏穀梁春秋古文尚書毛詩以扶微學廣異義焉是歲京師及郡國螟元和元年春正月中山王焉來朝日南徼外蠻夷獻生犀白雉劉欣明交州記曰犀其毛如豕蹏有三甲頭女馬有三角鼻上角短額上頭上角長異物志日角中特有光耀白理如線自本逹末則為通天犀閏月辛丑濟陰王長薨二月甲戌詔曰王者八政以食為本尚書洪範八政一曰食是為政本故古者急耕稼之業致耒耜之勤耒耜農器也耒其柄耜其刄節用儲蓄以備凶災是以歲雖不登而人無飢色自牛疫已來穀食連少良由吏教未至刺史二千石不以為負負猶憂也其令郡國募人無田欲徙它界就肥饒者恣聽之到在所賜給公田為雇耕傭賃種􅀈􅀈糧也古餉字音式上反貰與田器勿收租五歲除算三年其後欲還本鄉者勿禁夏四月巳夘分東平國封憲王蒼子尚為任城王六月辛酉沛王輔薨秋七月丁未詔曰律云掠者唯得榜笞立蒼頡篇曰掠問也廣雅曰榜擊也音彭說文曰笞擊也立謂立而考訊之又令丙箠長短有數令丙為篇之次也前書音義曰令有先後有令甲令乙令丙又景帝京師定箠令箠長五尺本大一寸其竹也末薄半寸其平去節故曰長短有數也劉攽曰注景帝京師定箠令案景帝定令行於天下不止京師京師衍字也盖景似京師似帝因爾誤出自往者大獄已來掠考多酷鉆鑽之屬大獄謂楚王英等事也鉆音其亷反說文曰鉆鋷也國語曰中刑用鑽鑿皆謂慘酷其肌膚也慘苦無極念其痛毒怵然動心書曰鞭作官刑豈云若此孔安國注尚書曰以鞭為理官事之刑宜及秋冬理獄明為其禁八月甲子太尉鄧彪罷大司農鄭𢎞為太尉癸酉詔曰朕道化不德吏政失和元元未諭抵罪於下寇賊爭心不息邊野邑屋不修修或作充永惟庻事思稽厥衷與凡百君子共𢎞斯道中心悠悠將何以寄其改建初九年為元和元年郡國中都官繫囚減死一等勿笞詣邊縣妻子自随占著在所其犯殊死一切募下蠶室其女子宫繫囚鬼薪白粲以上皆減本罪一等輸司宼作亡命者贖各有差丁酉南巡狩詔所經道上郡縣無得設儲跱儲積也跱具也言不預有蓄備命司空自將徒支柱橋梁柱音竹主反有遣使奉迎探知起居二千石當坐其賜鰥寡孤獨不能自存者粟人五斛九月乙未東平王忠薨辛丑幸章陵祠舊宅園廟見宗室故人賞賜各有差冬十月己未進幸江陵詔廬江太守祠南嶽又詔長沙零陵太守祠長沙定王舂陵節侯鬱林府君還幸宛十一月己丑車駕還宫賜從者各有差十二月壬子詔曰書云父不慈子不祗兄不友弟不恭不相及也祗敬也左傳胥臣云康誥曰父不慈子不祗兄不友弟不恭不相及也今康誥之言事同而文異往者妖言大獄所及廣逺一人犯罪禁至三屬即三族也謂父族母族及妻族莫得垂纓士宦王朝如有賢才而没齒無用朕甚憐之非所謂與之更始也諸以前妖惡禁錮者一皆蠲除之左傳曰以重幣錮之杜預注曰禁錮勿令仕也以明棄咎之路但不得在宿衛而已二年春正月乙酉詔曰令云人有産子者復勿算三歲今諸懐􅗖者說文曰􅗖孕也賜胎養穀人三斛復其夫勿算一歲著以為令又詔三公曰方春生養萬物莩甲前書音義曰莩葉裏白皮也易曰百果甲坼也宜助萌陽以育時物其令有司罪非殊死且勿案騐及吏人條書相告不得聽受條事條也冀以息事寜人敬奉天氣立秋如故夫俗吏矯飾外貎似是而非揆之人事則悅耳論之陰陽則傷化朕甚饜之甚苦之安靜之吏悃愊無華說文曰悃愊至誠也悃音苦本反愊音孚逼反日計不足月計有餘莊子曰有庚桑子者偏得老聃之道以居㟪壘之山㟪壘之人相與云庚桑子之始來吾洒然異之今吾日計之不足歲計之有餘庻幾其聖人乎如襄城令劉方方字伯況平原人吏人同聲謂之不煩雖未有它異斯亦殆近之矣間勑二千石各尚寛明而今富姦行賂於下貪吏枉法於上使有罪不論而無過被刑甚大逆也夫以苛為察以刻為明以輕為德以重為威四者或興則下有怨心吾詔書數下冠盖接道而吏不加理人或失職其咎安在勉思舊令稱朕意焉二月甲寅始用四分歴續漢書曰時待詔張盛京房鮑業等以四分歴請與待詔楊岺等共課歲餘盛等所中多四分之歴始頗施行詔曰今山川鬼神應典禮者尚未咸秩咸皆也秩序也言山川之神尚未次序而祭之書曰咸秩無文其議增修羣祀以祈豐年丙辰東巡狩己未鳳皇集肥城肥城縣名屬太山郡故城在今濟州平陰縣東南乙丑帝耕於定陶詔曰三老尊年也孝悌淑行也力田勤勞也國家甚休之其賜帛人一匹勉率農功使使者祠唐堯於成陽靈臺成陽縣屬濟陰郡郭緣生述征記曰成陽縣東南有堯母慶都臺上有祠廟堯母陵俗亦名靈臺大母辛未幸太山柴告岱宗有黄鵠三十從西南來經祠壇上東北過于宫屋翺翔升降進幸奉髙壬申宗祀五帝于汶上明堂前書曰濟南人公玉帶上黄帝時明堂圖中有一殿四面無壁以茅盖通水水圜宫垣為複道上有樓從西南入名曰崑崙以拜祀上帝於是上作明堂於汶上如帶圖焉汶水出太山朱虛縣萊蕪山癸酉告祠二祖四宗二祖謂髙祖世祖四宗謂文帝為太宗武帝為世宗宣帝為中宗明帝為顯宗大㑹外内羣臣丙子詔曰朕巡狩岱宗柴望山川告祠明堂以章先勲其二王之後禮記曰存二王之後尊賢不過二代公羊傳曰存二王之後所以通三王也漢之二王殷周之後也先聖之𦙍東觀記曰孔子後襃成侯等咸來助祭東后蕃衞東后謂東方國君也諸侯為天子蕃屏故曰蕃衞伯父伯兄仲叔季弟㓜子童孫尚書吕刑文皆天子同姓諸侯有父叔兄弟子孫列者故總而同之百僚從臣宗室衆子要荒四裔要荒二服名要服去王城二千里荒服去王城二千五百里要者言可要束以文教荒者言其荒忽無常也裔逺也謂荒服之外也沙漠之北葱嶺之西西河舊事曰葱嶺山名在敦煌西其山髙大多葱故以為名焉冒耏之類字書曰耏多須貌音而言須鬢多蒙冒其面或曰西域人多著冒而長故舉以為言也劉攽曰注西域人多著冒而長案文當有一須字緣紀文言冒耏跋渉懸度草行曰跋水行曰渉左傳子太叔曰跋渉山川西域傳曰懸度者石山也溪谷不通以䋲索相引而度去陽闗五千八百五十里陵踐阻絶駿奔郊畤駿疾也音俊尚書駿奔走在廟郊畤祭天處也前書音義曰畤神靈之居止者咸來助祭祖宗功德延及朕躬予一人空虛多疚纂承尊明疚病也纂繼也盥洗享薦慙愧祗慄詩不云乎君子如祉亂庻遄已詩小雅遄速也已止也祉福也鄭𤣥注云福者福賢者謂爵禄之也如此則亂亦庶幾可疾止也歴數既從靈耀著明歴數既從謂行四分歴也靈耀著明謂日月貞明亦欲與士大夫同心自新其大赦天下諸犯罪不當得赦者皆除之復博奉髙嬴無出今年田租芻槀戊寅進幸濟南濟南縣名故城在今淄州長山縣西北三月己丑進幸魯祠東海恭王陵庚寅祠孔子於闕里及七十二弟子賜褒成侯及諸孔男女帛壬辰進幸東平祠憲王陵陵在今渾州須昌縣東甲午遣使者祠定陶太后恭王陵太后即元帝傅昭儀也定陶恭王康其陵在今漕州濟陰縣北乙未幸東阿北登太行山至天井關在今澤州晉城縣南今太行山上闗南有天井泉三所也夏四月乙巳客星入紫宫乙夘車駕還宫庚申假于祖禰假至也音格禰父廟易曰王假有廟告祠髙廟五月戊申詔曰乃者鳳皇黄龍鸞鳥比集七郡孫柔之瑞圖曰鸞鳥者赤神之精鳳皇之佐雞身赤毛色亦被五彩鳴中五音人君進退有度親疏有序則至也比類也或一郡再見及白烏神雀甘露屢臻祖宗舊事或班恩施武帝時芝草生于甘泉宫宣帝時嘉穀𤣥稷降于郡國神雀仍集皆大赦天下其賜天下吏爵人三級髙年鰥寡孤獨帛人一匹經曰無侮鰥寡惠此㷀獨加賜河南女子百户牛酒前書音義蘇林曰男子賜爵女子賜牛酒姚察云女子謂賜爵者之妻史記封禪書百户牛一頭酒十石臣賢案此女子百户若是户頭之妻不得更稱為户此謂女户頭即今之女戸也天下稱慶恩當普洽所以男户賜爵女子賜牛酒令天下大酺五日賜公卿已下錢帛各有差及洛陽人當酺者布戸一匹城外三戸共一匹賜博士員弟子見在太學者布人三匹令郡國上明經者口十萬以上五人不滿十萬三人改廬江為六安國江陵復為南郡建初四年改為江陵國今又復之徙江陵王恭為六安王秋七月庚子詔曰春秋於春每月書王者重三正慎三微也三正謂天地人之正所以有三者由有三微之月王者所當奉而成之禮記曰正朔三而改文質再而復三微者三正之始萬物皆微物色不同故王者取法焉十一月時陽氣始施於黄泉之下色皆赤赤者陽氣故周為天正色尚赤十二月萬物始牙而色白白者陰氣故陰為地正色尚白十三月萬物莩甲而出其色皆黑人得加功展業故夏為人正色尚黑尚書大傳曰夏十三月為正平旦為朔殷以十二月為正雞鳴為朔周以十一月為正夜半為朔必以三微之月為正者當爾之時物皆尚微王者受命當扶微理弱奉成之義也律十二月立春不以報囚報猶論也立春陽氣至可以施生故不論囚月令冬至之後有順陽助生之文月令仲冬是月也日短至陰陽爭諸生蕩君子身欲寧事欲静以待陰陽之所定也而無鞫獄斷刑之政朕咨訪儒雅稽之典籍以為王者生殺宜順時氣其定律無以十一月十二月報囚九月壬辰詔鳳皇黄龍所見亭部無出二年租賦東觀記曰鳳皇見肥城句窳亭槐樹上古今注云黄龍見洛陽元延亭部窳音庾加賜男子爵人二級先見者帛二十匹近者三匹太守三十匹令長十五匹丞尉半之詩云雖無德與汝式歌且舞詩小雅也取雖無大德要有喜悦之心欲歌舞也式用也它如賜爵故事丙申徴濟南王康中山王焉㑹烝祭冬十一月壬辰日南至初閉闗梁易曰老王以至日閉闗商旅不行王弼注曰冬至陰之復夏至陽之復故為復即至於寂然大靜先王則天地而行者也三年春正月乙酉詔曰盖人君者視民如父母有憯怛之憂有忠和之教匍匐之救周禮大司徒以鄉三物教萬民一曰六德謂智仁聖義忠和詩􅆁風曰凡民有喪匍匐救之其嬰兒無父母親屬及有子不能養食者稟給如律丙申北巡狩濟南王康中山王焉西平王羡六安王恭樂成王黨淮陽王昞任城王尚沛王定皆從辛丑帝耕于懷二月壬寅告常山魏郡清河鉅鹿平原東平郡太守相曰朕惟廵狩之制以宣聲教考同遐邇解釋結寃也今四國無政不用其良詩小雅曰日月告凶不用其行四國無政不用其良言四方之國無政者由天子不用善人也駕言出游欲親知其劇易前祠園陵遂望祀華霍華霍山名也今在廬江灊縣西南亦名天柱山爾雅曰華山為西嶽霍山為南嶽東柴岱宗為人祈福今將禮常山遂徂北土歴魏郡經平原升踐隄防詢訪耆老咸曰往者汴門未作深者成淵淺則泥塗追惟先帝勤人之德謂永平十二年修汴渠底績逺圖復禹𢎞業尚書曰覃懷底績孔安國注云底置績功也逺圖猶長算也言能復禹為理水之大功聖跡滂流至于海表不克堂構朕甚慙焉尚書曰若考作室既底法厥子乃不肯堂矧肯構月令孟春善相邱陵土地所宜月令孟春之月善相邱陵阪險原隰土地所宜五穀所殖以教導人必躬親之田事既飭今肥田尚多未有墾闢其悉以賦貧民給與糧種務盡地力勿令游手所過縣邑聽半入今年田租以勸農夫之勞乙丑勑侍御史司空曰方春所過無得有所伐殺車可以引避引避之騑馬可輟解輟解之夾轅者為服馬服馬外為騑馬詩云敦彼行葦牛羊勿踐履詩大雅也鄭𤣥注云敦敦然道旁之葦牧牛羊者無使踐履折傷之况於人乎禮人君伐一草木不時謂之不孝禮記孔子曰伐一樹殺一獸不以其時非孝也俗知順人莫知順天其明稱朕意戊辰進幸中山遣使者祠北嶽出長城史記蒙恬為秦築長城西自臨洮東至海癸酉還幸元氏祠光武顯宗於縣舍正堂明日又祠顯宗于始生堂皆奏樂明帝生于常山元氏傳舍也三月丙子詔髙邑令祠光武於即位壇復元氏七年徭役己夘進幸趙庚辰祠房山於靈夀靈夀縣名屬常山郡今恒州縣也房山在今恒州房山縣縣西北俗名王母山上有王母祠辛夘車駕還宫賜從行者各有差夏四月丙寅太尉鄭𢎞免大司農宋由為太尉由字叔路長安人五月丙子司空第五倫罷太僕袁安為司空秋八月乙丑幸安邑觀鹽池許愼云河東鹽池袤五十一里廣七里周百一十六里今蒲州虞鄉縣西九月至自安邑冬十月北海王基薨燒當羌叛㓂隴西是歲西域長史班超擊斬疏勒王章和元年春三月護羌校尉傅育追擊叛羌戰殁夏四月丙子令郡國中都官繫囚減死一等詣金城戍六月戊辰司徒桓虞免癸夘司空袁安為司徒光禄勲任隗為司空桓虞字仲春馮翊萬年人隗字仲和南陽宛人秋七月癸夘齊王晃有罪貶為蕪湖侯蕪湖縣名屬丹陽故城在今宣州當塗縣東南壬子淮陽王昞薨鮮卑擊破北單于斬之燒當羌㓂金城護羌校尉劉盱討之斬其渠帥壬戌詔曰朕聞明君之德啓迪鴻化緝熙康乂光照六幽緝熙光明也六幽謂六合幽隱之處也訖惟人面靡不率俾仁風翔于海表威霆行乎鬼區鬼區即鬼方然後敬恭明祀膺五福之慶獲來儀之貺尚書五福一曰夀二曰富三曰康寜四曰攸好德五曰考終命來儀謂鳳也書曰鳳皇來儀朕以不德受祖宗𢎞烈乃者鳳皇仍集麒麟並臻甘露宵降嘉穀滋生芝草之類歲月不絶朕夙夜祗畏上天無以彰于先功今改元和四年為章和元年秋令是月養衰老授几杖行糜粥飲食月令仲秋之月其賜髙年二人共布帛各一匹以為醴酪死罪囚犯法在丙子赦前而後捕繫者皆減死勿笞詣金城戌八月癸酉南廵狩壬午遣使者祠昭靈后於小黄園小黄縣屬陳留郡故城在今汴州陳留縣東北漢舊儀曰昭靈后髙祖母起兵時死小黄北後為作園廟于小黄栅陳留風俗傳曰沛公起兵野戰喪皇妣于黄鄉天下平定仍使使者以梓宫招魂幽野於是丹蛇在水自洒濯之入于梓宫其浴處有遺髮故諡曰昭靈夫人劉攽曰注天下平定仍使使者案仍當作乃仍者重複之辭無用于此甲申徴任城王尚㑹雎陽戊子幸梁己丑遣使祠沛髙原廟豐枌榆社前書音義曰枌白榆髙祖里社在豐縣東北十五里原廟解見光武紀乙未幸沛祠獻王陵徴㑹東海王政乙未晦日有食之九月庚子幸彭城東海王政沛王定任城王尚皆從辛亥幸夀春壬子詔郡國中都官繫囚減死罪一等詣金城戍犯殊死者一切募下蠶室其女子宫繫囚鬼薪白粲已上減罪一等輸司寇作亡命者贖死罪縑二十匹右趾至髠鉗城旦舂七匹完城旦至司寇三匹吏民犯罪未發覺詔書到自告者半入贖復封阜陵侯延為阜陵王己未幸汝陰縣名屬汝南郡今潁川縣冬十月丙子車駕還宫北匈奴屋蘭儲等率衆降是歲西域長史班超擊莎車大破之月氏國遣使獻扶拔師子扶拔似麟無角拔音歩末反二年春正月濟南王康阜陵王延中山王焉來朝壬辰帝崩於章德前殿年三十三遺詔無起寢廟一如先帝法制論曰魏文帝稱明帝察察章帝長者以上華嶠之辭章帝素知人厭明帝苛切事從寛厚感陳寵之義除慘獄之科寵時為尚書以吏政嚴切乃上書除慘酷之科五十餘條具本傳也深元元之愛著胎養之令元和二年令諸懷􅗖者賜穀人三斛奉承明德太后盡心孝道割裂名都以崇建周親周至也平徭簡賦而人賴其慶又體之以忠恕文之以禮樂故乃蕃輔克諧羣后德讓謂之長者不亦宜乎在位十三年郡國所上符瑞合於圖書者數百千所烏呼懋哉懋美也贊曰肅宗濟濟天性愷悌於穆后德諒惟淵體於穆歎美也尚書曰齊聖廣淵也左右蓺文斟酌律禮蓺文謂諸儒講五經同異帝親稱制論決也律謂詔云立春不以報囚也禮謂修禘祫登靈䑓之屬思服帝道𢎞此長懋儒館獻歌戎亭虛候獻歌謂崔駰游太學時上四廵等頌氣調時豫憲平人富後漢書卷三後漢書卷三考證章帝紀正雅樂雅宋本作予王應麟困學紀聞曰東都賦本作正予樂五臣改作雅樂飲酎高廟注九眞交趾日南者用犀角二者字似當作皆甲辰詔書云注劉攽曰按文少一曰字此注應在書云二字之上謂詔字下脱去曰字也徙江陵王恭為六安王此句之下何焯校本增廣平王羡為西平王八字今諸本俱無存以備考祠房山於靈夀注房山今恒州房山縣縣西北下縣縣字疑衍後漢書卷三考證
