body:
  text: 後漢書卷八十宋宣城太守范煜撰唐章懐太子賢注孝明八王列傳第四十孝明皇帝九子賈貴人生章帝隂貴人生梁節王暢餘七王本書不載母氏本書謂東觀記也千乘哀王建傳千乘哀王建永平三年封明年薨年少無子國除陳敬王羡傳陳敬王羡永平三年封廣平王建初三年有司奏遣羡與鉅鹿王恭樂成王黨俱就國肅宗性篤愛不忍與諸王乖離遂皆留京師明年案輿地圖令諸國户口皆等租入嵗各八千萬羡博渉經書有威嚴與諸儒講論於白虎殿七年帝以廣平在北多有邊費廣平縣故城在今洛州永年縣北乃徙羡為西平王西平縣屬汝南郡也分汝南八縣為國及帝崩遺詔徙封為陳王食淮陽郡其年就國立三十七年薨子思王鈞嗣鈞立多不法遂行天子大射禮天子將祭擇土而祭謂之大射大射之禮張三侯虎侯熊侯豹侯示服猛也皆以其皮方制之樂用騶虞九節謝承書曰陳國户曹史髙慎諫國相曰諸侯射豕天子射熊八彛六樽禮數不同昔季氏設朱干玉戚以舞大夏左傳曰唯名與器不可以假人奢僣之漸不可聼也於是諫争不合為王所非坐司宼罪也性隐賊喜文法國相二千石不與相得者輙隂中之憎怨敬王夫人李儀等永元十一年遂使客隗久久或作文殺儀家屬吏捕得久繫長平獄長平縣屬陳國鈞欲斷絶辭語復使結客簒殺久事發覺有司舉奏鈞坐削西華項新陽三縣西華故城在今陳州溵水縣西北項今陳州項城縣也新陽故城今在豫州真陽縣西南也十二年封鈞六弟為列侯伏侯古今注曰番為陽都鄉侯千秋為新平侯參為周亭侯夀為樂陽亭侯寳為博平侯旦為高亭侯也後鈞取掖庭出女李嬈為小妻嬈音寧了反復坐削圉宜禄扶溝三縣圉扶溝並屬陳留郡宜禄屬汝南郡永初七年封敬王孫安國為耕亭侯鈞立二十一年薨子懐王竦嗣立二年薨無子國絶永寧元年立敬王子安夀亭侯崇為陳王是為頃王立五年薨子孝王承嗣承薨子愍王寵嗣熹平二年國相師遷追奏前相魏愔與寵共祭天神希幸非冀罪至不道有司奏遣使者案騐是時新誅勃海王悝靈帝熹平元年悝被誣謀反自殺也靈帝不忍復加法詔檻車傳送愔遷詣北寺詔獄使中常侍王酺華嶠書及宦者傳諸本並作甫此云酺未詳孰是也與尚書令侍御史雜考愔辭與王共祭黄老君劉攽曰案文黄老君不成文當云黄帝老君求長生福而已無它冀幸酺等奏愔職在匡正而所為不端遷誣告其王罔以不道皆誅死有詔赦寵不案寵善弩射十發十中中皆同處華嶠書曰寵射其秘法以天覆地載參連為竒又有三微三小三微為經三小為緯經緯相將萬勝之方然要在機牙中平中黄巾賊起郡縣皆棄城走寵有彊弩數千張出軍都亭置軍營於國之都亭也國人素聞王善射不敢反叛故陳獨得完百姓歸之者衆十餘萬人及獻帝初義兵起寵率衆屯陽夏縣名屬淮陽國夏音公雅反自稱輔漢大將軍國相會稽駱俊素有威恩時天下饑荒鄰郡人多歸就之俊傾資賑贍並得全活後袁術求糧於陳而俊拒絶之術忿恚遣客詐殺俊及寵陳由是破敗謝承書曰俊字孝逺烏傷人察孝亷補尚書侍郎擢拜陳國相人有産子厚致米肉逹府主意生男女者以駱為名袁術使部曲將張闓陽私行到陳之俊所俊徃從飲酒因詐殺俊一郡吏人哀號如喪父母是時諸國無復租禄而數見虜奪并日而食轉死溝壑者甚衆夫人姬妾多為丹陵兵烏桓所略云彭城靖王恭傳彭城靖王恭永平九年賜號靈夀王取其美名也下重熹王亦同東觀記曰賜號未有國邑也十五年封為鉅鹿王建初三年徙封江陵王改南郡為國元和二年三公上言江陵在京師正南不可以封乃徙為六安王以廬江郡為國肅宗崩遺詔徙封彭城王食楚郡其年就國恭敦厚威重舉動有節度吏人敬愛之永初六年封恭子阿奴為竹邑侯竹邑縣屬沛郡故城在今徐州符離縣也竹邑或為邕字傳冩誤也元初三年恭以事怒子酺酺自殺東觀記曰恭子男丁前物故酺侮慢丁小妻恭怒閉酺馬廐酺亡夜詣彭城縣欲上書恭遣從官倉頭曉令歸数責之乃自殺也國相趙牧以状上因誣奏恭祠祀惡言大逆不道有司奏請誅之恭上書自訟朝廷以其素著行義令考實無徵牧坐下獄㑹赦免死決録注曰牧字仲師長安人少知名以公正稱修春秋事樂恢恢以直諌死牧為陳寃得申髙第為侍御史㑹稽太守皆有稱績及誣奏恭安帝疑其侵乃遣御史母丘歆覆案其事實下牧廷尉㑹赦不誅終於家恭立四十六年薨子考王道嗣元初五年封道弟三人為鄉侯東觀記曰丙為都鄉侯國為安鄉侯丁為魯陽鄉侯恭孫順為東安亭侯道立二十八年薨子頃王定嗣本初元年封定兄弟九人皆為亭侯東觀記曰定兄據卞亭侯弟光昭陽亭侯固公梁亭侯興蒲亭侯延昌城亭侯祀梁父亭侯堅西安亭侯代林亭侯也定立四年薨子孝王和嗣和性至孝太夫人薨行喪陵次毁胔過禮傅相以聞桓帝詔使奉牛酒迎王還宫和敬賢樂施國中愛之初平中天下大亂和為賊昌務所攻避奔東阿後得還國立六十四年薨孫祗嗣立七年魏受禪以為崇徳侯樂成靖王黨傳樂成靖王黨永平九年賜號重熹王十五年封樂成王黨聰慧善史書喜正文字與肅宗同年尤相親愛建初四年以清河之游觀津勃海之東光成平􅃰郡之中水饒陽安平南深澤八縣益樂成國前書及郡國志清河無游縣觀津故城在今徳州蓨縣東北東光在滄州東光縣南成平在景城縣南中水在今瀛州樂夀縣西北南深澤在今定州深澤縣東也及帝崩其年就國黨急刻不遵法度舊禁宫人出嫁不得適諸國有故掖庭技人哀置嫁為男子章初妻哀姓置名也稱男子者無官爵也黨召哀置入宫與通初欲上書告之黨恐懼乃宻賂哀置姊焦使殺初事發覺黨乃縊殺内侍三人以絶口語又取故中山簡王傅婢李羽生為小妻永元七年國相舉奏之和帝詔削東光􅀈二縣鄭縣屬鉅鹿郡􅀈音𦍑堯反立二十五年薨子哀王崇嗣立二月薨無子國絶明年和帝立崇兄脩侯廵為樂成王是為釐王脩縣及條縣皆屬勃海條字或作脩立十五年薨子隐王賔嗣立八年薨無子國絶明年復立濟北恵王子萇為樂成王後萇到國數月驕滛不法愆過累積冀州刺史與國相舉奏萇罪至不道安帝詔曰萇有靦其面而放逸其心􅌤姡也言靣姡然無媿姡音胡八反知陵廟至重承繼有禮不惟致敬之節肅穆之慎乃敢擅損犠牲不備苾芬詩小雅曰苾苾芬芬祀事孔明慢易大姬不震厥教大姬即萇所繼之母震懼也出入顛覆風滛于家娉取人妻饋遺婢妾歐擊吏人專已凶暴愆罪莫大甚可恥也朕覽八辟之議不忍致之于理周禮司宼以八辟麗邦法一曰議親之辟二曰議故之辟三曰議賢之辟四曰議能之辟五曰議功之辟六曰議貴之辟七曰議勤之辟八曰議賓之辟其貶萇爵為臨湖侯臨湖屬廬江郡朕無則哲之明致簡統失序罔以尉承大姬増懐永歎袁宏紀曰尚書侍郎冷宏議以為自非聖人不能無過故王太子生為立賢師傅以訓導之是以目不見惡耳不聞非能保其社稷高明令終萇少長藩國内無過庭之訓外廡師傅之道血氣方剛卒受榮爵幾㣲生過遂䧟不義臣聞周官議親惷愚見赦萇不殺無辜以譴呵為非無赫赫大惡可裁削奪損其租賦令得改過自新革心向道案黄香集香與宏共奏此香之辭也延光元年以河間孝王子得嗣靖王後以樂成比廢絶故改國曰安平是為安平孝王立三十年薨子續立中平元年黄巾賊起為所劫質囚于廣宗今貝州宗城縣也随室諱改焉賊平復國其年秋坐不道被誅立三十四年國除下邳恵王衍傳下邳恵王衍永平十五年封衍有容貎肅宗即位常在左右建初初冠詔賜衍師傅已下官屬金帛各有差四年以臨淮郡及九江之鍾離當塗東城歴陽全椒合十七縣益下邳國鍾離在今濠州鍾離縣東當塗在縣西南東城在定逺縣東南歴陽和州縣也全椒今滁州縣也帝崩其年就國衍後病荒忽而太子卭有罪廢諸姬争欲立子為嗣連上書相告言和帝憐之使彭城靖王恭至下邳正其嫡庶立子成為太子東觀記載賜恭詔曰皇帝問彭城王始夏無恙盖聞堯親九族萬國協和書典之所美也下邳王被病沈滯之疾昏亂不明家用不寜姬妾嫡庶諸子分爭紛紛至今前太子卭頑凶失道陷于大辟是後諸子更相誣告迄今適嗣未知所定朕甚傷之惟王與下邳王恩義至親正此國嗣非王而誰禮重適庶之序春秋之義大居正孔子曰惟仁者能好人能惡人貴仁者所好惡得其中也太子國之儲嗣可不愼歟王其差次下邳諸子可為太子者上名將及景風拜授印綬焉衍立五十四年薨子貞王成嗣永建元年封成兄二人及恵王孫二人皆為列侯成立二年薨子愍王意嗣陽嘉元年封意弟八人為鄉亭侯中平元年意遭黄巾棄國走賊平復國數月薨立五十七年年九十子哀王宜嗣數月薨無子建安十一年國除梁節王暢傳梁節王暢永平十五年封為汝南王母隂貴人有寵暢尤被愛幸國土租入倍於諸國肅宗立縁先帝之意賞賜恩寵甚篤建初二年封暢舅隂棠為西陵侯西陵縣屬江夏郡四年徙為梁王以陳留之郾寧陵濟隂之薄單父己氏成武凡六縣益梁國郾今許州郾陵縣也寜陵今宋州縣也薄故城在今曺州考城縣東北單父今宋州縣也已氏今宋州楚丘縣也成武今􅈠州縣也帝崩其年就國暢性聰惠然少貴驕頗不遵法度歸國後數有惡夢從官卞忌自言能使六丁善占夢六丁謂六甲中丁神也若甲子旬中則丁卯為神甲寅旬中則丁巳為神之類也役使之法先齋戒然後其神至可使致遠方物及知吉凶也暢數使卜筮又暢乳母王禮等因此自言能見鬼神事遂共占氣祠祭求福忌等諂媚云神言王當為天子暢心喜與相應荅永元五年豫州刺史梁相舉奏暢不道考訊辭不服有司請徴暢詣廷尉詔獄和帝不許有司重奏除暢國徙九真帝不忍但削成武單父二縣暢慙懼上疏辭謝曰臣天性狂愚生在深宫長養傅母之手信惑左右之言及至歸國不知防禁從官侍史利臣財物熒惑臣暢臣暢無所昭見與相然諾不自知陷死罪以至考案肌慄心悸自悔無所復及自謂當即時伏顯誅魂魄去身分歸黄泉不意陛下聖徳枉法曲平不聼有司曲平曲法申恩平處其罪横貸赦臣戰慄連月未敢自安上念以負先帝而令陛下為臣收汙天下汙惡也天下以帝赦王為惡故言收惡天下也誠無氣以息筋骨不相連臣暢知大貸不可再得自誓束身約妻子不敢復出入失䋲墨不敢復有所横費租入有餘乞裁食雎陽榖孰虞蒙寧陵五縣還餘所食四縣臣暢小妻三十七人其無子者願還本家自選擇謹勑奴婢二百人其餘所受虎賁官騎及諸工技鼓吹蒼頭奴婢兵弩廐馬皆上還本署臣暢以骨肉近親亂聖化汙清流既得生活誠無心靣目以凶惡復居大宫食大國張官屬藏什物願陛下加大恩開臣自悔之門假臣遷善之路令天下知臣䝉恩得去死就生頗能自悔臣以公卿所奏臣罪惡詔書常置於前晝夜誦讀臣小人貪見明時不能即時自引惟陛下哀臣令得喘息漏刻若不聼許臣實無顔以久生下入黄泉無以見先帝此誠臣至心臣欲多還所受恐天恩不聼許節量所留於臣暢饒足詔報曰朕惟王至親之屬淳淑之美傅相不良不能防邪至令有司紛紛有言今王深思悔過端自克責朕惻然傷之志匪由于咎在彼小子謂由卞忌及王禮等也一日克己復禮天下歸仁王其安心静意茂率休徳易不云乎一謙而四益小有言終吉易謙卦曰天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙為謙是一而天地神人皆益之故曰一謙而四益訟卦初六曰小有言終吉言王雖小有訟言而終吉也强食自愛暢固讓章數上卒不許立二十七年薨子恭王堅嗣永元十六年封堅弟二人為鄉亭侯堅立二十六年薨子懐王匡嗣永建二年封匡兄弟七人為鄉亭侯匡立十一年薨無子順帝封匡弟孝陽亭侯成為梁王是為夷王立二十九年薨子敬王元嗣立十六年薨子彌嗣立四十年魏受禪以為崇徳侯淮陽頃王昞傳淮陽頃王昞永平五年封常山王建初四年徙為淮陽王以汝南之新安西華益淮陽國立十六年薨未及立嗣永元二年和帝立昞小子側復為常山王奉昞後是為殤王立十三年薨父子皆未之國並葬京師側無子其月立兄防子侯章為常山王和帝憐章早孤數加賞賜延平元年就國立二十五年薨是為靖王子頃王儀嗣永建二年封儀兄二人為亭侯儀立十七年薨子節王豹嗣永嘉元年封豹兄四人為亭侯豹立八年薨子暠嗣三十二年遭黄巾賊棄國走建安十一年國除濟隂悼王長傳濟隂悼王長永平十五年封建初四年以東郡之離孤陳留之長垣益濟隂國立十三年薨于京師無子國除論曰晏子稱夫人生厚而用利於是乎正徳以幅之謂之幅利言人情須節以正其徳亦由布帛須幅以成其度焉左傳云齊景公與晏子邶殿之邑六十晏子不受曰夫富如布帛之有幅焉為之度使無遷也夫人生厚而用利於是正徳以幅之謂之幅利過則為敗吾不敢貪多所謂幅也明帝封諸子租嵗不過二千萬馬后為言而不得也東觀明紀曰皇子之封皆减舊制嘗案輿地圖皇后在旁言鉅鹿樂成廣平各數縣租穀百萬帝令滿二千萬止諸小王皆當畧與楚淮陽相比什減三四我子不當與先帝子等者也賢哉豈徒儉約而已乎知驕貴之無猒嗜欲之難極也故東京諸侯鮮有至於禍敗者也贊曰孝明傳𦙍維城八國陳敬嚴重彭城厚徳下邳嬰痾梁節邪惑三藩夙齡謂千乘淮陽濟隂並早殁黨惟荒忒後漢書巻八十後漢書卷八十考證陳敬王羡傳徙封為陳王食淮南郡臣會汾按諸本或作淮南或作淮陽皆非也前後書志兩漢並無淮南淮陽郡名前漢之淮陽國即後漢之陳國也陳與淮陽既為一所則徙封陳王之下不湏更言食淮陽郡以上下文義參之明是汝南郡無疑也前云徙為西平王分汝南八縣為國至此雖徙封陳王而所食租税仍兼汝南正所以優異之陳與汝南並𨽻豫州刺史部也下云坐削西華項新陽三縣又坐削圉宜禄扶溝三縣據郡國志西華項新陽宜禄並屬汝南則監本僅誤一淮字别本作淮陽尤為謬矣愔辭與王共祭黄老君注劉攽曰按文黄老君不成文當云黄帝老君刋誤補遺曰真誥云大洞之道至精至妙是守素真人之經昔中央黄老君秘此經世不知也則道家又自有黄老君多為丹陵兵烏桓所略云陵監本誤作陽今改正樂成靖王黨傳子續立續字一本作績後漢書巻八十考證
