body:
  text: 後漢書卷二十一梁剡令劉昭補并注天文志第十一天文中明十二六章五安四十和三十三順二十三殤一質三孝明永平元年四月丁酉流星大如斗起天市樓西南行光照地流星為外兵西南行為西南夷是時益州發兵撃姑復蠻夷太牟替滅陵斬首傳詣雒陽古今注曰閏九月辛未火在太微左執法星所光芒相及十一月辛未土逆行乘東井北軒轅第二星二年十二月戊辰月食火星黄帝星經曰出入井為人主一曰陽爵禄事三年六月丁卯彗星出天舩北長二尺所稍北行至亢南百三十五日去天舩為水彗出之為大水是嵗伊雒水溢到津城門壞伊橋郡七縣三十二皆大水四年八月辛酉客星出梗河西北指貫索七十日去梗河為胡兵至五年十一月北匈奴七千騎入五原塞十二月又入雲中至原陽貫索貴人之牢其十二月陵鄉侯梁松坐怨望懸飛書誹謗朝廷下獄死妻子家屬徙九真七年正月戊子流星大如杯從織女西行光照地織女天之真女流星出之女主憂其月癸卯光烈皇后崩古今注曰三月庚戌客星光氣二尺所在太微左執法南端門外凡見七十五日八年六月壬午長星出栁張三十七度犯軒轅刺天舩陵太微氣至上階凡見五十六日去柳周地是嵗多雨水郡十四傷稼古今注曰十二月戊子客星出東方九年正月戊申客星出牽牛長八尺歴建星至房南古今注曰歴斗建箕房過角亢至翼芒東指滅見至五十日郗萌占曰客星舍房左右羣臣有吞藥死者又占有奪地牽牛主吳越房心為宋後廣陵王荆與沈涼楚王英與顔忠各謀逆事覺皆自殺廣陵屬吳彭城古宋地古今注曰十年七月甲寅月犯嵗星十一年六月壬辰火犯土星十三年閏月丁亥火犯輿鬼為大喪質星為大臣誅戮晉灼曰鬼五星其中白者為質其十二月楚王英與顔忠等造作妖謀反事覺英自殺忠等皆伏誅古今注曰十一月客星出軒轅四十八日十二月戊午月犯木星十四年正月戊子客星出昴六十日在軒轅右角稍滅昴主邊兵後一年漢遣奉車都尉顯親侯竇固駙馬都尉耿秉騎都尉耿忠開陽城門候秦彭太僕祭肜將兵撃匈奴一曰軒轅右角為貴相昴為獄事客星守之為大獄是時考楚事未訖司徒虞延與楚王英黨與黄初公孫宏等交通皆自殺或下獄伏誅十五年十一月乙丑太白入月中為大将戮人主亡不出三年後三年孝明帝崩十六年正月丁丑嵗星犯房右驂北第一星不見辛巳乃見石氏星經曰嵗星守房良馬出厩古今注曰正月丁未月犯房房右驂為貴臣嵗星犯之為見誅是後司徒邢穆坐與阜陵王延交通知逆謀自殺四月癸未太白犯畢畢為邊兵後北匈奴宼入雲中至咸陽使者髙𢎞發三郡兵追討無所得太僕祭肜坐不進下獄十八年六月己未彗星出張長三尺轉在郎将南八太微皆屬張張周地為東郡太微天子廷彗星犯之為兵喪其八月壬子孝明帝崩孝章建初元年正月丁巳太白在昴西一尺八月庚寅彗星出天市長二尺所稍行入牽牛三度積四十日稍滅太白在昴為邊兵彗星出天市為外軍牽牛為吳越是時蠻夷陳縱等及哀牢王類反攻蕉唐城永昌太守王尋走奔楪榆安夷長宋延為羌所殺以武威太守傅育領䕶羌校尉馬防行車騎將軍征西羌又阜陵王延與子男魴謀反大逆無道得不誅廢為侯二月九日古今注曰甲申金入斗魁甲寅流星過紫宮中長數丈散為三滅十二月戊寅彗星出婁三度長八九尺稍入紫宮中百六日稍滅流星過入紫宮皆大人忌後四年六月癸丑明德皇后崩古今注曰五年二月戊辰木火俱在參三月戊寅木火在東井六年七月丁酉夜有流星起軒轅大如拳歴文昌餘氣正白句曲西如文昌久久乃滅黄帝星經曰木守東井有土功之事一曰大水郗萌曰嵗星守參后當之熒惑守大人當之元和元年四月丁巳客星晨出東方在胃八度長三尺歴閣道入紫宮留四十日滅閣道紫宮天子之宮也客星犯入留久為大喪後四年孝章皇帝崩孝和永元元年正月辛卯有流星起參長四丈古今注曰大如拳起參東南有光色黄白古今注曰癸亥鎮在參又流星大如桃色赤起太微東蕃石氏曰鎮守參有土功事二月流星起天棓東北行三丈所滅色青白壬申夜有流星起太微東蕃長三丈三月古今注曰戊子土在參丙辰流星起天津古今注曰星大如桃起天津東至斗黃白頻有光壬戌有流星起天將軍東北行古今注曰色黄無光參為邊兵天棓為兵太微天廷天津為水天將軍為兵流星起之皆為兵其六月漢遣車騎將軍竇憲執金吾耿秉與度遼將軍鄧鴻出朔方並進兵臨私渠北鞮海斬虜首萬餘級獲生口牛馬羊百萬頭日逐王等八十一部降凡三十餘萬人追單于至西海是嵗七月又雨水漂人民是其應古今注曰十一月壬申鎮星在東井石氏曰天下水其大出流殺人二年正月乙卯金木俱在奎丙寅水又在奎巫咸曰辰守奎多水火災亦為旱古今注曰土在東井奎主武庫兵三星㑹又為兵喪辛未水金木在婁亦為兵又為匿謀郗萌曰辰守婁有兵兵罷兵起巫咸石氏云多火災古今注曰丙寅水在奎土在東井金在婁木火在昴二月丁酉有流星大如桃起紫宮東蕃西北行五丈稍滅古今注曰三月甲子火在亢南端門第一星南乙亥金在東井四月丙辰有流星大如𤓰起文昌東北西南行至少微西滅有頃音如雷聲已而金在軒轅大星東北二尺所古今注曰丁丑火在氐東南星東南八月丁未有流星如雞子起太微西東南行四丈所消十月癸未有流星大如桃起天津西行六丈所消十一月辛酉有流星大如拳起紫宮西行到胃消三年九月丁卯有流星大如鷄子起紫宮西南至北斗柄間消星紫宮占曰有流星出紫宮天子使也色赤言兵色白言喪色黄言吉色青言憂色黑言水出皆以所之野命東西南北紫宮天子宮文昌少微為貴臣天津為水北斗主殺流星起歴紫宮文昌少微天津文昌為天子使出有兵誅也竇憲為大將軍憲弟篤景等皆卿校尉憲女弟壻郭舉為侍中射聲校尉與衛尉鄧疊母元俱出入宮中謀為不軌至四年六月丙寅發覺和帝幸北宮詔執金吾五校勒兵屯南北宮閉城門捕舉舉父長樂少府璜及疊疊弟歩兵校尉磊母元皆下獄誅憲弟篤景等皆自殺金犯軒轅女主失勢竇氏被誅太后失勢五年古今注曰正月甲戍月乘嵗星四月癸巳太白熒惑辰星俱在東井巫咸曰太白守井五榖不成黄帝經曰五星及客星守井皆為水石氏曰為旱又曰太白入東井留一日以上乃占大臣當之期三月若一年遠五年古今注曰木在輿鬼七月壬午嵗星犯軒轅大星九月金在南斗魁中為水石氏曰為旱火犯房北第一星東井秦地為法三星合内外有兵又為法令及水金入斗口中為大将将死火犯房北第一星為将相其六年正月司徒丁鴻薨古今注曰六年六月丁亥金在東井閏月己丑流星大如桃起參北西至參肩南稍有光七月水大漂殺人民傷五榖許侯馬光有罪自殺九月行車騎将軍事鄧鴻越騎校尉馮柱發左右羽林北軍五校士及八郡跡射烏桓鮮卑合四萬騎與度遼將軍朱徴䕶烏桓校尉任尚中郎將杜崇征叛胡十二月車騎將軍鴻坐追虜失利下獄死度遼將軍徴中郎將崇皆抵罪七年正月丁未有流星起天津入紫宮中滅色青黃有光二月癸酉金火俱在參巫咸占曰熒惑守參多火災海中占曰為旱太白守參國有反臣郗萌曰有攻戰伐國也戊寅金火俱在東井郗萌曰熒惑守井百川皆滿太白又從舍蓋二十日流國又曰雜糴貴又將相死八月甲寅水土金俱在軫春秋緯曰五星有入軫者皆為兵大起巫咸占曰五星入軫者司其出日而數之期二十日皆為兵發司始八處之率一日期十日軍罷石氏星經曰辰星守軫嵗水郗萌曰鎮星出入留舍軫六十日不下必有大喪春秋緯曰太白八軫兵太起郗萌曰太白守軫必有死亡十一月甲戍金火俱在心雒書曰太白守心後九年大饑十二月己卯有流星起文昌入紫宮消丙辰火金水俱在斗流星入紫宮金火在心皆為大喪三星合軫為白衣之㑹金火俱在參東井皆為外兵有死將三星俱在斗有戮將若有死相八年四月樂成王黨七月樂成王宗皆薨將兵長史吳棽坐事徴下獄誅古今注曰永元八年九月辛丑夜有流星大如拳起婁十月北海王威自殺十二月陳王羡薨其九年閏月皇太后竇氏崩遼東鮮卑太守祭參不追虜徴下獄誅九月司徒劉方坐事免官自殺隴西羌反遣執金吾劉尚行征西將軍事越騎校尉節鄉侯趙世發北軍五校黎陽雍營及邊胡兵三萬騎征西羌十一年五月丙午流星大如𤓰起氐西南行稍有光白色古今注曰六月庚辰月入畢中占曰流星白為有使客大為大使小亦小使疾期疾遲亦遲大如𤓰為近小行稍有光為遲也又正王日邊方有受王命者也明年二月蜀郡旄牛徼外夷白狼樓薄種王唐繒等率種人口十七萬歸義内屬賜金印紫綬錢帛十二年十一月癸酉夜有蒼白氣長三丈起天園東北指軍市見積十日占曰兵起十日期嵗明年十一月遼東鮮卑二千餘騎寇右北平十三年古今注曰正月辛未水乘輿鬼十二月癸巳犯軒轅大星十一月乙丑軒轅第四星間有小客星色青黄軒轅為後宫星出之為失勢其十四年六月辛卯隂皇后廢古今注曰十四年正月乙卯月犯軒轅在太微中二月十日丁酉水入太微西門十一月丁丑有流星大如拳起北斗魁中北至閣道稍有光色赤黄須臾西北有雷聲十六年四月丁未紫宮中生白氣如粉絮戊午客星從紫宮西行至昴五月壬申滅七月庚午水在輿鬼中黄帝占曰辰星犯昴大臣誅國有憂郗萌曰多蝗蟲十月辛亥流星起鉤陳北行三丈有光色黄白氣生紫宮中為喪客星從紫宮西行至昴為趙輿鬼為死喪鉤陳為皇后流星出之為中使後一年元興元年十月二日和帝崩殤帝即位一年又崩無嗣鄧太后遣使者迎清河孝王子即位是為孝安皇帝是其應也清河趙地也元興元年二月庚辰有流星起角亢五丈所四月辛亥有流星起斗東北行到須女七月己巳有流星起天市五丈所光色赤閏月辛亥水金俱在氐巫咸曰辰星守氐多水災海中占曰天下大旱所在不收荆州星占曰太白守氐國君大哭流星起斗東北行至須女須女燕地天市為外軍水金㑹為兵誅其年遼東貃人反鈔六縣發上谷漁陽右北平遼西烏桓討之孝殤帝延平元年正月丁酉金火在婁金火合為爍為大人憂古今注曰七月甲申月在南斗中是嵗八月辛亥孝殤帝崩孝安永初元年五月戊寅熒惑逆行守心前星韓楊占曰多火災一曰地震檢其年十八郡地震明年漢陽火八月戊申客星在東井弧星西南心為天子明堂熒惑逆行守之為反臣雒書曰熒惑守心逆臣起黄帝占曰逆行守心二十日大臣亂客星在東井為大水荆州經曰客星干犯東井則大臣誅是時安帝未臨朝鄧大后攝政鄧騭為車騎將軍弟元悝閻皆以校尉封侯秉國勢司空周章意不平與王尊叔元茂等謀欲閉宮門捕將軍兄弟誅常侍鄭衆蔡倫劫刺尚書廢皇太后封皇帝為遠國王事覺章自殺東井弧皆秦地是時羌反斷隴道漢遣騭將左右羽林北軍五校及諸郡兵征之是嵗郡國四十一縣三百一十五雨水四瀆溢傷秋稼壊城郭殺人民是其應也二年正月戊子太白晝見古今注曰四月乙亥月入南斗魁中八月己亥熒惑出入太微端門三年正月庚戍月犯心後星河圖曰亂臣在旁己亥太白入斗中古今注曰三月壬寅熒惑入輿鬼中五月丙寅太白入畢中石氏經曰太白守畢國多淫刑也十二月彗星起天苑南東北指長六七尺色蒼白太白晝見為強臣前志曰太白晝見強國弱小國強女主昌是時鄧氏方盛月犯心後星不利子心為宋五月丁酉沛王牙薨太白入斗中為貴相凶臣昭案楊厚對曰以為諸王子多在京師容有非常宜亟發遣還本國太后從之星尋滅不見以斯而言太白入之災在貴相天苑為外軍彗星出其南為外兵是後使羌氐討賊李貴又使烏桓擊鮮卑又使中郎將任尚䕶羌校尉馬賢擊羌皆降四年古今注曰二月丙寅月犯軒轅大星六月丙子客星大如李蒼白芒氣長二尺西南指上階星癸酉太白入輿鬼指上階為三公後太尉張敏免官太白入輿鬼為將凶後中郎將任尚坐贓千萬檻車徴棄市韓揚占曰太白入輿鬼亂臣在内臣昭以占為明堂任尚所能感也五年六月辛丑太白晝見經天春秋漢含孳曰陽弱辰逆太白經天注云陽弱君柔不堪鈎命決曰天失仁太白經天元初元年三月癸酉熒惑入輿鬼二年九月辛酉熒惑入輿鬼中三年三月熒惑入輿鬼中五月丙寅太白入畢口黄帝占曰火攻近期十五日遠期四十日又曰大臣當之亂國易主七月甲寅嵗星入輿鬼閏月己未太白犯太微左執法十一月甲午客星見西方己亥在虛危南至胃昴郗萌曰客星入虚大人當之又曰客星守危強臣執國命在后族又且大風有危敗黄帝星經曰客星入守若出危大饑民食貴四年正月丙戍嵗星留輿鬼中石氏經曰嵗星入留輿鬼五十日不下民有大喪百日不下民半死黄帝星經曰守鬼十日金錢散諸侯郗萌曰五榖多傷民以饑死者無數乙未太白晝見丙上四月壬戍太白入輿鬼中石氏占太白入鬼一曰病在女主一曰將戮死己巳辰星入輿鬼中郗萌曰以罪誅大臣一曰后疾一曰大人憂五月己卯辰星犯嵗星六月丙申熒惑入輿鬼中戊戍犯輿鬼大星九月辛巳太白入南斗口中黄帝經曰大人當之國易政五年三月丙申鎮星犯東井鉞星五月庚午辰星犯輿鬼質星丙戌太白犯鉞星六年四月癸丑太白入輿鬼郗萌曰太白守輿鬼疾在女主六月丙戌熒惑在輿鬼中黄帝經曰熒惑犯守鬼國有大喪有女喪大將有死者荆州星占曰熒惑犯鬼忠臣戮死不出一年中丁卯鎮星在輿鬼中黄帝經曰鎮八鬼中大臣誅海中石氏曰大人憂辛巳太白犯左執法自永初五年到永寧十年之中太白一晝見經天再入輿鬼一守畢再犯左執法入南斗犯鉞星熒惑五入輿鬼鎮星一犯東井鉞星一入輿鬼嵗星辰星再入輿鬼凡五星入輿鬼中皆為死喪熒惑太白甚犯鉞質星為誅戮斗為貴將執法為近臣客星在虛危為喪為哭泣星占曰不一年遠期二年昴畢為邊兵又為獄事至建光元年三月癸巳鄧太后崩五月庚辰太后兄車騎將軍騭等七侯皆免官自殺是其應也延光古今注曰元年四月丙午太白晝見二年八月己亥熒惑出太微端門三年二月辛未太白犯昴石氏星占太白守昴兵從門闕入主人走郗萌曰不有亡國必有謀主又云入昴大赦五月癸丑太白入畢郗萌曰太白入畢馬馳人走又曰有中䘮九月壬寅鎮星犯左執法四年太白入輿鬼中古今注曰四月甲辰入六月壬辰太白出太微九月甲子太白入斗口中十一月客星見天市熒惑出太微為亂臣太白犯昴畢為近兵一曰大人當之鎮星犯左執法有誅臣太白入輿鬼中為大喪太白出太微為中宮有兵入斗口為貴将相有誅者客星見天市中為貴喪是時大将軍耿寳中常侍江京樊豊小黄門劉安與阿母王聖聖子女永等并構譖太子保并惡太子乳母男厨監邴吉三年九月丁酉廢太子為濟隂王以北鄉侯懿代殺男吉徙其父母妻子日南四年三月丁卯安帝廵狩從南陽還道寢疾至葉崩閻后與兄衛尉顯中常侍江京等共隠匿不令羣臣知上崩遣司徒劉喜等分詣郊廟告天請命載入北宮庚午夕發喪尊閻氏為太后北鄉侯懿病薨京等又不欲立保白太后更徴諸王子擇所立中黄門孫程王國王康等十九人共合謀誅顯京等立保為天子是為孝順皇帝皆姦人强臣狂亂王室其於死亡誅戮兵起宮中是其應古今注曰永建元年二月甲午客星入太微五月甲子月入斗李氏家書曰時天有變氣李郃上書諫曰臣聞天不言縣象以示吉凶挺災變異以為譴誡昔齊桓公遭虹貫牛斗之變納管仲之謀令齊去婦無近妃宮桓公聽用齊以大安趙有尹史見月生齒齕畢大星占有兵變趙君曰天下共一畢知為何國也下史於獄其後公子牙謀弑君血書端門如史所言乃月十三日有客星氣象彗孛歴天市梗河招揺槍棓十六日入紫宮廹北辰十七日復過文昌泰陵至天舩積水間稍微不見客星一占曰魯星歴天市者為榖貴梗河三星備非常泰陵八星為凶喪紫宮北辰為至尊如占恐宮廬之内有兵喪之變千里之外有非常暴逆之憂魯星不得過歴尊宿行度從疾應非一端恐復有如王阿母母子賤妾之欲居帝旁耗亂政事者誠令有之宜當抑遠饒足以財王者權柄及爵祿人天所重慎誠非阿妾所宜干豫天故挺變明以示人如不承慎禍至變成悔之靡及也孝順永建二年二月癸未太白晝見三十九日古今注曰丁巳月犯心七月丁酉犯昴閏月乙酉太白晝見東南維四十一日八月乙巳熒惑入輿鬼太白晝見為强臣熒惑為凶輿鬼為死喪質星為誅戮是時中常侍髙梵張防將作大匠翟酺尚書令髙堂芝僕射張敦尚書尹就郎姜述楊鳯等及兗州刺史鮑就使匈奴中郎張國金城太守張篤敦煌太守張朗相與交通漏泄就述棄市梵防酺芝敦鳳就國皆抵罪又定遠侯班始尚隂城公主堅得鬭爭殺堅得坐要斬馬市同産皆棄市古今注曰其年九月戊寅有白氣廣三尺長十餘丈從北落師門南至斗三年二月癸未月犯心後星六月甲子太白晝見四年二月癸丑月犯心後星五年閏月庚子太白晝見六年彗星出於斗牽牛滅於虛危虛危為齊牽牛吳越故海賊浮於會稽山賊㨗於濟南五年夏熒惑守氐諸侯有斬者是冬班始腰斬馬市六年四月熒惑入太微中犯左右執法西北方六寸所十月乙卯太白晝見十二月壬申客星芒氣長二尺餘西南指色蒼白在牽牛六度客星芒氣白為兵牽牛為吳越後一年會稽海賊曾於等千餘人燒句章殺長吏又殺鄞鄮長取官兵拘殺吏民攻東部都尉揚州六郡逆賊章何等稱將軍犯四十九縣大劫略吏民陽嘉元年閏月戊子臣昭案郎顗表云十七日己丑客星氣白廣二尺長五丈起天苑西南主馬牛為外軍色白為兵是時敦煌太守徐白使疏勒王盤等兵二萬人入于寘界虜掠斬首三百餘級烏桓校尉耿曅使烏桓親漢都尉戎末瘣等出塞鈔鮮卑斬首獲生口財物鮮卑怨恨鈔遼東代郡殺傷吏民是後西戎北狄為寇害以馬牛起兵馬牛亦死傷於兵中至十餘年乃息臣昭案郎顗𫝊陽嘉元年太白與嵗星合於房心二年熒惑失度盈縮徃來渉歴輿鬼環繞軒轅古今注曰二年四月壬寅太白晝見五月癸巳又晝見十一月辛未又晝見十二月壬寅月犯太白三年十二月辛未太白晝見四月乙卯太白熒惑入輿鬼永和元年五月丁卯太白犯牽牛大星永和二年五月戊申太白晝見八月庚子熒惑犯南斗斗為吳黄帝經曰不期年國有亂有憂海中占為多火災一曰旱古今注曰九月壬午月入畢口中明年五月吳郡太守行丞事羊珍與越兵弟葉吏民吳銅等二百餘人起兵反殺吏民燒官亭民舎攻太守府太守王衡距守吏兵格殺珍等又江賊蔡伯流等數百人攻廣陵九江燒城郭殺都長三年二月辛巳太白晝見戊子在熒惑西南光芒相犯辛丑有流星大如斗從西北東行長八九尺色赤黄有聲隆隆如雷三月壬子太白晝見六月丙午太白晝見八月古今注曰己酉熒惑入太微乙卯太白晝見閏月甲寅辰星入輿鬼己酉熒惑入太微乙卯太白晝見古今注曰十二月丁卯月犯軒轅大星太白者將軍之官又為西州晝見隂盛與君爭明熒惑與太白相犯為兵喪流星為使聲隆隆怒之象也辰星入輿鬼為大臣有死者熒惑入太微亂臣在廷中是時大將軍梁商父子秉勢故太白常晝見也其四年正月祀南郊夕牲中常侍張逵蘧政陽定内署令石光尚方令傅福等與中常侍曹騰孟賁爭權白帝言騰賁與商謀反矯詔命收騰賁賁自解説順帝寤解騰賁縛逵等自知事不從各奔走或自刺解貂蟬投草中逃亡皆得免其六年征西將軍馬賢擊西羌於北地謝姑山下父子為羌所没殺是其應也四年七月壬午熒惑入南斗犯第三星五年四月戊午太白晝見八月己酉熒惑入太微斗為貴相為揚州熒惑犯入之為兵喪其六年大將軍商薨九江丹陽賊周生馬勉等起兵攻沒郡縣梁氏又專權於天廷中六年二月丁巳彗星見東方長六七尺色青白西南指營室及墳墓星郗萌占曰彗星出而中營室天下亂易政以五色占之吉凶丁丑彗星在奎一度長六尺癸未昬見河圗曰彗星出貫奎庫兵悉出禍在强侯外夷胡應逆首謀也西北歴昴畢甲申在東井遂歴輿鬼栁七星張光炎及三台至軒轅中滅古今注曰五月庚寅太白晝見十一月甲午太白晝見營室者天子常宮墳墓主死彗星起而在營室墳墓不出五年天下有大喪後四年孝順帝崩昴為邊兵又為趙羌周馬父子後遂為寇又劉文刦清河相謝暠欲立王蒜為天子暠不聽殺暠王閉門距文官兵捕誅文蒜以惡人所刦廢為尉氏侯又徙為犍陽都鄉侯薨國絶歴東井輿鬼為秦皆羌所攻鈔炎及三台為三公是時太尉杜喬及故太尉李固為梁冀所陷入坐文書死及至注張為周滅於軒轅中為後宮其後懿獻后以憂死梁氏被誅是其應也漢安古今注曰元年二月壬午嵗星在太㣲中八月癸丑月犯南斗入魁中二年正月己亥太白晝見五月丁亥辰星犯輿鬼古今注曰丙辰月入斗中六月乙丑熒惑光芒犯鎮星七月甲申太白晝見辰星犯輿鬼為大喪熒惑犯鎮星為大人忌明年八月孝順帝崩孝沖古今注曰建康元年九月己亥太白晝見韓揚占曰天下有喪一曰有白衣之㑹明年正月又崩孝質本初元年古今注曰三月丁丑月八南斗三月癸丑熒惑入輿鬼四月辛巳太白入輿鬼皆為大喪五月庚戍太白犯熒惑為逆謀閏月一日孝質帝為梁冀所鴆崩後漢書卷二十一後漢書卷二十一考證天文志中攻蕉唐城臣召南按文當作嶲唐城嶲唐永昌郡屬縣也二月九日甲寅流星過紫宮臣良裘按書日例惟甲子此兼言九日訛也上書八月庚寅彗星出天市此不應更紀二月事且上書元年正月丁巳則二月九日安得為甲寅乎下云十二月戊寅彗星出考章帝紀在建初二年此二月九日乃二年九月之訛也水在輿鬼中注辰星犯昴臣永祚按正文在輿鬼而注為犯昴必誤臣召南按犯昴當作犯鬼後漢書卷二十一考證
