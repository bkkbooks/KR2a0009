body:
  text: 後漢書卷十一梁剡令劉昭補幷注律厯志第一律厯志律準候氣古之人論數也曰物生而後有象象而後有滋滋而後有數然則天地初形人物既著則算數之事生矣記稱大橈作甲子吕氏春秋曰黄帝師大橈博物記曰容成氏造厯黄帝臣也月令章句大橈探五行之情占斗綱所建於是始作甲乙以名曰謂之幹作子丑以名日謂之枝枝幹相配以成六旬隸首作數博物記曰隸首黄帝之臣一説隸首善算者也二者既立以比日表表即晷景以管萬事夫一十百千萬所同用也律度量衡厯其别用也故體有長短檢以度説苑曰以粟生之十粟為一分十分為一寸十寸為一尺十尺為一丈物有多少受以量説苑曰千二百粟為一籥十籥為一合十合為一升十升為一斗十斗為一斛量有輕重平以權衡説苑曰十粟重一圭十圭重一銖二十四銖重一两十六兩重一斤三十斤重一鈞四鈞重一石聲有清濁協以律吕三光運行紀以歴數然後幽隱之情精微之變可得而綜也前志曰夫推厯生律制噐規圓矩方權重衡平準繩嘉量探賾索隱鉤深致逺莫不用焉度長短者不失毫釐量多少者不失圭撮權輕重者不失黍累紀於一協於十長於百大於千廣於萬漢興北平侯張蒼首治律厯孝武正樂置協律之官至元始中博徵通知鍾律者考其意義羲和劉歆典領條奏前史班固取以為志而元帝時郎中京房房字君明知五聲之音六律之數上使太子太傅韋𤣥成字少翁諫議大夫章雜試問房於樂府房對受學故小黄令焦延夀六十律相生之法以上生下皆三生二以下生上皆三生四陽下生隂隂上生陽終於中吕而十二律畢矣中吕上生執始執始下生去滅上下相生終於南事六十律畢矣夫十二律之變至於六十猶八卦之變至於六十四也宓犧作易紀陽氣之初以為律法建日冬至之聲以黄鍾為宫太蔟為商姑洗為角林鍾為徴南吕為羽應鍾為變宫蕤賔為變徵月令章句曰以姑洗為角南吕為羽則微濁也此聲氣之元五音之正也故各終一日其餘以次運行當日者各自為宫而商徵以類從焉月令章句曰律率也聲之管也上古聖人夲隂陽别風聲審清濁而不可以文載口傳也於是始鑄金作鍾以主十二月之聲然後以放并降之氣鍾難分别乃截竹為管謂之律律者清濁之率法也聲之清濁以長短為制禮運篇曰五聲六律十二管還相為宫此之謂也鄭𤣥曰宫數八十一黄鍾長九寸九九八十一也三分宫去一生徴徴數五十四林鍾長六寸六九五十四也三分徵益一生商商數七十二太簇長八寸八九七十二也三分商去一生羽羽數四十八南吕長五寸三分寸之一五九四十五又三分寸之一為四十八也三分羽益一生角角數六十四姑洗長七寸九分寸之一七九六十三又九分寸之一為六十四也三分角去一生變宫三分變宫益一生變徵自此已後則隨月而變所謂還相為宫以六十律分朞之日黄鍾自冬至始及冬至而復隂陽寒燠風雨之占生焉於以檢攝羣音考其髙下茍非草木之聲則無不有所合虞書曰律和聲此之謂也房又曰竹聲不可以度調故作凖以定數凖之状如瑟長丈而十三弦隱間九尺以應黄鍾之律九寸中央一弦下有畫分寸以為六十律清濁之節房言律詳於歆所奏其術施行於史官候部用之文多不悉載故總其夲要以續前志律術曰陽以圓為形其性動隂以方為節其性靜動者數三靜者數二以陽生隂倍之以隂生陽四之皆三而一陽生隂曰下生隂生陽曰上生上生不得過黄鍾之清濁下生不得及黄鍾之數實皆參天兩地圓蓋方覆六耦承奇之道也黄鍾律吕之首而生十二律者也前書曰黄帝使伶倫自大夏之西崑崙之隂取竹之嶰谷生其竅厚均者斷兩節間而吹之以為黄鍾之管制十二筩以聽鳳之鳴其雄鳴爲六雌鳴亦六比黄鍾之音而皆可以生之是為律夲至治之世天地之氣合以生風天地之風氣正十二律乃定其相生也皆三分而損益之是故十二律之得十七萬七千一百四十七是為黄鍾之實前書曰太極元氣函三為一極中也元始也行於十二辰始動於子參之於丑得三又參之於寅得九又參之於卯得二十七又參之於辰得八十一又參之於已得二百四十三又參之於午得七百二十九又參之於未得二千一百八十七又參之於申得六千五百六十一又參之於酉得萬九千六百八十三又參之於戍得五萬九千四十九又參之於亥得十七萬七千一百四十七此隂陽合徳氣鍾於子化生萬物者也故滋萌於子紐牙於丑引逹於寅冐茆於卯振羡於辰巳盛於已咢布於午昧曖於未甲堅於申留孰於酉畢入於戌該閡於亥出甲於甲奮軋於乙明炳於丙大成於丁豐茂於戊理紀於已歛更於庚悉新於辛懐任於壬陳揆於發故隂陽之施化萬物之終始既類旅於律吕又經歴於日辰而變化之情則可見矣又以二乘而三約之是為下生林鍾之實又以四乘而三約之是為上生太蔟之實推此上下以定六十律之實以九三之數萬九千六百八十三為法律為寸於凖為尺不盈者十之所得為分又不盈十之所得為小分以其餘正其强弱黄鍾十七萬七千一百四十七下生林鍾黄鍾為宫太蔟商林鍾徵一日律九寸準九尺色育十七萬六千七百七十六下生謙待色育為宫未知商謙待徵六日律八寸九分小分八微强凖八尺九寸萬五千九百七十三執始十七萬四千七百六十二下生去滅執始為宫時息商去滅徵六日律八寸八分小分七大强凖八尺八寸萬五千五百一十六丙盛十七萬二千四百一十下生安度丙盛為宫屈齊商安度徴六日律八寸七分小分六微弱凖八尺七寸萬一千六百七十九分動十七萬八十九下生歸嘉分動為宫隨期商歸嘉徴六日律八寸六分小分四强凖八尺六寸八千一百五十二質未十六萬七千八百下生否與質未為宫形晉商否與徴六日律八寸五分小分二强凖八尺五寸四千九百四十五大吕十六萬五千八百八十八下生夷則大吕為宫夾鍾商夷則徵八日律八寸四分小分三弱凖八尺四寸五千五百八分否十六萬三千六百五十四下生解形分否為宫開時商解形徴八日律八寸三分小分一强凖八尺三寸二千八百五十一凌隂十六萬一千四百五十二下生去南凌隂為宫族嘉商去南徴八日律八寸二分小分一弱凖八尺二寸五百一十四少出十五萬九千二百八十下生分積少出為宫爭南商分積徵六日律八寸小分九强凖八尺萬八千一百六十太蔟十五萬七千四百六十四下生南吕太蔟為宫姑洗商南吕徵一日律八寸凖八尺未知十五萬七千一百三十四下生白吕未知為宫南授商白吕徵六日律七寸九分小分八强凖七尺九寸萬六千三百八十三時息十五萬五千三百四十四下生結躬時息為宫變虞商結躬徴六日律七寸八分小分九少强凖七尺八寸萬八千一百六十六屈齊十五萬三千二百五十三下生歸期屈齊為宫路時商歸期徵六日律七寸七分小分九弱凖七尺七寸萬六千九百三十九隨期十五萬一千一百九十下生未卯隨期為宫形始商未卯徴六日律七寸六分小分八强凖七尺六寸萬五千九百九十二形晉十四萬九千一百五十五下生夷汗形晉為宫依行商夷汗徴六日律七寸五分小分八弱凖七尺五寸萬五千三百二十五夾鍾十四萬七千四百五十六下生無射夾鍾為宫中吕商無射徴六日律七寸四分小分九强凖七尺四寸萬八千一十八開時十四萬五千四百七十下生閉掩開時為宫南中商閉掩徵八日律七寸三分小分九㣲弱凖七尺三寸萬七千八百四十一族嘉十四萬三千五百一十三下生鄰齊族嘉為宫内負商鄰齊徵八日律七寸二分小分九微强凖七尺二寸萬七千九百五十四爭南十四萬一千五百八十二下生期保爭南為宫物應商期保徴八日律七寸一分小分九强凖七尺一寸萬八千三百二十七姑洗十三萬九千九百六十八下生應鍾姑洗為宫蕤賔商應鍾徴一日律七寸一分小分一微强凖七尺一寸二千一百八十七南授十三萬九千六百七十下生分烏南授為宫南事商分烏徴六日律七寸小分九大强凖七尺萬八千九百三十變虞十三萬八千八十四下生遲内變虞為宫盛變商遲内徴六日律七寸小分一半强凖七尺三千三十路時十三萬六千二百二十五下生未育路時為宫離宫商未育徴六日律六寸九分小分二微强凖六尺九寸四千一百二十三形始十三萬四千三百九十二下生遲時形始為宫制時商遲時徴五日律六寸八分小分三弱凖六尺八寸五千四百七十六依行十三萬二千五百八十二上生色育依行為宫謙待商色育徴七日律六寸七分小分三大强凖六尺七寸七千五十九中吕十三萬一千七十二上生執始中吕為宫去滅商執始徴八日律六寸六分小分六弱凖六尺六寸萬一千六百四十二南中十二萬九千三百八上生丙盛南中為宫安度商丙盛徴七日律六寸五分小分七微弱凖六尺五寸萬三千六百八十五内負十二萬七千五百六十七上生分動内負為宫歸嘉商分動徴八日律六寸四分小分八强凖六尺四寸萬五千九百五十八物應十二萬五千八百五十上生質末物應為宫否與商質末徴七日律六寸三分小分九强凖六尺三寸萬八千四百七十一蕤賔十二萬四千四百一十六上生大吕蕤賔為宫夷則商大吕徵一日律六寸三分小分二微强凖六尺三寸四千一百三十一南事十二萬四千一百五十四下生南事窮無商徴不為宫七日律六寸三分小分一弱凖六尺三寸一千五百三十一盛變十二萬二千七百四十一上生分否盛變為宫解形商分否徴七日律六寸二分小分三大强凖六尺二寸七千六十四離宫十二萬一千八百一十九上生凌隂離宫為宫去南商凌隂徵七日律六寸一分小分五微强凖六尺一寸萬二百二十七制時十一萬九千四百六十上生少出制時為宫分積商少出徴八日律六寸小分七弱凖六尺萬三千六百二十林鍾十一萬八千九十八上生太蔟林鍾為宫南吕商太蔟徴一日律六寸凖六尺謙待十一萬七千八百五十一上生未知謙待為宫白吕商未知徴五日律五寸九分小分九弱凖五尺九寸萬七千二百一十三去滅十一萬六千五百八上生時息去滅為宫結躬商時息徴七日律五寸九分小分二弱凖五尺九寸三千七百八十三安度十一萬四千九百四十上生屈齊安度為宫歸期商屈齊徵六日律五寸八分小分四弱凖五尺八寸七千七百八十六歸嘉十一萬三千三百九十三上生隨期歸嘉為宫未卯商隨期徵六日律五寸七分小分六微强凖五尺七寸萬一千九百九十九否與十一萬一千八百六十七上生形晉否與為宫夷汗商形晉徵五日律五寸六分小分八强凖五尺六寸萬六千四百二十二夷則十一萬五百九十二上生夾鍾夷則為宫無射商夾鍾徵八日律五寸六分小分二弱凖五尺六寸三千六百七十二解形十一萬九千一百三上生開時解形為宫閉掩商開時徴八日律五寸五分小分四强凖五尺五寸八千四百六十五去南十萬七千六百三十五上生族嘉去南為宫鄰齊商族嘉徴八日律五寸四分小分六大强凖五尺四寸萬三千四百六十八分積十萬六千一百八十八上生爭南分積為宫期保商爭南徴七日律五寸三分小分九半强凖五尺三寸萬八千六百八十一南吕十萬四千九百七十六上生姑洗南吕為宫應鍾商姑洗徵一日律五寸三分小分三强凖五尺三寸六千五百六十一白吕十萬四千七百五十六上生南授白吕為宫分烏商南授徵五日律五寸三分小分二强凖五尺三寸四千三百七十一結躬十萬三千五