body:
  text: 後漢書卷八十九宋宣城太守范煜撰唐章懐太子賢注張衡列傳第四十九張衡傳張衡字平子南陽西鄂人也西鄂縣故城在今鄧州向城縣南有平子墓及碑在焉崔瑗之文也世為著姓祖父堪蜀郡太守衡少善屬文㳺於三輔因入京師觀太學遂通五經貫六蓺雖才髙於世而無驕尚之情常從容淡靜不好交接俗人永元中舉孝亷不行連辟公府不就時天下承平日乆自王侯以下莫不踰侈衡乃擬班固兩都作二京賦因以諷諫精思傅㑹十年乃成文多故不載大将軍鄧隲竒其才累召不應衡善機巧尤致思於天文隂陽歴算常好𤣥經桓譚新論曰揚雄作𤣥書以為𤣥者天也道也言聖賢制法作事皆引天道以為本統而因附續萬類王政人事法度故宓羲氏謂之易老子謂之道孔子謂之元而揚雄謂之𤣥𤣥經三篇以紀天地人之道立三體有上中下如禹貢之陳三品三三而九因以九九八十一故為八十一卦以四為数数從一至四重累變易竟八十一而徧不可損益以三十五蓍揲之𤣥經五千餘言而傳十二篇也劉攽曰注以三十五蓍揲之案太𤣥乃用三十六揲作五字誤也謂崔瑗曰吾觀太𤣥方知子雲妙極道數乃與五經相擬非徒傳記之屬使人難論隂陽之事漢家得天下二百嵗之書也子雲當哀帝時著太𤣥經自漢初至哀帝二百嵗也復二百歳殆将終乎自中興至獻帝一百八十九年也所以作者之數必顯一世常然之符也漢四百歲𤣥其興矣自此以上並衡與崔瑗書之文也安帝雅聞衡善術學公車特徴拜郎中再遷為太史令漢官儀太史令屬太常秩六百石也遂乃研覈隂陽妙盡璇璣之正作渾天儀著靈憲算罔論言甚詳明漢名臣奏曰蔡邕曰言天體者有三家一曰周髀二曰宣夜三曰渾天宣夜之學絕無師法周髀術数具存考騐天状多所違失故史官不用唯渾天者近得其情今史官所用候䑓銅儀則其法也靈憲序曰昔在先王將歩天路用定靈軌尋緒本元先凖之于渾體是為正儀故靈憲作興衡集無算罔論盖網絡天地而算之因名焉順帝初再轉復為太史令衡不慕當世所居之官輒積年不徙自去史職五載復還乃設客問作應間以見其志云間非也衡集云觀者觀余去史官五載而復還非進取之勢也唯衡内識利鈍操心不改或不知我者以為失志矣用為間余余應之以時有遇否性命難求因兹以露余誠馬名之應間云有間余者曰盖聞前哲首務務於下學上達佐國理民有云為也論語曰孔子曰下學而上達注云下學人事上知天命也朝有所聞則夕行之立功立事式昭徳音尚書曰立功立事可以永年逸詩曰祈招之愔愔式昭徳音式用也昭明也是故伊尹思使君為堯舜而民處唐虞彼豈虚言而已哉必旌厥素爾尚書伊尹曰予弗克俾厥后唯堯舜其心愧耻若撻于市旌明也素猶志也咎單巫咸實守王家咎單巫咸並殷賢臣也尚書曰咎單作明居又曰巫咸保乂王家也申伯樊仲實幹周邦服衮而朝介圭作瑞申伯申國之伯也樊仲仲山甫也為樊侯並周宣王之卿士詩大雅曰維申及甫維周之翰注翰幹也服衮謂申伯為冢宰服袞冕之服也又曰錫爾介圭以作爾寳注云寳瑞也圭長尺二寸謂之介也厥跡不朽垂烈後昆不亦丕歟且學非以要利而富貴萃之貴以行令富以施恵恵施令行故易稱以大業易繫辭曰盛徳大業至矣哉富有之謂大業日新之謂盛徳也質以文美實由華興噐頼雕飾為好人以輿服為榮吾子性徳體道篤信安仁約己博藝無堅不鑚以思世路斯何逺矣論語曰篤信好學又曰仁者安仁又曰鑚之彌堅博我以文約我以禮曩滯日官今又原之日官史官也左傳曰天子有日官爾雅曰原再也雖老氏曲全進道若退然行亦以需老子曰曲則全枉則直又曰夷道若類進道若退易雜卦曰需不進也必也學非所用術有所仰故臨川將濟而舟檝不存焉徒經思天衢内昭獨智固合理民之式也故嘗見謗于鄙儒天衢天道也言徒鋭思作靈憲渾天儀等也深厲淺掲隨時為義曾何貪於支離而習其孤技邪掲褰衣也音丘厲反詩邶風曰深則厲淺則揭爾雅曰由帶以上為厲由膝以下為掲言遭時制宜遇深水則厲淺則揭也易隨卦曰隨時之義大矣哉荘子曰朱泙曼學屠龍於支離盖單千金之家三年技成而無所用技音渠綺反責衡何獨妙思於機巧者也劉攽曰注支離盖案荘子盖當作益支離其名益耳後人不讀荘子妄改為盖叄音三輪可使自轉木雕猶能獨飛己垂翅而還故棲盍亦調其機而銛諸垂翅故棲謂再為史官也盍何不也銛利也諸之也間者言衡作三輪木雕尚能飛轉已乃垂翅故棲何不調其機闗使利而高飛邪傅子曰張衡能令三輪獨轉也昔有文王自求多福詩大雅文王篇曰永言配命自求多福也劉攽曰正文昔有當作昔者人生在勤不索何獲曷若卑體屈己羙言以相剋剋勝也衡集作羙言以相市鳴于喬木乃金聲而玉振之詩小雅曰伐木丁丁鳥鳴嚶嚶出自幽谷遷于喬木喻求仕遷於髙位振揚徳音如金玉之聲孟子曰金聲而玉振之用後勳雪前吝婞佷不柔以意誰靳也吝耻也左傳曰宋公靳之杜預注云戯而相愧曰靳應之曰是何觀同而見異也君子不患位之不尊而患徳之不崇不恥禄之不夥而恥智之不博方言曰凡物盛而多齊宋之郊謂之夥音和果反是故藝可學而行可力也天爵髙懸得之在命孟子曰仁義忠信樂善不倦此天爵也公卿大夫此人爵也案此謂天子髙懸爵位得者在命也或不速而自懐或羡旃而不臻速召也懐来也旃之也求之無益故智者偭而不思偭偕也阽身以徼幸固貪夫之所為未得而豫喪也阽危也枉尺直尋議者譏之盈欲虧志孰云非羞孟子陳代問孟子曰枉尺而直尋若可為也孟子曰昔齊景公田招虞人以旌不至将殺之志士不忘在溝壑如不待招而徃何哉且夫枉尺而直尋者以利言也如以利則枉尋直尺而利亦可為歟趙岐注云志士守義者也君子固窮故虞人不得其招尚不徃如何君子不得其招而妄見也尺小尋大不可枉大就小而以要利也於心有猜則簋飱饌餔猶不屑餐旌瞀以之猜嫌也簋食噐也飱音孫詩云有䝉簋飱饌音仕卷反餔音補故反並謂食也屑猶介也以用也爰旌瞀餓人也一作爰精目列子曰東方有人焉曰爰精目將有適也而餓於道狐丘父之盗曰丘見而下壺飱以餔之爰精目三餔而後能視曰子何為者也我狐父之人丘也爰精目曰譆汝非盗邪吾義不食子之食也兩手據地而歐之不出喀喀而死之也劉攽曰注子何為者也案文是對答之辭也字當作曰意之無疑則兼金盈百而不嫌辭孟軻以之孟子陳臻問曰前日於齊王餽兼金一百而不受於宋餽七十鎰而受前日之不受是則今日受非也孟子曰皆是也當在宋也予将逺行行者必以贐予何為不受若於齊則未有處無處而餽之是貨之也焉有君子而可以貨取乎趙岐注云兼金好金也價兼倍於惡者故曰兼金一百百溢也二十兩為溢贐送行者贈賄之禮也在齊時無事於義未有所處也義無所處而餽之是以貨賄所取我欲使我懐恵也劉攽曰注是以貨賄所取我案文多一取字士或觧裋褐而襲黼黻或委臿築而據文軒者度徳拜爵量績受禄也觧裋褐謂寗戚也委臿築謂傅説也裋音常主反方言曰自闗而西謂襜褕短者謂之裋也輸力致庸受必有階受或作爰渾元初基靈軌未紀吉凶紛錯人用朣朦朣朦言未晤也劉攽曰案蔡邕亦有此二字作瞳矇從目是也此誤黄帝為斯深慘有風后者是焉亮之察三辰於上跡禍福乎下經緯歴數然後天歩有常則風后之為也史記曰黄帝迎日推䇿舉風后力牧以理人順天地之紀幽明之占又曰旁羅日月星辰春秋内事曰黄帝師於風后風后善於伏羲氏之道故推演隂陽之事蓺文志隂陽流有風后十三篇也當少昊清陽之末實或亂徳人神雜擾不可方物重黎又相顓頊而申理之日月即次則重黎之為也帝王紀曰少昊字清陽國語楚觀射父曰少皥之衰也九黎亂徳人神雜揉不可方物顓頊承之乃命南正重司天以属神命火正黎司地以属人重少昊氏之子黎顓頊氏之子人各有能因藝受任鳥師别名四叔三正官無二業事不並濟左傳郯子曰少皥鳥師而鳥名鳯鳥氏歴正也𤣥鳥氏司分也伯趙氏司至也青鳥氏司啟也丹鳥氏司閉也又晉蔡墨曰少皥氏有四叔曰重曰該曰修曰熙實能金木及水使重為勾芒該為蓐收修及熙為𤣥㝠四叔分主三正言其不兼業也晝長則宵短日南則景北夏至日北極而影短畫六十刻夜四十刻冬至日南極而影長夜六十刻晝四十刻也易通卦驗日冬至晷長丈三尺夏至晷長尺五寸謂立八尺表之隂也天且不堪兼况以人該之該偹也夫𤣥龍迎夏則陵雲而奮鱗樂時也渉冬則淈泥而潜蟠避害也説文曰龍鱗蟲之長能幽能明能小能巨能短能長春分而登天秋分而入川言出入有時也賈逵注國語曰淈亂也淈音骨公旦道行故制典禮以尹天下懼教誨之不從有人之不理尹正也道行言道得申也流俗本作行道者非也仲尼不遇故論六經以俟来辟辟君也公羊傳曰孔子制春秋以俟後聖也恥一物之不知有事之無範所考不齊如何可一衡集考字作丁丁當也夫戰國交爭戎車競驅君若綴旒人無所麗麗附也公羊傳曰君若贅旒然旒旂旒言為下所執持西東也燭武縣縋而秦伯退師燭之武鄭大夫也縋縣䋲於城而下也左傳曰秦伯圍鄭鄭伯使燭之武夜縋而出説秦秦伯為之退師魯仲係箭而聊城㢮柝魯仲連齊人也時燕將守聊城仲連為書係箭射聊城甲燕將自殺見史記弛廢也柝行夜木也從徃則合横来則離安危無常要在說夫張儀説諸候連和事秦為横蘇秦説諸侯連兵拒秦為從蘓秦徃則從合張儀来則從離咸以得人為梟失士為尤梟猶勝也猶六博得梟則勝故樊噲披帷入見髙祖前書曰樊噲沛人也封舞陽侯高帝常病惡見人臥禁中詔户者無得入噲乃排闥直入流涕曰獨不見趙髙之事乎帝笑而起也髙祖踞洗以對酈生前書曰沛公方踞林令兩女子洗足而見酈食其食其曰必欲聚徒合義兵誅無遒不冝踞見長者於是沛公輟洗謝之當此之㑹乃黿鳴而鼈應也喻君臣相感也焦贛易林曰黿鳴岐野鼈應於泉也故能同心戮力勤恤人隠隠病也國語曰勤恤人隠而除其害也奄受區夏遂定帝位皆謀臣之由也故一介之䇿各有攸建子長諜之爛然有第前書音義曰諜譜第也與牒通司馬遷字子長作史記著功臣䓁傳粲然各有第序也夫女􅔨北而應龍翔洪鼎聲而軍容息女􅔨旱神也北猶退也應龍能興雲雨者也山海經曰蚩尤作兵伐黄帝黄帝乃令應龍攻之冀州之野應龍蓄水蚩尤請風伯兩師從大風雨黄帝乃下天女曰妖雨止遂殺蚩尤妖不得復上所居不雨妖亦􅔨也音歩末反聲或作容或作客衡集容作害並未詳也溽暑至而鶉火棲寒冰沍而黿鼉蟄棲息也禮記月令曰季夏土潤溽暑鶉火午之宿也三月在午六月在酉言當季夏之時鶉火退於酉沍凝也今也皇澤宣洽海外混同萬方億醜并質共劑若修成之不暇尚何功之可立質劑猶今分文契也并共猶言交通也周禮曰凡賣買者質劑焉大市以質小市以劑鄭𤣥注云兩書一札同而别之長曰質短曰劑劑音子隨反立事有三言為下列下列且不可庻矣奚冀其二哉左傳魯叔孫豹曰太上有立徳其次有立功其次有立言杜預注云立徳黄帝堯舜也立功禹稷也立言史佚周任臧文仲于兹縉紳如雲儒士成林及津者風攄失塗者幽僻遭遇難要趨偶為幸世易俗異事埶舛殊不能通其變而一度以揆之易繫辭曰通其變使人不倦也斯契船而求劒守株而伺也契猶刻也吕氏春秋曰楚人有渉江者其劒自舟中墜於水遽契其舟曰是吾劒所從墜也舟已行而劒不行若此求劒不亦惑乎韓子曰宋人有耕者田中有株兎走觸之折頸而死因釋耕守株冀復得兎為宋國笑也冒愧逞願必無仁以繼之有道者所不履也越王勾踐事此故厥緒不永史記曰越王勾踐先吳興師吳王聞之悉發精兵擊越敗之於夫椒越王乃以餘兵五千人保棲於㑹稽此為冐愧逞願自取敗也㨗徑邪至我不忍以投歩干進茍容我不忍以歙肩㨗疾也龡斂也音翕孟子曰阿意事貴脅肩所尊俗之情也歙亦脅也雖有犀舟勁檝猶人渉卬否有須者也前書曰羌戎弓矛之兵器不犀利音義曰今俗謂刀兵利為犀犀堅也詩衛風曰招招舟子人渉卭否人渉卬否卬須我友卬我也須待也鄭𤣥注云人皆渉我友未至我獨待而不渉言室家之道非得所適貞女不行非得禮義婚姻不成喻仕當以道不求妄進也姑亦奉順敦篤守以忠信得之不休不獲不吝姑且也休羙也吝恥也不見是而不惽居下位而不憂允上徳之常服焉惽猶悶也易曰不見是而無悶樂則行之憂則違之又曰居上位而不驕在下位而不憂也方將師天老而友地典與之乎髙睨而大談孔甲且不足慕焉稱殷彭及周聃帝王紀曰黄帝以風后配上台天老配中台五聖配下台謂之三公其餘知天規紀地典力牧常先封胡孔甲等或以為師或以為將蓺文志隂陽有地典六篇殷彭即老彭殷賢人也睨視也髙視大談言不同流俗衡集作矢談矢亦直也義亦通也與世殊技固孤是求技巧也音佼本或作拔誤也子憂朱泙曼之無所用吾恨輪扁之無所教也輪扁為輪者名扁也扁音皮殄反荘子曰輪扁對齊桓公曰斵輪之法徐則甘而不固疾則苦而不入不疾不徐得之於手而應之心口不能言也臣不能以喻臣之子臣子亦不能受之於臣言泙曼屠龍既無所用輪扁斵輪亦不能教人也泙音匹萌反子覩木雕獨飛愍我垂翅故棲吾感去鼃附䲭悲爾先笑而後號也鼃蝦蟇也音胡媧反周易旅卦上九曰先笑而後號咷斐豹以斃督燔書禮至以掖國作銘左傳曰晉樂盈復入於晉欒氏之力臣曰督戎國人懼之斐豹謂范宣子曰茍焚丹書我殺督戎宣子曰而殺之所不請於君焚丹書者有如日乃殺之杜預注曰盖豹犯罪没為官奴以丹書其罪左傳衞伐邢禮至與國子廵城掖以赴外殺之禮至自為銘曰余掖殺國子莫余敢止國子邢正卿禮至本衞人仕邢為大夫掖為挟之而投於城外也衡集豹字作𨽻也弦髙以牛餼退敵墨翟以縈帯全城左傳曰秦師襲鄭及滑鄭商人弦髙將市於周遇之以牛十二犒師曰寡君聞吾子將出於敝邑敢犒従者秦孟明曰鄭有偹矣㓕滑而還墨子曰公輸般為雲梯以攻宋墨子觧帶為城以牒為械公輸般九攻墨子九拒公輸之攻盡墨子之守有餘楚王曰善哉吾請無攻宋矣貫髙以端辭顯義蘇武以秃節效貞貫高趙相也端猶正也獨正言趙王不反高帝賢而赦之蘇武使匈奴中杖節臥起節毛盡落並見前書蒲且以飛矰逞巧詹何以沈鈎致精列子曰蒲且子之弋弱弓纎繳乗風振之連雙鶬於青雲之際又曰詹何以獨繭絲為綸芒針為鈎荆蓧為竿剖粒為餌引盈車之魚周禮曰矰矢用弋射鄭𤣥注云結繳於矢謂之矰矰髙也奕秋以碁局取譽王豹以清謳流聲奕圍局也棊即所執之子秋名也孟子曰奕秋通國之善奕者又曰王豹處於淇而河西善謳也僕進不能參名於二立退又不能羣彼數子二立謂大上立徳其次立功也上云立事有三言為下列下列且不可庶况其二哉故言不能參名於二列之流也臣賢案古夲作二立流俗本及衡集立字多作匹非也數子謂斐豹以下也愍三墳之既頽惜八索之不理左傳曰楚左史倚相能讀三墳五典八索九丘孔安國以為三墳五典三皇之書八卦之説謂之八索此以下言不能立徳立功唯欲立言而已庶前訓之可鑚聊朝隠乎柱史前書東方朔曰首陽為拙柱下為工應劭曰老子為周柱下史朝隠終身無患是為上也且韞櫝以待價踵顔氏以行止論語子貢曰有羙玉於斯韞櫝而蔵諸求善價而沽諸子曰我待價者也又子謂顔回曰用之則行舍之則蔵唯我與爾有是夫曾不慊夫晉楚敢告誠於知已孟子曾子曰晋楚之富不可及也彼以其富我以吾仁彼以其爵我以吾義吾何慊也慊猶羡也音苦簟反陽嘉元年復造候風地動儀以精銅鑄成員徑八尺合蓋隆起形似酒尊飾以篆文山龜鳥獸之形中有都柱傍行八道施闗發機外有八龍首銜銅丸下有蟾蜍張口承之蟾蜍蝦蟇也蟾音時占反蜍音時諸反其牙機巧制皆隠在尊中覆盖周宻無際如有地動尊則振龍機發吐丸而蟾蜍銜之振聲激揚伺者因此覺知雖一龍發機而七首不動尋其方靣乃知震之所在驗之以事合契若神自書典所記未之有也嘗一龍機發而地不覺動京師學者咸怪其無徵後數日驛至果地震隴西於是皆服其妙自此以後乃令史官記地動所從方起時政事漸損權移於下衡因上疏陳事曰伏惟陛下宣哲克明繼體承天中遭傾覆龍德泥蟠傾覆謂順帝為太子時廢為濟隂王蟠音薄寒反廣雅曰蟠曲也揚雄方言曰未升天龍謂之蟠今乘雲髙躋磐桓天位誠所謂將隆大位必先倥偬之也倥音口弄反偬音子弄反埤蒼曰倥偬窮困也亦謂順帝被廢時也親履艱難者知下情備經險易者達物偽左傳曰晉侯在外十九年矣險阻艱難備嘗之矣人之情偽盡知之矣故能一貫萬機靡所疑惑百揆允當庶績咸熙宜獲福祉神祗受譽黎庶而隂陽未和災眚屢見神明幽逺宜鑒在兹福仁禍滛景嚮而應因德降休乘失致咎天道雖逺吉凶可見近世鄭蔡江樊周廣王聖皆為效矣事見宦者傳故恭儉畏忌必䝉祉祚奢滛謟慢鮮不夷戮前事不忘後事之師也夫情勝其性流遯忘反性者生之質情者性之欲性善情惡情勝則荒滛也豈唯不肖中才皆然茍非大賢不能見得思義故積惡成釁罪不可觧也向使能瞻前顧後援鏡自戒則何陷於凶患乎楚辭曰瞻前而顧後兮援鏡自戒謂引前事以為鏡而自戒勑也韓詩外傳曰明鏡所以照形徃古所以知今貴寵之臣衆所屬仰其有愆尤上下知之褒美譏惡有心皆同故怨讟溢乎四海神明降其禍辟也辟罪也音頻亦反頃年雨常不足思求所失則洪範所謂僣恒𤾉若者也恒常也若順也孔安國注洪範云君行僭差則常𤾉順之常𤾉則多旱也懼羣臣奢侈昬踰典式自下逼上用速咎徵又前年京師地震土裂順帝永建三年正月京師地震裂者威分震者人擾也君以静唱臣以動和威自上出不趣於下禮之政也竊懼聖思厭倦制不專己恩不忍割與衆共威威不可分徳不可共洪範曰臣有作威作福玉食害于而家凶于而國天鑒孔明雖疎不失災異示人前後數矣而未見所革以復往悔革改也復反也自非聖人不能無過願陛下思惟所以稽古率舊勿令刑徳八柄不由天子周禮太宰以八柄詔王馭羣臣一曰爵二曰禄三曰予四曰置五曰生六曰奪七曰廢八曰誅若恩從上下事依禮制禮制脩則奢僭息事令宜則無凶咎然後神望允塞災消不至矣初光武善讖及顯宗肅宗因祖述焉自中興之後儒者争學圖緯兼復附以妖言衡以圖緯虛妄非聖人之法乃上疏曰臣聞聖人明審律歴以定吉凶重之以卜筮雜之以九宫易乾鑿度曰太乙取其數以行九宫鄭𤣥注云太一者北辰神名也下行八卦之宫每四乃還於中央中央者北神之所居故謂之九宫天數大分以陽出以隂入陽起於子隂起於午是以太一下九宫從坎宫始自此而從於坤宫又自此而從於震宫又自此而従於巽宫所以行半矣還息於中央之宫既又自此而從於乾宫又自此而從於兊宫又自此而從於艮宫又自此而從於離宫行則周矣上遊息於火一之星而反紫宫行起從坎宮始終於離宫也經天驗道本盡於此或觀星辰逆順寒燠所由或察龜策之占巫覡之言前書曰齊肅聰明者神或降之在男曰覡在女曰巫覡音胡歴反其所因者非一術也立言於前有徴於後故智者貴焉謂之讖書讖書始出蓋知之者寡自漢取秦用兵力戰功成業遂可謂大事當此之時莫或稱讖若夏侯勝眭孟之徒以道術立名其所述著無讖一言劉向父子領校祕書閱定九流亦無讖錄成哀之後乃始聞之眭𢎞字孟魯國蕃人也昭帝時以明經為議郎夏侯勝字長公東平人好洪範五行傳説宣帝時為太子太傅又成哀時有詔使劉向及子歆於祕書校定經傳諸子等九流謂儒家道家隂陽家法家名家墨家縱横家雜家農家見藝文志並無䜟説也尚書堯使鯀理洪水九載績用不成鯀則殛死禹乃嗣興殛誅死也而春秋讖云共工理水凡讖皆云黄帝伐蚩尤而詩讖獨以為蚩尤敗然後堯受命春秋元命苞中有公輸班與墨翟事見戰國非春秋時也衡集云班與墨翟並當子思時出仲尼後又言别有益州益州之置在於漢世前書武帝始置益州其名三輔諸陵世數可知至於圖中訖於成帝一卷之書互異數事聖人之言埶無若是殆必虛偽之徒以要世取資往者侍中賈逵擿讖互異三十餘事諸言讖者皆不能說至於王莽簒位漢世大禍八十篇何為不戒則知圖讖成於哀平之際也且河洛六藝篇錄已定後人皮傅無所容簒衡集上事云河洛五九六藝四九謂八十一篇也傳音附臣賢案衡集云後人皮傅無所容竄又揚雄方言曰秦晉言非其亊謂之皮𫝊謂不深得其情核皮膚淺近强相傅㑹也後人不逹皮膚之意流俗本多作頗傳者誤也無所容竄謂不容妄有加增也莊子曰竄句籍辭續漢書亦作竄本作簒者義亦通永元中清河宋景遂以歴紀推言水災而偽稱洞視玉版遯甲開山圖曰禹遊於東海得玉珪碧色長一尺二寸圓如日月以自照逹幽冥言宋景歴紀推知水災非洞視玉版所見也或者至於棄家業入山林後皆無效而復采前世成事以為證驗至於永建復統則不能知永建順帝卽位年也復統謂廢而復立言䜟家不論也此皆欺世罔俗以昧埶位情偽較然莫之糾禁且律歴卦候九宫風角數有徴效世莫肯學而競稱不占之書謂競稱讖家也譬猶畫工惡圖犬馬而好作鬼魅誠以實事難形而虛偽不窮也韓子曰客為齊王畫者問畫孰難對曰狗馬最難孰易鬼魅最易狗馬人所知也故難鬼魅無形故易也宜收藏圖讖一禁絶之則朱紫無所眩典籍無瑕玷矣後遷侍中帝引在帷幄諷議左右嘗問衡天下所疾惡者宦官懼其毁已皆共目之衡乃詭對而出閹豎恐終為其患遂共䜛之衡常思圖身之事以為吉凶倚伏幽微難明乃作思𤣥賦𤣥道也徳也老子曰𤣥之又𤣥衆妙之門以宣寄情志其辭曰仰先哲之𤣥訓兮雖彌高其弗違𤣥訓道徳之訓也論語顔回曰仰之彌髙匪仁里其焉宅兮匪義迹其焉追論語孔子曰里仁為羙宅不處仁焉得智里宅皆居也潛服膺以永靚兮綿日月而不衰說文曰膺胷也禮記曰服膺拳拳而不息靚音才性反前書音義曰靚與静同伊中情之信脩兮慕古人之貞節脩謂自脩為善也楚辭曰茍中情其好脩兮竦余身而順止兮遵繩墨而不跌竦企立也禮記曰爲人臣止於㳟為人子止於孝為人父止於慈與國人交止於信跌蹉也音徒結反繩墨喻禮法也楚辭曰遵繩墨而不頗志團團以應懸兮誠心固其如結圑圑垂貌也詩曰心之憂矣如或結之旌性行以制佩兮佩夜光與瓊枝旌明也夜光羙玉瓊枝玉樹以喻堅貞也楚辭曰折瓊枝以繼佩也纗幽蘭之秋華兮又綴之以江蘺案纗音租緩反字書亦纂字也纂繫也諸家音並户珪反誤也江蘺香草也本草經曰蘪蕪一名江蘺即芎藭苖也楚辭曰扈江蘺與薜芷兮紉秋蘭以為佩皆取芬芳以象徳也美襞積以酷裂兮允塵邈而難虧襞積衣襵也酷裂香氣盛也司馬相如曰酷裂淑郁又曰襞積褰皺允信也塵乆也邈逺也虧猶歇也衣服芬芳乆而不歇以喻道徳著美幽而不屈也既姱麗而鮮雙兮非是時之攸珍姱音口瓜反王逸注楚辭曰姱好也攸所也言徳雖美好而時人不珍也奮余榮而莫見兮播余香而莫聞幽獨守此仄陋兮敢怠皇而舍勤怠惰也皇暇也舍廢也幸二八之遻虞兮喜傅說之生殷尚前良之遺風兮恫後辰而無及二八八元八凱也遻遇也音五故反虞虞舜也尚慕也恫痛也音通辰時也痛已後時而不及之也何孤行之焭焭兮子不羣而介立感鸞鷖之特棲兮悲淑人之稀合山海經曰女牀山有鳥五采名曰鸞見則天下安寧又曰九疑山有五采之鳥名鷖淑善也特獨也言靈鳥既獨棲善人亦少合也彼無合其何傷兮患衆偽之冒眞旦獲讟于羣弟兮啓金縢而乃信旦周公也讟謗也信音申成王立周公攝政其弟管叔蔡叔等謗言云公将不利於孺子周公乃誅二叔秋大熟未穫天大雷電以風禾盡偃成王與大夫啓金縢之書乃得周公所自以為功代武王之䇿方信周公忠於國家也事見尚書覽烝民之多僻兮畏立辟以危身烝衆也僻邪也辟法也詩曰人之多僻無自立辟也曾煩毒以迷或兮羌孰可與言己曾重也羌發語辭也言己之志無可與言之也私湛憂而深懷兮思繽紛而不理湛音沈繽紛亂貌也願竭力以守義兮雖貧窮而不改執雕虎而試象兮阽焦原而跟止雕虎有文也阽臨也焦原原名跟足踵也尸子曰中黄伯曰我左執太行之獶右執雕虎唯象之未試吾或焉有力者則又願為牛與象自謂天下之義人也惡乎試之曰夫貧窮太行之獶也跡賤者義之雕虎也吾日試之矣又曰莒國有名焦原者廣尋長五十歩臨百仞之谿莒國莫敢近也有以勇見莒子者獨却行劑踵焉此所以服莒國也夫義之為焦原也髙矣此義所以服一世也衡言躬履仁義不避險難亦足以服一代之人也庶斯奉以周旋兮要既死而後已左傳史克曰奉以周旋不敢失墜論語孔子曰死而後已不亦逺乎俗遷渝而事化兮泯規矩之圜方化變也泯滅也珍蕭艾於重笥兮謂蕙芷之不香蕭蒿也笥篋也蕙芷並香草也貴蕭艾喻任小人謂蕙芷為不香喻棄賢人也斥西施而弗御兮羈要裊以服箱斥逺也西施越之羙女也要音於皎反裊音奴了反呂氏春秋曰要裊古之駿馬也服駕也箱車也言踈逺羙女又以駿馬駕車並喻不能用賢也劉攽曰案要裊古良馬當作褭從馬行陂僻而獲志兮循法度而離殃陂不正也離被也惟天地之無窮兮何遭遇之無常不抑操而茍容兮譬臨河而無航航船也孫卿子曰偷合茍容以持禄周書隂符曰四輔不存若濟河無舟矣欲巧笑以干媚兮非余心之所嘗襲溫恭之黻衣兮披禮義之繡裳襲重也周禮黒與青謂之黻五色備曰繡辮貞亮以為鞶兮雜技藝以為珩說文曰辮交織也音蒱殄反禮記曰男鞶革女鞶絲鄭𤣥注云鞶小囊盛帨巾也珩佩玉也昭綵藻與雕琢兮璜聲逺而彌長璜佩玉也爾雅曰半璧曰璜言佩服之羙喻道徳之盛也淹棲遲以恣欲兮燿靈忽其西藏淹久也棲遲游息也燿靈日也楚辭曰燿靈安藏言年嵗之蹉跎也恃己知而華予兮鶗鴂鳴而不芳己知猶知己也華榮也予衡自謂也鶗鴂鳥名喻䜛人也廣雅曰鷤䳏布榖也楚辭曰恐鷤䳏之先鳴兮使夫百草為之不芳王逸注云以喻䜛言先至使忠直之士被罪也言恃知己以相榮反遇䜛而見害也冀一年之三秀兮遒白露之為霜三秀芝草也楚辭曰采三秀於山間說文曰遒廹也方秀遇霜喻以賢被䜛也時亹亹而代序兮疇可與乎比伉亹亹進貌也謂四時更進而代序疇誰也伉偶也伉協韻音苦郎反咨妒嫮之難並兮想依韓以流亡咨歎也妒忌也嫮美也音胡故反楚辭曰嫮目宜笑言嫉妒者憎惡美人故難與並也韓謂齊仙人韓衆也為王採藥王不肯服終自服之遂得仙楚辭曰羡韓衆而得一流亡謂流遁亡去也恐漸冉而無成兮留則蔽而不章心猶與而狐疑兮即岐阯而攄情岐阯山足也周文王所居也文君為我端蓍兮利飛遁以保名文君文王也端正也楚辭曰詹尹端䇿拂龜周易遁卦上九曰肥遁無不利淮南九師道訓曰遁而能飛吉孰大焉歴衆山以周流兮翼迅風以揚聲遁卦艮下乾上艮為山故曰歴衆山從二至四為巽巽為風故曰翼迅風也二女感於崇岳兮或氷折而不營遁上九變而為咸咸感也咸卦艮下兌上從二至四為巽與兑為二女也崇岳謂艮也從三至五為乾易說卦曰乾為氷兌為毁折陽不求隂故曰氷折而不營也天蓋高而為澤兮誰云路之不平乾變為兌乾為天兌為澤故曰天為澤言天髙尚為澤誰云路之不平言可行也勔自强而不息兮蹈玉階之嶢崢勔勉也乾為金玉故曰玉階嶢崢高峻貌嶢音堯崢音士耕反懼筮氏之長短兮鑽東龜以觀禎左傳晉卜人曰筮短龜長不如從長言筮之未盡復以龜卜之也周禮龜人掌六龜之屬東龜曰果屬其色青也遇九臯之介鳥兮怨素意之不逞詩小雅曰鶴鳴九臯注云臯澤中溢水出所為也自外數至九喻深逺也介耿介也龜經有棲鶴兆也言卜得鶴兆也逞快也協韻音丑貞反遊塵外而瞥天兮據㝠翳而哀鳴瞥視也音普列反㝠翳高逺也鵰鶚競於貪婪兮我脩絜以益榮鵰鶚鷙鳥也以喻䜛佞也子有故於𤣥鳥兮歸母氏而後寧子謂衡也有故於𤣥鳥謂卜得鶴兆也易曰鳴鶴在隂其子和之我有好爵吾與汝縻之言子歸母氏然後得寧猶臣遇賢君方享爵禄勸衡求聖君以仕之也占既吉而無悔兮簡元辰而俶装悔惡也元辰吉辰也俶整也旦余沐於清原兮晞余髮於朝陽晞乾也朝陽日也爾雅曰山東曰朝陽楚辭曰朝濯髮於陽谷夕晞余身乎九陽也潄飛泉之瀝液兮咀石菌之流英瀝液微流也咀嚼也石菌芝也英華也翾鳥舉而魚躍兮將往走乎八荒翾飛也音許縁反走猶赴也音奏八荒八方荒逺地也淮南子曰登太山履石封以望八荒過少皥之窮野兮問三丘乎句芒帝王紀曰少皥邑于窮桑都曲阜故或謂之窮桑帝地在魯城北衡欲往東方故先過窮桑之野三丘東海中三山也謂蓬萊方丈瀛洲句芒木正東方之神也何道眞之淳粹兮去穢累而票輕道眞謂道徳之真班固幽通賦曰矧沈躬於道真不澆曰淳不雜曰粹票音匹妙反猶飄颻也登蓬萊而容與兮鼇雖抃而不傾鼇大龜也列子曰勃海之東有大壑焉其中有五山一曰岱輿二曰員嶠三曰方壺四曰瀛洲五曰蓬萊隨波上下往還不得暫峙仙聖訴於帝使巨鼇十五舉首而戴之迭為三番六萬嵗一交焉五山始不動抃音皮媛反楚辭曰鼇戴山抃説文抃拊手也留瀛洲而採芝兮聊且以乎長生東方朔十洲記曰瀛洲在東海之東上生神芝仙草有玉石膏出泉如酒味名之為玉酒飲之令人長生也憑歸雲而遐逝兮夕余宿乎扶桑扶桑日所出在陽谷中其桑相扶而生見淮南子噏青岑之玉醴兮餐沆瀣以為糧爾雅曰山小而髙曰岑郭璞注曰言岑崟也楚辭曰餐六氣而飲沆瀣王逸注云沆瀣夜半氣也糧或作粻發昔夢於木禾兮穀崑崙之高岡山海經曰崐崘墟在西北方八百里髙萬仞上有木禾長五尋大五圍昔夜也榖生也衡此夜夢禾生於崐崘山之上即下文云抨巫咸以占夢含嘉秀以為敷是也衡集注及近代注解皆云昔日夢至木禾今親往見焉是為發昔夢也臣賢案衡之此賦将往走乎八荒以後即先往東方次往南方乃適西方此時正在陽谷扶桑之地崐崘乃西方之山安得已往崐崘見木未乎良由尋究不精致斯謬耳朝吾行於𤾉谷兮從伯禹於稽山𤾉谷日所出也孔安國注尚書曰禹代鯀為崇伯故稱伯吳越春秋曰禹登茅山大㑹計理國之道故更名其山曰㑹稽也集羣神之執玉兮疾防風之食言左傳曰禹合諸侯於塗山執玉帛者萬國國語仲尼曰昔禹致羣神於㑹稽之山防風氏後至禹殺而戮之客曰敢問誰為神仲尼曰山川之守足以紀綱天下者其守為神食言謂後至也爾雅曰食偽也指長沙以邪徑兮存重華乎南鄰長沙今潭州也從稽山西南向長沙故云邪徑存猶問也重華舜名𦵏於蒼梧在長沙南故云南鄰也哀二妃之未從兮翩儐處彼湘瀕二妃舜妻堯女娥皇女英翩連翩也擯棄也瀕水涯也劉向列女傳曰舜陟方死於蒼梧二妃死於江湘之間俗謂之湘君湘夫人也禮記云舜葬蒼梧二妃不從也流目覜夫衡阿兮睹有黎之圯墳痛火正之無懷兮託山陂以孤魂衡阿衡山之曲也黎顓頊之子祝融也為髙辛氏之火正葬於衡山圯毁也盛𢎞之荆州記云衡山南有南正重黎墓楚靈王時山崩毁其墳得營丘九頭圖焉愁蔚蔚以慕逺兮越卬州而愉敖河圖曰天有九部八紀地有九州八柱東南神州曰晨土正南卬州曰深土西南戎州曰滔土正西弇州曰开土正中冀州曰白土西北柱州曰肥土北方𤣥州曰成土東北咸州曰隐土正東揚州曰信土愉樂也敖遊也躋日中于昆吾兮憩炎天之所陶淮南子曰日至于昆吾是謂正中髙誘注云昆吾丘名在南方憩息也東方翔神異經曰南方有火山長四十里廣四五里晝夜火然陶猶炎熾也揚芒熛而絳天兮水泫沄而涌濤芒光芒也字林曰熛飛火也音必遥反泫音胡犬反沄音户昆反並水流貌也溫風翕其增熱兮惄鬱邑其難聊温風炎風也淮南子曰南方之極自北户之外南至委火炎風之野二萬二千里惄音奴覿反爾雅曰惄思也顝羈旅而無友兮余安能乎留兹顝獨也音苦骨反不能留此將復西行也顧金天而歎息兮吾欲往乎西嬉金天氏西方之帝少皥也嬉戲也前祝融使舉麾兮纚朱鳥以承旗纚繫也音山綺反朱鳥鳯也楚辭曰鳯凰翼其承旗也躔建木於廣都兮拓若華而躊躇躔次也拓猶折也淮南子曰建木在廣都若木在建木西木有十日其華照地山海經曰廣都之野后稷葬焉楚辭曰折若木以拂日躊躇猶徘徊也躊音直流反躇音直余反超軒轅於西海兮跨汪氏之龍魚聞此國之千歲兮曾焉足以娛余山海經曰軒轅之國在窮山之際其下夀者八百嵗龍魚在其北一曰蝦魚有神巫乗此以行九野一曰鱉魚在汪野北其為魚也如鯉魚白人之國在龍魚北也思九土之殊風兮從蓐收而遂徂九土九州也蓐收西方神也徂徃也欲還中土也歘神化而蟬蛻兮朋精粹而為徒歘疾貌也音許勿反蜕音税説文曰蟬蜕所觧皮也言去故就新若蟬蜕也朋猶侣也精粹羙也劉攽曰注案文當云蜕蝉所解皮也蹶白門而東馳兮云台行乎中野蹶音厥鄭𤣥注禮記云蹶行遽之貌也淮南子曰自東北方曰方土之山曰蒼門東方曰東極之山曰開明之門東南方曰波母之山曰陽門南方曰南極之山曰暑門西南方曰編駒之山曰白門西方曰西極之山曰閶闔之門西北方曰不周之山曰幽都之門北方曰北極之山曰寒門凡八極之雲是雨天下八門之風是節寒暑爾雅曰台我也野協韻音神渚反亂弱水之潺湲兮逗華隂之湍渚正絶流曰亂山海經曰崑崙之丘其下有弱水之川環之注云其水不勝鳥毛潺湲流貎也逗止也華隂華山之北也臨河故云湍渚號馮夷俾清津兮櫂龍舟以濟予號呼也聖賢塜墓記曰馮夷者𢎞農華隂潼鄉隄首里人服八石得水仙為河伯龍魚河圖曰河伯姓吕名公子夫人姓馮名夷俾使也清靜也津濟度處静之使無波濤也櫂檝也淮南子曰龍舟鷁首浮吹以虞予我也劉攽曰注為河伯龍魚案文伯下當有一字未詳或云是主字會帝軒之未歸兮悵相佯而延佇帝軒黄帝也鑄鼎於湖在今湖城縣與河華相近未歸謂黄帝得仙升天神靈未歸相佯猶徘徊也呬河林之蓁蓁兮偉關雎之戒女呬音許吏反爾雅曰呬息也蓁蓁茂盛貌山海經云北望河林其状如蒨偉羙也詩國風曰關闗雎鳩在河之洲窈窕淑女君子好仇衡覩河洲而思之也黄靈詹而訪命兮摎天道其焉如黄靈黄帝神也爾雅曰詹至也訪謀也摎求也曰近信而逺疑兮六籍闕而不書曰黄帝答言六籍六經也神逵昧其難覆兮疇克謨而從諸逵道也爾雅曰覆審也疇誰也謨謀也牛哀病而成虎兮雖逢昆其必噬昆兄也淮南子曰昔公牛哀病七日化而為虎其兄覘之虎搏而殺之不知其兄也鼈令殪而尸亡兮取蜀禪而引世鼈令蜀王名也令音靈殪死也禪傳位也引長也揚雄蜀王本紀曰荆人鼈令死其尸流亡随江水上至成都見蜀王杜宇杜宇立以為相杜宇號望帝自以徳不如鼈令以其國禅之號開明帝下至五代有開眀尚始去帝號復稱王也死生錯而不齊兮雖司命其不晰錯交錯也司命天神也春秋佐助期曰司命神名為滅黨長八尺小鼻望羊多髭癯瘦通於命運期度晰眀也協韻音之逝反竇號行於代路兮後膺祚而繁廡竇謂孝文竇皇后也繁廡茂盛也吕太后時出宫人以賜諸王竇姬家近清河願如趙近家遺宦者吏必置我趙伍中宦者忘之誤置代伍中姬涕泣不欲徃相強乃行至代代王獨幸竇姬生景帝後立為皇后景帝生十四子後至光武中興也王肆侈於漢庭兮卒銜恤而絶緒王謂孝平王皇后莽之女也前書聘以黄金二萬斤遣劉歆奉乗輿法駕迎后于第及莽簒位后嘗稱疾不朝㑹莽誅后自投火中而死恤憂也詩小雅曰出則銜恤絶緒言無後也尉尨眉而郎潛兮逮三葉而遘武尉謂都尉顔駟也尨蒼雜色遘遇也漢武故事曰上至郎署見一老郎鬢眉皓白問何時為郎何其老也對曰臣姓顔名駟以文帝時為郎文帝好文而臣好武景帝好老而臣尚少陛下好少而臣已老是以三葉不遇也上感其言擢為㑹稽都尉也董弱冠而司衮兮設王隧而弗處董賢字聖卿哀帝時為大司馬年二十衮三公服也時哀帝命為賢起冡至尊無以加及帝崩王莽殺賢於獄中左傳曰晉侯請隧曰王章也禮記曰二十曰弱冠也夫吉凶之相仍兮恒反側而靡所穆負天以悅牛兮豎亂叔而幽主穆魯大夫叔孫豹也謚曰穆牛謂豎牛豹之子也幽閉也大夫稱主左傳曰叔孫豹奔齊宿於庚宗遇婦人而私焉至齊夢天壓已弗勝顧而見人號之曰牛助余乃勝之及後還魯庚宗之婦人獻以雉曰余子長矣召而見之則所夢也遂使為豎有寵及穆子遇疾豎牛欲亂其室曰夫子疾病不欲見人牛不進食穆子遂餓而死文斷袪而忌伯兮閹謁賊而寧后文晉文公也祛􅃑也忌怨也伯謂伯楚也謁告也賊謂吕甥冀芮等寧安也后文公也初晉獻公使寺人勃鞮伐公於蒲城公踰垣勃鞮斬其祛及公入國吕甥冀芮謀作亂伯楚知之以告公公㑹秦伯于王城殺吕郄伯楚勃鞮字也事見國語通人闇於好惡兮豈愛惑之能剖通人謂穆子文公等闇於好惡謂初悦豎牛後以餓死始怨勃鞮終能告賊剖分也言通人尚闇於好惡况愛寵昏惑者豈能分之嬴擿讖而戒胡兮備諸外而發内嬴秦姓也摘猶發也謂始皇發讖云亡秦者胡乃使䝉恬北築長城以為外備而不知胡亥竟為趙髙所殺秦氏遂亡是發内也或輦賄而違車兮孕行產而為對輦運也違避也車謂張車子也有夫婦夜田者天帝見而矜之問司命曰此可富乎司命曰命當貧有張車子財可以借而與之期曰車子生急還之田者稍富及期夫婦輦其賄以逃同宿有婦人夜生子問名於其父父曰生車間名車子其家自此之後遂大貧敝見捜神記愼竈顯於言天兮占水火而妄誶爾雅曰誶告也左傳曰日有食之梓慎曰將水叔孫昭子曰旱也後果大旱又曰宋衞陳鄭將火鄭大夫禆竈請瓘斚玉瓚禳火子産弗予竈曰不用吾言鄭又将大子産曰天道逺人道邇非爾所及遂不與亦不復火也梁叟患夫黎丘兮丁厥子而事刃親所睇而弗識兮矧幽㝠之可信梁叟梁國之老人也丁當也睇視也矧況也吕氏春秋曰梁北有黎丘郷鄉有丈人徃市醉而歸者黎丘竒鬼效其子之状而道苦之丈人醒謂其子曰吾為而父我醉女道苦我何故其子泣曰必竒鬼也丈人眀日之市醉其真子迎之丈人拔劍而刺之事音側利反前書音義曰江東人以物插地中為事也毋綿攣以涬已兮思百憂以自疢綿攣猶牽制也涬音胡鼎反衡集註云涬引也言勿牽制於俗引憂於己詩曰無思百憂祗自重兮彼天監之孔明兮用棐忱而佑仁監視也孔甚也棐輔也忱誠也佑助也言天之視人甚眀唯輔誠信而助仁徳也尚書曰天監厥徳又曰天威棐忱湯蠲體以禱祈兮蒙厖禠以拯人蠲潔也祈求也爾雅曰厖大也禠福也帝王紀曰湯時大旱七年殷史卜曰當以人禱湯曰必以人禱吾請自當遂齊戒翦髮斷爪以己為牲禱於桑林之社果大雨言䝉天大福以拯救人衡集祈作祊祊祭也禠音斯景三慮以營國兮熒惑次於它辰景宋景公也三慮謂三善言也景公有疾司馬子韋曰熒惑守心心宋之分野君當祭之可移於相公曰相股肱也除心腹之疾而寘之股肱可乎曰可移於民公曰民所以為國無民何以為君曰可移於歳公曰歲所以養人也歲不登何以畜人乎子韋曰君善言三熒惑必退三舍見呂氏春秋也魏顆亮以從理兮鬼亢回以敝秦魏顆魏武子之子也亮信也左傳曰晉魏顆敗秦師於輔氏獲杜回杜回秦之力人也初魏武子有嬖妾武子疾命顆曰必嫁是妾疾病則曰必以為殉及卒顆嫁之曰疾病則亂吾從其治也輔氏之役顆見老人結草以亢杜回躓而顛故獲之夜夢之曰余而所嫁婦人之父也爾用先人治命余是以報也咎繇邁而種徳兮徳樹茂乎英六尚書曰咎繇邁種徳注云邁行也種布也英六並國名咎繇能行布道徳子孫茂盛封於英六帝王紀臯陶卒葬之於六禹封其少子於六以奉其祀六故城在今夀州安豐縣南也桑末寄夫根生兮卉既彫而已毓根生謂寄生也言百軰至寒皆彫落唯寄生獨榮於桑之末本草經桑上寄生一名寄屑一名寓木一名宛童以喻咎繇封於英六餘國先滅英六獨存也有無言而不讎兮又何往而不復言咎繇布徳行仁慶流後裔詩曰無言不讎易曰無徃不復也盍逺迹以飛聲兮孰謂時之可蓄盍何不也蓄猶待言何不逺遊以飛聲譽誰謂時之可待言易逝也仰矯首以遥望兮魂􅐞惘而無疇􅐞惘猶敞怳也偪區中之隘陋兮將北度而宣遊偪迫也宣徧也行積冰之磑磑兮清泉沍而不流淮南子曰北方之極自九澤窮大海之極有凍寒積氷雪雹羣氷之野磑音牛哀反世本云公輸作石磑說文曰皚皚霜雪之貌也盖古字磑與皚通沍音胡故反杜預注左傳云沍閉也寒風凄而永至兮拂穹岫之騷騷𤣥武縮於殻中兮螣蛇蜿而自糾𤣥武謂龜蛇也曲禮曰前朱雀而後𤣥武殻龜甲也爾雅曰螣螣蛇蜿屈也糾纒結也騷騷叶韻音修紏音古由反魚矜鱗而幷凌兮鳥登木而失條矜竦也并猶聚也凌氷也音力澄反失條言寒也坐太隂之屏室兮慨含欷而增愁太隂北方極隂之地也楚詞曰選鬼神於太隂怨高陽之相寓兮㑋顓頊之宅幽髙陽氏帝顓頊也山海經曰東北海之外附禺之山帝顓頊與九嬪葬焉相視也寓居也㑋屈也音乞鳯反宅幽謂居北方幽都之地尚書曰宅朔方曰幽都庸織絡於四裔兮斯與彼其何瘳庸勞也織絡猶經緯徃来也瘳愈也言勞於徃来四方經積氷炎火之地彼此亦何差也織或作識絡或作駱望寒門之絶垠兮縱余緤乎不周淮南子曰北極之山曰寒門楚辭曰踔絶垠乎寒門垠音玉巾反廣雅曰垠咢也緤馬韁也音思列反不周西北方山也垠或作限也迅飈潚其媵我兮鶩翩飄而不禁飈風也潚疾也音肅媵送也翩飄亦疾貌也禁協韻音金趨谽㗿之洞穴兮標通淵之碄碄谽㗿深貌也谽音呼含反㗿音呼加反碄音林亦深貌也既遊四方又入地下經重隂乎寂寞兮愍墳羊之潛深重隂地中也國語曰魯季桓子穿井獲土缶中有蟲若羊焉使問仲尼仲尼對曰土之怪曰墳羊追慌忽於地底兮軼無形而上浮慌忽無形貌也出右宻之闇野兮不識蹊之所由右謂西方也宻山名也山海經曰西方曰宻山黄帝取宻山之玉䇿投之鍾山之隂闇幽隠也蹊路也速燭龍令執炬兮過鍾山而中休速召也燭龍北方之神也山海經曰西北海之外有神人靣蛇身而赤其眼及晦視乃明不食不寝是燭九隂是謂燭龍炬可以昭明瞰瑤谿之赤岸兮弔祖江之見劉瑤谿瑤岸也山海經曰鍾山之東曰瑤岸又曰鍾山其子曰鼓其状人靣而龍身是與欽􅀈殺祖江于崐崘之陽音邳爾雅曰劉殺也聘王母於銀臺兮羞玉芝以療飢王母西王母也銀臺仙人所居也羞進也本草經曰白芝一名玉芝戴勝愸其既歡兮又誚余之行遲山海經曰崐崘之丘有人戴勝虎齒有尾穴處名曰西王母愸相傳音宜覲反杜預注左傳愸發語之音也臣賢案張揖字詁愸笑貌也鳴之别體音許近反與此義合也載太華之玉女兮召洛浦之宓妃詩含神霧曰太華之山上有明星玉女主持玉漿服之成仙宓妃洛水神也咸姣麗以蠱媚兮增嫮眼而娥眉姣好也音古巧反蠱音野謂妖麗也嫮音胡故反好貌也楚辭曰嫮目宜笑也舒妙婧之纎腰兮揚雜錯之袿徽婧音財性反謂妍婧也袿音圭婦人之上服爾雅曰婦人之徽謂之䄜郭璞注云即今之香纓也離朱脣而微笑兮顏的礰以遺光的礰明也遺光言光彩射人也獻環琨與璵縭兮申厥好以𤣥黄環琨並玉佩也白虎通曰脩道無窮即佩環能本道徳即佩琨也𤣥黄謂繒綺也尚書曰厥篚𤣥黄言玉女宓妃等既獻環佩又贈以繒綺也雖色豔而賂美兮志浩蕩而不嘉賂或作貽浩蕩廣大也言不以玉女及贈遺為美也楚辭曰怨靈脩之浩蕩雙材悲於不納兮並詠詩而清歌雙材謂玉女宓妃也即上文所謂二女感於崇岳也歌曰天地烟熅百卉含蘤鳴鶴交頸睢鳩相和處子懷春精魂回移烟煴氣也易繫辭曰天地烟煴張揖字詁曰蘤古花字也處子處女也懐思也荘子曰綽約若處子詩曰有女懐春如何淑明忘我實多㳤善也詩曰如何如何忘我實多將答賦而不暇兮爰整駕而亟行賦謂玉女所歌詩也亟疾也音紀力反即上所謂氷折不營也瞻崐崘之巍巍兮臨縈河之洋洋伏靈龜以負坻兮亘螭龍之飛梁山海經曰河出崐崘西北嵎縈曲也爾雅曰小沚曰坻謂水中髙地以龜負之可以架橋也亘猶横度也廣雅曰無角曰螭龍也登閬風之曾城兮搆不死而為牀閬風山名在崐崘山上楚辭曰登閬風而絏馬淮南子曰崐崘山有曽城九重髙萬一千里上有不死樹在其西今以不死木為牀也屑瑤橤以為糇兮㪺白水以為􅄴瑤瓊也楚辭曰屑瓊橤以為粻糇糧也㪺音居于反謂酌也河圖曰崐山出五色流水其白水東南流入中國名為河也抨巫咸以占夢兮廼貞吉之元符抨使也音普耕反又補耕反巫咸神巫也山海經曰大荒之中有靈山巫咸巫彭巫謝等十巫衡既夢木禾今故令巫咸占之也元善也滋令徳於正中兮含嘉秀以為敷滋茂也淮南子曰昏張中則務種榖説文曰禾嘉榖也至二月始生八月而熟得時之中故謂之禾既垂穎而顧本兮爾要思乎故居穎穟也本禾本也言禾既垂穟顧本人亦當思故居也淮南子曰孔子見禾三變始於粟生於苖成於穟乃歎曰我其首禾乎髙誘注云禾穟向根君子不忘本也安和靜而隨時兮姑純懿之所廬姑且也懿羙也廬猶居也戒庶寮以夙㑹兮僉恭職而並迓僉皆也迓迎也豐隆軯其震霆兮列缺曄其照夜豐隆雷也軯聲也音普耕反震霆霹靂也霆音庭列缺電也曄光也雲師􅞝以交集兮涷雨沛其灑塗雲師屏翳也􅞝隂貌音徒感反爾雅曰暴雨謂之涷沛雨貌也塗協韻音徒故反楚辭曰使涷雨兮灑塵轙琱輿而樹葩兮擾應龍以服輅轙音魚綺反爾雅曰載轡謂之轙郭璞注云轙軶上環也轡所貫也琱以玉餙車也樹立也葩華也於車上建華盖擾馴也廣雅曰有翼曰應龍也百神森其備從兮屯騎羅而星布周頌曰懐柔百神森衆貌也屯聚也振余袂而就車兮修劒揭以低昻脩長也掲低昂貌也冠咢咢其映蓋兮佩綝纚以煇煌咢音五各反一作岌並冠髙貌也映盖謂冠與車盖相映也綝音林纚音離盛貌也煇音胡本反光貌也僕夫儼其正策兮八乘攄而超驤八乗八龍也楚辭曰駕八龍之蜿蜿攎猶騰也氛旄溶以天旋兮蜺旌飄而飛揚氛天氣也旌羽旌也溶音勇王逸注楚辭曰溶廣大貌也蜺雌虹也撫軨軹而還睨兮心灼藥其如湯軨音零說文曰車輜間横木也楚辭曰倚結軨兮太息軹音之是反杜子春注周禮云軹兩轊也說文云車輪小穿也還睨顧瞻也藥音鑠熱貌也言顧瞻鄉國而心熱也羡上都之赫戲兮何迷故而不忘上都謂天上也赫戯盛貌也衡既徧歴四海方欲遊於天上故云何不忘其故居而苦迷惑思之左青琱以揵芝兮右素威以司鉦青琱青文龍也揵堅也音巨偃反芝盖也素威白虎也禮記曰左青龍而右白虎說文曰鉦鐃也似鈴也前長離使拂羽兮委水衡乎𤣥㝠長離即鳯也水衡官名主水官也𤣥㝠水神也司馬相如大人賦曰前長離而後矞皇也屬箕伯以函風兮澂淟涊而為清箕伯風師也函猶含也澂清也淟音它典反涊音乃典反楚辭曰切淟涊之流俗王逸注曰淟涊垢濁也曵雲旗之離離兮鳴玉鸞之譻譻鸞鈴也在鑣譻聲也音嚶楚辭曰鳴玉鸞之啾啾也渉清霄而升遐兮浮蔑蒙而上征霄雲也蔑蒙氣也蒙音莫孔反上征上於天也揚雄甘泉賦曰浮蔑蒙而撇天紛翼翼以徐戾兮焱回回其揚靈翼翼飛貌戾至也回回光貌楚辭曰皇剡剡其揚靈王逸注云揚其光靈也呌帝閽使闢扉兮覿天皇于瓊宫閽主門者天皇天帝也揚雄甘泉賦曰選巫咸兮呌帝閽聆廣樂之九奏兮展􅂥􅂥以肜肜史記曰趙簡子曰我之帝所甚樂與百神游于鈞天廣樂九奏左傳鄭荘公賦大隧之中其樂也融融姜出賦大隧之外其樂也洩洩肜與融同也考理亂於律鈞兮意建始而思終詩序曰太平之音安以樂其政和亂世之音怨以怒其政乖律十二律也樂叶圖徴曰聖人承天以立均宋均注曰均長八尺施絃以調六律也建立也衡言聽九奏之樂考政化之得失而思其終始也惟盤逸之無斁兮懼樂往而哀來盤樂也逸縱也斁厭也音亦又音徒故反古度字也莊子曰樂未畢也哀又繼之素撫弦而餘音兮大容吟曰念哉素素女也史記曰太常使素女鼔五十弦琴大容黄帝樂師也念哉戒逸樂也既防溢而靜志兮迨我暇以翺翔溢滿也迨及也翺翔將逺逝也出紫宫之肅肅兮集太微之閬閬紫宫太㣲並星名也肅肅清也閬閬明大也命王良掌策駟兮踰高閣之鏘鏘史記曰天駟旁一星曰王良髙閣閣道星也史記曰絶漢抵營室曰閣道鏘鏘髙貌也建罔車之幕幕兮獵青林之芒芒罔車畢星也幕幕罔貌青林天苑也彎威弧之撥剌兮射嶓冢之封狼弧星名也易曰弧矢之利以威天下撥音方割反剌音力逹反撥剌張弓貌也嶓冢山也封大也狼星名河圗曰嶓冢之精上為狼星觀壁壘於北落兮伐河鼓之磅硠壁東壁也史記曰羽林天軍西為壁壘旁大星為北落牽牛北為河鼔磅硠聲也磅音普郎反硠音郎乘天潢之汎汎兮浮雲漢之湯湯史記曰王良旁有八星絶漢曰天潢雲漢曰天河也倚招揺攝提以低回剹流兮察二紀五緯之綢繆遹皇招搖攝提星名也剹音居流反低回剹流回轉之貌二紀日月也五緯五星也綢繆相次之貌也遹皇行貌也偃蹇夭矯㛯以連卷兮雜㳫叢顇颯以方驤㛯音孚萬反卷音拳並翺翔自恣之貌也􅖢汨飂戾沛以罔象兮爛漫麗靡藐以迭逿戫音一六反汨音干筆反飂音遼沛音普蓋反並疾貌也藐小也藐音亡小反逿音徒郎反凌驚雷之砊礚兮弄狂電之淫裔砊礚雷聲也砊音康礚苦蓋反滛裔電貌狂疾也踰庬澒於宕㝠兮貫倒景而高厲庬音亡孔反澒音胡孔反孝經援神契曰天度濛澒宋均注云濛澒未分之象也說文曰宕過也㝠幽㝠也貫穿也前書谷永上書曰登遐倒景音義曰在日月之上日月反從下照故其景倒也厲陵厲也廓盪盪其無涯兮乃今窮乎天外據開陽而頫盼兮臨舊鄉之暗藹春秋運斗樞曰北斗第六星為開陽頫音俯暗藹逺貌也暗音烏感反悲離居之勞心兮情悁悁而思歸說文曰悁悁憂也音於緣反詩國風曰勞心悁悁也魂眷眷而屢顧兮馬倚輈而徘回輈轅也雖遨游以媮樂兮豈愁慕之可懷媮音通侯反懐安也出閶闔兮降天塗乘飈忽兮馳虛無閶闔天門雲霏霏兮繞余輪風眇眇兮震余旟繽聯翩兮紛暗曖倐眩眃兮反常閭倐忽也眩音縣眃音混疾貌也常閭故里也收疇昔之逸豫兮卷淫放之遐心謂初遊於四方天地之間以自滛放今改悔也修初服之娑娑兮長余珮之參參楚辭曰退將復修吾初服王逸注云修吾初始清絜之服也娑娑衣貎參參長貌文章煥以粲爛兮美紛紜以從風御六蓺之珍駕兮遊道徳之平林以六藝為車而駕之也以道徳為林而遊之也結典籍而為罟兮歐儒墨而為禽罟網也音古儒家子思孟軻孫卿等墨家謂翟墨胡非尹佚等玩隂陽之變化兮詠雅頌之徽音嘉曾氏之歸耕兮慕歴陵之欽崟琴操曰歸耕者曽子之所作也曽子事孔子十餘年晨覺眷然念二親年衰飬之不備於是援琴鼓之曰往而不反者年也不可得而再事者親也歔欷歸耕来日安所耕歴山盤乎欽崟山貌崟音吟共夙昔而不貳兮固終始之所服也夕􅅥若厲以省諐兮懼余身之未勑也共音恭易曰君子終日乾乾夕􅅥若厲􅅥懼也厲病也勑整也茍中情之端直兮莫吾知而不恧恧慙也音女六反墨無為以凝志兮與仁義乎消揺老子曰上徳無為不出户而知天下兮何必歴逺以劬勞老子曰不出户而知天下系曰天長地久歲不留俟河之清祗懷憂系繫也老子曰天長地久左氏傳曰俟河之清人壽幾何也願得逺度以自娛上下無常窮六區六區謂四方上下也超踰騰躍絶世俗飄颻神舉逞所欲天不可階仙夫希栢舟悄悄吝不飛階升也論語曰夫子之不可及猶天之不可階而升仙夫仙人也詩邶風曰栢舟言仁而不遇也其詩曰汎彼栢舟亦汎其流憂心悄悄愠于羣小静言思之不能奮飛鄭𤣥注云舟載度物者也今不用而與衆物汎汎然俱流水中諭仁人不用而與羣小並列悄悄憂貌也臣不遇於君猶不忍奮翼而飛去吝惜也衡亦不遇其時而為宦者所䜛故引以自諭也松喬高跱孰能離結精逺遊使心攜松赤松子也喬王子喬也列仙傳曰赤松子神農時雨師服水玉教神農能入火自燒至崐崘山上常止西王母石室隨風上下王子喬周靈王太子晉也好吹笙作鳯鳴遊伊洛間道士浮丘公接上嵩髙山三十餘年後來於山上見桓良曰告我家七月七日待我緱氏山頭果乘白鶴徃山巔望之不得到舉手謝時人數日去字林曰跱踞也謂得仙髙踞也離附也攜離也回志朅來從𤣥諆朅去也音丘列反諆或作謀諆亦謀也音基字從其獲我所求夫何思永和初出為河間相河間王名政時國王驕奢不遵典憲又多豪右共為不軌衡下車治威嚴整法度隂知姦黨名姓一時收禽上下肅然稱為政理視事三年上書乞骸骨徴拜尚書年六十二永和四年卒著周官訓詁崔瑗以為不能有異於諸儒也又欲繼孔子易說彖象殘缺者竟不能就所著詩賦銘七言靈憲應間七辯巡誥懸圖凡三十二篇衡集作𤣥圖蓋𤣥與懸通永和中謁者僕射劉珍校書郎劉騊駼等著作東觀撰集漢記因定漢家禮儀上言請衡參論其事㑹並卒而衡常歎息欲終成之及為侍中上疏請得專事東觀收檢遺文畢力補綴衡表曰臣仰幹史職敢徼官守竊貪成訓自忘頑愚願得專於東觀畢力於紀記竭思於補闕俾有漢休烈比久長於天地並光明於日月昭示萬嗣永永不朽也又條上司馬遷班固所叙與典籍不合者十餘事衡集其略曰昜稱宓戯氏王天下宓戯氏沒神農氏作神農氏沒黄帝堯舜氏作史遷獨載五帝不記三皇今宜并録又一事曰帝系黄帝産青陽昌意周書曰乃命少皥清清即青陽也今宜實定之又以為王莽本傳但應載簒事而已至於編年月紀災祥宜為元后本紀又更始居位人無異望光武初為其将然後即眞宜以更始之號建於光武之初書數上竟不聼及後之著述多不詳典時人追恨之論曰崔瑗之稱平子曰數術窮天地制作侔造化瑗撰平子碑文也斯致可得而言歟推其圍範兩儀天地無所蘊其靈易繫辭曰範圍天地之化王弼注云擬範天地而用備其理也謂作渾天儀也運情機物有生不能參其智機物謂作候地動儀等故智思引淵微人之上術記曰徳成而上蓺成而下禮記文也量斯思也豈夫蓺而已哉何徳之損乎損减也言藝不減於徳也贊曰三才理通人靈多蔽三才天地人言人雖與天地通為三才而性靈多蔽罕能知天道也近推形算逺抽深滯不有𤣥慮孰能昭晣𤣥猶深也晣音制後漢書卷八十九後漢書卷八十九考證張衡傳雖老氏曲全進道若退然行亦以需舊本或無此十四字并質共劑注質劑猶今分文契也文字别本作支我不忍以歙肩注孟子曰阿意事貴脅肩所尊俗之情也臣㑹汾按章懐所引孟子每與今本大同小異此注二語尤不相合或别有所本成哀之後乃始聞之閻若璩云緯起哀平而平子言成哀之後乃始聞之初亦不省所謂讀班書李尋傳成帝元延中尋説王根曰五經六緯尊術顯士則知成帝朝已有緯名矣下言成於哀平之際最分眀也後漢書卷八十九考證
