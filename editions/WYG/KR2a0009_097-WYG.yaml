body:
  text: 後漢書卷九十七宋宣城太守范煜撰唐章懐太子賢注黨錮列傳第五十七孔子曰性相近也習相逺也言嗜惡之本同而遷染之塗異也嗜猶好也惡音烏故反言人好惡各有本性遷染者由其所習尚書曰唯人生厚因物有遷墨子曰墨子見染􅁝者泣而歎曰染於蒼則蒼染於黄則黄故染不可不慎也非獨染絲然也國亦有染湯染於伊尹故王天下殷紂染於惡來故國殘身死為天下僇夫刻意則行不肆牽物則其志流刻意刻削其意不得自恣也莊子曰刻意尚行離時異俗行音下孟反肆猶放縱也牽物謂為物所牽制則其志流宕忘反也淮南子曰非拘繫牽連於物而不與推移也是以聖人導人理性裁抑宕佚慎其所與節其所偏雖情品萬區質文異數至於陶物振俗其道一也陶謂陶冶以成之管子曰夫法之制人猶陶之於埴冶之於金也埴猶植叔未澆訛王道陵缺叔未猶季末也謂當春秋之時而猶假仁以効已憑義以濟功舉中於理則強梁褫氣片言違正則厮臺觧情盖前哲之遺塵有足求者褫猶奪也音直紙反厮臺賤人也齊侯伐楚楚子使與師言曰君處北海寡人處南海唯是風馬牛不相及也不虞君之渉吾地也何故管仲對曰爾貢包茅不入王祭不供無以縮酒寡人是徴對曰貢之不入寡君之罪也遂使屈完與齊盟于召陵此強梁禠氣也又晉吕甥郤芮將焚公宫而殺晉侯寺人披請見公使讓之且辭曰汝為恵公來求殺余命汝三宿汝中宿而至雖有君命何其速也對曰臣謂君之入也其知之矣若猶未也又將及難君命無二古之制也除君之惡唯力是視蒲人狄人余何有焉今君即位其無蒲狄乎此為厮臺觧情也並見左傳霸徳既衰狙詐萌起霸徳衰六國時也狙音七余反廣雅曰狙獮猴也以其多詐故比之也彊者以決勝為雄弱者以詐劣受屈至有畫半䇿而綰萬金開一說而錫琛瑞蘇秦說趙王賜白璧百䨇黄金萬鎰虞卿一見趙王賜白璧一䨇黄金百鎰見史記及戰國䇿或起徒歩而仕執珪觧草衣以升卿相史記曰楚恵王言莊舄越之鄙細人也今仕楚執珪貴富矣觧草衣謂范睢蔡澤之類士之飾巧馳辯以要能釣利者不期而景從矣韓子李斯曰韓非飾辨詐謀以釣利於秦也賈誼過秦論曰贏糧而景從自是愛尚相奪與時回變其風不可留其敝不能反及漢祖杖劍武夫勃興憲令寛賖文禮簡濶緒餘四豪之烈人懐陵上之心四豪謂信陵君魏公子無忌平原君趙勝春申君黄歇孟嘗君田文前書班固曰游談者以四豪為稱首輕死重氣怨恵必讐令行私庭權移匹庶任俠之方成其俗矣前書音義曰相與信為任同是非為俠所謂權行州域力折公侯者也自武帝以後崇尚儒學懐經協術所在霧㑹至有石渠分争之論黨同伐異之說守文之徒盛於時矣武帝詔求賢良於是公孫𢎞董仲舒等出焉宣帝時集諸儒於石渠閣講論六蓺召五經名儒太子太傅蕭望之等大議殿中平公羊穀梁同異同已者朋黨之異已者攻伐之劉歆書曰黨同門妒道真至王莽専偽終於簒國忠義之流恥見纓紼遂乃榮華丘壑甘足枯槁謂龔勝薛方郭欽蔣詡之類並隠居不應莽召雖中興在運漢徳重開而保身懐方彌相慕襲去就之節重於時矣謂逢萌嚴光周黨尚長之屬逮桓靈之間主荒政謬國命委於閹寺士子羞與為伍故匹夫抗憤處士横議遂乃激揚名聲互相題拂品覈公卿裁量執政婞直之風於斯行矣婞狠也音刑鼎反夫上好則下必甚矯枉故直必過其理然矣禮記曰下之事上也不從其所令從其所行上好是物下必有甚者矣矯正也正枉必過其直見孟子若范滂張儉之徒清心忌惡終陷黨議不其然乎初桓帝為蠡吾侯受學於甘陵周福及即帝位擢福為尚書時同郡河南尹房植有名當朝鄉人為之謡曰天下規矩房伯武因師獲印周仲進二家賔客互相譏揣初委反遂各樹朋徒漸成尤隙由是甘陵有南北部黨人之議自此始矣後汝南太守宗資任功曹范滂南陽太守成瑨亦委功曹岑晊音質二郡又為謡曰汝南太守范孟博南陽宗資主畫諾南陽太守岑公孝𢎞農成瑨但坐嘯謝承書曰成瑨少修仁義篤學以清名見舉孝亷拜郎中遷南陽太守郡舊多豪強中官黄門磐牙境界瑨下車振威嚴以檢攝之是時桓帝乳母中官貴人外親張子禁怙恃貴埶不畏法網功曹岑晊勸使捕子禁付宛獄笞殺之桓帝徴瑨下獄死宗資字叔都南陽安衆人也家代為漢將相名臣祖父均自有傳資少在京師學孟氏易歐陽尚書舉孝㢘拜議郎補御史中丞汝南太守署范滂爲功曹委任政事推功於滂不伐其羙任善之名聞於海内也因此流言轉入太學諸生三萬餘人郭林宗賈偉節為其冠冠猶首也並與李膺陳蕃王暢更相褒重學中語曰天下模楷李元禮不畏強禦陳仲舉天下俊秀王叔茂又渤海公族進階公族姓也名進階風俗通曰晉成公立嫡子為公族大夫韓無忌號公族穆子見左氏傳扶風魏齊卿並危言深論不隠豪強危言謂不畏危難而直言也論語孔子曰邦有道危言危行自公卿以下莫不畏其貶議屣履到門時河内張成善說風角推占當赦遂教子殺人李膺為河南尹督促收捕既而逢宥獲免膺愈懐憤疾竟案殺之初成以方伎交通宦官帝亦頗誶其占成弟子牢脩因上書誣告膺等飬太學遊士交結諸郡生徒更相驅馳共為部黨誹訕朝廷疑亂風俗說文曰誹謗也蒼頡篇曰訕非也於是天子震怒班下郡國逮捕黨人布告天下使同忿疾遂收執膺等其辭所連及陳寔之徒二百餘人或有逃遁不獲皆懸金購募使者四出相望於道明年尚書霍諝城門校尉竇武並表為請帝意稍觧乃皆赦歸田里禁錮終身而黨人之名猶書王府自是正直廢放邪枉熾結海内希風之流遂共相摽搒希望也摽搒猶相稱揚也搒與榜同古字通指天下名士為之稱號上曰三君次曰八俊次曰八顧次曰八及次曰八㕑猶古之八元八凱也竇武劉淑陳蕃為三君君者言一世之所宗也李膺荀昱杜宻王暢劉祐魏朗趙典朱㝢為八俊俊者言人之英也郭林宗宗慈巴肅夏馥范滂尹勲蔡衍羊陟為八顧顧者言能以徳行引人者也張儉岑晊劉表陳翔孔昱苑康檀敷翟超為八及及者言其能導人追宗者也導引也宗謂所宗仰也度尚張邈王考劉儒胡母班秦周蕃嚮王章為八㕑蕃姓也音皮㕑者言能以財救人者也又張儉鄉人朱並承望中常侍侯覽意㫖上書告儉與同鄉二十四人别相署號共為部黨圗危社稷以儉及檀彬褚鳳張肅薛蘭馮禧魏𤣥徐乾為八俊田林張隠劉表薛郁王訪劉祗宣靖公緒恭為八顧公緒姓也朱楷田槃疎耽薛敦宋布唐龍羸咨宣褒為八及刻石立墠共為部黨而儉為之魁墠除地於中為壇墠音禪魁大帥也靈帝詔刋章捕儉等刋削不欲宣露並名故削除之而直捕儉等大長秋曹節因此諷有司奏捕前黨故司空虞放太僕杜宻長樂少府李膺司隸校尉朱㝢潁川太守巴肅沛相荀昱河内太守魏朗山陽太守翟超任城相劉儒太尉掾范滂等百餘人皆死獄中餘或先歿不及或亡命獲免自此諸為怨隙者因相陷害睚眦之忿濫入黨中睚音五懈反廣雅曰睚裂也眦音才賜反前書音義曰瞋目貎也史記曰睚眦之隙必報又州郡承㫖或有未嘗交闗亦離禍毒其死徙廢禁者六七百人熹平五年永昌太守曹鸞上書大訟黨人言甚方切帝省奏大怒即詔司隸益州檻車收鸞送槐里獄掠殺之於是又詔州郡更考黨人門生故吏父子兄弟其在位者免官禁錮爰及五屬謂斬衰齊衰大功小功緦麻也光和二年上禄長和海上禄縣屬武都郡今成州縣也上言禮從祖兄弟别居異財恩義已輕服屬疎末而今黨人錮及五族既乖典訓之文有謬經常之法左氏傳曰父子兄弟罪不相及帝覽而悟之黨錮自從祖以下皆得觧釋中平元年黄巾賊起中常侍吕彊言於帝曰黨錮久積人情多怨若久不赦宥輕與張角合謀為變滋大悔之無救帝懼其言乃大赦黨人誅徙之家皆歸故郡其後黄巾遂盛朝野崩離綱紀文章蕩然矣詩大雅蕩篇序曰厲王無道天下蕩蕩無綱紀文章鄭𤣥注云蕩蕩法度廢壊之貌也凡黨事始自甘陵汝南成於李膺張儉海内塗炭二十餘年諸所蔓衍皆天下善士三君八俊等三十五人其名迹存者並載乎篇陳蕃竇武王暢劉表度尚郭林宗别有傳荀昱附祖淑傳張邈附吕布傳胡母班附袁紹傳王考字文祖東平夀張人冀州刺史秦周字平王陳留平丘人北海相蕃嚮字嘉景魯國人郎中王璋字伯儀東莱曲城人少府卿曲城縣故城在今莱州掖縣東北位行並不顯翟超山陽太守事在陳蕃傳字及郡縣未詳朱㝢沛人與杜宻等俱死獄中唯趙典名見而已劉淑傳劉淑字仲承河間樂成人也祖父稱司隸校尉淑少學明五經遂隠居立精舍講授諸生常數百人州郡禮請五府連辟並不就永興二年司徒种暠舉淑賢良方正辭以疾桓帝聞淑髙名切責州郡使輿病詣京師淑不得已而赴洛陽對䇿為天下第一拜議郎又陳時政得失災異之占劉攽曰案文多一又字初未曾有陳何得言又事皆效驗再遷尚書納忠建議多所補益又再遷侍中虎賁中郎將上疏以為宜罷宦官辭甚切直帝雖不能用亦不罪焉以淑宗室之賢特加敬異每有疑事常宻諮問之靈帝即位宦官譖淑與竇武等通謀下獄自殺李膺傳李膺字元禮潁川襄城人也祖父脩安帝時為太尉漢官儀曰脩字伯游父益趙國相膺性簡亢無所交接亢髙也唯以同郡荀淑陳寔為師友初舉孝亷為司徒胡廣所辟舉髙第再遷青州刺史守令畏威明多望風棄官復徴再遷漁陽太守尋轉蜀郡太守以母老乞不之官謝承書曰出補蜀郡太守脩庠序設條教明法令恩威並行蜀之珍玩不入於門益州紀其政化朝廷舉能理劇轉烏桓校尉轉烏桓校尉鮮卑數犯塞膺常䝉矢石每破走之虜甚憚懾謝承書曰膺常率歩騎臨陣交戰身被創痍拭血進戰遂敗宼斬首二千級以公事免官還居綸氏教授常千人綸氏縣屬潁川郡故城今陽城縣也南陽樊陵求為門徒膺謝不受陵後以阿附宦官致位太尉為節志者所羞漢官儀曰樊陵字徳雲荀爽嘗就謁膺因為其御既還喜曰今日乃得御李君矣其見慕如此永夀二年鮮卑寇雲中桓帝聞膺能乃復徴為度遼將軍先是羌虜及疏勒龜兹數出攻鈔張掖酒泉雲中諸郡百姓屢被其害自膺到邊皆望風懼服先所掠男女悉送還塞下自是之後聲振逺域延熹二年徴再遷河南尹時宛陵大姓羊元羣罷北海郡臧罪狼籍郡舍溷軒有竒巧乃載之以歸溷軒厠屋膺表欲案其罪元羣行賂官豎膺反坐輸作左校初膺與廷尉馮緄大司農劉祐等共同心志紏罸姦倖緄祐時亦得罪輸作司隸校尉應奉上疏理膺等曰昔秦人觀寳於楚昭奚恤莅以羣賢新序曰秦欲伐楚使使者往觀楚之寳器楚王聞之召昭奚恤問焉對曰此欲觀吾國之得失而圗之寳器在於賢臣遂使恤應之乃為東面之壇一為南面之壇四為西面之壇一秦使者至恤曰君客也請就上位東面子西南面太宰子方次之葉公子髙次之司馬子反次之恤自居西面之壇稱曰客觀楚國之寳器所寳者賢臣也理百姓實倉廩使人各得其所子西在此奉珪璋使諸侯觧忿悁之難交兩國之懽使無兵草之憂太宰子方在此守封疆謹境界不侵鄰國鄰亦不侵葉公子髙在此理師旅正兵戎以當彊敵提枹鼓以動百萬之衆使皆赴湯火蹈白刄出萬死不顧司馬子反在此若懐霸王之餘義獵理亂之遺風昭奚恤在此惟大國所觀秦使者瞿然無以對恤遂攝衣而去使反言秦君曰楚多賢臣未可謀也梁恵王瑋其照乘之珠齊威王答以四臣瑋猶羙也史記曰魏恵王問齊威王曰王亦有寳乎威王曰無有魏王曰寡人之國雖小尚有徑寸珠照車前後十二乘者十枚奈何以萬乘之國而無寳乎威王曰寡人所以為寳者與王異吾臣有檀子者使守南城楚人不敢為寇吾臣有盻子者使守髙唐則趙人不敢東漁於河吾臣有黔夫者使守徐州於是燕人祭北門趙人祭西門從者七十餘家吾臣有種首者使備盜賊則道不拾遺以此為寳將以照千里豈特十二乘哉魏王慚不懌而去夫忠賢武將國之心膂竊見左校㢮刑徒前廷尉馮緄大司農劉祐河南尹李膺等執法不撓誅舉邪臣肆之以法肆陳也衆庶稱宜昔季孫行父親逆君命逐出莒僕於舜之功二十之一紀太子僕殺紀公以其寳玉来奔納諸宣公公命與之邑季文子使司寇出之境公問其故對曰孝敬忠信為吉徳盜賊藏姦為凶徳夫莒僕則其孝敬則弑君父矣則其忠信則竊寳玉矣其人則盜賊也是以去之舜舉十六相去四凶有大功二十而為天子今行父雖未獲一吉人去一凶矣於舜之功二十之一也見左傳今膺等投身彊禦畢力致罪陛下既不聽察而猥受譖訴遂令忠臣同愆元惡自春迄冬不䝉降恕遐邇觀聽為之歎息夫立政之要記功忘失是以武帝捨安國於徒中景帝時韓安國為梁大夫坐法抵罪後梁内史缺起徒中為二千石拜為内史臣賢案此言武帝誤也宣帝徴張敞於亡命張敞為京兆尹坐殺人亡命歸家冀州亂徴敞為冀州刺史緄前討蠻荆均吉甫之功詩小雅曰顯允方叔征伐玁狁蠻荆来威鄭𤣥注云方叔先與吉甫征伐玁狁今特征伐蠻荆皆使来服於宣王之威美其功之多也緄以順帝時討長沙武陵蠻夷有功故以比之祐數臨督司有不吐茹之節謂祐奏梁冀弟旻又為司隸校尉權豪畏之也詩曰唯仲山甫柔亦不茹剛亦不吐不侮鰥寡不畏彊禦膺著威幽并遺愛度遼今三垂蠢動王旅未振易稱雷雨作觧君子以赦過宥罪易觧卦象辭也卦坎下震上觧坎為險為水水者雨之象震為動為雷王弼注云屯難盤結於是乎觧也乞原膺等以備不虞書奏乃悉免其刑再遷復拜司隸校尉時張讓弟朔為野王令貪殘無道至乃殺孕婦聞膺厲威嚴懼罪逃還京師因匿兄讓第舍藏於合柱中膺知其狀率將吏卒破柱取朔付洛陽獄受辭畢即殺之讓訴寃於帝詔膺入殿御親臨軒詰以不先請便加誅辟之意膺對曰昔晉文公執衛成公歸于京師春秋是焉公羊傳曰晉人執衛侯歸之于京師歸之于者執之乎天子之側者也罪定不定已可知矣何休注云歸之于者決辭也禮云公族有罪雖曰宥之有司執憲不從觧見張酺傳昔仲尼為魯司寇七日而誅少正卯今臣到官已積一旬私懼以稽留為愆不意獲速疾之罪誠自知釁責死不旋踵特乞留五日尅殄元惡退就鼎鑊始生之願也帝無復言顧謂讓曰此汝弟之罪司隸何愆乃遣出之自此諸黄門常侍皆鞠躬屏氣休沐不敢復出宫省帝怪問其故並叩頭泣曰畏李校尉是時朝廷日亂綱紀穨阤膺獨持風裁以聲名自髙裁音才代反士有被其容接者名為登龍門以魚為喻也龍門河水所下之口在今絳州龍門縣辛氏三秦記曰河津一名龍門水險不通魚鱉之屬莫能上江海大魚薄集龍門下數千不得上上則為龍也及遭黨事當考實膺等案經三府太尉陳蕃郤之曰今所考案皆海内人譽憂國忠公之臣此等猶將十世宥也觧見耿弇傳豈有罪名不章而致收掠者乎不肯平署平署猶連署也帝愈怒遂下膺等於黄門北寺獄獄名觧見靈紀也膺等頗引宦官子弟宦官多懼請帝以天時宜赦於是大赦天下膺免歸鄉里居陽城山中天下士大夫皆髙尚其道而汙穢朝廷以朝廷為汙穢也及陳蕃免太尉朝野屬意於膺荀爽恐其名髙致禍欲令屈節以全亂世為書貽曰久廢過庭不聞善誘陟岵瞻望惟日為嵗論語曰鯉趨而過庭子曰學詩乎曰未也又曰孔子恂恂然善誘人詩曰陟彼岵兮瞻望父兮又曰一日不見如三嵗兮爽致敬於膺故以父為喻也知以直道不容於時悅山樂水家于陽城道近路夷當即聘問無狀嬰疾闕於所仰頃聞上帝震怒貶黜鼎臣上帝謂天子鼎臣即陳蕃人鬼同謀易下繋曰人謀鬼謀百姓與能以為天子當貞觀二五利見大人易曰天地之道貞觀也乾九二九五並曰利見大人也不謂夷之初旦明而未融夷傷也融朗也明夷卦離下坤上離為日坤為地日之初出其明未朗左傳曰明而未融其當旦乎以膺黜故喻之也虹蜺揚煇棄和取同春秋考異郵曰虹蜺出亂惑弃和謂弃君子同小人也方今天地氣閉大人休否易文言曰天地閉賢人隠否九五曰大人休否休否謂休廢而否塞智者見險投以逺害見險難故投身以逺害也易曰君子以儉徳避難不可榮以禄雖匱人望内合私願匱乏也想甚欣然不為恨也願怡神無事偃息衡門毛萇詩注曰衡門横木為門任其飛沈與時抑揚頃之帝崩陳蕃為太傅與大將軍竇武共秉朝政連謀誅諸宦官故引用天下名士乃以膺為長樂少府及陳竇之敗膺等復廢後張儉事起收捕鈎黨鄉人謂膺曰可去矣對曰事不辭難罪不逃刑臣之節也左傳曰晉侯之弟揚干亂行於曲梁魏絳戮其僕晉侯怒謂羊舌赤曰合諸侯以為榮也揚干為戮何辱如之必殺魏絳無失也對曰絳無貳志事君不避難有罪不逃刑其將来辭何辱命焉吾年已六十死生有命去將安之乃詣詔獄考死妻子徙邊門生故吏及其父兄並被禁錮時侍御史蜀郡景毅子顧為膺門徒而未有錄牒故不及於譴毅乃慨然曰本謂膺賢遣子師之豈可以漏奪名籍茍安而已劉攽曰案文奪當作脫脫作奪音耳字不可通遂自表免歸時人義之膺子瓚位至東平相謝承書瓚作珪初曹操㣲時瓚異其才將沒謂子宣等曰時將亂矣天下英雄無過曹操張孟卓與吾善袁本初汝外親雖爾勿依必歸曹氏諸子從之並免於亂世杜宻傳杜宻字周甫潁川陽城人也為人沈質少有厲俗志為司徒胡廣所辟稍遷代郡太守徴三遷太山太守北海相其宦官子弟為令長有姦惡者輒捕案之行春到髙宻縣見鄭𤣥為鄉佐知其異噐即召署郡職遂遣就學後宻去官還家每謁守令多所陳託同郡劉勝亦自蜀郡告歸鄉里閉門掃軌無所干及軌車迹也言絶人事大守王昱謂宻曰劉季陵清髙士公卿多舉之者宻知昱激已對曰劉勝位為大夫見禮上賔而知善不薦聞惡無言隠情惜已自同寒蟬此罪人也寒蟬謂寂黙也椘詞曰悲哉秋之為氣也蟬寂寞而無聲今志義力行之賢而宻達之力行謂盡力行善也禮記曰好問近乎智力行近乎仁違道失節之士而宻紏之使明府賞刑得中令問休揚不亦萬分之一乎昱慚服待之彌厚後桓帝徴拜尚書令遷河南尹轉太僕黨事既起免歸本郡與李膺俱坐而名行相次故時人亦稱李杜焉前有李固杜喬故言亦也後太傅陳蕃輔政復為太僕明年坐黨事被徴自殺劉祐傳劉祐字伯祖中山安國人也安國縣故城在今定州義豐縣東南謝承書曰祐宗室𦙍緒代有名位少修操行學嚴氏春秋小戴禮古文尚書仕郡為主簿郡將少子嘗出錢付之令市買果實祐悉以買筆書具與之因白郡將言郎君年可入小學而但傲狠逺近謂明府無過庭之教請出授書郡將為使子就祐受經五日一試不滿呈限白決罰遂成學業也安國後别屬博陵祐初察孝亷補尚書侍郎閑練故事文札強辨每有奏議應對無滯為僚類所歸除任城令兗州舉為尤異遷揚州刺史是時㑹稽太守梁是大將軍冀之從弟也祐舉奏其罪旻坐徴復遷祐河東太守時屬縣令長率多中官子弟百姓患之祐到黜其權強平理寃結政為三河表三河謂河東河内河南也表猶標準也再遷延熹四年拜尚書令又出為河南尹轉司隸校尉時權貴子弟罷州郡還入京師者每至界首輙改易輿服隠匿財寳威行朝廷拜宗正三轉大司農時中常侍蘇康管覇用事於内遂固天下良田羙業山林湖澤民庶窮困州郡累氣累氣屏息也祐移書所在依科品沒入之桓帝大怒論祐輸左校後得赦出復歴三卿輙以疾辭乞骸骨歸田里詔拜中散大夫遂杜門絶迹每三公缺朝廷皆屬意於祐以譖毁不用延篤貽之書曰昔太伯三讓人無徳而稱焉三讓觧見和帝紀延陵髙揖華夏仰風揖讓也左傳吴王夀夢卒子諸樊既除䘮將立弟季札札棄其室而耕乃舍之吾子懐蘧氏之可卷體甯子之如愚蘧瑗字伯玉甯子名俞並衛大夫論語孔子曰君子哉蘧伯玉邦有道則仕邦無道則可卷而懐之又曰甯武子邦無道則愚微妙𤣥通冲而不盈老子曰古之善為道者㣲妙𤣥通深不可識也又曰道冲而用之或不盈蔑三光之明未暇以天下為事何其劭與莊子曰舜讓天下於子州支伯子州支伯曰予適有幽憂之病方且理之未暇理天下也靈帝初陳蕃輔政以祐為河南尹及蕃敗祐黜歸卒于家明年大誅黨人幸不及禍魏朗傳魏朗字少英㑹稽上虞人也上虞縣故城在今越州餘姚縣西有虞山在縣東少為縣吏兄為鄉人所殺朗白日操刃報讐於縣中遂亡命到陳國從博士郤仲信學春秋圗緯孔子作春秋緯十二篇又詣太學受五經京師長者李膺之徒争從之初辟司徒府再遷彭城令時中官子弟為相國多行非法朗與更相章奏幸臣忿疾欲中之中猶中傷㑹九真賊起乃共薦朗為九真都尉到官奨厲吏兵討破羣賊斬首二千級桓帝美其功徴拜議郎頃之遷尚書屢陳便宜有所補益出為河内太守政稱三河表尚書令陳蕃薦朗公忠亮直宜在機宻復徴為尚書㑹被黨議免歸家朗性矜嚴閉門整法度家人不見墯容後竇武等誅朗以黨被急徴行至牛渚自殺牛渚山名突出江中謂為牛渚圻在令宣州當塗縣北也著書數篇號魏子云夏馥傳夏馥字子治陳留圉人也少為書生言行質直同縣髙氏蔡氏並皆富殖郡人畏而事之唯馥比門不與交通比門猶並門也由是為豪姓所仇桓帝初舉直言不就馥雖不交時宦然以聲名為中官所憚遂與范滂張儉等俱被誣陷詔下州郡捕為黨魁及儉等亡命經歴之處皆被收考辭所連引布徧天下馥乃頓足而歎曰孽自已作空汙良善一人逃死禍及萬家何以生為乃自剪須變形入林慮山中林慮今相州縣隠匿姓名為冶家傭親突煙炭形貎毁瘁積二三年人無知者後馥弟静乗車馬載縑帛追之於湼陽市中湼陽縣屬南陽郡遇馥不識聞其言聲乃覺而拜之馥避不與語静追随至客舍共宿夜中宻呼静曰吾以守道疾惡故為權宦所陷且念營茍全以庇性命弟奈何載物相求是以禍見追也明旦别去黨禁未觧而卒宗慈傳宗慈字孝初南陽安衆人也安衆在今南陽縣西南仍有其名無復基址也舉孝亷九辟公府有道徴不就後為脩武令時太守出自權豪多取貨賂慈遂棄官去徴拜議郎未到道疾卒南陽羣士皆重其義行巴肅傳巴肅字恭祖勃海髙城人也髙城縣故城在今滄州鹽山縣南初察孝亷歴慎令貝丘長慎縣屬汝南郡貝丘縣屬清河郡皆以郡守非其人辭病去辟公府稍遷拜議郎與竇武陳蕃等謀誅閹宦武等遇害肅亦坐黨禁錮中常侍曹節後聞其謀收之肅自載詣縣縣令見肅入閤觧印綬與俱去肅曰為人臣者有謀不敢隠有罪不逃刑既不隠其謀矣又敢逃其刑乎遂被害刺史賈琮刋石立銘以記之范滂傳范滂字孟博汝南征羌人也征羌觧見來歙傳謝承書曰汝南細陽人也少厲清節為州里所服舉孝亷光祿四行漢官儀曰光祿舉敦厚質樸遜讓節儉此為四行也時冀州饑荒盜賊羣起乃以滂為清詔使案察之滂登車攬轡慨然有澄清天下之志及至州境守令自知臧汙望風觧印綬去其所舉奏莫不厭塞衆議遷光祿勲主事時陳蕃為光祿勲滂執公儀詣蕃蕃不止之滂懐恨投版棄官而去版笏也郭林宗聞而讓蕃曰若范孟博者豈宜以公禮格之格正也今成其去就之名得無自取不優之議邪蕃乃謝焉復為太尉黄瓊所辟後詔三府掾屬舉謡言漢官儀曰三公聴採長史臧否人所疾苦還條奏之是為舉謡言也頃者舉謡言掾屬令吏都㑹殿上主者大言州郡行狀云何善者同聲稱之不善者黙爾銜枚滂奏刺史二千石權豪之黨二十餘人尚書責滂所劾猥多疑有私故滂對曰臣之所舉自非叨穢姦暴深為民害豈以汙簡札哉間以㑹日廹促故先舉所急其未審者方更參實臣聞農夫去草嘉榖必茂左傳曰為國家者見惡如農夫之務去草焉忠臣除姦王道以清若臣言有貳甘受顕戮吏不能詰滂覩時方艱知意不行因投劾去太守宗資先聞其名請署功曹委任政事滂在職嚴整疾惡其有行違孝悌不軌仁義者皆掃迹斥逐不與共朝顯薦異節抽㧞幽陋滂外甥西平李頌公族子孫而為鄉曲所棄中常侍唐衡以頌請資資用為吏滂以非其人寑而不召資遷怒捶書佐朱零零仰曰范滂清裁猶以利刄齒腐朽裁音才載反今日寜受笞死而滂不可違資乃止郡中中人以下莫不歸怨乃指滂之所用以為范黨後牢脩誣言鉤黨鉤引也滂坐繫黄門北寺獄獄吏謂曰凡坐繋皆祭臯陶滂曰臯陶賢者古之直臣知滂無罪將理之於帝帝謂天也如其有罪祭之何益衆人由此亦止獄吏將加掠考滂以同囚多嬰病乃請先就格遂與同郡袁忠爭受楚毒桓帝使中常侍王甫以次辨詰滂等皆三木囊頭暴於階下三木項及手足皆有械更以物䝉覆其頭也前書司馬遷曰魏其大將也衣赭闗三木也餘人在前或對或否滂忠於後越次而進王甫詰曰君為人臣不推忠國而共造部黨自相褒舉評論朝廷虚搆無端諸所謀結並欲何為皆以情對不得隐飾滂對曰臣聞仲尼之言見善如不及見惡如探湯探湯喻去疾也見論語欲使善善同其清惡惡同其汙謂王政之所願聞不悟更以為黨甫曰卿更相㧞舉迭為唇齒有不合者見則排斥其意如何劉攽曰見則案文當作則見滂乃慷慨仰天曰古之循善自求多福今之循善身陷大戮劉攽曰案文循皆當作脩身死之日願埋滂於首陽山側上不負皇天下不愧夷齊伯夷叔齊餓死首陽山見史記首陽山在洛陽東北甫愍然為之改容乃得並觧桎梏鄭𤣥注周禮曰木在足曰桎在手曰梏滂後事釋南歸始發京師汝南南陽士大夫迎之者數千兩兩車也尚書曰戎車三百兩同囚鄉人殷陶黄穆亦免俱歸並衛侍於傍應對賔客滂顧謂陶等曰今子相隨是重吾禍也遂遁還鄉里初滂等繫獄尚書霍諝理之乃得免到京師往候諝而不為謝或有讓滂者對曰昔叔向嬰罪祁奚救之未聞羊舌有謝恩之辭祁老有自伐之色竟無所言左傳晋討欒盈之黨殺叔向之弟羊舌虎并囚叔向於是祁奚聞之見范宣子曰夫謀而鮮過恵訓不倦者叔向有焉社稷之固也猶將十代宥之今一不免其身不亦惑乎宣子說而免之祁奚不見叔向而歸叔向亦不告免焉而朝孔安國注尚書曰自功曰伐也建寜二年遂大誅黨人詔下急捕滂等督郵吳導至縣抱詔書閉傳舍伏牀而泣傳驛舍也音知戀反滂聞之曰必為我也即自詣獄縣令郭揖大驚出觧印綬引與俱亡曰天下大矣子何為在此滂曰滂死則禍塞何敢以罪累君又令老母流離乎其母就與之訣滂白母曰仲博孝敬足以供飬仲博滂弟也滂從龍舒君歸黄泉謝承書曰滂父顯故龍舒侯相也存亡各得其所惟大人割不可忍之恩勿増感戚母曰汝今得與李杜齊名死亦何恨李膺杜宻既有令名復求夀考可兼得乎滂跪受教再拜而辭顧謂其子曰吾欲使汝為惡則惡不可為使汝為善則我不為惡行路聞之莫不流涕時年三十三論曰李膺振㧞汙險之中前書班固曰振㧞汙塗跨騰風雲也蘊義生風以鼓動流俗周易曰鼓以動之激素行以恥威權立亷尚以振貴埶使天下之士奮迅感槩波蕩而從之幽深牢破室族而不顧至于子伏其死而母歡其義壯矣哉子曰道之將廢也與命也論語之文尹勲傳尹勲字伯元河南鞏人也家世衣冠伯父睦為司徒兄頌為太尉宗族多居貴位者而勲獨持清操不以地埶尚人州郡連辟察孝亷三遷邯鄲令政有異迹後舉髙第五遷尚書令及桓帝誅大將軍梁冀勲參建大謀封都鄉侯遷汝南太守上書觧釋范滂袁忠等黨議禁錮尋徴拜將作大匠轉大司農坐竇武等事下獄自殺蔡衍傳蔡衍字孟喜汝南項人也項今陳州項城縣也少明經講授以禮讓化鄉里鄉里有争訟者輙詣衍決之其所平處皆曰無怨舉孝亷稍遷冀州刺史中常侍具瑗託其弟㳟舉茂才衍不受乃收齎書者案之又劾奏河間相曹鼎臧罪千萬鼎者中常侍騰之弟也騰使大將軍梁冀為書請之衍不答鼎竟坐輸作左校乃徴衍拜議郎符節令梁冀聞衍賢請欲相見衍辭疾不往冀恨之時南陽太守成瑨等以收紏宦官考廷尉衍與議郎劉瑜表救之言甚切厲坐免官還家杜門不出靈帝即位復拜議郎㑹病卒羊陟傳羊陟字嗣祖太山梁父人也梁父故城在今兗州泗水縣北家世衣冠族陟少清直有學行舉孝亷辟太尉李固府舉髙第拜侍御史㑹固被誅陟以故吏禁錮厯年復舉髙第再遷冀州刺史奏案貪濁所在肅然又再遷虎賁中郎將城門校尉三遷尚書令時大尉張顥司徒樊陵大鴻臚郭防太僕曹陵大司農馮方並與宦豎相姻私公行貨賂並奏罷黜之不納以前太尉劉寵司隸校尉許永幽州刺史楊熙涼州刺史劉恭益州刺史龎艾清亮在公薦舉升進帝嘉之拜陟河南尹計日受奉常食乾飯茹菜禁制豪右京師憚之㑹黨事起免官禁錮卒於家張儉傳張儉字元節山陽髙平人趙王張耳之後也張耳大梁人也髙祖立為趙王父成江夏太守儉初舉茂才以刺史非其人謝病不起延熹八年太守翟超請為東部督郵時中常侍侯覽家在防東縣名屬山陽郡故城在今兗州金鄉縣南殘暴百姓所為不軌儉舉劾覽及其母罪惡請誅之覽遏絶章表並不得通由是結仇覽等鄉人朱並素性佞邪為儉所棄並懐怨恚遂上書告儉與同郡二十四人為黨於是刋章討捕儉得亡命困廹遁走望門投止莫不重其名行破家相容復流轉東萊止李篤家外黄令毛欽操兵到門篤引欽謂曰張儉知名天下而亡非其罪縱儉可得寜忍執之乎欽因起撫篤曰蘧伯玉恥獨為君子足下如何自専仁義篤曰篤雖好義明廷今日載其半矣明廷猶明府言不執儉得義之半也欽歎息而去篤因縁送儉出塞以故得免其所經厯伏重誅者以十數宗親並殄滅郡縣為之殘破中平元年黨事觧乃還鄉里大將軍三公並辟又舉敦朴公車特徴起家拜少府皆不就獻帝初百姓饑荒而儉資計差溫乃傾竭財産與邑里共之頼其存者以百數建安初徴為衛尉不得已而起儉見曹氏世徳已萌乃闔門懸車不豫政事嵗餘卒于許下年八十四論曰昔魏齊違死虞卿觧印違避也史記魏齊魏之諸公子也虞卿趙相也范雎入秦為昭王相昭王乃遺趙王書曰魏齊范雎之仇也急持其頭來趙王乃圍齊齊急見虞卿卿度趙王不可說乃觧其印與齊往信陵君所信陵君初聞之疑後乃出迎齊聞信陵初疑遂自刎趙王持其頭遺秦也季布逃亡朱家甘罪季布楚人為項羽將數窘漢王羽敗漢購求布千金敢舍匿罪三族布匿濮陽周氏髠鉗布之魯朱家所賣之朱家心知是季布也買置田舍乃徃洛陽見汝隂侯灌嬰說之曰季布何罪臣各為主用職耳汝隂侯言於髙帝帝乃赦之拜郎中後為河東守也而張儉見怒時王顛沛假命天下聞其風者莫不憐其壯志而争為之主至乃捐城委爵破族屠身盖數十百所豈不賢哉然儉以區區一掌而欲獨堙江河堙塞也前書班固曰何武王嘉區區以一簣障江河用沒其身終嬰疾甚之亂多見其不知量也論語曰人而不仁疾之已甚亂也又曰人雖欲自絶其何傷於日月乎多見其不知量也岑晊傳岑晊字公孝南陽棘陽人也棘音力父豫為南郡太守以貪叨誅死方言曰叨殘也晊年少未知名往候同郡宗慈慈方以有道見徴賔客滿門以晊非良家子不肯見晊留門下數日晚乃引入慈與語大竒之遂將俱至洛陽因詣太學受業晊有髙才郭林宗朱公叔等皆為友李膺王暢稱其有幹國器雖在閭里慨然有董正天下之志爾雅曰董督正也太守𢎞農成瑨下車欲振威嚴聞晊髙名請為功曹又以張牧為中賊曹吏劉攽曰案文多一中字吏又當作史瑨委心晊牧褒善紏違肅清朝府宛有富賈張汎者桓帝羙人之外親善巧雕鏤玩好之物頗以賂遺中官以此並得顯位恃其伎巧用埶縱横晊與牧勸瑨收捕汎等既而遇赦晊竟誅之并收其宗族賔客殺二百餘人後乃奏聞於是中常侍侯覽使汎妻上書訟其寃帝大震怒徴瑨下獄死晊與牧遁逃亡匿齊魯之間㑹赦出後州郡察舉三府交辟並不就及李杜之誅因復逃竄終于江夏山中云陳翔傳陳翔字子麟汝南邵陵人也祖父珍司隸校尉翔少知名善交結察孝亷太尉周景辟舉髙第拜侍御史時正旦朝賀大將軍梁冀威儀不整翔奏冀恃貴不敬請收案罪時人竒之遷定襄太守徴拜議郎遷揚州刺史舉奏豫章太守王永奏事中官吳郡太守徐參在職貪穢並徴詣廷尉參中常侍璜之弟也由此威名大振又徴拜議郎補御史中丞坐黨事考黄門北寺獄以無驗見原卒于家孔昱傳孔昱字元世魯國魯人也七世祖霸成帝時歴九卿封褒成侯臣賢案前書孔霸字次儒即安國孫世習尚書宣帝時為太中大夫授太子經遷詹事髙宻相元帝即位霸以師賜爵闗内侯號褒成君薨謚曰烈君今范書及謝承書皆云成帝又言封侯盖誤也詹事及相俱二千石故曰歴卿自霸至昱爵位相係其卿相牧守五十三人列侯七人昱少習家學家學尚書大將軍梁冀辟不應太尉舉方正對䇿不合乃辭病去後遭黨事禁錮靈帝即位公車徴拜議郎補洛陽令以師䘮棄官卒于家苑康傳苑康字仲真勃海重合人也重合縣故城在今滄州樂陵縣東少受業太學與郭林宗親善舉孝亷再遷潁隂令有能迹遷太山太守郡内豪姓多不法康至奮威怒施嚴令莫有干犯者先所請奪人田宅皆遽還之是時山陽張儉殺常侍候覽母案其宗黨賔客或有迸匿太山界者康既常疾閹宦因此皆窮相收掩無得遺脫覽大怨之誣康與兗州刺史第五種及都尉壺嘉詐上賊降徴康詣廷尉減死罪一等徙日南潁隂人及太山羊陟等詣闕為訟乃原還本郡卒於家檀敷傳檀敷字文有山陽瑕丘人也瑕丘今兗州縣少為諸生家貧而志清不受鄉里施恵舉孝亷連辟公府皆不就立精舍教授逺方至者常數百人桓帝時博士徴不就靈帝即位太尉黄瓊舉方正對䇿合時宜再遷議郎補䝉令䝉縣屬梁國以郡守非其人棄官去家無産業子孫同衣而出年八十卒于家謝承書曰敷與子孫同衣而行并日而食也劉儒傳劉儒字叔林東郡陽平人也陽平故城今魏州莘縣郭林宗常謂儒口訥心辯有珪璋之質珪璋玉也半珪曰璋謝承書曰林宗歎儒有珪璋之質終必為令徳之士詩曰如珪如璋令聞令望察孝亷舉髙第三遷侍中桓帝時數有災異下䇿博求直言儒上封事十條極言得失辭甚忠切帝不能納出為任城相頃之徴拜議郎㑹竇武事下獄自殺賈彪傳賈彪字偉節潁川定陵人也少遊京師志節慷慨與同郡荀爽齊名初仕州郡舉孝亷補新息長新息今豫州縣小民困貧多不飬子彪嚴為其制與殺人同罪城南有盗劫害人者北有婦人殺子者彪出案發就發處案驗也而掾吏欲引南劉攽曰案文吏當作史說處具前彪怒曰賊寇害人此則常理母子相殘逆天違道遂驅車北行案驗其罪城南賊聞之亦面縛自首數年間人飬子者千數僉曰賈父所長生男名為賈子生女名為賈女延熹元年黨事起太尉陳蕃争之不能得朝廷寒心莫敢復言彪謂同志曰吾不西行大禍不觧乃入洛陽說城門校尉竇武尚書霍諝武等訟之桓帝以此大赦黨人李膺出曰吾得免此賈生之謀也先是岑晊以黨事逃亡親友多匿焉彪獨閉門不納時人望之望怨也彪曰傳言相時而動無累後人相視也左傳之文也公孝以要君致釁自遺其咎吾以不能奮戈相待反可容隐之乎於是咸服其裁正以黨禁錮卒于家初彪兄弟三人並有髙名而彪最優故天下稱曰賈氏三虎偉節最怒何顒傳何顒字伯求南陽襄鄉人也襄鄉故城在今隨州􅀥陽縣東北也少逰學洛陽顒雖後進而郭林宗賈偉節等與之相好顯名太學友人虞偉髙有父讐未報而篤病將終顒往候之偉髙泣而訴顒感其義為復讐以頭醊其墓醊祭酹也音竹嵗反及陳蕃李膺之敗顒以與蕃膺善遂為宦官所陷乃變姓名亡匿汝南間所至皆親其豪傑有聲荆豫之域劉攽曰案文間字下又云有聲荆豫之域若祗在汝南則無用間字不當云荆盖漏南郡兩字也南郡則屬荆州袁紹慕之私與往來結為奔走之友詩大雅曰予曰有疏附予曰有先後予曰有奔走予曰有禦侮毛萇注曰論徳宣譽曰奔走也是時黨事起天下多離其難顒常私入洛陽從紹計議其窮困閉戹者為求援救以濟其患有被掩捕者則廣設權計使得逃隠全免者甚衆及黨錮觧顒辟司空府每三府㑹議莫不推顒之長累遷及董卓秉政逼顒以為長史託疾不就乃與司空荀爽司徒王允等共謀卓㑹爽薨顒以它事為卓所繫憂憤而卒初顒見曹操歎曰漢家將亡安天下者必此人也操以是嘉之嘗稱潁川荀彧王佐之噐及彧為尚書令遣人西迎叔父爽并致顒屍而𦵏之爽之冡傍劉攽曰西迎叔父爽案文致顒屍又𦵏冢傍則爽亦死矣明脫一䘮字贊曰渭以涇濁玉以礫貞物性既區嗜惡從形礫音厯說文曰礫小石也言渭以涇濁乃顯其清玉居礫石乃見其貞區猶别也嗜愛也從形謂形有善惡也以諭彼李膺等與宦豎不同故相憎疾蘭蕕無並消長相傾蕕臭草也左傳曰一薫一蕕十年尚猶有臭易否卦曰小人道長君子道消泰卦曰君子道長小人道消老子曰髙下相傾也徒恨芳膏煎灼燈明前書龔勝死有一老父入哭甚哀曰薫以香自燒膏以明自消後漢書卷九十七後漢書卷九十七考證黨錮傳矯枉故直必過其理然矣注正枉必過其直見孟子今孟子無此文南陽宗資主畫諾臣世駿按讀者多以唯諾之辭非也此王公守相答箋啟符牒之文如人主之制杜宻傳劉季陵清髙士陵本或作林魏朗傳中官子弟為相國諸本同何焯校本改國相范滂傳君為人臣不推忠國臣㑹汾按江寜顧氏本作不惟惟字義長左氏傳曰嬰所不惟忠於君利社稷者是與以鼓動流俗注周易曰鼓以動之諸本同臣㑹汾按易無此文羊陟傳司隸校尉許永永毛本作氷監本作水今從宋本岑晊傳父豫為南郡太守豫監本作像從宋本改後漢書卷九十七考證
