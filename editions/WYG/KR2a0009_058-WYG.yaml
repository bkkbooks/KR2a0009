body:
  text: 後漢書卷五十八上宋宣城太守范煜撰唐章懷太子賢注桓馮列傳第十八上桓譚傳桓譚字君山沛國相人也相縣名故城在今徐州符離縣西北父成帝時為太樂令譚以父任為郎因好音律宫商角徴羽謂之五聲聲成文謂之音律謂六律黄鍾太蔟姑洗㽔賔夷則無射善鼓琴博學多通徧習五經皆詁訓大義不為章句説文曰詁訓古言也章句謂離章辨句委曲枝𣲖也能文章尤好古學數從劉歆揚雄辯析疑異性嗜倡樂倡俳優也簡易不脩威儀而憙非毁俗儒由是多見排抵抵擊也音紙哀平間位不過郎傅皇后父孔鄉侯晏深善於譚傅皇后哀帝后是時高安侯董賢寵幸女弟為昭儀皇后日已疏晏嘿嘿不得意譚進説曰昔武帝欲立衛子夫隂求陳皇后之過子夫衞皇后也本平陽主家謳者得幸於武帝生男據遂立為皇后陳皇后武帝姑長公主嫖女也擅寵十餘年無子聞子夫得幸㡬死者數焉上怒遂挾婦人媚道事覺廢居長門宮嫖音匹妙反見前書而陳后終廢子夫竟立今董賢至愛而女弟尤幸殆將有子夫之變可不憂哉晏驚動曰然為之奈何譚曰刑罰不能加無罪邪枉不能勝正人夫士以才智要君女以媚道求主皇后年少希更艱難或驅使醫巫外求方技此不可不備又君侯以后父尊重而多通賔客必借以重埶貽致譏議不如謝遣門徒務執謙慤此脩已正家避禍之道也晏曰善遂罷遣常客常或作賔入白皇后如譚所戒後賢果風太醫令眞欽使求傅氏罪過遂逮后弟侍中喜劉攽曰按傅喜非后弟當是嘉詔獄無所得乃解故傅氏終全於哀帝之時及董賢為大司馬聞譚名欲與之交譚先奏書於賢說以輔國保身之術賢不能用遂不與通當王莽居攝簒弑之際天下之士莫不競襃稱徳羙作符命以求容媚譚獨自守黙然無言莽時為掌樂大夫更始立召拜太中大夫世祖即位徴待詔上書言事失㫖不用後大司空宋𢎞薦譚拜議郎給事中因上疏陳時政所宜曰臣聞國之廢興在於政事政事得失由乎輔佐輔佐賢明則俊士充朝而理合世務輔佐不明則論失時宜而舉多過事夫有國之君俱欲興化建善然而政道未理者其所謂賢者異也昔楚莊王問孫叔敖曰寡人未得所以為國是也莊王名旅穆王啇臣之子也孫叔敖楚賢相也言欲為國於是未知何以得之叔敖曰國之有是衆所惡也恐王不能定也王曰不定獨在君亦在臣乎對曰君驕士曰士非我無從富貴士驕君曰君非士無從安存人君或至失國而不悟士或至饑寒而不進君臣不合則國是無從定矣莊王曰善願相國與諸大夫共定國是也事見新序蓋善政者視俗而施敎察失而立防威德更興文武迭用然後政調於時而躁人可定躁猶動也謂躁撓不定之人也昔董仲舒言理國譬若琴瑟其不調者則解而更張事見前書夫更張難行而拂衆者亡拂違也音扶弗反是故賈誼以才逐而鼂錯以智死賈誼洛陽人也事文帝為博士毎詔令下諸老先生未能言誼盡為之對人人各如其意所出絳灌之屬害之文帝亦疏之乃以誼為長沙太傅鼂錯潁川人也事文帝為太子家令號曰智嚢景帝即位為御史大夫請削諸侯之郡後七國反以誅錯為名遂腰斬錯見前書世雖有殊能而終莫敢談者懼於前事也且設法禁者非能盡塞天下之姦皆合衆人之所欲也大抵取便國利事多者則可矣夫張官置吏以理萬人縣賞設罰以别善惡惡人誅傷則善人䝉福矣今人相殺傷雖已伏法而私結怨讐子孫相報後忿深前至於㓕戸殄業而俗稱豪健故雖有怯弱猶勉而行之此為聽人自理而無復法禁者也今宜申明舊令若已伏官誅而私相傷殺者雖一身逃亡皆徙家屬於邊其相傷者加常二等不得雇山贖罪雇山觧見光武紀如此則仇怨自解盗賊息矣夫理國之道舉本業而抑末利是以先帝禁人二業錮啇賈不得宦為吏髙祖時令賈人不得衣絲乘車市井子孫不得宦為吏此所以抑幷兼長廉恥也今富商大賈多放錢貨中家子弟為之保役中家猶中等也保役可保信也趨走與臣僕等勤收稅與封君比入收稅謂舉錢輸息利也東觀記曰中家子為之保役受計上疏趨走俯伏譬若臣僕坐而分利也是以衆人慕効不耕而食至乃多通侈靡以􅁋耳目今可令諸商賈自相糾告若非身力所得皆以臧畀告者畀與也東觀記載譚言曰賈人多通侈靡之物羅紈綺繡雜綵玩好以滛人耳目而竭盡其財是為下樹奢媒而置貧本也求人之儉約富足何可得乎夫俗難卒變而人不可暴化宜抑其路使之稍自衰焉畀音必二反如此則專役一己不敢以貨與人事寡力弱必歸功田畝田畝脩則榖入多而地力盡矣又見法令決事輕重不齊或一事殊法同罪異論姦吏得因緣為市所欲活則出生議所欲䧟則與死比是為刑開二門也今可令通義理明習法律者校定科比科謂事條比謂類例一其法度班下郡國蠲除故條如此天下知方而獄無怨濫矣方猶法也書奏不省是時帝方信䜟多以決定嫌疑又醻賞少薄天下不時安定譚復上疏曰臣前獻瞽言未蒙詔報不勝憤懣冒死復陳愚夫䇿謀有益於政道者以合人心而得事理也凡人情忽於見事而貴於異聞觀先王之所記述咸以仁義正道為本非有竒怪虛誕之事蓋天道性命聖人所難言也自子貢以下不得而聞况後世淺儒能通之乎論語子貢曰夫子之文章可得而聞也夫子之言性與天道不可得而聞也鄭𤣥注云性謂人受血氣以生有賢愚吉凶天道七政變動之占也今諸巧慧小才伎數之人增益圖書矯稱䜟記伎謂方伎醫方之家也數謂數術明堂羲和史卜之官也圗書即䜟緯符命之類也以欺惑貪邪詿誤人主焉可不抑遠之哉東觀記載譚書云矯稱孔丘為䜟記以誤人主也臣譚伏聞陛下窮折方士黃白之術甚為明矣黄白謂以藥化成金銀也方士有方術之士也而乃欲聽納䜟記又何誤也其事雖有時合譬猶卜數隻偶之類言偶中也陛下宜垂明聽發聖意屛羣小之曲説述五經之正義略靁同之俗語詳通人之雅謀靁之發聲衆物同應俗人無是非之心出言同者謂之靁同禮記曰無靁同又臣聞安平則尊道術之士有難則貴介胄之臣介甲也胄兠鍪也今聖朝興復祖統為人臣主而四方盗賊未盡歸伏者此權謀未得也臣譚伏觀陛下用兵諸所降下旣無重賞以相恩誘或至虜掠奪其財物是以兵長渠率各生狐疑黨軰連結歳月不解古人有言曰天下皆知取之為取而莫知與之為取言先饒與之後乃可取之老子曰將欲廢之必固興之將欲奪之必固與之陛下誠能輕爵重賞與士共之則何招而不至何說而不釋何向而不開何征而不剋如此則能以狹為廣以遲為速亡者復存失者復得矣帝省奏愈不悅其後有詔㑹議靈臺所處楊衒之洛陽記曰平昌門直南大道東是明堂大道西是靈臺也帝謂譚曰吾欲䜟决之何如譚黙然良乆曰臣不讀䜟帝問其故譚復極言䜟之非經帝大怒曰桓譚非聖無法將下斬之譚叩頭流血良乆乃得觧出為六安郡丞六安郡故城在今壽州安豐縣南意忽忽不樂道病卒時年七十餘初譚著書言當世行事二十九篇號曰新論上書獻之世祖善焉新論一曰本造二王覇三求輔四言體五見徴六譴非七啟窹八袪蔽九正經十識通十一離事十二道賦十三辨惑十四述䇿十五閔友十六琴道本造閔友琴道各一篇餘並有上下東觀記曰光武讀之勑言卷大令皆别為上下凡二十九篇琴道一篇未成肅宗使班固續成之東觀記曰琴道未畢但有發首一章所著賦誄書奏凡二十六篇元和中肅宗行東廵狩至沛使使者祠譚冢鄉里以為榮馮衍傳馮衍字敬通京兆杜陵人也東觀記曰其先上黨潞人曾祖父奉世徙杜陵祖野王元帝時為大鴻臚野王字君卿奉世之長子也東觀記曰野王生座襲父爵為關内侯座生衍華嶠書曰衍祖父立生滿年十七喪父早卒滿生衍衍幼有竒才年九歳能誦詩至二十而博通羣書王莽時諸公多薦舉之者衍辭不肯仕時天下兵起莽遣更始將軍㢘丹討伐山東丹辟衍為掾與俱至定陶莽追詔丹曰倉廩盡矣府庫空矣可以怒矣可以戰矣將軍受國重任不捐身於中野無以報恩塞責丹惶恐夜召衍以書示之衍因説丹曰衍聞順而成者道之所大也逆而功者權之所貴也於正道雖違逆而事有成功者謂之權所謂反經合義者也是故期於有成不問所由論於大體不守小節昔逄丑父伏軾而使其君取飲稱於諸侯左氏傳齊晉戰于鞌晉卿韓厥逐及齊侯齊臣逄丑父乃與齊侯易位使齊侯御車韓厥將及齊侯丑父令齊侯如華泉取飲韓厥乃獻丑父於郤克郤克將戮之呼曰自今無有代其君任患者有一於此將為戮乎郤子曰人不難以死免其君我戮之不祥赦之以勸事君者鄭祭仲立突而出忽終得復位美於春秋蓋以死易生以存易亡君子之道也祭仲鄭大夫突及忽皆鄭莊公子也莊公薨太子忽當立公子突宋之出也故宋人執鄭祭仲公羊傳曰祭仲何以不名賢也何賢乎以為知權其知權柰何宋人執之謂曰為我出忽而立突祭仲不從其言則君必死國必亡從其言則君可以生易死國可以存易亡古人有權者祭仲是也權者反乎經後有善者也行權有道殺人以自生亡人以自存君子不為也詭於衆意寧國存身賢智之慮也詭違也故易曰窮則變劉攽曰案文多一曰字變則通通則久是以自天祐之吉無不利皆周易下繫之辭也若夫知其不可而必行之破軍殘衆無補於主身死之日負義於時負猶失也智者不為勇者不行且衍聞之得時無怠怠懈也言當急趋時張良以五世相韓椎秦始皇博浪之中張良大父開地相韓昭侯宣惠王襄哀王父平相釐王悼惠王五代相韓謂良父及祖相韓之五王也後秦㓕韓良家僮三百人乃悉以家財求客刺秦王得力士為鐡椎重百二十斤擊始皇於博浪沙中博浪地名在鄭州武陽縣南椎音力追反謂擊之也勇冠乎賁育名髙乎泰山孟賁夏育並古之勇士也前書音義曰孟賁生抜牛角夏育衞人力舉千鈞也將軍之先為漢信臣廉襃襄武人宣帝時為後將軍即丹之先新室之興英俊不附今海内潰亂人懷漢德甚於詩人思召公也愛其丼棠而况子孫乎人所歌舞天必從之詩小雅曰雖無徳與汝式歌且舞言漢氏之徳人歌舞之也尚書曰人之所欲天必從之方今為將軍計莫若屯據大郡鎭撫吏士砥礪其節百里之内牛酒日賜納雄桀之士詢忠智之謀要將來之心待從橫之變興社稷之利除萬人之害則福禄流於無窮功烈著於不滅何與軍覆於中原身膏於草野與猶如也功敗名喪耻及先祖哉聖人轉禍而為福智士因敗而為功願明公深計而無與俗同丹不能從進及睢陽復說丹曰蓋聞明者見於無形智者慮於未萌况其昭晳者乎晳明也商鞅謂秦孝公曰愚者闇於成事智者見於未萌凡患生於所忽禍發於細微司馬相如曰禍故多藏於隠微而發於人之所忽也敗不可悔時不可失公孫鞅曰有高人之行負非於世有獨見之慮見贅於人語見史記商君傳贅猶惡也史記贅作疑故信庸庸之論破金石之策庸常也金石以諭堅也襲當世之操失高明之徳夫决者智之君也疑者事之役也役猶賤也時不重至公勿再計丹不聽遂進及無鹽與赤眉戰死無鹽縣名屬東平郡故城在今鄆州須昌縣東衍乃亡命河東華嶠書曰丹死衍西歸吏以亡軍下司命乘傳逐捕故亡命更始二年遣尚書僕射鮑永行大將軍事安集北方永字君長司𨽻校尉宣之子衍因以計說永曰衍聞明君不惡切慤之言以測幽㝠之論忠臣不顧爭引之患以逹萬機之變慤實也幽㝠論深逺也爭引謂引事與君爭也事非一塗故曰萬機之變也書曰一日二日萬機東觀記衍更始時為偏將軍與鮑永相善更始既敗固守不以時下建武初為揚化大將軍掾辟鄧禹府數奏記於禹陳政言事自明君以下皆是諌鄧禹之詞非勸鮑永之説不知何據有此乖違是故君臣兩興功名兼立銘勒金石令聞不忘今衍幸逢寛明之日將値危言之時危猶髙也論語曰天下有道危言危行豈敢拱黙避罪而不竭其誠哉伏念天下離王莽之害久矣始自東郡之師離遭也莽居攝元年翟義起兵於東郡莽發八將軍以擊之東郡今滑州也繼以西海之役莽居攝元年西羗龎恬傳播等怨莽奪其地為西海郡攻西海太守程永莽遣䕶𦍑校尉竇況擊之巴蜀沒於南夷莽篡位貶西南夷㽛町王為侯王邯怨恨攻益州殺大尹程隆莽發巴蜀吏士擊之出入三年死者十七八緣邊破於北狄莽建國三年烏珠單于遣左賢王入雲中大殺吏人大軰萬餘中輩数千殺鴈門朔方太守略吏人畜產不可勝數緣邊虚耗也遠征萬里暴兵累年暴露也禍挐未解兵連不息挐謂相連引也刑法彌深莽以地皇元年以後為不須時令自是春夏斬人於市賦歛愈重衆彊之黨橫撃於外百僚之臣貪殘於内元元無聊饑寒並臻父子流亡夫婦離散廬落丘墟田疇蕪穢疾疫大興災異蜂起於是江湖之上海岱之濵風騰波涌更相駘藉莽時江湖海澤麋沸青徐荆楚之地搔擾前書音義曰跆蹈也今此為駘古字通四垂之人肝腦塗地死亡之數不啻太半殃咎之毒痛入骨髓匹夫僮婦咸懷怨怒僮猶賤也皇帝以聖德靈威龍興鳯舉率宛葉之衆將散亂之兵喢血昆陽劉攽曰案喢血是盟時喢血此當作喋與前書同也長驅武關破百萬之陳摧九虎之軍莽末下江兵鄧曅王匡攻武關莽乃拜將軍九人皆以虎為號以捍匡等擊破六虎敗走三虎乃保京師倉鄧曅等乃開武關迎更始靁震四海席卷天下席卷言無餘也攘除禍亂誅滅無道一朞之間海内大定繼髙祖之休烈脩文武之絶業社稷復存炎精更輝徳冠徃初功無與二此上二句司馬相如封禪書之辭天下自以去亡新就聖漢當蒙其福而頼其願樹恩布徳易以周洽其猶順驚風而飛鴻毛也言其易也王褒聖主得賢臣頌曰翼乎如鴻毛遇順風也然而諸將虜掠逆倫絶理倫亦理也殺人父子妻人婦女燔其室屋略其財產饑者毛食寒者裸跣毛草也臣賢案衍集毛字作無今俗語猶然者或古亦通乎寃結失望無所歸命今大將軍以明淑之徳秉大使之權綂三軍之政存撫并州之人惠愛之誠加乎百姓高世之聲聞乎羣士故其延頸企踵而望者非特一人也且大將軍之事豈得珪璧其行束修其心而已哉言當恢廓規摹不可空自清潔徒約束脩身而已將定國家之大業成天地之元功也昔周宣中興之主齊桓覇彊之君耳猶有申伯召虎夷吾吉甫申伯周宣王之元舅也召虎召穆公也吉甫謂尹吉甫也皆周宣王臣並見毛詩夷吾管仲之字也攘其蝥賊蝥賊食禾稼蟲名諭姦盗侵漁也蝥音牟安其彊宇況乎萬里之漢明帝復興而大將軍為之梁棟此誠不可以忽也左傳子產謂子皮曰子於鄭國棟也棟折榱崩僑將壓焉且衍聞之兵久則力屈人愁則變生今邯鄲之賊未滅眞定之際復擾邯鄲謂王郎也眞定謂劉掦也而大將軍所部不過百里守城不休戰軍不息兵革雲翔百姓震駭柰何自怠不為深憂夫并州之地東帶名關北逼彊胡井陘關也要害之塞故曰名關東觀記作石陘關年榖獨熟人庻多資斯四戰之地攻守之場也如其不虞何以待之故曰徳不素積人不為用備不豫具難以應卒史記子貢説晋君曰慮不先定不可以應卒卒音倉忽反今生人之命縣於將軍將軍所杖必須良才宜改易非任更選賢能夫十室之邑必有忠信東觀記曰無謂無賢路有聖人審得其人以承大將軍之明雖則山澤之人劉攽曰案此文雖則字顚倒當作則雖云云無不感德思樂為用矣然後簡精銳之卒發屯守之士三軍既整甲兵已具相其土地之饒觀其水泉之利制屯田之術習戰射之敎則威風遠暢人安其業矣若鎭太原撫上黨收百姓之歡心樹名賢之良佐天下無變則足以顯聲譽一朝有事則可以建大功惟大將軍開日月之明發深淵之慮監六經之論觀孫吳之䇿孫武呉王闔廬將吳起魏文侯將並著兵書也省羣議之是非詳衆士之白黑白黑猶賢愚也以超周南之迹垂丼棠之風令夫功烈施於千載富貴傳於無窮伊望之䇿何以加兹伊尹呂望永既素重衍為且受使得自置偏禆乃以衍為立漢將軍東觀記曰時永得置偏裨將五人也領狼孟長屯太原狼孟縣名屬太原郡故城在今并州陽曲縣東北與上黨太守田邑等繕甲養士扞衛幷土及世祖卽位遣宗正劉延攻天井關與田邑連戰十餘合延不得進邑迎母弟妻子為延所獲東觀記曰鄧禹使積弩將軍馮愔將兵擊邑愔悉得邑母弟妻子後邑聞更始敗乃遣使詣洛陽獻璧馬卽拜為上黨太守東觀記曰遣騎都尉弓里游諌大夫何叔武卽拜邑為上黨太守因遣使者招永衍永衍等疑不肯降而忿邑背前約東觀記衍與邑素誓刎頸俱受重任衍乃遺邑書曰蓋聞晉文出奔而予犯宣其忠晉文公重耳辟麗姬之難出奔狐偃勸令反國遂為覇主子犯即狐偃字也趙武逢難而程嬰明其賢趙盾晉卿生趙朔朔娶晉成公姊為夫人晉景公三年大夫屠岸賈誅趙氏殺趙朔滅其族朔妻有遺腹走公宫趙朔客程嬰公孫杵臼杵臼謂程嬰曰胡不死程嬰曰朔之婦有遺腹若幸而生男吾奉之即女也吾徐死耳居無何朔妻生男屠岸賈聞之乃索於宫中夫人置兒於絝中祝曰趙宗滅乎若啼即不滅若無聲及索兒竟無聲程嬰曰今一索不得後必復索之杵臼乃取它嬰兒負之匿山中諸將共攻殺杵臼幷孤兒然趙氏眞孤乃在程嬰所即趙武也居十五年晉景公乃立趙武為卿而復其田邑事見史記二子之義當矣今三王背叛赤眉危國三王見更始傳天下螘動社稷顚隕螘動喻衆是忠臣立功之日志士馳馬之秋也伯玉擢選剖符專宰大郡文帝初與郡守始為銅虎符竹使符分持其一以為瑞信剖即分也夫上黨之地有四塞之固東帶三關西為國蔽三闗設上黨關壺口關石陘關也陘音形奈何舉之以資彊敵開天下之匈假仇讐之刃豈不哀哉張儀説楚王曰秦下甲攻衛陽晉大開天下胷李斯曰所謂借寇兵而齎盗糧也衍聞之委質為臣無有二心委質猶屈膝也左傳曰策名委質貳乃辟也臣無二心古之制也挈瓶之智守不假器解見左傳是以晏嬰臨盟擬以曲㦸不易其辭晏子春秋曰齊大夫崔杼弑齊莊公乃刼諸大夫盟有敢不盟者㦸鉤其頸劒承其心曰不與崔氏而與公室者盟神視之言不疾指不至血者死所殺者七人而後及晏子晏子奉血仰天曰崔氏無道而殺其君若有能復崔氏而嬰不與盟神視之遂仰而飲血崔氏曰晏子與我則齊國吾與共之不與我則㦸在脰劒在心子圖之晏子曰刼吾以刃而失其意非勇也留吾以利而背其君非義也詩云愷悌君子求福不回嬰可回而求福乎劒刃鉤之直兵推之嬰不革矣崔子遂釋之謝息守郕脅以晉魯不喪其邑左傳孟孫之家臣謝息孟孫從魯昭公如楚謝息為孟孫守郕邑晉人來理杞田季孫將以郕邑與之謝息不可曰夫子從君而守臣䘮邑雖吾子亦有猜焉季孫曰君之在楚於晉罪也又不聽晋魯罪重矣晋師必至吾無以待之謝息曰古人有言挈瓶之智守不假噐季孫曰吾與子桃辭以無山與之萊柞乃遷於桃杜預注曰挈瓶汲器諭小智也魯國下縣東南有桃虛萊柞二山名由是言之内無鉤頸之禍外無桃萊之利臣賢案謝息得桃邑萊山故言無桃萊之利也且為萊字似棗文又連桃後學者以桃棗易明桃萊難悟不䆒始終輒改萊為棗衍集又作萊或故作棗展轉乖僻為謬矣而被畔人之聲蒙降城之恥竊為左右羞之且邾庶其竊邑畔君以要大利曰賤而必書莒牟夷以土地求食而名不滅是以大丈夫動則思禮行則思義未有背此而身名能全者也庶其邾大夫以邾邑漆閭丘奔魯故言竊邑畔君以要利也牟夷莒大夫竊牟婁及防茲求奔昭公三十一年邾黒肱以濫來奔左傳曰以地畔求食而已不求其名賤而必書以名其人終為不義不可滅已是故君子動則思禮行則思義或求名而不得或欲蓋而名彰此所謂三畔人名者也為伯玉深計莫若與鮑尚書同情戮力顯忠貞之節立超世之功如以尊親係累之故能捐位投命歸之尚書大義既全敵人紓怨紓緩也音舒上不損剖符之責下足救老幼之命申眉高談無愧天下若乃貪上黨之權惜全邦之實衍恐伯玉必懷周趙之憂上黨復有前年之禍史記曰趙孝成王時韓上黨太守馮亭使人至趙曰韓不守上黨入之於秦其吏人皆安為趙不欲為秦有城市邑十七願再拜入之趙趙王大喜召平陽君豹告曰馮亭入城市邑十七受之何如豹曰聖人甚惡無故之利夫秦蠶食韓氏地中絶不令相通韓氏所以不入於秦者欲嫁其禍於趙必勿受也趙王不聽遂發兵取上黨於是秦人圍趙阬其卒四十萬秦又圍邯鄲又攻西周拔之故言懷周趙之憂前年猶徃時昔晏平仲納延陵之誨終免欒高之難延陵邑名呉公子季札所封故以號焉左傳魯襄二十九年季札聘齊見晏平仲曰子速納邑與政無邑無政乃免於難晏子因陳桓子以納邑與政是以免於欒高之難樂謂子雅高謂子尾皆齊大夫左氏魯昭公八年欒高作難晏子無罪孫林父違穆子之戒故陷終身之惡孫林父衛大夫孫文子也穆子魯大夫叔孫豹也左傳衛侯使孫林父聘魯且尋盟公登亦登叔孫穆子相儀趨進曰諸侯之㑹寡君未嘗後衛君今吾子不後寡君未知所過孫子無辭亦無悛容穆子曰孫子必亡為臣而君過而不悛亡之本也至襄十四年孫林父逐出衛獻公獻公復入國林父遂以戚邑畔是䧟於終身之惡以為伯玉聞此至言必若刺心自非嬰城而堅守則䇿馬而不顧也言不過為二塗而已聖人轉禍而為福智士因敗以成勝願自彊於時無與俗同邑報書曰僕雖駑怯亦欲為人者也豈苟貪生而畏死哉曲㦸在頸不易其心誠僕志也間者老母諸弟見執於軍而邑安然不顧者豈非重其節乎若使人居天地壽如金石要長生而避死地可也今百齡之期未有能至老壯之間相去㡬何誠使故朝尚在忠義可立雖老親受戮妻兒橫分邑之願也間者上黨黠賊大衆圍城義兵兩軰入據井陘邑親潰敵圍拒擊宗正即劉延自試智勇非不能當誠知故朝為兵所害新帝司徒已定三輔謂鄧禹也隴西北地從風響應其事昭昭日月經天河海帶地不足以比言明白也死生有命富貴在天論語子夏之辭天下存亡誠云命也邑雖沒身能如命何夫人道之本有恩有義義有所宜恩有所施君臣大義母子至恩今故主已亡義其誰為老母拘執恩所當留而厲以貪權誘以䇿馬抑其利心必其不顧何其愚乎邑年三十歴位卿士性少嗜慾情厭事為况今位尊身危財多命殆鄙人知之何疑君子君長敬通君長鮑永字也揭節垂組自相署立揭音其謁反謂負也蓋仲由使門人為臣孔子譏其欺天孔子有疾仲由欲使門人為臣以大夫之禮𦵏孔子孔子謂曰由之行詐也吾誰欺欺天乎事見論語君長據位兩州加以一郡衍集鮑永行將軍事安集并州擁兵屯太原與太原李仲房同心幷力而河東畔國兵不入彘聞更始敗故諸國畔也不入彘言不征之也彘縣名屬河東郡順帝改曰永安上黨見圍不窺太谷卽上所謂黠賊所圍城者也太谷自太原趣上黨之道不窺言不來救也今幷州太谷縣西有太谷是也宗正臨境莫之能援兵威屈辱國權日損三王背畔赤眉害主未見兼行倍道之赴昔墨翟累繭救宋申包胥重胝存楚衛女馳歸唁兄之志衛女衞宣公庶子頑之女為許穆公夫人其兄即戴公弔失國曰唁衞懿公為狄所滅戴公乃立廬於曹邑許穆夫人閔衛亡思歸唁之不得乃賦載馳之詩事見左傳主亡一歳莫知定所虛冀妄言苟肆鄙塞未能事生安能事死未知為臣焉知為主豈厭為臣子思為君父乎欲揺泰山而蕩北海言不可也孟子曰挾泰山而超北海也事敗身危要思邑言衍不從或訛言更始隨赤眉在北訛偽也永衍信之故屯兵界休界休縣屬太原郡今汾州縣方移書上黨云皇帝在雍以惑百姓永遣弟升及子壻張舒誘降湼城東觀記曰升及舒等謀使營尉李匡先反湼城開門内兵殺其縣長馮晏立故謁者祝回為湼長湼縣名屬上黨郡故城在今潞州鄕縣西湼音奴結反舒家在上黨邑悉繫之又書勸永降永不答東觀記載邑書曰愚聞丈夫不釋故而改圗哲士不徼幸而出危今君長故主敗不能死新帝立不肯降擁衆而據璧欲襲六國之從與邑同事一朝内為刎頸之盟興兵背畔攻取湼城破君長之國壞父母之鄕首難結怨輕㺯㓙器人心難知何意君長當為此計昔者韓信將兵無敵天下功不世出略不再見威執項羽名出高帝不知天時就烹於漢知伯分國既有三晉欲大無己身死地分頭為飲器君長銜命出征擁帶徒士上黨阸不能救河東畔不能取朝有顚沛之憂國有分崩之禍上無仇收之節下無不占之志天之所壞人不能支君長將兵不與韓信同日而論威行得衆不及智伯萬分之半不見天時不知厭足欲明人臣之義當先知故主之未然故貪天下之利宜及新主之未為今故主已敗新主旣成四海為羅綱天下為敵人舉足遇害動搖觸患履深淵之薄氷不為嗁渉千鈞之發機不知懼何如其知也絶鮑氏之姓廢子都之業誦堯之言服桀之行悲夫命也張舒内行邪孽不遵孝友疏其父族外附妻黨已收三族將行其法能逃不自詣者舒也能夷舒宗者予也永邑遂結怨焉自是與邑有隙邑字伯玉馮翊人也後為漁陽太守東觀記曰邑馮翊蓮芍人也其先齊諸田父豐為王莽著威將軍邑有大節渉學藝能善屬文為漁陽太守未到官道病徴還為諫議大夫病卒永衍審知更始已殁乃共罷兵幅巾降於河内不加冠幘但以一幅巾餙首而已帝怨衍等不時至永以立功得贖罪遂任用之立功謂說下懐而衍獨見黜永謂衍曰昔高祖賞季布之罪誅丁固之功季布項羽將數窘漢王漢王卽位赦布以為郎中丁固季布母弟為項羽將亦窘高祖高祖急顧丁固曰兩賢豈相戹哉丁公引還高祖即位丁固謁見高祖曰使項王失天下者丁公也遂斬之今遭明主亦何憂哉衍曰記有之人有挑其鄰人之妻者挑其長者長者詈之挑其少者少者報之後其夫死而取其長者或謂之曰夫非罵爾者邪曰在人欲其報我在我欲其罵人也此並陳軫對秦王之辭也見戰國䇿引之者言己為故主守節亦冀新帝重之也挑音徒了反夫天命難知人道易守守道之臣何患死亡頃之帝以衍為曲陽令曲陽縣名屬常山郡故城在今定州彭城縣西也劉攽曰按彭城不在定州當作鼓城也誅斬劇賊郭勝等降五千餘人論功當封以䜛毁故賞不行建武六年日食續漢志曰建武六年九月丙寅晦日有食之史官不見郡以聞衍上書陳八事其一曰顯文徳二曰褒武烈三曰修舊功四曰招俊傑五曰明好惡六曰簡法令七曰差秩禄八曰撫邊境書奏帝將召見初衍為狼孟長以罪摧陷大姓令狐略是時略為司空長史䜛之於尚書令王䕶尚書周生豐曰衍所以求見者欲毁君也風俗通曰周生姓也豫章舊志曰豐字偉防太山南武陽人也建武七年為豫章太守清約儉惠䕶等懼之卽共排間衍遂不得入後衞尉隂興新陽侯隂就以外戚貴顯深敬重衍衍遂與之交結由是為諸王所聘請興及就並光烈皇后母弟也衍集與隂就書曰衍聞神龍驤首幽雲景蒸明聖修徳志士思名是以意同情合聲比相應也伏見君侯忠孝之性慈仁慇懃論議周宻思慮深逺顧以微賤數蒙聖恩被侯大惠衍年老被病恐一旦無禄命先犬馬懷抱不報齎恨入㝠思剖肝膽有以塞責方今天下安定四海咸服蒙㤙更生之臣無所効其死力側聞東平山陽王壯當之國擇除官屬衍不自量願侯白以衍備門衞鄙語曰水不激不能破舟矢不激不能飲羽不念舊惡名賢所高負責之臣欲言不敢惟侯哀憐深留聖心則闔棺之日䰟復何恨尋為司𨽻從事帝懲西京外戚賔客故皆以法繩之大者抵死徙其餘至貶黜衍由此得罪嘗自詣獄有詔赦不問時衍又與就書曰奏曹掾馮衍叩頭死罪衍材素愚駑行義汙穢外無鄕里之譽内無汗馬之勞猥䝉明府天覆之徳華寵重疊間者掾史疑衍之罪衆喣飄山當為灰土頼蒙明察揆其素行復保首領倍知厚德篤於慈父寖滛肌膚滲漉骨髓徳重山嶽澤深河海前送妻子還淄縣遭雨逄暑以七月還至陽武聞詔捕諸王賔客惶怖詣闕冀先事自歸十一日到十二日書報歸田里卽日束手詣洛陽詔獄十五日夜詔書勿問得出遭雨又疾大困冀高世之徳施以田子老馬之惠贈以秦穆駿馬之恩使長有依歸以效忠心西歸故郡閉門自保不敢復與親故通後漢書卷五十八上欽定四庫全書後漢書卷五十八下宋宣城太守范煜撰唐章懷太子賢注馮衍傳第十八下馮衍傳建武末上疏自陳曰臣伏念高祖之略而陳平之謀毁之則疏譽之則親史記曰魏無知薦陳平於高祖高祖以平為將絳灌等咸譖平曰雖美丈夫如冠玉耳居家盗嫂今大王令䕶軍諸將金多者得善處金少者得惡處高祖譲魏無知無知曰臣所言者能也陛下所問者行也楚漢相拒臣進竒謀之士盜嫂受金又何足疑高祖乃令平盡䕶諸將也以文帝之明而魏尚之忠繩之以法則為罪施之以徳則為功魏尚槐里人文帝時為雲中守匈奴不近雲中後坐上首虜差六級下之吏罰作之馮唐諫文帝曰臣愚以為陛下法太明罸太重賞太輕帝恱是日令唐持節赦尚復以為雲中守也逮至晩世董仲舒言道徳見妒於公孫𢎞史記曰董仲舒為人廉直公孫𢎞習春秋不如董生𢎞希時用事位至公卿仲舒以𢎞為從䛕𢎞嫉之時膠西王帝兄驕縱𢎞乃言於上曰獨仲舒可使相膠西膠西王素聞仲舒亦善待之李廣奮節於匈奴見排於衞青史記曰李廣隴西成紀人也為前將軍從衞青討匈奴青不使當匈奴廣乃失道後期青令對簿廣乃引刃自刎知與不知莫不流涕此忠臣之常所為流涕也臣衍自惟微賤之臣上無無知之薦下無馮唐之說乏董生之才寡李廣之勢而欲免䜛口濟怨嫌豈不難哉臣衍之先祖以忠貞之故成私門之禍衍之祖馮參忠正不屈節於王氏五侯參姊為中山王太后後為哀帝祖母傳太后䧟以大逆參自殺親族死者十七人見前書而臣衍復遭擾攘之時値兵革之際不敢回行求時之利回邪也事君無傾邪之謀將帥無虜掠之心衞尉陰興敬愼周密内自脩勑外遠嫌疑故敢與交通興知臣之貧數欲本業之欲遺其財為立基本生業也臣自惟無三益之才不敢處三損之地固讓而不受之論語載孔子言曰益者三友損者三友故衍引以為言也昔在更始太原執貨財之柄居倉卒之間據位食祿二十餘年而財產歳狹居處日貧家無布帛之積出無輿馬之餙於今遭清明之時飭躬力行之秋力行謂盡力行善道也禮記曰好問近於智力行近乎仁也而怨讐叢興譏議橫世蓋富貴易為善貧賤難為工也疏遠壠畝之臣無望高闕之下惶恐自陳以救罪尤書奏猶以前過不用衍不得志退而作賦又自論曰馮子以為夫人之徳不碌碌如玉落落如石老子道徳經之辭也言可貴可賤皆非道眞玉貌碌碌為人所貴石形落落為人所賤賤旣失矣貴亦未得言當處才不才之間風興雲蒸一龍一蛇與道翺翔與時變化夫豈守一節哉風興雲蒸言相須也東方朔誡子書曰聖人之道一龍一蛇形見神藏與物變化隨時之宜無有常處化音協韻音花用之則行舎之則藏進退無主屈伸無常故曰有法無法因時為業有度無度與物趣舎史記司馬談之辭也言法度是非皆隨時俗物所趨則向之所舎則違之所謂隨時之義也常務道徳之實而不求當世之名闊略杪小之禮蕩佚人間之事放蕩縱逸不拘恒俗也正身直行恬然肆志顧嘗好俶儻之策時莫能聽用其謀顧猶及也俶儻卓異貌也喟然長歎自傷不遭遭遇也久棲遲於小官不得舒其所懷棲遲猶偃息也抑心折節意悽情悲夫伐氷之家不利雞豚之息言食厚禄不當求小利也禮記曰畜馬十乘不察於雞豚伐氷之家不畜牛羊伐氷謂卿大夫以上以其䘮祭得賜氷故言伐氷也韓詩外傳曰天子不言多少諸侯不言利害大夫不言委積駟馬之家不恃雞豚之息伐氷之家不恃牛羊之入也委積之臣不操市井之利韓詩外傳曰千乘之君不通貨財委積之臣不操市井之利是以貧窮有所勸而孤寡有所措也况歴位食禄二十餘年而財產益狹居處益貧惟夫君子之仕行其道也慮時務者不能興其徳為身求者不能成其功言不可兼也去而歸家復覉旅於州郡身愈據職家彌窮困卒離饑寒之災有喪元子之禍先將軍葬渭陵哀帝之崩也營之以為園奉世為右將軍即衍之曾祖故言先將軍渭陵元帝陵在長安北五十里哀帝義陵在長安北四十六里奉世墓入義陵塋中所以衍不得入𦵏而别求也於是以新豐之東鴻門之上壽安之中太上皇思東歸乃遷豐邑人於此立縣故曰新豐鴻門阪名前書音義曰在新豐東十七里舊大道北下阪口地埶高敞四通廣大南望酈山北屬涇渭東瞰河華龍門之陽三晉之路龍門河所經今絳州縣也三晉謂韓趙魏也西顧酆鄗周秦之丘宮觀之墟酆鄗二水名周文王都酆武王都鄗秦本封在隴西秦縣周平王東遷以後秦始有岐周之地故總言周秦之丘丘亦墟也通視千里覽見舊都遂定塋焉衍墓在今新豐縣南四里退而幽居蓋忠臣過故墟而歔欷孝子入舊室而哀歎史記曰箕子朝周過殷墟咸生禾黍箕子傷之欲哭則不可欲泣為其近婦人乃作麥秀之詩殷人聞之皆為流涕禮記檀弓曰反哭升堂反諸其所作也入室反諸其所養也反而亡焉失之哀於是為甚也每念祖考著盛德於前垂鴻烈於後遭時之禍墳墓蕪穢春秋蒸嘗昭穆無列司馬相如賦曰墳墓蕪穢而不修父為昭子為穆昭南靣穆北靣也年衰歳暮悼無成功將西田牧肥饒之野殖生產修孝道營宗廟廣祭祀然後闔門講習道徳觀覽乎孔老之論庻幾乎松喬之福列仙傳赤松子神農時雨師也服水玉能入火自燒常止西王母石室中能隨風上下王子喬周靈王太子晉也好吹笙作鳯鳴游伊洛之間道人浮丘公接以上嵩高山遂仙去也上隴阪陟高岡游精宇宙流目八紘尹文子曰四方上下曰宇蒼頡篇曰舟輿所届曰宙淮南子曰九州之外乃有八夤八夤之外乃有八紘也歴觀九州山川之體追覽上古得失之風愍道陵遲傷徳分崩夫覩其終必原其始故存其人而詠其道疆理九野經營五山𦕈然有思陵雲之意疆界也理正也詩曰我疆我理九野謂九州之野經營猶徃來五山卽五嶽也乃作賦自厲命其篇曰顯志顯志者言光明風化之情昭章𤣥妙之思也其辭曰開歳發春兮百卉含英開發皆始也爾雅曰春為發生卉草也楚辭曰獻歳發春兮甲子之朝兮汨吾西征君子舉事尚早故以朝言之汨行貌楚辭曰汨吾南征汨音于筆反發軔新豐兮裵回鎬京軔止車木也將行故發之陵飛廉而太息兮登平陽而懷傷飛㢘觀名武帝元封二年立於長安上有銅飛廉因以名焉前書音義曰飛廉神禽能致風氣有角而蛇尾文如豹文平陽縣名故城在今岐州岐山縣西南悲時俗之險阸兮哀好惡之無常時既險薄所以好惡不同楚辭曰悲時俗之迫阸也棄衡石而意量兮隨風波而飛揚衡秤衡也三十斤為鈞四鈞為石言時人棄衡石以意測量喻背法度也隨風波而飛掦言無志操也紛綸流於權利兮親靁同而妒異獨耿介而慕古兮豈時人之所憙言時俗溺於權利也同己則親之異己則妒之今己不與之同所以見惡也沮先聖之成論兮􅥞名賢之高風忽道徳之珍麗兮務富貴之樂耽沮敗也􅥞陵也耽亦樂也言時人之行如此遵大路而裵回兮履孔徳之窈㝠固衆夫之所眩兮孰能觀於無形遵循也大路大道也老子曰大道泛兮又曰孔徳之容窈兮㝠兮其中有精又曰大象無形孔之為言空也窈㝠謂幽𤣥也道以空為主故無物而不容時俗眩於名利孰能觀大象無形哉行勁直以離尤兮羌前人之所有内自省而不慙兮遂定志而弗改離遭也尤過也羌語發聲也言古人有為勁直行而遭尤過者有之矣即屈原賈誼之流也衍内自省察不慙於古人遂守志不改也欣吾黨之唐虞兮愍吾生之愁勤聊發憤而揚情兮將以蕩夫憂心傷已不逄堯舜也蕩散也往者不可攀援兮來者不可與期病沒世之不稱兮願橫逝而無由言唐虞徃不可攀援而及將來賢哲又不可豫期所病終身之後名譽不稱又願縱橫遠逝而其路無由也論語孔子曰君子疾没世而名不稱焉陟雍畤而消搖兮超略陽而不反念人生之不再兮悲六親之日遠雍縣名屬右扶風故城在今岐州雍縣南畤者止也神靈之所止也史記曰秦幷天下祠雍四畤漢加黑帝謂之五畤消揺猶觀望也超過也略陽縣名屬天水郡今隴州隴城縣也六親夫婦父子兄弟也陟九􅉄而臨􅯰嶭兮聽涇渭之波聲􅯰嶭山一名嵳峩在今三原縣北􅯰音才結反嶭音五結反顧鴻門而歔欷兮哀吾孤之早零何天命之不純兮信吾罪之所生傷誠善之無辜兮齎此恨而入㝠零落也吾孤早零即上所謂䘮元子者也子既早妖未有邪僻故云誠善辜罪也㝠謂地也齎恨入㝠言死有餘恨也嗟我思之不遠兮豈敗事之可悔雖九死而不眠兮恐餘殃之有再淚汍瀾而雨集兮氣滂浡而雲披心怫鬰而紆結兮意沈抑而内悲言已往者託於貴戚之權幾䧟誅戮之罪此由我思慮不深遠已敗之事悔之無及雖復九死而目不瞑言怨恨之深也楚辭曰雖九死其猶未悔眠即瞑也今縱飭躬自朂又恐殃祸至再所以涙落意沈氣憤心結也瞰太行之嵳峩兮觀壺口之崢嶸悼丘墓之蕪穢兮恨昭穆之不榮太行山在上黨南壺口山在上黨東衍之遠祖馮亭為韓上黨守以上黨降趙趙封亭三萬戸號華陽君死因𦵏上黨其墓在今潞州上黨縣西衍在闗中遥相望之卽序所謂通視千里覽見舊都者也嵳峩高大貎崢嶸深邃貌嵗忽忽而日邁兮壽冉冉其不與耻功業之無成兮赴原野而窮處與猶待也楚辭曰日忽忽其將暮又曰老冉冉其將至功業無成情多憂憤故赴原野而窮居也昔伊尹之干湯兮七十說而乃信臯陶釣於靁澤兮賴虞舜而後親無二士之遭遇兮抱忠貞而莫逹率妻子而耕耘兮委厥美而不伐伊尹名摰負鼎爼以干湯七十說而乃信謂年七十說湯乃得信也皇甫謐帝王紀曰伊摰豐下銳上色黑而短僂身而下聲年七十而不遇湯聞其賢設朝禮而見之摰乃說湯至於王道信音申呂氏春秋曰舜陶於河濵漁於靁澤今言臯陶未詳靁澤在今濮州靁澤縣東也韓盧抑而不縱兮騏驥絆而不試獨慷慨而遠覽兮非庸庸之所識戰國策曰齊欲伐魏淳于髠謂齊王曰韓盧天下之壯犬也淮南子曰絆騏驥而求千里衍喩己有高才而不申所以獨慷慨遠覽非庸庸之徒所能識也識叶韻音志卑衞賜之阜貨兮高顏回之所慕重祖考之洪烈兮故收功於此路卑賤也阜積也衍賤子貢貨殖慕顏回樂道所以不從流俗専心貞固者以其祖考功業隆大若苟求富貴恐致黜辱故於此路收功也循四時之代謝兮分五土之刑徳相林麓之所產兮甞水泉之所殖修神農之本業兮採軒轅之竒策追周棄之遺敎兮軼范蠡之絶迹周禮五土一曰山林二曰川瀆三曰丘陵四曰墳衍五曰原隰家語曰地東西為緯南北為經山為積徳川為積刑榖梁傳曰林屬於山曰麓周禮曰山林動物宜毛植物宜皁淮南子曰汾水濁宜麻濟水和宜麥河水調宜菽洛水輕利宜禾渭水多力宜黍江水肥宜稻管子曰四七二十八尺而至於泉其水白而丼宜黍秫三七二十一尺而至於泉其水黄而有臭宜大菽與麥二七一十四尺至於泉其味鹹宜稻與麥此甞水泉之所殖也周易曰神農氏斵木為耜揉木為耒耒耜之利以敎天下蓋取諸益周書曰神農之時天雨粟神農耕而種之軒轅黄帝也大戴禮曰黄帝時播種百榖草木節用水火財物人得其利周棄帝嚳之子為兒之時其游戯好種樹麻菽及成人遂好耕農相地之宜人皆法則之帝堯聞之舉棄為農師天下得其利故言遺教軼過也范蠡南陽人事越王勾踐苦身戮力竟滅吳報耻既而以為大名之下難以久居乃與其私屬乘舟浮海以行變姓名適齊為鴟夷子皮之陶為朱公終身不返是絶迹也陟隴山以隃望兮眇然覽於八荒風波飄其並興兮情惆悵而增傷隃猶遥也古字通八荒八方荒逺之地覽河華之泱漭兮望秦晋之故國憤馮亭之不遂兮慍去疾之遭惑馮亭以上黨降趙秦破趙於長平而亭死故言不遂慍怨也馮去疾為秦丞相胡亥元年用趙高計始皇大臣咸見誅戮無遺脫者是遭惑也亭及去疾皆衍之先故遠懷憤怨也泱音烏朗反漭音莽流山岳而周覽兮徇碣石與洞庭浮江河而入海兮泝淮濟而上征碣石海畔山也在今平州東洞庭湖名也中有洞庭山在今岳州西南衍既不同流俗情多憤怨故假言渉歴江山周流河海屈原云吾將逺逝以自適路脩逺以周流之類也瞻燕齊之舊居兮歴宋楚之名都哀羣后之不祀兮痛列國之為墟燕都今薊縣也齊都營丘今臨淄縣也宋都睢陽今宋州也楚初都丹陽在歸州後都郢在今荆州至考烈王為秦所逼又徙都壽春今壽州也不祀言皆絶也臧文仲曰咎陶庭堅不祀也馳中夏而升降兮路紆軫而多艱講聖哲之通論兮心愊憶而紛紜紆軫猶盤曲也愊憶猶鬱結也紛紜猶瞀亂也愊音普逼反惟天路之同軌兮或帝王之異政堯舜煥其蕩蕩兮禹承平而草命惟思也言思上天之路軌躅則同而帝王政敎參差有異班固曰仰天路而同軌白虎通曰徳合天者稱帝仁義合者稱王故言異政也煥文章貎蕩蕩政化平暢貎論語孔子曰惟天為大唯堯則之煥乎其有文章蕩蕩乎人無能名焉堯舜同道故兼言之舜禪位於禹禹承堯舜之後而改制度禪子故曰承平革命也幷日夜而幽思兮終悇憛而洞疑高陽􅴽其超遠兮世孰可與論兹孔子曰吾嘗終日不食終夜不寢以思楚辭云心悇憛而懷惑廣蒼云悇憛禍福未定也悇音它乎反憛音它紺反本或作㤞憏㤞音丑加反憏音丑制反未定也高陽帝顓頊之號也洞亦不定也史記曰虚惕洞疑又曰高陽氏沈深而有謀疏通而知事以其有謀而疏通故欲與之論事訊夏啓於丼澤兮傷帝典之始傾頌成康之載徳兮詠南風之歌聲訊問也啓禹子也尚書曰啟與有扈大戰于丼之野孔安國注云有扈與夏同姓恃親而不恭故啟征之於丼野丼野在今鄠縣啟既德薄同姓相攻故傷帝典之傾也易曰徳積載史記曰成康之際天下安寧刑錯三十餘年而不用周南召南謂國風之首篇歌文王之徳故詠之也非舜南風之歌思唐虞之晏晏兮揖稷契與為朋苗裔紛其條暢兮至湯武而勃興尚書考靈耀曰放勛欽明文思晏晏鄭𤣥注曰寛容覆載謂之晏稷名棄為堯后稷契為堯司徒契十四葉孫號湯滅夏桀而王有天下后稷十六葉孫周武王滅殷紂而王天下勃盛貌也左傳曰其興也勃焉昔三后之純粹兮每季世而窮禍弔夏桀於南巢兮哭殷紂於牧野三后夏殷周也惜其不能始終純茂毎至末代必窮其災禍湯放桀於南巢武王滅紂於牧野周之季業幽王為西戎所殺也離騷曰昔三后之純粹何桀紂之猖披南巢地名廬州巢縣也孔安國曰牧野紂近郊三十里地名也在今衞州詔伊尹於亳郊兮享呂望於酆洲功與日月齊光兮名與三王爭流詔召也亳湯都呂望周太師翼周滅殷者也酆文王所都在京兆杜陵亭水中可居曰洲也楊朱號乎衢路兮墨子泣乎白絲知漸染之易性兮怨造作之弗思淮南子曰楊子見逵路而哭之為其可以南可以北傷其本同而末異也墨子曰墨子見染絲歎曰染於蒼則蒼染於黄則黄五入之則為五色故染不可不愼非獨絲也國亦有染湯染伊尹紂染惡來也先王正道規摹有常苟生穿鑿則岐路競起故墨子知漸染之易性楊朱悲造作之弗思美關雎之識微兮愍王道之將崩拔周唐之盛徳兮捃桓文之譎功薛夫子韓詩章句曰詩人言雎鳩貞絜以聲相求必於河之洲蔽隱無人之處故人君動靜退朝入于私宮妃后御見去留有度今人君内傾於色大人見其萌故詠關睢說淑女正容儀也方言曰捃取也譎詐也齊桓公晉文公俱有覇功孔子曰晋文公譎而不正齊桓公正而不譎時周衰政亂桓文能統率諸侯翼戴天子故取其一切之功也忿戰國之遘禍兮憎權臣之擅彊黜楚子於南郢兮執趙武於溴梁周室衰微七國交爭是為戰國時吳楚僣號皆稱王孔子修春秋以蠻夷大者不過子故皆黜曰子又春秋稱公㑹晋宋衞鄭曹莒邾薛杞于溴梁戊寅大夫盟公羊傳曰諸侯皆在言大夫盟何信在大夫何言乎信在大夫徧刺天下之大夫也曷為徧刺天下之大夫君若綴旒然趙武晋卿趙文子也時晋為盟主文子晉之正卿而為不臣之行故欲執之也溴水名在河内軹縣東南至溫入河爾雅曰梁莫大於溴梁溴音古覓反善忠信之救時兮惡詐謀之妄作聘申叔於陳蔡兮禽荀息於虞虢申叔楚莊王時賢臣申叔時者也左傳陳夏徴舒弑靈公楚莊王伐陳殺夏徴舒因滅陳為縣申叔時諫莊王曰夏徴舒弑其君其罪大矣討而戮之君之義也諸侯之從曰討有罪也今縣陳貪其富也以討召諸侯而以貪終之無乃不可乎王曰善哉吾未之聞也乃復封陳聘謂問之也時惟在陳而兼言蔡者蓋以陳蔡相近因連言之也荀息晉大夫左傳曰晉荀息請以屈產之乘埀棘之璧假道於虞以伐虢公曰是吾寳也對曰若得道於虞猶外府也乃假道於虞以滅虢師還遂襲虞滅之誅犂鉏之介聖兮討臧倉之愬知􅮺子反於彭城兮爵管仲於夷儀犂鉏齊大夫介猶間也韓子曰仲尼為政於魯道不拾遺齊景公患之犂鉏曰去仲尼猶吹毛耳君何不遺魯公以女樂以驕其意魯君樂之必怠於政仲尼必諫諫而不聽必輕絶魯景公曰善乃令犂鉏以女樂遺魯哀公樂之果怠於政仲尼諫不聽遂去之孟子曰魯平公將出嬖人臧倉請曰它日君出必命有司所之今已駕矣敢請公曰吾將見孟子倉曰君何為輕身以先於匹夫者以為賢乎禮義由賢者出孟子後䘮踰前喪君無見焉公曰諾樂正子見孟子曰君將來見嬖人有臧倉者沮君是以不來孟子曰吾之不遇魯侯天也臧氏之子焉能使予不遇哉愬猶譛也知謂明於事也子反楚大夫也名側案􅮺字呂忱音仕眷反勉也東觀記作譏字此雖作􅮺蓋亦譏刺之意也春秋經書宋人及楚人平公羊傳曰外平不書此何以書貶曷為貶平者在下何休注云譏子反華元専盟不受君命故貶之然則子反違命盟蓋以平宋城下而言彭城者彭城宋之邑故舉以言之左傳宋大夫魚石等出奔楚楚伐宋取彭城以封魚石宋人圍彭城楚子重救彭城伐宋此言子反蓋衍誤也如曰不然或别有所據管仲齊桓公之相名夷吾夷儀郉邑也翟人滅邢管仲輔齊桓公築夷儀以封邢郉遷如歸於是天下諸侯知桓公之不為己動也是故天下歸之唯能用管夷吾而覇叻立事見國語以其能輔主成業故就夷儀而爵賞也劉攽曰注云倉曰君何為輕身以先於匹夫者案全文何當作所疾兵革之寖滋兮苦攻伐之萌生沈孫武於五湖兮斬白起於長平寖漸也孫武呉王闔廬將也善用兵越絶書曰太湖周三萬六千頃虞翻云太湖有五湖故謂之五湖滆湖洮湖射湖貴湖及太湖為五湖並太湖之小支俱連太湖故太湖兼得五湖之名在今湖州東也史記曰白起郿人也事秦昭王以上將軍擊趙於長平前後坑斬首虜四十五萬長平地名在今澤州也惡叢巧之亂世兮毒縱橫之敗俗流蘇秦於洹水兮幽張儀於鬼谷叢細也毒恨也關東為從闗西為橫蘓秦洛陽人也師事鬼谷先生為從說説關東六國為從親以畔秦㑹于洹水之上刳白馬而盟張儀魏人也與蘇秦同師為關西橫說説關西六國令事秦皆尚誣詐不遵道德洹水出汲郡林慮縣鬼谷谷名即鬼谷先生所居地在今洛州洛陽城北叢或作聚義亦通劉攽曰注云關西六國令事秦案關西何緣有六國不合明上文衍出關西二字澄德化之陵遲兮烈刑罰之峭峻燔商鞅之法術兮燒韓非之說論陵遲言頽替也澄猶清也烈慘也商鞅姓公孫氏好刑名之學事秦孝公變法令使人什伍相司犯禁相連坐不告姦者要斬告姦者與斬敵同賞匿姦者與降敵同罰人有二男以上不分異者倍其罰行之四年秦人富强韓非韓之諸公子也亦好刑名法術之學口吃不能言著書作孤憤五蠧内外儲說難十餘萬言皆尚法術少仁恩並見史記誚始皇之跋扈兮投李斯於四裔滅先王之法則兮禍濅滛而𢎞大誚責也跋扈猶彊梁也李斯上蔡人為秦丞相上書曰今諸生不師今而學古惑亂黔首臣請非秦記皆燒之天下敢有藏詩書百家語者皆燒之令下三十日不燒黥為城旦制曰可是滅先王之法則援前聖以制中兮矯二主之驕奢饁女齊於絳臺兮饗椒舉於章華援引也矯正也饁餉也女齊晉大夫司馬侯也絳晉國所都國語曰晉平公為九層之臺又曰叔向見司馬侯之子撫而泣曰自其父之死吾蔑與事君矣昔者其父始之我終之我始之夫子終之無不可者是女齊事君必有規諫必諫作臺但書典散亡無以言耳椒舉楚大夫伍舉也饗宴也章華臺名在南郡華容縣楚語曰靈王為章華之臺與椒舉升王曰䑓羙乎對曰臣聞國君服寵以為羙安人以為樂不聞其以土木之崇高為美先君莊公為匏居之䑓高不過望國氛大不過容宴豆用不煩官府人不廢時務今君為此臺國人疲焉財用盡焉臣不知其羙二主謂晋楚之君二或作亡摛道德之光耀兮匡衰世之𦕈風襃宋襄於泓谷兮表季札於延陵摛布也𦕈微也公羊傳曰宋公及楚戰于泓之陽楚人濟泓而來有司曰迨其未畢濟而擊之宋公曰不可吾聞之也君子不戹人於險吾雖亡國之餘寡人不忍行也既濟未畢陳有司復曰請擊之宋公曰不可吾聞君子不鼓不成列已陳然後擊之宋師大敗故君子大其不鼓不成列臨大事而不忘大禮以為文王之戰亦不過此季札呉王壽夢之少子也封於延陵昆弟四人札最少而賢壽夢卒諸兄欲立之札棄其室而耕乃捨之泓音烏萌反摭仁智之英華兮激亂國之末流觀鄭僑於溱洧兮訪晏嬰於營丘摭拾也鄭僑鄭大夫公孫僑也溱洧鄭二水名鄭詩曰溱與洧瀏其清矣晏嬰齊大夫晏平仲也爾雅曰水出其左曰營丘齊有營丘周衰政亂子產晏嬰皆有賢行輔其君也事見左傳國語日曀曀其將暮兮獨於邑而煩惑夫何九州之博大兮迷不知路之南北曀曀隂晦貎也詩曰曀曀其隂楚辭曰回朕車以復路及行迷之未遠駟素虯而馳騁兮乘翠雲而相佯就伯夷而折中兮得務光而愈明四馬曰駟虯龍之無角者也楚辭曰駟玉虯以乘翳兮爾雅曰馬高八尺為龍司馬相如曰駟蒼螭兮六素虯相佯猶逍遥也伯夷孤竹君之子周武王時義士不食周粟隱於首陽山掦雄反騷曰將折中乎重華列仙傳曰務光者夏時人也殷湯伐桀因光而謀光曰非吾事也至殷武丁時武丁欲以為相光不從遂投於梁山衍退不仕與務光辭相侔事相得故曰愈明愈猶益也欵子高於中野兮遇伯成而定慮欽眞人之德羙兮淹躊躇而弗去莊子曰伯成子高唐虞時為諸侯至禹為天子乃去而耕禹往見之曰堯理天下吾子立為諸侯堯授舜舜授予子去而耕其故何也子高曰昔堯理天下至公無私不賞而人勸不罰而人畏今子賞而不勸罰而不威德自此衰刑自此作夫子盍行無留吾事耕而不顧欵誠也眞人即謂子高躊躇猶蹢䠱也東觀記高字作喬謂仙人王子喬也義亦通意斟愖而不澹兮俟回風而容與求善卷之所存兮遇許由於負黍軔吾車於箕陽兮秣吾馬於潁滸聞至言而曉領兮還吾反乎故宇斟愖猶遲疑也澹定也俟待也容與猶從容也莊子曰舜以天下讓善卷善卷曰吾日出而作日入而息逍遥天地之間吾何以天下為哉遂入深山莫知所終許由字武仲堯時高士隱居箕山堯以天下譲由由不受惡聞其言遂洗耳於潁水負黍亭名在洛州陽城縣西南許由墓在其南秣謂食馬以粟字林曰滸水涯也愖音市林反或作堪字覽天地之幽奥兮統萬物之維綱究陰陽之變化兮昭五德之精光自此以下既反故宇乃欲尋覽天地究極陰陽幽奥謂深䆳也維綱猶宗指也五徳五行之徳也施之於物則為金木水火土施之於人則為仁義禮智信也躍青龍於滄海兮豢白虎於金山鑿巖石而為室兮託高陽以飬仙神雀翔於鴻崖兮𤣥武潛於嬰㝠伏朱樓而四望兮採三秀之華英天有二十八宿成龍虎龜鳯之形在地為四靈東方為青龍西方為白虎南方為朱雀北方為龜蛇豢飬也金山西方之精也神雀謂鳯也𤣥武謂龜蛇位在北方故曰𤣥身有鱗甲故曰武嬰㝠猶晦昧所謂幽都也衍既反故宇欲鑿巖石為室託高明之處以飬神仙又假言龍蛇之儔在於四靣為其威援也前書曰仙人好樓居故云伏朱樓而四望也楚辭曰採三秀於山間王逸曰謂芝草也東觀記及衍集秀字作竒英字作靈次下云食五芝之茂英此若是芝不宜重說但不知三竒是何草也范改竒為秀恐失之矣纂前脩之夸節兮曜往昔之光勳披綺季之麗服兮掦屈原之靈芬纂繼也前修猶前賢也夸大也楚辭曰搴吾法夫前修又曰紛獨有此夸節往昔光勳謂衍之先人有功勞於前代去疾子明之類也已今繼往賢之高節所以光曜也綺季四皓之一也前書曰四皓隨太子入侍鬢眉皓白衣冠甚偉楚漢春秋曰四人冠韋冠佩銀環衣服甚鮮故言麗服也楚辭曰畦留夷與揭車雜杜衡與芬芷屈原皆喻身有令徳故衍欲掦其靈芬也高吾冠之岌岌兮長吾佩之洋洋飲六醴之清液兮食五芝之茂英岌岌高貎洋洋羙也楚辭曰高余冠之岌岌長吾佩之陸離王逸注云傷已懷徳不用故高冠長佩尊其威儀整斯服餙以異於衆也六醴蓋六氣也楚辭曰餐六氣而飲沆瀣茅君内傳曰句曲山上有神芝五種一曰龍仙芝似交龍之相負服之為太極仙卿第二名參成芝赤色有光其枝葉如金石之音折而續之卽復如故服之為太極大夫第三名燕胎芝其色紫形如葵葉上有燕象光明洞徹服一株拜為太清龍虎仙君第四名夜光芝其色青其實正白如李夜視其實如月光照洞一室服一株為太清仙官第五名曰玉芝剖食拜三官正員御史揵六枳而為籬兮築蕙若而為室播蘭芷於中庭兮列杜衡於外術自此以下說籬室庭除皆樹芬芳卉木喻己立身行道依仁履義猶屈原扈江蘺與薛芷紉秋蘭以為佩之類也揵立也枳芬木也晏子曰江南為橘江北為枳枳之為木芳而多刺可以為籬此云六枳東觀記作八枳案周書小開篇曰嗚呼汝何敬非時何擇非徳德枳維大人大人枳維公公枳維卿卿枳維大夫大夫枳維士登登皇皇日維國國枳維都都枳維邑邑枳維家家枳維欲無疆言上下相維遞為藩蔽也其数有八與東觀記同此為六蕙香草也杜杜若也蘭即澤蘭也芷白芷也一名符蘺一名葯杜衡其狀若葵其臭如蘼蕪術路也劉攽曰案注文方總其賦自當列叙其文云自此以下說籬室庭術後人不曉誤作庭除非攢射干雜蘼蕪兮搆木蘭與新夷光扈扈而煬燿兮紛郁郁而暢美華芳曅其發越兮時恍惚而莫貴非惜身之埳軻兮憐衆羙之憔悴攢聚也射干烏翼也蘼蕪似蛇牀而香其根即芎藭也木蘭樹也香味俱似桂而皮薄新夷亦樹也其花甚香扈扈光彩盛也暢通也郁郁香氣也曅盛也發越氣傍射也司馬相如曰煌煌扈扈照曜巨野又曰郁郁菲菲衆香發越恍惚猶輕忽也楚辭曰然塪軻而留滯王逸曰塪軻不遇也衍被擯斥沈淪猶草木之漚鬰芬芳遇風霜而零落也夷音協韻異美音協韻媚游精神於大宅兮抗𤣥妙之常操處清靜以飬志兮實吾心之所樂大宅謂天地抗舉也老子曰𤣥之又𤣥衆妙之門樂音五孝反山峨峨而造天兮林㝠㝠而暢茂鸞回翔索其羣兮鹿哀鳴而求其友此言所居之處山林飛走之狀也索求也詩曰求其友聲也誦古今以散思兮覽聖賢以自鎭嘉孔丘之知命兮大老聃之貴𤣥徳與道其孰寳兮名與身其孰親陂山谷而閒處兮守寂寞而存神鎭重也古之聖賢多固窮以守道故覽之以自鎭也孔子曰五十而知天命又曰不知命無以為君子𤣥者幽寂之謂也老子曰萬物莫不尊道而貴德又曰道者萬物之奥也善人之所寳又曰名與身孰親陂謂傍其邊側也陂音丘義反史記曰陂山通道是也道以寂寞為主神不外營故常存也鎭協韻竹人反閒音閑劉攽曰注陂丘義反切不得丘當作兵夫莊周之釣魚兮辭卿相之顯位於陵子之灌園兮似至人之髣髴蓋隱約而得道兮羌窮悟而入術離塵垢之窈㝠兮配喬松之妙節莊子曰莊子釣於濮水楚王使大夫二人往見焉曰願以境内累也莊子持竿不顧曰吾聞楚有神龜死已三千歳矣王以巾笥而臧之廟堂之上為此龜者寧死留骨而貴乎寕其生而曵尾塗中乎使者曰寧生曵尾塗中莊子曰往矣吾將曵尾於塗中列女傳曰於陵子終賢楚王欲以為相使使者往迎之子終出謝使者遂與妻俱逃而為人灌園孟子曰客居於陵故曰於陵子也至人守眞飬志言髣髴似之也二子雖病一時而聲流萬古蓋隱居困約而反得道之精窮棲悟理入賢人之術離塵垢之窈㝠也超然高邁配松喬之妙節也惟吾志之所庶兮固與俗其不同既俶儻而高引兮願觀其從容庶幾守道與俗不同俶儻猶卓異也凡言觀者非在己之言從容猶在後也衍雖擯斥當年身窮志沮而令聞期於不朽聲芳縣諸日月故曰願觀其從容顯宗卽位又多短衍以文過其實遂廢於家衍娶北地女任氏為妻悍忌不得畜媵妾悍急也兒女常自操井臼老竟逐之遂埳􅇄於時衍集載衍與婦弟任武逹書曰天地之性人有喜怒夫婦之道義有離合先聖之禮士有妻妾雖宗之眇微尚欲踰制年衰歳暮恨入黄泉遭遇嫉妬家道崩壞五子之母足尚在門五年已來日甚歳劇以白為黑以非為是造作端末妄生首尾無罪無辜䜛口嗷嗷亂匪降天生自婦人青蠅之心不重破國嫉妬之情不憚喪身牝雞之晨維家之索古之大患今始於衍醉飽過差輙為桀紂房中調戯布散海外張目抵掌以有為無痛徹蒼天毒流五臟愁令人不頼生忿令人不顧禍入門着牀繼嗣不育紡績織紝子無女工家貧無僮賤為匹夫故舊見之莫不悽愴曾無憫惜之恩唯一婢武逹所見頭無釵澤靣無脂粉形骸不蔽手足抱土不原其窮不揆其情跳梁大呌呼若入㝠販糖之妾不忍其態計婦當去久矣念兒曹小家無它使哀憐姜豹常為奴婢惻惻焦心事事腐腸訩訩籍籍不可聼聞暴虐此婢不死如髪半年之間膿血橫流婢病之後姜竟舂炊豹又觸冒泥塗心為愴然䌞榖放散冬衣不補端坐化亂一縷不貫既無婦道又無母儀忿見侵犯恨見狼籍依倚鄭令如居天上持質相刼詞語百車劒㦸在門何暇有讓百弩環舎何可彊復舉宗逹人觧説詞如循環口如布榖縣幡竟天擊鼓動地心不為惡身不為揺宜詳居錯且自為計無以上書告訴相恐狗吠不驚自信其情不去此婦則家不寧不去此婦則家不清不去此婦則福不生不去此婦則事不成自恨以華盛時不早自定至於垂白家貧身賤之日養癕長疽自生禍殃衍以室家紛然之故捐棄衣冠側身山野絶交游之路杜仕宦之門闔門不出心専耕耘以求衣食何敢有功名之路哉然有大志不戚戚於賤貧居常慷慨歎曰衍少事名賢經歷顯位懷金垂紫揭節奉使金謂印也紫謂綬也揭持也音求謁反不求苟得常有凌雲之志三公之貴千金之富不得其願不槩於懷槩猶屑也金或作乘貧而不衰賤而不恨年雖疲曵猶庶幾名賢之風曵猶頓也脩道徳於幽㝠之路以終身名為後世法居貧年老卒於家所著賦誄銘説問交徳誥慎情衍集有問交一篇慎情一篇書記說自序官録説䇿五十篇衍集見有二十八萹肅宗甚重其文子豹豹字仲文年十二母為父所出後母惡之嘗因豹夜寐欲行毒害豹逃走得免敬事愈謹而母疾之益深時人稱其孝衍與宣孟書曰居室之義人之大倫思厚歡和之節樂定金石之固又自傷前遭不良比有去兩婦之名事誠不得不然豈中心之所好哉觀其書意似此妻又見出之長好儒學以詩春秋敎麗山下麗音力之反鄉里為之語曰道徳彬彬馮仲文論語曰文質彬彬然後君子鄭𤣥注彬彬雜半貌也舉孝㢘拜尚書郎忠勤不懈每奏事未報常俯伏省閤或從昬至明肅宗聞而嘉之使黃門持被覆豹勑令勿驚由是數加賞賜是時方平西域以豹有才謀拜為河西副校尉和帝初數言邊事奏置戊巳校尉城郭諸國復率舊職遷武威太守視事二年河西稱之復徴入為尚書永元十四年卒於官論曰夫貴者負埶而驕人才士負能而遺行其大略然也二子不其然乎史記曰魏太子擊逄文侯之師田子方引車下道子方不為禮太子擊曰富貴者驕人乎貧賤者驕人乎子方曰貧賤者驕人耳夫諸侯驕人則失其國大夫驕人則失其家貧賤者行不合言不用則去之楚越若脫躧然奈何同之哉士負能而遺行也負恃也馮衍之引挑妻之譬得矣夫納妻皆知取詈已者而取士則不能何也豈非反妒情易而恕義情難光武雖得之於鮑永猶失之於馮衍自此以上皆華嶠之詞夫然義直所以見屈於既往守節故亦彌阻於來情嗚呼衍為更始舉哀既降執義守直既行之於己光武屈而不用故言義直所以見屈於既往也則守節之人見衍被黜彌阻難於將來贊曰譚非讖術衍晩委質道不相謀詭時同失詭違也言二人之道不相同俱以違時咸被擯斥也體兼上才榮微下秩後漢書卷五十八下後漢書卷五十八考證桓譚傳當王莽居攝之際譚獨自守黙然無言臣世駿按日知錄曰前漢書翟義傳莽依周書作大誥遣大夫桓譚等班行諭告當反位孺子之意還封譚為明告里附城是譚曾受莽封爵史為諱之耳㑹議靈臺所處注楊􅃷之洛陽記􅃷字諸本皆訛作衍今改正馮衍傳揵六枳而為籬兮注登登皇皇口維國監本作登登皇皇維在國臣㑹汾按此汲冡周書原文也汲冡書於字闕處皆作口妄意增改益令讀者不知所謂今正之後漢書卷五十八考證
