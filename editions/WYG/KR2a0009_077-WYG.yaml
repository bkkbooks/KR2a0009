body:
  text: 後漢書卷七十七宋宣城太守范煜撰唐章懐太子賢注班梁列傳第三十七班超傳子勇班超字仲升扶風平陵人徐令彪之少子也為人有志不修細節然内孝謹居家常執勤苦不耻勞辱有口辯而渉獵書傳渉如渉水獵如獵獸言不能周悉粗窺覽之也東觀記曰超持公羊春秋多所窺覽永平五年兄固被召詣校書郎校書郎解見班固傳超與母隨至洛陽家貧常為官傭書以供養久勞苦嘗輟業投筆歎曰大丈夫無他志畧猶當效傅介子張騫立功異域以取封侯安能久事筆研間乎傅介子北地人元帝時使西域刺殺樓蘭王封義陽侯張騫漢中人武帝時鑿空開西域封博望侯續漢書作久弄筆研乎華嶠書作久事筆耕乎研音硯左右皆笑之超曰小子安知壯士志哉其後行詣相者曰祭酒布衣諸生耳一坐所尊則先祭酒今稱祭酒相尊敬之詞也而當封侯萬里之外超問其狀相者指曰生燕頷虎頸飛而食肉此萬里侯相也久之顯宗問固卿弟安在固對為官寫書受直以養老母帝乃除超為蘭臺令史續漢志曰蘭臺令史六人秩百石掌書劾奏及印主文書後坐事免官十六年奉車都尉竇固出擊匈奴以超為假司馬將兵别擊伊吾戰於蒲類海多斬首虜而還伊吾匈奴中地名在今伊州納職縣界前書音義曰蒲類匈奴中海名在敦煌北也固以為能遣與從事郭恂俱使西域超到鄯善鄯善本西域樓蘭國也昭帝元鳳四年改為鄯善去陽闗一千六百里去長安六千一百里也鄯善王廣奉超禮敬甚備後忽更疎懈超謂其官屬曰寧覺廣禮意薄乎此必有北虜使來狐疑未知所從故也眀者睹未萌况已著邪乃召侍胡詐之曰匈奴使來數日今安在乎侍胡惶恐具服其狀超乃閉侍胡悉會其吏士三十六人與共飲酒酣因激怒之曰卿曹與我俱在絶域曹輩也欲立大功以求富貴今虜使到裁數日而王廣禮敬即廢如令鄯善收吾屬送匈奴骸骨長為豺狼食矣為之奈何官屬皆曰今在危亡之地死生從司馬超曰不入虎穴不得虎子當今之計獨有因夜以火攻虜使彼不知我多少必大震怖可殄盡也滅此虜則鄯善破膽功成事立矣衆曰當與從事議之超怒曰吉凶決於今日從事文俗吏聞此必恐而謀泄死無所名非壯士也衆曰善初夜遂將吏士往奔虜營會天大風超令十人持鼓藏虜舍後約曰見火然皆當鳴鼓大呼餘人悉持兵弩夾門而伏超乃順風縱火前後鼓噪虜衆驚亂超手格殺三人吏兵斬其使及從士三十餘級餘衆百許人悉燒死東觀記曰斬得匈奴節使屋賴帶副使比離支首及節也明日乃還告郭恂恂大驚既而色動超知其意舉手曰掾雖不行班超何心獨擅之乎恂乃悦超於是召鄯善王廣以虜使首示之一國震怖超曉告撫慰遂納子為質還奏於竇固固大喜具上超功效并求更選使使西域帝壯超節詔固曰吏如班超何故不遣而更選乎今以超為軍司馬令遂前功超復受使固欲益其兵超曰願將本所從三十餘人足矣如有不虞多益為累是時于寘王廣徳新攻破莎車遂雄張南道于寘國去長安九千六百七十里南與婼羌西與姑墨接莎車國去長安九千九百五十里西域南北有大山中央有河東西六千餘里東至玉門陽關有兩道從鄯善傍南山北波河西行至莎車為南道雄張猶熾盛也張音丁亮反波傍也波音詖而匈奴遣使監護其國超既西先至于寘廣徳禮意甚疎且其俗信巫巫言神怒何故欲向漢漢使有騧馬急求取以祠我廣徳乃遣使就超請馬續漢及華嶠書騧字並作騩説文馬淺黒色也音京媚反超密知其狀報許之而令巫自來取馬有頃巫至超即斬其首以送廣徳因辭讓之廣徳素聞超在鄯善誅滅虜使大惶恐即攻殺匈奴使者而降超超重賜其王以下因鎮撫焉時龜兹王建為匈奴所立倚恃虜威據有北道攻破疏勒殺其王龜兹國居居延城去長安七千四百八十里南與精絶東與且末北與烏孫西與姑墨接前書音義龜兹音丘兹今龜音丘勿反兹音沮惟反盖急言耳自車師前王庭隨北山波河西行至疏勒為北道疏勒國居疏勒城去長安九千三百五十里也而立龜兹人兠題為疏勒王眀年春超從間道至疏勒去兠題所居槃橐城九十里逆遣吏田慮先往降之勑慮曰兠題本非疏勒種國人必不用命若不即降便可執之慮既到兠題見慮輕弱殊無降意慮因其無備遂前刧縛兠題左右出其不意皆驚懼奔走慮馳報超超即赴之悉召疏勒將吏説以龜兹無道之狀因立其故王兄子忠為王續漢書曰求得故王兄子榆勒立之更名曰忠也國人大悦忠及官屬皆請殺兠題超不聼欲示以威信釋而遣之疏勒由是與龜兹結怨十八年帝崩焉耆以中國大喪焉耆國居員渠城去長安七千三百里北與烏孫接遂攻沒都護陳睦超孤立無援而龜兹姑墨數發兵攻疏勒姑墨國王居南城去長安八千一百五十里超守槃橐城與忠為首尾士吏單少拒守嵗餘肅宗初即位以陳睦新沒恐超單危不能自立下詔徴超超發還疏勒舉國憂恐其都尉黎弇曰漢使棄我我必復為龜兹所滅耳誠不忍見漢使去因以刀自剄超還至于寘王侯以下皆號泣曰依漢使如父母誠不可去互抱超馬脚不得行超恐于寘終不聼其東又欲遂本志乃更還疏勒疏勒兩城自超去後復降龜兹而與尉頭連兵尉頭國居尉頭谷去長安八千六百五十里南與疏勒接衣服類烏孫也超捕斬反者擊破尉頭殺六百餘人疏勒復安建初三年超率疏勒康居于寘拘彌兵一萬人攻姑墨石城破之康居國去長安萬二千三百里不屬都護斬首七百級超欲因此叵平諸國叵猶遂也乃上疏請兵曰臣竊見先帝欲開西域故北擊匈奴西使外國鄯善于寘即時向化今拘彌莎車疏勒月氏烏孫康居復願歸附欲共并力破滅龜兹平通漢道若得龜兹則西域未服者百分之一耳臣伏自惟念卒伍小吏實願從谷吉效命絶域庶幾張騫棄身曠野谷吉長安人永之父也元帝時為衛司馬使送郅支單于侍子為郅支所殺張騫武帝時為郎使月氏為匈奴所閉留之十餘嵗乃亡走大宛窮急即射禽獸給食昔魏絳列國大夫尚能和輯諸戎魏絳晉大夫晉悼公時山戎使孟樂如晉因魏絳納虎豹之皮請和諸戎公悦使魏絳盟諸戎事見左傳輯亦和也况臣奉大漢之威而無鉛刀一割之用乎賈誼曰莫邪為鈍兮鉛刀為銛楚詞曰捐棄太阿寳鉛刀兮前世議者皆曰取三十六國號為斷匈奴右臂前書曰漢遣公主為烏孫夫人結為昆弟則是斷匈奴右臂也哀帝時劉歆上議曰武帝時立五屬國起朔方伐朝鮮起𤣥菟樂浪以斷匈奴之左臂也西伐大宛結烏孫裂匈奴之右臂南面以西為右也今西域諸國自日之所入莫不向化西域傳曰自條支國乘水西行可百餘日近日所入也大小欣欣貢奉不絶唯焉耆龜兹獨未服從臣前與官屬三十六人奉使絶域備遭艱戹自孤守疏勒於今五載胡夷情數臣頗識之問其城郭小大皆言倚漢與依天等以是效之則葱領可通效猶騐也西河舊事曰葱領山其上多葱因以為名葱領通則龜兹可伐今宜拜龜兹侍子白霸為其國王以歩騎數百送之與諸國連兵嵗月之間龜兹可禽以夷狄攻夷狄計之善者也前書晁錯曰以蠻夷攻蠻夷中國之利也臣見莎車疏勒田地肥廣草牧饒衍不比敦煌鄯善間也敦煌今涼州縣兵可不費中國而糧食自足且姑墨温宿二王特為龜兹所置温宿國王居温宿城去長安八千三百五十里也既非其種更相厭苦其埶必有降反若二國來降則龜兹自破願下臣章參考行事誠有萬分死復何恨臣超區區特䝉神靈竊冀未便僵仆目見西域平定陛下舉萬年之觴詩曰躋彼公堂稱彼兕觥萬壽無疆前書兒寛傳曰臣寛再拜上千萬嵗壽薦勳祖廟布大喜於天下薦進也勳功也左氏傳曰反行飲至舍爵策勳焉書奏帝知其功可成議欲給兵平陵人徐幹素與超同志上疏願奮身佐超五年遂以幹為假司馬將弛刑及義從千人就超先是莎車以為漢兵不出遂降於龜兹而疏勒都尉番辰番音潘下同亦復反叛會徐幹適至超遂與幹擊番辰大破之斬首千餘級多獲生口超既破番辰欲進攻龜兹以烏孫兵彊宜因其力乃上言烏孫大國控弦十萬故武帝妻以公主烏孫國居赤谷城去長安八千九百里武帝元封中以江都王建女細君為公主以妻烏孫贈送甚盛烏孫以為右夫人至孝宣皇帝卒得其用西域傳曰宣帝即位烏孫遣使上書言匈奴連發大兵侵擊烏孫欲隔絶漢烏孫願發國半精兵五萬騎盡力擊匈奴唯天子出兵以救公主漢大發十五萬騎五將軍分道並出烏孫以五萬騎從西方入至右谷蠡王庭獲四萬餘級馬牛羊七十餘萬今可遣使招慰與共合力帝納之八年拜超為將兵長史假鼓吹幢麾將兵長史解見和帝紀平帝元始二年使謁者大司馬掾持節行邊兵遣執金吾候陳茂假以鉦鼓古今樂録曰横吹胡樂也張騫入西域傳其法於長安唯得摩訶兠勒一曲李延年因之更造新聲二十八解乘輿以為武樂後漢以給邊將萬人將軍得之在俗用者有黄鵠隴頭出關入關出塞入塞折楊栁黄覃子赤之楊望行人十曲劉熙釋名曰幢童也其貌童童然蔡邕月令章句曰羽鳥翼也以為旌幢麾也横吹麾幢皆大將所有超非大將故言假以徐幹為軍司馬别遣衞候李邑護送烏孫使者賜大小昆彌以下錦帛前書曰烏孫國王先號昆莫名獵驕靡後書昆彌云後代取昆字靡彌聲相近音有輕重耳昆莫既死子孫争國漢令立元貴靡為大昆彌烏就屠為小昆彌賜印綬故有大小昆彌之號焉李邑始到于寘而値龜兹攻疏勒恐懼不敢前因上書陳西域之功不可成又盛毁超擁愛妻抱愛子安樂外國無内顧心超聞之歎曰身非曾參而有三至之䜛恐見疑於當時矣三至解見宼榮傳遂去其妻帝知超忠乃切責邑曰縱超擁愛妻抱愛子思歸之士千餘人何能盡與超同心乎令邑詣超受節度詔超若邑任在外者便留與從事超即遣邑將烏孫侍子還京師徐幹謂超曰邑前親毁君欲敗西域今何不縁詔書留之更遣他吏送侍子乎超曰是何言之陋也以邑毁超故今遣之内省不疚何䘏人言疚病也䘏憂也論語孔子曰内省不疚夫何憂何懼左氏傳曰詩云禮義不愆何恤乎人之言詩謂逸詩也快意留之非忠臣也明年復遣假司馬和恭等四人將兵八百詣超超因發疏勒于寘兵擊莎車莎車隂通使疏勒王忠啖以重利謂多以珍寳誘引之啖音徒濫反前書高祖令陸賈徃説秦將㗖以利啖與㗖同忠遂反從之西保烏即城超乃更立其府丞成大為疏勒王悉發其不反者以攻忠積半嵗而康居遣精兵救之超不能下是時月氐新與康居婚相親超乃使使多齎錦帛遺月氏王令曉示康居王康居王乃罷兵執忠以歸其國烏即城遂降於超後三年忠説康居王借兵還據損中損中未詳東觀記作蝢中續漢及華嶠書並作損中本或作植未知孰是也密與龜兹謀遣使詐降於超超内知其姦而外偽許之忠大喜即從輕騎詣超超密勒兵待之為供張設樂供音居用反張音竹亮反酒行乃叱吏縛忠斬之因擊破其衆殺七百餘人南道於是遂通明年超發于寘諸國兵二萬五千人復擊莎車而龜兹王遣左將軍發温宿姑墨尉頭合五萬人救之超召將校及于寘王議曰今兵少不敵其計莫若各散去于寘從是而東長史亦於此西歸可須夜鼓聲而發隂緩所得生口龜兹王聞之大喜自以萬騎於西界遮超溫宿王將八千騎於東界徼于寘超知二虜已出密召諸部勒兵雞鳴馳赴莎車營胡大驚亂奔走追斬五千餘級大獲其馬畜財物莎車遂降龜兹等因各退散自是威震西域初月氐嘗助漢擊車師有功是嵗貢奉珍寳符拔師子續漢書曰符拔形似麟而無角因求漢公主超拒還其使由是怨恨永元二年月氐遣其副王謝將兵七萬攻超超衆少皆大恐超譬軍士曰月氐兵雖多然數千里踰葱領來非有運輸何足憂邪但當收榖堅守彼飢窮自降不過數十日决矣謝遂前攻超不下又鈔掠無所得超度其糧將盡必從龜兹求救乃遣兵數百於東界要之謝果遣騎齎金銀珠玉以賂龜兹超伏兵遮擊盡殺之持其使首以示謝謝大驚即遣使請罪願得生歸超縱遣之月氐由是大震嵗奉貢獻明年龜兹姑墨温宿皆降乃以超為都護徐幹為長史拜白霸為龜兹王遣司馬姚光送之超與光共脅龜兹廢其王尤利多而立白霸使光將尤利多還詣京師超居龜兹它乾城徐幹屯疏勒西域唯焉耆危須尉犁以前沒都護懐二心其餘悉定六年秋超遂發龜兹鄯善等八國兵合七萬人及吏士賈客千四百人討焉耆兵到尉犁界而遣曉説焉耆尉犁危須曰都護來者欲鎮撫三國即欲改過向善宜遣大人來迎當賞賜王侯已下大人謂其酋長事畢即還今賜王綵五百匹焉耆王廣遣其左將北鞬支奉牛酒迎超鞬音九言反超詰鞬支曰汝雖匈奴侍子而今秉國之權都護自來王不以時迎皆汝罪也或謂超可便殺之超曰非汝所及此人權重於王今未入其國而殺之遂令自疑設備守險豈得到其城下哉於是賜而遣之廣乃與大人迎超於尉犁奉獻珍物焉耆國有葦橋之險廣乃絶橋不欲令漢軍入國超更從它道厲度由帶以上為厲由膝以下為揭見爾雅也七月晦到焉耆去城二十里正營大澤中劉攽曰案文正當作止廣出不意大恐乃欲悉驅其人共入山保焉耆左候元孟先嘗質京師密遣使以事告超超即斬之示不信用乃期大會諸國王因揚聲當重加賞賜於是焉耆王廣尉犁王汎及北鞬支等三十人相率詣超其國相腹久等十七人懼誅皆亡入海十七字本或為七十而危須王亦不至坐定超怒詰廣曰危須王何故不到腹久等所縁逃亡遂叱吏士收廣汎等於陳睦故城斬之傳首京師因縱兵鈔掠斬首五千餘級獲生口萬五千人馬畜牛羊三十餘萬頭更立元孟為焉耆王超留焉耆半嵗慰撫之於是西域五十餘國悉皆納質内屬焉明年下詔曰往者匈奴獨擅西域宼盗河西永平之末城門書閉先帝深愍邊氓嬰罹宼害乃命將帥擊右地破白山臨蒲類西河舊事曰白山之中有好木匈奴謂之天山去蒲類海百里郭義恭廣志曰西域有白山通嵗有雪亦名雪山破白山見明紀也取車師城郭諸國震慴響應遂開西域置都護而焉耆王舜舜子忠獨謀悖逆恃其險隘覆沒都護并及吏士先帝重元元之命憚兵役之興故使軍司馬班超安集于寘以西超遂踰葱領迄縣度迄至也縣度山名縣音𤣥謂以䋲索縣縋而過也其處在皮山國以西􅄢賔國之東也出入二十二年莫不賔從改立其王而綏其人不動中國不煩戎士得逺夷之和同異俗之心而致天誅蠲宿耻以報將士之讐致猶至也蠲除也司馬法曰賞不踰月欲人速覩為善之利也其封超為定逺侯邑千户東觀記曰其以漢中郡南鄭之西鄉户千封超為定逺侯故城在今洋州西鄉縣南超自以久在絶域年老思土十二年上疏曰臣聞太公封齊五世葬周狐死首丘代馬依風禮記曰太公封於營丘比及五世皆反葬於周君子曰樂樂其所自生禮不亡其本古之人有言曰狐死正丘首仁也鄭𤣥注曰正丘首丘也代郡名在趙北韓詩外傳曰代馬依北風飛鳥掦故巢也夫周齊同在中土千里之間况於逺處絶域小臣能無依風首丘之思哉蠻夷之俗畏壯侮老案前書曰匈奴其俗壯者食肥美老者食其餘貴壯徤賤老弱也臣超犬馬齒殱常恐年衰奄忽僵仆孤魂棄捐昔蘇武留匈奴中尚十九年今臣幸得奉節帶金銀護西域金銀謂印也金印紫綬銀印青綬也如自以壽終屯部誠無所恨然恐後世或名臣為沒西域臣不敢望到酒泉郡但願生入玉門關玉門關屬敦煌郡今沙州也去長安三千六百里關在敦煌縣西北酒泉今肅州也去長安二千八百五十里也臣老病衰困冒死瞽言謹遣子勇隨獻物入塞東觀記曰時安息遣使獻大爵師子超遣子勇隨入塞也及臣生在令勇目見中土而超妺同郡曹壽妻昭亦上書請超曰妾同産兄西域都護定逺侯超幸得以微功特䝉重賞爵列通侯位二千石天恩殊絶誠非小臣所當被蒙超之始出志捐軀命冀立微功以自陳效會陳睦之變道路隔絶超以一身轉側絶域曉譬諸國因其兵衆每有攻戰輙為先登身被金夷夷傷也不避死亡賴䝉陛下神靈且得延命沙漠至今積三十年骨肉生離不復相識所與相隨時人士衆皆已物故超年最長今且七十衰老被病頭髮無黑兩手不仁不仁猶不遂也耳目不聰明扶杖乃能行雖欲竭盡其力以報塞天恩廹於嵗暮犬馬齒索蠻夷之性悖逆侮老而超旦暮入地久不見代恐開姦宄之源生逆亂之心而卿大夫咸懐一切莫肯逺慮如有卒暴超之氣力不能從心便為上損國家累世之功下棄忠臣竭力之用誠可痛也故超萬里歸誠自陳苦急延頸踰望三年於今未蒙省録踰遥也高祖踰謂黥布曰何苦而反妾竊聞古者十五受兵六十還之周禮鄉大夫職曰國中七尺以及六十野自六尺以及六十有五皆征之征謂賦稅從征役也韓詩外傳曰二十行役六十免役與周禮國中同即知一與周禮七尺同禮國中六十免役野即六十有五晚於國中五年國中七尺從役野六尺即是野又早於國中五年七尺謂二十六尺即十五也此言十五受兵謂據野外為言六十還之據國中為説也劉攽曰注即知一與周禮七尺同禮國中六十免役案文一字當作二十又下文禮國中當云周禮國中亦有休息不任職也縁陛下以至孝理天下得萬國之歡心不遺小國之臣况超得備侯伯之位故敢觸死為超求哀匄超餘年匄乞也一得生還復見闕庭使國永無勞逺之慮西域無倉卒之憂超得長䝉文王𦵏骨之恩子方哀老之恵𦵏骨解見明紀田子方魏文侯之師也見君之老馬棄之曰少盡其力老而棄之非仁也於是收而養之事見史記也詩云民亦勞止汔可小康恵此中國以綏四方詩大雅也汔其也康綏皆安也言先施恩恵於中國然後乃安四方超有書與妾生訣恐不復相見妾誠傷超以壯年竭忠孝於沙漠疲老則便捐死於曠野誠可哀憐如不蒙救護超後有一旦之變冀幸超家得蒙趙母衛姬先請之貸趙母謂趙奢之妻趙括之母也懼括敗先請得不坐事見史記衛姬者齊桓公之姬桓公與管仲謀伐衛桓公入姬請衛之罪事見列女傳也妾愚戇不知大義觸犯忌諱書奏帝感其言乃徴超還超在西域三十一年十四年八月至洛陽拜為射聲校尉超素有胷脅疾既至病遂加帝遣中黄門問疾賜醫藥其九月卒年七十一朝廷愍惜焉使者弔祭贈賵甚厚子雄嗣初超被徴以戊巳校尉任尚為都護劉攽曰案是時但有戊校尉多已字與超交代尚謂超曰君侯在外國三十餘年而小人猥承君後任重慮淺宜有以誨之超曰年老失智任君數當大位豈班超所能及哉必不得已願進愚言塞外吏士本非孝子順孫皆以罪過徙補邊屯而蠻夷懐鳥獸之心難養易敗今君性嚴急水清無大魚察政不得下和家語孔子曰水至清則無魚人至察則無徒宜蕩佚簡易寛小過總大綱而已超去後尚私謂所親曰我以班君當有竒策今所言平平耳尚至數年而西域反亂以罪被徴如超所戒有三子長子雄累遷屯騎校尉會叛羌宼三輔詔雄將五營兵屯長安就拜京兆尹雄卒子始嗣尚清河孝王女隂城公主主順帝之姑貴驕滛亂與嬖人居帷中而召始入使伏牀下始積怒永建五年遂拔刃殺主帝大怒腰斬始同産皆棄市超少子勇勇字宜僚少有父風永初元年西域反叛以勇為軍司馬與兄雄俱出敦煌迎都護及西域甲卒而還因罷都護後西域絶無漢吏十餘年元初六年敦煌太守曹宗遣長史索班將千餘人屯伊吾車師前王及鄯善王皆來降班後數月北單于與車師後部遂共攻沒班進撃走前王畧有北道鄯善王急求救於曹宗宗因此請出兵五千人擊匈奴報索班之耻因復取西域鄧太后召勇詣朝堂會議先是公卿多以為宜閉玉門關遂棄西域勇上議曰昔孝武皇帝患匈奴彊盛兼總百蠻以逼障塞於是開通西域離其黨與論者以為奪匈奴府藏斷其右臂遭王莽簒盗徴求無厭胡夷忿毒遂以背叛光武中興未遑外事故匈奴負彊驅率諸國及至永平再攻敦煌河西諸郡城門晝閉孝明皇帝深惟廟策古者謀事必就祖故言廟策也乃命虎臣出征西域毛詩曰進厥虎臣闞如虓虎故匈奴逺遁邊境得安及至永元莫不内屬會間者羌亂西域復絶北虜遂遣責諸國備其逋租高其價直嚴以期會鄯善車師皆懐憤怨思樂事漢其路無從前所以時有叛者皆由牧養失宜還為其害故也今曹宗徒耻於前負欲報雪匈奴而不尋出兵故事未度當時之宜也夫要功荒外萬無一成若兵連禍結悔無及已况今府藏未充師無後繼是示弱於逺夷暴短於海内臣愚以為不可許也舊敦煌郡有營兵三百人今宜復之復置護西域副校尉居於敦煌如永元故事又宜遣西域長史將五百人屯樓蘭西當焉耆龜兹徑路南彊鄯善于寘心膽北扞匈奴東近敦煌如此誠便尚書問勇曰今立副校尉何以為便又置長史屯樓蘭利害云何勇對曰昔永平之末始通西域初遣中郎將居敦煌後置副校尉於車師既為胡虜節度又禁漢人不得有所侵擾故外夷歸心匈奴畏威今鄯善王尤還尤還王名漢人外孫若匈奴得志則尤還必死此等雖同鳥獸亦知避害若出屯樓蘭足以招附其心愚以為便長樂衞尉鐔顯廷尉綦母參司𨽻校尉崔據難曰朝廷前所以棄西域者以其無益於中國而費難供也今車師已屬匈奴鄯善不可保信一旦反覆班將能保北虜不為邊害乎以勇為軍司馬故以將言將音子亮反勇對曰今中國置州牧者以禁郡縣姦猾盗賊也若州牧能保盗賊不起者臣亦願以要斬保匈奴之不為邊害也今通西域則虜埶必弱虜埶必弱則為患微矣劉攽曰案文此句多一必字孰與歸其府藏續其斷臂哉今置校尉以扞撫西域設長史以招懐諸國若棄而不立則西域望絶望絶之後屈就北虜縁邊之郡將受困害恐河西城門必復有晝閉之儆矣今不廓開朝廷之徳而拘屯戍之費若北虜遂熾豈安邊久長之策哉太尉屬毛軫難曰今若置校尉則西域駱驛遣使求索無厭與之則費難供不與則失其心一旦為匈奴所廹當復求救則為役大矣勇對曰今設以西域歸匈奴而使其恩徳大漢不為鈔盗則可矣如其不然則因西域租入之饒兵馬之衆以擾動縁邊是為富仇讐之財增暴夷之埶也置校尉者宣威布徳以繋諸國内向之心以疑匈奴覬覦之情而無財費耗國之慮也且西域之人無它求索其來入者不過稟食而已今若拒絶埶歸北屬夷虜并力以宼并凉則中國之費不止千億置之誠便於是從勇議復敦煌郡營兵三百人置西域副校尉居敦煌雖復羈縻西域然亦未能出屯其後匈奴果數與車師共入宼鈔河西大被其害延光二年夏復以勇為西域長史將兵五百人出屯栁中栁中今西州縣明年正月勇至樓蘭以鄯善歸附特加三綬而龜兹王白英猶自疑未下勇開以恩信白英乃率姑墨温宿自縛詣勇降勇因發其兵歩騎萬餘人到車師前王庭擊走匈奴伊蠡王於伊和谷收得前部五千餘人於是前部始復開通還屯田栁中四年秋勇發敦煌張掖酒泉六千騎及鄯善疏勒車師前部兵擊後部王軍就大破之軍就名也首虜八千餘人馬畜五萬餘頭捕得軍就及匈奴持節使者將至索班沒處斬之以報其耻傳首京師永建元年更立後部故王子加特奴為王勇又使别校誅斬東且彌王亦更立其種人為王且音子余反於是車師六國悉平其冬勇發諸國兵擊匈奴呼衍王呼衍王亡走其衆二萬餘人皆降捕得單于從兄勇使加特奴手斬之以結車師匈奴之隙北單于自將萬餘騎入後部至金且谷勇使假司馬曹俊馳救之單于引去俊追斬其貴人骨都侯於是呼衍王遂徙居枯梧河上是後車師無復虜跡城郭皆安唯焉耆王元孟未降二年勇上請攻元孟於是遣敦煌太守張朗將河西四郡兵三千人配勇河西四郡金城敦煌張掖酒泉因發諸國兵四萬餘人分騎為兩道擊之勇從南道朗從北道約期俱至焉耆而朗先有罪欲徼功自贖遂先期至爵離關遣司馬將兵前戰首虜二千餘人元孟懼誅逆遣使乞降張朗徑入焉耆受降而還元孟竟不肯靣縛唯遣子詣闕貢獻朗遂得免誅勇以後期徴下獄免後卒于家梁慬傳梁慬字伯威慬音勤北地弋居人也弋居縣名郡國志曰有鐡官父諷歴州宰永元元年車騎將軍竇憲出征匈奴除諷為軍司馬令先齎金帛使北單于宣國威徳其歸附者萬餘人後坐失憲意髠輸武威武威太守承㫖殺之竇氏既滅和帝知其為憲所誣徴慬除為郎中慬有勇氣常慷慨好功名初為車騎將軍鄧鴻司馬再遷延平元年拜西域副校尉慬行至河西會西域諸國反叛攻都護任尚於疏勒尚上書求救詔慬將河西四郡羌胡五千騎馳赴之慬未至而尚已得解會徴尚還以騎都尉叚禧為都護西域長史趙博為騎都尉禧博守它乾城它乾城小慬以為不可固乃譎説龜兹王白霸欲入共保其城白霸許之吏人固諫白霸不聼慬既入遣將急迎禧博合軍八九千人龜兹吏人並叛其王而與温宿姑墨數萬兵反共圍城慬等出戰大破之連兵數月胡衆敗走乘勝追擊凡斬首萬餘級獲生口數千人駱駝畜産數萬頭龜兹乃定而道路尚隔檄書不通嵗餘朝廷憂之公卿議者以為西域阻逺數有背叛吏士屯田其費無已永初元年遂罷都護遣騎都尉王𢎞發關中兵迎慬禧博及伊吾盧栁中屯田吏士二年春還至敦煌會衆羌反叛朝廷大發兵西擊之逆詔慬留為諸軍援慬至張掖日勒日勒縣名屬張掖郡故城在今甘州刪丹縣東南羌諸種萬餘人攻亭候殺畧吏人慬進兵擊大破之乘勝追至昭武縣名屬張掖郡故城在今甘州張掖縣西北也虜遂散走其能脱者十二三及至姑臧羌大豪三百餘人詣慬降並慰譬遣還故地河西四郡復安慬受詔當屯金城聞羌轉宼三輔廹近園陵即引兵赴擊之轉戰武功美陽關美陽縣名故城在武功縣北七里於其所置關慬臨陣被創不顧連破走之盡還得所掠生口獲馬畜財物甚衆羌遂奔散朝廷嘉之數璽書勞勉委以西方事令為諸軍節度三年冬南單于與烏桓大人俱反以大司農何熙行車騎將軍事中郎將龎雄為副將羽林五校營士及發縁邊十郡兵二萬餘人縁邊十郡謂五原雲中定襄鴈門朔方代郡上谷漁陽遼西右北平又遼東太守耿􅇪率將鮮卑種衆共擊之詔慬行度遼將軍事龎雄與耿䕫共撃匈奴奥鞬日逐王破之單于乃自將圍中郎將耿种於美稷連戰數月攻之轉急种移檄求救明年正月慬將八千餘人馳往赴之至屬國故城與匈奴左將軍烏桓大人戰破斬其渠帥殺三千餘人虜其妻子獲財物甚衆單于復自將七八千騎迎攻圍慬慬被甲奔擊所向皆破虜遂引還虎澤三月何熙軍到五原曼柏曼柏縣名屬五原郡暴疾不能進遣龎雄與慬及耿种歩騎萬六千人攻虎澤連營稍前單于惶怖遣左奥鞬日逐王詣慬乞降慬乃大陳兵受之單于脱㡌徒跣靣縛稽顙納質會熙卒于師即拜慬度遼將軍龎雄還為大鴻臚雄巴郡人有勇畧稱為名將明年安定北地上郡皆被羌宼榖貴人流不能自立詔慬發邊兵迎三郡太守使將吏人徙扶風界慬即遣南單于兄子優孤塗奴將兵迎之既還慬以塗奴接其家屬有勞輙授以羌侯印綬坐專擅徴下獄扺罪明年校書郎馬融上書訟慬與護羌校尉龎參有詔原刑語在龎參傳會叛羌寇三輔關中盗賊起拜慬謁者將兵擊之至湖縣病卒何熙字孟孫陳國人少有大志永元中為謁者身長八尺五寸善為威容贊拜殿中音動左右和帝偉之擢為御史中丞歴司𨽻校尉大司農及在軍臨沒遺言薄𦵏三子臨瑾阜臨瑾並有政能阜俊才早歿臨子衡為尚書以正直稱坐訟李膺等下獄免官廢于家論曰時政平則文徳用而武畧之士無所奮其力能故漢世有發憤張膽争膏身於夷狄以要功名多矣祭肜耿秉啓匈奴之權班超梁慬奮西域之畧卒能成功立名享受爵位薦功祖廟勒勲于後亦一時之志士也贊曰定逺慷慨專功西遐坦歩葱雪咫尺龍沙葱領雪山白龍堆沙漠也八寸曰咫坦歩言不以為艱咫尺言不以為逺也慬亦抗憤勇乃負荷左傳曰其父析薪其子弗克負荷言勇能繼超之功業後漢書卷七十七後漢書卷七十七考證班超傳祭酒布衣諸生耳注今稱祭酒相尊敬之詞也顧起元曰相稱得為祭酒猶唐人之稱先輩耳梁慬傳河西四郡復安宋本無四字臣會汾按武帝取匈奴昆邪休屠地置武威張掖酒泉敦煌是為河西四郡今從監本後漢書卷七十七考證
