帝復為國五字蓋本始元年更為廣陽國至光武始并入上谷郡耳汶何焯校本滅去氵按前書作文髙句驪注出塞外御白平山御當作銜西蓋鳥前書作西蓋馬臣召南按本書東沃沮在髙句驪蓋馬太山之東知此作鳥誤候城臣召南按顧炎武救文格論曰候城改屬元莵而遼東復出一候城無慮改屬遼東屬國而遼東復出一無慮必有一焉宜刪者然則天下郡國少二城矣占蟬前書作黏蟬遂城前書作遂成遼東屬國臣世駿按此郡獨無户口昌遼故天遼屬遼西臣召南按前志遼西無天遼縣顧炎武考古錄疑此志昌遼故天遼五字當作昌黎故交黎是也又考安帝紀鮮卑攻夫犁營章懷注曰夫犁縣名屬遼東屬國鮮卑傳又作扶黎注文同然則前漢名交黎後漢名夫黎又改曰昌黎也疑此志當作昌黎故夫黎夫與天字尤相近賔徒前書作賔從臨元前書作臨允朱崖前書作朱盧羸􅖮羸應作前書孟康曰音蓮則作羸字非也無功前書作無切後漢書卷三十三考證
