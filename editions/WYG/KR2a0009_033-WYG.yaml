body:
  text: 後漢書卷三十三梁剡令劉昭補并注郡國志第二十三郡國五益州漢中牂牁巴郡越嶲廣漢益州蜀郡永昌犍為廣漢屬國犍為屬國蜀郡屬國涼州隴西北地漢陽武威武都張掖金城酒泉安定敦煌張掖屬國屬國張掖居延并州上黨雲中太原定襄上郡鴈門西河朔方五原幽州涿郡平廣陽右北代郡遼西上谷遼東漁陽𤣥莵樂浪屬國遼東交州南海九真蒼梧日南鬱林合浦交趾漢中郡秦置雒陽西千九百九十里九城户五萬七千三百四十四口二十六萬七千四百二南鄭華陽國志曰有池水從旱山來成固媯墟在西北前書曰在西城帝王世紀亦云姚墟在西北有舜祠西城巴漢志云漢末以為西城郡襃中華陽國志曰有唐公防祠沔陽有鐵華陽國志曰有定軍山博物記曰縣北有丙穴巴漢志曰縣有度水水有二原一曰清檢一曰濁檢安陽錫有錫春秋時曰錫穴左傳文十一年楚伐麋至于錫穴上庸本庸國房陵巴漢志曰建安十三年别屬新城郡有維山維水所出東入瀘巴郡秦置雒陽西三千七百里譙周巴記曰初平六年趙頴分巴為二郡欲得巴舊名故郡以墊江為治安漢以下為永寧郡建安六年劉璋分巴以永寧為巴東郡以墊江為巴西郡蜀都賦注云銅梁山在巴東干寳搜神記曰有澤水民謂神龍不可鳴鼓其傍即使大雨蜀都賦曰潛龍蟠於沮澤應鳴鼓而興雨十四城户三十一萬六百九十一口百八萬六千四十九江州杜預曰巴國也有塗山禹娶塗山華陽國志曰帝禹之廟銘存焉有清水穴巴人以此為粉則膏澤鮮芳貢粉京師乃因名粉水宕渠有鐵朐忍巴漢志曰山有大小石城勢者閬中案本傳有俞水巴漢志曰有彭池大澤名山靈臺見孔子内䜟魚復古庸國左傳文十年魚人逐楚師是也扞水有扞關史記曰楚肅王為扞關以拒蜀臨江枳史記蘇代曰楚得枳而國亡華陽國志有明月峽廣徳嶼者是也涪陵出丹巴記曰靈帝分涪陵置永寧縣巴漢志曰涪陵巴郡之南鄙從枳南入折丹涪陵水與楚商於之地接漢時赤田軍常取其民墊江安漢平都巴記曰和帝分枳置充國永元二年分閬中置巴記曰初平四年復分為南充國縣宣漢巴漢記曰和帝分宕渠之東置漢昌永元中置巴記曰分宕渠之北而置之廣漢郡髙帝置雒陽西三千里十一城户十三萬九千八百六十五口五十萬九千四百三十八雒州刺史治新都華陽國志曰有金堂山水通巴漢緜竹地道記曰有紫巖山緜水之所出焉什邡涪巴漢志曰孱水出孱山梓潼地道記五婦山馳水出建安二十二年劉備以為郡白水山海經曰白水出蜀而東南入江郭璞曰今在縣葭萌華陽國志有水通于漢川有金銀鑛民洗取之郪廣漢有沈水徳陽華陽國志曰有劎閣道三十里至險蜀郡秦置雒陽西三千一百里十一城户三十萬四百五十二口百三十五萬四百七十六成都蜀都賦注曰武帝元鼎二年立成都郭十八門郫江原繁廣都任豫益州記曰縣有望川源鑿石二十里引取郫江水灌廣都田云後漢所穿鑿者臨卭博物記曰有火井深二三丈在縣南百里以竹木投取火後人以火燭投井中火即滅絶不復然蜀都賦注曰火井欲出其火先以家火投之須臾許隆隆如雷聲爛然通天光耀十里以竹筒盛之接其光而無炭也取井火還煮井水一斛水得四五斗鹽家火煮之不過二三斗鹽耳有鐵湔氐道蜀王本紀曰縣前有兩石對如闕號曰彭門岷山在西徼外山海經曰岷山江水出焉東北注于海中多良龜其上多金玉其下多白珉其獸多犀象䕫郭璞曰今蜀山中有大牛重數千斤曰䕫蜀都賦注曰岷山特多藥其椒特多好者絶異于天下之好者汶江道華陽國志曰濊水駹水出焉多冰寒盛夏凝凍不釋孝安延光三年復立之以為郡八陵廣柔帝王世紀曰禹生石紐縣有石紐邑華陽國志曰夷人營其地方百里不敢居牧有過逃其野中不敢追云畏禹神能藏三年為人所得則共原之云禹神靈祐之緜虒道華陽國志曰有玉壘山出璧玉湔水所出犍為郡武帝置雒陽西三千二百七十里劉璋分立江陽郡九城户十三萬七千七百一十三口四十一萬一千三百七十八武陽有彭亡聚岑彭死處南中志曰縣南二十里彭望山益州記曰縣有王喬仙處王喬祠今在縣下有彭祖冢上有彭祖祠資中牛鞞南安蜀都賦注曰縣之南有五屼山一山而五里在越嶲界有魚泣津蜀都賦注曰魚符津數百步在縣北三十里縣臨大江岸便山嶺相連經益州郡有道廣四五丈深或百丈斬鑿之跡今存昔唐䝉所造博物記縣西百里有牙門山華陽國志曰縣西有熊耳峽南有峨眉山去縣八十餘里僰道華陽國志曰治馬湖江㑹水通越嶲舊本有僰人有荔枝薑蒟有玉岳蘭李冰燒之崖有五色赤白映水𤣥黄魚從楚來至此而止畏崖映其水故也江陽華陽國志曰江雒㑹有方蘭祀江中有大闕小闕蜀都賦注云沱潛既道從縣南流至漢嘉縣入大穴中通剛山下因南潛出今名復出水是也荷節南廣漢安牂牁郡武帝置雒陽西五千七百里十六城户三萬一千五百二十三口二十六萬七千二百五十三故且蘭地道記曰有沈水平夷鄨地道記曰不狼山鄨水所出母斂談指出丹南中志曰有不津江江有瘴氣夜郎出雄黄雌黄案本傳有竹王三郎祠同竝談槀漏江毋單宛溫南中志曰縣北三百里有盤江廣數百步深十餘丈此江有毒氣鐔封華陽國志曰有溫水漏卧句町案本傳有桄榔木地道記有文衆水進乗西隨地道記曰麋水西受徼外東至麊冷入尚龍谿越嶲郡武帝置雒陽西四千八百里十四城户十三萬一百二十口六十二萬三千四百一十八卭都南山出銅南中志曰縣東南數里有水名卭廣都河從廣二十里深百餘丈有魚長一二丈頭特大遥視如戴鐵釜狀華陽國志曰河有唪雋山又有溫水穴冬夏常熱遂久華陽國志曰有繩水廣志曰有縹碧石有綠碧靈關道華陽國志曰有銅山又有利慈臺登出鐵華陽國志曰有孫水一曰白沙江山有砮火燒成鐵青蛉有禺同山俗謂有金馬碧雞華陽國志曰有鹽官濮水出卑水華陽國志曰水通馬湖三縫華陽國志曰通道寧州度瀘得蛉縣有長谷石時坪中有石豬子母數千頭長老傳言夷昔牧豬于此一朝豬化為石迄今夷不敢往牧㑹無出鐵郭璞曰山海經稱縣東山出碧亦玉類華陽國志曰故濮人邑也今有濮人冢冢不閉户其中多珠人不可取取之不祥有元馬河元馬日行千里縣有元馬祠民居家馬牧山下或産駿駒云元馬子也今其有元馬逕厥迹存焉河中有銅船今在祠以羊可取也河中見子土地特産好羣牛東山出青碧定莋華陽國志縣在郡西度瀘水賔岡徼白摩沙夷有鹽坑積薪以齊水灌而後焚之成白鹽漢末夷等皆飼之闡華陽國志曰故卭人邑治卭都城蘇示大莋莋秦姑復地道記鹽池澤在南益州郡武帝置故滇王國雒陽西五千六百里諸葛亮表有耽文山澤山司彌瘞山婁山辟龍山此等並皆未詳所在縣十七城户二萬九千三十六口十一萬八百二滇池出鐵有池澤澤在縣西見前書南中志曰池周二百五十里北有黒水祠華陽國志曰水是温泉又有白蝟山淮有蝟勝休南中志曰有大河從廣百四十里深數十丈地道記曰水東至毋掇入橋水俞元装山出銅華陽國志在河中洲上律髙石室山出錫盢町山出銀鉛賁古采山出銅錫前書曰在縣北羊山出銀鉛在縣西地道記曰南烏山出錫毋掇地道記曰有橋水出橋山建伶穀昌牧靡李竒曰靡音麻出升麻味昆澤同瀨地道記曰銅虜山米水所出同勞雙栢出銀連然梇棟地道記連山無血水所出秦臧永昌郡明帝永平二年分益州置雒陽西七千二百六十里廣志曰永昌一郡見龍之耀日月相屬八城户二十三萬一千八百九十七口百八十九萬七千三百四十四不韋出鐵華陽國志曰孝武置不韋縣徙南越相吕嘉子孫宗族居之因名不韋以章其先人之惡嶲唐本西南夷史記曰古為嶲昆明古今注曰永平十年置益州西部都尉治嶲唐鎮尉哀牢人楪榆蠻夷華陽國志曰有同水從徼外來比蘇楪榆有河廣志曰有弔鳥山縣西北八十里在阜山衆鳥千百羣共㑹鳴呼啁哳每嵗七月八月晦望至集六日則止嵗凡六至雉雀來弔特悲其方人夜然火伺取無嗉不食者以為義鳥則不取也俗言鳳凰死于此山故衆鳥來弔地道記有澤在縣東邪龍雲南南中志曰縣西髙山相連有大泉水周旋萬步名馮河縣西北百數十里有山衆山之中特髙大狀如扶風太乙鬱然髙峻與雲氣相連結因視之不見其山固陰沍寒雖五月盛暑不熱廣志曰五月霜雪皓然哀牢永平中置故牢王國博南永平中置南界出金華陽國志曰西山髙三十里越得蘭滄水有金沙洗取融為金有光珠穴廣志曰有虎魄生地中其上及傍魄不生草深者四五八九尺大者如斛削去外皮中成虎如升初如桃膠凝堅成也廣漢屬國都尉故北部都尉屬蜀郡安帝時以為屬國都尉别領三城户三萬七千一百一十口二十萬五千六百五十二陰平道甸氐道華陽國志曰有白水出徼外入漢剛氐道華陽國志曰涪水所出有金銀鑛蜀郡屬國故屬西部都尉延光元年以為屬國都尉别領四城户十一萬一千五百六十八口四十七萬五千六百二十九漢嘉故青衣陽嘉二年改有䝉山華陽國志曰有洙水從卭來出岷江又從岷山西來入江合郡下青衣江入大江土地多山蜀都賦曰廓靈關而為門注曰山名也地在縣南嚴道有卭僰九折坂者卭刻置山海經曰崍山江水出焉郭璞曰中江所出也華陽國志曰道至險有長嶺若棟八渡之難楊母閣之峻昔楊氏倡造作閣故名焉卭崍山本名卭莋故卭人莋人界也巖阻峻廻曲九折乃至山上凝冰夏結冬則劇寒王陽行步至此退徙華陽國志曰出丹砂雄雌黄空青青碧旄牛華陽國志曰旄地也在卭崍山表卭人自蜀入度此山甚險難南人毒之故名卭崍有鮮水若水一名洲江犍為屬國故郡南部都尉永初元年以為屬國都尉别領二城户七千九百三十八口三萬七千一百八十七朱提南中志曰縣有大淵池水名千頃池西南二里冇堂狼山多毒草盛夏之月飛鳥過之不能得去蜀都賦注曰有靈池在縣南數十里周四十七里山出銀銅案前書朱提銀重以八兩為一流直一千五百八十他銀一流直一千南中志曰舊有銀窟數處諸葛亮書云漢嘉金朱提銀採之不足以自食漢陽右益州刺史部郡國十二縣道一百一十八本梁州袁山松書曰建安二十年復置漢寧郡漢中之安陽西城郡分錫上庸為上庸郡置都尉隴西郡秦置雒陽西二千二百二十里十一城户五千六百二十八口二萬九千六百三十七狄道安故氐道養水出此巴漢志曰漢水二源東源出縣之養山名養南都賦注曰漢水源出隴西經武都至武關山歴南陽界出沔口入江巴漢志曰西漢隴西嶓冢山㑹白水經葭萌入漢始源曰沔故曰漢沔首陽有鳥䑕同穴山爾雅曰其鳥為䳜其䑕為鼵如人家䑕而短尾䳜似鵽而小黄黒色穴地入三四尺䑕在内鳥在外孔安國尚書傳曰共為雌雄張氏地理記云不為牝牡山海經曰山多白虎白玉渭水出地道記曰有三危三苗所處大夏襄武有五雞聚臨洮有西頃山前志曰在縣西本傳縣馬防築索西城枹罕故屬金城白石故屬金城鄣河關故屬金城積石山在西南河水出漢陽郡武帝置為天水永平十七年更名在雒陽西二千里秦州記曰中平五年分置南安郡獻帝起居注曰初平四年十二月巳分漢陽上郡為永陽以鄉亭為屬縣十三城户二萬七千四百二十三口十三萬一百三十八冀史記曰秦武公伐冀戎縣有朱圄山前志曰在縣南有緹羣山有雒門聚來歙破隗囂處望恒阿陽略陽有街泉亭街水故縣省勇士成紀帝王世紀曰包犧氏生于成紀隴州刺史治漢官云去雒陽二千一百里有大坂名隴坻三秦記其坂九廻不知髙㡬許欲上者七日乃越髙處可容百餘家清水四注下郭仲産秦州記曰隴山東西百八十里登山嶺東望秦川四五百里極目泯然山東人行役升此而顧瞻者莫不悲思故歌曰隴頭流水分離四下念我行役飄然曠野登髙逺望涕零雙墮度汧隴無蠶桑八月乃麥五月乃凍解豲坻聚有秦亭秦之先封起於此豲道史記秦孝公西斬戎王蘭干平襄顯親上邽故屬隴西秦州記曰縣北有利山川中平地有土堆髙五丈生細竹翠茂殊常二楊樹大數十圍百姓祀之西故屬隴西有嶓冢山西漢水史記曰申命和仲居西土徐廣曰今之西縣鄭𤣥曰西在隴西西今謂之八充山武都郡武帝置雒陽西一千九百六十里七城户二萬一百二口八萬一千七百二十八下辨有赤亭武都道華陽國志曰有大池澤上祿故道干寳搜神記曰有奴特祠秦置旄頭騎起此河池地道記曰有泉街水沮沔水出東狼谷羌道金城郡昭帝置雒陽西二千八百里十城户三千八百五十八口萬八千九百四十七允吾西羌傳有唐谷秦州有牢北山傍有三窟浩亹有雒都谷馬武破羌處令居枝楊金城榆中臨羌有昆崙山破羌安夷允街安定郡武帝置雒陽西千七百里八城户六千九十四口二萬九千六十臨涇謝承書曰宣仲為長史民扳留改曰宜民見李固傳而志無此改豈承之妄乎髙平有第一城髙峻所據朝那有湫淵方四十里停不流冬夏不增減不生草木郭璞注山海經曰涇水出縣西丹頭山入渭烏枝有瓦亭牛邯軍處山薄落谷本傳有龍池山地道記曰烏水出三水有左谷盧芳所居陰盤舊有陰宻縣未詳所并杜預曰安定陰宻縣古宻須國史記曰秦遷白起於陰宻山海經曰温水出崆峒山在臨汾南入河華陽北郭璞曰水常温彭陽鶉觚故屬北地北地郡秦置雒陽西千一百里六城户千一百二十二口萬八千六百三十七富平泥陽有五柞亭地道記曰泥水出郁郅北蠻中弋居有鐵廉前志卑移山在西北參䜌故屬安定有青山謝沈書屬國降羌胡數千人居山田畜靈州武威郡故匈奴休屠王地武帝置雒陽西三千五百里十四城户萬四十三口三萬四千二百二十六姑臧地道記南山谷水所出張掖武威休屠揟次鸞鳥樸􅯑媼圍宣威倉松地道記曰南山松陜水所出鸇陰故屬安定租厲故屬安定顯美故屬張掖左騎千人官張掖郡故匈奴昆邪王地武帝置雒陽西四千二百里獻帝分置西郡八城户六千五百五十二口二萬六千四十觻得昭武刪丹弱水出氐池屋蘭日勒驪靬番和酒泉郡武帝置雒陽西四千七百里九城户萬二千七百六福祿表氏樂涫玉門㑹水沙頭安彌故曰緩彌乾齊延夀博物記曰縣南有山石出泉水大如筥􅞠注池為溝其水有肥如煮肉洎羕羕永永如不凝膏然之極明不可食縣人謂之石漆敦煌郡武帝置雒陽西五千里耆舊記曰國當乾位地列艮墟水有縣泉之神山有鳴沙之異川無蛇虺澤無兕虎華戎所支一都㑹也六城户七百四十八口二萬九千一百七十敦煌古𤓰州出美𤓰冥安效穀拼泉廣至龍勒有玉門關張掖屬國武帝置屬國都尉以主蠻夷降者安帝時别領五城户四千六百五十六口萬六千九百五十二候官左騎千人司馬官千人官張掖居延屬國故郡都尉安帝别領一郡户一千五百六十口四千七百三十三居延有居延澤古流沙獻帝建安末立為西海郡右涼州刺史部郡國十二縣道候官九十八袁山松書曰興平元年分安定鶉觚右扶風之漆置新平郡上黨郡秦置雒陽北千五百里十三城户二萬六千二百二十二口十二萬七千四百三長子山海經曰有發鳩之山章水出焉上黨記曰關城都尉所治令狐徴君隠城東山中去郡六十里即壺關三老令狐茂上書訟戾太子者也茂即𦵏其山屯留絳水出上黨記曰有鹿谷山濁漳所出有余吾城在縣西北三十里銅鞮上黨記曰晉别宫墟關猶有北城去晉宫二十里羊舌所邑左傳成九年晉執鄭伯於此沾山海經曰有少山其上有金玉其下有銅郭璞云在沾涅有閼與聚史記曰趙奢破秦兵閼與山海經曰謁戾之山有金玉沁水出焉南流注于河郭璞曰在涅襄垣上黨記曰邑帶山林茂松生焉壺關有黎亭故黎國文王戡黎即此也上黨記曰東山在城東南晉申生所伐今名平澤泫氏有長平亭史記曰白起破趙長平上黨記曰白城在郡南山中百二十里髙都前志曰有天井關戰國策曰桀居天井即天門也博物記曰縣南地名即垂潞本國左傳哀四年齊伐晉壺口杜預曰潞縣東有壺口關上黨記曰潞濁漳也縣城臨潞晉荀林父伐曲梁在城西十里今名石梁又東北八十里有黎城臨壺口關至建安十一年從洶河口鑿入潞河名泉州梁以通于海猗氏漢書音義縣出鶡陽阿侯國穀逺上黨記曰有羊頭山泌水所出太原郡秦置十六城户三萬九百二口二十萬一百二十四晉陽本唐國毛詩譜曰堯始都於此後遷河東平陽有龍山晉水所出山海經曰有懸甕之山其上多玉其下多銅其獸多閭麋晉水出焉東南注汾郭璞曰在縣左傳曰遷實沈于大夏賈逵曰陶唐之𦙍劉累也杜預曰今晉陽縣刺史治漢官曰南有梗陽城中行獻子見巫臯介休有介山有緜上聚左傳曰晉文公以緜上為介之推田介山推焚死之山故太原俗有寒食有千畝聚左傳曰晉為千畝之戰在縣南榆次左傳謂塗水有鑿壺史記曰韓魏殺智伯埋于鑿壺之下中都左傳昭二年執陳無宇于中都杜預曰界休縣南中都城是也于離兹氏狼孟鄔史記韓信破夏説于鄔徐廣曰音於庶反盂晉大夫孟丙邑平陶京陵春秋時九京禮記曰趙武從先大夫于九京鄭𤣥曰晉卿大夫之墓地京字之誤當為九原陽曲大陵有鐵史記曰趙肅侯㳺大陸出于鹿門即大陵祁慮虒陽邑有箕城左傳僖三十三年晉敗狄于箕上郡秦置十城户五千一百六十九口二萬八千五百九十九膚施白土漆垣奢延雕陰楨林定陽髙奴龜兹屬國候官西河郡武帝置雒陽北千二百里十三城户五千六百九十八口二萬八百三十八離石平定美稷樂街中陽臯狼平周平陸益蘭圜陰藺圜陽廣衍五原郡秦置為九原武帝更名十城户四千六百六十七口二萬二千九百五十七九原五原臨沃父國河除武都宜梁曼柏成宜西安陽北有陰山徐廣曰陰山在河南陽山在河北史記曰蒙恬築長城臨洮延袤萬里餘度河據陽山雲中郡秦置十一城户五千三百五十一口二萬六千四百三十雲中咸陽箕陵沙陵沙南案烏桓有蘭池城鳥桓之圍耿曅處北輿武泉原陽定襄故屬定襄成樂故屬定襄武進故屬定襄定襄郡髙帝置五城户三千一百五十三口萬三千五百七十一善無故屬鴈門桐過武成駱中陵故屬鴈門鴈門郡秦置雒陽北千五百里十四城户三萬一千八百六十二口二十四萬九千陰館史記曰漢蘇意軍句注應劭曰山險名也在縣爾雅八陵西隃鴈門是也郭璞曰即鴈門山山海經曰鴈門山者鴈飛出於其間繁畤樓煩武州前書武帝誘匈奴入武州塞汪陶劇陽崞平城前書髙帝被圍白登服䖍曰去縣七里埒馬邑干寳搜神記曰昔秦人築城于武州塞内以備胡城成而崩者數矣有馬馳走一地周旋反覆父老異之因依以築城城乃不崩遂名之為馬邑鹵城故屬代郡山海經曰泰戲之山無草木多金玉呼沱之水出焉郭璞曰今呼沱河縣武夫山周禮并州其川呼沱魏志曰建安十年鑿渠自呼沱入汾名平虜渠廣武故屬太原有夏屋山史記曰趙襄子北登夏屋山以銅斗殺代王郭璞曰爾雅山中有獸形如莵相負共行土俗名之蹷原平故屬太原古史考曰趙衰居原今原平縣彊陰朔方郡武帝置六城户千九百八十七口七千八百四十三臨戎三封朔方沃野廣牧大城故屬西河右并州刺史部郡九縣邑侯國九十八古今注曰建武十一年十月西河上郡屬魏魏志曰建安二十年省雲中定襄五原朔方置一縣領其民合以為新興郡涿郡髙帝置雒陽東北千八百里七城户十萬二千二百一十八口六十三萬三千七百五十四涿逎侯國史記漢武帝至鳴澤服䖍曰在縣北界故安易水出雹水出案本紀永元十五年復置縣鐵官范陽侯國良鄉北新城有汾水門史記曰趙與燕分門方城故屬廣陽有臨鄉故縣後省惠文王與燕臨樂有督亭劉向别錄曰督亢膏腴之地史記荆軻奉督亢圖入秦廣陽郡髙帝置為燕國昭帝更名為郡世祖省并上谷永平八年復五城户四萬四千五百五十口二十八萬六百薊本燕國刺史治漢官曰雒陽東北二千里廣陽昌平故屬上谷軍都故屬上谷安次故屬勃海代郡秦置雒陽東北二千五百里古今注曰建武二十七年七月屬幽州十一城户二萬一百二十三口十二萬六千一百八十八髙栁桑乾道人當城馬城班氏狋氏北平邑永元八年復東安陽平舒代干寳搜神記曰代城始築立板幹一旦亡西南板四五十里于澤中自立結葦為外門因就營築焉故其城周圓三十五丈為九門故城處呼之以為東城上谷郡秦置雒陽東北三千二百里八城户萬三百五十二口五萬一千二百四沮陽潘永元十一年復甯廣甯居庸雊瞀涿鹿帝王世紀曰黄帝所都有蚩尤地阪泉地黄帝祠世本云在鼓城南張晏曰在上谷于瓉案禮五帝位云黄帝與赤帝戰于阪泉之野不在涿鹿是伐蚩尤之地下落漁陽郡秦置雒陽東北二千里九城户六萬八千四百五十六口四十三萬五千七百四十漁陽有鐵狐奴潞雍奴泉州有鐵平谷安樂傂奚獷平右北平郡秦置雒陽東北二千三百里四城户九千一百七十口五萬三千四百七十五土垠徐無俊靡無終遼西郡秦置雒陽東北三千三百里五城户萬四千一百五十口八萬一千七百一十四陽樂海陽令支有孤竹城伯夷叔齊本國肥如臨渝山海經曰碣石之山編水出焉其上有玉其下有青碧水經曰在縣南郭璞曰或曰在右北平驪城縣海邊山也遼東郡秦置雒陽東北三千六百里案本紀和帝永元十六年郡復置西部都尉官十一城户六萬四千一百五十八口八萬一千七百一十四襄平新昌無慮望平候城安市平郭有鐵西安平魏氏春秋曰縣北有小水南流入海句驪别種因名之小水貊汶番汗沓氏𤣥莵郡武帝置雒陽東北四千里六城户一千五百九十四口四萬三千一百六十三髙句驪遼山遼水出山海經曰遼水出白平東郭璞曰出塞外御白平山遼山小遼水所出西蓋鳥上殷台髙顯故屬遼東候城故屬遼東遼陽故屬遼東東觀書安帝即位之年分三縣來屬樂浪郡武帝置雒陽東北五千里十八城户六萬一千四百九十二口二十五萬七千五十朝鮮􅠗邯􅀈水貪資占蟬遂城増地帶方駟望海冥列口郭璞注山海經曰列水名列水在遼東長岑屯有昭明鏤方提奚渾彌樂都遼東屬國故邯鄉西部都尉安帝時以為屬國都尉别領六城雒陽東北三千二百六十里昌遼故天遼屬遼西何法盛晉書有青城山賔徒故屬遼西徒河故屬遼西無慮有醫無慮山險瀆史記曰王險衞滿所都房右幽州刺史部郡國十一縣邑侯國九十南海郡武帝置雒陽南七千一百里七城户七萬一千四百七十七口二十五萬二百八十二番禺山海經注桂林八樹在賁禺東郭璞云今番禺博羅有羅浮山自㑹稽浮往博羅山故置博羅縣中宿龍川四㑹揭陽増城有勞領山蒼梧郡武帝置雒陽南六千四百一十里十一城户十一萬一千三百九十五口四十六萬六千九百七十五廣信漢官曰刺史治去雒陽九千里謝沐髙要封陽臨賀端谿馮乗富川荔浦猛陵地道記曰龍山合水所出鄣平永平十四年置鬱林郡秦桂林郡武帝更名雒陽