body:
  text: 後漢書卷六十五宋宣城太守范煜撰唐章懐太子賢注張曹鄭列傳第二十五張純傳子奮張純字伯仁京兆杜陵人也髙祖父安世宣帝時為大司馬衛將軍封富平侯臣賢案張安世昭帝元鳯六年以右將軍宿衛忠謹封富平侯今此言宣帝封誤也宣帝即位但益封萬户耳父放為成帝侍中純少襲爵土哀平間為侍中王莽時至列卿遭值篡偽多亡爵土純以敦謹守約保全前封建武初先來詣闕故得復國五年拜太中大夫使將潁川突騎安集荆徐揚部督委輸督促也委輸轉運也監諸將營後又將兵屯田南陽遷五官中郎將有司奏列侯非宗室不宜復國光武曰張純宿衛十有餘年其勿廢更封武始侯食富平之半武始縣屬魏郡富平縣屬平原郡也純在朝歴世明習故事建武初舊章多闕每有疑議輙以訪純自郊廟婚冠喪紀禮儀多所正定帝甚重之以純兼虎賁中郎將數被引見一日或至數四過三以至於四也純以宗廟未定昭穆失序十九年乃與太僕朱浮共奏言陛下興於匹庶蕩滌天下誅鉏暴亂興繼祖宗竊以經義所紀人事衆心雖實同創革而名為中興宜奉先帝恭承祭祀者也元帝以來宗廟奉祠髙皇帝為受命祖孝文皇帝為太宗孝武皇帝為世宗皆如舊制又立親廟四世推南頓君以上盡於舂陵節侯南頓令欽即光武之父舂陵侯買光武高祖也禮為人後者則為之子既事太宗則降其私親太宗謂元帝也據代相承高祖至元帝八代光武即高祖九代孫以代數相推故繼體元帝故曰既事太宗下又云宣元皇帝尊為祖父又曰自元帝以上祭于洛陽成帝以下祭于長安其義明矣降其私親謂舂陵以下不别序昭穆今禘祫髙廟陳序昭穆而舂陵四世君臣並列以卑厠尊不合禮意設不遭王莽而國嗣無寄推求宗室以陛下繼統者安得復顧私親違禮制乎昔髙帝以自受命不由太上宣帝以孫後祖不敢私親故為父立廟獨羣臣侍祠臣愚謂宜除今親廟以則二帝舊典願下有司博采其議詔下公卿大司徒戴渉大司空竇融議宜以宣元成哀平五帝四世代今親廟宣元皇帝尊為祖父可親奉祠成帝以下有司行事别為南頓君立皇考廟其祭上至舂陵節侯羣臣奉祠以明尊尊之敬親親之恩帝從之是時宗廟未備自元帝以上祭于洛陽高廟成帝以下祠於長安髙廟其南頓四世隨所在而祭焉明年純代朱浮為太僕二十三年代杜林為大司空在位慕曹參之迹務於無為曹參恵帝時代蕭何為相國遵蕭何法無所變更選辟掾史皆知名大儒明年上穿陽渠引洛水為漕上音時丈反陽渠在洛陽城南百姓得其利二十六年詔純曰禘祫之祭不行已久矣三年不為禮禮必壊三年不為樂樂必崩論語載宰我之言也宜據經典詳為其制純奏曰禮三年一祫五年一禘春秋傳曰大祫者何合祭也毁廟及未毁廟之主皆登合食乎太祖五年而再殷周禮三年一祫五年一祫又公羊傳曰大祫者何合祭也合祭奈何毁廟主陳于太祖未毁主皆升合食于太祖五年而再殷祭注云殷盛也謂三年祫五年禘也漢舊制三年一祫毁廟主合食髙廟存廟主未嘗合祭元始五年諸王公列侯廟㑹始為禘祭臣賢案平帝元始五年春祫祭明堂諸侯王列侯宗室助祭賜爵金帛今純及司馬彪書並云禘祭盖禘祫俱是大祭名可通也又前十八年親幸長安亦行此禮續漢書曰十八年上幸長安詔太常行禘禮於髙廟序昭穆父為昭南向子為穆北向禮説三年一閏天氣小備五年再閏天氣大備故三年一祫五年一禘禘之為言諦諦定昭穆尊卑之義也禘祭以夏四月夏者陽氣在上隂氣在下四月乾卦用事故言陽氣在上也故正尊卑之義也祫祭以冬十月冬者五榖成熟物備禮成故合聚飲食也斯典之廢於兹八年自十八年至此謂可如禮施行以時定議帝從之自是禘祫遂定時南單于及烏桓來降邊境無事百姓新去兵革嵗仍有年家給人足仍頻也純以聖王之建辟雍所以崇尊禮義既富而敎者也論語曰子適衛冉有僕子曰庶矣哉冉有曰既庶矣又何加焉曰富之既富矣又何加焉曰教之也乃案七經讖明堂圖讖騐也觧見光武紀七經謂詩書禮樂易春秋及論語也河間古辟雍記孝武太山明堂制度武帝時河間獻王徳獻雅樂對三雍宫有其書記也又武帝封太山濟南人公玉帶上黄帝時明堂圖明堂中有一殿四面無壁以茅盖水環宫垣為複道上有樓及平帝時議平帝時起明堂徵天下通一蓺以上皆議於公車也欲具奏之未及上㑹博士桓榮上言宜立辟雍明堂章下三公太常而純議同榮帝乃許之三十年純奏上宜封禪曰自古受命而帝治世之隆必有封禪以告成功焉禮記曰因名山升中于天鄭𤣥注曰謂廵狩至於方嶽燔柴祭天告以諸侯之成功也樂動聲儀曰以雅治人風成於頌動聲儀樂緯篇名也有周之盛成康之間郊配封禪皆可見也書曰嵗二月東廵狩至于岱宗柴則封禪之義也臣伏見陛下受中興之命平海内之亂脩復祖宗撫存萬姓天下曠然咸䝉更生恩徳雲行恵澤雨施易曰雲行雨施品物流形黎元安寧夷狄慕義詩云受天之祜四方來賀下武之詩也鄭𤣥注云言武王受此萬年之壽輔佐之臣亦宜䝉餘福也今攝提之嵗蒼龍甲寅徳在東宫爾雅曰太嵗在寅曰攝提格建武三十年太嵗在甲寅時嵗徳在東宫前書音義曰蒼龍太嵗也宜及嘉時遵唐帝之典繼孝武之業以二月東廵狩封于岱宗明中興勒功勲復祖統報天神禪梁父祀地祗傳祚子孫萬世之基也中元元年帝乃東廵岱宗以純視御史大夫從視比也幷上元封舊儀及刻石文武帝元封元年封禪儀令侍中皮弁搢紳射牛行事封廣丈二髙九尺有玉牒書書祕其事皆禁禪肅然天子親拜衣上黃江淮間一茅三脊為神藉五色土雜封縱逺方奇獸飛禽之屬也三月薨諡曰節侯子奮嗣奮字穉通父純臨終勑家丞曰司空無功於時猥䝉爵土身死之後勿議傳國東觀記曰家丞名歙奮兄根少被病光武詔奮嗣爵奮稱純遺勑固不肯受帝以奮違詔勑收下獄奮惶怖乃襲封永平四年隨例歸國奮少好學節儉行義常分損租奉奉音扶用反贍䘏宗親雖至傾匱而施與不怠十年儋耳降附儋耳郡武帝置故城即今儋州義倫縣也奮來朝上壽引見宣平殿應對合㫖顯宗異其才以為侍祠侯名臣子孫侍祠封侯解見鄧禹傳建初元年拜左中郎將轉五官中郎將遷長水校尉七年為將作大匠章和元年免永元元年復拜城門校尉四年遷長樂衛尉明年代桓郁為太常六年代劉方為司空時嵗灾旱祈雨不應乃上表曰比年不登人用飢匱今復久旱秋稼未立立成也陽氣垂盡嵗月廹促夫國以民為本民以榖為命政之急務憂之重者也臣蒙恩尤深受職過任夙夜憂懼章奏不能叙心願對中常侍疏奏疏猶條録也即時引見復口陳時政之宜眀日和帝召太尉司徒幸洛陽獄録囚徒收洛陽令陳歆即大雨三日奮在位清白無它異績九年以病罷在家上疏曰聖人所美政道至要本在禮樂五經同歸而禮樂之用尤急孔子曰安上治民莫善於禮移風易俗莫善於樂又曰揖讓而化天下者禮樂之謂也禮記樂記孔子之辭也先王之道禮樂可謂盛矣孔子謂子夏曰禮以脩外樂以制内丘已矣夫禮稽命徵之辭也宋均注云脩外飾容貌也脩内蕩滌心性也已矣夫恨不制作禮樂也又曰禮樂不興則刑罰不中刑罰不中則民無所厝其手足臣以為漢當制作禮樂是以先帝聖徳數下詔書愍傷崩缺而衆儒不逹議多駮異臣累世台輔奮七代祖湯武帝時為御史大夫六代祖子儒宣帝時為衛將軍領尚書父純光武時為司空而大典未定私竊惟憂不忘寢食臣犬馬齒盡誠冀先死見禮樂之定先死謂未死之前也十三年更召拜太常復上疏曰漢當改作禮樂圖書著明見曹褒傳王者化定制禮功成作樂禮記樂記之文功成化定同耳功謂王業化謂教人也謹條禮樂異議三事願下有司以時考定昔者孝武皇帝光武皇帝封禪告成而禮樂不定事不相副先帝已詔曹褒章帝初曹褒于東觀次序禮事依准舊典凡百五十篇奏之也今陛下但奉而承之猶周公斟酌文武之道非自為制誠無所疑周公制禮皆斟酌文武之美徳為之等制不自述也今先帝已詔曹褒非陛下出意何所疑而不為也詩頌曰於乎不顯文王之徳之純假以溢我我其收之駿恵我文王又曰執競武王無競維烈也久執謙謙令大漢之業不以時成非所以章顯祖宗功徳建太平之基為後世法帝雖善之猶未施行其冬復以病罷明年卒於家子甫嗣官至津城門候津城門洛陽南靣西門也當洛水浮橋漢官儀曰候一人秩六百石也甫卒子吉嗣永初三年吉卒無子國除自昭帝封安世至吉傳國八世張安世字子孺昭帝時為右將軍始封富平侯卒子延夀嗣卒子勃嗣卒子臨嗣卒子放嗣卒子純嗣建武初改封武始侯卒子奮嗣卒子甫嗣卒子吉嗣無子國除此言八代者除安世始封也經歴簒亂二百年間簒亂謂王莽也張子孺昭帝元鳯六年封至永初三年合一百八十二年故曰間也未嘗譴黜封者莫與為比曹褒傳曹襃字叔通魯國薛人也父充持慶氏禮前書沛人慶普字孝公為東平太傅受禮於后倉號慶氏禮也建武中為博士從廵狩岱宗定封禪禮還受詔議立七郊三雍大射養老禮儀五帝及天地為七郊三雍以下觧見明帝紀顯宗即位充上言漢再受命仍有封禪之事而禮樂崩闕不可為後嗣法五帝不相沿樂三王不相襲禮禮記正文也言損益不同也大漢當自制禮以示百世帝問制禮樂云何充對曰河圖括地象曰有漢世禮樂文雅出尚書璇璣鈐曰有帝漢出徳洽作樂名予帝善之下詔曰今且改太樂官曰太予樂歌詩曲操以俟君子操猶曲也劉向别録曰君子因雅琴之適故從容以致思焉其道閉塞悲愁而作者名其曲曰操言遇灾害不失其操也拜充侍中作章句辯難於是遂有慶氏學襃少篤志有大度結髮傳充業博雅疎通尤好禮士常憾朝廷制度未備慕叔孫通漢禮儀晝夜硏精沈吟専思寢則懐抱筆札行則誦習文書當其念至忘所之適初舉孝廉再遷圉令圉縣屬陳留故城在今汴州雍丘縣南也以禮理人以徳化俗時它郡盗徒五人来入圉界吏捕得之陳留太守馬嚴聞而疾惡風縣殺之褒勑吏曰夫絶人命者天亦絶之臯陶不為盗制死刑管仲遇盗而升諸公禮雜記云孔子曰管仲遇盗取二人焉上以為公臣注云此人但居惡人之中使犯法耳今承㫖而殺之是逆天心順府意也其罰重矣如得全此人命而身坐之吾所願也遂不為殺嚴奏褒耎弱免官歸郡為功曹徵拜博士㑹肅宗欲制定禮樂元和二年下詔曰河圖稱赤九㑹昌十世以光十一以興九謂光武十謂明帝十一謂章帝也尚書璇璣鈐曰述堯理世平制禮樂放唐之文緯本文云使帝王受命用吾道述堯理代平制禮放唐之文化洽作樂名斯在宋均注云述脩也予末小子託于數終曷以纉興崇𢎞祖宗仁濟元元帝命騐曰順堯考徳題期立象宋均注曰堯廵省于河洛得龜龍之圖書舜受禪後習堯禮得之演以為考河命題五徳之期立將起之象凡三篇在中候也且三五歩驟優劣殊軌孝經鉤命決曰三皇歩五帝驟三王馳宋均注云歩謂徳隆道備日月為歩時事彌順日月亦驟勤思不已日月乃馳是優劣也況予頑陋無以克堪雖欲從之末由也已每見圖書中心恧焉褒知帝旨欲有興作乃上疏曰昔者聖人受命而王莫不制禮作樂以著功徳功成作樂化定制禮所以救世俗致禎祥為萬姓獲福於皇天者也今皇天降祉嘉瑞並臻制作之符甚於言語言明白也宜定文制著成漢禮丕顯祖宗盛徳之美章下太常太常巢堪以為一世大典非褒所定不可許帝知羣寮拘攣難與圖始拘攣猶拘束也前書鄒陽曰能越拘攣之語也朝廷禮憲宜時刋立明年復下詔曰朕以不徳膺祖宗𢎞烈乃者鸞鳯仍集麟龍並臻甘露宵降嘉榖滋生赤草之類紀于史官赤草即朱草也大戴禮曰朱草日生一葉至十五日十六日落一葉周而復始也朕夙夜祗畏上無以彰于先功下無以克稱靈物漢遭秦餘禮壊樂崩且因循故事未可觀省有知其説者各盡所能褒省詔乃歎息謂諸生曰昔奚斯頌魯韓詩曰新廟奕奕奚斯所作薛君傳云是詩公子奚斯所作也考甫詠殷正考甫孔子之先也作商頌十二篇夫人臣依義顯君竭忠彰主行之美也當仁不讓吾何辭哉遂復上疏具陳禮樂之本制改之意拜褒侍中從駕南廵既還以事下三公未及奏詔召𤣥武司馬班固𤣥武司馬主𤣥武門續漢志云宫掖門每門司馬一人秩比千石也問改定禮制之宜固曰京師諸儒多能説禮宜廣招集共議得失帝曰諺言作舍道傍三年不成㑹禮之家名為聚訟言相争不定也互生疑異筆不得下昔堯作大章一䕫足矣䕫堯樂官也吕氏春秋曰魯哀公問於孔子曰樂正䕫一足矣章和元年正月乃召褒詣嘉徳門令小黄門持班固所上叔孫通漢儀十二篇勑褒曰此制散畧多不合經散畧猶疎畧也今宜依禮條正使可施行於南宫東觀盡心集作褒既受命乃次序禮事依凖舊典雜以五經讖記之文撰次天子至於庻人冠婚吉凶終始制度以為百五十篇寫以二尺四寸簡其年十二月奏上帝以衆論難一故但納之不復令有司平奏㑹帝崩和帝即位褒乃為作章句帝遂以新禮二篇冠擢褒監羽林左騎漢官儀曰羽林左騎秩六百石領羽林屬光禄勲也劉攽曰注羽林左騎案百官志騎當作監永元四年遷射聲校尉後太尉張酺尚書張敏等奏褒擅制漢禮破亂聖術宜加刑誅帝雖寢其奏而漢禮遂不行褒在射聲營舍有停棺不𦵏者百餘所褒親自履行問其意故吏對曰此等多是建武以来絶無後者不得埋掩褒乃愴然為買空地悉𦵏其無主者設祭以祀之遷城門校尉將作大匠時有疾疫褒廵行病徒為致醫藥經理饘粥多蒙濟活七年出為河内太守時春夏大旱糧榖踊貴褒到乃省吏并職退去姦殘㴻雨數降其秋大熟百姓給足流冗皆還後坐上灾害不實免有頃徴再遷復為侍中褒博物識古為儒者宗十四年卒官作通義十二篇演經雜論百二十篇又傳禮記四十九篇敎授諸生千餘人慶氏學遂行於世論曰漢初天下創定朝制無文叔孫通頗採經禮參酌秦法雖適物觀時有救崩敝然先王之容典盖多闕矣容禮容也典法則也謂行禮威儀俯仰之容貌也文帝時魯徐生以容為禮官孫襄亦善為容容或作宏義亦通也是以賈誼仲舒王吉劉向之徒懐憤歎息所不能已也賈誼等以叔孫通禮制疎畧並上書對策請更改作皆不從所以歎息也班固曰今大漢久曠大義此賈誼仲舒王吉劉向之徒所為發憤而増歎也見前書資文宣之逺圖明懿美而終莫或用資用也言用文帝宣帝美畧逺謀而終不能用賈誼等言誼文帝時人王吉宣帝時人劉攽曰逺圖明懿美案文逺圖下多一明字故知自燕而觀有不盡矣禮記曰孔子之喪有自燕來觀者舍於子夏氏子夏曰聖人之𦵏人與人之𦵏聖人也子何觀焉有不盡矣言未備也孝章永言前王明發興作明發謂發夕至明也詩曰明發不寐専命禮臣撰定國憲洋洋乎盛徳之事焉洋洋美也而業絶天算議黜異端斯道竟復墜矣業絶天算謂章帝晏駕也議黜異端謂張酺等奏褒擅制禮遂不行也夫三王不相襲禮五帝不相沿樂所以咸莖異調中都殊絶咸咸池黄帝樂也莖六莖顓頊樂也見前書異調言古今不同也中都魯邑名也家語曰孔子為中都宰制為養生送死之節殊絶猶斷絶也言古樂不同舊禮亦絶也况物運遷囘情數萬化制則不能隨其流變品度未足定其滋章言時代遷移繁省不定也斯固世主所當損益者也且樂非䕫襄而新音代起律謝臯蘇而制令亟易䕫舜樂官襄魯樂官也臯陶虞士官蘇忿生周武王之司㓂也脩補舊文獨何猜焉言刑樂數改而脩禮則疑之禮云禮云曷其然哉歎其不能定也鄭𤣥傳鄭𤣥字康成北海髙密人也八世祖崇哀帝時尚書僕射𤣥少為鄉嗇夫前書曰鄉有嗇夫掌聽訟收賦稅也得休歸常詣學官不樂為吏父數怒之不能禁鄭𤣥别傳曰𤣥年十一二隨母還家正臘㑹同列十數人皆美服盛飾語言閑通𤣥獨漢然如不及母私督數之乃曰此非我志不在所願也遂造太學受業師事京兆第五元先始通京氏易公羊春秋三統歴九章算術三統歴劉歆所撰也九章算術周公作也凡有九篇方田一粟米二差分三少廣四均輸五方程六傍要七盈不足八鉤股九又從東郡張恭祖受周官禮記左氏春秋韓詩古文尚書以山東無足問者乃西入關因涿郡盧植事扶風馬融融門徒四百餘人升堂進者五十餘生融素驕貴𤣥在門下三年不得見乃使髙業弟子傳受於𤣥𤣥日夜尋誦未嘗怠倦㑹融集諸生考論圖緯聞𤣥善算乃召見於樓上𤣥因從質諸疑義問畢辭歸融喟然謂門人曰鄭生今去吾道東矣前書曰田何授易於丁寛學成寛東歸何謂門人曰易東矣𤣥自逰學十餘年乃歸鄉里家貧客耕東莱學徒相隨已數百千人及黨事起乃與同郡孫嵩等四十餘人俱被禁錮嵩字賔實見趙岐傳遂隱脩經業杜門不出時任城何休好公羊學遂著公羊墨守言公羊義理深逺不可駮難如墨翟之守城也左氏膏肓說文曰肓隔也心下為膏喻左氏之疾不可為也榖梁廢疾𤣥乃發墨守鍼膏肓起廢疾休見而歎曰康成入吾室操吾矛以伐我乎初中興之後范升陳元李育賈逵之徒争論古今學後馬融答北地太守劉瓌及𤣥答何休義據通深由是古學遂明靈帝末黨禁觧大將軍何進聞而辟之州郡以進權戚不敢違意遂廹脅𤣥不得已而詣之進為設几杖禮待甚優𤣥不受朝服而以幅巾見一宿逃去時年六十弟子河内趙商等自逺方至者數千後將軍袁隗表為侍中以父喪不行國相孔融深敬於𤣥屣履造門屣謂納履未正曵之而行言趨賢急也告髙密縣為𤣥特立一鄉曰昔齊置士鄉管仲相桓公制國為二十一鄉工商鄉六士鄉十五以居工商士也事見國語也越有君子軍皆異賢之意也吳越相攻越王勾踐乃中分其師為左右軍以其私卒君子六千人為中軍注云君子王所親近有至行者見國語鄭君好學實懐明徳昔太史公廷尉吳公謁者僕射鄧公皆漢之名臣又南山四皓有園公夏黄公潜光隱耀世加其髙皆悉稱公吳公文帝時為河南守鄧公景帝時為謁者僕射太史公司馬談武帝時四皓髙帝時也有園公夏黄公角里先生綺里季也鬚眉皓白故言皓秦時隐於商雒南山以待天下之定漢興迎而致之也然則公者仁徳之正號不必三事大夫也今鄭君鄉宜曰鄭公鄉昔東海于公僅有一節猶或戒鄉人侈其門閭一節謂決獄也昭帝時東海于公為縣獄吏決獄平郡為生立祠號曰于公祠先是于公閭門壊父老方共脩之于公曰少髙大其門令容駟馬車我決獄多隂徳子孫必有興者也矧乃鄭公之徳而無駟牡之路可廣開門衢令容髙車號為通徳門董卓遷都長安公卿舉𤣥為趙相道斷不至趙王䖍之相也㑹黄巾㓂青部乃避地徐州徐州牧陶謙接以師友之禮建安元年自徐州還髙密道遇黄巾賊數萬人見𤣥皆拜相約不敢入縣境𤣥後嘗疾篤自慮以書戒子益恩曰吾家舊貧不為父母昆弟所容去厮役之吏厮賤也㳺學周秦之都往来幽并兗豫之域獲覲乎在位通人處逸大儒得意者咸從捧手有所授焉處逸謂處士隐逸之大儒遂博稽六蓺粗覽傳記時覩秘書緯術之奥年過四十乃歸供養假田播殖以娯朝夕遇閹尹擅勢坐黨禁錮十有四年而䝉赦令舉賢良方正有道辟大將軍三司府公車再召比牒併名早為宰相比牒猶連牒也併名謂齊名也言連牒齊名被召者並為宰相也併音歩鼎反惟彼數公懿徳大雅克堪王臣故宜式序式用也序列也吾自忖度無任於此但念述先聖之元意思整百家之不齊亦庶㡬以竭吾才故聞命㒺從而黄巾為害萍浮南北復歸邦鄉入此嵗来已七十矣宿素衰落仍有失誤案之禮典便合傳家傳家謂家事傳子孫也曲禮曰七十老而傳今我告爾以老歸爾以事將閑居以安性覃思以終業自非拜國君之命問族親之憂展敬墳墓觀省野物胡嘗扶杖出門乎家事大小汝一承之咨爾煢煢一夫曾無同生相依其朂求君子之道研讃勿替劉攽曰案文讃當作鑚敬慎威儀以近有徳詩大雅民勞篇之言也顯譽成於僚友徳行立於已志若致聲稱亦有榮於所生可不深念邪可不深念邪吾雖無紱冕之緒頗有讓爵之髙謂頻被辟不就也自樂以論賛之功庶不遺後人之羞末所憤憤者徒以亡親墳壟未成所好羣書率皆腐敝不得於禮堂寫定傳與其人其人謂好學者也前書司馬遷曰僕誠已著此書傳之其人也日西方暮其可圖乎家今差多於昔勤力務時無恤飢寒菲飲食薄衣服節夫二者尚令吾寡恨若忽忘不識亦已焉哉時大將軍袁紹總兵冀州遣使要𤣥大㑹賓客𤣥最後至乃延升上坐身長八尺飲酒一斛秀眉明目容儀温偉紹客多豪俊並有才說見𤣥儒者未以通人許之競設異端百家互起𤣥依方辯對咸出問表皆得所未聞莫不嗟服時汝南應劭亦歸於紹因自賛曰故太山太守應中逺北靣稱弟子何如𤣥笑曰仲尼之門考以四科四科謂徳行言語政事文學顔淵閔子騫及子㳺子夏並見論語也囘賜之徒不稱官閥劭有慙色紹乃舉𤣥茂才表為左中郎將皆不就公車徴為大司農給安車一乘所過長吏送迎𤣥乃以病自乞還家五年春夢孔子告之曰起起今年嵗在辰来年嵗在已北齊劉畫髙才不遇傳論𤣥曰辰為龍已為蛇嵗至龍蛇賢人嗟𤣥以讖合之盖謂此也既寤以讖合之知命當終有頃寢疾時袁紹與曹操相拒於官渡官渡津名也在今鄭州中牟縣北前書音義曰於滎陽下引河東南為洪溝北通宋鄭淮泗即今官渡令其子譚遣使逼𤣥隨軍不得已載病到元城縣疾篤不進其年六月卒年七十四遺令薄𦵏自郡守以下嘗受業者縗絰赴㑹千餘人門生相與撰𤣥答諸弟子問五經依論語作鄭志八篇凡𤣥所注周易尚書毛詩儀禮禮記論語孝經尚書大傳中候乾象歴又著天文七政論魯禮禘祫義六蓺論毛詩譜駮許慎五經異義答臨孝存周禮難凡百餘萬言案謝承書載𤣥所注與此畧同不言注孝經唯此書獨有也𤣥質於辭訓通人頗譏其繁至於經傳洽孰稱為純儒齊魯間宗之其門人山陽郗慮至御史大夫東莱王基清河崔琰著名於世又樂安國淵任嘏慮字鴻豫基字伯興魏鎭南將軍安樂鄉侯琰字季珪魏東西曹掾遷中尉淵字子尼魏司空掾遷太僕嘏字昭光魏黄門侍郎也劉攽曰注魏東西曹掾案崔琰但作東曹掾多一西字時並童幼𤣥稱淵為國器嘏有道徳其餘亦多所鑒拔皆如其言𤣥唯有一子益恩孔融在北海舉為孝廉及融為黄巾所圍益恩赴難隕身有遺腹子𤣥以其手文似已名之曰小同魏氏春秋曰小同髙貴鄉公時為侍中嘗詣司馬文王文王有密疏未之屏也如厠還問之曰卿見吾疏乎答曰我不見文王曰寜我負卿無卿負我遂酖之論曰自秦焚六經聖文埃滅埃塵也漢興諸儒頗脩蓺文及東京學者亦各名家而守文之徒滯固所禀禀受滯固猶固執也言學者各守所見不疏通也異端紛紜互相詭激遂令經有數家家有數說章句多者或乃百餘萬言學徒勞而少功後生疑而莫正鄭𤣥括囊大典網羅衆家括結也易坤卦曰括嚢旡咎也刪裁繁蕪刋改漏失自是學者畧知所歸王父豫章君每考先儒經訓而長於𤣥王父祖父也爾雅曰父之父為王父也范曄祖父寗字武子晉武帝時為豫章太守經義每以𤣥為長也常以為仲尼之門不能過也及傳授生徒並専以鄭氏家法云言寗敎授専崇鄭學也賛曰富平之緒承家載世載重也易師卦曰大君有命開國承家也伯仁先歸釐我國祭釐理也言純釐理禘祫之祭也𤣥定義乖褒脩禮缺孔書遂明漢章中輟孔書謂六經也輟止也中輟謂曹褒禮不行也後漢書卷六十五後漢書卷六十五考證張純傳五年拜太中大夫監本誤作二年從宋本改今攝提之嵗蒼龍甲寅徳在東宫注前書音義曰蒼龍太嵗也刋誤補遺曰龍名有三左傳龍見而雩此謂東方七宿為蒼龍之象又曰蛇乘龍此謂嵗星木精木為蒼龍故嵗星亦龍名又淮南書以青龍為天神之貴青龍即太嵗異名王莽銅權銘嵗在大梁龍集戊辰者以嵗為嵗星龍為太嵗也魏文昌殿鐘簴銘嵗在丙申龍次大火則是以嵗為太嵗龍為嵗星與前説相反然義得兩通至純傳所云按是年太嵗在寅故言攝提之嵗然又云蒼龍甲寅則是龍與嵗疊指太嵗而言駁矣德在東宫刋誤補遺曰此以嵗在寅與甲相值甲位在東方故也王莽傳亦云蒼龍癸酉徳在中宫經云癸徳在中宫按杜欽言戊土中宫之部今癸北宫而云中宫者以癸為戊妃耳此與純傳小異莽傳又云今年刑在東方是嵗壬申申刑寅故也張純子奮官至津城門候舊本皆作建城門臣㑹汾按百官志洛陽十二門其一津門每門候一人秩六百石屬城門校尉以其當洛水浮橋故稱津城門也宜從監本曹襃傳大漢當自制禮監本脱去當字從宋本增慕叔孫通漢禮儀監本叔孫通下有為字從宋本去且三五歩驟優劣殊軌注時事彌順順字疑煩之誤又事字舊本作士鄭元傳三統歴九章算術注九章算術周公作也臣宗萬按魏劉徽九章算經序云周公制禮有九數九章是矣不云周公作算術也算術起於商髙見周髀宜曰鄭公鄉宜字監本誤作且今照宋本改六蓺論臣世駿按公羊疏曰鄭公先作六蓺論訖然後注書答臨孝存周禮難臣世駿按毛詩棫樸疏曰臨碩并引詩三處六師之文以難周禮鄭釋之則孝存名碩也名之曰小同注答曰我不見我字衍後漢書卷六十五考證
