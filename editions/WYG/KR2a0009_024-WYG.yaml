body:
  text: 後漢書卷二十四梁剡令劉昭補并注五行志第十四五行二災火孽羽蟲草妖羊禍五行傳曰棄法律鄭𤣥注尚書大𫝊曰東井主法令也逐功臣鄭𤣥曰功臣制法律者也或曰喙主尚食七星主衣裳張為食厨翼主天倡經曰帝曰臣作朕股肱耳目予欲左右有民汝翼予欲觀古人之象日月星辰山龍華蟲作繢宗彛藻火粉米黼黻絺繡以五采章施于五色作服汝明予欲聞六律五聲八音在治忽以出納五言汝聽是則食與服樂臣之所用為大功也七星北有洒旗南有天厨翼南有噐府殺太子鄭𤣥曰五行火生土天文以參繼東井四時以秋代夏殺太子之象也春秋傳曰夫千乘之主將廢正而立不正必殺正也以妾為妻鄭𤣥曰軒轅為后妃屬南宮其大星女主之位女御在前妾為妻之象也則火不炎上鄭𤣥曰君行此四者為逆天南宮之政南宮於地為火火性炎上然行人所用烹餁者也無故因見作熱燔熾為害是為火不炎上其他變異皆屬沴春秋考異郵曰火者陽之精也人合天氣五行隂陽極隂反陽極陽生隂故應人行以災不祥在所以感之萌應轉旋從逆殊心也謂火失其性而為災也又曰視之不明是謂不悊鄭𤣥曰視瞭也君視不明則是不能瞭其事也洪範曰視曰明厥咎舒䜟曰君舒怠臣下有倦白黒不别賢不肖並不能憂民急氣為之舒緩草不揺鄭𤣥曰君臣不瞭則舒緩矣厥罰常燠鄭𤣥曰視曰火火主夏夏氣長長氣失故常燠厥極疾鄭𤣥曰長氣失故於人為疾時則有草妖鄭𤣥曰草視之物可見者莫衆於草時則有蠃蟲之孽鄭𤣥曰蠶螟蟲之類蟲之生於火而藏於秋者也時則有羊禍鄭𤣥曰羊畜之遠視者也屬視時則有赤𤯝赤祥惟水沴火蠃蟲劉歆傳以為羽蟲建武中漁陽太守彭寵被徴書至明日潞縣火災起城中飛出城外燔千餘家殺人京房易傳曰上不儉下不節盛火數起燔宮室儒説火以明為德而主禮時寵與幽州牧朱浮有隙疑浮見浸譖故意狐疑其妻勸無應徴遂反叛攻浮卒誅滅古今注曰建武六年十二月雒陽市火二十四年正月戊子雷雨霹靂火災高廟北門明帝永平元年六月已亥桂陽見火飛來燒城寺章帝建初元年十二月北宮火燒夀安殿延及右掖門元和三年六月丙午雷雨火燒北宮朱爵西闕和帝永元八年十二月丁已南宮宣室殿火是時和帝幸北宮竇太后在南宮明年竇太后崩十三年八月已亥北宮盛饌門閤火是時和帝幸鄧貴人隂后寵衰怨恨上有欲廢之意明年㑹得隂后挾偽道事遂廢遷于桐宮以憂死立鄧貴人為皇后十五年六月辛酉漢中城固南城門災此孝和皇帝將絶世之象也其後二年宮車晏駕殤帝及平原王皆早夭折和帝世絶安帝古今注曰永初元年十二月河南郡縣火燒殺百五人二年河南郡縣又失火燒五百八十四人永初二年四月甲寅漢陽河陽城中失火燒殺三千五百七十人先是和帝崩有皇子二人皇子勝長鄧皇后貪殤帝少欲自養長立之延平元年殤帝崩勝有厥疾不篤羣臣咸欲立之太后以前既不立勝遂更立清河王子是為安帝司空周章等心不厭服謀欲誅鄧氏廢太后安帝而更立勝元年十一月事覺章等被誅其後涼州叛羌為害太甚涼州諸郡寄治馮翊扶風界及太后崩鄧氏被誅四年三月戊子杜陵園火元初四年二月壬戌武庫火東觀書曰燒兵物百二十五種直千萬以上是時羌叛大為寇害發天下兵以攻禦之積十餘年未巳天下厭苦兵役延光元年八月戊子陽陵園寢殿火凡災發于先陵此太子將廢之象也若曰不當廢太子以自翦則火不當害先陵之寢也明年上以䜛言廢皇太子為濟隂王後二年宮車晏駕中黄門孫程等十九人起兵殿省誅賊臣立濟隂王四年秋七月乙丑漁陽城門樓災順帝永建三年七月丁酉茂陵園寢災古今注曰三年五月戊辰守宮失火燒宮藏財物盡四年河南郡縣失火燒人六畜陽嘉元年恭陵廡災及東西莫府火古今注曰十二月河南郡國火燒廬舍殺人也太尉李固以為奢僭所致陵之初造禍及枯骨規廣治之尤飾又上欲更造宮室益臺觀故火起莫府燒材木永和元年十月丁未承福殿火臣昭案楊厚傳是災先是爵號阿母宋娥為山陽君后父梁商本國侯又多益商封商長子冀當繼商爵以商生在復更封冀為襄邑侯追號后母為開封君皆過差非禮古今注曰六年十二月雒陽酒市失火燒肆殺人漢安元年三月甲午雒陽劉漢等百九十七家為火所燒東觀書曰其九十家不自存詔賜錢廪榖古今注曰火或從室屋間物中不知所從起數月乃止十二月雒陽失火後四年宮車比三晏駕建和元年君位乃定桓帝建和二年五月癸丑北宮掖庭中德陽殿火及左掖門先是梁太后兄冀挾姦枉以故太尉李固杜喬正直恐害其事令人誣奏固喬而誅滅之是後梁太后崩而梁氏誅滅延熹四年正月辛酉南宮嘉德殿火戊子丙署火二月壬辰武庫火五月丁卯原陵長夀門火先是亳后因賤人得幸號貴人為后上以后母宣為長安君封其兄弟愛寵隆崇又多封無功者去年春白馬令李雲坐直諫死至此彗除心尾火連作五年正月壬午南宮丙署火四月乙丑恭北陵東闕火戊辰虎賁掖門火五月康陵園寢火甲申中藏府承禄署火七月已未南宮承善闥内火六年四月辛亥康陵東署火七月甲申平陵園寢火八年二月己酉南宮嘉德署黄龍千秋萬嵗殿皆火四月甲寅安陵園寢火閏月南宮長秋和歡殿後鉤盾掖庭朔平署各火十月壬子德陽前殿西閤及黄門北寺火殺人袁山松書曰是時連月有火灾諸宮寺或一日再三發又夜有訛言擊鼓相驚陳蕃劉智茂上疏諫曰古之火皆君弱臣强極隂之變也前始春而獄刑慘故火不炎上前入春節連寒木冰暴風折樹又八九州郡並言隕霜殺菽春秋晉執季孫行父木為之冰夫氣𢎞則景星見化錯則五星開日月蝕灾為已然異為方來恐卒有變必於三朝唯善政可以已之願察臣前言不棄愚忠則元元幸甚書奏不省九年三月癸巳京都夜有火光轉行民相驚譟袁山松書曰是時宦豎専朝鉤黨事起上尋無嗣陳蕃竇武為曹節等所害天下無復紀綱靈帝熹平四年五月延陵園灾光和四年閏月辛酉北宮東掖庭永巷署灾陳蕃諌曰楚女悲而西宮灾不御宮女怨之所致也五年五月庚申德陽前殿西北入門内永樂太后宮署火中平二年二月己酉南宮雲臺灾庚戌樂城門灾南宮中門延及北闕道西燒嘉德和歡殿案雲臺之灾自上起榱題數百同時並然若就縣華鐙其日燒盡延及白虎威興門尚書符節蘭臺夫雲臺者乃周家之所造也圖書術籍珍玩寶怪皆所藏在也京房易傳曰君不思道厥妖火燒宮是時黄巾作慝變亂天常七州二十八郡同時俱發命將出衆雖頗有所禽然宛廣宗曲陽尚未破壊役起負海杼柚空懸百姓死傷己過半矣而靈帝曾不克已復禮虐侈滋甚尺一雨布騶騎電激官非其人政以賄成内嬖鴻都並受封爵京都為之語曰今兹諸侯嵗也天戒若曰放賢賞淫何以舊典為故焚其臺門祕府也其後三年靈帝暴崩續以董卓之亂火三日不絶京都為丘墟矣魏志曰魏明帝青龍二年崇華殿災詔問太史令高堂隆此何咎於禮寜有祈禳之義乎對曰夫災變之發皆所以明教誡也唯率禮修德可以勝之易傳曰上不儉下不節孽火燒其室又曰君高其臺天火為災此人君苟飾宮室不知百姓空竭故天應之以旱火從高殿起也上天降監故譴告陛下陛下宜增崇人道以答天意昔太戊有桑榖生於朝武丁有雊雉登於鼎皆聞災恐懼側身修徳三年之後遠夷朝貢故號曰中宗高宗此則前代之明鑒也今案舊占災火之發皆以臺榭宮室為誡然今宮室之所以充廣者實由宮人猥多之故宜簡擇留其淑懿如周之制罷省其餘此則祖已之所以訓高宗高宗之所以享遠號也詔問隆吾聞漢武帝時栢梁災而起宮殿以厭之其義云何對曰臣聞西京栢梁既災越巫陳方建章是營以厭火祥乃夷越之巫所為非聖賢之明訓也五行志曰栢梁災其後有江充巫蠱衞太子事如志之言越巫建章無所厭也孔子曰災者修類應行精祲相感以戒人君是以聖主覩災責躬退以修德以消復之今宜罷散民役宮室之制務從約節内足以待風雨外足以講禮儀清掃所災之處不敢於此有所立作萐莆嘉禾必生此地以報陛下䖍恭之德疲民之力竭民之財實非所以致符瑞而懐遠人也臣昭曰高堂隆之言災其得天心乎雖與本志所明不同靈帝之時有焉故載其言廣災異也獻帝初平元年八月霸橋災其後三年董卓見殺臣昭案劉焉傳興平元年天火燒其城府輜重延及民家館邑無餘也庶徴之恒燠漢書以冬温應之中興以來亦有冬温而記不錄云越絶范蠡曰春燠而不生者王者德不完也夏寒而不長者臣下不奉主令也秋暑而復榮者百官刑不斷也冬温而泄者發府庫賞無功也此四者邦之禁也管子曰臣乘君威則隂侵陽盛夏雪降冬不冰也安帝元初三年有𤓰異本共生一𤓰同蔕時以為嘉𤓰或以為𤓰者外延離本而實女子外屬之象也是時閻皇后初立後閻后與外親耿寶等共譖太子廢為濟隂王更外迎濟北王子犢立之草妖也古今注曰和帝永元七年三月江夏縣民舍柱生兩枝其一長尺五寸分為八枝其一長尺六寸分為五枝皆青也桓帝延熹九年雒陽城局竹栢葉有傷者占曰天子凶靈帝熹平三年右校别作中有兩樗樹皆高四尺許其一株宿夕暴長長丈餘大一圍作胡人狀頭目鬢鬚髪備具京房易傳曰王德衰下人將起則有木生人狀臣昭以木生人狀下人將起京房之占雖以證驗貌類胡人猶未辨了董卓之亂實擁胡兵傕汜之時充斥尤甚遂窺間宮嬪剽虐百姓鮮卑之徒踐藉畿封胡之害深亦已毒矣五年十月壬午御所居殿後槐樹皆六七圍自拔倒竪根在上臣昭曰槐是三公之象貴之也靈帝授位不以徳進貪愚是升清賢斯黜槐之倒植豈以斯乎中平元年夏東郡陳留濟陽長垣濟隂寃句離狐縣界風俗通曰西及城皇陽武城郭路邊有草生其莖靡纍腫大如手指狀似鳩雀龍蛇鳥獸之形五色各如其狀毛羽頭目足翅皆具風俗通曰亦作人狀操持兵弩萬萬備具非但彷彿類良熟然也近草妖也是嵗黄巾賊始起皇后兄何進異父兄朱苖皆為將軍領兵後苖封濟陽侯進苗遂秉威權持國柄漢遂微弱自此始焉應劭曰關東義兵先起於宋衛之郊東郡太守橋瑁負衆怙亂陵蔑同盟忿疾同類以殞厥命陳留濟隂迎助謂為離德棄好即戎吏民殲之草妖之興豈不或信中平中長安城西北六七里空樹中有人面生鬢魏志曰建安二十五年正月曹公在雒陽起建始殿伐濯龍樹而血出又掘徙梨根傷而血出曹公惡之遂寢疾是月薨獻帝興平元年九月桑復生椹可食臣昭曰桑重生椹誠是木異必在濟民安知非瑞乎時蒼生死敗周秦殲盡餓䰟餒鬼不可勝言食此重椹大拯危命雖連理附枝亦不能及若以為怪則建武野穀旅生麻菽尤盛復是草妖邪安帝延光三年二月戊子有五色大鳥集濟南臺十月又集新豐時以為鳳皇或以為鳳皇陽明之應故非明主則隠不見凡五色大鳥似鳳者多羽蟲之孽是時安帝信中常侍樊豐江京阿母王聖及外屬耿寶等䜛言免太尉楊震廢太子為濟隂王不悊之異也章帝末號鳯皇百四十九見時直臣何敞以為羽孽似鳳翺翔殿屋不察也臣昭曰已論之於敞傳記者以為其後章帝崩以為驗案宣帝明帝時五色鳥羣翔殿屋賈逵以為胡降徴也帝多善政雖有過不及至衰缺末年胡降二十萬口是其驗也帝之時羌胡外叛讒慝内興羽孽之時也樂叶圖徵説五鳳皆五色為瑞者一為孽者四叶圖徴曰似鳳有四並為妖一曰鷫鸘鳩喙圓目身義戴信嬰禮膺仁負智至則早役之感也二曰發明烏喙大頸大翼大脛身仁戴智嬰義膺信負禮至則喪之感也三曰焦明長喙疏翼圓尾身義戴信嬰仁膺知負禮至則水之感也四曰幽昌鋭目小頭大身細足脛若鱗葉身智戴信負禮膺仁至則旱之感也國語曰周之興也鸑鷟鳴岐説文曰五方神鳥東方曰發明南方曰焦明西方曰鷫鸘北方曰幽昌中央曰鳳皇桓帝元嘉元年十一月五色大鳥見濟隂已氏時以為鳳皇此時政治衰缺梁冀秉政阿枉上幸亳后皆羽孽時也臣昭案魏朗對䇿桓帝時雉入太常宗正府朗説見本傳注靈帝光和四年秋五色大鳥見于新城衆鳥隨之時以為鳳皇時靈帝不恤政事常侍黄門專權羽孽之時也衆鳥之性見非常班駮好聚觀之至於小爵希見梟者虣見猶聚中平三年八月中懐陵上有萬餘爵先極悲鳴已因亂鬬相殺皆斷頭懸著樹枝枳棘到六年靈帝崩大將軍何進以内寵外嬖積惡日乆欲悉糾黜以隆更始冗政而太后持疑事久不決進從中出於省内見殺因是有司盪滌䖍劉後祿而尊厚者無餘矣夫陵者高大之象也天戒若曰諸懐爵祿而尊厚者還自相害至滅亡也古今注曰建武九年六郡八縣䑕食稼張璠紀曰初平元年三月獻帝初入未央宮翟雉飛入未央宮獲之獻帝春秋曰建安七年五色大鳥集魏郡衆鳥數千隨之魏志曰二十三年秃鶖集鄴宮文昌殿後也桓帝建和三年秋七月北地亷雨肉似羊肋説文曰肋脅骨也或大如手近赤祥也是時梁太后攝政兄梁冀専權枉誅漢良臣故太尉李固杜喬天下寃之其後梁氏誅滅後漢書卷二十四
