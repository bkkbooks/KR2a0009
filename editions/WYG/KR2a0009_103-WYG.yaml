body:
  text: 後漢書卷一百三宋宣城太守范煜撰唐章懷太子賢注劉虞公孫瓚陶謙列傳第六十三劉虞傳劉虞字伯安東海郯人也謝承書曰虞父舒丹陽太守虞通五經東海王恭之後劉攽曰注案王恭當作恭王祖父嘉光禄勲虞初舉孝亷稍遷幽州刺史民夷感其徳化自鮮卑烏桓夫餘穢貊之輩皆隨時朝貢無敢擾邊者百姓歌悅之公事去官中平初黄巾作亂攻破冀州諸郡拜虞甘陵相綏撫荒餘以蔬儉率下遷宗正後車騎将軍張溫討賊邊章等發幽州烏桓三千突騎而牢稟逋懸皆畔還本國前書音義曰牢賈直也稟食也言軍糧不續也前中山相張純私謂前太山太守張舉曰今烏桓既畔皆願為亂涼州賊起朝廷不能禁又洛陽人妻生子兩頭此漢祚衰盡天下有兩主之徴也子若與吾共率烏桓之衆以起兵庶幾可定大業舉因然之四年純等遂與烏桓大人共連盟攻薊下燔燒城郭虜略百姓殺䕶烏桓校尉箕稠右北平太守劉政遼東太守陽終等衆至十餘萬屯肥如肥如縣屬遼西郡故城在今平州舉稱天子純稱彌天將軍安定王移書州郡云舉當代漢告天子避位勑公卿奉迎純又使烏桓峭王等峭音七笑反歩騎五萬入青冀二州攻破清河平原殺害吏民朝廷以虞威信素著恩積北方明年復拜幽州牧虞到薊罷省屯兵務廣恩信遣使告峭王等以朝恩寛𢎞開許善路又設賞購舉純舉純走出塞餘皆降散純為其客王政所殺送首詣虞靈帝遣使者就拜太尉封容丘侯容丘縣屬東海郡及董卓秉政遣使者授虞大司馬進封襄賁侯初平元年復徵代袁隗為太傅道路隔塞王命竟不得達舊幽部應接荒外資費甚廣歲常割青冀賦調二億有餘以給足之時處處斷絶委輸不至而虞務存寛政勸督農植開上谷胡市之利通漁陽鹽鐵之饒民悅年登穀石三十青徐士庶避黄巾之難歸虞者百餘萬口皆收視溫恤為安立生業流民皆忘其遷徙虞雖為上公天性節約敝衣繩履食無兼肉遠近豪俊夙僭奢者莫不改操而歸心焉夙猶舊也初詔令公孫瓚討烏桓受虞節度瓚但務會徒衆以自强大而縱任部曲頗侵擾百姓而虞為政仁愛念利民物由是與瓚漸不相平二年冀州刺史韓馥勃海太守袁紹及山東諸将議以朝廷幼冲逼於董卓時獻帝年十歲遠隔關塞不知存否以虞宗室長者欲立為主乃遣故樂浪太守張岐等齎議上虞尊號虞見岐等厲色叱之曰今天下崩亂主上蒙塵左傳曰周襄王出奔于鄭魯臧文仲曰天子蒙塵于外吾被重恩未能清雪國恥諸君各據州郡宜共勠力說文曰勠力幷力也左傳曰勠力同心音力凋反又音六盡心王室而反造逆謀以相垢誤邪固拒之馥等又請虞領尚書事承制封拜復不聽遂收斬使人於是選掾右北平田疇從事鮮于銀魏志曰田疇字子春右北平無終人好讀書善擊劒劉虞署為從事太祖北征烏桓令疇将衆上徐無出盧龍歴平剛登白狼堆去柳城二百餘里虜乃驚太祖與戰大斬獲論功封疇疇上疏自陳大祖令夏侯惇喻之疇曰豈可費盧龍塞以易賞禄哉蒙險間行奉使長安獻帝既思東歸見疇等大悅時虞子和為侍中因此遣和潛從武關出告虞将兵來迎道由南陽後将軍袁術聞其狀遂質和使報虞遣兵俱西虞乃使數千騎就和奉迎天子而術竟不遣之初公孫瓚知術詐固止虞遣兵虞不從瓚乃隂勸術執和使奪其兵自是與瓚仇怨益深和尋得逃術還北復為袁紹所留瓚既累為紹所敗而猶攻之不已虞患其黷武黷猶慢也數也尚書曰黷於祭祀也且慮得志不可復制固不許行而稍節其稟假瓚怒屢違節度又復侵犯百姓虞所賚賞典當胡夷當音丁浪反瓚數抄奪之積不能禁乃遣驛使奉章陳其暴掠之罪瓚亦上虞稟糧不周二奏交馳互相非毁朝廷依違而已瓚乃築京於薊城以備虞京高丘也言高築丘壘以備虞焉解見獻帝紀虞數請瓚輒稱病不應虞乃密謀討之以告東曹掾右北平魏攸攸曰今天下引領以公為歸謀臣爪牙不可無也瓚文武才力足恃雖有小惡固宜容忍虞乃止頃之攸卒而積忿不已四年冬遂自率諸屯兵衆合十萬人以攻瓚将行從事代郡程緒免胄而前曰公孫瓚雖有過惡而罪名未正明公不先告曉使得改行而兵起蕭牆非國之利加勝敗難保不如駐兵以武臨之瓚必悔禍謝罪所謂不戰而服人者也虞以緒臨事沮議遂斬之以徇戒軍士曰無傷餘人殺一伯珪而巳時州從事公孫紀者瓚以同姓厚待遇之紀知虞謀而夜告瓚瓚時部曲放散在外倉卒自懼不免乃掘東城欲走虞兵不習戰又愛人廬舎勑不聽焚燒急攻圍不下瓚乃簡募銳士數百人因風縱火直衝突之虞遂大敗與官屬北奔居庸縣居庸縣屬上谷郡有關瓚追攻之三日城陷遂執虞幷妻子還薊猶使領州文書會天子遣使者段訓增虞封邑督六州事拜瓚前將軍封易侯假節督幽幷青冀瓚乃誣虞前與袁紹等欲稱尊號脅訓斬虞於薊市先坐而呪曰若虞應為天子者天當風雨以相救時旱埶炎盛遂斬焉傳首京師故吏尾敦於路劫虞首歸葬之尾敦姓名瓚乃上訓為幽州刺史虞以恩厚得衆懷被北州百姓流舊莫不痛惜焉初虞以儉素為操冠敝不改乃就補其穿及遇害瓚兵搜其内而妻妾服羅紈盛綺飾時人以此疑之和後從袁紹報瓚云公孫瓚公孫瓚字伯珪遼西令支人也令音力定反支音巨移反家世二千石瓚以母賤遂為郡小吏為人羙姿貎大音聲言事辯慧典略曰瓚性辯慧每白事常兼數曹無有忘誤太守竒其才以女妻之魏志云侯太守妻之以女後從涿郡盧植學於緱氏山中略見書傳舉上計吏太守劉君坐事檻車徵官法不聽吏下親近瓚乃改容服詐稱侍卒身執徒養御車到洛陽太守當徙日南瓚具豚酒於北芒上祭辭先人酹觴祝曰昔為人子今為人臣當詣日南日南多瘴氣恐或不還便當長辭墳塋慷慨悲泣再拜而去觀者莫不歎息既行於道得赦瓚還郡舉孝亷除遼東屬國長史嘗從數十騎出行塞下卒逢鮮卑數百騎瓚乃退入空亭約其從者曰今不奔之則死盡矣乃自持兩刃矛馳出衝賊殺傷數十人瓚左右亦亡其半遂得免中平中以瓚督烏桓突騎車騎将軍張溫討涼州賊賊即邊章等會烏桓反畔與賊張純等攻擊薊中瓚率所領追討純等有功遷騎都尉張純復與畔胡丘力居等寇漁陽河間勃海入平原多所殺畧瓚追擊戰於屬國石門石門山名在今營州柳城縣西南虜遂大敗棄妻子踰塞走悉得其所畧男女瓚深入無繼反為丘力居等所圍於遼西管子城二百餘日糧盡食馬馬盡煮弩楯力戰不敵乃與士卒辭訣各分散還時多雨雪墜阬死者十五六虜亦飢困遠走柳城劉攽曰案逺當作還詔拜瓚降虜校尉封都亭侯復兼領屬國長史職統戎馬連接邊寇毎聞有驚劉攽曰驚當作警瓚輒厲色憤怒如赴讎敵望塵奔逐或繼之以夜戰虜識瓚聲憚其勇莫敢抗犯瓚常與善射之士數十人皆乗白馬以為左右翼自號白馬義從烏桓更相告語避白馬長史乃畫作瓚形馳騎射之中者咸稱萬歲虜自此之後遂遠竄塞外瓚志埽滅烏桓而劉虞欲以恩信招降由是與虞相忤初平二年青徐黄巾三十萬衆入勃海界欲與黑山合瓚率歩騎二萬人逆擊於東光南大破之東光今滄州縣斬首三萬餘級賊棄其車重數萬兩奔走渡河瓚因其半濟薄之賊復大破死者數萬流血丹水收得生口七萬餘人車甲財物不可勝算威名大震拜奮武将軍封薊侯瓚既諫劉虞遣兵就袁術而懼術知怨之乃使從弟越將千餘騎詣術自結術遣越隨其将孫堅擊袁紹将周昕越為流矢所中死瓚因此怒紹遂出軍屯槃河将以報紹槃即爾雅九河鉤槃之河其枯河在今滄州樂陵縣東南乃上疏曰臣聞皇羲已來君臣道著張禮以導人設刑以禁暴今車騎將軍袁紹託承先軌爵任崇厚而性本淫亂情行浮薄昔為司隸値國多難太后承攝何氏輔朝謂何進也紹不能舉直錯枉而專為邪媚招來不軌疑誤社稷至令丁原焚燒孟津續漢書曰何進欲誅中常侍趙忠等進乃詐令武猛都尉丁原放兵數千人為賊於河内稱黑山伯上事以誅忠等為辭燒平隂河津莫府人舍以怖動太后董卓造為亂始紹罪一也卓既無禮帝主見質紹不能開設權謀以濟君父而棄置節傳傳音丁戀反迸竄逃亡忝辱爵命背違人主紹罪二也紹為勃海當攻董卓而黙選戎馬不告父兄至使太傅一門纍然同斃不仁不孝紹罪三也左傳曰兩釋纍囚杜預曰纍繫也前書音義曰諸不以罪死曰纍斃踣也董卓恨紹起兵山東乃誅紹叔父太傅隗及宗族在京師者盡誅滅之紹既興兵渉歴二載不恤國難廣自封植乃多引資糧專為不急割刻無方考責百姓其為痛怨莫不咨嗟紹罪四也逼迫韓馥竊奪其州矯刻金玉以為印璽毎有所下輒皁囊施檢文稱詔書漢官儀曰凡章表皆啟封其言密事得皁囊説文曰檢書署也今俗謂之排其字從木昔亡新僭侈漸以即眞亡新王莽觀紹所擬將必階亂階梯也詩曰職為亂階紹罪五也紹令星工伺望祥妖星工善星者賂遺財貨與共飲食尅㑹期日攻鈔郡縣此豈大臣所當施為紹罪六也紹與故虎牙都尉劉勲首共造兵勲降服張楊累有功效而以小忿枉加酷害信用䜛慝濟其無道紹罪七也故上谷太守高焉故甘陵相姚貢紹以貪惏惏音力含反横責其錢錢不備畢二人幷命紹罪八也春秋之義子以母貴公羊傳曰桓公幼而貴隱公長而卑子以母貴母以子貴也紹母親為傅婢地實微賤據職高重享福豐隆有茍進之志無虛退之心紹罪九也又長沙太守孫堅前領豫州刺史遂能驅走董卓掃除陵廟忠勤王室其功莫大紹遣小将盜居其位斷絶堅糧不得深入使董卓久不服誅紹罪十也昔姬周政弱王道陵遲天子遷徙諸侯背畔故齊桓立柯會之盟春秋公會齊侯盟于柯公羊傳曰齊桓公之信著於天下自柯之盟始也晉文為踐土之會踐土鄭地也左傳周襄王出居於鄭晉文公重耳為踐土之㑹率諸侯朝天子以成霸功伐荆楚以致菁茅菁茅靈茅以供祭祀也左傳曰僖四年齊桓伐楚責之曰爾貢苞茅不入王祭不供無以縮酒寡人是徵誅曹衛以章無禮左傳僖二十八年晉侯伐曹假道於衛衛人不許還自河南濟侵曹伐衛責其無禮也臣雖闒茸名非先賢闒猶下也茸細也闒音吐盍反茸音人勇反蒙被朝恩負荷重任職在鈇鉞奉辭伐罪鈇音方于反莖刃也鉞斧也輙與諸將州郡共討紹等若大事克㨗罪人斯得尚書周公東征三年罪人斯得庶續桓文忠誠之效遂舉兵攻紹於是冀州諸城悉畔從瓚紹懼乃以所佩勃海太守印綬授瓚從弟範遣之郡欲以相結而範遂背紹領勃海兵以助瓚瓚乃自署其將帥為青冀兗三州刺史又悉置郡縣守令與紹大戰於界橋橋名解見獻帝紀瓚軍敗還薊紹遣将崔巨業将兵數萬攻圍故安不下退軍南還瓚将歩騎三萬人追擊於巨馬水水在幽州歸義縣界自易州遒縣界流入大破其衆死者七八千人乘勝而南攻下郡縣遂至平原乃遣其青州刺史田楷據有齊地紹復遣兵數萬與楷連戰二年糧食並盡士卒疲困互掠百姓野無青草左傳齊侯伐魯語展喜曰室如懸磬野無青草何恃而不恐紹乃遣子譚為青州刺史楷與戰敗退還是歲瓚破禽劉虞盡有幽州之地猛志益盛前此有童謠曰燕南垂趙北際中央不合大如礪唯有此中可避世瓚自以為易地當之遂徙鎭焉前書易縣屬涿郡續漢志曰屬河間瓚所居易京故城在今幽州歸義縣南十八里乃盛脩營壘樓觀數十臨易河通遼海劉虞從事漁陽鮮于輔等合率州兵欲共報瓚輔以燕國閻柔素有恩信推為烏桓司馬柔招誘胡漢數萬人與瓚所置漁陽太守鄒丹戰於潞北斬丹等四千餘級烏桓峭王感虞恩徳率種人及鮮卑七千餘騎共輔南迎虞子和與袁紹将麴義合兵十萬共攻瓚興平二年破瓚於鮑丘鮑丘水名也又名路水在今幽州漁陽縣斬首二萬餘級瓚遂保易京開置屯田稍得自支相持歲餘麴義軍糧盡士卒飢困餘衆數千人退走瓚徼破之盡得其車重是時旱蝗榖貴民相食瓚恃其才力不恤百姓記過忘善睚眦必報州里善士名在其右者必以法害之常言衣冠皆自以職分富貴不謝人惠故所寵愛類多商販庸兒所在侵暴百姓怨之於是代郡廣陽上谷右北平各殺瓚所置長吏復與輔和兵合瓚慮有非常乃居於高京以鐡為門斥去左右男人七歲以上不得入易門專侍姬妾其文簿書記皆汲而上之令婦人習為大言聲使聞數百歩以傳宣教令疏逺賓客無所親信故謀臣猛將稍有乖散自此之後希復攻戰或問其故瓚曰昔我驅畔胡於塞表掃黄巾於孟津當此之時謂天下指麾可定九州春秋曰瓚曰始天下兵起我謂唾手而決至於今日兵革方始觀此非我所决不如休兵力耕以救凶年兵法百樓不攻今吾諸營樓樐千里樐即櫓字見說文釋名曰櫓露也上無覆屋積穀三百萬斛食此足以待天下之變建安三年袁紹復大攻瓚瓚遣子續請救於黑山諸帥而欲自将突騎直出傍西山以斷紹後長史關靖諫曰今將軍將士莫不懷瓦解之心所以猶能相守者顧戀其老小而恃將軍為主故耳堅守曠日或可使紹自退若舍之而出後無鎭重易京之危可立待也瓚乃止紹漸相攻逼瓚衆日䠞乃却築三重營以自固四年春黑山賊帥張燕與續率兵十萬三道來救瓚未及至瓚乃宻使行人齎書告續曰昔周末喪亂僵屍蔽地以意而推猶為否也不圖今日親當其鋒袁氏之攻状若鬼神梯衝舞吾樓上鼓角鳴於地中日窮月急不遑啟處鳥戹歸人滀水陵高滀音丑六反喻急也汝當碎首於張燕馳驟以告急父子天性不言而動言相感也且厲五千鐵騎於北隰之中下溼曰隰起火為應吾當自内出奮揚威武決命於斯不然吾亡之後天下雖廣不容汝足矣紹候得其書獻帝春秋候者得書紹使陳琳易其詞即此書如期舉火瓚以為救至遂便出戰紹設伏瓚遂大敗復還保中小城自計必無全乃悉縊其姊妹妻子然後引火自焚紹兵趣登臺斬之關靖見瓚敗歎恨曰前若不止將軍自行未必不濟吾聞君子陷人於危必同其難豈可以獨生乎乃策馬赴紹軍而死續為屠各所殺屠各胡號田楷與袁紹戰死鮮于輔將其衆歸曹操操以輔為度遼将軍封都亭侯閻柔将部曲從曹操擊烏桓拜䕶烏桓校尉封關内侯張燕既為紹所敗人衆稍散曹操將定冀州乃率衆詣鄴降拜北平將軍封安國亭侯論曰自帝室王公之胄皆生長脂腴不知稼穡其能厲行飭身卓然不羣者或未聞焉前書班固曰夫唯大雅卓爾不羣者河間獻王之謂歟故論引焉劉虞守道慕名以忠厚自牧牧養也易曰卑以自牧美哉乎季漢之名宗子也若虞瓚無間同情共力糾人完聚稸保燕薊之饒糾收也劉攽曰糾人完聚稸案人下少一字不成文理當有一衆字繕兵昭武繕修也左傳曰繕甲兵以臨羣雄之隙舍諸天運徴乎人文則古之休烈何逺之有天運猶天命也人文猶人事也易曰觀乎人文以化成天下陶謙陶謙字恭祖丹陽人也丹陽郡丹陽縣人也吳書曰陶謙父故餘姚長謙少孤始以不羈聞於縣中年十四猶綴帛為幡乘竹馬而戲邑中兒童皆隨之故蒼梧太守同縣甘公出遇之見其容貎異而呼之與語甚悦許妻以女甘夫人怒曰陶家兒遨戲無度於何以女許之甘公曰彼有竒表長必大成遂與之少為諸生仕州郡吳書曰陶謙察孝亷拜尚書郎除舒令郡太守張磐同郡先輩與謙父友謙恥為之屈嘗舞屬謙謙不為起固強之乃舞舞又不轉磐曰不當轉邪曰不可轉轉則勝人四遷為車騎將軍張溫司馬西討邊章會徐州黄巾起以謙為徐州刺史擊黄巾大破走之境内晏然時董卓雖誅而李傕郭氾作亂關中是時四方斷絶謙毎遣使間行奉貢西京詔遷為徐州牧加安東将軍封溧陽侯溧陽今宣州縣也溧音栗是時徐方百姓殷盛穀實甚豐流民多歸之而謙信用非所刑政不理别駕從事趙昱知名士也而以忠直見疏出為廣陵太守謝承書曰謙奏昱茂才遷為太守曹宏等䜛慝小人謙甚親任之良善多被其害由斯漸亂下邳閻宣自稱天子劉攽曰案紀作闕宣仍云闕黨童子之後此作閻誤謙始與合從後遂殺之而并其衆初曹操父嵩避難琅邪時謙别將守隂平縣名屬東海國故城在沂州承縣西南士卒利嵩財寶遂襲殺之初平四年曹操擊謙破彭城傅陽縣名屬彭城國本春秋時偪陽也楚宣王滅宋改曰傅陽故城在今沂州承縣南謙退保郯操攻之不能克乃還過拔取慮睢陵夏丘皆屠之取慮音秋閭縣名屬下邳郡故城在今泗州下邳縣西南睢陵縣在下邳縣東南夏丘縣屬沛郡故城今泗州虹縣是凡殺男女數十萬人雞犬無餘泗水為之不流自是五縣城保無復行迹初三輔遭李傕亂百姓流移依謙者皆殲殲盡也左傳曰門官殲焉興平元年曹操復擊謙略定琅邪東海諸縣謙懼不免欲走歸丹陽會張邈迎吕布據兗州操還擊布是歲謙病死初同郡人笮融笮音側格反聚衆數百往依於謙謙使督廣陵下邳彭城運糧遂斷三郡委輸大起浮屠寺浮屠佛也解見西羌傳上累金盤下為重樓又堂閣周囘可容三千許人作黄金塗像衣以錦綵毎浴佛輙多設飲飯布席於路其有就食及觀者且萬餘人獻帝春秋曰融敷席方四五里費以巨萬及曹操擊謙徐方不安融乃将男女萬口馬三千匹走廣陵廣陵太守趙昱待以賓禮融利廣陵資貨遂乘酒酣殺昱放兵大掠因以過江南奔豫章殺郡守朱皓入據其城後為揚州刺史劉繇所破走入山中為人所殺昱字元逹琅邪人清已疾惡潛志好學雖親友希得見之為人耳不邪聽目不妄視太僕种拂舉為方正贊曰襄賁勵德維城燕北勵勉也仁能洽下忠以衛國伯珪疎獷武才趫猛趫音去驕反虞好無終紹埶難並徐方殲耗實謙為梗後漢書卷一百三後漢書卷一百三考證公孫瓚傳於北芒上祭辭先人何焯曰瓚遼西人安得有先墓在北芒擊袁紹將周昕昕魏志作昻史臣論舍諸天運臣會汾按文義舍當作合後漢書卷一百三考證
