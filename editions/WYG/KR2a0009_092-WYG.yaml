body:
  text: 後漢書卷九十二宋宣城太守范煜撰唐章懐太子賢注荀韓鍾陳列傳第五十二荀淑傳子爽孫恱荀淑字季和潁川潁隂人也荀卿十一世孫也卿名况趙人也為楚蘭陵令著書二十二篇號荀卿子避宣帝諱故改曰孫也少有髙行博學而不好章句多為俗儒所非而州里稱其知人安帝時徴拜郎中後再遷當塗長當塗縣名故城在今宣州去職還鄉里當世名賢李固李膺等皆師宗之及梁太后臨朝有日食地震之變詔公卿舉賢良方正光禄勲杜喬少府房植舉淑對䇿譏刺貴倖為大將軍梁冀所忌出補朗陵侯相續漢書曰淑對䇿刺梁氏故出也莅事明理稱為神君頃之弃官歸閒居養志產業每增輒以贍宗族知友年六十七建和三年卒李膺時為尚書自表師喪禮記曰事師無犯無隠左右就養無方服勤至死心喪三年二縣皆為立祠有子八人儉緄靖燾汪爽肅專並有名稱時人謂八龍緄音昆燾音道汪音烏光反說文云汪深廣也俗本改作注非專本或作敷初荀氏舊里名西豪今許州城内西南有荀淑故宅相傳云即舊西豪里也潁隂令渤海苑康以為昔髙陽氏有才子八人左傳曰昔髙陽氏有才子八人蒼舒隤敳檮戭大臨尨降庭堅仲容叔逹今荀氏亦有八子故改其里曰髙陽里靖有至行不仕年五十而終號曰𤣥行先生皇甫謐髙士傳曰靖字叔慈少有俊才動止以禮靖弟爽亦以才顯於當時或問汝南許章曰爽與靖孰賢章曰皆玉也慈明外朗叔慈内潤及卒學士惜之誄靖者二十六人潁隂令丘禎追號靖曰𤣥行先生也淑兄子昱字伯條曇字元智昱為沛相曇為廣陵太守兄弟皆正身疾惡志除閹官其支黨賔客有在二郡者纎罪必誅昱後共大將軍竇武謀誅中官與李膺俱死曇亦禁錮終身爽字慈明一名諝音息汝反幼而好學年十二能通春秋論語太尉杜喬見而稱之曰可為人師爽遂耽思經書慶弔不行徴命不應潁川為之語曰荀氏八龍慈明無䨇延熹元年太常趙典舉爽至孝拜郎中對䇿陳便宜曰臣聞之於師曰漢為火徳火生於木木盛於火故其徳為孝火木之子夏火之位木至夏而盛故為孝其象在周易之離夫在地為火在天為日易說卦曰離為火為日也在天者用其精在地者用其形夏則火王其精在天温暖之氣養生百木是其孝也冬時則廢其形在地酷烈之氣焚燒山林是其不孝也故漢制使天下誦孝經選吏舉孝廉平帝時王莽作書八篇戒子孫令學官以教授吏能誦者比孝經音義云言用之得選舉之也夫喪親自盡孝之終也盡謂盡其哀戚也今之公卿及二千石三年之喪不得即去殆非所以增崇孝道而克稱火徳者也徃者孝文勞謙行過乎儉易謙卦九三爻勞謙君子有終吉故其遺詔以日易月此當時之宜不可貫之萬世古今之制雖有損益而諒闇之禮未嘗改移以示天下莫遺其親遺忘也今公卿羣寮皆政教所瞻而父母之喪不得奔赴夫仁義之行自上而始敦厚之俗以應乎下傳曰喪祭之禮闕則人臣之恩薄背死忘生者衆矣曾子曰人未有自致者必也親喪乎事見論語致猶盡也極也春秋傳曰上之所為民之歸也左氏傳臧武仲之言夫上所不為而民或為之故加刑罰若上之所為民亦為之又何誅焉昔翟方進以自備宰相而不敢踰制劉攽曰案文以自當作自以至遭母憂三十六日而除前書翟方進為丞相遭後母憂行服三十六日起視事曰不敢踰國制也夫失禮之源自上而始古者大喪三年不呼其門公羊傳之文也何休注云重奪孝子之恩所以崇國厚俗篤化之道也事失宜正過勿憚改憚難也天下通喪可如舊禮禮記曰三年之喪天下之通喪也臣聞有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後有禮義禮義備則人知所厝矣語見易序卦也夫婦人倫之始王化之端故文王作易上經首乾坤下經首咸恒易乾坤至離為上經咸恒至未濟為下經孔子曰天尊地卑乾坤定矣易繫辭也夫婦之道所謂順也堯典曰釐降二女於媯汭嬪于虞降者下也嬪者婦也言雖帝堯之女下嫁於虞猶屈體降下勤脩婦道易曰帝乙歸妹以祉元吉易泰卦六五爻辭也王輔嗣注云婦人謂嫁曰歸泰者隂陽交通之時五處尊位履中居順降身應二帝乙歸妹誠合斯義也案史記紂父名帝乙此文以帝乙為湯湯名天乙也婦人謂嫁曰歸言湯以娶禮歸其妹於諸侯也春秋之義王姬嫁齊使魯主之不以天子之尊加於諸侯也公羊傳曰夏單伯逆王姬單伯者何吾大夫之命于天子者何以不稱使天子召而使逆之逆之者何使我主之也曷為使我主之天子嫁女於諸侯必使同姓諸侯主之何休注云不自為主尊卑不敵也今漢承秦法設尚主之儀以妻制夫以卑臨尊違乾坤之道失陽唱之義易緯曰陽唱而隂和也孔子曰昔聖人之作易也仰則觀象於天俯則察法於地覩鳥獸之文與地之宜近取諸身逺取諸物以通神明之徳以類萬物之情皆易繫之文也今觀法於天則北極至尊四星妃后北極北辰也軒轅四星女主之象也察法於地則崐山象夫卑澤象妻崐猶髙也易艮下兑上為咸艮為山夫象也兑為澤妻象也咸感也山澤通氣夫婦之相感也覩鳥獸之文鳥則雄者鳴雊雌能順服獸則牡為唱導牝乃相從近取諸身則乾為人首坤為人腹易說卦之文也逺取諸物則木實屬天根荄屬地荄音該陽尊隂卑蓋乃天性且詩初篇實首關雎禮始冠婚先正夫婦儀禮士冠禮為始士婚禮次之天地六經其㫖一揆宜改尚主之制以稱乾坤之性遵法堯湯式是周孔式法也合之天地而不謬質之鬼神而不疑人事如此則嘉瑞降天吉符出地五韙咸備各以其叙矣韙是也史記曰休徴曰肅時雨若曰乂時晹若曰哲時燠若曰謀時寒若曰聖時風若五是來備各以其叙也昔者聖人建天地之中而謂之禮禮者所以興福祥之本而止禍亂之源也人能枉欲從禮者則福歸之順情廢禮者則禍歸之推禍福之所應知興廢之所由來也衆禮之中婚禮為首故天子娶十二天之數也諸侯以下各有等差事之降也白虎通曰天子娶十二法天則有十二月百物畢生也又曰諸侯娶九女也陽性純而能施隂體順而能化以禮濟樂節宣其氣左傳曰昔晉侯有疾醫和視之曰疾不可為也是為近女室疾如蠱非鬼非食惑以喪志公曰女不可近乎對曰節之先王之樂所以節百事也天有六氣過則為災於是乎節宣其氣也劉攽曰注昔晉侯有疾玩文多一昔字故能豐子孫之祥致老夀之福及三代之季淫而無節瑶臺傾宫陳妾數百列女傳曰夏桀為璇室瑶臺以臨雲雨紂為傾宫觧見桓帝紀陽竭於上隂隔於下故周公之戒曰不知稼穡之艱難不聞小人之勞惟耽樂之從時亦罔或克夀是其明戒事見尚書無逸篇其詞與此微有不同也後世之人好福不務其本惡禍不易其軌傳曰截趾適屨孰云其愚何與斯人追欲喪軀誠可痛也適猶從也言喪身之愚甚於截趾也臣竊聞後宫采女五六千人從官侍使復在其外冬夏衣服朝夕稟糧耗費縑帛空竭府藏徴調增倍十而稅一空賦不辜之民以供無用之女百姓窮困於外隂陽隔塞於内故感動和氣災異屢臻臣愚以為諸非禮聘未曾幸御者一皆遣出使成妃合一曰通怨曠和隂陽二曰省財用實府庫三曰脩禮制綏眉夀四曰配陽施祈螽斯螽斯蚣蝑也其性不妒故能子孫衆多詩曰螽斯羽詵詵兮宜爾子孫振振􅀆五曰寛役賦安黎民此誠國家之𢎞利天人之大福也夫寒熱晦明所以為嵗尊卑奢儉所以為禮故以晦明寒暑之氣尊卑侈約之禮為其節也易曰天地節而四時成節卦彖辭文也春秋傳曰唯器與名不可以假人杜預注左氏云器謂車服名謂爵號孝經曰安上治民莫善於禮禮者尊卑之差上下之制也昔季氏八佾舞於庭非有傷害困於人物而孔子猶曰是可忍也孰不可忍洪範曰惟辟作威惟辟作福惟辟玉食凡此三者君所獨行而臣不得同也今臣僭君服下食上珍所謂害于而家凶于而國者也宜略依古禮尊卑之差及董仲舒制度之别前書董仲舒曰王者正法度之宜别上下之序以防欲也嚴督有司必行其命此則禁亂善俗足用之要奏聞即弃官去後遭黨錮隠於海上又南遁漢濵積十餘年以著述為事遂稱為碩儒黨禁解五府並辟司空袁逄舉有道不應及逢卒爽制服三年當世徃徃化以為俗時人多不行妻服雖在親憂猶有弔問喪疾者劉攽曰案文當作弔喪問疾又私諡其君父及諸名士爽皆引據大義正之經典雖不悉變亦頗有改喪服曰夫為妻齊衰杖期禮記曰曽子問三年之喪弔乎孔子曰禮以餙情三年之喪而弔哭不亦虚乎後公車徴為大將軍何進從事中郎進恐其不至迎薦為侍中及進敗而詔命中絶獻帝即位董卓輔政復徴之爽欲遁命吏持之急不得去因復就拜平原相行至宛陵復追為光禄勲視事三日進拜司空爽自被徴命及登台司九十五日因從遷都長安爽見董卓忍暴滋甚必危社稷其所辟舉皆取才略之士將共圗之亦與司徒王允及卓長史何顒等為内謀㑹病薨年六十三著禮易傳詩傳尚書正經春秋條例又集漢事成敗可為鑒戒者謂之漢語又作公羊問及辨讖并它所論叙題為新書凡百餘篇今多所亡缺兄子恱彧並知名彧自有傳論曰荀爽鄭𤣥申屠蟠俱以儒行為處士累徴並謝病不詣及董卓當朝復備禮召之蟠𤣥竟不屈以全其髙爽己黄髮矣獨至焉未十旬而取卿相意者疑其乖趣舍余竊商其情以為出處君子之大致也平運則𢎞道以求志陵夷則濡跡以匡時濡跡解見崔駰傳荀公之急急自勵其濡跡乎不然何為違貞吉而履虎尾焉易履卦曰履道坦坦幽人貞吉又曰履虎尾不咥人亨王輔嗣注云履虎尾者言其危也觀其遜言遷都之議以救楊黄之禍楊彪黄琬也及其潛圖董氏幾振國命所謂大直若屈道固逶迤也老子云大直若屈大巧若拙逶迤曲也恱字仲豫儉之子也儉早卒恱年十二能說春秋家貧無書每之人間所見篇牘一覽多能誦記性沈静羙姿容尤好著述靈帝時閹官用權士多退身窮處恱乃託疾隠居時人莫之識從弟彧特稱敬焉初辟鎮東將軍曹操府遷黄門侍郎獻帝頗好文學恱與彧及少府孔融侍講禁中旦夕談論累遷祕書監侍中時政移曹氏天子恭己而已恱志在獻替而謀無所用乃作申鑒五篇其所論辨通見政體既成而奏之其大略曰夫道之本仁義而已矣易曰立人之道曰仁與義五典以經之羣籍以緯之詠之歌之弦之舞之前監既明後復申之故古之聖王其於仁義也申重而已致政之術先屏四患乃崇五政一曰偽二曰私三曰放四曰奢偽亂俗私壊法放越軌奢敗制四者不除則政末由行矣夫俗亂則道荒雖天地不得保其性矣法壊則世傾雖人主不得守其度矣軌越則禮亡雖聖人不得全其道矣制敗則欲肆雖四表不得充其求矣肆放也是謂四患興農桑以養其性審好惡以正其俗宣文敎以章其化立武備以秉其威明賞罰以統其法是謂五政人不畏死不可懼以罪人不樂生不可勸以善雖使契布五敎臯陶作士政不行焉尚書舜謂契曰汝作司徒敬敷五敎在寛謂臯陶曰汝作士明于五刑故在上者先豐人財以定其志帝耕籍田后桑蠶宫籍田事解見明紀禮記曰季春之月后妃齋戒親東向桑以勸蠶事古者天子諸侯必有公桑蠶室近川而為之宫仭有三尺也國無遊人野無荒業財不賈用言自足也力不妄加以周人事是謂養生周給也君子之所以動天地應神明正萬物而成王化者必乎眞定而已故在上者審定好醜焉善惡要乎功罪毁譽効於凖驗聽言責事舉名察實無惑詐偽以蕩衆心故事無不覈物無不切善無不顯惡無不章俗無姦怪民無淫風百姓上下覩利害之存乎已也故肅恭其心愼脩其行内不回惑外無異望則民志平矣是謂正俗君子以情用小人以刑用榮辱者賞罰之精華也故禮敎榮辱以加君子化其情也桎梏鞭撲以加小人化其刑也君子不犯辱况於刑乎小人不忌刑况於辱乎若敎化之廢推中人而墜於小人之域教化之行引中人而納於君子之塗是謂章化章明也小人之情緩則驕驕則恣恣則怨怨則叛危則謀亂安則思欲非威强無以懲之故在上者必有武備以戒不虞以遏寇虐安居則寄之内政有事則用之軍旅國語齊桓公問管仲曰國安可乎管仲曰未可君若正卒伍脩甲兵則大國亦將脩之小國設備可作内政而寄軍令焉注云政國政也言脩國政而寄軍令隣國不知是謂秉威賞罰政之柄也韓子曰二柄者刑徳也殺戮之謂刑慶賞之謂徳明賞必罰審信慎令賞以勸善罰以懲惡人主不妄賞非徒愛其財也賞妄行則善不勸矣不妄罰非矜其人也妄罰行則惡不懲矣賞不勸謂之止善罰不懲謂之縱惡在上者能不止下為善不縱下為惡則國法立矣是謂統法四患既蠲五政又立行之以誠守之以固簡而不怠疎而不失無為為之使自施之無事事之使自交之老子曰為無為事無事又曰故徳交歸也不肅而成不嚴而化垂拱揖譲而海内平矣是謂為政之方又言尚主之制非古也釐降二女陶唐之典歸妹元吉帝乙之訓王姬歸齊宗周之禮以隂乗陽違天以婦陵夫違人違天不祥違人不義又古者天子諸侯有事必告于廟朝有二史左史記言右史書事禮記曰天子朝日于東門之外聽朔于南門之外閏月則闔門左扉立于其中言則左史書之動則右史書之也事為春秋言為尚書君舉必記善惡成敗無不存焉下及士庶茍有茂異咸在載籍或欲顯而不得或欲隠而名章得失一朝而榮辱千載善人勸焉淫人懼焉淫過也左氏傳或求名而不得或欲蓋而名章書齊豹盗三叛人名以懲不義也宜於今者備置史官掌其典丈紀其行事每於嵗盡舉之尚書以助賞罰以𢎞法敎帝覽而善之帝好典籍常以班固漢書文繁難省乃令恱依左氏傳體以為漢紀三十篇詔尚書給筆札辭約事詳論辨多羙其序之曰昔在上聖惟建皇極經緯天地觀象立法乃作書契以通宇宙揚于王庭厥用大焉先王光演大業肆于時夏詩周頌曰我求懿徳肆于時夏鄭𤣥注曰懿羙也肆陳也我武王也求羙徳之士而任用之故陳于是夏而歌之也亦惟厥後永世作典夫立典有五志焉一曰達道義二曰章法式三曰通古今四曰著功勲五曰表賢能於是天人之際事物之宜粲然顯著罔不備矣世濟其軌不隕其業濟成也損益盈虚與時消息臧否不同其揆一也漢四百有六載撥亂反正統武興文永惟祖宗之洪業思光啓乎萬嗣聖上穆然惟文之恤瞻前顧後是紹是繼闡崇大猷命立國典於是綴叙舊書以述漢紀中興以前明主賢臣得失之軌亦足以觀矣又著崇徳正論及諸論數十篇年六十二建安十四年卒韓韶傳韓韶字仲黄潁川舞陽人也少仕郡辟司徒府時太山賊公孫舉偽號歴年守令不能破散多為坐法尚書選三府掾能理劇者乃以韶為贏長贏縣故城今在兖州愽城縣東北賊聞其賢相戒不入贏境餘縣多被寇盗廢耕桑其流入縣界求索衣糧者甚衆韶愍其飢困乃開倉賑之所稟贍萬餘戶主者爭謂不可韶曰長活溝壑之人而以此伏罪含笑入地矣太守素知韶名徳竟無所坐以病卒官同郡李膺陳寔杜密荀淑等為立碑頌焉子融字元長少能辨理而不為章句學聲名甚盛五府並辟獻帝初至太僕年七十卒鍾皓傳鍾皓字季明潁川長社人也為郡著姓世善刑律皓少以篤行稱公府連辟為二兄未仕避隠密山密縣山也以詩律敎授門徒千餘人同郡陳寔年不及皓皓引與為友皓為郡功曹會辟司徒府臨辭太守問誰可代卿者皓曰明府欲必得其人西門亭長陳寔可寔聞之曰鍾君似不察人不知何獨識我皓頃之自劾去前後九辟公府徴為廷尉正博士林慮長皆不就時皓及荀淑並為士大夫所歸慕李膺常嘆曰荀君清識難尚鍾君至徳可師皓兄子瑾母膺之姑也瑾好學慕古有退讓風與膺同年俱有聲名膺祖太尉脩常言瑾似我家性邦有道不廢邦無道免於刑戮復以膺妹妻之瑾辟州府未嘗屈志膺謂之曰孟子以為人無是非之心非人也孟子曰人無惻隠之心非人也無羞惡之心非人也無辭讓之心非人也無是非之心非人也弟何期不與孟軻同邪瑾常以膺言白皓皓曰昔國武子好昭人過以致怨本國武子齊大夫齊慶克通於齊君之母國武子知之面責慶克夫人遂譛武子而逐之事見左傳劉攽曰正文案昭當作招卒保身全家爾道為貴其體訓所安多此類也年六十九終於家諸儒頌之曰林慮懿徳非禮不處恱此詩書弦琴樂古五就州招九膺台輔逡巡王命卒嵗容與皓孫繇建安中為司𨽻校尉海内先賢傳曰繇字元常郡主薄迪之子也魏志曰舉孝亷為尚書郎辟三府為廷尉正黄門侍郎陳寔傳陳寔字仲弓潁川許人也出於單微自為兒童雖在戱弄為等類所歸少作縣吏常給事厮役後為都亭刺史佐而有志好學坐立誦讀縣令鄧邵試與語竒之聽受業太學後令復召為吏乃避隠陽城山中時有殺人者同縣揚吏以疑寔縣遂逮繫考掠無實而後得出及為督郵乃密託許令禮召揚吏逺近聞者咸歎服之家貧復為郡西門亭長尋轉功曹時中常侍侯覽託太守髙倫用吏倫教署為文學掾寔知非其人懐檄請見檄板書謂以髙倫之敎書之於檄而懐之者懼洩事也言曰此人不宜用而侯常侍不可違寔乞從外署不足以塵明徳倫從之請從外署之舉不欲䧟倫於請託也於是鄉論怪其非舉寔終無所言倫後被徴為尚書郡中士大夫送至輪氏傳舍輪氏縣名屬潁川郡今故嵩陽縣是倫謂衆人言曰吾前為侯常侍用吏陳君密持教還而於外白署比聞議者以此少之此咎由故人畏憚强禦陳君可謂善則稱君過則稱己者也寔固自引愆聞者方歎息由是天下服其徳司空黄瓊辟選理劇補聞喜長旬月以朞喪去官復再遷除太丘長太丘縣屬沛國故城在今亳州永城縣西北也脩徳清静百姓以安鄰縣人戸歸附者寔輙訓導譬解發遣各令還本司官行部司官謂主司之官也吏慮有訟者白欲禁之寔曰訟以求直禁之理將何申其勿有所拘司官聞而歎息曰陳君所言若是豈有怨於人乎亦竟無訟者以沛相賦斂違法乃解印綬去吏人追思之及後逮捕黨人事亦連寔餘人多逃避求免寔曰吾不就獄衆無所恃乃請囚焉遇赦得出靈帝初大將軍竇武辟以為掾屬時中常侍張讓權傾天下讓父死歸葬潁川雖一郡畢至而名士無徃者讓甚恥之寔乃獨弔焉及後復誅黨人讓感寔故多所全宥寔在鄉閭平心率物其有爭訟輙求判正曉譬曲直退無怨者至乃歎曰寜為刑罰所加不為陳君所短時嵗荒民儉有盗夜入其室止於梁上寔隂見乃起自整拂呼命子孫正色訓之曰夫人不可不自勉不善之人未必本惡習以性成遂至於此梁上君子者是矣盗大驚自投於地稽顙歸罪寔徐譬之曰視君狀貌不似惡人宜深剋己反善然此當由貧困令遺絹二匹自是一縣無復盗竊太尉楊賜司徒陳耽每拜公卿羣僚畢賀賜等常歎寔大位未登愧於先之及黨禁始解大將軍何進司徒袁隗遣人敦寔敦勸也欲特表以不次之位寔乃謝使者曰寔久絶人事飾巾待終而已時三公每缺議者歸之累見徴命遂不起閉門懸車棲遲養老中平四年年八十四卒於家何進遣使弔祭海内赴者三萬餘人制衰麻者以百數共刋石立碑諡為文範先生先賢行狀曰將軍何進遣官屬弔祠為諡有六子紀諶最賢紀字元方亦以至徳稱兄弟孝養閨門廱和後進之士皆推慕其風及遭黨錮發憤著書數萬言號曰陳子黨禁解四府並命無所屈就遭父憂每哀至輙歐血絶氣雖衰服己除而積毁消瘠殆將滅性豫州刺史嘉其至行表上尚書圖象百城以厲風俗董卓入洛陽乃使就家拜五官中郎將不得已到京師遷侍中出為平原相徃謁卓時欲徙都長安乃謂紀曰三輔平敞四面險固土地肥羙號為陸海前書曰東方朔曰三輔之地南有江淮北有河渭汧隴以東商洛以西厥壤肥饒此所謂天府陸海之地今關東兵起恐洛陽不可久居長安猶有宫室今欲西遷何如紀曰天下有道守在四夷左傳曰楚沈尹戍曰古者天子守在四夷天子卑守在諸侯也宜脩徳政以懐不附遷移至尊誠計之末者愚以公宜事委公卿專精外任其有違命則威之以武今關東兵起民不堪命若謙逺朝政率師討伐則塗炭之民庶幾可全若欲徙萬乘以自安將有累卵之危崢嶸之險也累卵解見皇后紀崢音上耕反卓意甚忤而敬紀名行無所復言時議欲以為司徒紀見禍亂方作不復辨嚴嚴讀曰裝也即時之郡璽書追拜太僕又徴為尚書令建安初袁紹為太尉讓於紀紀不受拜大鴻臚年七十一卒於官子羣為魏司空羣字長文魏志曰魯國孔融才髙倨傲年在羣紀之間先與紀友後與羣交更為紀拜由是顯名天下以為公慙卿卿慚長弟諶字季方與紀齊徳同行父子並著髙名時號三君每宰府辟召常同時旌命羔鴈成羣古者諸侯朝天子卿執羔大夫執鴈士執雉成羣言衆多也當世者靡不榮之諶早終先賢行狀曰豫州百城皆圖畫寔紀諶形像焉劉攽曰案正文多一者字論曰漢自中世以下閹豎擅恣故俗遂以遁身矯絜放言為髙放肆其言不拘節制也論語曰隐居放言士有不談此者則芸夫牧豎已呌呼之矣呌呼譏笑之也芸除草也故時政彌惽而其風愈徃惟陳先生進退之節必可度也據於徳故物不犯安於仁故不離羣行成乎身而道訓天下故凶邪不能以權奪王公不能以貴驕所以聲敎廢於上而風俗清乎下也贊曰二李師淑陳君友皓韓韶就吏贏寇懐道太丘奥廣模我彛倫曾是淵軌薄夫以淳曾之言則也慶基既啓有蔚潁濵二方承則八慈繼塵二方元方李方也荀淑八子皆以慈為字見荀氏家傳也劉攽曰案凡人相語言及所論議皆當作謂以彼物為某事乃當作為其字從平聲後人傳冩之誤為謂相亂難為悉改學者宜知之後漢書巻九十二後漢書卷九十二考證荀淑傳後再遷當塗長注當塗縣名故城在今宣州臣世駿按當塗後漢屬九江郡唐屬濠州注云在宣州誤有子八人儉緄靖燾汪爽肅專臣世駿按魏志注引張璠漢紀汪作詵專作旉此傳注云專本或作敷疑專為傳寫之誤荀淑子爽及董仲舒制度之别注前書董仲舒曰王者正法度之宜别上下之序困學記聞曰制度之别必有其書非但正法度别上下之對也春秋繁露有度制篇又私諡其君父及諸名士何焯曰此所謂君指太守令長言之荀淑孫恱興農桑以養其性諸本同臣良裘按申鑒原文作養其生人不樂生不可勸以善勸字申鑒原文作觀注云漢書作勸字韓韶傳字仲黄潁川舞陽人也舞陽本或作長社誤後漢書巻九十二考證
