body:
  text: 後漢書卷四十九宋宣城太守范煜撰唐章懷太子賢注耿弇列傳第九耿弇傳弟國國子秉秉弟夔國弟子恭耿弇字伯昭扶風茂陵人也其先武帝時以吏二千石自鉅鹿徙焉武帝時徙吏二千石髙資富人及豪傑并兼之家於諸陵也父况字俠游以眀經為郎與王莽従弟伋共學老子於安丘先生嵇康聖賢髙士傳曰安丘望之字仲都京兆長陵人少持老子經恬淨不求進宦號曰安丘丈人成帝聞欲見之望之辭不肯見為巫醫於人間也後為朔調連率王莽改上谷郡曰朔調守曰連率弇少好學習父業袁山松書曰弇少學詩禮明銳有權謀常見郡尉試騎士建旗鼓𨽻馳射由是好將帥之事漢官儀曰嵗終郡試之時講武勒兵因以校獵簡其材力也劉攽曰常見郡尉試騎士按漢謂郡試騎士講武為都試後人不曉妄改為尉注所云郡字亦合作都且講武不專在都尉何得云尉試乎都試見前書及王莽敗更始立諸將略地者前後多擅威權輙改易守令況自以莽之所置懐不自安時弇年二十一乃辭況奉奏詣更始因齎貢獻以求自固之宜及至宋子㑹王郎詐稱成帝子輿起兵邯鄲弇従吏孫倉衞包於道共謀曰劉子輿成帝正統捨此不歸逺行安之弇按劒曰子輿弊賊卒為降虜耳我至長安與國家陳漁陽上谷兵馬之用還出太原代郡反覆數十日歸發突騎以轔烏合之衆轔轢也音力刄反如摧枯折腐耳觀公等不識去就族滅不久也倉包不従遂亡降王郎弇道聞光武在盧奴乃馳北上謁光武留署門下吏劉攽曰按百官志公府有門史又祭遵亦為門下史知此當作史字弇因説䕶軍朱祐求歸發兵以定邯鄲光武笑曰小兒曹乃有大意哉因數召見加㤙慰續漢書曰弇還檄與況陳上功徳自嫌年少恐不見信宜自來況得檄立發至昌平見上也弇因従光武北至薊聞邯鄲兵方到光武將欲南歸召官屬計議弇曰今兵従南來不可南行漁陽太守彭寵公之邑人寵南陽宛人也上谷太守即弇父也發此兩郡控弦萬騎邯鄲不足慮也光武官屬腹心皆不肯曰死尚南首奈何北行入囊中漁陽上谷北接塞垣至彼路窮如入囊也光武指弇曰是我北道主人也㑹薊中亂續漢志曰弇歸主人食未巳薊中擾亂上駕出南城門頗遮絶輜重城中相掠弇既與上相失以馬與城門亭長乃得出也光武遂南馳官屬各分散弇走昌平就況昌平縣名屬上谷郡今幽州縣故城在縣東也因説況使宼恂東約彭寵各發突騎二千匹歩兵千人弇與景丹宼恂及漁陽兵合軍而南所過擊斬王郎大將九卿校尉以下四百餘級得印級百二十五節二斬首三萬級定涿郡中山鉅鹿清河河間凡二十二縣遂及光武於廣阿是時光武方攻王郎傳言二郡兵為邯鄲来衆皆恐既而悉詣營上謁光武見弇等説曰當與漁陽上谷士大夫共此大功乃皆以為偏將軍使還領其兵加況大將軍興義侯得自置偏裨弇等遂従拔邯鄲時更始徴代郡太守趙永而況勸永不應召令詣扵光武光武遣永復郡永北還而代令張曅據城反畔乃招迎匈奴烏桓以為援助光武以弇弟舒為復胡將軍使擊曅破之永乃得復郡時五校賊二十餘萬北宼上谷況與舒連擊破之賊皆退走更始見光武威聲日盛君臣疑慮乃遣使立光武為蕭王令罷兵與諸將有功者還長安遣苗曾為幽州牧韋順為上谷太守蔡充為漁陽太守並北之部時光武居邯鄲宫晝卧溫眀殿漢趙王如意之殿也故基在今洺州邯鄲縣内弇入造牀下請間因説曰今更始失政君臣淫亂諸將擅命於畿内貴戚縦横扵都内更始傳曰李軼朱鮪擅命山東王匡張卬横㬥三輔天子之命不出城門所在牧守輙自遷易百姓不知所従士人莫敢自安擄掠財物刼掠婦女懐金玉者至不生歸元元叩心更思莽朝又銅馬赤眉之屬數十輩軰數十百萬聖公不能辦也辦猶成也音蒲莧反其敗不久公首事南陽破百萬之軍今定河北北據天府之地前書曰關中所謂金城天府弇以河北富饒故以喻焉劉攽曰河北北據按文多一北字以義征伐發號響應天下可傳檄而定天下至重不可令它姓得之聞使者従西方来欲罷兵不可従也今吏士死亡者多弇願歸幽州益發精兵以集其大計劉攽曰按文多一其字光武大説續漢書曰光武初見弇言起坐曰卿失言我斬卿弇曰大王哀厚弇如父子故披赤心為大王陳事上曰我戲卿耳乃拜弇為大將軍與呉漢北發幽州十郡兵弇到上谷收韋順蔡充斬之漢亦誅苗曾於是悉發幽州兵引而南從光武擊破銅馬髙湖赤眉青犢又追尤来大槍五幡扵元氏弇常將精騎為軍鋒輙破走之光武乗勝戰慎水上虜危急殊死戰時軍士疲弊遂大敗奔還壁范陽數日乃振壁謂築壘壁也賊亦退去従追至容城小廣陽安次連戰破之容城縣名屬涿郡故城在今易州道縣也廣陽國有廣陽縣故曰小廣陽及安次縣名並在今幽州也光武還薊復遣弇與呉漢景丹蓋延朱祐邳彤耿純劉植岑彭祭遵堅鐔王霸陳俊馬武十三將軍追賊至潞東及平谷平谷解見光武紀再戰斬首萬三千餘級遂窮追扵右北平無終土垠之間無終土垠並縣名屬右北平郡無終故城在今漁陽縣土垠故城在今平州西南垠音銀至浚靡而還浚靡縣名屬右北平故城在今漁陽縣北靡音麻賊散入遼西遼東或為烏桓貊人所鈔擊略盡光武即位拜弇為建威大將軍與驃騎大將軍景丹彊弩將軍陳俊攻厭新賊於敖倉皆破降之建武二年更封好畤侯食好畤羙陽二縣三年延岑自武關出攻南陽下數城穰人杜􅒮率其衆以従岑弇與岑等戰於穰大破之斬首三千餘級生獲其將士五千餘人得印綬三百杜􅒮降岑與數騎遁走東陽弇従幸舂陵因見自請北收上谷兵未發者定彭寵扵漁陽取張豐扵涿郡還收富平獲索東攻張歩以平齊地帝壮其意乃許之四年詔弇進攻漁陽弇以父據上谷本與彭寵同功又兄弟無在京師者自疑不敢獨進上書求詣洛陽詔報曰將軍出身舉宗為國所向陷敵功效尤著何嫌何疑而欲求徴且與王常共屯涿郡勉思方略況聞弇求徴亦不自安遣舒弟國入侍帝善之進封況為隃麋侯隃麋縣名屬右扶風故城在今隴州汧陽縣東南隃音踰乃命弇與建義大將軍朱祐漢忠將軍王常等擊望都故安西山賊十餘營皆破之望都縣名屬中山國堯母慶都山在南故以名焉故城在今定州唐縣東北故安縣名故城在今易州易縣東南時征虜將軍祭遵屯良鄉良郷縣名屬涿郡驍騎將軍劉喜屯陽鄉陽郷縣名屬涿郡故城在今幽州故安縣西北以拒彭寵寵遣弟純將匈奴二千餘騎寵自引兵數萬分為兩道以撃遵喜胡騎經軍都軍都縣屬廣陽郡有軍都山在西北今幽州昌平縣舒襲破其衆斬匈奴兩王寵乃退走況復與舒攻寵取軍都五年寵死天子嘉況功使光禄大夫持節迎況袁山松書曰使光禄大夫樊宏詔況曰惟況功大不宜監察従事邉郡寒苦不足久居其詣行在所賜甲第奉朝請封牟平侯遣弇與呉漢擊富平獲索賊於平原大破之降者四萬餘人因詔弇進討張歩弇􅊖收集降卒結部曲置將吏率騎都尉劉歆太山太守陳俊引兵而東従朝陽橋濟河以度朝陽縣名屬濟南郡在朝水之陽今朝城在濟水北有漯河在今齊州臨濟縣東張歩聞之乃使其大將軍費邑軍歴下歴下城在今齊州歴城縣也又分兵屯祝阿祝阿今齊州縣也故城在今山荏縣東北别於太山鍾城列營數十以待弇弇度河先撃祝阿自旦攻城未中而拔之故開圍一角令其衆得奔歸鍾城鍾城人聞祝阿已潰大恐懼遂空壁亡去費邑分遣弟敢守巨里巨里聚名也一名巨合城在今齊州全節縣東南也弇進兵先脅巨里使多伐樹木揚言以填塞坑塹數日有降者言邑聞弇欲攻巨里謀来救之弇乃嚴令軍中趣修攻具宣勑諸部後三日當悉力攻巨里城隂緩生口令得亡歸歸者以弇期告邑邑至日果自將精兵三萬餘人来救之弇喜謂諸將曰吾所以修攻具者欲誘致邑耳今来適其所求也即分三千人守巨里自引精兵上岡阪爾雅曰山脊曰岡陂者曰阪乗髙合戰大破之臨陳斬邑既而收首級以示巨里城中城中兇懼兇恐懼聲音呼勇反費敢悉衆亡歸張歩弇復收其積聚縦兵撃諸未下者平四十餘營遂定濟南時張歩都劇使其弟藍將精兵二萬守西安西安縣名屬齊郡故城在今青州臨淄縣西北諸郡太守合萬餘人守臨淄相去四十里弇進軍畫中畫中邑名也畫音胡麥反故城在今西安城東南有澅水因名焉居二城之間弇視西安城小而堅且藍兵又精臨淄名雖大而實易攻乃勑諸校㑹㑹猶集也後五日攻西安藍聞之晨夜儆守至期夜半弇勑諸將皆蓐食前書音義曰未起而牀蓐中食也㑹眀至臨淄城護軍荀梁等争之以為宜速攻西安弇曰不然西安聞吾欲攻之日夜為備臨淄出不意而至必驚擾吾攻之一日必拔拔臨淄即西安孤張藍與歩隔絶必復亡去所謂擊一而得二者也若先攻西安不卒下頓兵堅城死傷必多縦能拔之藍引軍還奔臨淄并兵合勢觀人虚實吾深入敵地後無轉輸旬月之間不戰而困諸君之言未見其宜遂攻臨淄半日拔之入據其城張藍聞之大懼遂將其衆亡歸劇弇乃令軍中無得妄掠劇下須張歩至乃取之以激怒歩歩聞大笑曰以尤來大槍十餘萬衆吾皆即其營而破之今大耿兵少於彼弇況之長子故呼為大耿又皆疲勞何足摧乎乃與三弟藍𢎞夀及故大槍渠帥重異等兵重姓異名號二十萬至臨淄大城東將攻弇袁山松書曰弇上書曰臣據臨淄深塹髙壘張歩従劇縣来攻疲勞饑渇欲進誘而攻之欲去随而擊之臣依營而戰精鋭百倍以逸待勞以實擊虛旬日之間歩首可獲上是其計也弇先出淄水上與重異遇突騎欲縦弇恐挫其鋒令歩不敢進故示弱以盛其氣乃引歸小城陳兵於内伏琛齊地記曰小城内有漢景王祠歩氣盛直攻弇營與劉歆等合戰弇升王宫壊臺望之臨淄夲齊國所都即齊王宫中有壊䑓也東觀記作環䑓視歆等鋒交乃自引精兵以横突歩陳於東城下大破之飛矢中弇股以佩刀截之左右無知者至暮罷弇眀旦復勒兵出是時帝在魯聞弇為歩所攻自往救之未至陳俊謂弇曰劇虜兵盛可且閉營休士以須上来弇曰乗輿且到臣子當擊牛釃酒以待百官反欲以賊虜遺君父邪乃出兵大戰自旦及昏復大破之殺傷無數城中溝塹皆滿弇知歩困將退豫置左右翼為伏以待之兩旁伏兵如鳥之翼人定時歩果引去伏兵起縦擊追至鉅昧水上鉅昧水名一名巨浮水在今青州夀光縣西八九十里僵尸相屬收得輜重二千餘兩歩還劇兄弟各引兵散去後數日車駕至臨淄自勞軍羣臣大㑹帝謂弇曰昔韓信破歴下以開基前書曰齊屯田於歴下以備漢信撃破之今將軍攻祝阿以發迹此皆齊之西界功足相方而韓信襲擊已降前書曰酈食其説齊王田廣廣降之乃與食其縦酒罷守備韓信聞齊已降欲止蒯通説信令擊之食其音異基也將軍獨拔勍敵其功乃難扵信也又田横亨酈生及田横降高帝詔衞尉不聽為仇前書曰齊既破横走居海島髙帝召之横曰臣亨陛下之使酈食其今聞其弟商為衞尉臣恐懼不敢奉詔高帝詔酈商曰横即至敢動者族之張歩前亦殺伏隆若歩来歸命吾當詔大司徒釋其怨大司徒伏湛即隆之父又事尤相類也將軍前在南陽建此大策謂弇従帝幸舂陵時請收上谷兵定彭寵取張豐平張歩等常以為落落難合落落猶疏闊也有志者事竟成也弇因復追歩歩奔平夀平夀縣名屬北海郡故城在今青州北海縣乃肉袒負斧鑕於軍門鑕鍖也示必死鍖音竹林反弇傳歩詣行在所而勒兵入據其城樹十二郡旗鼓東觀記曰弇凡平城陽琅琊髙密膠東東莱北海齊千乗濟南平原泰山臨淄等令歩兵各以郡人詣旗下衆尚十餘萬輜重七千餘兩皆罷遣歸鄉里弇復引兵至城陽降五校餘黨祝阿餘黨也齊地悉平振旅還京師六年西拒隗囂屯兵於漆漆縣名屬右扶風故城在今豳州新平縣也漆水在西八年従上隴眀年與中郎將來歙分部徇安定北地諸營保皆下之弇凡所平郡四十六屠城三百未嘗挫折十二年況疾病乗輿數自臨幸復以國弟廣舉並為中郎將弇兄弟六人皆垂青紫省侍醫藥當代以為榮及況卒諡烈侯少子霸襲況爵十三年增弇户邑上大將軍印綬罷上音時掌反以列侯奉朝請每有四方異議輙召入問籌策年五十六永平元年卒謚曰愍侯子忠嗣忠以騎都尉擊匈奴於天山有功忠卒子馮嗣馮卒子良嗣一名無禁延光中尚安帝妹濮陽長公主位至侍中良卒子協嗣隃麋侯霸卒子文金嗣文金卒子喜嗣喜卒子顯嗣為羽林左監顯卒子援嗣尚桓帝妺長社公主為河陽太守後曹操誅耿氏唯援孫􅒮存焉決録注云援字伯緒官至河東太守也牟平侯舒卒子襲嗣尚顯宗女隆慮公主襲卒子寳嗣寳女弟為清河孝王妃及安帝立尊孝王母為孝徳皇后以妃為甘園大貴人帝以寳元舅之重使監羽林左車騎劉攽曰按百官志羽林左右監監左右騎不合有車字位至大將軍而附事内寵與中常侍樊豐帝乳母王聖等譛廢皇太子為濟隂王及排陷太尉楊震議者怨之寳弟子承襲公主爵為林慮侯林慮即上隆慮也至此避殤帝諱改焉位至侍中安帝崩閻太后以寳等阿附嬖倖共為不道策免寳及承皆貶爵為亭侯遣就國寳於道自殺國除決録注曰寳字君逹大貴人數為耿氏請陽嘉三年順帝遂詔封寳子劉攽曰按前後皆作紹封此誤箕牟平侯為侍中以恒為陽亭侯承為羽林中郎將其後貴人薨大將軍梁冀従承求貴人珍玩不􅀎得冀怒風有司奏奪其封承惶恐遂亡匿於穰數年冀推迹得之乃并族其家十餘人論曰淮隂廷論項王審料成埶則知高祖之廟勝矣淮隂侯韓信也史記韓信説髙祖曰項王特匹夫之勇婦人之仁也名雖霸實失天下心今大王入闗秋毫無所取秦人無不欲得大王王秦者今大王舉而東三秦可傳檄而定於是漢王舉兵定三秦廟勝謂謀兵於廟而勝敵弇決策河北劉攽曰按他傳賛語無单言名者眀少一耿字下文乃可言弇耳定計南陽亦見光武之業成矣然弇自剋拔全齊而無復尺寸功夫豈不懐懐思也言豈不思重立大功乎將時之度數不足以相容乎三世為將道家所忌史記曰秦使王翦之孫王離撃趙或曰王離秦之名將舉之必矣客曰不然夫將三代必敗以其殺伐多也其後受其不祥劉攽曰注以其殺伐多也按文多一也字而耿氏累葉以功名自終將其用兵欲以殺止殺乎何其獨能隆也國字叔慮東觀記慮作憲建武四年初入侍光武拜為黄門侍郎應對左右帝以為能遷射聲校尉七年射聲官罷拜駙馬都尉父況卒國於次當嗣上疏以先侯愛少子霸固自陳讓有詔許焉後歴頓丘陽翟上蔡令所在吏人稱之徵為五官中郎將是時烏桓鮮卑屢㓂外境國素有籌策數言邉事帝器之及匈奴薁鞬日逐王比自立為呼韓邪單于欵塞稱藩願扞禦北虜事下公卿議者皆以為天下初定中國空虚夷狄情偽難知不可許國獨曰臣以為宜如孝宣故事受之宣帝甘露二年呼韓邪單于欵塞請朝帝發所過郡二千騎迎之寵以殊禮位在諸侯王上賛謁稱臣而不名令東扞鮮卑北拒匈奴率厲四夷完復邉郡使塞下無晏開之警晏晚也有警急則開門晚也萬世有安寜之策也劉攽曰按文多有字縁上言無遂妄生此對文非也帝従其議遂立比為南單于由是烏桓鮮卑保塞自守北虜逺遁中國少事二十七年代馮勤為大司馬又上言宜置度遼將軍左右校尉屯五原以防逃亡永平元年卒官顯宗追思國言後遂致度遼將軍劉攽曰按致當作置左右校尉如其議焉國二子秉夔秉字伯初有偉體腰帶八圍博通書記能説司馬兵法尤好將帥之略以父任為郎數上言兵事常以中國虚費邊陲不寜其患專在匈奴以戰去戰盛王之道顯宗既有志北伐隂然其言永平中召詣省闥問前後所上便宜方略拜謁者僕射遂見親幸每公卿㑹議常引秉上殿訪以邊事多簡帝心十五年拜駙馬都尉十六年以騎都尉秦彭為副與奉車都尉竇固等俱北伐匈奴虜皆奔走不戰而還十七年夏詔秉與固合兵萬四千騎復出白山擊車師車師有後王前王前王即後王之子其廷相去五百餘里固以後王道逺山谷深士卒寒苦欲攻前王秉議先赴後王以為并力根夲則前王自服固計未決秉奮身而起曰請行前乃上馬引兵北入衆軍不得已遂進並縦兵抄掠斬首數千級收馬牛十餘萬頭後王安得震怖縦數百騎出迎秉而固司馬蘇安欲全功歸固即馳謂安得曰漢貴將獨有奉車都尉天子姊壻固尚光武女湼陽公主眀帝姊也爵為通侯當先降之安得乃還更令其諸將迎秉秉大怒被甲上馬麾其精騎徑造固壁言曰車師王降訖今不至請往梟其首固大驚曰且止將敗事秉厲聲曰受降如受敵遂馳赴之安得惶恐走出門脱帽抱馬足降東觀記曰脱帽趨抱馬蹏也秉將以詣固其前王亦歸命遂定車師而還眀年秋肅宗即位拜秉征西將軍遣案行涼州邉境勞賜保塞羌胡進屯酒泉救戊巳校尉建初元年拜度遼將軍視事七年匈奴懐其㤙信徴為執金吾甚見親重帝每巡郡國及幸宫觀秉常領禁兵宿衞左右除三子為郎章和二年復拜征西將軍副車騎將軍竇憲擊北匈奴大破之事并見憲傳封秉羙陽侯食邑三千户秉性勇壮而簡易於事軍行常自被甲在前休止不結營部然逺斥候眀要誓有警軍陳立成士卒皆樂為死永元二年代桓虞為光禄勲眀年夏卒時年五十餘賜以朱棺玉衣將作大匠穿冢假鼓吹五營騎士三百餘人送𦵏諡曰桓侯匈奴聞秉卒舉國號哭或至棃面流血棃即􅋇字古通用􅋇割也音力私反長子沖嗣及竇憲敗以秉竇氏黨國除沖官至漢陽太守曾孫紀少有羙名辟公府曹操甚敬異之稍遷少府紀以操將簒漢建安二十三年與太醫令吉㔻㔻或作平丞相司直韋況晃曅謀起兵誅操不克夷三族于時衣冠盛門坐紀罹禍滅者衆矣夔字定公少有氣決永元初為車騎將軍竇憲假司馬北擊匈奴轉車騎都尉劉攽曰按官無車騎都尉明衍車字三年憲復出河西以􅇪為大將軍左校尉將精騎八百出居延塞直奔北單于廷於金㣲山斬閼氏名王已下五千餘級單于與數騎脱亡盡獲其匈奴珍寳財畜去塞五千餘里而還自漢出師所未嘗至也乃封夔粟邑侯粟邑縣名屬左馮翊故城在今同州白水縣西北㑹北單于弟左鹿蠡王於除鞬自立為單于衆八部二萬餘人來居蒲類海上遣使欵塞以夔為中郎將持節衞護之及竇憲敗夔亦免官奪爵土後復為長水校尉拜五原太守遷遼東太守元興元年貊人寇郡界夔追擊斬其渠帥永初三年南單于檀反畔使夔率鮮卑及諸郡兵屯鴈門與車騎將軍何熙共擊之熙推夔為先鋒而遣其司馬耿溥劉祉將二千人與夔俱進到屬國故城單于遣薁鞬日逐王三千餘人遮漢兵夔自擊其左令鮮卑攻其右虜遂敗走追斬千餘級殺其名王六人獲穹廬車重千餘兩馬畜生口甚衆鮮卑馬多羸病遂畔出塞夔不䏻獨進以不窮追左轉雲中太守後遷行度遼將軍事夔勇而有氣數侵陵匈奴中郎將鄭戩音翦元初元年坐徴下獄以减死論笞二百建光中復拜度遼將軍時鮮卑攻殺雲中太守成嚴圍烏桓校尉徐常於馬城馬城縣名屬代郡故城在今雲中定襄縣秦始皇初築城輒崩壊其後有馬周章馳走因随馬迹起城故以名焉夔與幽州刺史龎參救之追虜出塞而還後坐法免卒於家恭字伯宗國弟廣之子也少孤慷慨多大略有將帥才永平十七年冬騎都尉劉張出撃車師請恭為司馬與奉車都尉竇固及従弟駙馬都尉秉破降之始置西域都護戊巳校尉乃以恭為戊巳校尉屯後王部金蒲城金蒲城車師後王城廷也今延州蒲昌縣城是也謁者關寵為戊巳校尉劉攽曰案戊巳夲是兩校尉故耿恭闗寵各為一校今都為戊巳校尉盖流俗不知漢書以理觀之恭是戊校寵是已校也屯前王栁中城栁中今西州縣屯各置數百人恭至部移檄烏孫示漢威德大昆彌已下皆歡喜遣使獻名馬及奉宣帝時所賜公主博具武帝元封中遣江都王建女細君為公主嫁與烏孫昆莫賜乗輿服御官屬侍御數百人贈送甚盛盖後宣帝賜以博具也願遣子入侍恭乃發使齎金帛迎其侍子眀年三月北單于遣左鹿蠡王二萬騎撃車師恭遣司馬將兵三百人救之道逄匈奴騎多皆為所殁匈奴遂破殺後王安得而攻金蒲城恭乗城摶戰以毒藥傅矢傳語匈奴曰漢家箭神其中瘡者必有異因發彊弩射之虜中矢者視創皆沸遂大驚㑹天暴風雨随雨擊之殺傷甚衆匈奴震怖相謂曰漢兵神真可畏也遂解去恭以疏勒城傍有澗水可固五月乃引兵據之七月匈奴復来攻恭恭募先登數千人直馳之胡騎散走匈奴遂於城下擁絶澗水恭於城中穿井十五丈不得水吏士渇乏笮馬糞汁而飲之笮謂壓笮也恭仰嘆曰聞昔貳師將軍拔佩刀刺山飛泉涌出貳師大宛中城名昔武帝時使李廣利伐大宛期至貳師城因以為號也今漢徳神眀豈有窮哉乃整衣服向井再拜為吏士禱有頃水泉奔出衆皆稱萬嵗乃令吏士揚水以示虜東觀記曰恭親自挽籠於是令士且勿飲先和泥塗城并揚示之虜出不意以為神眀遂引去時焉耆龜兹攻歿都䕶陳睦北虜亦圍關寵於栁中㑹顯宗崩救兵不至車師復畔與匈奴共攻恭恭厲士衆擊走之後王夫人先世漢人常私以虜情告恭又給以糧餉數月食盡窮困乃煑鎧弩食其筋革恭與士推誠同死生故皆無二心而稍稍死亡餘數十人單于知恭已困欲必降之復遣使招恭曰若降者當封為白屋王妻以女子恭乃誘其使上城手擊殺之炙諸城上虜官屬望見號哭而去單于大怒更益兵圍恭不能下初闗寵上書求救時肅宗新即位乃詔公卿㑹議司空第五倫以為不宜救司徒鮑昱議曰今使人於危難之地急而棄之外則縦蠻夷之暴内則傷死難之臣誠令權時後無邉事可也匈奴如復犯塞為寇陛下將何以使將又二部兵人裁各數十二部謂闗寵及恭也匈奴圍之歴旬不下是其寡弱盡力之效也可令敦煌酒泉太守各將精騎二千多其幡幟倍道兼行以赴其急匈奴疲極之兵必不敢當四十日間足還入塞帝然之乃遣征西將軍耿秉屯酒泉行太守事遣秦彭與謁者王䝉皇甫援發張掖酒泉敦煌三郡及鄯善兵合七千餘人建初元年正月㑹栁中擊車師攻交河城前書曰車師前王居交河城河水分流繞城下故號交河去長安八千一百五十里故城在今西州交河縣也斬首三千八百級獲生口三千餘人駝驢馬牛羊三萬七千頭北虜驚走車師復降東觀記曰車師太子比持訾降㑹闗寵已歿䝉等聞之便欲引兵還先是恭遣軍吏范羌至敦煌迎兵士寒服羌因随王蒙軍俱出塞羌固請迎恭諸將不敢前乃分兵二千人與羌従山北迎恭遇大雪丈餘軍僅能至城中夜聞兵馬聲以為虜来大驚羌乃遥呼曰我范羌也漢遣軍迎校尉耳城中皆稱萬嵗開門共相持涕泣眀日遂相随俱歸虜兵追之且戰且行吏士素饑困發疏勒時尚有二十六人随路死歿三月至玉門玉門闗名屬敦煌郡在今沙州臣賢按酒泉郡又有玉門縣據東觀記曰至敦煌明即玉門闗也唯餘十三人衣屨穿決形容枯槁中郎將鄭衆為恭已下洗沐易衣冠上疏曰耿恭以單兵固守孤城當匈奴之衝對數萬之衆連月踰年心力困盡鑿山為井煑弩為糧出於萬死無一生之望前後殺傷醜虜數千百計卒全忠勇不為大漢恥恭之節義古今未有宜䝉顯爵以厲將帥及恭至雒陽鮑昱奏恭節過蘇武宜蒙爵賞於是拜為騎都尉以恭司馬石脩為雒陽市丞張封為雍營司馬軍吏范羌為共丞共今衞州共城縣餘九人皆補羽林恭母先卒及還追行喪制有詔使五官中郎將據東觀記馬嚴齎牛酒釋服奪情不令追服眀年遷長水校尉其秋金城隴西羌反恭上疏言方略詔召入問状乃遣恭將五校士三千人副車騎將軍馬防討西羌恭屯枹罕數與羌接戰眀年秋燒當羌降防還京師恭留擊諸未服者首虜千餘人獲牛羊四萬餘頭勒姐姐音紫又子也反燒何羌等十三種數萬人皆詣恭降初恭出隴西上言故安豐侯竇融昔在西州甚得羌胡腹心今大鴻臚固即其子孫前擊白山功冠三軍宜奉大使鎮撫涼部令車騎將軍防屯軍漢陽以為威重由是大忤扵防忿恭薦竇固奪其權及防還監營謁者李譚承旨奏恭不憂軍事被詔怨望坐徴下獄免官歸夲部卒於家子溥為京兆虎牙都尉溥音普漢官儀曰京兆虎牙都尉扶風郡比二千石以涼州近羌數犯三輔将兵䕶園陵劉攽曰案注文言扶風郡不成文理當云扶風都尉誤一字少一字檢百官志是時置此兩官也元初二年擊畔羌於丁奚城軍敗遂歿詔拜溥子宏曅並為郎曅字季遇順帝初為烏桓校尉遇或作過時鮮卑寇緣邉殺代郡太守曅率烏桓及諸郡卒出塞討撃大破之鮮卑震怖數萬人詣遼東降自後頻出輙克獲威振北方遷度遼將軍耿氏自中興已後迄建安之末大將軍二人將軍九人卿十三人尚公主三人列侯十九人中郎將䕶羌校尉及刺史二千石數十百人遂與漢興衰云論曰余初讀蘇武傳感其茹毛窮海不為大漢羞蘇武武帝時使匈奴匈奴乃幽囚武於大窖中絶不飲食天雨雪武臥齧雪與氊毛并咽之數日不死匈奴以為神乃徙武北海上無人處二十年乃還也後覽耿恭疏勒之事喟然不覺涕之無従嗟哉義重於生以至是乎孟子曰生者我所欲義者亦我所欲二者不可俱捨生而取義也昔曹子抗質於柯盟曹子魯大夫曹劌也一曰曺沬史記曰齊桓公與魯荘公㑹於柯而盟曹沬執匕首劫齊桓公曰齊彊魯弱而大國侵魯亦已甚矣今城壊壓境君其圖之桓公乃盡還魯之侵地而與之盟相如申威於河表相如解見寇怐傳也盖以決一旦之負異乎百死之地也以為二漢當疏髙爵宥十世左傳曰晉范宣子之殺叔向之弟羊舌虎而囚叔向於是祁奚聞之見宣子曰謀而鮮過恵訓不倦者叔向有焉猶將十世宥之以勸能者也而蘇君恩不及嗣恭亦終填牢户追誦龍蛇之章以為歎息史記曰晉文公返國賞従亡者介子推不言禄禄亦不及縣書宫門曰龍欲上天五蛇為輔龍已升天四蛇各入其宇一蛇獨怨終不見處也贊曰好畤經武能畫䏻兵往收燕卒来集漢營請間趙殿釃酒齊城況舒率従亦既有成國圗久策分此凶狄謂耿國議立日逐王為南單于由是鮮卑保塞自守北虜逺遁也秉洽胡情夔單虜迹慊慊伯宗枯泉飛液後漢書卷四十九後漢書卷四十九考證耿弇傳㑹王郎詐稱成帝子輿起兵邯鄲諸夲同臣承蒼按成帝子下當複出一子字令詣于光武于字似衍文諸將擅命於畿内諸夲同臣㑹汾按下云貴戚縦横於都内二句相對為文畿内當作畿外諸將方征伐四方不得云内也觀注自眀臣承蒼按貴戚謂趙萌也更始傳更始納萌女為夫人萌專權威福自已注但以王匡張卬當之猶未得實従追至容城注在今易州道縣也諸夲同道縣地理志作遒縣使監羽林左車騎注百官志志字監夲訛作序今改正秉弟䕫轉車騎都尉劉攽刋訛衍車字臣承蒼按是時竇憲為車騎將軍故䕫之官轉為車騎都尉其後憲為大將軍䕫之官又轉為大將軍左校衞車字非衍也盡獲其匈奴珍寳財蓄推尋文義其字當是衍文圍烏桓校尉徐常於馬城注馬城屬代郡故城在今雲州定襄縣秦始皇初築城輙崩壊其後有馬周章馳走因随馬迹起城故以名焉臣㑹汾按因馬迹築城是雁門之馬邑非代郡之馬城章懐此注盖誤記漢書注耳後漢書卷四十九考證
