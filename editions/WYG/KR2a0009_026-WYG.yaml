  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2a0009_WYG_026-1a, image: WYG0252/WYG0252-0340a.png}
body:
  text: 後漢書卷二十六梁剡令劉昭補并注五行志第十六五行四地震拔樹大風山崩螟地䧟牛疫五行傳曰治宫室飾臺榭内淫亂犯親戚侮父兄則稼穡不成謂土失其性而爲灾也又曰思心不容是謂不聖厥咎霿厥罰恒風厥極凶短折時則有脂夜之妖時則有華孽時則有牛禍時則有心腹之痾時則有黄眚黄祥惟金水木火沴土華孽劉歆傳為蠃蟲之孽謂螟屬也世祖建武二十二年九月郡國四十二地震南陽尤甚地裂壓殺人其後武谿蠻夷反為宼害至南郡發荆州諸郡兵遣武威將軍劉尚擊之爲夷所圍復發兵赴之尚遂為所没章帝建初元年三月甲申山陽東平地震和帝永元四年六月丙辰郡國十三地震春秋漢含孳曰女主盛臣制命則地動坼畔震起山崩淪是時竇太后攝政兄竇憲專權將以是受禍也後五日詔牧憲印綬兄弟就國逼廹皆自殺五年二月戊午隴西地震儒說民安土者也將大動行大震九月匈奴單于於除難鞬叛遣使發邉郡兵討之七年九月癸卯京都地震儒説奄官無陽施猶婦人也是時和帝與中常侍鄭衆謀奪竇氏權徳之因任用之及幸常侍蔡倫二人始並用權九年三月庚辰隴西地震閏月塞外羌犯塞殺略吏民使征西將軍劉尚擊之安帝永初元年郡國十八地震李固曰地者隂也法當安靜今乃越隂之職專陽之政故應以震動是時鄧太后攝政專事訖建光中太后崩安帝乃得制政於是隂類並勝西羌亂夏連十餘年二年郡國十二地震三年十二月辛酉郡國九地震四年三月癸巳郡國四地震五年正月丙戌郡國十地震七年正月壬寅二月丙午郡國十八地震元初元年郡國十五地震二年十一月庚申郡國十地震三年二月郡國十地震十一月癸卯郡國九地震四年郡國十三地震五年郡國十四地震六年二月乙巳京都郡國四十二地震或地坼裂涌水敗壞城郭民室屋壓人冬郡國八地震永寜元年郡國二十三地震建光元年九月己丑郡國三十五地震或地坼裂壞城郭室屋壓殺人是時安帝不能明察信宫人及阿母聖等讒云破壞鄧太后家於是專聽信聖及宦者中常侍江京樊豐等皆得擅權延光元年七月癸卯京都郡國十三地震九月戊申郡國二十七地震二年京都郡國三十二地震三年京都郡國二十三地震是時以讒免太尉楊震廢太子四年十月丁巳京都郡國十六地震時安帝既崩閻太后攝政兄弟閻顯等並用事遂斥安帝子更徴諸國王子未至中黄門遂誅顯兄弟順帝永建三年正月丙子京都漢陽地震漢陽屋壞殺人地坼涌水出是時順帝阿母宋娥及中常侍張昉等用權陽嘉二年四月己亥京都地震是時爵號宋娥為山陽君四年十二月甲寅京都地震永和二年四月庚申京都地震是時宋娥構姦誣罔五月事覺収印綬歸田里十一月丁卯京都地震是時太尉王龔以中常侍張昉等專弄國權欲奏誅之時龔宗親有以楊震行事諌之止云三年二月乙亥京都金城隴西地震裂城郭室屋多壞壓殺人閏月己酉京都地震十月西羌二千餘騎入金城塞爲涼州害四年三月乙亥京都地震五年二月戊申京都地震建康元年正月凉州都郡六地震從去年九月以來至四月凡百八十日震山谷坼裂壞敗城寺傷害人物三月護羌校尉趙冲為叛胡所殺九月丙午京都地震是時順帝崩梁太后攝政欲為順帝作陵制度奢廣多壞吏民冡尚書欒巴諌事太后怒癸卯詔書收巴下獄欲殺之丙午地震於是太后乃出巴免為庻人桓帝建和元年四月庚寅京都地震九月丁卯京都地震是時梁太后攝政兄冀持權至和平元年太后崩然冀猶秉政專事至延熹二年乃誅滅三年九月己卯地震庚寅又震元嘉元年十一月辛巳京都地震二年正月丙辰京都地震十月乙亥京都地震永興二年二月癸卯京都地震永夀二年十二月京都地震延熹四年京都右扶風涼州地震五年五月乙亥京都地震是時桓帝與中常侍單超等謀誅除梁冀聽之並使用事專權又鄧皇后本小人性行無恒茍有顔色立以為后後卒坐執左道廢以憂死八年九月丁未京都地震靈帝建寜四年二月癸卯地震是時中常侍曹節王甫等皆專權熹平二年六月地震六年十月辛丑地震光和元年二月辛未地震四月丙辰地震靈帝時宦者專恣二年三月京兆地震三年自秋至明年春酒泉表氏地八十餘動涌水出城中官寺民舎皆䪺縣易處更築城郭獻帝初平二年六月丙戌地震興平元年六月丁丑地震和帝永元元年七月㑹稽南山崩㑹稽南方大名山也京房易傳曰山崩隂乘陽弱勝强也劉向以為山陽君也水陰民也君道崩壊百姓失所也劉歆以為崩猶地也是時竇太后攝政兄竇顯專權七年七月趙國易陽地裂京房易傳曰地裂者臣下分離不肯相從也是時南單于衆乖離漢軍追討十二年夏閏四月戊辰南郡秭歸山髙四百丈崩塡谿殺百餘人明年冬至蠻夷反遣使募荆州吏民萬餘人擊之元興元年五月癸酉右扶風雍地裂是後西羌大宼涼州殤帝延平元年五月壬辰河東恒山崩是時鄧太后專政秋八月殤帝崩安帝永初元年六月丁巳河東楊地䧟東西百四十步南北百二十步深三丈五尺六年六月壬辰豫章員谿原山崩各六十三所元初元年三月己卯日南地坼長百八十二里其後三年正月蒼梧鬱林合浦盜賊群起劫略吏民二年六月河南雒陽新城地裂延光二年七月丹陽山崩四十七所三年六月庚午巴郡閬中山崩四年十月丙午蜀郡越嶲山崩殺四百餘人丙午天子㑹日也是時閻太后攝政其十一月中黄門孫程等殺江京立順帝誅閻后兄弟明年閻后崩順帝陽嘉二年六月丁丑雒陽宣徳亭地坼長八十五丈近郊地時李固對䇿以為隂類專恣將有分離之象所以附郊城者是上帝示象以誡陛下也是時宋娥及中常侍各用權分爭後中常侍張逵蘧政與大將軍梁商争權為商作飛語欲䧟之桓帝建和元年四月郡國六地裂水涌出井溢壊寺屋殺人時梁太后攝政兄冀枉殺李固杜喬三年郡國五山崩和平元年七月廣漢梓潼山崩永興二年六月東海朐山崩冬十二月泰山琅邪盜賊羣起永夀三年七月河東地裂時梁皇后兄冀秉政桓帝欲自由内患之延熹元年七月乙巳左馮翊雲陽地裂三年五月戊申漢中山崩是時上寵恣中常侍單超等四年六月庚子泰山博尤來山判解八年六月丙辰緱氏地裂永康元年五月丙午雒陽髙平永夀亭上黨泫工𤣥反氏地各裂是時朝臣患中常侍王甫等專恣冬桓帝崩明年竇氏等欲誅常侍黄門不果更為所誅靈帝建寜四年五月河東地裂十二處裂合長十里百七十步廣者三十餘步深不見底和帝永元五年五月戊寅南陽大風㧞樹木安帝永初元年大風拔樹是時鄧太后攝政以清河王子年少號精耳故立之是為安帝不立皇太子勝以爲安帝賢必當德鄧氏也後安帝親讒廢免鄧氏令郡縣廹切死者八九人家至破壊此爲瞽霿也是後西羌亦大亂涼州十有餘年二年六月京都及郡國四十八大風拔樹三年五月癸酉京都大風拔南郊道梓樹九十六枚七年八月丙寅京都大風拔樹元初二年二月癸亥京都大風拔樹六年夏四月沛國勃海大風拔樹三萬餘枚延光二年三月丙申河東潁川大風拔樹六月壬午郡國十一大風拔樹是時安帝親讒曲直不分三年京都及郡國三十六大風拔樹靈帝建寜二年四月癸巳京都大風雨雹拔郊道樹十圍已上百餘枚其後晨迎氣東郊道於雒水西橋逢暴風雨道鹵簿車或發蓋百官霑濡還不至郊使有司行禮迎氣西郊亦壹如此中平五年六月丙寅大風拔樹獻帝初平四年六月右扶風大風發屋拔木中興以來脂夜之妖無録者章帝七八年間郡縣大螟傷稼語在魯㳟傳而紀不録也是時章帝用竇皇后讒害宋梁二貴人廢皇太子靈帝熹平四年六月𢎞農三輔螟蟲為害是時靈帝用中常侍曹節等讒言禁錮海内清英之士謂之黨人中平二年七月三輔螟蟲為害明帝永平十八年牛疫死是嵗遣竇固等征西域置都護戊巳校尉固等適還而西域叛殺都護陳睦戊巳校尉闗寵於是大怒欲復發興討㑹秋明帝崩是思心不容也章帝建初四年冬京都牛大疫是時竇皇后以宋貴人子為太子寵幸令人求伺貴人過隙以讒毁之章帝不知竇太后不善厥咎霿也或曰是年六月馬太后崩土功非時興故也後漢書卷二十六
