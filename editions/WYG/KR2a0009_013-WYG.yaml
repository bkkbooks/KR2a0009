body:
  text: 後漢書卷十三梁剡令劉昭補并注律厯志第三律厯下厯法昔者聖人之作厯也觀琁璣之運三光之行道之發斂景之長短斗綱之建青龍所躔參伍以變錯綜其數而制術焉天之動也一晝一夜而運過周星從天而西日違天而東日之所行與運周在天成度在厯成日居以列宿終於四七受以甲乙終於六旬日月相推日舒月速當其同謂之合朔舒先速後近一逺三謂之弦相與為衡分天之中謂之望以速及舒光盡體伏謂之晦晦朔合離斗建移辰謂之日月之行則有冬有夏冬夏之間則有春有秋是故日行北陸謂之冬西陸謂之春南陸謂之夏東陸謂之秋日道發南去極彌逺其景彌長逺長乃極冬乃至焉日道斂北去極彌近其景彌短近短乃極夏乃至焉二至之中道齊景正春秋分焉日周於天一寒一暑四時備成萬物畢改攝提遷次青龍移辰謂之嵗嵗首至也月首朔也至朔同日謂之章同在日首謂之蔀蔀終六旬謂之紀嵗朔又復謂之元是故日以實之月以閏之時以分之嵗以周之章以明之蔀以部之紀以記之元以原之然後雖有變化萬殊嬴朒無方莫不結系於此而禀正焉極建其中道營於外琁衡追日以察斂光道生焉孔壺為漏浮箭為刻下漏數刻以考中星昏明生焉日有光道月有九行九行出入而交生焉朔㑹望衡鄰於所交虧薄生焉月有晦朔星有合見月有弦望星有留逆其歸一也歩術生焉金水承陽先後日下速則先日遲而後留留而後逆逆與日違違而後速與日競競又先日遲速順逆晨夕生焉日月五緯各有終原而七元生焉見伏有日留行有度而率數生焉參差齊之多少均之㑹終生焉引而伸之觸而長之探賾索隠鉤深致逺無幽辟潛伏而不以其精者然故隂陽有分寒暑有節天地貞觀日月貞明若夫祐術開業淳燿天光重黎其上也顓頊曰重黎承聖帝之命若昊天典歴象三辰以授民事立閏定時以成嵗功羲和其隆也唐虞憂啇曰羲和取象金火革命創制治歴明時應天順民湯武其盛也月令章句曰帝舜叶時月正日湯武革命治歴明時言承平者叶之承亂者革之及王徳之衰也無道之君亂之於上頑愚之史失之於下夏后之時羲和滛湎廢時亂日𦙍乃征之紂作滛虐䘮其甲子武王誅之夫能貞而明之者其興也勃焉回而敗之者其亡也忽焉巍巍乎若道天地之綱紀帝王之壮事是以聖人寳焉君子勤之夫歴有聖人之徳六焉以本氣者尚其體以綜數者尚其文以考類者尚其象以作事者尚其時以占徃者尚其源以知來者尚其流大業載之吉凶生焉是以君子將有興焉咨焉而以從事受命而莫之違也若夫用天因地揆時施敎頒諸明堂以為民極者莫大乎月令帝王之大司備矣天下之能事畢矣過此而徃羣忌苟禁君子未之或知也斗之二十一度去極至逺也日在焉而冬至羣物於是乎生故律首黄鍾歴始冬至月先建子時平夜半當漢高皇帝受命四十有五嵗陽在上章隂在執除冬十有一月甲子夜半朔旦冬至日月閏積之數皆自此始立元正朔謂之漢歴又上兩元而月食五星之元並發端焉歴數之生也乃立儀表以校日景景長則日逺天度之端也日發其端周而為嵗然其景不復四周千四百六十一日而景復初是則日行之終以周除日得三百六十五四分度之一為嵗之日數日日行一度亦為天度察日月俱發度端即是起舍合朔日行十九周月行二百五十四周復㑹於端是則月行之終也以日周除月周得一嵗周天之數以日一周減之餘十二十九分之七則月行過周及日行之數也為一嵗之月以除一嵗日為一月之數月之餘分積滿其法得一月月成則其嵗月大四時推移故置十二中以定月位有朔而無中者為閏月中之始日節與中為二十四氣以除一嵗日為一氣之日數也其分積而成日為沒幷嵗氣之分如法為一嵗沒沒分於終中中終於冬至冬至之分積如其法得一日四嵗而終月分成閏閏七而盡其嵗十九名之曰章章首分盡四之俱終名之曰蔀以一嵗日乗之為蔀之日數也以甲子命之二十而復其初是以二十蔀為紀紀嵗青龍未終三終嵗後復青龍為元元法四千五百六十樂叶圖徴曰天元以甲子朔旦冬至日月起於牽牛之初右行二十八宿以考王者終始或盡一其歴數或不能盡一以四千五百六十為紀甲寅窮宋均曰紀即元也四千五百六十者五行相代一終之大數也王者即位或遇其統或不盡其數故一共以四千五百六十為甲寅之終也王者起必易元故不復㳂前而終言之也韓子曰四千五百六十嵗為一元元中有厄故聖人有九嵗之畜以備之也紀法千五百二十月令章句曰紀還復故歴紀月萬八千八百蔀法七十六月令章句曰七十六嵗為蔀首蔀月九百四十章法十九章月二百三十五月令章句曰十九嵗七閏月為一章周天千四百六十一日法四蔀日二萬七千七百五十九沒數二十一為章閏通法四百八十七沒法七因為章閏日餘百六十八中法四十二大周三十四萬三千三百三十五月周千一十六月食數之生也乃記月食之既者率二十三食而復既其月食百三十五率之相除得五百二十三之二十而一食以除一嵗之月得嵗有再食五百一十三分之五十也分終其法因以與蔀相約得四與二十七五之㑹二千五十二二十而與元㑹元㑹四萬一千四十蔀㑹三千五十三嵗數五百一十三食數千八十一月數百二十五食法二十二推入蔀術曰以元法除去上元其餘以紀法除之所得數從天紀算外則所入紀也不滿紀法者入紀年數也以蔀法除之所得數從甲子蔀起算外所入紀嵗名命之算上即所求年太嵗所在推月食所入蔀㑹年以元㑹除去上元其餘以蔀㑹除之所得以七十二乗之滿六十除去之餘以二十除所得數從天紀算之起外所以入紀不滿二十者數從甲子蔀起算外所入蔀㑹也其初不滿蔀㑹者入蔀㑹年數也各以不入紀嵗名命之算上即所求年蔀天紀嵗名地紀嵗名人紀嵗名蔀首甲子庚辰庚子庚申一癸卯丙申丙辰丙子二壬午壬子壬申壬辰三辛酉戊辰戊子戊申四庚子甲申甲辰甲子五己卯庚子庚申庚辰六戊午丙辰丙子丙申七丁酉壬申壬辰壬子八丙子戊子戊申戊辰九乙卯甲辰甲子甲申十甲午庚申庚辰庚子十一癸酉丙子丙申丙辰十二壬子壬辰壬午壬申十三辛卯戊申戊辰戊子十四庚午甲子甲申甲辰十五乙酉庚辰庚子庚申十六戊子丙申丙辰丙子十七丁卯壬子壬申壬辰十八丙午戊辰戊子戊申十九乙酉甲申甲辰甲子二十推天正術置入蔀年減一以章月乗之滿章法得一名為積月不滿為閏餘十二以上其嵗有閏推天正朔日置入蔀積月以蔀日乗之滿蔀月得一名為積日不滿為小餘積日以六十除去之其餘為大餘以所入蔀名命之算盡之外則前年天正十一月朔日也小餘四百四十一以上其月大求後月朔加大餘二十九小餘四百九十小餘滿蔀月得一上加大餘命之如前一術以大周乗年周天乗減之餘滿蔀日則天正朔日也推二十四氣術曰置入蔀年減一以月餘乗之滿中法得一名曰大餘不滿為小餘大餘滿六十除去之其餘以蔀名命之算盡之外則前年冬至之日也求次氣加大餘十五小餘七除命之如前小寒日也推閏月所在以閏餘減章法餘以十二乗之滿章閏數得一滿四以上亦得一算之數從前年十一月起算盡之外閏月也或進退以中氣定之推弦望日因其月朔大小餘之數皆加大餘七小餘三百五十九四分三小餘滿蔀月得一加大餘大餘命如法得上弦又加得望次下弦又後月朔其弦望小餘二百六十以下每以百刻乗之滿蔀月得一刻不滿其數近節氣夜漏之半者以算上為日推沒滅術置入蔀年減一以沒數乗之滿日法得一名為積没不盡為沒餘以通法乗積沒滿沒法得一名為大餘不盡為小餘大餘滿六十除去之其餘以蔀名命之算盡之外前年冬至前沒日也求後没加大餘六十九小餘四小餘滿沒法從大餘命之如前無分為滅一術以為五乗冬至小餘以減通法餘滿沒法得一則天正後沒也推合朔所在度置入蔀積月以日乗之滿大周除去之其餘滿蔀月得一名為積度不盡為餘分積度加斗二十一度加二百三十五分以宿次除之不滿宿則日月合朔所在星度也求後合朔加度二十九加分四百九十九分滿蔀月得一度經斗除二百三十五分一術以閏餘乗周天以減大周餘滿蔀月得一合以斗二十一度四分一則天正合朔日月所在度推日所在度置入蔀積日之數以蔀法乗之滿蔀日除去之其餘滿蔀法得一為積度不盡為餘分積度加斗二十一度加十九分以宿次除去之則夜半日所在宿度也求次日加一度求次月大加三十度小加二十九度經斗除十分一術以朔小餘減合度分即日夜半所在其分二百三十五約之十九乗之推月所在度置入蔀積日之數以月周乗之滿蔀日除去之其餘滿蔀法得一為積度不盡為餘分積度加斗二十一十分除如上法則所求之日夜半月所在宿度也求次日加十三度二十八分求次月大加三十五度六十一分月小二十二度三十三分分滿法得一度經斗除十九分其冬下旬月在張心署之謂盡漏分後盡漏盡也一術以蔀法除朔小餘所得以減日半度也餘以減分即月夜半所在度也推日明所入度分術曰置其月節氣夜漏之數以蔀法乗之二百除之得一分即夜半到明所行分也以增夜半日所在度分為明所在度分也求昬日所入度以夜半到明日所行分分減蔀法其餘即夜半到昬所行分也以加半夜所在度分為昬日所在度也推月明所入度分術曰置其節氣夜半之數以月周乗之以二百除之為積分積分滿蔀法得一以增夜半度即明月所在度也求昬月所入度以明積分減月周其餘滿蔀法得一度加夜半則昬月所在度也推弦望日所入星度術曰置合朔度分之數加七度三百五十九分四分之三宿次除之即得上弦日所入宿度分也求望下弦加除如前法小分四從大分滿蔀月從度推弦望月所入星度術曰置月合朔度分之數加度九十八加分六百五十三半以宿次除之即上弦月所入宿度分也求望下弦加除如前分滿蔀月從度推月食術曰置入蔀㑹年數減一以食數乗之滿嵗數得一名曰積食不滿為食餘以月數乗積滿食法得一名為積月不滿為月餘分積月以章月除去之其餘為入章月數當先除入章閏乃以十二除去之不滿者命以十一月算盡之外則前十一月前食月也求入章閏者置入章月以章閏乗之滿章月得一則入章閏數也餘分滿二百二十四以上至二百三十一為食在閏月閏或進退以朔日定之求後食加五百二十分滿法得一月數命之如法其分盡食算上推月食朔日術曰置食積月之數以二十九乗之為積日又以四百九十乗積月滿蔀月得一以幷積日以六十除之其餘以所㑹蔀名命之算盡之外則前年天正前食月朔日也求食日加大餘十四小餘七百一十九半小餘滿蔀月為大餘大餘命如前則食日也求後食朔及日皆加大餘二十七小餘六百一十五其月餘分不滿二十者文加大餘二十九小餘四百九十九其食小餘者當以漏刻課之夜漏未盡以算上為日一術以嵗數去上元餘以為積月以百一十二乗之滿月數去之餘滿食法得一則天正後食也推諸加時以十二乗小餘先減如法之半得一時其餘乃以法除之所得算之數從夜半子起算盡之外則所加時也推諸上水漏刻以百乗其小餘滿其法得一刻不滿法法什之滿法得一分積刻先減所入節氣夜漏之半其餘為晝上水之數過晝漏去之餘為夜上水數其刻不滿夜漏半者乃減之餘為昨夜未晝其弦望其日