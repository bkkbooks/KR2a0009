水後小旱有兵多病泄注腹痛未當至而至病臚腫大暑晷長三尺四寸當至不至外兵作來年飢多病筋痺胷痛未當至而至多病脛痛惡氣黍立秋晷長四尺三寸六分當至不至暴風為災来年不熟未當至而至多病咳上氣咽腫来處暑晷長五尺三寸二分當至不至國多浮令兵起年麥不熟未當至而至病脹耳熟不出行當白露晷長六尺二寸八分當至不至多病痤疽泄未至而至多病水腹閉疝瘕温秋分晷長七尺二寸四分當至不至草木復榮多病悲心痛未當至而至多病胷鬲痛寒露晷長八尺二寸當至不至来年穀不成六畜鳥獸被殃多病疝瘕腰痛未當至而至多病疢熟中霜降晷長九尺一寸六分當至不至萬物大耗年多大風人病腰痛未當至而至多病胷脇支滿立冬晷長丈一寸二分當至不至地氣不藏来年立夏反寒早旱晚水萬物不成未當至而至多病臂掌痛小雪晷長一丈一尺八分當至不至来年蠶麥不成多病脚腕痛未當至而至亦為多肘腋痛大雪晷長一丈二尺四分當至不至温氣泄夏蝗蟲生大水多病少氣五疸水腫未當至而至多病癰疽痛應在芒種月令章句曰周天三百六十五度四分度之一分為十二次日月之所躔也地有十二分王侯之所國也毎次三十二度三十三分之十四日至其初為節至其中為中氣衛自危十度至壁八度謂之豕韋之次立春驚蟄居之之分野自壁八度至冐一度謂之降婁之次雨水春分居之魯之分野趙自胃一度至畢六度謂之大梁之次清明糓雨居之之分野晉自畢六度至井十度謂之實沈之次立夏小滿居之之分野自井十度至柳三度謂之鶉首之次芒種夏至居之秦之分野之自柳三度至張十二度謂之鶉火之次小暑大暑居周之分野自張十二度至軫六度謂之鶉尾之次立秋䖏暑居之楚之分野鄭自軫六度至亢八度謂之夀星之次白露秋分居之之分野宋自亢八度至尾四度謂之大火之次寒露霜降居之之分野自尾四度至斗六度謂之析木之次立冬小雪居之燕之分野之自斗六度至須女二度謂之星紀之次大雪冬至居越之分野自湏女二度至危十度謂之𤣥枵之次小寒大寒居之齊之分野載蔡邕分星次度數與皇甫謐不同兼明氣節所在故焉謚所列在郡國志中星以日所在為正日行四嵗乃終置所求年二十四氣小餘四之如法為少大餘不盡三之如法為強弱以減節氣昏明中星而各定矣強正弱直也其强弱相減同名相去異名從之從強進少為弱從弱退少而強從上元太嵗在庚辰以來盡熹平三年嵗在甲寅積九千四百五十五嵗也宋世治歴何承天曰歴數之術若心所不逹雖復通人前識無救其弊是以多歴年嵗猶未能有定四分於天出三百年而盈一日積世不悟徒云建歴之本必先立元假託䜟緯遂開治亂此之為弊亦以甚矣劉歆三統法尤復疏闊方於四分六千餘年又益一日揚雄心惑其説採為太𤣥班固謂之最密著于漢志司馬彪曰自大初元年始用三統歴施行百有餘年曾不憶劉歆之生不逮太初二三君子為厯㡬乎不知而妄言者歟元和中糓城門候劉洪始悟四分於天疏闊更以五百八十九為紀法百四十五為斗分而造乾象法又制遲疾厯以歩月行方於太初四分轉精宻矣論曰易有太極是生兩儀兩儀之分尚矣乃有皇犧皇犧之有天下也未有書計厯載彌乆暨於黄帝班示文章重黎記註象應著名始終相驗凖度追元乃立厯數天難諶斯是以五三迄于來今各有改作不通用故黄帝造厯元起辛卯而顓頊用乙卯虞用戊午夏用丙寅殷用甲寅周用丁巳魯用庚子漢興承秦初用乙卯至武帝元封不與天合乃㑹術士作太初厯元以丁丑王莽之際劉歆作三統追太初前世一元得五星㑹庚戌之嵗以為上元太初厯到章帝元和旋復疏闊徴能術者課校諸厯定朔稽元追漢三十五年庚辰之嵗追朔一日乃與天合以為四分厯元加六百五元一紀上得庚申有近於緯而嵗不攝提以辨厯者得開其説而其元尠與緯同同則或不得於天然厯之興廢以疏宻課固不主於元光和元年中議郎蔡邕郎中劉洪補續律厯志邕能著文清濁鍾律洪能為算述敘三光今考論其業義指博通術數略舉是以集録為上下篇放續前志以備一家蔡邕戍邉上章曰朔方髠鉗徒臣邕稽首再拜上書皇帝陛下臣邕被受陛下尤異大恩初由宰府備數典城以叔父故衛尉質時為尚書召拜郎中受詔詣東觀著作遂與羣儒並拜議郎沐浴恩澤承答聖問前後六年質奉機宻趨走目下遂竟端右出相好藩還尹輦轂句日之中登躡上列父子一門兼受恩寵不能輸冩心力以效絲髮之功一旦被章䧟沒辜戮陛下天地之徳不忍刀鋸截臣首領得就平罪父子家屬徙充邉方完全軀命喘息相隨非臣無状所敢復望非臣罪惡所當復䝉非臣辭筆所能復陳臣初決罪雒陽詔獄生出牢户顧念元初中故尚書郎張俊坐漏泄事當伏重刑已出糓門復聽讀鞠詔書馳救一等輸作左校俊上書謝恩遂以轉徙郡縣促遣徧於吏手不得頃息含辭抱悲無由上逹既到徙所乗塞守烽職在候望憂怖焦灼無心復能操筆成草致章闕庭誠知聖朝不責臣謝但愚心有所不竟臣自在布衣常以為漢書十志下盡王莽而世祖以来唯有紀傳無續志者臣所師事故太傅胡廣知臣頗識其門户略以所有舊事雖未備悉粗見首尾積累思惟二十餘年不在其位非外吏庶人所得擅述天誘其𠂻得備著作郎建言十志皆當撰録遂與議郎張華等分受之所使元順難者皆以付臣先治律厯以籌算為本天文為驗請太師舊注考校連年徃徃頗有差舛當有增損乃可施行為無窮法道至深㣲不敢獨議郎中劉洪宻於用算故臣表上洪與共參思圖牒尋繹適冇頭角㑹臣被罪遂放邉野臣竊自痛一為不善使史籍所闕胡廣所校二十年之恩中道廢絶不得䆒竟慺慺之情猶以結心不能違望臣初欲須刑竟乃因縣道具以状聞今年七月九日匈奴始攻郡鹽池縣其時鮮卑連犯雲中五原一月之中烽火不絶不言四夷相與合謀所圗廣逺恐遂為變不知所濟郡縣咸懼不守朝旦臣所在孤危懸命鋒鏑湮滅土灰呼吸無期誠恐所懐隨軀腐朽抱恨黄泉遂不設施謹先顛踣科條諸志臣欲制刪定者一所當接續者四前志所無臣􅁒著者三及經典羣書所冝捃摭本奏詔書所當依據分别首目幷書章左臣初被考妻子迸竄亡失文書無所案請加以惶怖愁恐思念荒散十分不得識一所識者又恐謬誤觸冐死罪披散愚情願下東觀推求諸奏參以璽書以補綴遺闕昭明國體章聞之後雖肝腦流離白骨剖破無所復恨惟陛下省察謹因臨戎長霍圍封上臣頓首死罪稽首再拜以聞其所論志志家未以成書如有異同今隨事注之于本志也贊曰象因物生數本杪曶律均前起凖調後發該覈衡琁檢㑹日月後漢書卷十三後漢書卷十三考證律歴志下日有光道光監本作九依宋本改臣召南按黄道居中日光道前書天文志云日有中道月有九行中道者黄道一曰光道光道北至東井去北極近南至牽牛去北極逺東至角西至婁去極中此光道之明文也後漢書卷十三考證
