body:
  text: 後漢書卷一百六宋宣城太守范煜撰唐章懐太子賢注循吏列傳第六十六初光武長於民間頗逹情偽左傳楚子曰晉侯在外十九年矣人之情偽盡知之矣見稼穡艱難百姓病害至天下已定務用安静解王莽之繁密還漢世之輕法前書曰莽春夏斬人於市一家鑄錢保五人沒入為官奴婢男子檻車女子歩鐡鎻琅璫其頸愁苦死者十七八輕法謂高祖約法三章孝文除肉刑也身衣大練色無重綵耳不聼鄭衛之音手不持珠玉之玩宫房無私愛左右無偏恩建武十三年異國有獻名馬者日行千里又進寳劒賈兼百金詔以馬駕鼔車劒賜騎士損上林池籞之官廢騁望弋獵之事其以手迹賜方國者皆一札十行細書成文説文曰札牒也勤約之風行于上下數引公卿郎將列于禁坐禁坐猶御坐也廣求民瘼觀納風謠故能内外匪懈百姓寛息自臨宰邦邑者競能其官若杜詩守南陽號為杜母任延錫光移變邉俗斯其績用之最章章者也章章明也前書班固曰章章尤著者也又第五倫宋均之徒亦足有可稱談然建武永平之間吏事刻深亟以謠言單辭轉易守長故朱浮數上諫書箴切峻政鍾離意等亦規諷殷勤以長者為言而不能得也時明帝性褊察好以耳目隐發為明又引杖撞郎朝廷竦慄爭為苛刻唯意獨敢諫爭數封還詔書見意傳也所以中興之美蓋未盡焉自章和以後其有善績者徃徃不絶如魯恭吴祐劉寛及潁川四長謂荀淑為當塗長韓韶為嬴長陳寔為太丘長鍾皓為林慮長淑等皆潁川人也並以仁信篤誠使人不欺王堂陳寵委任賢良而職事自理王堂任陳蕃應嗣陳寵任王渙鐔顯也斯皆可以感物而行化也邉鳯延篤先後為京兆尹時人以輩前世趙張輩類也趙謂趙廣漢張謂張敞者也又王渙任峻之為洛陽令明發姦伏吏端禁止然導德齊禮有所未充亦一時之良能也今綴集殊聞顯迹以為循吏篇云衛颯傳衛颯字子産颯音立河内修武人也家貧好學問隨師無糧常傭以自給王莽時仕郡歴州宰建武二年辟大司徒鄧禹府舉能案劇除侍御史襄城令政有名迹遷桂陽太守郡與交州接境頗染其俗不知禮則颯下車修庠序之敎設婚姻之禮期年間邦俗從化先是含洭湞陽曲江三縣越之故地含洭故城在今廣州含洭縣東湞陽今廣州縣也曲江韶州縣也武帝平之内屬桂陽民居深山濵溪谷習其風土不出田租去郡逺者或且千里吏事徃來輒發民乗船名曰傳役每一吏出徭及數家百姓苦之颯乃鑿山通道五百餘里列亭傳置郵驛於是役省勞息姦吏杜絶流民稍還漸成聚邑使輸租賦同之平民又耒陽縣出鐡石續漢志耒陽縣有鐡官也佗郡民庶常依因聚㑹私為冶鑄遂招來亡命多致姦盗颯乃上起鐡官罷斥私鑄嵗所増入五百餘萬颯理䘏民事居官如家其所施政莫不合於物宜視事十年郡内清理二十五年徴還光武欲以為少府㑹颯被疾不能拜起東觀記曰颯到即引見賜食於前從吏二人賜冠幘錢人五千也勑以桂陽太守歸家須後詔書須待也居二嵗載病詣闕自陳困篤乃收印綬賜錢十萬後卒于家南陽茨充代颯為桂陽東觀記曰充字子河宛人也初舉孝亷之京師同侣馬死充到前亭輒舍車持馬還相迎鄉里號之曰一馬两車茨子河也亦善其政敎民種殖桑柘麻紵之屬禮記曰禁人無伐桑柘鄭𤣥注云愛蠶食也勸令養蠶織屨民得利益焉東觀記曰元和中荆州刺史上言臣行部入長沙界觀者皆徒跣臣問御佐曰人無履亦苦之否御佐對曰十二月盛寒時並多剖裂血出燃火燎之春温或膿潰建武中桂陽太守茨充敎人種桑蠶人得其利至今江南頗知桑蠶織屨皆充之化也任延傳任延字長孫南陽宛人也年十二為諸生學於長安明詩易春秋顯名太學學中號為任聖童值倉卒避兵之隴西時隗囂已據四郡遣使請延延不應更始元年以延為大司馬屬拜㑹稽都尉時年十九迎官驚其壯壯少也及到靜泊無為唯先遣饋禮祠延陵季子季子吴王夀夢之少子札也封於延陵也時天下新定道路未通避亂江南者皆未還中土㑹稽頗稱多士延到皆聘請高行如董子儀嚴子陵等敬待以師友之禮掾吏貧者輒分奉祿以賑給之省諸卒令耕公田以周窮急每時行縣輒使慰勉孝子就餐飯之飯音符晚反吴有龍丘萇者隠居太末太末縣屬㑹稽郡今婺州龍丘縣也東觀記云秦時改為太末有龍丘山在東有九石特秀色丹逺望如蓮華萇之隠處有一巖穴如窓牖中有石床可寢處志不降辱王莽時四輔三公連辟不到四輔謂太師太傅國師國將三公謂大司馬司徒司空也並莽時官見前書也掾吏白請召之延曰龍丘先生躬德履義有原憲伯夷之節原憲孔子弟子魯人也子貢結駟連騎排藜藋過謝原憲攝敝衣冠見子貢伯夷孤竹君之子譲其國餓死於首陽山也都尉埽灑其門猶懼辱焉召之不可遣功曹奉謁修書記致醫藥吏使相望於道積一嵗萇乃乗輦詣府門願得先死備錄請編名錄於郡職也延辭譲再三遂署議曹祭酒萇尋病卒延自臨殯不朝三日是以郡中賢士大夫爭徃宦焉建武初延上書願乞骸骨歸拜王庭詔徴為九眞太守光武引見賜馬雜繒令妻子留洛陽九眞俗以射獵為業不知牛耕東觀漢記曰九眞俗燒草種田前書曰搜粟都尉趙過敎人牛耕也民常告糴交阯每致困乏延乃令鑄作田器敎之墾闢田疇嵗嵗開廣百姓充給又駱越之民無嫁娶禮法各因淫好無適對匹適音丁歴反不識父子之性夫婦之道延乃移書屬縣各使男年二十至五十女年十五至四十皆以年齒相配其貧無禮聘令長吏以下各省奉祿以賑助之同時相娶者二千餘人是嵗風雨順節榖稼豐衍其産子者始知種姓咸曰使我有是子者任君也多名子為任於是徼外蠻夷夜郎等慕義保塞延遂止罷偵候戍卒偵伺也音丑政反初平帝時漢中錫光為交阯太守敎導民夷漸以禮義化聲侔於延侔等也王莽末閉境拒守建武初遣使貢獻封鹽水侯領南華風始於二守焉延視事四年徴詣洛陽以病稽留左轉雎陽令九眞吏人生為立祠拜武威太守帝親見戒之曰善事上官無失名譽延對曰臣聞忠臣不私私臣不忠履正奉公臣子之節上下雷同非陛下之福善事上官臣不敢奉詔帝歎息曰卿言是也既之武威時將兵長史田紺郡之大姓其子弟賔客為人暴害延收紺繋之父子賔客伏法者五六人紺少子尚乃聚㑹輕薄數百人自號將軍夜來攻郡延即發兵破之自是威行境内吏民累息累息累氣郡北當匈奴南接種羌民畏寇抄多廢田業延到選集武略之士千人明其賞罰令將雜種胡騎休屠黄石屯據要害黄石雜種號也其有警急逆擊追討虜恒多殘傷遂絶不敢出河西舊少雨澤乃為置水官吏修理溝渠皆蒙其利又造立校官校學也自掾吏子孫劉攽曰案吏當作史説己見前皆令詣學受業復其徭役章句既通悉顯拔榮進之郡遂有儒雅之士後坐擅誅羌不先上左轉召陵令顯宗即位拜潁川太守永平二年徴㑹辟雍因以為河内太守視事九年病卒少子愷官至太常王景傳王景字仲通樂浪􅠗邯人也􅠗音諾甘反邯音下甘反縣名八世祖仲本琅邪不其人好道術明天文諸吕作亂齊哀王襄謀發兵而數問於仲及濟北王興居反欲委兵師仲㐮及興居並高祖孫齊悼惠王肥之子也仲懼禍及乃浮海東奔樂浪山中因而家焉父閎為郡三老更始敗土人王調殺郡守劉憲自稱大將軍樂浪太守建武六年光武遣太守王遵將兵擊之至遼東閎與郡決曹史楊邑等共殺調迎遵皆封為列侯閎獨譲爵帝竒而徴之道病卒景少學易遂廣闚衆書又好天文術數之事沈深多伎藝辟司空伏恭府時有薦景能理水者顯宗詔與將作謁者王吴共修作浚儀渠吴用景墕流法水乃不復為害初平帝時河汴決壊未及得修建武十年陽武令張汜上言河決積久日月侵毁濟渠所漂數十許縣濟水出今洛州濟源縣西北東流經温縣入河度河東南入鄭州又東入滑曹鄆濟齊青等州入海即此渠也王莽末旱因枯涸但入河内而已修理之費其功不難宜改修堤防以安百姓書奏光武即為發卒方營河功而浚儀令樂俊復上言昔元光之間武帝年人庶熾盛緣隄墾殖而瓠子河決尚二十餘年不即擁塞瓠子堤在今滑州白馬縣武帝元光中河決於瓠子東南注鉅野通於淮泗至元封二年塞之也今居家稀少田地饒廣雖未修理其患猶可且新被兵革方興力役勞怨既多民不堪命宜須平静更議其事光武得此遂止後汴渠東侵日月彌廣而水門故處皆在河中兗豫百姓怨歎以為縣官恒興佗役不先民急永平十二年議修汴渠乃引見景問以理水形便景陳其利害應對敏給帝善之又以嘗修浚儀功業有成乃賜景山海經河渠書山海經禹所作河渠書太史公史記也禹貢圖及錢帛衣物夏遂發卒數十萬遣景與王吴修渠築隄自滎陽東至千乗海口千餘里景乃商度地埶鑿山阜破砥績尚書曰原隰底績注底致也績功也言破禹所致功之處也或云砥績山名也直􅎒溝澗防遏衝要疎決壅積十里立一水門令更相洄注爾雅曰逆流而上曰洄郭璞注云旋流也無復潰漏之患景雖簡省役費然猶以百億計明年夏渠成帝親自廵行詔濵河郡國置河堤員吏如西京舊制十三州志曰成帝時河堤大壊汎濫青徐兗豫四州略徧乃以校尉王延代領河堤謁者秩千石或名其官為䕶都水使者中興以王府掾屬為之景由是知名王吴及諸從事掾吏皆増秩一等景三遷為侍御史十五年從駕東廵狩至無鹽帝美其功績拜河堤謁者賜車馬縑錢建初七年遷徐州刺史先是杜陵杜篤奏上論遷都劉攽曰案此少一賦字欲令車駕遷還長安耆老聞者皆動懐土之心莫不眷然佇立西望景以宫廟已立恐人情疑惑㑹時有神雀諸瑞章帝時有神雀鳯凰白鹿白烏等瑞也乃作金人論頌洛邑之美天人之符文有可採明年遷廬江太守先是百姓不知牛耕致地力有餘而食常不足郡界有楚相孫叔敖所起芍陂稻田陂在今夀州安豐縣東陂徑百里灌田萬頃芍音鵲景乃驅率吏民修起蕪廢敎用犂耕由是墾闢倍多境内豐給遂銘石刻誓令民知常禁又訓令蠶織為作法制皆著于鄉亭廬江傳其文辭卒於官初景以為六經所載皆有卜筮作事舉止質於蓍龜而衆書錯糅吉凶相反乃參紀衆家數術文書冢宅禁忌𦵏送造宅之法若黄帝青烏之書也堪輿日相之屬前書藝文志堪輿金匱十四卷許慎云堪天道也輿地道也日相謂日辰王相之法也適於事用者集為大衍𤣥基云易曰大衍之數五十其用四十有九也秦彭傳秦彭字伯平扶風茂陵人也自漢興之後世位相承六世祖襲為潁川太守與羣從同時為二千石者五人故三輔號曰萬石秦氏彭同産女弟顯宗時入掖庭為貴人有寵永平七年以彭貴人兄隨四姓小侯擢為開陽城門候續漢志城門候一人六百石城南面東頭第一門也漢官儀云開陽門始成未有名夜有一柱來止樓上琅邪開陽縣上言南門一柱飛去因以名門也劉攽曰注城南面東頭第一門也案此解開陽少開陽二字十五年拜騎都尉副駙馬都尉耿秉北征匈奴建初元年遷山陽太守以禮訓人不任刑罰崇好儒雅敦明庠序每春秋饗射輒修升降揖譲之儀乃為人設四誡以定六親長幼之禮六親謂父子兄弟夫婦也有遵奉敎化者擢為鄉三老常以八月致酒肉以勸勉之吏有過咎罷遣而已不加耻辱百姓懐愛莫有欺犯興起稻田數千頃每於農月親度頃畝分别肥塉差為三品各立文簿藏之鄉縣於是姦吏跼蹐無所容詐彭乃上言宜令天下齊同其制詔書以其所立條式班令三府並下州郡在職六年轉潁川太守仍有鳯凰麒麟嘉禾甘露之瑞集其郡境肅宗廵行再幸潁川輒賞賜錢榖恩寵甚異章和二年卒彭弟惇褒並為射聲校尉王渙傳王渙字稚子廣漢郪人也郪縣故城在今梓州郪縣西南也父順安定太守渙少好俠尚氣力數通剽輕少年剽劫奪也晩而改節敦儒學習尚書讀律令略舉大義為太守陳寵功曹當職割斷不避豪右寵風聲大行入為大司農和帝問曰在郡何以為理寵頓首謝曰臣任功曹王渙以簡賢選能主簿鐔顯拾遺補闕臣奉宣詔書而已帝大悦渙由此顯名州舉茂才除温令縣多姦猾積為人患渙以方略討撃悉誅之境内清夷商人露宿於道其有放牛者輒云以屬稚子終無侵犯在温三年遷兗州刺史繩正部郡繩直也風威大行後坐考妖言不實論嵗餘徴拜侍御史永元十五年從駕南廵還為洛陽令以平正居身得寛猛之宜其寃嫌久訟歴政所不斷法理所難平者莫不曲盡情詐壓塞羣疑又能以譎數發擿姦伏譎詐數術也京師稱歎以為渙有神算智算若神也元興元年病卒百姓市道莫不咨嗟男女老壯皆相與賦歛致奠醊以千數醊音張芮反説文曰祭酹也渙喪西歸道經𢎞農民庶皆設槃桉於路吏問其故咸言平常持米到洛為卒司所鈔鈔掠也恒亡其半自王君在事不見侵枉故來報恩其政化懐物如此民思其德為立祠安陽亭西每食輒弦歌而薦之古樂府歌曰孝和帝在時洛陽令王君本自益州廣漢蜀人少行官學通五經論明知法令歴代衣冠從温補洛陽令化行致賢外行猛政内懐慈仁移惡子姓名五篇著里端無妄發賦念在理寃清身苦體宿夜勞勤化有能名逺近所聞天年不遂早就奄昏為君作祠安陽亭西欲令後代莫不稱傳也劉攽曰正文毎食案文當作祠永初二年鄧太后詔曰夫忠良之吏國家所以為理也求之甚勤得之至寡故孔子曰才難不其然乎昔大司農朱邑前書曰邑字仲卿廬江舒人為北海太守以理行第一入為大司農性公正不可交以私天子器之朝廷敬焉神爵元年卒宣帝下詔賜其子黄金百斤奉其祭祀右扶風尹翁歸前書云翁歸字子況河東平陽人拜東海太守以高第入守右扶風元康四年卒宣帝制詔御史右扶風翁歸亷平嚮正早夭不遂朕甚憐之其賜翁歸子黄金百斤以奉其祭祀政迹茂異令名顯聞孝宣皇帝嘉歎愍惜而以黄金百斤䇿賜其子故洛陽令王渙秉清修之節蹈羔羊之義韓詩羔羊曰羔羊之皮素絲五紽薛君章句曰小者曰羔大者曰羊素喻潔白絲喻屈柔紽數名也詩人賢仕為大夫者言其得能稱有潔白之性屈柔之行進退有度數也盡心奉公務在惠民功業未遂不幸早世百姓追思為之立祠自非忠愛之至孰能若斯者乎今以渙子石為郎中以勸勞勤延熹中桓帝事黄老道悉毁諸房祀唯特詔密縣存故太傅卓茂廟洛陽留王渙祠焉鐔顯後亦知名安帝時為豫州刺史時天下饑荒競為盗賊州界收捕且萬餘人顯愍其困窮自䧟刑辟輒擅赦之因自劾奏有詔勿理後位至長樂衛尉自渙卒後連詔三公特選洛陽令皆不稱職永平中以劇令勃海任峻補之劇縣名屬北海郡也峻擢用文武吏皆盡其能糾剔姦盗不得旋踵左傳天王策命晉文侯曰糾逖王慝杜預注云逖逺也剔與逖通一嵗斷獄不過數十威風猛於渙而文理不及之峻字叔高終於太山太守許荆傳許荆字少張謝承書曰荆字子張家貧為吏無有船車休假常單歩荷擔上下㑹稽陽羡人也陽羡故城在今常州義興縣南祖父武太守第五倫舉為孝亷武以二弟晏普未顯欲令成名乃請之曰禮有分異之義家有别居之道儀禮曰父子一體也夫婦一體也昆弟一體也故父子手足也夫婦判合也昆弟四體也昆弟之義無分焉而有分者則避子之私也子不私其父則不成為子故有東宫有西宫有南宫有北宫異居而同財有餘則歸之宗不足則資之宗也於是共割財産以為三分武自取肥田廣宅奴婢彊者二弟所得並悉劣少鄉人皆稱弟克譲而鄙武貪婪晏等以此並得選舉武乃㑹宗親泣曰吾為兄不肖盗聲竊位二弟年長未豫榮祿所以求得分財自取大譏今理産所増三倍於前悉以推二弟一無所留於是郡中翕然逺近稱之位至長樂少府荆少為郡吏兄子世嘗報讐殺人怨者操兵攻之荆聞乃出門逆怨者跪而言曰世前無狀相犯咎皆在荆不能訓導兄既早没一子為嗣如令死者傷其滅絶願殺身代之怨家扶荆起曰許掾郡中稱賢吾何敢相侵因遂委去荆名譽益著太守黄兢舉孝亷和帝時稍遷桂陽太守郡濵南州風俗脆簿脆薄猶輕薄也不識學義荆為設喪紀婚姻制度使知禮禁嘗行春到耒陽縣人有蔣均者兄弟爭財互相言訟荆對之歎曰吾荷國重任而敎化不行咎在太守乃顧使吏上書陳狀乞詣廷尉均兄弟感悔各求受罪謝承書曰郴人謝𢎞等不養父母兄弟分析因此皆還供養者千有餘人也在事十二年父老稱歌以病自上徴拜諫議大夫卒於官桂陽人為立廟樹碑荆孫􅖢靈帝時為太尉孟嘗傳孟嘗字伯周㑹稽上虞人也其先三世為郡吏並伏節死難嘗少修操行仕郡為戸曹史上虞有寡婦至孝養姑姑年老壽終夫女弟先懐嫌忌乃誣婦厭苦供養加鴆其母列訟縣庭郡不加尋察遂結竟其罪嘗先知枉狀備言之於太守太守不為理嘗哀泣外門因謝病去婦竟寃死自是郡中連旱二年禱請無所獲後太守殷丹到官訪問其故嘗詣府具陳寡婦寃誣之事因曰昔東海孝婦感天致旱于公一言甘澤時降宜戮訟者以謝寃魂庶幽枉獲申時雨可期丹從之即刑訟女而祭婦墓天應澍雨榖稼以登嘗後策孝亷舉茂才拜徐令州郡表其能遷合浦太守郡不産榖實而海出珠寳與交阯比境常通商販􅐙糴糧食􅐙易也先時宰守並多貪穢詭人採求不知紀極詭責也珠遂漸徙於交阯郡界於是行旅不至人物無資貧者死餓於道嘗到官革易前敝求民病利人所病苦及利益之事也曽未踰嵗去珠復還百姓皆反其業商貨流通稱為神明以病自上被徴當還吏民攀車請之嘗既不得進乃載鄉民船夜遁去隠處窮澤身自耕傭鄰縣士民慕其德就居止者百餘家桓帝時尚書同郡楊喬上書薦嘗曰謝承書曰喬字聖逹烏傷人也前後數上書陳政事也臣前後七表言故合浦太守孟嘗而身輕言微終不蒙察區區破心徒然而已嘗安仁𢎞義耽樂道德清行出俗能幹絶羣前更守宰移風改政去珠復還饑民蒙活且南海多珍財産易積掌握之内價盈兼金而嘗單身謝病躬耕壟次匿景藏采不揚華藻實羽翮之美用非徒腹背之毛也説苑曰趙簡子游於西河而樂之歎曰安得賢士而與處焉舟人古桑曰此是吾君不好之也簡子曰吾門左右客千人朝食不足暮收市征暮食不足朝收市征吾可謂不好士乎古桑曰鴻鵠高飛逺翔其所恃者六翮也背上之毛腹下之毳無尺寸之數加之滿把飛不能為之益高不知門下左右客千人者六翮之用乎將盡毛毳也新序云晉平公餘並同也而沈淪草莽好爵莫及易曰我有好爵吾與爾縻之廊廟之寳棄於溝渠尚書顧命曰赤刀大訓𢎞璧琬琰在西序大玉夷玉天球河圖在東序周禮大宗伯曰天府掌祖廟之守藏凡國之玉鎮大寳器藏焉且年嵗有訖桑榆行盡謂日將夕在桑榆間言晩暮也而忠貞之節永謝聖時臣誠傷心私用流涕夫物以逺至為珍若珠翠之屬也士以稀見為貴槃木朽株為萬乗用者左右為之容耳前書鄒陽傳曰蟠木根柢輪囷離竒而為萬乗器者左右為之先容耳王者取士宜拔衆之所貴臣以斗筲之姿趨日月之側日月喻人君也易曰懸象著明莫大乎日月崇高莫大乎富貴思立微節不敢茍私鄉曲竊感禽息亡身進賢禽息秦大夫薦百里奚而不見納繆公出當車以頭撃闑腦乃播出曰臣生無補於國不如死也繆公感悟而用百里奚秦以大化見韓詩外傳嘗竟不見用年七十卒于家第五訪傳第五訪字仲謀京兆長陵人司空倫之族孫也少孤貧常傭耕以養兄嫂有閒暇則以學文文謂道蓺者也仕郡為功曹察孝亷補新都令新都縣屬蜀郡故城在今益州新都縣東政平化行三年之間鄰縣歸之戸口十倍遷張掖太守嵗饑粟石數千訪乃開倉賑給以救其敝吏懼譴譴責也爭欲上言訪曰若上須報是棄民也上音時掌反須待也太守樂以一身救百姓遂出榖賦人順帝璽書嘉之由是一郡得全嵗餘官民並豐界無姦盗遷南陽太守去官拜䕶羌校尉邉境服其威信卒於官劉矩傳劉矩字叔方沛國蕭人也叔父光順帝時為司徒矩少有高節以叔父遼未得仕進遂絶州郡之命太尉朱寵太傅桓焉嘉其志義故叔遼以此為諸公所辟拜議郎矩乃舉孝亷稍遷雍丘令以禮譲化之劉攽曰化之案文之字當作人其無孝義者皆感悟自革民有爭訟矩常引之於前提耳訓告毛詩曰匪面命之言提其耳以為忿恚可忍縣官不可入使歸更尋思訟者感之輒各罷去其有路得遺者皆推尋其主在縣四年以母憂去官後太尉胡廣舉矩賢良方正四遷為尚書令矩性亮直不能諧附貴埶以是失大將軍梁冀意出為常山相以疾去官時冀妻兄孫社為沛相矩懼為所害不敢還鄉里乃投彭城友人家嵗餘冀意少悟乃止補從事中郎復為尚書令遷宗正太常延熹四年代黄瓊為太尉瓊復為司空矩與瓊及司徒种暠同心輔政號為賢相時連有災異司隸校尉以劾三公尚書朱穆上疏稱矩等良輔及言殷湯高宗不罪臣下之義尚書湯誥余一人有罪無以爾萬方萬方有罪在余一人尚書高宗誡傅説曰一夫不獲則曰時子之辜帝不省竟以蠻夷反叛免後復拜太中大夫靈帝初代周景為太尉矩再為上公所辟召皆名儒宿德不與諸郡交通順辭黙諫順辭不忤㫖黙諫不顯揚也多見省用復以日食免因乞骸骨卒於家劉寵傳劉寵字祖榮東萊牟平人齊悼惠王之後也悼惠王肥高祖子也悼惠王子孝王將閭將閭少子封牟平侯子孫家焉父丕博學號為通儒寵少受父業以明經舉孝亷除東平陵令東平陵縣名屬濟南郡也以仁惠為吏民所愛母疾棄官去百姓將送塞道車不得進乃輕服遁歸後四遷為豫章太守又三遷拜㑹稽太守山民愿朴乃有白首不入市井者愿謹也風俗通曰俗説市井者言至市當有所鬻賣當於井上先濯乃到市也謹案春秋井田記人年三十受田百畝以食五口五口為一戸父母妻子也公田十畝廬舍五畝成田一頃十五畝八家而九頃二十畝共為一井廬舍在内貴人也公田次之重公也私田在外賤私也井田之義一曰無洩地氣二曰無費一家三曰同風俗四曰合巧拙五曰通財貨因井為市交易而退故稱市井也劉攽曰注市井者言至市當有所鬻賣當於井上案文多上一當字頗為官吏所擾寵簡除煩苛禁察非法郡中大化徴為將作大匠山隂縣有五六老叟尨眉皓髮尨雜也老者眉雜白黒也自若邪山谷間出若邪在今越州㑹稽縣東南也人齎百錢以送寵寵勞之曰父老何自苦對曰山谷鄙生未嘗識郡朝它守時吏發求民間至夜不絶或狗吠竟夕民不得安自明府下車以來狗不夜吠民不見吏年老遭値聖明今聞當見棄去故自扶奉送寵曰吾政何能及公言邪勤苦父老為人選一大錢受之轉為宗正大鴻臚延熹四年代黄瓊為司空以隂霧愆陽免頃之拜將作大匠復為宗正建寜元年代王暢為司空頻遷司徒太尉二年以日食策免歸鄉里寵前後歴宰二郡累登卿相而准約省素劉攽曰按文言准都無義蓋本是亷字家無貨積嘗出京師欲息亭舍亭吏止之曰整頓灑埽以待劉公不可得也寵無言而去時人稱其長者以老病卒于家弟方官至山陽太守方有二子岱字公山繇字正禮兄弟齊名稱吳志曰平原陶丘洪薦繇欲令舉茂才刺史曰前年舉公山柰何復舉正禮𢎞曰若使明君用公山於前擢正禮於後所謂御二龍於長塗騁騏驥於千里不亦可乎董卓入洛陽岱從侍中出為兗州刺史虚己愛物為士人所附初平三年青州黄巾賊入兗州殺任城相鄭遂轉入東平岱擊之戰死興平中繇為揚州牧振威將軍時袁術據淮南繇乃移居曲阿値中國喪亂士友多南奔繇㩦接收養與同優劇甚得名稱袁術遣孫策攻破繇因奔豫章病卒仇覽傳仇覽字季智一名香陳留考城人也續漢志考城故菑陳留風俗傳曰章帝惡其名改為考城也少為書生淳黙鄉里無知者年四十縣召補吏選為蒲亭長勸人生業為制科令至於果菜為限雞豕有數農事既畢乃令子弟羣居還就黌學其剽輕游恣者皆役以田桑嚴設科罰躬助喪事賑恤窮寡期年稱大化覽初到亭人有陳元者獨與母居而母詣覽告元不孝覽驚曰吾近日過舍廬落整頓廣雅曰落居也案今人謂院為落也耕耘以時此非惡人當是敎化未及至耳母守寡養孤苦身投老柰何肆忿於一朝欲致子以不義乎母聞感悔涕泣而去覽乃親到元家與其母子飲因為陳人倫孝行譬以禍福之言元卒成孝子謝承書曰覽為縣陽遂亭長好行敎化人陳元凶惡不孝其母詣覽言元覽呼元誚責元以子道與一卷孝經使誦讀之元深改悔到母牀下謝罪曰元少孤為母所驕諺曰孤犢觸乳驕子罵母乞今自改母子更相向泣於是元遂修孝道後成佳士也劉攽曰注言元覽呼元誚責元案文多一元字鄉邑為之諺曰父母何在在我庭化我鳴梟哺所生鳴梟即鴟梟也時考城令河内王渙政尚嚴猛聞覽以德化人署為主簿謂覽曰主簿聞陳元之過不罪而化之得無少鷹鸇之志邪左傳季孫行父曰見無禮於君者誅之如鷹鸇之逐鳥雀覽曰以為鷹鸇不若鸞鳯渙謝遣曰枳棘非鸞鳯所棲百里豈大賢之路時渙為縣令故自稱百里也今日太學曳長裾飛名譽皆主簿後耳以一月奉為資勉卒景行卒終也覽入太學時諸生同郡符融有高名與覽比宇賔客盈室覽常自守不與融言融觀其容止心獨竒之乃謂曰與先生同郡壌鄰房牖今京師英雄四集志士交結之秋雖務經學守之何固覽乃正色曰天子修設太學豈但使人游談其中高揖而去不復與言後融以告郭林宗林宗因與融齎刺就房謁之遂請留宿林宗嗟歎下牀為拜覽學畢歸鄉里州郡並請皆以疾辭雖在宴居宴安也論語曰子之宴居必以禮自整妻子有過輒免冠自責妻子庭謝候覽冠乃敢升堂家人莫見喜怒聲色之異後徴方正遇疾而卒三子皆有文史才少子𤣥最知名童恢傳童恢字漢宗謝承書童作僮恢作种也琅邪姑幕人也姑幕故城在今密州莒縣東北也父仲玉遭世凶荒傾家賑恤九族鄉里賴全者以百數仲玉早卒恢少仕州郡為吏司徒楊賜聞其執法亷平乃辟之及賜被劾當免掾屬悉投刺去恢獨詣闕爭之及得理掾屬悉歸府恢杖策而逝由是論者歸美復辟公府除不其令吏人有犯違禁法輒隨方曉示若吏稱其職人行善事者皆賜以酒肴之禮以勸勵之耕織種收皆有條章一境清静牢獄連年無囚比縣流人歸化徙居二萬餘尸民嘗為虎所害乃設檻捕之生獲二虎恢聞而出呪虎曰天生萬物唯人為貴虎狼當食六畜杜預注左傳云六畜馬牛羊豕犬雞也而殘暴於人王法殺人者死傷人則論法汝若是殺人者當垂頭服罪自知非者當號呼稱寃一虎低頭閉目狀如震懼即時殺之其一視恢鳴吼踊躍自奮遂令放釋吏人為之歌頌青州舉尤異遷丹陽太守暴疾而卒弟翊字漢文名高於恢宰府先辟之翊陽喑不肯仕喑疾不能言也及恢被命乃就孝亷除須昌長化有異政吏人生為立碑聞舉將喪棄官歸後舉茂才不就卒於家贊曰政畏張急韓詩外傳曰水濁則魚喁令苛則人亂理國者譬若張琴然大弦急則小弦絶矣故急轡衘者非千里之御也理善烹鮮老子曰理大國者若烹小鮮也推忠以及衆瘼自蠲推忠恕以及於人則衆病自蠲除一夫得情千室鳴弦一夫謂守長也千室謂黎庶言上得化下之情則其下鳴弦而安樂也懐我風愛永載遺賢沈約宋書載曄與其姪及甥書論撰書之意曰吾觀史書恒覺其不可解既造後漢轉得統緒詳觀古今著述及評論殆少可得意者班氏最有高名既任情無例不可甲乙博可不及之整理未必愧也吾雜傳論皆有精意深㫖至於循吏已下及六夷諸序論筆埶縱放實天下之竒作其中合者徃徃不減過秦篇嘗比方班氏所作非但不愧之而已又欲因事發論以正一代得失意復未果贊自是吾文之傑思殆無一字空設此書行故應有賞音者紀傳例為舉其大略耳諸細意甚多自古體大而思精未有此也恐俗人不能盡之多貴古賤今所以稱情狂言耳後漢書卷一百六後漢書卷一百六考證王景傳集為大衍𤣥基云為字監本作於依宋本改仇覽傳選為蒲亭長謝承書作陽遂亭長時考城令河内王渙臣㑹汾按范冉傳作王奐後漢書卷一百六考證
