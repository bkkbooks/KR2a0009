body:
  text: 後漢書卷三十二梁剡令劉昭補并注郡國志第二十二郡國四青州濟南齊國平原樂安北海東萊荆州南陽武陵南郡長沙江夏零陵桂陽揚州九江豫章丹陽廬江㑹稽吳郡濟南郡故齊文帝分雒陽東千八百里十城户七萬八千五百四十四口四十五萬三千三百八東平陵有鐵有譚城故譚國有天山著於陵杜預曰縣西北有于亭陳桓子以封齊公子周臺菅有賴亭左傳哀六年公如賴土鼓梁鄒鄒平東朝陽杜預曰縣西有崔城歴城有鐵有巨里聚耿弇破費敢處皇覽曰太甲有冢在歴山上平原郡髙帝置雒陽北一千三百里九城户十五萬五千五百八十八口百萬二千六百五十八平原地道記曰有篤馬河髙唐濕水出般鬲侯國夏時有鬲君滅浞立少康魏都賦注曰縣有蓋節淵三齊記曰城南有蒲臺髙八十尺秦始皇所頓處在臺下縈蒲繫馬今蒲猶縈者祝阿春秋時曰祝柯左傳哀十年取犂及轅杜預曰縣西有轅城故縣省有野井亭左傳昭二十五年齊侯唁公于野井杜預曰在縣東樂陵濕陰安徳侯國厭次本富平明帝更名樂安國髙帝西平昌置為千乗永元七年更名雒陽東千五百二十里九城户七萬四千四百口四十二萬四千七十五臨濟本狄安帝更名地道記曰狄伐衞懿公千乗髙苑樂安博昌有薄姑城古薄姑氏杜預曰薄姑地有貝中聚左傳齊侯田于貝丘杜預曰縣南有地名貝丘有時水左傳莊九年戰于乾時杜預曰時水在縣界岐流旱則竭涸故曰乾時蓼城侯國杜預曰縣東北有攝城利故屬齊益侯國故屬北海夀光故屬北海有灌亭古灌國北海國景帝置建武十三年有菑川髙宻膠東三國以其縣屬十八城户十五萬八千六百四十一口八十五萬三千六百四劇有紀亭古紀國營陵平夀有斟城杜預曰有斟亭古斟國故縣後省有寒亭古寒國浞封此都昌左傳莊元年齊遷紀之鄑城地道記曰鄑城在縣西安丘有渠丘亭地道記曰有渠丘城淳于永元九年復有宻鄉左傳隠二年紀莒盟宻故宻鄉在縣東北後省平昌侯國故屬琅邪有蔞鄉左傳昭五年莒牟夷以牟婁及防茲來奔杜預曰縣西南有防亭朱虚侯國故屬琅邪永初元年屬左傳莊元年齊遷紀郚杜預曰朱虚縣東南有郚城鄭志曰有小泰山公玉帶曰岐伯令黄帝封㤗山即此山也東安平故屬菑川六國時曰安平有酅亭故兆左傳莊三年紀季以酅入于齊地道記有羌頭山髙宻侯國昌安侯國安帝復夷安侯國安帝復膠東侯國即墨侯國有棠鄉左傳襄六年圍棠杜預曰棠國也壯武安帝復故夷國左傳隠元年紀伐夷下宻安帝復拒地道記曰養澤在西幽州藪有萊山萊王祠觀陽東萊郡髙帝置雒陽東三千二百二十八里十三城户十萬四千二百九十七口四十八萬四千三百九十三黄地道記曰縣東二百三十里至海中連岑有土道秦始皇登此山刻二碑東二百三十里有始皇漢武帝二碑牟平惤侯國地道記曰有百枝萊君祠三齊記曰南有蹲犬山似犬蹲有神劉寵出西都經此山山犬吠之寵曰山神謂我人也曲成侯國前書禱萬里沙在縣掖侯國有過鄉故過國當利侯國東牟侯國昌陽盧鄉長廣故屬琅邪黔陬侯國故屬琅邪有介亭左傳襄二十四年伐莒侵介根杜預曰縣東北計基城號介國葛盧有尤涉亭不期侯國故屬琅邪三齊記曰鄭𤣥教授不期山山下生草大如䪥葉長一尺餘堅韌異常土人名曰康成書帶齊國秦置雒陽東千八百里六城户六萬四千四百一十五口四十九萬一千七百六十五臨菑本齊刺史治爾雅十藪齊有海隅郭璞曰海濵廣斥左傳齊戌葵丘杜預曰在縣西皇覽曰吕尚冢往縣城南去縣十餘里在齊桓公冢南菑水南桓公冢西北有晏嬰冢孟子注曰南小山曰牛山博物記曰縣西有袁婁西安有棘里亭杜預曰在縣東陳桓子封子山有蘧丘里古渠丘昌國臨胊有三亭古郱邑左傳莊元年齊所徙杜預曰在縣東南應劭曰伯氏邑也地道記曰有石髙山廣般陽故屬濟南右青州刺史部郡國六縣六十五南陽郡秦置雒陽南七百里三十七城户五十二萬八千五百五十一口二百四十三萬九千六百一十八宛本申伯國荆州記曰郡城周三十六里博物記有申亭南都賦注曰有玉池澤陂有南就聚有𤓰里津東觀書鄧奉拒光武𤓰里有夕陽聚袁山松書曰賈復從擊鄧奉追至夕陽聚有東武亭冠軍邑葉有長山曰方城杜預曰方城山在縣南屈完曰楚國方城以為城皇覽曰縣西北去城三里葉公諸梁冢近縣祠之曰葉君丘有卷城左傳昭二十五年楚子使季然郭卷新野有東鄉故新都王莽封也有黄郵聚吳漢破秦豐地章陵故舂陵世祖更名古今注曰建武十八年使中郎將耿遵築城有上唐鄉前志曰故唐國下江兵荆州軍西鄂有精山朱儁破孫夏山海經曰有豐山神耕父處之常逰清泠之淵出入有光見即其國為敗有九鍾焉是知霜鳴郭璞曰清泠水在西鄂縣山上神來時水赤光耀今有屋祠也霜降則鍾鳴故言知也物有自然感應而不可為也南都賦注耕父旱鬼也皇覽曰王子朝冢在縣西雉博物記曰滍水出魯陽有魯山前志曰古魯縣南都賦注有堯山封劉累立堯祠有牛蘭累亭謝沈書云牛蘭山也犨堵陽博望舞陰邑比陽復陽侯國有杏聚平氏桐柏大復山淮水出前書曰在縣南荆州記曰桐柏淮源涌發其中潛流三十里東出大復山南山南有淮源廟博物記曰有陽山出紫草有宜秋聚伯升見下江兵棘陽荆州記曰東北百里有謝城有藍鄉伯升襲甄阜處有黄淳聚又伯升攻梁丘賜杜預曰蓼國在東南前志蓼國湖陽是湖陽邑荆州記曰樊重母畏雷為石室避之悉以文石為階今存隨古隨國西有斷蛇丘即䘖珠之蛇也杜預曰有賴亭左傳僖十五年齊伐厲在縣北帝王世紀曰神農氏起列山謂列山氏今隨厲鄉是也荆州記曰縣北界有重山山有一穴云是神農所生又有周廻一頃二十畝地外有兩重壍中有九井相傳神農既育九井自穿汲一井則衆井動即此地為神農社年常祠之育陽邑有小長安漢軍為甄阜所破處有東陽聚朱祐破張成處湼陽陰酇鄧有鄾聚左傳桓九年楚師圍鄾山都侯國酈侯國荆州記曰縣北八里有菊水其源旁悉芳菊水極甘馨又中有三十家不復穿井即飲此水上夀百二十三十中夀百餘七十者猶以為夭漢司空王暢太傅袁隗為南陽令縣月送三十餘石飲食澡浴悉用之太尉胡廣父患風羸南陽恒汲飲此水疾遂瘳此菊莖短葩大食之甘美異於餘菊廣又収其實種之京師遂處處傳植之穰朝陽南都賦陂澤有鉗盧注曰匡縣蔡陽侯國襄陽耆舊傳曰有松子亭下有神陂中多魚人捕不可得南都賦所稱安衆侯國博物記曰有土魯山出紫石英筑陽侯國有涉都鄉杜預曰穀國在縣北博物記曰今穀亭荆州記曰縣北四里有開林山西北有䪥山武當有和城聚荆州記曰縣有女思山南二百里有武當順陽侯國故博山有須聚成都襄鄉南鄉丹水故屬𢎞農南鄉丹水二縣有商城張儀與楚商於之地有章宻鄉有三户亭左傳哀四年晉執蠻子畀楚師析故屬𢎞農故楚白羽邑左傳昭十八年許遷于白羽有武關在縣西南都賦曰武關在其西文頴曰去縣百七十里有豐鄉城左傳哀四年司馬起豐析荆州記曰縣有龍淵深不測縣北有馬頭山南郡秦置雒陽南一千五百里十七城户十六萬二千五百七十口七十四萬七千六百四江陵史記曰楚熊渠立長子康為句亶王張瑩曰今江陵也皇覽曰孫叔敖冢在城中白土里有津鄉左傳莊十九年楚子大敗于津荆州記曰縣東三里餘有三湖湖東有水名長谷又西北有小城名曰冶父左傳曰莫敖縊于荒谷羣師囚于冶父縣北十餘里有紀南城楚王所都東南有郢城子囊所城史記蘇秦説楚威王楚東有夏州左傳楚莊伐陳鄉取一人以歸謂之夏州今夏口城有州名夏口巫西有白帝城郭璞曰有巫山秭歸本歸國杜預曰䕫國荆州記曰縣北一百里有屈平故宅方七頃累石為屋基今其地名樂平宅東北六十里有女須廟中廬侯國襄陽耆舊傳曰古廬戎也縣西山中有一道漢時常有數百匹馬出其中馬形皆小似巴滇馬三國時陸遜攻襄陽又值此穴中有數十匹馬出遜載還建業蜀使來有五部兵家滇池者識其馬色云亡父所乗對之流涕荆州記云是析縣馬頭山又縣南十五里有陵水東流注沔水中有物如馬甲如鮮鯉不可入七八月中好在磧上自曝膝頭似虎掌爪小兒不知欲取弄戲便殺人或曰生得者摘其鼻厭可小小便名為木盧編有藍口聚下江兵所據左傳鬪緡以權叛楚遷於那處杜預曰縣東南有那口城當陽杜預曰縣東有權城楚武王所尅荆州記曰縣東南有麥城城東有廬城沮水西有磨城伍子胥造此二城以攻麥城華容侯國雲夢澤在南杜預曰州國在縣東枝江縣有雲夢城江夏安陸縣東南有雲夢城或曰華容縣東南亦有雲夢巴丘湖江南之雲夢也爾雅十藪楚有雲夢郭璞曰巴丘湖是也襄陽有阿頭山岑彭破張楊襄陽耆舊傳曰縣西九里有方山父老傳云交甫所見玉女㳺處北山之下曲隈是也荆州記曰襄陽舊楚之北津從襄陽渡江經南陽出方關是周鄭晉衛之道其東津經江夏出平澤關是通陳蔡齊宋之道邔侯國有犂丘城朱祐禽秦豐蘇嶺山宜城侯國杜預曰縣西舊羅國後徙枝江鄀侯國永平元年復左傳楚文王伐黄還及湫杜預曰縣東南有湫城臨沮侯國有荆山山海經曰其陽多鉄其陰多赤金其東多牛荆州記曰西北三十里有清谿谿北即荆山首曰景山即卞和抱璞之處南都賦注曰漢水至荆山東别流為滄浪之水枝江侯國本羅國有丹陽聚史記曰秦齊破楚屈匄遂取丹陽夷道荆州記曰縣西北有宜陽山東南有羊腸山夷陵有荆門岑彭破田戎處虎牙山荆州記曰荆門江南虎牙江北虎牙有文如齒牙荆門上合下開州陵史記楚考烈王納州於秦佷山故屬武陵江夏郡髙帝置雒陽南千五百里十四城户五萬八千四百三十四口二十六萬五千四百六十四西陵西陽􅋴侯國杜預曰古䢵國在東南有䢵城鄳史記曰無忌説魏安釐王曰秦不敢攻㝠阸之塞徐廣云即此縣也竟陵侯國有鄖鄉左傳桓十一年鄖人軍蒲騷立章山本内方荆州記曰山髙三十丈周廻百餘里縣東有申水左傳楚公子比為王次魚陂杜預曰在縣西北雲杜杜預曰縣東南有鄖城故國沙羨邾地道記曰楚滅邾徙其君此城下雉蘄春侯國鄂平春侯國南新市侯國案本傳有離鄉聚綠林安陸零陵郡武帝置雒陽南三千三百里十三城户二十一萬二千二百八十四口百萬一千五百七十八泉陵零陵陽朔山湘水出羅含湘中記曰有營水有洮水有雍水有祁水有宜水有春水有烝水有表水有來水有淥水有連水有倒水有偽水有泊水有資水皆注湘營道南有九疑山舜之所𦵏郭璞山海經注曰其山九谿皆相似故曰九疑湘州營陽郡記曰山下有舜祠故老相傳舜登九疑營浦滎陽郡記曰縣南三里餘有舜南廵止宿處今立廟泠道有舂陵鄉洮陽都梁有路山夫夷侯國故屬長沙始安侯國始安郡記曰縣東有駮樂山東有遼山重安侯國故鍾武永建三年更名湘鄉昭陽侯國荆州記縣東有余水傍有漁父廟烝陽侯國故屬長沙桂陽郡髙帝置上領山在雒陽南三千九百里十一城户十三萬五千二十九口五十萬一千四百三郴有客嶺山湘中記曰項籍徙義帝於郴而害之今有義陵祠又縣南十數里有馬嶺山山有仙人蘇耽壇荆州記曰城南六里縣西北有溫泉其下流有數十畝田常十二月下種明年三月新穀便登一年三収便耒陽有鐵陰山南平臨武桂陽含洭湞陽有苲領山始興郡記有吳山曲江始興郡記縣北有臨沅山漢寧永和元年置武陵郡秦昭王置名黔中郡髙帝五年更名雒陽南二千一百里先賢傳曰晉代太守趙厥問主簿潘京曰貴郡何以名武陵京曰鄙郡本名義陵在辰陽縣界與夷相接為所攻破光武時移東出遂得見全先識易號傳曰止戈為武髙平曰陵於是改名焉臣昭案前書本名武陵不知此對何據而出荆州記曰郡社中木麃樹是光武種至今也十二城户四萬六千六百七十二口二十五萬九百一十三臨沅荆州記曰縣南臨沅水水源出牂牁且蘭縣至郡界分為五谿故云五溪蠻漢夀故索陽嘉三年更名刺史治漢官儀曰去雒陽二千里孱陵魏氏春秋曰劉備在荆州所都改曰公安零陽充沅陵先有壺頭山馬援軍渡處有松梁山山有石開處數十丈其上名曰天門辰陽酉陽遷陵鐔成沅南建武二十六年置作唐長沙郡秦置雒陽南二千八百里十三城户二十五萬五千八百五十四口百五萬九千三百七十二臨湘攸茶陵安城酃荆州記曰有酃湖周廻三里取湖水為酒酒極甘美湘東記曰縣西南母山周廻四百里湘南侯國衡山在東南郭璞曰山别名岣嶁湘中記曰衡山有玉牒禹案其文以治水遥望衡山如陣雲㳂湘千里九向九背廼不復見連道昭陵益陽荆州記曰縣南十里有平岡岡有金井數百淺者四五尺深者不測俗傳云有金人以杖撞地輙便成井下雋羅帝王世紀曰有黄陵亭湘中記亦云二妃之神劉表為之立碑醴陵荆州記曰縣東四十里有大山山有三石室室中有石牀石臼父老相傳昔有道士學仙此室即合金沙之臼容陵右荆州刺史部郡七縣邑侯國百一十七魏氏春秋建安二十四年吳分巫秭歸為固陵郡二十五年分南郡之巫秭歸夷陵臨川并房陵上庸西城七縣為新城郡九江郡秦置雒陽東一千五百里十四城户八萬九千四百三十六口四十三萬二千四百二十六陰陵夀春漢官云刺史治去雒陽千三百里與志不同浚遒左傳哀十二年㑹吳于槖臯杜預曰在縣東南案宋均傳縣有唐后二山成徳西曲陽合肥侯國歴陽侯國刺史治當塗有馬丘聚徐鳳反於此帝王世紀曰禹㑹諸侯塗山皇覽曰楚大夫子思冢在縣東山鄉西去縣四十里子思造芍陂全椒鍾離侯國阜陵下蔡故屬沛左傳成七年吳入州來杜預曰下蔡縣平阿故屬沛有塗山應劭云山在當塗左傳穆有塗山之㑹義成故屬沛丹陽郡秦鄣郡武帝更名雒陽東二千一百六十里建安十三年孫權分新都郡十六城户十三萬六千五百一十八口六十三萬五百四十五宛陵溧陽丹陽故鄣秦鄣郡所治吳興記曰中平年分縣南置安吉縣光和末張角亂此鄉守險助國漢嘉之故立縣中平二年又分立原鄉縣於潛涇歙山海經曰三天子鄣山在閩西海北郭璞曰在縣東今謂之三玉山魏氏春秋有安勒烏邪山黝魏氏春秋有林歴山陵陽陵陽子明得仙於此縣山故以為名蕪湖中江在西左傳襄三年楚子伐吳克鳩兹杜預曰在縣之東秣陵其地本名金陵秦始皇改建安十六年孫權改曰建業十七年城石頭南有牛渚湖熟侯國句容江乗春穀石城廬江郡文帝分淮南置建武十年省六安國以其縣屬雒陽東一千七百里十四城户十萬一千三百九十二口四十二萬四千六百八十三舒有桐鄉古桐國左傳昭五年吳敗楚鵲岸杜預曰縣有鵲尾渚雩婁侯國尋陽有置馬亭劉勲士衆散處南有九江東合為大江釋慧逺廬山記畧曰山在尋陽南南濵宫亭湖北對小江山去小江三十餘里有匡俗先生者出殷周之際隠遯潛居其下受道於仙人而共嶺時謂所止為仙人之廬而命焉其山大嶺凡七重圓基周廻垂三五百里其南嶺臨宫亭湖下有神廟七嶺㑹同莫升之者東南有香爐山其上氛氲若香煙西南中石門前有雙闕壁立千餘仞而瀑布流焉其中鳥獸草木之美靈藥方林之竒所稱名代豫章舊志匡俗字君平夏禹之苗裔也潛左傳曰昭三十一年吳人侵楚伐夷侵潛六楚沈尹戍帥師救潛是也潛有天柱山臨湖侯國龍舒侯國襄安皖有鐵居巢侯國皇覽曰范増冢在郭東又庭中亞父井吏民皆祭亞父於居巢庭上長吏初視事皆祭而後從政後更造祠於東廣志曰有二大湖六安國皇覧曰臯陶冢在縣蓼侯國安豐有大别山左傳昭二十三年吳敗諸侯之師于雞父杜預曰縣南有雞備亭陽泉侯國廣志曰有陽泉湖安風侯國㑹稽郡秦置本治吳立郡吳乃移山隂雒陽東三千八百里十四城户十二萬三千九十口四十八萬一千一百九十六山陰越絶曰句踐小城山陰是也稷山有句踐齋戒臺吳越春秋曰句踐築城已成怪山自至怪山者琅邪海中山也一夕自來故名怪山㑹稽山在南上有禹冢山海經曰㑹稽之山四方上多金玉下多瑛石郭璞曰有禹井越絶曰有重山句踐𦵏大夫種有浙江郭璞注山海經曰江出歙縣玉山鄮烏傷越絶曰有常山古聖所采藥髙且神英雄交爭記曰初平三年分縣南鄉為常山縣諸暨越絶曰興平二年分立吳寧縣餘暨越絶曰西施之所出謝承書有涉皇山魏都賦注有蕭山潛水出焉太末左傳謂姑蔑初平三年分立新安縣建安四年孫氏分立豐安縣二十三年立遂昌縣東陽記縣龍丘山有九石特秀林表色丹白逺望盡如蓮花龍丘長隠居於此因以為名其峯際復有巖穴外如忩牖中有石床巖前有一桃樹其實甚甘非山中自有莫知誰植上虞漢末分南鄉立始寜縣剡餘姚句章山海經曰餘句之山無草木多金玉郭璞曰山在餘姚南句章北故二縣因以為名句踐欲遷吳王於甬東韋昭曰縣東洲鄞章安故治閩越地光武更名晉元康記曰本鄞縣南之廻浦鄉章帝章和元年立未詳永寧永和三年以章安縣東甌鄉為縣東部侯國吳郡順帝分㑹稽置雒陽東三千二百里十三城户十六萬四千一百六十四口七十萬七百八十二吳本國越絶曰吳大城闔閭所造周四十七里二百一十步二尺又有伍子胥城居巢城昌門外闔閭冢虎丘穹窿赤松子所取赤石脂也去縣二十里有鹿湖麗谿城又石城闔閭置美山虞山巫咸山皇覽曰縣東門外孫武冢又要離冢縣西南震澤在西後名具區澤爾雅十藪吳越之間有具區郭璞曰縣南太湖也中有句山山下有洞庭穴道潛行水底去無所不通號為地脉越絶書曰湖周三萬六千頃又有大雷山小雷山周處風土記曰舜漁澤之所臣昭案此僻在成陽是也又吳伐越敗之夫椒杜預曰太湖中椒山是也海鹽案今計偕簿縣之故治順帝時陷而為湖今謂為當湖大旱湖竭城郭之處可識烏程左傳襄三年楚伐吳至于衡山杜預曰在縣南或云丹陽縣之横山去鳩茲不逺子重所至也吳興記曰縣西北其山有項籍祠興平二年太守許貢奏分縣為永縣餘杭顧夷曰秦始皇至㑹稽經此立為縣史記曰始皇臨浙江水波惡乃西北二十里從狹中渡徐廣曰餘杭也臣昭案始皇所過乃在錢塘富春豈近餘杭之界乎毘陵季札所居北江在北越絶曰縣南城古淹地上湖中冢者季子冢也名延陵墟皇覽曰暨陽鄉丹徒春秋曰朱方曲阿由拳左傳曰越敗吳于檇李杜預曰縣南醉李城也干寳搜神記曰秦始皇東廵望氣者云五百年後江東有天子氣始皇至令囚徒十萬人堀汙其地表以惡名故改之曰由拳縣安越絶曰有西岑冢越王孫開所立以備春申君使其子守之子死遂𦵏城中富春陽羨邑郭璞曰縣有張公山洞宻有二堂無錫侯國史記曰春申君城故吳墟以自為都邑城在無錫皇覽曰吳王太伯冢在吳縣北梅里聚去城十里太伯始所居地名句吳臣昭案無錫縣東皇山有太伯冡民世修敬焉去墓十里有舊宅井猶存臣昭以為即宅為置廟不如皇覽所説也越絶曰縣西龍尾陵道春申君初封吳所造臣昭案今見在自是山名非築陵道婁豫章郡髙帝置雒陽南二千七百里二十一城户四十萬六千四百九十六口百六十六萬八千九百六豫章記曰新吳上蔡永脩縣並中平立豫章縣建安立上蔡民分徙此地立名上蔡南昌豫章記曰江淮唯此縣及吳臨湘三縣是也建城此地立名上蔡者豫章記曰縣有葛鄉有石炭二頃可燃以㸑新淦宜春廬陵興平元年孫策分立廬陵郡贛有豫章水雩都南野有臺領山南城鄱陽有鄱水黄金采建安十五年孫權分立鄱陽郡治縣歴陵有傅昜山餘汗鄡陽彭澤彭蠡澤在西柴桑艾左傳哀二十年吳公子慶忌所居海昏侯國在昌邑城豫章記曰城東十三里縣列江邊名慨口出豫章大江之口也昌邑王每乗流東望輙憤慨而還故謂之慨口平都侯國故安平石陽臨汝永元八年置建昌永元十六年分海昏置右揚州刺史部郡六縣邑侯國九十二後漢書卷三十二後漢書卷三十二考證郡國志四即墨侯國有棠鄉注左傳襄六年圍棠杜預曰棠國也臣召南按左傳注原文棠菜邑也北海即墨縣有棠鄉此志作棠國也非是不期侯國臣召南按不期當從前書作不其本書伏湛傳封不其侯亦作其字葉有長山曰方城注杜預曰方城山在縣南屈完曰楚國方城以為城推尋文義當云左傳屈完曰楚國方城以為城杜預曰方城山在縣南今此文誤倒酈侯國注即飲此水何焯校本即改仰秭歸本歸國推尋文義國上衍一歸字注杜預曰䕫國非歸國明矣零陵陽朔山湘水出注有雍水何焯校本作有灌水又有表水又有來水何焯校本作有來水有米水耒陽有鐵臣世駿按循吏衞諷傳注引續漢志云耒陽有鐵官較此志多一官字丹陽郡陽當作楊歙注今謂之三王山本亦作三玉山何焯校本又減去三字廬江郡注建武十年省六安國以其縣屬臣召南按建武十年應作十三年後章帝元和二年復改廬江為六安國至章和二年和帝即位復省六安入廬江此注未明東合為大江注圓基周廻垂三五百里何焯校本減去三字安豐注縣南有雞備亭何焯校本備改人㑹稽郡注秦置本治吳立郡吳乃移山陰立郡吳當改吳立郡太末注龍丘長隱居於此長當作萇又中有石林林毛本作牀婁監本脱此一縣依宋本添建城注此地立名上蔡者臣召南按上文豫章郡户口下分注豫章記曰一條三十二字應在此文之下遍檢本志引書必有所指上文豫章記言上蔡民分徙此地即此地立名上蔡之注解也不知何以將豫章記一條移置於前後人遂無糾正者南野有臺領山臣召南按監本於有臺下空一字是領山亦似縣名矣又彭澤縣彭蠡澤在西監本於彭蠡上亦空一字皆當連不連後漢書卷三十二考證
