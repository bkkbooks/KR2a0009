body:
  text: 後漢書卷三十六梁剡令劉昭補并注百官志第二十六百官三宗正大司農少府宗正卿一人中二千石本注曰掌序錄王國嫡庶之次及諸宗室親屬逺近郡國嵗因計上宗室名籍若有犯法當髠以上先上諸宗正宗正以聞乃報決胡廣曰又嵗一治諸王世譜差序秩第漢官曰員吏四十一人其六人四科一人二百石四人百石三人佐六人騎吏二人法家十八人學事一人官醫丞一人比千石諸公主每主家令一人六百石丞一人三百石本注曰其餘屬吏増減無常漢官曰主簿一人秩六百石僕一人秩六百石私府長一人秩六百石家丞一人三百石直吏三人從官二人東觀書曰其主薨無子置傅一人守其家右屬宗正本注曰中興省都司空令丞如淳曰主罪人大司農卿一人中二千石本注曰掌諸錢穀金帛諸貨幣郡國四時上月旦見錢穀簿其逋未畢各具别之邊郡諸官請調度者皆為報給損多益寡取相給足漢書曰員吏百六十四人其十八人四科九人斗食十六人二百石文學二十人百石二十五人佐七十五人學事一人官醫丞一人比千石部丞一人六百石本注曰部丞主帑藏古今注曰建初七年七月為大司農置丞一人秩千石别主帑藏則部丞應是而秩不同應劭漢官秩亦云二千石太倉令一人六百石本注曰主受郡國傳漕榖漢官曰員吏九十九人丞一人平凖令一人六百石本注曰掌知物賈主練染作采色漢官曰員吏百九十人丞一人導官令一人六百石本注曰主舂御米及作乾糒導擇也漢官曰員吏百一十二人丞一人右屬大司農本注曰郡國鹽官鐵官本屬司農中興皆屬郡縣魏志曰曹公置典農中郎將秩二千石典農都尉秩六百石或四百石典農校尉秩比二千石所主如中郎部分别而少為校尉丞又有廩犧令六百石掌祭祀犧牲鴈鶩之屬漢官曰丞一人三百石員吏四十人其十一人斗食十七人佐七人學事五人守學事皆河南屬縣給吏者及雒陽市長漢官曰市長一人秩四百石丞一人二百石明法補員吏三十六人十三人百石嗇夫十一人斗食十二人佐又有檝櫂丞三百石别治中水官主水渠在馬市東有員吏六人滎陽敖倉官中興皆屬河南尹餘均輸等皆省均輸者前書孟康注曰謂諸當所有輸於官者皆令輸其土地所饒平其所在時賈官更於他處貨之輸者既便而官有利鹽鐵論大夫曰往者郡國諸侯各以其物貢輸往來煩雜物多苦惡或不償其費故郡置輸官以相給運而便逺方之貢故曰均輸開委府于京師以籠貨物賤則買貴則賣是以縣官不失實商賈無所利故曰平凖平凖則民不失職均輸則民不劬勞故平凖均輸所以平萬物而便百姓也文學曰古之賦税於民也因其所工不求所拙農人納其穫工女效其織今釋其所有責其所無百姓賤買貨物以便上求間者郡國或令民作布絮吏留難與之為市吏之所入非獨齊陶之縑蜀漢之布也亦民間之所為耳行姦賣平農民重苦必苦女工繭税未見輸之均也縣官猥發闔門擅市即萬民並収並収則物騰躍騰躍則商賈利自市則吏容姦豪吏富商積貨儲物以待其急輕賈姦吏収以取貴未見凖之平也蓋古之均輸所以齊勞逸而便貢輸非以為利而賈萬物也王隆小學漢官篇曰調均報度輸漕委輸胡廣注曰邊郡諸官請調者皆為調均報給之也以水通輸曰漕委積也郡國所積聚金帛貨賄随時輸送諸司農曰委輸以供國用前書又有都内籍田令丞幹官鐵市兩長丞郡國諸倉農監六十五官長丞皆屬之少府卿一人中二千石本注曰掌中服御諸物衣服寳貨珍膳之屬漢官曰員吏三十四人其一人四科一人二百石五人百石四人斗食三人佐六人騎吏十三人學事一人官醫少者小也小故稱少府王者以租税為公用山澤陂池之税以供王之私用古皆作小府漢官儀曰田租芻槀以給經用凶年山澤魚鹽市税少府以給私用也丞一人比千石太醫令一人六百石本注曰掌諸醫漢官曰員醫二百九十三人員吏十九人藥丞方丞各一人本注曰藥丞主藥方丞主藥方太官令一人六百石本注曰掌御飲食漢官曰員吏六十九人衞士三十八人荀綽晉百官表注曰漢制太官令秩千石丞四人秩四百石不與志同左丞甘丞湯官丞果丞各一人本注曰左丞主飲食甘丞主膳具湯官丞主酒果丞主果荀綽云甘丞掌諸甘肥果丞别在外諸果菜茹守宫令一人六百石本注曰主御紙筆墨及尚書財用諸物及封泥漢官曰員吏六十九人丞一人漢官曰外官丞二百石公府吏府也上林苑令一人六百石本注曰主苑中禽獸頗有民居皆主之捕得其獸送太官漢官曰員吏五十八人案桓帝又置鴻徳苑令丞尉各一人侍中比二千石漢官秩云千石周禮太僕干寳注曰若漢侍中本注曰無員掌侍左右賛導衆事顧問應對法駕出則多識者一人參乗餘皆騎在乗輿車後本有僕射一人中興轉為祭酒或置或否蔡質漢儀曰侍中常伯選舊儒髙徳博學淵懿仰占俯視切問近對喻㫖公卿上殿稱制參乗佩璽秉劒員本八人陪見舊在尚書令僕射下尚書上今官出入禁中更在尚書下司𨽻校尉見侍中執板揖河南尹亦如之又侍中舊與中官俱止禁中武帝時侍中莽河羅挾刃謀逆由是侍中出禁外有事乃入畢即出王莽秉政侍中復入與中官共止章帝元和中侍中郭舉與後宫通拔佩刀驚上舉伏誅侍中由是復出外中常侍千石本注曰宦者無員後増秩比二千石掌侍左右從入内宫賛導内衆事顧問應對給事黄門侍郎六百石本注曰無員掌侍從左右給事中關通中外及諸王朝見於殿中引王就坐漢舊儀曰黄門郎屬黄門令日暮入對青瑣門拜名曰夕郎宫閣簿青瑣門在南宫衛瓘注吳都賦曰青瑣户邊靑鏤也一曰天子門内有眉格再重裏青畫曰瑣獻帝起居注曰帝初即位初置侍中給事黄門侍郎員各六人出入禁中近侍帷幄省尚書事改給事黄門侍郎為侍中侍郎去給事黄門之號旋復復故舊侍中黄門侍郎以在中宫者不與近宻交政誅黄門後侍中侍郎出入禁闈機事頗露由是王允乃奏比尚書不得出入不通賔客自此始也又曰諸奄人官悉以議郎郎中稱秩如故諸署令兩梁冠陛殿上得召都官從事以下小黄門六百石本注曰宦者無員掌侍左右受尚書事上在内宫關通中外及中宫已下衆事諸公主及王太妃等有疾苦則使問之黄門令一人六百石董巴曰禁門曰黄闥以中人主之故號曰黄門令本注曰宦者主省中諸宦者漢官曰員吏十八人丞從丞各一人本注曰宦者從丞主出入從黄門署長畫室署長玉堂署長各一人丙署長七人皆四百石黄綬本注曰宦者各主中宫别處中黄門冗從僕射一人六百石本注曰宦者主中黄門冗從居則宿衞直守門户出則騎從夾乗輿車中黄門比百石本注曰宦者無員後増比三百石掌給事禁中掖庭令一人六百石本注曰宦者掌後宫貴人采女事漢官曰吏從官百六十七人待詔五人員吏十人左右丞暴室丞各一人本注曰宦者暴室丞主中婦人疾病者就此室治其皇后貴人有罪亦就此室永巷令一人六百石本注曰宦者典宫婢侍使漢官曰員吏六人吏從官三十四人丞一人本注曰宦者漢官曰右丞一人暴室一人御府令一人六百石本注曰宦者典官婢作中衣服及補浣之屬漢官曰員吏七人吏從官三十人丞織室丞各一人本注曰宦者漢官曰右丞一人祠祀令一人六百石本注曰典中諸小祠祀漢官曰從官吏八人騶僕射一人家巫八人丞一人本注曰宦者鉤盾令一人六百石本注曰宦者典諸近池苑囿逰觀之處漢官曰吏從官四十人員吏四十八人丞永安丞各一人三百石本注曰宦者永安北宫東北别小宫名有園觀苑中丞果丞鴻池丞南園丞各一人二百石本注曰苑中丞主苑中離宫果丞主果園鴻池池名在雒陽東二十里南園在雒水南漢官曰又有署一人胡熟監一人案本紀桓帝又置顯陽苑丞濯龍監應劭漢官秩曰秩六百石直里監各一人四百石本注曰濯龍亦園名近北宫直里亦園名也在雒陽城西南角中藏府令一人六百石本注曰掌中幣帛金銀諸貨物漢官曰員吏十三人吏從官六人丞一人内者令一人六百石本注曰掌中布張諸衣物漢官曰從官祿士一人員吏十九人左右丞各一人尚方令一人六百石本注曰掌上手工作御刀劒諸好器物漢官曰員吏十二人吏從官六人丞一人尚書令一人千石本注曰承秦所置荀綽晉百官表注曰唐虞官也詩云仲山甫王之喉舌蓋謂此人武帝用宦者更為中書謁者令成帝用士人復故掌凡選署及奏下尚書曹文書衆事蔡質漢儀曰故公為之者朝㑹不陛奏事増秩二千石故自佩銅印墨綬尚書僕射一人六百石本注曰署尚書事令不在則奏下衆事蔡質漢儀曰僕射主封門掌授廩假錢穀凡三公列卿將大夫五營校尉行復道中遇尚書僕射左右丞郎御史中丞侍御史皆避車豫相廻避衞士傳不得迕臺官臺官過後乃得去臣昭案獻帝分置左右僕射建安四年以榮邵為尚書左僕射是也獻帝起居注曰邵卒官贈執金吾尚書六人六百石本注曰成帝初置尚書四人韋昭曰尚奉也分為四曹漢舊儀曰初置五曹有三公曹主斷獄蔡質漢儀曰典天下嵗盡集課事三公尚書二人典三公文書吏曹尚書典選舉齋祀屬三公曹靈帝末梁鵠為選部尚書常侍曹尚書主公卿事蔡質漢儀曰主常侍黄門御史事世祖改曰吏曹二千石曹尚書主郡國二千石事漢舊儀曰亦云主刺史蔡質漢儀曰掌中郎官水火盗賊辭訟罪𤯝民曹尚書主凡吏上書事蔡質漢舊儀曰典繕治功作監池苑囿盜賊事客曹尚書主外國夷狄事尚書龍作納言出入帝命應劭曰今尚書官王之喉舌世祖承遵後分二千石曹又分客曹為南主客曹北主客曹蔡質漢儀曰天子出獵駕御府曹郎屬之凡六曹周禮天官有司㑹鄭𤣥曰若今尚書左右丞各一人四百石本注曰掌錄文書期㑹左丞主吏民章報及騶伯史蔡質漢儀曰總典臺中綱紀無所不統右丞假署印綬及紙筆墨諸財用庫藏蔡質漢儀曰右丞與僕射對掌授廩假錢穀與左丞無所不統凡中宫漏夜盡鼓鳴則起鍾鳴則息衞士甲乙徼相傳甲夜畢傳乙夜相傳盡五更衞士傳言五更未明三刻後雞鳴衞士踵丞郎趨嚴上臺不畜宫中雞汝南出雞鳴衞士候朱雀門外專傳雞鳴於宫中應劭曰楚歌今雞鳴歌也晉太康地道記曰後漢固始鮦陽公安細陽四縣衞士習此曲於闕下歌之今雞鳴是也侍郎三十六人四百石本注曰一曹有六人主作文書起草蔡質漢儀曰尚書郎初從三署詣臺試初上臺稱守尚書郎中嵗滿稱尚書郎三年稱侍郎客曹郎主治羌胡事劇遷二千石或刺史其公遷為縣令秩滿自占縣去詔書賜錢三萬與三臺祖餞餘官則否治嚴一月凖謁公卿陵廟乃發御史中丞遇尚書丞郎避車執板住揖丞郎坐車舉手禮之車過逺乃去尚書言左右丞敢告知如詔書律令郎見左右丞對揖無敬稱曰左右君丞郎見尚書執扳對揖稱曰明時見令僕射執板拜朝賀對揖令史十八人二百石本注曰曹有三主書後増劇曹三人合二十一人古今注曰永元三年七月増尚書令史員功滿未嘗犯禁者以補小縣墨綬蔡質曰皆選蘭臺符節上稱簡精練有吏能為之決錄注曰故事尚書郎以令史久缺補之世祖始改用孝㢘為郎以孝亷丁邯補焉邯稱疾不就詔問實病羞為郎乎對曰臣實不病恥以孝亷為令史職耳世祖怒曰虎賁滅頭杖之數十詔問欲為郎不邯曰能殺臣者陛下不能為郎者臣中詔遣出竟不為郎邯字叔春京兆陽陵人也有髙節正直不撓後拜汾陰令治有名迹遷漢中太守妻弟為公孫述將収妻送南鄭獄免冠徒跣自陳詔曰漢中太守妻乃繫南鄭獄誰當搔其背垢者懸牛頭賣馬脯盜跖行孔子語以邯服罪且邯一妻冠履勿謝治有異卒於官符節令一人六百石本注曰為符節臺率主符節事凡遣使掌授節尚符璽郎中四人本注曰舊二人在中主璽及虎符竹符之半者漢官曰當時明法律郎周禮掌節有虎節龍節皆金也干寳注曰漢之銅虎符則其制也周禮又曰以英蕩輔之干寳曰英刻書也蕩竹箭也刻而書其所使之事以助三節之信則漢之竹使符者亦取則於故事也符節令史二百石本注曰掌書魏氏春秋曰中平六年始復節上赤葆御史中丞一人千石本注曰御史大夫之丞也舊别監御史在殿中宻舉非法周禮掌建邦之宫刑以主治王宫之政令干寳注曰若御史中丞及御史大夫轉為司空因别留中為御史臺率風俗通曰尚書御史臺皆以官倉頭為吏主賦舎凡守其門户蔡質漢儀曰丞故二千石為之或遷侍御史髙第執憲中司朝㑹獨坐内掌蘭臺督諸州刺史糾察百寮出為二千石魏志曰建安置御史大夫不領中丞置長史一人後又屬少府治書侍御史二人六百石本注曰掌選明法律者為之凡天下諸讞疑事掌以法律當其是非蔡質漢儀曰選御史髙第補之胡廣曰孝宣感路温舒言秋季後請讞時帝幸宣室齋居而決事令侍御史二人治書御史起此後因别置冠法冠秩百石有印綬與符節郎共平廷尉奏事罪當輕重荀綽晉百官表注曰惠帝以後無所平治備位而已侍御史十五人六百石本注曰掌察舉非法受公卿郡吏奏事有違失舉刻之凡郊廟之祠及大朝㑹大封拜則二人監威儀有違失則劾奏蔡質漢儀曰其二人者更直執法省中者皆糾察百官督州郡公法府掾屬髙第補之初稱守滿嵗拜真出治劇為刺史二千石平遷補令見中丞執板揖蘭臺令史六百石本注曰掌奏及印工文書右屬少府本注曰職屬少府者自太醫上林凡四官自侍中至御史皆以文屬焉承秦凡山澤陂池之税名曰禁錢屬少府世祖改屬司農考工轉屬太僕都水屬郡國孝武帝初置水衡都尉秩比二千石别主上林苑有離宫燕休之處世祖省之并其職於少府每立秋貙劉之日輙暫置水衡都尉事訖乃罷之少府本六丞省五又省湯官織室令置丞又省上林十池監胞人長丞宦者昆臺昆臺本名甘泉居室武帝改佽飛佽飛本名左弋武帝改三令二十一丞又省水衡屬官令長丞尉二十餘人章和以下中官稍廣加嘗藥太官御者鉤盾尚方考工别作監皆六百石宦者為之轉為兼副或省故錄本官蔡質漢儀曰少府符著出見都官從事持板都官從事入少府見符著持板漢官目錄曰古三卿司空所部後漢書卷三十六
