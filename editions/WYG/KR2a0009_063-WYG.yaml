body:
  text: 後漢書卷六十三宋宣城太守范煜撰唐章懷太子賢注朱馮虞鄭周列傳第二十三朱浮傳朱浮字叔元沛國蕭人也初從光武為大司馬主簿遷偏將軍從破邯鄲光武遣吳漢誅更始幽州牧苗曾乃拜浮為大將軍幽州牧守薊城遂討定北邊建武二年封舞陽侯食三縣浮年少有才能頗欲厲風迹風化之迹也收士心辟召州中名宿涿郡王岑之屬以為從事岑後為梁州牧及王莽時故吏二千石皆引置幕府乃多發諸郡倉穀廪贍其妻子漁陽太守彭寵以為天下未定師旅方起不宜多置官屬以損軍實謂甲兵糧儲也左傳曰隳軍實也不從其令浮性矜急自多矜誇多自取也頗有不平因以峻文詆之峻嚴切也詆誣也寵亦狠强兼負其功嫌怨轉積浮宻奏寵遣吏迎妻而不迎其母又受貨賄殺害友人多聚兵穀意計難量寵既積怨聞之遂大怒而舉兵攻浮浮以書質責之質正也曰盖聞知者順時而謀愚者逆理而動常竊悲京城太叔以不知足而無賢輔卒自棄於鄭也左傳曰鄭武公娶于申曰武姜生莊公及共叔段及莊公即位武姜為之請京使居謂之京城太叔既而太叔將襲鄭公命子封伐京京叛太叔段段出奔共也伯通以名字典郡伯通彭寵字也以名字顯著也有佐命之功光武初鎭河北寵遣吳漢等發歩兵三千人先歸光武及圍邯鄲寵轉食前後不絶也臨人親職愛惜倉庫而浮秉征伐之任欲權時救急二者皆為國耳即疑浮相譛何不詣闕自陳而為族滅之計乎朝廷之於伯通恩亦厚矣委以大郡任以威武光武賜寵號大將軍故云任以威武也事有柱石之寄情同子孫之親柱石以屋為喻也匹夫媵母尚能致命一餐左傳曰趙盾田於首山舍於翳桑見靈輒餓問曰三日不食矣食之後晉靈公欲殺趙盾輒為公甲士倒㦸以禦公徒而免盾媵母未詳也豈有身帶三綬職典大邦寵為漁陽太守建忠侯大將軍故帶三綬而不顧恩義生心外畔者乎伯通與吏人語何以為顔行歩拜起何以為容坐卧念之何以為心引鏡窺影何施眉目舉措建功何以為人惜乎棄休令之嘉名造梟鴟之逆謀梟鴟即鴟梟也其子適大還食其母說文云不孝鳥也捐傳世之慶祚招破敗之重災髙論堯舜之道不忍桀紂之性生為世笑死為愚鬼不亦哀乎伯通與耿俠遊俱起佐命同被國恩俠遊耿况字也况為上谷太守初與寵結謀共歸光武也俠遊謙讓屢有降挹之言挹損也而伯通自伐以為功髙天下往時遼東有豖生子白頭異而獻之行至河東見羣豕皆白懷慙而還若以子之功論於朝廷則為遼東豕也今乃愚妄自比六國六國之時其埶各盛廓土數千里勝兵將百萬故能據國相持多歴年世今天下幾里列郡幾城柰何以區區漁陽而結怨天子此猶河濱之人捧土以塞孟津多見其不知量也方今天下適定海内願安士無賢不肖皆樂立名於世而伯通獨中風狂走自捐盛時内聽驕婦之失計外信䜛邪之諛言浮密奏寵上徵之寵妻勸寵無應徵又與所親信計議吏皆怨浮勸寵止不應徵也長為羣后惡法永為功臣鑒戒豈不誤哉定海内者無私讐勿以前事自誤願留意顧老母㓜弟凡舉事無為親厚者所痛而為見讐者所快寵得書愈怒愈猶益也攻浮轉急明年涿郡太守張豐亦舉兵反時二郡畔戾北州憂恐浮以為天子必自將兵討之而但遣游擊將軍鄧隆陰助浮浮懐懼以為帝怠於敵不能救之乃上疏曰昔楚宋列國俱為諸侯莊王以宋執其使遂有投袂之師魏公子顧朋友之要觸冐强秦之鋒夫楚魏非有分職匡正之大義也莊王但為爭强而發忿公子以一言而立信耳左傳曰楚莊王使申舟無畏聘于齊曰無假道於宋宋人殺無畏莊王聞之投袂而起遂發兵圍宋史記魏公子無忌魏昭王之少子封信陵君仁而好士食客三千人公子姊為趙平原君勝妻秦圍邯鄲求救於魏魏以秦强不敢救公子乃竊兵符奪晉鄙軍以救趙秦兵遂解也今彭寵反叛張豐逆節以為陛下必棄捐它事以時滅之既歴時月寂漠無音從圍城而不救放逆虜而不討臣誠惑之昔髙祖聖武天下既定猶身自征伐未嘗寜居髙祖定天下之後猶自征匈奴陳豨黥布等也陛下雖興大業海内未集而獨逸豫不顧北垂百姓遑遑無所繫心三河冀州曷足以傳後哉今秋稼已熟復為漁陽所掠張豐狂悖姦黨日增連年拒守吏士疲勞甲胄生蟣蝨弓弩不得弛鄭𤣥注周禮曰弛釋下也上下燋心相望救護仰希陛下生活之恩詔報曰往年赤眉跋扈長安跋扈猶暴横也吾䇿其無穀必東果來歸降今度此反虜埶無久全其中必有内相斬者今軍資未充故湏後麥耳湏待也浮城中糧盡人相食㑹上谷太守耿况遣騎來救浮浮乃得遁走南至良鄉其兵長反遮之兵長兵之長帥也浮恐不得脫乃下馬刺殺其妻僅以身免城降於寵尚書令侯霸奏浮敗亂幽州搆成寵罪徒勞軍師不能死節罪當伏誅帝不忍以浮代賈復為執金吾徙封父成侯後豐寵並自敗帝以二千石長吏多不勝任時有纖微之過者必見斥罷交易紛紜百姓不寜六年有日食之異浮因上疏曰臣聞日者衆陽之所宗君上之位也凡居官治民據郡典縣皆為陽為上為尊為長若陽上不明尊長不足則干動三光垂示王者干犯也三光日月星也五典紀國家之政禮記曰温柔敦厚詩敎也疏通知逺書敎也潔静精微易敎也恭儉莊敬禮敎也屬辭比事春秋敎也鴻範别災異之文鴻範尚書篇名箕子為武王陳政道陰陽之法災異即咎徵之類也皆宣明天道以徵來事者也徵驗也陛下哀愍海内新離禍毒保宥生人宥寛也使得蘇息而今牧人之吏多未稱職小違理實輒見斥罷豈不粲然黑白分明哉淮南子曰聖人見是非若黑白之别於目清濁之形於耳也然以堯舜之盛猶加三考考謂考其功最也尚書舜典曰三載考績三考黜陟幽明也大漢之興亦累功效吏皆積久養老於官至名子孫因為氏姓前書武帝時漢有天下已七十餘年為吏者長子孫居官者以為姓號人人自愛而重犯法音義曰時無事吏不數轉至於子孫而不轉職今倉氏庫氏因以為姓即倉庫吏之後也當時吏職何能悉理論議之徒豈不諠譁盖以為天地之功不可倉卒艱難之業當累日也而間者守宰數見換易迎新相代疲勞道路尋其視事日淺未足昭見其職既加嚴切人不自保各相顧望無自安之心有司或因睚眦以騁私怨茍求長短求媚上意二千石及長吏廹於舉劾懼於刺譏故爭餙詐偽以希虚譽斯皆羣陽騷動日月失行之應夫物暴長者必夭折功卒成者必亟壊如摧長久之業而造速成之功非陛下之福也天下非一時之用也海内非一旦之功也願陛下遊意於經年之外望化於一世之後孔子曰如有王者必世而後仁見論語天下幸甚帝下其議羣臣多同於浮自是牧守易代頗簡舊制州牧奏二千石長吏不任位者事皆先下三公三公遣掾史案驗然後黜退帝時用明察不復委任三府而權歸刺舉之吏刺舉即州牧也浮復上疏曰陛下清明履約率禮無違自宗室諸王外家后親皆奉遵繩墨無黨埶之名至或乗牛車齊於編人斯固法令整齊下無作威者也求之於事宜以和平而災異猶見者而豈徒然天道信誠不可不察竊見陛下疾往者上威不行下専國命即位以来不用舊典信刺舉之官黜鼎輔之任至於有所劾奏便加退免覆案不關三府罪譴不蒙澄察陛下以使者為腹心而使者以從事為耳目是為尚書之平决於百石之吏使者刺史也續漢志曰每州有從事秩百石耳目謂令采察也平謂平决也故羣下苛刻各自為能兼以私情容長憎愛在職皆競張空虚以要時利故有罪者心不厭服無咎者坐被空文不可經盛衰貽後王也貽遺也夫事積久則吏自重重猶愛惜也吏安則人自靜傳曰五年再閏天道乃備周天三百六十五度四分度之一日行一度一年十二月除小月六日即一歳三百五十四日是為每歲日行天餘一十一度四分度之一不匝一年餘十一日四分日之一故三年即餘三十三日四分日之三閏月又小是五年即得再閏夫以天地之靈猶五載以成其化况人道哉臣浮愚戇不勝惓惓願陛下留心千里之任省察偏言之奏七年轉太僕浮又以國學既興宜廣博士之選乃上書曰夫太學者禮義之宫敎化所由興也陛下尊敬先聖垂意古典宫室未飾干戈未休而先建太學造立横舍横學也或作黌義亦同比日車駕親臨觀饗將以𢎞時雍之化顯勉進之功也雍和也書曰黎民於變時雍乃勉勸也尋博士之官為天下宗師使孔聖之言傳而不絶舊事䇿試博士必廣求詳選爰自畿夏延及四方是以博舉明經唯賢是登畿王畿夏華夏也漢官儀曰博士秦官也武帝初置五經博士後增至十四人太常差選有聰明威重一人為祭酒總領綱紀其舉狀曰生事愛敬喪没如禮通易尚書孝經論語兼綜載籍窮微闡奥隐居樂道不求聞逹身無金痍痼疾世六屬不與妖惡交通王侯賞賜行應四科經任博士下言某官某甲保舉學者精勵逺近同慕伏聞詔書更試五人唯取見在洛陽城者臣恐自今以往將有所失求之宻邇容或未盡而四方之學無所勸樂凡䇿試之本貴得其眞非有期㑹不及逺方也又諸所徵試皆私自發遣非有傷費煩擾於事也語曰中國失禮求之於野劉歆移書太常曰夫禮失求之於野古文不猶愈於野乎臣浮幸得與講圖䜟與音預故敢越職帝然之二十年代竇融為大司空二十二年坐賣弄國恩免二十五年徙封新息侯帝以浮陵轢同列每衘之陵轢猶欺蔑也惜其功能不忍加罪永平中有人單辭告浮事者單辭謂無正據也書曰明清于單辭顯宗大怒賜浮死長水校尉樊儵言於帝曰唐堯大聖兆人獲所獲得也尚優游四凶之獄厭服海内之心優遊謂優柔也四凶者鯀共工驩兠三苖左傳曰舜流四凶族今云堯者舜為堯臣而流之也書曰四罪而天下咸服使天下咸知然後殛罰殛誅也音紀力反浮事雖昭明而未逹人聽宜下廷尉章著其事帝亦悔之論曰吳起與田文論功文不及者三朱買臣難公孫𢎞十䇿𢎞不得其一終之田文相魏公孫宰漢誠知宰相自有體也史記魏置相田文吳起不悅謂田文曰請與子論功可乎田文曰可起曰將三軍使士卒樂死敵國不敢謀子孰與起田文曰不如子起曰理百官親萬人實府庫子孰與起田文曰不如子吳起曰守西河秦人不敢東向韓趙賔從子孰與起田文曰不如子吳起曰此三者子皆出吾下而位加吾上何也田文曰主少國疑大臣未附百姓不信方是時屬之於子乎屬之於我乎呉起默然良久曰屬之於子矣田文曰此乃吾所以居子上也吳起方乃自知不如武帝時方築朔方公孫𢎞諫以為罷弊中國上使朱買臣難𢎞發十䇿𢎞不得一故曾子曰君子所貴乎道者三三謂動容貌正顔色出辭氣事見論語籩豆之事則有司存籩豆禮器也小細之務有司所主非人君之事也而光武明帝躬好吏事亦以課覈三公課其殿最竅其得失其人或失而其禮稍薄至有誅斥詰辱之累任職責過一至於此追感賈生之論不亦篤乎賈誼曰亷耻禮節以繩君子故有賜死而無戮辱是以黥劓之罪不及大夫以其離主上不逺也是時人告周勃謀反繫長安卒無事故誼以此譏上也朱浮議諷苛察欲速之弊然矣論語孔子曰無欲速無見小利欲速則不逹見小利則大事不成以光武帝明察煩刻故引之焉得長者之言哉前書龔遂為渤海郡太守王生謂遂曰君即見上問君何以化渤海宜曰聖主之德非小臣之力也既至前上果問遂對如王生言天子悦曰君安得長者之言而稱也馮魴傳馮魴字孝孫南陽湖陽人也其先魏之支别食菜馮城因以氏焉東觀記曰其先魏之别封曰華侯華侯孫長卿食菜馮城因以氏焉魴父名揚也劉攽曰食菜馮氏案菜當為采音乃為菜耳秦滅魏遷于湖陽為郡族姓王莽末四方潰畔魴乃聚賔客招豪傑作營壍以待所歸待眞主也是時湖陽大姓虞都尉反城稱兵先與同縣申屠季有仇而殺其兄謀滅季族季亡歸魴魴將季欲還其營道逄都尉從弟長卿來欲執季魴叱長卿曰我與季雖無素故士窮相歸要當以死任之卿為何言遂與俱歸季謝曰蒙恩得全死無以為報恩有牛馬財物願悉獻之魴作色曰吾老親弱弟皆在賊中今日相與尚無所顧何云財物乎季慙不敢復言魴自是為縣邑所敬信故能據營自固時天下未定而四方之士擁兵矯稱者甚衆唯魴自守兼有方略光武聞而嘉之建武三年徵詣行在所見於雲臺即南宫雲臺也拜虞令虞縣屬梁國本虞國舜後所封之邑今宋州虞城縣也為政敢殺伐以威信稱遷郟令後車駕西征隗囂潁川盗賊羣起郟賊延襃等衆三千餘人攻圍縣舍魴率吏士七十許人力戰連日弩矢盡城陷魴乃遁去帝聞郡國反即馳赴潁川魴詣行在所帝案行闘處知魴力戰乃嘉之曰此健令也所當討擊勿拘州郡襃等聞帝至皆自鬄剔剔音他狄反聲類曰亦鬄字音他計反謂剃去髮也負鈇鑕說文曰鈇剉刃也鑕椹也音質將其衆請罪帝且赦之使魴轉降諸聚落縣中平定詔乃悉以襃等還魴誅之魴責讓以行軍法皆叩頭曰今日受誅死無所恨魴曰汝知悔過伏罪今一切相赦聽各反農桑為令作耳目皆稱萬歲是時每有盗賊並為襃等所發無敢動者縣界清浄十三年遷魏郡太守二十七年以髙第入代趙熹為太僕中元元年從東封岱宗行衛尉事還代張純為司空賜爵關内侯二年帝崩使魴持節起原陵更封楊邑鄉侯食三百五十户永平四年坐考隴西太守鄧融聽任姦吏䇿免削爵土六年顯宗幸魯復行衛尉事七年代隂嵩為執金吾魴性矜嚴公正在位數進忠言多見納用十四年詔復爵土明年東廵郡國留魴宿衛南宫東觀記曰勑魴車駕發後將緹騎宿𤣥武門複道上領南宫吏士保官給牀蓆子孫得到魴所建初三年以老病乞身肅宗許之其冬為五更詔魴朝賀就列侯位元和二年卒時年八十六子柱嗣尚顯宗女獲嘉長公主少為侍中以恭肅謙約稱位至將作大匠柱卒子定嗣官至羽林郎將定卒無子國除定弟石襲母公主封獲嘉侯亦為侍中稍遷衛尉能取悅當世為安帝所寵帝嘗幸其府留飲十許日賜駁犀具劒佩刀以班犀飾劒也紫艾綬艾即盭緑色也其色似艾玉玦各一半環曰玦以飾帶也拜子世為黄門侍郎世弟二人皆郎中自永初兵荒王侯租秩多不充於是特詔以它縣租稅足石令如舊限足音即諭反歲入榖三萬斛錢四萬遷光禄勲遂代楊震為太尉及北鄉侯立章帝孫濟北惠王夀之子懿也遷太傅與太尉東萊劉喜參録尚書事順帝既立石與喜皆以阿黨閻顯江京等䇿免復為衛尉卒子代嗣劉攽曰子世為郎子代嗣案世本名代前拜為郎時作世後嗣立時作代盖後人見其名疑代以為避太宗諱所改遂還作世而忘其後尚皆作代也今前後不同遂似兩人當定從一所以知世即代者拜家一人為郎必是長子自然嗣立者非他人也代卒弟承嗣為歩兵校尉石弟珖珖音光和帝時詔封楊邑侯劉攽曰案侯國絶而復續者皆曰紹封前後非一今此曰詔誤亦以石寵官城門校尉卒子肅嗣為黄門侍郎虞延傳虞延字子大陳留東昏人也東昏縣故城在今汴州陳留縣東北東昏屬山陽郡俗本作緍者誤也延初生其上有物若一疋練遂上昇天占者以為吉及長長八尺六寸要帶十圍力能扛鼎說文曰扛鼎横關對舉也扛音江少為户牖亭長時王莽貴人魏氏謝承書曰莽貴人魏氏以椒房之寵威傾郡縣賔客放從劉攽曰案當作縱古文雖通而注不音明其當作縱也并下侈從同延率吏卒突入其家捕之以此見怨故位不升性敦朴不拘小節又無鄉曲之譽王莽末天下大亂延常嬰甲胄擁衛親族扞禦鈔盗賴其全者甚衆延從女弟年在孩乳其母不能活之棄於溝中延聞其號聲哀而收之養至成人謝承書曰養育成人以妻同縣人王氏建武初仕執金吾府除細陽令細陽縣屬汝南郡故城在今潁州汝隂縣西北每至歲時伏臘輒休遣徒繫各使歸家並感其恩德應期而還有囚於家被病自載詣獄既至而死延率吏掾史劉攽曰案郡有掾有史總名為吏此宜為史殯于門外百姓感悅之後去官還鄉里太守富宗聞延名召署功曹富姓宗名宗性奢靡車服器物多不中節延諫曰昔晏嬰輔齊鹿裘不完晏子曰晏子布衣鹿裘以朝公曰夫子之家若此之貧也奚衣之惡也季文子相魯妾不衣帛左傳曰季文子相魯妾不衣帛馬不食粟以約失之者鮮矣宗不悦延即辭退居有頃宗果以侈縱被誅臨當伏刑擥涕而歎曰恨不用功曹虞延之諫光武聞而奇之二十年東廵路過小黄高帝母昭靈后園陵在焉小黄縣屬陳留郡故城在今汴州陳留縣東北漢官儀注曰髙帝母起兵時死小黄北後為作陵廟於小黄陳留風俗傳云沛公起兵野戰喪皇妣于黄鄉天下平乃使使者梓宫招魂幽野有丹蛇在水自洗濯入于梓宫其浴處仍有遺髮故諡曰昭靈夫人因作園陵寢殿司馬門鐘簴衛守小黄有祭器籩豆鼎爼之屬十四種廟基尚存焉時延為部督郵詔呼引見問園陵之事延進止從容占拜可觀其陵樹株蘖皆諳其數株根也蘖伐木更生也爼豆犧牲頗曉其禮帝善之勑延從駕到魯還經封丘城門門下小不容羽盖封丘今汴州縣也帝怒使撻侍御史延因下見引咎以為罪在督郵言辭激揚有感帝意乃制詔曰以陳留督郵虞延故貰御史罪貰放也延從送車駕西盡郡界賜錢及劒帶佩刀還郡於是聲名遂振二十三年司徒玊况辟焉謝承書曰况字文伯京兆杜陵人也代為三輔名族該總五經志節髙亮為陳留太守性聰敏善行德教永平十五年蝗蟲起泰山彌衍兗豫過陳留界飛逝不集五穀獨豐章和元年詔以况為司徒玉姓音宿時元正朝賀帝望而識延遣小黄門馳問之即日召拜公車令明年遷洛陽令是時陰氏有客馬成者常為姦盗延收考之陰氏屢請獲一書輒加篣二百篣棰也音彭信陽侯陰就就光烈皇后弟也就本傳信作新乃訴帝譛延多所寃枉帝乃臨御道之館親録囚徒延陳其獄狀可論者在東無理者居西成乃回欲趨東延前執之謂曰爾人之巨蠧久依城社不畏熏燒齊景公問晏子曰理國何患對曰患社䑕公曰何謂社鼠對曰社鼠不可熏人君之左右亦國之社鼠也今考實未竟宜當盡法成大呼稱枉陛㦸郎以㦸刺延叱使置之續漢志曰凡郎官皆主執㦸宿衛也帝知延不私謂成曰汝犯王法身自取之呵使速去後數日伏誅於是外戚歛手莫敢干法在縣三年遷南陽太守永平初有新野功曹鄧衍以外戚小侯每豫朝㑹而容姿趨歩有出於衆顯宗目之顧左右曰朕之儀貌豈若此人特賜輿馬衣服延以衍雖有容儀而無實行未嘗加禮帝既異之乃詔衍令自稱南陽功曹詣闕謝承書曰帝賜輿馬衣服劒佩刀錢二萬南陽計吏歸具以啓延延知衍華不副實行不配容積三年不用於是上乃自勑衍稱南陽功曹詣闕既到拜郎中遷𤣥武司馬𤣥武宫之北門也每宫城門皆有司馬一人秩千石見續漢志衍在職不服父喪帝聞之乃歎曰知人則哲惟帝難之信哉斯言衍慙而退由是以延為明三年徵代趙熹為太尉八年代范遷為司徒厯位二府十餘年無異政績㑹楚王英謀反陰氏欲中傷之使人私以楚謀告延延以英藩戚至親不然其言又欲辟幽州從事公孫𢎞郡國有從事主督促文書察舉非法皆州自辟除故通為百石即功曹從事理中從事之類是也見續漢志以𢎞交通楚王而止並不奏聞及英事發覺詔書切讓延遂自殺家至清貧子孫不免寒餒餒餓也謝承書曰身沒之後家貧空子孫同衣而出并日而食延從曾孫放字子仲少為太尉楊震門徒及震被䜛自殺順帝初放詣闕追訟震罪由是知名桓帝時為尚書以議誅大將軍梁冀功封都亭侯後為司空坐水災免性疾惡宦官遂為所陷靈帝初與長樂少府李膺等俱以黨事誅鄭𢎞傳鄭𢎞字巨君㑹稽山陰人也孔靈符㑹稽記曰射的山南有白鶴山此鶴為仙人取箭漢太尉鄭𢎞嘗采薪得一遺箭頃有人覔𢎞還之問何所欲𢎞識其神人也曰常患若邪溪載薪為難願旦南風暮北風後果然故若邪溪風至今猶然呼為鄭公風也從祖吉宣帝時為西域都護謝承書曰其曾祖父本齊國臨淄人官至蜀郡屬國都尉武帝時徙强宗大姓不得族居將三子移居山陰因遂家焉長子吉雲中都尉西域都護中子兗州刺史少子舉孝廉理劇東部侯也𢎞少為鄉嗇夫謝承書曰為靈文鄉嗇夫愛人如子續漢志曰其鄉小者縣署嗇夫一人主知人善惡為役先後知人貧富為賦多少平其差品也太守第五倫行春太守常以春行所主縣勸人農桑振救乏絶見續漢志見而深奇之召署督郵舉孝亷𢎞師同郡河東太守焦貺楚王英謀反發覺以疏引貺疏書也貺被収捕疾病於道亡沒妻子閉繫詔獄掠考連年諸生故人懼相連及皆改變名姓以逃其禍𢎞獨髠頭負鈇鑕詣闕上章為貺訟罪顯宗覺悟即赦其家屬𢎞躬送貺喪及妻子還鄉里由是顯名拜為騶令騶今兗州也謝承書曰𢎞勤行德化部人王逄等得路遺寳物縣於道衢求主還之魯國當春大旱五穀不豐騶獨致雨偏熟永平十五年煌起泰山流被郡國過騶界不集郡因以狀聞詔書以為不然遣使案行如言也政有仁惠民稱蘇息遷淮陰太守謝承書曰𢎞消息繇賦政不煩苛行春大旱随車致雨白鹿方道挾轂而行𢎞怪問主簿黄國曰鹿為吉為凶國拜賀曰聞三公車轓畫作鹿明府必為宰相劉攽曰案漢郡無淮陰者當是淮陽此時未為陳國也下文又少一初字四遷建初為尚書令舊制尚書郎限滿補縣長令史丞尉𢎞奏以為臺職雖尊而酬賞甚薄至於開選多無樂者樂音五孝反請使郎補千石令史為長劉攽曰案文少一令字但云千石不知何官但云史不合上文帝從其議𢎞前後所陳有補益王政者皆著之南宫以為故事出為平原相徵拜侍中建初八年代鄭衆為大司農舊交阯七郡貢獻運轉皆從東冶東冶縣屬㑹稽郡太康地理志云漢武帝名為東冶後改為東侯官今泉州閩縣是汎海而至風波艱阻沉溺相係𢎞奏開零陵桂陽嶠道於是夷通嶠嶺也夷平也至今遂為常路今謂范曄時也在職二年所息省三億萬計時歲天下遭旱邊方有警人食不足而帑藏殷積說文曰帑金布所藏之府𢎞又奏宜省貢獻減徭費以利飢人帝順其議元和元年代鄧彪為太尉時舉將第五倫為司空班次在下每正朔朝見𢎞曲躬而自卑帝問知其故遂聽置雲母屏風分隔其間以雲母飾屏風也由此以為故事在位四年奏尚書張林阿附侍中竇憲而素行臧穢又上洛陽令楊光憲之賔客在官貪殘並不冝處位書奏吏與光故舊因以告之光報憲憲奏𢎞大臣漏泄宻事帝詰讓𢎞収上印綬𢎞自詣廷尉詔勑出之因乞骸骨歸未許病篤上書陳謝并言竇憲之短帝省章遣醫占𢎞病比至已卒臨歿悉還賜物勑妻子褐巾布衣素棺殯殮以還鄉里周章傳周章字次叔南陽隨人也叔或作升初仕郡為功曹時大將軍竇憲免封冠軍侯就國章從太守行春到冠軍太守猶欲謁之章進諫曰今日公行春豈可越儀私交且憲椒房之親埶傾王室而退就藩國禍福難量明府剖符大臣千里重任剖符解見杜詩傳舉止進退其可輕乎太守不聽遂便升車章前拔佩刀絶馬鞅於是乃止及憲被誅公卿以下多以交關得罪太守幸免以此重章舉孝亷六遷為五官中郎將延平元年為光禄勲永初元年代魏霸為太常其冬代尹勤為司空是時中常侍鄭衆蔡倫等皆秉埶豫政章數進直言初和帝崩鄧太后以皇子勝有痼疾痼猶廢也不可奉承宗廟貪殤帝孩抱養為己子故立之以勝為平原王及殤帝崩羣臣以勝疾非痼意咸歸之太后以前既不立恐後為怨乃立和帝兄清河孝王子祐是為安帝劉攽曰案安帝名祜此作祐字之誤也見說文亦作祜章以衆心不附遂宻謀閉宫門誅車騎將軍鄧隲兄弟及鄭衆蔡倫劫尚書廢太后於南宫封帝為逺國王遙逺之國也而立平原王事覺勝䇿免章自殺家無餘財諸子易衣而出并日而食論曰孔子稱可與立未可與權論語載孔子之詞也立謂立功立事也權也者反常者也公羊傳曰權者何權者反乎經然後有善也將從反常之事必資非常之㑹㑹際也使夫舉無違妄志行名全周章身非負圖之託武帝欲立昭帝為太子乃畫周公負成王圖賜霍光德乏萬夫之望詩云顒顒卬卬萬夫之望王無絶天之亹地有既安之埶書曰紂自絶於天結怨於人也而創慮於難圖希功於理絶不已悖乎悖逆也如令君器易以下議即斗筲必能叨天業則狂夫豎臣亦自奮矣孟軻有言曰有伊尹之心則可無伊尹之心則篡矣孟子曰公孫丑問曰伊尹放太甲於桐宫人大悦太甲賢又反之人大悅賢者之為人臣也其君不賢故可放歟孟子荅以此言於戲方來之人戒之哉贊曰朱定北州激成寵尤魴用降帑帑虜也延感歸囚鄭竇怨偶代相為仇左傳曰怨偶曰仇周章反道小智大謀易曰智小而謀大力少而任重鮮不及矣後漢書卷六十三後漢書卷六十三考證朱浮傳封舞陽侯監本作武陽宋本作舞陽臣㑹汾按舞陽屬潁川郡武陽屬犍為郡又郡有東武陽泰山郡有南武陽侯國當建武之初徐兖未平蜀漢為公孫述所據則此所封者當是潁川郡之舞陽從宋本為是寵既積怨聞之遂大怒一本聞字下無之字不成句今仍監本自捐盛時監本作自損日知録曰損當作捐今從改馮魴傳宿衛南宫注領南宫吏士保官給牀蓆宋本毛本皆無官字臣㑹汾按文義當云領南宫吏士官給牀蓆保字疑衍否則有缺文虞延傳延率吏掾史臣㑹汾按正文掾史上加吏字不成文句詳劉攽刋誤當是正文作延率掾吏故駁正吏當為史也司徒玊况辟焉臣㑹汾按玉篇金玉之玉魚録反㸃在中書下其音宿者㸃在中書上監本作玊今改從玊又注章和元年詔以况為司徒諸本同臣㑹汾按光武帝紀建武二十三年以陳留太守玉况為大司徒謝承書誤鄭𢎞傳淮陰太守劉攽刋誤一條舊本誤刋於尚書令下今改正史臣論王無絶天之亹諸本同臣㑹汾按王字當作主即謂安帝也後漢書卷六十三考證
