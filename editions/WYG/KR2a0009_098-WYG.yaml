body:
  text: 後漢書卷九十八宋宣城太守范煜撰唐章懐太子賢注郭符許列傳第五十八郭太𫝊郭太字林宗范曄父名泰故改為此太鄭公業之名亦同也太原界休人也界休今汾州縣家世貧賤早孤母欲使給事縣廷蒼頡篇曰廷直也説文廷朝中也風俗通廷正也言縣廷郡廷朝廷皆取平均正直也林宗曰大丈夫焉能處斗筲之役乎遂辭就成臯屈伯彦學三年業畢博通墳籍善談論羙音制乃游於洛陽始見河南尹李膺膺大竒之遂相友善於是名震京師後歸鄉里衣冠諸儒送至河上車數千兩林宗唯與李膺同舟而濟衆賔望之以為神仙焉司徒黃瓊辟太常趙典舉有道或勸林宗仕進者對曰吾夜觀乾象晝察人事天之所廢不可支也左傳晋汝叔寛之詞支猶持也遂並不應性明知人好奬訓士類身長八尺容貌魁偉襃衣博帯周遊郡國嘗於陳梁間行遇雨巾一角墊音丁念反周遷輿服雜字曰巾以葛為之形如幍音口洽反本居士野人所服魏武造幍其巾乃廢今國子學生服焉以白紗為之時人乃故折巾一角以為林宗巾其見慕皆如此泰别傳曰泰名顕士争歸之載刺常盈車或問汝南范滂曰郭林宗何如人滂曰隐不違親介推之類貞不絶俗栁下恵之類天子不得臣諸侯不得友吾不知其它禮記曰儒有上不臣天子下不事諸侯後遭母憂有至孝稱謝承書曰遭母憂歐血發病歴年乃瘳林宗雖善人倫而不為危言覈論禮記曰擬人必於其倫鄭𤣥注曰倫猶類也論語孔子曰邦有道危言危行邦無道危行言遜覈猶實也故宦官擅政而不能傷也及黨事起知名之士多被其害唯林宗及汝南袁閎得免焉遂閉門教授子弟以千數建寕元年太傅陳蕃大將軍竇武為閹人所害林宗哭之於野慟既而歎曰人之云亡邦國殄瘁詩大雅之詞瞻烏爰止不知于誰之屋耳詩小雅也言不知王業當何所歸明年春卒于家時年四十二四方之士千餘人皆来㑹𦵏謝承書曰泰以建寕二年正月卒自𢎞農凾谷關以西河内湯隂以北二千里負笈荷擔彌路柴車葦裝塞塗盖有萬數来赴同志者乃共刻石立碑蔡邕為文既而謂涿郡盧植曰吾為碑銘多矣皆有慙徳唯郭有道無愧色耳其奬拔士人皆如所鑒謝承書曰泰之所名人品乃定先言後驗衆皆服之故適陳留則友符偉明遊太學則師仇季智之陳國則親魏徳公入汝南則交黄叔度初太始至南州過袁奉高不宿而去從叔度累日不去或以問太太曰奉髙之器譬之泛濫雖清而易挹叔度之噐汪汪若千頃之陂澄之不清撓之不濁不可量也已而果然太以是名聞天下後之好事或附益增張故多華辭不經又類卜相之書今録其章章效於事者著之篇末章章猶昭昭也左原者陳留人也為郡學生犯法見斥林宗嘗遇諸路為設酒肴以慰之謂曰昔顔涿聚梁甫之巨盗叚干木晋國之大駔卒為齊之忠臣魏之名賢吕氏春秋曰顔涿聚梁父大盗也學於孔子左傳曰晋伐齊戰于黎丘齊師敗績親禽顔庾杜預注曰黎丘隰也顔庾齊大夫顔涿聚也又曰晋荀瑶伐鄭請救於齊齊師將興陳成子屬孤子三日朝設乗車兩馬繫五邑焉召顔涿聚之子晋曰隰之役而父死焉以國之多難未汝恤也今君命汝是邑服車而朝無廢前勞吕氏春秋曰叚干木晋國之駔説文曰駔㑹也謂合兩家之賣買如今之度市也新序曰魏文侯過叚干木之閭而軾之遂致禄百萬而時徃問之國人皆喜相與誦之曰吾君好正叚干木之敬吾君好忠叚干木之隆秦欲攻魏司馬唐諫曰叚干木賢者也而魏禮之天下莫不聞無乃不可加兵乎秦君以為然也駔音子朗反蘧瑗顔囘尚不能無過况其餘乎論語曰蘧伯玉使人於孔子問之曰夫子何為對曰夫子欲寡其過而未能也又曰顔囘好學不貳過慎勿恚恨責躬而已原納其言而去或有譏林宗不絶惡人者對曰人而不仁疾之已甚亂也論語孔子之言也鄭𤣥注云不仁之人當以風化之若疾之已甚是益使為亂也原後忽更懐忿結客欲報諸生其日林宗在學原愧負前言因遂罷去後事露衆人咸謝服焉茅容字季偉陳留人也年四十餘耕於野時與等軰避雨樹下衆皆夷踞相對夷平也説文曰踞蹲也容獨危坐愈㳟林宗行見之而竒其異遂與共言因請寓宿旦日容殺鷄為饌林宗謂為已設既而以共其母自以草蔬與客同飯草麄也林宗起拜之曰卿賢乎哉因勸令學卒以成徳孟敏字叔逹鉅鹿楊氏人也十三州志曰楊氏縣在魏郡北地客居太原荷甑堕地不顧而去林宗見而問其意對曰甑已破矣視之何益林宗以此異之因勸令遊學十年知名三公俱辟並不屈云庾乗字世遊頴川鄢陵人也少給事縣庭為門士士即門卒林宗見而拔之勸遊學宫劉攽曰案文宫當作官遂為諸生傭後能講論自以卑第毎處下坐諸生博士皆就讎問由是學中以下坐為貴徴辟並不起號曰徴君宋果字仲乙謝承書乙作文扶風人也性輕悍憙與人報讎為郡縣所疾林宗乃訓之義方懼以禍敗果感悔叩頭謝負遂改節自𠡠後以烈氣聞辟公府侍御史并州刺史所在能化賈淑字子原林宗鄉人也雖世有冠冕而性險害邑里患之謝承書曰淑為舅宋瑗報讎於縣中為吏所捕繫獄當死泰與語淑懇惻流涕泰詣縣令應操陳其報怨蹈義之士被赦縣不宥之郡上言乃得原林宗遭母憂淑来修弔既而鉅鹿孫威直亦至威直以林宗賢而受惡人弔心怪之不進而去林宗追而謝之曰賈子厚誠實凶徳然洗心向善仲尼不逆互鄉故吾許其進也互鄉鄉名互鄉難與言童子見門人惑孔子曰人潔已以進與其進不保其徃淑聞之改過自厲終成善士鄉里有憂患者淑輙傾身營救為州閭所稱史叔賔者陳留人也少有盛名林宗見而告人曰牆髙基下雖得必失後果以論議阿枉敗名云黄允字子艾濟隂人也以儁才知名林宗見而謂曰卿有絶人之才足成偉噐然恐守道不篤將失之矣後司徒袁隗欲為從女求姻見允而歎曰得壻如是足矣允聞而黜遣其妻夏后氏婦謂姑曰今當見棄方與黄氏長辭乞一㑹親屬以展離訣之情於是大集賔客三百餘人婦中坐攘袂數允隐匿穢惡十五事言畢登車而去允以此廢於世謝甄字子㣲汝南召陵人也與陳留邊譲並善談論俱有盛名毎共候林宗未嘗不連日逹夜林宗謂門人曰二子英才有餘而並不入道惜乎甄後不拘細行為時所毁譲以輕侮曹操操殺之王柔字叔優弟澤字季道林宗同郡晋陽縣人也兄弟總角共候林宗以訪才行所宜林宗曰叔優當以仕進顯季道當以經術通然違方改務亦不能至也後果如所言柔為䕶匈奴中郎將澤為代郡太守又識張孝仲芻牧之中知范特祖郵置之役説文曰郵境上傳書舍也廣雅曰郵驛也置亦驛也風俗通曰漢改郵為置置者度其逺近之間置之也召公子許偉康並出屠沽司馬子威㧞自卒伍及同郡郭長信王長文韓文布李子政曹子元定襄周康子西河王季然雲中丘季智郝禮真等六十人並以成名謝承書曰太原郭長信王長文長文弟子師韓文布李子政曹子元定㐮周康子西河王季然雲中丘季智名靈舉子師位至司徒季然北地太守其餘多典州郡者論曰莊周有言人情險於山川以其動静可識而沉阻難徴徴明也沉深也故深厚之性詭於情貌詭違也則哲之鑒惟帝所難帝謂堯也書曰知人則哲惟帝為難而林宗雅俗無所失將其明性特有主乎然而遜言危行終亨時晦亨通也恂恂善導使士慕成名雖墨孟之徒不能絶也墨翟孟軻也絶過也符融傳符融字偉明陳留浚儀人也少為都官吏恥之委去續漢志曰都官從事主察舉百官犯法者融恥為其吏而去後遊太學師事少府李膺膺風性髙簡每見融輙絶它賔客聴其言論融幅巾奮褏談辭如雲幅巾者以一幅為之也褏古䄂字如雲者奔踊而出也膺每捧手歎息郭林宗始入京師時人莫識融一見嗟服因以介於李膺由是知名古人相見必因紹介介因也言因此人以相接見也謝承書曰融見林宗便與之交又紹介於膺以為海之明珠未耀其光鳥之鳯皇羽儀未翔膺與林宗相見待以師友之禮遂振名天下融之致也時漢中晋文經梁國黄子艾並恃其才智炫曜上京卧託飬疾無所通接洛中士大夫好事者承其聲名坐門問疾猶不得見謝承書曰文經子艾曜名逺近聲價已定徴辟不就療病京師不通賔客公卿將相大夫遣門生旦暮問疾郎吏公府掾屬雜坐其門不得見也三公所辟召者輙以詢訪之随所臧否以為與奪融察其非真乃到太學并見李膺曰二子行業無聞以豪傑自置遂使公卿問疾王臣坐門融恐其小道破義空譽違實特宜察焉膺然之二人自是名論漸衰賔徒稍省旬日之間慙歎逃去後果為輕薄子並以罪廢棄融益以知名州郡禮請舉孝亷公府連辟皆不應太守馮岱有名稱到官請融相見融一徃薦逹郡士范冉韓卓孔伷等三人伷音胄謝承書曰馮岱字徳山性慷慨有文武異才到官融徃相見薦范冉為功曹韓卓為主簿孔伷為上計吏袁山松書曰卓字子助臘日奴竊食祭其先卓義其心即日免之因辭病自絶㑹有黨事亦遭禁錮妻亡貧無殯歛鄉人欲為具棺服融不肯受曰古之亡者棄之中野易繫辭曰古之𦵏者厚衣以薪棄之中野唯妻子可以行志但即土埋藏而已謝承書曰潁川張元祖志行士也来存融弔其妻亡知其如此謂言足下欲上古道非不清妙且禮設棺椁制杖章孔子曰吾從周便推所乗羸車牛命融以給殯融受而不辭也融同郡田盛字仲嚮與郭林宗同好亦名知人優逰不仕並以夀終許劭傳許劭字子將汝南平輿人也輿音預少峻名節好人倫多所賞識若樊子昭和陽士者並顕名於世魏志曰和洽字陽士汝南西平人也初舉孝亷大將軍辟不就魏國建為侍中故天下言㧞士者咸稱許郭初為郡功曹太守徐璆甚敬之璆音求又巨秋反府中聞子將為吏莫不改操飾行同郡袁紹公族豪侠去濮陽令歸車徒甚盛將入郡界乃謝遣賔客曰吾輿服豈可使許子將見遂以單車歸家劭常到潁川多長者之遊唯不候陳寔又陳蕃喪妻還𦵏鄉人畢至而劭獨不徃或問其故邵曰太丘道廣廣則難周仲舉性峻峻則少通故不造也其多所裁量若此劉攽曰案文多字宜在量字下曹操㣲時常卑辭厚禮求為己目命品藻為題目劭鄙其人而不肯對操乃伺隙脅劭劭不得已曰君清平之姦賊亂世之英雄操大悦而去劭從祖敬敬子訓訓子相並為三公相以能謟事宦官故自致台司封侯數遣請劭劭惡其薄行終不候之劭邑人李逵壯直有高氣劭初善之而後為隙又與從兄靖不睦蜀志曰許靖字文休少與從弟劭俱知名並有人倫臧否之稱而私情不協劭為郡功曹排擯靖不得齒叙以馬磨自給時議以此少之初劭與靖俱有髙名好共覈論鄉黨人物每月輒更其品題故汝南俗有月旦評焉司空楊彪辟舉方正敦樸皆不就或勸劭仕對曰方今小人道長王室將亂吾欲避地淮海以全老幼乃南到廣陵徐州刺史陶謙禮之甚厚劭不自安告其徒曰陶恭祖外慕聲名内非真正待吾雖厚其埶必薄不如去之遂復投揚州刺史劉繇於曲阿繇字正禮其後陶謙果捕諸寓士寓寄也及孫策平吴劭與繇南奔豫章而卒時年四十六兄䖍亦知名汝南人稱平輿淵有工龍焉平輿故城在今豫州汝陽縣東北有二龍鄉月旦里贊曰林宗懐寳識深甄藻甄明也藻猶餙也明發周流永言時道明發發夕至明也吕氏春秋曰孔子周流天下符融鑒真子將人倫守節好恥並亦逡廵逡廵自退不仕也後漢書卷九十八後漢書卷九十八考證郭太傳美音制音監本訛言今改正譬之泛濫何焯曰泛當改氿俗本誤氿為汎因轉誤為泛耳汪汪若千頃之陂陂監本作波依宋本改將其明性特有主乎明性本或作名姓誤符融傳梁國黄子艾黄本或作王誤何焯曰濟隂郡故梁國即黄允也後漢書卷九十八考證
