body:
  text: 後漢書卷十七梁剡令劉昭補并注祭祀志第七祭祀上光武即位告天郊封禪祭祀之道自生民以來則有之矣豺獺知祭祀而况人乎故人知之至於念想猶豺獺之自然也顧古質畧而後文飾耳自古以來王公所為羣祀至於王莽漢書郊祀志既著矣故今但列自中興以來所修用者以為祭祀志謝沈書曰蔡邕引中興以來所脩者為祭祀志即邕之意也建武元年光武即位于鄗為壇營于鄗之陽春秋保乾圖曰建天子於鄗之陽名曰行皇祭告天地采用元始中郊祭故事六宗羣神皆從未以祖配天地共犢餘牲尚約黄圖載元始儀最悉曰元始四年宰衡莽奏曰帝王之義莫大承天承天之序莫重於郊祀祭天於南就陽位祀地於北主隂義圜丘象天方澤則地圜方因體南北從位燔燎升氣瘞埋就類牲欲繭栗味尚清𤣥器成匏勺貴誠因質天地神所統故類乎上帝禋于六宗望秩山川班于羣神皇天后土隨王所在而事祐焉甘泉太隂河東少陽咸失厥位不合禮制聖王之制必上當天心下合地意中考人事故曰愷悌君子求福不回回而求福厥路不通在易㤗卦乾坤合體天地交通萬物聚出其律太簇天子親郊天地先祖配天先妣配地隂陽之别以日冬至祀天夏至祀后土君不省方而使冇司六宗日月星山川海星則北辰川即河山岱宗三光衆明山阜百川衆流渟汙臯澤以類相屬各數秋望相序於是定郊祀祀長安南北郊罷甘泉河東祀上帝壇園八觚徑五丈高九尺茅營去壇十歩竹宫徑三百歩土營徑五百歩神靈壇各於其方靣三丈去茅營二十歩廣三十五歩合祀神靈以璧琮用辟神道以通廣各三十歩竹宫内道廣三丈有闕各九十一歩壇方三丈拜位壇亦如之為周道郊營之外廣九歩營六甘泉北辰于南門之外日月海東門之外河北門之外岱宗西門之外為周道前望之外廣九歩列望遂乃近前望道外徑六十二歩壇方二丈五尺髙三尺五寸為周道列望之外徑九歩卿望亞列望外徑四十歩壇廣三丈髙二尺十為周道卿望之外徑九歩大夫望亞卿望道外徑二歩壇廣一丈五尺髙一尺五寸十為周道大夫望之外徑九步士望亞大夫望道外徑五歩壇廣一丈髙一尺為周道士望之外徑九歩庶望亞士望道外徑九歩壇廣五尺髙五寸為周道庶望之外徑九歩凡天宗上帝宫壇營徑三里周九里營三重通八方歩后土壇方五丈六尺茅營去壇十歩外土營方二百限之其五零壇土茅營如上帝五神去營歩數神道四通廣各十歩宫内道廣各二丈有闕為周道后土宫外徑九歩營岱宗西門之外河北門之外海東門之外徑各六十歩壇方二丈高二尺為周道前望之外徑六歩列望亞前望道外三十六歩壇廣一丈五尺髙一尺五寸五為周道列望之外徑六歩卿望亞列望道外徑二十歩壇廣一丈高一尺十為周道卿望之外徑六歩大夫望亞卿望道之外徑九歩壇廣八尺高八寸為周道大夫望之外徑六歩士望亞大夫望道外徑十二歩壇廣六尺高六寸為周道士望之外徑六歩凡地宗后土宫壇營方二里周八里營再重道四通常以嵗之孟春正月上辛若丁親郊祭天南郊以地配望秩山川徧于羣神天地位皆南鄉同席地差共東共牢而食太宗高皇帝高后配于壇上西鄉后在北亦同席共牢而食日冬至使有司奉祭天神于南郊高皇帝配而望羣陽夏至使有司奉祭地祗于北郊高皇后配而望羣隂天地用牲二燔燎瘞埋用牲一先祖先妣用牲一天以牲左地以牲右皆用黍稷及樂其文曰皇天上帝后土神祗睠顧降命屬秀黎元為民父母秀不敢當羣下百僚不謀同辭咸曰王莽篡弑竊位秀發憤興義兵破王邑百萬衆於昆陽誅王郎銅馬赤眉青犢賊平定天下海内䝉恩上當天心下為元元所歸䜟記曰劉秀發兵捕不道卯金修徳為天子秀猶固辭至於再至於三羣下曰皇天大命不可稽留敢不敬承二年正月初制郊兆於雒陽城南七里依鄗采元始中故事為圓壇八陛中又為重壇天地位其上皆南鄉西上其外壇上為五帝位青帝位在甲寅之地赤帝位在丙已之地黄帝位在丁未之地白帝位在庚申之地黒帝位在壬亥之地其外為壝重營皆紫以像紫宫有四通道以為門日月在中營内南道日在東月在西北斗在北道之西皆别位不在羣神列中八陛陛五十八醊合四百六十四醊五帝陛郭帝七十二醊合三百六十醊中營四門門五十四神合二百一十六神外營四門門百八神合四百三十二神皆背營内鄉中營四門門封神四外營四門門封神四合三十二神凡千五百一十四神營即壝也封封土築也背中營神五星也及中宫宿五官神及五嶽之屬也背外營神二十八宿外宫星雷公先農風伯雨師四海四瀆名山大川之屬也至七年五月詔三公曰漢當郊堯其與卿大夫博士議時侍御史杜林上疏以為漢起不因緣堯與殷周異冝而舊制以高帝配方軍師在外且可如元年郊祀故事上從之語在林傳東觀書載杜林上䟽悉於本傳曰臣聞營河雒以為民刻肌膚以為刑封疆畫界以建諸侯井田什一以供國用三代之所同及至漢興因時冝趨世務省煩苛取實事不苟貪高亢之論是以去土中之京師就闗内之逺都除肉刑之重律用髠鉗之輕法郡縣不置世禄之家農人三十而取一政卑易行禮簡易從民無愚智思仰漢徳樂承漢祀基業特起不因緣堯堯逺於漢民不曉信言提其耳終不悦諭后稷近於周民户知之世據以興基由其祚本與漢異郊祀高帝誠從民望得萬國之歡心天下福應莫大於此民奉種祀且猶世主不失先俗羣臣僉薦鯀考績不成九載乃殛宗廟至重衆心難違不可卒改詩云不愆不忘率由舊章明當尊用祖宗之故文章也冝如舊制以解天下之惑合於易之所謂先天而天弗違後天而奉天時義方軍師在外祭可且如元年郊祭故事隴蜀平後乃增廣郊祀高帝配食位在中壇上西面北上漢舊儀曰祭天祭紫壇幄帷高皇帝祭天居堂下西向紺帷帳紺席鉤命决曰自外至者無主不止自内出者無匹不行天地高帝黄帝各用犢一頭青帝赤帝共用犢一頭白帝黒帝共用犢一頭凡用犢六頭漢舊儀曰祭天飬牛五嵗至三千觔按禮記曰天地之牛角繭栗而此云五嵗本志用犢是也日月北斗共用牛一頭四營羣神共用牛四頭凡用牛五頭凡樂奏青陽朱明西皓𤣥㝠及雲翹育命舞中營四門門用席十八枚外營四門門用席三十六枚凡用席二百一十六枚皆莞簟率一席三神日月北斗無陛郭醊既送神燌爼實於壇南已地周禮凡以神位者掌三辰之法以猶鬼神祗之居辨其名物鄭𤣥曰猶圗也居謂坐也天者羣神之精日月星辰其著位也以此圗天神人鬼地祗之坐者謂布祭衆寡與其居向孝經説郊祀之禮曰燔燎掃地祭牲繭栗或象天酒旗坐星厨倉具黍稷布席極敬心也言郊之布席象五帝坐禮祭宗廟序昭穆亦有以虚危則祭天圜丘象北極祭地方澤象后妃及社稷之席皆有明法焉建武三十年二月羣臣上言即位三十年冝封禅㤗山服虔注漢書曰封者増天之高歸功於天張晏云天高不可及於㤗山上立封禅而祭之冀近神靈也項威注曰封㤗山告太平升中和之氣於天祭土為封謂負土於㤗山為壇而祭也禮記曰因名山升中于天盧植注曰封㤗山告太平升中和之氣於天也東觀書載太尉趙熹上言曰自古帝王毎世之隆未嘗不封禅陛下聖徳洋溢順天行誅撥亂中興作民父母修復宗廟救萬姓命黎庶賴福海内清平功成治定羣司禮官咸以為冝登封告成為民報徳百王所同當仁不譲冝登封岱宗正三雍之禮以明靈契望秩羣神以承天心也詔書曰即位三十年百姓怨氣滿腹吾誰欺欺天乎曾謂㤗山不如林放何事汙七十二代之編録荘子曰易姓而王封於㤗山禪於梁父者七十有二代其有形兆垠堮勒石凡千八百餘處許慎説文序曰蒼頡之初作書葢依類象形故謂之文其後形聲相益即謂之字字者言孳乳而滋多也著於竹帛謂之書書者如也以迄五帝三王之世改易殊體封於㤗山者七十有二代靡有同焉桓公欲封管仲非之若郡縣逺遣吏上壽盛稱虚羙必髠兼令屯田從此羣臣不敢復言三月上幸魯漢祀令曰天子行有所之出河沈用白馬珪璧各一衣以繒緹五尺祠用脯二束酒六升塩一升渉渭㶚涇雒佗名水如此者沈珪璧各一律在所給祠具及行沈祠佗川水先驅投石少府給珪璧不滿百里者不沈過㤗山告太守以上過故承詔祭山及梁父時虎賁中郎将梁松等議記曰齊将有事㤗山先有事配林盖諸侯之禮也河嶽視公侯王者祭焉冝無即事之漸不祭配林盧植注曰配林小山林麓配㤗山者也謂諸侯不郊天㤗山廵省所考五嶽之宗故有事将祀之先即其漸天子則否矣㤗山廟在博縣風俗通曰博縣十月祀岱宗名曰合凍十二月涸凍正月解凍太守潔齋親自執事作脯廣一尺長五寸既祀訖取㤗山君夫人坐前脯三十朐太守拜章縣次驛馬傳送雒陽三十二年正月上齋夜讀河圖㑹昌符曰赤劉之九㑹命岱宗不慎克用何益於承誠善用之姦偽不萌感此文乃詔松等復案索河雒䜟文言九世封禪事者松等列奏乃許焉東觀書曰羣臣奏言登封告成為民報徳百王所同陛下輙拒絶不許臣下不敢頌功述徳業河雒誡書赤漢九世當廵封㤗山凡三十六事傳奏左帷陛下遂以仲月令辰遵岱嶽之正禮奉圖雒之明文以和靈瑞以為兆民上曰至㤗山乃復議國家徳薄灾異仍至圖䜟盖如此初孝武帝欲求神仙以扶方者言黄帝由封禪而後僊於是欲封禪封禪不常時人莫知元封元年上以方士言作封禪器以示羣儒多言不合於古於是罷諸儒不用三月上東上㤗山郭璞注山海經曰㤗山從山下至頭四十八里二百歩乃上石立之㤗山顛風俗通曰石高二丈一尺刻之曰事天以禮立身以義事父以孝成民則仁四海之内莫不為郡縣四夷八蠻咸来貢職與天無極人民蕃息天禄永得遂東廵海上求僊人無所見而還四月封㤗山風俗通曰封廣丈二尺髙九尺下有玉牒書也恐所施用非是乃祕其事語在漢書郊祀志東觀書曰上至㤗山有司復奏河雒圖記表章赤漢九世尤著明者前後凡三十六事與博士充等議以為殷統未絶黎庶繼命高宗乆勞猶為中興武王因父受命之列據三代郊天因孔子甚美其功後世謂之聖王漢統中絶王莽盗位一民莫非其臣尺土靡不其有宗廟不祀十有八年陛下無十室之資奮振於匹夫除殘去賊興復祖宗集就天下海内治平夷狄慕義功徳盛於高宗武王冝封禪為百姓祈福請親定刻石紀號文太常奏儀制詔曰許音小白欲封夷吾難之季氏欲旅仲尼非焉盖齊諸侯季氏大夫皆無事於㤗山今予未小子廵祭封禪徳薄而任重一則以喜一則以懼喜於得承鴻業帝堯善及子孫之餘賞恭應圖録當得是賞懼於過差執徳不𢎞信道不篤為議者所誘進後世知吾罪深矣上許梁松等奏乃求元封時封禪故事議封禪所施用有司奏當用方石再累置壇中皆方五尺厚一尺用玉牒書藏方石牒厚五寸長尺三寸廣五寸有玉檢又用石檢十枚列於石傍東西各三南北各二皆長三尺廣一尺厚七寸檢中刻三處深四寸方五寸有盖檢用金縷五周以水銀和金以為泥玉璽一方寸二分一枚方五寸方石四角又有距石皆再累枚長一丈厚一尺廣二尺皆在圓壇上其下用距石十八枚皆高三尺厚一尺廣二尺如小碑環壇立之去壇三歩距石下皆有石跗入地四尺又用石碑高九尺廣三尺五寸厚尺二寸立壇丙地去壇三丈以上以刻書上以用石功難又欲及二月封故詔松欲因故封石空檢更加封而已欲及二月者虞書嵗二月東廵狩至於岱宗柴范寗曰廵狩者廵行諸侯所守二月直卯故以東廵狩也祭山曰燔柴積柴加牲於其上而燔之也松上疏爭之以為登封之禮告功皇天垂後無窮以為萬民也承天之敬尤冝章明奉圖書之瑞尤冝顯著今因舊封竄寄玉牒故石下恐非重命之義受命中興冝當特異以明天意遂使㤗山郡及魯趣石工冝取完青石無必五色時以印工不能刻玉牒欲用丹漆書之㑹求得能刻玉者遂書書祕刻方石中命容玉牒二月上至奉高應劭漢官馬第伯封禪儀記曰車駕正月二十八日發雒陽宫二月九日到魯遣守謁者郭堅伯将徒五百人治太山道十日魯遣宗室諸劉及孔氏瑕丘丁氏上壽受賜皆詣孔氏宅賜酒肉十一日發十二日宿奉高是日遣虎賁郎将先上山三案行還益治道徒千人十五日始齋國家居太守府舍諸王居府中諸侯在縣庭中齋諸卿校尉将軍大夫黄門郎百官及宋公衛公褒成侯東方諸侯雒中小侯齋城外汶水上太尉太常齋山虞馬第伯自云某等七十人先之山虞觀祭山壇及故明堂宫郎官等郊四處入其幕府觀治石石二枚状博平圖九尺此壇上石也其一石武帝時石也時用五車不能上也因置山下為屋號五車石四維距石長丈二廣二尺厚尺半所四枚檢石長三尺廣六寸状如封篋長檢十枚一紀號石髙丈二尺廣三尺厚尺二寸名曰立石一枚刻文字紀功徳是朝上山騎行徃徃道峻峭不騎歩牽馬乍歩乍騎且相半至中觀留馬去平地二十里南向極望無不覩仰望天闗如從谷底仰觀抗峰其為高也如視浮雲其峻也石壁窅窱如無道徑遥望其人端如行朽兀或為白石或雪久之白者移過樹乃知是人也殊不可上四布僵臥石上有頃復蘓亦頼齎酒脯處處有泉水目輙為之明復勉強相将行到天闗自以已至也問道中人言尚十餘里其道旁山脅大者廣八九尺狹者五六尺仰視巖石松樹鬱鬱蒼蒼若在雲中俛視谿谷碌碌不可見丈尺遂至天門之下仰視天門窔遼如從穴中視天直上七里頼其羊腸逶迤名曰環道徃徃有絙索可得而登也兩從者扶挾前人相牽後人見前人履底前人見後人頂如畫重累人矣所謂磨胸捏石捫天之難也初上此道行十餘歩一休稍疲咽脣燋五六歩一休牒牒據頓地不避濕暗前有燥地目視而兩脚不隨早食上晡後到天門郭使者得銅物銅物形状如鍾又方柄有孔莫能識也疑封禪具也得之者汝南召陵人姓楊名通東上一里餘得木甲木甲者武帝時神也東北百餘歩得封所始皇立石及闕在南方漢武在其北二十餘歩得北垂圓臺高九尺方圓三丈所有兩陛人不得從上從東陛上䑓上有壇方一丈二尺所上有方石四維有距石四靣有闕鄉壇再拜謁人多置錢物壇上亦不掃除國家上見之則詔書所謂酢梨酸棗狼籍散錢處數百幣帛具道是武帝封禪至㤗山下未及上百官為先上跪拜置梨棗錢于道以求福即此也東山名曰日觀日觀者鷄一鳴時見日始欲出長三丈所秦觀者望見長安吳觀者望見㑹稽周觀者望見齊西北有石室壇以南有玉盤中有玉龜山南脅神泉飲之極清美利人日入下去行數環日暮時頗雨不見其道一人居其前先知蹈有人乃舉足隨之比至天門下夜人定矣遣侍御史與蘭臺令史将工先上山刻石文曰維建武三十有二年二月皇帝東廵狩至於岱宗柴風俗通曰岱者胎也宗者長也萬物之始隂陽之交觸石膚寸而合不崇朝而徧雨天下惟㤗山乎故為五岳之長耳望秩於山川孔安國書注曰九州名山大川五岳四瀆之屬皆一時望祭之安國又曰喻以尊卑祭之也五嶽視三公四瀆視諸侯其餘小者或卿大夫伯子男班於羣神孔安國曰羣神謂丘陵墳衍古之聖賢皆祭之矣遂覲東后從臣太尉憙行司徒事特進高密侯禹等漢賔二王之後在位孔子之後褒成侯序在東后蕃王十二咸來助祭河圖赤伏符曰劉秀發兵捕不道四夷雲集龍鬭野四七之際火為主河圖㑹昌符曰赤帝九世廵省得中治平則封誠合帝道孔矩則天文靈出地祗瑞興帝劉之九㑹命岱宗誠善用之姦偽不萌赤漢徳興九世㑹昌廵岱皆當天地扶九崇經之常漢大興之道在九世之王封於㤗山刻石著記禪於梁父退省考五河圖合古篇曰帝劉之秀九名之世帝行徳封刻政河圖提劉子曰九世之帝方明聖持衡拒九州平天下予雒書甄曜度曰赤三徳昌九世㑹修符合帝際勉刻封孝經鉤命決曰予誰行赤劉用帝三建孝九㑹修専兹竭行封岱青河雒命后經䜟所傳昔在帝堯聰明密㣲譲與舜庶後裔握機王莽以舅后之家三司鼎足冢宰之權勢依託周公霍光輔㓜歸政之義遂以篡叛僭號自立宗廟隳壊社稷喪亡不得血食十有八年楊徐青三州首亂兵革横行延及荆州豪傑并兼百里屯聚徃徃僣號北夷作㓂千里無煙無鷄鳴犬吠之聲皇天睠顧皇帝以匹庶受命中興年二十八載興兵起是以中次誅討十有餘年罪人則斯得黎庶得居爾田安爾宅書同文車同軌人同倫舟輿所通人跡所至靡不貢職建明堂立辟雍起靈臺設庠序同律度量衡孔安國書注曰同音律也度丈尺量斗斛衡觔兩也修五禮孔安國曰公侯伯子男朝聘之禮范寗曰吉凶軍賔嘉也五玉范寗曰五等諸侯之瑞珪璧也三帛孔安國曰諸侯世子執纁公之孤執𤣥附庸之君執黄范寗曰𤣥纁黄三孤所執二牲范寗曰羔鴈也卿執羔大夫執鴈一死雉也士所執䞇范寗曰總謂上所執之以為䞇者也吏各修職復於舊典在位三十有二年年六十二乾乾日昃不敢荒寜渉危歴險親廵黎元恭肅神祗惠恤耆老理庶遵古聰允明恕皇帝唯慎河圖雒書正文是月辛卯柴登封㤗山甲午禪於梁隂以承靈瑞以為兆民永兹一宇垂於後昆百僚從臣郡守師尹咸䝉祉福永永無極秦相李斯燔詩書樂崩禮壊建武元年已前文書散亡舊典不具不能明經文以章句細㣲相況八十一卷明者為驗又其十卷皆不昭晢子貢欲去告朔之餼羊子曰賜也爾愛其羊我愛其禮後有聖人正失誤刻石記封禪儀曰車駕十九日之山虞國家居亭百官布野比曰山上雲氣成宫闕百官並見之二十一日夕牲時白氣廣一丈東南極望致濃厚時天清和無雲瑞命篇岱嶽之瑞以日為應也二十二日辛卯晨燎祭天於㤗山下南方羣神皆從用樂如南郊封禪儀曰晨祭也日高三丈所燔燎燔燎煙正北也諸王王者後二公孔子後褒成君皆助祭位事也封禪儀曰百官各以决上郡儲輦三百為貴臣諸公王侯卿大夫百官皆歩上少用輦輦者干寳周禮注曰對轝曰輦事畢将升封或曰㤗山雖已從食於柴祭今親升告功冝有禮祭於是使謁者以一特牲於常祠㤗山處告祠㤗山如親耕貙劉先祠先農先虞故事至食時御輦升山封禪儀曰國家御首輦人輓升山至中觀休須㬰復上日中後到山上更衣封禅儀曰湏臾羣臣畢就位早晡時即位於壇北靣羣臣以次陳後西上畢位升壇封禅儀曰國家臺上北靣虎賁陛㦸臺下尚書令奉玉牒檢皇帝以寸二分璽親封之訖太常命人發壇上石封禅儀曰騶騎三千餘人發壇上方石尚書令藏玉牒已復石覆訖尚書令以五寸印封石檢封禅儀曰以金為繩以石三檢東方西方各三檢檢中石泥及壇土色赤白黒各依如其方色事畢皇帝再拜羣臣稱萬嵗封禪儀曰稱萬嵗音動山谷有氣屬天遥望不見山巔山巔人在氣中不知也命人立所刻石碑乃復道下封禪儀曰封畢有頃詔百官以次下國家隨後數百人維持行相逢推百官連延二十餘里道多廹小深谿高岸數百丈歩從匍匐邪上起近炬火止亦駱驛歩從觸擊大石石聲正讙但讙石無相應和者腸不能已口不能黙夜半後到百官明旦乃訖其中老者氣劣不能行卧巖石下明日早太醫令復遵問起居國家云昨上下山欲行廹前欲休則後人所蹈道峻危險恐不能度國家不勞百官以下露卧水飲無一人蹉跌無一人疾病豈非天邪㤗山率多㬥雨如今上直下柴祭封登清晏溫和明日上壽賜百官省事事畢發暮宿奉高三十里明日發至梁甫九十里夕牲二十五日甲午禪祭地於梁隂以高后配山川羣神從如元始中北郊故事服䖍曰禪廣土地項威曰除地為墠後改墠曰禪神之矣封禪儀曰功効如彼天應如此羣臣上壽國家不聼四月己卯大赦天下以建武三十二年為建武中元元年復博奉高嬴勿出元年租芻槀以吉日刻玉牒書函藏金匱璽印封之乙酉使太尉行事以特告至高廟虞典曰歸格於㙯祖用特太尉奉匱以告高廟藏於廟室西壁石室高主室之下袁宏曰夫天地者萬物之官府山川者雲雨之丘墟萬物生遂則官府之功大雲雨施潤則丘墟之徳厚故化洽天下則功配於天地澤流一國則徳合於山川是以王者經畧必以天地為本諸侯述職必以山川為主體而象之取其陶育禮而告之歸其宗本書日東廵狩至於岱宗柴傳曰郊祀后稷以祈農事夫廵狩觀化之常事祈農撫民之定業猶潔誠殷薦以告昊天况創制改物人神易聼者乎夫揖讓受終必有至徳於天下征伐革命則有大功於萬物是故王者初基則有封禪之事盖以其成功告於神明者也夫東方者萬物之所始山嶽者靈氣之所宅故求之物本必於其始取其所通必於所宅崇其壇場則謂之封明其代興則謂之禪然則封禪者王者開務之大禮也徳不周洽不得輙議斯事功不𢎞濟不得髣髴斯禮曠代一有其道至高故自黄帝堯舜至三代各一得封禪未有中修其禮者也雖繼職之君時有功徳此盖率復舊業増脩其前政不得仰齊造國同符改物者也夫神道貞一其用不煩天地易簡其禮尚質故藉用白茅貴其誠素器用陶匏取其易從然封禪之禮簡易可也若夫金函玉牒非天地之性也後漢書卷十七後漢書卷十七考證祭祀志上九州平天下予予本或作子後漢書卷十七考證
