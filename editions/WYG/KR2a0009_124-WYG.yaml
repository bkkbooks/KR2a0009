body:
  text: 原任詹事臣浩謹言按范氏後漢書隋志云九十七卷唐志云九十二卷論賛五卷今論賛附於紀傳共九十卷蓋自唐章懐作注付秘書省傳之至今其篇第如此唐志又云賢注後漢書一百卷以紀傳中分上下卷者凡十也劉昭注補志三十卷陳振孫云本别為一書至乾興初孫奭建議校勘補亡借闕館閣書目乃直以為百二十卷今考經籍志云後漢書一百二十五卷范氏本劉昭注則志之合於書亦不自奭始矣晁以道謂范書創為后紀及采風俗通枹朴子詭譎事失史之體按吕后有紀見於前書不可謂創何焯云東京諸后臨朝者六范書自合史家之變未可議也王喬左慈附見於方術原未予立傳又何譏焉陳氏又云劉昭所注乃司馬彪續漢書之八志今考章懐注所引續漢書文多與志同其言足信然先范氏而有作者若劉珍之東觀記謝承薛瑩華嶠謝沈袁山松諸家之書張瑩之漢南記今無一存者而彪書之志以附於漢書而傳非其幸歟范氏既未嘗為序卷目皆後人所定一志而分為數帙一傳而並列數人皆非史氏之舊馬班可作當不謂然然作者便於編輯讀者便於檢稽不啻為晉宋以後史書導之先路矣兹奉勅校勘監本漶漫剥落有他本可據者釐而正之疑不可考者仍之刋誤諸家在景祐以前者間為補綴自呉仁傑刋誤補遺而下有前人所未及發者亦分别采輯以備參考刋刻既竣臣浩復與同事諸臣詳審校勘録為後漢書考證若干條汲深而後知綆之短掃迅而後知葉之多為悚為慚㒺知所措臣謹識
