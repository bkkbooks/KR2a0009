body:
  text: 後漢書卷六十上宋宣城太守范煜撰唐章懷太子賢注蘇楊列傳第二十上蘇竟傳蘇竟字伯况扶風平陵人也平帝世竟以明易為博士講書祭酒王莽置六經祭酒秩上卿每經各一人竟為講尚書祭酒善圖緯能通百家之言王莽時劉歆等共典校書劉攽曰案文劉歆上少一與字拜代郡中尉劉攽曰按郡無中尉當作都時匈奴擾亂北邊多罹其禍竟終完輯一郡光武即位就拜代郡太守使固塞以拒匈奴建武五年冬盧芳略得北邊諸郡帝使偏將軍隨弟屯代郡隨姓弟名也弟音悌竟病篤以兵屬弟詣京師謝罪拜侍中數月以病免初延岑護軍鄧仲况擁兵據南陽陰縣為宼陰縣名屬南陽郡故城在今襄州穀城縣界北而劉歆兄子龔為其謀主臣賢案前書及三輔決録並云向曾孫今言歆兄子則不同也竟時在南陽與龔書曉之曰君執事無恙執事猶言左右也敬前人故呼其執事者爾雅曰恙憂也走昔以摩研編削之才走謂馳走之人謙稱也猶司馬遷與任少卿書云牛馬走之類也説文曰編次也削謂簡也一曰削書刀也研音午見反與國師公從事出入校定祕書劉歆為王莽國師公也竊自依依末由自逺盖聞君子愍同類而傷不遇人無智愚莫不先避害然後求利先定志然後求名昔智果見智伯窮兵必亡故變名逺逝智果智伯臣也逝去也戰國䇿曰智伯與韓魏共圍趙智伯之臣智果説智伯曰韓魏二主色動而喜必背君矣不如殺之智伯曰晉陽旦暮将㧞之而饗其利乃有他心不可子勿復言智果見言之不聽出更其姓為輔氏遂去不見其後韓魏乃反殺智伯三分其地果或作過陳平知項王為天所棄故歸心髙祖皆智之至也陳平初事項羽後知羽必敗乃仗劍渡河歸漢見前書也聞君前權時屈節北面延牙延岑字牙屈節謂臣事也乃後覺悟棲遲養德爾雅曰棲遲息偃也言後息偃養德不復事延牙也詩小雅曰或棲遲偃仰先世數子又何以加謂智果陳平也君處陰中土多賢士若以須㬰之間研考異同揆之圖書測之人事則得失利害可陳於目何自負畔亂之困不移守惡之名乎與君子之道何其反也世之俗儒末學醒醉不分而稽論當時疑誤視聽或謂天下迭興未知誰是稱兵據土可圖非兾或曰聖王未啟宜觀時變倚彊附大顧望自守二者之論豈其然乎夫孔丘祕經為漢赤制祕經幽祕之經即緯書也赤制解見郅惲傳𤣥包幽室文隱事明包藏也言緯書𤣥祕藏於幽室文雖微隱事甚明驗且火德承堯雖昧必亮昧暗也亮明也言漢承唐堯劉累之後以火德王雖遭王莽簒奪一時暗昧今光武中興必盛明也承積世之祚握無窮之符王氏雖乗間偷簒而終嬰大戮支分體解宗氏屠滅非其効歟王莽傳曰校尉公賔就斬莽首軍人分裂莽身支節肌肉臠分三輔舊事曰臠切千叚皇天所以眷顧踟蹰憂漢子孫者也踟蹰猶裴回也論者若不本之於天參之於聖猥以師曠雜事輕自眩惑說士作書亂夫大道焉可信哉師曠雜事雜占之書也前書曰陰陽書十六家有師曠八篇也諸儒或曰今五星失晷天時謬錯五星謂東方歲星南方熒惑星西方太白星北方辰星中央填星失晷失於常度辰星久而不効不効謂出入失度也太白出入過度熒惑進退見態塡星繞帯天街歲星不舍氐房前書曰昴畢間為天街氐房東方之宿歲星歲舍一次當次舍於氐房今不舍之是變常也以為諸如此占歸之國家盖災不徒設皆應之分野各有所主夫房心即宋之分東海是也前書天文志曰夘為房心宋之分也尾為燕分漁陽是也前書天文志曰寅為尾箕燕之分也東海董憲迷惑未降漁陽彭寵逆亂擁兵王赫斯怒命將並征故熒惑應此憲寵受殃太白辰星自亡新之末失行算度以至於今或守東井或沒羽林東井南方之宿天官書曰北宫虚危南方有衆星曰羽林天軍算或作舛或裴回藩屏或躑躅帝宫帝宫北辰也藩屏兩旁之星也裴回謂縈繞淹留躑躅謂上下不去也或經天反明或潛藏久沈或衰微闇昧或煌煌北南或盈縮成鉤或偃蹇不禁盈縮猶進退曲如鉤形也偃蹇髙而明大無禁制皆大運蕩除之祥聖帝應符之兆也賊臣亂子往往錯互指麾妄說傳相壊誤劉攽曰案文壊當作詿詿音卦壊音怪聲相近故誤之由此論之天文安得遵度哉乃者五月甲申天有白虹自子加午廣可十丈長可萬丈正臨倚彌倚彌即黎丘秦豐之都也盖秦豐黎丘一名倚彌也是時月入于畢畢為天網畢西方宿也主網羅無道之君故武王將伐紂上祭于畢求助天也史記曰周武王即位九年上祭于畢東觀兵於孟津也夫仲夏甲申為八魁厯法春三月己巳丁丑夏三月甲申壬辰秋三月己亥丁未冬三月甲寅壬戌為八魁八魁上帝開塞之將也主退惡攘逆流星狀似蚩尤旗或曰營頭或曰天槍出奎而西北行至延牙營上散為數百而滅奎為毒螫主庫兵春秋合誠圖曰奎主武庫之兵也此二變郡中及延牙士衆所共見也是故延牙遂之武當今均州縣也託言發兵實避其殃今年比卦部歲坤主立冬坎主冬至水性滅火南方之兵受歲禍也比卦坤下坎上坎為水也德在中宫刑在木木勝土刑制德今年兵事畢已中國安寧之效也五七之家三十五姓彭秦延氏不得豫焉春秋運斗樞曰五七三十五人皆共一德如何怪惑依而恃之葛藟之詩求福不回其若是乎詩大雅曰莫莫葛藟施于條枚愷悌君子求福不回注云葛延蔓于木之枝而茂盛喻子孫依緣先人之功而起也回違也言不違先祖之道圖䜟之占衆變之驗皆君所明善惡之分去就之决不可不察無忽鄙言夫周公之善康叔以不從管蔡之亂也史記曰周公以成王命伐殷殺管叔放蔡叔以殷餘人封康叔為衛君景帝之悅濟北以不從呉濞之畔也濟北王志髙帝孫齊王肥之子也呉楚反時堅守不從景帝賢之徙封為淄川王也自更始以來孤恩背逆歸義向善臧否粲然可不察歟良醫不能救無命彊梁不能與天爭扁鵲之見桓侯項王之敵漢祖也故天之所壊人不得支支持也左傳曰晋女叔寛曰天之所壊不可支也衆之所為不可干也宜密與太守劉君共謀降議仲尼棲棲墨子遑遑憂人之甚也班固曰棲棲遑遑孔席不煖墨突不黔也屠羊救楚非要爵禄莊子曰楚昭王失國屠羊說走而從於王昭王反國將賞從亡者及屠羊說屠羊說曰大王失國說失屠羊大王反國說亦反屠羊臣之爵禄已復矣又何賞之有遂不受也茅焦干秦豈求報利秦始皇遷太后於咸陽宫又撲殺兩弟齊人茅焦觧衣伏質入諫始皇乃迎太后歸於咸陽爵茅焦為上卿焦辭不受事見説苑也盡忠博愛之誠憤滿不能已耳又與仲况書諫之文多不載於是仲況與龔遂降龔字孟公長安人善論議扶風馬援班彪並器重之三輔决録注曰唯有孟公論可觀者班叔皮與京兆丞郭季通書曰劉孟公藏器於身用心篤固實瑚璉之器宗廟之寳也竟終不伐其功潛樂道術作記誨篇及文章傳於世年七十卒于家楊厚傳楊厚字仲桓廣漢新都人也祖父春卿善圖䜟學為公孫述將漢兵平蜀春卿自殺臨命戒子綂曰吾綈袠中說文曰綈厚繒也綈音提有先祖所傳祕記為漢家用爾其修之綂感父遺言服闋辭家從犍為周循學習先法又就同郡鄭伯山受河洛書及天文推歩之術益部耆舊傳曰綂字仲通曾祖父仲續舉河東方正拜祁令甚有德惠人為立祠樂益部風俗因留家新都代修儒學以夏侯尚書相傳建初中為彭城令一州大旱綂推陰陽消服縣界蒙澤太守宗湛使綂為郡求雨亦即降澍袁山松書曰綂在縣休徴時序風雨得節嘉禾生於寺舍人庶稱神也自是朝廷災異多以訪之綂作家法章句及内䜟二卷解說位至光禄大夫為國三老年九十卒綂生厚厚母初與前妻子博不相安厚年九歲思令和親乃託疾不言不食母知其㫖懼然改意懼音九具反恩養加篤博後至光禄大夫厚少學綂業精力思述初安帝永初二年太白入北斗洛陽大水續漢志曰時正月己亥太白入北斗中以為貴相凶也又京師及郡國四十一雨水鄧太后専政也時綂為侍中厚随在京師朝廷以問綂綂對年老耳目不明子厚曉讀圖書粗識其意鄧太后使中常侍承制問之厚對以為諸王子多在京師容有非常宜亟發遣各還本國亟音紀力反太后從之星尋滅不見又剋水退日期皆如所言除為中郎太后特引見問以圖䜟厚對不合免歸袁山松書曰鄧后問厚曰大將軍鄧隲應輔臣以不對曰不應以此不合其㫖復習業犍為不應州郡三公之命方正有道公車特徵皆不就永建二年順帝特徵詔告郡縣督促發遣厚不得已行到長安以病自上因陳漢三百五十年之戹春秋命厯序曰四百年之間閉四門聽外難羣異竝賊官有孽臣州有兵亂五七弱暴漸之効也宋均注云五七三百五十歲當順帝漸微四方多逆賊也宜蠲法改憲之道蠲明也及消伏災異凡五事制書襃述有詔太醫致藥大官賜羊酒及至拜議郎三遷為侍中特蒙引見訪以時政四年厚上言今夏必盛寒當有疾疫蝗蟲之害是歲果六州大蝗疫氣流行後又連上西北二方有兵氣宜備邊寇車駕臨當西廵感厚言而止至陽嘉三年西羌寇隴右明年烏桓圍度遼將軍耿曄永和元年復上京師應有水患又當火災三公有免者蠻夷當反畔是夏洛陽暴水殺千餘人至冬承福殿災太尉龎參免荆交二州蠻夷賊殺長吏寇城郭又言陰臣近戚妃黨當受禍陰私也明年宋阿母與宦者襃信侯李元等遘姦廢退阿母順帝乳母山陽君宋娥也後二年中常侍張逵等復坐誣罔大將軍梁商專恣悉伏誅每有災異厚輒上消救之法而閹宦專政言不得信時大將軍梁冀威權傾朝遣弟侍中不疑以車馬珍玩致遺於厚欲與相見厚不答固稱病求退帝許之賜車馬錢帛歸家修黄老敎授門生上名録者三千餘人太尉李固數薦言之太初元年梁太后詔備古禮以聘厚古禮謂以束帛加璧安車蒲輪等遂辭疾不就建和三年太后復詔徵之經四年不至年八十二卒於家䇿書弔祭鄉人諡曰文父門人為立廟郡文學掾史春秋饗射常祠之後漢書卷六十上後漢書卷六十上考證蘇竟傳夫仲夏甲寅為八魁注冬三月甲寅壬戌監本壬戌作壬寅臣㑹汾按上文言春三月己巳丁丑夏三月甲寅壬辰秋三月己亥丁未則十二支中皆越四位取之獨除去子午卯酉不用也冬甲寅當配以壬戌作壬寅者非是定從宋本後漢書卷六十上考證欽定四庫全書後漢書卷六十下宋宣城太守范煜撰唐章懐太子賢注郎襄列傳第二十下郎顗傳郎顗字雅光北海安丘人也父宗字仲綏學京氏易善風角星算六日七分京氏京房也作易傳風角謂候四方四隅之風以占吉凶也星算謂善天文算數也易稽覽圖曰甲子卦氣起中孚六日八十分日之七鄭𤣥注云六以候也八十分為一日之七者一卦六日七分也能望氣占候吉凶常賣卜自奉奉音扶用反安帝徵之對䇿為諸儒表後拜呉令呉縣名屬㑹稽郡今蘇州縣也時卒有暴風宗占知京師當有大火記識時日遣人參候果如其言諸公聞而表上以博士徵之宗恥以占騐見知聞徵書到夜縣印綬於縣廷而遁去遂終身不仕顗少傳父業兼明經典隱居海畔延致學徒常數百人晝研精義夜占象度勤心銳思朝夕無倦州郡辟召舉有道方正不就順帝時灾異屢見陽嘉二年正月公車徵顗乃詣闕拜章曰臣聞天垂妖象地見灾符所以譴告人主責躬脩德使正機平衡流化興政也易内傳曰凡灾異所生各以其政變之則除消之亦除易稽覽圖曰凡異所生灾所起各以其政變之則除其不可變則施之亦除鄭𤣥注云改其政者謂失火令則行水令失土令則行木令失金令則行火令則灾除去也不可變謂殺賢者也施之者死者不可復生封禄其子孫使得血食則灾除也伏惟陛下躬日􅉴之聽温三省之勤論語曾子曰吾日三省吾身也思過念咎務消祗悔祗大也易復卦初九曰無祗悔元吉方今時俗奢佚淺恩薄義夫救奢必於儉約拯薄無若敦厚安上理人莫善於禮脩禮遵約盖惟上興革文變薄事不在下故周南之德關雎政本周南詩序曰關雎風之始也所以風天下而正夫婦也故夫婦為政之本也本立道生風行草從澄其源者流清溷其本者末濁天地之道其猶鼓籥以虚為德自近及逺者也籥如笛六孔鼓籥其形内虚而氣無窮老子曰天地之間其猶槖籥虚而不屈動而愈出伏見往年以來園陵數灾陽嘉元年冬恭陵百丈廡灾永建元年秋茂陵園寢灾炎光熾猛驚動神靈易天人應曰君子不思遵利茲謂無澤厥灾孽火燒其宫又曰君髙臺府犯陰侵陽厥灾火又曰上不儉下不節炎火並作燒居室自頃繕理西苑修復太學永建六年修太學也宫殿官府多所搆飾昔盤庚遷殷去奢即儉帝王紀曰盤庚以耿在河北迫近山川自祖辛以來奢淫不絶乃度河将徙都亳之殷地人咨嗟相怨不欲徙盤庚乃作書三篇以告喻之今尚書盤庚三篇是也亳在偃師夏后卑室盡力致美論語孔子曰禹惡衣服而致美乎黻冕卑宫室而盡力乎溝洫又魯人為長府閔子騫曰仍舊貫何必改作長府魯之府名也仍因也貫事也言因舊事則可何必更作見論語臣愚以為諸所繕修事可省減稟䘏貧人賑贍孤寡此天之意也人之慶也仁之本也儉之要也焉有應天養人為仁為儉而不降福者哉土者地祗陰性澄静宜以施化之時敬而勿擾竊見正月以來陰闇連日易内傳曰久陰不雨亂氣也蒙之比也蒙者君臣上下相冒亂也易稽覽圖曰日食之比陰得陽蒙之比也陰冒陽也鄭𤣥注云蒙氣也比非一也邪臣謀覆冒其君先霧從夜昏起或從夜半或平旦君不覺悟日中不解遂成蒙君復不覺悟下為霧也比音庇劉攽曰注云陰得陽案得當作復又陽字下合有也字又曰賢德不用厥異常陰夫賢者化之本雲者雨之具也得賢而不用猶久陰而不雨也又頃前數日寒過其節氷既解釋還復凝合夫寒往則暑來暑往則寒來易繫辭之文也此言日月相推寒暑相避以成物也今立春之後火卦用事當温而寒違反時節由功賞不至而刑罰必加也宜須立秋順氣行罰臣伏案飛候參察衆政京房作易飛候以為立夏之後當有震裂涌水之害又比熒惑失度盈縮往來渉歴輿鬼環繞軒轅天官書曰輿鬼南方之宿軒轅黄龍體女主後宫之象也火精南方夏之政也政有失禮不從夏令則熒惑失行熒惑南方主夏為禮為視禮虧視失不行夏令則熒惑逆行也見天文志正月三日至乎九日三公卦也凡卦法一為元士二為大夫三為三公四為諸侯五為王位六為宗廟前書曰梁人焦延夀字贛長於灾變分六十四卦更直日用事以風雨寒温為候音義云分卦直日之法爻主一日即三日九日並為三公之日也三公上應台階下同元首春秋元命包曰魁下六星兩兩而比曰三台前書音義曰泰階三台也又黄帝泰階六符經曰泰階者天之三階也上階為天子中階為諸侯公卿大夫下階為士庶人三階平則陰陽和風雨時尚書曰君為元首臣作股肱言三公上象天之台階下與人君同體也政失其道則陰陽反節節彼南山詠自周詩詩小雅曰節彼南山維石巖巖赫赫師尹民具爾膽注云節高峻貎也喻三公之位人所髙巖也赫赫顯盛也師尹三公也言三公之位天下之人共瞻視之股肱良哉著於虞典而今之在位競託髙虚納累鍾之奉忘天下之憂六斛四斗曰鍾左傳曰四斗為豆四豆為區四區為釡四釡為鍾也劉攽曰注四斗為豆按斗當作升又云四釡為鍾四當作十棲遲偃仰寢疾自逸被䇿文得賜錢即復起矣何疾之易而愈之速以此消伏灾眚興致升平其可得乎今選舉牧守委任三府三公也長吏不良既咎州郡州郡有失豈得不歸責舉者而陛下崇之彌優自下慢事愈甚所謂大網踈小網數謂緩於三公切於州郡也三公非臣之仇臣非狂夫之作所以發憤忘食懇懇不已者誠念朝廷欲致興平非不能面譽也臣生長草野不曉禁忌披露肝膽書不擇言伏鑕鼎鑊死不敢恨謹詣闕奉章伏待重誅書奏帝復使對尚書使就尚書更對也顗對曰臣聞明王聖主好聞其過忠臣孝子言無隱情臣備生人倫視聽之類而稟性愚戇不識忌諱故出死忘命懇懇重言重再也誠欲陛下脩乾坤之德開日月之明披圖籍案經典覽帝王之務識先後之政如有闕遺退而自改本文武之業擬堯舜之道攘災延慶號令天下此誠臣顗區區之願夙夜夢寐盡心所計謹條序前章暢其㫖趣謂前詣闕所上章也條便宜七事具如狀對一事陵園至重聖神攸馮而灾火炎赫迫近寢殿魂而有靈猶將驚動尋宫殿官府近始永平歲時未積便更修造又西苑之設禽畜是處離房别觀本不常居而皆務精土木營建無已消功單賄巨億為計易内傳曰人君奢侈多飾宫室其時旱其灾火是故魯僖遭旱脩政自勑下鍾鼓之縣休繕治之官春秋考異郵曰僖公三年春夏不雨於是僖公憂閔𤣥服避舍釋更徭之逋罷軍寇之誅去苛刻峻文慘毒之敎所蠲浮令四十五事曰方今大旱野無生稼寡人當死百姓何罪不敢煩人請命願撫萬人害以身塞無狀禱已舍齊南郊雨大澍也雖則不寜而時雨自降左傳僖公六月雨由此言之天之應人敏於影響敏疾也今月十七日戊午徵日也陽嘉二年正月日加申日在申時也風從寅來丑時而止丑寅申皆徵也不有火灾必當為旱南方為徵故為火及旱也願陛下校計繕修之費永念百姓之勞罷將作之官減彫文之飾損庖厨之饌退宴私之樂易中孚傳曰陽感天不旋日易中孚傳曰陽感天不旋日諸侯不旋時大夫不過朞鄭𤣥注云陽者天子為善一日天立應以善為惡一日天立應以惡諸侯為善一時天立應以善為惡一時天立應以惡大夫為善一歲天亦立應以善為惡一歲天亦立應以惡一說云不旋日立應之不過時三辰間不過朞從今旦至明旦也陽即指天子也如是則景雲降集眚沴息矣景雲五色雲也一曰慶雲孝經援神契曰德至山陵則景雲出顗以陵園火灾故引之也眚沴謂灾氣二事去年以來兌卦用事類多不効易傳曰有貎無實佞人也有實無貎道人也寒温為實清濁為貎易稽覽圖曰有實無貎屈道人也有貌無實佞人也鄭𤣥注曰有寒温無貌濁清静此賢者屈道仕于不肖君也有貌濁清静無寒温此佞人以便巧仕於世也今三公皆令色足恭外厲内荏以虚事上無佐國之實故清濁効而寒温不効也是以陰寒侵犯消息易稽覧圖曰侵消息者或陰専政或陰侵陽鄭𤣥注温卦以温侵寒卦以寒侵陽者君也陰者臣也専君政事亦陰侵陽也占曰日乗則有妖風日蒙則有地裂如是三年則致日食陰侵其陽漸積所致立春前後温氣應節者詔令寛也其後復寒者無寛之實也夫十室之邑必有忠信率土之人豈無貞賢未聞朝廷有所賞拔非所以求善贊務𢎞濟元元宜採納良臣以助聖化三事臣聞天道不逺三五復反春秋合誠圖曰至道不逺三五而反宋均注云三三正也五五行也三正五行王者改代之際會也能於此際自新如初則通無窮也今年少陽之歲法當乗起恐後年已往將遂驚動渉歴天門灾成戊己戌亥之間為天門也劉攽曰案文戊當作戌注云戌亥之間是也今春當旱夏必有水臣以六日七分候之可知夫灾眚之來縁類而應行有玷缺則氣逆于天精感變出以戒人君王者之義時有不登則損滋徹膳數年以來穀收稍減家貧户饉歲不如昔百姓不足君誰與足水旱之灾雖尚未至然君子逺覽防微慮萌老子曰人之飢也以其上食稅之多也故孝文皇帝綈袍革舄木器無文前書曰孝文帝身衣弋綈足履革舄兵木無刃衣緼無文約身薄賦時致升平今陛下聖德中興宜遵前典惟節惟約天下幸甚易曰天道無親常與善人是故髙宗以享福髙宗殷王武丁也尚書大傳曰武丁祭成湯有雉飛升鼎耳而雊祖己曰雉者野鳥升于鼎者欲為用也無則逺方将有來朝者故武丁内反諸已以思先王之道三年編髪重譯來朝者六國孔子曰吾於髙宗肜日見德之有報之疾也帝王紀曰髙宗饗國五十有九年年百歲也宋景以延年呂氏春秋曰宋景公時熒惑在心召子韋問焉子韋曰禍當君雖然可移宰相公曰宰相寡人所與理國家也曰可移於人公曰人死寡人将誰為君曰可移於歲公曰歲飢人餓誰以我為君乎子韋曰君有至德之言三天必三賞君熒惑必退三舍一舍行七星星當一年君延二十一年矣熒惑果退三舍也四事臣竊見皇子未立儲宫無主仰觀天文太子不明洪範五行傳曰心之大星天王也其前星太子也後星庶子也熒惑以去年春分後十六日在婁五度婁西方宿也推歩三綂熒惑今當在翼九度翼南方宿也今反在桞三度桞東方宿也則不及五十餘度言熒惑行遲也去年八月二十四日戊辰熒惑厯輿鬼東入軒轅出后星北東去四度北旋復還軒轅者後宫也熒惑者至陽之精也天之使也熒惑南方火盛陽之精也天文要集曰天有五帝五星為之使而出入軒轅繞還往來易曰天垂象見吉凶其意昭然可見矣禮天子一娶九女嫡媵畢具今宫人侍御動以千計或生而幽隔人道不通鬱積之氣上感皇天故遣熒惑入軒轅理人倫垂象見異以悟主上昔武王下車出傾宮之女表商容之閭尚書大傅曰武王入殷表商容之閭歸傾宮之女以理人倫以表賢德故天授以聖子成王是也今陛下多積宮人以違天意故皇𦙍多夭嗣體莫寄詩云敬天之怒不敢戲豫詩大雅板篇之文也注云戲豫逸豫也方今之福莫若廣嗣廣嗣之術可不深思宜簡出宮女恣其姻嫁則天自降福子孫千億惟陛下丁寜再三留神於此左右貴倖亦宜惟臣之言以悟陛下盖善言古者合於今善言天者合於人前書武帝詔曰善言天者必有徵於人善言古者必有驗於今願訪問百僚有違臣言者臣當受茍言之罪論語孔子曰君子于其言無所茍而已矣五事臣竊見去年閏十月十七日己丑夜有白氣從西方天苑趨左足入玉井數日乃滅續漢志曰時客星氣白廣二尺長五丈起天苑西南天官書曰西方勾曲九星三處羅一曰犬旗二曰天苑三曰九斿參星下四小星為玉井其外四星左右肩股也春秋曰有星孛于大辰大辰者何大火也春秋昭十七年有星孛于大辰爾雅曰大辰房心尾也孫炎曰龍星明者可以為時候故曰大辰大火為大辰罰又為大辰爾雅曰罰謂之大辰也北極亦為大辰爾雅曰北極謂之北辰李廵曰北極天心也居北方正四時謂之北辰也所以孛一宿而連三宿者言北辰王者之宫也凡中宫無節政教亂逆威武衰微則此三星以應之也罰者白虎其宿主兵其國趙魏天官書曰參為白虎下有三星曰罰為斬刈之事故主兵昴畢之間趙魏之分也變見西方亦應三輔凡金氣為變發在秋節西方白氣入玉井是金氣之變也臣恐立秋以後趙魏關西將有羌寇畔戾之患宜豫宣告諸郡使敬授人時輕徭役薄賦歛勿妄繕起堅倉獄備守衛回選賢能以鎭撫之回易也金精之變責歸上司上司謂司馬也建武二十七年改為太尉韓詩外傳曰司馬主天陰陽不調星辰失度責之司馬故云責歸上司也宜以五月丙午遣太尉服干戚建井旟干楯也戚斧也西方主兵故太尉執持楯斧所以厭金氣也井南方火宿也鳥隼曰旟也以火勝金故畫井星之文於旟而建之也書玉板之䇿引白氣之異書祝辭於玉板也於西郊責躬求愆謝咎皇天消滅妖氣盖以火勝金轉禍為福也以五月丙午日火勝金也六事臣竊見今月十四日乙邜巳時白虹貫日凡日傍氣色白而純者名為虹貫日中者侵太陽也見於春者政變常也方今中官外司各各考事考劾也其所考者或非急務又恭陵火灾主名未立立猶定也時考問延火者姓名未定也多所收捕備經考毒尋火為天戒以悟人君可順而不可違可敬而不可慢陛下宜恭已内省以備後灾凡諸考案幷湏立秋又易傳曰公能其事序賢進士後必有喜反之則白虹貫日以甲乙見者則譴在中台譴責也韓詩外傳曰三公者何司空司徒司馬也司馬主天司空主地司徒主人故陰陽不調星辰失度責之司馬山陵崩絶川谷不流責之司空五穀不殖草木不茂責之司徒甲乙東方主春生殖五穀之時也而白虹以甲乙日見明責在司徒也自司徒居位陰陽多謬時劉崎為司徒至陽嘉三年䇿免久無虚已進賢之䇿天下興議異人同咨咨嗟歎也且立春以來金氣再見謂元年閏十二月己丑夜有白氣入玉井二年正月乙邜白虹貫日此金氣再見金能勝木必有兵氣宜黜司徒以應天意陛下不早禳之将負臣言遺患百姓七事臣伏惟漢興以來三百三十九歲於詩三基髙祖起亥仲二年今在戌仲十年基當作朞謂以三朞之法推之也詩氾厯樞曰凡推其數皆從亥之仲起此天地所定位陰陽氣周而復始萬物死而復蘇大綂之始故王命一節為之十歲也詩氾歴樞曰卯酉為革政午亥為革命神在天門出入候聽宋均注云神陽氣君象也天門戍亥之間乾所據者言神在戌亥司候帝王興衰得失厥善則昌厥惡則亡於易雄雌祕歴今値困乏凡九二困者衆小人欲共困害君子也經曰困而不失其所其唯君子乎易困卦之辭也唯獨賢聖之君遭困遇險能致命遂志不去其道易困卦曰澤無水困君子以致命遂志困卦坎下兑上坎為水兌為澤水在澤下是謂竭涸之象故以喻困致命遂志謂君子委命固窮不離於道也陛下乃者潛龍養德幽隱屈戹謂順帝為太子時廢為濟陰王即位之元紫宫驚動歴運之㑹時氣已應然猶恐妖祥未盡君子思患而豫防之臣以為戌仲巳竟來年入季文帝改法除肉刑之罪漢法肉刑三謂黥也劓也左右趾也文帝除之當黥者髠鉗城旦舂當劓者笞三百當左右趾者笞五百也至今適三百載自文帝十三年除肉刑至順帝陽嘉二年合三百年也宜因斯際大蠲法令官名稱號輿服器械事有所更變大為小去奢就儉機衡之政除煩為簡改元更始招求幽隱舉方正徵有道博採異謀開不諱之路臣陳引際㑹恐犯忌諱書不盡言未敢䆒暢臺詰顗曰對云白虹貫日政變常也朝廷率由舊章何所變易而言變常又言當大蠲法令革易官號或云變常以致灾或改舊以除異何也又陽嘉初建復欲改元據何經典其以實對顗對曰方春東作布德之元陽氣開發養導萬物王者因天視聽奉順時氣宜務崇温柔遵其行令禮記月令孟春天子命相布德和令行慶施惠下及兆民仲春安萌牙養幼少存諸孤省囹圄去桎梏止獄訟是遵其行令也而今立春之後考事不息秋冬之政行乎春夏故白虹春見掩蔽日曜凡邪氣乗陽則虹蜺在日斯皆臣下執事刻急所致殆非朝廷優寛之本此其變常之咎也又今選舉皆歸三司非有周召之才而當則哲之重尚書曰知人則哲每有選用輒參之掾屬參豫也公府門巷賔客填集送去迎來財貨無已其當遷者競相薦謁各遣子弟充塞道路開長姦門興致浮偽非所謂率由舊章也尚書職在機衡宫禁嚴密北斗魁星第三為機第五為衡於天文為喉舌李固對䇿曰陛下之有尚書猶天有北斗主為喉舌斟酌元氣運平四時出納王命也私曲之意差不得通偏黨之恩或無所用選舉之任不如還在機密欲使尚書専掌選也臣誠愚戇不知折中斯固逺近之論當今之宜又孔子曰漢三百載計歴改憲春秋保乾圖曰陽起於一天帝為北辰氣成於三以立五神三五展轉機以動運故三百歲斗歴改憲也劉攽曰按文計當作斗注文可見盖斗字似草書計字後人因誤之三百四歲為一德五德千五百二十歲五行更用易乾鑿度孔子曰立德之數先立木金水火土德各三百四歲五德備凡千五百二十歲太終復初故曰五行更用更猶變改也王者随天譬猶自春徂夏改青服絳者也禮記月令孟春天子衣青衣服蒼玉孟夏則衣朱衣服赤玉也自文帝省刑適三百年而輕微之禁漸以殷積王者之法譬猶江河當使易避而難犯也故易曰易則易知簡則易從易簡而天下之理得矣今去奢即儉以先天下改易名號随事稱謂易曰君子之道或出或處同歸殊塗一致百慮是知變常而善可以除灾變常而惡必致於異今年仲竟來年入季仲終季始歴運變改故可改元所以順天道也臣顗愚蔽不足以荅聖問顗又上書薦黃瓊李固并陳消灾之術曰臣前對七事要政急務宜於今者所當施用誠知愚淺不合聖聽人賤言廢當受誅罰論語孔子曰不以人廢言怔營惶怖靡知厝身臣聞刳舟剡楫将欲濟江海也易曰黄帝刳木為舟剡木為楫聘賢選佐将以安天下也昔唐堯在上羣龍為用羣龍喻賢臣也鄭𤣥注易乾卦云爻皆體乾羣龍之象舜既受禪禹與稷契咎繇之屬並在朝文武創德周召作輔是以能建天地之功增日月之耀者也詩曰肅肅王命仲山甫将之邦國若否仲山甫明之詩大雅也将行也若順也順否猶臧否謂善惡也言國有善惡仲山甫皆明之宣王是賴以致雍熙陛下踐祚以來懃心衆政而三九之位未見其人三公九卿也是以灾害屢臻四國未寜四方之國臣考之國典驗之聞見莫不以得賢為功失事為敗且賢者出處翔而後集論語色斯舉矣翔而後集爵以德進則其情不茍然後使君子恥貧賤而樂富貴矣若有德不報有言不醻來無所樂進無所趨無爵賞也則皆懐歸藪澤修其故志矣夫求賢者上以承天下以為人不用之則逆天綂違人望逆天綂則灾眚降違人望則化不行灾眚降則下吁嗟化不行則君道虧四始之缺五際之戹其咎由此四始為關雎為國風之始鹿鳴為小雅之始文王為大雅之始清廟為頌之始缺猶廢也翼奉傳曰易有陰陽五際孟康曰韓詩外傳云五際邜酉午戌亥也陰陽終始際㑹之歲於此則有變改之政豈可不剛健篤實矜矜慄慄以守天功盛德大業乎易繫辭曰日新之謂盛德富有之謂大業臣伏見光禄大夫江夏黃瓊耽樂道術清亮自然被褐懐寳含味經籍家語子路問於孔子曰有人於此被褐而懐玉何如子曰國無道隐可也國有道則衮冕而執玉也又果於從政明逹變復言明於變異消復之術也朝廷前加優寵賔於上位瓊入朝日淺謀謨未就因以喪病致命遂志老子曰大音希聲大器晩成聲震宇内謂之大音其動有時故希聲也無所不容謂之大器其功既博故晚成也善人為國三年乃立論語孔子曰茍有用我者期月而已可也三年乃成功又曰善人為邦百年可以勝殘去殺天下莫不嘉朝廷有此良人而復怪其不時還任陛下宜加隆崇之恩極養賢之禮徵反京師以慰天下又處士漢中李固年四十通游夏之蓺履顔閔之仁絜白之節情同皦日忠貞之操好是正直卓冠古人當世莫及元精所生王之佐臣元為天精謂之精氣春秋演孔圖曰正氣為帝間氣為臣宫商為佐秀氣為人也天之生固必為聖漢宜蒙特徵以示四方夫有出倫之才不應限以官次昔顔子十八天下歸仁論語曰顏淵問仁孔子曰克已復禮為仁一日克已復禮天下歸仁焉子奇穉齒化阿有聲子奇齊人年十八為阿邑宰出倉廪以振貧乏邑内大化見説苑若還瓊徵固任以時政伊尹傅說不足為比則可垂景光致休祥矣臣顗明不知人伏聽衆言百姓所歸臧否共歎願汎問百僚覈其名行有一不合則臣為欺國惟留聖神不以人廢言謹復條便宜四事附奏於左一事孔子作春秋書正月者敬歲之始也公羊傳曰元年春正月元年者何君之始年也春者何歲之始也王者則天之象因時之序宜開發德號爵賢命士流寛大之澤垂仁厚之德禮記正月迎春於東郊還乃賞公卿諸侯大夫於朝命相布德和令行慶施惠下及兆人慶賞遂行無有不當順助元氣含養庻類如此則天文昭爛星辰顯列五緯循軌四時和睦五緯五星不則太陽不光天地溷濁時氣錯逆霾霧蔽日爾雅曰風而雨土為霾自立春以來累經旬朔未見仁德有所施布但聞罪罰考掠之聲夫天之應人疾於影響而自從入歲常有蒙氣月不舒光日不宣曜日者太陽以象人君政變於下日應於天清濁之占隨政抑揚天之見異事無虚作豈獨陛下倦於萬機帷幄之政有所闕歟帷幄謂謀謨之臣也何天戒之數見也臣願陛下發揚乾剛援引賢能勤求機衡之寄以獲斷金之利易曰二人同心其利斷金臣之所陳輒以太陽為先者明其不可久闇急當改正其異雖微其事甚重臣言雖約其旨甚廣惟陛下乃眷臣章深留明意二事孔子曰靁之始發大壯始君弱臣彊從解起今月九日至十四日大壯用事消息之卦也於此六日之中靁當發聲發聲則歲氣和王道興也周書時訓曰春分之日𤣥鳥至又五日靁乃發聲靁不發聲諸侯失人也易曰靁出地奮豫豫卦坤下震上坤為地震為靁靁出地上故曰靁出地豫奮動也豫喜也先王以作樂崇德殷薦之上帝殷盛也薦進也上帝天帝也靁動於地萬物喜豫作樂之象靁者所以開發萌牙辟陰除害萬物湏靁而解資雨而潤易解卦曰天地解而靁雨作靁雨作而百果草木皆甲坼也故經曰靁以動之雨以潤之易說卦文王者崇寛大順春令則靁應節不則發動於冬當震反潛故易傳曰當靁不靁太陽弱也今蒙氣不除日月變色則其效也天網恢恢疏而不失老子之文也随時進退應政得失大人者與天地合其德與日月合其明易乾卦文言之辭也大人天子也璇璣動作與天相應靁者號令其德生養號令殆廢當生而殺則靁反作其時無歲靁以冬鳴則歲飢也陛下若欲除灾昭祉順天致和宜察臣下尤酷害者亟加斥黜以安黎元則太皓悅和靁聲乃發太皓天也三事去年十月二十日癸亥太白與歲星合於房心太白在北歲星在南相離數寸光芒交接房心者天帝明堂布政之宫春秋元命包曰房四星心三星孝經鉤命决曰歲星守心年穀豐歲星守心為重華故年豐也尚書洪範記曰月行中道移節應期德厚受福重華留之天官書曰歲星一曰攝提一曰重華也重華者謂歲星在心也今太白從之交合明堂金木相賊而反同合太白金也歲星木也金克木故相賊也此以陰陵陽臣下専權之異也房心東方其國主宋夘為房心宋之分也石氏經曰石氏魏人石中夫也見藝文志劉攽曰案前書中夫當作申夫歲星出左有年出右無年今金木俱東歲星在南是為出右恐年穀不成宋人飢也陛下宜審詳明堂布政之務然後妖異可消五緯順序矣五緯五星也四事易傳曰陽無德則旱陰僣陽亦旱陽無德者人君恩澤不施於人也陰僣陽者禄去公室臣下専權也自冬渉春訖無嘉澤數有西風反逆時節春當東風也朝廷勞心廣為禱祈薦祭山川暴龍移市董仲舒春秋繁露曰春旱以甲乙日為蒼龍一長八尺居中央為小龍五各長四尺於東方皆東向其問相去八尺小童八人皆齋三日服青衣而舞之夏以丙丁日為赤龍服赤衣季夏以戊巳日為黄龍服黄衣秋以庚辛日為白龍服白衣冬以壬癸日為黑龍服黑衣牲各依其方色皆燔雄雞燒豭豬尾於里北門及市中以祈焉禮記歲旱魯穆公問於縣子縣子曰為之徙市不亦可乎見檀弓臣聞皇天感物不為偽動灾變應人要在責己若令雨可請降水可禳止則歲無隔并太平可待然而灾害不息者患不在此也不在祈禱立春以來未見朝廷賞録有功表顯有德存問孤寡賑恤貧弱而但見洛陽都官奔車東西收繫纎介牢獄充盈臣聞恭陵火處比有光曜比頻也時恭陵百丈廡災仍有光曜不絶明此天灾非人之咎丁丑大風掩蔽天地風者號令天之威怒皆所以感悟人君忠厚之戒又連月無雨将害粟麥若一穀不登則飢者十三四矣陛下誠宜廣被恩澤貸贍元元昔堯遭九年之水人有十載之蓄者簡稅防灾為其方也簡少也方法也願陛下早宣德澤以應天功若臣言不用朝政不改者立夏之後乃有澍雨於今之際未可望也若政變於朝而天不雨則臣為誣上愚不知量分當鼎鑊書奏特詔拜郎中辭病不就即去歸家至四月京師地震遂䧟陽嘉二年四月己亥地震六月丁丑洛陽地䧟是月旱也其夏大旱秋鮮卑入馬邑城破代郡兵明年西羌㓂隴右陽嘉二年七月種羌宼隴西皆略如顗言後復公車徵不行同郡孫禮者積惡凶暴好游俠與其同里人常慕顗名德欲與親善顗不顧以此結怨遂為禮所殺襄楷傳襄楷字公矩平原隰陰人也風俗通曰襄姓楚大夫襄老之後隰陰縣在隰水之南故城在今齊州臨邑縣西也好學博古善天文陰陽之術桓帝時宦官専朝政刑暴濫又比失皇子灾異尤數延熹九年楷自家詣闕上疏曰臣聞皇天不言以文象設敎堯舜雖聖必歴象日月星辰察五緯所在故能享百年之夀為萬世之法堯年一百一十七歲舜年一百一十二歲言百年舉全數臣切見去歲五月熒惑入太微犯帝座出端門不軌常道天官書曰太微南四星中為端門軌猶依也其閏月庚辰太白入房犯心小星震動中耀中耀天王也傍小星者天王子也夫太微天廷五帝之坐而金火罰星揚光其中太白金也熒惑火也天文志曰逆夏令傷火氣罰見熒惑逆秋令傷金氣罰見太白故金火並為罰星也於占天子凶又俱入房心法無繼嗣今年歲星久守太微逆行西至掖門還切執法天官書曰端門左右星為掖門太微南四星為執法切謂迫近也歲為木精好生惡殺而淹留不去者咎在仁德不脩誅罰太酷前七年十二月熒惑與歲星俱入軒轅逆行四十餘日而鄧皇后誅其冬大寒殺鳥獸害魚鼈城傍竹栢之葉有傷枯者續漢志曰延熹元年洛陽城傍竹栢葉有傷者臣聞於師曰栢傷竹枯不出三年天子當之今洛陽城中人夜無故呌呼云有火光人聲正諠續漢志曰桓帝延熹九年三月京師有火光轉行人相驚譟於占亦與竹栢枯同自春夏以來連有霜雹及大雨靁而臣作威作福刑罰急刻之所感也太原太守劉瓆南陽太守成瑨志除姦邪其所誅翦皆合人望謝承書曰劉瓆字文理平原人也遷太原太守郡有豪强中官親戚為百姓所患瓆深疾之到官收其魁帥殺之所臧匿主人悉坐伏誅桓帝徵詣廷尉以瓆宗室不忍致之于刑使自殺成瑨字㓜平𢎞農人遷南陽太守時桓帝美人外親張子禁怙恃榮貴不畏法網瑨與功曹岑晊捕子禁付宛獄笞殺之桓帝徵瑨詣廷尉下獄死瓆音質瑨音晉而陛下受閹豎之譛乃逺加考逮三公上書乞哀瓆等不見採察時太尉陳蕃司徒劉矩司空劉茂共上書訟瓆等帝不納而嚴被譴讓憂國之臣將遂杜口矣臣聞殺無罪誅賢者禍及三世黄石公三畧曰傷賢者殃及三世蔽賢者身當其害逹賢者福流子孫疾賢者名不全自陛下即位以來頻行誅伐梁宼孫鄧並見族滅梁冀宼榮孫夀鄧萬世等也其從坐者又非其數李雲上書明主所不當諱杜衆乞死諒以感悟聖朝時𢎞農五官掾杜衆傷雲以忠諫獲罪遂上書云願與李雲同日死也曾無赦宥而并被殘戮天下之人咸知其寃漢興以來未有拒諫誅賢用刑太深如今者也永平舊典諸當重論皆湏冬獄先請後刑所以重人命也頃數十歲以來州郡翫習又欲避請讞之煩廣雅曰讞疑也謂罪有疑者讞於廷尉也輒託疾病多死牢獄長吏殺生自己死者多非其罪魂神寃結無所歸訴滛厲疾疫自此而起淫過也左傳曰陰淫寒疾陽淫熱疾昔文王一妻誕致十子史記曰太姒文王正妃也其長子伯邑考次武王發次管叔鮮次周公旦次蔡叔度次曹叔振鐸次成叔武次霍叔處次康叔封冉季載同母兄弟十人也今宫女數千未聞慶育宜脩德省刑以廣螽斯之祚詩國風序曰螽斯后妃子孫衆多也言若螽斯不妬忌則子孫衆多也注云螽斯蚣蝑也凡有情慾者無不妬忌唯蚣蝑不爾各得受氣而生子故以喻焉祚福也又七年六月十三日河内野王山上有龍死長可數十丈延熹七年也袁山松書曰長可百餘尺扶風有星隕為石聲聞三郡夫龍形狀不一小大無常故周易况之大人帝王以為符瑞大人天子也乾卦九五曰飛龍在天大人造也九五處天子之位故以飛龍喻焉尚書中候曰舜沈璧於清河黄龍負圖出水或聞河内龍死諱以為蛇夫龍能變化蛇亦有神皆不當死昔秦之將衰華山神操璧以授鄭客曰今年祖龍死祖龍謂秦始皇也樂資春秋後傳曰使者鄭客入函谷至平舒見素車白馬曰吾華山君願以一牘致滈池君子之咸陽過滈池見一大梓樹有文石取以扣樹當有應者以書與之鄭客如其言見宫闕如王者居謁者出受書入有頃云今年祖龍死始皇逃之死於沙丘史記曰始皇崩於沙丘平臺沙丘在今邢州平鄉縣東北王莽天鳳二年訛言黄山宫有死龍之異王莽傳曰時訛言黄龍墮地死黄山宫中百姓奔走往觀者乃有萬數莽惡之捕繫詰語所從起而竟不得後漢誅莽光武復興虚言猶然况於實邪夫星辰麗天猶萬國之附王者也下將畔上故星亦畔天石者安類墜者失埶春秋五石隕宋其後襄公為楚所執左傳魯僖公十六年隕石于宋五隕星也至二十年諸侯㑹宋公于盂於是楚執宋公以伐宋秦之亡也石隕東郡史記始皇三十六年有墜星下東郡至地為石人或刻其石曰始皇死而地分始皇聞之盡取石傍舍誅之因燔其石劉攽曰注盡取石傍舍誅之按史記作石傍居人舍字誤今隕扶風與先帝園陵相近桓帝延熹七年隕石于鄠鄠屬扶風與髙帝諸陵相近也不有大䘮必有畔逆案春秋以來及古帝王未有河清及學門自壞者也延熹五年太學西門自壞八年濟陰東郡濟北河水清也臣以為河者諸侯位也孝經援神契曰五岳視三公四凟視諸侯也清者屬陽濁者屬陰河當濁而反清者陰欲為陽諸侯欲為帝也太學天子教化之宫其門無故自壞者言文德將䘮教化廢也京房易傳曰河水清天下平今天垂異地吐妖人厲疫三者並時而有河清猶春秋麟不當見而見孔子書之以為異也公羊傳曰西狩獲麟何以書記異也何以異麟非中國獸也劉攽曰注何以異案文當云何異爾臣前上琅邪宫崇受于吉神書不合明德于姓吉名也神書即今道家太平經也其經以甲乙丙丁戊巳庚辛壬癸為部每部一十七卷也臣聞布穀鳴於孟夏蟋蟀吟於始秋物有微而志信人有賤而言忠布穀一名戴絍一名戴勝蟋蟀促織也春秋考異郵曰孟夏戴勝降立秋促織鳴言雖微物不失信也絍音汝林反臣雖至賤誠願賜清間極盡所言書奏不省十餘日復上書曰臣伏見太白北入數日復出東方其占當有大兵中國弱四夷彊臣又推歩熒惑今當出而潛必有陰謀皆由獄多寃結忠臣被戮德星所以久守執法亦為此也德星歲星也陛下宜承天意理察寃獄為劉瓆成瑨虧除罪辟追錄李雲杜衆等子孫夫天子事天不孝則日食星鬭比年日食於正朔延熹八年正月辛巳朔日食九年正月辛邜朔日食三光不明五緯錯戾前者宫崇所獻神書專以奉天地順五行為本亦有興國廣嗣之術其文易曉參同經典而順帝不行故國𦙍不興太平經典帝王篇曰眞人問神人曰吾欲使帝王立致太平豈可聞邪神人言但順天地之道不失銖分則立致太平元氣有三名為太陽太陰中和形體有三名為天地人天有三名為日月星北極為中也地有三名為山川與平土人有三名為父母子政有三名為君臣人此三者常相得腹心不失銖分使其同一憂合成一家立致太平延年不疑也又問曰今何故其生子少也天師曰善哉子之言也但施不得其意耳如令施其人欲生也開其玉户施種於中比若春種於地也十十相應和而生其施不以其時比若十月種物於地也十十盡死固無生者眞人欲重知其審今無子之女雖日百施其中猶無所生也不得其所生之處比若此矣是故古者聖賢不妄施於不生之地也名為亡種竭氣而無所生成今太平氣到或有不生子者反斷絶天地之統使國少人理國之道多人則國富少人則國貧今天上皇之氣已到天皇氣生物乃當萬倍其初天地孝冲孝質頻世短祚臣又聞之得主所好自非正道神為生虐故周衰諸侯以力征相尚於是夏育申休宋萬彭生任鄙之徒生於其時並多力之人也夏育衛人力舉千鈞宋萬宋人殺湣公遇大夫仇牧於門批而殺之齒著門闔彭生齊人拉魯桓公幹而殺之范雎曰以任鄙之力焉而死申休未詳何世也殷紂好色妲己是出妲己蘇人之美女也獻於紂紂納以為妻常與沉湎於酒事見列女傳葉公好龍眞龍游廷子張見魯哀公七日哀公不禮子張曰君之好士有似葉公子髙之好龍也葉公子髙好畫龍天龍聞之降之窺頭於牖葉公子髙見之棄而反走五色無主是葉公子髙好夫似龍而非好眞龍也事見新序今黄門常侍天刑之人陛下愛待兼倍常寵繼嗣未兆豈不為此天官宦者星不在紫宫而在天市明當給使主市里也山陽公載記曰市垣二十二星而帝座居其中宦者四星唯供市買之事也今乃反處常伯之位實非天意常伯侍中也尚書曰常伯常任又聞宫中立黄老浮屠之祠浮屠即佛陀但聲轉耳並謂佛也解見楚王英傳此道清虛貴尚無為好生惡殺省慾去奢今陛下嗜慾不去殺罰過理既乖其道豈獲其祚哉或言老子入夷狄為浮屠或言當時言也老子西入夷狄始為浮屠之化浮屠不三宿桑下不欲久生恩愛精之至也言浮屠之人寄桑下者不經三宿便即移去示無愛戀之心也天神遺以好女浮屠曰此但革囊盛血遂不盼之四十二章經天神獻玉女於佛佛曰此是革嚢盛衆穢耳其守一如此乃能成道今陛下婬女艶婦極天下之麗甘肥飲美單天下之味柰何欲如黄老乎書上即召詔尚書問狀劉攽曰案文詔當作詣楷曰臣聞古者本無宦官武帝末春秋髙數游後宫始置之耳元帝時任宦者石顯為中書令前將軍蕭望之等曰尚書百官之本宜以公正處之武帝游晏後廷故用宦者非古制也宜罷中書宦官應古不近刑人之法後稍見任至於順帝遂益繁熾今陛下爵之十倍於前至今無繼嗣者豈獨好之而使之然乎尚書上其對詔下有司處正尚書承㫖奏曰宦者之官非近世所置漢初張澤為大謁者佐絳侯誅諸吕張澤閹人也絳侯周勃誅諸吕乃迎立代王入宫顧麾左右執㦸皆罷兵有數人不肯去宦者令張澤喻告之乃去此其佐誅諸吕之功見前書孝文使趙談參乗而子孫昌盛文帝使宦者趙談參乘袁盎㐲車前曰陛下獨柰何與刀鋸餘人載於是上笑推下趙談談泣而下車文帝生景帝其後昌盛也楷不正辭理指陳要務而析言破律違背經蓺假借星宿偽託神靈謂上于吉神書也造合私意誣上㒺事請下司隸正楷罪法收送洛陽獄帝以楷言雖激切然皆天文恒象之數故不誅猶司宼論刑前書曰司寇二歲刑初順帝時琅邪宫崇詣闕上其師于吉於曲陽泉水上所得神書百七十卷皆縹白素朱介青首朱目號太平清領書今潤州有曲陽山有神溪水定州有曲陽山有神溪水海州有曲陽城北有羽潭水夀州有曲陽城又有北溪水而于吉宫崇並琅邪人盖東海曲陽是也縹青白也素縑也以朱為介道首幖也目題目也太平經曰吾書中善者悉使青下而丹目合乎吾之道乃丹青之信也青者主仁而有心赤者太陽天之正色也江表傳時有道士琅邪于吉先寓居東方來呉㑹立精舍燒香讀道書制作符水以療病呉㑹人多事之孫䇿嘗於郡城樓上請會賔客吉乃盛服趨度門下諸將賔客三分之二下樓拜之掌客者禁訶不能止䇿即令收之諸事之者悉使婦女入見䇿母請之母謂策曰于先生亦助軍作福醫護將士不可殺之䇿曰昔南陽張津為交州刺史舍前聖典訓廢漢家法律常著絳袙頭鼓琴焚香讀邪俗道書云以助化卒為蠻夷所殺此甚無益諸君但未悟耳今此子已在鬼錄勿復費紙筆也即催斬之懸首於市其言以陰陽五行為家而多巫覡雜語太平經曰天失陰陽則亂其道地失陰陽則亂其財人失陰陽則絶其後君臣失陰陽則其道不理五行四時失陰陽則為災今天垂象為人法故當承順之也又曰天上有常神聖要語時下授人以言用使神吏應氣而徃來也人衆得之謂神呪也呪百中百十中十其呪有可使神為除災疾用之所向無不愈也有司奏崇所上妖妄不經乃收藏之後張角頗有其書焉及靈帝即位以楷書為然大傅陳蕃舉方正不就鄉里宗之每太守至輒致禮請中平中與荀爽鄭𤣥俱以博士徵不至卒于家論曰古人有云善言天者必有驗於人前書武帝策茂才之詞也而張衡亦云天文歴數陰陽占候今所宜急也郎顗襄楷能仰瞻俯察參諸人事禍福吉凶既應引之教義亦明此盖道術所以有補於時後人所當取鑒者也然而其敝好巫故君子不以專心焉好巫謂好鬼神之事也范寜穀梁序曰左氏艶而富其敝也巫贊曰仲桓術深蒲車屢尋頻徵不至蘇竟飛書清我舊陰陰縣屬南陽與光武同郡故云我舊也襄郎灾戒寔由政淫後漢書卷六十下
