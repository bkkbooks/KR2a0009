body:
  text: 後漢書卷十八梁剡令劉昭補并注祭祀志第八祭祀中北郊増祀明堂六宗辟雍老子靈臺迎氣是年初營北郊明堂周禮考工記曰周人明堂度九尺之筵東西九筵南北七筵堂崇一筵五室凡室二筵鄭𤣥曰明堂者明政教之堂周度以筵亦王者相改周堂高九尺殷三尺則夏一尺矣相參之數也孝經援神契曰明堂上圓下方八窻四逹布政之宫在國之陽晏子春秋曰明堂之制下之温濕不能及也上之寒暑不能入也木工不鏤示民知節也吕氏春秋曰周明堂茅茨蒿柱土階三等以見儉節也前志武帝欲治明堂奉高旁未明其制度濟南人公玉𢃄上黄帝時明堂圖圖中有一殿四靣無壁以茅葢通水水園宫垣為復道上有樓從西南入名曰崑崙以拜禮上帝於是作明堂汶水上如帯圖新論曰天稱明故命曰明堂上圓法天下方法地八窻法八風四逹法四時九室法九州十二坐法十二月三十六户法三十六雨七十二牖法七十二風東京賦曰復廟重屋八逹九房薛綜注曰八逹謂室有八窻也堂後有九室所以異於周制也王隆漢官篇曰是古者清廟茅屋胡廣曰古之清廟以茅蓋屋所以示儉也今之明堂茅蓋之乃加瓦其上不忘古也辟雍白虎通曰辟雍所以行禮樂宣徳化也辟者象璧圓以法天也雍者壅之以水象教化流行也辟之為言積也積天下之道徳雍之為言壅也壅天下之儀則故謂辟雍也王制曰天子辟雍諸侯泮宫外圓者欲使觀者平均也又欲言外圓内方明徳當圓行當方也靈臺未用事禮含文嘉曰禮天子靈臺所以觀天人之際隂陽之㑹也揆星度之驗徴六氣之端應神明之變化覩日氣之所驗為萬物獲福於無方之原招太極之清泉以與稼穡之根倉廩實知禮節衣食足知榮辱天子得靈臺之則五車三柱明制可行不失其常水泉川流無滯寒暴暑之灾陸澤山陵禾盡豐穰故東京賦曰左制辟雍右立靈臺薛綜注曰於上班教曰明堂大合樂射饗者辟雍司歴記候節氣者曰靈臺蔡邕明堂論曰明堂者天子太廟所以崇禮其祖以配上帝者也夏后氏曰世室殷人曰重屋周人曰明堂東曰青陽南曰明堂西曰總章北曰𤣥堂中曰太室易曰離也者明也南方之卦也聖人南靣而聼天下嚮明而治人君之位莫正於此焉故雖有五名而主以明堂也其正中焉皆曰太廟謹承天隨時之令昭令徳宗祀之禮明前功百辟之勞起尊老敬長之義顕教㓜誨稚之學朝諸侯選造士於其中以制度生者乘其能而至死者論其功而祭故為大教之宫而四學具焉官司備焉譬如北辰居其所而衆星拱之萬象翼之政教之所由生受作之所自來明一統也故言明堂事之大義之深也取其宗祀之清貌則曰清廟取其正室之貌則曰太廟取其尊崇則曰太室取其向明則曰明堂取其四門之學則曰太學取其四靣周水圓如璧則曰辟雍異名而同事其實一也春秋因魯取宋之姦賂則顕之太廟以明聖王建清廟明堂之義經曰取郜大鼎于宋納于太廟傳曰非禮也君人者将昭徳塞違故昭令徳以示子孫是以清廟茅屋昭其儉也夫徳儉而有度升降有數文物以紀之聲明以發之以照臨百官百官於是戒懼而不敢易紀律所以大明教也以周清廟論之魯太廟皆明堂也魯禘祀周公扵太廟明堂猶周宗祀文王於清廟明堂也禮記檀弓曰王齋禘於清廟明堂也孝經曰宗祀文王於明堂禮記明堂位曰太廟天子曰明堂又曰成王㓜弱周公踐天子位以治天下朝諸侯於明堂制禮作樂頌度量而天下大服成王以周公為有大勲勞於天下命魯公世世禘祀周公於太廟以天子禮樂升歌清廟下管象舞所以異魯於天下也取周清廟之歌歌於魯太廟明魯之太廟猶周清廟也皆所以昭文王周公之徳以示子孫者也易傳太初篇曰太子旦入東學晝入南學暮入西學在中央曰太學天子之所自學也禮記保傳篇曰帝入東學上親而貴仁入西學上賢而貴徳入南學上齒而貴信入北學上貴而尊爵入太學承師而問道與易傳同魏文侯孝經傳曰太學者中學明堂之位也禮記古大明堂之禮曰膳夫是相禮日中出南闈見九侯反問于相日側出西闈視五國之事日闇出北闈視帝節猶爾雅曰宫中之門謂之闈王居明堂之禮又别隂陽門南門稱門西門稱闈故周官有門闈之學師氏教以三徳守王門保氏教以六藝守王闈然則師氏居東門南門保氏居西門北門也知掌教國子與易傳保傅王居明堂之禮參相發明為四學焉文王世子篇曰凡大合樂則遂飬老天子至乃命有司行事興秩節祭先師先聖焉始之飬也適東序釋奠於先老遂設三老五更之席位言教學始之於飬老由東方嵗始也又春夏學干戈秋冬學羽籥皆於東序凡祭與飬老乞言合語之禮皆小樂正詔之於東序又曰大司成論説在東序然則詔學皆在東序東序東之堂也學者詔焉故稱太學仲夏之月令祀百辟卿士之有徳於民者禮記太學志曰禮士大夫學於聖人善人祭于明堂其無位者祭扵太學禮記昭穆篇曰祀先賢于西學所以教諸侯之徳也即所以顕行國禮之處也太學明堂之東序也皆在明堂辟雍之内月令記曰明堂者所以明天氣統萬物明堂上通於天象日辰故下十二宫象日辰也水環四周言王者動作法天地徳廣及四海方此水也禮記盛徳篇曰明堂九室以茅蓋屋上圓下方此水名曰辟雍王制曰天子出征執有罪反舍奠於學以訊馘告樂記曰武王伐殷薦俘馘于京太室詩魯頌云矯矯虎臣在泮獻馘京鎬京也太室辟雍之中明堂太室也與諸侯泮宫俱獻馘焉即王制所謂以訊馘告者也禮記曰祀乎明堂所以教諸侯之孝也孝經曰孝悌之至通於神明光于四海無所不通詩云自西自東自南自北無思不服言行孝者則曰明堂行悌者則曰太學故孝經合以為一義而稱鎬京之詩以明之凡此皆明堂太室辟雍太學事通文合之義也其制度數各有所法堂方百四十四尺坤之䇿也屋圓屋徑二百一十六尺乾之䇿也太廟明堂方三十六丈通天屋徑九丈隂陽九六之變也圓蓋方載六九之道也八闥以象八卦九室以象九州十二宫以應辰三十六户七十二牖以四户九牖乘九室之數也户皆外設而不閉示天下不藏也通天屋高八十一尺黄鍾九九之實也二十八柱列於四方亦七宿之象也堂高三丈亦應三統四鄉五色者象其行外廣二十四丈應一嵗二十四氣四周以水象四海王者之大禮也遷吕太后于園上薄太后尊號曰高皇后當配地郊高廟語在光武紀袁宏紀曰夫越人而臧否者非憎於彼也親戚而加譽者非優於此也處情之地殊故公私之心異也聖人知其如此故明彼此之理開公私之塗則隠諱之義著而親尊之道長矣古之人以為先君之體猶今君之體推近以知逺則先後義鈞也而况彰其大惡以為貶黜者乎北郊在雒陽城北四里為方壇四陛張璠記云城北六里袁山松書曰行夏之時殷祭之日犧牲尚黒耳三十三年正月辛未郊别祀地祗位南靣西上高皇后配西靣北上皆在壇上地理羣神從食皆在壇下如元始中故事中嶽在未四嶽各在其方孟辰之地中營内海在東四瀆河西濟北淮東江南他山川各如其方皆在外營内四陛醊及中外營門封神如南郊地祗高后用犢各一頭五嶽共牛一頭海四瀆共牛一頭羣神共二頭奏樂亦如南郊既送神瘞爼實於壇北明帝即位永平二年正月辛未初祀五帝於明堂光武帝配孝經云宗祀文王於明堂以配上帝故鄭𤣥曰上帝者天之别名神無二主故異其處避后稷也五帝坐位堂上各處其方黄帝在未皆如南郊之位光武帝位在青帝之南少退西靣牲各一犢奏樂如南郊卒事遂升靈臺以望雲物杜預注傳曰雲物氣色灾變也素察妖祥逆為之備迎時氣五郊之兆自永平中以禮䜟及月令有五郊迎氣服色因采元始中故事兆五郊於雒陽四方中兆在未壇皆三尺階無等立春之日迎春於東郊祭青帝句芒月令章句曰東郊去邑八里因木數也車旗服餙皆青歌青陽八佾舞雲翹之舞及因賜文官太傅司徒以下縑各有差立夏之日迎夏於南郊祭赤帝祝融月令章句曰去邑七里因火數也車旗服餙皆赤歌朱明八佾舞雲翹之舞先立秋十八日迎黄靈於中兆祭黄帝后土月令章句曰南郊五里因土數也車旗服餙皆黄歌朱明八佾舞雲翹育命之舞魏氏繆襲議曰漢有雲翹育命之舞不知所出舊以祀天今可兼以雲翹祀圜丘兼以育命祀方澤立秋之日迎秋於西郊祭白帝蓐收月令章句曰西郊九里因金數也車旗服餙皆白歌西皓八佾舞育命之舞使謁者以一特牲先祭先虞於壇有事天子入囿射牲以祭宗廟名曰貙劉語在禮儀志立冬之日迎冬於北郊祭黒帝𤣥冥月令章句曰北郊六里因水數也車旗服餙皆黒歌𤣥冥八佾舞育命之舞獻帝起居注曰建安八年公卿迎氣北郊始復用八佾皇覽曰迎禮春夏秋冬之樂又順天道是故距冬至日四十六日則天子迎春於東堂距邦八里堂高八尺堂階三等青税八乘旗尾尚青田車載矛號曰助天生唱之以角舞之以羽翟此迎春之樂也自春分數四十六日則天子迎夏於南堂距邦七里堂高七尺堂階二等赤税七乘旗旄尚赤田車載㦸號曰助天飬唱之以徴舞之以鼓鞉此迎夏之樂也自夏至數四十六日則天子迎秋於西堂距邦九里堂高九尺堂階九等白税九乘旗旄尚白田車載兵號曰助天收唱之以商舞之以干戚此迎秋之樂也自秋分數四十六日則天子迎冬於北堂距邦六里堂高六尺堂階六等黒税六乘旗旄尚黒田車載甲鐵鍪號曰助天誅唱之以羽舞之以干戈此迎冬之樂也章帝即位元和二年正月詔曰山川百神應祀者未盡其議增修羣祀冝享祀者東觀書詔曰經稱秩元祀咸秩無文祭法功施於民則祀之以死勤事則祀之以勞定國則祀之能禦大灾則祀之以日月星辰民所瞻仰也山林川谷丘陵民所取財用也非此族也不在祀典傳曰聖王先成民而後致力於神又曰山川之神則水旱厲疫之灾於是乎禜之日月星辰之神則雪霜風雨之不時於是乎禜之孝文十二年令曰比年五糓不登欲有以増諸神之祀王制曰山川神祗有不舉者為不敬今恐山川百神應典祀者尚未盡秩其議増修羣祀冝享祀者以祈豐年以致嘉福以蕃兆民詩不云乎懐柔百神及河喬嶽有年報功不私幸望豈嫌同辭其義一焉二月上東廵狩将至㤗山道使使者奉一太牢祠帝堯於濟隂成陽靈臺上至㤗山修光武山南壇兆辛未柴祭天地羣神如故事壬申宗祀五帝於孝武所作汶上明堂光武帝配如雒陽明堂祀癸酉更告祠高祖太宗世宗中宗世祖顯宗於明堂各一太牢卒事遂覲東后饗賜王侯羣臣因行郡國幸魯祠東海恭王及孔子七十二弟子漢晉春秋曰闕里者仲尼之故宅也在魯城中帝升廟西靣羣臣中庭北面皆再拜帝進爵而後坐東觀書曰祠禮畢命儒者論難四月還京都庚申告至祠高廟世祖各一特牛又為靈臺十二門作詩各以其月祀而奏之和帝無所増改安帝即位元初六年以尚書歐陽家説謂六宗者在天地四方之中為上下四方之宗以元始中故事謂六宗易六子之氣日月雷公風伯山澤者為非是三月庚辰初更立六宗祀於雒陽西北戍亥之地禮比太社也月令孟冬祈于天宗盧植注曰天宗六宗之神李氏家書曰司空李郃侍祠南郊不見六宗祠奏曰案尚書肆類于上帝禋于六宗六宗者上不及天下不及地傍不及四方在六合之中助隂陽化成萬物漢初甘泉汾隂天地亦禋六宗孝成之時匡衡奏立南北郊祀復祀六宗及王莽謂六宗易六子也建武都雒陽制祀不道祭六宗由是廢不血食今冝復舊制度制曰下公卿議五官将行𢎞等三十一人議可祭大鴻臚龎雄等二十四人議不可當祭上從郃議由是遂祭六宗六宗之議自伏生及乎後代各有不同今竝抄集以證其論云虞書曰肆類于上帝禋于六宗望于山川伏生馬融曰萬物非天不覆非地不載非春不生非夏不長非秋不收非冬不藏禋于六宗此之謂也歐陽和伯夏侯建曰六宗上不謂天下不謂地傍不謂四方在六者之間助隂陽變化者也孔安國曰精意以享謂之禋宗尊也所尊祭其祀有六埋少牢于太昭祭時也相近於坎壇祭寒暑也王宫祭日也夜明祭月也幽禜祭星也雩禜祭水旱也禋于六宗此之謂也孔叢曰宰我問六宗於夫子夫子答如安國之説臣昭以此觧若果是夫子所説則後儒無復紛然文秉案劉歆曰六宗謂水火雷風川澤也賈逵曰六宗謂日宗月宗星宗岱宗海宗河宗也鄭𤣥曰六宗星辰司中司命風伯雨師也星五緯也辰謂日月所㑹十二次也司中司命文昌第五第四星也風師箕也雨師畢也晉武帝初司馬紹統表駁之曰臣以為帝在于類則禋者非天山川屬望則海岱非宗宗猶包山則望何秩焉伏與歆逵失其義也六合之間非制典所及六宗之數非一位之名隂陽之説又非義也并五緯以為一分文昌以為二箕畢既屬於辰風師雨師復特為位𤣥之失也安國案祭法為宗而除其天地於上遺其四方於下取其中以為六宗四時寒暑日月衆星并水旱所宗者八非但六也傳曰山川之神則水旱厲疫之灾於是乎禜之日月星辰之神則雪霜風雨之不時於是乎禜之又曰龍見而雩如此禜者祀日月星辰山川之名雩者周人四月祭天求雨之稱也雪霜之灾非夫禜之所禳雩祭之禮非正月之所祈周人之後説有虞之典故於學者未盡喻也且類于上帝既禮天也望于山川禜所及也案周禮云昊天上帝日月星辰司中司命風師雨師社稷五祀五嶽山林川澤四方百物又曰兆五帝於四郊四類四望亦如之無六宗之兆祭法云祭天祭地祭時祭寒暑日月星祭水旱祭四方及山林川谷丘陵能出雲為風雨見怪物皆是有天下者祭百神非此族也不在祀典復無六宗之文明六宗所禋即祭法之所及周禮之所祀即虞書之所宗不冝特復立六宗之祀也春官大宗伯之職掌玉作六器以禮天地四方以蒼璧禮天以黄琮禮地以青圭禮東方以赤璋禮南方以白琥禮西方以𤣥璜禮北方天宗日月星辰寒暑之屬也地宗社稷五祀之屬也四方之宗者四時五帝之屬也如此則羣神咸秩而無廢百官徧修而不瀆於理為通幽州秀才張髦又上疏曰禋於六宗禮祖考所尊者六也何以考之周禮及禮記王制天子将出類于上帝冝于社造于禰廵狩四方覲諸侯歸格于祖禰用特堯典亦曰肆類于上帝禋于六宗望于山川徧于羣神班瑞于羣后肆覲東后叶時月正日同律度量衡廵狩一嵗以周爾乃歸格于藝祖用特臣以尚書與禮王制同事一義符契相合禋于六宗正謂祀祖考宗廟也文祖之廟六宗即三昭三穆也若如十家之説既各異義上下違背且没乎祖之禮考之禮考之祀典尊卑失序若但類于上帝不禋祖禰而行去時不告歸何以格以此推之較然可知也禮記曰夫政必本於天殽以降命命降于社之為殽地降于祖廟之謂仁義降於山川之謂興作降于五祀之謂制度又曰祭帝於郊所以定天位也祀社于國所以列地利也祭祖於廟所以本仁也山川所以儐鬼神也五祀所以本祀也又曰禮行於郊而百神受職焉禮行於社而百貨可極焉禮行於祖廟而孝慈服焉禮行於五祀而正法則焉故自郊社祖廟五祀義之修而禮之藏也凡此皆孔子所以祖述堯舜紀三代之教著在祀典首尾相證皆先天地次祖宗而後山川羣神耳故禮祭法曰七代之所更變者禘郊宗祖明舜受終文祖之廟察璇璣考七政審已天命之定遂上郊廟當義合堯典則周公其人也郊祀后稷以配天宗祀文王於明堂以配上帝是以四海之内各以其職來祭者也居其位攝其事郊天地供羣神之禮廵狩天下而遺其祖宗恐非有虞之志也五嶽視三公四瀆視諸侯皆以案先儒之説而以水旱風雨先五嶽四瀆從祖考而次上帝錯於肆類而亂祀典臣以十一家皆非也太學博士吳啇以為禋之言煙也三祭皆積柴而實牲體焉以升煙而報陽非祭宗廟之名也鄭所以不從諸儒之説者将欲據周禮禋祀皆天神也日月星辰司中司命風師雨師凡八而日月并從郊故其餘為六宗也以書禋于六宗與周禮事相符故據以為説也且文昌雖有大體而星名異其日不同故隨事祭之而言文昌七星不得偏祭其第四第五此為周禮復不知文昌之體而又妄引為司中司命箕畢二星既不係於辰且同是隨事而祭之例又無嫌於所係者范寗注虞書曰考觀衆議各有説難鄭氏證據最詳是以附之案六宗衆議未知孰是虞喜别論云地有五色太社象之總五為一則成六六為地數推案經句闕無地祭則祭地臣昭曰六宗紛紜衆釋互起竟無全通亦難偏折歴辨碩儒終未挺正康成見宗是多附焉盍各爾志宣尼所許顕其一説亦何傷乎竊以為祭祀之敬莫大天地虞典首載彌乆彌盛此冝學者各盡所求臣昭謂虞喜以祭地近得其實而分彼五色合五為六又不通禋更成疑昧尋虞書所稱肆類于上帝是祭天天不言天而曰上帝帝是天神之極舉帝則天神斯盡日月星辰從可知也禋于六宗是實祭地地不言地而曰六宗宗是地數之中舉中足以該數社稷等祀從可知也天稱神上地表數中仰觀俯察所以為異宗者崇尊之稱斯亦盡敬之謂也禋也者埋祭之言也實瘞埋之異稱非周煙之祭也夫置字渉神必以今之􅅘今之􅅘即古之神所以社稷諸字莫不以神為體虞書不同祀名斯隔周禮改煙音形兩異虞書改土正元祭義此焉非疑以為可了豈六置宗更為傍祭乎風俗通曰周禮以為槱燎祀司中司命文昌上六星也槱者積薪燔柴也今民猶祠司命耳刻木長尺二寸為人像行者置篋中居者别作小居齊地大尊重之汝南諸郡亦多有者皆祠以猪率以春秋之月延光三年上東廵狩至㤗山柴祭及祠汶上明堂如元和三年故事順帝即位修奉常祀桓帝即位十八年好神仙事延熹八年初使中常侍之陳國苦縣祠老子九年親祠老子於濯龍文罽為壇餙淳金釦器設華蓋之坐用郊天樂也後漢書卷十八後漢書卷十八考證祭祀志中靈臺未用事注取其尊崇則曰太室取其向明則曰明堂監本崇字下衍矣字向明二字誤作堂字俱依宋本改又以周清廟論之論下衍曰字又明魯之太廟猶周清廟也明下衍堂字之下脱太字俱依宋本改又圓蓋方載六九之道也六九何焯校本改九六迎夏于南郊祭赤帝祝融注月令章句去邑七里本亦作南郊七里臣良裘按下祭黄帝后土注云南郊五里互見之文也後漢書卷十八考證
