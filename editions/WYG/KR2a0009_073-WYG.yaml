body:
  text: 後漢書卷七十三宋宣城太守范煜撰唐章懷太子賢注朱樂何列傳第三十三朱暉傳孫穆朱暉字文季南陽宛人也東觀記曰其先宋微子之後也以國氏姓周衰諸侯滅宋犇碭易姓爲朱後徙于宛也家世衣冠暉早孤有氣決年十三王莽敗天下亂與外氏家屬從田間奔入宛城東觀記曰暉外祖父孔休以德行稱於代也道遇羣賊白刃劫諸婦女略奪衣物昆弟賓客皆惶廹伏地莫敢動暉拔劒前曰財物皆可取耳諸母衣不可得今日朱暉死日也賊見其小壯其志笑曰童子内刀遂捨之而去初光武與暉父岑俱學長安有舊故及卽位求問岑時已卒乃召暉拜為郎暉尋以病去卒業於太學性矜嚴進止必以禮諸儒稱其高永平初顯宗舅新陽侯隂就慕暉賢自往候之暉避不見復遣家丞致禮續漢志曰諸侯家丞秩三百石暉遂閉門不受就聞歎曰志士也勿奪其節後為郡吏太守阮況嘗欲市暉婢暉不從東觀記曰暉為督郵況當歸女欲買暉婢暉不敢與後況卒暉送其家金三斤及況卒暉乃厚贈送其家人或譏焉暉曰前阮府君有求於我所以不敢聞命誠恐以財貨汚君今而相送眀吾非有愛也驃騎將軍東平王蒼聞而辟之甚禮敬焉正月朔旦蒼當入賀故事少府給璧是時陰就為府卿貴驕吏慠不奉法蒼坐朝堂漏且盡而求璧不可得顧謂掾屬曰若之何暉望見少府主簿持璧即往紿之曰紿欺也我數聞璧而未嘗見試請觀之主簿以授暉暉顧召令史奉之奉之於蒼主簿大驚遽以白就就曰朱掾義士勿復求更以它璧朝蒼旣罷召暉謂曰屬者掾自視孰與藺相如屬向也與猶如也史記曰藺相如趙人也趙惠文王時得楚和氏璧秦昭王欲以十五城易之趙王使相如奉璧入秦秦王大喜無意償趙城相如乃前曰璧有瑕願指視王相如乃持璧却立倚柱怒髪上衝冠曰臣觀大王無意償趙城邑故臣復取璧大王必欲急臣臣今頭與璧俱碎於柱矣相如持其璧睨柱欲以擊柱秦王恐其璧破乃謝之帝聞壯之及當幸長安欲嚴宿衛故以暉為衛士令再遷臨淮太守暉好節槩有所拔用皆厲行士其諸報怨以義犯率皆爲求其理多得生濟其不義之囚即時僵仆僵偃仆踣也吏人畏愛爲之歌曰彊直自遂南陽朱季吏畏其威人懷其惠東觀記曰建武十六年四方牛大疫臨淮獨不鄰郡人多牽牛入界數年坐法免東觀記曰坐考長史囚死獄中州奏免官劉攽曰案臨淮郡無長史既言囚死獄中當是吏字令長丞尉皆長吏也暉剛於爲吏見忌於上所在多被劾自去臨淮屏居野澤布衣蔬食不與邑里通鄉黨譏其介介特也言不與衆同建初中南陽大飢米石千餘暉盡散其家資以分宗里故舊之貧羸者鄉族皆歸焉初暉同縣張堪素有名稱嘗於太學見暉甚重之接以友道乃把暉臂曰欲以妻子託朱生暉以堪先達舉手未敢對自後不復相見堪卒暉聞其妻子貧困乃自往候視厚賑贍之暉少子頡怪而問曰大人不與堪爲友平生未曾相聞子孫竊怪之暉曰堪嘗有知己之言吾以信於心也以堪先託妻子心已許之故言信於心也暉又與同郡陳揖交善揖早卒有遺腹子友暉常哀之及司徒桓虞爲南陽太守召暉子駢為吏暉辭駢而薦友虞歎息遂召之其義烈若此元和中肅宗巡狩召南陽太守問暉起居召拜為尚書僕射嵗中遷太山太守暉上疏乞留中詔許之因上便宜陳宻事深見嘉納詔報曰補公家之闕詩曰衮職有闕仲山甫補之不累清白之素斯善美之士也俗吏茍合阿意面從進無謇謇之志郤無退思之念易蹇卦艮下坎上艮為山坎為水山上有水蹇難之象也六二爻上應於五五為君位二宜為臣也居險難之時履當其位不以五在難私身遠害故曰王臣蹇蹇匪躬之故孝經曰退思補過謇與蹇通患之甚久惟令所言適我願也生其勉之劉攽曰惟令所言案時暉未為尚書令明此令字是今字是時榖貴縣官經用不足經常也朝廷憂之尚書張林上言榖所以貴由錢賤故也可盡封錢一取布帛為租以通天下之用又鹽食之急者雖貴人不得不須官可自鬻前書曰因官器作鬻鹽音義曰鬻古煑字又宜因交阯益州上計吏往來市珍寶收采其利武帝時所謂均輸者也武帝作均輸法謂州郡所出租賦并雇運之直官總取之市其土地所出之物官自轉輸於京謂之均輸於是詔諸尚書通議暉奏據林言不可施行事遂寢後陳事者復重述林前議以為於國誠便帝然之有詔施行暉復獨奏曰王制天子不言有無諸侯不言多少食禄之家不與百姓爭利今均輸之法與賈販無異鹽利歸官則下人窮怨布帛為租則吏多姦盜誠非明主所當宜行劉攽曰案文當與宜不須並存合去當字帝卒以林等言為然得暉重議因發怒切責諸尚書暉等皆自繋獄三日詔勑出之曰國家樂聞駮議黄髪無愆詔書過耳黄髪老稱謂朱暉也何故自繫暉因稱病篤不肯復署議尚書令以下惶怖謂暉曰今臨得譴讓奈何稱病其禍不細暉曰行年八十䝉恩得在機宻當以死報若心知不可而順㫖雷同負臣子之義今耳目無所聞見伏待死命遂閉口不復言諸尚書不知所為乃共劾奏暉帝意解寢其事後數日詔使直事郎問暉起居直事郎謂署郎當次直者太醫視疾太官賜食暉乃起謝復賜錢十萬布百匹衣十領後遷為尚書令以老病乞身拜騎都尉賜錢二十萬和帝即位竇憲北征匈奴暉復上疏諫頃之病卒華嶠書曰暉年五十失妻昆弟欲為繼室暉歎曰時俗希不以後妻敗家者遂不復娶也子頡修儒術安帝時至陳相頡子穆穆字公叔年五歲便有孝稱父母有病輒不飲食差乃復常及壯躭學銳意講誦或時思至不自知亡失衣冠顛隊阬岸其父常以為專愚幾不知數馬足幾音近衣反前書曰石慶為太僕上問車中幾馬慶以䇿數馬畢舉手曰六馬言穆用心專愚更甚也穆愈更精篤初舉孝亷謝承書曰穆少有英才學明五經性矜嚴疾惡不交非類年二十為郡督郵迎新太守見穆曰君年少為督郵因族埶為有令徳穆答曰郡中瞻望明府如仲尼謂非顔回不敢以迎孔子更問風俗人物太守甚奇之曰僕非仲尼督郵可謂顔回也遂歴職股肱舉孝亷也順帝末江淮盜賊羣起州郡不能禁或說大將軍梁冀曰朱公叔兼資文武海内奇士若以為謀主賊不足平也冀亦素聞穆名乃辟之使典兵事甚見親任及桓帝即位順烈太后臨朝穆以冀埶地親重望有以扶持王室因推災異奏記以勸戒冀曰穆伏念明年丁亥之歲刑德合於乾位厯法太歲在丁壬歲徳在北宫太歲在亥卯未歲刑亦在北宮故合於乾位也易經龍戰之㑹其文曰龍戰于野其道窮也易坤卦上六象詞也坤爻居上六故云其道窮也王弼注云陰之為道卑順不逆乃全其美盛而不已同陽之地陽所不堪故戰于野謂陽道將勝而陰道負也今年九月天氣鬰冐五位四候連失正氣此互相明也夫善道屬陽惡道屬陰若修正守陽摧折惡類則福從之矣穆每事不逮所好唯學傳受於師時有可試願將軍少察愚言申納諸儒申重也而親其忠正絶其姑息姑且也息安也小人之道茍且取安也禮記曰君子之愛人也以德細人之愛人也以姑息專心公朝割除私欲廣求賢能斥遠佞惡夫人君不可不學當以天地順道漸漬其心宜為皇帝選置師傅及侍講者得小心忠篤敦禮之士將軍與之俱入參勸講授師賢法古此猶倚南山坐平原也誰能傾之今年夏月暈房星明年當有小戹宜急誅姦臣為天下所怨毒者以塞災咎議郎大夫之位本以式序儒術高行之士今多非其人九卿之中亦有乖其任者惟將軍察焉又薦种暠欒巴等而明年嚴鮪謀立清河王蒜又黄龍二見沛國冀無術學遂以穆龍戰之言為應於是請暠為從事中郎薦巴為議郎舉穆高第為侍御史續漢書曰穆舉高第拜侍御史桓帝臨辟雍行禮畢公卿出虎賁置弓階上公卿下階皆避弓穆過呵虎賁曰執天子器何故投于地虎賁怖即攝弓穆劾奏虎賁抵罪公卿皆慙曰朱御史可謂臨事不惑者也時同郡趙康叔盛者隱於武當山清靜不仕以經傳教授穆時年五十乃奉書稱弟子及康殁喪之如師其尊德重道為當時所服常感時澆薄慕尚敦篤乃作崇厚論其辭曰夫俗之薄也有自來矣故仲尼歎曰大道之行也而丘不與焉禮記曰仲尼歎曰大道之行三代之英丘未之逮也而有志焉鄭𤣥注曰大道謂三皇五帝時也蓋傷之也夫道者以天下為一在彼猶在已也故行違於道則愧生於心非畏義也事違於理則負結於意非憚禮也故率性而行謂之道率循也子思曰天命之謂性率性之謂道修道之謂教也得其天性謂之德天之所命之謂性不失天性是謂德德性失然後貴仁義道德之性失仁義之迹彰是以仁義起而道徳遷遷徙也禮法興而淳樸散故道德以仁義為薄淳樸以禮法為賊也老子曰失道而後德失德而後仁失仁而後義失義而後禮夫禮者忠信之薄而亂之首也夫中世之所敦已為上世之所薄中世謂五帝時況又薄於此乎故夫天不崇大則覆幬不廣地不深厚則載物不博幬亦覆左傳曰如天之無不燾如地之無不載幬與燾同人不敦厖則道數不遠敦厖厚大也左傳曰人生敦厖數猶理也言人不敦厚不能入道之精理也昔在仲尼不失舊於原壤原壤孔子之舊也禮記曰原壤之母死孔子助之沐槨原壤登木而歌曰貍首之斑然執女手之卷然從者曰子未可以已乎夫子曰親者無失其為親故者無失其為故楚嚴不忍章於絶纓説苑曰楚莊王賜羣臣酒日暮燭滅乃有人引美人之衣者美人援絶其冠纓告王趣火來上視絶纓者王曰賜人酒使醉失禮柰何欲顯婦人之節而辱士乎乃命左右曰與寡人飲不絶冠纓者不懽羣臣百餘人皆絶去其冠纓乃上火也由此觀之聖賢之德敦矣老氏之經曰大丈夫處其厚不處其薄居其實不居其華故去彼取此此老子道徳經之詞顧歡注曰道德為厚禮法為薄清虛為實聲色為華去彼華薄取此厚實夫時有薄而厚施行有失而惠用俗之凋薄以厚御之行之有失以惠待之即上孔子楚莊是也故覆人之過者敦之道也救人之失者厚之行也往者馬援深昭此道可以為徳誡其兄子曰吾欲汝曹聞人之過如聞父母之名耳可得聞口不得言斯言要矣遠則聖賢履之上世履踐也言敦厚之道孔子楚莊已踐履之近則邴吉張子孺行之漢廷宣帝時邴吉為丞相不案吏曰夫以三公府案吏吾竊陋之子孺為車騎將軍匿名遠權隱人過失故能振英聲於百世播不滅之遺風不亦美哉然而時俗或異風化不敦而尚相誹謗劉攽曰案下文有而字則然字下不宜更用而字謂之臧否記短則兼折其長貶惡則并伐其善悠悠者皆是其可稱乎悠悠多也稱舉也凡此之類豈徒乖為君子之道哉將有危身累家之禍焉悲夫行之者不知憂其然故害興而莫之及也斯既然矣又有異焉人皆見之而不能自遷何則務進者趨前而不顧後榮貴者矜已而不待人智不接愚富不賑貧貞士孤而不恤賢者戹而不存故田蚡以尊顯致安國之金田蚡武帝王皇后同産弟為太尉親貴用事韓安國為梁王太傳坐法失官安國以五百金遺蚡蚡為言太后即召以為北地都尉也淳于以貴埶引方進之言翟方進成帝時為丞相淳于長元后姊子封定陵侯以能謀議為九卿用事方進獨與長交稱薦之也夫以韓翟之操為漢之名宰前書曰天子以韓安國為國器拜御史大夫又曰翟方進智能有餘天子甚重之故言名宰也然猶不能振一貧賢薦一孤士又況其下者乎此禽息史魚所以專名於前而莫繼於後者也韓詩外傳曰禽息秦大夫薦百里奚不見納繆公出當車以頭撃闑腦乃精出曰臣生無補於國不如死也繆公感寤而用百里奚秦以大化禮大夫殯於正室士於適室韓子曰史魚衛大夫卒委柩後寢衛君弔而問之曰不能進蘧伯玉退彌子瑕以屍諫也故時敦俗美則小人守正利不能誘也時否俗薄雖君子為邪義不能止也皆牽於時也何則先進者既往而不反後來者復習俗而追之是以虚華盛而忠信微刻薄稠而純篤稀斯蓋谷風有棄予之歎詩小雅曰習習谷風維風及雨將恐將懼維予與女將安將樂女轉棄予伐木有鳥鳴之悲矣詩小雅曰伐木丁丁鳥鳴嚶嚶出自幽谷遷于喬木嚶其鳴矣求其友聲也嗟乎世士誠躬師孔聖之崇則嘉楚嚴之美行希李老之雅誨思馬援之所尚鄙二宰之失度美韓稜之抗正事具韓稜傳貴丙張之𢎞裕賤時俗之誹謗則道豐績盛名顯身榮載不刋之德刋削也播不滅之聲然知薄者之不足厚者之有餘也劉攽曰案文然字下不可少後字眀脱之彼與草木俱朽彼謂薄也此與金石相傾此謂厚也老子曰高下之相傾豈得同年而語並日而談哉穆又著絶交論亦矯時之作穆集載論其略曰或曰子絶存問不見客亦不答也何故曰古者進退趨業無私游之交相見以公朝享㑹以禮紀否則朋徒受習而已曰人將疾子如何曰寜受疾曰受疾可乎曰世之務交游也久矣敦千乘不忌于君犯禮以追之背公以從之其愈者則孺子之愛也其甚者則求蔽過竊譽以贍其私事替義退公輕私重居勞於聽也或於道而求其私贍矣是故遂往不反而莫敢止焉是川瀆並決而莫敢之塞游豶蹂稼而莫之禁也詩云威儀棣棣不可選也後生將復何述而吾不才焉能規此實悼無行子道多闕臣事多尤思復白圭重考古言以補往過時無孔堂思兼則滯匪有廢也則亦焉興是以敢受疾也不亦可乎文士傳曰世無絶交又與劉伯宗絶交書及詩曰昔我為豐令足下不遭母憂乎親觧縗絰來入豐寺及我為侍書御史足下親來入臺足下今為二千石我下為郎乃反因計吏以謁相與足下豈丞尉之徒我豈足下部欲以此謁為榮寵乎咄劉伯宗於仁義道何其薄哉其詩曰北山有鴟不潔其翼飛不正向寢不定息飢則木攬飽則泥伏饕餮貪汙臭腐是食填膓滿嗉嗜欲無極長鳴呼鳳謂鳳無徳鳳之所趨與子異域永從此訣各自努力蓋因此而著論也劉攽曰注我豈足下部欲以此謁為榮寵乎案文部字下少一民字梁冀驕暴不悛朝野嗟毒穆以故吏懼其釁積招禍復奏記諌曰古之明君必有輔徳之臣規諌之官下至器物銘書成敗以防遺失黄帝作巾机之法孔甲有盤盂之誡太公隂謀曰武王衣之銘曰桑蠶苦女工難得新捐故後必寒鏡銘曰以鏡自照者見形容以人自照者見吉凶觴銘曰樂極則悲沈湎致非社稷為危也故君有正道臣有正路説苑君道篇曰人君之道清淨無為務在博愛趨在任賢廣開耳目以察萬方不固溺於流俗不拘繫於左右臣術篇曰人臣之術順從復命無所敢専義不茍合位不茍尊必有益於國必有補於君也從之如升堂違之如赴壑今明将軍地有申伯之尊申國之伯周宣王之元舅位為羣公之首冀絶席於三公一日行善天下歸仁論語曰一日克已復禮天下歸仁焉終朝為惡四海傾覆頃者官人俱匱加以水蟲為害水災及蝗蟲也京師諸官費用增多詔書發調或至十倍各言官無見財皆當出民搒掠割剝彊令充足公賦既重私歛又深牧守長吏多非德選貪聚無猒遇人如虜或絶命於箠楚之下或自賊於迫切之求賊殺也又掠奪百姓皆託之尊府遂令將軍結怨天下吏人酸毒道路歎嗟昔秦政煩苛百姓土崩陳勝奮臂一呼天下鼎沸前書淮南王謂伍被曰陳勝吳廣起于大澤奮臂大呼天下響應也而面䛕之臣猶言安耳秦胡亥時山東兵大起叔孫通謂胡亥曰䑕竊狗盜郡縣逐捕之不足憂諸生曰何先生言之䛕也諱惡不悛卒至亡滅昔永和之末綱紀少弛頗失人望四五歲耳而財空户散下有離心馬免之徒乘敝而起荆揚之間幾成大患質帝時九江賊馬免稱黄帝歴陽賊華孟稱黑帝並九江都尉滕撫討斬之九江歴陽是荆揚之間也幸頼順烈皇后初政清静内外同力僅乃討定今百姓戚戚困於永和内非仁愛之心可得容忍外非守國之計所冝久安也夫將相大臣均體元首共輿而馳同舟而濟輿傾舟覆患實共之豈可以去明即昧履危自安即就也主孤時困而莫之䘏乎宜時易宰守非其人者減省第宅園池之費拒絶郡國諸所奉送内以自明外解人惑使挾姦之吏無所依託司察之臣得盡耳目憲度既張遠邇清一則将軍身尊事顯徳燿無窮天道明察無言不信惟􅂷省覽冀不納而縱放日滋遂復賂遺左右交通宦者任其子弟賓客以為州郡要職穆又奏記極諫冀終不悟報書云如此僕亦無一可邪穆言雖切然亦不甚罪也永興元年河溢漂害人庶數十萬户百姓荒饉流移道路冀州盜賊尤多故擢穆為冀州刺史州人有宦者三人為中常侍並以檄謁穆穆疾之辭不相見冀部令長聞穆濟河解印綬去者四十餘人及到奏劾諸部至有自殺者以威略權宜盡誅賊渠帥舉劾權貴或乃死獄中有宦者趙忠喪父歸塟安平安平郡冀州所部僭為璵璠玉匣偶人玉匣長尺廣二寸半衣死者自腰以下至足連以金縷天子之制也左傳曰陽虎將以璵璠歛杜預注云美玉名君所佩也偶人明器之屬也穆聞之下郡案驗吏畏其嚴明遂發墓剖棺陳尸出之而收其家屬帝聞大怒徴穆詣廷尉謝承書曰穆臨當就道冀州從亊欲為畫像置㕔事上穆留板書曰勿畫吾形以為重負忠義之未顯何形像之足紀也輸作左校左校署名屬將作掌左工徒太學書生劉陶等數千人詣闕上書訟穆曰伏見施刑徒朱穆處公憂國拜州之日志清姦惡誠以常侍貴寵父兄子弟布在州郡競為虎狼噬食小人故穆張理天網補綴漏目羅取殘禍以塞天意由是内官咸共恚疾謗讟煩興讒隙仍作極其刑譴輸作左校天下有識皆以穆同勤禹稷而被共鯀之戾若死者有知則唐帝怒於崇山重華忿於蒼墓矣尚書曰放驩兠於崇山孔安國注曰崇山南裔也山海經曰有驩頭之國帝堯塟焉郭璞注云驩頭驩兠也禮記曰舜塟蒼梧之野當今中官近習鄭𤣥注禮記云近習天子所親幸者也竊持國柄周禮以八柄詔王馭羣臣謂爵禄予置生奪廢誅也手握王爵口含天憲運賞則使餓隸富於季孫運行也論語曰季氏富於周公呼噏則令伊顔化為桀跖呼噏吐納也伊尹顔回夏桀盜跖也而穆獨亢然不顧身害非惡榮而好辱惡生而好死也徒感王綱之不攝攝持也懼天網之久失故竭心懷憂為上深計臣願黥首繋趾黥首謂鑿額􅄺墨也繋趾謂釱其足也以鐵著足曰釱也代穆校作帝覽其奏乃赦之穆居家數年在朝諸公多有相推薦者於是徴拜尚書穆既深疾宦官及在臺閣旦夕共事志欲除之乃上疏曰案漢故事中常侍參選士人建武以後乃悉用宦者自延平以來浸益貴盛假貂璫之飾處常伯之任璫以金為之當冠前附以金蟬也漢官儀曰中常侍秦官也漢興或用士人銀璫左貂光武以後專任宦者右貂金璫常伯侍中天朝政事一更其手權傾海内寵貴無極子弟親戚並荷榮任故放濫驕溢莫能禁禦凶狡無行之徒媚以求官恃埶怙寵之軰漁食百姓窮破天下空竭小人愚臣以為可悉罷省遵復往初率由舊章更選海内清淳之士明逹國體者以補其處即陛下可為堯舜之君衆僚皆為稷契之臣兆庶黎民蒙被聖化矣帝不納後穆因進見口復陳曰臣聞漢家舊典置侍中中常侍各一人省尚書事省覽也黄門侍郎一人傳發書奏傳通也皆用姓族引用士人有族望者自和熹太后以女主稱制不接公卿乃以閹人為常侍小黄門通命兩宫自此以來權傾人主窮困天下宜皆罷遣博選耆儒宿德與參政事帝怒不應穆伏不肯起左右傳出傳聲令出良久乃趨而去自此中官數因事稱詔詆毁之穆素剛不得意居無幾憤懣發疽疽癰也延熹六年卒時年六十四禄仕數十年蔬食布衣家無餘財公卿共表穆立節忠清䖍恭機宻守死善道宜䝉旌寵䇿詔襃述追贈益州太守所著論䇿奏敎書詩記嘲凡二十篇袁山松書曰穆著論甚美蔡邕嘗至其家自寫之穆前在冀州所辟用皆清徳長者多至公卿州郡子野少有名節仕至河南尹野字子遼見荀爽薦文初穆父卒穆與諸儒考依古義諡曰貞宣先生諡法曰清白守節曰貞善聞周達曰宣及穆卒蔡邕復與門人共述其體行諡為文忠先生袁山松書曰蔡邕議曰魯季文子君子以為忠而諡曰文子又傳曰忠文之實也忠以為實文以彰之遂共諡穆荀爽聞而非之故張璠論曰夫諡者上之所贈非下之所造故顔閔至徳不聞有諡朱蔡各以衰世臧否不立故私議之論曰朱穆見比周傷義偏黨毁俗左傳曰頑嚚不友是為比周杜預注比近也周宻也志抑朋游之私遂著絶交之論蔡邕以為穆貞而孤又作正交而廣其志焉邕論略曰聞之前訓曰君子以朋友講習而正人無有滛朋是以古之交者其義敦以正其誓信以固逮夫周徳始衰頌聲既寢伐木有鳥鳴之刺谷風有棄予之怨其所由來政之缺也自此以降彌以陵遲或闕其始終或彊其比周是以搢紳患其然而論者諄諄如也疾淺薄而携貳者有之惡朋黨而絶交游者有之其論交也曰富貴則人争趣之貧賤則人争去之是以君子慎人所以交已審已所以交人富貴則無暴集之客貧賤則無棄舊之賔矣故原其所以來則知其所以去見其所以始則覩其所以終彼貞士者貧賤不待夫冨貴冨貴不驕乎貧賤故可貴也蓋朋友之道有義則合無義則離善則久要不㤀平生之言惡則忠告善誨之否則止無自辱焉故君子不為可棄之行不患人之遺己也信有可歸之徳不病人之遠己也不幸或然則躬自厚而薄責於人怨其逺矣求諸己而不求諸人咎其稀矣夫逺怨稀咎之機咸在乎躬莫之能改也子夏之門人問交於子張而二子各有聞乎夫子然則以交誨也商也寛故告之以拒人師也褊故訓之以容衆各從其行而矯之至於仲尼之正教則汎愛衆而親仁故非善不喜非仁不親交㳺以方㑹友以文可無貶也穀梁子亦曰心志既通名譽不聞友之罪也今将患其流而塞其源病其末而刈其本無乃未若擇其正而黜其邪與其彼農皆黍而獨稷焉夫黍亦神農之嘉榖與稷並為粢盛也使交而可廢則黍其愆矣括二論而言之則刺薄者博而洽㫁交者貞而孤孤有羔羊之節與其不獲已而矯時也走将從夫孤焉劉攽曰注否則止案否字當作不可盖孔子稱上交不諂下交不黷易繫辭之言也又曰晏平仲善與人交子夏之門人亦問交於子張並見論語故易明㫁金之義易繫辭曰二人同心其利㫁金詩載讌朋之謠詩小雅伐木序云讌友朋故舊也其詩曰伐木滸滸釃酒有藇釃音所宜反藇音序若夫文㑹輔仁直諒多聞之友時濟其益論語曰君子以文㑹友以友輔仁又曰益者三友友直友諒友多聞益矣紵衣傾盖彈冠結綬之夫遂隆其好左傳曰吳季札以縞帶贈子產子産獻紵衣焉孔叢子曰孔子與程子相遇於途傾蓋而語傾蓋謂駐車交蓋也前書曰王陽貢禹相與為友朱博與蕭育為友時稱蕭朱結綬王貢彈冠言其趣舍同相薦逹斯固交者之方焉方道也至乃田竇衛霍之游客竇嬰孝文皇后從兄子封魏其侯游士賓客争歸之武帝時為丞相田蚡武帝王皇后同產弟為太尉蚡以太后故親幸數言事多效士吏趨埶利者皆去嬰而歸蚡衛青拜大將軍青姊子霍去病為驃騎將軍皆為大司馬去病秩禄與大將軍等自是後青日衰而去病益貴青故人門下多去事去病輙得官爵也亷頗翟公之門賓史記曰亷頗趙人封為信平君假相國長平之免歸也故客盡去及復用為將客又至亷頗曰客退矣客曰吁君何見之晚也夫以市道交君有埶我即從君無埶即去此其理也又何怨焉下邽翟公為廷尉賓亦填門及廢門外可設爵羅後復為廷尉賓客欲往翟公大署其門曰一死一生乃知交情一貧一富乃知交態一貴一賤交情乃見也進由埶合退由衰異又專諸荆卿之感激史記曰專諸堂邑人吳公子光以嫡嗣未得立請專諸刺吳王僚諸曰王僚可殺也母老子弱是其無如我何光乃置酒請王僚酒酣專諸置七首魚炙之中以刺王僚立死又曰荆軻衛人也燕太子丹質於秦秦王政遇之不善丹怨亡歸與軻交結乃尊為上卿故謂之荆卿軻入秦刺始皇不遂而死也侯生豫子之投身史記曰侯嬴魏隐士為大梁夷門監者魏公子無忌請為上客秦圍邯郸嬴教公子竊兵符北救趙乃自剄又曰豫譲晉人趙㐮子滅智伯讓曰士為知已者死乃變名姓欲刺㐮子㐮子令執之伏劍而死情為恩死命縁義輕皆以利害移心懐徳成節非夫交照之本未可語失得之原也穆徒以友分少全因絶同志之求黨侠生敝而忘得朋之義易曰西南得朋蔡氏貞孤之言其為然也古之善交者詳矣漢興稱王陽貢禹陳遵張竦前書曰陳遵字孟公杜陵人也張竦字伯松竦博學通達以亷儉自守而遵放縱不拘操行雖異然相親友也中世有亷范慶鴻陳重靁義云樂恢傳樂恢字伯竒京兆長陵人也父親為縣吏得罪於令收將殺之恢年十一常俯伏寺門晝夜號泣令聞而矜之即解出親恢長好經學事博士焦永永為河東太守恢隨之官閉廬精誦不交人物後永以事被考諸弟子皆以通闗被繫為交通闗渉也恢獨曒然不汚於法曒明也音公鳥反或從白作皎音亦同遂篤志為名儒性亷直介立介特也行不合已者雖貴不與交信陽侯隂就數致禮請恢恢絶不答後仕本郡吏太守坐法誅東觀記京兆尹張恂召恢署戸曹史故人莫敢往恢獨奔喪行服坐以抵罪歸復為功曹選舉不阿請託無所容同郡楊政數衆毁恢後舉政子為孝亷由是鄉里歸之辟司空牟融府㑹蜀郡太守第五倫代融為司空恢以與倫同郡不肯留薦潁川杜安而退諸公多其行連辟之遂皆不應華嶠書曰安擢為宛令以病去章帝行過潁川安上書召拜御史遷至巴郡太守而恢在家安與恢書通問恢告吏口謝且讓之曰為宛令不合志病去可也干人主以闚覦非也違平生操故不報安亦節士也年十三入太學號奇童洛陽令周紆自往候安安謝不見京師貴戚慕其行或遺之書安不發悉壁藏之及後捕案貴戚賓客安開壁出書印封如故後徴拜議郎㑹車騎將軍竇憲出征匈奴恢數上書諌争朝廷稱其忠東觀記載上書諌曰春秋之義王者不理夷狄得其地不可墾發得其人無益於政故明王之於夷狄覉縻而已孔子曰逺人不服則修文徳以来之以漢之盛不務脩舜禹周公之徳而無故興干戈動兵革以求無用之物臣誠惑之入為尚書僕射是時河南尹王調洛陽令李阜與竇憲厚善縱舍自由恢劾奏調阜并及司隷校尉諸所刺舉無所回避貴戚惡之決録注曰調字叔和為河南尹永和二年坐買洛陽令同郡任稜竹田及上罷城東漕渠免官憲弟夏陽侯瓌欲往候恢恢謝不與通憲兄弟放縱而忿其不附已妻每諫恢曰昔人有容身避害何必以言取怨恢歎曰吾何忍素餐立人之朝乎遂上疏諫曰臣聞百王之失皆由權移於下大臣持國常以埶盛為咎伏念先帝聖徳未永早棄萬國陛下富於春秋纂承大業春秋謂年也言年少春秋尚多故稱富諸舅不宜幹正王室以示天下之私經曰天地乖互衆物夭傷君臣失序萬人受殃政失不救其極不測方今之宜上以義自割下以謙自引四舅可長保爵土之榮四舅謂竇憲弟篤景瓌也皇太后永無慙負宗廟之憂誠䇿之上者也書奏不省時竇太后臨朝和帝未親萬機恢以意不得行乃稱疾乞骸骨詔賜錢太醫視疾恢薦任城郭均成陽髙鳳而遂稱篤拜騎都尉上書辭謝曰仍受厚恩無以報效夫政在大夫孔子所疾論語孔子曰天下有道政不在大夫世卿持權春秋以戒左傳曰齊崔氏出奔衛公羊傳曰崔氏者何齊大夫稱崔氏者何貶曷為貶譏世卿也聖人懇惻不虚言也近世外戚富貴必有驕溢之敗今陛下思慕山陵未遑政事諸舅寵盛權行四方若不能自損誅罰必加臣壽命垂盡臨死竭愚惟蒙留神詔聽上印綬乃歸鄉里竇憲因是風厲州郡廹脅恢遂飲藥死弟子縗絰輓者數百人輓引柩也庻衆痛傷之後竇氏誅帝始親事恢門生何融等上書陳恢忠節除子已為郎中三輔決錄注曰已字伯文為郎非其好也去官何敞傳何敞字文髙扶風平陵人也其先家于汝隂六世祖比干學尚書於晁錯何氏家傳云六世祖父比干字少卿經明行修兼通法律為汝隂縣獄吏决曹掾平活數千人後為丹陽都尉獄無寃囚淮汝號曰何公征和三年三月辛亥天大隂雨比干在家日中夢貴客車騎滿門覺以語妻語未已而門有老嫗可八十餘頭白求寄避雨雨甚而衣履不霑漬雨止送出門乃謂比干曰公有隂德今天錫君䇿以廣公之子孫因出懐中符䇿狀如簡長九寸凡九百九十枚以授比干子孫佩印綬者當如此算比干年五十八有六男又生三子本始元年自汝隂徙平陵代為名族武帝時為廷尉正與張湯同時湯持法深而比干務仁恕數與湯争雖不能盡得然所濟活者以千數後遷丹陽都尉因徙居平陵敞父寵建武中為千乘都尉以病免遂隐居不仕敞性公正自以趣舍不合時務每請召常稱疾不應元和中辟太尉宋由府由待以殊禮敞論議高常引大體多所匡正司徒袁安亦深敬重之是時京師及四方累有奇異鳥獸草木言事者以為祥瑞敞通經傳能為天官意甚惡之乃言於二公曰夫瑞應依徳而至災異緣政而生故鸜鵒來巢昭公有乾侯之戹春秋有鸜鵒來巢左氏傳魯大夫師已曰文武之世童謠有之曰鸜鵒之羽公在外野往饋之馬鸜鵒跦跦公在乾侯季平子逐昭公公遜于乾侯杜預注乾侯在魏郡斥丘縣晉境内邑也西狩獲麟孔子有兩楹之殯公羊傳曰西狩獲麟有以告孔子者曰有麏而角者何孔子曰孰為來哉孰為來哉反􅃑拭靣涕下沾袍曰吾道窮矣何氏注曰麟者太平之符聖人之類時得麟而死此亦天告夫子將没之徴也禮記孔子謂子貢曰予疇昔夜夢坐奠於兩楹之間焉殷人殯於兩楹之間丘即殷人也予殆將死也遂寢疾七日而死海鳥避風臧文祀之君子譏焉國語曰海鳥爰居止於魯東門之外三日臧文仲使國人祭之展禽譏焉因曰今兹海其有風乎廣川之鳥恒知避風是嵗海多大風冬煖文仲聞之曰吾過矣今異鳥翔於殿屋怪草生於庭際不可不察由安懼然不敢答懼音紀具反居無何而肅宗崩時竇氏專政外戚奢侈賞賜過制倉帑為虚帑音它朗反敞奏記由曰敞聞事君之義進思盡忠退思補過歴觀世主時臣無不各欲為化垂之無窮然而平和之政萬無一者盖以聖主賢臣不能相遭故也今國家秉聪明之𢎞道明公履晏晏之純徳晏晏溫和也君臣相合天下翕然治平之化有望於今孔子曰如有用我者三年有成今明公視事出入再朞宜當克己以醻四海之心禮一榖不升則損服徹膳禮記曰歳凶年穀不登君膳不祭肺損服減損服御天下不足若已使然而比年水旱人不收穫涼州縁邉家被凶害時西羌犯邉為害也男子疲於戰陳妻女勞於轉運老幼孤寡歎息相依又中州内郡公私屈竭此實損膳節用之時國恩覆載賞賚過度但聞臘賜自郎官以上公卿王侯以下至於空竭帑藏損耗國資尋公家之用皆百姓之力明君賜賚宜有品制忠臣受賞亦應有度臘賜大將軍三公錢各二十萬牛肉二百斤粳米二百斛特進侯十五萬卿十萬校尉五萬尚書三萬侍中將大夫各二萬千石六百石各七千虎賁羽林郎二人共三千以為祀門戸直見漢官儀也是以夏禹𤣥圭周公束帛尚書曰召公出取幣入錫周公今明公位尊任重責深負大上當匡正綱紀下當濟安元元豈但空空無違而已哉宜先正已以率羣下還所得賜因陳得失奏王侯就國除苑囿之禁節省浮費賑䘏窮孤則恩澤下暢黎庻悦豫上天聪明必有立應使百姓歌誦史官紀徳豈但子文逃祿國語昔楚鬭子文三登令尹無一日之積成王聞子文朝不及夕也於是乎每朝設脯七束糗一筐以羞子文成王每出子文之禄必逃王止而後復人謂子文曰人生求富子逃之何也對曰從政者以庇人也人多曠者而我取富焉是勤人以自封也死無日矣我逃死非逃富也公儀退食之比哉史記公儀休相魯食茹而美㧞園葵而棄之見布好而逐出其家婦燔其機云欲令農士女工安得奪其貨乎比音庇劉攽曰注安得奪其貨乎案文奪當作售得當作所也由不能用時齊殤王子都鄉侯暢奔弔國憂上書未報時章帝崩也殤王名石齊武王縯之孫也劉攽曰案殤字當作煬字説在本傳侍中竇憲遂令人刺殺暢於城門屯衛之中暢得幸竇太后故刺殺之而主名不立敞又説由曰劉暢宗室肺府茅土藩臣來弔大憂上書湏報湏待也親在武衛致此殘酷奉憲之吏莫適討捕適音的謂無指的討捕也蹤迹不顯主名不立敞偹數股肱職典賊曹股肱謂手臂也公府有賊曹主知盜賊也故欲親至發所以紏其變而二府以為故事三公不與賊盜敞在太尉府二府謂司徒司空邴吉為丞相不案事遂為故事見馬防傳也昔陳平生於征戰之世猶知宰相之分云外鎮四夷内撫諸侯使卿大夫各得其宜陳平為左丞相對文帝曰宰相者佐天子理隂陽順四時下育萬物之宜外鎮撫四夷諸侯内親附百姓使卿大夫各得任其職也今二府執事不深惟大義惑於所聞公縱姦慝莫以為咎惟明公運獨見之明昭然勿疑敞不勝所見請獨奏案由乃許焉二府聞敞行皆遣主者随之主者謂主知盜賊之曹也於是推舉具得事實京師稱其正以髙第拜侍御史時遂以竇憲為車騎將軍大發軍撃匈奴而詔使者為憲弟篤景並起邸第興造勞役百姓愁苦敞上疏諫曰臣聞匈奴之為桀逆久矣平城之圍嫚書之恥匈奴冒頓以精兵三十萬騎圍髙帝於白登七日案白登在平城東南十餘里髙后時冒頓遺高后書曰陛下獨立孤僨獨居兩主不樂無以自娱願以所有易其所無孤僨冒頓自謂此二辱者臣子所為捐軀而必死髙祖呂后忍怒還忿舍而不誅伏惟皇太后秉文母之操文母文王之妻太姒也詩曰既右烈考亦右文母也陛下履晏晏之姿匈奴無逆節之罪漢朝無可慙之恥而盛春東作嵗起於東人始就耕故曰東作興動大役元元怨恨咸懐不悦而猥復為衛尉篤奉車都尉景繕脩舘第彌街絶里臣雖斗筲之人鄭氏注論語筲竹器容斗二升誠竊懐怪以為篤景親近貴臣當為百僚表儀今衆軍在道朝廷焦脣百姓愁苦縣官無用而遽起大第崇飾玩好非所以垂令徳示無窮也宜且罷工匠專憂北邉恤人之困書奏不省後拜為尚書復上封事曰夫忠臣憂世犯主嚴顔譏刺貴臣至以殺身滅家而猶為之者何邪君臣義重有不得已也臣伏見往事國之危亂家之將凶皆有所由較然易知較明也昔鄭武姜之幸叔段左傳鄭武姜愛少子叔叚莊公立武姜請以京封叔叚謂之京城太叔後武姜引以襲鄭衛莊公之寵州吁左傳衛莊公寵庶子州吁州吁好兵公不禁大夫石碏諫曰臣聞愛子教之以義方弗納於邪荘公不從及卒適子桓公立州吁乃殺桓公而簒其位愛而不教終至凶戾由是觀之愛子若此猶飢而食之以毒適所以害之也史記蘇秦曰飢人之所以飢而不食烏喙者為其愈充腹而與餓死同患也伏見大將軍竇憲始遭大憂公卿比奏欲令典幹國事比頻也幹主也憲深執謙退固辭盛位懇懇勤勤言之深至天下聞之莫不悦喜今踰年無幾大禮未終卒然中改兄弟專朝憲秉三軍之重篤景總宫衛之權而虐用百姓奢侈僭偪誅戮無罪肆心自快今者論議洶洶咸謂叔段州吁復生於漢臣觀公卿懐持兩端不肯極言者以為憲等若有匪懈之志則已受吉甫襃申伯之功申伯周宣王元舅也有令徳故尹吉甫作頌以美之其詩曰維嶽降神生甫及申申伯之德柔恵且直揉此萬邦聞于四國如憲等陷於罪辜則自取陳平周勃順吕后之權吕后欲封吕禄吕産為王王陵諫不許陳平周勃順㫖而封之吕后崩平勃合謀卒誅産禄也終不以憲等吉凶為憂也臣敞區區誠欲計䇿兩安絶其綿綿塞其涓涓周金人銘曰涓涓不壅終為江河綿綿不絶或成網羅也上不欲令皇太后損文母之號陛下有誓泉之譏左傳鄭武姜引太叔叚襲荘公荘公寘姜氏於城潁誓之曰不及黄泉無相見也下使憲等得長保其福祐然臧獲之謀上安主父下存主母猶不免於嚴怒方言臧獲奴婢賤稱也史記曰蘇秦謂燕王曰客有遠為吏其妻私人其夫將來私者憂之妻曰勿憂吾已為作藥酒待之矣居三日其夫果至妻使妾舉藥酒而進之妾欲言酒之藥乎則恐逐其主母也欲勿言邪則恐殺其主父於是佯僵而棄酒主父怒笞之故妾僵而覆酒上存主父下存主母然終不免於笞臣伏惟累祖蒙恩至臣八世東觀記曰何修生成為漢膠東相成生果為大中大夫果生比干為丹陽都尉比干生夀蜀郡太守夀生顯京輔都尉顯生鄢光禄大夫鄢生寵濟南都尉寵生敞八世也復以愚陋旬年之間歴顯位備機近每念厚徳忽然􅁯生雖知言必夷滅而冒死自盡者誠不忍目見其禍而懐黙苟全駙馬都尉瓌雖在弱冠有不隐之忠比請退身願抑家權可與參謀聽順其意誠宗廟至計竇氏之福敞數切諫言諸竇罪過憲等深怨之時濟南王康尊貴驕甚康光武少子也憲乃白出敞為濟南太傅敞至國輔康以道義數引法度諫正之康敬禮焉歳餘遷汝南太守敞疾文俗吏以苛刻求當時名譽故在職以寛和為政立春日常召督郵還府督郵主司察愆過立春陽氣發生故召歸分遣儒術大吏案行屬縣顯孝悌有義行者及舉寃獄以春秋義斷之是以郡中無怨聲百姓化其恩禮其出居者皆歸養其父母追行喪服出居謂與父母别居者其親先亡者自恨䘮禮不足追行䘮制也推財相譲者二百許人東觀記曰髙譚等百八十五人推財相讓置立禮官不任文吏又脩理鮦陽舊渠百姓頼其利鮦陽縣屬汝南郡故城在今豫州新蔡縣北水經注云葛陂東出為鮦水俗謂之三丈陂墾田增三萬餘頃吏人共刻石頌敞功德及竇氏敗有司奏敞子與夏陽侯瓌厚善坐免官永元十二年復徴三遷五官中郎將常忿疾中常侍蔡倫倫深憾之元興元年敞以祠廟嚴肅微疾不齋後鄧皇后上太傅禹冡敞起随百官㑹倫因奏敞詐病坐抵罪卒於家論曰永元之際天子幼弱太后臨朝竇氏馮盛戚之權將有呂霍之變吕禄吕産也霍光之子禹幸漢徳未衰大臣方忠袁任二公正色立朝袁安任隗也樂何之徒抗議柱下漢官儀曰侍御史周官也為柱下史冠法冠案禮圖注云法冠執法者服之樂恢為司隸何敞為御史並彈射紏察之官也故能挾幼主斷勦姦囘之偪勦絶也劉攽曰故能挾㓜主斷案文斷字上少一之字不然國家危矣夫竇氏之間唯何敞可以免而特以子失交之故廢黜不顯大位惜乎過矣哉贊曰朱生受寄誠不愆義公叔辟梁允納明刺絶交靣朋崇厚浮偽揚雄法言曰朋而不心靣朋也友而不心靣友也浮偽者勸之以崇厚也恢舉謗已敞非祥瑞永言國偪甘心彊詖詖佞謟也竇憲兄弟奢僭上偪敞冒死切諫是甘心於彊詖之人也後漢書卷七十三後漢書卷七十三考證朱暉傳南陽宛人也注以國氏姓氏字疑當作為後漢書卷七十三考證
