body:
  text: 後漢書卷一百七宋宣城太守范煜撰唐章懐太子賢注酷吏列傳第六十七漢承戰國餘烈多豪猾之民其并兼者則陵横邦邑桀徤者則雄張閭里横音胡孟反張音知亮反且宰守曠逺戸口殷大前書曰成帝户一千二百二十三萬三千六十口五千九百五十九萬四千九百七十八漢極盛矣故臨民之職專事威斷族滅姦軌先行後聞先行刑而後聞奏也肆情剛烈成其不撓之威撓屈也前書甯成為濟南都尉而郅都為守始前數都尉歩入府因吏謁守如縣令其畏都如此及成徃直陵都出其上都素聞其聲善遇之與結驩違衆用已表其難測之智前書嚴延年為河南太守衆人所謂當死者一朝出之所謂當生者詭殺之吏人莫能測其用意深淺也至於重文横入為窮怒之所遷及者亦何可勝言重猶深也横猶枉也窮極也言遷怒於無罪之人故乃積骸滿穽漂血十里穽阬也前書尹賞守長安令得一切以便宜從事賞至修理長安獄穿地方深各數丈名為虎穴乃部戸曹掾吏雜舉長安中輕薄少年惡子無市籍商販作務而鮮衣凶服者得數百人盡以次内穴中覆以大石皆相枕籍死又王温舒為河内太守捕郡中豪猾論報流血十餘里也致温舒有虎冠之吏王温舒為中尉窮案姦猾盡糜爛獄中其爪牙吏虎而冠者也音義云言其殘虐之甚也延年受屠伯之名豈虚也哉前書嚴延年為河南太守所誅殺血流數里河南號曰屠伯言若屠人之殺六畜也若其揣挫彊埶摧勒公卿碎裂頭腦而不顧亦為壯也前書濟南瞷氏宗人三百餘家豪猾二千石莫能制郅都為濟南守至則誅瞷氏首惡郡中路不拾遺都後竟坐斬又趙廣漢為京兆尹侵犯貴戚大臣將吏卒入丞相魏相府召其夫人疏庭下受辭責以殺婢事司直蕭望之劾奏廣漢摧辱大臣傷化不道坐腰斬破碎頭腦言不避誅戮也劉攽曰注疏庭下案本傳疏當作跪自中興以後科網稍密吏人之嚴害者方於前世省矣而閹人親婭侵虐天下爾雅曰兩壻相謂曰婭至使陽球磔王甫之屍張儉剖曹節之墓若此之類雖厭快衆憤亦云酷矣儉知名故附黨人篇劉淑李膺等傳也董宣傳董宣字少平陳留圉人也初為司徒侯霸所辟舉高第累遷北海相到官以大姓公孫丹為五官掾丹新造居宅而卜工以為當有死者丹乃令其子殺道行人置屍舍内以塞其咎宣知即收丹父子殺之丹宗族親黨三十餘人操兵詣府稱寃呌嗁宣以丹前附王莽慮交通海賊乃悉收繫劇獄劇縣之獄使門下書佐水丘岑盡殺之姓水丘名岑也青州以其多濫奏宣考岑宣坐徴詣廷尉在獄晨夜諷誦無憂色及當出刑官屬具饌送之宣乃厲色曰董宣生平未曽食人之食況死乎升車而去時同刑九人次應及宣光武馳使騶騎特原宣刑且令還獄遣使者詰宣多殺無辜宣具以狀對言水丘岑受臣㫖意罪不由之願殺臣活岑使者以聞有詔左轉宣懐令令青州勿案岑罪岑官至司𨽻校尉後江夏有劇賊夏喜等寇亂郡境以宣為江夏太守到界移書曰朝廷以太守能禽姦賊故辱斯任今勒兵界首檄到幸思自安之宜喜等聞懼即時降散外戚隂氏為郡都尉宣輕慢之坐免後特徴為洛陽令時湖陽公主蒼頭白日殺人因匿主家吏不能得及主出行而以奴驂乗宣於夏門亭候之乃駐車叩馬以刀畫地大言數主之失叱奴下車因格殺之主即還宫訴帝帝大怒召宣欲箠殺之宣叩頭曰願乞一言而死帝曰欲何言宣曰陛下聖德中興而縱奴殺良人將何以理天下乎臣不須箠請得自殺即以頭撃楹流血被面帝令小黄門持之使宣叩頭謝主宣不從彊使頓之宣兩手據地終不肯俯主曰文叔為白衣時藏亡匿死吏不敢至門今為天子威不能行一令乎帝笑曰天子不與白衣同因勑彊項令出謝承書曰勑令詣大官賜食宣受詔出飯盡覆杯食机上大官以狀聞上問宣宣對曰臣食不敢遺餘如奉職不敢遺力賜錢三十萬宣悉以班諸吏由是搏撃豪彊莫不震慄京師號為卧虎歌之曰枹鼔不鳴董少平枹撃鼓杖也音孚其字從木也在縣五年年七十四卒於官詔遣使者臨視唯見布被覆屍妻子對哭有大麥數斛敝車一乗謝承書曰有白馬一匹蘭輿一乗也帝傷之曰董宣亷潔死乃知之以宣嘗為二千石賜艾綬𦵏以大夫禮拜子並為郎中後官至齊相諸本此下有説蔡茂事二十五字亦有無者案茂自有傳也樊曄傳樊曄字仲華南陽新野人也與光武少游舊建武初徴為侍御史遷河東都尉引見雲臺初光武微時嘗以事拘於新野曄為市吏餽餌一笥蒼頡篇曰餽饟也説文曰餌餅也笥竹器也帝德之不忘仍賜曄御食及乗輿服物因戲之曰一笥餌得都尉何如曄頓首辭謝及至郡誅討大姓馬適匡等馬適姓也前書有馬適建俗本匡上有王字者誤也盜賊清吏人畏之數年遷揚州牧敎民耕田種樹理家之術視事十餘年坐法左轉軹長軹縣屬河南郡故城在今洛州濟源縣東南也隗囂滅後隴右不安乃拜曄為天水太守政嚴猛好申韓法申不害韓非之法也善惡立斷人有犯其禁者率不生出獄吏人及羌胡畏之道不拾遺行旅至夜聚衣装道傍曰以付樊公涼州為之歌曰游子常苦貧力子天所富勤力之子寧見乳虎穴乳産也猛獸産乳䕶其子則博噬過常故以喻也諸本穴字或作六誤也不入冀府寺冀天水縣也大笑期必死忿怒或見置嗟我樊府君安可再遭値視事十四年卒官永平中顯宗追思曄在天水時政能以為後人莫之及詔賜家錢百萬子融有俊才好黄老不肯為吏李章傳李章字第公河内懐人也五世二千石章習嚴氏春秋宣帝時博士嚴彭祖也經明教授歴州郡吏光武為大司馬平定河北召章置東曹屬數從征伐光武即位拜陽平令陽平縣屬東郡故城今魏州莘縣也時趙魏豪右徃徃屯聚清河大姓趙綱遂於縣界起塢壁繕甲兵為在所害章到乃設饗㑹而延謁綱綱帯文劒被羽衣緝鳥羽以為衣也前書欒大為五利將軍服羽衣也從士百餘人來到章與對讌飲有頃手劎斬綱伏兵亦悉殺其從者因馳詣塢壁掩撃破之吏人遂安遷千乗太守坐誅斬盜賊過濫徴下獄免嵗中拜侍御史出為琅邪太守時北海安丘大姓夏長思等反遂囚太守處興風俗通曰史記趙有辨士處子故冇處姓也而據營陵城營陵縣屬北海郡也章聞即發兵千人馳徃撃之掾吏止章劉攽曰案文吏當作史曰二千石行不得出界兵不得擅發前書杜欽奏記王鳳曰二千石守千里之地任兵馬之重不宜去郡也章按劒怒曰逆虜無狀囚劫郡守此何可忍若坐討賊而死吾不恨也遂引兵安丘城下募勇敢燒城門與長思戰斬之獲三百餘級得牛馬五百餘頭而還興歸郡以狀上帝悉以所得班勞吏士後坐度人田不實徴以章有功但司寇論月餘免刑歸復徴㑹病卒周䊸傳周䊸字文通下邳徐人也為人刻削少恩好韓非之術少為廷尉史永平中補南行唐長到官曉吏人曰朝廷不以長不肖使牧黎民而性讐猾吏志除豪賊且勿相試遂殺縣中尤無狀者數十人吏人大震遷博平令博平縣故城在今博州博平縣東也收考姦臧無出獄者以威名遷齊相亦頗嚴酷專任刑法而善為辭案條敎辭案猶今案牘也為州内所則後坐殺無辜復左轉博平令建初中為勃海太守每赦令到郡輒隠閉不出先遣使屬縣盡決刑罪乃出詔書坐徴詣廷尉免歸䊸亷潔無資常築墼以自給劉攽曰案墼非築所成當作塹築為垣墻塹為坑塹也肅宗聞而憐之復以為郎再遷召陵侯相廷掾憚䊸嚴明欲損其威續漢志每郡有五官掾縣為廷掾也乃晨取死人斷手足立寺門䊸聞便徃至死人邉若與死人共語狀隂察視口眼有稻芒乃密問守門人曰悉誰載藁入城者悉猶知也門者對唯有廷掾耳又問鈴下漢官儀曰鈴下侍閣辟車此皆以名自定者也外頗有疑令與死人語者不對曰廷掾疑君乃收廷掾考問具服不殺人取道邉死人後人莫敢欺者徴拜洛陽令下車先問大姓主名吏數閭里豪彊以對䊸厲聲怒曰本問貴戚若馬竇等輩豈能知此賣菜傭乎於是部吏望風㫖爭以激切為事貴戚跼蹐京師肅清皇后弟黄門郎竇篤從宫中歸夜至止姦亭亭長霍延遮止篤篤蒼頭與爭延遂拔劒擬篤而肆詈恣口篤以表聞詔召司𨽻校尉河南尹詣尚書譴問遣劒㦸士收䊸送廷尉詔獄數日貰出貰赦也音市夜反帝知䊸奉法疾姦不事貴戚然苛慘失中慘虐也數為有司所奏八年遂免官後為御史中丞和帝即位太傅鄧彪奏䊸在任過酷不宜典司京輦漢官儀曰御史中丞外督部刺史内領侍御史糾察百官故云典司京輦免歸田里後竇氏貴盛篤兄弟秉權睚眦宿怨無不僵仆僵偃也仆踣也䊸自謂無全乃柴門自守以待其禍然篤等以䊸公正而怨隙有素遂不敢害永元五年復徴為御史中丞諸竇雖誅而夏陽侯瓌猶尚在朝䊸疾之乃上疏曰臣聞臧文仲之事君也見有禮於君者事之如孝子之養父母見無禮於君者誅之如鷹鸇之逐鳥雀左氏傳季孫行父稱臧文仲敎行父事君之辭也按夏陽侯瓌本出輕薄志在邪辟學無經術而妄搆講舍外招儒徒實㑹姦桀輕忽天威侮慢王室又造作廵狩封禪之書惑衆不道當伏誅戮而主者營私不為國計夫涓流雖寡浸成江河爝火雖微卒能燎野莊子曰日月出矣而爝火不息爝火小火也履霜有漸可不懲革易曰履霜堅氷至其所由來者漸矣宜尋吕産專竊之亂吕産吕太后之兄子封為梁王太后崩與弟祿作亂也永惟王莽簒逆之禍上安社稷之計下解萬夫之惑㑹瓌歸國䊸遷司𨽻校尉六年夏旱車駕自幸洛陽錄囚徒二人被掠生蟲坐左轉騎都尉七年遷將作大匠九年卒於官黄昌傳黄昌字聖真㑹稽餘姚人也餘姚今越州縣也本出孤微居近學宫數見諸生修庠序之禮因好之遂就經學又曉習文法仕郡為決曹續漢志曰決曹主罪法事刺史行部見昌甚竒之辟從事後拜宛令政尚嚴猛好發姦伏人有盜其車蓋者昌初無所言後乃密遣親客至門下賊曹家掩取得之續漢志曰賊曹主盜賊事悉收其家一時殺戮大姓戰懼皆稱神明朝廷舉能遷蜀郡太守先太守李根年老多悖政悖亂也百姓侵寃及昌到吏人訟者七百餘人悉為斷理莫不得所密捕盜帥一人脅使條諸縣彊暴之人姓名居處乃分遣掩討無有遺脱宿惡大姦皆奔走它境初昌為州書佐其婦歸寧於家遇賊被獲遂流轉入蜀為人妻其子犯事乃詣昌自訟昌疑母不類蜀人因問所由對曰妾本㑹稽餘姚戴次公女州書佐黄昌妻也妾嘗歸家為盜所略遂至於此昌驚呼前謂曰何以識黄昌邪對曰昌左足心有黒子常自言當為二千石相書曰足心有黒子者二千石昌乃出足示之因相持悲泣還為夫婦視事四年徴再遷陳相縣人彭氏舊豪縱造起大舍高樓臨道昌每出行縣彭氏婦人輒升樓而觀昌不喜遂勑收付獄案殺之又遷為河内太守又再遷潁川太守劉攽曰案文多二又字永和五年徴拜將作大匠漢安元年進補大司農左轉大中大夫卒於官陽球傳陽球字方正漁陽泉州人也泉州故城在今幽州雍奴縣南也家世大姓冠蓋球能撃劒習弓馬性嚴厲好申韓之學郡吏有辱其母者球結少年數十人殺吏滅其家由是知名初舉孝亷補尚書侍郎閑逹故事其章奏處議處斷也常為臺閣所崇信出為高唐令以嚴苛過理郡守收舉收繫舉劾之也㑹赦見原辟司徒劉寵府舉高第九江山賊起連月不解三府上球有理姦才拜九江太守球到設方略凶賊殄破收郡中姦吏盡殺之遷平原相出教曰相前蒞高唐志掃姦鄙遂為貴郡所見枉舉昔桓公釋管仲射鉤之讎高祖赦季布逃亡之罪雖以不德敢忘前義況君臣分定而可懐宿昔哉今一蠲徃愆期諸來效若受教之後而不改姦狀者不得復有所容矣郡中咸畏服焉時天下大旱司空張顥條奏長吏苛酷貪汚者皆罷免之球坐嚴苦徴詣廷尉當免官靈帝以球九江時有功拜議郎遷將作大匠坐事論頃之拜尚書令奏罷鴻都文學曰伏承有詔勑中尚方為鴻都文學樂松江覽等三十二人圖象立賛以勸學者臣聞傳曰君舉必書書而不法後嗣何觀左傳曹劌諫魯莊公之辭也案松覽等皆出於㣲蔑斗筲小人依憑世戚附託權豪俛眉承睫徼進明時或獻賦一篇或鳥篆盈簡八體書有鳥篆象形以為字也而位升郎中形圖丹青亦有筆不㸃牘辭不辯心假手請字妖偽百品莫不被䝉殊恩蟬蜕滓濁説文曰蜕蟬蜕所解皮也蜕音式鋭反楚詞曰濟江海兮蟬蜕或音它外反是以有識掩口天下嗟歎臣聞圖象之設以昭勸戒欲令人君動鑒得失未聞豎子小人詐作文頌而可妄竊天官垂象圖素者也今太學東觀足以宣明聖化願罷鴻都之選以消天下之謗書奏不省時中常侍王甫曹節等姦虐弄權扇動外内球嘗拊髀發憤曰若陽球作司𨽻此曹子安得容乎光和二年遷為司𨽻校尉王甫休沐里舍球詣闕謝恩奏收甫及中常侍淳于登袁赦封􅛑􅛑音吐盍反中黄門劉毅小黄門龎訓朱禹齊盛等及子弟為守令者姦猾縱恣罪合滅族太尉叚熲謟附佞倖宜並誅戮於是悉收甫熲等送洛陽獄及甫子永樂少府萌沛相吉球自臨考甫等五毒備極萌謂球曰父子既當伏誅少以楚毒假借老父球曰若罪惡無狀若汝也死不滅責乃欲球假借邪萌乃罵曰爾前事吾父子如奴奴敢反汝主乎今日困吾行自及也球使以土窒萌口箠朴交至父子悉死杖下熲亦自殺乃僵磔甫屍於夏城門大署牓曰賊臣王甫盡没入財産妻子皆徙比景球既誅甫復欲以次表曹節等乃勑中都官從事曰且先去大猾當次案豪右權門聞之莫不屏氣諸奢飾之物皆各緘縢不敢陳設説文曰緘束篋也孔安國注尚書曰縢緘也京師畏震時順帝虞貴人𦵏百官㑹喪還曹節見磔甫屍道次慨然抆淚曰抆拭也音亡粉反我曹自可相食何宜使犬䑛其汁乎語諸常侍今且俱入勿過里舍也節直入省白帝曰陽球故酷暴吏前三府奏當免官以九江㣲功復見擢用愆過之人好為妄作不宜使在司𨽻以騁毒虐帝乃徙球為衛尉時球出謁陵節勑尚書令召拜不得稽留尺一球被召急因求見帝叩頭曰臣無清高之行横蒙鷹犬之任前雖糾誅王甫叚熲蓋簡落狐狸未足宣示天下願假臣一月必令豺狼鴟梟各服其辜叩頭流血殿上呵叱曰衛尉扞詔邪至於再三乃受拜其冬司徒劉郃與球議收案張譲曹節節等知之共誣白郃等語已見陳球傳遂收球送洛陽獄誅死妻子徙邉王吉傳王吉者陳留浚儀人中常侍甫之養子也甫在宦者傳吉少好誦讀書傳喜名聲而性殘忍以父秉權寵年二十餘為沛相曉逹政事能斷察疑獄發起姦伏多出衆議課使郡内各舉姦吏豪人諸常有㣲過酒肉為臧者雖數十年猶加貶棄注其名籍專選剽悍吏撃斷非法若有生子不養即斬其父母合土棘埋之凡殺人皆磔屍車上隨其罪目宣示屬縣目罪名也夏月腐爛則以繩連其骨周徧一郡乃止見者駭懼視事五年凡殺萬餘人其餘􅆭毒刺刻不可勝數郡中惴恐惴懼也音之瑞反莫敢自保及陽球奏甫乃就收執死於洛陽獄論曰古者敦龎善惡易分左傳申叔時曰人生敦龎和同以聽杜預注云敦龎厚大也至於畫衣冠異服色而莫之犯白虎通曰畫象者其衣服象五刑也犯墨者蒙巾犯劓者以赭著其衣犯髕者以墨蒙其髕處而畫之犯宫者雜屝犯大辟者布衣無領墨黥面也叔世偷薄左傳曰叔向曰三辟之興皆叔代也叔代猶末代也偷茍且也本或作渝渝變也上下相蒙左傳介之推曰下義其罪上賞其姦上下相蒙難與處矣蒙欺也德義不足以相洽化導不能以懲違遂乃嚴刑痛殺隨而繩之致刻深之吏以暴理姦倚疾邪之公直濟忍苛之虐情漢世所謂酷能者蓋有聞也皆以敢悍精敏巧附文理風行霜烈威譽諠赫與夫斷斷守道之吏何工否之殊乎尚書曰如有一介臣斷斷猗孔安國注云斷斷猗然專一之臣也故嚴君蚩黄霸之術前書嚴延年為河南太守嚴刑峻罰時黄霸為潁川太守以寛恕為化郡中亦平屢蒙豐年鳳凰屢集上下詔稱揚其行加金爵之賞延年素輕霸為人及比郡為守褒賞反在已前心内不服河南界中又有蝗府丞狐義出行蝗還見延年延年曰此蝗豈鳳凰食邪密人笑卓茂之政茂傳曰初茂到縣有所廢置吏人笑之猛既窮矣而猶或未勝然朱邑不以笞辱加物前書曰朱邑以愛利為行未嘗笞辱人袁安未嘗鞫人臧罪安傳曰安為河南尹政號嚴明然未曽以臧罪鞫人也而猾惡自禁人不欺犯何者以為威辟既用而苟免之行興辟法也音頻亦反仁信道孚故感被之情著左傳曰小信未孚杜預注云孚大信也此言仁信之道大信於人茍免者威隙則姦起感被者人亡而思存若子産卒仲尼聞之曰古之遺愛也由一邦以言天下則刑訟繁措可得而求乎贊曰大道既徃刑禮為薄老子曰大道廢有仁義又曰禮者忠信之薄而亂之始斯人散矣機詐萌作論語曽子曰上失其道民散久矣如得其情則哀矜而勿喜也去殺由仁濟寛非虐論語曰善人為邦百年亦可以勝殘去殺此言用仁徳化人人知禮節可以無殺戮也左傳曰寛以濟猛猛以濟寛言政寛則人慢故須以猛濟之非故為暴虐也末暴雖勝崇本或略春秋繁露曰君者國之本也夫為國本其化莫大於崇本崇本則君化若神不崇本則無以兼人此言酷暴為政化之末雖得勝殘而崇本之道尚為略也劉攽曰注夫為國本其化莫大於崇本案文多一本字後漢書巻一百七後漢書卷一百七考證酷吏傳若其揣挫彊勢揣疑惴張儉剖曹節之墓何焯曰以黨錮宦官一傳參考乃侯覽壽冢非曹節也所當刋正且未葬但可言壊不得言剖周䊸傳常築墼以自給劉攽曰墼非築所成當作塹楊慎丹鉛續録曰攽本南人不知土墼也字林磚未燒曰墼埤蒼刑土為方曰墼今之土墼以金為模實土其中非築而何陽球傳小黄門龎訓朱禹齊盛等何焯校本禹改瑀後漢書卷一百七考證
