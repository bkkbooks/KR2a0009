body:
  text: 後漢書卷三十梁剡令劉昭補并注郡國志第二十郡國二豫州潁川沛國汝南陳國梁國魯國冀州魏郡河間鉅鹿清河常山趙國中山勃海安平潁川郡秦置雒陽東南五百里十七城户二十六萬三千四百四十口百四十三萬六千五百一十三陽翟禹所都汲冢書禹都陽城古史考曰鄭厲公入櫟即此也晉地道記云去雒陽二百八十六里屬河南有鈞臺左傳曰夏啓有鈞臺之享杜預曰有鈞臺陂帝王世紀云在縣西有髙氏亭左傳成十七年衛侵鄭至髙氏杜預曰縣西南有雍氏城左傳襄十八年楚伐鄭侵雍梁杜預曰在縣東北史記齊湣王十二年攻魏楚圍雍氏襄有養陰里襄城左傳定四年盟臯鼬杜預曰縣東南有城臯亭有西不羮杜預曰有不羮城有汜城杜預曰在縣南周襄王所處有汾丘左傳襄十八年楚治兵於汾杜預曰縣東北有汾丘城有魚齒山左傳謂魚陵杜預曰魚齒山也在犨縣北昆陽有湛水左傳襄十六年楚公子格與晉戰於湛陂定陵有東不羮杜預曰縣西北有不羮亭地道記曰髙陵山汝水所出舞陽邑郾臨潁潁陽潁隂左傳文九年楚伐鄭師於狼淵杜預曰縣西有狼陂獻帝遣御史大夫張音奉皇帝璽綬策書禪帝位於魏是文帝繼王位南廵在潁隂有司乃為壇於潁隂庚午登壇魏相國華歆跪受璽綬以進於王王既受畢降壇視燎成禮而反帝王世紀云魏文帝登禪于曲蠡之繁陽亭為縣曰繁昌亦禹貢豫州之域今許之封内今潁川繁昌是也北征記曰城在許之南七十里東有臺髙七丈方五十步臺南有壇髙二丈方三十步即受終之壇也案北征記云是外黄縣繁昌城非也有狐宗鄉或曰古狐人亭有岸亭史記魏哀王五年秦伐魏走犀首岸門徐廣曰岸亭許左傳莊二十八年楚伐鄭鄭奔桐丘杜預曰縣東北有桐丘城獻帝徙都改許昌新汲左傳文元年衞孔達侵鄭伐緜訾及匡杜預曰縣東北有匡城成十七年伐齊至曲洧杜預曰縣治曲洧城臨洧水􅋣陵春秋時曰􅋣鄭叔段所保故曰克段于鄢又成十六年晉敗楚於􅋣陵李竒曰六國曰安陵長社有長葛城左傳隠五年宋伐鄭圍長葛縣本名長葛地道記曰社中樹暴長漢改名有向鄉左傳襄十一年諸侯師于向杜預曰在縣東北有蜀城有蜀津史記曰魏惠王元年韓趙合軍伐魏蜀澤陽城帝王世紀曰陽城有啓母冢有嵩髙山山海經謂為太室之山禹貢有外方山鄭𤣥毛詩譜云外方之山即嵩也孟子曰益避禹之子於箕山之隂注云嵩髙之北洧水潁水出晉地道記曰潁水出陽乾山有鐵有負黍聚史記曰周敬王十九年鄭伐負黍馮敬通賦遇許由於負黍山也父城有應鄉杜預曰應國在西南史記曰客謂周最以應為秦王太后養地輪氏建初四年置汝南郡髙帝置雒陽東南六百五十里三十七城户四十萬四千四百四十八口二百一十萬七百八十八平輿有沈亭故國姬姓有摯亭見説文新陽侯國西平有鐵有柏亭故柏國上蔡本蔡國南頓本頓國汝陰本胡國杜預曰縣西北有胡城地道記有陶丘鄉詩所謂汝墳汝陽新息國北宜春㶏强侯國灈陽期思有蔣鄉古蔣國陽安道亭故國杜預曰在縣南袁山松書有朔山魏氏春秋曰初平三年分二縣置陽安都尉項故國左傳僖十七年魯所滅地道記曰有公路城袁術所築西華細陽安城侯國有武城亭吳房有棠谿亭左傳曰房國楚靈王所滅又楚封吳夫概王於棠谿地道記有吳城鮦陽侯國皇覽曰縣有葛陂鄉城東北有楚武王冢民謂之楚王岑永平中葛陂城北祝里社下於土中得銅鼎而銘曰楚武王之冢民傳言秦項赤眉之時欲發之輒頽壞厭不得發慎陽慎新蔡有大吕亭地道記曰故吕侯國左傳昭四年吳伐楚入櫟杜預曰縣東北有櫟亭安陽侯國有江亭故國嬴姓富波侯國永元中復宜祿永元中復朗陵侯國左傳成六年楚拒晉桑隧杜預曰縣東有桑里亭弋陽侯國有黄亭故黄國嬴姓召陵左傳昭十三年楚蔡公與子干子晳盟于鄧杜預曰縣西南有鄧城有陘亭左傳僖四年齊伐楚次陘杜預曰在縣南蘇秦説韓宣惠王曰南有陘山有安陵鄉征羌侯國有安陵亭史記無忌説魏安釐王曰王之使者出過而惡安陵氏於秦博物記曰故安陵君也思善侯國宋公國周名郪丘漢改為新郪章帝建初四年徙宋公於此有繁陽亭左傳襄四年楚師繁陽杜預曰鮦陽南有繁陽亭褒信侯國有頼亭故國史記楚封王孫勝白公杜預曰褒信縣有白亭原鹿侯國春秋左氏傳僖二十一年宋盟鹿上杜預曰原鹿縣也定潁侯國固始侯國故寢也光武中興更名有寢丘史記曰楚莊王封孫叔敖子又䝉恬破楚軍山桑侯國故屬沛有下城父聚有垂惠聚蘇茂奔垂惠王劉紆城父故屬沛春秋時曰夷楚屬陳左傳僖二十三年楚所取有乾谿在縣南有章華臺杜預曰章華宫在華容縣城内梁國秦碭郡髙帝改其三縣元和元年屬雒陽東南八百五十里九城户八萬三千三百口四十三萬一千二百八十三下邑左傳哀七年築黍丘杜預曰縣西南有黍丘亭睢陽北征記曰城周三十七里南臨濊水凡二十四門地道記曰梁孝王築城十二里小鼓唱節杵下而和之稱睢陽曲本宋國閼伯墟有盧門亭左傳桓十四年宋伐鄭取大宫之椽為盧門之椽昭二十一年敗吳鴻口杜預曰縣東有鴻口亭地道記曰昭二十一年禦諸横横亭在縣南有魚門左傳僖二十二年邾人懸公胄於魚門有陽梁聚左傳襄十三年楚伐宋師陽梁杜預曰有梁亭僖二十八年楚子玉夢河神謂已曰吾賜汝孟諸之麋杜預曰在縣東北爾雅十藪宋有孟諸虞有空桐地有桐地有桐亭左傳哀二十六年宋景公死空桐有綸城少康邑碭山出文石史記曰髙祖隱於芒碭山澤巖石之間有陳勝墓蒙帝王世紀曰有北亳即景亳湯所盟處有蒙澤左傳宋萬殺宋閔公於蒙澤僖二年齊侯盟貰杜預曰縣西北有貰城貰字與貫字相似穀熟有新城左傳曰文十四年諸侯㑹新城帝王世紀有南亳有邳亭古邳國􅋣故屬陳留寧陵故屬陳留左傳成十六年㑹沙隨杜預曰縣北有沙隨亭有葛鄉故葛伯國左傳曰在縣東北薄故屬山陽所都杜預曰蒙縣西北有薄城中有湯冢左傳宋公子御説奔亳其西又有微子冢沛國秦泗川郡髙帝改雒陽東南千二百里二十一城户二十萬四百九十五口二十五萬一千三百九十三相左傳桓十五年㑹于袲杜預曰在縣西南一名犖蕭本國北征記城周十四里南臨汙水沛有泗水亭亭有髙祖碑班固為文見固集地道記有許城左傳定八年鄭伐許豐地道記曰去國二百六十州六百雒千二十五里西有大澤髙祖斬白蛇於此有枌榆亭案前志注枌榆社在縣東北十五里或鄉名髙祖里社戴延之西征記曰縣西北有漢祖廟為亭長所處酇左傳昭四年吳伐楚入棘杜預曰縣東北有棘亭襄元年鄭侵宋取犬丘杜預曰縣東北有犬丘城帝王世紀曰曹騰封費亭侯縣有費亭是也有鄍聚左傳曰冀為不道伐鄍三門服䖍曰鄍晉别都杜預曰是虞邑地處闕則非此鄍矣博物記曰諸侯㑹于鄍亭穀陽譙平陽邑左傳僖二十三年楚所取乾谿在南刺史治漢官曰去雒陽千二十里洨有垓下聚髙祖破項羽地蘄有大澤鄉陳涉起此史記曰髙祖擊黥布於㑹甀徐廣曰在縣西銍鄲建平臨睢故芒光武更名竹邑侯國故竹公丘本滕國杜預曰在縣東南龍亢地道記曰左傳隱二年入向城在縣東南向本國符離紅地道記云左傳昭八年大蒐于紅太丘杼秋故屬梁國有澶淵聚左傳襄二十年盟于澶淵陳國髙帝置為淮陽章和二年改雒陽東南七百里九城户十一萬二千六百五十三口百五十四萬七千五百七十二陳帝王世紀曰庖犧氏所都舜後所封左傳僖元年㑹于檉杜預曰縣西北有檉城爾雅曰丘上有丘曰宛丘陳有株邑蓋朱襄之地博物記曰卭地在縣北防亭在焉詩曰卭有㫖苕防有鵲巢陽夏有固陵聚史記髙祖五年追項羽至固陵晉灼漢書注云汝南固始縣寧平苦春秋時曰相有頼鄉伏滔北征記曰有老子廟廟中有九井水相通古史考曰有曲仁里老子里也地道記曰城南三十里有平城柘新平扶樂武平左傳成十六年諸侯侵陳鳴鹿杜預曰縣西南有鹿邑長平故屬汝南左傳宋華氏戰于鬼閻杜預曰縣西北有閻亭有辰亭左傳宣十一年盟辰陵杜預曰縣東南有辰亭有赭丘城魯國秦薛郡髙后改本屬徐州光武改屬豫州六城户七萬八千四百四十七口四十一萬一千五百九十魯國古奄國帝王世紀曰黄帝生於夀丘在魯東門之北少昊自窮桑登帝位窮桑在魯北後徙曲阜應劭曰曲阜在魯城中委曲長七八里左傳曰伯禽封少昊之墟僖二十九年介葛盧舎于昌衍杜預曰縣東南有昌平城皇覽曰奄里伯公冢在城内祥舍中民傳言魯五徳奄里伯公𦵏其宅有大庭氏庫杜預曰大庭氏古國名在城内魯於其處作庫有鐵有闕里孔子所居漢晉春秋曰鍾離意相魯見仲尼廟頽毁㑹諸生於廟中慨然歎曰蔽芾甘棠勿翦勿伐況見聖人廟乎遂躬留治之周觀輿服之在焉自仲尼以來莫之開也意發視之得古文策書曰亂吾書董仲舒治吾堂鍾離意璧有七張伯盜一意尋案未了而卒張伯者治中庭治地得六璧上之意曰此有七何以不遂伯懼探璧懷中魯咸以為神意别傳曰意省堂有孔子小車乗皆朽敗意自糶俸雇漆膠之直請魯民治之及䕶几席劒履後得甕中素書曰䕶吾履鍾離意又禮記矍相之圃亦在城中西南近孔子廟而仲尼墓在魯城門北之外泗水上去城一里葬地蓋一頃墓墳南北十步東西十三步髙一丈二尺墓前有瓴甓為祠壇方六尺與地平塋中異木以百數魯人莫能識皇覽曰孔子本無祠堂塋中不生荆棘及刺人草伯魚冢在孔子冢東與孔子冢近大小相望子思冡在孔子冢南案今墓書孫在祖前謂此為驕孫祔有牛首亭左傳曰桓十四年宋伐鄭取牛首有五父衢地道記曰在城東騶本邾國有騶山髙五里秦始皇刻石焉劉薈騶山記曰邾城在山南去山二里城東門外有韋賢墓北有繹山左傳文十三年邾遷於繹郭璞曰繹山純石積構連屬城北有牙山牙山北有唐口山唐口山北有陽山城北有孟軻冢蕃有南梁水左傳襄四年戰狐台杜預曰縣東南有目台亭薛本國地道記曰夏車正奚仲所封冢在城南二十里山上皇覽曰靖郭君冢在城中東南陬孟嘗君冢在城中向門東北邊六國時曰徐州史記曰齊宣王九年與魏襄王㑹徐州而相王卞有盜泉有郚鄉城左傳文公七年城郚杜預曰縣南有郚鄉城隱元年盟于蔑杜預曰蔑地名縣南有姑城襄十七年齊圍桃杜預曰縣東南有桃墟汶陽左傳桓十二年盟曲池杜預曰縣北有曲水亭地道記臨淄縣西南門曰曲門其側有池案魯桓與杞莒盟不往齊地地道記為妄右豫州刺史部郡國六縣邑侯國九十九魏郡髙帝置雒陽東北七百里魏志曰建安十七年割河内之蕩陰朝歌林慮東郡之衞國頓丘東武陽發干鉅鹿之廮陶曲陽南和廣平之廣平任城趙國之襄國邯鄲易陽以益魏郡十八年分置東西都尉十五城户十二萬九千三百一十口六十九萬五千六百六鄴帝王世紀曰縣西南有上司馬殷太甲常居焉魏都賦注曰縣西北有鼓山時時自鳴鳴則兵又交谷水在縣南案本傳有西唐山又鄴北太行山西北去亦不知山所極處亦如東海不知水所窮盡也有故大河有滏水魏都賦曰北臨漳滏則冬夏異沼注云水經鄴西北滏水熱故名滏口有汙水有汙城史記曰項羽破秦軍汙水上有平陽城史記曰靳歙别下平陽有武城有九侯城徐廣曰一作鬼侯與文王為紂三公繁陽内黄左傳襄十九年㑹于柯杜預注曰縣東北有柯城昭九年荀盈卒于戲陽杜預曰縣北有戲陽城清河水出有羛陽聚世祖破五校處有黄澤前志曰在縣西魏元城左傳成七年㑹馬陵杜預曰縣東南有地名馬陵史記曰龎涓死處墟故沙鹿左傳沙鹿崩穀梁傳曰林屬於山曰沙鹿山名也有沙亭左傳定七年盟于沙亭杜預曰在縣東南十年盟于瑣晉地道記曰縣南有瑣陽城黎陽左傳定十四年㑹于牽杜預曰縣東北有牽城陰安邑館陶清淵平恩沙侯國魏都賦注曰有龍山斥丘有葛杜預曰有乾侯魯昭公所處武安有鐵即臺孝威隱于縣山曲梁侯國左傳宣十五年敗赤狄于曲梁故屬廣平有雞澤左傳襄三年諸侯㑹雞澤杜預曰在縣西南梁期鉅鹿郡秦置建武十三年省廣平國以其縣屬雒陽北千一百里十五城户十萬九千五百一十七口六十萬二千九十六廮陶有薄落亭鉅鹿故大鹿有大陸澤有廣阿澤吕氏春秋九藪趙之鉅鹿髙誘注云廣阿澤也山海經曰大陸之水史記紂盈鉅橋之粟許慎云鉅鹿之大橋也鉅鹿南有棘原章邯所軍處前書曰沙丘臺在縣東北七十里楊氏鄡下曲陽有鼓聚故翟鼓子國杜預曰縣西南有肥累城古肥國白狄别種有昔陽亭左傳昭十二年晉荀吳入昔陽杜預曰沾縣東有昔陽城肥古都也任南和廣平斥章廣宗曲周列人廣年平鄉南􅒋常山國髙帝置建武十三年省真定國以其縣屬十三城户九萬七千五百口六十三萬一千一百八十四元氏晉地道記有石塞三公塞髙邑故鄗光武更名刺史治漢官曰去雒陽一千里有千秋亭五成陌縣西七里光武即位於此矣都鄉侯國有鐵南行唐有石臼谷房子贊皇山在縣西南六十里濟水所出晉地道記有礫塞中谷塞平棘有塞欒城在縣西北四十里九門史記趙武靈王出九門如野臺以望齊中山之境碣石山戰國策云在縣界靈夀衞水出蒲吾史記番吾君杜預曰晉之蒲邑也古今注曰永平十年作常山呼沱河蒲吾渠通漕船也井陘真定上艾故屬太原中山國髙祖置雒陽北一千四百里十三城户九萬七千四百一十二口六十五萬八千一百九十五盧奴北平有鐵毋極新市有鮮虞亭故國子姓杜預曰白狄别種望都左傳晉伐鮮虞及中人杜預曰縣西北有中人城晉地道記有馬安關唐有中人亭博物記曰唐關在中人西北百里中人在縣西四十里列子曰趙襄子使新穉穆子攻翟取左人中人有左人鄉帝王世紀曰堯封唐堯山在北唐水西入河南有望都山即堯母慶都所居相去五十里都山一名豆山博物記曰左人唐西北四十里安國安憙本安險章帝更名漢昌本苦陘章帝更名蠡吾侯國故屬涿上曲陽故屬常山恒山在西北有泉水于吉得神書晉地道記自縣北行四百二十五里恒多山坂名飛狐口蒲隂本曲逆章帝更名有陽城晉地道記曰有陽安關陽城蒲陽山蒲水出也廣昌故屬代郡安平國故信都髙帝置明帝名樂成延光元年改雒陽北二千里十三城户九萬一千四百四十口六十五萬五千一百一十八信都有絳水呼沱河阜城故昌城南宫扶栁下博武邑觀津本清河下縣決錄注曰孝文竇皇后父隱身漁釣墜淵而卒景帝立后為太后遣使者更填父所墜淵而𦵏起太墳于縣城南民號曰竇氏青山經西有漳水津名薄落津史記曰趙武靈王曰晉國東有河薄落之水堂陽故屬鉅鹿武遂故屬河間饒陽故名饒屬涿有無蔞亭馮異進豆粥光武案志有解犢侯靈帝封安平故屬涿南深澤故屬涿河間郡文帝置世祖省屬信都和帝永元二年復故雒陽北二千五百里十一城户九萬三千七百五十四口六十三萬四千四百二十一樂成弓髙易故屬涿武垣故屬涿中水故屬涿鄚故屬涿髙陽故屬涿有葛城文安故屬勃海束州故屬勃海成平故屬勃海東平舒故屬勃海清河國髙帝置桓帝建和二年改為甘陵雒陽北千二百八十里七城户十二萬三千九百六十四口七十六萬四百一十八甘陵故厝安帝更名具丘東武城鄃靈和帝永元九年復地道記曰有鳴犢河繹幕廣川故屬信都有棘津城太公吕尚困於棘津城琅邪海曲非此城也案永初元年鄧太后分置廣川王國後王薨國除太后崩還益清河趙國秦邯鄲郡髙帝改名雒陽北千一百里五城户三萬二千七百一十九口一十八萬八千三百八十一邯鄲張華曰趙奢冢在邯鄲西山上謂之馬服山有叢臺有洪波臺易陽魏都賦曰溫泉毖涌而自浪注曰溫泉在易陽世以治疾洗百病襄國本邢國秦為信都項羽更名有檀臺史記曰趙成侯魏獻榮掾因以為檀臺有蘇人亭柏人中丘晉地道記曰有石門塞燒梁關勃海郡髙帝置雒陽北千六百里八城户十三萬二千三百八十九口百一十萬六千五百南皮髙城侯國重合侯國浮陽侯國東光有胡蘇亭胡蘇河之名見爾雅章武陽信延光元年復修故屬信都右冀州刺史部郡國九縣邑侯國百後漢書卷三十後漢書卷三十考證郡國志二楊翟有雍氏城注史記齊湣王十二年攻魏楚圍雍氏臣召南按齊攻魏一事也楚圍雍氏又一事也雍氏韓邑楚人圍之與攻魏並無干涉此劉昭采輯之失也昆陽有湛水注戰于湛陂左傳作湛阪陸徳明音義曰阪音反長社有蜀津注史記曰魏惠王元年趙韓合軍伐魏蜀澤魏世家作濁澤六國年表又作涿澤陽城有負黍聚注史記曰周敬王十九年鄭伐負黍臣召南按周本紀無此文年表是周威烈王十九年鄭敗韓于負黍時鄭繻公十六年韓景侯二年也輪氏建初四年置臣召南按前志潁川郡有輪氏疑縣不自建初置也但前志作綸此志作輪按本書陳寔傳亦作輪睢陽有魚門注左傳僖二十二年邾人懸公胄于魚門臣召南按睢陽宋國不應有邾城門事此亦錯簡當在魯國騶本邾國下薄故屬山陽所都臣召南按山陽下脫湯字薄與亳通前書臣瓚注薄湯所都是也沛國注秦泗川郡川何焯校本改水元城有沙亭注定七年盟于沙亭推尋文義衍一亭字後漢書卷三十考證
