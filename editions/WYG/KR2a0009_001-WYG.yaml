body:
  text: 後漢書卷一上宋宣城太守范煜撰唐章懷太子賢注光武帝紀第一上世祖光武皇帝諱秀字文叔禮祖有功而宗有德光武中葉興故廟稱世祖諡法能紹前業曰光克定禍亂曰武伏侯古今注曰秀之字曰茂伯仲叔季兄弟之次長兄伯升次仲故字文叔焉南陽蔡陽人南陽郡今鄧州縣也蔡陽縣故城在今随州棗陽縣西南髙祖九世之孫也出自景帝生長沙定王發長沙郡今潭州縣也劉攽曰按文言出自景帝生長沙定王發文意不足蓋此生字當作子字發生舂陵節侯買舂陵郷名本屬零陵冷道縣在今永州唐興縣北元帝時徙南陽仍號舂陵故城今在随州棗陽縣東事具宗室四王傳買生鬱林太守外鬰林郡今郴州縣前書曰郡守秦官秩二千石景帝更名太守外生鉅鹿都尉回鉅鹿郡今邢州縣也前書曰都尉本郡尉秦官也掌佐守典武職秩比二千石景帝更名都尉回生南頓令欽南頓縣屬汝南郡故城在今陳州項城縣西前書曰令長皆秦官也萬户以上為令秩千石至六百石不滿萬户為長秩五百石至三百石欽生光武光武年九嵗而孤養於叔父良身長七尺三寸美湏眉大口隆凖日角隆髙也許負云鼻頭為凖鄭𤣥尚書中候註云日角謂庭中骨起状如日性勤於稼穡種曰稼歛曰穡而兄伯升好俠養士常非笑光武事田業比之髙祖兄仲仲郃陽侯喜也能為産業見前書王莽天鳳中王莽建國六年改為天鳳劉攽曰註按莽號始建國年凡三字此少一始字乃之長安受尚書略通大義東觀記曰受尚書於中大夫廬江許子威資用乏與同舎生韓子合錢買驢令從者僦以給諸公費莽末天下連嵗災蝗寇盜鋒起言賊鋒鋭競起字或作蜂喻多也地皇三年天鳳六年改為地皇南陽荒饑韓詩外傳曰一榖不升曰歉二榖不升曰饑三榖不升曰饉四榖不升曰荒五榖不升曰大侵諸家賔客多為小盜光武避吏新野新野屬南陽郡今鄧州縣續漢書曰伯升賔客刼人上避吏於新野鄧晨家因賣榖於宛東觀記曰時南陽旱饑而上田獨収宛縣屬南陽郡故城今鄧州南陽縣也宛人李通等以圖䜟説光武云劉氏復起李氏為輔圖河圖也䜟符命之書䜟驗也言為王者受命之徵驗也易坤靈圖曰漢之臣李陽也光武初不敢當然獨念兄伯升素結輕客必舉大事且王莽敗亡已兆天下方亂遂與定謀於是乃市兵弩十月與李通從弟軼等起於宛時年二十八十一月有星孛于張前書音義曰孛星光芒短蓬然張南方宿也續漢志曰張為周地星孛于張東南行即翼軫之分翼軫楚地是楚地将有兵亂後一年正月光武起兵㫪陵攻南陽斬阜賜等殺其士衆數萬人光武都雒陽居周地除穢布新之象光武遂将賔客還舂陵時伯升已㑹衆起兵初諸家子弟恐懼皆亡逃自匿曰伯升殺我及見光武絳衣大冠董巴輿服志曰大冠者謂武官冠之東觀記曰上時絳衣大冠将軍服也劉攽曰註案當云大冠者謂武冠武官冠之少武冠二字皆驚曰謹厚者亦復為之乃稍自安伯升於是招新市平林兵新市縣屬江夏郡故城今在郢州富水縣東北平林地名在今随州随縣東北與其帥王鳳陳牧西擊長聚廣雅曰聚居也音慈諭反前書音義曰小於鄉曰聚光武初騎牛殺新野尉乃得馬前書曰尉秦官秩四百石至二百石也進屠唐子鄉例曰多所誅殺曰屠唐子鄉有唐子山在今唐州湖陽縣西南又殺湖陽尉湖陽屬南陽郡今唐州縣也東觀記曰劉終詐稱江夏吏誘殺之軍中分財物不均衆恚恨欲反攻諸劉光武歛宗人所得物悉以與之衆乃悦進㧞棘陽縣名屬南陽郡在棘水之陽古謝國也故城在今唐州湖陽縣西北棘音已力反與王莽前隊大夫甄阜王莽置六隊郡置大夫一人職如太守南陽為前隊河内為後隊潁川為左隊𢎞農為右隊河東為兆隊滎陽為祈隊隊音遂屬正梁丘賜王莽每隊置屬正一人職如都尉戰於小長安續漢書曰淯陽縣有小長安聚故城在今鄧州南陽縣南漢軍大敗還保棘陽更始元年正月甲子朔漢軍復與甄阜梁丘賜戰於沘水西大破之斬阜賜沘水在今唐州沘陽縣南廬江􅈞縣亦有沘水與此别也沘音比伯升又破王莽納言将軍嚴尤秩宗将軍陳茂於淯陽前書曰納言虞官也掌出納王命所謂喉舌之官也歴秦漢不置王莽改大司農為之桓譚新論云荘尤字伯石此言嚴避明帝諱也秩宗虞官也掌郊廟之事周謂之宗伯秦漢不置王莽改太常為秩宗後又典兵故納言秩宗皆有将軍號也淯陽縣屬南郡故城在今鄧州南陽縣南淯水之陽淯音育進圍宛城二月辛巳立劉聖公為天子以伯升為大司徒光武為太常偏将軍前書曰奉常秦官景帝更名太常應劭漢官儀曰欲令國家盛大社稷常存故稱太常老子曰偏将軍䖏左上将軍處右東觀記曰時無印得定武侯家丞印佩之入朝三月光武别與諸将徇昆陽定陵郾皆下之徇略也昆陽定陵郾皆縣名並屬潁川郡昆陽故城在今許州葉縣北郾今豫州郾城縣也定陵故城在今郾城西北郾音於建反多得牛馬財物榖數十萬斛轉以饋宛下莽聞阜賜死漢帝立大懼遣大司徒王尋大司空王邑王莽時哀章所獻金匱圖有王尋姓名王邑王商子於莽為從父兄弟也将兵百萬其甲士四十二萬人五月到潁川復與嚴尤陳茂合潁川郡今洛州陽翟縣也初光武為舂陵侯家訟逋租於尤尤見而奇之逋違也舂陵侯敞即光武季父也東觀記曰為季父故舂陵侯詣大司馬府訟地皇元年十二月壬寅前租二萬六千斛芻藁錢若千萬時宛人朱福亦為舅訟租於尤尤止車獨與上語不視福上歸戯福曰嚴公寜視卿耶及是時城中出降尤者言光武不取財物但㑹兵計䇿尤笑曰是美湏眉者耶何為乃如是初王莽徴天下能為兵法者六十三家數百人並以為軍吏選練武衛招募猛士説文曰募廣求之也旌旗輜重千里不絶周禮曰析羽為旌熊虎為旗輜車名釋名曰輜厠也謂軍糧什物雜厠載之以其累重故稱輜重重音直用反時有長人巨無覇王莽連率韓博上言有奇士長一丈大十圍自謂巨無覇出於蓬莱東南五城西北詔如海濵軺車不能載三馬不能勝卧則枕鼔以鐵箸食見前書長一丈大十圍以為壘尉鄭𤣥注周禮云軍壁曰壘崔瑗中壘校尉箴曰堂堂皇帝設為壘壁尉者主壘壁之事又驅諸猛獸猛或作獷獷猛貌也音古猛反虎豹犀象之屬以助威武自秦漢出師之盛未嘗有也光武将數千兵徼之於陽闗聚名也酈元水經注曰潁水東南經陽闗聚聚夾潁水相對在今洛州陽翟縣西北諸将見尋邑兵盛反走馳入昆陽皆惶怖憂念妻孥孥子也欲散歸諸城光武議曰今兵榖既少而外寇彊大并力禦之功庻可立如欲分散勢無俱全且宛城未㧞謂伯升圍之未㧞也不能相救昆陽即破一日之間諸部亦滅矣今不同心膽共舉功名反欲守妻子財物邪諸将怒曰劉将軍何敢如是光武笑而起㑹候騎還言大兵且至城北軍陳數百里不見其後諸将遽相謂曰更請劉将軍計之光武復為圖畫成敗諸将憂迫皆曰諾時城中唯有八九千人光武乃使成國上公王鳳廷尉大将軍王常留守夜自與驃騎大将軍宗驃騎大将軍武帝置自霍去病始佻音太堯反五威将軍李軼等十三騎王莽置五威将軍其衣服依五方之色以威天下李軼初起猶假以為號出城南門於外収兵時莽軍到城下者且十萬光武㡬不得出㡬音祈既至郾定陵悉發諸營兵而諸将貪惜財貨欲分留守之光武曰今若破敵珍珤萬倍珤古寳字大功可成如為所敗首領無餘何財物之有衆乃從嚴尤説王邑曰昆陽城小而堅今假號者在宛亟進大兵亟急也音紀力反彼必奔走宛敗昆陽自服邑曰吾昔以虎牙将軍圍翟義坐不生得以見責譲翟義字文仲方進少子為東郡太守王莽居攝義心惡之乃立東平王雲子信為天子義自號柱天大将軍以誅莽莽乃使孫建王邑等将兵擊義破之義亡自殺故坐不生得坐音才卧反見前書今将百萬之衆遇城而不能下何謂邪遇或為過遂圍之數十重列營百數雲車十餘丈雲車即樓車稱雲言其髙也升之以望敵猶墨子云公輸般為雲梯之械瞰臨城中俯視曰瞰音苦暫反旗幟蔽野廣雅曰幟幡也音熾埃塵連天鉦鼓之聲聞數百里説文曰鉦鐃也似鈴或為地道衝輣橦城衝橦車也詩曰臨衝閑閑許慎曰輣樓車也輣音歩耕反積弩亂發矢下如雨城中負户而汲王鳳等乞降不許尋邑自以為功在漏刻意氣甚逸夜有流星墜營中晝有雲如壞山當營而隕不及地尺而散吏士皆厭伏續漢志曰雲如壞山謂營頭之星也占曰營頭之所墜其下覆軍殺将血流千里厭音一葉反六月已邜光武遂與營部俱進自将歩騎千餘前去大軍四五里而陳尋邑亦遣兵數千合戰光武奔之斬首數十級秦法斬首一賜爵一級故因謂斬首為級諸部喜曰劉将軍平生見小敵怯今見大敵勇甚可怪也且復居前請助将軍光武復進尋邑兵却諸部共乗之斬首數百千級連勝遂前時伯升㧞宛已三日而光武尚未知乃偽使持書報城中云宛下兵到而陽墯其書尋邑得之不憙憙音許記反諸将既經累㨗膽氣益壮無不一當百光武乃與敢死者三千人從城西水上衝其中堅敢死謂果敢而死者凡軍事中軍将最尊居中以堅鋭自輔故曰中堅也尋邑陳亂乗鋭崩之遂殺王尋城中亦鼓譟而出中外合埶震呼動天地莽兵大潰走者相騰踐奔殪百餘里間殪仆也音於計反或作噎㑹大雷風屋瓦皆飛雨下如注滍川盛溢水經曰滍水出南陽魯陽縣西堯山東南經昆陽城北東入汝滍音直理反虎豹皆股戰士卒争赴溺死者以萬數水為不流數過於萬故以萬為數王邑嚴尤陳茂輕騎乗死人度水逃去盡獲其軍實輜重車甲珍寳不可勝筭舉之連月不盡或燔燒其餘光武因復徇下潁陽縣名屬潁川郡故城在今許州㑹伯升為更始所害光武自父城馳詣宛謝父城縣古應國也屬潁川郡故城在今許州葉縣東北以伯升見害心不自安故謝司徒官屬迎弔光武光武難交私語深引過而已未嘗自伐昆陽之功又不敢為伯升服喪飲食言笑如平常更始以是慙拜光武為破虜大将軍封武信侯九月庚戌三輔豪傑共誅王莽傳首詣宛三輔謂京兆左馮翊右扶風共在長安中分領諸縣淮南子曰智過百人謂之豪白虎通云賢過萬人曰傑時城中少年朱弟張魚等攻莽於漸䑓啇人杜吴殺莽校尉公賔就斬莽首将軍申屠建等傳莽首詣宛更始将北都洛陽以光武行司隸校尉使前整修宮府前書曰司𨽻校尉本周官武帝初置持節従中都官徒千二百人督大姦猾後罷其兵察三輔三河𢎞農秩比二千石音義云以掌徒隸而廵察故曰司隸於是置僚屬作文移東觀記曰文書移與屬縣也従事司察一如舊章續漢書曰司隸置從事史十二人秩皆百石主督促文書察舉非法時三輔吏士東迎更始見諸将過皆冠幘漢官儀曰幘者古之卑賤不冠者之所服也方言曰覆髻謂之幘或謂之承露而服婦人衣諸于繡镼前書音義曰諸于大掖衣也如婦人之袿衣字書無镼字續漢書作䘿並音其物反楊雄方言曰襜褕其短者自關而西謂之䘪䘿郭璞注云俗名䘿掖據此即是諸于上加繡䘿如今之半臂也或繡下有擁字劉攽曰繡镼及註案言字書無镼即無音矣何得言並明衍此字莫不笑之或有畏而走者續漢志曰時知者見之以為服之不中身之災也乃奔入邉郡避之是服妖也其後更始遂為赤眉所殺及見司隸僚屬皆歡喜不自勝老吏或垂涕曰不圖今日復見漢官威儀由是識者皆屬心焉及更始至洛陽乃遣光武以破虜将軍行大司馬事十月持節北度河漢官儀曰太尉秦官也武帝更名大司馬節所以為信也以竹為之柄長八尺以旄牛尾為其眊三重馮衍與田邑書曰今以一節之任建三軍之威豈特寵其八尺之竹犛牛之尾哉續漢志曰更始時南方有童謡云諧不諧在赤眉得不得在河北後更始為赤眉所殺是不諧也光武由河北而興是得之也鎮慰州郡所到部縣輙見二千石長吏三老官屬下至佐史二千石謂郡守也長吏謂縣令長及丞尉也三老者鄉官也髙祖置前書曰舉人年五十已上有修行能率衆者置以為三老每鄉一人擇郷三老為縣三老與令長丞尉以事相教復其徭戍續漢志曰每刺史皆有從事史假佐每縣各置諸事曹史也劉攽曰注各置諸事曹史案文多一事字考察黜陟如州牧行部事漢初遣丞相史分刺州武帝改置刺史察州秩六百石成帝更名牧秩二千石漢官典儀曰刺史行郡國省察政教黜陟能不斷理寃獄也輙平遣囚徒除王莽苛政説文曰苛小草也言政令繁細禮記曰苛政猛於虎復漢官名吏人喜悦争持牛酒迎勞進至邯鄲縣名屬趙國今洺州縣也前書音義邯山名鄲盡也邯山至此而盡城郭字皆從邑因以名焉故趙繆王子林繆王景帝七代孫名元前書曰元坐殺人為大鴻臚所奏諡曰繆音謬東觀記曰林作臨字説光武曰赤眉今在河東但決水灌之百萬之衆可使為魚赤眉賊帥樊崇等恐其衆與王莽兵亂皆朱其眉以相别故曰赤眉續漢書曰是時上平河北過邯鄲林進見言赤眉可破上問其故對曰河水従列人北流如決河水灌之皆可令為魚上不然之列人縣故城在今洛州肥鄉縣東北光武不答去之真定縣名屬真定國今恒州縣也林於是乃詐以卜者王郎為成帝子子輿前書曰立國将軍孫建奏云不知何一男子遮臣車前自稱漢氏劉子輿成帝下妻子也劉氏當復故郎因而稱之十二月立郎為天子都邯鄲遂遣使者降下郡國二年正月光武以王郎新盛乃北徇薊縣名屬涿郡今幽州縣也本字従契従邑見説文王郎移檄購光武十萬户説文曰檄以木簡為書長尺二寸謂之檄以徴召也又曰以財有所求曰購魏武奏事曰若有急即挿以雞羽謂之羽檄而故廣陽王子劉接廣陽王名嘉武帝五代孫起兵薊中以應郎城内擾亂轉相驚恐言邯鄲使者方到二千石以下皆出迎於是光武趣駕南轅趣急也讀曰促晨夜不敢入城邑舎食道傍至饒陽縣名屬安平國在饒河之陽故城在今瀛州饒陽縣東北官屬皆乏食光武乃自稱邯鄲使者入傳舎客舘也傳音知戀反下同傳吏方進食従者饑争奪之傳吏疑其偽乃椎鼓數十通椎音直追反紿言邯鄲将軍至紿言欺誑也音殆官屬皆失色光武升車欲馳既而懼不免徐還坐曰請邯鄲将軍入乆乃駕去傳中人遥語門者閉之門長曰天下詎可知而閉長者乎遂得南出晨夜兼行䝉犯霜雪䝉冐也天時寒面皆破裂至呼沱河山海經云大戯之山滹沱之水出焉在今代州繁畤縣東流經定州深澤縣東南即光武所度䖏今俗猶謂之危度口臣賢案呼沱河舊在饒陽南至魏太祖曹操因饒河故瀆决令北注新溝水所以今在饒陽縣北無船適遇氷合得過續漢書曰時水滑馬僵乃各以嚢盛沙布氷上度焉未畢數車而䧟進至下博城西下博縣屬信都國在博水之下故曰下博故城在今冀州下博縣南皇惑不知所之有白衣老父在道旁老父蓋神人也今下博縣西猶有祠堂指曰努力信都郡為長安守去此八十里信都郡今冀州也光武即馳赴之信都太守任光開門出迎世祖因發旁縣得四千人先擊堂陽貰縣皆降之堂陽及貰並屬鉅鹿郡堂陽在堂水之陽今冀州縣故城在今冀州鹿城縣西南貰音時夜反王莽和戎卒正邳彤亦舉郡降東觀記曰王莽分鉅鹿為和戎郡卒正職如太守又昌城人劉植宋子人耿純昌城縣屬信都國故城在今冀州西北宋子縣屬鉅鹿郡故城在今趙州平棘縣北各率宗親子弟據其縣邑以奉光武於是北降下曲陽縣名屬鉅鹿郡常山郡有上曲陽故此言下衆稍合樂附者至有數萬人復北擊中山中山國一名中人亭故城在今定州唐縣東北張曜中山記曰城中有山故曰中山㧞盧奴縣名屬中山國故城在今定州安喜縣水經注曰縣有黑水故池水黒曰盧不流曰奴因以為名所過發奔命兵前書音義曰舊時郡國皆有材官騎士若有急難權取驍勇者聞命奔赴故謂之奔命移檄邉郡共擊邯鄲郡縣還復響應南擊新市真定元氏防子皆下之新市縣屬鉅鹿郡故城在今恒州東北元氏房子屬常山郡並今趙州縣也防與房古字通用因入趙界時王郎大将李育屯栢人縣名屬趙國今邢州縣故城在縣之西北漢兵不知而進前部偏将朱浮鄧禹為育所破亡失輜重光武在後聞之収浮禹散卒與育戰於郭門大破之盡得其所獲育還保城攻之不下於是引兵㧞廣阿縣名屬鉅鹿郡故城在今趙州象城縣西北㑹上谷太守耿况漁陽太守彭寵上谷郡故城在今媯州懐戎縣漁陽郡在漁水之陽今幽州縣各遣其将吴漢寇恂等将突騎来助擊王郎突騎言能衝突軍陣更始亦遣尚書僕射謝躬討郎漢官儀曰尚書四員武帝置成帝加一為五有侍曹尚書主丞相御史事二千石尚書主刺史二千石事户曹尚書主人庻上書事主客尚曹主外國四夷事成帝加三公尚書主斷獄事僕射秦官也僕主也古者重武事每官必有主射以督課之謝躬為尚書僕射劉攽曰注有侍曹尚書案前書皆太常侍曹少一常字光武因大饗士卒遂東圍鉅鹿王郎守将王饒堅守月餘不下郎遣将倪宏劉奉倪五兮反率數萬人救鉅鹿光武逆戰於南􅒋縣名屬鉅鹿郡故城在今邢州栢人縣東北左傳齊國夏伐晋取欒即其地也其後南徙故加南今俗謂之倫城聲之轉也􅒋音力全反斬首數千級四月進圍邯鄲連戰破之五月甲辰㧞其城誅王郎収文書得吏人與郎交闗謗毁者數千章光武不省㑹諸将軍燒之曰令反側子自安反側不安也詩國風曰展轉反側更始遣侍御史持節立光武為蕭王蕭縣屬沛郡今徐州縣也續漢志曰更始使侍御史黄黨封上為蕭王悉令罷兵詣行在所蔡邕獨斷曰天子以四海為家故謂所居為行在所光武辭以河北未平不就徵自是始貳於更始貳離異也是時長安政亂四方背叛梁王劉永擅命雎陽縣名屬梁郡今宋州也擅專也公孫述稱王巴蜀蜀有巴郡故總言之李憲自立為淮南王淮南郡今夀州也秦豐自號楚黎王習鑿齒㐮陽記曰秦豐黎丘鄉人黎丘楚地故稱楚黎王黎丘故城在今襄州率道縣北張歩起琅邪郡有琅邪山故城今海州朐山縣東北劉攽曰案此文不足以上下注觀之郡下少一名字城下少一在字董憲起東海郡名今海州縣延岑起漢中郡名故城在今梁州南鄭縣東北田戎起夷陵縣名屬南郡有夷山故曰夷陵今硤州縣也故城在今縣西北並置将帥侵略郡縣又别號諸賊銅馬大肜髙湖重連鐵脛大搶尤来上江青犢五校檀鄉五幡五樓富平獲索等諸賊或以山川土地為名或以軍容彊盛為號銅馬賊帥東山荒禿上淮況等大肜渠帥樊重尤来渠帥樊崇五校賊帥髙扈檀鄉賊帥董次仲五樓賊帥張文富平賊帥徐少獲索賊帥古師郎等並見東觀記各領部曲續漢志曰大将軍營有五部部三校尉部下有曲曲有軍候一人衆合數百萬人所在寇掠光武将擊之先遣吴漢北發十郡兵幽州牧苖曾不従漢遂斬曾而發其衆秋光武擊銅馬於鄡縣名屬鉅鹿郡故城在今冀州鹿城縣東鄡音苦堯反前書紀年曰衛鞅封于鄡臣賢案下文云吴漢将突騎来㑹清陽又追至館陶並與鄡相近俗本誤作鄔而蕭該音一古反云屬太原郡臧矜音作鄢一建反云屬襄陽郡並誤吴漢将突騎来㑹清陽縣名屬清河郡今貝州縣故城在州西北賊數挑戰挺身獨戰也古謂之致師見左傳挑音徒了反光武堅營自守有出鹵掠者輙擊取之鹵與虜同郭璞注爾雅曰掠奪取也絶其糧道積月餘日賊食盡夜遁去追至館陶大破之館陶縣屬魏郡今魏州縣受降未盡而髙湖重連従東南来與銅馬餘衆合光武復與大戰於蒲陽悉破降之封其渠帥為列侯前書音義曰蒲陽山蒲水所出在今定州北平縣西北本或作滿陽渠大也尚書殱厥渠魁列侯即徹侯稱列者言見序列也降者猶不自安光武知其意勅令各歸營勒兵乃自乘輕騎案行部陳降者更相語曰蕭王推赤心置人腹中安得不投死乎投死猶言致死由是皆服悉将降人分配諸将衆遂數十萬故闗西號光武為銅馬帝赤眉别帥與大肜青犢十餘萬衆在射犬續漢志曰野王縣有射犬聚故城在今懐州武徳縣北也光武進擊大破之衆皆散走使吴漢岑彭襲殺謝躬於鄴青犢赤眉賊入函谷闗攻更始函谷谷名因谷以名闗舊在𢎞農湖城縣西前書楊僕為樓船将軍有功恥居闗外武帝乃為徙於新安故闗在今洛州新安縣之東光武乃遣鄧禹率六裨将引兵而西以乘更始赤眉之亂時更始使大司馬朱鮪舞隂王李軼等屯洛陽舞隂縣屬南陽郡故城在今唐州沘陽縣西北光武亦令馮異守孟津以拒之孔安國注尚書云孟地名在洛北都道所凑古今以為津論衡曰武王伐紂八百諸侯同於此盟故曰盟津俗名治戍津今河陽縣津也建武元年春正月平陵人方望平陵昭帝陵也因以為縣故城在今咸陽縣西北立前孺子劉嬰為天子平帝崩王莽立楚孝王孫廣戚侯顯子嬰為孺子莽簒位廢為定安公更始遣丞相李松擊斬之光武北擊尤来大搶五幡於元氏追至右北平連破之北平縣屬中山國今易州永樂縣也臣賢案東觀記續漢書並無右字此加右誤也營州西南别有右北平郡故城非此也又戰於順水北酈元水經注云徐水經北平縣故城北光武追銅馬五幡破之於順水即徐水之别名也在今易州本或作慎者誤也乘勝輕進反為所敗賊追急短兵接短兵謂刀劒也楚辭曰車錯轂兮短兵接光武自投髙岸遇突騎王豐下馬授光武光武撫其肩而上顧笑謂耿弇曰㡬為虜嗤弇頻射却賊得免士卒死者數千人散兵歸保范陽縣名在范水之陽屬涿郡故城在今易州易縣東南軍中不見光武或云已沒東觀記曰上已乗王豐小馬先到矣而營門不覺諸将不知所為吴漢曰卿曹努力曹軰也王兄子在南陽何憂無主兄子謂伯升子章及興也衆恐懼數日乃定賊雖戰勝而素懾大威懾懼也音之渉反客主不相知夜遂引去大軍復進至安次縣名屬渤海郡今幽州縣也故城在縣東與戰破之斬首三千餘級賊入漁陽乃遣吴漢率耿弇陳俊馬武等十二将軍追戰于潞東潞縣名屬漁陽郡今幽州縣也有潞水因以為名蕭該音義云潞屬上黨臣賢按潞與漁陽相接言上黨潞者非也及平谷大破滅之平谷縣屬漁陽郡故城在今潞縣北朱鮪遣討難将軍蘇茂攻温今洛州縣馮異寇恂與戰大破之斬其将賈疆於是諸将議上尊號馬武先進曰天下無主如有聖人承敝而起雖仲尼為相孫子為将猶恐無能有益反水不収後悔無及言早當即尊位以定衆心今執謙退失於事機也孫子名武吴王闔閭将善用兵有兵法十三篇反音翻大王雖執謙退奈宗廟社稷何宜且還薊即尊位乃議征伐今此誰賊而馳騖擊之乎誰謂未有主也前書音義曰直騁曰馳亂馳曰騖光武驚曰何将軍出是言可斬也武曰諸将盡然光武使出曉之使曉諭諸将乃引軍還至薊夏四月公孫述自稱天子光武従薊還過范陽命収𦵏吏士至中山諸将復上奏曰漢遭王莽宗廟廢絶豪傑憤怒兆人塗炭尚書曰人墜塗炭孔安國注云若䧟泥墜火無救之者王與伯升首舉義兵更始因其資以據帝位而不能奉承大統敗亂綱紀盜賊日多羣生危蹙蹙迫也音子六反大王初征昆陽王莽自潰後㧞邯鄲北州弭定三分天下而有其二跨州據土帶甲百萬言武力則莫之敢抗論文徳則無所與辭臣聞帝王不可以乆曠天命不可以謙拒惟大王以社稷為計萬姓為心光武又不聽行到南平棘縣名屬常山郡今趙州縣故城在縣南諸将復固請之光武曰寇賊未平四面受敵何遽欲正號位乎諸将且出耿純進曰天下士大夫捐親戚棄土壤従大王於矢石之間者其計固望其攀龍鱗附鳳翼以成其所志耳楊雄法言曰攀龍鱗附鳳翼巽以揚之今功業即定天人亦應而大王留時逆衆不正號位純恐士大夫望絶計窮則有去歸之思無為乆自苦也大衆一散難可復合時不可留衆不可逆純言甚誠切光武深感曰吾将思之行至鄗縣名今趙州髙邑縣也鄗音火各反光武先在長安時同舎生彊華續漢書曰彊華潁川人也彊音其兩反自闗中奉赤伏符曰劉秀發兵捕不道四夷雲集龍鬬野四七之際火為主四七二十八也自髙祖至光武初起合二百二十八年即四七之際也漢火德故火為主也羣臣因復奏曰受命之符人應為大謂彊華奉赤伏符也萬里合信不議同情周之白魚曷足比焉尚書中候曰武王伐紂度孟津中流白魚躍入王舟長三尺赤文有字告以伐紂之意也今上無天子海内淆亂符瑞之應昭然著聞宜答天神以塞羣望光武於是命有司設壇場於鄗南千秋亭五成陌壇謂築土場謂除地秦法十里一亭南北為阡東西為陌其地在今趙州栢郷縣水經注曰亭有石壇壇有圭頭碑其隂云常山相隴西狄道馮龍所造壇廟之東枕道有兩石翁仲南北相對焉劉攽曰注壇廟之東案自上初無説廟之文明多一廟字六月己未即皇帝位燔燎告天天髙不可逹故燔柴以祭之庻髙烟上通也爾雅云祭天曰燔柴燔音煩燎音力弔反禋于六宗精意以享謂之禋續漢志平帝元始中謂六宗為易卦六子之氣水火雷風山澤也光武中興遵而不改至安帝即位初改六宗為天地四方之宗祠於洛陽之北戌亥之地望於羣神山林川谷能興致雲雨者皆曰神不可徧至故望而祭之尚書曰望于山川徧于羣神其祝文曰皇天上帝后土神祇眷顧降命屬秀黎元為人父母屬音燭秀不敢當羣下百辟不謀同辭詩大雅曰百辟卿士鄭𤣥註云百辟畿内諸侯也咸曰王莽簒位秀發憤興兵破王尋王邑於昆陽誅王郎銅馬於河北平定天下海内蒙恩上當天地之心下為元元所歸元元謂黎庻也元元猶言喁喁可矜憐之辭也䜟記曰劉秀發兵捕不道夘金修徳為天子夘金劉字也春秋演孔圖曰夘金刀名為赤帝後次代周劉攽曰注檢班固傳注為下合有一劉字秀猶固辭至于再至于三羣下僉曰皇天大命不可稽留敢不敬承於是建元為建武大赦天下改鄗為髙邑是月赤眉立劉盆子為天子甲子前将軍鄧禹擊更始定國公王匡於安邑大破之安邑縣屬河東郡今蒲州縣也斬其将劉均秋七月辛未拜前将軍鄧禹為大司徒丁丑以野王令王梁為大司空野王縣屬河内郡故城在今懐州時據赤伏符文故従縣宰而超拜之事具梁傳壬午以大将軍吴漢為大司馬偏将軍景丹為驃騎大将軍大将軍耿弇為建威大将軍偏将軍蓋延為虎牙大将軍偏将軍朱祐為建義大将軍中堅将軍杜茂為大将軍時宗室劉茂自號厭新将軍王莽號新室言欲厭勝之率衆降封為中山王己亥幸懐縣名屬河内郡故城在今懐州武陟縣西天子所行必有恩幸故稱幸遣耿弇率彊弩将軍陳俊軍五社津水經注曰鞏縣北有五社津一名土社津有山臨河其下有穴潛通淮浦有渚謂之鮪渚呂覽云武王伐紂至鮪水即此地備滎陽以東使吴漢率朱祐及廷尉岑彭前書廷尉秦官也聴獄必質於朝廷與衆共之尉平也故稱廷尉執金吾賈復前書曰中尉秦官武帝改為執金吾吾禦也掌執兵革以禦非常揚化将軍堅鐔等十一将軍鐔音徒南反圍朱鮪於洛陽八月壬子祭社稷癸丑祠髙祖太宗世宗於懐宮進幸河陽更始廪丘王田立降廩丘縣屬東郡城在今濮州雷澤縣北也九月赤眉入長安更始奔髙陵辛未詔曰漢制度曰帝之下書有四一曰䇿書二月制書三曰詔書四月誡敕䇿書者編簡也其制長二尺短者半之篆書起年月日稱皇帝以命諸侯王三公以罪免亦賜䇿而以𨽻書用尺一寸兩行唯此為異也制書者帝者制度之命其文曰制詔三公皆璽封尚書令印重封露布州郡也詔書者詔告也其文曰告某官云如故事誡敕者謂敕刺史太守其文曰有詔敕某官它皆倣此劉攽曰注告某官云案文當更有云字更始破敗棄城逃走妻子裸袒流冗道路冗音人勇反冗散也朕甚愍之今封更始為淮陽王淮陽郡故城在今陳州宛丘縣西南吏人敢有賊害者罪同大逆甲申以前髙密令卓茂為太傅髙密縣屬髙密國今密州縣故城在今縣之西南卓以平帝時為密令故曰前辛夘朱鮪舉城降冬十月癸丑車駕入洛陽幸南宮却非殿遂定都焉蔡質漢典職儀曰南宮至北宮中央作大屋複道三道行天子従中道従官夾左右十歩一衛兩宮相去七里又洛陽宮閤名有却非殿臣賢案俗本或作御北殿者誤遣岑彭擊荆州羣賊十一月甲午幸懐劉永自稱天子十二月丙戌至自懐赤眉殺更始而隗囂據隴右劉攽曰案史記事事有相連則用而字今赤眉自殺更始隗囂自據隴右明此而字衍文盧芳起安定郡名今涇州縣破虜大将軍叔夀擊五校賊於曲梁戰歿曲梁屬廣平國今洺州縣也二年春正月甲子朔日有食之續漢志曰在危八度虚危齊地賊張歩擁兵據齊至五年乃破大司馬吴漢率九将軍擊檀鄉賊於鄴東大破降之庚辰封功臣皆為列侯大國四縣餘各有差下詔曰人情得足苦於放縦快湏臾之欲忘慎罰之義尚書曰罔不明徳慎罰亦克用勸孔安國注云慎刑罰亦能用勸善也惟諸将業逺功大誠欲傳於無窮宜如臨深淵如履薄冰戰戰慄慄日慎一日太公金匱曰黄帝居人上惴惴若臨深淵舜居人上矜矜如履薄冰禹居人上慄慄如不滿日敬勝怠則吉義勝欲則昌日慎一日壽終無殃其顯效未酬名籍未立者大鴻臚趣上續漢志曰大鴻臚卿一人中二千石掌諸王入朝及拜諸侯封者趣音促朕将差而錄之博士丁恭議曰古帝王封諸侯不過百里史記太史公曰武王成康所封數百而同姓五十地不過百里故利以建侯取法於雷易屯卦震下坎上震為雷初九曰利建侯又曰震驚百里故封諸侯地方百里以法雷也强幹弱枝所以為治也今封諸侯四縣不合法制帝曰古之亡國皆以無道未嘗聞功臣地多而滅亡者乃遣謁者即授印綬前書曰謁者秦官掌賔讃受事員七十人秩比六百石中興但三十人蔡質典職儀曰皆選儀容端正任奉使者前書曰諸侯王金璽盭綬列侯金印紫綬盭音戻草名也似艾可染緑因以名綬也劉攽曰註蔡質典職儀案前後注皆云漢典職儀明脱一漢字䇿曰在上不驕髙而不危制節謹度滿而不溢敬之戒之傳爾子孫長為漢藩藩屏也言建諸侯所以為國之藩蔽也詩大雅曰四國于藩壬午更始復漢将軍鄧曅輔漢将軍于匡降皆復爵位壬子起髙廟建社稷於洛陽立郊兆于城南始正火徳色尚赤漢禮制度曰人君之居前有朝後有寝終則制廟以象朝後制寝以象寝光武都洛陽乃合髙祖以下至平帝為一廟藏十一帝主於其中元帝次當第八光武第九故立元帝為祖廟後遵而不改續漢志曰立社稷於洛陽在宗廟之右皆方壇四面及中各依方色無屋有墻門而已白虎通曰天子之壇方五丈諸侯之壇半天子之壇社者土也人非土不立非榖不食故封土立社示有土也稷者五榖之長得隂陽中和之氣故祭之也續漢書曰制郊兆於洛陽城南七里為壇八陛中又為重壇天地位皆在壇上其外壇上為五帝位青帝位在甲寅赤帝位在丙巳黄帝位在丁未白帝位在庚申黒帝位在壬亥其外為壝重營皆紫以象紫宮營有通道以為門日月在營内南道日在東月在西北斗在北道之西外營中營凡千五百一十四神髙皇帝配食焉北郊在洛陽城北四里方壇四陛地祗位南面西上髙皇后配西面皆在壇上地理羣后従食皆在壇下中嶽在未四嶽各依其方淮海俱在東河在西濟在北江在南餘山川各如其方漢初土徳色尚黄至此始明火德徽幟尚赤服色於是乃正劉攽曰注立元帝為祖廟案以世數言之元帝乃是光武考非祖也作祖字誤是月赤眉焚西亰宮室發掘園陵園謂塋域陵謂山墳寇掠闗中大司徒鄧禹入長安遣府掾奉十一帝神主納於髙廟漢官儀曰司徒府掾屬三十一人秩千石十一帝謂髙祖至平帝神主以木為之方尺二寸穿中央逹四方天子主長尺二寸諸侯主長一尺虞主用桑綀主用栗衛宏舊漢儀曰已葬収主為木函藏廟太室中西壁坎中去地六尺一寸祭則立主於坎下真定王楊臨邑侯讓謀反楊景帝七代孫讓即楊弟遣前将軍耿純誅之二月己酉幸修武縣名屬河内郡本殷之寗邑韓詩外傳曰武王伐紂勒兵於寗改曰修武今懐州縣也大司空王梁免壬子以太中大夫宋𢎞為大司空遣驃騎大将軍景丹率征虜将軍祭遵等二将軍擊𢎞農賊破之因遣祭遵圍蠻中賊張滿蠻中聚名故戎蠻子國在今汝州西南俗謂之麻城漁陽太守彭寵反攻幽州牧朱浮於薊延岑自稱武安王於漢中辛夘至自修武三月乙未大赦天下詔曰頃獄多寃人用刑深刻朕甚愍之孔子云刑罰不中則民無所措手足論語之文其與中二千石諸大夫博士議郎議省刑法遣執金吾賈復率二将軍擊更始郾王尹遵破降之遵或作尊驍騎将軍劉植擊密賊戰歿密縣屬河南郡今洛州縣遣虎牙大将軍蓋延率四将軍伐劉永夏四月圍永於雎陽更始将蘇茂殺淮陽太守潘蹇而附劉永甲午封叔父良為廣陽王兄子章為太原王章弟興為魯王舂陵侯嫡子祉為城陽王城陽國故城在今沂州臨沂縣南五月庚辰封更始元氏王歙為泗水王泗水國今兖州縣也故真定王楊子徳為真定王周後姬常為周承休公武帝封周後姬嘉為周子南君成帝封姬延為周承休公常即延之後承休所封故城在今汝州東北癸未詔曰民有嫁妻賣子欲歸父母者恣聽之敢拘執論如律六月戊戌立貴人郭氏為皇后子彊為皇太子大赦天下増郎謁者従官秩各一等前書曰郎官掌守門户出充車騎有議郎中郎侍郎郎中秩六百石已下丙午封宗子劉終為淄川王淄川國今淄川縣秋八月帝自将征五校丙辰幸内黄縣名屬魏郡今相州縣大破五校於羛陽降之羛陽聚名屬魏郡故城在今相州堯城縣東諸本有作茀者誤也左傳云晉荀盈如齊逆女還卒於戯陽杜預注云内黄縣北有戯陽城戯與羛同音許宜反遣游擊将軍鄧隆救朱浮與彭寵戰於潞隆軍敗績蓋延㧞雎陽劉永奔譙今亳州縣破虜将軍鄧奉據淯陽反九月壬戌至自内黄驃騎大将軍景丹薨延岑大破赤眉於杜陵縣名屬京兆周之杜伯國在今萬年縣東南闗中饑民相食冬十一月以廷尉岑彭為征南大将軍率八将軍討鄧奉於堵鄉水經注曰堵水南經小堵鄉在今唐州方城縣堵音者銅馬青犢尤来餘賊共立孫登為天子於上郡春秋保乾圖曰賊臣起名孫登巧用法多技方蓋立以應之上郡故城在今涇州上縣東南登将樂𤣥殺登以其衆五萬餘人降遣偏将軍馮異代鄧禹伐赤眉使太中大夫伏隆持節安輯青徐二州招張歩降之十二月戊午詔曰惟宗室列侯為王莽所廢先靈無所依歸朕甚愍之其並復故國若侯身已歿屬所上其子孫見名尚書封拜屬所謂侯子孫所屬之郡縣也錄其見名上於尚書封拜之是嵗盖延等大破劉永於沛西沛今徐州縣也初王莽末天下旱蝗黄金一斤易粟一斛至是野榖旅生旅寄也不因播種而生故曰旅今字書作穭音呂古字通麻尗尤盛野蠶成繭被於山阜人収其利焉三年春正月甲子以偏将軍馮異為征西大将軍杜茂為驃騎大将軍大司徒鄧禹及馮異與赤眉戰於回溪溪名也俗名回坑在今洛州永寜縣東禹異敗績征虜将軍祭遵破蠻中斬張滿辛巳立皇考南頓君已上四廟壬午大赦天下閏月乙巳大司徒鄧禹免馮異與赤眉戰於崤底大破之淆山名底阪也一名嶔岑山在今洛州永寜縣西北餘衆南向宜陽縣名屬𢎞農郡韓國都也故城在今洛州福昌縣東韓城是也帝自将征之己亥幸宜陽甲辰親勒六軍大陳戎馬大司馬吴漢精卒當前中軍次之驍騎武衛分陳左右赤眉望見震怖遣使乞降丙午赤眉君臣面縛面偝也謂反偝而縛之奉髙皇帝璽綬蔡邕獨㫁曰皇帝六璽皆玉螭虎紐文曰皇帝行璽皇帝之璽皇帝信璽天子行璽天子之璽天子信璽皆以武都紫泥封之玉璽譜曰傳國璽是秦始皇初定天下所刻其玉出藍田山丞相李斯所書其文曰受命于天既夀永昌髙祖至覇上秦王子嬰獻之至王莽簒位就元后求璽不與以威逼之乃出璽投地璽上螭一角缺及莽敗李松持璽詣宛上更始更始敗璽入赤眉劉盆子既敗以奉光武詔以屬城門校尉前書曰城門校尉掌亰師城門屯兵秩比二千石也戊申至自宜陽己酉詔曰羣盗縦横賊害元元盆子竊尊號亂惑天下朕奮兵討擊應時崩解十餘萬衆束手降服先帝璽綬歸之王府斯皆祖宗之靈士人之力朕曷足以享斯哉享當也其擇吉日祠髙廟賜天下長子當為父後者爵人一級二月己未祠髙廟受傳國璽劉永立董憲為海西王海西縣屬琅邪郡張歩為齊王歩殺光祿大夫伏隆而反幸懐遣吴漢率二将軍擊青犢於軹西大破降之軹縣屬河内郡故城在今洛州濟源縣東南三月壬寅以大司徒司直伏湛為大司徒續漢志曰光武接位依武帝故事置司徒司直建武十一年省彭寵䧟薊城寵自立為燕王帝自将征鄧奉幸堵陽夏四月大破鄧奉於小長安斬之馮異與延岑戰於上林破之闗中上林苑也吴漢率七将軍與劉永将蘇茂戰於廣樂大破之廣樂地闕今宋州虞城縣有長樂故城盖避隋煬帝諱虎牙大将軍盖延圍劉永於雎陽五月己酉車駕還宮乙邜晦日有食之續漢志曰日在栁十四度栁河南也時樊崇謀作亂其七月伏誅六月壬戌大赦天下耿弇與延岑戰于穰大破之穣縣屬南陽郡今鄧州縣秋七月征南大将軍岑彭率三将軍伐秦豐戰於黎丘大破之獲其将蔡宏庚辰詔曰吏不滿六百石下至墨綬長相有罪先請續漢志曰縣大者置令一人千石其次置長四百石小者三百石侯國之相亦如之皆掌理人並秦制男子八十以上十嵗以下及婦人従坐者自非不道詔所名捕皆不得繫詔書有名而特捕者當驗問者即就驗女徒雇山歸家前書音義曰令甲女子犯徒遣歸家每月出錢雇人於山伐木名曰雇山盖延㧞雎陽獲劉永而蘇茂周建立永子紆為梁王冬十月壬申幸舂陵祠園廟因置酒舊宅大㑹故人父老光武舊宅在今随州棗陽縣東南宅南二里有白水焉即張衡所謂龍飛白水也十一月乙未至自舂陵涿郡太守張豐反涿郡故城在今幽州范陽縣是嵗李憲自稱天子西州大将軍隗囂奉奏時鄧禹承制命囂為西州大将軍専制凉州朔方事建義大将軍朱祐率祭遵與延岑戰於東陽斬其将張成東陽聚名也故城在今鄧州南臨淮郡復有東陽縣非此地也四年春正月甲申大赦天下二月壬子幸懐壬申至自懐遣右将軍鄧禹率二将軍與延岑戰於武當破之武當縣屬南陽郡有武當山今均州縣也夏四月丁巳幸鄴己巳進幸臨平縣名屬鉅鹿郡故城在今定州鼔城縣東南遣大司馬吴漢擊五校賊於箕山大破之吴漢傳曰東郡箕山五月進幸元氏辛巳進幸盧奴遣征虜将軍祭遵率四将軍討張豐於涿郡斬豐六月辛亥車駕還宮七月丁亥幸譙遣捕虜将軍馬武偏将軍王覇圍劉紆於垂惠垂惠聚名在今亳州山桑縣西北一名禮城董憲将賁休以蘭陵城降憲圍之前書曰賁赫賁音肥今姓作賁音奔蘭陵縣屬東海郡故城在今沂州丞縣東劉攽曰註案文當云今姓作奔音如此便足不當更云今姓作賁音奔也多一賁字倒一奔字虎牙大将軍盖延率平狄将軍龎萌救賁休不克蘭陵為憲所䧟秋八月戊午進幸夀春今夀州縣太中大夫徐惲擅殺臨淮太守劉度惲坐誅遣揚武将軍馬成率三将軍伐李憲九月圍憲於舒縣名故城在今廬州廬江縣西冬十月甲寅車駕還宫太傅卓茂薨十一月丙申幸宛遣建義大将軍朱祐率二将軍圍秦豐於黎丘十二月丙寅進幸黎丘是嵗征西大将軍馮異與公孫述将程焉戰於陳倉破之五年春正月癸巳車駕還宮二月丙午大赦天下捕虜将軍馬武偏将軍王覇㧞垂惠乙丑幸魏郡今相州也壬申封殷後孔安為殷紹嘉公武帝封孔吉為殷紹嘉公安即吉之裔也彭寵為其蒼頭所殺漁陽平秦呼人為黔首謂奴為蒼頭者以别於良人也大司馬吴漢率建威大将軍耿弇擊富平獲索賊於平原大破降之平原郡今德州縣也復遣耿弇率二将軍討張歩三月癸未徙廣陽王良為趙王始就國平狄将軍龎萌反殺楚郡太守孫萌而東附董憲遣征南大将軍岑彭率二将軍伐田戎於津鄉大破之南郡有津鄉故城在今荆州江陵縣東夏四月旱蝗河西大将軍竇融始遣使貢獻五月丙子詔曰乆旱傷麥秋種未下朕甚憂之将殘吏未勝獄多寃結元元愁恨感動天氣乎其令中都官三輔郡國出繫囚前書音義曰中都官謂亰師諸官府也國謂諸侯王國也罪非犯殊死一切勿案殊死謂斬刑殊絶也左傳曰斬其木而弗殊一切謂權時非乆制也並見前書音義見徒免為庻人務進柔良退貪酷各正厥事焉臣賢案范曄序例云帝紀畧依春秋唯孛彗日食地震書餘悉備於志流俗本於此下多有甲申白虹見南北竟天者誤它皆倣此六月建義大将軍朱祐㧞黎丘獲秦豐而龎萌蘇茂圍桃城任城國有桃聚故城在今兖州任城縣北劉攽曰正文案文多一而字説與上同帝時幸䝉縣名屬梁國故城在今宋州北因自将征之先理兵任城乃進救桃城大破萌等秋七月丁丑幸沛祠髙原廟前書音義曰原再也謂已立廟更立者為原詔修復西京園陵進幸湖陵征董憲湖陵縣屬山陽郡故城在今兖州方與縣東一名湖陸又幸蕃縣名屬魯國故城在今徐州滕縣蕃音反遂攻董憲於昌慮大破之昌慮縣屬東海郡故城在今徐州滕縣東南古邾國之濫邑左傳曰邾庻其以濫来奔即此也八月己酉進幸郯縣名屬柬海郡故城在今泗州下邳縣東北郯音談留吴漢攻劉紆董憲等車駕轉徇彭城下邳吴漢㧞郯獲劉紆漢進圍董憲龎萌於胊縣名屬東海郡故城在今海州朐山縣西音其于反冬十月還幸魯使大司空祠孔子耿弇等與張歩戰於臨淄大破之臨淄今青州縣帝幸臨淄進幸劇縣名故城在今靑州夀光縣南故紀國城也張歩斬蘇茂以降齊地平初起太學陸機洛陽記曰太學在洛陽城故開陽門外去宮八里講堂長十丈廣三丈車駕還宮幸太學賜博士弟子各有差十一月壬寅大司徒伏湛免尚書令侯覇為大司徒十二月盧芳自稱天子於九原縣名屬五原郡故城在今勝州銀城縣西州大将軍隗囂遣子恂入侍交阯牧鄧譲率七郡太守遣使奉貢交阯郡今交州縣也南濵大海輿地志云其夷足大指開析兩足並立指則相交阯與趾同古字通應劭漢官儀曰始開北方遂交於南為子孫基阯也七郡謂南海蒼梧欎林合浦交阯九真日南並屬交州見續漢書詔復濟陽二年徭役濟陽縣故城在今曹州寃句縣西南皇考南頓君初為濟陽令以哀帝建平元年帝生於濟陽宮故復之前書音義曰復謂除其賦役也復音福是嵗野榖漸少田畆益廣焉劉攽曰章懐注書避世字作代作葉民字作人治字作理作化所引他書亦皆易之後人不知或輙改還本字又不能都換之亦有誤改代為世者雖不甚害義聊記之以曉學者後漢書卷一上後漢書卷一上考證光武帝紀上光武帝紀臣浩按班固傳固與陳宗尹敏孟異共成世祖夲紀則此紀夲固等所撰今考三國志注載漢晉陽秋等書所引紀中語有今書不載者是為范史所更定也字文叔注伏侯古今注曰秀之字曰茂臣宗萬按後漢以光武諱改秀才為茂材即前漢詔舉秀才異等史官亦追改之前書武紀元封五年詔注應劭曰舊言秀才避光武諱是也南陽蔡陽人注蔡陽縣故城在今随州棗陽縣西南臣召南按随州隨字應作隋自隋文帝省隨為隋唐初因之是以唐書新舊二志並作隋州也與其帥王鳯陳収臣召南按陳収應作陳牧劉元傳平林人陳牧又以牧為大司徒封隂平王更始元年臣浩按張衡傳衡條上司馬遷班固所叙與典籍不合者十餘事又言更始居位人無異望光武初為其将然後即真宜以更始之號建於光武之初書數上竟不聽可知今紀所載更始元年二年亦范史承用張衡之説改定者非班固等所撰本紀舊文也訟逋租於尤注地皇元年十二月壬寅臣宗楷按壬寅前書作乙未又宛人朱福臣召南按朱福即朱祐朱祐傳注引東觀記云祐作福避安帝諱也臣浩按劉攽刋誤于周章傳云安帝名祜此作祐字誤于朱祐傳云祐或作祜盖安帝名祜朱仲先亦名祜故東京史臣改従福以避諱也今考范史各夲及資治通鑑皆作朱祐惟綱目作朱祜傳首詣宛注城中少年朱弟張魚朱監本作于宋本作宋臣松齡按前書王莽傳作朱謝躬討郎注劉攽曰注有侍曹尚書前書皆太常侍曹少一常字前書作常侍曹尚書無太字前将軍鄧禹擊更始定國公王匡於安邑臣召南按定國上公乃匡之初封至此時為比陽王乆矣例以前文言舞陰王李軼後文言遣執金吾賈復擊更始郾王尹遵則此文言定國公亦范書刋削之未盡者以前髙宻令卓茂為太傅注髙密縣屬髙宻國何焯曰茂夲傳注云今洛州密縣此云髙密者衍髙字而注因以誤耳又注云卓以平帝時為密令卓字應改茂字征西大将軍馮異與公孫述将程焉戰於陳倉破之何焯曰焉字疑作烏後漢書卷一上考證欽定四庫全書後漢書卷一下宋宣城太守范煜撰唐章懐太子賢注光武帝紀第一下六年春正月丙辰改舂陵鄉為章陵縣世世復徭役比豐沛無有所豫髙祖豐沛邑人故代代復今比之也復音福辛酉詔曰往嵗水旱蝗蟲為災榖價騰躍言踴貴也人用困乏朕惟百姓無以自贍惻然愍之其命郡國有榖者給稟説文稟賜榖也音筆錦反髙年鰥寡孤獨及篤癃無家屬貧不能自存者如律大戴禮曰六十無妻曰鰥五十無夫曰寡禮記曰㓜而無父曰孤老而無子曰獨爾雅曰篤困也蒼頡篇曰癃病也漢律今亡二千石勉加循撫無令失職職猶常也揚武将軍馬成等㧞舒獲李憲二月大司馬吴漢㧞朐獲董憲龎萌山東悉平諸将還京師置酒賞賜三月公孫述遣将任滿寇南郡今荆州也夏四月丙子幸長安始謁髙廟遂有事十一陵有事謂祭也左傳曰有事於太廟髙祖長陵惠帝安陵文帝覇陵景帝陽陵武帝茂陵昭帝平陵宣帝杜陵元帝渭陵成帝延陵哀帝義陵平帝康陵遣虎牙大将軍盖延等七将軍従隴道伐公孫述五月己未至自長安隗囂反盖延等因與囂戰於隴阺諸将敗績辛丑詔曰惟天水隴西安定北地並郡名天水今秦州安定今涇州北地今寧州隴西今渭州吏人為隗囂所詿誤者説文曰詿亦誤也音古賣反又三輔遭難赤眉有犯法不道者前書音義曰律殺不辜一家三人為不道自殊死以下皆赦除之六月辛夘詔曰夫張官置吏所以為人也管子曰張官置吏所以奉主之法今百姓遭難户口耗少而縣官吏職所置尚繁其令司隸州牧漢官儀曰司隸校尉部河南河内右扶風左馮翊京兆河東𢎞農七郡於河南洛陽故謂東京為司隸各實所部省減吏員縣國不足置長吏可并合者并音必政反上大司徒大司空二府於是條奏并省四百餘縣吏職減損十置其一代郡太守劉興撃盧芳将賈覽於髙栁戰歿髙栁縣屬代郡故城在今雲州定㐮縣初樂浪人王調據郡不服樂浪郡故朝鮮國也在遼東秋遣樂浪太守王遵擊之郡吏殺調降遣前将軍李通率二将軍與公孫述将戰於西城破之西城縣屬漢中今金州縣也夏蝗秋九月庚子赦樂浪謀反大逆殊死已下丙寅晦日有食之冬十月丁丑詔曰吾德薄不眀寇賊為害彊弱相陵元元失所詩云日月告凶不用其行詩小雅鄭𤣥注云告凶告天下凶亡之徴也行道度也不用之者謂相干犯永念厥咎内疚於心疚病也詩曰憂心孔疚其勅公卿舉賢良方正各一人武帝建元元年始詔舉賢良方正直言極諌之士也百僚並上封事無有隠諱宣帝始令羣臣得奏封事以知下情有司修職務遵法度十一月丁夘詔王莽時吏人沒入為奴婢不應舊法者皆免為庻人十二月壬辰大司空宋𢎞免癸巳詔曰頃者師旅未解用度不足故行什一之税謂十分而税其一也孟子曰夏五十而貢殷七十而助周百畆而徹其實皆什一也今軍士屯田糧儲差積武帝初通西域始置校尉屯田其令郡國収見田租三十税一如舊制景帝二年令人田租三十而税一今依景帝故云舊制隗囂遣将行廵寇扶風行姓廵名漢有行祐為趙相見風俗通征西大将軍馮異拒破之是嵗初罷郡國都尉官劉攽曰案郡有都尉國有中尉此時罷郡都尉官耳不當有國字始遣列侯就國匈奴遣使来獻使中郎将報命漢官儀曰使匈奴中郎将擁節秩比二千石匈奴傳云令中郎将韓統報命賂遺金幣七年春正月丙申詔中都官三輔郡國出繫囚非犯殊死皆一切勿案其罪見徒免為庻民耐罪亡命吏以文除之耐輕刑之名前書音義曰一嵗刑為罰作二嵗刑已上為耐耐音乃代反亡命謂犯耐罪而背名逃者令吏為文簿記其姓名而除其罪恐遂逃不歸因失名籍又詔曰世以厚葬為德薄終為鄙至于富者奢僣貧者單財單盡也法令不能禁禮義不能止倉卒乃知其咎倉卒謂喪亂也諸厚葬者皆被發掘故乃知其咎惡也其布告天下令知忠臣孝子慈兄悌弟薄葬送終之義二月辛巳罷護曹都尉官三月丁酉詔曰今國有衆軍並多精勇宜且罷輕車騎士材官樓船士及軍假吏漢官儀曰髙祖命天下郡國選能引闗蹶張材力武猛者以為輕車騎士材官樓船常以立秋後講肄課試各有員數平地用車騎山阻用材官水泉用樓船軍假吏謂軍中權置吏也今悉罷之令還復民伍公孫述立隗囂為朔寧王癸亥晦日有食之避正殿寝兵不聽事五日詔曰吾徳薄致災謫見日月謫責也音直革反左傳曰人君為政不用善自取謫於日月之災也戰慄恐懼夫何言哉今方念愆庻消厥咎其令有司各修職任奉遵法度惠兹元元百僚各上封事無有所諱其上書者不得言聖夏四月壬午詔曰比隂陽錯謬日月薄食百姓有過在予一人大赦天下公卿司隸州牧舉賢良方正各一人遣詣公車朕将覽試焉公車門名公車所在因以名焉漢官儀曰公車掌殿司馬門天下上事及徵召皆總領之五月戊戌前将軍李通為大司空甲寅詔吏人遭饑亂及為青徐賊所略為奴婢下妻欲去留者恣聽之杜預左傳云不以道取為略敢拘制不還以賣人法従事言従賣人之事以結其罪是夏連雨水漢忠将軍王常為横野大将軍八月丁亥封前河間王邵為河間王隗囂寇安定征西大将軍馮異征虜将軍祭遵擊却之冬盧芳所置朔方太守田颯音立雲中太守喬扈各舉郡降是嵗省長水射聲二校尉官前書音義曰長水地名胡騎所屯射聲謂工射者夜中聞聲則射之因以為名二校尉皆武帝置今省之八年春正月中郎将来歙襲略陽縣名屬天水郡故城在今秦州隴城縣西北殺隗囂守将而據其城夏四月司隸校尉傅亢下獄死隗囂攻来歙不能下閏月帝自征囂河西太守竇融率五郡太守與車駕㑹髙平五郡謂隴西金城天水酒泉張掖髙平縣名屬安定後改為髙平今原州縣劉攽曰注案髙平縣名後改為髙平不成文理盖合有一郡字隴右潰隗囂奔西城遣大司馬吴漢征南大将軍岑彭圍之進幸上邽不降上邽縣名屬隴西郡故邽戎邑今秦州縣命虎牙大将軍盖延建威大将軍耿弇攻之潁川盗賊寇沒屬縣河東守守兵亦叛劉攽曰案文多一守字若云太守之兵又不合去太字京師騷動秋大水八月帝自上邽晨夜東馳九月乙夘車駕還宮庚申帝自征潁川盗賊皆降安丘侯張歩叛歸琅邪安丘縣屬北海郡今密州縣有渠丘亭琅邪太守陳俊討獲之戊寅至自潁川冬十月丙午幸懐十一月乙丑至自懐公孫述遣兵救隗囂吴漢盖延等還軍長安天水隴西復反歸囂十二月髙句驪王遣使奉貢是嵗大水左傳曰平原出水為大水九年春正月隗囂病死其将王元周宗復立囂子純為王徙鴈門吏人於太原三月辛亥初致青巾左校尉官劉攽曰案前史廢置官皆用置字字書置立也致字訓送詣上文光武為司隸致僚屬招致之義可作致字今建此官宜作置盖緣前文遂誤此字改作置無疑公孫述遣将田戎任滿據荆門水經注曰江水東歴荆門虎牙之間荆門山在南上合下開其状似門虎牙山在北石壁色紅間有白文類牙故以名也此二山楚之西塞也在今硖州夷陵縣東南夏六月丙戌幸緱氏登轘轅緱氏縣有緱氏山轘轅山有轘轅坂並在洛陽之東南遣大司馬吴漢率四将軍擊盧芳将賈覽於髙栁戰不利秋八月遣中郎将來歙監征西大将軍馮異等五将軍討隗純於天水驃騎大将軍杜茂與賈覽戰於繁畤縣名屬鴈門郡今代州縣茂軍敗績是嵗省闗都尉前書曰秦官也武帝置復置護羌校尉官漢官儀曰武帝置秩比二千石持節以䕶西羌王莽亂遂罷時班彪議宜復其官以理寃結帝従之以牛邯為護羌校尉都於隴西令居縣十年春正月大司馬吴漢率捕虜将軍王覇等五将軍擊賈覽於髙栁匈奴遣騎救覽諸将與戰郤之修理長安髙廟夏征西大将軍馮異破公孫述将趙匡於天水斬之征西大将軍馮異薨秋八月己亥幸長安祠髙廟遂有事十一陵戊戌進幸汧縣名屬右扶風故城在今隴州汧源縣隗囂将髙峻降冬十月中郎将来歙等大破隗純於落門前書曰天水冀縣有落門聚在今渭州隴西縣東南有落門山落門水出焉其将王元奔蜀純與周宗降隴右平先零羌寇金城隴西金城郡故城在今蘭州廣武縣之西南来歙率諸将擊羌於五谿大破之續漢志曰隴西㐮武縣有五谿聚庚寅車駕還宮是嵗省定襄郡定襄故城在今勝州界徙其民於西河郡名今石州離石縣泗水王歙薨淄川王終薨十一年春二月己夘詔曰天地之性人為貴其殺奴婢不得減罪己酉幸南陽還幸章陵祠園陵城陽王祉薨庚午車駕還宮閏月征南大将軍岑彭率三将軍與公孫述将田戎任滿戰於荆門大破之獲任滿威虜将軍馮駿圍田戎於江州縣名屬巴郡今渝州巴縣岑彭遂率舟師伐公孫述平巴郡夏四月丁夘省大司徒司直官漢官儀曰武帝置丞相司直元夀二年改丞相為大司徒司直仍舊今省先零羌寇臨洮縣名屬隴西郡故城在今岷州六月中郎将来歙率揚武将軍馬成破公孫述将王元環安於下辯縣名屬武都郡今成州同谷縣舊名武衛城安遣閒人刺殺中郎将来歙間諜也謂伺候間隙也帝自将征公孫述秋七月次長安左傳例曰凡師出一宿為舎再宿為信過宿為次八月岑彭破公孫述将侯丹於黄石即黄石灘也水經注曰江水自涪陵東出百里而届於黄石在今涪州涪陵縣輔威将軍臧宮與公孫述将延岑戰於沈水大破之水經注曰沈水出廣漢縣下入涪水本或作沉水及沆水者並非王元降至自長安癸亥詔曰敢炙灼奴婢論如律免所炙灼者為庻民冬十月壬午詔除奴婢射傷人棄市律公孫述遣閒人刺殺征南大将軍岑彭馬成平武都因隴西太守馬援擊破先零羌徙致天水隴西扶風十二月大司馬吴漢率舟師伐公孫述是嵗省朔方牧并并州朔方郡在今夏州朔方縣北上并音必政反初斷州牧自還奏事前書音義曰刺史每嵗盡則入奏事亰師今斷之哀帝改刺史曰州牧十二年春正月大司馬吴漢與公孫述将史興戰於武陽斬之武陽縣屬犍為郡故城在今眉州隆山縣東也三月癸酉詔隴蜀民被略為奴婢自訟者及獄官未報一切免為庻民夏甘露降南行唐縣名屬常山郡今恒州縣六月黄龍見東阿今濟州縣秋七月威虜将軍馮峻㧞江州獲田戎九月吴漢大破公孫述将謝豐于廣都斬之廣都今益州輔威将軍臧宮㧞涪城斬公孫恢涪城今綿州縣也恢述之弟大司空李通罷冬十一月戊寅吴漢臧宮與公孫述戰於成都大破之述被創夜死辛巳吴漢屠成都夷述宗族及延岑等廣雅曰夷猶滅也十二月辛夘揚武将軍馬成行大司空事是嵗九真徼外蠻夷張遊率種人内屬九真今愛州縣封為歸漢里君省金城郡屬隴西參狼羌寇武都武都今武州也參音所今反隴西太守馬援討降之詔邉吏力不足戰則守追虜料敵不拘以逗留法説文曰逗留止也前書音義曰逗是曲行避敵也漢法軍行逗留畏愞者斬追虜或近或逺量敵進退不拘以軍法直取勝敵為務也逗古住字横野大将軍王常薨遣驃騎大将軍杜茂将衆部施刑屯北邉施讀曰㢮㢮解也前書音義曰謂有赦令去其鉗釱赭衣謂之㢮刑築亭候亭候伺候望敵之所前書曰秦法十里一亭亭有長漢因之不改修烽燧前書音義曰邉方備警急作髙土臺臺上作桔臯桔臯頭有兜零以薪草置其中常低之冇寇即燃火舉之以相告曰烽又多積薪寇至即燔之望其烟曰燧晝則燔燧夜乃舉烽廣雅曰兜零籠也十三年春正月庚申大司徒侯覇薨戊子詔曰往年已勑郡國異味不得有所獻御今猶未止非徒有豫養𨗳擇之勞豫飬謂未至獻時豫前養之導亦擇也至乃煩擾道上疲費過所其令太官勿復受續漢志曰太官令一人秩六百石掌御膳飲食眀勑下以逺方口實所以薦宗廟自如舊制漢官儀曰口實膳羞之事也二月遣捕虜将軍馬武屯滹沱河以備匈奴盧芳自五原亡入匈奴丙辰詔曰長沙王興真定王得河間王邵中山王茂皆襲爵為王不應經義以其服屬既䟽不當襲爵為王其以興為臨湘侯臨湘縣今潭州長沙縣得為真定侯邵為樂成侯樂成縣故城在今瀛州樂府縣西北劉攽曰注案府當作夀茂為單父侯今宋州縣音善甫其宗室及絶國封侯者凡一百三十七人丁巳降趙王良為趙公太原王章為齊公魯王興為魯公庚午以殷紹嘉公孔安為宋公周承休公姬常為衛公省并西京十三國廣平屬鉅鹿真定屬常山河間屬信都城陽屬琅邪泗水屬廣陵淄川屬髙密膠東屬北海陸安屬廬江廣陽屬上谷據此惟有九國云十三誤也三月辛未沛郡太守韓歆為大司徒丙子行大司空馬成罷夏四月大司馬吳漢自蜀還京師於是大饗将士班勞䇿勲班布也謂徧布勞来之其有功者以䇿書紀其勲也勞音力到反功臣增邑更封凡三百六十五人其外戚恩澤封者四十五人罷左右将軍官前書曰左右将軍周官也秦漢因之至此罷建威大将軍耿弇罷益州傳送公孫述瞽師郊廟樂器葆車輿輦於是法物始備瞽無目之人也為樂師取其無所見於音聲審也郊廟之器罇彛之屬也樂器鐘磬之屬葆車謂上建羽葆也合聚五采羽名為葆輿者車之總名也輦者駕人以行法物謂大駕鹵簿儀式也時草創未暇今得之始備時兵革既息天下少事文書調役務従簡寡調謂發也至乃十存一焉甲寅冀州牧竇融為大司空五月匈奴寇河東秋七月廣漢徼外白馬羌豪率種人内屬廣漢今益州雒縣也徼猶塞也音吉弔反羌有百五十四種在廣漢西北者為白馬羌九月日南徼外蠻夷獻白雉白兎日南郡屬交州冬十二月甲寅詔益州民自八年以来被略為奴婢者謂公孫述時也皆一切免為庻民或依託為人下妻欲去者恣聽之敢拘留者比青徐二州以略人法従事復置金城郡前年省并隴西十四年春正月起南宮前殿匈奴遣使奉獻使中郎将報命中郎将劉㐮也夏四月辛巳封孔子後志為褒成侯平帝封孔均為褒城侯志均子也古今志曰志時為密令越巂人任貴自稱太守遣使奉計越巂郡武帝置本卭都也巂水名因越巂水而置郡故以名焉計謂人庻名籍若今計帳秋九月平城人賈丹殺盧芳将尹由来降平城屬鴈門郡今雲州定㐮縣也是嵗㑹稽大疫㑹稽今越州縣莎車國鄯善國遣使奉獻莎車鄯善並西域國名鄯音市戰反十二月癸夘詔益涼二州奴婢自八年以来自訟在所官一切免為庻民賣者無還直十五年春正月辛丑大司徒韓歆免自殺事見侯覇傳丁未有星孛於昴汝南太守歐陽歙為大司徒建議大将軍朱祐罷丁未有星孛於營室二月徙鴈門代郡上谷三郡民置常闗居庸闗以東前書曰代郡有常山闗上谷郡居庸縣有闗時胡寇數犯邉故徙之劉攽曰據注文及他䖏盡云常山闗正文少一山字初巴蜀既平大司馬吴漢上書請封皇子不許重奏連嵗三月乃詔羣臣議大司空融固始侯通膠東侯復髙密侯禹太常登等奏議曰古者封建諸侯以藩屏亰師藩籬也屏蔽也詩大雅曰介人維藩大邦維屏毛萇注云當用公卿諸侯為藩屏也公羊傳曰亰者何大也師者何衆也天子之居必有衆大之辭言之劉攽曰注必有按今公羊云必以作有非也周封八百史記曰唐虞協和萬國逮于夏商或數千嵗盖周封八百也同姓諸姬並為建國左傳曰虞虢焦滑霍楊韓魏皆姬姓也夾輔王室尊事天子享國永長為後世法故詩云大啓爾宇為周室輔詩魯頌也宇居也周成王封周公子伯禽於魯言大開爾居以為我周家之輔髙祖聖德光有天下亦務親親封立兄弟諸子不違舊章陛下德横天地興復宗統褒德賞勲親睦九族孔安國注尚書云九族謂上至髙祖下至𤣥孫功臣宗室咸䝉封爵多受廣地或連屬縣今皇子賴天能勝衣趨拜陛下恭謙克譲抑而未議羣臣百姓莫不失望宜因盛夏吉時定號位以廣藩輔禮記月令天子孟夏迎夏於南郊還乃封諸侯行爵出禄眀親親尊宗廟重社稷應古合舊厭塞衆心臣請大司空上輿地圖廣雅曰輿載也言載在地者皆圖畫之司空掌土地故令上之太常擇吉日具禮儀制曰可夏四月戊申以太牢告祠宗廟丁巳使大司空融告廟封皇子輔為右翊公英為楚公陽為東海公康為濟南公蒼為東平公延為淮陽公荆為山陽公衡為臨淮公焉為左翊公亰為琅邪公癸丑追諡兄伯升為齊武公兄仲為魯哀公六月庚午復致屯騎長水射聲三校尉官七年罷劉攽曰案文致亦當作置説同十四年改青巾左校尉為越騎校尉詔下州郡檢覈墾田頃畆墾闢也及户口年紀又考實二千石長吏阿枉不平者冬十一月甲戌大司徒歐陽歙下獄死十二月庚午闗内侯戴渉為大司徒盧芳自匈奴入居髙栁是嵗驃騎大将軍杜茂免虎牙大将軍盖延薨十六年春二月交阯女子徴側反略有城邑三月辛丑晦日有蝕之秋九月河南尹張伋及諸郡守十餘人坐度田不實皆下獄死東觀記曰刺史太守多為詐巧不務實核茍以度田為名聚人田中并度廬屋里落聚人遮道啼呼郡國大姓及兵長羣盗䖏處並起攻劫在所害殺長吏郡縣追討到則解散去復屯結青徐幽冀四州尤甚冬十月遣使者下郡國聽羣盗自相糾擿擿猶發也音它狄反五人共斬一人者除其罪吏雖逗留廻避故縦者皆勿問聽以禽討為效其牧守令長坐界内盗賊而不収捕者又以畏愞捐城委守者皆不以為負委守謂棄其所守也但取獲賊多少為殿最殿後也謂課居後也最凡要之首也言課居先也唯蔽匿者乃罪之於是更相追捕賊並解散徙其魁帥於它郡賦田受稟使安生業自是牛馬放牧邑門不閉盧芳遣使乞降十二月甲辰封芳為代王初王莽亂後貨幣雜用布帛金粟是嵗始行五銖錢武帝始為五銖錢王莽時廢今始行之十七年春正月趙公良薨二月乙亥晦日有蝕之東觀記曰上以日食避正殿讀圖䜟多御坐廡下淺露中風發疾苦眩甚左右有白大司馬吏病苦如此不能動摇自强従公出乗以車行數里病差四月二日車駕宿偃師病差數日入南陽界到葉以車騎省留數日行黎陽兵馬千餘匹遂到章陵起居平愈夏四月乙夘南廵狩皇太子及右翊公輔楚公英東海公陽濟南公康東平公蒼従幸潁川進幸葉章陵葉縣故楚葉公邑屬南郡今許州縣也葉音式渉反五月乙夘車駕還宮六月癸巳臨淮公衡薨秋七月妖巫李廣等羣起據皖城縣名屬廬江郡故城在今舒州有皖水音下板反遣虎賁中郎将馬援驃騎将軍叚志討之九月破皖城斬李廣等冬十月辛巳廢皇后郭氏為中山太后立貴人隂氏為皇后進右翊公輔為中山王食常山郡本恒山郡避文帝諱改為常山故城在今趙州元氏縣西其餘九國公皆即舊封進爵為王甲申幸章陵修園廟祠舊宅觀田廬置酒作樂賞賜時宗室諸母因酣悦相與語曰文叔少時謹信與人不欵曲唯直柔耳今乃能如此帝聞之大笑曰吾理天下亦欲以柔道行之乃悉為舂陵宗室起祠堂有鳳皇見於潁川之郏縣郏今汝州郏城縣也東觀記曰鳳髙八尺五彩羣鳥並従行列盖地數頃停一十七日十二月至自章陵是嵗莎車國遣使貢獻十八年春二月蜀郡守将史歆叛遣大司馬吴漢率二将軍討之圍成都甲寅西廵狩幸長安三月壬午祠髙廟遂有事十一陵歴馮翊界進幸蒲坂祠后土漢官儀曰祭地於河東汾隂后土宮宮曲入河古之祭地澤中方丘也以夏至日祭其禮儀如祭天蒲坂縣屬河東郡后土祠在今蒲州汾隂縣西北夏四月甲戌車駕還宮癸酉詔曰今邉郡盗榖五十斛罪至於死開殘吏妄殺之路其蠲除此法同之内郡遣伏波将軍馬援率樓船将軍叚志等擊交阯賊徵側等戊申幸河内戊子至自河内五月旱盧芳復亡入匈奴秋七月吴漢㧞成都斬史歆等壬戌赦益州所部殊死已下冬十月庚辰幸宜城縣屬南郡楚之鄢邑也故城在今襄州率道縣南還祠章陵十二月乙丑車駕還宮是嵗罷州牧置刺史武帝元封五年初置部刺史掌奉詔條察州秩六百石員十三人成帝綏和元年更名牧秩二千石哀帝建平二年復為刺史元夀二年復為牧經王莽變革至建武元年復置牧今改置刺史十九年春正月庚子追尊孝宣皇帝曰中宗始祠昭帝元帝於太廟漢官儀曰光武第雖十二於父子之次於成帝為兄弟於哀帝為諸父於平帝為祖父皆不可為之後上至元帝於光武為父故上繼元帝而為九代故河圖云赤九㑹昌謂光武也然則宣帝為曾祖故追尊及祠之劉攽曰注案世數宣帝於光武猶是祖此多一曾字成帝哀帝平帝於長安春陵節侯以下四世於章陵妖巫單臣傅鎮等反據原武太中大夫臧宮圍之夏四月㧞原武斬臣鎮等伏波将軍馬援破交阯斬徴側等因擊破九真賊都陽等降之閏月戊申進趙齊魯三國公爵為王六月戊申詔曰春秋之義立子以貴公羊傳曰立嫡以長不以賢立子以貴不以長桓公何以貴母貴也母貴則子貴子以母貴母以子貴劉攽曰注母貴則子貴案公羊本文當云母貴則子何以貴此少何以二字東海王陽皇后之子宜承大統皇太子彊崇執謙退願備藩國父子之情重乆違之其以彊為東海王立陽為皇太子改名荘秋九月南廵狩壬申幸南陽進幸汝南南頓縣舎置酒㑹賜吏人復南頓田租嵗劉攽曰案文不見嵗數明少一字近下二十年復濟陽六嵗顯宗復元氏六嵗則此當初復五嵗增一嵗則六嵗與後事同矣是漏五字也父老前叩頭言皇考居此日乆陛下識知寺舎蔡邕獨斷曰陛階陛也與天子言不敢指斥故云陛下風俗通曰寺司也諸官府所止皆曰寺光武常従皇考至南頓故識知官府寺舍每来輙加厚恩願賜復十年帝曰天下重器常恐不任日復一日安敢逺期十嵗乎吏人又言陛下實惜之何言謙也帝大笑復增一嵗進幸淮陽梁沛西南夷寇益州郡常璩華陽國志云武帝元封二年叟夷反将軍郭昌討平之因開為益州郡故城在今昆州晉寧縣是也遣武威将軍劉尚討之越巂太守任貴謀叛十二月劉尚襲貴誅之是嵗復致函谷闗都尉九年省今復置劉攽曰正文致亦當作置此注中亦自作置也修西京宮室二十年春二月戊子車駕還宮夏四月庚辰大司徒戴渉下獄死古今注曰坐入故太倉令奚渉罪大司空竇融免五月辛亥大司馬吴漢薨匈奴寇上黨天水遂至扶風六月庚寅廣漢太守蔡茂為大司徒太僕朱浮為大司空壬辰左中郎将劉隆為驃騎将軍行大司馬事武帝省太尉置大司馬将軍成帝賜金印紫綬置官屬禄比丞相哀帝去將軍位在司徒上見前書乙未徙中山王輔為沛王秋東夷韓國人率衆詣樂浪内附東夷有辰韓卞韓馬韓謂之三韓國也冬十月東廵狩甲午幸魯進幸東海楚沛國十二月匈奴寇天水壬寅車駕還宮是嵗省五原郡徙其吏人置河東復濟陽縣徭役六嵗二十一年春正月武威将軍劉尚破益州夷平之夏四月安定屬國胡叛屯聚青山青山在今慶州烏嶺縣西北遣将兵長史陳訢討平之訢音欣秋鮮卑寇遼東遼東太守祭彤大破之冬十月遣伏波将軍馬援出塞擊烏桓不尅匈奴寇上谷中山其冬鄯善王車師王等十六國皆遣子入侍奉獻願請都䕶都護宣帝置始以鄭吉為之秩比二千石都總也言總護南北道居烏壘城察西域諸國動静以聞事見前書帝以中國初定未遑外事乃還其侍子厚加賞賜二十二年春閏月丙戌幸長安祠髙廟遂有事十一陵二月己巳至自長安夏五月乙未晦日有蝕之秋七月司隸校尉蘇鄴下獄死九月戊辰地震裂制詔曰劉攽曰案史無有書制詔曰者唯下三公及它官詔有云制詔某官史亦不著曰字眀此多一制字也説者云武后諱詔曾改此詔作制後人因誤重之也日者地震南陽尤甚夫地者任物至重静而不動者也而今震裂咎在君上鬼神不順無德灾殃将及吏人朕甚懼焉其令南陽勿輸今年田租芻藁遣謁者案行其死罪繫囚在戊辰以前減死罪一等徒皆弛解鉗衣絲絮弛解脱也倉頡篇曰鉗釱也音竒炎反前書音義曰釱足鉗也音徒計反又太盖反舊法在徒役者不得衣絲絮今赦許之賜郡中居人壓死者棺錢人三千其口賦逋税而廬宅尤破壊者勿収責漢儀注曰人年十五至五十六出賦錢人百二十為一筭又七嵗至十四嵗出口錢人二十以供天子至武帝時又口加三錢以補車騎馬逋税謂欠田租也吏人死亡或在壊垣毁屋之下而家羸弱不能収拾者其以見錢榖取傭為尋求之冬十月壬子大司空朱浮免癸丑光禄勲杜林為大司空是嵗齊王章薨青州蝗匈奴薁鞬日逐王比薁音於六反鞬音紀言反比其名也遣使詣漁陽請和親使中郎将李茂報命烏桓擊破匈奴匈奴北徙幕南地空前書音義曰沙土曰幕即今磧也詔罷諸邉郡亭候吏卒二十三年春正月南郡蠻叛遣武威将軍劉尚討破之徙其種人於江夏郡名故城在今安州雲夢縣東南夏五月丁夘大司徒蔡茂薨秋八月丙戌大司空杜林薨九月辛未陳留太守玉況為大司徒況字文伯京兆人玉音肅冬十月丙申太僕張純為大司空髙句驪率種人詣樂浪内屬十二月武陵蠻叛寇掠郡縣遣劉尚討之戰於沅水武陵郡今朗州也沅水名出牂柯東止過臨沅縣至長沙入洞庭湖尚軍敗歿是嵗匈奴薁鞬日逐王比率部曲遣使詣西河内附二十四年春正月乙亥大赦天下匈奴薁鞬日逐王比遣使欵五原塞求扞禦北虜秋七月武陵蠻寇臨沅縣名屬武陵郡故城在今朗州武陵縣遣謁者李嵩中山太守馬成討蠻不尅於是伏波将軍馬援率四将軍討之詔有司申眀舊制阿附蕃王法武帝時有淮南衡山之謀作左官之律設附益之法前書音義曰人道尚右言捨天子仕諸侯為左官左僻也阿曲附益王侯者将冇重法是為舊制今更申明之冬十月匈奴薁鞬日逐王比自立為南單于於是分為南北匈奴二十五年春正月遼東徼外貊人貊人穢貊國人也貊音陌寇右北平漁陽上谷太原遼東太守祭彤招降之烏桓大人来朝烏桓謂渠帥也南單于遣使詣闕貢獻奉蕃稱臣又遣其左賢王擊破北匈奴却地千餘里三月南單于遣子入侍戊申晦日有食之伏波将軍馬援等破武陵蠻於臨沅冬十月叛蠻悉降夫餘王遣使奉獻夫餘國在海東去𤣥菟千餘里是嵗烏桓大人率衆内屬詣闕朝貢二十六年春正月詔有司增百官奉續漢志曰大将軍三公奉月三百五十斛秩中二千石奉月百八十斛二千石月百二十斛比二千石月百斛千石月八十斛六百石月七十斛比六百石月五十五斛四百石月五十斛比四百石月四十五斛三百石月四十斛比三百石月三十七斛二百石月三十斛比二百石月二十七斛百石月十六斛㪷食月十一斛佐史月八斛凡諸受奉錢榖各半奉音扶用反其千石已上減於西京舊制六百石已下增於舊秩初作夀陵初作陵未有名故號夀陵盖取乆長之義也漢自文帝以後皆預作陵今循舊制也将作大匠竇融上言園陵廣袤無慮所用前書曰将作少府秦官掌宮室景帝改為大匠秩二千石説文曰南北曰袤東西曰廣廣雅曰無慮都凡也謂請園陵都凡制度也袤音茂帝曰古者帝王之葬皆陶人瓦器木車茅馬禮記塗車芻靈自古有之鄭元注云芻靈束茅為人馬也使後世之人不知其處太宗識終始之義景帝能述遵孝道遭天下反覆而覇陵獨完受其福豈不羙哉謂赤眉入長安惟覇陵不掘令所置地不過二三頃無為山陵陂池裁令流水而已言不起山陵裁令封土陂池不停水而已陂音普何反池音徒何反遣中郎将叚郴授南單于璽綬令入居雲中郡名在今勝州北郴音丑林反始置使匈奴中郎将将兵衛護之中郎将即叚郴也漢官儀曰使匈奴中郎将屯西河美稷縣也南單于遣子入侍奉奏詣闕於是雲中五原朔方北地定襄鴈門上谷代八郡民歸於本土遣謁者分将施刑補理城郭施與㢮同解見上發遣邉民在中國者布還諸縣皆賜以装錢轉輸給食東觀記曰時城郭丘墟掃地更為上悔前徙之二十七年夏四月戊午大司徒玉況薨五月丁丑詔曰昔契作司徒禹作司空皆無大名其令二府去大朱祐奏宜令三公並去大名以法經典帝従其議又改大司馬為太尉驃騎大将軍行大司馬劉隆即日罷劉攽曰案二漢稱行者皆云行某官事不如今但云行某官也眀此少一事字以太僕趙憙為太尉大司農馮勤為司徒益州郡徼外蠻夷率種人内屬北匈奴遣使詣武威乞和親武威郡故城在今凉州姑臧縣西北故凉城是也冬魯王興齊王石始就國二十八年春正月己巳徙魯王興為北海王以魯國益東海賜東海王彊虎賁旄頭鍾虡之樂漢官儀曰虎賁千五百人戴鶡尾屬虎賁中郎将又云舊選羽林為旄頭被髪先駈魏文帝列異傳曰㤗文公時梓樹化為牛以騎擊之騎不勝或墮地髻解被髪牛畏之入水故秦因是置旄頭騎使先駈爾雅曰木謂之虡所以懸鍾磬也説文曰虡飾為猛獸夏六月丁夘沛太后郭氏薨因詔郡縣捕王侯賔客坐死者數千人時更始子鯉因沛獻王輔殺劉盆子兄恭故王侯賔客多坐死秋八月戊寅東海王彊沛王輔楚王英濟南王康淮陽王延始就國冬十月癸酉詔死罪繋囚皆一切募下蠶室蠶室宮刑獄名有刑者畏風湏暖作窨室蓄火如蠶室因以名焉窨一禁反見前書音義其女子宮謂幽閉也北匈奴遣使貢獻乞和親二十九年春二月丁巳朔日有食之遣使者舉寃獄出繫囚庚申賜天下男子爵人二級鰥寡孤獨篤癃貧不能自存者粟人五斛夏四月乙丑詔令天下繫囚自殊死已下及徒各減本罪一等其餘贖罪輸作各有差三十年春正月鮮卑大人内屬朝賀二月東廵狩甲子幸魯進幸濟南閏月癸丑車駕還宮有星孛於紫宮夏四月戊子徙左翊王焉為中山王五月大水賜天下男子爵人二級鰥寡孤獨篤癃貧不能自存者粟人五斛秋七月丁酉幸魯國劉攽曰案它䖏皆不言國明此多一字復濟陽縣是年徭役冬十一月丁酉至自魯三十一年夏五月大水戊辰賜天下男子爵人二級鰥寡孤獨篤癃貧不能自存者粟人六斛癸酉晦日有食之是夏蝗秋九月甲辰詔令死罪繫囚皆一切募下蠶室其女子宮是嵗陳留雨榖形如稗實杜預注左傳云稗草之似榖者音蒲解反北匈奴遣使奉獻中元元年春正月東海王彊沛王輔楚王英濟南王康淮陽王延趙王盱皆来盱音況于反丁夘東廵狩二月己夘幸魯進幸太山北海王興齊王石朝于東嶽辛夘柴望岱宗登封太山甲午禪于梁父岱宗太山也梁父太山下小山也封謂聚土為壇墠謂除地而祭改墠為禪神之也續漢志曰時上御輦升山即位於壇南北靣尚書令奉玉牒檢皇帝以寸三分璽親封之藏玉牒已以石覆訖尚書令以五寸印封石檢畢皇帝再拜禪祭地于梁隂以髙后配山川羣神従祀焉其玉牒文祕刻石文辭多不載三月戊辰司空張純薨夏四月癸酉車駕還宮己夘大赦天下復嬴博梁父奉髙四縣屬太山郡故城在今兖州博城縣界勿出今年田租芻藁改年為中元行幸長安戊子祀長陵五月乙丑至自長安六月辛夘太僕馮魴為司空乙未司徒馮勤薨是夏京師醴泉湧出尚書中候曰俊乂在官則醴泉出也飲之者固疾皆愈惟眇蹇者不瘳又有赤草生於水崖赤草朱草也大戴記曰朱草日生一葉至十五日已後日落一葉周而復始郡國頻上甘露羣臣奏言地祗靈應而朱草萌生孝經援神契曰德至草木即朱草生孝宣帝每有嘉瑞輙以改元神爵五鳯甘露黄龍列為年紀盖以感致神祗表彰德信是以化致升平稱為中興今天下清寧靈物仍降陛下情存損挹推而不居豈可使祥符顯慶沒而無聞宜令太史撰集太史史官之長也前書音義曰太史公武帝置位在丞相之上以傳来世帝不納常自謙無德每郡國所上輙抑而不當故史官罕得記焉秋郡國三蝗冬十月辛未司𨽻校尉東莱李訢為司徒甲申使司空告祠髙廟曰髙皇帝與羣臣約非劉氏不王呂太后賊害三趙謂髙帝子趙幽王友趙恭王恢趙𨼆王如意専王呂氏賴社稷之靈禄産伏誅呂産呂禄並呂后兄弟子呂后崩各擁南北軍欲為亂周勃陳平等誅之天命㡬墜危朝更安呂太后不宜配食髙廟同祧至尊薄太后母德慈仁薄太后髙帝姬孝文帝之母孝文皇帝賢明臨國子孫賴福延祚至今其上薄太后尊號曰髙皇后配食地祗遷呂太后廟主于園四時上祭園謂塋域也於中置寢十一月甲子晦日有食之是嵗初起眀堂靈臺辟雍及北郊兆域大戴禮云明堂者凡九室一室有四户八牖三十六户七十二牖以茅盖上上圓下方赤綴户也白綴牖也禮圖又曰建武三十二年作明堂上圓下方十二堂法日辰九室法九州室八牕八九七十二法一時之王室有十二户法隂陽之數胡伯始云古清廟盖以茅今盖以瓦下藉茅存古制也漢官儀曰明堂四面起土作塹上作橋塹中無水眀堂去平城門二里所天子出従平城門先歴眀堂乃至郊祀又曰辟雍去眀堂三百歩車駕臨辟雍従北門入三月九月皆於中行郷射禮辟雍以水周其外以節觀者諸侯曰泮宮東西南有水北無下天子也漢官閣疏曰靈䑓髙三丈十二門天子曰靈䑓諸侯曰觀臺漢官儀北郊壇在城西北角去城一里所謂方壇四陛但存壇祠舎而已其鼔吹樂及舞人御帳皆従南郊之其地祗位南靣西上髙皇后配西面皆在壇上地理羣神従食壇下南郊焚犢北郊埋犢劉攽曰注去城一里所謂方壇四陛案謂當作為上文云去城一里所句為方壇四陛傳寫之誤以為為謂以所屬下句甚無謂也宣布圖䜟於天下復濟陽南頓是年徭役參狼羌寇武都敗郡兵隴西太守劉盱遣軍救之及武都郡兵討叛羌皆破之二年春正月辛未初立北郊祀后土東夷倭奴國王遣使奉獻倭在帯方東南大海中依山島為國二月戊戌帝崩於南宮前殿年六十二伏侯古今注曰是嵗在丁巳遺詔曰朕無益百姓皆如孝文皇帝制度務従約省文帝葬皆以瓦器不以金銀銅錫為飾因其山不起墳刺史二千石長吏皆無離城郭無遣吏及因郵奏説文曰郵境上行書舎也劉攽曰案文多一無字光武崩諸侯有奔喪之義光武従事簡約既敕刺史二千石無離城郭又不得遣吏及因郵奏事不近事情明此多一無字無疑盖凡弔喪及赴葬皆遣吏及因郵也廉范傳肅宗崩廬江嚴麟奉章云云此則遣吏之證初帝在兵間乆厭武事且知天下疲耗思樂息肩左傳曰息肩于晉自隴蜀平後非儆急未甞復言軍旅皇太子甞問攻戰之事帝曰昔衛靈公問陳孔子不對此非爾所及論語衛靈公問陳於孔子曰爼豆之事則甞聞之矣軍旅之事未之學也每旦視朝日側乃罷數引公卿郎将講論經理夜分乃寐分猶半也皇太子見帝勤勞不怠承間諫曰陛下有禹湯之明而失黄老養性之福黄帝老子願頤愛精神優游自寧帝曰我自樂此不為疲也雖身濟大業兢兢如不及故能明慎政體總攬權綱量時度力舉無過事退功臣而進文吏戢弓矢而散馬牛雖道未方古斯亦止戈之武焉左傳曰於文止戈為武也論曰皇考南頓君初為濟陽令以建平元年十二月甲子夜生光武於縣舎蔡邕光武碑文云光武将生皇考以令舎不顯開宮後殿居之而生有赤光照室中東觀記曰光照室中盡明如畫欽異焉使卜者王長占之長辟左右辟音頻亦反曰此兆吉不可言是嵗縣界有嘉禾生一莖九穗因名光武曰秀明年方士有夏賀良者上言哀帝云漢家歴運中衰當再受命於是改號為太初元年稱陳聖劉太平皇帝以厭勝之及王莽簒位忌惡劉氏以錢文有金刀故改為貨泉或以貨泉字文為白水真人後望氣者蘇伯阿為王莽使至南陽遥望見㫪陵郭唶曰唶歎也音子夜反氣佳哉鬱鬱葱葱然及始起兵還㫪陵逺望舎南火光赫然屬天有頃不見初道士西門君惠李守等亦云劉秀當為天子其王者受命信有符乎不然何以能乗時龍而御天哉易曰時乗六龍以御天賛曰炎正中微大盜移國漢以火德王故曰炎正大盜謂王莽簒位也荘子曰田成子一日殺齊君而盜其國向所謂智者不反為大盜積者乎九縣飊回三精霧塞九縣九州也飊回謂亂也三精日月星也霧塞言昬昧也精或為象人厭淫詐神思反德光武誕命靈貺自甄誕大也書曰誕膺天命甄明也靈貺謂佳氣神光之類也沈㡬先物深略緯文㡬者動之㣲也物事也沈深之㡬先見於事也諡法經緯天地曰文尋邑百萬貔虎為羣貔執夷虎屬也書曰如虎如貔言其猛勇也長轂雷野髙鋒彗雲長轂兵車雷野言其聲盛淮南子曰雷以為車輿彗埽也音詳鋭反英威既振新都自焚王莽初封為新都侯史記曰周武王伐紂紂衣其寳玉自焚而死莽雖被殺滅亡與紂同故假以言之䖍劉庸代紛紜梁趙䖍劉皆殺也左傳曰䖍劉我邉垂謂公孫述稱帝於庸蜀盧芳據代郡也紛紜喻亂也梁謂劉永趙謂王郎也三河未澄四闗重擾三河河南河北河東也未澄謂朱鮪等據洛州未歸光武也四闗謂長安四塞之國重擾謂更始已定闗中劉盆子入闗殺更始發掘諸陵也神旌乃顧遞行天討周禮曰析羽為旌稱神者猶言神兵神算也詩云乃眷西顧書云天討有罪也金湯失險車書共道前書曰金城湯池不可攻矣金以喻堅湯取其熱光武所撃皆失其險固也禮記曰天下車同軌書同文靈慶既啓人謀咸賛靈慶謂符䜟也左傳曰天啓之也人謀謂羣下勸即尊號也易曰人謀鬼謀百姓與能賛助也明眀廟謨赳赳雄斷詩曰眀明天子淮南子曰運籌於廟堂之上決勝千里之外赳赳武貌也於赫有命系隆我漢於赫歎羙之詞音烏詩云有命既集系猶繫也劉攽曰案天子適諸侯曰廵守守音狩耳字不作狩狩田獵之名春秋天王狩於河陽彼直謂狩獵不與廵守同而此書廵守字皆作狩不可盡改又案他書亦多作廵狩字盖世俗相傳迷誤已乆以彼證字或真以狩字為是故粗論之以曉學者又案光武改中元元年續漢志云改建武三十二年為建武中元元年中元仍冠建武字今紀無建武字誤脱之宋丞相作紀年譜亦常論此後漢書卷一下後漢書卷一下考證光武帝紀下比豐沛注髙祖豐沛邑人臣召南按應作沛豐邑人髙祖乃沛縣之豐邑人及即位後始置豐縣與沛縣並言豐沛也與車駕㑹髙平下劉攽曰注案髙平縣名後改為髙平不成文理盖合有一郡字臣承蒼按髙平本非郡名盖髙平縣後改為平髙見唐志邵為樂成侯注樂成縣故城在今瀛州樂府縣西北臣召南按樂府縣當是樂夀縣之訛唐無樂府縣其深州樂夀縣初𨽻瀛州舊唐志曰樂夀漢樂成縣是其証也焉為左翊公臣召南按左翊公當作左馮翊公脱馮字以中山簡王焉傳証之可見進幸葉章陵注葉縣故楚葉公邑屬南郡今許州縣也臣召南按南郡當作南陽郡唐葉縣本𨽻許州至開元後改𨽻汝州也夏四月甲戌車駕還宮癸酉詔曰諸本皆同臣松齡按癸酉移前甲戌移後寫者倒誤耳下文又云戊申幸河内戊子至河内按四月甲戌安得有戊申戊字明是甲字之訛觀下戊子可見韓國人率衆請樂浪内附注有辰韓下韓馬韓謂之三韓國也下韓應作弁韓屯聚青山注青山在今慶州烏嶺縣西北臣松齡按慶州祗有馬嶺縣無烏嶺縣後漢書卷一下考證
