body:
  text: 後漢書卷四十二宋宣城太守范煜撰唐章懷太子賢注王劉張李彭盧列傳第二王昌傳王昌一名郎趙國邯鄲人也素為卜相工明星歴常以為河北有天子氣時趙繆王子林景帝七代孫也好竒數術數任俠於趙魏間多通豪猾而郎與之親善初王莽簒位長安中或自稱成帝子子輿者莽殺之王莽傳曰時男子武仲自稱劉子輿郎緣是詐稱真子輿云母故成帝謳者嘗下殿卒僵須臾有黄氣從上下半日乃解遂􅗖身就館趙后欲害之趙飛鷰也偽易它人子以故得全東觀記曰宫婢生子正與同時即易之也輿年十二劉攽曰案上下文皆言子輿此少一子字識命者郎中李曼卿識命謂知天命也與俱至蜀十七到丹陽丹陽楚所封地在今歸州秭歸縣東也二十還長安展轉中山往來燕趙以須天時須待也林等愈動疑惑乃與趙國大豪李育張參等通謀規共立郎㑹人間傳赤眉將度河林等因此宣言赤眉當立劉子輿以觀衆心百姓多信之更始元年十二月林等遂率車騎數百晨入邯鄲城止於王宫故趙王之宫也立郎為天子林為丞相李育為大司馬張參為大將軍分遣將帥徇下幽冀移檄州郡曰制詔部刺史郡太守曰劉攽曰案文多下一曰字凡有曰字皆史臣所加詔不自言曰也朕孝成皇帝子子輿者也昔遭趙氏之禍因以王莽簒殺賴知命者將䕶朕躬東觀記曰知命者謂侍郎韓公等解形河濵削迹趙魏解形猶脱身也王莽竊位獲罪於天天命佑漢故使東郡太守翟義嚴鄉侯劉信擁兵征討出入胡漢普天率土知朕隱在人間南嶽諸劉為其先驅聖公光武本自舂陵北徙故舂陵近衡山故曰南嶽諸劉也朕仰觀天文乃興于斯以今月壬辰即位趙宫休氣熏蒸應時獲雨蓋聞為國子之襲父古今不易劉聖公未知朕故且持帝號諸興義兵咸以助朕皆當裂土享祚子孫已詔聖公及翟太守亟與功臣詣行在所天子所在曰行在所疑刺史二千石皆聖公所置未覩朕之沈滯或不識去就强者負力負恃也弱者惶惑今元元創痍已過半矣痍傷也朕甚悼焉故遣使者班下詔書郎以百姓思漢既多言翟義不死故詐稱之以從人望於是趙國以北遼東以西皆從風而靡明年光武自薊得郎檄南走信都走趣也音子豆反發兵徇旁縣遂攻栢人不下議者以為守栢人不如定鉅鹿光武乃引兵東北圍鉅鹿郎太守王饒據城數十日連攻不尅耿純説曰久守王饒士衆疲敝不如及大兵精銳進攻邯鄲若王郎已誅王饒不戰自服矣光武善其計乃留將軍鄧滿續漢書滿作蒲守鉅鹿而進軍邯鄲屯其郭北門郎數出戰不利乃使其諫議大夫杜威持節請降威雅稱郎實成帝遺體光武曰設使成帝復生天下不可得況詐子輿者乎威請求萬户侯光武曰顧得全身可矣顧猶念也威曰邯鄲雖鄙并力固守尚曠日月終不君臣相率但全身而已遂辭而去因急攻之二十餘日郎少傅李立為反間開門内漢兵遂拔邯鄲郎夜亡走道死追斬之劉永傳劉永者梁郡睢陽人梁孝王八世孫也傳國至父立元始中立與平帝外家衞氏交通衞氏平帝母家也中山衞子豪之女為王莽所誅更始即位永先詣洛陽紹封為梁王都睢陽永聞更始政亂遂據國起兵以弟防為輔國大將軍防弟少公御史大夫封魯王遂招諸郡豪傑沛人周建等並署為將帥攻下濟隂山陽沛楚淮陽汝南凡得二十八城又遣使拜西防賊帥山陽佼彊為横行將軍西防縣名故城在今宋州單父縣北佼音絞是時東海人董憲起兵據其郡而張步亦定齊地永遣使拜憲翼漢大將軍步輔漢大將軍與共連兵遂專據東方及更始敗永自稱天子建武二年夏光武遣虎牙大將軍蓋延等伐永初陳留人蘇茂為更始討難將軍與朱鮪等守洛陽鮪既降漢茂亦歸命光武因使茂與蓋延俱攻永軍中不相能茂遂反殺淮陽太守掠得數縣據廣樂而臣於永永以茂為大司馬淮陽王蓋延遂圍睢陽數月拔之永將家屬走虞虞縣名屬梁國故城在今宋州虞城縣虞人反殺其母及妻子永與麾下數十人奔譙蘇茂佼彊周建合軍救永為蓋延所敗茂奔還廣樂彊建從永走保湖陵三年春永遣使立張步為齊王董憲為海西王於是遣大司馬吳漢等圍蘇茂於廣樂周建率衆救茂茂建戰敗棄城復還湖陵而睢陽人反城迎永反音幡吳漢與蓋延等合軍圍之城中食盡永與茂建走鄼今亳州縣也鄼音在何反諸將追急永將慶吾斬永首降封吾為列侯蘇茂周建奔垂惠共立永子紆為梁王佼彊還保西防四年秋遣捕虜將軍馬武騎都尉王霸圍紆建於垂惠蘇茂將五校兵救之紆建亦出兵與武等戰不尅而建兄子誦反閉城門拒之建茂紆等皆走建於道死茂奔下邳與董憲合紆奔佼彊五年遣驃騎大將軍杜茂攻佼彊於西防彊與劉紆奔董憲時平狄將軍龎萌反叛遂襲破蓋延引兵與董憲連和自號東平王屯桃鄉之北桃鄉故城在今兖州龔丘縣西北也龎萌傳龎萌山陽人初亡命在下江兵中更始立以為冀州牧將兵屬尚書令謝躬共破王郎及躬敗萌乃歸降光武即位以為侍中萌為人遜順甚見信愛帝嘗稱曰可以託六尺之孤寄百里之命者解見明紀龎萌是也拜為平狄將軍與蓋延共擊董憲時詔書獨下延而不及萌萌以為延譖已自疑遂反帝聞之大怒乃自將討萌與諸將書曰吾常以龎萌社稷之臣將軍得無笑其言乎老賊當族其各厲兵馬㑹睢陽憲聞帝自討龎萌乃與劉紆蘇茂佼彊去下邳還蘭陵使茂彊助萌合兵三萬急圍桃城帝時幸蒙聞之乃留輜重自將輕騎三千步卒數萬晨夜馳赴師次任城去桃鄉六十里旦日諸將請進賊亦勒兵挑戰帝不聴乃休士養鋭以挫其鋒城中聞車駕至衆心益固時吳漢等在東郡馳使召之萌等乃悉兵攻城二十餘日衆疲困而不能下及吳漢與諸將到乃率衆軍進桃城而帝親自搏戰大破之萌茂彊夜棄輜重逃奔董憲乃與劉紆悉其兵數萬人屯昌慮自將鋭卒拒新陽新陽縣屬東海郡帝先遣吳漢擊破之憲走還昌慮漢進守之憲恐乃招誘五校餘賊步騎數千人屯建陽去昌慮三十里建陽縣屬東海郡故城在今沂州丞縣北丞音時證反帝至蕃蕃音皮又音婆去憲所百餘里諸將請進帝不聴知五校乏食當退勅各堅壁以待其敝頃之五校糧盡果引去帝乃親臨四面攻憲三日復大破之衆皆奔散遣吳漢追擊之佼彊將其衆降蘇茂奔張步憲及龎萌走入繒山繒縣名故城在今沂州丞縣東北繒山即其縣之山也數日吏士聞憲尚在復往往相聚得數百騎迎憲入郯城吳漢等復攻拔郯憲與龎萌走保胊縣名屬東海郡今海州朐山縣西有故朐城秦始皇立石以為東闕門即此地也劉紆不知所歸軍士髙扈斬其首降梁地悉平吳漢進圍朐明年城中穀盡憲萌潛出襲取贛榆贛榆縣名今海州東海縣也贛音貢琅邪太守陳俊攻之憲萌走澤中㑹吳漢下朐城進盡獲其妻子劉攽曰案文多一進字憲乃流涕謝其將士曰妻子皆已得矣為吳漢所得也嗟乎久苦諸卿乃將數十騎夜去欲從間道歸降而吳漢校尉韓湛追斬憲於方與方與音防預方與人黔陵亦斬萌皆傳首洛陽封韓湛為列侯黔陵為闗内侯張步傳張步字文公琅邪不其人也漢兵之起步亦聚衆數千轉攻傍縣下數城自為五威將軍遂據本郡更始遣魏郡王閎為琅邪太守步拒之不得進閎為檄曉諭吏人降得贛榆等六縣収兵數千人與步戰不勝時梁王劉永自以更始所立貪步兵彊承制拜步輔漢大將軍忠節侯督青徐二州使征不從命者步貪其爵號遂受之乃理兵於劇劇縣名在今青州夀光縣南也以弟𢎞為衞將軍𢎞弟藍𤣥武大將軍藍弟夀髙宻太守遣將徇太山東萊城陽膠東北海濟南徐諸郡皆下之步拓地寖廣寖漸也兵甲日盛王閎懼其衆散乃詣步相見欲誘以義方步大陳兵引閎怒曰步有何過君前見攻之甚乎閎按劒曰太守奉朝命而文公擁兵相距閎攻賊耳何謂甚邪步嘿然良久離席跪謝乃陳樂獻酒待以上賔之禮令閎關掌郡事關通也建武三年光武遣光祿大夫伏隆持節使齊拜步為東萊太守劉永聞隆至劇乃馳遣立步為齊王步即殺隆而受永命是時帝方北憂漁陽南事梁楚故步得專集齊地據郡十二及劉永死步等欲立永子紆為天子自為定漢公置百官王閎諫曰梁王以奉本朝之故是以山東頗能歸之今尊立其子將疑衆心且齊人多詐汲黯目公孫𢎞之詞宜且詳之步乃止五年步聞帝將攻之以其將費邑為濟南王屯歴下冬建威大將軍耿弇破斬費邑進拔臨淄步以弇兵少逺客可一舉而取乃悉將其衆攻弇於臨淄步兵大敗還奔劇帝自幸劇步退保平夀今青州北海縣也蘇茂將萬餘人來救之茂讓步曰以南陽兵精延岑善戰而耿弇走之大王奈何就攻其營既呼茂不能待邪步曰負負無可言者負愧也再言之者愧之甚帝乃遣使告步茂能相斬降者封為列侯步遂斬茂使使奉其首降步三弟各自繫所在獄皆赦之封步為安丘侯後與家屬居洛陽王閎亦詣劇降八年夏步將妻子逃奔臨淮與弟𢎞藍欲招其故衆乗船入海琅邪太守陳俊追擊斬之王閎者王莽叔父平阿侯譚之子也哀帝時為中常侍時倖臣董賢為大司馬寵愛貴盛閎屢諫忤㫖哀帝臨崩以璽綬付賢曰無妄以與人時國無嗣主内外恇懼閎白元后請奪之即帶劒至宣徳後闥三輔黄圖曰未央宫有宣徳殿闥宫中門也舉手叱賢曰宫車晏駕國嗣未立公受恩深重當俯伏號泣何事久持璽綬以待禍至邪賢知閎必死不敢拒之乃跪授璽綬閎馳上太后朝廷壯之及王莽簒位潛忌閎乃出為東郡太守閎懼誅常繫藥手内莽敗漢兵起閎獨完全東郡三十餘萬户歸降更始李憲傳李憲者潁川許昌人也王莽時為廬江屬令王莽每郡置屬令職如都尉莽末江賊王州公等起衆十餘萬攻掠郡縣莽以憲為偏將軍廬江連率擊破州公莽敗憲據郡自守更始元年自稱淮南王建武三年遂自立為天子置公卿百官擁九城衆十餘萬四年秋光武幸夀春遣揚武將軍馬成等擊憲圍舒廬江舒縣至六年正月抜之憲亡走其軍士帛意帛姓也宋帛産之後也見韓非子也追斬憲而降憲妻子皆伏誅封帛意漁浦侯後憲餘黨淳于臨等猶聚衆數千人屯灊山攻殺安風令灊山安豐皆縣名屬廬江郡灊縣故城今夀州也劉攽曰案傳作安風注作安豐安風安豐皆是縣名從傳是揚州牧歐陽歙遣兵不能尅帝議欲討之廬江人陳衆為從事白歙請得喻降臨曉喻其意而降之也於是乗單車駕白馬往説而降之灊山人共生為立祠號曰白馬陳從事云彭寵傳彭寵字伯通南陽宛人也父宏哀帝時為漁陽太守偉容貌能飲飯飯音扶逺反有威於邊王莽居攝誅不附已者宏與何武鮑宣並遇害寵少為郡吏地皇中為大司空士王莽時九卿分屬三公每一卿置元士三人劉攽曰案王莽傳一卿置大夫三人一大夫置士三人此文不具少置大夫三人一大夫八字從王邑東拒漢軍到洛陽聞同産弟在漢兵中懼誅即與鄉人吳漢亡至漁陽抵父時吏抵歸也更始立使謁者韓鴻持節徇北州謂幽并也承制得專拜二千石以下鴻至薊以寵漢並鄉閭故人相見歡甚即拜寵偏將軍行漁陽太守事漢安樂令安樂縣名屬漁陽郡故城在今幽州潞縣西北也及光武鎮慰河北至薊以書招寵寵具牛酒將上謁㑹王郎詐立傳檄燕趙遣將徇漁陽上谷急發其兵北州衆多疑惑欲從之吳漢説寵從光武語在漢傳㑹上谷太守耿況亦使功曹寇恂詣寵結謀共歸光武寵乃發步騎三千人以吳漢行長史及都尉嚴宣䕶軍蓋延狐奴令王梁狐奴縣名屬漁陽郡與上谷軍合而南及光武於廣阿光武承制封寵建忠侯賜號大將軍遂圍邯鄲寵轉糧食前後不絶及王郎死光武追銅馬北至薊寵上謁自負其功意望甚髙負恃也光武接之不能滿以此懷不平不能滿其意故心不平也光武知之以問幽州牧朱浮浮對曰前吳漢北發兵時大王遺寵以所服劍又倚以為北道主人寵謂至當迎閤握手交歡並坐今既不然所以失望浮因曰王莽為宰衡時甄豐旦夕入謀議時人語曰夜半客甄長伯長伯豐字也豐平帝時為少府王莽簒位時為更始將軍及莽簒位後豐意不平卒以誅死光武大笑以為不至於此及即位吳漢王梁寵之所遣並為三公而寵獨無所加愈怏怏不得志歎曰我功當為王但爾者陛下忘我邪是時北州破散而漁陽差完有舊鹽鐵官寵轉以貿穀貿易也積珍寳益富彊朱浮與寵不相能浮數譖搆之建武二年春詔徴寵寵意浮賣已上疏願與浮俱徴又與吳漢蓋延等書盛言浮枉狀枉譖己之狀也固求同徴帝不許益以自疑而其妻素剛不堪抑屈固勸無受召寵又與常所親信吏計議皆懷怨於浮莫有勸行者帝遣寵從弟子后蘭卿喻之寵因留子后蘭卿遂發兵反拜署將帥自將二萬餘人攻朱浮於薊分兵徇廣陽上谷右北平又自以與耿況俱有重功而恩賞並薄數遣使要誘況況不受輙斬其使秋帝使㳺擊將軍鄧隆救薊隆軍潞南浮軍雍奴遣吏奏狀帝讀檄怒謂使吏曰營相去百里其勢豈可得相及比若還若汝也北軍必敗矣寵果盛兵臨河以拒隆又别發輕騎三千襲其後大破隆軍浮逺遂不能救引而去明年春寵遂拔右北平上谷數縣遣使以美女繒綵賂遺匈奴要結和親單于使左南將軍七八千騎往來為㳺兵以助寵又南結張步及富平獲索諸豪桀皆與交質連衡交質謂交相為質也左傳曰交質往來道路無壅前書音義曰以利合曰從以威力相脅曰衡遂攻拔薊城自立為燕王其妻數惡夢又多見怪變東觀記曰夢臝袒冠幘踰城髠徒推之又寵堂上聞蝦蟇聲在火鑪下鑿地求之不得也卜筮及望氣者皆言兵當從中起寵疑子后蘭卿質漢歸故不信之使將兵居外無親於中五年春寵齋獨在便室便坐之室非正室也蒼頭子宻等三人因寵卧寐共縛著牀告外吏云大王齋禁皆使吏休偽稱寵命教収縛奴婢各置一處劉攽曰案文多一命字教即勅下之書下文自有命字又以寵命呼其妻妻入大驚東觀記曰妻入驚曰奴反奴乃捽其妻頭擊其頰寵急呼曰趣為諸將軍辦裝呼奴為將軍欲其赦已也於是兩奴將妻入取寳物留一奴守寵寵謂守奴曰若小兒我素愛也今為子宻所迫劫耳解我縳當以女珠妻汝家中財物皆與若小奴意欲解之視户外見子宻聴其語遂不敢解於是収金玉衣物至寵所裝之被馬六疋使妻縫兩縑囊昏夜後解寵手令作記告城門將軍云今遣子宻等至子后蘭卿所速開門出勿稽留之稽停也書成即斬寵及妻頭置囊中便持記馳出城因以詣闕封為不義侯明旦閤門不開官屬踰牆而入見寵屍驚怖其尚書韓立等共立寵子午為王以子后蘭卿為將軍國師韓利斬午首詣征虜將軍祭遵降夷其宗族盧芳傳盧芳字君期安定三水人也居左谷中續漢志曰三水縣有左右谷故城在今涇州安定縣南王莽時天下咸思漢徳芳由是詐自稱武帝曽孫劉文伯曽祖母匈奴谷蠡渾邪王之姊為武帝皇后生三子遭江充之亂太子誅皇后坐死中子次卿亡之長陵小子回卿逃於左谷霍將軍立次卿迎回卿回卿不出因居左谷生子孫卿孫卿生文伯常以是言誑惑安定間王莽末乃與三水屬國羌胡起兵更始至長安徴芳為騎都尉使鎮撫安定以西更始敗三水豪傑共計議以芳劉氏子孫宜承宗廟乃共立芳為上將軍西平王欲平定西方故以為號使使與西羌匈奴結和親單于曰匈奴本與漢約為兄弟髙祖時與冒頓單于約為兄弟後匈奴中衰呼韓邪單于歸漢漢為發兵擁䕶世世稱臣呼韓邪單于降漢入朝宣帝擁䕶國内遂定今漢亦中絶劉氏來歸我亦當立之令尊事我乃使句林王將數千騎迎芳句音古侯反芳與兄禽弟程俱入匈奴單于遂立芳為漢帝以程為中郎將將胡騎還入安定初五原人李興隨昱朔方人田颯代郡人石鮪閔堪各起兵自稱將軍建武四年單于遣無樓且渠王入五原塞塞屬五原郡因以為名與李興等和親告興欲令芳還漢地為帝五年李興閔堪引兵至單于庭迎芳與俱入塞都九原縣九原縣名故城在勝州銀山縣也掠有五原朔方雲中定襄鴈門五郡並置守令與胡通兵侵苦北邊六年芳將軍賈覽將胡騎擊殺代郡太守劉興芳後以事誅其五原太守李興兄弟而其朔方太守田颯雲中太守橋扈恐懼叛芳舉郡降光武令領職如故後大司馬吳漢驃騎大將軍杜茂數擊芳並不尅十二年芳與賈覽共攻雲中久不下其將隨昱留守九原欲脅芳降芳知羽翼外附心膂内離遂棄輜重與十餘騎亡入匈奴其衆盡歸隨昱昱乃隨使者程恂詣闕拜昱為五原太守封鐫胡侯鐫謂琢鑿之故以為名下有鐫羌侯即其類昱弟憲武進侯十六年芳復入居髙栁髙栁縣名故城在今雲州定襄縣與閔堪兄林使使請降乃立芳為代王堪為代相林為代太傅賜繒二萬匹因使和集匈奴芳上疏謝曰臣芳過托先帝遺體棄在邊陲社稷遭王莽廢絶以是子孫之憂所宜共誅故遂西連羌戎北懷匈奴單于不忘舊徳權立救助是時兵革並起往往而在臣非敢有所貪覬覬望也期於奉承宗廟興立社稷是以久僭號位十有餘年罪宜萬死陛下聖徳髙明躬率衆賢海内賔服惠及殊俗以胏附之故胏附若肝胏相附著猶言親戚也赦臣芳罪加以仁恩封為代王使備北藩無以報塞重責冀必欲和輯匈奴輯音才入反郭景純云古集字不敢遺餘力負恩貸負猶背也謹奉天子玉璽思望闕庭詔報芳朝明年正月其冬芳入朝南及昌平昌平縣名故城在今幽州昌平縣東南有詔止令更朝明嵗芳自道還憂恐乃復背叛遂反與閔堪閔林相攻連月匈奴遣數百騎迎芳及妻子出塞芳留匈奴中十餘年病死初安定屬國胡與芳為寇及芳敗胡人還鄉里積苦縣官徭役其中有駮馬少伯者素剛壯二十一年遂率種人反叛與匈奴連和屯聚青山青山在今慶州有青山水乃遣將兵長史陳訢吕忱云訢古欣字率三千騎擊之少伯乃降徙於冀縣冀縣屬天水郡今秦州伏羌縣論曰傳稱盛徳必百世祀左傳晉侯問於史趙曰陳其遂亡乎對曰未也臣聞盛徳必百代祀虞之代數未也孔子曰寬則得衆夫能得衆心則百世不忘矣觀更始之際劉氏之遺恩餘烈英雄豈能抗之哉然則知髙祖孝文之寛仁結於人心深矣周人之思召公愛其甘棠詩序曰甘棠美召伯也召伯聴訟於廿棠之下周人思之不伐其樹又況其子孫哉劉氏之再受命蓋以此乎若數子者豈有國之逺圖哉劉攽曰案文國上少一字不成文理蓋有經字也因時擾攘茍恣縱而已耳然猶以附假宗室能掘强嵗月之間掘强謂强梁也前書伍被謂淮南王安曰掘强江淮之間茍延嵗月之命觀其智略固無足以憚漢祖發其英靈者也此言數子非漢祖之敵不足奮發英靈而憚畏之也贊曰天地閉革革改也易曰天地閉賢人隱又曰天地革而四時成湯武革命順乎天而應乎人野戰羣龍喻英雄並起也易曰龍戰于野其血𤣥黄又曰羣龍无首吉也昌芳僭詐梁齊連鋒梁王劉永齊王張步寵負强地據漁陽也憲縈深江起廬江也實惟非律代委神邦易曰師出以律律法也言反叛非用師之法故更代破滅委棄其神臯之國伏於光武也後漢書卷四十二後漢書卷四十二考證王昌傳賴知命者將䕶朕躬注東觀記曰知命者謂侍郎韓公等臣承蒼按上文已言識命者郎中李曼卿此知命者即曼卿也李憲傳攻殺安風令劉攽刊誤安風安豐皆縣名從傳是臣㑹汾按郡國志安風安豐皆屬廬江郡安風為侯國而安豐則縣也傳言殺令似當從注作安豐後漢書卷四十二考證
