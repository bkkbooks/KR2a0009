body:
  text: 後漢書卷一百十一宋宣城太守范煜撰唐章懐太子賢注獨行列傳第七十一孔子曰與其不得中庸必也狂狷乎庸常也中和可常行之道謂之中庸言若不得中庸之人與之居必也須得狂狷之人又云狂者進取狷者有所不為也此是錄論語者因夫子之言而釋狂狷之人也此蓋失於周全之道而取諸偏至之端者也然則有所不為亦將有所必為者矣既云進取亦將有所不取者矣如此性尚分流為否異適矣人之好尚不同或為或否各有所適中世偏行一介之夫能成名立方者盖亦衆也或志剛金石而剋扞於强禦謂劉茂衞福也或意嚴冬霜而甘心於小諒戴就陸續也亦有結朋協好幽明共心范式張劭也蹈義陵險死生等節繆肜李善也雖事非通圓良其風軌有足懐者而情迹殊雜難為條品片辭特趣不足區别措之則事或有遺措置也載之則貫序無統以其名體雖殊而操行俱絶故總為獨行篇焉庶備諸闕文紀志漏脫云爾譙𤣥傳譙𤣥字君黄巴郡閬中人也少好學能說易春秋仕於州郡成帝永始二年有日食之災乃詔舉敦樸遜讓有行義者各一人州舉𤣥詣公車對策髙第拜議郎帝始作期門數為微行前書武帝微行常與侍中常侍武騎及待詔北地良家子能騎射者期諸殿門故有期門之號自此始也成帝微行亦然故言始也立趙飛燕為皇后后專寵懐忌皇太子多横夭折𤣥上書諫曰臣聞王者承天繼宗統極保業延祚莫急𦙍嗣故易有幹蠱之義詩詠衆多之福易曰幹父之蠱注云蠱事也毛詩曰螽斯后妃之徳也后妃不妬忌則子孫衆多也其詩曰螽斯羽詵詵兮宜爾子孫振振兮今陛下聖嗣未立天下屬望而不惟社稷之計專念微行之事愛幸用於所惑曲意留於非正竊聞後宫皇子産而不育前書成帝宫人曹偉能及許美人皆生子趙昭儀皆令殺之臣聞之怛然痛心傷剝竊懐憂國不忘須臾夫警衞不脩則患生非常忽有醉酒狂夫分争道路既無尊嚴之儀豈識上下之别此為胡狄起於轂下而賊亂發於左右也願陛下念天下之至重愛金玉之身均九女之施九女解見崔𤦺傳存無窮之福天下幸甚時數有災異𤣥輒陳其變既不省納故久稽郎官後遷太常丞以弟服去職平帝元始元年日食又詔公卿舉敦朴直言大鴻臚左咸舉𤣥詣公車對䇿復拜議郎遷中散大夫四年選明逹政事能班化風俗者八人時並舉𤣥為繡衣使者前書御史大夫領繡衣直指出討姦猾理大獄武帝所制不常置持節與太僕任惲等分行天下觀覽風俗所至專行誅賞事未及終而王莽居攝𤣥於是縱縱舎也使者車變易姓名間竄歸家間私也因以隱遁後公孫述僣號於蜀連聘不詣述乃遣使者備禮徵之若𤣥不肻起便賜以毒藥太守乃自齎璽書至𤣥廬曰君髙節已著朝廷垂意誠不宜復辭自招凶禍𤣥仰天歎曰唐堯大聖許由耻仕周武至徳伯夷守餓彼獨何人我亦何人保志全髙死亦奚恨遂受毒藥𤣥子瑛泣血叩頭於太守曰方今國家東有嚴敵兵師四出國用軍資或不常充足願奉家錢千萬以贖父死太守為請述聼許之𤣥遂隱藏田野終述之世時兵戈累年莫能脩尚學業𤣥獨訓諸子勤習經書建武十一年卒明年天下平定𤣥弟慶以狀詣闕自陳光武美之策詔本郡祠以中牢勅所在還𤣥家錢時亦有犍為費貽不肻仕述劉攽曰案文亦字乃合在不字上乃漆身為厲陽狂以避之退藏山藪十餘年述破後仕至合浦太守瑛善説易以授顯宗為北宫衞士令漢官儀曰北宫衞士令一人秩六百石李業傳李業字巨游廣漢梓潼人也少有志操介特習魯詩師博士許晃元始中舉明經除為郎元始平帝年也會王莽居攝業以病去官杜門不應州郡之命太守劉咸強召之業乃載病詣門咸怒出教曰賢者不避害譬猶彀弩射市薄命者先死聞業名稱故欲與之為治而反託疾乎令詣獄養病欲殺之客有說咸曰趙殺鳴犢孔子臨河而逝史記曰孔子既不得用於衞將西見趙簡子至於河而聞竇鳴犢舜華之死也臨河而歎曰美哉河水洋洋乎丘之不濟命也夫子貢進曰敢問何謂也孔子曰竇鳴犢舜華晉國之賢大夫也趙簡子未得志之時須此兩人而後從政丘聞之也刳胎殺天則騏驎不至竭澤而漁則蛟龍不合覆巢毁卵則鳯凰不翔何則君子諱傷其類夫鳥獸之於不義也尚知避之而况乎丘哉乃還也未聞求賢而脅以牢獄者也咸乃出之因舉方正王莽以業為酒士王莽時官酤酒故置酒士也病不之官遂隱藏山谷絶匿名迹終莽之世及公孫述僣號素聞業賢徵之欲以為博士業固疾不起數年述羞不致之乃使大鴻臚尹融持毒酒奉詔命以劫業若起則受公侯之位不起賜之以藥融譬㫖曰方今天下分崩孰知是非而以區區之身試於不測之淵乎朝廷貪慕名徳曠官缺位于今七年四時珍御不以忘君宜上奉知己下為子孫身名俱全不亦優乎今數年不起猜疑寇心凶禍立加非計之得者也業乃歎曰危國不入亂國不居論語孔子曰危邦不入亂邦不居天下有道則見無道則隱親於其身為不善者義所不從君子見危授命論語曰親於其身為不善者君子不入又曰君子見危授命見得思義何乃誘以髙位重餌哉融見業辭志不屈復曰宜呼室家計之業曰以丈夫斷之於心久矣何妻子之為遂飲毒而死述聞業死大驚又耻有殺賢之名乃遣使弔祠賻贈百匹業子翬逃辭不受蜀平光武下詔表其閭益部紀載其髙節圗畫形象初平帝時蜀郡王皓為美陽令王嘉為郎王莽簒位並棄官西歸及公孫述稱帝遣使徵皓嘉恐不至遂先繫其妻子使者謂嘉曰速裝妻子可全對曰犬馬猶識主況於人乎王皓先自刎以首付使者述怒遂誅皓家屬王嘉聞而歎之曰後之哉乃對使者伏劍而死是時犍為任永及業同郡馮信並好學博古公孫述連徵命待以髙位皆託青盲以避世難永妻淫於前匿情無言見子入井忍而不救信侍婢亦對信姦通及聞述誅皆盥洗更視曰世適平目即清淫者自殺光武聞而徵之並會病卒劉茂傳劉茂字子衞太原晉陽人也少孤獨與母居家貧以筋力致養孝行著於鄉里及長能習禮經教授常數百人哀帝時察孝廉再遷五原屬國侯遭母憂去官服竟後為沮陽令沮陽縣屬上谷郡故城在今媯州東沮音阻會王莽簒位茂棄官避世𢎞農山中教授建武二年歸為郡門下掾時赤眉二十餘萬衆攻郡縣殺長吏及府掾史茂負太守孫福踰墻藏空穴中得免其暮俱奔盂縣今并州盂縣也晝則逃隠夜求糧食積百餘日賊去乃得歸府明年詔書求天下義士福言茂曰臣前為赤眉所攻吏民壊亂奔走趣山臣為賊所圍命如絲髪賴茂負臣踰城出保盂縣茂與弟觸冒兵刃緣山負食臣及妻子得度死命節義尤髙宜䝉表擢以厲義士詔書即徴茂拜議郎遷宗正丞續漢書宗正丞一人比千石也後拜侍中卒官元初中鮮卑數百餘騎寇漁陽太守張顯率吏士追出塞遥望虜營烟火急趣之兵馬掾嚴授慮有伏兵苦諫止不聼顯䠞令進授不獲已前戰伏兵發授身被十創殁於陣顯拔刃追散兵不能制虜射中顯主簿衞福功曹徐咸遽赴之顯遂墮馬福以身擁蔽虜并殺之朝廷愍授等節詔書褒歎厚加賞賜各除子一人為郎中永初二年劇賊畢豪等入平原界縣令劉雄將吏士乘船追之至厭次河厭次縣之河也與賊合戰雄敗執雄以矛刺之時小吏所輔所姓也風俗通曰宋大夫華所事之後也漢有所忠為諫議大夫前叩頭求哀願以身代雄豪等縱雄而刺輔貫心洞背即死東郡太守捕得豪等具以狀上詔書追傷之賜錢二十萬除父奉為郎中溫序傳溫序字次房太原祁人也仕州從事建武二年騎都尉弓里戌弓里姓也將兵平定北州到太原歴訪英俊大人問以策謀戌見序竒之上疏薦焉於是徴為侍御史遷武陵都尉病免官六年拜謁者遷䕶羗校尉序行部至襄武為隗囂别將茍宇所拘劫宇謂序曰子若與我并威同力天下可圖也序曰受國重任分當效死義不貪生茍背恩徳宇等復曉譬之序素有氣力大怒叱宇等曰虜何敢迫脇漢將因以節撾殺數人賊衆爭欲殺之宇止之曰此義士死節可賜以劒序受劒銜鬚於口顧左右曰既為賊所迫殺無令鬚汙土遂伏劒而死序主簿韓遵從事王忠持屍歸斂光武聞而憐之命忠送䘮到洛陽賜城傍為冢地賻榖千斛縑五百匹除三子為郎中長子壽服竟為鄒平侯相夢序告之曰久客思鄉里壽即棄官上書乞骸骨歸葬帝許之乃反舊塋焉序墓在今并州祁縣西北彭脩傳彭脩字子陽會稽毘陵人也毘陵今常州晉陵縣也吳地記曰本名延陵吳王諸樊封季札漢改曰毘陵年十五時父為郡吏得休休假也與脩俱歸道為盜所劫脩困迫乃拔佩刀前持盜帥曰父辱子死卿不顧死邪盜相謂曰此童子義士也不宜逼之遂辭謝而去鄉黨稱其名後仕郡為功曹時西部都尉宰鼂行太守事應劭漢官曰都尉秦官也本名郡尉掌佐太守典其武職秩比二千石孝景時更名都尉以微過收吳縣獄吏將殺之主簿鍾離意争諫甚切鼂怒使收縳意欲案之掾史莫敢諫脩排閣直入拜於庭曰明府發雷霆於主簿請聞其過鼂曰受教三日初不奉行廢命不忠豈非過邪脩因拜曰昔任座面折文侯解見文苑禰衡傳朱雲攀毁欄檻前書成帝時朱雲上書請以尚方斬馬劒斬張禹上欲殺之雲攀折殿檻西京雜記云攀折玉檻自非賢君焉得忠臣今慶明府為賢君主簿為忠臣鼂遂原意罰貰獄吏罪後州辟從事時賊張子林等數百人作亂郡言州請脩守吳令脩與太守俱出討賊賊望見車馬競交射之飛矢雨集脩障扞太守而為流矢所中死太守得全賊素聞其恩信即殺弩中脩者餘悉皆降散言曰自為彭君故降不為太守服也索盧放傳索盧放字君陽索盧姓也東郡人也以尚書教授千餘人初署郡門下掾更始時使者督行郡國太守有事當就斬刑放前言曰今天下所以苦毒王氏歸心皇漢者實以聖政寛仁故也而傳車所過未聞恩澤太守受誅誠不敢言但恐天下惶懼各生疑變夫使功者不如使過若秦穆赦孟明而用之霸西戎願以身代太守之命遂前就斬使者義而赦之由是顯名建武六年徴為洛陽令政有能名以病乞身徙諫議大夫數納忠言後以疾去建武末復徵不起光武使人輿之見於南宫雲臺賜榖二千斛遣歸除子為太子中庶子卒於家續漢書曰太子中庶子秩六百石周嘉傳周嘉字惠文汝南安城人也髙祖父燕宣帝時為郡決曹掾太守欲枉殺人燕諫不聼遂殺囚而黜燕囚家守闕稱寃詔遣覆考燕見太守曰願謹定文書皆著燕名府君但言時病而已出謂掾史曰諸君被問悉當以罪推燕如有一言及於府君燕手劒相刃使乃收燕劉攽曰案文少一者字繫獄屢被掠楚辭無屈撓當下蠶室乃嘆曰我平王之後正公𤣥孫謝承書曰燕字少卿其先出自周平王之後漢興紹嗣封為正公食采於汝墳也豈可以刀鋸之餘下見先君遂不食而死燕有五子皆至刺史太守嘉仕郡為主簿王莽末羣賊入汝陽城嘉從太守何敞討賊敞為流矢所中郡兵奔北賊圍繞數十重白刃交集嘉乃擁敞以身扞之因呵賊曰卿曹皆人隸也為賊既逆豈有還害其君者邪嘉請以死贖君命因仰天號泣羣賊於是兩兩相視曰此義士也給其車馬遣送之後太守寇恂舉為孝廉拜尚書侍郎光武引見問以遭難之事嘉對曰太守被傷命懸寇手臣實駑怯不能死難帝曰此長者也詔嘉尚公主嘉稱病篤不肻當稍遷零陵太守視事七年卒零陵頌其遺愛吏民為立祠焉嘉從弟暢字伯持性仁慈為河南尹永初二年夏旱久禱無應暢因收葬洛城傍客死骸骨凡萬餘人應時澍雨嵗乃豐稔位至光祿勲范式傳范式字巨卿山陽金鄉人也一名汜少遊太學為諸生與汝南張劭為友劭字元伯二人並告歸鄉里式謂元伯曰後二年當還將過拜尊親見孺子焉見其子也孺子稚子也乃共尅期日後期方至元伯具以白毋請設饌以候之毋曰二年之别千里結言爾何相信之審邪對曰巨卿信士必不乖違母曰若然當為爾醞酒至其日巨卿果到升堂拜飲盡歡而别式仕為郡功曹後元伯寢疾篤同郡郅君章殷子徵晨夜省視之元伯臨盡歎曰恨不見吾死友子徵曰吾與君章盡心於子是非死友復欲誰求元伯曰若二子者吾生友耳山陽范巨卿所謂死友也尋而卒式忽夢見元伯𤣥冕垂纓屣履而呼曰巨卿吾以某日死當以爾時葬永歸黄泉子未我忘豈能相及式怳然覺寤悲歎泣下具告太守請往奔䘮太守雖心不信而重違其情許之式便服朋友之服儀禮䘮服記曰朋友在它國袒免歸則己注云謂無親者為之主䘮服又曰朋友麻注云朋友雖無親有同道之恩相為服緦之絰帯投其葬日馳往赴之式未及到而䘮已發引既至壙將窆窆下棺也而柩不肻進其母撫之曰元伯豈有望邪遂停柩移時乃見有素車白馬號哭而來其母望之曰是必范巨卿也巨卿既至叩䘮言曰行矣元伯死生路異永從此辭會葬者千人咸為揮涕式因執紼而引柩於是乃前式遂留止冢次為脩墳樹然後乃去後到京師受業太學時諸生長沙陳平子亦同在學與式未相見而平子被病將亡謂其妻曰吾聞山陽范巨卿烈士也可以託死吾殁後但以屍埋巨卿户前乃裂素為書以遺巨卿既終妻從其言時式出行適還省書見瘞愴然感之向墳揖哭以為死友乃營䕶平子妻兒身自送䘮於臨湘未至四五里乃委素書於柩上哭别而去其兄弟聞之尋求不復見長沙上計掾史到京師上書表式行狀三府並辟不應舉州茂才四遷荆州刺史友人南陽孔嵩家貧親老乃變姓名傭為新野縣阿里街卒阿里里名也式行部到新野而縣選嵩為導騎迎式導引之騎式見而識之呼嵩把臂謂曰子非孔仲山邪對之歎息語及平生曰昔與子俱曵長裾遊息帝學吾䝉國恩致位牧伯而子懐道隱身處於卒伍不亦惜乎嵩曰侯嬴長守於賤業史記曰侯嬴年七十家貧為大梁夷門卒魏公子聞之往請欲厚遺之不肻受曰臣脩身潔行數十年終不以監門困故受公子財晨門肆志於抱闗解見張皓傳子欲居九夷不患其陋論語曰孔子欲居九夷或曰陋如之何子曰君子居之何陋之有貧者士之宜豈為鄙哉式􅃯縣代嵩嵩以為先傭未竟不肻去嵩在阿里正身厲行街中子弟皆服其訓化遂辟公府之京師道宿下亭盜共竊其馬尋問知其嵩也乃相責讓曰孔仲山善士豈宜侵盜乎於是送馬謝之嵩官至南海太守式後遷廬江太守有威名卒於官李善傳李善字次孫南陽淯陽人本同縣李元蒼頭也建武中疫疾元家相繼死沒唯孤兒續始生數旬而貲財千萬諸奴婢私共計議欲謀殺續分其財産善深傷李氏而力不能制乃潛負續逃亡隱山陽瑕丘界中親自哺養乳為生湩湩乳汁也音竹用反推燥居濕備嘗艱勤續雖在孩抱奉之不異長君有事輒長跪請白然後行之閭里感其行皆相率脩義續年十嵗善與歸本縣脩理舊業告奴婢於長吏悉收殺之時鍾離意為瑕丘令上書薦善行狀光武詔拜善及續並為太子舎人善顯宗時辟公府以能理劇再遷日南太守從京師之官道經淯陽過李元冢未至一里乃脫朝服持鉏去草及拜墓哭泣甚悲身自炊㸑執鼎爼以脩祭祀垂泣曰君夫人善在此盡哀數日乃去到官以愛惠為政懐來異俗遷九江太守未至道病卒續至河間相王忳傳王忳字少林忳音純廣漢新都人也忳嘗詣京師於空舎中見一書生疾困愍而視之書生謂忳曰我當到洛陽而被病命在須臾腰下有金十斤願以相贈死後乞藏骸骨未及問姓名而命絶忳即鬻一斤營其殯葬餘金悉置棺下人無知者後歸數年縣署忳大度亭長初到之日有馬馳入亭中而止其日大風飄一繡被復墮忳前即言之於縣縣以歸忳忳後乘馬到雒縣馬遂奔走牽忳入它舎主人見之喜曰今禽盜矣問忳所由得馬忳具說其狀并及繡被主人悵然良久乃曰被隨旋風與馬俱亡卿何陰徳而致此二物忳自念有葬書生事因說之并道書生形貎及埋金之處主人大驚號曰是我子也姓金名彦前往京師不知所在何意卿乃葬之大恩久不報天以此章卿徳耳忳悉以被馬還之彦父不取又厚遺忳忳辭讓而去時彦父為州從事因告新都令假忳休息自與俱迎彦䘮餘金具存忳由是顯名仕郡功曹州治中從事舉茂才除郿令到官至斄亭斄音台亭長曰亭有鬼數殺過客不可宿也忳曰仁勝凶邪徳除不祥何鬼之避即入亭止宿夜中聞有女子稱寃之聲忳咒曰有何枉狀可前求理乎女子曰無衣不敢進忳便投衣與之女子乃前訴曰妾夫為涪令之官過宿此亭亭長無狀枉殺妾家十餘口埋在樓下悉盜取財貨忳問亭長姓名女子曰即今門下游徼者也忳曰汝何故數殺過客對曰妾不得白日自訴每夜陳寃客輒眠不見應不勝感恚故殺之忳曰當為汝理此寃勿復殺良善也因解衣於地忽然不見明旦召游徼詰問具服罪即収繫及同謀十餘人悉伏辜遣吏送其䘮歸鄉里於是亭遂清安張武傳張武者吳郡由拳人也由拳縣故城在今蘇州嘉興縣南父業郡門下掾送太守妻子還鄉里至河内亭盜夜劫之業與賊戰死遂亡失屍骸武時年㓜不及識父後之太學受業每節常持父遺劒至亡處祭醊泣而還太守第五倫嘉其行舉孝廉遭母䘮過毁傷父魂靈不返因哀慟絶命陸續傳陸續字智初會稽吳人也世為族姓祖父閎字子春建武中為尚書令美姿貎喜着越布單衣光武見而好之自是常􅃯會稽郡獻越布續㓜孤仕郡戸曹史時嵗荒民飢困太守尹興使續於都亭賦民饘粥續悉簡閲其民訊以名氏事畢興問所食㡬何續因口說六百餘人皆分别姓名無有差謬興異之刺史行部見續辟為别駕從事以病去還為郡門下掾是時楚王英謀反陰疏天下善士及楚事覺顯宗得其錄有尹興名乃徵興詣廷尉獄續與主簿梁宏功曹史駟勲及掾史五百餘人詣洛陽詔獄就考諸吏不堪痛楚死者太半唯續宏勲掠考五毒肌肉消爛終無異辭續母逺至京師覘候消息獄事特急無緣與續相聞母但作饋食付門卒以進之續雖見考苦毒而辭色慷慨未嘗易容唯對食悲泣不能自勝使者怪而問其故續曰母來不得相見故泣耳使者大怒以為獄門吏卒通傳意氣召將案之續曰因食餉羮識母所自調和故知來耳非人告也使者問何以知母所作乎續曰母嘗截肉未嘗不方劉攽曰案文上嘗當作常斷葱以寸為度是以知之使者問諸謁舎謁舎所謂停主人之舎也續母果來於是陰嘉之上書說續行狀帝即赦興等事還鄉里禁錮終身續以老病卒長子稠廣陵太守有理名中子逢樂安太守少子襃力行好學不慕榮名連徵不就襃子康已見前傳戴封傳戴封字平仲濟北剛人也剛縣故城在今兗州龔丘縣東北年十五詣太學師事鄮令東海申君申君卒送䘮到東海道當經其家父母以封當還豫為娶妻封暫過拜親不宿而去還京師卒業時同學石敬平溫病卒封養視殯斂以所齎糧市小棺送䘮到家更斂見敬平行時書物皆在棺中乃大異之封後遇賊財物悉被略奪唯餘縑七匹賊不知處封乃追以與之曰知諸君乏故送相遺賊驚曰此賢人也盡還其器物後舉孝廉光禄主事遭伯父䘮去官詔書求賢良方正直言之士有至行能消災伏異者公卿郡守各舉一人郡及大司農俱舉封公車徴陛見對策第一擢拜議郎遷西華令時汝潁有蝗災獨不入西華界時督郵行縣蝗忽大至督郵其日即去蝗亦頓除一境竒之其年大旱封禱請無獲乃積薪坐其上以自焚火起而大雨暴至於是逺近歎服遷中山相時諸縣囚四百餘人辭狀已定當行刑封哀之皆遣歸家與剋期日皆無違者詔書策美焉永元十二年徵拜太常卒官李充傳李充字大遜陳留人也家貧兄弟六人同食遞衣妻竊謂充曰今貧居如此難以久安妾有私財願思分異充偽酬之曰如欲别居當醞酒具會請呼鄉里内外共議其事婦從充置酒讌客充於坐中前跪白母曰此婦人無狀而教充離間母兄罪合遣斥便呵叱其婦逐令出門婦銜涕而去坐中驚肅因遂罷散充後遭母䘮行服墓次有人盜其墓樹者充手自殺之服闋立精舎講授太守魯平請署功曹不就平怒乃援充以捐溝中因讁署縣都亭長不得已起親職役後和帝公車徵不行延平中詔公卿中二千石各舉隱士大儒務取髙行以勸後進特徴充為博士時魯平亦為博士每與集會常歎服焉充遷侍中大將軍鄧騭貴戚傾時無所下借下音假借音子夜反以充髙節每卑敬之嘗置酒請充賔客滿堂酒酣騭跪曰幸託椒房位列上將幕府初開欲辟天下竒偉以匡不逮惟諸君博求其器充乃為陳海内隱居懐道之士頗有不合騭欲絶其說以肉啖之充抵肉於地曰說士猶甘於肉遂出徑去騭甚望之同坐汝南張孟舉往讓充曰一日聞足下與鄧將軍說士未究一日猶昨日也激刺面折不由中和出言之責非所以光祚子孫者也充曰大丈夫居世貴行其意何能逺為子孫計哉由是見非於貴戚遷左中郎將年八十以為國三老安帝常特進見賜以几杖卒於家繆肜傳繆肜字豫公汝南召陵人也少孤兄弟四人皆同財産及各娶妻諸婦遂求分異又數有鬬争之言肜深懐憤歎乃掩戸自撾曰繆肜汝脩身謹行學聖人之法將以齊整風俗奈何不能正其家乎弟及諸婦聞之悉叩頭謝罪遂更為敦睦之行仕縣為主簿時縣令被章見考吏皆畏懼自誣而肜獨證據其事掠考苦毒至乃體生蟲蛆因復傳換五獄踰渉四年令卒以自免太守隴西梁湛召為決曹史安帝初湛病卒官肜送䘮還隴西始葬㑹西羌反叛湛妻子悉避亂它郡肜獨留不去為起墳冢乃潛穿井傍以為窟室晝則隱竄夜則負土及賊平而墳已立其妻子意肜已死還見大驚闗西咸稱傳之共給車馬衣資肜不受而歸鄉里辟公府舉尤異遷中牟令縣近京師多權豪肜到誅諸姦吏及託名貴戚賔客者百有餘人威名遂行卒於官陳重傳陳重字景公豫章宜春人也宜春今袁州縣少與同郡雷義為友俱學魯詩顔氏春秋太守張雲舉重孝廉重以讓義前後十餘通記記書也雲不聼義明年舉孝廉重與俱在郎署有同署郎負息錢數十萬責主日至詭求無已說文曰詭責也重乃密以錢代還郎後覺知而厚辭謝之重曰非我之為將有同姓名者終不言惠又同舎郎有告歸寧者誤持鄰舎郎絝以去主疑重所取重不自申說而市絝以償之後寧䘮者歸以絝還主其事乃顯重後與義俱拜尚書郎義代同時人受罪以此黜退重見義去亦以病免後舉茂才除細陽令政有異化舉尤異當遷為會稽太守遭姊憂去官後為司徒所辟拜侍御史卒雷義傳雷義字仲公豫章鄱陽人也鄱陽縣城在今饒州鄱陽縣東初為郡功曹嘗擢舉善人不伐其功義嘗濟人死罪罪者後以金二斤謝之義不受金主伺義不在默投金於承塵上後葺理屋宇乃得金金主已死無所復還義乃以付縣曹後舉孝廉拜尚書侍郎有同時郎坐事當居刑作義黙自表取其罪以此論司寇同臺郎覺之委位自上乞贖義罪順帝詔皆除刑義歸舉茂才讓於陳重刺史不聼義遂佯狂被髪走不應命鄉里為之語曰膠漆自謂堅不如雷與陳三府同時俱辟二人義遂為守灌謁者漢官儀曰謁者三十五人以郎中秩滿嵗稱給事未滿嵗稱灌謁者胡廣云明章二帝服勤園陵謁者灌桓後遂稱云馬融以為灌者習所膱也應奉云如胡公之言則吉凶異制馬云灌習也字義非也髙祖承秦灌嬰服事七年號大謁者後人掌之以姓灌章豈其然乎使持節督郡國行風俗太守令長坐者凡七十人旋拜侍御史除南頓令卒官子授官至蒼梧太守范冉傳范冉字史雲冉或作丹陳留外黄人也少為縣小吏年十八奉檄迎督郵冉耻之乃遁去到南陽受業於樊英又遊三輔就馬融通經歴年乃還冉好違時絶俗為激詭之行常慕梁伯鸞閔仲叔之為人與漢中李固河内王奐親善而鄙賈偉節郭林宗焉謝承書曰奐字子昌河内武徳人明五經負笈追業常賃灌園耻交勢利為考城令遷漢陽太守徵拜議郎卒奐後為考城令境接外黄屢遣書請冉冉不至及奐遷漢陽太守將行冉乃與弟協歩齎麥酒於道側設壇以待之冉見奐車徒駱驛遂不自聞惟與弟共辯論於路奐識其聲即下車與相揖對奐曰行路倉卒非陳契闊之所可共前亭宿息以叙分隔冉曰子前在考城思欲相從以賤質自絶豪友耳今子逺適千里會面無期故輕行相候以展訣别如其相追將有慕貴之譏矣便起告違拂衣而去奐瞻望弗及冉長逝不顧桓帝時以冉為萊蕪長萊蕪縣屬泰山郡故城在今淄川縣東南遭母憂不到官後辟太尉府以狷急不能從俗常佩韋於朝史記曰西門豹姓急佩韋以自緩議者欲以為侍御史因遁身逃命於梁沛之間徒行敝服賣卜於市遭黨人禁錮遂推鹿車載妻子捃拾自資袁山松書曰冉去官嘗使兒捃拾麥得五斛鄰人尹臺遺之一斛囑兒莫道冉後知即令并送六斛言麥已雜矣遂誓不敢受劉攽曰注遂誓不敢受案敢當作取緣悞作敢遂妄出受字或寓息客廬或依宿樹蔭如此十餘年乃結草室而居焉所止單陋有時絶粒窮居自若言貎無改閭里歌之曰甑中生塵范史雲釡中生魚范萊蕪及黨禁解為三府所辟乃應司空命是時西羌反叛黄巾作難制諸府掾屬不得妄有去就制制書也冉首自劾退詔書特原不理罪又辟太尉府以疾不行中平二年年七十四卒於家臨命遺命勅其子曰吾生於昏闇之世值乎淫侈之俗生不得匡世濟時死何忍自同於世氣絶便歛斂以時服衣足蔽形棺足周身斂畢便穿穿畢便埋其明堂之奠禮送死者衣曰明衣器曰明器鄭𤣥注云明者神明之也此言明堂亦神明之堂謂壙中也干飯寒水飲食之物勿有所下墳封髙下令足自隐前書劉向曰延陵季子葬子其髙可隱音義云謂人立可隱肘也隱音於靳反知我心者李子堅王子炳也李子堅李固也今皆不在制之在爾勿令鄉人宗親有所加也於是三府各遣令史奔弔大將軍何進移書陳留太守累行論諡僉曰宜為貞節先生諡法清白守節曰貞好廉自尅曰節也㑹葬者二千餘人刺史郡守各為立碑表墓焉戴就傳戴就字景成㑹稽上虞人也仕郡倉曹掾揚州刺史歐陽參奏太守成公浮臧罪遣部從事薛安案倉庫簿領收就於錢塘縣獄幽囚考掠五毒參至就慷慨直辭色不變容又燒斧使就挾於肘腋從吳毛詩云不吳不敖何承天纂文曰臿今之也張揖字詁云臿刃也音華案說文字林三蒼並無字就語獄卒可熟燒斧勿令冷每上彭考彭即篣也因止飯食不肻下肉焦毁墯地者掇而食之掇拾也丁活反主者窮竭酷慘無復餘方乃卧就覆船下以馬通薫之本草經曰馬通馬矢也一夜二日皆謂已死發船視之就方張眼大罵曰何不益火而使滅絶又復燒地以大鍼刺指爪中使以把土爪悉墯落主者以狀白安安呼見就謂曰太守罪穢狼藉受命考實君何故以骨肉拒扞邪就據地答言太守剖符大臣當以死報國卿雖銜命固宜申斷寃毒奈何誣枉忠良强相掠理令臣謗其君子證其父薛安庸騃忸行無義忸􅏸也猶言慣習騃音吾楷反就考死之日當白之於天與羣鬼殺汝於亭中如䝉生全當手刃相裂安深竒其壯節即解械更與美談表其言辭解釋郡事徴浮還京師免歸鄉里太守劉寵舉就孝廉光祿主事病卒風俗通曰光祿奉肹上就為主事趙苞傳趙苞字威豪甘陵東武城人今貝州武城縣從兄忠為中常侍苞深耻其門族有宦官名埶不與忠交通初仕州郡舉孝廉再遷廣陵令視事三年政教清明郡表其狀遷遼西太守抗厲威嚴名振邊俗以到官明年遣使迎母及妻子垂當到郡道經柳城柳城縣屬遼西郡故城在今營州南值鮮卑萬餘人入塞寇鈔苞母及妻子遂為所劫質載以撃郡苞率騎二萬與賊對陣賊出母以示苞苞悲號謂母曰為子無狀欲以微祿奉養朝夕不圗為母作禍昔為母子今為王臣義不得顧私恩毁忠節唯當萬死無以塞罪母遥謂曰威豪人各有命何得相顧以虧忠義昔王陵母對漢使伏劒以固其志爾其勉之苞即時進戰賊悉摧破其母妻皆為所害苞殯斂母畢自上歸葬靈帝遣策弔慰封鄃侯鄃今貝州縣也音式榆反苞葬訖謂鄉人曰食祿而避難非忠也殺母以全義非孝也如是有何面目立於天下遂歐血而死向栩傳向栩字甫興河内朝歌人向長之後也髙士傳向長向字作尚字少為書生性卓詭不倫恒讀老子狀如學道又似狂生好被髪著絳綃頭說文綃生絲也從系肖聲音消案此字當作幧音此消反其字從巾古詩云少年見羅敷脱巾著幧頭鄭𤣥注儀禮云如今著幓頭自頂中而前交額上却繞髻也常於竈北坐板床上如是積久板乃有膝踝足指之處不好語言而喜長嘯賔客從就輒伏而不視有弟子名為顔淵子貢季路冉有之輩或騎驢入市乞匄於人或悉邀諸乞兒俱歸止宿為設酒食時人莫能測之郡禮請辟舉孝廉賢良方正有道公府辟皆不到又與彭城姜肱京兆韋著並徵栩不應後特徵到拜趙相及之官時人謂其必當脫素從儉脫易簡素而栩更乘鮮車御良馬世疑其始偽及到官畧不視文書舎中生蒿萊徵拜侍中毎朝廷大事侃然正色百官憚之會張角作亂栩上便宜頗譏刺左右不欲國家興兵但遣將於河上北向讀孝經賊自當消滅中常侍張讓讒栩不欲令國家命將出師疑與角同心欲為内應收送黄門北寺獄殺之諒輔傳諒輔字漢儒廣漢新都人也仕郡為五官掾百官志曰毎州皆置諸曹掾史有功曹史主選署功勞有五官掾署功曹及諸曹事時夏大旱太守自出祈禱山川連日而無所降輔乃自暴庭中慷慨咒曰輔為股肱不能進諫納忠薦賢退惡和調陰陽承順天意至令天地否隔萬物焦枯百姓喁喁無所訴告咎盡在輔今郡太守改服責己為民祈福精誠懇到未有感徹輔今敢自祈請若至日中不雨乞以身塞無狀於是積薪柴聚茭茅以自環茭乾草也搆火其旁將自焚焉未及日中時而天雲晦合須臾澍雨一郡沾潤世以此稱其志誠劉翊傳劉翊字子相潁川潁陰人也家世豐産常能周施而不有其惠曾行於汝南界中有陳國張季禮逺赴師䘮遇寒氷車毁頓滯道路翊見而謂曰君慎終赴義行宜速逹即下車與之不告姓名自䇿馬而去季禮意其子相也後故到潁陰還所假乘翊閉門辭行不與相見常守志卧疾不屈聘命河南种拂臨郡引為功曹翊以拂名公之子拂暠之子也乃為起焉拂以其擇時而仕甚敬任之陽翟黄綱恃程夫人權力求占山澤以自營植拂召翊問曰程氏貴盛在帝左右不聼則恐見怨與之則奪民利為之奈何翊曰名山大澤不以封盖為民也禮記曰名山大澤不以封明府聼之則被佞倖之名矣若以此獲禍貴子申甫則自以不孤也申甫拂之子拂從翊言遂不與之乃舉翊為孝廉不就後黄巾賊起郡縣饑荒翊救給乏絶資其食者數百人鄉族貧者死亡則為具殯葬嫠獨則助營妻娶寡婦曰嫠無夫曰獨獻帝遷都西京翊舉上計掾是時寇賊興起道路隔絶使驛稀有逹者翊夜行晝伏乃到長安詔書嘉其忠勤特拜議郎遷陳留太守翊散所握珍玩唯餘車馬自載東歸出闗數百里見士大夫病亡道次翊以馬易棺脫衣歛之又逢知故困餒於路不忍委去因殺所駕牛以救其乏衆人止之翊曰視沒不救非志士也遂俱餓死王烈傳王烈字彦方魏志烈字彦考太原人也少師事陳寔以義行稱鄉里有盜牛者主得之盜請罪曰刑戮是甘乞不使王彦方知也烈聞而使人謝之遺布一端或問其故烈曰盜懼吾聞其過是有耻惡之心既懐耻惡必能改善故以此激之後有老父遺劒於路行道一人見而守之至暮老父還尋得劒怪而問其姓名以事告烈烈使推求乃先盜牛者也諸有爭訟曲直將質之於烈或至塗而反或望廬而還其以徳感人若此察孝廉三府並辟皆不就遭黄巾董卓之亂乃避地遼東夷人尊奉之太守公孫度接以昆弟之禮魏志曰公孫度字叔濟本遼東襄平人度父延避吏居𤣥莬任為郡吏時𤣥莬太守公孫域子豹年十八早死度少時名豹又與域子同年域見親哀之遣就師學為娶妻後舉有道除尚書郎遼東太守訪州政事欲以為長史烈乃為商賈自穢得免曹操聞烈髙名遣徵不至建安二十四年終於遼東年七十八贊曰乘方不忒臨義罔惑忒差也言獨行之人乘履方正不差二也惟此剛絜果行育徳易䝉卦象曰君子以果行育徳也後漢書卷一百十一後漢書卷一百十一考證張武傳張武者吳郡由拳人也太守第五倫嘉其行何焯曰第五倫為太守乃建武時吳郡至順帝始分立此吳郡由拳當作會稽范冉傳與漢中李固河内王奐親善注謝承書曰奐字子昌何焯曰下文王子炳即奐字也與謝書互異至於李公名輩已髙不得與史雲為友李公被難在桓帝建和元年疑史雲之友别有一李子堅史家因氏與字偶同遂舉李公以實之大書於前爾後漢書卷一百十一考證
