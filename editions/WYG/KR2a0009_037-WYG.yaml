front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2a0009_WYG_037-1a, image: WYG0252/WYG0252-0429a.png}
body:
  text: 後漢書卷三十七梁剡令劉昭補并注百官志第二十七百官四執金吾大長秋太子太傅太子少傅將作大匠北軍中候城門校尉司𨽻校尉執金吾一人中二千石漢官秩云比二千石本注曰掌宫外戒司非常水火之事胡廣曰衞尉廵行宫中則金吾徼於外相為表裏以擒姦討猾月三繞行宫外及主兵器吾猶禦也應劭曰執金革以禦非常漢官曰員吏二十九人其十人四科一人二百石文學三人百石二人斗食十三人佐學事主緹騎丞一人比千石漢官秩云六百石緹騎二百人本注曰無秩比吏食奉漢官曰執金吾緹騎二百人五百二十人輿服導從光滿道路羣僚之中斯最壯矣世祖歎曰仕宦當作執金吾武庫令一人六百石本注曰主兵器丞一人右屬執金吾本注曰本有式道左右中候三人六百石車駕出掌在前清道還持麾至宫門宫門乃開中興但一人又不常置每出以郎兼式道候事已罷不復屬執金吾又省中壘寺互都船令丞尉及左右京輔都尉太子太傅一人中二千石本注曰職掌輔導太子禮如師不領官屬荀綽晉百官表注曰唐虞官大長秋一人二千石本注曰承秦將行宦者景帝更為大長秋或用士人中興常用宦者職掌奉宣中宫命凡給賜宗親及宗親當謁見者關通之中宫出則從張晏曰皇后卿丞一人六百石本注曰宦者中宫僕一人千石本注曰宦者主馭本注曰太僕秩二千石中興省太減秩二千石以屬長秋中宫謁者令一人六百石本注曰宦者中宫謁者三人四百石本注曰宦者主報中章中宫尚書五人六百石本注曰宦者主中文書中宫私府令一人六百石本注曰宦者主中藏幣帛諸物裁衣被補浣者皆主之丁孚漢儀曰中宫藏府令秩千石儀比御府令丞一人本注曰宦者中宫永巷令一人六百石本注曰宦者主宫人丞一人本注曰宦者中宫黄門冗從僕射一人六百石本注曰宦者主中黄門冗從丁孚漢儀曰給事中宫侍郎六人比尚書郎宦者為之給事黄門四人比黄門侍郎給事羽林郎一人比羽林將虎賁官騎下中宫署令一人六百石本注曰宦者主中宫請署天子數女騎六人丞復道丞各一人本注曰宦者復道丞主中閣道中宫藥長一人四百石本注曰宦者右屬大長秋本注曰承秦有詹事一人位在長秋上亦宦者主中諸官成帝省之以其職并長秋是後皇后當法駕出則中謁中宦者職吏權兼詹事奉引訖罷宦者誅後尚書選兼職吏一人奉引云其中長信長樂宫者署少府一人職如長秋及餘吏皆以宫名為號員數秩次如中宫長樂五官吏朱瑀之類是也本注曰帝祖母稱長信宫故有長信少府長樂少府位在長秋上及職吏皆宦者秩次如中宫長樂又有衞尉僕為太僕皆二千石在少府上丁孚漢儀曰丞六百石其崩則省不常置太子少傅二千石本注曰亦以輔導為職悉主太子官屬漢官曰員吏十三人太子率更令一人千石本注曰主庶子舎人更直職似光祿太子庶子四百石本注曰無員如三署中郎太子舎人二百石本注曰無員更直宿衞如三署郎中漢官曰十三人選良家子孫太子家令一人千石本注曰主倉穀飲食職似司農少府太子倉令一人六百石本注曰主倉穀太子食官令一人六百石本注曰主飲食太子僕一人千石本注曰主車馬職如太僕太子廏長一人四百石本注曰主車馬太子門大夫六百石漢官曰門大夫二人選四府掾屬本注曰舊注云職比郎將舊有左右户將别置左右户直郎建武以來省之太子中庶子六百石本注曰員五人職如侍中太子洗馬比六百石本注曰舊注云員十六人職如謁者太子出則當直者在前導威儀漢官曰選郎中補也太子中盾一人四百石本注曰主周衞徼循太子衞率一人四百石本注曰主門衞士右屬太子少傅本注曰凡初即位未有太子官屬皆罷唯舎人不省領屬少府將作大匠一人二千石蔡質漢儀曰位次河南尹光武中元二年省謁者領之章帝建初元年復置本注曰承秦曰將作少府景帝改為將作大匠掌修作宗廟路寢宫室陵園木土之功并樹桐梓之類列于道側漢官篇曰樹栗掎桐梓胡廣曰古者列樹以表道並以為林囿四者皆木名治宫室并主之毛詩傳曰椅梓屬也陸璣草木疏曰梓實桐皮曰椅今民云梧桐是也梓今人所謂梓楸者是也丞一人六百石左校令一人六百石本注曰掌左工徒丞一人安帝復也右校令一人六百石本注曰掌右工徒丞一人安帝復也右屬將作大匠前書曰屬官又有左右中候右庫東園王章左右前後中校士令丞成帝省城門校尉一人比二千石本注曰掌雒陽城門十二所周禮司門干寳注曰如今校尉司馬一人千石本注曰主兵城門每門候一人周禮每門下士二人干寳曰如今門候六百石蔡質漢儀曰門候見校尉執板不拜本注曰雒陽城十二門其正南一門曰平城門漢官秩曰平城門為宫門不置候置屯司馬秩二千石李尤銘曰平城司午厥位處中古今注曰建武十四年九月開平城門北宫門屬衞尉其餘上西門應劭漢官曰上西所以不純白者漢家初成故丹鏤之李尤銘曰上西在季位月惟戌雍門銘曰雍門處中位月在酉廣陽門銘曰廣陽位孟厥月在申津門銘曰津名自定位季月未小苑門開陽門應劭漢官曰開陽門始成未有名宿昔有一柱來在樓上琅邪開陽縣上言縣南城門一拄飛去光武皇帝使來識視悵然遂堅縛之刻記其年月因以名焉銘曰開陽在孟位月惟已耗門銘曰耗門值季月位在辰中東門銘曰中東處仲月位當卯上東門銘曰上東少陽厥位在寅穀門銘曰穀門北中位當于子夏門銘曰夏門值孟位月在亥凡十二門蔡質漢儀曰雒陽二十四街街一亭十二城門門一亭右屬城門校尉北軍中候一人六百石本注曰掌監五營漢官曰員吏七人候自得辟召通大鴻臚一人斗食屯騎校尉一人比二千石本注曰掌宿衞兵漢官曰員吏百二十八人領士七百人司馬一人千石蔡質漢儀曰五營司馬見校尉執板不拜越騎校尉一人比二千石如淳曰越人内附以為騎也晉灼曰取其才力超越也案紀光武改青巾右校尉為越騎校尉臣昭曰越人非善騎所出晉灼為允本注曰掌宿衞兵蔡質漢儀亦曰掌越騎漢官曰員吏百二十七人領士七百人司馬一人千石步兵校尉一人比二千石初置掌上林苑門屯兵見前書本注曰掌宿衞兵漢官曰員吏七十三人領士七百人司馬一人千石長水校尉一人比二千石如淳曰長水胡名也韋昭曰長水校尉典胡騎廏近長水故以為名長水蓋中小水名本注曰掌宿衞兵蔡質漢儀曰主長水宣曲胡騎漢官曰員吏百五十七人烏桓胡騎七百三十六人司馬胡騎司馬各一人千石本注曰掌宿衞主烏桓騎射聲校尉一人比二千石服䖍曰工射也冥寞中聞聲則射中之故以為名本注曰掌宿衞兵蔡質漢儀曰掌待詔射聲事漢官曰員吏百二十九人領士七百人司馬一人千石右屬北軍中候本注曰舊有中壘校尉領北軍營壘之事有胡騎虎賁校尉皆武帝置中興省中壘但置中候以監五營胡騎并長水虎賁主輕車并射聲案大駕鹵簿五校在前各有鼓吹一部凡中二千石丞比千石真二千石丞長史六百石比二千石丞比六百石令相千石丞尉四百石其六百石丞尉三百石長相四百石及三百石丞尉皆二百石諸候公主家丞秩皆比百石諸邊鄣塞尉諸陵校尉長皆二百石有常例者不署秩司𨽻校尉一人比二千石蔡質漢儀曰職在典京師外部諸郡無所不糾封侯外戚三公以下無尊卑入宫開中道稱使者每㑹後到先去本注曰孝武帝初置荀綽晉百官表注曰司𨽻校尉周官也征和中陽石公主巫蠱之獄起乃依周置司𨽻臣昭曰周無司𨽻豈即司寇乎持節掌察舉百官以下及京師近郡犯法者前書曰置從中都官徒千二百人捕巫蠱督大姦猾後罷其兵元帝去節成帝省建武中復置并領一州蔡質漢儀曰司𨽻詣臺廷議處九卿上朝賀處公卿下陪卿上初除謁大將軍三公通謁持板揖公儀朝賀無敬臺召入宫對見尚書持板朝賀揖從事史十二人本注曰都官從事主察舉百官犯法者蔡質漢儀曰都官主雒陽百官朝㑹與三府掾同博物記曰中興以來都官從事多出之河内掊擊貴戚功曹從事主州選署及衆事别駕從事校尉行部則奉引錄衆事簿曹從事主財穀簿書其有軍事則置兵曹從事主兵事其餘部郡國從事每郡國各一人主督促文書察舉非法皆州自辟除故通為百石云假佐二十五人本注曰主簿錄閣下事省文書門亭長主州正門功曹書佐主選用孝經師主監試經月令師主時節祠祀律令師主平法律簿曹書佐主簿書其餘都官書佐及每郡國各有典郡書佐一人各主一郡文書以郡吏補嵗滿一更司𨽻所部郡七河南尹一人主京都特奉朝請其京兆尹左馮翊右扶風三人漢初都長安皆秩中二千石謂之三輔中興都雒陽更以河南郡為尹以三輔陵廟所在不改其號但減其秩其餘𢎞農河内河東三郡其置尹馮翊扶風及太守丞奉之本位在地理志後漢書巻三十七
