body:
  text: 後漢書卷五十一宋宣城太守范煜撰唐章懷太子賢注任李萬邳劉耿列傳第十一任光傳子隗任光字伯卿南陽宛人也少忠厚為鄉里所愛初為鄉嗇夫郡縣吏續漢志曰三老游徼郡所署也秩百石掌一鄉人其鄉小者縣署嗇夫一人主知人善惡為役先後知人貧富為賦多少漢兵至宛軍人見光冠服鮮明令解衣將殺而奪之㑹光祿勲劉賜適至視光容貌長者乃救全之光因率黨與從賜為安集掾拜偏將軍與世祖破王尋王邑更始至洛陽以光為信都太守及王郎起郡國皆降之光獨不肯遂與都尉李忠令萬脩信都令也功曹阮況五官掾郭唐等續漢志曰五官掾掌署諸曹事同心固守廷掾持王郎檄東觀記扶柳縣廷掾詣府白光光斬之於市以狥百姓發精兵四千人城守更始二年春世祖自薊還狼狽不知所向傳聞信都獨為漢拒邯鄲即馳赴之光等孤城獨守恐不能全獨守無援故恐之聞世祖至大喜吏民皆稱萬歲即時開門與李忠萬脩率官屬迎謁世祖入傳舍謂光曰伯卿今埶力虛弱欲俱入城頭子路刁子都兵中何如邪光曰不可世祖曰卿兵少如何光曰可募發奔命出攻傍縣若不降者恣聽掠之人貪財物則兵可招而致也世祖從之拜光為左大將軍封武成侯留南陽宗廣領信都太守事使光將兵從光乃多作檄文曰大司馬劉公將城頭子路刁子都兵百萬衆從東方來擊諸反虜遣騎馳至鉅鹿界中吏民得檄傳相告語世祖遂與光等投暮入堂陽界投至也堂陽今冀州縣也使騎各持炬火彌滿澤中光炎燭天地舉城莫不震驚惶怖其夜即降旬日之間兵衆大盛因攻城邑遂屠邯鄲廼遣光歸郡城頭子路者東平人姓爰名曾字子路與肥城劉詡起兵盧城頭盧縣名屬太山郡今濟州縣故號其兵為城頭子路曾自稱都從事詡稱校三老寇掠河濟間衆至二十餘萬更始立曾遣使降拜曾東萊郡太守今萊州劉攽曰按他處復字郡名皆不言郡太守明此衍詡濟南太守皆行大將軍事是歲曾為其將所殺衆推詡為主更始封詡助國侯令罷兵歸本郡刁子都者東海人也起兵鄉里鈔擊徐兖界衆有六七萬更始立遣使降拜子都徐州牧為其部曲所殺餘黨復相聚與諸賊㑹於檀鄉今兖州瑕丘縣東北有檀鄉因號為檀鄉檀鄉渠帥董次仲始起茌平茌平縣名屬東郡故城在今博州聊城縣東茌音士疑反遂渡河入魏郡清河與五校合衆十餘萬建武元年世祖入洛陽遣大司馬吳漢等擊檀鄉明年春大破降之是歲更封光阿陵侯阿陵縣名屬涿郡食邑萬户五年徵詣京師奉朝請其冬卒子隗嗣後阮況為南陽太守郭唐至河南尹皆有能名隗字仲和少好黃老清靜寡欲所得奉秩常以賑䘏宗族收養孤寡顯宗聞之擢奉朝請遷羽林左監續漢志曰羽林有左右監一人各六百石主左右羽林騎虎賁中郎將又遷長水校尉肅宗即位雅相敬愛數稱其行以為將作大匠前書曰將作少府秦官也景帝更名將作大匠秩二千石將作大匠自建武以來常謁者兼之至隗廼置眞焉建初五年遷太僕八年代竇固為光祿勲所歴皆有稱章和元年拜司空隗義行内修不求名譽而以沈正見重於世和帝即位大將軍竇憲秉權專作威福内外朝臣莫不震懾時憲擊匈奴國用勞費隗奏議徵憲還前後十上獨與司徒袁安同心畢力持重處正鯁言直議無所回隱持重謂守正也執議不移回邪也隱避也語在袁安傳永元四年薨子屯嗣帝追思隗忠擢屯為歩兵校尉徙封西陽侯西陽縣名屬山陽郡也屯卒子勝嗣東觀漢記曰勝字作騰勝卒子世嗣徙封北鄉侯北鄉縣名屬齊郡李忠傳李忠字仲都東萊黃人也黃今萊州縣也故城在縣東南父為高密都尉臣賢按東觀記續漢書並云中尉又郡國志高密侯百官志皇子封每國傅相各一人中尉一人比二千石職如郡都尉主盜賊高密非郡為都字者誤劉攽曰注高密侯按文侯當作國高密實王國不當作侯也忠元始中以父任為郎署中數十人而忠獨以好禮脩整稱王莾時為新博屬長王莾改信都國曰新博都尉曰屬長也郡中咸敬信之更始立使使者行郡國即拜忠都尉官忠遂與任光同奉世祖以為右大將軍封武固侯時世祖自解所佩綬以帶忠東觀記曰上初至不脫衣帶衣服垢薄使忠解澣長襦忠更作新袍絝解支小單衣襪而上之因從攻下屬縣至苦陘苦陘縣名屬中山國章帝改曰漢昌自此已後隨代改之今定州唐昌縣是也世祖㑹諸將問所得財物唯忠獨無所掠世祖曰我欲特賜李忠諸卿得無望乎即以所乘大驪馬及繡被衣物賜之馬色黑而青曰驪進圍鉅鹿未下王郎遣將攻信都信都大姓馬寵等開城内之收太守宗廣及忠母妻而令親屬招呼忠時寵弟從忠為校尉忠即時召見責數以背恩反城因格殺之諸將皆驚曰家屬在人手中殺其弟何猛也忠曰若縱賊不誅則二心也世祖聞而美之謂忠曰今吾兵已成矣將軍可歸救老母妻子宜自募吏民能得家屬者賜錢千萬來從我取忠曰䝉明公大恩思得効命誠不敢内顧宗親世祖廼使任光將兵救信都光兵於道散降王郎無功而還㑹更始遣將攻破信都忠家屬得全世祖因使忠還行太守事收郡中大姓附邯鄲者誅殺數百人及任光歸郡忠廼還復為都尉建武二年更封中水侯中水縣屬涿郡前書音義曰此縣在兩河之間故曰中水故城在今瀛州樂壽縣西北食邑三千户其年徵拜五官中郎將從平龎萌董憲等六年遷丹陽太守是時海内新定南方海濵江淮多擁兵據土忠到郡招懷降附其不服者悉誅之旬月皆平忠以丹陽越俗不好學嫁娶禮儀衰於中國乃為起學校習禮容春秋鄉飲校亦學也禮記曰鄉飲酒之義主人拜迎賓於庠門之外三揖而後至階三讓而後升所以致尊讓也六十者坐五十者立侍以聽政役所以明尊長也合諸鄉射教之鄉飲酒之禮而孝悌之行立鄭𤣥注曰春秋以禮㑹民於州序也選用明經郡中向慕之墾田增多三歲間流民占著者五萬餘口著音直畧反十四年三公奏課為天下第一遷豫章太守病去官東觀記曰病濕痺免徵詣京師十九年卒子威嗣威卒子純嗣永平九年坐母殺純叔父國除東觀記曰永平二年坐純母禮殺威弟季永初七年鄧太后復封純琴亭侯純卒子廣嗣萬脩傳萬脩字君游扶風茂陵人也更始時為信都令與太守任光都尉李忠共城守迎世祖拜為偏將軍封造義侯及破邯鄲拜右將軍從平河北建武二年更封槐里侯與揚化將軍堅鐔俱擊南陽未尅而病卒于軍子普嗣徙封泫氏侯泫氏縣名屬上黨郡西有泫谷水故以為名今澤州高平縣也泫音胡涓反普卒子親嗣徙封扶柳侯扶柳縣名故城在今冀州信都縣西親卒無子國除永初七年鄧太后紹封脩曾孫豐為曲平亭侯豐卒子熾嗣永建元年熾卒無子國除延熹二年桓帝紹封脩𤣥孫恭為門德亭侯邳彤傳邳彤字偉君信都人也父吉為遼西太守彤初為王莽和成卒正東觀漢記曰王莽分鉅鹿為和成郡居下曲陽以彤為卒正也世祖徇河北至下曲陽彤舉城降復以為太守留止數日世祖北至薊㑹王郎兵起使其將徇地所到縣莫不奉迎唯和成信都堅守不下彤聞世祖從薊還失軍欲至信都乃先使五官掾張萬督郵尹綏選精騎二千餘匹緣路迎世祖軍彤尋與世祖㑹信都世祖雖得二郡之助而兵衆未合議者多言可因信都兵自送西還長安彤廷對曰議者之言皆非也吏民歌吟思漢久矣故更始舉尊號而天下嚮應三輔清宮除道以迎之一夫荷㦸大呼則千里之將無不捐城遁逃虜伏請降自上古以來亦未有感物動民其如此者也又卜者王郎假名因埶驅集烏合之衆遂震燕趙之地況明公奮二郡之兵揚嚮應之威以攻則何城不克以戰則何軍不服今釋此而歸豈徒空失河北必更驚動三輔墮損威重非計之得者也若明公無復征伐之意則雖信都之兵猶難㑹也何者明公既西則邯鄲城民不肯捐父母背城主而千里送公其離散亡逃可必也世祖善其言而止即日拜彤為後大將軍和成太守如故使將兵居前北至堂陽堂陽已反屬王郎彤使張萬尹綏先曉譬吏民世祖夜至即開門出迎引兵擊破白奢賊於中山自此常從戰攻信都復反為王郎郎所置信都王捕繫彤父弟及妻子使為手書呼彤曰降者封爵不降族滅彤涕泣報曰事君者不得顧家彤親屬所以至今得安於信都者劉公之恩也公方爭國事彤不得復念私也㑹更始所遣將攻㧞信都郎兵敗走彤家屬得免及拔邯鄲封武義侯建武元年更封靈壽侯靈壽縣名故城在今恒州靈壽縣西北行大司空事帝入洛陽拜彤太常月餘日轉少府是年免復為左曹侍中前書曰侍中有左右曹入侍天子故曰侍中常從征伐六年就國彤卒子湯嗣九年徙封樂陵侯樂陵縣名屬平原郡故城在今滄州樂陵縣東也十九年湯卒子某嗣史闕名也無子國除元初元年鄧太后紹封彤孫音為平亭侯音卒子柴嗣初張萬尹綏與彤俱迎世祖皆拜偏將軍亦從征伐萬封重平侯綏封平臺侯重平縣名屬渤海郡故城在今安德縣西北臣賢按平臺縣屬常山郡諸本多云平壹者誤也論曰凡言成事者以功著易顯謀幾初者以理隱難昭幾者事之先見者也斯固原情比迹所宜推察者也若乃議者欲因二郡之衆建入關之策委成業臨不測而世主未悟謀夫景同邳彤之廷對其為幾乎語曰一言可以興邦論語魯定公謂孔子之言也斯近之矣劉植傳劉植字伯先鉅鹿昌城人也王郎起植與弟喜從兄歆東觀記曰喜作嘉字共仲歆字細君也率宗族賓客聚兵數千人據昌城聞世祖從薊還廼開門迎世祖以植為驍騎將軍喜歆偏將軍皆為列侯時眞定王劉揚起兵以附王郎衆十餘萬世祖遣植說揚揚乃降世祖因留眞定納郭后后即揚之甥也故以此結之廼與揚及諸將置酒郭氏漆里舍漆園即郭氏所居之里名也劉攽曰按文無故忽有園字葢本是里字揚擊筑為歡因得進兵拔邯鄲從平河北建武二年更封植為昌城侯討密縣賊戰殁子向嗣帝使喜代將植營復為驍騎將軍封觀津侯觀津縣名故城在今德州蓨縣西北喜卒復以歆為驍騎將軍封浮陽侯浮陽縣名屬渤海郡在浮水之陽今滄州清池縣也喜歆從征伐皆傳國于後向徙封東武陽侯東武陽縣屬東郡在武水之陽故城在今魏州華陽縣南卒子述嗣永平十五年坐與楚王英謀反國除耿純傳耿純字伯山鉅鹿宋子人也父艾為王莽濟平尹莽改定陶國曰濟平也純學於長安因除為納言士王莽法古置納言之官即尚書也毎官皆置士故曰納言士也王莽敗更始立使舞隂王李軼降諸郡國純父艾降還為濟南太守時李軼兄弟用事專制方面賓客游說者甚衆純連求謁不得通久之廼得見因說軼曰大王以龍虎之姿遭風雲之時遭遇也易曰雲從龍風從虎奮迅拔起期月之間兄弟稱王拔猶卒也拔音歩末反期音朞而德信不聞於士民功勞未施於百姓寵祿暴興此智者之所忌也前書陳嬰母謂嬰曰暴得富貴者不祥也故云智者之所忌也兢兢自危猶懼不終而況沛然自足可以成功者乎公羊傳曰力沛然若有餘何休注曰沛有餘優饒貌軼竒之且以其鉅鹿大姓廼承制拜為騎都尉授以節令安集趙魏㑹世祖渡河至邯鄲純即謁見世祖深接之純退見官屬將兵法度不與它將同遂求自結納獻馬及縑帛數百匹世祖北至中山留純邯鄲㑹王郎反東觀記曰王郎舉尊號欲收純純持節與從吏夜遁出城駐節道中詔取行者車馬得數十馳歸宋子與從兄訢宿植俱詣上所在盧奴言王郎所反之狀世祖自薊東南馳純與從昆弟訢宿植共率宗族賓客二千餘人續漢書曰皆衣縑襜褕絳衣也老病者皆載木自隨奉迎於育左傳曰又如是而嫁將就木焉木謂棺也老病者恐死故載以從軍育縣名故城在冀州拜純為前將軍封耿鄉侯酈元注水經曰郎水北有耿鄉光武封耿純為侯國俗謂之宜安城其故城在今恒州槀城縣西南也訢宿植皆偏將軍使與純居前降宋子從攻下曲陽及中山是時郡國多降邯鄲者純恐宗家懷異心廼使訢宿歸燒其廬舍世祖問純故對曰竊見明公單車臨河北非有府藏之蓄重賞甘餌可以聚人者也黄石公記曰芳餌之下必有懸魚重賞之下必有死夫易曰何以聚人曰財故純引之徒以恩德懷之是故士衆樂附今邯鄲自立北州疑惑純雖舉族歸命老弱在行猶恐宗人賓客半有不同心者故燔燒屋室絶其反顧之望世祖歎息及至鄗世祖止傳舍鄗大姓蘇公反城開門内王郎將李惲純先覺知將兵逆與惲戰大破斬之從平邯鄲又破銅馬時赤眉青犢上江大彤鐵脛五幡十餘萬衆並在射犬世祖引兵將擊之純軍在前去衆營數里賊忽夜攻純雨射營中矢下如雨也士多死傷純勒部曲堅守不動選敢死二千人俱持彊弩各傅三矢使銜枚間行傅著也繞出賊後齊聲呼譟彊弩並發賊衆驚走追擊遂破之馳騎白世祖世祖明旦與諸將俱至營勞純曰昨夜困乎純曰頼明公威德幸而獲全世祖曰大兵不可夜動故不相救耳軍營進退無常卿宗族不可悉居軍中廼以純族人耿伋為蒲吾長蒲吾縣名屬常山郡故城在今恒州靈壽縣南悉令將親屬居焉世祖即位封純高陽侯擊劉永於濟隂下定陶初純從攻王郎墮馬折肩時疾發廼還詣懷宮懷宮河内縣名有離宮焉帝問卿兄弟誰可使者純舉從弟植於是使植將純營純猶以前將軍從時眞定王劉揚復造作讖記云赤九之後癭揚為主漢以火德故云赤也光武於高祖九代孫故云九揚病癭欲以惑衆與綿曼賊交通綿曼縣名屬眞定國故城在今恒州石邑縣西北俗音訛謂之人文故城也建武二年春遣騎都尉陳副游擊將軍鄧隆徵揚揚閉城門不内副等乃復遣純持節行赦令於幽冀所過竝使勞慰王侯密勑純曰劉揚若見因而收之純從吏士百餘騎與副隆㑹元氏俱至眞定止傳舍揚稱病不謁以純眞定宗室之出男子謂姊妹之子為出也遣使與純書欲相見純報曰奉使見王侯牧守不得先詣如欲面㑹宜出傳舍時揚弟林邑侯讓及從兄細東觀記續漢書細竝作紺各擁兵萬餘人揚自恃衆强而純意安靜即從官屬詣之兄弟竝將輕兵在門外揚入見純純接以禮敬因延請其兄弟皆入廼閉閤悉誅之因勒兵而出眞定震怖無敢動者帝憐揚讓謀未發竝封其子復故國純還京師因自請曰臣本吏家子孫幸遭大漢復興聖帝受命備位列將爵為通侯天下畧定臣無所用志願試治一郡盡力自効帝笑曰卿既治武復欲脩文邪廼拜純為東郡太守時東郡未平純視事數月盜賊清寧四年詔純將兵擊更始東平太守范荆荆降進擊太山濟南及平原賊皆平之居東郡四歲時發干長有罪純案奏圍守之奏未下長自殺純坐免以列侯奉朝請從擊董憲道過東郡百姓老小數千隨車駕涕泣云願復得耿君帝謂公卿曰純年少被甲胄為軍吏耳治郡廼能見思若是乎六年定封為東光侯東光今滄州縣也續漢書曰六年上令諸侯就國純上書自陳前在東郡案誅涿郡太守朱英親屬今國屬涿誠不自安制書報曰侯前奉公行法朱英久吏曉知義理何時當以公事相是非然受堯舜之罰者不能愛己也已更擇國土令侯無介然之憂乃更封純為東光侯純辭就國帝曰文帝謂周勃丞相吾所重君為我率諸侯就國今亦然也純受詔而去至鄴賜穀萬斛到國弔死問病民愛敬之八年東郡濟隂盜賊羣起遣大司空李通橫野大将軍王常擊之帝以純威信著於衞地東郡舊衞地也遣使拜太中大夫使與大兵㑹東郡東郡聞純入界盜賊九千餘人皆詣純降大兵不戰而還璽書復以為東郡太守吏民悅服十三年卒官諡曰成侯子阜嗣植後為輔威將軍封武邑侯武邑縣名屬信都今冀州縣也宿至代郡太守封遂鄉侯訢為赤眉將軍封著武侯從鄧禹西征戰死雲陽凡宗族封列侯者四人關内侯者三人為二千石者九人阜徙封莒鄉侯永平十四年坐同族耿歙與楚人顏忠辭語相連國除建初二年肅宗追思純功紹封阜子旴為高亭侯旴卒無嗣帝復封旴弟騰續漢書云封騰高亭侯也卒子忠嗣忠卒孫緖嗣贊曰任邳識幾嚴城解扉解猶開也委佗還旅二守焉依委音於危反委佗音移行貌也旅衆也還旅謂自薊而還也二守謂任光為信都太守邳彤為和成太守也左傳曰平王東遷晉鄭焉依言光武失軍而南還依任邳以成功純植義發奉兵佐威後漢書卷五十一後漢書卷五十一考證邳彤傳明公既西則邯鄲城民不肯捐父母背城主而千里送公其離散逃亡可必也臣承蒼按是時王郎方據邯鄲其民安得送光武還長安邯鄲城三字必傳寫之訛通鑑考異作邯鄲勢成下文城主作成主亦於事理不切邯鄲城民當作二郡之民謂和成信都二郡也蓋承上文奮二郡之兵而言後漢書卷五十一考證
