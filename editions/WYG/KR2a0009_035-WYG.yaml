body:
  text: 後漢書卷三十五梁剡令劉昭補并注百官志第二十五百官二太常廷尉光祿勲大鴻臚衞尉太僕太常卿一人中二千石盧植禮注曰如大樂正本注曰掌禮儀祭祀每祭祀先奏其禮儀及行事常贊天子漢書儀曰贊饗一人秩六百石掌贊天子每選試博士奏其能否大射養老大喪皆奏其禮儀每月前晦察行陵廟漢官曰員吏八十五人其十二人四科十五人佐五人假佐十三人百石十五人騎吏九人學事十六人守學事臣昭曰凡漢官所載列職人數今悉以注雖頗為繁蓋周禮列官陳人役於前以為民極實觀國制此則宏模不可闕者也丞一人比千石盧植禮注曰如小樂正本注曰掌凡行禮及祭祀小事總署曹事漢舊儀曰丞舉廟中非法者其署曹掾史随事為員諸卿皆然太史令一人六百石本注曰掌天時星厯凡嵗將終奏新年厯凡國祭祀喪娶之事掌奏良日及時節禁忌凡國有瑞應灾異掌記之漢官儀曰太史待詔三十七人其六人治厯三人龜卜三人廬宅四人日時三人易筮二人典禳九人籍氏許氏典昌氏各三人嘉法請雨解事各二人醫二人丞一人明堂及靈臺丞一人二百石本注曰二丞掌守明堂靈臺靈臺掌候日月星氣皆屬太史漢官曰靈臺待詔四十二人其十四人候星二人候日三人候風十二人候氣三人候晷景七人候鍾律一人舎人博士祭酒一人六百石本僕射中興轉為祭酒胡廣曰官名祭酒皆一位之元長者也古禮賔客得主人饌則老者一人舉酒以祭於地舊説以為示有先博士十四人比六百石本注曰易四施孟梁丘京氏尚書三歐陽大小夏侯氏詩三魯齊韓氏禮二大小戴氏春秋二公羊嚴顔氏掌教弟子國有疑事掌承問對本四百石宣帝増秩本紀桓帝延熹二年置秘書監太祝令一人六百石本注曰凡國祭祀掌讀祝及迎送神漢舊儀曰廟祭太祝令主席酒漢官曰員吏四十一人其二人百石二人斗食二十二人佐二人學事四人守學事九人有秩百五十人祝人宰二百四十二人屠者六十人丞一人本注曰掌祝小神事太宰令一人六百石本注曰掌宰工鼎俎饌具之物凡國祭祀掌陳饌具漢官曰明堂丞一人二百石員吏四十二人其二人百石二人斗食二十三人佐九人有秩二人學事四人守學事宰二百四十二人屠者七十三人衞士一十五人丞一人大予樂令一人六百石本注曰掌伎樂凡國祭祀掌請奏樂及大饗用樂掌其陳序漢官曰員吏二十五人其二人百石二人斗食七人佐十人學事四人守學事樂人八佾舞三百八十人盧植禮注曰太子令如古大胥漢大樂律卑者之子不得舞宗廟之酎除吏二千石到六百石及關内侯到五大夫子取適子髙五尺已上年十二到三十顔色和身體修治者以為舞人丞一人盧植禮注曰大樂丞如古小胥髙廟令一人六百石本注曰守廟掌案行掃除無丞漢官曰員吏四人衞士一十五人世祖廟令一人六百石本注曰如髙廟漢官曰員吏六人衞士二十人先帝陵每陵園令各一人六百石本注曰掌守陵園案行掃除丞及校長各一人本注曰校長主兵戎盜賊事應劭漢官名秩曰丞皆選孝亷郎年少薄伐者遷補府長史都官令候司馬先帝陵每陵食官令各一人六百石本注曰掌望晦時節祭祀漢官曰每陵食監一人秩六百石監丞一人三百石中黄門八人從官二人案食監即是食官令號右屬太常本注曰有祠祀令一人後轉屬少府有太卜令六百石後省并太史中興以來省前凡十官案前書十官者太宰均官都水雍大祝五畤各一尉也東觀書曰章帝又置祀令丞延光元年省光祿勲卿一人中二千石本注曰掌宿衞宫殿門户典謁署郎更直執㦸宿衞門户考其徳行而進退之胡廣曰勲猶閽也易曰為閽寺宦寺主殿宫門户之職郊祀之事掌三獻漢官曰員吏四十四人其十人四科三人百石二人斗食二人佐六人騎吏八人學事十三人守學事一人官醫衞士八十一人丞一人比千石五官中郎將一人比二千石本注曰主五官郎蔡質漢儀曰中郎解其府對太學五官中郎比六百石本注曰無員郎年五十以屬五官故曰六百石五官侍郎比四百石本注曰無員五官郎中比三百石本注曰無員凡郎官皆主更直執㦸宿衞諸殿門出充車騎唯議郎不在直中蔡質漢儀曰三署郎見光祿勲執板拜見五官左右將執板不拜於三公諸卿無敬左中郎將比二千石本注曰主左署郎蔡質漢儀曰郎中解其府府次五官中郎比六百石侍郎比四百石郎中比三百石三郎本注曰皆無員右中郎將比二千石本注曰主右署郎中郎比六百石侍郎比四百石郎中比三百石本注曰皆無員三郎並無員虎賁中郎將比二千石本注曰主虎賁宿衞前書武帝置期門平帝更名虎賁蔡質漢儀曰主虎賁千五百人無常員多至千人戴鶡冠次右將府又虎賁舊作虎奔言如虎之奔也王莽以古有勇士孟賁故名焉孔安國曰若虎賁獸言其甚猛左右僕射左右陛長各一人比六百石本注曰僕射主虎賁郎習射陛長主直虎賁朝㑹在殿中漢官曰陛長墨綬銅印虎賁中郎比六百石虎賁侍郎比四百石虎賁郎中比三百石荀綽晉百官表注曰虎賁諸郎皆父死子代漢制也節從虎賁比二百石四郎本注曰皆無員掌宿衞侍從自節從虎賁久者轉遷才能差髙至中郎羽林中郎將比二千石本注曰主羽林郎案漢末又有四中郎將皆帥師征伐不知何時置董卓為東中郎將盧植為北中郎將獻帝以曹操為南中郎將羽林郎比三百石本注曰無員掌宿衞侍從常選漢陽隴西安定北地上郡西河凡六郡良家補本武帝以便馬從獵還宿殿陛巖下室中故號巖郎前書曰初置名建章營騎後更名出補三百石丞尉荀綽晉百官表注曰言其嚴厲整鋭也案此則為巖郎與志不同蔡質漢儀曰羽林郎百一十八人無常員府次虎賁府羽林左監一人六百石本注曰主羽林左騎漢官曰孝亷郎作主羽林九百人二監官屬史吏皆自出羽林中有材者作丞一人羽林右監一人六百石本注曰主羽林右騎丞一人奉車都尉比二千石本注曰無員漢官曰三人掌御乗輿車駙馬都尉比二千石本注曰無員漢官曰五人掌駙馬騎都尉比二千石本注曰無員漢官曰一十人本監羽林騎光祿大夫比二千石本注曰無員漢官曰三人凡大夫議郎皆掌顧問應對無常事唯詔命所使凡諸國嗣之喪則光祿大夫掌弔太中大夫千石本注曰無員漢官曰二十人秩比二千石中散大夫六百石本注曰無員漢官曰二十人秩比二千石諫議大夫六百石本注曰無員胡廣曰光祿大夫本為中大夫武帝元狩五年置諫大夫為光祿大夫世祖中興以為諫議大夫又有太中中散大夫此四等於古皆為天子之下大夫視列國之上卿漢官曰三十人議郎六百石本注曰無員漢官曰五十人無常員謁者僕射一人比千石本注曰為謁者臺率主謁者天子出奉引古重習武有主射以督錄之故曰僕射蔡質漢儀曰見尚書令對揖無敬謁者見執板拜之常侍謁者五人比六百石本注曰主殿上時節威儀漢官曰謁者三十人其二人公府掾六百石持使也謁者三十人其給事謁者四百石其灌謁者郎中比三百石本注曰掌賔贊受事及上章報問將大夫以下之喪掌使弔本員七十人中興但三十人荀綽晉百官表注曰漢皆用孝亷年五十威容嚴恪能賔者為之明帝詔曰謁者乃堯之尊官所以試舜賔于四門四門穆穆者也昔燕太子使荆軻劫始皇變起兩楹之間其後謁者持匕首刺腋髙祖偃武行文故易之以板初為灌謁者滿嵗為給事謁者蔡質漢儀曰出府丞長史陵令皆選儀容端正任奉使者右屬光祿勲本注曰職屬光祿者自五官將至羽林右監凡七署自奉車都尉至謁者以文屬焉舊有左右曹秩以二千石上殿中主受尚書奏事平省之世祖省使小黄門郎受事車駕出給黄門郎兼有請室令車駕出在前請所幸徼車迎白示重慎中興但以郎兼事訖罷又省車户騎凡三將如淳曰主車曰車郎主户衞曰户郎及羽林令衞尉卿一人中二千石本注曰掌宫門衞士宫中徼循事漢官曰員吏四十一人其九人四科二人二百石文學三人百石十二人斗食二人佐十三人學事一人官醫衞士六十人丞一人比千石公車司馬令一人六百石本注曰掌宫南闕門凡吏民上章四方貢獻及徴詣公車者獻帝起居注曰建安八年議郎衞林為公車司馬令位随將大夫舊公車令與都官長史位從將大夫自林始丞尉各一人本注曰丞選曉諱掌知非法尉主闕門兵禁戒非常胡廣曰諸門部各陳屯夾道其旁當兵以示威武交㦸以遮妄出入者南宫衞士令一人六百石本注曰掌南宫衞士漢官曰員吏九十五人衞士五百三十七人丞一人北宫衞士令一人六百石本注曰掌北宫衞士漢官曰員吏七十二人衞士四百七十二人丞一人左右都候各一人六百石周禮司寤氏有夜士干寳注曰今都候之屬本注曰主劒㦸士徼循宫及天子有所収考漢官曰右都候員吏二十二人衞士四百一十六人左都候員吏二十八人衞士三百八十三人蔡質漢儀曰宫中諸有劾奏罪左都候執㦸戲車縛送付詔獄在官大小各付所屬以馬被覆見尚書令尚書僕射尚書皆執板拜見丞郎皆揖丞各一人宫掖門每門司馬一人比千石本注曰南宫南屯司馬主平城門漢官曰員吏九人衞士百二人古今注曰建武十三年九月初開此門北宫門蒼龍司馬主東門案雒陽宫門名為蒼龍闕門漢官曰員吏六人衞士四十人𤣥武司馬主𤣥武門漢官曰員吏二人衞士三十八人北屯司馬主北門漢官曰員吏二人衞士三十八人北宫朱爵司馬主南掖門漢官曰員吏四人衞士百二十四人古今注曰永平二年十一月初作北宫朱爵南司馬門東明司馬王東門漢官曰員吏十三人衞士百八十人朔平司馬主北門漢官曰員吏五人衞士百一十七人凡七門漢官曰凡員吏皆隊長佐凡居宫中者皆有口籍於門之所屬宮名兩字為鐵印文符案省符乃内之胡廣曰符用木長尺二寸鐵印以符之若外人以事當入本官長史為封棨傳其有官位出入令御者言其官右屬衞尉本注曰中興省旅賁令衞士一人丞漢官目錄曰古三卿太尉所部太僕卿一人中二千石本注曰掌車馬天子每出奏駕上鹵簿用大駕則執馭漢官曰員吏七十人其七人四科一人二百石文學八人百石六人斗食七人佐六人騎吏三人假佐三十一人學事一人官醫丞一人比千石考工令一人六百石本注曰主作兵器弓弩刀鎧之屬成則傳執金吾入武庫及主織綬諸雜工漢官曰員吏百九人左右丞各一人車府令一人六百石本注曰主乗輿諸車漢官曰員吏二十四人丞一人未央廏令一人六百石本注曰主乗輿及廏中諸馬漢官曰員吏七十人卒騶二十人長樂廏丞一人漢官曰員吏十五人卒騶二十人苜蓿苑官田所一人守之右屬太僕本注曰舊有六廏皆六百石令前書曰有大廏未央家馬三令各五丞一尉又車府路軨騎馬駿馬四令丞晉灼曰六廏名也主馬萬匹中興省約但置一廏後置左駿令廏别主乗輿御馬後或并省又有牧師苑皆令官主養馬分在河西六郡界中中興皆省唯漢陽有流馬苑但以羽林郎監領古今注曰漢安元年七月置承華廏令秩六百石廷尉卿一人中二千石應劭曰兵獄同制故稱廷尉本注曰掌平獄奏當所應凡郡國讞疑罪皆處當以報胡廣曰讞質也漢官曰員吏百四十人其十一人四科十六人百石十三人獄史二十七二百石廷吏文學十六佐二十六人騎吏三十人假佐一人官醫正左監各一人前漢有左右監平世祖省右而猶曰左左平一人六百石本注曰掌平決詔獄右屬廷尉本注曰孝武帝以下置中都官獄二十六所各令長名世祖中興皆省唯廷尉及雒陽有詔獄蔡質漢儀曰正月旦百官朝賀光祿勲劉嘉廷尉趙世各辭不能朝髙賜舉奏皆以被病篤困空文武之位闕上卿之賛既無忠信斷金之用而有敗禮傷化之尤不謹不敬請廷尉治嘉罪河南尹治世罪議以世掌廷尉故轉屬他官大鴻臚卿一人中二千石周禮象胥干寳注曰今鴻臚本注曰掌諸侯及四方歸義蠻夷其郊廟行禮賛導請行事既可以命羣司諸王入朝當郊迎典其禮儀及郡國上計匡四方來亦屬焉漢官曰員吏五十五人其六人四科二人二百石文學六人百石一人斗食十四人佐六人騎吏十五人學士五人官醫永元十年大匠應順上言百郡計吏觀國之光而舎逆旅崎嶇私館直裝衣物敝朽暴露朝㑹邈逺事不肅給昔霸國盟主耳舎諸侯於𨽻人子産以為大譏況今四海之大而可無乎和帝嘉納其言即創業焉皇子拜王賛授印綬及拜諸侯諸侯嗣子及四方夷狄封者臺下鴻臚召拜之王薨則使弔之及拜王嗣丞一人比千石大行令一人六百石本注曰主諸郎漢官曰員吏四十人丞一人治禮郎四十七人漢官曰其四人四科五人二百石文學五人百石九人斗食六人佐六人學事十二人守學事東觀書曰主齋祠儐賛九賔又有公室主稠中都官斗食以下功次相補案盧植禮注曰大行郎亦如謁者兼舉形貌右屬大鴻臚本注曰承秦有典屬國别主四方夷狄朝貢侍子成帝時省并大鴻臚中興省驛官别火二令丞如淳曰漢儀注别火獄令官主治改火事及郡邸長丞但令郎治郡邸漢官目錄曰右三官司徒所部後漢書卷三十五後漢書卷三十五考證百官志二省前凡十官注延光元年光何焯校本改平治禮郎四十七人注上稠中都官稠當作調後漢書卷三十五考證
