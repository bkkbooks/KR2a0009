body:
  text: 後漢書卷五十二宋宣城太守范煜撰唐章懷太子賢註朱景王杜馬劉傅堅馬列傳第十二朱祐傳朱祐字仲先南陽宛人也東觀記曰祐作福避安帝諱劉攽曰案注引東觀記安帝諱則此人當名祜前後皆誤矣少孤歸外家復陽劉氏復陽縣名屬南陽郡往來舂陵世祖與伯升皆親愛之伯升拜大司徒以祐為護軍前書曰護軍都尉秦官平帝元始元年更名護軍也及世祖為大司馬討河北復以祐為護軍常見親幸舍止於中祐侍讌從容曰長安政亂公有日角之相此天命也日角解在光武紀世祖曰召刺姦收護軍王莽置左右刺姦使督姦猾祐乃不敢復言從征河北常力戰陷陣續漢書曰祐至南䜌為賊所傷上親候視之以為偏將軍封安陽侯世祖即位拜為建義大將軍建武二年更封堵陽侯堵陽縣名屬南陽郡故城在今唐州方城縣堵音者冬與諸將擊鄧奉於淯陽祐軍敗為奉所獲明年奉破乃肉袒因祐降帝復祐位而厚加慰賜遣擊新野隨皆平之隨縣名屬南陽郡故城在今隨州隨縣延岑自敗於穰遂與秦豐將張成合祐率征虜將軍祭遵與戰於東陽大破之東陽聚名在南陽臨陣斬成延岑敗走歸豐祐收得印綬九十七東觀記曰收得所盗茂陵武帝廟衣印綬進擊黃郵降之賜祐黃金三十斤四年率破姦將軍侯進輔威將軍耿植代征南大將軍岑彭圍秦豐於黎丘破其將張康於蔡陽斬之帝自至黎丘使御史中丞李由持璽書招豐豐出惡言不肯降車駕引還勑祐方畧祐盡力攻之明年夏城中窮困豐乃將其母妻子九人肉袒降祐轞車傳豐送洛陽斬之大司馬吳漢劾奏祐廢詔受降違將帥之任帝不加罪祐還與騎都尉臧宮㑹擊延岑餘黨隂酇筑陽三縣賊悉平之祐為人質直尚儒學將兵率衆多受降以克定城邑為本不存首級之功又禁制士卒不得虜掠百姓軍人樂放縱多以此怨之九年屯南行唐拒匈奴行唐今恒州縣也十三年增邑定封鬲侯鬲縣名屬平原郡食邑七千三百户東觀記曰祐自陳功薄而國大願受南陽五百户足矣上不許十五年朝京師上大將軍印綬因留奉朝請祐奏古者人臣受封不加王爵可改諸王為公帝即施行又奏宜令三公並去大名以法經典後遂從其議祐初學長安帝往候之祐不時相勞苦而先升講舍後車駕幸其第帝因笑曰主人得無捨我講乎以有舊恩數蒙賞賚東觀記曰上在長安時嘗與祐共買蜜合藥上追念之賜祐白蜜一石問何如在長安時共買蜜乎其親厚如此二十四年卒子商嗣商卒子演嗣永元十四年坐從兄伯為外孫隂皇后巫蠱事免為庶人和帝隂后吳房侯隂綱女也為巫蠱事廢永初七年鄧太后紹封演子冲為鬲侯景丹傳景丹字孫卿馮翊櫟陽人也少學長安王莽時舉四科東觀記曰王莽時舉有德行能言語通政事明文學之士丹以言語為固德侯相有幹事稱遷朔調連率副貳朔調上谷也副貳屬令也更始立遣使者徇上谷丹與連率耿況降復為上谷長史王郎起丹與況共謀拒之況使丹與子弇及寇恂等將兵南歸世祖世祖引見丹等笑曰邯鄲將帥數言我發漁陽上谷兵吾聊應言然王郎將帥數云欲發二郡兵以拒光武時光武聊應然之猶今兩軍遙相戲弄也何意二郡良為吾來東觀記曰上在廣阿聞外有大兵自來登城勒兵在西門樓上問何等兵丹等對言上谷漁陽兵上曰為誰來乎對曰為劉公即請丹入人人勞勉恩意甚備方與士大夫共此功名耳拜丹為偏將軍號奉義侯從擊王郎將兒宏等於南􅒋兒音五兮反郎兵迎戰漢軍退郤續漢書曰南􅒋賊迎擊上營得上鼓車輜重數乗也丹等縱突騎擊大破之追奔十餘里死傷者從橫丹還世祖謂曰吾聞突騎天下精兵今乃見其戰樂可言邪遂從征河北世祖即位以讖文用平狄將軍孫咸行大司馬衆咸不悅詔舉可為大司馬者東觀記曰載讖文曰孫咸征狄也劉攽曰按注文多一曰字羣臣所推唯吳漢及丹帝曰景將軍北州大將是其人也然吳將軍有建大策之勲謂發漁陽兵也又誅苖幽州謝尚書其功大苖曾謝躬舊制驃騎將軍官與大司馬相兼也前書武帝置大司馬號大將軍驃騎將軍也乃以吳漢為大司馬而拜丹為驃騎大將軍建武二年定封丹櫟陽侯帝謂丹曰今關東故王國雖數縣不過櫟陽萬户邑夫富貴不歸故鄉如衣繡夜行故以封卿耳前書武帝謂朱買臣之語丹頓首謝秋與吳漢建威大將軍耿弇建義大將軍朱祐執金吾賈復偏將軍馮異强弩將軍陳俊左曹王常騎都尉臧宮等從擊破五校於羛陽聚名也解見光武紀降其衆五萬人㑹陜賊蘇况攻破𢎞農生獲郡守丹時病東觀記曰丹從上至懷病瘧見上在前瘧發寒慄上笑曰聞壯士不病瘧今漢大將軍反病瘧邪使小黃門扶起賜醫藥還歸洛陽病遂加帝以其舊將欲令强起領郡事乃夜召入謂曰賊迫近京師但得將軍威重卧以鎮之足矣丹不敢辭乃力疾拜命將營到郡續漢書曰將營兵西到𢎞農也十餘日薨子尚嗣徙封余吾侯余吾縣名屬上黨故城在今潞州屯留縣西北尚卒子苞嗣苞卒子臨嗣無子國絶永初七年鄧太后紹封苞弟遽為監亭侯王梁傳王梁字君嚴漁陽安陽人也為郡吏太守彭寵以梁守狐奴令與蓋延吳漢俱將兵南及世祖於廣阿拜偏將軍既拔邯鄲賜爵關内侯從平河北拜野王令與河内太守寇恂南拒洛陽北守天井關朱鮪等不敢出兵世祖以為梁功及即位議選大司空而赤伏符曰王梁主衞作𤣥武𤣥武北方之神龜蛇合體帝以野王衞之所徙史記曰衞元君自濮陽徙於野王𤣥武水神之名司空水土之官也於是擢拜梁為大司空封武彊侯建武二年與大司馬吳漢等俱擊檀鄉有詔軍事一屬大司馬而梁輒發野王兵帝以其不奉詔勑令止在所縣而梁復以便宜進軍帝以梁前後違命大怒遣尚書宗廣持節軍中斬梁廣不忍乃檻車送京師既至赦之月餘以為中郎將行執金吾事北守箕關擊赤眉别校降之三年春轉擊五校追至信都趙國破之悉平諸屯聚冬遣使者持節拜梁前將軍四年春擊肥城文陽拔之肥城縣名屬太山郡故城在今濟州平隂縣東南文音汶故城在今兗州泗水縣西進與驃騎大將軍杜茂擊佼彊蘇茂於楚沛間拔大梁齧桑前書音義曰齧桑縣名或曰城名史記張儀與齊楚㑹戰齧桑而捕虜將軍馬武偏將軍王霸亦分道並進歲餘悉平之五年從救桃城破龎萌等梁戰尤力拜山陽太守鎭撫新附將兵如故數月徵入代歐陽歙為河南尹梁穿渠引穀水注洛陽城下東寫鞏川及渠成而水不流七年有司劾奏之梁慙懼上書乞骸骨乃下詔曰梁前將兵征伐衆人稱賢故擢典京師建義開渠為人與利旅力既愆迄無成功旅衆也愆過也言衆力已過而功不成百姓怨讟談者讙譁讟謗也雖䝉寛宥猶執謙退君子成人之美其以梁為濟南太守十三年增邑定封阜成侯阜成屬渤海今冀州縣十四年卒官子禹嗣禹卒子堅石嗣堅石追坐父禹及弟平與楚王英謀反棄市國除杜茂傳杜茂字諸公南陽冠軍人也初歸光武於河北為中堅將軍常從征伐世祖即位拜大將軍封樂鄉侯樂鄉屬信都國北擊五校於眞定進降廣平建武二年更封苦陘侯與中郎將王梁擊五校賊於魏郡清河東郡悉平諸營保降其持節大將三十餘人續漢書曰降其渠帥大將軍杜猛持節光禄大夫董敦等三郡清靜道路流通明年遣使持節拜茂為驃騎大將軍擊沛郡拔芒芒縣名也郡國志曰後名臨睢屬沛國時西防復反迎佼彊五年春茂率捕虜將軍馬武進攻西防數月拔之彊奔董憲東方既平七年詔茂引兵北屯田晉陽廣武以備胡寇廣武縣名屬太原郡九年與鴈門太守郭凉擊盧芳將尹由於繁畤繁畤縣名今代州縣也芳將賈覽率胡騎萬餘救之茂戰軍敗引入樓煩城樓煩縣名屬鴈門郡故城在今代州崞縣東北崞音郭時盧芳據高柳與匈奴連兵數寇邊民帝患之十二年遣謁者段忠將衆郡弛刑配茂鎭守北邊因發邊卒築亭候脩烽火又發委輸金帛繒絮供給軍士并賜邊民冠蓋相望茂亦建屯田驢車轉運先是鴈門人賈丹霍匡解勝等為尹由所畧由以為將帥與共守平城丹等聞芳敗遂共殺由詣郭涼涼上狀皆封為列侯詔送委輸金帛賜茂涼軍吏及平城降民自是盧芳城邑稍稍來降涼誅其豪右郇氏之屬鎭撫羸弱旬月間鴈門且平芳遂亡入匈奴帝擢涼子為中郎宿衞左右涼字公文右北平人也身長八尺氣力壯猛雖武將然通經書多智畧尤曉邊事有名北方初幽州牧朱浮辟為兵曹掾擊彭寵有功封廣武侯十三年增茂邑更封脩侯脩縣名屬信都國也十五年坐斷兵馬廪縑斷猶割截也使軍吏殺人免官削户邑定封參蘧鄉侯十九年卒子元嗣永平十四年坐與東平王等謀反減死一等國除永初七年鄧太后紹封茂孫奉為安樂亭侯劉攽曰案王平顏忠是楚王同時謀反者多連士大夫故杜元坐之傳寫之誤遂作東平王東平何嘗反也馬成傳馬成字君遷南陽棘陽人也少為縣吏世祖徇潁川以成為安集掾調守郟令郟縣名今汝州縣也及世祖討河北成即棄官歩負追及於滿陽以成為期門從征伐世祖即位再遷護軍都尉建武四年拜揚武將軍督誅虜將軍劉隆振威將軍宋登射聲校尉王賞發㑹稽丹陽九江六安四郡兵擊李憲時帝幸壽春設壇場祖禮遣之應劭風俗通曰謹按禮傳共工氏之子曰脩好遠游舟車所至足跡所逮靡不窮覽故祀以為祖神祖徂也進圍憲於舒令諸軍各深溝高壘憲數挑戰成堅壁不出守之歲餘至六年春城中食盡乃攻之遂屠舒斬李憲追擊其黨與盡平江淮地七年夏封平舒侯平舒屬代郡八年從征破隗囂以成為天水太守將軍如故冬徵還京師九年代來歙守中郎將率武威將軍劉尚等破河池遂平武都河池縣一名仇池屬武都郡今鳯州縣也明年大司空李通罷以成行大司空事居府如眞數月復拜揚武將軍十四年屯常山中山以備北邊并領建義大將軍朱祐營又代驃騎大將軍杜茂繕治障塞自西河至渭橋西河今勝州富昌縣也渭橋本名横橋在今咸陽縣東南河上至安邑前書曰河上地名故秦内史高帝二年改為河上郡武帝分為左馮翊太原至井陘太原今并州也井陘今屬常山郡常山今恒州縣也中山至鄴皆築保壁起烽燧十里一候在事五六年帝以成勤勞徵還京師邊人多上書求請者復遣成還屯及南單于保塞北方無事拜為中山太守上將軍印綬領屯兵如故二十四年南擊武谿蠻賊無功武谿水在今辰州盧谿縣西上太守印綬二十七年定封全椒侯全椒縣名今滁州縣也就國三十二年卒子衞嗣衞卒子香嗣徙封棘陵侯香卒子豐嗣豐卒子𤣥嗣𤣥卒子邑嗣邑卒子醜嗣桓帝時以罪失國延熹二年帝復封成𤣥孫昌為益陽亭侯劉隆傳劉隆字元伯南陽安衆侯宗室也王莽居攝中隆父禮與安衆侯崇起兵誅莽事泄隆以年未七歲故得免及壯學於長安更始拜為騎都尉謁歸謁請也謂請假歸也迎妻子置洛陽聞世祖在河内即追及於射犬以為騎都尉與馮異共拒朱鮪李軼等軼遂殺隆妻子建武二年封亢父侯亢父縣名屬東平國故城在今兗州任城縣南四年拜誅虜將軍討李憲憲平遣隆屯田武當武當今均州縣也十一年守南郡太守歲餘上將軍印綬十三年增邑更封竟陵侯是時天下墾田多不以實又户口年紀互有增減十五年詔下州郡檢覈其事而刺史太守多不平均或優饒豪右侵刻羸弱百姓嗟怨遮道號呼時諸郡各遣使奏事帝見陳留吏牘上有書視之云潁川𢎞農可問河南南陽不可問帝詰吏由趣吏不肯服抵言於長壽街上得之抵欺也帝怒時顯宗為東海公年十二在幄後言曰吏受郡勑當欲以墾田相方耳帝曰即如此何故言河南南陽不可問對曰河南帝城多近臣南陽帝鄉多近親田宅踰制不可為凖帝令虎賁將詰問吏吏乃實首服如顯宗對於是遣謁者考實具知姦狀明年隆坐徵下獄其疇軰十餘人皆死帝以隆功臣特免為庶人明年復封為扶樂鄉侯以中郎將副伏波將軍馬援擊交阯蠻夷徵側等隆别於禁谿口破之交阯郡麊泠縣有金溪穴相傳音訛謂之禁溪則徵側等所敗處也其地今岑州新昌縣也麊音麋泠音零獲其帥徵貳徵側之妹斬首千餘級降者二萬餘人還更封大國為長平侯長平縣屬汝南郡及大司馬吳漢薨隆為驃騎將軍行大司馬事隆奉法自守視事八歲上將軍印綬罷賜養牛上樽酒十斛前書音義曰稻米一斗得酒一斗為上樽稷米一斗為中樽粟米一斗為下樽也以列侯奉朝請三十年定封愼侯愼縣名屬汝南郡也中元二年卒諡曰靖侯子安嗣傅俊傳傅俊字子衞潁川襄城人也世祖徇襄城俊以縣亭長迎軍拜為校尉襄城收其母弟宗族皆滅之從破王尋等東觀記曰傅俊從上迎擊王尋等於陽關漢兵反走還汝水上上以手飲水澡盥鬚眉塵垢謂俊曰今日罷倦甚諸卿寧憊邪以為偏將軍别擊京密破之遣歸潁川收葬家屬及世祖討河北俊與賔客十餘人北追及於邯鄲上謁世祖使將潁川兵常從征伐世祖即位以俊為侍中建武二年封昆陽侯三年拜俊積弩將軍與征南大將軍岑彭擊破秦豐因將兵徇江東揚州悉定七年卒諡曰威侯子昌嗣徙封蕪湖侯蕪湖縣名屬丹陽郡建初中遭母憂因上書以國貧不願之封乞錢五十萬為關内侯肅宗怒貶為關内侯竟不賜錢永初七年鄧太后復封昌子鐵為高置亭侯堅鐔傳堅鐔字子伋東觀記伋作皮潁川襄城人也為郡縣吏世祖討河北或薦鐔者因得召見以其吏能署主簿又拜偏將軍從平河北别擊破大槍於盧奴世祖即位拜鐔揚化將軍封㶏强侯㶏强縣名屬汝南郡㶏音於靳反與諸將攻洛陽而朱鮪别將守東城者為反間私約鐔晨開上東門上東門洛陽故城東面北頭第一門也鐔與建義大將軍朱祐乗朝而入與鮪大戰武庫下洛陽記曰建始殿東有大倉倉東有武庫藏兵之所殺傷甚衆至旦食乃罷朱鮪由是遂降又别擊内黃平之建武二年與右將軍萬脩徇南陽諸縣而堵鄉人董訢反宛城獲南陽太守劉驎鐔乃引軍赴宛選敢死士夜自登城斬關而入訢遂棄城走還堵鄉鄧奉復反新野攻破吳漢時萬脩病卒鐔獨孤絶南拒鄧奉北當董訢一年間道路隔塞糧饋不至鐔食蔬菜與士卒共勞苦每急輒先當矢石石謂發石以投人也墨子曰備城者積石百枚重十鈞已上者身被三創以此能全其衆及帝征南陽擊破訢奉以鐔為左曹常從征伐六年定封合肥侯二十六年卒子鴻嗣鴻卒子浮嗣浮卒子雅嗣馬武傳馬武字子張南陽湖陽人也少時避讎客居江夏王莽末竟陵西陽三老起兵於郡界武往從之後入綠林中遂與漢軍合更始立以武為侍郎與世祖破王尋等拜為振威將軍與尚書令謝躬共攻王郎及世祖拔邯鄲請躬及武等置酒高㑹因欲以圖躬不剋既罷獨與武登叢臺故趙王臺也在今洺州邯鄲城中從容謂武曰吾得漁陽上谷突騎欲令將軍將之何如武曰駑怯無方畧世祖曰將軍久將習兵豈與我掾史同哉武由是歸心及謝躬誅死武馳至射犬降世祖見之甚悅引置左右每勞饗諸將武輒起斟酌於前世祖以為歡復使將其部曲至鄴武叩頭辭以不願世祖愈美其意因從擊羣賊世祖擊尤來五幡等敗於愼水武獨殿還䧟陣故賊不得迫及殿鎭後也音丁殿反言兵敗而鎭其後也進至安定次小廣陽即廣平亭也在今幽州范陽縣西南以有廣陽國故謂此亭為小廣陽也武常為軍鋒力戰無前諸將皆引而隨之故遂破賊窮追至平谷浚靡而還平谷縣名屬漁陽郡浚靡縣名屬右北平郡靡音縻世祖即位以武為侍中騎都尉封山都侯建武四年與虎牙將軍蓋延等討劉永武别擊濟隂下成武楚丘拜捕虜將軍明年龎萌反攻桃城武先與戰破之㑹車駕至萌遂敗走六年夏與建威大將軍耿弇西擊隗囂漢軍不利引下隴囂追急武選精騎還為後拒身被甲持㦸奔擊殺數千人劉攽曰按文言武持㦸奔擊何能殺數千人明千是十字囂兵乃退諸軍得還長安十三年增邑更封鄃侯鄃縣名屬平原郡故城在今德州平原縣西南鄃音俞將兵北屯下曲陽備匈奴坐殺軍吏受詔將妻子就國武徑詣洛陽上將軍印綬削户五百定封為揚虛侯因留奉朝請帝後與功臣諸侯讌語從容言曰諸卿不遭際㑹自度爵祿何所至乎高密侯鄧禹先對曰臣少嘗學問可郡文學博士帝曰何言之謙乎卿鄧氏子志行脩整何為不掾功曹餘各以次對至武曰臣以武勇可守尉督盜賊帝笑曰且勿為盜賊自致亭長斯可矣武為人嗜酒闊達敢言闊達大度也敢言謂言果敢而無所隱也時醉在御前面折同列言其短長無所避忌帝故縱之以為笑樂帝雖制御功臣而每能回容宥其小失回曲也曲法以容也遠方貢珍甘必先徧賜列侯而太官無餘有功輒增邑賞不任以吏職故皆保其福祿終無誅譴者二十五年武以中郎將將兵擊武陵蠻夷還上印綬顯宗初西羌寇隴右覆軍殺將朝廷患之復拜武捕虜將軍以中郎將王豐副與監軍使者竇固右輔都尉陳訢將烏桓黎陽營三輔募士光武置黎陽營見鄧訓傳涼州諸郡羌胡兵及弛刑合四萬人擊之到金城浩亹與羌戰浩亹縣名屬金城郡故城在今蘭州廣武縣西南浩音閤亹音門斬首六百級又戰於洛都谷為羌所敗湟水一名洛都水西自吐谷渾界入在今鄯州湟水縣死者千餘人羌乃率衆引出塞武復追擊到東西邯大破之酈元水經注曰邯川城左右有水自北出南經邯亭注于河蓋以此水分流謂之東西邯也在今廓州化隂縣東斬首四千六百級獲生口千六百人餘皆降散武振旅還京師增邑七百户并前千八百户永平四年卒子檀嗣坐兄伯濟與楚王英黨顏忠謀反國除永初七年鄧太后紹封武孫震為漻亭侯漻音胡巧反又力彫反震卒子側嗣論曰中興二十八將前世以為上應二十八宿未之詳也然咸能感㑹風雲奮其智勇風雲已具聖公傳稱為佐命亦各志能之士也易通卦驗曰黃佐命鄭𤣥注云黃者火之子佐命張良是也已上皆華嶠之辭議者多非光武不以功臣任職至使英姿茂績委而勿用然原夫深圖遠算固將有以焉爾若乃王道既衰降及霸德王謂周也霸謂齊桓晉文公猶能授受惟庸勲賢皆序如管隰之迭升桓世先趙之同列文朝可謂兼通矣史記曰管仲隰朋脩齊國之政齊人皆悅事之管子曰管仲寢疾桓公問之若不可諱政將安移之對曰隰朋可國語云文公使趙衰為卿辭曰先軫有謀臣不若也乃使先軫佐下軍公曰趙衰其所讓皆社稷之衛也降自秦漢世資戰力至於翼扶王運皆武人屈起屈起猶勃起也音其勿反亦有鬻繒屠狗輕猾之徒灌嬰雎陽販繒者樊噲沛人以屠狗為事皆從高祖或崇以連城之賞或任以阿衡之地樊噲封為舞陽侯灌嬰為丞相封為潁隂侯阿倚也衡平也言天下依倚而取平也故勢疑則隙生力侔則亂起埶位過則君臣相疑侔等也蕭樊且猶縲紲信越終見葅戮不其然乎蕭何為丞相為人請上林中空地上大怒乃下廷尉械擊之燕王盧綰反樊噲以相國擊燕人有惡噲黨於呂氏帝大怒使陳平即軍中斬噲平畏呂氏執噲詣長安韓信封為淮隂侯人上書告信反吕后使武士縳信斬之彭越為梁王呂后令其舍人告越謀反遂夷宗族刑法志曰夷三族者梟其首葅其骨肉彭越韓信皆受此誅自兹以降迄于孝武宰輔五世莫非公侯自高祖至于孝武凡五代也其中宰輔皆以公侯勲貴為之遂使縉紳道塞賢能蔽壅縉赤色也紳帶也或作搢搢揷也謂揷笏於帶也朝有世及之私下多抱關之怨世及謂父子相繼也禮記曰大人世及以為禮抱關謂守門者前書曰蕭望之署小苑東門候王仲翁謂望之曰不肯碌碌反抱關為其懷道無聞委身草莽者亦何可勝言故光武鑒前事之違存矯枉之志矯正也違失也枉曲也孟子曰矯枉者過其正雖寇鄧之高勲耿賈之鴻烈分土不過大縣數四所加特進朝請而已鄧禹為大司徒封高密侯食邑四縣耿弇好畤侯食邑二縣奉朝請賈復封膠東侯凡食六縣以列侯加特進觀其治平臨政課職責咎將所謂導之以政齊之以刑者乎若格之功臣其傷巳甚格正也若以上法繩正功臣則於其有害也劉攽曰注於其有害也按文少一人字何者直繩則虧䘮恩舊撓情則違廢禁典選德則功不必厚舉勞則人或未賢參任則羣心難塞並列則其敝未遠參任謂兼勲賢而任之則羣臣之心各有覬望故難塞也若遵高祖並用功臣則其敝未遠不得不校其勝否即以事相權勝否猶可否即就也權謂平其輕重故高秩厚禮允答元功峻文深憲責成吏職建武之世侯者百餘若夫數公者則與參國議分均休咎賈復傳曰帝方以吏亊責三公故功臣遂不用是時列侯唯高密固始膠東三侯與公卿參議國家大事恩遇甚厚也其餘並優以寛科完其封祿莫不終以功名延慶于後昔留侯以為高祖悉用蕭曹故人前書曰上望見諸將往往偶語張良曰此謀反耳陛下起布衣為天子而所封皆蕭曹故人故相聚謀反也見高紀而郭伋亦譏南陽多顯郭伋傳曰光武以伋為并州牧帝引見伋因言選補衆職當簡天下賢俊不宜專用南陽人也帝深納其言鄭興又戒功臣專任鄭興傳曰興徵為太中大夫上疏曰道路咸曰朝廷欲用功臣功臣用則人位謬矣夫崇恩偏授易起私溺之失至公均被必廣招賢之路意者不其然乎永平中顯宗追感前世功臣乃圖畫二十八將於南宮雲臺其外又有王常李通竇融卓茂合三十二人故依其本第係之篇末以志功臣之次云爾太傅高密侯鄧禹中山太守全椒侯馬成大司馬廣平侯吳漢河南尹阜成侯王梁左將軍膠東侯賈復琅邪太守祝阿侯陳俊建威大將軍好畤侯耿弇驃騎大將軍參蘧侯杜茂執金吾雍奴侯寇恂積弩將軍昆陽侯傅俊征南大將軍舞陽侯岑彭左曹合肥侯堅鐔征西大將軍陽夏侯馮異上谷太守淮陽侯王霸建義大將軍鬲侯朱祐信都太守阿陵侯任光征虜將軍潁陽侯祭遵豫章太守中水侯李忠驃騎大將軍櫟陽侯景丹右將軍槐里侯萬脩虎牙大將軍安平侯蓋延太常靈壽侯邳彤衞尉安成侯銚期驍騎將軍昌成侯劉植東郡太守東光侯耿純橫野大將軍山桑侯王常城門校尉朗陵侯臧宮大司空固始侯李通捕虜將軍揚虛侯馬武大司空安豐侯竇融驃騎將軍愼侯劉隆太傅宣德侯卓茂贊曰帝績思乂庸功是存庸勲也言將興帝績則念勲功之臣也有來羣后捷我戎軒捷勝也謂寇鄧之徒翼佐王烈戎車所至皆克捷也婉孌龍姿儷景同飜婉孌猶親愛也龍姿謂光武也儷齊也偶也言諸將齊景飜飛而舉大功也後漢書卷五十二後漢書卷五十二考證景丹傳邯鄲將帥數言我發漁陽上谷兵吾聊應言然注王郎將帥數云欲發二郡兵以拒光武時光武聊應然之日知錄曰謂邯鄲將帥有此言我亦聊以此言應之不能必二郡之果來也本文自明注乃謂王郎欲發之謬矣杜茂傳坐與東平王等傳末劉攽刋誤一條當移入此句之下馬武傳叢臺注在今潞州邯鄲城中潞州當作洺州按邯鄲縣唐武德初𨽻紫州貞觀後𨽻洺州屬河北道潞州屬河東道存矯枉之志注孟子曰矯枉者過其正今本孟子無此語故依其本第係之篇末以志功臣之次云爾羅㸃聞見錄曰後漢二十八將名次不可曉薛伯宣常州云舊本漢書作兩重排列謂上一重鄧禹居首次吳漢次賈復次耿弇下一重馬成居首次王梁次陳俊次杜茂後人重刋遂錯訛此極有理范蔚宗論云其外又有王常李通竇融卓茂合三十二人今本乃以王常臧宮李通馬武竇融卓茂為序則將上下重誤合而為一明矣臣承蒼按小學紺珠載二十八將名次正與薛常州所言符合較今本後漢書所列二十八人次第凡値竒數十四人名俱在前凡値偶數十四人名俱在後其末别載王常李通竇融卓茂四人合為三十二人蓋王伯厚所見後漢書猶是未誤刻時本也又按薛季宣字士龍嘗知常州此稱薛伯宣常州亦恐有誤後漢書卷五十二考證
