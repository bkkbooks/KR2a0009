body:
  text: 後漢書卷一百八宋宣城太守范煜撰唐章懐太子賢注宦者列傳第六十八易曰天垂象聖人則之易繋辭之文也宦者四星在皇位之側故周禮置官亦備其數閽者守中門之禁周禮曰閽人掌守王宫中門之禁鄭𤣥云中門於外内為中也閽即刖足也寺人掌女宫之戒周禮曰寺人掌王宫之内人及女宫之戒命也又云王之正内者五人周禮曰寺人掌王之正内五人注云正内路寢也劉攽曰正文案文多一者字此本用周禮文月令仲冬命閹尹審門閭謹房室鄭𤣥注月令云閹尹主領奄豎之官者也於周禮則為内宰掌理王之内政宫令誡出入開閉之屬也詩之小雅亦有巷伯刺讒之篇毛詩序曰巷伯刺幽王也寺人傷於讒而作是詩也毛萇注云巷伯内之小臣也然宦人之在王朝者其來舊矣將以其體非全氣情志專良通關中人易以役養乎關渉也中人内人也然而後世因之才任稍廣其能者則勃貂管蘇有功於楚晉勃貂即寺人披也一名勃鞮字伯楚左傳曰吕郤畏偪將焚公宫殺晉文公寺人披見公以難告遂殺吕郤新序曰楚恭王有疾告諸大夫曰管蘇犯我以義違我以禮與處不安不見不思然而有得焉吾死之後爵之於朝也景監繆賢著庸於秦趙史記曰商君入秦因孝公寵臣景監以求見又曰藺相如為趙宦者令繆賢舍人趙求人使報秦者未得繆賢曰臣舍人藺相如可使也著庸謂薦鞅及相如也及其敝也則豎刁亂齊伊戾禍宋左傳曰齊桓公卒易牙入與寺人貂因内寵以殺羣吏而立公子無虧孝公奔宋杜預注曰寺人即閹官刁即貂也又曰楚客聘于晉過宋太子知之請野享之公使徃寺人伊戾請從之至則坎用牲加書徴之而騁告公曰太子將為亂公使視之則信有焉太子死公徐聞其無罪乃亨伊戾也漢興仍襲秦制置中常侍官然亦引用士人以參其選皆銀璫左貂給事殿省及高后稱制乃以張卿為大謁者出入卧内受宣詔命前書曰齊人田生求事吕后所幸大謁者張釋卿音義曰奄人也仲長統昌言曰宦豎傅近卧房之内交錯婦人之間文帝時有趙談北宫伯子頗見親倖至於孝武亦愛李延年前書曰孝文時宦者則趙談北宫伯子孝武時宦者李延年也帝數宴後庭或潛㳺離館故請奏機事多以宦人主之至元帝之世史游為黄門令勤心納忠有所補益前書曰急就一篇元帝黄門令史游作董巴輿服志曰禁門曰黄闥中人主之故曰黄門也其後𢎞恭石顯以佞險自進卒有蕭周之禍損穢帝徳焉前書曰前將軍蕭望之及光祿大夫周堪建白以為宜罷中常侍官應古不近刑人由是大與石顯忤後皆害焉望之自殺堪廢錮不得復進用也中興之初宦官悉用閹人劉攽曰案自前漢宦官即是閹子何乃言中興乎蓋宦字當作内謂省内官不用他士也不復雜調它士至永平中始置員數中常侍四人小黄門十人和帝即阼幼弱而竇憲兄弟專總權威内外臣僚莫由親接所與居者唯閹宦而已故鄭衆得專謀禁中終除大憝憝惡也音大對反謂誅竇憲也遂享分土之封超登宫卿之位宫卿謂為大長秋也於是中官始盛焉自明帝以後迄乎延平委用漸大而其員稍増中常侍至有十人小黄門二十人改以金璫右貂兼領卿署之職鄧后以女主臨政而萬機殷逺朝臣國議無由參斷帷幄稱制下令不出房闈之間爾雅曰宫中小門謂之閵也不得不委用刑人寄之國命手握王爵口含天憲非復掖廷永巷之職閨牖房闥之任也永巷及掖廷並署名也爾雅曰小閨謂之闥其後孫程定立順之功曹騰參建桓之䇿續以五侯合謀梁冀受鉞迹因公正恩固主心故中外服從上下屏氣或稱伊霍之勲無謝於徃載或謂良平之畫復興於當今雖時有忠公而竟見排斥謂皇甫嵩蔡邕等並被排也舉動回山海呼吸變霜露阿㫖曲求則光寵三族父族母族妻族也直情忤意則參夷五宗夷滅也參夷夷三族也五宗五服内之親也漢之綱紀大亂矣若夫高冠長劒紆朱懐金者布滿宫闈楚詞曰高余冠之岌岌又曰撫長劒兮玉珥揚雄法言曰或問使我紆朱懐金其樂不可量也李軌注曰朱朱紱也金金印也苴茅分虎南面臣人者蓋以十數封諸侯各以其方色土苴以白茅而分銅虎符也府署第館棊列於都鄙棊列如棊之布列史記曰徃徃棊置子弟支附過半於州國南金和寳冰紈霧縠之積盈仞珍藏詩頌曰大路南金鄭𤣥注云荆揚之州貢金三品和謂卞和也嬙媛侍兒歌童舞女之玩充備綺室左傳曰夫差宿有妃嬙嬪御焉杜預注曰妃嬙貴者嬙音牆前書曰初爰盎為吳相時從史盜私盎侍兒昌言曰為音樂則歌兒舞女千曹而迭起左傳晏子曰高臺深池撞鐘舞女綺室室之綺麗者狗馬飾雕文土木被緹繡前書東方朔曰土木衣綺繡狗馬被繢􅄢緹厚繒也皆剝割萌黎競恣奢欲搆害明賢專樹黨類其有更相援引希附權彊者皆腐身熏子以自􅃷逹前書曰史遷熏胥以刑韋昭曰古者腐刑必熏合之同敝相濟故其徒有繁敗國蠧政之事不可單書單盡也所以海内嗟毒志士窮棲寇劇緣間揺亂區夏寇盜劇賊緣間隙而起也雖忠良懐憤時或􅁬發而言出禍從旋見孥戮因復大考鉤黨轉相誣染鉤黨謂李膺杜密等凡稱善士莫不離被災毒竇武何進位崇戚近乗九服之嚻怨恊羣英之埶力九服已見上羣英謂劉猛朱㝢之屬見竇武傳而以疑留不斷至於殄敗斯亦運之極乎雖袁紹龔行芟夷無餘然以暴易亂亦何云及尚書曰龔行天罰左傳曰芟夷藴崇之史記曰以暴易亂兮不知其非也自曹騰説梁冀竟立昬弱謂立桓帝也魏武因之遂遷龜鼎龜鼎國之守器以諭帝位也尚書曰寧王遺我大寳龜左傳曰鼎遷於商也所謂君以此始必以此終信乎其然矣此謂宦官也言漢家初寵用宦官其後終為宦官所滅左傳楚屈蕩曰君以此始必以此終也鄭衆傳鄭衆字季産南陽犨人也為人謹敏有心幾永平中初給事太子家肅宗即位拜小黄門遷中常侍和帝初加位鉤盾令時竇太后秉政后兄大將軍憲等並竊威權朝臣上下莫不附之而衆獨一心王室不事豪黨帝親信焉及憲兄弟圖作不軌衆遂首謀誅之以功遷大長秋䇿勲班賞每辭多受少由是常與議事與音預中官用權自衆始焉十四年帝念衆功美封為鄛鄉侯食邑千五百戸鄛音七交反説文曰南郡棘陽縣有鄛鄉永初元年和熹皇后益封三百戸元初元年卒養子閎嗣閎卒子安嗣後國絶桓帝延熹二年紹封衆曽孫石讎為關内侯蔡倫傳蔡倫字敬仲桂陽人也以永平末始給事宫掖建初中為小黄門及和帝即位轉中常侍豫參帷幄倫有才學盡心敦愼數犯嚴顔匡弼得失每至休沐輒閉門絶賔暴體田野後加位尚方令永元九年監作祕劒及諸器械莫不精工堅密為後世法自古書契多編以竹簡其用縑帛者謂之為紙縑貴而簡重並不便於人倫乃造意用樹膚麻頭及敝布魚網以為紙元興元年奏上之帝善其能自是莫不從用焉故天下咸稱蔡侯紙湘州記曰耒陽縣北有漢黄門蔡倫宅宅西有一石臼云是倫舂紙臼也元初元年鄧太后以倫久在宿衛封為龍亭侯龍亭縣故城在今洋州興埶縣東明月池在其側邑三百戸後為長樂太僕四年帝以經傳之文多不正定乃選通儒謁者劉珍及博士良史詣東觀各讎校漢家法劉攽曰案諸儒各謂其師説為家法後人不知妄加一漢字令倫監典其事倫初受竇后諷㫖誣陷安帝祖母宋貴人及太后崩安帝始親萬機勑使自致廷尉倫耻受辱乃沐浴整衣冠飲藥而死國除孫程傳孫程字稚卿涿郡新城人也東觀記曰北新城人衛康叔之胄孫林父之後東觀自此已下十九人與程同功者皆叙其所承本系蓋當時史官懼程等威權故曲為文飾安帝時為中黄門給事長樂宫時鄧太后臨朝帝不親政事小黄門李閏與帝乳母王聖常共譖太后兄執金吾悝等言欲廢帝立平原王徳帝每忿懼及太后崩遂誅鄧氏而廢平原王封閏雍鄉侯又小黄門江京以讒謟進初迎帝於邸以功封都鄉侯食邑各三百戸閏京並遷中常侍江京兼大長秋與中常侍樊豐黄門令劉安鉤盾令陳逹及王聖聖女伯榮扇動内外競為侈虐又帝舅大將軍耿寳皇后兄大鴻臚閻顯更相阿黨遂枉殺太尉楊震廢皇太子為濟隂王明年帝崩立北鄉侯為天子顯等遂専朝爭權乃諷有司奏誅樊豐廢耿寳王聖及黨與皆見死徙十月北鄉侯病篤程謂濟隂王謁者長興渠曰興姓渠名王以嫡統本無失徳先帝用讒遂至廢黜若北鄉疾不起共斷江京閻顯事乃可成渠等然之又中黄門南陽王康先為太子府史自太子之廢常懐歎憤又長樂太官丞京兆王國並附同於程至二十七日北鄉侯薨閻顯白太后徴諸王子簡為帝嗣未及至十一月二日程遂與王康等十八人聚謀於西鐘下皆截單衣為誓四日夜程等共會崇徳殿上因入章臺門時江京劉安及李閏陳逹等俱坐省門下程與王康共就斬京安逹以李閏權埶積為省内所服欲引為主因舉刃脅閏曰今當立濟隂王無得搖動閏曰諾於是扶閏起俱於西鐘下迎濟隂王立之是為順帝召尚書令僕射以下從輦幸南宫雲臺程等留守省門遮扞内外閻顯時在禁中憂迫不知所為小黄門樊登勸顯發兵以太后詔召越騎校尉馮詩虎賁中郎將閻崇屯朔平門以禦程等誘詩入省太后使授之印曰能得濟隂王者封萬戸侯得李閏者五千戸侯顯以詩所將衆少使與登迎吏士于左掖門外詩因格殺登歸營屯守顯弟衛尉景遽從省中還外府收兵至盛徳門程傳召諸尚書使收景尚書郭鎮時卧病聞之即率直宿羽林出南止車門逄景從吏士㧞白刃呼曰無干兵鎮即下車持節詔之景曰何等詔因斫鎮不中鎮引劒撃景墮車左右以㦸义其胷遂禽之送廷尉獄即夜死旦日令侍御史收顯等送獄於是遂定下詔曰夫表功錄善古今之通義也故中常侍長樂太僕江京黄門令劉安鉤盾令陳逹與故車騎將軍閻顯兄弟謀議惡逆傾亂天下中黄門孫程王康長樂太官丞王國中黄門黄龍彭愷孟叔李建王成張賢史汎馬國王道李元楊佗佗音駝陳予趙封李剛魏猛苖光等東觀記曰程賦棗脯又分與光曰以為信今暮其當著矣漏盡光為尚席直事通燈解劒置外持燈入章臺門程等適入光走出門欲取劒王康呼還光不應光得劒欲還入門已閉光便守宜秋門會李閏來出光因與俱迎濟隂王幸南宫雲臺詔書錄功臣令康疏名康詐疏光入章臺門光謂康曰緩急有問者當相證也詔書封光東阿侯食邑四千戸未受符策光心不自安詣黄門令自告有司奏康光欺詐主上詔書勿問遂封東阿侯邑千戸也懐忠憤發戮力協謀遂埽滅元惡以定王室詩不云乎無言不讎無徳不報詩大雅也程為謀首康國協同其封程為浮陽侯食邑萬户康為華容侯國為酈侯各九千戸黄龍為湘南侯五千户彭愷為西平昌侯西平昌縣屬平原郡孟叔為中廬侯中廬縣屬南郡李建為復陽侯各四千二百戸王成為廣宗侯張賢為祝阿侯史汎為臨沮侯臨沮縣屬南郡馬國為廣平侯王道為范縣侯李元為襃信侯楊佗為山都侯襃信山都並屬南陽郡也陳予為下雋侯下雋縣長沙郡音似兗反趙封為析縣侯李剛為枝江侯各四千户魏猛為夷陵侯二千户苖光為東阿侯千戸是為十九侯加賜車馬金銀錢帛各有差李閏以先不豫謀故不封遂擢拜程騎都尉永建元年程與張賢孟叔馬國等為司𨽻校尉虞詡訟罪懐表上殿呵叱左右帝怒遂免程官因悉遣十九侯就國後徙封程為宜城侯程既到國怨恨恚懟懟怨也音直季反封還印綬符䇿亡歸京師續漢書曰程到宜城怨恨恚懟刻瓦為印封還印綬徃來山中詔書追求復故爵土賜車馬衣物遣還國三年帝念程等功勲悉徴還京師程與王道李元皆拜騎都尉餘悉奉朝請陽嘉元年程病甚即拜奉車都尉位特進及卒使五官中郎將劉攽曰案文少一中字追贈車騎將軍印綬賜謚剛侯侍御史持節監䕶喪事乘輿幸北部尉傳北部尉之傳舍也傳音直戀反瞻望車騎程臨終遺言上書以國傳弟美帝許之而分程半封程養子壽為浮陽侯後詔書録㣲功封興渠為高望亭侯四年詔宦官養子悉聽得為後襲封爵定著乎令王康王國彭愷王成趙封魏猛六人皆早卒黄龍楊佗孟叔李建張賢史汎王道李元李剛九人與阿母山陽君宋娥更相貨賂求高官増邑又誣罔中常侍曹騰孟賁等永和二年發覺並遣就國減租四分之一宋娥奪爵歸田舍唯馬國陳予苖光保全封邑初帝見廢監太子家小黄門籍建傳高梵長秋長趙熹丞良賀藥長夏珍皆以無過獲罪建等坐徙朔方及帝即位並擢為中常侍梵坐臧罪減死一等建後封東鄉侯三百戸賀清儉退厚謙退而厚重也位至大長秋陽嘉中詔九卿舉武猛賀獨無所薦帝引問其故對曰臣生自草茅長於宫掖既無知人之明又未嘗交動士類昔衛鞅因景監以見有識知其不終史記趙良謂商君曰君之見秦王也因嬖人景監非所以為名也商君竟為秦惠所車裂也今得臣舉者匪榮伊辱固辭之及卒帝思賀忠封其養子為都鄉侯三百户曹騰傳曹騰字季興沛國譙人也安帝時除黄門從官順帝在東宫鄧太后以騰年少謹厚使侍皇太子書特見親愛及帝即位騰為小黄門遷中常侍桓帝得立騰與長樂太僕州輔等七人以定策功皆封亭侯騰為費亭侯遷大長秋加位特進騰用事省闥三十餘年奉事四帝未嘗有過其所進逹皆海内名人陳留虞放邉韶南陽延固張温𢎞農張奐潁川堂谿趙典等時蜀郡太守因計吏賂遺於騰益州刺史种暠於斜谷關搜得其書上奏太守并以劾騰請下廷尉案罪帝曰書自外來非騰之過遂寢暠奏騰不為纖介常稱暠為能吏時人嗟美之騰卒養子嵩嗣种暠後為司徒告賔客曰今身為公乃曹常侍力焉嵩靈帝時貨賂中官及輸西園錢一億萬故位至太尉嵩具袁紹傳及子操起兵不肯相隨乃與少子疾避亂琅邪為徐州刺史陶謙所殺單超傳單超河南人徐璜下邳良城人具瑗魏郡元城人左悺河南平隂人悺音工奐反又音綰唐衡潁川郾人也桓帝初超璜瑗為中常侍悺衡為小黄門史初梁冀兩妹為順桓二帝皇后冀代父商為大將軍再世權戚威振天下冀自誅太尉李固杜喬等驕横益甚皇后乗埶忌恣多所鴆毒上下鉗口周書曰賢智鉗口謂不言也拑與鉗古字通用音其炎反莫有言者帝逼畏久恒有不平恐言泄不敢謀之延熹二年皇后崩帝因如厠獨呼衡問左右與外舍不相得者皆誰乎外舍謂皇后家也衡對曰單超左悺前詣河南尹不疑禮敬小簡不疑收其兄弟送洛陽獄二人詣門謝乃得解徐璜具瑗常私忿疾外舍放横口不敢道於是帝呼超悺入室謂曰梁將軍兄弟專固國朝迫脅外内公卿以下從其風㫖今欲誅之於常侍意何如超等對曰誠國姦賊當誅日久臣等弱劣未知聖意何如耳帝曰審然者常侍密圖之對曰圖之不難但恐陛下復中狐疑中音丁仲反帝曰姦臣脅國當伏其罪何疑乎於是更召璜瑗等五人遂定其議帝齧超臂出血為盟於是詔收冀及宗親黨與悉誅之悺衡遷中常侍封超新豐侯二萬戸璜武原侯瑗東武陽侯各萬五千戸賜錢各千五百萬悺上蔡侯衡汝陽侯各萬三千戸賜錢各千三百萬五人同日封故世謂之五侯又封小黄門劉普趙忠等八人為鄉侯自是權歸宦官朝廷日亂矣超疾病帝遣使者就拜車騎將軍明年薨賜東園祕器棺中玉具贈侯將軍印綬使者理喪及𦵏發五營騎士將軍侍御史䕶喪將作大匠起冢塋劉攽曰案超贈將軍爾不可使將軍䕶喪明衍二字其後四侯轉横天下為之語曰左回天具獨坐獨坐言驕貴無偶也徐臥虎唐兩墮兩墮謂随意所為不定也今人謂持兩端而任意為兩墮諸本兩或作雨也皆競起第宅樓觀壯麗窮極伎巧金銀􅄢毦施於犬馬毦以羽毛為飾音如志反多取良人美女以為姬妾皆珍飾華侈擬則宫人其僕從皆乗牛車而從列騎又養其疏屬或乞嗣異姓或買蒼頭為子並以傳國襲封兄弟姻戚皆宰州臨郡辜較百姓與盗賊無異超弟安為河東太守弟子匡為濟陰太守璜弟盛為河内太守悺弟敏為陳留太守瑗兄恭為沛相皆為所在蠧害璜兄子宣為下邳令暴虐尤甚先是求故汝南太守下邳李暠女不能得及到縣遂將吏卒至暠家載其女歸戲射殺之埋著寺内時下邳縣屬東海汝南黄浮為東海相有告言宣者浮乃收宣家屬無少長悉考之掾史以下固諫爭浮曰徐宣國賊今日殺之明日坐死足以瞑目矣即案宣罪棄市暴其尸以示百姓郡中震慄璜於是訴怨於帝帝大怒浮坐髠鉗輸作右校五侯宗族賔客虐徧天下民不堪命起為寇賊七年衡卒亦贈車騎將軍如超故事璜卒賻贈錢布賜冢塋地明年司隸校尉韓演因奏悺罪惡及其兄太僕南鄉侯稱請託州郡聚歛為姦賔客放縱侵犯吏民悺稱皆自殺演又奏瑗兄沛相恭臧罪徴詣廷尉瑗詣獄謝上還東武侯印綬詔貶為都鄉侯卒於家超及璜衡襲封者並降為鄉侯租入嵗皆三百萬子弟分封者悉奪爵土劉普等貶為關内侯侯覽傳侯覽者山陽防東人桓帝初為中常侍以佞猾進倚埶貪放受納貨遺以巨萬計延熹中連嵗征伐府帑空虛乃假百官奉祿王侯租税覽亦上縑五千匹賜爵關内侯又託以與議誅梁冀功進封高鄉侯小黄門叚珪家在濟隂與覽並立田業近濟北界僕從賔客侵犯百姓刼掠行旅濟北相滕延一切收捕殺數十人陳尸路衢覽珪大怨以事訴帝延坐多殺無辜徴詣廷尉免延字伯行北海人後為京兆尹有理名世稱為長者覽等得此愈放縱覽兄參為益州刺史民有豐富者輒誣以大逆皆誅滅之没入財物前後累億計太尉楊秉奏參檻車徴於道自殺京兆尹袁逄於旅舍閲參車三百餘兩皆金銀錦帛珍玩不可勝數覽坐免旋復復官復上音房又反建寧二年喪母還家大起塋冢督郵張儉因舉奏覽貪侈奢縱前後請奪人宅三百八十一所田百一十八頃起立第宅十有六區皆有高樓池苑堂閣相望飾以綺畫丹漆之屬制度重深僣類宫省又豫作壽冢生而自為冢為壽冢石椁雙闕高廡百尺廡廊下周屋也破人居室發掘墳墓虜奪良人妻略婦子及諸罪釁請誅之而覽伺候遮􅎒章竟不上儉遂破覽冢宅籍没資財具言罪狀又奏覽母生時交通賔客干亂郡國復不得御御進也覽遂誣儉為鉤黨及故長樂少府李膺太僕杜密等皆夷滅之遂代曹節領長樂太僕熹平元年有司舉奏覽專權驕奢䇿收印綬自殺阿黨者皆免曹節傳曹節字漢豐南陽新野人也其本魏郡人世吏二千石順帝初以西園騎遷小黄門桓帝時遷中常侍奉車都尉建寧元年持節將中黄門虎賁羽林千人北迎靈帝陪乗入宫及即位以定䇿封長安鄉侯六百户時竇太后臨朝后父大將軍武與太傅陳蕃謀誅中官節與長樂五官史朱瑀從官史共普張亮共音恭中黄門王尊長樂謁者騰是等十七人共矯詔以長樂食監王甫為黄門令將兵誅武蕃等事已具蕃武傳節遷長樂衛尉封育陽侯増邑三千戸甫遷中常侍黄門令如故瑀封都鄉侯千五百戸普亮等五人各三百戸餘十一人皆為關内侯歳食租二千斛先是瑀等陰於明堂中禱皇天曰竇氏無道請皇天輔皇帝誅之令事必成天下得寧既誅武等詔令大官給塞具塞報祠也音蘇代反字當為賽通用賜瑀錢五千萬餘各有差後更封華容侯二年節病困詔拜為車騎將軍有頃疾瘳上印綬罷復為中常侍位特進秩中二千石尋轉大長秋熹平元年竇太后崩有何人書朱雀闕何人不知何人也言天下大亂曹節王甫幽殺太后常侍侯覽多殺黨人公卿皆尸祿無有忠言者於是詔司隸校尉劉猛逐捕十日一會猛以誹書言直不肯急捕月餘主名不立不得書闕主名猛坐左轉諫議大夫以御史中丞叚熲代猛乃四出逐捕及太學游生繋者千餘人節等怨猛不已使熲以他事奏猛抵罪輸左校朝臣多以為言乃免刑復公車徴之節遂與王甫等誣奏桓帝弟勃海王悝謀反誅之以功封者十二人甫封冠軍侯節亦増邑四千六百戸并前七千六百戸父兄子弟皆為公卿列校牧守令長布滿天下節弟破石為越騎校尉越騎營五百妻有美色韋昭辨釋名曰五百字本為伍伍當也伯道也使之導引當道陌中以驅除也案今俗呼行杖人為五百也破石從求之五百不敢違妻執意不肯行遂自殺其淫暴無道多此類也光和二年司隸校尉陽球奏誅王甫及子長樂少府萌沛相吉皆死獄中時連有災異郎中梁人審忠以為朱瑀等罪惡所感乃上書曰臣聞理國得賢則安失賢則危故舜有臣五人而天下理五臣謂禹稷契咎陶伯益也湯舉伊尹不仁者逺論語文也陛下即位之初未能萬機皇太后念在撫育權時攝政桓思竇后故中常侍蘇康管霸應時誅殄竇后傳誅康及霸太傅陳蕃大將軍竇武考其黨與志清朝政華容侯朱瑀知事覺露禍及其身遂興造逆謀作亂王室撞蹋省闥撞音直江反執奪璽綬迫脅陛下聚會羣臣離間骨肉母子之恩遂誅蕃武及尹勲等因共割裂城社自相封賞父子兄弟被䝉尊榮素所親厚布在州郡或登九列或據三司不惟禄重位尊之責而茍營私門多蓄財貨繕修第舍連里竟巷盜取御水以作魚釣水入宫苑為御水車馬服玩擬於天家羣公卿士杜口吞聲莫敢有言州郡牧守承順風㫖辟召選舉釋賢取愚故蟲蝗為之生夷寇為之起天意憤盈積十餘年故頻嵗日食於上地震於下所以譴戒人主欲令覺悟誅鉏無狀昔高宗以雉雊之變故獲中興之功高宗祭有雉升鼎耳而雊高宗修徳殷以中興見尚書也近者神祗啟悟陛下發赫斯之怒故王甫父子應時馘􅎒詩魯頌曰在泮獻馘音古獲反鄭𤣥注云謂所殺者之左耳路人士女莫不稱善若除父母之讎誠怪陛下復忍孽臣之類不悉殄滅謂復任用曹節等也昔秦信趙高以危其國呉使刑人身遘其禍左傳曰呉伐越獲俘焉以為閽使守舟呉子餘祭觀舟閽人以刀殺之虞公抱寳牽馬魯昭見逐乾侯以不用宫之竒子家駒以至滅辱公羊傳曰晉大夫荀息請以屈産之乗與垂棘之璧假道於虞以伐虢宫之竒諫不聽後晉滅虞虞公抱寳牽馬而至荀息見曰臣之謀何如又曰昭公將殺季氏告子家駒曰季氏無道僣于公室久矣吾欲殺之何如子家駒曰諸侯僣於天子大夫僣於諸侯久矣君無多辱焉昭公不從其言後逐季氏昭公奔于乾侯遂死焉今以不忍之恩赦夷族之罪姦謀一成悔亦何及臣為郎十五年皆耳目聞見瑀之所為誠皇天所不復赦願陛下留漏刻之聽裁省臣表埽滅醜類以答天怒與瑀考驗有不如言願受湯鑊之誅妻子并徙以絶妄言之路章寢不報節遂領尚書令四年卒贈車騎將軍後瑀亦病卒皆養子傳國審忠字公誠宦官誅後辟公府吕强傳吕强字漢盛河南成臯人也少以宦者為小黄門再遷中常侍為人清忠奉公靈帝時例封宦者以强為都鄉侯强辭譲懇惻固不敢當帝乃聽之因上疏陳事曰臣聞諸侯上象四七下裂王土高祖重約非功臣不侯所以重天爵明勸戒也伏聞中常侍曹節王甫張譲等及侍中許相並為列侯節等宦官祐薄品卑人賤讒謟媚主佞邪徼寵放毒人物疾妒忠良有趙高之禍未被轘裂之誅趙高指鹿為馬而殺胡亥轘裂以車裂也掩朝廷之明成私樹之黨而陛下不悟妄授茅土開國承家小人是用易曰開國承家小人勿用又并及家人重金兼紫金印紫綬重兼言累積也相繼為蕃輔受國重恩不念爾祖述修厥徳詩大雅云無念爾祖聿修厥徳聿述也而交結邪黨下比羣佞陛下惑其瑣才瑣小也特䝉恩澤又授位乖越賢才不升素餐私倖必加榮擢陰陽乖刺稼穡荒蔬鄭𤣥注周禮云蔬草有實者人用不康罔不由兹臣誠知封事已行言之無逮所以冒死干觸陳愚忠者實願陛下損改既謬從此一止臣又聞後宫綵女數千餘人衣食之費日數百金比穀雖賤而戸有饑色案法當貴而今更賤者由賦發繁數以解縣官縣官調發既多故賤糶穀以供之寒不敢衣饑不敢食民有斯戹而莫之䘏宫女無用填積後庭天下雖復盡力耕桑猶不能供昔楚女悲愁則西宫致灾公羊傳西宫灾何以書記灾也何休注云是時僖公為齊桓公所脅以齊媵為嫡楚女廢居西宫而不見恤悲愁怨曠所生也況終年積聚豈無憂怨乎夫天生蒸民立君以牧之君道得則民戴之如父母仰之猶日月左傳師曠對晉侯曰君養人如子蓋之如天容之如地人奉其君愛之如父母仰之如日月敬之如神明畏之如雷霆天生人而立之君使司牧之勿使失其性也雖時有征税猶望其仁恩之惠易曰悦以使民民忘其勞悦以犯難民忘其死易兑卦彖辭儲君副主宜諷誦斯言南面當國宜履行其事易曰聖人南面嚮明而治杜預注左傳曰當國執政也又承詔書當於河間故國起解瀆之館陛下龍飛即位雖從藩國然處九天之高豈宜有顧戀之意楚辭曰圓則九重營度之圓謂天也且河間疏逺解瀆邈絶而當勞民單力未見其便又今外戚四姓貴倖之家及中官公族無功徳者造起館舍凡有萬數樓閣相接丹青素堊郭璞注山海經曰堊似土白色音惡雕刻之飾不可單言喪𦵏踰制奢麗過禮競相放效莫肯矯拂矯正也拂戾也音扶佛反穀梁傳曰財盡則怨力盡則懟尸子曰尸子晉人也名佼秦相衛鞅客也鞅謀計未嘗不與佼䂓也商君被刑恐并誅乃亡逃入蜀作書二十篇十九篇陳道徳仁義之紀一篇言九州險阻水泉所起也君如杅民如水杅方則水方杅圓則水圓杅椀屬也音于字亦作盂上之化下猶風之靡草今上無去奢之儉下有縱欲之敝至使禽獸食民之甘土木衣民之帛昔師曠諫晉平公曰梁柱衣繡民無褐衣池有棄酒士有渴死廐馬秣粟民有饑色近臣不敢諫遠臣不得暢此之謂也説苑咎犯諫晉文公之辭也又聞前召議郎蔡邕對問於金商門而令中常侍曹節王甫等以詔書喻㫖邕不敢懐道迷國而切言極對毁刺貴臣譏呵豎宦陛下不密其言至令宣露羣邪項領膏唇拭舌毛詩曰駕彼四牡四牡項領注云項大也四牡者人所駕今但養大其領不肯為用諭大臣自恣王不能使也膏唇拭舌謂欲讒毁故也競欲咀嚼造作飛條飛條飛書也陛下同受誹謗至邕刑罪室家徙放老㓜流離豈不負忠臣哉今羣臣皆以邕為戒上畏不測之難下懼劒客之害謂蔡邕徙朔方時陽球使刺客追刺邕也臣知朝廷不復得聞忠言矣故太尉叚熲武勇冠世習於邉事􅂷髪服戎功成皓首垂髪謂童子也歴事二主謂桓帝靈帝也勲列獨昭陛下既已式序位登台司而為司隸校尉陽球所見誣脅一身既斃而妻子逺播天下惆悵功臣失望宜徴邕更授任反熲家屬則忠貞路開衆怨以弭矣帝知其忠而不能用時帝多稸私臧收天下之珍每郡國貢獻先輸中署名為導行費中署内署也導引也貢獻外别有所入以為所獻希之導引也劉攽曰注希之案文希當作物强上疏諫曰天下之財莫不生之陰陽歸之陛下萬物禀陰陽而生歸之陛下豈有公私而今中尚方歛諸郡之寳中御府積天下之繒西園引司農之臧中廐聚太僕之馬而所輸之府輒有導行之財調廣民困費多獻少姦吏因其利百姓受其敝又阿媚之臣好獻其私容謟姑息自此而進舊典選舉委任三府三府有選參議掾屬咨其行狀度其器能咨謀也受試任用責以成功若無可察然後付之尚書尚書舉劾請下廷尉覆案虛實行其誅罰今但任尚書或復勑用如是三公得免選舉之負尚書亦復不坐責賞無歸豈肯空自苦勞乎夫立言無顯過之咎明鏡無見玼之尤如惡立言以記過則不當學也不欲明鏡之見玼則不當照也韓子曰古人之目短於自見故以鏡觀面智短於自䂓故以道正已鏡無見玼之罪道無明過之惡目失鏡則無以正鬢眉身失道則無以知迷惑玼與疵同也願陛下詳思臣言不以記過見玼為責書奏不省中平元年黄巾賊起帝問强所宜施行强欲先誅左右貪濁者大赦黨人料簡刺史二千石能否帝納之乃先赦黨人於是諸常侍人人求退又各自徴還宗親子弟在州郡者中常侍趙忠夏惲等遂共搆强云與黨人共議朝廷數讀霍光傳言其欲謀廢立也强兄弟所在並皆貪穢帝不悦使中黄門持兵召强强聞帝召怒曰吾死亂起矣丈夫欲盡忠國家豈能對獄吏乎遂自殺忠惲復譖曰强見召未知所問而就外草自屏有姦明審外草自屏謂在外野草中自殺也遂收捕宗親沒入財産焉時宦者濟陰丁肅下邳徐衍南陽郭耽汝陽李廵北海趙祐等五人稱為清忠皆在里巷不爭威權廵以為諸博士試甲乙科爭第高下更相告言至有行賂定蘭臺漆書經字以合其私文者乃白帝與諸儒共刻五經文於石於是詔蔡邕等正其文字自後五經一定爭者用息趙祐博學多覽著作校書諸儒稱之又小黄門甘陵吳伉善為風角博逹有奉公稱知不得用常託病還寺舍從容養志云張譲傳張譲者潁川人趙忠者安平人也少皆給事省中桓帝時為小黄門忠以與誅梁冀功封都鄉侯與音預延熹八年黜為關中侯食本縣租千斛靈帝時譲忠並遷中常侍封列侯與曹節王甫等相為表裏節死後忠領大長秋譲有監奴典任家事交通貨賂威形諠赫扶風人孟佗佗音駝資産饒贍與奴朋結傾竭饋問無所遺愛奴咸德之問佗曰君何所欲力能辦也曰吾望汝曹為我一拜耳時賔客求謁譲者車恒數百千兩佗時詣譲後至不得進監奴乃率諸蒼頭迎拜於路遂共轝車入門賔客咸驚謂佗善於譲皆爭以珍玩賂之佗分以遺譲譲大喜遂以佗為涼州刺史三輔決錄注曰佗字伯郎以蒲陶酒一斗遺譲譲即拜佗為涼州刺史是時譲忠及夏惲郭勝孫璋畢嵐栗嵩叚珪高望張恭韓悝宋典十二人皆為中常侍封侯貴寵父兄子弟布列州郡所在貪殘為人蠧害黄巾既作盜賊糜沸郎中中山張鈞上書曰竊惟張角所以能興兵作亂萬人所以樂附之者其源皆由十常侍多放父兄子弟㛰親賔客典據州郡辜𣙜財利侵掠百姓百姓之寃無所告訴故謀議不軌聚為盜賊宜斬十常侍縣頭南郊以謝百姓又遣使者布告天下可不須師旅而大寇自消天子以鈞章示譲等皆免冠徒跣頓首乞自致洛陽詔獄並出家財以助軍費有詔皆冠履視事如故帝怒鈞曰此眞狂子也十常侍固當有一人善者不鈞復重上猶如前章輒寢不報詔使廷尉侍御史考為張角道者御史承譲等㫖遂誣奏鈞學黄巾道收掠死獄中而譲等實多與張角交通後中常侍封諝徐奏事獨發覺坐誅帝因怒詰譲等曰汝曹常言黨人欲為不軌皆令禁錮或有伏誅今黨人更為國用汝曹反與張角通為可斬未皆叩頭云故中常侍王甫侯覽所為帝乃止明年南宫灾譲忠等説帝令歛天下田畝税十錢以修宫室發太原河東狄道諸郡材木及文石每州郡部送至京師黄門常侍輒令譴呵不中者因强折賤買十分顧一顧謂酬其價也因復貨之於宦官復不為即受材木遂至腐積宫室連年不成刺史太守復増私調百姓呼嗟凡詔所徴求皆令西園騶密約勑騶養馬人號曰中使恐動州郡多受賕賂刺史二千石及茂才孝亷遷除皆責助軍修宫錢大郡至二三千萬餘各有差當之官者皆先至西園諧價然後得去諧謂平論定其價也有錢不畢者或至自殺其守清者乞不之官皆迫遣之時鉅鹿太守河内司馬直新除以有清名減責三百萬直被詔悵然曰為民父母而反割剝百姓以稱時求吾不忍也辭疾不聽行至孟津上書極陳當世之失古今禍敗之戒即吞藥自殺書奏帝為暫絶修宫錢又造萬金堂於西園引司農金錢繒帛仞積其中仞滿也又還河間買田宅起第觀帝本侯家宿貧每歎桓帝不能作家居故聚為私藏復藏寄小黄門常侍錢各數千萬常云張常侍是我父趙常侍是我母宦官得志無所憚畏並起第宅擬則宫室帝常登永安候臺永安宫也宦官恐其望見居處乃使中大人尚但諫曰尚姓但名天子不當登高登高則百姓虛散自是不敢復升臺榭春秋潛潭巴曰天子無高臺榭高臺榭則下畔之蓋因此以誑帝也明年遂使鉤盾令宋典繕修南宫玉堂又使掖庭令畢嵐鑄銅人四列於蒼龍𤣥武闕蒼龍東闕𤣥武北闕又鑄四鐘皆受二千斛縣於玉堂及雲臺殿前又鑄天祿蝦蟇吐水於平門外橋東轉水入宫又作翻車渴烏翻車設機車以引水渴烏為曲筒以氣引水上也施於橋西用灑南北郊路以省百姓灑道之費又鑄四出文錢錢皆四道識者竊言侈虐已甚形象兆見此錢成必四道而去及京師大亂錢果流布四海復以忠為車騎將軍百餘日罷六年帝崩中軍校尉袁紹説大將軍何進令誅中官以悦天下謀泄譲忠等因進入省遂共殺進而紹勒兵斬忠捕宦官無少長悉斬之譲等數十人劫質天子走河上追急譲等悲哭辭曰臣等殄滅天下亂矣惟陛下自愛皆投河而死論曰自古喪大業絶宗禋者其所漸有由矣三世以嬖色取禍夏以妺嬉殷以妲己周以褒姒劉攽曰正文案世當作代説已見前嬴氏以奢虐致灾秦始皇嬴姓也西京自外戚失祚東都緣閹尹傾國成敗之來先史商之久矣商謂商略至於釁起宦夫其略猶或可言何者刑餘之醜理謝全生聲榮無暉於門閥肌膚莫傳於來體推情未鑒其敝即事易以取信加漸染朝事頗識典物故少主慿謹舊之庸女君資出内之命顧訪無猜憚之心恩狎有可悦之色亦有忠厚平端懐術糾邪謂吕强也或敏才給對飾巧亂實若良賀對順帝不舉人也或借譽貞良先時薦譽曹騰進邉韶延周等也非直茍恣凶德止於暴横而已然眞邪並行情貎相越越違也謂貌雖似忠而情實姦邪故能回惑昏㓜迷瞀視聽蓋亦有其理焉瞀亂也音茂詐利既滋朋徒日廣直臣抗議必漏先言之間謂蔡邕對詔王甫曹節竊觀之乃宣布於外而邕下獄也至戚發憤方啟專奪之隙謂竇武謀誅宦者反為宦者所殺也斯忠賢所以智屈社稷故其為墟易曰履霜堅冰至云所從來久矣今迹其所以亦豈一朝一夕哉易曰非一朝一夕之故其所由來者漸矣由辨之不早辨也易曰履霜堅冰至盖言愼也言初履霜而堅氷至者以喻物漸而至大也贊曰任失無小過用則違況乃巷職逺參天機毛詩曰寺人巷伯作為此詩巷職即寺人之職也舞文巧態作惠作威凶家害國夫豈異歸尚書曰臣無作威作福臣有作威作福其害于而家凶于而國又曰為惡不同同歸于亂後漢書卷一百八後漢書卷一百八考證宦者傳寺人掌女宫之戒句下依宋本添注十八字王之正内者五人何焯校本者字衍月令仲冬命閹尹審門閭謹房室注于周禮則為内宰何焯曰月令吕不韋作故鄭注云於周則為内宰禮字不學者所増文選注中尚無禮字其能者則勃貂何焯曰勃貂當作勃鞮因齊寺人貂而訛不知貂即刁也孫程傳立平原王德何焯校本德當作翼曹騰傳潁川堂谿趙典等臣世駿按日知録曰蔡邕傳作五官中郎將堂谿典注堂谿姓也趙典本傳是成都人非潁川靈帝初官衛尉卒何焯校本曰趙字衍乃與少子疾避亂琅邪魏志嵩少子德張讓傳黜為關中侯何焯校本中改内後漢書卷一百八考證
