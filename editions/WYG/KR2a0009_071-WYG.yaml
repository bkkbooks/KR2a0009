body:
  text: 後漢書卷七十一宋宣城太守范煜撰唐章懷太子賢注第五鍾離宋寒烈傳第三十一第五倫曾孫種第五倫字伯魚京兆長陵人也其先齊諸田史記曰陳公子完奔齊以陳字為田氏應劭注云始食采於田改姓田氏諸田徙園陵者多故以次第爲氏倫少介然有義行王莽末盗賊起宗族閭里爭往附之倫乃依險固築營壁有賊輒奮厲其衆引彊持滿以拒之引彊謂弓弩之多力者控引之持滿不發也銅馬赤眉之屬前後數十軰皆不能下東觀記曰時米石萬錢人相食倫獨收養孤兄子外孫分糧共食死生相守鄉里以此賢之倫始以營長詣郡尹鮮于褒風俗通曰武王封箕子于朝鮮其子食采於朝鮮因氏焉褒見而異之署爲吏後褒坐事左轉髙唐令髙唐縣屬平原郡故城在今齊州祝阿縣西臨去握倫臂訣曰恨相知晚訣别也東觀記曰倫歩擔往候之留十餘日將倫上堂令妻子出相對以屬託焉倫後爲鄉嗇夫平徭賦理怨結得人歡心自以爲久宦不達遂將家屬客河東變名姓自稱王伯齊載鹽往來太原上黨所過輒爲糞除而去糞除猶掃除也陌上號爲道士親友故人莫知其處數年鮮于襃薦之於京兆尹閻興興卽召倫爲主簿時長安鑄錢多姦巧乃署倫爲督鑄錢掾領長安市東觀漢記曰時長安市未有秩又鑄錢官姦輕所集無能整齊理之者興署倫督鑄錢掾領長安市其後小人爭訟皆云第五掾所平市無姦枉劉攽曰注姦輕所集案姦輕無理當是軌字倫平銓衡正斗斛市無阿枉百姓悦服每讀詔書常歎息曰此聖主也一見決矣等軰笑之曰爾説將尚不下安能動萬乘乎華嶠書曰蓋延代鮮于襃為馮翊多非法倫數切諫延恨之故滯不得舉將謂州將倫曰未遇知已道不同故耳建武二十七年舉孝亷補淮陽國醫工長隨王之國光武召見甚異之二十九年從王朝京師隨官屬得㑹見帝問以政事倫因此酬對政道帝大悅明日復特召入與語至夕帝戯謂倫曰聞卿為吏篣婦公不過從兄飯寧有之邪倫對曰臣三娶妻皆無父少遭飢亂實不敢妄過人食華嶠書曰上復曰聞卿爲市掾人有遺母一笥餅者卿從外來見之奪母笥探口中餅信乎倫對曰實無此衆人以臣愚蔽故爲生是語也帝大笑倫出有詔以爲扶夷長扶夷縣屬零陵郡故城在今邵州武岡縣東北未到官追拜㑹稽太守雖爲二千石躬自斬芻養馬妻執炊㸑受俸裁留一月糧餘皆賤貿與民之貧羸者㑹稽俗多滛祀好卜筮民常以牛祭神百姓財産以之困匱其自食牛肉而不以薦祠者發病且死先爲牛鳴前後郡將莫敢禁倫到官移書屬縣曉告百姓其巫祝有依託鬼神詐怖愚民皆案論之有妄屠牛者吏輒行罰民初恐懼或祝詛妄言倫案之愈急後遂斷絶百姓以安永平五年坐法徵老小攀車叩馬嗁呼相隨日裁行數里不得前倫乃偽止亭舍隂乘船去衆知復追之及詣廷尉吏民上書守闕者千餘人是時顯宗方案梁松事亦多爲松訟者帝患之詔公車諸爲梁氏及㑹稽太守上書者勿復受㑹帝幸廷尉錄囚徒得免歸田里身自耕種不交通人物數歳拜為宕渠令宕渠縣故城在今渠州流江縣東北顯㧞鄉佐𤣥賀賀後為九江沛二郡守以淸潔稱所在化行終於大司農倫在職四年遷蜀郡太守蜀地肥饒人吏富實掾史家貲多至千萬皆鮮車怒馬以財貨自達怒馬謂馬之肥壯其氣憤怒也倫悉簡其豐贍者遣還之更選孤貧志行之人以處曹任於是爭賕抑絶以財相貨曰賕音其又反又音求文職修理所舉吏多至九卿二千石時以爲知人視事七歲肅宗初立擢自遠郡代牟融為司空帝以明德太后故尊崇舅氏馬廖兄弟竝居職任廖等傾身交結冠葢之士爭赴趣之倫以后族過盛欲令朝廷抑損其權上疏曰臣聞忠不隱諱直不避害不勝愚狷昧死自表狷狂狷也書曰臣無作威作福其害于而家凶于而國尚書洪範之言傳曰大夫無境外之交束脩之饋穀梁傳之文也束帛也脩脯也饋遺也近代光烈皇后雖友愛天至而卒使隂就歸國徙廢隂興賔客其後梁竇之家互有非法明帝即位竟多誅之自是洛中無復權戚書記請託一皆斷絶又譬諸外戚曰譬猶諭也苦身待士不如為國戴盆望天事不兩施司馬遷書曰僕以為戴盆何以望天也臣常刻著五藏書諸紳帶刻著五藏謂銘之於心也紳謂大帶垂之三尺論語曰子張書諸紳也而今之議者復以馬氏爲言竊聞衞尉廖以布三千匹城門校尉防以錢二百萬私贍三輔衣冠知與不知莫不畢給又聞臘月亦遺其在洛中者錢各五千越騎校尉光臘用羊三百頭米四百斛肉五千斤臣愚以爲不應經義惶恐不敢以不聞陛下情欲厚之亦宜所以安之臣今言此誠欲上忠陛下下全后家裁䝉省察裁與纔同及馬防爲車騎將軍當出征西羗倫又上疏曰臣愚以爲國戚可封侯以富之不當職事以任之何者繩以法則傷恩私以親則違憲伏聞馬防今當西征臣以太后恩仁陛下至孝恐卒有纖介難以意愛恐卒然有小過愛而不罰則廢法也聞防請杜篤爲從事中郎多賜財帛篤爲鄉里所廢客居美陽女弟爲馬氏妻恃此交通在所縣令苦其不法收繫論之今來防所議者咸致疑怪況乃以爲從事將恐議及朝廷今宜爲選賢能以輔助之不可復令防自請人有損事望望物望也茍有所懐敢不自聞竝不見省用倫雖峭直峭峻也然常疾俗吏苛刻及爲三公値帝長者屢有善政乃上疏褒稱盛美因以勸成風德曰陛下即位躬天然之德體晏晏之姿以寛𢎞臨下尚書考靈耀曰堯文塞晏晏爾雅曰晏晏温和也出入四年前歳誅刺史二千石貪殘者六人東觀漢記曰去年伏誅者刺史一人太守三人减死罪二人凡六人斯皆明聖所鑒非羣下所及然詔書每下寛和而政急不解務存節儉而奢侈不止者咎在俗敝羣下不稱故也光武承王莽之餘頗以嚴猛為政後代因之遂成風化郡國所舉類多辨職俗吏殊未有寛博之選以應上求者也陳留令劉豫冠軍令駟協竝以刻薄之姿臨人宰邑專念掠殺務為嚴苦吏民愁怨莫不疾之而今之議者反以爲能違天心失經義誠不可不愼也非徒應坐豫協亦當宜譴舉者譴責也務進仁賢以任時政不過數人則風俗自化矣臣甞讀書記知秦以酷急亡國又目見王莽亦以苛法自滅故勤勤懇懇實在於此又聞諸王主貴戚驕奢踰制京師尚然何以示遠故曰其身不正雖令不從論語孔子之言以身教者從以言教者訟夫陰陽和歲乃豐君臣同心化乃成也其刺史太守以下拜除京師及道出洛陽者宜皆見召可因博問四方兼以觀察其人諸上書言事有不合者可但報歸田里不宜過加喜怒以明在寛臣愚不足採及諸馬得罪歸國而竇氏始貴倫復上疏曰臣得以空虚之質當輔弼之任素性駑怯位尊爵重拘廹大義思自䇿厲雖遭百死不敢擇地又況親遇危言之世哉論語孔子曰邦有道危言危行邦無道危行言遜鄭𤣥注云危猶髙也據時髙言髙行必見危故以為諭也今承百王之敝人尚文巧咸趨邪路莫能守正伏見虎賁中郎將竇憲椒房之親后妃以椒塗壁取其繁衍多子故曰椒房典司禁兵出入省闈年盛志美卑謙樂善此誠其好士交結之方然諸出入貴戚者類多瑕釁禁錮之人尤少守約安貧之節士大夫無志之徒更相販賣雲集其門衆喣飄山聚蚊成雷前書中山靖王之言蓋驕佚所從生也三輔議論者至云以貴戚廢錮當復以貴戚浣濯之猶解酲當以酒也病酒曰酲詖險趣埶之徒誠不可親近蒼頡篇曰詖倿謟也臣愚願陛下中宮嚴𠡠憲等閉門自守無妄交通士大夫防其未萌慮於無形令憲永保福祿君臣交歡無纖介之隙此臣之至所願也劉攽曰案文當云是所至願也多一之字倒一所字倫奉公盡節言事無所依違諸子或時諫止輒叱遣之吏人奏記及便宜者亦并封上其無私若此性質慤少文采在位以貞白稱時人方之前朝貢禹前書曰貢禹字少翁琅邪人也以明經潔行著聞然少蘊藉不修威儀蘊藉猶寛博也亦以此見輕或問倫曰公有私乎對曰昔人有與吾千里馬者吾雖不受每三公有所選舉心不能忘而亦終不用也吾兄子常病一夜十往劉攽曰麻延年云唐睿宗下詔用十起作元子事夲出於此明當作起也退而安寢吾子有疾雖不省視而竟夕不眠若是者豈可謂無私乎連以老病上疏乞身元和三年賜策罷以二千石奉終其身加賜錢五十萬公宅一區後數年卒時年八十餘詔賜秘器衣衾錢布少子頡嗣劉攽曰案倫未嘗有爵無縁言嗣明多此一字歴桂陽廬江南陽太守所在見稱順帝之爲太子廢也樊豐等譖之廢爲濟陰王頡爲太中大夫與太僕來歴等共守闕固爭帝即位擢爲將作大匠卒官三輔決録注曰頡字子陵爲郡功曹州從事公府辟舉髙第爲侍御史南頓令桂陽南陽廬江三郡太守諫議大夫洛陽無主人鄉里無田宅客止靈臺中或十日不炊司𨽻校尉南陽左雄太史令張衡尚書廬江朱建孟興皆與頡故舊各致禮餉頡終不受倫曾孫種論曰第五倫峭覈爲方峭覈謂其性峻急好窮覈事情非夫愷悌之士省其奏議惇惇歸諸寛厚惇惇純厚之貎也音敦將懲苛切之敝使其然乎昔人以弦韋爲佩蓋猶此矣韓子曰西門豹性急佩韋以自緩董安于性緩佩弦以自急也然而君子侈不僭上儉不偪下禮記曰管仲鏤簋而朱紘旅樹而反玷山節藻梲賢大夫也而難爲上也晏平仲祀其先人豚肩不掩豆賢大夫也而難爲下也君子上不僭上下不偪下豈尊臨千里而與牧圉等庸乎詎非矯激則未可以中和言也種字興先少厲志義為吏冠名州郡永夀中以司徒掾淸詔使冀州廉察灾害風俗通曰汝南周勃辟太尉淸詔使荆州又此言以司徒淸詔使冀州蓋三公府有淸詔員以承詔使也廉察也舉奏刺史二千石以下所刑免甚衆棄官奔走者數十人還以奉使稱職拜高密侯相是時徐兗二州盜賊羣軰高密在二州之郊種乃大儲糧稸勤厲吏士賊聞皆憚之桴鼓不鳴流民歸者歲中至數千家桴擊鼓杖也音夫以能換爲衞相周後衛公也遷兗州刺史中常侍單超兄子匡爲濟陰太守負埶貪放種欲收舉未知所使㑹聞從事衞羽素抗厲乃召羽具告之謂曰聞公不畏彊禦今欲相委以重事若何對曰願庶幾於一割以鈆刀諭羽出遂馳至定陶閉門收匡賔客親吏四十餘人六七日中糾發其臧五六十萬種卽奏匡幷以劾超匡窘迫遣刺客刺羽羽覺其姦乃收繫客具得情狀州内震慄朝廷嗟歎之是時太山賊叔孫無忌等暴横一境州郡不能討羽說種曰中國安寧忘戰日久而太山險阻宼猾不制今雖有精兵難以赴敵羽請往譬降之種敬諾羽乃往備說禍福無忌即帥其黨與三千餘人降單超積懐忿恨遂以事陷種竟坐徙朔方超外孫董援爲朔方太守稸怒以待之初種爲衞相以門下掾孫斌賢善遇之及當徙斥斌具聞超謀乃謂其友人同縣閭子直及髙宻甄子然曰蓋盜憎其主從來舊矣第五使君當投裔土而單超外屬爲彼郡守夫危者易仆可爲寒心吾今方追使君庻免其難若奉使君以還將以付子二人曰子其行矣是吾心也於是斌將俠客晨夜追種及之於太原遮險格殺送吏因下馬與種斌自歩從一日一夜行四百餘里遂得脱歸種匿於閭甄氏數年徐州從事臧旻上書訟之曰臣聞士有忍死之辱必有就事之計故季布屈節於朱家前書曰季布楚人爲任侠有名數窘漢王髙祖購求布千金布匿濮陽周氏周氏曰漢求將軍急敢進計布許之乃髠鉗布衣褐幷其家僮之魯朱家所賣之朱家買置田舍言之髙祖赦之後爲河東守管仲錯行於召忽説苑子路問於孔子曰昔者管子欲立公子糾而不能召忽死之管仲不死是無仁也孔子曰召忽者人臣之材不死則三軍之虜也死之則名聞於天下矣何爲不死哉管子者天子之佐諸侯之相也死之則不免於溝瀆之中不死則功復用於天下夫何爲死之哉錯猶乖也此二臣以可死而不死者非愛身於須臾貪命於茍活隱其智力顧其權畧庻幸逢時有所爲耳卒遭髙帝之成業齊桓之興伯遺其亡逃之行赦其射鈎之讎㧞於囚虜之中信其佐國之謀信音申勲效傳於百世君臣載於篇籍假令二主紀過於纖介則此二臣同死於犬馬沈名於溝壑當何由得申其補過之功建其竒奥之術乎伏見故兗州刺史第五種傑然自建在鄉曲無苞苴之嫌苞苴饋遺也歩朝堂無擇言之闕口無可擇之言也天性疾惡公方不曲故論者說淸髙以種爲上序直士以種爲首春秋之義選人所長棄其所短錄其小善除其大過種所坐以盜賊公負筋力未就太山之賊種不能討是力不足以禁之法當公坐故云公負也罪至徵徙非有大惡昔虞舜事親大杖則走家語孔子謂曾子之言也故種逃亡茍全性命冀有朱家之路以顯季布之㑹願陛下無遺須臾之恩令種有持忠入地之恨㑹赦出卒於家鍾離意傳鍾離意字子阿㑹稽山陰人也少爲郡督郵時部縣亭長有受人酒禮者府下記案考之記文符也案察之意封還記入言於太守曰春秋先内後外公羊傳曰春秋内其國而外諸夏内諸夏而外夷狄詩云刑于寡妻以御于家邦詩大雅之文刑見也御治也明政化之本由近及遠今宜先淸府内且濶畧逺縣細㣲之愆太守甚賢之遂任以縣事建武十四年㑹稽大疫死者萬數疫癘氣也意獨身自隱親經給醫藥隱親謂親自隱恤之經給謂經營濟給之所部多䝉全濟舉孝廉再選辟大司徒侯霸府詔部送徒詣河内時冬寒徒病不能行路過𢎞農意輒移屬縣使作徒衣縣不得已與之而上書言狀意亦具以聞光武得奏以見霸曰君所使掾何乃仁於用心誠良吏也意遂於道解徒桎梏在手日梏在足曰桎恣所欲過與尅期俱至無或違者還以病免後除瑕丘令瑕丘今兗州縣也吏有檀建者盜竊縣内意屏人問狀建叩頭服罪不忍加刑遣令長休建父聞之爲建設酒謂曰吾聞無道之君以刃殘人有道之君以義行誅子罪命也遂令建進藥而死二十五年遷堂邑令堂邑故城在今博州堂邑縣西北縣人防廣爲父報讎繋獄其母病死廣哭泣不食意憐傷之乃聽廣歸家使得殯歛丞掾皆爭意曰罪自我歸義不累下遂遣之言罪歸於我不累於丞掾廣斂母訖果還入獄意密以狀聞廣竟得以減死論顯宗即位徵爲尚書時交阯太守張恢坐臧千金徵還伏法以資物簿入大司農簿文記也詔班賜羣臣意得珠璣悉以委地而不拜賜帝怪而問其故對曰臣聞孔子忍渇於盜泉之水曾參回車於勝母之閭惡其名也說苑曰邑名勝母曾子不入水名盜泉仲尼不飲醜其名也尸子又載其言也此臧穢之寳誠不敢拜帝嗟歎曰淸乎尚書之言乃更以庫錢三十萬賜意轉爲尚書僕射車駕數幸廣成苑意以爲從禽廢政常當車陳諫般樂遊田之事天子卽時還宮永平三年夏旱而大起北宫意詣闕免冠上疏曰伏見陛下以天時小旱憂念元元降避正殿躬自克責而比日密雲遂無大潤易曰密雲不雨自我西郊豈政有未得應天心者邪昔成湯遭旱以六事自責曰政不節邪使人疾邪宮室榮邪女謁盛邪苞苴行邪䜛夫昌邪帝王記曰成湯大旱七年齋戒翦髮㫁爪以已爲犧牲禱於桑林之社以六事自責竊見北宫大作人失農時此所謂宫室榮也自古非苦宮室小狹但患人不安寧宜且罷止以應天心臣意以匹夫之才無有行能久食重禄擢備近臣比受厚賜喜懼相半不勝愚戇征營罪當萬死征營不自安也帝策詔報曰湯引六事咎在一人其冠履勿謝比上天降旱密雲數㑹朕戚然慙懼思獲嘉應故分布禱請窺候風雲北祈明堂南設雩場明堂在洛陽城南言北祈者蓋時修雩場在明堂之南今又勑大匠止作諸宮減省不急庻消災譴詔因謝公卿百僚遂應時澍雨焉説文云雨所以澍生萬物故曰澍音注時詔賜降胡子縑尚書案事誤以十爲百帝見司農上簿大怒召郎將笞之意因入叩頭曰過誤之失常人所容若以懈慢爲愆則臣位大罪重郎位小罪輕咎皆在臣臣當先坐乃解衣就格格拘執也帝意解使復冠而貰郎帝性􅄶察好以耳目隱發爲明隱猶私也故公卿大臣數被詆毁近臣尚書以下至見提拽常以事怒郎藥崧以杖撞之崧走入牀下帝怒甚疾言曰郎出郎出崧曰天子穆穆諸侯煌煌曲禮之文也穆穆羙也煌煌盛也未聞人君自起撞郎帝赦之朝廷莫不􅋺慄争爲嚴切以避誅責唯意獨敢諫争數封還詔書臣下過失輒救解之㑹連有變異意復上疏曰伏惟陛下躬行孝道修明經術郊祀天地畏敬鬼神憂恤黎元勞心不怠而天氣未和日月不明易通卦驗曰愚智同位則日月無光水泉湧溢寒暑違節者咎在羣臣不能宣化理職而以苛刻爲俗吏殺良人繼踵不絶百官無相親之心吏人無雍雍之志爾雅曰雍雍和也至於骨肉相殘毒害彌深感逆和氣以致天灾百姓可以德勝難以力服先王要道民用和睦故能致天下和平灾害不生禍亂不作鹿鳴之詩必言宴樂者鹿鳴詩小雅宴羣臣也其詩曰呦呦鹿鳴食野之苹我有嘉賔鼓瑟吹笙以人神之心洽然後天氣和也願陛下垂聖德揆萬機詔有司愼人命緩刑罰順時氣以調陰陽垂之無極帝雖不能用然知其至誠亦以此故不得久留出爲魯相意别傳曰意爲魯相到官出私錢萬三千文付戸曹孔訢修夫子車身入廟拭几席劒履男子張伯除堂下草土中得玉璧七枚伯懐其一以六枚白意意令主簿安置几前孔子教授堂下牀首有懸甕意召孔訢問此何甕也對曰夫子甕也背有丹書人莫敢發也意曰夫子聖人所以遺甕欲以懸示後賢因發之中得素書文曰後世修吾書董仲舒䕶吾車拭吾履發吾笥㑹稽鍾離意璧有七張伯藏其一意即召問伯果服焉劉攽曰注錢萬三千文案古人言錢不曰文世俗乃有此文明多一文字後德陽殿成漢宮殿名曰北宮中有德陽殿百官大㑹帝思意言謂公卿曰鍾離尚書若在此殿不立意視事五年以愛利爲化東觀記曰意在堂邑爲政愛利輕刑愼罰撫循百姓如赤子初到縣市無屋意出俸錢帥人作屋人齎茅竹或持林木爭起趨作浃日而成功作既畢爲解土祝曰興功役者令百姓無事如有禍祟令自當之人皆悦服人多殷富以久病卒官遺言上書陳升平之世難以急化宜少寛假帝感傷其意下詔嗟歎賜錢二十萬藥崧者河内人天性朴忠家貧爲郎常獨直臺上無被枕杫杫音思潰反謂爼几也方言云蜀漢之郊曰杫食糟糠帝每夜入臺輒見崧問其故甚嘉之自此詔太官賜尚書以下朝夕餐給帷被皂袍及侍史二人蔡質漢官儀曰尚書郎入直臺中官供新靑縑白綾被或錦被晝夜更宿帷帳晝通中枕卧旃蓐冬夏隨時改易大官供食五日一羙食下天子一等尚書郎伯使二人女侍史二人皆選端正者伯使從至止車門還女侍史絜被服執香爐燒燻從入臺中給使護衣服也崧官至南陽太守宋均傳族子意宋均字叔庠南陽安衆人也父伯建武初爲五官中郎將均以父任爲郎時年十五好經書每休沐日輒受業博士通詩禮善論難至二十餘調補辰陽長辰陽今辰州辰溪縣其俗少學者而信巫鬼均爲立學校禁絶淫祀人皆安之以祖母喪去官客游潁川後爲謁者㑹武陵蠻反圍武威將軍劉尚詔使均乘傳發江夏奔命三千人往救之前書音義曰擢選精勇聞命奔走謂之奔命也既至而尚已没㑹伏波將軍馬援至詔因令均監軍與諸將俱進賊拒阸不得前及馬援卒於師軍士多溫濕疾病死者太半均慮軍遂不反乃與諸將議曰今道遠士病不可以戰欲權承制降之何如諸將皆伏地莫敢應均曰夫忠臣出竟有可以安國家專之可也公羊傳曰聘禮大夫受命不受辭出境有以安社禝全國家者則專之可也乃矯制調伏波司馬吕种守沅陵長命种奉詔書入虜營告以恩信因勒兵隨其後蠻夷震怖即共斬其大帥而降於是入賊營散其衆遣歸本郡爲置長吏而還均未至先自劾矯制之罪光武嘉其功迎賜以金帛令過家上冡其後每有四方異議數訪問焉遷上蔡令時府下記禁人喪葬不得侈長長音直亮反禁之不得奢侈有餘均曰夫送終踰制失之輕者今有不義之民尚未循化而遽罰過禮非政之先竟不肯施行遷九江太守郡多虎暴數爲民患常募設檻穽而猶多傷害檻爲機以捕獸穽謂穿地䧟之均到下記屬縣曰夫虎豹在山黿鼉在水各有所托且江淮之有猛獸猶北土之有雞豚也今爲民害咎在殘吏而勞勤張捕非憂恤之本也其務退姦貪思進忠善可一去檻穽除削課制其後傳言虎相與東游度江中元元年山陽楚沛多蝗其飛至九江界者輒東西散去由是名稱遠近浚遒縣有唐后二山民共祠之浚遒縣屬廬江郡故城在今廬州愼縣南衆巫遂取百姓男女一以為公嫗以男爲山公以女爲山嫗猶祭之有尸主也歲歲改易既而不敢嫁娶前後守令莫敢禁均乃下書曰自今以後爲山娶者皆娶巫家勿擾良民於是遂絶永平元年遷東海相在郡五年坐法免官客授潁川而東海吏民思均恩化爲之作歌詣闕乞還者數千人顯宗以其能七年徵拜尚書令每有駮議多合上㫖均甞刪翦疑事帝以爲有姦大怒收郎縳格之諸尚書惶恐皆叩頭謝罪均顧厲色曰蓋忠臣執義無有二心若畏威失正均雖死不易志小黄門在傍入具以聞帝善其不撓即令貰郎遷均司𨽻校尉數月出爲河内太守政化大行均常寢病百姓耆老爲禱請旦夕問起居其爲民愛若此以疾上書乞免詔除子條爲太子舍人均自扶輿詣闕謝恩帝使中黄門慰問因留養疾司徒缺帝以均才任宰相召入視其疾令兩騶扶之騶養馬者亦曰騶騎均拜謝曰天罰有罪所苦浸篤不復奉望帷幄因流涕而辭帝甚傷之召條扶侍均出賜錢三十萬均性寛和不喜文法常以爲吏能𢎞厚雖貪汙放縱猶無所害至於苛察之人身或廉法而巧􅃛刻削毒加百姓災害流亡所由而作及在尚書恒欲叩頭爭之以時方嚴切故遂不敢陳帝後聞其言而追悲之建初元年卒於家族子意意字伯志父京以大夏侯尚書教授夏侯勝也至遼東太守意少傳父業顯宗時舉孝廉以召對合㫖擢拜阿陽侯相阿陽縣屬天水郡故城在今秦州隴城縣西北建初中徵爲尚書肅宗性寛仁而親親之恩篤故叔父濟南中山二王每數入朝特加恩寵及諸昆弟竝留京師不遣就國意以爲人臣有節不宜踰禮過恩乃上疏諫曰陛下至孝烝烝恩愛隆深以濟南王康中山王焉先帝昆弟特䝉禮寵聖情戀戀不忍遠離比年朝見久留京師崇以叔父之尊同之家人之禮車入殿門即席不拜分甘損膳賞賜優渥昔周公懐聖人之德有致太平之功然後王曰叔父加以賜幣詩魯頌曰王曰叔父建爾元子俾侯于魯尚書曰周公既成洛邑成王命召公出取幣錫周公也今康焉幸以支庶享食大國陛下即位蠲除前過還所削黜衍食它縣衍謂流衍傍食它縣男女少長竝受爵邑恩寵踰制禮敬過度春秋之義諸父昆弟無所不臣所以尊尊卑卑彊幹弱枝者也陛下德業隆盛當爲萬世典法不宜以私恩損上下之序失君臣之正又平西王羡等六王皆妻子成家官屬備具當早就蕃國爲子孫基阯而室第相望久磐京邑磐謂盤桓不去婚姻之盛過於本朝僕馬之衆充塞城郭驕奢僭擬寵祿隆過今諸國之封竝皆膏腴風氣平調道路夷近朝聘有期行來不難宜割情不忍以義斷恩禮記曰門内之政恩掩義門外之政義斷恩發遣康焉各歸蕃國令羡等速就便時行日取便利之時也以塞衆望帝納之章和二年鮮卑擊破北匈奴而南單于乘此請兵北伐因欲還歸舊庭時竇太后臨朝議欲從之意上疏曰夫戎狄之隔遠中國幽處北極爾雅曰東至於泰遠西至於邠國南至於濮鈆北至於祝栗謂之四極也界以沙漠簡賤禮義無有上下彊者爲雄弱即屈服自漢興以來征伐數矣其所尅獲曾不補害光武皇帝躬服金革之難深昭天地之明故因其來降羈縻畜養邉人得生勞役休息於兹四十餘年矣今鮮卑奉順斬獲萬數中國坐享大功享受也而百姓不知其勞漢興功烈於斯爲盛所以然者夷虜相攻無損漢兵者也臣察鮮卑侵伐匈奴止是利其抄掠及歸功聖朝實由貪得重賞今若聽南虜還都北庭則不得不禁制鮮卑鮮卑外失暴掠之願内無功勞之賞豺狼貪婪必爲邊患今北虜西遁請求和親宜因其歸附以爲外扞巍巍之業無以過此若引兵費賦以順南虜則坐失上略去安即危矣誠不可許㑹南單于竟不北徙遷司𨽻校尉永元初大將軍竇憲兄弟貴盛歩兵校尉鄧疊河南尹王調故蜀郡太守廉范等羣黨出入憲門負埶放縱意隨違舉奏無所囘避由是與竇氏有隙二年病卒孫俱靈帝時爲司空漢官儀曰字伯儷也寒朗傳寒朗字伯竒魯國薛人也生三日遭天下亂棄之荆棘數日兵解母往視猶尚氣息遂收養之及長好經學博通書傳以尚書教授舉孝廉永平中以謁者守侍御史與三府掾屬共考案楚獄顔忠王平等辭連及隧鄉侯耿建朗陵侯臧信䕶澤侯鄧鯉曲成侯劉建建等辭未嘗與忠平相見是時顯宗怒甚吏皆惶恐諸所連及率一切陷入無敢以情恕者朗心傷其寃試以建等物色獨問忠平物色謂形狀也而二人錯愕不能對錯愕猶倉卒也錯音七故反愕音五故反朗知其詐乃上言建等無姦專爲忠平所誣疑天下無辜類多如此帝乃召朗入問曰建等即如是忠平何故引之朗對曰忠平自知所犯不道故多有虛引冀以自明帝曰即如是四侯無事何不早奏獄竟而久繫至今邪朗對曰臣雖考之無事然恐海内别有發其姦者故未敢時上時上猶即上也上音時掌反帝怒罵曰吏持兩端促提下左右方引去朗曰願一言而死小臣不敢欺欲助國耳帝問曰誰與共為章對曰臣自知當必族滅不敢多汚染人誠冀陛下一覺悟而已臣見考囚在事者咸共言妖惡大故臣子所宜同疾今出之不如入之可無後責是以考一連十考十連百又公卿朝㑹陛下問以得失皆長跪言舊制大罪禍及九族陛下大恩裁止於身天下幸甚及其歸舎口雖不言而仰屋竊歎莫不知其多寃無敢牾陛下者臣今所陳誠死無悔帝意解詔遣朗出後二日車駕自幸洛陽獄録囚徒理出千餘人後平忠死獄中朗乃自繫㑹赦免官復舉孝廉建初中肅宗大㑹羣臣朗前謝恩詔以朗納忠先帝拜爲易長易今易州縣也歳餘遷濟陽令以母喪去官百姓追思之章和元年上行東廵狩過濟陽三老吏人上書陳朗前政治狀帝至梁召見朗詔三府爲辟首由是辟司徒府永元中再遷淸河太守坐法免永初三年太尉張禹薦朗爲博士徵詣公車㑹卒時年八十四論曰左丘明有言仁人之言其利博哉晏子一言齊侯省刑左氏傳曰齊景公謂晏子曰子之宅近市識貴賤乎于時景公繁於刑有鬻踊者故對曰踊貴而屨賤景公爲是省於刑君子曰仁人之言其利博哉踊謂刖足者屨若鍾離意之就格請過寒朗之廷爭寃獄篤矣乎仁人之情也夫正直本於忠誠則不詭詭詐也本於諫爭則絞切論語孔子曰直而無禮則絞絞急也彼二子之所本得乎天故言信而志行也言而見信諫而必從故曰志行贊曰伯魚子阿矯急去苛臨官以潔匡帝以奢宋均達政禁此妖禜禜祭也于命反禽蟲畏德子民請病謂人爲之請禱也意明尊尊割恩蕃屏穀梁傳曰爲尊者諱敵爲親者諱敗尊尊親親之義也意諫令諸王歸藩故云割恩藩屏音協韻必政反惵惵楚黎寒君爲命惵惵懼也黎衆也後漢書卷七十一後漢書卷七十一考證第五倫傳吏輒行法民初恐懼一本初字下有頗字臣愚不足採及諸馬得罪歸國臣㑹汾按臣愚不足採下當有脱句鍾離意傳光武得奏以見霸曰日知録曰見當作視古示字作視謂以意奏示霸也不勝愚戅征營征當作怔宋均傳宋均字叔庠南陽安衆人也何焯曰按黨錮傳注引謝承書云宗資字叔都南陽安衆人也家代爲漢將相名臣祖父均自有傳則宋字傳寫誤也南蠻傳中叙受降事正作謁者宗均此即見於本書可參校者寒朗傳上行東廵狩諸本同臣㑹汾按東平王蒼傳中亦有此語疑行字衍後漢書卷七十一考證
