body:
  text: 後漢書卷四十七宋宣城太守范煜撰唐章懐太子賢注馮岑賈列傳第七馮異傳馮異字公孫潁川父城人也父城縣名故城在今許州葉縣東北汝州郟城縣亦有父城好讀書通左氏春秋孫子兵法孫子名武善用兵吳王闔廬之將也作兵法十三篇見史記漢兵起異以郡掾監五縣與父城長苗萌共城守為王莽拒漢光武畧地潁川攻父城不下屯兵巾車郷巾車郷名在父城界異間出行屬縣間出猶㣲行行音下孟反為漢兵所執時異従兄孝及同郡丁綝呂晏東觀記曰綝字㓜春定陵人伉健有武畧綝音丑心反並従光武因共薦異得召見異曰異一夫之用不足為彊弱有老母在城中願歸據五城以効功報德光武曰善異歸謂苗萌曰今諸將皆壯士屈起多暴横獨有劉將軍所到不虜掠觀其言語舉止非庸人也可以歸身苗萌曰死生同命敬従子計光武南還宛更始諸將攻父城者前後十餘輩異堅守不下及光武為司𨽻校尉道經父城異等即開門奉牛酒迎光武署異為主簿苗萌為従事異因薦邑子銚期音姚叔夀叚建左隆等東觀記及續漢書叚並作殷字光武皆以為掾史従至洛陽更始數欲遣光武徇河北諸将皆以為不可是時左丞相曹竟子詡為尚書竞字子期山陽人後死於赤眉之難見前書詡音虛羽反父子用事異勸光武厚結納之及度河北詡有力焉自伯升之敗光武不敢顯其悲戚每獨居輙不御酒肉枕席有涕泣䖏異獨叩頭寛譬哀情光武止之曰卿勿妄言異復因間進説曰天下同苦王氏思漢乆矣今更始諸将従横㬥虐従音子用反横音胡孟反所至虜掠百姓失望無所依戴今公専命方面施行恩徳夫有桀紂之亂乃見湯武之功人久饑渴易為充飽猶言凋殘之後易流徳澤宜急分遣官屬循行郡縣理寃結布恵澤光武納之至邯鄲遣異與銚期乗𫝊撫循屬縣録囚徒存鰥寡亡命自詣者除其罪陰條二千石長吏同心及不附者上之及王郎起光武自薊東南馳晨夜草舍舍止息也至饒陽無蔞亭無蔞亭名在今饒陽縣東北蔞音力于反時天寒烈衆皆饑疲異上豆粥明旦光武謂諸将曰昨得公孫豆粥饑寒俱解及至南宮南宮縣名屬信都國今冀州縣也遇大風雨光武引車入道傍空舍異抱薪鄧禹􅉯火􅉯音而悦反光武對竈燎衣燎炙也異復進麥飯莵肩因復度虖沱河至信都光武紀云度虖沱河至下愽城西見白衣老父曰信都去此八十里耳是自北而南此傳先言至南宫後言度虖沱河南宮在虖沱河南百有餘里又似自南而北紀傳兩文全相乖背迹其地理紀是傳非諸家之書並然亦未詳其故使異别收河間兵還拜偏将軍従破王郎封應侯應國名周武王子所封也杜預注春秋曰應國在㐮城成父縣西南異為人謙退不伐行與諸将相逢輙引車避道東觀記續漢書云異勑吏士非交戰受敵常行諸營之後相逢引車避之由是無争道變鬭者也進止皆有表識言其進退有常䖏也軍中號為整齊每所止舍諸将並坐論功異常獨屏樹下軍中號曰大樹将軍及破邯鄲乃更部分諸将各有配𨽻𨽻屬也袁山松曰先時諸将同營吏卒多犯法軍士皆言願屬大樹将軍光武以此多之多重也别擊破鐵脛於北平北平縣名屬中山國故城在今易州永樂縣也又降匈奴于林闟頓王匈奴王號山陽公載記曰頓字作碓前書音義闟音蹋頓音碓因従平河北時更始遣舞陰王李軼廪丘王田立大司馬朱鮪白虎公陳僑東觀記僑字作矯将兵號三十萬與河南太守武勃共守洛陽光武将北徇燕趙以魏郡河内獨不逢兵而城邑完全倉廪實乃拜寇恂為河内太守異為孟津将軍孟地名古今以為津綂二郡軍河上與恂合埶以拒朱鮪等異乃遺李軼書曰愚聞眀鏡所以照形往事所以知今孔子家語曰孔子觀周明堂四門之墉有堯舜桀紂之象謂従者曰明鏡所以察形古事所以知今昔㣲子去殷而入周項伯畔椘而歸漢史記曰㣲子名啓紂之庻兄周武王伐紂㣲子乃持祭噐肉袒靣縛造于軍門武王乃釋其縛復其位項伯名纒項籍之季父素善張良髙祖因良與伯結婚項籍謀害漢王伯以身翊蔽之籍誅乃歸漢也周勃迎代王而黜少帝霍光尊孝宣而廢昌邑少帝孝恵後宫之子名𢎞恵帝崩周勃以𢎞非恵帝之子乃黜之迎立代王昭帝崩無嗣霍光乃迎立武帝孫昌邑王賀賀無道光廢之而立宣帝彼皆畏天知命覩存亡之符見廢興之事故能成功扵一時垂業扵萬世也茍令長安尚可扶助延期嵗月疏不間親逺不踰近季文豈能居一隅哉長安謂更始季文李軼字言軼與更始疏逺獨居一隅理難支久欲其早圖去就今長安壊亂赤眉臨郊王侯搆難大臣乖離綱紀已絶時更始大臣張卬申屠建隗囂等以赤眉入闗謀劫更始歸南陽是大臣乖離也四方分崩異姓並起是故蕭王跋渉霜雪經營河北方今英俊雲集百姓風靡雖邠岐慕周不足以喻史記曰古公亶父修后稷之業積徳行義國人皆戴之戎翟攻之不忍戰其人乃與其私屬去邠止於岐下邠人舉國扶老携弱盡復歸古公於岐山之下季文誠能覺悟成敗亟定大計論功古人亟急也古人即謂㣲子項伯等轉禍為福在此時矣如猛将長驅嚴兵圍城雖有悔恨亦無及已初軼與光武首結謀約加相親愛及更始立反共陷伯升雖知長安已危欲降又不自安乃報異書曰軼本與蕭王首謀造漢結死生之約同榮枯之計今軼守洛陽将軍鎮孟津俱㩀機軸機弩牙也軸車軸也皆在物之要故取諭焉千載一㑹思成斷金易曰二人同心其利斷金唯深逹蕭王願進愚䇿以佐國安人軼自通書之後不復與異爭鋒故異因此得北攻天井闗㧞上黨兩城天井闗在大行山下觧見章紀又南下河南成臯以東十三縣及諸屯聚皆平之降者十餘萬武勃將萬餘人攻諸畔者異引軍度河與勃戰於士郷下續漢書曰士郷亭名屬河南郡大破斬勃獲首五千餘級軼又閉門不救異見其信效具以奏聞光武故宣露軼書東觀記曰上報異曰軼多詐不信人不能得其要領令移其書令朱鮪知之鮪怒遂使人刺殺軼由是城中乖離多有降者鮪乃遣討難将軍蘇茂将數萬人攻温鮪自将數萬人攻平陰以綴異平陰縣名屬河南郡綴謂連綴也異遣校尉護軍将軍将兵劉攽曰案異為孟津將軍軍有護軍爾云護軍将軍非也緣下有将兵字明衍将軍二字與宼恂合撃茂破之異因度河撃鮪鮪走異追至洛陽環城一帀而歸移檄上狀諸將皆入賀并勸光武即帝位光武乃召異詣鄗問四方動静異曰三王反畔更始敗亡三王謂張卭為淮陽王廖湛為穰王胡殷為随王更始欲殺卭等遂勒兵掠東西市入戰於宫中更始大敗天下無主宗廟之憂在於大王宜従衆議上為社稷下為百姓光武曰我昨夜夢乗赤龍上天覺悟心中動悸異因下席再拜賀曰此天命發於精神周易乾卦九五曰飛龍在天大人造也荘子曰其夢也神交故言天命發於精神心中動悸大王重慎之性也異遂與諸將定議上尊號建武二年春定封異陽夏侯夏音賈引撃陽翟賊劉攽曰案文少一軍字他傳中言引軍者甚多嚴終趙根破之詔異歸家上冢使太中大夫齎牛酒續漢志曰太中大夫秩千石掌顧問論議屬光禄令二百里内太守都尉已下及宗族㑹焉時赤眉延岑暴亂三輔郡縣大姓各擁兵衆大司徒鄧禹不能定乃遣異代禹討之車駕送至河南賜以乗輿七尺具劒具謂以寳玉装飾之東觀記作玉具劒勑異曰三輔遭王莽更始之亂重以赤眉延岑之酷元元塗炭無所依訴今之征伐非必畧地屠城要在平定安集之耳諸将非不徤鬬然好虜掠卿本能御吏士念自脩勑無為郡縣所苦異頓首受命引而西所至皆布威信𢎞農羣盗稱将軍者十餘軰皆率衆降異東觀記曰黽池霍郎陜主長湖濁恵華陰陽沈等稱将軍者皆降異與赤眉遇於華陰相拒六十餘日戰數十合降其将劉始王宣等東觀記宣作重五千餘人三年春遣使者即拜異為征西大将軍㑹鄧禹率車騎将軍鄧𢎞等引歸與異相遇禹𢎞要異共攻赤眉異曰異與賊相拒且數十日雖屢獲雄将餘衆尚多可稍以恩信傾誘難卒用兵破也上今使諸将屯黽池要其東而異擊其西一舉取之此萬成計也禹𢎞不従𢎞遂大戰移日赤眉陽敗棄輜重走車皆載土以豆覆其上兵士饑爭取之赤眉引還擊𢎞𢎞軍潰亂異與禹合兵救之赤眉小郤異以士卒饑倦可且休禹不聼復戰大為所敗死傷者三千餘人禹得脱歸宜陽異棄馬歩走上回谿阪回谿今俗所謂回阬在今洛州永寕縣東北其谿長四里闊二丈深二丈五尺也與麾下數人歸營復堅壁收其散卒招集諸營保數萬人與賊約期㑹戰使壯士變服與赤眉同伏於道側旦日赤眉使萬人攻異前部異裁出兵以救之裁小出兵所以示弱也賊見埶弱遂悉衆攻異異乃縦兵大戰日昃賊氣衰伏兵卒起衣服相亂赤眉不復識别衆遂驚潰追擊大破於崤底降男女八萬人餘衆尚十餘萬東走宜陽降璽書勞異曰赤眉破平士吏勞苦始雖垂翅回谿終能奮翼黽池以鳥為喻可謂失之東隅收之桑榆淮南子曰至於衡陽是謂隅中又前書谷子雲曰太白出西方六十日法當參天今已過期尚在桑榆間桑榆謂晚也方論功賞以答大勲時赤眉雖降衆㓂猶盛延岑據藍田王歆據下邽秦武公伐邽戎致之也隴西有上邽故此有下也芳丹據新豐續漢書芳作茅蒋震據霸陵霸陵文帝陵因以為縣名故秦芒陽縣張邯據長安公孫守據長陵楊周據谷口谷口縣名屬左馮翊故城在今醴泉縣東北呂鮪據陳倉角閎據汧駱蓋延據􅉦厔任良據鄠汝章據槐里各稱將軍擁兵多者萬餘少者數千人轉相攻擊異且戰且行屯軍上林苑中延岑既破赤眉自稱武安王拜置牧守欲據闗中引張邯任良共攻異異擊破之斬首千餘級諸營保守附岑者皆來降歸異岑走攻析析縣名椘之白羽邑也即今鄧州内郷縣異遣復漢将軍鄧曄輔漢将軍于匡要擊岑大破之降其將蘇臣等八千餘人岑遂自武闗走南陽時百姓饑餓人相食黄金一斤易豆五升道路斷隔委輸不至軍士悉以果實為糧詔拜南陽趙匡為右扶風將兵助異并送縑穀軍中皆稱萬嵗異兵食漸盛乃稍誅擊豪傑不従令者襃賞降附有功勞者悉遣其渠帥詣京師散其衆歸本業威行闗中唯呂鮪張邯蔣震遣使降蜀其餘悉平眀年公孫述遣將程焉將數萬人就呂鮪出屯陳倉異與趙匡迎擊大破之焉退走漢川異追戰於箕谷復破之還擊破呂鮪營保降者甚衆其後蜀復數遣將間出異輙摧挫之賈逵注國語曰折其鋒曰挫懐來百姓申理枉結出入三嵗上林成都成都言歸附之多也史記曰一年成邑三年成都異自以久在外不自安上書思慕闕廷願親帷幄帝不許後人有章言異専制關中斬長安令威權至重百姓歸心號為咸陽王帝使以章示異東觀記曰使者宋嵩西上因以章示異異惶懼上書謝曰臣本諸生遭遇受命之㑹充備行伍過蒙恩私位大將爵通侯通侯即徹侯避武帝諱改焉受任方面以立㣲功謂西方一面尃以委之皆自國家謀慮愚臣無所能及臣伏自思惟以詔勑戰攻每輙如意時以私心斷决未嘗不有悔國家獨見之眀乆而益逺乃知性與天道不可得而聞也當兵革始起擾攘之時豪傑競逐逐爭也迷惑千數臣以遭遇託身聖眀在傾危溷殽之中尚不敢過差而况天下平定上尊下卑而臣爵位所蒙巍巍不測乎誠冀以謹勑遂自終始見所示臣章戰慄怖懼伏念眀主知臣愚性固敢因縁自陳詔報曰将軍之於國家義為君臣恩猶父子何嫌何疑而有懼意六年春異朝京師引見帝謂公卿曰是我起兵時主簿也為吾披荆棘定關中荆棘榛梗之謂以喻紛亂既罷使中黄門賜以珍寳衣服錢帛詔曰倉卒無蔞亭豆粥虖沱河麥飯厚意乆不報異稽首謝曰臣聞管仲謂桓公曰願君無忘射鈎臣無忘檻車齊國頼之史記管仲将兵遮莒道射桓公中鈎後魯桎梏管仲而送於齊齊以為相説苑曰管仲桎梏檻車中非無媿也自裁也新序曰齊桓公與管仲飲酒酣管仲上夀曰願君無忘出奔於莒也臣亦無忘束縛於魯也此云射鈎檻車義亦通臣今亦願國家無忘河北之難小臣不敢忘巾車之恩謂光武獲異於巾車而赦之後數引讌見定議圗蜀留十餘日令異妻子隨異還西夏遣諸將上隴為隗囂所敗乃詔異軍栒邑未及至隗囂乗勝使其將王元行巡將二萬餘人下隴因分遣巡取栒邑異卽馳兵欲先據之諸將皆曰虜兵盛而新乗勝不可與争宜止軍便地徐思方畧異曰虜兵臨境忸􅏸小利忸􅏸猶慣習也謂慣習前事而復為之爾雅曰忸復也郭景純曰謂慣􅏸復為之也忸音尼丑反􅏸音逝遂欲深入若得栒邑三輔動揺是吾憂也夫攻者不足守者有餘孫子兵法之文今先據城以逸待勞非所以爭也潛往閉城偃旗鼓行巡不知馳赴之異乗其不意卒撃鼓建旗而出巡軍驚亂奔走追撃數十里大破之祭遵亦破王元於汧於是北地諸豪長耿定等悉畔隗囂降異上書言狀不敢自伐孔安國注尚書曰自矜曰伐諸將或欲分其功帝患之乃下璽書曰制詔大司馬虎牙建威漢中捕虜劉攽曰案王常傳中當作忠武威將軍虜兵猥下三輔驚恐大司馬吴漢也虎牙蓋延也建威耿弇也漢中王常也捕虜馬武也武威劉尚也廣雅曰猥衆也栒邑危亡在於旦夕北地營保按兵觀望今偏城獲全虜兵挫折使耿定之屬復念君臣之義征西功若丘山猶自以為不足孟之反奔而殿亦何異哉孟之反魯大夫魯與齊戰魯師敗之反殿是其功也将入魯門乃策其馬曰吾非敢後馬不進是謙而不自伐也今遣太中大夫賜征西吏士死傷者醫藥棺殮大司馬已下親弔死問疾以崇謙讓於是使異進軍義渠并領北地太守事義渠縣名屬北地郡青山胡率萬餘人降異青山在北地參巒界青山中水所出也續漢書曰安定屬國人本屬國降胡也居參巒青山中其豪帥號肥頭少卿劉攽曰注參巒案地理志巒當作䜌異又撃盧芳将賈覽匈奴薁鞬日逐王破之薁音於六反上郡安定皆降異復領安定太守事九年春祭遵卒詔異守征虜将軍并将其營及隗囂死其将王元周宗等復立囂子純猶總兵據冀公孫述遣将趙匡等救之帝復令異行天水太守事攻匡等且一年皆斬之東觀記曰時賜馮異璽書曰聞吏士精鋭水火不避購賞之賜必不令將軍負丹青失斷金諸將共攻冀不能拔欲且還休兵異固持不動常為衆軍鋒眀年夏與諸將攻落門未拔落門聚名在冀縣有落門山病發薨于軍謚曰節侯長子彰嗣眀年帝思異功復封彰弟訴為析郷侯十三年更封彰東緡侯食三縣東觀記曰東緡縣名屬山陽郡左傳曰齊侯伐宋圍緡即此地也在今兗州金郷縣永平中徙封平郷侯東觀記曰永平五年封平郷侯食欝林潭中彰卒子普嗣有罪國除東觀記曰坐鬭殺游徼㑹赦國除永初六年安帝下詔曰夫仁不遺親義不忘勞興滅繼絶善善及子孫古之典也論語曰興滅國繼絶世公羊傳曰善善及子孫惡惡止其身昔我光武受命中興恢𢎞聖緒横被四表昭假上下昭眀也假至也上下天地假音格光耀萬世祉祚流衍垂於罔極予末小子夙夜永思追惟勲烈披圗案籍建武元功二十八将佐命虎臣讖記有徴蓋蕭曹紹封傳繼於今和帝永和四年詔紹封蕭曹之後以彰厥功也况此未逺而或至乏祀朕甚愍之其條二十八将無嗣絶世若犯罪奪國其子孫應當綂後者分别署狀上將及景風章叙舊徳顯兹遺功焉春秋考異郵曰夏至四十五日景風至宋均注曰景風至則封有功也於是紹封普子晨為平郷侯眀年二十八將絶國者皆紹封焉岑彭傳岑彭字君然南陽棘陽人也棘音紀力反王莽時守本縣長漢兵起攻拔棘陽彭將家屬奔前隊大夫甄阜阜怒彭不能固守拘彭母妻令効功自補彭將賔客戰鬭甚力及甄阜死彭被創亡歸宛與前隊貳嚴説共城守前隊大夫貳甄阜之副也姓嚴名説東觀記云貳師嚴尤共城守計嚴尤為大司馬又非貳師與此不同漢兵攻之數月城中糧盡人相食彭乃與説舉城降諸將欲誅之大司徒伯升曰彭郡之大吏執心堅守是其節也今舉大事當表義士不如封之以勸其後更始乃封彭為歸徳侯歸徳縣名屬北地郡令屬伯升及伯升遇害彭復為大司馬朱鮪校尉従鮪撃王莽楊州牧李聖殺之定淮陽城鮪薦彭為淮陽都尉更始遣立威王張卭與將軍徭偉鎮淮陽風俗通曰東越王徭句踐之後其後徭為姓東觀記曰徭作滛偉反擊走卬彭引兵攻偉破之遷潁川大守㑹舂陵劉茂起兵畧下潁川彭不得之官乃與麾下數百人従河内太守邑人韓歆㑹光武徇河内歆議欲城守彭止不聼既而光武至懐歆迫急迎降光武知其謀大怒收歆置鼓下將斬之中將軍最尊自執旗鼓若置營則立旗以為軍門并設鼔戮人必於其下劉攽曰注中将軍案文當為中軍將召見彭彭因進説曰今赤眉入關更始危殆權臣放縦矯稱詔制道路阻塞四方蜂起羣雄競逐百姓無所歸命竊聞大王平河北開王業此誠皇天祐漢士人之福也彭幸蒙司徒公所見全濟未有報徳旋被禍難永恨於心今復遭遇願出身自效光武深接納之彭因言韓歆南陽大人大人謂大家豪右可以為用乃貰歆貰寛也以為鄧禹軍師更始大將軍呂植將兵屯淇園彭説降之於是拜彭為刺姦大將軍使督察衆營續漢書曰時更始尚書令謝躬將六將軍屯鄴兵横暴為百姓所苦上先遣吴漢往收之故拜彭為刺姦將軍授以常所持節従平河北光武即位拜彭廷尉歸徳侯如故行大將軍事續漢書曰彭鎮河内馮異先攻洛陽朱鮪大出軍欲撃彭時天霧鮪以為彭已去令其兵皆穫黍彭乃進撃大破之與大司馬吴漢大司空王梁建義大將軍朱祐右將軍萬脩執金吾賈復驍騎將軍劉植揚化將軍堅鐔積射將軍侯進偏將軍馮異祭遵王霸等圍洛陽數月朱鮪等堅守不肯下帝以彭嘗為鮪校尉令往説之鮪在城上彭在城下相勞苦歡語如平生彭因曰彭往者得執鞭侍従蒙薦舉拔擢常思有以報恩今赤眉已得長安更始為三王所反觧見上文皇帝受命平定燕趙盡有幽冀之地百姓歸心賢俊雲集親率大兵来攻洛陽天下之事逝其去矣公雖嬰城固守將何待乎嬰繞也謂以城自嬰繞而守之鮪曰大司徒被害時鮪與其謀與音預又諫更始無遣蕭王北伐誠自知罪深彭還具言於帝帝曰夫建大事者不忌小怨鮪今若降官爵可保况誅罸乎河水在此吾不食言指河以為信言其眀白也彭復往告鮪鮪従城上下索曰必信可乗此上彭趣索欲上趣向也鮪見其誠即許降後五日鮪將輕騎詣彭顧勑諸部將曰堅守待我我若不還諸君徑將大兵上轘轅歸郾王更始傳尹尊為郾王乃面縛與彭俱詣河陽東觀記曰詣行在所河津亭帝即觧其縛召見之復令彭夜送鮪歸城眀旦悉其衆出降拜鮪為平狄將軍封扶溝侯鮪淮陽人後為少府前書曰少府秦官秩二千石續漢書曰少府掌中服御諸物衣服寳貨珍膳之屬傳封累代建武二年使彭擊荆州下犨葉等十餘城犨縣名屬南陽郡故城在今汝州魯山縣東南葉今許州葉縣也續漢書曰彭南擊荆州至城安昆陽犨葉舞陽堵陽平氏棘陽胡陽䖏䖏皆破其屯聚是時南方尤亂南郡人秦豐據黎邱自稱楚黎王畧十有二縣東觀記曰豐邔縣人少學長安受律令歸為縣吏更始元年起兵攻得邔宜城若編臨沮中沮廬襄陽鄧新野穰湖陽蔡陽兵合萬人邔音求紀反董訢起堵郷許邯起杏南陽復陽縣有杏聚又更始諸將各擁兵據南陽諸城帝遣吴漢伐之漢軍所過多侵暴時破虜將軍鄧奉謁歸新野怒吴漢掠其郷里遂返撃破漢軍𫉬其輜重屯據淯陽與諸賊合従秋彭破杏降許邯遷征南大將軍復遣朱祐賈復及建威大將軍耿弇漢中將軍王常劉攽曰中當作忠武威將軍郭守越騎將軍劉宏偏將軍劉嘉耿植等與彭并力討鄧奉先擊堵郷而奉將萬餘人救董訢訢奉皆南陽精兵彭等攻之連月不剋三年夏帝自將南征至葉董訢別將將數千人􅃒道車騎不可得前彭奔擊大破之帝至堵陽鄧奉夜逃歸淯陽續漢書曰奉令候伏道旁見車将一日不絶歸語奉奉遂夜遁董訢降彭復與耿弇賈復及積弩將軍傅俊騎都尉臧宫等従追鄧奉於小長安小長安觧見光武紀帝率諸將親戰大破之奉迫急乃降帝憐奉舊功臣且釁起吴漢欲全宥之彭與耿弇諌曰鄧奉背恩反逆暴師經年􅃱賈復傷痍朱祐見𫉬陛下既至不知悔善而親在行陳兵敗乃降若不誅奉無以懲惡於是斬之奉者西華侯鄧晨之兄子也車駕引還令彭率傅俊臧宮劉宏等三萬餘人南擊秦豐拔黄郵黄郵聚名也在南陽新都縣豐與其大將蔡宏拒彭等於鄧數月不得進帝怪以讓彭彭懼於是夜勒兵馬申令軍中使眀旦西擊山都山都縣名屬南陽郡舊南陽之赤郷秦以為縣故城在今㐮州義清縣東北乃緩所𫉬虜令得逃亡歸以告豐豐即悉其軍西邀彭彭乃潛兵度􅃆水擊其將張楊於阿頭山大破之􅃆水源出武都東狼谷中即漢水之上源也阿頭山在㐮陽也従川谷間伐木開道直襲􅀺丘擊破諸屯兵豐聞大驚馳歸救之彭與諸將依東山為營豐與蔡宏夜攻彭彭豫為之備出兵逆擊之豐敗走追斬蔡宏更封彭為舞陰侯秦豐相趙京舉宜城降拜為成漢將軍與彭共圍豐於黎丘時田戎擁衆夷陵東觀記曰田戎西平人與同郡人陳義客夷陵為羣盗更始元年義戎將兵陷夷陵陳義自稱黎丘大將軍戎自稱掃地大將軍襄陽􅂄舊記曰戎號周成王義稱臨江王聞秦豐􅀍圍懼大兵方至欲降而妻兄辛臣諫戎曰今四方豪傑各據郡國洛陽地如掌耳續漢書曰辛臣為戎作地圗圖彭寵張歩董憲公孫述等所得郡國云洛陽所得如掌耳不如按甲以觀其變戎曰以秦王之彊猶為征南所圍豈况吾邪降計决矣四年春戎乃留辛臣守夷陵自將兵㳂江泝沔止黎丘刻期日當降而辛臣於後盗戎珍寳従間道先降於彭而以書招戎戎疑必賣已遂不敢降東觀記曰戎至期日灼龜卜降兆中拆遂止不降而反與秦豐合彭出兵攻戎數月大破之其大將伍公詣彭降戎亡歸夷陵帝幸黎丘勞軍封彭吏士有功者百餘人彭攻秦豐三嵗斬首九萬餘級豐餘兵裁千人又城中食且盡帝以豐轉弱令朱祐代彭守之使彭與傅俊南撃田戎大破之遂㧞夷陵追至秭歸秭歸縣名今歸州觧見和紀戎與數十騎亡入蜀盡獲其妻子士衆數萬人彭以將伐蜀漢而夾川谷少水險難漕運留威虜將軍馮駿軍江州江州縣名今渝州巴縣也東觀記曰長沙中尉馮駿將兵詣彭璽書拜駿為威虜將軍都尉田鴻軍夷陵領軍李𤣥軍夷道自引兵還屯津郷當荆州要㑹津郷縣名所謂江津也柬觀記曰津郷當荆楊之咽喉喻告諸蠻夷降者奏封其君長初彭與交趾牧鄧讓厚善與讓書陳國家威徳東觀記曰讓夫人光烈皇后姊也又遣偏將軍屈充移檄江南班行詔命於是讓與江夏太守侯登武陵太守王堂長沙相韓福桂陽太守張隆零陵太守田翕蒼梧太守杜穆交趾太守錫光等相率遣使貢獻悉封為列侯或遣子將兵助彭征伐續漢書曰張隆遣子曄將兵詣彭助征伐上以曄為率義侯不總遣子故言或於是江南之珍始流通焉六年冬徴彭詣京師數召讌見厚加賞賜復南還津郷有詔過家上冢大長秋以朔望問太夫人起居大長秋皇后屬官漢法列侯之母方稱太夫人也八年彭引兵従車駕破天水與吴漢圍隗囂於西城時公孫述將李育將兵救囂守上邽帝留蓋延耿弇圍之而車駕東歸勑彭書曰兩城若下便可將兵南撃蜀虜人苦不知足既平隴復望蜀每一發兵頭鬚為白彭遂壅谷水灌西城城未没丈餘東觀記曰時以縑囊盛土為堤灌西城谷水従地中數丈涌出故城不拔續漢書云以縑盛土為堤囂將行巡周宗將蜀救兵到囂得出還冀漢軍食盡燒輜重引兵下隴延弇亦相隨而退囂出兵尾撃諸營彭殿為後拒尾謂尋其後而擊之凡軍在前曰啓在後曰殿東觀記曰彭東入𢎞農界百姓持酒肉迎軍曰蒙將軍為後拒全子弟得生還也故諸將能全師東歸彭還津郷九年公孫述遣其將任滿田戎程汎將數萬人乗枋箄下江闗枋箄以竹木為之浮於水上爾雅曰舫泭也郭景純曰水中􅗝筏也華陽國志曰巴楚相攻故置江闗舊在赤甲城後移在江南岸對白帝城故基在今夔州魚復縣南枋即舫字古通用耳箄音歩佳反泭音匹俱反擊破馮駿及田鴻李𤣥等遂拔夷道夷陵據荆門虎牙觧見光武紀横江水起浮橋鬬樓立欑柱絶水道結營山上以拒漢兵彭數攻之不利於是裝直進樓船冐突露橈數千艘並船名樓船之上施樓橈小檝也爾雅曰檝謂之橈露橈謂露檝在外人在船中冐突取其觸冐而唐突也橈音饒十一年春彭與吴漢及誅虜將軍劉隆輔威將軍臧宫驍騎將軍劉歆發南陽武陵南郡兵又發桂陽零陵長沙委輸棹卒凡六萬餘人棹卒持棹行船也東觀記作櫂前書鄧通以櫂船為黄頭郎櫂音直教反騎五千匹皆㑹荆門吴漢以三郡棹卒多費糧穀欲罷之彭以蜀兵盛不可遣上書言狀帝報彭曰大司馬習用歩騎不曉水戰荆門之事一由征南公為重而已彭乃令軍中募攻浮橋先登者上賞於是偏將軍魯竒應募而前時天風狂急彭竒船逆流而上直衝浮橋而欑柱鉤不得去續漢書曰時天東風其攢柱有反把鉤竒船不得去竒等乗埶殊死戰因飛炬焚之風怒火盛橋樓崩燒彭復悉軍順風並進所向無前蜀兵大亂溺死者數千人斬任滿生獲程汎而田戎亡保江州彭上劉隆為南郡太守自率臧宫劉歆長驅入江闗令軍中無得虜掠所過百姓皆奉牛酒迎勞彭見諸耆老為言大漢哀愍巴蜀乆見虜役故興師逺伐以討有罪為人除害讓不受其牛酒百姓皆大喜悦爭開門降詔彭守益州牧所下郡輙行太守事東觀記曰彭若出界即以太守號付後將軍選官屬守州中長史劉攽曰注長史案長史是王國官守令皆長吏也此宜作吏彭到江州以田戎食多難卒拔留馮駿守之自引兵乗利直指墊江攻破平曲墊江縣名屬巴郡今忠州縣也墊音徒協反平曲地闕收其米數十萬石公孫述使其將延岑呂鮪王元及其弟恢悉兵拒廣漢及資中資中縣名屬犍為郡其地在今資州資陽縣又遣將侯丹率二萬餘人拒黄石彭乃多張疑兵使護軍楊翕與臧宮拒延岑等自分兵浮江下還江州泝都江而上都江成都江也襲擊侯丹大破之因晨夜倍道兼行二千餘里徑拔武陽武陽觧見光武紀使精騎馳廣都廣都縣名屬蜀郡故城在今益州成都縣東南去成都數十里埶若風雨所至皆奔散初述聞漢兵在平曲故遣大兵逆之及彭至武陽繞出延岑軍後蜀地震駭述大驚以杖擊地曰是何神也彭所營地名彭亡聞而惡之欲徙㑹日暮蜀刺客詐為亡奴降夜刺殺彭彭首破荆門長驅武陽持軍整齊秋豪無犯豪毛也秋毛喻細也髙祖曰吾入闗秋豪無所取卭穀王任貴聞彭威信數千里遣使迎降前書音義曰任貴越嶲夷殺太守枚根自立為卭穀王㑹彭已薨帝盡以任貴所獻賜彭妻子謚曰壯侯蜀人憐之為立廟武陽嵗時祠焉子遵嗣徙封細陽侯細陽縣名屬汝南郡故城在今潁川汝陰縣西十三年帝思彭功復封遵弟淮為榖陽侯榖陽縣名屬沛郡遵永平中為屯騎校尉遵卒子伉嗣伉音口葬反伉卒子杞嗣東觀記曰杞作起元初中坐事免元初三年坐事失國建光元年安帝復封杞細陽侯順帝時為光禄勲杞卒子熙嗣尚安帝妹涅陽長公主少為侍中虎賁中郎將朝廷多稱其能遷魏郡太守魏郡秦時置故城在今相州安陽縣東北招聘隱逸與參政事無為而化視事二年輿人歌之曰我有枳棘岑君伐之枳棘多搸梗以喻宼盜充斥也我有蟊賊岑君遏之蟊賊食禾稼蟲名以喻姦吏侵漁也狗吠不驚足下生氂氂長毛也犬無追吠故足下生􅈊含哺鼓腹焉知凶災哺食也鼓撃也我喜我生獨丁斯時丁猶當也美矣岑君於戲休兹於戲歎美之詞見爾雅於音烏戲音許宜反熙卒子福嗣為黄門侍郎賈復傳賈復字君文南陽冠軍人也少好學習尚書事舞陰李生李生竒之謂門人曰賈君之容貌志氣如此而勤於學將相之器也王莽末為縣掾迎鹽河東㑹遇盗賊等比十餘人皆放散其鹽復獨完以還縣縣中稱其信時下江新市兵起復亦聚衆數百人於羽山自號將軍更始立乃將其衆歸漢中王劉嘉以為校尉復見更始政亂諸將放縦乃説嘉曰臣聞圖堯舜之事而不能至者湯武是也堯禪舜舜禪禹湯乃放桀武王誅紂故言不能至者圖湯武之事而不能至者桓文是也齊桓公小白晉文公重耳春秋之時周衰二君霸有海内圖桓文之事而不能至者六國是也六國謂韓趙魏燕齊椘分裂中夏各自跨據又不逮桓文定六國之規欲安守之而不能至者亡六國是也今漢室中興大王以親戚為藩輔天下未定而安守所保所保得無不可保乎嘉曰卿言大非吾任也大司馬劉公在河北必能相施第持我書往施用也第但也復遂辭嘉受書北度河及光武於栢人因鄧禹得召見光武竒之禹亦稱有將帥節於是署復破虜將軍督盗賊復馬羸羸力佳反光武觧左驂以賜之驂者服外之馬也東觀記續漢書左並作右官屬以復後来而好陵折等輩調補鄗尉光武曰賈督有折衝千里之威方任以職勿得擅除東觀記曰時上置兩府官屬復與叚孝共坐孝謂復曰卿將軍督我大司馬督不得共坐復曰俱劉公吏有何尊卑官屬以復不遜上調官屬補長吏共白欲以復為鄗尉上署報不許也光武至信都以復為偏將軍及拔邯鄲遷都護將軍従擊青犢於射犬大戰至日中賊陳堅不郤光武傳召復曰吏士皆饑可且朝飯復曰先破之然後食耳於是被羽先登被猶負也析羽為旌旗將軍所執先登先赴敵也所向皆靡賊乃敗走諸將咸服其勇又北與五校戰於真定大破之復傷創甚光武大驚曰我所以不令賈復别將者為其輕敵也果然失吾名將聞其婦有孕生女邪我子娶之生男邪我女嫁之不令其憂妻子也復病尋愈追及光武於薊相見甚懽大饗士卒令復居前擊鄴賊破之光武即位拜為執金吾封冠軍侯先度河攻朱鮪於洛陽與白虎公陳僑戰連破降之建武二年益封穰朝陽二縣更始郾王尹尊及諸大將在南方未降者尚多帝召諸將議兵事未有言沈吟久之乃以檄叩地曰郾最彊宛為次誰當擊之復率然對曰臣請擊郾帝笑曰執金吾擊郾吾復何憂大司馬當撃宛遂遣復與騎都尉陰識驍騎將軍劉植南度五社津擊郾連破之月餘尹尊降盡定其地引東擊更始淮陽太守暴氾氾降屬縣悉定其秋南擊召陵新息平定之新息縣名屬汝南郡故城在今豫州新息縣西南也明年春遷左將軍别擊赤眉於新城澠池間連破之新城今伊闕縣與帝㑹宜陽降赤眉復従征伐未嘗喪敗數與諸將潰圍解急身被十二創帝以復敢深入希令逺征而壯其勇節常自従之故復少方面之勲東觀記曰吴漢擊蜀未破上書請復自助上不遣諸將每論功自伐復未嘗有言帝輙曰賈君之功我自知之十三年定封膠東侯食郁秩壯武下密卽墨梃胡觀陽凡六縣六縣皆屬膠東國壯武故城在今萊州即墨縣西下密在今青州北海縣東北即墨在今萊州膠水縣東南梃胡故城在今萊州昌陽縣西北觀陽在昌陽縣東梃一音廷復知帝欲偃干戈脩文徳不欲功臣擁衆京師乃與髙密侯鄧禹並剽甲兵敦儒學廣雅曰剽削也謂削除甲兵東觀記曰復闔門養威重受易經起大義帝深然之遂罷左右將軍復以列侯􅈬第加位特進東觀記曰上以天下既定思念欲完功臣爵土不令以吏職為過故皆以列侯就第也復為人剛毅方直多大節既還私第闔門養威重朱祐等薦復宜為宰相帝方以吏事責三公故功臣並不用是時列侯唯髙密固始膠東三侯與公卿參議國家大事恩遇甚厚髙密侯鄧禹固始侯李通三十一年卒諡曰剛侯子忠嗣忠卒子敏嗣建初元年坐誣告母殺人國除肅宗更封復小子邯為膠東侯邯弟宗為即墨侯各一縣邯卒子育嗣育卒子長嗣宗字武孺少有操行多智畧初拜郎中稍遷建初中為朔方太守舊内郡徙人在邊者率多貧弱為居人所僕役不得為吏宗擢用其任職者與邊吏參選轉相監司以擿發其姦或以功次補長吏故各願盡死匈奴畏之不敢入塞東觀記曰匈奴常犯塞得生口問太守為誰曰賈武孺曰寜賈將軍子邪曰是皆故遣還是後更不入塞徵為長水校尉宗兼通儒術毎讌見常使與少府丁鴻等論議於前章和二年卒朝廷愍惜焉子參嗣參卒子建嗣元初元年尚和帝女臨頴長公主主兼食潁陰許合三縣數萬戸時鄧太后臨朝光寵最盛以建為侍中順帝時為光禄勲論曰中興將帥立功名者衆矣唯岑彭馮異建方面之號自函谷以西方城以南方城山名一名黄城山在今唐州方城縣東北也兩將之功實為大焉若馮賈之不伐岑公之信義信謂朱鮪知其誠而降義謂荆人奉牛酒讓不受乃足以感三軍而懐敵人故能尅成逺業終全其慶也昔髙祖忌柏人之名違之以全福征南惡彭亡之地留之以生灾柏人縣名也髙祖嘗欲宿於柏人曰柏人者迫於人也不宿而去後竟有貫髙之事豈㡬慮自有明惑將期數使之然乎贊曰陽夏師克實在和徳膠東鹽吏征南宛賊竒鋒震敵逺圗謀國後漢書卷四十七
