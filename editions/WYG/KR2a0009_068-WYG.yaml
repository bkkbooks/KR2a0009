body:
  text: 後漢書卷六十八宋宣城太守范煜撰唐章懐太子賢注張法滕馮度楊列傳第二十八張宗傳張宗字諸君南陽魯陽人也王莽時為縣陽泉鄉佐續漢書曰鄉佐主佐鄉收稅賦㑹莽敗義兵起宗乃率陽泉民三四百人起兵略地西至長安更始以宗為偏將軍宗見更始政亂因將家屬客安邑及大司徒鄧禹西征定河東宗詣禹自歸禹聞宗數多權謀乃表為偏將軍禹軍到栒邑赤眉大衆且至禹以栒邑不足守欲引師進就堅城而衆人多畏賊追憚為後拒禹乃書諸將名於竹簡署其前後亂著笥中令各探之笥以竹為之鄭𤣥注禮記云圓曰簟方曰笥宗獨不肯探曰死生有命張宗豈辭難就逸乎禹歎息謂曰將軍有親弱在營奈何不顧宗曰愚聞一卒畢力百人不當萬夫致死可以横行宗今擁兵數千以承大威何遽其必敗乎遂留為後拒諸營既引兵宗方勒厲軍士堅壘壁以死當之禹到前縣議曰以張將軍之衆當百萬之師猶以小雪投沸湯雖欲戮力其勢不全也乃遣歩騎二千人反還迎宗宗引兵始發而赤眉卒至宗與戰郤之乃得歸營於是諸將服其勇及還到長安宗夜將銳士入城襲赤眉中矛貫胛胛背上兩膊間又轉攻諸營保為流矢所激皆㡬至於死及鄧禹徴還光武以宗為京輔都尉秦每郡有尉一人典兵禁景帝更名都尉武帝元鼎四年置京輔都尉各一人二千石見前書也劉攽曰按武帝置三輔都尉此注下文又有各字明脫左右輔三字將突騎與征西大將軍馮異共擊關中諸營保破之遷河南都尉建武六年都尉官省拜太中大夫八年潁川桑中盗賊羣起宗將兵擊定之後青冀盗賊屯聚山澤宗以謁者督諸郡兵討平之十六年琅邪北海盗賊復起宗督二郡兵討之乃設方略明購賞皆悉破散於是沛楚東海臨淮羣賊懼其威武相捕斬者數千人青徐震慄後遷琅邪相其政好嚴猛敢殺伐永平二年卒於官法雄傳法雄字文彊扶風郿人也齊襄王法章之後秦滅齊子孫不敢稱田姓故以法為氏法章齊湣王子也法章子建立為秦所滅見史記宣帝時徙三輔世為二千石雄初仕郡功曹續漢志曰郡皆置諸曹掾史功曹史主選功勞也辟太傅張禹府舉雄髙第除平氏長平氏縣屬南陽郡故城今唐州平氏縣也善政事好發擿姦伏盗賊稀發吏人畏愛之南陽太守鮑得上其理狀遷宛陵令永初三年海賊張伯路等三千餘人冠赤幘服絳衣自稱將軍寇濵海九郡殺二千石令長初遣侍御史龎雄督州郡兵擊之伯路等乞降尋復屯聚明年伯路復與平原劉文河等三百餘人稱使者攻厭次城殺長吏厭次今棣州縣是也轉入髙唐髙唐今博州縣燒宫寺出繫囚渠帥皆稱將軍共朝謁伯路伯路冠五梁冠佩印綬漢官儀曰諸侯冠進賢三梁卿大夫尚書二千石冠兩梁千石以下至小吏冠一梁無五梁制者也黨衆浸盛乃遣御史中丞王宗持節發幽冀諸郡兵合數萬人乃徴雄為青州刺史與王宗并力討之連戰破賊斬首溺死者數百人餘皆奔走收器械財物甚衆㑹赦詔到賊猶以軍甲未觧不敢歸降於是王宗召刺史太守共議皆以為當遂擊之雄曰不然兵凶器戰危事史記范蠡之辭勇不可恃勝不可必賊若乗船浮海深入逺島攻之未易也及有赦令可且罷兵以慰誘其心勢必觧散然後圖之可不戰而定也宗善其言即罷兵賊聞大喜乃還所略人而東莱郡兵獨未觧甲賊復驚恐遁走遼東止海島上五年春乏食復抄東莱間雄率郡兵擊破之賊逃還遼東遼東人李久等共斬平之於是州界清静雄每行部録囚徒察顔色多得情偽長吏不奉法者皆觧印綬去在州四年遷南郡太守斷獄省少户口益増郡濵帶江沔水經曰沔水出武都沮縣東狼谷中至江夏沙羡縣北南入于江羡音夷又有雲夢藪澤雲夢澤今在安州永初中多虎狼之暴前太守賞募張捕反為所害者甚衆雄乃移書屬縣曰凡虎狼之在山林猶人之居城市古者至化之世猛獸不擾禮記曰大道之行四靈以為畜龍以為畜故魚鮪不淰鳳以為畜故鳥不獝麟以為畜故獸不狘是不擾之也皆由恩信寛澤仁及飛走太守雖不徳敢忘斯義記到其毁壊檻穽不得妄捕山林檻謂捕獸之機也穽謂穽地陷獸也是後虎害稍息人以獲安在郡數嵗嵗常豐稔稔熟也初平中卒官子真在逸人傳滕撫傳滕撫字叔輔北海劇人也初仕州郡稍遷為涿令有文武才用太守以其能委任郡職兼領六縣續漢志涿郡領七縣除涿以外有逎故安范陽良鄉北新城方城六縣使撫兼領之風政修明流愛于人在事七年道不拾遺順帝末揚徐盗賊羣起磐牙連嵗磐牙謂相連結建康元年九江范容周生等相聚反亂屯據歴陽歴陽今和州縣為江淮巨患遣御史中丞馮緄將兵督揚州刺史尹燿九江太守鄧顯討之燿顯軍敗為賊所殺又隂陵人徐鳳馬勉等復㓂郡縣殺略吏人鳳衣絳衣帶黑綬稱無上將軍勉皮冠黄衣帶玉印稱皇帝築營於當塗山中當塗縣之山也在今宣州乃建年號置百官遣别帥黄虎攻没合肥合肥故城在今廬州北也明年廣陵賊張嬰等復聚衆數千人反據廣陵朝廷博求將帥三公舉撫有文武才拜為九江都尉與中郎將趙序助馮緄合州郡兵數萬人共討之又廣開賞募錢邑各有差梁太后慮羣賊屯結諸將不能制又議遣太尉李固未及行會撫等進擊大破之斬馬勉范容周生等千五百級徐鳳遂將餘衆攻燒東城縣東城縣故城在今豪州定逺縣東南下邳人謝安應募率其宗親設伏擊鳯斬之封安為平鄉侯邑三千户拜撫中郎將督揚徐二州事撫復進擊張嬰斬獲千餘人趙序坐畏懦不進詐增首級徴還棄市又歴陽賊華孟自稱黑帝攻九江殺郡守撫乗勝進擊破之斬孟等三千八百級虜獲七百餘人牛馬財物不可勝筭於是東南悉平振旅而還以撫為左馮翊除一子為郎撫所得賞賜盡分於麾下性方直不交權勢宦官懐忿及論功當封太尉胡廣時録尚書事承㫖奏黜撫天下怨之卒於家馮緄傳馮緄字鴻卿巴郡宕渠人也宕渠縣故城在今渠州東北緄音古本反少學春秋司馬兵法謝承書曰緄學公羊春秋史記曰司馬穰苴者田完之苗裔也當景公時善用兵至齊威王時使大夫追論古者司馬兵法而附穰苴其中號曰司馬穰苴也父煥安帝時為幽州刺史疾忌姦惡數致其罪時𤣥莵太守姚光亦失人和建光元年怨者乃詐作璽書譴責煥光賜以歐刀又下遼東都尉龎奮使速行刑奮即斬光收煥煥欲自殺緄疑詔文有異止煥曰大人在州志欲去惡實無他故必是凶人妄詐規肆姦毒願以事自上甘罪無晚煥從其言上書自訟果詐者所為徴奮抵罪㑹煥病死獄中帝愍之賜煥光錢各十萬以子為郎中緄由是知名家富好施賑赴窮急為州里所歸愛初舉孝廉七遷為廣漢屬國都尉徴拜御史中丞順帝末以緄持節督揚州諸郡軍事與中郎將滕撫擊破羣賊遷隴西太守後鮮卑寇邊以緄為遼東太守曉喻降集虜皆弭散弭止也徴拜京兆尹轉司𨽻校尉所在立威刑遷廷尉太常時長沙蠻寇益陽屯聚積久至延熹五年衆轉盛而零陵蠻賊復反應之合二萬餘人攻燒城郭殺傷長吏又武陵蠻夷悉反寇掠江陵間荆州刺史劉度南郡太守李肅並奔走荆南皆没於是拜緄為車騎將軍將兵十餘萬討之詔䇿緄曰蠻夷猾夏久不討攝猾亂也夏華夏也攝持也書曰蠻夷猾夏各焚都城蹈藉官人州郡將吏死職之臣相逐奔竄曾不反顧可愧言也將軍素有威猛是以擢授六師六師猶六軍也詩云整我六師以修我戎也前代陳湯馮傅之徒以寡擊衆陳湯字子公山陽瑕丘人也元帝時為西域副校尉矯發西域諸國兵四萬人誅斬郅支單于傳首長安懸於藁街馮奉世字子明上黨潞人也宣帝時以衛尉持節送大宛諸國客到伊修城時莎車王萬年殺漢使者子明乃以節告諸國王發兵五千人擊莎車殺其王傳首詣長安傅介子北地人昭帝時為平樂監時樓蘭國數反覆霍光白遣介子與士卒齎金幣以賜外國為名至樓蘭樓蘭王與介子飲乃令壯士二人刺殺之持首詣闕郅支夜郎樓蘭之戎頭懸都街夜郎西南夷之國也成帝時夜郎王興數不從命牂柯太守陳立行縣至夜郎召興興從邑君數十人見立立數責因斷興頭案夜郎王首不傳京師殺之者陳立又非陳湯馮傅此盖泛論誅戮戎夷耳衛霍北征功列金石是皆將軍所究覽也衛青霍去病俱出擊匈奴青至寘顔山斬首九千級去病斬首七萬餘級次封狼居胥山迺還也今非將軍誰與修復前迹進赴之宜權時之策將軍一之出郊之事不復内御一猶専也言出郊以外不復由内制御也淮南子曰凡命將主親授鉞曰從此上至天將軍制之將答曰國不可從外理軍不可從中御也已命有司祖于國門祖道祭也鄭𤣥注禮記云天子九門路門也應門也雉門也庫門也臯門也國門也近郊門也逺郊門也闗門也詩不云乎進厥虎臣闞如虓虎敷敦淮濆仍執醜虜將軍其勉之詩大雅也當周宣王時徐方淮夷反叛宣王乃進其虎猛之臣謂方叔召虎之類也虓虎怒聲也水涯曰濆敷布也醜衆也仍因也言布兵敦逼淮水之涯因執得衆虜引詩戒緄令其勉也時天下饑饉帑蔵虚盡每出征伐常減公卿奉禄假王侯租賦前後所遣將帥宦官輒陷以折耗軍資往往扺罪緄性烈直不行賄賂懼為所中乃上疏曰勢得容姦伯夷可疑茍曰無猜盗跖可信莊子曰孔子與栁下季為友弟名曰盗跖從卒九千人横行侵暴諸侯驅人馬牛取人婦女貪得無親萬人苦之故樂羊陳功文侯示以謗書樂羊魏將軍也史記曰魏文侯令樂羊將而攻中山三年而㧞之樂羊反而論功文侯示之謗書一箧樂羊再拜曰此非臣之功也願請中常侍一人監軍財費尚書朱穆奏緄以財自嫌失大臣之節有詔勿劾緄軍至長沙賊聞悉詣營道乞降營道今道州縣也進擊武陵蠻夷斬首四千餘級受降十萬餘人荆州平定詔書賜錢一億固讓不受振旅還京師推功於從事中郎應奉薦以為司隸校尉而上書乞骸骨朝廷不許監軍使者張敞承宦官旨奏緄將傅婢二人戎服自隨又輒於江陵刻石紀功請下吏案理尚書令黄儁奏議以為罪無正法不合致糾㑹長沙賊復起攻桂陽武陵緄以軍還盗賊復發策免頃之拜將作大匠轉河南尹上言舊典中官子弟不得為牧人職帝不納復為廷尉時山陽太守單遷以罪繫獄緄考致其死遷故車騎將軍單超之弟中官相黨遂共誹章誣緄坐與司隸校尉李膺大司農劉祐俱輸左校應奉上疏理緄等得免後拜屯騎校尉復為廷尉卒於官緄弟允清白有孝行能理尚書善推歩之術推歩謂究日月五星之度昬旦節氣之差拜降虜校尉終於家謝承書曰緄子鸞舉孝廉除郎中度尚傳度尚字博平山陽湖陸人也家貧不修學行不為鄉里所推舉續漢書曰尚少喪父事母至孝通京氏易古文尚書為吏清潔有文武才略與此不同積困窮乃為宦者同郡侯覽視田得為郡上計吏拜郎中除上虞長上虞縣故城在今越州餘姚縣西為政嚴峻明於發擿姦非吏人謂之神明謝承書曰尚進善愛人坐以待旦擢門下書佐朱儁恒歎述之以為有不凡之操儁後官至車騎将軍逺近竒尚有知人之鍳遷文安令文安縣故城在今瀛州文安縣東北遇時疾疫榖貴人飢尚開倉廪給營救疾者百姓䝉其濟時冀州刺史朱穆行部見尚甚竒之延熹五年長沙零陵賊合七八千人自稱將軍入桂陽蒼梧南海交阯交阯刺史及蒼梧太守望風逃奔二郡皆没遣御史中丞盛修募兵討之不能尅豫章艾縣人六百餘人應募而不得賞直怨恚遂反焚燒長沙郡縣寇益陽益陽縣名在益水之陽故城在今潭州益陽縣東殺縣令衆漸盛又遣謁者馬睦督荆州刺史劉度擊之軍敗睦度奔走桓帝詔公卿舉任代劉度者尚書朱穆舉尚自右校令擢為荆州刺史尚躬率部曲與同勞逸廣募雜種諸蠻夷明設購賞進擊大破之降者數萬人桂陽宿賊渠帥卜陽潘鴻等畏尚威烈徙入山谷尚窮追數百里遂入南海破其三屯多獲珍寳而陽鴻等黨衆猶盛尚欲擊之而士卒驕富莫有鬭志尚計緩之則不戰逼之必逃亡乃宣言卜陽潘鴻作賊十年習於攻守今兵寡少未易可進當須諸郡所發悉至爾乃并力攻之申令軍中恣聽射獵兵士喜恱大小皆相與從禽尚乃宻使所親客潛焚其營珍積皆盡獵者来還莫不涕泣尚人人慰勞深自咎責因曰卜陽等財寳足富數世諸卿但不并力耳所亡少少何足介意衆聞咸憤踊尚勑令秣馬蓐食明旦徑赴賊屯陽鴻等自以深固不復設備吏士乘銳遂大破平之尚出兵三年羣寇悉定七年封右鄉侯遷桂陽太守明年徴還京師時荆州兵朱盖等征戍役久財賞不贍忿恚復作亂與桂陽賊胡蘭等三千餘人復攻桂陽焚燒郡縣太守任𦙍棄城走賊衆遂至數萬轉攻零陵太守陳球固守拒之於是以尚為中郎將將幽冀黎陽烏桓歩騎二萬六千人救球又與長沙太守抗徐等發諸郡兵并勢討擊大破之斬蘭等首三千五百級餘賊走蒼梧詔賜尚錢百萬餘人各有差時抗徐與尚俱為名將數有功徐字伯徐丹陽人鄉邦稱其膽智初試守宣城長悉移深林逺藪椎髻鳥語之人置於縣下宣城縣故城在今宣州南陵縣東椎獨髻也音直追反烏語謂語聲似鳥也書曰島夷卉服由是境内無復盗賊後為中郎將宗資别部司馬擊太山賊公孫舉等破平之斬首三千餘級封烏程東鄉侯五百户烏程今湖州縣遷太山都尉寇盗望風奔亡及在長沙宿賊皆平卒於官桓帝下詔追增封徐五百户并前千户復以尚為荆州刺史尚見胡蘭餘黨南走蒼梧懼為已負乃偽上言蒼梧賊入荆州界於是徴交阯刺史張磐下廷尉辭狀未正㑹赦見原磐不肯出獄方更牢持械節獄吏謂磐曰天恩曠然而君不出何也磐因自列曰前長沙賊胡蘭作難荆州餘黨散入交阯磐身膺甲胄渉危履險討擊凶患斬殄渠帥餘燼鳥竄冐遁還奔荆州刺史度尚懼磐先言怖畏罪戾戾亦罪也伏奏見誣磐備位方伯為國爪牙爪牙以猛獸為喻言為國之捍衛也詩曰祈父予王之爪牙也而為尚所枉受罪牢獄大事有虚實劉攽曰案文大當作夫法有是非磐實不辜赦無所除如忍以苟免永受侵辱之耻生為惡吏死為敝鬼乞傳尚詣廷尉靣對曲直足明真偽尚不徴者磐埋骨牢檻終不虚出望塵受枉廷尉以其狀上詔書徴尚到廷尉辭窮受罪以先有功得原磐字子石丹陽人以清白稱終於廬江太守尚後為遼東太守數月鮮卑率兵攻尚與戰破之戎狄憚畏年五十延熹九年卒於官楊璇傳楊璇字機平㑹稽烏傷人也髙祖父茂本河東人從光武征伐為威寇將軍封烏傷新陽鄉侯建武中就國傳封三世有罪國除因而家焉父扶交阯刺史有理能名兄喬為尚書容儀偉麗數上言政事桓帝愛其才貌詔妻以公主喬固辭不聽遂閉口不食七日而死璇初舉孝廉稍遷靈帝時為零陵太守是時蒼梧桂陽猾賊相聚攻郡縣賊衆多而璇力弱吏人憂恐璇乃特制馬車數十乗以排囊盛石灰於車上排囊即今囊袋也排音蒲拜反繫布索於馬尾又為兵車専彀弓弩尅共㑹戰劉攽曰案已言㑹戰何用共字盖本是期字誤作其遂轉作共也乃令馬車居前順風鼓灰賊不得視因以火燒布布然馬驚奔突賊陣因使後車弓弩亂發鉦鼓鳴震羣盗波駭破散追逐傷斬無數梟其渠帥郡境以清梟懸也荆州刺史趙凱誣奏璇實非身破賊而妄有其功璇與相章奏凱有黨助遂檻車徴璇防禁嚴宻無由自訟乃噬臂出血書衣為章具陳破賊形勢又言凱所誣状潜令親屬詣闕通之詔書原璇拜議郎凱反受誣人之罪璇三遷為渤海太守所在有異政以事免後尚書令張温特表薦之徴拜尚書僕射以病乞骸骨卒於家論曰安順以後風威稍薄寇攘寖横縁隙而生剽人盗邑者不闋時月闋息也假署皇王者盖以十數或託驗神道或矯妄冕服然其雄渠魁長未有聞焉猶至壘盈四郊奔命首尾壘軍壁也禮記曰四郊多壘卿大夫之辱奔命謂有命即奔赴之左傳曰余必使爾罷於奔命也若夫數將者並宣力勤慮以勞定功宣布也尚書曰宣力四方禮記曰以勞定國則祀之而景風之賞未甄膚受之言互及景風至則行賞觧見和紀甄明也膚受謂得皮膚之言而受之不深知其情核者也孔子曰膚受之愬不行焉可謂明矣以此而推政道難乎以免論語孔子曰不有祝鮀之佞而有宋朝之美難乎免於今之世矣賛曰張宗裨禹敢殿後拒殿音丁見反江淮海岱䖍劉寇阻䖍劉皆殺也其誰清之雄尚緄撫璇能用譎亦云振旅後漢書卷六十八後漢書卷六十八考證法雄傳初平中卒官臣人龍按自安帝永初三年已酉至獻帝初平元年庚午凡八十餘年前稱三年徴為青州刺史此云初平當是元初之誤滕撫傳磐牙連嵗牙字是㸦字之誤築營於當塗山中注當塗縣之山也在今宣州刋誤補遺曰按有兩當塗縣一在九江郡一在宣州宣之當塗晉成帝始置東都固未之有度尚傳㓂益陽注益陽縣名在益水之陽臣㑹汾按在益水之陽此前書音義中語也監本在字下加今字無義理去之初試守宣城長悉移深林逺藪椎髻鳥語之人置于縣下注宣城縣故城在今宣州南陵縣東諸本同臣㑹汾按宣城屬丹陽郡其地自春秋以後久𨽻中土雖有山谿而非阻絶安得有深林逺藪椎髻鳥語之人此傳宣字當作安安城為長沙屬邑與辰沅相近苗獠雜處盗賊時作故抗徐制之使不得逞也且詳上下文義前序荆州攻桂陽零陵而度尚與長沙太守抗徐擊破之此追序抗徐為安城長已能約束羣盗繼又擊破公孫舉等後乃接云及在長沙宿賊皆平以見前為邑宰後為郡守皆在長沙累著成績也章懐見上文有鄉邦稱其膽智語遂以試守邑長亦係丹陽且舉島夷卉服以實鳥語不知禹貢冀州之島夷與丹陽郡絶不相渉史臣論景風之賞未甄注景風至則行賞風字監本訛昌臣會汾按易通卦騐春秋攷異郵並有此語漢唐人經疏中常引之今改正後漢書卷六十八考證
