body:
  text: 後漢書卷八十八宋宣城太守范煜撰唐章懐太子賢注虞傅蓋臧列傳第四十八虞詡傳虞詡字升卿陳國武平人也武平故城在今亳州鹿邑縣東北酈元水經注云武平城西南七里有漢尚書令虞詡碑題云君諱詡字定安虞仲之後定安盖詡之别字也祖父經為郡縣獄吏案法平允務存寛恕每冬月上其状恒流涕隨之嘗稱曰東海于公髙為里門而其子定國卒至丞相前書于定國字曼倩東海人其父于公為縣獄吏郡法曹所決皆不恨為之生立祠其門閭壊父老方共脩之于公曰少髙大閭門令容駟馬髙盖車我決獄多隂徳未嘗有所寃子孫必有興者至定國為丞相孫永為御史大夫也吾決獄六十年矣雖不及于公其庶㡬乎子孫何必不為九卿邪故字詡曰升卿詡年十二能通尚書早孤孝飬祖母縣舉順孫國相竒之欲以為吏詡辭曰祖母九十非詡不飬相乃止後祖母終服闋辟太尉李脩府拜郎中漢官儀曰脩字伯㳺㐮城人也永初四年羌胡反亂殘破并涼大將軍鄧騭以軍役方費事不相贍欲棄涼州并力北邉乃㑹公卿集議騭曰譬若衣敗壊一以相補猶有所完若不如此將兩無所保議者咸同詡聞之乃說李脩曰竊聞公卿定䇿當棄凉州求之愚心未見其便先帝開拓土宇劬勞後定而今憚小費舉而棄之涼州既棄即以三輔為塞三輔為塞則園陵單外此不可之甚者也喭曰關西出將闗東出相說文曰喭傳言也前書曰秦漢以来山東出相山西出將秦時郿白起頻陽王翦漢興義渠公孫賀傅介子成紀李廣李蔡上邽趙充國狄道辛武賢皆名将也丞相則蕭曺魏邴韋平孔翟之類觀其習兵壯勇實過餘州今羌胡所以不敢入據三輔為心腹之害者以涼州在後故也其土人所以推鋒執銳無反顧之心者為臣屬於漢故也若棄其境域徙其人庶安土重遷必生異志如使豪雄相聚席卷而東席卷言無餘也前書曰雲徹席卷後無餘災也雖賁育為卒太公為將猶恐不足當禦議者喻以補衣猶有所完詡恐其疽食侵滛而無限極棄之非計疽癰瘡也脩曰吾意不及此㣲子之言㡬敗國事然則計當安出詡曰今涼土擾動人情不安竊憂卒然有非常之變誠宜令四府九卿四府謂太傳太尉司徒司空之府也九卿謂太常光禄衞尉廷尉太僕大鴻臚宗正大司農少府等也各辟彼州數人其牧守令長子弟皆除為冗官冗散也音人勇反外以勸厲答其功勤内以拘致防其邪計脩善其言更集四府皆從詡議於是辟西州豪傑為掾屬拜牧守長吏子弟為郎以安慰之鄧騭兄弟以詡異其議因此不平欲以吏法中傷詡後朝歌賊寗季等數千人攻殺長吏屯聚連年州郡不能禁乃以詡為朝歌長故舊皆弔詡曰得朝歌何衰詡笑曰志不求易事不避難臣之職也不遇槃根錯節何以别利噐乎始到謁河内太守馬棱棱字伯威援族孫也棱勉之曰君儒者當謀謨廟堂反在朝歌邪詡曰初除之日士大夫皆見弔勉以詡譸之知其無能為也譸當作籌也朝歌者韓魏之郊韓界上黨魏界河内相接犬牙故云郊也背大行臨黄河去敖倉百里敖倉在榮陽觧見安紀而青冀之人流亡萬數賊不知開倉招衆劫庫兵守城臯斷天下右臂右臂喻要便也此不足憂也今其衆新盛難與爭鋒兵不厭權願寛假轡策勿令有所拘閡而已閡與礙同及到官設令三科以募求壮士自掾史以下各舉所知其攻刼者為上傷人偷盗者次之帶喪服而不事家業為下收得百餘人詡為饗㑹悉貰其罪使入賊中誘令劫掠乃伏兵以待之遂殺賊數百人又潜遣貧人能縫者傭作賊衣以采綖縫其裾為幟幟記也續漢書曰以絳縷縫其裾也有出市里者吏輒禽之賊由是駭散咸稱神明遷懐令後羌冦武都鄧太后以詡有将帥之略遷武都太守引見嘉徳殿厚加賞賜羌乃率衆數千􅃒詡於陳倉崤谷詡即停軍不進而宣言上書請兵須到當發羌聞之乃分鈔傍縣詡因其兵散日夜進道兼行百餘里令吏士各作兩竈日増倍之羌不敢逼或問曰孫臏減竈而君增之孫臏為齊軍将與魏龎涓戰使齊軍入魏地為十萬竈明日為五萬竈明日為三萬竈龎涓行三日大喜曰我固知齊卒怯入吾地三日士卒亡過半矣事見史記兵法日行不過三十里以戒不虞前書王吉上疏曰古者師行三十里吉行五十里而今日且二百里何也詡曰虜衆多吾兵少徐行則易為所及速進則彼所不測虜見吾竈日増必謂郡兵来迎衆多行速必憚追我孫臏見弱吾今示彊勢有不同故也既到郡兵不滿三千而羌衆萬餘攻圍赤亭數十日赤亭故城在今渭州襄武縣東南有赤亭水也詡乃令軍中使彊弩勿發而潜發小弩羌以為矢力弱不能至并兵急攻詡於是使二十彊弩共射一人發無不中羌大震退詡因出城奮擊多所傷殺明日悉陳其兵衆令從東郭門出北一作西郭門入貿易衣服回轉數周羌不知其數更相恐動詡計賊當退乃潜遣五百餘人於淺水設伏候其走路虜果大奔因掩擊大破之斬獲甚衆賊由是敗散南入益州詡乃占相地埶築營壁二百八十所招還流亡假賑貧人郡遂以安先是運道艱險舟車不通驢馬負載僦五致一廣雅曰僦賃也音子救反僦五致一謂用五石賃而致一石也詡乃自將吏士案行川谷由沮至下辯沮及下辯並縣名沮今興州順政縣也下辯今成州同谷縣也沮音七余反數十里皆燒石翦木開漕船道續漢志曰下辯東三十餘里有峡中富泉水生大石障塞水流每至春夏輒溢沒秋稼壊敗營郭詡乃使人燒石以水灌之石皆坼裂因鎸去石遂無汜溺之患也以人僦直雇借傭者於是水運通利歳省四千餘萬詡始到郡戸裁盈萬及綏聚荒餘招還流散二三年間遂增至四萬餘户鹽米豐賤十倍於前續漢志曰詡始到榖石千鹽石八千見户萬三千視事三嵗米石八十鹽石四百流人還歸郡户􅂾萬人足家給一郡無事坐法免永建元年代陳禅為司隸校尉數月間奏太𫝊馮石太尉劉熹中常侍程璜陳秉孟生李閏等百官側目號為苛刻三公劾奏詡盛夏多拘繫無辜為吏人患詡上書自訟曰法禁者俗之堤防刑罰者人之銜轡記曰夫禮禁亂之所由生猶坊止水之所自来也故以舊防為無用瓌之者必有水敗尸子曰刑罰者人之鞭策也今州曰任郡郡曰任縣更相委逺百姓怨窮以茍容為賢盡節為愚臣所發舉臧罪非一二府恐為臣所奏劉攽曰案上文三公劾詡則此當為三府也遂加誣罪臣將從史魚死即以尸諫耳韓詩外傳曰昔者衛大夫史魚病且死謂其子曰我􅂾言蘧伯玉之賢而不能進彌子瑖不肖不能退為人臣生不能進賢而退不肖死不當理喪正堂殯我於室足矣衛君問其故子以父言聞君乃立召蘧伯玉而貴之彌子瑖而退之徙殯於正堂成禮而後去也順帝省其章乃為免司空陶敦漢官儀曰敦字文理京兆人也時中常侍張防特用權埶每請託受取詡輒案之而屢寑不報詡不勝其憤乃自繫廷尉奏言曰昔孝安皇帝任用樊豐遂交亂嫡統㡬亡社稷今者張防復弄威柄國家之禍將重至矣臣不忍與防同朝謹自繫以聞無令臣襲楊震之迹震為樊豐所譛而死書奏防流涕訴帝詡坐論輸左校防必欲害之二日之中傳考四獄獄吏勸詡自引詡曰寕伏歐刀以示逺近歐刀刑人之刀也宦者孫程張賢等知詡以忠獲罪乃相率奏乞見程曰陛下始與臣等造事之時謂順帝為太子被江京等廢為濟隂王程等謀立之時也常疾姦臣知其傾國今者即位而復自為何以非先帝乎司隸校尉虞詡為陛下盡忠而更被拘繋常侍張防臧罪明正反搆忠良今客星守羽林其占宫中有姦臣史記天官書曰虗危南有衆星曰羽林也宜急收防送獄以塞天變下詔出詡還假印綬時防立在帝後程乃叱防曰姦臣張防何不下殿防不得已趨就東箱埤蒼云箱序也字或作廂程曰陛下急收防無令從阿母求請阿母宋娥也帝問諸尚書尚書賈朗素與防善證詡之罪帝疑焉謂程曰且出吾方思之於是詡子顗與門生百餘人舉幡候中常侍髙梵車叩頭流血訴言枉状梵乃入言之防坐徙邉賈朗等六人或死或黜即日赦出詡程復上書陳詡有大功語甚切激帝感悟復徴拜議郎數日遷尚書僕射是時長吏二千石聴百姓讁罰者輸贖號為義錢託為貧人儲而守令因以聚歛詡上疏曰元年以来貧百姓章言長吏受取百萬以上者匈匈不絶讁罰吏人至數千萬而三公刺史少所舉奏尋永平章和中州郡以走卒錢給貸貧人走卒伍伯之類也續漢志曰伍伯公八人中二千石六人千石六百石皆四人自百石以下至二百石皆二人黃綬武官伍伯文官辟車鈴下侍閭門蘭部署街走卒皆有程品多少隨所典領率皆赤幩絳褠即今行鞭杖者也此言錢者令其出資錢不役其身也劉攽曰注街走卒又赤幩絳褠案後漢志街下有一里字又云絳褠字誤司空劾案州及郡縣皆坐免黜今冝遵前典蠲除權制於是詔書下詡章切責州郡讁罰輸贖自此而止先是寕陽主簿詣闕訴其縣令之枉寕陽縣属東平國故城在今兖州龔丘縣南也積六七歳不省主簿乃上書曰臣為陛下子陛下為臣父臣章百上終不見省臣豈可北詣單于以告怨乎帝大怒持章示尚書尚書遂劾以大逆詡駮之曰主簿所訟乃君父之怨百上不逹是有司之過愚惷之人不足多誅帝納詡言笞之而已詡因謂諸尚書曰小人有怨不逺千里斷髪刻肌詣闕告訴而不為理豈臣下之義君與濁長吏何親而與怨人何仇乎聞者皆慙詡又上言臺郎顯職仕之通階今或一郡七八或一州無人宜令均平以厭天下之望及諸奏議多見從用詡好刺舉無所回容回曲也數以此忤權戚遂九見譴考三遭刑罰而剛正之性終老不屈永和初遷尚書令以公事去官朝廷思其忠復徴之㑹卒臨終謂其子恭曰吾事君直道行己無愧所悔者為朝歌長時殺賊􅂾百人其中何能不有寃者自此二十餘年家門不増一口斯獲罪於天也恭有俊才官至上黨太守傅爕傳傅爕字南容北地靈州人也靈州縣也本字㓜起慕南容三復白圭乃易字焉家語子貢對衞文子曰一日三復白圭之玷是南宫縚之行也王肅注云玷缺也詩云白圭之玷尚可磨也斯言之玷不可為也一日三復慎之至也身長八尺有威容少師事太尉劉寛再舉孝亷聞所舉郡将喪乃棄官行服後為䕶軍司馬與左中郎皇甫嵩劉攽曰案嵩傳此一少將字俱討賊張角爕素疾中官既行因上疏曰臣聞天下之禍不由於外皆興於内是故虞舜升朝先除四凶然後用十六相左傳曰昔高陽氏有才子八人蒼舒隤敱擣戭大臨尨降庭堅仲容叔逹謂之八凱髙辛氏有才子八人伯奮仲堪叔献季仲伯虎仲熊叔豹季貍謂之八元也眀惡人不去則善人無由進也今張角起於趙魏黄巾亂於六州皇甫嵩傳曰連結郡國自青徐幽冀荆揚兖豫八州之人莫不畢應此云六州盖初起時也此皆釁發蕭墻而禍延四海也臣受戎任奉辭伐罪始到頴川戰無不尅黄巾雖盛不足為廟堂憂也臣之所懼在於治水不自其源末流彌増其廣耳陛下仁徳寛容多所不忍故閹豎㺯權忠臣不進誠使張角梟夷黄巾變服臣之所憂甫益深耳甫始也何者夫邪正之人不冝共國亦猶氷炭不可同噐韓子曰氷炭不同噐而乆寒暑不同時而至也彼知正人之功顯而危亡之兆見皆将巧辭飾說共長虗偽夫孝子疑於屢至甘茂對秦武王曰昔曾參之居費魯人有與曽參同姓名者殺人人告其母曰曾參殺人其母織自若也又告之其母自若也又告之其母投杼下機踰墻而走夫以曾參之賢與其母之信也三人疑之其母懼焉見史記也市虎成於三夫觧見馬援傳若不詳察真偽忠臣將復有杜郵之戮矣白起與應侯有隙搆之秦昭王免起為士伍遷之隂密行出咸陽西門十里至杜郵使賜劒自裁見史記案杜郵今咸陽城是其地酈元注水經云渭水北有杜郵亭也陛下宜思虞舜四罪之舉速行讒佞放殛之誅殛音紀力反殛亦誅也則善人思進姦凶自息臣聞忠臣之事君猶孝子之事父也子之事父焉得不盡其情使臣身被鈇鉞之戮陛下少用其言國之福也書奏宦者趙忠見而忿惡及破張角爕功多當封忠訴譛之續漢志曰爕軍斬賊三帥卜己張伯梁仲寕等功髙為封首靈帝猶識爕言識記也音志得不加罪竟亦不封以為安定都尉以疾免後拜議郎㑹西羌反邉章韓遂作亂隴右徴發天下役賦無己司徒崔烈以為宜棄凉州詔㑹公卿百官烈堅執先議爕厲言曰斬司徒天下乃安尚書郎楊賛奏爕廷辱大臣帝以問爕爕對曰昔冐頓至逆也樊噲為上將願得十萬衆横行匈奴中憤激思奮未失人臣之節顧計當從與不耳季布猶曰噲可斬也冐頓匈奴單于名也前書曰季布為中郎將單于為書嫚吕太后吕太后怒召諸將議之將軍樊噲曰願得十萬衆横行匈奴中諸將皆阿太后以噲言為然布曰樊噲可斬也夫以髙帝兵三十萬困于平城噲時亦在其中今奈何以十萬衆横行匃奴中今涼州天下要衝國家藩衞髙祖初興使酈商别定隴右前書漢王賜􅐱商爵信成君以將軍為隴右都尉别定北地世宗拓境列置四郡議者以為斷匈奴右臂前書武帝分武威酒泉置張掖敦煌謂之四郡劉歆等議曰孝武帝北攘匈奴降昆邪十萬之衆置五属國起朔方以奪其肥饒之地東伐朝鮮起𤣥莬樂浪以斷匈奴之左臂西伐大宛并六國結烏孫起敦煌酒泉張掖以髙婼羌裂匈奴之右臂婼音而遮反劉攽曰注以髙婼羌案髙當作鬲今牧御失和使一州叛逆海内為之騷動陛下臥不安寝烈為宰相不念為國思所以弭之之䇿乃欲割棄一方萬里之土臣竊惑之若使左袂之虜得居此地說文曰袵衣衿也士勁甲堅因以為亂此天下之至慮社稷之深憂也若烈不知之是極蔽也知而故言是不忠也帝從爕議由是朝廷重其方格方正也格猶標凖也每公卿有缺為衆議所歸頃之趙忠為車騎將軍詔忠論討黄巾之功執金吾甄舉等謂忠曰傅南容前在東軍有功不侯故天下失望今将軍親當重任宜進賢理屈以副衆心忠納其言遣弟城門校尉延致殷勤延謂爕曰南容少答我常侍萬户侯不足得也爕正色拒之曰遇與不遇命也有功不論時也傅爕豈求私賞哉忠愈懐恨然憚其名不敢害權貴亦多疾之是以不得留一作封出為漢陽太守初郡將范津眀知人劉攽曰案文明當作名聲之誤也明雖可通但前後多云名知人舉爕孝亷及津為漢陽與爕交代合符而去鄉邦榮之津字文淵南陽人爕善䘏人叛羌懐其恩化並来降附乃廣開屯田列置四十餘營時刺史耿鄙委任治中程球球為通姦利士人怨之漢官曰司隸功曹從事即治中也中平四年鄙率六郡兵討金城賊王國韓遂等爕知鄙失衆必敗諫曰使君統政日淺人未知敎孔子曰不敎人戰是謂棄之今率不習之人越大隴之阻將十舉十危而賊聞大軍將至必萬人一心邉兵多勇其鋒難當而新合之衆上下未和萬一内變雖悔無及不若息軍飬徳明賞必罰賊得寛挺挺觧也必謂我怯羣惡爭執其離可必然後率己教之人討己離之賊其功可坐而待也今不為萬全之福而就必危之禍竊為使君不取鄙不從行至狄道果有反者先殺程球次害鄙賊遂進圍漢陽城中兵少糧盡爕猶固守時北胡騎數千隨賊攻郡劉攽曰時北胡騎數千案文少一地字下文云鄉里羌胡是與爕同北地人也皆夙懐爕恩共於城外叩頭求送爕歸鄉里子幹年十三從在官舍知爕性剛有高義恐不能屈志以免進諫曰國家昏亂遂令大人不容於朝今天下已叛而兵不足自守鄉里羌胡爕北地人故云鄉里也先被恩徳欲令棄郡而歸願必許之徐至鄉里率厲義徒見有道而輔之以濟天下言未終爕慨然而歎呼幹小字曰别成幹集曰幹字彦林汝知吾必死邪盖聖逹節次守節左傳曰曹公子臧曰前志有之聖逹節次守節下失節且殷紂之暴伯夷不食周粟而死仲尼稱其賢史記曰伯夷孤竹君之子也武王載文王木主伐紂殷既平伯夷耻之義不食周粟遂餓死論語子貢問曰伯夷叔齊何人也孔子曰古之賢人也今朝廷不甚殷紂吾徳亦豈絶伯夷世亂不能飬浩然之志孟子曰飬吾浩然之􅂔趙岐注曰浩然天氣也食禄又欲避其難乎左傳曰子路曰食焉不避其難也吾行何之必死於此汝有才智勉之主簿楊㑹吾之程嬰也程嬰觧見馮衍傳幹哽咽不能復言左右皆泣下王國使故酒泉太守黄衍說爕曰成敗之事已可知矣先起上有覇王之業下成伊吕之勲天下非復漢有府君寕有意為吾屬師乎師即君也尚書曰作之君作之師也爕案劔叱衍曰若剖符之臣反為賊説邪遂麾左右進兵臨陣戰殁諡曰壮節侯幹知名位至扶風太守蓋勳傳蓋勳字元固敦煌廣至人也廣至縣名故城在今𤓰州常樂縣東今謂之縣泉堡是也家世二千石續漢書曰曾祖父進漢陽太守祖父彪大司農謝承書曰父字思齊官至安定属國都尉初舉孝亷為漢陽長史時武威太守倚恃權埶恣行貪横從事武都蘇正和案致其罪涼州刺史梁鵠畏懼貴戚欲殺正和以免其負乃訪之於勳勳素與正和有仇或勸勳可因此報隙勳曰不可謀事殺良非忠也乗人之危非仁也乃諫鵠曰夫紲食鷹鳶欲其鷙紲繫也廣雅曰鷙執也蒼頡觧詁曰鳶䲭也食音嗣鷙而亨之將何用哉鵠從其言正和喜於得免而詣勳求謝勳不見曰吾為梁使君謀不為蘓正和也怨之如初續漢書中平元年黄巾賊起故武威太守酒泉黄雋被徵失期梁鵠欲奏誅雋勳為言得免雋以黄金二十斤謝勳勳謂雋曰吾以子罪在八議故為子言吾豈賣評哉終辭不受中平元年北地羌胡與邉章等寇亂隴右刺史左昌因軍興斷盜數千萬斷謂割截勳固諫昌怒乃使勳别屯阿陽以拒賊鋒阿陽縣属天水郡欲因軍事罪之而勳數有戰功邉章等遂攻金城殺郡守陳懿勳勸昌救之不從邉章等進圍昌於冀昌懼而召勳勳初與從事辛曾孔常俱屯阿陽及昌檄到曾等疑不肯赴勳怒曰昔荘賈後期穣苴奮劒齊景公時燕晋侵齊景公以司馬穰苴為將扞之仍令寵臣荘賈監軍與穰苴期旦日㑹賈素驕貴夕時至穣苴召軍正問曰軍法期而後者云何對曰當斬遂斬賈以徇三軍今之從事豈重於古之監軍哉曾等懼而從之勲即率兵救昌到乃誚譲章等責以背叛之罪皆曰左使君若早從君言以兵臨我庻可自改今罪己重不得降也乃觧圍而去昌坐斷盗徴以扶風宋梟代之續漢書梟字作泉也梟患多寇叛謂勲曰凉州寡於學術故屢致反暴今欲多冩孝經令家家習之庶或使人知義勳諫曰昔太公封齊崔杼殺君伯禽侯魯慶父簒位崔杼齊大夫齊荘公先通其妻杼殺之慶父魯荘公弟荘公子開立是為湣公慶父襲殺涽公並見史記此二國豈乏學者今不急靜難之術遽為非常之事既足結怨一州又當取笑朝廷勲不知其可也梟不從遂奏行之果被詔書詰責坐以虗慢徴時叛羌圍護羌校尉夏育於畜官前書尹翁歸傳曰有論罪輸掌畜官音義曰右扶風畜牧所在有苑師之属故曰畜官畜音許救反勳與州郡合兵救育至狐槃為羌所破勳收餘衆百餘人為魚麗之陳麗音離左傳曰王以諸侯伐鄭鄭原繁高渠彌奉公為魚麗之陳先偏後伍伍承彌縫杜預注曰此魚麗陳法也羌精騎夹攻之急士卒多死勳被三創堅不動乃指木表表標也曰必尸我於此句就種羌滇吾句就羌别種也句音古侯反素為勳所厚乃以兵扞衆曰盖長史賢人汝曹殺之者為負天勲仰罵曰死反虜汝何知促來殺我衆相視而驚滇吾下馬與勳勳不肯上遂為賊所執羌戎服其義勇不敢加害送還漢陽後刺史楊雍即表勳領漢陽太守時人飢相漁食勳調榖稟之調猶發也先出家糧以率衆存活者千餘人後去官徴拜討虜校尉靈帝召見問天下何苦而反亂如此勳曰倖臣子弟擾之時宦者上軍校尉蹇碩在坐帝顧問碩碩懼不知所對而以此恨勳帝又謂勳曰吾己陳師於平樂觀多出中藏財物以餌士何如中藏謂内藏也勳曰臣聞先王耀徳不觀兵國語曰穆王將征犬戎祭公謀父諫曰不可先王燿徳不觀兵韋昭注曰燿明也觀示也今冦在逺而設近陳不足昭果毅祗黷武耳左傳曰戎昭果毅以聼之之謂武殺敵為果致果曰毅也帝曰善恨見君晚羣臣初無是言也勳時與宗正劉虞佐軍校尉袁紹同典禁兵勳謂虞紹曰吾仍見上上甚聪明但擁蔽於左右耳若共併力誅嬖倖然後徴㧞英俊以興漢室功遂身退豈不快乎虞紹亦素有謀因相連結未及發而司隸校尉張溫舉勳為京兆尹帝方欲延接勳而蹇碩等心懼之並勸從溫奏遂拜京兆尹時長安令楊黨父為中常侍恃埶貪放勲案得其臧千餘萬貴戚咸為之請勳不聼具以事聞并連黨父有詔窮案威震京師時小黄門京兆髙望為尚藥監倖於皇太子太子因蹇碩屬望子進為孝亷勳不肯用或曰皇太子副主望其所愛碩帝之寵臣而子違之所謂三怨成府者也府聚也勲曰選賢所以報國也非賢不舉死亦何悔勳雖在外每軍國密事帝常手詔問之續漢書曰是時漢陽叛人王國衆十萬餘攻陳倉三輔震動勳領郡兵五千人自請滿萬人因表用䖏士扶風孫瑞為鷹鷂都尉桂楊魏傑為破敵都尉京兆杜楷為威虜都尉𢎞農楊儒為鳥撃都尉長陵第五雋為清冦都尉凡五都尉皆素有名悉領属勳每有宻事靈帝手詔問之數加賞賜甚見親信在朝臣右及帝崩董卓廢少帝殺何太后勲與書曰昔伊尹霍光權以立功猶可寒心足下小醜何以終此賀者在門弔者在廬可不慎哉孫卿子曰慶者在堂弔者在閭福與禍鄰莫知其門也卓得書意甚憚之徴為議郎時左將軍皇甫嵩精兵三萬屯扶風勳宻相要結將以討卓㑹嵩亦被徴勳以衆弱不能獨立遂並還京師自公卿以下莫不卑下於卓唯勳長揖爭禮見者皆為失色卓問司徒王允曰欲得快司隸校尉誰可作者允曰唯有盖京兆耳卓曰此人明智有餘然不可假以雄職乃以為越騎校尉卓又不欲令乆典禁兵復出為頴川太守未及至郡徴還京師時河南尹朱儁為卓陳軍事卓折儁曰我百戰百勝決之於心卿勿妄説且汙我刀勲曰昔武丁之明猶求箴諌武丁殷王髙宗也謂傅說曰啟乃心沃朕心説復于王曰唯木從䋲則正后從諫則聖見尚書況如卿者而欲杜人之口乎卓曰戲之耳勲曰不聞怒言可以為戲卓乃謝儁勲雖強直不屈而内厭於卓不得意疽發背卒時年五十一遺令勿受卓賻贈卓欲外示寛容表賜東園祕噐􅈖襚送之如禮𦵏于安陵子順官至永陽太守臧洪傳臧洪字子源廣陵射陽人也射陽故城在今楚州安冝縣東也父旻有幹事才謝承書曰旻逹于從政為漢良吏遷匈奴中郎將還京師太尉袁逢問其西域諸國土地風俗人物種数旻俱答言西域本三十六國後分為五十五稍散至百餘國大小道里近逺人数多少風俗燥濕山川草木鳥獸異物名種不與中國同者口陳其状手畫地形逢竒其才歎息言雖班固作西域傳何以加此乎熹平元年㑹稽妖賊許昭起兵句章句章縣故城在今越州鄮縣西十三州志云勾踐之地南至勾餘其後併吳因大城之章伯功以示子孫故曰句章自稱大將軍立其父生為越王攻破城邑衆以萬数拜旻揚州刺史旻率丹陽太守陳夤擊昭破之昭遂復更屯結大為人患旻等進兵連戰三年破平之獲昭父子斬首數千級遷旻為使匈奴中郎將洪年十五以父功拜童子郎漢法孝亷試經者拜為郎洪以年㓜才俊故拜童子郎也續漢書曰左雄奏徵海内名儒為博士使公卿子弟為諸生有志操者加其俸禄及汝南謝亷河南趙建章年始十二各能通經雄並奏拜童子郎於是負書来學雲集京師也知名太學洪體貎魁梧有異姿魁梧壮大之貌也梧音吾舉孝亷補即丘長即丘縣属瑯琊國故城在今沂州臨沂縣東南即春秋之祝丘也中平末棄官還家太守張超請為功曹時董卓弑帝圖危社稷洪説超曰明府歴世受恩兄弟並據大郡謂超為廣陵兄邈為陳留也今王室將危賊臣虎視此誠義士效命之秋也今郡境尚全吏人殷富若動桴鼓可得二萬人以此誅除國賊為天下唱義不亦冝乎超然其言與洪西至陳留見兄邈計事邈先謂超曰聞弟為郡委政臧洪洪者何如人超曰臧洪海内竒士才略智數不比於超矣邈即引洪與語大異之乃使詣兖州刺史劉岱岱字公山豫州刺史孔佃佃字公緒遂皆相善邈既先有謀約㑹超至定議乃與諸牧守大㑹酸棗設壇塲将盟既而更相辭譲莫敢先登咸共推洪洪乃攝衣升壇操血而盟曰漢室不幸皇綱失統賊臣董卓乗釁縱害禍加至尊毒流百姓大懼淪喪社稷翦覆四海兖州刺史岱豫州刺史佃陳留太守邈東郡太守瑁橋瑁也廣陵太守超等糾合義兵並赴國難紏收也凡我同盟齊心一力以致臣節隕首喪元必無二志有渝此盟俾墜其命無克遺育左傳曰王子虎盟諸侯于王庭要言曰皆奨王室無相害也有渝此盟明神殛之俾墜其師無克祚國也皇天后土祖宗明靈實皆鍳之洪辭氣慷慨聞其言者無不激揚自是之後諸軍各懐遲疑莫適先進遂使糧儲單竭兵衆乖㪚時討虜校尉公孫瓉與太司馬劉虞有隙超乃遣洪詣虞共謀其難行至河間而值幽冀交兵行塗阻絶因寓於袁紹紹見洪甚竒之與結友好以洪領青州刺史前刺史焦和好立虗譽能清談時黄巾羣盗處處飈起而青部殷實軍革尚衆和欲與諸同盟西赴京師未及得行而賊已屠城邑和不理戎警但坐列巫史禜禱羣神巫女巫也史祝史也禜謂營攅用幣以禳風雨霜雪水旱厲疫于日月星辰山川也禱謂告事求福也又恐賊乗凍而過命多作䧟冰丸以投于河衆遂潰散和亦病卒洪收撫離叛百姓復安任事二年袁紹憚其能徙為東郡太守都東武陽時曹操圍張超於雍丘甚危急超謂軍吏曰今日之事唯有臧洪必來救我或曰袁曹方穆而洪為紹所用恐不能敗好逺来違福取禍超曰子源天下義士終非背本者也或見制強力不相及耳洪始聞超圍乃徙跣號泣並勒所領将赴其難自以衆弱從紹請兵而紹竟不聼之超城遂䧟張氏族㓕洪由是怨紹絶不與通紹興兵圍之歴年不下使洪邑人陳琳以書譬洪示其禍福責以恩義獻帝春秋曰紹使琳為書八條責以恩義告喻使降也洪答曰隔濶相思發於寤寐相去步武爾雅曰武跡也而趨舍異規其為愴恨胡可勝言前日不遺比辱雅況比頻也述叙禍福公私切至以子之才窮該典籍豈將闇於大道不逹余趣哉是以捐棄翰墨一無所酬亦冀遥忖􅄶心粗識鄙性重獲來命援引紛紜雖欲無對而義篤其言僕小人也本乏志用中因行役特䝉傾盖家語孔子之郯與程子相遇於塗傾盖而語也恩深分厚遂竊大州寕樂今日自還接刃乎每登城臨兵觀主人之旗鼓洪常寓於紹故謂之主人也瞻望帳幄感故友之周旋撫弦搦矢搦捉也音女卓反不覺涕流之覆靣也何者自以輔佐主人無以為悔主人相接過絶等倫劉攽曰案文悔字無義未詳何字或曰悔當作益受任之初志同大事掃清冦逆共尊王室豈悟本州被侵郡將遘戹請師見拒辭行被拘使洪故君遂至淪滅區區㣲節無所獲申豈得復全交友之道重虧忠孝之名乎所以忍悲揮戈收淚告絶若使主人少垂古人忠恕之情来者側席去者克己来者側席而待之去者克己自責不責人也則僕抗季札之志不為今日之戰矣吴王餘昧卒欲授弟季札季札逃去見史記也昔張景明登壇喢血奉辭奔走卒使韓牧譲印主人得地後但以拜章朝主賜爵獲傳之故不䝉觀過之貸而受夷滅之禍英雄記云袁紹使張景明郭公則髙元才等説韓馥使譲冀州與紹然則馥之譲位景明亦有其功其餘未詳也吕奉先討卓来奔請兵不獲告去何罪復見斫刺魏志吕布傳曰布破張燕軍而求益兵衆將士鈔掠紹患忌之布覺其意從紹求去英雄記布求還洛紹假布領司𨽻校尉外言當遣内欲殺布明日當發紹遣甲士三十人辭以送布止於帳側布偽使人于帳中鼓筝紹兵臥無何出帳去而兵不覺夜半起兵亂斫布林被謂己死明旦紹訊問知布尚在乃閉城門布遂引去劉子璜奉使踰時辭不獲命畏君懐親以詐求歸可謂有志忠孝無損覇道亦復彊尸麾下不䝉虧除慕進者䝉榮違意者被戮此乃主人之利非逰士之願也是以鑒戒前人守死窮城亦以君子之違不適敵國故也左傳云公山不狃曰君子違不適讎國杜預注云違奔亡也足下當見乆圍不觧救兵未至感婚姻之義推平生之好以為屈節而茍生勝守義而傾覆也昔晏嬰不降志於白刃南史不曲筆以求存崔杼殺齊荘公欲刼晏子與盟以㦸拘其勁劔承其心晏子曰刼吾以刃而失其意非勇也崔杼遂釋之事見晏子左傳曰太史書曰崔杼殺其君崔子殺之其弟嗣書而死者二人其弟又書乃舍之南史氏聞太史盡死執簡以徃聞既書矣乃還也故身傳圖象名垂後世況僕據金城之固驅士人之力散三年之畜以為一年之資匡困補之以悅天下何圖築室反耕哉左傳曰楚子闃宋築室反耕杜預注曰築室于宋反兵耕田示無還意也但懼秋風揚塵伯珪馬首南向伯珪公孫瓉字張揚飛燕旅力作難魏志曰張揚字稚叔雲中人也以武勇給并州為從事何進令於本州募兵得千餘人因留上黨擊山賊進敗揚遂以所將兵攻上黨仍略諸縣衆至􅂾千又與袁紹合張燕常山人本姓禇黄巾起燕合衆少年為羣盗衆萬人博陵張牛角立起衆次癭陶牛角為飛矢所中且死告其衆曰必以燕為帥角死衆奉燕故改姓張燕慓悍㨗速過人軍中號為飛燕衆至百萬號曰黒山後助公孫瓉與紹爭冀州也劉攽曰注張牛角立起案文立當作之北鄙將告倒懸之急股肱奏乞歸之記耳股肱猶手足也言北邉有倉卒之急股肱之臣將告歸自救耳主人當鑒戒曹軰反旌退師何冝久辱盛怒暴威於吾城之下哉足下譏吾恃黒山以為救獨不念黄巾之合從邪昔髙祖取彭越於鉅野前書彭越將其衆居鉅野中無所属漢王乃使人賜越將軍印使下濟隂以擊楚也光武創基兆於緑林卒能龍飛受命中興帝業茍可輔主興化夫何嫌哉况僕親奉璽書與之從事行矣孔璋足下徼利於境外臧洪投命於君親吾子託身於盟主盟主謂袁紹也臧洪䇿名於長安子謂余身死而名㓕僕亦笑子生死而無聞焉本同末離努力努力夫復何言紹見洪書知無降意增兵急攻城中糧盡外無援救洪自度不免呼吏士謂曰袁紹無道所圖不軌且不救洪郡将洪於大義不得不死念諸軍無事空與此禍與音預可先城未破將妻子出將吏皆垂泣曰明府之於袁氏本無怨隙今為郡將之故自致危困吏人何忍當捨明府去也初尚掘䑕煮筋角後無所復食主簿啟内厨米三斗請稍為饘粥杜預注左傳曰饘縻也音之延反洪曰何能獨甘此邪使為薄縻徧班士衆又殺其愛妾以食兵將兵將咸流涕無能仰視男女七八十人相枕而死莫有離叛城䧟生執洪紹盛帷幔大㑹諸將見洪謂曰臧洪何相負若是今日服未洪據地瞑目曰諸袁事漢四世五公可謂受恩今王室衰弱無扶翼之意而欲因際㑹觖望非冀前漢音義曰觖猶冀也觖音羌恚反多殺忠良以立姦威洪親見將軍呼張陳留為兄則洪府君亦冝為弟而不能同心戮力為國除害坐擁兵衆觀人屠滅惜洪力劣不能推刃為天下報仇公羊傳曰事君猶事父也父受誅子復讎推刃之道何謂服乎紹本愛洪意欲屈服赦之見其辭切知終不為用乃命殺焉洪邑人陳容少為諸生親慕於洪隨為東郡丞先城未敗洪使歸紹時容在坐見洪當死起謂紹曰將軍舉大事欲為天下除暴而專先誅忠義豈合天意臧洪發舉為郡將奈何殺之紹慙使人牽出謂曰汝非臧洪疇空復爾為容顧曰夫仁義豈有常所蹈之則為君子背之則為小人今日寕與臧洪同日死不與將軍同日生也遂復見殺在紹坐者無不歎息竊相謂曰如何一日戮二烈士先是洪遣司馬二人出求救於吕布比還城已䧟皆赴敵死論曰雍丘之圍臧洪之感憤壮矣想其行跣且號束甲請舉誠足憐也夫豪雄之所趨舍其與守義之心異乎若乃締謀連衡懐詐算以相尚者盖唯勢利所在而已况偏城既危曹袁方穆洪徒指外敵之衡以紓倒懸之㑹忿悁之師兵家所忌前書魏相上書曰救亂誅暴謂之義兵兵義者王敵加於己不得已而起者謂之應兵兵應者勝爭恨小故不勝憤怒者謂之忿兵兵忿者敗利人土地貨寳者謂之貪兵兵貪者破恃國家之大矜其人衆欲見威扵敵者謂之驕兵兵驕者臧此非但人事乃天道也可謂懐哭秦之節存荆則未聞也吴破楚申包胥如秦乞師立依於庭墻而哭日夜不絶聲勺飲不入口七日秦師乃出以車五百乗救楚敗吳兵於稷事見左傳及史記言臧洪徒守節致死不能如包胥之存楚也賛曰先零擾疆鄧崔棄涼詡爕令圖再全金方盖勳抗董終然允剛洪懐偏節力屈志揚後漢書卷八十八後漢書卷八十八考證臧洪傳無以為悔劉攽曰悔字無義未詳何字臣宗楷按無以為悔猶言内省不疚也義本明顕觧者失之後漢書卷八十八考證
