body:
  text: 後漢書卷三十一梁剡令劉昭補并注郡國志第二十一郡國三兗州陳留泰山東郡濟北東平山陽任城濟陰徐州東海廣陵琅邪下邳彭城陳留郡武帝置雒陽東五百三十里十七城户十七萬七千五百二十九口八十六萬九千四百三十三陳留有鳴鴈亭左傳成十六年衛伐鄭鳴鴈杜預曰在縣西北陳留志曰有桐陵亭古桐丘浚儀本大梁帝王世紀曰禹避商均浚儀晉地道記儀封人此縣也通俗文曰渠在浚儀曰莨蕩也尉氏陳留志曰有陵樹鄉北有澤澤有天子苑囿有秦樂廐漢諸帝以馴養猛獸雍丘本杞國陳留志曰城内有神井能興霧雹案北征記曰有吕祿臺髙七丈有酈生祠曹植禹廟讃曰有禹祠植移于其城城本名杞城襄邑有滑亭左傳莊三年次于滑杜預曰在縣西北有承匡城地道記曰在縣西左傳文十一年㑹晉郤缺于承匡有桐門亭有黄門亭襄元年㑹鄫杜預曰縣東南有鄫城外黄左傳惠公季年敗宋師于黄杜預曰宋邑縣東有黄城有葵丘聚齊桓公㑹此城中有曲棘里左傳昭二十五年宋公佐卒曲棘有繁陽城小黄漢舊儀曰髙祖母起兵時死縣北為作陵廟於小黄東昏陳留志曰故户牖鄉有陳平祠濟陽有武父鄉左傳桓十二年盟于武父杜預曰縣東北有武父城縣東南有武城縣都鄉有行宫光武生平丘有臨濟亭田儋死此有匡匡人之亭曹公破袁術處有黄池亭陳留志云黄亭在封丘左傳哀十三年盟黄池杜預曰在縣南傳曰吳囚子服景伯以還及户牖然即黄池在户牖西或以為外黄縣東溝非也封丘博物記有秋溝即敗狄于長丘是也有桐牢亭或曰古蟲牢左傳成五年諸侯㑹蟲牢陳留志有鞠亭古鞠居酸棗左傳鄭太叔至于廩延杜預曰縣北有延津襄五年㑹城棣杜預曰縣西南有棣城東有地烏巢曹公破袁紹處陳留志曰城内有韓王故宫闕長垣侯國有匡城陳留志曰孔子囚此北征記城周三里左傳僖十五年㑹牡丘次于匡杜預曰匡在縣西南昭十三年㑹平丘杜預曰縣西有平丘城有蒲城左傳成九年㑹于蒲杜預曰在縣西南史記曰孔子自匡過蒲陳留志云有子路祠有祭城杜預曰鄭祭封人仲邑陳留志曰有蘧伯玉墓及祠又西南有宛亭左傳僖二十八年衞人盟宛濮杜預曰近濮水已吾有大棘鄉左傳宣二年鄭破宋師大棘杜預曰在襄邑縣南有首鄉左傳桓八年齊侯師于首止杜預曰在襄邑東南有首止城考城古菑陳留志曰古戴國地名杜預曰戴在外黄東南爾雅曰木立死曰菑吕氏春秋草鬱即為菑章帝更名故屬梁陳留志曰有箕子祠有穀亭古句瀆之丘案本傳有蒲亭圉故屬淮陽有髙陽亭陳留志曰有萬人聚王邑破翟義積尸處前書今髙陽文頴曰髙陽聚邑名在縣西扶溝故屬淮陽東郡秦置去雒陽八百餘里十五城户十三萬六千八十八口六十萬三千三百九十三濮陽古昆吾國杜預曰古衞也帝王世紀曰顓頊自窮桑徙商丘左傳曰衞顓頊之墟杜預曰帝丘昆吾氏因之故曰昆吾之墟縣城内有顓頊冢皇覽曰冢在城門外廣陽里中博物記曰桑中在其中春秋時曰濮有鹹城或曰古鹹國左傳僖十三年同㑹于鹹有清丘左傳曰宣十二年盟清丘杜預曰縣東南有鉏城燕本南燕國有雍鄉謝沈書曰赤眉攻雍鄉有胙城古胙國有平陽亭左傳哀十六年衞侯飲孔悝酒於平陽有瓦亭左傳曰定八年㑹于瓦杜預曰縣東北有桃城史記曰春申君説秦曰王又舉甲而拔桃入邢是也白馬有韋鄉杜預曰縣東南有韋城古豕韋氏之國頓丘白虎通曰帝嚳冢在城臺隂野是也東阿左傳桓十年㑹于桃丘杜預曰縣東南有桃城襄十四年孫林父敗衞侯于阿澤杜預曰縣西南大澤魏志有渠丘山有清亭左傳隱四年遇于清是也東武陽濕水出范有秦亭左傳莊三十一年築臺于秦地道記在縣西北臨邑有沛廟博平聊城有夷儀聚左傳僖元年邢遷于夷儀有聶戚左傳曰聊攝以東發干樂平侯國故清章帝更名陽平侯國有莘亭杜預注傳曰衞作新臺在縣北衞殺公子伋之地故曰待諸莘有岡成城秦封蔡澤為岡成君未詳衞公國本觀故國姚姓光武更名有河牧城左傳文元年㑹于戚鄭救晉中行氏晉敗鄭鐵杜預曰戚城南有鐵丘有竿城前書故發干縣穀城春秋時小穀左傳莊三十二年城小穀杜預曰城中有管仲井又傳曰埋長狄榮如首於周首之北門杜預曰縣東北有周首亭有巂下聚左傳僖二十六年追齊師至酅杜預曰縣西有地名酅下皇覽曰縣東十五里有項羽冢東平國故梁景帝分為濟東國宣帝改雒陽東九百七十五里七城户七萬九千一十二口四十四萬八千二百七十無鹽本宿國任姓左傳昭二十五年臧㑹奔郈杜預曰縣東南有郈鄉亭有章城古國左傳莊三十年齊取鄣東平陸六國時曰平陸有闞亭左傳桓十一年㑹于闞杜預曰在須昌縣東南有闞城博物記云即此亭是有堂陽亭故縣後省富成章夀張春秋曰良漢曰夀良光武改曰夀張有堂聚故聚屬東郡地道記曰有蚩尤祠狗城皇覽曰蚩尤冡在縣闞城中髙七丈須昌故屬東郡杜預曰須句古國在西北有致宻城古中都有陽穀城左傳僖三年㑹陽穀杜預曰在縣北寧陽故屬泰山任城國章帝元和元年分東平為任城雒陽東千一百里三城户三萬六千四百四十二口十九萬四千一百五十六任城本任國有桃聚光武破龎萌於桃鄉亢父左傳襄十三年取邿杜預曰縣有邿亭哀六年城邾瑕杜預曰縣北有邾瑕城樊泰山郡髙帝置雒陽東千四百里十二城户八千九百二十九口四十三萬七千三百一十七奉髙有明堂武帝造前書曰在縣西南四里左傳昭八年大蒐于紅至于商衞紅亭在縣西北杜預曰接宋衞也博有泰山廟岱山在西北有龜山左傳定十年齊歸龜陰之田杜預曰田在山北琴操孔子作龜山之操有龍鄉城左傳成二年齊圍龍杜預曰在縣西南史記作隆又楚有蜀之役杜預曰縣西北有蜀亭梁甫侯國有莵裘聚左傳隠公使營莵裘吾將老焉杜預曰縣南有莵裘城鉅平侯國有亭禪山即古所禪亭亭者也有陽關亭左傳襄十七年師自陽關桓六年㑹于成杜預曰縣東南成城即孟孫之邑嬴有鐵山荏侯國萊蕪有原山潘水出杜預曰汶水出蓋沂水出左傳㑹于防杜預曰在縣東南有防城南武陽侯國有顓臾城南城故屬東海有東陽城吕氏春秋夏孔甲遊田于東陽萯山左傳哀八年克東陽襄十九年城武城杜預曰南城縣哀十四年司馬𦵏丘輿杜預曰縣西北有輿城費侯國曹騰封費是鄼縣費亭非此國故屬東海有祊亭左傳隠八年鄭歸祊杜預曰在縣東南閔二年莒人歸共仲及宻杜預曰縣有宻如亭有台亭左傳襄十二年莒圍台杜預曰縣南有台亭牟故國濟北國和帝永元二年分泰山置臣昭案濟北前漢之舊國此是經并泰山復分雒陽東千一百五十里五城户四萬五千六百八十九口二十三萬五千八百九十七盧左傳隠三年齊鄭尋盧之盟杜預曰今縣故城有邾山在縣北成二年封鋭司徒女石窌杜預曰縣東有地名石窌有平陰城有防門左傳襄十八年齊禦晉平陰塹防門杜預曰在縣北又齊登巫山以望晉師杜預曰在縣東北有光里有景兹山杜預曰在縣東南有敖山左傳曰先君獻武廢二山即敖山具山有清亭左傳哀十一年齊伐魯及清是也有長城至東海史記蘇代説燕王曰齊有長城巨防巨防即防門蛇丘有遂鄉古遂國左傳莊十三年齊人滅遂有下讙亭左傳桓三年送姜氏于讙有鑄郷城周武王未及下車封堯後於鑄左傳有棘地成公三年叔孫僑如所圍杜預曰汶水北地有棘鄉東觀書有芳陘山成本國左傳衞師入郕杜預曰東平剛父縣西南有郕鄉茌平本屬東郡剛左傳哀八年齊取闡杜預曰在縣北有闡鄉山陽郡故梁景帝分置雒陽東八百一十里十城户十萬九千八百九十八口六十萬六千九十一昌邑刺史治有梁丘城左傳莊三十二年遇于梁丘杜預曰梁丘鄉在縣西南有甲父亭杜預曰甲父古國名在縣東南左傳隠十年取防杜預曰縣西有防城東緡春秋時曰緡左傳僖二十三年齊圍緡鉅野左傳桓七年焚咸丘杜預曰縣西有咸亭有大野澤春秋西狩獲麟之所爾雅十藪魯有大野杜預曰縣西南有郥亭定十三年齊伐晉之所髙平侯國故槖章帝更名前漢志莽改曰髙平章帝復莽此號左傳隠九年費伯城郎杜預曰縣東南有郁郎亭有茅鄉城杜預曰茅鄉在昌邑西南湖陸故湖陵章帝更名前漢志王莽改曰湖陸章帝復其號博物記曰茍水出地道記縣西有費亭城魏武帝初封所南平陽侯國有漆亭左傳城漆有閭丘亭左傳襄二十一年邾庶其以漆閭丘來奔杜預曰縣東北有漆鄉西北有顯閭亭哀七年囚邾子負瑕杜預曰縣西北有瑕丘城方與有武唐亭左傳桓二年盟于唐杜預曰在西南魯侯觀魚臺春秋經隠五年矢魚于棠有泥母亭或曰古甯母左傳僖七年盟甯母杜預曰在縣東三十一年臧文仲宿重館杜預曰縣西北有重鄉城瑕丘金鄉晉地道記曰縣多山所治名金山山北有鑿石為冢深十餘丈隧長三十丈傍却入為堂三方云得白兎不𦵏更𦵏南山鑿而得金故曰金山故冢今在或云漢昌邑所作或云秦時防東濟陰郡故梁景帝分置雒陽東八百里十一城户十三萬三千七百一十五口六十五萬七千五百五十四定陶本曹國郭璞曰城中有陶丘皇覽曰伯樂冢縣東南一里所髙四五丈古陶堯所居帝王世紀曰舜陶河濵縣西南陶丘亭是有三􅎦亭湯伐三鬷孔安國曰今定陶寃句有煮棗城史記蘇秦説魏襄王曰大王之地東有淮潁煮棗成陽有堯冢靈臺有雷澤禹貢曰雷夏既澤帝王世紀曰舜耕歴山漁雷澤濟陰有歴山乗氏侯國博物記曰古乗丘有泗水有鹿城鄉句陽有垂亭左傳隠八年遇于垂史記無忌説魏安僖王曰文臺隳垂都焚徐廣曰縣有垂亭鄄城離狐故屬東郡廩丘故屬東郡有髙魚城有運城左傳襄二十六年齊烏餘以廩丘奔晉杜預曰今縣故城是又襲衞羊角取之杜預曰今縣所治城又襲我髙魚杜預曰在縣東北單父侯國故屬山陽成武故屬山陽左傳隠七年戎執凡伯於楚丘杜預曰在縣西南有郜城左傳隠十年取郜杜預曰縣東南有郜城地道記有秺城已氏故屬梁皇覽曰有平和鄉鄉有伊尹冢右兗州刺史部郡國八縣邑公侯國八十東海郡髙帝置雒陽東千五百里十三城户十四萬八千七百八十四口七十萬六千四百一十六剡本國刺史治博物記曰有勇王亭即勇士菑丘欣蘭陵有次室亭地道記曰故魯次室邑列女傳有漆室之女或作次室戚胊山海經曰都洲在海中一曰郁洲郭璞曰在縣界世俗傳此山在蒼梧徙來上皆有南方樹木博物記縣東北海邊植石秦所立之東門有鐵有伊盧鄉史記曰鍾離昧冢在伊盧襄賁昌慮有藍鄉左傳昭三十一年邾黒肱以濫來奔杜預曰縣所治城東北有郳城郳小邾國也承陰平利城合城漷水自北南至湖陸祝其有羽山殛鯀之山杜預曰在縣西南博物記曰東北獨居山西南有淵水即羽泉也俗謂此山為懲父山春秋時曰祝其夾谷地左傳定十年㑹齊侯夾谷孔子相厚丘左傳成九年城中城杜預曰在縣西南有中鄉城贛榆本屬琅邪建初五年復左傳齊伐莒莒子奔紀鄣杜預曰縣東北有紀城地道記曰海中去岸百九十步有秦始皇碑長一丈八尺廣五尺厚八尺三寸一行十三字潮水至加其上三丈去則三尺見也琅邪國秦置建武中省城陽國以其縣屬案本紀永夀元年置都尉治雒陽東一千五百里十三城户二萬八百四口五十七萬九百六十七開陽杜預曰古鄅左傳哀三年城啓陽杜預曰開陽故屬東海建初五年屬東武琅邪山海經曰有琅邪臺在渤海間琅邪之東郭璞曰琅邪臨海邊有山嶕嶢特起狀如髙臺此即琅邪臺齊景公曰吾循海而南放乎琅邪越絶曰句踐徙琅邪起觀臺臺周七里以望東海史記曰秦始皇徙黔首三萬户琅邪臺下傳有勞山東莞有鄆亭左傳曰公處鄆有邳鄉有公來山或曰古浮來左傳隠八年盟浮來杜預曰邳來山之間號曰邳來莊九年鮑叔受管仲及堂阜而脱之杜預曰東莞䝉陰縣西北有夷吾亭或曰鮑叔解夷吾縛於此因以為名即古堂阜也東莞後為名西海東觀書曰有勝山博物記太公吕望所出今有東吕鄉又釣於棘津其浦今存諸左傳莊二十九年城諸杜預曰諸縣在城陽郡又言隠四年莒人伐杞取牟婁杜預曰縣東北有婁鄉莒本國故屬城陽左傳成八年申公巫臣㑹渠丘公杜預曰縣有蘧丘里有鐵有崢嶸谷東安故屬城陽陽都故屬城陽有牟臺左傳宣元年㑹于平州杜預曰在縣西臨沂故屬東海有叢亭左傳隠六年盟于艾杜預曰縣東南有艾山七年城中丘杜預曰縣東北有中丘亭博物記曰縣東界次睢有大叢社民謂之食人社即次睢之社即丘侯國故屬東海春秋曰祝丘繒侯國故屬東海有概亭左傳莊九年盟于蔇杜預曰在縣北姑幕左傳昭五年莒牟夷以牟婁及防茲來奔杜預曰縣東北有茲亭博物記曰淮水入城東南五里有公冶長墓彭城國髙祖置為楚章帝改雒陽東千二百二十里八城户八萬六千一百七十口四十九萬三千二十七彭城古大彭邑北征記城西二十里有山山有楚元王墓伏滔北征記曰城北六里有山臨泗有宋桓魋石槨皆青石隠起龜龍鱗鳳之象有鐵武原傅陽有柤水左傳襄十年滅偪陽杜預曰即此縣也吕留西征記曰城中有張良廟梧菑丘廣戚故屬沛國廣陵郡景帝置為江都武帝更名建武中省泗水國以其縣屬雒陽東一千六百四十里十一城户八萬三千九百七口四十一萬百九十廣陵吳王濞所都城周十四里半有東陵亭博物記曰女子杜姜左道通神縣以為妖閉獄桎梏卒變形莫知所極以狀上因以其處為廟祠號曰東陵聖母江都有江水祠髙郵平安淩故屬泗水東陽故屬臨淮有長洲澤吳王濞太倉在此縣多麋博物記曰千千為羣掘食草根其處成泥名曰麋畯民人隨此畯種稻不耕而穫其収百倍又扶海洲上有草名蒒其實食之如大麥從七月稔熟民斂穫至冬乃訖名曰自然穀或曰禹餘糧射陽故屬臨淮有梁湖地道記曰有博支湖鹽瀆故屬臨淮輿侯國故屬臨淮堂邑故屬臨淮有鐵春秋時曰堂海西故屬東海下邳國武帝置為臨淮郡永平十五年更為下邳國雒陽東千四百里十七城户十三萬六千三百八十九口六十一萬一千八十三下邳本屬東海戴延之西征記曰有沂水自城西西南注泗别下廻城南亦注泗舊有橋處張良與黄石公㑹此橋葛嶧山本嶧陽山山出名桐伏滔北征記曰今槃根往往而存有鐵徐本國有樓亭或曰古蔞林杜預曰在僮縣東南伏滔北征記曰縣北有大冢徐君墓延陵解劒之處僮侯國睢陵下相淮陰下鄉有南昌亭韓信寄食處淮浦盱台髙山潘旌淮陵取慮有蒲姑陂左傳昭十六年齊師至蒲隧杜預曰縣東有蒲姑陂東城曲陽侯國故屬東海司吾侯國故屬東海良城故屬東海春秋時曰良左傳昭十三年晉㑹吳于良夏丘故屬沛右徐州刺史部郡國五縣邑侯國六十二魏氏春秋曰初平三年分琅邪東海為城陽新城昌慮郡建安十一年省昌慮并東海後漢書卷三十一後漢書卷三十一考證郡國志三已吾有大棘鄉有首鄉臣召南按此二鄉注皆應在上文襄邑有承匡城之下大棘首鄉皆襄邑地非巳吾地也不知何以脱入於此又首鄉注左傳桓八年齊侯師于首止應作僖五年齊侯會于首止杜預曰有首止城應作有首鄉林邑有沛廟沛當作泲湖陸故湖陵章帝更名注王莽改曰湖陸章帝復其號臣召南按前書湖陵莽曰湖陸蓋自光武中興郡縣名皆復其舊至章帝又改湖陵為湖陸也琅邪國注秦置建武中省城陽國以其縣屬臣召南按此注不明郡與國亦畧有别秦置琅邪郡前漢因之光武改為國省城陽國來屬此其始末也秦置之下當有郡字東莞有邳鄉有公來山或曰古浮來注杜預曰邳來山之間號曰邳來按杜預注原文云邳鄉西有公來山號曰邳來間陽都有牟臺牟當作平東城城當作成後漢書卷三十一考證
