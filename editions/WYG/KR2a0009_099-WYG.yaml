body:
  text: 後漢書卷九十九宋宣城太守范煜撰唐章懐太子賢注竇何列傳第五十九竇武傳竇武字㳺平扶風平陵人安豐戴侯融之𤣥孫也父奉定襄太守武少以經行著稱常教授於大澤中不交時事名顯關西延熹八年長女選入掖庭桓帝以為貴人拜武郎中其冬貴人立為皇后武遷越騎校尉封槐里侯五千户明年冬拜城門校尉在位多辟名士清身疾惡禮賂不通妻子衣食裁充足而已是時羌蠻寇難嵗儉民飢武得兩宫賞賜悉散與太學諸生及載肴糧於路匄施貧民兄子紹為虎賁中郎將性踈簡奢侈武每數切厲相戒猶不覺悟乃上書求退紹位又自責不能訓導當先受罪由是紹更遵節大小莫敢違犯時國政多失内官専寵李膺杜密等為黨事考逮永康元年上疏諫曰臣聞明主不諱譏刺之言以探幽暗之實忠臣不恤諫爭之患以暢萬端之事是以君臣並熙名奮百世熙盛也臣幸得遭盛明之世逄文武之化豈敢懐禄逃罪不竭其誠陛下初從藩國爰登聖祚天下逸豫謂當中興自即位以来未聞善政梁孫冦鄧雖或誅滅梁冀孫夀寇榮鄧萬世見桓紀也而常侍黃門續為禍虐欺㒺陛下競行譎詐自造制度妄爵非人朝政日衰姦臣日彊伏尋西京放恣王氏佞臣執政終喪天下今不慮前事之失復循覆車之軌臣恐二世之難必將復及二世即胡亥趙髙之變不朝則夕趙髙使女壻閻樂弑胡亥於望夷宫近者姦臣牢脩造設黨議遂收前司𨽻校尉李膺太僕杜密御史中丞陳翔太尉掾范滂等逮考連及數百人曠年拘録事無効驗臣惟膺等建忠抗節志經王室此誠陛下稷卨伊吕之佐而虛為姦臣賊子之所誣枉天下寒心海内失望惟陛下留神澄省時見理出時謂即時也以厭人鬼喁喁之心臣聞古之明君必須賢佐以成政道今臺閣近臣尚書令陳蕃僕射胡廣尚書朱㝢荀緄音古本反劉祐魏朗劉矩尹勲等皆國之貞士朝之良佐尚書郎張陵媯皓苑康楊喬邊韶戴恢等文質彬彬明逹國典内外之職羣才並列而陛下委任近習専樹饕餮外典州郡内幹心膂宜以次貶黜案罪紏罰抑奪宦官欺國之封案其無狀誣㒺之罪信任忠良平決臧否使邪正毁譽各得其所寳愛天官唯善是授如此咎徴可消天應可待間者有嘉禾芝草黄龍之見夫瑞生必於嘉士嘉士猶善人也福至實由善人在徳為瑞無徳為災陛下所行不合天意不宜稱慶書奏因以病上還城門校尉槐里侯印綬上音時文反帝不許有詔原李膺杜密等自黃門北寺若盧都内諸獄繫囚罪輕者皆出之都内主藏官名前書有都内令丞屬大司農也其冬帝崩無嗣武召侍御史河間劉儵參問其國中王子侯之賢者儵稱解瀆亭侯宏武入白太后遂徴立之是為靈帝拜武為大將軍常居禁中帝既立論定䇿功更封武為聞喜侯子機渭陽侯拜侍中兄子紹鄠侯遷歩兵校尉紹弟靖西鄉侯為侍中監羽林左騎武既輔朝政常有誅翦宦官之意太傅陳蕃亦素有謀時共㑹朝堂蕃以私謂武曰中常侍曹節王甫等自先帝時操弄國權濁亂海内百姓匈匈歸咎於此今不誅節等後必難圖武深然之蕃大喜以手推席而起武於是引同志尹勲為尚書令劉瑜為侍中馮述為屯騎校尉又徴天下名士廢黜者前司𨽻李膺宗正劉猛太僕杜密廬江太守朱㝢等列於朝廷請前越嶲太守荀昱為從事中郎辟頴川陳寔為屬共定計䇿於是天下雄俊知其風㫖莫不延頸企踵思奮其智力續漢志曰桓帝初京都童謡曰㳺平賣印自有評不避賢豪及大姓案武字游平與陳蕃合䇿戮力唯徳是建咸得其人賢豪大姓皆絶望矣㑹五月日食蕃復説武曰昔蕭望之困一石顯元帝時奄人石顯為中書令譛御史大夫蕭望之令自殺也近者李杜諸公禍及妻子况今石顯數十軰乎蕃以八十之年欲為將軍除害今可且因日食斥罷宦官以塞天變又趙夫人及女尚書旦夕亂太后女尚書内宮也夫人即趙嬈急宜退絶惟將軍慮焉武乃白太后曰故事黃門常侍但當給事省内典門户主近署財物耳今乃使與政事而任權重子弟布列専為貪暴天下匈匈正以此故宜悉誅廢以清朝廷太后曰漢来故事世有但當誅其有罪豈可盡廢邪時中常侍管覇頗有才略専制省内武先白誅覇及中常侍蘓康等竟死武復數白誅曹節等太后冘豫未忍冘音滛冘豫不定也故事久不發至八月太白出西方劉瑜素善天官惡之上書皇太后曰太白犯房左驂上將星入太㣲其占宫門當閉將相不利姦人在主傍願急防之又與武蕃書以星辰錯繆不利大臣宜速斷大計武蕃得書將發於是以朱㝢為司𨽻校尉劉祐為河南尹虞祁為洛陽令武乃奏免黃門令魏彪以所親小黃門山氷代之使氷奏素狡猾尤無狀者長樂尚書鄭䬃䬃音立送北寺獄蕃謂武曰此曹子便當收殺何復考為武不從令氷與尹勲侍御史祝瑨雜考䬃辭連及曹節王甫勲氷即奏收節等使劉瑜内奏時武出宿歸府典中書者先以告長樂五官史朱瑀瑀盗發武奏罵曰中官放縱者自可誅耳我曹何罪而當盡見族滅因大呼曰陳蕃竇武奏白太后廢帝為大逆乃夜召素所親壯健者長樂從官史共普張亮等十七人喢血共盟誅武等曹節聞之驚起白帝曰外間切切請出御徳陽前殿令帝拔劔踊躍使乳母趙嬈等擁衛左右取棨信閉諸禁門棨有衣㦸也漢官儀曰凡居宫中皆施籍於掖門案姓名當入者本官為封棨傳審印信然後受之召尚書官屬脅以白刃使作詔板拜王甫為黃門令持節至北寺獄收尹勲山氷氷疑不受詔甫格殺之遂害勲出鄭䬃還共刼太后奪璽書劉攽曰案太后所守非璽書也當是璽綬誤作書字順帝亦先奪得璽綬令中謁者守南宫閉門絶複道複音福使鄭䬃等持節及侍御史謁者捕收武等武不受詔馳入歩兵營與紹共射殺使者召㑹北軍五校士數千人屯都亭下令軍士曰黃門常侍反盡力者封侯重賞詔以少府周靖行車騎將軍加節與護匈奴中郎將張奐率五營士討武夜漏盡王甫將虎賁羽林廐騶都侯劔㦸士合千餘人出屯朱雀掖門與奐等合明旦悉軍闕下與武對陳甫兵漸盛使其士大呼武軍曰竇武反汝皆禁兵當宿衛宫省何故随反者乎先降有賞營府素畏服中官於是武軍稍稍歸甫自旦至食時兵降略盡武紹走諸軍追圍之皆自殺梟首洛陽都亭續漢志曰桓帝末京師童謡曰茅田一頃中有井四方纎纎不可整嚼復嚼今年尚可後年磽案易曰拔茅連茹茅喻羣賢也井者法也時中常侍管霸等憎疾海内英賢並見廢錮茅田一頃言羣賢衆多也中有井者言雖厄窮不失法度也四方纎纎言姦慝不可理也嚼飲酒相強之辭也言不恤王政徒耽宴而已今年尚可者言但禁錮也後年磽者陳蕃竇武等誅天下大壊也磽音苦教反磽猶惡也收捕宗親賔客姻屬悉誅之及劉瑜馮述皆夷其族徙武家屬日南遷太后於雲臺當是時凶豎得志士大夫皆喪其氣矣武府掾桂陽胡騰少師事武獨殯斂行喪坐以禁銅武孫輔時年二嵗逃竄得全事覺節等捕之急胡騰及令史南陽張敞共逃輔於零陵界詐云已死騰以為己子而使聘娶焉後舉桂陽孝亷至建安中荆州牧劉表聞而辟焉以為從事使還竇姓以事列上㑹表卒曹操定荆州輔與宗人徙居於鄴辟丞相府從征馬超為流矢所中死飛矢曰流矢中傷也初武母産武而幷産一蛇送之林中後母卒及𦵏未窆有大蛇自榛草而出廣雅曰木藂生曰榛徑至喪所以頭擊柩涕血皆流俯仰蛣屈蛣音丘吉反若哀泣之容有頃而去時人知為竇氏之祥祥吉凶之先見者尚書曰亳有祥騰字子升初桓帝廵狩南陽以騰為䕶駕從事公卿貴戚車騎萬計徴求費役不可勝極騰上言天子無外乗輿所幸即為京師臣請以荆州刺史比司𨽻校尉南陽屬荆州故請以刺史比司𨽻臣自同都官從事帝從之漢官儀曰都官從事主洛陽百官朝㑹與三府掾同也自是肅然莫敢妄有干欲騰以此顕名黨錮解官至尚書張敞者太尉温之弟也漢官儀曰温字伯慎穰人也封𤣥鄉侯太史奏言有大臣誅死董卓取温笞殺於市以厭之何進傳何進字遂髙南陽宛人也異母女弟選入掖庭為貴人有寵於靈帝拜進郎中再遷虎賁中郎將出為潁川太守光和二年貴人立為皇后徴進入拜侍中將作大匠河南尹中平元年黃巾賊張角等起以進為大將軍率左右羽林五營士屯都亭修理器械以鎮京師張角别黨馬元義謀起洛陽進發其姦以功封慎侯慎縣屬汝南郡四年榮陽數千人羣起攻燒郡縣殺中牟縣令詔使進弟河南尹苖出擊之苖攻破羣賊平定而還詔遣使者迎於成臯拜苖為車騎將軍封濟陽侯五年天下滋亂望氣者以為京師當有大兵兩宫流血大將軍司馬許凉假司馬伍宕説進曰太公六韜有天子將兵事太公六韜篇第一覇典文論第二文師武論第三龍韜主將第四虎韜偏禆第五豹韜校尉第六犬韜司馬龍韜云武王曰吾欲令三軍之衆親其將如父母聞金聲而怒聞鼓音而喜為之柰何可以威厭四方進以為然入言之於帝於是乃詔進大發四方兵講武於平樂觀下起大壇上建十二重五采華盖高十丈壇東北為小壇復建九重華盖髙九丈列歩兵騎士數萬人結營為陳天子親出臨軍駐大華盖下進駐小華盖下禮畢帝躬擐甲介馬擐音宦擐貫也介亦甲也稱無上將軍行陳三匝而還詔使進悉領兵屯於觀下是時置西園八校尉以小黃門蹇碩為上軍校尉虎賁中郎將袁紹為中軍校尉屯騎都尉鮑鴻為下軍校尉劉攽曰案文漢無屯騎都尉當誤都字宜作校也議郎曹操為典軍校尉趙融為助軍校尉淳于瓊為佐軍校尉又有左右校尉帝以蹇碩壯健而有武略特親任之以為元帥督司𨽻校尉以下雖大將軍亦領屬焉碩雖擅兵於中而猶畏忌於進乃與諸常侍共説帝遣進西擊邊章韓遂帝從之賜兵車百乗虎賁斧鉞進隂知其謀乃上遣袁紹東擊徐兖二州兵須紹還即戎事以稽行期初何皇后生皇子辯王貴人生皇子恊羣臣請立太子帝以辯輕佻無威儀不可為人主前書曰佻輕也然皇后有寵且進又居重權故久不決六年帝疾篤屬恊於蹇碩碩既受遺詔且素輕忌於進兄弟及帝崩碩時在内欲先誅進而立恊及進從外入碩司馬潘隐與進早舊迎而目之進驚馳從儳道歸營引兵入屯百郡邸廣雅曰儳疾也音任覽反因稱疾不入碩謀不行皇子辯乃即位何太后臨朝進與太傅袁隗輔政録尚書事進素知中官天下所疾兼忿蹇碩圖已及秉朝政隂規誅之袁紹亦素有謀因進親客張津勸之曰黄門常侍權重日久又與長樂太后専通姦利靈帝母董太后居長樂宫將軍宜更清選賢良整齊天下為國家除患進然其言又以袁氏累世寵貴海内所歸袁安為司徒司空孫湯為司徒太尉湯子成五官中郎將成生紹故云累世寵貴也而紹素善飬士能得豪傑用其從弟虎賁中郎將術亦尚氣侠故並厚待之因復博徴智謀之士龎紀何顒荀攸等與同腹心蹇碩疑不自安與中常侍趙忠等書曰大將軍兄弟秉國専朝今與天下黨人謀誅先帝左右埽滅我曹但以碩典禁兵故且沈吟今宜共閉上閤急捕誅之中常侍郭勝進同郡人也太后及進之貴幸勝有力焉故勝親信何氏遂共趙忠等議不從碩計而以其書示進進乃使黄門令收碩誅之因領其屯兵袁紹復説進曰前竇武欲誅内寵而反為所害者以其言語漏洩而五營百官服畏中人故也今將軍既有元舅之重而兄弟並領勁兵部曲將吏皆英俊名士樂盡力命事在掌握此天贊之時也將軍宜一為天下除患名垂後世雖周之申伯何足道哉申伯周申后父也詩大雅曰唯申及甫唯周之翰今大行在前殿人主崩未有諡故稱大行也前書音義曰大行者不反之辭也將軍宜受詔領禁兵劉攽曰案文多一宜字不宜輕出入宫省進甚然之乃稱疾不入陪喪又不送山陵遂與紹定籌䇿而以其計白太后太后不聴曰中官統領禁省自古及今漢家故事不可廢也且先帝新棄天下我奈何楚楚與士人共對事乎楚詞曰楚楚鮮明貌也詩曰衣裳楚楚進難違太后意且欲誅其放縱者紹以為中官親近至尊出入號令今不悉廢後必為患而太后母舞陽君及苖數受諸宦官賂遺知進欲誅之數白太后為其障蔽又言大將軍専殺左右擅權以弱社稷太后疑以為然中官在省闥者或數十年封侯貴寵膠固内外進新當重任素敬憚之雖外收大名而内不能斷故事久不決紹等又為畫䇿多召四方猛將及諸豪傑使並引兵向京城以脅太后進然之主簿陳琳入諫曰易稱即鹿無虞易屯卦六三爻辭也虞掌山澤之官即鹿猶從禽也無虞言不可得諺有掩目捕雀夫㣲物尚不可欺以得志况國之大事其可以詐立乎今將軍總皇威握兵要龍驤虎歩髙下在心此猶鼓洪爐燎毛髪耳夫違經合道天人所順而反委釋利噐更徴外助大兵聚㑹彊者為雄所謂倒持干戈授人以柄前書梅福上書曰倒持太阿授楚以柄功必不成秪為亂階進不聼遂西召前將軍董卓屯闗中上林苑又使府掾太山王匡東發其郡強弩幷召東郡太守橋瑁屯城臯使武猛都尉丁原燒孟津火照城中武猛謂有武蓺而勇猛者取其嘉名因以名官也皆以誅宦官為言太后猶不從苖謂進曰始共從南陽来俱以貧賤依省内以致貴富國家之事亦何容易覆水不收宜深思之且與省内和也進意更狐疑紹懼進變計乃脅之曰交搆已成形埶已露事留變生將軍復欲何待而不早決之乎進於是以紹為司𨽻校尉假節専命擊斷從事中郎王允為河南尹紹使洛陽方略武吏司察宦者而促董卓等使馳驛上欲進兵平樂觀太后乃恐悉罷中常侍小黃門使還里舍唯留進素所私人以守省中諸常侍小黄門皆詣進謝罪唯所措置進謂曰天下匈匈正患諸君耳今董卓垂至諸君何不早各就國袁紹勸進便於此決之至于再三進不許紹又為書告州郡詐宣進意使捕案中官親屬進謀積日頗泄中官懼而思變張讓子婦太后之妹也讓向子婦叩頭曰老臣得罪當與新婦俱歸私門唯受恩累世唯思念也今當逺離宫殿情懐戀戀願復一入直得暫奉望太后陛下顔色然後退就溝壑死不恨矣子婦言於舞陽君入白太后乃詔諸常侍皆復入直八月進入長樂白太后請盡誅諸常侍以下選三署郎入守宦官廬諸宦官相謂曰大將軍稱疾不臨喪不送𦵏今欻入省欻音許物反此意何為竇氏事竟復起邪又張譲等使人潜聼具聞其語乃率常侍叚珪畢嵐等數十人持兵竊自側闥入伏省中及進出因詐以太后詔召進入坐省閤譲等詰進曰天下憒憒亦非獨我曹罪也説文曰憒憒亂也先帝嘗與太后不快幾至成敗陳留王協母王羙人何后鴆殺之帝怒欲廢后宦官固請得止我曹涕泣救觧各出家財千萬為禮和悦上意但欲託卿門户耳今乃欲滅我曹種族不亦太甚乎卿言省内穢濁公卿以下忠清者為誰於是尚方監渠穆㧞劔斬進於嘉徳殿前譲珪等為詔以故太尉樊陵為司𨽻校尉少府許相為河南尹尚書得詔板疑之曰請大將軍出共議中黃門以進頭擲與尚書曰何進謀反已伏誅矣進部曲將吴匡張璋素所親幸在外聞進被害欲將兵入宮宮閤閉袁術與匡共斫攻之中黄門持兵守閤㑹日暮術因燒南宮九龍門及東西宫欲以脅出譲等譲等入白太后言大將軍兵反燒宫攻尚書闥因將太后天子及陳留王又劫省内官屬從複道走北宫􅃨音福尚書盧植執戈於閤道窗下仰數叚珪叚珪等懼乃釋太后太后投閤得免袁紹與叔父隗矯詔召樊陵許相斬之苖紹乃引兵屯朱雀闕下捕得趙忠等斬之吳匡等素怨苖不與進同心而又疑其與宦官同謀乃令軍中曰殺大將軍者即車騎也士吏能為報讎乎進素有仁恩士卒皆流涕曰願致死匡遂引兵與董卓弟奉車都尉旻攻殺苖棄其屍於苑中紹遂閉北宫門勒兵捕宦者無少長皆殺之或有無須而誤死者至自發露然後得免者二千餘人劉攽曰案文少一死字是時宦官死者二千餘人耳若無須發露得免者二千人則死者何可勝計矣紹因進兵排宫或上端門屋以攻省内張譲叚珪等因廹遂將帝與陳留王數十人歩出榖門奔小平津榖門洛城北當中門也公卿並出平樂觀無得從者唯尚書盧植夜馳河上王允遣河南中部掾閔貢随植後貢至手劔斬數人餘皆投河而死明日公卿百官乃奉迎天子還宫以貢為郎中封都亭侯董卓遂廢帝又廹殺太后殺舞陽君何氏遂亡而漢室亦自此敗亂論曰竇武何進藉元舅之資據輔政之權内倚太后臨朝之威外迎羣英乗風之埶卒而事敗閹豎身死功頽為世所悲豈智不足而權有餘乎言智非不足權亦有餘盖天敗也傳曰天之廢商久矣君將興之斯宋襄公所以敗於泓也左傳曰楚伐宋宋公將戰子魚諫曰天之棄商久矣公將興之不可宋公不從遂與楚戰大敗於泓也贊曰武生蛇祥進自屠羊進本屠家子也惟女惟弟来儀紫房上惽下嬖人靈動怨將紏邪慝以合人願道之屈矣代離凶困代更也後漢書卷九十九後漢書卷九十九考證竇武傳太后冘豫未忍冘字本或作宂誤冘豫即无豫也何進傳詔使進弟河南尹苖出擊之苖朱氏子五行志作皇后異父兄朱苖張讓叚珪等因廹何焯曰因疑作困後漢書卷九十九考證
