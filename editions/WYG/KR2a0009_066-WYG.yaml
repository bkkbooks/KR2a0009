body:
  text: 後漢書卷六十六宋宣城太守范煜撰唐章懐太子賢注鄭范陳賈張列傳第二十六鄭興傳子衆鄭興字少贛河南開封人也少學公羊春秋晚善左氏傳遂積精深思通逹其㫖同學者皆師之東觀記曰興從博士金子嚴為左氏春秋天鳯中王莽年也將門人從劉歆講正大義左氏義也歆美興才使撰條例章句訓詁及校三統歴説文曰詁訓古言也音古度反三統歴劉歆撰謂夏殷周歴也更始立以司直李松行丞相事先入長安松以興為長史令還奉迎遷都更始諸將皆山東人咸勸留洛陽興說更始曰陛下起自荆楚權政未施更始起南陽南陽屬荆州故曰荆楚也一朝建號而山西雄桀争誅王莽開關郊迎者何也山西謂陕山已西也此天下同苦王氏虐政而思髙祖之舊徳也今久不撫之臣恐百姓離心盗賊復起矣春秋書齊小白入齊不稱侯未朝廟故也小白齊桓公也春秋齊小白入于齊公羊傳曰曷為以國氏當國也其言入何篡辭也今議者欲先定赤眉而後入關是不識其本而争其末恐國家之守轉在函谷言若不早都闗中有人先入則國家鎭守轉在函谷也雖臥洛陽庸得安枕乎庸用也更始曰朕西決矣拜興為諌議大夫使安集關西及朔方凉益三州還拜凉州刺史㑹天水有反者攻殺郡守興坐免時赤眉入關東道不通興乃西歸隗囂虚心禮請劉攽曰案文少一囂字而興耻為之屈稱疾不起囂矜已自飾常以為西伯復作西伯文王也作起也乃與諸將議自立為王興聞而説囂曰春秋傳曰口不道忠信之言為嚚耳不聽五聲之和為聾左傳富辰諫周襄王之辭間者諸將集㑹無乃不道忠信之言大將軍之聽無乃阿而不察乎昔文王承積徳之緒加之以睿聖三分天下尚服事殷孔子曰三分天下有其二以服事殷及武王即位八百諸侯不謀同㑹皆曰紂可伐矣武王以未知天命還兵待時史記曰武王觀兵孟津諸侯不期而㑹者八百人皆曰紂可伐矣王曰汝未知天命乃還師後閒紂殺比干囚箕子乃告諸侯以伐之故曰待時也髙祖征伐累年猶以沛公行師今令徳雖明世無宗周之祚威略雖振未有髙祖之功而欲舉未可之事昭速禍患劉攽曰案文昭當作招無乃不可乎惟將軍察之囂竟不稱王後遂廣置職位以自尊髙興復止囂曰夫中郎將太中大夫使持節官皆王者之器非人臣所當制也孔子曰惟器與名不可以假人左傳杜預注曰器車服召爵號也不可以假人者亦不可以假於人也無益於實有損於名非尊上之意也囂病之而止病猶難也及囂遣子恂入侍將行興因恂求歸𦵏父母囂不聽而徙興舍益其秩禮興入見囂曰前遭赤眉之亂以將軍僚舊故敢歸身明徳興嘗為凉州刺史囂為西州將軍故曰僚舊也幸䝉覆載之恩復得全其性命興聞事親之道生事之以禮死塟之以禮祭之以禮奉以周旋弗敢失墜周旋猶遵奉也左傳季文子曰先大夫臧文仲敎行父事君之禮奉以周旋弗敢失墜也今為父母未塟請乞骸骨若以增秩徙舍中更停留是以親為餌猶釣餌也無禮甚矣將軍焉用之囂曰囂將不足留故邪興曰將軍據七郡之地七郡天水隴西武威張掖酒泉燉煌金城也擁羌胡之衆以戴本朝徳莫厚焉威莫重焉居則為専命之使入必為鼎足之臣興從俗者也不敢深居屏處因將軍求進不患不逹因將軍求入何患不親此興之計不逆將軍者也興業為父母請不可以已願留妻子獨歸塟將軍又何猜焉囂曰幸甚促為辦裝遂令與妻子俱東時建武六年也侍御史杜林先與興同寓隴右乃薦之曰竊見河南鄭興執義堅固敦悦詩書左傳趙衰曰臣亟聞郤縠之言矣郤縠悦禮樂而敦詩書也好古博物見疑不惑有公孫僑觀射父之徳左傳子産辨黄熊晉侯聞之曰博物君子也觀射父楚大夫也對昭王以重黎義和之事見國語宜侍帷幄典職機密昔張仲在周燕翼宣王而詩人悅喜張仲周宣王時賢臣也燕樂也翼敬也詩小雅曰侯誰在矣張仲孝友惟陛下留聽少察以助萬分乃徴為太中大夫明年三月晦日食興因上疏曰春秋以天反時為災地反物為妖人反徳為亂亂則妖災生左傳晉伯宗之辭天反時為災謂寒暑易節也地反物為妖謂羣物失性也往年已来讁咎連見意者執事頗有闕焉按春秋昭公十七年夏六月甲戌朔日有食之杜預注曰於周為六月於夏為四月純陽用事隂氣未動而侵陽也傳曰日過分而未至言過春分而未及夏至也三辰有災三辰日月星也於是百官降物降物素服君不舉不舉盛饌避移時避正寢過日食時也樂用鼓奏鼓伐鼓祝用幣用幣於社史用辭用辭以自責也此以上皆左傳載魯大夫答季平子之詞也今孟夏純乾用事隂氣未作其災尤重夫國無善政則讁見日月變咎之来不可不慎其要在因人之心擇人處位也左傳晉士文伯曰國無政不用善則自取讁於日月之災故政不可不慎也務三而已一曰擇人二曰因人三曰從時也堯知鯀不可用而用之者屈已之明因人之心也齊桓反政而相管仲晉文歸國而任郄縠者是不私其私擇人處位也史記曰桓公與兄子紏争位糾使管仲將兵遮道射桓公鉤帶及桓公即位任政於管仲也又晉文公自秦歸國懐公故臣郄芮謀燒公宫殺文公宦者勃鞮告之後文公以郄縠為中軍帥縠即郄芮之族文公不以為讎而任焉言唯賢是用不私其私也今公卿大夫多舉漁陽太守郭伋可大司空者而不以時定道路流言咸曰朝廷若用功臣功臣用則人位謬矣願陛下上師唐虞下覽齊晉以成屈已從衆之徳以濟羣臣讓善之功濟成也夫日月交㑹數應在朔而頃年日食每多在晦先時而合皆月行疾也日君象而月臣象君亢急則臣下促廹故行疾也今年正月繁霜自爾以来率多寒日正月夏之四月此亦急咎之罰書曰急恒寒若天於賢聖之君猶慈父之於孝子也丁寧申戒欲其反政故災變仍見此乃國之福也今陛下髙明而羣臣惶促宜留思柔剋之政垂意洪範之法剋能也柔剋謂和柔而能立事也尚書洪範曰髙明柔剋博採廣謀納羣下之策書奏多有所納帝嘗問興郊祀事曰吾欲以讖斷之何如興對曰臣不為讖帝怒曰卿之不為讖非之邪興惶恐曰臣於書有所未學而無所非也帝意乃解興數言政事依經守義文章溫雅然以不善讖故不能任九年使監征南積弩營於津鄉征南將軍岑彭積弩將軍傅俊屯津鄉以拒公孫述津鄉在今荆州也㑹征南將軍岑彭為刺客所殺興領其營遂與大司馬吴漢俱擊公孫述述死詔興留屯成都頃之侍御史舉奏興奉使私買奴婢坐左轉蓮勺令蓮勺縣屬左馮翊故城在今同州下邽縣東北蓮音輦勺音酌是時喪亂之餘郡縣殘荒興方欲築城郭修禮敎以化之㑹以事免興好古學尤明左氏周官長於歴數自杜林桓譚衛宏之屬莫不斟酌焉斟酌謂取其意指也世言左氏者多祖興而賈逵自傳其父業故有鄭賈之學興去蓮勺後遂不復仕客授閿鄉閿音聞古字也建安中改作聞三公連辟不肯應卒于家子衆衆字仲師年十二從父受左氏春秋精力於學明三統歴作春秋難記條例兼通易詩知名於世建武中皇太子及山陽王荆因虎賁中郎將梁松以縑帛聘請衆欲為通義引籍出入殿中衆謂松曰太子儲君無外交之義漢有舊防蕃王不宜私通賔客遂辭不受松復風衆以長者意不可逆衆曰犯禁觸罪不如守正而死太子及荆聞而竒之亦不强也及梁氏事敗梁松坐懸飛書誹謗下獄死事見梁統傳也賔客多坐之唯衆不染於辭永平初辟司空府以明經給事中再遷越騎司馬漢官儀曰越騎司馬一人秩千石也復留給事中是時北匈奴遣使求和親八年顯宗遣衆持節使匈奴衆至北庭虜欲令拜衆不為屈單于大怒圍守閉之不與水火欲脅服衆衆拔刀自誓單于恐而止乃更發使隨衆還京師朝議欲復遣使報之衆上疏諫曰臣伏聞北單于所以要致漢使者欲以離南單于之衆堅三十六國之心也武帝開通西域本三十六國又當揚漢和親誇示鄰敵令西域欲歸化者局促狐疑懐土之人絶望中國耳漢使既到便偃蹇自信信音申若復遣之虜必自謂得謀其羣臣駮議者不敢復言駮議謂勸單于歸漢如是南庭動揺烏桓有離心矣南單于久居漢地具知形勢萬分離析旋為邊害今幸有度遼之衆揚威北垂雖勿報答不敢為患明帝八年初置度遼將軍屯五原曼栢帝不從復遣衆衆因上言臣前奉使不為匈奴拜單于恚恨故遣兵圍臣今復銜命必見陵折臣誠不忍持大漢節對氊裘獨拜如令匈奴遂能服臣將有損大漢之强帝不聽衆不得已既行在路連上書固争之詔切責衆追還繫廷尉㑹赦歸家其後帝見匈奴来者問衆與單于争禮之狀皆言匈奴中傳衆意氣壯勇雖蘇武不過乃復召衆為軍司馬使與虎賁中郎將馬廖擊車師至敦煌拜為中郎將使䕶西域㑹匈奴脅車師圍戊巳校尉衆發兵救之遷武威太守謹脩邊備虜不敢犯遷左馮翊政有名迹建初六年代鄧彪為大司農是時肅宗議復鹽鐵官衆諫以為不可武帝時國用不足乃賣鹽鐵置官以主之昭帝罷之今議欲復之詔數切責至被奏劾衆執之不移帝不從在位以清正稱其後受詔作春秋刪十九篇八年卒官子安世亦傳家業為長樂未央廐令續漢志曰廐令一人秩六百石延光中安帝廢太子為濟隂王安世與太常桓焉太僕来歴等共正議諫争及順帝立安世巳卒追賜錢帛除子亮為郎衆曾孫公業自有傳范升傳范升字辯卿代郡人也少孤依外家居九嵗通論語孝經及長習梁丘易老子敎授後生宣帝時梁丘賀之易也王莽大司空王邑辟升為議曹史時莽頻發兵役徴賦繁興升乃奏記邑曰升聞子以人不間於其父母為孝臣以下不非其君上為忠論語曰孝哉閔子騫人不間於其父母昆弟之言子騫之孝化其父母兄弟言人無非之者忠臣事君有過即諫在下無有非君者是忠臣也今衆人咸稱朝聖皆曰公明盖明者無不見聖者無不聞今天下之事昭昭於日月震震於雷霆而朝云不見公云不聞則元元焉所呼天公以為是而不言則過小矣知而從令則過大矣二者於公無可以免宜乎天下歸怨於公矣朝以逺者不服為至念升以近者不悦為重憂今動與時戾事與道反馳騖覆車之轍探湯敗事之後賈誼曰前車覆後車誡論語曰見不善如探湯後出益可怪晚發愈可懼耳方春嵗首而動發逺役藜霍不充田荒不耕榖價騰躍斛至數千吏人陷於湯火之中非國家之人也如此則胡貊守關青徐之寇在於帷帳矣王莽時青徐二郡為宼號青徐賊劉攽曰胡貊守闗案闗當作闕方喻廹近不當云闗升有一言可以解天下倒懸免元元之急不可書𫝊願䝉引見極陳所懐邑雖然其言而竟不用升稱病乞身邑不聽令乘傳使上黨升遂與漢兵㑹因留不還建武二年光武徴詣懐宫拜議郎遷博士上疏讓曰臣與博士梁恭山陽太守吕羌俱脩梁丘易二臣年並耆艾經學深明而臣不以時退與恭並立深知羌學又不能逹逹進也慙負二老無顔於世誦而不行知而不言不可開口以為人師願推博士以避恭羌帝不許然由是重之數詔引見每有大議輒見訪問時尚書令韓歆上疏欲為費氏易左氏春秋立博士費直字長翁善易長於卦筮見前書詔下其議四年正月朝公卿大夫博士見於雲臺帝曰范博士可前平說升起對曰左氏不祖孔子而出於丘明師徒相傳又無其人且非先帝所存無因得立遂與韓歆及太中大夫許淑等互相辯難日中乃罷升退而奏曰臣聞主不稽古無以承天臣不述舊無以奉君陛下愍學微缺勞心經蓺情存博聞故異端競進近有司請置京氏易博士羣下執事莫能據正京氏既立費氏怨望左氏春秋復以比類亦希置立京費已行次復髙氏沛人髙相善易與費直同時見前書春秋之家又有騶夹前書曰騶氏無師夹氏未知其書也如令左氏費氏得置博士髙氏騶夹五經竒異並復求立各有所執乖戾分争從之則失道不從則失人將恐陛下必有厭倦之聽孔子曰博學約之弗叛矣夫論語孔子之言弗畔言不違道也夫學而不約必叛道也顔淵曰博我以文約我以禮孔子可謂知敎顔淵可謂善學矣老子曰學道日損損猶約也又曰絶學無憂絶末學也今費左二學無有本師而多反異先帝前世有疑於此故京氏雖立輒復見廢疑道不可由疑事不可行詩書之作其来已久孔子尚周流㳺觀至于知命自衛反魯乃正雅頌孔子以魯哀公十一年自衛還魯是時道衰樂廢孔子来還乃正之故雅頌各得其所見史記今陛下草創天下紀綱未定雖設學官無有弟子詩書不講禮樂不脩奏立左費非政急務孔子曰攻乎異端斯害也已攻猶習也異端謂竒技也傳曰聞疑傳疑聞信傳信而堯舜之道存榖梁傳曰信以傳信疑以傳疑公羊傳曰君子曷為春秋樂堯舜之道也願陛下疑先帝之所疑信先帝之所信以示反本明不専已天下之事所以異者以不一本也易曰天下之動貞夫一也易下繫之文也又曰正其本萬事理今易無此文也五經之本自孔子始謹奏左氏之失凡十四事時難者以太史公多引左氏升又上太史公違戾五經謬孔子言及左氏春秋不可録三十一事詔以下博士後升為出妻所告坐繫得出還鄉里永平中為聊城令坐事免卒於家陳元傳陳元字長孫蒼梧廣信人也廣信故城在今梧州蒼梧縣父欽習左氏春秋事黎陽賈護與劉歆同時而别自名家元父欽字子佚以左氏授王莽自名陳氏春秋故曰别也賈護字季君並見前書也王莽從欽受左氏學以欽為猒難將軍猒一葉反元少傳父業為之訓詁銳精覃思至不與鄉里通以父任為郎建武初元與桓譚杜林鄭興俱為學者所宗時議欲立左氏傳博士范升奏以為左氏淺末不宜立元聞之乃詣闕上疏曰陛下撥亂反正文武並用撥理也語見公羊傳深愍經蓺謬雜真偽錯亂每臨朝日輒延羣臣講論聖道知丘明至賢親受孔子而公羊榖梁傳聞於後世故詔立左氏博詢可否示不専已盡之羣下也今論者沉溺所習翫守舊聞固執虚言傳受之辭以非親見實事之道左氏孤學少與與猶黨也遂為異家之所覆冒夫至音不合衆聽故伯牙絶弦伯牙善鼓琴鍾子期善聽相與為友子期死伯牙破琴絶弦不復鼓琴以時人莫之能聽也見呂覽至寳不同衆好故卞和泣血卞和得寳玉獻楚武王王示玉人曰石也刖其右足武王殁後復獻之文王復曰石也刖其左足至成王時卞和抱其璞於郊泣盡以血繼之王乃使玉尹攻之果得寳玉事見韓子也仲尼聖徳而不容於世仲尼去魯斥齊逐乎宋衛困于陳蔡之間見史記况於竹帛餘文其為雷同者所排固其宜也非陛下至明孰能察之臣元竊見博士范升等所議奏左氏春秋不可立及太史公違戾凡四十五事案升等所言前後相違皆斷截小文媟黷微辭以年數小差掇為巨謬媟狎也黷垢濁也掇拾也音丁括反遺脫纖微指為大尤抉瑕擿釁抉音於決反掩其𢎞美所謂小辯破言小言破道者也大戴記小辯篇孔子曰小辯破言小言破義小義破道升等又曰先帝不以左氏為經故不置博士後主所宜因襲臣愚以為若先帝所行而後主必行者則盤庚不當遷於殷周公不當營洛邑盤庚都耿遷於殷文王都酆武王都鄗周公輔成王營洛邑陛下不當都山東也往者孝武皇帝好公羊衛太子好榖梁有詔詔太子受公羊不得受榖梁劉攽曰有詔詔太子案文多一詔字孝宣皇帝在人間時聞衛太子好榖梁於是獨學之及即位為石渠論而榖梁氏興石渠閣以蔵秘書在未央殿北宣帝甘露三年詔諸儒韋元成梁丘賀等講論五經於石渠也至今與公羊並存此先帝後帝各有所立不必其相因也孔子曰純儉吾從衆至於拜下則違之論語孔子曰麻冕禮也今也純儉吾從衆拜下禮也今拜乎上泰也雖違衆吾從下何晏注云麻冕緇布冠也古績麻三十升以為之純絲也絲易成故從儉臣之與君行禮者下拜然後升時臣驕泰故于上拜今從下禮之恭也夫明者獨見不惑於朱紫聽者獨聞不謬於清濁故離朱不為巧眩移目離朱黄帝時明目者也一號離婁慎子曰離朱之明察毫末於百歩之外師曠不為新聲易耳桓譚新論曰晉師曠善知音衛靈公將之晉宿於濮水之上夜聞新聲召師涓告之曰為我聽寫之曰臣得之矣遂之晉晉平公饗之酒酣靈公曰有新聲願奏之乃令師涓鼓琴未終師曠止之曰此亾國之聲也方今干戈少弭戎事略戢留思聖蓺眷顧儒雅採孔子下拜之義卒淵聖獨見之㫖分明黑白建立左氏觧釋先聖之積結洮汰學者之累惑洮汰猶洗濯也使基業垂於萬世後進無復狐疑則天下幸甚臣元愚鄙嘗傳師言如得以褐衣召見俯伏庭下褐織毛為布貧者之服也誦孔氏之正道理丘明之宿寃若辭不合經事不稽古退就重誅雖死之日生之年也書奏下其議范升復與元相辯難凡十餘上帝卒立左氏學太常選博士四人元為第一帝以元新忿争乃用其次司隸從事李封於是諸儒以左氏之立論議讙譁自公卿以下數廷争之㑹封病卒左氏復廢元以才髙著名辟司空李通府時大司農江馮上言宜令司隸校尉督察三公事下三府元上疏曰臣聞師臣者帝賓臣者霸言以臣為師以臣為賓也故武王以太公為師齊桓以夷吾為仲父孔子曰百官總已聽於冢宰論語文也近則髙帝優相國之禮蕭何為相國髙帝賜劔履上殿入朝不趨太宗假宰輔之權太宗孝文也申屠嘉為丞相坐府召太中大夫鄧通欲誅之孝文使持節召通令人謝嘉故曰假權也及亡新王莽遭漢中衰專操國柄以偷天下偷竊也況已自喻不信羣臣奪公輔之任損宰相之威以刺舉為明徼訐為直至乃陪僕告其君長子弟變其父兄王莽時開吏告其將奴婢告其主罔密法峻大臣無所措手足然不能禁董忠之謀身為世戮董忠為王莽大司馬共劉歆等謀誅莽事發覺死也故人君患在自驕不患驕臣失在自任不在任人是以文王有日昃之勞周公執吐握之恭尚書曰文王自朝至于曰中昃不遑暇食史記曰伯禽封魯周公戒之曰我文王之子武王之弟成王之叔父亦不賤矣我一沐三握髮一飯三吐哺以待士猶恐失天下之賢人汝無以國驕人也不聞其崇刺舉務督察也方今四方尚擾天下未一百姓觀聽咸張耳目陛下宜脩文武之聖典襲祖宗之遺徳勞心下士屈節待賢誠不宜使有司察公輔之名帝從之宣下其議司察猶督察也李通罷元後復辟司徒歐陽歙府數陳當世便事郊廟之禮帝不能用以病去年老卒於家子堅卿有文章賈逵傳賈逵字景伯扶風平陵人也九世祖誼文帝時為梁王太傅為文帝子梁王楫之博也曾祖父光為常山太守宣帝時以吏二千石自洛陽徙焉父徽從劉歆受左氏春秋兼習國語周官又受古文尚書於塗惲風俗通曰塗姓塗山氏之後惲字子真受尚書於胡常見前書學毛詩於謝曼卿作左氏條例二十一篇逵悉傳父業弱冠能誦左氏傳及五經本文以大夏侯尚書敎授雖為古學兼通五家榖梁之說五家謂尹更始劉向周慶丁姓王彦等皆為榖梁見前書也自為兒童常在太學不通人間事身長八尺二寸諸儒為之語曰問事不休賈長頭性愷悌多智思俶儻有大節愷樂也悌易也言有和樂簡易之徳也俶儻卓異也尤明左氏傳國語為之觧詁五十一篇左氏三十篇國語二十一篇也永平中上疏獻之顯宗重其書寫蔵祕館時有神雀集宫殿官府冠羽有五采色帝異之以問臨邑侯劉復臨邑東郡縣也復齊武王伯升孫北海王興子復不能對薦逵博物多識帝乃召見逵問之對曰昔武王終父之業鸑鷟在岐鸑鷟鳯之别名也周大夫内史過對周惠王曰周之興也鸑鷟鳴于岐山事見國語宣帝威懐戎狄神雀仍集此胡降之徴也仍頻也宣帝時神雀再見改為年號後匈奴降服呼韓入朝也帝勑蘭臺給筆札使作神雀頌拜為郎與班固並校祕書應對左右肅宗立降意儒術特好古文尚書左氏傳建初元年詔逵入講北宫白虎觀南宫雲臺帝善逵說使出左氏傳大義長於二傳者逵於是具條奏之曰臣謹擿出左氏三十事尤著明者斯皆君臣之正義父子之紀綱其餘同公羊者什有七八或文簡小異無害大體至如祭仲紀季伍子胥叔術之屬左氏義深於君父公羊多任於權變左傳宋人執鄭祭仲曰不立突將死祭仲許之遂出昭公而立厲公杜預注云祭仲之如宋非㑹非聘見誘被拘廢長立少故書名罪之公羊傳曰祭仲者何鄭之相也何以不名賢也何賢乎祭仲以為知權也其知權奈何宋人執之謂之曰為我出忽而立突祭仲不從其言則君必死國必亾從其言則君可以生易死國可以存易亡古之有權者祭仲之權是也左傳紀季以酅入于齊紀侯大去其國賈逵以為紀季不能兄弟同心以存國乃背兄歸讐書以譏之公羊傳曰紀季者何紀侯之弟也何以不名賢也何賢乎服罪也其服罪奈何請後立廟以存姑姊妹左傳楚平王將殺伍奢召伍奢子伍尚伍員曰来吾免而父尚謂員曰聞免父之命不可以莫之奔親戚為戮不可以莫之報父不可棄名不可廢子胥奔吳遂以吳師入郢卒復父讐公羊傳曰父受誅子復讐推刄之道也公羊不許子胥復讐是不深父也左傳曰冬邾黑肱以濫来奔賤而書名重地故也君子曰名之不可不慎以地叛雖賤必書地以名其人終為不義不可滅已是以君子動則思禮行則思義公羊傳冬黑弓以濫来奔文何以無邾婁通濫也曷為通濫賢者子孫宜有地賢者孰謂謂叔術也何賢乎叔術讓國也其相殊絶固已甚逺而寃抑積久莫肯分明臣以永平中上言左氏與圖讖合者先帝不遺芻蕘省納臣言寫其傳詁蔵之秘書建平中建平哀帝年也侍中劉歆欲立左氏不先暴論大義而輕移太常恃其義長詆挫諸儒諸儒内懐不服相與排之排擯却也劉歆建立左氏哀帝令歆與諸儒講論其義諸博士不肯置對歆乃移書太常以責之故被排擯事見前書孝哀皇帝重逆衆心故出歆為河内太守從是攻擊左氏遂為重讎至光武皇帝奮獨見之明興立左氏榖梁㑹二家先師不曉圖讖故令中道而廢凡所以存先王之道者要在安上理民也今左氏崇君父卑臣子疆幹弱枝勸善戒惡至明至切至直至順左傳曰翼戴天子加之以恭又曰君命天也天可讎乎委質䇿名貳乃辟也父敎子貳何以事君又曰棄父之命惡用子矣以有無父之國則可是崇君父卑臣子也左氏王人雖微序在諸侯之上又曰五大不在邊五細不在庭末大必折尾大不掉是彊幹弱枝也又曰盡而不汚懲惡而勸善非聖人誰能脩之史記曰孔子曰我欲載之空言不如見之行事深切著明也且三代異物損益隨時故先帝博觀異家各有所採易有施孟復立梁丘施讎孟喜梁丘賀也尚書歐陽復有大小夏侯歐陽和伯大夏侯勝小夏侯建也並見前書今三傳之異亦猶是也又五經家皆無以證圖讖明劉氏為堯後者而左氏獨有明文春秋晉大夫蔡墨曰陶唐氏既衰其後有劉累學擾龍事孔甲范氏其後也范㑹自秦還晉其處者為劉氏明漢承堯後也五經家皆言顓頊代黄帝而堯不得為火徳史記曰黄帝崩其孫昌意之子立是為帝顓頊當時五經家同為此說若以顓頊代黄帝以土徳王即顓頊當為金徳髙辛為水徳堯為木徳漢承堯後自然不得為火徳也左氏以為少昊代黄帝即圖讖所謂帝宣也左氏傳曰黄帝氏以雲紀少昊氏以鳥紀是以少昊代黄帝也河圖曰大星如虹下流華渚女節意感生白帝朱宣宋均注曰朱宣少昊氏也如令堯不得為火則漢不得為赤其所發明補益實多陛下通天然之明建大聖之本改元正歴垂萬世則改元謂改建初九年為元和元年正歴謂元和二年始用四分歴也是以麟鳯百數嘉瑞雜遝雜遝言多也章帝時鳯皇見百三十九麒麟五十二白虎一十九黄龍三十四神雀白燕等史官不可勝紀見東觀記猶朝夕恪勤㳺情六蓺研機綜微靡不審覈覈實也若復留意廢學以廣聖見庶㡬無所遺失矣廢學謂左氏傳也書奏帝嘉之賜布五百疋衣一襲令逵自選公羊嚴顔諸生髙才者二十人敎以左氏公羊髙作春秋傳號曰公羊春秋嚴彭祖顔安樂俱受公羊春秋故公羊有嚴顔之學見前書與簡紙經傳各一通竹簡及紙也逵母常有疾帝欲加賜以校書例多特以錢二十萬使潁陽侯馬防與之謂防曰賈逵母病此子無人事於外無人事謂不廣交通也屢空則從孤竹之子於首陽山矣屢數也空乏也史記曰伯夷叔齊孤竹君之子也隐於首陽山卒餓死也逵數為帝言古文尚書與經傳爾雅詁訓相應詔令撰歐陽大小夏侯尚書古文同異逵集為三卷帝善之復令撰齊魯韓詩與毛氏異同并作周官觧故轅固齊人也為齊詩申公魯人也為魯詩韓嬰為韓詩毛萇為毛詩故謂事之指意也遷逵為衛士令北宫衛士令一人掌南北宫秩比六百石見續漢志八年乃詔諸儒各選髙才生受左氏榖梁春秋古文尚書毛詩由是四經遂行於世皆拜逵所選弟子及門生為千乘王國郎千乘王伉章帝子也朝夕受業黄門署學者皆欣欣羡慕焉和帝即位永元三年以逵為左中郎將八年復為侍中領騎都尉内備帷幄兼領祕書近署甚見信用逵薦東莱司馬均陳國汝郁帝即徴之並蒙優禮均字少賓安貧好學隠居敎授不應辟命信誠行乎州里鄉人有所計争輒令祝少賓祝詛也東觀記曰争曲直者輒言敢祝少賓乎心不直者終不敢祝也不直者終無敢言位至侍中以老病乞身帝賜以大夫禄歸鄊里郁字叔異性仁孝東觀記曰郁年五嵗母病不能食郁常抱持啼泣亦不食母憐之强為飯宗親共異之因字曰異也及親殁遂隐處山澤後累遷為魯相以徳敎化百姓稱之流人歸者八九千戸逵所著經傳義詁及論難百餘萬言又作詩頌誄書連珠酒令凡九篇學者宗之後世稱為通儒應劭風俗通義曰授先王之制立當時之事綱紀國體原本要化此通儒也然不脩小節當世以此頗譏焉故不至大官永元十三年卒時年七十二朝廷愍惜除兩子為太子舍人論曰鄭賈之學行乎數百年中遂為諸儒宗亦徒有以焉爾言賈鄭雖為儒宗而不為帝所重故曰亦徒有以焉爾桓譚以不善讖流亡鄭興以遜辭僅免賈逵能附㑹文致最差貴顯賈逵附㑹文致謂引左氏明漢為堯後也世主以此論學悲矣哉言時主不重經而重讖也張霸傳子楷楷子陵陵弟𤣥張霸字伯饒蜀郡成都人也年數嵗而知孝讓雖出入飲食自然合禮鄊人號為張曾子七嵗通春秋復欲進餘經父母曰汝小未能也霸曰我饒為之故字曰饒焉饒猶益也後就長水校尉樊儵受嚴氏公羊春秋遂博覽五經諸生孫林劉固叚著等慕之各市宅其傍以就學焉舉孝廉光禄主事稍遷光禄勲之主事也見漢官儀永元中為㑹稽太守表用郡人處士顧奉公孫松等奉後為潁川太守松為司𨽻校尉並有名稱其餘有業行者皆見擢用郡中争厲志節習經者以千數道路但聞誦聲初霸以樊儵刪嚴氏春秋猶多繁辭乃減定為二十萬言更名張氏學霸始到越賊未觧郡界不寧乃移書開購明用信賞賊遂束手歸附不煩士卒之力童謡曰棄我㦸捐我矛盗賊盡吏皆休視事三年謂掾史曰太守起自孤生致位郡守盖日中則移月滿則虧史記蔡澤之辭也易豐卦曰日中則昃月盈則食也老子有言知足不辱遂上病後徴四遷為侍中時皇后兄虎賁中郎將鄧隲當朝貴盛聞霸名行欲與為交霸逡廵不答衆人笑其不識時務後當為五更㑹疾卒年七十遺勑諸子曰昔延州使齊子死嬴博因坎路側遂以塟焉嬴博二縣名屬泰山郡禮記曰延陵季子適齊其長子死於嬴博之間因塟焉今蜀道阻逺不宜歸塋可止此塟足蔵髪齒而已務遵速朽副我本心人生一世但當畏敬於人若不善加已直為受之諸子承命塟於河南梁縣因遂家焉將作大匠翟酺等與諸門人追録本行諡曰憲文中子楷楷字公超通嚴氏春秋古文尚書門徒常百人賓客慕之自父黨夙儒偕造門焉車馬填街徒從無所止黄門及貴戚之家皆起舍巷次以候過客往来之利楷疾其如此輒徙避之家貧無以為業常乘驢車至縣賣藥足給食者輒還鄉里司隷舉茂才除長陵令不至官隐居𢎞農山中學者随之所居成市後華隂山南遂有公超市五府連辟舉賢良方正不就五府太傅太尉司徒司空大將軍也漢安元年順帝特下詔告河南尹曰故長陵令張楷行慕原憲操擬夷齊原憲魯人字子思孔子弟子清約守節貧而樂道輕貴樂賤竄跡幽藪髙志確然獨拔羣俗前此徴命盤桓未至將主者翫習於常優賢不足使其難進歟郡時以禮發遣楷復告疾不到性好道術能作五里霧時闗西人裴優亦能為三里霧自以不如楷從學之楷避不肯見桓帝即位優遂行霧作賊事覺被考引楷言從學術楷坐繫廷尉詔獄積二年恒諷誦經籍作尚書注後以事無騐見原還家建和三年詔安車備禮聘之辭以篤疾不行年七十終於家子陵陵字處冲官至尚書元嘉中嵗首朝賀大將軍梁冀帶劔入省陵呵叱之令出勑羽林虎賁奪冀劔冀跪謝陵不應即劾奏冀請廷尉論罪有詔以一嵗俸贖而百寮肅然初冀弟不疑為河南尹舉陵孝廉不疑疾陵之奏冀因謂曰昔舉君適所以自罰也陵對曰明府不以陵不肖誤見擢序今申公憲以報私恩不疑有愧色陵弟𤣥𤣥字處虚沉深有才畧以時亂不仕司空張温數以禮辟不能致中平二年温以車騎將軍出征涼州賊邊章等將行𤣥自田廬被褐帶索要說温曰天下冦賊雲起豈不以黄門常侍無道故乎聞中貴人公卿以下當出祖道於平樂觀明公總天下威重握六師之要若於中坐酒酣鳴金鼓整行陣召軍正執有罪者誅之引兵還屯都亭以次翦除中官觧天下之倒懸報海内之怨毒然後顯用隐逸忠正之士則邊章之徒宛轉股掌之上矣温聞大震不能對良久謂𤣥曰處虚非不恱子之言顧吾不能行如何𤣥乃歎曰事行則為福不行則為賊今與公長辭矣即仰藥欲飲之温前執其手曰子忠於我我不能用是吾罪也子何為當然且出口入耳之言誰今知之左傳曰言出於余口入於爾耳𤣥遂去隐居魯陽山中山在今汝州南及董卓秉政聞之辟以為掾舉侍御史不就卓臨之以兵不得已彊起至輪氏道病終輪氏縣屬潁川郡故城在今洛州洛陽縣城西南賛曰中世儒門賈鄭名學衆馳一介争禮氊幄一介單使也左傳曰君亦不使一介行李告於寡君氊幄謂匈奴也升元守經義偏情駮霸貴知止辭交戚里公超善術所舍成市後漢書卷六十六後漢書卷六十六考證鄭興傳一朝建號而山西雄桀争誅王莽注山西謂陕山已西也日知録曰古之所謂山西即今闗中方言自山而東五國之郊郭璞觧曰六國惟秦在山西王伯厚地理通釋曰秦漢之間稱山北山南山東山西者皆指太行以其在天下之中故指此山以表地勢正義以為華山之西非也范升傳遂與韓歆及太中大夫許淑等監本舊本俱缺太字臣㑹汾按前書百官公卿表大夫掌議論有太中大夫諫大夫武帝太初元年更名中大夫為光禄大夫秩比二千石劉昭百官志太中大夫千石無員屬光禄勲别無中大夫之名又按北海靖王傳云嵗終遣中大夫奉璧朝賀注中大夫王國官也引續漢志曰中大夫比六百石掌奉王使京都亦見東平王蒼傳然則兩漢官制固有不同太初以前王朝有中大夫在東京則為王府官屬之名矣今范升所與論難未必徧及王國使臣故毛本增太字正其本萬事理注今易無此文也臣㑹汾按此必易緯之辭凡漢人說經所引緯書若春秋元命苞等則曰春秋說易乾鑿度等則曰易說尚書大傳等則曰尚書說今范升引易緯遂蒙上易曰為文注家於易本文中求之固無此文耳賈逵傳帝善逵說使出左氏傳大義長於二傳者監本出字上有發字臣㑹汾按發出並舉古人無此等文今從宋本并作周官觧故注故謂事之指意也臣人龍按前書賈誼為左氏傳訓故又藝文志有魯故二十五卷師古注曰故者通其指義也今流俗毛詩改故訓傳為詁字失真則此注自應作故字觧鄉人有所計争輒令祝少賓注祝詛也東觀記曰争曲直者輒言敢祝少賓乎日知録曰注非也言敢于少賓之前發誓乎事之如神明也古人文簡爾賈逵能附㑹文致最差貴顯閻若璩云隋志讖緯篇云賈逵之徒獨非之與此不合盖隋志不詳考傳中所奏而誤讀張衡疏内侍中賈逵摘讖互異三十餘事諸言䜟者皆不能說之文以為逵首非䜟不知逵苐摘其互異處並未有所非也後漢書卷六十六考證
