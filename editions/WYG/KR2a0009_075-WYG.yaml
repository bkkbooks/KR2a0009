body:
  text: 後漢書卷七十五宋宣城太守范煜撰唐章懐太子賢注袁張韓周列傳第三十五袁安傳子敞𤣥孫閎袁安字邵公汝南汝陽人也祖父良習孟氏易孟喜字長卿東海人眀易為丞相掾見前書平帝時舉明經為太子舍人續漢志曰太子舍人秩比二百石無員建武初至成武令成武今曹州縣安少傳良學為人嚴重有威見敬於州里初為縣功曹續漢志曰縣功曹史主選署功勞奉檄詣從事從事因安致書於令續漢志曰每州刺史皆有從事史安曰公事自有郵驛私請則非功曹所持辭不肯受從事懼然而止懼音九具反後舉孝亷汝南先賢傳曰時大雪積地丈餘洛陽令自出案行見人家皆除雪出有乞食者至袁安門無有行路謂安已死令人除雪入戸見安僵臥問何以不出安曰大雪人皆餓不宜千人令以為賢舉為孝亷也除隂平長任城令隂平縣故城在今沂州承縣西南任城今兖州縣也所在吏人畏而愛之永平十三年楚王英謀為逆事下郡覆考眀年三府舉安能理劇拜楚郡太守是時英辭所連及繫者數千人顯宗怒甚吏案之急迫痛自誣死者甚衆安到郡不入府先往案獄理其無眀驗者條上出之府丞掾史皆叩頭爭以為阿附反虜法與同罪不可安曰如有不合太守自當坐之不以相及也遂分别具奏帝感悟即報許得出者四百餘家嵗餘徵為河南尹政號嚴明然未嘗以臧罪鞫人常稱曰凡學仕者髙則望宰相下則希牧守錮人於聖世尹所不忍為也聞之者皆感激自勵在職十年京師肅然名重朝廷建初八年遷太僕元和二年武威太守孟雲上書北虜既已和親而南部復往抄掠北單于謂漢欺之謀欲犯邊宜還其生口以安慰之詔百官議朝堂公卿皆言夷狄譎詐求欲無厭譎亦詐也既得生口當復妄自誇大不可開許安獨曰北虜遣使奉獻和親有得邊生口者輙以歸漢此明其畏威而非先違約也雲以大臣典邊不宜負信於戎狄還之足示中國優貸而使邊人得安誠便司徒桓虞改議從安太尉鄭𢎞司空第五倫皆恨之𢎞因大言激勵虞曰諸言當還生口者皆為不忠虞廷叱之倫及大鴻臚韋彪各作色變容司隸校尉舉奏安等皆上印綬謝肅宗詔報曰久議沈滯各有所志蓋事以議從策由衆定誾誾衎衎得禮之容誾誾忠正貌衎衎和樂貌寢嘿抑心更非朝廷之福君何尤而深謝其各冠履帝竟從安議明年代第五倫為司空章和元年代桓虞為司徒和帝即位竇太后臨朝后兄車騎將軍憲北擊匈奴安與太尉宋由司空任隗及九卿詣朝堂上書諫以為匈奴不犯邊塞而無故勞師逺渉損費國用徼功萬里非社稷之計書連上輙寢宋由懼遂不敢復署議而諸卿稍自引止唯安獨與任隗守正不移至免冠朝堂固爭者十上太后不聽衆皆為之危懼安正色自若竇憲既出而弟衞尉篤執金吾景各專威權公於京師使客遮道奪人財物景又擅使乘驛施檄緣邊諸郡發突騎及善騎射有才力者漁陽鴈門上谷三郡各遣吏將送詣景第有司畏憚莫敢言者安乃劾景擅發邊兵驚惑吏人二千石不待符信而輙承景檄當伏顯誅又奏司隸校尉河南尹阿附貴戚無盡節之義續漢書曰安奏司隸鄭㩀河南尹蔡嵩請免官案罪並寢不報憲景等日益横盡樹其親黨賓客於名都大郡袁山松書曰河南尹王調漢陽太守朱敞南陽太守滿殷高丹等皆其賓客前書曰十二萬戸為大郡也皆賦斂吏人更相賂遺其餘州郡亦復望風從之安與任隗舉奏諸二千石又它所連及貶秩免官者四十餘人竇氏大恨但安隗素行高亦未有以害之時竇憲復出屯武威眀年北單于為耿䕫所破遁走烏孫塞北地空餘部不知所屬憲日矜已功欲結恩北虜乃上立降者左鹿蠡王阿佟徒冬反為北單于置中郎將領護如南單于故事事下公卿議太尉宋由太常丁鴻光祿勲耿秉等十人議可許安與任隗奏以為光武招懐南虜非謂可永安内地正以權時之算可得扞禦北狄故也今朔漠既定宜令南單于反其北庭並領降衆無緣復更立阿佟以増國費宗正劉方大司農尹睦同安議事奏未以時定安懼憲計遂行乃獨上封事曰臣聞功有難圖不可豫見事有易斷較然不疑伏惟光武皇帝本所以立南單于者欲安南定北之策也恩徳甚備故匈奴遂分邊境無患孝明皇帝奉承先意不敢失墜赫然命將爰伐塞北至于章和之初降者十萬餘人議者欲置之濱塞東至遼東濱邊也太尉宋由光祿勲耿秉皆以為失南單于心不可先帝從之陛下奉承鴻業大開疆宇大將軍遠師討伐席卷北庭此誠宣明祖宗崇立𢎞勲者也宜審其終以成厥初伏念南單于屯先父舉衆歸徳自䝉恩以來四十餘年三帝積累以遺陛下陛下深宜遵述先志成就其業況屯首唱大謀空盡北虜輟而弗圖更立新降以一朝之計違三世之規失信於所養建立於無功由秉實知舊議而欲背棄先恩夫言行君子之樞機易曰言行者君子之樞機樞機之發榮辱之主也賞罰理國之綱紀論語曰言忠信行篤敬雖蠻貊行焉今若失信於一屯則百蠻不敢復保誓矣又烏桓鮮卑新殺北單于凡人之情咸畏仇讐今立其弟則二虜懐怨兵食可廢信不可去論語孔子曰足食足兵人信之矣必不得已而去於斯三者何先曰去兵曰必不得已而去於斯二者何先曰去食自古皆有死人無信不立且漢故事供給南單于費直嵗億九十餘萬西域嵗七千四百八十萬今北庭彌遠其費過倍是乃空盡天下而非建策之要也詔下其議安又與憲更相難折憲險急負埶言辭驕訐訐謂發揚人之惡至詆毁安稱光武誅韓歆戴渉故事安終不移大司徒歆坐非帝讀隗囂書自殺大司徒渉坐殺太倉令下獄死憲竟立匈奴降者右鹿蠡王於除鞬為單于鞬音九言反後遂反叛卒如安策安以天子㓜弱外戚擅權每朝會進見及與公卿言國家事未嘗不噫嗚流涕噫音醫又乙戒反嗚音一故反歎傷之貌也自天子及大臣皆恃頼之四年春薨朝廷痛惜焉後數月竇氏敗帝始親萬機追思前議者邪正之節乃除安子賞為郎策免宋由以尹睦為太尉劉方為司空睦河南人薨於位方平原人後坐事免歸自殺初安父没母使安訪求葬地道逢三書生問安何之安為言其故生乃指一處云葬此地當世為上公湏㬰不見安異之於是遂葬其所占之地故累世隆盛焉安子京敞最知名京字仲譽習孟氏易作難記三十萬言初拜郎中稍遷侍中出為蜀郡太守子彭字伯楚少傳父業歷廣漢南陽太守順帝初為光禄勲行至清為吏麤􅂁糲食終於議郎尚書胡廣等追表其有清絜之羙比前朝貢禹第五倫貢禹元帝御史大夫經明行修清絜憂國也未䝉顯贈當時皆嗟歎之彭弟湯字仲河少傳家學諸儒稱其節多歴顯位桓帝初為司空以豫議定策封安國亭侯食邑五百戸累遷司徒太尉以災異䇿免卒諡曰康侯風俗通曰湯時年八十六有子十二人湯長子成左中郎早卒次子逢嗣逢字周陽以累世三公子寛厚篤信著稱於時靈帝立逢以太僕豫議増封三百戸後為司空卒於執金吾朝廷以逢嘗為三老特優禮之賜以珠畫特詔祕器前書曰董賢死以砂畫棺音義云以朱砂畫之也珠與朱同祕器棺也飯含珠玉二十六品穀梁傳曰貝玉曰含使五官中郎將持節奉策贈以車騎將軍印綬加號特進諡曰宣文侯子基嗣位至太僕逢弟隗少歴顯官隗字次陽先逢為三公時中常侍袁赦隗之宗也用事於中以逢隗世宰相家推崇以為外援故袁氏貴寵於世富奢甚不與它公族同獻帝初隗為太傅成子紹逢子術自有傳董卓忿紹術背已遂誅隗及術兄基等男女二十餘人敞字叔平少傳易經教授以父任為太子舍人和帝時歴位將軍大夫侍中出為東郡太守徵拜太僕光禄勲元初三年代劉愷為司空明年坐子與尚書郎張俊交通漏洩省中語策免敞亷勁不阿權貴失鄧氏㫖遂自殺張俊者蜀郡人有才能兄龕竝為尚書郎年少勵鋒氣郎朱濟丁盛立行不修俊欲舉奏之二人聞恐因郎陳重雷義往請俊俊不聽因共私賂侍史使求俊短得其私書與敞子遂封上之皆下獄當死俊自獄中占獄吏上書自訟占謂口授也前書曰陳遵憑几口占書吏是也書奏而俊獄已報謂奏報論死也廷尉將出榖門臨行刑穀門洛陽城北面中門也鄧太后詔馳騎以減死論俊假名上書謝曰臣孤恩負義自䧟重刑情斷意訖無所復望廷尉鞠遣歐音一口反刀在前棺絮在後魂魄飛揚形容已枯陛下聖澤以臣嘗在近密謂為尚書郎識臣狀貌傷臣眼目留心曲慮特加徧覆喪車復還白骨更肉披棺發槨起見白日天地父母能生臣俊不能使臣俊當死復生陛下徳過天地恩重父母誠非臣俊破碎骸骨舉宗腐爛所報萬一臣俊徒也不得上書不勝去死就生驚喜踊躍觸冒拜章當時皆哀其文朝廷由此薄敞罪而隠其死以三公禮葬之復其官子盱況于反盱後至光禄勲時大將軍梁冀擅朝内外莫不阿附唯盱與廷尉邯鄲義正身自守及桓帝誅冀使盱持節收其印綬事已具梁冀傳閎字夏甫彭之孫也少勵操行苦身修節父賀為彭城相風俗通曰賀字元服祖父京為侍中安帝始加元服百僚會賀臨莊垂出而孫適生喜其嘉㑹因名字焉閎往省謁變名姓徒行無旅既至府門連日吏不為通會阿母出見閎驚謝承書曰乳母從内出見在門側面貌省瘐為其垂泣閎厚丁寧此間不知吾愼勿宣露也入白夫人乃密呼見既而辭去賀遣車送之閎稱眩疾不肯乘反郡界無知者及賀卒郡閎兄弟迎喪不受賻賵縗絰扶柩冒犯寒露體貌枯毁手足血流見者莫不傷之服闋累徵聘舉召皆不應居處側陋以耕學為業從父逢隗竝貴盛數饋之無所受閎見時方險亂而家門富盛常對兄弟歎曰吾先公福祚後世不能以徳守之而競為驕奢與亂世爭權此即晉之三郤矣三郤謂郤錡郤犫郤至皆晉卿也各驕奢為厲公所殺事見左傳延熹末黨事將作閎遂散髪絶世欲投迹深林以母老不宜遠遁乃築土室四周於庭不為戸自牖納飲食而已旦於室中東向拜母母思閎時徃就視母去便自掩閉兄弟妻子莫得見也及母殁不為制服設位時莫能名或以為狂生潛身十八年黄巾賊起攻没郡縣百姓驚散閎誦經不移賊相約語不入其閭鄉人就閎避難皆得全免年五十七卒於土室汝南先賢傳曰閎臨卒敇其子曰勿設殯棺但著禈衫䟽布單衣幅巾襯尸於板牀之上以五百墼為藏二弟忠𢎞節操皆亞於閎忠字正甫與同郡范滂為友俱證黨事得釋語在滂傳初平中為沛相沛王琮相也琮光武八代孫也乘葦車到官以清亮稱及天下大亂忠棄官客㑹稽上虞縣名城在今越州餘姚縣西一見太守王朗徒從整飾心嫌之遂稱病自絶王朗字景興肅之父也魏志有傳謝承書曰忠乘船載笠蓋詣朗見朗左右僮從皆着青綘采衣非其奢麗即辭疾發而退也後孫策破㑹稽忠等浮海南投交阯獻帝都許徵為衞尉未到卒𢎞字邵甫耻其門族貴埶乃變姓名徒歩師門不應徵辟終於家謝承書曰𢎞嘗入京師太學其從父逢為太尉呼𢎞與相見遇逢宴會作樂𢎞伏稱頭痛不聽音聲而退遂不復往紹術兄弟亦不與通忠子祕為郡門下議生黄巾起祕從太守趙謙擊之軍敗祕與功曹封觀等七人以身扞刃皆死於陳謙以得免詔祕等門閭號曰七賢謝承書曰祕字永寜封觀與主簿陳端門下督范仲禮賊曹劉偉徳主記史丁子嗣記室史張仲然議生袁祕等七人擢刃突陳與戰並死也封觀者有志節當舉孝亷以兄名位未顯耻先受之遂稱風疾喑不能言火起觀屋徐出避之忍而不告後數年兄得舉觀乃稱損而仕郡焉謝承書曰觀字孝起南頓人也論曰陳平多隂謀而知其後必廢丞相陳平為高祖謀臣出六竒歎曰我多隂謀道家之所禁吾世即廢以吾多隂謀禍也其後曽孫掌以衞氏親戚貴逹願得續封而終不得也邴吉有隂徳夏侯勝識其當封及子孫武帝末戾太子巫蠱事起邴吉為廷尉監時宣帝年二嵗坐太子事繫望氣者言長安獄中有天子氣於是上遣使者分條中都官詔獄繫者亡輕重一切皆殺之内者令郭穰至郡邸獄吉閉門扞拒曰它人無辜猶不可況親曽孫乎穰不得入還以聞上曰天使之也因大赦天下曽孫賴吉得立宣帝立吉為丞相未及封而病上憂吉不起夏侯勝曰此未死也臣聞有隂徳者必饗其樂以及子孫後吉病愈封博陽侯薨子顯嗣甘露中削爵為闗内侯至孫昌復封博陽侯傳子至孫王莽敗乃絶劉攽曰注曽孫頼吉得立案前書立當作全終陳掌不侯而邴昌紹國雖有不類未可致詰其大致歸然矣袁公竇氏之間乃情帝室乃情猶竭情也引義雅正可謂王臣之烈易曰王臣蹇蹇匪躬之故烈業也及其理楚獄未嘗鞠人於臧罪其仁心足以覃乎後昆爾雅曰覃延也子孫之盛不亦宜乎此論竝華嶠之詞也張酺傳張酺字孟侯汝南細陽人趙王張敖之後也敖父耳自楚降漢髙祖封為趙王敖嗣後有罪廢為宣平侯敖子壽封細陽之池陽鄉後廢因家焉酺少從祖父充受尚書能傳其業東觀記曰充與光武同門學光武即位求問充充已死又事太常桓榮勤力不怠聚徒以百數永平九年顯宗為四姓小侯開學於南宮小侯解見明帝紀也置五經師酺以尚書教授數講於御前以論難當意除為郎賜車馬衣裳遂令入授皇太子酺為人質直守經義每侍講間隙數有匡正之辭以嚴見憚東觀記曰太子家時為奢侈物未嘗不正諫甚見重焉及肅宗即位擢酺為侍中虎賁中郎將數月出為東郡太守酺自以嘗經親近未悟見出意不自得悟曉也上疏辭曰臣愚以經術給事左右少不更職不曉文法猥當剖符典郡班政千里必有負恩辱位之咎臣竊私自分殊不慮出城闕冀䝉留恩託備冗官羣僚所不安耳目所聞見不敢避好醜詔報曰經云身雖在外乃心不離王室尚書康王之誥曰雖爾身在外乃心㒺不在王室也典城臨民益所以報效也好醜必上不在逺近好醜為善惡也言事之善惡必以聞上此即報效豈拘外内也今賜裝三十萬其亟之官酺雖儒者而性剛斷下車擢用義勇搏擊豪强長吏有殺盜徒者酺輙案之以為令長受臧猶不至死盜徒皆飢寒傭保何足窮其法乎郡吏王青者謝承書曰青字公然東都聊城人也祖父翁與前太守翟義起兵攻王莽及義敗餘衆悉降翁獨守節力戰莽遂燔燒之父隆建武初為都尉功曹青為小史與父俱從都尉行縣道遇賊隆以身衞全都尉遂死於難青亦被矢貫咽音聲流喝流或作嘶喝音一介反廣蒼曰聲之幽也前郡守以青身有金夷竟不能舉夷傷也酺見之歎息曰豈有一門忠義而爵賞不及乎遂擢用極右曹漢官儀曰督郵功曹郡之極位乃上疏薦青三世死節宜蒙顯異奏下三公由此為司空所辟東觀記曰青從此除步兵司馬酺傷青不遂復舉其子孝亷也自酺出後帝每見諸王師傅嘗言張酺前入侍講屢有諫正誾誾惻惻出於誠心可謂有史魚之風矣誾誾忠正也惻惻懇切也史魚衞大夫名鰌字子魚孔子曰直哉史魚邦有道如矢邦無道如矢也元和二年東廵狩幸東郡引酺及門生并郡縣掾史竝㑹庭中帝先備弟子之儀使酺講尚書一篇然後修君臣之禮東觀記曰時使尚書令王鮪與酺相難上甚欣悦賞賜殊特莫不沾洽酺視事十五年和帝初遷魏郡太守郡人鄭據時為司隸校尉奏免執金吾竇景景後復位遣掾夏猛私謝酺曰鄭據小人為所侵寃聞其兒為吏放縱狼籍取是曹子一人足以驚百酺大怒即收猛繫獄檄言執金吾府疑猛與據子不平矯稱卿意以報私讐㑹有贖罪令猛乃得出東觀記曰據字平卿黎陽人也為侍御史轉司𨽻校尉也頃之徵入為河南尹竇景家人復擊傷市卒吏捕得之景怒遣緹騎侯海等五百人歐傷市丞説文曰緹帛丹黄色也漢官儀曰執金吾有緹騎酺部吏楊章等窮䆒正海罪徙朔方景忿怨乃移書辟章等六人為執金吾吏欲因報之章等惶恐入白酺願自引臧罪以辭景命酺即上言其狀竇太后詔報自今執金吾辟吏皆勿遣及竇氏敗酺乃上疏曰臣實愚憃不及大體鄭𤣥注周禮云憃愚癡騃也憃音陟降反以為竇氏雖伏厥辜而罪刑未著後世不見其事但聞其誅非所以垂示國典貽之將來宜下理官與天下平之平之謂平論其罪也方憲等寵貴羣臣阿附唯恐不及皆言憲受顧命之託懐伊呂之忠臨終之命曰顧命至乃復比鄧夫人於文母臣賢案鄧夫人即穰侯鄧疊母元也元出入宮掖共竇憲女壻郭舉父子同謀殺害與竇氏同誅語在憲傳故張酺論憲兼及其黨稱鄧夫人者猶如前書霍光妻稱霍顯祁太伯母號祁夫人之類也文母文王之妻也詩曰既右烈考亦右文母今嚴威既行皆言當死不復顧其前後考折厥衷臣伏見夏陽侯瓌每存忠善前與臣言常有盡節之心檢敇賓客未嘗犯法臣聞王政骨肉之刑有三宥之義過厚不過薄禮記曰公族有罪獄成有司讞於公曰某之罪在大辟公曰宥之有司又曰在大辟公又曰宥之有司又曰在大辟公又曰宥之及三宥不對走出致刑于甸人公又使人追之曰雖然必宥之有司曰無及也反命於公公素服如其倫之喪也劉攽曰案今禮記文注多下公又曰宥之五字今議者為瓌選嚴能相恐其迫切必不完免宜裁加貸宥以崇厚徳和帝感酺言徙瓌封就國而已永元五年遷酺為太僕數月代尹睦為太尉漢官儀曰睦字伯師河南鞏人也數上疏以疾乞身薦魏郡太守徐防自代帝不許使中黄門問病加以珍羞賜錢三十萬酺遂稱篤時子蕃以郎侍講帝因令小黄門敕蕃曰隂陽不和萬人失所朝廷望公思惟得失與國同心而託病自絜求去重任誰當與吾同憂責者非有望於斷金也斷金解在皇后紀司徒固疾司空年老時司徒劉方司空張奮也公其傴僂勿露所敕傴僂言恭敬從命也左氏傳曰一命而僂再命而傴三命而俯酺惶恐詣闕謝還復視事酺雖在公位而父常居田里酺每有遷職輙一詣京師嘗來候酺適㑹嵗節公卿罷朝俱詣酺府奉酒上壽極歡卒日衆人皆慶羡之及父卒既葬詔遣使齎牛酒為釋服後以事與司隸校尉晏稱會於朝堂酺從容謂稱曰三府辟吏多非其人稱歸即奏令三府各實其掾史酺本以私言不意稱奏之甚懐恨㑹復共謝闕下酺因責讓於稱稱辭語不順酺怒遂廷叱之稱乃劾奏酺有怨言天子以酺先帝師有詔公卿博士朝臣㑹議司徒呂蓋奏酺位居三司知公門有儀不屏氣鞠躬以湏詔命反作色大言怨讓使臣不可以示四遠司隸校尉督大姦猾無所不察故曰使臣也於是策免酺歸里舍謝遣諸生閉門不通賓客左中郎將何敞及言事者多訟酺公忠帝亦雅重之十五年復拜為光禄勲數月代魯恭為司徒月餘薨乘輿縞素臨弔賜冡塋地􅈖贈恩寵異於它相酺病臨危敇其子曰顯節陵埽地露祭欲率天下以儉顯節明帝陵也明帝遺詔無起寢廟故言埽地而祭也故酺遵奉之吾為三公既不能宣揚王化令吏人從制豈可不務節約乎其無起祠堂可作槀蓋廡施祭其下而已廡屋也曽孫濟好儒學華嶠書曰蕃生磐磐生濟濟字元江靈帝初楊賜薦濟明習典訓為侍講光和中至司空病罷及卒靈帝以舊恩贈車騎將軍闗内侯印綬其年追濟侍講有勞封子根為蔡陽鄉侯濟弟喜初平中為司空韓棱傳韓棱字伯師潁川舞陽人弓高侯頽當之後也頽當韓王信之子見前書世為鄉里著姓父尋建武中為隴西太守棱四嵗而孤養母弟以孝友稱及壯推先父餘財數百萬與從昆弟鄉里益高之初為郡功曹太守葛興中風病不能聽政棱隂代興視事出入二年令無違者興子嘗發教欲署吏棱拒執不從因令怨者章之章謂令上章告言之事下案驗吏以棱掩蔽興病專典郡職遂致禁錮顯宗知其忠後詔特原之由是徵辟五遷為尚書令與僕射郅壽尚書陳寵同時俱以才能稱肅宗嘗賜諸尚書劔唯此三人特以寳劒自手署其名曰韓棱楚龍淵晉太康記曰汝南西平縣有龍泉水可淬刀劒特堅利汝南即楚分野郅壽蜀漢文陳寵濟南椎成椎音直追反漢官椎成作鍜成時論者為之説以棱淵深有謀故得龍淵壽明逹有文章故得漢文寵敦朴善不見外故得椎成和帝即位侍中竇憲使人刺殺齊殤王子都鄉侯暢於上東門有司畏憲咸委疑於暢兄弟詔遣侍御史之齊案其事棱上疏以為賊在京師不宜捨近問遠恐為姦臣所笑竇太后怒以切責棱棱固執其議及事發果如所言憲惶恐白太后求出擊北匈奴以贖罪棱復上疏諫太后不從及憲有功還為大將軍威震天下復出屯武威會帝西祠園陵詔憲與車駕會長安及憲至尚書以下議欲拜之伏稱萬嵗棱正色曰夫上交不謟下交不黷易下繫之辭也禮無人臣稱萬嵗之制議者皆慙而止尚書左丞王龍私奏記上牛酒於憲棱舉奏龍論為城旦前書音義曰城旦輕刑之名也晝日伺寇虜夜暮築長城故曰城旦棱在朝數薦舉良吏應順呂昌周紆等皆有名當時及竇氏敗棱典案其事深竟黨與數月不休沐帝以為憂國忘家賜布三百疋遷南陽太守特聽棱得過家上冢鄉里以為榮棱發擿姦盗郡中震慄政號嚴平數嵗徵入為太僕九年冬代張奮為司空明年薨子輔安帝時至趙相趙王良孫商之相也棱孫演順帝時為丹陽太守政有能名桓帝時為司徒演字伯南大將軍梁冀被誅演坐阿黨抵罪以減死論遣歸本郡華嶠書曰梁皇后崩梁貴人大幸將立大將軍冀欲分其寵謀冒姓為貴人父演隂許諾及冀誅事發演坐抵罪也後復徵拜司隸校尉周榮傳孫景周榮字平孫廬江舒人也肅宗時舉明經辟司徒袁安府安數與論議甚器之及安舉奏竇景及與竇憲爭立北單于事劉攽曰案文多一及字皆榮所具草竇氏客太尉掾徐齮深惡之脅榮曰子為袁公腹心之謀排奏竇氏竇氏悍士刺客滿城中謹備之矣榮曰榮江淮孤生䝉先帝大恩以歴宰二城今復得備宰士榮辟司徒府故稱宰士縱為竇氏所害誠所甘心故常敇妻子若卒遇飛禍無得殯歛飛禍言倉卒而死也冀以區區腐身覺悟朝廷及竇氏敗榮由此顯名自郾令擢為尚書令出為潁川太守坐法當下獄和帝思榮忠節左轉共令共縣名屬河内郡故城在今衞州共城縣東即古共國也歲餘復以為山陽太守所歴郡縣皆見稱紀以老病乞身卒于家詔特賜錢二十萬除子男興為郎中興少有名譽永寧中尚書陳忠上疏薦興曰臣伏惟古者帝王有所號令言必𢎞雅辭必溫麗垂於後世列於典經故仲尼嘉唐虞之文章從周室之郁郁論語孔子曰大哉堯之為君也煥乎其有文章又曰周監於二代郁郁乎文哉吾從周臣竊見光禄郎周興光禄主郎故曰光禄郎孝友之行著於閨門清厲之志聞於州里蘊匵古今博物多聞蘊藏也匵匱也三墳之篇五典之策無所不覽伏羲神農黄帝之書曰三墳少昊顓頊高辛唐虞之書曰五典也屬文著辭有可觀採尚書出納帝命為王喉舌尚書為王之喉舌官也李固對策曰今陛下有尚書猶天之有北斗也北斗為天之喉舌尚書亦為陛下之喉舌也臣等既愚闇而諸郎多文俗吏鮮有雅才每為詔文宣示内外轉相求請或以不能而專已自由辭多鄙固興抱竒懐能隨軰栖遲誠可歎惜詔乃拜興為尚書郎卒興子景景字仲饗辟大將軍梁冀府稍遷豫州刺史河内太守好賢愛士其拔才薦善常恐不及每至歲時延請舉吏入上後堂與共宴㑹如此數四乃遣之贈送什物無不充備既而選其父兄子弟事相優異嘗稱曰臣子同貫若之何不厚先是司徒韓演在河内志在無私舉吏當行一辭而已恩亦不及其家曰我舉若可矣豈可令徧積一門故當時論者議此二人景後徵入為將作大匠及梁冀誅景以故吏免官禁錮朝廷以景素著忠正頃之復引拜尚書令蔡質漢儀曰延熹中京師游俠有盗發順帝陵賣御物於市市長追捕不得周景以尺一詔召司隸校尉左雄詣臺對詰雄伏於廷答對景使虎賁左駿頓頭血出覆面與三日期賊便擒也遷太僕衞尉六年代劉寵為司空是時宦官任人及子弟充塞列位景初視事與太尉楊秉舉奏諸姦猾自將軍牧守以下免者五十餘人遂連及中常侍防東陽侯侯覽劉攽曰案覽夲傳覽防東人封高鄉侯今此載其侯爵即當云高鄉侯若載其本縣名則非例也蓋誤二高鄉字東武陽侯具瑗皆坐黜朝廷莫不稱之視事二年以地震策免歲餘復代陳蕃為太尉建寧元年薨以豫議定策立靈帝追封安陽鄉侯長子崇嗣至甘陵相甘陵王理相也理即章帝曽孫中子忠少歴列位累遷大司農吳書曰忠字嘉謀與朱儁共敗李傕於曹陽也忠子暉前為洛陽令去官歸兄弟好賓客雄江淮間出入從車常百餘乘及帝崩暉聞京師不安來候忠董卓聞而惡之使兵刼殺其兄弟忠後代皇甫嵩為太尉録尚書事以災異免復為衛尉從獻帝東歸洛陽贊曰袁公持重誠單所奉單盡也惟徳不忘延世承寵孟侯經博侍言帝幙棱榮事君志同鸇雀左傳曰見無禮於其君者誅之如鷹鸇之逐鳥雀也後漢書卷七十五後漢書卷七十五考證袁安傳後舉孝廉注洛陽令自出案行見人家皆除雪出有乞食者至袁安門無有行路孫鑛云安何由在洛陽卧宜云汝陽方是袁安𤣥孫閎一見太守王朗朗字監本誤作郎今改正徒歩師門下監本有從師二字臣㑹汾按徒歩師門即從師也復稱從師不成文從宋本刪張酺傳祖父翁父字監本誤作文臣會汾按下文云翁獨守郡定為單名改之韓棱傳濟南椎成注漢官椎成作鍜成臣宗萬按漢官下脱儀字當増周榮孫景去官歸監本作去官賜歸臣會汾按他處或言予告歸或言賜告歸此處去官下不得更言賜歸從宋本改後漢書卷七十五考證
