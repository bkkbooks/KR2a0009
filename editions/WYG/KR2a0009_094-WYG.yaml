body:
  text: 後漢書卷九十四宋宣城太守范煜撰唐章懐太子賢注吳延史盧趙列傳第五十四吳祐傳吳祐字季英祐音又續漢書作佑陳留長垣人也父恢為南海太守恢或作惔音徒濫反祐年十二随從到官恢欲殺青簡以寫經書殺青者以火炙簡令汗取其青易書復不蠧謂之殺青亦謂汗簡義見劉向别録也祐諫曰今大人踰越五領領者西自衡山之南東至于海一山之限耳别標名則有五焉裴氏廣川記云大庾始安臨賀桂陽掲陽是為五領鄧徳明南康記曰大庾一也桂陽甲騎二也九眞都龎三也臨賀萌渚四也始安越城五也裴氏之說則為審矣逺在海濵其俗誠陋然舊多珍怪上為國家所疑下為權戚所望希望其贈遺也此書若成則載之兼兩車有兩輪故稱兩也昔馬援以薏苡興謗王陽以衣囊徼名徼要也音江堯反前書曰王陽好車馬衣服鮮明而遷徙轉移所載不過囊橐時人怪其奢伏其儉故俗傳王陽能作黄金嫌疑之間誠先賢所愼也恢乃止撫其首曰吳氏世不乏季子矣季子謂札也及年二十喪父居無擔石而不受贍遺常牧豕於長垣澤中續漢書曰年四十餘乃為郡吏也行吟經書遇父故人謂曰卿二千石子而自業賤事縱子無耻奈先君何祐辭謝而已守志如初後舉孝廉陳留耆舊傳曰太守冷宏召補文學宏見異之擢舉孝廉將行郡中為祖道祐越壇共小史雍丘黄眞歡語移時與結友而别祖道之禮封土為軷壇也五經要義曰祖道者行祭為道路祈也周禮大馭掌王玉路以祀及犯軷注云犯軷者封土象山於路側以芻棘栢為神主祭之以車轢軷而去喻無險難劉攽曰注以芻棘栢案禮記云菩芻棘栢此少一菩字也功曹以祐倨請黜之太守曰吳季英有知人之明卿且勿言眞後亦舉孝廉除新蔡長世稱其清節謝承書曰真字夏甫時公沙穆來遊太學無資糧乃變服客傭為祐賃舂祐與語大驚遂共定交於杵臼之間祐以光禄四行遷膠東侯相漢官儀曰四行敦厚質樸遜讓節儉也時濟北戴宏父為縣丞宏年十六從在丞舍祐每行園常聞諷誦之音竒而厚之亦與為友卒成儒宗知名東夏東夏東方也尚書曰尹兹東夏也官至酒泉太守濟北先賢傳曰宏字元襄剛縣乆也年二十二為郡督郵曾以職事見詰府君欲撻之宏曰今鄙郡遭明府咸以為仲尼之君國小人少以宏為顔回豈聞仲尼有撻顔回之義府君異其對即日教署主簿也祐政唯仁簡以身率物民有爭訴者輙閉閤自責然後斷其訟以道譬之或身到閭里重相和解自是之後爭隙省息吏人懐而不欺嗇夫孫性私賦民錢續漢書曰賦錢五百為父市單衣市衣以進其父父得而怒曰有君如是何忍欺之促歸伏罪性慙懼詣閤持衣自首祐屏左右問其故性具談父言祐曰掾以親故受汚穢之名所謂觀過斯知仁矣論語載孔子之言也使歸謝其父還以衣遺之又安丘男子母丘長與母俱行市道遇醉客辱其母長殺之而亡安丘追蹤於膠東得之祐呼長謂曰子母見辱人情所耻然孝子忿必慮難動不累親論語孔子曰忿思難又曰一朝之忿忘其身以及其親非惑與今若背親逞怒若汝也逞快也白日殺人赦若非義刑若不忍將如之何長以械自繫在手曰械曰國家制法囚身犯之明府雖加哀矜恩無所施祐問長有妻子乎對曰有妻未有子也即移安丘逮長妻妻到解其桎梏使同宿獄中妻遂懐孕至冬盡行刑長泣謂母曰負母應死當何以報吳君乎乃齧指而吞之含血言曰妻若生子名之吳生言我臨死吞指為誓屬兒以報吳君因投繯而死謂以繩為繯投之而縊也繯音胡犬反祐在膠東九年陳留耆舊傳曰祐處同僚無私書之問上司無牋檄之敬在膠東書不入京師也遷齊相大將軍梁冀表為長史及冀誣奏太尉李固祐聞而請見與冀爭之不聽時扶風馬融在坐為冀章草祐因謂融曰李公之罪成於卿手李公即誅卿何面目見天下之人乎冀怒而起入室祐亦徑去冀遂出祐為河間相因自免歸家不復仕躬灌園蔬以經書教授年九十八卒長子鳳官至樂浪太守少子愷新息令鳳子馮鮦陽侯相鮦陽縣屬汝南郡音紂皆有名於世陳留耆舊傳曰鳳字君雅馮字子髙延篤傳延篤字叔堅南陽犨人也犨音昌猶反故城在汝州魯山縣東南也少從潁川唐溪典受左氏傳先賢行狀曰典字季度為西鄂長風俗通曰吳夫槩王奔楚封堂谿因以為氏典為五官中郎將唐與堂同也旬日能諷誦之典深敬焉先賢行狀曰篤欲寫左氏傳無紙唐溪典以廢牋記與之篤以牋記紙不可寫傳乃借本諷之糧盡辭歸典曰卿欲寫傳何故辭歸篤曰已諷之矣典聞之歎曰嗟乎延生雖復端木聞一知二未足為喻若使尼父更起於洙泗君當編名七十與游夏爭匹也又從馬融受業博通經傳及百家之言能著文章有名京師舉孝廉為平陽侯相到官表龔遂之墓立銘祭祠擢用其後於畎畝之間前書龔遂山陽南平陽人為勃海太守南平陽故城在今兖州鄒縣以師喪棄官奔赴五府並辟不就桓帝以博士徴拜議郎與朱穆邊韶共著作東觀稍遷侍中帝數問政事篤詭辭密對榖梁傳曰故士造辟而言詭辭而出范寗注云辟君也詭辭而出不以實告人也動依典義遷左馮翊又徙京兆尹其政用寛仁憂恤民黎擢用長者與參政事郡中歡愛三輔咨嗟焉先是陳留邊鳳為京兆尹亦有能名郡人為之語曰前有趙張三王前書趙廣漢張敞王尊王章王駿俱為京兆尹也後有邊延二君時皇子有疾下郡縣出珍藥而大將軍梁冀遣客齎書詣京兆并貨牛黄吳普本草曰牛黄味苦無毒牛出入呻者有之夜有光走角中牛死入膽中如雞子黄神農本草曰療驚癎除邪逐鬼篤發書收客曰大將軍椒房外家而皇子有疾必應陳進醫方豈當使客千里求利乎遂殺之冀慙而不得言有司承㫖欲求其事篤以病免歸敎授家巷時人或疑仁孝前後之證篤乃論之曰觀夫仁孝之辯辯爭也紛然異端互引典文代取事據代更也可謂篤論矣篤厚也夫人二致同源總率百行二致仁孝也易繫辭曰殊塗而同歸百慮而一致也非復銖兩輕重必定前後之數也而如欲分其大較較猶畧也體而名之則孝在事親仁施品物施物則功濟於時事親則徳歸於己於己則事寡濟事則功多推此以言仁則逺矣然物有出微而著事有由隱而章近取諸身則耳有聽受之用目有察見之明足有致逺之勞手有飾衞之功功雖顯外本之者心也逺取諸物則草木之生始於萌牙終於彌蔓枝葉扶疏榮華紛縟說文曰縟繁綵飾也末雖繁蔚致之者根也夫仁人之有孝猶四體之有心腹四體猶手足也枝葉之有根本也聖人知之故曰夫孝天之經也地之義也人之行也左氏傳趙簡子問子太叔何謂禮對曰聞諸先大夫子產曰夫禮天之經也地之義也人之行也天地之經人實則之則天之明因地之利孔子取為孝經之詞也君子務本本立而道生孝悌也者其為仁之本與論語載有若之詞也然體大難備物性好偏故所施不同事少兩兼者也如必對其優劣則仁以枝葉扶疏為大孝以心體本根為先可無訟也或謂先孝後仁非仲尼序回參之意論語孔子曰參也魯回也其庶乎言庶幾於善道也魯鈍也言若先孝後仁則曾參不得不賢於顔子蓋以為仁孝同質而生純體之者則互以為稱虞舜顔回是也虞舜顔回純徳既備或仁或孝但随其所稱爾若偏而體之則各有其目公劉曾參是也史記公劉后稷曾孫也能修復后稷之業務耕種行地宜百姓懐之多從而保歸焉故公劉以仁紀徳曾參以至孝稱賢此則各自為目不能總兼其美也夫曾閔以孝悌為至徳曾參閔損也管仲以九合為仁功論語孔子曰桓公九合諸侯不以兵車管仲之力如其仁如其仁九合者謂再會於鄄兩會于幽又㑹檉首止戴寗母洮葵丘也未有論徳不先回參考功不大夷吾以此而言各從其稱者也前越巂太守李文徳素善於篤時在京師謂公卿曰延叔堅有王佐之才奈何屈千里之足乎欲令引進之篤聞乃為書止文徳曰夫道之將廢所謂命也論語孔子曰道之將行也與命也道之將廢也與命也流聞乃欲相為求還東觀來命雖篤所未敢當吾嘗昧爽櫛梳坐於客堂孔安國注尚書曰昧暝也爽明也朝則誦羲文之易虞夏之書歴公旦之典禮覽仲尼之春秋周公攝政七年制禮作樂班固東都賦曰今論者但知誦虞夏之書詠殷周之詩講羲文之易論孔氏之春秋也夕則消搖内階詠詩南軒楚詞髙堂邃宇鏤檻層軒王逸注云軒樓板也百家衆氏投間而作言誦經典之餘投射間隙而翫百氏也洋洋乎其盈耳也洋洋美也渙爛兮其溢目也渙爛文章貌也紛紛欣欣兮其獨樂也當此之時不知天之為蓋地之為輿宋玉大言賦曰方地為輿員天為蓋也不知世之有人己之有軀也雖漸離撃筑傍若無人說文曰筑五絃之樂也沈約宋書曰筑不知誰所造也史記唯云髙漸離撃筑案今筑形似箏有項有柱史記荆軻至燕日與屠狗及髙漸離撃筑荆軻和而歌於市中相樂已而相泣傍若無人髙鳳讀書不知暴雨事見逸人傳方之於吾未足况也且吾自束脩己來束脩謂束帶脩飾鄭元注論語曰謂年十五已上也為人臣不陷於不忠為人子不陷於不孝上交不謟下交不黷易繋辭之文也從此而殁下見先君逺祖可不慙赧色媿曰赧音女版反如此而不以善止者恐如敎羿射者也史記有養由基者善射者也去栁葉百歩而射之百發而百中之左右觀者百餘人皆曰善射有一人立其旁曰善可教射矣養由基怒釋弓搤劒曰客安能教我射乎客曰非吾能敎枝左詘右也夫去栁葉百歩而射之百發百中之不以善息少焉氣衰力倦弓撥矢鉤一發不中者百發盡息此言羿者蓋以俱善射而稱之焉愼勿迷其本弃其生也後遭黨事禁錮錮謂閉塞永康元年卒于家鄉里圖其形于屈原之廟屈原楚大夫抱忠貞而死篤有志行文章故圖其像而偶之焉篤論解經傳多所駮正後儒服䖍等以為折中所著詩論銘書應訊表敎令訊問也蓋答客難之類凡二十篇云史弼傳史弼字公謙陳留考城人也父敞順帝時以佞辯至尚書郡守續漢書曰敞為京兆尹化有能名尤善條敎見稱於三輔也弼少篤學聚徒數百仕州郡謝承書曰弼年二十為郡功曹承前太守宋訢穢濁之後悉條諸生聚歛姦吏百餘人皆白太守埽迹還縣髙名由此而興辟公府遷北軍中侯是時桓帝弟渤海王悝素行險辟僭傲多不法弼懼其驕悖為亂乃上封事曰臣聞帝王之於親戚愛雖隆必示之以威體雖貴必禁之以度如是和睦之道興骨肉之恩遂昔周襄王恣甘昭公甘昭公王子帶周襄王弟也食邑於廿諡曰昭左傳曰初甘昭公有寵於惠后后將立之未及而卒昭公奔齊王復之遂以狄師攻王王出適鄭也孝景皇帝驕梁孝王梁孝王景帝弟竇太后少子愛之賜天子旌旗出警入蹕景帝常與王宴太后前曰千秋萬嵗後傳王爰盎諌不許遂令人刺殺盎也而二弟階寵終用㪍慢卒周有播蕩之禍漢有爰盎之變竊聞渤海王悝憑至親之屬恃偏私之愛失奉上之節有僣慢之心外聚剽輕不逞之徒剽悍也逞快也謂彼侵枉不快之人也左傳曰率羣不逞之人剽音疋妙反内荒酒樂出入無常所與羣居皆有口無行有虚言無實行也或家之弃子或朝之斥臣必有羊勝伍被之變前書羊勝勸梁王求漢嗣伍被勸准南王謀反誅也州司不敢彈紏傅相不能匡輔陛下隆於友于不忍遏絶友親也尚書曰惟孝友于兄弟恐遂滋蔓為害彌大滋長蔓延也乞露臣奏宣示百僚使臣得於清朝明言其失然後詔公卿平處其法法決罪定乃下不忍之詔臣下固執然後少有所許如是則聖朝無傷親之譏渤海有享國之慶不然懼大獄將興使者相望於路矣臣職典禁兵備禦非常而妄知藩國干犯至戚罪不容誅不勝憤懣謹冐死以聞帝以至親不忍下其事後悝竟坐逆謀貶為癭陶王弼遷尚書出為平原相時詔書下舉鉤黨鉤謂相連也郡國所奏相連及者多至數百唯弼獨無所上詔書前後切却州郡切急也却退也髠笞掾吏從事坐傳責曰續漢志每州皆有從事史及諸曹掾史傳客舍也音知戀反坐傳舍召弼而責詔書疾惡黨人㫖意懇惻青州六郡其五有黨濟南樂安齊國東萊平原北海六郡青州所管也青州在齊國臨淄見漢官儀近國甘陵亦考南北部桓帝為蠡吾侯受學於甘陵周福及帝即位擢福為尚書時同郡河南尹房植有名當朝二家賔客互相譏揣遂各樹朋徒漸成尤隙自是甘陵有南北部見黨人篇序也平原何理而得獨無弼曰先王疆理天下畫界分境疆界也理正也左傳曰先王疆理天下物土之宜而布其利也水土異齊風俗不同前書曰凡人函五常之性而其剛柔緩急音聲不同繋水土之風氣故謂之風好惡取舍動静無常隨君上之情欲故謂之俗也它郡自有平原自無胡可相比若承望上司誣陷良善淫刑濫罰以逞非理則平原之人戶可為黨相有死而己所不能也從事大怒即收郡僚職送獄遂舉奏弼會黨禁中解弼以俸贖罪得免俸音扶用反濟活者千餘人弼為政特挫抑彊豪其小民有罪多所容貸遷河東太守被一切詔書當舉孝廉弼知多權貴請託乃豫勑斷絶書屬屬音之欲反中常侍侯覽果遣諸生齎書請之并求假鹽稅積日不得通生乃說以它事謁弼而因達覽書劉攽曰案文說字當作詭謂詭譎也弼乃大怒曰太守忝荷重任當選士報國爾何人而偽詐無狀命左右引出楚捶數百府丞掾史十餘人皆諫於廷弼不對遂付安邑獄即日考殺之侯覽大怨遂詐作飛章下司𨽻誣弼誹謗檻車徴吏人莫敢近者唯前孝康裴瑜送到崤澠之間大言於道傍曰明府摧折虐臣選徳報國如其獲罪足以垂名竹帛願不憂不懼弼曰誰謂荼苦其甘如薺詩衞風也荼苦菜也昔人刎頸九死不恨刎割也楚辭曰雖九死其猶未悔也及下廷尉詔獄平原吏人奔走詣闕訟之又前孝廉魏劭毁變形服詐為家僮瞻䕶於弼弼遂受誣事當弃市劭與同郡人賣郡邸郡邸若今之寺邸也行賂於侯覽得減死罪一等論輸左校時人或譏曰平原行貨以免君無乃蚩乎陶丘洪曰青州先賢傳曰洪字子休平原人也清達博辯文冠當代舉孝廉不行辟太尉府年三十卒昔文王牖里閎散懐金牖里殷獄名或作羑亦名羑城在今相州湯隂縣北帝王紀散宜生南宫括閎天學乎吕尚尚知三人賢結朋友之交及紂囚文王乃以黄金千鎰與宜生令求諸物與紂史記曰閎天之徒乃求有莘氏女驪戎文馬有熊九駟它竒怪物因殷孽臣費仲獻之於紂紂大說乃赦之也史弼遭患義夫獻寳亦何疑焉於是議者乃息刑竟歸田里稱病閉門不出數為公卿所薦議郎何休又訟弼有幹國之器宜登台相徴拜議郎侯覽等惡之光和中出為彭城相會病卒裴瑜位至尚書先賢行狀曰瑜字雉璜聰明敏達觀物無滯清論所加必為成器醜議所指没齒無怨也論曰夫剛烈表性鮮能優寛仁柔用情多乏貞直吳季英視人畏傷發言烝烝烝烝猶仍也似夫懦者而懐憤激揚折讓權枉又何壯也仁以矜物義以退身君子哉法言曰君子於仁也柔於義也剛語曰活千人者子孫必封前書王翁孺曰聞活千人者有封子孫吾所活者萬人後世其興乎史弼頡頏嚴吏頡頏猶上下也終全平原之黨而其後不大不大謂子孫衰替也斯亦未可論也盧植傳盧植字子幹涿郡涿人也身長八尺二寸音聲如鐘少與鄭𤣥俱事馬融能通古今學好研精而不守章句融外戚豪家融明徳皇后之從姪也多列女倡歌舞於前植侍講積年未嘗轉盻融以是敬之學終辭歸闔門敎授性剛毅有大節常懐濟世志不好辭賦能飲酒一石時皇后父大將軍竇武援立靈帝初秉機政朝議欲加封爵植雖布衣以武素有名譽乃獻書以規之曰植聞嫠有不恤緯之事左傳曰范獻子曰人亦有言嫠不恤其緯而憂宗周之隕為將及焉杜預注曰嫠寡婦也織者常苦緯少寡婦所宜憂也漆室有倚楹之戚琴操曰魯漆室女倚柱悲吟而嘯隣人見其心之不樂也進而問之曰有淫心欲嫁之念耶何吟之悲漆室女曰嗟乎嗟乎子無志不知人之甚也昔者楚人得罪於其君走逃吾東家馬逸蹈吾園葵使吾終年不懕菜吾西隣人失羊不還請吾兄追之霧濁水出使吾兄溺死終身無兄政之所致也吾憂國傷人心悲而嘯豈欲嫁哉自傷懐結而為人所疑於是褰裳入山林之中見女貞之木喟然歎息援琴而絃歌以女貞之辭自經而死劉攽曰注以女貞之辭案文多一以字憂深思逺君子之情詩序曰憂深思逺儉而用禮乃有堯之遺風焉夫士立爭友義貴切磋孝經曰士有爭友身不陷於不義詩云如切如磋鄭𤣥注云骨曰切象曰磋言友之相規誡如骨象之見切磋書陳謀及庶人尚書洪範曰謀及卿士謀及庶人也詩詠詢于芻蕘詩大雅曰先人有言詢于芻蕘毛萇注云芻蕘採薪者也植誦先王之書久矣敢愛其瞽言哉無目䀕曰瞽䀕音直忍反今足下之於漢朝猶旦奭之在周室建立聖主四海有繋論者以為吾子之功於斯為重天下聚目而視攢耳而聽前書賈山曰使天下戴目而視傾耳而聽也謂準之前事將有景風之祚景風解見和帝紀尋春秋之義王后無嗣擇立親長年均以徳徳均則決之卜筮左傳王子朝曰先王之命王后無嫡則擇立長年鈞以徳徳鈞以卜古之制也今同宗相後披圖案牒以次建之何勲之有豈横叨天功以為己力乎叨貪也左傳曰貪天之功以為己力也宜辭大賞以全身名又比世祚不競競彊也仍外求嗣可謂危矣而四方未寜盜賊伺隙恒岳勃碣勃勃海也碣碣石山也特多姦盜將有楚人脅比尹氏立朝之變左傳曰楚公子比恭王之子也靈王立子比奔晉靈王卒子比自晉歸楚立為君比弟公子弃疾欲簒其位夜乃使人周走呼曰王至矣國人大驚子比乃自殺王子朝周景王之庶子景王卒子猛立尹氏周卿士立子朝奪猛位也宜依古禮置諸子之官徴王侯愛子宗室賢才外崇訓道之義内息貪利之心簡其良能隨用爵之彊幹弱枝之道也以樹為喻也謂京師為幹四方為枝前書曰漢興立都長安徙齊諸田楚昭屈景及諸功臣家於長陵蓋以彊幹弱枝非獨為奉山園也武並不能用州郡數命植皆不就建寜中徴為博士乃始起焉熹平四年九江蠻反四府選植才兼文武拜九江太守蠻寇賔服以疾去官作尚書章句三禮解詁詁事也言解其事意時始立太學石經以正五經文字植乃上書曰臣少從通儒故南郡太守馬融受古學頗知今之禮記特多回宂回宂猶紆曲也臣前以周禮諸經發起粃謬粃粟不成喻義之乖僻也敢率愚淺為之解詁而家乏無力供繕寫上繕善也言家貧不能繕寫而上也願得將能書生二人共詣東觀就官財糧專心研精合尚書章句考禮記失得庶裁定聖典刋正碑文古文科斗近於為實而厭抑流俗降在小學古文謂孔子壁中書也形似科斗因以為名前書謂文字為小學也中興以來通儒達士班固賈逵鄭興父子並敦恱之興子衆也自有傳左傳曰郤豰恱禮樂而敦詩書也今毛詩左氏周禮各有傳記其與春秋共相表裏表裏言義相湏而成也前書云河圖洛書相為經緯八卦九章相為表裏宜置博士為立學官以助後來以廣聖意會南夷反叛以植嘗在九江有恩信拜為廬江太守植深達政宜務存清靜𢎞大體而已嵗餘復徴拜議郎與諫議大夫馬日磾議郎蔡邕楊彪韓說等並在東觀校中書五經記傳補續漢記言中書以别於外也帝以非急務轉為侍中遷尚書光和元年有日食之異上封事諫曰臣聞五行傳日晦而月見謂之朓王侯其舒五行傳劉向所著朓者行速在日前故早見劉向以為君舒緩則臣驕慢故日行遲而月行速也此謂君政舒緩故日食晦也春秋傳曰天子避位移時左氏傳曰日過分未至三辰有災於是乎君不舉避移時杜預注曰避正寢過日食時也言其相掩不過移時而間者日食自已過午既食之後雲霧晻曖比年地震彗孛互見臣聞漢以火徳化當寛明近色信䜛忌之甚者如火畏水故也案今年之變皆陽失隂侵消禦災凶宜有其道謹略陳八事一曰用良二曰原禁原其所禁而宥之也三曰禦癘防禦疫癘之氣四曰備寇五曰修禮六曰遵堯七曰御下八曰散利用良者宜使州郡覈舉賢良覈實也隨方委用責求選舉原禁者凡諸黨錮多非其罪可加赦恕申宥回枉回邪也禦癘者宋后家屬並以無辜委骸横尸不得收葬疫癘之來皆由於此宜勑收拾以安遊魂后以王甫程阿所構憂死父及兄弟並被誅靈帝後夢見桓帝怒曰宋皇后何罪而絶其命已訴於天上帝震怒罪在難救也備寇者侯王之家賦稅減削愁窮思亂必致非常宜使給足以防未然脩禮者應徴有道之人若鄭𤣥之徒陳明洪範禳服災咎遵堯者今郡守刺史一月數遷宜依黜陟以章能否縱不九載可滿三嵗書曰三載考績三考黜陟幽眀孔安國注曰三年考功三考九年能否幽明有别升進其明者黜退其幽者此皆唐堯之法也御下者請謁希爵一宜禁塞希求也遷舉之事責成主者散利者天子之體理無私積宜𢎞大務蠲略細微蠲除也帝不省中平元年黄巾賊起四府舉植拜北中郎將持節以䕶烏桓中郎將宗員副將北軍五校士發天下諸郡兵征之連戰破賊帥張角斬獲萬餘人角等走保廣宗植築圍鑿壍造作雲梯垂當㧞之帝遣小黄門左豐詣軍觀賊形埶或勸植以賂送豐植不肯豐還言於帝曰廣宗賊易破耳盧中郎固壘息軍以待天誅帝怒遂檻車徴植減死罪一等及車騎將軍皇甫嵩討平黄巾盛稱植行師方略嵩皆資用規謀濟成其功以其年復為尚書帝崩大將軍何進謀誅中官乃召并州牧董卓以懼太后植知卓凶悍難制必生後患固止之進不從及卓至果陵虐朝廷乃大會百官於朝堂議欲廢立羣僚無敢言植獨抗議不同卓怒罷會將誅植語在卓傳植素善蔡邕邕前徙朔方植獨上書請之邕時見親於卓故往請植事又議郎彭伯諫卓曰盧尚書海内大儒人之望也今先害劉攽曰案文少之字不成文理天下震怖卓乃止但免植官而已植以老病求歸懼不免禍乃詭道從轘轅出詭詐也轘轅道在今洛州緱氏縣東南也卓果使人追之到懐不及遂隱於上谷不交人事冀州牧袁紹請為軍師初平三年卒臨困敕其子儉葬於土穴不用棺椁附體單帛而已所著碑誄表記凡六篇建安中曹操北討栁城過涿郡魏志曰建安十二年操北征烏桓渉鮮卑討栁城登白狼山也告守令曰故北中郎將盧植名著海内學為儒宗士之楷模國之楨幹也昔武王入殷封商容之閭鄭喪子産仲尼隕涕左傳曰仲尼聞子産死出涕曰古之遺愛也孤到此州嘉其餘風春秋之義賢者之後宜有殊禮公羊傳曰君子之善善也長惡惡也短惡惡止其身善善及子孫賢者子孫故君子為之諱也亟遣丞掾除其墳墓亟急也存其子孫并致薄醊醊祭酹也音張芮反以彰厥徳子毓知名魏志曰毓字子家十嵗而孤以學行稱仕魏至侍中吏部尚書時舉中郎詔曰得其人與不在盧生耳選舉莫取有名如畫地為餅不可啖也毓對曰名不足以致異人而可以得常士常士畏教慕善然後有名也論曰風霜以别草木之性論語曰嵗寒然後知松栢之後凋也危亂而見貞良之節老子曰國家昬亂有忠臣則盧公之心可知矣夫蠭躉起懐雷霆駭耳雖賁育荆諸之倫孟賁多力者也夏育勇者也並衞人荆荆軻也諸專諸也未有不冘豫奪常者也冘人行貌也音滛言冘豫不能自定也奪謂易其常分者也當植抽白刃嚴閣之下追帝河津之間排戈刃赴戕折事見何進傳杜預注左傳曰戕者卒暴之名也豈先計哉君子之於忠義造次必於是顚沛必於是也孔子曰君子無終食之間違仁造次必於是顚沛必於是造次急遽也顛沛僵仆也雖急遽僵仆不違仁也趙岐傳趙岐字邠卿京兆長陵人也初名嘉生於御史臺因字臺卿以其祖為御史故生於臺也後避難故自改名字示不忘本土也岐少明經有才蓺娶扶風馬融兄女融外戚豪家岐常鄙之不與融相見三輔決録注曰岐娶馬敦女宗姜為妻敦兄子融嘗至岐家多從賔與從妹宴飲作樂日夕乃出過問趙處士所在岐亦厲節不以妹聓之故屈志於融也與其友書曰馬季長雖有名當世而不持士節三輔髙士未曾以衣裾襒其門也岐曽讀周官二義不通一往造之賤融如此也仕州郡以廉直疾惡見憚年三十餘有重疾臥蓐七年蓐寢蓐也聲類曰蓐薦也自慮奄忽乃為遣令勑兄子曰大丈夫生世遯無箕山之操易曰遯而亨君子以逺小人王弼注遯之義避内而之外者也箕山許由所隱處也仕無伊吕之勲天不我與復何言哉可立一員石於吾墓前刻之曰漢有逸人姓趙名嘉有志無時命也奈何其後疾瘳永興二年辟司空掾議二千石得去官為親行服朝廷從之其後為大將軍梁冀所辟為陳損益求賢之䇿冀不納舉理劇為皮氏長皮氏故城在今絳州龍門縣西决録曰岐為長抑彊討姦大興學校也會河東太守劉祐去郡而中常侍左悺兄勝代之岐耻疾宦官即日西歸京兆尹延篤復以為功曹先是中常侍唐衡兄玹為京兆虎牙都尉玹音𤣥郡人以玹進不由徳皆輕侮之岐及從兄襲又數為貶議玹深毒恨決録注襲字元嗣先是杜伯度崔子玉以工草書稱于前代襲與羅暉拙書見蚩於張伯英英頗自矜髙與朱賜書云上比崔杜不足下方羅趙有餘也延熹元年玹為京兆尹岐懼禍及乃與從子戩逃避之玹果收岐家屬宗親陷以重法盡殺之決録注曰岐長兄磐州都官從事早亡次兄無忌字世卿部河東從事為玹所殺戩音翦岐遂逃難四方江淮海岱靡所不歴自匿姓名賣餅北海市中時安丘孫嵩年二十餘遊市見岐察非常人停車呼與共載岐懼失色嵩乃下帷令騎屏行人密問岐曰視子非賣餅者又相問而色動不有重怨即亡命乎我北海孫賔石闔門百口埶能相濟岐素聞嵩名即以實告之遂以俱歸嵩先入白母曰出行乃得死友迎入上堂饗之極歡藏岐複壁中數年岐作戹屯歌二十三章後諸唐死滅因赦乃出三府聞之同時並辟九年乃應司徒胡廣之命會南匈奴烏桓鮮卑反叛公卿舉岐擢拜并州刺史岐欲奏守邊之䇿未及上㑹坐黨事免因撰次以為禦寇論決録注曰是時綱維不攝閹豎專權岐擬前代連珠之書四十章上之留中不出靈帝初復遭黨錮十餘嵗中平元年四方兵起詔選故刺史二千石有文武才用者徴岐拜議郎車騎將軍張温西征關中請補長史别屯安定大將軍何進舉為敦煌太守行至襄武縣名屬隴西郡岐與新除諸郡太守數人俱為賊邊章等所執賊欲脅以為帥岐詭辭得免展轉還長安決録注曰岐還至陳倉復遇亂兵裸身得免在草中十二日不食也及獻帝西都復拜議郎稍遷太僕及李傕專政使太傅馬日磾撫慰天下以岐為副日磾行至洛陽表别遣岐宣揚國命所到郡縣百姓皆喜曰今日乃復見使者車騎是時袁紹曹操與公孫瓚爭冀州紹及操聞岐至皆自將兵數百里奉迎岐深陳天子恩徳宜罷兵安人之道又移書公孫瓚為言利害紹等各引兵去皆與岐期會洛陽奉迎車駕岐南到陳留得篤疾經渉二年期者遂不至興平元年詔書徴岐會帝當還洛陽先遣衞將軍董承修理宫室岐謂承曰今海内分崩唯有荆州境廣地勝西通巴蜀南當交趾年榖獨登兵人差全岐雖廹大命猶志報國家欲自乘牛車南說劉表可使其身自將兵來衞朝廷與將軍并心同力共奬王室此安上救人之䇿也承即表遣岐使荆州督租糧岐至劉表即遣兵詣洛陽助修宫室軍資委輸前後不絶時孫嵩亦寓於表表不為禮岐乃稱嵩素行篤烈因共上為青州刺史岐以老病遂留荆州曹操時為司空舉以自代光禄勲桓典少府孔融上書薦之於是就拜岐為太常年九十餘建安六年卒先自為壽藏壽藏謂塜壙也稱壽者取其久逺之意也猶如壽宫壽器之類冡在今荆州古郢城中也圖季札子産晏嬰叔向四像居賔位又自畫其像居主位皆為讃頌勑其子曰我死之日墓中聚沙為牀布簟白衣散髮其上覆以單被即日便下下訖便掩岐多所述作著要子章句三輔決録傳於時決録序曰三輔者本雍州之地世世徙公卿吏二千石及髙貲皆以陪諸陵五方之俗雜會非一國之風不但繫於詩秦􅃎也其為士好髙尚義貴於名行其俗失則趣執進權唯利是視余以不才生於西土耳能聽而聞故老之言目能視而見衣冠之疇心能識而觀其賢愚常以𤣥冬夢黄髮之士姓𤣥名明字子真與余寤言言必有中善否之間無所依違命操筆者書之近從建武以来暨于斯今其人既亡行乃可書玉石朱紫由此定矣故謂之決録矣劉攽曰正文著要子章句案要當作孟古書無要子就令有之而岐所作孟子章句傳至今本傳何得反不記也贊曰呉翁温愛義干剛烈謂以義干梁冀爭李固也延史字人風和恩結梁使顯刑誣黨潛絶子幹兼姿逄掖臨師禮記孔子曰丘少居魯衣逄掖之衣鄭𤣥注曰逄猶大也為大掖之衣此君子有道蓺者所衣也相承本作縫義亦通邠卿出疆專命朝威疆界也左傳曰大夫出疆茍利社稷專之可也後漢書卷九十四後漢書卷九十四考證吳祐傳踰越五領注裴氏廣川記諸本同川當作州為祖道注掌王玉路以祀及犯軷犯字監本誤祀從周禮太馭文改正所謂觀過斯知仁矣仁毛本作人何焯曰他本同作人史弼傳聚徒數百仕州郡注悉條諸生聚歛姦吏百餘人諸本同生字疑衍刑竟歸田里刑他本多作弼上云論輸左校刑竟謂徒役期滿也叚熲傳亦有刑竟字今仍監本盧植傳遂隱於上谷上字毛本作山子毓知名注時舉中郎毛本作中書郎趙岐傳因字臺卿注以其祖為御史祖字監本誤作子從毛本改娶扶風馬融兄女注三輔決録注曰注本或作志誤後漢書卷九十四考證
