body:
  text: 後漢書卷五十四宋宣城太守范煜撰唐章懷太子賢注馬援列傳第十四馬援傳子廖子防兄子嚴族孫棱馬援字文淵扶風茂陵人也其先趙奢為趙將號曰馬服君子孫因為氏馬服者言能服馭馬也史記曰趙惠文王以奢有功賜爵號為馬服君武帝時以吏二千石自邯鄲徙焉東觀記曰徙茂陵成懽里曾祖父通以功封重合侯坐兄何羅反被誅重合縣屬勃海郡故城在今滄州樂陵縣東馬何羅與江充相善充既誅遂懼罪及已謀反伏誅事見前書故援再世不顯祖及父不得為顯任東觀漢記通生賓宣帝時以郎持節號使君使君生仲仲官至𤣥武司馬仲生援援三兄況余員東觀記曰況字君平余字聖卿員字季主並有才能王莽時皆為二千石況河南太守余中壘校尉員增山連率援年十二而孤少有大志諸兄竒之嘗受齊詩意不能守章句東觀記曰受齊詩師事潁川蒲昌乃辭況欲就邊郡田牧東觀記曰援以況出為河南太守次兩兄為吏京師見家用不足乃辭況欲就邊郡畜牧也況曰汝大才當晩成良工不示人以朴且從所好從其所請也㑹況卒援行服朞年不離墓所敬事寡㛮不冠不入廬廬舍也後為郡督郵送囚至司命府王莽置司命官上公已下皆糾察囚有重罪援哀而縱之遂亡命北地遇赦因留牧畜賓客多歸附者遂役屬數百家續漢書曰過北地任氏畜牧自援祖賓本客天水父仲又嘗為牧帥令是時員為䕶苑使者故人賓客皆依援轉游隴漢間嘗謂賓客曰丈夫為志窮當益堅老當益壯因處田牧至有牛馬羊數千頭穀數萬斛既而歎曰凡殖貨財產貴其能施賑也否則守錢虜耳乃盡散以班昆弟故舊身衣羊裘皮絝王莽末四方兵起莽從弟衞將軍林廣招雄俊乃辟援及同縣原渉為掾渉字巨先見前書薦之於莽莽以渉為鎭戎大尹王莽改天水為鎭戎改太守為大尹援為新成大尹莽改漢中為新成及莽敗援兄員時為增山連率莽改上郡為增山連卒亦太守也莽法典郡者公為牧侯稱卒正伯稱連率其無封爵者為尹也與援俱去郡復避地凉州世祖即位員先詣洛陽帝遣員復郡卒於官援因留西州隗囂甚敬重之以援為綏德將軍與決籌策是時公孫述稱帝於蜀囂使援往觀之援素與述同里閈說文曰閈閭也杜預注左傳閈閭門也相善以為既至當握手歡如平生而述盛陳陛衞以延援入交拜禮畢使出就館更為援制都布單衣東觀記曰都作荅史記曰荅布千匹前書音義曰荅布白疊布也何承天纂文曰都致錯履無極皆布名方言曰禪衣江淮南楚之間謂之褋關之東西謂之禪衣交讓冠㑹百官於宗廟中立舊交之位述鸞旗旄騎解在公孫述傳警蹕就車磬折而入磬折者屈身如磬之曲折敬也禮饗官屬甚盛欲授援以封侯大將軍位賓客皆樂留援曉之曰天下雄雌未定公孫不吐哺走迎國士哺食也史記周公誡伯禽曰吾一沐三握髮一食三吐哺猶恐失天下士心也與圖成敗反修飾邊幅言若布帛修整其邊幅也左傳曰如布帛之有幅焉為之度使無遷如俑人形禮記曰謂為俑者不仁鄭𤣥云俑偶人也有面目機發有似於生人也俑音勇此子何足久稽天下士乎稽留也因辭歸謂囂曰子陽井底蛙耳言述志識褊狹如坎井之蛙事見莊子而妄自尊大不如專意東方建武四年冬囂使援奉書洛陽援至引見於宣德殿世祖迎笑謂援曰卿遨遊二帝間今見卿使人大慙援頓首辭謝因曰當今之世非獨君擇臣也臣亦擇君矣家語曰君擇臣而任之臣亦擇君而事之臣與公孫述同縣少相善臣前至蜀述陛㦸而後進臣臣今遠來陛下何知非刺客姦人而簡易若是東觀記曰援初到勅令中黃門引入時上在宣德殿南廡下袒幘坐故云簡易也帝復笑曰卿非刺客顧說客耳援曰天下反覆盜名字者不可勝數盜猶竊也今見陛下恢廓大度同符高祖乃知帝王自有眞也帝甚壯之援從南幸黎丘轉至東海及還以為待詔使太中大夫來歙持節送援西歸隴右隗囂與援共卧起問以東方流言及京師得失流猶傳也援說囂曰前到朝廷上引見數十東觀記曰凡十四見每接讌語自夕至旦才明勇略非人敵也且開心見誠無所隱伏闊達多大節略與高帝同經學博覽政事文辯前世無比囂曰卿謂何如高帝援曰不如也高帝無可無不可此論語孔子自言己之所行也今上好吏事動如節度又不喜飲酒囂意不懌曰如卿言反復勝邪然雅信援故遂遣長子恂入質援因將家屬隨恂歸洛陽居數月而無它職任援以三輔地曠土沃而所將賓客猥多乃上書求屯田上林苑中許之㑹隗囂用王元計意更狐疑狐性多疑故曰狐疑援數以書記責譬於囂囂怨援背已得書增怒其後遂發兵拒漢援乃上疏曰臣援自念歸身聖朝奉事陛下本無公輔一言之薦左右為容之助鄒陽書曰蟠木成萬乘之器者左右為之容臣不自陳陛下何因聞之夫居前不能令人輊居後不能令人軒言為人無所輕重也詩云如輊如軒輊音丁利反與人怨不能為人患臣所恥也故敢觸冒罪忌昧死陳誠臣與隗囂本實交友初囂遣臣東謂臣曰本欲為漢願足下往觀之於汝意可即專心矣及臣還反報以赤心實欲導之於善非敢譎以非義而囂自挾姦心盜憎主人左傳晉伯宗妻曰盜憎主人民惡其上怨毒之情遂歸於臣臣欲不言則無以上聞願聽詣行在所極陳滅囂之術得空匈腹申愚策退就隴畝死無所恨帝乃召援計事援具言謀畫因使援將突騎五千往來游說囂將高峻任禹之屬下及羌豪為陳禍福以離囂友黨劉攽曰案文友當作支援又為書與囂將楊廣使曉勸於囂曰春卿無恙春卿楊廣字前别冀南天水冀縣也寂無音驛援間還長安因留上林竊見四海已定兆民同情而季孟閉拒背畔為天下表的表猶標也言為標準為射的也言背叛之罪為天下所指射也常懼海内切齒思相屠裂故遺書戀戀以致側隱之計乃聞季孟歸罪於援而納王游翁諂邪之說游翁王元字也自謂函谷以西舉足可定以今而觀竟何如邪援間至河内過存伯春存猶問也見其奴吉從西方還說伯春小弟仲舒望見吉欲問伯春無它否竟不能言曉夕號泣婉轉塵中又說其家悲愁之狀不可言也夫怨讎可刺不可毁援聞之不自知泣下也援素知季孟孝愛曾閔不過夫孝於其親豈不慈於其子可有子抱三木而跳梁妄作自同分羮之事乎三木者謂桎梏及械也司馬遷曰衣赭關三木分羮謂樂羊也觧見公孫述傳季孟平生自言所以擁兵衆者欲以保全父母之國而完墳墓也又言茍厚士大夫而已而今所欲全者將破亡之所欲完者將毁傷之所欲厚者將反薄之季孟嘗折愧子陽而不受其爵愧猶辱也今更共陸陸陸陸猶碌碌也欲往附之將難為顔乎若復責以重質當安從得子主給是哉往時子陽獨欲以王相待謂欲封為朔寧王也而春卿拒之今者歸老更欲低頭與小兒曹共槽櫪而食併肩側身於怨家之朝乎字林併音卑正反男兒溺死何傷而拘游哉游浮也今國家待春卿意深宜使牛孺卿與諸耆老大人大人謂豪傑也共說季孟若計畫不從眞可引領去矣前披輿地圖見天下郡國百有六所奈何欲以區區二邦以當諸夏百有四乎春卿事季孟外有君臣之義内有朋友之道言君臣邪固當諫爭語朋友邪應有切磋骨曰切象曰磋言朋友之道如切磋以成器也詩云如切如磋如琢如磨豈有知其無成而但萎腇咋舌义手從族乎萎腇耎弱也萎音於偽反腇音乃罪反及今成計殊尚善也過是欲少味矣以食為諭且來君叔天下信士朝廷重之其意依依常獨為西州言援商朝廷尤欲立信於此商度也必不負約援不得久留願急賜報廣竟不答八年帝自西征囂至漆漆縣屬右扶風諸將多以王師之重不宜逺入險阻計冘豫未決冘行貌也義見說文豫亦未定也冘音以林反㑹召援夜至帝大喜引入具以羣議質之廣雅曰質定也援因說隗囂將帥有土崩之勢兵進有必破之狀又於帝前聚米為山谷指畫形勢開示衆軍所從道徑往來分析曲折昭然可曉帝曰虜在吾目中矣明旦遂進軍至第一囂衆大潰第一解見竇融傳九年拜援為太中大夫副來歙監諸將平凉州自王莽末西羌寇邊遂入居塞内金城屬縣多為虜有來歙奏言隴西侵殘非馬援莫能定十一年夏璽書拜援隴西太守援廼發歩騎三千人擊破先零羌於臨洮斬首數百級獲馬牛羊萬餘頭守塞諸羌八千餘人詣援降諸種有數萬屯聚寇鈔拒浩亹隘浩亹音告門縣名屬金城郡浩水名也亹者水流夾山間兩岸深若門也詩曰鳬鷖在亹亦其義也今俗呼此水為閤門河蓋疾言之耳援與揚武將軍馬成擊之羌因將其妻子輜重移阻於允吾谷允吾音鈆牙援乃潛行間道掩赴其營羌大驚潰復遠徙唐翼谷中援復追討之羌引精兵聚北山上援陳軍向山而分遣數百騎繞襲其後乘夜放火擊鼓呌譟虜遂大潰凡斬首千餘級援以兵少不得窮追收其穀糧畜產而還援中矢貫脛帝以璽書勞之賜牛羊數千頭援盡班諸賓客是時朝臣以金城破羌之西破羌縣名屬金城郡故城在今鄯州湟水縣西塗遠多寇議欲棄之援上言破羌以西城多完牢易可依固其田土肥壤無塊曰壤灌溉流通如令羌在湟中湟水名據前書出金城臨羌縣東至允吾入河今鄯州湟水縣取其名也一名樂都水則為害不休不可棄也帝然之於是詔武威太守東觀記曰梁統也令悉還金城客民金城客人在武威者歸者三千餘口使各反舊邑援奏為置長吏繕城郭起塢候字林曰塢小障也一曰小城字或作隖音一古反開導水田勸以耕牧郡中樂業又遣羌豪楊封譬說塞外羌皆來和親又武都氐人背公孫述來降者援皆上復其侯王君長賜印綬帝悉從之乃罷馬成軍十三年武都參狼羌與塞外諸種為寇殺長吏援將四千餘人擊之至氐道縣氐道縣屬隴西郡縣管蠻夷曰道劉攽曰注管當作有是漢書本文後人不曉誤之羌在山上援軍據便地奪其水草不與戰羌遂窮困豪帥數十萬户亡出塞諸種萬餘人悉降於是隴右清靜援務開寛信恩以待下劉攽曰案此不成文理當云開恩信寛以待下任吏以職但總大體而已賓客故人日滿其門諸曹時白外事援輒曰此丞掾之任何足相煩續漢志曰郡當邊戍丞為長史又置諸曹掾史頗哀老子使得遨遊若大姓侵小民黠羌欲旅距此乃太守事耳旅距不從之貌傍縣嘗有報仇者吏民驚言羌反百姓奔入城郭狄道長詣門狄道縣屬隴西郡今蘭州縣也請閉城發兵援時與賓客飲大笑曰燒虜何敢復犯我燒虜即燒羌也曉狄道長歸守寺舍曉喻也寺舍官舍也良怖急者可牀下伏良甚也後稍定郡中服之視事六年徵入為虎賁中郎將初援在隴西上書言宜如舊鑄五銖錢事下三府三府奏以為未可許事遂寢及援還從公府求得前奏難十餘條乃隨牒解釋東觀記曰凡十三難援一一解之條奏其狀也更具表言帝從之天下賴其便援自還京師數被進見為人明須髮眉目如畫東觀記曰援長七尺五寸色理髪膚眉目容貌如畫閑於進對尤善述前世行事每言及三輔長者下至閭里少年皆可觀聽自皇太子諸王侍聞者莫不屬耳忘倦又善兵策帝常言伏波論兵與我意合每有所謀未嘗不用初卷人維汜卷縣名屬河南郡故城在今鄭州原武縣西北訞言稱神有弟子數百人坐伏誅後其弟子李廣等宣言汜神化不死以誑惑百姓十七年遂共聚㑹徒黨攻没皖城皖縣名屬廬江郡今舒州懷寧縣皖音下板反又下管反殺皖侯劉閔自稱南嶽太師遣謁者張宗將兵數千人討之復為廣所敗於是使援發諸郡兵合萬餘人擊破廣等斬之又交阯女子徵側及女弟徵貳反徵側者麊泠縣雒將之女也嫁為朱鳶人詩索妻甚雄勇交阯太守蘇定以法繩之側怨怒故反攻没其郡九眞日南合浦蠻夷皆應之寇略嶺外六十餘城側自立為王於是璽書拜援伏波將軍東觀記曰援上書臣所假伏波將軍印書伏字犬外嚮城臯令印臯字為白下羊丞印四下羊尉印白下人人下羊即一縣長吏印文不同恐天下不正者多符印所以為信也所宜齊同薦曉古文字者事下大司空正郡國印章奏可以扶樂侯劉隆為副扶樂縣名屬九眞郡督樓船將軍叚志等南擊交阯軍至合浦而志病卒詔援并將其兵遂緣海而進隨山刋道千餘里刋除也十八年春軍至浪泊上與賊戰破之斬首數千級降者萬餘人援追徵側等至禁谿數敗之賊遂散走明年正月斬徵側徵貳傳首洛陽越志云徵側兵起都麊泠縣及馬援討之奔入金溪穴中二年乃得之封援為新息侯食邑三千户援乃擊牛釃酒勞饗軍士釃酒濾也詩曰釃酒有藇毛萇注云以筐曰釃釃音所宜反從容謂官屬曰吾從弟少游常哀吾慷慨多大志曰士生一世但取衣食裁足乘下澤車周禮曰車人為車行澤者欲短轂行山者欲長轂短轂則利長轂則安也御款叚馬款猶緩也言形叚遲緩也為郡掾吏守墳墓鄉里稱善人斯可矣致求盈餘但自苦耳當吾在浪泊西里間虜未滅之時下潦上霧毒氣重蒸劉攽曰案文重當作熏仰視飛鳶跕跕墮水中鳶鴟也跕跕墮貌也跕音都牒泰牒二反卧念少游平生時語何可得也今賴士大夫之力被蒙大恩猥先諸君紆佩金紫且喜且慙吏士皆伏稱萬歲援將樓船大小二千餘艘戰士二萬餘人擊九眞賊徴側餘黨都羊等自無功至居風無功居風二縣名並屬九眞郡居風今愛州斬獲五千餘人嶠南悉平嶠嶺嶠也爾雅曰山銳而高曰嶠嶠音渠廟反廣州記曰援到交阯立銅柱為漢之極界也援奏言西于縣户有三萬二千西于縣屬交阯郡故城在今交州龍編縣東也遠界去庭千餘里庭縣庭也請分為封溪望海二縣許之封溪望海縣並屬交阯郡援所過輒為郡縣治城郭穿渠灌溉以利其民條奏越律與漢律駮者十餘事駮乖舛也與越人申明舊制以約束之自後駱越奉行馬將軍故事駱者越别名二十年秋振旅還京師軍吏經瘴疫死者十四五賜援兵車一乘朝見位次九卿援好騎善别名馬於交阯得駱越銅鼓乃鑄為馬式式法也裴氏廣州記曰狸獠鑄銅為皷皷唯高大為貴面闊丈餘初成懸於庭剋晨置酒招致同類來者盈門豪富子女以金銀為大釵執以叩鼔叩竟留遺主人也還上之因表曰夫行天莫如龍行地莫如馬史記平準書曰以為在天莫如龍在地莫如馬馬者甲兵之本國之大用安寧則以别尊卑之序有變則以濟遠近之難昔有騏驥一日千里伯樂見之昭然不惑伯樂秦穆公時善相馬者也桓寛鹽鐵論曰騏驥負鹽車垂頭於太行之坂見伯樂則噴而長鳴近世有西河子輿亦明相法子輿傳西河儀長孺長孺傳茂陵丁君都君都傳成紀楊子阿臣援嘗師事子阿受相馬骨法考之於行事輒有驗効臣愚以為傳聞不如親見視景不如察形今欲形之於生馬則骨法難備具又不可傳之於後孝武皇帝時善相馬者東門京東門姓也京名也鑄作銅馬法獻之有詔立馬於魯班門外則更名魯班門曰金馬門臣謹依儀氏䩭中帛氏口齒謝氏脣鬐丁氏身中備此數家骨相以為法援銅馬相法曰水火欲分明水火在鼻兩孔間也上脣欲急而方口中欲紅而有光此馬千里頷下欲深下脣欲緩牙欲前向牙欲去齒一寸則四百里牙劒鋒則千里目欲滿而澤腹欲充膁欲小季肋欲長縣薄欲厚而緩縣薄股也腹下欲平滿汗溝欲深長而膝本欲起肘腋欲開膝欲方蹄欲厚三寸堅如石䩭音居奇反劉攽曰注牙欲去齒一寸案文多欲字又汗溝欲深長而案文而當在長字上馬高三尺五寸圍四尺四寸有詔置於宣德殿下以為名馬式焉初援軍還將至故人多迎勞之平陵人孟冀名有計謀於坐賀援援謂之曰吾望子有善言反同衆人邪昔伏波將軍路博德開置七郡裁封數百户漢書曰平南越以為南海蒼梧鬱林合浦交阯九眞日南朱崖儋耳九郡今此言七郡則與前書不同也今我微勞猥饗大縣功薄賞厚何以能長久乎先生奚用相濟冀曰愚不及援曰方今匈奴烏桓尚擾北邊欲自請擊之男兒要當死於邊野以馬革裹屍還葬耳何能卧牀上在兒女子手中邪冀曰諒為烈士當如此矣還月餘㑹匈奴烏桓寇扶風援以三輔侵擾園陵危逼因請行許之自九月至京師十二月復出屯襄國襄國縣名屬趙國今邢州龍崗縣也詔百官祖道援謂黃門郎梁松竇固曰凡人為貴當使可賤如卿等欲不可復賤居高堅自持勉思鄙言松後果以貴滿致災固亦幾不免明年秋援乃將三千騎出高栁行鴈門代郡上谷障塞烏桓候者見漢軍至虜遂散去援無所得而還援嘗有疾梁松來候之獨拜牀下援不答松去後諸子問曰梁伯孫帝壻松尚舞隂公主爾雅曰女子之夫為壻貴重朝廷公卿已下莫不憚之大人奈何獨不為禮援曰我乃松父友也松父統也雖貴何得失其序乎禮記曰見父之執不謂之進不敢進不謂之退不敢退不問不敢對鄭𤣥曰敬父同志如事父也松由是恨之二十四年武威將軍劉尚擊武陵五溪蠻夷酈元注水經云武陵有五溪謂雄溪樠溪西溪潕溪辰溪悉是蠻夷所居故謂五溪蠻皆槃瓠之子孫也土俗雄作熊樠作朗潕作武在今辰州界深入軍没援因復請行時年六十二帝愍其老未許之援自請曰臣尚能被甲上馬帝令試之援據鞍顧眄以示可用帝笑曰矍鑠哉是翁也矍鑠勇貌東觀記作矆哉是翁矆音許縛反遂遣援率中郎將馬武耿舒劉匡孫永等將十二郡募士及㢮刑四萬餘人征五溪援夜與送者訣謂友人謁者杜愔曰吾受厚恩年迫餘日索索盡也常恐不得死國事今獲所願甘心瞑目但畏長者家兒或在左右或與從事殊難得調介介獨惡是耳長者家兒謂權要子弟等介介猶耿耿也明年春軍至臨鄉東觀記曰二月到武陵臨鄉也遇賊攻縣援迎擊破之斬獲二千餘人皆散走入竹林中初軍次下雋下雋縣名屬長沙國故城今辰州沅陵縣雋音字兗反有兩道可入從壺頭則路近而水嶮壺頭山名也在今辰州沅陵東武陵記曰此山頭與東海方壺山相似神仙多所游集因名壺頭山也從充則塗夷而運遠充縣名屬武陵郡充音昌容反帝初以為疑及軍至耿舒欲從充道援以為弃日費糧不如進壺頭搤其喉咽搤拊也充賊自破以事上之帝從援策三月進營壺頭賊乘高守隘水疾舩不得上㑹暑甚士卒多疫死援亦中病遂困乃穿岸為室以避炎氣武陵記曰壺頭山邊有石窟即援所穿室也室内有蛇如百斛舩大云是援之餘靈也賊每升險鼓譟援輒曵足以觀之左右哀其壯意莫不為之流涕耿舒與兄好畤侯弇書曰前舒上書當先擊充糧雖難運而兵馬得用軍人數萬爭欲先奮今壺頭竟不得進大衆怫鬱行死誠可痛惜前到臨鄉賊無故自致若夜擊之即可殄滅伏波類西域賈胡到一處輒止言似商胡所至之處輒停留賈音古以是失利今果疾疫皆如舒言弇得書奏之帝乃使虎賁中郎將梁松乘驛責問援因代監軍㑹援病卒松宿懷不平以援往受其拜遂因事陷之帝大怒追收援新息侯印綬初兄子嚴敦並喜譏議並余之子也喜音許吏反而通輕俠客援前在交阯還書誡之曰吾欲汝曹聞人過失如聞父母之名耳可得聞口不可得言也好論議人長短妄是非正法謂譏刺時政也此吾所大惡也寧死不願聞子孫有此行也汝曹知吾惡之甚矣所以復言者施衿結褵申父母之戒說文曰衿交衽也詩云親結其褵毛萇注云褵婦人之褘也女施衿結帨爾雅曰褵緌也郭璞注曰即今之香纓也儀禮父戒女曰戒之敬之夙夜無違命母戒之曰戒之敬之夙夜無違宮事也欲使汝曹不忘之耳龍伯高敦厚周愼口無擇言謙約節儉廉公有威吾愛之重之願汝曹効之杜季良豪俠好義憂人之憂樂人之樂清濁無所失輕重合宜父喪致客數郡畢至吾愛之重之不願汝曹効也効伯高不得猶為謹勅之士所謂刻鵠不成尚類鶩者也鶩鴨也効季良不得陷為天下輕薄子所謂畫虎不成反類狗者也訖今季良尚未可知郡將下車輒切齒州郡以為言吾常為寒心是以不願子孫効也季良名保京兆人時為越騎司馬續漢書曰越騎司馬秩千石保仇人上書訟保為行浮薄亂羣惑衆伏波將軍萬里還書以誡兄子而梁松竇固以之交結將扇其輕偽敗亂諸夏書奏帝召責松固以訟書及援誡書示之松固叩頭流血而得不罪詔免保官伯高名述亦京兆人為山都長山都縣屬南陽郡故城在今襄州義清縣東北今名固城也由此擢拜零陵太守今永州也初援在交阯常餌薏苡實用能輕身省慾以勝瘴氣神農本草經曰薏苡味甘微寒主風濕痺下氣除筋骨邪氣久服輕身益氣南方薏苡實大援欲以為種軍還載之一車時人以為南土珍怪權貴皆望之援時方有寵故莫以聞及卒後有上書譖之者以為前所載還皆明珠文犀犀之有文彩也馬武與於陵侯侯昱等昱司徒侯霸之子也皆以章言其狀帝益怒援妻孥惶懼不敢以喪還舊塋裁買城西數畝地槀葬而已裁僅也與纔同槀草也以不歸舊塋時權葬故稱槀賓客故人莫敢弔㑹嚴與援妻子草索相連詣闕請罪帝乃出松書以示之方知所坐上書訴寃前後六上辭甚哀切然後得葬又前雲陽令同郡朱勃詣闕上書曰臣聞王德聖政不忘人之功周書曰記人之功忘人之過宜為君也採其一美不求備於衆論語周公謂魯公曰不使大臣怨乎不以無求備於一人故高祖赦蒯通而以王禮葬田橫蒯通說韓信背漢高祖徵通至釋不誅田橫初自稱齊王漢定天下橫猶以五百人保於海島高祖追橫橫自殺以王禮葬之並見前書也大臣曠然咸不自疑夫大將在外讒言在内㣲過輒記大功不計誠為國之所愼也故章邯畏口而奔楚章邯為秦將使人請事至咸陽趙高不見有不信之心使還報邯畏趙高讒之遂降項羽燕將據聊而不下史記曰燕將攻下聊城人或讒之於燕燕將懼誅因保守聊城不敢歸聊即今博州聊城縣也豈其甘心末規哉悼巧言之傷類也未規猶下計也詩云巧言如簧類善也竊見故伏波將軍新息侯馬援拔自西州欽慕聖義間關險難間關猶崎嶇也觸冒萬死孤立羣貴之間傍無一言之佐馳深淵入虎口豈顧計哉戰國策曰魏安釐王畏秦將入朝周訢止之王曰許綰為我咒曰若入不出請徇寡人以首周訢對曰今有人謂臣入不測之泉而徇臣以鼠首可乎綰之首猶鼠首也内王于不測之秦而徇王以首竊為王不取也司馬遷書曰垂餌虎口又曰夫人臣出萬死不顧一生之計赴公家之難謂援使隗囂也寧自知當要七郡之使徼封侯之福邪八年車駕西討隗囂國計狐疑衆營未集援建宜進之策卒破西州及吳漢下隴冀路斷隔唯獨狄道為國堅守士民饑困寄命漏刻援奉詔西使鎭慰邊衆乃招集豪傑曉誘羌戎謀如涌泉埶如轉規規員也孫子曰戰如轉員石於萬仞之山者埶也遂救倒懸之急孟子曰當今之時行仁政人悅之猶解於倒懸也存幾亡之城幾音祈幾近也兵全師進因糧敵人隴冀略平而獨守空郡守音式授反兵動有功師進輒克誅鋤先零緣入山谷猛怒力戰飛矢貫脛又出征交阯土多瘴氣援與妻子生訣無悔吝之心吝猶恨也遂斬滅徵側克平一州南海蒼梧鬱林合浦交阯日南九眞皆屬交州間復南討立陷臨鄉師已有業未竟而死吏士雖疫援不獨存夫戰或以久而立功或以速而致敗深入未必為得不進未必為非人情豈樂久屯絶地不生歸哉惟援得事朝廷二十二年北出塞漠南渡江海觸冒害氣僵死軍事僵仆也名滅爵絶國土不傳海内不知其過衆庶未聞其毁卒遇三夫之言橫被誣罔之讒韓子曰龐共與魏太子質於邯鄲共謂魏王曰今一人言市有虎王信乎王曰否二人言信乎王曰否三人言王信乎曰寡人信龐共曰夫市無虎明矣然三人言誠市有虎今邯鄲去魏遠於市謗臣者過三人願主熟察之家屬杜門葬不歸墓怨隙並興宗親怖慄死者不能自列生者莫為之訟臣竊傷之夫明主醲於用賞約於用刑高祖嘗與陳平金四萬斤以間楚軍不問出入所為豈復疑以錢穀間哉夫操孔父之忠而不能自免於讒此鄒陽之所悲也史記鄒陽書曰昔者魯聽季孫之說而逐孔子宋信子罕之計而囚墨翟夫以孔墨之辯不能自免於讒諛詩云取彼讒人投畀豺虎豺虎不食投畀有北有北不受投畀有昊詩小雅巷伯篇也畀與也昊昊天也投與昊天制其罰也此言欲令上天而平其惡惟陛下留思豎儒之言言其僮豎無知也高祖曰豎儒幾敗吾事無使功臣懷恨黃泉臣聞春秋之義罪以功除公羊傳曰夏滅項孰滅之齊滅之曷為不言齊滅為桓公諱也以桓公常有繼絶存亡之功故君子為之諱也聖王之祀臣有五義禮記曰夫聖王之制祀也法施於人則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之能捍大患則祀之若援所謂以死勤事者也願下公卿平援功罪宜絶宜續以厭海内之望臣年已六十常伏田里竊感欒布哭彭越之義前書曰彭越為梁王欒布為梁大夫使於齊越以謀反梟首洛陽詔有收視者捕之布使還奏事越頭下祠而哭之冒陳悲憤戰慄闕庭書奏報歸田里勃字叔陽年十二能誦詩書常候援兄況勃衣方領能矩歩續漢書曰勃能說韓詩前書音義曰頸下施衿領正方學者之服也矩歩者囬旋皆中規矩辭言嫺雅嫺音閑􅈺雅猶沈靜也司馬相如曰雍容嫺雅援裁知書見之自失況知其意乃自酌酒慰援曰朱勃小器速成智盡此耳卒當從汝禀學勿畏也禀受也朱勃未二十右扶風請試守渭城宰渭城縣名故城在今咸陽縣東北前書音義曰試守者試守一歲乃為眞食其全俸及援為將軍封侯而勃位不過縣令援後雖貴常待以舊恩而卑侮之勃愈身自親及援遇讒唯勃能終焉肅宗即位追賜勃子穀二千斛東觀記曰章帝下詔曰告平陵令丞縣人故雲陽令朱勃建武中以伏波將軍爵土不傳上書陳狀不顧罪戾懷旌善之志有烈士之風詩云無言不讎無德不報其以縣見穀二千斛賜勃子若孫勿令遠詣闕謝初援兄子壻王磐子石子石磐字也王莽從兄平阿侯仁之子也莽敗磐擁富貲居故國為人尚氣節而愛士好施有名江淮間後游京師與衞尉隂興大司空朱浮齊王章共相友善援謂姊子曹訓曰王氏廢姓也子石當屏居自守而反游京師長者長者謂豪俠者也用氣自行多所陵折其敗必也後歲餘磐果與司𨽻校尉蘇鄴丁鴻事相連坐死洛陽獄而磐子肅復出入北宮及王侯邸第援謂司馬呂种曰是援行軍之司馬也建武之元名為天下重開自今以往海内日當安耳但憂國家諸子並壯而舊防未立舊防諸侯王子不許交通賓客若多通賓客則大獄起矣卿曹戒愼之及郭后薨有上書者以為肅等受誅之家客因事生亂劉攽曰按肅即是受誅之家不當云客蓋是容字容有此事也慮致貫高任章之變張敖為趙王其相貫高高祖不禮趙王高恥之置人壁中欲害高祖又任章父宣霍氏女壻坐謀反誅宣帝祠昭帝廟章乃立服夜入廟待帝至欲為逆發覺伏誅並見前書帝怒乃下郡縣收捕諸王賓客更相牽引死者以千數呂种亦豫其禍臨命歎曰馬將軍誠神人也永平初援女立為皇后顯宗圖畫建武中名臣列將於雲臺雲臺在南宮也以椒房故獨不及援東平王蒼觀圖言於帝曰何故不畫伏波將軍像帝笑而不言至十七年援夫人卒乃更修封樹起祠堂建初三年肅宗使五官中郎將持節追䇿諡援曰忠成侯四子廖防光客卿客卿幼而岐嶷年六歲能應接諸公專對賓客嘗有死罪亡命者來過客卿逃匿不令人知外若訥而内沈敏援甚奇之以為將相器故以客卿字焉張儀虞卿並為客卿故取名焉事見史記援卒後客卿亦夭没論曰馬援騰聲三輔遨游二帝及定節立謀以干時主將懐負鼎之願蓋為千載之遇焉伊尹負鼎以干湯光武與竇融書曰千載之遇也然其戒人之禍智矣謂誡竇固梁松王磐呂种等皆如所言也而不能自免於讒隙豈功名之際理固然乎居功名之地讒構易興而能免之者少矣夫利不在身以之謀事則智慮不私己以之斷義必厲誠能囬觀物之智而為反身之察若施之於人則能恕自鑒其情亦明矣見人之謂智自見之謂明以自見之明為見人之用其於物理豈不通乎廖字敬平少以父任為郎東觀記曰廖少習易經清約沈靜援擊武谿無功卒于師廖不得嗣爵明德皇后旣立拜廖為羽林左監虎賁中郎將顯宗崩受遺詔典掌門禁遂代趙熹為衞尉肅宗甚尊重之時皇太后躬履節儉事從簡約廖慮美業難終上疏長樂宮以勸成德政曰臣案前世詔令以百姓不足起於世尚奢靡故元帝罷服官前書音義曰齊國舊有三服之官春獻冠幘縰為首服紈素為冬服輕綃為夏服元帝約省故罷之成帝御浣衣哀帝去樂府哀帝即位詔罷鄭衞之音減郊祭及武樂等人數也然而侈費不息至於衰亂者百姓從行不從言也書曰違上所命從厥攸好夫改政移風必有其本傳曰吳王好劒客百姓多創瘢楚王好細腰宮中多餓死墨子曰楚靈王好細腰而國多餓人也長安語曰當時諺也城中好高髻四方高一尺城中好廣眉四方且半額城中好大袖四方全匹帛斯言如戲有切事實前下制度未幾後稍不行劉攽曰案文有未幾則不當更有後字蓋本是復字也雖或吏不奉法良由慢起京師今陛下躬服厚繒斥去華飾素簡所安發自聖性言儉素約簡后之所安此誠上合天心下順民望浩大之福莫尚於此陛下旣已得之自然猶宜加以勉朂法太宗之隆德戒成哀之不終太宗孝文也𤣥黙為化身衣弋綈成帝下詔務崇儉約禁斷綺縠女樂嫁娶葬埋過制唯青綠人所常服不禁哀帝初即位易帷帳去錦繡乘輿席緣綈繒而已成帝以趙飛燕哀帝以董賢為儉並不終易曰不恒其德或承之羞恒卦九三爻辭也巽下震上鄭𤣥注云巽為進退不恒其德之象又互體兌兌為毁折後將有羞辱也誠令斯事一竟竟猶終也則四海誦德聲薰天地薫猶蒸也言芳聲薫天地也神明可通金石可勒而況於行仁心乎況於行令乎願置章坐側以當瞽人夜誦之音瞽人無目者也古者瞽師教國子誦六詩前書禮樂志云乃采詩夜誦夜誦者其辭或祕不可宣露故於夜中歌誦也太后深納之朝廷大議輒以詢訪廖性質誠畏愼不愛權埶聲名盡心納忠不屑毁譽王逸注楚詞云屑顧也有司連據舊典奏封廖等累讓不得已建初四年遂受封為順陽侯以特進就第每有賞賜輒辭讓不敢當京師以是稱之子豫為歩兵校尉太后崩後馬氏失埶廖性寛緩不能教勒子孫豫遂投書怨誹又防光奢侈好樹黨與八年有司奏免豫遣廖防光就封豫隨廖歸國考擊物故物無也故事也謂死也後詔還廖京師永元四年卒和帝以廖先帝之舅厚加􅈖賻使者弔祭王主㑹喪諡曰哀侯子遵嗣徙封程鄉侯遵卒無子國除元初三年鄧太后詔封廖孫度為潁陽侯防字江平永平十二年與弟光俱為黃門侍郎肅宗即位拜防中郎將稍遷城門校尉建初二年金城隴西保塞羌皆反羌東吾燒當之後也以其父滇吾降漢乃入居塞内故稱保塞拜防行車騎將軍事以長水校尉耿恭副將北軍五校兵及諸郡積射士三萬人擊之軍到冀而羌豪布橋等圍南部都尉於臨洮防欲救之臨洮道險車騎不得方駕防乃别使兩司馬將數百騎分為前後軍去臨洮十餘里為大營多樹幡幟揚言大兵旦當進羌候見之馳還言漢兵盛不可當明旦遂鼓譟而前羌虜驚走因追擊破之斬首虜四千餘人遂解臨洮圍防開以恩信燒當種皆降唯布橋等二萬餘人在臨洮西南望曲谷酈元注水經云望曲在臨洮西南去龍桑城二百里十二月羌又敗耿恭司馬及隴西長史於和羅谷死者數百人明年春防遣司馬夏駿將五千人從大道向其前潛遣司馬馬彭將五千人從間道衝其心腹又令將兵長史李調等將四千人繞其西三道俱擊復破之斬獲千餘人得牛羊十餘萬頭羌退走夏駿追之反為所敗防乃引兵與戰於索西又破之索西縣名故城在今岷州和政縣東亦名臨洮東城亦謂之赤城沙州記云從東洮至西洮一百二十里東洮即謂此城布橋迫急將種人萬餘降詔徵防還拜車騎將軍城門校尉如故防貴寵最盛與九卿絶席光自越騎校尉遷執金吾四年封防潁陽侯光為許陽侯兄弟二人各六千户防以顯宗寢疾入參醫藥又平定西羌增邑千三百五十户屢上表讓位俱以特進就第皇太后崩明年拜防光祿勲光為衞尉防數言政事多見採用是冬始施行十二月迎氣樂防所上也解見章帝紀子鉅為常從小侯以小侯故得常從也六年正月以鉅當冠禮記曰二十弱冠儀禮曰士冠筮於廟門主人𤣥冠朝服有司如主人服卒筮旅占告吉若不吉即筮遠日如初前期三日筮賓如筮日之儀陳服于房中西墉下東領北上始加緇布冠次皮弁次加爵弁嫡子冠于阼以著代也三加而彌尊冠而字之敬其名也祝曰令月吉辰加爾元服棄爾幼志順爾成德劉攽曰注士冠筮于廟門案文少一日字特拜為黃門侍郎肅宗親御章臺下殿陳鼎爼自臨冠之明年防復以病乞骸骨詔賜故中山王田廬中山王焉以郭太后少子故獨留京師建武三十年徙封中山永平二年就國故以其田廬賜防也以特進就第防兄弟貴盛奴婢各千人已上資產巨億皆買京師膏腴美田又大起第觀連閣臨道彌亘街路多聚聲樂曲度比諸郊廟曲度謂曲之節度也賓客奔湊四方畢至京兆杜篤之徒數百人常為食客居門下刺史守令多出其家歲時賑給鄉閭故人莫不周給防又多牧馬畜賦歛羌胡帝不喜之數加譴勅所以禁遏甚備由是權埶稍損賓客亦衰八年因兄子豫怨謗事有司奏防兄弟奢侈踰僭濁亂聖化悉免就國臨上路詔曰舅氏一門俱就國封四時陵廟無助祭先后者朕甚傷之其令許侯思愆田廬有司勿復請留之於京守田廬而思愆過也以慰朕渭陽之情渭陽詩秦風也秦康公送舅晉文公于渭之陽念母之不見也其詩曰我見舅氏如母存焉光為人小心周密喪母過哀東觀記曰光遭母喪哀慟感傷形骸骨立帝以是特親愛之乃復位特進子康黃門侍郎永元二年光為太僕康為侍中及竇憲誅光坐與厚善復免就封後憲奴誣光與憲逆自殺東觀記曰奴名玉當初竇氏有事玉當亡私從光乞不與恨去懷挾欲中光官捕得玉當因告言光與憲有惡謀光以被誣不能自明乃自殺光死後憲他奴郭扈自出證明光憲無惡謀光子朗上書迎光喪葬舊塋詔許之家屬歸本郡本郡復殺康而防及廖子遵皆坐徙封丹陽防為翟鄉侯租歲限三百萬不得臣吏民防後以江南下溼上書乞歸本郡和帝聽之十三年卒子鉅嗣後為長水校尉永初七年鄧太后詔諸馬子孫還京師隨四時見㑹如故事復紹封光子朗為合鄉侯嚴字威卿父余王莽時為揚州牧嚴少孤東觀記曰余卒時嚴七歲依姊壻父九江連率平河侯王述明年母復終㑹述失郡居沛郡建武三年余外孫右扶風曹貢為梧安侯相迎嚴歸養視之至四年叔父援從車駕東征過梧安乃將兄弟西嚴年十三至雒陽留寄郎朱仲孫舍大奴歩䕶視之也而好擊劒習騎射東觀記曰嚴從其故門生肆都學擊劒習騎射劉攽曰注其故門生案門生無故者當是叔字其叔門生也後乃白援從平原楊太伯講學專心墳典能通春秋左氏東觀記曰從司徒祭酒陳元受之因覽百家羣言遂交結英賢京師大人咸器異之大人長者之稱也仕郡督郵援常與計議委以家事弟敦字孺卿亦知名援卒後嚴乃與敦俱歸安陵居鉅下決錄注曰鉅下地名也三輔稱其義行號曰鉅下二卿明德皇后既立嚴乃閉門自守猶復慮致譏嫌遂更徙北地斷絶賓客永平十五年皇后勅使移居洛陽顯宗召見嚴進對閑雅意甚異之有詔留仁壽闥與校書郎杜撫班固等雜定建武注記常與宗室近親臨邑侯劉復等論議政事甚見寵幸後拜將軍長史將北軍五校士羽林禁兵三千人屯西河美稷美稷縣名衞䕶南單于聽置司馬從事牧守謁敬同之將軍勅嚴過武庫祭蚩尤武庫掌兵器令一人秩六百石前書音義曰蚩尤古天子好五兵故今祭之見高祖紀帝親御阿閣阿曲也觀其士衆時人榮之肅宗即位徵拜侍御史中丞除子鱄為郎鱄音時兖反令觀學省中勸勉也前書王鳯薦班伯於成帝宜勸學召見宴昵殿是也其冬有日食之災嚴上封事曰臣聞日者衆陽之長食者隂侵之徵書曰無曠庶官天工人其代之尚書咎繇之詞言王者代天官人也故考績黜陟以明襃貶尚書曰三載考績三考黜陟幽明無功不黜明隂盛陵陽臣伏見方今刺史太守專州典郡不務奉事盡心為國而司察偏阿取與自己同則舉為尤異異則中以刑法中音丁仲反不即垂頭塞耳採取財賂今益州刺史朱酺揚州刺史倪說倪音五兮反說音悅凉州刺史尹業等每行考事輒有物故考按也又選舉不實曾無貶坐是使臣下得作威福也故事州郡所舉上奏司直察能否以懲虛實前書武帝元狩五年初置司直比二千石掌佐丞相舉不法續漢書曰光武以武帝故事置司直居丞相府助督錄諸州建武十八年省之今宜加防檢式遵前制舊丞相御史親治職事唯丙吉以年老優游不案吏罪丙吉字少卿魯人也宣帝時為丞相掾史有罪終無所驗公府不按吏自吉始也見前書於是宰府習為常俗更共罔養以崇虚名罔養猶依違也或未曉其職便復遷徙誠非建官賦祿之意宜勅正百司各責以事州郡所舉必得其人若不如言裁以法令傳曰上德以寛服民其次莫如猛故火烈則人望而畏之水懦則人狎而翫之為政者寛以濟猛猛以濟寛左傳鄭子產誡子太叔為政之詞也如此綏御有體災眚消矣眚亦災也書奏帝納其言而免酺等官建初元年遷五官中郎將除三子為郎嚴數薦達賢能申解寃結多見納用復以五官中郎將行長樂衞尉事二年拜陳留太守嚴當之職乃言於帝曰昔顯親侯竇固誤先帝出兵西域置伊吾盧屯煩費無益又竇勲受誅其家不宜親近京師是時勲女為皇后竇氏方寵時有側聽嚴言者以告竇憲兄弟由是失權貴心嚴下車明賞罰發姦慝郡界清靜時京師訛言賊從東方來百姓奔走轉相驚動諸郡遑急各以狀聞嚴察其虛妄獨不為備詔書勑問使驛係道嚴固執無賊後卒如言典郡四年坐與宗正劉軼少府丁鴻等更相屬託徵拜太中大夫十餘日遷將作大匠七年復坐事免後既為竇氏所忌遂不復在位及帝崩竇太后臨朝嚴乃退居自守訓教子孫永元十年卒於家時年八十二弟敦官至虎賁中郎將嚴七子謂固伉歆鱄融留續唯續融知名續字季則七歲能通論語十三明尚書十六治詩博觀羣籍善九章算術劉徽九章算術曰方田第一粟米第二差分第三少廣第四商功第五均輸第六盈不足第七方程第八句股第九順帝時為䕶羌校尉遷度遼將軍所在有威恩稱融自有傳棱字伯威援之族孫也少孤依從兄毅共居業恩猶同產毅卒無子棱心喪三年東觀記曰毅張掖屬國都尉建初中仕郡功曹舉孝廉及馬氏廢肅宗以棱行義徵拜謁者章和元年遷廣陵太守時穀貴民饑奏罷鹽官以利百姓賑貧羸薄賦稅興復陂湖溉田二萬餘頃吏民刻石頌之東觀記曰棱在廣陵蝗虫入江海化為魚蝦興復陂湖增歲租十餘萬斛永元二年轉漢陽太守有威嚴稱大將軍竇憲西屯武威棱多奉軍費侵賦百姓憲誅坐抵罪後數年江湖多劇賊以稜為丹陽太守棱發兵掩擊皆禽滅之轉㑹稽太守治亦有聲轉河内太守永初中坐事抵罪卒于家贊曰伏波好功爰自冀隴南靜駱越西屠燒種徂年已流壯情方勇明德既升家祚以興廖乏三趣防遂驕陵左氏傳曰宋正考甫三命滋益恭一命而僂再命而傴三命而俯循牆而走亦莫余敢侮後漢書卷五十四後漢書卷五十四考證馬援傳援三兄况余員注况字君平一本作字長平嘗受齊詩意不能守章句注師事潁川滿昌監本作蒲昌臣㑹汾按王莽傳滿昌為講詩祭酒今從宋本改開置七郡注漢書曰平南越以為九郡今此言七郡與前書不同臣㑹汾按九郡乃武帝紀中語至昭帝始元五年罷儋耳元帝初元三年罷珠厓故前書地理志交州刺史部止有七郡此注言與前書不同殆失考耳馬援子廖鄧太后詔封廖孫度為潁陽侯詔當作紹後漢書卷五十四考證
