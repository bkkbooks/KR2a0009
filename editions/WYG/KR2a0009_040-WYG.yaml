body:
  text: 後漢書卷四十梁剡令劉昭補并注輿服志第三十輿服下冕冠冠爵弁長冠冠通天委貌冠逺遊冠皮弁冠高山冠進賢冠方山冠法冠冠巧士武冠冠却非建華冠却敵冠樊噲冠佩刀術氏冠印鶡冠綬黄赤幘綬赤綠綬黄綬紫綬綸青紺青綬人服黒綬后夫上古穴居而野處衣毛而冒皮未有制度後世聖人易之以絲麻觀翬翟之文榮華之色乃染帛以效之始作五采成以為服見鳥獸有冠角􅏋胡之制遂作冠冕纓蕤以為首飾凡十二章故易曰庖犧氏之王天下也仰觀象於天俯觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物於是始作八卦以通神明之徳以類萬物之情黄帝堯舜垂衣裳而天下治蓋取諸乾巛乾巛有文故上衣𤣥下裳黄日月星辰山龍華蟲孔安國注尚書曰華象草華蟲雉也作繢宗彝古文尚書繢作㑹孔安國曰以五采成此畫焉宗廟彝樽亦以山龍華蟲為飾藻火粉米孔安國曰藻水草有文者火為火字粉若粟米米若聚米黼黻絺繡孔安國曰黼若斧形黻為兩已相背葛之精者曰絺五色備曰繡杜預注左傳曰白與黒謂之黼黒與青謂之黻以五采章施于五色作服孔安國曰以五采明施于五色作尊卑之服天子備章鄭𤣥周禮注曰此古天子冕服十二章公自山以下侯伯自華蟲以下子男自藻火以下卿大夫自粉米以下至周而變之以三辰為旂旗王祭上帝則大裘而冕鄭衆曰大裘羔裘服以祀天示質也公侯卿大夫之服用九章以下鄭𤣥曰華蟲五色之蟲周禮繢人職曰鳥獸蛇雜四時五色之位以章之謂是也王者相變至周而以日月星辰畫於旌旗所謂三辰旂旗昭其明也而冕服九章初一曰龍次二曰山次三曰華蟲次四曰火次五曰宗彝皆畫以為繢次六曰藻次七曰粉米次八曰黼次九曰黻皆絺以為繡則衮之衣五章裳四章凡九也鷩畫以雉為華蟲也其衣三章裳四章凡七也毳畫虎蜼謂宗彝也其衣三章裳二章凡五也絺刺粉米無畫也其衣一章裳二章凡三也法言曰聖人文質備也車服以章之藻色以明之聲音以揚之詩書以光之籩豆不陳玉帛不分琴瑟不鏗鐘鼔不鏘吾無以見乎聖也秦以戰國即天子位滅去禮學郊祀之服皆以袀𤣥漢承秦故至世祖踐祚都于土中始修三雍正兆七郊顯宗遂就大業初服旒冕衣裳文章赤舄絇屨以祠天地養三老五更於三雍于時致治平矣天子三公九卿特進侯侍祠侯祀天地明堂皆冠旒冕衣裳𤣥上纁下東觀書曰永平二年正月公卿議春南北郊東平王蒼議曰孔子曰行夏之時乗殷之輅服周之冕為漢制法髙皇帝始受命創業制長冠以入宗廟光武受命中興建明堂立辟雍陛下以聖明奉遵以禮服龍衮祭五帝禮缺樂崩久無祭天地冕服之制按尊事神祇絜齋盛服敬之至也日月星辰山龍華藻天王衮冕十有二旒以則天數旂有龍章日月以備其文今祭明堂宗廟圓以法天方以則地服以華文象其物宜以降神明肅雍備思博其類也天地之禮冕冠裳衣宜如明堂之制乗輿備文日月星辰十二章三公諸侯用山龍九章九卿以下用華蟲七章皆備五采大佩赤舄絇履以承大祭百官執事者冠長冠皆祗服五嶽四瀆山川宗廟社稷諸沾秩祠皆袀𤣥長冠五郊各如方色云百官不執事各服常冠袀𤣥以從冕冠垂旒前後􅃉延䆳垂也延冕上覆玉藻周禮曰五采繅十有二就皆五采王十有二玉笄朱紘鄭𤣥注曰繅雜文之名也合五采絲為之繩垂於延之前後各十二所謂䆳延也就成也繩之每一帀而貫五采王十有二旒則十二玉也每就間蓋一寸朱紘以朱組為紘也紘一條屬兩端於武此為衮衣之冕十二旒則用玉二百八十八鷩衣之冕繅九旒用玉二百一十六毳衣之冕七旒用玉百六十八絺衣之冕五旒用玉百二十𤣥衣之冕三旒用玉七十二孝明皇帝永平二年初詔有司采周官禮記尚書臯陶篇乗輿服從歐陽氏説公卿以下從大小夏侯氏説冕皆廣七寸長尺二寸前圓後方朱綠裏𤣥上前垂四寸後垂三寸係白玉珠為十二旒以其綬采色為組纓説文曰組綬屬也小者以為冕纓焉禮記曰𤣥冠朱組纓天子之服是也三公諸侯七旈青玉為珠卿大夫五旈黒玉為珠獨斷曰三公諸侯九旈卿七旒與此不同皆有前無後各以其綬采色為組纓旁垂黈纊吕忱曰黈黄色也黄綿為之禮緯曰旒垂目纊塞耳王者示不聴讒不視非也薛綜曰以珩玉為充耳也詩云充耳琇瑩毛萇傳曰充耳謂之瑱天子玉瑱琇瑩美石也諸侯以石郊天地宗祀明堂則冠之蔡邕曰鄙人不識謂之平天冠衣裳玉佩備章采乗輿刺史公侯九卿以下皆織成陳留襄邑獻之云長冠一曰齋冠髙七寸廣三寸促漆纚為之制如板以竹為裏初髙祖微時以竹皮為之謂之劉氏冠楚冠制也民謂之鵲尾冠非也祀宗廟諸祀則冠之皆服袀𤣥獨斷曰袀紺繒也吳都賦曰袀皁服也絳緣領袖為中衣絳絝􅙋示其赤心奉神也五郊衣幘絝􅙋各如其色此冠髙祖所造故以為祭服尊敬之至也委貌冠皮弁冠同制長七寸髙四寸制如覆杯前髙廣後卑銳所謂夏之母追殷之章甫也委貌以皁絹為之皮弁以鹿皮為之行大射禮於辟雍公卿諸侯大夫行禮者冠委貌衣𤣥端素裳鄭衆周禮傳曰衣有􅃭裳者為端鄭𤣥曰謂之端取其正也正者士之衣袂皆二尺二寸而屬幅是廣袤等也其袪尺二寸大夫以上侈之侈之者蓋半而益一焉半而益一則其袂三尺三寸袪尺八寸執事者冠皮弁衣緇麻衣皁領袖下素裳所謂皮弁素積者也皮弁質也石渠論𤣥冠朝服戴聖曰𤣥冠委貌也朝服布上素下緇帛帶素韋韠白虎通曰三王共皮弁素積素積者積素以為裳也言要中辟積也爵弁一名冕廣八寸長尺二寸如爵形前小後大繒其上似爵頭色有収持笄所謂夏収殷冔者也獨斷曰殷黒而微白前大而後小夏純黒亦前小而後大皆以三十六升漆布為之詩云常服黼冔書曰王與大夫盡弁上古皆以布中古以絲孔子曰麻冕禮也今也純儉祠天地五郊明堂雲翹舞樂人服之禮曰朱干玉鏚鄭𤣥曰朱干赤大盾也鏚斧也冕而舞大夏此之謂也通天冠髙九寸正豎頂少邪却乃直下為鐵卷梁前有山展筩為述乗輿所常服獨斷曰漢受之秦禮無文服衣深衣制有袍隨五時色袍者或曰周公抱成王宴居故施袍禮記孔子衣縫掖之衣縫掖其袖合而縫大之近今袍者也今下至賤更小史皆通制袍單衣皁緣領袖中衣為朝服云逺遊冠制如通天有展筩横之於前無山述諸王所服也獨斷曰禮無文髙山冠一曰側注制如通天不邪却直豎無山述展筩獨斷曰鐵為卷梁髙九寸漢書音義曰其體側立而曲注中外官謁者僕射所服太傅胡廣說曰髙山冠蓋齊王冠也秦滅齊以其君冠賜近臣謁者服之史記酈生初見髙祖儒衣而冠側注漢舊儀曰乗輿官髙山冠飛月之纓幘耳赤丹紈裏衣帶七尺斬蛇劒履虎尾絇履案此則亦通于天子進賢冠古緇布冠也文儒者之服也前髙七寸後髙三寸長八寸公侯三梁胡廣曰車駕廵狩幸其國諸侯衣𤣥端之衣冠九旒之冕其盛法服以就位也今列侯自不奉朝請侍祠祭者不得服此皆當三梁冠皁單衣其歸國流黄衣皁云晉公卿禮秩曰太傅司空司徒著進賢三梁冠黒介幘中二千石以下至博士兩梁自博士以下至小史私學弟子皆一梁宗室劉氏亦兩梁冠示加服也獨斷曰漢制禮無文荀綽晉百官表注曰建光中尚書陳忠以為令史質堪上言太官宜著兩梁尚書孟希奏太官職在鼎俎不列陛位堪欲令比大夫兩梁冠不宜許臣伏惟太官令職在典掌王饔統六清之飲列八珍之饌正百品之羞納四方之貢所奉尤重用思又勤明詔慎口實之御防有敗之姦増崇其選侍御史主捕案太醫令奉方藥供養符節令掌幡信金虎故位從大夫車有韜沂冠有兩梁所以殊親疎别内外也太官令以供養言之為最親近以職事言之為最煩多令又髙選又執法比太醫令科同服等而冠二人殊名實不副又博士秩卑以其傳先王之訓故尊而異之令服大夫之冕猶此言之兩梁冠非必列於陛位也建初中太官令兩梁冠春秋之義大於復古如堪言合典可施行克厭帝心即聴用之獻帝起居注曰中平六年令三府長史兩梁冠五時衣袍事位從千石六百石法冠一曰柱後獨斷曰柱後惠文髙五寸以纚為展筩前書注曰纚今之縰通俗文幘裏曰纚鐵柱卷荀綽晉百官表注曰鐵柱言其厲直不曲撓執法者服之侍御史廷尉正監平也或謂之獬豸冠獬豸神羊能别曲直楚王嘗獲之故以為冠異物志曰東北荒中有獸名獬豸一角性忠見人鬪則觸不直者聞人論則咋不正者楚執法者所服也今冠兩角非豸也臣昭曰或謂獬豸廼非定名在兩角未足斷正安不存其豎飾令兩為冠乎胡廣説曰春秋左氏傳有南冠而縶者則楚冠也秦滅楚以其君服賜執法近臣御史服之武冠一云古緇布冠之象也或曰繁冠一曰武弁大冠諸武官冠之晉公卿禮秩曰大司馬將軍尉驃騎車騎衞軍諸大將軍開府從公者著武冠平上幘侍中中常侍加黄金璫附蟬為文貂尾為飾謂之趙惠文冠又名駿鸃冠胡廣説曰趙武靈王效胡服以金璫飾首前揷貂尾為貴職秦滅趙以其君冠賜近臣應劭漢官曰説者以金取堅剛百鍊不耗蟬居髙飲潔口在腋下貂内勁捍而外溫潤此因物生義也徐廣曰趙武靈王胡服有此秦即趙而用之説者蟬取其清髙飲露而不食貂紫蔚柔潤而毛采不彰灼故於義亦取胡廣又曰意謂北方寒涼本以貂皮暖額附施於冠因遂變成首飾建武時匈奴内屬世祖賜南單于衣服以中常侍惠文冠中黄門童子佩刀云建華冠以鐵為柱卷貫大銅珠九枚制似鏤鹿獨斷曰其狀若婦人縷鹿薛綜曰下輪大上輪小記曰知天者冠述知地者履絇春秋左傳曰鄭子臧好鷸冠前圓以為此則是也説文曰鷸知天將雨鳥也天地五郊明堂育命舞樂人服之方山冠似進賢以五采縠為之祠宗廟大予八佾四時五行樂人服之冠衣各如其行方之色而舞焉巧士冠髙七寸要後相通直豎不常服唯郊天黄門從官四人冠之在鹵簿中次乗輿車前以備宦者四星云獨斷曰禮無文却非冠制似長冠下促宫殿門吏僕射冠之負赤幡青翅燕尾諸僕射幡皆如之獨斷曰禮無文却敵冠前髙四寸通長四寸後髙三寸制似進賢衞士服之獨斷曰禮無文樊噲冠漢將樊噲造次所冠以入項羽軍廣九寸髙七寸前後出各四寸制似冕司馬殿門大難衞士服之或曰樊噲常持鐵楯聞項羽有意殺漢王噲裂裳以裹楯冠之入軍門立漢王旁視項羽術氏冠前圓吳制差池邐迆四重趙武靈王好服之今不施用官有其圖注淮南子曰楚莊王所服讎冠者是蔡邕曰其説未聞諸冠皆有纓蕤執事及武吏皆縮纓垂五寸武冠俗謂之大冠環纓無㽔以青系為緄加雙鶡尾豎左右為鶡冠云莊子曰縵胡之纓武士之服是也五官左右虎賁羽林五中郎將羽林左右監皆冠鶡冠紗縠單衣虎賁將虎文絝白虎文劒佩刀虎賁武騎皆鶡冠虎文單衣襄邑嵗獻織成虎文云鶡者勇雉也其鬪對一死乃止故趙武靈王以表武士秦施安焉徐廣曰鶡似黒雉出於上黨荀綽晉百官表注曰冠挿兩鶡鷙鳥之暴疏者也毎所攫撮應爪摧衂天子武騎故以冠焉傅𤣥賦注曰羽騎騎者戴鶡安帝立皇太子太子謁髙祖廟世祖廟門大夫從冠兩梁進賢洗馬冠髙山罷廟侍御史任方奏請非乗從時皆冠一梁不宜以為常服事下有司尚書陳忠奏門大夫職如諫大夫洗馬職如謁者故皆服其服先帝之舊也方言可寢奏可謁者古者一名洗馬古今注曰建武十三年初令令長皆小冠獨斷曰公卿侍中尚書衣皁而入朝者曰朝臣諸營校尉將大夫以下不為朝臣古者有冠無幘其戴也加首有頍所以安物故詩曰有頍者弁此之謂也三代之世法制滋彰下至戰國文武並用秦雄諸侯乃加其武將首飾為絳袙以表貴賤其後稍稍作顔題漢興續其顔却摞之施巾連題却覆之今喪幘是其制也名之曰幘幘者賾也頭首嚴賾也至孝文乃髙顔題續之為耳崇其巾為屋合後施収上下羣臣貴賤皆服之文者長耳武者短耳稱其冠也尚書賾収方三寸名曰納言示以忠正顯近職也迎氣五郊各如其色從章服也皁衣羣吏春服青幘立夏乃止助微順氣尊其方也武吏常赤幘成其威也未冠童子幘無屋者示未成人也入學小童幘也句卷屋者示尚幼少未逺冐也喪幘却摞反本禮也升數如冠與冠偕也期喪起耳有収素幘亦如之禮輕重有制變除從漸文也獨斷曰幘古者卑賤執事不冠者之所服也董仲舒止雨書曰執事者皆赤幘知不冠者之所服也元帝額有壯髮不欲使人見始進幘服之羣臣皆隨焉然尚無巾故言王莽禿幘施屋冠進賢者宜長耳冠惠文者宜短耳各隨其宜漢舊儀曰幘齋紺幘耕青幘秋貙劉服緗古者君臣佩玉尊卑有度上有韍徐廣曰韍如今蔽膝貴賤有殊佩所以章徳服之衷也韍所以執事禮之共也故禮有其度威儀之制三代同之五伯迭興戰兵不息佩非戰器韍非兵旗於是解去韍佩留其係璲徐廣曰今名璲為縌以為章表故詩曰鞙鞙佩璲此之謂也鞙鞙佩玉貌璲瑞也鄭𤣥箋曰佩璲者以瑞玉為佩佩之鞙鞙然韍佩既廢秦乃以采組連結於璲光明章表轉相結受故謂之綬漢承秦制用而弗改故加之以雙印佩刀之飾至孝明皇帝乃為大佩衝牙雙瑀璜皆以白玉詩云雜佩以贈之毛萇曰珩璜琚瑀衝牙之類月令章句曰佩上有雙衝下有雙璜琚瑀以雜之衝牙蠙珠以納其間玉藻曰右徴角左宫羽進則揖之退則揚之然後玉瑲鳴焉纂要曰琚瑀所以納間在玉之間今白珠也乗輿落以白珠公卿諸侯以采絲其視冕旒為祭服云佩刀乗輿黄金通身貂錯半鮫魚鱗金漆錯雌黄室五色罽隠室華諸侯王黄金錯環挾半鮫黒室公卿百官皆純黒不半鮫小黄門雌黄室中黄門朱室童子皆虎爪文虎賁黄室虎文其將白虎文皆以白珠鮫為􅝑口之飾通俗文曰刀鋒曰􅝑乗輿者加翡翠山紆嬰其側左傳曰藻繂鞞鞛杜預曰鞞佩刀削上飾鞛下飾也鄭𤣥詩箋曰既爵命賞賜而加賜容刀有飾顯其能制斷也春秋繁露曰劒之在左青龍之象也刀之在右白虎之象也韍之在前朱鳥之象也冠之在首𤣥武之象也四者人之盛飾也臣昭案自天子至于庶人咸皆帶劒劒之與刀形制不同名稱各異故蕭何劒履上殿不稱為刀而此志言不及劒如為未備佩雙印長寸二分方六分乗輿諸侯王公列侯以白玉中二千石以下至四百石皆以黒犀二百石以至私學弟子皆以象牙上合絲乗輿以縢貫白珠赤罽㽔諸侯王以下以綔赤絲㽔縢綔各如其印質刻書文曰正月剛卯既決靈殳四方赤青白黄四色是當帝令祝融以教􅇪龍庶疫剛癉莫我敢當疾日嚴卯帝令􅇪化慎爾周伏化茲靈殳既正既直既觚既方庶疫剛癉莫我敢當凡六十六字前書注云以正月卯日作乗輿黄赤綬四采黄赤紺縹淳黄圭長丈九尺九寸五百首漢舊儀曰璽皆白玉螭虎紐文曰皇帝行璽皇帝之璽皇帝信璽天子行璽天子之璽天子信璽凡六璽皇帝行璽凡封之璽賜諸侯王書信璽發兵徴大臣天子行璽策拜外國事天地鬼神璽皆以武都紫泥封青嚢白素裏兩端無縫尺一板中約署皇帝帶綬黄地六采不佩璽璽以金銀縢組侍中組負以從秦以前民皆佩綬金玉銀銅犀象為方寸璽各服所好奉璽書使者乗馳傳其驛騎也三騎行晝夜千里為程吳書曰漢室之亂天子北詣河上六璽不自隨掌璽者投井中孫堅北討董卓頓軍城南官署有井每旦有五色氣從井出堅使人浚得傳國璽其文曰受命于天既夀永昌方圍四寸上有紐文槃五龍瑨七寸管龍上一角缺獻帝起居注曰時六璽不自隨及還於閣上得晉陽秋曰冉閔大將軍蔣幹以傳國璽付河南太守戴施施獻之百僚皆賀璽光照洞徹上蟠螭文隠起書曰昊天之命皇帝夀昌秦舊璽也徐廣曰傳國璽文曰受天之命皇帝夀昌諸侯王赤綬徐廣曰太子及諸王金印龜組纁朱綬四采赤黄縹紺淳赤圭長二丈一尺三百首荀綽晉百官表注曰皇太子朱綬三百二十首太皇太后皇太后其綬皆與乗輿同皇后亦如之長公主天子貴人與諸侯王同綬者加特也諸國貴人相國皆綠綬三采綠紫紺淳綠圭長二丈一尺二百四十首前書曰相國丞相皆秦官金印紫綬髙帝相國綠綬徐廣曰金印綠綟綬綟音戾草名也以染似綠又云似紫紫綬名緺緺音𤓰其色青紫綟字亦盩音同也傳寫者誤作縶公加殊禮皆服之何承天云緺音媧青紫色綬綟紫色也公侯將軍紫綬二采紫白淳紫圭長丈七尺百八十首前書曰太尉金印紫綬御史大夫位上卿銀印青綬成帝更名大司空金印紫綬將軍亦金印漢官儀曰馬防為車騎將軍銀印青綬在卿上絶席和帝以竇憲為車騎將軍始加金印次司空公主封君服紫綬九卿中二千石二千石青綬三采青白紅淳青圭長丈七尺百二十首一號青緺綬自青綬以上縌皆長三尺二寸與綬同采而首半之縌者古佩璲也佩綬相迎受故曰縌紫綬以上縌綬之間得施玉環鐍云通俗文曰缺環曰鐍漢舊儀曰其斷獄者印為章也千石六百石黒綬三采青赤紺淳青圭長丈六尺八十首四百石三百石長同漢官曰尚書僕射銅印青綬四百石三百石二百石黄綬淳黄圭一采長丈五尺六十首自黒綬以下縌綬皆長三尺與綬同采而首半之百石青紺綸一采宛轉繆織長丈二尺丁孚漢儀載太僕太中大夫襄言乗輿綬黄地冒白羽青絳綠五采四百首長二丈三尺詔所下王綬冒亦五采上下無差諸王綬四采絳地冒白羽青黄去緑二百六十首長二丈二尺公主綬如王侯絳地紺縹三采百二十首長丈八尺二千石綬羽青地桃華縹三采百二十首長丈八尺黒綬羽青地絳二采八十首長一丈七尺黄綬一采八十首長丈七尺以為常式民織綬不如式沒入官犯者為不敬二千石綬以上禁民無得織以粉組皇太后詔可王綬如所下凡先合單紡為一系四系為一扶五扶為一首五首為一文文采淳為一圭首多者系細少者系麤皆廣尺六寸東觀書曰建武元年復設諸侯王金璽綟綬公侯金印紫綬九卿執金吾河南尹秩皆中二千石大長秋將作大匠度遼諸將軍郡太守國傅相皆秩二千石校尉中郎將諸郡都尉諸國行相中尉内史中䕶軍司直秩皆二千石以上皆銀印青綬中外官尚書令御史中丞治書侍御史公將軍長史中二千石丞正平諸司馬中宫王家僕雒陽令秩皆千石尚書中謁者黄門冗從四僕射諸都監中外諸都官令都侯司農部丞郡國長史丞候司馬千人秩皆六百石家令侍僕秩皆六百石雒陽市長秩四百石主家長秩皆四百石以上皆銅印黒綬諸署長楫櫂丞秩三百石諸秩千石者其丞尉皆秩四百石秩六百石者丞尉秩三百石四百石者其丞尉秩二百石縣國丞尉亦如之縣國三百石長丞尉亦二百石明堂靈臺丞諸陵校長秩二百石丞尉校長以上皆銅印黄綬縣國守宫令相或千石或六百石長相或四百石或三百石長相皆以銅印黄綬而有秩者侍中中常侍光祿大夫秩皆二千石太中大夫秩皆比二千石尚書諫議大夫侍御史博士皆六百石議郎中謁者秩皆比六百石小黄門黄門侍郎中黄門秩皆比四百石郎中秩皆比三百石太子舎人秩二百石太皇太后皇太后入廟服紺上皁下蠶青上縹下皆深衣制徐廣曰即單衣隱領袖緣以絛翦氂蔮簪珥耳璫垂珠簪以瑇瑁為擿長一尺端為華勝上為鳳凰爵以翡翠為毛羽下有白珠垂黄金鑷左右一横簪之以安蔮結諸簪珥皆同制其擿有等級焉皇后謁廟服紺上皁下蠶青上縹下皆深衣制隱領袖緣以絛假結步揺簪珥步揺以黄金為山題貫白珠為桂枝相繆一爵九華熊虎赤羆天鹿辟邪南山豐大特六獸詩所謂副笄六珈者毛詩傳曰副者后夫人之首飾編髪為之笄衡笄也珈笄飾之最盛者所以别尊卑鄭𤣥曰珈之言加也副既笄而加飾如今步揺上飾古之制所未聞諸爵獸皆翡翠為毛羽金題白珠璫繞以翡翠為華云貴人助蠶服純縹上下深衣制大手結墨瑇瑁又加簪珥長公主見㑹衣服加步揺公主大手結皆有簪珥衣服同制自公主封君以上皆帶綬以采組為緄帶各如其綬色黄金辟邪首為帶鐍飾以白珠公卿列侯中二千石二千石夫人紺繒蔮黄金龍首䘖白珠魚須擿長一尺為簪珥入廟佐祭者皁絹上下助蠶者縹絹上下皆深衣制緣自二千石夫人以上至皇后皆以蠶衣為朝服公主貴人妃以上嫁娶得服錦綺羅縠繒采十二色重綠袍特進列侯以上錦繒采十二色六百石以上重練采九色禁丹紫紺三百石以上五色采青絳黄紅綠二百石以上四采青黄紅綠賈人緗縹而已博物記曰交州南有蟲長減一寸形似白英不知其名視之無色在隂地多緗色則赤黄之色也公列侯以下皆單綠襈制文繡為祭服自皇后以下皆不得服諸古麗圭襂閨緣加上之服司馬相如李夫人賦重旬始以為襂注曰葆下旒也則襂之容如旌旒也建武永平禁絶之建初永元又復中重於是世莫能有制其裁者乃遂絶矣蔡邕表志曰永平初詔書下車服制度中宫皇太子親服重繒厚練浣已復御率下以儉化起機諸侯王以下至于士庶嫁娶被服各有秩品當傳萬世揚光聖徳臣以為宜集舊事儀注本奏以成志也凡冠衣諸服旒冕長冠委貌皮弁爵弁建華方山巧士衣裳文繡赤舄服絇履大佩皆為祭服其餘悉為常用朝服唯長冠諸王國謁者以為常朝服云宗廟以下祠祀皆冠長冠皁繒袍單衣絳緣領袖中衣絳絝􅙋五郊各從其色焉贊曰車輅各庸旌旂異局冠服致美佩紛璽玉敬敬報情尊尊下欲孰夸華文匪豪麗縟後漢書卷四十後漢書卷四十考證輿服志下冠角􅏋胡之制􅏋監本譌作􅀈依宋本改藻火粉米注粉若粟米臣良裘按孔傳本作粉若粟冰作米譌也此志北宋本亦作粟冰縫掖其袖合而縫大之近今袍者者下本或有也字進賢冠古緇布冠也古字監本誤作右依宋本改却敵冠制似進賢似字監本誤作以依宋本改術氏冠注淮南子曰楚莊王所服讐冠者是服字監本誤作復依宋本改秦施安焉安毛本作之故忠皆服其服忠字疑衍入學小童幘也句卷屋者也疑作施公侯將軍紫綬注始加金印印應改紫後漢書卷四十考證
