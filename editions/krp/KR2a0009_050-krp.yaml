body:
  text: 後漢書卷五十宋宣城太守范煜撰唐章懷太子賢注銚王祭列傳第十銚期傳銚期字次況潁川郟人也長八尺二寸容貌絶異矜嚴有威父猛為桂陽太守卒期服喪三年鄕里稱之光武略地潁川聞期志義召署賊曹掾漢官儀曰東西曹掾比四百石餘掾比三百石賊曹主盜賊之事從徇薊時王郎檄書到薊薊中起兵應郎光武趣駕出百姓聚觀諠呼滿道遮路不得行期騎馬奮㦸瞋目大呼左右曰䟆周禮𨽻僕掌蹕宮中之事鄭衆曰止行清道也若今警蹕說文䟆與蹕同衆皆披靡披普彼反及至城門門已閉攻之得出行至信都以期為裨將與傅寛呂晏俱屬鄧禹徇傍縣又發房子兵禹以期為能獨拜偏將軍授兵二千人寛晏各數百人還言其狀光武甚善之使期别徇眞定宋子攻㧞樂陽槀肥纍樂陽縣名屬常山郡今恒州槀城縣也故城在縣西肥纍故肥子國也漢以為縣故城在今槀城縣西南並屬眞定國纍音力追反從擊王郎將兒宏劉奉於鉅鹿下兒音五奚反期先登陷陳手殺五十餘人被創中額攝幩復戰攝猶正也劉攽曰按幩為馬扇汗期被創中額則是幘字遂大破之王郎滅拜期虎牙大將軍乃因間說光武曰河北之地界接邊塞人習兵戰號為精勇今更始失政大統危殆海内無所歸往明公據河山之固擁精銳之衆以順萬人思漢之心則天下誰敢不從光武笑曰卿欲遂前䟆邪唯天子得稱警蹕時銅馬數十萬衆入清陽博平博平縣名屬東郡在今博州縣也期與諸將迎擊之連戰不利期乃更背水而戰所殺傷甚多㑹光武救至遂大破之追至館陶皆降之從擊青犢赤眉於射犬賊襲期輜重期還擊之手殺傷數十人身被三創而戰方力力苦戰也遂破走之光武即位封安成侯安成縣名屬汝南郡故城在今豫州汝陽縣東南也食邑五千户時檀鄉五樓賊入繁陽内黃繁陽縣名故城在今相州内黃縣東北内黃故城在西北又魏郡大姓數反覆而更始將卓京京或作原謀欲相率反鄴城帝以期為魏郡太守行大將軍事期發郡兵擊卓京破之斬首六百餘級京亡入山追斬其將校數十人獲京妻子進擊繁陽内黃復斬數百級郡界清平督盜賊李熊鄴中之豪而熊弟陸謀欲反城迎檀鄉反音翻或以告期期不應告者三四期乃召問熊熊叩頭首服願與老母俱就死期曰為吏儻不若為賊樂者可歸與老母往就陸也必以在城中為吏不如為賊之樂即任將母往就弟使吏送出城熊行求得陸將詣鄴城西門陸不勝愧感自殺以謝期期嗟嘆以禮葬之而還熊故職於是郡中服其威信建武五年行幸魏郡以期為太中大夫從還洛陽又拜衞尉期重於信義自為將有所降下未嘗虜掠及在朝廷憂國愛主其有不得於心必犯顏諫諍帝嘗輕與期門近出前書武帝將出必與北地良家子期於殿門故曰期門期頓首車前曰臣聞古今之戒變生不意誠不願陛下微行數出帝為之回輿而還十年卒東觀記曰期疾病使使者存問加賜醫藥甚厚其母問期當封何子期言受國家恩深常慙負如死不知當何以報國何宜封子也上甚憐之帝親臨襚歛贈以衞尉安成侯印綬諡曰忠侯子丹嗣復封丹弟統為建平侯建平縣名屬沛郡故城在今亳州酇縣西北一名馬頭城後徙封丹葛陵侯葛陵縣名故城在汝南故鮦陽縣也丹卒子舒嗣舒卒子羽嗣羽卒子蔡嗣王霸傳王霸字元伯潁川潁陽人也世好文法東觀記曰祖父為詔獄丞父為郡決曹掾漢官儀決曹主罪法事霸亦少為獄吏常慷慨不樂吏職其父奇之遣西學長安漢兵起光武過潁陽霸率賔客上謁曰將軍興義兵竊不自知量貪慕威德願充行伍光武曰夢想賢士共成功業豈有二哉遂從擊破王尋王邑於昆陽還休鄕里及光武為司𨽻校尉道過潁陽霸請其父願從父曰吾老矣不任軍旅汝往勉之霸從至洛陽及光武為大司馬以霸為功曹令史劉攽曰按功曹有史耳不當有令字從度河北賔客從霸者數十人稍稍引去光武謂霸曰潁川從我者皆逝而子獨留努力疾風知勁草及王郎起光武在薊郎移檄購光武光武令霸至市中募人將以擊郎市人皆大笑舉手邪揄之說文曰歋􅕆手相笑也歋音弋支反􅕆音踰或音由此云邪揄語輕重不同霸慚懅而還懅亦慙也音遽光武即南馳至下曲陽傳聞王郎兵在後從者皆恐及至滹沱河候吏還白河水流澌澌音斯無船不可濟官屬大懼光武令霸往視之霸恐驚衆欲且前阻水還即詭曰冰堅可度官屬皆喜光武笑曰候吏果妄語也遂前比至河河冰亦合乃令霸護度堅護度也未畢數騎而冰解光武謂霸曰安吾衆得濟免者卿之力也霸謝曰此明公至德神靈之祐雖武王白魚之應無以加此今文尚書曰武王度盟津白魚躍入王舟光武謂官屬曰王霸權以濟事殆天瑞也以為軍正爵關内侯既至信都發兵攻㧞邯鄲霸追斬王郎得其璽綬封王鄉侯從平河北常與臧宮傅俊共營霸獨善撫士卒死者脫衣以歛之傷者躬親以養之劉攽曰按文脫衣可言以歛之躬親不宜復有以字光武即位以霸曉兵愛士可獨任拜為偏將軍并將臧宮傅俊兵而以宮俊為騎都尉建武二年更封富波侯富波縣名屬汝南郡在今豫州四年秋帝幸譙使霸與捕虜將軍馬武東討周建於垂惠蘇茂將五校兵四千餘人救建而先遣精騎遮擊馬武軍糧武往救之建從城中出兵夾擊武武恃霸之援戰不甚力為茂建所敗武軍奔過霸營大呼求救霸曰賊兵盛出必兩敗努力而已乃閉營堅壁軍吏皆爭之霸曰茂兵精銳其衆又多吾吏士心恐而捕虜與吾相恃兩軍不一此敗道也今閉營固守示不相援賊必乘勝輕進捕虜無救其戰自倍如此茂衆疲勞吾承其弊乃可剋也茂建果悉出攻武合戰良久霸軍中壯士路潤等數十人斷髪請戰霸知士心銳乃開營後出精騎襲其背茂建前後受敵驚亂敗走霸武各歸營賊復聚衆挑戰霸堅卧不出方饗士作倡樂茂雨射營中中霸前酒樽安坐不動軍吏皆曰茂前日已破今易擊也霸曰不然蘇茂客兵遠來糧食不足故數挑戰以徼一切之勝徼要也一切猶權時也今閉營休士所謂不戰而屈人之兵善之善者也茂建既不得戰乃引還營其夜建兄子誦反閉城拒之茂建遁去誦以城降五年春帝使太中大夫持節拜霸為討虜將軍六年屯田新安八年屯田函谷關擊滎陽中牟盜賊皆平之九年霸與吳漢及横野大將軍王常建義大將軍朱祐破姦將軍侯進等五萬餘人擊盧芳將賈覽閔堪於高柳匈奴遣騎助芳漢軍遇雨戰不利吳漢還洛陽令朱祐屯常山王常屯涿郡侯進屯漁陽璽書拜霸上谷太守領屯兵如故捕擊胡虜無拘郡界拘猶限也明年霸復與吳漢等四將軍六萬人出高柳擊賈覽詔霸與漁陽太守陳訢將兵為諸軍鋒匈奴左南將軍將數千騎救覽霸等連戰於平城下破之追出塞斬首數百級霸及諸將還入鴈門與驃騎大將軍杜茂㑹攻盧芳將尹由於崞繁畤不剋崞與繁畤皆縣名屬鴈門郡並今代州縣也有崞山焉崞音郭十三年增邑户更封向侯向縣名屬沛郡左傳曰莒人入向按今密州莒縣南又有向城是時盧芳與匈奴烏桓連兵寇盜尤數緣邊愁苦詔霸將㢮刑徒六千餘人與杜茂治飛狐道飛狐道在今蔚州飛狐縣北通媯州懷戎縣即古之飛狐口也堆石布土築起亭障自代至平城三百餘里凡與匈奴烏桓大小數十百戰頗識邊事數上書言宜與匈奴結和親又陳委輸可從温水漕水經注曰溫餘水出上谷居庸關東又東過軍都縣南又東過薊縣北益通以運漕也以省陸轉輸之勞事皆施行後南單于烏桓降服北邊無事霸在上谷二十餘歲三十年定封淮陵侯淮陵縣屬臨淮郡永平二年以病免後數月卒子符嗣徙封車犬侯車犬縣名屬江夏郡車犬音犬符卒子度嗣度尚顯宗女浚儀長公主為黃門郎度卒子歆嗣祭遵傳従弟彤祭遵字弟孫祭音側界反潁川潁陽人也少好經書家富給而遵恭儉惡衣服喪母負土起墳嘗為部吏所侵結客殺之初縣中以其柔也既而皆憚焉及光武破王尋等還過潁陽遵以縣吏數進見光武愛其容儀署為門下史從征河北為軍市令舍中兒犯法遵格殺之光武怒命收遵時主簿陳副諫曰明公常欲衆軍整齊今遵奉法不避是教令所行也光武乃貰之貰猶赦也以為刺姦將軍謂諸將曰當備祭遵吾舍中兒犯法尚殺之必不私諸卿也尋拜為偏將軍從平河北以功封列侯建武二年春拜征虜將軍定封潁陽侯與驃騎大將軍景丹建義大將軍朱祐漢忠將軍王常騎都尉王梁臧宮等入箕關箕關解在鄧禹傳南擊𢎞農厭新栢華蠻中賊東觀記曰栢華聚也弩中遵口洞出流血衆見遵傷稍引退遵呼叱止之士卒戰皆自倍遂大破之時新城蠻中山賊張滿新城縣名屬河南郡今伊闕縣也屯結險隘為人害詔遵攻之遵絶其糧道滿數挑戰遵堅壁不出而厭新栢華餘賊復與滿合遂攻得霍陽聚有霍陽山故名焉俗謂之張侯城在今汝州西南遵乃分兵擊破降之明年春張滿饑困城㧞生獲之初滿祭祀天地自云當王既執歎曰䜟文誤我乃斬之夷其妻子遵引兵南擊鄧奉弟終於杜衍破之杜衍縣名屬河南郡故城在今鄧州南陽縣西南時涿郡太守張豐執使者舉兵反自稱無上大將軍與彭寵連兵四年遵與朱祐及建威大將軍耿弇驍騎將軍劉喜俱擊之遵兵先至急攻豐豐功曹孟厷執豐降說文曰厷臂上也厷音古𢎞反初豐好方術有道士言豐當為天子以五綵囊裹石繫豐肘云石中有玉璽豐信之遂反既執當斬猶曰肘石有玉璽遵為椎破之豐乃知被詐仰天歎曰當死無恨諸將皆引還遵受詔留屯良鄉拒彭寵因遣護軍傅𤣥襲擊寵將李豪於潞大破之斬首千餘級相拒歲餘數挫其鋒黨與多降者及寵死遵進定其地六年春詔遵與建威大將軍耿弇虎牙大將軍蓋延漢忠將軍王常捕虜將軍馬武驍騎將軍劉歆武威將軍劉尚等從天水伐公孫述續漢書曰上幸廣陽城門設祖道閲過諸將以遵新破漁陽令最在前師次長安時車駕亦至而隗囂不欲漢兵上隴辭說解故解故謂解脫事故以為辭說帝召諸將議皆曰可且延囂日月之期益封其將帥以消散之遵曰囂挾姦久矣今若按甲引時則使其詐謀益深而蜀警備增固不如遂進帝從之乃遣遵為前行隗囂使其將王元拒隴坻遵進擊破之追至新關及諸將到與囂戰並敗引退下隴乃詔遵軍汧耿弇軍漆征西大將軍馮異軍栒邑大司馬吳漢等還屯長安自是後遵數挫囂事已見馮異傳八年秋復從車駕上隴及囂破帝東歸過汧幸遵營勞饗士卒作黃門武樂良夜乃罷黃門署名前書曰是時名倡皆集黃門武樂執干戚以舞也良猶深也夜或作久時遵有疾詔賜重茵覆以御蓋復令進屯隴下及公孫述遣兵救囂吳漢耿弇等悉奔還遵獨留不郤東觀記曰時遵屯汧詔書曰將軍連年距難衆兵即郤復獨按部功勞爛然兵退無宿戒糧食不豫具今乃調度恐力不堪國家知將軍不易亦不遺力今送縑千匹以賜吏士九年春卒於軍遵為人廉約小心克己奉公賞賜輙盡與士卒家無私財身衣韋絝布被夫人裳不加緣帝以是重焉緣或作綵及卒愍悼之尤甚遵喪至河南縣詔遣百官先會喪所車駕素服臨之望哭哀慟還幸城門過其車騎東觀記曰上還幸城門閲過喪車瞻望涕泣涕泣不能己喪禮成復親祠以太牢如宣帝臨霍光故事霍光薨宣帝及上官太后親臨光喪使太中大夫任宣侍御史五人持節護喪事東觀記曰時下宣帝臨霍將軍儀令公卿讀視以為故事詔大長秋謁者河南尹護喪事大司農給費博士范升上疏追稱遵曰臣聞先王崇政尊美屏惡昔高祖大聖深見遠慮班爵割地與下分功著錄勲臣頌其德美生則寵以殊禮奏事不名入門不趨前書曰蕭何奏事不名入門不趨死則疇其爵邑世無絶嗣疇等也言功臣死後子孫襲封世世與先人等丹書鐵劵傳於無窮前書高祖與功臣剖符作誓丹書鐵契金匱石室藏之宗廟斯誠大漢厚下安人長久之德所以累世十餘歴載數百漢興至此二百餘年言數百者謂以百數之廢而復興絶而復續者也陛下以至德受命先明漢道劉攽曰按文當作光明襃序輔佐封賞功臣同符祖宗征虜將軍潁陽侯遵不幸早薨陛下仁恩為之感傷遠近河南惻怛之慟形於聖躬喪事用度仰給縣官重賜妻子不可勝數送死有以加生厚亡有以過存矯俗厲化卓如日月卓高也古者臣疾君視臣卒君弔前書賈山上書曰古之賢君於其臣也尊其爵祿而親之疾則臨視之無數死則往弔哭之臨其小歛大歛可謂盡禮也故臣下竭力盡死以報其上德之厚者也陵遲已來久矣及至陛下復興斯禮羣下感動莫不自勵臣竊見遵脩行積善竭忠於國北平漁陽西拒隴蜀先登坻上即隴坻上深取略陽衆兵既退獨守衝難衝兵衝也謂吳漢耿弇等悉奔還唯遵獨留不郤制御士心不越法度所在吏人不知有軍言不侵擾清名聞於海内廉白著於當世所得賞賜輙盡與吏士身無竒衣家無私財同產兄午以遵無子娶妾送之遵乃使人逆而不受自以身任於國不敢圖生慮繼嗣之計臨死遺誡牛車載喪薄葬洛陽問以家事終無所言任重道遠死而後已遵為將軍取士皆用儒術對酒設樂必雅歌投壺雅歌謂歌雅詩也禮記投壺經曰壺頸脩七寸腹脩五寸口徑二寸半容斗五升壺中實小豆焉為其矢之躍而出也矢以柘若棘長二尺八寸無去其皮取其堅而重投之勝者飲不勝者以為優劣也又建為孔子立後奏置五經大夫雖在軍旅不忘爼豆可謂好禮悅樂守死善道者也禮生有爵死有諡爵以殊尊卑諡以明善惡臣愚以為宜因遵薨論叙衆功詳案諡法以禮成之諡法周書之篇周公制焉顯章國家篤古之制為後嗣法帝乃下升章以示公卿至葬車駕復臨贈以將軍侯印綬朱輪容車介士軍陳送葬容車容飾之車象生時也介士甲士也東觀記曰遣校尉發騎士四百人被𤣥甲兠鍪兵車軍陳送葬諡曰成侯既葬車駕復臨其墳存見夫人室家其後㑹朝帝每歎曰安得憂國奉公之臣如祭征虜者乎遵之見思如此東觀記曰上數嗟嘆衞尉銚期見上感慟對曰陛下至仁哀念祭遵不已羣臣各懷慚懼也無子國除兄午官至酒泉太守從弟彤彤字次孫早孤以至孝見稱遇天下亂野無烟火而獨在冢側每賊過見其尚㓜而有志節皆竒而哀之光武初以遵故拜彤為黃門侍郎常在左右及遵卒無子帝追傷之以彤為偃師長令近遵墳墓四時奉祠之彤有權略視事五歲縣無盜賊課為第一遷襄賁令襄賁縣名屬東海郡故城在今沂州臨沂縣南賁音肥時天下郡國尚未悉平襄賁盜賊白日公行彤至誅破姦猾殄其支黨數年襄賁政清璽書勉勵增秩一等賜縑百匹當是時匈奴鮮卑及赤山烏桓連和彊盛數入塞殺略吏人朝廷以為憂益增緣邊兵郡有數千人又遣諸將分屯障塞帝以彤為能建武十七年拜遼東太守至則勵兵馬廣斥候彤有勇力能貫三百斤弓虜每犯塞常為士卒鋒數破走之二十一年秋鮮卑萬餘騎寇遼東彤率數千人迎擊之自被甲陷陳虜大奔投水死者過半遂窮追出塞虜急皆棄兵裸身散走斬首三千餘級獲馬數千匹自是後鮮卑震怖畏彤不敢復闚塞彤以三虜連和卒為邊害卒終也三虜謂匈奴鮮卑及赤山烏桓二十五年乃使招呼鮮卑示以財利其大都䕶偏何鮮卑名也遣使奉獻願得歸化彤慰納賞賜稍復親附其異種滿離高句驪之屬遂駱驛欵塞上貂裘好馬帝輒倍其賞賜其後偏何邑落諸豪並歸義願自効彤曰審欲立功當歸擊匈奴斬送頭首乃信耳偏何等皆仰天指心曰必自効即擊匈奴左伊衭訾部斬首二千餘級持頭詣郡其後歲歲相攻輒送首級受賞賜自是匈奴衰弱邊無寇警鮮卑烏桓並入朝貢彤為人質厚重毅體貌絶衆撫夷狄以恩信皆畏而愛之故得其死力初赤山烏桓數犯上谷為邊害詔書設購賞功責州郡不能禁劉攽曰按文功當作切彤乃率勵偏何遣往討之永平元年偏何擊破赤山斬其魁帥持首詣彤塞外震讋音之渉反彤之威聲暢於北方西自武威東盡𤣥菟及樂浪胡夷皆來内附野無風塵乃悉罷縁邊屯兵十二年徵為太僕彤在遼東幾三十年衣無兼副顯宗既嘉其功又美彤清約拜日賜錢百萬馬三匹衣被刀劒下至居室什物大小無不悉備帝每見彤常歎息以為可屬以重任後從東巡狩過魯坐孔子講堂顧指子路室謂左右曰此太僕之室太僕吾之禦侮也尚書大傳曰孔子曰吾有四友焉自吾得囘也門人加親是非胥附邪自吾得賜也遠方之士日至是非奔走邪自吾得師也前有光後有輝是非先後邪自吾得由也惡言不至門是非禦侮邪十六年使彤以太僕將萬餘騎與南單于左賢王信伐北匈奴期至涿邪山信初有嫌於彤行出高闕塞九百餘里得小山乃妄言以為涿邪山彤到不見虜而還坐逗遛畏懦下獄免彤性沈毅内重自恨見詐無功出獄數日歐血死臨終謂其子曰吾䝉國厚恩奉使不稱微績不立身死誠慚恨義不可以無功受賞死後若悉簿上所得賜物若汝也皆為文簿而上之身自詣兵屯效死前行以副吾心既卒其子逢上疏具陳遺言帝雅重彤方更任用聞之大驚召問逢疾狀嗟嘆者良久焉烏桓鮮卑追思彤無已每朝賀京師常過冢拜謁仰天號泣乃去遼東吏人為立祠四時奉祭焉彤既葬子參遂詣奉車都尉竇固從軍擊車師有功稍遷遼東太守永元中鮮卑入郡界參坐沮敗下獄死彤子孫多為邊吏者皆有名稱論曰祭彤武節剛方動用安重雖條侯穰苴之倫不能過也條侯周亞夫也為將軍軍於細柳文帝幸其營亞夫持兵揖曰介胄之士不拜請以軍禮見文帝曰此眞將軍也穰苴齊人田穰苴也齊景公使為將軍使莊賈往穰苴與約曰旦日日中㑹於軍門穰苴先至賈後至於是遂斬莊賈以徇三軍士皆振慄且臨守偏海政移獷俗獷古猛反又音久永反徼人請符以立信胡貊數級於郊下徼人謂徼外人偏何等也符驗也為偏何請還自効以驗内屬之信數級謂偏何斬匈奴送首級受賞賜至乃卧鼓邊亭滅烽幽障者將三十年古所謂必世而後仁豈不然哉三十年為一世言承化久也論語孔子曰如有王者必世而後仁而一眚之故以致感憤眚過也左傳曰不以一眚掩大德眚音所景反惜哉畏法之敝也畏法猶嚴法也贊曰期啓燕門霸冰滹河祭遵好禮臨戎雅歌彤抗遼左邊庭懷和後漢書卷五十後漢書卷五十考證王霸傳乃令霸䕶度注堅䕶度也堅當作監謂使霸監䕶軍士渡滹沱河也封王鄉侯地理郡國志無王鄉地名王字疑誤後漢書卷五十考證
