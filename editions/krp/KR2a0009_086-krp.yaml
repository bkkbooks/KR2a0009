body:
  text: 後漢書卷八十六宋宣城太守范煜撰唐章懷太子賢注張王种陳列傳第四十六張晧傳子綱張晧字叔明犍為武陽人也六世祖良高帝時為太子少傅封留侯晧少游學京師初永元中歸仕州郡劉攽曰案文多一初字辟大將軍鄧騭府五遷尚書僕射職事八年出為彭城相明帝子彭城王恭之相也永寧元年徴拜廷尉晧雖非法家而留心刑斷數與尚書辯正疑獄多以詳當見從詳審而平當也時安帝廢皇太子為濟隂王晧與太常桓焉太僕来歴廷爭之不能得事已具来歴傳退而上疏曰昔賊臣江充造構䜛逆至令戾園興兵終及禍難趙人江充字次倩武帝時為直指繡衣劾太子家吏行馳道中恐為太子所誅見上年老意多所惡因言左右皆為巫蠱上乃使充捕案巫蠱既知上意太子乃言宫中有蠱氣遂掘蠱太子宫得桐木人時上疾在甘泉宫太子懼不能自明收充斬之發兵與丞相劉屈氂戰敗亡走湖自殺後太子孫宣帝即位追諡太子曰戾於湖置園邑奉祀故曰戻園後壺關三老一言上乃覺悟雖追前失悔之何逮逮及也太子死後壺關三老令狐茂上書訟太子寃武帝感悟憐太子無辜乃族滅江充作思子宫為歸来望思之臺於湖天下聞而悲之事見前書今皇太子春秋方始十嵗未見保傅九德之義尚書臯陶陳九德曰寛而慄柔而立愿而恭亂而敬擾而毅直而温簡而亷剛而塞彊而誼也宜簡賢輔就成聖質書奏不省及順帝即位拜晧司空在事多所薦逹天下稱其推士時清河趙騰上言災變譏刺朝政章下有司收騰繫考所引黨輩八十餘人皆以誹謗當伏重法晧上疏諫曰臣聞堯舜立敢諫之鼓三王樹誹謗之木春秋採善書惡聖主不罪芻蕘左氏傳曰春秋之稱㣲而顯志而晦懲惡而勸善非聖人誰能脩之騰等雖干上犯法所言本欲盡忠正諫如當誅戮天下杜口塞諫爭之源非所以昭德示後也帝乃悟減騰死罪一等餘皆司寇前書音義曰司寇二嵗刑也輸作司寇因以名焉四年以隂陽不和䇿免陽嘉元年復為廷尉其年卒官時年八十三遣使者弔祭賜葬地於河南縣子綱綱字文紀少明經學雖為公子而厲布衣之節舉孝亷不就司徒高第辟為御史時順帝委縱宦官有識危心綱常感激慨然歎曰穢惡滿朝不能奮身出命埽國家之難雖生吾不願也退而上書曰詩曰不愆不忘率由舊章詩大雅也愆過也率循也言成王令德不過循用舊典之文尋大漢初隆及中興之世文明二帝德化尤盛觀其理為易循易見但恭儉守節約身尚德而已中官常侍不過兩人近倖賞賜裁滿數金惜費重人故家給人足夷狄聞中國優富任信道德所以姦謀自消而和氣感應而頃者以来不遵舊典無功小人皆有官爵富之驕之而復害之非愛人重器承天順道者也器謂車服也言無功小人不可妄授也左傳曰唯器與名不可以假人也伏願陛下少留聖思割損左右以奉天心書奏不省漢安元年選遣八使徇行風俗皆耆儒知名多歴顯位周舉傳曰詔遣八使廵行風俗同時俱拜天下號曰八俊刺史二千石有臧罪者驛馬上之墨綬已下便收其有清勤忠惠宜表異者狀聞八使名見順帝紀唯綱年少官次最㣲餘人受命之部而綱獨埋其車輪於洛陽都亭曰豺狼當路安問狐狸前書京兆督郵侯文之辭遂奏曰大將軍冀河南尹不疑蒙外戚之援荷國厚恩以芻蕘之資居阿衡之任不能敷揚五教翼讃日月而專為封豕長蛇肆其貪叨左傳申包胥曰吳為封豕長蛇薦食上國也甘心好貨縱恣無底多樹謟諛以害忠良誠天威所不赦大辟所宜加也謹條其無君之心十五事斯皆臣子所切齒者也左傳曰有無君之心而後動于惡也前書鄒陽謂葢侯王信君曰太后怫鬰泣血切齒側目於貴臣矣書御京師震竦御進也時冀妺為皇后内寵方盛諸梁姻族滿朝帝雖知綱言直終不忍用時廣陵賊張嬰等衆數萬人殺刺史二千石寇亂揚徐間積十餘年朝廷不能討冀乃諷尚書以綱為廣陵太守因欲以事中之前遣郡守率多求兵馬綱獨請單車之職既到乃將吏卒十餘人徑造嬰壘以慰安之求得與長老相見申示國恩嬰初大驚既見綱誠信乃出拜謁綱延置上坐問所疾苦乃譬之曰前後二千石多肆貪暴二千石謂太守也故致公等懷憤相聚二千石信有罪矣然為之者又非義也今主上仁聖欲以文德服叛故遣太守思以爵祿相榮不願以刑罸相加今誠轉禍為福之時也若聞義不服天子赫然震怒荆揚兖豫大兵雲合豈不危乎若不料強弱非明也弃善取惡非智也去順效逆非忠也身絶血嗣非孝也凡祭皆用牲故曰血嗣背正從邪非直也見義不為非勇也六者成敗之幾利害所從公其深計之嬰聞泣下曰荒裔愚人不能自通朝廷不堪侵枉遂復相聚偷生若魚遊釡中喘息湏臾間耳今聞明府之言乃嬰等更生之晨也既䧟不義實恐投兵之日不免孥戮綱約之以天地誓之以日月嬰深感悟乃辭還營明日將所部萬餘人與妻子面縛歸䧏綱乃單車入嬰壘大㑹置酒為樂散遣部衆任從所之親為卜居宅相田疇相視也田並畔曰疇子弟欲為吏者皆引召之人情悦服南州晏然朝廷論功當封梁冀遏絶乃止天子嘉美徵欲擢用綱而嬰等上書乞留乃許之綱在郡一年年三十六卒百姓老㓜相携詣府赴哀者不可勝數綱自被疾吏人咸為祠祀祈福皆言千秋萬嵗何時復見此君張嬰等五百餘人制服行喪送到犍為負土成墳詔曰故廣陵太守張綱大臣之苖剖符統務正身導下班宣德信䧏集劇賊張嬰萬人息干戈之役濟蒸庶之困未升顯爵不幸早卒嬰等縗杖若喪考妣朕甚愍焉拜綱子續為郎中賜錢百萬王龔傳王龔字伯宗山陽高平人也世為豪族初舉孝亷稍遷青州刺史劾奏貪濁二千石數人安帝嘉之徵拜尚書建光元年擢為司𨽻校尉明年遷汝南太守政崇温和好才愛士引進郡人黄憲陳蕃等憲雖不屈蕃遂就吏蕃性氣高明初到龔不即召見之乃留記謝病去龔怒使除其錄功曹袁閬請見言曰聞之傳曰人臣不見察於君不敢立於朝蕃既以賢見引不宜退以非禮龔改容謝曰是吾過也乃復厚遇待之由是後進知名之士莫不歸心焉閬字奉高數辭公府之命不脩異操而致名當時永建元年徵龔為太僕轉太常四年遷司空以地震䇿免永和元年拜太尉在位恭慎自非公事不通州郡書記其所辟命皆海内長者龔深疾宦官專權志在匡正乃上書極言其狀請加放斥諸黄門恐懼各使賔客誣奏龔罪順帝命亟自實亟急也音紀力反前掾李固時為大將軍梁商從事中郎乃奏記於商曰今旦聞下太尉王公勅令自實未審其事深淺何如王公束脩厲節敦樂蓺文不求茍得不為苟行前書曰揚子雲曰蜀嚴湛㝠不作苟見不為茍得但以堅貞之操違俗失衆横為䜛佞所構毁衆人聞知莫不歎慄夫三公尊重承天象極未有詣理訢寃之義三公承助天子位象三台故曰承天象極哀帝時丞相王嘉有罪召詣廷尉詔獄主簿曰將相不對理陳寃相踵以為故事君侯宜引決也纎㣲感槩輒引分決是以舊典不有大罪不至重問大臣獄重故曰重問成帝時丞相薛宣御史大夫翟方進有罪上使五二千石雜問音義云大獄重故以二千石五人同問之王公沈静内明不可加以非理卒有它變則朝廷獲害賢之名羣臣無救䕶之節矣昔綘侯得罪袁盎觧其過文帝時丞相綘侯周勃免就國人告以為反諸公莫敢為言唯郎中袁盎明綘侯無罪綘侯得釋盎有力也魏尚獲戾馮唐訴其寃馮唐安陵人文帝時為郎署長上與論將帥唐曰臣聞魏尚為雲中守坐丄功首虜差六級陛下下之吏削其爵罸作之臣愚以為陛下法太明罸太重文帝悦捨尚復官也時君善之列在書傳今將軍内倚至尊外典國柄言重信著指撝無違宜加表救濟王公之艱難語曰善人在患飢不及餐斯其時也商即言之於帝事乃得釋龔在位五年以老病乞骸骨卒於家子暢論曰張晧王龔稱為推士若其好通汲善明發升薦仁人之情也夫士進則世收其器賢用則人獻其能能獻既已厚其功器收亦理兼天下言賢人見用即人競獻其所能但有能即獻動必有功功多賞厚故言己厚其功有才器必被收用用則海内蒙福故曰理兼天下其利甚博而人莫之先豈同折枝於長者以不為為難乎以不為為難言不之難也謂進賢逹士同折枝之易而不為之孟子謂齊宣王曰今恩足以及禽獸而不能加於百姓者何非力不能是不為也王曰不能不為二者謂何也孟子曰夫挟太山以超北海王能乎王曰不能為長者折枝王能乎曰不能也孟子曰夫挟太山以超北海是實不能不可彊也為長者折枝甚易而王不為非不能也老吾老以及人之老㓜吾㓜以及人之㓜天下可運諸掌何為不能加於百姓乎劉熙注孟子曰折枝若今之案摩也昔桞下惠見抑於臧文桞下惠姓展名禽字獲食邑於桞下諡曰惠臧文仲魯大夫姓臧孫名辰左傳仲尼曰臧文仲不仁者三下展禽廢六關妾織蒲言文仲知桞下惠之賢而使在下位故曰抑之淳于長受稱于方進成帝時定陵侯淳于長以太后姊子為九卿翟方進為丞相獨與長交稱薦之然則立德者以幽陋好遺顯登者以貴塗易引故晨門有抱關之夫論語子路宿於石門晨門曰奚自注云石門魯城外門也晨主守門晨夜開閉也史記侯嬴夷門抱關者守門必抱關故兼言之柱下無朱文之軫也神仙傳曰老子周宣王時為柱下史朱文畫車為文也軫車後横木也言貧賤之人多被淪弃所以晨門之下必有抱關之賢柱下之㣲永無朱文之轍也暢字叔茂少以清實為稱無所交黨初舉孝亷辭病不就大將軍梁商特辟舉茂才四遷尚書令出為齊相齊王喜之相徵拜司𨽻校尉轉漁陽太守所在以嚴明為稱坐事免官是時政事多歸尚書桓帝特詔三公令髙選庸能庸功也太尉陳蕃薦暢清方公正有不可犯之色禮記曰介胄之士則有不可犯之色由是復為尚書尋拜南陽太守前後二千石逼懼帝鄉貴戚多不稱職暢深疾之下車奮厲威猛其豪黨有釁穢者莫不紏發㑹赦事得散暢追恨之更為設法諸受臧二千萬以上不自首實者盡入財物若其隐伏使吏發屋伐樹堙井夷竈豪右大震功曹張敞奏記諫曰五教在寛著之經典湯去三面八方歸仁史記曰湯為夏方伯得專征伐出見野張四面網祝曰自天下四方皆入吾網湯曰嘻盡之矣去其三面祝曰欲左左欲右右不用命乃入吾網諸侯聞曰湯德至禽獸於是諸侯畢服嘻音僖武王入殷先去炮烙之刑列女傳紂為銅柱以膏塗之加於炭之上使有罪縁焉足滑跌墯紂與妲己笑以為樂名曰炮烙之刑臣賢案史記及帝王代紀皆言文王為西伯獻洛西之地請除炮烙之刑今云武王與此不同高祖鑒秦唯定三章之法孝文皇帝感一緹縈蠲除肉刑文帝時太倉令淳于公有罪罪當刑淳于公無男有五女罵其女曰生女不生男緩急非有益也其少女緹縈自傷悲泣随父至長安上書請没官為婢以贖父文帝悲憐其意為除肉刑卓茂文翁召父之徒皆疾惡嚴刻務崇温厚景帝時文翁為蜀郡守仁愛教化宣帝時召信臣為南陽太守視人如子其化大行仁賢之政流聞後世夫明哲之君網漏吞舟之魚韓詩外傳曰夫吞舟之魚不居潛澤前書曰高祖約法三章號為網漏吞舟之魚也然後三光明於上人物悦於下言之若迂其效甚近迂遠也發屋伐樹將為嚴烈雖欲懲惡難以聞遠以明府上智之才日月之曜莊子曰飾智以驚愚脩身以明汚昭昭乎若掲日月而行也敷仁恵之政則海内改觀實有折枝之易而無挟山之難郡為舊都侯甸之國園廟出於章陵五百里甸服千里侯服南陽去洛千里故曰侯甸南頓君以上四廟在焉三后生自新野光烈皇后和帝隂后鄧后並新野人士女沾教化黔首仰風流自中興以来功臣將相繼世而隆愚以為懇懇用刑不如行恩孳孳求姦未若禮賢舜舉臯陶不仁者遠論語子夏之辭也随㑹為政晉盗奔秦左傳晉命随㑹將中軍且為太傅晉國之盜奔秦也虞芮入境譲心自生史記曰文王為西伯隂行善行諸侯皆来決平於是虞芮之人有獄不決乃如周入界見耕者譲畔少者譲長虞芮二人不見西伯慙而相謂曰吾所争周人所耻曷為取辱遂俱譲而還也化人在德不在用刑暢深納敞諫更崇寛政慎刑簡罸教化遂行郡中豪族多以奢靡相尚暢常布衣皮褥車馬嬴敗以矯其敝同郡劉表時年十七從暢受學進諫曰夫奢不僭上儉不逼下禮記曰君子上不僭上下不逼下也循道行禮貴處可否之間蘧伯玉恥獨為君子府君不希孔聖之明訓而慕夷齊之末操論語孔子曰奢則不遜儉則固言仲尼得奢儉之中而夷齊飢死是末操也無乃皎然自貴於世乎暢曰昔公儀休在魯㧞園葵去織婦史記曰魯相公儀休之其家見織帛怒而出其婦食於舍而茹葵愠而㧞其葵曰吾已食禄又奪園夫女子利乎孫叔敖相楚其子被裘刈薪史記曰孫叔敖為楚相且死囑其子曰我死汝貧困往見優孟言孫叔敖子也居數年其子貧負薪逢優孟優孟言之於王封之寢丘四百户也夫以約失之鮮矣論語孔子之辭也言儉則無失聞伯夷之風者貪夫亷懦夫有立志孟子之辭雖以不德敢慕遺烈後徵為長樂衛尉建寧元年遷司空數月以水災䇿免明年卒於家子謙為大將軍何進長史謙子粲以文才知名粲字仲宣蔡邕見而竒之時邕才學顯著貴重朝廷車騎填門賔客盈坐聞粲在門倒屣迎之旣至年幼容狀短小一座盡驚邕曰王公之孫有異才吾不如也太祖辟粲為丞相掾後為侍中博物多識問無不對嘗與人行讀道邊碑人問卿能闇記乎因使背而誦之一字不失觀人圍棊粲為覆之棊者不信以帊蓋之更以它局為之不誤一道年四十卒魏志有傳种暠傳种暠字景伯河南洛陽人仲山甫之後也父為定陶令有財三千萬父卒暠悉以賑䘏宗族及邑里之貧者其有進趣名利皆不與交通始為縣門下史時河南尹田歆外甥王諶名知人有知人之名也歆謂之曰今當舉六孝亷多得貴戚書命不冝相違欲自用一名士以報國家爾助我求之明日諶送客於大陽郭遥見暠異之還白歆曰為尹得孝亷矣近洛陽門下史也歆笑曰當得山澤隐滯近洛陽吏邪諶曰山澤不必有異士異士不必在山澤歆即召暠於庭辯詰職事暠辭對有序歆甚知之召署主簿遂舉孝亷辟太尉府舉高第順帝末為侍御史時所遣八使光祿大夫杜喬周舉等多所糾奏而大將軍梁冀及諸宦官互為請救事皆被寑遏暠自以職主刺舉志案姦違乃復劾諸為八使所舉蜀郡太守劉宣等罪惡章露宜伏歐刀又奏請勅四府條舉近臣父兄及知親為刺史二千石尤殘穢不勝任者免遣案罪帝乃從之擢暠監太子於承光宫中常侍高梵從中單駕出迎太子時太傅杜喬等疑不欲從惶惑不知所為暠乃手劍當車曰太子國之儲副人命所係今常侍来無詔信何以知非姦邪今日有死而已梵辭屈不敢對馳命奏之劉攽曰案文多一命字詔報太子乃得去喬退而歎息愧暠臨事不惑帝亦嘉其持重稱善者良乆出為益州刺史暠素慷慨好立功立事在職三年宣恩遠夷開曉殊俗岷山雜落皆懷服漢徳其白狼槃木唐菆卭𤏡諸國菆音側留反自前刺史朱輔卒後遂絶暠至乃復舉種向化時永昌太守冶鑄黄金為文蛇以獻梁冀暠糾發逮捕馳傳上言而二府畏懦不敢案之冀由是銜怒於暠㑹巴郡人服直聚黨百餘人自稱天王直或作宜暠與太守應承討捕不克吏人多被傷害冀因此䧟之傳逮暠承太尉李固上疏救曰臣伏聞討捕所傷本非暠承之意實由縣吏懼法畏罪廹逐深苦致此不詳比盜賊羣起處處未絶暠承以首舉大姦而相随受罪臣恐沮傷州縣糾發之意更共飾匿莫復盡心言各飾偽辭隠匿真狀也梁太后省奏乃赦暠承罪免官而已後梁州羗動以暠為梁州刺史甚得百姓歡心被徵當遷吏人詣闕請留之太后歎曰未聞刺史得人心若是乃許之暠復留一年遷漢陽太守戎夷男女送至漢陽界暠與相揖謝千里不得乗車及到郡化行羌胡禁止侵掠遷使匈奴中郎將時遼東烏桓反叛復轉遼東太守烏桓望風率服迎拜於界上坐事免歸後司𨽻校尉舉暠賢良方正不應徵拜議郎遷南郡太守入為尚書㑹匈奴寇并涼二州桓帝擢暠為度遼將軍暠到營所先宣恩信誘降諸胡其有不服然後加討羌虜先時有生見獲質於郡縣者悉遣還之誠心懷撫信賞分明由是羌胡龜兹莎車烏孫䓁皆来順服暠乃去𤇺燧除候望畫舉𤇺夜燔燧觧見光武紀邊方晏然無警入為大司農延熹四年遷司徒推逹名臣橋𤣥皇甫規等為稱職相在位三年年六十一薨并涼邊人咸為發哀匈奴聞暠卒舉國傷惜單于每入朝賀望見墳墓輒哭泣祭祀二子岱拂岱字公祖好學養志舉孝亷茂才辟公府皆不就公車特徵病卒初岱與李固子爕同徵議郎爕聞岱卒痛惜甚乃上書求加禮於岱曰臣聞仁義興則道德昌道德昌則政化明而萬姓寧伏見故處士种岱淳和逹理耽悦詩書富貴不能回其慮萬物不能擾其心禀命不永奄然殂殞若不槃桓難進等軰皆已公卿矣易屯卦曰槃桓利居貞昔先賢既没有加贈之典春秋隠公五年臧僖伯卒隠公葬之加一等杜預曰加命服之一等周禮盛德有銘誄之文周禮司勲曰凡有功者銘書於王之太常又曰卿大夫之喪賜諡誄也而岱生無印綬之榮卒無官諡之號雖未建忠效用而為聖恩所拔遐邇具瞻宜有異賞朝廷竟不能從拂字頴伯初為司𨽻從事拜宛令時南陽郡吏好因休沐游戲市里為百姓所患拂出逢之必下車公謁以愧其心自是莫敢出者政有能名累遷光祿大夫初平元年代荀爽為司空明年以地震䇿免復為太常李傕郭汜之亂長安城潰百官多避兵衝拂揮劔而出曰為國大臣不能止戈除暴致使凶賊兵刃向宫去欲何之遂戰而死子邵邵字申甫少知名中平末為諫議大夫大將軍何進將誅宦官召并州牧董卓至澠池而進意更狐疑遣邵宣詔止之卓不受遂前至河南邵迎勞之因譬令還軍卓疑有變使其軍士以兵脅邵邵怒稱詔大呼叱之軍士皆披披音芳靡反遂前質責卓卓辭屈乃還軍夕陽亭夕陽亭在河南城西及進敗獻帝即位拜邵為侍中卓既擅權而惡邵彊力遂左轉議郎出為益涼二州刺史㑹父拂戰死竟不之職服終徵為少府大鴻臚皆辭不受曰昔我先父以身徇國吾為臣子不能除殘復怨何面目朝覲明主哉遂與馬騰韓遂及左中郎劉範諫議大夫馬宇共攻李傕郭汜以報其讎與汜戰於長平觀下長平陵名也有觀在長安西十五里也軍敗邵等皆死騰遂還涼州陳球傳陳球字伯真下邳淮浦人也歴世著名謝承書曰祖父屯有令名父亹廣漢太守亹音尾球少渉儒學善律令陽嘉中舉孝亷稍遷繁陽令繁陽魏郡縣也時魏郡太守諷縣求納貨賄球不與之太守怒而撾督郵欲令逐球撾擊也督郵不肯曰魏郡十五城獨繁陽有異政今受命逐之將致議於天下矣太守乃止復辟公府舉高第拜侍御史是時桂陽黠賊李研等羣聚寇鈔陸梁荆部州郡懦弱不能禁太尉楊秉表球為零陵太守球到設方畧期月間賊虜消散而州兵朱蓋等反與桂陽賊胡蘭數萬人轉攻零陵零陵下溼編木為城不可守備郡中惶恐掾史白遣家避難球怒曰太守分國虎符受任一邦文帝初與郡守分銅虎符豈顧妻孥而沮國威重乎復言者斬乃悉内吏人老弱與共城守弦大木為弓羽矛為矢引機發之遠射千餘歩多所殺傷賊復激流灌城球輒於内因地埶反決水淹賊相拒十餘日不能下㑹中郎將度尚將救兵至球募士卒與尚共破斬朱蓋等賜錢五十萬拜子一人為郎遷魏郡太守徵拜將作大匠作桓帝陵園所省巨萬以上遷南陽太守以糾舉豪右為埶家所謗徵詣廷尉抵罪㑹赦歸家復拜廷尉劉攽曰案球初未嘗為廷尉何得言復當作徴字熹平元年竇太后崩太后本遷南宫雲臺太后父竇武與陳蕃謀誅宦官反為中常侍曹節矯詔殺武蕃遷太后焉宦者積怨竇氏遂以衣車載后尸置城南市舍數日中常侍曹節王甫欲用貴人禮殯帝曰太后親立朕躬綂承大業詩云無德不報無言不酬大雅抑詩也豈宜以貴人終乎於是發喪成禮及將葬節等復欲别葬太后而以馮貴人配祔祔謂新死之主祔於先死者之廟婦祔於其夫所祔之妃妾祔於妾祖姑也詔公卿大㑹朝堂令中常侍趙忠監議太尉李咸時病乃扶輿而起𢷬椒自随謂妻子曰若皇太后不得配食桓帝吾不生還矣既議坐者數百人各瞻望中宫良乆莫肯先言趙忠曰議當時定怪公卿以下各相顧望球曰皇太后以盛德良家母臨天下宜配先帝是無所疑忠笑而言曰陳廷尉宜便操筆球即下議曰皇太后自在椒房有聰明母儀之德遭時不造援立聖明承繼宗廟功烈至重先帝晏駕因遇大獄遷居空宫不幸早世家雖獲罪事非太后今若别葬誠失天下之望且馮貴人冢墓被發骸骨暴露與賊併尸魂靈汙染叚熲為河南尹坐盜發馮貴人冢左遷諫議大夫且無功於國何宜上配至尊忠省球議作色俛仰蚩球曰陳廷尉建此議甚健球曰陳竇既寃皇太后無故幽閉臣常痛心天下憤歎今日言之退而受罪宿昔之願公卿以下皆從球議李咸始不敢先發見球辭正然後大言曰臣本謂宜爾誠與臣意合㑹者皆為之愧曹節王甫復争以為梁后家犯惡逆别葬懿陵武帝黜廢衛后而以李夫人配食戾太子衛皇后共太子斬江充自殺武帝崩霍光縁上雅意以李夫人配食也今竇氏罪深豈得合葬先帝乎李咸乃詣闕上疏曰臣伏惟章德竇后虐害恭懷安思閻后家犯惡逆而和帝無異葬之議順朝無貶降之文至於衛后孝武皇帝身所廢弃不可以為比今長樂太后尊號在身親嘗稱制坤育天下周易曰坤為母且援立聖明光隆皇祚太后以陛下為子陛下豈得不以太后為母子無黜母臣無貶君宜合葬宣陵一如舊制帝省奏謂曹節等曰竇氏雖為不道而太后有德於朕不宜降黜節等無復言於是議者乃定咸字元貞汝南人累經州郡以亷幹知名在朝清忠權悻憚之六年遷球司空以地震免拜光祿大夫復為廷尉太常光和元年遷太尉數月以日食免復拜光祿大夫明年為永樂少府桓帝母孝崇皇后宫曰永樂置太僕少府乃潛與司徒河間劉郃謀誅宦官初郃兄侍中鯈與大將軍竇武同謀俱死故郃與球相結事未及發球復以書勸郃曰公出自宗室位登台鼎天下瞻望社稷鎮衛豈得雷同容容無違而已今曹節等放縱為害而乆在左右又公兄侍中受害節等永樂太后所親知也今可表徙衛尉陽球為司𨽻校尉以次收節等誅之政出聖主天下太平可翹足而待也又尚書劉納以正直忤宦官出為歩兵校尉亦深勸於郃郃曰凶豎多耳目恐事未㑹先受其禍納曰公為國棟梁傾危不持焉用彼相邪論語孔子之辭也郃許諾亦結謀陽球球小妻程璜之女璜用事宫中所謂程大人也節等頗得聞知乃重賂於璜且脅之璜懼迫以球謀告節節因共白帝曰郃等常與藩國交通有惡意數稱永樂聲埶受取狼籍歩兵校尉劉納及永樂少府陳球衛尉陽球交通書疏謀議不軌帝大怒䇿免郃郃與球及劉納陽球皆下獄死球時年六十二子瑀吳郡太守瑀弟琮汝隂太守弟子珪沛相珪子登廣陵太守並知名謝承書曰瑀舉孝亷辟公府洛陽市長後辟太尉府未到永漢元年就拜議郎遷吳郡大守不之官球弟子珪字漢瑜舉孝亷劇令去官舉茂才濟北相珪子登字元龍學通今古處身循禮非法不行性兼文武有雄姿異畧一領廣陵太守魏志曰登在廣陵有威名有功加伏波將軍年三十九卒後許汜與劉備並在荆州牧劉表坐備共論天下人汜曰陳元龍淮海之士豪氣不除備問汜曰君言豪寕有事邪汜曰昔遭亂過下邳見元龍無客主之意不相與語自上大牀卧使客卧下牀備曰君有國士之名今天下大亂帝王失所君湏憂國忘家有救世之意乃求田問舍言無可采是元龍所諱也何縁當與君語如我自卧百尺樓上卧君於地下何但上下牀之間哉表大笑也贊曰安儲遭譛張卿有請張晧為廷尉故曰卿龔紏便佞以直為𤯝𤯝過也二子過正埋車堙井張綱埋輪王暢堙井孟子曰矯枉過正种公自㣲臨官以威陳球專議桓思同歸後漢書卷八十六後漢書卷八十六考證張晧傳張晧六世祖良何焯曰功臣表元康四年良元孫之子陽陵公乗千秋詔復家是子孫居陽陵無縁徙蜀也千秋當宣帝時已為良六世孫不應自元康四年至世祖建武之元又八十七年晧猶為六世孫也又蜀志張翼傳晧作浩是翼之高祖亦不言其出於留侯如孔明之於豐鄧芝之於禹來敏之於歙也張晧子綱司徒高第辟為御史别本作司徒辟高第為御史王龔傳不至重問注成帝時丞相薛宣御史大夫翟方進成帝監本作武帝臣㑹汾按薛宣翟方進乃成帝時人非武帝時也從何焯校本改种暠傳推逹名臣橋𤣥皇甫䂓等為稱職相監本無相字臣㑹汾按橋𤣥於光和元年一為太尉皇甫規歴職邊郡官止度遼將軍未嘗為相也相字舛誤無疑若從監本則語勢又似不完疑為字亦誤今姑仍從宋本後漢書卷八十六考證
