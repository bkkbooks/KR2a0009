body:
  text: 後漢書卷六十二宋宣城太守范煜撰唐章懷太子賢注樊陰列傳第二十二樊宏傳子儵族曾孫凖樊宏字靡卿南陽湖陽人也世祖之舅其先周仲山甫封于樊因而氏焉樊今襄州安養縣也為鄉里著姓父重字君雲世善農稼好貨殖重性温厚有法度三世共財子孫朝夕禮敬常若公家其營理産業物無所棄課役童𨽻各得其宜故能上下戮力財利歲倍至乃開廣田土三百餘頃其所起廬舍皆有重堂髙閤陂渠灌注酈元水經注曰湖水支分東北為樊氏陂東西十里南北五里亦謂之凡亭陂東樊氏故宅樊氏既滅庾氏取其陂故諺曰陂汪汪下田良樊氏失業庾氏昌其陂至今猶名為樊陂在今鄧州新野縣之西南也又池魚牧畜有求必給嘗欲作器物先種梓漆時人嗤之然積以歲月皆得其用向之笑者咸求假焉貲至巨萬而賑贍宗族恩加鄉閭外孫何氏兄弟爭財重恥之以田二頃解其忿訟縣中稱美推為三老年八十餘終其素所假貸人間數百萬遺令焚削文契責家聞者皆慙爭往償之責音側界反諸子從勅竟不肯受宏少有志行王莽末義兵起劉伯升與族兄賜俱將兵攻湖陽城守不下賜女弟為宏妻湖陽由是收繫宏妻子令出辟伯升宏因留不反湖陽軍帥欲殺其妻子長吏以下共相謂曰樊重子父禮義恩德行於鄉里雖有罪且當有後㑹漢兵日盛湖陽惶急未敢殺之遂得免脫更始立欲以宏為將宏叩頭辭曰書生不習兵事竟得免歸與宗家親屬作營壍自守老弱歸之者千餘家時赤眉賊掠唐子鄉多所踐殺欲前攻宏營宏遣人持牛酒米穀勞遺赤眉赤眉長老先聞宏仁厚皆稱曰樊君素善且今見待如此何心攻之引兵而去遂免宼難世祖即位拜光禄大夫位特進次三公建武五年封長羅侯長羅縣名屬陳留郡故城在今滑州匡城縣東北十三年封弟丹為射陽侯在射水之陽水經注曰泚水西南流射水注之水出射城北建武十三年封樊重少子丹為射陽侯即其國也按臨淮郡别有射陽縣疑逺非此地也兄子尋𤣥鄉侯族兄忠更父侯十五年定封宏夀張侯十八年帝南祠章陵過湖陽祠重墓追爵諡為夀張敬侯立廟於湖陽車駕每南廵常幸其墓賞賜大㑹宏為人謙柔畏愼不求茍進常戒其子曰富貴盈溢未有能終者吾非不喜榮埶也天道惡滿而好謙前世貴戚皆明戒也易曰天道虧盈而益謙人道惡盈而好謙也保身全已豈不樂哉每當朝㑹輒迎期先到俯伏待事時至乃起帝聞之常勅騶騎臨朝乃告勿令豫到宏所上便宜及言得失輒手自書寫毁削草本公朝訪逮不敢衆對宗族染其化未嘗犯法帝甚重之及病困車駕臨視留宿問其所欲言宏頓首自陳無功享食大國誠恐子孫不能保全厚恩令臣魂神慙負黄泉願還夀張食小鄉亭帝悲傷其言而竟不許二十七年卒遺勅薄𦵏一無所用以為棺柩一臧不宜復見如有腐敗傷孝子之心使與夫人同墳異臧帝善其令以書示百官因曰今不順夀張侯意無以彰其德且吾萬歲之後欲以為式賻錢千萬布萬匹諡曰恭侯贈以印綬車駕親送𦵏子儵嗣帝悼宏不已復封少子茂為平望侯平望縣屬北海郡故城在今青州北海縣西北俗名平望䑓也樊氏侯者凡五國明年賜儵弟鮪及從昆弟七人合錢五千萬論曰昔楚頃襄王問陽陵君曰君子之富何如對曰假人不德不責食人不使不役親戚愛之衆人善之假貸人者不自以為德不責其報也食善人者不使役之故衆人稱善也說苑曰楚王問荘辛之言也劉攽曰注食善人者不使役之案食人而已何故輒擇善人明此是養字或云當云善食人者若乃樊重之折契止訟其庶幾君子之富乎分地以用天道實廪以崇禮節管子曰倉廩實而知禮節取諸理化則亦可以施於政也與夫愛而畏者何殊間哉左傳曰是以其人畏而愛之何殊間哉言不異也間音古莧反儵字長魚劉攽曰樊儵字長魚按儵非魚類與名不合疑本是鯈字鯈即魚名可為字也又按儵弟名鮪知作鯈無疑謹約有父風事後母至孝及母卒哀思過禮毁病不自支世祖常遣中黄門朝暮送饘粥饘縻也服闋就侍中丁㳟受公羊嚴氏春秋嚴彭祖也建武中禁網尚闊諸王既長各招引賓客以儵外戚爭遣致之而儵清靜自保無所結交及沛王輔事發貴戚子弟多見收捕儵以不豫得免帝崩儵為復土校尉復土校尉主𦵏事復土於壙也永平元年拜長水校尉與公卿雜定郊祠禮儀以䜟記正五經異說北海周澤琅邪承宫並海内大儒儵皆以為師友而致之於朝上言郡國舉孝廉率取年少能報恩者耆宿大賢多見廢棄宜勅郡國簡用良俊又議刑辟宜湏秋月以順時氣顯宗並從之二年以夀張國益東平王徙封儵燕侯燕縣名屬東郡其後廣陵王荆有罪帝以至親悼傷之詔儵與羽林監南陽任隗雜理其獄事竟奏請誅荆引見宣明殿帝怒曰諸卿以我弟故欲誅之即我子卿等敢爾邪儵仰而對曰天下髙帝天下非陛下之天下也春秋之義君親無將將而誅焉公羊傳之文也將者將為弑逆之事也是以周公誅弟季友鴆兄經傳大之周公之弟管蔡二叔流言於國云周公攝政將不利於成王故周公誅之左傳曰周公殺管叔而􅔁蔡叔夫豈不愛王室故也杜預注曰􅔁放也又曰魯莊公有疾叔牙欲立公子般友遂鴆叔牙殺之公羊傳曰季子殺母兄何善其誅不得避兄君臣之義也上􅔁音薩劉攽曰注何善其誅不得避兄按文其當作爾臣等以荆屬託母弟陛下留聖心加惻隠故敢請耳如今陛下子劉攽曰按文今當作令臣等専誅而已専謂不請也帝歎息良久儵益以此知名其後弟鮪為子賞求楚王英女敬鄉公主儵聞而止之曰建武時吾家並受榮寵一宗五侯謂宏封長羅侯弟丹射陽侯兄子弟尋𤣥鄉侯族兄忠更父侯宏又封夀張侯也時特進一言女可以配王男可以尚主宏為特進但以貴寵過盛即為禍患故不為也且爾一子柰何棄之於楚乎鮪不從十年儵卒賵贈甚厚諡曰哀侯帝遣小黄門張音問所遺言先是河南縣亡失官錢典負者典謂主典負謂欠負坐死及罪徙者甚衆遂委責於人以償其耗鄉部吏司因此為姦儵常疾之又野王歲獻甘醪膏餳醪醇酒汁滓相將也每輒擾人吏以為利儵並欲奏罷之疾病未及得上音歸具以聞帝覽之而悲歎勅二郡並令從之長子氾嗣以次子郴梵為郎其後楚事發覺帝追念儵謹恪又聞其止鮪婚事故其諸子得不坐焉梵字文髙為郎二十餘年三署服其重愼三署解見和帝紀悉推財物二千餘萬與孤兄子官至大鴻臚氾卒子時嗣時卒子建嗣建卒無子國絶永寜元年鄧太后復封建弟盼盼卒子尚嗣初儵刪定公羊嚴氏春秋章句世號樊侯學教授門徒前後三千餘人弟子潁川李脩九江夏勤皆為三公勤字伯宗為京宛二縣令零陵太守所在有理能稱安帝時位至司徒凖字幼陵宏之族曾孫也凖或作准父瑞好黄老言清靜少欲凖少勵志行修儒術以先父産業數百萬讓孤兄子永元十五年和帝幸南陽凖為郡功曹召見帝器之拜郎中從車駕還宫特補尚書郎鄧太后臨朝儒學陵替凖乃上疏曰臣聞賈誼有言人君不可以不學故雖大舜聖德孳孳為善孟子曰雞鳴而起孳孳為善者舜之徒也成王賢主崇明師傅尚書曰召公為保周公為師相成王為左右也及光武皇帝受命中興羣雄崩擾旌旗亂野東西誅戰不遑啟處然猶投戈講蓺息馬論道至孝明皇帝兼天地之姿用日月之明庶政萬幾無不簡心而垂情古典游意經蓺每饗射禮畢正坐自講諸儒並聽四方欣欣雖闕里之化矍相之事誠不足言孔子闕里人也禮記云孔子射於矍相之圃盖觀者如堵墻也又多徵名儒以充禮官如沛國趙孝琅邪承宫等或安車結駟告歸鄉里安車坐乗之車也告歸謂休假歸也或豐衣博帶從見宗廟其餘以經術見優者布在廊廟故朝多皤皤之良華首之老皤皤白首貌也音歩河反書曰皤皤良士華首謂白首也每讌㑹則論難衎衎共求政化衎衎和樂貌也詳覽羣言響如振玉孟子曰金聲而玉振之也朝者進而思政罷者退而備問小大随化雍雍可嘉期門羽林介胄之士悉通孝經博士議郎一人開門徒衆百數開門謂開一家之說化自聖躬流及蠻荒匈奴遣伊秩訾王大車且渠來入就學八方肅清上下無事是以議者每稱盛時咸言永平今學者盖少劉攽曰案文盖當作益逺方尤甚博士倚席不講儒者競論浮麗忘謇謇之忠習諓諓之辭諓諓謟言也音踐前書曰昔秦穆公說諓諓之言也文吏則去法律而學詆欺詆亦欺也銳錐刀之鋒斷刑辟之重德陋俗薄以致苛刻左傳曰鄭人鑄刑書叔向使貽子産書曰今子相鄭立謗政鑄刑書人知爭端矣将棄禮而徵於書錐刀之末将盡爭之鄭其敗乎杜預注云錐刀喻小事也昔孝文竇后性好黄老而清靜之化流景武之間臣愚以為宜下明詔博求幽隠發揚巖穴寵進儒雅有如孝宫者徵詣公車以俟聖上講習之期公卿各舉明經及舊儒子孫進其爵位使纘其業復詔郡國書佐使讀律令如此則延頸者日有所見傾耳者月有所聞伏願陛下推述先帝進業之道周易曰君子進德修業太后深納其言是後屢舉方正敦樸仁賢之士凖再遷御史中丞永平之初連年水旱災異郡國多被飢困凖上疏曰臣聞傳曰飢而不損兹曰太厥災水洪範五行傳之文也言下人飢饉君上不能損減謂之為太太猶甚也春秋穀梁傳曰五穀不登謂之大侵大侵之禮百官備而不製官職備列不造作也羣神禱而不祠禱請而已無祭祀也由是言之調和陰陽實在儉節朝廷雖勞心元元事從省約而在職之吏尚未奉承夫建化致理由近及逺故詩曰京師翼翼四方是則韓詩之文也翼翼然盛也今可先令太官尚方考功劉攽曰案功當作工考工官名見前書上林池籞諸官實減無事之物前書百官表曰少府掌山海池澤之稅屬官有太官考工尚方上林中十池監也太官掌御膳飲食考工主作噐械尚方主作刀劎噐物籞者於池苑中以竹綿聫之為禁籞也實減謂實覆其數減之也五府調省中都官吏京師作者五府謂太傅太尉司徒司空大將軍也調徵發也省減也中都官吏在京師之官吏也作謂營作者也如此則化及四方人勞省息伏見被災之郡百姓彫殘恐非賑給所能勝贍雖有其名終無其實可依征和元年故事武帝征和元年詔曰當今務在禁苛暴止擅賦力本農桑無乏武備而已遣使持節慰安尤困乏者徙置荆揚熟郡既省轉運之費且令百姓各安其所今雖有西屯之役宜先東州之急時先零羌斷隴道大為寇害遣車騎將軍鄧隲征西校尉任尚討之故曰西屯役也東州謂冀兗州時又遣光禄大夫樊凖吕倉分冀兗二州廩貸流人也如遣使者與二千石隨事消息悉留富人守其舊土轉尤貧者過所衣食誠父母之計也衣音於既反食音嗣願以臣言下公卿平議太后從之悉以公田賦與貧人即擢凖與議郎吕倉並守光禄大夫凖使冀州倉使兗州凖到部開倉廩食廪給慰安生業流人咸得蘇息還拜鉅鹿太守時飢荒之餘人庶流迸家户且盡凖課督農桑廣施方略朞年間穀粟豐賤數十倍而趙魏之郊數為羌所鈔暴凖外禦寇虜内撫百姓郡境以安五年轉河内太守時羌復屢入郡界凖輒將兵討逐修理塢壁說文曰塢小障也威名大行視事三年以疾徵三轉為尚書令明習故事遂見任用元初三年代周暢為光禄勲五年卒於官陰識傳弟興陰識字次伯南陽新野人也光烈皇后之前母兄也其先出自管仲管仲七世孫修自齊適楚為陰大夫因而氏焉秦漢之際始家新野及劉伯升起義兵識時游學長安聞之委業而歸率子弟宗族賓客千餘人往詣伯升伯升乃以識為校尉更始元年遷偏將軍從攻宛别䧏新野淯陽杜衍冠軍胡陽五縣並屬南陽郡也二年更始封識陰德侯行大將軍事建武元年光武遣使迎陰貴人於新野并徵識識隨貴人至以為騎都尉更封陰鄉侯二年以征伐軍功增封識叩頭讓曰天下初定將帥有功者衆臣託屬掖廷仍加爵邑不可以示天下帝甚美之以為關都尉鎭函谷遷侍中以母憂辭歸十五年定封原鹿侯原鹿縣屬汝南郡俗本鹿作慶者誤及顯宗立為皇太子以識守執金吾輔導東宫帝每廵郡國識常留鎭守京師委以禁兵入雖極言正議及與賔客語未嘗及國事帝敬重之常指識以勅戒貴戚激厲左右焉識所用掾史皆簡賢者如虞延傅寛薛愔等多至公卿校尉顯宗即位拜為執金吾位特進永平二年卒贈以本官印綬諡曰貞侯子躬嗣躬卒子璜嗣永初七年為奴所殺無子國絶永寜元年鄧太后以璜弟淑紹封淑卒子鮪嗣躬弟子綱女為和帝皇后封綱吳房侯位特進三子軼輔敞皆黄門侍郎后坐巫蠱事廢綱自殺輔下獄死軼敞徙日南識弟興興字君陵光烈皇后母弟也為人有膂力建武二年為黄門侍郎守期門僕射典將武騎從征伐平定郡國興每從出入常操持小盖障翳風雨躬履塗泥率先期門光武所幸之處輒先入清宫甚見親信雖好施接賔然門無俠客與同郡張宗上谷鮮于裒不相好知其有用猶稱所長而逹之友人張氾杜禽與興厚善以為華而少實但私之以財終不為言是以世稱其忠平第宅茍完裁蔽風雨九年遷侍中賜爵關内侯帝後召興欲封之置印綬於前興固讓曰臣未有先登䧟陣之功而一家數人並蒙爵土令天下觖望誠為盈溢觖音羌志反前書音義曰觖猶兾也一音决猶望之也臣蒙陛下貴人恩澤至厚富貴已極不可復加至誠不願帝嘉興之讓不奪其志貴人問其故興曰貴人不讀書記邪亢龍有悔易乾卦上九爻曰亢龍有悔窮之災也亢極也龍以喻君言居上體之極則有悔吝之災也夫外戚家苦不知謙退嫁女欲配侯王取婦眄睨公主愚心實不安也富貴有極人當知足夸奢益為觀聽所譏貴人感其言深自降挹卒不為宗親求位十九年拜衛尉亦輔導皇太子明年夏帝風眩疾甚後以興領侍中受顧命於雲臺廣室尚書曰成王將崩命召公作顧命孔安國注云臨終之命曰顧命洛陽南宫有雲臺廣德殿㑹疾瘳召見興欲以代呉漢為大司馬興叩頭流涕固讓曰臣不敢惜身誠虧捐聖德不可茍冒至誠發中感動左右帝遂聽之二十三年卒時年三十九興素與從兄嵩不相能然敬其威重興疾病帝親臨問以政事及羣臣能不興頓首曰臣愚不足以知之然伏見議郎席廣謁者陰嵩並經行明深踰於公卿興沒後帝思其言遂擢廣為光禄勲嵩為中郎將監羽林十餘年以謹勅見幸顯宗即位拜長樂衞尉遷執金吾永平元年詔曰故侍中衞尉關内侯興典領禁兵從平天下當以軍功顯受封爵又諸舅比例應蒙恩澤興固讓安乎里巷輔導朕躬有周昌之直前書曰周昌沛人也為御史大夫為人强力敢直言極諫也在家仁孝有曾閔之行不幸早卒朕甚傷之賢者子孫宜加優異其以汝南之鮦陽封興子慶為鮦陽侯鮦陽故城在今豫州新蔡縣北在鮦水之陽也音紂慶弟博為㶏強侯㶏强縣屬汝南郡在㶏水之北博弟員丹並為郎慶推田宅財物悉與員丹帝以慶義讓擢為黄門侍郎慶卒子琴嗣建初五年興夫人卒肅宗使五官中郎將持節即墓賜䇿追諡興曰翼侯琴卒子萬全嗣萬全卒子桂嗣興弟就嗣父封宣恩侯後改封為新陽侯新陽縣屬汝南郡故城在今豫州眞陽縣西南就善談論朝臣莫及然性剛慠不得衆譽顯宗即位以就為少府位特進就子豐尚酈邑公主光武女也公主嬌妒豐亦狷急狷疾也音絹永平二年遂殺主被誅父母當坐皆自殺國除帝以舅氏故不極其刑陰氏侯者凡四人初陰氏世奉管仲之祀謂為相君宣帝時陰子方者至孝有仁恩臘日晨炊而竈神形見雜五行書曰竈神名禪字子郭衣黄衣夜被髪從竈中出知其名呼之可除凶惡宜市猪肝泥竈令婦孝子方再拜受慶家有黄羊因以祀之自是已後暴至巨富田有七百餘頃輿馬僕𨽻比於邦君子方常言我子孫必將彊大至識三世而遂繁昌故後常以臘日祀竈而祀黄羊焉贊曰權族好傾后門多毁樊氏世篤陰亦戒侈恂恂苖𦙍傳龜襲紫恂恂恭順貌也公侯皆紫綬金印龜鈕見應劭漢官儀後漢書卷六十二後漢書卷六十二考證樊宏傳令出辟伯升辟字一本作譬注曉喻也樊宏族曾孫凖永平之初臣人龍按明帝永平元年戊午至和帝永元元年己丑相隔三十餘年前既云永元十五年凖為郡功曹上復云遷御史中丞則此安得復云永平之初當是安帝永初之初耳建化致理致字監本誤作之今從宋本改正實减無事之物注以竹綿聫之宋本竹字下有帛字臣㑹汾按此謂以竹為籓籬耳帛何所用之當因下有綿字故誤也從諸本刪陰識弟興後改封為新陽侯注新陽縣屬汝南郡監本作屬汝郡脫南字又故城監本誤作故地今俱從宋本改正後漢書卷六十二考證
