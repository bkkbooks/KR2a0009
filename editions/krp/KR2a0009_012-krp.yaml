body:
  text: 後漢書卷十二梁剡令劉昭補幷注律厯志第二律厯中賈逵論厯漢安論厯永元論厯熹平論厯延光論厯論月食自太初元年始用三統厯施行百有餘年厯稱後天朔先厯朔或在晦月見考其行日有退無進月有進無退建武八年中太僕朱浮太中大夫許淑等數上書言厯不正宜當改更時分度覺差尚微上以天下初定未遑考正至永平五年官厯署七月十六月食待詔楊岑見時月食多先厯即縮用算上為日上言月當十五日食官厯不中詔書令岑普與官課起七月盡十一月弦朢凡五官厯皆失岑皆中庚寅詔令岑署弦朢月食官復令待詔張盛景防鮑鄴等以四分法與岑課嵗餘盛等所中多岑六事十二年十一月丙子詔書令盛防代岑署弦朢月食加時四分之術始頗施行是時盛防等未能分明厯元綜校分度故但用其弦朢而已先是九年太史待詔董萌上言厯不正事下三公太常知厯者雜議訖十年四月無能分明據者至元和二年太初失天益逺日月宿度相覺浸多而候者皆知冬至之日日在斗二十一度未至牽牛五度而以為牽牛中星從天四分日之三晦朔弦朢差天一日宿差五度章帝知其謬錯以問史官雖知不合而不能易故召治厯編訢李梵等綜校其状蔡邕議云梵清河人二月甲寅遂下詔曰朕聞古先聖王先天而天不違後天而奉天時河圖曰赤九㑹昌十世以光十一以興又曰九名之世帝行徳封刻政朕以不徳奉承大業夙夜祗畏不敢荒寜予末小子託在於數終曷以續興崇𢎞祖宗拯濟元元尚書璇璣鈐曰述堯世放唐文帝命驗曰堯考徳顧期立象且三五步驟優劣殊軌况乎頑陋無以克堪雖欲從之末由也已每見圖書中心恧焉間者以来政治不得隂陽不和災異不息癘疫之氣流傷於牛農夲不播夫庶徴休咎五事之應咸在朕躬信有闕矣将何以補之書曰惟先假王正厥事又曰嵗二月東廵狩至岱宗柴望秩于山川遂覲東后叶時月正日祖堯岱宗同律度量考在璣衡以正厯象庶乎有益春秋保乾圖曰三百年斗厯改憲史官用太初鄧平術有餘分一在三百年之域行度轉差浸以謬錯璇璣不正文象不稽冬至之日日在斗二十二度而厯以為牽牛中星先立春一日則四分數之立春日也以折獄斷大刑於氣已迕用望平和厯時之義盖亦逺矣今改行四分以遵於堯以順孔聖奉天之文冀百君子越有民同心敬授獲咸喜以明予祖之遺功於是四分施行而訢梵猶以為元首十一月當先大欲以合耦弦朢命有常日而十九嵗不得七閏晦朔失實行之未期章帝復發聖思考之經讖使左中郎将賈逵問治厯者衛承李崇太尉屬梁鮪司徒嚴朂太子舍人徐震鉅鹿公乘蘇統及訢梵等十人以為月當先小據春秋經書朔不書晦者朔必有明晦不朔必在其月也即先大則一月再朔後月無朔是明不可必梵等以為當先大無文正驗取欲諧耦十六日月脁昬晦當滅而已又晦與合同時不得異日又上知訢梵宂見勑母拘厯已班天元始起之月當小定後年厯數遂正永元中復令史官以九道法候弦望驗無有差跌逵論集狀後之議者用得折衷故詳錄焉逵論曰太初厯冬至日在牽牛初者牽牛中星也古黄帝夏殷周魯冬至日在建星建星即今斗星也太初厯斗二十六度三百八十五分牽牛八度案行事史官注冬夏至日常不及太初厯五度冬至日在斗二十一度四分度之一石氏星經曰黄道規牽牛初直斗二十度去極二十五度於赤道斗二十一度也四分法與行事候注天度相應尚書考靈曜斗二十二度無餘分冬至在牽牛所起又編訢等據今日所在牽牛中星五度於斗二十一度四分一與考靈曜相近即以明事元和二年八月詔書曰石不可離令兩候上得算多者太史令元等候元和二年至永元元年五嵗中課日行及冬夏至斗一十一度四分一合古厯建星考靈曜日所起其星間距度皆如石氏故事他術以為冬至日在牽牛初者自此遂黜也逵論曰以太初厯考漢元盡太初元年日朔二十三事其十七得朔四得晦二得二日新厯七得朔十四得晦二得三日以太初厯考太初元年盡更始二年二十四事十得晦以新厯十六得朔七得二日一得晦以太初厯考建武元年盡永元元年二十三事五得朔十八得晦以新厯十七得朔三日晦三得二日又以新厯上考春秋中有日朔者二十四事失不中者二十三事天道參差不齊必有餘餘又有長短不可以等齊治厯者方以七十六嵗斷之則餘分稍長稍得一日故易金火相革之卦象曰君子以治厯明時又曰湯武革命順乎天應乎人言聖人必厯象日月星辰明數不可貫數千萬嵗其間必改更先距求度數取合日月星辰所在而已故求度數取合日月星辰有異世之術太初厯不能下通於今新厯不能上得漢元一家厯法必在三百年之間故讖文曰三百年斗厯改憲漢興當用太初而不改下至太初元年百二嵗乃改故其前有先晦一日合朔下至成哀以二日為朔故合朔多在晦此其明效也逵論曰臣前上傅安等用黄道度日月弦朢多近史官一以赤道度之不與日月同於今厯弦朢至差一日以上輒奏以為變至以為日却縮退行於黄道日得行度不為變願請太史官日月宿簿及星度課與待詔星象考校奏可臣謹案前對言冬至日去極一百一十五度夏至日去極六十七度春秋分日去極九十一度洪範日月之行則有冬夏五紀論日月循黄道南至牽牛北至東井率日日行一度月行十三度十九分度七也今史官一以赤道為度不與日月行同其斗牽牛輿鬼赤道得十五而黄道得十三度半行東璧奎婁軫角亢赤道十度黄道八度或月行多而日月相去反少謂之日却案黄道値牽牛出赤道南二十五度其直東井輿鬼出赤道北五度赤道者為中天去極俱九十度非日月道而以摇凖度日月失其實行故也以今太史官候注考元和二年九月已来月行牽牛東井四十九事無行十一度者行婁角三十七事無行十五六度者如安言問典星待詔姚崇井畢等十二人皆曰星圖有規法日月實從黄道官無其器不知施行案甘露二年大司農中丞耿夀昌奏以圖儀度日月行考驗天運狀日月行至牽牛東井日過度月行十五度至婁角日行一度月行十三度赤道使然此前世所共知也如言黄道有驗合天日無前却弦朢不差一日比用赤道密近宜施用上中多臣校案逵論永元四年也至十五年七月甲辰詔書造太史黄道銅儀以角為十三度亢十氐十六房五心五尾十八箕十斗二十四四分度之一牽牛七須女十一虛十危十六營室十八東壁十奎十七婁十二胃十五昴十二畢十六觜三參八東井三十輿鬼四栁十四星七張十七翼十九軫十八凡三百六十五度四分度之一冬至日在斗十九度四分度之一史官以郭日月行參弦朢雖密近而不為注日儀黄道與度轉運難以候是以少循其事逵論曰又今史官推合朔弦朢月食加時率多不中在於不知月行遲疾意永平中詔書令故太史待詔張隆以四分法署弦朢月食加時隆言能用易九六七八支知月行多少今案隆所署多失臣使隆逆推前手所署不應或異日不中天乃益逺至十餘度梵統以史官候注考校月行當有遲疾不必在牽牛東井婁角之間又非所謂朓側匿乃由月所在道有逺近出入所生率一月移故所疾處三度九嵗九道一復凡九章百七十一嵗復十一月合朔旦冬至合春秋三統九道終數可以知合朔弦朢月食加時據官注天度為分率以其術法上考建武以来月食凡三十八事差密近有益宣課試上案史官舊有九道術廢而不修熹平中故治厯郎梁國宗整上九道術詔書下太史以參舊術相應部太子舎人馮恂課校恂亦復作九道術增損其分與整術並校差為近太史令颺上以恂術參弦朢然而加時猶復先後天逺則十餘度杜預長厯曰書稱朞三百六旬有六日以閏月定四時成嵗允釐百工庶績咸熙是以天子必置日官諸侯必置日御世修其業以考其術舉全數而言故曰六日其實五日四分之一日日行一度而月日行十三度十九分度之有畸日官當㑹集此之遲疾以考成晦朔錯綜以設閏月閏月無中氣而北斗邪指兩辰之間所以異於他月也積此以相通四時八節無違乃得成嵗其微密至矣得其精微以合天道事叙而不悖故傳曰閏以正時時以作事事以厚生生民之道於是乎在然隂陽之運隨動而差差而不已遂與厯錯故仲尼丘明每於朔閏發文葢矯正得失因以宣明厯數也桓十七年日食得朔而史闕其日單書朔僖十五年日食而史闕朔與日故傳因其得失並起時史之謬兼以明其餘日食或厯失其正也莊二十五年經書六月辛未朔日有食之鼓用牲于社周之六月夏之四月所謂正陽之月也而時厯誤實是七月之朔非六月故傳云非常也唯正月之朔慝未作日有食之於是乎有用幣于社伐鼔於朝此非用幣伐鼔常月因變而起厯誤也文十五年經文皆同而更復發傳曰非禮明前傳欲以審正陽之月後傳發例欲以明諸侯之禮也此乃聖賢之微旨先儒所未喻也昭十七年夏六月日有食之而平子言非正陽之月以誣一朝近於指鹿為馬故傳曰不君君且因以明此月為得天正也劉子駿造三統厯以修春秋春秋日食有甲乙者三十四而三統厯唯一食厯術比諸家既最疎又六十餘嵗輒益一日凡嵗當累日為次而無故益之此不可行之甚者班固前代名儒而謂之最密非徒班固也自古以来諸論春秋者多述謬誤或造家術或用黄帝以来諸厯以推經傳朔日皆不得諧合日食於朔此乃天驗經傳又書其朔食可謂得天而劉賈諸儒説皆以為月二日或三日公違聖人明文其蔽在於守一元不與天消息也余感春秋之事嘗著厯論極言厯之通理其大指曰天行不息日月星辰各運其舍皆動物也物動則不一雖行度大量可得而限累日為月以新故相序不得不有毫毛之差此自然理也故春秋日有頻月而食者曠年不食者理不得一而算守恒數故厯無不有差失也始失於毫毛而尚未可覺積而成多以失弦朢朔晦則不得不改憲以從之書所謂欽若昊天歴象日月星辰易所謂治厯明時言尚順天以求合非為合以驗天者也推此論之春秋二百餘年其治厯變通多矣雖數術絶滅還尋經傳微旨大量可知時之違謬則經傳有驗學者固當曲循經傳月日日之食以考朔晦也以推時驗而皆不然各據其學以推春秋此無異度已之跡而欲削他人之足也余為厯論之後至咸寜中善算李修夏顯依論體為術名乾度厯表上朝廷其術合日行四分之數而微增月行用三百嵗改憲之意二元相推七十餘嵗承以强弱强弱之差葢少而適足以逺通盈縮時尚書及史官以乾度與太史厯參校古今記注乾度厯殊勝今其術具存時又并考古今十厯以驗春秋知三統厯之最踈也今具列其時得失之數又據經傳微旨證據及失閏旨考日辰朔晦以相發明為經傳長厯諸經傳證據及失閏時文字謬誤皆甄發之雖未必其得天葢春秋當時之厯也學者覧焉永元十四年待詔太史霍融上言官漏刻率九日增減一刻不與天相應或時差至二刻半不如夏厯密詔書下太常令史官與融以儀校天課度逺近太史令舒承梵等對案官所施漏法令甲第六常符漏品孝宣皇帝三年十二月乙酉下建武十年二月壬午詔書施行漏刻以日長短為數率日南北二度四分而增減一刻一氣俱十五日日去極各有多少今官漏率九日移一刻不隨日進退夏厯漏隨日南北為長短密近於官漏分明可施行其年十一月甲寅詔曰告司徒司空漏所以節時分定昏明昏明長短起於日去極逺近日道周不可以計率分當據儀度下參晷景今官漏以計率分昏明九日增減一刻違失其實至為疏數以耦法太史待詔霍融上言不與天相應太常史官運儀下水官漏失天者至三刻以晷景為刻少所違失密近有驗今下晷景漏刻四十八箭立成斧官府當用者計吏到班子四十八箭文多故魁取二十四氣日所在并黄道去極晷景漏刻昏明中星刻于下昔太初厯之興也發謀於元封啓定於天鳯積百三十年是非乃審及用四分亦於建武施於元和訖於永元七十餘年然後儀式備立司侯有凖天事幽微若此其難也中興以来圖讖漏泄而考靈曜命厯序皆有甲寅元其所起在四分庚申元後百一十四歳朔差却二日學士修之於草澤信向以為得正及太初厯以後大為疾而修之者云百四十四歳而太歳超一表百七十一歳當棄朔餘六十三中餘千一百九十七乃可常行自太初元年至永平十一年百七十一當去分而不去故令益有疏闊此二家常挟其術庶幾施行每有訟者百寮㑹議羣儒騁思論之有方益於多聞識之故詳錄焉安帝延光二年中謁者亶誦言當用甲寅元河南梁豐言當復用太初尚書郎張衡周興皆能厯數難誦豐或不對或言失誤衡興參案儀注者考往校今以為九道法最密詔書下公卿詳議太尉愷等上侍中施延等議太初過天日一度弦朢失正月以晦見西方食不與天相應元和改從四分四分雖密於太初復不正皆不可用甲寅元與天相應合圖讖可施行博士黄廣大行令任僉議如九道河南尹祉太子舍人李𢎞寺四十人議即用甲寅元當除元命苞天地開闢獲麟中百一十四嵗推閏月六直其日或朔晦弦朢二十四氣宿度不相應者非一用九道為朔月有比三大二小皆疏逺元和變厯以應保乾圖三百嵗斗厯改憲之文四分厯夲起圖讖最得其正不宜易愷等八十四人議宜從太初尚書令忠上奏諸從太初者皆無他效驗徒以世宗攘夷廓境享國久長為辭或云孝章改四分災異率甚未有善應臣伏惟聖王興起各異正朔以通三統漢祖受命因秦之紀十月為年首閏常在嵗後不稽先代違於帝典太宗遵修三階以平黄龍以至刑犴以錯五者以備洪範庶徴曰雨曰暘曰燠曰寒曰風五者来備各以其叙哀平之際同承太初而妖孽累仍痾禍非一議者不以成數相參考眞求實而汎采妄説歸福太初致咎四分太初厯衆賢所立是非已定永平不審復革其弦朢四分有謬不可施行元和鳯鳥不當應厯而翔集逺嘉前造則喪其休近譏後改則隱其福漏見曲論未可為是臣輒復重難衡興以為五紀論推步行度當時比諸術為近然猶未稽於古及向子歆欲以合春秋横斷年數損夏益周考之表紀差謬數百兩厯相課六千一百五十六歳而太初多一日冬至日直斗而云在牽牛迂闊不可復用昭然如此史官所共見非獨衡興前以為九道密近今議者以為有闕及甲寅元復多違失皆未可取正昔仲尼順假馬之名以崇君之義况天之厯數不可任疑從虛以非易是上納其言遂改厯事順帝漢安二年尚書侍郎邊韶上言世微於數虧道盛於得常數虧則物衰得常則國昌孝武皇帝攄發聖思因元封七年十一月甲子朔旦冬至乃詔太史令司馬遷治厯鄧平等更建太初改元易朔行夏之正乾鑿度八十分之四十三為日法設清臺之候驗六異課效觕密太初為最其後劉歆研幾極深驗之春秋參以易道以河圖帝覽嬉雒書甄曜度推廣九道百七十一嵗進退六十三分百四十四嵗一超次與天相應少有闕謬從太初至永平十一年百七十嵗進退餘分六十三治厯者不知處之推得十二度弦朢不效挾廢術者得竄其説至永和二年小終之數寖過餘分稍增月不用晦朔而先見孝章皇帝以保乾圖三百年斗厯改憲就用四分以太白復樞甲子為癸亥引天從算耦之目前更以庚申為元既無明文託之於獲麟之嵗又不與感精符單閼之嵗同史官相代因成習疑少能鉤深致逺案弦朢足以知之詔書下三公百官雜議太史令虞恭治厯宗訢等議建厯之本必先立元元正然後定日法法定然後度周天以定分至三者有程則厯可成也四分厯仲紀之元起於孝文皇帝後元三年嵗在庚辰上四十五嵗嵗在乙未則漢興元年也又上二百七十五嵗嵗在庚申則孔子獲麟二百七十六萬嵗尋之上行復得庚申嵗嵗相承從下尋上其執不誤此四分厯元明文圖讖所著也太初元年嵗在丁丑上極其元當在庚戍而曰丙子言百四十四嵗超一辰凡九百九十三超嵗有空行八十二周有奇乃得丙子案嵗所超於天元十一月甲子朔旦冬至日月俱超日行一度積三百六十五度四分度一而周天一匝名曰嵗嵗從一辰日不得空周天則嵗無由超辰案百七十嵗二蔀一章小餘六十三自然之數也夫數出於抄曶以成毫氂毫氂積累以成分寸兩儀既定日月始離初行生分積分成度日行一度一嵗而周故為術者各生度法或以九百四十或以八十一法有細觕以生兩科其歸一也日法者日之所行分也日垂令明行有常節日法所該通逺無已損益毫氂差以千里自此言之數無縁得有虧棄之意也今欲飾平之失斷法垂分恐傷大道以步日月行度終數不同四章更不得朔餘一雖言九道去課進退恐不足以補其闕且課厯之法晦朔變弦以月食天驗昭著莫大焉今以去六十三分之法為厯驗章和元年以来日變二十事案五行志章和元年訖漢安二年日變二十三事古今注又長月食二十八事與四分厯更失定課相除四分尚得多而又使近孝章皇帝厯度審正圖儀晷漏與天相應不可復尚文曜鉤曰髙辛受命重黎説文唐堯即位羲和立禪夏后制徳昆吾列神成周改號萇𢎞分官運斗樞曰常占有經世史所明洪範五紀論曰民間亦有黄帝諸厯不如史官記之明也自古及今聖帝明王莫不取言於羲和常占之官定精微於晷儀正衆疑祕藏中書改行四分之原及光武皇帝數下詔書草創其端孝明皇帝課校其實孝章皇帝宣行其法君更三聖年歴數十信而徴之舉而行之其元則上統開闢其數則復古四分宜如甲寅詔書故事奏可靈帝熹平四年五官郎中馮光沛相上計掾陳晃言厯元不正故妖民叛宼益州盗賊相續為厯用甲寅為元而用庚申圖緯無以庚為元者近秦所用代周之元太史治厯郎中郭香劉固意造妄説乞與夲庚申元經緯有明受虛欺重誅乙卯詔書下三府與儒林明道者詳議務得道眞以羣臣㑹司徒府議蔡邕集載三月九日百官㑹府公殿下東南校尉南靣侍中郎將大夫千石六百石重行北靣議郎博士西靣戸曹令史當坐中而讀詔書公議蔡邕前坐侍中西北近公卿與光晃相難問是非焉議郎蔡邕議以為厯數精微去聖久逺得失更迭術術無常是以承秦厯用顓頊元用乙卯蔡邕命論曰顓頊厯術曰天元正月己巳朔旦立春俱以日月起於天廟營室五度今月令孟春之月日在營室百有二歳孝武皇帝始改正朔厯用太初元用丁丑行之百八十九歳孝章皇帝改從四分元用庚申今光晃各以庚申為非甲寅為是案厯法黄帝顓頊夏殷周魯凡六家各自有元光晃所據則殷厯元也他元雖不明於圖讖各家術皆當有效於其當時黄帝始用太初丁丑之元有六家紛錯爭訟是非太史令張夀王挾甲寅元以非漢厯雜候清臺課在下第卒以疏闊連見劾奏太初效驗無所漏失是則雖非圖讖之元而有效於前者也及用四分以来考之行度密於太初是又新元效於今者也延光元年中謁者亶誦亦非四分庚申上言當用命厯序甲寅元公卿百寮參議正處竟不施行且三光之行遲速進退不必若一術家以算追而求之取合於當時而已故有古今之術今之不能上通於古亦猶古術之不能下通於今也元命苞乾鑿度皆以為開闢至獲麟二百七十六萬歳及命厯序積獲麟至漢起庚子蔀之二十三嵗竟己酉戊子及丁卯蔀六十九歳合為二百七十五嵗漢元年嵗在乙未上至獲麟則歳在庚申推此以上上極開闢則不在庚申讖雖無文其數見存而光晃以為開闢至獲麟二百七十五萬九千八百八十六歳獲麟至漢百六十二嵗轉差少一百一十四歳云當滿足則上違乾鑿度元命苞中使獲麟不得在哀公十四年下不及命厯序獲麟漢相去四蔀年數與奏記譜注不相應當今厯正月癸亥朔光晃以為乙丑朔乙丑之與癸亥無題勒欵識可與衆共别者須以弦朢晦朔光魄虧滿可得而見者考其符驗而光晃厯以考靈曜二十八宿度數及冬至日所在與今史官甘石舊文錯異不可考校以今渾天圖儀檢天文亦不合於考靈曜光晃誠能自依其術更造望儀以追天度逺有驗於圖書近有效於三光可以易奪甘石窮服諸術者實宜用之難問光晃但言圖讖所言不服元和二年二月甲寅制書曰朕聞古先聖王先天而天不違後天而奉天時史官用太初鄧平術冬至之日日在斗二十二度而厯以為牽牛中星先立春一日則四分數之立春也而以折獄斷大刑於氣已迕用望平和葢亦逺矣今改行四分以遵於堯以順孔聖奉天之文是始用四分厯庚申元之詔也深引河洛圖讖以為符驗非史官私意獨所興構而光晃以為固意造妄説違反經文謬之甚者昔堯命羲和厯象日月星辰舜叶時月正日湯武革命治厯明時可謂正矣且猶遇水遭旱戒以蠻夷猾夏宼賊姦宄而光晃以為隂陽不和姦臣盜賊皆元之咎誠非其理元和二年乃用庚申至今九十二歳而光晃言秦所用代周之元不知從秦来漢三易元不常庚申光晃區區信用所學亦妄虛無造欺語之愆至於改朔易元往者夀王之術已課不效亶誦之議不用元和詔書文備義著非羣臣議者所能變易太尉耽司徒隗司空訓以邕議劾光晃不敬正鬼薪法詔書勿治罪臣昭曰不有君子其能國乎觀蔡邕之議可以言天機矣賢明在朝𢎞益逺哉公卿結正足懲淺妄之徒詔書勿治亦深盍各之致太初厯推月食多失四分因太初法以河平癸巳為元施行五年永元元年天以七月後閏食術以八月其十二年正月十二日蒙公乗宗紺上書言今月十六日月當食而厯以二月至期如紺言太史令廵上紺有益官用除待詔甲辰詔書以紺法署施行五十六嵗至本初元年天以十二月食厯以後年正月於是始差到熹平三年二十九年之中先厯食者十六事常山長史劉洪上作七曜術甲辰詔屬太史部郎中劉固舎人馮恂等課效復作八元術固等作月食術並已相參固術與七曜術同月食所失皆以嵗在己未當食四月恂術以三月官厯以五月太史上課到時施行中者丁巳詔書報可其四年紺孫誠上書言受紺法術當復改今年十二月當食而官厯以後年正月到期如言拜誠為舎人丙申詔書聽行誠法光和二年嵗在己未三月五月皆隂太史令修部舎人張恂等推計行度以為三月近四月逺誠以四月奏廢誠術施用恂術其三年誠兄整前後上書言去年三月不食當以四月史官廢誠正術用恂不正術整所上五屬太史太史主者終不自言三月近四月逺食當以見為正無逺近詔書下太常其詳案注記平議術之要效驗虛實太常就耽上選侍中韓説博士蔡較榖城門候劉洪右郎中陳調於太常府覆校注記平議難問恂誠各對恂術以五千六百四十日有九百六十一食為法而除成分空加縣法推建武以来俱得三百二十七食其十五食錯案其官素注天見食九十八與兩術相應其錯辟二千一百誠術以百三十五月二十三食為法乗除成月從建康以上減四十一建康以来減三十五以其俱不食恂術改易舊法誠術中復減損論其長短無以相踰各引書緯自證文無義要取追天而已夫日月之術日循黄道月從九道以赤道儀曰冬至去極俱一百一十五度其入宿也赤道在斗二十一而黄道在斗十九兩儀相參日月之行曲直有差以生進退故月行井牛十四度以上其在角婁十二度以上皆不應率不行以是言之則術不差不改不驗不用天道精微度數難定術法多端厯紀非一未驗無以知其是未差無以知其失失然後改之是然後用之此謂允執其中今誠術未有差錯之謬恂術未有獨中之異以無驗改未失是以檢将来為是者也誠術百三十五月月二十三食其文在書籍學者所修施行日久官守其業經緯日月厚而未愆信於天文述而不作恂久在候部詳心善意能揆儀度定立術數推前校往亦與見食相應然協厯正紀欽若昊天宜率舊章如甲辰丙申詔書以見食為比今宜施用誠術棄放恂術史官課之後有效驗乃行其法以審術數以順改易耽以説等議奏聞詔書可恂整誠各復上書恂言不當施誠術整言不當復棄恂術為洪議所侵事下永安臺覆實皆不如恂誠等言劾奏謾欺詔書報恂誠各以二月奉贖罪整適作左校二月遂用洪等施行誠術光和二年萬年公乗王漢上月食注自章和元年到今年凡九十三歳合百九十六食與官厯河平元年月錯以己巳為元事下太史令修上言漢所作注不與見食相應者二事以同為異者二十九事尚書召榖城門候劉洪勑曰前郎中馮光司徒掾陳晃各訟厯故議郎蔡邕共補續其志今洪其詣修與漠相參推元謂分考校月食審己巳元密近有師法洪便從漢受不能對洪上言推元漢己巳元則考靈曜旃蒙之嵗乙夘元也與光晃甲寅元相經緯於以追天作厯校三光之歩今為疏濶孔子緯一事見二端者明厯興廢隨天為節甲寅厯於孔子時效己巳顓頊秦所施用漢興草創因而不易至元封中迂濶不審更用太初應期三百改憲之節甲寅己巳讖雖有文略其年數是以學人各傳所聞至於課校罔得厥正夫甲寅元天正正月甲子朔旦冬至七曜之起始於牛初乙夘之元人正己巳朔旦立春三光聚天廟五度課兩元端閏餘差自五十分二之三朔三百四中節之餘二十九以效信難聚漢不解説但言先人有書而已以漢成注參官施行術不同二十九事不中見食二事案漢習書見己巳元謂朝不聞不知聖人獨有興廢之義史官有附天密術甲寅己巳前已施行效後格而已不用河平疏濶史官已廢之而漢以去事分爭殆非其意雖有師法與無同課又不近宻其説蔀數術家所共知無所采取遣漢歸鄉里袁山松書曰劉洪字元卓泰山蒙隂人魯王之宗室也延熹中以校尉應太史徴拜郎中遷常山長史以父憂去官後為上計掾拜郎中檢東觀著作律厯記遷謁者榖城門候㑹稽東部都尉徴還未至領山陽太守卒官洪善算當世無偶作七曜術及在東觀與蔡邕共述律厯記考驗天官及造乾象術十餘年考驗日月與象相應皆傳于世博物記曰洪篤信好學觀乎六藝羣書意以為天文數術探賾索隱鉤深致逺遂專心鋭思為曲城侯相政敎清均吏民畏而愛之為州郡之所禮異後漢書卷十二後漢書卷十二考證律歴志中自太初元年始用三統歴施行百有餘年臣永祚按太初元年用太初歴史記歴書具存三統之法作於劉歆前書雖備載其説而當時未嘗用也此志内章帝詔蔡邕議具有明文無用三統歴之説日過度月行十五度推尋文義過字下疑脱一字史官以郭日月行臣召南按文當作史官以部日月行部郭字相近而訛耳後漢書卷十二考證
