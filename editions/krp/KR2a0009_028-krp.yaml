body:
  text: 後漢書卷二十八梁剡令劉昭補并注五行志第十八五行六日蝕黒日抱貫日赤無光非日黄珥日中虹日月蝕其月光武帝古今注曰建武元年正月庚午朔日有蝕之即更始三年建武二年正月甲子朔日有食之在危八度杜預曰歴家之說謂日光以望時遥奪月光故月蝕日月同㑹月奄日故日蝕蝕冇上下者行有髙下日光輪存而中食者相奄密故日光溢出皆既者正相當而相奄間疏也然聖人不言月蝕日而以自蝕為文闕於所不見春秋潛潭巴云甲子蝕有兵敵强臣昭案春秋緯六旬之蝕各以甲子為説此偏舉一隅未為通證故於事驗不盡相符今依日例注以廣其候耳京房占曰北夷侵忠臣有謀後大水在東方日蝕說曰日者太陽之精人君之象君道有虧為陰所乘故蝕蝕者陽不克也其候雜說漢書五行志著之必矣春秋緯曰日之將食則斗第二星變色微赤不明七日而蝕儒説諸侯專權則其應多在日所宿之國春秋漢含孳曰臣子謀日乃蝕孝經鉤命決曰失義不徳白虎不出禁或逆枉矢射山崩日蝕管子曰日掌陽月掌陰星掌和陽為徳隂為刑和為事是故日蝕則失徳之國惡之月蝕則失刑之國惡之彗星見則失和之國惡之是故聖王日蝕則修徳月蝕則修刑慧星見則修和諸象附從則多為王者事人君改修其徳則咎害除孝經鉤命決曰日蝕修孝山崩理惑是時世祖初興天下賊亂未除虛危齊也賊張步擁兵據齊上遣伏隆諭步許降旋復叛稱王至五年中乃破三年五月乙卯晦日有蝕之潜潭巴曰乙卯蝕雷不行雪殺草不長姦人入宮在栁十四度栁河南也時世祖在雒陽赤眉降賊樊崇謀作亂其七月發覺皆伏誅古今注曰四年五月乙卯晦日有蝕之六年九月丙寅晦日有蝕之潛潭巴曰丙寅蝕乆旱多有徴京房曰有小旱灾史官不見郡以聞本紀都尉詡以聞在尾八度宋浮上疏以郡縣數代羣陽騷動所致見浮傳七年三月癸亥晦日有蝕之潛潭巴曰癸亥日蝕天人崩鄭興曰頃年日蝕每多在晦行疾也君亢急臣下促廹在畢五度畢為邉兵秋隗囂反侵安定冬盧芳所置朔方雲中太守各舉郡降古今注曰九年七月丁酉十一年六月癸丑十二月辛亥竝日有蝕之十六年三月辛丑晦日有蝕之潛潭巴曰辛丑日蝕主疑王在昴七度昴為獄事時諸郡太守坐度田不實世祖怒殺十餘人然後深悔之十七年二月乙未晦日有蝕之潛潭巴曰乙未蝕天下多邪氣鬱鬱蒼蒼京房曰君責衆庶暴害之在胃九度胃為廩倉時諸郡新坐租之後天下憂怖以榖為言故示象或曰胃供飬之官也其十月廢郭皇后詔曰不可以奉供飬二十二年五月乙未晦日有蝕之在栁七度京都宿也栁為上倉祭祀榖也近輿鬼輿鬼為宗廟十九年中有司奏請立近帝四廟以祭之有詔廟處所未定且就髙廟祫祭之至此三年遂不立廟有簡墮心奉祖宗之道有闕故示象也二十五年三月戊申晦日有蝕之潜潭巴曰戊申蝕地動揺侵兵强一曰主兵弱諸侯强在畢十五度畢為邉兵其冬十月以武谿蠻夷爲㓂害伏波將軍馬援将兵擊之古今注曰二十六年二月戊子日有蝕之盡二十九年二月丁巳朔日有蝕之潜潭巴曰丁巳蝕下有敗兵在東壁五度東壁為文章一名娵訾之口先是皇子諸王各招來文章談說之士去年中有人上奏諸王所招待者或眞偽雜受刑罸者子孫宜可分别於是上怒詔捕諸王客皆被以苛法死者甚多世祖不早為明設刑禁一時治之過差故天示象世祖於是改悔遣使悉理侵枉也三十一年五月癸酉晦日有蝕之潛潭巴曰癸酉蝕連陰不觧滛雨毁山有兵在栁五度京都宿也自二十一年示象至此十年後二年宫車晏駕中元元年十一月甲子晦日有蝕之在斗二十度斗為廟主爵祿儒説十一月甲子時王日也又為星紀主爵禄其占重明帝永平三年八月壬申晦日有蝕之潛潭巴曰壬申蝕水滅陽潰隂欲翔在氐二度氐為宿宫是時明帝作北宫古今注曰四年八月丙寅時加未日有蝕之五年二月乙未朔日有蝕之京師候者不覺河南尹郡國三十一上六年六月庚辰晦日有蝕之時雒陽候者不見八年十月古今注曰十二月壬寅晦日有蝕之既潛潭巴曰壬寅蝕天下苦兵大臣驕横在斗十一度斗吳也廣陵於天文屬吳後二年廣陵王荆坐謀反自殺十三年十月古今注曰閏八月甲辰晦日有蝕之潜潭巴曰甲辰蝕四騎脅大水在尾十七度京房占曰主后夀命絶後有大水十六年五月戊午晦日有蝕之潛潭巴曰戊午蝕乆旱榖不傷在栁十五度儒說五月戊午猶十一月甲子也又宿在京都其占重後二嵗宫車晏駕十八年十一月甲辰晦日有蝕之在斗二十一度是時明帝既崩馬太后制爵禄故陽不勝章帝建初五年二月庚辰朔日有蝕之潛潭巴曰庚辰蝕彗星東至有宼兵在東壁八度例在前建武二十九年是時群臣爭經多相非毁者又别夲云庚辰蝕大旱六年六月辛未晦日有蝕之潛潭巴曰辛未蝕大水在翼六度翼主逺客冬東平王蒼等來朝明年正月蒼薨古今注曰元和元年九月己未日有蝕之元和元年八月乙未晦日有蝕之史官不見佗官以聞日在氐四度星占曰天下災期三年和帝永元二年二月壬午日有蝕之潛潭巴曰壬午蝕乆雨旬望史官不見涿郡以聞日在奎八度京房占曰三公與諸侯相賊弱其君王天應而日蝕三公失國後旱且水臣昭以為三公宰輔之位即竇憲四年六月戊戌朔日有蝕之潛潭巴曰戊戌蝕有土殃主后死天下諒陰京房占曰婚嫁家欲戮在七星二度主衣裳又曰行近軒轅在左角為太后族是月十九日案夲紀庚申幸北宫詔捕憲等庚申是二十三日上免太后兄弟竇憲等官遣就國選嚴能相於國蹙廹自殺七年四月辛亥朔日有蝕之潛潭巴曰辛亥蝕子為雄在觜觽為葆旅主収歛儒説葆旅宫中之象収歛貪妬之象是嵗鄧貴人始入明年三月陰皇后立鄧貴人有寵陰后妬忌之後遂坐廢一曰是將入參参伐為斬刈明年七月越騎校尉馮柱捕斬匈奴温禺犢王烏居戰十二年秋七月辛亥朔日有蝕之在翼八度荆州宿也明年冬南郡蠻夷反為宼十五年四月甲子晦日有蝕之在東井二十二度東井主酒食之宿也婦人之職無非無儀酒食是議去年冬鄧皇后立有丈夫之性與知外事故天示象是年水雨傷稼安帝永初元年三月二日癸酉日有蝕之在胃二度胃主廪倉是時鄧太后専政去年大水傷稼倉廩為虛古今注曰三年三月日有蝕之五年正月庚辰朔日有蝕之在虛八度正月王者統事之正日也虛空名也是時鄧太后攝政安帝不得行事俱不得其正若王者位虛故於正月陽不克示象也於是陰預乘陽故夷狄並為㓂害西邉諸郡皆至虛空七年四月丙申晦日有蝕之潛潭巴曰丙申蝕諸侯相攻京房占曰君臣暴虐臣下横恣上下相賊後有地動在東井一度元初元年十月戊子朔日有蝕之潛潭巴曰戊子蝕宫室内婬雌必成雄京房占曰妻欲害夫九族夷滅後有大水在尾十度尾為後宫繼嗣之宫也是時上甚幸閻貴人將立故示不善將為繼嗣禍也明年四月遂立為后後遂與江京耿寳等共讒太子廢之二年九月壬午晦日有蝕之在心四度心為王者明乆失位也三年三月二日辛亥日有蝕之在婁五度史官不見遼東以聞四年二月乙亥朔日有蝕之潛潭巴曰乙亥蝕東國發兵京房占曰諸侯上侵以自益近臣盜竊以為積天子未知日爲之蝕在奎九度史官不見七郡以聞奎主武庫兵其十月八日壬戌武庫火燒兵器也五年八月丙申朔日有蝕之在翼十八度史官不見張掖以聞潛潭巴曰丙申蝕夷狄内攘石氏占曰王者失禮宗廟不親其嵗旱六年十二月戊午朔日有蝕之幾盡地如昬狀古今注曰星盡見春秋緯曰日蝕既君行無常公輔不修徳夷狄强侵萬事錯在湏女十一度女主惡之後二嵗三月鄧太后崩李氏家書司空李郃上書曰陛下祗畏天威懼天變克己責躬博訪群下咎皆在臣力小任重招致咎徵去年二月京師地震今月戊午日蝕夫至尊莫過乎天天之變莫大乎日蝕地之戒莫重乎震動今一嵗之中大異両見日蝕之變既為尤深地動之戒揺宫最醜日者陽精君之象也戊者土主任在中宫午者火徳漢之所承地道安静法當由陽今乃専恣揺動宫闕禍在蕭牆之内臣恐宫中必有隂謀其陽下圗其上造為逆也災變終不虛生推原二異日辰行度甚為較明譬猶指掌宜察宫闕之内如有所疑急推破其謀無令得成修政恐懼以答天意十月辛卯日有蝕之周家所忌乃為亡徴是時妃后用事七子朝令戊午之灾近相似類宜貶退諸后兄弟群從内外之寵求賢良徵逸士下徳令施恩惠澤及山海時度遼將軍遵多興師重賦出塞妄政之事上深納其言建光二年鄧后崩上収考中人趙任等辭言地震日蝕在中官竟有廢立之謀郃乃自知其言驗也永寜元年七月乙酉朔日有蝕之潛潭巴曰乙酉蝕仁義不明賢人消京房占曰君弱臣强司馬將兵反征其王在張十五度史官不見酒泉以聞石氏古曰日蝕張王者失禮延光三年九月庚寅晦日有蝕之京房占曰骨肉相賊後有水在氐十五度氐為宿宫宫中宫也時上聽中常侍江京樊豐及阿母王聖等讒言廢皇太子四年三月戊午朔日有蝕之在胃十二度隴西酒泉朔方各以狀上史官不覺案馬融集是時融為許令其四月庚申自縣上書曰伏讀詔書陛下深惟禹湯罪已之義歸咎自責寅畏天戒詳延百僚博問公卿知變所自審得厥故修復往術以答天命臣子逺近莫不延頸企踵茍有隙空一介之知事願自效貢納聖聽臣伏見日蝕之占自昔典籍十月之交春秋傳記漢注所載史官占候羣臣宻對陛下所觀覽左右所諷誦可謂詳悉備矣雖復廣問䧟在前志無以復加乃者茀氣于參臣前得敦朴之人後三年二月對䇿北宫端門以為參者西方之位其於分野并州是也殆謂西戎北狄其後種𦍑叛戻烏桓犯上郡并凉動兵驗略效矣今復見大異申誡重譴於此二城海内莫見三月一日合辰在婁婁又西方之宿衆占顯明者𦍑及烏桓有悔過之辭将吏䇿勲之名臣恐受任典牧者茍脱目前皆粗圗身一時之權不顧為國百世之利論者羙近功忽其逺則各相不大疢病伏惟天象不虚老子曰圖難於其易也為大於其細也消灾復異宜在於今詩曰日月告凶不用其行四國無政不用其良傳曰國無政不用善則自取謫于日月之災故政不可不慎也務三而已一曰擇人二曰安民三曰從時臣融伏惟方今有道之世漢典設張侯甸采衛司民之吏案繩循墨雖有殿最所差無幾其䧟罪辟身自取禍百姓未被其大傷至邉郡牧御失和吉之與凶敗之與成優劣相懸不誡不可審擇其人上以應天變下以安民隸竊見列將子孫生長京師食仰租奉不知稼穡之艱又希遭阨困故能果毅輕財施與孤弱以獲生死之用此其所長也不拘法禁奢泰無度功勞足以宣威踰濫足以傷化此其所短也州郡之士出自貧苦長扵撿押雖專賞罰不敢越溢此其所長也拘文守法遭遇非常狐疑無斷畏首畏尾威恩纎薄外内離心士卒不附此其所短也必得將兼有二長之才無二短之累参以吏事任以兵法有此數姿然後能折衝厭難致其功實轉灾為福孔子曰十室之邑必有忠信如丘者焉以天下之大四海之衆云無若人臣以為誣矣宜特選詳譽審得其眞鎮守二方以應用良擇人之義以塞大異也順帝永建二年七月甲戍朔日有蝕之潛潭巴曰甲戌蝕草木不滋王命不行京房占曰近臣欲戮身及戮辱後小旱在翼九度陽嘉四年閏月丁亥朔日有蝕之潛潭巴曰丁亥蝕匿謀滿玉堂京房占曰君臣無别在角五度史官不見零陵以聞案張衡為太史令表奏云今年三月朔方覺日蝕此郡懼有兵患臣愚以爲可勅北邉湏塞郡縣明烽火遠斥候深藏固閉無令榖畜外露不詳是何年三月永和三年十二月戊戌朔日有蝕之在湏女十一度史官不見㑹稽以聞明年中常侍張逵等謀譖皇后父梁商欲作亂推考逵等伏誅也五年五月己丑晦日有蝕之潛潭巴曰日蝕己丑天下唱之在東井三十三度東井三輔宿又近輿鬼輿鬼為宗廟其秋西𦍑爲宼至三輔陵園六年九月辛亥晦日有蝕之在尾十一度尾主後宫繼嗣之宫也以為繼嗣不興之象桓帝建和元年正月辛亥朔日有蝕之在營室三度史官不見郡國以聞是時梁太后攝政三年四月丁卯晦日有蝕之潛潭巴曰丁卯蝕有旱有兵京房占曰諸侯欲戮後有祼蟲之殃在東井二十三度例在永元十五年東井主法梁太后又聽兄冀枉殺公卿犯天法也明年太后崩元嘉二年七月二日庚辰日有蝕之在翼四度史官不見廣陵以聞京房占曰庚辰蝕君易賢以剛卒以自傷後有水翼主倡樂時上好樂過阮籍樂論曰桓帝聞琴悽愴傷心倚扆而悲慷慨長息曰善乎哉為琴若此一而足矣永興二年九月丁卯朔日有蝕之在角五度角鄭宿也十一月泰山盗賊群起劫殺長吏泰山於天文屬鄭永夀三年閏月庚辰晦日有蝕之在七星二度史官不見郡國以聞例在永元四年後二嵗梁皇后崩冀兄弟被誅延熹元年五月甲戌晦日有蝕之在栁七度京都宿也梁冀别傳曰常侍徐璜白言臣切見道術家常言漢死在戌亥今太嵗在丙戌五月甲戍日蝕栁宿朱雀漢家之貴國宿分周地今京師是也史官上占去重見輕璜召太史陳援詰問乃以實對冀怨援不為隐諱使人隂求其短發擿上聞上以亡失候儀不肅有司奏収殺獄中八年正月丙申晦日有蝕之在營室十三度營室之中女主象也其二月癸亥鄧皇后坐酗上送暴室令自殺家屬被誅吕太后崩時亦然九年正月辛卯朔日有蝕之潛潭巴曰辛卯蝕臣伐其主在營室三度史官不見郡國以聞谷永以為三朝尊者惡之其明年宫車晏駕永康元年五月壬子晦日有蝕之潛潭巴曰壬子蝕妃后專恣女謀主在輿鬼一度儒説壬子淳水日而陽不克將有水害其八月六州大水勃海盗賊靈帝建寜元年五月丁未朔日有蝕之潛潭巴曰丁未蝕王者崩冬十月甲辰晦日有蝕之二年十月戊戌晦日有蝕之右扶風以聞三年三月丙寅晦日有蝕之梁相以聞四年三月辛酉朔日有蝕之潛潭巴曰辛酉蝕女謀主谷永上書飲酒無節君臣不别姦邪欲起傳曰酒無節兹謂荒厥異曰蝕厥咎亡靈帝好為商估飲於宫人之肆也熹平二年十二月癸酉晦日有蝕之在虛二度是時中常侍曹節王甫等専權蔡邕上書曰四年正月朔日體微傷群臣服赤幘赴宫門之中無救乃各罷歸天有大異隱而不宣求御過是已事之甚者六年十月癸丑朔日有蝕之趙相以聞谷永上書賦歛滋重不顧黎民百姓虛竭則日蝕將有潰叛之變光和元年二月辛亥朔日有蝕之十月丙子晦日有蝕之在箕四度箕為後宫口舌是月上聽讒廢宋皇后案本傳盧植上書丙子蝕自己過午既蝕之後雲霧掩暧陳八事以諌蔡邕對問曰詔問踐阼以来災𤯝屢見頃嵗日蝕地動風雨不時疫癘流行勁風折樹河雒盛溢臣聞陽微則日蝕隂盛則地震思亂則風貌失則雨視闇則疾簡宗廟水不潤下川流滿溢明君臣正上下抑隂尊陽修五事於聖躬致精慮於共御其救之也二年四月甲戍朔日有蝕之四年九月庚寅朔日有蝕之潛潭巴曰庚寅蝕将相誅大水多死傷在角六度中平三年五月壬辰晦日有蝕之潛潭巴曰壬辰蝕河決海久霧連隂六年四月丙午朔日有蝕之其月浹辰宫車晏駕獻帝初平四年正月甲寅朔日有蝕之在營室四度潛潭巴曰甲寅蝕雷電擊殺骨肉相攻是時李傕郭汜專政袁宏紀曰未蝕八刻太史令王立奏曰日晷過度無有變也於是朝臣皆賀帝宻令尚書候焉未晡一刻而蝕尚書賈詡奏曰立伺候不明疑悮上下太尉周忠職所典掌請皆治罪詔曰天道遠事驗難明且灾異應政而至雖探道知機焉能無失而欲歸咎史官益重朕之不徳也弗從於是避正殿寢兵不聼事五日興平元年六月乙巳晦日有蝕之建安五年九月庚午朔日有蝕之潛潭巴曰庚午蝕後火燒官兵六年十月癸未朔日有蝕之十三年十月癸未朔日有蝕之潛潭巴曰癸未蝕仁義不明在尾十二度十五年二月乙巳朔日有蝕之十七年六月庚寅晦日有蝕之二十一年五月己亥朔日有蝕之潛潭巴曰己亥蝕小人用事君子縶二十四年二月壬子晦日有蝕之凡漢中興十二世百九十六年日蝕七十二朔三十二晦三十七月二日三光武建武七年四月丙寅日有暈抱白虹貫暈在畢八度古今注曰時日加卯西面東面有抱湏臾成暈中有兩鈎在南北面有白虹貫暈在西北南面有背在景加已皆觧也畢為邉兵秋隗囂反侵安定皇徳傳史曰白虹貫下破軍晋分也古今注曰章帝建初元年正月壬申白虹貫日五年七月甲寅夜白虹出乙丑地西北曲入七年四月丙寅日加卯西面有抱湏臾成暈有白虹貫日殤帝延平元年六月丁未日暈上有半暈暈中外有僪背两珥十二月丙寅日暈再重中有背僪順帝永建二年正月戊午白虹貫日三年正月丁酉日有白虹貫交暈中六年正月丁卯日暈两珥白虹貫珥中永和六年正月己卯暈两珥中赤外靑白虹貫暈中案郎顗傳陽嘉二年正月乙卯白虹貫日又唐檀傳永建五年白虹貫日檀上便宜三事陳其咎徵春秋元命苞曰隂陽之氣聚為雲氣立為虹蜺離為倍僪分為抱珥考異郵曰臣謀反徧刺日巫咸占曰臣不知則日月僪如淳曰蝃蝀謂之虹雌謂之蜺向外曰倍刺日曰僪在旁如半環向日曰抱在傍直對曰珥孟康曰僪如僪也宋均曰黄氣抱日輔臣納忠靈帝時日數出東方正赤如血無光髙二丈餘乃有景且入西方去地二丈亦如之京房占曰國有侫䜛朝有殘臣則曰不光闇㝠不明孟康曰日月無光曰薄其占曰事天不謹則日月赤是時日出入去地二三丈皆赤如血者數矣春秋感精符曰日無光主勢奪羣臣以讒術色赤如炭以急見伐又兵馬發禮斗威儀曰日月赤君喜怒無常輕殺不辜戮於無罪不事天地忽於鬼神時則大雨土風常起日蝕無光地動雷降其時不救兵從外来為賊戮而不葬京房占曰日無故日夕無光天下變枯社稷移主光和四年二月己巳黄氣抱日黄白珥在其表春秋感精符曰日朝珥則有喪孽又云日已出若其入而雲皆赤黄名曰日空不出三年必有移民而去者也中平四年三月丙申黒氣大如𤓰在日中春秋感精符曰日黒則水滛溢五年正月日色赤黄中有黒氣如飛鵲數月乃銷六年二月乙未白虹貫日春秋感精符曰虹貫日天下悉極文法大擾百官殘賊酷法横殺下多相告刑用及族世多深刻獄多怨宿吏皆惨毒又曰國多死孽天子命絶大臣為禍主將見殺星占曰虹蜺主内滛土精填星之變易讖曰聰明蔽塞政在臣下㛰戚干朝君不覺悟虹蜺貫日獻帝初平元年二月壬辰白虹貫日袁山松書曰三年十月丁卯日有重两倍吳書載韓馥與袁術書曰凶出於代郡桓帝永夀三年十二月壬戌月蝕非其月古今注曰光武建武八年三月庚子夜月暈五重紫微青黄似虹有黒氣如雲月星不見丙夜乃觧中元元年十一月甲辰日中星齒往往出入延熹八年正月辛巳月蝕非其月袁山松書曰興平二年十二月月在太微端門中重暈二珥两白氣廣八九寸貫月東西南北贊曰皇極惟建五事克端罸咎入沴逆亂浸干火下水騰木弱金酸妖豈或妄氣炎以觀後漢書卷二十八後漢書卷二十八考證五行志六月二日三臣永祚按此文總結日食之數月二日當連讀言蝕不於晦朔而於月之二日者有三合之朔三十二晦三十七為七十二也和帝永元二年二月壬午不言晦朔是二日之一也安帝永初元年三月二日癸酉及元初三年三月二日辛亥是二日之三也後漢書卷二十八考證
