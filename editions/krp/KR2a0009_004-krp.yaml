body:
  text: 後漢書卷四宋宣城太守范煜撰唐章懷太子賢注和殤帝紀第四孝和皇帝諱肈諡法曰不剛不柔曰和伏侯古今注曰肈之字曰始肈音兆臣賢案許慎説文肈音大可反上諱也但伏侯許慎竝漢時人而帝諱不同盖應别有所據肅宗第四子也母梁貴人爲竇皇后所譖憂卒竇后養帝以爲已子建初七年立爲皇太子章和二年二月壬辰即皇帝位年十嵗尊皇后曰皇太后太后臨朝三月丁酉改淮陽爲陳國今陳州楚郡爲彭城國今徐州西平幷汝南郡西平縣故柏子國也在今豫州吳房縣西北六安復爲廬江郡即今廬州廬江縣西故舒城是遺詔徙西平王羡爲陳王六安王恭爲彭城王癸卯葬孝章皇帝于敬陵在洛陽城東南三十九里古今注曰陵周三百歩髙六丈二尺庚戌皇太后詔曰先帝以明聖奉承祖宗至德要道天下清靜庶事咸寜今皇帝以㓜年㷀㷀在疚疚病也㷀㷀然在憂病之中也㷀或作嬛詩周頌云嬛嬛在疚朕且佐助聴政外有大國賢王竝爲藩屏内有公卿大夫綂理本朝恭已受成夫何憂哉孔子曰舜何為哉恭已正南面而已尚書曰予小子垂拱仰成然守文之際必有内輔以參聴斷侍中憲朕之元兄行能兼備忠孝尤篤先帝所器親受遺詔當以舊典輔斯職焉憲固執謙讓節不可奪今供養兩宫兩宫謂帝宫太后宫宿衞左右厥事已重亦不可復勞以政事故太尉鄧彪元功之族三讓彌髙元功謂髙密侯禹也彪父邯中興初有功封鄳侯父卒彪譲國異母弟鳳論語孔子曰太伯三以天下譲民無得而稱焉鄭𤣥注云太伯周太王之長子欲譲其弟季歴大王有疾太伯因適吳越採藥太王薨而不返季歴為喪主一譲也季歴赴之不來奔喪二譲也終喪之後遂斷髪文身三譲也彪譲封弟故以比之鄳音莫杏反海内歸仁爲羣賢首先帝襃表欲以崇化今彪聰明康彊可謂老成黃耇矣老成言老而有成徳也詩大雅曰雖無老成人黄謂髪落更生黄者耇亦老也詩序曰外尊事黄耇其以彪爲太傅賜爵關内侯錄尚書事百官總已以聴古者君在諒闇百官總已之職事以聼於冢宰錄尚書事則冢宰之任也朕庶幾得專心内位於戲羣公其勉率百僚各修厥職愛養元元綏以中和稱朕意焉辛酉有司上奏孝章皇帝崇𢎞鴻業徳化普洽垂意黎民留念稼穡文加殊俗武暢方表界惟人面無思不服巍巍蕩蕩莫與比隆巍巍乎其有成功蕩蕩乎人無能名焉孔子羙帝堯之辭見論語周頌曰於穆清廟肅雝顯相清廟文王廟也於穆嘆羙之詞言助祭者禮儀敬且和也請上尊廟曰肅宗共進武德之舞制曰可癸亥陳王羡彭城王恭樂成王黨下邳王衍梁王暢始就國建初三年章帝不忍與諸王乖離皆留京師今遣之國夏四月丙子謁髙廟丁丑謁世祖廟戊寅詔曰昔孝武皇帝致誅胡越故權收鹽鐵之利武帝使孔僅東郭咸陽乘傳舉行天下鹽鐵作官府收利私家更不得鑄鐵煮鹽以奉師旅之費自中興以來匈奴未賔永平末年復修征伐先帝即位務休力役然猶深思遠慮安不忘危探觀舊典復收鹽鐵欲以防備不虞寜安邊境而吏多不良動失其便以違上意先帝恨之故遺戒郡國罷鹽鐵之禁縱民煮鑄入稅縣官如故事前書音義曰縣官謂天子其申勅刺史二千石奉順聖㫖勉𢎞徳化布告天下使明知朕意五月京師旱詔長樂少府桓郁侍講禁中長樂宮之少府也郁桓榮子也冬十月乙亥以侍中竇憲爲車騎將軍伐北匈奴安息國遣使獻師子扶拔扶拔解見章帝紀永元元年春三月甲辰初令郎官詔除者得占丞尉以比秩爲真漢官儀曰羽林郎出補三百石丞尉自占丞尉小縣丞尉三百石其次四百石比秩為真皆所以優之劉攽曰案文云丞尉小縣三百石其次四百石已足不當更有丞尉字夏六月車騎將軍竇憲出雞鹿塞今在朔方窳渾縣北闞駰十三州志云窳渾縣有大道西北出雞鹿塞窳音羊主反度遼將軍鄧鴻出棝楊塞棝楊縣屬九原郡故城在今勝州銀城縣界棝音固南單于出滿夷谷滿夷谷關與北匈奴戰于稽落山大破之追至和渠北鞮海竇憲遂登燕然山刻石勒功而還北單于遣弟右温禺鞮王鞮音丁兮反奉奏貢獻秋七月乙未㑹稽山崩閠月丙子詔曰匈奴背叛爲害乆遠頼祖宗之靈師克有㨗醜虜破碎遂掃厥庭詩曰仍執醜虜庭謂單于所常居也役不再籍猶言不籍再舉萬里清蕩非朕小子𦕈身所能克堪有司其案舊典告類薦㓛以章休烈類祭天也書曰類于上帝薦進也以功進告于天九月庚申以車騎將軍竇憲爲大將軍以中郎將劉尚爲車騎將軍冬十月令郡國㢮刑輸作軍營其徙出塞者劉攽曰案遷徙者不可投之塞外明此徙字是從字刑雖未竟皆免歸田里庚子阜陵王延薨是嵗郡國九大水二年春正月丁丑大赦天下二月壬午日有蝕之東觀記曰史官不覺涿郡言之己亥復置西河上郡屬國都尉官前書西河郡羙稷縣上郡龜兹縣竝有屬國都尉其秩比二千石十三州志日典屬國武帝置掌納匈奴降者也哀帝省并大鴻臚故今復置之夏五月庚戌分太山爲濟北國分樂成涿郡勃海爲河間國丙辰封皇弟壽爲濟北王開爲河間王淑爲城陽王紹封故淮陽王昞子側爲常山王賜公卿以下至佐史錢布各有差己未遣副校尉閻磐討北匈奴取伊吾盧地丁卯紹封故齊王晃子無忌爲齊王北海王睦子威爲北海王車師前後王竝遣子入侍車師有後王前王前王即後王之子其庭相去五百里月氐國遣兵攻西域長史班超超擊降之六月辛卯中山王焉薨秋七月乙卯大將軍竇憲出屯涼州九月北匈奴遣使稱臣冬十月遣行中郎將班固報命南單于遣左谷蠡王師子左谷蠡匈奴王號師子其名也谷音鹿蠡音離出雞鹿塞擊北匈奴于河雲北大破之三年春正月甲子皇帝加元服元首也謂加冠於首儀禮冠者先筮日後筮賔東觀記曰時太后詔袁安為賔賜束帛乗馬賜諸侯王公將軍特進漢官儀曰諸侯功徳優盛朝廷所敬異者賜位特進在三公下中二千石列侯宗室子孫在京師奉朝請者黃金奉朝請無員三公外戚宗室諸侯多奉朝請漢律春曰朝秋曰請將大夫郎吏從官帛將謂五官及左右郎將也大夫謂光禄太中中散諫議大夫也十三州志曰大夫皆掌顧問應對言議夫之言扶也言能扶持君父也賜民爵及粟帛各有差大酺五日郡國中都官繫囚死罪贖縑至司冦及亡命各有差庚辰賜京師民酺布兩户共一匹二月大將軍竇憲遣左校尉耿夔出居延塞居延縣屬張掖郡居延澤在東北武帝使伏波將軍路博徳築遮虜障於居延城圍北單于於金微山大破之獲其母閼氏閼氏匈奴后之號也音焉支夏六月辛夘尊太后母比陽公主東海恭王彊女爲長公主辛丑阜陵王种薨阜陵王延之子冬十月癸未行幸長安詔曰北狄破滅名王仍降仍頻也西域諸國納質内附豈非祖宗廸哲重光之鴻烈歟廸蹈也言由祖宗蹈履明智有重光累聖之徳成此大業也書曰兹四人廸哲又曰宣重光也寤寐歎息想望舊京其賜所過二千石長吏以下及三老官屬錢帛各有差鰥寡孤獨篤癃貧不能自存者粟人三斛十一月癸卯祠髙廟遂有事十一陵詔曰髙祖功臣蕭曹爲首有傳世不絶之義曹相國後容城侯無嗣朕望長陵東門見二臣之壠東觀記曰蕭何墓在長陵東司馬門道北百歩廟記云曹參冢在長陵旁道北近蕭何冢循其逺節每有感焉忠義獲寵古今所同可遣使者以中牢祠大鴻臚求近親宜爲嗣者須景風紹封以章厥功續漢志曰大鴻臚掌封拜諸侯及其嗣春秋考異郵曰夏至四十五日景風至則封有功也十二月復置西域都䕶騎都尉戊巳校尉官劉攽曰案西域傳此時但置戊校尉多一巳字庚辰至自長安減㢮刑徒從駕者刑五月四年春正月北匈奴右谷蠡王於除鞬自立爲單于欵塞乞降於除鞬名也鞬音九言反遣大將軍左校尉耿夔授璽綬東觀記曰賜玉具劒羽蓋車一駟中郎將持節衞䕶焉三月癸丑司徒袁安薨閏月丁丑太常丁鴻爲司徒夏四月丙辰大將軍竇憲還至京師六月戊戌朔日有食之丙辰郡國十三地震竇憲濳圗弑逆庚申幸北宮詔收捕憲黨射聲校尉郭璜郭況子也東觀記曰璜作瑝音同璜子侍中舉衞尉鄧疊疊弟歩兵校尉磊皆下獄死使謁者僕射續漢書曰謁者僕射一人秩千石為謁者臺率主謁者天子出奉引也收憲大將軍印綬遣憲及弟篤景就國到皆自殺是夏旱蝗秋七月己丑大尉宋由坐黨憲自殺八月辛亥司空任隗薨任光子也癸丑大司農尹睦爲太尉錄尚書事錄謂總領之也錄尚書自牟融始也丁巳賜公卿以下至佐史錢榖各有差冬十月己亥宗正劉方爲司空十二月壬辰詔今年郡國秋稼爲旱蝗所傷其什四以上勿收田租芻槀有不滿者以實除之所損十不滿四者以見損除也武陵零陵澧中蠻叛燒當羌寇金城五年春正月乙亥宗祀五帝於明堂遂登靈臺望雲物大赦天下戊子千乘王伉薨辛卯封皇弟萬嵗爲廣宗王廣宗縣名今貝州宗城縣隋煬帝諱廣故改為宗城二月戊戌詔有司省減内外廐及涼州諸苑馬說文曰廐馬舍也漢官儀曰未央大廐長樂承華等廐令皆秩六百石又云牧帥諸苑六十六所分置西北邊分養馬三十萬頭自京師離宮果園上林廣成囿悉以假貧民恣得采捕不收其税丁未詔曰去年秋麥入少恐民食不足其上尤貧不能自給者户口人數往者郡國上貧民以衣履釡鬵爲貲而豪右得其饒利鬵音尋方言曰甑自關而東謂之鬵貧人旣計釡甑以為資財懼於役重多即賣之以避科税豪富之家乘賤買故得其饒利詔書實覈説文云覈考實事也欲有以益之而長吏不能躬親反更徵召㑹聚令失農作愁擾百姓若復有犯者二千石先坐甲寅太傅鄧彪薨戊午隴西地震三月戊子詔曰選舉良才爲政之本科别行能必由鄉曲周禮鄉大夫掌其鄉之政敎考其徳行察其道藝三年而舉賢能者於王而郡國舉吏不加簡擇故先帝明敇在所令試之以職乃得充選漢官儀曰建初八年十二月己未詔書辟士四科其一曰徳行髙妙志節清白二曰經明行修能任博士三曰明曉法律足以決疑能案章覆問才任御史四曰剛毅多略遭事不惑明足照姦勇足決斷才任三輔令皆存孝悌清公不行自今以後審四科辟召及刺史二千石察舉茂才尤異孝廉吏務實校試以職有非其人不習曹事正舉者故不以實法也又徳行尤異不須經職者别署狀上而宣布以來出入九年二千石曽不承奉恣心從好司隸刺史訖無紏察訖竟也今新蒙赦令且復申勅後有犯者顯明其罰在位不以選舉為憂督察不以發覺為負負亦憂也非獨州郡也是以庶官多非其人下民被姦邪之傷由法不行故也庚寅遣使者分行貧民舉實流宂宂㪚也流㪚者舉案其實而給之開倉賑稟三十餘郡夏四月壬子封阜陵王种兄魴為阜陵王种無嗣故以魴襲也六月丁酉郡國三雨雹東觀記曰大如鴈子秋九月辛酉廣宗王萬嵗薨無子國除匈奴單于於除鞬叛遣中郎將任尚討滅之壬午令郡縣勸民蓄蔬食以助五榖蓄積也其官有陂池令得采取勿收假税二嵗假猶租賃冬十月辛未太尉尹睦薨漢官儀曰睦字伯師鞏人十一月乙丑太僕張酺為太尉是歲武陵郡兵破叛蠻降之䕶羌校尉貫友討燒當羌羌乃遁去南單于安國叛骨都侯喜斬之六年春正月永昌徼外夷遣使譯獻犀牛大象己卯司徒丁鴻薨二月乙未遣謁者分行稟貸三河兖冀青州貧民許侯馬光自殺東觀記曰光前坐黨附竇憲歸國為憲客奴所誣告乃自殺丁未司空劉方為司徒太常張奮為司空三月庚寅詔流民所過郡國皆實稟之其有販賣者勿出租税漢循周法商賈有税流人販賣故矜免之又欲就賤還歸者復一歲田租更賦復音福丙寅詔曰朕以𦕈末奉承鴻烈隂陽不和水旱違度濟河之域凶饉流亡尚書曰濟河惟兖州言東南據濟西北距河而未獲忠言至謀所以匡救之䇿寤寐永歎用思孔疚孔甚也疚病也詩云憂心孔疚惟官人不得於上黎民不安於下有司不念寛和而競為苛刻覆案不急以妨民事不急謂非要甚非所以上當天心下濟元元也思得忠良之士以輔朕之不逮其令三公中二千石二千石内郡守相舉賢良方正能直言極諌之士各一人昭巖穴披幽隱遣詣公車前書音義曰公車署名也公車所在故以名焉漢官儀曰公車令一人秩六百石掌殿門諸上書詣闕下者皆集奏之凡所徴召亦總領之朕将悉聽焉帝乃親臨䇿問選補郎吏夏四月蜀郡徼外羌率種人遣使内附五月城陽王淑薨無子國除章帝子也六月己酉初令伏閉盡日漢官舊儀曰伏日萬鬼行故盡日閉不干它事秋七月京師旱詔中都官徒各除半刑讁其未竟五月已下皆免遣丁巳幸洛陽寺寺官舍也風俗云云寺嗣也理事之吏嗣續於其中錄囚徒舉寃獄收洛陽令下獄抵罪司隸校尉河南尹皆左降未及還宫而澍雨西域都䕶班超大破焉耆尉犁斬其王自是西域降服納質者五十餘國南單于安國從弟子逢侯率叛胡亡出塞九月癸丑以光禄勲鄧鴻行車騎將軍事與越騎校尉馮柱行度遼將軍朱徽劉攽曰案文少一事字使匈奴中郎將杜崇討之冬十一月䕶烏桓校尉任尚率烏桓鮮卑大破逢侯闞駰十三州志曰䕶烏桓擁節秩比二千石武帝置以䕶内附烏桓旣而并於匈奴中郎將中興初班彪上言宜復此官以招附東胡乃復更置焉馮柱遣兵追擊復之劉攽曰案文少一破字詔以渤海郡屬冀州武陵漊中蠻叛郡兵討平之七年春正月行車騎將軍鄧鴻劉攽曰案文亦少一事字度遼將軍朱徽中郎將杜崇皆下獄死時南單于安國與崇不相平乃上書告崇崇令斷其章縁此驚叛安國卒見殺帝後知之皆徵下獄夏四月辛亥朔日有食之帝引見公卿問得失令將大夫御史謁者博士議郎郎官㑹廷中各言封事十三州志曰侍御史周官即柱下史秩六百石掌注記言行紏諸不法員十五人出有所案則稱使者焉謁者秦官也員七十人皆選孝廉年未五十曉解儐贊者歲盡拜縣令長史及都官府丞長史博士秦官博通古今秩皆六百石孝武初置五經博士後稍増至十四員取聰明威重一人為祭酒主領焉議郎郎官皆秦官也宂無所掌秩六百石或四百石劉攽曰注嵗盡拜縣令長史及都官府丞長史案文多一史字若是王國長史則當并守丞言之明此但是令長耳下文又自有長史也詔曰元首不明化流無良政失於民讁見于天讁譴也責也禮曰陽事不得譴讁見于天日為之食深惟庶事五敎在寛是以舊典因孝廉之舉以求其人武帝元光元年董仲舒初開其議詔郡國舉孝亷各一人有司詳選郎官寛博有謀才任典城者三十人任堪也音仁林反旣而悉以所選郎出補長相長縣長相侯相也十三州志云縣侯邑則令長為相秩随令長本秩五月辛卯改千乗國為樂安國千乗故城在今淄州高苑縣北樂安故城在今青州博昌縣南六月丙寅沛王定薨秋七月乙巳易陽地裂易陽縣在易水之陽今易州也九月癸卯京師地震八年春二月己丑立貴人隂氏為皇后賜天下男子爵人二級三老孝悌力田三級民無名數及流民欲占者一級鰥寡孤獨篤癃貧不能自存者粟人五斛夏四月癸亥樂成王黨薨甲子詔賑貸幷州四郡貧民五月河丙陳留蝗南匈奴右温禺犢王叛為寇秋七月行度遼將軍龎奮劉攽曰亦少一事字九年行征西將軍劉尚下亦同越騎校尉馮柱追討之斬右温禺犢王車師後王叛擊其前王八月辛酉飲酎詔郡國中都官繫囚減死一等詣敦煌戍其犯大逆募下蠶室其女子宮自死罪已下至司寇及亡命者入贖各有差九月京師蝗吏民言事者多歸責有司詔曰蝗蟲之異殆不虚生禮記月令曰孟夏行春令則蝗蟲為災洪範五行傳曰貪利傷人則蝗蟲損稼萬方有罪在予一人而言事者專咎自下非助我者也朕寤寐恫矜思弭憂釁尚書曰恫矜乃身孔安國注曰恫痛也矜病也言如痛病在身欲除之也矜音古頑反昔楚嚴無災而懼解見明紀成王出郊而反風成王疑周公天乃大風禾則盡偃王乃出郊祭天乃反風起禾事見尚書將何以匡朕不逮以塞災變百僚師尹勉修厥職刺史二千石詳刑辟理寃虐恤鰥寡矜孤弱思惟致災興蝗之咎庚子復置廣陽郡髙帝時燕國也昭帝元鳳元年為廣陽郡宣帝本始元年更為國也冬十月乙丑北海王威有罪自殺北海郡今青州縣十二月辛亥陳王羡薨丁巳南宫宣室殿火九年春正月永昌徼外蠻夷及撣國重譯奉貢撣音擅東觀記作擅俗本以禪字相類或作禪者誤也説文曰譯所以傳四夷之語也三月庚辰隴西地震癸巳濟南王康薨西域長史王林擊車師後王斬之夏四月丁卯封樂成王黨子廵為樂成王六月蝗旱戊辰詔今年秋稼為蝗蟲所傷皆勿收租更芻槀若有所損失以實除之餘當收租者亦半入其山林饒利陂池漁採以贍元元勿收假税秋七月蝗蟲飛過京師八月鮮卑寇肥如肥如縣屬遼西郡前書音義曰肥子奔燕封於此今平州也遼東太守祭參下獄死東觀記曰鮮卑千餘騎攻肥如城殺略吏人祭參坐沮敗下獄誅閏月辛巳皇太后竇氏崩丙申葬章徳皇后燒當羌寇隴西殺長吏遣行征西將軍劉向越騎校尉趙世等討破之九月庚申司徒劉方䇿免自殺甲子追尊皇妣梁貴人為皇太后冬十月乙酉改葬恭懷梁皇后于西陵謚法曰正徳羙容曰恭執義揚善曰懷東觀記曰改殯承光宮儀比敬園初后葬有闕竇后崩後乃議改葬十一月癸卯光禄勲河南呂蓋為司徒蓋字君玉宛陵人也十二月丙寅司空張奮罷壬申太僕韓稜為司空己丑復置若盧獄官前書曰若盧獄屬少府漢舊儀曰主鞫將相大臣也十年春三月壬戌詔曰隄防溝渠所以順助地理通利壅塞禮記月令曰季春之月修理隄防導逹溝瀆開通道路無有障塞今廢慢懈㢮不以為負刺史二千石其随宜疏導勿因縁妄發以為煩擾將顯行其罰夏五月京師大水東觀記曰京師大雨南山水流出至東郊壊人廬舍秋七月己巳司空韓稜薨八月丙子太常太山巢堪為司空堪字次朗太山南城人九月庚戌復置廪犧官漢官儀曰廩犧令一人秩六百石也冬十月五州雨水十二月燒當羌豪迷唐等率種人詣闕貢獻戊寅梁王暢薨十一年春二月遣使循行郡國稟貸被災害不能自存者令得漁采山林池澤不收假税丙午詔郡國中都官徒及篤癃老小女徒各除半刑其未竟三月者皆免歸田里夏四月丙寅大赦天下己巳復置右校尉官東觀記曰置在西河鵠澤縣秋七月辛卯詔曰吏民踰僣厚死傷生是以舊令節之制度頃者貴戚近親百僚師尹莫肯率從有司不舉怠放日甚又商賈小民或忘法禁竒巧靡貨流積公行其在位犯者當先舉正市道小民但且申明憲綱勿因科令加虐羸弱十二年春二月旄牛徼外白狼貗薄夷率種人内屬闞駰十三州志曰旄牛縣屬蜀郡前書曰旄牛所出歲貢其尾以為節旄詔貸被災諸郡民種糧賜下貧鰥寡孤獨不能自存者及郡國流民聽入陂池漁采以助蔬食三月丙申詔曰比年不登百姓虛匱匱乏也京師去冬無宿雪以其經冬故言宿也今春無澍雨黎民流離困於道路朕痛心疾首靡知所濟瞻仰昊天何辜今人詩大雅周宣王遇旱之詩言今人何罪而天令饑饉乎三公朕之腹心而未獲承天安民之策數詔有司務擇良吏今猶不改競為苛暴侵愁小民以求虚名委任下吏假埶行邪是以令下而姦生禁至而詐起董仲舒曰法出而奸生令下而詐起巧法析律飾文増辭禮記王制曰析言破律也貨行於言罪成乎手朕甚病焉公卿不思助明好惡將何以救其咎罰咎罰旣至復令災及小民若上下同心庶或有瘳其賜天下男子爵人二級三老孝悌力田三級民無名數及流民欲占者人一級鰥寡孤獨篤癃貧不能自存者粟人三斛壬子賜博士員弟子在太學者布人三匹武帝時置博士弟子太常擇人年十八以上儀狀端正者補焉昭帝増員滿百人宣帝倍之元帝更設員千人成帝更増員三千人夏四月日南象林蠻夷反象林縣屬日南郡今鬱林縣郡兵討破之閏月賑貸敦煌張掖五原民下貧者榖戊辰秭歸山崩秭歸縣屬南郡古之䕫國今歸州也袁山松曰屈原此縣人旣被流放忽然蹔歸其姊亦来因名其地為秭歸秭亦姊也東觀記曰秭歸山高四百餘丈崩填谿水壓殺百餘人六月舞陽大水賜被水災尤貧者榖人三斛秋七月辛亥朔日有食之九月戊午太尉張酺免丙寅大司農張禹為太尉冬十一月西域蒙竒兜勒二國遣使内附賜其王金印紫綬是歲燒當羌復叛十三年春正月丁丑帝幸東觀覽書林閲篇籍博選術蓺之士以充其官二月任城王尚薨丙午賑貸張掖居延朔方日南貧民及孤寡羸弱不能自存者秋八月詔象林民失農桑業者賑貸種糧稟賜下貧榖食己亥北宮盛饌門閣火䕶羌校尉周鮪擊燒當羌破之荆州雨水九月壬子詔曰荆州比歲不節今兹淫水為害淮南子曰女媧積蘆灰以止滛水髙誘注云平地水出為滛水餘雖頗登而多不均浹深惟四民農食之本慘然懷矜其令天下半入今年田租芻槀有宜以實除者如故事貧民假種食皆勿收責冬十一月安息國遣使獻師子及條枝大爵西域傳曰安息國居和犢城去洛陽二萬五千里條枝國臨西海出師子大雀郭義恭廣志曰大爵頸及身膺蹄都似槖駝舉頸髙八九尺張翅丈餘食大麥其卵如甕即今之駝鳥也丙辰詔曰幽幷涼州户口率少邊役衆劇束修良吏進仕路狹撫接夷狄以人為本其令緣邊郡口十萬以上歲舉孝廉一人不滿十萬二歲舉一人五萬以下三歲舉一人鮮卑寇右北平遂入漁陽漁陽太守擊破之戊辰司徒呂蓋罷十二月丁丑光禄勲魯恭為司徒辛卯巫蠻叛寇南郡巫縣屬南郡故城在今䕫州巫山縣也十四年春二月乙卯東海王政薨繕修故西海郡平帝時金城塞外羌獻地以為西海郡也光武建武中省金城入隴西郡至是復繕修之金城即今蘭州縣也徙金城西部都尉以戍之三月戊辰臨辟雍饗射大赦天下夏四月遣使者督荆州兵討巫蠻破降之庚辰賑貸張掖居延敦煌五原漢陽㑹稽流民下貧榖各有差五月丁未初置象林將兵長史官闞駰十三州志曰將兵長史居在日南郡又有將兵司馬去雒陽九千六百三十里六月辛卯廢皇后隂氏后父特進綱自殺秋七月甲寅詔復象林縣更賦田租芻槀二歲壬子常山王側薨是秋三州雨水冬十月甲申詔兖豫荆州今年水雨淫過多傷農功其令被害什四以上皆半入田租芻槀其不滿者以實除之辛卯立貴人鄧氏為皇后丁酉司空巢堪罷十一月癸卯大司農徐防為司空是歲初復郡國上計補郎官上計今計吏也前書音義曰舊制使郡丞奉歲計武帝元朔中令郡國舉孝廉各一人與計偕拜為郎中中廢今復之十五年春閏月乙未詔流民欲還歸本而無糧食者過所實稟之疾病加致醫藥其不欲還歸者勿強二月詔稟貸潁川汝南陳留江夏梁國敦煌貧民前書音義曰陳留本鄭邑後為陳所并故曰陳留今汴州縣也江夏郡高帝置沔水自江别至南郡華容為夏水過郡入江故曰江夏夏四月甲子晦日有食之五月戊寅南陽大風六月詔令百姓鰥寡漁采陂池勿收假税二歲秋七月丙寅濟南王錯薨錯音七故反復置涿郡故鹽鐵官續漢書曰其郡縣有鹽官鐵官者随事廣狹置令長及丞秩次皆如縣也九月壬午南廵狩清河王慶濟北王壽河間王開竝從賜所過二千石長吏以下三老官屬及民百年者錢布各有差是秋四州雨水冬十月戊申幸章陵祠舊宅癸丑祠園廟㑹宗室於舊廬勞賜作樂戊午進幸雲夢臨漢水而還雲夢今安州縣也即在雲夢澤中十一月甲申軍駕還宮賜從臣及留者公卿以下錢布各有差十二月庚子琅邪王宇薨有司奏以為夏至則微隂起靡草死可以決小事禮記月令曰孟夏之月靡草死麥秋至斷薄刑決小罪鄭𤣥注云靡草薺亭歴之屬臣賢案五月一隂爻生可以言微隂今月令云孟夏乃是純陽之月此言夏至者與月令不同是歲初令郡國以日北至案薄刑十六年春正月己卯詔貧民有田業而以匱乏不能自農者貸種糧二月己未詔兖豫徐冀四州比年雨多傷稼禁沽酒夏四月遣三府掾分行四州貧民無以耕者為雇犂牛直五月壬午趙王商薨秋七月旱戊午詔曰今秋稼方穂而旱雲雨不霑疑吏行慘刻不宣恩澤妄拘無罪幽閉良善所致其一切囚徒於法疑者勿決以奉秋令禮記月令曰孟秋之月命有司修法制繕囹圄具桎梏斷薄刑決小罪方察煩苛之吏顯明其罰辛酉司徒魯恭免庚午光禄勲張酺為司徒辛巳詔令天下皆半入今年田租芻槀其被災害者以實除之貧民受貸種糧及田租芻槀皆勿收責八月己酉司徒張酺薨十月辛卯司空徐防為司徒大鴻臚陳寵為司空十一月己丑行幸緱氏登百岯山即柏岯山也在洛州緱氏縣南爾雅云山一成曰岯東觀記作坯竝音平眉反流俗本或作柸者誤也賜百官從臣布各有差北匈奴遣使稱臣貢獻十二月復置遼東西部都尉官西部都尉安帝時以為屬國都尉在遼東郡昌黎城也元興元年春正月戊午引三署郎召見禁中漢官儀三署謂五官署也左右署也各置中郎將以司之郡國舉孝廉以補三署郎年五十以上屬五官其次分在左右署凡有中郎議郎侍郎郎中四等無員禁中者門户有禁非侍御者不得入故謂禁中選除七十五人補謁者長相髙句驪寇郡界夏四月庚午大赦天下改元元興宗室以罪絶者悉復屬籍五月癸酉雍地裂東觀記曰右扶風雍地裂流俗本雍下有州者誤也秋九月遼東太守耿夔擊貊人破之冬十二月辛未帝崩于章徳前殿年二十七立皇子隆為皇太子賜天下男子爵人二級三老孝悌力田人三級民無名數及流民欲占者人一級鰥寡孤獨篤癃貧不能自存者粟人三斛自竇憲誅後帝躬親萬機每有災異輒延問公卿極言得失前後符瑞八十一所自稱德薄皆抑而不宣舊南海獻龍眼荔支十里一置五里一候南海郡秦置今廣州縣也廣雅曰益智龍眼也交州記曰龍眼樹髙五六丈似荔支而小廣州記曰子似荔支而圓七月熟荔支樹高五六丈大如桂樹實如雞子甘而多汁似安石榴有甜醋者至日禺中翕然俱赤即可食置謂驛也奔騰阻險死者繼路時臨武長汝南唐羌縣接南海臨武縣屬桂陽郡今郴州縣也乃上書陳狀帝下詔曰遠國珍羞本以薦奉宗廟苟有傷害豈愛民之本其勅太官勿復受獻由是遂省焉謝承書曰唐羌字伯游辟公府補臨武長縣接交州舊獻龍眼荔支及生鮮獻之驛馬晝夜傳送之至有遭虎狼毒害頓仆死亡不絶道經臨武羌乃上書諫曰臣聞上不以滋味為徳下不以貢膳為功故天子食太牢為尊不以果實為珍伏見交阯七郡獻生龍眼等鳥驚風發南州土地惡蟲猛獸不絶於路至於觸犯死亡之害死者不可復生來者猶可救也此二物升殿未必延年益夀帝從之章報羌即棄官還家不應徵召著唐子三十餘篇論曰自中興以後逮於永元雖頗有㢮張而俱存不擾是以齊民歲増闢土世廣偏師出塞則漠北地空都䕶西指則通譯四萬西域傳曰班超定西域五十餘國皆降服西至海瀕四萬里皆重譯貢獻豈其道逺三代術長前世將服叛去來自有數也孝殤皇帝諱隆謚法曰短折不成曰殤古今注曰隆之字曰盛和帝少子也元興元年十二月辛未夜即皇帝位時誕育百餘日誕大也詩大雅誕彌厥月先生如逹鄭𤣥注云大矣后稷之在其母懐也終人道十月而生詩又云載生載育育長也逹音它末反尊皇后曰皇太后太后臨朝儀見皇后紀北匈奴遣使稱臣詣敦煌奉獻延平元年春正月辛卯太尉張禹為太傅司徒徐防為太尉參録尚書事百官總已以聽封皇兄勝為平原王癸卯光禄勲梁鮪為司徒漢官儀曰鮪字伯元河東平陽人也三月甲申葬孝和皇帝于慎陵在洛陽東南三十里俗本作順者誤尊廟曰穆宗丙戍清河王慶濟北王壽河間王開常山王章始就國夏四月庚申詔罷祀官不在祀典者東觀記曰鄧太后雅性不好淫祀鮮卑寇漁陽漁陽太守張顯追擊戰殁丙寅以虎賁中郎將鄧騭為車騎將軍司空陳寵薨五月辛卯皇太后詔曰皇帝㓜冲承統鴻業朕且權禮佐助聽政兢兢寅畏寅敬也不知所濟深惟至治之本道化在前刑罰在後將稽中和廣施慶恵與吏民更始其大赦天下自建武以來諸犯禁錮詔書雖解有司持重多不奉行其皆復為平民壬辰河東垣山崩垣縣今絳州縣也古今注曰山崩長七丈廣四丈六月丁未太常尹勤為司空郡國三十七雨水己未詔曰自夏以來隂雨過節煗氣不效效猶騐也將有厥咎寤寐憂惶未知所由昔夏后惡衣服菲飲食孔子曰吾無間然菲薄也間非也今新遭大憂且歲節未和徹膳損服庻有補焉其減太官導官尚方内署諸服御珍膳靡麗難成之物太官令周官也秩千石典天子厨膳導官掌擇御米導擇也尚方掌作御刀劒諸器物内署掌内府衣物秩皆六百石並見續漢書丁卯詔司徒大司農長樂少府曰朕以無徳佐助統政夙夜經營懼失厥衷思惟治道由近及逺先内後外自建武之初以至於今八十餘年宮人歲増房御彌廣又宗室坐事没入者猶託名公族甚可愍焉今悉免遣及掖庭宮人皆為庶民以抒幽隔鬱滯之情抒舒也食汝反諸官府郡國王侯家奴婢姓劉及疲癃羸老皆上其名務令實悉秋七月庚寅勅司隸校尉部刺史秦有監御史監諸郡漢興省之但遣丞相史分刺諸州無有常官孝武帝初置刺史十三人秩六百石成帝更為牧秩二千石建武十八年復為刺史十二人各主一州其一州屬司隸校尉諸州常以八月廵行所部郡國錄囚徒考殿最初歲盡詣京都奏事中興但因計吏見續漢書曰夫天降災戾應政而至間者郡國或有水災妨害秋稼朝廷惟咎憂惶悼懼而郡國欲獲豐穰虛飾之譽遂覆蔽災害多張墾田不揣流亡揣音初委反競増户口掩匿盜賊令姦惡無懲署用非次選舉乖宜貪苛慘毒延及平民平民謂善人也書曰延及平人刺史垂頭塞耳阿私下比不畏于天不愧于人詩小雅也假貸之恩不可數恃自今以後將紏其罰二千石長吏其各實覈所傷害為除田租芻槀八月辛亥帝崩癸丑殯于崇德前殿年二歲贊曰孝和沈烈率由前則王赫自中賜命彊慝慝惡也謂誅竇憲等抑没祥符登顯時德謂用鄧彪等委政也殤世何早平原弗克平原王勝以痼疾不得立也左傳曰弗克負荷劉攽曰紀書孝和葬慎陵章懷注云俗本作順陵者誤臣攽案皇后紀和熹皇后合葬順陵以為皇后紀誤而靈帝父孝仁皇稱慎陵世數不逺陵名必不相襲參校前後孝和實葬順陵言慎乃更為誤耳疑此亦非章懐之失蓋傳寫誤以順為慎亦因以慎為順耳後漢書卷四後漢書卷四考證和帝紀追至河渠北鞮海何焯云竇憲傳及通鑑皆作私渠比鞮海屬國都尉官注典屬國武帝置哀帝省并大鴻臚故今復置之何焯曰光武紀建武六年罷郡國都尉官故屬國都尉亦罷此復置之與典屬國無與復置涿郡故鹽鐵官何焯曰按涿郡故安縣有鐵官無鹽官則此鹽字乃安字之訛殤帝紀朕且權禮禮字疑有誤宋本無禮字亦不成句姑仍監本後漢書卷四考證
