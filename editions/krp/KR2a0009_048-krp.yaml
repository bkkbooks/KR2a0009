body:
  text: 後漢書卷四十八宋宣城太守范煜撰唐章懐太子賢注呉蓋陳臧列傳第八呉漢傳呉漢字子顔南陽宛人也家貧給事縣為亭長王莽末以賔客犯法乃亡命至漁陽命名也謂脱其名籍而逃亡資用乏以販馬自業往来燕薊間所至皆交結豪傑更始立使使者韓鴻徇河北續漢書曰雒陽人韓鴻為謁者使持節降河北拜除二千石或謂鴻曰呉子顔竒士也可與計事鴻召見漢甚恱之遂承制拜爲安樂令安樂縣名屬漁陽郡故城在今幽州潞縣西北㑹王郎起北州擾惑漢素聞光武長者獨欲歸心乃說太守彭寵曰漁陽上谷突騎天下所聞也君何不合二郡精鋭附劉公擊邯鄲此一時之功也一時言不可再遇也寵以為然而官屬皆欲附王郎寵不能奪漢乃辭出止外亭念所以譎衆未知所出譎詐也未知欲出何計以詐也望見道中有一人似儒生者漢使人召之為具食續漢書曰時道路多饑人來求食者似儒生漢召故先為具食劉攽曰案注文漢召下少一之字問以所聞生因言劉公所過為郡縣所歸邯鄲舉尊號者實非劉氏漢大喜即詐為光武書移檄漁陽使生齎以詣寵令具以所聞説之漢復随後入寵甚然之扵是遣漢將兵與上谷諸將幷軍而南所至擊斬王郎將帥續漢書曰攻薊誅王郎大將趙閎等及光武於廣阿拜漢為偏將軍既拔邯鄲續漢書曰時上使漢等將突騎揚兵戲馬士騎馳環邯鄲城乃圍之賜號建策侯漢為人質厚少文造次不䏻以辭自達鄧禹及諸將多知之數相薦舉乃得召見遂見親信常居門下光武將發幽州兵夜召鄧禹問可使行者禹曰間數與呉漢言其人勇鷙有智謀廣雅曰鷙執也凡鳥之勇鋭獸之猛悍者皆名鷙也諸將鮮能及者即拜漢大將軍持節北發十郡突騎更始幽州牧苗曾聞之隂勒兵勅諸郡不肯應調調發也漢乃將二十騎先馳至無終無終本山戎國也無終山名因為國號漢為縣名屬右北平故城在今幽州漁陽縣也曾以漢無備出迎於路漢即撝兵騎收曾斬之而奪其軍北州震駭城邑莫不望風弭從弭猶服也遂悉發其兵引而南與光武㑹清陽諸將望見漢還士馬甚盛皆曰是寜肯分兵與人邪及漢至莫府上兵簿莫大也兵簿軍士之名帳諸將人人多請之光武曰屬者恐不與人屬猶近也今所請又何多也諸將皆慙初更始遣尚書令謝躬率六將軍攻王郎不能下㑹光武至共定邯鄲而躬禆將虜掠不相承禀光武深忌之雖俱在邯鄲遂分城而處然每有以慰安之躬勤於職事光武常稱曰謝尚書真吏也故不自疑躬既而率其兵數萬還屯扵鄴時光武南擊青犢謂躬曰我追賊於射犬必破之尤來在山陽者埶必當驚走若以君威力擊此散虜必成禽也躬曰善及青犢破而尤來果北走隆慮山躬乃留大將軍劉慶魏郡太守陳康守鄴自率諸將軍擊之窮寇死戰其鋒不可當躬遂大敗死者數千人光武因躬在外乃使漢與岑彭襲其城漢先令辯士説陳康曰盖聞上智不處危以僥倖僥猶求也中智䏻因危以為功下愚安扵危以自亡危亡之至在人所由不可不察今京師敗亂四方雲擾公所聞也蕭王兵彊士附河北歸命公所見也謝躬内背蕭王外失衆心公所知也今公據孤危之城待滅亡之禍義無所立節無所成不若開門内軍轉禍為福免下愚之敗收中智之功此計之至者也康然之於是康收劉慶及躬妻子開門内漢等及躬従隆慮歸鄴不知康已反之乃與數百騎輕入城漢伏兵收之手擊殺躬其衆悉降續漢書曰時岑彭已在城中將躬詣傳舎出白漢漢至躬在彭前伏漢曰何故與鬼語遂殺之躬字子張南陽人初其妻知光武不平之常戒躬曰君與劉公積不相能而信其虛談不為之備終受制矣躬不納故及扵難光武北撃羣賊續漢書曰従擊銅馬重連髙胡皆破之漢常將突騎五千為軍鋒數先登陷陳及河北平漢與諸將奉圖書上尊號光武即位拜為大司馬更封舞陽侯建武二年春漢率大司空王梁建義大將軍朱祐大將軍杜茂執金吾賈復揚化將軍堅鐔偏將軍王覇騎都尉劉隆馬武隂識共擊檀鄉賊於鄴東漳水上大破之水經曰漳水源出上黨長子縣西發鳩山東北至昌亭與滹沱河合降者十餘萬人帝使使者璽書定封漢為廣平侯食廣平斥漳曲周廣年凡四縣四縣皆屬廣平郡廣平故城在今洺州永年縣西北廣年在今永年縣東北斥漳在今洺州洺水縣曲周故城在今洺州曲周縣西南廣年避焬帝諱故改為永年縣復率諸將擊鄴西山賊黎伯卿等及河内脩武悉破諸屯聚車駕親幸撫勞復遣漢進兵南陽撃宛湼陽酈穰新野諸城皆下之引兵南與秦豐戰黄郵水上破之南陽新野縣有黄郵水黄郵聚也又與偏將軍馮異擊昌城五樓賊張文等又攻銅馬五幡於新安皆破之眀年春率建威大將軍耿弇虎牙大將軍蓋延擊青犢於軹西大破降之又率驃騎大將軍杜茂彊弩將軍陳俊等圍蘇茂於廣樂劉永將周建别招聚收集得十餘萬人救廣樂漢將輕騎迎與之戰不利墮馬傷膝還營建等遂連兵入城諸將謂漢曰大敵在前而公傷卧衆心懼矣漢乃勃然裹創而起椎牛饗士令軍中曰賊衆雖多皆刼掠羣盗勝不相讓敗不相救此上兩句在左傳鄭大夫公子突之詞也非有仗節死義者也今日封侯之秋諸君勉之於是軍士激怒人倍其氣旦日建茂出兵圍漢漢選四部精兵黄頭呉河等前書鄧通為黄頭郎音義曰土勝水故刺船郎著黄㡌號黄頭也及烏桓突騎三千餘人齊鼓而進續漢書曰漢躬被甲拔㦸令諸部將曰聞靁鼓聲皆大呼俱大進後至者斬遂鼓而進之劉攽曰注俱大進按文多一大字建軍大潰反還奔城漢長驅追擊爭門並入大破之茂建突走漢留杜茂陳俊等守廣樂自將兵助蓋延圍劉永於睢陽永既死二城皆降眀年又率陳俊及前將軍王梁擊破五校賊於臨平追至東郡箕山大破之北擊清河長直及平原五里賊皆平之東觀記及續漢書長直並作長垣按長垣縣名在河南不得言北擊而范書作長直當是賊號或因地以為名時鬲縣五姓共逐守長據城而反鬲縣名屬平原郡故城在今徳州西北五姓盖當土彊宗豪右也鬲音革諸將争欲攻之漢不聽曰使鬲反者皆守長罪也敢輕冐進兵者斬乃移檄告郡使收守長而使人謝城中五姓大喜即相率歸降諸將乃服曰不戰而下城非衆所及也冬漢率建威大將軍耿弇漢中將軍王常等劉攽曰中當作忠擊富平獲索二賊扵平原眀年春賊率五萬餘人夜攻漢營軍中驚亂漢堅卧不動有頃乃定即夜發精兵出營突擊大破其衆因追討餘黨遂至無鹽無鹽縣名屬東平國故城在今鄆州東進擊渤海皆平之又従征董憲圍朐城眀年春拔朐朐縣名解見光武紀斬憲事已見劉永傳東方悉定振旅還京師㑹隗囂畔夏復遣漢西屯長安八年從車駕上隴遂圍隗囂扵西城帝勅漢曰諸郡甲卒俱坐費糧食若有逃亡則沮敗衆心宜悉罷之漢等貪并力攻囂遂不能遣糧食日少吏士疲役逃亡者多及公孫述救至漢遂退敗十一年春率征南大將軍岑彭等伐公孫述及彭破荆門長驅入江關漢留夷陵装露橈船橈短檝也音人遥反將南陽兵及弛刑募士三萬人泝江而上㑹岑彭為刺客所殺漢并將其軍十二年春與公孫述將魏黨公孫永戰於魚涪津大破之續漢書曰犍為郡南安縣有漁涪津在縣北臨大江南中志曰漁涪津廣數百歩遂圍武陽述遣子壻史興將五千人救之漢迎擊興盡殄其衆因入犍為界諸縣皆城守漢乃進軍攻廣都拔之遣輕騎燒成都市橋橋名也解見公孫述傳武陽以東諸小城皆降帝戒漢曰成都十餘萬衆不可輕也但堅據廣都待其来攻勿與争鋒若不敢来公轉營廹之須其力疲乃可擊也漢乘利遂自將歩騎二萬餘人進逼成都去城十餘里阻江北為營作浮橋使副將武威將軍劉尚東觀記續漢書尚字並作禹將萬餘人屯於江南相去二十餘里帝聞大驚讓漢曰比勑公千條萬端何意臨事勃亂既輕敵深入又與尚别營事有緩急不復相及賊若出兵綴公以大衆攻尚尚破公即敗矣幸無它者急引兵還廣都詔書未到述果使其將謝豐袁吉將衆十許萬分為二十餘營幷出攻漢使别將萬餘人刼劉尚令不得相救漢與大戰一日兵敗走入壁豐因圍之漢乃召諸將厲之曰吾共諸君踰越險阻轉戰千里所在斬獲遂深入敵地至其城下而今與劉尚二處受圍埶既不接其禍難量欲潜師就尚扵江南幷兵禦之若能同心一力人自為戰大功可立如其不然敗必無餘成敗之機在此一舉諸將皆曰諾扵是饗士秣馬閉營三日不出乃多樹幡旗使煙火不絶夜銜枚引兵與劉尚合軍豐等不覺眀日乃分兵拒江北自將攻江南漢悉兵迎戰自旦至晡遂大破之斬謝豐袁吉獲甲首五千餘級扵是引還廣都留劉尚拒述具以状上而深自譴責帝報曰公還廣都甚得其宜述必不敢略尚而擊公也略猶過也若先攻尚公従廣都五十里悉歩騎赴之適當值其危困破之必矣自是漢與述戰扵廣都成都之間八戰八剋遂軍扵其郭中述自將數萬人出城大戰漢使護軍髙午唐邯將數萬鋭卒擊之述兵敗走髙午奔陳刺述殺之事已見述傳旦日城降斬述首傳送洛陽眀年正月漢振旅浮江而下至宛詔令過家上冡賜穀二萬斛十五年復率揚武將軍馬成捕虜將軍馬武北擊匈奴徙鴈門代郡上谷吏人六萬餘口置居庸常闗以東劉攽曰按文當有一山字十八年蜀郡守將史歆反於成都自稱大司馬攻太守張穆穆踰城走廣都歆遂移檄郡縣而宕渠楊偉朐䏰徐容等宕渠朐䏰二縣名皆屬巴郡朐音劬䏰音忍宕渠山名因以名縣故城在今渠州流江縣東北俗名車騎城是也十三州志朐音春䏰音閏其地下溼多朐䏰蟲因以名縣故城在今䕫州雲安縣西萬户故城是也起兵各數千人以應之帝以歆昔為岑彭護軍曉習兵事故遣漢率劉尚及太中大夫臧宮將萬餘人討之漢入武都乃發廣漢巴蜀三郡兵圍成都百餘日城破誅歆等漢乃乗桴㳂江下巴郡楊偉徐容等惶恐解散漢誅其渠帥二百餘人徙其黨與數百家於南郡長沙而還漢性彊力每従征伐帝未安恒側足而立諸將見戰陳不利或多惶懼失其常度漢意氣自若方整厲器械激揚士吏帝時遣人觀大司馬何為還言方脩戰攻之具乃嘆曰呉公差彊人意隠若一敵國矣隠威重之貎言其威重若敵國前書周亞夫謂劇孟曰大將得之若一敵國矣每當出師朝受詔夕即引道初無辦嚴之日嚴即装也避眀帝諱故改之故能常任職以功名終及在朝廷斤斤謹質形扵體貎爾雅曰眀明斤斤察也李巡曰斤斤精詳之察也孫炎曰重慎之察也斤音靳漢嘗出征妻子在後買田業漢還讓之曰軍師在外吏士不足何多買田宅乎遂盡以分與昆弟外家東觀記曰漢但修里宅不起第夫人先死薄葬小墳不作祠堂也二十年漢病篤車駕親臨問所欲言對曰臣愚無所知識唯願陛下慎無赦而已及薨有詔悼愍賜謚曰忠侯東觀記曰有司奏議以武為謚詔特賜謚曰忠侯發北軍五校輕車介士送葬如大將軍霍光故事漢置南北軍五校尉解見順帝紀輕車兵車也介士甲士也霍光傳云以北軍五校尉輕車介士載光尸以轀輬車黄屋左纛軍陳至茂陵不以南軍者重之也子哀侯成嗣為奴所殺二十八年分漢封為三國成子旦為灈陽侯灈陽縣名屬汝南郡在灈水之陽因以為名其地今豫州呉房縣也音劬以奉漢嗣旦弟盱盱音火俱反為筑陽侯成弟國為新蔡侯筑陽縣名屬南陽郡古穀國也在筑水之陽故城在今襄州穀城縣西新蔡縣名屬汝南郡蔡平侯自蔡徙此故加新字今豫州縣也筑音逐旦卒無子國除建初八年徙封盱為平春侯平春縣名屬江夏郡以奉漢後盱卒子勝嗣初漢兄尉為將軍從征戰死封尉子彤為安陽侯安陽縣名屬汝南郡古江國也故城在今豫州新息縣西南帝以漢功大復封弟翕為襃親侯呉氏侯者凡五國初漁陽都尉嚴宣與漢俱㑹光武扵廣阿光武以為偏將軍封建信侯建信縣名屬千乗國論曰呉漢自建武世常居上公之位終始倚愛之親差彊人意是倚之也遂見親信是愛之也諒由質簡而彊力也子曰剛毅木訥近仁論語文剛毅謂彊而能斷木樸慤貎訥忍於言也四者皆仁之質若加文則成仁矣故言近仁斯豈漢之方乎方比也昔陳平智有餘以見疑周勃質朴忠而見信高祖謂吕后曰陳平智有餘然難獨任是見疑也又曰周勃重厚少文安劉氏者必勃是見信也夫仁義不足以相懐則智者以有餘為疑而朴者以不足取信矣懐依也言若仁義之心足相依信則情無疑阻若彼此之誠未協仁義不足相依則智者翻以有餘見疑朴者以愚直取信蓋延傳蓋延字巨卿漁陽要陽人也要陽縣名光武時省身長八尺彎弓三百斤邊俗尚勇力而延以氣聞歴郡列掾州従事所在職辦古者三公下至郡縣皆有掾屬續漢志曰建武十八年立刺史十三人人主一州皆有従事史假佐每郡皆置諸曺掾郡中列掾非一延並為之故言歴也漁陽屬幽州東觀記云延為幽州従事彭寵為太守召延署營尉行護軍及王郎起延與呉漢同謀歸光武續漢書曰并與狐奴令王梁同勸寵延至廣阿拜偏將軍號建功侯従平河北光武即位以延為虎牙將軍建武二年更封安平侯遣南擊敖倉轉攻酸棗封丘皆拔酸棗封丘二縣名屬陳留郡酸棗故城在今滑州縣也封丘故城在今汴州縣也劉攽曰按文皆拔下不可無一之字其夏督駙馬都尉馬武騎都尉劉隆護軍都尉馬成偏將軍王覇等南伐劉永先攻拔襄邑續漢書曰時劉永别將許徳據襄邑延攻而拔之進取麻鄉麻鄉縣名故城在今宋州碭山縣東北遂圍永扵睢陽數月盡收野麦夜梯其城入永驚懼引兵走出東門東觀記云走出魚門然則東門名魚門也延追擊大破之永棄軍走譙延進攻拔薛斬其魯郡太守薛縣名屬魯國故城在今徐州滕縣東南東觀記曰魯郡太守梁丘夀也而彭城扶陽杼秋蕭皆降扶陽縣名屬沛郡杼秋縣名屬梁國故城在今徐州蕭縣西北杼音食汝反又破永沛郡太守斬之東觀記曰沛郡太守陳脩永將蘇茂佼彊周建等三萬餘人佼彊姓名也周大夫原伯佼之後也救永共攻延延與戰於沛西大破之永軍亂遁沒溺死者太半永棄城走湖陵蘇茂奔廣樂延遂定沛楚臨淮脩髙祖廟置嗇夫祝宰樂人楚即今彭城縣也臨淮郡名今泗州下邳縣髙祖廟在今徐州沛縣東故泗水亭中即髙祖為亭長之所也嗇夫主知廟事東觀記曰時蓋延因齋戒祠高祖廟三年雎陽復反城迎劉永反音翻延復率諸將圍之百日收野穀永乏食突走延追擊盡得輜重永為其將所殺永弟防舉城降四年春延又擊蘇茂周建於蘄蘄縣名屬沛郡有大澤鄉蘄音機進與董憲戰留下皆破之留縣名屬楚國故城在今徐州沛縣東南因率平敵將軍龐萌攻西防拔之西防縣名春秋時宋之西防城故城在今宋州單父縣北復追敗周建蘇茂於彭城茂建亡奔董憲將賁休舉蘭陵城降前書有賁赫音肥今有此姓賁音奔劉攽曰注賁音奔按文多一賁字憲聞之自郯圍休時延及龐萌在楚請往救之帝勑曰可直往𢷬郯則蘭陵必自解𢷬擊也東觀記作擊字延等以賁休城危遂先赴之憲逆戰而陽敗延等遂逐退因拔圍入城劉攽曰按文多一遂字緣下有逐字誤之眀日憲大出兵合圍延等懼遽出突走因往攻郯帝讓之曰間欲先赴郯者以不意故耳今既奔走賊計已立圍豈可解乎延等至郯果不能克而董憲遂拔蘭陵殺賁休延等往来要擊憲别將於彭城郯邳之間戰或日數合頗有剋獲帝以延輕敵深入數以書誡之東觀記載延上疏辭曰臣幸得受干戈誅逆虜奉職未稱久留天誅常恐汙辱名號不及等倫天下平定已後曾無尺寸可數不得預竹帛之編眀詔深閔儆戒備具每事奉循詔命必不敢為國之憂也及龐萌反攻殺楚郡太守引軍襲敗延延走北度泗水破舟檝壊津梁僅而得免東觀記續漢書皆云萌攻延延與戰破之詔書勞延曰龐萌一夜反畔相去不逺營壁不堅殆令人齒欲相撃而將軍有不可動之節吾甚羙之此傳言僅而得免與彼不同帝自將而東徴延與大司馬呉漢漢忠將軍王常前將軍王梁捕虜將軍馬武討虜將軍王霸等㑹任城討龐萌於桃鄉又並従征董憲於昌慮皆破平之六年春遣屯長安九年隗囂死延西撃街泉略陽清水諸屯聚皆定街泉略陽清水三縣皆屬天水郡十一年與中郎將來歙攻河池未剋以病引還拜為左馮翊將軍如故續漢書曰視事四年人敬其威信十三年增封定食萬户十五年薨於位子扶嗣扶卒子側嗣永平十三年坐與舅王平謀反伏誅國除永初七年鄧太后紹封延曾孫恢為蘆亭侯東觀記作盧亭恢卒子遂嗣陳俊傳陳俊字子昭南陽西鄂人也江夏郡有鄂故此加西也故城在今鄧州向城縣南也少為郡吏更始立以宗室劉嘉為太常將軍俊為長史光武徇河北嘉遣書薦俊光武以為安集掾東觀記曰俊初調補曲陽長上曰欲與君為左右小縣何足貪乎俊即拜解印綬上以為安集掾從擊銅馬於清陽進至滿陽拜彊弩將軍華嶠書曰拜為彊弩偏將軍賜絳衣九百領以衣中堅同心士與五校戰於安次俊下馬手接短兵所向必破追奔二十餘里斬其渠帥而還光武望而歎曰戰將盡如是豈有憂哉五校引退入漁陽所過虜掠俊言於光武曰宜令輕騎出賊前使百姓各自堅守壁以絶其食可不戰而殄也光武然之遣俊將輕騎馳出賊前視人保壁堅完者勑令固守放散在野者因掠取之賊至無所得遂散敗及軍還光武謂俊曰困此虜者將軍策也及即位封俊為列侯建武二年春攻匡賊下四縣匡賊即匡城縣賊也東觀記作匡城賊匡城古匡邑也故城在今滑州匡城縣南更封新處侯新處縣名屬中山國引擊頓丘降三城頓丘縣名屬東郡故城在今魏州頓丘縣北隂安城是也其秋大司馬呉漢承制拜俊為彊弩大將軍别擊金門白馬賊於河内皆破之金門白馬並山名在今洛州福昌縣西南有金門白馬水盖賊起於二山因以為名四年轉徇汝陽及項又㧞南武陽南武陽縣名屬太山郡故城在今沂州費縣西是時太山豪傑多擁衆與張歩連兵呉漢言於帝曰非陳俊莫䏻定此郡於是拜俊太山太守行大將軍事張歩聞之遣其將擊俊戰於嬴下續漢書曰嬴縣名屬太山郡嬴音盈俊大破之追至濟南收得印綬九十餘歩時擬私封爵人之印綬稍攻下諸縣遂定太山五年與建威大將軍耿弇共破張歩事在弇傳時琅邪未平乃徙俊為琅邪太守領將軍如故齊地素聞俊名入界盗賊皆解散俊將兵擊董憲於贛榆贛榆縣名屬東海郡贛音貢進破朐賊孫陽平之八年張歩畔還琅邪俊追討斬之帝美其功詔俊得專征青徐華嶠書曰賜俊璽書曰將軍元勲大著威震青徐兩州有警得專征之俊得撫貧弱表有義檢制軍吏不得與郡縣相干百姓歌之數上書自請願奮撃隴蜀詔報曰東州新平大將軍之功也負海猾夏盗賊之處國家以為重憂且勉鎮撫之十三年增邑定封祝阿侯祝阿縣名屬平原郡眀年徵奉朝請二十三年卒子浮嗣徙封蘄春侯蘄春今蘄州縣也東觀記曰詔書以祝阿益濟南國故徙浮封蘄春侯蘄音祈浮卒子專諸嗣專諸卒子篤嗣臧宫傳臧宫字君翁潁川郟人也郏縣名今汝州郟城縣也少為縣亭長游徼續漢書曰每十里一亭亭有長以禁盗賊每鄉有游徼掌循禁姦盗也後率賔客入下江兵中為校尉因従光武征戰諸將多稱其勇光武察宫勤力少言甚親納之及至河北以為偏將軍従破羣賊數陷陳郤敵光武即位以為侍中騎都尉建武二年封成安侯成安縣名屬潁川郡眀年將突騎與征虜將軍祭遵擊更始將左防韋顔華嶠書韋字作韓於沮陽酈悉降之三年將兵徇江夏擊代鄉鍾武竹里皆下之鍾武縣名屬江夏郡故城在今申州鍾山縣西南帝使太中大夫華嶠書曰使張明也持節拜宫為輔威將軍七年更封期思侯期思縣名屬汝南郡故城在今光州固始縣西北撃梁郡濟隂皆平之十一年將兵至中盧屯駱越中盧縣名屬南郡故城在今襄州襄陽縣南盖駱越人徙於此因以為名是時公孫述將田戎任滿與征南大將軍岑彭相拒於荆門彭等戰數不利越人謀畔從蜀宫兵少力不能制㑹屬縣送委輸車數百乗至宫夜使鋸斷城門限令車聲回轉出入至旦越人候伺者聞車聲不絶而門限斷相告以漢兵大至其渠帥乃奉牛酒以勞軍營宫陳兵大㑹擊牛釃酒饗賜慰納之釃音所宜反説文曰下酒也詩注曰以筐曰釃也越人由是遂安宫與岑彭等破荆門别至垂鵲山通道出秭歸至江州岑彭下巴郡使宫將降卒五萬從涪水上平曲公孫述將延岑盛兵於沅水沅水出廣漢解見光武紀時宫衆多食少轉輸不至而降者皆欲散畔郡邑復更保聚觀望成敗宫欲引還恐為所反反音翻㑹帝遣謁者將兵詣岑彭有馬七百匹宫矯制取以自益晨夜進兵多張旗幟登山鼓噪右歩左騎挟船而引呼聲動山谷岑不意漢兵卒至登山望之大震恐宫因從擊劉攽曰按從擊無理當作縦字大破之斬首溺死者萬餘人水為之濁流延岑奔成都其衆恙降盡獲其兵馬珍寳華嶠書曰上璽書勞宫賜吏士絳縑六千匹自是乗勝追北降者以十萬數人好陽而惡隂北方幽隂之地故軍敗者皆謂之北史記樂書曰北者敗也而近代音北為背失其指矣軍至平陽鄉蜀將王元舉衆降進拔緜竹破涪城斬公孫述弟恢復攻拔繁郫繁縣名屬蜀郡繁江名因以為縣名故城在今益州新繁縣北郫縣名屬蜀郡故城在今益州郫縣北郫音皮前後收得節五印綬千八百是時大司馬呉漢亦乗勝進營逼成都宫連屠大城兵馬旌旗甚盛乃乗兵入小雒郭門歴成都城下張載注蜀都賦云漢武帝元鼎三年立成都郭十八門小雒郭門盖其數焉至呉漢營飲酒高㑹漢見之甚歡謂宫曰將軍向者經虜城下震揚威靈風行電照然窮冦難量還營願従它道矣宫不従復路而歸賊亦不敢近之進軍咸門成都北面東頭門與呉漢並滅公孫述帝以蜀新定拜宫為廣漢太守十三年增邑更封鄼侯十五年徵還京師以列侯奉朝請定封朗陵侯朗陵縣名屬汝南郡故城在今豫州郎山縣西南十八年拜太中大夫十九年妖巫維氾弟子單臣傅鎮等復妖言相聚入原武城維或作緱劫吏人自稱將軍於是遣宫將北軍及黎陽營數千人圍之賊穀食多數攻不下士卒死傷帝召公卿諸侯王問方略皆曰宜重其購賞時顯宗為東海王獨對曰妖巫相劫埶無久立其中必有悔欲亡者但外圍急不得走耳宜小挺緩挺解也令得逃亡逃亡則一亭長足以禽矣帝然之即勑宫徹圍緩賊賊衆分散遂斬臣鎮等宫還遷城門校尉復轉左中郎將擊武谿賊至江陵降之武谿水名在今辰州盧谿縣宫以謹信質樸故常見任用後匈奴饑疫自相分争帝以問宫宫曰願得五千騎以立功帝笑曰常勝之家難與慮敵吾方自思之二十七年宫乃與楊虚侯馬武上書曰匈奴貪利無有禮信窮則稽首安則侵盗縁邉被其毒痛内國憂其抵突抵觸也虜今人畜疫死旱蝗赤地赤地言在地之物皆盡説苑曰晉平公時赤地千里疫困之力不當中國一郡萬里死命縣在陛下福不再來時或易失左傳曰大福不再蒯通曰時者難遇而易失也豈宜固守文徳而墮武事乎今命將臨塞厚縣購賞喻告髙句驪烏桓鮮卑攻其左發河西四郡謂張掖酒泉武威金城也天水隴西羌胡擊其右如此北虜之滅不過數年臣恐陛下仁恩不忍謀臣狐疑令萬世刻石之功不立於聖世詔報曰黄石公記曰柔能制剛弱能制彊即張良於下邳圯所見老父出一編書者柔者徳也剛者賊也弱者仁之助也彊者怨之歸也故曰有德之君以所樂樂人無徳之君以所樂樂身樂人者其樂長樂身者不久而亡舎近謀逺者勞而無功舎逺謀近者逸而有終逸政多忠臣勞政多亂人故曰務廣地者荒務廣徳者彊有其有者安貪人有者殘殘滅之政雖成必敗今國無善政災變不息左傳曰國無善政則自取謫於日月之災百姓驚惶人不自保而復欲逺事邉外乎孔子曰吾恐季孫之憂不在顓臾且北狄尚彊而屯田警備傳聞之事恒多失實公羊傳曰見者異辭聞者異辭傳聞者異辭誠能舉天下之半以滅大㓂豈非至願茍非其時不如息人自是諸將莫敢復言兵事者宫永平元年卒謚曰愍侯子信嗣信卒子震嗣震卒子松嗣元初四年與母别居國除永寜元年鄧太后紹封松弟由為朗陵侯論曰中興之業誠艱難也然敵無秦項之彊人資附漢之思雖懐璽紆紱跨陵州縣璽解見光武紀白虎通曰天子朱紱諸侯赤紱上廣一尺下廣二尺法天一地二也長三尺法天地人也董巴輿服志曰古者上下皆有紱所以殊貴賤也自五霸遞興以紱非兵服於是去紱也殊名詭號千隊為羣尚未足以為比功上烈也至於山西既定威臨天下謂誅隗囂公孫述戎羯喪其精膽羣帥賈其餘壯羯本匃奴别部分散居其上黨武鄉羯室因號羯胡此揔謂戎夷耳不指於羯也左傳曰欲勇者賈余餘勇斯誠雄心尚武之㡬先志翫兵之日㡬㑹也翫習也先志者乗勝之志也臧宫馬武之徒撫鳴劒而抵掌志馳於伊吾之北矣屈原曰撫長劒而玉珥曹植結交篇曰利劒鳴手中説文曰抵側擊也光武審黄石存包桑周易否卦九五曰其亡其亡繫于包桑言聖人居天位不可以安常自危懼乃是繫於包桑也包本也繫於桑本言其固也閉玉門以謝西域之質卑詞幣以禮匈奴之使西域傳曰建武二十一年西域十八國俱遣子弟入侍天子以中國初定皆還其侍子匈奴傳曰建武二十八年匈奴遣使詣闕貢馬及裘乞和親帝報曰單于國内虚耗貢物裁以通禮何必裘馬今贈繒五百匹斬馬劒一是卑辭幣禮也其意防盖已𢎞深豈其顛沛平城之圍忍傷黥土之陳乎平城縣名今雲州定襄縣髙祖七年擊韓王信至平城被匈奴圍七日乃解十二年髙祖親擊淮南王鯨布在陳為流矢所中顛沛狼狽也顛音丁千反贊曰呉公鷙彊寔為龍驤戰國策曰亷頗為人勇鷙而愛士白起視瞻不轉者執志彊也驤舉也若龍之舉言其威盛鄒陽曰神龍驤首奮翼則浮雲出流電埽羣孽風行巴梁虎牙猛力功立雎陽宫俊休休是亦鷹揚詩曰良士休休又曰惟師尚父時惟鷹揚後漢書卷四十八後漢書卷四十八考證呉漢傳故不自疑躬臣承蒼按文勢當作故躬不自疑食廣平斥漳曲周廣年凡四縣注斥漳在今洺州洺水縣臣松齡按唐書地理志無洺水縣唐初洺州有清漳池水二縣此注洺水當作池水臧宫傳憂其抵突注解也解字似當作觸後漢書卷四十八考證
