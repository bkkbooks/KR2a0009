body:
  text: 後漢書卷一百一宋宣城太守范煜撰唐章懷太子賢注皇甫嵩朱儁列傳第六十一皇甫嵩皇甫嵩字義眞安定朝那人度遼將軍規之兄子也父節鴈門太守嵩少有文武志介好詩書習弓馬初舉孝廉茂才續漢書曰舉孝廉爲郎中遷霸陵臨汾令以父喪遂去官太尉陳蕃大將軍竇武連辟並不到靈帝公車徵為議郎遷北地太守初鉅鹿張角自稱大賢良師良或作郎奉事黄老道畜養弟子跪拜首過首音式受反符水呪説以療病病者頗愈百姓信向之角因遣弟子八人使於四方以善道教化天下轉相誑惑十餘年閒衆徒數十萬連結郡國自青徐幽冀荆揚兗豫八州之人莫不畢應遂置三十六方方猶將軍號也大方萬餘人小方六七千各立渠帥訛言蒼天已死黄天當立歳在甲子天下大吉以白土書京城寺門及州郡官府皆作甲子字中平元年大方馬元義等先收荆揚數萬人期㑹發於鄴元義數徃来京師以中常侍封諝徐奉等為内應約以三月五日内外俱起未及作亂而張角弟子濟南唐周上書告之於是車裂元義於洛陽靈帝以周章下三公司隸使鉤盾令周斌將三府掾屬案驗宫省直衛及百姓有事角道者誅殺千餘人推考冀州逐捕角等角等知事已露晨夜馳勑諸方一時俱起皆著黄巾為摽幟幟音尺志反又音試時人謂之黄巾亦名為蛾賊蛾音魚綺反即蟻字也諭賊衆多故以為名殺人以祠天角稱天公將軍角弟寳稱地公將軍寳弟梁稱人公將軍所在燔燒官府劫畧聚邑州郡失據長吏多逃亡旬日之間天下嚮應京師震動詔勑州郡脩理攻守簡練器械自函谷大谷廣成伊闕轘轅旋門孟津小平津諸關並置都尉大谷轘轅在洛陽東南旋門在汜水之西召羣臣㑹議嵩以為宜解黨禁益出中藏錢西園廐馬以班軍士帝從之於是發天下精兵博選將帥以嵩為左中郎將持節與右中郎將朱儁共發五校三河騎士及募精勇合四萬餘人嵩儁各統一軍共討潁川黄巾儁前與賊波才戰戰敗嵩因進保長社波才引大衆圍城嵩兵少軍中皆恐乃召軍吏謂曰兵有竒變不在衆寡孫子兵法曰凡戰者以正合以竒勝者也故善出竒無窮如天地無竭如江海戰勢不過竒正竒正之變不可勝也今賊依草結營易為風火若因夜縱燒必大驚亂吾出兵擊之四面俱合田單之功可成也田單為齊將守卽墨城燕師攻城田單取牛千頭衣以五采束矛盾於其角繫火於其尾穿城而出城上大譟燕師大敗事見史記其夕遂大風嵩乃約勑軍士皆束苣乘城苣音巨説文云束葦燒之使鋭士閒出圍外縱火大呼城上舉燎應之嵩因鼓而奔其陳賊驚亂奔走㑹帝遣騎都尉曹操將兵適至嵩操與朱儁合兵更戰大破之斬首數萬級封嵩都鄉侯嵩儁乘勝進討汝南陳國黄巾追波才於陽翟撃彭脱於西華並破之西華縣屬汝南餘賊降𣪚三郡悉平又進撃東郡黄巾卜已於倉亭生禽卜已斬首七千餘級時北中郎將盧植及東中郎將董卓討張角並無功而還乃詔嵩進兵討之嵩與角弟梁戰於廣宗今貝州宗城縣梁衆精勇嵩不能尅明日乃閉營休士以觀其變知賊意稍懈乃潛夜勒兵雞鳴馳赴其陳戰至晡時大破之斬梁獲首三萬級赴河死者五萬許人焚燒車重三萬餘兩悉虜其婦子擊獲甚衆角先以病死乃剖棺戮屍傳首京師嵩復與鉅鹿太守馮翊郭典攻角弟寳於下曲陽又斬之首獲十餘萬人築京觀於城南杜元􅀈注左傳曰積尸封土於其上謂之京觀即拜嵩為左車騎將軍領冀州牧封槐里侯食槐里羙陽兩縣並屬扶風合八千戸以黄巾旣平故改年為中平嵩奏請冀州一年田租以贍饑民帝從之百姓歌曰天下大亂兮市為墟母不保子兮妻失夫賴得皇甫兮復安居嵩温䘏士卒甚得衆情每軍行頓止須營幔脩立然後就舎帳軍士皆食己乃嘗飯吏有因事受賂者嵩更以錢物賜之吏懐慙或至自殺嵩旣破黄巾威震天下而朝政日亂海内虚困故信都令漢陽閻忠干説嵩曰干謂冒進難得而易失者時也時至不旋踵者㡬也故聖人順時以動智者因幾以發今將軍遭難得之運蹈易駭之機而踐運不撫臨機不發將何以保大名乎嵩曰何謂也忠曰天道無親百姓與能今將軍受鉞於暮春收功於末冬老子曰天道無親常與善人易曰人謀鬼謀百姓與能淮南子曰凢命將王親授鉞曰從此上至天將軍制之兵動若神謀不再計摧强易於折枯消堅甚於湯雪旬月之間神兵電埽封尸刻石南向以報威徳震本朝風聲馳海外雖湯武之舉未有髙將軍者也今身建不賞之功體兼髙人之徳而北面庸主何以求安乎嵩曰夙夜在公心不忘忠何故不安忠曰不然昔韓信不忍一餐之遇而棄三分之業利劒已揣其喉方發悔毒之歎者機失而謀乖也前書項羽使武渉説韓信信曰漢王觧衣衣我推食食我背之不祥又蒯通説信令信背漢參分天下鼎足而立信曰漢王遇我厚豈可背之㦲後信謀反為吕后所執歎曰吾不用蒯通計為女子所詐豈非天哉今主上埶弱於劉項將軍權重於淮隂指撝足以振風雲叱咤可以興雷電撝即麾字古通用叱咤怒聲也赫然奮發因危抵頺抵音紙擊也崇恩以綏先附振武以臨後服徵冀方之士動七州之衆羽檄先馳於前大軍響振於後蹈流漳河飲馬孟津誅閹宦之罪除羣凶之積雖僮兒可使奮拳以致力女子可使褰裳以用命况厲熊羆之卒因迅風之埶哉功業已就天下已順然後請呼上帝示以天命混齊六合南面稱制移寳器於將興寳器猶神噐也謂天位也推亡漢於已墜實神機之至㑹風發之良時也夫旣朽不雕衰世難佐若欲輔難佐之朝雕朽敗之木是猶逆坂走丸迎風縱棹豈云易哉且今豎宦羣居同惡如市左氏傳韓宣子曰同惡相求如市賈焉上命不行權歸近習昏主之下難以久居史記范蠡曰大名之下難以久居不賞之功䜛人側目如不早圖後悔無及嵩懼曰非常之謀不施於有常之埶創圖大功豈庸才所致黄巾細孽敵非秦項新結易散難以濟業且人未忘主天不祐逆若虚造不冀之功以速朝夕之禍孰與委忠本朝守其臣節雖云多䜛不過放廢猶有令名死且不朽二句皆左傳之辭反常之論所不敢聞忠知計不用因亡去英雄記曰梁州賊王國等起兵劫忠為主統三十六郡號車騎將軍忠感慨發病死㑹邉章韓遂作亂隴右明年春詔嵩迴鎭長安以衛園陵章等遂復入寇三輔使嵩因討之初嵩討張角路由鄴見中常侍趙忠舎宅踰制乃奏沒入之又中常侍張讓私求錢五千萬嵩不與二人由此為憾奏嵩連戰無功所費者多其秋徵還收左車騎將軍印綬削戸六千更封都鄉侯二千戸五年梁州賊王國圍陳倉復拜嵩為左將軍督前將軍董卓各率二萬人拒之卓欲速進赴陳倉嵩不聴卓曰智者不後時勇者不留决速救則城全不救則城滅全滅之埶在於此也嵩曰不然百戰百勝不如不戰而屈人之兵是以先為不可勝以待敵之可勝不可勝在我可勝在彼彼守不足我攻有餘孫子之文有餘者動於九天之上不足者䧟於九地之下孫子兵法曰善守者藏於九地之下善攻者動於九天之上𤣥女三宫戰法曰行兵之道天地之寳九天九地各有表裏九天之上六甲子也九地之下六癸酉也子能順之萬全可保今陳倉雖小城守固備非九地之䧟也王國雖强而攻我之所不救非九天之埶也夫埶非九天攻者受害䧟非九地守者不拔國今已䧟受害之地而陳倉保不拔之城我可不煩兵動衆而取全勝之功將何救焉遂不聴王國圍陳倉自冬迄春八十餘日城堅守固竟不能拔賊衆疲敝果自解去嵩進兵擊之卓曰不可兵法窮寇勿追歸衆勿迫司馬兵法之言今我追國是廹歸衆追窮寇也困獸猶鬭蜂蠆有毒皆左氏傳文况大衆乎嵩曰不然前吾不擊避其鋭也今而擊之待其衰也所擊疲師非歸衆也國衆且走莫有鬭志以整擊亂非窮寇也遂獨進擊之使卓為後拒連戰大破之斬首萬餘級國走而死卓大慙恨由是忌嵩明年卓拜為并州牧詔使以兵委嵩卓不從嵩從子酈酈音歴時在軍中説嵩曰本朝失政天下倒懸能安危定傾者唯大人與董卓耳今怨隙已結埶不俱存卓被詔委兵而上書自請此逆命也又以京師昬亂躊躇不進此懷姦也且其凶戾無親將士不附大人今為元帥杖國威以討之上顯忠義下除凶害此桓文之事也嵩曰專命雖罪専誅亦有責也春秋左氏傳曰稟命則不威專命則不孝不如顯奏其事使朝廷裁之於是上書以聞帝讓卓卓又増怨於嵩及後秉政初平元年乃徵嵩為城門校尉因欲殺之嵩將行長史梁行説曰漢室微弱閹豎亂朝董卓雖誅之而不能盡忠於國遂復寇掠京邑廢立從意今徵將軍大則危禍小則困辱今卓在洛陽天子来西以將軍之衆精兵三萬迎接至尊奉令討逆發命海内徵兵羣帥袁氏逼其東將軍迫其西此成禽也嵩不從遂就徵有司承㫖奏嵩下吏將遂誅之嵩子堅夀與卓素善自長安亡走洛陽歸投於卓卓方置酒歡㑹堅夀直前質讓責以大義質正也叩頭流涕坐者感動皆離席請之卓乃起牽與共坐使免嵩囚復拜嵩議郎遷御史中丞及卓還長安公卿百官迎謁道次卓風令御史中丞以下皆拜以屈嵩風音諷謂諷動也旣而抵手言曰義眞犕未乎犕音服説文曰犕牛乘馬犕古服字今河朔人猶有此言音備嵩笑而謝之卓乃解釋獻帝春秋曰初卓為前將軍嵩為左將軍俱征邉章韓遂爭雄及嵩拜車下卓曰可以服未嵩曰安知明公乃至於是卓曰鴻鵠固有逺志但燕雀自不知耳嵩曰昔與明公俱為鴻鵠但明公今日變為鳯凰耳及卓被誅以嵩為征西將軍又遷車騎將軍其年秋拜太尉冬以流星策免續漢書曰以日有重珥免復拜光祿大夫遷太常尋李傕作亂嵩以病卒贈驃騎將軍印綬拜家一人為郎嵩為人愛愼盡勤劉攽曰案文愛非所以配愼當是畏字勤又當在盡字上前後上表陳諫有補益者五百餘事皆手書毁草不宣于外又折節下士門無留客言汲引之速時人皆稱而附之堅夀亦顯名後為侍中辭不拜病卒朱儁朱儁字公偉㑹稽上虞人也少孤母常販繒為業儁以孝養致名為縣門下書佐好義輕財鄉閭敬之時同郡周規辟公府當行假郡庫錢百萬以為冠幘費而後倉卒督責規家貧無以備儁乃竊母繒帛為規解對規被錄占對儁為備錢以解其事母旣失産業深恚責之儁曰小損當大益初貧後富必然理也本縣長山陽度尚見而竒之薦於太守韋毅稍歴郡職後太守尹端以儁為主簿熹平二年端坐討賊許昭失利為州所奏罪應棄市儁乃羸服間行輕齎數百金到京師賂主章吏遂得刋定州奏故端得輸作左校端喜於降免而不知其由儁亦終無所言後太守徐珪舉儁孝廉再遷除蘭陵令政有異能為東海相所表㑹交阯部羣賊並起牧守輭弱不能禁又交阯賊梁龍等萬餘人與南海太守孔芝反叛攻破郡縣光和元年即拜儁交阯刺史令過本郡簡募家兵及所調家兵童僕之屬調謂調發之合五千人分從兩道而入既到州界按甲不前先遣使詣郡觀賊虚實宣揚威徳以震動其心旣而與七郡兵俱進逼之遂斬梁龍降者數萬人旬月盡定以功封都亭侯千五百戸賜黄金五十斤徵為諫議大夫及黄巾起公卿多薦儁有才畧拜為右中郎將持節與左中郎將皇甫嵩討潁川汝南陳國諸賊悉破平之嵩乃上言其狀而以功歸儁於是進封西鄉侯遷鎭賊中郎將時南陽黄巾張曼成起兵稱神上使衆數萬殺郡守禇裒屯宛下百餘日後太守秦頡擊殺曼成賊更以趙𢎞為帥衆浸盛遂十餘萬據宛城儁與荆州刺史徐璆及秦頡合兵萬八千人圍𢎞自六月至八月不抜有司奏欲徵儁司空張溫上疏曰昔秦用白起燕任樂毅皆曠年歴載乃能克敵史記曰白起郿人也善用兵事秦昭王為大良造攻魏拔之後五年攻趙拔光狼城後七年攻楚拔鄢鄧五城明年抜郢燒夷陵遂東至竟陵樂毅趙人也賢而好兵燕昭王以為亞卿後為上將軍伐齊入臨淄狥齊五歳下齊七十餘城儁討潁川已有功效引師南指方畧已設臨軍易將兵家所忌宜假日月責其成功靈帝乃止儁因急擊𢎞斬之賊餘帥韓忠復據宛拒儁儁兵少不敵乃張圍結壘起土山以臨城内因鳴鼓攻其西南賊悉衆赴之儁自將精卒五千掩其東北乘城而入忠乃退保小城惶懼乞降司馬張超及徐璆秦頡皆欲聴之儁曰兵有形同而埶異者昔秦項之際民無定主故賞附以勸来耳今海内一統唯黄巾造寇納降無以勸善討之足以懲惡今若受之更開逆意賊利則進戰鈍則乞降縱敵長宼非良計也因急攻連戰不尅儁登土山望之顧謂張超曰吾知之矣賊今外圍周固内營逼急乞降不受欲出不得所以死戰也萬人一心猶不可當况十萬乎其害其矣不如徹圍并兵入城忠見圍解埶必自出自出則意𣪚易破之道也旣而觧圍忠果出戰儁因擊大破之乘勝逐北數十里斬首萬餘級忠等遂降而秦頡積忿忠遂殺之餘衆懼不自安復以孫夏為帥還屯宛中儁急攻之夏走追至西鄂精山又破之西鄂故城在今鄧州向城縣南精山在其南復斬萬餘級賊遂解散明年春遣使者持節拜儁右車騎將軍振旅還京師以為光祿大夫増邑五千更封錢塘侯錢塘今杭州縣也錢塘記云昔郡議曹華信義立此塘以防海水始開募有能致土石一斛與錢一千旬日之間来者雲集塘未成而譎不復取皆遂棄土石而去塘以之成也劉攽曰注華信義立此塘案文義當作議加位特進以母䘮去官起家復為將作大匠轉少府太僕自黄巾賊後復有黑山黄龍白波左校郭大賢于氐根青牛角張白騎劉石左髭丈八平漢大計司隸掾哉九州春秋大計作大洪掾哉作緣成雷公浮雲飛燕白雀楊鳳于毒五鹿李大目白繞畦固唒之徒九州春秋唒作蝤音才由反並起山谷間不可勝數其大聲者稱雷公騎白馬者為張白騎輕便者言飛燕多髭者號于氐根左氏傳曰于思于思棄甲復来杜預注云于思多鬚之貎也大眼者為大目如此稱號各有所因大者二三萬小者六七千賊帥常山人張燕輕勇趫㨗故軍中號曰飛燕善得士卒心乃與中山常山趙郡上黨河内諸山谷寇賊更相交通衆至百萬號曰黒山賊河北諸郡縣並被其害朝廷不能討燕乃遣使至京師奏書乞降遂拜燕平難中郎將使領河北諸山谷事歳得舉孝廉計吏燕後漸寇河内逼近京師於是出儁為河内太守將家兵擊却之其後諸賊多為袁紹所定事在紹傳復拜儁為光祿大夫轉屯騎尋拜城門校尉河南尹時董卓擅政以儁宿將外甚親納而心實忌之及闗東兵盛卓懼數請公卿㑹議徙都長安儁輙止之卓雖惡儁異已然貪其名重乃表遷太僕以為已副使者拜儁辭不肯受因曰國家西遷必孤天下之望以成山東之釁臣不見其可也使者詰曰召君受拜而君拒之不問徙事而君陳之其故何也儁曰副相國非臣所堪也遷都計非事所急也辭所不堪言所非急臣之宜也使者曰遷都之事不聞其計就有未露何所承受儁曰相國董卓具為臣説所以知耳使人不能屈由是止不為副卓後入闗留儁守洛陽而儁與山東諸將通謀為内應旣而懼為卓所襲乃棄官奔荆州卓以𢎞農楊懿為河南尹守洛陽儁聞復進兵還洛懿走儁以河南殘破無所資乃東屯中牟移書州郡請師討卓徐州刺史陶謙遣精兵三千餘州郡稍有所給謙乃上儁行車騎將軍董卓聞之使其將李傕郭汜等數萬人屯河南拒儁儁逆擊為傕氾所破儁自知不敵留闗下不敢復前及董卓被誅傕汜作亂儁時猶在中牟陶謙以儁名臣數有戰功可委以大事乃與諸豪傑共推儁為太師因移檄牧伯同討李傕等奉迎天子乃奏記於儁曰徐州刺史陶謙前揚州刺史周乾瑯邪相隂徳東海相劉馗馗音巨眉反彭城相汲廉北海相孔融沛相袁忠太山太守應劭汝南太守徐璆前九江太守服䖍博士鄭𤣥等敢言之行車騎將軍河南尹莫府蔡質典職儀曰諸州刺史上郡并列卿府言敢言之劉攽曰案刺史在郡上何緣有上郡之文蓋本言刺史并郡上列卿府云云國家旣遭董卓重以李傕郭汜之禍幼主劫執忠良殘敝長安隔絶不知吉凶是以臨官尹人縉紳有識莫不憂懼以為自非明哲雄霸之士曷能剋濟禍亂自起兵已来于兹三年州郡轉相顧望未有奮擊之功而互爭私變更相疑惑謙等並共諮諏議消國難僉曰將軍君侯旣文且武應運而出凡百君子靡不顒顒故相率厲簡選精悍堪能深入直指咸陽多持資糧足支半歳謹同心腹委之元帥李傕用太尉周忠尚書賈詡策徵儁入朝軍吏皆憚入闗欲應陶謙等儁曰以君召臣義不俟駕論語曰君命召不俟駕行矣俟待也况天子詔乎且傕汜小豎樊稠庸兒無他逺畧又埶力相敵變難必作吾乘其間大事可濟遂辭謙議而就傕徵復為太僕謙等遂罷初平四年代周忠為太尉錄尚書事明年秋以日食免復行驃騎將軍事持節鎮闗東未發㑹李傕殺樊稠而郭汜又自疑與傕相攻長安中亂故儁止不出留拜大司農獻帝詔儁與太尉楊彪等十餘人譬郭汜令與李傕和汜不肯遂留質儁等儁素剛即日發病卒子皓亦有才行官至豫章太守論曰皇甫嵩朱儁並以上將之畧受脤倉卒之時春秋左氏傳曰國之大事在祀與戎祀有執膰戎有受脤脤宜社之肉也爾雅曰舉大事動大衆必先有事於社然後出謂之宜及其功成師尅威聲滿天下值弱主蒙塵獷賊放命斯誠葉公投袂之㡬翟義鞠旅之日新序曰楚白公勝旣殺令尹司馬欲立王子閭為王王子閭不肯劫之以刄王子閭曰吾聞辭天下者非輕其利以眀其徳也不為諸侯者非惡其位以潔其行也今子告我以利威我以兵吾不為也白公强之不可遂殺之葉公子髙率楚衆以誅白公而反恵王於國投𬒮奮𬒮也言其怒也左氏傳曰楚子聞之投袂而起翟義方進之子舉兵將誅王莽事見前書詩曰陳師鞠旅鄭𤣥注云鞠告也故梁衍獻規山東連盟而舎格天之大業蹈匹夫之小諒卒狼狽虎口為智士笑山東連盟謂上云羣師及袁氏也書稱伊尹格于皇天論語曰豈若匹夫匹婦之為諒也荘子曰孔子見盜跖退曰吾㡬不免虎口豈天之長斯亂也何智勇之不終甚乎前史著平原華嶠稱其父光祿大夫表華嶠譜序曰表字偉容歆之子也年二十餘為散騎常侍每言其祖魏太尉歆魏志曰歆字子魚稱時人説皇甫嵩之不伐汝豫之戰歸功朱儁張角之㨗本之於盧植収名歛䇿而已不有焉歛䇿不論其功盖功名者世之所甚重也誠能不爭天下之所甚重則怨禍不深矣如皇甫公之赴履危亂而能終以歸全者其致不亦貴乎故顔子願不伐善為先斯亦行身之要與贊曰黄妖衝發嵩乃奮鉞孰是振旅不居不伐老子曰功成而不居儁㨗陳潁亦弭於越謂平許昭也於語辭猶云句吴之類矣言肅王命並遘屯蹷蹷猶躓也後漢書卷一百一後漢書卷一百一考證朱儁傳更封錢塘侯注錢塘記云昔郡議曹華信義立此塘何焯曰錢唐自秦有此名以唐為塘乃俗字耳注家誤信水經注故引此史臣贊亦弭於越注謂平許昭也何焯曰斬梁龍非平許昭注誤平許昭乃臧旻事在其子洪傳後漢書卷一百一考證
