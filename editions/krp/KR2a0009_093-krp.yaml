body:
  text: 後漢書卷九十三宋宣城太守范煜撰唐章懐太子賢注李杜列傳第五十三李固傳子爕李固字子堅漢中南鄭人司徒郃之子也郃在數術傳固貌狀有竒表鼎角匿犀足履龜文鼎角者頂有骨如鼎足也匿犀伏犀也謂骨當額上入髮際隐起也足履龜文者二千石見相書少好學常歩行尋師不逺千里謝承書曰固改易姓名杖䇿驅驢負笈追師三輔學五經積十餘年博覽古今明於風角星算河圖讖緯仰察俯占窮神知變每到太學密入公府定省父母不令同業諸生知是郃子遂究覽墳籍結交英賢四方有志之士多慕其風而來學京師咸歎曰是復為李公矣言復繼其父為公也司𨽻益州並命郡舉孝廉辟司空掾皆不就謝承書曰五察孝亷益州再舉茂才不應五府連辟皆辭以疾陽嘉二年有地動山崩火災之異公卿舉固對䇿續漢書曰陽嘉二年詔公卿舉敦樸之士衞尉賈建舉固也詔又特問當世之敝為政所宜固對曰臣聞王者父天母地春秋感精符曰人主日月同明四時合信故父天母地兄日姊月宋均注曰父天於圜丘之祀也母地於方澤之祭也兄日於東郊姊月於西郊寳有山川史記曰魏武侯浮西河而下中河顧而謂吳起曰羙哉乎河山之固此魏之寳也吳起對曰在徳不在險王道得則隂陽和穆政化乖則崩震為災斯皆關之天心效於成事者也夫化以職成官由能理古之進者有徳有命命爵命也言有徳者乃可加爵命也今之進者唯財與力伏聞詔書務求寛博疾惡嚴暴而今長吏多殺伐致聲名者必加遷賞其存寛和無黨援者輙見斥逐是以淳厚之風不宣彫薄之俗未革雖繁刑重禁何能有益前孝安皇帝變亂舊典封爵阿母阿母王聖因造妖孽使樊豐之徒乘權放恣侵奪主威改亂嫡嗣謂順帝為太子時廢為濟隂王至令聖躬狼狽親遇其艱既拔自困殆殆危也龍興即位天下喁喁屬望風政積敝之後易致中興誠當沛然思惟善道沛然寛廣之意而論者猶云方今之事復同於前臣伏從山草痛心傷臆實以漢興以來三百餘年賢聖相繼十有八主豈無阿乳之恩豈忘爵賞之寵然上畏天威俯按經典知義不可故不封也今宋阿母謂宋娥也雖有大功勤謹之徳但加賞賜足以酬其勞苦至於裂土開國實乖舊典聞阿母體性謙虚必有遜讓陛下宜許其辭國之髙使成萬安之福夫妃后之家所以少完全者豈天性當然但以爵禄尊顯專總權柄天道惡盈不知自損故至顚仆先帝寵遇閻氏位號太疾故其受禍曾不旋時老子曰其進銳其退速也案孟子有此文謝承書亦云孟子而續漢書復云老子今梁氏戚為椒房禮所不臣公羊傳曰宋殺其大夫何以不名宋三世無大夫三世内娶也何休注云内娶娶大夫女也言無大夫者三世禮不臣妻之父母國内皆臣無娶道故絶去大夫名正其義也椒房者皇后所居以椒泥塗也尊以髙爵尚可然也而子弟羣從榮顯兼加永平建初故事殆不如此宜令歩兵校尉冀及諸侍中還居黄門之官使權去外戚政歸國家豈不休乎又詔書所以禁侍中尚書中臣子弟不得為吏察孝亷者以其秉威權容請託故也而中常侍在日月之側聲埶振天下子弟禄仕曾無限極雖外託謙黙不干州郡而謟偽之徒望風進舉今可為設常禁同之中臣昔舘陶公主為子求郎舘陶公主光武第三女也明帝不許賜錢千萬所以輕厚賜重薄位者為官人失才害及百姓也竊聞長水司馬武宣續漢志長水校尉一人比二千石司馬一人千石掌宿衞也開陽城門候羊廸等續漢志曰城門每門候一人六百石無他功徳初拜便眞此雖小失而漸壊舊章續漢書曰中都官千石六百石故事先守一嵗然後補眞先聖法度所宜堅守政教一跌百年不復詩云上帝板板下民卒癉刺周王變祖法度故使下民將盡病也板反也卒盡也癉病也詩大雅凡伯刺周厲王反先王之道下人盡病也今陛下之有尚書猶天之有北斗也斗為天喉舌尚書亦為陛下喉舌春秋合誠圗曰天理在斗中司三公也如人喉在咽以理舌語宋均注曰斗為天之舌口主出政敎三公主導宣君命喻於人則宜如人喉在咽以理舌口使言有條理斗斟酌元氣運平四時春秋保乾圖曰天皇於是斟元氣陳樞以五易威宋均注曰威則也法也天皇斟元氣陳列樞機受行次之當得也尚書出納王命賦政四海賦布也權尊埶重責之所歸若不平心災𤯝必至誠宜審擇其人以毗聖政今與陛下共理天下者外則公卿尚書内則常侍黄門譬猶一門之内一家之事安則共其福慶危則通其禍敗刺史二千石外統職事内受法則夫表曲者景必邪源清者流必絜猶叩樹本百枝皆動也周頌曰薄言振之莫不震疊韓詩薛君傳曰薄辭也振奮也莫無也震動也疊應也羙成王能奮舒文武之道而行之則天下無不動而應其政教此言動之於内而應於外者也由此言之本朝號令豈可蹉跌間隙一開則邪人動心利競暫啓則仁義道塞刑罰不能復禁化導以之寖壊此天下之紀綱當今之急務陛下宜開石室陳圖書前書曰司馬遷為太史令紬史記石室金匱之書紬音抽招會羣儒引問得失指擿變象以求天意其言有中理即時施行顯拔其人以表能者則聖聽日有所聞忠臣盡其所知又宜罷退宦官去其權重裁置常侍二人方直有徳者省事左右小黄門五人才智閑雅者給事殿中如此則論者厭塞升平可致也臣所以敢陳愚瞽冒昧自聞者儻或皇天欲令微臣覺悟陛下陛下宜熟察臣言憐赦臣死順帝覽其對多所納用即時出阿母還舍諸常侍悉叩頭謝罪朝廷肅然以固為議郎而阿母宦者疾固言直因詐飛章以䧟其罪事從中下大司農黄向等請之於大將軍梁商又僕射黄瓊救明固事久乃得拜議郎劉攽曰案固前已云為議郎此又云得拜議郎史之叙事理無若此蓋當云乆乃得已復拜議郎少已復二字也出為廣漢雒令至白水關解印綬還漢中梁州記曰關城西南百八十里有白水關昔李固解印綬處也故關城今在梁州金牛縣西杜門不交人事嵗中梁商請為從事中郎商以后父輔政而柔和自守不能有所整裁災異數見下權日重固欲令商先正風化退辭髙滿乃奏記曰春秋褒儀父以開義路隠公元年三月公及邾儀父盟于昧公羊傳曰儀父者何邾婁之君也何以稱字褒之也曷為褒之為其與盟也何休注云春秋王魯託隠公為受命王因儀父先與隠公盟假以見褒賞義劉攽曰注為其與盟也案文少一公字貶無駭以閉利門春秋隠公二年經書無駭帥師入極公羊傳曰無駭者何展無駭也何以不氏貶之也曷貶疾始滅也夫義路閉則利門開利門開則義路閉也前孝安皇帝内任伯榮樊豐之屬伯榮王聖女也外委周廣謝惲之徒開門受賂署用非次天下紛然怨聲滿道朝廷初立頗存清靜未能數年稍復墮損左右黨進者日有遷拜守死善道者滯涸窮路守死善道論語文滯涸窮路以魚為喻也而未有改敝立徳之方又即位以來十有餘年聖嗣未立羣下繼望劉攽曰案繼是繼續之義不可施於此蓋本是繋字繋綴天下之望也可令中宫博簡嬪媵兼採微賤宜子之人進御至尊順助天意若有皇子母自乳養無委保妾醫巫以致飛燕之禍趙飛燕成帝皇后妹為昭儀專寵成帝貴人曹偉能等生皇子皆殺之明將軍望尊位顯當以天下為憂崇尚謙省垂則萬方而新營祠堂費功億計非以昭明令徳崇示清儉自數年以來災怪屢見比無雨潤而沈隂欎泱雲起貌宫省之内容有隂謀孔子曰智者見變思刑愚者覩怪諱名天道無親可為祗畏祗敬也言天無親疎惟善是與可敬畏也書曰皇天無親如近者月食既於端門之側既盡也端門太微宫南門也月者大臣之體也前書李尋上疏曰月者衆隂之長妃后大臣諸侯之象也夫窮髙則危大滿則溢月盈則缺日中則移易豐卦曰日中則昃月盈則食天地盈虚與時消息史記蔡澤謂范雎曰日中則移月滿則虧也凡此四者自然之數也天地之心福謙忌盛易曰鬼神害盈而福謙人道惡盈而好謙又曰見天地之心是以賢達功遂身退老子曰功成名遂身退天之道也全名養壽無有怵廹之憂為利所誘怵廹於憂勤也怵音息律反或音黜誠令王綱一整道行忠立明公踵伯成之髙全不朽之譽莊子曰伯成子髙唐虞時為諸侯至禹去而耕禹徃見之則耕在野禹問曰昔堯化天下吾子立為諸侯堯授舜舜授予子去而耕其故何也子髙曰昔堯化天下至公無私不賞而人自勸不罰而人自畏今子賞而不勸罰而不威徳自此衰而刑自此作夫子盍行無留吾事俋俋然耕不顧亦見呂氏春秋豈與此外戚凡軰耽榮好位者同日而論哉固狂夫下愚不達大體竊感古人一飯之報謂靈輙也況受顧遇而容不盡乎商不能用永和中荆州盗賊起彌年不定乃以固為荆州刺史固到遣吏勞問境内赦寇盗前釁與之更始於是賊帥夏密等斂其魁黨六百餘人自縛歸首固皆原之遣還使自相招集開示威法半嵗間餘類悉降州内清平上奏南陽太守髙賜等臧穢賜等懼罪遂共重賂大將軍梁冀冀為千里移檄言移一日行千里救之急也而固持之愈急冀遂令徙固為太山太守時太山盗賊屯聚歴年郡兵常千人追討不能制固到悉罷遣歸農但選留任戰者百餘人以恩信招誘之未滿嵗賊皆弭散遷將作大匠上疏陳事曰臣聞氣之清者為神人之清者為賢養身者以練神為寳安國者以積賢為道昔秦欲謀楚王孫圉設壇西門陳列名臣秦使戄然遂為寢兵秦欲伐楚使使者徃觀楚之寳器昭奚恤乃為壇使客東面自居西面之壇稱曰理百姓實倉廩子西在此奉珪璋使諸侯子方在此守封彊謹境界葉公子髙在此理師旅正兵戎司馬子反在此懐霸王之餘義獵治亂之遺風昭奚恤在此惟大國所觀使反言於秦君曰楚多賢臣未可謀也事見新序國語曰楚王孫圉聘於晉趙簡子鳴玉以相問圉曰楚之白珩猶在乎其為寳也幾何對曰未嘗為寳也楚人有觀射父能作訓辭以行諸侯有左史倚相道訓典以序百物此楚國之寳也若夫古玉白珩先王之所玩也何寳焉與此所引不同也魏文侯師卜子夏友田子方軾叚干木故羣俊競至名過齊桓秦人不敢闚兵於西河斯蓋積賢人之符也魏文侯受經於子夏過叚干木閭未嘗不軾也李克曰文侯東得卜子夏田子方叚干木此三人者君皆師之又秦欲伐魏或曰魏君賢人是禮國人稱仁上下和合未可圖也事見史記陛下撥亂龍飛初登大位聘南陽樊英江夏黄瓊廣漢楊厚會稽賀純謝承書曰純字仲眞㑹稽山隂人少為諸生博極羣蓺十辟公府三舉賢良方正五徴博士四公車徴皆不就後徴拜議郎數陳災異上便宜數百事多見省納遷江夏太守䇿書嗟歎待以大夫之位是以巖穴幽人智術之士彈冠振衣樂欲為用四海欣然歸服聖徳厚等在職雖無竒卓然夕惕孳孳志在憂國臣前在荆州聞厚純等以病免歸誠以悵然為時惜之一日朝會見諸侍中並皆年少無一宿儒大人可顧問者誠可歎息宜徴還厚等以副羣望瓊乆處議郎已且十年衆人皆怪始隆崇今更滯也隆髙也崇重也光禄大夫周舉才謨髙正宜在常伯訪以言議侍中杜喬學深行直當世良臣乆託疾病可勑令起又薦陳留楊倫倫見儒林傳河南尹存東平王惲陳國何臨臨字子陵熙之子為平原太守見百家譜也清河房植等植見黨人篇也是日有詔徴用倫厚等而遷瓊舉以固為大司農先是周舉等八使案察天下多所劾奏其中並是宦者親屬輙為請乞詔遂令勿考又舊任三府選令史光禄試尚書郎時皆特拜不復選試固乃與廷尉吳雄上疏以為八使所糾宜急誅罰選舉署置可歸有司帝感其言乃更下免八使所舉刺史二千石自是希復特拜切責三公明加考察朝廷稱善乃復與光禄勲劉宣上言自頃選舉牧守多非其人至行無道侵害百姓又宜止槃遊專心庶政帝納其言於是下詔諸州劾奏守令以下政有乖枉遇人無惠者免所居官其姦穢重罪收付詔獄及冲帝即位以固為太尉與梁冀叅録尚書事明年帝崩梁太后以楊徐盗賊盛强恐驚擾致亂使中常侍詔固等欲湏所徴諸王侯到乃發䘮固對曰帝雖㓜少猶天下之父今日崩亡人神感動豈有臣子反共掩匿乎昔秦皇亡於沙丘史記曰始皇東巡道病崩於沙丘徐廣曰趙有沙丘宫在鉅鹿也胡亥趙髙隐而不發卒害扶蘇以至亡國丞相李斯為始皇崩在外恐諸公子及天下有變乃祕之不發喪獨胡亥趙髙等知隂謀破去始皇所封書賜公子扶蘇死而立胡亥為太子胡亥元年楚漢並起近北鄉侯薨閻后兄弟及江京等亦共掩祕遂有孫程手刃之事江京劉安等坐省門下孫程與王康等就斬京安等立順帝也此天下大忌不可之甚者也太后從之即暮發喪固以清河王蒜年長有徳欲立之謂梁冀曰今當立帝宜擇長年髙明有徳任親政事者願將軍審詳大計察周霍之立文宣周勃立文帝霍光立宣帝也戒鄧閻之利㓜弱謂鄧太后立殤帝帝時誕育百餘日三嵗而崩又立安帝時十餘嵗閻太后立北鄉侯其年薨又徴諸王子擬擇立之冀不從乃立樂安王子纘年八嵗是為質帝時冲帝將北卜山陵固乃議曰今處處寇賊軍興用費加倍新創憲陵賦發非一帝尚㓜小可起陵於憲陵塋内依康陵制度康陵殤帝陵也其於役費三分減一乃從固議時太后以比遭不造委任宰輔固所匡正每輙從用其黄門宦者一皆斥遣天下咸望遂平而梁冀猜專每相忌疾初順帝時諸所除官多不以次及固在事奏免百餘人此等既怨又希望冀旨遂共作飛章虚誣固罪曰臣聞君不稽古無以承天書曰粤若稽古帝堯鄭𤣥注曰稽同也古天也言能同天而行者帝堯臣不述舊無以奉君昔堯殂之後舜仰慕三年坐則見堯於牆食則覩堯於羔太公兵法曰帝堯王天下之時金銀珠玉弗服也錦繡文綺弗衣也竒怪異物弗視也玩好之器弗寳也淫佚之樂弗聽也宫垣室屋弗堊色也榱桷柱楹弗藻餙也茅茨之蓋弗翦齊也滋味重累弗食也溫飯煖羔酸餧不易也斯所謂聿追來孝不失臣子之節者聿述也詩大雅曰文王烝哉遹追來孝言文王能述追王季勤孝之行也太尉李固因公假私依正行邪離間近戚自隆支黨至於表舉薦逹例皆門徒及所辟召靡非先舊或富室財賂或子壻㛰屬其列在官牒者凡四十九人又廣選賈豎以補令史募求好馬臨窻呈試出入踰侈輜軿曜日大行在殯路人掩涕固獨胡粉飾貌搔頭弄姿西京雜記曰武帝遇李夫人就取玉簪搔頭自此宫人搔頭皆用玉槃旋偃仰從容冶歩曾無慘怛傷悴之心山陵未成違矯舊政善則稱己過則歸君斥逐近臣不得侍送作威作福莫固之甚臣聞台輔之位實和隂陽璇璣不平寇賊姦軌書曰在璇璣玉衡以齊七政孔安國注曰璇羙玉也璣衡也王者正天文之器可運轉者也又曰寇賊姦軌注曰羣行攻刼曰寇殺人曰賊在外曰姦在内曰軌則責在太尉續漢志曰太尉掌四方兵事功課嵗盡則奏殿最而行賞罰也固受任之後東南跋扈兩州數郡謂九江賊徐鳳馬免等攻燒城邑廣陵賊張嬰等攻殺江都長九江廣陵是荆揚之地故云兩州也千里蕭條兆人傷損大化陵遲而詆疵先主茍肆狂狷存無廷爭之忠沒有誹謗之說夫子罪莫大於累父臣惡莫深於毁君固之過釁事合誅辟據吳祐傳此章馬融之詞書奏冀以白太后使下其事太后不聽得免冀忌帝聰慧恐為後患遂令左右進鴆帝苦煩甚使促召固固入前問陛下得患所由帝尚能言曰食煑餅令腹中悶得水尚可活時冀亦在側曰恐吐不可飲水語未絶而崩固伏尸號哭推舉侍醫冀慮其事泄天惡之因議立嗣固引司徒胡廣司空趙戒謝承書戒字志伯蜀郡成都人也戒博學明經講授舉孝廉累遷荆州刺史梁商弟讓為南陽太守恃椒房之寵不奉法戒到州劾奏之遷河間相以冀部難理整厲威嚴遷戒南陽太守糾豪傑恤吏人奏免中官貴戚子弟為令長貪濁者徴拜為尚書令出為河南尹轉拜太常永和六年特拜司空也先與冀書曰天下不幸仍遭大憂皇太后聖徳當朝攝統萬機明將軍體履忠孝憂存社稷而頻年之間國祚三絶順帝崩冲帝立一年崩質帝一年崩今當立帝天下重器誠知太后垂心將軍勞慮詳擇其人務存聖明然愚情眷眷竊獨有懐逺尋先世廢立舊儀近見國家踐祚前事未嘗不詢訪公卿廣求羣議令上應天心下合衆望且永初以來政事多謬地震宫廟彗星竟天誠是將軍用情之日傳曰以天下與人易為天下得人難昔昌邑之立昬亂日滋霍光憂愧發憤悔之折骨昌邑王賀武帝孫昌邑哀王子也昭帝崩霍光立之自非博陸忠勇霍光封博陸侯前書音義曰博大陸平取其嘉名無此縣也食邑北海河東也延年奮發大漢之祀幾將傾矣霍光召丞相已下議曰昌邑王行昬亂恐危社稷如何羣臣皆驚愕失色大司農田延年前離席案劒曰今日之議不得旋踵羣臣後應者臣請劒斬之於是廢立遂定至憂至重可不熟慮悠悠萬事唯此為大國之興衰在此一舉冀得書乃召三公中二千石列侯大議所立固廣戒及大鴻臚杜喬皆以為清河王蒜明徳著聞又屬最尊親宜立為嗣先是蠡吾侯志當取冀妹時在京師冀欲立之衆論既異憤憤不得意而未有以相奪未有别理而易奪之中常侍曹騰等聞而夜徃說冀曰將軍累世有椒房之親秉攝萬機賔客縱横多有過差清河王嚴明若果立則將軍受禍不乆矣不如立蠡吾侯富貴可長保也冀然其言明日重會公卿冀意氣凶凶而言辭激切自胡廣趙戒以下莫不懾憚之皆曰惟大將軍令而固獨與杜喬堅守本議冀厲聲曰罷㑹固意既不從猶望衆心可立復以書勸冀愈激怒乃說太后先策免固竟立蠡吾侯是為桓帝後嵗餘甘陵劉文魏郡劉鮪各謀立蒜為天子梁冀因此誣固與文鮪共為妖言下獄門生勃海王調貫械上書證固之枉河内趙承等數十人亦要鈇鑕詣闕通訴字林曰鈇鑕椹也鑕音質椹音竹心反太后明之乃赦焉及出獄京師市里皆稱萬嵗冀聞之大驚畏固名徳終為已害乃更據奏前事遂誅之時年五十四固臨終勑子孫素棺三寸幅巾殯殮於本郡墝埆之地不得還墓塋汚先公兆域見謝承書也臨終與胡廣趙戒書曰固受國厚恩是以竭其股肱不顧死亡志欲扶持王室比隆文宣文帝宣帝皆羣臣迎立能興漢祚何圖一朝梁氏迷謬公等曲從以吉為凶成事為敗乎漢家衰微從此始矣公等受主厚禄顚而不扶傾覆大事後之良史豈有所私固身已矣於義得矣夫復何言廣戒得書悲慙皆長歎流涕州郡收固二子基兹於偃城皆死獄中續漢書曰基偃師長袁宏記曰基字憲公兹字季公並為長史聞固䇿免並弃官亡歸巴漢南鄭趙子賤為郡功曹詔下郡殺固二子太守知其枉遇之甚寛二子託服藥死具棺器欲因出逃子賤畏法勑吏驗寔就殺之小子爕得脫亡命冀乃封廣戒而露固尸於四衢爾雅曰四達謂之衢郭璞注曰交通四出者也令有敢臨者加其罪固弟子汝南郭亮謝承書曰亮字恒直朗陵人也年始成童成童年十五也禮記曰十五成童舞象也遊學洛陽乃左提章鉞章謂所上章也蒼頡篇曰鉞斧也右秉鈇鑕詣闕上書乞收固屍不許因徃臨哭陳辭於前遂守喪不去夏門亭長呵之曰洛陽北面西頭門門外有萬夀亭李杜二公為大臣不能安上納忠而興造無端卿曹何等腐生公犯詔書干試有司乎腐生者猶言腐儒也亮曰亮含隂陽以生戴乾履坤義之所動豈知性命何為以死相懼亭長歎曰居非命之世非命謂衰亂之時人多不得其死也天髙不敢不跼地厚不敢不蹐跼曲也蹐累足也言天髙而有雷霆地厚而有淪䧟上下皆可畏懼也詩云謂天蓋髙不敢不跼謂地蓋厚不敢不蹐也耳目適宜視聽口不可以妄言也太后聞而不誅南陽人董班亦徃哭固而殉尸不肯去殉巡也楚國先賢傳曰班字季宛人也少遊太學宗事李固才髙行羙不交非類嘗耦耕澤畔惡衣蔬食聞固死乃星行奔赴哭泣盡哀司𨽻察狀奏聞天子釋而不罪班遂守尸積十日不去桓帝嘉其義烈聽許送喪到漢中赴葬畢而還也太后憐之乃聽得禭斂歸葬二人由此顯名三公並辟班遂隠身莫知所歸固所著章表奏議教令對䇿記銘凡十一篇弟子趙承等悲歎不已乃共論固言迹以為徳行一篇謝承書曰固所授弟子潁川杜訪汝南鄭遂河内趙承等七十二人相與哀歎悲憤以為眼不復瞻固形容耳不復聞固嘉訓乃共論集徳行一篇爕字徳公初固既䇿罷知不免禍乃遣三子歸鄉里時爕年十三姊文姬為同郡趙伯英妻賢而有智見二兄歸具知事本黙然獨悲曰李氏滅矣自太公以來積徳累仁何以遇此太公謂祖父郃也密與二兄謀豫藏匿爕託言還京師人咸信之有頃難作下郡收固三子二兄受害文姬乃告父門生王成曰君執義先公有古人之節今委君以六尺之孤六尺謂年十五以下李氏存滅其在君矣成感其義乃將爕乘江東下入徐州界内令變名姓為酒家傭謝承書曰爕逺遁身於北海劇託命滕咨家以得免與此不同而成賣卜於市各為異人隂相往來爕從受學酒家異之意非恒人以女妻爕爕專精經學十餘年間梁冀既誅而災𤯝屢見明年史官上言宜有赦令又當存録大臣寃死者子孫於是大赦天下并求固後嗣爕乃以本末告酒家酒家具車重厚遣之皆不受遂還鄉里追服姊弟相見悲感傍人既而戒爕曰先公正直為漢忠臣而遇朝廷傾亂梁冀肆虐令吾宗祀血食將絶今弟幸而得濟豈非天邪宜杜絶衆人勿妄往來愼無一言加於梁氏加梁氏則連主上禍重至矣唯引咎而已爕謹從其誨後王成卒爕以禮葬之感傷舊恩每四節為設上賔之位而祠焉州郡禮命四府並辟皆無所就後徴拜議郎及其在位廉方自守所交皆舍短取長好成人之羙時潁川荀爽賈彪雖俱知名而不相能爕並交二子情無適莫世稱其平正論語曰君子之於天下也無適也無莫也義之與比靈帝時拜安平相先是安平王續為張角賊所略國家贖王得還朝廷議復其國爕上奏曰續在國無政為妖賊所虜守藩不稱損辱聖朝不宜復國時議者不同而續竟歸藩爕以謗毁宗室輸作左校未滿嵗王果坐不道被誅乃拜爕為議郎京師語曰父不肯立帝子不肯立王擢遷河南尹時既以貨賂為官詔書復横發錢三億以實西園事見宦者傳爕上書陳諫辭義深切帝乃止先是潁川甄邵謟附梁冀為鄴令有同嵗生得罪於冀亡奔邵邵偽納而隂以告冀冀即捕殺之邵當遷為郡守會母亡邵且埋屍於馬屋先受封然後發喪劉攽曰案甄邵遷為郡守不得言受封未知當何字或云少一璽字先受璽封謂拜郡詔也邵還至洛陽爕行塗遇之使卒投車於溝中笞捶亂下大署帛於其背曰謟貴賣友貪官埋母乃具表其狀邵遂廢錮終身爕在職二年卒時人感其世忠正咸傷惜焉杜喬傳杜喬字叔榮河内林慮人也續漢書曰累祖吏二千石喬少好學治韓詩京氏易歐陽尚書以孝稱雖二千石子常歩擔求師林慮今相州縣也少為諸生舉孝廉辟司徒楊震府稍遷為南郡太守轉東海相入拜侍中漢安元年以喬守光禄大夫使徇察兖州表奏太山太守李固政為天下第一陳留太守梁讓濟隂太守氾宫濟北相崔瑗等臧罪千萬以上讓即大將軍梁冀季父宫瑗皆冀所善還拜太子太傅遷大司農時梁冀子弟五人及中常侍等以無功並封喬上書諫曰陛下越從藩臣龍飛即位天人屬心萬邦攸賴不急忠賢之禮而先左右之封傷善害徳興長佞諛臣聞古之明君褒罰必以功過末世闇主誅賞各縁其私今梁氏一門宦者微孽孽音魚列反公羊傳曰臣僕庶孽之事何休注云孽賤子也猶樹之有孽生也並帶無功之紱蒼頡篇紱綬也裂勞臣之土其為乖濫胡可勝言夫有功不賞為善失其望姦回不詰為惡肆其凶故陳資斧而人靡畏班爵位而物無勸易旅卦九四曰旅于處得其資斧前書音義曰資利也茍遂斯道豈伊傷政為亂而已喪身亡國可不愼哉書奏不省益州刺史种暠舉劾永昌太守劉君世以金蛇遺梁冀事發覺以蛇輸司農冀從喬借觀之喬不肯與冀始為恨累遷大鴻臚時冀小女死令公卿會喪喬獨不徃冀又衘之遷光禄勲建和元年代胡廣為太尉桓帝將納梁冀妹冀欲令以厚禮迎之喬據執舊典不聽時有司奏曰春秋迎王后于紀在塗則稱后今大將軍冀女弟宜備禮章時進徴幣奏可於是悉依惠帝納后故事聘黄金一萬斤納采鴈璧乘馬一依舊典也又冀屬喬舉氾宫為尚書喬以宫臧罪明著遂不肯用因此日忤於冀先是李固見廢内外喪氣羣臣側足而立唯喬正色無所回橈回邪也橈曲也由是海内歎息朝野瞻望焉在位數月以地震免宦者唐衡左悺等因共譖於帝曰陛下前當即位喬與李固抗議言上不堪奉漢宗祀抗舉也帝亦怨之及清河王蒜事起梁冀遂諷有司劾喬及李固與劉鮪等交通請逮案罪而梁太后素知喬忠但䇿免而已續漢書曰喬諸生耿伯嘗與鮪同止冀諷吏執鮪為喬門生冀愈怒使人脇喬曰早從宜妻子可得全從宜令其自盡也喬不肯明日冀遣騎至其門不聞哭者遂白執繫之死獄中妻子歸故郡與李固俱暴尸於城北家屬故人莫敢視者喬故掾陳留楊匡聞之號泣星行到洛陽乃著故赤幘託為夏門亭吏守衞尸喪驅䕶蠅蟲積十二日都官從事執之以聞太后義而不罪匡於是帶鈇鑕詣闕上書并乞李杜二公骸骨太后許之成禮殯殮送喬喪還家葬送行服隠匿不仕匡初好學常在外黄大澤教授門徒補蘄長蘄今徐州縣也音機政有異績遷平原令時國相徐曾中常侍璜之兄也匡恥與接事託疾牧豕云袁山松書匡一名章字叔康也論曰夫稱仁者其道𢎞矣𢎞大也言非一塗也立言踐行立其言必踐而行之豈徒徇名安己而已哉徇求也將以定去就之槩正天下之風使生以理全死與義合也槩節也立身之道唯孝與忠全死生之義湏得其所夫專為義則傷生貴義則賤生也專為生則騫義騫違也專為物則害智為物則役智故為害專為已則損仁若義重於生舍生可也生重於義全生可也孟子曰魚我所欲熊掌我所欲也二者不可得兼舍魚而取熊掌者也生亦我所欲也義亦我所欲也二者不可得兼舍生而取義者也上以殘闇失君道下以篤固盡臣節臣節盡而死之則為殺身以成仁去之不為求生以害仁也論語無求生以害仁有殺身以成仁順桓之間國統三絶太后稱制賊臣虎視李固據位持重以爭大義確乎而不可奪確堅貌也易曰確乎其不可拔論語曰臨大節而不可奪豈不知守節之觸禍恥夫覆折之傷任也易曰鼎折足覆公餗言不勝其任也觀其發正辭及所遺梁冀書雖機失謀乖猶戀戀而不能已至矣哉社稷之心乎其顧視胡廣趙戒猶糞土也贊曰李杜司職朋心合力朋猶同也致主文宣抗情伊稷伊尹后稷也道亡時晦終離罔極離被也毛詩曰䜛人罔極爕同趙孤趙朔之子趙武史記曰晉景公三年大夫屠岸賈殺趙朔朔客程嬰公孫杵臼匿朔遺腹子於中山居十五年後景公與韓厥立趙孤而攻滅屠岸賈也世載弦直載行也後漢書卷九十三後漢書卷九十三考證李固傳開陽城門候羊迪等羊字本或作揚如近者月食既於端門之側如字本或作加夏門亭長呵之曰臣世駿按杜喬傳喬故掾陳留楊匡托為夏門亭吏守衞尸喪即此夏門亭長也章懐失注後漢書卷九十三考證
