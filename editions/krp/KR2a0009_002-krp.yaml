body:
  text: 後漢書卷二宋宣城太守范煜撰唐章懐太子賢注明帝紀第二顯宗孝明皇帝諱莊諡法曰照臨四方曰明伏侯古今注曰莊之字曰嚴光武第四子也母隂皇后帝生而豐下杜預注左傳云豐下蓋靣方也東觀記云帝豐下鋭上項赤色有似於堯十嵗能通春秋光武竒之建武十五年封東海公十七年進爵為王十九年立為皇太子師事博士桓榮學通尚書中元二年二月戊戌即皇帝位年三十尊皇后曰皇太后三月丁夘𦵏光武皇帝於原陵帝王紀曰原陵方三百二十歩髙六丈在臨平亭東南去洛陽十五里有司奏上尊廟曰世祖夏四月丙辰詔曰予末小子奉承聖業夙夜震畏不敢荒寧先帝受命中興德侔帝王恊和萬邦假於上下假至也音格懐柔百神惠於鰥寡懐安也柔和也禮曰凡山林能興雲致雨者皆曰神有天下者祭百神懐柔百神也書曰惠於鰥寡朕承大運繼體守文創業之主則尚武功以定禍亂其繼體而立者則守文德榖梁傳曰承明繼體則守文之君也不知稼穡之艱難懼有廢失聖恩遺戒顧重天下以元元為首公卿百僚將何以輔朕不逮其賜天下男子爵人二級前書音義曰男子者謂戸内之長也商鞅為秦制爵二十級一公士二上造三簪􅒁四不更五大夫六官大夫七公大夫八公乗九五大夫十左庻長十一右庻長十二左更十三中更大夫十四右更十五小上造十六大上造十七駟車庻長十八大庻長十九闗内侯二十徹侯人賜爵者有罪得贖貧者得賣與人三老孝悌力田人三級三老孝悌力田三者皆郷官之名三老高帝置孝悌力田高后置所以勸導鄉里助成風化也文帝詔曰孝悌天下之大順也力田為生之本也三老衆人之師也其以户口率置員事見前書爵過公乘得移與子若同産同産子漢置賜爵自公士已上不得過公乗故過者得移授也同産同母兄弟也及流人無名數欲自占者人一級無名數謂無文簿也占謂自歸首也劉攽曰及流人無名數案他處詔書皆上有脱無名數則云及流人云云此無故不當有及字三年詔亦無可互驗鰥寡孤獨篤癃粟人十斛其施刑及郡國徒在中元元年四月己卯赦前所犯而後捕繫者悉免其刑又邉人遭亂為内郡人妻在己卯赦前一切遣還邉恣其所樂中二千石下至黄綬漢制二百石以上銅印黃綬也貶秩贖論者悉皆復秩還贖方今上無天子下無方伯公羊傳曰上無天子下無方伯此制引以為謙也若渉淵水而無舟楫夫萬乗至重而壯者慮輕帝謙言年尚少壯思慮輕淺故湏賢人輔弼實賴有德左右小子賴恃也左右助也高宻侯禹元功之首東平王蒼寛博有謀並可以受六尺之託臨大節而不撓六尺謂年十五以下大節謂大事撓屈也音女孝反其以禹為太傅蒼為驃騎將軍太尉憙告諡南郊趙憙也應劭風俗通曰禮臣子無爵諡君父之義也故羣臣累其功美葬日遣太尉於南郊告天而諡之司徒訢奉安梓宫李訢也梓宫以梓木為棺風俗通曰宮者存時所居緣生事死因以為名司空魴將校復土馮魴也將校謂將領五校兵以主穿壙也前書音義曰復土主穿壙塡墓事也言下棺訖復以土為墳故言復土其封憙為節鄉侯訢為安鄉侯魴為楊邑侯秋九月燒當羌寇隴西敗郡兵於允街允街縣名也允音鈆街音佳屬金城郡故城在今凉州昌松縣東南城臨麗水一名麗水城赦隴西囚徒減罪一等勿収今年租調又所發天水三千人亦復是歳更賦更謂戍卒更相代也賦謂雇更之錢也前書音義曰更有三品有卒更有踐更有過更古正卒無常人皆當迭為之有一月二更是為卒更貧者欲得雇更錢次直者出錢雇之月二千是為踐更古者天下人皆當戍邊三日亦名為更不可人人自行三日戍當行者不可徃即還因任一嵗次直者出錢三百雇之謂之過更劉攽曰注有一月二更案丈多一有字緣一月字似有故衍因任一嵗案任當作住遣謁者張鴻討叛羌於允吾允吾縣名屬金城郡故城在今闌州廣武縣西南允音沿吾音牙鴻軍大敗戰殁冬十一月遣中郎將竇固監捕虜將軍馬武等二將軍討燒當羌十二月甲寅詔曰方春戒節人以耕桑其勑有司務順時氣使無煩擾禮記孟春之月布德和令行慶施惠仲春無作大事以妨農事天下亡命殊死以下聽得贖論死罪入縑二十匹右趾至髠鉗城旦舂十匹前書音義曰右趾謂刖其右足次刖左足次劓次黥次髠鉗為城旦舂城旦者畫日伺寇虜夜暮築長城舂者婦人犯罪不任軍役之事但令舂以食徒者完城旦舂至司寇作三疋完者謂不加髠鉗而築城也次鬼薪白粲次𨽻臣妾次司冦作其未發覺詔書到先自告者半入贖今選舉不實邪佞未去權門請託殘吏放手放手謂貪縱為非也百姓愁怨情無告訴有司明奏罪名並正舉者舉非其人並正舉主之罪又郡縣每因徴發輕為姦利詭責羸弱先急下貧其務在均平無令枉刻永平元年春正月帝率公卿已下朝於原陵如元㑹儀漢官儀曰古不墓祭秦始皇起寢於墓側漢因而不改諸陵寢皆以晦望二十四氣三伏社臘及四時上飯其親陵所宫人隨鼓漏理被枕具盥水陳莊具天子以正月上原陵公卿百官及諸侯王郡國計吏皆當軒下占其郡國穀價四方改易欲先帝魂魄聞之也元㑹儀見下夏五月太傅鄧禹薨戊寅東海王彊薨遣司空馮魴持節視䘮事賜升龍旄頭鑾輅龍旂旄頭見光武紀鑾鈴也在鑣交龍為旂唯天子用之今特賜以葬六月乙卯葬東海恭王秋七月捕虜將軍馬武等與燒當羌戰大破之募士卒戍隴右賜錢人三萬八月戊子徙山陽王荆為廣陵王遣就國是歳遼東太守祭彤使鮮卑擊赤山烏桓大破之斬其渠帥赤山在遼東西北數千里越嶲姑復夷叛姑復縣名州郡討平之二年春正月辛未宗祀光武皇帝於明堂帝及公卿列侯始服冠冕衣裳玉佩絇屨以行事漢官儀曰天子冠通天諸侯王冠遠遊三公諸侯冠進賢三梁卿大夫尚書二千石博士冠兩梁二千石以下至小吏冠一梁天子公卿特進諸侯祀天地明堂皆冠平冕天子十二旒三公九卿諸侯七其纓各如其綬色𤣥衣纁裳周禮曰王祀昊天上帝則服大裘而冕祀五帝亦如之三禮圖曰冕以三十升布染而為之廣八寸長尺六寸前圜後方前下後高有俛伏之形故謂之冕欲人之位彌高而志彌下故以名焉董巴輿服志曰顯宗初服冕衣裳以祀天地衣裳以𤣥上纁下乗輿備文日月星辰十二章三公諸侯用山龍九章卿以下用華蟲七章皆五色采乗輿刺繡公卿已下皆織成陳留襄邑獻之徐廣車服注曰漢明帝案古禮備其服章天子郊廟衣皂上絳下前三幅後四幅衣盡而裳繡禮記曰古之君子必佩玉君子於玉比德焉天子佩白玉諸侯佩山𤣥玉大夫佩水蒼玉世子佩瑜玉周禮履人掌王赤舄青絇鄭𤣥注云赤舄為上冕服之舄也絇屨鼻頭以青絲飾之絇音劬三禮圖曰屨複下曰舄其色各隨裳色劉攽曰註二千石已下至小吏案上文已云二千石冠兩梁此則多一二字禮畢登靈臺使尚書令持節詔驃騎將軍三公曰今令月吉日宗祀光武皇帝於明堂以配五帝五經通義曰蒼帝靈威仰赤帝赤熛怒黃帝含樞紐白帝白招矩黒帝叶光紀牲幣及玉各依方色劉攽曰注白招矩案禮作白招拒音矩不便作矩也禮備法物樂和八音詠祉福舞功德祉亦福也詠謂詩云降福穰穰之類景帝詔曰歌者所以發德舞者所以明功其班時令勑羣后班布也時令謂月令也四時各有令若有乖舛必致妖災故告之劉攽曰正文案此詔方叙行禮事未有勑下語則此其字為衍文下文自有其令天下云云事畢升靈臺望元氣吹時律觀物變元氣天氣也王者承天心理禮樂通上下四時之氣也故望之焉時律者即月令孟春律中太蔟仲春律中夾鍾之類大戴禮曰聖人截十二管察八音之清濁謂之律呂律呂不正則諸氣不和周禮保章氏以五雲之色辨吉凶水旱豐荒之祲象鄭司農注云以二至二分觀雲色青為蟲白為䘮赤為兵荒黒為水黃為豐故春秋傳曰凡分至啓閉必書雲物為備故也杜預注云物謂氣色災變也羣僚藩輔宗室子孫衆郡奉計百蠻貢職奉計謂計吏也詩曰因時百蠻百言衆多也獨言蠻通四夷也烏桓濊貊咸來助祭單于侍子骨都侯亦皆陪位斯固聖祖功德之所致也朕以闇陋奉承大業親執圭璧恭祀天地周禮曰四圭尺有二寸以祀天又曰以蒼璧禮天以黃琮禮地以青圭禮東方以赤璋禮南方以白琥禮西方以𤣥璜禮北方仰惟先帝受命中興撥亂反正以寧天下撥理也公羊傳曰撥亂世反之正莫近於春秋封泰山建明堂立辟雍起靈臺恢𢎞大道被之八極淮南子曰九州之外有八寅八寅之外有八紘八紘之外有八極而𦙍子無成康之質羣臣無呂旦之謀明帝自謂無成康之時刑措不用四十餘年劉攽曰注案文意當更有成康之質曰字然後云成康之時盥洗進爵踧踖惟慙鄭𤣥注論語云踧踖敬恭貌盥音管素性頑鄙臨事益懼故君子坦蕩蕩小人長戚戚坦蕩明逹之貌戚戚常憂懼也其令天下自殊死已下謀反大逆皆赦除之百僚師尹其勉修厥職順行時令敬若昊天以綏兆人若順也三月臨辟雍初行大射禮儀禮曰大射之禮王將祭射宮擇士以助祭也張虎侯熊侯豹侯其制若今之射的矣謂之為侯者天子射中之可以服諸侯也天子侯中一丈八尺畫以雲氣焉王以六耦射三侯樂以騶虞九節諸侯以四耦射二侯樂以貍首七節孤卿大夫以三耦射一侯樂以采蘋五節士以二耦射豻侯樂以采蘩三節劉攽曰注儀禮曰大射之禮案此非儀禮本文不合著曰字秋九月沛王輔楚王英濟南王康淮陽王延東海王政來朝冬十月壬子幸辟雍初行養老禮詔曰光武皇帝建三朝之禮而未及臨饗三朝之禮謂中元元年初起明堂辟雍靈臺也眇眇小子屬當聖業尚書康王曰眇眇予末小子孔安國注云眇眇猶㣲㣲也間暮春吉辰初行大射今月元日東觀記曰十月元日復踐辟雍尊事三老兄事五更安車輭輪供綏執授侯王設醬公卿饌珍朕親袒割執爵而酳孝經援神契曰尊事三老父象也宋均注曰老人知天地之事者安車坐乘之車輭輪以蒲裹輪輭音而兖反三老就車天子親執綏授之説文綏車中把也五更老人知五行更代事者漢官儀曰三老五更皆取有首妻男女全具者續漢志曰養三老五更先吉日司徒上太傅若講師故三公人名用其德行年耆高者三公一人為三老次卿一人為五更皆服絺紵大袍單衣皂緣領袖中衣冠進賢扶玉杖五更亦如之不杖皆齋於太學講堂其日乘輿先到辟雍禮畢殿坐于東廂遣使者安車迎三老五更天子迎於門屏交拜導自阼階三老自賔階升東靣三公設几杖九卿正履天子親袒割爼執醬而饋執爵而酳五更南靣三公進供禮亦如之明日皆詣闕謝以其於已禮太隆也醬醢也珍謂肴饈之屬即周禮八珍之類鄭𤣥注儀禮云酳潄也所以潔口音靷劉攽曰注老人知天地之事案本以知天地人三才故謂之三老則此之字當作人也祝哽在前祝噎在後老人食多哽咽故置人於前後祝之令其不哽咽也升歌鹿鳴下管新宮鹿鳴小雅篇名也新宫小雅逸篇也升登也登堂而歌所以重人聲也燕禮曰升歌鹿鳴下管新宮八佾具修萬舞於庭佾列也謂舞者行列也左氏傳曰天子八佾諸侯六大夫四士二夫舞所以節八音而行八風故自八以下萬亦舞也詩云公庭萬舞朕固薄德何以克當易陳負乗詩刺彼其易曰負且乗致㓂至負也者小人之事也乗也者君子之器也小人而乗君子之器盜思奪之矣詩曰彼其之子不稱其服也永念慙疾無忘厥心三老李躬年耆學明五更桓榮授朕尚書詩曰無德不報無言不酬詩大雅也其賜榮爵關内侯食邑五千戸三老五更皆以二千石禄養終厥身其賜天下三老酒人一石肉四十斤有司其存耆耋禮記曰六十曰耆七十曰耋釋名曰耆指也不從力役指事使人也耋鐡也皮膚變黑色如鐡也恤幼孤惠鰥寡稱朕意焉中山王焉始就國甲子西廵狩幸長安祠高廟遂有事於十一陵歴覽館邑㑹郡縣吏勞賜作樂十一月甲申遣使者以中牢祠蕭何霍光帝謁陵園過式其墓東觀漢記曰蕭何墓在長陵東司馬門道北百歩又云霍光墓在茂陵東司馬門道南四里式敬也禮記曰行過墓必式進幸河東所過賜二千石令長已下至於掾史各有差續漢志曰郡國及縣諸曹皆置掾史癸卯車駕還宮十二月護羌校尉竇林下獄死是嵗始迎氣於五郊續漢書曰迎氣五郊之兆四方之兆各依其位中央之兆在未壇皆三尺立春之日迎春於東郊祭青帝勾芒車服皆青歌靑陽八佾舞雲翹之舞立夏之日迎夏於南郊祭赤帝祝融車服皆赤歌朱明八佾舞雲翹之舞先立秋十八日迎黄靈於中兆祭黄帝后土車服皆黃歌朱明八佾舞雲翹育命之舞立秋之日迎秋於西郊祭白帝蓐收車服皆白歌白藏八佾舞育命之舞立冬之日迎冬於北郊祭黒帝𤣥㝠車服皆黑歌𤣥㝠八佾舞育命之舞少府隂就子豐殺其妻酈邑公主就坐自殺酈縣屬南陽郡酈音櫟三年春正月癸巳詔曰朕奉郊祀登靈臺見史官正儀度儀謂渾儀以銅為之置於靈臺王者正天文之器也度謂日月星辰之行度也史官即太史掌天文之官也夫春者歲之始也始得其正則三時有成正謂日月五星不失其次也三時謂春夏秋左傳曰務其三時比者水旱不節邊人食寡政失於上人受其咎有司其勉順時氣勸督農桑去其螟蜮以及蝥賊爾雅曰食苖心曰螟食根曰蝥蜮一名短狐今之水弩含沙射人為災言此者欲令臣下順時行政勿侵擾也詳刑愼罰明察單辭單辭猶偏辭也夙夜匪懈以稱朕意二月甲寅太尉趙憙司徒李訢免丙辰左馮翊郭丹為司徒己未南陽太守虞延為太尉甲子立貴人馬氏為皇后皇子炟音丁逹反為皇太子賜天下男子爵人二級三老孝悌力田人三級流人無名數欲占者人一級鰥寡孤獨篤癃貧不能自存者粟人五斛夏四月辛酉封皇子建為千乗王千乗國名今青州縣故城在今淄州高苑北羡為廣平王六月丁卯有星孛于天船北天船星名續漢志曰天船為水彗出之為大水是歲伊洛水溢到津城門伏侯古今注曰彗長三尺許見三十五日乃去秋八月戊辰改大樂為大予樂尚書璇璣鈐曰有帝漢出德洽作樂名予故據璇璣鈐改之漢官儀曰大予樂令一人秩六百石壬申晦日有食之詔曰朕奉承祖業無有善政日月薄蝕彗孛見天水旱不節稼穡不成人無宿儲下生愁墊儲積也墊溺也音丁念反雖夙夜勤思而智能不逮昔楚莊無災以致戒懼説苑曰楚莊王見天不見妖而地不出孽則禱于山川曰天其忘余歟此能求過于天必不逆諌矣魯哀禍大天不降譴春秋感精符曰魯哀公時政彌亂絶不日食政亂之類當致日食之變而不應者譴之何益告之不悟故哀公之篇絶無日食之異今之動變儻尚可救有司勉思厥職以匡無德古者卿士獻詩百工箴諫國語曰天子聽政公卿至於庶士獻詩師箴百工諫庶人傳語近臣盡規而後王斟酌事焉其言事者靡有所諱冬十月蒸祭光武廟禮記曰冬祭曰蒸蒸衆也冬物畢成可祭者衆初奏文始五行武德之舞前書曰文始舞者本舜韶舞也高祖六年更名曰文始其舞人執羽籥五行者本周舞也秦始皇二十六年更名曰五行其舞人冠冕衣服法五行色武德者高祖四年作言行武以除亂也其舞人執千戚光武草創禮樂未備今始奏之故云初也甲子車駕從皇太后幸章陵觀舊廬十二月戊辰至自章陵是歲起北宮及諸官府京師及郡國七大水四年春二月辛亥詔曰朕親耕藉田以祈農事禮記曰天子親耕於東郊為藉田千畝冕而朱紘躬秉耒耜五經要義曰天子藉田以供上帝之粢盛所以先百姓而致孝敬也藉蹈也言親自蹈履于田而耕之續漢志云正月始耕既事告祠先農漢舊儀曰先農即神農炎帝也祠以太牢百官皆從皇帝親執耒耜而耕天子三推三公五孤卿十大夫十二士庶人終畝乃致藉田倉置令丞以給祭天地宗廟以為粢盛京師冬無宿雪春不燠沐燠暖也音於六反沐潤澤也言無暄潤之氣也煩勞羣司積精禱求積精猶儲積也説文云告事求福曰禱而比再得時雨宿麥潤澤其賜公卿半奉有司勉遵時政務平刑罰秋九月戊寅千乗王建薨冬十月乙卯司徒郭丹司空馮魴免丙辰河南尹范遷為司徒太僕伏恭為司空十二月陵鄉侯梁松下獄死坐縣飛書誹謗五年春二月庚戍驃騎將軍東平王蒼罷歸藩琅邪王京就國冬十月行幸鄴與趙王栩㑹鄴常山三老言於帝曰上生於元氏願䝉優復詔曰豐沛濟陽受命所由加恩報德適其宜也今永平之政百姓怨結而吏人求復令人愧笑重逆此縣之拳拳重難也拳拳猶勤勤也禮記曰得一善則拳拳服膺而不息其復元氏縣田租更賦六歳勞賜縣掾史及門䦨走卒續漢志曰五伯鈴下待閣門闌部署街里走卒皆有程品多少随所典領至自鄴十一月北匈奴寇五原十二月寇雲中南單于擊却之是歳發遣邊人在内郡者賜裝錢人二萬六年春正月沛王輔楚王英東平王蒼淮陽王延琅邪王京東海王政趙王盱北海王興齊王石來朝二月王雒山出寳鼎雒或作雄廬江太守獻之夏四月甲子詔曰昔禹収九牧之金鑄鼎以象物使人知神姦不逄惡氣夏禹之時令遠方圖畫山川竒異之物使九州之牧貢金鑄鼎以象之令人知鬼神百物之形状而備之故人入山林川澤魑魅罔兩莫能逄之惡氣謂罔兩之類事見左傳遭德則興遷於商周周德既衰鼎乃淪亡史記曰周鼎亡入泗水中秦始皇過彭城齋戒欲出周鼎於泗水使千人沒水求之不得祥瑞之降以應有德方今政化多僻何以致兹易曰鼎象三公易曰鼎折足覆公餗豈公卿奉職得其理邪太常其以礿祭之日禮記曰夏祭曰礿音藥礿薄也夏物未成祭尚薄陳鼎於廟以備器用賜三公帛五十匹九卿二千石半之先帝詔書禁人上事言聖而間者章奏頗多浮詞自今若有過稱虛譽尚書皆宜抑而不省示不為謟子蚩也冬十月行幸魯祠東海恭王陵㑹沛王輔楚王英濟南王康東平王蒼淮南王延琅邪王京東海王政十二月還幸陽城遣使者祠中岳壬午車駕還宫東平王蒼琅邪王京從駕來朝皇太后七年春正月癸卯皇太后隂氏崩二月庚申葬光烈皇后秋八月戊辰北海王興薨是歳北匈奴遣使乞和親八年春正月己卯司徒范遷薨漢官儀曰遷字子馬沛人也三月辛卯太尉虞延為司徒衞尉趙憙行太尉事遣越騎司馬鄭衆報使北匈奴初置度遼將軍屯五原曼柏武帝拜范明友為度遼将軍至此復置焉以中郎將吳常行度遼將軍曼柏縣在今勝州銀城縣也秋郡國十四雨水冬十月北宫成丙子臨辟雍養三老五更禮畢詔三公募郡國中都官死罪繫囚減罪一等勿笞詣度遼將軍營屯朔方五原之邊縣妻子自隨便占著邊縣占著謂附名藉父母同産欲相代者恣聽之其大逆無道殊死者一切募下蠶室亡命者令贖罪各有差凡徙者賜弓弩衣糧壬寅晦日有食之既既盡也詔曰朕以無德奉承大業而下貽人怨上動三光日食之變其災尤大春秋圖讖所為至譴春秋感精符曰人主含天光據璣衡齊七政操八極故君明聖人道得正則日月光明五星有度日明則政理不明則政亂故常戒以自勑厲日食皆象君之進退為盈縮當春秋撥亂日食三十六故曰至譴也劉攽曰正文春秋圖讖所為至譴案文為當作謂永思厥咎在予一人羣司勉修職事極言無諱於是在位者皆上封事各言得失宣帝始令羣臣得奏封事以知下情封有正有副領尚書者先發副封所言不善屏而不奏後魏相奏去副封以防壅蔽帝覽章深自引咎乃以所上班示百官詔曰羣僚所言皆朕之過人寃不能理吏黠不能禁而輕用人力繕修宮宇出入無節喜怒過差昔應門失守關雎刺世春秋説題辭曰人主不正應門失守故歌關雎以感之宋均注曰應門聽政之處也言不以政事為務則有宣滛之心闗雎樂而不滛思得賢人與之共化修應門之政者也薛君韓詩章句曰詩人言雎鳩貞潔愼匹以聲相求隱蔽於無人之處故人君退朝入於私宮后妃御見有度應門擊柝鼓人上堂退反宴處體安志明今時大人内傾于色賢人見其萌故詠闗雎説淑女正容儀以刺時飛蓬隨風微子所歎管子曰無儀法程式飛摇而無所定謂之飛蓬飛蓬之間明主不聽此言微子未詳永覽前戒竦然兢懼徒恐薄德乆而致怠耳北匈奴寇西河諸郡九年春三月辛丑詔郡國死罪囚減罪與妻子詣五原朔方占著所在死者皆賜妻父若男同産一人復終身其妻無父兄獨有母者賜其母錢六萬又復其口算口算已見光武紀夏四月甲辰詔郡國以公田賜貧人各有差令司隸校尉部刺史歳上墨綬長吏視事三歳以上理狀尤異者各一人與計偕上偕俱也所徴之人令與計吏俱上及尤不政理者亦以聞是歳大有年穀梁傳曰五穀皆熟書大有年為四姓小侯開立學校置五經師袁宏漢記曰永平中崇尚儒學自皇太子諸王侯及功臣子弟莫不受經又為外戚樊氏郭氏隂氏馬氏諸子弟立學號四姓小侯置五經師以非列侯故曰小侯禮記曰庶方小十年春二月廣陵王荆有罪自殺國除夏四月戊子詔曰昔歳五穀登衍鄭𤣥注周禮云五穀黍稷麥麻尗也登成也衍饒也音以戰反今兹蠶麥善収其大赦天下方盛夏長養之時蕩滌宿惡以報農功百姓勉務桑稼以備災害吏敬厥職無令愆墯閏月甲午南廵狩幸南陽祠章陵日北至又祠舊宅北至夏至也禮畢召校官弟子作雅樂奏鹿鳴校學也鹿鳴詩小雅篇名宴羣臣嘉賔之詩帝自御塤箎和之以娛嘉賔鄭𤣥注周禮云塤燒土為之大如鴈子鄭衆曰有六孔世本曰暴辛公作箎以竹為之長尺四寸有八孔還幸南頓勞饗三老官屬冬十月徵淮陽王延㑹平輿縣名屬汝南郡故城在今豫州汝陽縣東北輿音預徵沛王輔㑹睢陽十二月甲午車駕還宮十一年春正月沛王輔楚王英濟南王康東平王蒼淮陽王延中山王焉琅邪王京東海王政來朝秋七月司隸校尉郭霸下獄死是歳漅湖出黃金廬江太守以獻漅湖湖名音子小反在今廬州合肥縣東南時麒麟白雉醴泉嘉禾所在出焉十二年春正月益州徼外夷哀牢王相率内屬於是置永昌郡罷益州西部都尉西南夷傳曰罷益州西部所領六縣合為永昌郡置哀牢博南二縣去洛陽七千里在今匡州匡川縣西夏四月遣將作謁者王吳修汴渠自滎陽至于千乗海口汴渠即莨蕩渠也汴自滎陽首受河所謂石門在滎陽山北一里過汴以東積石為隄亦號金隄成帝陽嘉中所作也五月丙辰賜天下男子爵人二級三老孝悌力田人三級流民無名數欲占者人一級鰥寡孤獨篤癃貧無家屬不能自存者粟人三斛詔曰昔曽閔奉親竭歡致養曽參字子輿閔損字子騫並孔子弟子皆有孝行也仲尼葬子有棺無槨論語曰鯉也死有棺而無槨䘮貴致哀禮存寧儉今百姓送終之制競為奢靡生者無擔石之儲而財力盡於墳土前書音義曰擔音丁濫反言一擔之儲方言作甔云罃也齊東北海岱之間謂之甔郭璞注曰所謂家無甔石之儲者也埤蒼曰大罌也字或作儋音丁甘反伏臘無糟糠而牲牢兼於一奠史記曰秦德公始為伏祠歴忌曰伏者何也金氣伏藏之日也四氣代謝皆以相生至于立秋以金代火金畏于火故庚日必伏月令孟冬之月臘先祖説文云臘冬至後祭百神始皇更臘曰嘉平奠䘮祭也糜破積世之業以供終朝之費子孫饑寒絶命於此豈祖考之意哉又車服制度恣極耳目田荒不耕游食者衆㳺食謂浮食者有司其申明科禁宜於今者宣下郡國秋七月乙亥司空伏恭罷乙未大司農牟融為司空冬十月司隸校尉王康下獄死是歳天下安平人無徭役嵗比登稔百姓殷富粟斛三十牛羊被野十三年春二月帝耕於藉田禮畢賜觀者食三月河南尹薛昭下獄死夏四月汴渠成辛巳行幸滎陽廵行河渠乙酉詔曰自汴渠決敗六十餘嵗王景傳曰平帝時汴河決壞加頃年以來雨水不時汴流東侵日月益甚水門故處皆在河中漭瀁廣溢莫測坼岸圻堮也蕩蕩極望不知綱紀今兖豫之人多被水患乃云縣官不先人急好興它役又或以為河流入汴幽冀䝉利故曰左隄彊則右隄傷左右俱彊則下方傷宜任水埶所之使人隨高而處公家息壅塞之費百姓無陷溺之患議者不同南北異論朕不知所從乆而不決今既築隄理渠絶水立門河汴分流復其舊迹陶丘之北漸就壤墳爾雅曰丘再成曰陶丘孫炎曰形如累兩盂也郭璞曰今濟隂定陶城中有陶丘也尚書曰厥土為壤下土墳壚孔安國曰無塊曰壤墳起也故薦嘉玉絜牲以禮河神禮記曰凡祭玉曰嘉玉儀禮曰絜牲剛鬛東過洛汭歎禹之績水北曰汭洛汭洛水入河處也績功也河洛皆禹所加功故歎之今五土之宜反其正色周禮曰山林川澤丘陵墳衍原隰謂之五土也色謂其黄白青黑之類孔安國曰水所去土復其性也濵渠下田賦與貧人無令豪右得固其利濵近也豪右大家也庶繼世宗瓠子之作瓠子隄名也武帝元封二年發卒數萬人塞瓠子決河沈白馬玉璧令羣臣皆負薪塡河在今濮州濮陽縣西也因遂度河登太行進幸上黨壬寅車駕還宫冬十月壬辰晦日有食之三公免冠自劾制曰冠履勿劾災異屢見咎在朕躬憂懼遑遑未知其方將有司陳事多所隠諱使君上壅蔽下有不暢乎昔衛有忠臣靈公得守其位論語孔子曰衛靈公無道季康子曰夫如是奚其不䘮孔子曰仲叔圉治賔客祝佗主宗廟王孫賈主軍旅夫如是奚其䘮今何以和穆隂陽消伏災譴刺史太守詳刑理寃存恤鰥孤勉思職焉十一月楚王英謀反廢國除遷於涇縣涇縣屬丹陽郡今宣州縣故城在縣東有涇水出蕪湖因水立名所連及死徙者數十人是歳齊王石薨十四年春三月甲戍司徒虞延免自殺夏四月丁巳鉅鹿太守南陽邢穆為司徒穆字綏公宛人前楚王英自殺夏五月封故廣陵王荆子元夀為廣陵侯初作夀陵十五年春二月庚子東廵狩辛丑幸偃師詔亡命自殊死以下贖死罪縑四十匹右趾至髠鉗城旦舂十匹完城旦至司㓂五匹犯罪未發覺詔書到日自告者半入贖徵沛王輔㑹睢陽進幸彭城癸亥帝耕於下邳三月徵琅邪王京㑹良成良成縣名屬東海故城在今泗州下邳縣北徵東平王蒼㑹陽都陽都縣名屬琅邪郡故城在今沂州沂水縣南又徴廣陵侯及其三弟㑹魯祠東海恭王陵還幸孔子宅祠仲尼及七十二弟子親御講堂孔子宅在今兖州曲阜縣故魯城中歸德門内闕里之中背洙靣泗矍相圃之東北也七十二弟子顔閔之徒漢春秋曰帝時升廟立羣臣中庭北靣皆再拜帝進爵而後坐命皇太子諸王説經又幸東平東平國名故城在今鄆州東辛卯進幸大梁大梁城魏惠王所築故城在今汴州至定陶祠定陶恭王陵恭王元帝子康夏四月庚子車駕還宫改信都為樂成國臨淮為下邳國封皇子恭為鉅鹿王黨為樂成王衍為下邳王暢為汝南王昞為常山王長為濟隂王濟隂郡今曹州賜天下男子爵人三級郎從官二十嵗已上帛百匹十嵗已上二十匹十嵗已下十匹官府吏五匹書佐小史三匹令天下大酺五日前書音義曰漢律三人已上無故羣飲罰金四兩今恩詔横賜得令聚㑹飲食五日酺布也言天子布恩於天下史記趙惠文王三年大赦置酒大酺五日劉攽曰正文從官二十嵗以上又云十嵗以下案郎從官不可年十嵗以下者以十七年事校之脱視事二字乙巳大赦天下其謀反大逆及諸不應宥者皆赦除之冬車騎校獵上林苑周禮校人掌王田獵之馬故曰校獵謂以木相貫穿為欄校以遮禽獸十二月遣奉車都尉竇固駙馬都尉耿秉屯凉州前書曰奉車都尉掌乗輿駙馬都尉掌天子之副馬駙副也並武帝置秩二千石十六年春二月遣太僕祭彤出高闕髙闕山名因以名塞在朔方北奉車都尉竇固出酒泉駙馬都尉耿秉出居延本匈奴地名也武帝因以名縣屬張掖郡在今甘州張掖縣東北騎都尉來苖出平城伐北匈奴竇固破呼衍王於天山呼衍匈奴王號天山即祈連山一名雪山今名折羅漢山在伊州北祁音時留兵屯伊吾盧城本匈奴中地名既破呼衍即其地置宜禾都尉以為屯田今伊州細職縣伊吾故城是也耿秉來苖祭彤並無功而還夏五月淮陽王延謀反發覺癸丑司徒邢穆駙馬都尉韓光坐事下獄死所連及誅死者甚衆坐與延同謀戊午晦日有食之六月丙寅大司農西河王敏為司徒漢官儀曰敏字叔公并州隰城人也秋七月淮陽王延徙封阜陵王阜陵縣名屬九江郡故城在今滁州全椒縣南九月丁卯詔令郡國中都官死罪繫囚減死罪一等勿笞詣軍營屯朔方敦煌妻子自隨父母同産欲求從者恣聽之女子嫁為人妻勿與俱謀反大逆無道不用此書是嵗北匈奴寇雲中雲中太守亷范擊破之十七年春正月甘露降於甘陵北海王睦薨二月乙巳司徒王敏薨三月癸丑汝南太守鮑昱為司徒是嵗甘露仍降樹枝内附仍頻也内附謂木連理也前書終軍曰衆枝内附是無外也芝草生殿前神雀五色翔集京師西南夷哀牢儋耳僬僥槃木白狼動黏諸種前後慕義貢獻山海經曰周僥國在三首國東為人短小冠帶一名僬僥國語曰僬僥氏三尺短之至也楊浮異物志曰儋耳南方夷生則鏤其頰皮連耳匡分為數支状如雞膓纍纍下垂至肩西域諸國遣子入侍夏五月戊子公卿百官以帝威德懷遠祥物顯應乃並集朝堂奉觴上壽夀者人之所欲故卑下奉觴進酒皆言上夀制曰天生神物以應王者逺人慕化實由有德朕以虛薄何以享斯惟高祖光武聖德所被不敢有辭其敬舉觴太常擇吉日䇿告宗廟其賜天下男子爵人二級三老孝悌力田人三級流人無名數欲占者人一級鰥寡孤獨篤癃貧不能自存者粟人三斛郎從官視事十嵗以上者帛十匹中二千石二千石下至黄綬劉攽曰案文既云中二千石下至黄綬不湏更比二千石明多此三字貶秩奉贖在去年以來皆還贖秋八月丙寅令武威張掖酒泉敦煌張掖郡在匈奴昆邪王地也漢官儀曰張國臂掖故曰張掖故城在今甘州張掖縣西北及張掖屬國繫囚右趾已下任兵者任堪也皆一切勿治其罪詣軍營冬十一月遣奉車都尉竇固駙馬都尉耿秉騎都尉劉張出敦煌昆侖塞昆侖山名因以為塞在今肅州酒泉縣西南山有昆侖之體故名之周穆王見西王母於此山有石室王母臺擊破白山虜於蒲類海上遂入車師西河舊事曰白山冬夏有雪故曰白山匈奴謂之天山過之皆下馬拜焉去蒲類海百里之内初置西域都䕶戊巳校尉宣帝初置鄭吉為都䕶䕶三十六國秩比二千石元帝置戊巳校尉有丞司馬各一人秩比六百石戊巳中央也鎮覆四方見漢官儀亦處西域鎭撫諸國是嵗改天水為漢陽郡十八年春三月丁亥詔曰其令天下亡命自殊死已下贖死罪縑三十匹右趾至髠鉗城旦舂十匹完城旦至司冦五匹吏人犯罪未發覺詔書到日告者半入贖夏四月己未詔曰自春已來時雨不降宿麥傷旱秋種未下政失厥中憂懼而已其賜天下男子爵人二級及流民無名數劉攽曰及流民無名數多一及字欲占者人一級鰥寡孤獨篤癃貧不能自存者粟人三斛理寃獄録輕繫二千石分禱五岳四瀆郡界有名山大川能興雲致雨者周禮職方氏掌天下之地揚州其山曰㑹稽其川曰三江荆州其山曰衡山其川曰江漢豫州其山曰華山其川曰榮洛青州其山曰沂山其川曰淮泗兖州其山曰岱山其川曰河泲雍州其山曰嶽其川者涇汭幽州其山曰醫無閭其川曰河泲冀州其山曰霍其川曰漳并州其山曰恒其川曰滹沱此謂九州名山大川也長吏各絜齋禱請冀䝉嘉澍説文曰時雨所以澍生萬物淮南子曰春雨之灌萬物無地不澍無物不生澍音之戍反六月己未有星孛于太微焉耆龜兹攻西域都䕶陳睦悉沒其衆北匈奴及車師後王圍戊巳校尉耿恭劉攽曰檢詳耿恭傳恭作戊校此不合有已字也秋八月壬子帝崩於東宮前殿年四十八遣詔無起寢廟藏主於光烈皇后更衣别室禮藏主於廟既不起寢廟故藏於后之易衣别室更易也帝初作壽陵制令流水而已石槨廣一丈二尺長二丈五尺無得起墳東觀記曰陵東北作廡長三丈五歩外為小厨財足祠祀劉攽曰註案三丈五歩不成文理當作五尺萬年之後埽地而祭杅水脯糒而已説文曰杅飲器音于方言曰盌謂之盂説文曰糒乾飯也過百日惟四時設奠置吏卒數人供給灑掃勿開修道敢有所興作者以擅議宗廟法從事前書曰擅議宗廟者棄市帝遵奉建武制度無敢違者後宮之家不得封侯與政東觀記曰光武閔傷前代權臣大盛外戚與政上濁明主下危臣子后族隂郭之家不過九卿親屬榮位不能及許史王氏之半耳劉攽曰注上濁明主案文當作上濁主明館陶公主光武女為子求郎不許而賜錢千萬謂羣臣曰郎官上應列宿出宰百里史記曰太㣲宮後二十五星郎位也茍非其人則民受其殃是以難之故吏稱其官民安其業逺近肅服户口滋殖焉論曰明帝善刑理法令分明日晏坐朝幽枉必逹内外無倖曲之私在上無矜大之色斷獄得情號居前代十二十斷其二言少刑也故後之言事者莫不先建武永平之政而鍾離意宋均之徒常以察慧為言並見本傳夫豈𢎞人之度未優乎贊曰顯宗丕承業業兢兢危心恭德政察姦勝危心言常危懼姦勝猶勝姦佞備章朝物省薄墳陵朝物謂朝儀文物也永懐廢典下身遵道廢典謂明堂辟雍之禮歴於漢不行下身謂進爵授綏之類登臺觀雲臨雍拜老懋惟帝績增光文考懋勉也書曰惟我文考光於四海後漢書卷二後漢書卷二考證明帝紀初置度遼將軍注武帝拜范明友為度遼將軍何焯曰前書昭紀元鳯三年以中郎將范明友為度遼將軍此與南匈奴傳注皆誤作武帝戊巳校尉耿恭注劉攽曰檢詳耿恭傳恭作戊校此不合有已字也臣承蒼按耿恭傳恭與關寵皆為戊巳校尉此必後人所増後漢書卷二考證
