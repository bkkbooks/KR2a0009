body:
  text: 後漢書卷七十六宋宣城太守范煜撰唐章懐太子賢注郭陳列傳第三十六郭躬傳弟子鎭郭躬字仲孫潁川陽翟人也家世衣冠父𢎞習小杜律前書杜周武帝時爲廷尉御史大夫斷獄深刻少子延年亦明法律宣帝時又爲御史大夫對父故言小太守寇恂以𢎞爲決曹掾斷獄至三十年用法平諸爲𢎞所決者退無怨情郡内比之東海于公年九十五卒于公東海人丞相于定國父也爲郡決曹決獄平罹文法者于公所決皆不恨見前書也躬少傳父業講授徒衆常數百人後爲郡吏辟公府永平中奉車都尉竇固出撃匈奴騎都尉秦彭爲副彭在别屯而輒以法斬人固奏彭專擅請誅之顯宗乃引公卿朝臣平其罪科躬以明法律召入議議者皆然固奏躬獨曰於法彭得斬之帝曰軍征校尉一統於督督謂大將彭旣無斧鉞可得專殺人乎躬對曰一統於督者謂在部曲也前書音義曰大將軍行有伍部部有曲也今彭專軍别將有異於此兵事呼吸不容先關督帥且漢制棨㦸即為斧鉞於法不合罪有衣之㦸曰棨帝從躬議又有兄弟共殺人者而罪未有所歸帝以兄不訓弟故報兄重而減弟死中常侍孫章宣詔誤言兩報重尚書奏章矯制罪當腰斬帝復召躬問之躬對章應罸金帝曰章矯詔殺人何謂罸金躬曰法令有故誤章傳命之繆於事為誤誤者其文則輕帝曰章與囚同縣疑其故也躬曰周道如砥其直如矢詩小雅也如砥貢賦平如矢賞罸平君子不逆詐論語孔子之言君王法天刑不可以委曲生意帝曰善遷躬廷尉正坐法免後三遷元和三年拜為廷尉躬家世掌法務在寛平及典理官決獄斷刑多依矜恕乃條諸重文可從輕者四十一事奏之事皆施行著于令章和元年赦天下繫囚在四月丙子以前減死罪一等勿笞詣金城而文不及亡命未發覺者躬上封事曰聖恩所以減死罪使戍邉者重人命也今死罪亡命無慮萬人廣雅曰無慮都凡也又自赦以來捕得甚衆而詔令不及皆當重論伏惟天恩莫不蕩宥死罪已下並蒙更生而亡命捕得獨不沾澤臣以為赦前犯死罪而繫在赦後者可皆勿笞詣金城以全人命有益於邊肅宗善之即下詔赦焉躬奏讞法科多所生全永元六年卒官中子晊亦明法律晊音質至南陽太守政有名迹弟子鎭鎭字桓鍾少脩家業辟太尉府再遷延光中為尚書及中黃門孫程誅中常侍江京等而立濟隂王鎭率羽林士擊殺衞尉閻景以成大功事在宦者傳再遷尚書令太傅三公奏鎭冒犯白刃手劔賊臣姦黨殄滅宗廟以寧功比劉章章齊王肥子也高帝孫誅諸呂有功封朱虚侯也宜顯爵土以勵忠貞乃封鎭為定潁侯食邑二千戸拜河南尹轉廷尉免永建四年卒於家詔賜冢塋地長子賀當嗣爵讓與小弟時而逃去積數年詔大鴻臚下州郡追之賀不得已乃出受封累遷復至廷尉及賀卒順帝追思鎮功下詔賜鎭諡曰昭武侯賀曰成侯賀弟禎亦以能法律至廷尉鎭弟子僖許其反少明習家業兼好儒學有名譽延熹中亦為廷尉建寧二年代劉寵為太尉禧子鴻至司隸校尉封城安鄉侯郭氏自𢎞後數世皆傳法律子孫至公者一人廷尉七人侯者三人刺史二千石侍中郎將者二十餘人侍御史正監平者甚衆順帝時廷尉河南吳雄季高以明法律斷獄平起自孤宦致位司徒雄少時家貧喪母營人所不封土者擇葬其中喪事趣辦不問時日醫巫皆言當族滅而雄不顧劉攽曰案卜葬何關醫事明衍及子訢孫恭三世廷尉為法名家名為明法之家初肅宗時司隸校尉下邳趙興亦不䘏諱忌䘏憂也每入官舎輒更繕脩館宇移穿改築故犯妖禁而家人爵祿益用豐熾官至潁川太守子峻太傅以才器稱孫安世魯相三葉皆為司隸時稱其盛桓帝時汝南有陳伯敬者行必矩歩坐必端膝呵叱狗馬終不言死目有所見不食其肉行路聞凶便解駕留止還觸歸忌則寄宿鄉亭隂陽書歴法曰歸忌日四孟在丑四仲在寅四季在子其日不可遠行歸家及徙也年老寢滯不過舉孝亷後坐女壻亡吏太守邵䕫怒而殺之時人罔忌禁者多談為證焉罔無也論曰曾子云上失其道民散久矣如得其情則哀矜而勿喜言人離散犯法乃自上之所為非下之過當哀矜之勿以得情為喜也見論語也夫不喜於得情則恕心用恕心用則可寄枉直矣夫賢人君子斷獄其必主於此乎郭躬起自佐史小大之獄必察焉左傳曰小大之獄雖不能察必以情原其平刑審斷庶於勿喜者乎若乃推己以議物捨狀以貪情秦彭孫章不死為推己亡命得減為貪情也貪與探同也法家之能慶延于世蓋由此也陳寵傳子忠陳寵字昭公沛國洨人也洨縣名故城在今泗州虹縣西南洨音户交反曾祖父咸成哀間以律令為尚書平帝時王莽輔政多改漢制咸心非之及莽因呂寛事誅不附已者何武鮑宣等平帝時王莽輔政隔絶平帝外家不得至京師莽子宇恐帝長大後見怨教帝舅衞寳令帝母上書求入莽不許宇與婦兄呂寛謀以為莽不可說而好鬼神乃夜以血灑莽第門以驚懼之事覺並誅死何武為前將軍王莽先從武求舉武不敢鮑宣為司隸免徙之上黨呂寛事起莽案鞫并誅不附已者武與宣坐見誣中皆被誅並見前書咸乃歎曰易稱君子見幾而作不俟終日吾可以逝矣幾者事之微吉凶之先見者逝徃也即乞骸骨去職及莽簒位召咸以為掌寇大夫謝病不肯應時三子參豐欽皆在位乃悉令解官父子相與歸鄉里閉門不出入猶用漢家祖臘應劭風俗通曰共工之子好逺遊死為祖神漢家火行盛於午故以午日為祖也臘者歲終祭衆神之名臘接也新故交接故大祭以報功也漢火行衰於戌故臘用戌日也人問其故咸曰我先人豈知王氏臘乎其後莽復徵咸遂稱病篤於是乃收斂其家律令書文皆壁藏之咸性仁恕常戒子孫曰為人議法當依於輕雖有百金之利愼無與人重比建武初欽子躬為廷尉左監早卒躬生寵明習家業少為州郡吏辟司徒鮑昱府是時三府掾屬專尚交遊以不肯視事為高寵常非之獨勤心物務數為昱陳當世便宜昱高其能轉為辭曹掌天下獄訟續漢志曰三公掾屬二十四人有辭曹主訟事也其所平決無不厭服衆心時司徒辭訟久者數十年事類溷錯易為輕重不良吏得生因緣因緣謂依附以生輕重也寵為昱撰辭訟比七卷決事科條皆以事類相從昱奏上之其後公府奉以為法三遷肅宗初為尚書是時承永平故事吏政尚嚴切尚書決事率近於重寵以帝新即位宜改前世苛俗乃上疏曰臣聞先王之政賞不僭刑不濫與其不得已寧僭不濫事見左傳晉大夫聲子辭故唐堯著典眚災肆赦尚書舜典之辭也眚過也災害也肆緩也言過誤有害當緩赦也周公作戒勿誤庻獄尚書立政之辭也言文子文孫從今以徃惟以正道理衆獄勿誤也伯夷之典惟敬五刑以成三德三德剛柔正直尚書吕刑曰伯夷降典折民惟刑惟敬五刑以成三德由此言之聖賢之政以刑罸為首徃者斷獄嚴明所以威懲姦慝姦慝既平必宜濟之以寛濟益也陛下即位率由此義數詔羣僚𢎞崇晏晏晏晏温和也尚書考靈燿曰堯聰明文塞晏晏而有司執事未悉奉承典刑用法猶尚深刻斷獄者急於篣格酷烈之痛篣即榜也古字通用聲類曰笞也說文曰格擊也執憲者煩於詆欺放濫之文或因公行私逞縱威福夫為政猶張琴瑟大絃急者小絃絶故子貢非臧孫之猛法而美鄭喬之仁政臧孫魯大夫行猛政子貢非之曰夫政猶張琴瑟也大絃急則小絃絶矣故曰罰得則姦邪止賞得則下歡悅子之賊心見矣獨不聞子産之相鄭乎推賢舉能抑惡揚善有大畧者不問其短有厚德者不非小疵家給人足囹圄空虚子産卒國人皆叩心流涕三月不聞竿琴之音其生也見愛死也可悲故曰德莫大于仁禍莫大於刻今子病而人賀子愈而人相懼曰嗟乎何命之不善子又不死臧孫慙而避位終身不出見新序詩云不剛不柔布政優優優優和也方今聖德充塞假于上下假至也音格上下天地也宜隆先王之道蕩滌煩苛之法輕薄箠楚以濟羣生全廣至德以奉天心帝敬納寵言每事務於寛厚其後遂詔有司絶鉆鑽諸慘酷之科蒼頡篇曰鉆持也說文曰鉆鐵銸也其炎反銸音陟葉反鑽臏刑謂鑽去其髕骨也鑽音作喚反解妖惡之禁除文致之請讞五十餘事定著于令文致謂前人無罪文飾致於法中也是後人俗和平屢有嘉瑞漢舊事斷獄報重常盡三冬之月報論也重死刑也是時帝始改用冬初十月而已元和二年旱長水校尉賈宗等上言以為斷獄不盡三冬故隂氣微弱陽氣發泄招致災旱事在於此帝以其言下公卿議寵奏曰夫冬至之節陽氣始萌故十一月有蘭射干芸荔之應易通卦驗曰十一月廣莫風至則蘭射干生月令仲冬日短至隂陽爭諸生蕩芸始生荔挺出射音夜即今之烏扇也芸香草荔馬薤時令曰諸生蕩安形體時令月令也蕩動也仲冬一陽爻生草木皆欲萌動也禮記月令仲冬諸生蕩君子齋戒安形性也天以為正周以為春正春皆始也十一月萬物微而未著天以為正而周以為歲首十二月陽氣上通雉雊雞乳地以為正殷以為春十二月二陽爻生鴈北鄉陽氣上通諸生皆動始萌芽地以為正殷以為歲首也月令季冬雉雊雞乳也十三月陽氣已至天地已交萬物皆出蟄蟲始振人以為正夏以為春十三月今正月也天子迎春東郊隂陽交合萬物皆出於地人始初見故曰人以為正夏以為歲首也月令孟春天氣下降地氣上騰天地和同草木萌動東風解凍蟄蟲始振也三微成著以通三統統者統一歲之事王者三正遞用周環無窮故曰通三統三禮義宗曰三微三正也言十一月陽氣始施萬物動於黃泉之下微而未著其色皆赤赤者陽氣故周以天正為歳色尚赤夜半為朔十二月萬物始芽色白白者陰氣故殷以地正為歳色尚白雞鳴為朔十三月萬物始達其色皆黒人得加功以展其業夏以人正為歲色尚黑平旦為朔故曰三微王者奉而成之各法其一以改正朔也易乾鑿度曰三微而成著三著而體成當此之時天地交萬物通也周以天元殷以地元夏以人元若以此時行刑則殷周歲首皆當流血不合人心不稽天意月令曰孟冬之月趣獄刑無留罪臣賢案月令及淮南子皆言季秋趣獄刑無留罪今言孟冬未詳其故明大刑畢在立冬也又孟冬之月身欲寧事欲靜月令仲冬君子齋戒身欲寧事欲靜以待隂陽之所定也劉攽曰案文并注意孟當作仲若以降威怒不可謂寧若以行大刑不可謂靜議者咸曰旱之所由咎在改律臣以為殷周斷獄不以三微而化致康平無有災害自元和以前皆用三冬而水旱之異徃徃為患由此言之災害自為它應不以改律秦為虐政四時行刑聖漢初興改從簡易蕭何草律季秋論囚俱避立春之月草謂創造之也論決也而不計天地之正二王之春實頗有違言蕭何不論天地之正及殷周之春實乖正道陛下探幽析微允執其中允信也中正也言信執中正之道語見尚書革百載之失建永年之功尚書曰立功立事可以永年上有迎承之敬下有奉微之惠三正之月不用斷獄敬承天意奉順三微也稽春秋之文當月令之意春秋於春每月書王所以通三統也何休注云二月三月皆有王者二月殷正月三月夏正月也聖功美業不宜中疑書奏帝納之遂不復改寵性周宻常稱人臣之義苦不畏愼自在樞機謝遣門人拒絶知友惟在公家而已朝廷器之器重也皇后弟侍中竇憲臣賢案竇后紀及憲傳並云憲竇后兄今諸本皆言弟蓋誤也薦眞定令張林為尚書帝以問寵寵對林雖有才能而素行貪濁憲以此深恨寵林卒被用而以臧汙抵罪及帝崩憲等秉權常銜寵乃白太后令典喪事欲因過中之黄門侍郎鮑德素敬寵說憲弟夏陽侯瓌曰陳寵奉事先帝深見納任故久留臺閣賞賜有殊今不蒙忠能之賞而計幾微之故幾微言微細也誠傷輔政容貸之德瓌亦好士深然之故得出為太山太守後轉廣漢太守西州豪右并兼吏多姦貪訴訟日百數寵到顯用良吏王渙鐔顯等以為腹心鐔音徒南反訟者日減郡中清肅先是洛縣城南洛縣名故城在今益州雒縣南也每陰雨常有哭聲聞於府中積數十年寵聞而疑其故使吏案行還言世衰亂時此下多死亡者而骸骨不得葬儻在於是寵愴然矜歎即勑縣盡收歛葬之自是哭聲遂絶及竇憲為大將軍征匈奴公卿以下及郡國無不遣吏子弟奉獻遺者而寵與中山相汝南張郴光武子中山王焉相也東平相應順東平王蒼孫敞之相也守正不阿後和帝聞之擢寵為大司農郴太僕順左馮翊永元六年寵代郭躬為廷尉性仁矜及為理官數議疑獄常親自為奏每附經典務從寛恕帝輒從之濟活者甚衆其深文刻敝於此少衰寵又鉤校律令條法溢於甫刑者除之鉤猶動也前書曰鉤校得其姦賊鉤音工候反溢出也孔安國注尚書曰呂侯後為甫侯故或稱甫刑也曰臣聞禮經三百威儀三千禮記曰禮經三百曲禮三千鄭𤣥注云禮篇多亡本數未聞其中事儀有三千也故甫刑大辟二百五刑之屬三千禮之所去刑之所取去禮之人刑以加之故曰取也失禮則入刑相為表裏者也今律令死刑六百一十耐罪千六百九十八耐者輕刑之名也贖罪以下二千六百八十一溢於甫刑者千九百八十九其四百一十大辟千五百耐罪七十九贖罪春秋保乾圖曰王者三百年一蠲法漢興以來三百二年憲令稍增科條無限又律有三家其說各異宜令三公廷尉平定律令應經合義者可使大辟二百而耐罪贖罪二千八百并為三千悉刪除其餘令與禮相應以易萬人視聽以致刑措之美傳之無窮未及施行會坐詔獄吏與囚交通抵罪詔特免刑拜為尚書遷大鴻臚寵歴二郡三卿所在有迹見稱當時十六年代徐防為司空寵雖傳法律而兼通經書奏議溫粹號為任職相在位三年薨以太常南陽尹勤代為司空勤字叔梁篤性好學屏居人外荆棘生門時人重其節後以定策立安帝封福亭侯五百戸永初元年以雨水傷稼策免就國病卒無子國除寵子忠忠字伯始永初中辟司徒府三遷廷尉正正廷尉屬官也秩千石也以才能有聲稱司徒劉愷舉忠明習法律宜備機密於是擢拜尚書使居三公曹成帝置五尚書三公曹尚書主知斷獄也忠自以世典刑法用心務在寛詳初父寵在廷尉上除漢法溢於甫刑者未施行上音時掌反及寵免後遂寢而苛法稍繁人不堪之忠畧依寵意奏上二十三條為決事比比例也必寐反以省請讞之敝又上除蠶室刑蠶室宮刑名也或云犗刑也音奇敗反作窨室畜火如蠶室說文曰犗騬牛也騬音繒漢舊儀注曰少府若廬獄有蠶室也解臧吏三世禁錮狂易殺人得減重論狂易謂狂而易性也母子兄弟相代死聽赦所代者事皆施行及鄧太后崩安帝始親朝事忠以為臨政之初宜徵聘賢才以宣助風化數上薦隱逸及直道之士馮良周爕杜根成翊世之徒於是公車禮聘良爕等後連有災異詔舉有道公卿百僚各上封事忠以詔書既開諫爭慮言事者必多激切或致不能容乃上疏豫通帝意曰臣聞仁君廣山藪之大納切直之謀左氏傳曰川澤納汙山藪藏疾瑾瑜匿瑕國君含垢天之道也忠臣盡謇諤之節不畏逆耳之害史記曰趙簡子有臣周舍好直諫周舍死簡子曰吾聞千羊之皮不如一狐之腋衆人之唯唯不如周舍之諤諤家語孔子曰忠言逆耳而利於行也是以高祖舎周昌桀紂之譬周昌為御史大夫嘗燕入奏事高帝方擁戚姬昌走出高帝逐得騎昌項問曰我何如主也昌仰曰陛下桀紂之主也上笑不之罪也孝文嘉爰盎人豕之譏文帝幸慎夫人常與皇后同坐後幸上林愼夫人從盎為中郎將却慎夫人坐愼夫人怒不坐帝亦起盎前說曰陛下為愼夫人適所以禍之也獨不見人豕乎上大悅人豕解見皇后紀也武帝納東方朔宣室之正武帝為館陶公主私人董偃置酒宣室東方朔為太中大夫諫曰不可夫宣室者先帝之正處也非法度之正不得入焉上曰善更置酒北宫也元帝容薛廣德自刎之切元帝酎祭宗廟出便門欲御樓船御史大夫薛廣德當車免冠諫曰宜從橋詔曰大夫冠廣德曰陛下不聽臣臣自刎以血汙車輪帝乃從橋昔晉平公問於叔向曰國家之患孰為大對曰大臣重禄不極諫小臣畏罪不敢言下情不上通此患之大者公曰善於是下令曰吾欲進善有謁而不通罪至死此已上皆見新序今明詔崇高宗之德高宗殷王武丁也有雉登鼎耳而雊懼而修德位以永年推宋景之誠史記曰宋景公時熒惑守心星太史子韋請移之大臣國人與歲公皆不聼天感其誠熒惑為之退三舍也引咎克躬諮訪羣吏言事者見杜根成翊世等新蒙表錄顯列二臺謂杜根為侍御史成翊世為尚書郎也必承風饗應爭為切直若嘉謀異策宜輒納用如其管穴妄有譏刺管穴言小也史記扁鵲曰若以管窺天以隙視文隙即穴也雖苦口逆耳不得事實且優游寛容以示聖朝無諱之美若有道之士對問高者宜垂省覽特遷一等以廣直言之路書御有詔拜有道高第士沛國施延為侍中延後位至太尉謝承書曰延字君子蘄縣人也少為諸生明於五經星官風角靡有不綜家貧母老周流傭賃常避地於廬江臨湖縣種瓜後到吳郡海鹽取卒月直賃作半路亭父以養其母是時吳會未分山隂馮敷為督郵到縣延持箒徃敷知其賢者下車謝使入亭請與飲食脫衣與之餉餞不受順帝徵拜太尉年七十六薨常侍江京李閏等皆為列侯共秉權任帝又愛信阿母王聖封為野王君忠内懷懼懣而未敢陳諫乃作搢紳先生論以諷文多故不載搢插也紳大帶也自帝即位以後頻遭元二之戹元二解見鄧隲傳百姓流亡盜賊並起郡縣更相飾匿莫肯糾發更相文飾隠匿盜賊也忠獨以為憂上疏曰臣聞輕者重之端小者大之源故隄潰蟻孔氣洩鍼芒韓子曰千丈之堤以螻蟻之穴而潰黄帝素問曰針頭如芒氣出如筐也是以明者愼微智者識幾書曰小不可不殺尚書康誥曰有厥罪小乃不可不殺詩云無縱詭隨以謹無良詩大雅也言詭誑委隨之人不可縱宜即罪之用謹勑不善之人也蓋所以崇本絶末鉤深之慮也臣竊見元年以來盜賊連發攻亭劫掠多所傷殺夫穿窬不禁則致彊盜論語孔子曰色厲而内荏其猶穿窬之盜乎彊盜不斷則為攻盜攻盜成羣必生大姦故亡逃之科憲令所急至於通行飲食罪致大辟通行飲食猶今律云過致資給與同罪也飲音䕃食音寺而頃者以來莫以為憂州郡督錄怠慢長吏防禦不肅皆欲採獲虚名諱以盜賊為負雖有發覺不務清澄至有逞威濫怒無辜僵仆或有跼蹐比伍轉相賦斂說文曰蹐小歩也言跼身小歩畏吏之甚也或隨吏追赴周章道路是以盜發之家不敢申告鄰舎比里共相壓迮迮迫也或出私財以償所亡其大章著不可掩者乃肯發露陵遲之漸遂且成俗寇攘誅咎皆由於此寇盜攘竊也尚書曰無敢寇攘也劉攽曰案文但言寇攘誅不成文理當有一逋字前年勃海張伯路可為至戒覆車之軌其迹不遠蓋失之末流求之本源宜糺增舊科以防來事自今彊盜為上官若它郡縣所糺覺一發部吏皆正法上官謂郡府也若及也部吏謂督郵游徼也正法依法也尉貶秩一等令長三月奉贖罪二發尉免官令長貶秩一等三發以上令長免官便可撰立科條處為詔文切勑刺史嚴加糺罸冀以猛濟寛驚懼姦慝頃季夏大暑而消息不協前書音義曰息卦曰太陽消卦曰太陰其餘雜卦曰少陰太陽寒氣錯時水涌為變天之降異必有其故所舉有道之士可策問國典所務王事過差令處煖氣不效之意庶有讜言以承天誡元初三年有詔大臣得行三年喪服闋還職忠因此上言孝宣皇帝舊令人從軍屯及給事縣官者大父母死未滿三月皆勿徭令得葬送請依此制太后從之至建光中尚書令祝諷祝或作祋劉攽曰案文祝當作役尚書孟布等奏以為孝文皇帝定約禮之制約儉也孝文皇帝崩遺詔薄葬以日易月凡三十六日釋服後以為故事光武皇帝絶告寧之典前書音義曰告寧休謁之名吉曰告凶曰寧古者名吏休假曰告吏二千石有予告賜告予告在官有功法所當得也賜告病三月當免天子優賜其告使帶印綬將官屬歸家養疾也貽則萬世誠不可改宜復建武故事忠上疏曰臣聞之孝經始於愛親終於哀戚上自天子下至庶人尊卑貴賤其義一也夫父母於子同氣異息一體而分三年乃免於懐抱先聖緣人情而著其節制服二十五月是以春秋臣有大喪君三年不呼其門閔子雖要絰服事以赴公難退而致位以究私恩故稱君使之非也臣行之禮也自此已上至臣有大喪並公羊傳之文也閔子騫孔子弟子也遭喪君使之從軍騫乃要絰而服以從軍役事了退家致位喪次極盡私恩故君使之雖非臣從君命有禮也周室陵遲禮制不序蓼莪之人作詩自傷曰瓶之罄矣惟罍之恥小雅蓼莪之詩也蓼蓼長大貎也莪蘿也言孝子憂思中心不精不識莪蘿誤以為蒿也其詩曰蓼蓼者莪匪莪伊蒿哀哀父母生我劬勞瓶之罄矣惟罍之恥注云瓶小而罍大也罄盡也瓶小而盡罍大而盈言為罍恥者刺幽王不使富分貧衆恤寡也言已不得終竟子道者亦上之恥也高祖受命蕭何創制大臣有寧告之科合於致憂之義論語曾子曰吾聞夫子人未有自致者也必也親喪乎建武之初新承大亂凡諸國政多趣簡易大臣既不得告寧而羣司營祿念私鮮循三年之喪以報顧復之恩者禮義之方實為彫損大漢之興雖承衰敝而先王之制稍以施行故籍田之耕起於孝文文帝二年詔曰農天下之本也其開籍田也孝亷之貢發於孝武武帝元光元年初令郡國舉孝亷郊祀之禮定於元成元帝成帝時匡衡韋𤣥成定迭毁郊祀之禮也三雍之序備於顯宗三雍明堂辟雍靈臺也雍和也解具明紀也大臣終喪成乎陛下謂安帝詔大臣得行三年喪也聖功美業靡以尚兹孟子有言老吾老以及人之老幼吾幼以及人之幼天下可運於掌言敬吾老亦敬人之老愛吾幼亦愛人之幼有敬愛之心則天下歸順之也運掌言易也臣願陛下登高北望以甘陵之思揆度臣子之心則海内咸得其所甘陵安帝母陵陵在清河故言北望也宦豎不便之竟寢忠奏而從諷布議遂著于令忠以久次轉為僕射時帝數遣黄門常侍及中使伯榮徃來甘陵伯榮帝乳母王聖女也而伯榮負寵驕蹇所經郡國莫不迎為禮謁又霖雨積時河水涌溢百姓騷動忠上疏曰臣聞位非其人則庶事不叙庶事不叙則政有得失政有得失則感動陰陽妖變為應陛下每引災自厚不責臣司臣司狃恩莫以為負狃音女九反詩曰將叔無狃注云狃習也言屢被恩貸不以災變為憂負也故天心未得隔并屢臻隔并謂水旱不節也尚書曰一極備凶一極亡凶并音必姓反青冀之域滛雨漏河漏溢也徐岱之濵海水盆溢兖豫蝗蝝滋生蝝螽子也荆揚稻收儉薄并凉二州羗戎叛戾加以百姓不足府帑虚匱自西徂東杼柚將空杼柚謂機也小雅大東詩曰小東大東杼柚其空也臣聞洪範五事一曰貎貎以恭恭作肅貎傷則狂而致常雨洪範五行傳辭春秋大水皆為君上威儀不穆臨莅不嚴臣下輕慢貴倖擅權陰氣盛彊陽不能禁故為滛雨陛下以不得親奉孝德皇園廟孝徳皇安帝父清河王慶也比遣中使致敬甘陵朱軒軿馬相望道路可謂孝至矣朱軒車使者所乘軿並也然臣竊聞使者所過威權翕赫震動郡縣王侯二千石至為伯榮獨拜車下儀體上僣侔於人主長吏惶怖譴責或邪謟自媚發人修道繕理亭傳多設儲跱徴役無度儲積也跱具也老弱相隨動有萬計賂遺僕從人數百匹頓踣呼嗟莫不叩心河間託叔父之屬河間王開安帝叔也清河有陵廟之尊清河王延平也陵廟所在故曰尊及剖符大臣皆猥為伯榮屈節車下陛下不問必以陛下欲其然也伯榮之威重於陛下陛下之柄在於臣妾水災之發必起於此昔韓嫣託副車之乘受馳視之使江都誤為一拜而嫣受歐刀之誅韓嫣弓高侯之孫也得幸於武帝武帝獵上林中先使嫣乘副車從數十百騎馳視獸江都王望見以為天子伏謁道傍嫣驅不見王怒為皇太后泣言太后銜之後嫣出入永巷以姦聞太后賜嫣死也臣願明主嚴天元之尊正乾剛之位天元猶乾元也易曰大哉乾元也職事巨細皆任賢能不宜復令女使干錯萬機重察左右得無石顯泄漏之姦石顯字君房少時坐法腐刑為中書令元帝委以政事公卿畏之重足一迹顯恐天子一旦納用左右間已乃取一言為驗上嘗使至諸宮徴發先白上恐漏盡宫門閉請詔開門上許之顯故投夜還詔開宮門後果有上書告顯矯詔開宮門天子聞之笑顯泣曰陛下過私小臣屬任以事羣下無不嫉妬欲䧟害者唯明主能知之上以為然而憐之尚書納言得無趙昌譛崇之詐鄭崇哀帝時為尚書僕射數諫爭帝不許尚書令趙昌佞謟因奏崇與宗族通疑有姦上怒下崇獄死獄中也公卿大臣得無朱博阿傅之援哀帝時博為丞相承傅太后指奏免大司馬傅喜哀帝怒下博獄自殺也外屬近戚得無王鳳害商之謀成帝舅王鳳為大將軍專權驕僣王商為丞相論議不能平鳳隂求商短使人上書告商閨門内事商坐免王商宣帝舅樂昌侯王武之子非成帝舅成都侯也若國政一由帝命王事每決於己則下不得偪上臣不得干君常雨大水必當霽止霽亦止也四方衆異不能為害書奏不省時三府任輕機事專委尚書而災眚變咎輒切免公台切責也忠以為非國舊體上疏諫曰臣聞君使臣以禮臣事君以忠論語孔子對魯定公之辭也故三公稱曰冢宰王者待以殊敬在輿為下御坐為起漢舊儀云皇帝見丞相起謁者贊稱曰皇帝為丞相起立乃坐皇帝在道丞相迎謁者贊稱曰皇帝為丞相下輿立乃升車入則參對而議政事出則監察而董是非董督也漢典舊事丞相所請靡有不聼今之三公雖當其名而無其實選舉誅賞一由尚書尚書見任重於三公陵遲以來其漸久矣臣忠心常獨不安是故臨事戰懼不敢穴見有所興造穴見言不廣也又不敢希意同僚以謬平典而謗讟日聞罪足萬死近以地震策免司空陳襃襃字伯仁廬江人也今者災異復欲切讓三公昔考成皇帝以妖星守心移咎丞相使賁麗納說方進方進自引卒不蒙上天之福成帝時熒惑守心議郎李尋奏記丞相翟方進曰唯君侯盡節轉凶方進憂不知所出有郎賁麗善為星言大臣宜當之上乃召見方進賜養牛上尊酒令審處焉方進即日自殺賁音肥徒乖宋景之誠解見前文言景公有災身自引咎成帝不然故曰徒也故知是非之分較然有歸矣又尚書决事多違故典罪法無例詆欺為先文慘言醜有乖章憲宜責求其意割而勿聼上順國典下防威福置方員於規矩審輕重於衡石衡秤衡也三十斤為鈞四鈞為石也誠國家之典萬世之法也忠意常在褒崇大臣待下以禮其九卿有疾使者臨問加賜錢布皆忠所建奏頃之遷尚書令延光三年拜司隸校尉糾正中官外戚賔客近倖憚之不欲忠在内明年出為江夏太守復留拜尚書令會疾卒初太尉張禹司徒徐防欲與忠父寵共奏追封和熹皇后父䕶羌校尉鄧訓寵以先世無奏請故事爭之連日不能奪乃從二府議及訓追加封諡禹防復約寵俱遣子奉禮於虎賁中郎將鄧隲寵不從隲心不平之故忠不得志於鄧氏及隲等敗衆庶多怨之而忠數上疏陷成其惡遂詆劾大司農朱寵順帝之為太子廢也諸名臣來歴祝諷等守闕固爭時忠為尚書令與諸尚書復共劾奏之及帝立司隸校尉虞翊追奏忠等罪過當世以此譏焉論曰陳公居理官則議獄緩死相幼主則正不僣寵劉攽曰案文不當作下謂正下之僣事也然陳寵無正僣寵之事陳忠乃有言伯榮疏論說似誤也可謂有宰相之器矣忠能承風亦庶乎明愼用刑而不留獄然其聼狂易殺人開父子兄弟得相代死斯大謬矣是則不善人多幸而善人常代其禍進退無所措也贊曰陳郭主刑人頼其平寵矜枯胔躬斷以情忠用詳密損益有程程品式也謂彊盗發貶黜令長各有科條故曰程也施于孫子且公且卿施延也音羊䜴反後漢書卷七十六後漢書卷七十六考證郭躬傳及典理官舊本無典字陳寵傳孟冬之月趣獄刑無留罪注今言孟冬未詳其故何焯校本云下文云畢在立冬則孟冬者當作季秋先是洛縣城南縣字監本誤作陽從宋本改陳寵子忠延後位至太尉注賃作半路亭父以養其母父字一本作卒臣會汾按前書音義云亭有兩卒其一亭父掌開閉掃除其一求盜掌逐捕盜賊此下文云持箒徃則知為亭父無疑後漢書卷七十六考證
