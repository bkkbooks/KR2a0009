body:
  text: 後漢書卷一百十上宋宣城太守范煜撰唐章懐太子賢注文苑列傳第七十上杜篤傳杜篤字季雅京兆杜陵人也髙祖延年宣帝時為御史大夫前書延年字幼公周之子也為御史大夫延年居父官府不敢當舊位臥坐皆易其處也篤少博學不修小節不為鄉人所禮居美陽與美陽令遊數從請託不諧頗相恨令怨收篤送京師會大司馬吳漢薨光武詔諸儒誄之篤於獄中為誄辭最髙帝美之賜帛免刑篤以闗中表裏山河先帝舊京不宜改營洛邑乃上奏論都賦曰臣聞知而復知是為重知韓詩外傳曰知者知其所知乃為知矣臣所欲言陛下已知故略其梗概梗概猶粗略也不敢具陳昔般庚去奢行儉於亳帝王紀曰般庚以耿在河北迫近山川自祖辛以來奢淫不絶般庚乃南渡河徙都於亳人咨嗟相怨不欲徙乃作書三篇以告之成周之隆乃即中洛周成王就土中都洛陽也遭時制都不常厥邑尚書曰不常厥邑于今五遷賢聖之慮盖有優劣霸王之姿眀知相絶守國之埶同歸異術或棄去阻阸務處平易淮南子曰武王克殷欲築宫於五行之山周公曰不可夫五行之山固塞險阻之地使我徳能覆之則天下納其貢職者固矣使我有暴亂之行則天下之伐我難也髙誘注云眀周公恃徳不恃險也或據山帯河并吞六國謂秦也或富貴思歸不顧見襲或掩空擊虚自蜀漢出韓生勸項羽都闗中羽曰富貴不歸故鄉如衣錦夜行乃歸都彭城而髙祖自蜀漢出襲擊之也見前書即日車駕策由一卒前書戍卒婁敬説髙祖都闗中即日車駕西都長安或知而不從久都墝埆謂光武久都洛陽也墝埆薄地也前書張良曰洛陽田地薄四面受敵墝音古交反埆音古角反臣不敢有所據竊見司馬相如揚子雲作辭賦以諷主上臣誠慕之伏作書一篇名曰論都謹并封奏如左皇帝以建武十八年二月甲辰升輿洛邑廵于西嶽光武紀曰甲寅西廵狩推天時順斗極揚雄長楊賦曰順斗極運天闗極北極星也言順斗建及北極之星運轉而行也排閶闔入函谷閶闔天門也函谷故闗在今洛州新安縣也觀阸於崤黽圖險於隴蜀圖猶規度也其三月丁酉行至長安經營宫室傷愍舊京即詔京兆廼命扶風齋肅致敬告覲園陵悽然有懐祖之思懐思也喟乎以思諸夏之隆喟歎聲遂天旋雲遊造舟于渭北􅣆涇流爾雅曰天子造舟造並也以舟相並而濟也􅣆舟度也音胡郎反方言闗而東或謂舟為航説文􅣆字在方部今流俗不解遂與杭字相亂者誤也千乘方轂萬騎駢羅衍陳於岐梁東横乎大河衍布也横絶流度也楚辭曰横大江兮揚舲也瘞后土瘞埋也謂埋牲幣也爾雅曰祭地曰瘞埋后土祠在今蒲州汾隂縣北也禮邠郊甘泉祭天所也在邠地之郊其嵗四月反于洛都眀年有詔復函谷闗作大駕宫大駕見儒林傳大駕宫即天子行幸也六王邸髙車廐於長安修理東都城門長安外城門東面北頭第一門也橋涇渭往往繕離觀東臨霸滻西望昆眀北登長平長平坂名也在池陽宫南也䂓龍首撫未央覛平樂儀建章龍首山名蕭何於其上作未央宫撫廵也或云撫亦模其字從木覛視也音麥平樂觀名建章宫名並在城西謂光武䂓模而修理也是時山東翕然狐疑意聖朝之西都懼闗門之反拒也恐西都置闗所以拒外山東也客有為篤言彼塪井之潢汙固不容夫吞舟塪井喻小也莊子曰塪井之蛙潢汙渟水也吞舟大魚也賈誼曰彼尋常之汙瀆豈容夫吞舟之魚且洛邑之渟瀯曷足以居乎萬乘哉揚雄甘泉賦曰梁弱水之濎瀯濎瀯小貎也渟音天鼎反瀯音烏逈反咸陽守國利噐不可久虚以示姦萌老子曰國之利噐不可以示人篤未甚然其言也故因為述大漢之崇崇髙盛也世據廱州之利而今國家未暇之故以喻客意喻曉也曰昔在强秦爰初開畔畔疆界也霸自岐廱國富人衍卒以并兼桀虐作亂衍饒也音以戰反桀虐如桀之無道也天命有聖託之大漢大漢開基髙祖有勲斬白蛇屯黑雲前書髙祖斬大蛇有一老嫗夜哭曰吾子白帝子今赤帝子斬之故曰白蛇又吕后曰季所居上常有雲氣聚五星於東井提干將而呵暴秦髙祖初至霸上五星聚東井干將劒名也髙祖曰吾提三尺劒取天下蹈滄海跨崑崙揚雄長楊賦曰横巨海漂崑崙此言蹈跨喻逺大也奮彗光埽項軍彗星者所以除舊布新也故曰埽遂濟人難蕩滌于泗沂項羽都彭城泗水沂水近彭城地也蕩滌謂誅之也劉敬建策初都長安解見班固傳太宗承流守之以文太宗文帝也繼體之君以文徳守之躬履節儉側身行仁食不二味衣無異采賑人以農桑率下以約已曼麗之容不悦於目鄭衛之聲不過於耳曼美也佞邪之臣不列於朝巧偽之物不鬻於市禮記曰用噐不中度不鬻於市布帛精麄不中數廣狹不中量不鬻於市姦色亂正色不鬻於市故能理升平而刑㡬措富衍於孝景功傳於後嗣前書景帝時太倉之粟紅腐而不可食都内之錢貫朽而不可校也是時孝武因其餘財府帑之蓄始有鉤深圖逺之意探冒頓之罪前書冒頓殺其父頭曼單于又為書使遺髙后曰孤僨之君生於沮澤之中長於平野牛馬之域數至邉境願遊中國陛下獨立孤僨獨居兩主不樂無以自娛願以所有易其所無校平城之讐校報也冒頓單于圍髙祖於平城七日故報之也遂命票騎票騎將軍霍去病也勤任衞青青為大將軍霍去病舅也勇惟鷹揚軍如流星毛詩曰時惟鷹揚注云如鷹之飛揚也長揚賦曰疾如奔星深之匈奴割裂王庭匈奴王庭也長楊賦曰遂獵乎王庭席卷漠北叩勒祁連漠沙漠也祁連匈奴中山名也叩擊也勒謂銜勒也横分單于屠裂百蠻百蠻夷狄之總稱也燒罽帳罽毛布也繫閼氏單于妻號也燔康居灰珍竒康居西域國也居音渠椎鳴鏑前書曰冒頓作鳴鏑今之髐箭也釘鹿蠡蠡音離匈奴有左右鹿蠡王前書作谷蠡馳阬岸獲昆彌昆彌西域國也虜􅬟侲方言侲養馬人也字書侲音眞字書無􅬟字諸家並曰􅬟侲為粟牘西域國名也傳讀如此不知所出今有肅特國恐是也驅騾驢馭宛馬大宛國名出汗血馬鞭駃騠駿馬也駃音決騠音啼生七日而超其母也拓地萬里威震八荒肇置四郡據守敦煌四郡謂酒泉武威張掖敦煌也并域屬國一郡領方并西域以屬國都尉主之以敦煌一郡部領西方也立候隅北建䕶西羌揚雄解嘲曰西北一候孟康注云敦煌玉門闗候也置䕶羌校尉以主西羌捶驅氐僰寥狼卭莋捶擊也寥狼猶擥擾也氐僰卭莋並西南夷號東攠烏桓蹂轔濊貊字書攠亦摩字音靡方言云摩滅也蹂踐也轔轢也音吝濊貊東夷號也南羈鉤町水劒强越羈係也鉤町西南夷也水劒謂戈船將軍等下水誅南越也鉤町音劬挺殘夷文身海波沫血榖梁傳曰越人被髪文身沫血水沫如血郡縣日南漂槩朱崖武帝元鼎六年平南越以為南海蒼梧鬱林合浦交阯九眞日南朱崖儋耳九郡漂槩謂摩近之也前書音義曰珠崖言珠若崖也此作朱古字通茂陵書曰珠崖郡都郎曋去長安七千三百里曋音審部尉東南兼有黄支揚雄解嘲曰東南一尉孟康注云會稽東部都尉也前書自都盧國船行可二月餘有黄支國俗與珠崖相類也連緩耳𤨏雕題緩耳耳下垂即儋耳也禮記曰南方曰蠻雕題交阯鄭𤣥注曰謂刻其身以丹靑湼之也王逸注楚辭曰雕畫也題額也摧天督即天竺國也牽象犀椎蜯蛤碎瑠璃甲瑇瑁戕觜觽郭義恭廣志曰瑇瑁形似龜出南海甲謂取其甲也戕殘也觜觽大龜亦瑇瑁之屬觜音子期反觽音以規反於是同穴裘褐之域同穴挹婁之屬也衣裘褐北狄也共川鼻飲之國前書賈捐之曰駱越之俗父子同川而浴相習以鼻飲也莫不袒跣稽顙失氣虜伏稽止也方言曰顙額顙也以額至地而稽止也宋玉髙唐賦曰虎豹豺貁失氣恐喙言其恐懼如奴虜之伏也非夫大漢之盛世藉廱土之饒得御外理内之術孰能致功若斯故創業於髙祖嗣傳於孝恵徳隆於太宗財衍於孝景威盛於聖武政行於宣元侈極於成哀祚缺於孝平傳世十一歴載三百髙祖至平帝十一代歴渉也合二百十四年此言三百者謂出二百年渉三百年也徳衰而復盈道微而復章謂吕氏亂而文帝立昌邑廢而宣帝中興也皆莫能遷於廱州而背於咸陽宫室寢廟山陵相望髙顯𢎞麗可思可榮羲農已來無兹著眀夫廱州本帝皇所以育業周始祖后稷封邰公劉居豳文王居酆武王居鎬並在闗中故曰育業也霸王所以衍功戰士角難之場也衍廣也秦都闗中也禹貢所載厥田惟上尚書雍州厥田上上沃野千里原隰彌望保殖五榖桑麻條暢濵據南山帯以涇渭號曰陸海蠢生萬類濵近也前書東方朔曰漢都涇渭之南此謂天下陸海之地楩柟檀柘蔬果成實畎瀆潤淤水泉灌溉説文曰淤澱滓也顧野王曰今水中泥草也漸澤成川粳稻陶遂薛君注韓詩曰陶暢也爾雅曰遂生也厥土之膏畝價一金前書東方朔曰酆鎬之間號為土膏其價畝一金一金一斤金也田田相如鐇钁株林相如言地皆沃美相類也廣雅曰鐇椎也音甫袁反埤蒼云鐇鏟也謂以鏟钁去林木之株蘖也火耕流種功淺得深以火燒所伐林株引水溉之而布種也既有蓄積阸塞四臨西被隴蜀南通漢中北據谷口東阻嶔巖谷口在今雲陽縣榖梁傳秦襲鄭蹇叔送其子而戒之曰汝必死於崤之巖崯之下嶔巖謂崤也嶔音吟闗函守嶢山東道窮函函谷闗也嶢謂嶢山之闗也在藍田南故武闗之西嶢音堯置列汧隴廱偃西戎廱音擁拒守褒斜嶺南不通杜口絶津朔方無從杜塞谷口絶黄河之津鴻渭之流徑入于河大船萬艘轉漕相過東綜滄海西綱流沙朔南暨聲諸夏是和尚書曰朔南暨聲教注云朔北方也城池百尺阸塞要害闗梁之險多所衿帯衿帯衣服之要故以喻之一卒舉礧千夫沈滯礧石也前書匈奴乘隅下礧石音力對反一人奮㦸三軍沮敗淮南子曰狹路津闗大山石塞龍蛇蟠簦笠居羊腸道魚笥門一人守險千人弗敢過也地埶便利介胄剽悍可與守近利以攻逺剽急疾也悍勇也所據險要故可守近士卒勇疾故可攻逺也士卒易保人不肉袒左傳鄭伯肉袒牽羊以降楚言闗中士卒易與保守不降下也肇十有二是為贍腴尚書曰肇十有二州謂雍梁荆徐揚青兗冀幽豫并營也雍州田第一故曰贍腴今流俗北地之良沃者為贍者也劉攽曰注案文北當作以又衍一者字用霸則兼并謂秦并六國也先據則功殊髙祖先入闗功為諸侯最也修文則財衍行武則士要修文徳則財産富衍若用武則士皆奮勵而要功也為政則化上簒逆則難誅地險固故難誅也進攻則百尅退守則有餘斯固帝王之淵囿而守國之利噐也逮及亡新時漢之衰偷忍淵囿簒噐慢違偷忍猶盜竊也淵囿謂秦中也徒以埶便莫能卒危卒音倉忽反假之十八誅自京師莽居攝簒位十八年公賔就始斬之也天畀更始不能引維畀與也言更始不能持其綱維故致敗亡慢藏招寇復致赤眉易曰慢藏誨盜又曰負且乘致寇至言更始為赤眉所破也海内雲擾諸夏滅微羣龍並戰未知是非赤伏符曰四夷雲擾龍鬬于野易曰龍戰于野謂更始敗後劉永張步等重起未知受命者為誰也于時聖帝赫然申威荷天人之符兼不世之姿聖帝光武也天人符謂彊華自闗中持赤伏符也前書曰王吉上疏曰欲化之主不代出言有時間出難常遇也受命於皇上獲助於靈祗皇上謂天也尚書曰惟皇上帝降𠂻於下人靈祇謂滹沱氷及白衣老父等也立號髙邑搴旗四麾搴拔也首策之臣運籌出竒前書髙祖曰運籌帷幄之中決勝千里之外子房是也出竒謂陳平從髙祖定天下凡六出竒計以比鄧禹馮異吳漢耿弇等也虓怒之旅如虎如螭詩曰闞如虓虎注云虎之怒虓然也史記周武王誓衆曰如虎如羆如豺如螭杜預注左傳曰螭山神獸形也虓音呼交反師之攸向無不靡披盖夫燔魚剸蛇莫之方斯尚書今文泰誓篇曰太子發升舟中流白魚入于王舟王跪取出以燎羣公咸曰休哉鄭𤣥注云燔魚以祭變禮也剸割也音之兗反謂髙祖斬蛇也大呼山東響動流沙要龍淵首鏌鋣龍淵劒解見韓稜傳説文鏌鋣大㦸也音莫邪首謂建之於首也吳越春秋有莫邪劒義與此不同也命騰太白親發狼弧騰馳也太白天之將軍狼弧並星名也史記曰天苑東有大星曰天狼下有四星曰弧宋均注演孔圖曰狼為野將用兵象也合誠圖曰弧主司兵兵弩象也南禽公孫北背强胡西平隴冀東據洛都乃廓平帝宇濟蒸人於塗炭成兆庶之亹亹遂興復乎大漢爾雅曰亹亹勉也易曰成天下之亹亹今天下新定矢石之勤始瘳瘳差也而主上方以邊垂為憂忿葭萌之不柔揚子雲長楊賦曰遐萌為之不安謂逺人也案篤此賦每取子雲甘泉長楊賦事意此葭即遐也時蜀郡守將史歆及交阯徴側反盧芳亡入匈奴故云忿其不柔也未遑於論都而遺思廱州也遺猶留也方躬勞聖思以率海内厲撫名將略地疆外信威於征伐展武乎荒裔信讀曰申若夫文身鼻飲緩耳之主椎結左衽鐻鍝之君結音髻前書尉佗椎結箕踞注云如今兵士椎頭髻也孔子曰微管仲吾其被髪左衽矣鐻音渠吕反山海經曰神武羅穿耳以鐻郭璞注云金銀噐之名未詳形制鍝音牛于反埤蒼曰鍝鋸也案今夷狄好穿耳以垂金寳等此並謂夷狄之君長也東南殊俗不羈之國西北絶域難制之鄰靡不重譯納貢請為藩臣上猶謙譲而不伐勤前書司馬相如曰上猶謙譲而未俞也意以為獲無用之虜不如安有益之民略荒裔之地不如保殖五榖之淵左傳曰吾將畧地焉畧取也逺救於己亡不若近而存存也易曰成性存存也今國家躬修道徳吐恵含仁湛㤙沾洽時風顯宣前書司馬相如難蜀父老曰湛㤙汪濊湛音沈易通卦騐曰巽氣退則時風不至萬物不成冬至廣莫風至立春條風至春分明庶風至立夏清明風至夏至景風至立秋涼風至秋分閶闔風至立冬不周風至也徒垂意於持平守實務在愛育元元茍有便於王政者聖主納焉何則物罔挹而不損道無隆而不移陽盛則運陰滿則虧淮南子曰孔子觀桓公之廟有噐焉謂之宥坐孔子曰善哉乎得見此噐顧曰弟子取水水至灌之其中則正其盈則覆孔子遽然革容曰善哉持盈者乎子貢在側曰請問持盈曰挹而損之曰何謂挹而損之曰夫物盛而衰樂極而悲日中而移月盈而虧是故聰明睿智守之以愚多聞博辯守之以儉武力毅勇守之以畏富貴廣大守之以陋徳施天下守之以讓此五者先王所以守天下而弗失也故存不忘亡安不諱危雖有仁義猶設城池也易曰君子存不忘亡安不忘危客以利噐不可久虛而國家亦不忘乎西都何必去洛邑之渟瀯與篤後仕郡文學掾以目疾二十餘年不闚京師篤之外髙祖破羌將軍辛武賢以武略稱前書武賢狄道人為破羌將軍以勇武稱左將軍慶忌之父篤常嘆曰杜氏文明善政而篤不任為吏謂杜周及延年並以文法著名也辛氏秉義經武而篤又怯於事外内五世至篤衰矣女弟適扶風馬氏建初三年車騎將軍馬防擊西羌請篤為從事中郎戰沒於射姑山所著賦誄弔書讃七言女誡及雜文凡十八篇又著明世論十五篇子碩豪俠以貨殖聞王隆傳王隆字文山馮翊雲陽人也王莽時以父任為郎後避難河西為竇融左䕶軍建武中為新汲令新汲縣屬潁川郡故城在今許州扶溝縣西也能文章所著詩賦銘書凡二十六篇初王莽末沛國史岑子孝亦以文章顯莽以為謁者著頌誄復神説疾凡四篇岑一字孝山著出師頌夏恭傳夏恭字敬公梁國䝉人也習韓詩孟氏易講授門徒常千餘人王莽末盜賊從横攻沒郡縣恭以㤙信為衆所附擁兵固守獨安全光武即位嘉其忠果召拜郎中再遷太山都尉和集百姓甚得其歡心恭善為文著賦頌詩勵學凡二十篇四十九卒官諸儒共諡曰宣明君子牙少習家業著賦頌讃誄凡四十篇舉孝廉早卒鄉人號曰文徳先生傅毅傳傅毅字武仲扶風茂陵人也少博學永平中於平陵習章句因作廸志詩曰咨爾庶士迨時斯朂迨及也朂勉也日月逾邁豈云旋復尚書曰日月逾邁逾過邁行言日月之過往不可復還也哀我經營旅力靡及旅陳也言已欲經營仁義之道然非陳力之所能及也在兹弱冠靡所庶立禮記年二十曰弱冠言已在弱冠之嵗無所庶㡬成立也於赫我祖顯于殷國謂傅説也二迹阿衡克光其則阿倚衡平也言依倚之以取平也謂伊尹也髙宗命傅説曰爾尚明保予罔俾阿衡專美有商故曰二迹也言傅説功比伊尹而能光大其法則也武丁興商伊宗皇士武丁殷王髙宗也伊惟宗尊也詩曰思皇多士皇美也言武丁所以能興殷者惟尊皇美之士謂傅説爰作股肱萬邦是紀奕世載徳迄我顯考易曰徳積載載重也保膺淑懿纘修其道纘繼也漢之中葉俊乂式序秩彼殷宗光此勲緒中葉謂宣帝中興秩序也言漢代序殷髙宗用傅説之事光大其勲功而用其緒𦙍也謂傅介子以軍功封義陽侯傅喜論議正直為大司馬封髙武侯傅晏為孔鄉侯傅商為汝昌侯建武中傅俊為昆陽侯也伊余小子穢陋靡逮懼我世烈自兹以墜誰能革濁清我濯溉毛詩曰誰能執熱逝不以濯此言誰能革易我之濁而以清泉溉濯我也誰能昭闇啓我童昧先人有訓我訊我誥訓我嘉務誨我博學爰率朋友尋此舊則契濶夙夜庶不懈忒詩云與子契濶契濶謂辛苦也懈怠也忒差也秩秩大猷紀綱庶式匪勤匪昭匪壹匪測詩大雅曰秩秩大猷聖人莫之秩秩美也猷道也庶衆也式法也言美哉乎大道可以綱紀衆法若不勤勵則不能昭明其道不専一則不能深測農夫不怠越有黍稷尚書曰若農服田力穡乃亦有秋惰農自安乃其罔有黍稷也誰能云作考之居息考成也言誰能有所作而居息閑暇可能成者言必湏勤之也二事敗業多疾我力二事謂事不專一也疾害也言為事不專則多害其力也如彼遵衢則罔所極遵循也如循長路則不知所終極也二志靡成聿勞我心如彼兼聼則溷於音聿辭也溷亂也志不專一徒煩勞於我心兼聼衆聲則音亂於戲君子無恒自逸徂年如流鮮兹暇日人當自勉修徳義専志勤學不可自放逸年之過往如流少有閑暇之日也行邁屢稅胡能有迄行邁之人屢稅駕停止何能有所至也言當自朂不可中廢也密勿朝夕聿同始卒韓詩曰密勿從事密勿黽勉也聿律也卒終也言朝夕黽勉終始如一也毅以顯宗求賢不篤士多隐處故作七激以為諷建初中肅宗博召文學之士以毅為蘭臺令史拜郎中與班固賈逵共典校書毅追美孝明皇帝功徳最盛而廟頌未立乃依清廟作顯宗頌十篇奏之清廟詩周頌篇名序文王之徳也由是文雅顯於朝廷車騎將軍馬防外戚尊重請毅為軍司馬待以師友之禮及馬氏敗免官歸永元元年車騎將軍竇憲復請毅為主記室崔駰為主簿及憲遷大將軍復以毅為司馬班固為中䕶軍憲府文章之盛冠於當世毅早卒著詩賦誄頌祝文七激連珠凡二十八篇黄香傳黄香字文彊江夏安陸人也年九嵗失母思慕憔悴殆不免䘮免䘮終䘮鄉人稱其至孝年十二太守劉䕶聞而召之署門下孝子甚見愛敬香家貧内無僕妾躬執苦勤盡心奉養遂博學經典究精道術能文章京師號曰天下無䨇江夏黄童初除郎中元和元年肅宗詔香詣東觀讀所未嘗見書香後告休及歸京師時千乘王冠千乘貞王伉章帝子也冠謂二十加冠也帝㑹中山邸乃詔香殿下顧謂諸王曰此天下無䨇江夏黄童者也左右莫不改觀後召詣安福殿言政事拜尚書郎數陳得失賞賚增加嘗獨止宿臺上晝夜不離省闥帝聞善之永元四年拜左丞功滿當遷和帝留增秩六年累遷尚書令後以為東郡太守香上疏讓曰臣江淮孤賤愚矇小生經學行能無可算錄遭值太平先人餘福謝承書香代為冠族葉令況之子也得以弱冠特䝉徴用連階累任遂極臺閣訖無纎介稱報㤙効死誠不意悟卒被非望顯拜近郡尊位千里臣聞量能授官則職無廢事因勞施爵則賢愚得宜臣香小醜少為諸生典郡從政固非所堪誠恐矇頓孤忝聖㤙又惟機密端首至為尊要謂尚書令復非臣香所當久奉承詔驚惶不知所裁臣香年在方剛適可驅使論語曰及其壯也血氣方剛言少壯也願乞餘㤙留備冗官賜以督責小職任之宫䑓煩事以畢臣香螻蟻小志誠瞑目至願土灰極榮帝亦惜香幹用久習舊事復留為尚書令增秩二千石賜錢三十萬是後遂管樞機甚見親重而香亦祗勤物務憂公如家十二年東平清河奏訞言卿仲遼等所連及且千人香科别據奏全活甚衆每郡國疑罪輒務求輕科愛惜人命每存憂濟又曉習邊事均量軍政皆得事宜帝知其精勤數加㤙賞疾病存問賜醫藥在位多所薦達寵遇甚盛議者譏其過倖延光元年遷魏郡太守郡舊有内外園田常與人分種收榖嵗數千斛香曰田令商者不農王制仕者不耕王制曰上農夫食九人下士視上農夫禄足以代耕也伐冰食禄之人不與百姓爭利伐冰解見馮衍傳乃悉以賦人課令耕種時被水年飢乃分奉禄及所得賞賜班贍貧者於是豐富之家各出義榖助官稟貸荒民獲全後坐水潦事免數月卒於家所著賦牋奏書令凡五篇子瓊自有傳劉毅傳劉毅北海敬王子也初封平望侯平望縣屬北海郡永元中坐事奪爵毅少有文辯稱元初元年上漢徳論并憲論十二篇時劉珍鄧耽尹兌馬融共上書稱其美安帝嘉之賜錢三萬拜議郎李尤傳李尤字伯仁廣漢雒人也少以文章顯和帝時侍中賈逵薦尤有相如揚雄之風召詣東觀受詔作賦拜蘭臺令史稍遷安帝時為諫議大夫受詔與謁者僕射劉珍等俱撰漢記後帝廢太子為濟陰王尤上書諫爭順帝立遷樂安相年八十三卒所著詩賦銘誄頌七歎哀典凡二十八篇尤同郡李勝亦有文才為東觀郎著詩誄頌論數十篇蘇順傳蘇順字孝山京兆霸陵人也和安間以才學見稱好養生術隐處求道晚乃仕拜郎中卒於官所著賦論誄哀辭雜文凡十六篇時三輔多士扶風曹衆伯師亦有才學著誄書論四篇三輔決錄注曰衆與鄉里蘇孺文竇伯向馬季長並逰宦唯衆不遇以壽終于家又有曹朔不知何許人作漢頌四篇劉珍傳劉珍字秋孫諸本時有作祕孫者其人名珍與祕義相扶而作秋者多也一名寳南陽蔡陽人也少好學永初中為謁者僕射鄧太后詔使與校書劉騊駼馬融及五經博士校定東觀五經諸子傳記百家藝術整齊脫誤是正文字永寜元年太后又詔珍與騊駼作建武已來名臣傳遷侍中越騎校尉延光四年拜宗正明年轉衞尉卒官著誄頌連珠凡七篇又撰釋名三十篇以辯萬物之稱號云葛龔傳葛龔字元甫梁國寜陵人也和帝時以善文記知名龔善為文奏或有請龔奏以干人者龔為作之其人寫之忘自載其名因并寫龔名以進之故時人為之語曰作奏雖工宜去葛龔事見笑林性慷慨壯烈勇力過人安帝永初中舉孝廉為太官丞上便宜四事拜蕩隂令蕩隂縣名今相州縣也蕩音湯辟太尉府病不就州舉茂才為臨汾令居二縣皆有稱績著文賦碑誄書記十二篇王逸傳王逸字叔師南郡宜城人也元初中舉上計吏為校書郎順帝時為侍中著楚辭章句行於世其賦誄書論及雜文凡二十一篇又作漢詩百二十三篇子延壽字文考有儁才少遊魯國作靈光殿賦後蔡邕亦造此賦未成及見延夀所為甚竒之遂輟翰而已曾有異夢意惡之乃作夢賦以自厲後溺水死時年二十餘張華博物志曰王子山與父叔師到泰山從鮑子眞學算到魯賦靈光殿歸度湘水溺死文考一字子山也崔琦傳崔琦字子瑋涿郡安平人濟北相瑗之宗也少遊學京師以文章博通稱初舉孝廉為郎河南尹梁冀聞其才請與交冀行多不軌軌法也𤦺數引古今成敗以戒之冀不能受乃作外戚箴其辭曰赫赫外戚華寵煌煌昔在帝舜徳隆英皇帝舜妃娥皇女英帝堯之女聰明貞仁事舜於畝畝之中事瞽叟謙讓恭敬思盡婦道也周興三母列女傳曰太姜者太王之妃賢而有色生太伯仲廱王季化導三子皆成賢徳太王有事必諮謀焉太姙者王季之妃端懿誠莊維徳之行及其有身目不視惡色耳不聼惡聲而生文王太姒者文王之妃號曰文母思媚太姜太姙旦夕勤勞以進婦道文王理外文母理内生十男也有莘崇湯列女傳曰湯娶有莘氏女徳髙而明伊尹為之媵臣佐湯致王訓正後宫嬪御有序咸無嫉妬也宣王晏起姜后脫簪列女傳曰周宣王嘗夜卧而晏起姜后乃脫簪珥待罪於永巷使其傅母通言王曰妾不才妾之淫心見矣至使君王失禮而晏朝以見君王樂色而忘徳也敢請婢子之罪王乃勤於政早朝晏罷卒成中興焉齊桓好樂衞姬不音列女傳曰齊桓公好淫樂衞姬不聼鄭衞之音皆輔主以禮扶君以仁達才進善以義濟身爰暨末葉漸已頽虧貫魚不叙九御差池易曰貫魚以宫人寵謂王者之御宫人如貫魚之有次叙不偏愛也禮后夫人已下進御之法云凡天子進御之儀從后而下十五日徧自下始以象月之初生漸進至盛法陰道之義也其法九嬪已下皆九九而御則女御八十一人為九夕也世婦二十七人為三夕九嬪為一夕夫人為一夕凡十四夕后當一夕故曰十五日一徧也晉國之難禍起於麗獻公麗姬也惟家之索牝雞之晨尚書曰牝雞無晨牝雞之晨惟家之索孔安國注云索盡也雌代雄鳴則家盡婦奪夫政則國亡也專權擅愛顯己蔽人陵長間舊圯剝至親左傳曰少陵長新間舊言其亂政也圯毁也並后匹嫡左傳曰辛伯諗周桓公曰並后匹嫡亂之本也淫女斃陳陳夏姬通於孔寧儀行父又通於靈公夏姬之子徴舒弑靈公楚伐陳滅之見左傳匪賢是上番為司徒詩小雅也番幽王之后親黨也幽王淫色不尚賢徳之人寵其后親而以番為司徒之官荷爵負乘采食名都易曰負且乘負也者小人之事也乘也者君子之噐也以小人而乘君子之噐寇必至也毛詩曰皇父孔聖作都于向皇父幽王后之親黨也向邑也以向為皇父食采邑也詩人是刺徳用不憮憮大也音呼謂詩人刺番為司徒及皇父都向用其后親黨是以其徳不大也暴辛惑婦拒諌自孤暴虐也紂字受徳名辛以其暴虐故曰暴辛惑婦謂惑妲己也紂智足以拒諫祖伊諌紂紂不從自孤為獨夫也蝠蛇其心縱毒不辜字書蝠音福即蝎蝠也此當作蝮音芳福反不辜謂葅梅伯脯鬼侯之類也諸父是殺孕子是刳天怒地忿人謀鬼圖甲子昧爽身首分離王子比干紂之諸父也紂殺之尚書曰紂刳剔孕婦為周武王所伐甲子日紂衣其寳衣赴火而死武王乃斬以輕吕之劒也初為天子後為人螭左傳曰螭魅魍魎杜預注云螭山神獸形故以比紂之惡也非但耽色母后尤然不相率以禮而競奬以權先笑後號卒以辱殘母后不能循用禮法爭競相勸以擅權柄也易曰旅人先笑而後號咷言初雖恃權埶而笑後競罹禍而號哭也家國泯絶宗廟燒燔末嬉䘮夏末嬉桀妃有施氏女羙於色薄於徳女子行丈夫心桀嘗置末嬉於膝上聼用其言昏亂失道湯遂放桀於南巢見列女傳襃姒斃周周幽王嬖襃姒為犬戎所殺也妲己亡殷趙靈沙丘趙武靈王以長子章為太子後得吳娃愛之生子何乃廢章而立何後自號主父立何為王吳娃死何愛㢮主父憐章北面臣詘於其弟欲分趙王章於代計未決主父及王遊於沙丘宫公子章以其徒作亂公子成與李兌自國起兵公子章敗往走主父主父開之成兌因圍主父宫章死成兌謀曰以章故圍主父即解兵吾屬夷矣乃遂圍主父令宫人後出者夷宫中人悉出主父欲出不得飢探雀􅑹而食之三月餘死沙丘宫見史記戚姬人豕吕宗以敗解見皇后紀陳后作巫卒死於外孝武帝陳皇后以巫蠱廢霍欲鴆子身乃罹廢孝宣帝霍皇后霍光之女欲謀毒太子被廢故曰無謂我貴天將爾摧無恃常好色有歇微無怙常幸愛有陵遲無曰我能天人爾違患生不徳福有慎機無徳而貴寵者患害之所生也左傳曰無徳而禄殃也若慎其機事則有福也日不常中月盈有虧履道者固仗埶者危微臣司戚敢告在斯𤦺以言不從失意復作白鵠賦以為風風讀曰諷梁冀見之呼𤦺問曰百官外内各有司存天下云云豈獨吾人之尤君何激刺之過乎琦對曰昔管仲相齊樂聞譏諫之言蕭何佐漢乃設書過之吏劉攽曰案吏當作史今將軍累世台輔任齊伊公伊尹公旦而徳政未聞黎元塗炭不能結納貞良以救禍敗反復欲鉗塞士口杜蔽主聼將使𤣥黄改色馬鹿異形乎史記趙髙欲為亂恐羣臣不聼乃先設驗持鹿獻胡亥曰馬也胡亥笑曰丞相誤耶問左右或黙或言馬以阿順髙或言鹿髙因陰中諸言鹿者以法後羣臣畏髙髙遂作亂也冀無以對因遣琦歸後除為臨濟長不敢之職解印綬去冀遂令刺客陰求殺之客見琦耕於陌上懐書一卷息輒偃而詠之客哀其志以實告琦曰將軍令吾要子今見君賢者情懐忍忍忍忍猶不忍也可亟自逃吾亦於此亡矣𤦺得脱走冀後竟捕殺之所著賦頌銘誄箴弔論九咨七言凡十五篇邊韶傳邊韶字孝先陳留浚儀人也以文學知名教授數百人韶口辯曾晝日假臥左傳趙盾坐而假寐杜注云不脫衣裳而臥也弟子私謿之曰邊孝先腹便便便音蒲堅反懶讀書但欲眠韶潛聞之應時對曰邊為姓孝為字腹便便五經笥但欲眠思經事寐與周公通夢静與孔子同意師而可謿出何典記謿者大慙韶之才㨗皆此類也桓帝時為臨潁侯相徴拜太中大夫著作東觀再遷北地太守入拜尚書令後為陳相卒官著詩頌碑銘書策凡十五篇後漢書卷一百十上後漢書卷一百十上考證杜篤傳所著賦誄弔書讚七言女誡及雜文凡十八篇又著明世論十五篇何焯曰後書不立藝文志故具載著述篇數王隆傳沛國史岑子孝注岑一字孝山著出師頌何焯曰作出師及和熹鄧后頌者又一史岑李善文選注得之此注誤也傳已著明所著四篇後漢書卷一百十上考證欽定四庫全書後漢書卷一百十下宋宣城太守范煜撰唐章懐太子賢注文苑列傳第七十下張升傳張升字彦眞陳留尉氏人富平侯放之孫也放湯六代孫也升少好學多闗覽而任情不覊闗渉也不覊謂超絶等倫不可覊束也鄒陽上書曰使不覊之士與牛驥同皁其意相合者則傾身交結不問窮賤如乖其志好者雖王公大人終不屈從杜預注左傳曰大人謂在位者也常歎曰死生有命富貴在天其有知我雖胡越可親茍不相識從物何益前書鄒陽上書曰意合則胡越為兄弟也仕郡為綱紀以能出守外黄命吏有受賕者即論殺之或譏升守領一時何足趨明威戮乎趨急也讀曰促對曰昔仲尼暫相誅齊之侏儒首足異門而出故能威震强國反其侵地侏儒短人能為俳優也榖梁傳曰魯定公與齊侯㑹于頰谷兩君就壇兩相相揖齊人鼔譟而起欲以執魯君孔子歴階而上不盡一等曰兩君合好夷狄之人何為來齊侯逡廵而謝曰寡人之過也罷㑹齊人使優施舞於魯君之幕下孔子曰笑國君者罪當死使司馬行法焉首足異門而出齊人乃歸魯鄆讙龜陰之田君子仕不為已職思其憂詩唐風曰無以太康職思其憂職主也君子之居位當思盡忠不為己身豈以久近而異其度哉遇黨錮去官後竟見誅年四十九著賦誅頌碑書凡六十篇趙壹傳趙壹字元叔漢陽西縣人也體貎魁梧魁梧壯大之貎身長九尺美須豪眉望之甚偉而恃才倨傲為鄉黨所擯乃作解擯擯斥也後屢抵罪㡬至死友人救得免壹乃貽書謝㤙曰昔原大夫贖桑下絶氣傳稱其仁原大夫謂趙衰之子盾謚曰宣吕氏春秋曰趙宣孟將之絳見骫桑之下有卧餓人宣孟與脯二朐拜受之不敢食問其故曰臣有母持以遺之宣孟更賜之脯二束遂去贖即續也骫古委字也秦越人還虢太子結􅍺世著其神扁鵲姓秦名越人過虢虢太子死扁鵲曰臣能生之若太子病所謂尸蹷也乃使弟子子陽厲鍼砥石以取三陽五㑹有間太子蘇見史記設曩之二人不遭仁遇神則結絶之氣竭矣然而糒脯出乎車軨說文軨車輜間横木鍼石運乎手爪古者以砭石為鍼凡鍼之法右手象天左手法地彈而怒之搔而下之此運手爪也砭音必廉反今所賴者非直車軨之糒脯手爪之鍼石也乃收之於斗極還之於司命禮記曰祭司命鄭𤣥注云文昌中星使乾皮復含血枯骨復被肉允所謂遭仁遇神眞所宜傳而著之余畏禁不敢班班顯言班班明貎竊為窮鳥賦一篇其辭曰有一窮鳥戢翼原野畢網加上機穽在下禮記曰羅網畢翳鄭𤣥注云小而柄長謂之畢機捕獸機檻也穽穿地䧟獸前見蒼隼後見驅者繳彈張右繳以縷係箭而射者也羿子彀左羿子謂羿也淮南子曰堯時十日並出命羿仰射十日中其九烏皆死墮其羽翼彀引弓也飛丸激矢交集于我思飛不得欲鳴不可舉頭畏觸揺足恐墮内獨怖急乍冰乍火幸賴大賢我矜我憐昔濟我南今振我西西協韻音先鳥也雖頑猶識密㤙内以書心外用告天天乎祚賢歸賢永年且公且侯子子孫孫又作刺世疾邪賦以舒其怨憤曰伊五帝之不同禮三王亦又不同樂數極自然變化非是故相反駮禮記曰五帝殊時不相㳂樂三王異代不相襲禮樂極則憂禮粗則偏矣徳政不能救世溷亂賞罰豈足懲時清濁春秋時禍敗之始戰國愈復増其荼毒尚書曰罹其凶害不忍荼毒孔注云荼毒苦也秦漢無以相踰越乃更加其怨酷寧計生民之命唯利己而自足于兹迄今情偽萬方佞謟日熾剛克消亡䑛痔結駟正色徒行莊子曰宋有曹商者為宋王使秦秦王悅之益車百乘見莊子莊子曰秦王有病召毉䑛痔者得車五乘子豈䑛痔邪何得車之多乎嫗􅯭名埶撫拍豪强嫗􅯭猶傴僂也嫗音衣宇反􅯭音丘矩反撫拍相親狎也偃蹇反俗立致咎殃偃蹇驕敖也㨗懾逐物日富月昌㨗疾也懾懼也急懼逐物則致富昌渾然同惑孰温孰涼邪夫顯進直士幽藏原斯瘼之攸興實執政之匪賢女謁掩其視聼兮近習秉其威權所好則鑽皮出其毛羽所惡則洗垢求其瘢㾗雖欲竭誠而盡忠路絶嶮而靡縁九重既不可啟又羣吠之狺狺楚辭曰豈不思夫君兮君之門以九重猛犬狺狺以迎吠闗梁閉而不通狺音銀安危亡於旦夕肆嗜慾於目前奚異渉海之失柂積薪而待燃柂可以正船也音徒我反前書賈誼曰措火積薪之下而寢於上火未及燃而謂之安當今之埶何以異此榮納由於閃榆孰知辨其蚩妍閃榆傾佞之貎也行傾佞者則享榮寵而見納用榆音輸故法禁屈撓於埶族㤙澤不逮於單門寧饑寒於堯舜之荒嵗兮不飽暖於當今之豐年乘理雖死而非亡違義雖生而匪存有秦客者乃為詩曰河清不可俟人命不可延左傳曰俟河之清人壽㡬何言人夀促河清遲也順風激靡草富貴者稱賢文籍雖滿腹不如一囊錢伊優北堂上抗髒倚門邉伊優屈曲佞媚之貎抗髒髙亢婞直之貎也佞媚者見親故昇堂婞直者見棄故倚門髒音葬魯生聞此辭繫而作歌曰秦客魯生皆寓言也埶家多所宜咳唾自成珠被褐懐金玉蘭蕙化為芻老子曰被褐懐玉言處卑賤而懐徳義也楚辭曰蘭芷變而不芳荃蕙化而為茅也賢者雖獨悟所困在羣愚且各守爾分勿復空馳驅哀哉復哀哉此是命矣夫光和元年舉郡上計到京師是時司徒袁逄受計計吏數百人皆拜伏庭中莫敢仰視壹獨長揖而已逄望而異之令左右往讓之曰下郡計吏而揖三公何也對曰昔酈食其長揖漢王今揖三公何遽怪哉前書酈食其初見髙祖長揖不拜因說髙祖髙祖引之上坐左傳曰豈不遽止杜預注曰遽異也逄則斂祍下堂執其手延置上坐因問西方事大悅顧謂坐中曰此人漢陽趙元叔也朝臣莫有過之者吾請為諸君分坐分坐别坐也坐者皆屬觀既出往造河南尹羊陟不得見壹以公卿中非陟無足以託名者乃日往到門陟自强許通陟意未許通壹以壹數至門故自勉强許通之尚卧未起壹逕入上堂遂前臨之曰竊伏西州承髙風舊矣前書雋不疑見暴勝之日竊伏海濵承暴公子舊矣舊久也乃今方遇而忽然謂死也奈何命也因舉聲哭門下皆驚奔入滿側陟知其非常人乃起延與語大竒之謂曰子出矣陟明旦大從車騎奉謁造壹奉謁通名也時諸計吏多盛飾車馬帷幙而壹獨柴車草屏韓詩外傳曰周子髙對齊景公曰臣賴君之賜疏食惡肉可得而食駑馬柴車可得而乘柴車弊惡之車也露宿其傍延陟前坐於車下左右莫不歎愕陟遂與言談至熏夕極歡而去執其手曰良璞不剖必有泣血以相明者矣琴操曰卞和得玉璞以獻楚懐王使樂正子占之言非玉以其欺謾斬其一足懐王死子平王立和復抱其璞而獻之平王復以為欺斬其一足平王死和復獻恐復見斷乃抱其玉而哭荆山之中晝夜不止泣盡繼之以血陟乃與袁逄共稱薦之名動京師士大夫想望其風采及西還道經𢎞農過候太守皇甫規門者不即通壹遂遁去門吏懼以白之規聞壹名大驚乃追書謝曰蹉跌不面企徳懐風虛心委質為日久矣側聞仁者愍其區區冀承清誨以釋遥悚今旦外白有一尉兩計吏不道屈尊門下尊謂壹也敬之故號為尊更啟乃知已去如印綬可投夜豈待旦惟君明叡平其夙心寧當慢慠加於所天平恕也敬壹故謂為所天事在悖惑不足具責儻可原察追脩前好則何福如之謹遣主簿奉書下筆氣結汗流竟趾壹報曰君學成師範縉紳歸慕仰髙希驥歴年滋多詩曰髙山仰止景行行止法言曰希驥之馬亦驥之乘希顔之人亦顔之徒希慕也旋轅兼道渴於言侍沭浴晨興昧旦守門實望仁兄昭其懸遲懸心遲仰之劉攽曰正文仁兄案二漢未嘗相呼為仁兄且壹與皇甫未嘗相接何兄之稱劉表與袁譚言呼之仁君此下文亦有仁君作君字是以貴下賤握髪垂接易曰以貴下賤大得民也史記曰周公一沐三握髪以接天下之士髙可敷翫墳典起發聖意下則抗論當世消弭時灾豈悟君子自生怠倦失恂恂善誘之徳同亡國驕惰之志論語曰夫子恂恂然善誘人恂恂恭順貎盖見幾而作不俟終日易繋辭曰君子見幾而作不俟終日是以夙退自引畏使君勞詩曰大夫夙退無使君勞盖斷章以取義昔人或歴說而不遇或思士而無從皆歸之於天不尤於物歴說謂孔丘也論語孔子曰不怨天不尤人下學而上逹知我者其天乎馬融注云孔子不用於時而不怨天人不知己而亦不尤人也思士謂孟軻也孟軻欲見魯平公臧倉譖之孟軻曰余之不遇魯侯天也臧氏之子焉能使余不遇哉見孟子今壹自譴而已豈敢有猜仁君忽一匹夫於徳何損而逺辱手筆追路相尋誠足愧也壹之區區曷云量已其嗟可去謝也可食曷何也言區區之心不量已而至君門禮記曰齊大飢黔敖為食於路以待餓者有䝉𬒮輯屨貿貿而來曰嗟來食曰余唯不食嗟來之食以至於斯從而謝之不食而死仲尼曰其嗟也可去其謝也可食誠則頑薄實識其趣但闗節疢動膝灸懐潰人有四闗十二節請俟它日乃奉其情輒誦來貺永以自慰遂去不顧州郡爭致禮命十辟公府並不就終於家初袁逄使善相者相壹云仕不過郡吏竟如其言著賦頌箴誄書論及雜文十六篇劉梁傳劉梁字曼山一名岑東平寧陽人也寧陽縣故城在兗州龔丘縣南梁宗室子孫而少孤貧賣書於市以自資常疾世多利交以邪曲相黨乃著破羣論時之覽者以為仲尼作春秋亂臣知懼孟子曰孔子成春秋亂臣賊子懼也今此論之作俗士豈不愧心其文不存又著辯和同之論其辭曰夫事有違而得道有順而失義有愛而為害有惡而為美其故何乎盖明智之所得闇偽之所失也是以君子之於事也無適無莫必考之以義焉論語曰君子之於天下也無適也無莫也義之與比得由和興失由同起故以可濟否謂之和好惡不殊謂之同春秋傳曰和如羮焉酸苦以劑其味左傳劑作齊爾雅曰劑剪齊也音子隨反今人相傳劑音在計反君子食之以平其心同如水焉若以水濟水誰能食之琴瑟之專一誰能聼之左傳晏子對齊景公辭也是以君子之行周而不比和而不同忠信為周阿黨為比以救過為正以匡惡為忠經曰將順其美匡救其惡則上下和睦能相親也昔楚恭王有疾召其大夫曰不榖不徳少主社稷楚恭王名審左傳楚王曰生十年而䘮先君故云少主社稷失先君之緒覆楚國之師緒業也謂鄢陵之戰為晉所敗不榖之罪也若以宗廟之靈得保首領以殁請為靈若厲大夫許諸諡法亂而不損曰靈殺戮不辜曰厲左傳曰大夫擇焉莫對及五命乃許之諸之也及其卒也子囊曰不然子囊楚令尹名午夫事君者從其善不從其過赫赫楚國而君臨之撫正南海訓及諸夏其寵大矣寵榮也有是寵也而知其過可不謂恭乎大夫從之諡法既過能改曰恭案此楚語之文此違而得道者也及靈王驕淫暴虐無度芋尹申亥從王之欲以殯於乾谿殉之二女此順而失義者也國語楚靈王子圍為章華之臺伍舉對曰君為此臺國人罷焉財用盡焉年榖敗焉數年乃成左傳芋尹申亥申無宇之子也乾谿之役申亥曰吾父再奸王命王不誅恵孰大焉乃求王遇諸棘闈以王歸王縊申亥以其二女殉而葬之也劉攽曰注楚靈王子圍案文多一子字鄢陵之役晉楚對戰陽榖獻酒子反以斃此愛而害之者也淮南子云楚恭王與晉人戰於鄢陵戰酣恭王傷司馬子反渇而求飲豎陽榖奉酒而進之子反之為人也嗜酒而甘之不能絶於口遂醉而卧恭王欲復戰使人召子反子反辭以疾王駕而往之入幄中而聞酒臭恭王大怒斬子反以為戮臧武仲曰孟孫之惡我藥石也季孫之愛我美疢也疢毒滋厚石猶生我此惡而為美者也武仲臧孫紇也左傳孟孫死臧孫入哭甚哀多涕出其御曰孟孫之惡子也而哀如是季孫若死其若之何臧孫曰季孫之愛我疾疢也孟孫之惡我藥石也美疢不如惡石夫石猶生我疢之美其毒滋多言石能除己疾也孔子曰智之難也有臧武仲之智而不容於魯國抑有由也作而不順施而不恕也季武子無適子公彌長悼子少武子愛悼子欲立之訪於申豐曰不可訪於臧紇曰飲我酒吾為子立之季氏飲大夫酒臧紇為客既獻臧孫命北面重席新罇絜之召悼子降逆之大夫皆起悼子乃立季氏以公彌為馬正其後公彌立孟孫羯與其構臧紇於季氏臧紇奔齊齊候將與臧紇田臧孫聞之見齊候與之言伐晉對曰多則多矣抑君似鼠鼠晝伏夜動不穴寢廟畏人故也今君聞晉之亂而後作焉寧將事之非鼠如何乃不與田注曰紇知齊侯將敗不欲受其邑故以比鼠欲使怒而止也見左傳蓋善其知義譏其違道也夫知而違之偽也不知而失之闇也闇與偽焉其患一也患之所在非徒在智之不及又在及而違之者矣故曰智及之仁不能守之雖得之必失之也論語之文夏書曰念兹在兹庶事恕施忠智之謂矣兹此也念此事也在此身也言行事當常念如在已身也庶衆也言衆事恕已而施行斯可謂忠而有智矣故君子之行動則思義不為利回不為義疚左傳曰君子動則思禮行則思義不為利回不為義疚杜預注云回邪也疚病也進退周旋唯道是務茍失其道則兄弟不阿茍得其義雖仇讐不廢故解狐䝉祁奚之薦二叔被周公之害左傳曰晉祁奚請老晉侯問嗣焉稱解狐其讐也勃鞮以逆文為成勃鞮晉寺人名披左傳晉獻公使寺人披伐公子重耳於蒲披斬其祛及文公歸國吕甥卻芮將焚公宫而殺文公寺人披以吕郤之難告之言初雖逆文公後竟成之也傅瑕以順厲為敗左傳言鄭厲公為祭仲所逐後侵鄭及大陵獲鄭大夫傅瑕傅瑕曰茍舎我吾請納子厲公與之盟而赦之傅瑕殺鄭子而納厲公遂殺傅瑕也管蘇以憎忤取進申侯以愛從見退考之以義也新序曰楚恭王有疾告諸大夫曰管蘇犯我以義違我以禮與處不安不見不思然而有得焉吾死之後爵之於朝申侯伯順吾所欲行吾所樂與處則安不見則思然未嘗有得焉必速遣之故曰不在逆順以義為斷不在憎愛以道為貴禮記曰愛而知其惡憎而知其善考義之謂也桓帝時舉孝廉除北新城長北新城屬涿縣告縣人曰昔文翁在蜀道著巴漢前書文翁為蜀郡太守興起學校比於魯衛也庚桑瑣隸風移碨磥瑣碎也莊子曰老𥅆之役有庚桑楚者偏得老聃之道以北居碨磥之山居三年碨壘大穰碨壘之人相與言曰庚桑子之始來吾灑然異之今吾日計之不足嵗計之有餘庶㡬其聖人乎碨音猥磥音盧罪反吾雖小宰猶有社稷論語曰子路將使子羔為費宰曰有民人焉有社稷焉茍赴期㑹理文墨豈本志乎乃更大作講舎延聚生徒數百人朝夕自往勸誡身執經卷試䇿殿最儒化大行此邑至後猶稱其教焉特召入拜尚書郎累遷後為野王令未行光和中病卒孫楨亦以文才知名魏志楨字公幹為司空軍謀祭酒五官郎將文學與徐幹陳琳阮瑀應瑒俱以文章知名轉為平原侯庶子邊讓傳邊讓字文禮陳留浚儀人也少辯博能屬文作章華賦雖多淫麗之辭而終之以正亦如相如之諷也章華臺解見馮衍傳揚雄曰辭人之賦麗以淫司馬相如作上林賦發倉廪以救貧窮補不足恤鰥寡存孤獨出徳號省刑罰此為諷也其辭曰楚靈王既遊雲夢之澤息於荆臺之上前方淮之水左洞庭之波洞庭湖在今岳州西南右顧彭蠡之隩南眺巫山之阿說苑曰楚昭王欲之荆臺遊司馬子綦進諫曰荆臺之遊左洞庭之波右彭蠡之水南望獵山下臨方淮其地使人遺老而忘死也王不可遊也巫山在䕫州巫山縣東延目廣望騁觀終日顧謂左史倚相曰盛哉斯樂可以遺老而忘死也說苑此並司馬子綦諫昭王之言於是遂作章華之臺築乾谿之室史記曰靈王次於乾谿樂乾谿不能去窮木土之技單珍府之實舉國營之數年乃成技巧也單盡也國語楚靈王為章華之臺與伍舉升焉曰臺美夫對曰國君安人以為樂今君為此臺也國人罷焉財用盡焉年榖敗焉百姓煩焉軍國苦之數年乃成設長夜之淫宴作北里之新聲史記紂為酒池肉林使男女倮而相逐其間為長夜之飲使師涓作新聲北里之舞靡靡之樂也於是伍舉知夫陳蔡之將生謀也陳蔡二國先為楚所滅也乃作詩賦以諷之胄髙陽之苖𦙍兮承聖祖之洪澤胄𦙍也髙陽帝顓頊也帝系曰顓頊娶於滕隍氏女而生老童是為楚先楚辭曰帝髙陽之苖裔兮建列藩於南楚兮等威靈於二伯老童之後鬻熊事周文王早卒至孫熊繹周成王時封於楚其後子孫隆盛與齊晉强二伯齊桓晉文也劉攽曰注與齊晉强案文少一爭字超有商之大彭兮越隆周之兩虢國語曰商伯大彭豕韋左傳曰虢仲虢叔王季之穆也逹皇佐之髙勲兮馳仁聲之顯赫皇佐謂鬻熊佐文王也左傳曰楚自克庸以來其君無日不討國人而訓之于人生之不易禍至之無日戒懼之不可以怠此馳仁聲也惠風春施神武電斷華夏肅清五服攸亂謂靈王承先世仁惠之風如春普施神武威稜如電雷之斷決也五服甸侯綏要荒也亂理也旦垂精於萬機兮夕回輦於門館設長夜之歡飲兮展中情之嬿婉嬿安也婉美也婉協韻音於願反竭四海之妙珍兮盡生人之祕玩爾乃携窈窕從好仇窈窕幽閑也仇匹也毛詩曰窈窕淑女君子好仇徑肉林登糟丘史記紂作糟丘酒池懸肉以為林也蘭肴山竦椒酒淵流蘭肴芳若蘭也椒酒置椒酒中也楚辭曰蕙肴兮蘭籍桂酒兮椒漿激𤣥醴於清池兮靡微風而行舟登瑶臺以回望兮冀彌日而消憂彌終也楚辭曰望瑶臺而偃蹇於是招宓妃命湘娥宓妃洛水之神女也湘娥堯之二女娥皇女英湘水之神也齊倡列鄭女羅楚辭曰二八齊容起鄭舞揚激楚之清宫兮展新聲而長歌激楚曲名也淮南子曰激楚結風繁手超於北里妙舞麗於陽阿左傳曰煩手淫聲慆堙心耳乃忘平和陽阿解見馬融傳金石類聚絲竹羣分被輕袿曵華文方言曰袿謂之裾釋名曰婦人上服謂之袿羅衣飄颻組綺繽紛組綬也綺綾也縱輕軀以迅赴若孤鵠之失羣振華𬒮以逶迤若遊龍之登雲於是歡嬿既洽長夜向半琴瑟易調繁手改彈清聲發而響激微音逝而流散振弱支而紆繞兮若綠繁之垂幹忽飄颻以輕逝兮似鸞飛於天漢舞無常態鼓無定節尋聲響應修短靡跌跌蹉也長䄂奮而生風清氣激而繞結歌聲激發縈繞纒結爾乃妍媚遞進巧弄相加俯仰異容忽兮神化化協韻音花體迅輕鴻榮曜春華進如浮雲退如激波雖復柳惠能不咨嗟柳下惠展季也家語曰柳下惠嫗不逮門之女國人不稱其亂言其貞也於是天河既回淫樂未終清籥發徴激楚揚風籥如笛六孔於是音氣發於絲竹兮飛響軼於雲中比目應節而雙躍兮比目魚一名鰈一名王餘不比不行今江東呼為板魚韓詩外傳曰伯牙鼓琴㳺魚出聼孤雌感聲而鳴雄枚乘七發曰暮則覊雌迷鳥宿焉覊雌孤雌也美繁手之輕妙兮嘉新聲之彌隆於是衆變已盡羣樂既考考成也歸乎生風之廣夏兮脩黄軒之要道黄帝軒轅氏得房中之術於𤣥女握固吸氣還精補腦可以長生說苑雍門周說孟嘗君曰廣夏䆳房下羅幃來清風携西子之弱腕兮援毛嬪之素肘西子西施也越絶書曰越王句踐得採薪二女西施鄭旦以獻吳王毛嬪毛嬙也莊子曰毛嬙麗姬人之美者形便娟以嬋媛兮若流風之靡草淮南子曰今舞者便娟若秋葯被風葯白芷也美儀操之姣麗兮忽遺生而忘老爾乃清夜晨妙技單收尊俎徹鼓盤張衡七盤賦曰歴七盤而屣躡也惘焉若酲撫劒而歎酲酒病也慮理國之須才悟稼穡之艱難美吕尚之佐周善管仲之輔桓將超世而作理焉沈湎於此歡於是罷女樂墮瑶臺思夏禹之卑宫慕有虞之土階墨子曰虞舜土階三尺茅茨不剪舉英竒於仄陋拔髦秀於蓬萊蓬蒿草萊之間也爾雅曰髦俊也君明哲以知人官隨任而處能能協韻音乃來反百揆時敘庶績咸熙諸侯慕義不召同期尚書武王伐紂八百諸侯不期而至繼髙陽之絶軌崇成莊之洪基史記楚成王布徳施惠結舊好於諸侯使人獻於天子莊王成王孫也納伍舉蘇縱之諫罷淫樂聼國政所誅數百人所進數百人國人大悅雖齊桓之一匡豈足方於大持榖梁傳曰齊桓公為陽榖之㑹一匡天下匡正也爾乃育之以仁臨之以明致䖍報於鬼神盡肅恭乎上京言楚尊事周室馳淳化於黎元永歴世而太平大將軍何進聞讓才名欲辟命之恐不至詭以軍事徴召既到署令史續漢志曰大將軍下有令史及御史屬三十一人進以禮見之讓善占射能辭對時賔客滿堂莫不羡其風府掾孔融王朗並脩刺候焉朗字景興魏志有傳議郎蔡邕深敬之以為讓宜處髙任乃薦於何進曰伏惟幕府初開博選清英華髪舊徳並為元龜華髪白首也元龜所以知吉凶尚書曰格人元龜雖振鷺之集西雍濟濟之在周庭無以或加韓詩曰振鷺于飛于彼西雍薛君章句曰鷺潔白之鳥也西雍文王辟雍也言文王之時辟雍學士皆潔白之人也又曰濟濟多士文王以寜竊見令史陳留邊讓天授逸才聰明賢智髫齓夙孤不盡家訓髫剪髪為鬌也齓毁齒也及就學廬便受大典初渉諸經見本知義授者不能對其問章句不能逮其意心通性逹口辯辭長非禮不動非法不言若處狐疑之論定嫌審之分經典交至撿括參合衆夫寂焉莫之能奪也使讓生在唐虞則元凱之次運值仲尼則顔冉之亞豈徒俗之凡偶近器而已者哉劉攽曰案文多一者字階級名位亦宜超然若復隨輩而進非所以章瓌偉之髙價昭知人之絶明也傳曰函牛之鼎以烹鷄多汁則淡而不可食少汁則熬而不可熟莊子曰函牛之鼎沸蟻不得措一足焉吕氏春秋曰白圭對魏王曰市丘之鼎以烹雞多洎之則淡不可食少洎之則焦而不熟也函容也洎汁也此言大噐之於小用固有所不宜也邕竊悁邑悁邑憂憤也怪此寳鼎未受犧牛大羮之和久在煎熬臠割之間願明將軍回謀垂慮裁加少納貢之機密展之力用展陳也若以年齒為嫌則顔回不得貫徳行之首子竒終無阿宰之功說苑曰子竒年十八為阿宰有善績茍堪其事古今一也讓後以髙才擢進屢遷出為九江太守不以為能也初平中王室大亂讓去官還家恃才氣不屈曹操多輕侮之言建安中其鄉人有搆讓於操操告郡就殺之文多遺失酈炎傳酈炎字文勝范陽人酈食其之後也炎有文才解音律言論給㨗多服其能理給敏也靈帝時州郡辟命皆不就有志氣作詩二篇曰大道夷且長窘路狹且促脩翼無卑栖逺趾不歩局窘廹也舒吾陵霄羽奮此千里足超邁絶塵驅倐忍誰能逐賢愚豈嘗類禀性在清濁富貴有人籍貧賤無天錄富貴者為人所載於典籍也貧賤者不載於天錄天錄謂若蕭曹見名於圗書通塞茍由已志士不相卜言通塞茍若由已則志士不湏相卜也故蔡澤謂唐舉曰富貴吾自取之所不知者夀命也陳平敖里社陳平為里社宰分肉均里中曰善哉陳孺子之為宰也曰使平宰天下亦猶是見前書韓信釣河曲韓信家貧無行不得為吏釣于淮陰城下河者水之總名也終居天下宰食此萬鍾祿大斛四斗曰鍾徳音流千載功名重山岳靈芝生河洲動揺因洪波蘭榮一何晩嚴霜瘁其柯哀哉二芳草不植太山阿文質道所貴遭時用有嘉絳灌臨衡宰謂誼崇浮華賢才抑不用逺投荆南沙賈誼欲革漢土徳改定律令絳侯周勃及灌嬰共毁之文帝以誼為長沙太傅見前書抱玉乘龍驥不逢樂與和伯樂卞和安得孔仲尼為世陳四科謂徳行政事言語文學也炎後風病慌忽性至孝遭母憂病甚發動妻始産而驚死妻家訟之收繫獄炎病不能理對熹平六年遂死獄中時年二十八尚書盧植為之誄讚以昭其懿徳侯瑾傳侯瑾字子瑜敦煌人也少孤貧依宗人居性篤學恒傭作為資暮還輒㸐柴以讀書㸐古然字常以禮自牧易曰卑以自牧牧養也獨處一房如對嚴賔焉州郡累召公車有道徵並稱疾不到作矯世論以譏刺當時而徙入山中覃思著述覃静也以莫知於世故作應賔難以自寄又案漢記撰中興以後行事為皇徳傳三十篇行於世餘所作雜文數十篇多亡失西河人敬其才而不敢名之皆稱為侯君云髙彪傳髙彪字義方吳郡無錫人也無錫今常州縣家本單寒至彪為諸生遊太學有雅才而訥於言常從馬融欲訪大義融疾不獲見乃覆刺遺融書曰承服風問從來有年風問風猷令問故不待介者而謁大君子之門冀一見龍光以敘腹心之願毛詩曰既見君子為龍為光龍寵也不圗遭疾幽閉莫啟昔周公旦父文兄武九命作伯以尹華夏猶揮沐吐餐垂接白屋白屋匹夫也故周道以隆天下歸徳公今養痾傲士故其宜也融省書慙追還之彪逝而不顧後郡舉孝廉試經第一除郎中校書東觀數奏賦頌竒文因事諷諫靈帝異之時京兆第五永為督軍御史使督幽州百官大㑹祖餞於長樂觀議郎蔡邕等皆賦詩彪乃獨作箴曰文武將墜乃俾俊臣俾使也整我皇綱董此不䖍董正也古之君子即戎忘身易曰不利即戎司馬穰苴曰將受命之日忘其家援枹鼓即忘其身明其果毅尚其桓桓左傳曰殺敵為果致果為毅尚書曰朂哉夫子尚桓桓桓桓武貎吕尚七十氣冠三軍詩人作歌如鷹如鸇太公年七十遇文王毛詩曰惟師尚父時惟鷹揚天有太一五將三門太一式凡舉事皆欲發三門順五將發三門者開門休門生門五將者天目文昌等地有九變丘陵山川孫子九變篇曰用兵有散地有輕地有争地有交地有衢地有重地有汜地有圍地有死地諸侯自戰其地為散地入人之地而不深為輕地我得則利彼得亦利者為争地我可以往彼可以來為交地諸侯之地三屬先至而得衆為衢地入人地深倍城邑多為重地行山林阻沮澤難行之道為汜地所由入者隘所從歸者少彼寡可以擊吾衆者為圍地疾戰則存不疾戰則亡為死地通九變之利知用兵矣劉攽曰注有汜地案孫子汜當作圯人有計策六竒五間陳平凡出六竒䇿孫子曰用間有五有因間有内間有反間有死間有生間五間俱起莫知其道是謂神紀人君之寳也因間者因其鄉人而用之也内間者内其官人而用之也反間者因其敵間而用之也死間者為誑事於外令吾間知之而得於敵者也生間者是反報之者也總兹三事謀則咨詢總天地人之事而詢謀於衆也無曰已能務在求賢淮陰之勇廣野是尊臣賢案前書韓信破趙得廣武君李左車解其縳而師事之而此作廣野案廣野君酈食其無韓信師事處盖誤也周公大聖石碏純臣以威克愛以義滅親周公誅管蔡石碏殺其子厚也克勝也前書孫寳曰周公上聖召公大賢尚書曰威克厥愛允濟左傳曰石碏純臣也大義滅親其是之謂乎勿謂時險不正其身勿謂無人莫識已真忘富遺貴福禄乃存枉道依合復無所觀曲道以合時者不足觀也先公髙節越可永遵佩藏斯戒以厲終身邕等甚美其文以為莫尚也後遷内黄令帝勑同僚臨送祖於上東門洛陽城東面北頭門詔東觀畫彪像以勸學者彪到官有徳政上書薦縣人申屠蟠等病卒於官文章多亡子岱亦知名張超傳張超字子並河間鄚人也今嬴州鄚縣留侯良之後有文才靈帝時從車騎將軍朱儁征黄巾為别部司馬著賦頌碑文薦檄牋書謁文嘲凡十九篇超又善於草書妙絶時人世共傳之禰衡傳禰衡字正平平原般人也般縣故城在今徳州平昌縣東般音卜滿反少有才辯而氣尚剛傲好矯時慢物興平中避難荆州建安初來遊許下始逹潁川乃陰懐一刺既而無所之適至於刺字漫滅是時許都新建賢士大夫四方來集或問衡曰盍從陳長文司馬伯達乎陳羣字長文司馬朗字伯達河内温人對曰吾焉能從屠沽兒耶又問荀文若趙稚長云何趙為盪寇將軍見魏志衡曰文若可借面弔䘮稚長可使監厨請客典略曰衡見荀儀容但有貎耳故可弔䘮趙有腹大健噉肉故可監厨也劉攽曰注有腹大案舊作腹尺唯善魯國孔融及𢎞農楊修常稱曰大兒孔文舉小兒楊徳祖餘子碌碌莫足數也融亦深愛其才衡始弱冠而融年四十遂與為交友上疏薦之曰臣聞洪水横流帝思俾乂孟子曰堯時洪水横流汎濫于天下尚書帝曰咨湯湯洪水方割有能俾乂俾使也乂理也旁求四方以招賢俊尚書曰旁求天下昔孝武繼統將𢎞祖業疇咨熙載羣士響臻尚書帝堯曰疇咨若時登庸又曰有能奮庸熙帝之載疇誰也熙廣也載事也陛下叡聖纂承基緒遭遇戹運勞謙日昃易曰勞謙君子有終吉尚書敘文王徳曰自朝至于日中昃不遑暇食言不敢懈怠也惟岳降神異人並出毛詩曰惟岳降神生甫及申公孫𢎞傳贊曰異人並出竊見處士平原禰衡年二十四字正平淑質貞亮英才卓礫初渉蓺文升堂覩奥目所一見輒誦於口耳所瞥聞不忘於心性與道合思若有神淮南子曰所謂真人者性合於道也𢎞羊潛計安世黙識以衡準之誠不足怪前書曰桑𢎞羊雒陽賈人子以心計年十三為侍中又曰張安世字子孺為郎上行幸河東嘗亡書三篋詔問莫能知唯安世識之具上其事後購求得書以相校無所遺失忠果正直志懐霜雪見善若驚疾惡如讐國語楚藍尹亹謂子西曰夫闔閶聞一善言若驚得一士若賞任座抗行史魚厲節殆無以過也吕氏春秋魏文侯飲問諸大夫曰寡人如何主也任座曰君不肖君也剋中山不以封君之弟而以封君子是以知君不肖君也論語孔子曰直哉史魚邦有道如矢邦無道如矢也鷙鳥累伯不如一鶚鄒陽上書之言也鄂大鵰也使衡立朝必有可觀飛辯騁辭溢氣坌涌解疑釋結臨敵有餘昔賈誼求試屬國詭係單于前書賈誼曰何不試以臣為屬國之官以主匈奴行臣之計請必繫單于之頸而制其命終軍欲以長纓牽致勁越前書終軍曰願受長纓必覊南越王而致之闕下也弱冠慷慨前世美之近日路粹嚴象亦用異才擢拜臺郎衡宜與為比如得龍躍天衢振翼雲漢揚聲紫微垂光虹蜺足以昭近署之多士增四門之穆穆尚書曰賔於四門四門穆穆鈞天廣樂必有竒麗之觀史記曰趙簡子疾五日不知人大夫皆懼醫扁鵲曰血脉理也昔秦穆公如此七日寤寤而曰我之帝所甚樂今主君之疾與之同不出三日必間間必有言也居二日果寤語大夫曰我之帝所甚樂與百神遊於鈞天廣樂九奏其聲動心也帝室皇居必蓄非常之寳若衡等輩不可多得激楚揚阿至妙之容臺牧者之所貪諸本並作臺牧未詳其義融集作堂牧飛兔騕䮍絶足奔放良樂之所急吕氏春秋曰飛騕䮍古駿馬也髙誘注曰日行萬里王良伯樂善御人也臣等區區敢不以聞融既愛衡才數稱述於曹操操欲見之而衡素相輕疾自稱狂病不肯往而數有恣言操懐忿而以其才名不欲殺之聞衡善擊鼓乃召為鼓史因大會賔客閱試音節諸史過者皆令脫其故衣更着岑牟單絞之服文士傳曰魏太祖欲辱衡乃令人錄用為鼓史後至八月朝普天閲試鼓節作三重閣列坐賔客以帛絹制作衣一岑牟一單絞及小禈通史志曰岑牟鼔角士胄也鄭𤣥注禮記曰絞蒼黄之色也次至衡衡方為漁陽參撾蹀𨄌而前文士傳曰衡擊鼓作漁陽參搥蹋地來前躡馺足脚容態不常鼓聲甚悲易衣畢復擊鼓參搥而去至今有漁陽參搥自衡始也臣賢案搥及撾並擊鼓杖也參撾是擊鼓之法而王僧孺詩云散度廣陵音參寫漁陽曲而於其詩自音云參音七紺反後諸文人多同用之據此詩意則參曲奏之名則撾字入於下句全不成文下云復參撾而去足知參撾二字當相連而讀參字音為去聲不知何所慿也參七甘反容態有異聲節悲壯聼者莫不慷慨衡進至操前而止吏訶之曰鼓史何不改裝而輕敢進乎衡曰諾於是先解衵衣杜預注左傳曰衵近身衣也音女一反次釋餘服裸身而立徐取岑牟單絞而着之畢復參撾而去顔色不怍怍羞也操笑曰本欲辱衡衡反辱孤孔融退而數之曰正平大雅固當爾邪雅正也言大雅君子不當爾因宣操區區之意衡許往融復見操說衡狂疾今求得自謝操喜勑門者有客便通待之極晏衡乃着布單衣踈巾手持三尺梲杖說文曰梲大杖也音佗結反坐大營門以杖箠地大罵吏白外有狂生坐於營門言語悖逆請收案罪操怒謂融曰禰衡豎子孤殺之猶雀鼠耳顧此人素有虛名逺近將謂孤不能容之今送與劉表視當何如於是遣人騎送之臨發衆人為之祖道先供設於城南乃更相戒曰禰衡勃虐無禮今因其後到咸當以不起折之也及衡至衆人莫肯興衡坐而大號衆問其故衡曰坐者為冢臥者為屍屍冢之間能不悲乎劉表及荆州士大夫先服其才名甚賔禮之文章言議非衡不定表嘗與諸文人共草章奏並極其才思時衡出還見之開省未周因毁以抵地抵擲也表憮然為駭憮然怪之也音撫衡乃從求筆札須㬰立成辭義可觀表大悅益重之後復侮慢於表表耻不能容以江夏太守黄祖性急故送衡與之祖亦善待焉衡為作書記輕重疎密各得體宜祖持其手曰處士此正得祖意如祖腹中之所欲言也祖長子射射音亦為章陵太守尤善於衡嘗與衡俱遊共讀蔡邕所作碑文射愛其辭還恨不繕寫衡曰吾雖一覽猶能識之識記也音志唯其中石缺二字為不明耳因書出之射馳使寫碑還校如衡所書莫不歎伏射時大㑹賔客人有獻鸚鵡者射舉巵於衡曰願先生賦之以娛嘉賔衡覽筆而作劉攽曰按覽當作攬文無加㸃辭采甚麗後黄祖在䝉衝船上釋名曰外狹而長曰䝉衝以衝突敵船大㑹賔客而衡言不遜順祖慙乃訶之衡更熟視曰死公云等道死公罵言也等道猶今言何勿語也劉攽曰按注勿當作物又少云字何物者猶言何物老嫗古語如此者多祖大怒令五百將出五百猶今之問事也解見宦者傳欲加箠衡方大罵祖恚遂令殺之祖主簿素疾衡即時殺焉射徒跣來救不及祖亦悔之乃厚加棺斂衡時年二十六其文章多亡云贊曰情志既動篇辭為貴毛詩序云情發於中而形於言詩者志之所之故情志動而篇辭作斯文章之為貴抽心呈貎非雕非蔚雕斵也易曰君子豹變其文蔚殊狀共體同聲異氣言觀麗則永監淫費揚雄曰詩人之賦麗以則辭人之賦麗以淫禮記曰不辭費後漢書卷一百十下後漢書卷一百十下考證邊讓傳議郎蔡邕深敬之以為讓宜處髙任乃薦於何進日知錄曰蔡邕傳謂邕亡命江海積二十年中平六年靈帝崩董卓為司空辟之稱疾不就卓切勅州郡舉邕詣府邕不得已到署祭酒而文苑傳有議郎蔡邕薦邊讓於大將軍何進一書按中平元年黄巾起以何進為大將軍正邕亡命之時無緣得奏記薦人也禰衡傳于是先解衵衣相諸本俱誤袒從左氏傳杜注改正後漢書卷一百十下考證
