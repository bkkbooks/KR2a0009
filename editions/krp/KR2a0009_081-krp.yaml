body:
  text: 後漢書卷八十一宋宣城太守范煜撰唐章懐太子賢注李陳龎陳橋列傳第四十一李恂傳李恂字叔英安定臨涇人也少習韓詩韓嬰所傳詩也教授諸生常數百人太守潁川李鴻請署功曹未及到而州辟為從事㑹鴻卒恂不應州命而送鴻喪還鄉里既葬留起冢墳持喪三年辟司徒桓虞府後拜侍御史持節使幽州宣布恩澤慰撫北狄所過皆圖寫山川屯田聚落百餘卷悉封奏上肅宗嘉之拜兖州刺史以清約率下常席羊皮服布被遷張掖太守有威重名時大將軍竇憲將兵屯武威天下州郡逺近莫不脩禮遺恂奉公不阿為憲所奏免後復徵拜謁者使持節領西域副校尉西域殷富多珍寳諸國侍子及督使賈胡督使主蕃國之使也賈胡胡之商賈也數遺恂奴婢宛馬金銀香罽之屬一無所受袁山松書曰西域出諸香石宻罽織毛為布者北匈奴數斷西域車師伊吾隴沙以西使命不得通前書曰車師前國王居交河城伊吾故城在今瓜州晉昌縣北廣志曰流沙在玉門闗外東西數百里有三斷名曰三隴也恂設購賞遂斬虜帥縣首軍門自是道路夷清威恩並行遷武威太守後坐事免歩歸鄉里潜居山澤結草為廬獨與諸生織席自給會西羌反叛恂到田舍為所執獲羌素聞其名放遣之恂因詣洛陽謝時嵗荒司空張敏司徒魯恭等各遣子饋糧悉無所受徙居新安關下拾橡實以自資橡櫟實也武帝元鼎三年徙函谷關於新安也年九十六卒陳禪傳陳禪字紀山巴郡安漢人也仕郡功曹舉善黜惡為邦内所畏察孝亷州辟治中從事續漢志曰毎州有治中從事也時刺史為人所上受納臧賂禪當傳考傳謂逮捕而考之也無它所齎但持喪歛之具而已及至笞掠無算五毒畢加禪神意自若辭對無變事遂散釋車騎將軍鄧隲聞其名而辟焉舉茂才時漢中蠻夷反畔以禪為漢中太守夷賊素聞其名聲即時降服遷左馮翊入拜諫議大夫永寜元年西南夷撣國王撣音徒丹反劉攽曰案和紀皆作擅音撣字亦無作平聲者而此音徒丹當由注者見前音擅誤以為壇而音之也又檢説文擅音徒旱反如此則與徒丹平側之間耳語音或容有輕重之殊然注書當定從一説不宜二三也獻樂及幻人能吐火自支解易牛馬頭眀年元㑹作之於庭安帝與羣臣共觀大竒之禪獨離席舉手大言曰昔齊魯為夾谷之㑹齊作侏儒之樂仲尼誅之家語曰魯定公與齊侯㑹於夾谷孔子攝相事齊奏中宫之樂倡優戲於前孔子趨曰匹夫而侮諸侯罪應誅於是斬侏儒手足異處劉攽曰案文當作首足又曰放鄭聲逺佞人論語孔子之言帝王之庭不宜設夷狄之技尚書陳忠劾奏禪曰古者合歡之樂舞於堂四夷之樂陳於門故詩云以雅以南韎任朱離詩小雅鼓鐘之詩曰以雅以南以籥不僣薛君云南夷之樂曰南四夷之樂唯南可以和於雅者以其人聲音及籥不僣差也周禮鞮鞻氏掌四夷之樂鄭𤣥注云東方曰韎南方曰任西方曰朱離北方曰禁毛詩無韎任朱離之文葢見齊魯之詩也今亡韎音昧禮記曰九夷八蠻六戎五狄來朝立於眀堂四門之外也今撣國越流沙踰縣度前書西域傳曰縣度者山名也谿谷不通以繩索相引而度去陽關五千八百八十里萬里貢獻非鄭衛之聲佞人之比而禪廷訕朝政訕謗也請劾禪下獄有詔勿収左轉為𤣥菟候城障尉侯城縣在遼東詔敢不之官上妻子從者名禪既行朝廷多訟之㑹北匈奴入遼東追拜禪遼東太守胡憚其威彊退還數百里禪不加兵但使吏卒往曉慰之單于随使還郡禪於學行禮為説道義以感化之單于懐服遺以胡中珍貨而去及鄧騭誅廢禪以故吏免復為車騎將軍閻顯長史順帝即位遷司隸校尉眀年卒于官子澄有清名官至漢中太守禪曾孫寳亦剛壮有禪風為州别駕從事顯名州里龎參傳龎參字仲達河南􅚆氏人也初仕郡未知名河南尹龎奮見而竒之舉為孝廉拜左校令坐法輸作若盧若盧獄名永初元年涼州先零種羌反畔遣車騎將軍鄧騭討之參於徒中使其子俊上書曰方今西州流民擾動而徵發不絶水潦不休地力不復言其耗損不復於舊重之以大軍疲之以逺戍農功消於轉運資財竭於徵發田疇不得墾闢禾稼不得収入搏手困窮無望来秋兩手相搏言無計也百姓力屈不復堪命臣愚以為萬里運糧逺就羌戎不若總兵養衆以待其疲車騎將軍騭宜且振旅留征西校尉任尚使督涼州士民轉居三輔休徭役以助其時止煩賦以益其財令男得耕種女得織絍絍音如深反杜預注左傳云織絍織繒布也然後畜精鋭乗懈沮出其不意攻其不備則邉人之仇報奔北之耻雪矣書奏會御史中丞樊凖上疏薦參曰臣聞鷙鳥累百不如一鶚前書鄒陽諫吴王之辭也鶚大鵬也昔孝文皇帝悟馮唐之言而赦魏尚之罪使為邉守匈奴不敢南向前書馮唐謂文帝曰臣聞魏尚為雲中守匈奴逺避不近雲中之塞上功莫府一言不相應文吏以法繩之愚以為陛下法太眀而賞太輕文帝悦是日令唐持節赦魏尚復以為雲中守也夫以一臣之身折方面之難者選用得也臣伏見故左校令河南龎參勇謀不測卓爾竒偉高才武略有魏尚之風前坐微法輸作經時今羌戎為患大軍西屯臣以為如參之人宜在行伍惟眀詔採前世之舉觀魏尚之功免赦參刑以為軍鋒必有成効宣助國威鄧太后納其言即擢參於徒中召拜謁者使西督三輔諸軍屯而徵鄧騭還四年羌冦轉盛兵費日廣且連年不登榖石萬餘參奏記於鄧騭曰比年羌冦特困隴右供徭賦役為損日滋官負人責數十億萬責音側懈反今復募發百姓調取穀帛衒賣什物以應吏求外傷羌虜内困徵賦為羌冦所傷也遂乃千里轉糧逺給武都西郡塗路傾阻難勞百端疾行則鈔暴為害遲進則穀食稍損運糧散於曠野牛馬死於山澤縣官不足輙貸於民民已窮矣將從誰求名救金城而實困三輔三輔既困還復為金城之禍矣參前數言宜棄西域乃為西州士大夫所笑今茍貪不毛之地營恤不使之民恤憂也不使之人謂戎虜凶獷不堪為用暴軍伊吾之野以慮三族之外言勞師救逺以為親戚之憂慮果破涼州禍亂至今夫拓境不寜無益於彊多田不耕何救飢敝故善為國者務懐其内不求外利務富其民不貪廣土三輔山原曠逺民庶稀疏故縣邱城可居者多邱空也今宜徙邉郡不能自存者入居諸陵田戍故縣孤城絶郡以權徙之轉運逺費聚而近之徭役煩數休而息之此善之善者也騭及公卿以國用不足欲從參議衆多不同乃止拜參為漢陽太守郡人任棠者有竒節隐居教授參到先候之棠不與言但以薤一大本水一盂置户屏前自抱孫兒伏於户下主簿白以為倨參思其微意良乆曰棠是欲曉太守也水者欲吾清也㧞大本薤者欲吾擊强宗也抱兒當戸欲吾開門恤孤也於是歎息而還參在職果能抑强助弱以恵政得民元初元年遷䕶羌校尉畔羌懐其恩信眀年焼當羌種號多等皆降始復得還都令居通河西路令居縣屬金城郡令音零時先零羌豪僣號北地詔參將降羌及湟中義從胡七千人湟水名今在鄯州與行征西将軍司馬鈞期㑹北地擊之參於道為羌所敗既已失期乃稱病引兵還坐以詐疾徵下獄校書郎中馬融上書請之曰伏見西戎反畔冦鈔五州陛下愍百姓之傷痍哀黎元之失業單竭府庫以奉軍師昔周宣獫狁侵鎬及方詩小雅六月之詩曰侵鎬及方至於涇陽鄭𤣥注云鎬方皆北方地名孝文匈奴亦略上郡而宣王立中興之功文帝建太宗之號非惟兩主有眀叡之姿抑亦扞城有虓虎之助詩曰公侯干城又曰闞如虓虎干扞也虓虎怒貌也是以南仲赫赫列在周詩亞夫赳赳載於漢䇿詩曰赫赫南仲薄伐西戎周亞夫為漢將赳赳武貌竊見前䕶羌校尉龎參文武昭備智略𢎞逺既有義勇果毅之節兼以博雅深謀之姿又度遼將軍梁慬前統西域勤苦數年還留三輔功效克立間在北邉單于降服今皆幽囚陷於法網昔荀林父敗績於邲晉侯使復其位左傳曰晉荀林父及楚師戰於邲晉師敗績林父請死晉侯欲許之士貞子諫曰不可夫其敗也如日月之食何損於眀晉侯使復其位也孟眀視喪師於崤秦伯不替其官左傳曰晉敗秦師於崤獲百里孟眀視後赦而歸之秦伯曰孤之罪也不替孟眀故晉景并赤狄之土秦穆遂覇西戎左傳曰晉荀林父敗赤狄遂滅之晉侯賞林父狄臣千室亦賞士貞子瓜衍之縣曰吾獲狄土子之功也又曰秦伯伐晉遂覇西戎用孟眀也宜逺覽二君使參慬得在寛宥之科誠有益於折衝毗佐於聖化書奏赦參等後以參為遼東太守永建元年遷度遼将軍四年入為大鴻臚尚書僕射虞詡薦參有宰相器能順帝時以為太尉録尚書事是時三公之中參名忠直數為左右所陷毁以所舉用忤帝㫖司隸承風案之時當㑹茂才孝廉參以被奏稱疾不得㑹上計掾廣漢叚恭因會上疏曰伏見道路行人農夫織婦皆曰太尉龎參竭忠盡節徒以直道不能曲心孤立羣邪之間自處中傷之地臣猶冀在陛下之世當䝉安全而復以讒佞傷毁忠正此天地之大禁人主之至誠昔白起賜死諸侯酌酒相賀季子来歸魯人喜其紓難紓緩也季子魯公子季友也閔公之時國家多難以季子忠賢故請齊侯復之公羊傳曰季子来歸其言季子何賢也言其来歸何喜之也劉攽曰注言其来歸案文當云其言来歸誤倒之眀此書中多有誤倒一兩字者夫國以賢化君以忠安今天下咸欣陛下有此忠賢願卒寵任以安社稷書奏詔即遣小黄門視參疾太醫致羊酒後參夫人疾前妻子投於井而殺之參素與洛陽令祝良不平謝承書曰良字邵平長沙人聰明博學有才幹以廉平見稱也良聞之率吏卒入太尉府案實其事乃上參罪遂因灾異䇿免有司以良不先聞奏輙折辱宰相坐繫詔獄良能得百姓心洛陽吏人守闕請代其罪者日有數千萬人詔乃原刑陽嘉四年復以參為太尉永和元年以乆病罷卒於家陳龜傳陳龜字叔珍上黨泫氏人也泫氏故城今澤州高平縣也泫音公𤣥反家世邉將便習弓馬雄於北州龜少有志氣永建中舉孝廉五遷五原太守永和五年拜使匈奴中郎將時南匈奴左部反亂龜以單于不能制下外順内畔促令自殺坐徵下獄免後再遷拜京兆尹時三輔强豪之族多侵枉小民龜到厲威嚴悉平理其怨屈者郡内大悦㑹羌胡冦邉殺長吏驅略百姓桓帝以龜世諳邉俗拜為度遼將軍龜臨行上疏曰臣龜䝉恩累世馳騁邉垂雖展鷹犬之用頓斃胡虜之庭魂骸不返薦享狐狸猶無以塞厚責答萬分也至臣頑駑劉攽曰案文至臣無義當作臣至器無鈆刀一割之用過受國恩榮秩兼優生年死日永懼不報臣聞三辰不軌擢士為相蠻夷不恭㧞卒為将臣無文武之才而忝鷹揚之任詩曰維師尚父時維鷹揚上慙聖明下懼素餐素空也無功受祿為素餐雖歿軀體無所云補今西州邉鄙土地塉埆埆音覺又音確謂薄土也鞍馬為居射獵為業男寡耕稼之利女乏機杼之饒守塞候望懸命鋒鏑聞急長驅去不圖反自頃年以来匈奴數攻營郡謂郡有屯兵者即䕶羌校尉屯金城烏桓校尉屯上谷之類殘殺長吏侮略良細戰夫身膏沙漠居人首係馬鞍或舉國掩戸盡種灰滅孤兒寡婦號哭空城野無青草室如懸磬左傳曰室如懸磬野無青草言其屋居如磬之懸下無所有雖含生氣實同枯朽徃嵗并州水雨灾螟互生稼穡荒耗租更空闕更謂卒更錢也老者慮不終年少壮懼於困戹陛下以百姓為子品庶以陛下為父焉可不日呉勞神書曰文王至于日中呉不遑暇食也垂撫循之恩哉唐堯親捨其子以禪虞舜者是欲民遭聖君不令遇惡主也史記曰堯知子丹朱不肖不足授天下乃推授舜則天下得其利而丹朱病授丹朱則天下病而丹朱得其利堯曰終不以天下之病而利一人卒授舜以天下也劉攽曰注乃推授舜則天下得其利案史記本文更有授舜兩字故古公杖䇿其民五倍帝王世紀曰古公亶父是為大王為百姓所附狄人攻之事之以皮幣玉帛不能免焉王遂杖䇿而去踰梁山止於岐山之陽邑於周地豳人從者如歸市一年成邑二年成都三年五倍其初也文王西伯天下歸之帝王世記曰西伯至仁百姓襁負而至豈復輿金輦寳以為民惠乎近孝文皇帝感一女子之言除肉刑之法女子即太倉令淳于公之女緹縈也事見前書體徳行仁為漢賢主陛下繼中興之統承光武之業臨朝聽政而未留聖意且牧守不良或出中官懼逆上㫖取過目前呼嗟之聲招致灾害胡虜凶悍因衰緣隙而令倉庫單於豺狼之口功業無銖兩之効皆由將帥不忠聚姦所致前涼州刺史祝良初除到州多所糾罰太守令長貶黜將半政未踰時功効卓然實應賞異以勸功能改任牧守去斥姦殘又宜更選匈奴烏桓䕶羌中郎將校尉簡練文武授之法令除并涼二州今年租更寛赦罪隸埽除更始則善吏知奉公之祐惡者覺營私之禍胡馬可不窺長城塞下無候望之患矣帝覺悟乃更選幽并刺史自營郡太守都尉以下多所革易下詔為陳将軍除并涼一年租賦以賜吏民龜既到職州郡重足震慄鮮卑不敢近塞省息經用嵗以億計經常也大將軍梁冀與龜素有隙譖其沮毁國威挑取功譽挑取猶獨取也獨取其名如挑戰之義不為胡虜所畏坐徵還遂乞骸骨歸田里復徵為尚書冀暴虐日甚龜上疏言其罪状請誅之帝不省自知必為冀所害不食七日而死西域胡夷并涼民庶咸為舉哀弔祭其墓橋𤣥傳橋𤣥字公祖梁國睢陽人也七世祖仁從同郡戴徳學著禮記章句四十九篇號曰橋君學成帝時為大鴻臚祖父基廣陵太守父肅東萊太守𤣥少為縣功曹時豫州刺史周景行部到梁國𤣥謁景因伏地言陳相羊昌罪惡乞為部陳從事部猶領也窮案其姦景壮𤣥意署而遣之𤣥到悉収昌賔客具考臧罪昌素為大將軍梁冀所厚冀為馳檄救之景承㫖召𤣥𤣥還檄不發案之益急昌坐檻車徵𤣥由是著名舉孝廉補洛陽左尉左部尉也時梁不疑為河南尹𤣥以公事當詣府受對耻為所辱棄官還鄉里後四遷為齊相坐事為城旦刑竟徵再遷上谷太守又為漢陽太守時上邽令皇甫禎有臧罪𤣥収考髠笞死于冀市冀縣名屬漢陽郡一境皆震郡人上邽姜岐守道隐居名聞西州𤣥召以為吏稱疾不就𤣥怒𠡠督郵尹益逼致之曰岐若不至趣嫁其母趣音促益固争不能得遽曉譬岐岐堅臥不起郡内士大夫亦競往諫𤣥乃止時頗以為譏後謝病免復公車徵為司徒長史拜將作大匠桓帝末鮮卑南匈奴及高句驪嗣子伯固並畔為冦鈔四府舉𤣥為度遼將軍假黄鉞𤣥至鎮休兵養士然後督諸將守討擊胡虜及伯固等皆破散退走在職三年邉境安静靈帝初徵入為河南尹轉少府大鴻臚建寜三年遷司空轉司徒素與南陽太守陳球有隙及在公位而薦球為廷尉𤣥以國家方弱自度力無所用乃稱疾上疏引衆灾以自劾遂䇿罷嵗餘拜尚書令時太中大夫蓋升與帝有舊恩前為南陽太守臧數億以上𤣥奏免升禁錮沒入財賄帝不從而遷升侍中𤣥託病免拜光祿大夫光和元年遷太尉數月復以疾罷拜太中大夫就醫里舎𤣥少子十嵗獨游門次卒有三人持杖劫執之入舎登樓就𤣥求貨𤣥不與有頃司隸校尉陽球率河南尹洛陽令圍守𤣥家球等恐并殺其子未欲迫之𤣥瞋目呼曰姦人無状𤣥豈以一子之命而縦國賊乎促令兵進於是攻之𤣥子亦死𤣥乃詣闕謝罪乞下天下凡有劫質皆并殺之不得贖以財寳開張姦路詔書下其章初自安帝以後法禁稍㢮京師劫質不避豪貴自是遂絶𤣥以光和六年卒時年七十五𤣥性剛急無大體然謙儉下士子弟親宗無在大官者及卒家無居業喪無所殯當時稱之初曹操微時人莫知者嘗往候𤣥𤣥見而異焉謂曰今天下將亂安生民者其在君乎操常感其知已及後經過𤣥墓輙悽愴致祭奠自為其文曰故太尉橋公懿徳高軌汎愛博容國念眀訓士思令謨幽靈潜翳􅴽哉緬矣操以㓜年逮升堂室特以頑質見納君子增榮益觀皆由奨朂猶仲尼稱不如顔淵論語孔子謂子貢曰汝與囘也孰愈子貢曰賜也何敢望囘子曰吾與汝俱不如也李生厚歎賈復復少好學師事舞隂李生李生竒之曰賈君國器也士死知己懐此無忘又承從容約誓之言徂沒之後路有經由不以斗酒隻雞過相沃酹車過三歩腹痛勿怨雖臨時戯笑之言非至親之篤好胡肯為此辭哉懐舊惟顧念之悽愴惟思也奉命東征屯次鄉里北望貴土乃心陵墓裁致薄奠公其享之魏志曰建安七年曹公軍譙遂至浚儀遣使以太牢祀橋𤣥進軍官度也𤣥子羽官至任城相論曰任棠姜岐世著其清結甕牖而辭三命結猶構也莊子曰原憲處魯居環堵之室桑樞而甕牖周禮一命受職再命受服三命受位謂任姜辭太守之辟也殆漢陽之幽人乎易曰履道坦坦幽人貞吉龐參躬求賢之禮故民悦其政橋𤣥厲邦君之威而衆失其情夫豈力不足歟將有道在焉橋𤣥舎姜岐以道不可違故不得以威力逼也如令其道可忘則彊梁勝矣語曰三軍可奪帥匹夫不可奪志鄭𤣥注論語云匹夫之守志重於三軍之死將者也子貢曰寜喪千金不失士心昔段干木踰牆而避文侯之命高士傳曰段干木者晉人也守道不仕魏文侯造其門段干木踰牆而避之泄栁閉門不納穆公之請泄栁魯之賢人也魯穆公時請見之泄栁閉門而不納事見孟子貴必有所屈賤亦有所伸矣賛曰李叜勤身甘飢辭饋禪為君隐之死靡貳龜習邉功參起徒中橋公識運先覺時雄後漢書巻八十一
