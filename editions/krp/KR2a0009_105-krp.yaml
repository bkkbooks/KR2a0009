body:
  text: 後漢書卷一百五宋宣城太守范煜撰唐章懷太子賢注劉袁呂列傳第六十五劉焉傳劉焉字君郎江夏竟陵人也竟陵今復州縣魯恭王後也恭王景帝子名餘肅宗時徙竟陵焉少任州郡以宗室拜郎中去官居陽城山精學敎授舉賢良方正稍遷南陽太守宗正太常時靈帝政化衰缺四方兵寇焉以為刺史威輕旣不能禁且用非其人輒增暴亂乃建議改置牧伯鎭安方夏清選重臣以居其任焉乃隂求為交阯以避時難議未即行會益州刺史郗儉在政煩擾謡言逺聞而幷州刺史張懿涼州刺史耿鄙並為寇賊所害故焉議得用出焉為監軍使者領益州牧前書任安為監北軍使者太僕黄琬為豫州牧宗正劉虞為幽州牧皆以本秩居職州任之重自此而始是時益州賊馬相亦自號黄巾合聚疲役之民數千人先殺綿竹令綿竹故城在今益州綿竹縣東進攻雒縣今益州雒縣殺郗儉又擊蜀郡犍為旬月之間破壞三郡綿竹及雒屬廣漢郡幷蜀郡犍為郡馬相自稱天子衆至十餘萬人遣兵破巴郡殺郡守趙部州從事賈龍先領兵數百人在犍為遂紏合吏人攻相破之龍乃遣吏卒迎焉焉到以龍為校尉徙居綿竹龍撫納離叛務行寛惠而隂圖異計沛人張魯母有姿色兼挾鬼道往來焉家遂任魯以為督義司馬遂與别部司馬張修劉攽曰案文多下一遂字將兵掩殺漢中太守蘇固斷絶斜谷殺使者魯既得漢中遂復殺張修而幷其衆焉欲立威刑以自尊大乃託以它事殺州中豪彊十餘人蜀志曰殺王威李權等士民皆怨初平二年犍為太守任岐及賈龍並反攻焉焉擊破皆殺之自此意氣漸盛遂造作乘輿車重千餘乘重輜重也焉四子範為左中郎將誕治書御史璋奉車都尉蜀志曰璋字季玉並從獻帝在長安唯别部司馬瑁隨焉在益州朝廷使璋曉譬焉焉留璋不復遣興平元年征西将軍馬騰與範謀誅李傕焉遣叟兵五千助之戰敗漢世謂蜀為叟孔安國注尚書云蜀叟也範及誕並見殺焉既痛二子又遇天火燒其城府車重延及民家舘邑無餘於是徙居成都遂疽發背卒說文曰疽久癰州大吏趙韙等貪璋溫仁立為刺史詔書因以璋為監軍使者領益州牧以韙為征東中郎將先是荆州牧劉表表焉僭擬乘輿器服韙以此遂屯兵朐䏰備表朐音蠢䏰音如尹反屬蜀郡故城在今䕫州雲安縣西也初南陽三輔民數萬户流入益州焉悉收以為衆名曰東州兵璋性柔寛無威畧東州人侵暴為民患不能禁制舊士頗有離怨趙韙之在巴中甚得衆心璋委之以權韙因人情不輯輯和也乃隂結州中大姓建安五年還共擊璋蜀郡廣漢犍為皆反應東州人畏見誅滅乃同心幷力為璋死戰遂破反者進攻韙於江州斬之江州縣名屬巴郡今渝州已縣張魯以璋闇懦不復承順璋怒殺魯母及弟而遣其將龎羲等攻魯數為所破魯部曲多在巴土故以羲為巴郡太守魯因襲取之遂雄於巴漢十三年曹操自將征荆州璋乃遣使致敬操加璋振威將軍兄瑁平寇將軍璋因遣别駕從事張松詣操而操不相接禮松懷恨而還勸璋絶曹氏而結好劉備璋從之十六年璋聞曹操當遣兵向漢中討張魯内懷恐懼松復說璋迎劉備以拒操璋即遣法正將兵迎備蜀志曰法正字孝直扶風郿人也祖眞字喬卿父衍字季謀璋主簿巴西黄權諫曰蜀志曰權字公衡閬中人也先主取益州諸縣望風景附權閉城堅守須璋稽服乃詣先主主稱尊號將東伐吴權諫先主不從以權為鎭北将軍督江北軍先主自在江南吳將陸義乗虛斷圍南軍敗績先主引退而道隔權不得還故率所領降于魏有司執法白收權妻子先主曰孤負黄權權不負孤也待之如初魏文帝謂權曰君舍逆効順欲追蹤陳韓邪權對曰臣過受劉氏厚遇降吳不可還蜀無路是以歸命且敗軍之將免死為幸何古人之可慕劉備有梟名梟即驍也今以部曲遇之則不滿其心以賔客待之則一國不容二主此非自安之道從事廣漢王累自倒懸於州門以諫璋一無所納備自江陵馳至涪城涪城故城今綿州城璋率歩騎數萬與備會蜀志曰是嵗建安十六年張松勸備於會襲璋備不忍明年出屯葭萌松兄廣漢太守肅懼禍及已乃以松謀白璋收松斬之益郡耆舊傳曰張肅有威儀容貎甚偉松為人短小放蕩不持節操然識理精果有才幹劉璋遣詣曹公公不甚禮楊修深器之白公辟松不納修以公所撰兵書示松飲宴之間一省即便闇誦以此異之勑諸關戍勿復通備大怒還兵擊璋所在戰剋十九年進圍成都數十日城中有精兵三萬人穀支一年吏民咸欲拒戰璋言父子在州二十餘歲無恩德以加百姓而攻戰三載肌膏草野者以璋故也何心能安遂開城出降羣下莫不流涕備遷璋於公安公安今荆州縣歸其財寶後以病卒蜀志曰先主遷璋于公安南猶佩振威将軍印綬孫權破闗羽取荆州以璋為益州牧留住秭歸明年曹操破張魯定漢中魯字公旗初祖父陵順帝時客於蜀學道鶴鳴山中山在今益州晉原縣南造作符書以惑百姓受其道者輒出米五斗故謂之米賊陵傳子衡衡傳於魯魯遂自號師君其來學者初名為鬼卒後號祭酒祭酒各領部衆衆多者名曰理頭皆校以誠信不聼欺妄有病但令首過而已魏志曰大抵與黄巾相似首音式救反諸祭酒各起義舍於路同之亭傳傳音陟戀反懸置米肉以給行旅食者量腹取足過多則鬼能病之犯法者先加三原原免也然後行刑不置長吏以祭酒為理民夷信向典略曰初熹平中妖賊大起漢中有張修為太平道張角為五斗米道太平道師持九節杖為符祝教病人叩頭思過因以符水飲之病或自愈者則云此人信道其或不愈則云不信道修法略與角同加施淨室使病人處其中思過又使人為姦令祭酒主以老子五千文使都習號姦令為鬼吏主為病者請禱之法書病人姓字說服罪之意作三通其一上之天著山上其一埋之地其一沈之水謂之三官手書使病者家出米五斗以為常故號五斗米師實無益於療病小人昏愚競供事之後角被誅修亦亡及魯自在漢中因其人信行修業遂增飾之教使起義舍以米置其中以止行人又使自隱其小過者當循道百歩則罪除又依月令春夏禁殺又禁酒流移寄在其地者不敢不奉也朝廷不能討遂就拜魯鎭夷中郎將領漢寧太守袁山松書建安二十年置漢寧郡通其貢獻韓遂馬超之亂關西民奔魯者數萬家時人有地中得玉印者羣下欲尊魯為漢寧王魯功曹閻圃諫曰漢川之民户出十萬四面險固財富土沃上匡天子則為桓文次方竇融不失富貴今承制署置埶足斬斷遽稱王號必為禍先魯從之魯自在漢川垂三十年聞曹操征之至陽平周地圖記曰襃谷西北有古陽平關其地在今梁州襃城縣西北也欲舉漢中降其弟衞不聽率衆數萬拒關固守魏志曰太祖征魯至陽平關衞拒關堅守操破衞斬之魯聞陽平已䧟將稽顙歸降閻圃說曰今以急往其功為輕不如且依巴中然後委質功必多也於是乃奔南山左右欲悉焚寶貨倉庫魯曰本欲歸命國家其意未遂今日之走以避鋒銳非有惡意遂封藏而去操入南鄭甚嘉之又以魯本有善意遣人慰安之魯即與家屬出迎拜鎭南将軍封閬中侯邑萬户閬中屬巴郡今隆州縣將還中國待以客禮封魯五子及閻圃等皆為列侯魯卒諡曰原侯子富嗣論曰劉焉覩時方艱先求後亡之所左傳曰鄭公孫黑肱有疾歸邑于公曰吾聞之生於亂代貴而能貧人無求焉可以後亡庶乎見幾而作易曰君子見幾而作不俟終日又曰幾者動之微吉之先見夫地廣則驕尊之心生財衍則僭奢之情用衍饒也固亦恒人必至之期也璋能閉隘養力守案先圖尚可與歲時推移而遽輸利器靜受流斥老子曰國之利器不可以示人所謂羊質虎皮見豺則恐吁哉楊子法言曰羊質虎皮見草而悅見豺而戰袁術傳袁術字公路汝南汝陽人司空逢之子也少以俠氣聞數與諸公子飛鷹走狗後頗折節舉孝廉累遷至河南尹虎賁中郎將時董卓將欲廢立以術為後將軍術畏卓之禍出奔南陽會長沙太守孫堅殺南陽太守張咨英雄記曰咨字子議潁川人吳厯曰孫堅至南陽咨不給軍糧又不肯見堅欲進兵恐為後害乃詐得急疾舉軍震惶迎呼巫醫檮祀山川遣所親人說咨言病困欲以兵付咨咨聞之心利其兵即將歩騎五六百人入營看堅堅與相見無何卒然而起案劒罵咨遂執斬之引兵從術劉表上術為南陽太守術又表堅領豫州刺史使率荆豫之卒擊破董卓於陽人術從兄紹因堅討卓未反逺劉攽曰案文衍逺字蓋舊本有以反字為還者後遂兩存而傳寫之誤乃作逺字或説反是及字逺是還字本云未及還也遣其将㑹稽周昕奪堅豫州術怒擊昕走之紹議欲立劉虞為帝術好放縱憚立長君託以公義不肯同積此釁隙遂成乃各外交黨援以相圖謀術結公孫瓚而紹連劉表豪桀多附於紹術怒曰羣豎不從吾而從吾家奴乎又與公孫瓚書云紹非袁氏子紹聞大怒初平三年術遣孫堅擊劉表於襄陽堅戰死公孫瓚使劉備與術合謀共逼紹紹與曹操㑹擊皆破之四年術引軍入陳留屯封丘黑山餘賊及匈奴於扶羅等佐術與曹操戰於匡亭大敗術退保雍丘又将其餘衆奔九江殺揚州刺史陳溫而自領之又兼稱徐州伯李傕入長安欲結術為援乃授以左將軍假節封陽翟侯初術在南陽户口尚數十百萬而不修法度以鈔掠為資奢恣無厭百姓患之又少見讖書言代漢者當塗高自云名字應之當塗髙者魏也然術自以術及路皆是塗故云應之又以袁氏出陳為舜後以黄代赤徳運之次陳大夫轅濤塗袁氏其後也五行火生土故云以黄代赤遂有僭逆之謀又聞孫堅得傳國璽韋昭吳書曰漢室大亂天子北詣河上六璽不自隨掌璽者以投井中孫堅北討董卓頓軍城南甄官署有井毎旦有五色氣從井中出使人浚井得漢國玉璽其文曰受命于天既夀永昌遂拘堅妻奪之興平二年冬天子播越敗於曹陽術大㑹羣下因謂曰今海内鼎沸劉氏微弱吾家四世公輔袁安為同空子敞及京京子湯湯子逄並為司空百姓所歸欲應天順民於諸君何如衆莫敢對主簿閻象進曰昔周自后稷至于文王積德累功叄分天下猶服事殷國語曰后稷勤周十五代而王毛詩國風序曰國君積行累功以致爵位論語孔子曰三分天下有二以服事殷明公雖弈世克昌弈猶重也詩云不顯弈代又曰克昌厥後孰若有周之盛漢室衰微未至殷紂之敝也術嘿然使召張範範辭疾遣弟承往應之術問曰昔周室陵遲則有桓文之霸王肅注家語曰言若丘陵之漸逶遲秦失其政漢接而用之今孤以土地之廣士人之衆欲徼福於齊桓擬迹於髙祖可乎承對曰在德不在衆茍能用德以同天下之欲雖云匹夫霸王可也若陵僭無度干時而動衆之所棄誰能興之魏志曰範字公儀承字公先河内人司徒歆之孫也術不悅自孫堅死子策復領其部曲術遣擊揚州刺史劉繇破之策因據江東策聞術将欲僭號與書諫曰董卓無道陵虐王室禍加太后暴及𢎞農天子播越左傳王子朝云茲不穀震蕩播越播遷也越逸也言失其所居宫廟焚毁是以豪桀發憤沛然俱起沛然自恣縱貎也沛音片害反元惡既斃㓜主東顧乃使王人奉命宣明朝恩偃武修文與之更始然而河北異謀於黑山謂袁紹為冀州牧與黒山賊相連曹操毒被於東徐劉表僭亂於南荆公孫叛逆於朔北正禮阻兵劉繇也元德爭盟劉備也是以未獲從命櫜弓戢戈嘗謂使君與國同䂓而舍是弗恤完然有自取之志完然自得貎懼非海内企望之意也成湯討桀稱有夏多罪尚書湯誓曰有夏多罪天命殛之武王伐紂曰殷有重罸史記曰武王徧告諸侯曰殷有重罸不可不伐此二王者雖有聖德假使時無失道之過無由逼而取也今主上非有惡於天下徒以㓜小脅於彊臣異於湯武之時也又聞㓜主明智聰敏有夙成之德風早也天下雖未被其恩咸歸心焉若輔而興之則旦奭之美率土所望也使君五世相承安生京京生湯湯生逢逢生術凡五代為漢宰輔榮寵之盛莫與為比宜効忠守節以報王室時人多惑圖緯之言妄牽非類之文茍以悦主為美不顧成敗之計古今所愼可不熟慮忠言逆耳駮議致憎駮雜也議不同也前書張良曰忠言逆耳利於行良藥苦口利於病茍有益於尊明無所敢辭術不納策遂絶之建安二年因河内張炯符命遂果僭號自稱仲家仲或作沖以九江太守為淮南尹置公卿百官郊祀天地乃遣使以竊號告呂布幷為子聘布女布執術使送許時獻帝在許術大怒遣其將張勲橋㽔攻布大敗而還術又率兵擊陳國誘殺其王寵及相駱俊曹操乃自征之術聞大駭即走渡淮留張勲橋蕤於蘄陽水經曰蘄水出江夏蘄春縣北山酈元注云即蘄山也西南流經蘄山又南對蘄湯注干大江亦謂之蘄陽口以拒操操擊破斬蕤而勲退走術兵弱大将死衆情離叛加天旱歲荒士民凍餒江淮間相食殆盡時舒仲應為術沛相術以米十萬斛與為軍糧仲應悉散以給飢民術聞怒陳兵將斬之仲應曰知當必死故為之耳寜可以一人之命救百姓於塗炭術下馬牽之曰仲應足下獨欲享天下重名不與吾共之邪術雖矜名尚竒而天性驕肆尊已陵物及竊偽號淫侈滋甚媵御數百無不兼羅紈厭粱肉九州春秋曰司𨽻馮方女國色也避亂揚州袁術登城見而悅之遂納焉甚愛幸諸婦姤其寵紿之曰將軍貴人有志節當時時涕泣憂愁必長見敬重馮氏以為然後見術輒垂涕術果以冇心志益哀之諸婦因是共絞殺之懸之厠梁術誠以為不得志而死也厚加殯斂焉自下饑困莫之簡䘏於是資實空盡不能自立四年夏乃燒宮室奔其部曲陳簡雷薄於灊山灊縣之山也灊今壽州霍山縣也灊音潛復為簡等所拒遂大困窮士卒散走憂懣不知所為遂歸帝號於紹曰禄去漢室久矣天下提挈政在家門豪雄角逐分割疆宇此與周末七國無異唯彊者兼之耳袁氏受命當王符瑞炳然今君擁有四州青冀幽幷人户百萬以彊則莫與爭大以位則無所比高曹操雖欲扶衰奨微安能續絶運起已滅乎謹歸大命君其興之紹隂然其計術因欲北至青州從袁譚曹操使劉備徼之不得過復走還壽春六月至江亭坐簀牀而歎曰簀第也謂無茵蓆也袁術乃至是乎因憤慨結病歐血死妻子依故吏廬江太守劉勲魏志曰勲字子臺琅邪人與太祖有舊為孫策破後自歸太祖封列侯勲自恃與太祖有宿日驕慢數犯法又誹謗遂免其官也孫策破勲復見收視術女入孫權宮子曜仕吳為郎中論曰天命符驗可得而見未可得而言也然大致受大福者歸於信順乎易曰天之所助者順也人之所助者信也履信思順自天祐之夫事不以順雖彊力廣謀不能得也謀不可得之事日失忠信變詐妄生矣況復茍肆行之其以欺天乎雖假符僭稱歸將安所容哉呂布傳呂布字奉先五原九原人也以弓馬驍武給幷州刺史丁原為騎都尉原屯河内劉攽曰案文下原字合在上原字下以布為主簿甚見親待靈帝崩原受何進召將兵詣洛陽為執金吾㑹進敗董卓誘布殺原而幷其兵卓以布為騎都尉誓為父子甚愛信之稍遷至中郎將封都亭侯卓自知凶恣毎懷猜畏行止常以布自衞嘗小失卓意卓拔手㦸擲之布拳㨗得免而改容顧謝卓意亦解布由是隂怨於卓卓又使布守中閤而私與傅婢情通益不自安因往見司徒王允自陳卓幾見殺之狀幾音祈時允與尚書僕射士孫瑞宻謀誅卓因以告布使為内應布曰如父子何曰君自姓呂本非骨肉今憂死不暇何謂父子擲㦸之時豈有父子情也布遂許之乃於門刺殺卓事已見卓傳允以布為奮威將軍假節儀同三司封溫侯允既不赦凉州人由是卓將李傕等遂相結還攻長安布與傕戰敗乃將數百騎以卓頭繫馬鞍走出武關奔南陽袁術待之甚厚布自恃殺卓有德袁氏遂恣兵鈔掠術患之布不安復去從張楊於河内時李傕等購募求布急楊下諸将皆欲圖之布懼謂楊曰與卿州里今見殺其功未必多不如生賣布可大得傕等爵寵楊以為然有頃布得走投袁紹紹與布擊張燕於常山燕精兵萬餘騎數千匹布常御良馬號曰赤莵能馳城飛塹曹瞞傳曰時人語曰人中有呂布馬中有赤莵與其健将成廉魏越等數十騎馳突燕陣一日或至三四皆斬首而出連戰十餘日遂破燕軍布既恃其功更請兵於紹紹不許而將士多暴横紹患之布不自安因求還洛陽紹聽之承制使領司隸校尉遣壯士送布而隂使殺之布疑其圖巳乃使人鼓箏於帳中潛自遁出夜中兵起而布已亡紹聞懼為患募遣追之皆莫敢逼遂歸張楊道經陳留太守張邈遣使迎之相待甚厚臨别把臂言誓邈字孟卓東平人少以俠聞初辟公府稍遷陳留太守董卓之亂與曹操共舉義兵及袁紹為盟主有驕色邈正義責之紹既怨邈且聞與布厚乃令曹操殺邈操不聽然邈心不自安興平元年曹操東擊陶謙令其將武陽人陳宮屯東郡典略曰陳宮字公臺東郡人也剛直烈壯少與海内知名之士皆連結及天下亂始隨太祖後自疑乃從呂布為布畫策布每不從宮因說邈曰今天下分崩雄桀並起君擁十萬之衆當四戰之地陳留地平四面受敵故謂之四戰之地也撫劒顧眄亦足以為人豪而反受制不以鄙乎今州軍東征其處空虛呂布壯士善戰無前迎之共據兗州觀天下形埶俟時事變通此亦從横一時也邈從之遂與弟超及宮等迎布為兗州牧據濮陽郡縣皆應之曹操聞而引軍擊布累戰相持百餘日是時旱蝗少穀百姓相食布移屯山陽二年間操復盡收諸城破布於鉅野布東奔劉備邈詣袁術求救留超將家屬屯雍丘操圍超數月屠之滅其三族邈未至壽春為其兵所害時劉備領徐州居下邳與袁術相拒於淮上術欲引布擊備乃與布書曰術舉兵詣闕未能屠裂董卓將軍誅卓為術報耻功一也董卓殺隗及術兄基等男女二十餘人昔金元休南至封丘為曹操所敗典略曰元休名尚京兆人同郡韋休甫第五文休俱著名號為三休尚獻帝初為兗州刺史東之郡而太祖已臨兗州尚依袁術術僭號欲以尚為太尉不敢顯言私使諷之術亦不敢彊也建安初尚逃還為術所害也劉攽曰注刺史東之郡案刺史不當言郡盖是部字將軍伐之令術復明目於遐邇功二也術生年以來不聞天下有劉備備乃舉兵與術對戰憑將軍威靈得以破備功三也将軍有三大功在術術雖不敏奉以死生将軍連年攻戰軍糧苦少今送米二十萬斛非唯此止當駱驛復致凡所短長亦唯命布得書大悅即勒兵襲下邳獲備妻子備敗走海西海西縣屬廣陵郡故屬東海飢困請降於布布又恚術運糧不復至乃具車馬迎備以為豫州刺史遣屯小沛髙祖本泗水郡沛縣人及得天下改泗水為沛郡小沛即沛縣布自號徐州牧術懼布為己害為子求婚布復許之術遣將紀靈等歩騎三萬以攻備備求救於布諸將謂布曰将軍常欲殺劉備今可假手於術布曰不然若破備則北連太山吾為在術圍中不得不救也便率歩騎千餘馳往赴之靈等聞布至皆斂兵而止布屯沛城外遣人招備幷請靈等與共饗飲布謂靈曰𤣥德布弟也為諸君所困故來救之布性不喜合鬬但喜解鬬耳乃令軍候植㦸於營門布彎弓顧曰諸君觀布射㦸小支周禮考工記曰為㦸博二寸内倍之胡參之援四之鄭注云援直刃胡其子也小支謂胡也即今之㦸傍曲支中者當各解兵不中可留決鬬布即一發正中㦸支靈等皆驚言將軍天威也明日復歡會然後各罷術遣韓𦙍以僭號事告布因求迎婦布遣女隨之沛相陳珪恐術報布成姻則徐揚合從為難未已於是往說布曰曹公奉迎天子輔贊國政将軍宜與協同策謀共存大計今與袁術結姻必受不義之名將有累卵之危矣說苑曰晉靈公造九層臺費用千億謂左右曰敢有諫者斬孫息求見靈公張弩操矢見之謂之曰子欲諫邪孫息曰臣不敢諫也臣能累十二博棊加九雞子於其上公曰吾未嘗見也子為寡人作之孫息即正顏色定志意以棊子置下加雞子其上左右慴息靈公曰危哉孫息曰復有危於此者公曰願復見之息曰九層之臺三年不成男不得耕女不得織國用空虛户口減少吏人叛亡隣國謀議将興兵公乃壞臺布亦素怨術而女已在塗乃追還絶婚執𦙍送許曹操殺之陳珪欲使子登詣曹操布固不許㑹使至拜布為左將軍布大喜即聽登行幷令奉章謝恩登見曹操因陳布勇而無謀輕於去就宜早圖之操曰布狼子野心誠難久養左傳曰伯石之生也叔向之母視之曰是豺狼之聲也狼子野心非卿莫究其情偽即增珪秩中二千石拜登廣陵太守臨别操執登手曰東方之事便以相付令隂合部衆以為内應始布因登求徐州牧不得登還布怒拔㦸斫机曰卿父勸吾協同曹操絶㛰公路今吾所求無獲而卿父子並顯重但為卿所賣耳登不為動容徐對之曰登見曹公言養將軍譬如養虎當飽其肉不飽則將噬人公曰不如卿言譬如養鷹飢即為用飽則颺去其言如此布意乃解袁術怒布殺韓𦙍遣其大將張勲橋蕤等與韓暹楊奉連埶歩騎數萬七道攻布布時兵有三千馬四百匹懼其不敵謂陳珪曰今致術軍卿之由也為之奈何珪曰暹奉與術卒合之師耳卒音七忽反謀無素定素舊也不能相維子登策之比於連雞埶不俱棲戰國策曰秦惠王謂寒泉子曰蘇秦欺敝邑欲以一人之知反覆山東之君夫諸侯之不可一猶連雞之不能俱上於棲立可離也布用珪策與暹奉書曰二將軍親扶大駕而布手殺董卓俱立功名當垂竹帛今袁術造逆宜共誅討奈何與賊還來伐布可因今者同力破術為國除害建功天下此時不可失也又許破術兵悉以軍資與之暹奉大喜遂共擊勲等於下邳大破之生禽橋蕤餘衆潰走其所殺傷墯水死者殆盡時太山臧霸等攻破莒城許布財幣以相結而未及送布乃自往求之其督将高順諫止英雄記曰順為人不飲酒不受饋所将七百餘兵號為千人名陷陣營布後䟽順奪順所將兵亦無恨意也曰将軍威名宣播逺近所畏何求不得而自行求賂萬一不剋豈不損邪布不從既至莒霸等不測往意固守拒之無獲而還順為人清白有威嚴少言辭将衆整齊毎戰必剋布性決易所為無常順毎諫曰将軍舉動不肯詳思忽有失得動輒言誤誤事豈可數乎布知其忠而不能從建安三年布遂復從袁術遣順攻劉備於沛破之曹操遣夏侯惇救備魏志曰夏侯惇字元讓沛國譙人年二十四就師學人有辱其師者惇殺之後從征呂布為流夫傷左目領陳留濟隂太守加建武將軍太祖常同輿載特見親重出入臥内諸將莫之比為順所敗操乃自將擊布至下邳城下遺布書為陳禍福布欲降而陳宫等自以負罪於操深沮其計而謂布曰曹公逺來埶不能久將軍若以歩騎出屯於外宮将餘衆閉守於内若向將軍宮引兵而攻其背若但攻城則將軍救於外不過旬月軍食畢盡擊之可破也布然之布妻曰昔曹氏待公臺如赤子猶舎而歸我今将軍厚公臺不過於曹氏而欲委全城捐妻子孤軍逺出乎若一旦有變妾豈得為将軍妻哉布乃止而潛遣人求救於袁術自将千餘騎出戰敗走還保城不敢出術亦不能救曹操壍圍之壅沂泗以灌其城三月上下離心其將侯成使客牧其名馬而客策之以叛成追客得馬諸将合禮以賀成成分酒肉先入詣布而言曰蒙將軍威靈得所亡馬諸将齊賀未敢嘗也故先以奉貢布怒曰布禁酒而卿等醖釀為欲因酒共謀布邪成忿懼乃與諸将共執陳宮高順率其衆降布與麾下登白門樓宋武北征記曰下邳城有三重大城之門周四里呂布所守也魏武禽布於白門白門大城之門也酈元水經注曰南門謂之白門魏武禽陳宫於此劉攽曰下邳有三重大城之門案文多之門二字緑下文有大城之門遂致此衍兵圍之急令左右取其首詣操左右不忍乃下降布見操曰今日已往天下定矣操曰何以言之布曰明公之所患不過於布今已服矣令布將騎明公將歩天下不足定也顧謂劉備曰𤣥德卿為坐上客我為降虜繩縛我急獨不可一言邪操笑曰縛虎不得不急乃命緩布縛劉備曰不可明公不見呂布事丁建陽董太師乎操頷之杜預注左傳曰頷揺頭也音五感反布目備曰大耳兒最叵信蜀志曰備顧自見其耳操謂陳宮曰公臺平生自謂智有餘今意何如劉攽曰案文意當作竟宮指布曰是子不用宮言以至於此若見從未可量也操又曰柰卿老母何宮曰老母在公不在宫也夫以孝理天下者不害人之親操復曰奈卿妻子何宮曰宮聞霸王之主不絶人之祀左傳曰齊桓公存三亡國固請就刑遂出不顧操為之泣涕布及宫順皆縊殺之傳首許市贊曰焉作庸牧以希後福王莽改益州曰庸部曷云負荷地墮身逐術既叨貪布亦飜覆後漢書卷一百五後漢書卷一百五考證劉焉傳焉遣叟兵五千助之注漢世謂蜀為叟孔安國注尚書云蜀叟也按孔穎達尚書疏云叟者蜀夷之别名漢世不即謂蜀為叟也光武紀中注引常璩華陽國志云武帝元封二年叟夷反将軍郭昌討平之因開為益州郡是蜀人謂其西南勞深靡莫諸夷為叟乃今雲南地也魯字公旗魏志作公祺民夷信向注典略曰初熹平中妖賊大起漢中有張脩為太平道張角為五斗米道何焯校本于妖賊大起下增三輔有駱曜光和中東方有張角十三字漢中有張脩句下增駱曜教民緬匿法角八字張脩為五斗米道滅去張字改角為脩又云按注中張脩裴松之云應是張衡非典略之失則傳寫之誤又主為病者請禱之法何焯校本請禱下復增請禱二字又實無益於療病何焯校本于句下增但為淫妄四字又以米置其中何焯校本米字下增肉字又使自隱其小過者何焯校本使字上增教字時人有地中得玉印者何焯曰米道之後云自陵傳有玉印豈因魯常得之猶假以欺人耶袁術傳孫堅得傳國璽注使人浚井得漢國玉璽何焯校本漢字下添傳字呂布傳奔南陽袁術待之甚厚魏志云術惡其反覆拒而不受與此互異二將軍親扶大駕何焯校本扶政拔後漢書卷一百五考證
