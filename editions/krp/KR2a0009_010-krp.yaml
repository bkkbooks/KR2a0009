body:
  text: 後漢書卷十上宋宣城太守范煜撰唐章懐太子賢注后紀第十上光武郭皇后光烈隂皇后明徳馬皇后章徳竇皇后和帝隂皇后和熹鄧皇后夏殷以上后妃之制其文畧矣周禮王者立后鄭𤣥注禮記曰后之言後言在夫之後也三夫人九嬪二十七世婦八十一女御以備内職焉后正位宫闈同體天王夫人坐論婦禮鄭𤣥注周禮云夫人之於后猶三公之於王坐而論婦禮也九嬪掌敎四徳九嬪比九卿周禮曰九嬪掌婦學之法以敎九御也四徳謂婦徳婦言婦容婦功也世婦主喪祭賔客婦服也明其能服事於人也比二十七大夫周禮世婦掌祭祀賔客喪紀之事祭之日涖陳女宫之具凡内羞之物掌弔臨于卿大夫之喪女御序于王之燕寢御謂進御于王也比八十一元士周禮曰女御叙于王之燕寢以嵗時獻功事也頒官分務各有典司女史彤管記功書過周禮云女史掌王后之禮書内令凡后之事以禮從也鄭𤣥注云亦如太史之於王也彤管赤管筆也詩云詒我彤管注云古者后夫人必有女史彤管之法也居有保阿之訓動有環佩之響列女傳曰齊孝公孟姬華氏之女從孝公遊車奔姬墮車碎孝公使駟馬立車載姬姬泣曰妾聞妃下堂必從傅母保阿進退則鳴玉珮環今立車無軿非敢受命進賢才以輔佐君子哀窈窕而不淫其色詩序云闗雎樂得淑女以配君子憂在進賢不滛其色哀窈窕思賢才而無傷善之心毛萇注云窈窕幽閒也所以能述宣隂化修成内則周禮内宰職曰以隂禮敎六宫以婦職之法敎九御閨房肅雍險謁不行也肅敬也雍和也謁請也言能輔佐君子和順恭敬不行私謁詩序曰雖則王姬猶執婦道以成肅雍之徳又曰而無險詖私謁之心故康王晚朝關雎作諷前書音義曰后夫人雞鳴佩玉去君所周康王后不然故詩人嘆而傷之見魯詩宣后晏起姜氏請愆列女傳曰周宣姜后齊侯之女也宣王常夜卧晏起后夫人不出房姜后既出乃脫簮珥待罪於永巷使傅母通言於王曰妾不才淫心見矣至使君王失禮而晏起以見君王樂色忘徳敢請罪惟君王之命王曰寡人之過夫人何辜遂勤政事成中興之名焉及周室東遷禮序凋缺幽王時西夷犬戎兵攻殺幽王于驪山之下太子宜臼立是為平王東遷洛邑以避犬戎政遂微弱諸侯僭縱軌制無章齊桓有如夫人者六人左傳曰桓公多内寵有如夫人者六人長衛姬少衛姬鄭姬葛嬴密姬宋華子也晉獻升戎女為元妃元妃嫡夫人也史記曰晉獻公伐驪戎得驪姬愛幸立以為妃終於五子作亂桓公六夫人生六子桓公卒立公子昭於是公子無虧公子元公子潘公子商人公子雍等五公子皆求立公子昭奔宋是作亂也冢嗣遘屯冢大也遘遇也屯難也晉獻公受驪姬之譖殺太子申生故曰遇屯爰逮戰國風憲逾薄適情任欲顚倒衣裳上曰衣下曰裳詩曰緑兮衣兮緑衣黄裳鄭𤣥曰緑衣黑今反以黄為裏非其禮制諭妾上僭也以至破國亡身不可勝數斯固輕禮弛防先色後徳者也秦幷天下多自驕大宮備七國史記曰始皇破六國寫放其宫室作之咸陽北坂上南臨渭水殿屋複道周閣相屬所得諸侯羙人以充入之并秦為七也爵列八品前書曰漢興因秦之稱號正嫡稱皇后妾皆稱夫人又有羙人良人八子七子長使少使之號漢興因循其號而婦制莫釐釐理髙祖帷薄不脩大戴禮曰大臣坐汚穢男女無别者不曰汚穢曰帷薄不脩謂周昌入奏事髙帝擁姬是不脩也孝文衽席無辨鄭𤣥注禮記曰衽卧席也孝文幸慎夫人每與皇后同坐是無辨也然而選納尚簡飾翫少華自武元之後世增淫費至乃掖庭三千增級十四媫妤一娙娥二容華三充衣四已上武帝置昭儀五元帝置羙人六良人七七子八八子九長使十少使十一五官十二順常十三舞涓共和娛靈保休良娣使夜者十四此六宫品秩同為一等妖倖毁政之符外姻亂邦之迹前史載之詳矣及光武中興斵雕為朴彫謂刻鏤也史記曰漢興破觚而為圓斵彫而為璞六宫稱號唯皇后貴人鄭𤣥注周禮曰皇后正寢一燕寢五是為六宫也夫人已下分居焉貴人金印紫綬奉不過粟數十斛又置羙人宫人采女三等並無爵秩嵗時賞賜充給而已漢法常因八月筭人漢儀注曰八月初為筭賦故曰筭人遣中大夫與掖庭丞及相工於洛陽鄉中閲視良家童女年十三以上二十以下姿色端麗合法相者載還後宫擇視可否乃用登御所以明愼聘納詳求淑哲明帝聿遵先㫖宫敎頗脩登建嬪后必先令徳内無出閫之言閫門限也禮記曰外言不入於閫内言不出於閫也權無私溺之授可謂矯其敝矣向使因設外戚之禁編著甲令前書音義曰甲令者前帝第一令也有甲令乙令丙令改正后妃之制貽厥方来豈不休哉雖御已有度而防閑未篤故孝章以下漸用色授恩隆好合遂忘淄蠧淄黑也蠧食木蟲以諭傾敗也自古雖主幼時艱王家多釁必委成冢宰簡求忠賢未有専任婦人斷割重器唯秦芊太后始攝政事芊音亡爾反故穰侯權重於昭王家富於嬴國太后昭王母也號宣太后史記曰昭王立年少宣太后自知事以同母弟魏冉為将軍任政封為穰侯太后攝政始於此也漢仍其謬知患莫改東京皇統屢絶權歸女主外立者四帝謂安質桓靈臨朝者六后章帝竇太后和熹鄧太后安思閻太后順烈梁太后桓思竇太后靈思何太后也莫不定䇿帷帟委事父兄貪孩童以久其政抑明賢以專其威周禮幕人掌幃帟幄幕之事鄭𤣥注曰帟幄中坐上承塵也殤帝崩鄧太后與兄騭等迎立安帝年十三冲帝崩梁太后與兄冀迎立質帝年八嵗質帝崩太后與兄冀迎立桓帝年十五桓帝崩竇太后與父武迎立靈帝年十三任重道悠利深禍速身犯霧露於雲臺之上霧露謂疾病也不可指言死故假霧露以言之靈帝時中常侍曹節矯詔遷太后於雲臺謝弼上封事曰伏惟皇太后援立明聖幽居空宫如有霧露之疾陛下當何面目以見天下家嬰縲絏於圄犴之下縲索也絏繫也囹圄周獄名也鄉亭之獄曰犴音五旦反謂外戚等被誅也湮滅連踵傾輈繼路踵跡也輈車轅也賈誼曰前車覆後車誡而赴蹈不息燋爛為期終於陵夷大運淪亡神寶陵夷猶頽替神寳帝位也詩書所歎略同一揆故考列行跡以為皇后夲紀雖成敗事異而同居正號者並列于篇其以私恩追尊非當時所奉者則隨它事附出謂安帝母左姬及祖母宋貴人之類並見清河孝王傳親屬别事各依列傳其餘無所見則係之此紀謂賈貴人虞羙人之類是也以纘西京外戚云爾纘繼也郭皇后紀光武郭皇后諱聖通眞定槀人也槀縣名故城在今恒州槀城縣西為郡著姓父昌讓田宅財產數百萬與異母弟國人義之仕郡功曹娶眞定恭王女號郭主恭王名普景帝七代孫生后及子况昌早卒郭主雖王家女而好禮節儉有母儀之徳更始二年春光武擊王郎至眞定因納后有寵及即位以為貴人建武元年生皇子彊帝善况小心謹愼年始十六拜黄門侍郎二年貴人立為皇后彊為皇太子封况緜蠻侯以后弟貴重賔客輻湊况恭謙下士頗得聲譽十四年遷城門校尉其後后以寵稍衰數懐怨懟十七年遂廢為中山王太后進后中子右翊公輔為中山王以常山郡益中山國徙封况大國為陽安侯陽安縣屬汝南郡故城在今豫州朗山縣故道國城是也后從兄竟以騎都尉從征伐有功封為新郪侯官至東海相新郪縣屬汝南郡故城在今潁州汝隂縣西北郪邱城是也音七私反竟弟匡為發干侯發干縣屬東郡故城在今博州堂邑縣西南官至太中大夫后叔父梁早終無子其壻南陽陳茂以恩澤封南䜌侯䜌音力全反二十年中山王輔復徙封沛王后為沛太后况遷大鴻臚帝數幸其第㑹公卿諸侯親家飲燕賞賜金錢縑帛豐盛莫比京師號况家為金穴二十六年后母郭主薨帝臨喪送葬百官大㑹遣使者迎昌喪柩與主合葬追贈昌陽安侯印綬諡曰思侯二十八年后薨葬于北芒帝憐郭氏詔况子璜尚淯陽公主除璜為郎顯宗即位况與帝舅隂識隂就並為特進數授賞賜劉攽曰案文授當作受恩寵俱渥禮待隂郭每事必均永平二年况卒贈賜甚厚帝親自臨喪諡曰節侯子璜嗣元和三年肅宗北廵狩過眞定㑹諸郭朝見上壽引入倡飲甚歡說文曰倡樂也聲類曰俳以太牢具上郭主冢賜粟萬斛錢五十萬永元初璜為長樂少府長樂少府掌皇太后宫秩二千石居長信宫曰長信少府長樂宫曰長樂少府子舉為侍中兼射聲校尉及大将軍竇憲被誅舉以憲女壻謀逆故父子俱下獄死家屬徙合浦郡名今㢘州縣宗族為郎吏者悉免官新郪侯竟初為騎将前書曰車戸騎将屬光禄秩比千石從征伐有功拜東海相永平中卒子嵩嗣嵩卒追坐染楚王英事國廢建初二年章帝紹封嵩子勤為伊亭侯勤無子國除發干侯匡官至太中大夫建武三十年卒子勳嗣勲卒子駿嗣永平十三年亦坐楚王英事失國建初三年復封駿為觀都侯卒無子國除郭氏侯者凡三人皆絶國論曰物之興衰情之起伏理有固然矣而崇替去来之甚者必唯寵惑乎當其接牀第承恩色雖險情贅行莫不徳焉說文曰贅肬也老子曰餘食贅行河上公注曰行之無當為贅荘子曰附贅懸肬言醜惡也及至移意愛析嬿私雖恵心妍狀愈獻醜焉愛升則天下不足容其髙歡隊故九服無所逃其命斯誠志士之所沈溺君人之所抑揚未或違之者也郭后以衰離見貶恚怨成尤而猶恩加别館增寵黨戚至乎東海逡廵去就以禮使後世不見隆薄進退之隙不亦光於古乎隂皇后紀光烈陰皇后諱麗華諡法曰執徳遵業曰烈東觀記有陰子公者生子方方生幼公公生君孟名睦即后之父也今世夲睦作陸南陽新野人初光武適新野聞后羙心悦之後至長安見執金吾車騎甚盛因歎曰仕宦當作執金吾娶妻當得陰麗華更始元年六月遂納后於宛當成里時年十九及光武為司隸校尉方西之洛陽令后歸新野及鄧奉起兵后兄識為之将后随家屬徙淯陽止於奉舍光武即位令侍中傅俊迎后與胡陽寧平主諸宫人俱到洛陽以后為貴人寧平縣屬淮陽故城在今亳州谷陽縣西南帝以后雅性寛仁欲崇以尊位后固辭以郭氏有子終不肯當故遂立郭皇后建武四年從征彭寵生顯宗於元氏九年有盜刼殺后母鄧氏及弟訢音欣帝其傷之乃詔大司空曰吾微賤之時娶於陰氏因将兵征伐遂各别離幸得安全俱脫虎口荘子曰孔子見盜跖謂栁下恵曰幾不免於虎口也以貴人有母儀之羙宜立為后而固辭弗敢當列於媵妾爾雅曰媵送也孫炎曰送女曰媵朕嘉其義讓許封諸弟未及爵土而遭患逢禍母子同命愍傷于懐小雅曰将恐将懼惟予與汝将安将樂汝轉棄予谷風之詩風人之戒可不愼乎其追爵諡貴人父陸為宣恩哀侯弟訢為宣義恭侯以弟就嗣哀侯後及尸柩在堂使太中大夫拜授印綬如在國列侯禮魂而有靈嘉其寵榮十七年廢皇后郭氏而立貴人制詔三公曰皇后懐執怨懟數違敎令不能撫循它子訓長異室宫闈之内若見鷹鸇爾雅曰宫中小門謂之闈既無關雎之徳而有呂霍之風豈可託以幼孤恭承明祀今遣大司徒渉戴渉也宗正吉持節其上皇后璽綬隂貴人鄉里良家歸自微賤公羊傳曰婦人謂嫁曰歸自我不見于今三年詩豳風東山之詞也宜奉宗廟為天下母主者詳案舊典時上尊號異常之事非國休福不得上壽稱慶后在位恭儉少嗜玩不喜笑謔性仁孝多矜慈七嵗失父雖已數十年言及未甞不流涕帝見常歎息顯宗即位尊后為皇太后永平三年冬帝從太后幸章陵置酒舊宅㑹隂鄧故人諸家子孫並受賞賜七年崩在位二十四年年六十合葬原陵明帝性孝愛追慕無已十七年正月當謁原陵夜夢先帝太后如平生歡既寤悲不能寐即案歴明旦日吉遂率百官及故客上陵其日降甘露於陵樹帝令百官采取以薦㑹畢帝從席前伏御牀視太后鏡奩中物奩鏡匣也音㢘感動悲涕令易脂澤装具左右皆泣莫能仰視焉馬皇后紀明徳馬皇后諱某諡法曰中和純淑曰徳諱某者史失其名下皆類此伏波将軍援之小女也少喪父母兄客卿敏恵早夭母藺夫人悲傷發疾慌惚后時年十嵗幹理家事勅制僮御幹正也廣雅曰僮御皆使者也内外諮禀事同成人初諸家莫知者後聞之咸歎異焉后嘗久疾太夫人令筮之筮者曰此女雖有患狀而當大貴兆不可言也後又呼相者使占諸女見后大驚曰我必為此女稱臣然貴而少子若養他人者得力乃當踰於所生初援征五溪蠻卒於師虎賁中郎将梁松黄門侍郎竇固等因譖之由是家益失埶又數為權貴所侵侮后從兄嚴不勝憂憤白太夫人絶竇氏婚求進女掖庭乃上書曰臣叔父援孤恩不報孤負也而妻子特獲恩全戴仰陛下為天為父人情既得不死便欲求福竊聞太子諸王妃匹未備援有三女大者十五次者十四小者十三儀状髮膚上中以上東觀記曰明帝馬皇后羙髮為四起大髻但以髮成尚有餘繞髻三匝眉不施黛獨左眉角小缺補之如粟甞稱疾而終身得意皆孝順小心婉靜有禮婉順願下相工簡其可否如有萬一援不朽於黄泉矣又援姑姊妹並為成帝婕妤葬於延陸臣嚴幸得䝉恩更生冀因縁先姑當充後宫由是選后入太子宫時年十三奉承隂后傍接同列禮則修備上下安之遂見寵異常居後堂顯宗即位以后為貴人時后前母姊女賈氏亦以選入生肅宗帝以后無子命令養之謂曰人未必當自生子但患愛養不至耳后於是盡心撫育勞悴過於所生肅宗亦孝性惇篤恩性夭至母子慈愛始終無纎介之間纎介猶微細也間隙也后常以皇嗣未廣每懐憂歎薦逹左右若恐不及後宫有進見者每加慰納若數所寵引輒增隆遇永平三年春有司奏立長秋宫皇后所居宫也長者久也秋者萬物成熟之初也故以名焉請立皇后不敢指言故以宫稱之帝未有所言皇太后曰馬貴人徳冠後宫即其人也遂立為皇后先是數日夢有小飛蟲無數赴著身又入皮膚中而後飛出既正位宫闈愈自謙肅身長七尺二寸方口羙髮能誦易好讀春秋楚辭尤善周官董仲舒書周官周禮也仲舒書玉杯蕃露清明竹林之屬也蕃音繁常衣大練裙不加緣大練大帛也杜預注左傳曰大帛厚繒也太后兄廖上書曰今陛下躬服厚繒是也朔望諸姬主朝請漢律春曰朝秋曰請望見后袍衣疏麤反以為綺縠就視乃笑后辭曰此繒特宜染色故用之耳六宫莫不歎息帝甞幸苑囿離宫后輒以風邪露霧為戒辭意款備多見詳擇帝幸濯龍中續漢志曰濯龍園名也近北宫並召諸才人下邳王已下皆在側請呼皇后帝笑曰是家志不好樂雖来無歡是以㳺娛之事希甞從焉十五年帝按地圖将封皇子悉半諸國后見而言曰諸子食數縣於制不已儉乎帝曰我子豈宜與先帝子等乎嵗給二千萬足矣時楚獄連年不斷囚相證引坐繫者甚衆后慮其多濫乗間言及惻然帝感悟之夜起仿偟為思所納思后所納之言卒多有所降宥時諸将奏事及公卿較議難平者廣雅曰較明也帝數以試后后輒分解趣理各得其情每於侍執之際輒言及政事多所毗補而未甞以家私干故寵敬日隆始終無衰及帝崩肅宗即位尊后曰皇太后諸貴人當徙居南宫太后感析别之懐各賜王赤綬加安車駟馬白越三千端白越越布雜帛二千匹黄金十斤自撰顯宗起居注削去兄防參醫藥事帝請曰黄門舅旦夕供養且一年既無褒異又不錄勤勞無乃過乎太后曰吾不欲令後世聞先帝數親后宫之家故不著也建初元年欲封爵諸舅太后不聽明年夏大旱言事者以為不封外戚之故有司因此上奏宜依舊典漢制外戚以恩澤封侯故曰舊典也太后詔曰凡言事者皆欲媚朕以要福耳昔王氏五侯同日俱封成帝封太后弟王譚王商王立王根王逢時等同時為闗内侯其時黄霧四塞不聞澍雨之應又田蚡竇嬰寵貴横恣傾覆之禍為世所傳田蚡景帝王皇后同母弟武安侯也為丞相貪驕與淮南王覇上私語後薨武帝曰使武安侯在者族矣竇嬰文帝竇皇后從兄子魏其侯也為丞相坐與灌夫朋黨棄市也故先帝防愼舅氏不令在樞機之位樞機近要之官也春秋運斗樞曰北斗第一天樞第二璇第三機也諸子之封裁令半楚淮陽諸國常謂我子不當與先帝子等今有司奈何欲以馬氏比隂氏乎吾為天下母而身服大練食不求甘左右但著帛布無香薫之飾者欲身率下也以為外親見之當傷心自勅但笑言太后素好儉前過濯龍門上見外家問起居者車如流水馬如游龍倉頭衣綠褠領袖正白褠臂衣今之臂韝以縳左右手於事便也顧視御者不及逺矣故不加譴怒但絶嵗用而已冀以黙愧其心而猶懈怠無憂國忘家之慮知臣莫若君况親屬乎吾豈可上負先帝之㫖下虧先人之徳重襲西京敗亡之禍哉固不許西京外戚吕禄呂產竇嬰上官桀安父子霍禹等皆被誅帝省詔悲歎復重請曰漢興舅氏之封侯猶皇子之為王也太后誠存謙虛奈何令臣獨不加恩三舅乎且衛尉年尊兩校尉有大病衛尉太后兄廖兩校尉兄防兄光也如令不諱使臣長抱刻骨之恨宜及吉時不可稽留太后報曰吾反覆念之思令兩善豈徒欲獲謙謙之名而使帝受不外施之嫌哉以恩澤封爵外家為外施也昔竇太后欲封王皇后之兄竇太后文帝后也王皇后景帝后也兄即王信後封為蓋侯丞相條侯言受髙祖約無軍功非劉氏不侯條侯周亞父也前書曰髙帝與功臣約非劉氏不王非有功不侯不如約天下共擊之今馬氏無功於國豈得與隂郭中興之后等邪常觀富貴之家祿位重疊猶再實之木其根必傷文子曰再實之木根必傷掘臧之家後必殃也且人所以願封侯者欲上奉祭祀下求温飽耳今祭祀則受四方之珍衣食則䝉御府餘資斯豈不足而必當得一縣乎吾計之孰矣勿有疑也夫至孝之行安親為上今數遭變異榖價數倍憂惶晝夜不安坐臥而欲先營外封違慈母之拳拳乎拳拳猶勤勤也音權吾素剛急有胷中氣不可不順也若隂陽調和邊境清靜然後行子之志吾但當含飴弄孫方言曰飴餳也陳楚宋衛之間通語不能復闗政矣時新平主家御者失火延及北閣後殿太后以為已過起居不歡時當謁原陵自引守備不愼慙見陵園遂不行初太夫人葬起墳微髙太后以為言兄廖等即時減削其外親有謙素義行者輒假借温言賞以財位如有纖介則先見嚴恪之色然後加譴其羙車服不軌法度者便絶屬籍遣歸田里廣平鉅鹿樂成王車騎朴素無金銀之飾帝以白太后太后即賜錢各五百萬於是内外從化被服如一諸家惶恐倍於永平時乃置織室蠶於濯龍中前書有東織西織屬少府平帝改名織室數往觀視以為娛樂常與帝旦夕言道政事及敎授諸小王論語經書述叙平生雍和終日四年天下豐稔方垂無事帝遂封三舅廖防光為列侯並辭讓願就關内侯太后聞之曰聖人設敎各有其方知人情性莫能齊也禮記王制曰凡居人材必因天地寒暖燥濕廣谷大川異制人居其間異俗脩其敎不易其俗齊其政不易其宜中國戎夷五方之人皆有性也不可推移吾少壯時但慕竹帛志不顧命言少慕古人書名竹帛不顧命之長短今雖已老而復戒之在得論語孔子曰少之時戒之在色及其老也戒之在得得貪嗇也言彌復吝惜封爵不欲濫封親戚也故日夜惕厲思自降損惕懼也厲危也居不求安食不念飽冀乗此道不負先帝所以化導兄弟共同斯志欲令瞑目之日無所復恨何意老志復不從哉萬年之日長恨矣廖等不得已受封爵而退位歸第焉太后其年寢疾不信巫祝小醫數敕絶禱祀至六月崩在位二十三年年四十餘合葬顯節陵賈貴人南陽人建武末選入太子宫中元二年生肅宗而顯宗以為貴人帝既為太后所養専以馬氏為外家故貴人不登極位賈氏親族無受寵榮者及太后崩乃䇿書加貴人王赤綬續漢書曰諸侯王赤綬也安車一駟衣巷宫人二百永巷宫中署名也後改為掖庭永巷宫人即宫婢也御府雜帛二萬匹大司農黄金千斤錢二千萬竇皇后紀章徳竇皇后諱某扶風平陵人大司徒融之曾孫也祖穆父勳坐事死事在竇融傳勳尚東海恭王彊女泚陽公主后其長女也家既廢壊數呼相工問息耗薛氏韓詩章句曰耗惡也息耗猶言善惡也見后者皆言當大尊貴非臣妾容貎年六嵗能書親家皆竒之建初二年后與女弟俱以選例入見長樂宫進止有序風容甚盛肅宗先聞后有才色數以訊諸姬傅訊問也傅謂傅母及見雅以為羙馬太后亦異焉因入掖庭見於北宫章徳殿后性敏給傾心承接稱譽日聞明年遂立為皇后妹為貴人七年追爵諡后父勳為安成思侯安成縣屬汝南郡故城在今豫州吳房縣東南后寵幸殊特專固後宫初宋貴人生皇太子慶梁貴人生和帝后既無子並疾忌之數間於帝漸至疎嫌因誣宋貴人挾邪媚道遂自殺廢慶為清河王語在慶傳梁貴人者梁竦之女也少失母為伯母舞隂長公主所養長公主光武女梁松尚焉年十六建初二年亦與中姊俱選入掖庭為貴人四年生和帝后養為己子欲専名外家而忌梁氏八年乃作飛書以陷竦飛書若今匿名書也竦坐誅貴人姊妹以憂卒自是宫房惵息惵懼也音牒周書曰臨捕以威而氣惵懼也后愛日隆及帝崩和帝即位尊后為皇太后皇太后臨朝尊母泚陽公主為長公主益湯沐邑三千戸兄憲弟篤景並顯貴擅威權後遂密謀不軌永元四年發覺被誅九年太后崩未及葬而梁貴人姊嬺音一計反上書陳貴人枉殁之状太尉張酺司徒劉方司空張奮上奏依光武黜吕太后故事中元元年黜吕后不宜配食髙廟貶太后尊號不宜合葬先帝百官亦多上言者帝手詔曰竇氏雖不遵法度而太后常自減損朕奉事十年深惟大義禮臣子無貶尊上之文恩不忍離義不忍虧案前世上官太后亦無降黜上官太后昭帝后也父安與燕王謀反誅太后以年少又霍光外孫故不廢也其勿復議於是合葬敬陵在位十八年帝以貴人酷殁斂葬禮闕乃改殯於承光宫上尊諡曰恭懐皇后諡法曰敬事尊上曰恭慈仁哲行曰懐追服喪制百官縞素與姊大貴人俱葬西陵儀比敬園敬園安帝祖母宋貴人之園也隂皇后紀和帝隂皇后諱某光烈皇后兄執金吾識之曾孫也后少聰慧善書蓺永元四年選入掖庭以先后近屬故得為貴人有殊寵八年遂立為皇后自和熹鄧后入宫熹音許其反愛寵稍衰數有恚恨后外祖母鄧朱出入宫掖十四年夏有言后與朱共挾巫蠱道巫師為蠱故曰巫蠱左傳注曰蠱惑也事發覺帝遂使中常侍張愼與尚書陳褒於掖庭獄雜考案之朱及二子奉毅與后弟軼輔敞辭語相連及以為祠祭祝詛大逆無道奉毅輔考死獄中帝使司徒魯恭持節賜后䇿上璽綬遷于桐宫以憂死立七年葬臨平亭部葬于亭部内之地也父特進綱自殺軼敞及朱家屬徙日南比景縣宗親内外昆弟皆免官還田里永初四年鄧太后詔赦隂氏徙者歸故郡還其資財五百餘萬鄧皇后紀和熹鄧皇后諱綏蔡邕曰諡法有功安人曰熹太傅禹之孫也父訓䕶羌校尉母隂氏光烈皇后從弟女也后年五嵗太傅夫人愛之自為翦髮夫人年髙目㝠誤傷后額忍痛不言左右見者怪而問之后曰非不痛也夫人哀憐為斷髮難傷老人意故忍之耳六嵗能史書史書周宣王太史籕所作大篆十五篇也前書曰敎學童之書也十二通詩論語諸兄每讀經傳輒下意難問下意猶出氣也志在典籍不問居家之事母常非之曰汝不習女工以供衣服乃更務學寧當舉博士邪后重違母言晝脩婦業暮誦經典家人號曰諸生父訓異之事無大小輒與詳議永元四年當以選入㑹訓卒后晝夜號泣終三年不食鹽菜憔悴毁容親人不識之后甞夢捫天捫摸也蕩蕩正青若有鍾乳状乃仰嗽飲之以訊諸占夢言堯夢攀天而上湯夢及天而咶之咶音是斯皆聖王之前占吉不可言又相者見后驚曰此成湯之法也續漢書曰相者待詔相工蘇文曰此成湯之骨法家人竊喜而不敢宣后叔父陔言常聞活千人者子孫有封兄訓為謁者使脩石臼河嵗活數千人天道可信家必蒙福初太傅禹歎曰吾将百萬之衆未嘗妄殺一人其後世必有興者七年后復與諸家子俱選入宫后長七尺二寸姿顏姝麗姝羙色也詩曰彼姝者子絶異於衆左右皆驚八年冬入掖庭為貴人時年十六恭肅小心動有法度承事隂后夙夜戰兢接撫同列常克己以下之雖宫人隸役皆加恩借帝深嘉焉及后有疾特令后母兄弟入視醫藥不限以日數后言於帝曰宫禁至重而使外舎久在内省外舎外家上令陛下有幸私之譏下使賤妾獲不知足之謗上下交損誠不願也帝曰人皆以數入為榮貴人反以為憂深自抑損誠難及也每有讌㑹諸姬貴人競自脩整簪珥光采袿裳鮮明説文簪笄也珥瑱也以玉充耳釋名曰婦人上服曰袿而后獨着素裝服無飾其衣有與隂后同色者即時解易若並時進見則不敢正坐離立行則僂身自卑離並也禮記曰離坐離立無往參焉帝每有所問常逡廵後對不敢先隂后言帝知后勞心曲體歎曰脩徳之勞乃如是乎後隂后漸疎每當御見輒辭以疾時帝數失皇子后憂繼嗣不廣數選進才人以博帝意隂后見后徳稱日盛不知所為遂造祝詛欲以為害帝嘗寢病危甚隂后宻言我得意不令鄧氏復有遺類后聞乃對左右流涕言曰我竭誠盡心以事皇后竟不為所祐而當獲罪於天婦人雖無從死之義然周公身請武王之命武王有疾周公為之請命於太王王季文王曰若爾三王有丕子之責于天以旦代某之身也越姬心誓必死之分越姬楚昭王之姬越王句踐女也昭王讌遊越姬從謂姬曰樂乎對曰樂則樂矣而不可久也王曰願與子生死若此姬曰君王樂遊要妾以死不敢聞命後王病有赤雲夹日如飛鳥王問周太史史曰是害王身請移於将相王曰将相於孤猶股肱也不聽姬曰大哉君王之徳妾請從王死矣昔日遊樂是以不敢聽命今君王復禮國人為君王死何况妾乎妾願先驅狐狸於地下昔日口雖不言心許之矣妾聞信者不負其心遂自殺故曰心誓事見列女傳也上以報帝之恩中以解宗族之禍下不令隂氏有人豕之譏髙帝愛幸戚夫人帝崩吕太后斷夫人手足去眼薫耳使居鞠室中名曰人彘也即欲飲藥宫人趙玉者固禁之因詐言屬有使来上疾已愈后信以為然乃止明日帝果瘳十四年夏隂后以巫蠱事廢后請救不能得帝便屬意焉后愈稱篤疾深自閉絶㑹有司奏建長秋宫帝曰皇后之尊與朕同體承宗廟母天下豈易哉唯鄧貴人徳冠後庭乃可當之至冬立為皇后辭讓者三然後即位手書表謝深陳徳薄不足以充小君之選是時方國貢獻競求珍麗之物自后即位悉令禁絶嵗時但供紙墨而已帝每欲官爵鄧氏后輒哀請謙讓故兄隲終帝世不過虎賁中郎元興元年帝崩長子平原王有疾而諸皇子夭殁前後十數後生者輒隱祕養於人間殤帝生始百日后乃迎立之尊后為皇太后太后臨朝和帝葬後宫人並歸園太后賜周馮貴人䇿曰朕與貴人託配後庭共歡等列十有餘年不獲福祐先帝早棄天下孤心焭焭焭焭孤特之貌也詩曰焭焭在疚靡所瞻仰夙夜永懐感愴發中今當以舊典分歸外園慘結増歎燕燕之詩曷能喻焉詩鄁鄘序曰衛荘姜送歸妾也其詩曰燕燕于飛差池其羽之子于歸逺送于野瞻望不及泣涕如雨其賜貴人王青蓋車采飾輅驂馬各一駟黄金三十斤雜帛三千匹白越四千端又賜馮貴人王赤綬以未有步摇環珮加賜各一具周禮王后首服為副所以副首為飾若今步摇也釋名曰皇后首副其上有垂珠步則摇也是時新遭大憂法禁未設宫中亡大珠一篋太后念欲考問必有不辜乃親閱宫人觀察顏色即時首服又和帝幸人吉成御者共枉吉成以巫蠱事遂下掖庭考訊辭證明白太后以先帝左右待之有恩平日尚無惡言今反若此不合人情更自呼見實覈果御者所為莫不歎服以為聖明常以鬼神難徴滛祀無福乃詔有司罷諸祠官不合典禮者又詔赦除建武以来諸犯妖惡及馬竇家屬所被禁錮者皆復之為平人減太官導官尚方内者服御珍膳靡麗難成之物漢官儀曰太官主膳羞也前書音義曰導官主導擇米以供祭祀尚方掌工作刀劒諸物及刻玉為器漢官儀曰内者主帷帳並署名也自非供陵廟稻粱米不得導擇朝夕一肉飯而已舊太官湯官經用嵗且二萬萬經常也太后勅止曰殺省珍費自是裁數千萬及郡國所貢皆減其過半悉斥賣上林鷹犬其蜀漢釦器九帶佩刀並不復調蜀蜀郡也漢廣漢郡也二郡主作供進之器元帝時貢禹上書蜀廣漢主金銀器各用五百萬是也釦音口以金銀緣器也止畫工三十九種又御府尚方織室錦繡冰紈綺縠金銀珠玉犀象瑇瑁雕鏤翫弄之物皆絶不作離宫别館儲峙米糒薪炭悉令省之儲峙猶蓄積也糒乾飯也又詔諸園貴人其宫人有宗室同族若羸老不任使者令園監實覈上名自御北宫增喜觀閲問之恣其去留即日免遣者五六百人及殤帝崩太后定䇿立安帝猶臨朝政以連遭大憂百姓苦役大憂謂和帝殤帝崩殤帝康陵方中祕藏方中陵中也冡藏之中故言祕也及諸工作事事減約十分居一詔告司隸校尉河南尹南陽太守曰每覽前代外戚賔客假借威權輕薄􅢽詷言忽遽也􅢽音七洞反詷音洞至有濁亂奉公為人患苦咎在執法怠懈不輒行其罸故也今車騎將軍隲等雖懐敬順之志而宗門廣大姻戚不少賔客姦猾多干禁憲干犯也其明加檢勅勿相容䕶自是親屬犯罪無所假貸太后愍隂氏之罪廢赦其徙者歸鄉勅還資財五百餘萬永初元年爵號太夫人為新野君萬户供湯沐邑湯沐者取其賦稅以供湯沐之具也二年夏京師旱親幸洛陽寺錄寃獄有囚實不殺人而被考自誣羸困輿見畏吏不敢言将去舉頭若欲自訴太后察視覺之即呼還問狀具得枉實即時收洛陽令下獄抵罪行未還宫澍雨大降三年秋太后體不安左右憂惶禱請祝辭願得代命太后聞之即譴怒竊勅掖庭令以下但使謝過祈福不得妄生不祥之言舊事嵗終當饗遣衛士舊事衛士得代歸者上親饗焉前書蓋寛饒傳曰歳盡當代上臨饗罷衛卒是也大儺逐疫禮記月令有大儺旁磔土牛以送寒氣鄭𤣥注云儺隂氣也此月之中日歴虛危有墳墓四星之氣為厲鬼隨彊隂出以害人故儺却之也太后以隂陽不和軍旅數興詔饗㑹勿設戯作樂減逐疫侲子之半侲子逐疫之人也音振薛綜注西京賦云侲之言善也善童幼子也續漢書曰大儺選中黄門子弟年十嵗以上十二以下百二十人為侲子皆赤幘皂製執大鞉悉罷象槖駝之屬豐年復故太后自入宫掖從曹大家受經書兼天文筭數晝省王政夜則誦讀而患其謬誤懼垂典章乃博選諸儒劉珍等及博士議郎四府掾史五十餘人詣東觀讎校傳記讎對也事畢奏御賜葛布各有差又詔中官近臣於東觀受讀經傳以敎授宫人左右習誦朝夕濟濟及新野君薨太后自侍疾病至乎終盡憂哀毁損事加於常贈以長公主赤綬東園祕器玉衣繡衾東園署名屬少府主作凶器故言祕也又賜布三萬匹錢三千萬騭等遂固讓錢布不受使司空持節䕶喪事儀比東海恭王諡曰敬君太后諒闇既終諒闇居喪之廬也或為諒隂諒信也隂黙也言居憂信黙不言久旱太后比三日幸洛陽錄囚徒理出死罪三十六人耏罪八十人其餘減罪死右趾以下至司宼七年正月初入太廟齋七日賜公卿百僚各有差庚戌謁宗廟率命婦羣妾相禮儀相助也儀禮曰命夫者男子之為大夫也命婦者大夫之妻也與皇帝交獻親薦成禮而還周禮宗廟祭之日旦王服衮冕而入立於阼后服副褘從王而入王以圭瓉酌鬱鬯以獻尸次后以璋瓉酌鬱鬯以獻尸此謂交獻也卒事凡九獻焉因下詔曰凡供薦新味多非其節或鬱養强孰或穿掘萌芽味無所至而夭折生長豈所以順時育物乎傳曰非其時不食論語曰不時不食言非其時物則不食之前書召信臣曰不時之物有傷於人不宜以奉供養自今當奉祠陵廟及給御者皆須時乃上凡所省二十三種自太后臨朝水旱十載四夷外侵盗賊内起每聞人飢或逹旦不寐而躬自減徹以救災阸故天下復平嵗還豐穰元初五年平望侯劉毅平望縣屬北海郡今青州北海縣西北平望臺是也一名望海臺也以太后多徳政欲令早有注紀上書安帝曰臣聞易載羲農而皇徳著易繫辭曰古者庖犧氏之王天下仰觀象於天俯觀法於地於是始畫八卦以通神明之徳以類萬物之情庖羲氏沒神農氏作斵木為耜揉木為耒耒耜之利以敎天下伏羲神農為三皇故言皇徳也書述唐虞而帝道崇故雖聖眀必書功於竹帛流音於管絃竹謂簡冊帛謂縑素黄帝以下六代樂音所以章顯功徳是流音於管絃伏惟皇太后膺大聖之姿體乾坤之徳易曰聖人與天地合其徳齊蹤虞妃比跡任姒虞妃即舜妻娥皇女英也任文王母姒武王母也孝悌慈仁允恭節約杜絶奢盈之源防抑逸欲之兆正位内朝流化四海易家人卦曰女正位乎内正家而天下定矣禮記曰東夷西戎南蠻北狄謂之四海及元興延平之際國無儲副仰觀乾象參之人譽援立陛下為天下主永安漢室綏靜四海又遭水潦東州饑荒延平元年安帝初即位六州大水永初元年禀司隸兖豫徐冀并六州貧人也垂恩元元冠蓋交路菲薄衣食躬率羣下損膳解驂以贍黎苖廣雅曰苖衆也惻隱之恩猶視赤子隱痛也尚書曰若保赤子惟人其康乂也克己引愆顯揚仄陋崇晏晏之政尚書考靈耀曰文基晏晏敷在寛之敎敷布也尚書曰五敎在寛興滅國繼絶世錄功臣復宗室追還徙人蠲除禁錮政非恵和不圖於心制非舊典不訪於朝𢎞徳洋溢洋溢言多充塞宇宙洪澤豐沛漫衍八方華夏樂化戎狄混幷丕功著於大漢碩恵加於生人巍巍之業可聞而不可及蕩蕩之勲可誦而不可名古之帝王左右置史禮記玉藻曰動則左史書之言則右史書之漢之舊典世有注紀夫道有夷崇治有進退若善政不述細異輒書是為堯湯負洪水大旱之責而無咸熈假天之羙咸皆也熙廣也尚書曰庶績咸熙言堯之朝政衆功皆廣假音格至也尚書曰祐我烈祖格于皇天言伊尹佐湯功至于天也堯洪水九載湯大旱七年髙宗成王有雉雊迅風之變而無中興康寧之功也髙宗殷王也祖乙之子名武丁當祭成湯有飛雉升鼎耳而雊髙宗修徳殷道中興成王疑周公乃有雷電大風之變成王改過幾刑措也上考詩書有虞二妃周室三母尚書曰釐降二女于媯妠嬪于虞三母謂后稷母姜嫄文王母太任武王母太姒也詩大雅曰厥初生民時維姜嫄又曰太任有身生此文王又曰太姒嗣徽音則百斯男也修行佐徳詩云既有烈考亦有文母是佐徳也劉攽曰注案今詩皆作右字右有音耳不當作有也思不踰閾閾門限也左傳曰婦人送迎不出門見兄弟不踰閾未有内遭家難外遇災害覧總大麓經營天物麓錄也言大錄萬機之政書曰納于大麓又曰暴殄天物也功徳巍巍若兹者也宜令史官著長樂宫注聖徳頌以敷宣景燿勒勳金石縣之日月易曰縣象著明莫大乎日月攄之罔極以崇陛下烝烝之孝帝從之廣雅曰攄舒也孔安國注尚書曰烝烝猶進進也六年太后詔徵和帝弟濟北河間王子男女年五嵗以上四十餘人又鄧氏近親子孫三十餘人並為開邸第倉頡篇曰邸舎也敎學經書躬自監試尚幼者使置師保朝夕入宫撫循詔導恩愛甚渥詔告也乃詔從兄河南尹豹越騎校尉康等曰吾所以引納羣子置之學官者實以方今承百王之敝時俗淺薄巧偽滋生五經衰缺不有化導将遂陵遲故欲襃崇聖道以匡失俗傳不云乎飽食終日無所用心難矣哉論語孔子言也言人終日飽食不措心于道義難矣哉言終無逺大也今末世貴戚食祿之家温衣羙飯乗堅驅良堅謂好車良謂善馬也墨子曰聖王為衣服之法堅車良馬不知貴也而面牆術學不識臧否尚書曰弗學靣牆也斯故禍敗所從来也永平中四姓小侯皆令入學小侯解見明紀所以矯俗厲薄反之忠孝先公既以武功書之竹帛兼以文徳敎化子孫先公謂鄧禹禹有子十三人各使守一蓺故曰文徳也故能束脩不觸羅網言能自約束脩整也誠令兒曹上述祖考休烈下念詔書本意則足矣其勉之哉康以太后久臨朝政心懐畏懼託病不朝太后使内人問之時宫婢出入多能有所毁譽其耆宿者皆稱中大人所使者乃康家先婢亦自通中大人康聞詬之曰汝我家出爾敢爾邪婢怒還説康詐疾而言不遜太后遂免康官遣歸國絶屬籍永寜二年二月寢病漸篤乃乘輦於前殿見侍中尚書因北至太子新所繕宫還大赦天下賜諸園貴人王主羣僚錢布各有差詔曰朕以無徳託母天下而薄祐不天早離大憂延平之際海内無主元元戹運危於累卵説苑曰晉靈公驕奢造九層之臺國困人貧恥功不成令曰左右諫者斬也孫息求見公曰諫邪息曰不敢臣能累十二博棊加九雞子其上公曰危哉息曰復有危於此者公為九層之臺男女不得耕織社稷一滅君何所望君曰寡人之過乃壊臺焉勤勤苦心不敢以萬乘為樂上欲不欺天愧先帝下不違人負宿心誠在濟度百姓以安劉氏自謂感徹天地當蒙福祚而喪禍内外傷痛不絶内外謂新野君薨及和殤二帝崩也頃以廢病沈滯久不侍祠自力上原陵加欬逆唾血遂至不解存亡大分無可奈何公卿百官其勉盡忠恪以輔朝廷三月崩在位二十年年四十一合葬順陵論曰鄧后稱制終身號令自出術謝前政之良身闕明辟之義前政謂周公也辟君也尚書曰朕復子明辟言周公攝位復還成王今太后不還故曰闕也至使嗣主側目歛衽於虛器器謂神器諭帝位也直生懐懣懸書於象魏象魏闕也直生杜根等上書請太后還政借之儀者殆其惑哉借猶假也殆近也言太后不還政於安帝近可惑也然而建光之後王柄有歸太后建光之中崩歸政安帝遂乃名賢戮辱便孽黨進帝寵用乳母王聖及其女伯榮出入宫掖通傳姦賂太尉楊震及鄧隲等皆被中官譖誅也衰斁之来兹焉有徴斁敗也安帝臨政衰敗逾甚故曰有徴也故知持權引謗所幸者非己焦心䘏患自强者唯國言執持朝權以招衆謗者所幸不為己身唯憂國也是以班母一説闔門辭事太后兄大将軍騭以母憂上書乞身太后不許以問班昭乃許之語見昭傳也愛姪微愆髠剔謝罪太后兄騭子鳳受遺事洩騭遂髠妻及鳳以謝天下語見騭傳將杜根逢誅未値其誠乎誠信也言未為太后所信但蹊田之牛奪之己甚左傳申叔時曰牽牛以蹊人之田而奪之牛牽牛以蹊者信有罪矣而奪之牛罸己重矣此喻杜根上書雖曰有罪太后殺之爲過甚也後漢書卷十上後漢書卷十上考證皇后紀上后紀増級十四注此六宫品秩同為一等臣良裘按宫當作官舞涓等皆官名非宫名也光烈隂皇后紀九年有盜刼殺后母鄧氏及弟訢臣世駿按三國志注引孫盛曰按光武紀建武九年盜刼隂貴人母弟吏以不得拘質廹盜盜遂殺之即此事也章懐失注孫盛作漢晉陽秋在范史前百年所按光武紀必後漢時班固等所撰者尊后為皇太后監夲脫一皇字從宋本添明徳馬皇后紀嵗給二千萬此句之下一夲有諸史並闕後事故不知所終十一字宋本無章徳竇皇后紀尚東海恭王彊女泚陽公主何焯校夲泚改沘梁貴人者此句之下一夲有褒親愍侯四字宋夲無和熹鄧皇后紀使修石臼河何焯曰使修當作罷修后憂繼嗣不廣此句之下一夲有恒垂涕歎息五字宋夲毛夲南監夲俱無其賜貴人王青蓋車王字諸夲誤玉臣宗萬按王青蓋車見安帝紀注有明文後漢書卷十上考證欽定四庫全書後漢書卷十下宋宣城太守范煜撰唐章懷太子賢注后紀第十下安思閻皇后順烈梁皇后孝崇匽皇后懿獻梁皇后孝桓鄧皇后桓思竇皇后孝仁董皇后孝靈宋皇后靈思何皇后獻帝伏皇后獻穆曹皇后閻皇后紀安思閻皇后諱姬諡法曰謀慮不愆曰思河南滎陽人也祖父章永平中為尚書以二妹為貴人章精力曉舊典久次當遷以重職顯宗為後宫親屬竟不用出為步兵校尉漢官儀曰比二千石掌宿衛兵屬北軍中候也章生暢暢生后后有才色元初元年以選入掖庭甚見寵愛為貴人二年立為皇后后専房妬忌帝幸宫人李氏生皇子保遂鴆殺李氏鴆毒鳥也食蝮以其羽畫酒中飲之立死三年以后父侍中暢為長水校尉封北宜春侯北宜春縣屬汝南郡以豫章有宜春故此加北故城在今豫州汝陽縣西南也食邑五千户四年暢卒諡曰文侯子顯嗣建光元年鄧太后崩帝始親政事顯及弟景耀晏並為卿校典禁兵延光元年更封顯長社縣侯長社縣屬潁川郡前書音義曰其社中樹暴長故名長社今許州縣食邑萬三千五百户追尊后母宗為滎陽君續漢志曰婦人封君儀比公主油犍軿車帶綬以采組為緄帶各如其綬色黄金辟邪加其首為帶顯景諸子年皆童齓大戴禮曰男八嵗而齓女七歳而齓齓毁齒也音初刃反並為黄門侍郎后寵既盛而兄弟頗與朝權后遂與大長秋江京中常侍樊豐等共譖皇太子保廢為濟隂王四年春后從帝幸章陵帝道疾崩於葉縣后顯兄弟及江京樊豐等謀曰今晏駕道次晏晚也臣下不敢斥言帝崩猶言晚駕而出濟隂王在内邂逅公卿立之還為大害乃偽云帝疾甚徙御卧車行四日驅馳還宫明日詐遣司徒劉喜詣郊廟社稷告天請命其夕乃發喪尊后曰皇太后皇太后臨朝蔡邕獨斷曰少帝即位太后即代攝政臨前殿朝羣臣太后東面少帝西面羣臣奏事上書皆為兩通一詣后一詣少帝以顯為車騎將軍儀同三司太后欲久專國政貪立幼年與顯等定䇿禁中迎濟北恵王子北鄉侯懿恵王名壽章帝子也立為皇帝顯忌大将軍耿寳耿弇之弟舒之孫位尊權重威行前朝乃風有司奏寳及其黨與中常侍樊豐虎賁中郎将謝惲惲弟侍中篤篤弟大将軍長史宓善文曰惲字伯周宓字仲周篤字季周侍中周廣阿母野王君王聖聖女永永壻黄門侍郎樊嚴等更相阿黨互作威福探刺禁省更為唱和皆大不道豐惲廣皆下獄死家屬徙比景比景縣名屬日南郡前書音義曰日居於頭上景在已下故名之宓嚴減死髠鉗貶寳為則亭侯遣就國自殺王聖母子徙鴈門於是景為衛尉耀城門校尉晏執金吾兄弟權要威福自由少帝立二百餘日而疾篤顯兄弟及江京等皆在左右京引顯屏語曰北鄉侯病不解國嗣宜時有定前不用濟隂王今若立之後必當怨又何不早徵諸王子簡所置乎顯以為然及少帝薨京白太后徵濟北河間王子未至而中黄門孫程合謀殺江京等立濟隂王是為順帝顯景晏及黨與皆伏誅遷太后於離宫家屬徙比景明年太后崩在位十二年合𦵏恭陵帝母李氏瘞在洛陽城北帝初不知莫敢以聞及太后崩左右白之帝感悟發哀親到瘞所更以禮殯上尊諡曰恭愍皇后葬恭北陵為䇿書金匱藏于世祖廟在恭陵之北因以為名漢官儀曰置陵園令食監各一人秩皆六百石金匱緘之以金梁皇后紀順烈梁皇后諱妠諡法曰執徳尊業曰烈聲類曰妠妠娶也音納大将軍商之女恭懐皇后弟之孫也后生有光景之祥少善女工好史書九嵗能誦論語治韓詩韓嬰所傳詩也大義畧舉常以列女圖畫置於左右以自監戒劉向撰列女傳八篇圖畫其象父商深異之竊謂諸弟曰我先人全濟河西所活者不可勝數商曾祖統更始二年補中郎将酒泉太守使安集凉州時西河擾亂衆議以統素有威信乃推統與竇融共完全五郡雖大位不究而積徳必報若慶流子孫者儻興此女乎永建三年與姑俱選入掖庭時年十三相工茅通見后驚再拜賀曰此所謂日角偃月相之極貴臣所未嘗見也太史卜兆得壽房又筮得坤之比易坤卦六五爻變而之比九五象曰顯比之吉位正中也九五居得其位下應於上故吉遂以為貴人常特被引御從容辭於帝曰夫陽以博施為徳隂以不専為義螽斯則百福之所由興也詩國風序曰言后妃若螽斯不妬忌則子孫衆多也詩大雅曰大姒嗣徽音則百斯男也願陛下思雲雨之均澤識貫魚之次序易曰雲行雨施品物流形剝卦曰貫魚以宫人寵無不利剝坤下艮上五隂而一陽衆隂在下駢頭相次似貫魚也使小妾得免罪謗之累由是帝加敬焉陽嘉元年春有司奏立長秋宫以乗氏侯商先帝外戚商祖姑章帝貴人生和帝也春秋之義娶先大國公羊傳曰天子娶於紀紀夲子爵也先襃為侯言王者不娶於小國也梁小貴人宜配天祚正位坤極正其内位居隂徳之極也易曰女正位乎内也帝從之乃於壽安殿立貴人為皇后夀安是徳陽宫内殿名后既少聰恵深覽前世得失雖以徳進不敢有驕専之心每日月見讁讁責也禮記云陽事不得讁見於天日為之食隂事不得讁見於天月為之食輒降服求愆建康元年帝崩后無子羙人虞氏子炳立是為冲帝尊后為皇太后太后臨朝冲帝尋崩復立質帝猶秉朝政時揚徐劇賊宼擾州郡西羌鮮卑及日南蠻夷攻城暴掠賦歛煩數官民困竭太后夙夜勤勞推心仗賢委任太尉李固等㧞用忠良務崇節儉其貪叨罪慝多見誅廢貪財曰叨慝惡也分兵討伐羣宼消夷故海内肅然宗廟以寧而兄大将軍冀鴆殺質帝專權暴濫忌害忠良數以邪説疑誤太后遂立桓帝而誅李固太后又溺於宦官多所封寵以此天下失望和平元年春歸政於帝太后寝疾遂篤乃御輦幸宣徳殿見宫省官屬及諸梁兄弟詔曰朕素有心下結氣從間以来加以浮腫逆害飲食寝以沈困寝漸也比使内外勞心請禱私自忖度日夜虛劣不能復與羣公卿士共相終竟援立聖嗣恨不久育養見其終始今以皇帝将軍兄弟委付股肱其各自勉焉後二日而崩在位十九年年四十五合葬憲陵虞羙人者以良家子年十三選入掖庭續漢志曰羙人父詩為郎中詩父衡屯騎校尉又生女舞陽長公主自漢興母氏莫不尊寵順帝既未加羙人爵號而冲帝早夭大将軍梁冀秉政忌惡佗族故虞氏抑而不登但稱大家而已陳夫人者家本魏郡少以聲伎入孝王宫得幸生質帝亦以梁氏故榮寵不及焉熹平四年小黄門趙祐續漢志曰小黄門六百石宦者無員掌侍左右受尚書事上在内宫關通中外及中宫以下衆事諸公主及王大妃等疾苦則使問之議郎卑整上言風俗通曰卑氏鄭大夫卑諶之後漢有卑躬為北平太守春秋之義母以子貴公羊傳曰桓公幼而貴隱公長而卑桓何以貴母貴也母貴則子何以貴子以母貴母以子貴隆漢盛典尊崇母氏凡在外戚莫不加寵今冲帝母虞大家質帝母陳夫人皆誕生聖皇而未有稱號夫臣子雖賤尚有追贈之典况二母見在不蒙崇顯之次無以述遵先世垂示後世也帝感其言乃拜虞大家為憲陵貴人陳夫人為渤海孝王妃孝王名鴻章帝子千乘貞王伉之孫鴻生質帝帝立徙渤海焉使中常侍持節授印綬遣太常以三牲告憲陵懐陵靜陵焉懐陵冲帝陵靜陵質帝陵匽皇后紀孝崇匽皇后諱明匽音偃為蠡吾侯翼媵妾蠡吾侯翼河間王開子和帝孫生桓帝桓帝即位明年追尊翼為孝崇皇陵曰博陵以后為博園貴人和平元年梁太后崩乃就博陵尊后為孝崇皇后遣司徒持節奉䇿授璽綬齎乘輿器服備法物宫曰永樂置太僕少府以下皆如長樂宫故事漢官儀曰帝祖母稱長信宫帝母稱長樂宫故有長信少府長樂少府及職吏皆宦者為之又置虎賁羽林衛士起宫室分鉅鹿九縣為后湯沐邑在位三年元嘉二年崩以帝弟平原王石為喪主石蠡吾侯翼子桓帝兄歛以東園畫梓夀器玉匣飯含之具禮儀制度比恭懐皇后東園署名屬少府掌為棺器梓木為棺以漆畫之稱夀器者欲其久長也猶如夀堂夀宫夀陵之類也漢舊儀曰梓棺長二丈廣四尺玉匣者腰已下為柙至足亦縫以黄金為縷飯含者以珠玉實口使司徒持節大長秋奉弔祠賻錢四千萬公羊傳曰貨財曰賻布四萬匹中謁者僕射典䕶喪事侍御史䕶大駕鹵簿漢官儀曰天子車駕次第謂之鹵簿有大駕法駕小駕大駕公卿奉引大将軍參乘太僕御屬車八十一乘備千乘萬騎侍御史在左駕馬詢問不法者今儀比車駕故以侍御史監䕶焉詔安平王豹河間王建渤海王悝悝音恢長社益陽二長公主長社公主桓帝姊耿弇弟覇𤣥孫援尚焉益陽公主桓帝妹侍中宼榮從兄子尚焉與諸國侯三百里内者及中二千石二千石令長相皆㑹葬将作大匠復土繕廟合葬博陵梁皇后紀桓帝懿獻梁王后諱女瑩諡法曰温和聖善曰懿聰明睿智曰獻順烈皇后之女弟也帝初為蠡吾侯梁太后徵欲與后為㛰未及嘉禮嘉禮㛰禮㑹質帝崩因以立帝明年有司奏太后曰春秋迎王后于紀在塗則稱后公羊傳曰祭公来迎王后于紀傳曰祭公者何天子之三公其稱王后何王者無外其辭成矣今大将軍冀女弟膺紹聖善膺當也紹嗣也聖善謂母也言娶妻當嗣親也詩云母氏聖善結㛰之際有命既集謂太后先有令許結親也詩云天監在下有命既集也宜備禮章時進徵幣徵成也納幣以成婚請下三公太常案禮儀奏可於是悉依孝恵皇帝納后故事聘黄金二萬斤納采鴈璧乗馬束帛一如舊典漢書舊儀聘皇后黄金萬斤吕后為恵帝娶魯元公主女故特優其禮也儀禮曰納采用鴈鄭𤣥注云納其采擇之禮用鴈取順隂陽往来也周禮王者穀圭以聘女鄭𤣥注云士大夫以上乃以𤣥纁束帛天子加以榖圭諸侯加以大璋然禮稱以圭此云用璧形制雖異為玉同也乘馬四匹馬也雜記曰納幣一束束五兩兩五尋然則每端二丈也建和元年六月始入掖庭八月立為皇后時太后秉政而梁冀専朝故后獨得寵幸自下莫得進見后藉姊兄廕埶恣極奢靡宫幄彫麗服御珍華巧飾制度兼倍前世及皇太后崩恩愛稍衰后既無子潛懐怨忌每宫人孕育鮮得全者帝雖廹畏梁冀不敢譴怒然見御轉稀至延熹二年后以憂恚崩在位十三年葬懿陵其嵗誅梁冀廢懿陵為貴人冢焉鄧皇后紀桓帝鄧皇后諱猛女和熹皇后從兄子鄧香之女也母宣初適香生后改嫁梁紀紀者大将軍梁冀妻孫夀之舅也后少孤隨母為居因冒姓梁氏冀妻見后貌羙永興中進入掖庭為采女絶幸采擇也以因采擇而立名明年封兄鄧演為南頓侯位特進演卒子康嗣及懿獻后崩梁冀誅立后為皇后帝惡梁氏改姓為薄封后母宣為長安君四年有司奏后本郎中鄧香之女不宜改易它姓於是復為鄧氏追封贈香車騎将軍安陽侯印綬更封宣康大縣宣為昆陽君康為泚陽侯賞賜巨萬計巨大也大萬謂萬萬也宣卒賵贈葬禮皆依后母舊儀以康弟統襲封昆陽侯位侍中統從兄㑹襲安陽侯為虎賁中郎将又封統弟秉為淯陽侯宗族皆列校郎将帝多内幸博採宫女至五六千人及驅役從使復兼倍於此而后恃尊驕忌與帝所幸郭貴人更相譖訴八年詔廢后送暴室以憂死漢官儀曰暴室在掖庭内丞一人主宫中婦人疾病者其皇后貴人有罪亦就此室也立七年葬於北邙從父河南尹萬世及㑹皆下獄死統等亦繫暴室免官爵歸夲郡財物没入縣官竇皇后紀桓思竇皇后諱妙章徳皇后從祖弟之孫女也延熹八年鄧皇后廢后以選入掖庭為貴人其冬立為皇后而御見甚稀帝所寵唯采女田聖等永康元年冬帝寝疾遂以聖等九女皆為貴人及崩無嗣后為皇太后太后臨朝定䇿立解犢亭侯宏是為靈帝太后素忌忍積怒田聖等桓帝梓宫尚在前殿遂殺田聖又欲盡誅諸貴人中常侍管覇蘇康苦諫乃止時太后父大将軍武謀誅宦官而中常侍曹節等矯詔殺武遷太后於南宫雲臺家屬徙比景竇氏雖誅帝猶以太后有援立之功建寧四年十月朔率羣臣朝于南宫親饋上夀黄門令董萌漢官儀曰黄門令秩六百石因此數為太后訴怨帝深納之供養資奉有加於前中常侍曹節王甫疾萌附助太后誣以謗訕永樂宫靈帝母所居也訕謗毁也萌坐下獄死熹平元年太后母卒於比景后感疾而崩立七年合葬宣陵董皇后紀孝仁董皇后諱某河間人為解犢亭侯萇夫人萇河間孝王開孫淑之子也生靈帝建寧元年帝即位追尊萇為孝仁皇陵曰愼陵以后為愼園貴人及竇氏誅明年帝使中常侍迎貴人幷徵貴人兄寵到京師上尊號曰孝仁皇后居南宫嘉徳殿嘉徳殿在九龍門内宫稱永樂拜寵執金吾後坐矯稱永樂后屬請下獄死及竇太后崩始與朝政使帝賣官求貨自納金錢盈滿堂室中平五年以后兄子衛尉修侯重修今徳州縣也故城在縣南修今作蓚音修為驃騎将軍領兵千餘人初后自養皇子協數勸帝立為太子而何皇后恨之議未及定而帝崩何太后臨朝重與太后兄大将軍進權埶相害后每欲叅干政事太后輒相禁塞后忿恚詈言曰汝今輈張怙汝兄耶輈張猶彊梁也當勑驃騎斷何進頭来何太后聞以告進進與三公及弟車騎将軍苖等奏孝仁皇后使故中常侍夏惲永樂太僕封諝等交通州郡漢官儀曰永樂太僕用中人為之辜較在所珍寳貨賂悉入西省辜較解見靈紀西省即謂永樂宫之司蕃后故事不得留京師蕃后謂平帝母衛姬時王莾攝政恐其專權后不得留在京師故云故事也輿服有章膳羞有品請永樂后遷宫夲國奏可何進遂舉兵圍驃騎府收重重免官自殺后憂怖疾病暴崩在位二十二年民間歸咎何氏喪還河間合葬愼陵宋皇后紀靈帝宋皇后諱某扶風平陵人也肅宗宋貴人之從曾孫也劉攽曰案宋貴人安得有從曽孫姓宋者當是漏一父字建寧三年選入掖庭爲貴人眀年立為皇后父酆執金吾封不其鄉侯不其縣屬琅邪郡故城在今莱州即墨縣西南蓋其縣之鄉也其音基决錄注酆字伯遇后無寵而居正位後宫幸姬衆共譖毁初中常侍王甫枉誅勃海王悝及妃宋氏熹平元年王甫譖悝與中常侍鄭䬃交通欲迎立悝悝自殺妃死獄中也妃即后之姑也甫恐后怨之乃與太中大夫程阿共構言皇后挾左道祝詛禮記曰執左道以亂衆殺無赦鄭𤣥注云左道若巫蠱也帝信之光和元年遂䇿收璽綬后自致暴室以憂死在位八年父及兄弟並被誅諸常侍小黄門在省闥者皆憐宋氏無辜共合錢物收葬廢后及酆父子歸宋氏舊瑩臯門亭詩云廼立臯門注云王之郭門曰臯門漢官儀曰十二門皆有亭帝後夢見桓帝怒曰宋皇后有何罪過而聽用邪孽使絶其命勃海王悝既已自貶又受誅斃今宋氏及悝自訴於天上帝震怒上帝天也震動也書曰帝乃震怒也罪在難救夢殊明察帝既覺而恐以事問於羽林左監許永續漢志日羽林左監一人秩六百石主羽林左騎右亦如之永或作詠曰此何祥其可禳乎禳謂除也永對曰宋皇后親與陛下共承宗廟母臨萬國歴年已久海内蒙化過惡無聞而虛聽䜛妬之説以致無辜之罪身嬰極誅禍及家族天下臣妾咸為怨痛勃海王悝桓帝母弟也處國奉藩未嘗有過陛下曾不證審遂伏其辜昔晉侯失刑亦夢大厲被髮屬地左傳曰晉侯夢大厲被髮及地搏膺而踊曰殺余孫不義余得請於帝矣杜預注曰厲鬼趙氏之先祖也晉侯先殺趙同趙括故怒也天道明察鬼神難誣宜幷改葬以安寃魂反宋后之徙家復勃海之先封以消厥咎帝弗能用尋亦崩焉何皇后紀靈思何皇后諱某南陽宛人家夲屠者以選入掖庭風俗通曰漢以八月筭人后家以金帛賂遺主者以求入也長七尺一寸生皇子辯養於史道人家號曰史侯道人謂道術之人也獻帝春秋曰靈帝數失子不敢正名養道人史子眇家號曰史侯拜后為貴人甚有寵幸性彊忌後宫莫不震懾光和三年立為皇后明年追號后父眞為車騎将軍舞陽宣徳侯因封后母興為舞陽君時王羙人任娠左傳曰邑姜方娠杜預注曰懐胎為娠音之刄反一音身畏后乃服藥欲除之而胎安不動又數夢負日而行四年生皇子協后遂酖殺羙人帝大怒欲廢后諸宦官固請得止董太后自養協號曰董侯王羙人趙國人也祖父苞五官中郎将羙人豐姿色聰敏有才明能書㑹計㑹計謂總㑹其數而筭以良家子應法相選入掖庭帝愍協早失母又思美人作追徳賦令儀頌中平六年帝崩皇子辯即位尊后為皇太后太后臨朝后兄大将軍進欲誅宦官反為所害舞陽君亦為亂兵所殺幷州牧董卓被徴将兵入洛陽凌虐朝廷遂廢少帝為𢎞農王而立協是為獻帝扶𢎞農王下殿北面稱臣太后鯁涕羣臣含悲莫敢言董卓又議太后踧廹永樂宫至令憂死逆婦姑之禮乃遷於永安宫因進酖弑而崩在位十年董卓令帝出奉常亭舉哀華延儁洛陽記曰城内有奉常亭公卿皆白衣㑹不成喪也有凶事素服而朝謂之白衣㑹左傳曰不書𦵏不成喪合葬文昭陵初太后新立當謁二祖廟欲齋輒有變故如此者數竟不克時有識之士心獨怪之後遂因何氏傾沒漢祚焉明年山東義兵大起討董卓之亂卓乃置𢎞農王於閣上使郎中令李儒進酖曰服此藥可以辟惡王曰我無疾是欲殺我耳不肯飲强飲之不得已乃與妻唐姬及宫人飲讌别酒行王悲歌曰天道易兮我何艱棄萬乘兮退守蕃逆臣見廹兮命不延逝将去汝兮適幽𤣥因令唐姬起舞姬抗袖而歌抗舉也曰皇天崩兮后土頽史記周烈王崩周人謂齊威王曰天崩地坼也身為帝兮命夭摧死生路異兮從此乖奈我焭獨兮心中哀因泣下嗚咽坐者皆歔欷王謂姬曰卿王者妃埶不復為吏民妻自愛從此長辭遂飲藥而死時年十八唐姬潁川人也王薨歸鄉里父㑹稽太守瑁欲嫁之姬誓不許及李傕破長安遣兵鈔關東畧得姬傕因欲妻之固不聽而終不自名不自名少帝之姬也袁宏紀曰為傕所畧不敢自言尚書賈詡知之魏志曰詡字文和武威姑臧人少時漢陽閻忠見而異之曰詡有良平之才以状白獻帝帝聞感愴乃下詔迎姬置園中使侍中持節拜為𢎞農王妃初平元年二月葬𢎞農王於故中常侍趙忠成壙中趙忠元有成壙因而葬焉諡曰懐王帝求母王羙人兄斌斌将妻子詣長安賜第宅田業拜奉車都尉興平元年帝加元服有司奏立長秋宫詔曰朕禀受不𢎞遭値禍亂未能紹先以光故典皇母前薨未卜宅兆禮章有闕中心如結詩云心如結兮三嵗之慼盖不言吉且須其後於是有司乃奏追尊王羙人為靈懐皇后改葬文昭陵儀比敬恭二陵敬章帝陵恭安帝陵使光禄大夫持節行司空事奉璽綬斌與河南尹駱業復土斌還遷執金吾封都亭侯凡言都亭者並城内亭也漢法大縣侯位視三公小縣侯位視上卿鄉亭侯視中二千石也食邑五百石病卒贈前将軍印綬謁者監護喪事長子端襲爵伏皇后紀獻帝伏皇后諱壽琅邪東武人東武今宻州諸城縣大司徒湛之八世孫也父完沈深有大度襲爵不其侯尚桓帝女陽安公主陽安縣屬汝南郡故城在今豫州朗山縣東北為侍中初平元年從大駕西遷長安后時入掖庭爲貴人興平二年立為皇后完遷執金吾帝尋而東歸李傕郭汜等追敗乗輿於曹陽帝乃潛夜度河走度所在今陜州陜縣北水經曰銅翁仲所沒處是獻帝東遷潛度所六宫皆歩行出營周禮曰王后率六宫之人鄭𤣥注曰六宫之人夫人以下分居后之六宫者后手持縑數匹董承使符節令孫徽以刃脅奪之殺傍侍者血濺后衣濺音子見反既至安邑御服穿敝唯以棗栗為糧建安元年拜完輔國将軍儀比三司完以政在曹操自嫌尊戚乃上印綬拜中散大夫尋遷屯騎校尉十四年卒子典嗣自帝都許守位而已宿衛兵侍莫非曹氏黨舊姻戚議郎趙彦嘗為帝陳言時䇿曹操惡而殺之其餘内外多見誅戮操後以事入見殿中帝不任其憤因曰君若能相輔則厚不爾幸垂恩相捨操失色俛仰求出舊儀三公領兵朝見令虎賁執刃挾之操出顧左右汗流浹背浹徹也音子協反自後不敢復朝請董承女為貴人操誅承而求貴人殺之帝以貴人有􅗖説文曰􅗖孕也音仁䕃反累為請不能得后自是懐懼乃與父完書言曹操殘逼之状令宻圖之完不敢發至十九年事乃露泄操追大怒遂逼帝廢后假為䇿曰皇后夀得由卑賤登顯尊極自處椒房漢官儀曰皇后稱椒房取其蕃實之義也詩云椒聊之實蕃衍盈升二紀于兹既無任姒徽音之羙太任文王母太姒武王母徽羙也詩云太姒嗣徽音又乏謹身養己之福左傳曰人受天地之中以生謂之命能者養之以福不能者敗以取禍而隂懐妬害苞藏禍心弗可以承天命奉祖宗今使御史大夫郗慮持節䇿詔其上皇后璽綬蔡邕獨斷曰皇后赤綬玉璽續漢志曰乗輿黄赤綬四綵黄赤縹紺淳黄圭綬長二丈九尺九寸五百首太皇太后皇太后其綬皆與乗輿同退避中宫遷于它館嗚呼傷哉自夀取之未致于理為幸多焉又以尚書令華歆為郗慮副魏志曰華歆字子魚平陽髙唐人代荀彧為尚書令慮字鴻預山陽髙平人勒兵入宫收后閉户藏壁中劉攽曰案文少一后字歆就牽后出時帝在外殿引慮於坐后被髮徒跣行泣過訣曰不能復相活邪帝曰我亦不知命在何時顧謂慮曰郗公天下寧有是邪遂将后下暴室以幽崩所生二皇子皆酖殺之后在位二十年兄弟及宗族死者百餘人母盈等十九人徙涿郡曹皇后紀獻穆曹皇后諱節諡法曰布徳執義曰穆魏公曹操之中女也建安十八年操進三女憲節華為夫人聘以束帛𤣥纁五萬匹小者待年於國留住於國以待年長十九年並拜為貴人及伏皇后被弑明年立節為皇后魏受禪遣使求璽綬后怒不與如此數輩后乃呼使者入親數讓之以璽綬抵軒下抵擲也軒䦨校也因涕泣橫流曰天不祚爾左右皆莫能仰視后在位七年魏氏既立以后為山陽公夫人自後四十一年魏景初元年薨合葬禪陵車服禮儀皆依漢制論曰漢世皇后無諡皆因帝諡以為稱雖吕氏専政上官臨制亦無殊號上官昭帝后也中興明帝始建光烈之稱其後並以徳為配至於賢愚優劣混同一貫故馬竇二后俱稱徳焉其餘唯帝之庶母及蕃王承統以追尊之重特為其號如恭懐孝崇之比是也初平中蔡邕始追正和熹之諡蔡邕集諡議曰漢世母氏無諡至于明帝始建光烈之稱是後轉因帝號加之以徳上下優劣混而為一違禮大行受大名小行受小名之制諡法有功安人曰熹帝后一體禮亦宜同大行皇太后諡宜為和熹其安思順烈以下皆依而加焉贊曰坤惟厚載隂正乎内易曰坤厚載物又曰女正位乎内男正位乎外詩羙好逑逑匹也詩云窈窕淑女君子好逑言后妃有關雎之徳為君子好匹易稱歸妹兑下震上歸妹卦也婦人謂嫁曰歸妹為少女之稱兑爲少隂震為長陽少隂而承長陽悦以動之歸妹之象也以六五與九二相應五為王侯故易言帝乙歸妹祁祁皇孋言觀貞淑祁祁衆多也孋亦儷也觀示也言諸后皆示其貞淑配皇為儷案字書無孋字相傳音麗蕭該音離媚兹良哲承我天祿班政蘭閨宣禮椒屋班固西都賦曰後宫則掖庭椒房后妃之室蘭林蕙草披香發越蘭林殿名故言蘭閨椒屋即椒房也既云徳升亦曰幸進徳升謂馬鄧等也幸進謂閻何之類也身當隆極族漸河潤公羊傳曰河海潤千里也視景爭暉方山並峻乘剛多阻行地必順易屯卦象曰六二之難乗剛也又坤卦曰牝馬地類行地無彊王弼注云地之所以得無彊者以卑順行之故也咎集驕滿福協貞信慶延自已禍成誰釁漢制皇女皆封縣公主儀服同列侯漢法大縣侯視三公其尊崇者加號長公主儀服同蕃王蔡邕曰帝女曰公主姊妹曰長公主建武十五年封武陽公主為長公主即是帝女尊崇亦為長非惟姊妹也輿服志曰長公主赤罽軿車與諸侯同綬也諸王女皆封鄉亭公主儀服同鄉亭侯鄉亭侯視中二千石肅宗唯特封東平憲王蒼琅邪孝王京女為縣公主東平王傳曰封蒼女五人為縣公主孝王女傳不見其數其後安帝桓帝妹亦封長公主同之皇女案鄧禹𤣥孫少府褒尚舞隂長公主耿弇曾孫侍中良尚漢陽公主岑彭𤣥孫魏郡守熙尚湼陽長公主來歙𤣥孫虎賁中郎将定尚平氏長公主並安帝妹也長社益陽公主桓帝妹也解見上其皇女封公主者所生之子襲母封為列侯馮定獲嘉公主子襲封獲嘉侯馮奮平陽公主子襲封平陽侯此其類也皆傳國於後鄉亭之封則不傳襲其職僚品秩事在百官志沈約謝儼傳曰范曄所撰十志一皆託儼捜撰垂畢遇曄敗悉蠟以覆車宋文帝令丹陽尹徐湛之就儼尋求已不復得一代以為恨其志今闕續漢志曰諸公主家令一人六百石丞一人三百石其餘屬吏増減無常漢官儀曰長公主傅一人私府長一人食官一人永巷長一人家令一人秩皆六百石各有員吏而鄉公主傅一人秩六百石僕一人六百石家丞一人三百石也不足别載故附于后紀末皇女義王建武十五年封舞陽長公主適延陵鄉侯太僕梁松舞陽縣屬潁川郡松梁統之子其傳云尚光武女舞隂公主又鄧訓傳舞隂公主子梁扈有罪訓與交通此云舞陽誤也松坐誹謗誅皇女中禮十五年封湼陽公主適顯親侯大鴻臚竇固湼陽屬南陽郡顯親縣屬漢陽郡固竇融子肅宗尊為長公主皇女紅夫十五年封舘陶公主適駙馬都尉韓光光坐與淮陽王延謀反誅皇女禮劉十七年封淯陽公主適陽安侯長樂少府郭璜璜郭況子也璜坐與竇憲謀反誅皇女綬綬一作緩二十一年封酈邑公主適新陽侯世子隂豐豐害主誅死酈縣屬南陽郡音擲亦反新陽縣屬汝南郡豐隂就子世祖五女皇女姬永平二年封獲嘉長公主適楊邑侯将作大匠馮柱獲嘉縣屬河内郡楊邑縣屬太原郡柱馮魴子皇女奴三年封平陽公主平陽縣屬河東郡適大鴻臚馮順順勤子也皇女迎迎㦯作延三年封隆慮公主隆慮縣屬河内郡適牟平侯耿襲牟平縣屬東莱郡襲耿弇弟舒之子皇女次三年封平氏公主平氏縣屬南陽郡既不言所適不顯始終盖史闕之也它皆倣此皇女致三年封沁水公主沁水縣屬河内郡適髙密侯鄧乾乾鄧震之子禹之孫皇女小姬十二年封平臯公主平臯縣屬河内郡適昌安侯侍中鄧蕃昌安縣屬髙密國蕃鄧襲子禹之孫也皇女仲十七年封浚儀公主適軮侯軮志作軮音伏師古曰又音徒系反黄門侍郎王度軮縣屬江夏郡度王符子覇之孫皇女恵十七年封武安公主適征羌侯世子黄門侍郎来稜征𦍑縣屬汝南郡稜襃之子歙之孫安帝尊為長公主皇女臣建初元年封魯陽公主魯陽縣屬南陽郡皇女小迎元年封樂平公主樂平太清縣屬東郡章帝更名皇女小民元年封成安公主成安縣屬潁川郡顯宗十一女皇女男建初四年封武徳長公主皇女王四年封平邑公主平邑縣屬代郡今魏郡昌樂東北又有平邑城適黄門侍郎馮由皇女吉永元五年封隂安公主隂安縣屬魏郡肅宗三女皇女保延平元年封修武長公主修武縣屬河内郡皇女成元年封共邑公主共縣屬河内郡皇女利元年封臨潁公主縣屬潁川郡適即墨侯侍中賈建即墨縣屬膠東國建賈參子復之曾孫皇女興元年封聞喜公主聞喜縣屬河東郡和帝四女皇女生永和三年封舞陽長公主皇女成男三年封冠軍長公主冠軍縣屬南陽郡皇女廣永和六年封汝陽長公主汝陽縣屬汝南郡順帝三女皇女華延熹元年封陽安長公主適不其侯輔國将軍伏完完伏湛五世孫皇女堅七年封潁隂長公主潁隂縣屬潁川郡皇女修九年封陽翟長公主桓帝三女皇女某光和三年封萬年公主靈帝一女後漢書卷十下後漢書卷十下考證皇后紀下安思閻皇后紀家屬徙比景注景在已下景字上監夲多一日字從如淳原注減桓思竇皇后紀章徳皇后從祖弟之孫女也此句下監夲有父諱武三字注臣㑹汾按下文有太后父大将軍武句此處不復須注且后父亦不當言諱也明是後人添入今從宋夲刪孝仁董皇后紀王羙人者趙國人也臣良裘按后紀序曰同居正號者並列於篇私恩追尊者隨事附出此紀例也卷内自賈貴人以下皆應附各紀之末不應另傳此必非范氏之舊獻穆曹皇后紀皇女奴適大鴻臚馮順注順勤子也監夲誤作馮􅀈子也從宋夲改皇女華適不其侯輔國将軍伏完注完伏湛五世孫何焯曰以伏后紀及湛傳參校五世誤當作七世後漢書卷十下考證
