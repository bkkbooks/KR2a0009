body:
  text: 後漢書卷六十四宋宣城太守范煜撰唐章懷太子賢注梁統列傳第二十四梁統傳子松竦曾孫商𤣥孫冀梁統字仲寧安定烏氏人晉大夫梁益耳即其先也東觀記曰其先與秦同祖出於伯益别封於梁梁益耳見左傳氏音支統髙祖父子都自河東遷居北地子都子橋東觀記橋子溥溥子延以明軍謀特除西域司馬延生統以貲十萬徙茂陵至哀平之末歸安定統性剛毅而好法律初仕州郡更始二年召補中郎將使安集凉州拜酒泉太守㑹更始敗赤眉入長安統與竇融及諸郡守起兵保境謀共立帥初以位次咸共推統統固辭曰昔陳嬰不受王者以有老母也前書曰陳嬰故東陽令史少年殺其令相聚數千人廼請立嬰為王嬰母謂曰吾自為汝家婦聞先故未嘗貴今暴得大名不祥不如有所屬嬰乃不敢為王劉攽曰注吾自為案前書云自吾為今統内有尊親又德薄能寡誠不足以當之遂共推融為河西大將軍更以統為武威太守為政嚴猛威行鄰郡建武五年統等各遣使隨竇融長史劉鈞詣闕奉貢願得詣行在所詔加統宣徳將軍八年夏光武自征隗囂統與竇融等將兵㑹車駕及囂敗封統為成義侯同產兄廵從弟騰並為關内侯拜騰酒泉典農都尉悉遣還河西十二年統與融等俱詣京師以列侯奉朝請更封髙山侯拜太中大夫除四子為郎統在朝廷數陳便宜以為法令既輕下姦不勝宜重刑罰以遵舊典乃上疏曰臣竊見元哀二帝輕殊死之刑以一百二十三事手殺人者減死一等東觀記曰元帝初元五年輕殊死刑三十四事哀帝建平元年輕殊死刑八十一事其四十二事手殺人者減死一等自是以後著為常準故人輕犯法吏易殺人臣聞立君之道仁義為主仁者愛人義者政理愛人以除殘為務政理以去亂為心刑罰在衷無取於輕是以五帝有流殛放殺之誅唐虞時流共工放驩兠殺三苖殛鯀堯為五帝之一故舉言焉三王有大辟刻肌之法大辟罪之大者謂死刑也刻肌謂墨劓臏刖故孔子稱仁者必有勇論語載孔子之言也五帝三王皆以仁義而化而能用肉刑以正俗是為勇也又曰理財正辭禁民為非曰義易繫辭曰何以守位曰仁何以聚人曰財理財正辭禁人為非曰義繫辭亦孔子作故稱又曰髙帝受命誅暴平蕩天下約令定律誠得其宜高祖定天下使蕭何次律令文帝寛恵柔克遭世康平克能也言以和柔能理俗也尚書曰高明柔克也唯除省肉刑相坐之法他皆率由無革舊章秦法一人有罪坐其家室文帝除肉刑并相坐律令餘則仍舊不改武帝値中國隆盛財力有餘征伐逺方軍役數興豪傑犯禁姦吏弄法故重首匿之科著知從之律凡首匿者每為謀自藏匿罪人至宣帝時除子匿父母妻匿夫孫匿祖父母罪餘至殊死上請知從謂見知故縱武帝時立見知故縱之罪使張湯等著律並見前書以破朋黨以懲隱匿宣帝聰明正直總御海内臣下奉憲無所失墜因循先典天下稱理至哀平繼體而即位日淺聽斷尚寡丞相王嘉輕為穿鑿虧除先帝舊約成律王嘉字公仲平陵人案嘉傳及刑法志並無其事統與嘉時代相接所引固不妄矣但班固略而不載也數年之間百有餘事或不便於理或不厭民心謹表其尤害於體者傅奏於左體政體也傳音附伏惟陛下包元履德權時撥亂撥理也公羊傳曰撥亂代反之正功踰文武德侔髙皇誠不宜因循季末衰微之軌回神明察考量得失宣詔有司詳擇其善定不易之典施無窮之法天下幸甚事下三公廷尉議者以為隆刑峻法非明王急務施行日久豈一朝所釐釐猶改也統今所定不宜開可統復上言曰有司以臣今所言不可施行尋臣之所奏非曰嚴刑竊謂髙帝以後至乎孝宣其所施行多合經傳宜比方今事騐之往古聿遵前典事無難改不勝至願願得召見若對尚書近臣口陳其要帝令尚書問狀統對曰聞聖帝明王制立刑罰故雖堯舜之盛猶誅四凶經曰天討有罪五刑五庸哉尚書咎繇謨之詞也庸用也言天以五刑討有罪用五刑必當也又曰爰制百姓于刑之衷尚書吕刑云士制百姓於刑之中孔安國注云咎繇作士制百官于刑之中此作爰爰於也義亦通衷音貞仲反下同也孔子曰刑罰不衷則人無所厝手足厝置也衷之為言不輕不重之謂也春秋之誅不避親戚左傳曰大義滅親又曰周公殺管叔夫豈不愛王室故也所以防患救亂坐安衆庶豈無仁愛之恩貴絶殘賊之路也自髙祖之興至于孝宣君明臣忠謀謨深博猶因循舊章不輕改革海内稱理斷獄益少至初元建平所減刑罰百有餘條初元元帝年也建平哀帝年也而盗賊浸多嵗以萬數間者三輔從橫羣輩並起從音子用反橫音户孟反至燔燒茂陵火見未央其後隴西北地西河之賊越州度郡萬里交結攻取庫兵刦略吏人詔書討捕連年不獲東觀記統對尚書狀曰元壽二年三輔盗賊羣軰並起至燔燒茂陵都邑煙火見未央宫前代未嘗所有其後隴西新興北地任横任崖西河曹況越州度郡萬里交結或從逺方四面㑹合遂攻取庫兵刦略吏人國家開封侯之科以軍法追捕僅能破散也劉攽曰注前代未嘗所冇案文當云前代所未嘗有是時以天下無難百姓安平而狂狡之埶猶至於此皆刑罰不衷愚人易犯之所致也由此觀之則刑輕之作反生大患恵加姦軌而害及良善也故臣統願陛下采擇賢臣孔光師丹等議孔光字子夏師丹字公仲並哀帝時丞相光明習漢制及法令丹初以論議深博徵入為光禄大夫皆有議見前書議上遂寢不報上音時掌反後出為九江太守定封陵鄉侯統在郡亦有治迹吏人畏愛之卒於官子松嗣松字伯孫少為郎尚光武女舞隂長公主再遷虎賁中郎將松博通經書明習故事與諸儒脩明堂辟雍郊祀封禪禮儀常與論議寵幸莫比光武崩受遺詔輔政永平元年遷太僕松數為私書請託郡縣二年發覺免官遂懐怨望四年冬乃縣飛書誹謗下獄死國除飛書者無根而至若飛來也即今匿名書也子扈後以㳟懐皇后從兄永元中擢為黄門侍郎歴位卿校尉温恭謙讓亦敦詩書永初中為長樂少府松弟竦竦字叔敬少習孟氏易孟喜字長卿東海人見前書弱冠能敎授後坐兄松事與弟恭俱徙九真既徂南土歴江湖濟沅湘湖謂洞庭湖在今岳州水經云沅水出牂柯且蘭縣注云入洞庭㑹于江湘水出零陵始安縣陽海山至巴丘入于江感悼子胥屈原以非辜沈身乃作悼騷賦繫𤣥石而沈之東觀記載其文曰彼仲尼之佐魯兮先嚴斷而後𢎞衍雖離讒以嗚邑兮卒暴誅於兩觀殷伊尹之協徳兮暨太甲而俱寧豈齊量其㡬㣲兮徒信已以榮名雖吞刀以奉命兮抉目眦於門閭吳荒萌其已殖兮可信顔於王廬圖往鏡來兮關比在篇君名既泯没兮後辟亦然屈平濯徳兮絜顯芬香勾踐罪種兮越嗣不長重耳忽推兮六卿卒强趙隕鳴犢兮秦人入疆樂毅奔趙兮燕亦是喪武安賜命兮昭以不王䝉宗不幸兮長平顛荒范父乞身兮楚項不昌何爾生不先後兮惟洪勲以遐邁服荔裳如朱紱兮聘鸞路於犇瀨歴蒼梧之崇丘兮宗虞氏之俊又臨衆瀆之神林兮東勅職於蓬碣祖聖道而垂典兮襃忠孝以為珍既匡救而不得兮必殞命而後亾惟賈傅其違指兮何揚生之敗真彼皇麟之髙舉兮熈太清之悠悠臨岷川以愴恨兮指丹海以為期顯宗後詔聽還本郡竦閉門自養以經籍為娱著書數篇名曰七序班固見而稱曰孔子著春秋而亂臣賊子懼左傳書齊豹曰盗三叛人名以懲不義善人勸焉淫人懼焉孟子云仲尼成春秋亂臣賊子懼梁竦作七序而竊位素餐者慙性好施不事産業長嫂舞隂公主贍給諸梁親疎有序特重敬竦雖衣食器物必有加異竦悉分與親族自無所服服猶用也竦生長京師不樂本土自負其才鬱鬱不得意嘗登髙逺望歎息言曰大丈夫居世生當封侯死當廟食禮記曰諸侯五廟卿大夫三廟士一廟如其不然閑居可以養志詩書足以自娱州郡之職徒勞人耳後辟命交至並無所就有三男三女肅宗納其二女皆為貴人小貴人生和帝竇皇后養以為子而竦家私相慶後諸竇聞之恐梁氏得志終為已害建初八年遂譛殺二貴人而陷竦等以惡逆詔使漢陽太守鄭據傳考竦罪死獄中家屬復徙九真辭語連及舞隂公主坐徙新城使者護守新城今洛州伊闕縣也宫省事密莫有知和帝梁氏生者永元九年竇太后崩松子扈遣從兄䄠䄠古禪字也奏記三府以為漢家舊典崇貴母氏而梁貴人親育聖躬不䝉尊號求得申議求申理而議之也太尉張酺引䄠訊問事理㑹後召見因白䄠奏記之狀帝感慟良久曰於君意若何酺對曰春秋之義母以子貴解見光武紀漢興以來母氏莫不隆顯臣愚以為宜上尊號追慰聖靈存録諸舅以明親親帝悲泣曰非君孰為朕思之㑹貴人姊南陽樊調妻嫕嫕音於計反上書自訟曰妾同産女弟貴人前充後宫蒙先帝厚恩得見寵幸皇天授命誕生聖明而爲竇憲兄弟所見譛訴使妾父竦寃死牢獄骸骨不掩老母孤弟逺徙萬里獨妾遺脫逸伏草野常恐没命無由自逹今遭值陛下神聖之運親統萬㡬羣物得所憲兄弟姦惡既伏辜誅海内曠然各獲其宜妾得蘇息拭目更視乃敢昧死自陳所天臣以君為天故云所天妾聞太宗即位薄氏蒙榮文帝即位尊薄太后為皇太后封弟昭為軹侯太后母前死櫟陽廼追尊太后父為靈文侯㑹稽郡置園邑三百家櫟陽亦置靈文夫人園令如靈文侯園儀也宣帝繼統史族復興史良娣宣帝祖母也宣帝初生母王夫人死無所歸史良娣母貞君養視焉宣帝即位以舊恩封史恭三子髙為樂陵侯㑹為將陵侯𤣥為平臺侯妾門雖有薄史之親獨無外戚餘恩誠自悼傷妾父既寃不可復生母氏年殊七十殊猶過也及弟裳等逺在絶域不知死生願乞收竦朽骨使母弟得歸本郡則施過天地存殁幸賴帝覽章感悟乃下中常侍掖庭令騐問之嫕辭證明審遂得引見具陳其狀乃留嫕止宫中連月乃出賞賜衣被錢帛第宅奴婢旬月之間累資十萬嫕素有行操帝益愛之加號梁夫人擢樊調為羽林左監調光禄大夫宏兄之曾孫也宏光武舅也於是追尊恭懐皇后其冬制詔三公大鴻臚曰夫孝莫大於尊尊親親其義一也禮記曰上正祖禰尊尊也下正子孫親親也詩云父兮生我母兮鞠我撫我畜我長我育我顧我復我出入腹我欲報之徳昊天罔極詩小雅也毛萇注云鞠養也撫厚也鄭𤣥注云畜起也育覆育也顧旋視也復反覆也腹懐抱也極已也欲報父母之徳昊天乎我心無己也朕不敢興事覽于前世太宗中宗實有舊典太宗文帝也中宗宣帝也追命外祖以篤親親其追封諡皇太后父竦為襃親愍侯比靈文順成恩成侯昭帝母趙媫妤帝即位追封媫妤父為順成侯宣帝追封母王夫人父廼始為恩成侯各置園廟也魂而有靈嘉斯寵榮好爵顯服以慰母心遣中謁者與嫕及扈備禮西迎竦喪竦死漢陽獄中故西迎也詣京師改殯賜東園畫棺玉匣衣衾東園署名主知棺椁漢儀注王侯𦵏腰已下玉為札長尺廣二寸半為匣下至足綴以黄金縷為之匝字或作柙也建塋於恭懐皇后陵傍帝親臨送𦵏百官畢㑹徵還竦妻子封子棠為樂平侯棠弟雍乘氏侯雍弟翟單父侯邑各五千戸位皆特進賞賜第宅奴婢車馬兵弩什物以巨萬計寵遇光於當世諸梁内外以親疎並補郎謁者棠官至大鴻臚雍少府棠卒子安國嗣延光中為侍中有罪免官諸梁為郎吏者皆坐免商字伯夏雍之子也少以外戚拜郎中遷黄門侍郎永建元年襲父封乘氏侯三年順帝選商女及妹入掖庭遷侍中屯騎校尉陽嘉元年女立為皇后妹為貴人加商位特進更増國土賜安車駟馬其嵗拜執金吾二年封子冀為襄邑侯商讓不受三年以商為大將軍固稱疾不起四年使太常桓焉奉策就第即拜商乃詣闕受命明年夫人隂氏薨追號開封君開封縣故城在今汴州浚儀縣南贈印綬商自以戚屬居大位每存謙柔虚已進賢辟漢陽巨覽上黨陳龜為掾屬李固周舉為從事中郎於是京師翕然稱為良輔帝委重焉東觀漢記商少持韓詩兼讀衆書傳記天資聰敏昭逹萬情舉措動作直推雅性務在誠實不為華飾孝友著於閭閾明信結於友朋其在朝廷儼恪矜嚴威而不猛退食私館接賔待客寛和肅敬憂人之憂樂人之樂皆若在已輕財貨不為畜積故衣裘裁足卒嵗奴婢車馬共用而已朝廷由是敬憚委任焉每有飢饉輒載租榖於城門賑與貧餒不宣已恵檢御門族未嘗以權盛干法而性慎弱無威斷頗溺於内豎以小黄門曹節等用事於中遂遣子冀不疑與為交友然宦者忌商寵任反欲陷之永和四年中常侍張逵蘧政内者令石光内者署名令一人秩六百石屬少府見漢官儀也尚方令傅福冗從僕射杜永連謀共譛商及中常侍曹騰孟賁云欲徵諸王子圖議廢立請收商等案罪帝曰大將軍父子我所親騰賁我所愛必無是但汝曹共妒之耳逵等知言不用懼廹遂出矯詔收縳騰賁於省中帝聞震怒敇宦者李歙急呼騰賁釋之收逵等悉伏誅辭所連染及在位大臣商懼多侵枉乃上疏曰春秋之義功在元帥罪止首惡春秋經書虞師晉師滅下陽公羊傳曰虞微國也曷為序于大國之上表虞首惡也曷為序虞首惡虞受賂假滅國者道以取亡焉故賞不僣溢刑不淫濫五帝三王所以同致康乂也左傳曰善為國者賞不僣而刑不濫賞僣則懼及淫人刑濫則懼及善人若不幸而過寧僣無濫竊聞考中常侍張逵等辭語多所牽及大獄一起無辜者衆死囚久繫纎微成大言久繫則細微之事引牽而成大也非所以順迎和氣平政成化也禮記月令孟春之月天子親帥三公九卿諸侯大夫以迎春於東郊命相布徳和令行慶施恵下及兆民也宜早訖竟以止逮捕之煩逮及也辭所連及即追捕之也帝乃納之罪止坐者六年秋商病篤勅子冀等曰吾以不德享受多福生無以輔益朝廷死必耗費帑藏衣衾飯唅玉匣珠貝之屬何益朽骨唅口實也白虎通曰大夫飯以玉唅以貝士飯以珠唅以貝也百僚勞擾紛華道路祗增塵垢雖云禮制亦有權時權時謂不依禮也方今邊境不寧盗賊未息豈宜重為國損氣絶之後載至冢舍即時殯歛歛以時服皆以故衣無更裁制殯已開冢冢開即𦵏祭食如存無用三牲孝子善述父志不宜違我言也禮記曰孝子善述父之志善成人之事及薨帝親臨喪諸子欲從其誨朝廷不聽賜以東園朱壽之器劉攽曰案文衍一之字銀鏤黃腸玉匣什物二十八種夀器棺也以朱飾之以銀鏤之前書音義曰以栢木黃心為槨曰黃腸也錢二百萬布三千匹皇后錢五百萬布萬匹及𦵏贈輕車介士輕車兵車也介士甲士也賜諡忠侯中宫親送帝幸宣陽亭每城門皆有亭即宣陽門之亭也瞻望車騎東觀記云初帝作誄曰孰云忠侯不聞其音背去國家都茲𤣥隂幽居㝠㝠靡所宜窮也子冀嗣冀字伯車為人鳶肩豺目鳶鴟也鴟肩上竦也豺目目竪也洞精矘眄洞通也矘音它蕩反説文目精直視口吟舌言謂語吃不能明了裁能書計少為貴戚逸游自恣性嗜酒能挽滿彈棊挽滿猶引强也蓺經曰彈棊兩人對局白黑棊各六枚先列棊相當更先彈也其局以石為之格五前書吾丘壽王善格五音義云簺也音蘓代反說文曰簺行棊相塞謂之簺鮑宏簺經曰簺有四采塞白乘五是也至五即格不得行故謂之格五六博楚詞曰琨蔽象棊有六博王逸注云投六著行六棊故云六博鮑宏博經曰用十二棊六棊白六棊黑所擲頭謂之瓊瓊有五采刻為一畫者謂之塞刻為兩畫者謂之白刻為三畫者謂之黑一邊不刻者五塞之間謂之五塞蹴鞠劉向别録曰蹴鞠者傳言黃帝所作或曰起戰國之時蹴鞠兵埶也所以講武知有材也意錢之戲何承天纂文曰詭億一曰射意一曰射數即攤錢也又好臂鷹走狗騁馬鬬雞初為黃門侍郎轉侍中虎賁中郎將越騎歩兵校尉執金吾永和元年拜河南尹冀居職暴恣多非法父商所親客洛陽令吕放頗與商言及冀之短商以讓冀冀即遣人於道刺殺放而恐商知之乃推疑於放之怨仇請以放弟禹為洛陽令安慰放家欲以滅口使捕之盡滅其宗親賔客百餘人商薨未及𦵏順帝乃拜冀為大將軍弟侍中不疑為河南尹及帝崩冲帝始在繦褓太后臨朝詔冀與太傅趙峻太尉李固參録尚書事冀雖辭不肯當而侈暴滋甚冲帝又崩冀立質帝帝少而聰慧知冀驕横嘗朝羣臣目冀曰此跋扈將軍也跋扈猶强梁也冀聞深惡之遂令左右進鴆加煑餅帝即日崩復立桓帝而枉害李固及前太尉杜喬海内嗟懼語在李固傳建和元年益封冀萬三千户増大將軍府舉髙第茂才官屬倍於三公漢官儀三公府有長史一人司徒府掾屬三十一人令史及御屬三十六人也又封不疑為潁陽侯不疑弟蒙西平侯冀子𦙍襄邑侯各萬户和平元年重増封冀萬户并前所襲合三萬户𢎞農人宰宣素性佞邪欲取媚於冀乃上言大將軍有周公之功今既封諸子則其妻宜為邑君詔遂封冀妻孫壽為襄城君兼食陽翟租嵗入五千萬加賜赤紱比長公主長公主儀服同藩王解見皇后紀壽色美而善為妖態作愁眉嗁䊋墯馬髻折腰歩齲齒笑風俗通曰愁眉者細而曲折嗁䊋者薄拭目下若啼處墯馬髻者側在一邊折腰歩者足不任體齲齒笑者若齒痛不忻忻始自冀家所為京師翕然皆放效之齲音丘禹反以為媚惑冀亦改易輿服之制作平上軿車鄭𤣥注周禮云軿猶屏也所用自蔽隱也蒼頡篇云衣車也形制上平異於常也埤幘狹冠埤下也音頻爾反一音皮彼反折上巾盖折其巾之上角也擁身扇大扇也狐尾單衣後裾曵地若狐尾壽性鉗忌鉗銸也言性忌害如鉗之銸物也銸音女輒反能制御冀冀甚寵憚之初父商獻美人友通期於順帝友姓也東觀記友作支通期有微過帝以歸商商不敢留而出嫁之冀即遣客盗還通期㑹商薨冀行服於城西私與之居壽伺冀出多從蒼頭篡取通期歸截髮刮靣笞掠之欲上書告其事冀大恐頓首請於壽母壽亦不得已而止冀猶復與私通生子伯玉匿不敢出壽尋知之使子允誅滅友氏冀慮壽害伯玉常置複壁中冀愛監奴秦宫官至太倉令得出入壽所壽見宫輒屏御者託以言事因與私焉宫内外兼寵威權大震刺史二千石皆謁辭之冀用壽言多斥奪諸梁在位者外以謙讓而實崇孫氏宗親冒名而為侍中卿校尉郡守長吏者十餘人皆貪叨凶淫各遣私客籍屬縣富人被以它罪藉謂疏録之也閉獄掠拷使出錢自贖貲物少者至於死徙扶風人士孫奮居富而性吝冀因以馬乘遺之摯虞三輔决録注曰士孫奮字景卿少為郡五官掾起家得錢貲至一億七千萬富聞京師也從貸錢五千萬奮以三千萬與之冀大怒乃告郡縣認奮母為其守臧婢云盗白珠十斛紫金千斤以叛遂收考奮兄弟死於獄中悉没貲財億七千餘萬其四方調發嵗時貢獻皆先輸上第於冀上第第一也乘輿乃其次焉吏人齎貨求官請罪者道路相望冀又遣客出塞交通外國廣求異物因行道路發取妓女御者劉攽曰案古無妓字當作伎而使人復乘埶橫暴妻略婦女歐擊吏卒所在怨毒冀乃大起第舍而壽亦對街為宅殫極土木互相誇競堂寢皆有隂陽奥室奥深室也連房洞户洞通也謂相當也柱壁雕鏤加以銅漆窻牖皆有綺䟱青𤨏牖小窻也綺踈謂鏤為綺文青𤨏謂刻為𤨏文而以青飾之也圖以雲氣仙靈臺閣周通更相臨望飛梁石蹬陵跨水道架虚為橋若飛也金玉珠璣異方珍怪充積臧室逺致汗血名馬又廣開園囿採土築山十里九坂以象二崤二崤山在今洛州永寜縣西北深林絶澗有若自然奇禽馴獸飛走其間冀壽共乘輦車張羽盖飾以金銀游觀第内多從倡伎鳴鍾吹管酣謳竟路或連繼日夜以騁娱恣客到門不得通皆請謝門者門者累千金又多拓林苑禁同王家西至𢎞農東界滎陽南極魯陽北逹河淇包含山藪逺帶丘荒周旋封域殆將千里又起莬苑於河南城西經亘數十里發屬縣卒徒繕修樓觀數年乃成移檄所在調發生莬刻其毛以為識人有犯者罪至刑死嘗有西域賈胡不知禁忌誤殺一莬轉相告言坐死者十餘人冀二弟嘗私遣人出獵上黨冀聞而捕其賔客一時殺三十餘人無生還者冀又起别第於城西以納姦亾或取良人悉為奴婢至數千人名曰自賣人元嘉元年帝以冀有援立之功欲崇殊典乃大㑹公卿共議其禮於是有司奏冀入朝不趨劔履上殿謁讃不名禮儀比蕭何事見王莽傳也悉以定陶陽成餘戸增封為四縣比鄧禹冀初封襄邑襲封乗氏更以定陶陽成足四縣賞賜金錢奴婢綵帛車馬衣服甲第比霍光以殊元勲每朝㑹與三公絶席絶席别也十日一入平尚書事謂平議也宣布天下為萬世法冀猶以所奏禮薄意不悅専擅威柄凶恣日積機事大小莫不諮決之宫衛近侍並所親樹樹置也禁省起居纎㣲必知百官遷召皆先到冀門牋檄謝恩然後敢詣尚書下邳人吳樹為宛令之官辭冀冀賔客布在縣界以情託樹樹對曰小人姦蠧比屋可誅眀將軍以椒房之重處上將之位宜崇賢善以補朝闕宛為大都士之淵藪自侍坐以來未聞稱一長者而多託非人誠非敢聞冀嘿然不恱樹到縣遂誅殺冀客為人害者數十人由是深怨之樹後為荆州刺史臨去辭冀冀為設酒因鴆之樹出死車上又遼東太守矦猛初拜不謁冀託以他事乃腰斬之時郎中汝南袁著年十九見冀凶縱不勝其憤乃詣闕上書曰臣聞仲尼歎鳯鳥不至河不出圗自傷卑賤不能致也今陛下居得致之位又有能致之資此董仲舒對策之詞著引而畧之也而和氣未應賢愚失序者埶分權臣上下壅隔之故也夫四時之運功成則退易繫辭曰寒往則暑來暑往則寒來寒暑相推而嵗成焉老子曰功成名遂身退天之道也髙爵厚寵鮮不致灾今大將軍位極功成可為至戒宜遵懸車之禮髙枕頥神薛廣徳為御史大夫乞骸骨賜安車駟馬懸其安車傳子孫欲令冀遵致仕之禮也傳曰木實繁者披枝害心若不抑損權盛將無以全其身矣左右聞臣言將側目切齒臣特以童䝉見拔故敢忘忌諱昔舜禹相戒無若丹朱尚書禹謂帝舜曰無若丹朱傲惟慢遊是好周公戒成王無如殷王紂尚書周公戒成王曰無若殷王受之迷亂酣于酒徳哉願除誹謗之罪以開天下之口書得奏御冀聞而密遣掩捕著著乃變易姓名後託病偽死結蒲為人市棺殯送冀廉問知其詐廉察也隂求得笞殺之隱蔽其事學生桂陽劉常當世名儒素善於著冀召補令史以辱之時太原郝絜胡武皆危言髙論危亦髙謂峻也與著友善先是絜等連名奏記三府薦海内髙士而不詣冀冀追怒之又疑為著黨勅中都官移檄捕前奏記者並殺之遂誅武家死者六十餘人絜初逃亡知不得免因輿櫬奏書冀門書入仰藥而死家乃得全及冀誅有詔以禮祀著等冀諸忍忌皆此類也不疑好經書善待士冀隂疾之因中常侍白帝轉為光禄勲又諷衆人共薦其子允為河南尹允一名胡狗時年十六容貌甚陋不勝冠帶道路見者莫不嗤笑焉不疑自恥兄弟有隙遂讓位歸第與弟䝉閉門自守冀不欲令與賔客交通隂使人變服至門記往來者南郡太守馬融江夏太守田明初除過謁不疑冀諷州郡以它事陷之皆髠笞徙朔方融自刺不殊明遂死於路永興二年封不疑子馬為潁隂矦允子桃為城父矦冀一門前後七封矦三皇后六貴人二大將軍夫人女食邑稱君者七人尚公主三人其餘卿將尹校五十七人在位二十餘年窮極滿盛威行内外百僚側目莫敢違命天子㳟已而不得有所親豫帝既不平之延熹二年太史令陳授因小黃門徐璜陳灾異日食之變咎在大將軍冀聞之諷洛陽令收考授死於獄帝由此發怒初掖庭人鄧香妻宣生女猛香盖掖庭署人之名香卒宣更適梁紀梁紀者冀妻壽之舅也壽引進猛入掖庭見幸為貴人冀因欲認猛為其女以自固乃易猛姓為梁時猛姊婿邴尊為議郎冀恐尊沮敗宣意沮壊也恐尊壊敗宣意不從其改梁姓也乃結刺客於偃城刺殺尊而又欲殺宣宣家在延熹里與中常侍袁赦相比相鄰比也冀使刺客登赦屋欲入宣家赦覺之鳴鼓會衆以告宣宣馳入以白帝帝大怒遂與中常侍單超具瑗唐衡左悺徐璜等五人成謀誅冀語在宦者傳冀心疑超等乃使中黃門張惲入省宿以防其變具瑗勅吏收惲以輙從外入欲圗不軌帝因是御前殿召諸尚書入發其事使尚書令尹勲持節勒丞郎以下皆操兵守省閤歛諸符節送省中使黃門令具瑗將左右廐騶騶騎士也虎賁羽林都候劔㦸士續漢志曰左右都候各一人秩六百石主劔㦸士徼循宫中及天子有所收考也合千餘人與司𨽻校尉張彪共圍冀第使光禄勲袁盱音吁持節收冀大將軍印綬徙封比景都鄉矦冀及妻壽即日皆自殺悉收子河南尹允叔父屯騎校尉讓及親從衛尉淑越騎校尉忠長水校尉㦸等諸梁及孫氏中外宗親送詔獄無長少皆棄市不疑䝉先卒其它所連及公卿列校刺史二千石死者數十人故吏賔客免黜者三百餘人朝廷為空唯尹勲袁盱及廷尉邯鄲義在焉是時事卒從中發卒音七訥反使者交馳公卿失其度官府市里鼎沸數日乃定百姓莫不稱慶收冀財貨縣官斥賣合三十餘萬萬以充王府用減天下稅租之半散其苑囿以業窮民録誅冀功者封尚書令尹勲以下數十人論曰順帝之世梁商稱為賢輔豈以其地居亢滿而能以愿謹自終者乎亢上極之名也愿慤也夫宰相運動樞極感㑹天人樞謂斗樞也極北極也中於道則易以興政乖於務則難乎御物商協回天之埶屬彫弱之期而匡朝䘏患未聞上術憔悴之音載謡人口雖輿粟盈門何救阻饑之戹阻難也書曰黎民阻饑也永言終制未解尸官之尤尸官猶尸禄終制謂薄葬也況乃傾側孽臣商遣冀不疑與曹節等為交友也𫝊寵凶嗣以至破家傷國而豈徒然哉賛曰河西佐漢統亦定算謂統初與竇融定計歸光武襃親幽憤升髙累歎商恨善柔冀遂貪亂善柔失刑斷之道也後漢書卷六十四後漢書卷六十四考證至初元建平所减刑罰百有餘條何焯云前書初元則刑法志中載元帝議减律令詔書若哀帝則並無減刑罰事想以成帝河平中復下詔减死刑統因誤以為哀帝之建平注家並不細尋遂以為班固失之畧耳梁統子竦感悼子胥屈原以非辜沈身乃作悼騷賦繫𤣥石而沈之注關北在篇臣㑹汾按此言關逢比干以直諫死其事著在篇籍也諸本皆誤作關北又注何揚生之敗真臣㑹汾按此謂揚雄作反騷義乖貞烈也監本誤作欺真今從宋本改梁統曾孫商中宮親送監本誤作中官臣㑹汾按商女為順帝后妹為貴人此中宮謂皇后親送父喪也若中官則是中常侍謁者之屬不得云親送矣今改正梁統𤣥孫冀録誅冀功者臣㑹汾按者字當在功字上後漢書卷六十四考證
