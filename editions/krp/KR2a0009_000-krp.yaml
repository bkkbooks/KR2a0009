body:
  text: 御製讀劉昆傳劉昆列儒林善政人稱美因致虎渡河斯事吾疑矣所謂儒者何守正弗竒詭虎負子避去竒詭失正軌而況人與物各有其類耳相感必以類虎豈人類比尹不能格桀比干諌紂死然猶臣與君其勢為難耳堯之與丹朱舜則商均是二豈非父乎並不能格子桀紂丹朱均惡較虎差已而聖父賢臣猶不能格彼顧謂一縣令善政方百里格惡獸之虎應必無是理御製讀劉昆傳後漢書儒林傳載劉昆為𢎞農太守仁化大行崤驛道向多虎皆負子渡河云云夫虎猛獸也藏林藪逐鹿豕以飬其生虎之知止於此而已餘非所知也太守仁政祇能施之民而民豈能向虎告之虎又豈能㢘于民以悉之而又推太守之意不傷民而去之且一一負其子以行㢤盖范煜紀此不過𣣔揚劉昆之美耳無識者或信以為實有識者必斥其非将並劉昆之善政亦疑為阿好過頌是欲揚其美反致傷其實矣然范煜之為此盖亦有本彼見禮記孔子過泰山有苛政猛于虎之言故創為新竒之語以褒昆而不自覺其謬禮記出漢儒語多樁駁未必盡皆孔子之言即所云苛政猛於虎尚為指物喻政不失為正而虎知太守仁政相率負子渡河而去則必無其事也盖人聚則地闢地闢則獸逺此不易之理今之泰岱崤黽何並無一虎不啻此也天下郡縣其有虎者千百之一耳餘盡無虎豈為其地守土之人皆如劉昆之賢而虎皆避去㢤是又不必絮辯而可證范煜之譌者御製讀後漢書眀徳馬后傳予讀明德馬后傳嘉其不肯封外戚而不解肅宗之必𣣔封外戚以為盡孝之何謂又不解封侯誠舊典則不過加一爵祿儘可不令干預朝政而馬后之一再苦辭若有不可終日者之何謂及讀帝終封舅而馬后云何意老志復不従萬年之日長恨矣不覺廢書長歎歎范煜之但知章馬后之賢而不計肅宗之将置身扵何地也夫馬后之為此言出扵誠耶則子以封舅求悦何忍出此言出扵不誠耶則前此之二詔皆不可信矣且肅宗封舅誠孝之小莭然亦欲悦其親而已耳使其親死而賫恨不孝之大者肅宗亦何過而忍被之以此名㢤宫闈之語外間可由傳之此實煜不知大義阿所好而不覺其言之過當背理耳又馬后身衣大練莭儉尚矣傳中所稱賜諸貴人各白越三千端雜帛二千匹黄金十斤賜廣平鉅鹿樂成王各錢五百萬此又何来莭儉者固如是乎豈但知一身之麤衣糲食而揮霍自如遂得謂之莭儉乎外家車如流水馬如逰龍后固自言之其家㣲時亦能早如是乎孟子曰盡信書則不如無書周已然而况人心日漓寖淫而至扵兩漢六朝乎御製讀荀彧傳予讀范煜荀彧傳而歎煜之有史材而無史識也夫史材非難史識為難自遷固即已不免此病而何恠乎煜哉葢遷固之失失以駁而未甞混黑白妄褒貶若煜之稱彧以歸正成仁則何異乎譽盗跖為義而美桓温以匡主之忠耶善乎劉友益之論彧云身為漢臣為操謀畫以贊其業業已成矣甫以正論自詭其無益可知今夫葛之與裘其相去逺矣然必無今日葛而明日頓裘之理以漸使之然也操之移漢成魏其陰謀秘策皆彧有以佐之即其沮董昭之議毋亦内慙樊郭外怯孫劉思欲徘徊少待乎而操已不能平至於發伏完之書為狙詐之計禍生空器卒至飲酖所為進退無據孽由自作耳而煜乃以為崇明王畧紓人于倉卒審如是則仲連之蹈東海頋乃謂不逹時務可乎彧之事人不難知而已有顛倒是非如煜者吾于是歎史識之難得而任好惡為予奪者葢亦不少矣御製讀嚴光傳予讀東漢逸民傳至嚴光所以對光武及以足加帝腹太史奏客星犯帝座云云不覺欣然失笑曰甚矣范煜之誕也夫光武之好賢與光之髙尚所為各盡其道足以風勵千古矣即光所對尚可謂不愧泥塗軒冕之志至於以足加帝則可信其必無孟子不云乎居移氣飬移體光武既為帝矣親近故人論道累日已足矣何至共相偃卧即偶爾偃卧亦何至以足加帝腹假使誠有其事又何至動星象此不待辯而可知其誣也且建武時朱浮許淑等皆上書言厯不正當改更爾時治厯者非太史氏乎以晦朔可考之事尚至扵舛又何能知星象之幻眇㢤吾意即偶有之必太史氏者㢘知其事飾奏動星象以神已之精於推測之甚流而為䜟緯光武固好䜟緯者也遂不覺墮其術中耳雖然為帝者當以禮自律即重光安車賜還山中禮也命有司嵗時存問禮也賚以金帛禮也至於與光共偃卧則非禮也究以范煜好竒誕妄記為是欽定四庫全書史部一後漢書目録正史類宋宣城太守范煜撰梁剡令劉昭補志唐章懐太子賢注帝后紀一十二志三十共一百三十卷列傳八十八帝后紀後漢書卷一上帝紀第一上光武上秀後漢書卷一下帝紀第一下光武下後漢書卷二帝紀第二眀帝荘後漢書卷三帝紀第三章帝炟後漢書卷四帝紀第四和帝肇殤帝隆後漢書卷五帝紀第五安帝祐後漢書卷六帝紀第六順帝保冲帝炳質帝纉後漢書卷七帝紀第七桓帝志後漢書卷八帝紀第八靈帝宏後漢書卷九帝紀第九獻帝協後漢書卷十上后紀第十上光武郭皇后光烈隂皇后眀徳馬皇后章德竇皇后和帝隂皇后和熹鄧皇后後漢書卷十下后紀第十下安思閻皇后順烈梁皇后孝崇匽皇后桓帝懿獻梁皇后桓帝鄧皇后桓思竇皇后孝仁董皇后孝靈宋皇后靈思何皇后獻帝伏皇后獻穆曹皇后志後漢書卷十一志第一律歴上律凖候氣後漢書卷十二志第二律歴中賈逵論歴永光論歴延光論歴漢安論歴憙平論歴論月蝕後漢書卷十三志第三律歴下歴法後漢書卷十四志第四禮儀上合朔立春五供上陵冠夕牲耕髙禖養老先蠶祓禊後漢書卷十五志第五禮儀中立夏請雨拜皇太子拜王公桃印黄郊立秋貙劉案户祠星立冬冬至臘大儺土牛遣衛士朝㑹後漢書卷十六志第六禮儀下大喪後漢書