劉昭補註後漢志三十卷而彪書不著録是至宋僅存其志故移以補後漢書之闕其不曰續漢志而曰後漢志是已併入范書之稱矣或謂酈道元水經注嘗引司馬彪州郡志疑其先已别行又謂杜佑通典述科舉之制以後漢書續漢志連類而舉疑唐以前已併八志入范書似未確也自八志合併之後諸書徴引但題後漢書某志儒者或不知為司馬彪書故何焯義門讀書記曰八志司馬紹統之作案紹統彪之字也本漢末諸儒所傳而述于晉初劉昭注補别有總叙縁諸本或失載劉叙故孫北海藤隂劄記亦誤出蔚宗志律厯之文云云考洪邁容齋隨筆已誤以八志為范書則其悞不自孫承澤始今于此三十卷並題司馬彪名庶以袪流俗之訛焉乾隆四十一年九月恭校上總纂官臣紀昀臣陸錫純臣孫士毅總校官臣陸費墀
