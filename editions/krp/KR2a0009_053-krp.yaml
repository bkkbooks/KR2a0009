body:
  text: 後漢書卷五十三宋宣城太守范煜撰唐章懷太子賢注竇融列傳第十三竇融傳弟子固曾孫憲𤣥孫章竇融字周公扶風平陵人也七世祖廣國孝文皇后之弟封章武侯章武縣屬勃海郡故城在今滄州魯縣也融高祖父宣帝時以吏二千石自常山徙焉融早孤王莽居攝中為强弩將軍司馬强弩將軍即莽明義侯王俊東擊翟義還攻槐里槐里趙明霍鴻等起兵以應翟義王邑等破義還合軍擊明鴻等滅之融時隨其軍也見前書以軍功封建武男東觀記續漢書並云寧武男女弟為大司空王邑小妻家長安中出入貴戚連結閭里豪傑以任俠為名然事母兄養弱弟内修行義王莽末青徐賊起太師王匡匡王舜之子請融為助軍與共東征及漢兵起融復從王邑敗於昆陽下歸長安漢兵長驅入關王邑薦融拜為波水將軍前書音義曰波水在長安南賜黃金千斤引兵至新豐莽敗融以軍降更始大司馬趙萌萌以為校尉甚重之薦融為鉅鹿太守融見更始新立東方尚擾不欲出關而高祖父嘗為張掖太守從祖父為護羌校尉從弟亦為武威太守累世在河西知其土俗獨謂兄弟曰天下安危未可知河西殷富帶河為固張掖屬國精兵萬騎漢邊郡皆置屬國一旦緩急杜絶河津足以自守此遺種處也遺留也可以保全不畏絶滅兄弟皆然之融於是日往守萌守猶求也辭讓鉅鹿圖出河西圖謀也萌為言更始乃得為張掖屬國都尉融大喜即將家屬而西既到撫結雄傑懷輯羌虜輯和也甚得其歡心河西翕然歸之是時酒泉太守梁統金城太守厙鈞前書音義曰厙姓即倉庫吏後也今羌中有姓厙音舍云承鈞之後也張掖都尉史苞三輔决錄注苞字叔文茂陵人也酒泉都尉竺曾敦煌都尉辛彤並州郡英俊融皆與為厚善及更始敗融與梁統等計議曰今天下擾亂未知所歸河西斗絶在羌胡中斗峻絶也前書曰成山斗入海不同心戮力戮并也則不能自守權鈞力齊復無以相率當推一人為大將軍共全五郡觀時變動議既定而各謙讓咸以融世任河西為吏人所敬向乃推融行河西五郡大將軍事是時武威太守馬期張掖太守任仲並孤立無黨乃共移書告示之二人即解印綬去於是以梁統為武威太守史苞為張掖太守竺曾為酒泉太守辛彤為敦煌太守厙鈞為金城太守融居屬國領都尉職如故置從事監察五郡河西民俗質樸而融等政亦寛和上下相親晏然富殖脩兵馬習戰射明烽燧之警羌胡犯塞融輒自將與諸郡相救皆如符要赴敵不失期契也每輙自破之其後匈奴懲乂懲創也說文云乂亦懲也稀復侵寇而保塞羌胡皆震服親附安定北地上郡流人避凶饑者歸之不絶融等遙聞光武即位而心欲東向以河西隔遠未能自通時隗囂先稱建武年號融等從受正朔囂皆假其將軍印綬囂外順人望内懷異心使辯士張𤣥游說河西曰更始事業已成尋復亡滅此一姓不再興之効今即有所主便相係屬一旦拘制自令失柄後有危殆雖悔無及今豪傑競逐雌雄未決項羽謂高祖曰願與沛公決雌雄當各據其土宇與隴蜀合從前書音義曰以利合為從以威埶相脅曰横高可為六國下不失尉佗佗姓趙眞定人也陳勝起佗行南海尉遂王有南越故曰尉佗也融等於是召豪傑及諸太守計議其中智者皆曰漢承堯運左傳曰陶唐氏既衰其後有劉累學擾龍事孔甲為御龍氏春秋時晉卿士㑹即其後也士㑹奔秦後歸晉其處者為劉氏戰國時劉氏自秦遷於魏魏遷大梁都於豐號豐公即太上皇父也故曰漢承堯運歴數延長今皇帝姓號見於圖書謂河圖赤伏符曰劉秀發兵捕不道自前世博物道術之士谷子雲夏賀良等建明漢有再受命之符言之久矣前書成帝時谷永上書曰陛下當陽數之標季渉三七之節紀哀帝時夏賀良言赤精子讖漢家歴運中衰當再受命矣故劉子駿改易名字冀應其占劉歆以哀帝建平元年改名秀字潁叔冀應符命及莽末道士西門君惠言劉秀當為天子遂謀立子駿事覺被殺出謂百姓觀者曰劉秀眞汝主也皆近事㬥著㬥露也著見也智者所共見也除言天命且以人事論之今稱帝者數人而洛陽土地最廣甲兵最强號令最明觀符命而察人事它姓殆未能當也諸郡太守各有賔客或同或異融小心精詳遂決策東向五年夏遣長史劉鈞奉書獻馬先是帝聞河西完富地接隴蜀常欲招之以逼囂述亦發使遺融書遇鈞於道即與俱還帝見鈞歡甚禮饗畢乃遣令還賜融璽書曰制詔行河西五郡大將軍事屬國都尉勞鎭守邊五郡兵馬精彊倉庫有蓄民庶殷富外則折挫羌胡内則百姓蒙福威德流聞虛心相望道路隔塞邑邑何已長史所奉書獻馬悉至深知厚意今益州有公孫子陽天水有隗將軍方蜀漢相攻權在將軍舉足左右便有輕重猶蒯通曰與楚即楚勝與漢即漢勝以此言之欲相厚豈有量哉諸事具長史所見將軍所知王者迭興千載一㑹言時難得而易失也欲遂立桓文輔微國當勉卒功業周室微弱齊桓晉文輔之以霸天下欲三分鼎足連衡合從亦宜以時定蒯通說韓信曰三分天下鼎足而立天下未并吾與爾絶域非相吞之國今之議者必有任囂效尉佗制七郡之計秦胡亥時南海尉任囂病且死召龍川令趙佗語曰番禺負山險阻南北東西數千里頗有中國人相輔此亦一州之主可為國故召公即令行南國尉事地理志曰蒼梧鬱林合浦交阯九眞南海日南皆越之分也此為七郡也效致也流俗本作教者誤也劉攽曰令行南國尉事按文國當作海王者有分土無分民自適己事而已今以黄金二百斤賜將軍便宜輒言因授融為涼州牧璽書既至河西咸驚以為天子明見萬里之外網羅張立一作𤣥之情融即復遣鈞上書曰臣融竊伏自惟幸得託先后末屬蒙恩為外戚累世二千石至臣之身復備列位假歴將帥假猶濫也守持一隅以委質則易為辭以納忠則易為力書不足以深達至誠故遣劉鈞口陳肝膽自以底裏上露長無纎介底裏皆露言無藏隱而璽書盛稱蜀漢二主三分鼎足之權任囂尉佗之謀竊自痛傷臣融雖無識猶知利害之際順逆之分豈可背眞舊之主事姦偽之人廢忠貞之節為傾覆之事棄已成之基求無冀之利此三者雖問狂夫猶知去就而臣獨何以用心謹遣同產弟友詣闕口陳區區友至高平高平今涼州縣也㑹囂反叛道絶馳還遣司馬席封間行通書東觀記及續漢書席皆作虞字帝復遣席封賜融友書所以尉藉之甚備尉藉解見隗囂傳融既深知帝意乃與隗囂書責讓之曰伏惟將軍國富政修士兵懷附親遇戹㑹之際國家不利之時謂漢遭王莽簒奪也守節不囘回邪也承事本朝後遣伯春囂子恂之字也委身於國無疑之誠於斯有效融等所以欣服高義願從役於將軍者良為此也而忿悁之間悁恚也改節易圖君臣分爭上下接兵言違背光武也委成功造難就委棄也去從義為橫謀去從背山東也為橫通西蜀也百年累之一朝毁之豈不惜乎殆執事者貪功建謀以至於此言隗囂執政事者貪有其功而立此逆謀也融竊痛之當今西州地埶局迫人兵離散易以輔人難以自建計若失路不反聞道猶迷淮南子曰通於道者如車軸不運於己而與轂致數千里不通於道者若迷惑告以東西南北然猶復迷惑矣不南合子陽則北入文伯耳文伯盧芳也夫負虛交而易强禦恃遠救而輕近敵負亦恃也易輕也恃公孫述而輕光武也易音以豉反未見其利也融聞智者不危衆以舉事仁者不違義以要功今以小敵大於衆何如言危衆也棄子徼功於義何如言違義也且初事本朝稽首北面忠臣節也稽首拜天子禮也禮君南嚮答陽之義臣北面答君也及遣伯春垂涕相送慈父恩也俄而背之謂吏士何忍而棄之謂留子何留子謂見在之子對伯春故曰留也自起兵以來轉相攻擊城郭皆為丘墟生人轉於溝壑今其存者非鋒刃之餘則流亡之孤迄今傷痍之體未愈哭泣之聲尚聞幸賴天運少還而大將軍復重於難是使積痾不得遂瘳幼孤將復流離其為悲痛尤足愍傷言之可為酸鼻宋玉曰孤子寡婦寒心酸鼻庸人且猶不忍況仁者乎融聞為忠甚易得宜實難左傳曰忠為令德非其人猶不可況不令乎憂人大過以德取怨詩曰不以我為德反以我為讐知且以言獲罪也區區所獻唯將軍省焉囂不納融乃與五郡太守共砥厲兵馬上疏請師期帝深嘉美之乃賜融以外屬圖及太史公五宗外戚世家景帝子十三人為王而母五人同母者為一宗故曰五宗言景帝以竇氏所生而致子孫衆多也魏其侯列傳竇嬰太后從兄子也封魏其侯魏其縣屬琅邪郡詔報曰每追念外屬孝景皇帝出自竇氏出生也爾雅曰男子謂姊妹之子曰出定王景帝之子朕之所祖昔魏其一言繼統以正梁孝王景帝弟也亦竇太后所生梁王朝因昆弟燕飲是時景帝未立太子酒酣帝從容曰千秋之後傳梁王太后驩竇嬰引巵酒進上曰天下者高祖天下父子相傳漢之約也帝何以得傳梁王帝遂止矣長君少君尊奉師傳長君竇大后兄也少君太后弟廣國之字也綘灌等以兩人所出微為擇師傳長者有節行者與居長君少君由此為退讓君子不以富貴驕人見前書脩成淑德施及子孫施延也音羊䜴反此皇太后神靈上天祐漢也從天水來者寫將軍所讓隗囂書痛入骨髓畔臣見之當股慄慙愧忠臣則酸鼻流涕義士則曠若發矇說文曰曠明也有眸子而無見曰矇前書揚雄曰乃今日發矇廓然光照矣非忠孝慤誠孰能如此說文曰慤謹也慤或作懿豈其德薄者所能克堪囂自知失河西之助族禍將及欲設間離之說亂惑眞心轉相解搆相解說而結搆以成其姦又京師百僚不曉國家及將軍本意多能採取虛偽誇誕妄談令忠孝失望傳言乖實毁譽之來皆不徒然不可不思今關東盜賊已定大兵今當悉西將軍其抗厲威武以應期㑹融被詔即與諸郡守將兵入金城初更始時先零羌封何諸種殺金城太守居其郡隗囂使使賂遺封何與共結盟欲發其衆融等因軍出進擊封何大破之斬首千餘級得牛馬羊萬頭榖數萬斛因並河揚威武並音蒲浪反伺候車駕時大兵未進融乃引還帝以融信効著明益嘉之詔右扶風修理融父墳塋祠以太牢數馳輕使致遺四方珍羞梁統乃使人刺殺張𤣥遂與囂絶皆解所假將軍印綬七年夏酒泉太守竺曾以弟報怨殺人而去郡東觀記曰曽弟嬰報怨殺屬國侯王𦙍等曽慙而去郡融承制拜曾為武鋒將軍更以辛彤代之秋隗囂發兵寇安定帝將自西征之先戒融期㑹遇雨道斷且囂兵已退乃止融至姑臧姑臧縣名屬武威郡今涼州縣也西河舊事曰涼州城昔匈奴故蓋臧城後人音訛名姑臧也被詔罷歸融恐大兵遂久不出乃上書曰隗囂聞車駕當西臣融東下士衆騷動計且不戰囂將高峻之屬皆欲逢迎大軍後聞兵罷峻等復疑囂揚言東方有變西州豪傑遂復附從囂又引公孫述將令守突門突門守城之門墨子曰城百歩為一突門也臣融孤弱介在其間杜預注左傳云介猶間也雖承威靈宜速救助國家當其前臣融促其後緩急迭用首尾相資囂埶排迮排迮謂蹙迫也不得進退此必破也若兵不早進久生持疑則外長寇讐内示困弱復令讒邪得有因縁臣竊憂之惟陛下哀憐帝深美之八年夏車駕西征隗囂融率五郡太守及羌虜小月氏等小月氏西域胡國名歩騎數萬輜重五千餘兩與大軍㑹高平第一高平今原州縣郡國志云高平有第一城融先遣從事問㑹見儀適猶言儀注也是時軍旅代興諸將與三公交錯道中或背使者交私語帝聞融先問禮儀甚善之以宣告百僚乃置酒高㑹引見融等待以殊禮拜弟友為奉車都尉從弟士太中大夫遂共進軍囂衆大潰城邑皆降帝高融功下詔以安豐陽泉蓼安安風四縣四縣並屬廬江郡安豐今壽州縣也故城在今霍山縣西北安風本漢六安國及陽泉故城並在今安豐縣南杜預注左傳曰蓼在今安豐蓼音了劉攽曰蓼安按文多安字此縣名蓼而已封融為安豐侯弟友為顯親侯顯親縣故城在今秦州成紀縣東南也遂以次封諸將帥武鋒將軍竺曾為助義侯武威太守梁統為成義侯張掖太守史苞為褒義侯金城太守庫鈞為輔義侯酒泉太守辛彤為扶義侯封爵既畢乘輿東歸悉遣融等西還所鎭融以兄弟並受爵位久專方面懼不自安數上書求代詔報曰吾與將軍如左右手耳韓信亡蕭何自追之人曰丞相何亡高祖聞之如失左右手耳見前書數執謙退何不曉人意勉循士民無擅離部曲及隴蜀平詔融與五郡太守奏事京師官屬賔客相隨駕乗千餘兩馬牛羊被野融到詣洛陽城門上涼州牧張掖屬國都尉安豐侯印綬詔遣使者還侯印綬引見就諸侯位賞賜恩寵傾動京師數月拜為冀州牧十餘日又遷大司空融自以非舊臣一旦入朝在功臣之右每召㑹進見容貌辭氣卑恭己甚帝以此愈親厚之融小心久不自安數辭讓爵位因侍中金遷口達至誠金遷安上之曾孫安上日磾弟倫之子遷哀帝時為尚書令又上疏曰臣融年五十三有子年十五質性頑鈍臣融朝夕教導以經藝不得令觀天文見讖記誠欲令恭肅畏事恂恂循道不願其有才能何况乃當傳以連城廣土享故諸侯王國哉因復請間求見帝不許後朝罷逡巡席後帝知欲有讓遂使左右傳出它日㑹見迎詔融曰日者知公欲讓職還土日者猶往日也故命公暑熱且自便今相見宜論他事勿得復言融不敢重陳請二十年大司徒戴渉坐所舉人盜金下獄帝以三公參職不得已乃策免融明年加位特進二十三年代隂興行衞尉事特進如故又兼領將作大匠弟友為城門校尉兄弟並典禁兵融復乞骸骨說苑曰晏子任東阿乞骸骨以避賢者之路輒賜錢帛太官致珍竒及友卒帝愍融年衰遣中常侍中謁者即其卧内强進酒食融長子穆尚内黃公主代友為城門校尉穆子勲尚東海恭王彊女泚陽公主友子固亦尚光武女湼陽公主顯宗即位以融從兄子林為護羌校尉竇氏一公兩侯三公主四二千石一公大司空也兩侯安豐顯親也四二千石衞尉城門校尉護羌校尉中郎將皆相與並時自祖及孫官府邸第相望京邑奴婢以千數於親戚功臣中莫與為比永平二年林以罪誅事在西羌傳帝由是數下詔切責融戒以竇嬰田蚡禍敗之事田蚡武帝王皇后異父弟也為丞相搆㑹竇嬰之罪使至誅戮事見前書融惶恐乞骸骨詔令歸第養病歲餘聽上衞尉印綬賜養牛上樽酒融在宿衞十餘年年老子孫縱誕多不法穆等遂交通輕薄屬託郡縣干亂政事以封在安豐欲令姻戚悉據故六安國遂矯稱隂太后詔令六安侯劉盱去婦因以女妻之五年盱婦家上書言狀帝大怒乃盡免穆等官諸竇為郎吏者皆將家屬歸故郡獨留融京師穆等西至函谷關有詔悉復追還㑹融卒時年七十八諡曰戴侯賻送甚厚帝以穆不能脩尚不能脩整自高尚也而擁富貲居大第常令謁者一人監護其家居數年謁者奏穆父子自失埶數出怨望語帝令將家屬歸本郡唯勲以泚陽主壻留京師穆坐賂遺小吏郡捕繫與子宣俱死平陵獄勲亦死洛陽獄久之詔還融夫人與小孫一人居洛陽家舍十四年封勲弟嘉為安豐侯食邑二千户奉融後和帝初為少府及勲子大將軍憲被誅免就國嘉卒子萬全嗣萬全卒子㑹宗嗣萬全弟子武别有傳論曰竇融始以豪俠為名拔起風塵之中拔音歩末反拔卒也亦音彭八反義兩通以投天隙投㑹天之間隙遂蟬蛻王侯之尊說文曰蟬蛻所解皮也言去微至貴也蛻音稅終膺卿相之位此則徼功趣埶之士也及其爵位崇滿至乃放遠權寵恂恂似若不能己者又何智也言融之心實欲去權貴以帝不納故常恂恂恭順似若不得已然者也嘗獨詳味此子之風度雖經國之術無足多談而進退之禮良可言矣固字孟孫少以尚公主為黃門侍郎續漢書曰給事黃門侍郎六百石好覽書傳喜兵法貴顯用事中元元年襲父友封顯親侯顯宗即位遷中郎將監羽林士續漢志曰宣帝命中郎將騎都尉監羽林秩比二千石後坐從兄穆有罪廢于家十餘年時天下乂安帝欲遵武帝故事擊匈奴通西域以固明習邊事固舊隨融在河西曉知邊事也十五年冬拜為奉車都尉續漢志曰比二千石掌御乘輿以騎都尉耿忠為副忠弇子也謁者僕射耿秉為駙馬都尉秦彭為副皆置從事司馬並出屯涼州明年固與忠率酒泉敦煌張掖甲卒及盧水羌胡按湟水東經臨羌縣故城北又東盧溪水注之水出西南盧川即其地也萬二千騎出酒泉塞耿秉秦彭率武威隴西天水募士及羌胡萬騎出居延塞居延塞在今甘州張掖縣東北又太僕祭彤度遼將軍吳棠將河東北地西河羌胡及南單于兵萬一千騎出高闕塞高闕山名在朔方北騎都尉來苖護烏桓校尉文穆將太原鴈門代郡上谷漁陽右北平定襄郡兵及烏桓鮮卑萬一千騎出平城塞固忠至天山即祁連山也今在西州交河縣東北今名祁縣羅漫山擊呼衍王斬首千餘級呼衍王走追至蒲類海蒲類海今名婆悉海在今庭州蒲昌縣東南也留吏士屯伊吾盧城伊吾今伊州縣也本匈奴地明帝置宜禾都尉以為屯田故地今伊州納職縣伊吾故小城地是耿秉秦彭絶漠六百餘里至三木樓山匈奴中山名來苖文穆至匈奴河水上劉攽曰案匈河水名多一奴字前書匈河去令居千里虜皆奔走無所獲祭彤吳棠坐不至涿邪山免為庶人時諸將唯固有功加位特進明年復出玉門擊西域詔耿秉及騎都尉劉張皆去符傳以屬固專將兵者並有符傳擬合之取信今去符皆受固之節度固遂破白山降車師事已具耿秉傳固在邊數年羌胡服其恩信東觀記曰羌胡見客炙肉未熟人人長跪前割之血流指間進之於固固輒為啗不穢賤之是以愛之如父母也肅宗即位以公主脩勑慈愛累世崇重加號長公主增邑三千户徵固代魏應為大鴻臚帝以其曉習邊事每被訪及建初三年追錄前功增邑一千三百户七年代馬防為光祿勲明年復代馬防為衞尉固久歴大位甚見尊貴賞賜租祿貲累巨億而性謙儉愛人好施士以此稱之章和二年卒諡曰文侯子彪至射聲校尉先固卒無子國除憲字伯度父勲被誅憲少孤建初二年女弟立為皇后拜憲為郎稍遷侍中虎賁中郎將弟篤為黃門侍郎兄弟親幸並侍宮省賞賜累積寵貴日盛自王主及隂馬諸家莫不畏憚憲恃宮掖聲埶遂以賤直請奪沁水公主園田沁水公主明帝女主逼畏不敢計後肅宗駕出過園指以問憲憲隂喝不得對隂喝猶噎塞也陰音於禁反喝音一介反或作嗚音烏故反後發覺帝大怒召憲切責曰深思前過奪主田園時何用愈趙高指鹿為馬愈猶差也久念使人驚怖昔永平中常令隂黨隂博鄧疊三人更相糾察以隂鄧皆外戚恐其踰侈故使更相糾察也博隂興之子故諸豪戚莫敢犯法者而詔書切切切切猶勤勤也猶以舅氏田宅為言今貴主尚見枉奪何況小人哉國家棄憲如孤雛腐鼠耳鳥子生而啄者曰雛憲大震懼皇后為毁服深謝良久乃得解使以田還主雖不繩其罪然亦不授以重任和帝即位太后臨朝憲以侍中内幹機密幹主也或曰古管字也出宣誥命肅宗遺詔以篤為虎賁中郎將篤弟景瓌並中常侍於是兄弟皆在親要之地憲以前太尉鄧彪有義讓先帝所敬而仁厚委隨委隨猶順從也故尊崇之以為太傅令百官總已以聽其所施為輒外令彪奏内白太后事無不從又屯騎校尉桓郁累世帝師而性和退自守故上書薦之令授經禁中所以内外協附莫生疑異憲性果急睚眦之怨莫不報復睚音語解反眦音仕懈反廣雅睚裂也或謂裂眦瞋目貌史記曰范睢睚眦之怨必報初永平時謁者韓紆嘗考劾父勲獄憲遂令客斬紆子以首祭勲冡齊殤王子都鄉侯暢齊殤王名石伯升孫章之子劉攽曰按殤當作煬說在齊王傳彼既有子不得諡殤明矣來弔國憂章帝崩也暢素行邪僻與歩兵校尉鄧疊親屬數往來京師因疊母元自通長樂宮得幸太后被詔召詣上東門憲懼見幸分宮省之權遣客刺殺暢於屯衞之中屯兵宿衞之所而歸罪於暢弟利侯剛乃使侍御史與青州刺史雜考剛等後事發覺太后怒閉憲於内宮憲懼誅自求擊匈奴以贖死㑹南單于請兵北伐乃拜憲車騎將軍金印紫綬官屬依司空依準也長史一人千石掾屬二十九人令史及御屬三十二人見續漢志以執金吾耿秉為副發北軍五校漢有南北軍中候一人六百石掌臨立營見續漢志劉攽曰注南北軍中候按漢有北軍中候耳衍南字又掌臨立營臨當作監立當作五黎陽雍營緣邊十二郡騎士漢官儀曰光武中興以幽冀并州兵騎克定天下故於黎陽立營以謁者監之又曰扶風都尉部在雍縣以涼州近羌數犯三輔將兵衞護園陵故俗稱雍營及羌胡兵出塞明年憲與秉各將四千騎及南匈奴左谷蠡王師子師子其名也萬騎出朔方雞鹿塞南單于屯屠河屯屠河單于名也將萬餘騎出滿夷谷度遼將軍鄧鴻鄧禹少子及緣邊義從羌胡八千騎與左賢王安國萬騎出㧽陽塞㧽陽在五原郡㧽音固皆㑹涿邪山憲分遣副校尉閻盤司馬耿䕫耿譚將左谷蠡王師子右呼衍王須訾等呼衍其號因以為姓匈奴貴種也今呼延姓是其後須訾名也精騎萬餘與北單于戰於稽落山大破之虜衆崩潰單于遁走追擊諸部遂臨私渠北鞮海匈奴中海名也斬名王已下萬三千級獲生口馬牛羊槖橐音託駝百餘萬頭於是溫犢須日逐溫吾夫渠王柳鞮等八十一部率衆降者前後二十餘萬人憲秉遂登燕然山去塞三千餘里刻石勒功紀漢威德令班固作銘曰惟永元元年秋七月有漢元舅曰車騎將軍竇憲寅亮聖明登翼王室寅敬亮信也尚書曰二公𢎞化寅亮天地登升也翼輔也納于大麓惟清緝熙孔安國注尚書曰麓錄也納之使大錄萬機也周頌曰惟清緝熙鄭𤣥注云光明也乃與執金吾耿秉述職巡御理兵於朔方左傳曰小有述職大有巡功又曰出曰理兵鷹揚之校螭虎之士爰該六師鷹揚如鷹之飛揚也詩云惟師尚父時惟鷹揚螭山神獸形也史記曰如羆如羆如豺如離徐廣曰離與螭同該備也詩云整我六師以脩我戎暨南單于東烏桓西戎氐羌侯王君長之羣驍騎三萬元戎輕武長轂四分暨及也元戎兵車也詩云元戎十乘以先啓行輕武言疾也長轂兵車雲輜蔽路萬有三千餘乘輜車也稱雲言多也勒以八陣莅以威神兵法有八陣圖𤣥甲耀日朱旗絳天𤣥甲鐵甲也前書曰發屬國之𤣥甲也遂陵高闕下鷄鹿經磧鹵絶大漠沙土曰漠直度曰絶斬溫禺以釁鼓血尸逐以染鍔溫禺尸逐皆匈奴王號也周禮殺人以血塗鼔謂之釁鍔刃也然後四校橫徂星流彗埽蕭條萬里野無遺寇於是域滅區單反斾而旋考傳驗圖窮覽其山川遂踰涿邪跨安侯乘燕然躡冒頓之區落焚老上之龍庭四校四面之校橫徂橫行也星流彗埽言疾也安侯水名冒頓單于頭曼子也區落謂東滅東胡西走月氐南取樓煩悉收秦所奪匈奴地冒頓子稽粥號老上單于匈奴五月大㑹龍庭祭其先天地鬼神今皆焚蕩之上以攄高文之宿憤光祖宗之𤣥靈下以安固後嗣恢拓境宇振大漢之天聲高帝被冒頓單于圍於平城七日孝文帝時匈奴寇邊殺太守帝欲自征太后不許拓開也天聲雷霆之聲甘泉賦曰天聲起兮勇士厲恢大也兹所謂一勞而久逸暫費而永寧者也揚雄曰以為不一勞者不久逸不暫費者不永寧也乃遂封山刋石昭銘上德上猶至也老子曰上德不德是以有德其辭曰鑠王師兮征荒裔鑠美也詩曰於鑠王師遵養時晦勦凶虐兮􅎒海外勦絶􅎒整齊也詩云相土烈烈海外有􅎒夐其邈兮亘地界夐邈皆遠也亘竟也封神丘兮建隆嵑神丘即燕然山也方者謂之碑員者謂之碣嵑碣也協韻音其例反熙帝載兮振萬世熙廣也載事也書曰奮庸熙帝之載憲乃班師而還遣軍司馬吳汜梁諷奉金帛遺北單于宣明國威而兵隨其後時虜中乖亂汜諷所到輒招降之前後萬餘人遂及單于於西海上宣國威信致以詔賜單于稽首拜受諷因說宜脩呼韓邪故事保國安人之福言依附漢家自保護其國也宣帝時呼韓邪單于欵塞朝于甘泉宮請留居光祿塞下有急保漢受降城也單于喜悅即將其衆與諷俱還到私渠海聞漢軍已入塞乃遣弟右溫禺鞮王奉貢入侍隨諷詣闕憲以單于不自身到奏還其侍弟南單于於漠北遺憲古鼎容五斗其傍銘曰仲山甫鼎其萬年子子孫孫永保用憲乃上之詔使中郎將持節即五原拜憲大將軍封武陽侯食邑二萬户憲固辭封賜策許焉舊大將軍位在三公下置官屬依太尉續漢志太尉長史千石掾屬二十四人令史及御屬二十二人憲威權震朝廷公卿希㫖奏憲位次太傅下三公上長史司馬秩中二千石從事中郎二人六百石自下各有増振旅還京師於是大開倉府勞賜士吏其所將諸郡二千石子弟從征者悉除太子舍人續漢志曰太子舍人秩二百石無員更直宿衞也是時篤為衞尉景瓌皆侍中奉車駙馬都尉四家競脩第宅窮極工匠明年詔曰大將軍憲前歲出征克滅北狄朝加封賞固讓不受舅氏舊典並䝉爵土西漢故事帝舅皆封侯其封憲冠軍侯邑二萬户篤郾侯景汝陽侯瓌夏陽侯各六千户憲獨不受封遂將兵出鎭涼州以侍中鄧疊行征西將軍事為副北單于以漢還侍弟復遣車諧儲王等款居延塞欲入朝見願請大使憲上遣大將軍中護軍班固行中郎將與司馬梁諷迎之㑹北單于為南匈奴所破被創遁走固至私渠海而還憲以北虜微弱遂欲滅之明年復遣右校尉耿䕫司馬任尚趙博等將兵擊北虜於金微山大破之克獲甚衆北單于逃走不知所在憲既平匈奴威名大盛以耿䕫任尚等為爪牙鄧疊郭璜為心腹班固傅毅之徒皆置幕府以典文章刺史守令多出其門尚書僕射郅壽樂恢並以忤意相繼自殺壽郅惲子由是朝臣震懾望風承㫖而篤進位特進得舉吏漢法三公得舉吏見禮依三公景為執金吾瓌光祿勲權貴顯赫傾動京都雖俱驕縱而景為尤甚奴客緹騎依倚形埶侵陵小人漢官儀曰執金吾緹騎二百人說文曰緹帛丹黃色也言奴客及緹騎並為縱橫也强奪財貨簒取罪人妻畧婦女商賈閉塞如避寇讐有司畏懦莫敢舉奏太后聞之使謁者策免景官以特進就朝位瓌少好經書節約自脩出為魏郡遷潁川太守劉攽曰案文魏郡下少太守二字竇氏父子兄弟並居列位充滿朝廷叔父霸為城門校尉霸弟襃將作大匠襃弟嘉少府其為侍中將大夫郎吏十餘人憲既負重勞陵肆滋甚四年封鄧疊為穰侯疊與其弟歩兵校尉磊及母元又憲女壻射聲校尉郭舉舉父長樂少府璜太后居長樂宮故有少府秩二千石皆相交結元舉並出入禁中舉得幸太后遂共圖為殺害帝隂知其謀乃與近幸中常侍鄭衆定議誅之以憲在外慮其懼禍為亂忍而未發㑹憲及鄧疊班師還京師詔使大鴻臚持節郊迎賜軍吏各有差憲等既至帝乃幸北宮詔執金吾五校尉勒兵屯衞南北宮閉城門收捕疊磊璜舉皆下獄誅家屬徙合浦遣謁者僕射收憲大將軍印綬更封為冠軍侯憲及篤景瓌皆遣就國帝以太后故不欲名誅憲為選嚴能相督察之憲篤景到國皆迫令自殺宗族賔客以憲為官者皆免歸本郡瓌以素自脩不被逼迫明年坐稟假貧人稟給也假貸貧人非侯家之法故坐焉徙封羅侯不得臣吏人羅縣屬長沙郡在今岳州湘隂縣東北初竇后之譖梁氏憲等豫有謀焉永元十年梁棠兄弟棠及兄雍雍弟翟並梁竦子也徙九眞還路由長沙逼瓌令自殺後和熹鄧后臨朝永初三年詔諸竇前歸本郡者與安豐侯萬全俱還京師萬全少子章論曰衞青霍去病資强漢之衆連年以事匈奴國耗太半矣而猾虜未之勝後世猶傳其良將豈非以身名自終邪竇憲率羌胡邊雜之師一舉而空朔庭至乃追奔稽落之表飲馬北鞮之曲銘石負鼎薦告清廟列其功庸兼茂於前多矣而後世莫稱者章末釁以降其實也降損也是以下流君子所甚惡焉夫二三子得之不過房幄之間非復搜揚仄陋選舉而登也二三子謂衞霍及憲也皆緣椒房幃幄之恩耳當青病奴僕之時衞青本平陽公主家童所生相者見之曰貴人官至封侯青笑曰人奴之生無笞罵足矣安得封侯哉竇將軍念咎之日謂太后閉之南宮欲誅之日也乃庸力之不暇思鳴之無晨吳志諸葛瑾曰失旦之雞復思一鳴也何意裂膏腴享崇號乎東方朔稱用之則為虎不用則為鼠信矣以此言之士有懷琬琰以就煨塵者亦何可支哉琬琰美玉也楚詞曰懷琬琰以為心支計也亦何可計言其多也章字伯向少好學有文章與馬融崔瑗同好更相推薦融集與竇伯向書曰孟陵奴來賜書見手跡歡喜何量見於面也書雖兩紙紙八行行七字永初中三輔遭羌寇章避難東國家於外黃外黃縣屬陳留郡城在今汴州雍丘縣東居貧蓬户蔬食莊子原憲編蓬為户論語顏回飯蔬食也躬勤孝養然講讀不輟太僕鄧康鄧珍之子禹之孫聞其名請欲與交章不肯往康以此益重焉是時學者稱東觀為老氏臧室道家蓬萊山老子為守臧史復為柱下史四方所記文書皆歸柱下事見史記言東觀經籍多也蓬萊海中神山為仙府幽經祕錄並皆在焉康遂薦章入東觀為校書郎順帝初章女年十二能屬文以才貌選入掖庭有寵與梁皇后並為貴人擢章為羽林郎將續漢志曰羽林郎秩二百石無員常宿衞侍從也遷屯騎都尉章謙虚下士收進時輩甚得名譽是時梁竇並貴各有賔客多交搆其間章推心待之故得免於患貴人早卒帝追思之無已詔史官樹碑頌德章自為之辭貴人殁後帝禮待之無衰永和五年遷少府漢安二年轉大鴻臚建康元年梁后稱制章自免卒于家中子唐有俊才官至虎賁中郎將贊曰悃悃安豐亦稱才雄楚辭曰悃悃款款也王逸注曰志純一也亦猶實也提契河右奉圖歸忠奉圗者謂既奉外戚圖乃歸於漢也孟孫明邊伐北開西叶韻音先憲實空漠遠兵金山聽笳龍庭鏤石燕然笳胡樂也老子作之雖則折鼎王靈以宣鼎三足三公象折足者言其不勝任也易曰鼎折足覆公餗後漢書卷五十三後漢書卷五十三考證竇融傳封章武侯注在今滄州魯縣也諸本同按郡國志應作魯城縣後漢書卷五十三考證
