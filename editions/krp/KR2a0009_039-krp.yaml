body:
  text: 後漢書卷三十九梁剡令劉昭補并注輿服志第二十九輿服上玉輅耕車乗輿戎車金根獵車安車軿車立車車青葢緣車大駕皂葢車小駕法駕夫人安車使車輕車大小使車車馬飾載車導從車書曰明試以功孔安國曰攷試其居國為政以差其功車服以庸孔安國曰賜以車服以旌其徳用所任也又一通諸侯四朝各使陳進治化之言明試其言以要其功功成則錫車服以表顯其能用言昔者聖人興天下之大利除天下之大害躬親其事身履其勤憂之勞之不避寒暑使天下之民物各得安其性命無夭昏暴陵之災是以天下之民敬而愛之若親父母則而養之若仰日月夫愛之者欲其長久不憚力役相與起作宫室上棟下宇以雍覆之欲其長久也敬之者欲其尊嚴不憚勞煩相與起作輿輪旌旗章表以尊嚴之斯愛之至敬之極也茍心愛敬雖報之至情由未盡或殺身以為之盡其情也弈世以祀之明其功也是以流光與天地比長後世聖人知恤民之憂思深大者必饗其樂勤仁毓物使不夭折者必受其福故為之制禮以節之使夫上仁繼天統物不伐其功民物安逸若道自然莫知所謝老子曰聖人不仁以百姓為芻狗此之謂也夫禮服之興也所以報功章徳尊仁尚賢故禮尊尊貴貴不得相踰所以為禮也非其人不得服其服所以順禮也順則上下有序徳薄者退徳盛者縟故聖人處乎天子之位服玉藻邃延日月升龍山車金根飾黄屋左纛所以副其徳章其功也賢仁佐聖封國愛民黼黻文繡降龍路車所以顯其仁光其能也及其季末聖人不得其位賢者隠伏是以天子微弱諸侯脅矣於是相貴以等相讟以貨相賂以利天下之禮亂矣至周夷王下堂而迎諸侯此天子失禮微弱之始也自是諸侯宫縣樂食祭以白牡擊玉磬朱干設錫冕而儛大武鄭𤣥注禮記曰此皆天子之禮也宫縣四面縣也干盾也錫傅其背如龜也武萬舞也白牡大路殷天子之禮也白牡殷牲大夫臺門旅樹反坫繡黼丹朱中衣鏤簋朱紘此大夫之僭諸侯禮也鄭𤣥曰此皆諸侯之禮也旅道也屏謂之樹所以蔽行道管氏樹塞門塞猶蔽也禮天子外屏諸侯内屏大夫以簾士以幃反坫反爵之坫也蓋在樽南兩君相見主君既獻於此反爵焉繡黼丹朱以為中衣領緣也繡讀為綃綃繒名也詩云素衣朱綃又曰素衣朱襮襮繡領也鏤簋謂刻而飾之也大夫刻之為龜耳諸侯飾以象天子飾以玉朱紘天子冕之紘也諸侯青組大夫士當緇組紘纁邊詩刺彼己之子不稱其服傷其敗化易譏負且乗致㓂至言小人乗君子器盜思奪之矣自是禮制大亂兵革並作上下無法諸侯陪臣山楶藻梲降及戰國奢僭益熾削滅禮籍葢惡有害己之語競修竒麗之服飾以輿馬文罽玉纓象鑣金鞍以相夸上爭錐刀之利殺人若刈草然而宗祀亦旋夷滅榮利在已雖死不悔及秦并天下攬其輿服上選以供御其次以錫百官漢興文學既缺時亦草創承秦之制後稍改定參稽六經近於雅正孔子曰其或繼周者行夏之正乗殷之輅服周之冕樂則韶舞故撰輿服著之於篇以觀古今損益之義云上古聖人見轉蓬始知為輪輪行可載因物知生復為之輿輿輪相乗流運罔極任重致逺天下獲其利後世聖人觀於天視斗周旋魁方杓曲春秋緯曰瑶光第一至第四為魁第五至第七為杓合為斗以攜龍角為帝車於是廼曲其輈乗牛駕馬登險赴難周覽八極故易震乗乾謂之大壯言器莫能有上之者也孝經援神契曰斗曲杓橈象成車房為龍馬華葢覆鉤天罡入魁神不獨居故驂駕陪乗以道踟蹰宋均注曰房星既體蒼龍又象駕駟馬故兼言之也覆鉤既覆且鉤曲似葢也天罡入魁又似御陪乗自是以來世加其飾至奚仲為夏車正建其斿旐尊卑上下各有等級世本云奚仲始作車古史考曰黄帝作車引重致逺其後少昊時駕牛禹時奚仲駕馬臣昭案服牛乗馬以利天下其所起逺矣豈奚仲為始世本之誤史考所説是也周室大備官有六職百工與居一焉周禮曰審曲面勢以飭五材以辨民器謂之百工一器而羣工致巧者車最多是故具物以時六材皆良鄭𤣥曰取幹以冬取角以秋絲漆以夏筋膠未聞自此至弧旌枉矢皆出周禮鄭𤣥曰即是周禮注輿方法地葢圓象天三十輻以象日月鄭𤣥曰輪象日月者以其運行也日月三十日而合宿蓋弓二十八以象列星龍旂九斿七仞齊軫鄭𤣥曰軫謂車後横木以象大火鄭𤣥曰交龍為旂諸侯之所建也大火蒼龍宿之心其屬有尾尾九星鳥旟七斿五仞齊較鄭𤣥曰較者車髙檻木也以象鶉火鄭𤣥曰鳥隼為旟州里之所建鶉火朱鳥宿之栁其屬有七星熊旗六斿五仞齊肩以象參伐鄭𤣥曰熊虎為旗師都之所建伐屬白虎宿與參連體而六星龜旐四斿四仞齊首以象營室鄭𤣥曰龜蛇為旐縣鄙之所建營室𤣥武宿與東壁連體而四星弧旌枉矢以象弧也鄭𤣥曰覲禮曰侯氏載龍旂弧韣則旌旗之屬皆有弧也弧以張縿之幅有衣謂之韣又為設矢象弧星有矢也妖星有枉矢者蛇行有尾因此云枉矢蓋畫之𤣥注禮含文嘉曰蓋旗有九名日月為常交龍為旂通帛為旃雜帛為物熊虎為旗鳥隼為旟龜蛇為旐全羽為􅀈析羽為旌盧植注禮記曰有鈴曰旂干寳注周禮曰枉矢象妖星非其義也枉蓋應為枉直謂枉矢於弧此諸侯以下之所建者也白虎通曰居車中不内顧也仰即觀天俯即察地前聞和鸞之聲旁見四方之運此車教之道論語曰升車必正立執綏車中不内顧所以有和鸞以正威儀節行舒疾也鸞者在衡和者在軾馬動則鸞鳴鸞鳴則和應其聲名曰和敬舒則不鳴疾則失音明得其和也故詩云和鸞雍雍萬福攸同魯訓曰和設軾者也鸞設衡者也許慎曰詩云八鸞鎗鎗則一馬二鸞也又曰輶車鸞鑣知非衡也毛詩傳曰在軾曰和在鑣曰鸞杜預注左傳亦云鸞在鑣和在衡傅𤣥乗輿馬賦注曰鸞在馬勒鑣于寳周禮注曰和鸞皆以金為鈴史記曰前有錯衡所以養目也步中武象驟中韶濩所以養耳也龍旂九斿所以養信也寢兕持虎蛟韅彌龍所以養威也故大路之馬必信至教順然後乗之所以養安也天子五路周禮王之五路一曰玉路二曰金路三曰象路四曰革路五曰木路釋名曰天子所乗曰路路亦軍事也謂之路言行路也以玉為飾古文尚書曰大路在賔階面綴路在阼階面孔安國曰大路玉綴路金也服䖍曰大路總名也如今駕駟髙車矣尊卑俱乗之其采飾有差鄭𤣥曰王在焉曰路以玉飾諸末也傅𤣥乗輿馬賦注曰玉路重較也韻集曰軛前横木曰路錫樊纓十有再就鄭𤣥曰錫面當盧刻金為之所謂鏤錫也樊讀如鞶帶之鞶謂今馬大帶也鄭衆曰纓謂當胷士喪禮曰馬纓三就以削革為之三就三重三匝也鄭𤣥曰纓今馬鞅玉路之樊及纓皆以五采罽飾之十二就就成也杜預曰纓在馬脅前如索帬乗輿馬賦注曰繁纓飾以旄尾金塗十二重建太常十有二斿九仞曳地鄭衆曰太常九旗之畫日月者鄭𤣥曰七尺為仞天子之旗髙六丈三尺日月升龍象天明也崔駰東廵頌曰登天靈之威路駕太乙之象車夷王以下周室衰弱諸侯大路秦并天下閲三代之禮或曰殷瑞山車金根之色殷人以為大路於是始皇作金根之車殷曰乗根秦改曰金根乗輿馬賦注曰金根以金為飾漢承秦制御為乗輿孔子所謂乗殷之輅者也乗輿金根安車立車蔡邕曰五安五立徐廣曰立乗曰髙車坐乗曰安車輪皆朱班重牙周禮曰牙也者以為固抱也鄭衆曰牙謂輪輮也世間或謂之輞貳轂兩轄蔡邕曰轂外復有一轂抱轄其外乃復設轄抱銅置其中東京賦曰重輪貳轄疏轂飛軨金薄繆龍為輿倚較徐廣曰繆交錯之形也較在箱上説文曰􅏹文畫蕃蕃箱也通俗文曰車箱為較文虎伏軾魏都賦注曰軾車横覆膝人所馮止者也龍首衘軛左右吉陽筩鸞雀立衡徐廣曰置金鳥於衡上􅏹文畫輈羽葢華蚤徐廣曰翠羽葢黄裏所謂黄屋車也金華施橑末有二十八枚即蓋弓也東京賦曰樹翠羽之髙蓋薛綜曰樹翠羽為蓋如雲龍矣金作華形莖皆低曲建大旂十二斿畫日月升龍駕六馬東京賦云六𤣥虬之弈弈象鑣鏤錫金鑁方釳挿翟尾獨斷曰金鑁者馬冠也髙廣各五寸上如五華形在馬髦前方釳鐵也廣數寸在馬鑁後後有三孔挿翟尾其中薛綜曰釳中央兩頭髙如山形而貫中翟尾結著之顔延之幼誥曰釳乗輿馬頭上防釳角所以防罔羅釳以翟尾鐵翮象之也徐廣曰金為馬文髦朱兼樊纓赤罽易茸金就十有二左纛以氂牛尾為之在左騑馬軛上大如斗徐廣曰馬在中曰服在外曰騑騑亦名驂蔡邕曰在最後左騑馬頭上是為徳車五時車安立亦皆如之各如方色馬亦如之白馬者朱其髦尾為朱鬛云所御駕六餘皆駕四後從為副車古文尚書曰予臨兆民廩乎若朽索之馭六馬逸禮王度記曰天子駕六馬諸侯駕四大夫三士二庶人一周禮四馬為乗毛詩天子至大夫同駕四士駕二易京氏春秋公羊説皆云天子駕六許慎以為天子駕六諸侯及卿駕四大夫駕三士駕二庶人駕一史記曰秦始皇以水數制乗六馬鄭𤣥以為天子四馬周禮乗馬有四圉各養一馬也諸侯亦四馬顧命時諸侯皆獻乗黄朱乗亦四馬也今帝者駕六此自漢制與古異耳蔡邕表志曰以文義不著之故俗人多失其名五時副車曰五帝車鸞旗曰雞翹耕根曰三蓋其比非一也耕車其飾皆如之有三蓋一曰芝車置􅞙耒耜之箙上親耕所乗也新論桓譚謂楊雄曰君之為黄門郎居殿中數見輿輦玉蚤華芝及鳯皇三蓋之屬皆𤣥黄五色飾以金玉翠羽珠絡錦繡茵席者也東京賦曰立戈迆戞農輿路木薛綜曰戈句孑㦸戞長矛置車上者邪柱之迆邪也是謂戈路農輿三蓋所謂耕根車也東耕于藉乗馬無飾故稱木也賀循曰漢儀親耕青衣幘東京賦説親耕亦云鸞路蒼龍賀循曰車必有鸞而春獨鸞路者鸞鳯類而色青故以名春路也賦又曰介御間以剡耜薛綜曰耜耒金也廣五寸著耒耜而載之天子車參乗帝在左御在中介處右以耒置御之右戎車其飾皆如之蕃以矛麾金鼓羽析幢翳􅞙胄甲弩之箙漢制度曰戎立車以征伐周官其矢箙通俗文曰箭箙謂之步义干寳亦曰今謂之步义鄭𤣥注旣夕曰服車箱也顔延之幼誥云弩矢也獵車其飾皆如之重網縵輪繆龍繞之一曰闟猪車親校獵乗之魏文帝改曰闟虎車太皇太后皇太后法駕皆御金根重翟羽蓋者也加交路帳裳徐廣曰青交路青帷裳非法駕則乗紫罽軿車字林曰軿車有衣蔽無後轅者謂之輜也釋名軿屏也四屏蔽婦人乗牛車也有邸曰輜無邸曰軿傅子曰周曰輜車即輦也雲􅏹文畫輈黄金塗五末徐廣曰未詳疑謂前一轅及衡端轂頭也蓋蚤左右騑駕三馬長公主赤罽軿車大貴人貴人公主王妃封君油畫軿車大貴人加節畫輈皆右騑而已皇太子皇子皆安車朱班輪青蓋金華蚤黒􅏹文畫轓文輈金塗五末皇子為王錫以乗之故曰王青蓋車徐廣曰旂旗九旒畫降龍魏武帝令問東平王有金路何意為是特賜非侍中鄭稱對曰天子五路金以封同姓諸侯得乗金路與天子同此自得有非特賜也皇孫綠車以從皆左右騑駕三獨斷曰綠車名曰皇孫車天子有孫乗之公列侯安車朱班輪倚鹿較伏熊軾皁繒蓋黒轓右騑車有轓者謂之軒中二千石二千石皆皁蓋朱兩轓其千石六百石朱左轓轓長六尺下屈廣八寸上業廣尺二寸九文十二初後謙一寸若月初生示不敢自滿也案本傳舊典傳車驂駕乗赤帷裳唯郭賀為冀州勅去襜帷謝承書曰孔恂字巨卿新淦人州别駕從事車前舊有屏星如刺史車曲翳儀式是時刺史行部發去日晏刺史怒欲去别駕車屏星恂諫曰明使君傳車自發晚而欲徹去屏星毁國舊儀此不可行别駕可去屏星不可省即投傳去刺史追辭謝請不肯還於是遂不去屏星説文曰車當謂之屏星景帝中元五年始詔六百石以上施車轓得銅五末軛有吉陽筩中二千石以上右騑三百石以上皁布蓋千石以上皁繒覆蓋二百石以下白布蓋皆有四維杠衣賈人不得乗馬車除吏赤畫杠其餘皆青云古今注曰武帝天漢四年令諸侯王大國朱輪特虎居前左兕右麋小國朱輪畫特熊居前寢麋居左右卿車者也公列侯中二千石二千石夫人㑹朝若蠶各乗其夫之安車右騑加交路帷裳皆皁非公㑹不得乗朝車得乗漆布輜軿車銅五末乗輿大駕公卿奉引太僕御大將軍參乗屬車八十一乗薛綜曰屬之言相連屬也皆在後為三行備千乗萬騎西都行祠天郊甘泉備之官有其注名曰甘泉鹵簿蔡邕表志曰國家舊章而幽僻藏蔽莫之得見東都唯大行乃大駕大駕太僕校駕法駕黄門令校駕乗輿法駕八卿不在鹵簿中河南尹執金吾雒陽令奉引奉車郎御侍中參乗屬車四十六乗前驅有九斿雲䍐徐廣曰斿車有九乗前史不記形也武王尅紂百夫荷䍐旗以先驅東京賦曰雲䍐九斿薛綜曰旌旗名鳳凰闟㦸薛綜曰闟之言函也取四㦸函車邊皮軒鸞旗應劭漢官鹵簿圖曰乗輿大駕則御鳳凰車以金根為列皆大夫載胡廣曰皮軒以虎皮為軒郭璞曰皮軒革車或曰即曲禮前有士師則載虎皮鸞旗者編羽旄列繫幢旁胡廣曰建蓋在中民或謂之雞翹非也胡廣曰鸞旗以銅作鸞鳥車衡上與本志不同後有金鉦黄鉞説文曰鉞大斧也司馬法曰夏執𤣥鉞殷執白鉞周執黄鉞黄門鼓車古者諸侯貳車九乗秦滅九國兼其車服故大駕屬車八十一乗法駕半之屬車皆皁蓋赤裏木轓戈矛弩箙尚書御史所載最後一車懸豹尾薛綜曰侍御史載之豹尾以前比省中小學漢官篇曰豹尾過後罷屯解圍胡廣曰施於道路豹尾之内為省中故須過後屯圍乃得解皆所以戒不虞也淮南子曰軍政執豹皮所以制正其衆禮記前載虎皮亦此之義類行祠天郊以法駕祠地明堂省什三祠宗廟尤省謂之小駕每出太僕奉駕上鹵簿中常侍小黄門副尚書主者郎令史副侍御史蘭臺令史副皆執注以督整車騎謂之䕶駕春秋上陵尤省於小駕直事尚書一人從其餘令以下皆先行後罷輕車古之戰車也洞朱輪輿不巾不蓋建矛㦸幢麾􅞙輒弩服徐廣曰置弩於軾上駕兩馬也藏在武庫大駕法駕出射聲校尉司馬吏士載以次屬車在鹵簿中諸車有矛㦸其飾幡斿旗幟皆五采制度從周禮孫吳兵法云有巾有蓋謂之武剛車武剛車者為先驅又為屬車輕車為後殿焉大使車立乗駕駟赤帷持節者重導從賊曹車斧車督車功曹車皆兩大車伍百璅弩十二人辟車四人周禮條狼氏干寳注曰今卒辟車之屬從車四乗無節單導從減半小使車不立乗有騑赤屏泥油重絳帷導無斧車近小使車蘭輿赤轂白蓋赤帷從騶騎四十人此謂追捕考案有所勅取者之所乗也諸使車皆朱班輪四輻赤衡軛其送𦵏白堊已下洒車而後還公卿中二千石二千石郊廟明堂祠陵法出皆大車立乗駕駟他出乗安車大行載車其飾如金根車加施組連璧交絡四角金龍首衘璧垂五采析羽流蘇前後雲氣畫帷裳􅏹文畫曲轓長懸車等太僕御駕六布施馬布施馬者淳白駱馬也以黒藥灼其身為虎文既下馬斥賣車藏城北祕宫皆不得入城門當用太僕考工乃内飾治禮吉凶不相干也公卿以下至縣三百石長導從置門下五吏賊曹督盜賊功曹皆帶劒三車從導主簿主記兩車為從縣令以上加導斧車公乗安車則前從并馬立乗長安雒陽令及王國都縣加前後兵車亭長纂要雒陽亭長車前吹管設右騑駕兩璅弩車前伍伯公八人中二千石二千石六百石皆四人自四百石以下至二百石皆二人黄綬武官伍伯文官辟車軨下侍閣門䦨部署街里走卒皆有程品多少隨所典領驛馬三十里一置臣昭案東晉猶有郵驛共置承受傍郡縣文書有郵有驛行傳以相付縣置屋二區有承驛吏皆條所受書每月吉上州郡風俗通曰今吏郵書掾府督郵職掌此卒皆赤幘絳韝云古者軍出師旅皆從秦省其卒取其師旅之名焉公以下至二千石騎吏四人千石以下至三百石縣長二人皆帶劒持棨㦸為前列揵弓韣九鞬通俗文曰弓韔謂之鞬諸侯王法駕官屬傅相以下皆備鹵簿似京都官騎張弓帶鞬遮迾出入稱課促列侯家丞庶子導從若㑹耕祠主縣假給辟車鮮明卒備其威儀導從事畢皆罷所假諸車之文乗輿倚龍伏虎􅏹文畫輈龍首鸞衡重牙班輪升龍飛軨薛綜曰飛軨以緹油廣八寸長注地畫左蒼龍右白虎繫軸頭二千石亦然但無畫耳盧植禮記注曰軨轄頭也楚辭云猗結軨兮太息王逸注曰重軨也李尤小車銘曰軨之嗛噓疏達開通案二家之言不如綜注所記皇太子諸侯王倚虎伏鹿􅏹文畫輈轓吉陽筩朱班輪鹿文飛軨旂旗九斿降龍公列侯倚鹿伏熊黒轓朱班輪鹿文飛軨九斿降龍卿朱兩輪五斿降龍二千石以下各從科品諸轓車以上軛皆有吉陽筩諸馬之文案乗輿金鍐方釳揷翟象鑣爾雅注曰鑣馬勒旁鐵也此用象牙龍畫總洙升龍赤扇汗詩云朱幩鑣鑣毛傳曰人君以朱纒鑣扇汗且以為鑣飾青兩翄鷰尾附馬左右赤珥流蘇飛鳥節赤膺兼皇太子或亦如之王公列侯鏤鍚义髦朱鑣朱鹿朱文絳扇汗青翄鷰尾卿以下有騑者緹扇汗青翄尾當盧义髦上下皆通中二千石以上及使者乃有騑駕云後漢書卷三十九後漢書卷三十九考證輿服志上此諸侯以下之所建者也注其聲名曰和敬名當作鳴金鑁方釳揷翟尾注方釳鐵也廣數寸在馬鑁後鑁當作騣又注金為馬文髦一本或作馬文尾何焯校本作馬义髦屬車皆皁蓋赤裏裏應作裹龍畫總洙升龍赤扇汗洙應作沬附馬附應改駙後漢書卷三十九考證
