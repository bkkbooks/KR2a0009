body:
  text: 後漢書卷十六梁剡令劉昭補幷注禮儀志第六禮儀下大䘮王列侯始封貴人公主薨諸侯不豫太醫令丞将醫入就進所冝藥嘗藥監近臣中常侍小黄門皆先嘗藥過量十二公卿朝臣問起居無間太尉告請南郊司徒司空告請宗廟告五嶽四瀆羣祀並禱求福疾病公卿復如禮登遐皇后詔三公典䘮事百官皆衣白單衣白幘不冠閉城門宫門近臣中黄門持兵虎賁羽林郎中署皆嚴宿衛宫府各警北軍五校繞宫屯兵黄門令尚書御史謁者晝夜行陳三公啟手足色膚如禮皇后皇太子皇子哭踊如禮沐浴如禮守宫令兼東園匠将女執事黄緜緹繒金縷玉柙如故事漢舊儀曰帝崩唅以珠纒以緹繒十二重以玉為𥜗如鎧状連縫之以黄金為縷腰以下以玉為札長一尺二寸半為柙下至足亦縫以黄金縷請諸衣衿斂之凡乗輿衣服已御輒藏之崩皆以斂飯唅珠玉如禮禮稽命徴曰天子飯以珠唅以玉諸侯飯以珠唅以珠卿大夫士飯以珠唅以貝槃冰如禮周禮凌人天子䘮供夷槃冰鄭𤣥曰夷之言尸也實冰于槃中置之尸牀之下所以寒尸也漢禮器制度大盤廣八尺長一文二尺深三尺漆赤中百官哭臨殿下是日夜下竹使符告郡國二千石諸侯王應劭曰凡與郡國守相竹使符皆以竹箭五枚長五寸鐫刻篆書第一至第五張晏曰符以代古之珪璋從簡易也此下大䘮符亦猶斯比竹使符到皆伏哭盡哀漢舊制發兵皆以銅虎符其餘徴調竹使而已符第合㑹為大信見杜詩傳小斂如禮東園匠考工令奏東園祕器表裏洞赤虡文畫日月鳥龜龍虎連璧偃月牙檜梓宫如故事大歛於兩楹之間五官左右虎賁羽林五将各将所部執虎賁㦸屯殿端門陛左右廂中黄門持兵陛殿上夜漏羣臣入晝漏上水大鴻臚設九賔隨立殿下謁者引諸侯王立殿下西靣北上宗室諸侯四姓小侯在後西靣北上治禮引三公就位殿下北靣特進次中二千石列侯次二千石六百石博士在後羣臣陪位者皆重行西上位定大鴻臚言具謁者以聞皇后東向貴人公主宗室婦女以次立後皇太子皇子在東西向皇子少退在南北靣皆伏哭大鴻臚傳哭羣臣皆哭三公升自阼階安梓宫内珪璋諸物近臣佐如故事嗣子哭踊如禮周禮駔珪璋璧琮琥璜之渠眉疏璧琮以斂尸鄭司農曰駔外有㨗盧也謂珪璋璧琮琥璜皆為開渠為眉瑑沙除以斂尸令汁得流去也鄭元曰以斂尸者於大斂焉加之也渠眉玉餙之溝瑑也以組穿聨六玉溝瑑之中以斂尸珪在左璋在首琥在右璜在足璧在背琮在腹蓋取象方明神之也疏璧琮者通於天地東園匠武士下釘祍截去牙䘮大記曰君盖用漆三祍三束鄭𤣥注曰祍小腰太常上太牢奠太官食監中黄門尚食次奠執事者如禮太常大鴻臚傳哭如儀三公奏尚書顧命太子即日即天子位于柩前請太子即皇帝位皇后為皇太后奏可羣臣皆出吉服入㑹如儀太尉升自阼階當柩御座北靣稽首讀策畢以傳國玉璽綬東靣跪授皇太子即皇帝位中黄門掌兵以玉具隨侯珠斬蛇寳劒授太尉告令羣臣羣臣皆伏稱萬嵗或大赦天下遣使者詔開城門宫門罷屯衛兵羣臣百官罷入成䘮服如禮兵官戎文帝遺詔無布車及兵器應劭曰不施輕車介士三公太常如禮故事百官五日一㑹臨故吏二千石刺史在京都郡國上計掾史皆五日一㑹天下吏民發䘮臨三日文帝遺詔其令天下吏民令到出臨三日釋服先𦵏二日皆旦晡臨既𦵏釋服無禁嫁娶祠祀文帝遺詔文有飲酒食肉自當給䘮事服臨者皆無踐踐徒跣也佐吏以下布衣冠幘絰帶無過三寸臨庭中文帝遺詔殿中當臨者以旦夕各十五舉音禮畢罷非旦夕臨時禁無得擅哭臨武吏布幘大冠大司農出見錢糓給六丈布直以𦵏大紅十五日小紅十四日纎七日釋服應劭曰紅者中祥大祥以紅為領緣纎禫也凡三十六日而釋部刺史二千石列侯在國者及闗内侯宗室長吏及因郵奉奏諸侯王遣大夫一人奉奏弔臣請驛馬露布奏可以木為重高九尺廣容八歴裏以葦席巾門䘮帳皆以簟車皆去輔轓疏布惡輪走卒皆布褠幘太僕四輪輈為賔車大練為屋幙中黄門虎賁各二十人執紼司空擇土造穿太史卜日謁者二人中謁者僕射中謁者副将作油緹帳以覆坑方石治黄腸題湊便房如禮漢舊儀略載前漢諸帝壽陵曰天子即位明年将作大匠營陵地用地七頃方中用地一頃深十三丈堂壇高三丈墳髙十二文武帝墳髙二十丈明中髙一丈七尺四周二丈内梓棺栢黄腸題湊以次百官藏畢其設四通羡門容大車六馬皆藏之内方外陟車石外方立先閉劔户户設夜龍莫邪劔伏弩設伏火已營陵餘地為西園后陵餘地為媫妤以下次賜親屬功臣漢書音義曰題頭也湊以頭向内所以為固也便房藏中便坐也皇覽曰漢家之𦵏方中百歩已穿築為方城其中開四門四通足放六馬然後錯渾雜物扞漆繪綺金寳米榖及埋車馬虎豹禽獸發近郡卒徒置将軍尉侯以後宫貴幸者皆守園陵元帝𦵏乃不用車馬禽獸等物大駕太僕御方相氏黄金四目䝉熊皮𤣥衣朱裳執戈揚楯立乗四馬先驅周禮曰方相氏大䘮先柩及墓入壙以戈擊四隅敺方良鄭𤣥曰方相放想也可畏怖之貌壙穿地中也方良罔兩也天子之椁柏黄腸為裏表以石焉國語曰木石之怪䕫罔兩旂之制長三仞十有二斿天地畫日月升龍書旐曰天子之柩謁者二人立乗六馬為次大駕甘泉鹵簿金根容車蘭臺法駕䘮服大行載餙如金根車皇帝從送如禮太常上啟奠夜漏二十刻太尉冠長冠衣齋衣乗高車詣殿止車門外使者到南向立太尉進伏拜受詔太尉詣南郊未盡九刻大鴻臚設九賔隨立羣臣入位太尉行禮執事皆冠長冠衣齋衣太祝令跪讀諡䇿太尉再拜稽首治禮告事畢太尉奉諡䇿還詣殿端門太常上祖奠中黄門尚衣奉衣登容根車東園武士載大行司徒却行道立車前治禮引太尉入就位大行車西少南東靣奉䇿太史令奉哀䇿立後太常跪曰進皇帝進太尉讀諡䇿藏金匱皇帝次科藏於廟太史奉哀䇿葦箧詣陵太尉旋復公位再拜立哭太常跪曰哭大鴻臚傳哭十五舉音止哭太常行遣奠皆如禮請哭止哭如儀晝漏上水請發司徒河南尹先引車轉太常跪曰請拜送載車著白系參繆紼長三十丈大七寸為輓六行行五十人公卿以下子弟凡三百人皆素幘委貌冠衣素裳校尉三人皆赤幘不冠絳科單衣持幢幡候司馬丞為行首皆銜枚羽林孤兒巴俞擢歌者六十人為六列鐸司馬八人執鐸先大鴻臚設九賔隨立陵南羡門道東北靣諸侯王公特進道西北靣東上中二千石二千石列侯冝九賔東北靣西上皇帝白布幕素裏夾羡道東西向如禮容車幄坐羡道西南向車當坐南向中黄門尚衣奉衣就幄坐車少前太祝進醴獻如禮司徒跪曰大駕請舍太史令自車南北靣讀哀䇿掌故在後已哀哭太常跪曰哭大鴻臚傳哭如儀司徒跪曰請就下位東園武士奉下車司徒跪曰請就下房都導東園武士奉車入房司徒太史令奉諡哀䇿晉時有人嵩髙山下得竹簡一枚上有兩行科斗書之臺中外傳以相示莫有知者司空張華以問博士束晳晳曰此明帝顯節陵中䇿也檢校果然是知䇿用此書也東園武士執事下明器禮記曰明器神明之也孔子謂為明器知䘮道矣備物而不可用也鄭𤣥注既夕曰陳明器以西行南端為上筲八盛容三升鄭𤣥注既夕曰筲畚種類也其容蓋與簋同黍一稷一麥一粱一稻一麻一菽一小豆一甕三容三升醯一醢一屑一鄭𤣥注既夕曰屑薑桂之屑黍飴載以木桁覆以疏布甒二容三升醴一酒一載以木桁覆以功布瓦鐙一彤矢四軒輖中亦短衛彤矢四骨短衛既夕曰翭矢一乗骨鏃短衛鄭𤣥曰翭猶候也候物而射之矢也四矢曰乗骨鏃短衛亦示不用也生時翭矢金鏃凡為矢五分笴長而羽其一通俗文曰細毛翭也彤弓一巵八牟八鄭元注既夕曰牟盛湯漿豆八籩八形方酒壺八槃匜一具鄭𤣥注既夕曰槃匜盥器也杖几各一蓋一鍾十六無虡鎛四無虡爾雅曰大鍾謂之鏞郭璞注曰書曰笙鏞以間亦名鎛磬十六無虡禮記曰有鍾磬而無簨虡鄭𤣥曰不懸之也壎一簫四笙一箎一柷一敔一瑟六琴一竽一筑一坎侯一禮記曰琴瑟張而不平竿笙備而不和干戈各一笮一甲一胄一既夕謂之役器鄭𤣥曰笮矢箙輓車九乗芻靈三十六匹鄭𤣥注禮記曰芻靈束茅為人馬謂之芻靈神之類瓦竈二瓦釡二瓦甑一瓦鼎十二容五升匏勺一容一升瓦案九瓦大杯十六容三升瓦小杯二十容二升瓦飯槃十瓦酒樽二容五斗匏勺二容一升祭服衣送皆畢東園匠曰可哭在房中者皆哭太常大鴻臚請哭止如儀司徒曰百官事畢臣請罷從入房者皆再拜出就位太常導皇帝就贈位司徒跪曰請進贈侍中奉持鴻洞贈玉珪長尺四寸薦以紫巾廣袤各三寸緹裏赤纁周緣贈幣𤣥三纁二各長尺二寸廣充幅皇帝進跪臨羡道房户西向手下贈投鴻洞中三東園匠奉封入藏房中太常跪曰皇帝敬再拜請哭大鴻臚傳哭如儀太常跪曰贈事畢皇帝促就位續漢書曰明帝崩司徒鮑昱典䘮事𦵏日三公入安梓宫還至羡道半逢上欲下昱前叩頭言禮天子鴻洞以贈所以重郊廟也陛下奈何冐危險不以義割哀上即還容根車游載容衣司徒至便殿並䡰騎皆從容車玉帳下司徒跪曰請就幄導登尚衣奉衣以次奉器衣物藏於便殿太祝進醴獻几下用漏十刻禮畢司空将校復土皇帝皇后以下皆去麤服服大紅還宫反廬立主如禮桑木主尺二寸不書諡虞禮畢祔於廟如禮漢舊儀曰髙帝崩三日小斂室中牖下作栗木主長八寸前方後圓圍一尺置牖中望外内張緜絮以鄣外以皓木大如指長三尺四枚纒以皓皮四方置牖中主居其中央七日大斂棺以黍飯羊舌祭之牖中已𦵏收主為木函藏廟太室中西牆壁埳中望内外不出室堂之上坐為五時衣冠履几杖竹籠為俑人無頭坐起如生時皇后主長七寸圍九寸在皇帝主右旁高皇帝主長九寸上林結栗木長安祠廟作神主東園秘器作梓棺素木長丈三尺崇廣四尺先大駕日游冠衣於諸宫諸殿羣臣皆吉服從㑹如儀皇帝近臣喪服如禮醳大紅服小紅十一升都布練冠醳小紅服纎醳纎服留黄冠常冠近臣及二千石以下皆服留黄冠百官衣早毎變服從哭詣陵㑹如儀祭以特牲不進毛血首司徒光禄勲備三爵如禮古今注具載帝陵丈尺頃畆今附之後焉四光武原陵山方三百二十三歩高六丈六尺垣出司馬門寝殿鍾虡皆在周垣内隄封田十二頃五十七畆八十五歩帝王世紀曰在臨平亭之南西望平隂東南去雒陽十五里出明帝顯節陵山方三百歩高八丈無周垣為行馬四司馬門石殿鍾虡在行馬内寝殿園省在東園寺吏舍在殿北隄封田七十四頃五畆帝王世紀曰故冨壽亭也西北去雒陽三十七里章帝敬陵山方三百歩高六丈二尺無周垣為行馬四出司馬門石殿鍾虡在行馬内寝殿園省在東園寺吏舍在殿北隄封田二十五頃五十五畆帝王世紀曰在雒陽東南去雒陽三十九里和帝慎陵山方三百八十歩高十丈無周垣為行馬四出司馬門石殿鍾虡在行馬内寝殿園省在東園寺吏舍在殿北隄封田三十一頃二十畆二百歩帝王世紀曰在雒陽東南去雒陽四十一里殤帝康陵山周二百八歩高五丈五尺行馬四出司馬門寝殿鍾虡在行馬中因寝殿為廟園吏寺舍在殿北隄封田十三頃十九畆二百五十歩帝王世紀曰高五丈四尺去雒陽四十八里馬安帝恭陵山周二百六十歩高十五丈無周垣為行四出司馬門石殿鍾虡在行馬内寝殿園吏舍在殿北隄封田一十四頃五十六畆帝王世紀曰高十一丈在雒陽西北去雒陽十五里四順帝憲陵山方三百歩高八丈四尺無周垣為行馬出司馬門石殿鍾虡在行馬内寝殿園省寺吏舍在殿東隄封田十八頃十九畆三十歩帝王世紀曰在雒陽西北去雒陽十五里冲帝懐陵山方百八十三歩高四丈六尺為寝殿行馬四出門園寺吏舍在殿東隄封田五頃八十畆帝王世紀曰西北去雒陽十五里出質帝静陵山方百三十六歩高五丈五尺為行馬四門寝殿鍾虡在行馬中園寺吏舍在殿北隄封田十二頃五十四畆因寝為廟帝王世紀曰在雒陽東去雒陽三十二里桓帝宣陵帝王世紀曰山方三百歩高十二丈在雒陽東南去雒陽三十里陽靈帝文陵帝王世紀曰山方三百歩高十二丈在雒西北去雒陽二十里八獻帝禪陵帝王世紀曰不起墳深五丈前堂方一丈尺後堂方一丈五尺角廣六尺在河内山陽之濁城西北去濁城直行十一里斜行七里去懐陵百一十里去山陽五十里南去雒陽三百一十里蔡質漢儀曰十二陵今見在河南尹無敬也之魏文帝終制略曰漢文帝之不發霸陵無求也光武掘原陵封樹也覇陵之完功在釋之原陵之掘罪在明帝是釋之忠以利君明帝爱以害親也忠臣孝子冝思釋之之言察明帝之戒存於所以安君定親使魂靈萬載無危斯則聖賢之忠孝矣自古及今未有不亡之國亦無不掘之墓也䘮亂以来漢氏諸陵無不發掘至乃燒取玉柙金鏤骸骨幷盡是焚如之刑也豈不重痛哉禍由乎厚𦵏封樹桑藿為我戒不亦明乎臣昭按董卓傳卓使吕布發諸帝陵及公卿以下冢墓收其珍寳卓别傳曰發成帝陵解金縷探含璣焉吕氏春秋略曰審知生聖人之要也審知死聖人之極也知生者不以物害生知死者不以物害死凡生於天地之間其必有死孝子之重其親者若親之愛其子不棄於溝壑故有𦵏送之義𦵏者藏也以生人心為之慮則莫如無動無動莫如無利藏淺則狐狸掘之深則及水泉故必高陵之上以避二害然而忘姦㓂之變豈不惑哉民之於利也犯白刃渉危難以求之忍親戚欺知交以求之今無此危無此醜而為利甚厚固難禁也國彌大家彌冨其𦵏彌厚珠玉金銅不可勝計姦人聞之轉以相告雖有嚴刑重罪不能止也且死者彌乆生者彌疏彌疏則守之彌怠藏器如故而守之有怠其势固必掘矣世至為丘隴其高若山陵樹之若林藪或設闕庭都邑以此示冨則可矣以此為死者則惑矣大凡死者其視萬世猶一暝也人之夀乆者不過百中者六十以百與六十為無窮者慮其情固不相當矣必以無窮為慮然後為可今有銘其墓曰此中有金寳甚厚不可掘也必為世笑矣而為之闕庭以自表此何異彼哉自古及今未有不亡之國也無不亡之國是無不掘之墓以耳目之所聞見則齊荆燕嘗亡矣宋中山已亡矣趙韓魏皆失其故國矣自此以上亡國不可勝數故其大墓無不掘也而猶皆爭為之豈不悲哉今夫君之不令民父之不教子兄之不悌弟皆鄉邑之所遺而惮耕耒之勞者也仍不事耕農而好鮮衣侈食智巧窮匱則合黨連衆而謀名丘大墓上曽不能禁也此有𦵏自表之禍也昔堯𦵏糓林通樹之舜𦵏紀市不變肆禹𦵏㑹稽不變人徒非爱其費以為死者也先王之所惡惡死者之辱以為儉則不發不發則不辱故必以儉而合乎山原也宋未亡而東冢掘齊未亡而荘公掘國存而乃若此又况㓕名之後乎此爱而厚𦵏之故也欲爱而反害之欲安而反危之忠臣孝子亦不可以厚𦵏矣昔季孫以璵璠斂孔子歴級而止之為無窮慮也太皇太后皇太后崩司空以特牲告諡于祖廟如儀長樂太僕少府大長秋典䘮事三公奉制度他皆如禮儀丁孚漢儀曰永平七年隂太后崩晏駕詔曰柩将發於殿羣臣百官陪位黄門鼓吹三通鳴鐘鼓天子舉哀女侍史官三百人皆著素參以白素引棺挽歌下殿就車黄門宦者引以出宫省太后魂車鸞路靑羽盖駟馬龍旂九旒前有方相鳯皇車大将軍妻參乘太僕妻御悉道公卿百官如天子郊鹵簿儀後和熹鄧后𦵏案以為儀自此皆降損於前事也合𦵏羡道開通皇帝謁便房太常導至羡道去杖中常侍受至柩前謁伏哭止如儀辭太常導出中常侍授杖升車歸宫已下反虞立主如禮諸郊廟祭服皆下便房五時朝服各一襲在陵寝其餘及宴服皆封以箧笥藏宫殿後閤室諸侯王列侯始封貴人公主薨皆令贈印璽玉柙銀縷大貴人長公主銅縷諸侯王貴人公主公将軍特進皆賜器宫中二十四物使者治䘮穿作栢棺百官㑹送如故事諸侯王公主貴人皆樟棺洞朱雲氣畫公特進樟棺黒漆中二千石以下坎侯漆丁孚漢儀曰孝靈帝𦵏馬貴人贈歩摇赤紱𦵏青羽盖駟馬柩下殿女侍史一百人着素衣挽歌引木下就車黄門宦者引出宫門朝臣中二千石将軍使者弔祭郡國二千石六百石以至黄綬皆賜常車驛牛贈祭冝自佐史以上逹大斂皆以朝服君臨弔若遣使者主人免絰去杖望馬首如禮免絰去杖不敢以戚凶服當尊者前書賈山上書曰古之賢君于臣也尊其爵禄而親之疾則臨視之無數死則徃弔哭之臨其小斂大斂已棺塗而後為之服錫衰絰而三臨其䘮未斂而不飲酒食肉未𦵏不舉樂可謂盡禮矣服法服端容貌正顔色然後見之故臣下莫敢不竭力盡死以報其上功徳立於世而令問不忘也晋起居注曰太尉賈充薨皇太子妃之父又太保也有司奏依漢元明二帝親臨師保故事皇太子素服為發哀又臨其喪自王主貴人以下至佐史送車騎導從吏卒各如其官府載飾以葢龍首魚尾華布牆纁上周交絡前後雲氣畫帷裳中二千石以上有輜左龍右虎朱鳥𤣥武公侯以上加倚鹿伏熊千石以下緇布葢牆魚龍首尾而已二百石黄綬以下至于處士皆以簟席為牆葢其正妃夫人妻皆如之諸侯王傅相中尉内史典䘮事大鴻臚奏諡天子使者贈璧帛載日命諡如禮下陵羣臣醳麤服如儀主人如禮贊曰大禮雖簡鴻儀則容天尊地卑君荘臣恭質文通變哀敬交從元序斯立家邦廼隆後漢書卷十六後漢書卷十六考證禮儀志下備三爵如禮注蔡質漢儀曰十二陵今見在河南尹無敬也按何焯校本今改令削在字又世至為丘隴何焯校本曰至疑之後漢書卷十六考證
