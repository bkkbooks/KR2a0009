body:
  text: 後漢書卷五十七宋宣城太守范煜撰唐章懷太子賢注宣張王王杜郭吳承鄭趙列傳第十七宣秉傳宣秉字巨公馮翊雲陽人也少修髙節顯名三輔哀平際見王氏據權專政侵削宗室有逆亂萌遂𨼆遯深山州郡連召常稱疾不仕王莽為宰衡辟命不應周公為太宰伊尹為阿衡莽欲兼之故以為號及莽簒位又遣使者徴之秉固稱疾病更始即位徴為侍中建武元年拜御史中丞前書曰御史中丞秦官秩千石在殿中蘭臺掌圖籍秘書外督部刺史内領侍御史紏察百僚光武特詔御史中丞與司隸校尉尚書令續漢志曰尚書令一人千石秦官武帝用宦者成帝用士人也㑹同並專席而坐故京師號曰三獨坐眀年遷司隸校尉務舉大綱簡略苛細百僚敬之説文曰苛細草也以喻煩雜也秉性節約常服布被蔬食瓦器帝嘗幸其府舍見而歎曰楚國二龔不如雲陽宣巨公二龔謂龔勝字君賔龔舍字君倩二人皆以清苦立節著名事見前書即賜布帛帳帷什物周禮幕人掌帷帟幄幕鄭𤣥曰在傍曰帷爾雅曰幬謂之帳軍法五人為伍二五為什則共其器物故通謂生生之具為什物劉攽曰案帳帷當作帷帳注文先解帷後帳是其次矣四年拜大司徒司直司直武帝元狩五年置比二千石掌佐丞相舉不法哀帝元壽二年改丞相為大司徒中興因而不改猶置司直至建武十一年省司直置長史一人署諸曹事至二十七年司徒又去大字見前書及續漢書所得祿奉輙以收養親族其孤弱者分與田地自無擔石之儲前書音義曰齊人名小甖為擔今江淮人謂一石為一擔擔音丁濫反六年卒於官帝敏惜之劉攽曰案文敏當作愍除子彪為郎東觀記曰彪官至𤣥菟太守張湛傳張湛字子孝扶風平陵人也矜嚴好禮動止有則居處幽室必自修整雖遇妻子若嚴君焉易家人卦曰家人有嚴君焉父母之謂也及在鄉黨詳言正色詳審也三輔以為儀表儀法也表正也書曰儀表萬邦人或謂湛偽詐湛聞而笑曰我誠詐也人皆詐惡我獨詐善不亦可乎成哀間為二千石王莽時厯太守都尉建武初為左馮翊在郡修典禮設條教政化大行後告歸平陵望寺門而歩告請也告歸謂請假歸寺門即平陵縣門也風俗通曰寺者嗣也理事之吏嗣續於其中也主簿進曰眀府位尊徳重不宜自輕郡守所居曰府府者尊髙之稱前書韓延壽為東郡太守門卒謂之眀府亦其義也湛曰禮下公門軾路馬路大也君所居曰路寢車曰路車馬曰路馬軾車前横木也乗車必正立有所敬則撫軾謂小俛也禮記曰大夫士下公門軾路馬鄭𤣥云所以廣敬孔子於鄉黨恂恂如也論語之文也鄭𤣥云恂恂恭順貎也父母之國所宜盡禮何謂輕哉史記孔子謂門弟子曰魯墳墓所處父母之國也詩曰惟桑與梓必恭敬止也五年拜光祿勲前書光祿勲本名郎中令秦官武帝改焉秋中二千石掌大夫郎中從官光武臨朝或有惰容湛輙陳諫其失常乗白馬帝每見湛輙言白馬生且復諌矣七年以病乞身拜光祿大夫代王丹為太子太傅及郭后廢建武十七年廢因稱疾不朝拜太中大夫居中東門候舍漢官儀曰洛陽十二門東面三門最北門名上東門次南曰中東門每門校尉一人秩二千石司馬一人秩千石候一人秩六百石候舍蓋候之所居故時人號曰中東門君帝數存問賞賜後大司徒戴渉被誅渉字叔平冀州清河人也坐所舉人盗金下獄帝彊起湛以代之湛至朝堂遺失溲便溲小便也溲音所流反因自陳疾篤不能復任朝事遂罷之後數年卒於家王丹傳王丹字仲回京兆下邽人也哀平時仕州郡王莽時連徴不至家累千金隠居養志好施周急周急謂周濟困急也孔子曰君子周急不繼富每歳農時輙載酒肴於田間候勤者而勞之東觀記曰載酒肴便於田頭大樹下飲食勸勉之因留其餘酒肴而去其墯孏者恥不致丹皆兼功自厲孏與嬾同音力亶反邑聚相率以致殷富其輕黠游蕩廢業為患者輒曉其父兄使黜責之没者則賻給親自將䕶其有遭喪憂者輙待丹為辦鄉鄰以為常行之十餘年其化大洽風俗以篤丹資性方潔疾惡彊豪時河南太守同郡陳遵闗西之大侠也遵字孟公杜陵人也見前書其友人喪親遵為護喪事賻助甚豐丹乃懷縑一匹陳之於主人前曰如丹此縑出自機杼遵聞而有慙色自以知名欲結交於丹丹拒而不許東觀記曰更始時遵為大司馬出使匃奴過辭於丹丹曰俱遭反覆唯我二人為天所遺今子當之絶域無以相贈贈子以不拜遂揖而别遵甚悦之㑹前將軍鄧禹西征闗中軍糧乏丹率宗族上麥二千斛禹表丹領左馮翊稱疾不視事免歸後徴為太子少傅時大司徒侯覇欲與交友及丹被徴遣子昱候於道昱迎拜車下丹下荅之昱曰家公欲與君結交何為見拜丹曰君房有是言丹未之許也丹子有同門生喪親家在中山白丹欲往奔慰結侣將行丹怒而撻之東觀記曰丹怒撻之五十令寄縑以祠焉東觀記曰寄帛二匹以祠焉或問其故丹曰交道之難未易言也世稱管鮑次則王貢史記曰管夷吾潁上人嘗與鮑叔牙㳺叔牙知其賢管仲貧困嘗欺鮑叔牙鮑叔牙終善遇之管仲曰生我者父母知我者鮑叔前書王吉字子陽貢禹字少翁並瑯琊人也二人相善時人為之語王陽在位貢禹彈冠言其趣舍同也張陳凶其終蕭朱隙其末張耳陳餘初為刎頸交後搆隙耳後為漢將兵殺陳餘於泜水之上蕭育字次君朱博字子元二人為友著聞當代後有隙不終故時以交為難並見前書故知全之者鮮矣時人服其言客初有薦士於丹者因選舉之而後所舉者陷罪丹坐以免客慚懼自絶而丹終無所言尋復徴為太子太傅乃呼客謂曰子之自絶何量丹之薄也不為設食以罰之相待如舊其後遜位卒于家王良傳王良字仲子東海蘭陵人也少好學習小夏侯尚書夏侯建大夏侯勝之從兄子也建受尚書於勝號小夏侯見前書王莽時稱病不仕教授諸生千餘人建武二年大司馬吳漢辟不應三年徴拜諌議大夫數有忠言以禮進止朝廷敬之遷沛郡太守至蘄縣稱病不之府官屬皆隨就之良遂上疾篤乞骸骨徴拜太中大夫六年代宣秉為大司徒司直在位恭儉妻子不入官舍布被瓦器時司徒史鮑恢以事到東海過候其家而良妻布裙曵柴自田中歸東觀記曰徒跣曵柴恢告曰我司徒史也故来受書欲見夫人妻曰妾是也苦掾無書掾即謂鮑恢司徒之掾史也言勞苦相過更無書信恢乃下拜歎息而還聞者莫不嘉之後以病歸一歳復徴至滎陽疾篤不任進道乃過其友人友人不肯見曰不有忠言竒謀而取大位何其往来屑屑不憚煩也揚雄方言曰屑屑不安也秦晉曰屑屑郭景純曰往来貎遂拒之良慙自後連徴輙稱病詔以𤣥纁聘之遂不應後光武幸蘭陵遣使者問良所疾苦不能言對詔復其子孫邑中徭役卒於家論曰夫利仁者或借仁以從利體義者不期體以合義此言履行仁義其事雖同原其本心眞偽各異利仁者謂心非好仁但以行仁則於己有利故假借仁道以求利耳若天性自然體合仁義者舉措云為不期於體而㝠然自合禮記曰仁者安仁智者利仁畏罪者彊仁與人同功其仁未可知與人同過其仁則可知季文子妾不衣帛魯人以為羙談文子魯卿季孫行父之諡也無衣帛之妾無食粟之馬君子是以知季文子忠於公室相三君矣而無私積可不謂忠乎事見左傳公孫𢎞身服布被汲黯譏其多詐公孫𢎞淄川人也武帝時為丞相汲黯曰𢎞以三公而身服布被詐也事見前書事實未殊而譽毁别議何也將體之與利之異乎宣秉王良處位優重而秉甘疏薄良妻荷薪可謂行過乎儉然當世咨其清人君髙其節豈非臨之以誠哉語曰同言而信則信在言前同令而行則誠在令外不其然乎眞偽之跡既殊人之信否亦異同言而信謂體仁與利仁二人同出言而人信服其眞者不信其偽者則知信不由言故言信在言前也同令而行意亦同也此皆子思子累徳篇之言故稱語曰張湛不屑矜偽之誚斯不偽矣屑猶介也王丹難於交執之道斯知交矣杜林傳杜林字伯山扶風茂陵人也案杜鄴傳鄴本魏郡繁陽人也武帝時徙茂陵父鄴成哀間為凉州刺史林少好學沈深家既多書又外氏張竦父子喜文采鄴字子夏祖父皆至郡守鄴少孤其母張敞女也鄴從敞子吉學得其家書竦即吉之子也博學文雅過於敞見前書林從竦受學博洽多聞時稱通儒風俗通曰儒者區也言其區别古今居則玩聖哲之詞動則行典籍之道稽先王之制立當時之事此通儒也若能納而不能出能言而不能行講誦而已無能往来此俗儒也初為郡吏王莽敗盗賊起林與弟成及同郡范逡孟冀等逡音七倫反將細弱俱客河西道逢賊數千人遂掠取財裝禠奪衣服禠解也音直紙反拔刃向林等將欲殺之冀仰曰願一言而死將軍知天神乎言知天道有神乎赤眉兵衆百萬所向無前而殘賊不道卒至破敗今將軍以數千之衆欲規霸王之事不行仁恩而反遵覆車不畏天乎賈誼曰前車覆後車誡詩曰不畏于天不媿于人賊遂釋之俱免於難隗囂素聞林志節深相敬待以為持書平劉攽曰案文多一平字蓋舊作治書讀者以平音治字章懷已改作持後人又妄留平字也後因疾告去辭還禄食囂復欲令彊起遂稱篤囂意雖相望且欲優容之望猶恨也東觀記曰林寄囂地終不降志辱身至簪蒿席草不食其粟也乃出令曰杜伯山天子所不能臣諸侯所不能友禮記曰儒有上不臣天子下不事諸侯愼靜尚寛砥礪廉隅其規為有如此者盖伯夷叔齊恥食周粟史記曰伯夷叔齊孤竹君之子也兄弟讓位歸文王後武王東伐紂伯夷叔齊扣馬諌曰父死不葬爰及干戈可謂孝乎以臣伐君可謂仁乎武王平殷亂而二人恥之義不食周粟餓死於首陽山今且從師友之位須道開通使順所志林雖拘於囂而終不屈節建武六年弟成物故囂乃聽林持喪東歸既遣而悔追令刺客楊賢於隴坻遮殺之賢見林身推鹿車載致弟喪乃歎曰當今之世誰能行義我雖小人何忍殺義士因亡去光武聞林已還三輔乃徴拜侍御史引見問以經書故舊及西州事甚悅之賜車馬衣被羣寮知林以名徳用甚尊憚之京師士大夫咸推其博洽東觀記曰林與馬援同鄉里素相親厚援從南方還時林馬適死援令子持馬一匹遺林曰朋友有車馬之饋可且以備乏林受之居數月林遣子奉書曰將軍内施九族外有賓客望恩者多林父子兩人食列卿祿常有盈今送錢五萬援受之謂子曰人當以此為法是杜伯山所以勝我也博廣也洽徧也言其所聞見廣大也河南鄭興東海衛宏等皆長於古學宏字敬仲在儒林傳興嘗師事劉歆林既遇之欣然言曰林得興等固諧矣使宏得林且有以益之及宏見林闇然而服濟南徐廵始師事宏後皆更受林學林前於西州得漆書古文尚書一卷常寳愛之雖遭艱困握持不離身出以示宏等曰林流離兵亂常恐斯經將絶何意東海衛子濟南徐生復能傳之是道竟不墜於地也古文雖不合時務然願諸生無悔所學宏廵益重之於是古文遂行眀年大議郊祀制多以為周郊后稷漢當祀堯詔復下公卿議議者僉同帝亦然之林獨以為周室之興祚由后稷漢業特起功不縁堯祖宗故事所冝因循定從林議東觀記載林議曰當今政卑易行禮簡易從人無愚智思仰漢徳基業特起不因縁堯堯逺於漢人不曉信言提其耳終不説諭后稷近周人所知之又據以興基由其祚詩曰不愆不忘率由舊章宜如舊制以解天下之惑後代王良為大司徒司直林薦同郡范逡趙秉申屠剛及隴西牛邯等皆被擢用士多歸之十一年司直官罷以林代郭憲為光祿勲内奉宿衛外總三署三署左右中郎將及五官中郎將皆管郎官也見續漢書周密敬愼選舉稱平郎有好學者輙見誘進朝夕滿堂十四年羣臣上言古者肉刑嚴重則人畏法令今憲律輕薄故姦軌不勝左傳曰凡亂在外為姦在内為軌宜增科禁以防其源詔下公卿林奏曰夫人情挫辱則義節之風損法防繁多則茍免之行興孔子曰導之以政齊之以刑民免而無恥導之以徳齊之以禮有恥且格皆論語之言也政謂禁令刑謂刑罰格来也言為政之法初訓導之以禁令若有違則整齊之以刑罰則人但免罪而已而無恥慙之心若教導之以道徳整齊之以禮義則人皆有耻慙之心且皆来服古之眀王深識遠慮動居其厚不務多辟周之五刑不過三千五刑謂墨劓剕宮大辟也尚書呂刑篇曰五刑之屬三千大漢初興詳覽失得故破矩為圓斵彫為樸蠲除苛政更立疏網史記曰漢興破觚而為圓斵彫而為樸號為網漏吞舟之魚觚亦方也老子曰天網恢恢疏而不漏海内歡欣人懷寛徳及至其後漸以滋章吹毛索疵詆欺無限老子曰法令滋章盗賊多有前書曰有司吹毛求疵索求也詆欺謂飾非成釁非其本罪果桃菜茹之饋集以成臧小事無妨於義以為大戮故國無㢘士家無完行至於法不能禁令不能止上下相遁為敝彌深遁猶回避也前書曰上下相匿以文避法焉臣愚以為宜如舊制不合翻移帝從之後皇太子彊求乞自退封東海王故重選官屬以林為王傅從駕南廵狩時諸王傅數被引命或多交逰不得應詔唯林守愼有召必至餘人雖不見譴而林特受賞賜又辭不敢受帝益重之東觀記曰王又以師數加饋遺林不敢受常辭以道上稟假有餘若以車重無所置之明年代丁恭為少府恭字子然山陽人在儒林傳二十二年復為光祿勲頃之代朱浮為大司空博雅多通稱為任職相明年薨帝親自臨喪送葬除子喬為郎詔曰公侯子孫必復其始左氏傳晉大夫辛膠之言賢者之後宜宰城邑其以喬為丹水長丹水縣屬南陽論曰夫威彊以自禦力損則身危飾詐以圖已詐窮則道屈而忠信篤敬蠻貊行焉者誠以德之感物厚矣論語曰子張問行子曰言忠信行篤敬雖蠻貊之邦行矣故趙孟懷忠匹夫成其仁趙孟晋大夫趙盾也左傳曰晉靈公不君趙盾驟諌之靈公患焉使鉏麑賊之晨往寢門闢矣盛服將朝尚早坐而假寐麑退而言曰不忘恭敬民之主也賊民之主不忠棄君之命不信有一於此不如死也觸槐而死趙盾遂得全論語曰有殺身以成仁無求生以害仁杜林行義烈士假其命易曰人之所助者順有不誣矣易繫辭曰天之所助者信人之所助者順不誣言必蒙天人之助也郭丹傳郭丹字少卿南陽穰人也父稚成帝時為廬江太守有清名丹七歳而孤小心孝順後母哀憐之為鬻衣裝買産業鬻賣也後從師長安買符入函谷闗符即繻也前書音義曰舊出入闗皆用傳傳煩因裂繻帛分持後復出合之以為符信買符非眞符也東觀記曰丹從宛人陳洮買入闗符既入關封符乞人也乃慨然歎曰丹不乗使者車終不出關續漢志曰諸侯使車皆朱班輪四輻赤衡軛旣至京師常為都講諸儒咸敬重之大司馬嚴尤請丹辭病不就王莽又徴之遂與諸生逃於北地更始二年三公舉丹賢能徴為諌議大夫持節使歸南陽安集受降丹自去家十有二年果乘髙車出闗如其志焉更始敗諸將悉歸光武並獲封爵丹獨保平氏不下為更始發喪衰絰盡哀喪服斬衰裳上曰衰下曰裳麻在首要皆曰絰首絰象緇布冠要絰象大帶絰之言實衰之言摧明中實摧痛也平氏縣名屬南陽郡建武二年遂潛逃去敝衣間行渉歴險阻求謁更始妻子奉還節傳因歸鄉里太守杜詩請為功曹丹薦鄉人長者自代而去詩乃歎曰昔明王興化卿士讓位毛萇詩傳曰虞芮之君爭田相謂曰西伯仁人也盍往質焉乃相與朝周至其朝士讓為大夫大夫讓為卿二國君乃慙而退今功曹推賢可謂至徳勑以丹事編署黄堂以為後法黄堂太守之㕔事十三年大司馬呉漢辟舉髙第再遷并州牧有清平稱轉使匃奴中郎將遷左馮翊永平三年代李訢為司徒在朝㢘直公正與侯霸杜林張湛郭伋齊名相善眀年坐考隴西太守鄧融事無所據䇿免五年卒於家時年八十七以河南尹范遷有清行代為司徒遷字子廬沛國人初為漁陽太守以智略安邊匃奴不敢入界及在公輔有宅數畝田不過一頃復推與兄子其妻嘗謂曰君有四子而無立錐之地史記楚優孟曰孫叔敖子無立錐之地可餘奉祿以為後世業遷曰吾備位大臣而蓄財求利何以示後世在位四年薨家無擔石焉後顯宗因朝㑹問群臣郭丹家今何如宗正劉匡對曰昔孫叔敖相楚馬不秣粟妻不衣帛子孫竟蒙寢邱之封孫叔敖楚莊王之相也期思縣人史記曰楚之處士虞邱相進之相楚上下和合吏無姦邪遂霸諸侯吕覽曰叔敖將死戒其子曰王數封我矣吾不受也我死王則封汝必無受利地楚越之間有寢邱者此其地不利而名甚惡可長有者唯此也孫叔敖死王以羙地封其子其子辭請寝邱至今不失寢邱縣名後漢改為固始今光州固始縣也有孫叔敖祠焉丹出典州郡入為三公而家無遺産子孫困匱帝乃下南陽訪求其嗣長子宇官至常山太守少子濟趙相呉良傳吳良字大儀齊國臨淄人也初為郡吏東觀記曰良為郡議曹掾歳旦與掾史入賀門下掾王望舉觴上壽謟稱太守功徳東觀記曰王望言曰齊郡敗亂遭離盗賊不聞雞鳴犬吠之音明府視事五年土地開闢盗賊滅息五穀豐熟家給人足今日歳首請上雅壽掾史皆稱萬歳良於下坐勃然進曰望佞邪之人欺謟無狀願勿受其觴東觀記曰良時跪曰門下掾佞謟明府勿受其觴盜賊未盡人庶困乏今良曹掾尚無絝望曰議曹惰窳自無絝寧足為不家給人足邪太守曰此生言是賜良鰒魚百枚也太守歛容而止讌罷轉良為功曹恥以言受進終不肯謁時驃騎將軍東平王蒼聞而辟之署為西曹蒼甚相敬愛上疏薦良曰臣聞為國所重必在得人報恩之義莫大薦士竊見臣府西曹掾齊國吳良資質敦固公方廉恪躬儉安貧白首一節言雖耆耄志節不衰又治尚書學通師法東觀記曰良習大夏侯尚書經任博士行中表儀宜備宿衛以輔聖政臣蒼榮寵絶矣憂責深大絶猶極也私慕公叔同升之義懼於臧文竊位之罪公叔文子衛大夫公孫拔之謚也文子家臣名僎操行與文子同文子乃升進之於公與之同為大夫臧文仲魯大夫臧孫辰也時栁下惠為士師文仲知其賢而不進達之孔子譏之曰臧文仲其竊位者與知柳下之賢而不與立事並見論語也敢秉愚瞽犯冒嚴禁顯宗以示公卿曰前以事見良鬚髮皓然衣冠甚偉夫薦賢助國宰相之職蕭何舉韓信設壇而拜不復考試蕭何薦韓信于髙祖曰陛下必欲爭天下非信無可與計者漢王於是設壇塲拜信為大將軍見前書今以良為議郎永平中車駕近出而信陽侯隂就干突禁衛車府令徐匡鉤就車收御者送獄鉤留也詔書譴匡匡乃自繫良上言曰信陽侯就倚恃外戚干犯乗輿無人臣禮為大不敬匡執法守正反下於理臣恐聖化由是而弛弛廢也帝雖赦匡猶左轉良為即邱長即邱縣名屬東海郡即左氏傳之祝邱也故城在今沂州臨沂縣東南後遷司徒長史哀帝改丞相為大司徒司直仍舊中興因之不改建武十一年省司直置長史每處大議輙據經典不希㫖偶俗以徼時譽希猶瞻望也後坐事免復拜議郎卒於官承宫傳承宫字少子世本承姓衛大夫成叔承之後也琅邪姑幕人也少孤年八歳為人牧豕鄉里徐子盛者以春秋經授諸生數百人宫過息廬下樂其業因就聽經遂請留門下續漢書曰宫過徐子盛好之因棄其豬而留聽經豬主怪其不還求索得宫欲笞之門下生共禁止因留之為諸生拾薪執苦數年勤學不倦續漢書曰宮嘗出行得虎所殺鹿持歸肉分門下取皮上師師不受宫因棄之人問其故宫曰既已與人義不可復取經典既眀乃歸家教授遭天下喪亂遂將諸生避地漢中後與妻子之䝉隂山䝉隂縣名屬太山郡有蒙山在今沂州新泰縣東南肆力耕種禾黍將熟人有認之者宫不與計推之而去由是顯名三府更辟皆不應三府謂太尉司徒司空府永平中徵詣公車車駕臨辟雍召宫拜博士遷左中郎將數納忠言陳政論議切慤朝臣憚其節名播匃奴時北單于遣使求得見宫顯宗勑自整飾宫對曰夷狄眩名非識實者也臣狀醜不可以示逺宜選有威容者續漢書曰夷狄聞臣虚稱故欲見臣臣醜陋形寢不如選長大有威容者示之也帝乃以大鴻臚魏應代之十七年拜侍中祭酒建初元年卒肅宗褒歎賜以冡地妻上書乞歸葬鄉里復賜錢三十萬續漢書曰宫子疊官至濟隂太守鄭均傳鄭均字仲虞東平任城人也少好黄老書兄為縣吏東觀記曰兄仲為縣游徼頗受禮遺均數諌止不聼則脫身為傭歳餘得錢帛歸以與兄曰物盡可復得為吏坐臧終身捐棄兄感其言遂為㢘潔均好義篤實養寡嫂孤兒恩禮敦至東觀記曰均失兄養孤兒兄子甚篤已冠娶妻出令别居並門盡推財與之使得一尊其母然後隨䕶視賑給之常稱疾家庭不應州郡辟召郡將欲必致之使縣令譎將詣門譎詐也既至卒不能屈均於是客於濮陽濮陽今濮州縣建初三年司徒鮑昱辟之後舉直言並不詣六年公車特徴再遷尚書數納忠言肅宗敬重之後以病乞骸骨拜議郎告歸因稱病篤帝賜以衣冠東觀記曰均遣子英奉章詣闕詔召見英問均所苦賜以冠幘錢布元和元年詔告廬江太守東平相曰以毛義廬江人鄭均東平人故告二郡守相也議郎鄭均束修安貧恭儉節整前在機密以病致仕守善貞固黄髮不怠又前安邑令毛義躬履遜讓比徴辭病淳潔之風東州稱仁書不云乎章厥有常吉哉章眀也吉善也言為天子當眀顯其有常徳者優其禀餼則政之善也尚書咎繇謨之言其賜均義榖各千斛常以八月長吏存問賜羊酒顯茲異行東觀記曰賜羊一頭酒二斗終其身問遺賢良必以八月諸物老成故順其時氣助養育之也故月令仲秋之月養衰老授几杖行糜粥飲食鄭𤣥注云助老氣也眀年帝東廵過任城乃幸均舍勑賜尚書祿以終其身續漢志曰尚書秩六百石祿毎月七十石時人號為白衣尚書永元中卒于家趙典傳趙典字仲經蜀郡成都人也父戒為太尉謝承書曰典太尉戒之叔子也桓帝立以定䇿封厨亭侯典少篤行隱約𨼆猶靜也約儉也博學經書弟子自遠方至謝承書曰典學孔子七經河圖洛書内外藝術靡不貫綜受業者百有餘人建和初四府表薦四府太尉司徒司空大將軍府也謝承書曰典性眀達志節清亮益州舉茂才以病辭太尉黄瓊胡廣舉有道方正皆不應桓帝公車徴對䇿為諸儒之表徵拜議郎侍講禁内再遷為侍中時帝欲廣開鴻池典諌曰鴻池汎溉已且百頃猶復増而深之非所以崇唐虞之約己遵孝文之愛人也帝納其言而止墨子曰堯舜堂髙三尺土階三等茅茨不剪采椽不斵飯土簋歠土鉶糲粱之飯藜藿之羮夏日葛衣冬日鹿裘是約己也文帝嘗欲作露臺召匠計之曰直百金帝曰百金中人十家之産何以臺為宮室苑囿無所増益有不便輙㢮以利人是愛人也父卒襲封出為𢎞農太守轉右扶風公事去官徴拜城門校尉轉將作大匠遷少府又轉大鴻臚時恩澤諸侯以無勞受封羣臣不悅而莫敢諌典獨奏曰夫無功而賞勞者不勸上忝下辱亂象干度左傳曰國無政不用善則自取謫於日月之災故政不可不愼務三而已一曰擇人二曰因人三曰從時前書曰成帝時同日封王氏五侯其日天氣赤黄霧四塞哀帝封丁傅日亦然是不用善人則亂象干度且髙祖之誓非功臣不封史記功臣侯表曰髙祖與功臣約曰非劉氏不王非有功不侯不如是天下共擊之宜一切削免爵土以存舊典帝不從頃之轉太僕遷太常朝廷每有灾異疑議輙諮問之謝承書曰天子宗典道懿尊為國師位特進七為列卿寢布被食用瓦器也典據經正對無所曲折每得賞賜輙分與諸生之貧者後以諌争違旨免官就國㑹帝崩時禁藩國諸侯不得奔弔典慨然曰身從衣褐之中致位上列褐織毛布之衣貧者所服且烏鳥反哺報徳况於士邪小爾雅曰純黒而反哺者謂之烏春秋元命包曰烏孝鳥也遂解印綬符䇿付縣而馳到京師州郡及大鴻臚並執處其罪而公卿百寮嘉典之義表請以租自贖詔書許之再遷長樂少府衛尉公卿復表典篤學博聞宜備國師㑹病卒謝承書曰靈帝即位典與竇武王暢陳蕃等謀共誅中常侍曹節侯覽趙忠等皆下獄自殺不言病卒使者弔祠竇太后復遣使兼贈印綬諡曰獻侯典兄子謙謙弟温相繼為三公謙字彦信初平元年代黄琬為太尉獻帝遷都長安以謙行車騎將軍文劉攽曰案少一事字為前置眀年病罷復為司隸校尉車師王侍子為董卓所愛數犯法謙收殺之卓大怒殺都官從事而素敬憚謙故不加罪轉為前將軍遣擊白波賊有功封郫侯郫音盤眉反李傕殺司徒王允復代允為司徒數月病免拜尚書令是年卒謚曰忠侯温字子柔初為京兆郡丞前書三輔丞武帝元鼎四年置秩六百石歎曰大丈夫當雄飛安能雌伏遂棄官去遭歳大飢散家糧以賑窮餓所活萬餘人獻帝西遷都為侍中同輿輦至長安封江南亭侯代楊彪為司空免頃之復為司徒錄尚書事時李傕與郭氾相攻傕遂虜掠禁省劫帝幸北塢外内隔絶傕素疑溫不與己同乃内溫於塢中又欲移乗輿於黄白城温與傕書曰公前託為董公報讐然實屠陷王城殺戮大臣天下不可家見而戸説也今與郭氾爭睚眥之隙以成千鈞之讐睚眥解見竇融傳三十斤為鈞言其重人在塗炭各不聊生曾不改悟遂成禍亂朝廷仍下眀詔欲令和解上命不行威澤日損而復欲移轉乗輿更幸非所此誠老夫所不達也於易一為過再為渉三而弗改滅其頂凶滅没也周易大過上六曰過渉滅頂凶王弼曰處大過之極過之甚者也渉難過甚故至於滅頂凶也不如早共和解引軍還屯上安萬乗下全人民豈不幸甚傕大怒欲遣人殺溫董卓從弟應溫故掾也諌之數日乃獲免溫從車駕都許建安十三年以辟司空曹操子丕為掾操怒奏溫辟忠臣子弟選舉不實免官是歳卒年七十二贊曰宣鄭二王奉身清方杜林據古張湛矜莊典以義黜謂棄郡奔喪以租贖罪也官由徳揚大儀鵠髮見表憲王鵠髮白髮也少卿致仕終乗髙箱後漢書卷五十七後漢書卷五十七考證吳良傳私慕公叔同升之義注公叔文子衛大夫公孫拔之諡也拔字監本誤作枝今從宋本作拔臣㑹汾按毛竒齡論語稽求篇曰公叔文子名公叔發注疏古本孔安國注作公叔拔此據世本衛獻公孫公叔拔若公孫枝是秦大夫字子桑秦穆公時臣非文子矣相傳明代國學生有罰修十三經注疏壊板者以枝拔形相近隂改拔作枝以傅㑹朱註至今莫辨今此傳注宋本尚作拔竒齡之言益信而有徴矣後漢書卷五十七考證
