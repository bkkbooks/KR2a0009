body:
  text: 後漢書卷六宋宣城太守范煜撰唐章懷太子賢注順冲質帝紀第六孝順皇帝諱保諡法曰慈和徧服曰順伏侯古今注曰保之字曰守安帝之子也母李氏為閻皇后所害永寜元年立為皇太子延光三年安帝乳母王聖大長秋江京前書曰長秋皇后官本秦官將行也景帝更名大長秋或用中人或用士人秩二千石中興常用宦者中常侍樊豐譖太子乳母王男厨監邴吉殺之太子數為歎息王聖等懼有後禍遂與豐京共搆陷太子太子坐廢為濟陰王明年三月安帝崩北鄉侯立濟陰王以廢黜不得上殿親臨梓宮悲號不食内外羣僚莫不哀之及北鄉侯薨車騎將軍閻顯及江京與中常侍劉安陳逹等白太后祕不發喪而更徵立諸國王子乃閉宮門屯兵自守十一月丁巳京師及郡國十六地震是夜中黄門孫程等十九人十九人見孫程傳共斬江京劉安陳逹等迎濟陰王於德陽殿西鍾下漢官儀曰崇賢門内德陽殿也即皇帝位年十一近臣尚書以下從輦到南宮登雲臺召百官尚書令劉光等奏言孝安皇帝聖德明茂早棄天下陛下正統當奉宗廟而姦臣交搆遂令陛下龍潛蕃國從太子廢為王故曰龍潛蕃國羣僚逺近莫不失望天命有常北鄉不永漢德盛明福祚孔章孔甚也章明也近臣建策左右扶翼内外同心稽合神明陛下踐阼奉遵鴻緒為郊廟主承續祖宗無窮之烈上當天心下厭民望而即位倉卒典章多缺請條案禮儀分别具奏制曰可乃召公卿百僚使虎賁羽林士屯南北宮諸門漢官儀曰書稱虎賁三百人言其猛怒如虎之奔赴也孝武建元三年初置期門平帝元始元年更名虎賁郎又武帝太初元年初置建章營騎後更名羽林以天有羽林之星故取名焉又取從軍死士之子孫養羽林官敎以五兵號曰羽林孤兒光武中興以征伐之士勞苦者為之故曰羽林士閻顯兄弟聞帝立率兵入北宮尚書郭鎮與交鋒刃遂斬顯弟衞尉景戊午遣使者入省奪得璽綬乃幸嘉德殿遣侍御史持節收閻顯及其弟城門校尉耀執金吾晏竝下獄誅已未開門罷屯兵壬戌詔司隸校尉惟閻顯江京近親當伏辜誅其餘務崇寛貸壬申謁高廟癸酉謁光武廟乙亥詔益州刺史罷子午道通襃斜路子午道平帝時王莾通之三秦記曰子午長安正南山名秦嶺谷一名樊川襃斜漢中谷名南谷名襃北谷名斜首尾七百里己夘𦵏少帝以諸王禮司空劉授免東觀記曰以阿附惡逆辟召非其人策罷賜公卿以下錢榖各有差十二月甲申以少府河南陶敦為司空敦字文理京縣人也其令郡國守相視事劉攽曰案他處上有詔語則下有其令云云無有特出其字者明多此字未滿歳者一切得舉孝廉吏漢法視事滿歳乃得舉今帝新即位施恩惠雖未滿歳得令舉人癸夘尚書奏請下有司收還延光三年九月丁酉以皇太子為濟隂王詔書奏可京師大疫辛亥詔公卿郡守國相舉賢良方正能直言極諫之士各一人尚書令以下從輦幸南宮者皆増秩賜布各有差永建元年春正月甲寅詔曰先帝聖德享祚未永早棄鴻烈姦慝縁間人庶怨讟上干和氣疫癘為災朕奉承大業未能寜濟蓋至理之本稽𢎞德惠蕩滌宿惡與人更始其大赦天下賜男子爵人二級為父後三老孝悌力田人三級流民欲自占者一級鰥寡孤獨篤癃貧不能自存者粟人五斛貞婦帛人三匹坐法當徙勿徙亡徒當傳勿傳徒囚逃亡當傳捕者放之勿捕宗室以罪絶皆復屬籍其與閻顯江京等交通者悉勿考勉修厥職以康我民辛未皇太后閻氏崩辛巳太傅馮石太尉劉熹司徒李郃免馮石字次初東觀記曰溤劉以阿黨權貴李郃以人多疾疫免二月甲申𦵏安思皇后丙戌太常桓焉為太傅大鴻臚朱寵為太尉參錄尚書事長樂少府九江朱倀為司徒朱寵字仲威京兆杜陵人朱倀字孫卿壽春人也倀音丑良反賜百官隨輦宿衞及拜除者布各有差劉攽曰案文云及拜除者隨輦宿衞乃是賞功拜除者未知何謂蓋傳寫之誤當云賜百官隨輦宿衞拜除者布各有差拜除謂已遷升其官布又加賜明衍一及字也隴西鍾羌叛護羌校尉馬賢討破之夏五月丁丑詔幽并涼州刺史使各實二千石以下至黄綬實謂騐實之也二千石太守也黄綬丞尉也前書曰比二百石以上銅印黄綬年老劣弱不任軍事者上名嚴勑障塞繕設屯備立秋之後簡習戎馬六月己亥封濟南王錯子顯為濟南王秋七月庚午衛尉來歴為車騎將軍八月鮮卑寇代郡代郡太守李超戰殁九月辛亥初令三公尚書入奏事冬十月辛巳詔減死罪以下徙邉其亡命贖各有差丁亥司空陶敦免鮮卑犯邉庚寅遣黎陽營兵出屯中山北界告幽州刺史其令縁邊郡増置歩兵列屯塞下調五營弩師郡舉五人令教習戰射調選也五營五校也謂長水歩兵射聲胡騎車騎等五校尉也劉攽曰正文案調五營弩師何為更言舉明此舉字是與字一郡與五人教習也又注案此五校之名大誤檢百官志有屯騎越騎歩兵長水射聲今此誤云胡騎車騎當改胡作屯車作越且二漢冇車騎將軍及騎都尉官耳無車騎校尉也又胡騎中興長水矣所以知非章懐之誤者安紀永初三年注五校引用漢官儀甚明壬寅廷尉張皓為司空甲辰詔以疫癘水潦令人半輸今年田租傷害什四以上勿收責不滿者以實除之十二月辛巳賜王主貴人公卿以下布各有差二年春正月戊申樂安王鴻來朝丁卯常山王章薨二月鮮卑寇遼東𤣥莵甲辰詔禀貸荆豫兗冀四州流冗貧人所在安業之疾病致醫藥䕶烏桓校尉耿曄率南單于擊鮮卑破之三月旱遣使者録囚徒䟽勒國遣使奉獻夏六月乙酉追尊諡皇妣李氏為恭愍皇后𦵏于恭北陵西域長史班勇敦煌太守張朗討焉耆尉犂危須三國破之竝遣子貢獻秋七月甲戌朔日有食之壬午太尉朱寵司徒朱倀罷庚子太常劉光為太尉錄尚書事光祿勳許敬為司徒劉光字仲遼即太尉劉矩之弟許敬字鴻卿平輿人辛丑下邳王成薨三年春正月丙子京師地震漢陽地陷裂甲午詔實覈傷害者賜年七歳以上錢人二千一家被害郡縣為收斂乙未詔勿收漢陽今年田租口賦夏四月癸夘遣光禄大夫案行漢陽及河内魏郡陳留東郡稟貸貧人六月旱遣使者錄囚徒理輕繫甲寅濟南王顯薨秋七月丁酉茂陵園寢災帝縞素避正殿爾雅曰縞皓也繒之精白者曰縞辛亥使太常王龔持節告祠茂陵九月鮮卑寇漁陽冬十二月己亥太傅桓焉免東觀記曰無清介辟召䇿罷是歳車騎將軍來歴罷四年春正月丙寅詔曰朕託王公之上渉道日寡政失厥中陰陽氣隔寇盜肆暴庶獄彌繁憂悴永歎疢如疾首詩云君子如祉亂庶遄已解見章紀三朝之㑹朔旦立春嘉與海内洗心自新其赦天下從甲寅赦令已來復秩屬籍三年正月已來還贖其閻顯江京等知識婚姻禁錮一原除之妻父曰婚壻父曰姻一猶皆也務崇寛和敬順時令遵典去苛以稱朕意丙子帝加元服冠也賜王主貴人公卿以下金帛各有差賜男子爵及流民欲占者人一級為父後三老孝悌力田人二級鰥寡孤獨篤癃貧不能自存帛人一匹二月戊戌詔以民入山鑿石發洩藏氣勑有司檢察所當禁絶如建武永平故事夏五月壬辰詔曰海内頗有災異朝廷修政太官減膳珍玩不御而桂陽太守文礱音力公反不惟竭忠宣暢本朝而逺獻大珠以求幸媚今封以還之五州雨水秋八月庚子遣使實覈死亡收斂稟賜丁巳太尉劉光司空張皓免東觀記曰以陰陽不和乆託病䇿罷九月復安定北地上郡歸舊土安帝永初五年徙今復之癸酉大鴻臚龎參為大尉錄尚書事太常王龔為司空冬十一月庚辰司徒許敬免東觀記曰為陵轢使官策罷二千石禄終身劉攽曰注陵轢使官案文官當作者鮮卑宼朔方十二月乙夘宗正劉崎為司徒崎字叔峻華隂人也是歳分㑹稽為吳郡拘彌國遣使貢獻五年春正月疏勒王遣侍子及大宛莎車王皆奉使貢獻夏四月京師旱辛巳詔郡國貧人被災者勿收責今年過更京師及郡國十二蝗冬十月丙辰詔郡國中都官死罪繫囚皆減罪一等詣北地上郡安定戌乙亥定逺侯班始坐殺其妻隂城公主腰斬始班超孫也尚順帝姑隂城公主東觀記曰隂城公主名賢得同產皆棄市六年春二月庚午河間王開薨三月辛亥復伊吾屯田章帝建初二年罷也復置伊吾司馬一人秋九月辛巳繕起太學護烏桓校尉耿曄遣兵擊鮮卑破之丁酉于闐王遣侍子貢獻冬十一月辛亥詔曰連年災潦冀部尤甚比蠲除實傷贍恤窮匱而百姓猶有棄業流亡不絶疑郡縣用心怠惰恩澤不宣易羙損上益下書稱安民則惠易益卦曰損上益下人説無疆恵愛也尚書曰安人則惠黎人懷之其令冀部勿收今年田租芻槀十二月日南徼外葉調國撣國遣使貢獻東觀記曰葉調國王遣使師㑹詣闕貢獻以師㑹為漢歸義葉調邑君賜其君紫綬及撣國王雍由亦賜金印紫綬撣音擅壬申客星出牽牛于闐王遣侍子詣闕貢獻陽嘉元年春正月乙巳立皇后梁氏賜爵人二級三老孝悌力田三級爵過公乘得移與子若同產同產子民無名數及流民欲占著者人一級鰥寡孤獨篤癃貧不能自存者粟人五斛二月海賊曽旌等寇會稽殺句章鄞鄮三縣長三縣皆屬會稽郡鄮縣今越州縣也句章故城在今鄮縣西鄞故城在鄮縣東南鄞音銀鄮音茂攻會稽東部都尉詔縁海縣各屯兵戌丁巳皇后謁髙廟光武廟詔稟甘陵貧人大小口各有差京師旱庚申勑郡國二千石各禱名山嶽瀆遣大夫謁者詣嵩高首陽山并祠河洛請雨首陽山在洛陽東北戊辰雩以冀部比年水潦民食不贍詔案行稟貸勸農功賑乏絶甲戌詔曰政失厥和隂陽隔并冬鮮宿雪春無澍雨分禱祈請靡神不禜説文曰禜設緜蕞為營以祈水旱禜音詠詩曰靡神不舉深恐在所慢違如在之義論語曰祭神如神在今遣侍中王輔等持節分詣岱山東海滎陽河洛盡心祈焉濟水四瀆之一至河南溢為滎澤故於滎陽祠焉三月揚州六郡妖賊章河等寇四十九縣殺傷長吏庚寅帝臨辟雍饗射大赦天下改元陽嘉詔宗室絶屬籍者一切復籍稟冀州尤貧民勿收今年更租口賦夏五月戊寅阜陵王恢薨秋七月史官始作候風地動銅儀時張衡為太史令作之丙辰以太學新成試明經下第者補弟子増甲乙科員各十人前書音義曰甲科謂作簡䇿難問列置案上任試者意投射取而答之謂之射策上者為甲次者為乙若錄政化得失顯而問之謂之對策也除郡國耆儒九十人補郎舍人九月詔郡國中都官繫囚皆減死一等亡命者贖各有差鮮卑寇遼東冬十一月甲申望都蒲隂狼殺女子九十七人望都縣名屬中山國今定州縣也章帝改曲逆為蒲隂亦屬中山與望都相近故城在今定州北東觀記亦作蒲本多作滿滿字者誤也東觀又云為不祠北岳所致詔曰政失厥中狼災為應至乃殘食孤幼博訪其故山岳尊靈國所望秩而比不奉祠淫刑放濫害加孕婦也劉攽曰注本多作滿滿字者誤案文多一滿字詔賜狼所殺者錢人三千辛夘初令郡國舉孝廉限年四十以上諸生通章句文史能牋奏乃得應選其有茂才異行若顔淵子竒不拘年齒史記曰顔回魯人好學年二十九髮盡白早死新序曰子竒年十八齊君使之化阿至阿鑄其庫兵以為耕器出倉廩以賑貧窮阿縣大化十二月丁未東平王敞薨庚戌復置𤣥菟郡屯田六郡閏月丁亥令諸以詔除為郎年四十以上課試如孝廉科者得參廉選歳舉一人戊子客星出天苑辛夘詔曰間者以來吏政不勤故災咎屢臻盜賊多有退省所由皆以選舉不實官非其人是以天心未得人情多怨書歌肱股詩刺三事尚書益稷篇帝作歌曰元首明哉股肱良哉詩小雅曰三事大夫莫肯夙夜邦君諸侯莫肯朝夕也今刺史二千石之選歸任三司三司三公也即太尉司空司徒也歸猶委任也其簡序先後情覈高下歳月之次文武之宜務存厥衷庚子恭陵百丈廡災恭陵安帝陵也廡廊屋也説文曰堂下周屋曰廡也是歳起西苑修飾宮殿二年春二月甲申詔以吳郡㑹稽饑荒貸人種糧三月使匈奴中郎將王稠率左骨都侯等擊鮮卑破之辛酉除京師耆儒年六十以上四十八人補郎舍人及諸王國郎夏四月復置隴西南部都尉官武帝元朔四年初置南部都尉於隴西臨洮縣中興以來廢至此復置之也己亥京師地震五月庚子詔曰朕以不德統奉鴻業無以奉順乾坤協序隂陽災眚屢見咎徵仍臻地動之異發自京師矜矜祗畏不知所裁羣公卿士將何以匡輔不逮奉答戒異異不空設必有所應其各悉心直言厥咎靡有所諱戊午司空王龔免六月辛未太常魯國孔扶為司空扶字仲淵疏勒國獻師子封牛東觀記曰疏勒王盤遣使文時詣闕師子似虎正黃有􅐖耏尾端茸毛大如斗封牛其領上肉隆起若封然因以名之即今之峯牛丁丑洛陽地陷是月旱秋七月己未太尉龎參免八月己巳大鴻臚沛國施延為太尉延字君子蘄縣人也鮮卑寇代郡冬十月庚午行禮辟雍奏應鍾始復黄鍾作樂器隨月律子為黄鍾律長九寸聲有輕重長短度量皆出黄鍾隨月律謂月令正月律中太蔟二月律中夾鍾三月律中姑洗四月律中仲呂五月律中㽔賓六月律中林鍾七月律中夷則八月律中南呂九月律中無射十月律中應鍾十一月律中黄鍾十二月律中大呂東觀記曰元和以來音戾不調復修如舊典蔟音湊三年春二月己丑詔以久旱京師諸獄無輕重皆且勿考竟須得澍雨三月庚戌益州盜賊劫質令長殺列侯夏四月丙寅車師後部司馬率後部王加特奴等掩擊匈奴大破之獲其季母五月戊戌制詔曰昔我太宗丕顯之徳假于上下儉以恤民政致康乂朕秉事不明政失厥道天地譴怒大變仍見春夏連旱寇賊彌繁元元被害朕甚愍之嘉與海内洗心更始其大赦天下自殊死以下謀反大逆諸犯不當得赦者皆赦除之賜民年八十以上米人一斛肉二十斤酒五斗九十以上加賜帛人二匹絮三斤秋七月庚戌鍾羌寇隴西漢陽冬十月護羌校尉馬續擊破之十一月壬寅司徒劉崎司空孔扶免乙巳大司農南郡黄尚為司徒光祿勲河東王卓為司空黄尚字伯河南郡邔人也王卓字仲遼河東觧人也邔音求紀反丙午武都塞上屯羌及外羌攻破屯官驅畧人畜四年春二月丙子初聽中官得以養子為後世襲封爵自去冬旱至于是月謁者馬賢擊鍾羌大破之夏四月甲子太尉施延免東觀記曰以選舉貪汚策罷也戊寅執金吾梁商為大將軍前太尉龎參為太尉六月己未梁王匡薨秋七月己亥濟北王登薨閏月丁亥朔日有食之冬十月烏桓寇雲中十一月圍度遼將軍耿曄於蘭池續漢志曰雲中郡沙南縣冇蘭池城發諸郡兵救之烏桓退走十二月甲寅京師地震永和元年春正月夫餘王來朝乙夘詔曰朕秉政不明災眚屢臻典籍所忌震食為重今日變方逺地摇京師東觀記曰陽嘉四年詔曰朕以不徳謫見於天零陵言日食京師不覺故此言日變方遠劉攽曰正文日變方遠案注引東觀記曰零陵言日食則是遠方也言方逺無理與注皆誤咎徴不虚必有所應羣公百僚其各上封事指陳得失靡有所諱己巳宗祀明堂登雲臺改元永和大赦天下秋七月偃師蝗冬十月丁亥承福殿火帝避御雲臺十一月丙子太尉龎參罷十二月象林蠻夷叛乙巳以前司空王襲為太尉二年春正月武陵蠻叛圍充縣又寇夷道充縣屬武陵郡故城在澧州崇義縣東北充音衝夷道屬南郡二月廣漢屬國都尉擊破白馬羌武陵太守李進擊叛蠻破之三月辛亥北海王翼薨乙夘司空王卓薨丁丑光祿勲馮翊郭䖍為司空䖍字君賢池陽人也夏四月丙申京師地震五月日南叛蠻攻郡府秋七月九真交阯二郡兵反八月庚子熒惑犯南斗熒惑火星也南斗北方之宿也前書音義曰犯謂七寸内光芒相及江夏盜賊殺邾長邾縣屬江夏郡故城在今復州竟陵縣東邾音朱冬十月甲申行幸長安所過鰥寡孤獨貧不能自存者賜粟人五斛庚子幸未央宮會三輔郡守都尉及官屬勞賜作樂十一月丙午祠高廟丁未遂有事十一陵丁夘京師地震十二月乙亥至自長安三年春二月乙亥京師及金城隴西地震二郡山岸崩地陷戊子太白犯熒惑夏四月九江賊蔡伯流寇郡界及廣陵殺江都長戊戌遣光祿大夫案行金城隴西賜壓死者年七歳以上錢人二千一家皆被害為收歛之除今年田租尤甚者勿收口賦閏月蔡伯流等率衆詣徐州刺史應志降續漢書曰志字仲節汝南南頓人也曽祖父順己酉京師地震五月吳郡丞羊珍反攻郡府太守王衡破斬之六月辛丑琅邪王遵薨九真太守祝良交阯刺史張喬慰誘日南叛蠻降之嶺外平續漢書曰祝良字邵卿長沙臨湘人秋七月丙戌濟北王多薨八月己未司徒黄尚免九月己酉光祿勲長沙劉壽為司徒壽字伯長臨湘人也丙戌令大將軍三公各舉故刺史二千石及見令長郎謁者四府掾屬剛毅武猛有謀謨任將帥者各二人特進卿校尉各一人冬十月燒當羌寇金城護羌校尉馬賢擊破之羌遂相招而叛十二月戊戌朔日有食之四年春正月庚辰中常侍張逵蘧政楊定等有罪誅事見梁商傳也連及𢎞農太守張鳳安平相楊皓下獄死三月乙亥京師地震夏四月癸夘護羌校尉馬賢討燒當羌大破之戊午大赦天下賜民爵及粟帛各有差五月戊辰封故濟北惠王壽子安為濟北王秋八月太原郡旱民庶流冗癸丑遣光祿大夫案行稟貸除更賦冬十月戊午校獵上林苑歴函谷關而還十一月丙寅幸廣成苑五年春二月戊申京師地震夏四月庚子中山王𢎞薨南匈奴左部句龍大人吾斯車紐等叛圍羙稷羙稷縣屬西河郡也五月度遼將軍馬續討吾斯車紐破之使匈奴中郎將陳龜迫殺南單于己丑晦日有蝕之且凍羌寇三輔殺令長且音子余反丁丑令死罪以下及亡命贖各有差九月令扶風漢陽築隴道塢三百所置屯兵辛未太尉王龔罷且凍羌寇武都燒隴關隴山之闗也今名大震關在今隴州汧源縣西也壬午太常桓焉為太尉丁亥徙西河郡居離石離石縣名在郡南五百九里西河本都平定縣至此徙於離石上郡居夏陽朔方居五原句龍吾期等東引烏桓西收羌胡寇上郡立車紐為單于冬十一月辛巳遣使匈奴中郎將張耽擊破之車紐降六年春正月丙子征西將軍馬賢與且凍羌戰於射姑山賢軍敗沒安定太守郭璜下獄死詔貸王侯國租一歳閏月鞏唐羌寇隴西遂及三輔二月丁巳有星孛於營室三月武都太守趙冲討鞏唐羌破之庚子司空郭䖍免丁巳河間王政薨丙午太僕趙戒為司空戒字志伯蜀郡成都人也夏五月庚子齊王無忌薨使匈奴中郎將張耽大破烏桓羌胡於天山東觀記曰耽將吏兵繩索相懸上通天山鞏唐羌寇北地秋七月甲午詔假民有貲者户錢一千八月丙辰大將軍梁商薨壬戌河南尹梁冀為大將軍九月諸種羌寇武威辛亥晦日有蝕之冬十月癸丑徙安定居扶風北地居馮翊十一月庚子以執金吾張喬行車騎將軍事將兵屯三輔漢安元年春正月癸巳宗祀明堂大赦天下改元漢安二月丙辰詔大將軍公卿舉賢良方正能探賾索隱者各一人賾幽深也索求也秋七月始置承華廐東觀記曰時以逺近獻馬衆多園廐充滿始置承華廐令秩六百石八月南匈奴左部大人句龍吾斯與薁鞬臺耆等反叛薁音於六反鞬音居言反丁夘遣侍中杜喬光祿大夫周舉守光祿大夫郭遵馮羡欒巴張綱周栩劉班等八人分行州郡班宣風化舉實臧否九月庚寅廣陵盜賊張嬰等寇郡縣冬十月辛未太尉桓焉司徒劉壽免甲戌行車騎將軍張喬罷劉攽曰案文少一事字十一月壬午司隸校尉趙峻為太尉大司農胡廣為司徒峻字伯師下邳徐人也癸夘詔大將軍三公選武猛試用有效騐任為將校者各一人是歳廣陵賊張嬰等詣太守張綱降二年春二月丙辰鄯善國遣使貢獻夏四月庚戌護羌校尉趙冲與漢陽太守張貢擊燒當羌於參䜌破之參䜌縣屬安定郡䜌音力全反六月乙丑熒惑犯鎮星丙寅立南匈奴守義王兠樓儲為南單于冬十月辛丑令郡國中都官繫囚殊死以下出縑贖各有差其不能入贖者遣詣臨羌縣居作二歳甲辰減百官奉丙午禁沽酒又貸王侯國租一歳閏月趙冲擊燒當羌於河陽破之河陽縣屬天水郡故城在今秦州隴城縣西北十一月使匈奴中郎將馬寔遣人刺殺句龍吾斯十二月揚徐盜賊攻燒城寺殺略吏民是歳涼州地百八十震建康元年春正月辛丑詔曰隴西漢陽張掖北地武威武都自去年九月已來地百八十震山谷坼裂壞敗城寺殺害民庶夷狄叛逆賦役重數内外怨曠惟咎歎息其遣光祿大夫案行宣暢恩澤惠此下民勿為煩擾三月庚子沛王廣薨領護羌校尉衞琚追討叛羌破之琚音居南郡江夏盜賊寇掠城邑州郡討平之夏四月使匈奴中郎將馬寔擊南匈奴左部破之於是胡羌烏桓悉詣寔降辛巳立皇子炳為皇太子改年建康大赦天下賜人爵各有差秋七月丙午清河王延平薨八月揚徐盜賊范容周生等寇掠城邑遣御史中丞馮赦督州郡兵討之庚午帝崩於玉堂前殿時年三十遺詔無起寢廟斂以故服珠玉玩好皆不得下論曰古之人君離幽放而反國祚者有矣莫不矯鑒前違審識情偽無忘在外之憂離遭也矯正也左傳曰晉侯在外十九年矣險阻艱難備嘗之矣人之情偽盡知之矣故能中興其業觀夫順朝之政殆不然乎何其傚僻之多與殆近也言順帝傚前之僻不能改正也孝冲皇帝諱炳諡法曰㓜少在位曰冲司馬彪曰冲㓜早夭故諡曰冲伏侯古今注曰炳之字曰明順帝之子也母曰虞貴人建康元年立為皇太子其年八月庚午即皇帝位年二歳尊皇后曰皇太后太后臨朝丁丑以太尉趙峻為太傳大司農李固為太尉參錄尚書事九月丙午𦵏孝順皇帝於憲陵在洛陽西十五里陵髙八丈四尺周三百步廟曰敬宗是日京師及太原鴈門地震三郡水涌土裂庚戌詔三公特進侯卿校尉舉賢良方正幽逸修道之士各一人百僚皆上封事己未九江太守丘騰有罪下獄死東觀記曰騰知罪法深大懷挾姦巧稽留道路下獄死揚州刺史尹耀九江太守鄧顯討賊范容等於歴陽軍敗耀顯為賊所殁冬十月日南蠻夷攻燒城邑交阯刺史夏方招誘降之壬申常山王儀薨己夘零陵太守劉康坐殺無辜下獄死十一月九江盜賊徐鳳馬勉等稱無上將軍攻燒城邑己酉令郡國中都官繫囚減死一等徙邊謀反大逆不用此令十二月九江賊黄虎等攻合肥是歳羣盜發憲陵護羌校尉趙冲追擊叛羌於鸇隂河戰殁凉州姑臧縣東南有鸇隂縣故城因水以為名永嘉元年春正月戊戌帝崩於玉堂前殿年三歳清河王蒜徵至京師孝質皇帝諱纘諡法忠正無邪曰質古今注曰纘之字曰繼肅宗𤣥孫曽祖父千乘貞王伉祖父樂安夷王寵父勃海孝王鴻母陳夫人冲帝不豫大將軍梁冀徴帝到洛陽都亭及冲帝崩皇太后與冀定策禁中丙辰使冀持節以王青葢車迎帝入南宮丁巳封為建平侯其日即皇帝位年八歳己未𦵏孝冲皇帝於懷陵在洛陽西北十五里伏侯古今注曰高四丈六尺周百八十三歩廣陵賊張嬰等復反攻殺堂邑江都長堂邑縣屬廣陵郡今揚州六合縣也九江賊徐鳳等攻殺曲陽東城長曲陽縣屬九江郡在淮曲之陽故城在今豪州定逺縣西北東城縣故城在定逺縣東南也甲申謁髙廟乙酉謁光武廟二月豫章太守虞續坐贓下獄死乙酉大赦天下賜人爵及粟帛各有差還王侯所削户邑彭城王道薨叛羌詣左馮翊梁竝降三月九江賊馬勉稱皇帝九江都尉滕撫討馬勉范容周生大破斬之東觀記曰傅勉頭及所𢃄玉印鹿皮冠黄衣詣洛陽詔懸夏城門外章示百姓夏四月壬申雩庚辰濟北王安薨丹陽賊陸宮等圍城燒亭寺丹陽太守江漢擊破之五月甲午詔曰朕以不德託母天下布政不明每失厥中自春渉夏大旱炎赫憂心京京爾雅曰京京憂也故得禱祈明祀劉攽曰案文云得無理當是復字冀蒙潤澤前雖得雨而宿麥頗傷比日隂雲還復開霽寤寐永歎重懷慘結寤覺也寐卧也詩曰寤寐永歎唯憂用老將二千石令長不崇寛和暴刻之為乎其令中都官繫囚罪非殊死考未竟者一切任出以須立秋任保也郡國有名山大澤能興雲雨者二千石長吏各絜齋請禱竭誠盡禮又兵役連年死亡流離或支骸不歛或停棺莫收朕甚愍焉昔文王𦵏枯骨人頼其德呂氏春秋曰周文王使人掘地得死人骸文王曰更𦵏之吏曰此無主文王曰有天下者天下之主今我非其主邪遂令吏以衣棺𦵏之天下聞之曰文王賢矣澤及枯骨又况人乎今遣使者案行若無家屬及貧無資者隨宜賜䘏以慰孤魂是月下邳人謝安應募擊徐鳳等斬之丙辰詔曰孝殤皇帝雖不永休祚而即位踰年君臣禮成孝安皇帝承襲統業而前世遂令恭陵在康陵之上先後相踰失其次序非所以奉宗廟之重垂無窮之制昔定公追正順祀春秋善之魯閔公立二年而薨次僖公立僖雖是閔庶兄然常為閔臣位次當在閔下後文公即位乃進僖公神位居閔之上左傳曰躋僖公逆祀也定公八年經書從祀先公從順也順祀謂退僖神位於閔下榖梁曰從祀先公貴正也其令恭陵次康陵憲陵次恭陵以序親秩為萬世法六月鮮卑寇代郡秋七月庚寅阜陵王代薨廬江盜賊攻尋陽又攻盱台音吁夷今楚州縣也滕撫遣司馬王章擊破之九月庚戌太傅趙峻薨冬十一月己丑南陽太守韓昭坐贓下獄死東觀記曰強賦一億五千萬檻車徵下獄丙午中郎將滕撫擊廣陵賊張嬰破之丁未中郎將趙序坐事棄市東觀記曰取錢縑三百七十五萬歴陽賊華孟自稱黒帝攻殺九江太守楊岑滕撫率諸將擊孟等大破斬之本初元年春正月丙申詔曰昔堯命四子以欽天道四子謂羲仲羲叔和仲和叔也書曰乃命羲和欽若昊天鴻範九疇休咎有象尚書曰天乃錫禹洪範九疇孔安國注云洪大也範法也疇類也言天與禹洛出書神龜負文而出列於背有數至於九禹遂因而第之以成九類其八日庶徵有休徵咎徵之應休羙也咎惡也徵騐也人君行善政則百榖用成家用平康是休徵也政有乖失則百榖用不成家用不寜是咎徵也休之與咎皆象人君之政故言休咎有象也象或作家夫瑞以和降異因逆感禁微應大前聖所重言君政純和則瑞氣降若逆時令則災異感所禁雖微其應乃大前聖所重即謂唐堯欽若昊天箕子休咎之應頃者州郡輕慢憲防競逞殘暴造設科條陷入無罪或以喜怒驅逐長吏恩阿所私罰枉仇隙至令守闕訴訟前後不絶送故迎新人離其害怨氣傷和以致災眚書曰明德慎罰眚過也明德慎罰尚書康誥之言方春東作育微敬始其勑有司罪非殊死且勿案騐以崇在寛言東作之時湏育養細微敬事之始禮記月令孟春之月無殺蟲胎夭飛鳥無麛無卵慶賜遂行無有不當書曰敬敷五敎在寛壬子廣陵太守王喜坐討賊逗遛下獄死二月庚辰詔曰九江廣陵二郡數離寇害殘夷最甚謂比年張嬰寇廣陵華孟寇九江也生者失其資業死者委尸原野昔之為政一物不得其所若已為之尚書一夫弗獲則曰時予之辜况我元元嬰此困毒方春戒節賑濟之戹掩骼埋胔之時月令孟春之月行慶施惠下及兆民又曰掩骼埋胔鄭𤣥注曰為死氣逆生氣也骨枯曰骼肉腐曰胔其調比郡見榖出稟窮弱收𦵏枯骸務加埋卹以稱朕意夏四月庚辰令郡國舉明經年五十以上七十以下詣太學自大將軍至六百石皆遣子受業歳滿課試以髙第五人補郎中次五人太子舍人又千石六百石四府掾屬三署郎四姓小侯先能通經者各令隨家法四府掾屬諸大將軍府掾屬二十九人太尉府掾屬二十四人司徒府三十一人司空府二十九人漢官左右中郎將皆秦官也比二千石三署郎皆屬焉三署謂五官署左右署也儒生為詩者謂之詩家禮者謂之禮家故言各随家法也四姓小侯解見明紀也劉攽曰注漢官左右中郎將案文少一儀字其髙第者上名牒當以次賞進五月庚寅徙樂安王為勃海王海水溢戊申使謁者案行收𦵏樂安北海人為水所漂没死者又稟給貧羸庚戌太白犯熒惑六月丁巳大赦天下賜民爵及粟帛各有差閏月甲申大將軍梁冀潛行鴆弑帝崩於玉堂前殿年九歳丁亥太尉李固免戊子司徒胡廣為太尉司空趙戒為司徒與梁冀參錄尚書事太僕袁湯為司空贊曰孝順初立時髦允集爾雅曰髦俊也郭璞注云士中之俊猶毛中之髦時張皓王龔龎參張衡李郃李固黄瓊之儔也匪砥匪革終淪嬖習砥礪也革改也淪沒也言順帝初升天位又羣賢總集不能因兹自礪改革前非而終溺於私嬖近習也謂封孫程等十九人為侯又詔中官養子聽襲封爵之類也保阿傳士后家世及保安也阿倚也言可依倚以取安傅姆之類也傅士謂阿母山陽君宋娥更相貨賂求增邑土也后家謂拜后父梁商為大將軍商薨仍拜子冀為大將軍弟不疑為河南尹冲天未識質弑以聰陵折在運天緒三終言陵遲夭折在於時運所以天之𦙍緒頻致三終也後漢書卷六後漢書卷六考證順帝紀宗祀明堂發雲臺何焯曰此靈臺也縁下避火雲臺而訛九月庚寅宋本無庚寅二字後漢書卷六考證
