body:
  text: 後漢書卷六十九宋宣城太守范煜撰唐章懐太子賢注劉趙淳于江劉周趙列傳第二十九孔子曰夫孝莫大於嚴父嚴父莫大於配天則周公其人也配天謂宗祀文王於明堂以配上帝子路曰傷哉貧也生無以養死無以𦵏子曰啜菽飲水孝也事見禮記啜音昌悅反廣雅云啜食也夫鐘鼓非樂云之本而器不可去論語孔子曰樂云樂云鐘鼓云乎哉言樂之所貴者移風易俗也非謂鐘鼓而已然而不可去鐘鼓去音丘呂反三牲非致孝之主而養不可廢孝經曰雖日用三牲猶為不孝言孝子者以和顔恱色為難也非謂三牲而已然不可闕甘㫖存器而亡本樂之遁也遁失也言盛飾鐘簴之器而忘移風之本是失樂之意也調器以和聲樂之成也崇養以傷行孝之累也不義而崇養更為親憂是孝之累也修已以致禄養之大也故言能大養則周公之祀致四海之祭言以義養則仲由之菽甘於東鄰之牲易曰東鄰殺牛不如西鄰之禴祭也夫患水菽之薄干禄以求養者是以恥禄親也干求也謂不以道求禄故可恥也存誠以盡行孝積而禄厚者此能以義養也中興廬江毛義少節家貧以孝行稱南陽人張奉慕其名往候之坐定而府檄適至以義守令檄召書也東觀記曰義為安陽尉府檄到當守令也義奉檄而入喜動顔色奉者志尚士也心賤之自恨来固辭而去及義母死去官行服數辟公府為縣令進退必以禮後舉賢良公車徵遂不至張奉歎曰賢者固不可測往日之喜乃為親屈也斯蓋所謂家貧親老不擇官而仕者也韓詩外傳曾子曰任重道逺不擇地而息家貧親老不擇官而仕建初中章帝下詔襃寵義賜穀千斛常以八月長吏問起居加賜羊酒壽終于家安帝時汝南薛包孟嘗好學篤行喪母以至孝聞及父娶後妻而憎包分出之包日夜號泣不能去至被歐杖不得已廬於舎外旦入而洒掃父怒又逐之乃廬於里門昬晨不廢積歲餘父母慙而還之後行六年服喪過乎哀既而弟子求分財異居包不能止乃中分其財奴婢引其老者曰與我共事久若不能使也田廬取其荒頓者頓猶廢也曰吾少時所理意所戀也器物取朽敗者曰我素所服食身口所安也弟子數破其産輙復賑給建光中公車特徵至拜侍中包性恬虚稱疾不起以死自乞有詔賜告歸加禮如毛義告請假也漢制吏病滿三月當免天子優賜其告使得帶印綬將官屬歸家養病謂之賜告也年八十餘以夀終若二子者推至誠以為行行信於心而感於人以成名受禄致禮斯可謂能以孝養也若夫江革劉般數公者之義行猶斯志也撰其行事著于篇自此已上並華嶠之詞也劉平傳王望王扶附劉平字公子楚郡彭城人也本名曠顯宗後改為平王莽時為郡吏守菑丘長菑丘縣屬彭城國政教大行其後每屬縣有劇賊輙令平守之所至皆理由是一郡稱其能更始時天下亂平弟仲為賊所殺其後賊復忽然而至平扶侍其母奔走逃難仲遺腹女始一嵗平抱仲女而棄其子母欲還取之平不聴曰力不能兩活仲不可以絶類遂去不顧與母俱匿野澤中平朝出求食逢餓賊將烹劉攽曰案文少一之字平叩頭曰今旦為老母求莱老母待曠為命願得先歸食母畢還就死食音飼下同因涕泣賊見其至誠哀而遣之平還既食母訖因白曰屬與賊期義不可欺遂還詣賊衆皆大驚相謂曰嘗聞烈士乃今見之子去矣吾不忍食子於是得全建武初平狄將軍龎萌反於彭城攻敗郡守孫萌平時復為郡吏冐白刃伏萌身上被十創困頓不知所為號泣請曰願以身代府君賊乃歛兵止曰此義士也勿殺遂觧去萌傷甚氣絶有頃蘇渇求飲平傾其創血以飲之後數日萌竟死平乃裹創扶送萌喪至其本縣後舉孝㢘拜濟隂郡丞太守劉育甚重之任以郡職上書薦平㑹平遭父喪去官服闋拜全椒長全椒縣屬九江郡也政有恩惠百姓懐感人或増貲就賦或減年從役刺史太守行部獄無繫囚人自以得所不知所問所或作何唯班詔書而去後以病免顯宗初尚書僕射鍾離意上書薦平及琅邪王望東萊王扶曰臣竊見琅邪王望楚國劉曠東萊王扶皆年七十執性恬淡所居之處邑里化之修身行義應在朝次臣誠不足知人竊慕推士進賢之義書奏有詔徵平等特賜辦裝錢至皆拜議郎並數引見平再遷侍中永平三年拜宗正數薦達名士承宮郇恁等恁字君大見黄憲傳恁音人甚反在位八年以老病上疏乞骸骨卒於家王望字慈卿客授㑹稽自議郎遷青州刺史甚有威名是時州郡災旱百姓窮荒望行部道見飢者裸行草食五百餘人愍然哀之因以便宜出所在布粟給其廩糧劉攽曰案廩倉廩也禀給穀也明此當作禀為作褐衣許慎注淮南子曰楚人謂袍為短褐事畢上言帝以望不先表請章示百官詳議其罪時公卿皆以為望之專命法有常條鍾離意獨曰昔華元子反楚宋之良臣不禀君命擅平二國春秋之義以為美談春秋楚子圍宋宋人及楚人平公羊傳曰外平不書此何以書大其平乎已也何大乎其平乎已莊王圍宋有七日之糧爾盡此不勝將去而歸爾於是使司馬子反乘堙而闚宋城宋華元亦乗堙而出見之子反曰子之國何如華元曰憊矣曰何如曰易子而食之析骸而炊之子反曰諾吾軍有七日之糧爾盡此不勝將去而歸爾揖而去之反於莊王莊王怒曰吾使子往視之子曷為告之子反曰以區區之宋猶有不欺人之臣可以楚而無乎是以告之王曰諾引師而去之故君子大其平乎已也劉攽曰春秋之義以為美談案文當作義之春秋之義它處可用此據上下文則不安也今望懐義忘罪當仁不讓若䋲之以法忽其本情將乖聖朝愛育之㫖帝嘉意議赦而不罪王扶字子元掖人也掖今萊州縣少修節行客居琅邪不其縣所止聚落化其徳小於鄉曰聚廣雅曰落居也國相張宗謁請不應欲强致之遂杖策歸鄉里連請固病不起劉攽曰案文當作固以病不起太傅鄧禹辟不至後拜議郎㑹見恂恂似不能言怐恂恭順之貌然性沈正不可干以非義當世髙之永平中臨邑侯劉復復光武兄伯升之孫北海王興之子也著漢徳頌盛稱扶為名臣云趙孝傳趙孝字長平沛國蘄人也蘄音㡬父普王莽時為田禾將軍王莽時置田禾將軍屯田北邊任孝為郎每告歸嘗白衣歩擔嘗從長安還欲止郵亭亭長先時聞孝當過以有長者客掃洒待之素聞孝髙名故以為長者客也洒與灑通音所買反孝既至不自名不稱名也長不肯内因問曰聞田禾將軍子當從長安来何時至乎孝曰尋到矣於是遂去華嶠書曰孝報云三日至矣及天下亂人相食孝弟禮為餓賊所得孝聞之即自縛詣賊曰禮久餓羸痩不如孝肥飽賊大驚並放之謂曰可且歸更持米糒来孝求不能得復徃報賊願就烹衆異之遂不害鄉黨服其義州郡辟召進退必以禮舉孝廉不應永平中辟太尉府顯宗素聞其行詔拜諫議大夫遷侍中又遷長樂衛尉復徵弟禮為御史中丞禮亦恭謙行已類於孝帝嘉其兄弟篤行欲寵異之詔禮十日一就衛尉府大官送供具令共相對盡歡數年禮卒帝令孝從官屬送喪歸𦵏後嵗餘復以衛尉賜告歸卒于家孝無子拜禮兩子為郎時汝南有王琳巨尉者年十餘歲喪父母因遇大亂百姓奔逃唯琳兄弟獨守塜廬號泣不絶弟季出遇赤眉將為所哺哺食之也音補胡反琳自縛請先季死賊矜而放遣由是顯名鄉邑後辟司徒府薦士而退琅邪魏譚少間者時亦為饑寇所獲等輩數十人皆束縛以次當烹賊見譚似謹厚獨令主㸑暮輙執縛賊有夷長公夷姓也特哀念譚密觧其縛語曰汝曹皆應就食急從此去對曰譚為諸君㸑恒得遺餘餘人皆茹草萊不如食我長公義之相曉赦遣並得俱免譚永平中為主家令公主家令又齊國兒萌子明兒音五兮反梁郡車成子威二人兄弟並見執於赤眉將食之萌成叩頭乞以身代賊亦哀而兩釋焉淳于恭傳淳于恭字孟孫北海淳于人也淳于縣故城在今宻州安丘縣東北故淳于國也善說老子清靜不慕榮名家有山田果樹人或侵盜輙助為收採又見偷刈禾者恭念其愧因伏草中盜去乃起里落化之王莽末嵗饑兵起恭兄崇將為盗所烹恭請代得與俱免後崇卒恭養孤㓜教誨學問有不如法輙反用杖自箠以感悟之兒慙而改過初遭賊寇百姓莫事農桑恭常獨力田耕鄉人止之曰時方淆亂死生未分何空自苦為恭曰縱我不得它人何傷墾耨不輟後州郡連召不應遂幽居養志潛於山澤舉動周旋必由禮度建武中郡舉孝廉司空辟皆不應客隱琅邪黔陬山遂數十年黔陬縣之山也黔陬故城在今密州諸城縣東北也建初元年肅宗下詔美恭素行告郡賜帛二十匹遣詣公車除為議郎引見極日訪以政事遷侍中騎都尉禮待甚優其所薦名賢無不徵用進對陳政皆本道徳帝與之言未嘗不稱善五年病篤使者數存問卒於官詔書襃歎賜穀千斛刻石表閭除子孝為太子舍人江革傳江革字次翁齊國臨淄人也少失父獨與母居遭天下亂盗賊並起革負母逃難備經阻險常採拾以為養數遇賊或劫欲將去革輙涕泣求哀言有老母辭氣愿款有足感動人者愿謹也款誠也賊以是不忍犯之或乃指避兵之方華嶠書曰語以避兵道也遂得俱全於難革轉客下邳窮貧裸跣行傭以供母便身之物莫不必給建武末年與母歸鄉里每至嵗時縣當案比案騐以比之猶今貌閱也革以母老不欲揺動自在轅中輓車不用牛馬由是鄉里稱之曰江巨孝巨大也華嶠書曰臨淄令楊音髙之設特席顯異巨孝於稠人廣衆中親奉錢以助供養也太守嘗備禮召革以母老不應及母終至性殆滅嘗寢伏冢廬服竟不忍除郡守遣丞掾釋服因請以為吏永平初舉孝廉為郎補楚太僕月餘自劾去楚王英馳遣官屬追之遂不肯還復使中傅贈送辭不受後數應三公命輒去建初初太尉牟融舉賢良方正再遷司空長史肅宗甚崇禮之遷五官中郎將每朝㑹帝常使虎賁扶侍及進拜恒目禮焉獨視之也時有疾不㑹輙大官送醪膳恩寵有殊於是京師貴戚衛尉馬廖侍中竇憲慕其行各奉書致禮革無所報受華嶠書曰終不報書一無所受帝聞而益善之後上書乞骸骨轉拜諫議大夫賜告歸因謝病稱篤元和中天子思革至行制詔齊相曰諌議大夫江革前以病歸今起居何如夫孝百行之冠衆善之始也國家每惟志士未嘗不及革縣以見穀千斛賜巨孝常以八月長吏存問致羊酒以終厥身華嶠書曰致羊一頭酒二斛如有不幸祠以中牢由是巨孝之稱行於天下及卒詔復賜穀千斛劉般傳子愷劉般字伯興宣帝之𤣥孫也宣帝封子囂於楚是為孝王孝王生思王衍衍生王紆紆生般自囂至般積累仁義世有名節而紆尤慈篤早失母同産弟原鄉侯平尚㓜紆親自鞠養常與共卧起飲食及成人未嘗離左右平病卒紆哭泣歐血數月亦殁初紆襲王封因值王莽簒位廢為庶人因家於彭城般數嵗而孤獨與母居王莽敗天下亂太夫人聞更始即位太夫人般之母也前書音義曰列侯之妻稱夫人列侯死子復為列侯母稱太夫人乃將般俱奔長安㑹更始敗復與般轉側兵革中西行上隴遂流至武威般雖尚少而篤志修行講誦不怠其母及諸舅以為身寄絶域死生未必必或作分也不宜苦精若此數以曉般般猶不改其業建武八年隗囂敗河西始通般即將家屬東至洛陽修經學於師門明年光武下詔封般為菑丘侯奉孝王祀使就國後以國屬楚王徙封杼秋侯杼秋縣屬梁國杼音是與反十九年行幸沛詔問郡中諸侯行能太守薦言般束修至行為諸侯師束修謂謹束修潔也帝聞而嘉之乃賜般緡錢百萬繒二百匹二十年復與車駕㑹沛因從還洛陽賜穀什物留為侍祠侯永平元年以國屬沛徙封居巢侯居巢縣屬廬江郡也復隨諸侯就國數年揚州刺史觀恂薦般在國口無擇言行無怨惡宜䝉旌顯顯宗嘉之十年徵般行執金吾事從至南陽還為朝侯明年兼屯騎校尉時五校官顯職閑而府寺寛敞輿服光麗伎巧畢給故多以宗室肺腑居之肺腑天子之親属也每行幸郡國般常將長水胡騎從帝嘗欲置常平倉宣帝時大司農耿夀昌請令邊郡皆築倉以穀賤時増其價而糴之以利農穀貴時減價而糶之名曰常平倉公卿議者多以為便般對以常平倉外有利民之名而内實侵刻百姓豪右因縁為姦小民不能得其平置之不便帝乃止先是時下令禁民二業謂農者不得商賈也又以郡國牛疫通使區種増耕汜勝之書曰上農區田法區方深各六寸間相去七寸一畝三千七百區丁男女種十畝至秋收區三升粟畝得百斛中農區田法方七寸深六寸間相去二尺一畝千二十七區丁男女種十畝秋收粟畝得五十一石下農區田法方九寸深六寸間相去三尺秋收畝得二十八石旱即以水沃之而吏下檢結多失其實百姓患之般上言郡國以官禁二業至有田者不得漁捕今濵江湖郡率少蠶桑民資漁採以助口實且以冬春閑月不妨農事夫漁獵之利為田除害有助穀食無關二業也又郡國以牛疫水旱墾田多減故詔勑區種増進頃畝以為民也而吏舉度田欲令多前多於前嵗至於不種之處亦通為租可申勑刺史二千石務令實覈其有増加皆使與奪田同罪帝悉從之華嶠書曰奪作脫也肅宗即位以為長樂少府建初二年遷宗正般妻卒厚加賵贈及賜冢塋地於顯節陵下般在位數言政事其收恤九族行義尤著時人稱之年六十建初三年卒子憲嗣憲卒子重嗣憲兄愷愷字伯豫以當襲般爵讓與弟憲遁逃避封久之章和中有司奏請絶愷國肅宗美其義特優假之假借也愷猶不出積十餘嵗至永元十年有司復奏之侍中賈逵因上書曰孔子稱能以禮讓為國於從政乎何有竊見居巢侯劉般嗣子愷素行孝友謙遜絜清讓封弟憲潛身逺迹有司不原樂善之心而繩以循常之法原本也繩政也懼非長克讓之風成含𢎞之化前世扶陽侯韋𤣥成𤣥成字少翁韋賢薨讓封於兄𢎞宣帝髙其節以為河南太守元帝時為御史大夫又為丞相見前書也近有陵陽侯丁鴻鄳侯鄧彪鴻讓國於弟盛和帝時為司徒彪讓國於弟荆鳳明帝時為太尉鄳音盲並以髙行絜身辭爵未聞貶削而皆登三事今愷景仰前修有伯夷之節景猶慕也詩云景行行止前修前賢也楚辭曰蹇吾法夫前修宜蒙矜宥全其先功以增聖朝尚徳之美和帝納之下詔曰故居巢侯劉般嗣子愷當襲般爵而稱父遺意致國弟憲遁亡七年所守彌篤盖王法崇善成人之美其聴憲嗣爵遭事之宜後不得以為比乃徵愷拜為郎稍遷侍中愷之入朝在位者莫不仰其風行遷歩兵校尉十三年遷宗正免復拜侍中遷長水校尉永初元年代周章為太常愷性篤古貴處士每有徵舉必先巖穴論議引正辭氣髙雅永初六年代張敏為司空元初二年代夏勤為司徒舊制公卿二千石刺史不得行三年喪由是内外衆職並廢喪禮元初中鄧太后詔長吏以下不為親行服者不得典城選舉時有上言牧守宜同此制詔下公卿議者以為不便愷獨議曰詔書所以為制服之科者蓋崇化厲俗以𢎞孝道也今刺史一州之表二千石千里之師前書杜欽曰即以二千石守千里之地任兵馬之重不宜去郡也職在辯章百姓宣美風俗尚書曰九族既睦辯章百姓鄭𤣥注云辯别也章明也尤宜尊重典禮以身先之而議者不尋其端至於牧守則云不宜是猶濁其源而望流清曲其形而欲景直不可得也前書曰今滛僻之化流而欲黎庶敦樸猶濁其源而求流清也太后從之時征西校尉任尚以姦利被徵抵罪尚曽副大將軍鄧騭騭黨護之而太尉馬英司空李郃承望騭㫖不復先請即獨解尚臧錮愷不肯與議後尚書案其事二府並受譴咎二府即馬英李郃朝廷以此稱之視事五嵗永寧元年稱病上書致仕有詔優許焉加賜錢三十萬以千石禄歸養河南尹常以嵗八月致羊酒時安帝始親政事朝廷多稱愷之徳帝乃遣問起居厚加賞賜㑹馬英策罷尚書陳忠上疏薦愷曰臣聞三公上則台階下象山岳前書音義曰泰階者天之三階也上階為天子中階為諸侯公卿大夫下階為士庶人春秋漢含孳曰三公象五嶽股肱元首鼎足居職易曰鼎折足覆公餗鼎足三公之象協和隂陽調訓五品五品五常之教也三公爕理隂陽敬敷五教也考功量才以序庶僚遭烈風不迷遇迅雨不惑位莫重焉尚書納舜於大麓烈風雷雨不迷史記曰堯使舜入山林川澤暴風雨舜行不迷堯以為聖也而今上司缺職未議其人臣竊差次諸卿考合衆議咸稱太常朱倀少府荀遷臣父寵前忝司空倀遷並為掾屬具知其能倀能說其經書而用心褊狭遷嚴毅剛直而薄於藝文伏見前司徒劉愷沈重淵懿道徳博備克讓爵土致祚弱弟躬浮雲之志兼浩然之氣孔子曰不義而富且貴於我如浮雲孟子曰我善養浩然之氣而無怨害則塞乎天地之間也言愷有仲尼孟軻之徳也頻歴二司舉動得禮二司謂為司徒司空以疾致仕側身里巷處約思純進退有度百僚景式景慕以為法式海内歸懐往者孔光師丹近世鄧彪張酺皆去宰相復序上司孔光成帝時丞相哀帝時免後以日食徵詣公車復為丞相師丹哀帝時代王莽為大司馬後為大司空鄧彪明帝時為太尉章帝元和元年賜策罷和帝即位以彪為太傅録尚書事張酺和帝永元五年為太尉後策免十五年復為司徒誠宜簡練卓異以厭衆望書奏詔引愷拜太尉安帝初清河相叔孫光坐臧抵罪遂増錮二世釁及其子二世謂父子俱禁錮是時居延都尉范邠復犯臧罪詔下三公廷尉議司徒楊震司空陳襃廷尉張皓議依光比比類也以邠類叔孫光亦錮及子也比音庇愷獨以為春秋之義善善及子孫惡惡止其身所以進人於善也公羊傳曰曹公孫㑹自鄸出奔宋畔也曷為不言畔為公子喜時之後諱也春秋為賢者諱也何賢乎公子喜時讓國也君子之善善也長惡惡也短惡惡止其身善善及子孫賢者子孫故君子為其諱也尚書曰上刑挟輕下刑挟重今尚書呂刑篇曰上刑適輕下服下刑適重上服謂二罪俱發原其本情須有虧减故言適輕適重此言挟輕挟重意亦不殊但與今尚書不同耳如令使臧吏禁錮子孫以輕從重懼及善人左傳曰刑濫則懼及善人劉攽曰如令使臧吏案文多一如字非先王詳刑之意也尚書周穆王曰有邦有土告爾詳刑鄭𤣥注云詳審察之也有詔太尉議是視事三年以疾乞骸骨久乃許之下河南尹禮秩如前嵗餘卒于家詔使者䕶喪事賜東園祕器錢五十萬布千匹少子茂字叔盛亦好禮譲歴位出納出納為尚書喉舌之官也出謂受上言宣於下納謂聴下言傳於上桓帝時為司空㑹司隸校尉李膺等抵罪而南陽太守成瑨太原太守劉瓆下獄當死茂與太尉陳蕃司徒劉矩共上書訟之帝不悅有司承㫖劾奏三公茂遂坐免建寧中復為太中大夫卒於官周磐傳蔡順附周磐字堅伯汝南安成人徵士爕之宗也爕自有傳祖父業建武初為天水太守磐少游京師學古文尚書洪範五行左氏傳好禮有行非典謨不言諸儒宗之居貧養母儉薄不充嘗誦詩至汝墳之卒章慨然而歎韓詩曰汝墳辭家也其卒章曰魴魚赬尾王室如燬雖則如燬父母孔邇薛君章句赬赤也燬烈火也孔甚也邇近也言魴魚勞則尾赤君子勞苦則顔色變以王室政教如烈火矣猶觸冐而仕者以父母甚廹近飢寒之憂為此禄仕乃解韋帶就孝廉之舉以韋皮為帶未仕之服也求仕則服革帶故解之賈山上書曰布衣韋帶之士也和帝初拜謁者除任城長遷陽夏重合令陽夏屬淮南郡重合屬勃海郡頻歴三城皆有惠政後思母棄官還鄉里及母殁哀至㡬於毁滅服終遂廬于冢側教授門徒常千人公府三辟皆以有道特徵磐語友人曰昔方回支父嗇神養和不以榮利滑其生術嗇愛惜也滑亂也列仙傳曰方回堯時隠人也堯聘之練食雲母隱於五柞山至夏啓末為人所劫閉之室中從求道回化而去髙士傳曰堯舜各以天下讓支父支父曰子適有勞憂之病方且療之未暇理天下也莊子作支伯吾親以没矣從物何為遂不應物猶事也建光元年年七十三嵗朝㑹集諸生講論終日嵗朝嵗旦因令其二子曰吾日者夢見先師東里先生與我講於隂堂之奥東南隅謂之奥隂堂幽暗之室又入其奥死之象也既而長歎豈吾齒之盡乎若命終之日桐棺足以周身外椁足以周棺歛形懸封濯衣幅巾歛形謂衣覆其形懸封謂直下棺不為埏道也濯衣浣衣也不更新制幅巾不加冠也封音窆編二尺四寸簡寫堯典一篇并刀筆各一以置棺前示不忘聖道其月望日無病忽終學者以為知命焉磐同郡蔡順字君仲亦以至孝稱汝南先賢傳曰蔡順事母至孝井桔橰朽在母生年上而順憂不敢理之俄而有扶老藤生繞之遂堅固焉順少孤養母嘗出求薪有客卒至卒音千訥反母望順不還乃噬其指噬嚙也順即心動棄薪馳歸跪問其故母曰有急客来吾噬指以悟汝耳母年九十以壽終未及得𦵏里中災火將逼其舍順抱伏棺柩號哭呌天火遂越燒它室順獨得免太守韓崇召為東閣祭酒母平生畏雷自亡後每有雷震順輙圜冢泣曰順在此崇聞之每雷輙為差車馬到墓所太守鮑衆舉孝廉順不能逺離墳墓遂不就年八十終于家趙咨傳趙咨字文楚東郡燕人也燕故城今滑州胙城縣也古南燕之國也父暢為博士咨少孤有孝行州郡召舉孝廉並不就延熹元年大司農陳豨舉咨至孝有道仍遷博士靈帝初太傅陳蕃大將軍竇武為宦者所誅咨乃謝病去太尉楊賜特辟使飾巾出入請與講議以幅巾為首飾不加冠冕舉髙第累遷敦煌太守以病免還躬率子孫耕農為養盗嘗夜往劫之咨恐母驚懼乃先至門迎盗因請為設食謝曰老母八十疾病須養居貧朝夕無儲乞少置衣糧妻子物餘一無所請盗皆慙歎跪而辭曰所犯無狀干暴賢者言畢奔出咨追以物與之不及由此益知名徵拜議郎辭疾不到詔書切讓州郡以禮發遣前後再三不得已應召復拜東海相之官道經滎陽令敦煌曹暠咨之故孝廉也咨為敦煌太守時薦暠為孝廉迎路謁候咨不為留暠送至亭次望塵不及謂主簿曰趙君名重今過界不見必為天下笑即棄印綬追至東海謁咨畢辭歸家其為時人所貴若此咨在官清簡計日受奉豪黨畏其儉節視事三年以疾自乞徵拜議郎抗疾京師劉攽曰案抗無義當是被字將終告其故吏朱祗蕭建等使薄斂素棺藉以黄壤棺中置土以藉其屍也欲令速朽早歸后土不聴子孫改之乃遺書勑子𦙍曰夫含氣之倫有生必終蓋天地之常期自然之至數是以通人達士鑒兹性命以存亡為晦明死生為朝夕故其生也不為娱亡也不為戚夫亡者元氣去體貞魂游散反素復始歸於無端元氣天之氣也貞正也復旋也端際也太素太始天地之初也言人既死正魂游散反於太素旋於太始無復端際者也既已消仆還合糞土土為棄物豈有性情而欲制其厚薄調其燥溼邪但以生者之情不忍見形之毁乃有掩骼埋窆之制易曰古之葬者衣以薪藏之中野後世聖人易之以棺椁易繫辭之文也棺椁之造自黄帝始劉向曰棺椁之作自黄帝始案禮記曰殷人棺椁蓋至殷而加飾爰自陶唐逮于虞夏猶尚簡樸或瓦或木及至殷人而有加焉禮記有虞氏之瓦棺夏后氏之堲周殷人棺椁古史考曰禹作土堲以周棺堲音即七反周室因之制兼二代復重以牆翣之飾禮記曰周人牆置翣盧植曰牆載棺車箱也三禮圖曰翣以竹為之髙二尺四寸廣三尺衣以白布柄長五尺𦵏時令人執之於柩車傍也表以旌銘之儀禮記曰銘明旌也以死者為不可别故以其旗識之劉攽曰表以旌銘之儀案旌銘合作銘旌招復含歛之禮招復謂招魂復魄也含以玉珠實口也歛以衣服歛屍也禮記曰凡復男子稱名婦人稱字榖梁傳曰貝玉曰含禮記曰小歛於户内大歛於阼也殯𦵏宅兆之期期謂諸侯五日而殯五月而𦵏大夫三日而殯三月而𦵏士二日而殯踰月而𦵏宅兆𦵏之塋域也棺椁周重之制禮記曰天子之棺四重鄭𤣥注云諸公三重諸侯再重大夫一重士不重又曰君松椁大夫栢椁士雜木椁注云天子七重諸公四重諸侯三重大夫再重士一重也衣衾稱襲之數凡小歛諸侯大夫士皆用複衾君錦衾大夫縞衾士緇衾又曰天子襲十二稱諸公九稱諸侯七稱大夫五稱士三稱小歛尊卑同十九稱大歛天子百稱上公九十稱侯伯七十稱大夫五十稱士三十稱衣單複具曰稱其事煩而害實品物碎而難備然而秩爵異級貴賤殊等自成康已下其典稍乖至於戰國漸至穨陵戰國當春秋時也穨陵謂穨廢陵遲法度衰毁上下僭雜終使晉侯請隧隧謂掘地為埏道王之𦵏禮也諸侯則懸柩故請之也左傳晉文公朝于襄王請隧不許秦伯殉𦵏左傳秦伯任好卒任好秦繆公名也以子車氏奄息仲行鍼虎殉𦵏國人哀之為賦黄鳥之詩也陳大夫設參門之木宋司馬造石椁之奢宋司馬桓魋也自為石椁三年不成孔子曰若是其靡也死不如速朽之愈也見禮記爰暨暴秦違道廢徳滅三代之制興淫邪之法國貲糜於三泉人力單於酈墓玩好窮於糞土伎巧費於窀穸窀厚也穸夜也厚夜猶長夜也秦始皇初即位營𦵏驪山役徒七十餘萬人下錮三泉宫觀百官竒器珍怪莫不畢備令匠作弩矢有所穿近矢輙射之以水銀為百川江河大海上具天文以人魚為膏燭事見史記劉攽曰注人魚為膏燭案文膏當在為字上自生民以来厚終之敝未有若此者雖有仲尼重明周禮謂周公制禮之後仲尼自衛反魯又定之也墨子勉以古道猶不能禦也禦止也言猶不能止其奢侈墨子曰古者聖人制為𦵏埋之法棺三寸足以朽體衣衾三領足以覆惡堯𦵏卬之山滿坎無窆舜𦵏紀市禹𦵏㑹稽皆下不及泉上無遺臭三王者豈財用不足哉是以華夏之士爭相陵尚違禮之本事禮之末務禮之華棄禮之實單家竭財以相營赴廢事生而營終亡替所養而為厚𦵏替廢也豈云聖人制禮之意乎記曰喪雖有禮哀為主矣又曰喪與其易也寧戚今則不然并棺合椁以為孝愷豐貲重禭以昭惻隱榖梁傳曰衣衾曰禭音遂吾所不取也昔舜𦵏蒼梧二妃不從二妃娥皇女英也禮記曰舜𦵏於蒼梧盖二妃未之從也豈有匹配之㑹守常之所乎聖主明王其猶若斯况於品庶禮所不及古人時同即㑹謂呂望為太師死𦵏於周其子封於齊比五代皆反𦵏於周此時同則㑹也時乖則别謂舜𦵏於蒼梧二妃不從動靜應禮臨事合宜王孫裸𦵏王孫者楊王孫也臨終令其子曰吾死可為布囊盛尸入地七尺既下從足脫其嚢以身親土遂裸𦵏見前書墨夷露骸墨夷謂為墨子之學者名夷之欲見孟子孟子曰吾聞墨之治喪以薄為其道也盖上世嘗有不𦵏其親者其親死則舉而委之於壑見孟子皆逹於性理貴於速變梁伯鸞父没卷席而𦵏身亡不反其尸梁伯鸞父䕶寓於北地而卒卷席而𦵏鴻後出關適吳及卒𦵏於吳要離冢傍彼數子豈薄至親之恩亡忠孝之道邪况我鄙闇不徳不敏薄意内昭志有所慕薄微也上同古人下不為咎果必行之勿生疑異恐爾等目厭所見耳諱所議必欲改殯以乖吾志故逺采古聖近揆行事以悟爾心但欲制坎令容棺椁棺歸即𦵏歸到東郡也平地無墳勿卜時日𦵏無設奠勿留墓側無起封樹於戲小子其勉之哉吾蔑復有言矣朱祗蕭建送喪到家謝承書曰咨在京師病困故吏蕭建經營之咨豫自買小素棺使人取乾黄土細𢷬篩之聚二十石臨卒謂建曰亡後自著所有故巾單衣先置土於棺内尸其中以擁其上劉攽曰朱秖案一傳中祗秪不同當從一子𦙍不忍父體與土并合欲更改殯祗建譬以顧命譬曉也於是奉行時稱咨明達贊曰公子長平臨寇讓生淳于仁悌巨孝以名居巢好讀遂承家禄伯豫逡廵方迹孤竹文楚薄終喪朽惟速周能感親嗇神養福感思也謂誦詩至汝墳思養親而求仕也嗇神養福謂不應辟召以夀終也左傳曰能者養之以福後漢書卷六十九後漢書卷六十九考證劉平傳楚郡彭城人也諸本同臣㑹汾按彭城屬楚國至後漢章帝改楚國為彭城國則兩漢並無楚郡之名疑此二字後人妄増也承宫郇恁郇字一本作荀趙孝傳並得俱免俱字疑衍江革傳莫不必給諸本同必當作畢劉般傳皆使與奪田同罪注華嶠書曰奪作脫也諸本同臣㑹汾按曰字衍當去脫應改敓劉般子愷繩以循常之法注繩政也諸本同臣㑹汾按政當作正景化前修有伯夷之節臣人龍按景化宋本作景仰何焯云景仰之誤始此景伯經師也豈范氏妄竄耶倀能說其經書而用心褊狭臣㑹汾按其字衍當去後漢書卷六十九考證
