body:
  text: 後漢書卷四十五宋宣城太守范煜撰唐章懐太子賢注李王鄧來列傳第五李通傳李通字次元南陽宛人也世以貨殖著姓父守身長九尺容貎絶異為人嚴毅居家如官廷續漢書曰守居家與子孫尤謹閨門之内如官廷也初事劉歆好星歴讖記為王莽宗卿師平帝五年莽攝政郡國置宗師以主宗室盖特尊之故曰宗卿師也通亦為五威將軍従事出補巫丞有能名王莽置五威將軍従事謂驅使小官前書秦御史監郡與蕭何従事辨之巫縣屬南郡故城在今䕫州巫山縣北也莽末百姓愁怨通素聞守說讖云劉氏復興李氏為輔私常懐之且居家富逸為閭里雄以此不樂為吏乃自免歸及下江新市兵起南陽騷動騷亦動也通從弟軼亦素好事乃共計議曰今四方擾亂新室且亡漢當更興南陽宗室獨劉伯升兄弟汎愛容衆可與謀大事通笑曰吾意也㑹光武避事在宛通聞之即遣軼往迎光武續漢書曰先是李通同母弟申徒臣能為醫難使伯升殺之上恐其怨不欲與軼相見軼數請上乃强見之軼深達通意上乃許往意不安買半臿佩刀懐之至通舎通甚恱握上手得半臿刀謂上曰一何武也上曰倉卒時以備不虞耳光武初以通士君子相慕也故往荅之及相見共語移日握手極歡通因具言讖文事光武初殊不意未敢當之時守在長安光武乃微觀通曰即如此當如宗卿師何通曰已自有度矣度計度也音大各反因復備言其計光武既深知通意乃遂相約結定謀議期以材官都試騎士日漢法以立秋日都試騎士謂課殿最也翟義誅王莽以九月都試日勒車騎材官士是也欲劫前隊大夫及屬正前隊大夫謂南陽太守甄阜也屬正謂梁丘賜也因以號令大衆乃使光武與軼歸舂陵舉兵以相應遣従兄子季之長安以事報守季於道病死守密知之欲亡歸素與邑人黄顯相善時顯為中郎将聞之謂守曰今關門禁嚴君状貎非凡将以此安之不如詣闕自歸事既未然脱可免禍守従其計即上書歸死章未及報留闕下㑹事發覺通得亡走莽聞之乃繫守於獄而黄顯為請曰守聞子無狀無状謂祸大不可名言其状也不敢逃亡守義自信歸命宫闕臣顯願質守俱東曉說其子如遂悖逆令守北向刎首以謝大恩刎割也莽然其言㑹前隊復上通起兵之狀莽怒欲殺守顯争之遂并被誅及守家在長安者盡殺之南陽亦誅通兄弟門宗六十四人皆焚屍宛市時漢兵亦已大合通與光武李軼相遇棘陽遂共破前隊殺甄阜梁丘賜更始立以通為柱國大将軍輔漢侯従至長安更拜為大将軍封西平王軼為舞隂王通従弟松為丞相更始使通持節還鎮荆州通因娶光武女弟伯姬是為寜平公主寜平縣屬淮陽國也光武即位徴通為衞尉建武二年封固始侯拜大司農帝每征討四方常令通居守京師鎮撫百姓修宫室起學官五年春代王梁為前將軍六年夏領破姦將軍侯進捕虜将軍王霸等十營擊漢中賊賊謂延岑也公孫述遣兵赴救通等與戰於西城破之西城縣屬漢中郡也還屯田順陽順陽縣名屬南郡哀帝改為博山故城在今鄧州穰縣西時天下略定通思欲避榮寵以病上書乞身詔下公卿羣臣議大司徒侯霸等曰王莽簒漢傾亂天下通懐伊吕蕭曹之謀建造大策扶助神靈輔成聖徳破家為國忘身奉主有扶危存亡之義功德最髙海内所聞通以天下平定謙讓辭位夫安不忘危宜令通居職療疾欲就諸侯不可聼於是詔通勉致醫藥以時視事其夏引拜為大司空通布衣唱義助成大業重以寜平公主故特見親重然性謙恭常欲避權勢素有消疾消消中之疾也周禮天官職曰春有痟首疾鄭𤣥注云痟酸削也自為宰相謝病不視事連年乞骸骨帝每優寵之令以公位歸第養疾通復固辭積二嵗乃聼上大司空印綬以特進奉朝請有司奏請封諸皇子帝感通首創大謀即日封通少子雄為召陵侯每幸南陽常遣使者以太牢祠通父冢十八年卒謚曰恭侯帝及皇后親臨弔送塟子音嗣音卒子定嗣定卒子黄嗣黄卒子夀嗣東觀記曰黄字作箕也李軼後為朱鮪所殺更始之敗李松戰死唯通能以功名終永平中顯宗幸宛詔諸李随安衆宗室㑹見安衆縣屬南陽郡故城在鄧州東謝承書曰安衆侯劉崇長沙定王五代孫南陽宗室也與宗人討莽有功随光武河北破王郎朝廷髙其忠壮策文嗟嘆以厲宗室安衆諸劉皆其後並受賞賜恩寵篤焉論曰子曰富與貴是人之所欲不以其道得之不處也李通豈知夫所欲而未識以道者乎夫天道性命聖人難言之况乃億測微隠猖狂無妄之福㣲隠謂䜟文也荘子曰猖狂妄行易无妄卦曰无妄之往何之矣鄭𤣥注云妄之言望人所望宜正行必有所望行而無所望是失其正何可往也即史記朱英曰代有無望之福又有無望之禍是也汙滅親宗以觖一切之功哉停水曰汙言族滅而汙池之也觖望也音丘瑞反一切謂權時也昔蒙穀負書不徇楚難戰國策曰呉楚戰於栢舉呉師入郢蒙穀奔入宫負離次之典浮江逃於雲夢之中後昭王反郢五官失法百姓昬亂䝉穀獻典五官得法百姓大化校䝉穀之功與存國相若封之執圭蒙穀怒曰穀非人臣也社稷之臣也茍社稷血食余豈患無君乎遂棄於歴山也即墨用齊義雪燕恥史記曰燕昭王伐齊湣王敗出亡燕人入臨菑盡取齊寳燒其宫室宗廟下齊七十餘城其不下者唯獨莒即墨後齊田單以即墨擊破燕軍悉復所亡城故曰雪也彼之趣舎所立其殆與通異乎王常傳王常字顔卿潁川舞陽人也東觀記曰其先鄠人常父博成哀間轉客潁川舞陽因家焉王莽末為弟報仇亡命江夏命者名也言背其名籍而逃亡也久之與王鳳王匡等起兵雲杜綠林中聚衆數萬人以常為偏裨攻傍縣後與成丹張卬别入南郡藍口號下江兵續漢志曰南郡編縣有藍口聚王莽遣嚴尤陳茂擊破之常與丹卬收散卒入蔞谿蔞音力于反劫略鍾龍間盛𢎞之荆州記曰永陽縣北有石龍山在今安州應山縣東北又随州随縣東北有三鍾山也衆復振引軍與荆州牧戰於上唐大破之上唐郷名故城在今随州棗陽縣東北也遂北至宜秋續漢志曰南郡有宜秋聚也是時漢兵與新市平林衆俱敗於小長安各欲解去伯升聞下江軍在宜秋即與光武及李通俱造常壁曰願見下江一賢将議大事成丹張卬共推遣常伯升見常說以合從之利以利合曰從也常大悟曰王莽簒弑殘虐天下百姓思漢故豪傑並起今劉氏復興即真主也誠思出身為用輔成大功伯升曰如事成豈敢獨饗之哉遂與常深相結而去常還具為丹卬言之丹卬負其衆皆曰大丈夫既起當各自為主何故受人制乎常心獨歸漢乃稍曉説其将帥曰往者成哀衰微無嗣故王莽得承間簒位既有天下而政令苛酷積失百姓之心民之謳吟思漢非一日也故使吾屬因此得起夫民所怨者天所去也民所思者天所與也舉大事必當下順民心上合天意功乃可成若負强恃勇觸情恣欲雖得天下必復失之以秦項之埶尚至夷覆况今布衣相聚草澤以此行之滅亡之道也今南陽諸劉舉宗起兵觀其來議事者皆有深計大慮王公之才與之并合必成大功此所以祐吾屬也下江諸将雖屈强少識然素敬常乃皆謝曰無王将軍吾屬㡬陷於不義願敬受教即引兵與漢軍及新市平林合於是諸部齊心同力鋭氣益壮遂俱進破殺甄阜梁丘賜及諸将議立宗室唯常與南陽士大夫同意欲立伯升而朱鮪張卬等不聼及更始立以常為廷尉大将軍封知命侯别徇汝南沛郡劉攽曰案沛在山東王常此時力未及往盖是南郡沛南絶相類也還入昆陽與光武共擊破王尋王邑更始西都長安以常行南陽太守事令専命誅賞東觀記曰誅不従命封拜有功封為鄧王食八縣賜姓劉氏常性恭儉遵法度南方稱之更始敗建武二年夏常将妻子詣洛陽肉袒自歸光武見常甚歡勞之曰王廷尉良苦良甚也言苦軍事也毎念往時共更艱戹何日忘之更經也艱戹謂帝敗小長安造常壁與常共破甄阜及王尋等也莫往莫来豈違平生之言乎平生言謂常云劉氏真主也誠思出身為用輔成大功常乃久事更始不早歸朝帝微以責之故下文云吾與廷尉戲耳詩衞風曰莫往莫来悠悠我思常頓首謝曰臣䝉大命得以鞭策託身陛下策馬檛也言執策以従之始遇宜秋後㑹昆陽幸賴靈武輒成斷金伯升與常深相結故曰斷金易繫辭曰二人同心其利斷金更始不量愚臣任以南州謂以廷尉行南陽太守赤眉之難喪心失望謂赤眉入長安破更始以為天下復失綱紀聞陛下即位河北心開目眀今得見闕庭死無遺恨帝笑曰吾與廷尉戲耳吾見廷尉不憂南方矣謂南陽也乃召公卿将軍以下大㑹具為羣臣言常以匹夫興義兵眀扵知天命故更始封為知命侯與吾相遇兵中尤相厚善特加賞賜拜為左曹前書曰左右曺平尚書事封山桑侯山桑縣屬沛郡今亳州縣後帝於大㑹中指常謂羣臣曰此家率下江諸将輔翼漢室心如金石真忠臣也是日遷常為漢忠将軍遣南擊鄧奉董訢令諸將皆屬焉又詔常北擊河間漁陽平諸屯聚五年秋攻㧞湖陵又與帝㑹任城因従破蘇茂龎萌進攻下邳常部當城門戰一日數合賊反走入城常追迫之城上射矢雨下帝從百餘騎自城南髙處望常戰力甚馳遣中黄門詔使引還賊遂降又别率騎都尉王霸共平沛郡賊東觀記曰沛郡賊苗虚也六年春徵還洛陽令夫人迎常於舞陽歸家上冡西屯長安拒隗囂七年使使者持璽書即拜常為横野大将軍位次與諸将絶席絶席謂尊顯之也漢官儀曰御史大夫尚書令司𨽻校尉皆専席號三獨坐常别擊破隗囂将高峻於朝那朝那縣屬安定郡也囂遣將過烏氏常要擊破之轉降保塞𦍑諸營壁皆平之九年擊内黄賊破降之後北屯故安拒盧芳故安縣屬涿郡故城在今易州易縣南也十二年薨于屯所謚曰節侯子廣嗣三十年徙封石城侯石城故城在今復州沔陽縣東南也永平十四年坐與楚事相連國除鄧晨傳鄧晨字偉卿南陽新野人也世吏二千石東觀記曰晨曽祖父隆揚州刺史祖父勲交趾刺史父宏豫章都尉晨初娶光武姊元王莽末光武嘗與兄伯升及晨俱之宛與穰人蔡少公等讌語少公頗學圖讖言劉秀當為天子或曰是國師公劉秀乎光武戲曰何用知非僕邪坐者皆大笑晨心獨喜東觀記曰晨與上共載出逢使者不下車使者怒頗加耻辱上稱江夏卒史晨更名侯家承使者以其詐将至亭欲罪之新野宰潘叔為請得免及光武與家屬避吏新野舎晨廬甚相親愛晨因謂光武曰王莽悖暴盛夏斬人此天亡之時也王莽地皇元年下書曰方出軍行師有趨讙犯者斬無須時於是春夏斬人都市百姓震懼也劉攽曰注有趨讙犯者案前書犯字下少一法字往時㑹宛獨當應邪光武笑不荅及漢兵起晨將賔客㑹棘陽漢兵敗小長安諸將多亡家屬光武單馬遁走遇女弟伯姬與共騎而奔前行復見元趣令上馬元以手撝曰行矣不能相救無為兩沒也㑹追兵至元及三女皆遇害漢兵退保棘陽而新野宰乃汚晨宅焚其冢墓宗族皆恚怒曰家自富足何故隨婦家人入湯鑊中晨終無恨色更始立以晨為偏將軍與光武略地潁川俱夜出昆陽城擊破王尋王邑又别徇陽翟以東至京密皆下之京密二縣名屬河南郡京故城在今鄭州滎陽東鄭之京邑也密故城在滎陽東南也更始北都洛陽以晨為常山太守㑹王郎反光武自薊走信都晨亦間行㑹於鉅鹿下自請従擊邯鄲光武曰偉卿以一身従我不如以一郡為我北道主人乃遣晨歸郡光武追銅馬髙胡羣賊於冀州劉攽曰案賊本以地自名故當如他處作湖字晨發積射士千人積與迹同古字通用謂尋迹而射之又遣委輸給軍不絶光武即位封晨房子侯房子今趙州縣也帝又感悼姊沒於亂兵追封諡元為新野節義長公主立廟扵縣西封晨長子汎為呉房侯呉房今豫州縣也以奉公主之祀建武三年徵晨還京師數讌見説故舊平生為歡晨従容謂帝曰僕竟辯之光武前語晨云何用知非僕乎故晨有此言也帝大笑従幸章陵拜光祿大夫使持節監執金吾賈復等擊平邵陵新息賊新息今豫州縣也四年従幸夀春留鎮九江晨好樂郡職由是復拜為中山太守吏民稱之常為冀州髙第中山屬冀州於冀州所部郡課常為第一也十三年更封南䜌侯䜌音力全反入奉朝請復為汝南太守十八年行幸章陵徵晨行廷尉事従至新野置酒酣讌賞賜數百千萬復遣歸郡晨興鴻郤陂數千頃田鴻郤陂名在今豫州汝陽縣東成帝時闗東水陂溢為害翟方進為丞相奏罷之汝土以殷魚稻之饒流衍它郡衍饒也眀年定封西華侯復徵奉朝請二十五年卒詔遣中謁者備公主官屬禮儀漢官儀曰長公主官屬傅一人員吏五人騶僕射五人私府長食官長永巷令家令各一人也招迎新野主魂與晨合𦵏扵北芒乘輿與中宫親臨喪送葬謚曰恵侯小子棠嗣後徙封武當侯棠卒子固嗣固卒子國嗣國卒子福嗣永建元年卒無子國除來歙傳來歙字君叔歙音許及反南陽新野人也六世祖漢有才力武帝世以光禄大夫副樓舩将軍楊僕擊破南越朝鮮父仲東觀記仲作冲哀帝時為諌大夫娶光武祖姑生歙光武甚親敬之數共往来長安漢兵起王莽以歙劉氏外屬乃收繫之賔客共簒奪得免更始即位以歙為吏従入關數言事不用以病去歙女弟為漢中王劉嘉妻嘉遣人迎歙因南之漢中更始敗歙勸嘉歸光武遂與嘉俱東詣洛陽帝見歙大歡即解衣以衣之東觀記曰解所被襜襦以衣歙也拜為太中大夫是時方以隴蜀為憂獨謂歙曰今西州未附西州謂隗囂也子陽稱帝道里阻逺諸將方務關東思西州方略未知所任其謀若何歙因自請曰臣嘗與隗囂相遇長安其人始起以漢為名今陛下聖徳隆興臣願得奉威命開以丹青之信楊子法言曰聖人之言眀若丹青也囂必束手自歸則述自亡之勢不足圖也帝然之建武三年歙始使隗囂五年復持節送馬援因奉璽書於囂既還復往説囂囂遂遣子恂隨歙入質拜歙為中郎將時山東略定帝謀西收囂兵與俱伐蜀復使歙喻旨囂將王元説囂多設疑故久冘豫不决冘豫不定之意也説文曰冘冘行貎也音滛東觀記曰狐疑不决也歙素剛毅遂發憤質責囂曰質正也國家以君知臧否曉廢興故以手書暢意足下推忠誠遣伯春委質囂子恂字伯春是臣主之交信也今反欲用佞惑之言為族滅之計叛主負子違背忠信乎吉凶之決在扵今日欲前刺囂囂起入部勒兵将殺歙歙徐杖節就車而去囂愈怒王元勸囂殺歙使牛邯将兵圍守之囂将王遵諌曰愚聞為國者慎器與名為家者畏怨重禍噐車服也名爵號也言名與器不可妄授也俱慎名器則下服其命輕用怨禍則家受其殃今将軍遣子質漢内懐它志名器逆矣外人有議欲謀漢使輕怨禍矣古者列國兵交使在其間左傳曰晉欒書伐鄭鄭人使伯蠲行成晉人殺之非禮也兵交使在其間可也所以重兵貴和而不任戰也何況承王命籍重質而犯之哉君叔雖單車逺使而陛下之外兄也光武之姑子故曰外兄也害之無損扵漢而随以族滅昔宋執楚使遂有析骸易子之禍左傳曰楚使申舟聘齊不假道於宋華元曰楚不假道鄙我也乃殺之楚子聞之遂圍宋宋人懼使華元夜入楚師告子反曰寡君使元以病告敝邑易子而食析骸以爨也小國猶不可辱況於萬乗之主重以伯春之命哉歙為人有信義言行不違及往来游説皆可案覆西州士大夫皆信重之多為其言故得免而東歸八年春歙與征虜將軍祭遵襲略陽遵道病還分精兵随歙合二千餘人伐山開道従番須回中番須回中並地名也番音盤武帝元封四年幸雍通回中道前書音義曰回中在汧汧今隴州汧源縣也徑至略陽徑直也斬囂守將金梁因保其城囂大驚曰何其神也東觀記曰上聞得略陽甚悦左右怪上數破大敵今得小城何足以喜然上以略陽囂所依阻心腹已壊則制其支體也乃悉兵數萬人圍略陽斬山築堤激水灌城歙與将士固死堅守矢盡乃發屋斷木以為兵囂盡鋭攻之自春至秋其士卒疲弊帝乃大發關東兵自将上隴囂衆潰走圍解扵是置酒髙㑹勞賜歙班坐絶席在諸將之右賜歙妻縑千匹詔使留屯長安悉監䕶諸將歙因上書曰公孫述以隴西天水為藩蔽故得延命假息今二郡平蕩則述智計窮矣宜益選兵馬儲積資糧昔趙之將帥多賈人髙帝懸之以重賞髙帝十年陳豨反於趙代其将多賈人帝多以金購豨将皆降今西州新破兵人疲饉若招以財穀則其衆可集臣知國家所給非一用度不足然有不得已也帝然之於是大轉糧運東觀記曰詔於汧積穀六萬斛驢四百頭負䭾詔歙率征西大將軍馮異建威大將軍耿弇虎牙大將軍蓋延揚武將軍馬成武威將軍劉尚入天水擊破公孫述將田弇趙匡眀年攻㧞落門聚名也解見光武紀隗囂支黨周宗趙恢及天水屬縣皆降初王莽世羌虜多背叛而隗囂招懐其酋豪遂得為用及囂亡後五谿先零諸種數為宼掠皆營塹自守州郡不能討歙乃大修攻具率蓋延劉尚及太中大夫馬援等進擊羌扵金城大破之斬首虜數千人獲牛羊萬餘頭穀數十萬斛又擊破襄武賊傅栗卿等襄武縣屬隴西郡也隴西雖平而人饑流者相望流謂流離以就食也歙乃傾倉廩轉運諸縣以賑贍之於是隴右遂安而凉州流通焉十一年歙與蓋延馬成進攻公孫述将王元環安扵河池下辯陷之乗勝遂進蜀人大懼使刺客刺歙未殊馳召蓋延延見歙因伏悲哀不能仰視歙叱延曰虎牙何敢然今使者中刺客無以報國故呼巨卿欲相屬以軍事而反效兒女子涕泣乎刃雖在身不能勒兵斬公邪延收淚强起受所誡歙自書表曰臣夜人定後為何人所賊傷中臣要害何人謂不知何人也臣不敢自惜誠恨奉職不稱以為朝廷羞夫理國以得賢為本太中大夫叚襄骨鯁可任骨鯁喻正直也説文曰鯁魚骨也食骨留咽中為鯁願陛下裁察又臣兄弟不肖終恐被罪肖似也不似猶不賢也陛下哀憐數賜教督投筆抽刃而絶帝聞大驚省書覽涕乃賜䇿曰中郎将来歙攻戰連年平定羌隴憂國忘家忠孝彰著遭命遇害嗚呼哀哉使太中大夫贈歙中郎將征羌侯印綬謚曰節侯謁者護喪事喪還洛陽乗輿縞素臨弔送𦵏以歙有平羌隴之功故改汝南之當鄉縣為征羌國焉征羌故城在今豫州郾城縣東南也子裦嗣十三年帝嘉歙忠節復封歙弟由為宜西侯東觀記曰宜西鄉侯裦子稜尚顯宗女武安公主稜早歿裦卒以稜子歴為嗣論曰世稱來君叔天下信士夫専使乎二國之間豈厭詐謀哉而能獨以信稱者良其誠心在乎使兩義俱安而已不私其功也歴字伯珍少襲爵以公主子永元中為侍中監羽林右騎羽林騎武帝置宣帝令中郎將騎都尉監羽林見前書永初三年遷射聲校尉永寜元年代馮石為執金吾延光元年尊歴母為長公主二年遷歴太僕眀年中常侍樊豐與大將軍耿寳侍中周廣謝惲等共讒陷太尉楊震震遂自殺歴謂侍御史虞詡曰耿寳託元舅之親寳女弟為清河王慶姬即安帝嫡母也故寳於帝為元舅焉榮寵過厚不念報國㤙而傾側姦臣誣奏楊公傷害忠良其天禍亦將至矣遂絶周廣謝惲不與交通時皇太子驚病不安避幸安帝乳母野王君王聖舎太子乳母王男厨監邴吉等以為聖舎新繕修犯土禁不可久御聖及其女永與大長秋江京及中常侍樊豐王男邴吉等互相是非聖永遂誣譖男吉皆幽囚死家屬徙比景太子思男等數為歎息京豐懼有後害妄造虚無構讒太子及東宫官屬帝怒召公卿以下㑹議廢立耿寳等承旨皆以為太子當廢歴與太常桓焉廷尉張皓議曰經説年未滿十五過惡不在其身且男吉之謀皇太子容有不知宜選忠良保傅輔以禮義廢置事重此誠聖恩所宜宿留帝不從宿留猶停留也宿留音秀溜是日遂廢太子為濟隂王時監太子家小黄門籍建中傅髙梵等梵音扶汛切皆以無罪徙朔方歴乃要結光祿勲祋諷祋音丁外反宗正劉瑋將作大匠薛皓侍中閭丘𢎞陳光趙代施延太中大夫朱倀倀音丑羊反第五頡頡音下結反中散大夫曹成諌議大夫李尤符節令張敬續漢書曰符節令秩百石持書侍御史龔調續漢志曰持書侍御史秩六百石也羽林右監孔顯漢官儀羽林左右監屬光禄也城門司馬徐崇衞尉守丞樂闈守丞兼守之丞也長樂未央廐令鄭安世等十餘人續漢志曰未央廐令一人長樂廐令一人主乗輿馬也俱詣鴻都門證太子無過龔調據法律眀之以為男吉犯罪皇太子不當坐帝與左右患之乃使中常侍奉詔脅羣臣曰父子一體天性自然以義割恩為天下也歴諷等不識大典而與羣小共為讙譁外見忠直而内希後福飾邪違義豈事君之禮朝廷廣開言事之路故且一切假貸若懐迷不反當顯眀刑書諌者莫不失色薛皓先頓首曰固宜如眀詔歷怫然字林曰怫鬱也怫音扶勿反廷詰皓曰屬通諌何言而今復背之屬近也通猶共也近言共諌何乃相背也大臣乗朝車處國事固復輾轉若此乎周禮曰卿乗夏縵大夫乗墨車輾轉不定也詩云展轉反側乃各稍自引起歷獨守闕連日不肯去帝大怒乃免歷兄弟官削國租黜公主不得㑹見歷遂杜門不與親戚通時人為之震慄及帝崩閻太后起歷為將作大匠順帝即位朝廷咸稱社稷臣於是遷為衞尉祋諷劉瑋閭丘𢎞等先卒皆拜其子為郎朱倀倀音丑良反施延陳光趙代等並為公卿任職徵王男邴吉家屬還京師厚加賞賜籍建髙梵等悉䝉顯擢永建元年拜歷車騎將軍弟祉為歩兵校尉超為黄門侍郎三年母長公主薨歴稱病歸第服闋復為大鴻臚陽嘉二年卒官子定嗣定尚安帝妺平氏長公主順帝時為虎賁中郎将定卒子虎嗣桓帝時為屯騎校尉弟豔字季徳少好學下士開館養徒少歴顯位靈帝時再遷司空賛曰李鄧豪贍舎家従讖鄧晨代以吏二千石為豪李通家富為贍也少公雖孚宗卿未驗孚信也言蔡少公論讖其事雖信而李守被誅是未驗也王常知命功惟帝念王常更始中為知命侯後歸朝上録其功封為列侯故曰帝念款款君叔斯言無玷玷缺也方獻三㨗永墜一劒小雅采薇詩曰豈敢定居一月三㨗後漢書卷四十五後漢書卷四十五考證來歙傳父仲哀帝時為諌大夫哀帝監本訛安帝従汲古閣本改娶光武祖姑生歙諸本同臣承蒼按下文王遵曰君叔陛下之外兄也此祖姑字必有誤後漢書卷四十五考證
