body:
  text: 後漢書卷一百十三宋宣城太守范煜撰唐章懷太子賢注逸民列傳第七十三易稱遯之時義大矣哉又曰不事王侯高尚其事是以堯稱則天不屈潁陽之高潁陽謂巢許也武盡美矣終全孤竹之潔孤竹謂夷齊也自兹以降風流彌繁長往之軌未殊而感致之數匪一或隱居以求其志或曲避以全其道論語孔子曰隱居以求其志行義以達其道求志謂長沮桀溺全道若薛方詭對王莽也或靜已以鎭其躁謂逢萌之類也或去危以圖其安四皓之類也或垢俗以動其槩謂申徒狄鮑焦之流也或疵物以激其清梁鴻嚴光之流然觀其甘心畎畝之中憔悴江海之上莊子曰舜以天下讓北人無擇無擇曰異哉后之為人也居於畎畝之中而遊堯之門不若是而已又曰就藪澤處間曠此江海之士避代之人閒暇者之所好也豈必親魚鳥樂林草哉亦云性分所至而已分音符問反故䝉恥之賓屢黜不去其國列女傳曰桞下惠死其妻誄之曰蒙恥救人德彌大兮雖遇三黜終不敝兮蹈海之節千乘莫移其情史記曰魯連謂新垣衍曰秦即為帝則魯連蹈東海死耳魯連下聊城田單爵之魯連逃隱於海上也適使矯易去就則不能相為矣人各有所尚不能改其志孔子聞長沮桀溺之言乃告子路曰天下有道丘不與易也彼雖硜硜有類沽名者論語曰孔子擊磬于衞有荷蕢而過孔氏之門者曰有心哉擊磬乎既而曰鄙哉硜硜乎莫已知也又子貢曰有美玉於斯蘊櫝而藏諸求善價而沽諸子曰沽之哉沽之哉我待價者也沽謂衒賣也然而蟬蛻囂埃之中自致寰區之外異夫飾智巧以逐浮利者乎荀卿有言曰志意脩則驕富貴道義重則輕王公也荀卿子之文也漢室中微王莽簒位士之蘊藉義憤甚矣是時裂冠毁冕相攜持而去之者蓋不可勝數左傳曰王使詹桓伯辭於晉曰伯父若裂冠毁冕㧞本塞源毛詩序曰百姓莫不相攜持而去之也揚雄曰鴻飛㝠㝠弋者何簒焉言其違患之遠也簒字諸本或作慕法言作簒宋𠂻曰簒取也鴻高飛㝠㝠薄天雖有弋人何施巧而取也喻賢者隱處不離暴亂之害也然今人謂以計數取物為簒簒亦取也光武側席幽人求之若不及國語曰越王夫人去筓側席而坐韋昭註云側猶特也禮憂者側席而坐前書公孫𢎞贊曰上方欲用文武求之如弗及旌帛蒲車之所徵賁相望於巖中矣毛詩序曰干旄美好善也其詩曰孑孑干旌在浚之城易賁卦六五曰賁于丘園東帛戔戔蒲車以蒲裹輪取其安前書武帝以蒲車徵魯申公也若薛方逢萌聘而不肯至前書薛方字子容嚴光周黨王霸至而不能屈羣方咸遂志士懷仁斯固所謂舉逸民天下歸心者乎論語文也肅宗亦禮鄭均而徵高鳳以成其節自後帝德稍衰邪㜸當朝處子耿介羞與卿相等列至乃抗憤而不顧多失其中行焉蓋錄其絶塵不反莊子曰顔回問於仲尼曰夫子歩亦歩夫子趨亦趨夫子馳亦馳夫子奔軼絶塵則回瞠若乎後矣司馬彪注云言不可及也韓詩外傳曰山林之士往而不能反同夫作者列之此篇論語曰賢者辟世其次辟地其次辟色其次辟言子曰作者七人矣野王二老傳野王二老者不知何許人也初光武貳於更始會關中擾亂遣前將軍鄧禹西征送之於道旣反因於野王獵路見二老者即禽即就也易曰即鹿無虞也光武問曰禽何向並舉手西指言此中多虎臣每即禽虎亦即臣大王勿往也光武曰茍有其備虎亦何患父曰何大王之謬邪昔湯即桀於鳴條而大城於亳帝王紀曰按孟子桀卒於鳴條乃在東夷之地或言陳留平丘今有鳴條亭也唯孔安國注尚書云鳴條在安邑西考三說之驗孔為近之武王亦即紂於牧野而大城於郟鄏杜預注左傳曰今河南也河南縣西有郟鄏陌彼二王者其備非不深也是以即人者人亦即之雖有其備庸可忽乎光武悟其旨顧左右曰此隱者也將用之辭而去莫知所在向長傳向長字子平高士傳向字作尚河内朝歌人也隱居不仕性尚中和好通老易貧無資食好事者更饋焉受之取足而反其餘王莽大司空王邑辟之連年乃至欲薦之於莽固辭乃止潛隱於家讀易至損益卦喟然歎曰吾已知富不如貧貴不如賤但未知死何如生耳易損卦曰二簋可用享損益盈虚與時偕行益卦曰損上益下民說无彊也建武中男女娶嫁既畢勅斷家事勿相關當如我死也於是遂肆意與同好北海禽慶前書慶字子夏俱遊五嶽名山竟不知所終逢萌傳逢萌字子慶北海都昌人也劉攽曰案萌北海人則當是蓬非逢也家貧給事縣為亭長時尉行過亭萌候迎拜謁既而擲楯歎曰亭長主捕盜賊故執楯也大丈夫安能為人役哉遂去之長安學通春秋經時王莽殺其子宇前書莽隔絶平帝外家衞氏宇恐帝大後見怨以為莽不可諫而好鬼神即夜持血灑莽第門吏發覺之莽執宇送獄飲藥而死萌謂友人曰三綱絶矣謂君臣夫婦父子不去禍將及人即解冠掛東都城門漢宫殿名東都門今名青門也前書音義曰長安東都城北頭第一門歸將家屬浮海客於遼東萌素明陰陽知莽將敗有頃乃首戴瓦盎盎盆也哭於市曰新乎新乎王莽為新都侯及簒號新室故哭之因遂潛藏及光武即位乃之琅邪勞山在今萊州即墨縣東南有大勞小勞山養志脩道人皆化其德北海太守素聞其高遣吏奉謁致禮萌不荅太守懐憤而使捕之吏叩頭曰子慶大賢天下共聞所在之處人敬如父往必不獲秪自毁辱太守怒收之繫獄更發它吏行至勞山人果相率以兵弩捍禦吏被傷流血奔而還後詔書徵萌託以老耄迷路東西語使者云朝廷所以徵我者以其有益於政尚不知方靣所在安能濟時乎即便駕歸連徵不起以壽終初萌與同郡徐房平原李子雲王君公相友善並曉陰陽懷德穢行房與子雲養徒各千人君公遭亂獨不去儈牛自隐儈謂平會两家賣買之價時人謂之論劉攽曰案謂之論都不是當作為之語曰避世牆東王君公嵇康髙士傳曰君公明易為郎數言事不用乃自汙與官婢通免歸詐狂儈牛口無二價也周黨傳周黨字伯况太原廣武人也家産千金少孤為宗人所養而遇之不以理及長又不還其財黨詣鄉縣訟主乃歸之旣而散與宗族悉免遣奴婢遂至長安遊學初鄉佐嘗衆中辱黨黨久懐之續漢志鄉佐主收賦税者後讀春秋聞復讐之義春秋經書紀侯大去其國公羊傳曰大去者何滅也孰滅之齊滅之曷為不言齊滅之為襄公諱也齊襄公九世祖哀公亨於周紀侯譖之也故襄公讐於紀九世猶可復讐乎雖百世可也便輟講而還與鄉佐相聞期剋鬬日旣交刃而黨爲鄉佐所傷困頓鄉佐服其義輿歸養之數日方蘇既悟而去自此勅身脩志州里稱其高及王莽竊位託疾杜門自後賊暴從横殘滅郡縣唯至廣武過城不入建武中徴為議郎以病去職遂將妻子居黽池復被徴不得已乃著短布單衣榖皮綃頭待見尚書以榖樹皮為綃頭也綃頭解見向栩傳黨服此尚書以待見也劉攽曰注服此尚書以待見也案文少一詣字及光武引見黨伏而不謁自陳願守所志帝乃許焉博士范升奏毁黨曰臣聞堯不須許由巢父而建號天下周不待伯夷叔齊而王道以成伏見太原周黨東海王良山陽王成等蒙受厚恩使者三聘乃肯就車及陛見帝廷黨不以禮屈伏而不謁偃蹇驕悍同時俱逝黨等文不能演義武不能死君釣采華名庻㡬三公之位臣願與坐雲臺之下考試圖國之道不如臣言伏虛妄之罪而敢私竊虛名誇上求髙皆大不敬書奏天子以示公卿詔曰自古明王聖主必有不賓之士伯夷叔齊不食周粟太原周黨不受朕祿亦各有志焉其賜帛四十匹黨遂隐居黽池著書上下篇而終邑人賢而祠之初黨與同郡譚賢伯升鴈門殷謨君長俱守節不仕王莽世建武中徴並不到王霸傳王霸字儒仲太原廣武人也少有清節及王莽簒位棄冠帶絕交宦建武中徴到尚書拜稱名不稱臣有司問其故霸曰天子有所不臣諸侯有所不友禮記曰儒有上不臣天子下不事諸侯司徒侯霸譲位於霸閻陽毁之曰太原俗黨儒仲頗有其風遂止皇甫謐高士傳曰故梁令閻陽也前書曰太原多晉公族子孫以詐力相傾矜夸功名報仇過直漢興號為難化常擇嚴猛將或任殺伐為威父兄被誅子弟怨憤至告訐刺史二千石以病歸隐居守志茅屋蓬戸連徴不至以壽終嚴光傳嚴光字子陵一名遵會稽餘姚人也少有高名與光武同遊學及光武即位光乃變名姓隐身不見帝思其賢乃令以物色訪之以其形貎求之後齊國上言有一男子披羊裘釣澤中帝疑其光乃備安車𤣥纁遣使聘之三反而後至舎於北軍給牀褥太官朝夕進膳司徒侯霸與光素舊遣使奉書皇甫謐髙士傳曰霸使西曹屬侯子道奉書光不起於牀上箕踞抱膝發書讀訖問子道曰君房素癡今為三公寕小差否子道曰位已鼎足不癡也光曰遣卿來何言子道傳霸言光曰卿言不癡是非癡語也天子徴我三乃來人主尚不見當見人臣乎子道求報光曰我手不能書乃口授之使者嫌少可更足光曰買菜乎求益也使人因謂光曰公聞先生至區區欲即詣造迫於典司是以不獲願因日暮自屈語言光不荅乃投札與之口授曰君房足下位至鼎足甚善懷仁輔義天下悅阿諛順旨要領絶霸得書封奏之帝笑曰狂奴故態也車駕即日幸其館光臥不起帝即其臥所撫光腹曰咄咄子陵不可相助為理邪光又眠不應良久乃張目熟視曰昔唐堯著德巢父洗耳士故有志何至相迫乎帝曰子陵我竟不能下汝邪於是升輿歎息而去復引光入論道舊故相對累日帝從容問光曰朕何如昔時對曰陛下差增於往因共偃臥光以足加帝腹上明日太史奏客星犯御座甚急帝笑曰朕故人嚴子陵共臥耳除為諫議大夫不屈乃耕於富春山今杭州富陽縣也本漢富春縣避晉簡文帝鄭太后諱改曰富陽後人名其釣處為嚴陵瀨焉顧野王輿地志曰七里灘在東陽江下與嚴陵瀨相接有嚴山桐廬縣南有嚴子陵漁釣處今山邊有石上平可坐十人臨水名為嚴陵釣壇也建武十七年復特徵不至年八十終於家帝傷惜之詔下郡縣賜錢百萬穀千斛井丹傳井丹字大春扶風郿人也少受業太學通五經善談論故京師為之語曰五經紛綸井大春紛綸猶浩博也性清高未嘗脩刺候人建武末沛王輔等五王居北宫皆好賓客更遣請丹不能致信陽侯隂就光烈皇后弟也以外戚貴盛乃詭説五王求錢千萬約能致丹而别使人要劫之丹不得已旣至就故為設麥飯葱葉之食丹推去之曰以君侯能供甘旨故來相過何其薄乎更致盛饌乃食及就起左右進輦丹笑曰吾聞桀駕人車豈此邪帝王紀曰桀以人駕車坐中皆失色就不得已而令去輦自是隐閉不關人事以壽終梁鴻傳梁鴻字伯鸞扶風平陵人也父讓王莽時為城門校尉封脩遠伯使奉少昊後寓於北地而卒前書莽改允吾為脩逺少昊金天氏之號次黄帝者北地今寕州也鴻時尚㓜以遭亂世因卷席而葬後受業太學家貧而尚節介博覽無不通而不為章句學畢乃收豕於上林苑中曾誤遺火延及它舎鴻乃尋訪燒者問所去失去亡也悉以豕償之其主猶以為少鴻曰無它財願以身居作主人許之因為執勤不懈朝夕隣家耆老見鴻非恒人乃共責讓主人而稱鴻長者於是始敬異焉悉還其豕鴻不受而去歸鄉里勢家慕其髙節多欲女之以女妻人曰女音尼慮反鴻並絶不娶同縣孟氏有女狀肥醜而黑力舉石臼擇對不嫁至年三十父母問其故女曰欲得賢如梁伯鸞者鴻聞而聘之女求作布衣麻屨織作筐緝績之具及嫁始以装餙入門七日而鴻不荅妻乃跪牀下請曰竊聞夫子髙義簡斥數婦斥逺也妾亦偃蹇數夫矣今而見擇敢不請罪鴻曰吾欲裘褐之人可與俱隐深山者爾今乃衣綺縞傅粉墨豈鴻所願哉妻曰以觀夫子之志耳妾自有隐居之服乃更為椎䯻著布衣操作而前鴻大喜曰此眞梁鴻妻也能奉我矣字之曰徳曜名孟光居有頃妻曰常聞夫子欲隐居避患今何為默默無乃欲低頭就之乎鴻曰諾乃共入霸陵山中以耕織為業詠詩書弹琴以自娛仰慕前世高士而為四皓以來二十四人作頌因東出闗過京師作五噫之歌曰陟彼北芒兮噫顧覽帝京兮噫宫室崔嵬兮噫人之劬勞兮噫遼遼未央兮噫肅宗聞而非之求鴻不得乃易姓運期名燿字侯光與妻子居齊魯之間有頃又去適吳將行作詩曰逝舊邦兮遐征將遥集兮東南心惙怛兮傷悴志菲菲兮升降爾雅注惙怛憂也菲菲髙下不定也惙音丁劣反降音下江反詩曰我心則降欲乘策兮縱邁疾吾俗兮作讒競舉枉兮措直咸先佞兮唌唌論語曰舉直措諸枉則人服舉枉措諸直則人不服唌音延讒言㨗急之貌固靡慙兮獨建冀異州兮尚賢建立也言已無慙於獨立所以適吳者冀異州之人貴尚賢德聊逍搖兮遨嬉纘仲尼兮周流儻云覩兮我悅遂舎車兮即浮舎其車而就舟船過季札兮延陵求魯連兮海隅雖不察兮光貌幸神靈兮與休光貌光儀也言雖不察見季札及魯連然冀幸其神靈與之同美也惟季春兮華阜麥含含兮方秀哀茂時兮逾邁愍芳香兮日臭茂盛也臭敗也悼吾心兮不獲長委結兮焉究委結懐恨也究窮也口囂囂兮余訕嗟恇恇兮誰留訕謗也鄭𤣥注禮記曰恇恇恐也遂至吳依大家臯伯通居廡下説文曰廡堂下周屋也釋名大屋曰廡為人賃舂每歸妻為具食不敢於鴻前仰視舉案齊眉伯通察而異之曰彼傭能使其妻敬之如此非凡人也乃方舎之於家鴻潛閉著書十餘篇疾且困告主人曰昔延陵季子葬子於嬴博之間不歸鄉里愼勿令我子持喪歸去及卒伯通等為求葬地於吳要離冢傍咸曰要離烈士而伯鸞清髙可令相近要離刺吳王僚子慶忌者冢在今蘇州吳縣西伯鸞墓在其北葬畢妻子歸扶風初鴻友人京兆髙恢少好老子隐於華隂山中及鴻東遊思恢作詩曰鳥嚶嚶兮友之期毛詩曰伐木丁丁鳥鳴嚶嚶出自幽谷遷于喬木嚶其鳴矣求其友聲念髙子兮僕懐思想念恢兮爰集兹二人遂不復相見恢亦高抗終身不仕高士傳曰恢字伯通髙鳳傳髙鳳字文通南陽葉人也少為書生家以農畝為業而專精誦讀晝夜不息妻嘗之田曝麥於庭令鳳䕶鷄時天暴雨而鳳持竿誦經不覺潦水流麥妻還怪問鳳方悟之其後遂為名儒乃教授業於西唐山中山在今唐州湖陽縣西北酈元注水經云即髙鳳所隐之西唐山也劉攽曰正文按教授業不成文理明衍此一業字若存業則可去教字也鄰里有爭財者持兵而鬬鳳往解之不已乃脱巾叩頭固請曰仁義遜譲奈何棄之於是争者懐感投兵謝罪鳳年老執志不倦名聲著聞太守連召請恐不得免自言本巫家不應為吏又詐與寡嫂訟田遂不仕建初中將作大匠任隗舉鳳直言到公車託病逃歸推其財産悉與孤兄子隐身漁釣終於家論曰先大夫宣侯沈約宋書曰范泰字伯倫祖汪父寗宋髙祖受命拜金紫光禄大夫加散騎常侍領國子祭酒多所陳諫泰博覽篇籍好為文章愛奬後生孜孜無倦薨諡宣侯即曄之父也嘗以講道餘隙寓乎逸士之篇至髙文通傳輟而有感以為隐者也因著其行事而論之曰古者隐逸其風尚矣潁陽洗耳恥聞禪譲許由隐於潁陽聞堯欲禪乃臨潁而洗耳孤竹長飢羞食周粟伯夷叔齊孤竹君之子不食周粟或髙棲以違行或疾物以矯情雖軌跡異區其去就一也若伊人者志陵青雲之上身晦泥汙之下心名猶且不顯况怨累之為哉與夫委體淵沙鳴弦揆日者不其逺乎委體泉沙謂屈原懷沙礫而自沈也鳴弦揆日嵇康臨刑顧日景而彈琴也論者以事跡相明故引康為喻臺佟傳臺佟字孝威佟音大冬反魏郡鄴人也隐於武安山武安縣之山也鑿穴為居采藥自給建初中州辟不就刺史行部乃使從事致謁佟載病往謝刺史乃執贄見佟曰嵇康髙士傳曰刺史執棗栗之贄往孝威居身如是甚苦如何佟曰佟幸得保終性命存神養和如明使君奉宣詔書夕惕庻事反不苦邪遂去隐逸終不見韓康傳韓康字伯休一名恬休京兆霸陵人家世著姓常采藥名山賣於長安市口不二價三十餘年時有女子從康買藥康守價不移女子怒曰公是韓伯休那那語餘聲也音乃賀反乃不二價乎康歎曰我本欲避名今小女子皆知有我焉何用藥為乃遁入霸陵山中博士公車連徴不至桓帝乃備𤣥纁之禮以安車聘之使者奉詔造康康不得已乃許諾辭安車自乘柴車冐晨先使者發至亭亭長以韓徴君當過方發人牛脩道橋及見康柴車幅巾以為田叟也使奪其牛康即釋駕與之有頃使者至奪牛翁乃徴君也使者欲奏殺亭長康曰此自老子與之亭長何罪乃止康因道逃遁以壽終喬愼傳喬愼字仲彦風俗通曰晉大夫喬父之後也扶風茂陵人也少學黄老隐遯山谷因穴為室仰慕松喬導引之術與馬融蘇章鄉里並時融以才博顯名章以亷直為稱然皆推先於愼汝南吳蒼甚重之因遺書以觀其志曰仲彦足下勤處隐約雖乘雲行泥棲宿不同每有西風何嘗不歎汝南在扶風之東盖聞黄老之言乘虛入㝠藏身逺遯亦有理國養人施於為政老子曰致虛極守静篤又曰窈兮㝠兮其中有精又曰理大國若烹小鮮又曰非所以愛人治國也至如登山絶跡神不著其證人不覩其驗吾欲先生從其可者於意何如昔伊尹不懐道以待堯舜之君孟子曰湯使人以幣聘伊尹伊尹曰我何以湯之幣聘為哉豈若處畎畝之中由是以樂堯舜之道吾豈若使君為堯舜之君哉豈若使是人為堯舜之人哉劉攽曰注與我豈若處畎畝之中案文多豈若二字方今明明四海開闢巢許無為箕山夷齊悔入首陽足下審能騎龍弄鳳翔嬉雲間者列仙傳曰蕭史秦繆公時善吹簫公女弄玉好之以妻之遂教弄玉作鳳鳴居數十年吹鳳皇聲鳯來止其室為作鳳臺夫婦止其上一旦皆隨鳳皇飛去又曰陶安公六安冶師數行火火一旦㪚上紫色衝天須臾赤雀止冶上曰安公安公冶與天通七月七日迎汝以赤龍至時安公騎之而去也亦非狐燕雀所敢謀也愼不荅年七十餘竟不肯娶後忽歸家自言死日及期果卒後人有見愼於敦煌者故前世異之或云神仙焉愼同郡馬瑶隐於汧山以罝為事罝網也毛詩序曰罝后妃之化也關雎之化行則莫不好德賢人衆多故瑶以為事焉所居俗化百姓美之號馬牧先生焉戴良傳戴良字叔鸞汝南愼陽人也曾祖父遵字子高平帝時為侍御史王莽簒位稱病歸鄉里家富好給施尚俠氣食客嘗三四百人時人為之語曰關東大豪戴子高良少誕節母憙驢鳴憙音虛記反良嘗學之以娛樂焉及母卒兄伯鸞居廬啜粥非禮不行良獨食肉飲酒哀至乃哭而二人俱有毁容或問良曰子之居喪禮乎良曰然禮所以制情佚也情茍不佚何禮之論夫食㫖不甘故致毁容之實若味不存口食之可也論者不能奪之良才旣髙逹而論議尚竒多駭流俗同郡謝季孝問曰子自視天下孰可為比良曰我若仲尼長東魯大禹出西羌帝王紀曰夏禹生於石紐長於西羌西夷之人也獨歩天下誰與為偶舉孝亷不就再辟司空府彌年不到州郡迫之乃遯辭詣府遯遜也悉將妻子既行在道因逃入江夏山中優游不仕以壽終初良五女並賢每有求姻輙便許嫁疎裳布被竹笥木屐以遣之五女能遵其訓皆有隐者之風焉法眞傳法眞字髙卿髙一作喬扶風郿人南郡太守雄之子也好學而無常家博通内外圖典為關西大儒弟子自逺方至者陳留范冉等數百人性恬静寡欲不交人間事太守請見之眞乃幅巾詣謁太守曰昔魯哀公雖為不肖而仲尼稱臣太守虛薄欲以功曹相屈光贊本朝何如眞曰以明府見待有禮故敢自同賓末若欲吏之眞將在北山之北南山之南矣太守戄然不敢復言戄音紀具反辟公府舉賢良皆不就同郡田羽薦眞曰處士法眞體兼四業謂詩書禮樂也學窮典奥幽居恬泊樂以忘憂將蹈老氏之髙蹤不為𤣥纁屈也臣願聖朝就加衮職毛詩曰衮職有闕謂三公也必能唱清廟之歌致來儀之鳳矣詩清廟曰於穆清廟肅雍顯相濟濟多士秉文之德尚書曰簫韶九成鳳皇來儀會順帝西廵羽又薦之帝虚心欲致前後四徵眞曰吾旣不能遯形逺世豈飲洗耳之水哉遂深自隱絶終不降屈友人郭正稱之曰法眞名可得聞身難得而見逃名而名我隨避名而名我追可謂百世之師者矣乃共刋石頌之號曰𤣥德先生年八十九中平五年以壽終漢隂老父傳漢隂老父者不知何許人也桓帝延熹中幸竟陵過雲夢臨沔水百姓莫不觀者有老父獨耕不輟尚書郎南陽張溫異之使問曰人皆來觀老父獨不輟何邪老父笑而不對溫下道百歩自與言老父曰我野人耳不達斯語請問天下亂而立天子邪理而立天子邪立天子以父天下邪役天下以奉天子邪昔聖王宰世茅茨采椽而萬人以寧韓子曰堯舜采掾不刮茅茨不剪今子之君勞人自縱逸遊無忌吾為子羞之子何忍欲人觀之乎溫大慙問其姓名不告而去陳留老父傳陳留老父者不知何許人也桓帝世黨錮事起守外黄令陳留張升去官歸鄉里道逢友人共班草而言班布也升曰吾聞趙殺鳴犢仲尼臨河而反覆巢竭淵龍鳳逝而不至解見獨行傳今宦豎日亂䧟害忠良賢人君子其去朝乎夫德之不建人之無援左傳曰臧文仲聞六與蓼滅曰臯陶廷堅不祀忽諸德之不建人之無援哀哉將性命之不免奈何因相抱而泣老父趨而過之植其杖太息言曰吁二丈夫何泣之悲也夫龍不隱鱗鳳不藏羽網羅高懸去將安所雖泣何及乎毛詩曰啜其泣矣何嗟及矣言雖泣而無所及矣二人欲與之語不顧而去莫知所終龎公傳龎公者南郡襄陽人也居峴山之南峴山在今襄陽縣襄陽記曰諸葛孔明每至德公家獨拜牀下德公初不令止司馬德操嘗詣德公値其渡沔上先人墓德操徑入其室呼德公妻子使速作黍徐元直向云當來就我與德公談其妻子皆羅拜於堂下奔走共設須臾德公還直入相就不知何者是客也德操年小德公十歲兄事之呼作龎公故俗人遂謂龎公是德公名非也未嘗入城府夫妻相敬如賔荆州刺史劉表數延請不能屈乃就候之曰夫保全一身孰若保全天下乎龎公笑曰鴻鵠巢於高林之上暮而得所棲黿鼉穴於深淵之下夕而得所宿夫趣舎行止亦人之巢穴也且各得其棲宿而已天下非所保也因釋耕於壟上而妻子耘於前表指而問曰先生苦居畎畝而不肯官祿後世何以遺子孫乎襄陽記曰德公子字山人亦有令名娶諸葛孔明姊為魏黄門吏部郎子渙晉太康中為牂牁太守劉攽曰正文案苦居畎畝不成文理當有一良字龎公曰世人皆遺之以危今獨遺之以安雖所遺不同未為無所遺也表歎息而去後遂携其妻子登鹿門山因采藥不反襄陽記曰鹿門山舊名蘇嶺山建武中襄陽侯習郁立神祠於山刻二石鹿夾神道口俗因謂之鹿門廟遂以廟名山也贊曰江海㝠滅山林長往遠性風疎逸情雲上道就虚全事違塵枉違逺也後漢書巻一百十三後漢書卷一百十三考證嚴光傳字子陵一名遵何焯曰遵君平名也史家誤仍會稽典錄朱育對濮陽興之語不以前書校之耳後漢書卷一百十三考證
