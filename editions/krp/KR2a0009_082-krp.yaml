body:
  text: 後漢書卷八十二宋宣城太守范煜撰唐章懷太子賢注崔駰列傳第四十二崔駰傳子瑗孫實崔駰字亭伯涿郡安平人也高祖父朝昭帝時為幽州從事諌刺史無與燕刺王通及刺王敗擢為侍御史燕刺王旦武帝子坐與上官桀等謀亂自殺刺力割反生子舒歴四郡太守所在有能名舒小子篆王莽時為郡文學以眀經徴詣公車太保甄豐舉為歩兵校尉篆辭曰吾聞伐國不問仁人前書董仲舒曰昔在魯君問栁下惠曰吾欲伐齊如何栁下惠曰不可歸而有憂色曰吾聞伐國不問仁人此言何為至於我哉戰陳不訪儒士論語云衛靈公問陳於孔子孔子對曰爼豆之事則嘗聞之軍旅之事未之學也此舉奚為至哉遂投劾歸投辭自劾有過不合應舉莽嫌諸不附己者多以法中傷之時篆兄發以佞巧幸於莽位至大司空母師氏能通經學百家之言莽寵以殊禮賜號義成夫人金印紫綬文軒丹轂顯於新世後以篆為建新大尹莽改千乘郡曰建新守曰大尹篆不得已乃歎曰吾生無妄之世値澆羿之君易曰無妄之行窮之災也左傳曰昔有夏之方衰也后羿自鉏遷於窮石因夏人以代夏政而淫於原獸用寒浞伯眀氏之䜛子弟也而虞羿于田以取其國家浞因羿室生澆及􅜦恃其䜛慝詐偽而不德於人澆音五弔反􅜦音許既反上有老母下有兄弟安得獨潔已而危所生哉乃遂單車到官稱疾不視事三年不行縣續漢志曰郡國常以春行至縣勸人農桑振救乏絶門下掾倪敞諌篆乃强起班春班布春令所至之縣獄犴填滿犴音岸前書音義曰鄉亭之獄曰犴篆垂涕曰嗟乎刑罰不中乃陷人於穽此皆何罪而至於是遂平理所出二千餘人掾吏叩頭諌曰劉攽曰案吏當作史總言之掾史皆吏也獨言之當云史耳朝廷初政州牧峻刻初政謂莽即位宥過申枉誠仁者之心然獨為君子將有悔乎篆曰邾文公不以一人易其身君子謂之知命左傳曰邾文公卜遷於繹史曰利於人不利於君邾子曰茍利於人孤之利也人既利矣孤必與焉遂遷於繹五月邾文公卒君子曰知命也如殺一大尹贖二千人蓋所願也遂稱疾去建武初朝廷多薦言之者幽州刺史又舉篆賢良篆自以宗門受莽偽寵慚愧漢朝遂辭歸不仕客居滎陽閉門潛思著周易林六十四篇用决吉凶多所占驗臨終作賦以自悼名慰志其辭曰嘉昔人之遘辰兮遘遇也辰時也美伊傅之選時伊尹干湯傅説遇高宗爾雅曰選遇也音五故反應規矩之淑質兮過班倕而裁之公輸班魯人也倕舜時為共工之言皆巧人也以喻湯及高宗也協準矱之貞度兮同斷金之𤣥䇿準繩也矱尺也貞正也易曰二人同心其利斷金𤣥䇿猶妙䇿也何天衢於盛世兮超千載而垂績易大畜卦乾下艮上其上九曰何天之衢亨鄭𤣥云艮為手手上肩也乾為首首肩之間荷物處乾為天艮為徑路天衢象也豈脩德之極致兮將天祚之攸適愍余生之不造兮造成也丁漢氏之中微丁當也氛霓鬱以横厲兮羲和忽以濳暉氛祲也霓日傍之氣横厲謂氣盛而陵於天也羲和日也氣盛而日光微喻王莽簒漢六柄制於家門兮王綱漼以陵遲國語管仲對齊桓公曰昔者聖人之理天下也而慎用其六柄焉韋昭注云六柄生殺貧賤富貴也漼猶摧落也音千隗反黎共奮以跋扈兮羿浞狂以恣雎國語曰昔少皥之衰九黎亂德人神雜揉不可方物淮南子曰昔者共工與顓頊爭為帝怒而觸不周之山天柱折地維絶跋扈強梁也恣雎自用之貌也恣音訾雎音許維反羿浞己見上睹嫚臧而乘釁兮竊神器之萬機易曰嫚藏誨盗釁隙也神器帝王之位老子曰天下神器不可為也書云兢兢業業一日二日萬機思輔弼以媮存兮亦號咷以詶咨輔弼謂王莽輔政也媮茍且也號咷哀呼也前書王莽䇿孺子嬰為定安公莽親執孺子手流涕歔欷也嗟三事之我負兮乃廹余以天威三事謂三公也負謂太保甄豐舉也豈無熊僚之微介兮悼我生之殱夷左傳曰楚白公勝為亂石乞曰市南有熊相宜僚者若得之可以當五百人矣從白公而見之與之言説告之故辭承之以劒不動勝曰不為利謟不為威惕不泄人言以求媚者去之介耿介也我生謂母也殱滅也夷傷也言其母老恐禍及也庶眀哲之末風兮懼大雅之所譏詩大雅曰既眀且哲以保其身遂翕翼以委命兮受符守乎艮維艮東北之位謂篆為千乘太守也恨遭閉而不隱兮違石門之高蹤易曰天地閉而賢人隱論語曰子路宿於石門晨門曰奚自子路曰自孔氏曰是知其不可而為之者歟揚蛾眉於復關兮犯孔戒之冶容楚詞曰衆女皆妒余之蛾眉詩國風序曰氓刺時也淫風大行男女無别故序其事以風焉其詩曰乘彼垝垣以望復關毛萇注云垝毁也復關君子所近之處也易繫辭曰冶容誨淫鄭𤣥云謂飾其容而見於外曰冶懿氓蚩之悟悔兮慕白駒之所從詩曰氓之蚩蚩抱布貿絲匪來貿絲來即我謀注云氓人也蚩蚩殷厚之貌布幣也即就也言此之人非買絲來就我為室家也又曰及爾偕老老使我怨注云我欲與汝俱至老汝反薄我使怨也又曰皎皎白駒喻賢人也乃稱疾而屢復兮歴三祀而見許復猶白也悠輕舉以逺遁兮託峻峗以幽處峻峗謂山也峗音魚委反竫潛思於至賾兮騁六經之奥府賾深也皇再命而紹䘏兮乃云眷乎建武皇天也紹繼也䘏憂也言天憂䘏眷顧漢家所以再命光武也運欃槍以電掃兮清六合之土宇欃槍彗也聖德滂以横被兮黎庶愷以鼓舞闢四門以博延兮彼幽牧之我舉開闢四方之門廣求賢也幽牧謂為幽州刺史所舉也分畫定而計決兮豈云賁乎鄙耉賁飾也易曰束帛戔戔賁於丘園也遂縣車以縶馬兮絶時俗之進取歎暮春之成服兮闔衡門以掃軌論語曽㸃曰暮春者春服既成衡横也謂横木為門軌跡也聊優游以永日兮守性命以盡齒齒年也貴啟體之歸全兮庶不忝乎先子論語曰曾子有疾召門弟子曰啟予足注云父母全而生之亦當全而歸之忝辱也先子謂先人也孟子曾西曰吾先子之所畏也篆生毅以疾隱身不仕毅生駰年十三能通詩易春秋博學有偉才盡通古今訓詁百家之言善屬文少游太學與班固傅毅同時齊名常以典籍為業未遑仕進之事時人或譏其太𤣥靜將以後名失實駰擬揚雄解嘲作達㫖以荅焉華嶠書曰駰譏揚雄以為范蔡鄒衍之徒乘釁相傾誑曜諸侯者也而云彼我異時又曰竊貲卓氏割炙細君斯蓋士之贅行而云不能與此數公者同以為失類而改之也其辭曰或説己曰易稱備物致用可觀而有所合故能扶陽以出順隂而入備物致用易繫辭之文也可觀而有所合序卦之文也鄭𤣥注易乾鑿度曰陽起於子隂起於午天數大分以陽出離以隂入坎坎為中男離為中女太乙之行出從中男入從中女因隂陽男女之偶為終始也春發其華秋收其實有始有極爰登其質今子韞櫝六經服膺道術韞匣也櫝匱也論語曰有美玉韞櫝而藏諸歴世而游髙談有日俯鉤深於重淵仰探逺乎九乾易曰探賾索隱鉤深致逺九乾謂天有九重也離騷天問曰圓則九重孰營度之窮至賾於幽微測潛隱之無源然下不歩卿相之廷上不登王公之門進不黨以讚已退不黷於庸人讃猶稱也獨師友道德合符曩真抱景特立與士不羣葢高樹靡隂獨木不林隨時之宜道貴從凡華嶠書作高樹不庇易曰隨時之義大矣哉老子曰和其光而同其塵故言道貴從凡於時太上運天德以君世憲王僚而布官太上明帝也傳曰太上立德天徳含𢎞光大也易曰乃位乎天德尚書曰唐虞稽古建官惟百夏啇官倍亦克用乂憲法也僚官也言法三王而建官也臨雍泮以恢儒疏軒冕以崇賢天子辟雍諸侯頖宫璧雍者環之以水圎而加璧也頖半也諸侯半天子之宫皆所以立學垂教也率惇德以厲忠孝揚茂化以砥仁義砥礪也選利器於良材求鏌鋣於明智吳越春秋曰干將吳人也造二劒一曰干將二曰莫邪莫邪者干將之妻名也干將作劒采五山之精合六金之英百神臨觀遂以成劒説苑曰所以尚干將莫邪者貴其立斷所以尚騏驥者貴其立至必且歴日曠久絲氂猶能栔石駑馬亦能致逺是以聰明敏㨗人之美材也不以此時攀台階闚紫闥三台謂之三階三公之象也據高軒望朱闕夫欲千里而咫尺未發八寸曰咫蒙竊惑焉故英人乘斯時也文子曰智過萬人謂之英千人謂之俊猶逸禽之赴深林蝱蚋之趣大沛蚋小蟲蚊之類蚋音芮説文曰秦謂之蚋楚謂之蚊孟子曰汚池沛澤劉熙曰沛水草相半胡為嘿嘿而乆沉滯也荅曰有是言乎子茍欲勉我以世路不知其跌而失吾之度也古者隂陽始分天地初制制協韻音之設反皇綱云緒帝紀乃設傳序歴數三代興滅昔大庭尚矣赫胥罔識大庭赫胥並古帝王號也尚逺也罔無也識記也淳樸散離人物錯乖高辛攸降厥趣各違高辛氏帝嚳也道無常稽與時張弛隨時弛張不考之於常道也失仁為非得義為是老子曰失道後德失德後仁失仁後義失義後禮君子通變各審所履故士或掩目而淵潛荘子曰北人無澤與舜為友舜以天下讓之無澤乃自投清泠之淵終身不反也或盥耳而山棲盥洗也許由字武仲隱於沛澤之中堯聞之乃致天下而讓焉由以為汚乃臨池洗耳其友巢父飲犢聞由為堯所讓曰何以汚吾犢口牽於上流而飲之見荘子及高士傳或草耕而僅飽伯成子髙唐虞時為諸侯至禹去而耕禹往見之則耕在野見吕氏春秋或木茹而長飢説苑曰鮑焦衣木皮食木實韓詩外傳曰焦弃其蔬而立槁死於洛濵也或重聘而不來狂接輿者楚人也耕而食楚王聞其賢使使者持金百鎰車二駟聘之曰願煩先生理江南接輿笑而不應使者去而逺徙莫知所之見荘子或屢黜而不去論語曰栁下惠為士師三黜人曰可以去矣曰直道而事人何往而不三黜也或冒訽以干進或望色而斯舉訽辱也音火豆反新序曰伊尹蒙耻辱負鼎爼以干湯論語曰色斯舉矣翔而後集舉協韻音據或以役夫發夢於王公高宗夢得説乃使百工營求諸野得諸傅巖孔安國曰傅氏之巖在虞虢之界通道所經有澗水環道常使胥靡刑人築護此道説賢而隱代胥靡築之以供食事見尚書王公總而言也爾雅皇王后辟公侯君也或以漁父見兆於元龜戰國䇿曰吕尚之遇文王也身為漁父史記曰太公以釣干周西伯西伯將出獵卜之曰所獲非龍非螭非熊非羆所獲霸王之輔於是西伯獵果遇太公渭水之陽與語大説元大也若夫紛繷塞路凶虐播流方言云繷盛多也音奴董反人有昏墊之戹主有疇咨之憂尚書曰下民昏墊孔安國曰昬瞀墊溺皆困水災也又曰帝曰咨洪水滔天浩浩懷山襄陵有能俾乂條垂藟蔓上下相求藟藤也音壘詩曰南有樛木葛藟纍之於是乎賢人授手援世之災孟子曰天下溺則援之以道嫂溺則援之以手也跋渉赴俗急斯時也草行為跋昔堯含慼而臯陶謨高祖歎而子房慮謨謀也堯遭洪水咨嗟憂愁訪下人有能理者臯陶大禹陳其謨見尚書及史記高祖為項羽所敗下馬踞鞍而問子房曰吾欲捐關以東誰可與共功者子房曰九江王布彭越韓信即欲捐之此三人楚可破之劉攽曰注末之字案文當作也禍不散而曹絳奮曹參及絳侯周勃皆從髙祖征伐以定天下也結不解而陳平權高祖擊匈奴至白登被圍七日用陳平計得出及其䇿合道從克亂弭衝乃將鏤𤣥珪冊顯功珪玉也詩含神霧曰刻之玉版藏之金匱銘昆吾之冶墨子曰昔夏后開冶使飛亷析金於山以鑄鼎於昆吾蔡邕銘論曰吕尚作周太師其功銘於昆吾之鼎也勒景襄之鍾國語曰晉魏顆以其身退秦師於輔氏其勲銘於景鍾此兼言襄也與其有事則褰裳濡足冠挂不顧褰裳渉水也新序曰今為濡足之故不救人溺可乎淮南子曰禹之趨時冠挂而不顧履遺而不取也劉攽曰與其有事案文與合作當上又合有故字揚雄蔡邕同用此律也人溺不拯則非仁也當其無事則躐纓整襟規矩其歩躐音吕渉反躐踐也此字宜從手廣雅云躐持也言持纓整襟修其容止史記曰攝纓整襟華嶠書躐作攝也德讓不脩則非忠也是以險則救俗平則守禮舉以公心不私其體今聖上之育斯人也樸以皇質雕以唐文孔子曰大哉堯之為君也煥乎其有文章故言唐文六合怡怡比屋為仁壹天下之衆異齊品類之萬殊參差同量坏冶一陶坏土器之未燒者郭璞注爾雅曰坏胎物之始也坏音普才反羣生得理庶績其凝凝成也家家有以樂和人人有以自優威械蔵而爼豆布六典陳而九刑厝械謂器械甲兵之屬厝謂置之不用周禮太宰之職掌建邦之六典以佐王理邦國一曰理典二曰教典三曰禮典四曰政典五曰刑典六曰事典左傳曰周有亂政而作九刑杜預注云周之衰為刑書謂之九刑濟茲兆庶出於平易之路雖有力牧之略尚父之厲力牧黄帝臣也史記尚父吕望相武王以伐紂厲謂威容嚴厲伊臯不論奚事范蔡伊尹臯繇范雎蔡澤夫廣厦成而茂木暢逺求存而良馬縶廣厦既成不求材故林木條暢也逺求謂逺方珍異之物也存猶止息也言所求之物既止不資良馬之力也隂事終而水宿藏立冬之後盛德在水隂氣用事故曰隂事水宿謂北方七宿斗牛女虚危室壁也月令曰孟冬之月昏危中仲冬昬東壁中季冬昏婁中孟春昏參中水星伏蔵不見也場功畢而大火入爾雅曰心為大火詩豳風曰七月流火又曰九月築場圃也方斯之際處士山積學者川流衣裳被宇冠蓋雲浮譬猶衡陽之林岱隂之麓山南曰陽山北曰隂榖梁傳曰林屬於山曰麓伐尋抱不為之稀蓺拱把不為之數八尺曰尋蓺植也兩手曰拱數猶概也數音疏角反悠悠罔極亦各有得悠悠衆多也罔極猶無窮也亦各有得言皆自以為得也彼採其華我收其實舎之則藏已所學也彼彼衆人也論語曰用之則行舍之則藏故進動以道則不辭執珪而秉柱國吕氏春秋曰得伍員者位執珪前書音義曰古爵名也又曰柱國楚官猶秦之相國也復靜以理則甘糟糠而安藜藿夫君子非不欲仕也恥夸毗以求舉夸毗謂佞人足恭善為進退非不欲室也惡登牆而摟處孟子曰踰東家牆摟其處子則得妻不摟則不得將摟之乎趙岐注云摟牽也其字從手處子處女也呌呼衒鬻縣旌自表非隨和之寳也暴智燿世因以干祿非仲尼之道也華嶠書曰因字作回回邪也游不倫黨茍以徇已倫謂等倫黨謂朋黨徇營也言交非其類茍以營已而已汗血競時利合而友汙血謂勞力也競時謂趨時也利合而友不以道義子笑我之沈滯吾亦病子㞕㞕而不已也㞕㞕猶區區也先人有則而我弗虧行有枉徑而我非隨枉曲也徑道也臧否在予唯世所議固將因天質之自然誦上哲之高訓詠太平之清風行天下之至順懼吾躬之穢德勤百畆之不耘尚書曰穢德彰聞禮記曰夫人情者聖王之田也修禮以耕之陳義以種之講學以耨之古者夫田百畝耘除草也縶余馬以安行俟性命之所存安行不奔馳也天命之謂性言隱居以體命昔孔子起威於夾谷解見陳禪傳晏嬰發勇於崔杼解見馮衍傳曹劌舉節於柯盟曹劌曹沬也史記曰曹沬以勇事魯荘公為魯將與齊戰三敗荘公懼乃獻遂邑地以和猶以為将齊桓公與荘公㑹於柯盟桓公與荘公既盟於壇上曹沬以七首劫齊桓公左右莫敢動乃還魯之侵地卞嚴克㨗於彊禦新序曰卞荘子養母戰而三北交游非之國君辱之及母死三年齊與魯戰荘子請從遂赴敵而鬭三獲甲首曰夫三北以養母也今志節小具而責塞矣吾聞之節士不以辱生遂反敵殺十人而死君子曰三北已塞滅世斷宗於孝未終也范蠡錯埶於㑹稽錯置也音七故反埶謂謀略也史記曰吳王敗越於夫椒越王乃以餘兵五千人保於㑹稽吳師追而圍之越王謂范蠡曰奈何范蠡對曰卑辭厚禮以遺之勾踐乃命大夫種行成於吳膝行頓首曰勾踐請為臣妻為妾吳王乃赦越王越王反國拊循其士范蠡曰可矣乃伐吳吳師敗越復棲吳王姑蘇之山也伍員樹功於柏舉伍子胥名員楚人也子胥父誅於楚子胥挾弓矢而干吳王闔閭闔閭甚勇之為興師伐楚戰於柏舉楚師敗績事見榖梁傳魯連辯言以退燕史記曰魯仲連齊人也燕將攻下齊聊城固保守之田單攻之不下魯仲連乃為書遺燕將燕將見書泣三日乃自殺遂平聊城包胥單辭而存楚左傳曰楚昭王為吳所敗奔隋申包胥如秦乞師曰吳為封豕長蛇以荐食上國寡君越在草莽使下臣告急立依於庭牆而哭日夜不絶聲勺飲不入口七日秦師乃出軍敗吳而復楚國唐且華顛以悟秦唐且即唐雎也戰國䇿曰齊楚伐魏魏使人請救於秦不至魏人有唐雎者年九十餘矣西見秦王秦王曰丈人忙然乃逺至此魏來者數矣寡人知魏之急矣唐且曰夫魏萬乘之國也稱東藩者以秦之彊也今齊楚之兵已在魏郊矣大王之救不至魏急且割地而約從是王亡一萬乘之魏而强二敵之齊楚秦王悟遽發兵救魏爾雅曰顛頂也華顛謂白首也甘羅童牙而報趙甘羅下蔡人甘茂孫也年十二事秦相吕不韋秦使張唐往相燕羅曰借臣車五乘請為張唐先報趙不韋乃言之於始皇召見使甘羅於趙趙襄王郊迎事見史記童牙謂幼小也原衰見亷於壺飱昔趙衰為原大夫故曰原衰左傳曰晉侯問原守於寺人勃鞮對曰昔趙衰以壺飱從徑餒而不食故使䖏原見音胡殿反宣孟收德於束脯吕覽曰昔趙宣孟將之絳見桑下有餓人宣孟止車下食而餔之再咽而能視宣孟問之曰汝何為而餓若是對曰臣官於絳歸而糧絶羞行乞故至於此宣子與脯三朐拜受而弗敢食問其故曰臣有老母將以遺之宣孟曰食之吾更與汝乃復與脯二束吳札結信於丘木史記曰吳公子季札使過徐徐君好季札劒口不敢言季札知之為使上國未獻洎還至徐徐君已死於是乃解其寳劒繫之徐君冢樹而去展季効貞於門女展季栁下惠也韓詩外傳曰魯有男子獨處夜暴風雨至婦人趨而託之男子閉戸不納曰吾聞男女不六十不間居婦人曰子何不學栁下惠然嫗不逮門之女國人不稱其亂焉顔囘眀仁於度轂程嬰顯義於趙武程嬰解見馮衍傳度轂未詳僕誠不能編德於數者竊慕古人之所序元和中肅宗始修古禮廵狩方岳駰上四廵頌以稱漢德辭甚典美文多故不載案駰集有東西南北四廵頌流俗本四多作西者誤帝雅好文章自見駰頌後常嗟歎之謂侍中竇憲曰卿寧知崔駰乎對曰班固數為臣説之然未見也帝曰公愛班固而忽崔駰此葉公之好龍也試請見之劉向新序曰子張見魯哀公七日哀公不禮焉而去曰君之好士有似葉公子髙好龍天龍聞而降之窺頭於牖拖尾於堂葉公見之失其魂魄五色無主是葉公非好龍也好夫似龍而非龍者駰由此候憲憲屣履迎門屣履謂納履曵之而行言怱遽也屣音山爾反笑謂駰曰亭伯吾受詔交公公何得薄哉遂揖入為上客居無幾何帝幸憲第時駰適在憲所帝聞而欲召見之憲諌以為不宜與白衣㑹帝悟曰吾能令駰朝夕在傍何必於此適欲官之㑹帝崩竇太后臨朝憲以重戚出内詔命駰獻書誡之曰駰聞交淺而言深者愚也在賤而望貴者惑也未信而納忠者謗也三者皆所不宜而或蹈之者思効其區區憤盈而不能已也竊見足下體淳淑之姿躬高眀之量意羙志厲有上賢之風駰幸得充下館序後陳陳列也是以竭其拳拳敢進一言傳曰生而富者驕生而貴者慠生富貴而能不驕慠者未之有也今寵祿初隆百僚觀行當堯舜之盛世處光華之顯時尚書大傳曰舜時百工相和為卿雲之歌曰卿雲爛兮糺漫漫兮日月光華旦復旦兮豈可不庶幾夙夜以永衆譽𢎞申伯之羙致周邵之事乎申伯周宣王之元舅周公邵公皆輔佐周室也語曰不患無位患所以立論語曰孔子之言也言但患立身不處於仁義也昔馮野王以外戚居位稱為賢臣前書曰馮野王字君卿妹為元帝昭儀野王為左馮翊御史大夫缺上使尚書選第中二千石而野王行能第一近陰衛尉克已復禮終受多福陰衛尉光烈皇后同母弟興也以謹勑親幸焉郯氏之宗非不尊也史丹封郯故云郯氏前書史丹字君仲魯國人也祖父恭有女弟武帝時為衛太子良娣成帝即位擢丹為長樂尉遷右將軍封為武陽侯封東海郯之武彊聚以舊恩見褒賞賜累千金陽侯之族非不盛也劉攽曰案文侯當作平王鳯封陽平侯前書亦謂為陽平之王也重侯累将建天樞執斗柄王氏九侯五大司馬春秋運斗樞曰北斗七星第一名天樞第二至第四為魁第五至第七為杓杓即柄前書斗運中央制臨四海其所以獲譏於時垂愆於後者何也蓋在滿而不挹位有餘而仁不足也漢興以後迄於哀平外家二十保族全身四人而已外家當為后家也二十者謂高帝吕后産禄謀反誅惠帝張皇后廢文帝母薄太后弟昭被殺孝文帝竇皇后從昆弟子嬰誅景帝薄皇后武帝陳皇后並廢衛皇后自殺昭帝上官皇后家族誅宣帝祖母史良娣為巫蠱死宣帝母王夫人弟子商下獄死霍皇后家破元帝王皇后弟王莽簒位成帝許皇后賜死趙皇后廢自殺哀帝祖母傅太后家屬徙合浦平帝母衛姬家屬誅昭帝趙太后憂死是也四人者哀帝母丁姬景帝王皇后宣帝許皇后王皇后其家族並全書曰鑒於有殷可不慎哉竇氏之興肇自孝文二君以淳淑守道成名先曰竇太后之弟長君少君退讓君子不敢以富貴驕人故云淳淑守道也安豐以佐命著徳顯自中興竇融封為安豐侯内以忠誠自固外以法度自守卒享祚國垂祉於今夫謙德之光周易所羙滿溢之位道家所戒易曰謙尊而光卑而不可踰老子曰富貴而驕自遺其咎功成名遂而身退天之道也故君子福大而愈懼爵隆而益恭逺察近覽俯仰有則銘諸几杖刻諸盤杅太公金匱曰武王曰吾欲造起居之誡隨之以身几之書曰安無忘危存無忘亡孰惟二者必後無凶杖之書曰輔人無茍扶人無咎墨子曰堯舜禹湯書其事於竹帛琢之盤盂杅亦盂也矜矜業業無怠無荒如此則百福是荷慶流無窮矣及憲為車騎將軍辟駰為掾憲府貴重掾屬三十人皆故刺史二千石唯駰以處士年少擢在其間憲擅權驕恣駰數諌之及出擊匈奴道路愈多不法駰為主簿前後奏記數十指切長短憲不能容稍疏之因察駰高第出為長岑長長岑縣屬樂浪郡其地在遼東駰自以逺去不得意遂不之官而歸永元四年卒於家所著詩賦銘頌書記表七依婚禮結言達㫖酒警合二十一篇中子瑗瑗字子玉早孤鋭志好學盡能傳其父業年十八至亰師從侍中賈逵質正大義逵善待之瑗因留游學遂明天官歴數亰房易傳六日七分解見郎顗傳諸儒宗之與扶風馬融南陽張衡特相友好初瑗兄章為州人所殺瑗手刃報仇因亡命㑹赦歸家家貧兄弟同居數十年鄉邑化之年四十餘始為郡吏以事繫東郡發干獄發干縣之獄也獄掾善為禮瑗間考訊時輙問以禮説其專心好學雖顛沛必於是後事釋歸家為度遼將軍鄧遵所辟居無何遵被誅瑗免歸後復辟車騎將軍閻顯府時太后稱制顯入參政事先是安帝廢太子為濟隂王而以北鄉侯為嗣瑗以侯立不以正知顯將敗欲說令廢立而顯日沉醉不能得見乃謂長史陳禪曰中常侍江亰陳逹等得以嬖寵惑蠱先帝遂使廢黜正統扶立疏孽少帝即位發病廟中周勃之徴於斯復見吕后立恵帝後宫子為少帝周勃廢之也今欲與長史君共求見說將軍白太后收亰等廢少帝引立濟陰王必上當天心下合人望伊霍之功不下席而立則將軍兄弟傳祚於蕪窮若拒違天意乆曠神器則將以無罪并辜元惡元大也書曰元惡大憝此所謂禍福之㑹分功之時史記蔡澤説范雎曰君獨不觀夫博者乎或欲大投或欲分功今君相秦坐制諸侯使天下皆畏秦此亦秦分功之時也禪猶豫未敢從㑹北鄉侯薨孫程立濟隂王是為順帝閻顯兄弟悉伏誅瑗坐被斥門生蘓祗具知瑗謀欲上書言狀瑗聞而遽止之時陳禪為司隸校尉召瑗謂曰第聽祗上書禪請為之證第但也司馬相如曰第如臨邛瑗曰此譬猶兒妾屏語耳願使君勿復出口遂辭歸不復應州郡命乆之大將軍梁商初開莫府復首辟瑗自以再為貴戚吏不遇被斥遂以疾固辭嵗中舉茂才遷汲令汲縣名屬河内在事數言便宜為人開稻田數百頃視事七年百姓歌之漢安初大司農胡廣少府竇章共薦瑗宿德大儒從政有迹不宜久在下位由此遷濟北相時李固為太山太守美瑗文雅奉書禮致殷勤嵗餘光祿大夫杜喬為八使徇行郡國八使見周舉傳以臧罪奏瑗徴詣廷尉瑗上書自訟得理出㑹病卒年六十六臨終顧命子寔曰夫人稟天地之氣以生及其終也歸精於天還骨於地何地不可藏形骸勿歸鄉里其賵贈之物羊豕之奠一不得受寔奉遺令遂留葬洛陽瑗高於文辭尤善為書記箴銘所著賦碑銘箴頌七蘓瑗集載其文即枚乘七發之流南陽文學官志歎辭移社文悔祈草書埶七言凡五十七篇其南陽文學官志稱於後世諸能為文者皆自以弗及瑗愛士好賓客盛修肴膳單極滋味不問餘産居常蔬食菜羮而已家無擔石儲當世清之華嶠書曰瑗愛士好賓客盛修肴膳或言其太奢瑗聞之怒敕妻子曰吾并日而食以供賓客而反以獲譏士大夫不足養如此後勿過菜具無為諸子所蚩終不能改奉祿盡於賓饗也寔字子真一名台字元始少沈靜好典籍父卒隱居墓側服竟三公並辟皆不就桓帝初詔公卿郡國舉至孝獨行之士寔以郡舉徴詣公車病不對䇿除為郎眀於政體吏才有餘論當世便事數十條名曰政論指切時要言辯而确确堅正也音口角反當世稱之仲長統曰凡為人主宜寫一通置之坐側其辭曰自堯舜之帝湯武之王皆賴眀哲之佐博物之臣故臯陶陳謨而唐虞以興伊箕作訓而殷周用隆伊尹作伊訓箕子作洪範及繼體之君欲立中興之功者曷嘗不賴賢哲之謀乎凡天下所不理者常由人主承平日乆俗漸敝而不悟政寖衰而不改習亂安危怢不自覩怢音他没反怢忽忘也或荒耽嗜欲不恤萬機或耳蔽箴誨厭偽忽真厭飫姦偽輕忽至真或猶豫岐路莫適所從或見信之佐括囊守祿易曰括嚢無咎無譽括結也結嚢不言持祿而已或疎逺之臣言以賤廢是以王綱縱弛於上智士鬱伊於下鬱伊不申之貌楚詞曰獨伊蔚而誰語也悲夫自漢興以來三百五十餘嵗矣政令垢翫上下怠懈垢惡也風俗彫敝人庶巧偽百姓囂然咸復思中興之救矣且濟時拯世之術豈必體堯蹈舜然後乃理哉期於補䘺決壞枝柱邪傾䘺音直莧反禮記曰衣裳䘺裂紉箴請補綴柱音陟主反隨形裁割要措斯世於安寧之域而已故聖人執權遭時定制權謂變也遭遇其時而定法制不循於舊也歩驟之差各有云設不彊人以不能背急切而慕所聞也背當時之急切而慕所聞之事則非濟時之要蓋孔子對葉公以來逺哀公以臨人景公以節禮非其不同所急異務也韓子曰葉公問政於仲尼仲尼曰政在恱近而來逺魯哀公問政於仲尼仲尼曰政在選賢齊景公問政於仲尼仲尼曰政在節財此云臨人節禮文不同也是以受命之君每輙創制中興之主亦匡時失昔盤庚愍殷遷都易民盤庚殷王也自耿遷於亳邑作書三篇以告之周穆有闕甫侯正刑甫侯即吕侯也為周穆王訓暢夏禹用刑之法並見尚書俗人拘文牽古不達權制奇偉所聞簡忽所見烏可與論國家之大事哉故言事者雖合聖德輒見掎奪掎音居蟻反賈逵注國語曰從後牽曰掎何者其頑士闇於時權安習所見不知樂成況可慮始前書劉歆曰夫可與樂成難與慮始此乃衆庶所為耳苟云率由舊章而已其達者或矜名妬能耻䇿非己舞筆奮辭以破其義寡不勝衆遂見擯棄雖稷契復存猶將困焉斯賈生之所以排於絳灌屈子之所以攄其幽憤者也孝文帝時賈誼請更定律令列侯就國周勃灌嬰等毁之屈原為楚三閭大夫上官靳尚妬害其能憂愁憤懣遂作離騷經夫以文帝之眀賈生之賢絳灌之忠而有此患況其餘哉故宜量力度德春秋之義左氏傳曰息侯伐鄭不度德不量力劉攽曰故宜量力度德案文多故宜二字下文自有用故宜字處今既不能純法八世故宜參以霸政八世謂三皇五帝也霸政謂齊桓晉文也劉攽曰純法八世案文世當作代説己見前則宜重賞深罰以御之眀著法術以檢之自非上德嚴之則理寛之則亂何以眀其然也近孝宣皇帝眀於君人之道審於為政之理故嚴刑峻法破姦軌之膽海内清肅天下密如密靜也薦勲祖廟享號中宗算計見效優於孝文元帝即位多行寛政卒以墮損墮讀曰隳威權始奪遂為漢室基禍之主政道得失於斯可監昔孔子作春秋襃齊桓懿晉文歎管仲之功夫豈不美文武之道哉誠達權救敝之理也左傳齊桓公伐楚責以包茅不貢王祭不供晉文公召王盟諸侯於踐土管仲相公子紏而射桓公此並權變之道也故聖人能與世推移而俗士苦不知變楚詞漁父曰聖人不凝滯於物而與時推移也以為結繩之約可復理亂秦之緒干戚之舞足以解平城之圍易曰上古結繩而化後世聖人易之以書契干盾也戚鉞也尚書曰苖人逆命禹乃舞干羽於兩階七旬有苖格前書高祖被匈奴圍於平城用陳平計得解言干戚之舞非平城之所用也夫熊經鳥伸雖延歴之術非傷寒之理呼吸吐納雖度紀之道非續骨之膏莊子曰吹呴呼吸吐故納新熊經鳥伸此導引之士養形之人也黄帝素問曰人傷於寒而轉為熱何也夫寒盛則生於熱也度紀猶延年也言鳥伸不可療傷寒吸氣不能續斷骨也蓋為國之法有似理身平則養疾則攻焉夫刑罰者治亂之藥石也德教者興平之粱肉也夫以德教除殘是以粱肉理疾也以刑罰理平是以藥石供養也方今承百王之敝値戹運之㑹自數世以來政多恩貸馭委其轡馬駘其銜四牡横奔皇路險傾家語曰古者天子以德法為衘勒以百官為轡䇿善御馬者正衘勒齊轡䇿鈞馬力和馬心故口無聲而極千里善御人者一其德法正其百官均齊人物和安人心故刑不用而天下化説文曰駘馬銜脱也音逹來反皇路大路也方將拑勒鞬輈以救之豈暇鳴和鑾清節奏哉何休注公羊傳曰拑以木銜其口也拑音巨炎反勒馬轡輈車轅鞬猶束也説苑曰鑾設於鏕和設於軾馬動則鑾鳴鑾鳴則和應節也昔高祖令蕭何作九章之律有夷三族之令黥劓斬趾斷舌梟首故謂之具五刑文帝雖除肉刑當劓者笞三百當斬左趾者笞五百當斬右趾者棄市右趾者既殞其命笞撻者往往至死雖有輕刑之名其實殺也當此之時民皆思復肉刑至景帝元年乃下詔曰加笞與重罪無異幸而不死不可為民乃定律減笞輕捶自是之後笞者得全此以上並見前書刑法志以此言之文帝乃重刑非輕之也以嚴致平非以寛致平也必欲行若言當大定其本使人主師五帝而式三王式法也盪亡秦之俗遵先聖之風棄苟全之政蹈稽古之蹤復五等之爵立井田之制畝百為夫九夫為井然後選稷契為佐伊吕為輔樂作而鳳皇儀擊石而百獸舞尚書曰簫韶九成鳯皇來儀又䕫曰於余擊石拊石百獸率舞若不然則多為累而已其後辟太尉袁湯大將軍梁冀府並不應大司農羊傅少府何豹上書薦寔才美能高宜在朝廷召拜議郎遷大將軍冀司馬與邉韶延篤等著作東觀出為五原太守五原土宜麻枲而俗不知織績民冬月無衣積細草而臥其中見吏則衣草而出寔至官斥賣儲峙為作紡績織絍綀縕之具以教之民得以免寒苦杜預注左傳曰織絍織布者孔安國論語注曰緼枲也是時胡虜連入雲中朔方殺略吏民一嵗至九奔命寔整厲士馬嚴烽候虜不敢犯常為邊最最為第一以病徴拜議郎復與諸儒博士共雜定五經㑹梁冀誅寔以故吏免官禁錮數年時鮮卑數犯邊詔三公舉威武謀略之士司空黄瓊薦寔拜遼東太守行道母劉氏病卒上疏求歸葬行喪母有母儀淑德博覽書傳初寔在五原常訓以臨民之政寔之善績母有其助焉服竟召拜尚書寔以世方阻亂稱疾不視事數月免歸初寔父卒剽賣田宅起冢塋立碑頌廣雅曰剽削也音匹妙反一作標葬訖資産竭盡因窮困以酤釀販鬻為業時人多以此譏之寔終不改亦取足而已不致盈餘及仕宦劉攽曰案文宦當作官歴位邊郡而愈貧薄建寧中病卒家徒四壁立無以殯斂光祿勲楊賜太僕袁逄少府叚熲為備棺槨葬具大鴻臚袁隗樹碑頌德所著碑論箴銘答七言詞文表記書凡十五篇寔從兄烈有重名於北州歴位郡守九卿靈帝時開鴻都門榜賣官爵公卿州郡下至黄綬各有差其富者則先入錢貧者到官而後倍輸或因常侍阿保别自通達阿保謂傅母也是時叚熲樊陵張温等雖有功勤名譽然皆先輸貨財而後登公位烈時因傅母入錢五百萬得為司徒及拜日天子臨軒百僚畢㑹帝顧謂親倖者曰悔不小靳可至千萬靳固惜之也靳或作傿説文曰傿引為價也音一建反程夫人於傍應曰崔公冀州名士豈肯買官賴我得是反不知姝邪姝美也言反不知斯事之美也或作秼秼根本也烈於是聲譽衰減久之不自安從容問其子鈞曰吾居三公於議者何如鈞曰大人少有英稱歴位卿守論者不謂不當為三公而今登其位天下失望烈曰何為然也鈞曰論者嫌其銅臭烈怒舉杖擊之鈞時為虎賁中郎將服武弁戴鶡尾狼狽而走烈罵曰死卒父撾而走孝乎以其武官故罵為卒或作孔卒者誤也鈞曰舜之事父小杖則受大杖則走非不孝也家語曰曾子耘𤓰誤傷其根曾晳怒建大杖以擊其首曾子仆地不知人有頃乃蘇孔子聞之怒謂門弟子曰參來勿内也昔瞽叟有子曰舜瞽叟欲使之未嘗不往則欲殺之未嘗可得小箠則待大杖則逃不陷父於不義也烈慙而止烈後拜太尉鈞少交結英豪有名稱為西河大守獻帝初鈞與袁紹俱起兵山東董卓以是收烈付郿獄錮之鋃鐺鐵鎻説文曰鋃鐺鎻也前書曰人犯鑄錢以鐵鎻鋃鐺其頸鋃音郎鐺音當卓既誅拜烈城門校尉及李傕入長安為亂兵所殺烈有文才所著詩書教頌等凡四篇論曰崔氏世有羙才兼以沈淪典籍遂為儒家文林駰瑗雖先盡心於貴戚而能終之以居正則其歸㫖異夫進趣者乎李固高潔之士也與瑗隣郡奉贄以結好儀禮曰士相見之禮贄冬用雉夏用腒奉之曰某也欲見無由達腒乾雉音渠由此知名杜喬之劾殆其過矣寔之政論言當世理亂雖鼂錯之徒不能過也贊曰崔為文宗世禪雕龍史記曰談天衍彫龍奭劉向别錄曰言鄒奭脩飾之文若彫龍文也禪謂相傳授也建新耻潔摧志求容永矣長岑于遼之陰不有直道曷取泥沈瑗不言祿亦離寃辱子真持論感起昏俗後漢書卷八十二後漢書卷八十二考證崔駰傳或重聘而不來注持金百溢溢監本作鎰今從宋本臣松齡按荀子千溢之寳從水旁古今字本通用也崔駰孫實逹權救敝之理也注管仲相公子糾而射桓公此並權變之道也臣㑹汾按文當云管仲背公子糾而相桓公於義乃合及仕宦劉攽曰案文宦當作官臣㑹汾按此條乃傳寫之誤也仕官二字不成文理古書中言仕宦者甚多有何舛訛而劉攽乃作此説耶傳及注宦字當改官注中官字當改宦後漢書卷八十二考證
