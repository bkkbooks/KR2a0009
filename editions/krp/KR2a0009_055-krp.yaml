body:
  text: 後漢書卷五十五宋宣城太守范煜撰唐章懐太子賢注卓魯魏劉列傳第十五卓茂傳卓茂字子康南陽宛人也父祖皆至郡守茂元帝時學於長安事博士江生江生魯人江翁也昭帝時為博士號魯詩宗見前書習詩禮及歴算究極師法稱為通儒性寛仁恭愛鄉黨故舊雖行能與茂不同而皆愛慕欣欣焉東觀記曰茂爲人恬蕩樂道雅實不為華貌行已在於清濁之間自束髪至白首與人未嘗有爭競初辟丞相府史事孔光光稱為長者時嘗出行有人認其馬茂問曰子亡馬幾何時對曰月餘日矣茂有馬數年心知其謬嘿解與之挽車去頋曰若非公馬幸至丞相府歸我他日馬主别得亡者乃詣府送馬叩頭謝之茂性不好争如此後以儒術舉為侍郎給事黄門遷密令密今洛州密縣也勞心諄諄視人如子諄諄忠謹之貌也詩曰誨爾諄諄音之順反舉善而教口無惡言吏人親愛而不忍欺之家語曰宓子賤為單父宰人不忍欺人常有言部亭長受其米肉遺者部謂所部也茂辟左右問之曰亭長為從汝求乎為汝有事囑之而受乎将平居自以恩意遺之乎人曰往遺之耳茂曰遺之而受何故言邪人曰竊聞賢眀之君使人不畏吏吏不取人今我畏吏是以遺之吏既卒受故来言耳茂曰汝為敝人矣凡人所以貴於禽獸者以有仁愛知相敬事也今鄰里長老尚致饋遺此乃人道所以相親况吏與民乎吏顧不當乗威力強請求耳凡人之生羣居雜處故有經紀禮義以相交接汝獨不欲修之寧能高飛逺走不在人間邪亭長素善吏歳時遺之禮也人曰茍如此律何故禁之茂笑曰律設大法禮順人情今我以禮教汝汝必無怨惡以律治汝何所措其手足乎一門之内小者可論大者可殺也且歸念之於是人納其訓吏懐其恩初茂到縣有所廢置吏人笑之鄰城聞者皆嗤其不能河南郡為置守令茂不為嫌理事自若東觀記曰守令與茂並居久之吏人不歸往守令數年教化大行道不拾遺平帝時天下大蝗河南二十餘縣皆被其災獨不入密縣界督郵言之漢書志曰郡監縣有五部部有督郵掾以察諸縣也太守不信自出案行見乃服焉是時王莽秉政置大司農六部丞勸課農桑王莽攝政置大司農部丞十三人人部一州勸課農桑今書及東觀記並言六部遷茂為京部丞密人老少皆涕泣随送及莽居攝以病免歸郡常為門下掾祭酒不肯作職吏更始立以茂為侍中祭酒續漢志曰侍中無員掌侍左右顧問應對夲有僕射一人中興轉為祭酒從至長安知更始政亂以年老乞骸骨歸時光武初即位先訪求茂茂詣河陽謁見東觀記曰茂時年七十餘矣乃下詔曰前密令卓茂束身自脩執節淳固誠䏻為人所不䏻為夫名冠天下當受天下重賞故武王誅紂封比干之墓表商容之閭王子比干紂殺之商容殷賢臣武王入殷命閎天封比干之墓命畢公表商容之閭表旌顯也閭里門也事見史記今以茂為太傅封褒徳侯食邑二千戸東觀記續漢書皆作宣德侯賜几杖車馬衣一襲絮五百斤單複具謂之襲復以茂長子戎為太中大夫次子崇為中郎給事黄門建武四年薨賜棺槨冢地車駕素服親臨送葬子崇嗣徙封汎鄉侯官至大司農汎鄉在琅邪郡不其縣崇卒子棽嗣棽音丑金反又所金反棽卒子訢嗣訢卒子隆嗣永元十五年隆卒無子國除初茂與同縣孔休陳留蔡勲安衆劉宣楚國龔勝上黨鮑宣六人同志不仕王莽時並名重當時劉攽曰案文多一時字前後言不仕王莽者多矣不湏時字也休字子泉哀帝初守新都令新都縣也屬南陽郡後王莽秉權休去官歸家及莽篡位遣使齎𤣥纁束帛請為國師遂歐血託病杜門自絶光武即位求休勲子孫賜榖以旌顯之劉宣字子高安衆侯崇之從弟知王莽當篡乃變名姓抱經書𨼆避林藪建武初乃出光武以宣襲封安衆侯擢龔勝子賜為上谷太守勝鮑宣事在前書勲事在𤣥孫邕傳論曰建武之初雄豪方擾虓呼者連響嬰城者相望虓虎怒也詩曰闞如虓虎嬰城言以城自嬰繞斯固倥傯不暇給之日字書曰倥傯窮困也給足也日促事多不暇給足也卓茂斷斷小宰無它庸䏻斷斷猶専一也書斷斷猗無他技時已七十餘矣而首加聘命優辭重禮其與周燕之君表閭立館何異哉史記燕昭王即位欲雪齊恥以招賢者得郭隗為築宮而師事之於是蘊憤歸道之賔蘊積也越闗阻捐宗族以排金門者衆矣夫厚性寛中近於仁犯而不校鄰於恕校報也鄰近也曾子曰犯而不校率斯道也怨悔曷其至乎怨謂為人所怨也悔恨也魯恭傳弟丕魯恭字仲康扶風平陵人也其先出於魯頃公為楚所滅遷於下邑因氏焉世吏二千石哀平間自魯而徙祖父匡王葬時為羲和有權數號曰智囊匡設六筦之法以窮工商故曰權數父某建武初為武陵太守卒官時恭年十二弟丕七歳晝夜號踴不絶聲郡中賻贈無所受公羊傳曰貨財曰賻乃歸服䘮禮過成人鄉里奇之十五與母及丕俱居太學習魯詩髙祖時魯申公詩也閉戸講誦絶人間事兄弟俱為諸儒所稱學士爭歸之太尉趙熹慕其志每歳時遣子問以酒糧皆辭不受問遺也恭憐丕小欲先就其名託疾不仕郡數以禮請謝不肯應母强遣之恭不得已而西因留新豐教授建初初丕舉方正恭乃始為郡吏太傅趙熹聞而辟之肅宗集諸儒於白虎觀恭特以經明得召與其議與音豫熹復舉恭直言待詔公車拜中牟令恭専以徳化為理不任刑罰訟人許伯等争田累守令不䏻决恭為平理曲直皆退而自責輟耕相讓亭長從人借牛而不肯還之牛主訟於恭恭召亭長勑令歸牛者再三猶不從恭歎曰是教化不行也欲解印綬去掾史泣涕共留之續漢志曰縣置掾史如郡亭長乃慙悔還牛詣獄受罪恭貰不問貰寛貸也音時夜反於是吏人信服建初七年郡國螟傷稼犬牙縁界不入中牟河南尹袁安聞之疑其不寔使仁恕掾肥親往廉之仁恕掾主獄屬河南尹見漢官儀廉察也恭隨行阡陌俱坐桑下有雉過止其傍傍有童兒親曰兒何不捕之兒言雉方将雛親瞿然而起瞿音久住反與恭訣曰所以來者欲察君之政迹耳今蟲不犯境此一異也化及鳥獸此二異也豎子有仁心此三異也久留徒擾賢者耳還府具以狀白安是嵗嘉禾生恭便坐廷中便坐於便側之䖏非正室也續漢書云恭謙不矜功封以言府府即奏上尹以檄勞曰君以名徳久屈中牟物產之化流行天降休瑞應行而生尹甚嘉之安因上書言狀帝異之㑹詔百官舉賢良方正恭薦中牟名士王方帝即徴方詣公車禮之與公卿所舉同方致位侍中恭在事三年州舉尤異㑹遭母䘮去官吏人思之後拜侍御史和帝初立議遣車騎将軍竇憲與征西將軍耿秉擊匈奴恭上疏諌曰陛下親勞聖思曰昃不食憂在軍役誠欲以安定北垂為人除患定萬世之計也臣伏獨思之未見其便社稷之計萬人之命在於一舉數年以来秋稼不熟人食不足倉庫空虚國無蓄積㑹新遭大憂人懐恐懼章帝崩也陛下躬大聖之徳履至孝之行盡諒隂三年聽於冢宰百姓闕然三時不聞警蹕之音三時秋夏冬也天子出警入蹕和帝章和二年二月即位明年春議擊匈奴帝在諒陰不出故百姓三時不聞警蹕莫不懐思皇皇若有求而不得禮記檀弓曰魯人顔丁善居䘮始死皇皇然如有求而不得言百姓思帝故恭引之今乃以盛春之月興發軍役擾動天下以事戎狄誠非所以垂恩中國改元正時由内及外也萬民者天之所生天愛其所生猶父母愛其子一物有不得其所者則天氣為之舛錯况於人乎故愛人者必有天報昔太王重人命而去邠故獲上天之祐史記古公脩后稷公劉之業國人皆戴之戎翟攻之人人皆怒欲戰古公曰人以我故戰殺人父子予不忍為乃與私屬盡去邠止于岐下邠人舉國扶老携弱盡復歸於岐下旁國聞之亦多歸附古公乃營築城郭室屋而邑之人皆歌頌其德武王即位追尊古公為太王夫戎狄者四方之異氣也蹲夷踞肆與鳥獸無别夷平也肆放也言平坐踞傲肆放無禮也若雜居中國則錯亂天氣汙辱善人是以聖王之制羇縻不絶而已字書曰羇馬絡頭也蒼頡篇曰縻牛繮也今邊境無事冝當脩仁行義尚於無為令家給人足安業樂産夫人道乂於下則隂陽和於上祥風時雨覆被逺方夷狄重譯而至矣易曰有孚盈缶終来有它吉易比卦辭也孚誠信也缶土器也王弼注云親乎天下著信盈缶應者豈一道而來故必有他吉也言甘雨滿我之缶誠來有我而吉已比卦坤下坎上坤為土缶之象也坎為水雨之象也坎在坤上故曰甘雨滿我之缶有誠信則它人来附而吉也劉攽曰誠來有我而吉巳案文此我當為它注文甚明夫以徳勝人者昌以力勝人者亡今匈奴為鮮卑所殺逺臧於史侯河西去塞數千里而欲乗其虚耗利其微弱是非義之所出也前太僕祭彤逺出塞外卒不見一胡而兵已困矣永平十六年竇固祭彤耿秉來苗等四道出擊匈奴固至天山擊走呼衍王彤坐不至涿邪山無所見而還下獄免為庶人也白山之難不絶如綖白山即天山言彤固俱擊匈奴固至天山彤還下獄同歴艱危故曰如綖公羊傳曰中國不絶若綖也都䕶陥沒士卒死者如積永平末年焉耆龜兹共攻沒都䕶陳睦殺吏士二千餘人迄今被其辜毒孤寡哀思之心未弭仁者念之以為累息奈何復欲襲其迹不頋患難乎今始徴發而大司農調度不足度音大各反使者在道分部督趣趣音促上下相廹民間之急亦已甚矣三輔并凉少雨麥根枯焦牛死曰甚此其不合天心之效也羣僚百姓咸曰不可陛下獨奈何以一人之計棄萬人之命不卹其言乎上觀天心下察人志足以知事之得失臣恐中國不為中國豈徒匈奴而已哉惟陛下留聖恩劉攽曰案文恩當作思休罷士卒以順天心書奏不從每政事有益於人恭輙言其便無所隠諱其後拜為魯詩博士由是家法學者曰盛遷侍中數召讌見問以得失賞賜恩禮寵異焉遷樂安相章帝孫千乗王寵相也和帝改千乗國為樂安國故城在今淄州高苑縣北是時東州多盗賊羣軰攻劫諸郡患之恭到重購賞開恩信說文曰以財相賕曰購其渠帥張漢等率支黨降恭上以漢補博昌尉博昌尉屬千乗國今青州縣也其餘遂自相捕擊盡破平之州郡以安永元九年徴拜議郎八月飲酎齋㑹章䑓詔使小黄門特引恭前其夜拜侍中勑使陪乗勞問甚渥冬遷光禄勲選舉清平京師貴戚莫能枉其正十二年代呂蓋為司徒漢官儀曰呂蓋字君上苑陵人十五年從廵狩南陽除子撫為郎中賜駙馬從駕駙副也非正所乗皆為副說文曰駙馬副馬也時弟丕亦為侍中兄弟父子並列朝廷後坐事䇿免續漢書曰坐族弟𢎞農都尉炳事免官也殤帝即位以恭為長樂衛尉永初元年復代梁鮪為司徒漢官儀曰鮪字伯元河東平陽人也初和帝末下令麥秋得案騐薄刑而州郡好以苛察為政因此遂盛夏斷獄恭上疏諌曰臣伏見詔書敬若天時若順也尚書堯典曰乃命羲和欽若昊天敬授人時憂念萬民為崇和氣罪非殊死且勿案驗進柔良退貪殘奉時令言順月令以行事也所以助仁徳順昊天致和氣利黎民者也舊制至立秋乃行薄刑自永元十五年以来改用孟夏而刺史太守不深惟憂民息事之原進良退殘之化月令曰孟夏命太尉贊桀俊遂賢良舉長大行爵出禄必當其位因以盛夏徴召農人拘對考驗連滯無已司𨽻典司京師四方是則漢官儀曰司𨽻校尉董領京師及三輔三河𢎞農而近於春月分行諸部託言勞来貧人而無隠惻之實煩擾郡縣廉考非急逮捕一人罪延十數逮及也辭所連及即追捕之上逆時氣下傷農業案易五月姤用事東觀記曰五月姤卦用事姤卦巽下乾上初六一陰爻生五月之卦也本多作后古字通經曰后以施令誥四方誥理也易姤卦象曰天下有風姤后以施令誥四方乾為天君之象也巽為風號令之象也后君也故以喻人君施令也言君以夏至之曰施命令止四方行者所以助微陰也易復卦曰先王以至日閉關商旅不行故夏至宜止行也五月陰氣始生故曰微陰行者尚止之况於逮召考掠奪其時哉比年水旱傷稼人饑流宂宂散也今始夏百榖權輿陽氣胎飬之時爾雅曰權輿始也萬物皆含胎長飬之時自三月以来隂寒不暖物當化變而不被和氣月令孟夏斷薄刑出輕繫行秋令則苦雨數來五榖不熟鄭𤣥注禮記云申之氣乗之也苦雨白露之類也時物得而傷也又曰仲夏挺重囚益其食挺猶寛也行秋令則草木零落酉之氣乗之也八月宿直昴為獄主殺人傷於疫大陵之氣為害也大陵星名春秋合誠圖曰大陵主死䘮也夫斷薄刑者謂其輕罪已正不欲令久繫故時斷之也臣愚以為今孟夏之制可從此令其决獄案考皆以立秋為斷以順時節育成萬物則天地以和刑罰以清矣初肅宗時斷獄皆以冬至之前自後論者互多駮異鄧太后詔公卿以下㑹議恭議奏曰夫陰陽之氣相扶而行發動用事各有時節若不當其時則物隨而傷王者雖質文不同而兹道無變四時之政行之若一月令周世所造而所據皆夏之時也謂氣候及星辰昬旦皆夏時也其變者唯正朔服色犧牲徽號器械而巳夏以建寅為正服色犧牲徽號器械皆尚黒殷以建丑為正尚白周以建子為正尚赤周以夜半為朔殷以雞鳴為朔夏以平旦為朔祭天地宗廟曰犧卜得吉曰牲徽號旌旗之名也器械禮樂之器及甲兵也故曰殷因於夏禮周因於殷禮所損益可知也易曰潛龍勿用龍以喻陽氣易乾卦初九爻辭言十一月十二月陽氣潛藏未得用事雖煦噓萬物飬其根荄荄草根也荄音該又音皆而猶盛隂在上地凍水冰陽氣否隔閉而成冬故曰履霜堅冰隂始凝也馴致其道至堅冰也易坤卦象辭也馴順也言陰以卑順為道漸至顯著猶自履霜而至堅冰言五月微陰始起至十一月堅冰至也夫王者之作因時為法孝章皇帝深惟古人之道助三正之微定律著令三正三微也前書音義曰言陽氣始施萬物微而未著故曰微一曰天統謂周十一月建子為正天始施之端也二曰地統謂殷十二月建丑為正地始化之端也三曰人統謂夏十三月建寅為正人始成之端也冀承天心順物性命以致時雍然從變改以来年嵗不熟榖價常貴人不寧安小吏不與國同心者率入十一月得死罪賊不問曲直便即格殺雖有疑罪不復讞正一夫吁嗟王道為虧况於衆乎易十二月君子以議獄緩死易中孚象辭也稽覽圖中孚十二月卦也可令疑罪使詳其法大辟之科盡冬月乃斷其立春在十二月中者勿以報囚如故事報囚謂奏請報决也後卒施行恭再在公位選辟高第至列卿郡守者數十人而其耆舊大姓或不蒙薦舉至有怨望者恭聞之曰學之不講是吾憂也講習也論語孔子之言也諸生不有鄉舉者乎終無所言言人患學之不習耳若能究習自有鄉里之舉豈待要三公之辟乎恭性謙退奏議依經潛有補益然終不自顯故不以剛直為稱三年以老病䇿罷六年年八十一卒於家以兩子為郎長子謙為隴西太守有名績謙子旭官至太僕從獻帝西入闗與司徒王允同謀共誅董卓及李傕入長安旭與允俱遇害丕字叔陵性沉深好學孳孳不倦孳孳不怠之意遂杜絶交游不答候問之禮士友常以此短之而丕欣然自得遂兼通五經以魯詩尚書教授為當世名儒後歸郡為督郵功曹所事之將無不師友待之建初元年肅宗詔舉賢良方正大司農劉寛舉丕時對䇿者百有餘人唯丕在高第除為議即遷新野令視事朞年州課第一擢拜青州刺史務在表賢明慎刑罰七年坐事下獄司冦論司㓂刑名也决罪曰論言奏而論决之前書曰司冦二嵗刑也元和元年徴再遷拜趙相門生就學者常百餘人關東號之曰五經復興魯叔陵趙王商嘗欲避疾商趙王良之孫便時移住學官丕止不聽學官謂學舍也王乃上疏自言詔書下丕丕奏曰臣聞禮諸侯薨於路寢大夫卒於嫡室路寢嫡室皆正寢禮䘮大記之文死生有命未有逃避之典也學官傳五帝之道脩先王禮樂教化之處王欲廢塞以廣游讌事不可聽詔從丕言王以此憚之其後帝廵狩之趙特被引見難問經傳厚加賞賜在職六年嘉瑞屢降吏人重之永元二年遷東郡太守丕在二郡為人脩通溉灌百姓殷富數薦逹幽隠名士續漢書曰薦王龔等皆備帷幄近臣明年拜陳留太守視事三朞後坐稟貧人不實徴司冦論十一年復徴再遷中散大夫續漢志曰秩六百石無員時侍中賈逵薦丕道蓺深明宜見任用和帝因朝㑹召見諸儒丕與侍中賈逵尚書令黄香等相難數事帝善丕說罷朝特賜冠幘履韤衣一襲丕因上疏曰臣以愚頑顯備大位犬馬氣衰猥得進見論難於前無所甄明甄别也衣服之賜誠為優過臣聞說經者傳先師之言非從己出不得相讓相讓則道不眀若規矩權衡之不可枉也規圓也矩方也權秤錘衡秤衡難者必明其據說者務立其義浮華無用之言不陳於前故精思不勞而道術愈章法異者各令自說師法博觀其義覽詩人之旨意察雅頌之終始明舜禹臯陶之相戒尚書帝舜謂禹曰臣作朕股肱耳目禹戒舜曰安汝止慎乃在位咎繇戒禹曰慎厥身修思永惇叙九族在知人禹曰吁咸若時惟帝其難之是相戒也顯周公箕子之所陳周公作無逸立政二篇以戒成王箕子為武王陳洪範九疇之義並見尚書觀乎人文化成天下易賁卦曰觀乎天文以察時變觀乎人文以化成天下注云解天之文則時變可知解人之文則化成可為也陛下既廣納謇謇以開四聰無令芻蕘以言得罪芻蕘採薪者也大雅板詩曰詢於芻蕘也既顯巖穴以求仁賢無使幽逺獨有遺失十三年遷為侍中免永初二年詔公卿舉儒術篤學者大將軍鄧隲舉丕再遷復為侍中左中郎將再為三老三老解見明帝紀也五年年七十五卒於官魏覇傳魏覇字喬卿濟陰句陽人也句音鉤世有禮義覇少䘮親兄弟同居州里慕其雍和建初中舉孝㢘八遷和帝時為鉅鹿太守以簡朴寛恕為政掾史有過要先誨其失不改者乃罷之吏或相毁訴霸輙稱他吏之長終不及人短言者懐慙譛訟遂息永元十六年徴拜將作大匠明年和帝崩典作順陵時盛冬地凍中使督促數罰縣吏以厲霸霸撫循而巳初不切責而反勞之曰今諸卿被辱大匠過也吏皆懐恩力作倍功延平元年代尹勤為太常明年以病致仕為光禄大夫永初五年拜長樂衛尉以病乞身復為光禄大夫卒於官劉寛傳劉寛字文饒𢎞農華陰人也謝承書曰寛少學歐陽尚書京氏易尤明韓詩外傳星官風角算歴皆究極師法稱為通儒未嘗與人争埶利之事也角隅也觀四隅之風占之也父崎順帝時為司徒崎音丘宜反寛嘗行有人失牛者乃就寛車中認之寛無所言下駕歩歸有頃認者得牛而送還叩頭謝曰慙負長者隨所刑罪寛曰物有相類事容脫誤幸勞見歸何為謝之州里服其不校校報也論語曰曾子曰犯而不校桓帝時大將軍辟五遷司徒長史大將軍梁冀也時京師地震特見詢問再遷出為東海相東海王彊曾孫臻之相也延熹八年徴拜尚書令遷南陽太守典歴三郡温仁多恕雖在倉卒未嘗疾言遽色常以為齊之以刑民免而無恥吏人有過但用蒲鞭罰之示辱而已終不加苦事有功善推之自下災異或見引躬克責每行縣止息亭傳輙引學官祭酒及處士諸生執經對講續漢書曰博士祭酒秩六百石祭酒夲僕射也中興改為祭酒處士有道蓺而在家者見父老慰以農里之言少年勉以孝悌之訓人感徳興行日有所化靈帝初徴拜太中大夫侍講華光殿洛陽宫殿簿云華光殿在華林園内遷侍中賜衣一襲轉屯騎校尉遷宗正轉光禄勲嘉平五年代許訓為太尉漢官儀曰許訓字季師平輿人靈帝頗好學蓺每引見寛常令講經寛常於坐被酒睡伏被加也為酒所加也被音平寄反帝問太尉醉邪寛仰對曰臣不敢醉但任重責大憂心如醉帝重其言寛簡略嗜酒不好盥浴說文曰澡手曰盥音管京師以為諺嘗坐客遣蒼頭市酒迂久大醉而還迂久猶良久也客不堪之罵曰畜産寛須㬰遣人視奴疑必自殺頋左右曰此人也罵言畜産辱孰甚焉故吾懼其死也夫人欲試寛令恚伺當朝㑹装嚴己訖使侍婢奉肉羮翻汙朝衣婢遽收之寛神色不異乃徐言曰羮爛汝手其性度如此海内稱為長者後以日食䇿免拜衛尉光和三年復代叚潁為太尉在職三年以日變免又拜永樂少府遷光禄勲以先䇿黄巾逆謀先䇿謂預知也以事上聞封逯鄉侯六百戸逯音録中平二年卒年六十六贈車騎将軍印綬位特進諡曰昭列侯子松嗣官至宗正贊曰卓魯款款情慤徳滿款款忠誠也仁感昆蟲愛及胎卵童兒不捕雉也寛霸臨政亦稱優緩後漢書卷五十五
