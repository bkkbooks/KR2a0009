body:
  text: 後漢書卷六十七宋宣城太守范煜撰唐章懐太子賢注桓榮丁鴻列傳第二十七桓榮傳子郁彬孫焉𤣥孫曾孫鸞𤣥孫典桓榮字春卿沛郡龍亢人也續漢書曰榮本齊人遷于龍亢至榮六葉東觀記曰榮本齊桓公後也桓公作伯支庶用其諡立族命氏焉少學長安習歐陽尚書事博士九江朱普朱普字公文受業於平當為博士徒衆尤盛見前書貧窶無資字林曰窶空也常客傭以自給精力不倦十五年不闚家園至王莽簒位乃歸㑹朱普卒榮奔喪九江負土成墳因留敎授徒衆數百人莽敗天下亂榮抱其經書與弟子逃匿山谷雖常飢困而講論不輟後復客授江淮間建武十九年年六十餘始辟大司徒府時顯宗始立為皇太子選求明經乃擢榮弟子豫章何湯為虎賁中郎將以尚書授太子世祖從容問湯從音七容反本師為誰湯對曰事沛國桓榮帝即召榮令說尚書甚善之謝承書曰何湯字仲弓豫章南昌人也榮門徒常四百餘人湯為髙弟以才明知名榮年四十無子湯乃去榮妻為更娶生三子榮甚重之後拜郎中守開陽門候上微行夜還湯閉門不納更從中東門入明旦召詣大官賜食諸門候皆奪俸建武十六年夏旱公卿皆暴露請雨洛陽令著車盖出門湯將衛士鉤令車收案有詔免令官拜湯虎賁中郎將上嘗歎曰糾糾武夫公侯干城何湯之謂也湯以明經嘗授太子推薦榮榮拜五更封闗内侯榮嘗言曰此皆何仲弓之力也拜為議郎賜錢十萬入使授太子劉攽曰案文入使當作使入每朝㑹輒令榮於公卿前敷奏經書帝稱善曰得生㡬晚㑹歐陽博士缺帝欲用榮榮叩頭讓曰臣經術淺薄不如同門生郎中彭閎揚州從事臯𢎞帝曰俞往汝諧續漢書曰閎字作明俞然也然其所舉勑令往言汝能和諧此官謝承書曰臯𢎞字奉卿吳郡人也家代為冠族少有英才與桓榮相善子徽至司徒長史也因拜榮為博士引閎𢎞為議郎車駕幸太學㑹諸博士論難於前榮被服儒衣温恭有藴藉藴藉猶言寛博有餘也藴音於問反辯明經義每以禮讓相厭不以辭長勝人儒者莫之及厭服也音一葉反特加賞賜又詔諸生雅吹擊磬盡日乃罷吹管奏雅頌也後榮入㑹庭中詔賜竒果受者皆懐之榮獨舉手捧之以拜帝笑指之曰此真儒生也以是愈見敬厚常令止宿太子宫積五年榮薦門下生九江胡憲侍講乃聽得出旦一入而已榮嘗寢病太子朝夕遣中傅問病賜以珍羞帷帳奴婢謂曰如有不諱無憂家室也不諱謂死也死者人之常故言不諱也後病愈復入侍講二十八年大㑹百官詔問誰可傅太子者羣臣承望上意皆言太子舅執金吾原鹿侯隂識可言可任也博士張佚正色曰今陛下立太子為隂氏乎為天下乎即為隂氏則隂侯可為天下則固宜用天下之賢才帝稱善曰欲置傅者以輔太子也今博士不難正朕况太子乎即拜佚為太子太傅而以榮為少傅賜以輜車乗馬榮大㑹諸生陳其車馬印綬曰今日所蒙稽古之力也可不勉哉榮以太子經學成畢上疏謝曰臣幸得侍帷幄執經連年而智學淺短無以補益萬分今皇太子以聰叡之姿通明經義觀覽古今儲君副主莫能專精博學若此者也斯誠國家福祐天下幸甚臣師道已盡皆在太子謹使掾臣氾再拜歸道續漢書曰三公東西曹掾四百石餘掾比二百石歸猶謝也太子報書曰莊以童䝉學道九載而典訓不明無所曉識夫五經廣大聖言幽逺非天下之至精豈能與於此此上二句周易之繫辭與音預况以不才敢承誨命昔之先師謝弟子者有矣上則通逹經㫖分明章句前書丁寛受學於田何學成何謝寛寛東歸何謂門人曰易東矣是先師謝弟子下則去家慕鄊求謝師門韓詩外傳曰孔子行見臯魚哭孔子曰子非有喪何哭悲也臯魚曰吾少而好學周流諸侯以没吾親樹欲静而風不止子欲養而親不待往而不可追者年也去而不見者親也孔子曰弟子識之於是門人辭歸者十有三也今蒙下列不敢有辭願君慎疾加餐重愛玉體史記曰伏聞太后玉體不安君子於玉比徳故以言也三十年拜為太常榮初遭倉卒與族人桓元卿同飢戹而榮講誦不息元卿嗤榮曰但自苦氣力何時復施用乎榮笑不應及為太常元卿歎曰我農家子豈意學之為利乃若是哉東觀漢記曰榮為太常元卿来候榮榮諸弟子謂曰平生笑盡氣力今何如元卿曰我安能知此哉顯宗即位尊以師禮甚見親重拜二子為郎榮年踰八十自以衰老數上書乞身輒加賞賜乗輿嘗幸太常府令榮坐東靣設几杖㑹百官驃騎將軍東平王蒼以下及榮門生數百人天子親自執業每言輒曰太師在是凍觀記曰時執經生避位發難上謙曰太師在是也既罷悉以大官供具賜太常家其恩禮若此永平二年三雍初成拜榮為五更三雍宫也謂明堂靈臺辟雍前書音義曰皆叶天人雍和之氣為之故謂三雍五更觧見明紀每大射養老禮畢帝輒引榮及弟子升堂執經自為下說下說謂下語而講說之也乃封榮為關内侯食邑五千戸東觀記曰榮以尚書授朕十有餘年詩云日就月將示我顯徳行乃封之榮每疾病帝輙遣使者存問大官太醫相望於道及篤上疏謝恩讓還爵土帝幸其家問起居入街下車擁經而前撫榮垂涕賜以牀茵帷帳刀劒衣被良久乃去自是諸侯將軍大夫問疾者不敢復乗車到門皆拜牀下榮卒帝親自變服臨喪送𦵏賜冡塋于首山之陽首陽山在今偃師縣西北也除兄子二人補四百石都講生八人補二百石其餘門徒多至公卿華嶠書曰榮弟子丁鴻學最髙子郁嗣華嶠書曰榮長子雍早卒少子郁嗣論曰張佚訐切隂侯以取髙位危言犯衆義動明后知其直有餘也若夫一言納賞志士為之懐恥秦兵圍趙時魯仲連在趙因說令退兵平原君趙勝乃以千金為仲連壽連笑曰所貴於天下之士者能排患觧紛而無取也即有取者是商賈之事也而連不忍為也遂去終身不復見見史記也受爵不讓風人所以興歌詩小雅角弓篇曰受爵不讓至於已斯亡風人猶詩人也而佚廷議戚援自居全徳佚諌云當用天下之賢才而乃自當其任故曰自居全徳全徳言無玷缺也莊子曰是謂全徳也意者以廉不足乎昔樂羊食子有功見疑西巴放麑以罪作傅並觧見吴漢傳盖推仁審偽本乎其情君人者能以此察則真邪㡬於辨矣㡬近也音鉅依反郁字仲恩少以父任為郎敦厚篤學傳父業以尚書敎授門徒常數百人榮卒郁當襲爵上書讓於兄子汎顯宗不許不得已受封悉以租入與之帝以郁先師子有禮讓甚見親厚常居中論經書問以政事稍遷侍中東觀記曰永平十四年為議郎遷侍中也帝自製五家要說章句令郁校定於宣明殿華嶠書曰帝自制五行章句此言五家即謂五行之家也宣明殿在徳陽殿後東觀記曰上謂郁曰卿經及先師致復文雅其冬上親於辟雍自講所制五行章句已復令郁說一篇上謂郁曰我為孔子卿為子夏起子者商也又問郁曰子㡬人能傳學郁曰臣子皆未能傳學孤兄子一人學方起上曰努力敎之有起者即白之以侍中監虎賁中郎將劉攽曰案漢無監虎賁官盖是兼字與丁鴻同也永平十五年入授皇太子經遷越騎校尉詔勑太子諸王各奉賀致禮郁數進忠言多見納録東觀記曰皇太子賜郁鞍馬刀劒郁乃上疏皇太子曰伏見太子體性自然包含今古謙謙允恭天下共見郁父子受恩無以明益夙夜慙懼誠思自竭愚以為太子上當合聖心下當卓絶於衆宜思逺慮以光朝廷肅宗即位郁以母憂乞身詔聽以侍中行服華嶠書曰郁上書乞身天子憂之有詔公卿議議者皆以郁身為名儒學者之宗可許之於是詔郁以侍中行服也建初二年遷屯騎校尉和帝即位富於春秋侍中竇憲自以外戚之重欲令少主頗渉經學上疏皇太后曰禮記云天下之命懸於天子天子之善成乎所習習與智長則切而不勤化與心成則中道若性昔成王㓜小越在襁保周公在前史佚在後太公在左召公在右中立聽朝四聖維之是以慮無遺計舉無過事自禮記以下至此以上皆大戴禮之文也切而不勤謂習與智長則常自切厲而不須勤勑若性猶自然也襁綰也保小兒被也保當作褓古字通也史佚成王時史官名佚賢者也維持也遺失也孝昭皇帝八嵗即位大臣輔政亦選名儒韋賢蔡義夏侯勝等入授於前平成聖徳韋賢字長孺魯國鄒人治魯詩蔡義河内温人也為韓詩給事中也夏侯勝魯人也字長公治歐陽尚書並見前書近建初元年張酺魏應召訓亦講禁中酺等並自有傳臣伏惟皇帝陛下躬天然之姿宜漸敎學而獨對左右小臣未聞典義昔五更桓榮親為帝師子郁結髮敦尚繼傳父業故再以校尉入授先帝父子給事禁省更歴四世今白首好禮經行篤備又宗正劉方宗室之表善為詩經先帝所襃宜令郁方並入敎授以崇本朝光示大化由是遷長樂少府復入侍講頃之轉為侍中奉車都尉永元四年代丁鴻為太常明年病卒郁教授二帝恩寵甚篤賞賜前後數百千萬顯於當世門人楊震朱寵皆至三公鄧隲傳曰朱寵字仲威京兆人也篤行好學從桓榮授尚書位至太尉初榮受朱普學章句四十萬言浮辭繁長多過其實長音直亮反及榮入授顯宗減為二十三萬言郁復刪省定成十二萬言由是有桓君大小太常章句子普嗣傳爵至曾孫郁中子焉能世傳其家學華嶠書曰郁六子普延焉後酆良普嗣侯傳國至曾孫絶酆良子孫皆博學有才能孫鸞曾孫彬並知名焉字叔元少以父任為郎明經篤行有名稱永初元年入授安帝三遷為侍中歩兵校尉永寧中順帝立為皇太子以焉為太子少傅月餘遷太傅以母憂自乞聽以大夫行喪踰年詔使者賜牛酒奪服即拜光禄大夫遷太常時廢皇太子為濟隂王焉與太僕來歴廷尉張皓諌不能得事已具來歴傳順帝即位拜太傅與太尉朱寵並録尚書事焉復入授經禁中因讌見建言宜引三公尚書入省事省猶視也帝從之以焉前廷議守正封陽平侯固讓不受視事三年坐辟召禁錮者為吏免復拜光禄大夫陽嘉二年代來歴為大鴻臚數日遷為太常永和五年代王龔為太尉漢安元年以日食免明年卒於家弟子傳業者數百人黄瓊楊賜最為顯貴焉孫典華嶠書曰焉長子衡早卒中子順順子典典字公雅復傳其家業華嶠書曰典十二喪父母事叔母如事親立廉操不取於人門生故吏問遺一無所受也以尚書教授潁川門徒數百人舉孝廉為郎居無㡬㑹國相王吉以罪被誅沛相故人親戚莫敢至者典獨棄官收歛歸𦵏服喪三年負土成墳為立祠堂盡禮而去辟司徒袁隗府舉髙第拜侍御史是時宦官秉權典執政無所回避劉攽曰案典為御史非執政者政當作正常乘驄馬京師畏憚為之語曰行行且止避驄馬御史及黄巾賊起榮陽典奉使督軍賊破還以牾宦官賞不行在御史七年不調華嶠書作十年後出為郎靈帝崩大將軍何進秉政典與同謀議三遷羽林中郎將華嶠書曰遷平津都尉鉤盾令羽林中郎將也劉攽曰案平津非郡何得有都尉盖是平凖令誤凖為津因轉令為都尉也典又為鉤盾令故知其必是中都官也獻帝即位三公奏典前與何進謀誅閹宦功雖不遂忠義炳著詔拜家一人為郎賜錢二十萬從西入關拜御史中丞賜爵闗内侯車駕都許遷光禄勲建安六年卒於官鸞字始春焉弟子也東觀記曰鸞父良龍舒侯相也少立操行褞袍糟食不求盈餘東觀記曰鸞貞亮之性著乎幼冲學覽六經莫不貫綜推財孤寡分賄友朋泰於待賢狭於養已常著大布褞袍糲食醋餐也以世濁州郡多非其人恥不肯仕年四十餘時太守向苖有名迹乃舉鸞孝廉遷為膠東令始到官而苖卒鸞即去職奔喪終三年然後歸淮汝之間髙其義後為已吾汲二縣令東觀記曰除陳留已吾長旬月間遷河内汲令甚有名迹諸公並薦復徴辟拜議郎劉攽曰案徴則上徴之辟則諸府辟之議郎當云徴而已明多辟字上陳五事舉賢才審授用黜佞倖省苑囿息役賦書奏御牾内豎故不省以病免中平元年年七十七卒于家子曄曄字文林一名嚴東觀記嚴作礹尤修志介姑為司空楊賜夫人初鸞卒姑歸寧赴哀將至止於傳舍整飾從者而後入曄心非之及姑勞問終無所言號哭而已賜遣吏奉祠因縣發取祠具曄拒不受後每至京師未嘗舍宿楊氏其貞忮若此忮堅也賔客從者皆祗其志行一餐不受於人仕為郡功曹後舉孝廉有道方正茂才三公並辟皆不應初平中天下亂避地㑹稽遂浮海客交阯柬觀記曰礹到吳郡揚州刺史劉繇振給榖食衣服所乏者悉不受後東適㑹稽住止山隂縣故魯相鍾離意舍太守王朗餉給糧食布帛牛羊一無所留臨去之際屋中尺寸之物悉疏付主人纎㣲不漏移居揚州從事屈豫室中中庭橘樹一株遇實熟乃以竹籓樹四靣風吹落兩實以繩繫著樹枝每當危亡之急其志彌固賔客從者皆肅其行也越人化其節至閭里不為訟為凶人所誣遂死于合浦獄彬字彦林焉之兄孫也父麟字元鳯早有才恵華嶠書曰酆生麟也桓帝初為議郎入侍講禁中以直道牾左右出為許令許縣名今許州許昌縣也病免㑹母終麟不勝喪未祥而卒年四十一所著碑誄讃説書凡二十一篇案摯虞文章志麟文見在者十八篇有碑九首誄七首七說一首沛相郭府君書一首彬少與蔡邕齊名初舉孝廉拜尚書郎時中常侍曹節女壻馮方亦為郎彬厲志操與左丞劉歆右丞杜希同好交善未嘗與方共酒食之會方深怨之遂章言彬等為酒黨事下尚書令劉猛猛雅善彬等不舉正其事節大怒劾奏猛以為阿黨請收下詔獄在朝者為之寒心猛意氣自若旬日得出免官禁錮彬遂以廢光和元年卒於家年四十六諸儒莫不傷之所著七説及書凡三篇蔡邕等共論序其志僉以為彬有過人者四夙智早成岐嶷也夙早也岐行貌也嶷然有所識也詩曰克岐克嶷也劉攽曰案蔡邕本以早成為一徳傳寫之誤反以岐嶷在下當云夙智岐嶷早成也學優文麗至通也仕不茍禄絶髙也辭隆從窊潔操也窊下也音烏𤓰反乃共樹碑而頌焉劉猛琅邪人桓帝時為宗正直道不容自免歸家靈帝即位太傅陳蕃大將軍竇武輔政復徴用之論曰伏氏自東西京相襲為名儒以取爵位謂伏生已後至伏湛也中興而桓氏尤盛自榮至典世宗其道父子兄弟代作帝師受其業者皆至卿相顯乎當世孔子曰古之學者為已今之學者為人論語云也為人者憑譽以顯物為已者因心以㑹道桓榮之累世見宗豈其為已乎丁鴻傳丁鴻字孝公潁川定陵人也父綝字㓜春王莽末守潁陽尉世祖略地潁陽潁陽城守不下綝說其宰遂與俱降世祖大喜厚加賞勞以綝為偏將軍因從征伐綝將兵先渡河移檄郡國攻營略地下河南陳留潁川二十一縣建武元年拜河南太守及封功臣帝令各言所樂諸將皆占豐邑美縣唯綝願封本鄉或謂綝曰人皆欲縣子獨求鄉何也綝曰昔孫叔敖勑其子受封必求墝埆之地孫叔敖楚相也墝埆瘠薄之地叔敖將死戒其子曰王封汝必無居利地也楚越之間有寢丘者甚惡可長有以食也見呂氏春秋也今綝能薄功㣲得鄉亭厚矣帝從之封定陵新安鄉侯食邑五千戸後徙封陵陽侯鴻年十三從桓榮受歐陽尚書三年而明章句善論難為都講遂篤志精銳布衣荷擔不逺千里初綝從世祖征伐鴻獨與弟盛居憐盛㓜小而共寒苦及綝卒鴻當襲封上書讓國於盛不報既𦵏乃挂縗絰於冢廬而逃去留書與盛曰鴻貪經書不顧恩義弱而随師弱少也生不供養死不飯唅皇天先祖並不祐助身被大病不任茅土任堪也前上疾狀願辭爵仲公仲公盛之字也章寢不報廹且當襲封謹自放棄逐求良醫如遂不瘳永歸溝壑鴻初與九江人鮑駿同事桓榮甚相友善及鴻亡封與駿遇於東海陽狂不識駿駿乃止而讓之曰昔伯夷吳札亂世權行故得申其志耳伯夷孤竹君之子讓其弟叔齊餓死於首陽之山吳札呉王夀夢之季子也諸兄欲讓其國季子乃舍其室而耕是皆權時所行非常之道也伯夷當紂時吳札當周之末故言亂世春秋之義不以家事廢王事春秋衛靈公卒孫輒立父蒯瞶與輒争國公羊傳曰輒者曷為蒯瞶之子然則曷為不立蒯瞶而立輒蒯瞶無道靈公逐之而立輒然則輒之義可以立乎曰可不以父命辭於王命不以家事辭於王事故駿引以為言也今子以兄弟私恩而絶父不滅之基可謂智乎鴻感悟垂涕歎息乃還就國開門敎授鮑駿亦上書言鴻經學至行顯宗甚賢之續漢書載駿書曰臣聞武王克殷封比干之墓表商容之閭二人無功下車先封之表善顯仁為國之砥礪也伏見丁鴻經明行修志節清妙由是上賢之也永平十年詔徴鴻至即召見說文侯之命篇周平王東遷洛邑晉文侯仇有輔佐之功平王賜以車馬弓矢而策命之因以名篇事見尚書也賜御衣及綬稟食公車禀給也公車署名公車所在因以名諸待詔者皆居以待命故令給食焉與博士同禮頃之拜侍中十三年兼射聲校尉建初四年徙封魯陽鄉侯東觀記曰魯陽鄉在尋陽部也肅宗詔鴻與廣平王羡及諸儒樓望成封桓郁賈逵等論定五經同異於北宫白虎觀廣平王羡明帝子也東觀記曰與太常樓望少府成封屯騎校尉桓郁衛士令賈逵等集議也白虎門名於門立觀因以名之焉使五官中郎將魏應主承制問難侍中淳于恭奏上帝親稱制臨決鴻以才髙論難最明諸儒稱之帝數嗟美焉時人歎曰殿中無雙丁孝公東觀記曰上歎嗟其才號之曰殿中無雙丁孝公賜錢二十萬續漢書亦同而此書獨作時人歎也數受賞賜擢徙校書劉攽曰案漢校書者郎官而已鴻已為二千石不當以校書為擢徙也明衍校書二字遂代成封為少府門下由是益盛逺方至者數千人彭城劉愷北海巴茂九江朱倀皆至公卿元和三年徙封馬亭鄉侯東觀記曰元和二年車駕東廵狩鴻以少府從上奏曰臣聞古之帝王統治天下五載廵狩至于岱宗柴祭于天望秩山川協時月正日同斗斛權衡使人不争陛下尊履蒸蒸奉承𢎞業祀五帝於明堂配以光武二祖四宗咸有告祀瞻望太山嘉澤降澍柴祭之日白氣上升與燎煙合黄鵠羣翔所謂神人以和答響之休符也上善焉又曰以廬江郡為六安國所以徙封為馬亭侯和帝即位遷太常永元四年代袁安為司徒是時竇太后臨政憲兄弟各擅威權鴻因日食上封事曰臣聞日者陽精守實不虧君之象也月者隂精盈毁有常臣之表也故日食者臣乘君隂陵陽月滿不虧下驕盈也昔周室衰季皇甫之屬專權於外黨類彊盛侵奪主勢則日月薄食周室衰謂幽王時也皇甫即幽王后之黨也詩小雅曰皇甫卿士番維司徒家伯冢宰仲允膳夫其類非一故言之屬也故詩曰十月之交朔日辛卯日有食之亦孔之醜十月之交詩小雅篇名也孔甚也醜惡也周之十月夏之八月也八月朔日月交而日食隂侵陽臣侵君之象也日辰之義日為君辰為臣辛金也卯木也又以卯侵金故甚惡也春秋日食三十六弑君三十二變不空生各以類應夫威柄不以放下利器不以假人劉向上書云弑君三十六今據春秋與劉向同而東觀及續漢范氏諸本皆云三十二盖誤也威柄謂周禮之八柄即爵禄生置子奪廢誅也利器謂國之權勢假借也左傳曰唯器與名不可以假人也覽觀往古近察漢興傾危之禍靡不由之是以三桓専魯田氏擅齊六卿分晉諸吕握權統嗣㡬移哀平之末廟不血食三桓謂季孫氏叔孫氏仲孫氏三家皆出自魯桓公故言三桓並専權魯國至魯昭公遂為季氏所逐平子乃攝行君事田氏陳敬仲之後因自陳奔齊改為田氏遂執齊政至田和乃簒齊六卿謂晉之智氏中行氏范氏韓氏趙氏魏氏並専晉政韓趙魏卒三分晉國也諸呂謂呂産呂禄也産領南軍禄領北軍謀危劉氏故曰統嗣㡬移故雖有周公之親而無其徳不得行其勢也言親賢兼重方可執政孟子曰有伊尹之志則可無伊尹之志則簒也今大將軍雖欲勑身自約不敢僣差然而天下逺近皆惶怖承㫖刺史二千石初除謁辭求通待報雖奉符璽受臺勑不敢便去久者至數十日背王室向私門此乃上威損下權盛也人道悖於下效驗見於天雖有隐謀神照其情垂象見戒以告人君間者月滿先節過望不虧易曰天垂象見吉凶故言見戒也月滿先節謂未及望而滿也東觀記亦云作先節俗本作失節字之誤也此臣驕溢背君専功獨行也陛下未深覺悟故天重見戒誠宜畏懼以防其禍詩云敬天之怒不敢戲豫詩大雅也雷電震耀天怒也戲豫猶逸豫也不敢自逸所以敬天也若勑政責躬杜漸防萌則凶妖銷滅害除福湊矣夫壊崖破巖之水源自涓涓干雲蔽日之木起於葱青禁㣲則易救末者難人莫不忽於㣲細以致其大恩不忍誨義不忍割去事之後未然之眀鏡也臣愚以為左官外附之臣前書左官附益阿黨之法設左官者人道尚右舍天子而事諸侯為左官外附謂背正法而附私家依託權門傾覆諂䛕以求容媚者宜行一切之誅間者大將軍再出威振州郡莫不賦斂吏人遣使貢獻大將軍雖不受而物不還主部署之吏無所畏憚縱行非法不伏罪辜故海内貪猾競為姦吏小民吁嗟怨氣滿腹臣聞天不可以不剛不剛則三光不明三光日月星也天道尚剛周易曰乾健也天道終日乾乾是其剛也王不可以不彊不彊則宰牧從横宜因大變改政匡失以塞天意書奏十餘日帝以鴻行太尉兼衛尉屯南北宫於是收竇憲大將軍印綬憲及諸弟皆自殺時大郡口五六十萬舉孝廉二人小郡口二十萬并有蠻夷者亦舉二人帝以為不均下公卿㑹議鴻與司空劉方上言凡口率之科宜有階品蠻夷錯雜不得為數自今郡國率二十萬口嵗舉孝廉一人四十萬二人六十萬三人八十萬四人百萬五人百二十萬六人不滿二十萬二嵗一人不滿十萬三嵗一人帝從之六年鴻薨賜贈有加常禮子湛嗣湛卒子浮嗣浮卒子夏嗣東觀記及續漢書夏字作䕫也論曰孔子曰泰伯三以天下讓民無徳而稱焉此上論語載孔子之言也鄭𤣥注云泰伯周太王之長子次子仲雍次子季歴太王見季歴賢又生文王有聖人表故欲立之而未有命太王疾泰伯因適吳越採藥太王殁而不返季歴為喪主一讓也季歴赴之不来奔喪二讓也免喪之後遂斷髮文身三讓也三讓之美皆蔽隐不著故人無徳而稱焉孟子曰聞伯夷之風者貪夫廉懦夫有立志若乃泰伯以天下而違周伯夷率絜情以去國並未始有其讓也違去也未始猶未嘗也言泰伯伯夷率性清絜超然去國未嘗故有求讓之名故泰伯稱至徳伯夷稱賢人後世聞其讓而慕其風徇其名而昧其致所以激詭行生而取與妄矣狥營也言二子非故立讓風以求聲譽故至徳稱於前古後代之人直欲營慕其名而昧其深致所以激射詭譎之行生而取與之間多詐妄矣至夫鄧彪劉愷讓其弟以取義使弟受非服而已厚其名於義不亦薄乎彪讓國異母弟荆及鳳愷以國讓弟憲帝皆許焉弟不當襲爵故言非服而彪愷豈獨受美名而陷弟於不義也君子立言非茍顯其理將以啓天下之方悟者立行非獨善其身將以訓天下之方動者言行之所開塞可無慎哉原丁鴻之心主於忠愛乎何其終悟而從義也異夫數子類乎狥名者焉賛曰五更待問應若鳴鐘禮記曰夙夜强學以待問又曰善待問者如撞鐘扣之以小者則小鳴扣之以大者則大鳴待其從容而後盡其聲不善答問者反此也庭列輜駕堂修禮容穆穆帝則擁經以從從就也丁鴻翼翼讓而不飾髙論白虎深言日食春秋經書日有食之杜預注云日食者月掩日聖人不言月掩日而以日食為文闕於所不見也後漢書卷六十七後漢書卷六十七考證丁鴻傳徙封魯陽鄉侯注東觀記曰魯陽鄉在尋陽部也臣㑹汾按傳言鄉侯明非南陽郡之魯陽邑故注引東觀記以証之尋陽屬廬江郡而昧者或改此注部字為郡字兩漢何嘗有尋陽郡耶徙封馬亭鄉侯注以廬江郡為六安國監本脫江字今照宋本增後漢書卷六十七考證
