body:
  text: 自序宋宣城太守范曄吾少嬾學問晩成人年三十許政始有向耳自爾以來轉為心化推老將至者亦當未已也往往有微解言乃不能自盡為性不尋注書心氣惡小苦思便憤悶口機又不調利以此無談功至於所通解處皆自得之於胷懐耳文章轉進但才少思難所以毎於操筆其所成篇殆無全稱者常耻作文士文患其事盡於形情急於藻義牽其旨韻移其意雖時有能者大較多不免此累政可類工巧圖繢竟無得也常謂情志所託故當以意為主以文傳意以意為主則其旨必見以文傳意則其詞不流然後抽其芬芳振其金石耳此中情性旨趣千條百品屈曲有成理自謂頗識其數嘗為人言多不能賞意或異故也性别宫商識清濁斯自然也觀古今文人多不全了此處縱有㑹此者不必從根本中來言之皆有實證非為空談年少中謝荘最有其分手筆差易文不拘韻故也吾思乃無定方特能濟難適輕重所禀之分猶當未盡但多公家之言少於事外逺致以此為恨亦由無意於文名故也本未關史書政恒覺其不可解耳既造後漢轉得統緒詳觀古今著述及評論殆少可意者班氏最有髙名既任情無例不可甲乙辨後賛於理近無所得唯志可推耳博贍不可及之整理未必愧也吾雜傳論皆有精意深旨既有裁味故約其詞句至於循吏以下及六夷諸序論筆勢縱放實天下之竒作其中合者往往不減過秦篇嘗共比方班氏所作非但不愧之而已欲徧作諸志前漢所有者悉令備雖事不必多且使見文得盡又欲因事就卷内發論以正一代得失意復未果賛自是吾文之傑思殆無一字空設竒變不窮同含異體乃自不知所以稱之此書行故應有賞音者紀傳例為舉其大略耳諸細意甚多自古體大而思精未有此也恐世人不能盡之多貴古賤今所以稱情狂言耳吾於音樂聽功不及自揮但所精非雅聲為可恨然至於一絶處亦復何異邪其中體趣言之不盡弦外之意虛響之音不知所從而來雖少許處而旨態無極亦嘗以授人士庶中未有一毫似者此永不傳矣吾書雖小小有意筆勢不快餘竟不成就每愧此名沈約云曄自序並實故存之
