body:
  text: 後漢書卷四十三宋宣城太守范煜撰唐章懷太子賢注隗囂公孫述列傳第三隗囂傳囂音五髙反隗囂字季孟天水成紀人也成紀縣名故城在今秦州隴城縣西北少仕州郡王莽國師劉歆引囂為士王莽置國師位上公士其屬官也莽置九卿分屬三公每一卿置大夫三人一大夫置元士三人歆死囂歸鄉里季父崔素豪俠能得衆聞更始立而莽兵連敗於是乃與兄義及上邽人楊廣冀人周宗謀起兵應漢囂止之曰夫兵凶事也史記范蠡曰兵者凶器戰者逆徳宗族何辜崔不聴遂聚衆數千人攻平襄殺莽鎮戎大尹平襄縣名屬天水郡故城在今秦州伏羌縣西北王莽改天水郡曰鎮戎郡守曰大尹崔廣等以為舉事宜立主以一衆心咸謂囂素有名好經書遂共推為上將軍囂辭讓不得已曰諸父衆賢不量小子必能用囂言者乃敢從命衆皆曰諾囂既立遣使聘請平陵人方望以為軍師平陵縣名屬右扶風也望至説囂曰足下欲承天順民輔漢而起今立者乃在南陽王莽尚據長安雖欲以漢為名其實無所受命將何以見信於衆乎宜急立髙廟稱臣奉祠所謂神道設教求助人神者也易觀卦曰聖人神道設教而天下服矣且禮有損益質文無常削地開兆除地以開兆域茅茨土階以致其肅敬雖未備物神明其舎諸囂從其言遂立廟邑東祀髙祖太宗世宗囂等皆稱臣執事史奉璧而告史祝史也璧者所以祀神也祝畢有司穿坎于庭周禮司盟掌盟載之法也鄭𤣥注曰載盟辭也書其辭於策殺牲取血坎其牲加書於上而薶之牽馬操刀奉盤錯鍉遂割牲而盟臣賢按蕭該音引字詁鍉即題音徒啟反方言曰宋楚之間謂盎為題據下文云鍉不濡血明非盆盎之類前書匈奴傳云漢遣韓昌等與單于及大臣俱登諾水東山刑白馬單于以徑路刀金留犁撓酒應劭云留犂飯匕也撓攪也以匕攪血而㰱之今亦奉盤措匙而㰱也以此而言鍉即匙字錯置也音七故反曰凡我同盟三十一將十有六姓允承天道興輔劉宗如懷姦慮明神殛之殛誅也髙祖文皇武皇俾墜厥命厥宗受兵族類滅亡有司奉血鍉進䕶軍舉手揖諸將軍曰鍉不濡血㰱不入口是欺神明也厥罰如盟既而薶血加書一如古禮事畢移檄告郡國曰漢復元年七月己酉朔己巳上將軍隗囂白虎將軍隗崔左將軍隗義右將軍楊廣明威將軍王遵雲旗將軍周宗等告州牧部監郡卒正連率大尹尹尉隊大夫屬正屬令莽以周官王制之文置卒正連率大尹大尹職如太守屬令屬長職如都尉置州牧部監二十五人見禮如三公監位上大夫各主五郡公氏作牧侯氏卒正伯氏連率子氏屬令男氏屬長皆代其官其無爵者為尹又置六隊部置大夫職如太守劉攽曰大尹尹尉隊大夫案王莽置六尉六隊郡各置大夫故云尉隊大夫此多一尹字又注云又置六隊部置大夫少六尉二字部又當作郡也故新都侯王莽慢侮天地悖道逆理鴆殺孝平皇帝簒奪其位矯託天命偽作符書莽遣五威將軍王竒等班符命四十二篇於天下言當代漢之意欺惑衆庶震怒上帝反戾飾文以為祥瑞大風毁莽玉路堂又拔其昭寧堂池柬榆樹大十圍莽乃曰念紫閣仙圖天意立大子正其名乃立其子臨為太子以為祥應也戲弄神祗歌頌禍殃戲弄神祗謂仙人掌旁有白頭公青衣莽曰皇祖叔父子僑欲來迎我也歌頌禍殃謂莽作告天策自陳功勞千餘言能誦策文者除以為郎至五十餘人劉攽曰案本傳作五千人楚越之竹不足以書其惡前書朱光世曰南山之竹不足以盡我詞囂以楚越多竹故引以為言也天下昭然所共聞見今略舉大端以喻吏民蓋天為父地為母尚書曰惟天地萬物父母禍福之應各以事降莽明知之而冥昧觸冒不顧大忌詭亂天術援引史傳王莽每有災禍皆引史傳以文飾之前書説符侯崔發言於莽曰周禮及春秋左氏國有大災則哭以厭之故周易稱先號咷而後笑宜乎嗟呼告天以求救莽乃率羣臣至南郊陳其符命因搏心大哭昔秦始皇毁壞諡法以一二數欲至萬世史記曰秦始皇初并天下制曰太古有號無諡中古有號死而以行為諡如此則子議父臣議君自今以來除諡法朕為始皇帝後世以計數至于萬世傳之無窮而莽下三萬六千嵗之歴言身當盡此度莽令太史推三萬六千嵗歴紀六嵗一改元布告天下循亡秦之軌推無窮之數是其逆天之大罪也分裂郡國斷絶地絡絡猶經絡也謂莽分坼郡縣斷割疆界也田為王田賣買不得莽更名天下田曰王田不得賣買規錮山澤奪民本業莽制名山大澤不得採取造起九廟窮極土作莽九廟一曰黄帝太初祖廟二曰虞帝始祖昭廟三曰陳胡王統祖穆廟四曰齊敬王代祖昭廟五曰濟北愍王王祖穆廟六曰濟南伯王尊禰昭廟七曰元城孺子王尊禰穆廟八曰陽平頃王昭廟九曰新都顯王穆廟殿皆重屋太祖廟東西南北各四十丈髙十七丈餘半之為銅欂櫨飾以金銅琱文窮極百工之巧功費數百鉅萬卒徒死者萬數也劉攽曰窮極土作案文土當作工凡興作不專在土也又注七曰元城孺子王案本王翁孺故稱孺王不當有子字發冢河東攻劫丘壟此其逆地之大罪也尊任殘賊信用姦佞誅戮忠正覆按口語赤車奔馳續漢志曰小使車赤轂白葢赤帷從騶騎四十人法冠晨夜寃繫無辜續漢志曰法冠一曰柱後髙五寸侍御史服之妄族衆庶行炮烙之刑除順時之法莽作焚如之刑燒殺陳良終帶等二十七人莽又作不順時之令春夏斬人此為不順時之法灌以醇醯裂以五毒莽以董忠反収忠宗族以醇醯毒藥白刃叢棘并一坎而薶之政令日變官名月易莽州郡官名改無常制乃至嵗復變更一郡至五易名而還復其故吏人不能紀也貨幣嵗改時百姓便安漢五銖錢以莽錢大小兩行難知皆私以五銖錢市買莽患之下書諸挾五銖錢者比非井田制投四裔吏民昏亂不知所從商旅窮窘號泣市道設為六管管主也莽設六管之令謂酤酒賣鹽鐵器鑄錢名山大澤此謂六也皆令縣官主税収其利増重賦斂刻剝百姓厚自奉養苞苴流行財入公輔禮記曰苞苴簟笥問人者莽令七公六卿兼號將軍分鎮大郡皆使為姦於外貨賄為市侵漁百姓上下貪賄莫相檢考民坐挾銅炭沒入鍾官莽時關東大飢蝗人犯鑄錢伍人相坐沒入為官奴婢其男子檻車兒女子步以鐵鎖其頸傳詣鍾官八十萬數到者易其夫婦愁苦死者什六七鍾官主鑄錢之官也徒𨽻殷積數十萬人工匠飢死長安皆臭既亂諸夏狂心益悖北攻强胡南擾勁越莽令十二部將同時十道並出大擊匈奴莽改句町王為侯其王邯怨怒不附莽諷牂牁大尹周歆詐殺邯邯弟承起兵攻殺歆西侵羌戎東摘濊貊摘擾也西羌龎恬傳幡等怨莽奪其地為西海郡遂反攻西海太守陳永莽又發髙句麗兵伐胡不欲行郡强迫之皆亡出塞為寇使四境之外並入為害緣邊之郡江海之瀕滌地無類瀕涯也滌蕩也蕩地無遺類也故攻戰之所敗苛法之所陷饑饉之所夭疾疫之所及以萬萬計其死者則露屍不掩生者則奔亡流散幼孤婦女流離係虜此其逆人之大罪也是故上帝哀矜降罰于莽妻子顛殞還自誅刈顛踣也殞絶也莽殺其子宇臨等妻王氏以莽數殺其子涕泣失明病卒大臣反據亡形已成大司馬董忠國師劉歆衞將軍王涉涉曲陽侯根之子也皆結謀内潰司命孔仁納言嚴尤秩宗陳茂舉衆外降莽置五威司命孔仁敗降更始餘並見光武紀今山東之兵二百餘萬已平齊楚下蜀漢定宛洛據敖倉守函谷威命四布宣風中岳中岳嵩髙也謂更始至洛陽興滅繼絶封定萬國遵髙祖之舊制修孝文之遺徳有不從命武軍平之馳使四夷復其爵號莽貶句町王為侯西域盡改其王為侯單于曰服于髙句麗曰下句麗今皆復其爵號然後還師振旅櫜弓卧鼓周禮曰出曰理兵入曰振旅詩周頌曰載戢干戈載櫜弓矢櫜韜也卧猶息也申命百姓各安其所庶無負子之責百姓襁負流亡責在君上既安其業則無責也囂乃勒兵十萬擊殺雍州牧陳慶將攻安定安定大尹王向莽從弟平阿侯譚之子也威風獨能行其邦内屬縣皆無叛者囂乃移書於向喻以天命反覆誨示終不從於是進兵虜之以徇百姓然後行戮安定悉降而長安中亦起兵誅王莽囂遂分遣諸將徇隴西武都金城武威張掖酒泉敦煌皆下之更始二年遣使徴囂及崔義等囂將行方望以為更始未可知固止之囂不聴望以書辭謝而去曰足下將建伊吕之業𢎞不世之功不世者言非代之所常有也而大事草創草創謂始造也英雄未集以望異域之人疵瑕未露望平陵人以與囂别郡故言異域欲先從郭隗想望樂毅新序云郭隗謂燕昭王曰王誠欲致士請從隗始隗且見事况賢於隗者乎於是昭王為隗築宫而師之樂毅自魏往騶衍自齊往劇辛自趙往士爭赴燕故欽承大㫖順風不讓將軍以至徳尊賢廣其謀慮動有功發中權基業已定大勲方緝今俊乂並㑹羽翮比肩管子曰桓公謂管仲曰寡人之有仲父猶飛鴻之有羽翼耳望無耆耉之徳而猥託賔客之上猥猶濫也誠自愧也雖懐介然之節欲絜去就之分誠終不背其本貳其志也何則范蠡収責句踐乗偏舟於五湖偏舟特舟也収責謂収其罪責也史記曰范蠡與句踐滅吳為書辭句踐曰臣聞主憂臣勞主辱臣死昔者君王辱於㑹稽所以不死為此事也今既雪恥臣請從㑹稽之誅乃裝其輕寳珠玉自與其私徒屬乗舟浮海以行計然云范蠡乗偏舟於江湖劉攽曰偏舟案史傳皆作扁舟扁特也不當用偏字咎犯謝罪文公亦逡廵於河上逡廵不進也左傳曰晉公子重耳反國及河子犯以璧授公子曰臣負羈紲從君廵於天下臣之罪多矣臣猶知之而况君乎請由此亡公子曰所不與舅氏同心者有如白水夫以二子之賢勒銘兩國猶削跡歸愆請命乞身望之無勞蓋其宜也望聞烏氏有龍池之山烏氏縣名屬安定郡故城在今涇州安定縣東也微徑南通與漢相屬其傍時有竒人聊及閑暇廣求其真願將軍勉之囂等遂至長安更始以為右將軍崔義皆即舊號其冬崔義謀欲叛歸囂懼并禍即以事告之崔義誅死更始感囂忠以為御史大夫明年夏赤眉入關三輔擾亂流聞光武即位河北囂即説更始歸政於光武叔父國三老良更始不聴諸將欲劫更始東歸囂亦與通謀事發覺更始使使者召囂囂稱疾不入因㑹客王遵周宗等勒兵自守更始使執金吾鄧曄謝承書曰曄南陽南名鄉人以勁悍亷直為將兵圍囂囂閉門拒守至昏時遂潰圍與數十騎夜斬平城門關三輔黄圖曰長安城南面西頭門亡歸天水復招聚其衆據故地自稱西州上將軍及更始敗三輔耆老士大夫皆奔歸囂囂素謙恭愛士傾身引接為布衣交以前王莽平河大尹長安谷恭莽改清河為平河為掌野大夫平陵范逡為師友趙秉蘇衡鄭興為祭酒前書音義曰禮飲酒必祭示有先也故稱祭酒祭祀時唯長者以酒沃酹申屠剛杜林為持書持書即持書侍御史秩六百石楊廣王遵周宗及平襄人行廵阿陽人王㨗長陵人王元為大將軍東觀記曰元杜陵人阿陽縣名屬天水郡本為河陽者誤也杜陵金丹之屬為賔客由此名震西川聞於山東建武二年大司徒鄧禹西擊赤眉屯雲陽禹禆將馮愔引兵叛禹西向天水囂逆擊破之於髙平縣名今原州髙平縣盡獲輜重於是禹承制遣使持節命囂為西州大將軍得專制涼州朔方事及赤眉去長安欲西上隴囂遣將軍楊廣迎擊破之又追敗之於烏氏涇陽間涇陽縣名屬安定郡今原州平原縣南涇陽故城是也囂既有功於漢又受鄧禹爵署其腹心議者多勸通使京師三年囂乃上書詣闕光武素聞其風聲報以殊禮言稱字用敵國之儀所以慰藉之良厚慰安也藉薦也言安慰而薦藉之良甚也時陳倉人吕鮪擁衆數萬與公孫述通寇三輔囂復遣兵佐征西大將軍馮異擊之走鮪遣使上狀帝報以手書曰慕樂徳義思相結納昔文王三分猶服事殷孔子曰周之徳可謂至徳三分天下有其二以服事殷但駑馬鈆刀不可强扶周禮校人掌六馬駑馬最下者也説文鈆青金也似錫而色青賈誼云鈆刀為銛言駑馬鈆刀不可强扶持而用也數蒙伯樂一顧之價戰國策曰蘇代為燕説齊未見齊王先説淳于髠曰人有賣駿馬者比三旦立市市人莫之知往見伯樂曰臣有駿馬欲賣之比三旦立於市市人莫與言願子還而視之去而顧之臣請獻一朝之價伯樂如其言一旦而價十倍也而蒼蠅之飛不過數步即託驥尾得以絶羣張敞書曰蒼蠅之飛不過十步自託騏驥之尾乃騰千里之路然無損於騏驥得使蒼蠅絶羣也見敞傳隔於盜賊聲問不數將軍操執款款扶傾救危南距公孫之兵北禦羌胡之亂是以馮異西征得以數千百人躑躅三輔躑躅猶踟蹰也微將軍之助則咸陽已為他人禽矣今關東寇賊往往屯聚志務廣逺多所不暇未能觀兵成都與子陽角力角力猶爭力也如令子陽到漢中三輔願因將軍兵馬旗鼓相當儻肯如言蒙天之福即智士計功割地之秋也秋一嵗中成功之時故舉以為言管仲曰生我者父母成我者鮑子事見史記自今以後手書相聞勿用傍人解構之言解構猶間構也自是恩禮愈篤其後公孫述數出兵漢中遣使以大司空扶安王印綬授囂囂自以與述敵國恥為所臣乃斬其使出兵擊之連破述軍以故蜀兵不復北出時關中將帥數上書言蜀可擊之狀帝以示囂因使討蜀以效其信囂乃遣長史上書盛言三輔單弱劉文伯在邊文伯盧芳字也未宜謀蜀帝知囂欲持兩端不願天下統一於是稍黜其禮正君臣之儀初囂與來歙馬援相善故帝數使歙援奉使往來勸令入朝許以重爵囂不欲東連遣使深持謙辭言無功徳須四方平定退伏閭里五年復遣來歙説囂遣子入侍囂聞劉永彭寵皆已破滅乃遣長子恂隨歙詣闕以為胡騎校尉封鐫羌侯胡騎校尉武帝置秩二千石也鐫猶鐫鑿也而囂將王元王㨗常以為天下成敗未可知不願專心内事元遂説囂曰昔更始西都四方響應天下喁喁謂之太平喁喁衆口向上也一旦敗壞大王㡬無所厝今南有子陽北有文伯江湖海岱王公十數謂張步據齊董憲起東海李憲守舒劉紆居垂惠佼彊周建秦豐等各據州郡而欲牽儒生之説棄千乗之基儒生謂馬援説囂歸光武羇旅危國以求萬全此循覆車之軌計之不可者也今天水完富士馬最彊北収西河上郡東収三輔之地案秦舊迹表裏山河秦外山而内河左傳曰表裏山河元請以一丸泥為大王東封函谷關此萬世一時也若計不及此且畜養士馬據隘自守曠日持久以待四方之變圖王不成其弊猶足以霸前書徐樂曰圖王不成其弊足以霸也要之魚不可脱於淵老子曰魚不可脱於泉脱失也失泉則涸矣神龍失埶即還與蚯蚓同慎子曰騰蛇㳺霧飛龍乗雲雲罷霧除與蚯蚓同失其所乗故也囂心然元計雖遣子入質猶負其險阸欲專方面於是㳺士長者稍稍去之東觀記曰杜林先去餘稍稍相隨東詣京師六年關東悉平帝積苦兵間以囂子内侍公孫述逺據邊垂乃謂諸將曰且當置此兩子於度外耳因數騰書隴蜀説文曰騰傳也告示禍福囂賔客掾史多文學生每所上事當世士大夫皆諷誦之故帝有所辭答尤加意焉囂復遣使周㳺詣闕先到馮異營㳺為仇家所殺帝遣衞尉銚期持珍寳繒帛賜囂期至鄭被盜鄭今華州縣是也亡失財物帝常稱囂長者務欲招之聞而歎曰吾與隗囂事欲不諧使來見殺得賜道亡㑹公孫述遣兵寇南郡南郡今荆州也乃詔囂當從天水伐蜀因此欲以潰其心腹囂復上言白水險阻棧閣絶敗白水縣有關屬廣漢郡棧閣者山路懸險棧木為閣道又多設支閡支柱障閡帝知其終不為用叵欲討之叵猶遂也遂西幸長安遣建威大將軍耿弇等七將軍從隴道伐蜀先使來歙奉璽書喻㫖囂疑懼即勒兵使王元據隴坻坻坂也郭仲産秦州記曰隴山東西百八十里在隴州汧源縣西伐木塞道謀欲殺歙歙得亡歸諸將與囂戰大敗各引退囂因使王元行廵侵三輔征西大將軍馮異征虜將軍祭遵等擊破之囂乃上疏謝曰吏人聞大兵卒至驚恐自救臣囂不能禁止兵有大利不敢廢臣子之節親自追還昔虞舜事父大杖則走小杖則受家語孔子謂曽子之詞也臣雖不敏敢望斯義今臣之事在於本朝賜死則死加刑則刑如遂蒙恩更得洗心死骨不朽有司以囂言慢請誅其子恂帝不忍復使來歙至汧汧水名因以為縣屬右扶風故城在今隴州汧源縣南賜囂書曰昔柴將軍與韓信書柴將軍柴武也韓信韓王信也信反入匈奴與漢戰故武與之書也云陛下寛仁諸侯雖有亡叛而後歸輙復位號不誅也以囂文吏曉義理故復賜書深言則似不遜略言則事不決今若束手復遣恂弟歸闕庭者則爵祿獲全有浩大之福矣浩亦大也吾年垂四十在兵中十嵗厭浮語虚辭即不欲勿報囂知帝審其詐遂遣使稱臣於公孫述明年述以囂為朔寧王欲其寧靜北邊也遣兵往來為之援埶秋囂將步騎三萬侵安定至陰槃陰槃縣名屬安定郡今涇州縣馮異率諸將拒之囂又令别將下隴攻祭遵於汧兵並無利乃引還帝因令來歙以書招王遵遵乃與家屬東詣京師拜為太中大夫封向義侯續漢書云遵降封上雒侯遵字子春霸陵人也父為上郡太守遵少豪俠有才辯雖與囂舉兵而常有歸漢意曽於天水私於來歙曰吾所以勠力不避矢石者豈要爵位哉徒以人思舊主先君蒙漢厚恩思効萬分耳又數勸囂遣子入侍前後辭諫切甚囂不從故去焉八年春來歙從山道襲得略陽城囂出不意懼更有大兵乃使王元拒隴坻行廵守番須口番須口與回中相近並在汧王孟塞雞頭道雞頭山道也雞或作笄一名崆峒山在今原州西牛邯軍瓦亭安定烏支縣有瓦亭故關有瓦亭川水在今原州西囂自悉其大衆圍來歙公孫述亦遣其將李育田弇助囂攻略陽連月不下帝乃率諸將西征之數道上隴使王遵持節監大司馬吳漢留屯於長安遵知囂必敗滅而與牛邯舊故知其有歸義意以書喻之曰遵與隗王㰱盟為漢自經歴虎口踐履死地已十數矣于時周洛以西周洛謂東都也無所統壹故為王策欲東収關中北取上郡進以奉天人之用退以懲外夷之亂數年之間冀聖漢復存當挈河隴奉舊都以歸本朝生民以來臣人之埶未有便於此時者也而王之將吏羣居穴處之徒穴處言所識不逺也人人抵掌説文抵側擊也戰國策曰蘇秦與李兌抵掌而談也欲為不善之計遵與孺卿日夜所爭害㡬及身者豈一事哉前計抑絶後策不從所以吟嘯㧖腕垂涕登車㧖持也史記云天下之士莫不㧖腕以言之幸䝉封拜得延論議遵為太中大夫在論議之職每及西州之事未嘗敢忘孺卿之言今車駕大衆已在道路吳耿驍將雲集四境而孺卿以奔離之卒拒要㧖當軍衝視其形埶何如哉夫智者覩危思變賢者泥而不滓在泥滯之中而不滓汚也是以功名終申策畫復得故夷吾束縛而相齊新序曰桓公與管仲鮑叔甯戚飲桓公謂鮑叔曰姑為寡人祝乎鮑叔奉酒而起祝曰吾君無忘出莒也使管子無忘束縛從魯也使甯戚無忘其飯牛於車下也黥布杖劒以歸漢黥布為楚淮南王髙祖使隨何説布乃杖劒歸漢王也去愚就義功名並著今孺卿當成敗之際遇嚴兵之鋒可為怖慄宜斷之心胷參之有識邯得書沈吟十餘日乃謝士衆歸命洛陽拜為太中大夫於是囂大將十三人屬縣十六衆十餘萬皆降王元入蜀求救囂將妻子奔西城從楊廣西城縣名屬漢陽郡一名始昌城在今秦州上邽縣西南而田弇李育保上邽詔告囂曰若束手自詣父子相見保無佗也髙皇帝云横來大者王小者侯田横為齊王天下既定横與賔客五百人居海島髙祖使召之曰横來大者王小者侯事見前書若遂欲為黥布者亦自任也必不歸降遂如黥布云欲為帝亦任之也囂終不降於是誅其子恂使吳漢與征南大將軍岑彭圍西城耿弇與虎牙大將軍蓋延圍上邽車駕東歸潁川賊起故東歸月餘楊廣死囂窮困其大將王㨗别在戎丘登城呼漢軍曰為隗王城守者皆必死無二心願諸軍亟罷亟音紀力反請自殺以明之遂自刎頸死何休公羊傳云刎割也數月王元行廵周宗將蜀救兵五千餘人乗髙卒至鼓譟大呼曰百萬之衆方至漢軍大驚未及成陳元等決圍殊死戰遂得入城迎囂歸冀㑹吳漢等食盡退去於是安定北地天水隴西復反為囂九年春囂病且餓出城餐糗糒鄭康成注周禮曰糗熬大豆與米也説文曰糒乾飯也恚憤而死續漢志曰王莽末天水童謡曰出吳門望緹羣見一蹇人言欲上天令天可上地上安得人時囂初起兵於天水後意稍廣欲為天子遂破滅囂少病蹇吳門冀都門名也有緹羣山王元周宗立囂少子純為王明年來歙耿弇蓋延等攻破落門落門聚名也有落門谷水在今秦州伏羌縣西周宗行廵茍宇趙恢等將純降宗恢及諸隗分徙京師以東純與廵宇徙𢎞農唯王元留為蜀將及輔威將軍臧宫破延岑元舉衆詣宫降元字惠孟初拜上蔡令遷東平相坐墾田不實下獄死決錄曰平陵之王惠孟鏘鏘激昻囂述困於東平也牛邯字孺卿狄道人有勇力才氣雄於邊垂及降大司空司直杜林劉攽曰案司空無司直當作徒字杜林傳亦可見太中大夫馬援並薦之以為䕶羌校尉與來歙平隴右十八年純與賔客數十騎亡入胡至武威捕得誅之論曰隗囂援旗糺族援引也糺収也假制明神謂立髙祖孝文等廟而祭之也迹夫創圖首事有以識其風矣終於孤立一隅介于大國東逼於漢南拒於蜀左傳曰介于二大國之間隴坻雖隘非有百二之埶百二者以秦地險固二萬人當諸侯百萬人前書曰田肯賀髙祖秦得百二焉區區兩郡隴西天水也以禦堂堂之鋒言光武親征之也魏武兵書云無擊堂堂之陣至使窮廟策及征徭身歿衆解然後定之則知其道有足懷者所以棲有四方之桀四方雄桀者皆棲集而有之士至投死絶亢而不悔者矣亢喉嚨也謂王㨗自刎也夫功全則譽顯業謝則釁生回成喪而為其議者或未聞焉成喪猶成敗也言事之成敗在於天命不由人力能回為此議者寡故未之聞也若囂命㑹符運敵非天力雖坐論西伯豈多嗤乎天力謂光武天所授也言不遇光武為敵則不謝西伯也嗤笑也公孫述傳公孫述字子陽扶風茂陵人也東觀記曰其先武帝時以吏二千石自無鹽徙焉哀帝時以父任為郎任保任也東觀記曰成帝末述父仁為侍御史任為太子舎人稍増秩為郎焉後父仁為河南都尉秦置郡尉典兵禁捕盜賊景帝更名都尉秩比二千石也而述補清水長清水縣名屬天水郡今秦州縣仁以述年少遣門下掾隨之官州郡有掾皆自辟除之常居門下故以為號月餘掾辭歸白仁曰述非待教者也後太守以其能使兼攝五縣政事修理姦盜不發郡中謂有鬼神言明察也王莽天鳳中為導江卒正居臨卭王莽改蜀郡曰導江太守曰卒正臨卭今卭州縣也復有能名及更始立豪傑各起其縣以應漢南陽人宗成自稱虎牙將軍入略漢中又商人王岑亦起兵於雒縣商今商州商雒縣也雒縣屬廣漢郡今益州縣也自稱定漢將軍殺王莽庸部牧以應成王莽改益州為庸部其牧宋遵也衆合數萬人述聞之遣使迎成等成等至成都虜掠暴横述意惡之召縣中豪傑謂曰天下同苦新室思劉氏久矣故聞漢將軍到馳迎道路今百姓無辜而婦子係獲室屋燒燔此寇賊非義兵也吾欲保郡自守以待真主諸卿欲并力者即留不欲者便去豪傑皆叩頭曰願效死述於是使人詐稱漢使者自東方來假述輔漢將軍蜀郡太守兼益州牧印綬乃選精兵千餘人西擊成等比至成都衆數千人遂攻城大破之成將垣副殺成以其衆降風俗通曰垣秦邑也因以為姓秦始皇有將垣齮東觀記曰初副以漢中亭長聚衆降成自稱輔漢將軍二年秋更始遣柱功侯李寳益州刺史張忠將兵萬餘人徇蜀漢述恃其地險衆附有自立志乃使其弟恢恢本或作惔於綿竹擊寳忠大破走之綿竹縣名屬廣漢郡今益州縣也故城今在縣東由是威震益部功曹李熊説述曰方今四海波蕩匹夫横議將軍割據千里地什湯武枚乗諫吳王曰湯武之土不過百里若奮威徳以投天隙天時之間隙也霸王之業成矣宜改名號以鎮百姓述曰吾亦慮之公言起我意於是自立為蜀王都成都蜀地肥饒兵力精强逺方士庶多往歸之卭笮君長卭笮皆西南夷國名笮音昨見西南夷傳皆來貢獻李熊復説述曰今山東飢饉人庶相食兵所屠滅城邑丘墟蜀地沃野千里土壤膏腴無塊曰壤果實所生無穀而飽左思蜀都賦曰户有橘柚之園又曰𤓰疇芋區前書卓王孫曰吾聞㟭山之下沃野下有蹲鴟至死不飢女工之業覆衣天下左思蜀都賦曰百室離房機杼相和衣音於既反名材竹榦器械之饒不可勝用竹榦竹箭也内盛曰器外盛曰械又有魚鹽銅銀之利丙穴出嘉魚在漢中蜀有鹽井又有銅陵山其朱提界出銀朱音上朱反提音上移反浮水轉漕之便北據漢中杜裦斜之險東守巴郡拒扞關之口史記曰楚肅王為扞關以拒蜀故基在今硤州巴山縣地方數千里戰士不下百萬見利則出兵而略地無利則堅守而力農東下漢水以窺秦地南順江流以震荆揚所謂用天因地成功之資今君王之聲聞於天下而名號未定志士狐疑宜即大位使逺人有所依歸述曰帝王有命吾何足以當之熊曰天命無常百姓與能詩云天命靡常易曰百姓與能能者當之王何疑焉述夢有人語之曰八厶子系十二為期説文云厶音私系音係胡計反覺謂其妻曰雖貴而祚短若何妻對曰朝聞道夕死尚可况十二乎㑹有龍出其府殿中夜有光耀述以為符瑞因刻其掌文曰公孫帝建武元年四月遂自立為天子號成家以起成都故號成家色尚白建元曰龍興元年以李熊為大司徒以其弟光為大司馬恢為大司空改益州為司𨽻校尉蜀郡為成都尹漢以京師為司𨽻校尉部置京兆尹中興以洛陽為司𨽻校尉部置河南尹故述斆焉越巂任貴亦殺王莽大尹而據郡降述遂使將軍侯丹開白水關在漢陽西縣梁州記曰關城西南有白水關也北守南鄭今梁州縣也故城在今縣東北也將軍任滿從閬中下江州閬中江州皆縣名並屬巴郡閬中今隆州縣也江州故城在渝州巴縣西東據扞關於是盡有益州之地自更始敗後光武方事山東未遑西伐關中豪桀吕鮪等往往擁衆以萬數莫知所屬多往歸述時延岑據藍田王歆據下邽各稱將軍擁兵事見馮異傳皆拜為將軍遂大作營壘陳車騎肄習戰射㑹聚兵甲數十萬人積糧漢中築宫南鄭又造十層赤樓帛蘭舩蓋以帛飾其蘭檻也多刻天下牧守印章備置公卿百官使將軍李育程烏將數萬衆出陳倉與吕鮪徇三輔三年征西將軍馮異擊鮪育於陳倉大敗之鮪育奔漢中五年延岑田戎為漢兵所敗皆亡入蜀岑字叔牙南陽人東觀記曰筑陽縣人始起據漢中又擁兵關西關西所在破散劉攽曰案文多兩關西字走至南陽略有數縣戎汝南人初起兵夷陵轉寇郡縣衆數萬人岑戎並與秦豐合豐俱以女妻之及豐敗故二人皆降於述述以岑為大司馬封汝寧王戎翼江王六年述遣戎與將軍任滿出江關下臨沮夷陵間華陽國志曰巴楚相攻故置江關舊在赤甲城後移在江州南岸對白帝城故基在今䕫州復縣南臨沮縣名侯國屬南郡故城在今荆州當陽縣西北夷陵縣名屬南郡今硤州縣也故城在今縣西北劉攽曰注今䕫州復縣案文少一魚字招其故衆因欲取荆州諸郡竟不能尅是時述廢銅錢置鐵官錢置鐵官以鑄錢百姓貨幣不行蜀中童謡言曰黄牛白腹五銖當復好事者竊言王莽稱黄述自號白五銖錢漢貨也言天下當并還劉氏述亦好為符命鬼神瑞應之事妄引䜟記以為孔子作春秋為赤制而斷十二公尚書考靈耀曰孔子為赤制故作春秋赤者漢行也言孔子作春秋斷十二公象漢十二帝明漢至平帝十二代歴數盡也據漢十一帝言十二代者并數吕后一姓不得再受命又引錄運法曰廢昌帝立公孫括地象曰帝軒轅受命公孫氏握錄運法括地象並河圖名也援神契曰西太守乙卯金謂西方太守而乙絶卯金也乙軋也述言西方太守能軋絶卯金也五徳之運黄承赤而白繼黄金據西方為白徳而代王氏得其正序又自言手文有竒及得龍興之瑞數移書中國冀以感動衆心帝患之乃與述書曰圖䜟言公孫即宣帝也代漢者當塗髙君豈髙之身邪東觀記曰光武與述書曰承赤者黄也姓當塗其名髙也乃復以掌文為瑞王莽何足效乎王莽詐以鐵契石龜文圭𤣥印等為符瑞言不足倣傚也君非吾賊臣亂子倉卒時人皆欲為君事耳何足數也數責也君日月已逝妻子弱小當早為定計可以無憂天下神器不可力爭老子云天下神器不可為也宜留三思署曰公孫皇帝述不答明年隗囂稱臣於述述騎都尉平陵人荆邯見東方將平兵且西向説述曰兵者帝王之大器古今所不能廢也左傳宋子罕曰天生五材廢一不可誰能去兵聖人以興亂人以廢廢興存亡之術皆兵之由也昔秦失其守豪桀並起漢祖無前人之迹立錐之地言漢祖起自布衣無公劉太王之業也枚乗諫吳王書曰舜無立錐之地以有天下起於行陣之中躬自奮擊兵破身困者數矣然軍敗復合創愈復戰軍敗謂戰於睢水上為楚所破後得韓信軍復大振也創愈謂在於成臯間項羽射傷漢王胷後復戰何則前死而成功踰於却就於滅亡也劉攽曰案文下於字當作而在文勢不可併用兩於字也隗囂遭遇運㑹割有雍州兵强士附威加山東隴西天水皆雍州之地故言割有也囂傳云名震西州流聞山東是威加也遇更始政亂復失天下衆庶引領四方瓦解淮南子曰武王伐紂左操黄鉞右秉白旄而麾之則瓦解而走囂不及此時推危乗勝以爭天命而退欲為西伯之事尊師章句賔友處士章句謂鄭興等也處士謂方望等也偃武息戈卑辭事漢喟然自以文王復出也令漢帝釋關隴之憂以囂居西無東之意故置之度外而不為憂專精東伐四分天下而有其三使西州豪桀咸歸心於山東發間使召擕貳間使謂來歙馬援等也擕貳謂王遵鄭興杜林牛邯等相次而歸光武則五分而有其四若舉兵天水必至沮潰天水既定則九分而有其八陛下以梁州之地内奉萬乗外給三軍百姓愁困不堪上命將有王氏自潰之變王氏即王莽也臣之愚計以為宜及天下之望未絶豪桀尚可招誘急以此時發國内精兵令田戎據江陵臨江南之㑹倚巫山之固巫山在今䕫州巫山縣東也築壘堅守傳檄吳楚長沙以南必隨風而靡令延岑出漢中定三輔天水隴西拱手自服如此海内震揺冀有大利述以問羣臣博士吳柱曰昔武王伐殷先觀兵孟津八百諸侯不期同辭然猶還師以待天命未聞無左右之助而欲出師千里之外以廣封彊者也邯曰今東帝無尺土之柄驅烏合之衆鄒陽云周用烏集而王跨馬陷敵所向輙平不亟乗時與之分功而坐談武王之説是效隗囂欲為西伯也述然邯言欲悉發北軍屯士及山東客兵使延岑田戎分出兩道與漢中諸將合兵并埶蜀人及其弟光以為不宜空國千里之外決成敗於一舉固爭之述乃止延岑田戎亦數請兵立功終疑不聴述性苛細察於小事敢誅殺而不見大體好改易郡縣官名然少為郎習漢家制度出入法駕法駕屬車三十六乗公卿不在鹵簿中侍中驂乗奉車都尉御前驅九斿雲䍐鳳皇闟㦸皮軒鑾旗旄騎旄頭之騎也陳置陛㦸然後輦出房闥又立其兩子為王食犍為廣漢各數縣羣臣多諫以為成敗未可知戎士暴露而遽王皇子示無大志傷戰士心述不聴唯公孫氏得任事由此大臣皆怨八年帝使諸將攻隗囂述遣李育將萬餘人救囂囂敗并沒其軍蜀地聞之恐動述懼欲安衆心成都郭外有秦時舊倉述改名白帝倉述以色尚白故改之自王莽以來常空述即詐使人言白帝倉出穀如山林百姓空市里往觀之述乃大㑹羣臣問曰白帝倉竟出穀乎皆對言無述曰訛言不可信道隗王破者復如此矣俄而囂將王元降述以為將軍明年使元與領軍環安拒河池河池今鳳州縣也又遣田戎及大司徒任滿南郡太守程汎將兵下江關破虜將軍馮駿等拔巫及夷陵夷道夷道縣名屬南郡故城在今硤州宜都縣西因據荆門荆門山名也在今硤州宜都縣西北今猶有故城基趾在山上十一年征南大將軍岑彭攻之滿等大敗述將王政斬滿首降于彭田戎走保江州江州縣名屬巴郡故城今渝州巴縣城邑皆開門降彭遂長驅至武陽武陽縣名故城在今眉州帝乃與述書陳言禍福以明丹青之信楊雄法言曰王者之言炳若丹青述省書歎息以示所親太常常少光祿勲張隆隆少皆勸降述曰廢興命也豈有降天子哉左右莫敢復言中郎將來歙急攻王元環安安使刺客殺歙述復令刺殺岑彭十二年述弟恢及子壻史興並為大司馬吳漢輔威將軍臧宫所破戰死自是將帥恐懼日夜離叛述雖誅滅其家猶不能禁帝必欲降之乃下詔喻述曰往年詔書比下比頻也開示恩信勿以來歙岑彭受害自疑今以時自詣則家族完全若迷惑不喻委肉虎口痛哉奈何將帥疲倦吏士思歸不樂久相屯守詔書手記不可數得朕不食言述終無降意九月吳漢又破斬其大司徒謝豐執金吾袁吉漢兵遂守成都述謂延岑曰事當奈何岑曰男兒當死中求生可坐窮乎財物易聚耳不宜有愛述乃悉散金帛募敢死士五千餘人以配岑於市橋市橋即七星之一橋也李膺益州記曰冲星橋舊市橋也在今成都縣西南四里偽建旗幟幟幡也幟音昌忌反又式志反鳴鼔挑戰而潛遣竒兵出吳漢軍後襲擊破漢漢墮水緣馬尾得出十一月臧宫軍至咸門成都北面有二門其西者名咸門述視占書云虜死城下大喜謂漢等當之乃自將數萬人攻漢使延岑拒宫大戰岑三合三勝自旦及日中軍士不得食並疲漢因令壯士突之述兵大亂被刺洞胷墮馬吳漢傳云䕶軍髙午奔陣刺述殺之左右輿入城述以兵屬延岑其夜死明旦岑降吳漢乃夷述妻子盡滅公孫氏并族延岑遂放兵大掠焚述宫室帝聞之怒以譴漢又讓漢副將劉尚曰城降三日吏人從服孩兒老母口以萬數一旦放兵縱火聞之可為酸鼻尚宗室子孫嘗更吏職何忍行此仰視天俯視地觀放麑啜羮二者孰仁韓子曰孟孫獵得麑使秦西巴持之其母随而呼秦西巴不忍而與其母戰國策曰樂羊為魏將而攻中山其子在中山中山君烹其子而遺之羮樂羊啜之盡一盃而攻拔中山良失斬將弔人之義也良猶甚也初常少張隆勸述降不從並以憂死帝下詔追贈少為太常隆為光祿勲以禮改𦵏之其忠節志義之士並蒙旌顯謂李業譙𤣥等見獨行傳程烏李育以有才幹皆擢用之於是西土咸悦莫不歸心焉論曰昔趙佗自王番禺趙佗真定人因漢初天下未定自立為南越王畨禺縣屬南海郡故城在今廣州西南越志曰有畨山禺山因以為名公孫亦竊帝蜀漢推其無他功能而至於後亡者將以地邊處逺非王化之所先乎述雖為漢吏無所馮資徒以文俗自熹遂能集其志計道未足而意有餘不能因隙立功以㑹時變方乃坐飾邊幅邊幅猶有邊緣以自矜持以髙深自安昔吳起所以慙魏侯也史記曰魏武侯浮西河而下中流而顧曰美哉乎河山之固此魏之寳也吳起對曰在徳不在險及其謝臣屬審廢興之命與夫泥首銜玉者異日談也干寳晉記曰吳王孫皓將其子瑾等泥首面縛降王濬左傳曰許男面縛銜璧以見楚子璧玉也贊曰公孫習吏隗王得士漢命已還二隅方跱天數有違江山難恃違猶去也後漢書卷四十三後漢書卷四十三考證隗囂傳劉文伯在邊注文伯盧芳字也臣承蒼按盧芳詐稱武帝曽孫劉文伯故當時之人但知為劉文伯不知為盧芳文伯非盧芳字也芳字君期見本傳後漢書卷四十三考證
