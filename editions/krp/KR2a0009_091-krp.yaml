body:
  text: 後漢書卷九十一宋宣城太守范煜撰唐章懐太子賢注左周黄列傳第五十一左雄傳左雄字伯豪南郡湼陽人也安帝時舉孝廉稍遷冀州刺史州部多豪族好請託雄常閉門不與交通奏案貪猾二千石無所囘忌永建初公車徴拜議郎時順帝新立大臣懈怠朝多闕政雄數言事其辭深切尚書僕射虞詡以雄有忠公節上疏薦之曰臣見方今公卿以下類多拱默以樹恩為賢盡節為愚至相戒曰白璧不可為容容多後福容容猶和同也言不可獨為白玉之清潔當與衆人和同也伏見議郎左雄數上封事至引陛下身遭難戹以為警戒實有王臣蹇蹇之節周公謨成王之風謨謀也即尚書立政無逸篇之類也宜擢在喉舌之官必有匡弼之益由是拜雄尚書再遷尚書令上疏陳事曰臣聞柔逺和邇莫大寜人寜人之務莫重用賢用賢之道必存考黜是以臯陶對禹貴在知人安人則惠黎民懐之尚書臯陶謨之詞也惠愛也黎衆也分伯建侯代位親民民用和睦禮讓以興故詩云有渰淒淒興雨祁祁雨我公田遂及我私詩云小雅也渰隂雲也淒淒雲興貌祁徐也言隂陽和風雨時先雨公田乃及私田及幽厲昬亂不自為政詩小雅刺幽王曰不自為政卒勞百姓襃豔用權七子黨進賢愚錯緒深谷為陵故其詩云四國無政不用其良又曰哀今之人胡為虺蜴言人畏吏如虺蜴也襃豔謂襃姒也豔色羙也七子皆襃姒之親黨謂皇甫為卿士仲允為膳夫家伯為宰畨為司徒蹶為趣馬棸子為内史楀為師氏也幽王滛於色七子皆用言妻黨盛也四國四方之國也虺蝪之性見人則走哀今之人皆如是傷時政事也詩小雅番音方元反棸音側流反楀音記禹反宗周既滅六國并秦阬儒泯典剗革五等更立郡縣剗削也五等謂諸侯縣設令長郡置守尉什伍相司封豕其民史記商鞅為秦定變法之令令人什伍而相收司犯禁相連坐不告姦者腰斬揚雄長楊賦曰秦窫窳其士封豕其人也大漢受命雖未復古然克慎庶官蠲苛救敝恱以濟難撫而循之至於文景天下康乂誠由𤣥靖寛柔克慎官人故也降及宣帝興於仄陋綜覈名實知時所病刺史守相輙親引見考察言行信賞必罰帝乃歎曰民所以安而無怨者政平吏良也與我共此者其唯良二千石乎以為吏數變易則下不安業久於其事則民服教化其有政理者輙以璽書勉勵增秩賜金或爵至關内侯公卿缺則以次用之是以吏稱其職人安其業漢世良吏於兹為盛故能降來儀之瑞建中興之功宣帝時鳳皇五至因以紀年漢初至今三百餘載俗浸彫敝巧偽滋萌下飾其詐上肆其殘典城百里轉動無常各懐一切莫慮長久謂殺害不辜為威風聚斂整辦為賢能以理己安民為劣弱以奉法循理為不化髠鉗之戮生於睚皆覆尸之禍成於喜怒視民如寇讎稅之如豺虎國語曰鬭丹廷見令尹子常與之語問畜貨聚焉歸以語其弟曰楚其亡乎吾見令尹如餓獸豺虎焉殆必亡者也劉攽曰注畜貨聚焉案國語作聚馬此誤監司項背相望項背相望謂前後相顧也背音軰與同疾疢見非不舉聞惡不察觀政於亭傳責成於期月期匝也謂一嵗言善不稱徳論功不據實虚誕者獲譽拘檢者離毁離遭也或因罪而引髙或色斯以求名因罪遁以求髙尚之名也論語曰色斯舉矣言觀前人之顔色也州宰不覆競共辟召踴躍升騰超等踰匹或考奏捕案而亡不受罪會赦行賂復見洗滌朱紫同色清濁不分故使姦猾枉濫輕忽去就拜除如流缺動百數鄉官部吏職斯禄薄斯賤也車馬衣服一出於民亷者取足貪者充家特選横調調徴也紛紛不絶送迎煩費損政傷民和氣未洽災𤯝不消咎皆在此今之墨綬猶古之諸侯墨綬謂令長即古子男之國也拜爵王庭輿服有庸庸常也而齊於匹豎叛命避負非所以崇憲明理惠育元元也臣愚以為守相長吏惠和有顯效者可就増秩勿使移徙非父母喪不得去官其不從法禁不式王命錮之終身式用也雖會赦令不得齒列若被劾奏亡不就法者徙家邉郡以懲其後鄉部親民之吏皆用儒生清白任從政者任堪也音人林反寛其負算負欠也算口錢也儒生未有品秩故寛之增其秩禄吏職滿嵗宰府州郡乃得辟舉如此威福之路塞虚偽之端絶送迎之役損賦斂之源息循理之吏得成其化率土之民各寕其所追配文宣中興之軌文帝宣帝也文帝遭吕氏難故亦云中興也流光垂祚永世不刊帝感其言申下有司考其眞偽詳所施行雄之所言皆明達政體而宦豎擅權終不能用自是選代交互令長月易迎新送舊勞擾無己或官寺空曠無人案事每選部劇乃至逃亡永建三年京師漢陽地皆震裂水泉涌出四年司冀復有大水雄推較災異以為下人有逆上之徴天鏡經曰大水自平地出破山殺人其國有兵又上疏言宜密為備以俟不虞尋而青冀揚州盗賊連發數年之間海内擾亂其後天下大赦賊雖頗觧而官猶無備流叛之餘数月復起雄與僕射郭䖍共上疏以為寇賊連年死亡太半一人犯法舉宗羣亡宜及其尚微開令改悔若告黨與者聽除其罪能誅斬者明加其賞書奏並不省又上言宜崇經術繕脩太學帝從之陽嘉元年太學新成詔試明經者補弟子增甲乙之科員各十人除京師及郡國耆儒年六十以上為郎舍人諸王國郎者百三十八人雄又上言郡國孝亷古之貢士出則宰民宣協風教若其面墻則無所施用孔子曰四十而不惑禮稱强仕請自今孝亷年不滿四十不得察舉皆先詣公府諸生試家法儒有一家之學故稱家法文吏課牋奏副之端門練其虚實以觀異能以羙風俗有不承科令者正其罪法若有茂才異行自可不拘年齒帝從之於是班下郡國明年有廣陵孝亷徐淑謝承書曰淑字伯達廣陵海西人也寛裕博雅好學樂道随父慎在京師賛孟氏易春秋公羊禮記周官善誦太公六韜交接英雄常有壯志舉茂才除渤海脩令遷琅邪都尉也年未及舉臺郎疑而詰之對曰詔書曰有如顔回子竒不拘年齒解見順帝紀是故本郡以臣充選郎不能屈雄詰之曰昔顔回聞一知十孝亷聞一知幾邪淑無以對乃譴却郡於是濟隂太守胡廣等十餘人皆坐謬舉免黜唯汝南陳蕃潁川李膺下邳陳球等三十餘人得拜郎中自是牧守畏慄莫敢輕舉迄于永熹察選清平多得其人雄又奏徴海内名儒為博士使公卿子弟為諸生有志撡者加其俸禄及汝南謝亷河南趙建年始十二各能通經雄並奏拜童子郎於是負書來學雲集京師初帝廢為濟隂王乳母宋娥與黄門孫程等共議立帝帝後以娥前有謀遂封為山陽君邑五千戸又封大將軍梁商子冀襄邑侯雄上封事曰夫裂土封侯王制所重髙皇帝約非劉氏不王非有功不侯孝安皇帝封江京王聖等遂致地震之異永建二年封隂謀之功又有日食之變數術之士咸歸咎於封爵今青州饑虚盗賊未息民有乏絶上求稟貸陛下乾乾勞思以濟民為務宜循古法寜靜無為以求天意以消災異誠不宜追録小恩虧失大典帝不聽雄復諌曰臣聞人君莫不好忠正而惡䜛諛然而歴世之患莫不以忠正得罪䜛諛䝉倖者蓋聽忠難從諛易也夫刑罪人情之所甚惡貴寵人情之所甚欲是以時俗為忠者少而習諛者多故令人主數聞其美稀知其過迷而不悟至於危亡臣伏見詔書顧念阿母舊徳宿恩欲特加顯賞案尚書故事無乳母爵邑之制唯先帝時阿母王聖為野王君聖造生䜛賊廢立之禍生為天下所咀嚼死為天下所歡快桀紂貴為天子而庸僕羞與為比者以其無義也夷齊賤為匹夫而王侯爭與為伍者以其有徳也今阿母躬蹈約儉以身率下羣僚蒸庶莫不向風而與王聖並同爵號懼違本撡失其常願臣愚以為凡人之心理不相逺其所不安古今一也百姓深懲王聖傾覆之禍民萌之命危於累卵常懼時世復有此類怵惕之念未離於心恐懼之言未絶於口乞如前議嵗以千萬給奉阿母内足以盡恩愛之歡外可不為吏民所怪梁冀之封事非禨急宜過災戹之運然後平議可否會復有地震緱氏山崩之異雄復上疏諫曰先帝封野王君漢陽地震今封山陽君而京城復震專政在隂其災尤大臣前後瞽言封爵至重王者可私人以財不可以官宜還阿母之封以塞災異今冀己髙讓山陽君亦宜崇其本節雄言數切至娥亦畏懼辭讓而帝戀戀不能已卒封之後阿母遂以交遘失爵是時大司農劉據以職事被譴召詣尚書傳呼促歩又加以捶撲雄上言九卿位亞三事班在大臣行有佩玉之節動有庠序之儀禮記曰公侯佩山𤣥玉而朱組綬大夫佩水蒼玉而緇組綬孝明皇帝始有撲罰皆非古典帝從而改之其後九卿無復捶撲者自雄掌納言多所匡肅毎有章表奏議臺閣以為故事遷司𨽻校尉初雄薦周舉為尚書舉既稱職議者咸稱焉及在司𨽻又舉故冀州刺史馮直以為將帥而直嘗坐臧受罪舉以此劾奏雄雄恱曰吾嘗事馮直之父而又與直善今宣光以此奏吾乃是韓厥之舉也由是天下服焉韓厥韓獻子也國語曰趙宣子舉獻子於靈公以為司馬河曲之役宣子使人以其乘車干行獻子執而戮之宣子皆告諸大夫曰可賀我矣吾舉厥也而中吾乃今知免於罪矣明年坐法免後復為尚書永和三年卒周舉傳周舉字宣光汝南汝陽人陳留太守防之子防在儒林傳舉姿貌短陋而博學洽聞為儒者所宗故京師為之語曰五經從横周宣光延熹四年辟司徒李郃府時宦豎孫程等既立順帝誅滅諸閻議郎陳禪以為閻太后與帝無母子恩宜徙别舘絶朝見羣臣議者咸以為宜舉謂郃曰昔鄭武姜謀殺莊公公誓之黄泉秦始皇怨母失行久而隔絶後感潁考叔茅焦之言循復子道書傳美之鄭武姜生莊公及共叔叚愛叔叚謀殺荘公公誓之曰不及黄泉無相見也既而悔之潁考叔為潁谷封人曰若掘地及泉隧而相見其誰曰不然公從之遂為母子如初事見左傳茅焦事觧見蘇竟傳也今諸閻新誅太后幽在離宫若悲愁生疾一旦不虞主上將何以令於天下如從禪議後世歸咎明公宜密表朝廷令奉太后率厲羣臣朝覲如舊以厭天心以荅人望郃即上䟽陳之明年正月帝乃朝于東宫太后由此以安後長樂少府朱倀音丑良反代郃為司徒舉猶為吏時孫程等坐懐表上殿爭功帝怒悉徙封逺縣勑洛陽令促期發遣舉說朱倀曰朝廷在西鍾下時非孫程等豈立朝廷謂順帝也孫程與王康䓁十八人謀於西鍾下共立濟隂王為順帝也雖韓彭吳賈之功何以加諸韓信彭越吳漢賈復也今忘其大徳録其小過如道路夭折帝有殺功臣之譏及今未去宜急表之倀曰今詔怒二尚書己奏其事吾獨表此必致罪譴舉曰明公年過八十位至台輔不於今時竭忠報國惜身安寵欲以何求禄位雖全必䧟佞邪之譏諫而獲罪猶有忠貞之名若舉言不足採請從此辭倀乃表諫帝果從之舉後舉茂才為平丘令平丘縣屬陳留郡上書言當世得失辭甚切正尚書郭䖍應賀等見之歎息共上疏稱舉忠直欲帝置章御坐以為規誡章謂所上之書舉稍遷并州刺史太原一郡舊谷以介子推焚骸有龍忌之禁新序曰晉文公反國介子推無爵遂去而之介山之上文公求之不得乃焚其山推遂不出而焚死事具耿恭傳龍星木之位也春見東方心為大火懼火之盛故為之禁火俗傳云子推以此日被焚而禁火至其亡月咸言神靈不樂舉火由是士民每冬中輙一月寒食莫敢煙爨老小不堪歳多死者舉既到州乃作弔書以置子推之廟言盛冬去火殘損民命非賢者之意以宣示愚民使還温食其事見桓譚新論及汝南先賢傳也於是衆惑稍解風俗頗革轉冀州刺史陽嘉三年司𨽻校尉左雄薦舉徴拜尚書舉與僕射黄瓊同心輔政名重朝廷左右憚之是嵗河南三輔大旱五穀災傷天子親自露坐徳陽殿東廂請雨又下司𨽻河南禱祀河神名山大澤詔書以舉才學優深特下䇿問曰朕以不徳仰承三綂天統地統人統謂之三統事見白虎通夙興夜寐思協大中尚書洪範曰建用皇極孔安國注云皇大也極中也言立大中之道而行之也頃年以來旱災屢應稼穡焦枯民食困乏五品不訓王澤未流五品五常之教也書曰五品不遜汝作司徒敬敷五教在寛訓亦遜之義羣司素餐據非其位審所貶黜變復之徴厥効何由分别具對勿有所諱舉對曰臣聞易稱天尊地卑乾坤定矣二儀交構乃生萬物萬物之中以人為貴故聖人養之以君成之以化順四時之宜適隂陽之和使男女婚娶不過其時包之以仁恩導之以徳教示之以災異訓之以嘉祥此先聖承乾養物之始也夫隂陽閉隔則二氣否塞二氣否塞則人物不昌人物不昌則風雨不時風雨不時則水旱成災陛下處唐虞之位未行堯舜之政近廢文帝光武之法而循亡秦奢侈之欲内積怨女外有曠夫今皇嗣不興東宫未立傷和逆理斷絶人倫之所致也非但陛下行此而已豎宦之人亦復虚以形埶威侮良家取女閉之至有白首歿無配偶逆於天心歿終也昔武王入殷出傾宫之女帝王紀曰武王入殷命召公釋箕子之囚表商容之閭出傾宫之女於諸侯成湯遭災以六事剋己帝王紀曰湯伐桀後大旱七年洛川竭使人持三足鼎祝於山川曰政不節邪使人疾邪苞苴行邪䜛夫昌邪宫室榮邪女謁行邪何不雨之極也魯僖遇旱而自責祈雨解見楊厚傳皆以精誠轉禍為福自枯旱以來彌歴年嵗未聞陛下改過之効徒勞至尊暴露風塵誠無益也又下州郡祈神致請昔齊有大旱景公欲祀河伯晏子諫曰不可夫河伯以水為城國魚鼈為民庶水盡魚枯豈不欲雨自是不能致也晏子春秋之文陛下所行但務其華不尋其實猶縁木求魚却行求前縁木求魚見孟子之文韓詩外傳曰夫明鏡所以照形徃古所以知今夫惡知徃古之所以危亡無異却行而求逮於前人也誠宜推信革政崇道變惑出後宫不御之女理天下寃枉之獄除大官重膳之費夫五品不訓責在司徒有非其位宜急黜斥臣自藩外擢典納言學薄智淺不足以對易傳曰陽感天不旋日易稽覽圗之文也解見郎顗傳也惟陛下留神裁察因召見舉及尚書令成翊世僕射黄瓊問以得失舉等並對以為宜愼官人去斥貪汙離逺佞邪循文帝之儉尊孝明之教則時雨必應帝曰百官貪汙佞邪者為誰乎舉獨對曰臣從下州超備機密不足以别羣臣别音彼列反然公卿大臣數有直言者忠貞也阿諛茍容者佞邪也司徒視事六年未聞有忠言異謀愚心在此其後以事免司徒劉崎遷舉司𨽻校尉永和元年災異數見省内惡之詔召公卿中二千石尚書詣顯親殿問曰言事者多云昔周公攝天子事及薨成王欲以公禮葬之天為動變及更葬以天子之禮即有反風之應尚書洪範五行傳曰周公死成王不圗大禮故天大雷雨禾偃大木㧞及成王寤金縢之䇿改周公之葬尊以王禮申命魯郊而天立復風雨禾稼盡起北鄉侯親為天子而葬以王禮故數有災異宜加尊諡列於昭穆羣臣議者多謂宜如詔㫖舉獨對曰昔周公有請命之應隆太平之功故皇天動威以章聖徳北鄉侯本非正統姦臣所立立不踰嵗年號未改皇天不祐大命天昏杜預注左傳曰短折曰夭未名曰昏春秋王子猛不稱崩魯子野不書葬子猛周景王之子子野魯襄公之子春秋經書王子猛卒杜元凱注云未即位故不言崩又曰秋九月癸巳子野卒注曰不書葬未成君也今北鄉侯無它功徳以王禮葬之於事己崇不宜稱諡災𤯝之來弗由此也於是司徒黄尚太常桓焉等七十人同舉議帝從之尚字河伯河南郡人也少歴顯位亦以政事稱舉出為蜀郡太守坐事免大將軍梁商表為從事中郎甚敬重焉六年三月上巳日商大㑹賔客讌于洛水周官曰女巫掌嵗時祓除釁沴鄭𤣥云如今三月上巳水上之類也司馬彪續漢書曰三月上巳宫人皆絜於東流水上自洗濯祓除為大絜也舉時稱疾不徃商與親暱酣飲極歡及酒䦨倡罷繼以䪥露之歌坐中聞者皆為掩涕纂文曰䪥露今之挽歌也崔豹古今注䪥露歌曰䪥上露何易晞露晞明朝還復落人死一去何時歸太僕張种時亦在焉會還以事告舉舉歎曰此所謂哀樂失時非其所也殃將及乎左傳曰叔孫昭子與宋公語相泣樂祁退而告人曰君與叔孫其皆死乎吾聞之哀樂而樂哀皆喪心也心之精爽是謂魂魄魂魄去之何以能久也商至秋果薨商疾篤帝親臨幸問以遺言對曰人之將死其言也善臣從事中郎周舉清髙忠正可重任也由是拜舉諫議大夫時連有災異帝思商言召舉於顯親殿問以變𤯝舉對曰陛下初立遵脩舊典興化致政逺近肅然頃年以來稍違於前朝多寵倖禄不序徳觀天察人準今方古誠可危懼書曰僣恒暘若尚書洪範之言也孔安國注曰君行僣差則常暘順之也夫僣差無度則言不從而下不正陽無以制則上擾下竭宜密嚴勑州郡察彊宗大姦以時禽討其後江淮猾賊周生徐鳳等處處並起如舉所陳時詔遣八使巡行風俗皆選素有威名者乃拜舉為侍中與侍中杜喬守光禄大夫周栩前青州刺史馮羡尚書欒巴侍御史張綱兖州刺史郭遵大尉長史劉班並守光禄大夫分行天下其刺史二千石有臧罪顯明者驛馬上之墨綬以下便輙收舉其有清忠惠利為百姓所安宜表異者皆以狀上於是八使同時俱拜天下號曰八俊舉於是劾奏貪猾表薦公清朝廷稱之遷河内太守徴為太鴻臚及梁太后臨朝詔以殤帝㓜崩廟次宜在順帝下太常馬訪奏宜如詔書諫議大夫呂勃以為應依昭穆之序先殤帝後順帝詔下公卿舉議曰春秋魯閔公無子庶兄僖公代立其子文公遂躋僖於閔上孔子譏之書曰有事於太廟躋僖公傳曰逆祀也事見左氏傳及定公正其序經曰從祀先公為萬世法也左氏傳從祀先公杜預云從順也先公閔公僖公也將正二公之位親盡故通言先公也今殤帝在先於秩為父順帝在後於親為子先後之義不可改昭穆之序不可亂呂勃議是也太后下詔從之遷光禄勲會遭母憂去職後拜光禄大夫建和三年卒朝廷以舉清公亮直方欲以為宰相深痛惜之乃詔告光禄勲汝南太守曰昔在前世求賢如渇封墓軾閭以光賢哲尚書曰武王入殷封比干墓軾商容閭故公叔見誄翁歸䝉述所以昭忠厲俗作範後昆公叔文子衛大夫也文子卒其子戍請諡於君君曰昔者衛國凶饑夫子為粥與國之餓者不亦惠乎衛國有難夫子以其死衛寡人不亦貞乎夫子聽衛國之政脩其班制不亦文乎諡夫子貞惠文子事見禮記尹翁歸為右扶風宣帝下詔襃揚賜金百斤班固曰翁歸承風帝揚厥聲故曰蒙述也劉攽曰注尹翁歸為右扶風案文少一卒字故光禄大夫周舉性侔夷魚伯夷史魚也忠踰随管随會管仲前授牧守及還納言出入京輦有欽哉之績史記堯典曰咨十有二牧欽哉在禁闈有密靜之風予録乃勲用登九列方欲式序百官亮協三事不永夙終用乖逺圖朝廷愍悼良為愴然詩不云乎肇敏戎功用錫爾祉詩大雅也肇謀也敏㨗也戎汝也錫賜也祉福也其令將大夫以下到喪發日復會弔加賜錢十萬以旌委蛇素絲之節焉國風羔羊詩羔羊之皮素絲五紽退食自公委蛇委蛇子勰音叶勰字巨勝少尚𤣥虚以父任為郎自免歸家父故吏河南召夔為郡將卑身降禮致敬於勰勰恥交報之因杜門自絶後太守舉孝亷復以疾去時梁冀貴盛被其徴命者莫敢不應唯勰前後三辟竟不能屈後舉賢良方正不應又公車徴𤣥纁備禮固辭廢疾常隠處竄身慕老聃清淨杜絶人事巷生荆棘十有餘嵗至延熹二年乃開門延賔㳺談宴樂及秋而梁冀誅年終而勰卒時年五十蔡邕以為知命自勰曾祖父揚至勰孫恂六世一身皆知名云黄瓊傳黄瓊字世英江夏安陸人魏郡太守香之子也香在文苑傳瓊初以父任為太子舍人辭病不就遭父憂服闋五府俱辟連年不應永建中公卿多薦瓊者於是會稽賀純廣漢楊厚俱公車徴瓊至綸氏稱疾不進綸氏即夏之綸國少康之邑也竹書紀年云楚及秦伐鄭綸氏今洛州故嵩陽縣城是也有司劾不敬詔下縣以禮慰遣遂不得已先是徴聘處士多不稱望李固素慕於瓊乃以書逆遺之曰聞己度伊洛近在萬嵗亭豈即事有漸將順王命乎萬嵗亭在今洛州故嵩陽縣西北武帝元封元年幸緱氏登太室聞山上呼萬嵗聲者三因以名焉蓋君子謂伯夷隘栁下惠不恭故傳曰不夷不惠可否之間論語孔子曰伯夷叔齊不降其志不辱其身謂栁下惠少連降志辱身我則異於是無可無不可鄭𤣥注云不為夷齊之清不為惠連之屈故曰異於是也蓋聖賢居身之所珍也誠遂欲枕山棲谷擬跡巢由斯則可矣若當輔政濟民今其時也自生民以來善政少而亂俗多必待堯舜之君此為志士終無時矣常聞語曰嶢嶢者易缺皦皦者易汙陽春之曲和者必寡盛名之下其實難副宋玉對楚襄王問曰客有歌於郢中者為下里巴人國中屬而和者数千人為陽春白雪屬而和者不過數百人是其曲彌髙其和彌寡近魯陽樊君被徴初至朝廷設壇席猶待神明樊君樊英也事具英傳雖無大異而言行所守亦無所缺而毁謗布流應時折減者豈非觀聽望深聲名太盛乎自頃徴聘之士胡元安薛孟嘗朱仲昭顧季鴻等其功業皆無所採是故俗論皆言處士純盜虛聲願先生𢎞此逺謨令衆人歎服一雪此言耳瓊至即拜議郎稍遷尚書僕射初瓊隨父在臺閣習見故事及後居職達練官曹爭議朝堂莫能抗奪時連有災異瓊上疏順帝曰間者以來卦位錯謬易乾鑿度曰求卦主嵗術常以太嵗為嵗紀嵗七十六為一紀二十紀為一蔀首即置積蔀首嵗數加所入紀嵗數以三十二除之不足除者以乾坤始數二卦而得一嵗未算即主嵗之卦也寒燠相干蒙氣數興日闇月散䝉隂闇也散謂不精明原之天意殆不虚然陛下宜開石室案河洛石室藏書之府河洛圖書之文也外命史官悉條上永建以前至漢初災異與永建以後訖于今日孰為多少又使近臣儒者參考政事數見公卿察問得失諸無功徳者宜皆斥黜臣前頗陳災𤯝并薦光禄大夫樊英太中大夫薛包及會稽賀純廣漢楊厚未䝉御省伏見處士巴郡黄錯漢陽任棠年皆耆耋有作者七人之志論語曰作者七人注云謂伯夷叔齊虞仲夷逸朱張栁下惠少連宜更見引致助崇大化於是有詔公車徴錯等三年大旱瓊復上疏曰昔魯僖遇旱以六事自讓躬節儉閉女謁放䜛佞者十三人誅稅民受貨者九人春秋考異郵曰僖公之時雨澤不㴻比于九月公大驚懼率羣臣禱山川以六過自讓絀女謁放下䜛佞郭都之等十三人誅領人之吏受貨賂趙祝等九人曰辜在寡人方今天旱野無生稼寡人當死百姓何謗請以身塞無狀也劉攽曰注郭都之等案文多一之字退舍南郊天立大雨今亦宜顧省政事有所損闕務存質儉以易民聽尚方御府息除煩費明勑近臣使遵法度如有不移示以好惡數見公卿引納儒士訪以政化使陳得失又囚徒尚積多致死亡亦足以感傷和氣招降災旱若改敝從善擇用嘉謀則災消福至矣書奏引見徳陽殿使中常侍以瓊奏書屬主者施行自帝即位以後不行籍田之禮瓊以國之大典不宜久廢上疏奏曰自古聖帝哲王莫不敬恭明祀增致福祥故必躬郊廟之禮親籍田之勤以先羣萌率勸農功昔周宣王不籍千畝虢文公以為大譏卒有姜戎之難終損中興之名國語曰宣王即位不籍千畝虢文公諫曰夫人之大事在農上帝之粢盛於是乎出故稷為大官古者太史順時瓜見土農祥晨正日月底于天廟先時九日太史告稷曰陽氣俱蒸土膏其動稷以告王王即齋宫百官御事王耕一墢班三之庶人終于千畝王弗聽後師敗績于姜氏之戎墢音扶發反竊見陛下遵稽古之鴻業體䖍肅以應天順時奉元懷柔百神朝夕觸塵埃於道路晝暮聆庶政以䘏人雖詩詠成湯之不怠遑書美文王之不暇食誠不能加詩商頌曰不潜不濫不敢怠遑書曰文王至于日中昃不遑暇食也今廟祀適闋而祈榖絜齋之事近在明日臣恐左右之心不欲屢動聖躬以為親耕之禮可得而廢臣聞先王制典籍田有日司徒咸戒司空除壇先時五日有協風之應王即齋宮饗醴載耒誠重之也自癸巳以來仍西北風甘澤不集寒涼尚結西北風曰不周風亦曰厲風見呂氏春秋也迎春東郊既不躬親先農之禮所宜自勉以逆和氣以致時風通義曰八風者八卦之氣八風以時至則隂陽變化之道成萬物得以時育生也易曰君子自强不息斯其道也乾卦象曰天行健君子以自强不息也書奏帝從之頃之遷尚書令瓊以前左雄所上孝廉之選專用儒學文吏於取士之義猶有所遺乃奏增孝悌及能從政者為四科事竟施行又雄前議舉吏先試之於公府又覆之於端門後尚書張盛奏除此科瓊復上言覆試之作將以澄洗清濁覆實虚濫不宜改革帝乃止出為魏郡太守稍遷太常和平中以選入侍講禁中元嘉元年遷司空桓帝欲襃崇大將軍梁冀使中朝二千石以上會議其禮特進胡廣太常羊溥司𨽻校尉祝恬太中大夫邊詔等咸稱冀之勲徳其制度賚賞以宜比周公錫之山川土田附庸詩魯頌曰王曰叔父建爾元子俾侯于魯啓爾土宇為周室輔乃命魯公俾侯于東錫之山川土田附庸注云王成王也叔父周公也劉攽曰正文以宜周公案以宜不成文理當作宜以瓊獨建議曰冀前以親迎之勞增邑三千又其子𦙍亦加封賞昔周公輔相成王制禮作樂化致太平是以大啓土宇開地七百禮記明堂位曰周公相武王以伐紂武王崩成王㓜弱周公踐天子位以理天下七年致政於成王以周公有勲勞於天下是以封周公於曲阜地方七百里革車千乗命魯公世世祀周公以天子之禮樂也今諸侯以戶邑為制不以里數為限蕭何識髙祖於泗水霍光定傾危以興國皆益戶增封以顯其功髙祖為泗上亭長蕭何佐之後拜何為相國益封五千戶霍光廢昌邑王立宣帝後益封光萬七千戶冀可比鄧禹合食四縣賞賜之差同於霍光使天下知賞必當功爵不越徳朝廷從之冀意以為恨會以地動䇿免復為太僕永興元年遷司徒轉大尉梁冀前後所託辟召一無所用雖有善人而為冀所飾舉者亦不加命延熹元年以日食免復為大司農明年梁冀被誅大尉胡廣司徒韓縯司空孫朗皆坐阿附免廢復拜瓊為太尉以師傅之恩而不阿梁氏乃封為邟鄉侯說文云邟潁川縣也漢潁川有周承休侯國元始二年更名曰邟音亢邑千戸瓊辭疾譲封六七上言㫖懇惻乃許之梁冀既誅瓊首居公位舉奏州郡素行貪汙至死徙者十餘人海内由是翕然望之尋而五侯擅權傾動内外自度力不能匡乃稱疾不起五侯謂左悺徐璜等四年以寇賊免其年復為司空秋以地震免七年疾篤上疏諌曰臣聞天者務剛其氣君者務彊其政是以王者處髙自持不可不安履危任力不可不據夫自持不安則顚任力不據則危故聖人升髙據上則以徳義為首渉危蹈傾則以賢者為力唐堯以徳化為冠冕以稷契為筋力髙而益崇動而愈據此先聖所以長守萬國保其社稷者也昔髙皇帝應天順民奮劒而王埽除秦項革命創制降徳流祚至於哀平則帝道不綱秕政日亂遂使姦佞擅朝外戚專恣所冠不以仁義為冕所蹈不以賢佐為力終至顚蹶滅絶漢祚天維陵弛民鬼慘愴頼皇乾眷命炎徳復輝光武以聖武天挺繼統興業創基氷泮之上立足枳棘之林氷泮喻危䧟枳棘喻艱難擢賢於衆愚之中畫功於無形之世形兆也言未有天下之兆畫或作書也崇禮義於交爭循道化於亂離是自歴髙而不傾任力危而不跌興復洪祚開建中興光被八極垂名無窮至於中葉盛業漸衰陛下初從藩國爰升帝位天下拭目謂見太平而即位以來未有勝政諸梁秉權豎宦充朝重封累職傾動朝廷卿校牧守之選皆出其門羽毛齒革明珠南金之寳殷滿其室殷盛也富擬王府埶回天地言之者必族附之者必榮忠臣懼死而杜口萬夫怖禍而木舌法言曰金口木古也塞陛下耳目之明更為聾瞽之主故太尉李固杜喬忠以直言徳以輔政念國忘身隕歿為報而坐陳國議遂見殘滅坐音才卧反賢愚切痛海内傷懼又前白馬令李雲指言宦官罪穢宜誅皆因衆人之心以救積薪之敝賈誼上疏曰夫抱火厝積薪之下而寢其上火未及然因謂之安方今之政何以異此也𢎞農杜衆知雲所言宜行懼雲以忠獲罪故上書陳理之乞同日而死所以感悟國家庶雲獲免而雲既不辜衆又并坐天下尤痛益以怨結故朝野之人以忠為諱昔趙殺鳴犢孔子臨河而反夫覆巢破卵則鳳皇不翔刳牲夭胎則麒麟不臻誠物類相感理使其然史記曰孔子將西見趙簡子至於河而聞竇鳴犢舜華之死也臨河而歎曰美哉洋洋丘之不濟此命也夫竇鳴犢舜華晉之賢大夫也趙簡子不得志之時須此兩人而後從政及其得志而殺之丘聞刳胎殺夭則麒麟不至郊薮涸澤而漁則蛟龍不處其淵覆巢毁卵則鳳皇不翔何則君子諱傷其類也事亦見孔子家語文也尚書周永昔為沛令素事梁冀幸其威埶坐事當罪越拜令職見冀將衰乃陽毁示忠遂因姦計亦取封侯又黄門協邪羣軰相黨自冀興盛腹背相親朝夕圖謀共搆姦軌臨冀當誅無可設巧復記其惡以要爵賞陛下不加清徴審别眞偽復與忠臣並時顯封使朱紫共色粉墨雜蹂所謂抵金玉於沙礫抵投也音紙碎珪璧於泥塗四方聞之莫不憤歎昔曾子大孝慈母投杼解見寇榮傳伯竒至賢終於流放說苑曰王國子前母子伯竒後母子伯封後母欲其子立為太子說王曰伯竒好妾王不信其母曰令伯竒於後園妾過其旁王上臺視之即可知王如其言伯竒入園後母隂取蜂十數置单衣中過伯竒邉曰蜂螫我伯竒就衣中取蜂殺之王遥見之乃逐伯竒也劉攽曰注伯竒王國子案伯竒是尹吉甫子王國未詳夫䜛諛所舉無髙而不可升相抑無深而不可淪可不察歟臣至頑駑世荷國恩身輕位重勤不補過然懼於永歿負釁益深敢以垂絶之日陳不諱之言庶有萬分無恨三泉三者數之極一生二二生三三生萬物天地人之極數故以三為名者取其深之極也其年卒時年七十九贈車騎將軍諡曰忠侯孫琬琬字子琰少失父早而辯慧祖父瓊初為魏郡太守建和元年正月日食京師不見而瓊以狀聞太后詔問所食多少瓊思其對而未知所況琬年七嵗在傍曰何不言日食之餘如月之初瓊大驚即以其言應詔而深竒愛之後瓊為司徒琬以公孫拜童子郎辭病不就知名京師時司空盛允有疾瓊遣琬候問㑹江夏上蠻賊事副府副本詣公府也允發書視畢微戲琬曰江夏大邦而蠻多士少琬奉手對曰蠻夷猾夏責在司空因拂衣辭去允甚竒之稍遷五官中郎將時陳蕃為光禄勲深相敬待數與議事舊制光禄舉三署郎以髙功久次才徳尤異者為茂才四行久次謂久居官次也時權富子弟多以人事得舉而貧約守志者以窮退見遺京師為之謡曰欲得不能光禄茂才能音乃來反於是琬蕃同心顯用志士平原劉醇河東朱山蜀郡殷參等並以才行䝉舉蕃琬遂為權富郎所見中傷事下御史中丞王暢侍御史刁韙韙暢素重蕃琬不舉其事而左右復䧟以朋黨暢坐左轉議郎而免蕃官琬韙俱禁錮韙字子滎彭城人後陳蕃被徴而言事者多訟韙復拜議郎遷尚書在朝有鯁直臣節出為魯東海二郡相性抗厲有明略所在稱神常以法度自整家人莫見墮容焉琬被廢弃㡬二十年至光和末太尉楊賜上書薦琬有撥亂之才由是徴拜議郎擢為青州刺史遷侍中中平初出為右扶風徴拜將作大匠少府太僕又為豫州牧時寇賊陸梁州境彫殘琬討擊平之威聲大震政績為天下表封關内侯及董卓秉政以琬名臣徴為司徒遷太尉更封陽泉鄉侯卓議遷都長安琬與司徒楊彪同諫不從琬退而駮議之曰昔周公營洛邑以寜姬光武卜東都以隆漢天之所啓神之所安大業既定豈宜妄有遷動以虧四海之望時人懼卓暴怒琬必及害固諌之琬對曰昔白公作亂於楚屈廬冒刃而前新序曰白公勝殺楚惠王王出亡令尹司馬皆死勝㧞劒而屬之於屈廬曰子與我將舍子不與我將殺子屈廬曰詩有之曰莫莫葛纍延于條枚愷悌君子求福不回今子殺子叔父而求福於廬也可乎且吾聞之知命之士見利不動臨死則死是謂人臣之禮故上知天命下知臣道其可刼乎子胡不推之白公勝乃入其劒焉崔杼弑君於齊晏嬰不懼其盟解見馮衍傳吾雖不徳誠慕古人之節琬竟坐免卓猶敬其名徳舊族不敢害後與楊彪同拜光禄大夫及徙西都轉司𨽻校尉與司徒王允同謀誅卓及卓將李傕郭汜攻破長安遂收琬下獄死時年五十二論曰古者諸侯嵗貢士進賢受上賞非賢貶爵土升之司馬辯論其才論定然後官之任官然後禄之尚書大傳曰古者諸侯之於天子三年一貢士一適謂之好徳再適謂之賢賢三適謂之有功有功者天子賜以車服弓矢號曰命諸侯有不貢士謂之不率正一不適謂之過再不適謂之傲三不適謂之誣誣者天子絀之一絀以爵再絀以地三絀而爵地畢也故王者得其人進仕勸其行經邦𢎞務所由久矣漢初詔舉賢良方正州郡察孝廉秀才斯亦貢士之方也中興以後復增敦朴有道賢能直言獨行髙節質直清白敦厚之屬榮路既廣觖望難裁自是竊名偽服浸以流競權門貴仕請謁繁興自左雄任事限年試才雖頗有不密固亦因識時宜劉攽曰案文當作因時識宜而黄瓊胡廣張衡崔瑗之徒泥滯舊方互相詭駮循名者屈其短算實者挺其效故雄在尚書天下不敢妄選十餘年間稱為得人斯亦效實之徴乎順帝始以童弱反政而號令自出知能任使故士得用情天下喁喁仰其風采遂乃備𤣥纁玉帛以聘南陽樊英天子降寢殿設壇席尚書奉引延問失得急登賢之舉虛降己之禮於是處士鄙生忘其拘儒拘儒猶褊狹也拂巾衽褐以企旌車之招矣至乃英能承風俊乂咸事若李固周舉之淵謨𢎞深左雄黄瓊之政事貞固桓焉楊厚以儒學進崔瑗馬融以文章顯吳祐蘇章种暠欒巴牧民之良幹龐參虞詡將帥之宏規王龔張晧虚心以推士張綱杜喬直道以糾違郎顗隂陽詳密張衡機術特妙東京之士於兹盛焉向使廟堂納其髙謀疆塲宣其智力帷幄容其蹇辭舉厝稟其成式則武宣之軌豈其逺而而語辭也論語曰豈不爾思室是逺而詩云靡不有初鮮克有終可為恨哉及孝桓之時碩徳繼興碩大也陳蕃楊秉處稱賢宰皇甫張叚出號名將王暢李膺彌縫衮闕彌縫猶補合也詩云衮職有闕惟仲山甫補之朱穆劉陶獻替匡時郭有道奬鑒人倫陳仲弓𢎞道下邑其餘宏儒逺智髙心絜行激揚風流者不可勝言而斯道莫振文武陵隊在朝者以正議嬰戮謝事者以黨錮致災徃車雖折而來軫方遒廣雅曰遒急也所以傾而未顚决而未潰豈非仁人君子心力之為乎嗚呼贊曰雄作納言古之八元舉升以彚越自下蕃彚類也易曰以其彚征吉彚音謂登朝理政並紓災昬紓觧也音式余反瓊名夙知累章國疵疵病也琬亦早秀位及志差志意差舛不能遂也差音楚宜反後漢書巻九十一後漢書卷九十一考證左雄傳孝廉徐淑注淑字伯達毛本作伯進封隂謀之功何焯曰功一刻日周舉傳言事者多云云字毛本作矣繼以䪥露之歌注䪥上露何易晞臣良裘按古今注露上有朝字以七字為句黄瓊傳於是會稽賀純廣漢楊厚俱公車徴何焯曰於是下當有與字有作者七人之論論毛本作志陛下不加清徴諸本同徴當作澂伯竒至賢終於流放劉攽曰伯竒是尹吉甫子子字諸本皆誤作事後漢書卷九十一考證
