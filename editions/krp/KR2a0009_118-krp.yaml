body:
  text: 後漢書卷一百十八宋宣城太守范煜撰唐章懐太子賢注西域傳第七十八西域武帝時西域内屬有三十六國漢為置使者校尉領䕶之前書曰自李廣利征計大宛之後屯田渠犂置使者領䕶營田以供使外國也宣帝改曰都䕶宣帝時鄭吉以侍郎田渠犂發兵攻車師遷衞司馬使䕶鄯善以西南道其後匈奴日逐王降吉漢以吉前破車師後降日逐遂并令䕶車師以西北道號曰都䕶都䕶之置始自於吉也元帝又置戊已二校尉屯田於車師前王庭漢官儀曰戊已中央鎮覆四方又開渠播種以為厭勝故稱戊已焉車師有前王後王國也哀平間自相分割為五十五國王莽簒位貶易侯王由是西域怨叛前書曰莽即位改匈奴單于印璽為章和親遂絶西域亦瓦解焉與中國遂絶並復役屬匈奴匈奴斂税重刻諸國不堪命建武中皆遣使求内屬願請都䕶光武以天下初定未遑外事竟不許之㑹匈奴衰弱莎車王賢誅滅諸國賢死之後遂更相攻伐小宛精絶戎廬且末為鄯善所并且音子余反渠勒皮山為于寘所統悉有其地郁立單桓孤胡烏貪訾離為車師所滅後其國並復立永平中北虜乃脅諸國共寇河西郡縣城門晝閉十六年明帝乃命將帥北征匈奴取伊吾盧地在今伊州伊吾縣也置宜禾都尉以屯田遂通西域于寘諸國皆遣子入侍西域自絶六十五載乃復通焉明年始置都䕶戊己校尉及明帝崩焉耆龜兹龜兹讀曰丘慈下並同攻没都䕶陳睦悉覆其衆匈奴車師圍戊已校尉建初元年春酒泉太守叚彭大破車師於交河城章帝不欲疲敝中國以事夷狄乃迎還戊己校尉不復遣都䕶二年復罷屯田伊吾匈奴因遣兵守伊吾地時軍司馬班超留于寘綏集諸國和帝永元元年大將軍竇憲大破匈奴二年憲因遣副校尉閻槃將二千餘騎掩擊伊吾破之三年班超遂定西域因以超為都䕶居龜兹復置戊己校尉劉攽曰置戊己校尉案戊已本兩校今此下文云又置戊部候則此時當但置戊校也車師傳注中云戊校尉所統又傳云戊校尉閻詳足明置戊校而已後人不知妄増已字亦非章懐以前失之領兵五百人居車師前部髙昌壁又置戊部候居車師後部候城相去五百里六年班超復擊破焉耆於是五十餘國悉納質内屬其條支安息諸國至于海瀕四萬里外皆重譯貢獻九年班超遣掾甘英窮臨西海而還續漢書甘英作甘莵皆前世所不至山經所未詳莫不備其風土傳其珍怪焉於是逺國蒙竒兠勒皆來歸服遣使貢獻及孝和晏駕西域背畔安帝永初元年頻攻圍都䕶任尚叚禧等禧音喜基反朝廷以其險逺難相應赴詔罷都䕶自此遂棄西域北匈奴即復收屬諸國共為邊寇十餘嵗敦煌太守曹宗患其暴害元初六年乃上遣行長史索班將千餘人屯伊吾以招撫之於是車師前王及鄯善王來降數月北匈奴復率車師後部王共攻没班等遂擊走其前王鄯善逼急求救於曹宗宗因此請出兵擊匈奴報索班之恥復欲進取西域鄧太后不許但令置䕶西域副校尉居敦煌復部營兵三百人羈縻而已其後北虜連與車師入寇河西朝廷不能禁議者因欲閉玉門陽關以絶其患玉門陽關二關名在敦煌西界延光二年敦煌太守張璫上書陳三策以為北虜呼衍王常展轉蒲類秦海之間大秦國在西海西故曰秦海也專制西域共為寇鈔今以酒泉屬國吏士二千餘人集昆侖塞前書敦煌郡廣至縣有昆侖障也宜禾都尉居也廣至故城在今𤓰州常樂縣東劉攽曰注宜禾都尉居也案文也當作之先擊呼衍王絶其根本因發鄯善兵五千人脇車師後部此上計也若不能出兵可置軍司馬將士五百人四郡供其犂牛榖食出據柳中此中計也武帝初置酒泉武威張掖敦煌列四郡據兩關焉柳中今西州縣也如又不能則宜棄交河城收鄯善等悉使入塞此下計也朝廷下其議尚書陳忠上疏曰臣聞八蠻之寇莫甚北虜漢興髙祖窘平城之圍太宗屈供奉之恥窘困也髙帝自擊匈奴至平城為冒頓單于圍於白登七日乃得解太宗文帝也賈誼上疏曰匃奴嫚侮侵掠而漢嵗致金絮繒綵以奉之夷狄徵令是人主之操天子供貢是臣下之禮故云恥也故孝武憤怒深惟久長之計命遣虎臣浮河絶漠窮破虜庭沙土曰漠直度曰絶也當斯之役黔首隕於狼望之北財幣縻於盧山之壑狼望匈奴中地名也前書揚雄曰前代豈樂無量之費快心於狼望之北填盧山之壑而不悔也府庫單竭杼柚空虚算至舟車貲及六畜武帝時國用不足算至車船租及六畜言皆計其所得以出算軺車一算商賈車二算船五丈以上一算六畜無文以此言之無物不算夫豈不懐慮久故也懐思也遂開河西四郡以隔絶南羌前書云起敦煌酒泉張掖以隔婼羌裂匈奴之右臂也收三十六國斷匈奴右臂是以單于孤特鼠竄逺藏至於宣元之世遂備蕃臣宣帝元帝時呼韓邪單于數入朝稱臣奉貢關徼不閉羽檄不行由此察之戎狄可以威服難以化狎西域内附日久區區東望扣關者數矣此其不樂匈奴慕漢之效也今北虜已破車師勢必南攻鄯善棄而不救則諸國從矣若然則虜財賄益増膽勢益殖殖生也威臨南羌與之交連如此河西四郡危矣河西既危不得不救則百倍之役興不貲之費發矣議者但念西域絶逺䘏之煩費不見先世苦心勤勞之意也方今邊境守禦之具不精内郡武衛之備不脩敦煌孤危逺來告急復不輔助内無以慰勞吏民外無以威示百蠻蹙國減土經有明誡毛詩曰昔先王受命有如邵公日辟國百里今也日蹙國百里也臣以為敦煌宜置校尉案舊増四部屯兵以西撫諸國庶足折衝萬里震怖匈奴淮南子曰脩政於廟堂之上而折衝千里之外也帝納之乃以班勇班勇班超之子為西域長史將㢮刑士五百人西屯柳中勇遂破平車師自建武至于延光西域三絶三通順帝永建二年勇復擊降焉耆於是龜兹疏勒于寘莎車等十七國皆來服從而烏孫葱嶺已西遂絶六年帝以伊吾舊膏腴之地傍近西域匈奴資之以為鈔暴復令開設屯田如永元時事置伊吾司馬一人自陽嘉以後朝威稍損諸國驕放轉相陵伐元嘉二年長史王敬為于寘所没永興元年車師後王復反攻屯營雖有降首首猶服也音式救反曾莫懲革自此浸以疎慢矣班固記諸國風土人俗皆已詳備前書今撰建武以後其事異於先者以為西域傳皆安帝末班勇所記云西域内屬諸國東西六千餘里南北千餘里東極玉門陽關西至葱嶺其東北與匈奴烏孫相接南北有大山中央有河其南山東出金城與漢南山屬焉其河有兩源一出葱嶺東流葱嶺山名也西河舊事云其山髙大生葱故名一出于寘南山下北流與葱嶺河合東注蒲昌海蒲昌海一名鹽澤去玉門三百餘里自敦煌西出玉門陽關渉鄯善北通伊吾千餘里自伊吾北通車師前部髙昌壁千二百里自髙昌壁北通後部金滿城五百里此其西域之門戸也故戊己校尉更互屯焉伊吾地宜五榖桑麻蒲萄其北又有柳中皆膏腴之地故漢常與匈奴爭車師伊吾以制西域焉自鄯善踰葱嶺出西諸國有兩道傍南山北陂河西行循河曰陂音彼義反次下亦同史記曰陂山通道至莎車為南道南道西踰葱嶺則出大月氏安息之國也自車師前王庭隨北山陂河西行至疏勒為北道北道西踰葱嶺出大宛康居奄蔡焉耆出玉門經鄯善且末精絶三千餘里至拘彌拘彌國居寧彌城去長史所居柳中四千九百里續漢書曰寧彌國王本名拘彌去洛陽萬二千八百里領戸二千一百七十三口七千二百五十一勝兵千七百六十人順帝永建四年于寘王放前殺拘彌王興自立其子為拘彌王而遣使者貢獻於漢敦煌太守徐由上求討之帝赦于寘罪令歸拘彌國放前不肯陽嘉元年徐由遣疏勒王臣槃發二萬人擊于寘破之斬首數百級放兵大掠更立興宗人成國為拘彌王而還至靈帝熹平四年于寘王安國攻拘彌大破之殺其王死者甚衆戊己校尉劉攽曰案文多已字但是和帝以後事並多此一字也西域長史各發兵輔立拘彌侍子定興為王時人衆裁有千口其國西接于寘三百九十里于寘國居西城去長史所居五千三百里去洛陽萬一千七百里領戸三萬二千口八萬三千勝兵三萬餘人建武末莎車王賢强盛攻并于寘徙其王俞林為驪歸王明帝永平中于寘將休莫霸反莎車自立為于寘王休莫霸死兄子廣徳立後遂滅莎車其國轉盛從精絶西北至疏勒十三國皆服從而鄯善王亦始强盛自是南道自葱嶺以東唯此二國為大順帝永建六年于寘王放前遣侍子詣闕貢獻元嘉元年長史趙評在于寘病癰死評子迎喪道經拘彌拘彌王成國與于寘王建素有隙乃語評子云于寘王令胡醫持毒藥著創中故致死耳評子信之還入塞以告敦煌太守馬逹明年以王敬代為長史逹令敬隠覈其事敬先過拘彌成國復説云于寘國人欲以我為王今可因此罪誅建于寘必服矣敬貪立功名且受成國之説前到于寘設供具請建而隂圖之或以敬謀告建建不信曰我無罪王長史何為欲殺我旦日建從官屬數十人詣敬坐定建起行酒敬叱左右執之吏士並無殺建意官屬悉得突走時成國主薄秦牧隨敬在㑹持刀出曰大事已定何為復疑即前斬建于寘侯將輸僰等遂㑹兵攻敬敬持建頭上樓宣告曰天子使我誅建耳于寘侯將遂焚營舍燒殺吏士上樓斬敬懸首於市輸僰欲自立為王國人殺之而立建子安國焉劉攽曰國人殺之案下文言輸僰死已經月此時安得云殺之蓋是不從字馬逹聞之欲將諸郡兵出塞擊于寘桓帝不聽徵逹還而以宋亮代為敦煌太守亮到開募于寘令自斬輸僰時輸僰死已經月乃斷死人頭送敦煌而不言其狀亮後知其詐而竟不能出兵于寘恃此遂驕自于寘經皮山至西夜子合徳若焉西夜國一名漂沙去洛陽萬四千四百里戸二千五百口萬餘勝兵三千人地生白草有毒國人煎以為藥傅箭鏃所中即死漢書中誤云劉攽曰漢書中案漢當作前并大秦國一字亦然西夜子合是一國今各自有王前書云西夜國王號子合國子合國居呼鞬谷鞬音九言反去疏勒千里領戸三百五十口四千勝兵千人徳若國領戸百餘口六百七十勝兵三百五十人東去長史居三千五百三十里去洛陽萬二千一百五十里與子合相接其俗皆同自皮山西南經烏耗前書音義音鷃拏又云烏音一加反耗音直加反急言之如鷃拏也渉懸度厯罽賔六十餘日行至烏弋山離國地方數千里時改名排持復西南馬行百餘日至條支條支國城在山上周回四十餘里臨西海海水曲環其南及東北三面路絶唯西北隅通陸道土地暑溼出師子犀牛封牛孔雀大雀大雀其卵如甕轉北而東復馬行六十餘日至安息後役屬條支為置大將監領諸小城焉安息國居和櫝城去洛陽二萬五千里北與康居接南與烏弋山離接地方數千里小城數百戸口勝兵最為殷盛其東界木鹿城號為小安息去洛陽二萬里章帝章和元年遣使獻師子符拔符拔形似麟而無角和帝永元九年都䕶班超遣甘英使大秦抵條支臨大海欲度而安息西界船人謂英曰海水廣大往來者逢善風三月乃得度若遇遲風亦有二嵗者故入海人皆齎三嵗糧海中善使人思土戀慕數有死亡者英聞之乃止十三年安息王滿屈復獻師子及條支大鳥時謂之安息雀自安息西行三千四百里至阿蠻國從阿蠻西行三千六百里至斯賔國從斯賔南行度河又西南至于羅國九百六十里安息西界極矣自此南乘海乃通大秦其土多海西珍竒異物焉大秦國一名犂鞬以在海西亦云海西國地方數千里有四百餘城小國役屬者數十以石為城郭列置郵亭皆堊塈之塈飾也音火既反郭璞曰堊白土也音惡有松栢諸木百草人俗力田作多種樹蠶桑皆髠頭而衣文繡乘輜軿白蓋小車出入擊鼓建旌旗幡幟所居城邑周圜百餘里城中有五宫相去各十里宫室皆以水精為柱食器亦然其王日游一宫聽事五日而後徧常使一人持囊隨王車人有言事者即以書投囊中王至宫發省理其枉直各有官曹文書置三十六將皆㑹議國事其王無有常人皆簡立賢者國中災異及風雨不時輙廢而更立受放者甘黜不怨其人民皆長大平正有類中國故謂之大秦土多金銀竒寳有夜光璧明月珠駭雞犀枹朴子曰通天犀有白理如綖者以盛米置羣雞中雞欲往啄米至輙驚却故南人名為駭雞珊瑚琥珀琉璃琅玕朱丹青碧刺金縷繡織成金縷罽雜色綾作黄金塗火浣布又有細布或言水羊毳野蠶繭所作也合㑹諸香煎其汁以為蘇合凡外國諸珍異皆出焉以金銀為錢銀錢十當金錢一與安息天竺交市於海中利有十倍其人質直市無二價榖食常賤國用富饒鄰國使到其界首者乘驛詣王都至則給以金錢其王常欲通使於漢而安息欲以漢繒綵與之交市故遮閡不得自逹閡音五代反至桓帝延熹九年大秦王安敦遣使自日南徼外獻象牙犀角瑇瑁始乃一通焉其所表貢並無珍異疑傳者過焉或云其國西有弱水流沙近西王母所居處幾於日所入也漢書云從條支西行二百餘日近日所入則與今書異矣前世漢使皆自烏弋以還莫有至條支者也又云從安息陸道繞海北行出海西至大秦人庶連屬十里一亭三十里一置置驛也終無盗賊寇警而道多猛虎師子遮害行旅不百餘人齎兵器輒為所食又言有飛橋數百里可度海北諸國所生竒異玉石諸物譎怪多不經故不記云魚豢魏畧曰大秦國俗多竒幻口中出火自縳自解跳十二九巧妙非常大月氐國氐音支下並同居藍氏城前書藍氏作監氏西接安息四十九日行東去長史所居六千五百三十七里去洛陽萬六千三百七十里戸十萬口四十萬勝兵十餘萬人初月氐為匈奴所滅遂遷於大夏分其國為休密䨇靡貴霜肹頓都密凡五部翖侯後百餘嵗貴霜翖侯丘就郤攻滅四翖侯自立為王國號貴霜王劉攽曰案文多一王字侵安息取髙附地又滅濮逹罽賔悉有其國丘就郤年八十餘死子閻膏珍代為王復滅天竺置將一人監領之月氐自此之後最為富盛諸國稱之皆曰貴霜王漢本其故號言大月氐云髙附國在大月氐西南亦大國也其俗似天竺而弱易服善賈販内富於財所屬無常天竺罽賔安息三國强則得之弱則失之而未嘗屬月氐漢書以為五翖侯數非其實也後屬安息及月氐破安息始得髙附天竺國一名身毒在月氐之東南數千里俗與月氐同而卑溼暑熱其國臨大水乘象而戰其人弱於月氐脩浮圖道不殺伐遂以成俗浮圖即佛也從月氐髙附國以西南至西海東至磐起國皆身毒之地身毒有别城數百城置長别國數十國置王雖各小異而俱以身毒為名其時皆屬月氐月氐殺其王而置將令統其人土出象犀瑇瑁金銀銅鐵鉛錫西與大秦通有大秦珍物又有細布好毾㲪毾音它闔反㲪音登埤蒼曰毛席也釋名曰施之承大牀前小榻上登以上牀也諸香石密胡椒薑黑鹽和帝時數遣使貢獻後西域反畔乃絶至桓帝延熹二年四年頻從日南徼外來獻世傳明帝夢見金人長大頂有光明以問羣臣或曰西方有神名曰佛其形長丈六尺而黄金色帝於是遣使天竺問佛道法遂於中國圖畫形像焉楚王英始信其術中國因此頗有奉其道者後桓帝好神數祀浮圖老子百姓稍有奉者後遂轉盛東離國居沙竒城在天竺東南三千餘里大國也其土氣物類與天竺同列城數十皆稱王大月氐伐之遂臣服焉男女皆長八尺而怯弱乘象駱駞往來鄰國有寇乘象以戰栗弋國屬康居出名馬牛羊蒲萄衆果其土水美故蒲萄酒特有名焉嚴國在奄蔡北屬康居出鼠皮以輸之奄蔡國改名阿蘭聊國居地城屬康居土氣温和多楨松白草前書音義曰白草草之白者又云似莠而細熟時正白牛馬所食焉民俗衣服與康居同莎車國西經蒲犂無雷至大月氐東去洛陽萬九百五十里匈奴單于因王莽之亂略有西域唯莎車王延最强不肯附屬元帝時嘗為侍子長於京師慕樂中國亦復參其典法常勑諸子當世奉漢家不可負也天鳯五年延死諡忠武王子康代立光武初康率傍國拒匈奴擁衛故都䕶吏士妻子千餘口檄書河西問中國動静自陳思慕漢家建武五年河西大將軍竇融乃承制立康為漢莎車建功懐徳王西域大都尉五十五國皆屬焉九年康死諡宣成王弟賢代立攻破拘彌西夜國皆殺其王而立其兄康兩子為拘彌西夜王十四年賢與鄯善王安並遣使詣闕貢獻於是西域始通葱嶺以東諸國皆屬賢十七年賢復遣使奉獻請都䕶天子以問大司空竇融以為賢父子兄弟相約事漢欵誠又至宜加號位以鎮安之帝乃因其使賜賢西域都䕶印綬及車旗黄金錦繡敦煌太守裴遵上言夷狄不可假以大權又令諸國失望詔書收還都䕶印綬更賜賢以漢大將軍印綬其使不肯易遵迫奪之賢由是始恨而猶詐稱大都䕶移書諸國諸國悉服屬焉號賢為單于賢浸以驕横重求賦税數攻龜兹諸國諸國愁懼二十一年冬車師前王鄯善焉耆等十八國俱遣子入侍獻其珍寳及得見皆流涕稽首願得都䕶天子以中國初定北邊未服皆還其侍子厚賞賜之是時賢自負兵强欲并兼西域攻擊益甚諸國聞都䕶不出而侍子皆還大憂恐乃與敦煌太守檄願留侍子以示莎車言侍子見留都䕶尋出冀且息其兵裴遵以狀聞天子許之二十二年賢知都䕶不至遂遺鄯善王安書令絶通漢道安不納而殺其使賢大怒發兵攻鄯善安迎戰兵敗亡入山中賢殺略千餘人而去其冬賢復攻殺龜兹王遂兼其國鄯善焉耆諸國侍子久留敦煌愁思皆亡歸鄯善王上書願復遣子入侍更請都䕶都䕶不出誠迫於匈奴天子報曰今使者大兵未能得出如諸國力不從心東西南北自在也於是鄯善車師復附匈奴而賢益横媯塞王自以國逺遂殺賢使者賢擊滅之立其國貴人駟鞬為媯塞王賢又自立其子則羅為龜兹王賢以則羅年少乃分龜兹為烏壘國徙駟鞬為烏壘王又更以貴人為媯塞王數嵗龜兹國人共殺則羅駟鞬而遣使匈奴更請立王匈奴立龜兹貴人身毒為龜兹王龜兹由是屬匈奴賢以大宛貢税減少自將諸國兵數萬人攻大宛大宛王延留迎降賢因將還國徙拘彌王橋塞提為大宛王而康居數攻之橋塞提在國嵗餘亡歸賢復以為拘彌王而遣延留還大宛使貢獻如常賢又徙于寘王俞林為驪歸王立其弟位侍為于寘王嵗餘賢疑諸國欲畔召位侍及拘彌姑墨子合王盡殺之不復置正劉攽曰案文正當作王但遣將鎮守其國位侍子戎亡降漢封為守節侯莎車將君得在于寘暴虐百姓患之明帝永平三年其大人都末出城見野豕欲射之豕乃言曰無射我我乃為汝殺君得都末因此即與兄弟共殺君得而大人休莫霸復與漢人韓融等殺都末兄弟自立為于寘王復與拘彌國人攻殺莎車將在皮山者引兵歸於是賢遣其太子國相將諸國兵二萬人擊休莫霸霸迎與戰莎車兵敗走殺萬餘人賢復發諸國數萬人自將擊休莫霸霸復破之斬殺過半賢脱身走歸國休莫霸進圍莎車中流矢死兵乃退于寘國相蘇榆勒等共立休莫霸兄子廣徳為王匈奴與龜兹諸國共攻莎車不能下廣徳承莎車之敝使弟輔國侯仁將兵攻賢賢連被兵革乃遣使與廣徳和先是廣徳父拘在莎車數嵗於是賢歸其父而以女妻之結為昆弟廣徳引兵去明年莎車相且運等且音子余反下同患賢驕暴密謀反城降于寘反音畨于寘王廣徳乃將諸國兵三萬人攻莎車賢城守使使謂廣徳曰我還汝父與汝婦汝來擊我何為廣徳曰王我婦父也久不相見願各從兩人㑹城外結盟賢以問且運且運曰廣徳女壻至親宜出見之賢乃輕出廣徳遂執賢而且運等因内于寘兵虜賢妻子而并其國鎻賢將歸嵗餘殺之匈奴聞廣徳滅莎車遣五將發焉耆尉黎龜兹十五國兵三萬餘人圍于寘廣徳乞降以其太子為質約嵗給罽絮冬匈奴復遣兵將賢質子不居徵立為莎車王廣徳又攻殺之更立其弟齊黎為莎車王章帝元和三年劉攽曰案文少一也字時長史班超發諸國兵擊莎車大破之由是遂降漢事已具班超傳莎車東北至疏勒疏勒國去長史所居五千里去洛陽萬三百里領戸二萬一千勝兵三萬餘人明帝永平十六年龜兹王建攻殺疏勒王成自以龜兹左侯兠題為疏勒王冬漢遣軍司馬班超刼縳兠題而立成之兄子忠為疏勒王忠後反畔超擊斬之事已具超傳安帝元初中疏勒王安國以舅臣磐有罪徙於月氏月氏王親愛之後安國死無子母持國政與國人共立臣磐同産弟子遺腹為疏勒王臣磐聞之請月氏王曰安國無子種人微弱若立母氏我乃遺腹叔父也我當為王月氏乃遣兵送還疏勒國人素敬愛臣磐又畏憚月氏即共奪遺腹印綬迎臣磐立為王更以遺腹為磐槀城侯後莎車連畔于寘屬疏勒疏勒以强故得與龜兹于寘為敵國焉順帝永建二年臣磐遣使奉獻帝拜臣磐為漢大都尉兄子臣勲為守國司馬五年臣磐遣侍子與大宛莎車使俱詣闕貢獻陽嘉二年臣磐復獻師子封牛至靈帝建寧元年疏勒王與漢大都尉於獵中為其季父和得所射殺和得自立為王三年凉州刺史孟佗遣從事任渉將敦煌兵五百人與戊己司馬曹寛劉攽曰案文亦多已字西域長史張晏將焉耆龜兹車師前後部合三萬餘人討疏勒攻楨中城四十餘日不能下引去其後疏勒王連相殺害朝廷亦不能禁東北經尉頭温宿姑墨龜兹至焉耆焉耆國王居南河城北去長史所居八百里東去洛陽八千二百里戸萬五千口五萬二千勝兵二萬餘人其國四面有大山與龜兹相連道險阸易守有海水曲入四山之内周匝其城三十餘里永平末焉耆與龜兹共攻沒都䕶陳睦副校尉郭恂殺吏士二千餘人至永元六年都䕶班超發諸國兵討焉耆危須尉黎山國遂斬焉耆尉黎二王首傳送京師縣蠻夷邸蠻夷皆置邸以居之若今鴻臚寺也超乃立焉耆左侯元孟為王尉黎危須山國皆更立其王至安帝時西域背畔延光中超子勇為西域長史復討定諸國元孟與尉黎危須不降永建二年勇與敦煌太守張朗擊破之元孟乃遣子詣闕貢獻蒲類國居天山西疏榆谷東南去長史所居千二百九十里去洛陽萬四百九十里戸八百餘口二千餘勝兵七百餘人廬帳而居逐水草頗知田作有牛馬駱駝羊畜能作弓矢國出好馬蒲類本大國也前西域屬匈奴而其王得罪單于單于怒徙蒲類人六千餘口内之匈奴右部阿惡地因號曰阿惡國南去車師後部馬行九十餘日人口貧羸逃亡山谷間故留為國云劉攽曰案此文不足當云其人口貧羸者逃亡山谷間故留為國云少一其字一者字移支國居蒲類地戸千餘口三千餘勝兵千餘人其人勇猛敢戰以寇鈔為事皆被髪隨畜逐水草不知田作所出皆與蒲類同東且彌國東去長史所居八百里去洛陽九千二百五十里戸三千餘口五千餘勝兵二千餘人廬帳居逐水草頗田作其所出有亦與蒲類同所居無常車師前王居交河城河水分流繞城故號交河去長史所居柳中八十里東去洛陽九千一百二十里領戸千五百餘口四千餘勝兵二千人後王居務塗谷去長史所居五百里去洛陽九千六百二十里領戸四千餘口萬五千餘勝兵三千餘人前後部及東且彌卑陸蒲類移支是為車師六國北與匈奴接前部西通焉耆北道後部西通烏孫建武二十一年與鄯善焉耆遣子入侍光武遣還之乃附屬匈奴明帝永平十六年漢取伊吾盧通西域車師始復内屬匈奴遣兵擊之復降北虜和帝永元二年大將軍竇憲破北匈奴車師震慴前後王各遣子奉貢入侍並賜印綬金帛八年戊己校尉索頵欲廢後部王涿鞮立破虜侯細致涿鞮忿前王尉卑大賣已因反擊尉卑大獲其妻子明年漢遣將兵長史王林發凉州六郡兵及羌虜胡二萬餘人以討涿鞮獲首虜千餘人涿鞮入北匈奴漢軍追擊斬之立涿鞮弟農竒為王至永寧元年後王軍就及母沙麻反畔殺後部司馬及敦煌行事司馬即屬戊校尉所統也和帝時置戊己校尉鎮車師後部行事謂前行長史索班劉攽曰注和帝置戊己校尉案此上文云司馬即屬戊校尉所統是也下不合添一已字至安帝延光四年長史班勇擊軍就大破斬之順帝永建元年勇率後王農竒子加特奴及八滑等發精兵擊北虜呼衍王破之勇於是上立加特奴為後王八滑為後部親漢侯陽嘉三年夏車師後部司馬率加特奴等千五百人掩擊北匈奴於閶吾陸谷壊其廬落斬數百級獲單于母季母及婦女數百人季母叔母也牛羊十餘萬頭車千餘兩兵器什物甚衆四年春北匈奴呼衍王率兵侵後部帝以車師六國接近北虜為西域蔽扞乃令敦煌太守發諸國兵及玉門關候伊吾司馬合六千三百騎救之掩擊北虜於勒山漢軍不利秋呼衍王復將二千人攻後部破之桓帝元嘉元年呼衍王將三千餘騎寇伊吾伊吾司馬毛愷遣吏兵五百人於蒲類海東與呼衍王戰悉為所没呼衍王遂攻伊吾屯城夏遣敦煌太守司馬逹將敦煌酒泉張掖屬國吏士四千餘人救之出塞至蒲類海呼衍王聞而引去漢軍無功而還永興元年車師後部王阿羅多與戊部候嚴皓不相得遂忿戾反畔攻圍漢屯田且固城殺傷吏士後部候炭遮領餘人畔阿羅多詣漢吏降阿羅多迫急將其母妻子從百餘騎亡走北匈奴中敦煌太守宋亮上立後部故王軍就質子卑君為後部王後阿羅多復從匈奴中還與卑君爭國頗收其國人戊校尉閻詳慮其招引北虜將亂西域乃開信告示許復為王阿羅多乃詣詳降於是收奪所賜卑君印綬更立阿羅多為王仍將卑君還敦煌以後部人三百帳别屬役之食其税帳者猶中國之戸數也論曰西域風土之載前古未聞也漢世張騫懐致逺之略前書張騫漢中人為博望侯武帝時上言大夏及安息大宛之屬大國竒物誠得而以義屬之則地廣萬里帝從之班超奮封侯之志超少時家貧投筆歎曰丈夫當如傅介子張騫立功西域以取封侯安能久事筆硯乎語見超傳終能立功西遐羈服外域自兵威之所肅服財賂之所懐誘莫不獻方竒納愛質露頂肘行東向而朝天子故設戊己之官分任其事建都䕶之帥總領其權先馴則賞籝金而賜龜綬龜謂印文也漢舊儀曰銀印皆龜紐其文刻曰某官之章後服則繫頭顙而釁北闕立屯田於膏腴之野列郵置於要害之路馳命走驛劉攽曰驛案當作譯説上同不絶於時月商胡販客日欵於塞下其後甘英乃抵條支而厯安息臨西海以望大秦拒玉門陽關者四萬餘里靡不周盡焉若其境俗性智之優薄産載物類之區品川河領障之基源氣節凉暑之通隔梯山棧谷繩行沙度之道身熱首痛風災鬼難之域前書杜欽曰罽賔本漢所立殺漢使者今悔過來順使者送至懸度厯大頭痛小頭痛之山赤土身熱之阪臨崢嶸不測之深行者騎步相持繩索相引釋法顯游天竺記云西度流沙屡有熱風惡鬼過之必死葱嶺冬夏有雪有毒龍若犯之則風雨晦㝠飛砂揚礫過此難者萬無一全也劉攽曰注過此難者案過當作遇莫不備寫情形審求根實至於佛道神化興自身毒而二漢方志莫有稱焉張騫但著地多暑濕乗象而戰班勇雖列其奉浮圖不殺伐而精文善法導逹之功靡所傳述余聞之後説也其國則殷乎中土玉燭和氣天竺國記云中天竺人殷樂無戸籍耕王地者輸地利又其土和適無冬夏之異草木常茂種田無時節爾雅曰四時和謂之玉燭靈聖之所降集賢懿之所挺生本行經曰釋迦菩薩在兠率陁天為諸天無量無邊諸衆説法又觀我今何處成道利益衆生乃觀見宜於南閻浮提生有大利益又云誰中與我為父母者觀見宜於天竺刹利種迦毘羅城白凈王摩邪夫人可為父母又云四生之中何生利益觀見同衆生胎生我若化生諸外道等即誹謗我是幻術也爾時菩薩觀已示同諸天五哀相現命諸同侣波斯匿王等諸王中生皆作國王與我為檀越命阿難及諸人等同生為弟子命舍利佛等外道中生我成道時當受我化回邪入正又有無量衆生同隨菩薩於天竺受生多所利益也神迹詭怪則理絶人區維摩經曰以四大海水入一毛孔中不撓魚鼈等而彼大海本相如故又舍利弗住不思議菩薩斷取三千大千國界如陶家輪著右掌中擲過恒河沙國界之外其中衆生不覺不知又復還本處都不使人有往來相感騐明顯則事出天外湼槃經曰阿闇王令醉象蹋佛佛以慈善根力舒其五指遂為五師子見爾時醉象惶懼而退又五百羣賊刼奪人庶波斯匿王收捉剜其兩目棄入阬中爾時羣賊苦痛不已同時發聲念南無佛陁逹摩佛以慈善根力雪山吹藥令入賊眼皆悉平復如本而騫超無聞者豈其道閉往運數開叔葉乎不然何誣異之甚也漢自楚英始盛齋戒之祀桓帝又脩華蓋之飾將微義未譯而但神明之邪詳其清心釋累之訓空有兼遣之宗道書之流也清心謂忘思慮也釋累謂去貪欲也不執著為空執著為有兼遣謂不空不有虚實兩忘也維摩詰云我及湼槃此二皆空老子云常無欲觀其妙常有欲觀其徼故曰道書之流也且好仁惡殺蠲敝崇善所以賢逹君子多愛其法焉然好大不經竒譎無已維摩經曰爾時毘邪離有長者子名曰寳積與五百長者子俱持七寳蓋來詣佛所頭面禮足各以其蓋共供養佛佛威神力令諸寳蓋合成一蓋徧覆三千大千國界諸須彌山乃至日月星宿并十方諸佛説法皆現於寳蓋中又維摩詰三萬二千師子坐髙八萬四千由旬髙廣嚴浄來入維摩方丈室包容無所妨礙又四大海水入毛孔須彌山入芥子等也雖鄒衍談天之辯莊周蝸角之論史記曰談天衍劉向别録曰鄒衍之所言五徳終始天地廣大其書言天事故曰談天荘子曰有國於蝸之左角者曰觸氏有國於蝸之右角者曰蠻氏相與爭地而戰㐲尸數萬逐北旬有五日而後反郭璞注爾雅云蝸牛音𤓰談天言大蝸角喻小也尚未足以槩其萬一又精靈起滅因報相尋若曉而昧者故通人多惑焉精靈起滅滅謂死輪回無窮已因報相尋謂行有善惡各縁業報也蓋導俗無方適物異㑹取諸同歸措夫疑説則大道通矣賛曰逷矣西胡天之外區逷逺也音它狄反尚書曰逷矣西土之人土物琛麗人性淫虚不率華禮莫有典書若微神道何恤何拘言無神道以制胡人則匈猛之性何所憂懼何所拘忌也後漢書卷一百十八
