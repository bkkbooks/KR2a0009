body:
  text: 後漢書卷七宋宣城太守范煜撰唐章懷太子賢注桓帝紀第七孝桓皇帝諱志諡法曰克敵服逺曰桓志之字曰意肅宗曾孫也祖父河間孝王開父蠡吾侯翼順帝時開上書願分蠡吾縣以封翼帝許之蠡吾故城在今瀛州博野縣西蠡音禮母匽氏諱明本蠡吾侯之媵妾史記曰匽姓咎繇之後也匽音偃翼卒帝襲爵為侯本初元年梁太后徵帝到夏門亭洛陽城北面西頭門也門外有萬壽亭將妻以女弟妻音七計反㑹質帝崩太后遂與兄大將軍冀定策禁中閏月庚寅使冀持節以王青蓋車續漢志曰皇太子皇子皆安車朱班輪青蓋金華蚤故曰王青蓋車也迎帝入南宮其日即皇帝位時年十五太后猶臨朝政東觀記曰太后御郤非殿秋七月乙夘𦵏孝質皇帝于静陵在洛陽東南三十里陵髙五丈五尺周百三十八歩齊王喜薨辛巳謁髙廟光武廟丙戌詔曰孝廉廉吏皆當典城牧民禁姦舉善興化之本恒必由之詔書連下分明懇惻而所在翫習遂至怠慢選舉乖錯害及元元頃雖頗繩正猶未懲改方今淮夷未殄軍師屢出本初元年廬江賊攻盱台廣陵賊張嬰等殺江都長盱台江都並近淮故言淮夷時中郎將滕撫屢擊破之其餘衆猶未殄也百姓疲悴困於徵發庶望羣吏恵我勞民蠲滌貪穢以祈休祥其令秩滿百石十歳以上有殊才異行乃得參選臧吏子孫不得察舉杜絶邪偽請託之原令廉白守道者得信其操信音申古字通各明守所司將觀厥後九月戊戌追尊皇祖河間孝王曰孝穆皇夫人趙氏曰孝穆皇后皇考蠡吾侯曰孝崇皇冬十月甲午尊皇母匽氏為孝崇博園貴人博本漢蠡吾縣之地也帝旣追尊父為孝崇皇其陵曰博陵置園廟焉故曰博園在今瀛州博野縣西貴人位次皇后金印紫綬建和元年春正月辛亥朔日有食之詔三公九卿校尉各言得失戊午大赦天下賜吏更勞一歳男子爵人二級為父後及三老孝悌力田人三級鰥寡孤獨篤癃貧不能自存者粟人五斛貞婦帛人三匹災害所傷什四以上勿收田租其不滿者以實除之二月荆揚二州人多餓死遣四府掾分行賑給沛國言黄龍見譙夏四月庚寅京師地震詔大將軍公卿校尉舉賢良方正能直言極諫者各一人又命列侯將大夫御史謁者千石六百石將謂五官左右虎賁羽林中郎將也大夫謂光禄大夫太中大夫中㪚大夫諫議大夫博士議郎郎官各上封事指陳得失博士掌通古今比六百石議郎比六百石郎官謂三中郎將下之屬官也有中郎侍郎郎中又詔大將軍公卿郡國舉至孝篤行之士各一人壬辰詔州郡不得廹脅驅逐長吏長吏臧滿三十萬而不紏舉者刺史二千石以縱避為罪若有擅相假印綬者與殺人同棄市論丙午詔郡國繫囚減死罪一等勿笞唯謀反大逆不用此書又詔曰比起陵塋作静陵也彌歴時歳力役旣廣徒隸尤勤頃雨澤不沾密雲復散儻或在兹易曰密雲不雨自我西郊其令徒作陵者減刑各六月是月立阜陵王代兄勃遒亭侯便為阜陵王便光武𤣥孫也阜陵王恢之子以順帝陽嘉中封勃為遒亭侯今改封也遒音子由反本傳作便親紀傳不同蓋有誤郡國六地裂水涌井溢續漢志曰水溢壊城寺室屋殺人時梁太后攝政兄冀枉殺李固杜喬芝草生中黄藏府漢官儀曰中黄藏府掌中幣帛金銀諸貨物也六月太尉胡廣罷大司農杜喬為太尉秋七月勃海王鴻薨章帝曾孫也樂安夷王寵之子質帝之父也梁太后改封勃海立帝弟蠡吾侯悝為勃海王乙未立皇后梁氏九月丁夘京師地震太尉杜喬免冬十月司徒趙戒為太尉戒字志伯蜀郡人也司空袁湯為司徒前太尉胡廣為司空十一月濟隂言有五色大鳥見于已氏續漢志曰時以為鳳凰政旣衰缺梁冀專權皆羽孽也已氏縣名屬濟隂郡故城在今宋州楚邱縣也古戎州已氏之邑也戊午減天下死罪一等戍邊清河劉文反殺國相謝暠欲立清河王蒜為天子事覺伏誅蒜坐貶為尉氏侯徙桂陽自殺尉氏縣屬陳留郡今汴州縣也前太尉李固杜喬皆下獄死續漢志曰順帝之末京都童謠曰直如弦死道邉曲如鈎反封侯曲如鈎謂梁冀胡廣等直如弦謂李固等陳留盜賊李堅自稱皇帝伏誅東觀記曰江舍及李堅等二年春正月甲子皇帝加元服庚午大赦天下賜河間勃海二王黄金各百斤河間王建勃海王悝彭城諸國王各五十斤彭城王定公主大將軍三公特進侯中二千石二千石將大夫郎吏從官四姓及梁鄧小侯諸夫人以下帛各有差年八十以上賜米酒肉九十以上加帛二匹綿三斤三月戊辰帝從皇太后幸大將軍梁冀府白馬羌寇廣漢屬國殺長吏益州刺史率板楯蠻討破之板楯西南蠻之號夏四月丙子封帝弟顧為平原王奉孝崇皇祀尊孝崇皇夫人馬氏為孝崇園貴人嘉禾生大司農帑藏説文曰帑者金布所藏之府也帑佗朗反五月癸丑北宮掖廷中德陽殿及左掖門火車駕移幸南宮六月改清河為甘陵立安平王得子經侯理為甘陵王安平今定州縣也經今貝州經城縣秋七月京師大水河東言木連理冬十月長平陳景自號皇帝子署置官屬又南頓管伯亦稱真人並圖舉兵悉伏誅三年春三月甲申彭城王定薨夏四月丁夘晦日有食之續漢志曰在東井二十三度東井主法梁太后枉殺公卿犯天法也五月乙亥詔曰蓋聞天生蒸民不能相理為之立君使司牧之君道得於下則休祥著乎上庶事失其序則咎徵見乎象已上畧成帝詔詞間者日食毁缺陽光晦暗朕祗懼潛思匪遑啓處遑暇也啓跪也詩小雅曰王事靡盬不遑啓處傳不云乎日食脩德月食脩刑公羊傳之文也昔孝章帝愍前世禁徙故建初之元並蒙恩澤流徙者使還故郡沒入者免為庶民先皇德政可不務乎其自永建元年迄于今歳凡諸妖惡支親從坐及吏民減死徙邊者悉歸本郡唯沒入者不從此令六月庚子詔大將軍三公特進侯其與卿校尉舉賢良方正能直言極諫之士各一人乙夘震憲陵寢屋秋七月庚申廉縣雨肉續漢志曰肉似羊肺或大如手五行傳云棄法律逐功臣時則有羊禍時則有赤眚赤祥是時梁太后攝政兄冀専權枉誅李固杜喬天下寃之廉縣屬北地郡也八月乙丑有星孛于天市前書曰旗星中四星名曰天市京師大水九月己夘地震庚寅地又震詔死罪以下及亡命者贖各有差郡國五山崩冬十月太尉趙戒免司徒袁湯為太尉大司農河内張歆為司徒歆字敬讓十一月甲申詔曰朕攝政失中災眚連仍三光不明隂陽錯序監寐寤歎疢如疾首監寐言雖寢而不寐也寤覺也今京師厮舍死者相枕厮舍賤役人之舍也郡縣阡陌處處有之甚違周文掩胔之義其有家屬而貧無以𦵏者給直人三千喪主布三匹若無親屬可於官壖地𦵏之壖官之餘地也前書音義曰壖城郭旁地音奴喚而變二反表識姓名為設祠祭又徒在作部疾病致醫藥死亡厚埋藏民有不能自振及流移者稟榖如科州郡檢察務崇恩施以康我民和平元年春正月甲子大赦天下改元和平己亥詔曰曩者遭家不造先帝早世謂順帝崩詩周頌曰閔予小子遭家不造鄭𤣥注云造成也言成王遭武王崩家道未成永惟太宗之重深思嗣續之福詢謀台輔稽之兆占旣建明哲克定統業天人協和萬國咸寜元服已加將即委付而四方盜竊頗有未靜故假延臨政以須安謐幸頼股肱禦侮之助殘醜消蕩謂建和二年長安陳景反南頓管伯等謀反並伏誅民和年稔普天率土遐邇洽同遠覽復子明辟之義尚書曰周公曰朕復子明辟復還也子謂成王也辟君也謂周公攝政已乆故復還明君之政於成王今太后亦還政於帝也近慕先姑歸授之法先姑謂安帝閻皇后也爾雅曰婦人謂夫之父曰舅夫之母曰姑在則曰君舅君姑歿則曰先舅先姑也及今令辰皇帝稱制羣公卿士䖍恭爾位戮力一意勉同斷金金者剛之物也言人能同心則其利可以斷之也易曰二人同心其利斷金展也大成則所望矣詩小雅曰允矣君子展也大成鄭𤣥注云允信也展誠也大成謂致太平也言誠能致太平是所望也二月扶風妖賊裴優自稱皇帝伏誅裴姓優名也風俗通曰裴伯益之後甲寅皇太后梁氏崩三月車駕徙幸北宮甲午𦵏順烈皇后夏五月庚辰尊博園匽貴人曰孝崇皇后秋七月梓潼山崩梓潼縣屬廣漢郡今始州縣也有梓潼水冬十一月減天下死罪一等徙邊戍元嘉元年春正月京師疾疫使光禄大夫將醫藥案行癸酉大赦天下改元元嘉二月九江廬江大疫甲午河間王建薨夏四月己丑安平王得薨河間孝王開之子初為樂成王後改曰安平京師旱任城梁國饑民相食司徒張歆罷光禄勳呉雄為司徒秋七月武陵蠻叛冬十月司空胡廣罷十一月辛巳京師地震閏月庚午任城王崇薨太常黄瓊為司空二年春正月西域長史王敬為于寘國所殺敬殺于寘王建故國人殺之丙辰京師地震夏四月甲寅孝崇皇后匽氏崩庚午常山王豹薨五月辛夘𦵏孝崇皇后于博陵秋七月庚辰曰有食之八月濟隂言黄龍見句陽縣名屬濟隂郡左傳曰盟于句瀆之丘是也故城在今曹州乘氏縣北一名榖丘金城言黄龍見允街允街縣名屬金城郡音縁皆冬十月乙亥京師地震十一月司空黄瓊免十二月特進趙戒為司空右北平太守和旻坐臧下獄死永興元年春二月張掖言白鹿見三月丁亥幸鴻池夏五月丙申大赦天下改元永興丁酉濟南王廣薨無子國除秋七月郡國三十二蝗河水溢百姓飢窮流冗道路至有數十萬户冀州尤甚詔在所賑給乏絶安慰居業冬十月太尉袁湯免太常胡廣為太尉司徒呉雄罷司空趙戒免以太僕黄瓊為司徒光祿勳房植為司空十一月丁丑詔減天下死罪一等徙邊戍是歳武陵太守應奉招誘叛蠻降之二年春正月甲午大赦天下二月辛丑初聽刺史二千石行三年喪服癸夘京師地震詔公卿校尉舉賢良方正能直言極諫者各一人詔曰比者星辰繆越坤靈震動災異之降必不空發勑已脩政庶望有補其輿服制度有踰侈長飾者皆宜損省長音直亮反郡縣務存儉約申明舊令如永平故事六月彭城泗水増長逆流張衡對策曰水者五行之首逆流者人君之恩不能下及而致逆也詔司隸校尉部刺史曰蝗災為害水變仍至五榖不登人無宿儲其令所傷郡國種蕪菁以助人食京師蝗東海朐山崩朐山名也在今海州朐山縣南九月丁夘朔日有食之詔曰朝政失中雲漢作旱雲漢詩大雅篇名也周宣王時大旱故作詩曰倬彼雲漢昭回于天鄭𤣥注云雲漢天河也倬然轉運於天時旱渴雨故宣王夜視天河望其候焉川靈涌水蝗蟲孳蔓殘我百榖太陽虧光饑饉荐臻其不被害郡縣當為飢餒者儲天下一家趣不糜爛則為國寶其禁郡國不得賣酒祠祀裁足太尉胡廣免司徒黄瓊為太尉閏月光祿勳尹頌為司徒頌字公孫鞏人減天下死罪一等徙邊戌蜀郡李伯詐稱宗室當立為太初皇帝伏誅冬十一月甲辰校獵上林苑遂至函谷闗賜所過道傍年九十以上錢各有差太山琅邪賊公孫舉等反叛殺長吏永壽元年春正月戊申大赦天下改元永壽二月司隸冀州饑人相食司隸州即洛陽勑州郡賑給貧弱若王侯吏民有積榖者一切貣得十分之三貣音吐得反又音徒得反以助稟貸其百姓吏民者以見錢雇直雇猶酬也王侯須新租乃償須待也夏四月白烏見齊國六月洛水溢壞鴻德苑續漢志曰水溢至津城門漂流人物時梁冀専政疾害忠良威權震主後遂誅滅也南陽大水司空房植免太常韓縯為司空縯音翼善反詔太山琅邪遇賊者勿收租賦復更算三年又詔被水死流失屍骸者令郡縣鉤求收𦵏及所唐突壓溺物故七歳以上賜錢人二千壞敗廬舍亡失榖食尤貧者稟人二斛巴郡益州郡山崩益州郡名也武帝置諸本無郡字者誤也秋七月初置太山琅邪都尉官漢官儀曰秦郡有尉一人典兵禁捕盜賊景帝更名都尉建武七年省唯邊郡往往置都尉及屬國都尉今二郡寇賊不息故置南匈奴左臺且渠伯德等叛寇羙稷羙稷西河縣也安定屬國都尉張奐討除之二年春正月初聽中官得行三年服中官常侍以下二月甲申東海王臻薨三月蜀郡屬國夷叛秋七月鮮卑寇雲中太山賊公孫舉等寇青兖徐三州遣中郎將段熲討破斬之冬十一月置太官右監丞官漢官儀曰太官右監丞秩比六百石也十二月京師地震三年春正月己未大赦天下夏四月九真蠻夷叛太守兒式討之戰殁遣九真都尉魏朗擊破之復屯據日南閏月庚辰晦日有食之六月初以小黄門為守宮令置冗從右僕射官漢官儀曰守宮令一人黄門冗從僕射一人並秩六百石也京師蝗秋七月河東地裂冬十一月司徒尹頌薨長沙蠻叛寇益陽縣名屬長沙國在益水之陽今潭州縣也故城在縣東司空韓縯為司徒太常北海孫朗為司空朗字代平延熹元年春三月己酉初置鴻德苑令漢官儀曰苑令一人秩六百石夏五月己酉大㑹公卿以下賞賜各有差甲戌晦日有食之京師蝗六月戊寅大赦天下改元延熹丙戌分中山置博陵郡以奉孝崇皇園陵博陵郡故城在今瀛州博野縣後徙安平大雩秋七月己巳雲陽地裂甲子太尉黄瓊免太常胡廣為太尉冬十月校獵廣成遂幸上林苑十二月鮮卑寇邊使匈奴中郎將張奐率南單于擊破之二年春二月鮮卑寇鴈門己亥阜陵王便薨蜀郡夷寇蠶陵殺縣令三月復斷刺史二千石行三年喪夏京師雨水六月鮮卑寇遼東秋七月初造顯陽苑置丞丙午皇后梁氏崩乙丑𦵏懿獻皇后于懿陵大將軍梁冀謀為亂八月丁丑帝御前殿詔司隸校尉張彪將兵圍冀第收大將軍印綬冀與妻皆自殺衞尉梁淑河南尹梁𦙍屯騎校尉梁讓越騎校尉梁忠長水校尉梁㦸等及中外宗親數十人皆伏誅太尉胡廣坐免司徒韓縯司空孫朗下獄東觀記曰並坐不衞宮止長壽亭減死一等以爵贖之壬午立皇后鄧氏追廢懿陵為貴人冢詔曰梁冀奸暴濁亂王室孝質皇帝聰敏早茂冀心懷忌畏私行殺毒永樂太后親尊莫二和平元年有司奏太后所居皆以永樂為稱置官屬太僕少府焉冀又遏絶禁還京師謂太后常居博園不得在洛陽使朕離母子之愛隔顧復之恩禍害深大罪釁日滋頼宗廟之靈及中常侍單超徐璜具瑗左悺説文曰悺憂也音工奐反今作心旁官即悹字也今相傳音綰唐衡尚書令尹勳等激憤建策内外協同漏刻之間桀逆梟夷梟縣首於木也斯誠社稷之祐臣下之力宜班慶賞以酬忠勳其封超等五人為縣侯勳等七人為亭侯五縣侯謂單超新豐侯徐璜武原侯具瑗東武陽侯左悺上蔡侯唐衡汝陽侯七亭侯謂尹勳宜陽都鄉霍諝鄴都亭張敬山陽西鄉歐陽參脩武仁亭李瑋宜陽金門虞放寃句呂都亭周永下邳高遷鄉於是舊故恩私多受封爵大司農黄瓊為太尉光祿大夫中山祝恬為司徒恬字伯休盧奴人大鴻臚梁國盛允為司空允字伯代初置祕書監官漢官儀祕書監一人秩六百石冬十月壬申行幸長安乙酉幸未央宫甲午祠髙廟十一月庚子遂有事十一陵壬寅中常侍單超為車騎將軍十二月己巳至自長安賜長安民粟人十斛園陵人五斛行所過縣三斛燒當等八種𦍑叛寇隴右䕶羌校尉段熲追擊於羅亭破之東觀記曰追到積石山卽與羅亭相近在今鄯州也天竺國來獻三年春正月丙申大赦天下丙午車騎將軍單超薨閏月燒當𦍑叛寇張掖護羌校尉段熲追擊於積石大破之積石山在今鄯州龍支縣南即禹貢云導河積石是也白馬令李雲坐直諌下獄死夏四月上郡言甘露降五月甲戌漢中山崩六月辛丑司徒祝恬薨七月司空盛允為司徒太常虞放為司空放字子仲陳留人也長沙蠻宼郡界九月太山琅邪賊勞丙等復叛宼掠百姓遣御史中丞趙某史闕名也持節督州郡討之丁亥詔無事之官權絶奉豐年如故冬十一月日南蠻賊率衆詣郡降勒姐羌圍允街勒姐羌號也姐音子野反段熲擊破之太山賊叔孫無忌攻殺都尉侯章十二月遣中郎將宗資討破之武陵蠻宼江陵車騎將軍馮緄討皆降㪚荆州刺史度尚討長沙蠻平之四年春正月辛酉南宫嘉德殿火戊子丙署火丙署署名也續漢志曰丙署長七人秩四百石黄綬宦者為之主中宮别處大疫二月壬辰武庫火司徒盛允免大司農种暠為司徒三月省冗從右僕射官永夀三年置太尉黄瓊免夏四月太常劉矩為太尉甲寅封河間王開子博為任城王五月辛酉有星孛于心丁夘原陵長壽門火己夘京師雨雹東觀記曰大如雞子續漢志曰誅殺過差寵小人也六月京兆扶風及涼州地震庚子岱山及博尤來山並頺裂博今博城縣也太山有徂來山一名尤來己酉大赦天下司空虞放免前太尉黄瓊為司空犍為屬國夷寇鈔百姓益州刺史山昱擊破之零吾羌與先零諸種並叛宼三輔秋七月京師雩減公卿以下奉貣王侯半租占賣闗内侯虎賁羽林緹騎營士五大夫錢各有差九月司空黄瓊免大鴻臚劉寵為司空冬十月天竺國來獻南陽黄武與襄城惠得昆陽樂季訞言相署皆伏誅先零沈氐羌與諸種羌寇幷涼二州十一月中郎將皇甫規擊破之十二月夫餘王遣使來獻五年春正月省大官右監丞永夀三年置壬午南宮丙署火三月沈氐羌寇張掖酒泉壬午濟北王次薨夏四月長沙賊起宼桂陽蒼梧東觀記曰時攻没蒼梧取銅虎符太守甘定刺史侯輔各奔出城桂陽郡在桂水之陽今連州縣驚馬逸象突入宮殿乙丑恭陵東闕火安帝陵也戊辰虎賁掖門火己巳太學西門自壞五月康陵園寢火殤帝陵也長沙零陵賊起攻桂陽蒼梧南海交阯遣御史中丞盛脩督州郡討之不剋乙亥京師地震詔公卿各上封事甲申中藏府丞祿署火秋七月己未南宮承善闥火爾雅曰宮中門謂之闈廣雅曰闈謂之闥鳥吾羌宼漢陽隴西金城諸郡兵討破之八月庚子詔減虎賁羽林住寺不任事者半奉勿與冬衣東觀記曰以京師水旱疫病帑藏空虚虎賁羽林不任事者住寺減半奉據此謂簡選疲弱不勝軍事者留住寺也其公卿以下給冬衣之半艾縣賊焚燒長沙郡縣宼益陽殺令東觀記曰時賊乘刺史車屯據臨湘居太守舍賊萬人以上屯益陽殺長吏艾縣名屬豫章郡故城在今洪州建昌縣又零陵蠻亦叛宼長沙己夘罷琅邪都尉官永壽元年置冬十月武陵蠻叛宼江陵南郡太守李肅坐奔北棄市辛丑以太常馮緄為車騎將軍討之假公卿以下奉又換王侯租以助軍糧出濯龍中藏錢還之十一月馮緄大破叛蠻於武陵京兆虎牙都尉宗謙坐臧下獄死京兆虎牙都尉屯長安見西羌傳滇那羌宼武威張掖酒泉太尉劉矩免太常楊秉為太尉六年春二月戊午司徒种暠薨三月戊戌大赦天下衞尉潁川許栩為司徒栩字季闕郾人夏四月辛亥康陵東署火五月鮮卑寇遼東屬國秋七月甲申平陵園寢火平陵昭帝陵也桂陽盜賊李研等宼郡界武陵蠻復叛太守陳奉與戰大破降之隴西太守孫羌討滇那羌破之八月車騎將軍馮緄免冬十月丙辰校獵廣成遂幸函谷闗上林苑十一月司空劉寵免南海賊宼郡界十二月衛尉周景為司空七年春正月庚寅沛王榮薨三月癸亥隕石于鄠夏四月丙寅梁王成薨五月己丑京師雨雹秋七月辛夘趙王乾薨野王山上有死龍荆州刺史度尚擊零陵桂陽盜賊及蠻夷大破平之冬十月壬寅南廵狩庚申幸章陵祠舊宅遂有事于園廟賜守令以下各有差戊辰幸雲夢臨漢水還幸新野祠湖陽新野公主魯哀王壽張敬侯廟光武姊湖陽長公主新野長公主兄魯哀王舅壽張敬侯樊重並光武時立廟䕶羌校尉段熲擊當煎羌破之十二月辛丑車駕還宮八年春正月遣中常侍左悺之苦縣祠老子史記曰老子者楚苦縣厲鄉曲仁里人也名耳字𥅆姓李氏為周守藏史有神廟故就祠之苦縣屬陳國故城在今亳州谷陽縣也苦音戸又如字勃海王悝謀反降為廮陶王廮陶縣屬鉅鹿郡故城在今趙州廮陶縣西南丙申晦日有食之詔公卿校尉舉賢良方正己酉南宮嘉德署黄龍見千秋萬歳殿火太僕左稱有辠自殺癸亥皇后鄧氏廢河南尹鄧萬世鄧后之叔父也虎賁中郎將鄧㑹下獄死鄧后之兄子䕶羌校尉段熲擊勒姐羌破之三月辛巳大赦天下夏四月甲寅安陵園寢火惠帝陵也丁巳壞郡國諸房祀房謂祠堂也王渙傳曰時唯密縣存故太傳卓茂廟洛陽留令王渙祠濟隂東郡濟北河水清五月壬申罷太山都尉官永壽元年置丙戌太尉楊秉薨丙辰緱氏地裂桂陽胡蘭朱蓋等復反攻沒郡縣轉宼零陵零陵太守陳球拒之遣中郎將度尚長沙太守抗徐等擊蘭蓋大破斬之謝承書曰抗徐字伯徐丹陽人少為郡佐史有膽智策畧三府表徐有將率之任特遷長沙太守風俗通曰衛大夫三抗之後漢有抗喜為漢中太守蒼梧太守張叙為賊所執又桂陽太守任𦙍背敵畏懦皆棄市閏月甲午南宫長秋和歡殿後鉤楯掖庭朔平署火長秋宮名漢官儀曰朔平署司馬一人六月段熲擊當煎羌於湟中大破之湟水名在今鄯州湟水縣秋七月太中大夫陳蕃為太尉八月戊辰初令郡國有田者畝斂税錢畝十錢也九月丁未京師地震冬十月司空周景免太常劉茂為司空茂字叔盛彭城人也辛巳立貴人竇氏為皇后勃海妖賊蓋登等蓋古盍反稱太上皇帝有玉印珪璧鐵劵相署置皆伏誅續漢書曰時登等有玉印五皆如白石文曰皇帝信璽皇帝行璽其三無文字璧二十二珪五鐵劵十一開王廟帶玉綬衣絳衣相署置也十一月壬子德陽殿西閤黄門北寺火延及廣義神虎門燒殺人廣義神虎洛陽宮西門在金商門外袁山松書曰是時連月火災諸宫寺或一日三發又夜有訛言擊鼓相驚陳蕃等上疏諫曰唯善政可以己之書奏不省使中常侍管霸之苦縣祠老子九年春正月辛亥朔日有食之詔公卿校尉郡國舉至孝沛國戴異得黄金印無文字遂與廣陵人龍尚等共祭井作符書稱太上皇伏誅東觀記曰戴異鉏田得金印到廣陵以與龍尚己酉詔曰比歳不登人多飢窮又有水旱疾疫之困盜賊徵發南州尤甚謂長沙桂陽零陵等郡也並屬荆州災異日食譴告累至政亂在予仍獲咎徵其令大司農絶今歳調度徵求及前年所調未畢者勿復收責其災旱盜賊之郡勿收租餘郡悉半入三月癸巳京師有火光轉行人相驚譟司隸豫州飢死者什四五至有滅户者遣三府掾賑稟之陳留太守韋毅坐臧自殺夏四月濟隂東郡濟北平原河水清司徒許栩免五月太常胡廣為司徒六月南匈奴及烏桓鮮卑寇縁邊九郡秋七月沈氐羌寇武威張掖詔舉武猛三公各二人卿校尉各一人太尉陳蕃免庚午祠黄老於濯龍宮遣使匈奴中郎將張奐擊南匈奴烏桓鮮卑九月光祿勲周景為大尉南陽太守成瑨太原太守劉質並以譖棄市時小黄門趙津犯法質考殺之宦官怨恚有司承㫖奏質等司空劉茂免大秦國王遣使奉獻時國王安敦獻象牙犀角玳瑁冬十二月洛城傍竹柏枯傷光祿勳汝南宣酆為司空酆字伯應封東陽亭侯南匈奴烏桓率衆詣張奐降司隸校尉李膺等二百餘人受誣為黨人並坐下獄書名王府河内牢脩告之事具劉淑傳永康元年春正月先零羌寇三輔中郎將張奐破平之當煎羌宼武威䕶羌校尉段熲追擊於鸞鳥大破之鸞鳥縣名屬武威郡鸞音雚西羌悉平夫餘王寇𤣥莬太守公孫域與戰破之夏四月先零羌宼三輔五月丙申京師及上黨地裂廬江賊起寇郡界壬子晦日有食之詔公卿校尉舉賢良方正六月庚申大赦天下悉除黨錮改元永康時李膺等頗引宦者子弟宦官多懼請帝以天時當赦帝許之故除黨錮也丙寅阜陵王統薨秋八月魏郡言嘉禾生甘露降巴郡言黄龍見續漢志曰時人欲就沱浴見沱水濁因相戲恐此中有黄龍語遂行人聞郡欲以為羙故上言之時史以書帝紀桓帝政化衰缺而多言瑞應皆此類也先儒言瑞興非時則為妖孽而人言生龍皆龍孽也六州大水勃海海溢詔州郡溺死者七歳以上錢人二千一家皆被害者悉為收斂其亡失榖食稟人三斛冬十月先零羌寇三輔使匈奴中郎將張奐擊破之十一月西河言白見十二月壬申復廮陶王悝為勃海王丁丑帝崩于德陽前殿年三十六戊寅尊皇后曰皇太后太后臨朝是歳復博陵河間二郡比豐沛論曰前史稱桓帝好音樂善琴笙前史謂東觀記飾芳林而考濯龍之宮薛綜注東京賦云濯龍殿名芳林謂両旁樹木蘭也考成也既成而祭之左傳曰考仲子之宮設華蓋以祠浮圖老子浮圖今佛也續漢志曰祀老子於濯龍宮文罽為壇飾淳金銀器設華蓋之坐用郊天樂斯將所謂聽於神乎左傳曰史嚚曰國將興聽於人將亡聽於神及誅梁冀奮威怒天下猶企其休息而五邪嗣虐流衍四方五邪謂單超徐璜左悺唐衡具瑗也自非忠賢力爭屢折姦鋒忠賢謂李膺陳蕃竇武黄瓊朱穆劉淑劉陶等各上書極諫以折宦官等姦謀之鋒也雖願依斟流彘亦不可得已帝王紀曰夏帝相為羿所逐相乃都啇丘依同姓諸侯斟灌斟尋氏史記曰周厲王好利暴虐周人相與畔而襲厲王王出奔于彘言帝寵幸宦豎令執威權頼忠臣李膺等竭力諫爭以免簒弑之禍不然則雖願如夏相依斟周王流彘不可得也斟灌斟尋國故城在今青州彘晉地也贊曰桓自宗支越躋天祿越謂非次也躋升也天祿天位也左傳子家覊曰天祿不再政移五倖刑淫三獄倖佞也淫濫也五倖即上五邪也三獄謂李固杜喬李雲杜衆成瑨劉質也傾宮雖積皇身靡續帝王紀曰紂多發羙女以充傾宮之室婦人衣綾紈者三百餘人據桓帝納三皇后又博採宮女五六千人並無子也後漢書卷七後漢書卷七考證桓帝紀辛巳謁高廟光武廟何焯曰光武廟上疑脱壬午謁三字自號皇帝子皇監本作黄今從宋本臣會汾按黄帝子義亦可通猶前書言白帝子赤帝子也和平元年春正月甲子大赦天下改元和平己亥詔曰何焯曰若以甲子下赦則己亥歸政當在二月疑日有訛後漢書卷七考證
