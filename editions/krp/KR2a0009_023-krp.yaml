body:
  text: 後漢書卷二十三梁剡令劉昭補并注五行志第十三五行一貌不恭雞禍淫雨青𤯝服妖壊屋自訛言人狼食旱謡五行傳説及其占應漢書五行志録之詳矣故㤗山太守應劭給事中董巴散騎常侍譙周蜀志曰周字允南巴西西充國人也治尚書兼通諸經及圖緯州郡辟請皆不應耽古篤學誦讀典籍欣然獨笑以忘寢食蜀亡魏徴不至並撰建武以來災異今合而論之以續前志云五行傳曰田獵不宿鄭𤣥注尙書大傳曰不宿不宿禽也角主天兵周禮四時習兵因以田獵禮志曰天子不合圍諸侯不掩羣過此則暴天物為不宿禽角南有天庫將軍騎官漢書音義曰遊田馳騁不反宮室飲食不享鄭𤣥曰享獻也禮志曰天子諸侯無事則嵗三田一為乾豆二為賔客三為充君之庖周禮獸人冬獻狼夏獻麋春秋獻獸物此獻禮之大畧也注五行稱鄭𤣥曰皆出注大傳也漢書音義曰無獻享之禮出入不節鄭𤣥曰角為天門房有三道出入之象也奪民農時鄭𤣥曰房心農時之候也季冬之月命農師計耦耕事是時房心晨中春秋傳曰辰為農祥后稷之所經緯也及有姦謀鄭𤣥曰亢為朝廷房心為明堂謀事出政之象則木不曲直鄭𤣥曰君行此五者為逆天東宮之政東宮於地為木木性或曲或直人所用為噐也無故生不暢茂多折槁是為木不曲直木金水火土謂之五材春秋傳曰天生五材民並用之其政逆則神怒神怒則材失性不為民用其他變異皆屬沴沴亦神怒凡神怒者日月五星既見謫于天矣洪範木曰曲直孔安國曰木可以揉曲直謂木失其性而為災也又曰貌之不恭是謂不肅鄭𤣥曰肅敬也君貌不恭則是不能敬其事也洪範曰貌曰恭厥咎狂鄭𤣥曰君臣不敬則倨慢如狂方儲對策曰君失制度下不恭承臣恣淫慢厥罰恒雨鄭𤣥曰貌曰木木主春春氣生生氣失則踰其節故常雨也管子曰冬作土功發地藏則夏多暴雨秋雨霖不止淮南子曰金不收則多淫雨厥極惡孔安國曰醜陋時則有服妖鄭𤣥曰服貌之飾也時則有龜孽鄭𤣥曰龜蟲之生於水而游於春者屬木時則有雞禍鄭𤣥曰雞畜之有冠翼者也屬貌洪範傳曰妖者敗胎也少小之類言其事之尚微也至孽則牙孽也至乎禍則著矣時則有下體生上之痾鄭𤣥曰痾病也貌氣失之病也漢書音義曰若梁孝王之時牛足反出背上也此下欲伐上之禍時則有青𤯝青祥鄭𤣥曰青木色也𤯝生於此祥自外來也惟金沴木鄭𤣥曰沴殄也凡貌言視聽思心一事失則逆人之心人心逆則怨木金水火土氣為之傷傷則衝勝來乘殄之於是神怒人怨将為禍亂故五行先見變異以譴告人也及妖孽禍痾𤯝祥皆其氣類暴作非常為時怪者也各以物象為之占也説云氣之相傷謂之沴尚書大𫝊曰凡六沴之作嵗之朝月之朝日之朝則后王受之嵗之中月之中日之中則正卿受之嵗之夕月之夕日之夕則庶民受之鄭𤣥曰自正月盡四月為嵗之朝自五月盡八月為嵗之中自九月盡十二月為嵗之夕上旬為月之朝中旬為月之中下旬為月之夕平旦至食時為日之朝隅中至日昳為日之中晡時至黄昏為日之夕受之受其凶咎也大傳又云其二辰以次相将其次受之鄭𤣥曰二辰謂日月也假令嵗之朝也日月中則上公受之日月夕則下公受之嵗之中也日月朝則孤卿受之日月夕則大夫受之嵗之夕也日月朝則上士受之日月中則下士受之其餘差以尊卑多少則悉矣管子曰明王有四禁春無殺伐無割大陵伐大木斬大山行大火誅大臣收榖賦錢夏無遏水逹名川塞大谷動土功射鳥獸秋無赦過釋罪緩刑冬無爵賞禄傷伐五藏故春政不禁則五榖不成夏政不禁則草木不榮秋政不禁則姦邪不勝冬政不禁則地氣不藏四者俱犯則隂陽不和風雨不時火流邑大風飄屋折樹木地草夭冬雷草木夏落而秋蟲不藏宜死者生宜蟄者鳴多螣蟇蟲也六畜不蕃民多夭死國貧法亂逆氣下生故曰臺榭相望者亡國之簾也馳車充國者追察之馬也翠羽朱飾者斬生之斧也五采纂組者蕃功之室也明王知其然故逺而不近能去此取彼則王道備也續漢書曰建武二年尹敏上疏曰六沴作見若是供御帝用不差神則大喜五福乃降用章于下若不供御六罰既侵六極其下明供御則天報之福不供御則禍災至欲尊六事之體則貌言視聽思心之用合六事之揆以致乎太平而消除轗軻孽害也建武元年赤眉賊率樊崇逢安等共立劉盆子為天子然崇等視之如小兒百事自由初不恤録也後正旦至君臣欲共饗既坐酒食未下羣臣更起亂不可整時大司農楊音案劒怒曰小兒戱尚不如此其後遂破壞崇安等皆誅死唯音為闗内侯以夀終光武崩山陽王荆哭不哀作飛書與東海王勸使作亂明帝以荆同母弟大后在故隠之後徙王廣陵荆遂坐復謀反自殺也章帝時竇皇后兄憲以皇后甚幸於上故人人莫不畏憲憲於是強請奪沁水長公主田公主畏憲與之憲乃賤顧之後上幸公主田覺之問憲憲又上言借之上以后故但譴勅之不治其罪後章帝崩竇太后攝政憲秉機密忠直之臣與憲忤者憲多害之其後憲兄弟遂皆被誅桓帝時梁冀秉政兄弟貴盛自恣好驅馳過度至於歸家猶驅馳入門百姓號之曰梁氏滅門驅馳後遂誅滅和帝永元十年十三年十四年十五年皆淫雨傷稼古今注曰光武建武六年九月大雨連月苖稼更生鼠巢樹上十七年雒陽暴雨壊民廬舍壓殺人傷害禾稼安帝元年四年秋郡國十淫雨傷稼方儲對策曰雨不時節妄賞賜也永寧元年郡國三十三淫雨傷稼建光元年京都及郡國二十九淫雨傷稼是時羌反久未平百姓屯戍不解愁苦延光元年郡國二十七淫雨傷稼案本傳陳忠奏以為王侯二千石為女使伯榮獨拜車下柄在臣妾二年郡國五連雨傷稼順帝永建四年司隸荆豫兖冀部淫雨傷稼六年冀州淫雨傷稼桓帝延熹二年夏霖雨五十餘日是時大将軍梁冀秉政謀害上所幸鄧貴人母宣冀又擅殺議郎邴尊上欲誅冀懼其持權日久威勢強盛恐有逆命害及吏民密與近臣中常侍單超等圖其方畧其年八月冀卒伏罪誅滅案公沙穆傳永夀元年霖雨大水三輔以東莫不湮没靈帝建寧元年夏霖雨六十餘日是時大将軍竇武謀變廢中官其年九月長樂五官吏朱瑀等共與中常侍曹節起兵先誅武交兵闕下敗走追斬武兄弟死者數百人案武死無兄弟有兄子熹平元年夏霖雨七十餘日是時中常侍曹節等共誣曰勃海王悝謀反其十月誅悝中平六年夏霖雨八十餘日是時靈帝新棄羣臣大行尚在梓宮大将軍何進與佐軍校尉袁紹等共謀欲誅廢中官下文陵畢中常侍張讓等共殺進兵戰京都死者數千更始諸将軍過雒陽者數十軰皆幘而衣婦人衣繡擁􅜎時智者見之以為服之不中身之災也乃奔入邊郡避之是服妖也其後更始遂為赤眉所殺桓帝元嘉中京都婦女作愁眉啼粧墮馬䯻折要歩齲齒笑所謂愁眉者細而曲折啼粧者薄拭目下若啼處墮馬䯻者作一邊梁冀别傳曰冀婦女又有不聊生䯻折要歩者足不在體下齲齒笑者若齒痛樂不欣欣始自大将軍梁冀家所為京都歙然諸夏皆放效此近服妖也梁冀二世上将㛰媾王室大作威福将危社稷天誡若曰兵馬将徃收捕婦女憂愁踧眉啼泣吏卒掣頓折其要脊令䯻傾邪雖強語笑無復氣味也到延熹二年舉宗誅夷延熹中梁冀誅後京都幘顔短耳長短上長下時中常侍單超左悺徐璜具瑗唐衡在帝左右縱其姦慝海内愠曰一将軍死五将軍出家有數侯子弟列布州郡賔客雜襲騰翥上短下長與梁冀同占到其八年桓帝因日蝕之變乃拜故司徒韓寅為司隸校尉以次誅鉏京都正清臣昭案本傳寅誅左悺貶具瑗雖尅折姦首羣閹相䝉京都未為正清延熹中京都長者皆着木屐婦女始嫁至作漆畫五采為系此服妖也到九年黨事始發傳黄門北寺臨時惶惑不能信天任命多有逃走不就考者九族拘繫及所過歴長少婦女皆被桎梏應木屐之象也靈帝建寧中京都長者皆以葦方笥為粧具下士盡然時有識者竊言葦方笥郡國讞篋也今珍用之此天下人皆當有罪讞於理官也到光和三年癸丑赦令詔書吏民依黨禁錮者赦除之有不見文他以類比疑者讞於是諸有黨郡皆讞廷尉人名悉入方笥中靈帝好胡服胡帳胡牀胡坐胡飯胡箜篌胡笛胡舞京都貴戚皆競為之此服妖也其後董卓多擁胡兵填塞街衢虜掠宮掖發掘園陵靈帝於宮中西園駕四白驢躬自操轡驅馳周旋以為大樂於是公卿貴戚轉相放效至乘輜軿以為騎從互相侵奪賈與馬齊案易曰時乘六龍以御天行天者莫若龍行地者莫如馬詩云四牡騤騤載是常服檀車煌煌四牡彭彭夫驢乃服重致遠上下山谷野人之所用耳何有帝王君子而驂服之乎遲鈍之畜而今貴之天意若曰國且大亂賢愚倒植凡執政者皆如驢也其後董卓陵虐王室多援邊人以充本朝胡夷異種跨蹈中國熹平中省内冠狗帶綬以為笑樂有一狗突出走入司徒府門或見之者莫不驚怪袁山松書曰光和四年又於西園弄狗以配人京房易傳曰君不正臣欲簒厥妖狗冠出後靈帝寵用便嬖子弟永樂賔客鴻都羣小傳相汲引公卿牧守比肩是也又遣御史於西邸賣官闗内侯顧五百萬者賜與金紫詣闕上書占令長隨縣好醜豐約有賈强者貪如豺虎弱者畧不類物實狗而冠者也司徒古之丞相壹綂國政天戒若曰宰相多非其人尸禄素餐莫能據正持重阿意曲從今在位者皆如狗也故狗走入其門應劭曰靈帝數以車騎將軍過拜孽臣内孽又贈亡人顯號加於頑凶印綬汙於腐屍昔辛有睹被髮之祥知其為戎今假號雲集不亦宜乎靈帝數遊戲於西園中令後宮采女為客舍主人身為商賈服行至舍采女下酒食因共飲食以為戲樂此服妖也其後天下大亂風俗通曰時京師賔㛰嘉㑹皆作魁􅪡酒酣之後續以挽歌魁􅪡喪家之樂挽歌執紼相偶和之者天戒若曰國家當急殄悴諸貴樂皆死亡也自靈帝崩後京師壊滅戸有兼屍蟲而相食魁􅪡挽歌斯之效乎獻帝建安中男子之衣好為長躬而下甚短女子好為長裙而上甚短時益州從事莫嗣以為服妖是陽無下而隂無上也天下未欲平也後還遂大亂袁山松曰禪位於魏靈帝光和元年南宮侍中寺雌雞欲化雄一身毛皆似雄但頭冠尙未變詔以問議郎蔡邕邕對曰貌之不恭則有雞禍宣帝黄龍元年未央宮雌雞化為雄不鳴無距是嵗元帝初即位立王皇后至初元元年丞相史家雌雞化為雄冠距鳴将是嵗后父禁為平陽侯女立為皇后至哀帝晏駕后攝政王莽以后兄子為大司馬由是為亂臣竊推之頭元首人君之象今雞一身已變未至於頭而上知之是将有其事而不遂成之象也若應之不精政無所改頭冠或成為患兹大是後張角作亂稱黄巾遂破壊四方疲於賦役多叛者上不改政遂致天下大亂桓帝永興二年四月丙午光禄勲吏舍壁下夜有青氣視之得玉鉤玦各一鉤長七寸二分周五寸四分身中皆雕鏤此青祥也玉金類也七寸二分商數也五寸四分徴數也商為臣徴為事蓋為人臣引決事者不肅将有禍也是時梁冀秉政専恣後四嵗梁氏誅滅也延熹五年太學門無故自壊襄楷以為太學前疑所居本傳楷書無前疑之言也其門自壊文徳将喪教化廢也是後天下遂至喪亂永康元年十月壬戌南宮平城門内屋自壊金沴木木動也其十二月宮車晏駕靈帝光和元年南宮平城門内屋武庫屋及外東垣屋前後頓壊蔡邕對曰平城門正陽之門與宮連郊祀法駕所由從出門之最尊者也武庫禁兵所藏東垣庫之外障易傳曰小人在位上下咸悖厥妖城門内崩潛潭巴曰宮瓦自墮諸侯强陵主此皆小人顯位亂法之咎也其後黄巾賊先起東方庫兵大動皇后同父兄何進為大将軍同母弟苖為車騎将軍兄弟並貴盛皆綂兵在京都其後進欲誅廢中官為中常侍張讓叚珪等所殺兵戰宮中闕下更相誅滅天下兵大起三年二月公府駐駕廡自壊南北三十餘間中平二年二月癸亥廣陽城門外上屋自壊也獻帝初平二年三月長安宣平城門外屋無故自壞至三年夏司徒王允使中郎将呂布殺太師董卓夷三旅袁山松曰李傕等攻破長安城害允等興平元年十月長安市門無故自壊至二年春李傕郭氾鬬長安中傕迫劫天子移置傕塢盡燒宮殿城門官府民舍放兵寇鈔公卿以下冬天子東還雒陽傕氾追上到曹陽虜掠乘輿輜重殺光禄勲鄧淵廷尉宣璠少府田邠等數十人五行傳曰好攻戰鄭𤣥注曰參伐為武府攻戰之象輕百姓鄭𤣥注曰輕之者不重民命春秋傳曰師出不正反戰不正勝也飾城郭鄭𤣥注曰昴畢間為天街甘氏經曰天街保塞孔塗道衢保塞城郭之象也月令曰四鄙入保侵邊境鄭𤣥曰畢主邊兵則金不從革鄭𤣥注曰君行此四者為逆天西宮之政西宮於地為金金性從刑而革人所用為噐者也無故冶之不銷或入火飛亡或鑄之裂形是為不從革其他變異皆屬沴也洪範曰從革作辛馬融曰金之性從人而更可銷鑠也漢書音義曰言人君言不見從則金鐡亦不從人意謂金失其性而為災也又曰言不從是謂不乂鄭𤣥曰乂治也君言不從則是不能治其事也厥咎僭鄭𤣥曰君臣不治則僭差矣厥罰恒暘鄭𤣥曰金主秋秋氣殺殺氣失故常暘也春秋考異郵曰君行非是則言不見從言不見從則下不治下不治則僭差過制度奢侈驕泰天子僭天大夫僭人主諸侯僭上陽無以制從心之喜上憂下則常暘從之推設其跡考之天意則大旱不雨而民庶大災傷淮南子曰殺不辜則國赤地厥極憂鄭𤣥曰殺氣失故於人為憂時則有詩妖鄭𤣥曰詩之言志也時則有介蟲之孽鄭𤣥曰蝝螽蜩蟬之類生於火而藏於秋者也屬金時則有犬禍鄭𤣥曰犬畜之以口吠守者屬言時則有口舌之痾鄭𤣥曰言氣失之病時則有白𤯝白祥惟木沴金介蟲劉歆傳以為毛蟲乂治也安帝永初元年十一月民訛言相驚司隸并冀州民人流移時鄧太后專政婦人以順為道故禮夫死從子之命今專主事此不從而僭也古今注曰章帝建初五年東海魯國東平山陽濟隂陳留民訛言相驚有賊捕至京師民皆入城也世祖建武古今注曰建武三年七月雒陽大旱帝至南郊求雨即日雨五年夏旱京房傳曰欲德不用兹謂張厥災荒其旱隂雲不雨變而赤因四隂衆出過時兹謂廣其旱不生上下皆蔽兹謂隔其旱天赤三月時有雹殺飛禽上緣求妃兹謂僭其旱三月大温亡雲君高臺府兹謂犯隂侵陽其旱萬物根死有火災庶位踰節兹謂僭其旱澤物枯為火所傷春秋考異郵曰國大旱寃獄結旱者陽氣移精不施君上失制奢滛僭差氣亂感天則旱徴見又云隂厭陽移君滛民惡隂精不舒陽偏不施又云陽偏民怨徴也在所以感之者上奢則求多求多則下竭下竭則潰君不仁管子曰春不收枯骨伐枯木而起去之則夏旱方儲對策曰百姓苦士卒煩碎責租税失中暴師外營經歴三時内有怨女外有曠夫王者熟推其祥揆合於天圖之事情旱災可除夫旱者過日天王無意於百姓恩德不行萬民煩擾故天應以無澤是時天下僭逆者未盡誅軍多過時古今注曰建武六年六月九年春十二年五月二十一年六月明帝永平元年五月八年冬十一年八月十五年八月十八年三月並旱章帝章和二年夏旱時章帝崩後竇太后兄弟用事奢僭古今注曰建初二年夏雒陽旱四年夏元和元年春並旱案楊終傳建初元年大旱榖貴終以為廣陵楚淮陽濟南之獄徙者數萬人吏民怨曠上疏云久旱孔叢曰建初元年大旱天子憂之侍御史孔豐乃上疏曰臣聞為不善而災報得其應也為善而災至遭時運也陛下即位日淺視民如傷而不幸耗旱時運之㑹耳非政教所致也昔成湯遭旱因自責省畋散積減御損食而大有年意者陛下未為成湯之事焉天子納其言而從之三日雨即降轉拜黄門郎典東觀事和帝永元六年秋京都旱時雒陽有寃囚和帝幸雒陽寺録囚徒理寃囚收令下獄抵罪行未還宮澍雨降古今注曰永元二年郡國十四旱十五年丹陽郡國二十二並旱或傷稼安帝古今注曰永初元年郡國八旱分遣議郎請雨案本紀二年五月旱皇太后幸雒陽寺録囚徒即日降雨六月京都及郡國四十大水雖去旱得水無救為災永初六年夏旱古今注曰三年郡國八旱四年五年夏並旱七年夏旱元初元年夏旱二年夏旱三年夏旱時西羗寇亂軍屯相繼連十餘年六年夏旱古今注曰建光元年郡國四旱延光元年郡國五並旱傷稼順帝永建三年夏旱五年夏旱陽嘉二年夏旱時李固對策以為奢僭所致也臣昭案本紀元年二月京師旱郎顗傳人君恩澤不施於民祿去公室臣下專權所致也又周舉傳三年河南三輔大旱五榖傷災天子親自露坐陽德殿東廂請雨沖帝永嘉元年夏旱時沖帝幼崩太尉李固勸太后及兄梁冀立嗣帝擇年長有德者天下頼之則功名不朽年幼未可知如後不善悔無所及時太后及冀貪立年幼欲久自專遂立質帝八嵗此不用德古今注曰本初元年二月京師旱桓帝元嘉元年夏旱是時梁冀秉政妻子並受封寵踰節延熹元年六月旱京房占曰人君無施澤惠利於下則致旱也不救必蝗蟲害榖其救也貰擿罰行寛大惠兆民勞功吏賜鰥寡禀不足案陳蕃上疏宮女多聚不御憂悲之感以致水旱之困也靈帝熹平五年夏旱蔡邕作伯夷叔齊碑曰熹平五年天下大旱禱請名山求獲答應時處士平陽蘇騰字𤣥成夢陟首陽有神馬之使在道明覺而思之以其夢陟狀上聞天子開三府請雨使者與郡縣户曹掾吏登山升祠手書要曰君況我聖主以洪澤之福天尋興雲即降甘雨也六年夏旱光和五年夏旱六年夏旱是時常侍黄門僭作威福獻帝興平元年秋長安旱是時李傕郭氾専權縱肆獻帝起居注曰建安十九年夏四月旱更始時南陽有童謡曰諧不諧在赤眉得不得在河北是時更始在長安世祖為大司馬平定河北更始大臣並僭専權故謡妖作也後更始遂為赤眉所殺是更始之不諧在赤眉也世祖自河北興世祖建武六年蜀童謡曰黄牛白腹五銖當復是時公孫述僭號於蜀時人竊言王莽稱黄述欲繼之故稱曰五銖漢家貨明當復也述遂誅滅王莽末天水童謡曰出吳門望緹羣見一蹇人言欲上天令天可上地上安得民時隗囂初起兵於天水後意稍廣欲為天子遂破滅囂少病蹇吳門冀郭門名也緹羣山名也順帝之末京都童謡曰直如弦死道邊曲如鉤反封侯案順帝即位孝質短祚大将軍梁冀貪樹疏幼以為已功專國號令以贍其私大尉李固以為清河王雅性聰明敦詩悦禮加又屬親立長則順置善則固而冀建白太后策免固徴蠡吾侯遂即至尊固是日幽斃于獄暴屍道路而太尉胡廣封安樂鄉侯司徒趙戒厨亭侯司空袁湯安國亭侯云桓帝之初天下童謡曰小麥青青大麥枯誰當穫者婦與姑丈人何在西擊胡吏買馬君具車請為諸君鼓嚨胡案元嘉中涼州諸羌一時俱反南入蜀漢東抄三輔延及并冀大為民害命将出衆每戰常負中國益發甲卒麥多委棄但有婦女穫刈之也吏買馬君具車者言調發重及有秩者也請為諸君鼓嚨胡者不敢公言私咽語桓帝之初京都童謡曰城上烏尾畢逋公為吏子為徒一徒死百乘車車班班入河間河間姹女工數錢以錢為室金為堂石上慊慊舂黄粱梁下有懸鼓我欲擊之丞卿怒案此皆謂為政貪也城上烏尾畢逋者處高利獨食不與下共謂人主多聚斂也公為吏子為徒者言蠻夷将畔逆父既為軍吏其子又為卒徒徃擊之也一徒死百乘車者言前一人徃討胡既死矣後又遣百乘車徃臣昭曰志家此釋豈未盡乎徃徒一死何用百乘其後驗竟為靈帝作此言一徒似斥桓帝帝貴任羣閹參委機政左右前後莫非刑人有同囚徒之長故言寄一徒也且又弟則廢黜身無嗣魁然單獨非一而何百乘車者乃國之君解犢後徴正膺斯數繼以班班尤得以類焉車班班入河間者言上将崩乘輿班班入河間迎靈帝也應劭釋此句云徴靈帝者輪班擁節入河間也河間姹女工數錢一本作妖女以錢為室金為堂者靈帝既立其母永樂太后好聚金以為堂也石上慊慊舂黄粱者言永樂雖積金錢慊慊常若不足使人舂黄粱而食之也梁下有懸鼓我欲擊之丞卿怒者言永樂主教靈帝使賣官受錢所禄非其人天下忠篤之士怨望欲擊懸鼓以求見丞卿主鼓者亦復諂順怒而止我也桓帝之初京都童謡曰游平賣印自有平不辟豪賢及大姓案到延熹之末鄧皇后以譴自殺乃以竇貴人代之其父名武字游平拜城門校尉及太后攝政為大将軍與太傅陳蕃合心戮力惟德是建印綬所加咸得其人豪賢大姓皆絶望矣桓帝之末京都童謡曰茅田一頃中有井四方纎纎不可整嚼復嚼今年尚可後年鐃風俗通作譊案易曰拔茅茹以其彚征吉茅喻羣賢也井者法也于時中常侍管霸蘇康憎疾海内英哲與長樂少府劉囂大常許永尚書柳分袁山松書曰柳分權豪之黨為范滂所奏者尋穆史佟佟後亦為司隸應劭曰史佟左官媮進者也司隸唐珍等代作脣齒河内牢川詣闕上書汝潁南陽上采虛譽專作威福甘陵有南北二部三輔尤甚由是博考黄門北寺始見廢閣茅田一頃者言羣賢衆多也中有井者言雖阨窮不失其法度也四方纎纎不可整者言姦慝大熾不可整理嚼復嚼者京都飲酒相强之辭也言食肉者鄙不恤王政徒耽宴飲歌呼而已也今年尚可者言但禁錮也後年鐃者陳竇被誅天下大壞桓帝之末京都童謡曰白蓋小車何延延河間來合諧河間來合諧案解犢亭屬饒陽河間縣也臣昭案郡國志饒陽本屬涿後屬安平靈帝既是河間王曾孫謡言自是有徴無俟明河間之縣為騐居無幾何而桓帝崩使者與解犢侯皆白蓋車從河間來延延衆貌也是時御史劉儵建議立靈帝以儵為侍中中常侍侯覽畏其親近必當間已白拜儵泰山太守因令司隸廹促殺之朝廷少長思其功效乃抜用其弟郃致位司徒此為合諧也靈帝之末京都童謡曰侯非侯王非王千乘萬騎上北芒案到中平六年史侯登躡至尊獻帝未有爵號為中常侍叚珪等數十人所執公卿百官皆隨其後到河上乃得來還此為非侯非王上北芒者也英雄記曰京師謡歌咸言河臘叢進獻帝臘日生也風俗通曰烏臘鳥臘案逆臣董卓滔天虐民窮凶極惡闗東舉兵欲共誅之轉相顧望莫肯先進處處停兵數十萬若烏臘蟲相隨横取之矣靈帝中平中京都歌曰承樂世董逃遊四郭董逃䝉天恩董逃帶金紫董逃行謝恩董逃整車騎董逃垂欲發董逃與中辭董逃出西門董逃瞻宮殿董逃望京城董逃日夜絶董逃心推傷董逃楊孚卓傳曰卓改為董安案董謂董卓也言雖跋扈縱其殘暴終歸逃竄至於滅族也風俗通曰卓以董逃之歌主為已發大禁絕之死者千數靈帝之末禮樂崩壊賞刑失中毁譽無驗競飾偽服以盪典制遠近翕然咸名後生放聲者為時人有識者竊言舊曰世人次曰俗人今更曰時人此天促其期也其間無㡬天下大壞也獻帝踐阼之初京師童謡曰千里草何青青十日卜不得生案千里草為董十日卜為卓凡别字之體皆從上起左右離合無有從下發端者也今二字如此者天意若曰卓自下摩上以臣陵君也青青者暴盛之貌也不得生者亦旋破亡獻帝初童謡曰燕南垂趙北際中央不合大如礪唯有此中可避世公孫瓚以為易地當之遂徙鎮焉乃修城積榖以待天下之變建安三年袁紹攻瓚瓚大敗縊其姊妹妻子引火自焚紹兵趣登臺斬之初瓚破黄巾殺劉虞乘勝南下侵據齊地雄威大振而不能開廓遠圖欲以堅城觀時坐聽圍戮斯亦自易地而去世也建安初荆州童謡曰八九年間始欲衰至十三年無孑遺言自中興以來荆州無破亂及劉表為牧又豐樂至此逮八九年當始衰者謂劉表妻當死諸将並零落也十三年無孑遺者言十三年表又當死民當移詣冀州也干寶搜神記曰是時華容有女子忽啼呼云有大喪言語過差縣以為妖言繫獄百餘日忽於獄中哭曰劉荆州今日死華容去州數日即遣馬吏驗視表果死縣乃出之續又歌吟曰不意李立為貴人後無幾曹公平荆州以涿郡李立字建賢為荆州刺史順帝陽嘉元年十月中望都蒲隂狼殺童兒九十七人時李固對䇿引京房易傳曰君将無道害将及人去之深山全身厥災狼食人陛下覺寤比求隠滯故狼災息東觀書曰中山相朱遂到官不出奉祠北嶽詔曰災暴縁類符驗不虛政失厥中狼災為應至乃殘食孩幼朝廷愍悼思惟咎徴博訪其故山嶽尊靈國所望秩而遂比不奉祠怠慢廢典不務懇惻淫刑放濫害加孕婦毒流未生感和致災其詳思改救追復所失有不遵憲舉正以聞靈帝建寧中羣狼數十頭入晉陽南城門囓人袁山松書曰光和三年正月虎見平樂觀又見憲陵上囓衞士蔡邕封事曰政有苛暴則虎狼食人後漢書卷二十三後漢書卷二十三考證五行志一拜故司徒韓寅為司𨽻校尉寅當作演冲帝永嘉元年嘉當作熹言自中興以來何焯校本興改平後漢書卷二十三考證
