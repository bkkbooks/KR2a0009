body:
  text: 後漢書卷一百宋宣城太守范煜撰唐章懐太子賢注鄭孔荀列傳第六十鄭太傳鄭太字公業河南開封人司農衆之曽孫也開封縣故城在今汴州南少有才畧靈帝末知天下將亂隂交結豪桀家富於財有田四百頃而食常不足名聞山東初舉孝廉三府辟公車徴皆不就及大將軍何進輔政徴用名士以公業為尚書侍郎續漢志曰尚書凡六曹侍郎三十六人四百石一曹有六人主作文書起草遷侍御史進將誅閹宦欲召并州牧董卓為助公業謂進曰董卓彊忍寡義志欲無猒若借之朝政授以大事借音子夜反將恣凶慾必危朝廷明公以親徳之重據阿衡之權秉意獨斷誅除有罪誠不宜假卓以為資援也且事㽞變生殷鍳不逺又為陳時務之所急數事進不能用乃棄官去謂潁川人荀攸曰何公未易輔也進尋見害卓果作亂公業等與侍中伍瓊卓長史何顒共說卓以袁紹為勃海太守以發山東之謀及義兵起卓乃㑹公卿議大發卒討之羣僚莫敢忤旨公業恐其衆多益横凶彊難制獨曰夫政在徳不在衆也卓不悅曰如卿此言兵為無用邪公業懼乃詭詞更對曰詭猶詐也非謂無用以為山東不足加大兵耳如有不信試為明公畧陳其要今山東合謀州郡連結人庻相動非不强盛然光武以来中國無警百姓優逸忘戰日久仲尼有言不教人戰是謂棄之其衆雖多不能為害一也明公出自西州少為國將閑習軍事數踐戰塲名振當世人懐懾服二也袁本初公卿子弟生處京師張孟卓東平長者孟卓名邈坐不闚堂言不妄視也孔公緒孔伷清談髙論噓枯吹生枯者噓之使生生者吹之使枯言談論有所抑揚也並無軍旅之才執銳之幹臨鋒決敵非公之儔三也山東之士素之精悍悍勇也未有孟賁之勇慶忌之㨗說苑曰孟賁水行不避蛟龍陸行不避虎狼發怒吐氣聲響動天許慎注淮南子曰孟賁衛人也吕氏春秋曰孟賁過河先於其伍船人怒以楫虓其頭不知其孟賁故也中河孟賁瞋目視船人髮植目裂舡中人盡播入河慶忌吴玉僚子也射之矢滿把不能中駟馬追之不能及聊城之守史記燕將攻下聊城因保守之齊將田單攻之嵗餘不下良平之謀可任以偏師責以成功四也就有其人而尊卑無序王爵不加若恃衆怙力怙亦恃也將各基峙峙止也劉攽曰案文基當作棊謂如棊不動作基無理以觀成敗不肯同心共膽與齊進退五也闗西諸郡頗習兵事自頃以来數與羌戰婦女猶戴㦸操矛挟弓負矢挟持也況其壯勇之士以當妄戰之人乎其勝可必六也且天下彊勇百姓所畏者有并涼之人劉攽曰案文多一有字緣者字生之及匈奴屠各湟中義從西羌八種義從八種並見西羌傳而明公擁之以為爪牙譬驅虎兕以赴犬羊七也又明公將帥皆中表腹心周旋日久恩信淳著忠誠可任智謀可恃以膠固之衆膠亦固也當解合之埶猶以烈風掃彼枯葉八也夫戰有三亡以亂攻理者亡以邪攻正者亡以逆攻順者亾今明公秉國平正討滅宦豎忠義克立以此三徳待彼三亾奉辭伐罪誰敢禦之九也東州鄭𤣥學該古今𤣥北海人故云東州北海邴原清髙直亮魏志原字根矩北海朱虛人也與管寧俱以􅋵尚稱皆儒生所仰羣士楷式彼諸將若詢其計畫足知彊弱且燕趙齊梁非不盛也終滅於秦吳楚七國非不衆也卒敗滎陽前書吴王濞楚王戊趙王遂淄川王賢濟南王辟光膠西王印膠東王雄渠景帝三年反大將軍條侯周亞夫將兵破之滎陽况今徳政赫赫股肱惟良彼豈讚成其謀造亂長寇哉其不然十也若其所陳少有可採無事徴兵以驚天下使患役之民相聚為非棄徳恃衆自虧威重卓乃悦以公業為將軍使統諸軍討擊闗東或說卓曰鄭公業智畧過人而結謀外寇今資之士馬就其黨與竊為明公懼之卓乃收還其兵留拜議郎卓既遷都長安天下饑亂士大夫多不得其命而公業家有餘資日引賔客髙㑹倡樂所膽救者甚衆乃與何顒荀攸共謀殺卓事洩顒等被執公業脫身自武闗走東歸袁術術上以為揚州刺史未至官道卒年四十二孔融傳孔融字文舉魯國人孔子二十世孫也七世祖霸為元帝師位至侍中前漢霸字次儒元帝師觧見孔昱傳父伷太山都尉融幼有異才融家傳曰兄弟七人融第六幼有自然之性年四嵗時每與諸兄共食梨融輒引小者大人問其故答曰我小兒法當取小者由是宗族竒之年十嵗隨父詣京師時河南尹李膺膺潁川襄城人融家傳曰聞漢中李公清節直亮意慕之遂造公門李固漢中人為太尉與此傳不同也以簡重自居不妄接士賔客𠡠外自非當世名人及與通家皆不得白融欲觀其人故造膺門語門者曰我是李君通家子弟門者言之膺請融問曰髙明祖父甞與僕有恩舊乎融曰然先君孔子與君先人李老君同徳比義而相師友家語曰孔子謂南宫敬叔曰吾聞老𣆀博古而逹今通禮樂之源明道徳之歸即吾之師也今將往矣遂至周問禮於老𣆀焉則融與君累世通家衆坐莫不歎息太中大夫陳煒後至煒音于匭反坐中以告煒煒曰夫人小而聰了大未必竒融應聲曰觀君所言將不早慧乎膺大笑曰髙明必為偉器年十三䘮父哀悴過毁扶而後起州里歸其孝性好學博渉多該覽山陽張儉為中常侍侯覽所怨覽為刋章下州郡以名捕儉刋削也謂削去告人姓名劉攽曰正文案覽何能刋章下州郡葢是詔字張儉傳中可見也儉與融兄襃有舊亡抵於襃不遇抵歸也融家傳襃字文禮也時融年十六儉少之而不告融見其有窘色窘迫也謂曰兄雖在外吾獨不能為君主邪因留舍之舍止也後事泄國相以下密就掩捕儉得脱走遂并收襃融送獄二人未知所坐融曰保納舍藏者融也當坐之襃曰彼来求我非弟之過請甘其罪吏問其母母曰家事任長妾當其辜一門爭死郡縣疑不能決乃上讞之前書音義曰讞請也音宜傑反詔書竟坐襃焉融由是顯名與平原陶邱洪陳留邉譲齊聲稱州郡禮命皆不就辟司徒楊賜府時隠覈官僚之貪濁者將加貶黜融多舉中官親族尚書畏迫内寵召掾屬詰責之融陳對罪惡言無阿撓撓曲也音乃孝反河南尹何進當遷為大將軍楊賜遣融奉謁賀進不時通融即奪謁還府投劾而去河南官屬恥之私遣劍客欲追殺融客有言於進曰孔文舉有重名融家傳曰客言於進曰孔文舉於時英雄特傑譬諸物類猶衆星之有北辰百榖之有黍稷天下莫不屬目也將軍若造怨此人則四方之士引領而去矣不如因而禮之可以示廣於天下進然之既拜而辟融舉髙第為侍御史與中丞趙舍不同託病歸家後辟司空掾拜中軍候劉攽曰案漢官無中軍候唯有北軍中候耳明字有脱誤也在職三日遷虎賁中郎將㑹董卓廢立融每因對答輒有匡正之言以忤卓旨轉為議郎時黄巾寇數州而北海最為賊衝卓乃諷三府同舉融為北海相融到郡收合士民起兵講武馳檄飛翰引謀州郡賊張饒等羣軰二十萬衆從冀州還融逆擊為饒所敗乃收散兵保朱虛縣稍復鳩集吏民為黄巾所誤者男女四萬餘人更置城邑立學校表顯儒術薦舉賢良鄭𤣥彭璆邴原等璆音巨秋反又音求郡人甄子然臨孝存知名早卒融恨不及之乃命配食縣社其餘雖一介之善莫不加禮焉郡人無後及四方㳺士有死亡者皆為棺具而歛葬之時黄巾復来侵暴融乃出屯都昌都昌縣屬北海郡故城在今青州臨昫縣東北為賊管亥所圍融逼急乃遣東莱太史慈求救於平原相劉備吴志慈字子義東莱人也避事之遼東北海相孔融聞而竒之數遣人訊問其母并致餉遺時融為管亥所圍慈從遼東還母謂之曰汝與孔北海未甞相見至汝行後贍恤殷勤過於故舊今為賊所圍汝宜赴之慈單歩見融既而求救於劉備得兵以解圍焉備驚曰孔北海乃復知天下有劉備邪即遣兵三千救之賊乃散走時袁曹方盛而融無所協附左丞黄祖者稱有意謀勸融有所結納融知紹操終圖漢室不欲與同故怒而殺之融負其髙氣志在靖難而才踈意廣迄無成功迄竟也在郡六年劉備表領青州刺史建安元年為袁譚所攻自春至夏戰士所餘裁數百人流矢雨集戈矛内接融隠几讀書隠憑也莊子曰南郭子綦隠几而坐談笑自若城夜䧟乃奔山東妻子為譚所虜及獻帝都許徴融為將作大匠遷少府每朝㑹訪對融輒引正定議公卿大夫皆𨽻名而已說文云𨽻附著初太傅馬日磾奉使山東及至淮南數有意於袁術術輕侮之遂奪取其節求去又不聽因欲逼為軍師日磾深自恨遂嘔血而斃三輔決錄曰日磾字翁叔馬融之族子少傳融業以才學進與楊彪盧植蔡邕等典校中書歴位九卿遂登台輔厭帝春秋曰術從日磾借節觀之因奪不還條軍中十餘人使促辟之日磾謂術曰卿先代諸公辟士云何而言促之謂公府掾可劫得乎從術求去而術不遣既以失節屈辱憂恚及䘮還朝廷議欲加禮融乃獨議曰日磾以上公之尊秉髦節之使銜命直指直指無屈撓也前書有錦衣直指寧輯東夏輯和也而曲媚姦臣為所牽率章表署用輒使首名所上章表及署補用皆以日磾名為首也附下罔上前書曰附下罔上者刑姦以事君左傳叔向曰姦以事君者吾所能禦昔國佐當晉軍而不撓公羊傳曰鞌之戰齊師大敗齊侯使國佐如師郤克曰與我紀侯之甗及魯衛之侵地使耕者東西其畆以蕭同叔子為質則吾舍子國佐曰與我紀侯之甗請諾使反魯衛之侵請諾使耕者東西其畆是則土齊也蕭同叔子者齊君母也齊君母猶晉君之母也曰不可請戰一戰而不勝請再戰再戰而不勝請三戰三戰而不勝則齊國盡子之有也何必蕭同叔子為質揖而去之劉攽曰注及魯衛之侵地使耕者東西其畆又云使反魯衛之侵請諾使耕者東西其畆案公羊本文及當作反又但云東其畆多西字下文又多一使字却少一地字及多一西字宜僚臨白刃而正色楚白公勝欲為亂謂石乞曰王卿士皆以五百人當之則可乞曰不可得也曰市南有熊相宜僚者若得之可以當五百人矣乃從白公而見之與言悦告之故辭承之以劍不動事見左傳王室大臣豈得以見脅為辭又袁術僣逆非一朝一夕日磾隨從周旋歴歳漢律與罪人交闗三日已上皆應知情春秋魯叔孫得臣卒以不發揚襄仲之罪貶不書日公羊傳曰叔孫得臣卒何休注曰不日者知公子遂欲殺君而為人臣知賊而不言明當誅也公子遂即襄仲也鄭人討幽公之亂斵子家之棺左傳鄭子家卒鄭人討幽公之亂斵子家之棺而逐其族杜預注曰斵薄其棺不使從卿禮為其殺君故也聖上哀矜舊臣未忍追案不宜加禮朝廷從之而論者多欲復肉刑融乃建議曰古者敦龎善否不别左傳楚申叔時曰人生敦龎杜預注龎厚大也吏端刑清端直也政無過失百姓有罪皆自取之末世陵遲風化壊亂政撓其俗法害其人故曰上失其道民散久矣而欲䋲之以古刑投之以殘棄殘其支體而棄廢之非所謂與時消息者也易曰天地盈虛與時消息紂斮朝渉之脛天下謂為無道尚書曰紂斮朝涉之脛孔安國注曰冬日見朝渉水者謂其脛耐寒斮而視之夫九牧之地千八百君前書賈山曰昔者周葢千八百國以九州之人養千八百君也若各刖一人是下常有千八百紂也劉攽曰案文少一天字求俗休和弗可得已且被刑之人慮不全生志在思死類多趨惡莫復歸正夙沙亂齊左傳曰靈公廢太子光立公子牙使髙厚傅牙夙沙衛為少傅崔杼逆光而立之是為莊公莊公以夙沙衛易已衛奔髙唐以叛伊戾禍宋左傳楚客聘于晉過宋太子座知之請野享之公使往伊戾請從遣之至則坎用牲加書徴之馳而告曰太子將為亂既與楚客盟矣公使視之則信有焉公囚太子太子縊死公徐聞其無罪乃烹伊戾趙髙英布為世大患史記胡亥謂李斯曰髙故宫人也遂專信任之後殺李斯刼殺胡亥卒亡秦也前書黥布坐法黥論輸驪山亡之江中為羣盜及屬項羽常為先鋒䧟陣後歸漢為九江王謀反誅之不能止人遂為非也適足絶人還為善耳雖忠如鬻拳左傳初鬻拳彊諫楚子弗從臨之以兵懼而從之拳曰吾懼君以兵罪莫大焉遂自刖楚人以為大閽君子曰鬻拳可謂爱君矣諫以自納於刑刑猶不忘納君於善信如卞和韓子曰楚人和氏得璞玉於楚山之中獻之武王武王使玉人相之曰石也王以和為謾已刖其左足及文王即位和又奉其璞玉人又曰石也又刖其右足文王薨成王即位和乃抱其璞而哭於楚山之下三日三夜泣盡而繼以血王使玉人攻璞而得寳焉荆王封和為陵陽侯和辭不就而去乃作怨歌琴操曰進寳得刑足離分兮去封立信守休芸兮斷者不續豈不寃兮智如孫臏史記孫臏與龎涓學兵法涓事魏惠王為將軍自以不能及臏隂使召臏斷其兩足而黥之臏後入齊威王問兵法以為師魏與趙攻韓齊使田忌將而往龎涓聞去韓而歸臏謂田忌曰三晉之兵素悍勇而輕齊軍半至使齊軍入魏地為十萬竈明日為五萬竈明日為二萬竈龎涓行三日大喜曰我固知齊卒怯入吾地三日士卒亡者過半矣乃棄其歩兵與其輕銳倍日并行逐之孫子度其行暮當至馬陵馬陵道狭旁多險阻可伏兵乃斫大樹白而書之曰龎涓死於此木下於是令齊軍曰善射者萬弩夹道而伏期日暮見火舉而俱發涓夜至斫木下見白書乃攅火燭之讀書未畢齊軍萬弩俱發魏軍大亂相失龎涓自知智窮兵敗遂自剄曰遂成豎子之名矣劉攽曰注軍半至案史記彼文更有他語故末云軍半至今既節取不宜長此三字又令齊軍曰善射案文多一曰字寃如巷伯毛萇注詩云巷伯内小臣也掌王后之命於宫中故謂之巷伯伯被䜛將刑寺人孟子傷而作詩以刺幽王也才如史遷李陵為匈奴敗馬遷明陵當必立功以報漢遂被下蠶室宫刑後乃著史記逹如子政劉向字子政宣帝時上言黄金可成上令典尚方鑄作事費甚多方不驗乃下吏當死上竒其才得踰冬減論班固云向博物洽聞通逹古今一離刀鋸没世不齒國語中刑用刀鋸也是太甲之思庸尚書太甲既立不明伊尹放諸桐三年復歸于亳思庸孔注曰念常道也穆公之霸秦秦穆使孟明白乙等伐鄭蹇叔諫不從晉襄公敗諸崤囚孟明等後歸之穆公曰孤之罪也夫子何罪復使為政遂霸西戎事見左傳南雎之骨立衛武之初筵韓詩曰賓之初筵衛武公飲酒悔過也言賓客初就筵之時賔主秩秩然俱謹敬也賓既醉止載號載呶不知其為悪也陳湯之都賴前書湯字子公遷西域副校尉矯制發諸國兵斬郅支單于於都賴水上魏尚之守邉文帝時尚為靈中守坐上首虜差六級下吏削爵趙人馮唐為郎為言文帝赦尚復為雲中守也無所復施也漢開改惡之路凡為此也故明徳之君逺度深惟棄短就長不茍革其政者也朝廷善之卒不改焉是時荆州牧劉表不供職貢多行僣偽遂乃郊祀天地擬斥乗輿斥指也詔書班下其事融上疏曰竊聞領荆州牧劉表桀逆放恣所為不軌至乃郊祭天地擬儀社稷雖昏僣惡極罪不容誅至於國體宜且諱之體謂國家之大體也何者萬乗至重天王至尊身為聖躬國為神器老子曰天下神器不可為也陛級縣逺祿位限絶賈誼曰人主之尊譬如堂羣臣如陛衆庶如地故陛乃九級上廉逺地則髙堂也猶天之不可階日月之不可踰也論語曰夫子之不可及也猶天之不可階而升也又曰仲尼如日月無得而踰焉每有一豎臣輒去圖之若形之四方非所以杜塞邪萌形見也愚謂雖有重戾必宜隐忍賈誼所謂擲䑕忌器盖謂此也前書賈誼曰里諺云欲投䑕而忌器此善諭也鼠近於器尚惮不投恐傷其器况乎貴臣之近主乎是以齊兵次楚唯責包茅左傳齊桓伐楚責以包茅不入王祭不供無以縮酒杜預注曰包裹束也茅菁茅也束茅而灌之以酒為縮酒也王師敗績不書晉人公羊傳成公元年秋王師敗績于眢戎孰敗之葢晉敗之曷為不言晉敗之王者無敵莫敢當也前以露袁術之罪今復下劉表之事是使跛牂欲闚髙岸天險可得而登也史記李斯曰故城髙五丈而樓季不輕犯也太山之髙百仞而跛牂牧其上矣樓季而難五丈之限豈跛牂而易百仞之髙哉峭漸之勢異也爾雅曰羊牝曰牂易曰天險不可升地險山川丘陵也案表䟦扈擅誅列侯遏絶詔命斷盜貢篚鄭𤣥注儀禮曰篚竹器如筐也書曰厥篚𤣥纁璣組招呼元惡以自營衛專為羣逆主萃淵藪書曰今商王受亡道為天下逋逃主萃淵藪孔注曰天下罪人逃亡者而紂為魁主窟聚泉府藪澤也郜鼎在廟章孰甚焉左傳取郜大鼎于宋戊申納于太廟臧哀伯諫曰君人者昭徳塞違以臨照百官百官於是乎戒懼郜鼎在廟彰孰甚焉郜鼎郜國所作也桑落瓦觧其埶可見詩曰桑之落矣其黄而隕臣愚以為宜隐郊祀之事以崇國防五年南陽王馮東海王祗薨並獻帝子帝傷其早殁欲為修四時之祭以訪於融融對曰聖恩敦睦感時増思悼二王之靈發哀愍之詔稽度前典以正禮制竊觀故事前梁懐王臨江愍王齊哀王臨淮懐王並薨無後同産昆弟即景武昭明四帝是也梁懐王相景帝弟也立十年薨臨江愍王榮武帝兄也為皇太子四嵗廢為王坐侵廟壖地自殺齊懐王閎武帝子昭帝異母兄立八年薨臣賢案齊哀王悼恵王之子髙帝之孫非昭帝兄弟當為懐王作哀者誤也臨淮公衡明帝弟建武十五年立未及進爵為王而薨融家傳及本傳皆作公此為王者亦誤也未聞前朝修立祭祀若臨時所施則不列傳紀臣愚以為諸在沖齓聖慈哀悼禮同成人加以號謚者宜稱上恩稱音尺證反祭祀禮畢而後絶之至於一嵗之限不合禮意又違先帝已然之法所未敢處處猶安也初曹操攻屠鄴城袁氏婦子多見侵畧而操子丕私納袁熙妻甄氏袁紹傳熙紹之中子也甄氏中山無極人漢太保甄邯後也父逸上蔡令魏畧曰熙出在幽州甄氏侍姑及鄴城破文帝入紹舍后怖伏姑膝上帝令舉頭就視見其顔色非凡太祖聞其意為迎取之融乃與操書稱武王伐紂以妲己賜周公妲音丁末反又音旦紂之妃有蘇氏女也紂用其言毒虐衆庶武王剋殷斬妲己頭縣之於小白旗以為紂之亡由此女也出列女傳操不悟後問出何經典對曰以今度之想當然耳後操討烏桓建安十三年也又嘲之曰大將軍逺征蕭條海外昔肅慎氏不貢楛矢國語曰昔武王剋商通于九夷百蠻於是肅慎氏貢楛矢石砮其長尺有咫肅慎國記曰肅慎氏其地在夫餘國北東濱大海魏畧曰挹婁一名肅慎氏說文曰楛木也今遼左有楛木狀如荆葉如榆也丁零盜蘇武牛羊可并案也山海經曰北海之内有丁零之國前書蘇武使匈奴單于徙北海上丁零盜蘇武牛羊武遂窮戹也時年飢兵興操表制酒禁融頻書爭之多侮慢之辭融集與操書云酒之為徳久矣古先哲王類帝禋宗和神定人以濟萬國非酒莫以也故天垂酒星之耀地列酒泉之郡人著㫖酒之徳堯不千鍾無以建太平孔非百觚無以堪上聖樊噲解戹鴻門非豕肩鍾酒無以奮其怒趙之厮養東迎其王非引巵酒無以激其氣髙祖非醉斬白蛇無以暢其靈景帝非醉幸唐姬無以開中興袁盎非醇醪之力無以脫其命定國不酣飲一斛無以決其法故酈生以髙陽酒徒著功於漢屈原不餔糟歠醨取困於楚由是觀之酒何負於政哉又書曰昨承訓答陳二代之禍及衆人之敗以酒亡者實如来誨雖然徐偃王行仁義而亡今令不絶仁義燕噲以讓失社稷今令不禁謙退魯因儒而損今令不棄文學夏商亦以婦人失天下今令不斷婚姻而將酒獨急者疑但惜糓耳非以亡王為戒也既見操雄詐漸著數不能堪故發辭偏宕多致乖忤偏邪跌宕不拘正理又甞奏宜凖古王畿之制千里寰内不以封建諸侯周禮方千里曰國畿其外五百里侯畿鄭𤣥注畿限也操疑其所論建漸廣益憚之然以融名重天下外相容忍而潜忌正議慮鯁大業山陽郗慮續漢書慮字鴻豫山陽髙平人少受學於鄭𤣥虞浦江表傳曰獻帝甞時見慮及少府孔融問融曰鴻豫何所優長融曰可與適道未可與權慮舉笏曰融昔宰北海政散人流其權安在遂與融互相長短以至不穆曹操以書和解之慮從光祿勲遷御史大夫劉攽曰注獻帝嘗時見慮案文時當作特承望風旨以㣲法奏免融官因顯明讎怨操故書激厲融曰葢聞唐虞之朝有克讓之臣尚書曰舜以伯禹為司空禹讓稷契暨臯陶以益為朕虞益讓于朱虎熊羆以伯夷為秩宗伯夷讓于夔龍故麟鳳来而頌聲作也史記曰於是禹興九韶之樂致異物鳳皇来儀後世徳薄猶有殺身為君若齊孟陽代君居牀以待賊西漢紀信乗黄屋誑楚之類也破家為國若要離焚妻子以徇吴李通誅宗族以從漢之類也及至其敝睚眦之怨必讎一餐之惠必報史記范雎一餐之徳必償睚眦之怨必報故鼂錯念國遘禍於袁盎景帝時錯為御史大夫以諸侯國大請削其土吴楚七國反以誅錯為名袁盎素與錯不相善盎乃進說請斬錯以謝七國景帝遂斬錯也屈原悼楚受譛於椒蘭屈平楚懐王時為三閭大夫秦昭王使張儀譎詐懐王令絶齊交又誘請㑹武闗平諫王不聽其言卒客死於秦懐王子子椒子蘭䜛之於襄王而放逐之見史記彭寵傾亂起自朱浮朱浮與寵不相能數譛之光武寵遂反鄧禹威損失於宗馮鄧禹征赤眉令宗欽馮愔守栒邑二人爭權相攻遂殺欽因反擊禹今流俗本宗誤作宋也由此言之喜怒怨愛禍福所因可不慎與音余昔廉藺小國之臣猶能相下趙惠文王與秦昭王㑹黽池歸拜藺相如為上卿位在亷頗右頗曰吾不忍為之下必辱之相如每朝常避之頗聞之肉袒負荆謝之相與為刎頸之交事見史記寇賈倉卒武夫屈節崇好光武不問升伯之怨齊侯不疑射鉤之虜公子紏與桓公争立管仲射桓公中鈎後桓公即位以管仲為相也夫立大操者豈累細故哉往聞二君有執法之平以為小介介猶蔕芥也公法雖平私情為蔕芥者也當收舊好而怨毒漸積志相危害聞之憮然中夜而起憮音舞憮失意貌也昔國家東遷文舉盛歎鴻豫名實相副綜逹經學出於鄭𤣥又明司馬法史記齊威王使大夫追論古者司馬法其法論田及兵之法也鴻豫亦稱文舉竒逸博聞誠怪今者與始相違孤與文舉既非舊好又於鴻豫亦無恩紀然願人之相羙不樂人之相傷是以區區思協歡好又知二君羣小所搆孤為人臣進不能風化海内退不能建徳和人然撫養戰士殺身為國破浮華交㑹之徒計有餘矣融報曰猥惠書教猥曲也告所不逮融與鴻豫州里比鄰山陽與魯郡相鄰比知之最早雖甞陳其功羙欲以厚於見私信於為國不求其覆過掩惡有罪望不坐也前者黜退懽欣受之昔趙宣子朝登韓厥夕被其戮喜而求賀宣子趙盾謚也國語曰宣子言韓厥於靈公以為司馬河曲之役趙宣子使人以其乗車干行韓厥執而戮之衆咸曰韓厥必不沒矣其主朝升之而暮戮其車其誰安之宣子召而禮之謂諸大夫曰二三子可以賀我矣吾舉厥也中吾乃今知免於罪矣况無彼人之功而敢枉當官之平哉忠非三閭即屈原也掌王族三姓曰昭屈景故曰三閭智非鼂錯竊位為過免罪為幸乃使餘論逺聞所以慙懼也朱彭寇賈為世壯士愛惡相攻能為國憂至於輕弱薄劣猶昆蟲之相囓適足還害其身夏小正云昆衆也孫卿子曰昆蟲亦有知誠無所至也晉侯嘉其臣所爭者大而師曠以為不如心競左傳秦伯之弟鍼如晉脩成叔向命召行人子員行人子朱曰朱也當御三云叔向不應子朱怒曰班爵同何以黜朱於朝撫劍從之叔向曰秦晉不和乆矣今日之事幸而集晉國頼之不集三軍暴骨子員道二國之言無私子常易之姦以事君者吾所能禦也拂衣從之人救之平公曰晉其庶乎吾臣之所争者大師曠曰公室懼卑臣不心競而力争也性既遲緩與人無傷雖出胯下之負韓信貧賤淮隂少年侮之令信出胯下榆次之辱史記荆軻甞㳺榆次與葢聶論劍葢聶怒而目之荆軻出去不知貶毁之扵已猶蚊虻之過也蚊音文虻音䖟蚊虻之暫過未以為害子産謂人心不相似左傳曰子産謂子皮曰人心不同其如面焉吾豈敢謂子面如吾面乎或矜埶者欲以取勝為榮不念宋人待四海之客大鑪不欲令酒酸也鑪累土為之以居酒瓮四邉隆起一面髙如鍜鑪故名鑪字或作壚韓子曰宋人有沽酒者斗槩甚平遇客甚謹為酒甚羙而酒不售酒酸者怪其故問所知閭長者楊倩二人曰汝狗猛耶曰狗猛何故不售曰人畏焉令孺子懐錢挈壼往沽狗逆齕之酒所以酸而不售至於屈糓巨瓠堅而無竅當以無用罪之耳韓子曰齊有居士田仲宋人屈糓往見之曰糓聞先生之義不待仰人而食今糓有樹瓠之法堅如石厚而無竅願獻先生田仲曰夫子徒謂我也凡貴於樹瓠者為可以盛也今厚而無竅則不可以盛物而任堅如石則不可以割而斟吾無以此瓠為也將棄之今仲不待仰人而食亦無益人國亦堅瓠之類它者奉尊嚴教不敢失墜郗為故吏融所推進趙衰之拔郤縠左傳晉文公謀元帥趙衰曰郤縠可乃使郤縠將中軍不輕公叔之升臣也公叔文子衛大夫其家臣名僎行與文子同升之於公與之並為大夫僎音士眷反見論語知同其愛訓誨發中言曹公與己同愛郗慮故發於中心而訓誨雖懿伯之忌猶不得念禮記檀弓曰滕成公之䘮使子叔敬叔弔子服惠伯為介及郊為懿伯之忌不入惠伯曰政也不可以叔父之私不將公事遂入鄭𤣥注曰懿伯惠伯之叔父也忌怨也况恃舊交而欲自外於賢吏哉賢吏謂慮也輒布腹心脩好如初苦言至意終身誦之嵗餘復拜太中大夫性寛容少忌好士喜誘益後進及退閑職太中大夫職在言議故云閑職賓客日盈其門常歎曰坐上客常滿尊中酒不空吾無憂矣與蔡邕素善邕卒後有虎賁士貎類於邕漢官典職儀曰虎賁中郎將主武賁千五百人融每酒酣引與同坐曰雖無老成人且有典刑詩大雅曰雖無老成人尚有典刑也融聞人之善若出諸已言有可採必演而成之面告其短而退稱所長薦達賢士多所奬進知而未言以為己過故海内英俊皆信服之曹操既積嫌忌而郗慮復搆成其罪遂令丞相軍謀祭酒路粹典畧曰粹字文蔚陳留人少學於蔡邕建安初以髙第擢拜尚書郎後為軍謀祭酒與陳琳阮瑀等典記室融誅之後人覩粹所作無不嘉其才而忌其筆也枉狀奏融曰少府孔融昔在北海見王室不静而招合徒衆欲規不軌云我大聖之後而見滅於宋史記曰魯大夫孟釐子曰孔丘聖人之後滅於宋服䖍注曰聖人謂商湯也孔子六代祖孔父嘉為宋華督所殺其子奔魯也有天下者何必卯金刀及與孫權使語謗訕朝廷訕音所諫反訕謂謗毁也蒼頡篇曰訕非也又融為九列不遵朝議秃巾㣲行謂不加幘唐突宮掖又前與白衣襧衡跌蕩放言跌蕩無儀檢也放縱也云父之於子當有何親論其本意實為情欲發耳子之於母亦復奚為譬如寄物瓶中說文曰瓶缶也字書曰瓶似缶而髙出則離矣既而與衡更相賛揚衡謂融曰仲尼不死融答曰顔囬復生大逆不道宜極重誅書奏下獄棄市時年五十六妻子皆被誅初女年七歳男年九歳以其幼弱得全寄它舍二子方奕棊融被收而不動左右曰父執而不起何也答曰安有巢毁而卵不破乎主人有遺肉汁男渇而飲之女曰今日之禍豈得久活何頼知肉味乎兄號泣而止或言於曹操遂盡殺之及收至謂兄曰若死者有知得見父母豈非至願乃延頸就刑顔色不變莫不傷之初京兆人脂習元升與融相善每戒融剛直魏畧曰曹操為司空威徳日盛融故以舊意書䟽倨傲習常賁融令改節融不從之及被害許下莫敢收者習往撫尸曰文舉舍我死吾何用生為操聞大怒將收習殺之後得赦出魏文帝深好融文辭歎曰楊班儔也募天下有上融文章者輒賞以金帛所著詩頌碑文論議六言䇿文表檄教令書記凡二十五篇文帝以習有欒布之節加中散大夫前書曰欒布梁人也為梁王彭越大夫使於齊未反漢誅越梟首雒陽下布還奏事越頭下祠而哭之論曰昔諫大夫鄭昌有言山有猛獸者藜藿為之不採宣帝時司𨽻校尉葢寛饒以直言得罪鄭昌愍傷寛饒忠直憂國以言事不當意而為文吏所詆挫故上書訟之是以孔父正色不容弑虐之謀公羊傳曰孔父正色而立于朝則人莫敢過而致難於其君者孔父可謂義形於色矣平仲立朝有紓盜齊之望紓音舒解也緩也盜齊謂田常也莊子曰田成子一旦弑齊君而盜其國左傳齊景公坐於路寢公歎曰羙哉室其誰有此乎晏子對曰如君之言其陳氏乎公曰是可若何對曰唯禮可以已之若夫文舉之髙志直情其足以動義槩而忤雄心忤逆也故使移鼎之迹事隔於人存移鼎謂遷漢之鼎也人存謂曹􅋵身在不得簒位也左傳曰桀有昏徳鼎遷于商商紂暴虐鼎遷于周代終之規啓機於身後也代終謂代漢祚之終也身後謂曹丕受禪也夫嚴氣正性覆折而已豈有員园委屈可以每其生哉园即刓字音五丸反前書音義曰刓謂刓團無稜角也每貪也言寧正直以傾覆摧折不能委曲以貪生也賈誼曰品庶每生懔懔焉皜皜焉其與琨玉秋霜比質可也懔懍言勁烈如秋霜也皜皜言堅貞如白玉也皜音古老反荀彧傳荀彧字文若袁宏漢紀彧作郁潁川潁隂人朗陵令淑之孫也朗陵縣屬汝南郡故城在今豫州朗山縣西南父緄為濟南相緄音古本反緄畏憚宦官乃為彧娶中常侍唐衡女典畧曰衡欲以女妻汝南傅公明公明不取轉以妻彧彧以少有才名故得免於譏議南陽何顒名知人見彧而異之曰王佐才也中平六年舉孝廉再遷亢父令亢父縣屬梁國故城在今兗州任城縣南亢音剛父音甫董卓之亂棄官歸郷里同郡韓融時將宗親千餘家避亂密西山中密縣西山也彧謂父老曰潁川四戰之地也四面通也天下有變常為兵衝密雖小固不足以扞大難宜亟避之亟音紀力反郷人多懐土不能去㑹冀州牧同郡韓馥遣騎迎之彧乃獨將宗族從馥留者後多為董卓將李傕所殺畧焉彧比至冀州而袁紹已奪馥位紹待彧以上賓之禮彧明有意數數計數也劉攽曰案文但云明有意數不成文史筆不如此葢有一聰字見漢室崩亂毎懐匡佐之義時曹操在東郡彧聞操有雄畧而度紹終不能定大業初平二年乃去紹從操操與語大恱曰吾子房也比之張良以為奮武司馬時年二十九明年又為操鎮東司馬興平元年操東擊陶謙使彧守甄城縣名屬齊東郡今濮州縣也甄今作鄄音絹任以留事㑹張邈陳宫以兗州反操典畧宫字公臺東郡人剛直烈壯少與海内知名之士皆相連結也而潜迎呂布布既至諸城悉應之邈乃使人譎彧譎詐也曰呂將軍来助曹使君擊陶謙宜亟供軍實彧知邈有變即勒兵設備故邈計不行豫州刺史郭貢率兵數萬来到城下求見彧彧將往東郡太守夏侯惇等止之魏志曰惇字元譲沛國人曰何知貢不與呂布同謀而輕欲見之今君為一州之鎮往必危也彧曰貢與邈等分非素結今来速者計未必定及其猶豫宜時說之縱不為用可使中立不令其有去就也若先懐疑嫌彼將怒而成謀不如往也貢既見彧無懼意知城不可攻遂引而去彧乃使程昱說范東阿魏志昱字仲徳東郡東阿人范縣屬東郡今濮陽縣也東阿縣屬東郡今濟州縣也使固其守卒全三城以待操焉三城謂甄范東阿也二年陶謙死操欲遂取徐州還定呂布彧諫曰昔髙祖保闗中髙祖拒項羽常留蕭何守關中光武據河内皆深根固本以制天下進可以勝敵退足以堅守故雖有困敗而終濟大業將軍本以兖州首事故能平定山東曹操初從東郡守鮑信等迎領兖州牧遂進兵破黄巾等故能平定山東也劉攽曰注東郡守案文少一太字此實天下之要地而將軍之闗河也若不先定之根本將何寄乎宜急分討陳宫使虜不得西顧乗其間而收熟麥約食稸糓以資一舉則呂布不足破也今舍之而東未見其便多留兵則力不勝敵少留兵則後不足固布乗虛寇暴震動人心縱數城或全其餘非復已有則將軍尚安歸乎且前討徐州威罸實行其子弟念父兄之恥必人自為守就能破之尚不可保彼若懼而相結共為表裏堅壁清野以待將軍將軍攻之不拔掠之無獲不出一旬則十萬之衆未戰而自困矣夫事固有棄彼取此以權一時之埶願將軍慮焉操於是大收熟麥復與布戰布敗走因分定諸縣兖州遂平建安元年獻帝自河東還洛陽操議欲奉迎車駕徙都於許衆多以山東未定韓暹楊奉負功恣雎恣雎肆怒貌雎音火季反又火佳反史記盜跖日殺不辜暴戾恣雎未可卒制彧乃勸操曰昔晉文公納周襄王而諸侯景從左傳卜偃言於晉侯曰求諸侯莫如勤王諸侯信之且大義也晉侯以左師逆王王入於王城取太叔於温殺之於隰城遂定覇業天下服從也漢髙祖為義帝縞素而天下歸心項羽殺義帝於郴髙祖為義帝發䘮髙祖大哭發使告諸侯曰天下共立義帝北面事之今項羽放殺義帝大逆無道寡人親為發䘮兵皆縞素自天子䝉塵蒙冐也左傳臧文仲曰天子䝉塵於外敢不奔問官守將軍首唱義兵徒以山東擾亂未遑逺赴雖禦難於外乃心無不在王室尚書曰雖爾身在外乃心無不在王室乃汝也今鑾駕旋軫鄭𤣥注周禮曰軫輿後横木也東京榛蕪義士有存本之思兆人懐感舊之哀誠因此時奉主上以從人望大順也秉至公以服天下大略也扶𢎞義以致英雄大徳也四方雖有逆節其何能為韓暹楊奉安足恤哉若不時定使豪桀生心後雖為慮亦無及矣操從之及帝都許以彧為侍中守尚書令操每征伐在外其軍國之事皆與彧籌焉彧又進操計謀之士從子攸魏志荀攸字公達太祖素聞攸名與語大恱謂彧曰公逹非常人吾得與計事天下當何憂哉及鍾繇郭嘉魏志嘉字奉孝潁川人也戲志才籌畫士也太祖甚器之早卒大祖與彧書曰自志才亡後莫可與計事者汝潁固多竒士誰可以繼之彧薦嘉召見論天下事太祖曰使孤成大業者必此人也陳羣杜襲襲字子緒潁川人荀彧薦襲太祖以為亟相軍謀祭酒魏國建為侍中司馬懿戲志才等懿字仲逹即晉宣帝皆稱其舉唯嚴象為揚州三輔決錄曰象字文則京兆人少聰博有膽智為揚州刺史後為孫䇿廬江太守李術所殺韋康為涼州後並負敗焉康字元將京兆人父端從凉州牧徵為太僕康代為涼州刺史時人榮之後為馬超所圍堅守歴時救軍不至遂為超所殺袁紹既兼河朔之地有驕氣而操敗於張繡魏志張繡在南陽降既而悔之而復反操與戰軍敗為流矢所中紹與操書甚倨陳琳為紹作檄書曰操祖父騰饕餮放横父嵩乞匄攜養操贅閹遺醜並倨慢之詞也操大怒欲先攻之而患力不敵以謀於彧彧量紹雖强終為操所制乃說先取呂布然後圖紹操從之三年遂擒呂布定徐州五年袁紹率大衆以攻許操與相距紹甲兵甚盛議者咸懐惶懼少府孔融謂彧曰袁紹地廣軍彊田豊許攸智計之士為其謀先賢行狀豊字元皓鉅鹿人天姿壊傑權略多竒許攸字子逺審配逄紀盡忠之臣任其事配字正南魏郡人忠烈慷慨有不可犯之色紹領冀州委配腹心之任英雄記曰紀字元圖初紹去董卓與許攸及紀俱詣冀州紹以紀聰逹有計䇿甚信之顔良文醜勇冠三軍綂其兵殆難克乎彧曰紹兵雖多而法不整田豐剛而犯上許攸貪而不正審配專而無謀逄紀果而自用顔良文醜匹夫之勇可一戰而擒也後皆如彧之籌事在袁紹傳操保官度官度即古之鴻溝也於滎陽下引河東南流其所保處在今鄭州中牟縣北官度口是也與紹連戰雖勝而兵糧方盡書與彧議欲還許以致紹師致猶至也兵法曰善戰者致人不致於人彧報曰今糓食雖少未若楚漢在滎陽成臯間也是時劉項莫肯先退者以為先退則埶屈也髙祖與項羽於滎陽成臯間久相持不決後羽請鴻溝以西為漢而退髙祖遂乗羽敗之垓下追殺之公以十分居一之衆言與紹衆寡相懸也畫地而守之言畫地作限隔也鄒陽曰畫地而不敢犯搤其喉而不得進已半年矣搤音厄搤謂捉持之也情見埶竭必將有變此用竒之時不可失也操從之乃堅壁持之遂以竒兵破紹紹退走封彧萬嵗亭侯邑一千戸六年操以紹新破未能為患但欲留兵衛之自欲南征劉表以計問彧彧對曰紹既新敗衆懼人擾今不因而定之而欲逺兵江漢若紹收離紏散紏合也乗虛以出則公之事去矣操乃止九年操拔鄴自領冀州牧有說操宜復置九州者以為冀部所綂既廣則天下易服操將從之彧言曰今若依古制是為冀州所綂悉有河東馮翊扶風西河幽并之地也公前屠鄴城海内震駭各懼不得保其土宇守其兵衆今若一處被侵必謂以次見奪人心易動若一旦生變天下未可圖也願公先定河北然後修復舊京南臨楚郢責王貢之不入天下咸知公意則人人自安須海内大定乃議古制此社稷長久之利也操報曰㣲足下之相難所失多矣遂寢九州議十二年操上書表彧曰昔袁紹作逆連兵官度時衆寡糧單圖欲還許尚書令荀彧深建宜往之便逺恢進討之略恢大也起發臣心革易愚慮堅營固守徼其軍實徼邀也音古堯反遂摧撲大寇濟危以安紹既破敗臣糧亦盡將舍河北之規改就荆南之䇿彧復備陳得失用移臣議故得反斾冀土左傳南轅反斾杜預曰軍門前大旂克平四州謂冀青幽并也向使臣退軍官度紹必鼓行而前鼓行謂鳴鼓而行言無所畏也敵人懐利以自百各規利人百其勇也臣衆怯沮以䘮氣沮止也有必敗之形無一㨗之埶㨗勝也復若南征劉表委棄兗豫飢軍深入踰越江沔沔即漢水也孔安國曰漢上為沔利既難要將失本據而彧建二䇿以亡為存以禍為福謀殊功異臣所不及是故先帝貴指縱之功薄搏獲之賞搏擊也髙祖既殺項羽論功行封以蕭何為最功臣多不服髙祖云諸君知獵乎夫獵追殺獸者狗也而發縱指示獸者人也諸君徒能追得獸耳功狗也至如蕭何發指示功人也縱或作蹤兩通劉攽曰注蕭何發指示案文少一縱字古人尚帷幄之規下攻拔之力張良未甞有獸鬪功髙帝曰運䇿帷幄中決勝千里外子房功也自擇齊三萬戸以封之原其績効足享髙爵而海内未喻其狀所受不侔其功侔等也臣誠惜之乞重平議增疇戸邑前書曰復其後代疇其爵邑音義曰疇等也使其後常與先人等也彧深辭讓操誓之曰昔介子推有言竊人之財猶謂之盜左傳介子推晉文公臣况君竒謨㧞出興亡所係可專有之邪􅋵不專功欲分功於彧也雖慕魯連沖髙之迹史記曰趙欲尊秦為帝魯連止之平原君乃欲封魯連連笑曰所貴於天下之士為人排患釋難解紛而無取也即有取者是商賈之士也而連不忍為也將為聖人逹節之義乎左傳曰聖逹節次守節於是增封千戸并前二千戸又欲授以正司彧先守尚書令今欲正除也彧使荀攸深自陳讓至于十數乃止操將伐劉表問彧所䇿彧曰今華夏以平荆漢知亡矣可聲出宛葉而間行輕進以掩其不意操從之㑹表病死魏志操如彧計表子琮以州逆降十七年董昭等昭字公仁濟隂人也欲共進操爵國公九錫備物禮含文嘉曰九錫一曰車馬二曰衣服三曰樂器四曰朱戸五曰納陛六曰虎賁百人七曰斧鉞八曰弓矢九曰秬鬯謂之九錫錫與也九錫皆如其徳左傳曰分魯公以大輅大旂夏后氏之璜封谷父之繁弱祝宗卜史備物典䇿密以訪彧彧曰曹公本興義兵以匡振漢朝雖勳庸崇著猶秉忠貞之節君子愛人以徳不宜如此事遂寢禮記曰君子之愛人也以徳細人之愛人也以姑息也操心不能平㑹南征孫權表請彧勞軍于譙因表留彧曰臣聞古之遣將上設監督之重下建副二之任史記齊景公以田穰苴為將軍扞燕苴曰臣素卑賤擢之閭伍之中加之大夫之上士卒未附百姓不信權輕願得君之寵臣國之所尊以監軍乃可景公許之使莊賈往即監督之義也所以尊嚴國命謀而鮮過者也左傳曰謀而鮮過恵訓不倦臣今當濟江奉辭伐罪宜有大使肅將王命文武並用自古有之使持節侍中守尚書令萬歳亭侯彧國之重臣徳洽華夏既停軍所次便宜與臣俱進宣示國命威懐醜虜軍禮尚速不及先請臣輒留彧依以為重書奏帝從之遂以彧為侍中光祿大夫持節參丞相軍事至濡須濡須水名也在今和州歴陽縣西南吳錄曰孫權聞操来夹水立塢狀如偃月以相拒月餘乃退彧病留壽春壽春縣屬淮南郡今夀州郡也操饋之食發視之乃空器也於是飲藥而卒時年五十獻帝春秋董承之誅伏后與父完書言司空殺董承帝方為報怨完得書以示彧彧惡之隐而不言完以示其妻弟樊普普封以呈太祖太祖隂為之備彧恐事覺欲自發之因求使至鄴勸太祖以女配帝太祖曰今朝廷有伏后吾女何得配上彧曰伏后無子性又凶邪往甞與父書言辭醜惡可因此廢也太祖曰卿昔何不道之彧陽驚曰昔已甞為公言也太祖曰此豈小事而吾忘之太祖以此恨彧而外含容之至董昭建魏公議彧意不同欲言之於太祖乃齎璽書犒軍飲享禮畢彧請間太祖知彧欲言揖而遣之遂不得留之卒於夀春帝哀惜之祖日為之廢讌樂祖日謂祭祖神之日因為讌樂也風俗通曰共工氏之子曰修好逺遊祀以為祖神漢以午日祖謚曰敬侯明年操遂稱魏公云論曰自遷帝西京山東騰沸詩曰百川沸騰天下之命倒懸矣趙岐注孟子曰倒懸猶困苦也荀君乃越河冀間闗以從曹氏間闗猶展轉也察其定舉措立言䇿措置也崇明王略以急國艱豈云因亂假義以就違正之謀乎言彧本心不背漢也誠仁為己任期紓人於倉卒也紓緩也音舒及阻董昭之議以致非命豈數也夫世言荀君者通塞或過矣常以為中賢以下道無求備智筭有所研疎原始未必要末斯理之不可全詰者也夫以衛賜之賢一說而斃兩國兩國謂齊與吳也端木賜字子貢衛人也田常欲伐魯仲尼令出使勸田常伐吴常許之賜又至吴請夫差伐齊又之越說勾踐將兵助吴又之晉說以兵待吴伐齊之弊吴既勝齊與晉争强晉果敗吴越襲其後遂殺夫差故子貢一出存魯亂齊破吴强晉覇越彼非薄於仁而欲之葢有全必有䘮也斯又功之不兼者也子貢不欲違仁義而致晉但其事不兼濟也言彧豈願强曹氏令代漢哉事不得已也方時運之屯邅易曰屯如邅如邅音竹連反非雄才無以濟其溺功髙埶彊則皇器自移矣謂魏太祖功業大而神器自歸也此又時之不可並也葢取其歸正而已亦殺身以成仁之義也賛曰公業稱豪駿聲升騰權詭時偪謂詭辭以對卓揮金僚朋揮散也北海天逸音情頓挫逸縱也頓挫猶抑揚也越俗易驚孤音少和直轡安歸髙謀誰佐直轡直道也言其道無所歸謀謨之髙竟誰佐也彧之有弼誠感國疾功申運改迹疑心一迹若可疑心如一也後漢書卷一百後漢書卷一百考證孔融傳拜中軍候刋誤補遺曰郭仲竒碑額云北軍中候祝睦碑云北軍軍中候然仲竒碑中但云拜軍中候不言北軍與額不同郭䆒碑亦但以軍中稱之者葢當時官稱所尚如此北海傳當云軍中候其文倒耳無脱字也中候自中興以来始有北軍軍中候之稱其辭或省則曰北軍中候軍中候云後漢書卷一百考證
