body:
  text: 後漢書卷一百二宋宣城太守范煜撰唐章懷太子賢注董卓列傳第六十二董卓傳董卓字仲穎卓别傳曰卓父君雅爲穎川輪氏尉生卓及弟旻故卓字仲穎旻字叔穎劉攽曰案注言卓與弟旻生潁川明當作潁隴西臨洮人也性麤猛有謀少嘗遊羌中盡與豪帥相結後歸耕於野諸豪帥有來從之者卓爲殺耕牛與共宴樂豪帥感其意歸相斂得雜畜千餘頭以遺之由是以健俠知名爲州兵馬掾常徼守塞下說文曰徼巡也前書曰中尉巡徼京師音義曰所謂遊徼備盗賊卓膂力過人雙帶兩鞬左右馳射方言曰所以藏箭謂之服藏弓謂之鞬左氏傳云右屬櫜鞬爲羌胡所畏桓帝末以六郡良家子爲羽林郎從中郎將張奐爲軍司馬共擊漢陽叛羌破之拜郎中賜縑九千匹卓曰爲者則已有者則士爲功者雖已共有者乃士乃悉分與吏兵無所留稍遷西域戊巳校尉坐事免後爲幷州刺史河東太守中平元年拜東中郎將持節代盧植擊張角於下曲陽軍敗抵罪其冬北地先零羌及枹罕河關羣盜反叛遂共立湟中義從胡北宫伯玉李文侯爲將軍殺䕶羌校尉泠徵伯玉等乃劫致金城人邊章韓遂獻帝春秋曰梁州義從宋建王國等反詐金城郡降求見凉州大人故新安令邊允從事韓約約不見太守陳懿勸之使王國等便劫質約等數十人金城亂懿出國等扶以到䕶羌營殺之而釋約允等隴西以愛憎露布冠約允名以爲賊州購約允各千户侯約允被購約改爲遂允改爲章劉攽曰注陳懿勸之使王國案此王字當作徃字陳懿勸約使徃也使專任軍政共殺金城太守陳懿攻燒州郡明年春將數萬騎入寇三輔侵逼園陵託誅宦官爲名詔以卓爲中郎將副左車騎將軍皇甫嵩征之嵩以無功免歸而邊章韓遂等大盛朝廷復以司空張溫爲車騎將軍假節執金吾袁滂爲副袁宏漢紀曰滂字公熙純素寡欲終不言人短當權寵之盛或以同異致禍滂獨中立於朝故愛憎不及焉拜卓破虜將軍與盪寇將軍周愼竝統於溫幷諸郡兵歩騎合十餘萬屯美陽美陽故城在今雍州武功縣北以衞園陵章遂亦進兵美陽溫卓與戰輒不利十一月夜有流星如火光長十餘丈照章遂營中驢馬盡鳴賊以爲不祥欲歸金城卓聞之喜明日乃與右扶風鮑鴻等幷兵俱攻大破之斬首數千級章遂敗走榆中榆中縣屬金城郡故城在今蘭州金城縣中溫乃遣周愼將三萬人追討之溫參軍事孫堅堅字文臺吳郡富春人即孫權之父也見吳志說愼曰賊城中無穀當外轉糧食堅願得萬人斷其運道將軍以大兵繼後賊必困乏而不敢戰若走入羌中幷力討之則涼州可定也愼不從引軍圍榆中城而章遂分屯葵園狹反斷愼運道愼懼乃棄車重而退溫時亦使卓將兵三萬討先零羌卓於望垣北望垣縣屬天水郡爲羌胡所圍糧食之絶進退逼急乃於所度水中僞立􅋣以爲捕魚而潜從􅋣下過軍續漢書􅋣字作堰其字義則同但異體耳比賊追之決水已深不得度時衆軍敗退唯卓全師而還屯於扶風封斄鄉侯邑千户斄縣故城在今雍州武功縣字或作邰音台三年春遣使者持節就長安拜張溫爲太尉三公在外始之於溫其冬徵溫還京師韓遂乃殺邊章及伯玉文侯擁兵十餘萬進圍隴西太守李相如反與遂連和共殺涼州刺史耿鄙而鄙司馬扶風馬騰典畧曰騰字夀成扶風茂陵人馬援後也長八尺餘身體洪大面鼻雄異而性賢厚人多敬之亦擁兵反叛又漢陽王國自號合衆將軍皆與韓遂合共推王國爲主悉令領其衆寇掠三輔五年圍陳倉乃拜卓前將軍與左將軍皇甫嵩擊破之韓遂等復共廢王國而劫故信都令漢陽閻忠英雄記曰王國等起兵劫忠爲主統三十六郡號車騎將軍使督統諸部忠恥爲衆所脅感恚病死遂等稍爭權利更相殺害其諸部曲竝各分乖六年徵卓爲少府不肯就上書言所將湟中義從及秦胡兵皆詣臣曰牢直不畢廩賜斷絶前書音義曰牢廩食也古者名廩爲牢妻子飢凍牽挽臣車使不得行羌胡敝腸狗態言羌胡心腸敝惡情態如狗也續漢書敝作憋方言云憋惡也郭璞曰憋怤急性也憋音芳别反怤音芳于反臣不能禁止輒將順安慰增異復上如其更增異志當復聞上朝廷不能制頗以爲慮及靈帝寢疾璽書拜卓爲幷州牧令以兵屬皇甫嵩卓復上書言曰臣既無老謀又無壯士天恩誤加掌戎十年士卒大小相狎彌久戀臣畜養之恩爲臣奮一旦之命乞將之北州効力邊垂於是駐兵河東以觀時變及帝崩大將軍何進司隸校尉袁紹謀誅閹宦而太后不許乃私呼卓將兵入朝以脅太后卓得召卽時就道竝上書竝猶兼也曰中常侍張讓等竊倖承寵濁亂海内臣聞揚湯止沸莫若去薪前漢枚乘上書曰欲湯之滄一人吹之百人揚之無益也不如絶薪止火而已滄音側亮反寒也潰癕雖痛勝於内食昔趙鞅興晉陽之甲以逐君側之惡人公羊傳曰晉趙鞅取晉陽之甲以逐荀寅與士吉射者曷爲君側之惡人也此逐君側之惡人曷爲以叛言之無君命也劉攽曰注荀寅與士吉射者曷爲君側之惡人案公羊當更有荀寅士吉射五字下又更須有者也二字今臣輒鳴鐘鼓如洛陽鳴鐘鼔者聲其罪也論語曰小子鳴鼓而攻之典略載卓表曰張讓等慆慢天常擅操王命父子兄弟竝據州郡一書出門高獲千金下數百萬膏腴美田皆屬讓等使變氣上蒸妖賊蜂起請收讓等以清姦穢卓未至而何進敗虎賁中郎將袁術乃燒南宫欲討宦官而中常侍叚珪等山陽公載記叚字作殷劫少帝及陳留王夜走小平津卓遠見火起引兵急進未明到城西聞少帝在北芒因徃奉迎帝見卓將兵卒至恐怖涕泣典略曰帝望見卓涕泣羣公謂卓有詔却兵卓曰公諸人爲國大臣不能匡正王室至使國家播蕩何却兵之有遂俱入城卓與言不能辭對與陳留王語遂及禍亂之事卓以王為賢且為董太后所養卓自以與太后同族有廢立意初卓之入也歩騎不過三千自嫌兵少恐不為逺近所服率四五日輒夜潛出軍近營明旦乃大陳旌鼓而還以為西兵復至洛中無知者尋而何進及弟苗先所領部曲皆歸於卓卓又使吕布殺執金吾丁原而幷其衆英雄記曰原字建陽為人麄畧有勇善射受使不辭有警急追寇虜輒在前卓兵士大盛乃諷朝廷策免司空劉𢎞而自代之魏志曰以久不雨策免漢官儀曰𢎞字子高安衆人因集議廢立百僚大會卓乃奮首而言曰大者天地其次君臣所以為政皇帝闇弱不可以奉宗廟為天下主今欲依伊尹霍光故事更立陳留王如何公卿以下莫敢對卓又抗言抗高也曰昔霍光定策延年案劒有敢沮大議皆以軍法從之坐者震動前書昭帝崩霍光迎立昌邑王賀即位二十七日行淫亂光召丞相已下會議莫敢發言田延年前離席案劒曰羣臣有後應者請斬之尚書盧植獨曰昔太甲旣立不明太甲湯孫太丁子也尚書曰太甲既立不明伊尹放諸桐宫也昌邑罪過千餘故有廢立之事昌邑王凡所徴發一千一百二十七事今上富於春秋行無失徳非前事之比也卓大怒罷坐明日復集羣僚於崇徳前殿遂脅太后策廢少帝曰皇帝在喪無人子之心威儀不類人君今廢為𢎞農王乃立陳留王是為獻帝又議太后靈帝何皇后䠞迫永樂太后孝仁董皇后靈帝之母至令憂死逆婦姑之禮無孝順之節左傳曰婦養姑者也虧姑以成婦逆莫大焉遷於永安宫遂以弑崩卓遷太尉領前將軍事加節傳斧鉞虎賁更封郿侯傳音直戀反郿今岐州縣卓乃與司徒黄琬司空楊彪俱帶鈇鑕詣闕上書追理陳蕃竇武及諸黨人以從人望於是悉復蕃等爵位擢用子孫尋進卓為相國入朝不趨劒履上殿封母為池陽君置丞令劉攽曰案漢書内皆言令丞此不合倒之是時洛中貴戚室第相望金帛財産家家殷積卓縱放兵士突其廬舍淫略婦女剽虜資物謂之搜牢言牢固者皆捜索取之也一曰牢漉也二字皆從去聲今俗有此言人情崩恐不保朝夕及何后葬開文陵靈帝陵卓悉取藏中珍物又姦亂公主妻略宫人虐刑濫罰睚眦必死羣僚内外莫能自固卓嘗遣軍至陽城時人會於社下悉令就斬之駕其車重載其婦女以頭繫車轅歌呼而還又壞五銖錢更鑄小錢悉取洛陽及長安銅人鍾虡飛亷銅馬之屬以充鑄焉鍾虡以銅為之故賈山上書云懸石鑄鍾虡前書音義曰虡鹿頭龍身神獸也説文鍾鼓之跗以猛獸為飾也武帝置飛亷館音義云飛亷神禽身似鹿頭如爵有角蛇尾文如豹文明帝永平五年長安迎取飛亷及銅馬置上西門外名平樂館銅馬則東門京所作致於金馬門外者也張璠紀曰太史靈臺及永安候銅蘭楯卓亦取之故貨賤物貴穀石數萬又錢無輪郭文章不便人用魏志曰卓鑄小錢大五分無文章内外無輪郭不磨鑢時人以為秦始皇見長人於臨洮乃鑄銅人三輔舊事曰秦王立二十六年初定天下稱皇帝大人見臨洮身長五丈迹長六尺作銅人以厭之立在阿房殿前漢徙長樂宫中大夏殿前史記曰始皇鑄天下兵器為十二金人卓臨洮人也而今毁之雖成毁不同凶暴相類焉卓素聞天下同疾閹宦誅殺忠良及其在事雖行無道而猶忍性矯情擢用羣士乃任吏部尚書漢陽周珌侍中汝南伍瓊英雄記珌作毖字仲逺武威人瓊字徳瑜珌音祕尚書鄭公業公業名泰餘人皆書名范曄父名泰避其諱耳長史何顒等以處士荀爽為司空其染黨錮者陳紀韓融之徒皆為列卿幽滯之士多所顯拔以尚書韓馥為冀州刺史英雄記馥字文節潁川人侍中劉岱為兗州刺史吳志曰劉岱字公山東莱牟平人陳留孔伷為豫州刺史英雄記伷字公緒九州春秋伷為冑潁川張咨為南陽太守獻帝春秋咨作資後為孫堅所殺卓所親愛並不處顯職但将校而已初平元年馥等到官與袁紹之徒十餘人各興義兵同盟討卓而伍瓊周珌隂為内主初靈帝末黄巾餘黨郭太等復起西河白波谷轉寇太原遂破河東百姓流轉三輔號為白波賊衆十餘萬卓遣中郎将牛輔擊之不能却及聞東方兵起懼乃鴆殺𢎞農王欲徙都長安會公卿議太尉黄琬司徒楊彪廷爭不能得而伍瓊周珌又固諫之卓因大怒曰卓初入朝二子勸用善士故相從而諸君到官舉兵相圖此二君賣卓卓何用相負遂斬瓊珌而彪琬恐懼詣卓謝曰小人戀舊非欲沮國事也請以不及為罪劉攽曰案文當云請不以及罪多為字又倒以字卓既殺瓊珌旋亦悔之故表彪琬為光禄大夫於是遷天子西都初長安遭赤眉之亂宫室營寺焚滅無餘是時唯有高廟京兆府舎遂便時幸焉便時謂時日吉便後移未央宫於是盡徙洛陽人數百萬口於長安歩騎驅蹙更相蹈藉飢餓寇掠積尸盈路卓自屯留畢圭苑中悉燒宫廟官府居家二百里内無復孑遺劉攽曰官府居家案文少一人字又使呂布發諸帝陵及公卿已下冢墓收其珍寶時長沙太守孫堅亦率豫州諸郡兵討卓卓先遣将徐榮李蒙四出虜掠榮遇堅於梁故城在今汝州梁縣西南也與戰破堅生禽潁川太守李旻亨之卓所得義兵士卒皆以布纒裹倒立於地熱膏灌殺之時河内太守王匡英雄記曰匡字公節泰山人輕財好施以任俠聞屯兵河陽津將以圖卓卓遣疑兵挑戰而潛使銳卒從小平津過津北破之死者略盡明年孫堅收合散卒進屯梁縣之陽人梁縣屬河南郡今汝州縣也陽人聚故城在梁縣西卓遣將胡軫呂布攻之布與軫不相能軍中自驚恐士卒散亂九州春秋曰卓以東郡太守胡軫為大督吕布為騎督軫性急豫宣言今此行也要當斬一青綬乃整齊耳布等惡之宣言相警云賊至軍衆大亂奔走堅追擊之軫布敗走卓遣将李傕詣堅求和堅拒絶不受進軍大谷距洛九十里大谷口在故嵩陽西北八十五里北出對洛陽故城張衡東京賦云盟津達其後大谷通其前是也距至也卓自出與堅戰於諸陵墓間卓敗走却屯澠池聚兵於陜堅進洛陽宣陽城門洛陽記洛陽城南面有四門從東第三門劉攽曰注從東第三門案文少名宣陽三字更擊呂布布復破走堅乃埽除宗廟平塞諸陵分兵出函谷關至新安澠池間以􅎒卓後卓謂長史劉艾曰關東諸將數敗矣無能為也唯孫堅小戇説文曰戇愚也音都降反諸將軍宜愼之乃使東中郎將董越屯澠池中郎將叚煨屯華隂典畧曰煨在華隂特脩農事天子東遷煨迎賫饋周急魏志曰武威人也煨音一回反中郎將牛輔屯安邑其餘中郎將校尉布在諸縣以禦山東卓諷朝廷使光禄勲宣璠璠音煩又音甫袁反持節拜卓為太師位在諸侯王上乃引還長安百官迎路拜揖卓遂僭擬車服乗金華青葢𤓰畫兩轓時人號竿摩車言其服飾近天子也金華以金為華飾車也𤓰者蓋弓頭為𤓰形也轓音甫袁反廣雅云車箱也畫為文彩續漢志云轓長六尺下屈廣八寸又云皇太子青葢金華蚤畫轓竿摩謂相逼近也今俗以事干人者謂之相竿摩以弟旻為左將軍封鄠侯兄子璜為侍中中軍校尉皆典兵事於是宗族内外竝居列位其子孫雖在髫齓男皆封侯女為邑君數與百官置酒宴會淫樂縱恣乃結壘於長安城東以自居又築塢於郿高厚七丈號曰萬歲塢今案塢舊基高一丈周廽一里一百歩積穀為三十年儲自云事成雄據天下不成守此足以畢老常至郿行塢公卿已下祖道於横門外横音光卓施帳幔飲設誘降北地反者數百人於坐中殺之先斷其舌次斬手足次鑿其眼目以鑊煑之未及得死偃轉柸案間會者戰慄亡失匕箸而卓飲食自若諸将有言語蹉跌便戮於前又稍誅關中舊族䧟以叛逆時太史望氣言當有大臣戮死者卓乃使人誣衛尉張溫與袁術交通遂笞溫於市殺之以塞天變前溫出屯羙陽令卓與邊章等戰無功溫召又不時應命旣到而辭對不遜時孫堅為溫參軍勸溫陳兵斬之溫曰卓有威名方倚以西行堅曰明公親帥王師威振天下何恃於卓而頼之乎堅聞古之名将仗鉞臨衆未有不斷斬以示威武者也故穰苴斬荘賈史記齊景公時晉伐阿鄄而燕侵河上以司馬穰苴為将軍使寵臣荘賈監軍賈期後至穰苴斬以狥三軍鄄音絹魏絳戮楊干魏絳晉大夫楊干晉公弟㑹諸侯於曲梁楊干亂行魏絳戮其僕事在左傳今若縱之自虧威重後悔何及溫不能從而卓猶懷忌恨故及於難溫子伯愼漢官儀曰溫穰人少有名譽累登公卿亦隂與司徒王允共謀誅卓事未及發而見越騎校尉汝南伍孚謝承書曰孚字徳瑜汝南吳房人質性剛毅勇壮好義力能兼人忿卓凶毒志手刃之乃朝服懷佩刀以見卓孚語畢辭去卓起送至閣以手撫其背孚因出刀刺之不中卓自奮得免急呼左右執殺孚而大詬詬罵也音許豆反曰虜欲反耶孚大言曰恨不得磔裂姦賊於都市磔車裂之也音丁格反獻帝春秋磔作車以謝天地言未畢而斃時王允與呂布及僕射士孫瑞謀誅卓三輔决録曰瑞字君榮扶風人博逹無不通天子都許追論瑞功封子萌車亭侯萌字文始有才學與王粲善粲作詩贈萌有人書呂字於布上負而行於市歌曰布乎有告卓者卓不悟英雄記曰有道士書布為呂字持以示卓卓不知其為呂布也三年四月帝疾新愈大會未央殿卓朝服升車既而馬驚墮泥還入更衣其少妻止之卓不從遂行乃陳兵夾道自壘及宫左歩右騎屯衛周帀令呂布等扞衛前後王允乃與士孫瑞密表其事使瑞自書詔以授布令騎都尉李肅獻帝紀曰肅呂布同郡人也與布同心勇士十餘人偽著衛士服於北掖門内以待卓卓将至馬驚不行怪懼欲還呂布勸令進遂入門肅以㦸刺之𠂻甲不入傷臂墮車顧大呼曰呂布何在布曰有詔討賊臣卓大罵曰庸狗敢如是邪布應聲持矛刺卓趣兵斬之趣音促九州春秋曰布素使秦誼陳衛李黒等偽作宫門衛士持長㦸俠义卓車或义其馬卓驚呼布布素施鎧於衣中持矛即應聲刺卓墜於車主簿田儀九州春秋儀字作景及卓蒼頭前赴其尸布又殺之馳齎赦書以令宫陛内外士卒皆稱萬歲百姓歌舞於道長安中士女賣其珠玉衣装市酒肉相慶者塡滿街肆使皇甫嵩攻卓弟旻於郿塢殺其母妻男女盡滅其族英雄記曰卓母年九十走至塢門曰乞脫我死即時斬首乃尸卓於市天時始熱卓素充肥脂流於地守尸吏然火置卓臍中光明達曙如是積日諸袁門生又聚董氏之尸焚灰揚之於路塢中珍藏有金二三萬斤銀八九萬斤錦綺繢縠紈素竒玩積如丘山初卓以牛輔子壻素所親信使以兵屯陜輔分遣其校尉李傕郭汜張濟英雄記傕北地人劉艾獻帝紀曰傕字稚然汜張掖人將歩騎數萬擊破河南尹朱儁於中牟因掠陳留潁川諸縣殺略男女所過無復遺類呂布乃使李肅以詔命至陜討輔等輔等逆與肅戰肅敗走𢎞農布誅殺之其後牛輔營中無故大驚輔懼乃齎金寶踰城走左右利其貨斬輔送首長安獻帝紀曰輔帳下支胡赤兒等素待之過急盡以家寶與之自帶二十餘餅金大白珠瓔胡謂輔曰城北已有馬可去也以繩繫輔腰踰城懸下之未及地丈許放之輔傷腰不能行諸胡共取其金幷珠斬首詣長安傕汜等以王允呂布殺董卓故忿怒幷州人幷州人其在軍者男女數百人皆誅殺之牛輔既敗衆無所依欲各散去傕等恐乃先遣使詣長安求乞赦免王允以為一歲不可再赦不許之傕等益懷憂懼不知所為武威人賈詡時在傕軍説之魏志曰卓之入洛陽詡以太尉掾為平津尉遷討虜校尉牛輔屯陜詡在輔軍輔旣死故詡在傕軍曰聞長安中議欲盡誅涼州人諸君若棄軍單行則一亭長能束君矣不如相率而西以攻長安為董公報仇事濟奉國家以正天下若其不合走未後也傕等然之各相謂曰京師不赦我我當以死決之若攻長安尅則得天下矣不尅則鈔三輔婦女財物西歸鄉里尚可延命衆以為然於是共結盟率軍數千晨夜西行王允聞之乃遣卓故將胡軫徐榮擊之於新豐九州春秋曰胡文才揚整脩皆涼州人王允素所不善也及李傕之叛乃召文才整脩使東曉喻之不假借以溫顏謂曰關東鼠子欲何為乎卿徃曉之於是二人往實召兵而還榮戰死軫以衆降傕隨收兵比至長安已十餘萬與卓故部曲樊稠李蒙等合袁宏記曰蒙為傕所殺圍長安城城峻不可攻守之八日呂布軍有叟兵内反叟兵即蜀兵也漢代謂蜀為叟引傕衆得入城潰放兵虜掠死者萬餘人殺衛尉种拂等呂布戰敗出奔王允奉天子保宣平城門樓上三輔黄圖曰長安城東面北頭門號宣平門於是大赦天下李傕郭汜樊稠等皆為將軍袁山松書曰允謂傕等曰臣無作威作福將軍乃放縱欲何為乎傕等不應自拜署傕為揚武將軍汜為揚烈將軍樊稠等皆為中郎將也遂圍門樓共表請司徒王允出問太師何罪允窮蹙乃下後數日見殺傕等葬董卓於郿幷收董氏所焚尸之灰合斂一棺而葬之葬日大風雨霆震卓墓流水入藏漂其棺木獻帝起居注曰冢户開大風暴雨水土流入杼出之棺向入輒復風雨水溢郭户如此者三四冢中水半所稠等共下棺又風雨益暴甚遂閉户户閉大風復破其冢傕又遷車騎將軍開府領司隸校尉假節汜後將軍稠右將軍張濟為鎭東將軍竝封列侯傕汜稠共秉朝政濟出屯𢎞農以賈詡為左馮翊欲侯之詡曰此救命之計何功之有固辭乃止更以為尚書典選明年夏大雨晝夜二十餘日漂没人庶又風如冬時帝使御史裴茂訊詔獄原繫者二百餘人其中有為傕所枉繫者傕恐茂赦之乃表奏茂擅出囚徒疑有姦故請收之詔曰災異屢降隂雨為害使者銜命宣布恩澤原解輕微庶合天心欲釋寃結而復罪之乎一切勿問初卓之入關要韓遂馬騰共謀山東獻帝傳曰騰父平扶風人為天水蘭干尉失官遂留隴西與羌雜居家貧無妻遂娶羌女生騰遂騰見天下方亂亦欲倚卓起兵興平元年馬騰從隴右來朝進屯㶚橋時騰私有求於傕不獲而怒遂與侍中馬宇右中郎將劉範焉之子前涼州刺史种邵中郎將杜禀獻帝紀曰禀與賈詡有隙脅扶風吏人為騰守槐里欲共攻傕傕令樊稠及兄子利數萬人攻圍槐里夜梯城城陷斬禀梟首合兵攻傕連日不決韓遂聞之乃率衆来欲和騰傕旣而復與騰合傕使兄子利共郭汜樊稠與騰等戰於長平觀下前書音義曰長平坂名也在池陽南有長平觀去長安五十里遂騰敗斬首萬餘級种邵劉範等皆死遂騰走還涼州稠等又追之韓遂使人語稠曰天下反覆未可知相與州里今雖小違要當大同欲共一言乃騈馬交臂相加騈並也笑語良久軍還利告傕曰樊韓騈馬笑語不知其辭而意愛甚密於是傕稠始相猜疑猶加稠及郭汜開府與三公合爲六府皆參選舉獻帝起居注曰傕等各欲用其所舉若一違之便忿憤恚怒主者患之乃以次第用其所舉先從㴶起汜次之稠次之三公所舉終不見用時長安中盜賊不禁白日虜掠傕汜稠乃參分城内各備其界猶不能制而其子弟縱横侵暴百姓是時穀一斛五十萬豆麥二十萬人相食啖啖音徒敢反白骨委積臭穢滿路帝使侍御史侯汶音聞出太倉米豆為飢人作糜經日而死者無限帝疑賦䘏有虛賦布也䘏憂也乃親於御前自加臨檢旣知不實使侍中劉艾出讓有司於是尚書令以下皆詣省閣劉攽曰案文閣當作閤閤門也謝奏收侯汶考實詔曰未忍致汶于理可杖五十自是後多得全濟明年春傕因會刺殺樊稠於坐獻帝紀曰傕見稠果勇而得衆心疾害之醉酒潛使外生騎都尉胡封於坐中拉殺稠由是諸將各相疑異傕汜遂復理兵相攻袁宏紀曰李傕數設酒請汜或留汜止宿汜妻懼與傕婢妾私而奪己愛思有以離間之會傕送饋汜妻乃以䜴為藥汜將食妻曰食從外来儻或有故遂摘藥示之曰一栖不兩雄我固疑将軍之信李公也他日傕請汜大醉汜疑傕藥之絞糞汁飲之乃解於是遂相猜疑也安西将軍楊定者故卓部曲将也懼傕忍害乃與汜合謀迎天子幸其營傕知其計即使兄子暹音纎將數千人圍宮以車三乗迎天子皇后太尉楊彪謂暹曰古今帝王無在人臣家者諸君舉事當上順天心奈何如是暹曰将軍計決矣帝於是遂幸傕營彪等皆徒從亂兵入殿掠宫人什物傕又徙御府金帛乗輿器服而放火燒宫殿官府居人悉盡帝使楊彪與司空張喜等十餘人和傕汜汜不從遂質留公卿彪謂汜曰將軍達人間事奈何君臣分爭一人刧天子一人質公卿此可行邪汜怒欲手刃彪彪曰卿尚不奉國家吾豈求生邪左右多諫汜乃止遂引兵攻傕矢及帝前獻帝紀曰汜與傕將張苞張龍謀誅傕汜將兵夜攻傕門候開門内汜兵苞等燒屋火不然汜兵弓弩並發矢及天子樓帷簾中又貫傕耳傕將楊奉夲白波賊帥乃將兵救傕於是汜衆乃退是日傕復移帝幸其北塢唯皇后宋貴人俱傕使校尉監門隔絶内外獻帝紀曰傕令門設反關校尉守察盛夏炎暑不能得冷水飢渇流離上以前移宫人及侍臣不得以穀米自隨入門有禁防不得出市困乏使就傕索粳米五斛牛骨五具欲為食賜宫人左右傕不與米取久牛肉牛骨給皆已臭蟲不可啖食尋復欲徙帝於池陽黄白城池陽縣故城在今涇陽縣西北君臣惶懼司徒趙溫深解譬之乃止詔遣謁者僕射皇甫酈和傕汜酈先譬汜汜即從命又詣傕傕不聽曰郭多盜馬虜耳何敢欲與我同邪必誅之君觀我方略士衆足辦郭多不多又劫質公卿所為如是而君茍欲左右之邪左右助也音佐又汜一名多酈曰今汜質公卿而将軍脅主誰輕重乎傕怒呵遣酈因令虎賁王昌追殺之昌偽不及酈得以免傕乃自為大司馬獻帝起居注曰傕性喜鬼怪左道之術常有道人及女巫歌謳擊鼔下神祭六丁符劾厭勝之具無所不為又於朝廷省門外為董卓作神坐數以牛羊祠之天子使左中郎將李國持節拜傕為大司馬在三公之右傕自以為得鬼神之助乃厚賜諸巫與郭汜相攻連月死者以萬數張濟自陜來和解二人仍欲遷帝權幸𢎞農帝亦思舊京因遣使敦請傕求東歸十反乃許袁宏紀曰濟從太官令孫篤校尉張式宣諭十反車駕即日發邁獻帝起居注曰初天子出到宣平門當度橋氾兵數百人遮橋曰是天子非車不得前傕兵數百人皆持大㦸在乗輿車前侍中劉艾大呼云是天子也使侍中楊琦高舉車帷帝言諸兵汝却何敢廹近至尊邪汜等兵乃却既度橋士衆咸稱萬歲李傕出屯曹陽以張濟為驃騎将軍復還屯陜遷郭汜車騎將軍楊定後將軍楊奉興義将軍又以故牛輔部曲董承為安集將軍蜀志曰承獻帝舅也裴松之注曰承靈帝母太后之姪汜等並侍送乘輿汜遂復欲脅帝幸郿定奉承不聽汜恐變生乃棄軍還就李傕車駕進至華隂帝王紀曰帝以尚書郎郭溥喻汜汜以屯部未定乞須留之溥因罵汜曰卿眞庸人賤夫為國上将今天子有命何須留之吾不忍見卿所行請先殺我以章卿惡汜得溥言切意乃少喻寧輯將軍段煨乃具服御及公卿以下資儲請帝幸其營初楊定與煨有隙遂誣煨欲反乃攻其營十餘日不下袁宏紀曰煨與楊定有隙煨迎乘輿不敢下馬揖馬上侍中种輯素與定親乃言曰段煨欲反上曰煨屬來迎何謂反對曰迎不至界拜不下馬其色變必有異心大尉楊彪等曰煨不反臣等敢以死保車駕可幸其營董承楊定言曰郭汜今且將七百騎來入煨營天子信之遂露次於道南奉承定等功也而煨猶奉給御膳禀贍百官終無二意李傕郭汜旣悔令天子東乃來救段煨因欲劫帝而西楊定為汜所遮亡奔荆州而張濟與楊奉董承不相平乃反合催汜共追乗輿大戰於𢎞農東澗承奉軍敗百官士卒死者不可勝數皆棄其婦女輜重御物符策典籍略無所遺獻帝紀曰掠婦女衣被遲違不待解即斫刺之有美髪者斷取凍死及嬰兒隨流而浮者塞水射聲校尉沮儁被創墜馬李傕謂左右曰尚可活不儁罵之曰汝等凶逆逼迫天子亂臣賊子未有如汝者傕使殺之袁山松書曰儁年二十五其督戰訾寳負其屍而瘞之天子遂露次曹陽承奉乃譎傕等與連和而密遣間使至河東招故白波帥李樂韓暹胡才及南匈奴右賢王去卑竝率其衆數千騎來與承奉共擊傕等大破之斬首數千級乗輿乃得進董承李樂擁衛左右胡才楊奉韓暹去卑為後距傕等復來戰奉等大敗死者甚於東澗自東澗兵相連綴四十里中方得至陜乃結營自守時殘破之餘虎賁羽林不滿百人皆有離心承奉等夜乃潛議過河袁宏紀曰傕汜繞營呌呼吏士失色各有分散意李樂懼欲令車駕御船過砥柱出盟津楊彪曰臣𢎞農人也自此以東有三十六灘非萬乗所當登宗正劉艾亦曰臣前為陜令知其危險舊故河師猶時有傾危况今無師太尉所慮是也使李樂先度具舟船舉火為應帝歩出營臨河欲濟岸高十餘丈乃以絹縋而下縋音直類反餘人或匍匐岸側或從上自投死亡傷殘不復相知爭赴舡者不可禁制董承以戈擊披之斷手指於舟中者可掬同濟唯皇后宋貴人宋貴人名都常山太守泓之女也見獻帝起居注楊彪董承及后父執金吾伏完等數十人其宫女皆為傕兵所掠奪凍溺死者甚衆既到太陽止於人家太陽縣屬河東郡前書音義曰在太河之陽也即今陜州河北縣是也十三州記曰傅巖在其界今住穴尚存然後幸李樂營百官飢餓河内太守張楊魏志曰楊字稚叔雲中人使數千人負米貢餉帝乃御牛車因都安邑河東太守王邑奉獻綿帛悉賦公卿以下封邑為列侯邑字文都北地涇陽人鎭北將軍見同歳名拜胡才征東將軍張楊為安國将軍皆假節開府其壘壁羣豎競求拜職刻印不給至乃以錐畫之或齎酒肉就天子燕飲魏志曰乘輿時居棘籬中門户無關閉天子與羣臣㑹兵士伏籬上觀互相鎭壓以為笑諸将或遣婢詣省問或齎酒送天子侍中不通喧呼罵詈也劉攽曰注遣婢詣省問或案問當作閤又遣太僕韓融至𢎞農與傕汜等連和傕乃放遣公卿百官頗歸宮人婦女及乗輿器服初帝入關三輔户口尚數十萬自傕汜相攻天子東歸後長安城空四十餘日強者四散羸者相食二三年間關中無復人跡建安元年春諸将爭權韓暹遂攻董承承奔張楊楊乃使承先繕修洛宫七月帝還至洛陽幸陽安殿張楊以為己功故因以楊名殿獻帝起居注曰舊時宫殿悉壞倉卒之際拾摭故瓦材木工匠無法度之制所作並無足觀也乃謂諸將曰天子當與天下共之朝廷自有公卿大臣楊當出扞外難何事京師遂還野王楊奉亦出屯梁乃以張楊為大司馬楊奉為車騎將軍韓暹為大將軍領司隸校尉皆假節鉞暹與董承並留宿衛暹矜功恣睢恣睢自任用之貎睢音火季反干亂政事董承患之潛召兗州牧曹操操乃詣闕貢獻稟公卿以下因奏韓暹張楊之罪暹懼誅單騎奔楊奉帝以暹楊有翼車駕之功詔一切勿問於是封衛將軍董承輔國將軍伏完等十餘人為列侯贈沮儁為𢎞農太守袁宏紀曰誅議郎侯祈尚書馮碩侍中壺崇討有罪也封衛將軍董承輔國將軍伏完侍中丁冲种輯尚書僕射鍾繇尚書郭溥御史中丞董芬彭城相劉艾馮翊韓斌東郡太守楊衆議郎羅邵伏徳趙蕤為列侯賞有功也贈射聲校尉沮儁為𢎞農太守旌死節也曹操以洛陽殘荒遂移帝幸許楊奉韓暹欲要遮車駕不及曹操擊之獻帝春秋曰車駕出洛陽自轘轅而東楊奉韓暹引軍追之輕騎既至操設伏兵要于陽城山狹中大敗之奉暹奔袁術遂縱暴揚徐間明年左將軍劉備誘奉斬之暹懼走還幷州道為人所殺九州春秋曰暹失奉孤特與千餘騎欲歸幷州為張宣所殺胡才李樂留河東才為怨家所害樂自病死張濟飢餓出至南陽攻穰戰死郭汜為其将伍習所殺三年使謁者僕射裴茂詔關中諸将段煨等討李傕夷三族典略曰傕頭至有詔高縣之以段煨為安南將軍封閺鄉侯閺鄉今號州縣也説文閺今作閿流俗誤也四年張楊為將楊醜所殺魏志曰楊素與呂布善曹公之圍布楊欲救之不能乃出兵東市遥為之埶其將楊醜殺楊以應曹公以董承為車騎將軍開府自都許之後權歸曹氏天子總已百官備員而已帝忌操專偪乃密詔董承使結天下義士共誅之承遂與劉備同謀未發會備出征承更與偏將軍王子服長水校尉种輯議郎吳碩結謀事泄承服輯碩皆為操所誅韓遂與馬騰自還涼州更相戰爭乃下隴據關中操方事河北慮其乗間為亂七年乃拜騰征南将軍遂征西将軍並開府後徴段煨為大鴻臚病卒復徴馬騰為衛尉封槐里侯騰乃應召而留子超領其部曲十六年超與韓遂舉關中背曹操操擊破之遂超敗走騰坐夷三族超攻殺涼州刺史韋康太僕瑞之子也弟誕魏光禄大夫復據隴右十九年天水人楊阜破超魏志曰阜字義山天水冀人也韋康以為别駕馬超率萬餘人攻冀城阜率國士大夫及宗族子弟勝兵者千餘人使弟岳於城上作偃月營與超接戰自正月至八月拒守而救兵不至超入拘岳於冀殺刺史太守阜内有報超之志而未得其便外兄姜叙屯歴城阜少長詣叙家見叙母説前在冀中時事歔欷悲甚叙曰何為耳阜曰守城不能完君亡不能死亦何面目以視息天下時叙母慨然勑從阜計超聞阜等兵起自將出襲歴城得叙母罵之曰若背父之逆子弑君之桀賊天地豈久容敢以面目視人乎超怒殺之阜與戰身被五創宗族昆弟死者七人超遂南奔張魯劉攽曰注阜少長詣叙家又云得叙母罵之曰案此言阜自少長於叙家後人不曉妄加一詣字下文少叙母二字超奔漢中降劉備蜀志曰超字孟起既奔漢中聞備圍劉璋於成都宻書請降備遣迎超將兵徑到城下城中震怖璋即稽首韓遂走金城羌中為其帳下所殺初隴西人宗建在枹罕自稱河首平漢王建以居河上流故稱河首也署置百官三十許年曹操因遣夏侯淵擊建斬之涼州悉平魏志曰淵字妙才沛國人也爲征西䕶軍魏太祖使帥諸將討建㧞之論曰董卓初以虓闞為情詩大雅曰闞如虓虎毛傳曰虎怒之貎也因遭崩剝之埶剝猶亂也左傳曰天實剝亂故得蹈藉彞倫毁裂畿服彞常也倫理也書云我不知其彞倫攸叙左傳曰裂冠毁冕畿謂王畿也服九服也夫以刳肝斮趾之性刳剖也斮斬也紂刳剔孕婦剖比干之心斮朝渉之脛則羣生不足以厭其快然猶折意縉紳遲疑陵奪折屈也謂忍性屈情擢用鄭泰蔡邕何顒荀爽等尚有盜竊之道焉荘子曰跖之徒問於跖曰盜亦有道乎跖曰何適無有邪夫妄意室中之藏聖也入先勇也出後義也知可否智也分均仁也五者不備而能成大盜者天下未之有也及殘寇乗之倒山傾海殘寇謂傕汜等崑岡之火自兹而焚書曰火炎崑岡玉石俱焚版蕩之篇於焉而極詩大雅曰上帝版版下人卒癉毛萇注云版反也痺病也言厲王為政反先王之道下人盡病也又蕩之什曰蕩蕩上帝下人之辟疾威上帝其命多辟鄭𤣥注云蕩蕩法度廢壞之貎嗚呼人之生也難矣左傳曰人生實難其有不獲死乎天地之不仁甚矣老子曰天地不仁以萬物爲芻狗贊曰百六有會前書音義曰四千五百歲為一元一元之中有九戹陽戹五隂戹四陽為旱隂為水初入元百六歲有陽戹故曰百六之會過剥成災易曰大過棟撓夲末弱也剥不利有攸徃小人長也董卓滔天干逆三才滔漫也尚書曰象龔滔天方夏崩沸方四方夏華夏也詩小雅云百川沸騰山冢崒崩皇京烟埃無禮雖及餘䘲遂廣左傳曰多行無禮必自及矢延王輅兵纒魏象周禮巾車氏掌王之五輅纒遶也魏象闕也區服傾回人神波蕩後漢書卷一百二後漢書卷一百二考證董卓傳朝廷不能制制字監本誤作爾從宋本改而彪琬恐懼監本無琬字臣㑹汾按上下文皆彪琬並言此不應獨舉楊彪從宋本增溫子伯愼何焯校本子改字事未及發而見諸本同何焯校本見下有害字越騎校尉汝南伍孚何焯曰孚與瓊疑是一人因其被害時人造此事以歸之耳裴注中採謝承書亦致疑及此僕射士孫瑞注瑞字君榮何焯校本榮改策十反乃許注濟從太官令孫篤校尉張式宣諭十反監本作濟使天官令臣會汾按前書百官公卿表及劉昭百官志並無天官令之名從宋本改式本或作武超攻殺凉州刺史韋康注太僕瑞之子也瑞字舊本毛本作端後漢書卷一百二考證
