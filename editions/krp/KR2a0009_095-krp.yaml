body:
  text: 後漢書卷九十五宋宣城太守范煜撰唐章懐太子賢注皇甫張叚列傳第五十五皇甫規傳皇甫規字威眀安定朝那人也祖父稜度遼將軍父旗扶風都尉永和六年西羌大寇三輔圍安定征西將軍馬賢将諸郡兵擊之不能克規雖在布衣見賢不䘏軍事審其必敗乃上書言状尋而賢果為羌所沒郡将知規有兵畧乃命為功曹使率甲士八百與羌交戰斬首數級賊遂退郤舉規上計掾其後𦍑衆大合攻燒隴西朝廷患之規乃上疏求自効曰臣比年以來數陳便宜羌戎未動䇿其將反馬賢始出頗知必敗誤中之言在可考校臣每惟賢等擁衆四年未有成功懸師之費且百億計懸猶停也出於平人回入姦吏平人齊人也故江湖之人羣為盗賊青徐荒饑襁負流散夫羌戎潰叛不由承平皆由邉将失於綏御乘常守安則加侵暴茍競小利則致大害微勝則虛張首級軍敗則隐匿不言軍士勞怨困於猾吏進不得快戰以徼功退不得温飽以全命餓死溝渠暴骨中原徒見王師之出不聞振旅之聲振整旅衆也穀梁傳曰出曰治兵入曰振旅酋豪泣血驚懼生變是以安不能久敗則經年臣所以搏手叩心而增歎者也願假臣兩營二郡兩營謂馬賢及趙冲等二郡安定隴西也屯列坐食之兵五千出其不意與護羌校尉趙冲共相首尾土地山谷臣所曉習兵埶巧便臣已更之可不煩方寸之印尺帛之賜髙可以滌患下可以納降若謂臣年少官輕不足用者凡諸敗將非官爵之不髙年齒之不邁臣不勝至誠沒死自陳時帝不能用冲質之間梁太后臨朝規舉賢良方正對䇿曰伏惟孝順皇帝初勤王政紀綱四方㡬以獲安後遭姦偽威分近習近習謂佞倖親近小人也禮記曰雖有貴戚近習畜貨聚馬戲謔是聞又因縁嬖倖受賂賣爵輕使賓客交錯其間天下擾擾從亂如歸左傳曰人患王之無厭也故從亂如歸也故每有征戰鮮不挫傷官民並竭上下窮虛臣在關西竊聼風聲未聞國家有所先後先後謂進退也言國家不妄有襃貶進退而權倖之徒反為禍福也而威福之來咸歸權倖陛下體兼乾坤聰哲純茂攝政之初拔用忠貞其餘維綱多所改正逺近翕然望見太平而地震之後霧氣白濁日月不光旱魃為虐詩大雅曰旱魃為虐如惔如焚魃旱神也大賊從横流血川野庶品不安譴誡累至殆以姦臣權重之所致也其常侍尤無状者亟便黜遣無狀者謂無善状披掃凶黨收入財賄以塞痛怨以荅天誡今大將軍梁冀河南尹不疑處周邵之任為社稷之鎭加與王室世為姻族梁商女為順帝后后女弟又為桓帝后冀即商子故曰代姻也今日立號雖尊可也可猶宜也實宜増脩謙節輔以儒術省去遊娛不急之務割減廬第無益之飾夫君者舟也人者水也家語孔子曰夫君者舟也人者水也水可載舟亦以覆舟君以此思危則可知也羣臣乘舟者也將軍兄弟操檝者也若能平志畢力以度元元所謂福也如其怠弛將淪波濤可不慎乎夫徳不稱禄猶鑿墉之趾以益其髙豈量力審功安固之道哉凡諸宿猾酒徒戲客皆耳納邪聲口出諂言甘心逸遊唱造不義亦宜貶斥以懲不軌令冀等深思得賢之福失人之累又在位素餐尚書怠職有司依違莫肯紏察故使陛下専受諂諛之言不聞戸牖之外臣誠知阿諛有福深言近禍豈敢隱心以避誅責乎臣生長邉逺希渉紫庭怖慴失守言不盡心梁冀忿其刺已以規為下第拜郎中託疾免歸州郡承冀旨幾陥死者再三遂以詩易教授門徒三百餘人積十四年後梁冀被誅旬月之間禮命五至皆不就時太山賊叔孫無忌侵亂郡縣中郎將宗資討之未服公車特徴規拜太山太守規到官廣設方畧寇虜悉平延熹四年秋叛羌零吾等與先零别種寇鈔關中護羌校尉段熲坐徴熲擊羌坐為凉州刺史郭閎留兵不進下獄後先零諸種陸梁覆沒營塢説文曰塢小障也一曰庳城也音烏古反規素悉羌事志自奮効乃上疏曰自臣受任志竭愚鈍實頼兖州刺史牽顥之清猛中郎將宗資之信義得承節度幸無咎譽今猾賊就滅太山畧平復聞羣羌並皆反逆臣生長邠岐年五十有九昔為郡吏再更叛羌預籌其事有誤中之言臣素有固疾恐犬馬齒窮不報大恩願乞冗官備單車一介之使勞來三輔宣國威澤以所習地形兵埶佐助諸軍臣窮居孤危之中坐觀郡將已數十年矣自鳥鼠至於東岱其病一也郡將郡守也鳥鼠山名在今渭西即先零羌寇鈔處也東岱謂泰山叔孫無忌反處也皆由郡守不加綏撫致使反叛其疾同也力求猛敵不如清平勤明吳孫未若奉法吳起魏將也孫武吳將也言若求猛將不如撫以清平之政明習兵書不如郡守奉法使之無反也前變未逺臣誠戚之戚憂也前變謂羌反是以越職盡其區區至冬𦍑遂大合朝廷為憂三公舉規為中郎將持節監關西兵討零吾等破之斬首八百級先零諸種羌慕規威信相勸降者十餘萬明年規因發其騎共討隴右而道路隔絶軍中大疫死者十三四規親入菴盧巡視将士三軍咸悦東羌遂遣使乞降凉州復通先是安定太守孫儁受取狼籍屬國都尉李翕督軍御史張禀多殺降羌凉州刺史郭閎漢陽太守趙熹並老弱不堪任職而皆倚恃權貴不遵法度規到州界悉條奏其罪或免或誅羌人聞之翕然反善沈氐大豪滇昌饑恬等十餘萬口復詣規降規出身數年持節為將擁衆立功還督鄉里既無它私惠而多所舉奏又惡絶宦官不與交通於是中外並怨遂共誣規貨賂羣羌令其文降以文簿虗降非眞心也天子璽書誚讓相屬規懼不免上疏自訟曰四年之秋戎醜蠢戾蠢動也戾乖也爰自西州侵及涇陽縣名屬安定郡其故城在今原州平源縣南也舊都懼駭朝廷西顧明詔不以臣愚駑急使軍就道就猶上也劉攽曰案文軍上少一字或督或領也幸䝉威靈遂振國命羌戎諸種大小稽首輙移書營郡以訪誅納訪問也規言羌種既服臣即移書軍營及郡勘問誅殺并納受多少之數目也所省之費一億以上以為忠臣之義不敢告勞詩小雅曰密勿從事不敢告勞無罪無辜䜛口嗸嗸故恥以片言自及㣲効然比方先事庶免罪悔先事謂前輩敗將也前踐州界先奏郡守孫儁次及屬國都尉李翕督軍御史張禀旋師南征又上凉州刺史郭閎漢陽太守趙熹陳其過惡執據大辟凡此五臣支黨半國其餘墨綬下至小吏所連及者復有百餘吏託報將之怨子思復父之恥載贄馳車懐糧歩走交搆豪門競流謗讟云臣私報諸羌謝其錢貨謝猶讎也若臣以私財則家無擔石如物出於官則文簿易考就臣愚惑信如言者前世尚遺匈奴以宫姬元帝賜呼韓邪單于待詔掖庭王嬙為閼氏也鎭烏孫以公主武帝以江都王建女細君妻烏孫王昆莫為夫人也今臣但費千萬以懐叛羌則良臣之才畧兵家之所貴將有何罪負義違理乎自永初以來將出不少覆軍有五動資巨億有旋車完封寫之權門言覆軍之将族師之日多載珍寳封印完全便入權門而名成功立厚加爵封今臣還督本土糺舉諸郡絶交離親戮辱舊故衆謗隂害固其宜也臣雖汙穢亷絜無聞今見覆沒恥痛實深傳稱鹿死不擇音謹冒昧畧上左傳曰鹿死不擇音挺而走險急何能擇也其年冬徴還拜議郎論功當封而中常侍徐璜左悺欲從求貨數遣賓客就問功狀規終不答璜等忿怒陷以前事下之於吏官屬欲賦歛請謝規誓而不聼遂以餘寇不絶坐繫廷尉論輸左校漢官儀曰左校署屬將作大匠也諸公及太學生張鳳等三百餘人詣闕訟之㑹赦歸家徴拜度遼將軍至營數月上書薦中郎將張奐以自代曰臣聞人無常俗而政有治亂兵無強弱而將有能否伏見中郎將張奐才畧兼優宜正元帥以從衆望若猶謂愚臣宜充軍事者願乞冗官以為奐副朝廷從之以奐代為度遼将軍規為使匈奴中郎將及奐遷大司農規復代為度遼將軍規為人多意算自以連在大位欲退身避第數上病不見聽㑹友人上郡太守王旻䘮還規縞素越界到下亭迎之因令客密告并州刺史胡芳言規擅逺軍營公違禁憲當急舉奏芳曰威明欲避第仕塗故激發我耳言欲歸第避仕宦之塗也吾當為朝廷愛才何能申此子計邪遂無所問及黨事大起天下名賢多見染逮規雖為名將素譽不髙自以西州豪傑恥不得豫乃先自上言臣前薦故大司農張奐是附黨也又臣昔論輸左校時太學生張鳳等上書訟臣是為黨人所附也臣宜坐之朝廷知而不問時人以為規賢劉攽曰案文以為規賢非是當云以規為賢在事數歳北邊威服永康元年徴為尚書其夏日食詔公卿舉賢良方正下問得失規對曰天之於王者如君之於臣父之於子也誡以災妖使從福祥陛下八年之中三斷大獄謂誅梁冀誅鄧萬鄧㑹誅李膺等黨事也一除内嬖無徳而寵曰嬖謂廢鄧皇后也再誅外臣殺桂陽太守任𦙍殺南陽太守成瑨太原太守劉質等也而災異猶見人情未安者殆賢愚進退威刑所加有非其理也前太尉陳蕃劉矩漢官儀曰矩字叔方忠謀髙世廢在里巷劉祐馮緄古本反趙典尹勲正直多怨流放家門李膺王暢孔翊潔身守禮終無宰相之階至於鉤黨之釁事起無端鉤引也謂李膺等事也虐賢傷善哀及無辜今興改善政易於覆手而羣臣杜口鑒畏前害互相瞻顧莫肯正言伏願陛下暫留聖明容受謇直則前責可弭後福必降對奏不省遷規𢎞農太守封壽成亭侯邑二百戸讓封不受再轉為䕶羌校尉熹平三年以疾名還未至卒於穀城年七十一所著賦銘碑讚禱文弔章表敎令書檄牋記凡二十七篇論曰孔子稱其言之不怍則其為之也難察皇甫規之言其心不怍哉夫其審已則干禄見賢則委位故干禄不為貪而委位不求讓稱已不疑伐而讓人無懼情故能功成於戎狄身全於邦家也張奐傳張奐字然明敦煌酒泉人也酒泉縣名地多泉水故城在今永州晉昌縣東北也劉攽曰注在今永州案下文永當作𤓰永州無晉昌也父惇為漢陽太守奐少遊三輔師事太尉朱寵學歐陽尚書初牟氏章句浮辭繁多時牟卿受書於張堪為博士故有牟氏章句有四十五萬餘言奐减為九萬言後辟大將軍梁冀府乃上書桓帝奏其章句詔下東觀以疾去官復舉賢良對䇿第一擢拜議郎永壽元年遷安定屬國都尉初到職而南匈奴左薁鞬臺耆且渠伯徳等七十餘人寇美稷東羌復舉種應之而奐壁唯有二百許人聞即勒兵而出軍吏以為力不敵叩頭争止之奐不聽遂進屯長城收集兵士遣將王衞招誘東羌因據龜兹龜兹音丘慈縣名屬上郡前書音義曰龜兹國人來降之因以名縣也使南匈奴不得交通東羌諸豪遂相率與奐和親共擊薁鞬等連戰破之伯徳惶恐將其衆降郡界以寜羌豪帥感奐恩徳上馬二十匹先零酋長又遺金鐻八枚奐並受之郭璞注山海經云鐻音渠金食器名未詳形制也而召主簿於諸羌前以酒酹地曰以酒沃地謂之酹音力外反使馬如羊不以入廐使金如粟不以入懐悉以金馬還之如羊如粟喻多也羌性貪而貴吏清前有八都尉率好財貨為所患苦及奐正身絜已威化大行遷使匈奴中郎將時休屠各屠音直於反及朔方烏桓並同反叛燒度遼將軍門時度遼將軍屯五原引屯赤阬烟火相望兵衆大恐各欲亡去奐安坐帷中與弟子講誦自若軍士稍安乃潛誘烏桓隂與和通遂使斬屠各渠帥襲破其衆諸胡悉降延熹元年鮮卑寇邊奐率南單于襲之斬首數百級明年梁冀被誅奐以故吏免官禁錮奐與皇甫規友善奐既被錮凡諸交舊莫敢為言唯規薦舉前後七上在家四嵗復拜武威太守平均徭賦率厲散敗常為諸郡最河西由是而全其俗多妖忌凡二月五月產子及與父母同月生者悉殺之奐示以義方嚴加賞罰風俗遂改百姓生為立祠舉尤異遷度遼將軍數載間幽并清靜九年春徴拜大司農鮮卑聞奐去其夏遂招結南匈奴烏桓數道入塞或五六千騎或三四千騎寇掠縁邊九郡殺畧百姓秋鮮卑復率八九千騎入塞誘引東羌與共盟詛於是上郡沈氏安定先零諸種共寇武威張掖縁邊大被其毒朝廷以為憂復拜奐為䕶匈奴中郎將以九卿秩督幽并凉三州及度遼烏桓二營明帝永平八年初置度遼將軍屯五原郡曼柏縣漢官儀曰烏桓校尉屯上谷郡寗縣故曰二營兼察刺史二千石能否賞賜甚厚匈奴烏桓聞奐至因相率還降凡二十萬口奐但誅其首惡餘皆慰納之唯鮮卑出塞去永康元年春東羌先零五六千騎寇關中圍祋祤掠雲陽夏復攻没兩營殺千餘人冬羌岸尾摩蟞等蟞音必薛反脅同種復鈔三輔奐遣司馬尹端董卓並撃大破之斬其酋豪首虜萬餘人三州清定論功當封奐不事宦官故賞遂不行唯賜錢二十萬除家一人為郎並辭不受而願徙屬𢎞農華隂舊制邊人不得内移唯奐因功特聽故始為𢎞農人焉建寜元年振旅而還時竇太后臨朝大將軍竇武與太傅陳蕃謀誅宦官事泄中常侍曹節等於中作亂以奐新徴不知本謀矯制使奐與少府周靖率五營士圍武武自殺蕃因見害奐遷少府又拜大司農以功封侯奐深病為節所賣上書固讓封還印綬卒不肯當明年夏青蛇見於御坐軒前軒殿楹䦨板也又大風雨雹霹靂拔樹詔使百寮各言災應奐上疏曰臣聞風為號令動物通氣翼氏風角曰凡風者天之號令所以譴告人君者也木生於火相須乃明蛇能屈申配龍騰蟄易曰龍蛇之蟄以存身也愼子曰騰蛇游霧飛龍乘雲雲罷霧散與蚯蚓同也順至為休徴逆來為殃咎隂氣專用則凝精為雹故大將軍竇武太傅陳蕃或志寜社稷或方直不回前以䜛勝並伏誅戮海内黙黙人懐震憤昔周公葬不如禮天乃動威尚書大傳周公薨成王欲葬之於成周天乃雷電以風禾即盡偃大木斯拔國人大恐王葬周公於畢示不敢臣也今武蕃忠貞未被明宥妖𤯝之来皆為此也宜急為改葬徙還家屬其從坐禁錮一切蠲除又皇太后雖居南宫而恩禮不接朝臣莫言逺近失望宜思大義顧復之報顧旋視也復反覆也小雅曰父兮生我母兮鞠我顧我復我出入腹我天子深納奐言以問諸黄門常侍左右皆惡之帝不得自從轉奐太常與尚書劉猛刁韙衞良同薦王暢李膺可參三公之選而曹節等彌疾其言遂下詔切責之奐等皆自囚廷尉數日乃得出並以三月俸贖罪司𨽻校尉王寓出於宦官欲借寵公卿以求薦舉百僚畏憚莫不許諾唯奐獨拒之寓怒因此遂陷以黨罪禁錮歸田里奐前為度遼將軍與叚熲爭撃羌不相平及熲為司𨽻校尉欲逐奐歸敦煌將害之奐憂懼奏記謝熲曰小人不明得過州將千里委命以情相歸漢官儀曰司𨽻州部河南雒陽管三輔三河𢎞農七郡所以奐屈於熲稱曰州將焉足下仁篤照其辛苦使人未反復獲郵書恩詔分明前以寫白而州期切促郡縣惶懼屏營延企側待歸命父母朽骨孤魂相託若䝉矜憐壹惠咳唾則澤流黄泉施及冥寞非奐生死所能報塞夫無毛髮之勞而欲求人丘山之用此淳于髠所以拍髀仰天而笑者也拍音片百反髀音歩弟反史記楚發兵伐齊齊威王使淳于髠齎百金車馬十駟之趙請救髠仰天大笑冠纓索絶王曰先生少之乎髠曰今者臣從東方來見道傍有禳田者操一豚蹏酒一盂而祝曰甌婁滿篝汙邪滿車五穀蕃熟穰穰滿家臣見其所持者狹所求者奢故笑於是王乃益黄金千鎰白璧十䨇車馬百駟也誠知言必見譏然猶未能無望何者朽骨無益於人而文王葬之新序曰文王作靈臺掘得死人骨吏以聞文王曰葬之吏曰此無主矣文王曰有天下者天下之主也有一國者一國之主也寡人固其主焉令吏以棺葬之天下聞之曰文王賢矣凙及朽骨又况人乎死馬無所復用而燕昭寳之新序曰燕昭王即位卑身求賢謂郭隗曰齊因孤國之亂而襲燕欲得賢士與共國以雪先王之醜孤之願也先生視可者得身事之隗曰臣聞古之人君有以千金求千里馬者三年不得涓人言於君請求之君遣焉三月得千里馬馬已死乃以五百金買其首以報君大怒曰所求者生馬安市死馬而捐五百金乎對曰死馬且市之况生馬乎天下必以王為能市馬馬今至矣不出朞年千里馬至者三今王誠欲必致士從隗始隗且見事况賢於隗者乎於是王為隗築宫而師之樂毅自魏往鄒衍自齊往劇辛自趙往士爭歸燕焉黨同文昭之徳豈不大哉黨音佗朗反凡人之情寃則呼天窮則叩心今呼天不聞叩心無益誠自傷痛俱生聖世獨為匪人詩小雅曰哀我征夫獨為匪人也孤微之人無所告訴如不哀憐便為魚肉言將為人所吞噬也企心東望無所復言熲雖剛猛省書哀之卒不忍也時禁錮者多不能守靜或死或徙奐閉門不出養徒千人著尚書記難三十餘萬言奐少立志節嘗與士友言曰大丈夫處世當為國家立功邊境及為將帥果有勲名董卓慕之使其兄遺縑百匹奐惡卓為人絶而不受光和四年卒年七十八遺命曰吾前後仕進十要銀艾銀印緑綬也以艾草染之故曰艾也不能和光同塵為䜛邪所忌老子曰和其光同其塵也通塞命也始終常也但地底冥冥長無曉期而復纒以纊綿牢以釘密為不喜耳幸有前窀朝殞夕下措屍靈牀幅巾而已奢非晉文陸翽鄴中記曰永嘉末發齊桓公墓得水銀池金蠶數十箔珠𥜗玉匣繒綵不可勝數左傳曰晉文公朝王請隧王不許曰王章也未有代徳而有二王亦叔父之所惡也晉文既臣請用王禮是其奢也儉非王孫武帝時楊王孫死誡其子為布囊盛屍入地七尺脫去其囊以身親土推情從意庶無咎吝諸子從之武威多為立祠世世不絶所著銘頌書敎誡述志對䇿章表二十四篇長子芝字伯英最知名王愔文字志曰芝少持髙操以名臣子勤學文為儒宗武為將表太尉辟公車有道徴皆不至號張有道尤好草書學崔杜之法家之衣帛必書而後練臨池學書水為之黑下筆則為楷則號怱怱不暇草書為世所寳寸紙不遺韋仲將謂之草聖也芝及弟昶字文舒並善草書至今稱傳之初奐為武威太守其妻懐孕夢帶奐印綬登樓而歌訊之占者曰必將生男復臨兹邦命終此樓既而生子猛以建安中為武威太守殺刺史邯鄲商州兵圍之急猛恥見擒乃登樓自燒而死卒如占云論曰自鄛鄉之封中官世盛宦者鄭衆封鄛鄉侯也暴恣數十年間四海之内莫不切齒憤盈願投兵於其族陳蕃竇武奮義草謀徴㑹天下名士有識所共聞也而張奐見欺豎子揚戈以斷忠烈奐被曹節等矯制使率五營士圍殺陳蕃竇武等雖恨毒在心辭爵謝咎詩云啜其泣矣何嗟及矣詩國風也啜泣貌也音知劣反叚熲傳叚熲字紀明武威姑臧人也其先出鄭共叔段西域都䕶會宗之從曾孫也㑹宗字子松天水上邽人元帝時為西域都䕶死城郭諸國為發喪立祠熲少便習弓馬尚遊俠輕財賄長乃折節好古學初舉孝亷為憲陵園丞陽陵令憲陵順帝陵陽陵景帝陵漢官儀曰丞秩三百石令秩六百石也所在能政劉攽曰案文單言能政不成文理當有一有字遷遼東屬國都尉時鮮卑犯塞熲即率所領馳赴之既而恐賊驚去乃使驛騎詐齎璽書詔熲熲於道偽退潛於還路設伏虜以為信然乃入追熲熲因大縱兵悉斬獲之坐詐璽書伏重刑以有功論司寇刑竟徴拜議郎時太山琅邪賊東郭竇公孫舉等聚衆三萬人破壊郡縣遣兵討之連年不克永壽二年桓帝詔公卿選將有文武者司徒尹訟薦熲漢官儀曰訟字公孫鞏人也乃拜為中郎將擊竇舉等大破斬之獲首萬餘級餘黨降散封熲為列侯賜錢五十萬除一子為郎中延熹二年遷護羌校尉㑹燒當燒何當煎勒姐等八種羌姐音紫且反寇隴西金城塞熲將兵及湟中義從羌萬二千騎出湟谷撃破之追討南渡河使軍吏田晏夏育募先登懸索相引復戰於羅亭大破之斬其酋豪以下二千級獲生口萬餘人虜皆奔走明年春餘羌復與燒何大豪寇張掖攻没鉅鹿塢殺屬國吏民又招同種千餘落并兵晨奔熲軍熲下馬大戰至日中刀折矢盡虜亦引退熲追之且鬭且行晝夜相攻割肉食雪四十餘日遂至河首積石山出塞二千餘里斬燒何大帥首虜五千餘人又分兵擊石城羌斬首溺死者千六百人燒當種九十餘口詣熲降劉攽曰案燒當一種不止九十餘口其種中九十口降亦不足記當作千字又雜種羌屯聚白石白石山在今蘭州狄道縣東熲復進擊首虜三千餘人冬勒姐零吾種圍允街允音鈆街音階殺畧吏民熲排營救之斬獲數百人四年冬上郡沈氐隴西牢姐烏吾諸種羌共寇并凉二州熲將湟中義從討之凉州刺史郭閎貪共其功稽固熲軍使不得進稽固猶停留也義從役久戀鄉舊皆悉反叛郭閎歸罪於熲熲坐徴下獄輸作左校羌遂陸梁覆没營塢轉相招結唐突諸郡於是吏人守闕訟熲以千數朝廷知熲為郭閎所誣詔問其狀熲但謝罪不敢言枉京師稱為長者起於徒中復拜議郎遷并州刺史時滇那等諸種羌五六千人寇武威張掖酒泉燒人廬舍六年寇埶轉盛凉州幾亡冬復以熲為䕶羌校尉乘驛之職明年春羌封僇良多滇那等僇音良逐反又力救反酋豪三百五十五人率三千落詣熲降當煎勒姐種猶自屯結冬熲將萬餘人擊破之斬其酋豪首虜四千餘人八年春熲復撃勒姐種斬首四百餘級降者二千餘人夏進軍撃當煎種於湟中熲兵敗被圍三日用隱士樊志張䇿潛師夜出鳴鼓還戰大破之首虜數千人熲遂窮追展轉山谷間自春及秋無日不戰虜遂饑困敗散北畧武威間熲凡破西羌斬首二萬三千級獲生口數萬人馬牛羊八百萬頭降者萬餘落封熲都鄉侯邑五百戸永康元年當煎諸種復反合四千餘人欲攻武威熲復追擊於鸞鳥大破之鳥音爵縣名屬武威郡故城在今凉州昌松縣北也殺其渠帥斬首三千餘級西羌於此弭定而東羌先零等自覆沒征西將軍馬賢後朝廷不能討遂數寇擾三輔其後度遼將軍皇甫規中郎將張奐招之連年既降又叛桓帝詔問熲曰先零東羌造惡反逆而皇甫規張奐各擁强衆不時輯定欲熲移兵東討未識其宜可參思術畧熲因上言曰臣伏見先零東羌雖數叛逆而降於皇甫規者已二萬許落善惡既分餘寇無幾今張奐躊躇久不進者當慮外離内合兵徃必驚且自冬踐春屯結不散人畜疲羸自亡之埶徒更招降坐制强敵耳臣以為狼子野心難以恩納左傳晉叔向母曰狼子野心也勢窮雖服兵去復動唯當長矛挾脅白刃加頸耳計東種所餘三萬餘落居近塞内路無險折非有燕齊秦趙從横之勢而久亂并凉累侵三輔西河上郡已各内徙安定北地復至單危自雲中五原西至漢陽二千餘里匈奴種羌並擅其地是為癰疽伏疾留滯脅下如不加誅轉就滋大今若以騎五千歩萬人車三千兩三冬二夏足以破定無慮用費為錢五十四億無慮都凡也如此則可令羣羌破盡匈奴長服内徙郡縣得反本土伏計永初中諸羌反叛十有四年用二百四十億永和之末復經七年用八十餘億費耗若此猶不誅盡餘孽復起于兹作害今不暫疲人則永寜無期臣庶竭駑劣伏待節度帝許之悉聽如所上建寜元年春熲將兵萬餘人齎十五日糧從彭陽直指髙平彭陽髙平並縣名屬安定郡彭陽縣即今原州彭原縣也髙平縣今原州也與先零諸種戰於逢義山虜兵盛熲衆恐熲乃令軍中張鏃劉攽曰案文鏃非可張未知何字利刃長矛三重挾以强弩列輕騎為左右翼激怒兵將曰今去家數千里進則事成走必盡死努力共功名因大呼衆皆應聲騰赴熲馳騎於傍突而撃之虜衆大潰斬首八千餘級獲牛馬羊二十八萬頭時竇太后臨朝下詔曰先零東羌歴載為患熲前陳狀欲必掃滅渉履霜雪兼行晨夜身當矢石感厲吏士曾未浹日凶醜奔破浹匝也浹音子牒反謂匝十二辰也連尸積俘掠獲無算洗雪百年之逋負以慰忠將之亡魂東觀記曰太后詔云此以慰种光馬賢等亡魂也功用顯著朕甚嘉之湏東羌盡定當并録功勤今且賜熲錢二十萬以家一人為郎中勑中藏府調金錢綵物增助軍費拜熲破羌將軍夏熲復追羌出橋門至走馬水上東觀記段熲傳曰出橋門谷也尋聞虜在奢延澤即上郡奢延縣界也乃將輕兵兼行一日一夜二百餘里晨及賊擊破之餘虜走向落川復相屯結熲乃分遣騎司馬田晏將五千人出其東假司馬夏育將二千人繞其西羌分六七千人攻圍晏等晏等與戰羌潰走熲急進與晏等共追之於令鮮水上令鮮水名在今甘州張掖縣界一名合黎水一名羌谷水也熲士卒饑渴乃勒衆推方奪其水推方謂方頭競進也虜復散走熲遂與相連綴且鬬且引及於靈武谷靈武縣名有谷在今靈州懐逺縣西北熲乃被甲先登士卒無敢後者羌遂大敗棄兵而走追之三日三夜士皆重繭繭足下傷起形如繭也淮南子曰申包胥重繭重胝也既到涇陽縣名屬安定郡餘寇四千落悉散入漢陽山谷間時張奐上言東羌雖破餘種難盡熲性輕果慮負敗難常宜且以恩降可無後悔詔書下熲熲復上言臣本知東羌雖衆而輭弱易制所以比陳愚慮思為永寜之算而中郎將張奐說虜强難破宜用招降聖朝明監信納瞽言故臣謀得行奐計不用事埶相反遂懐猜恨信叛羌之訴飾潤辭意云臣兵累見折衂傷敗曰衂音女六反又言羌一氣所生不可誅盡言羌亦禀天之一氣所生誅之不可盡也山谷廣大不可空靜血流汙野傷和致災臣伏念周秦之際戎狄為害中興以來羌寇最盛誅之不盡雖降復叛今先零雜種累以反覆攻没縣邑剽畧人物發冢露尸禍及生死上天震怒假手行誅假借也尚書曰皇天降災假手于我有命也昔邢為無道衞國伐之師興而雨左傳曰衞大旱卜有事於山川不吉甯莊子曰昔周饑克殷而年豐今邢方無道天欲衛伐邢乎從之師興而雨也臣動兵渉夏連獲甘澍嵗時豐稔人無疵疫上占天心不為災傷占候也下察人事衆和師克克勝也左傳曰師克在和不在衆也自橋門以西落川以東故宫縣邑更相通屬劉攽曰宫縣案文宫當作官舊屯田營壁皆是故官也非為深險絶域之地車騎安行無應折衂案奐為漢吏身當武職駐軍二年不能平寇虚欲脩文戢戈招降獷敵獷惡貌也音谷猛反誕辭空說僭而無徴何以言之昔先零作寇趙充國徙令居内宣帝時充國撃西羌徙之於金城郡也煎當亂邊馬援遷之三輔遷置天水隴西扶風見西羌傳也始服終叛至今為鯁鯁與梗同梗病也大雅云至今為梗故逺識之士以為深憂今傍郡戶口單少數為羌所創毒而欲令降徒與之雜居是猶種枳棘於良田養虺蛇於室内也故臣奉大漢之威建長久之䇿欲絶其本根不使能殖殖生也左傳曰為國家者見惡如農夫之務去草焉絶其本根勿使能殖本規三嵗之費用五十四億今適朞年所耗未半而餘寇殘燼將向殄滅杜預注左傳曰燼火餘木也臣每奉詔書軍不内御御制御也淮南子曰國不可從外理軍不可從中御也願卒斯言一以任臣臨時量宜不失權便二年詔遣謁者馮禪說降漢陽散羌熲以春農百姓布野羌雖暫降而縣官無廪必當復為盗賊不如乘虚放兵埶必殄滅夏熲自進營去羌所屯凡亭山四五十里遣田晏夏育將五千人據其山上羌悉衆攻之厲聲問曰田晏夏育在此不湟中義從羌悉在何面今日欲決死生軍中恐晏等勸激兵士殊死大戰遂破之羌衆潰東奔復聚射虎谷分兵守諸谷上下門熲規一舉滅之不欲復令散走乃遣千人於西縣結木為柵廣二十歩長四十里遮之西縣屬天水郡故城在今秦州上邽縣西南也分遣晏育等將七千人銜枚夜上西山結營穿塹去虜一里許又遣司馬張愷等將三千人上東山虜乃覺之遂攻晏等分遮汲水道熲自率歩騎進擊水上羌却走因與愷等挾東西山縱兵擊破之羌復敗散熲追至谷上下門窮山深谷之中處處破之斬其渠帥以下萬九千級獲牛馬驢騾氈裘廬帳什物不可勝數馮禪等所招降四千人分置安定漢陽隴西三郡於是東羌悉平凡百八十戰斬三萬八千六百餘級獲牛馬羊騾驢駱駝四十二萬七千五百餘頭費用四十四億軍士死者四百餘人更封新豐縣侯邑萬戸熲行軍仁愛士卒疾病者親自瞻省手為裹創在邊十餘年未嘗一日蓐寢郭璞曰蓐席也言身不自安與將士同苦故皆樂為死戰三年春徴還京師將秦胡歩騎五萬餘人及汗血千里馬生口萬餘人詔遣大鴻臚持節慰勞於鎬鎬水名在今長安縣西也軍至拜侍中轉執金吾河南尹有盗發馮貴人冢坐左轉諫議大夫再遷司𨽻校尉熲曲意宦官故得保其富貴遂黨中常侍王甫枉誅中常侍鄭颯董騰等增封四千戸并前萬四千戸明年代李咸為太尉其冬病罷復為司𨽻校尉數嵗轉潁川太守徴拜太中大夫光和二年復代橋𤣥為太尉在位月餘會日食自劾有司舉奏詔收印綬詣廷尉時司𨽻校尉陽球奏誅王甫并及熲就獄中詰責之遂飲鴆死家屬徙邊後中常侍吕强上疏追訟熲功靈帝詔熲妻子還本郡初熲與皇甫威明張然明並知名顯達京師稱為凉州三明云贊曰山西多猛三明儷蹤儷偶也前書班固曰秦漢以來山東出相山西出將若白起王翦辛慶忌之流皆山西人也戎驂糾結塵斥河潼潼谷名谷有水曰潼水即潼關規奐審䇿亟遏囂凶文會志比更相為容段追兩狄束馬縣鋒紛紜騰突谷靜山空後漢書卷九十五後漢書卷九十五考證張奐傳而召主簿於諸羌何焯曰水經注召主簿張祈入寇掠縁邊九部部毛本作郡奢非晉文注陸翽鄴中記翽監本訛􅀈今改正段熲傳乃令軍中張鏃劉攽曰鏃非可張未知何字按通鑑作長鏃煎當亂邊馬援遷之三輔何焯曰徙滇吾餘種七十餘口於三輔乃永平初馬武事後漢書卷九十五考證
