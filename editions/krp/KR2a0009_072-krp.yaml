body:
  text: 後漢書卷七十二宋宣城太守范煜撰唐章懐太子賢注光武十王列傳第三十二光武十王光武皇帝十一子郭皇后生東海恭王彊沛獻王輔濟南安王康阜陵質王延中山簡王焉許美人生楚王英光烈皇后生顯宗東平憲王蒼廣陵思王荆臨淮懐公衡琅邪孝王京東海恭王彊傳東海恭王彊建武二年立母郭氏為后彊為皇太子十七年而郭后廢彊常慼慼不自安數因左右及諸王陳其懇誠願備蕃國光武不忍遲囘者數嵗乃許焉十九年封為東海王二十八年就國帝以彊廢不以過去就有禮故優以大封兼食魯郡合二十九縣賜虎賁旄頭宫殿設鍾虡之縣擬於乗輿虎賁旄頭鍾虡解見光武紀縣音𤣥彊臨之國數上書讓還東海又因皇太子固辭帝不許深嘉歎之以彊章宣示公卿初魯恭王好宫室起靈光殿甚壯麗是時猶存恭王名餘景帝之子殿在今兗州曲阜城中故基東西二十丈南北十二丈髙丈餘也故詔彊都魯中元元年入朝從封岱山因留京師眀年春帝崩冬歸國永平元年彊病顯宗遣中常侍鉤盾令將太醫乗驛視疾詔沛王輔濟南王康淮陽王延詣魯及薨臨命上疏謝曰臣蒙恩得備蕃輔特受二國宫室禮樂事事殊異巍巍無量訖無報稱而自修不謹連年被疾為朝廷憂念皇太后陛下哀憐臣彊感動發中數遣使者太醫令丞方伎道術絡繹不絶臣伏惟厚恩不知所言臣内自省視氣力羸劣日夜浸困浸漸也終不復望見闕庭奉承帷幄孤負重恩銜恨黄泉杜預注左傳云地中之泉故曰黄泉身既夭命孤弱復為皇太后陛下憂慮誠悲誠慙息政小人也猥當襲臣後必非所以全利之也誠願還東海郡天恩愍哀以臣無男之故無男無多男也處臣三女小國侯即婦人封侯也若吕后之妹吕須封為臨光侯蕭何夫人封為鄼侯之類此臣宿昔常計私計天恩不敢忘也今天下新罹大憂光武崩也惟陛下加供養皇太后數進御餐臣彊困劣言不能盡意願並謝諸王不意永不復相見也天子覽書悲慟從太后出幸津門亭發哀津門洛陽南面西頭門也一名津陽門每門皆有亭使大司空持節護喪事大鴻臚副宗正將作大匠視喪事贈以殊禮升龍旄頭鸞輅龍旂虎賁百人解並見光武及眀帝紀詔楚王英趙王栩北海王興館陶公主比陽公主及京師親戚四姓夫人小侯皆會𦵏四姓小侯解見眀帝紀夫人盖小侯之母也帝追惟彊深執謙儉不欲厚𦵏以違其意於是特詔中常侍杜岑及東海傅相曰王恭謙好禮以徳自終遣送之物務從約省衣足斂形茅車瓦器物減於制以彰王卓爾獨行之志前書曰卓爾不羣者河間獻王近之矣將作大匠留起陵廟彊立十八年年三十四子靖王政嗣政滛欲薄行後中山簡王薨政詣中山㑹𦵏私取簡王姬徐妃又盗迎掖庭出女豫州刺史魯相奏請誅政有詔削薛縣立四十四年薨子頃王肅嗣永元十六年封肅弟二十一人皆為列侯肅性謙儉循恭王法度永初中以西羌未平上錢二千萬元初中復上縑萬匹以助國費鄧太后下詔襃納焉立二十三年薨子孝王臻嗣永建二年封臻二弟敏儉為鄉侯臻及弟蒸鄉侯儉並有篤行母卒皆吐血毁皆眥或為瘠至服練紅兄弟追念初喪父幼小哀禮有闕因復重行喪制既祥之後而服練也禮記曰練衣黄裏縓緣縓即紅也縓音七絹反鄭元注周禮曰淺絳也臻性敦厚有恩常分租秩賑給諸父昆弟國相籍襃具以狀聞順帝美之制詔大將軍三公大鴻臚曰東海王臻以近蕃之尊少襲王爵膺受多福未知艱難而能克己率禮孝敬自然事親盡愛送終竭哀降儀從士寢苫三年左氏傳曰晏桓子卒晏嬰麤衰斬苴絰帶杖菅屨食粥居倚廬寝苫枕草其家老曰非大夫之禮也杜預注云時士及大夫衰服各有不同和睦兄弟恤養孤弱至孝純備仁義兼𢎞朕甚嘉焉夫勸善厲俗為國所先曩者東平孝王敞兄弟行孝喪母如禮有增戸之封詩云永世克孝念兹皇祖詩周頌之文克能也今臻增封五千尸儉五百戸光啓土宇以酬厥徳立三十一年薨子懿王祗嗣初平四年遣子琬至長安奉章獻帝封琬汶陽侯拜為平原相祗立四十四年薨子羡嗣二十年魏受禪以為崇徳侯沛獻王輔傳沛獻王輔建武十五年封右馮翊公劉攽曰案光武紀輔封右翊公此多馮字誤天下亦無右馮翊郡也十七年郭后廢為中山太后故徙輔為中山王并食常山郡二十年復徙封沛王時禁網尚疏諸王皆在京師競修名譽争禮四方賔客壽光侯劉鯉更始子也得幸於輔鯉怨劉盆子害其父因輔結客報殺盆子兄故式侯恭輔坐繋詔獄三日乃得出自是後諸王賓客多坐刑罰各循法度二十八年就國中元二年封輔子寳為沛侯永平元年封寳弟嘉為僮侯僮縣屬臨淮郡故城在今泗州宿預縣西南輔矜嚴有法度好經書善說京氏易孝經論語傳及圖讖作五經論時號之曰沛王通論在國謹節終始如一稱為賢王顯宗敬重數加賞賜立四十六年薨子釐王定嗣釐音僖下皆同元和二年封定弟十二人為鄉侯定立十一年薨子節王正嗣元興元年封正弟二人為縣侯正立十四年薨子孝王廣嗣有固疾安帝詔廣祖母周領王家事周眀正有法禮漢安中薨順帝下詔曰沛王祖母太夫人周秉心淑慎導王以仁使光禄大夫贈以妃印綬廣立三十五年薨子幽王榮嗣立二十年薨子孝王琮嗣薨子恭王曜嗣薨子契嗣魏受禪以為崇徳侯楚王英傳楚王英以建武十五年封為楚公十七年進爵為王二十八年就國母許氏無寵故英國最貧小三十年以臨淮之取慮須昌二縣益楚國取慮縣故城在今泗州下邳縣西南案臨淮無須昌有昌陽縣盖誤也取慮音秋閭自顯宗為太子時英常獨歸附太子太子特親愛之及即位數受賞賜永平元年特封英舅子許昌為龍舒侯龍舒縣屬廬江郡故城在今廬江縣西也英少時好㳺俠交通賔客晚節更喜黄老學為浮屠齋戒祭祀袁宏漢記浮屠佛也西域天竺國有佛道焉佛者漢言覺也將以覺悟羣生也其教以修善慈心為主不殺生專務清静其精者為沙門沙門漢言息也盖息意去欲而歸於無為又以為人死精神不滅随復受形生時善惡皆有報應故貴行善修道以鍊精神以至無生而得為佛也佛長丈六尺黄金色項中佩日月光變化無方無所不入而大濟羣生初眀帝夢見金人長大項有日月光以問羣臣或曰西方有神其名曰佛陛下所夢得無是乎於是遣使天竺問其道術而圗其形象焉八年詔令天下死罪皆入縑贖英遣郎中令奉黄縑白紈三十匹詣國相曰託在蕃輔過惡累積歡喜大恩奉送縑帛以贖愆罪國相以聞詔報曰楚王誦黄老之微言尚浮圗之仁祠潔齋三月與神為誓何嫌何疑當有悔吝其還贖以助伊蒲塞桑門之盛饌伊蒲塞即優婆塞也中華翻為近住言受戒行堪近僧住也桑門即沙門因以班示諸國中傅英後遂大交通方士作金龜玉鶴刻文字以為符瑞十三年男子燕廣告英與漁陽王平顔忠等造作圗書有逆謀事下案驗有司奏英招聚姦猾造作圗讖擅相官秩置諸侯王公將軍二千石大逆不道請誅之帝以親親不忍乃廢英徙丹陽涇縣今宣州縣也賜湯沐邑五百戸湯沐解見皇后紀也遣大鴻臚持節護送使伎人奴婢妓士鼓吹悉從得乗輜軿軿猶屏也自隐蔽之車蒼頡篇曰衣車也劉攽曰奴婢妓士案文妓當作技士當作工又當工在技上上文伎人即是伎樂此工技是巧匠也梁節王傳中亦有工技也持兵弩行道射獵極意自娱男女為侯主者食邑如故椘太后勿上璽綬留住楚宫眀年英至丹陽自殺立三十三年國除詔遣光禄大夫持節弔祠贈賵如法加賜列侯印綬以諸侯禮𦵏於涇遣中黄門占護其妻子占䕶猶守䕶也悉出楚官屬無辭語者制詔許太后曰國家始聞楚事幸其不然既知審實懐用悼灼庶欲宥全王身令保卒天年而王不念顧太后竟不自免此天命也無可奈何太后其保養幼弱勉彊飲食諸許願王富貴人情也已詔有司出其有謀者令安田宅於是封燕廣為折姦侯楚獄遂至累年其辭語相連自京師親戚諸侯州郡豪傑及考案吏阿附相䧟坐死徙者以千數十五年帝幸彭城見許太后及英妻子於内殿悲泣感動左右建初二年肅宗封英子楚侯种五弟皆為列侯並不得置相臣吏人元和三年許太后薨復遣光禄大夫持節弔祠因留護喪事賻錢五百萬又遣謁者備王官屬迎英喪改𦵏彭城加王赤綬羽盖華藻如嗣王儀續漢輿服志曰諸侯王赤綬四采長二丈一尺皇子安車青盖金華藻追爵謚曰楚厲侯章和元年帝幸彭城見英夫人及六子厚加贈賜种後徙封陸侯陸縣名屬廬江郡卒子度嗣度卒子拘嗣傳國於後濟南安王康傳濟南安王康建武十五年封濟南公十七年進爵為王二十八年就國三十年以平原之祝阿安徳朝陽平昌隰隂重邱六縣益濟南國中元二年封康子徳為東武城侯東武城屬清河郡今貝州武城縣是康在國不循法度交通賔客其後人上書告康招来州郡姦猾漁陽顔忠劉子産等又多遺其繒帛案圖書謀議不軌事下考有司舉奏之顯宗以親親故不忍窮竟其事但削祝阿隰隂東朝陽安徳西平昌五縣東朝陽在今齊州臨濟縣東西平昌今徳州般縣也般音補滿反建初八年肅宗復還所削地康遂多殖財貨大修宫室奴婢至千四百人廐馬千二百匹私田八百頃奢侈恣欲㳺觀無節永元初國傅何敞上疏諫康曰盖聞諸侯之義制節謹度然後能保其社稷和其民人孝經諸侯章之義也大王以骨肉之親享食茅土當施張政令眀其典法出入進止宜有期度輿馬臺隸應為科品臺隸賤職也左氏傳曰人有十等王臣公公臣卿卿臣大夫大夫臣士士臣皁皁臣輿輿臣隸隸臣僚僚臣僕僕臣臺也而今奴婢廐馬皆有千餘增無用之口以自蠶食言如蠶之食漸至衰盡也宫婢閉隔失其天性感亂和氣又多起内第觸犯防禁費以巨萬巨大也大萬謂萬萬而功猶未半夫文繁者質荒木勝者人亡荒廢也文彩繁多則質以之廢土木増構則人殫其力故云人亡皆非所以奉禮承上傳福無窮者也故楚作章華以凶左氏傳楚靈王成章華之臺後卒被殺杜預注云臺在今南郡華容縣也吳興姑蘇而滅姑蘇臺一名姑胥臺越絶書曰胥門外有九曲路闔廬以㳺姑蘇之臺以望湖中顧夷吾地記云横山北有小山俗謂姑蘇臺今在蘇州吳縣西闔廬後被越殺之景公千駟民無稱焉論語齊景公有馬千駟死之日民無徳而稱焉千駟四千匹今數㳺諸第晨夜無節又非所以逺防未然臨深履薄之法也願大王修恭儉遵古制省奴婢之口減乗馬之數斥私田之富節游觀之宴以禮起居則敞乃敢安心自保惟大王深慮愚言康素敬重敞雖無所嫌牾然終不能改立五十九年薨子簡王錯嗣錯音七故反錯為太子時愛康鼓吹妓女宋閏使醫張尊招之不得錯怒自以劒刺殺尊國相舉奏有詔勿案永元十一年封錯弟七人為列侯錯立六年薨子孝王香嗣永初二年封香弟四人為列侯香篤行好經書初叔父篤有罪不得封西平昌侯昱坐法失侯香乃上書分爵土封篤子丸昱子嵩皆為列侯香立二十年薨無子國絶永建元年順帝立錯子阜陽侯顯為嗣是為釐王立三年薨子悼王廣嗣永建五年封廣弟文為樂城亭侯廣立二十五年永興元年薨無子國除東平憲王蒼傳子任城孝王尚東平憲王蒼建武十五年封東平公十七年進爵為王蒼少好經書雅有智思為人羙須􅐖要帶十圍顯宗甚愛重之及即位拜為驃騎將軍置長史掾史員四十人位在三公上四府掾史皆無四十人今特置以優之也永平元年封蒼子二人為縣侯二年以東郡之夀張須昌山陽之南平陽稾湖陵五縣益東平國南平陽縣故城今兗州鄒縣也稾縣一名髙平故城在鄒縣西南湖陵故城在今兗州防與縣東南是時中興三十餘年四方無虞蒼以天下化平宜修禮樂乃與公卿共議定南北郊冠冕車服制度及光武廟登歌八佾舞數語在禮樂輿服志其志今亾帝每廵狩蒼常留鎮侍衞皇太后四年春車駕近出觀覽城第第宅也有甲乙之次故曰第尋聞當遂校獵河内蒼即上書諫曰臣聞時令盛春農事不聚衆興功禮記月令曰孟春之月無聚大衆無置城郭仲春之月無作大事以妨農事也傳曰田獵不宿食飲不享出入不節則木不曲直此失春令者也尚書五行傳曰田獵不宿飲食不享出入不節奪人農時及有姦謀則木不曲直鄭𤣥注云木性或曲或直人所用為器者也無故生不暢茂多有折槁是為不曲直也前書音義曰不宿不預戒日也臣知車駕今出事從約省所過吏人諷誦甘棠之德雖然動不以禮非所以示四方也惟陛下因行田野循視稼穡消揺仿佯弭節而旋皆㳺散之意詩曰於焉消揺左氏傳曰横流而仿佯前書音義曰弭節猶按節也言不盡意馳驅也至秋冬乃振威靈整法駕備周衞設羽旄旄謂注旄於竿首詩云抑抑威儀惟德之隅詩大雅之文也抑抑宻也隅亷也言人審密於威儀抑抑然者其徳必嚴正如宫室之制内䋲直則外有亷隅臣不勝憤懣伏自手書乞詣行在所極陳至誠帝覽奏即還宫蒼在朝數載多所隆益而自以至親輔政聲望日重意不自安上疏歸職曰臣蒼疲駑特為陛下慈恩覆護在家被教導之仁升朝蒙爵命之首制書襃羙班之四海舉負薪之才升君子之器負薪喩小人也易曰負且乗致㓂至負也者小人之事乗也者君子之器以小人而乗君子之器則盗思奪之矣凡匹夫一介尚不忘簞食之恵簞竹器也圓曰簞方曰笥左氏傳曰晋宣子田於首山舍於翳桑見靈輙餓曰不食三日矣食之舍其半問之曰宦三年矣未知母之存否請遺之使盡之而為簞食與肉以與之既而輙為公介士倒㦸以禦公徒而免之問何故曰翳桑之餓人也況臣居宰相之位同氣之親哉宜當暴骸膏野為百寮先而愚頑之質加以固病誠羞負乗辱汙輔將之位將被詩人三百赤紱之刺赤紱大夫之服也詩曹風曰彼己之子三百赤紱刺其無徳居位者多也今方域晏然要荒無儆去王畿五百里曰甸服又五百里曰侯服又五百里曰綏服又五百里要服又五百里荒服儆備也音警將遵上徳無為之時也文官猶可併省武職尤不宜建昔象封有鼻不任以政有鼻國名其地在今永州營道縣北史記曰舜弟象封於有鼻也誠由愛深不忍揚其過惡前事之不忘來事之師也自漢興以来宗室子弟無得在公卿位者惟陛下審覽虞帝優養母弟遵承舊典終卒厚恩乞上驃騎將軍印綬退就蕃國願蒙哀憐帝優詔不聽其後數陳乞辭甚懇切五年乃許還國而不聽上將軍印綬以驃騎長史為東平太傅掾為中大夫令史為王家郎漢官儀將軍掾屬二十九人中大夫無員令史四十一人也加賜錢五千萬布十萬匹六年冬帝幸魯徴蒼從還京師明年皇太后崩既𦵏蒼乃歸國特賜宫人奴婢五百人布二十五萬匹及珍寳服御器物十一年蒼與諸王朝京師月餘還國帝臨送歸宫悽然懐思乃遣使手詔國中傅曰辭别之後獨坐不樂因就車歸伏軾而吟瞻望永懐實勞我心誦及采菽以增歎息采菽詩小雅之章也其詩曰采菽采菽筐之筥之君子來朝何錫與之毛萇注云菽所以芼太牢而待君子也日者問東平王䖏家何等最樂王言為善最樂其言甚大副是要腹矣今送列侯印十九枚諸王子年五嵗已上能趨拜者皆令帶之十五年春行幸東平賜蒼錢千五百萬布四萬匹帝以所作光武本紀示蒼蒼因上光武受命中興頌帝甚善之以其文典雅特令校書郎賈逵為之訓詁肅宗即位尊重恩禮踰於前世諸王莫與為比建初元年地震蒼上便宜三事留中留禁中也帝報書曰丙寅所上便宜三事朕親自覽讀反覆數周心開目眀曠然發矇韋昭注國語曰有眸子而無見曰矇間吏人奏事亦有此言但明智淺短或謂儻是復慮為非何者灾異之降緣政而見今改元之後年飢人流此朕之不徳感應所致又冬春旱甚所被尤廣雖内用克責而不知所定得王深䇿快然意解詩不云乎未見君子憂心忡忡既見君子我心則降詩國風也忡忡猶衝衝降下也思惟嘉謨以次奉行冀蒙福應彰報至徳特賜王錢五百萬後帝欲為原陵顯節陵起縣邑蒼聞之遽上疏諫曰伏聞當為二陵起立郭邑臣前頗謂道路之言疑不審實近令從官古霸問湼陽主疾風俗通曰古姓周有古公亶父其後氏焉湼陽主光武女竇固之妻也使還乃知詔書已下竊見光武皇帝躬履儉約之行深覩始終之分勤勤懇懇以𦵏制為言故營建陵地具稱古典詔曰無為山陵陂池裁令流水而已孝眀皇帝大孝無違奉承貫行貫行謂一皆遵奉也谷永曰一以貫行固執無違也至於自所營創尤為儉省謙徳之羙於斯為盛易曰謙徳之柄臣愚以園邑之興始自彊秦古者邱隴且不欲其著眀禮記曰古者墓而不墳故言不欲其著眀豈況築郭邑建都郛哉榖梁傳曰人之所聚曰都杜預注左傳曰郛郭也上違先帝聖心下造無益之功虚費國用動揺百姓非所以致和氣祈豐年也又以吉凶俗數言之亦不欲無故繕修邱墓有所興起考之古法則不合稽之時宜則違人求之吉凶復未見其福陛下履有虞之至性追祖禰之深思然懼左右過議以累聖心臣蒼誠傷二帝純徳之羙不暢於無窮也惟蒙哀覽帝從而止自是朝廷每有疑政輙驛使諮問蒼悉心以對皆見納用三年帝饗衞士於南宫因從皇太后周行掖庭池閣乃閱隂太后舊時器服愴然動容乃命留五時衣各一襲五時衣謂春青夏朱季夏黄秋白冬黒也衣單複具曰襲及常所御衣合五十篋餘悉分布諸王主及子孫在京師者各有差特賜蒼及琅邪王京書曰中大夫奉使親聞動靜嘉之何已嵗月騖過山陵浸逺孤心悽愴如何如何間饗衞士於南宫因閱視舊時衣物聞於師曰其物存其人亡不言哀而哀自至信矣惟王孝友之德亦豈不然今送光烈皇后假紒帛巾各一周禮追師掌王后之首服為副編鄭𤣥云副婦人首服三輔謂之假紒續漢書帛字作皁及衣一篋可時奉瞻以慰凱風寒泉之思詩國風曰凱風羙孝子也凱風自南吹彼棘心棘心夭夭母氏劬勞爰有寒泉在浚之下有子七人母氏勞苦寒泉在今濮州濮陽縣又欲令後生子孫得見先后衣服之製今魯國孔氏尚有仲尼車輿冠履眀徳盛者光靈逺也孔子廟在魯曲阜城中伍緝之從西征記曰魯人藏孔子所乗車於廟中是顔路所請者也獻帝時廟遇火燒之冠履解見鍾離意傳其光武皇帝器服中元二年已賦諸國故不復送并遺宛馬一匹血從前髆上小孔中出常聞武帝歌天馬霑赤汗今親見其然也前書天馬歌曰太一況天馬下霑赤汗沬流赭也頃反虜尚屯將帥在外憂念皇皇未有間寜間音閑願王寳精神加供養苦言至戒望之如渴六年冬蒼上疏求朝眀年正月帝許之特賜裝錢千五百萬其餘諸王各千萬帝以蒼冐渉寒露遣謁者賜貂裘說文曰貂䑕屬也大而黄黒出丁零國及大官食物珍果使大鴻臚竇固持節郊迎帝乃親自循行邸第豫設帷牀其錢帛器物無不充備下詔曰禮伯父歸寜乃國儀禮曰覲禮諸侯至於郊王使皮弁用璧勞侯氏亦皮弁迎于帷門之外再拜天子賜舍曰賜伯父舍同姓西面北上異姓東面北上侯氏禆冕釋幣于禰乗墨車載龍旂弧韣乃朝以瑞玉有繅天子負斧扆曰伯父實來余一人嘉之奉束帛匹馬卓上九馬随之奠幣再拜侯氏降天子辭於侯氏曰伯父無事歸寧乃邦侯氏再拜稽首而出也劉攽曰詔曰禮伯父歸寧案帝意欲推尊諸王引用經義既下文有詩云即此亦當有禮云字此伯父歸寧之語本出儀禮也詩云叔父建爾元子詩魯頌之文也叔父謂周公也建元子謂封伯禽也敬之至也昔蕭相國加以不名優忠賢也見前書王莽傳況兼親尊者乎其沛濟南東平中山四王讃皆勿名讃謂讃者不唱其名蒼既至升殿乃拜天子親答之其後諸王入宫輙以輦迎至省閤乃下蒼以受恩過禮情不自寧上疏辭曰臣聞貴有常尊賤有等威左傳隨武子之辭也等威威儀有差等也卑髙列序上下以理陛下至徳廣施慈愛骨肉既賜奉朝請咫尺天儀而親屈至尊降禮下臣每賜讌見輙興席改容中宫親拜事過典故臣惶怖戰慄誠不自安每會見踧踖無所措置踧踖謙譲貌也此非所以章示羣下安臣子也帝省奏歎息愈襃貴焉舊典諸王女皆封鄉主乃獨封蒼五女為縣公主三月大鴻臚奏遣諸王歸國帝特留蒼賜以祕書列仙圖道術祕方至八月飲酎畢飲酎解見章紀有司復奏遣蒼乃許之手詔賜蒼曰骨肉天性誠不以逺近為親疏然數見顔色情重昔時念王久勞思得還休欲署大鴻臚奏不忍下筆顧授小黄門中心戀戀惻然不能言大鴻臚奏王歸國小黄門受詔者於是車駕祖送流涕而訣復賜乗輿服御珍寳輿馬錢布以億萬計蒼還國疾病帝馳遣名醫小黄門侍疾使者冠蓋不絶於道又置驛馬千里傳問起居眀年正月薨詔告中傅封上蒼自建武以来章奏及所作書記賦頌七言别字歌詩並集覽焉遣大鴻臚持節五官中郎將副監喪及將作使者凡六人令四姓小侯諸國王主悉㑹詣東平奔喪賜錢前後一億布九萬匹及𦵏䇿曰惟建初八年三月己夘皇帝曰咨王丕顯勤勞王室親受䇿命昭于前世出作蕃輔克愼明德率禮不越率循也越違也傅聞在下傅音敷敷布也書曰克愼明德敷聞在下昊天不弔不報上仁俾屏余一人夙夜焭焭靡有所終俾使也屏蔽也左氏傳曰昊天不弔不憗遺一老俾屏余一人焭焭余在疚也今詔有司加賜鸞輅乘馬龍旂九旒虎賁百人奉送王行匪我憲王其孰離之離被也言非憲王誰更被蒙此㤙也魂而有靈保兹寵榮嗚呼哀哉立四十五年子懐王忠嗣明年帝乃分東平國封忠弟尚為任城王餘五人為列侯忠立十一年薨子孝王敞嗣元和三年行東廵守幸東平宫帝追感念蒼謂其諸子曰思其人至其鄉其處在其人亡因泣下沾襟遂幸蒼陵為陳虎賁鸞輅龍旂以章顯之祠以太牢親拜祠坐哭泣盡哀賜御劒于陵前陵在今鄆州東峗山南峗音魚委反初蒼歸國驃騎時吏丁牧周栩以蒼敬賢下士不忍去之遂為王家大夫數十年事祖及孫帝聞皆引見於前既愍其淹滯且欲掦蒼徳美即皆擢拜議郎牧至齊相栩上蔡令永元十年封蒼孫梁為矜陽亭侯敞弟六人為列侯敞喪母至孝國相陳珍上其行狀永寧元年鄧太后増邑五千戸又封蒼孫二人為亭侯敞立四十八年薨子頃王端嗣立四十七年薨子凱嗣立四十一年魏受禪以為崇徳侯論曰孔子稱貧而無諂富而無驕未若貧而樂富而好禮者也若東平憲王可謂好禮者也若其辭至戚去母后豈欲茍立名行而忘親遺義哉蓋位疑則隙生累近則喪大憂累既近所喪必大斯蓋明哲之所為歎息嗚呼逺隙以全忠釋累以成孝夫豈憲王之志哉言其本志然也東海恭王遜而知廢遜讓也為呉太伯不亦可乎左傳曰晋大夫士蔿之辭也吳太伯周太王之長子讓其弟季歴因適吳越采藥太王没而不反事見史記也任城孝王尚元和元年封食任城亢父樊三縣亢父樊並屬東平國亢父故城在今兖州任城縣南樊故城在今瑕丘縣西南也立十八年薨子貞王安嗣永元十四年封母弟福為桃鄉侯永初四年封福弟亢為當塗鄉侯安性輕易貪吝數㣲服出入游觀國中取官屬車馬刀劒下至衛士米肉皆不與直元初六年國相行宏奏請廢之安帝不忍以一嵗租五分之一贖罪安立十九年薨子節王崇嗣順帝時羌虜數反崇輒上錢帛佐邊費及帝崩復上錢三百萬助山陵用度朝廷嘉而不受立三十一年薨無子國絶延熹四年桓帝立河間孝王子恭為參户亭侯博為任城王劉攽曰案文多一為字又恭字合在上孝王名恭也以奉其祀杜預注左傳曰今丹水縣北有三户亭故城在今鄧州内鄉縣西南也博有孝行喪母服制如禮増封三千户立十三年薨無子國絶熹平四年靈帝復立河間貞王遜子新昌侯佗為任城王奉孝王後立四十六年魏受禪以為崇徳侯阜陵質王延傳阜陵質王延建武十五年封淮陽公十七年進爵為王二十八年就國三十年以汝南之長平西華新陽扶樂四縣益淮陽國長平故城在今陳州宛丘縣西北西華故城在今溵水縣西北新陽故城在今豫州眞陽西南扶樂故城在今陳州太康縣北也延性驕奢而遇下嚴烈永平中有上書告延與姬兄謝弇及姊館陶主壻駙馬都尉韓光招姦猾作圖讖祠祭祝詛事下案驗光弇被殺辭所連及死徙者甚衆有司奏請誅延顯宗以延罪薄於楚王英故特加㤙徙為阜陵王食二縣延既徙封數懐怨望建初中復有告延與子男魴造逆謀者有司奏請檻車徵詣廷尉詔獄肅宗下詔曰王前犯大逆罪惡尤深有同周之管蔡漢之淮南淮南厲王長高帝子文帝時反被遷於蜀而死也經有正義律有明刑公羊傳曰君親無將將而必誅前書曰大逆無道父母妻子同産無少長皆棄市先帝不忍親親之恩枉屈大法為王受愆愆過也反而不誅先帝之過故言為王受過也羣下莫不惑焉今王曽莫悔悟悖心不移逆謀内潰自子魴發誠非本朝之所樂聞朕惻然傷心不忍致王于理今貶爵為阜陵侯食一縣獲斯辜者侯自取焉於戲誡哉赦魴等罪勿驗使謁者一人監䕶延國不得與吏人通章和元年行幸九江賜延書與車駕會壽春帝見延及妻子愍然傷之乃下詔曰昔周之爵封千有八百而姬姓居半者所以楨幹王室也朕南廵望淮海意在阜陵遂與侯相見侯志意衰落形體非故瞻省懐感以喜以悲今復侯為阜陵王増封四縣并前為五縣以阜陵下濕徙都壽春加賜錢千萬布萬疋安車一乘夫人諸子賞賜各有差明年入朝立五十一年薨子殤王冲嗣永元二年下詔盡削除前班下延事冲立二年薨無嗣和帝復封冲兄魴是為頃王永元八年封魴弟十二人為鄉亭侯魴立三十年薨子懐王恢嗣延光三年封恢兄弟五人為鄉亭侯恢立十年薨子節王代嗣陽嘉二年封代兄便親為勃遒亭侯代立十四年薨無子國絶建和元年桓帝立勃遒亭侯便親為恢嗣是為恭王立十三年薨子孝王統嗣立八年薨子王赦立建安中薨無子國除廣陵思王荆傳廣陵思王荆建武十五年封山陽公十七年進爵為王荆性刻急隐害隐害謂隂害於人也有才能而喜文法光武崩大行在前殿荆哭不哀而作飛書封以方底方底囊所以盛書也前書曰緑綈方底令蒼頭詐稱東海王彊舅大鴻臚郭況書與彊曰君王無罪猥被斥廢而兄弟至有束縛入牢獄者太后失職别守北宫太后郭后也職常也失其常位别遷北宫及至年老逺斥居邊封之於魯海内深痛觀者鼻酸及太后尸柩在堂洛陽吏以次捕斬賔客至有一家三尸伏堂者痛甚矣今天下有喪弓弩張設甚備間梁松勑虎賁史曰吏以便宜見非勿有所拘以便宜之事而有非者當即行之勿拘常制也封侯難再得也郎官竊悲之為王寒心累息累息猶疊息也今天下争欲思刻賊王以求功寧有量邪若歸并二國之衆可聚百萬君王為之主鼓行無前功易於太山破雞子輕於四馬載鴻毛此湯武兵也今年軒轅星有白氣星家及喜事者喜事猶好事也喜音許氣反皆云白氣者喪軒轅女主之位又太白前出西方至午兵當起洪範五行傳曰太白少隂之星以己未為界不得經天而行太白經天而行為不臣今至午是為經天也又太子星色黒至辰日輒變赤天官書曰心前星太子之位也夫黒為病赤為兵王努力卒事髙袓起亭長陛下興白水何況於王陛下長子故副主哉上以求天下事必舉下以雪除沉没之恥報死母之讎精誠所加金石為開韓詩外傳曰昔者楚熊渠子夜行見寢石以為伏虎彎弓而射之沒金飲羽下視知其石也因復射之見其誠心而金石躍無迹熊渠子之開而况人乎當為秋霜無為檻羊秋霜肅殺於物檻羊受制於人雖欲為檻羊又可得乎竊見諸相工言王貴天子法也人主崩亡閭閻之伍尚為盜賊欲有所望何況王邪夫受命之君天之所立不可謀也今新帝人之所置彊者為右願君王為髙袓陛下所志陛下即光武也無為扶蘇將閭呌呼天也扶蘇秦始皇之太子將閭庻子也扶蘇以數諫始皇使與蒙恬守北邊始皇死於沙丘少子胡亥詐立賜扶蘇死將閭昆弟三人囚於内宫胡亥使謂將閭曰公子不臣罪當死將閭乃仰天而大呼天者三曰天乎吾無罪昆弟三人皆流涕伏劒自殺事見史記彊得書惶怖即執其使封書上之顯宗以荆母弟祕其事遣荆出止河南宫時西羌反荆不得志冀天下因羌驚動有變私迎能為星者與謀議帝聞之乃徙封荆廣陵王遣之國其後荆復呼相工謂曰我貌類先帝先帝三十得天下我今亦三十可起兵未相者詣吏告之荆惶恐自繫獄帝復加恩不考極其事下詔不得臣屬吏人唯食租如故使相中尉謹宿衛之荆猶不改其後使巫祭祀祝詛有司舉奏請誅之荆自殺立二十九年死帝憐傷之賜諡曰思王十四年封荆子元壽為廣陵侯服王璽綬食荆故國六縣又封元壽弟三人為鄉侯明年帝東廵狩徵元壽兄弟會東平宫班賜御服器物又取皇子輿馬悉以與之建初七年肅宗詔元壽兄弟與諸王俱朝京師元壽卒子商嗣商卒子條嗣傳國于後臨淮懐公衡傳臨淮懐公衡建武十五年立未及進爵為王而薨無子國除中山簡王焉傳中山簡王焉建武十五年封左馮翊公劉攽曰案光武紀封焉左翊公與右翊相配十七年進爵為王焉以郭太后少子故獨留京師三十年徙封中山王永平二年冬諸王來會辟雍事畢歸蕃詔焉與俱就國從以虎賁官騎漢官儀騶騎王家名官騎焉上書辭讓顯宗報曰凡諸侯出境必備左右故夾谷之會司馬以從穀梁傳曰公會齊侯于頰谷齊人鼔譟欲以執魯君孔子歴階而上命司馬止之左氏傳頰谷作夾谷今五國各官騎百人稱娖前行娖音楚角反稱娖猶齊整也行音胡朗反皆北軍胡騎便兵善射弓不空發中必決眥司馬相如子虚之文夫有文事必有武備所以重蕃職也王其勿辭帝以焉郭太后偏愛特加恩寵獨得徃來京師十五年焉姬韓序有過焉縊殺之國相舉奏坐削安險縣安險屬中山郡元和中肅宗復以安險還中山立五十二年永元二年薨自中興至和帝時皇子始封薨者皆賻錢三千萬布三萬疋嗣王薨賻錢千萬布萬匹是時竇太后臨朝竇憲兄弟擅權太后及憲等東海出也爾雅曰女子之子謂出也故睦於焉而重於禮加賻錢一億詔濟南東海二王皆會大為修冢塋開神道墓前開道建石柱以為標謂之神道平夷吏人冢墓以千數作者萬餘人發常山鉅鹿涿郡柏黄腸雜木黄腸柏木黄心三郡不能備復調餘州郡工徒及送致者數千人凡徵發搖動六州十八郡制度餘國莫及子夷王憲嗣永元四年封憲弟十一人為列侯憲立二十二年薨子孝王宏嗣永寧元年封宏二弟為亭侯宏立二十八年薨子穆王暢嗣永和六年封暢弟荆為南鄉侯暢立三十四年薨子節王稚嗣無子國除琅邪孝王京傳琅邪孝王京建武十五年封琅邪公十七年進爵為王京性恭孝好經學顯宗尤愛幸賞賜恩寵殊異莫與為比永平二年以太山之蓋南武陽華蓋縣故城在今沂州沂水縣西北南武陽縣故城在今沂州費縣西又華縣故城在費縣東北也東萊之昌陽盧鄉東牟六縣益琅邪昌陽今萊州縣也故城在今聞登縣西南盧鄉故城在今昌陽縣西北東牟故城在聞登縣西北也五年乃就國光烈皇后崩帝悉以太后遺金寳財物賜京京都莒好修宫室窮極伎巧殿館璧帶皆飾以金銀璧帶壁中之横木也以金銀為釘飾其上數上詩賦頌徳帝嘉美下之史官京國中有城陽景王祠吏人奉祠神數下言宮中多不便利京上書願徙宮開陽以華蓋南武陽厚丘贛楡五縣華縣蓋縣南武陽屬泰山郡厚丘屬東海郡贛楡屬琅邪郡易東海之開陽臨沂肅宗許之立三十一年薨𦵏東海即丘廣平亭有詔割亭屬開陽開陽縣屬東海郡故城在今沂州臨沂縣北子夷王宇嗣建初七年封宇弟十三人為列侯元和元年封孝王孫二人為列侯宇立二十年薨子恭王壽嗣永初元年封壽弟八人為列侯立十七年薨子貞王尊嗣延光二年封尊弟四人為鄉侯尊立十八年薨子安王據嗣永和五年封據弟三人為鄉侯據立四十七年薨子順王容嗣初平元年遣弟邈至長安奉章貢獻帝以邈為九江太守封陽都侯陽都縣屬城陽國故城在今沂州承縣南承音常證反容立八年薨國絶初邈至長安盛稱東郡太守曹操忠誠於帝操以此徳於邈建安十一年復立容子熙為王在位十一年坐謀欲過江被誅國除贊曰光武十子胙土分王沛獻尊節楚英流放尊音祖本反禮記曰恭敬撙節鄭𤣥注云撙趨也延既怨詛荆亦觖望濟南隂謀琅邪驕宕中山臨淮無聞夭喪二王早終名聞未著也東平好善辭中委相謙謙恭王實惟三讓後漢書卷七十二後漢書卷七十二考證東平憲王蒼傳山陽之南平陽槀湖陵臣會汾按前後書志山陽無槀有橐臣瓉音拓此傳與注槀字傳寫俱誤應改正驃騎時吏時字應從通鑑作府後漢書卷七十二考證
