body:
  text: 後漢書卷八十三宋宣城太守范煜撰唐章懐太子賢注周黄徐姜申屠列傳第四十三易曰君子之道或出或處或黙或語上繫之辭也言賢哲所行其趣異也孔子稱蘧伯玉邦有道則仕邦無道則可卷而懐也論語蘧伯玉名瑗衛大夫也卷而懷謂不預時政不忤於人者也然用舍之端君子之所以存其誠也誠實也孔子曰用之則行舍之則藏易曰閑邪存其誠故其行也則濡足䝉垢出身以効時新序曰申屠狄非時將自投河崔嘉聞而止之曰吾聞聖人從事於天地之間人之父母也今為濡足之故不救溺人乎及其止也則窮棲茹菽藏寶以迷國爾雅曰啜茹也孫卿子曰君子啜菽飲水非愚也是節然也論語曰陽貨謂孔子曰懐其寶而迷其邦可謂仁乎太原閔仲叔者謝承書曰閔貢字仲叔世稱節士雖周黨之潔清自以弗及也黨見其含菽飲水遺以生蒜受而不食黨與仲叔同郡亦貞介士也見逸人傳皇甫謐高士傳曰黨見仲叔食無菜遺之生蒜仲叔曰我欲省煩耳今更作煩邪受而不食建武中應司徒侯霸之辟既至霸不及政事徒勞苦而已勞其勤苦也勞音力到反仲叔恨曰始䝉嘉命且喜且懼今見明公喜懼皆去以仲叔為不足問邪不當辟也辟而不問是失人也遂辭出投劾而去案罪曰劾自投其劾狀而去也投猶下也今有投辭投牒之言也復以博士徴不至客居安邑老病家貧不能得肉日買猪肝一片屠者或不肯與安邑令聞勅吏常給焉仲叔怪而問之知乃歎曰閔仲叔豈以口腹累安邑邪遂去客沛以夀終仲叔同郡荀恁字君大恁音而甚反少亦脩清節資財千萬父越卒悉散與九族隠居山澤以求厥志王莽末匈奴宼其本縣廣武廣武縣屬太原郡故城在今代州鴈門縣聞恁名節相約不入荀氏閭光武徴以病不至永平初東平王蒼為驃騎將軍開東閤延賢俊辟而應焉及後朝㑹顯宗戲之曰先帝徴君不至驃騎辟君而来何也對曰先帝秉徳以惠下故臣可得不来驃騎執法以檢下檢猶察也故臣不敢不至後月餘罷歸卒於家桓帝時安陽人魏桓字仲英亦數被徴其鄉人勸之行桓曰夫干禄求進所以行其志也今後宫千數其可損乎廐馬萬匹其可減乎左右悉權豪其可去乎皆對曰不可桓乃慨然歎曰使桓生行死歸於諸子何有哉若忤時强諫死而後歸於諸勸行者復何益也遂隠身不出若二三子可謂識去就之槩候時而處槩節也候時以居不失去就也夫然豈其枯槁茍而已哉蓋詭時審己以成其道焉詭違也迹若違時志存量己也余故列其風流區而載之言其清潔之風各有條流故區别而紀之周爕傳周燮字彥祖汝南安城人決曹掾燕之後也燕見獨行篇周嘉傳燮生而欽頤折頞醜狀駭人頤頷也欽頤曲頷也說文曰頞鼻莖也折亦曲也欽音丘凡反欽或作顩音同其母欲棄之其父不聽曰吾聞賢聖多有異貌伏羲牛首女媧蛇軀臯陶鳥喙孔子牛脣是聖賢異貌也又蔡澤亦顩頤蹙頞興我宗者乃此兒也於是養之始在髫鬌而知廉讓髫髮也禮記曰子生三月之末擇日翦髮為鬌男角女覊否則男左女右鬌音徒果反十歲就學能通詩論及長專精禮易不讀非聖之書不脩賀問之好有先人草廬結于岡畔山脊曰岡下有陂田常肆勤以自給肆陳也非身所耕漁則不食也鄉黨宗族希得見者謝承書曰燮居家清處非法不言兄弟父子室家相待如賔鄉曲不善者皆從其教也舉孝廉賢良方正特徴皆以疾辭延光二年安帝以𤣥纁羔幣聘燮禮卿執羔董仲舒春秋繁露曰凡贄卿用羔羔有角而不用類仁者執之不鳴殺之不嘷類死義者羔飲其母必跪類知禮者故以為贄及南陽馮良二郡各遣丞掾致禮宗族更勸之曰夫脩德立行所以為國自先世以来勲寵相承君獨何為守東岡之陂乎燮曰吾既不能隠處巢穴追綺季之跡綺季東園公夏黄公角里先生謂之四皓隠於商山見前書也而猶顯然不逺父母之國斯固以滑泥揚波同其流矣滑混也楚詞何不滑其泥而揚其波滑音古没反夫脩道者度其時而動動而不時焉得亨乎亨通也書曰慮善以動動惟厥時因自載到潁川陽城遣生送敬劉攽曰案文當云遣門生送敬少一門字遂辭疾而歸送敬猶致謝也良亦載病到近縣送禮而還送禮謂送其所致之禮也詔書告二郡歲以羊酒養病良字君郎出於孤微少作縣吏年三十為尉從佐從佐謂隨從而已不主案牘也奉檄迎督郵即路慨然耻在厮役厮賤也因壊車殺馬毁裂衣冠乃遁至犍為從杜撫學妻子求索蹤迹斷絶後乃見草中有敗車死馬衣裳腐朽謂為虎狼盜賊所害發喪制服積十許年乃還鄉里志行高整非禮不動遇妻子如君臣鄉黨以為儀表燮良年皆七十餘終黃憲傳黃憲字叔度汝南愼陽人也在愼水之南因以名縣南陽有愼陽國而流俗書此或作順陽者誤世貧賤父為牛醫潁川荀淑至愼陽遇憲於逆旅逆旅客舍時年十四淑竦然異之揖與語移日不能去謂憲曰子吾之師表也既而前至袁閎一作閬所未及勞問逆曰子國有顏子寧識之乎顏子顏回也閎曰見吾叔度邪是時同郡戴良才高倨慠而見憲未嘗不正容及歸罔然若有失也其母問曰汝復從牛醫兒來邪對曰良不見叔度不自以為不及既覩其人則瞻之在前忽焉在後論語顏回慕孔子之言也固難得而測矣同郡陳蕃周舉常相謂曰時月之間不見黄生則鄙吝之萌復存乎心吝貪也及蕃為三公臨朝歎曰叔度若在吾不敢先佩印綬矣太守王龔在郡禮進賢達多所降致卒不能屈憲郭林宗少游汝南先過袁閎劉攽曰案袁閬字奉高閎字夏甫此下言奉高則閎當作閬也不宿而退進往從憲累日方還或以問林宗郭泰别傳曰時林宗過薛恭祖恭祖問曰聞足下見袁奉高車不停軌鑾不輟軛從叔度乃彌信宿也林宗曰奉高之器譬諸汎濫雖清而易挹奉高閎字也爾雅曰側出汎泉正出濫泉汎音軌濫音檻叔度汪汪若千頃陂澄之不清淆之不濁不可量也淆混也憲初舉孝㢘又辟公府友人勸其仕憲亦不拒之暫到京師而還竟無所就年四十八終天下號曰徴君論曰黃憲言論風㫖無所傳聞然士君子見之者靡不服深逺去玼吝玼音此説文曰鮮色也據此文當為疵作玼者古字通也將以道周性全無徳而稱乎道周備性全一無徳而稱言其徳大無能名焉余曾祖穆侯晉書曰范汪字𤣥平安北將軍諡曰穆侯汪生寗寗生泰泰生曄以為憲隤然其處順易繫辭曰坤隤然示人簡矣隤柔順貌淵乎其似道老子曰道冲而用之或不盈淵乎似萬物之宗言淵深不可知也淺深莫臻其分清濁未議其方廣雅曰方所也若及門於孔氏其殆庶乎易繫辭曰顏氏之子其殆庶幾乎殆近也故嘗著論云徐穉傳徐穉字孺子豫章南昌人也豫章郡今洪州也南昌縣即今豫章縣也謝承書曰穉少為諸生學嚴氏春秋京氏易歐陽尚書兼綜風角星官筭歴河圖七緯推歩變易異行矯時俗閭里服其徳化有失物者縣以相還道無拾遺四察孝廉五辟宰府三舉茂才也家貧常自耕稼非其力不食恭儉義讓所居服其徳屢辟公府不起時陳蕃為太守以禮請署功曹穉不免之既謁而退蕃在郡不接賔客唯穉來特設一榻去則縣之後舉有道家拜太原太守就家而拜之也皆不就延熹二年尚書令陳蕃僕射胡廣等上疏薦穉等曰臣聞善人天地之紀政之所由也左傳曰晉三郄害伯宗譛而殺之及欒弗忌韓獻子曰郄氏其不免乎善人天地之紀也而驟絶之不亡何待也詩云思皇多士生此王國大雅文王之詩也思願也皇天也思願天多生賢人於此王國天挺俊乂為陛下出當輔弼明時左右大業者也左右助也伏見處士豫章徐穉彭城姜肱汝南袁閎閎見袁安傳謝承書曰閎少脩志節矯俗高厲京兆韋著著見韋彪傳謝承書曰為三輔冠族著少脩節操持京氏易韓詩博通術藝潁川李曇徳行純備著于人聼若使擢登三事協亮天工必能翼宣盛美増光日月矣桓帝乃以安車𤣥纁備禮徴之並不至帝因問蕃曰徐穉袁閎韋著孰為先後蕃對曰閎生出公族聞道漸訓著長於三輔禮義之俗所謂不扶自直不鏤自雕說苑曰蓬生枲中不扶自直也至於穉者爰自江南卑薄之域而角立傑出宜當為先如角之特立也穉嘗為太尉黄瓊所辟不就及瓊卒歸葬穉乃負糧徒歩到江夏赴之設雞酒薄祭哭畢而去不告姓名謝承書曰穉諸公所辟雖不就有死喪負笈赴弔常於家豫炙鷄一隻以一兩綿絮漬酒中暴乾以裹鷄徑到所起冢𡑞外以水漬綿使有酒氣斗米飯白茅為藉以鷄置前釃酒畢留謁則去不見喪主時㑹者四方名士郭林宗等數十人聞之疑其穉也乃選能言語生茅容輕騎追之及於塗容為設飲共言稼穡之事臨訣去謂容曰為我謝郭林宗大樹將顚非一繩所維何為栖栖不遑寜處顚仆也維繫也喻時將衰季豈一人可能救邪及林宗有母憂穉往弔之置生芻一束於廬前而去衆怪不知其故林宗曰此必南州高士徐孺子也詩不云乎生芻一束其人如玉小雅白駒詩此戒賢者行所舍主人之餼雖薄要就賢主人其徳如玉然也吾無徳以堪之靈帝初欲蒲輪聘穉㑹卒時年七十二子𦙍字季登篤行孝悌亦隠居不仕謝承書曰𦙍少遭父母喪致哀毁瘁歐血發病服闋隠居林藪躬耕稼穡勌則誦經貧窶困乏執志彌固不受惠於人也太守華歆禮請相見固病不詣魏志曰歆字子魚平原人為豫章太守為政清浄不煩吏人咸感而愛之漢末宼賊縱横皆敬𦙍禮行轉相約敇不犯其閭建安中卒李曇字雲少孤繼母嚴酷曇事之愈謹謝承書曰曇少喪父躬事繼母繼母酷烈曇性純孝定省恪勤妻子恭奉寒苦執勞不以為怨得四時珍玩先以進母與徐孺子等海内列名五處士焉為鄉里所稱法養親行道終身不仕姜肱傳姜肱字伯淮彭城廣戚人也廣戚故城今徐州沛縣東家世名族謝承書曰祖父豫章太守父任城相也肱與二弟仲海季江俱以孝行著聞其友愛天至常共臥起謝承書曰肱性篤孝事繼母恪勤母既年少又嚴厲肱感凱風之孝兄弟同被而寢不入房室以慰母心也及各娶妻兄弟相戀不能别寢以係嗣當立乃遞往就室肱博通五經兼明星緯士之逺来就學者三千餘人諸公爭加辟命皆不就二弟名聲相次亦不應徴聘時人慕之肱嘗與季江謁郡夜於道遇盜欲殺之肱兄弟更相爭死賊遂兩釋焉謝承書曰肱與季江俱乗車行適野廬為賊所劫取其衣物欲殺其兄弟肱謂盜曰弟年㓜父母所憐愍又未聘娶願自殺身濟弟季江言兄年徳在前家之珍寶國之英俊乞自受戮以代兄命盜戢刃曰二君所謂賢人吾等不良妄相侵犯棄物而去肱車中尚有數千錢盜不見也使從者追以與之亦復不受肱以物經歴盗手因以付亭吏而去也但掠奪衣資而已既至郡中見肱無衣服怪問其故肱託以它辭終不言盜盜聞而感悔後乃就精廬精廬即精舍也求見徴君肱與相見皆叩頭謝罪而還所略物肱不受勞以酒食而遣之後與徐穉俱徴不至桓帝乃下彭城使畫工圗其形狀肱臥於幽闇以被韜靣韜藏也言感眩疾不欲出風工竟不得見之中常侍曹節等專執朝事新誅太傅陳蕃大將軍竇武欲借寵賢徳以釋衆望乃白徴肱為太守肱得詔乃私告其友曰吾以虛獲實遂藉聲價明明在上猶當固其本志况今政在閹竪夫何為哉乃隠身遯命逺浮海濵再以𤣥纁聘不就即拜太中大夫詔書至門謝承書曰靈帝手筆下詔曰肱抗凌雲之志養浩然之氣以朕徳薄未肯降志昔許由不屈王道為化夷齊不橈周徳不虧州郡以禮優順勿失其意肱使家人對云久病就醫遂羸服閒行竄伏青州界中賣卜給食召命得斷家亦不知其處歴年乃還年七十七熹平二年終于家弟子陳留劉操追慕肱徳共刋石頌之申屠蟠傳申屠蟠字子龍陳留外黄人也九歳喪父哀毁過禮服除不進酒肉十餘年每忌日輙三日不食海内先賢傳曰蟠在冢側致甘露白雉以孝稱同郡􅚆氏女玉為父報讎􅚆姓也殺夫氏之黨吏執玉以告外黄令梁配續漢書曰同縣大女􅚆玉為從父報讐殺夫之從母兄李士姑執玉以告吏也配欲論殺玉蟠時年十五為諸生進諫曰玉之節義足以感無耻之孫激忍辱之子不遭明時尚當表旌廬墓況在清聼而不加哀矜配善其言乃為讞得減死論讞請也鄉人稱美之家貧傭為漆工郭林宗見而奇之同郡蔡邕深重蟠及被州辟乃辭讓之曰申屠蟠禀氣𤣥妙性敏心通喪親盡禮幾於毁滅至行美義人所鮮能安貧樂潛味道守眞不為燥濕輕重律歴志曰銅為物至精不為燥濕寒暑變其節不為風雨暴露改其形介然有常似於士君子之行不為窮達易節易曰窮則獨善其身達則兼善天下方之於邕以齒則長以徳則賢後郡召為主簿不行謝承書曰蟠前後徴辟文書悉挂於樹初不顧盻也遂隠居精學博貫五經兼明圖緯始與濟陰王子居同在太學子居臨殁以身託蟠蟠乃躬推輦車送喪歸鄉里遇司隸從事於河鞏之間百官志曰司隸從事史十二人秩百石也從事義之為封傳䕶送傳謂符牒使人監送之蟠不肯受投傳於地而去事畢還學太尉黄瓊辟不就及瓊卒歸葬江夏四方名豪㑹帳下者六七千人帳下葬處互相談論莫有及蟠者唯南郡一生與相酬對既别執蟠手曰君非聘則徴如是相見於上京矣蟠勃然作色曰始吾以子為可與言也何意乃相拘敎樂貴之徒邪樂音五孝反因振手而去不復與言再舉有道不就謝承書曰詔書令郡以禮發遣蟠到河南萬歳亭折轅而旋也先是京師游士汝南范滂等非訐朝政自公卿以下皆折節下之訐謂横議是非也訐或作評也太學生爭慕其風以為文學將興處士復用蟠獨歎曰昔戰國之世處士横議孟子曰聖王不作諸侯恣行處士横議前書曰秦既稱帝患周之敗以為起於處士横議諸侯力爭音義曰言由横議而敗之列國之王至為擁篲先驅史記鄒衍如燕昭王擁篲先驅請列弟子之坐而受業築碣石宫身親往師之卒有阬儒燒書之禍今之謂矣乃絶迹於梁碭之間梁國有碭縣因樹為屋自同傭人謝承書曰居蓬萊之室依桑樹以為棟也居二年滂等果罹黨錮或死或刑者數百人蟠礭然免於疑論後蟠友人陳郡馮雍坐事繫獄豫州牧黄琬欲殺之或勸蟠救雍蟠不肯行曰黄子琰為吾故邪未必合罪如不用吾言雖往何益琬聞之遂免雍罪大將軍何進連徴不詣進必欲致之使蟠同郡黄忠書勸曰前莫府初開至如先生特加殊禮優而不名申以手筆設几杖之坐經過二載而先生抗志彌高所尚益固竊論先生高節有餘於時則未也今潁川荀爽載病在道北海鄭𤣥北面受署彼豈樂羈牽哉知時不可逸豫也昔人之隠遭時則放聲滅迹巢棲茹薇放棄也謂棄聲名也巢棲謂巢父也説文薇似藿也其不遇也則祼身大笑被髮狂歌楚詞曰桑扈祼行史記曰箕子被髪佯狂歌謂楚狂接輿歌而過孔子也今先生處平壤壤地也游人間吟典籍襲衣裳事異昔人而欲逺蹈其迹不亦難乎孔氏可師何必首陽孔子使子路語隠者云不仕無義長㓜之節不可廢也君臣之義如之何其可廢也欲潔其身而亂大倫首陽夷齊所隠山也蟠不答中平五年復與爽𤣥及潁川韓融融字元長韶之子也見韶傳陳紀等十四人並博士徴不至明年董卓廢立蟠及爽融紀等復俱公車徴讀漢志曰徴爽為司空融為尚書紀為侍中唯蟠不到衆人咸勸之蟠笑而不應居無幾爽等為卓所脅迫西都長安京師擾亂及大駕西遷公卿多遇兵飢室家流散融等僅以身脱唯蟠處亂末終全高志年七十四終于家贊曰琛寶可懐貞期難對琛寶喻道徳也貞期謂明時也對偶也道茍違運理用同廢與其遐棲豈若蒙穢䝉穢謂仕亂朝悽悽碩人陵阿窮退碩人謂賢者悽悽飢病貌也言賢者退而窮處詩國風曰考槃在阿碩人之薖曲陵曰阿陵升也薖飢也薖音苦戈反韜伏明姿甘是堙曖堙沈也曖猶醫也後漢書卷八十三後漢書卷八十三考證周燮傳決曹掾燕之後也決字監本作法臣㑹汾按獨行傳周嘉篇作決從改按百官志太尉公府諸曹有法曹主郵驛料程有決曹主罪法郡太守下置諸曹掾史略如公府則法曹決曹並有之周燕於宣帝時為郡決曹太守欲枉殺人燕諫不聼知監本作法曹者誤矣徐穉傳穉不免之既謁而退不免之三字疑有誤何焯曰免疑作就通鑑作穉不之免袁紀作不之起固病不詣諸本同推尋文義當作固稱病不詣此脱去稱字也姜肱傳以係嗣當立諸本同係當作繼言感眩疾感字舊本作惑誤申屠蟠傳因樹為屋注居蓬莱之室諸本同臣㑹汾按蓬莱雖皆草名然古人或作蓬蒿或作蒿莱至蓬莱二字並用恐與山名相混此注莱字當是虆字之誤後漢書卷八十三考證
