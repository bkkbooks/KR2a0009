body:
  text: 後漢書卷八十七宋宣城太守范煜撰唐章懷太子賢注杜欒劉李劉謝列傳第四十七杜根傳杜根字伯堅潁川定陵人也父安字伯夷少有志節年十三入太學號竒童京師貴戚慕其名或遺之書安不發悉壁藏之及後捕案貴戚賔客安開壁出書印封如故竟不離其患時人貴之離被也位至巴郡太守政甚有聲根性方實好絞直絞急也永初元年舉孝亷為郎中時和熹鄧后臨朝權在外戚根以安帝年長宜親政事乃與同時郎上書直諫太后大怒收執根等令盛以縑嚢於殿上撲殺之執法者以根知名私語行事人使不加力既而載出城外根得蘇太后使人檢視根遂詐死三日目中生蛆因得逃竄為宜城山中酒家保宜城縣故城在今㐮州率道縣南其地出美酒廣雅云保使也言為人傭力保任而使也積十五年酒家知其賢厚敬待之及鄧氏誅左右皆言根等之忠帝謂根已死乃下詔布告天下錄其子孫根方歸鄉里徴詣公車拜侍御史初平原郡吏成翊世亦諫太后歸政坐抵罪與根俱徵擢為尚書郎並見納用或問根曰往者遇禍天下同義知故不少何至自苦如此根曰周旋民間非絶跡之處邂逅發露禍及知親故不為也順帝時稍遷濟隂太守去官還家年七十八卒翊世字季明少好學深明道術延光中中常侍樊豐帝乳母王聖共譖皇太子廢為濟隂王翊世連上書訟之又言樊豐王聖誣罔之狀帝既不從而豐等䧟以重罪下獄當死有詔免官歸本郡及濟隂王立是為順帝司空張晧辟之晧以翊世前訟太子之廢薦為議郎翊世自以其功不顯恥於受位自劾歸三公比辟不應比猶頻也尚書僕射虞詡雅重之欲引與共参朝政乃上書薦之徵拜議郎後尚書令左雄僕射郭䖍復舉為尚書在朝正色百僚敬之欒巴傳欒巴字叔元魏郡内黄人也神仙傳云巴蜀郡人也少而學道不脩俗事好道順帝世以宦者給事掖庭補黄門令非其好也性質直學覽經典雖在中官不與諸常侍交接後陽氣通暢白上乞退擢拜郎中四遷桂陽太守以郡處南垂不閑典訓為吏人定婚姻喪紀之禮興立校學以奬進之劉攽曰立校學案文當作學校雖幹吏卑末皆課令習讀程試殿最随能升授幹府吏之類也晉令諸郡國不滿五千以下置幹吏二人郡縣皆有幹幹猶主也政事明察視事七年以病乞骸骨荆州刺史李固薦巴治迹徴拜議郎守光祿大夫與杜喬周舉等八人徇行州郡巴使徐州還再遷豫章太守郡土多山川鬼怪小人常破貲産以祈禱巴素有道術能役鬼神乃悉毁壞房祀剪理姦誣房謂為房堂而祀者於是祅異自消百姓始頗為懼終皆安之神仙傳曰時廬山廟有神於帳中與人言語飲酒投杯能令官亭湖中分風船行者舉帆相逢巴未到十數日廟中神不復作聲郡中常患黄父鬼為百姓害巴到皆不知所在郡内無復疾疫也遷沛相所在有績徴拜尚書神仙傳曰巴為尚書正朝大㑹巴獨後到又飲酒西南噀之有司奏巴不敬有詔問巴巴頓首謝曰臣本縣成都市失火臣故因酒為雨以㓕火臣不敢不敬詔即以驛書問成都成都答言正旦大失火食時有雨從東北來火乃息雨皆酒臭後忽一旦大風天霧晦暝對坐皆不相見失巴所在尋問之云其日還成都與親故别也㑹帝崩營起憲陵陵左右或有小人墳冢主者欲有所侵毁巴連上書苦諫時梁太后臨朝詔詰巴曰大行皇帝晏駕有日卜擇陵園務從省約塋域所極裁二十頃而巴虛言主者壞人冢墓事既非實寢不報下巴猶固遂其愚復上誹謗茍肆狂瞽益不可長巴坐下獄抵罪禁錮還家二十餘年靈帝即位大將軍竇武太傅陳蕃輔政徴拜議郎蕃武被誅巴以其黨復讁為永昌太守以功自劾劉攽曰案功不可以自劾當是無功自劾少一無字辭病不行上書極諫理陳竇之寃帝怒下詔切責收付廷尉巴自殺子賀官至雲中太守劉陶傳劉陶字子竒一名偉潁川潁隂人濟北貞王勃之後陶為人居簡不脩小節所與交友必也同志好尚或殊富貴不求合情趣茍同貧賤不易意同宗劉愷以雅德知名獨深器陶時大將軍梁冀專朝而桓帝無子連嵗荒饑災異數見陶時游太學乃上疏陳事曰臣聞人非天地無以為生天地非人無以為靈書曰惟天地萬物父母惟人萬物之靈也是故帝非人不立人非帝不寧夫天之與帝帝之與人猶頭之與足相湏而行也伏惟陛下年隆德茂中天稱號中天謂天之中也襲常存之慶循不易之制目不視鳴條之事耳不聞檀車之聲鳴條地名在安邑之西尚書曰伊尹相湯伐桀遂與桀戰于鳴條之野檀車兵車也詩曰檀車嘽嘽四牡痯痯征夫不逺嘽音昌善反痯音管天災不有痛於肌膚震食不即損於聖體故蔑三光之謬輕上天之怒伏念髙祖之起始自布衣高祖日吾以布衣提三尺劍以取天下拾暴秦之敝追亡周之鹿前書蒯通曰秦失其鹿天下共逐之音義云以鹿喻帝位也合散扶傷克成帝業功既顯矣勤亦至矣流福遺祚至於陛下陛下既不能増明烈考之軌而忽高祖之勤妄假利器委授國柄使羣醜刑隸芟刈小民雕敝諸夏虐流遠近利器謂權也周禮太宰以八柄詔王馭羣臣謂爵祿與置生奪廢誅也刑隸謂閹人也故天降衆異以戒陛下陛下不悟而競令虎豹窟於麑場豺狼乳於春囿鹿子曰麑乳産也斯豈唐咨禹稷益典朕虞議物賦土蒸民之意哉又令牧守長吏劉攽曰案文令當作今上下交競封豕長蛇蠶食天下貨殖者為窮寃之魂貧餒者作飢寒之鬼高門獲東觀之辜豐室羅妖叛之罪説苑曰孔子為魯司㓂七日而誅少正邜於東觀之下也死者悲於窀穸生者戚於朝野杜元凱注左傳曰窀厚也穸夜也厚夜猶長夜也是愚臣所為咨嗟長懷歎息者也且秦之將亡正諫者誅諛進者賞前書賈山上書曰秦始皇進諛謟之人殺直諫之士也嘉言結於忠舌國命出於䜛口擅閻樂於咸陽授趙高以車府趙高為車府令與壻咸陽令閻樂謀殺胡亥事見史記也權去已而不知威離身而不顧古今一揆成敗同埶願陛下遠覽強秦之傾近察哀平之變得失昭然禍福可見臣又聞危非仁不扶亂非智不救故武丁得傅説以消鼎雉之災武丁殷王高宗也尚書曰高宗得傅説為相殷復興焉高宗時有雉登鼎耳而雊武丁懼而脩德位以永寧周宣用申甫以濟夷厲之荒申伯仲山甫周宣王之臣也詩曰惟申及甫惟周之翰史記曰周孝王之子爕是為夷王夷王崩子厲王胡立行暴虐死于彘也竊見故冀州刺史南陽朱穆前烏桓校尉臣同郡李膺皆履正清平貞高絶俗穆前在冀州奉憲操平摧破姦黨掃清萬里膺歴典牧守正身率下及掌戎馬威揚朔北斯實中興之良佐國家之柱臣也宜還本朝挟輔王室上齊七燿下鎮萬國臣敢吐不時之義於諱言之朝不時謂不合於時也諱言謂拒諫也猶冰霜見日必至消滅臣始悲天下之可悲今天下亦悲臣之愚惑也書奏不省時有上書言人以貨輕錢薄故致貧困宜改鑄大錢事下四府羣僚及太學能言之士陶上議曰聖王承天制物與人行止建功則衆悦其事興戎而師樂其旅是故靈臺有子來之人武旅有鳬藻之士詩大雅曰經始靈臺經之營之不日成之經始勿亟庻人子來武旅周武王之旅鳬得水藻言喜悦也皆舉合時宜動順人道也臣伏讀鑄錢之詔平輕重之議訪覃幽微不遺窮賤是以藿食之人謬延逮及説苑曰有東郭祖朝者上書於晉獻公曰願請聞國家之計獻公使人告之曰肉食者已慮之矣藿食者尚何預焉祖廟曰肉食者一旦失計於廟堂之上若臣等藿食寕得無肝膽塗地於中原之野其禍亦及臣之身安得無預國家之計乎蓋以為當今之憂不在於貨在乎民飢夫生養之道先食後民劉攽曰案文民當作貨是以先王觀象育物敬授民時象天象也尚書曰欽若昊天敬授人時使男不逋畝女不下機故君臣之道行王路之教通由是言之食者乃有國之所寳生民之至貴也竊見比年已來良苖盡於蝗螟之口杼柚空於公私之求詩曰小東大東杼柚其空所急朝夕之餐所患靡盬之事豈謂錢貨之厚薄銖兩之輕重哉就使當今沙礫化為南金瓦石變為和玉詩曰大路南金和玉卞和之玉也使百姓渇無所飲飢無所食雖皇義之純德唐虞之文明猶不能以保蕭牆之内也蓋民可百年無貨不可一朝有飢故食為至急也議者不逹農殖之本多言鑄冶之便或欲因縁行詐以賈國利國利將盡取者爭競造鑄之端於是乎生蓋萬人鑄之一人奪之猶不能給况今一人鑄之則萬人奪之乎雖以隂陽為炭萬物為銅賈誼之言役不食之民使不飢之士猶不能足無厭之求也夫欲民殷財阜要在止役禁奪則百姓不勞而足陛下聖德愍海内之憂戚傷天下之艱難欲鑄錢齊貨以救其敝此猶養魚沸鼎之中棲鳥烈火之上水木本魚鳥之所生也用之不時必至燋爛願陛下寛鍥薄之禁後冶鑄之議鍥刻也音口結反聽民庶之謡吟問路叟之所憂列子曰堯理天下五十年不知天下理亂堯乃㣲服遊於康衢兒童謡曰立我蒸民莫不爾極不識不知順帝之則説苑曰孔子行遊中路聞哭者聲其音甚悲孔子避車而問之曰夫子非有喪也何哭之悲虞丘子對曰吾有三失吾少好學周徧天下還後吾親亡是一失也事君驕奢不遂是二失也厚交友而後絶是三失也劉攽曰注文莫不爾極案文不當作非瞰三光之文耀視山河之分流三光日月星也分謂山流謂河言日月有讁食之災星晨有錯行之變故視其文耀也山崩川竭皆亡之徵也天下之心國家大事餐然皆見無有遺惑者矣臣嘗誦詩至於鴻鴈于野之勞哀勤百堵之事每喟爾長懷中篇而歎詩小雅鴻鴈之篇曰鴻鴈于飛肅肅其羽之子于征劬勞于野鴻鴈于飛集于中澤之子于垣百堵皆作鄭元注云壞滅之國徵人起屋舍築牆壁百堵同時而起言趨事也近聽征夫飢勞之聲甚於斯歌是以追悟匹婦吟魯之憂始於此乎列女傳曰魯漆室邑之女過時未適人當穆公之時君老太子㓜女倚柱而啼傍人聞之心莫不惨惨者鄰婦從之遊謂曰何哭之悲子欲嫁乎吾為子求偶漆室女曰嗟乎始吾以子為知今反無識也豈為嫁之故不樂而悲哉吾憂魯君老而太子少也見白駒之意屏營傍徨不能監寐詩曰皎皎白駒食我場苖縶之維之以永今朝白駒喻賢人也監寐猶寤寐也伏念當今地廣而不得耕民衆而無所食羣小競起進秉國之位鷹揚天下鳥鈔求飽吞肌及骨並噬無厭誠恐卒有役夫窮匠起於板築之間役夫謂陳渉起蘄也窮匠謂驪山之徒也並見史記也投斤攘臂登高遠呼使愁怨之民嚮應雲合八方分崩中夏魚潰公羊傳曰其言梁亡何魚爛而亡也何休曰魚爛從中發潰爛也雖方尺之錢何能有救其危猶舉函牛之鼎絓纎枯之末函牛之鼎謂大鼎也淮南子曰函牛之鼎沸則蛾不得置其一足焉絓掛也音胡賈反詩人所以眷然顧之澘焉出涕者也詩小雅大東之文也澘涕下貌鄭𤣥注云傷今不如古也臣東野狂闇不逹大義縁廣及之時對過所問知必以身脂鼎鑊為天下笑帝竟不鑄錢後陶舉孝亷除順陽長縣多姦猾陶到官宣募吏民有氣力勇猛能以死易生者不拘亡命姦臧於是剽輕劍客之徒過晏等十餘人過姓也過國之後見左傳皆來應募陶責其先過要以後效使各結所厚少年得數百人皆嚴兵待命於是覆案姦軌所發若神以病免吏民思而歌之曰邑然不樂思我劉君何時復來安此下民陶明尚書春秋為之訓詁推三家尚書三家謂夏侯建夏侯勝歐陽和伯也及古文是正文字三百餘事名曰中文尚書頃之拜侍御史靈帝宿聞其名數引納之時鉅鹿張角偽託大道妖惑小民陶與奉車都尉樂松議郎袁貢連名上疏言之曰聖王以天下耳目為視聽故能無不聞見今張角支黨不可勝計前司徒楊賜奏下詔書切勑州郡䕶送流民㑹賜去位不復捕錄雖㑹赦令而謀不觧散四方私言云角等竊入京師覘視朝政鳥聲獸心私共嗚呼州郡忌諱不欲聞之但更相告語莫肯公文宜下明詔重募角等賞以國土有敢回避與之同罪帝殊不悟方詔陶次第春秋條例明年張角反亂海内鼎沸帝思陶言封中陵鄉侯三遷尚書令以所舉將為尚書難與齊列乞從冗散拜侍中以數切諌為權臣所憚徙為京兆尹到職當出脩宫錢直千萬時拜職名當出買官之錢謂之脩宫錢也陶既清貧而恥以錢買職稱疾不聼政帝宿重陶才原其罪徵拜諫議大夫是時天下日危寇賊方熾陶憂致崩亂復上疏曰臣聞事之急者不能安言心之痛者不能緩聲竊見天下前遇張角之亂後遭邉章之宼每聞羽書告急之聲心灼内熱四體驚竦今西羌逆類私署將帥皆多叚頴時吏曉習戰陳識知山川變詐萬端臣常懼其輕出河東馮翊鈔西軍之後東之函谷據阸高望今果已攻河東恐遂轉更豕突上京如是則南道斷絶車騎之軍孤立時湟中義從胡北宫伯玉等叛遣左車騎將軍皇甫嵩討之不尅也關東破膽四方動揺威之不來叫之不應雖有田單陳平之䇿計無所用臣前驛馬上便宜急絶諸郡賦調冀尚可安事付主者留連至今莫肯求問今三郡之民皆以奔亡南出武關北徙壺谷三郡河東馮翊京兆也壺谷壺關之谷在上黨也冰駭風散唯恐在後今其存者尚十三四軍吏士民悲愁相守民有百走退死之心而無一前鬭生之計西宼浸前去營咫尺胡騎分布已至諸陵將軍張温天性精勇而主者旦夕廹促軍無後殿假令失利其敗不救臣自知言數見厭而言不自裁者以為國安則臣蒙其慶國危則臣亦先亡也謹復陳當今要急八事乞湏臾之間深垂納省其八事大較言天下大亂皆由宦官宦官事急共䜛陶曰前張角事發詔書示以威恩自此以來各各改悔今者四方安静而陶疾害聖政專言妖孽州郡不上陶何縁知疑陶與賊通情於是收陶下黄門北寺獄掠按日急陶自知必死對使者曰朝廷前封臣云何今反受邪譖恨不與伊吕同疇而以三仁為軰論語曰殷有三仁焉㣲子去之箕子為之奴比干諫而死遂閉氣而死天下莫不痛之陶著書數十萬言又作七曜論匡老子反韓非復孟軻及上書言當世便事條教賦奏書記辯疑凡百餘篇時司徒東海陳耽亦以非罪與陶俱死耽以忠正稱歴位三司光和五年詔公卿以謡言舉刺史二千石為民蠧害者謡言謂聼百姓風謡善惡而黜陟之也時太尉許戫司空張濟承望内官受取貨賂其宦者子弟賔客雖貪汙穢濁皆不敢問而虚糺邉遠小郡清脩有惠化者二十六人吏人詣闕陳訴耽與議郎曹操上言公卿所舉率黨其私所謂放䲭梟而囚鸞鳳其言忠切帝以譲戫濟由是諸坐謡言徵者悉拜議郎宦官怨之遂誣䧟耽死獄中李雲傳李雲字行祖甘陵人也性好學善隂陽初舉孝亷再遷白馬令桓帝延熹二年誅大將軍梁冀而中常侍單超等五人皆以誅冀功並封列侯專權選舉又立掖庭民女亳氏為皇后數月間后家封者四人賞賜巨萬時封后兄康為比陽侯弟統昆陽侯統從兄㑹安陽侯統弟秉為濟陽侯是時地數震裂衆災頻降雲素剛憂國將危心不能忍乃露布上書移副三府露布謂不封之也并以副本上三公府也曰臣聞皇后天下母徳配坤靈得其人則五氏來備不得其人則地動揺宫史記曰庶徵曰雨曰暘曰燠曰風曰寒五者來備各以其序庻草繁廡是與氏古字通耳春秋漢含孳曰女主盛臣制命則地動比年災異可謂多矣皇天之戒可謂至矣高祖受命至今三百六十四嵗君期一周當有黄精代見姓陳項虞田許氏不可令此人居太尉太傅典兵之官黄精謂魏氏將興陳項虞田並舜之後舜土德亦尚黄故忌也舉厝至重不可不慎班功行賞宜應其實梁冀雖持權專擅虐流天下今以罪行誅猶召家臣搤殺之耳而猥封謀臣萬户以上高祖聞之得無見非西北列將得無觧體列將謂皇甫規段頴等孔子曰帝者諦也春秋運斗樞曰五帝脩名立功脩德成化統調隂陽招類使神故稱帝帝之諦言也鄭𤣥注云審諦於物也劉攽曰注帝之諦言也案文言當在諦字上今官位錯亂小人諂進財貨公行政化日損尺一拜用不經御省尺一之板謂詔䇿也見漢官儀是帝欲不諦乎帝得奏震怒下有司逮雲詔尚書都䕶劒㦸送黄門北寺獄使中常侍管霸與御史廷尉雜考之時𢎞農五官掾杜衆傷雲以忠諫獲罪上書願與雲同日死帝愈怒遂并下廷尉大鴻臚陳蕃上疏救雲曰李雲所言雖不識禁忌干上逆旨其意歸於忠國而已昔高祖忍周昌不諱之諫成帝赦朱雲腰領之誅周昌觧見陳忠傳朱雲上書曰臣願賜尚方斬馬劍斷佞臣一人以厲其餘上問誰也對曰安昌侯張禹上大怒曰小臣居下訕上廷辱師傅罪死不赦御史將雲去左將軍辛慶忌以死争上意觧然後得已事並見前書今日殺雲臣恐剖心之譏復議於世矣比干以死諫紂紂怒曰吾聞聖人心有七竅乃剖比干而觀其心事見史記故敢觸龍鱗冐昧以請韓子曰夫龍之為蟲也可狎而馴也然喉下有逆鱗嬰之則殺人人主有逆鱗説者嬰之則亦幾矣太常楊秉洛陽市長沐茂郎中上官資並上疏請雲帝恚甚有司奏以為大不敬詔切責蕃秉免歸田里茂資貶秩二等時帝在濯龍池管霸奏雲等事霸詭言曰李雲野澤愚儒杜衆郡中小吏出於狂戇不足加罪帝謂霸曰帝欲不諦是何等語而常侍欲原之邪顧使小黄門可其奏雲衆皆死獄中後冀州刺史賈琮使行部過祠雲墓刻石表之論曰禮有五諫諷為上五諫謂諷諫順諫闚諫指諫䧟諫也諷諫者知患禍之萌而諷告也順諫者出辭遜順不逆君心也闚諫者視人君顔色而諫也指諫者質指其事而諫也䧟諫者言國之害忘生為君也見大戴禮若夫託物見情因文載旨使言之者無罪聞之者足以自戒卜商詩序之文也貴在於意逹言從理歸乎正曷其絞訐摩上以衒沽成名哉絞直也訐正也沽賣之也李雲草茅之生不識失身之義儀禮曰凡自稱於君宅在邦者曰市井之臣在野則曰草茅之臣庶人則曰刺草之臣易曰臣不密則失身劉攽曰注宅在邦者案儀禮文公宅者在邦此誤遂乃露布帝者班檄三公至於誅死而不顧斯豈古之狂也論語曰古之狂也直今之狂也詐而已矣夫未信而諫則以為謗己論語曰事君信而後諫其君未信則以為謗己故説者識其難焉韓非有説難篇劉瑜傳劉瑜字季節廣陵人也高祖父廣陵靖王父辯清河太守謝承書云父祥為清河太守瑜少好經學尤善圗䜟天文歴筭之術州郡禮請不就延熹八年太尉楊秉舉賢良方正及到京師上書陳事曰臣瑜自念東國鄙陋得以豐沛枝𦙍被䝉復除不給卒伍故太尉楊秉知臣竊闚典籍猥見顯舉誠冀臣愚直有補萬一而秉忠謨不遂命先朝露臣在下土聽聞歌謡驕臣虐政之事遠近呼嗟之音竊為辛楚泣血漣如幸得引錄備答聖問泄寫至情不敢庸回庸用也回邪也誠願陛下且以湏㬰之慮覽今往之事人何為咨嗟天曷為動變蓋諸侯之位上法四七垂文炳燿關之盛衰者也四七二十八宿也諸侯為天子守四方猶天之有二十八宿漢官儀曰天子建侯上法四七也今中官邪孽比肩裂土皆競立𦙍嗣繼體傳爵或乞子疎屬或買皃市道殆乖開國承家之義易曰大君有命開國承家古者天子一娶九女公羊傳曰諸侯一聘三女天子一娶九女夏殷制也娣姪有序河圖授嗣正在九房今女嬖令色充積閨帷皆當盛其玩飾冗食空宫勞散精神生長六疾左傳曰天有六氣滛生六疾六氣曰隂陽風雨晦明過則為災隂滛寒疾陽滛熱疾風滛未疾雨滛腹疾晦滛惑疾明滛心疾女隂物也而晦時滛則生内熱惑蠱之疾也此國之費也生之傷也且天地之性隂陽正紀隔絶其道則水旱為并詩云五日為期六日不詹詩小雅曰終朝采藍不盈一䄡五日為期六日不詹注云詹至也婦人過時而怨曠期至五日而歸今六日不至是以憂也怨曠作歌仲尼所錄謂仲尼刪詩編錄也況從㓜至長幽藏殁身又常侍黄門亦廣妻娶怨毒之氣結成妖𤯝行路之言官發畧人女取而復置轉相驚懼孰不悉然無縁空生此謗鄒衍匹夫杞氏匹婦尚有城崩霜隕之異況乃羣軰咨怨能無感乎淮南子曰鄒衍事燕恵王盡忠左右譖之王繫之仰天而哭五月天為之下霜列女傳曰齊人杞梁襲莒戰死其妻無所歸乃就夫尸於城下而哭之七日城崩也昔秦作阿房國多刑人今第舍増多窮極竒巧掘山攻石不避時令禮記月令曰孟夏之月無有壞墮無起土功無發大衆也促以嚴刑威以法正劉攽曰案文當作正法民無罪而覆入之民有田而覆奪之州郡官府各自考事姦情賕賂皆為吏餌民愁鬱結起入賊黨官輒興兵誅討其罪貧困之民或有賣其首級以要酬賞父兄相代殘身妻孥相視分裂窮之如彼伐之如此豈不痛哉又陛下以北辰之尊神器之寳而㣲行近習之家私幸宦官之舍近習謂親近狎者賔客市買熏灼道路因此暴縱無所不容今三公在位皆博逹道蓺而各正諸己莫或匡益者非不智也畏死罰也惟陛下設置七臣以廣諫道孝經曰古者天子有争臣七人鄭𤣥注七人謂三公及前疑後承左輔右弼及開東序金縢史官之書從堯舜禹湯文武致興之道爾雅曰東西廂謂之序書曰天球河圖在東序縢緘也以金緘之不欲人開也遠佞邪之人放鄭衛之聲則政致和平德感祥風矣孝經援神契曰德至八方則祥風至臣悾悾推情言不足採悾悾誠懇之貎懼以觸忤征營慴悸於是特詔召瑜問災咎之徵指事案經䜟以對執政者欲令瑜依違其辭而更䇿以它事瑜復悉心以對八千餘言有切於前帝竟不能用拜為議郎及帝崩大將軍竇武欲大誅宦官乃引瑜為侍中又以侍中尹勲為尚書令共同謀畫及武敗瑜勲並被誅事在武傳勲字伯元河南人從祖睦為太尉睦孫頌為司徒勲為人剛毅直方少時毎讀書得忠臣義士之事未嘗不投書而仰歎自以行不合於當時不應州郡公府禮命桓帝時以有道徴四遷尚書令延熹中誅大將軍梁冀帝召勲部分衆職甚有方畧封宜陽鄉侯僕射霍諝尚書張敬歐陽参李偉虞放周永並封亭侯勲後再遷至九卿以病免拜為侍中八年中常侍具瑗左悺等有罪免奪封邑因黜勲等爵瑜誅後宦官悉焚其上書以為訛言子琬傳瑜學明占候能著災異舉方正不行謝弼傳謝弼字輔宣東郡武陽人也謝承書曰弼字輔鸞東郡濮陽人也與此不同中直方正猶言中正方直也為鄉邑所宗師建寕二年詔舉有道之士弼與東海陳敦𤣥莬公孫度俱對䇿皆除郎中時青蛇見前殿大風㧞木詔公卿以下陳得失弼上封事曰臣聞和氣應於有德祅異生乎失政上天告譴則王者思其愆政道或虧則姦臣當其罰夫蛇者隂氣所生鱗者甲兵之符也謝承書曰蛇者隂氣所生龍之類也龍有鱗甲兵之符也鴻範傳曰厥極弱時則有蛇龍之孽前書曰皇之不極是謂不建厥極弱時則有下伐上之痾龍蛇之孽也又熒惑守亢裴回不去法有近臣謀亂發於左右不知陛下所與從容帷幄之内親信者為誰宜急斥黜以消天戒臣又聞惟虺惟蛇女子之祥詩小雅之文也鄭𤣥注云虺蛇宂處隂之祥也故為生女伏惟皇太后定䇿宫闥援立聖明書云父子兄弟罪不相及竇氏之誅豈宜咎延太后幽隔空宫愁感天心如有霧露之疾陛下當何面目以見天下文帝徙淮南王長於蜀袁盎曰淮南王為人剛今暴摧折之臣恐其逢霧露病死陛下冇殺弟之名也昔周㐮王不能敬事其母戎狄遂至交侵史記曰周㐮王母早死後母曰恵后生叔帯有寵帯與戎翟謀伐㐮王孝和皇帝不絶竇氏之恩前世以為美談竇太后崩張酺等奏云不宜合葬先帝和帝手詔曰臣子無貶尊上之文恩不忍離於是合葬見皇后紀也禮為人後者為之子今以桓帝為父豈得不以太后為母哉援神契曰天子行孝四夷和平方今邉境日蹙兵革蜂起自非孝道何以濟之願陛下仰慕有虞蒸蒸之化俯思凱風慰母之念尚書舜典曰蒸蒸乂不格姦孔安國注云蒸蒸猶進進也言舜進於善道詩凱風曰有子七人莫慰母心臣又聞爵賞之設必酬庸勲開國承家小人勿用易師卦上六爻詞也今功臣乆外未䝉爵秩阿母寵私乃享大封大風雨雹亦由於兹又故太傅陳蕃輔相陛下勤身王室夙夜匪懈而見䧟羣邪一旦誅滅其為酷濫駭動天下門生故吏並離徙錮蕃身已徃人百何贖詩國風曰如可贖兮人百其身宜還其家屬觧除禁網夫台宰重器國命所繼今之四公唯司空劉寵斷斷守善餘皆素餐致寇之人四公謂劉矩為大尉許訓為司徒胡廣為太傅及寵也書曰如有一个臣斷斷猗無它技孔安國注云斷斷猗然專一之臣也素空也無徳而食其祿曰素餐易曰負且乗致寇至也必有折足覆餗之凶可因災異並加罷黜易曰鼎折足覆公餗鼎以喻三公餗鼎實也折足覆餗言不勝其任徵故司空王暢長樂少府李膺並居政事庶災變可消國祚惟永臣山藪頑闇未逹國典䇿曰無有所隐敢不盡愚用忘諱忌伏惟陛下裁其誅罰左右惡其言出為廣陵府丞去官歸家中常侍曹節從子紹為東郡太守忿疾於弼遂以它罪收考掠按死獄中時人悼傷焉初平二年司隸校尉趙謙上訟弼忠節求報其怨魂乃收紹斬之贊曰鄧不明辟尚書曰朕復子明辟孔安國注云復還明君之政於成王也言鄧后臨朝不還政於安帝也梁不損陵慊慊欒杜諷辭以興黄寇方熾子竒有識識協韻音式侍反武謀允臧瑜亦協志弼忤宦情雲犯時忌成仁喪己同方殊事後漢書卷八十七後漢書卷八十七考證欒巴傳白上乞退白上二字舊本作自下劉陶傳陶為人居簡宋本作居閒何焯校本疑是倨簡劉瑜傳關之盛衰者也何焯曰關字下有脱文後漢書八十七考證
