body:
  text: 後漢書卷五十九宋宣城太守范煜撰唐章懷太子賢注申屠鮑郅列傳第十九申屠剛傳申屠剛字巨卿扶風茂陵人也七世祖嘉文帝時爲丞相剛質性方直常慕史鰌汲黯之爲人史記曰史鰌字子魚衛大夫也論語孔子曰直哉史魚邦有道如矢邦無道如矢前書汲黯字長孺武帝時為主爵都尉好直諫時人謂之汲直仕郡功曹平帝時王莽専政朝多猜忌遂隔絶帝外家馮衛二族不得交官剛常疾之馮謂馮昭儀平帝祖母也衛謂衛姬平帝母也號中山太后王莽專政馮衛二族皆不得至京師交通仕宦見前書及舉賢良方正因對䇿曰臣聞王事失則神祗怨怒姦邪亂正故隂陽謬錯此天所以譴告王者欲令失道之君曠然覺悟懷邪之臣懼然自刻者也懼驚也音紀住反刻猶責也今朝廷不考功校德而虛納毁譽數下詔書張設重法抑斷誹謗禁割論議罪之重者乃至腰斬傷忠臣之情挫直士之銳殆乖建進善之旌縣敢諫之鼓旌旛也淮南子曰禹縣鐘鼓磬鐸置鞀以待四方之士為幡曰教道寡人以道者擊鼓喻以義者擊鐘告以事者振鐸語以憂者擊磬有獄訟者揺鞀帝王紀曰堯置敢諫之鼓闢四門之路明四目之義也孔安國注尚書曰開闢四方之門未開者謂廣致衆賢也明四日謂廣視於四方使下無壅塞也臣聞成王㓜少周公攝政聽言下賢均權布寵無舊無新唯仁是親尚書大傳曰武王入殷周公曰各安其宅各田其田無故無新唯仁之親動順天地舉措不失然近則召公不悅逺則四國流言尚書曰周公為師相成王為左右召公不悅言周公既還政成王宜其自退今復為相故不悅也四國謂管蔡商奄也成王㓜小周公攝政四國流言曰公將不利於孺子劉攽曰注云周公為師相成王為左右案文少召公為保四字夫子母之性天道至親今聖主㓜少始免繦緥免離也平帝即位時年九歲故云始免繦緥前書音義曰繦落也緥被也緥或作褓也卽位以来至親分離外戚杜隔恩不得通且漢家之制雖任英賢猶援姻戚親疏相錯杜塞間隙誠所以安宗廟重社稷也今馮衛無罪久廢不錄或處窮僻不若民庶誠非慈愛忠孝承上之意夫爲人後者自有正義至尊至卑其埶不嫌是以人無賢愚莫不爲怨姦臣賊子以之爲便不諱之變誠難其慮今之保傅非古之周公周公至聖猶尚有累何况事失其𠂻不合天心者哉昔周公先遣伯禽守封於魯以義割恩寵不加後伯禽周公旦之子也周公相成王先封伯禽於魯令就國守封後謂伯禽也周公身既尊寵不令伯禽復加榮貴以自挹損也東觀記曰昔周公豫防禍首先遣伯禽守封於魯離斷至親以義割恩使已尊寵不加其後故配天郊祀三十餘世自伯禽至頃公為楚考烈王所滅凡三十四公魯以周公大聖之後故郊祀配天一如天子之禮霍光秉政輔翼少主修善進士名爲忠直而尊崇其宗黨摧抑外戚昭帝時霍光輔政其子禹及兄孫雲山等皆中郎將奉車都尉昆弟諸壻皆奉朝請給事中唯昭帝外家趙氏無一在位者結貴據權至堅至固終没之後受禍滅門霍光薨後其子禹宣帝時為大司馬謀反發覺禹腰斬母顯及諸女昆弟皆棄市方今師傅皆以伊周之位據賢保之任以此思化則功何不至不思其危則禍何不到損益之際孔父攸歎說苑曰孔子讀易至損益則喟然而歎子夏問曰夫子何為歎孔子曰夫自損者益自益者缺吾是以歎之矣持滿之戒老氏所愼老子曰持而盈之不如其巳已止也言埶滿必傾不如止也蓋功冠天下者不安威震人主者不全今承衰亂之後繼重敝之世公家屈竭賦歛重數苛吏奪其時貪夫侵其財百姓困乏疾疫夭命盗賊羣輩且以萬數軍行衆止竊號自立興軍而行擁衆而止無畏憚於危亾也攻犯京師燔燒縣邑謂平帝元始三年陽陵人任横等自稱將軍盗武庫兵攻宫寺出囚徒也至乃訛言積弩入宮宿衛驚懼自漢興以來誠未有也國家微弱姦謀不禁六極之效危於累卵尚書大傳曰貌之不恭厥極惡言之不從厥極憂視之不眀厥極疾聽之不聰厥極貧心之不睿厥極凶短折皇極不建厥極弱也王者承天順地典爵主刑不敢以天官私其宗不敢以天罸輕其親陛下宜遂聖明之徳昭然覺悟逺述帝王之迹近遵孝文之業文帝即位使將軍薄昭迎薄太后於代剛欲使平帝迎中山太后至京師也差五品之屬納至親之序五品五常之教也尚書舜命契曰汝作司徒敬敷五教左傳史克曰舜舉八元使布五教于四方父義母慈兄友弟恭子孝亟遣使者徵中山太后置之别宫令時朝見又召馮衛二族裁與冗職冗散也使得執㦸親奉宿衛以防未然之符以抑患禍之端上安社稷下全保傅内和親戚外絶邪謀書奏莽令元后下詔曰剛所言僻經妄說元后元帝后王莽之姑也違背大義其罷歸田里後莽簒位剛遂避地河西轉入巴蜀徃來二十餘年及隗囂據隴右欲背漢而附公孫述剛說之曰愚聞人所歸者天所與人所畔者天所去也伏念本朝謂光武也躬聖德舉義兵共行天罸所當必摧誠天之所福非人力也將軍本無尺土孤立一隅宜推誠奉順與朝并力上應天心下醻人望爲國立功可以永年今文尚書曰立功立事可以永年也嫌疑之事聖人所絶以將軍之威重逺在千里動作舉措可不愼與今璽書數到委國歸信欲與將軍共同吉凶布衣相與尚有没身不負然諾之信况於萬乘者哉烈士傳曰羊角哀左伯桃二人為死友欲仕於楚道阻遇雨雪不得行飢寒自度不俱生伯桃謂角哀曰俱死之後骸骨莫收内手捫心知不如子生恐無益而棄子之能我樂在樹中角哀聼之伯桃入樹中而死楚平王愛角哀之賢以上卿禮葬伯桃角哀夣伯桃曰蒙子之恩而穫厚葬正苦荆將軍冢相近今月十五日當大戰以决勝負角哀至期日陳兵馬詣其冢作三桐人自殺下而從之此殁身不負然諾之信也今何畏何利久疑如是卒有非常之變上負忠孝下愧當世言從漢何畏附蜀何利而久疑不決夫未至豫言固常爲虛及其已至又無所及是以忠言至諫希得爲用誠願反覆愚老之言囂不納遂畔從述建武七年詔書徵剛剛將歸與囂書曰愚聞専已者孤拒諫者塞孤塞之政亡國之風也雖有明聖之姿猶屈已從衆故慮無遺䇿舉無過事夫聖人不以獨見爲明而以萬物爲心順人者昌逆人者亡此古今之所共也將軍以布衣爲鄉里所推廊廟之計旣不豫定廊殿下屋也廟太廟也國事必先謀於廊廟之所也動軍發衆又不深料今東方政教日睦百姓平安而西州發兵人人懷憂騷動惶懼莫敢正言羣衆疑惑人懐顧望非徒無精銳之心其患無所不至夫物窮則變生事急則計易其埶然也夫離道德逆人情而能有國有家者古今未有也將軍素以忠孝顯聞是以士大夫不逺千里慕樂德義今茍欲決意徼幸此何如哉夫天所祐者順人所助者信易繫辭之言也如未蒙祐助令小人受塗地之禍毁壞終身之徳敗亂君臣之節汚傷父子之恩不從光武是亂君臣之節也遣子恂入質而背之是傷父子之恩也衆賢破膽可不愼哉囂不納剛到拜侍御史遷尚書令光武嘗欲出游剛以隴蜀未平不宜宴安逸豫諫不見聽遂以頭軔乘輿輪帝遂爲止軔謂以頭止車輪也王逸注楚辭曰軔止輪木也時内外羣官多帝自選舉加以法理嚴察職事過苦尚書近臣至乃捶撲牽曵於前羣臣莫敢正言剛每輒極諫又數言皇太子宜時就東宫簡任賢保以成其徳帝並不納以數切諫失㫖數年出爲平隂令復徵拜太中大夫以病去官卒於家鮑永傳子昱鮑永字君長上黨屯留人也屯留今潞州縣也父宣哀帝時任司𨽻校尉爲王莽所殺莽輔政誅不附已者故殺宣永少有志操習歐陽尚書歐陽生字和伯千乘人受尚書於伏生見前書事後母至孝妻嘗於母前叱狗而永郎去之去音丘吕反初爲郡功曹莽以宣不附已欲滅其子孫都尉路平承望風旨規欲害永太守茍諫擁護召以爲吏常置府中永因數爲諫陳興復漢室翦滅簒逆之䇿諫每戒永曰君長幾事不密禍倚人門永感其言及諫卒自送喪歸扶風路平遂收永弟升太守趙興到聞乃歎曰我受漢茅土王者封五色土為社封諸侯則各割其方靣土與之燾以黄土苴以白茅使歸立社也不能立節而鮑宣死之豈可害其子也勑縣出升復署永功曹時有矯稱侍中止傳舎者興欲謁之永疑其詐諌不聽而出興遂駕徃永乃拔佩刀截馬當匈乃止當匈以韋為之也後數日莽詔書果下捕矯稱者永由是知名舉秀才不應更始二年徵再遷尚書僕射行大將軍事持節將兵安集河東并州朔部得自置偏裨輒行軍法永至河東因擊青犢大破之更始封爲中陽侯中陽縣屬西河郡今汾州孝義縣也永雖爲將率而車服敝素爲道路所識東觀記曰永好文德雖行將軍常衣皂襜褕路稱鮑尚書兵馬俗本或有為上加不者誤也時赤眉害更始三輔道絶光武卽位遣諫議大夫儲大伯風俗通曰儲姓齊大夫儲子之後也持節徵永詣行在所永疑不從乃收繫大伯東觀記曰封大伯所持節於晉陽傳合壁中遣信人馳至長安也劉攽曰注文傳合案文傳合當作舍遣使馳至長安旣知更始已亾乃發喪出大伯等封上將軍列侯印綬悉罷兵但幅巾與諸將及同心客百餘人詣河内幅巾謂不著冠但幅巾束首也帝見永問曰卿衆所在永離席叩頭曰臣事更始不能令全誠慙以其衆幸富貴故悉罷之幸希也帝曰卿言大而意不悅時攻懷未㧞帝謂永曰我攻懷三日而兵不下關東畏服卿可且將故人自徃城下譬之卽拜永諫議大夫至懐乃說更始河内太守於是開城而降帝大喜東觀記曰永說下懐上大喜與永對食賜永洛陽商里宅東觀記曰賜洛陽上商里宅陸機洛陽記曰上商里在洛陽東北本殷頑人所居故曰上商里宅也固辭不受時董憲裨將屯兵於魯侵害百姓乃拜永爲魯郡太守永到擊討大破之降者數千人唯别帥彭豐虞休皮常等各千餘人稱將軍不肯下頃之孔子闕里無故荆棘自除闕里解見明紀從講堂至於里門永異之謂府丞及魯令曰方今危急而闕里自開斯豈夫子欲令太守行禮助吾誅無道邪乃㑹人衆修鄉射之禮請豐等共㑹觀視欲因此禽之豐等亦欲圖永乃持牛酒勞饗而潜挾兵器永覺之手格殺豐等禽破黨與帝嘉其略封爲關内侯遷揚州牧時南土尚多宼暴永以吏人痍傷之後乃緩其銜轡銜轡喻法律以控御人也說苑曰理國譬若張琴大絃急則小絃絶矣故急於其銜轡者非千里之馭也示誅彊横而鎭撫其餘百姓安之㑹遭母憂去官悉以財産與孤弟子建武十一年徵爲司𨽻校尉帝叔父趙王良尊戚貴重永以事劾良大不敬東觀記曰時良從送中郎將來歙喪還入夏城門中與五官將軍相逄道廹良怒召門候岑尊叩頭馬前永劾奏良曰今月二十七日車駕臨故中郎将來歙喪還車駕過須史趙王良從後到與右中郎将張邯相逄城門中道迫狹叱邯旋車又召候岑尊詰責使前走數十歩按良諸侯藩臣䝉恩入侍知尊帝城門候吏六百石而肆意加怒令叩頭都道奔走馬頭前無藩臣之禮大不敬也劉攽曰注五官將軍案五官無将軍之稱蓋軍字本是車字由是朝廷肅然莫不戒懼乃辟扶風鮑恢爲都官從事恢亦抗直不避彊禦帝常曰貴戚且宜歛手以避二鮑其見憚如此永行縣到霸陵路經更始墓引車入陌墓在今萬年縣東北南北為阡東西為陌從事諫止之永曰親北靣事人寜有過墓不拜雖以獲罪司𨽻所不避也遂下拜哭盡哀而去西至扶風椎牛上茍諫冢帝聞之意不平問公卿曰奉使如此何如太中大夫張湛對曰仁者行之宗忠者義之主也仁不遺舊忠不忘君行之髙者也帝意乃釋後大司徒韓歆坐事建武十五年歆坐直言免也永固請之不得以此忤帝意出爲東海相坐度田事不實被徵諸郡守多下獄永至城臯詔書迎拜爲兗州牧便道之官東觀記詔書迎下永曰君晨夜冒犯霜露精神亦已勞矣以君帷幄近臣其以永為兗州牧也視事三年病卒子昱論曰鮑永守義於故主斯可以事新主矣耻以其衆受寵斯可以受大寵矣若乃言之者雖誠而聞之未譬譬猶曉也豈茍進之悅易以情納持正之忤難以理求乎言謟曲則易入剛直則難進也誠能釋利以循道居方以從義方直也君子之槩也昱字文泉少傳父學客授於東平建武初太行山中有劇賊太守戴渉聞昱鮑永子有智略乃就謁請署守髙都長髙都縣屬上黨郡故城在今澤州也昱應之遂討擊羣賊誅其渠帥道路開通由是知名後爲泚陽長政化仁愛境内清淨東觀記曰泚陽人趙堅殺人繫獄其父母詣昱自言年七十餘唯有一子適新娶今繫獄當死長無種類涕泣求哀昱憐其言令将妻入獄解械止宿遂任身有子荆州刺史表上之再遷中元元年拜司𨽻校尉詔昱詣尚書使封胡降檄檄軍書也若今之露布也光武遣小黄門問昱有所怪不對曰臣聞故事通官文書不著姓又當司徒露布漢官儀曰羣臣上書公卿校尉諸将不言姓凡制書皆璽封尚書令重封唯赦贖令司徒印露布州郡也怪使司𨽻下書而著姓也帝報曰吾固欲令天下知忠臣之子復為司𨽻也昱在職奉法守正有父風永平五年坐救火遲免後拜汝南太守郡多陂池歲歳决壞年費常三十餘萬昱乃上作方梁石洫洫渠也以石為之猶今之水門也水常饒足漑田倍多人以殷富十七年代王敏為司徒賜錢帛什器帷帳除子得為郎劉攽曰案後皆作德字義無兩子名得徳者知此字誤建初元年大旱穀貴肅宗召昱問曰旱旣太甚將何以消復災眚對曰臣聞聖人理國三年有成論語孔子曰如有用我者朞月而已可也三年乃有成功今陛下始踐天位刑政未著如有失得何能致異但臣前在汝南典理楚事永平十三年楚王英謀反連坐者在汝南昱時主劾之也繫者千餘人恐未能盡當其罪先帝詔言大獄一起寃者過半又諸徙者骨肉離分孤䰟不祀一人呼嗟王政為虧宜一切還諸徙家屬蠲除禁錮興滅繼絶死生獲所如此和氣可致帝納其言東觀記曰時司徒辭訟久者至十數年比例輕重非其事類錯雜難知昱奏定辭訟七卷決事都目八卷以齊同法令息遏人訟也四年代牟融爲太尉六年薨年七十餘子德修志節有名稱累官為南陽太守時歲多荒災唯南陽豐穰吏人愛悅號為神父時郡學久廢德乃修起横舎横學也字又作黌備俎豆黼冕行禮奏樂又尊饗國老宴會諸儒百姓觀者莫不勸服在職九年徵拜大司農卒于官子昻字叔雅有孝義節行初德被病數年昻俯伏左右衣不緩帶及處喪毁瘠三年抱負乃行服闋遂潜于墓次不關時務舉孝㢘辟公府連徵不至卒于家郅惲傳子夀郅惲字君章汝南西平人也潛夫論曰周先姞氏封於燕河東有郅都汝南有郅君章音與古姞同而其字異然前書音義郅音之日反年十二失母居喪過禮及長理韓詩嚴氏春秋韓韓嬰也作詩内外傳嚴嚴彭祖也受公羊於睦孟專門教授見儒林傳明天文厯數王莽時宼賊羣發惲乃仰占𤣥象歎謂友人曰方今鎮嵗熒惑並在漢分翼軫之域爾雅曰中央鎮星東方嵗星南方熒惑翼軫者南方鶉尾之宿楚之分野演孔圖曰卯金刀名為劉中國東南出荊州故爲漢分也去而復來漢必再受命福歸有德如有順天發策者必成大功時左隊大夫逯並素好士王莽以潁川為左隊郡守為大夫逯姓並名也風俗通曰逯秦邑也其大夫氏焉逯音禄惲說之曰當今上天垂象智者以昌愚者以亡昔伊尹自鬻輔商立功全人鬻自衒賣也史記曰伊尹欲干湯而無因乃為有莘氏媵臣負鼎爼以滋味說湯乃任以國政也惲竊不遜敢希伊尹之蹤應天人之變明府儻不疑逆俾成天德並竒之使署為吏惲不謁曰昔文王㧞吕尚於渭濵髙宗禮傅說於巖築桓公取管仲於射鉤故能立𢎞烈就元勲未聞師相仲父而可為吏位也師吕望也相傅説也仲父管仲也非闚天者不可與圖逺君不授驥以重任驥亦俛首裹足而去耳惲以驥自喻因自稱驥史記曰吳兵入郢申包胥走秦求救晝夜馳驅足腫蹠盭裂裳裹足鵠立秦庭盭音戾遂不受署西至長安乃上書王莽曰臣聞天地重其人惜其物故運機衡垂日月機衡北斗也含元包一甄陶品類前書志曰太極元氣含三為一謂三才未分包而為一甄也者陶人旋轉之輪也言天地造化品物如陶匠之成衆品者也劉攽曰注包而為一甄也者案文也字當在甄上顯表紀世圖錄豫設表明也紀年也言天豫設圖錄之書顯明帝王之年代也漢歴久長孔為赤制言孔丘作緯著歴運之期為漢家之制漢火徳尚赤故云為赤制卽春秋感精符云墨孔生為赤制是也不使愚惑殘人亂時智者順以成德愚者逆以取害神器有命不可虚獲上天垂戒欲悟陛下令就臣位轉禍為福上天垂戒謂鎭歲熒惑並在漢分也劉氏享天永命陛下順節盛衰享受也永長也漢家受天長命運祚未絶勸莽當順其時之盛衰衰則取之盛則還也取之以天還之以天可謂知命矣若不早圖是不免於竊位也竊盗也孔子曰臧文仲其竊位者與且堯舜不以天顯自與故禪天下堯舜盛德天之所顯猶不自與以位禪人言堯之禪舜舜禪於禹也陛下何貪非天顯以自累也天為陛下嚴父臣為陛下孝子父敎不敢廢子諌不可拒惟陛下留神莽大怒卽收繫詔獄劾以大逆猶以惲據經䜟難卽害之使黄門近臣脅惲令自告狂病恍惚不覺所言惲乃瞋目詈曰所陳皆天文聖意非狂人所能造遂繫須冬㑹赦得出乃與同郡鄭敬南遁蒼梧遁隱也蒼梧山名也山海經曰南方蒼梧之㐀蒼梧之川其中有九疑山焉舜之所葬也在今永州唐興縣東南建武三年又至廬江因遇積弩將軍傅俊東徇揚州俊素聞惲名乃禮請之上為將兵長史授以軍政惲乃誓衆曰無掩人不備窮人於戹不得斷人支體裸人形骸放淫婦女俊軍士猶發冢陳尸掠奪百姓惲諫俊曰昔文王不忍露白骨解見順紀武王不以天下易一人之命吕氏春秋曰武王伐紂至鮪水紂使膠鬲候周問武王曰何日至武王曰將以甲子日至膠鬲行天大雨日夜不休武王疾行不輟軍吏諫之武王曰吾疾行以救膠鬲之死也故能獲天地之應剋商如林之旅天地之應謂夜雨止畢陳白魚入舟之類剋勝也商殷號也旅衆也如林言衆多尚書曰武王伐紂率其旅若林㑹於牧野劉攽曰注武王伐紂率其旅若林案文伐字下少一殷字將軍如何不師法文王而犯逆天地之禁多傷人害物虐及枯尸取罪神明今不謝天改政無以全命願將軍親率士卒收傷葬死哭所殘暴以明非將軍本意也從之百姓悅服所向皆下七年俊還京師而上論之上音時掌反惲耻以軍功取位遂辭歸鄉里縣令卑身崇禮請以為門下掾惲友人董子張者父先為鄉人所害東觀記曰子張父及叔父為鄉里盛氏一時所害也及子張病將終惲徃候之子張垂殁視惲歔欷不能言惲曰吾知子不悲天命而痛讐不復也子在吾憂而不手子亡吾手而不憂也言子在吾憂子仇未能報而不須手自揮鋒子若亡吾直為子手刃仇人更不須心懐憂也子張但目擊而已目擊謂熟視之也荘子曰目擊而道存也惲即起將客遮仇人取其頭以示子張子張見而氣絶惲因而詣縣以狀自首令應之遲縣令不欲其自首詣獄故應對之緩也惲曰爲友報讐吏之私也奉法不阿君之義也虧君以生非臣節也趨出就獄令跣而追惲不及遂自至獄令㧞刀自向以要惲曰子不從我出敢以死明心惲若不出欲自刺以明心也惲得此乃出因病去久之太守歐陽歙請為功曹汝南舊俗十月享會百里内縣皆齎牛酒到府讌飲時臨享禮訖歙敎曰西部督郵繇延繇姓咎繇之後繇音遙天資忠貞禀性公方摧破姦凶不嚴而理今與衆儒共論延功顯之于朝太守敬嘉厥休牛酒飬德主簿讀書教户曹引延受賜惲於下坐愀然前曰司正舉觥愀變色貌司正主禮儀者觥罸爵也以角為之詩小雅曰兕觥其觩㫖酒思柔觥音古横反以君之罪告謝於天按延資性貪邪外方内員言延外示方直而内實柔弱也孔子曰色厲而内荏朋黨搆姦罔上害人所在荒亂怨慝並作明府以惡為善股肱以直從曲此旣無君又復無臣惲敢再拜奉觥歙色慙動不知所言門下掾鄭敬進曰君明臣直功曹言切明府德也可無受觥哉歙意少解曰實歙罪也敬奉觥遂受罸也惲乃免冠謝曰昔虞舜輔堯四罪咸服左傳曰舜臣堯乃流四凶族尚書曰舜流共工于幽州放驩兠于崇山竄三苗于三危殛鯀于羽山四罪而天下咸服也䜛言弗庸孔任不行庸用也孔甚也任佞也故能作股肱帝用有歌尚書曰股肱喜哉元首起哉惲不忠孔任是昭昭顯也惲自責不忠故使甚佞之人昭顯也豺虎從政豺虎貪獸以比繇延也旣䧟誹謗又露所言露顯也又對衆顯言繇延之罪也罪莫重焉請收惲延以明好惡歙曰是重吾過也重再也遂不讌而罷惲歸府稱病延亦自退鄭敬素與惲厚見其言忤歙乃相招去曰子廷爭繇延君猶不納延今雖去其埶必還言歙後必召延也直心無諱誠三代之道三代夏殷周也論語曰三代之所以直道而行也然道不同者不相為謀吾不能忍見子有不容君之危盍去之乎惲曰孟軻以彊其君之所不能為忠量其君之所不能為賊孟子對齊宣王曰力足以舉百釣而不足以舉一羽明足以察秋毫之末而不見輿薪則王許之乎曰否孟子曰今恩足以及禽獸而功不至於百姓者獨何與然則一羽之不舉為不用力焉輿薪之不見為不用明焉百姓之不見保為不用恩焉故王之不王不為也非不能也曰不為者與不能者之形何以異曰挟太山以超北海語人曰我不能是誠不能也為長者折枝語人曰我不能是不為也非不能也此彊其君之所不能為也又曰惻隱之心仁之端也羞惡之心義之端也辭讓之心禮之端也是非之心智之端也人之有是四端也猶其有四體也有是四端自謂不能者自賊者也謂其君不能者賊其君者也惲業已彊之矣障君於朝障蔽也君謂歙也言歙將以牛酒賞繇延而惲障蔽不聽之旣有其直而不死職罪也延退而惲又去不可敬乃獨隱於弋陽山中弋陽縣屬汝南郡前書云弋陽山在縣西北也居數月歙果復召延惲於是乃去從敬止漁釣自娛留數十日惲志在從政旣乃喟然而歎謂敬曰天生俊士以為人也鳥獸不可與同羣論語孔子之言子從我為伊吕乎將為巢許乎而父老堯舜也若為巢父許由則以堯舜為父老之人也敬曰吾足矣初從生歩重華於南野歩猶尋也重華舜字也南野謂蒼梧也謂來歸為松子赤松子也敬以歸鄉隱逸自謂同之劉向列仙傳曰赤松子神農時雨師至崑崙山常止西王母石室隨風上下炎帝少女追之得仙俱去也今幸得全軀樹類樹類謂有𦙍嗣還奉墳墓盡學問道敬汝南人今隱弋陽不離墳墓雖不從政施之有政是亦為政也論語孔子之言也言隱遁好道在家孝悌亦從政之義也吾年耄矣安得從子子勉正性命弗勞神以害生惲於是告别而去敬字次都清志髙世光武連徵不到謝沈書曰敬閑居不修人倫新遷都尉逼為功曹廳事前樹時有清汁以為甘露敬曰明府政未能致甘露此靑木汁耳辭病去隱處精學蛾陂中隂就虞延並辟不行同郡鄧敬因折芰為坐以荷薦肉瓠瓢盈酒言談彌日蓬廬蓽門琴書自娛光武公車徴不行按王莽改新蔡縣為新遷也惲遂客居江夏教授郡舉孝㢘為上東城門候洛陽城東靣北頭門也帝嘗出獵車駕夜還惲拒關不開帝令從者見靣於門間惲曰火明遼逺遂不受詔帝乃廻從東中門入東靣中門也明日惲上書諫曰昔文王不敢槃于游田以萬人為憂槃樂也尚書無逸曰文王不敢槃于游田以萬人惟正之供也而陛下逺獵山林夜以繼晝其如社禝宗廟何暴虎馮河未至之戒誠小臣所竊憂也書奏賜布百匹貶東中門候為參封尉參封縣屬琅邪郡後令惲授皇太子韓詩侍講殿中及郭皇后廢建武十七年廢惲乃言於帝曰臣聞夫婦之好父不能得之於子得猶制御也司馬遷曰妃匹之愛君不能得之臣父不能得之子況卑下乎况臣能得之於君乎是臣所不敢言雖然願陛下念其可否之計無令天下有議社稷而已帝曰惲善恕已量主知我必不有所左右而輕天下也左右猶向背也言其齊等后旣廢而太子意不自安惲乃說太子曰久處疑位上違孝道下近危殆昔髙宗明君吉甫賢臣及有纎介放逐孝子家語曰曾參妻為梨蒸不熟因出之終身不娶其子請焉㑹參曰髙宗以後妻殺孝子尹吉甫以後妻放伯奇吾上不及髙宗中不比吉甫知其得免於非乎遂不娶春秋之義母以子貴太子宜因左右及諸皇子引愆退身奉養母氏以明聖教不背所生太子從之帝竟聽許惲再遷長沙太守先是長沙有孝子古初遭父喪未葬鄰人失火初匍匐柩上以身扞火火為之滅惲甄異之以為首舉後坐事左轉芒長芒縣屬沛國故城在今亳州永城縣北一名臨雎城東觀記曰坐前長沙太守張禁多受遺送千萬以惲不推劾故左遷也又免歸避地教授避地謂隱遁也東觀記曰芒守丞韓龔受大盜丁仲錢阿擁之加笞八百不死入見惲稱仲健惲怒以所杖鐵杖棰龔龔出怨懟遂殺仲惲故坐免著書八篇以病卒子壽壽字伯孝善文章以廉能稱舉孝㢘稍遷冀州刺史時冀部屬郡多封諸王賔客放縦類不檢節類猶皆也壽案察之無所容貸乃使部從事專住王國又徙督郵舍王宫外近王宫置督郵舍以察王得失動靜失得卽時騎驛言上奏王罪及劾傅相於是藩國畏懼並為遵節視事三年冀土肅清三遷尚書令朝廷每有疑議常獨進見肅宗奇其智策擢為京兆尹郡多强豪姦暴不禁三輔素聞壽在冀州皆懐震竦各相檢勅莫敢干犯壽雖威嚴而推誠下吏皆願効死莫有欺者以公事免復徵為尚書僕射是時大將軍竇憲以外戚之寵威傾天下憲嘗使門生齎書詣壽有所請託壽卽送詔獄前後上書陳憲驕恣引王莽以誡國家是時憲征匈奴海内供其役費而憲及其弟篤景並起第宅驕奢非法百姓苦之壽以府藏空虚軍旅未休遂因朝會譏刺憲等厲音正色辭㫖甚切憲怒䧟壽以買公田誹謗下吏當誅侍御史何敞上疏理之曰臣聞聖王闢四門開四聰延直言之路下不諱之詔立敢諫之旗聽歌謡於路歌謡謂詩也禹置敢諫之幡解巳見上禮記王制曰命太師陳詩觀民風鄭𤣥注云陳詩謂采其詩而示之爭臣七人以自鑒照孔子曰天子有爭臣七人考知政理違失人心輒改更之故天人並應傳福無窮臣伏見尚書僕射郅壽坐於臺上與諸尚書論擊匈奴言議過差及上書請買公田遂繫獄考劾大不敬臣愚以為壽機密近臣匡救為職若懷默不言其罪當誅今壽違衆正議以安宗廟豈其私邪又臺閣平事分爭可否雖唐虞之隆三代之盛猶謂諤諤以昌不以誹謗為罪史記趙良謂商君曰千人之諾諾不如一士之諤諤武王諤諤以昌殷紂嘿嘿以亡請買公田人情細過可裁隱忍壽若被誅臣恐天下以為國家横罪忠直賊傷和氣忤逆隂陽臣所以敢犯嚴威不避夷滅觸死瞽言非為壽也論語曰侍於君子有三愆未見顔色而言謂之瞽也忠臣盡節以死為歸臣雖不知壽度其甘心安之誠不欲聖朝行誹謗之誅以傷晏晏之化鄭𤣥注尚書考靈耀云道徳純備謂之塞寛容覆載謂之晏杜塞忠直垂譏無窮臣敞謬豫機密言所不宜罪名明白當塡牢獄先壽僵仆萬死有餘書奏壽得減死論徙合浦今廣州縣劉攽曰案今合浦是廉州縣作廣誤未行自殺家屬得歸鄉里賛曰鮑永沉吟晩乃歸正志逹義全先號後慶易曰先號咷而後笑謂初㐫後吉也申屠對策郅惲上書有道雖直無道不愚後漢書卷五十九後漢書卷五十九考證郅惲傳將為巢許乎而父老堯舜也臣承蒼按父老堯舜若曰為野老於堯舜之世耳注謂以堯舜為父老之人恐非是郅惲子夀以傷晏晏之化汲古閣夲依鄭注改塞晏非是第五倫何敞陳寵傳皆有晏晏二字後漢書卷五十九考證
