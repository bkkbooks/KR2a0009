body:
  text: 後漢書卷九十六宋宣城太守范煜撰唐章懐太子賢注陳王列傳第五十六陳蕃傳陳蕃字仲舉汝南平輿人也祖河東太守蕃年十五嘗閑處一室而庭宇蕪穢父友同郡薛勤來候之謂蕃曰孺子何不洒掃以待賔客蕃曰大丈夫處世當掃除天下安事一室乎勤知其有清世志甚竒之初仕郡舉孝亷除郎中遭母憂棄官行䘮服闋刺史周景辟别駕從事續漢志曰别駕從事校尉行部奉引總録衆事以諫争不合投傳而去投棄也傳謂符也音丁戀反後公府辟舉方正皆不就太尉李固表薦徴拜議郎再遷為樂安太守續漢志曰樂安縣名夲名千乘和帝更名也時李膺為青州刺史名有威政屬城聞風皆自引去蕃獨以清績留郡人周璆髙潔之士璆音仇又巨秋反前後郡守招命莫肯至唯蕃能致焉字而不名特為置一榻去則縣之璆字孟玉臨濟人有羙名民有趙宣𦵏親而不閉埏隧埏隧今人墓道也杜預注左傳云掘地通路曰隧因居其中行服二十餘年鄉邑稱孝州郡數禮請之郡内以薦蕃蕃與相見問及妻子而宣五子皆服中所生蕃大怒曰聖人制禮賢者俯就不肖企及禮記曰三年之䘮可復父母之恩也賢者俯而就之不肖者企而及之且祭不欲數以其易黷故也黷媟也禮記曰祭不欲數數則煩煩則不敬況乃寢宿冡蔵而孕育其中誑時惑衆誣汙鬼神乎遂致其罪大將軍梁冀威震天下時遣書詣蕃有所請託不得通使者詐求謁蕃怒笞殺之坐左轉脩武令稍遷拜尚書時零陵桂陽山賊為害公卿議遣討之又詔下州郡一切皆得舉孝亷茂才蕃上疏駁之曰昔髙祖創業萬邦息肩撫飬百姓同之赤子尚書曰若保赤子惟民其康乂今二郡之民亦陛下之赤子也致令赤子為害豈非所在貪虐使其然乎宜嚴勅三府隐覈牧守令長其有在政失和侵暴百姓者即便舉奏更選清賢奉公之人能班宣法令情在愛恵者可不勞王師而羣賊弭息矣又三署郎吏二千餘人三府掾屬過限未除但當擇善而授之簡惡而去之豈煩一切之詔以長請屬之路乎以此忤左右故出為豫章太守性方峻不接賔客士民亦畏其髙蕃䘮妻鄉人畢至唯許子將不往曰仲舉性峻峻則少通故不造也徴為尚書令送者不出郭門遷大鴻臚㑹白馬令李雲抗疏諌桓帝怒當伏重誅蕃上書救雲坐免歸田里復徴拜議郎數日遷光祿勲時封賞踰制内寵猥盛蕃乃上疏諫曰臣聞有事社稷者社稷是為有事人君者容悅是為今臣蒙恩聖朝備位九列見非不諫則容悅也夫諸侯上象四七垂耀在天下應分土藩屏上國上象四七謂二十八宿各主諸侯之分野故曰下應分土言皆以輔王室也髙祖之約非功臣不侯而聞追錄河南尹鄧萬世父遵之微功更爵尚書令黄儁先人之絶封近習以非義授邑左右以無功𫝊賞授位不料其任裂土莫紀其功至乃一門之内侯者數人故緯象失度隂陽謬序稼用不成民用不康臣知封事已行言之無及誠欲陛下從是而止又比年収斂十傷五六萬人饑寒不聊生活而采女數千食肉衣綺脂油粉黛不可貲計貲量也鄙諺云盗不過五女門以女貧家也今後宫之女豈不貧國乎是以傾宫嫁而天下化帝王紀曰紂作傾宫多采羙女以充之武王伐殷乃歸傾宫之女於諸侯也楚女悲而西宫災公羊傳曰西宫災何休注云時僖公為齊桓所脅以齊媵為嫡楚女廢居西宫而不見恤悲愁怨曠所生且聚而不御必生憂悲之感以致并隔水旱之困夫獄以禁止姦違官以稱才理物若法虧於平官失其人則王道有缺而令天下之論劉攽曰案文令當作今皆謂獄由怨起爵以賄成夫不有臭穢則蒼蠅不飛陛下宜採求失得擇從忠善尺一選舉委尚書三公尺一謂板長尺一以寫詔書也使褒責誅賞各有所歸豈不幸甚帝頗納其言為出宫女五百餘人但賜儁爵闗内侯而萬世南鄉侯延熹六年車駕幸廣城校獵廣城苑名在今汝州梁縣西也蕃上疏諫曰臣聞人君有事於苑囿唯仲秋西郊順時講武殺禽助祭以敦孝敬如或違此則為肆縱故臯陶戒舜無教逸遊尚書咎繇謨曰無教逸欲有邦周公戒成王無槃于遊田尚書無逸篇之言虞舜成王猶有此戒况徳不及二主者乎夫安平之時尚宜有節况當今之世有三空之戹哉田野空朝廷空倉庫空是謂三空加兵戎未戢四方離散是陛下焦心毁顔坐以待旦之時也豈宜揚旗曜武騁心輿馬之觀乎又前秋多雨民始種麥今失其勸種之時而令給驅禽除路之役非賢聖恤民之意也齊景公欲觀於海放乎琅邪晏子為陳百姓惡聞旌旗輿馬之音舉首嚬眉之感景公為之不行周穆王欲肆車轍馬跡祭公謀父為誦祈招之詩以止其心誠惡逸遊之害人也祭公祭國公為周卿士謀父名也祈招逸詩也左傳曰昔周穆王欲肆其心周行天下將皆必有車轍馬跡焉祭公謀父作祈招之詩以止王心其詩曰祈招之愔愔式昭徳音思我王度式如玉式如金刑人之力而無醉飽之心書奏不納自蕃為光禄勲與五官中郎將黄琬共典選舉不偏權富而為埶家郎所譛訴坐免歸頃之徴為尚書僕射轉太中大夫八年代楊秉為太尉蕃讓曰不愆不忘率由舊章詩大雅也言成王令徳不過誤不遺失循用舊典文章謂周公之禮法也臣不如太常胡廣齊七政訓五典臣不如議郎王暢聰明亮達文武兼姿劉攽曰案姿是姿貎此當作資也臣不如㢮刑徒李膺帝不許中常侍蘓康管霸等復被任用遂排陷忠良共相阿媚大司農劉祐廷尉馮緄音古本反河南尹李膺皆以忤㫖為之抵罪蕃因朝㑹固理膺等請加原宥升之爵任言及反覆誠辭懇切帝不聼因流涕而起時小黄門趙津南陽大猾張汜等奉事中官乘埶犯法二郡太守劉瓆成瑨考案其罪雖經赦令而並竟考殺之劉攽曰案漢魏鞠獄皆云考竟此誤宦官怨恚有司承㫖遂奏瓆瑨罪當棄市又山陽太守翟超沒入中常侍侯覽財産東海相黄浮誅殺下邳令徐宣超浮並坐髠鉗輸作左校蕃與司徒劉矩司空劉茂共諫請瓆瑨超浮等帝不悅有司劾奏之矩茂不敢復言蕃乃獨上疏曰臣聞齊桓脩霸務為内政國語曰桓公問管仲曰安國可乎對曰未可君若正卒伍修甲兵大國亦如之若欲速得志於天下諸侯則可以隠令可以寄政公曰隠令寄政若何對曰作内政而寄軍令焉春秋於魯小惡必書公羊傳莊公四年公及齊人狩于郜譏其與讐狩也僖公二十年新作南門譏其奢也故曰小惡必書也宜先自整勑後以及人今宼賊在外四支之疾内政不理心腹之患臣寢不能寐食不能飽實憂左右日親忠言以疎内患漸積外難方深陛下超從列侯繼承天位言桓帝以蠡吾侯即位小家畜産百萬之資子孫尚恥愧失其先業况乃産兼天下受之先帝而欲懈怠以自輕忽乎誠不愛已不當念先帝得之勤苦耶前梁氏五侯毒徧海内五侯謂􅏷讓淑忠㦸五人與冀同時誅事見冀傳也天啓聖意収而戮之天下之議冀當小平明鑒未逺覆車如昨而近習之權復相扇結小黄門趙津大猾張汜等肆行貪虐姦媚左右前太原太守劉瓆南陽太守成瑨紏而戮之雖言赦後不當誅殺原其誠心在乎去惡至於陛下有何悁悁說文曰悁悁恚忿而小人道長營惑聖聴遂使天威為之發怒如加刑讁已為過甚况乃重罰令伏歐刄乎又前山陽太守翟超東海相黄浮奉公不撓疾惡如讎超沒侯覽財物浮誅徐宣之罪並䝉刑坐不逢赦恕覽之從横沒財已幸宣犯釁過死有餘辜昔丞相申屠嘉召責鄧通洛陽令董宣折辱公主而文帝從而請之光武加以重賞文帝時太中大夫鄧通愛幸居上旁有怠慢禮丞相申屠嘉入朝因見之為檄召通通至嘉曰通小臣戯殿上大不敬當斬通頓首首盡出血文帝使使召通而謝丞相曰吾弄臣君釋之也湖陽公主蒼頭白日殺人匿主家吏追不得公主出宣駐車叩馬以刀畫地數主主言於帝帝賜宣錢二十萬語見董宣傳未聞二臣有専命之誅而今左右羣豎惡傷黨類妄相交搆致此刑譴聞臣是言當復嗁訴陛下深宜割塞近習豫政之源引納尚書朝省之事公卿大夫五日一朝宣帝五日一聴事自丞相已下各敷奏其言簡練清髙斥黜佞邪如是天和於上地洽於下休禎符瑞豈逺乎哉陛下雖厭毒臣言凡人主有自勉強敢以死陳帝得奏愈怒竟無所納朝廷衆庶莫不怨之宦官由此疾蕃彌甚選舉奏議輒以中詔譴郤長吏以下多至抵罪劉攽曰案文吏當作史太尉府有長史故因蕃見譴也猶以蕃名臣不敢加害瓆字文理髙唐人髙唐縣名今博州縣也瑨字㓜平陜人並有經術稱處位敢直言多所搏擊知名當時皆死於獄中九年李膺等以黨事下獄考實蕃因上疏極諌曰臣聞賢明之君委心輔佐亡國之主諱聞直辭故湯武雖聖而興於伊吕桀紂迷惑亡在失人闗龍逢桀臣王子比干紂諸父二人並諌悉皆誅死由此言之君為元首臣為股肱同體相湏共成羙惡者也前書曰君為元首臣為股肱明其一體相湏而成也伏見前司𨽻校尉李膺太僕杜宻太尉掾范滂等正身無玷死心社稷以忠忤㫖横加考案或禁錮閉隔或死徙非所杜塞天下之口聾盲一世之人與秦焚書阬儒何以為異秦始皇時丞相李斯上言曰天下已定百姓力農今諸生好古惑亂黔首臣請史官非秦記及天下敢有蔵詩書百家語者悉燒之事見史記衛宏詔定古文官書序曰秦既焚書患苦天下不從所改更而諸生到者拜為郎前後七百人乃宻令種𤓰於驪山阬谷中温處𤓰實詔博士說之人人不同乃令就視為伏機諸生賢儒皆至焉方相難不决因發機從上填之以土皆壓之終乃無聲今新豐縣温湯處號愍儒鄉湯西有馬谷西岸有阬古老相傳以為秦阬儒處也昔武王克殷表閭封墓史記武王克殷命畢公表商容之閭閎夭封比干之墓也今陛下臨政先誅忠賢遇善何薄待惡何優夫讒人似實巧言如簧詩小雅曰巧言如簧顔之厚矣簧笙簧也言䜛人之口以喻笙簧也使聼之者惑視之者昏夫吉凶之効存乎識善成敗之機在於察言人君者攝天地之政秉四海之維舉動不可以違聖法進退不可以離道規謬言出口則亂及八方何况髠無罪於獄殺無辜於市乎昔禹廵狩蒼梧見市殺人下車而哭之曰萬方有罪在予一人故其興也勃焉說苑曰禹見罪人下車泣而問之左右曰夫罪人不順故使殺焉君王何為痛之至此也禹曰堯舜之人皆以堯舜之心為心今寡人為君也百姓各自以其心是以痛之書曰百姓有罪在予一人左傳曰禹湯罪已其興也勃焉桀紂罪人其亡也忽焉杜預注曰勃盛也又青徐炎旱五榖損傷民物流遷茹菽不足廣雅曰茹食也而宫女積於房掖國用盡於羅紈外戚私門貪財受賂所謂禄去公室政在大夫昔春秋之末周徳衰㣲數十年間無復災𤯝者天所棄也春秋感精符曰魯哀公政亂絶無日食天不譴告也天之於漢悢悢無已悢悢猶眷眷也故殷勤示變以悟陛下除妖去孽實在修徳臣位列台司憂責深重不敢尸祿惜生坐觀成敗如䝉採錄使身首分裂異門而出所不恨也穀梁傳曰公㑹齊侯于頰谷齊人使優施舞於魯之幕下孔子曰笑君者罪當死使司馬行法焉首足異門而出也帝諱其言切託以蕃辟召非其人遂䇿免之永康元年帝崩竇后臨朝詔曰夫民生樹君使司牧之必湏良佐以固王業前書谷永曰臣聞天生蒸人不能相治為立王者以綂理之也前太尉陳蕃忠清直亮其以蕃為太傅錄尚書事時新遭大䘮國嗣未立諸尚書畏懼權官託病不朝蕃以書責之曰古人立節事亡如存言人王雖亡法度尚在當行之與不亡時同故曰如存前書袁盎曰主在與在主亡與亡也今帝祚未立政事日蹙諸君奈何委荼蓼之苦息偃在牀詩國風曰誰謂荼苦其甘如薺周頌曰未堪家多難予又集于蓼於義不足焉得仁乎諸尚書惶怖皆起視事靈帝即位竇太后復優詔蕃曰葢褒功以勸善表義以厲俗無徳不報大雅所歎詩大雅曰無言不讎無徳不報太傅陳蕃輔弼先帝出内累年内音納尚書曰出納朕命也忠孝之羙徳冠本朝謇愕之操華首彌固齊宣王對閭邱卭曰夫士亦華髪墮顛而後可用見新序今封蕃髙陽侯食邑三百戸蕃上疏讓曰使者即臣廬授髙陽鄉侯印綬即就也臣誠悼心不知所裁臣聞讓身之文徳之昭也然不敢盗以為名竊惟割地之封功徳是為臣熟自思省前後歴職無它異能合亦食祿不合亦食祿臣雖無素絜之行竊慕君子不以其道得之不居也論語孔子曰富與貴是人之所欲不以其道得之不處也若受爵不讓掩面就之詩小雅曰受爵不讓至于已斯亡注云爵祿不以相讓故怨禍及之也使皇天震怒災流下民於臣之身亦何所寄顧惟陛下哀臣朽老戒之在得論語孔子曰及其老也血氣既衰戒之在得注云得貪也竇太后不許蕃復固讓章前後十上竟不受封初桓帝欲立所幸田貴人為皇后蕃以田氏卑㣲竇族良家爭之甚固帝不得已乃立竇后及后臨朝故委用於蕃蕃與后父大將軍竇武同心盡力徴用名賢共參政事天下之士莫不延頸想望太平而帝乳母趙嬈旦夕在太后側嬈音乃了反中常侍曹節王甫等與共交搆諂事太后太后信之數出詔命有所封拜及其支類多行貪虐蕃常疾之志誅中官㑹竇武亦有謀蕃自以既從人望而徳於太后必謂其志可申乃先上疏曰臣聞言不直而行不正則為欺乎天而負乎人危言極意則羣凶側目禍不旋踵鈞此二者臣寜得禍不敢欺天也今京師嚻嚻道路諠譁言侯覽曹節公乘昕王甫鄭䬃等與趙夫人諸女尚書並亂天下趙夫人即趙嬈也女尚書宫内官也附從者升進忤逆者中傷前書劉向上書論王鳯曰稱譽者登進忤恨者誅傷也方今一朝羣臣如河中木耳汎汎東西耽祿畏害陛下前始攝位順天行誅蘇康管霸並伏其辜是時天地清明人鬼歡喜奈何數月復縱左右元惡大姦莫此之甚今不急誅必生變亂傾危社稷其禍難量願出臣章宣示左右并令天下諸姦知臣疾之太后不納朝廷聞者莫不震恐蕃因與竇武謀之語在武傳及事泄曹節等矯詔誅武等蕃時年七十餘聞難作將官屬諸生八十餘人並㧞刄突入承明門攘臂呼曰大將軍忠以衛國黄門反逆何云竇氏不道邪王甫時出與蕃相迕迕猶遇也適聞其言而讓蕃曰先帝新棄天下山陵未成竇武何功兄弟父子一門三侯又多取掖庭宫人作樂飲讌旬月之間貲財億計大臣若此是為道邪公為棟梁枉橈阿黨復焉求賊遂令収蕃蕃㧞劍叱甫甫兵不敢近乃益人圍之數十重遂執蕃送黄門北寺獄黄門從官騶騶騎士也蹋蹴蕃曰死老魅復能損我曹員數奪我曹禀假不即日害之徙其家屬於比景宗族門生故吏皆斥免禁錮蕃友人陳留朱震時為銍令銍縣屬沛郡聞而棄官哭之収塟蕃尸匿其子逸於甘陵界中事覺繋獄合門桎梏震授考掠劉攽曰案文授當作受誓死不言故逸得免後黄巾賊起大赦黨人乃追還逸官至魯相震字伯厚初為州從事奏濟隂太守單匡臧罪并連匡兄中常侍車騎將軍超桓帝収匡下廷尉以譴超超詣獄謝三府諺曰車如雞栖馬如狗疾惡如風朱伯厚論曰桓靈之世若陳蕃之徒咸能樹立風聲抗論惛俗而馳驅嶮阨之中與刑人腐夫同朝争衡前書班固曰相與提衡音義云衡平也言二人齊也終取滅亡之禍者彼非不能絜情志違埃霧也違避也愍夫世士以離俗為髙而人倫莫相恤也以遯世為非義故屢退而不去以仁心為己任雖道逺而彌厲論語曰仁以為己任不亦重乎死而後已不亦逺乎及遭際㑹協䇿竇武自謂萬世一遇也懔懔乎伊望之業矣懍懍有風采之貎也功雖不終然其信義足以携持民心漢世亂而不亡百餘年間數公之力也王允傳王允字子師太原祁人也祁今并州縣也世仕州郡為冠盖同郡郭林宗嘗見允而竒之曰王生一日千里玉佐才也史記曰田光謂燕太子丹曰臣聞驥壯盛之時一日千里至其老也駑馬先之遂與定交年十九為郡吏時小黄門晉陽趙津貪横放恣為一縣巨患允討捕殺之而津兄弟諂事宦官因縁譛訴桓帝震怒徴太守劉瓆下獄死允送䘮還平原終畢三年然後歸家復還仕郡人有路佛者少無名行而太守王球召以補吏允犯顔固争球怒収允欲殺之刺史鄧盛聞而馳傳辟為别駕從事允由是知名而路佛以之廢棄允少好大節有志於立功常習誦經傳朝夕試馳射三公並辟以司徒髙第為侍御史中平元年黄巾賊起特選拜豫州刺史辟荀爽孔融等為從事上除禁黨討擊黄巾别帥大破之與左中郎將皇甫嵩右中郎將朱儁等受降數十萬於賊中得中常侍張讓賔客書疏與黄巾交通允具發其姦以状聞靈帝責怒讓讓叩頭陳謝竟不能罪之而讓懐挾忿怒以事中允中傷也明年遂𫝊下獄傳逮也㑹赦還復刺史旬日間復以它罪被捕司徒楊賜以允素髙不欲使更楚辱更經也楚苦痛乃遣客謝之曰君以張讓之事故一月再徴凶慝難量幸為深計深計謂令自死又諸從事好氣決者共流涕奉藥而進之允厲聲曰吾為人臣獲罪於君當伏大辟以謝天下豈有乳藥求死乎投杯而起出就檻車既至廷尉左右皆促其事朝臣莫不歎息大將軍何進太尉袁隗司徒楊賜共上疏請之曰夫内視反聼則忠臣竭誠寛賢務能則義士厲節内視自視也反聼自聼也言皆恕己不責於人也是以孝文納馮唐之說文帝時魏尚為雲中守下吏免馮唐為郎中署長奏言曰臣聞魏尚為雲中守上功首虜差六級陛下下之吏削其爵愚以為陛下法太明賞太輕罸太重帝即日赦尚復為雲中太守晉悼宥魏絳之罪左傳曰晉悼公之弟楊干亂行於曲梁魏絳戮其僕公怒之絳曰臣聞師衆以順為武軍事有死無犯為敬臣懼其死以及楊干無所逃罪公曰寡人有弟不能教訓使干大命寡人之過也子無重寡人之過與之禮食使佐新軍允以特選受命誅逆撫順曾未期月州境澄清方欲列其庸勲請加爵賞而以奉事不當當肆大戮責輕罸重有虧衆望臣等備位宰相不敢寢黙誠以允宜䝉三槐之聼以昭忠貞之心周禮朝士職三槐九棘公卿於下聼訟故曰三槐之聼書奏得以減死論是冬大赦而允獨不在宥三公咸復為言至明年乃得觧釋是時宦者横暴睚眦觸死睚音五懈反眦音士賜反前書曰原渉好殺睚眦於塵中觸死者甚多允懼不免乃變易名姓轉側河内陳留間轉側猶去来也及帝崩乃奔䘮京師時大將軍何進欲誅宦官召允與謀事請為從事中郎轉河南尹獻帝即位拜太僕再遷守尚書令初平元年代楊彪為司徒守尚書令如故及董卓遷都闗中允悉収斂蘭臺石室圗書秘緯要者以從既至長安皆分别條上又集漢朝舊事所當施用者一皆奏之經籍具存允有力焉時董卓尚留洛陽朝政大小悉委之於允允矯情屈意每相承附卓亦推心不生乖疑故得扶持王室於危亂之中臣主内外莫不倚恃焉允見卓禍毒方深簒逆已兆宻與司隸校尉黄琬尚書鄭公業等謀共誅之乃上護羌校尉楊瓚行左將軍事執金吾士孫瑞為南陽太守並將兵出武闗道以討袁術為名實欲分路征卓而後㧞天子還洛陽卓疑而留之允乃引内瑞為僕射瓚為尚書二年卓還長安錄入闗之功封允為温侯食邑五千戸固讓不受士孫瑞說允曰夫執謙守約存乎其時公與董太師並位俱封而獨崇髙節豈和光之道邪老子曰和其光同其塵允納其言乃受二千戸三年春連雨六十餘日允與士孫瑞楊瓚登臺請霽復結前謀說文曰霽雨止也郭璞曰南陽人呼雨止曰霽瑞曰自嵗末以來太陽不照霖雨積時月犯執法執法星名史記曰太㣲南四星曰執法也彗孛仍見晝隂夜陽霧氣交侵此期應促盡内發者勝幾不可後公其圗之允然其言乃潜結卓將吕布使為内應㑹卓入賀吕布因刺殺之語在卓傳帝時疾愈故入賀也允初議赦卓部曲吕布亦數勸之既而疑曰此輩無罪從其主耳今若名為惡逆而特赦之適足使其自疑非所以安之之道也吕布又欲以卓財物班賜公卿將校允又不從而素輕布以劔客遇之布亦負其功勞多自誇伐既失意望漸不相平允性剛稜疾惡稜威稜也力登反初懼董卓豺狼故折節圗之卓既殱滅自謂無復患難及在際㑹每乏溫潤之色仗正持重不循權宜之計是以羣下不甚附之董卓將校及在位者多涼州人允議罷其軍或說允曰涼州人素憚袁氏而畏闗東今若一旦觧兵闗東則必人人自危劉攽曰今若一旦觧兵闗東案文多闗東二字可以皇甫義真為將軍就領其衆因使留陜以安撫之而徐與闗東通謀以觀其變允曰不然闗東舉義兵者皆吾徒耳今若距險屯陜雖安涼州而疑闗東之心甚不可也時百姓訛言當悉誅涼州人遂轉相恐動其在闗中者皆擁兵自守更相謂曰丁彦思蔡伯喈但以董公親厚並尚從坐今既不赦我曹而欲觧兵今日觧兵明日當復為魚肉矣卓部曲將李傕郭汜等先將兵在闗東因不自安遂合謀為亂攻圍長安城陷吕布奔走布駐馬青瑣門外前書音義曰以青畵戸邉鏤中天子制也招允曰公可以去乎允曰若蒙社稷之靈上安國家吾之願也如其不獲則奉身以死之朝廷㓜少恃我而已朝廷謂天子也臨難茍免吾不忍也努力謝闗東諸公勤以國家為念初允以同郡宋翼為左馮翊王宏為右扶風是時三輔民庶熾盛兵榖富實李傕等欲即殺允懼二郡為患乃先徴翼宏宏遣使謂翼曰郭汜李傕以我二人在外故未危王公今日就徴明日俱族計將安出翼曰雖禍福難量然王命所不得避也宏曰義兵鼎沸在於董卓况其黨與乎若舉兵共討君側惡人山東必應之此轉禍為福之計也翼不從宏不能獨立遂俱就徴下廷尉傕乃収允及翼宏并殺之允時年五十六長子侍中盖次子景定及宗族十餘人皆見誅害唯兄子晨陵得脫歸鄉里天子感慟百姓䘮氣莫敢収允尸者唯故吏平陵令趙戩棄官營䘮戩音翦王宏字長文少有氣力不拘細行初為𢎞農太守考案郡中有事宦官買爵位者雖位至二千石皆掠考収捕遂殺數十人威動鄰界素與司隸校尉胡种有隙及宏下獄种遂廹促殺之宏臨命詬曰詬罵也音火豆反宋翼豎儒不足議大計豎者言賤劣如僮豎胡种樂人之禍禍將及之种後眼輒見宏以杖擊之因發病數日死後遷都於許帝思允忠節使改殯𦵏之遣虎賁中郎將奉䇿弔祭賜東園祕器贈以本官印綬送還本郡封其孫黒為安樂亭侯食邑三百戸士孫瑞字君䇿扶風人頗有才謀瑞以允自専討董卓之勞故歸功不侯所以獲免於難後為國三老光祿大夫每三公缺楊彪皇甫嵩皆讓位於瑞興平二年從駕東歸為亂兵所殺趙戩字叔茂長陵人性質正多謀初平中為尚書典選舉董卓數欲有所私授戩輒堅拒不聼言色強厲卓怒召將殺之衆人悚慄而戩辭貎自若卓悔謝釋之長安之亂客於荆州劉表厚禮焉及曹操平荆州乃辟之執戩手曰恨相見晚卒相國鍾繇長史鍾繇字元常魏太祖時為相國論曰士雖以正立亦以謀濟若王允之推董卓而引其權伺其間而敝其罪當此之時天下懸觧矣莊子曰斯所謂帝之懸觧懸觧喻安泰也而終不以猜忤為釁者知其本於忠義之誠也故推卓不為失正分權不為茍冒伺間不為狙詐及其謀濟意從則歸成於正也贊曰陳蕃蕪室志清天綱人謀雖緝幽運未當緝合也易下繫曰人謀鬼謀言蕃設謀雖合而㝠運未符也言觀殄瘁曷非云亡殄盡也瘁病也言國將殄瘁豈不由賢人云亡乎詩大雅曰人之云亡邦國殄瘁也子師圗難晦心傾節謂矯性屈意於董卓功全元醜身殘餘孽時有隆夷事亦工拙誅卓為工被殺為拙也後漢書卷九十六後漢書卷九十六考證陳蕃傳再遷為樂安太守注續漢志樂安縣名本名千乘和帝更名也縣當作郡臣㑹汾按千乘貞王傳永元七年改國名樂安質帝時改封渤海樂安仍當為郡故此傳言樂安太守也樂安屬邑有千乘樂安兩縣前後志初無改易惟郡名耳營惑聖聼何焯校本營改熒王允傳种後眼輒見宏諸本同何焯校本眼改眠後漢書卷九十六考證
