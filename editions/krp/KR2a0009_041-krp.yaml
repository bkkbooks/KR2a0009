body:
  text: 後漢書卷四十一宋宣城太守范煜撰唐章懷太子賢注劉𤣥劉盆子列傳第一劉𤣥傳劉𤣥字聖公光武族兄也爾雅曰族父之子相謂為族昆弟帝王紀曰舂陵戴侯熊渠生蒼梧太守利利生子張納平林何氏女生更始弟為人所殺聖公結客欲報之客犯法續漢書曰時聖公聚客家有酒請㳺徼飲賔客醉歌言朝亨兩都尉㳺徼後來用調羮味㳺徼大怒縛捶數百聖公避吏於平林吏繫聖公父子張聖公詐死使人持喪歸舂陵吏乃出子張聖公因自逃匿王莽末南方饑饉人庶羣入野澤掘鳬茈而食之更相侵奪爾雅曰芍鳬茈郭璞曰生下田中苗似龍鬚而細根如指頭黒色可食芍音胡了反鳬茈續漢書作符訾新市人王匡王鳳為平理諍訟遂推為渠帥衆數百人於是諸亡命馬武王常成丹等往從之共攻離鄉聚藏於綠林中離鄉聚謂諸鄉聚離散去城郭逺者大曰鄉小曰聚前書曰収合離鄉置大城中即其義也綠林山在今荆州當陽縣東北也數月間至七八千人地皇二年王莽年也荆州牧某史闕名也發奔命二萬人攻之匡等相率迎擊於雲杜雲杜縣名屬江夏郡故城在今復州沔陽縣西北大破牧軍殺數千人盡獲輜重續漢書曰牧欲北歸隨武等復遮擊之鈎牧車屏泥刺殺其驂乗然不敢殺牧也劉攽曰案馬謂之驂人謂之參乗只合用參字遂攻㧞竟陵縣名屬江夏郡故城在今郢州長夀縣南轉擊雲杜安陸安陸縣屬江夏郡今安州縣也多畧婦女還入綠林中至有五萬餘口州郡不能制三年大疾疫死者且半乃各分散引去王常成丹西入南郡號下江兵王匡王鳳馬武及其支黨朱鮪張卬等續漢書卬作印北入南陽號新市兵皆自稱將軍七月匡等進攻隨未能下隨縣屬南陽郡今隨州縣平林人陳牧廖湛廖音力弔反復聚衆千餘人號平林兵以應之聖公因往從牧等為其軍安集掾欲其安集軍衆故權以為官名是時光武及兄伯升亦起舂陵與諸部合兵而進四年正月破王莽前隊大夫甄阜屬正梁丘賜斬之號聖公為更始將軍衆雖多而無所統一諸將遂共議立更始為天子二月辛巳設壇場於淯水上沙中陳兵大㑹更始即帝位南面立朝羣臣素懦弱羞愧流汗舉手不能言於是大赦天下建元曰更始元年悉拜置諸將以族父良為國三老王匡為定國上公王鳳成國上公朱鮪大司馬伯升大司徒陳牧大司空餘皆九卿將軍五月伯升㧞宛六月更始入都宛城盡封宗室及諸將為列侯者百餘人更始忌伯升威名遂誅之以光祿勲劉賜為大司徒前鍾武侯劉望起兵畧有汝南時王莽納言將軍嚴尤秩宗將軍陳茂既敗於昆陽往歸之八月望遂自立為天子以尤為大司馬茂為丞相王莽使太師王匡國將哀章守洛陽風俗通曰哀姓魯哀公之後因諡以為姓更始遣定國上公王匡攻洛陽西屏大將軍申屠建丞相司直李松攻武關三輔震動是時海内豪傑翕然響應皆殺其牧守自稱將軍用漢年號以待詔命旬月之間徧於天下長安中起兵攻未央宫九月東海人公賔就斬王莽於漸臺風俗通曰公賔姓也魯大夫公賔庚之後漸臺太液池中臺也為水所漸潤故以為名収璽綬傳首詣宛更始時在便坐黄堂取視之喜曰莽不如是當與霍光等寵姬韓夫人笑曰若不如是帝焉得之乎更始悦乃懸莽首於宛城市是月㧞洛陽生縛王匡哀章至皆斬之十月使奮威大將軍劉信擊殺劉望於汝南并誅嚴尤陳茂更始遂北都洛陽以劉賜為丞相申屠建李松自長安傳送乗輿服御又遣中黄門從官奉迎遷都二年二月更始自洛陽而西初發李松奉引馬驚奔觸北宫鐵柱門三馬皆死續漢書曰馬禍也時更始失道將亡之徴初王莽敗唯未央宫被焚而已其餘宫館一無所毁宫女數千備列後庭自鍾鼔帷帳輿輦器服太倉武庫官府市里不改於舊更始既至居長樂宫升前殿郎吏以次列庭中更始羞怍俛首刮席不敢視怍顔色變也俛俯也諸將後至者更始問虜掠得㡬何左右侍官皆宫省久吏各驚相視李松與棘陽人趙萌説更始宜悉王諸功臣朱鮪爭之以為髙祖約非劉氏不王更始乃先封宗室太常將軍劉祉為定陶王劉賜為宛王劉慶為燕王劉歙為元氏王大將軍劉嘉為漢中王劉信為汝陰王後遂立王匡為比陽王王鳳為宣城王朱鮪為膠東王衞尉大將軍張卬為淮陽王廷尉大將軍王常為鄧王執金吾大將軍廖湛為穰王申屠建為平氏王尚書胡殷為隨王柱天大將軍李通為西平王西平縣屬汝南郡故城在今豫州郾城縣南也五威中郎將李軼為舞隂王水衡大將軍成丹為襄邑王大司空陳牧為陰平王陰平縣屬廣漢國驃騎大將軍宋佻為潁陰王尹尊為郾王唯朱鮪辭曰臣非劉宗不敢干典遂讓不受乃徙鮪為左大司馬劉賜為前大司馬使與李軼李通王常等鎮撫關東以李松為丞相趙萌為右大司馬共秉内任更始納趙萌女為夫人有寵遂委政於萌日夜與婦人飲讌後庭羣臣欲言事輙醉不能見時不得已乃令侍中坐帷内與語諸將識非更始聲出皆怨曰成敗未可知遽自縱放若此韓夫人尤嗜酒每侍飲見常侍奏事輙怒曰帝方對我飲正用此時持事來乎起抵破書案抵擊也趙萌專權威福自己郎吏有說萌放縱者更始怒㧞劒擊之自是無復敢言萌私忿侍中引下斬之更始救請不從時李軼朱鮪擅命山東王匡張卬横暴三輔其所授官爵者皆羣小賈豎或有膳夫庖人多著繡面衣錦袴襜褕諸于罵詈道中襜褕諸于見光武紀續漢志曰時智者見之以為服之不中身之灾也乃奔入邊郡避之是服妖也其後為赤眉所殺也長安為之語曰竈下養中郎將爛羊胃騎都尉爛羊頭關内侯公羊傳曰炊烹為養軍帥將軍劉攽曰案是時多置軍師鄧禹傳亦作軍師將軍此當作師豫章李淑上書諫曰方今賊寇始誅王化未行百官有司宜慎其任夫三公上應台宿九卿下括河海春秋漢含孳曰三公在天為三台九卿為北斗故三公象五岳九卿法河海二十七大夫法山陵八十一元士法谷阜合為帝佐以匡綱紀故天工人其代之陛下定業雖因下江平林之埶斯蓋臨時濟用不可施之既安宜釐改制度更延英俊因才授爵以匡王國今公卿大位莫非戎陳尚書顯官皆出庸伍資亭長賊捕之用漢法十里一亭亭置一長捕賊掾專捕盗賊也劉攽曰注捕賊掾案前書合作賊捕掾而當輔佐綱維之任唯名與器聖人所重今以所重加非其人望其毗益萬分興化致理譬猶縁木求魚升山採珠求之非所不可得也孟子對齊宣王曰以若所為求若所欲猶緣木求魚也海内望此有以闚度漢祚臣非有憎疾以求進也但為陛下惜此舉厝敗材傷錦所宜至慮孟子謂齊宣王曰為巨室則必使工師求大木工師得大木則王喜以為能勝其任也匠人斵而小之則王怒以為不勝其任矣左傳子産謂子皮曰子有美錦不使人學製焉大官大邑身之所庇而使學者製焉其為美錦不亦重乎未嘗操刀而使之割其傷實多也惟割既往謬妄之失思隆周文濟濟之美割絶也詩大雅曰濟濟多士文王以寧更始怒繫淑詔獄自是關中離心四方怨叛諸將出征各自專置牧守州郡交錯不知所從十二月赤眉西入關三年正月平陵人方望立前孺子劉嬰為天子初望見更始政亂度其必敗謂安陵人弓林等曰前定安公嬰平帝之嗣雖王莽簒奪而嘗為漢主今皆云劉氏真人當更受命欲共定大功何如林等然之乃於長安求得嬰將至臨涇立之今涇州縣也聚黨數千人望為丞相林為大司馬更始遣李松與討難將軍蘇茂等擊破皆斬之又使蘇茂拒赤眉於𢎞農茂軍敗死者千餘人三月遣李松㑹朱鮪與赤眉戰於蓩鄉蓩音莫老反字林云毒草也因以為地名續漢志𢎞農有蓩鄉東觀記曰徐宣樊崇等入至𢎞農枯樅山下與更始將軍蘇茂戰崇北至蓩鄉轉至湖湖即湖城縣也以此而言其蓩蓋在今虢州湖城縣之間松等大敗棄軍走死者三萬餘人時王匡張卬守河東為鄧禹所破還奔長安卬與諸將議曰赤眉近在鄭華陰間旦暮且至今獨有長安見滅不久不如勒兵掠城中以自富轉攻所在東歸南陽収宛王等兵事若不集復入湖池中為盜耳申屠建廖湛等皆以為然共入說更始更始怒不應莫敢復言及赤眉立劉盆子更始使王匡陳牧成丹趙萌屯新豐李松軍掫以拒之掫音子侯反續漢志曰新豐有鴻門亭掫城即此也張卬廖湛胡殷申屠建等與御史大夫隗囂合謀欲以立秋日貙膢時共劫更始前書音義曰貙獸以立秋日祭獸王者亦此日出獵用祭宗廟冀州北郡以八月朝作飲食為膢其俗語曰膢臘社伏貙音丑于反膢音婁俱成前計侍中劉能卿知其謀以告之更始託病不出召張卬等卬等皆入將悉誅之唯隗囂不至更始狐疑使卬等四人且待於外廬卬與湛殷疑有變遂突出獨申屠建在更始斬之卬與湛殷遂勒兵掠東西市昏時燒門入戰於宫中更始大敗明旦將妻子車騎百餘東奔趙萌於新豐更始復疑王匡陳牧成丹與張卬等同謀乃並召入牧丹先至即斬之王匡懼將兵入長安與張卬等合李松還從更始與趙萌共攻匡卬於城内連戰月餘匡等敗走更始徙居長信宫三輔黄圖曰從洛門至周廟門有長信宫在其中赤眉至髙陵匡等迎降之遂共連兵而進更始城守使李松出戰敗死者二千餘人赤眉生得松時松弟汎為城門校尉赤眉使使謂之曰開城門活汝兄汎即開門九月赤眉入城更始單騎走從厨城門出三輔黄圖曰洛城門王莽改曰建子門其内有長安厨官俗名之為厨城門今長安故城北面之中門是也諸婦女從後連呼曰陛下當下謝城更始即下拜復上馬去初侍中劉恭以赤眉立其弟盆子自繫詔獄聞更始敗乃出步從至髙陵止傳舎右輔都尉嚴本本或作平或作丕恐失更始為赤眉所誅將兵在外號為屯衞而實囚之赤眉下書曰聖公降者封長沙王過二十日勿受更始遣劉恭請降赤眉使其將謝祿往受之十月更始遂隨祿肉袒詣長樂宫上璽綬於盆子赤眉坐更始置庭中將殺之劉恭謝祿為請不能得遂引更始出劉恭追呼曰臣誠力極請得先死㧞劒欲自刎赤眉帥樊崇等遽共救止之乃赦更始封為畏威侯劉恭復為固請竟得封長沙王更始常依謝祿居劉恭亦擁䕶之三輔苦赤眉暴虐皆憐更始而張卬等以為慮謂祿曰今諸營長多欲簒聖公者一旦失之合兵攻公自滅之道也於是祿使從兵與更始共牧馬於郊下因令縊殺之劉恭夜往収藏其屍光武聞而傷焉詔大司徒鄧禹𦵏之於霸陵有三子求歆鯉明年夏求兄弟與母東詣洛陽帝封求為襄邑侯奉更始祀歆為穀孰侯鯉為夀光侯求後徙封咸陽侯求卒子廵嗣復徙封灌澤侯襄邑即春秋襄牛地也今為縣在宋州西穀孰縣屬梁國在宋州東南夀光縣屬北海郡今青州縣也灌澤縣今澤州縣故曰徙封廵卒子姚嗣論曰周武王觀兵孟津退而還師以為紂未可伐斯時有未至者也史記曰武王即位太公望為師周公旦為輔召公畢公之徒左右王師東觀兵孟津時諸侯不期而㑹者八百皆曰紂可伐矣武王曰未可乃還師漢起驅輕黠烏合之衆輕黠謂輕鋭桀黠也烏合如烏鳥之羣合也不當天下萬分之一而旌旃之所撝及撝與麾同書文之所通被莫不折戈頓顙爭受職命非唯漢人餘思固亦㡬運之㑹也夫為權首鮮或不及左傳曰無始禍前書曰無為權首將受其咎陳項且猶未興况庸庸者乎劉盆子傳劉盆子者太山式人式縣名中興縣廢城陽景王章之後也章髙帝孫朱虚侯也祖父憲元帝時封為式侯父萌嗣王莽簒位國除因為式人焉天鳯元年琅邪海曲有吕母者子為縣吏犯小罪宰論殺之海曲縣名故城在宻州莒縣東續漢書曰吕母子名育為㳺徼犯罪也吕母怨宰宻聚客規以報仇母家素豐貲産數百萬乃益釀醇酒買刀劒衣服少年來酤者皆賖與之視其乏者輙假衣裳不問多少數年財用稍盡少年欲相與償之吕母垂泣曰所以厚諸君者非欲求利徒以縣宰不道枉殺吾子欲為報怨耳諸君寧肯哀之乎少年壯其意又素受恩皆許諾其中勇士自號猛虎遂相聚得數十百人東觀記曰賔客徐次子等自號搤虎搤音於責反力可搤虎言其勇也今為猛字搤與猛相類也因與吕母入海中招合亡命衆至數千吕母自稱將軍引兵還攻破海曲執縣宰諸吏叩頭為宰請母曰吾子犯小罪不當死而為宰所殺殺人當死又何請乎遂斬之以其首祭子冢復還海中後數嵗琅邪人樊崇起兵於莒東觀記曰樊崇字細君衆百餘人轉入太山自號三老時青齊大饑寇賊蜂起羣盜以崇勇猛皆附之一嵗間至萬餘人崇同郡人逄安劉攽曰案逢字從夅音龎字自從夅非借逢為龎音此傳内皆誤東海人徐宣謝祿楊音東觀記曰逄音龎安字少子東莞人也徐宣字驕稺謝祿字子竒皆東海臨沂人也各起兵合數萬人復引從崇共還攻莒不能下轉掠至姑幕姑幕縣名故城在今宻州莒縣東北古薄姑氏之國因擊王莽探湯侯田況大破之王莽改北海益縣曰探湯殺萬餘人遂北入青州所過虜掠還至太山留屯南城南城縣屬東海郡有南城山因以為名也初崇等以困窮為寇無攻城徇地之計衆既寖盛乃相與為約殺人者死傷人者償創以言辭為約束無文書旌旗部曲號令其中最尊者號三老次從事次卒吏汎相稱曰臣人劉攽曰案三老從事卒史皆是漢小吏名或鄉官也赤眉之起不知自名官府取耳目所熟者為稱呼故有此號後人不曉誤以史為吏字卒吏絶無義理當改為卒史又案前書言盜賊亶稱巨人今此為臣人亦誤也當作巨王莽遣平均公亷丹太師王匡擊之崇等欲戰恐其衆與莽兵亂乃皆朱其眉以相識别由是號曰赤眉赤眉遂大破丹匡軍殺萬餘人追至無鹽無鹽縣名故城在今鄆州須昌縣東亷丹戰死王匡走崇又引其兵十餘萬復還圍莒數月或説崇曰莒父母之國奈何攻之乃解去時吕母病死其衆分入赤眉青犢銅馬中赤眉遂寇東海與王莽沂平大尹王莽改東海郡曰沂平以郡守為大尹戰敗死者數千人乃引去掠楚沛汝南潁川還入陳留攻㧞魯城轉至濮陽㑹更始都洛陽遣使降崇崇等聞漢室復興即留其兵自將渠帥二十餘人隨使者至洛陽降更始皆封為列侯崇等既未有國邑而留衆稍有離叛乃遂亡歸其營將兵入潁川分其衆為二部崇與逄安為一部徐宣謝祿楊音為一部崇安攻㧞長社南擊宛斬縣令而宣祿等亦㧞陽翟引之梁今汝州梁縣也擊殺河南太守赤眉衆雖數戰勝而疲敝厭兵厭倦皆日夜愁泣思欲東歸崇等計議慮衆東向必散不如西攻長安更始二年冬崇安自武關宣等從陸渾關武關在今商州上洛縣東河圖括地象曰武關山為地門上為天齊星前書曰陸渾縣有關在今洛州伊闕縣西南兩道俱入三年正月俱至𢎞農與更始諸將連戰尅勝衆遂大集乃分萬人為一營凡三十營營置三老從事各一人進至華隂軍中常有齊巫鼓舞祠城陽景王以求福助以其定諸吕安社稷故郡國多為立祠焉盆子承其後故軍中祠之巫狂言景王大怒曰當為縣官何故為賊縣官謂天子也有笑巫者輙病軍中驚動時方望弟陽怨更始殺其兄乃逆説崇等曰更始荒亂政令不行故使將軍得至於此今將軍擁百萬之衆西向帝城而無稱號名為羣賊不可以久不如立宗室挾義誅伐以此號令誰敢不服崇等以為然而巫言益甚前及鄭今華州縣乃相與議曰今迫近長安而鬼神如此當求劉氏共尊立之六月遂立盆子為帝自號建世元年初赤眉過式掠盆子及二兄恭茂皆在軍中恭少習尚書略通大義及隨崇等降更始即封為式侯以明經數言事拜侍中從更始在長安盆子與茂留軍中屬右校卒吏劉攽曰案吏當為史説並見上劉俠卿主芻牧牛號曰牛吏及崇等欲立帝求軍中景王後者得七十餘人唯盆子與茂及前西安侯劉孝最為近屬崇等議曰聞古天子將兵稱上將軍乃書札為符曰上將軍又以兩空札置笥中札簡也笥篋也遂於鄭北設壇場祠城陽景王諸三老從事皆大㑹陛下列盆子等三人居中立以年齒探札盆子最幼後探得符諸將乃皆稱臣拜盆子時年十五被髪徒跣敝衣赭汗見衆拜恐畏欲啼茂謂曰善藏符盆子即齧折棄之復還依俠卿俠卿為制絳單衣半頭赤幘幘巾所以覆髻也續漢書曰童子幘無屋示未成人也半頭幘即空頂幘也其上無屋故以為名董仲舒繁露曰以赤統者幘尚赤盆子承漢統故用赤也東宫故事曰太子有空頂幘一枚即半頭幘之製也直綦履綦履文也蓋直刺其文以為飾也乗軒車大馬赤屏泥赤屏泥謂以緹油屏泥於軾前絳襜絡襜帷也車上施帷以屏蔽者交絡之以為飾續漢志曰王公列侯安車加交絡帷裳也而猶從牧兒遨崇雖起勇力而為衆所宗然不知書數徐宣故縣獄吏能通易經遂共推宣為丞相崇御史大夫逢安左大司馬謝祿右大司馬自楊音以下皆為列卿軍及髙陵與更始叛將張卬等連和遂攻東都門三輔黄圖曰宣平門長安城東面北頭第一門也其外郭門名東都門入長安城更始來降盆子居長樂宫諸將日㑹論功爭言讙呼讙譁也讙音火完反㧞劒擊柱不能相一三輔郡縣營長遣使貢獻兵士輙剽奪之剽劫也又數虜暴吏民百姓保壁由是皆復固守至臘日崇等乃設樂大㑹盆子坐正殿中黄門持兵在後公卿皆列坐殿上酒未行其中一人出刀筆書謁欲賀古者記事書於簡册謬誤者以刀削而除之故曰刀筆其餘不知書者起往請之請其書己名也各各屯聚更相背向大司農楊音按劒罵曰諸卿皆老傭也今日設君臣之禮反更殽亂殽亦亂也兒戲尚不如此皆可格殺相拒而殺之曰格更相辯鬪而兵衆遂各踰宫斬關入掠酒肉互相殺傷衞尉諸葛穉聞之勒兵入格殺百餘人乃定盆子惶恐日夜啼泣獨與中黄門共卧起唯得上觀閣而不聞外事時掖庭中宫女猶有數百千人自更始敗後幽閉殿内掘庭中蘆菔根爾雅曰葖蘆菔音步北反菔字或作蔔捕池魚而食之死者因相埋於宫中有故祠甘泉樂人尚共擊鼓歌舞衣服鮮明甘泉宫有祭祀之所樂人謂掌祭天之樂者也見盆子叩頭言飢盆子使中黄門稟之米人數斗後盆子去皆餓死不出劉恭見赤眉衆亂知其必敗自恐兄弟俱禍宻教盆子歸璽綬習為辭讓之言建武二年正月朔崇等大㑹劉恭先曰諸君共立恭弟為帝徳誠深厚立且一年淆亂日甚誠不足以相成恐死而無所益願得退為庶人更求賢知唯諸君省察崇等謝曰此皆崇等罪也恭復固請或曰此寧式侯事邪劉恭為式侯言衆立天子非恭所預恭惶恐起去盆子乃下牀解璽綬叩頭曰今設置縣官而為賊如故吏人貢獻輙見剽劫流聞四方莫不怨恨不復信向此皆立非其人所致願乞骸骨避賢聖必欲殺盆子以塞責者無所離死離避也誠冀諸君肯哀憐之耳因涕泣噓唏唏與􅀈同崇等及㑹者數百人莫不哀憐之乃皆避席頓首曰臣無狀負陛下請自今已後不敢復放縱因共抱持盆子帶以璽綬盆子號呼不得已既罷出各閉營自守三輔翕然稱天子聰明百姓爭還長安市里且滿得二十餘日赤眉貪財物復出大掠城中糧食盡遂収載珍寳因大縱火燒宫室引兵而西過祠南郊車甲兵馬最為猛盛衆號百萬盆子乗王車駕三馬續漢志曰王車朱班輪青葢左右騑駕三馬從數百騎乃自南山轉掠城邑與更始將軍嚴春戰於郿破春殺之遂入安定北地至陽城番須中逢大雪坑谷皆滿士多凍死乃復還發掘諸陵取其寳貨遂汙辱吕后屍凡賊所發有玉匣殮者率皆如生漢儀注曰自腰以下以玉為札長尺廣二寸半為匣下至足綴以黄金縷謂之為玉匣也故赤眉得多行婬穢大司徒鄧禹時在長安遣兵擊之於郁夷郁夷縣屬右扶風也反為所敗禹乃出之雲陽九月赤眉復入長安止桂宫長安記曰桂宫在未央宫北亦曰北宫時漢中賊延岑出散關屯杜陵逢安將十餘萬人擊之鄧禹以逢安精兵在外唯盆子與羸弱居城中乃自往攻之㑹謝祿救至夜戰稾街中三輔舊事曰長安城中有稾街禹兵敗走延岑及更始將軍李寳合兵數萬人與逢安戰於杜陵岑等大敗死者萬餘人寳遂降安而延岑収散卒走寳乃宻使人謂岑曰子努力還戰吾當於内反之表裏合勢可大破也岑即還挑戰安等空營擊之寳從後悉㧞赤眉旌幟更立已幡旗安等戰疲還營見旗幟皆白大驚亂走自投川谷死者十餘萬逢安與數千人脱歸長安時三輔大飢人相食城郭皆空白骨蔽野遺人往往聚為營保各堅守不下赤眉虜掠無所得十二月乃引而東歸衆尚二十餘萬隨道復散光武乃遣破姦將軍侯進等屯新安建威大將軍耿弇等屯宜陽分為二道以要其還路勅諸將曰賊若東走可引宜陽兵㑹新安賊若南走可引新安兵㑹宜陽明年正月鄧禹自河北度擊赤眉於湖湖縣故城在今虢州湖城縣西南禹復敗走赤眉遂出關南向征西大將軍馮異破之於崤底即崤坂也在今洛州永寧縣西北帝聞乃自將幸宜陽盛兵以邀其走路赤眉忽遇大軍震驚不知所為乃遣劉恭乞降曰盆子將百萬衆降陛下何以待之帝曰待汝以不死耳樊崇乃將盆子及丞相徐宣以下三十餘人肉袒降上所得傳國璽綬更始七尺寳劒及玉璧各一積兵甲宜陽城西與熊耳山齊宜陽縣故城韓國城也在今洛州福昌縣東酈元水經注曰洛水之北有熊耳山雙巒競舉狀如熊耳在宜陽西也帝令縣厨賜食衆積困餧十餘萬人皆得飽飫明旦大陳兵馬臨洛水令盆子君臣列而觀之謂盆子曰自知當死不對曰罪當應死猶幸上憐赦之耳帝笑曰兒大黠宗室無蚩者釋名曰蚩癡也又謂崇等曰得無悔降乎朕今遣卿歸營勒兵鳴鼓相攻決其勝負不欲强相服也徐宣等叩頭曰臣等出長安東都門君臣計議歸命聖徳百姓可與樂成難與圖始故不告衆耳今日得降猶去虎口歸慈母誠歡誠喜無所恨也帝曰卿所謂鐵中錚錚傭中佼佼者也説文曰錚錚金也鐵之錚錚言微有剛利也錚音初耕反佼音古巧反佼好貌也詩曰佼人僚兮今相傳云音胡巧反言佼佼者凡傭之人稍為勝也又曰諸卿大為無道所過皆夷滅老弱溺社稷汚井竈溺音奴弔反然猶有三善攻破城邑劉攽曰案文當云攻城破邑周徧天下本故妻婦無所改易是一善也立君能用宗室是二善也餘賊立君迫急皆持其首降自以為功諸卿獨完全以付朕是三善也乃令各與妻子居洛陽賜宅人一區田二頃其夏樊崇逢安謀反誅死楊音在長安時遇趙王良有恩賜爵關内侯與徐宣俱歸郷里卒於家劉恭為更始報殺謝祿自繫獄赦不誅帝憐盆子賞賜甚厚以為趙王郎中後病失明賜滎陽均輸官地以為列肆均輸官名屬司農肆市列也桓寬鹽鐵論云郡國諸侯各以其方物貢輸往來物多苦惡不償其費故郡國置輸官以相紹運故曰均輸使食其稅終身贊曰聖公靡聞假我風雲易曰雲從龍風從虎聖人作而萬物覩假借也言聖公初起無所聞知借我中興風雲之便始順歸歴終然崩分赤眉阻亂阻恃也盆子探符雖盜皇器皇器猶神器謂天位也乃食均輸後漢書卷四十一後漢書卷四十一考證劉聖公傳共攻離鄉聚注離鄉聚謂諸鄉聚離散去城郭逺者大曰鄉小曰聚臣承蒼按離鄉乃聚名若南陽之夕陽聚南郡之藍口聚丹陽聚皆是也郡國志於南新市侯國下注按本傳有離鄉聚綠林則離鄉聚與綠林均為地名可知章懷注非後漢書卷四十一考證
