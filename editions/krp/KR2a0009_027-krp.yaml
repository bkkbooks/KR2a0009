body:
  text: 後漢書卷二十七梁剡令劉昭補并注五行志第十七五行五射妖人化龍蛇孽死復生馬禍疫人痾投蜺五行傳曰皇之不極是謂不建尚書大傳皇作王鄭𤣥曰王君也不名體而言王者五事象五行則王極象天也天變化為隂為陽覆成五行經曰歴象日月星辰敬授人時論語曰為政以徳譬如北辰是則天之道於人政也孔子説春秋曰政以不由王出不得為政則王君出政之號也極中也建立也王象天以情性覆成五事為中和之政也王政不中和則是不能立其事也古文尚書皇極皇建其有極孔安國曰大中之道大立其有中謂行九疇之義馬融對䇿曰大中之道在天為北辰在地為人君厥咎眊尚書大傳作瞀鄭𤣥曰瞀與思心之咎同耳故傳曰眊眊亂也君臣不立則上下亂矣字林曰目少精曰眊厥罰恒隂鄭𤣥曰王極象天天隂養萬物陰氣失故常陰厥極弱鄭𤣥曰天為剛徳剛氣失故於人為弱易説亢龍之行曰貴而無位髙而無民賢人在下位而無輔此之謂弱或云懦不敬也時則有射妖鄭𤣥曰射王極之度也射人將發矢必先於此儀之發則中於彼矣君將出政亦先於朝廷度之出則應於民心射其象也時則有龍蛇之孽鄭𤣥曰龍蟲之生於淵行無形遊於天者也屬天蛇龍之類也或曰龍無角者曰蛇時則有馬禍鄭𤣥曰天行健馬畜之疾行者也屬王極時則有下人伐上之痾鄭𤣥曰夏侯勝説伐宜為代書亦或作代陰陽之神曰精氣情性之神曰䰟魄君行不由常侜張無度則是䰟魄傷也王極氣失之病也天於不中之人恒耆其毒増以為病將以開賢代之也春秋傳所謂奪伯有魄者是也不名病者病不著於身體也時則有日月亂行星辰逆行鄭𤣥曰亂謂薄食鬬並見逆謂縮反明經天守舎之類也太公六韜曰人主好武事兵革則日月薄食太白失行皇君也極中也眊不明也說云此沴天也不言沴天者至尊之辭也春秋王師敗績以自敗爲文恒陰中興以來無録者臣昭案本傳陽嘉二年郎顗上書云正月以來陰闇連日乆陰不雨亂氣也得賢不用猶乆陰不雨也靈帝光和中雒陽男子夜龍以弓箭射北闕吏収考問辭居貧負責無以聊生因買弓箭以射近射妖也風俗通曰龍從兄陽求臘錢龍假取䌓數頗厭患之陽與錢千龍意不滿欲破陽家因持弓矢射𤣥武東闕三發吏士呵縛首服因是遣中常侍尚書御史中丞直事御史謁者衛尉司隸河南尹雒陽令悉㑹發所劭時為太尉議曹掾白公鄧盛夫禮設闕觀所以餙門章於至尊懸諸象魏示民禮法也故車過者下步過者趨今龍乃敢射闕意慢事醜次於大逆宜遣主者參問變狀公曰府不主盜賊當與諸府相候卲曰丞相邴吉以為道路死傷既往之事京兆長安職所窮逐而住車問牛喘吐舌者豈輕人而貴畜哉頗念隂陽不和必有所害掾史爾乃恱服漢書嘉其逹大體今龍所犯然中外奔波邴吉防患太豫況於己形昭晰者哉明公既䖏宰相大任加掌兵戎之職凡在荒裔謂之大事何有近目下而致逆節之萌者孔子攝魯司㓂非常卿也折僭溢之端消纎介之漸從政三月惡人走境邑門不闔外收强齊侵地内虧三桓之威區區小國尚於趣舎大漢之朝焉可無乎明公恬然謂非已詩云儀刑文王萬邦作孚當為人制法何必取法於人於是公意大悟遣令史謝申以鈐下規應掾自行之還具條奏時靈帝詔報惡惡止其身龍以重論之陽不坐其後車騎將軍何苖與兄大將軍進部兵還相猜疑對相攻擊戰於闕下苖死兵敗殺數千人雒陽宫室内人燒盡應劭曰龍者陽類君之象也夜者不明之應也此其象也安帝延光三年濟南言黄龍見歴城琅邪言黄龍見諸是時安帝聽讒免太尉楊震震自殺又帝獨有一子以為太子信讒廢之是皇不中故有龍孽是時多用佞媚故以為瑞應明年正月東郡又言黄龍二見濮陽桓帝干寳搜神記曰桓帝即位冇大蛇見徳陽殿上雒陽市令淳于翼曰蛇有鱗甲兵之象也見於省中將有椒房大臣受甲兵之誅也乃棄官遁去到延熹二年誅大將軍梁冀捕治宗屬揚兵京師也延熹七年六月壬子河内野王山上有龍死長可數十丈袁山松書曰長可百餘丈襄楷以為夫龍者為帝王瑞易論大人天鳳中黄山宫有死龍漢兵誅莽而世祖復興此易代之徵也至建安二十五年魏文帝代漢臣昭曰夫屈申躍見變化無方非顯死之體横强之畜易況大聖實類君道野王之異豈桓帝將崩之表乎妖等占殊其例斯衆茍欲附㑹以同天鳳則帝涉三主年踰五十此為迂闊將恐非徵矣永康元年八月巴郡言黄龍見時吏傅堅以郡欲上言内白事以為走卒戲語不可太守不聽嘗見堅語云時民以天熱欲就池浴見池水濁因戲相恐此中有黄龍語遂行人間聞郡欲以為美故言時史以書帝紀桓帝時政治衰缺而在所多言瑞應皆此類也又先儒言瑞興非時則為妖孽而民訛言生龍語皆龍孽也熹平元年四月甲午青蛇見御坐上是時靈帝委任宦者王室微弱楊賜諌曰皇極不建則有龍蛇之孽詩云惟虺惟蛇女子之祥宜抑皇甫之權割豔妻之愛則蛇變可消者也案張奐傳建寕二年夏青蛇見御坐軒前奐上疏陳蕃竇武未被明宥妖𤯝之來皆爲此也敦煌實録曰蛇長六尺夜於御前當軒而見更始二年二月發雒陽欲入長安司直李松奉引車奔觸北宫鐡柱門三馬皆死馬禍也時更始失道將亡桓帝延熹五年四月驚馬與逸象突入宮殿近馬禍也是時桓帝政衰缺靈帝光和元年司徒長史馮巡馬生人風俗通曰巡馬生胡子問飬馬胡蒼頭乃奸此馬以生子京房易傳曰上亡天子諸侯相伐厥妖馬生人後馮巡遷甘陵相黄巾初起為所殘殺而國家亦四靣受敵其後闗東州郡各舉義兵卒相攻伐天子西移王政隔塞其占與京房同光和中雒陽水西橋民馬逸走遂齧殺人是時公卿大臣及左右數有被誅者安帝永初元年十一月戊子民轉相驚走棄什物去廬舎靈帝建寜三年春河内婦食夫河南夫食婦臣昭曰案此二食夫妻不同在河南北每見死異斯豈怪妖復有徴乎河者經天亘地之水也河内河之陽也夫婦參配陰陽判合成體今以夫之尊在河之陽而隂承體卑吞食尊陽脟非君道昬弱無居剛之徳遂為隂細之人所能消毁乎河南河之隂河視諸侯夫亦惟家之主而自食正内之人時宋皇后將立而靈帝一聽閹宦無所厝心夫以宫房之愛惡亦不全中懐抱宋后終廢王甫挟姦隂中列侯實應厥位天戒若曰徒随閹豎之意夫噉其妻乎熹平二年六月雒陽民訛言虎賁寺東壁中有黄人形容鬚眉良是觀者數萬省内悉出道路斷絶應劭時為郎風俗通曰劭故往視之何在其冇人也走漏汙䖏膩赭流漉壁有他剝數寸曲折耳劭又通之曰季夏土黄中行用事又在壁中壁亦土也以見於虎賁寺者虎賁國之祕兵扞難禦侮必示於東東者動也言當出師行将天下揺動也天之以類告人甚於影響也到中平元年二月張角兄弟起兵冀州自號黄天三十六方四面出和將帥星布吏士外屬因其疲餧牽而勝之物理論曰黄巾被服純黄不將尺兵肩長衣翔行舒步所至郡縣無不從是曰天大黄也光和元年五月壬午何人白衣欲入徳陽門辭我梁伯夏教我上殿為天子中黄門相賢等呼門吏僕射欲収縛何人吏未到湏臾還走求索不得不知姓名時蔡邕以成帝時男子王襃絳衣入宫上前殿非常室曰天帝令我居此後王莽篡位今此與成帝時相似而有異被服不同又未入雲龍門而覺稱梁伯夏皆輕於言以往況今將有狂狡之人欲為王氏之謀其事不成其後張角稱黄天作亂竟破壊風俗通曰光和四年四月南宮中黄門寺有一男子長九尺服白衣中黄門觧歩呵問汝何等人白衣妄入宫掖曰我梁伯夏後天使我為天子步欲前収取因忽不見劭曰尚書春秋左傳曰伯益佐禹治水封於梁飂叔安有裔子曰董父實甚好龍龍多歸之帝舜嘉之賜姓董氏董氏之祖與梁同焉到光熹元年董卓自外入因間乘釁廢帝殺后百官總已號令自由殺戮決前威重於主梁夲安定而卓隴西人俱凉州也天戒若曰卓不當專制奪矯如白衣無冝䦨入宫也白衣見黄門寺及卓之末中黄門誅滅之際事類如此可謂無乎袁山松曰案張角一時狡亂不足致此大妖斯乃曹氏滅漢之徴也案劭所述與志或有不同年月舛異故俱載焉臣昭注曰檢觀前通各有未直尋梁即魏地之名伯夏明於中夏非溥天之稱以内臣孫夫得稱王徴驗有應有若符契復云伯夏教我為天子後曹公曰若天命在吾吾為周文王矣此乃魏文帝受我成䇿而陟帝位也風俗通云見中黄門寺曹騰之家尤見其證二年雒陽上西門外女子生兒両頭異肩共胸俱前向以為不祥堕地棄之自此之後朝廷霿亂政在私門上下無别二頭之象後董卓戮太后被以不孝之名放廢天子後復害之漢元以來禍莫踰此四年魏郡男子張博送鐵盧詣太官博上書室殿山居屋後宫禁落屋讙呼上収縳考門辭忽不自覺知臣昭曰魏人入宫既奪漢之徴至後宫而讙呼終亦禍廢母后中平元年六月壬申雒陽男子劉倉居上西門外妻生男兩頭共身靈帝時江夏黄氏之母浴而化為黿入于深淵其後時出見初浴簮一銀釵及見猶在其首臣昭曰黄者代漢之色女人臣妾之體化為黿黿者元也入于深淵水實制火夫君徳尊陽利見九五飛在于天乃備光盛俯等龜黿有愧潛躍首從戴釵卑弱未盡後帝者王不專權極天德雖謝蜀猶傍纉推求斯異女為曉著矣獻帝初平中長沙有人姓桓氏死棺歛月餘其母聞棺中聲發之遂生占曰至隂為陽下人為上其後曹公由庻士起建安四年二月武陵充縣女子李娥年六十餘物故以其家杉木槥歛瘞於城外數里上已十四日有行聞其塚中有聲便語其家家往視聞聲便發出遂活干寳搜神記曰武陵充縣女子李娥年六十餘病死埋於城外已十四日娥比舎有蔡仲聞娥富謂殯當有金寳盜發塜剖棺斧數下娥於棺中言曰蔡仲汝護我頭驚遽便走出㑹為吏所見遂収治依法當棄市娥兒聞來迎出娥将去武陵太守聞娥死復生召見問事状娥對曰聞謬為司命所召到得遣出過西門適見外兄劉伯文為相勞問涕泣悲哀娥語曰伯丈一日誤見召今得遣歸既不知道又不能獨行為我得一伴不又我見召在此已十餘日形體又當見埋藏歸當那得自出伯文曰當為問之即遣門卒與户曹相問司命一日誤召武陵大女李娥今得遣還娥在此積日尸喪又當殯歛當作何等得出又女弱獨行豈當有伴邪是吾外妹幸為便安之答曰今武陵西男民李黒亦得遣還便可為伴輒令黒過勑娥比舎蔡仲令發出娥也於是娥遂得出與伯文别伯文曰書一封以與兒佗娥遂與黒俱歸事狀如此太守慨然嘆曰天下事眞不可知也乃表以為蔡仲雖發塜爲鬼神所使雖欲無發勢不得已宜加寛宥詔書報可太守欲驗語虛實即遣馬吏於西界推問李黒得之黒語恊乃致伯文書與佗佗識其紙乃是父亡時送箱中文書也表文字猶在也而書不可曉乃請費長房讀之曰告佗當從府君出案行當以八月八日日中時武陵城南溝水畔頓汝是時必往到期悉将大小於城南待之湏臾果至但聞人馬隐隱之聲詣溝水便聞有呼聲曰佗來汝得我所寄李娥書不邪曰即得之故來至此伯文以次呼家中大小問之悲傷斷絶曰死生異路不能數得汝消息吾亡後兒孫乃爾許人良乆謂佗曰來春大病與此一丸藥以塗門户則辟來年妖厲矣言訖忽去竟不得見其形至前春武陵果大病白日見鬼唯伯文之家鬼不敢向費長房視藥曰此方相臨也博物記曰漢末闗中大亂有發前漢宮人冡者宫人猶活既出平復如舊魏郭后愛念之録置宫内常在左右問漢時官中事説之了了皆有次緒郭后崩哭泣過哀遂死漢末發范明友奴冡奴猶活明友霍光女壻說光家事廢立之際多與漢書相應此奴常遊走居民間無止住䖏遂不知所在七年越嶲有男化為女子時周羣上言哀帝時亦有此異將有易代之事至二十五年獻帝封于山陽建安中女子生男兩頭共身安帝元初六年夏四月㑹稽大疫公羊傳曰大灾者何大瘠也大瘠者何㾐也何休曰民疾疫也邪亂之氣所生古今注曰光武建武十三年楊徐部大疾疫㑹稽江左甚案傳鍾離意為督郵建武十四年㑹稽大疫案此則頻嵗也古今注曰二十六年郡國七大疫延光四年冬京都大疫張衡明年上封事臣竊見京師為害兼所及民多病死死有滅户人人恐懼朝廷燋心以為至憂臣官在於考變禳灾思任防救未知所由夙夜征營臣聞國之大事在祀祀莫大於郊天奉祖方今道路流言僉曰孝安皇帝南廵路崩從駕左右行慝之臣欲徴諸國王子故不發䘮衣車還宫偽遣大臣並禱請命臣處外官不知其審然尊靈見罔豈能無怨且凡夫私小有不蠲猶為譴謫況以大穢用禮郊廟孔子曰曽謂泰山不如林放乎天地明察降禍見灾乃其理也又間者有司正以冬至之後奏開恭陵神道陛下至孝不忍距逆或發冡移尸月令仲冬土事無作慎無發蓋及起大衆以固而閉地氣上泄是謂發天地之房諸蟄則死民必疾疫又随以喪厲氣未息恐其殆此二年欲使知過改悔五行傳曰六沴作見若時共禦帝用不差神則不怒萬福乃降用章于下臣愚以為可使公卿䖏議所以陳術改過取媚神祗自求多福也桓帝元嘉元年正月京都大疫二月九江廬江大疫延熹四年正月大疫太公六韜曰人主好重賦役大宫室多臺遊則民多病瘟也靈帝建寜四年三月大疫熹平二年正月大疫光和二年春大疫五年二月大疫中平二年正月大疫獻帝建安二十二年大疫魏文帝書與吴質曰昔年疾疫親故多離其灾魏陳思王常說疫氣云家家有强尸之痛室室有號泣之哀或闔門而殪或舉族而喪者靈帝光和元年六月丁丑有黒氣堕北宫温明殿東庭中黒如車蓋起奮訊身五色有頭體長十餘丈形貌似龍上問蔡邕對曰所謂天投蜺者也不見足尾不得稱龍易傳曰蜺之比無德以色親也潛潭巴曰虹出后妃陰脅王者又曰五色迭至照于宫殿有兵革之事演孔圖曰天子外苦兵威内奪臣無忠則天投蜺案邕集稱曰演孔圖曰蜺者斗之精也失度投蜺見態主惑於毁譽合誠圖曰天子外苦兵者也變不空生占不空言邕對又曰意者陛下樞機之内袵席之上獨有以色見進陵尊踰制以昭變象若羣臣有所毁譽聖意低廻未知誰是兵戎未息威權漸移忠言不聞則虹蜺所在生也抑内寵任中正決毁譽分直邪各得其所勤守衛整武傋威權之機不以假人則其救也先是立皇后何氏皇后每齋當謁祖廟輙有變異不得謁中平元年黄巾賊張角等立三十六方起兵燒郡國山東七州處䖏應角遣兵外討角等内使皇后二兄為大將統兵其年宫車宴駕皇后攝政二兄秉權譴譲帝母永樂后令自殺隂呼并州牧董卓欲共誅中官中官逆殺大将軍進兵相攻討京都戰者塞道皇太后母子遂為太尉卓等所廢黜皆死天下之敗兵先興於宫省外延海内二三十嵗其殃禍起自何氏袁山松書曰是年七月虹晝見御坐玉堂後殿前庭中色靑赤也後漢書卷二十七
