body:
  text: 後漢書卷五十六宋宣城太守范煜撰唐章懐太子賢注伏侯宋蔡馮趙牟韋列傳第十六伏湛傳子隆伏湛字恵公琅邪東武人也九世祖勝字子賤所謂濟南伏生者也湛高祖父孺武帝時客授東武因家焉父理為當世名儒以詩授成帝為高密太傅别自名學為高密王寛傅也寛武帝𤣥孫廣陵王胥後也前書儒林傳曰伏理字君游受詩於匡衡由是齊詩有匡伏之學故言别自名學也湛性孝友少傳父業教授數百人成帝時以父任為博士弟子五遷至王莽時為繡衣執法武帝置繡衣御史王莽改御史曰執法故曰繡衣執法也使督大姦遷後隊屬正王莽改河内為後隊更始立以為平原太守時倉卒兵起天下驚擾而湛獨晏然教授不廢謂妻子曰夫一榖不登國君徹膳禮記曰年榖不登君膳不祭肺今民皆飢奈何獨飽乃共食粗糲糲麤米也九章算術曰粟五十糲率三十一斛粟得六斗米為糲也悉分奉禄以賑鄉里來客者百餘家時門下督素有氣力謀欲為湛起兵湛惡其惑衆即收斬之徇首城郭以示百姓於是吏人信向郡内以安平原一境湛所全也光武即位知湛名儒舊臣欲令幹任内職幹主也徴拜尚書使典定舊制時大司徒鄧禹西征關中帝以湛才任宰相拜為司直行大司徒事車駕每出征伐常留鎮守總攝羣司建武三年遂代鄧禹為大司徒封陽都侯陽都縣名屬城陽國故城在今沂州沂水縣東時彭寵反於漁陽帝欲自征之湛上疏諌曰臣聞文王受命而征伐五國五國謂西伯受命伐犬夷伐密須伐耆伐邗伐崇見史記必先詢之同姓然後謀於羣臣加占蓍龜以定行事書曰謀及卿士謀及卜筮又曰文王唯卜用克綏受兹命詩大雅曰爰始爰謀爰契我龜故謀則成卜則吉戰則勝其詩曰帝謂文王詢爾仇方同爾兄弟以爾鉤援與爾臨衝以伐崇墉詩大雅也仇匹也鉤援梯所引上城也臨臨車也衝衝車也墉城也崇侯倡紂為無道故伐焉崇國城守先退後伐左氏傳曰文王聞崇徳亂而伐之軍三旬而不降退修政而復伐之因壘而降所以重人命俟時而動故参分天下而有其二陛下承大亂之極受命而帝興明祖宗出入四年而滅檀鄉制五校降銅馬破赤眉誅鄧奉之屬不為無功今京師空匱資用不足未能服近而先事邊外且漁陽之地逼接北狄黠虜困廹必求其助又今所過縣邑尤為困乏種麥之家多在城郭聞官兵将至當已收之矣大軍逺渉二千餘里士馬罷勞轉糧艱阻今兖豫青冀中國之都而㓂賊從横未及從化漁陽以東夲備邉塞地接外虜貢稅微薄安平之時尚資内郡况今荒耗豈足先圖而陛下捨近務逺棄易求難四方疑怪百姓怨懼誠臣之所惑也復願逺覽文王重兵博謀近思征伐前後之宜頋問有司使極愚誠采其所長擇之聖慮以中土為憂念帝覽其奏竟不親征時賊徐異卿等異卿即獲索賊帥徐少也萬餘人據富平連攻之不下富平縣名屬平原郡故城今棣州厭次縣也唯云願降司徒伏公帝知湛為青徐所信向遣到平原異卿等即曰歸降䕶送洛陽湛雖在倉卒造次必於文徳以為禮樂政化之首顛沛猶不可違顛沛猶僵仆也是嵗奏行鄉飲酒禮遂施行之其冬車駕征張歩留湛居守時蒸祭高廟冬祭曰蒸也而河南尹司隸校尉於廟中争論湛不舉奏坐䇿免六年徙封不其侯邑三千六百戸遣就國不其縣名屬琅邪郡其音基後南陽太守杜詩上疏薦湛曰臣聞唐虞以股肱康文王以多士寧是故詩稱濟濟書曰良哉大雅詩曰濟濟多士尚書曰股肱良哉臣詩竊見故大司徒陽都侯伏湛自行束修訖無毁玷訖竟也玷缺也自行束脩謂年十五以上篤信好學守死善道經為人師行為儀表前在河内朝歌及居平原朝歌河内縣名也故城在今衛州衛縣西王莽改河内為後隊謂湛為隊屬正也吏人畏愛則而象之遭時反覆不離兵凶秉節持重有不可奪之志陛下深知其能顯以宰相之重衆賢百姓仰望徳義微過斥退久不復用有識所惜儒士痛心臣竊傷之湛容貌堂堂國之光暉堂堂盛威儀也智略謀慮朝之淵藪髫髪厲志白首不衰埤蒼曰髫髦也髫髪謂童子垂髪也實足以先後王室名足以光示逺人先後相導也詩大雅曰予曰有先後先音先見反後音胡豆反古者選擢諸侯以為公卿是故四方回首仰望京師左傳曰鄭武公莊公為平王卿士東觀記曰詩上書武公莊公所以砥礪蕃屏勸進忠信令四方諸侯咸樂回首仰望京師柱石之臣宜居輔弼柱石承棟梁也前書田延年曰將軍為國柱石尚書大傳曰古者天子必有四隣前曰疑後曰承左曰輔右曰弼天子有問無以對責之疑可志而不志責之承可正而不正責之輔可揚而不揚責之弼出入禁門補缺拾遺臣詩愚戇不足以知宰相之才竊懐區區敢不自竭臣前為侍御史上封事言湛公廉愛下好惡分明累世儒學素持名信經明行修通逹國政尤宜近侍納言左右舊制九州五尚書令一郡二人盖舊制九州共選五人以任尚書今則一郡乃有二人故欲以湛代一人之處劉攽曰案正文令合作今尚書令不可有五人若言令一郡二人又無義改作今乃與注合可以湛代頗為執事所非但臣詩䝉恩深渥所言誠有益於國雖死無恨故復越職觸冐以聞十三年夏徴勅尚書擇拜吏曰未及就位因讌見中暑病卒賜祕器帝親弔祠遣使者送䘮修冢二子隆翕翕嗣爵卒子光嗣光卒子晨嗣東觀記曰晨尚高平公主晨謙敬博愛好學尤篤以女孫為順帝貴人奉朝請位特進卒子無忌嗣亦傳家學博物多識順帝時為侍中屯騎校尉永和元年詔無忌與議郎黄景校定中書五經諸子百家蓺術中書内中之書也蓺文志曰諸子凡一百八十九家言百家舉其成數也蓺謂書數射御術謂醫方卜筮元嘉中桓帝復詔無忌與黄景崔寔等共撰漢記又自采集古今刪著事要號曰伏侯注其書上自黄帝下盡漢質帝為八卷見行於今無忌卒子質嗣官至大司農質卒子完嗣尚桓帝女陽安長公主女為孝獻皇后曹操弑后誅伏氏國除初自伏生以後世傳經學清静無競故東州號為伏不鬭云隆字伯文少以節操立名東觀記隆作盛字伯明仕郡督郵建武二年詣懐宫光武甚親接之時張歩兄弟各擁彊兵據有齊地拜隆為太中大夫持節使青徐二州招降郡國隆移檄告曰乃者猾臣王莽弑帝盗位宗室興兵除亂誅莽故羣下推立聖公以主宗廟而任用賊臣殺戮賢良三王作亂盗賊從横忤逆天心三王見聖公傳卒為赤眉所害皇天祐漢聖哲應期陛下神武奮發以少制衆故尋邑以百萬之軍潰散於昆陽王郎以全趙之師土崩於邯鄲全趙謂舉趙之地大肜高胡望旗消靡鐵脛五校莫不摧破梁王劉永幸以宗室屬籍爵為侯王不知厭足自求禍棄遂封爵牧守造為詐逆今虎牙大将軍屯營十萬巳抜雎陽劉永奔迸家巳族矣此諸君所聞也不先自圖後悔何及青徐羣盗得此惶怖獲索賊右師郎等六校即時皆降右或為古張歩遣使隨隆東觀記歩遣其掾孫昱隨之詣闕上書獻鰒魚郭璞注三蒼云鰒似蛤偏著石廣志曰鰒無鱗有殻一靣附石細孔雜雜或七或九夲草云石決明一名鰒魚音歩角反其冬拜隆光禄大夫復使於歩并與新除青州牧守及都尉俱東詔隆輒拜令長以下隆招懐綏緝多来降附帝嘉其功比之酈生酈生酈食其也説齊王廣下齊七十餘城食其音異基即拜歩為東萊太守而劉永亦復遣使立歩為齊王歩貪受王爵冘豫未决冘音以今反隆曉譬曰高祖與天下約非劉氏不王今可得為十萬户侯耳歩欲留隆與共守二州隆不聽二州青州徐州也求得反命歩遂執隆而受永封隆遣間使上書曰臣隆奉使無狀言罪大也受執凶逆雖在困戹授命不顧又吏人知歩反畔心不附之願以時進兵無以臣隆為念臣隆得生到闕廷受誅有司此其大願若令没身㓂手以父母昆弟長累陛下累託也音力偽反陛下與皇后太子永享萬國與天無極帝得隆奏召父湛流涕以示之曰隆可謂有蘇武之節武帝時蘇武使匈奴㑹衛律所將降者隂相與謀刼單于母閼氏歸漢事發單于使衛律考其事召武受辭武不屈節引佩刀自刺單于欲降武武不降杖節牧羊海上卧起操持節節髦盡落在匈奴中十九年乃得歸漢見前書也恨不且許而遽求還也其後歩遂殺之時人莫不憐哀焉五年張歩平車駕幸北海詔隆中弟咸收隆䘮賜給棺斂太中大夫䕶送䘮事詔告琅邪作冢以子瑗為郎中侯霸傳侯霸字君房河南密人也族父淵以宦者有才辯任職元帝時佐石顯等領中書號曰大常侍成帝時任霸為太子舍人漢官儀曰太子舍人選良家子孫秩二百石霸矜嚴有威容家累千金不事産業篤志好學師事九江太守房元治榖梁春秋為元都講東觀記曰從鍾寧君受律也王莽初五威司命陳崇舉霸徳行遷随宰王莽置五威司命將軍又改縣令長曰宰隨縣名屬南陽郡今隨州縣也縣界曠逺濵𢃄江湖而亡命者多為㓂盗霸到即案誅豪猾分捕山賊縣中清静再遷為執法刺姦王莽傳曰置執法左右刺姦選能吏侯霸等分督六尉六隊如漢刺史紏案埶位者無所疑憚後為淮平大尹政理有能名王莽改臨淮郡為淮平及王莽之敗霸保固自守卒全一郡更始元年遣使徴霸東觀記曰遣謁者侯盛荆州刺史費遂齎璽書徴霸百姓老弱相携號哭遮使者車或當道而卧皆曰願乞侯君復留朞年民至乃戒乳婦勿得舉子侯君當去必不能全使者慮霸就徴臨淮必亂不敢授璽書具以狀聞㑹更始敗道路不通建武四年光武徴霸與車駕㑹夀春拜尚書令時無故典朝廷又少舊臣霸明習故事收録遺文條奏前世善政法度有益於時者皆施行之每春下寛大之詔奉四時之令皆霸所建也月令春布徳行慶施恵下人故曰寛大奉四時謂依月令也明年代伏湛為大司徒封關内侯在位明察守正奉公不回十三年霸薨帝深傷惜之親自臨弔下詔曰惟霸積善清絜視事九年漢家舊制丞相拜曰封為列侯漢自高祖以列侯為丞相武帝以元勲佐命皆盡拜公孫𢎞為丞相封平津侯因以為故事朕以軍師暴露功臣未封縁忠臣之義不欲相踰未及爵命奄然而終嗚呼哀哉於是追封諡霸則鄉哀侯食邑二千六百户子昱嗣臨淮吏人共為立祠四時祭焉以沛郡太守韓歆代霸為大司徒歆字翁君南陽人以從攻伐有功封扶陽侯好直言無隱諱帝每不能容嘗因朝㑹聞帝讀隗囂公孫述相與書歆曰亡國之君皆有才桀紂亦有才帝大怒以為激發歆又證嵗将饑凶指天畫地言甚剛切坐免歸田里帝猶不釋復遣使宣詔責之司隸校尉鮑永固請不能得歆及子嬰竟自殺歆素有重名死非其罪衆多不厭厭音一葉反帝乃追賜錢榖以成禮葬之成禮具禮也言不以非命而降其葬禮後千乗歐陽歙清河戴渉相代為大司徒坐事下獄死自是大臣難居相任其後河内蔡茂京兆玉況玉音肅魏郡馮勤皆得薨位況字文伯性聰敏為陳留太守以徳行化人遷司徒四年薨昱後徙封於陵侯於陵縣名屬濟南郡故城在今淄州長山縣南永平中兼太僕昱卒子建嗣建卒子昌嗣宋𢎞傳宋𢎞字仲子京兆長安人也父尚成帝時至少府哀帝立以不附董賢違忤抵罪𢎞少而溫順哀平間作侍中王莽時為共工王莽改少府曰共工赤眉入長安遣使徴𢎞逼迫不得已行至渭橋自投於水家人救得出因佯死獲免光武即位徴拜太中大夫建武二年代王梁為大司空封栒邑侯栒音洵所得租奉分贍九族家無資産以清行致稱徙封宣平侯帝嘗問𢎞通博之士𢎞乃薦沛國桓譚才學洽聞幾能及揚雄劉向父子幾音祈洽浹洽也幾近也前書班固曰谷永經書汎為疏逹不能浹洽如劉向父子及揚雄也故𢎞引焉於是召譚拜議郎給事中帝每讌輙令鼔琴好其繁聲𢎞聞之不悦悔於薦舉伺譚内出正朝服坐府上遣吏召之譚至不與席而讓之曰吾所以薦子者欲令輔國家以道徳也而今數進鄭聲以亂雅頌非忠正者也論語孔子曰惡鄭聲之亂雅樂也史記曰鄭音好濫淫志也能自改邪将令相舉以法乎譚頓首辭謝良久乃遣之後大㑹羣臣帝使譚鼔琴譚見𢎞失其常度帝怪而問之𢎞乃離席免冠謝曰臣所以薦桓譚者望能以忠正導主而令朝廷耽悅鄭聲臣之罪也帝改容謝使反服其後遂不復令譚給事中𢎞推進賢士馮翊桓梁三十餘人或相及為公卿者及猶繼也𢎞當讌見劉攽曰案文當合作嘗御坐新屏風圖畫列女帝數顧視之𢎞正容言曰未見好徳如好色者帝即為徹之笑謂𢎞曰聞義則服可乎對曰陛下進徳臣不勝其喜時帝姊湖陽公主新寡帝與共論朝臣微觀其意主曰宋公威容徳器羣臣莫及帝曰方且圖之後𢎞被引見帝令主坐屏風後因謂𢎞曰諺言貴易交富易妻人情乎𢎞曰臣聞貧賤之交不可忘糟糖之妻不下堂帝顧謂主曰事不諧矣𢎞在位五年坐考上黨太守無所據免歸第言無罪狀可據數年卒無子國除𢎞弟嵩以剛彊孝烈著名官至河南尹嵩子由章和間為太尉坐阿黨竇憲䇿免歸夲郡自殺由二子漢登登在儒林傳漢字仲和以經行著名舉茂才四遷西河太守永建元年為東平相度遼將軍為東平王蒼曾孫端相也立名節以威恩著稱遷太僕上病自乞拜太中大夫卒䇿曰太中大夫宋漢清修雪白正直無邪前在方外仍統軍實仍頻也統領也軍實謂軍之所資也左傳曰墮軍實懐柔異類莫匪嘉績戎車載戢邊人用寧予録乃勲引登九列因病退讓守約彌堅将授三事未剋而終朝廷愍悼怛其愴然詩不云乎肇敏戎功用錫爾祉大雅江漢之詩也吉甫美宣王能興衰撥亂命召公平淮夷毛萇注云肇謀也敏疾也戎大也功事也祉謂福慶其令將相大夫㑹葬加賜錢十萬及其在殯以全素絲羔羊之潔焉詩國風曰羔羊之皮素絲五紽退食自公委蛇委蛇退食减膳也言卿大夫皆衣羔羊之裘素絲自减膳食從於公事行歩委蛇自得子則字元矩為鄢陵令亦有名迹抜同郡韋著扶風法真稱為知人則子年十歲與蒼頭共弩射蒼頭弦斷矢激誤中之即死奴叩頭就誅則察而恕之潁川荀爽稱以為美時人亦服焉論曰中興以後居台相總權衡多矣其能以任職取名者豈非先逺業後小數哉逺業謂徳禮小數謂名法也故恵公造次急於鄉射之禮君房入朝先奏寛大之令夫器博者無近用道長者其功逺盖志士仁人所為根心者也根猶本也君子以之得固貴矣以之失亦得矣以之得謂行道義而得固可貴矣以之失謂行道義而失亦為得矣宋𢎞止繁聲戒淫色其有關雎之風乎詩序曰關睢樂得淑女以配君子憂在進賢不淫其色也蔡茂傳郭賀附蔡茂字子禮河内懐人也哀平間以儒學顯徴試博士對䇿陳災異以高等擢拜議郎遷侍中遇王莽居攝以病自免不仕莽朝㑹天下擾亂茂素與竇融善因避難歸之融欲以為張掖太守固辭不就每所餉給計口取足而已後與融俱徴復拜議郎再遷廣漢太守有政績稱時隂氏賔客在郡界多犯吏禁茂輙紏案無所回避㑹洛陽令董宣舉紏湖陽公主帝始怒收宣既而赦之茂喜宣剛正欲令朝廷禁制貴戚乃上書曰臣聞興化致教必由進善康國寧人莫大理惡陛下聖徳重興再隆大命即位以来四海晏然誠宜夙興夜寐雖休勿休然頃者貴戚椒房之家數因恩埶干犯吏禁殺人不死傷人不論臣恐繩墨棄而不用繩墨謂章程也斧斤廢而不舉斧斤謂刑戮也賈誼曰釋斤斧之用也近湖陽公主奴殺人西市而與主共輿出入宫省逋罪積曰寃魂不報洛陽令董宣直道不顧干主討姦陛下不先澄審召欲加箠當宣受怒之初京師側耳及其䝉宥天下拭目今者外戚憍逸賔客放濫宜勅有司案理姦罪使執平之吏永申其用以厭逺近不緝之情光武納之緝叶也建武二十年代戴渉為司徒在職清儉匪懈二十三年薨于位時年七十二賜東園梓棺賻贈甚厚東園署名主作棺也茂初在廣漢夢坐大殿極上有三穂禾茂跳取之得其中穂輙復失之屋之大者古通呼為殿也極殿梁也前書音義曰三輔間謂屋梁為極以問主簿郭賀賀離席慶曰大殿者宫府之形象也極而有禾人臣之上禄也取中穂是中台之位也於字禾失為秩雖曰失之乃所以得禄秩也衮職有闕君其補之三公服衮畫為龍龍首衮衮然故言龍衮詩曰衮職有闕仲山甫補之旬月而茂徴焉乃辟賀為掾賀字喬卿雒陽人祖父堅伯父游君並修清節不仕王莽賀能明法累官建武中為尚書令在職六年曉習故事多所匡益拜荆州刺史引見賞賜恩寵隆異及到官有殊政百姓便之歌曰厥徳仁明郭喬卿忠正朝廷上下平顯宗廵狩至南陽特見嗟歎賜以三公之服黼黻冕旒三公服衮冕黼若斧形黻若兩已相背冕以木為之衣以帛𤣥上纁下廣八寸長尺六寸旒謂冕前後所垂玉也天子十二旒上公九旒勅行部去䄡帷使百姓見其容服以章有徳每所經過吏人指以相示莫不榮之永平四年徴拜河南尹以清静稱在官三年卒詔書愍惜賜車一乘錢四十萬馮勤傳馮勤字偉伯魏郡繁陽人也曾祖父揚宣帝時為𢎞農太守有八子皆為二千石趙魏間榮之號曰萬石君焉兄弟形皆偉壯唯勤祖父偃長不滿七尺常自恥短陋恐子孫之似也東觀記偃為黎陽令乃為子伉娶長妻伉生勤長八尺三寸八歲善計計算術也初為太守銚期功曹有髙能稱期常從光武征伐政事一以委勤勤同縣馮廵等舉兵應光武謀未成而為豪石焦廉等所反反音幡勤乃率將老母兄弟及宗親歸期期悉以為腹心薦於光武初未被用後乃除為郎中給事尚書東觀記魏郡太守范横上疏薦勤然始除之以圖議軍糧在事精勤遂見親識每引進帝輙顧謂左右曰佳乎吏也由是使典諸侯封事勤差量功次輕重國土逺近地埶豐薄不相踰越莫不厭服焉自是封爵之制非勤不定帝益以為能尚書衆事皆令總録之司徒侯霸薦前梁令閻楊楊素有譏議帝常嫌之既見霸奏疑其有姦大怒賜霸璽書曰崇山幽都何可偶崇山南裔也幽都北裔也偶對也言将殺之不可得流徙也尚書舜流共工於幽州放驩兠於崇山黄鉞一下無處所鉞斧也以黄金飾之所以戮人欲以身試法邪将殺身以成仁邪使勤奉䇿至司徒府勤還陳霸本意申釋事理帝意稍解拜勤尚書僕射職事十五年以勤勞賜爵關内侯遷尚書令拜大司農三歲遷司徒先是三公多見罪退帝賢勤欲令以善自終乃因讌見從容戒之曰朱浮上不忠於君下陵轢同列竟以中傷至今朱浮為大司空坐賣弄國恩免又為陵轢同列帝銜之惜其功不忍加罪死生吉凶未可知豈不惜哉人臣放逐受誅雖復追加賞賜賻祭不足以償不訾之身訾量也言無量可比之貴重之極也訾與資同忠臣孝子覽照前世以為鏡誡能盡忠於國事君無二則爵賞光乎當世功名列於不朽可不勉哉勤愈恭約盡忠號稱任職勤母年八十每㑹見詔勅勿拜令御者扶上殿謂諸王曰使勤貴寵者此母也其見親重如此中元元年薨東觀記曰中元元年車駕西幸長安祠園陵還勤燕見前殿盡日歸府因病喘逆上使太醫療視賞賜錢帛遂薨帝悼惜之使者弔祠賜東園祕器賵贈有加勤七子長子宗嗣至張掖屬國都尉中子順尚平陽長公主終於大鴻臚平陽主明帝女建初八年以順中子奮襲主爵為平陽侯薨無子永元七年詔書復封奮兄羽林右監勁為平陽侯奉公主之祀奮弟由黄門侍郎尚平安公主章帝女也臣賢案東觀記亦云安平皇后紀云由尚平邑公主紀傳不同未知孰是劉攽曰案傳作平安注云安平必有一誤然安平是縣名則安平是矣勁薨子卯嗣卯延光中為侍中薨子留嗣趙憙傳趙憙字伯陽南陽宛人也少有節操從兄為人所殺無子憙年十五常思報之乃挾兵結客後遂往復仇而仇家皆疾病無相距者憙以因疾報殺非仁者心且釋之而去顧謂仇曰爾曹若健逺相避也仇皆卧自搏自搏猶叩頭也後病愈悉自縛詣憙憙不與相見後竟殺之更始即位舞隂大姓李氏擁城不下更始遣柱天將軍李寳降之不肯云聞宛之趙氏有孤孫憙信義著名願得降之更始乃徴憙憙年未二十既引見更始笑曰繭栗犢豈能負重致逺乎犢角如繭栗言小也禮記曰天地之牲角繭栗即除為郎中行偏將軍事使詣舞隂而李氏遂降憙因進入潁川擊諸不下者歴汝南界還宛更始大悅謂憙曰卿名家駒努力勉之武帝謂劉徳為千里之駒故以憙比之㑹王莽遣王尋王邑将兵出關更始乃拜憙為五威偏將軍使助諸將拒尋邑於昆陽光武破尋邑憙被創有戰勞還拜中郎將封勇功侯更始敗憙為赤眉兵所圍廹急乃踰屋亡走與所友善韓仲伯等數十人携小弱越山阻徑出武關仲伯以婦色美慮有强暴者而己受其害欲棄之於道憙責怒不聽因以泥塗仲伯婦面載以鹿車身自推之風俗通曰俗說鹿車窄小載容一鹿每道逄賊或欲逼略憙輙言其病狀以此得免既入丹水丹水縣名屬南陽郡故城在今鄧州内鄉縣西南臨丹水遇更始親屬皆裸跣塗炭飢因不能前塗炭者若䧟泥墜火喻窮困之極也憙見之悲感所装縑帛資糧悉以與之將䕶歸鄉里時鄧奉反於南陽憙素與奉善數遺書切責之而讒者因言憙與奉合謀帝以為疑及奉敗帝得憙書乃驚曰趙憙真長者也即徴憙引見賜鞍馬待詔公車時江南未賔道路不通以憙守簡陽侯相憙不肯受兵東觀記曰勅憙從騎都尉儲融受兵二百人通利道路憙白上不願受融兵單車馳往度其形况上許之單車馳之簡陽吏民不欲内憙憙乃告譬呼城中大人示以國家威信其帥即開門面縛自歸由是諸營壁悉降荆州牧奏憙才任理劇詔以為平林侯相攻擊羣賊安集已降者縣邑平定後拜懐令大姓李子春先為琅邪相豪猾并兼為人所患憙下車聞其二孫殺人事未發覺即窮詰其姦收考子春二孫自殺京師為請者數十終不聼時趙王良疾病将終車駕親臨王問所欲言王曰素與李子春厚今犯罪懷令趙憙欲殺之願乞其命帝曰吏奉法律不可枉也更道它所欲王無復言既薨帝追感趙王乃貰出子春其年遷憙平原太守時平原多盗賊憙與諸郡討捕斬其渠帥餘黨當坐者數千人憙上言惡惡止其身公羊傳曰善善及子孫惡惡止其身可一切徙京師近郡帝從之乃悉移置潁川陳留於是擢舉義行誅鋤姦惡後青州大蝗侵入平原界輙死歲屢有年百姓歌之二十六年帝延集内戚讌㑹歡甚諸夫人各各前言趙憙篤義多恩往遭赤眉出長安皆為憙所濟活帝甚嘉之後徴憙入為太僕引見謂曰卿非但為英雄所保也婦人亦懐卿之恩厚加賞賜二十七年拜太尉賜爵關内侯時南單于稱臣烏桓鮮卑並來入朝帝令憙典邊事思為久長規規謀也憙上復縁邊諸郡幽幷二州由是而定復音伏謂建武六年徙雲中五原人於常山居庸間至二十六年復令還雲中五原東觀記曰草創茍合未有還人盖憙至此請徙之令盡也三十年憙上言宜封禪正三雍之禮中元元年從封泰山及帝崩憙受遺詔典䘮禮是時藩王皆在京師自王莽簒亂舊典不存皇太子與東海王等雜止同席憲章無序憙乃正色横劍殿階扶下諸王以明尊卑時藩國官屬出入宫省與百僚無别憙乃表奏謁者將䕶分止它縣諸王並令就邸唯朝晡入臨整禮儀嚴門衛内外肅然永平元年封節鄉侯三年春坐考中山相薛修事不實免修光武子中山王焉相也其冬代竇融為衛尉八年代虞延行太尉事居府如真後遭母憂上疏乞身行䘮禮顯宗不許遣使者為釋服賞賜恩寵甚渥憙内典宿衛外幹宰職正身立朝未嘗懈惰及帝崩復典䘮事再奉大行禮事修舉肅宗即位進為太傅録尚書事擢諸子為郎吏者七人長子代給事黄門建初五年憙疾病帝親幸視及薨車駕往臨弔時年八十四諡曰正侯子代嗣官至越騎校尉永元中副行征西將軍劉尚征羌坐事下獄疾病物故和帝憐之賜祕器錢布贈越騎校尉節鄉侯印綬子直嗣官至歩兵校尉直卒子淑嗣無子國除牟融傳牟融字子優北海安邱人也少博學以大夏侯尚書教授大夏侯名勝宣帝時人也門徒數百人名稱州里以司徒茂才為豐令司徒舉為茂才也豐今徐州縣也視事三年縣無獄訟為州郡最司徒范遷薦融忠正公方經行純備宜在夲朝并上其理狀漢官儀曰范遷字子廬沛人也永平五年入代鮑昱為司隸校尉多所舉正百僚敬憚之八年代包咸為大鴻臚十一年代鮭陽鴻為大司農鮭陽姓也音胡佳反是時顯宗方勤萬幾公卿數朝㑹每輙延謀政事判折獄訟融經明才高善論議朝廷皆服其能帝數嗟歎以為才堪宰相明年代伏恭為司空恭字叔齊伏湛同産兄子也見東觀記舉動方重甚得大臣節肅宗即位以融先朝名臣代趙憙為太尉與憙叅録尚書事建初四年薨車駕親臨其䘮時融長子麟歸鄉里帝以其餘子幼弱勅太尉掾史教其威儀進止贈賵恩寵篤密焉又賜冡塋地於顯節陵下除麟為郎韋彪傳族子義韋彪字孟逹扶風平陵人也高祖賢宣帝時為丞相祖賞哀帝時為大司馬彪孝行純至父母卒哀毁三年不出廬寢服竟羸瘠骨立異形醫療數年乃起好學洽聞雅稱儒宗建武末舉孝廉除郎中以病免復歸教授安貧樂道恬於進趣三輔諸儒莫不慕仰之顯宗聞彪名永平六年召拜謁者賜以車馬衣服三遷魏郡太守肅宗即位以病免徴為左中郎將長樂衛尉數陳政術每歸寛厚比上疏乞骸骨拜為奉車都尉秩中二千石賞賜恩寵侔於親戚建初七年車駕西廵狩以彪行太常從數召入問以三輔舊事禮儀風俗彪因建言今西廵舊都宜追録高祖中宗功臣中宗宣帝襃顯先勲紀其子孫帝納之行至長安乃制詔京兆尹右扶風求蕭何霍光後時光無苗裔唯封何末孫熊為鄼侯建初二年已封曹參後曹湛為平陽侯故不復及焉乃厚賜彪錢珍羞食物使歸平陵上冡還拜大鴻臚是時陳事者多言郡國貢舉率非功次故守職益懈而吏事寖疏咎在州郡有詔下公卿朝臣議彪上議曰伏惟明詔憂勞百姓垂恩選舉務得其人夫國以簡賢為務賢以敦行為首孔子曰事親孝故忠可移於君是以求忠臣必於孝子之門孝經緯之文也夫人才行少能相兼是以孟公綽優於趙魏老不可以為滕薛大夫論語孔子之言也公綽魯大夫趙魏皆晉卿之邑也家臣稱老公綽性寡欲趙魏老優聞無事滕薛小國大夫職煩故不可為也忠孝之人持心近厚鍜鍊之吏持心近薄蒼頡篇曰鍜椎也鍜鍊猶成熟也言深文之吏入人之罪猶工冶陶鑄鍜鍊使之成熟也前漢路溫舒上疏曰鍜鍊而周内之三代之所以直道而行者在其所以磨之故也論語孔子曰吾之於人誰毁誰譽如有所譽者其有所試矣斯三代之所以直道而行也彪引之者言古之用賢皆磨礪選鍊然後用之士宜以才行為先不可純以閥閲史記曰明其等曰閥積功曰閲然其要歸在於選二千石二千石賢則貢舉皆得其人帝深納之彪以世承二帝更化之後多以苛刻為能二帝光武明帝也又置官選職不必以才因盛夏多寒上疏諫曰臣聞政化之夲必順隂陽伏見立夏以来當暑而寒殆以刑罰刻急郡國不奉時令之所致也農人急於務而苛吏奪其時賦發充常調而貪吏割其財此其巨患也夫欲急人所務當先除其所患天下樞要在於尚書百官志曰尚書主知公卿二千石吏官上書外國夷狄事故曰樞要尚書之選豈可不重而間者多從郎官超升此位雖曉習文法長於應對然察察小慧類無大能宜簡嘗歴州宰素有名者雖進退舒遲時有不逮然端心向公奉職周密宜鑒嗇夫㨗急之對嗇夫官名也文帝出上林登虎圈因問上林尉禽獸簿不能對虎圏嗇夫從旁代對響應無窮文帝拜嗇夫為上林令張釋之曰夫絳侯東陽侯言事曽不能出口豈効此嗇夫喋喋利口㨗急哉文帝曰善遂不拜嗇夫為上林令深思絳侯木訥之功也木質也訥遲鈍也前書曰周勃木彊少文又曰安劉氏者必勃往時楚獄大起故置令史以助郎職而類多小人好為姦利今者務簡可皆停省又諌議之職應用公直之士通才謇正有補益於朝者今或從徴試輩為大夫輩類也又御史外遷動據州郡並宜清選其任責以言績其二千石視事雖久而為吏民所便安者宜增秩重賞勿妄遷徙惟留聖心書奏帝納之元和二年春東廵狩以彪行司徒事從行還以病乞身帝遣小黄門太醫問病賜以食物彪遂稱困篤章和二年夏使謁者䇿詔曰彪以將相之裔勤身飭行出自州里在位歴載中被篤疾連上求退君年在耆艾禮記曰六十曰耆五十曰艾不可復以加増恐職事煩碎重有損焉其上大鴻臚印綬其遣太子舍人詣中臧府受賜錢二十萬續漢志曰中臧府令一人秩六百石掌幣帛金錢貨物也永元元年卒詔尚書故大鴻臚韋彪在位無愆方欲録用奄忽而卒其賜錢二十萬布百匹榖三千斛彪清儉好施禄賜分與宗族家無餘財著書十二篇號曰韋卿子族子義義字季節高祖父𤣥成元帝時為丞相初彪獨徙扶風故義猶為京兆杜陵人焉兄順字叔文平輿令有高名平輿縣名屬汝南郡故城在今豫州汝陽縣東北次兄豹字季明數辟公府輙以事去司徒劉愷復辟之謂曰卿以輕好去就爵位不躋躋升也今歲垂盡當選御史意在相薦子其宿留乎宿留待也宿音秀留音力救反豹曰犬馬齒衰旅力已劣旅衆也尚書曰番番良士旅力既愆仰慕崇恩故未能自割且眩瞀滯疾不堪久待眩風疾也瞀亂也謂視不明之貌也眩音縣瞀音亡溝反選薦之私非所敢當遂跣而起愷追之徑去不顧安帝西廵徴拜議郎義少與二兄齊名初仕州郡太傅桓焉辟舉理劇為廣都長廣都縣名屬蜀郡故城在今益州成都縣東南甘陵陳二縣令甘陵故城在今貝州清河縣西北陳屬梁國今陳州政甚有績官曹無事牢獄空虚數上書順帝陳宜依古典考功黜陟徴集名儒大定其制又譏切左右貶刺竇氏言既無感而久抑不遷以兄順䘮去官比辟公府不就廣都為生立廟及卒三縣吏民為義舉哀若䘮考妣豹子著字休明少以經行知名不應州郡之命大將軍梁冀辟不就延熹二年桓帝公車備禮徴至霸陵稱疾歸乃入雲陽山采藥不返有司舉奏加罪帝特原之復詔京兆尹重以禮敦勸著遂不就徴敦猶逼也靈帝即位中常侍曹節以陳蕃竇氏既誅海内多怨欲借寵時賢以為名假借時賢寵榮以求美名用解怨謗白帝就家拜著東海相東海王懿相也即東海王彊四代孫詔書逼切不得已解巾之郡巾幅巾也既服冠冕故解幅巾政任威刑為受罰者所奏坐論輸左校左校署名屬將作也又後妻驕恣亂政以之失名竟歸為姦人所害𨼆者恥之贊曰湛霸奮庸維寧兩邦尚書曰有能奮庸熙帝之載孔安國注曰奮起也庸功也兩邦謂湛為平原太守霸為淮平大尹淮人孺慕徐冦要降徐冦謂徐異卿也願要降司徒伏公𢎞實體逺仁不忘本謂不忘糟糠妻也憙政多迹彪明理損牟公簡帝身終上衮後漢書卷五十六
