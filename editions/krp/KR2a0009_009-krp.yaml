body:
  text: 後漢書卷九宋宣城太守范煜撰唐章懐太子賢注獻帝紀第九孝獻皇帝諱協靈帝中子也謚法曰聰明睿智曰獻協之字曰合張璠記曰靈帝以帝似已故名曰協帝王紀曰協字伯和母王羙人為何皇后所害中平六年四月少帝即位封帝爲渤海王徙封陳留王九月甲戌即皇帝位年九嵗遷皇太后於永安宮董卓遷也洛陽宫殿名曰永安宮周逥六百九十八丈故基在洛陽故城中大赦天下改昭寜為永漢丙子董卓殺皇太后何氏初令侍中給事黄門侍郎員各六人續漢志曰侍中比二千石無員漢官儀曰侍中左蟬右貂夲秦丞相史往来殿中故謂之侍中分掌乗輿服物下至褻器虎子之屬武帝時孔安國為侍中以其儒者特聽掌御坐唾壺朝廷榮之至東京時屬少府亦無員駕出則一人負傳國璽操斬蛇劒乗輿中官俱止禁中又曰給事黄門侍郎六百石無員掌侍從左右給事中使關通中外應劭曰黄門侍郎每日暮向青瑣門拜謂之夕郎輿服志曰禁門曰黄闥以中人主之故號曰黄門令然則黄門郎給事黄闥之内故曰黄門郎夲既無員於此各置六人也獻帝起居注曰自誅黄門後侍中侍郎出入禁中機事頗露由是王允乃奏侍中黄門不得出入不通賔客自此始也劉攽曰註乘輿中官俱止禁中案文當云參乘與中官俱止禁中少一參字誤一輿字賜公卿以下至黄門侍郎家一人為郎以補宦官所領諸署侍於殿上靈帝熹平四年改平凖為中凖使宦官為令自是諸内署令丞悉以閹人為之故今並令士人代領之乙酉以太尉劉虞為大司馬董卓自為太尉加鈇鉞虎賁禮記曰諸侯賜鈇鉞然後専殺説文曰鈇莝刀也蒼頡篇曰鈇斧也加鈇鉞者與専殺也丙戍太中大夫楊彪為司空甲午豫州牧黄琬為司徒遣使弔祠故太傅陳蕃大將軍竇武等冬十月乙巳葬靈思皇后白波賊宼河東薛瑩書曰黄巾郭泰等起於西河白波谷時謂之白波賊董卓遣其將牛輔擊之十一月癸酉董卓為相國十二月戊戍司徒黄琬為太尉司空楊彪為司徒光禄勳荀爽為司空省扶風都尉置漢安都護扶風都尉比二千石武帝元鼎四年置中興不改至此以羌擾三輔故省之置都護令總統西方詔除光熹昭寜永漢三號還復中平六年初平元年春正月山東州郡起兵以討董卓辛亥大赦天下癸酉董卓殺𢎞農王白波賊宼東郡二月乙亥太尉黄琬司徒楊彪免庚辰董卓殺城門校尉伍瓊督軍校尉周珌珌音必東觀記曰周珌豫州刺史慎之子也續漢書魏志竝作毖音祕以光禄勳趙謙為太尉謝承書曰謙字彦信太尉趙戒之孫蜀郡成都人也太僕王允為司徒丁亥遷都長安董卓驅徙京師百姓悉西入關自留屯畢圭苑壬辰白虹貫日三月乙巳車駕入長安幸未央宫未央宫蕭何所造也張璠記曰将入宫日大雨晝晦翟雉飛入長安宮己酉董卓焚洛陽宫廟及人家戊午董卓殺太傅袁隗太僕袁基夷其族隗紹之叔父基袁術之母兄卓以山東兵起依紹術為主故誅其親屬獻帝春秋曰尺口以上男女五千餘人皆下獄死夏五月司空荀爽薨六月辛丑光禄大夫种拂為司空大鴻臚韓融少府隂修執金吾胡母班風俗通云胡母姓夲陳胡公之後也公子完奔齊遂有齊國齊宣王母弟别封母鄉逺夲胡公近取母邑故曰胡母氏也将作大匠吳修越騎校尉王壞安集関東後将軍袁術河内太守王匡各執而殺之英雄記曰匡字公節太山人也輕財好施以任侠聞為袁紹河内太守唯韓融獲免董卓壞五銖錢更鑄小錢光武中興除王莾貨泉更用五銖錢冬十一月庚戍鎮星熒惑太白合於尾是嵗有司奏和安順桓四帝無功徳不宜稱宗又恭懐敬隱恭愍三皇后並非正嫡不合稱后皆請除尊號制曰可和帝號穆宗安帝號恭宗順帝號敬宗桓帝號威宗和帝尊母梁貴人曰恭懐皇后安帝尊祖母宋貴人曰敬隱皇后順帝尊母李氏曰恭愍皇后孫堅殺荆州刺史王叡王氏譜曰叡字通曜晉太保祥伯父也吳録曰叡素遇堅無禮堅此時欲殺叡叡曰我何罪堅曰坐無所知罪叡窮廹刮金飲之而死又殺南陽太守張咨二年春正月辛丑大赦天下二月丁丑董卓自為太師袁術遣將孫堅與董卓将胡軫戰於陽人陽人聚名屬河南郡故城在今汝州梁縣西史記秦滅東周徙其君於陽人聚即此地也軫軍大敗董卓遂發掘洛陽諸帝陵夏四月董卓入長安六月丙戌地震秋七月司空种拂免光禄大夫濟南淳于嘉為司空太尉趙謙罷太常馬日磾為太尉九月蚩尤旗見于角亢天官書曰蚩尤之旗類彗而後曲象旗熒惑之精也呂氏春秋云其色黄上白下見則王者征伐四方角亢蒼龍之星冬十月壬戌董卓殺衛尉張温十一月青州黄巾宼泰山泰山太守應劭擊破之黄巾轉宼渤海公孫瓚與戰於東光復大破之東光今滄州縣是嵗長沙有人死經月復活三年春正月丁丑大赦天下袁術遣将孫堅攻劉表於襄陽堅戰歿袁紹及公孫瓚戰于界橋今貝州宗城縣東有古界城近枯漳水則界橋在此也瓚軍大敗夏四月辛巳誅董卓夷三族司徒王允録尚書事總朝政遣使者張种撫慰山東青州黄巾擊殺兖州刺史劉岱於東平東郡太守曹操大破黄巾於夀張降之五月丁酉大赦天下丁未征西将軍皇甫嵩為車騎将軍董卓部曲将李傕郭汜樊稠張濟等反攻京師六月戊午䧟長安城太常种拂大僕魯旭大鴻臚周奐三輔决錄注曰奐字文明茂陵人城門校尉崔烈越騎校尉王頎竝戰殁頎音祈吏民死者萬餘人李傕等並自為将軍己未大赦天下李傕殺司隸校尉黄琬甲子殺司徒王允皆滅其族丙子前将軍趙謙為司徒秋七月庚子太尉馬日磾為太傅錄尚書事八月遣日磾及太僕趙岐持節慰撫天下車騎将軍皇甫嵩為太尉司徒趙謙罷九月李傕自為車騎将軍郭汜後将軍樊稠右将軍張濟鎮東将軍濟出屯𢎞農甲申司空淳于嘉為司徒光禄大夫楊彪為司空竝錄尚書事冬十二月太尉皇甫嵩免光禄大夫周忠為太尉參錄尚書事四年春正月甲寅朔日有食之袁宏記曰時未晡八刻太史令王立奏曰晷過度無變也朝臣皆賀帝令候焉未晡一刻而食賈詡奏曰立司候不明疑誤上下請付理官帝曰天道逺事驗難明欲歸咎史官益重朕之不徳也丁夘大赦天下三月袁術殺揚州刺史陳温據淮南長安宣平城門外屋自壞三輔黄圖曰長安城東面北頭門也夏五月癸酉無雲而雷六月扶風大雨雹華山崩裂太尉周忠免太僕朱儁爲太尉録尚書事下邳賊闕宣自稱天子風俗通曰闕姓也承闕黨童子之後也縱横家有闕子著書雨水遣侍御史裴茂訊詔獄原輕繫六月辛丑天狗西北行前書音義曰有聲為天狗無聲為枉矢九月甲午試儒生四十餘人上第賜位郎中次太子舍人下第者罷之詔曰孔子歎學之不講講習也論語之文不講則所識日忘今耆儒年踰六十去離夲土營求糧資不得專業結童入學白首空歸長委農野永絶榮望朕甚愍焉其依科罷者聽為太子舎人劉艾獻帝紀曰時長安中為之謡曰頭白皓然食不充糧裹衣蹇裳當還故鄉聖王愍念悉用補郎舍是布衣被服𤣥黄冬十月太學行禮車駕幸永福城門臨觀其儀賜博士以下各有差辛丑京師地震有星孛于天市袁宏記曰孛于天市将從天子移都其後上東遷之應也司空楊彪免太常趙温爲司空公孫瓚殺大司馬劉虞十二月辛丑地震司空趙温免乙巳衛尉張喜為司空獻帝春秋曰喜作嘉是嵗琅邪王容薨興平元年春正月辛酉大赦天下改元興平甲子帝加元服二月壬午追尊諡皇妣王氏爲靈懐皇后甲申改葬于文昭陵丁亥帝耕于籍田三月韓遂馬騰與郭汜樊稠戰於長平觀遂騰敗績左中郎将劉範前益州刺史种劭戰殁前書音義曰長平陂名也上有觀在池陽宫南去長安五十里今涇水南原眭城是也袁宏紀曰是時馬騰以李傕等専亂以益州刺史劉焉宗室大臣遣使招引共誅傕焉遣子範将兵就騰故涼州刺史种劭太常拂之子也拂爲傕所害劭欲報仇遂為此戰夏六月丙子分涼州河西四郡為廱州謂金城酒泉燉煌張掖丁丑地震戊寅又震乙巳晦日有食之帝避正殿寢兵不聽事五日大蝗秋七月壬子太尉朱儁免戊午太常楊彪為太尉録尚書事三輔大旱自四月至于是月帝避正殿請雨遣使者洗囚徒原輕繫洗謂蕩滌也是嵗榖一斛五十萬豆麥一斛二十萬人相食啖白骨委積帝使侍御史侯汶出太倉米豆為飢人作麋粥經日而死者無數帝疑賦䘏有虛乃親於御坐前量試作麋乃知非實袁宏紀曰時勑侍中劉艾取米豆五升於御前作糜得滿三盂於是詔尚書曰米豆五升得麋三盂而人委頓何也使侍中劉艾出讓有司於是尚書令以下皆詣省閣謝劉攽曰案閣當作閤閤門也詣閣無理奏收侯汶考實詔曰未忍致汶于理可杖五十自是之後多得全濟八月馮翊羌叛宼屬縣郭汜樊稠擊破之九月桑復生椹人得以食司徒淳于嘉罷冬十月長安市門自壞以衛尉趙温為司徒錄尚書事十二月分安定扶風爲新平郡是嵗揚州刺史劉繇與袁術将孫策戰于曲阿䇿字伯符孫堅子曲阿今潤州縣繇軍敗績孫䇿遂據江東吳志曰孫䇿既破繇遂度兵據㑹稽策自領㑹稽太守太傅馬日磾薨于夀春夀春縣名屬九江郡今夀春縣也二年春正月癸丑大赦天下二月乙亥李傕殺樊稠而與郭氾相攻三月丙寅李傕脇帝幸其營焚宫室夏四月甲午立貴人伏氏為皇后丁酉郭汜攻李傕矢及御前山陽公載記曰時弓弩並發矢下如雨及御所止髙樓殿前帷簾也是日李傕移帝幸北塢服䖍通俗文曰營居曰塢一曰庳城也山陽公載記曰時帝在南塢傕在北塢時流矢中傕左耳乃迎帝幸北塢帝不肯從强之乃行大旱五月壬午李傕自為大司馬六月庚午張濟自陕来和傕汜秋七月甲子車駕東歸郭汜自為車騎将軍楊定為後将軍楊奉為興義將軍董承為安集将軍並侍送乗輿張濟為驃騎将軍還屯陜八月甲辰幸新豐冬十月戊戌郭汜使其将伍習夜燒所幸學舎逼脇乗輿楊定楊奉與郭汜戰破之壬寅幸華隂露次道南是夜有赤氣貫紫宫獻帝春秋曰赤氣廣六七尺東至寅西至戌也張濟復反與李傕郭汜合十一月庚午李傕郭汜等追乗輿戰於東澗王師敗績殺光禄勳鄧泉衛尉士孫瑞廷尉宣播大長秋苖祀獻帝春秋播作璠也歩兵校尉魏桀侍中朱展射聲校尉沮儁風俗通曰沮姓也黄帝時史官沮誦之後音俱余反壬申幸曹陽露次田中曹陽澗名在今陕州西南七里俗謂之七里澗崔浩云自南山北通於河楊奉董承引白波帥胡才李樂韓暹及匈奴左賢王去卑率師奉迎與李傕等戰破之十二月庚辰車駕乃進李傕等復来追戰王師大敗殺畧宫人少府田芬大司農張義等皆戰歿進幸陕夜度河乙亥幸安邑是嵗袁紹遣將麴義與公孫瓚戰於鮑丘鮑丘水名出北塞中南流經九莊嶺東俗謂之大榆河又東南經漁陽縣故城東是瓚之戰處見水經注瓚軍大敗建安元年春正月癸酉郊祀上帝於安邑大赦天下改元建安二月韓暹攻衛将軍董承夏六月乙未幸聞喜秋七月甲子車駕至洛陽幸故中常侍趙忠宅丁丑郊祀上帝大赦天下巳卯謁太廟八月辛丑幸南宫楊安殿癸夘安國将軍張楊為大司馬韓暹為大将軍楊奉為車騎将軍是時宫室燒盡百官披荆棘依牆壁間州郡各擁彊兵而委輸不至羣僚饑乏尚書郎以下自出採稆稆音吕埤蒼曰穭自生也稆與穭同或饑死牆壁間或為兵士所殺辛亥鎭東将軍曹操自領司隸校尉錄尚書事曹操殺侍中臺崇尚書馮碩等風俗通日金天氏裔孫曰臺駘其後氏焉山陽公載記曰臺字作壺劉攽曰注山陽公載記曰案文多一曰字封衛將軍董承為輔國将軍劉攽曰案文多一為字伏完等十三人為列侯贈沮儁為𢎞農太守庚申遷都許己巳幸曹操營九月太尉楊彪司空張喜罷冬十一月丙戍曹操自為司空行車騎将軍事百官總己以聽二年春袁術自稱天子三月袁紹自為大将軍夏五月蝗秋九月漢水溢是嵗饑江淮間民相食袁術殺陳王寵孫策遣使奉貢三年夏四月遣謁者裴茂率中郎将段煨討李傕夷三族獻帝起居注曰傳傕首到許有詔髙懸之也呂布叛冬十一月盜殺大司馬張楊十二月癸酉曹操擊吕布於徐州斬之四年春三月袁紹攻公孫瓚于易京獲之公孫瓚頻失利乃臨易河築京以自固故號易京其城三重周囘六里今内城中有土京在幽州歸義縣南爾雅曰絶髙謂之京非人為之㐀衛将軍董承為車騎将軍夏六月袁術死是嵗初置尚書左右僕射武陵女子死十四日復活續漢志曰女子李娥年六十餘死瘞於城中有行人聞冢中有聲告家人出之五年春正月車騎将軍董承偏将軍王服越騎校尉种輯受宻詔誅曹操事洩壬午曹操殺董承等夷三族秋七月立皇子馮為南陽王壬午南陽王馮薨九月庚午朔日有食之詔三公舉至孝二人九卿校尉郡國守相各一人皆上封事靡有所諱曹操與袁紹戰於官度裴松之北征記曰中牟臺下臨汴水是為官度袁紹曹操壘尚存焉在今鄭州中牟縣北紹敗走冬十月辛亥有星孛于大梁大梁酉之分東海王祗薨是嵗孫䇿死為許貢客所射傷弟權襲其餘業權字仲謀六年春三月丁夘朔日有食之七年夏五月庚戌袁紹薨于寘國獻馴象馴象謂隨人意也是嵗越嶲男子化為女子八年冬十月己巳公卿初迎冬於北郊斯禮久廢故曰初總章始復備八佾舞袁紹紀云迎氣北郊始用八佾佾列也謂舞者之行列往因亂廢今始備之總章樂官名古之安代樂初置司直官督中都官司直秩比二千石武帝元狩五年置掌佐丞相舉不法也建武十一年省今復置之九年秋八月戊寅曹操大破袁尚平冀州自領冀州牧冬十月有星孛于東井十二月賜三公已下金帛各有差自是三年一賜以為常制十年春正月曹操破袁譚於青州斬之魏書曰操攻譚不剋乃自執桴鼔應時破之夏四月黑山賊張燕率衆降魏志曰燕本姓褚常山真定人也黄巾起燕合聚少年為羣盜萬餘人博陵人張牛角為主牛角死燕代為主故改姓張燕剽勇軍中號曰張飛燕衆至百萬號曰黒山賊秋九月賜百官尤貧者金帛各有差十一年春正月有星孛于北斗三月曹操破髙幹於幷州獲之典論曰上洛都尉王琰敗之追斬其首秋七月武威太守張猛殺廱州刺史邯鄲商袁宏漢紀曰廱州作凉州也是嵗立故琅邪王容子熙為琅邪王濟北北海阜陵下邳常山甘陵濟隂平原八國皆除十二年秋八月曹操大破烏桓於栁城斬其蹋頓蹋頓匈奴王號栁城縣名屬遼西郡今營州縣冬十月辛夘有星孛于鶉尾鶉尾已之分己巳黄巾賊殺濟南王贇河間孝王五代孫十一月遼東太守公孫康殺袁尚袁熈十三年春正月司徒趙温免夏六月罷三公官置丞相御史大夫癸巳曹操自為丞相秋七月曹操南征劉表八月丁未光禄勲郗慮為御史大夫續漢書曰慮字鴻豫山陽髙平人也少受學於鄭𤣥壬子曹操殺太中大夫孔融夷其族是月劉表卒少子琮立琮以荆州降操冬十月癸未朔日有食之曹操以舟師伐孫權權将周瑜敗之於烏林赤壁十四年冬十月荆州地震十五年春二月乙巳朔日有食之十六年秋九月庚戍曹操與韓遂馬超戰於渭南遂等大敗關西平曹瞞傳曰時婁子伯説操曰今天寒可起沙為城以水灌之可一夜而成公從之比明城立超遂數挑戰不利操縱虎騎夹擊大破之超遂走凉州是嵗趙王赦薨十七年夏五月癸未誅衛尉馬騰夷三族六月庚寅晦日有食之秋七月洧水潁水溢螟八月馬超破涼州殺刺史韋康九月庚戍立皇子熙為濟隂王懿為山陽王邈為濟北王敦為東海王山陽公載記曰時許靖在巴郡聞立諸王曰将欲歙之必姑張之将欲奪之必姑與之其孟徳之謂乎冬十二月星孛于五諸侯五諸侯星名也十八年春正月庚寅復禹貢九州獻帝春秋曰時省幽并州以其郡國并於冀州省司隸校尉及涼州以其郡國并為雍州省交州并荆州益州於是有兖豫青徐荆揚冀益雍也九數雖同而禹貢無益州有梁州然梁益亦一地也夏五月丙申曹操自立為魏公加九錫案禮含文嘉曰九錫謂一曰車馬二曰衣服三曰樂器四曰朱戸五曰納陛六曰虎賁七百人七曰斧鉞八曰弓矢九曰秬鬯大雨水徙趙王珪為博陵王是嵗嵗星鎭星熒惑俱入太微是年秋三星逆行入太微守帝座五十日彭城王和薨十九年夏四月旱五月雨水劉備破劉璋據益州冬十月曹操遣将夏侯淵討朱建于枹罕獲之枹罕縣屬金城郡今河州縣也魏志曰淵字妙才沛國譙人也十一月丁卯曹操殺皇后伏氏滅其族及二皇子山陽公載記曰劉備在蜀聞之遂發喪二十年春正月甲子立貴人曹氏為皇后賜天下男子爵人一級孝悌力田二級賜諸王侯公卿以下榖各有差秋七月曹操破漢中張魯降二十一年夏四月甲午曹操自進號魏王五月己亥朔日有食之秋七月匈奴南單于来朝是嵗曹操殺琅邪王熙國除坐謀欲渡江被誅二十二年夏六月丞相軍師華歆為御史大夫冬有星孛于東北是嵗大疫二十三年春正月甲子少府耿紀丞相司直韋晃起兵誅曹操不克夷三族三輔决錄曰時有京兆金褘字徳偉自以代為漢臣乃發憤與耿紀韋晃欲挟天子以攻魏南援劉備事敗夷三族三月有星孛于東方杜預注左傳云平旦衆星皆沒而孛星乃見故不言所在之次二十四年春二月壬子晦日有食之夏五月劉備取漢中秋七月庚子劉備自稱漢中王八月漢水溢冬十一月孫權取荆州二十五年春正月庚子魏王曹操薨魏志曰操字孟徳薨時年六十六子丕襲位魏志曰丕字子桓操之太子二月丁未朔日有食之三月改元延康冬十月乙夘皇帝遜位魏王丕稱天子獻帝春秋曰帝時召羣臣卿士告祠髙廟詔太常張音持節奉䇿璽綬禪位于魏王乃為壇於繁陽故城魏王登壇受皇帝璽綬奉帝為山陽公山陽縣名屬河内郡故城在今懐州修武縣西北邑一萬户位在諸侯王上奏事不稱臣受詔不拜以天子車服郊祀天地宗廟祖臘皆如漢制都山陽之濁鹿城濁鹿一名濁城亦名清陽城在今懐州修武縣東北四皇子封王者皆降為列侯明年劉備稱帝于蜀孫權亦自王於吳於是天下遂三分矣魏青龍二年三月庚寅山陽公薨自遜位至薨十有四年年五十四諡孝獻皇帝八月壬申以漢天子禮儀𦵏于禪陵續漢書曰天子𦵏太僕駕四輪輈為賔車大練為屋幙中黄門虎賁各二十人執紼司空擇土造穿太史卜日将作作黄腸題湊便房如禮大駕太僕御方相氏黄金四目䝉熊皮𤣥衣朱裳執戈揚楯立乗四馬先驅旂長三刃十有二旒曵地畫日月升龍書旐曰天子之柩謁者二人立乗六馬為次太常跪哭日十五舉音止哭晝漏上請發司徒河南尹先引車轉太常曰請拜送車著白絲三糾紼長三十丈圍七寸六行行五十人公卿以下子弟凡三百人皆素幘委貌冠衣素裳挽校尉三百人皆赤幘不冠持幢幡皆銜枚羽林孤兒巴歈嬥歌者六十人為六列司馬八人執鐸至陵南羨門司徒跪請就下房都導東園武士奉入房執事下明器太祝進醴獻司空将校復土嬥音徒了反帝王紀曰禪陵在濁鹿城西北十里在今懐州修武縣北二十五里陵髙二丈周回二百步劉澄之地記云以漢禪魏故以名焉劉攽曰注太常跪哭日十五舉音止案漢志日字作曰在哭字上置園邑令丞太子早卒孫康立五十一年晉太康六年薨子瑾立四年太康十年薨子秋立二十年永嘉中為胡賊所殺國除論曰傳稱鼎之為器雖小而重故神之所寳不可奪移左氏傳王孫滿曰桀有昬徳鼎遷於商商紂暴虐鼎遷於周徳之休明雖小重也其姦回昬亂雖大輕也故言神之所寳不可奪移至今負而趨者此亦窮運之歸乎言神器至重被人負而趨走者斯亦窮盡之運歸於此時乎言不可復振也莊子曰藏舟於壑藏山於澤謂之固矣然而有力者負之而趨而昧者不知天厭漢徳久矣山陽其何誅焉厭倦誅責也漢自和帝以後政教陵遲故言天厭漢徳久矣禍之来也非獨山陽公之過其何所誅責乎左傳宋子魚曰天既厭商徳孔子曰於予予何誅劉攽曰注於予予何誅案今論語下予當作與贊曰獻生不辰身播國屯辰時也播遷也言獻帝生不逢時身旣播遷國又屯難詩曰我生不辰左傳曰震蕩播越終我四百永作虞賔春秋孔演圖曰劉四百嵗之際褒漢王輔皇王以期有名不就宋均注曰雖褒族人為漢王以自輔以當有應期名見攝錄者故名不就也虞賔謂舜以堯子丹朱為賔虞書曰虞賔在位是也以喻山陽公為魏之賔也後漢書卷九後漢書卷九考證獻帝紀董卓為相國何焯曰為相國上脱一自字置漢安都䕶注總統西方監夲西字訛四從宋夲改南陽王馮薨監夲脱馮字今從宋夲臣㑹汾按他處王薨皆書名但此句䝉上立皇子馮為南陽王文雖無馮字亦可斬其蹋頓何焯曰其字應衍改元延康監夲延字訛建按建康順帝年號也從宋本改至今負而趨者今應作令永作虞賔注虞書監夲訛作商書今改正後漢書卷九考證
