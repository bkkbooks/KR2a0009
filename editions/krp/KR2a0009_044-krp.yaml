body:
  text: 後漢書卷四十四宋宣城太守范煜撰唐章懷太子賢注宗室四王三侯列傳第四齊武王縯傳子北海靜王興齊武王縯字伯升縯引也音衍光武之長兄也性剛毅慷慨有大節自王莽簒漢常憤憤懷復社稷之慮不事家人居業傾身破産交結天下雄俊莽末盜賊羣起南方尤甚伯升召諸豪傑計議曰王莽暴虐百姓分崩今枯旱連年兵革並起東觀記曰王莽末年天下大旱蝗蟲蔽天盜賊羣起四方潰畔此亦天亡之時復髙祖之業定萬世之秋也衆皆然之於是分遣親客使鄧晨起新野光武與李通李軼起於宛伯升自發舂陵子弟合七八千人部署賔客自稱柱天都部柱天者若天之柱也都部者都統其衆也使宗室劉嘉往誘新市平林兵王匡陳牧等合軍而進屠長聚及唐子鄉殺湖陽尉進拔棘陽因欲攻宛至小長安與王莽前隊大夫甄阜屬正梁丘賜戰時天宻霧漢軍大敗姊元弟仲皆遇害宗從死者數十人伯升復収㑹兵衆還保棘陽阜賜乗勝留輜重於藍鄉比陽縣有藍鄉引精兵十萬南渡潢淳水酈元注水經曰諸水二湖流注合為黄水又南經棘陽縣之黄淳聚又謂之黄淳水在今唐州湖陽縣蕭該音淳作諄者誤劉攽曰潢字據注唯當作黄臨泚水阻兩川間為營絶後橋示無還心新市平林見漢兵數敗阜賜軍大至各欲解去伯升甚患之㑹下江兵五千餘人至宜秋宜秋聚名在泚陽縣乃往為説合從之埶下江從之語在王常傳伯升於是大饗軍士設盟約休卒三日分為六部潛師夜起襲取藍鄉盡獲其輜重明旦漢軍自西南攻甄阜下江兵自東南攻梁丘賜至食時賜陳潰阜軍望見散走漢兵急追之却迫潢淳水斬首溺死者二萬餘人遂斬阜賜王莽納言將軍嚴尤秩宗將軍陳茂聞阜賜軍敗引欲據宛伯升乃陳兵誓衆焚積聚破釡甑鼓行而前破釡甑示必死也鼔行而前言無所畏也史記曰項羽北救趙渡河乗船破釡甑與尤茂遇育陽下戰大破之斬首三千餘級尤茂棄軍走伯升遂進圍宛自號柱天大將軍王莽素聞其名大震懼購伯升邑五萬户黄金十萬斤位上公使長安中官署及天下鄉亭皆畫伯升像於塾旦起射之蕭該音義亦作塾引字林塾門側堂也東觀記續漢書並作埻案説文云射臬也廣雅埻的也埻音之允反自阜賜死後百姓日有降者衆至十餘萬諸將㑹議立劉氏以從人望豪傑咸歸於伯升而新市平林將帥樂放縱憚伯升威明而貪聖公懦弱先共定策立之然後使騎召伯升示其議伯升曰諸將軍幸欲尊立宗室其徳甚厚然愚鄙之見竊有未同今赤眉起青徐衆數十萬聞南陽立宗室恐赤眉復有所立如此必將内爭今王莽未滅而宗室相攻是疑天下而自損權非所以破莽也且首兵唱號鮮有能遂陳勝項籍即其事也舂陵去宛三百里耳未足為功遽自尊立為天下凖的使後人得承吾敝前書宋義曰戰勝則兵疲我承其敝非計之善者也今且稱王以號令若赤眉所立者賢相率而往從之若無所立破莽降赤眉然後舉尊號亦未晚也願各詳思之諸將多曰善將軍張卬拔劒擊地曰疑事無功史記曰趙武靈王欲被胡服肥義曰疑事無功疑行無名今日之議不得有二衆皆從之聖公既即位拜伯升為大司徒封漢信侯由是豪傑失望多不服平林後部攻新野不能下新野宰登城言曰王莽改令長為宰東觀記曰其宰潘臨也得司徒劉公一言願先下及伯升軍至即開城門降五月伯升拔宛六月光武破王尋王邑自是兄弟威名益甚更始君臣不自安遂共謀誅伯升乃大㑹諸將以成其計更始取伯升寳劒視之繡衣御史申屠建随獻玉玦繡衣御史武帝置衣繡者尊寵之也玦決也令早決斷更始竟不能發及罷㑹伯升舅樊宏謂伯升曰昔鴻門之㑹范増舉玦以示項羽史記曰項王留沛公飲項伯東向坐范増南向坐沛公北向坐范増數目項王舉所佩玉玦者三項王黙然不應鴻門地名在新豐東七十里今建此意得無不善乎伯升笑而不應初李軼諂事更始貴將貴將朱鮪等也光武深疑之常以戒伯升曰此人不可復信又不受伯升部將宗人劉稷數陷陳潰圍勇冠三軍時將兵擊魯陽魯陽縣屬南郡今汝州魯山縣也聞更始立怒曰本起兵圖大事者伯升兄弟也今更始何為者邪更始君臣聞而心忌之以稷為抗威將軍稷不肯拜更始乃與諸將陳兵數千人先収稷將誅之伯升固爭李軼朱鮪因勸更始并執伯升即日害之有二子建武二年立長子章為太原王興為魯王十一年徙章為齊王十五年追諡伯升為齊武王章少孤光武感伯升功業不就撫育恩愛甚篤以其少貴欲令親吏事故使試守平陰令試守者稱職滿嵗為真平陰縣屬河南郡應劭云在平津南故曰平陰魏文帝改為河陰故城在今洛陽縣東北濟州平陰縣東北五里亦有平陰故城遷梁郡太守今宋州也立二十一年薨諡曰哀王子殤王石嗣劉攽曰案殤者不成人之名今王石立二十四年不可以殤諡蓋是煬字建武二十七年石始就國三十年封石弟張為下博侯永平十四年封石二子為鄉侯石立二十四年薨子晃嗣下博侯張以善論議十六年與奉車都尉竇固等續漢志奉車都尉比二千石無員掌御乗輿車並出擊匈奴後進者多害其能數被譖訴建中初卒肅宗下詔褒揚之復封張子它人奉其祀晃及弟利侯剛與母太姬宗更相誣告章和元年有司奏請免晃剛爵為庶人徙丹陽丹陽故郡城在今潤州江寧縣東南帝不忍下詔曰朕聞人君正屏有所不聴白虎通曰所以設屏何以自障也示不極臣下之敬也天子徳大故外屏諸侯徳小故内屏宗尊為小君諸侯之妻稱曰小君宫衞周備出有輜軿之飾輜軿有擁蔽之車也列女傳曰齊孝公華孟姬謂公曰妾聞后妃踰閾必乗安車輜軿下堂必從傅母保阿進退則鳴玉珮内飾則結綢繆所以正心一意自歛制也入有牖户之固殆不至如譖者之言何休注公羊傳曰如其事曰訴加誣焉曰譖晃剛愆乎至行濁乎大倫濁猶汙也倫理也孔子曰欲潔其身而亂大倫甫刑三千莫大不孝朕不忍置之於理其貶晃爵為蕪湖侯蕪湖解見章紀削剛户三千於戲小子不勗大道控於法理以墮宗緒控引也墮毁也其遣謁者収晃及太姬璽綬晃立十七年而降爵晃卒子無忌嗣帝以伯升首創大業而後嗣罪廢心常愍之時北海亦絶無後及崩遺詔復二國永元二年乃復封無忌為齊王是為惠王立五十二年薨子頃王喜嗣立五年薨子承嗣建安十一年國除論曰大丈夫之鼓動拔起其志致蓋逺矣若夫齊武王之破家厚士豈㳺俠下客之為哉下客謂毛遂馮煖之徒也其慮將存乎配天之絶業而痛明堂之不祀也王者以逺祖配天以父配上帝於明堂將以存其絶業復其祭祀及其發舉大謀在倉卒擾攘之中使信先成於敵人新野宰潘臨云請劉公一言而降赦岑彭以顯義初彭守宛食盡降漢諸將欲誅之伯升曰今舉大事當表義士不如封之以勸其後更始封彭為歸徳侯若此足以見其度矣志髙慮逺禍發所忽謂不用樊宏光武之言忽輕也司馬相如曰禍故多藏於隠微而發於人之所忽也嗚呼古人以蜂蠆為戒蠆蝎也左傳臧文仲謂魯君曰君其無謂邾小蜂蠆有毒而况國乎蓋畏此也詩云敬之敬之命不易哉詩周頌也北海靖王興建武二年封為魯王嗣光武兄仲初南頓君娶同郡樊重女字嫺都􅈺胡間反説文嫺雅也嫺都性婉順自為童女不正容服不出於房宗族敬焉生三男三女長男伯升次仲次光武長女黄次元次伯姬皇妣以初起兵時病卒宗人樊巨公収斂焉建武二年封黄為湖陽長公主伯姬為寧平長公主元與仲俱歿於小長安追爵元為新野長公主十五年追諡仲為魯哀王興其嵗試守緱氏令為人有明略善聽訟甚得名稱遷𢎞農太守亦有善政續漢書曰𢎞農縣吏張申有伏罪興収申案論郡中震慄時年旱分遣文學循行屬縣理寃獄宥小過應時甘雨降澍視事四年上䟽乞骸骨徴還京師奉朝請二十七年始就國明年以魯國益東海續漢書曰二郡二十九縣租入倍諸王也故徙興為北海王三十年封興子復為臨邑侯臨邑縣屬東海故城在今濟州東亦名馬坊城也中元二年又封興二子為縣侯顯宗器重興每有異政輒乗驛問焉立三十九年薨子敬王睦嗣睦少好學博通書傳光武愛之數被延納顯宗之在東宫尤見幸待入侍諷誦出則執轡乗輿尊者居中執轡在左中興初禁網尚闊而睦性謙恭好士千里交結自名儒宿徳莫不造門由是聲價益廣永平中法憲頗峻睦乃謝絶賔客放心音樂然性好讀書常為愛翫嵗終遣中大夫奉璧朝賀中大夫王國官也續漢志曰中大夫比六百石無員掌奉王使京都奉璧賀正月及使諸國本皆持節後去節爾雅曰肉倍好謂之璧好孔也召而謂之曰朝廷設問寡人朝廷謂天子也大夫將何辭以對使者曰大王忠孝慈仁敬賢樂士臣雖螻蟻敢不以實睦曰吁子危我哉吁音于孔安國注尚書曰吁者疑怪之聲也此乃孤幼時進趣之行也東觀記續漢書並云是吾幼時狂惷之行也大夫其對以孤襲爵以來志意衰惰聲色是娛犬馬是好使者受命而行其能屈申若此初靖王薨悉推財産與諸弟雖王車服珍寳非列侯制皆以為分然後随以金帛贖之睦能屬文作春秋㫖義終始論及賦頌數十篇又善史書當世以為楷則及寢病帝驛馬令作草書尺牘十首説文云牘書版也蓋長一尺因取名焉立十年薨子哀王基嗣永平十八年封基二弟為縣侯二弟為鄉侯建初二年又封基弟毅為平望侯基立十四年薨無子肅宗憐之不除其國永元二年和帝封睦庶子斟鄉侯威為北海王奉睦後立七年威以非睦子又坐誹謗檻車徴詣廷尉道自殺永初元年鄧太后復封睦孫夀光侯普為北海王是為頃王延光二年復封睦少子為亭侯普立七年薨子恭王翼嗣立十四年薨子康王嗣無後建安十一年國除初臨邑侯復好學能文章永平中每有講學事輒令復典掌焉與班固賈逵共述漢史傅毅等皆宗事之復子騊駼及從兄平望侯毅並有才學永寧中鄧太后召毅及騊駼入東觀與謁者僕射劉珍與平望侯毅並在文苑傳著中興以下名臣列士傳騊駼又自造賦頌書論凡四篇趙孝王良傳趙孝王良字次伯光武之叔父也平帝時舉孝亷為蕭令光武兄弟少孤良撫循甚篤及光武起兵以事告良大怒東觀記曰光武初起兵良搏手大呼曰我欲詣納言嚴將軍叱上起去出閤令人視之還白方坐啗脯良復讙呼上言不可讙露明旦欲去前白良曰欲竟何時詣嚴將軍所良意下曰我為詐汝耳當復何苦乎曰汝與伯升志操不同今家欲危亡而反共謀如是既而不得已從軍至小長安漢兵大敗良妻及二子皆被害續漢書曰阜賜移書於良曰老子不率宗族單袴騎牛哭且行何足賴哉更始立以良為國三老從入關更始敗良聞光武即位乃亡奔洛陽建武二年封良為廣陽王五年徙為趙王始就國十三年降為趙公頻嵗來朝十七年薨于京師凡立十六年子節王栩嗣栩音况羽反建武三十年封栩二子為鄉侯建初二年復封栩十子為亭侯栩立四十年薨子頃王商嗣永元三年封商三弟為亭侯元年封商四子為亭侯商立二十三年薨子靖王宏立十二年薨子惠王乾嗣元初五年封乾二弟為亭侯是嵗趙相奏乾居父䘮私娉小妻小妻妾也又白衣出司馬門坐削中丘縣王宫門有兵衛亦為司馬門東觀記曰乾私出國到魏郡鄴易陽止宿亭令奴金盗取亭席金與亭佐孟常爭言以刄傷常部吏追逐乾藏逃金絞殺之懸其屍道邊樹相國舉奏詔書削中丘縣屬趙國故城在今邢州内丘縣西随室諱忠故改為内焉劉攽曰注削中丘縣屬趙國案文當更有中丘二字時郎中南陽程堅素有志行拜為乾傅堅輔以禮義乾改悔前過堅列上復所削縣本初元年封乾一子為亭侯乾立四十八年薨子懷王豫嗣豫薨子獻王赦嗣赦薨子珪嗣建安十八年徙封博陵王立九年魏初以為崇徳侯城陽恭王祉傳城陽恭王祉字巨伯東觀記初名終後改為祉光武族兄舂陵康侯敞之子也敞曾祖父節侯買以長沙定王子封於零道之舂陵鄉為舂陵侯買卒子戴侯熊渠嗣熊渠卒子考侯仁嗣仁以舂陵地埶下溼山林毒氣上書求減邑内徙東觀記曰考侯仁於時見户四百七十六上書願減户徙南陽留子男昌守墳墓元帝許之元帝初元四年徙封南陽之白水鄉猶以舂陵為國名遂與從弟鉅鹿都尉回及宗族往家焉仁卒子敞嗣敞謙儉好義盡推父時金寳財産與昆弟荆州刺史上其義行拜廬江都尉南陽郡是荆州所管故刺史上其行義也續漢書曰侯等助祭明堂以例益户二百敞以有行義拜為廬江都尉也嵗餘㑹族兄安衆侯劉崇起兵安衆康侯丹長沙定王子崇即丹之𤣥孫之子王莽畏惡劉氏徴敞至長安免歸國東觀記曰敞臨廬江嵗餘遭旱行縣人持枯稻自言稻皆枯吏强責租敞應曰太守事也載枯稻至太守所酒數行以語太守太守曰無有敞以枯稻示之太守曰都尉事也敞怒叱太守曰䑕何敢爾刺史舉奏莽徴到長安免就國先是平帝時敞與崇俱朝京師助祭明堂平帝時王莽輔政祫祭明堂諸侯王二十八人列侯百二十人宗室子九百餘人徴助祭也崇見莽將危漢室私謂敞曰安漢公擅國權羣臣莫不回從回曲社稷傾覆至矣太后春秋髙天子幼弱謂元后平帝也髙皇帝所以分封子弟蓋為此也敞心然之及崇事敗敞懼欲結援樹黨乃為祉娶髙陵侯翟宣女為妻宣丞相方進之子也襲父侯爵東觀記曰敞為嫡子終娶宣子女習為妻宣使嫡子姬送女入門二十餘日義起兵也㑹宣弟義起兵欲攻莽南陽捕殺宣女祉坐繫獄敞因上書謝罪願率子弟宗族為士卒先莽新居攝欲慰安宗室故不被刑誅及莽簒立劉氏為侯者皆降稱子食孤卿祿孤者特也卑於公爵於卿特置之故曰孤禮記上農夫食九人諸侯下士視上農夫中士倍下士上士倍中士下大夫倍上士卿四大夫祿也後皆奪爵及敞卒祉遂特見廢又不得官為吏祉以故侯嫡子行淳厚宗室皆敬之及光武起兵祉兄弟相率從軍前隊大夫甄阜盡収其家屬繫宛獄及漢兵敗小長安祉挺身還保棘陽甄阜盡殺其母弟妻子更始立以祉為太常將軍紹封舂陵侯從西入關封為定陶王别將擊破劉嬰於臨涇及更始降於赤眉祉乃間行亡奔洛陽是時宗室唯祉先至光武見之歡甚東觀記曰祉以建武二年三月見於懷宫建武二年封為城陽王賜乗輿御物車馬衣服追諡敞為康侯十一年祉疾病上城陽王璽綬願以列侯奉先人祭祀帝自臨其疾祉薨年四十三謚曰恭王竟不之國𦵏於洛陽北芒十三年封祉嫡子平為蔡陽侯以奉祉祀平弟堅為髙鄉侯初建武二年以皇祖皇考墓為昌陵置陵令守視後改為章陵因以舂陵為章陵縣十八年立考侯康侯廟比園陵置嗇夫嗇夫本鄉官主知賦役多少平其差品園陵置之知祭祀徴求諸事詔零陵郡奉祠節侯戴侯廟以四時及臘嵗五祠焉臘嵗終祭神之名也置嗇夫佐吏各一人劉攽曰案後漢志縣小吏有嗇夫有佐史則此吏字當作史也平後坐與諸王交通國除永平五年顯宗更封平為竟陵侯平卒子真嗣真卒子禹嗣禹卒子嘉嗣泗水王歙傳泗水王歙字經孫歙音許及反光武族兄也歙子終與光武少相親愛漢兵起始及唐子終誘殺湖陽尉更始立歙從入關封為元氏王終為侍中更始敗歙終東奔洛陽建武二年立歙為泗水王終為淄川王今淄州縣也十年歙薨封小子燀為堂谿侯燀字林云灼也音充善反續漢志汝南吳房縣有堂谿亭燀或作憚奉歙後終居䘮思慕哭泣二十餘日亦薨封長子柱為邔侯邔縣屬南郡故城在今襄州邔音其紀反以奉終祀又封終子鳯曲陽侯曲陽縣屬東海郡故城在今海州朐山縣西南歙從父弟茂年十八漢兵之起茂自號劉先職續漢志曰茂自號為劉先職亦聚衆京宻間京縣屬河南郡鄭之京邑故城在今鄭州滎陽縣東南宻縣屬河南郡故城在今宻縣東南稱厭新將軍攻下潁川汝南衆十餘萬人光武既至河内茂率衆降封為中山王十三年宗室為王者皆降為侯更封茂為穰侯茂弟匡亦與漢兵俱起建武二年封宜春侯為人謙遜永平中為宗正子浮嗣封朝陽侯朝陽縣屬南郡故城在今鄧州穰縣南今謂之朝城浮弟尚永元中為征西將軍浮傳國至孫䕶無子封絶延光中䕶從兄瓌與安帝乳母王聖女伯榮私通遂取伯榮為妻得紹䕶封為朝陽侯位侍中及王聖敗貶爵為亭侯安城孝侯賜傳安城孝侯賜字子琴光武族兄也祖父利蒼梧太守蒼梧郡今梧州縣也賜少孤兄顯報怨殺人吏捕顯殺之賜與顯子信賣田宅同抛普交反財産結客報吏續漢書曰王莽時諸劉抑廢為郡縣所侵蔡陽國釡亭侯長醉詢更始父子張子張怒刺殺亭長後十餘嵗亭長子報殺更始弟騫賜兄欲為報怨賔客轉劫人發覺州郡殺顯獄中賜與顯子信結客陳政等九人燔燒殺亭長妻子四人劉攽曰注釡亭侯長案下文云刺殺亭長則此當云釡侯亭長蓋此亭名釡侯也皆亡命逃伏遭赦歸㑹伯升起兵乃随從攻擊諸縣更始既立以賜為光祿勲封廣漢侯及伯升被害代為大司徒將兵討汝南未及平更始又以信為奮威大將軍代賜擊汝南賜與更始俱到洛陽更始欲令親近大將徇河北未知所使賜言諸家子獨有文叔可用大司馬朱鮪等以為不可更始狐疑賜深勸之乃拜光武行大司馬持節過河是日以賜為丞相令先入關修宗廟宫室還迎更始都長安封賜為宛王拜前大司馬使持節鎮撫關東二年春賜就國於宛典將六部兵伯升初起置六部之兵後赤眉破更始賜所領六部亦稍散畔乃去宛保育陽聞光武即位乃西之武關迎更始妻子將詣洛陽帝嘉賜忠建武二年封為慎侯慎縣屬汝南郡故城在今潁州潁上縣西北十三年更増户邑定封為安城侯奉朝請以賜有恩信故親厚之數蒙讌私時幸其第恩賜特異賜輒賑與故舊無有遺積帝為營冢堂起祠廟置吏卒如舂陵孝侯二十八年卒子閔嗣三十年帝復封閔弟嵩為白牛侯白牛蓋鄉亭之號也今在鄧州東也坐楚事謂楚王英謀反辭語相連國除閔卒子商嗣徙封為白牛侯商卒子昌嗣初信為更始討平汝南因封為汝陰王汝陰屬汝州南郡故城即今潁州郡汝陰縣也信遂將兵平定江南據豫章光武即位桂陽太守張隆擊破之信乃詣洛陽降以為汝陰侯永平十三年亦坐楚事國除成武孝侯順傳成武孝侯順字平仲光武族兄也父慶續漢志慶字翁敖舂陵侯敞同産弟順與光武同里閈閈里門也少相厚更始即位以慶為燕王順為虎牙將軍㑹更始降赤眉慶為亂兵所殺順乃間行詣光武拜為南陽太守建武二年封成武侯成武縣屬山陽郡今曹州縣也邑户最大租入倍宗室諸家八年使擊破六安賊六安即廬州也因拜為六安太守數年帝欲徴之吏人上書請留十一年卒帝使使者迎䘮親自臨弔子遵嗣坐與諸王交通降為端氏侯端氏縣屬河東郡故城在今澤州端氏縣西北遵卒子弇嗣弇卒無嗣國除永平十年顯宗幸章陵追念舊恩封順弟子三人為鄉侯初順叔父𢎞東觀記曰𢎞字孺孫先起義兵卒娶於樊氏皇妣之從妹也生二子敏國與母随更始在長安建武二年詣洛陽光武封敏為甘里侯潁川潁上縣西北有甘城國為弋陽侯弋陽縣屬汝南郡侯國也故城在今光州定城縣西也敏通經有行永平初官至越騎校尉𢎞弟梁以俠氣聞東觀記曰梁字季少更始元年起兵豫章欲徇江東自號就漢大將軍暴病卒東觀記曰病筋攣卒順陽懷侯嘉傳順陽懷侯嘉字孝孫光武族兄也父憲續漢志曰憲字翁君舂陵侯敞同産弟嘉少孤性仁厚南頓君養視如子後與伯升俱學長安習尚書春秋及義兵起嘉随更始征伐漢軍之敗小長安也嘉妻子遇害更始即位以為偏將軍及攻破宛封興徳侯遷大將軍擊延岑於冠軍降之更始既都長安以嘉為漢中王扶威大將軍持節就國都於南鄭衆數十萬建武二年延岑復反攻漢中圍南鄭嘉兵敗走岑遂定漢中進兵武都為更始柱功侯李寳所破岑走天水公孫述遣將侯丹取南鄭嘉収散卒得數萬人以寳為相從武都南擊侯丹不利還軍河池下辨河池縣屬武都郡一名仇池今鳳州縣也下辨縣名今成州同谷縣也復與延岑連戰岑引北入散關散關故城在今陳倉縣南十里有散谷水因取名焉至陳倉嘉追擊破之更始鄧王廖湛將赤眉十八萬攻嘉嘉與戰於谷口谷口縣故城今醴泉縣東北四十里酈元水經注曰涇水東經九嵕山東中山西謂之谷口大破之嘉手殺湛遂到雲陽就穀李寳等聞鄧禹西征擁兵自守勸嘉且觀成敗光武聞之告禹曰孝孫素謹善少且親愛當是長安輕薄兒誤之耳禹即宣帝㫖嘉乃因來歙詣禹於雲陽三年到洛陽從征伐拜為千乗太守六年病上書乞骸骨徴詣京師十三年封為順陽侯秋復封嘉子廧為黄李侯十五年嘉卒子參嗣有罪削為南鄉侯永平中參為城門校尉參卒子循嗣循卒子章嗣贊曰齊武沈雄義戈乗風以義舉兵乘風雲之㑹也倉卒匪圖亡我天工城陽早協趙孝晚同泗水三侯或恩或功後漢書卷四十四後漢書卷四十四考證齊武王縯傳普立七年薨諸本同按普以安帝永初元年封至延光元年為十七年傳脱十字趙孝王良傳子節王栩嗣栩字章帝紀作旴元年封商四子為亭侯監本元年上無年號臣承蒼按汲古閣本作元興元年似應從増但趙王商以章帝建初七年立至和帝永元十二年薨是為二十三年元興元年封商四子不應載於商未薨之前史家特蒙上文封商三弟而類叙之耳後漢書卷四十四考證
