body:
  text: 後漢書卷七十八宋宣城太守范煜撰唐章懐太子賢注楊李翟應霍爰徐列傳第三十八楊終傳楊終字子山蜀郡成都人也年十三為郡小吏太守竒其才遣詣京師受業習春秋袁山松書曰時蜀郡有雷震决曹終上白記以為斷獄煩苛所致太守乃令終賦雷電之意而竒之顯宗時徴詣蘭臺拜校書郎建初元年大旱榖貴終以為廣陵楚淮陽濟南之獄徙者萬數又逺屯絶域吏民怨曠乃上疏曰臣聞善善及子孫惡惡止其身百王常典不易之道也春秋昭公二十年曹公孫會自鄸出奔宋公羊傳曰畔也曷為不言畔為公子喜時之後諱也春秋為賢者諱也何賢乎公子喜時譲國也君子善善也長惡惡也短惡惡止其身善善及子孫賢者子孫故君子為之諱秦政酷烈違牾天心一人有罪延及三族前書音義曰父族母族妻族也高祖平亂約法三章太宗至仁除去收孥太宗文帝也史記曰文帝徳至盛也豈不仁哉除去收拏相坐之律也萬姓廓然䝉被更生澤及昆蟲功垂萬世陛下聖明徳被四表今以比年久旱災疫未息災字或作牛疫病也躬自菲薄廣訪失得三代之隆無以加焉臣竊按春秋水旱之變皆應暴急惠不下流自永平以來仍連大獄有司窮考轉相牽引掠拷寃濫家屬徙邊加以北征匈奴西開三十六國頻年服役轉輸煩費又逺屯伊吾樓蘭車師戊巳民懐土思怨結邊域傳曰安土重居謂之衆庶元帝詔曰安土重遷黎人之性也昔殷人近遷洛邑且猶怨望尚書盤庚序曰盤庚五遷將治亳殷人咨胥怨亳今河南偃師故曰近遷洛邑何况去中土之肥饒寄不毛之荒極乎毛草也爾雅曰觚竹北户西王母日下謂之四荒又曰東至於泰逺西至於邠國南至於濮鈆北至於祝栗謂四極言不毛荒極直論逺耳非必此地也之且南方暑濕障毒互生愁困之民足以感動天地移變隂陽矣陛下留念省察以濟元元書奏肅宗下其章司空第五倫亦同終議太尉牟融司徒鮑昱校書郎班固等難倫以施行既久孝子無改父之道先帝所建不宜回異終復上書曰秦築長城功役繁興胡亥不革卒亡四海故孝元棄珠崖之郡光武絶西域之國不以介鱗易我衣裳元帝初元三年珠崖郡反待詔賈捐之以為宜棄珠崖救人飢餓乃罷珠崖郡光武二十一年鄯善車師王等十六國皆遣子入侍請都護帝以中國初定未遑外事還其侍子厚加賞賜介鱗喻逺夷言其人與魚鼈無異也衣裳謂中國也楊雄法言曰珠崖之絶捐之之力也否則鱗介易我衣裳魯文公毁泉臺春秋譏之曰先祖為之而已毁之不如勿居而已以其無妨害於民也公羊傳曰毁泉臺何以書譏爾築之譏毁之譏先祖為之而已毁之勿居而已也襄公作三軍昭公舍之君子大其復古以為不舍則有害於民也公羊傳曰襄公十一年作三軍三軍者何三卿也昭公五年傳曰舍中軍舍中軍者何復古也言舍之與留量時制宜也今伊吾之役樓蘭之屯久而未還非天意也帝從之聼還徙者悉罷邊屯終又言宣帝博徴羣儒論定五經於石渠閣方今天下少事學者得成其業而章句之徒破壊大體宜如石渠故事永為後世則於是詔諸儒於白虎觀論考同異焉會終坐事繋獄博士趙博校書郎班固賈逵等以終深曉春秋學多異聞表請之終又上書自訟即日貰出乃得與於白虎觀焉與音預後受詔刪太史公書為十餘萬言時太后兄衛尉馬廖謹篤自守不訓諸子終與廖交善以書戒之曰終聞堯舜之民可比屋而封桀紂之民可比屋而誅事見陸賈新語何者堯舜為之隄防桀紂示之驕奢故也詩曰皎皎練絲在所染之逸詩曰皎皎白貌也墨子曰墨子見染絲者歎曰染於蒼則蒼染於黄則黄故染不可不慎也上智下愚謂之不移中庸之流要在教化春秋殺太子母弟直稱君甚惡之者坐失教也公羊傳曰晉侯殺其太子申生曷為直稱晉侯曰以殺其太子母弟直稱君者甚之也劉攽曰注稱晉侯曰以殺其太子案今文當云曷為直稱晉侯以殺其太子禮制人君之子年八嵗為置少傅教之書計以開其明大戴禮曰古者八嵗出就外舍學小蓺焉履小節焉又曰為置三少曰少保少傅少師是與太子宴者也禮記内則曰十年出就外傅居宿於外學書記也十五置太傅教之經典以道其志漢興諸侯王不力教誨多觸禁忌故有亡國之禍而乏嘉善之稱今君位地尊重海内所望豈可不臨深履薄以為至戒黄門郎年㓜血氣方盛廖子防及光俱為黄門郎孔子曰及其壯也血氣方剛戒之在鬬也既無長君退讓之風文帝竇后兄長君弟廣國字少君此兩人所出微絳灌等選長者之有節行者與之居長君少君由此為退讓君子不敢以富貴驕人也而要結輕狡無行之客縱而莫誨視成任性馬防傳曰兄弟貴盛賔客奔湊四方畢至數百餘人皆為食客也鑒念前世可為寒心君侯誠宜以臨深履薄為戒廖不納子豫後坐縣書誹謗縣音懸廖以就國終兄鳳為郡吏太守亷范為州所考遣鳳候終終為范游説坐徙北地益部耆舊傳曰終徙於北地望松縣而母於蜀物故終自傷被罪充邊乃作晨風之詩以舒其憤也帝東廵狩鳳皇黄龍並集終贊頌嘉瑞上述祖宗鴻業凡十五章奏上詔貰還故郡著春秋外傳十二篇改定章句十五萬言永元十二年徴拜郎中以病卒袁山松書曰侍中賈逵薦終博達忠直徴拜郎中及卒賜錢二十萬也李法傳李法字伯度漢中南鄭人也博通羣書性剛而有節和帝永元九年應賢良方正對策除博士遷侍中光禄大夫嵗餘上疏以為朝政苛碎違永平建初故事宦官權重椒房寵盛又譏史官記事不實後世有識尋功計徳必不明信坐失㫖下有司免為庶人還鄉里杜門自守故人儒生時有候之者言談之次問其不合上意之由法未嘗應對友人固問之法曰鄙夫可與事君乎哉茍患失之無所不至此以上論語孔子之言也鄭𤣥注云無所不至謂謟佞邪媚無所不為也孟子有言夫仁者如射正已而後發發而不中不怨勝己者反諸身而已矣孟子公孫丑篇之言也反諸身而已言克己自責不責人也在家八年徴拜議郎諫議大夫正言極辭無改於舊出為汝南太守政有聲迹後歸鄉里卒於家翟酺傳翟酺字子超廣漢雒人也雒屬廣漢郡漳山雒水所出南入湔故城在今雒縣南湔音子田反四世傳詩酺好老子尤善圖緯天文歴算以報舅讐當徙日南亡於長安為卜相工後牧羊涼州遇赦還仕郡徴拜議郎遷侍中時尚書有缺詔將大夫六百石以上試對政事天文道術以高第者補之酺自恃能高而忌故太史令孫懿恐其先用乃往候懿既坐言無所及唯涕泣流連懿怪而問之酺曰圖書有漢賊孫登將以才智為中官所害觀君表相似當應之春秋保乾圖曰漢賊臣名孫登大形小口長七尺九寸巧用法多技方詩書不用賢人杜口也酺受恩接悽愴君之禍耳懿憂懼移病不試移病謂作文移而稱病也由是酺對第一拜尚書時安帝始親政事追感祖母宋貴人悉封其家又元舅耿寳及皇后兄弟閻顯等並用威權酺上疏諫曰臣聞微子佯狂而去殷叔孫通背秦而歸漢彼非自疏其君時不可也臣荷殊絶之恩䝉值不諱之政豈敢雷同受寵而以戴天履地雷之發聲物皆同應言無是非者謂之雷同禮記曰毋雷同左傳曰君履后土而戴皇天也伏惟陛下應天履祚歴值中興當建太平之功而未聞致化之道盖逺者難明請以近事徴之昔竇鄧之寵傾動四方兼官重紱盈金積貨至使議弄神器改更社稷神器謂天位也老子曰天下神器不可為也竇憲出入禁中得幸太后圖為殺害帝知其謀誅之鄧太后崩宫人告鄧悝鄧𢎞等取廢帝故事謀立平原王得帝聞遂免鄧氏為庶人也豈不以埶尊威廣以致斯患乎及其破壊頭顙墮地願為孤豚豈可得哉莊子曰或聘莊子莊子謂其使曰子見夫犧牛乎衣以文繡食以芻菽及其牽而入於太廟欲為孤犢其可得乎此作豚不同也夫致貴無漸失必暴受爵非道殃必疾今外戚寵幸功均造化漢元以來未有等比陛下誠仁恩周洽以親九族然禄去公室政移私門覆車重尋寧無摧折賈誼曰諺云前車覆後車誡也而朝臣在位莫肯正議翕翕訾訾更相佐附詩小雅曰翕翕訾訾亦孔之哀毛傳曰翕翕然患其上訾訾然不思稱職爾雅曰翕翕訾訾莫供職也訾音將徙反訿與訾古字通臣恐威權外假歸之良難虎翼一奮卒不可制韓詩外傳曰無為虎傅翼將飛入邑擇人而食夫置不肖之人於位是為虎傅翼也故孔子曰吐珠於澤誰能不含春秋保乾圖曰臣功大者主威侵權并族害己姦行吐珠於澤誰能不含諭君之權柄外假則必競取以為己利猶珠出於澤中誰能不含取以為己寳也吐猶出也老子稱國之利器不可以示人老子道經曰魚不可脱於泉國之利器不可以示人河上公注曰利器謂權道也理國權道不可以示執事之臣此最安危之極戒社稷之深計也夫儉徳之恭政存約節左氏傳魯大夫御孫曰儉徳之恭侈惡之大也故文帝愛百金於露臺飾帷帳於皁囊文帝常欲作露臺計直百金曰百金中人十家之産何以臺為遂止不作又東方朔曰文帝集上書囊以為殿帷或有譏其儉者上曰朕為天下守財耳豈得妄用之哉至倉榖腐而不可食錢貫朽而不可校今自初政已來日月未久費用賞賜已不可算歛天下之財積無功之家帑藏單盡民物彫傷卒有不虞復當重賦百姓怨叛既生危亂可待也昔成王之政周公在前召公在後畢公在左史佚在右四子挾而維之目見正容耳聞正言一日即位天下曠然言其法度素定也今陛下有成王之尊而無數子之佐雖欲崇雍熙致太平其可得乎自去年已來災譴頻數地坼天崩高岸為谷修身恐懼則轉禍為福輕慢天戒則其害彌深願陛下親自勞䘏研精致思勉求忠貞之臣誅逺佞謟之黨損玉堂之盛尊天爵之重孟子曰公卿大夫人爵也仁義禮智信天爵也割情欲之歡罷宴私之好帝王圖籍陳列左右心存亡國所以失之鑒觀興王所以得之庶災害可息豐年可招矣書奏不省而外戚寵臣咸畏惡之延光三年出為酒泉太守叛羌千餘騎徙敦煌來鈔郡界劉攽曰案文徙當作從酺赴擊斬首九百級羌衆幾盡威名大震遷京兆尹順帝即位拜光禄大夫遷將作大匠損省經用嵗息四五千萬經常也屢因災異多所匡正益都耆舊傳曰時詔問酺隂陽失序水旱隔并其設銷復興濟之本酺上奏陳圖書之意曰漢四百年將有弱主閉門聼難之禍數在三百年之間宜升歴改憲行先王至徳要道奉率時禁抑損奢侈宣明質樸以延四百年之難帝從之由是權貴共誣酺及尚書令高堂芝等交通屬託坐减死歸家復被章云酺前與河南張楷等謀反逮詣廷尉及杜真等上書訟之事得明釋卒於家益都耆舊傳曰杜真字孟宗廣漢綿竹人也少有孝行習易春秋誦百萬言兄事同郡翟酺酺後被繫獄真上檄章救酺繫獄笞六百竟免酺難京師莫不壯之著援神鉤命解詁十二篇援神契鉤命决皆孝經緯篇名也詁音古初酺之為大匠上言孝文皇帝始置五經博士武帝建元五年始置五經博士文帝之時未遑庠序之事酺之此言不知何據武帝大合天下之書武帝詔曰其令禮官勸學舉遺興禮舉遺謂搜求遺逸是合天下之書也而孝宣論六經於石渠學者滋盛弟子萬數宣帝甘露三年詔諸儒講五經於殿中兼平公羊穀梁同異上親臨决焉時更崇榖梁傳故此言六經也石渠閣名昭帝時博士弟子員百人宣帝末增倍之元帝時詔無置弟子員以廣學者故言以萬數也光武初興愍其荒廢起太學博士舍内外講堂諸生横卷為海内所集明帝時辟雍始成欲毁太學太尉趙熹以為太學辟雍皆宜兼存故並傳至今而頃者頽廢至為園採芻牧之處宜更脩繕誘進後學帝從之酺免後遂起太學更開拓房室學者為酺立碑銘於學云應奉傳應奉字世叔汝南南頓人也曾祖父順字華仲和帝時為河南尹將作大匠公亷約已明逹政事華嶠書曰華仲少給事郡縣為吏清公不發私書舉孝亷尚書郎轉右丞遷冀州刺史亷直無私遷東平相賞罰必信吏不敢犯有梓樹生於㕔事室上事後母至孝衆以為孝感之應時竇憲出屯河西刺史二千石皆遣子弟奉賂遺憲憲敗後咸被繩黜順獨不在其中由是顯名為將作大匠視事五年省費億萬汝南記曰華仲妻本是汝南鄧元義前妻也元義父伯考為尚書僕射元義還鄉里妻留事姑甚謹姑憎之幽閉空室節其食飲羸露日困妻終無怨言後伯考怪而問之時義子朗年數嵗言母不病但苦飢耳伯考流涕曰何意親姑反為此禍因遣歸家更嫁為華仲妻仲為將作大匠妻乘朝車出元義於路傍觀之謂人曰此我故婦非有它過家夫人遇之實酷本自相貴其子朗時為郎母與書皆不答與衣裳輙以燒之母不以介意意欲見之乃至親家李氏堂上令人以它詞請朗朗至見母再拜涕泣因起出母追謂之曰我幾死自為汝家所棄我何罪過乃如此邪因此遂絶也生十子皆有才學中子疊江夏太守疊生郴武陵太守郴生奉奉少聰明自為童兒及長凡所經履莫不暗記讀書五行並下為郡決曹史行部四十二縣録囚徒數百千人及還太守備問之奉口説罪繫姓名坐狀輕重無所遺脱時人竒之謝承書曰奉少為上計吏許訓為計掾俱到京師訓自發鄉里在路晝頓暮宿所見長吏賔客亭長吏卒奴僕訓皆密疏姓名欲試奉還郡出疏示奉奉云前食潁川綸氏都亭亭長胡奴名禄以飲漿來何不在疏坐中皆驚又云奉年二十時嘗詣彭城相袁賀賀時出行閉門造車匠於内開扇出半靣視奉奉即委去後數十年於路見車匠識而呼之劉攽曰注奉少為上計吏許訓為計掾案吏當為史總而言掾史皆吏别而言之不同上計有史有掾也著漢書後序多所述載袁山松書曰奉又刪史記漢書及漢記三百六十餘年自漢興至其時凡十七卷名曰漢事大將軍梁冀舉茂才先是武陵蠻詹山等四千餘人反叛執縣令屯結連年詔下公卿議四府舉奉才堪將帥四府解見皇后紀永興元年拜武陵太守到官慰納山等皆悉降散於是興學校舉側陋政稱變俗坐公事免延熹中武陵蠻復宼亂荆州車騎將軍馮緄以奉有威恩為蠻夷所服上請與俱征拜從事中郎謝承書曰時詔奉曰蠻夷叛逆作難積惡放恣鑊中之魚火熾湯盡當悉燋爛以刷國恥朝廷以奉昔守南土威名播越故復式序重任奉之廢興期在於今賜奉錢十萬駮犀方具劒金錯把刀劒革帶各一奉其勉之奉勤設方略賊破軍罷緄推功於奉薦為司𨽻校尉紏舉姦違不避豪戚以嚴厲為名及鄧皇后敗而田貴人見幸桓帝有建立之議奉以田氏微賤不宜超登后位上書諫曰臣聞周納狄女襄王出居于鄭左傳襄王將以狄女為后富臣諫曰不可狄固貪惏王又啟之王不從狄人伐周襄王出奔劉攽曰注富臣案臣當作辰漢立飛燕成帝𦙍嗣泯絶母后之重興廢所因宜思闗雎之所求逺五禁之所忌韓詩外傳曰婦人有五不娶喪父之長女不娶為其不受命也世有惡疾不娶棄於天也世有刑人不娶棄於人也亂家女不娶類不正也逆家子不娶廢人倫也帝納其言竟立竇皇后及黨事起奉乃慨然以疾自退追愍屈原因以自傷著感騷三十篇數萬言諸公多薦舉會病卒子劭劭字仲逺謝承書曰應氏譜並云字仲逺續漢書文士傳作仲援漢官儀又作仲瑗未知孰是劉攽曰注謝承書曰應氏譜並云案文多一曰字少篤學博覽多聞靈帝時舉孝亷辟車騎將軍何苖掾中平二年漢陽賊邊章韓遂與羌胡為宼東侵三輔時遣車騎將軍皇甫嵩西討之嵩請發烏桓三千人北軍中候鄒靖上言烏桓衆弱宜開募鮮卑事下四府大將軍掾韓卓議以為烏桓兵寡而與鮮卑世為仇敵若烏桓被發則鮮卑必襲其家烏桓聞之當復棄軍還救非唯無益於實乃更沮三軍之情鄒靖居近邊塞究其態詐若令靖募鮮卑輕騎五千必有破敵之效劭駮之曰鮮卑隔在漠北犬羊為羣無君長之帥廬落之居而天性貪暴不拘信義故數犯障塞且無寧嵗唯至互市乃來靡服茍欲中國珍貨非為畏威懐徳計獲事足旋踵為害是以朝家外而不内盖為此也朝家猶國家也公羊傳曰春秋内諸夏而外夷狄也往者匈奴反叛度遼將軍馬續烏桓校尉王元發鮮卑五千餘騎又武威太守趙沖亦率鮮卑征討叛羌斬獲醜虜既不足言而鮮卑越溢多為不法裁以軍令則忿戾作亂制御小緩則陸掠殘害劫居人鈔商旅噉人牛羊略人兵馬得賞既多不肻去復欲以物買鐡邊將不聼便取縑帛聚欲燒之邊將恐怖畏其反叛辭謝撫順無敢拒違今狡宼未殄而羌為巨害如或致悔其可追乎臣愚以為可募隴西羌胡守善不叛者簡其精勇多其牢賞牢稟食也或作勞勞功也太守李參沈静有謀必能奬厲得其死力當思漸消之略不可倉卒望也韓卓復與劭相難反覆於是詔百官大會朝堂皆從劭議三年舉髙第再遷六年拜太山太守初平二年黄巾三十萬衆入郡界劭紏率文武連與賊戰前後斬首數千級獲生口老弱萬餘人輜重二千兩賊皆退却郡内以安興平元年前太尉曹嵩及子徳從琅邪入太山劭遣兵迎之未到而徐州牧陶謙素怨嵩子操數擊之乃使輕騎追嵩徳並殺之於郡界劭畏操誅棄郡奔冀州牧袁紹初安帝時河間人尹次潁川人史玉皆坐殺人當死次兄初及玉母軍並詣官曹求代其命因縊而物故尚書陳忠以罪疑從輕議活次玉劭後追駮之據正典刑有可存者其議曰尚書稱天秩有禮五服五章哉天討有罪五刑五用哉而孫卿亦云凡制刑之本將以禁暴惡且懲其末也凡爵列官秩賞慶刑威皆以類相從使當其實也若徳不副位能不稱官賞不酬功刑不應罪不祥莫大焉殺人者死傷人者刑此百王之定制有法之成科高祖入關雖尚約法然殺人者死亦無寛降夫時化則刑重時亂則刑輕犯化之罪固重犯亂之罪為輕書曰刑罰時輕時重此之謂也今次玉公以清時釋其私憾阻兵安忍僵屍道路阻持也左傳曰衛州吁阻兵而安忍朝恩在寛幸至冬獄而初軍愚狷妄自投斃昔召忽親死子紏之難而孔子曰經於溝瀆人莫之知召忽齊大夫子紏齊襄公之庶子也子紏與小白争國子紏被殺召忽其𫝊也遂死之論語孔子論召忽曰豈若匹夫匹婦之為諒也自經於溝瀆而莫之知也鼂氏之父非錯刻峻遂能自隕其命班固亦云不如趙母指括以全其宗前書鼂錯為御史大夫改更律令諸侯諠譁錯父聞而非之曰劉氏安而鼂氏危矣遂飲藥而死史記曰趙母趙將馬服君趙奢之妻趙括之母也奢死趙欲以括為將母謂趙王曰王以為括如其父父子異心願王勿遣王曰吾計决矣括母曰王終將之即有不稱妾得無隨乎王許諾及括敗王以母先言竟不誅也而班固引之以為鼂錯贊詞傳曰僕妾感慨而致死者非能義勇顧無慮耳言僕妾之致死者顧無由計慮耳語見史記欒布傳賛也夫刑罰威獄以類天之震燿殺戮也温慈和惠以放天之生殖長育也左傳鄭大夫游吉之語是故春一草枯則為災秋一木華亦為異今殺無罪之初軍而活當死之次玉其為枯華不亦然乎陳忠不詳制刑之本而信一時之仁遂廣引八議求生之端夫親故賢能功貴勤賔豈有玉次當罪之科哉周禮小司寇職鄭司農曰親宗室有罪先請也故謂舊知也賢謂有徳行者能謂有道蓺者功謂有大勳也貴謂若今墨綬有罪先請也勤謂憔悴國事賔謂二王後若乃小大以情原心定罪左傳曰小大之獄雖不能察必以情原心定罪解見霍諝傳也此為求生非謂代死可以生也敗法亂政悔其可追劭凡為駮議三十篇皆此類也又刪定律令為漢儀建安元年乃奏之曰夫國之大事莫尚載籍也劉攽曰案文多一也字載籍也者决嫌疑明是非禮記曰夫禮者决嫌疑明是非賞刑之宜允獲厥中俾後之人永為監焉故膠東相董仲舒老病致仕朝廷每有政議數遣廷尉張湯親至陋巷問其得失事見前書於是作春秋决獄二百三十二事動以經對言之詳矣逆臣董卓蕩覆王室典憲焚燎靡有孑遺開辟以來莫或兹酷或有也今大駕東邁廵省許都拔出險難其命惟新臣累世受恩榮祚豐衍竊不自揆貪少云補輙撰具律本章句尚書舊事廷尉板令决事比例司徒都目五曹詔書司徒即丞相也總領綱紀佐理萬機故有都目成帝初置尚書員五人漢舊儀有常侍曹二千石曹户曹主客曹三公曹也及春秋斷獄凡二百五十篇蠲去復重為之節文復音複重音定容反又集駮議三十篇以類相從凡八十二事其見漢書二十五漢記四即東觀記皆刪叙潤色以全本體其二十六博採古今瓌瑋之士文章煥炳徳義可觀其二十七臣所創造豈繄自謂必合道𠂻繄音烏兮反繄猶是也心焉憤邑聊以藉手藉音自夜反昔鄭人以乾鼠為璞鬻之於周宋愚夫亦寳燕石緹䌌十重夫覩之者掩口盧胡而笑斯文之俗無乃類旃尹文子曰鄭人謂玉未琢者為璞周人謂䑕未腊者為璞周人遇鄭賈人曰欲買璞乎鄭賈曰欲之出璞視之乃鼠也因謝不取戰國䇿亦然今此乃云鄭人以乾鼠為璞便與二説不同此云乾鼠彼云未腊事又差舛闕子曰宋之愚人得燕石梧臺之東歸而藏之以為大寳周客聞而觀之主人父齋七日端冕之衣釁之以特牲革匱十重緹巾十襲客見之俛而掩口盧胡而笑曰此燕石也與瓦甓不殊主人父怒曰商賈之言竪匠之心藏之愈固守之彌謹旃之也䌌音襲緹赤色繒也楚詞曰襲英衣兮緹䌌謂鮮明之衣左氏實云雖有姬姜絲麻不棄惟悴菅蒯盖所以代匱也左傳曰詩云雖有絲麻無棄菅蒯雖有姬姜無棄蕉萃凡百君子莫不代匱杜預云逸詩也姬姜大國之女蕉萃陋賤之人蕉萃憔悴古字通是用敢露頑才厠于明哲之末雖未足綱紀國體宣洽時雍庶幾觀察增闡聖聼惟因萬機之餘暇游意省覽焉獻帝善之二年詔拜劭為袁紹軍謀校尉時始遷都於許舊章堙沒書記罕存劭慨然歎息乃綴集所聞著漢官禮儀故事凡朝廷制度百官典式多劭所立初父奉為司𨽻時並下諸官府郡國各上前人像贊劭乃連綴其名録為狀人紀又論當時行事著中漢輯序撰風俗通以辯物類名號釋時俗嫌疑文雖不典後世服其洽聞凡所著述百三十六篇又集解漢書皆傳于時後卒於鄴弟子瑒璩並以文才稱華嶠書曰劭弟珣字季瑜司空掾珣生瑒魏志曰瑒字徳璉瑒弟璩字休璉咸以文章顯也中興初有應嫗者生四子而寡見神光照社試探之乃得黄金自是諸子宦學並有才名至瑒七世通顯應順將作大匠子疊江夏太守疊生郴武陵太守郴生奉從事中郎奉生劭車騎將軍掾劭弟珣司空掾珣子瑒曹操辟為丞相掾霍諝傳霍諝字叔智魏郡鄴人也少為諸生明經有人誣諝舅宋光於大將軍梁商者以為妄刋章文坐繫洛陽詔獄掠考困極諝時年十五奏記於商曰將軍天覆厚恩愍舅光寃結前者温教許為平議雖未下吏斷决其事已䝉神明顧省之聼皇天后土實聞徳音竊獨踴躍私自慶幸諝聞春秋之義原情定過赦事誅意故許止雖弑君而不罪趙盾以縱賊而見書許止許悼公之子名止也公羊傳曰冬葬許悼公賊未討何以書葬不成乎弑也許悼公是止進藥而殺是以君子加弑焉葬許悼公是君子之赦止赦止者免止罪之辭也何休注云原止欲愈父之病無害父之意故赦之是原情定過也又曰晉史書趙盾弑其君趙盾曰天乎無辜吾不弑君太史曰爾為仁為義人殺爾君而不討賊此非弑君如何此赦事誅意也此仲尼所以垂王法漢世所宜遵前脩也傳曰人心不同譬若其靣左傳鄭子產謂子皮曰人心不同譬如面焉吾豈敢謂子靣如吾靣乎斯盖謂大小窳隆醜美之形至於鼻目衆竅毛髮之狀未有不然者也情之異者剛柔舒急倨敬之間至於趨利避害畏死樂生亦復均也諝與光骨肉義有相隐言其寃濫未必可諒且以人情平論其理光衣冠子孫徑路平易謂遵依常轍無所規求也位極州郡日望徴辟亦無瑕穢纎介之累無故刋定詔書欲以何名就有所疑當求其便安豈有觸冒死禍以解細微譬猶療飢於附子止渴於酖毒未入腸胃已絶咽喉豈可為哉史記蘇秦曰飢人之所以飢而不食烏喙者以其愈充腹而與餓死者同患也附子烏喙根同而狀異也昔東海孝婦見枉不辜幽靈感革天應枯旱前書曰東海有孝婦少寡無子養姑甚謹姑欲嫁之終不肻姑告鄰人曰孝婦養我勤苦我老久累丁壯乃自經死姑女告吏曰婦殺我母吏騐之急孝婦自誣服具獄上府太守竟論殺婦郡中枯旱三年後太守至自祭孝婦墓天立大雨嵗熟光之所坐情既可原守闕連年而終不見理呼嗟紫宫之門泣血兩觀之下天有紫㣲宫是上帝之所居也王者立宫象而為之兩觀謂闕也傷和致災為害滋甚凡事更赦令不應復案夫以罪刑明白尚䝉天恩豈有寃謗無徴反不得理是為刑宥正罪戮加誣侵也不偏不黨其若是乎明將軍徳盛位尊人臣無二言行動天地舉厝移隂陽誠能留神沛然曉察必有于公高門之福于公東海人為郡决曹决獄平其閭門壊父老共脩之于公曰少高大閭門令容駟馬盖車我决獄多有隂徳子孫必有興者至子定國為丞相孫永為御史大夫和氣立應天下幸甚商高諝才志即為奏原光罪由是顯名仕郡舉孝亷稍遷金城太守性明逹篤厚能以恩信化誘殊俗甚為羌胡所敬服遭母憂自上歸行喪服闋公車徴再遷北海相入為尚書僕射是時大將軍梁冀貴戚秉權自公卿以下莫敢違牾諝與尚書令尹勲數奏其事又因陛見陳聞罪失及冀誅後桓帝嘉其忠節封鄴都亭侯前後固讓不許出為河南尹遷司𨽻校尉轉少府廷尉卒官子雋安定太守爰延傳爰延字季平陳留外黄人也清苦好學能通經教授性質慤少言辭縣令隴西牛述好士知人乃禮請延為廷掾范丹為功曹濮陽潛為主簿濮陽姓也常共言談而已後令史昭以為鄉嗇夫仁化大行人但聞嗇夫不知郡縣在事三年州府禮請不就桓帝時徴博士太尉楊秉等舉賢良方正再遷為侍中帝游上林苑從容問延曰朕何如主也對曰陛下為漢中主帝曰何以言之對曰尚書令陳蕃任事則化中常侍黄門豫政則亂是以知陛下可與為善可與為非前書曰齊桓公管仲相之則覇豎貂輔之則亂可與為善可與為惡是謂中人帝曰昔朱雲廷折欄檻今侍中靣稱朕違敬聞闕矣朱雲字游成帝時上書求見曰今朝廷大臣上不能匡主下無以益人臣願賜尚方斬馬劒斷佞臣一人以勵其餘上問曰誰也對曰安昌侯張禹上大怒曰小臣廷辱師傅罪死不赦御史將雲下雲攀殿檻折雲呼曰臣得從龍逢比干遊於地下足矣未知朝廷如何耳上意乃解及後當脩檻上曰勿易因而輯之以旌直臣劉攽曰昔朱雲廷折欄檻案文廷下少争字拜五官中郎將轉長水校尉遷魏郡太守徴拜大鴻臚帝以延儒生常特宴見時太史令上言客星經帝坐帝密以問延延因上封事曰臣聞天子尊無為上故天以為子位臨臣庶威重四海動静以理則星辰順序意有邪僻則晷度錯違陛下以河南尹鄧萬有龍潛之舊封為通侯恩重公卿惠豐宗室加頃引見與之對博上下媟黷有虧尊嚴臣聞之帝左右者所以咨政徳也故周公戒成王曰其朋其朋言慎所與也尚書周公戒成王曰孺子其朋孺子其朋慎其徃昔宋閔公與彊臣共博列婦人於側積此無禮以致大災公羊經書宋萬弑其君㨗傳曰宋萬嘗與魯莊公戰獲于莊公歸舍諸宫中數月然後歸之與宋閔公博婦人在側萬曰甚矣魯侯之淑魯侯之羙天下諸侯宜為君者唯魯侯爾閔公矜此婦人妬其言顧曰此虜也魯侯之羙惡乎至萬怒搏閔公絶其脰武帝與倖臣李延年韓嫣同臥起尊爵重賜情欲無猒遂生驕滛之心行不義之事卒延年被戮嫣伏其辜李延年中山人也身及父母兄弟皆故倡人也武帝時延年女弟得幸號曰李夫人延年善歌舞為協律都尉佩二千石印綬與上臥起弟季與中人亂出入驕恣上遂誅延年兄弟韓嫣韓王信之曾孫也武帝為王時與嫣相愛後位至上大夫賞賜擬鄧通與上臥起出入永巷以姦聞被誅夫愛之則不覺其過惡之則不知其善所以事多放濫物情生怨故王者賞人必酬其功爵人必甄其徳甄明也善人同處則日聞嘉訓惡人從游則日生邪情孔子曰益者三友論語孔子曰友直友諒友多聞益矣友便僻友善柔友便佞損矣邪臣惑君亂妾危主以非所言則悦於耳以非所行則玩於目故令人君不能逺之仲尼曰唯女子與小人為難養近之則不遜逺之則怨盖聖人之明戒也昔光武皇帝與嚴光俱寢上天之異其夕即見事見逸人傳夫以光武之聖徳嚴光之高賢君臣合道尚降此變豈况陛下今所親幸以賤為貴以卑為尊哉惟陛下逺䜛諛之人納謇謇之士除左右之權寤宦官之敝使積善日熙熙廣也佞惡消殄則乾災可除帝省其奏因以病自上乞骸骨還家靈帝復特徴不行病卒子驥白馬令亦稱善士謝承書曰興字驥徐璆傳徐璆字孟本璆音仇字孟玉廣陵海西人也父淑度遼將軍有名於邊謝承書曰淑字伯進寛裕博學習孟氏易春秋公羊傳禮記周官善誦太公六韜交接英雄常有壯志璆少博學辟公府舉高第袁山松書曰璆少履清髙立朝正色稱揚後進惟恐不及稍遷荆州刺史時董太后姊子張忠為南陽太守因埶放濫臧罪數億璆臨當之部太后遣中常侍以忠屬璆璆對曰臣身為國不敢聞命太后怒遽徴忠為司𨽻校尉以相威臨璆到州舉奏忠臧餘一億使冠軍縣上簿詣大司農以彰暴其事又奏五郡太守及屬縣有臧汙者悉徴案罪威風大行中平元年與中郎將朱儁擊黄巾賊於宛破之張忠怨璆與諸閹宦構造無端璆遂以罪徴有破賊功得免官歸家後再徴遷汝南太守轉東海相所在化行獻帝遷許以廷尉徴當詣京師道為袁術所劫授璆以上公之位璆乃歎曰龔勝鮑宣獨何人哉守之必死龔勝字君賔楚人也好學明經哀帝時為光禄大夫乞骸骨王莽即位遣使以上卿徴勝不食而死鮑宣字子都渤海人也哀帝時為司隸校尉王莽輔政誅漢忠臣不附已者宣及何武等皆死術不敢逼術死軍破璆得其盗國璽及還許上之衛宏曰秦以前以金玉銀為方寸璽秦以來天子獨稱璽又以玉羣下莫得用其玉出蓝田山題是李斯書其文曰受命于天既夀永昌號曰傳國璽漢髙祖定三秦子嬰獻之髙祖即位乃佩之王莽簒位就元后求璽后乃出以投地上螭一角缺及莽敗時仍帶璽紱杜呉殺莽不知取璽公賔就斬莽首并取璽更始將李松送上更始赤眉至髙陵更始奉璽上赤眉建武三年盆子奉以上光武孫堅從桂陽入雒討董卓軍於城南見井中有五色光軍人莫敢汲堅乃浚得璽袁術有僣盗意乃拘堅妻求之術得璽舉以向肘魏武謂之曰我在不聼汝乃至此時璆得而獻之并送前所假汝南東海二郡印綬司徒趙温謂璆曰君遭大難猶存此邪璆曰昔蘇武困於匈奴不墜七尺之節况此方寸印乎後拜太常使持節拜曹操為丞相操以相讓璆璆不敢當卒於官論曰孫懿以高明見忌而受欺於隂計翟酺資譎數取通而終之以謇諫豈性智自有周偏先後之要殊度乎應氏七世才聞而奉劭采章為盛及撰著篇籍甄紀異知雖云小道亦有可觀者焉延璆應對辯正而不可犯陵上之尤斯固辭之不可以已也左氏傳孔子曰辭之不可以已也如是夫子産有辭諸侯賴之贊曰楊終李法華陽有聞益州古梁州之域尚書曰華陽黑水惟梁州孔安國注曰北拒華山之陽南拒黑水故常璩敘蜀事而謂之華陽國志焉二應克聰亦表汝墳鄭𤣥注周禮曰水涯曰墳翟酺詐懿霍諝請舅延能訐帝璆亦牾后後漢書巻七十八後漢書卷七十八考證楊終傳善善及子孫惡惡止其身注曹公孫㑹自鄸出奔宋鄸字舊本誤鄭從春秋原文改魯文公毁泉䑓春秋譏之注公羊傳曰毁泉䑓何以書譏爾臣㑹汾按原文譏字下脱何譏二字又先祖為之而已毁之勿居而已臣㑹汾按原文勿居上脱不如二字詩曰皎皎素絲在所染之注逸詩曰皎皎白貌也注曰字誤當改也字既無長君退譲之風注絳灌等選長者之有節行者與之居臣㑹汾按史記外戚傳云選長者士之有節行者與居此注脱一士字衍一字當改正翟酺傳事得明釋卒於家注直上檄章救酺臣㑹汾按自上移下曰檄此止可言上章耳不應有檄字明衍應奉傳時人竒之注嘗詣彭城相袁賀城字監本誤丞臣㑹汾按袁閎傳父賀為彭城相今改正史臣論應對辯正而不可犯陵上之尤可字衍後漢書巻七十八考證
