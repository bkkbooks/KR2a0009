body:
  text: 後漢書卷十八吳蓋陳臧列傳第八吳漢字子顏南陽宛人也家貧給事縣為亭長王莽末以賓客犯法乃亡命至漁陽資用乏以販馬自業往來燕薊閒所至皆交結豪傑更始立使使者韓鴻徇河北或謂鴻曰吳子顏奇士也可與計事鴻召見漢甚悅之遂承制拜為安樂令會王郎起北州擾惑漢素聞光武長者獨欲歸心乃說太守彭寵曰漁陽上谷突騎天下所聞也君何不合二郡精銳附劉公擊邯鄲此一時之功也寵以為然而官屬皆欲附王郎寵不能奪漢乃辭出止外亭念所以譎衆未知所出望見道中有一人似儒生者漢使人召之為具食問以所聞生因言劉公所過為郡縣所歸邯鄲舉尊號者實非劉氏漢大喜即詐為光武書移檄漁陽使生齎以詣寵令具以所聞說之漢復隨後入寵甚然之於是遣漢將兵與上谷諸將并軍而南所至擊斬王郎將帥及光武於廣阿拜漢為偏將軍既拔邯鄲賜號建策侯漢為人質厚少文造次不能以辭自達鄧禹及諸將多知之數相薦舉及得召見遂見親信常居門下光武將發幽戍夜召鄧禹問可使行者禹曰閒數與吳漢言其人勇鷙有智謀諸將鮮能及者即拜漢大將軍持節北發十郡突騎更始幽州牧苗曾聞之陰勒兵勑諸郡不肯應調漢乃將二十騎先馳至無終曾以漢無備出迎於路漢即撝兵騎收曾斬之而奪其軍北州震駭城邑莫不望風弭從遂悉發其兵引而南與光武會清陽諸將望見漢還士馬甚盛皆曰是寧肯分兵與人邪及漢至莫府上兵簿諸將人人多請之光武曰屬者恐不與人今所請又何多也諸將皆慙初更始遣尚書令謝躬率六將軍攻王郎不能下會光武至共定邯鄲而躬裨將虜掠不相承稟光武深忌之雖俱在邯鄲遂分城而處然每有以慰安之躬勤於職事光武常稱曰謝尚書真吏也故不自疑躬既而率其兵數萬還屯於鄴時光武南擊青犢謂躬曰我追賊於射犬必破之尤來在山陽者埶必當驚走若以君威力擊此散虜必成禽也躬曰善及青犢破而尤來果北走隆慮山躬乃留大將軍劉慶魏郡太守陳康守鄴自率諸將軍擊之窮寇死戰其鋒不可當躬遂大敗死者數千人光武因躬在外乃使漢與岑彭襲其城漢先令辯士說陳康曰蓋聞上智不處危以僥倖中智能因危以為功下愚安於危以自亡危亡之至在人所由不可不察今京師敗亂四方雲擾公所聞也蕭王兵彊士附河北歸命公所見也謝躬內背蕭王外失衆心公所知也公今據孤危之城待滅亡之禍義無所立節無所成不若開門內軍轉禍為福免下愚之敗收中智之功此計之至者也康然之於是康收劉慶及躬妻子開門內漢等及躬從隆撢鄴不知康已反之乃與數百騎輕入城漢伏兵收之手擊殺躬其衆悉降躬字子張南陽人初其妻知光武不平之常戒躬曰君與劉公積不相能而信其虛談不為之備終受制矣躬不納故及於難光武北擊羣賊漢常將突騎五千為軍鋒數先登陷陳及河北平漢與諸將奉圖書上尊號光武即位拜為大司馬更封舞陽侯建武二年春漢率大司空王梁建義大將軍朱祐大將軍杜茂執金吾賈復揚化將軍堅鐔偏將軍王霸騎都尉劉隆馬武陰識共擊檀鄉賊於鄴東漳水上大破之降者十餘萬人帝使使者璽書定封漢為廣平侯食廣平斥漳曲周廣年凡四縣復率諸將擊鄴西山賊黎伯卿等及河內脩武悉破諸屯聚車駕親幸撫勞復遣漢進兵南陽擊宛涅陽酈穰新野諸城皆下之引兵南與秦豐戰黃郵水上破之又與偏將軍馮異擊昌城五樓賊張文等又攻銅馬五幡於新安皆破之明收率建威大將軍耿弇虎牙大將軍蓋延擊青犢於軹西大破降之又率驃騎大將軍杜茂彊弩將軍陳俊等圍蘇茂於廣樂劉永將周建別招聚收集得十餘萬人救廣樂漢將輕騎迎與之戰不利墯馬傷膝還營建等遂連兵入城諸將謂漢曰大敵在前而公傷臥衆心懼矣漢乃勃然裹創而起椎牛饗士令軍中曰賊衆雖多皆劫掠羣盜勝不相讓敗不相救非有仗節死義者也今日封侯之秋諸君勉之於是軍士激怒人倍其氣旦日建茂出兵圍漢漢選四部精兵黃頭吳河等及烏桓突騎三千餘人齊鼓而進建軍大潰反還奔城漢長驅追擊爭門並入大破之茂建突走漢留杜茂陳俊等守廣樂自將兵助蓋延圍劉永於睢陽永既死二城皆降明年又率陳俊及前將軍王梁擊破五校賊於臨平追至東郡箕山大破之北擊清河長直及平原五里賊皆平之時鬲縣五姓共逐守長據城而反諸將爭欲攻之漢不聽曰使鬲反者皆守長罪也敢輕冒進兵者斬乃移檄告郡使收守長而使人謝城中五姓大喜即相率歸降諸將乃服曰不戰而下城非衆所及也冬漢率建威大將軍耿弇漢中忠將軍王常等擊富平獲索二賊於平原明年春賊率五萬餘人夜攻漢營軍中驚亂漢堅臥不動有頃乃定即夜發精兵出營突擊大破其衆因追討餘黨遂至無鹽進擊勃海皆平之又從征董憲圍朐城明年春拔朐斬憲事見劉永傳東方悉定振旅還京師會隗囂畔夏復遣漢西屯長安八年從車駕上隴遂圍隗囂於西城帝勑漢曰諸郡甲卒但坐費糧食若有逃亡則沮敗衆心宜悉罷之漢等貪并力攻囂遂不能遣糧食日少吏士疲役逃亡者多及公孫述救至漢遂退敗十一年春率征南大將軍岑彭等伐公孫述及彭破荊門長驅入江關漢留夷陵裝露橈船將南陽兵及薥刑募士三萬人泝江而上會岑彭為刺客所殺漢并將其軍十二年春與公孫述將魏黨公孫永戰於魚涪津大破之遂圍武陽述遣子壻史興將五千人救之漢迎擊興盡殄其衆因入犍為界諸縣皆城守漢乃進軍攻廣都拔之遣輕騎燒成都市橋武陽以東諸小城皆降帝戒漢曰成都十餘萬衆不可輕也但堅據廣都待其來攻勿與爭鋒若不敢來公轉營迫之須其力疲乃可擊也漢乘利遂自將步騎二萬餘人進逼成都去城十餘里阻江北為營作浮橋使副將武威將軍劉尚將萬餘人屯於江南相去二十餘里帝聞大驚讓漢曰比勑公千條萬端何意臨事勃亂既輕敵深入又與尚別營事有緩急不復相及賊若出兵綴公以大衆攻尚尚破公即敗矣幸無它者急引兵還廣都詔書未到述果使其將謝豐袁吉將衆十許萬分為二十餘營并出攻漢使別將將萬餘人劫劉尚令不得相救漢與大戰一日兵敗走入壁豐因圍之漢乃召諸將厲之曰吾共諸君踰越險阻轉戰千里所在斬獲遂深入敵地至其城下而今與劉尚二處受圍埶既不接其禍難量欲潛師就尚於江南并兵禦之若能同心一力人自為戰大功可立如其不然敗必無餘成敗之機在此一舉諸將皆曰諾於是饗士秣馬閉營三日不出乃多樹幡旗使煙火不絕夜銜枚引兵與劉尚合軍豐等不覺明日乃分兵拒江北自將攻江南漢悉兵迎戰自旦至晡遂大破之斬謝豐袁吉獲甲首五千餘級於是引還廣都留劉尚拒述具以狀上而深自譴責帝報曰公還廣都甚得其宜述必不敢略尚而擊公也若先攻尚公從廣都五十里悉步騎赴之適當值其危困破之必矣自是漢與述戰於廣都成都之閒八戰八剋遂軍于其郭中述自將數萬人出城大戰漢使護軍高午唐邯將數萬銳卒擊之述兵敗走高午奔陳刺述殺之事已見述傳旦日城降斬述首傳送洛陽明年正月漢振旅浮江而下至宛詔令過家上冢賜穀二萬斛十五年復率揚武將軍馬成捕虜將軍馬武北擊匈奴徙鴈門代郡上谷吏人六萬餘口置居庸常山關以東十八年蜀郡守將史歆反於成都自稱大司馬攻太守張穆穆踰城走廣都歆遂移檄郡縣而宕渠楊偉朐徐容等起兵各數千人以應之帝以歆昔為岑彭護軍曉習兵事故遣漢率劉尚及太中大夫臧宮將萬餘人討之漢入武都乃發廣漢巴蜀三郡兵圍成都百餘日城破誅歆等漢乃乘桴沿江下巴郡楊偉徐容等惶恐解散漢誅其渠帥二百餘人徙其黨與數百家於南郡長沙而還漢性彊力每從征伐帝未安恆側足而立諸將見戰陳不利或多惶懼失其常度漢意氣自若方整厲器械激揚士吏帝時遣人觀大司馬何為還言方脩戰攻之具乃歎曰吳公差彊人意隱若一敵國矣每當出師朝受詔夕即引道初無辦嚴之日故能常任職以功名終及在朝廷斤斤謹質形於體貌漢嘗出征妻子在後買田業漢還讓之曰軍師在外吏士不足何多買田宅乎遂盡以分與昆弟外家二十年漢病篤車駕親臨問所欲言對曰臣愚無所知識唯願陛下慎無赦而已及薨有詔悼愍賜謚曰忠侯發北軍五校輕車介士送葬如大將軍霍光故事子哀侯成嗣為奴所殺二十八年分漢封為三國成子旦為灈陽侯以奉漢嗣旦弟盱為筑陽侯成弟國為新蔡侯旦卒無子國除建初八年徙封盱為平春侯以奉漢後盱卒子勝嗣初漢兄尉為將軍從征戰死封尉子彤為安陽侯帝以漢功大復封弟翕為襃親侯吳氏侯者凡五國初漁陽都尉嚴宣與漢俱會光武於廣阿光武以為偏將軍封建信侯論曰吳漢自建武世常居上公之位終始倚愛之親諒由質簡而彊力也子曰剛毅木訥近仁斯豈漢之方乎昔陳平智有餘以見疑周勃資朴忠而見信夫仁義不足以相懷則智者以有餘為疑而朴者以不足取信矣蓋延字巨卿漁陽要陽人也身長八尺彎弓三百斤邊俗尚勇力而延以氣聞歷郡列掾州從事所在職辦彭寵為太守召延署營尉行護軍及王郎起延與吳漢同謀歸光武延至廣阿拜偏將軍號建功侯從平河北光武即位以延為虎牙將軍建武二年更封安平侯遣南擊敖倉轉攻酸棗封丘皆拔其夏督駙馬都尉馬武騎都尉劉隆護軍都尉馬成偏將軍王霸等南伐劉永先攻拔襄邑進取麻鄉遂圍永於睢陽數月盡收野麥夜梯其城入永驚懼引兵走出東門延追擊大破之永棄軍走譙延進攻拔薛斬其魯郡太守而彭城扶陽杼秋蕭皆降又破永沛郡太守斬之永將蘇茂佼彊周建等三萬餘人救永共攻延延與戰於沛西大破之永軍亂遁沒溺死者太半永棄城走湖陵蘇茂奔廣樂延遂定沛楚臨淮修高祖廟置嗇夫祝宰樂人三年睢陽復反城迎劉永延復率諸將圍之百日收其野穀永乏食突走延追擊盡得輜重永為其將所殺永弟防舉城降四年春延又擊蘇茂周建於蘄進與董憲戰留下皆破之因率平敵狄將軍龐萌攻西防拔之復追敗周建蘇茂於彭城茂建亡奔董憲董憲將賁休舉蘭陵城降憲聞之自郯圍休時延及龐萌在楚請往救之帝勑曰可直往擣郯則蘭陵必自解延等以賁休城危遂先赴之憲逆戰而陽敗延等遂逐退因拔圍入城明日憲大出兵合圍延等懼遽出突走因往攻郯帝讓之曰閒欲先赴郯者以其不意故耳今既奔走賊計已立圍豈可解乎延等至郯果不能克而董憲遂拔蘭陵殺賁休延等往來要擊憲別將於彭城郯邳之閒戰或日數合頗有剋獲帝以延輕敵深入數以書誡之及龐萌反攻殺楚郡太守引軍襲敗延延走北度泗水破舟檝壞津梁僅而得免帝自將而東徵延與大司馬吳漢漢忠將軍王常前將軍王梁捕虜將軍馬武討虜將軍王霸等會任城討龐萌於桃鄉又並從征董憲於昌慮皆破平之六年春遣屯長安九年隗囂死延西擊街泉略陽清水諸屯聚皆定十一年與中郎將來歙攻河池未剋以病引還拜為左馮翊將軍如故十三年增封定食萬戶十五年薨於位子扶嗣扶卒子側嗣永平十三年坐與舅王平謀反伏誅國除永初七年鄧太后紹封延曾孫恢為蘆亭侯恢卒子遂嗣陳俊字子昭南陽西鄂人也少為郡吏更始立以宗室劉嘉為太常將軍俊為長史光武徇河北嘉遣書薦俊光武以為安集掾從擊銅馬於清陽進至滿蒲陽拜彊弩將軍與五校戰於安次俊下馬手接短兵所向必破追奔二十餘里斬其渠帥而還光武望而歎曰戰將盡如是豈有憂哉五校引退入漁陽所過虜掠俊言於光武曰宜令輕騎出賊前使百姓各自堅壁以絕其食可不戰而殄也光武然之遣俊將輕騎馳出賊前視人保壁堅完者勑令固守放散在野者因掠取之賊至無所得遂散敗及軍還光武謂俊曰困此虜者將軍策也及即位封俊為列侯建武二年春攻匡賊下四縣更封新處侯引擊頓丘降三城其秋大司馬吳漢承制拜俊為彊弩大將軍別擊金門白馬賊於河內皆破之四年轉徇汝陽及項又拔南武陽是時太山豪傑多擁衆與張步連兵吳漢言於帝曰非陳俊莫能定此郡於是拜俊太山太守行大將軍事張步聞之遣其將擊俊戰於嬴下俊大破之追至濟南收得印綬九十餘稍攻下諸縣遂定太山五年與建威大將軍耿弇共破張步事在弇傳時琅邪未平乃徙俊為琅邪太守領將軍如故齊地素聞俊名入界盜賊皆解散俊將兵擊董憲於贛榆進破朐賊孫陽平之八年張步畔還琅邪俊追討斬之帝美其功詔俊得專征青徐俊撫貧弱表有義檢制軍吏不得與郡縣相干百姓歌之數上書自請願奮擊隴蜀詔報曰東州新平大將軍之功也負海猾夏盜賊之處國家以為重憂且勉鎮撫之十三年增邑定封祝阿侯明年徵奉朝請二十三年卒子浮嗣徙封蘄春侯浮卒子專諸嗣專諸卒子篤嗣臧宮字君翁潁川郟人也少為縣亭長游徼後率賓客入下江兵中為校尉因從光武征戰諸將多稱其勇光武察宮勤力少言甚親納之及至河北以為偏將軍從破羣賊數陷陳卻敵光武即位以為侍中騎都尉建武二年封成安侯明年將突騎與征虜將軍祭遵擊更始將左防韋顏於沮涅陽酈悉降之五年將兵徇江夏擊代鄉鐘武竹里皆下之帝使太中大夫持節拜宮為輔威將軍七年更封期思侯擊梁郡濟陰皆平之十一年將兵至中盧屯駱越是時公孫述將田戎任滿與征南大將軍岑彭相拒於荊門彭等戰數不利越人謀畔從蜀宮兵少力不能制會屬縣送委輸車數百乘至宮夜使鋸斷城門限令車聲回轉出入至旦越人候伺者聞車聲不絕而門限斷相告以漢兵大至其渠帥乃奉牛酒以勞軍營宮陳兵大會擊牛釃酒饗賜慰納之越人由是遂安宮與岑彭等破荊門別至垂鵲山通道出秭歸至江州岑彭下巴郡使宮將降卒五萬從涪水上平曲公孫述將延岑盛兵於沅沈水時宮衆多食少轉輸不至而降者皆欲散畔郡邑復更保聚觀望成敗宮欲引還恐為所反會帝遣謁者將兵詣岑彭有馬七百匹宮矯制取以自益晨夜進兵多張旗幟登山鼓噪右步左騎挾船而引呼聲動山谷岑不意漢軍卒至登山望之大震恐宮因從擊大破之斬首溺死者萬餘人水為之濁流延岑奔成都其衆悉降盡獲其兵馬珍寶自是乘勝追北降者以十萬數軍至平陽鄉蜀將王元舉衆降進拔緜竹破涪城斬公孫述弟恢復攻拔繁郫前後收得節五印綬千八百是時大司馬吳漢亦乘勝進營逼成都宮連屠大城兵馬旌旗甚盛乃乘兵入小雒郭門歷成都城下至吳漢營飲酒高會漢見之甚歡謂宮曰將軍向者經虜城下震揚威靈風行電照然窮寇難量還營願從它道矣宮不從復路而歸賊亦不敢近之進軍咸門與吳漢並滅公孫述帝以蜀地新定拜宮為廣漢太守十三年增邑更封酇侯十五年徵還京師以列侯奉朝請定封朗陵侯十八年拜太中大夫十九年妖巫維汜弟子單臣傅鎮等復妖言相聚入原武城劫吏人自稱將軍於是遣宮將北軍及黎陽營數千人圍之賊穀食多數攻不下士卒死傷帝召公卿諸侯王問方略皆曰宜重其購賞時顯宗為東海王獨對曰妖巫相劫埶無久立其中必有悔欲亡者但外圍急不得走耳宜小挺緩令得逃亡逃亡則一亭長足以禽矣帝然之即勑宮徹圍緩賊賊衆分散遂斬臣鎮等宮還遷城門校尉復轉左中郎將擊武谿賊至江陵降之宮以謹信質樸故常見任用後匈奴飢疫自相分爭帝以問宮宮曰願得五千騎以立功帝笑曰常勝之家難與慮敵吾方自思之二十七人宮乃與楊虛侯馬武上書曰匈奴貪利無有禮信窮則稽首安則侵盜緣邊被其毒痛中國憂其抵突虜今人畜疫死旱蝗赤地疫困之力不當中國一郡萬里死命縣在陛下福不再來時或易失豈宜固守文德而墮武事乎今命將臨塞厚縣購賞喻告高句驪烏桓鮮卑攻其左發河西四郡天水隴西羌胡擊其右如此北虜之滅不過數年臣恐陛下仁恩不忍謀臣狐疑令萬世刻石之功不立於聖世詔報曰黃石公記曰柔能制剛弱能制彊柔者德也剛者賊也弱者仁之助也彊者怨之歸也故曰有德之君以所樂樂人無德之君以所樂樂身樂人者其樂長樂身者不久而亡舍近謀遠者勞而無功舍遠謀近者逸而有終逸政多忠臣勞政多亂人故曰務廣地者荒務廣德者彊有其有者安貪人有者殘殘滅之政雖成必敗今國無善政災變不息百姓驚惶人不自保而復欲遠事邊外乎孔子曰吾恐季孫之憂不在顓臾且北狄尚彊而屯田警備傳聞之事恆多失實誠能舉天下之半以滅大寇豈非至願苟非其時不如息人自是諸將莫敢言兵事者宮永平元年卒謚曰愍侯子信嗣信卒子震嗣震卒子松嗣元初四年與母別居國除永寧元年鄧太后紹封松弟由為朗陵侯論曰中興之業誠艱難也然敵無秦項之彊人資附漢之思雖懷璽紆紱跨陵州縣殊名詭號千隊為羣尚未足以為比功上烈也至於山西既定威臨天下戎羯喪其精膽羣帥賈其餘壯斯誠雄心尚武之幾先志翫兵之日臧宮馬武之徒撫嗚劒而扺掌志馳於伊吾之北矣光武審黃石存包桑閉玉門以謝西域之質卑詞幣以禮匈奴之使其意防蓋已弘深豈其顛沛平城之圍忍傷黥王之陳乎贊曰吳公鷙彊實為龍驤電埽羣孽風行巴梁虎牙猛力功立睢陽宮俊休休是亦鷹揚
