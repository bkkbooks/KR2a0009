body:
  text: 後漢書卷六十二荀韓鍾陳列傳第五十二荀淑字季和潁川潁陰人也荀卿十一世孫也少有高行博學而不好章句多為俗儒所非而州里稱其知人安帝時徵拜郎中後再遷當塗長去職還鄉里當世名賢李固李膺等皆師宗之及梁太后臨朝有日食地震之變詔公卿舉賢良方正光祿勳杜喬少府房植舉淑對策譏刺貴倖為大將軍梁冀所忌出補朗陵侯相莅事明理稱為神君頃之𠫓廾官歸閑居養志產業每增輒以贍宗族知友年六十七建和三年卒李膺時為尚書自表師喪二縣皆為立祠有子八人儉緄靖燾汪爽肅專並有名稱時人謂之八龍初荀氏舊里名西豪潁陰令勃海苑康以為昔高陽氏有才子八人今荀氏亦有八子故改其里曰高陽里靖有至行不仕年五十而終號曰玄行先生淑兄子昱字伯條曇字元智昱為沛相曇為廣陵太守兄弟皆正身疾惡志除閹宦其支黨賓客有在二郡者纖罪必誅昱後共大將軍竇武謀誅中官與李膺俱死曇亦禁錮終身爽字慈明一名諝幼而好學年十二能通春秋論語太尉杜喬見而稱之曰可為人師爽遂耽思經書慶弔不行徵命不應潁川為之語曰荀氏八龍慈明無雙延熹九年太常趙典舉爽至孝拜郎中對策陳便宜曰臣聞之於師曰漢為火德火生於木木盛於火故其德為孝其象在周易之離夫在地為火在天為日在天者用其精在地者用其形夏則火王其精在天溫暖之氣養生百木是其孝也冬時則廢其形在地酷烈之氣焚燒山林是其不孝也故漢制使天下誦孝經選吏舉孝廉夫喪親自盡孝之終也今之公卿及二千石三年之喪不得即去殆非所以增崇孝道而克稱火德者也往者孝文勞謙行過乎儉故有遺詔以日易月此當時之宜不可貫之萬世古今之制雖有損益而諒闇之禮未嘗改移以示天下莫遺其親今公卿羣寮皆政教所瞻而父母之喪不得奔赴夫仁義之行自上而始敦厚之俗以應乎下傳曰喪祭之禮闕則人臣之恩薄背死忘生者衆矣曾子曰人未有自致者必也親喪乎春秋傳曰上之所為民之歸也夫上所不為而民或為之故加刑罰若上之所為民亦為之又何誅焉昔丞相翟方進以自備宰相而不敢踰制至遭母憂三十六日而除夫失禮之源自上而始古者大喪三年不呼其門所以崇國厚俗篤化之道也事失宜正過勿憚改天下通喪可如舊禮禮義禮義備則人知所厝矣夫婦人倫之始王化之端故文王作易上經首乾坤下經首咸恆孔子曰天尊地卑乾坤定矣夫婦之道所謂順也堯典曰釐降二女於媯汭嬪于虞降者下也嬪者婦也言雖帝堯之女下嫁於虞猶屈體降下勤修婦道易曰帝乙歸妹以祉元吉婦人謂嫁曰歸言湯以娶禮歸其妹於諸侯也春秋之義王姬嫁齊使魯主之不以天子之尊加於諸侯也今漢承秦法設尚主之儀以妻制夫以卑臨尊違乾坤之道失陽唱之義孔子曰昔聖人之作易也仰則觀象於天俯則察法於池覩鳥獸之文與地之宜近取諸身遠取諸物以通神明之德以類萬物之情今觀法於天則北極至尊四星妃后察法於地則崐山象夫卑澤象妻覩鳥獸之文鳥則雄者鳴鴝雌能順服獸則牡為唱導牝乃相從近取諸身則乾為人首坤為人腹遠取諸物則木實屬天根荄屬地陽尊陰卑蓋乃天性且詩初篇實首關雎禮始冠婚先正夫婦天地六經其旨一揆宜改尚主之制以稱乾坤之性遵法堯湯式是周孔合之天地而不謬質之鬼神而不疑人事如此則嘉瑞降天吉符出地五韙咸備各以其矣枉欲從禮者則福歸之順情廢禮者則禍歸之推禍福之所應知興廢之所由來也衆禮之中婚禮為首故天子娶十二天之數也諸侯以下各有等差事之降也陽性純而能施陰體順而能化以禮濟樂節宣其氣故能豐子孫之祥致老壽之福及三代之季淫而無節瑤臺傾宮陳妾數百陽竭於上陰隔於下故周公之戒曰不知稼穡之艱難不聞小人之勞惟耽樂之從時亦罔或克壽是其明戒後世之人好福不務其本惡禍不易其軌傳曰趾適履孰云其愚何與斯人追欲喪軀誠可痛也臣竊聞後宮采女五六千人從官侍使復在其外冬夏衣服朝夕稟糧耗費縑帛空竭府藏徵調增倍十而稅一空賦不辜之民以供無用之女百姓窮困於外陰陽隔塞于內故感動和氣災異屢臻臣愚以為諸非禮聘未曾幸御者一皆遣出使成妃合一曰通怨曠和陰陽二曰省財用實府藏三曰脩禮制綏眉壽四曰配陽施祈螽斯五曰寬役賦安黎民此誠國家之弘利天人之大福也為其節也易曰天地節而四時成春秋傳曰唯器與名不可以假人孝經曰安上治民莫善於禮禮者尊卑之差上下之制也昔季氏八佾舞於庭非有傷害困於人物而孔子猶曰是可忍也孰不可忍洪範曰惟辟作威惟辟作福惟辟玉食凡此三者君所獨行而臣不得同也今臣僭君服下食上珍所謂害于而家凶於而國者也宜略依古禮尊卑之差及董仲舒制度之別嚴篤督有司必行其命此則禁亂善俗足用之要奏聞即𠫓廾官去後遭黨錮隱於海上又南遁漢濱積十餘年以著述為事遂稱為碩儒黨禁解五府並辟司空袁逢舉有道不應及逢卒爽制服三年當世往往化以為俗時人多不行妻服雖在親憂猶有弔問喪疾者又私謚其君父及諸名士爽皆引據大義正之經典雖不悉變亦頗有改後公車徵為大將軍何進從事中郎進恐其不至迎薦為侍中及進敗而詔命中絕獻帝即立董卓輔政復徵之爽欲遁命吏持之急不得去因復就拜平原相行至宛陵復追為光祿勳視事三日進拜司空爽自被徵命及登台司九十五日因從遷都長安爽見董卓忍暴滋甚必危社稷其所辟舉皆取才略之士將共圖之亦與司徒王允及卓長史何顒等為內謀會病薨年六十三著禮易傳詩傳尚書正經春秋條例又集漢事成敗可為鑒戒者謂之漢語又作公羊問及辯讖并它所論題為新書凡百餘篇今多所亡缺兄子悅彧並知名彧自有傳論曰荀爽鄭玄申屠蟠俱以儒行為處士累徵並謝病不詣及董卓當朝復備禮召之蟠玄竟不屈以全其高爽已黃髮矣獨至焉未十旬而取卿相意者疑其乖趣舍余竊商其情以為出處君子之大致也平運則弘道以求志陵夷則濡跡以匡時荀公之急急自勵其濡跡乎不然何為違貞吉而履虎尾焉觀其遜言遷都之議以救楊黃之禍及後潛圖董氏幾振國命所謂大直若屈道固逶迤也悅字仲豫儉之子也儉早卒悅年十二能說春秋家貧無書每之人閒所見篇牘一覽多能誦記性沈靜美姿容尤好著述靈帝時閹官用權士多退身窮處悅乃託疾隱居時人莫之識雖從弟彧特稱敬焉初辟鎮東將軍曹操府遷黃門侍郎獻帝頗好文學悅與彧及少府孔融侍講禁中旦夕談論累遷祕書監侍中時政移曹氏天子恭己而已悅志在獻替而謀無所用乃作申鑒五篇其所論辯通見政體既成而奏之其大略曰夫道之本仁義而已矣五典以經之群籍以緯之詠之歌之弦之舞之前監既明後復申之故古之聖王其於仁義也申重而已則政末由行矣夫俗亂則道荒雖天地不得保其性矣法壞則世傾雖人主不得守其度矣軌越則禮亡雖聖人不得全其道矣制敗則欲肆雖四表不得充其求矣是謂四患賞罰以統其法是謂五政人不畏死不可懼以罪人不樂生不可勸以善雖使契布五教臯陶作士政不行焉故在上者先豐人財以定其志帝耕籍田后桑蠶宮國無遊人野無荒業財不賈用力不妄加以周人事是謂養生好醜焉善惡要乎功罪毀譽効於準驗聽言責事舉名察實無惑詐偽以蕩衆心故事無不覈物無不切善無不顯惡無不章俗無姦怪民無淫風百姓上下覩利害之存乎己也故肅恭其心慎修其行內不回惑外無異望則民志平矣是謂正俗君子以情用小人以刑用榮辱者賞罰之精華也故禮教榮辱以加君子化其情也桎梏鞭撲以加小人化其刑也君子不犯辱況於刑乎小人不忌刑況於辱乎若教化之廢推中人而墜於小人之域教化之行引中人而納於君子之塗是謂章化小人之情緩則驕驕則恣恣則怨怨則叛危則謀亂安則思欲非威強無以懲之故在上者必有武備以戒不虞以遏寇虐安居則寄之內政有事則用之軍旅是謂秉威徒愛其財也賞妄行則善不勸矣不妄罰非矜其人也罰妄行則惡不懲矣賞不勸謂之止善罰不懲謂之縱惡在上者能不止下為善不縱下為惡則國法立矣是謂統法施之無事事之使自交之不肅而成不嚴而化垂拱揖讓而海內平矣是謂為政之方禮以陰乘陽違天以婦陵夫違人違天不祥違人不義又古者天子諸侯有事必告于廟朝有二史左史記言右史書事事為春秋言為尚書君舉必記善惡成敗無不存焉下及士庶苟有茂異咸在載籍或欲顯而不得或欲隱而名章得失一朝而榮辱千載善人勸焉淫人懼焉宜於今者備置史官掌其典文紀其行事每於歲盡舉之尚書以助賞罰以弘法教帝好典籍常以班固漢書文繁難省乃令悅依左氏傳體以為漢紀三十篇詔尚書給筆札辭約事詳論辨多美其序之曰昔在上聖惟建皇極經緯天地觀象立法乃作書契以通宇宙揚于王庭厥用大焉先王光演大業肆于時夏亦惟厥後永世作典夫立典有五志焉一曰達道義二曰章法式三曰通古今四曰著功勳五曰表賢能於是天人之際事物之宜粲然顯著罔不備矣世濟其軌不隕其業損益盈虛與時消息臧否不同其揆一也漢四百有六載撥亂反正統武興文永惟祖宗之洪業思光啟乎萬嗣聖上穆然惟文之恤瞻前顧後是紹是繼闡崇大猷命立國典於是綴舊書以述漢紀中興以前明主賢臣得失之軌亦足以觀矣又著崇德正論及諸論數十篇年六十二建安十四年卒韓韶字仲黃潁川舞陽人也少仕郡辟司徒府時太山賊公孫舉偽號歷年守令不能破散多為坐法尚書選三府掾能理劇者乃以韶為贏長賊聞其賢相戒不入贏境餘縣多被寇盜廢耕桑其流入縣界求索衣糧者甚衆韶愍其飢困乃開倉賑之所稟贍萬餘戶主者爭謂不可韶曰長活溝壑之人而以此伏罪含笑入地矣太守素知韶名德竟無所坐以病卒官同郡李膺陳寔杜密荀淑等為立碑頌焉子融字元長少能辯理而不為章句學聲名甚盛五府並辟獻帝初至太僕年七十卒鍾皓字季明潁川長社人也為郡著姓世善刑律皓少以篤行稱公府連辟為二兄未仕避隱密山以詩律教授門徒千餘人同郡陳寔年不及皓皓引與為友皓為郡功曹會辟司徒府臨辭太守問誰可代卿者皓曰明府欲必得其人西門亭長陳寔可寔聞之曰鍾君似不察人不知何獨識我皓頃之自劾去前後九辟公府徵為廷尉正博士林慮長皆不就時皓及荀淑並為士大夫所歸慕李膺常歎曰荀君清識難尚鍾君至德可師皓兄子瑾母膺之姑也瑾好學慕古有退讓風與膺同年俱有聲名膺祖太尉脩常言瑾似我家性邦有道不廢邦無道免於刑戮復以膺妹妻之瑾辟州府未嘗屈志膺謂之曰孟子以為人無是非之心非人也弟何期不與孟軻同邪瑾常以膺言白皓皓曰昔國武子好昭人過以致怨本卒保身全家爾道為貴其體訓所安多此類也年六十九終於家諸儒頌之曰林慮懿德非禮不處悅此詩書弦琴樂古五就州招九應台輔逡巡王命卒歲容與皓孫繇建安中為司隸校尉陳寔字仲弓潁川許人也出於單微自為兒童雖在戲弄為等類所歸少作縣吏常給事廝役後為都亭刺佐而有志好學坐立誦讀縣令鄧邵試與語奇之聽受業太學後令復召為吏乃避隱陽城山中時有殺人者同縣楊吏以疑寔縣遂逮繫考掠無實而後得出及為督郵乃密託許令禮召楊吏遠近聞者咸歎服之家貧復為郡西門亭長尋轉功曹時中常侍侯覽託太守高倫用吏倫教署為文學掾寔知非其人懷檄請見言曰此人不宜用而侯常侍不可違寔乞從外署不足以塵明德倫從之於是鄉論怪其非舉寔終無所言倫後被徵為尚書郡中士大夫送至輪氏傳舍倫謂衆人言曰吾前為侯常侍用吏陳君密持教還而於外白署比聞議者以此少之此咎由故人畏憚強禦陳君可謂善則稱君過則稱己者也寔固自引愆聞者方歎息由是天下服其德司空黃瓊辟選理劇補聞喜長旬月以朞喪去官復再遷除太丘長修德清靜百姓以安鄰縣人戶歸附者寔輒訓導譬解發遣各令還本司官行部吏慮有訟者白欲禁之寔曰訟以求直禁之理將何申其勿有所拘司官聞而歎息曰陳君所言若是豈有怨於人乎亦竟無訟者以沛相賦斂違法及解印綬去吏人追思之及後逮捕黨人事亦連寔餘人多逃避求免寔曰吾不就獄衆無所恃乃請囚焉遇赦得出靈帝初大將軍竇武辟以為掾屬時中常侍張讓權傾天下讓父死歸葬潁川雖一郡畢至而名士無往者讓甚恥之寔乃獨弔焉乃後復誅黨人讓感寔故多所全宥寔在鄉閭平心率物其有爭訟輒求判正曉譬曲直退無怨者至乃歎曰寧為刑罰所加不為陳君所短時歲荒民儉有盜夜入其室止於梁上寔陰見乃起自整拂呼命子孫正色訓之曰夫人不可不自勉不善之人未必本惡習以性成遂至於此梁上君子者是矣盜大驚自投於地稽顙歸罪寔徐譬之曰視君狀貌不似惡人宜深剋己反善然此當由貧困令遺絹二匹自是一縣無復盜竊太尉楊賜司徒陳耽每拜公卿羣僚畢賀賜等常歎寔大位未登愧於先之及黨禁始解大將軍何進司徒袁隗遣人敦寔欲特表以不次之位寔乃謝使者曰寔久絕人事飾巾待終而已時三公每缺議者歸之累見徵命遂不起閉門懸車棲養老中平四年年八十四卒于家何進遣使弔祭海內赴者三萬餘人制衰麻者以百數共刊石立碑謚為文範先生有六子紀諶最賢紀字元方亦以至德稱兄弟孝養閨門廱和後進之士皆推慕其風及遭黨錮發憤著書數萬言號曰陳子黨禁解四府並命無所屈就遭父憂每哀至輒歐血絕氣雖衰服已除而積毀消瘠殆將滅性豫州刺史嘉其至行表上尚書圖象百城以厲風俗董卓入洛陽乃使就家拜五官中郎將不得已到京師遷侍中出為平原相往謁卓時欲徙都長安乃謂紀曰三輔平敞四面險固土地肥美號為陸海今關東兵起恐洛陽不可久居長安猶有宮室今欲西遷何如紀曰天下有道守在四夷宜脩德政以懷不附遷移至尊誠計之末者愚以公宜事委公卿專精外任其有違命則威之以武今關東兵起民不堪命若謙遠朝政率師討伐則塗炭之民庶幾可全若欲徙萬乘以自安將有累卵之危崢嶸之險也卓意甚忤而敬紀名行無所復言時議欲以為司徒紀見禍亂方作不復辨嚴即時之郡璽書追拜太僕又徵為尚書令建安初袁紹為太尉讓於紀紀不受拜大鴻臚年七十一卒於官子羣為魏司空天下以為公慙卿卿慙長弟諶字季方與紀齊德同行父子並著高名時號三君每宰府辟召常同時旌命羔鴈成羣當世者靡不榮之諶早終論曰漢自中世以下閹豎恣故俗遂以遁身矯絜放言為高士有不談此者則芸夫牧豎已叫呼之矣故時政彌惛而其風愈往唯陳先生進退之節必可度也據於德故物不犯安於仁故不離羣行成乎身而道訓天下故凶邪不能以權奪王公不能以貴驕所以聲教廢於上而風俗清乎下也贊曰二李師淑陳君友皓韓韶就吏贏寇懷道太丘奧廣模我彝倫曾是淵軌薄夫以淳慶基既啟有蔚潁濱二方承則八慈繼塵
