body:
  text: 後漢書卷六十上馬融列傳第五十上馬融字季長扶風茂陵人也將作大匠嚴之子為人美辭貌有俊才初京兆摯恂以儒術教授隱于南山不應徵聘名重關西融從其遊學博通經籍恂奇融才以女妻之永初二年大將軍鄧騭聞融名召為舍人非其好也遂不應命客於涼州武都漢陽界中會羌虜起邊方擾亂米穀踴貴自關以西道殣相望融既飢困乃悔而歎息謂其友人曰古人有言左手據天下之圖右手刎其喉愚夫不為所以然者生貴於天下也今以曲俗咫尺之羞滅無貲之軀殆非老莊所謂也故往應騭召四年拜為校書郎中詣東觀典校秘書是時鄧太后臨朝騭兄弟輔政而俗儒世士以為文德可興武功宜廢遂寢蒐狩之禮息戰陳之法故猾賊從橫乘此無備融乃感激以為文武之道聖賢不墜五才之用無或可廢元初二年上廣成頌以諷諫其辭曰人並刺國君諷以太康馳驅之節夫樂而不荒憂而不困先王所以平和府藏頤養精神致之無疆故戛擊鳴球載於虞謨吉日車攻序於周詩聖主賢君以增盛美豈徒為奢淫而已哉伏見元年已來遭值戹運陛下戒懼災異躬自菲薄荒𠫓廾禁苑廢薥樂懸勤憂潛思十有餘年以過禮數重以皇太后體唐堯親九族篤睦之德陛下履有虞烝烝之孝外舍諸家每有憂疾聖恩普勞遣使交錯稀有曠絕時時寧息又無以自娛樂殆非所以逢迎太和裨助萬福也臣愚以為雖尚頗有蝗蟲今年五月以來雨露時澍祥應將至方涉冬節農事閒𨻶宜幸廣成覽原隰觀宿麥勸收藏因講武校獵使寮庶百姓復覩羽旄之美聞鍾鼓之音歡嬉喜樂鼓舞疆畔以迎和氣招致休慶小臣螻蟻不勝區區職在書籍謹依舊文重述蒐狩之義作頌一篇并封上淺陋鄙薄不足觀省金革之作昏明也自黃炎之前傳道罔記三五以來越可略聞且區區之酆郊猶廓七十里之囿盛春秋之苗詩詠囿圃草樂奏騶虞是以大漢之初基也宅茲天邑總風雨之會交陰陽之和揆厥靈囿營于南郊徒觀其坰場區宇恢胎曠蕩敻勿罔寥豁鬱泱騁望千里天與地莽於是周阹環瀆右矕三塗左概嵩嶽面據衡陰箕背王屋浸以波溠夤以滎洛金山石林殷起乎其中峨峨磑磑鏘鏘瞴隆穹槃回嵎峗錯崔神泉側出丹水涅池怪石浮磬燿焜于其陂其土毛則搉牧薦草芳茹甘荼茈萁芸蒩昌本深蒱芝荋菫荁蘘荷芋渠桂荏鳧葵格韮菹于其植物則玄林包竹藩陵蔽京珍林嘉樹建木叢生椿梧栝柏柜柳楓楊豐彤對蔚崟槮爽翕習春風含津吐榮鋪于布蓶扈蘳熒惡可殫形揫斂九藪之動物繯橐四野之飛征鳩之乎茲囿之中山敦雲移羣鳴膠膠鄙騃譟讙子野聽聳離朱目眩隸首策亂陳子籌昏於時營圍恢廓充斥川谷罦罝羅羉彌綸阬澤皐牢陵山校隊案部前後有屯甲乙相伍戊己為堅脩橦曳長庚之飛髾載日月之太常棲招搖與玄弋注枉矢於天狼羽毛紛其髟鼬揚金而扡玉瓖屯田車於平原播同徒於高岡旃旝摻其如林錯五色以摛光清氛埃埽野場誓六師搜儁良司徒勒卒司馬平行車攻馬同教達戒通伐咎鼓撞華鍾獵徒縱赴榛叢徽嫿霍奕別騖分奔騷擾聿皇往來交舛紛紛回回南北東西風行雲轉匈隱訇黃塵勃滃闇若霧昏日月為之籠光列宿為之翳昧僄狡課才勁勇程氣狗馬角逐鷹競鷙驍騎旁佐輕車橫厲相與陸梁聿皇于中原絹猑蹏鏦特肩脰完羝撝介鮮散毛族梏羽羣然後飛鋋電激流矢雨墜各指所質不期俱殪竄伏扔輪發作梧轊祋殳狂擊頭陷顱碎獸不得猭禽不得瞥或夷由未殊顛狽頓躓蝡蝡蟫蟫充衢塞隧葩華布不可勝計叔晉婦之徒睽孤刲刺裸裎袒裼冒柘槎棘枳窮浚谷底幽嶰暴斥虎搏狂兕獄熊抾封狶或輕訬趬悍廋疏嶁領犯歷嵩巒陵喬松履脩樠踔攳枝杪標端尾蒼蜼掎玄猨木產盡寓屬單罕罔合部弋同曲類行並驅星布麗屬曹伍相保各有分局矰碆飛流纖羅絡縸遊雉羣驚晨鳧輩作翬然雲起霅爾雹落潢導鬼區徑神場詔靈保召方相驅厲疫走蜮祥捎罔兩拂游光枷天狗緤墳羊然後緩節舒容裴回安步降集波川衡澤虞矢魚陳罟茲飛宿沙田開古蠱翬終葵揚關斧刊重冰撥蟄戶測潛鱗踵介旅逆獵湍瀨渀薄汾橈淪滅潭淵左挈夔龍右提蛟鼉春獻王鮪夏薦鼈黿於是流覽徧照殫變極態上下究竟山谷蕭條原野嵺愀上無飛鳥下無走獸虞人植旍獵者効具車弊田罷旋入禁囿棲乎昭明之觀休息乎高光之榭以臨乎宏池鎮以瑤臺純以金堤樹以蒱柳被以綠莎瀇瀁沆漭錯紾槃委天地虹洞固無端涯大明生東月朔西陂乃命壺涿驅水蠱逐罔螭滅短狐簎鯨鯢然後方餘皇連舼舟張雲帆施蜺幬靡颸風陵迅流發櫂歌縱水謳淫魚出蓍蔡浮湘靈下漢女游水禽鴻鵠鴛鴦鷗鷖鶬鴰鸕鷁鷺鴈鷿乃安斯寢戢翮其涯魴鱮鱏鯿鰋鯉鱨魦樂我純德騰踊相隨雖靈沼之白鳥孟津之躍魚方斯蔑矣然猶詠歌於伶蕭載陳於方策豈不哀哉師疊伍伯校千重山罍常滿房俎無空酒正案隊膳夫巡行清醪車湊燔炙騎將鼓駭舉爵鍾鳴既觴若乃陽阿衰斐之晉制闡鼃華羽之南音所以洞蕩匈臆發明耳目疏越蘊慉駭恫底伏鍠鍠鎗鎗奏于農郊大路之衢與百姓樂之是以明德曜乎中夏威靈暢乎四荒東鄰浮巨海而入享西旅越葱領而來王南徼因九譯而致貢朔狄屬象胥而來同蓋安不忘危治不忘亂道在乎茲斯固帝王之所以曜神武而折遐衝者也不覩日月之光聾昏不聞雷霆之震于今十二年為日久矣亦方將刊禁臺之秘藏發天府之官常由質要之故業率典刑之舊章采清原嘉岐陽登俊桀命賢良舉淹滯拔幽荒察淫侈之華譽顧介特之實功聘畎畝之羣雅宗重淵之潛龍乃儲精山藪歷思河澤目鼎俎耳聽康衢營傅說於胥靡求伊尹於庖廚索膠鬲於魚鹽聽宀心戚於大車俾之昌言而宏議軼越三家馳騁五帝悉覽休祥總括羣瑞遂棲鳳皇於高梧宿麒麟於西園納僬僥之珍羽受王母之白環永逍搖乎宇內與二儀乎無疆貳造化於后土參神施於昊乾超特達而無儔煥巍巍而無原豐千億之子孫歷萬載而永延禮樂既闋北轅反斾至自新城背伊闕反洛京頌奏忤鄧氏滯於東觀十年不得調因兄子喪自劾歸太后聞之怒謂融羞薄詔除欲仕州郡遂令禁錮之太后崩安帝親政召還郎署復在講部出為河閒王廏長史時車駕東巡岱宗融上東巡頌帝奇其文召拜郎中及北鄉侯即位融移病去為郡功曹陽嘉二年詔舉敦樸城門校尉岑起舉融徵詣公車對策拜議郎大將軍梁商表為從事中郎轉武都太守時西羌反叛征西將軍馬賢與護羌校尉胡疇征之而稽久不進融知其將敗上疏乞自効曰今雜種諸羌轉相鈔盜宜及其未并亟遣深入破其支黨而馬賢等處處留滯羌胡百里望塵千里聽聲今逃匿避回漏出其後則必侵寇三輔為民大害臣願請賢所不可用關東兵五千裁假部隊之號盡力率厲埋根行首以先吏士三旬之中必克破之臣少習學蓺不更武職猥陳此言必受誣罔之辜昔毛遂廝養為衆所蚩終以一言克定從要臣懼賢等專守一城言攻於西而羌出於東且其將士必有高克潰叛之變朝廷不能用又陳星孛參畢參西方之宿畢為邊兵至於分野并州是也西戎北狄殆將起乎宜備二方尋而隴西羌反烏桓寇上郡皆卒如融言三遷桓帝時為南郡太守先是融有事忤大將軍梁冀旨冀諷有司奏融在郡貪濁免官髡徙朔方自刺不殊得赦還復拜議郎重在東觀著述以病去官融才高博洽為世通儒教養諸生常有千數涿郡盧植北海鄭玄皆其徒也善鼓琴好吹笛達生任性不拘儒者之節居宇器服多存侈飾常坐高堂施絳紗帳前授生徒後列女樂弟子以次相傳鮮有入其室者嘗欲訓左氏春秋及見賈逵鄭衆注乃曰賈君精而不博鄭君博而不精既精既博吾何加焉但著三傳異同說注孝經論語詩易三禮尚書列女傳老子淮南子離騷所著賦頌碑誄書記表奏七言琴歌對策遺令凡二十一篇初融懲於鄧氏不敢復違忤埶家遂為梁冀草奏李固又作大將軍西第頌以此頗為正直所羞年八十八延熹九年卒于家遺令薄葬族孫日磾獻帝時位至太傅論曰馬融辭命鄧氏逡巡隴漢之閒將有意於居貞乎既而羞曲士之節惜不貲之軀終以奢樂恣性黨附成譏固知識能匡欲者鮮矣夫事苦則矜全之情薄生厚故安存之慮深登高不懼者胥靡之人也坐不垂堂者千金之子也原其大略歸於所安而已矣物我異觀亦更相笑也
