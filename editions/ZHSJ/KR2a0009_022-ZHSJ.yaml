body:
  text: 後漢書卷二十銚期王霸祭遵列傳第十祭遵從弟肜銚期字次況潁川郟人也長八尺二寸容貌絕異矜嚴有威父猛為桂陽太守卒期服喪三年鄉里稱之光武略地潁川聞期志義召署賊曹掾從徇薊時王郎檄書到薊薊中起兵應郎光武趨駕出百姓聚觀諠呼滿道遮路不得行期騎馬奮戟瞋目大呼左右曰衆皆披靡及至城門門已閉攻之得出行至信都以期為裨將與傅寬呂晏俱屬鄧禹徇傍縣又發房子兵禹以期為能獨拜偏將軍授兵二千人寬晏各數百人還言其狀光武甚善之使期別徇真定宋子攻拔樂陽肥纍從擊王郎將兒宏劉奉於鉅鹿下期先登陷陳手殺五十餘人被創中額攝幩幘復戰遂大破之王郎滅拜期虎牙大將軍乃因閒說光武曰河北之地界接邊塞人習兵戰號為精勇今更始失政大統危殆海內無所歸往明公據河山之固擁精銳之衆以順萬人思漢之心則天下誰敢不從光武笑曰卿欲遂前邪時銅馬數十萬衆入清陽博平期與諸將迎擊之連戰不利期乃更背水而戰所殺傷甚多會光武救至遂大破之追至館陶皆降之從擊青犢赤眉於射犬賊襲期輜重期還擊之手殺傷數十人身被三創而戰方力遂破走之光武即位封安成侯食邑五千戶時檀鄉五樓賊入繁陽內黃又魏郡大姓數反覆而更始將卓京謀欲相率反鄴城帝以期為魏郡太守行大將軍事期發郡兵擊卓京破之斬首六百餘級京亡入山追斬其將校數十人獲京妻子進擊繁陽內黃復斬數百級郡界清平督盜賊李熊鄴中之豪而熊弟陸謀欲反城迎檀鄉或以告期期不應告者三四期乃召問熊熊叩頭首服願與老母俱就死期曰為吏儻不若為賊樂者可歸與老母往就陸也使吏送出城熊行求得陸將詣鄴城西門陸不勝愧感自殺以謝期期嗟歎以禮葬之而還熊故職於是郡中服其威信建武五年行幸魏郡以期為太中大夫從還洛陽又拜衞尉期重於信義自為將有所降下未嘗虜掠及在朝廷憂國愛主其有不得於心必犯顏諫諍帝嘗輕與期門近出期頓首車前曰臣聞古今之戒變生不意誠不願陛下微行數出帝為之回輿而還十年卒帝親臨襚斂贈以衞尉安成侯印綬謚曰忠侯子丹嗣復封丹弟統為建平侯後徙封丹葛陵侯丹卒子舒嗣舒卒子羽嗣羽卒子蔡嗣王霸字元伯潁川潁陽人也世好文法父為郡決曹掾霸亦少為獄吏常慷慨不樂吏職其父奇之遣西學長安漢兵起光武過潁陽霸率賓客上謁曰將軍興義兵竊不自知量貪慕威德願充行伍光武曰夢想賢士共成功業豈有二哉遂從擊破王尋王邑於昆陽還休鄉里及光武為司隸校尉道過潁陽霸請其父願從父曰吾老矣不任軍旅汝往勉之霸從至洛陽及光武為大司馬以霸為功曹令史從度河北賓客從霸者數十人稍稍引去光武謂霸曰潁川從我者皆逝而子獨留努力疾風知勁草及王郎起光武在薊郎移檄購光武光武令霸至市中募人將以擊郎市人皆大笑舉手邪揄之霸慚懅而還光武即南馳至下曲陽傳聞王郎兵在後從者皆恐及至虖沱河候吏還白河水流澌無船不可濟官屬大懼光武令霸往視之霸恐驚衆欲且前阻水還即詭曰冰堅可度官屬皆喜光武笑曰候吏果妄語也遂前比至河河冰亦合乃令霸護度未畢數騎而冰解光武謂霸曰安吾衆得濟免者卿之力也霸謝曰此明公至德神靈之祐雖武王白魚之應無以加此武光謂官屬曰王霸權以濟事殆天瑞也以為軍正爵關內侯既至信都發兵攻拔邯鄲霸追斬王郎得其璽綬封王鄉侯從平河北常與臧宮傅俊共營霸獨善撫士卒死者脫衣以斂之傷者躬親以養之光武即位以霸曉兵愛士可獨任拜為偏將軍并將臧宮傅俊兵而以宮俊為騎都尉建武二年更封富波侯四年秋帝幸譙使霸與捕虜將軍馬武東討周建於垂惠蘇茂將五校兵四千餘人救建而先遣精騎遮擊馬武軍糧武往救之建從城中出兵夾擊武武恃霸之援戰不甚力為茂建所敗武軍奔過霸營大呼求救霸曰賊兵盛出必兩敗努力而已乃閉營堅壁軍吏皆爭之霸曰茂兵精銳其衆又多吾吏士心恐而捕虜與吾相恃兩軍不一此敗道也今閉營固守示不相援賊必乘勝輕進捕虜無救其戰自倍如此茂衆疲勞吾承其弊乃可剋也茂建果悉出攻武合戰良久霸軍中壯士路潤等數十人斷髮請戰霸知士心銳乃開營後出精騎襲其背茂建前後受敵驚亂敗走霸武各歸營賊復聚衆挑戰霸堅臥不出方饗士作倡樂茂雨射營中中霸前酒樽霸安坐不動軍吏皆曰茂前日已破今易擊也霸曰不然蘇茂客兵遠來糧食不足故數挑戰以儌一切之勝今閉營休士所謂不戰而屈人之兵善之善者也茂建既不得戰乃引還營其夜建兄子誦反閉城拒之茂建遁去誦以城降五年春帝使太中大夫持節拜霸為討虜將軍六年屯田新安八年屯田函谷關擊滎陽中牟盜賊皆平之九年霸與吳漢及橫野大將軍王常建義大將軍朱祐破姦將軍侯進等五萬餘人擊盧芳將賈覽閔堪於高柳匈奴遣騎助芳漢車遇雨戰不利吳漢還洛陽令朱祐屯常山王常屯涿郡侯進屯漁陽璽書拜霸上谷太守領屯兵如故捕擊胡虜無拘郡界明年霸復與吳漢等四將軍六萬人出高柳擊賈覽詔霸與漁陽太守陳訢將兵為諸軍鋒匈奴左南將軍將數千騎救覽霸等連戰於平城下破之追出塞斬首數百級霸及諸將還入鴈門與驃騎大將軍杜茂會攻盧芳將尹由於崞繁畤不剋十三年增邑戶更封向侯是時盧芳與匈奴烏桓連兵寇盜尤數緣邊愁苦詔霸將薥刑徒六千餘人與杜茂治飛狐道堆石布土築起亭障自代至平城三百餘里凡與匈奴烏桓大小數十百戰頗識邊事數上書言宜與匈奴結和親又陳委輸可從溫水漕以省陸轉輸之勞事皆施行後南單于烏桓降服北邊無事霸在上谷二十餘歲三十年定封淮陵侯永平二年以病免後數月卒子符嗣徙封軑侯符卒子度嗣度尚顯宗女浚儀長公主為黃門郎度卒子歆嗣祭遵字弟孫潁川潁陽人也少好經書家富給而遵恭儉惡衣服喪母負土起墳嘗為部吏所侵結客殺之初縣中以其柔也既而皆憚焉及光武破王尋等還過潁陽遵以縣吏數進見光武愛其容儀署為門下史從征河北為軍市令舍中兒犯法遵格殺之光武怒命收遵時主簿陳副諫曰明公常欲衆軍整齊今遵奉法不避是教令所行也光武乃貰之以為刺姦將軍謂諸將曰當備祭遵吾舍中兒犯法尚殺之必不私諸卿也尋拜為偏將軍從平河北以功封列侯建武二年春拜征虜將軍定封潁陽侯與驃騎大將軍景丹建義大將軍朱祐漢忠將軍王常騎都尉王梁臧宮等入箕關南擊弘農厭新柏華蠻中賊弩中遵口洞出流血衆見遵傷稍引退遵呼叱止之士卒戰皆自倍遂大破之時新城蠻中山賊張滿屯結險隘為人害詔遵攻之遵絕其糧道滿數挑戰遵堅壁不出而厭新柏華餘賊復與滿合遂攻得霍陽聚遵乃分兵擊破降之明年春張滿飢困城拔生獲之初滿祭祀天地自云當王既執歎曰讖文誤我乃斬之夷其妻子遵引兵南擊鄧奉弟終於杜衍破之時涿郡太守張豐執使者舉兵反自稱無上大將軍與彭寵連兵四年遵與朱祐及建威大將軍耿弇驍騎將軍劉喜俱擊之遵兵先至急攻豐豐功曹孟執豐降初豐好方術有道士言豐當為天子以五綵囊裹石繫豐肘云石中有玉璽豐信之遂反既執當斬猶曰肘石有玉璽遵為椎破之豐乃知被詐仰天歎曰當死無所恨諸將皆引還遵受詔留屯良鄉拒彭寵因遣護軍傅玄襲擊寵將李豪於潞大破之斬首千餘級相拒歲餘數挫其鋒黨與多降者及寵死遵進定其地六年春詔遵與建威大將軍耿弇虎牙大將軍蓋延漢忠將軍王常捕虜將軍馬武驍騎將軍劉歆武威將軍劉尚等從天水伐公孫述師次長安時車駕亦至而隗囂不欲漢兵上隴辭說解故帝召諸將議皆曰可且延囂日月之期益封其將帥以消散之遵曰囂挾姦久矣今若按甲引時則使其詐謀益深而蜀警增備固不如遂進帝從之乃遣遵為前行隗囂使其將王元拒隴坻遵進擊破之追至新關及諸將到與囂戰並敗引退下隴乃詔遵軍汧耿弇軍漆征西大將軍馮異軍栒邑大司馬吳漢等還屯長安自是後遵數挫隗囂事已見馮異傳八年秋復從車駕上隴及囂破帝東歸過汧幸遵營勞饗士卒作黃門武樂良夜乃罷時遵有疾詔賜重茵覆以御蓋復令進屯隴下及公孫述遣兵救囂吳漢耿弇等悉奔還遵獨留不卻九年春卒於軍遵為人廉約小心克己奉公賞賜輒盡與士卒家無私財身衣韋絝布被夫人裳不加緣帝以是重焉及卒愍悼之尤甚遵喪至河南縣詔遣百官先會喪所車駕素服臨之望哭哀慟還幸城門過其車騎涕泣不能已喪禮成復親祠以太牢如宣帝臨霍光故事詔大長秋謁者河南尹護喪事大司農給費博士范升上疏追稱遵曰臣聞先王崇政尊美屏惡昔高祖大聖深見遠慮班爵割地與下分功著錄勳臣頌其德美生則寵以殊禮奏事不名入門不趨死則疇其爵邑世無絕嗣丹書鐵券傳於無窮斯誠大漢厚下安人長久之德所以累世十餘歷載數百廢而復興絕而復續者也陛下以至德受命先明漢道襃序輔佐封賞功臣同符祖宗征虜將軍潁陽侯遵不幸早薨陛下仁恩為之感傷遠迎河南惻怛之慟形於聖躬喪事用度仰給縣官重賜妻子不可勝數送死有以加生厚亡有以過存矯俗厲化卓如日月古者臣疾君視臣卒君弔德之厚者也陵已來久矣及至陛下復興斯禮羣下感動莫不自勵臣竊見遵修行積善竭忠於國北平漁陽西拒隴蜀先登坻上深取略陽衆兵既退獨守難制御士心不越法度所在吏人不知有軍清名聞於海內廉白著於當世所得賞賜輒盡與吏士身無奇衣家無私財同產兄午以遵無子娶妾送之遵乃使人逆而不受自以身任於國不敢圖生慮繼嗣之計臨死遺誡牛車載喪薄葬洛陽問以家事終無所言任重道遠死而後已遵為將軍取士皆用儒術對酒設樂必雅歌投壺又建為孔子立後奏置五經大夫雖在軍旅不忘俎豆可為謂好禮悅樂守死善道者也禮生有爵死有謚爵以殊尊卑謚以明善惡臣愚以為宜因遵薨論敘衆功詳案謚法以禮成之顯章國家篤古之制為後嗣法帝乃下升章以示公卿至葬車駕復臨贈以將軍侯印綬朱輪容車介士軍陳送葬謚曰成侯既葬車駕復臨其墳存見夫人室家其後會朝帝每歎曰安得憂國奉公之臣如祭征虜者乎遵之見思若此無子國除兄午官至酒泉太守從弟肜肜字次孫早孤以至孝見稱遇天下亂野無煙火而獨在冢側每賊過見其尚幼而有志節皆奇而哀之光武初以遵故拜肜為黃門侍郎常在左右及遵卒無子帝追傷之以肜為偃師長令近遵墳墓四時奉祠之肜有權略視事五歲縣無盜賊課為第一遷襄賁令時天下郡國尚未悉平襄賁盜賊白日公行肜至誅破姦猾殄其支黨數年襄賁政清璽書勉勵增秩一等賜縑百匹當是時匈奴鮮卑及赤山烏桓連和彊盛數入塞殺略吏人朝廷以為憂益增緣邊兵郡有數千人又遣諸將分屯障塞帝以肜為能建武十七年拜遼東太守至則勵兵馬廣斥候肜有勇力能貫三百斤弓虜每犯塞常為士卒前鋒數破走之二十一年秋鮮卑萬餘騎寇遼東肜率數千人迎擊之自被甲陷陳虜大奔投水死者過半遂窮追出塞虜急皆棄兵祼身散走斬首三千餘級獲馬數千匹自是後鮮卑震怖畏肜不敢復闚塞肜以三虜連和卒為邊害二十五年乃使招呼鮮卑示以財利其大都護偏何遣使奉獻願得歸化肜慰納賞賜稍復親附其異種滿離高句驪之屬遂駱驛款塞上貂裘好馬帝輒倍其賞賜其後偏何邑落諸豪並歸義願自効肜曰審欲立功當歸擊匈奴斬送頭首乃信耳偏何等皆仰天指心曰必自効即擊匈奴左伊袟秩訾部斬首二千餘級持頭詣郡其後歲歲相攻輒送首級受賞賜自是匈奴衰弱邊無寇警鮮卑烏桓並入朝貢肜為人質厚重毅體貌絕衆撫夷狄以恩信皆畏而愛之故得其死力初赤山烏桓數犯上谷為邊害詔書設購賞功切責州郡不能禁肜乃率勵偏何遣往討之永平元年偏何擊破赤山斬其魁帥持首詣肜塞外震讋肜之威聲暢於北方西自武威東盡玄菟及樂浪胡夷皆來內附野無風塵乃悉罷緣邊屯兵十二年徵為太僕肜在遼東幾三十年衣無兼副顯宗既嘉其功又美肜清約拜日賜錢百萬馬三匹衣被刀劒下至居室什物大小無不悉備帝每見肜常歎息以為可屬以重任後從東巡狩過魯坐孔子講堂顧指子路室謂左右曰此太僕之室太僕吾之禦侮也十六年使肜以太僕將萬餘騎與南單于左賢王信伐北匈奴期至涿邪山信初有嫌於肜行出高闕塞九百餘里得小山乃妄言以為涿邪山肜到不見虜而還坐逗留畏懦下獄免肜性沈毅內重自恨見詐無功出獄數日歐血死臨終謂其子曰吾蒙國厚恩奉使不稱微績不立身死誠慚恨義不可以無功受賞死後若悉簿上所得賜物身自詣兵屯效死前行以副吾心既卒其子逢上疏具陳遺言帝雅重肜方更任用聞之大驚召問逢疾狀嗟歎者良久焉烏桓鮮卑追思肜無已每朝賀京師常過冢拜謁仰天號泣乃去遼東吏人為立祠四時奉祭焉肜既葬子參遂詣奉車都尉竇固從軍擊車師有功稍遷遼東太守永元中鮮卑入郡界參坐沮敗下獄死肜子孫多為邊吏者皆有名稱論曰祭肜武節剛方動用安重雖條侯穰苴之倫不能過也且臨守偏海政移獷俗徼人請符以立信胡貊數級於郊下至乃臥鼓邊亭滅烽幽障者將三十年古所謂必世而後仁豈不然哉而一眚之故以致感憤惜哉畏法之敝也贊曰期啟燕門霸冰虖河祭遵好禮臨戎雅歌肜抗遼左邊廷懷和
