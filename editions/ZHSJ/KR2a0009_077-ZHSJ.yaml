body:
  text: 後漢書卷七十一皇甫嵩朱儁列傳第六十一皇甫嵩字義真安定朝那人度遼將軍規之兄子也父節鴈門太守嵩少有文武志介好詩書習弓馬初舉孝廉茂才太尉陳蕃大將軍竇武連辟並不到靈帝公車徵為議郎遷北地太守初鉅鹿張角自稱大賢良師奉事黃老道畜養弟子跪拜首過符水呪說以療病病者頗愈百姓信向之角因遣弟子八人使於四方以善道教化天下轉相誑惑十餘年閒衆徒數十萬連結郡國自青徐幽冀荊楊兗豫八州之人莫不畢應遂置三十六方方猶將軍號也大方萬餘人小方六七千各立渠帥訛言蒼天已死黃天當立歲在甲子天下大吉以白土書京城寺門及州郡官府皆作甲子字中平元年大方馬元義等先收荊楊數萬人期會發於鄴元義數往來京師以中常侍封諝徐奉等為內應約以三月五日內外俱起未及作亂而張角弟子濟南唐周上書告之於是車裂元義於洛陽靈帝以周章下三公司隸使鉤盾令周斌將三府掾屬案驗宮省直衛及百姓有事角道者誅殺千餘人推考冀州逐捕角等角等知事已露晨夜馳勑諸方一時俱起皆著黃巾為摽幟時人謂之黃巾亦名為蛾賊殺人以祠天角稱天公將軍角弟寶稱地公將軍寶弟梁稱人公將軍所在燔燒官府劫略聚邑州郡失據長吏多逃亡旬日之閒天下嚮應京師震動詔勑州郡修理攻守簡練器械自函谷大谷廣城伊闕轘轅旋門孟津小平津諸關並置都尉召羣臣會議嵩以為宜解黨禁益出中藏錢西園廄馬以班軍士帝從之於是發天下精兵博選將帥以嵩為左中郎將持節與右中郎將朱儁共發五校三河騎士及募精勇合四萬餘人嵩儁各統一軍共討潁川黃巾儁前與賊波才戰戰敗嵩因進保長社波才引大衆圍城嵩兵少軍人皆恐乃召軍吏謂曰兵有奇變不在衆寡今賊依草結營易為風火若因夜縱燒必大驚亂吾出兵擊之四面俱合田單之功可成也其夕遂大風嵩乃約勑軍士皆束苣乘城使銳士閒出圍外縱火大呼城上舉燎應之嵩因鼓而奔其陳賊驚亂奔走會帝遣騎都尉曹操將兵適至嵩操與朱儁合兵更戰大破之斬首數萬級封嵩都鄉侯嵩儁乘勝進討汝南陳國黃巾追波才於陽翟擊彭脫於西華並破之餘賊降散三郡悉平又進擊東郡黃巾卜己於倉亭生禽卜己斬首七千餘級時北中郎將盧植及東中郎將董卓討張角並無功而還乃詔嵩進兵討之嵩與角弟梁戰於廣宗梁衆精勇嵩不能剋明日乃閉營休士以觀其變知賊意稍懈乃潛夜勒兵雞鳴馳赴其陳戰至晡時大破之斬梁獲首三萬級赴河死者五萬許人焚燒車重三萬餘兩悉虜其婦子繫獲甚衆角先已病死乃剖棺戮屍傳首京師嵩復與鉅鹿太守馮翊郭典攻角弟寶於下曲陽又斬之首獲十餘萬人築京觀於城南即拜嵩為左車騎將車領冀州牧封槐里侯食槐里美陽兩縣合八千戶以黃巾既平故改年為中平嵩奏請冀州一年田租以贍飢民帝從之百姓歌曰天下大亂兮市為墟母不保子兮妻失夫賴得皇甫兮復安居嵩溫卹士卒甚得衆情每軍行頓止須營幔修立然後就舍帳軍士皆食爾己乃嘗飯吏有因事受賂者嵩更以錢物賜之吏懷慙或至自殺嵩既破黃巾威震天下而朝政日亂海內虛困故信都令漢陽閻忠干說嵩曰難得而易失者時也時至不旋踵者幾也故聖人順時以動智者因幾以發今將軍遭難得之運蹈易駭之機而踐運不撫臨機不發將何以保大名乎嵩曰何謂也忠曰天道無親百姓與能今將軍受鉞於暮春收功於末冬兵動若神謀不再計摧強易於折枯消堅甚於湯雪旬月之閒神兵電埽封尸刻石南向以報威德震本朝風聲馳海外雖湯武之舉未有高將軍者也今身建不賞之功體兼高人之德而北面庸主何以求安乎嵩曰夙夜在公心不忘忠何故不安忠曰不然昔韓信不忍一餐之遇而𠫓廾三分之業利劒已揣其喉方發悔毒之歎者機失而謀乖也今主上埶弱於劉項將軍權重於淮陰指撝足以振風雲叱咤可以興雷電赫然奮發因危扺穨崇恩以綏先附振武以臨後服徵冀方之士動七州之衆羽檄先馳於前大軍響振於後蹈流漳河飲馬孟津誅閹官之罪除羣凶之積雖僮兒可使奮拳以致力女子可使褰裳以用命況厲熊羆之卒因迅風之埶哉功業已就天下已順然後請呼上帝示以天命混齊六合南面稱制移寶器於將興推亡漢於已墜實神機之至會風發之良時也夫既朽不雕衰世難佐若欲輔難佐之朝雕朽敗之木是猶逆坂走丸迎風縱棹豈云易哉且今豎宦羣居同惡如市上命不行權歸近習昏主之下難以久居不賞之功讒人側目如不早圖後悔無及嵩懼曰非常之謀不施於有常之埶創圖大功豈庸才所致黃巾細孽敵非秦項新結易散難以濟業且人未忘主天不祐逆若虛造不冀之功以速朝夕之禍孰與委忠本朝守其臣節雖云多讒不過放廢猶有令名死且不朽反常之論所不敢聞忠知計不用因亡去會邊章韓遂作亂隴右明年春詔嵩迴鎮長安以衛園陵章等遂復入寇三輔使嵩因討之初嵩討張角路由鄴見中常侍趙忠舍宅踰制乃奏沒入之又中常侍張讓私求錢五千萬嵩不與二人由此為憾奏嵩連戰無功所費者多其秋徵還收左車騎將軍印綬削戶六千更封都鄉侯二千戶五年梁涼州賊王國圍陳倉復拜嵩為左將軍督前將軍董卓各率二萬人拒之卓欲速進赴陳倉嵩不聽卓曰智者不後時勇者不留決速救則城全不救則城滅全滅之埶在於此也嵩曰不然百戰百勝不如不戰而屈人之兵是以先為不可勝以待敵之可勝不可勝在我可勝在彼彼守不足我攻有餘有餘者動於九天之上不足者陷於九地之下今陳倉雖小城守固備非九地之陷也王國雖強而攻我之所不救非九天之埶也夫埶非九天攻者受害陷非九地守者不拔國今已陷受害之地而陳倉保不拔之城我可不煩兵動衆而取全勝之功將何救焉遂不聽王國圍陳倉自冬迄春八十餘日城堅守固竟不能拔賊衆疲敝果自解去嵩進兵擊之卓曰不可兵法窮寇勿迫追歸衆勿追迫今我追國是迫歸衆追窮寇也困獸猶鬬蜂蠆有毒況大衆乎嵩曰不然前吾不擊避其銳也今而擊之待其衰也所擊疲師非歸衆也國衆且走莫有鬬志以整擊亂非窮寇也遂獨進擊之使卓為後拒連戰大破之斬首萬餘級國走而死卓大慙恨由是忌嵩明年卓拜為并州牧詔使以兵委嵩卓不從嵩從子酈時在軍中說嵩曰本朝失政天下倒懸能安危定傾者唯大人與董卓耳今怨𨻶已結埶不俱存卓被詔委兵而上書自請此逆命也又以京師昏亂躊躇不進此懷姦也且其凶戾無親將士不附大人今為元帥杖國威以討之上顯忠義下除凶害此桓文之事也嵩曰專命雖罪專誅亦有責也不如顯奏其事使朝廷裁之於是上書以聞帝讓卓卓又增怨於嵩及後秉政初平元年乃徵嵩為城門校尉因欲殺之嵩將行長史梁衍說曰漢室微弱閹豎亂朝董卓雖誅之而不能盡忠於國遂復寇掠京邑廢立從意今徵將軍大則危禍小則困辱今卓在洛陽天子來西以將軍之衆精兵三萬迎接至尊奉令討逆發命海內徵兵羣帥袁氏逼其東將軍迫其西此成禽也嵩不從遂就徵有司承旨奏嵩下吏將遂誅之嵩子堅壽與卓素善自長安亡走洛陽歸投於卓卓方置酒歡會堅壽直前質讓責以大義叩頭流涕坐者感動皆離席請之卓乃起牽與共坐使免嵩囚復拜嵩議郎遷御史中丞及卓還長安公卿百官迎謁道次卓風令御史中丞已下皆拜以屈嵩既而扺手言曰義真犕未乎嵩笑而謝之卓乃解釋及卓被誅以嵩為征西將軍又遷車騎將軍其年秋拜太尉冬以流星策免復拜光祿大夫遷太常尋李傕作亂嵩亦病卒贈驃騎將軍印綬拜家一人為郎嵩為人愛慎盡勤前後上表陳諫有補益者五百餘事皆手書毀草不宣於外又折節下士門無留客時人皆稱而附之堅壽亦顯名後為侍中辭不拜病卒朱儁字公偉會稽上虞人也少孤母嘗販繒為業儁以孝養致名為縣門下書佐好義輕財鄉閭敬之時同郡周規辟公府當行假郡庫錢百萬以為冠幘費而後倉卒督責規家貧無以備儁乃竊母繒帛為規解對母既失產業深恚責之儁曰小損當大益初貧後富必然理也本縣長山陽度尚見而奇之薦於太守韋毅稍歷郡職後太守尹端以儁為主簿熹平二年端坐討賊許昭失利為州所奏罪應𠫓廾市儁乃羸服閒行輕齎數百金到京師賂主章吏遂得刊定州奏故端得輸作左校端喜於降免而不知其由儁亦終無所言後太守徐珪舉儁孝廉再遷除蘭陵令政有異能為東海相所表會交阯部羣賊並起牧守輭弱不能禁又交阯賊梁龍等萬餘人與南海太守孔芝反叛攻破郡縣光和元年即拜儁交阯刺史令過本郡簡募家兵及所調合五千人分從兩道而入既到州界按甲不前先遣使詣郡觀賊虛實宣揚威德以震動其心既而與七郡兵俱進逼之遂斬梁龍降者數萬人旬月盡定以功封都亭侯千五百戶賜黃金五十斤徵為諫議大夫及黃巾起公卿多薦儁有才略拜為右中郎將持節與左中郎將皇甫嵩討潁川汝南陳國諸賊悉破平之嵩乃上言其狀而以功歸儁於是進封西鄉侯遷鎮賊中郎將時南陽黃巾張曼成起兵稱神上使衆數萬殺郡守褚貢屯宛下百餘日後太守秦頡擊殺曼成賊更以趙弘為帥衆浸盛遂十餘萬據宛城儁與荊州刺史徐璆及秦頡合兵萬八千人圍弘自六月至八月不拔有司奏欲徵儁司空張溫上疏曰昔秦用白起燕任樂毅皆曠年歷載乃能克敵儁討潁川以有功效引師南指方略已設臨軍易將兵家所忌宜假日月責其成功靈帝乃止儁因急擊弘斬之賊餘帥韓忠復據宛拒儁儁兵少不敵乃張圍結壘起土山以臨城內因鳴鼓攻其西南賊悉衆赴之儁自將精卒五千掩其東北乘城而入忠乃退保小城惶懼乞降司馬張超及徐璆秦頡皆欲聽之儁曰兵有形同而埶異者昔秦項之際民無定主故賞附以勸來耳今海內一統唯黃巾造寇納降無以勸善討之足以懲惡今若受之更開逆意賊利則進戰鈍則乞降縱敵長寇非良計也因急攻連戰不剋儁登土山望之顧謂張超曰吾知之矣賊今外圍周固內營逼急乞降不受欲出不得所以死戰也萬人一心猶不可當況十萬乎其害甚矣不如徹圍并兵入城忠見圍解埶必自出出則意散易破之道也既而解圍忠果出戰儁因擊大破之乘勝逐北數十里斬首萬餘級忠等遂降而秦頡積忿忠遂殺之餘衆懼不自安復以孫夏為帥還屯宛中儁急攻之夏走追至西鄂精山又破之復斬萬餘級賊遂解散明年春遣使者持節拜儁右車騎將軍振旅還京師以為光祿大夫增邑五千更封錢塘侯加位特進以母喪去官起家復為將作大匠轉少府太僕自黃巾賊後復有黑山黃龍白波左校郭大賢于氐根青牛角張白騎劉石左髭丈八平漢大計司隸掾哉雷公浮雲飛燕白雀楊鳳于毒五鹿李大目白繞畦固苦唒之徒並起山谷閒不可勝數其大聲者稱雷公騎白馬者為張白騎輕便者言飛燕多髭者號于氐根大眼者為大目如此稱號各有所因大者二三萬小者六七千賊帥常山人張燕輕勇趫捷故軍中號曰飛燕善得士卒心乃與中山常山趙郡上黨河內諸山谷寇賊更相交通衆至伯百萬號曰黑山賊河北諸郡縣並被其害朝廷不能討燕乃遣使至京師奏書乞降遂拜燕平難中郎將使領河北諸山谷事歲得舉孝廉計吏燕後漸寇河內逼近京師於是出儁為河內太守將家兵擊却之其後諸賊多為袁紹所定事在紹傳復拜儁為光祿大夫轉屯騎尋拜城門校尉河南尹時董卓政以儁宿將外甚親納而心實忌之及關東兵盛卓懼數請公卿會議徙都長安儁輒止之卓雖惡儁異己然貪其名重乃表遷太僕以為己副使者拜儁辭不肯受因曰國家西遷必孤天下之望以成山東之釁臣不見其可也使者詰曰召君受拜而君拒之不問徙事而君陳之其故何也儁曰副相國非臣所堪也遷都計非事所急也辭所不堪言所非急臣之宜也使者曰遷都之事不聞其計就有未露何所承受儁曰相國董卓具為臣說所以知耳使人不能屈由是止不為副卓後入關留儁守洛陽而儁與山東諸將通謀為內應既而懼為卓所襲乃𠫓廾官奔荊州卓以弘農楊懿為河南尹守洛陽儁聞復進兵還洛懿走儁以河南殘破無所資乃東屯中牟移書州郡請師討卓徐州刺史陶謙遣精兵三千餘州郡稍有所給謙乃上儁行車騎將軍董卓聞之使其將李傕郭汜等數萬人屯河南拒儁儁逆擊為傕汜所破儁自知不敵留關下不敢復前及董卓被誅傕汜作亂儁時猶在中牟陶謙以儁名臣數有戰功可委以大事乃與諸豪桀共推儁為太師因移檄牧伯同討李傕等奉迎天子乃奏記於儁曰徐州刺史陶謙前楊州刺史周乾琅邪相陰德東海相劉馗彭城相汲廉北海相孔融沛相袁忠太山太守應劭汝南太守徐璆前九江太守服虔博士鄭玄等敢言之行車騎將軍河南尹莫府國家既遭董卓重以李傕郭汜之禍幼主劫執忠良殘敝長安隔絕不知吉凶是以臨官尹人搢紳有識莫不憂懼以為自非明哲雄霸之士曷能剋濟禍亂自起兵已來于茲三年州郡轉相顧望未有奮擊之功而互爭私變更相疑惑謙等並共諮諏議消國難僉曰將軍君侯既文且武應運而出凡百君子靡不顒顒故相率厲簡選精悍堪能深入直指咸陽多持資糧足支半歲謹同心腹委之元帥會李傕用太尉周忠尚書賈詡策徵儁入朝軍吏皆憚入關欲應陶謙等儁曰以君召臣義不俟駕況天子詔乎且傕汜小豎樊稠庸兒無他遠略又埶力相敵變難必作吾乘其閒大事可濟遂辭謙議而就傕徵復為太僕謙等遂罷初平四年代周忠為太尉錄尚書事明年秋以日食免復行驃騎將軍事持節鎮關東未發會李傕殺樊稠而郭汜又自疑與傕相攻長安中亂故儁止不出留拜大司農獻帝詔儁與太尉楊彪等十餘人譬郭汜令與李傕和汜不肯遂留質儁等儁素剛即日發病卒子晧亦有才行官至豫章太守論曰皇甫嵩朱儁並以上將之略受脤倉卒之時及其功成師剋威聲滿天下值弱主蒙塵獷賊放命斯誠葉公投袂之幾翟義鞠旅之日故梁衍獻規山東連盟而舍格天之大業蹈匹夫之小諒卒狼狽虎口為智士笑豈天之長斯亂也何智勇之不終甚乎前史晉平原華嶠稱其父光祿大夫表每言其祖魏太尉歆稱時人說皇甫嵩之不伐汝豫之戰歸功朱儁張角之捷本之於盧植收名斂策而己不有焉蓋功名者世之所甚重也誠能不爭天下之所甚重則怨禍不深矣如皇甫公之赴履危亂而能終以歸全者其致不亦貴乎故顏子願不伐善為先斯亦行身之要與贊曰黃妖衝發嵩乃奮鉞孰是振旅不居不伐儁捷陳潁亦弭于於越言肅王命並遘屯蹷
