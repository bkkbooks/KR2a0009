body:
  text: 後漢書卷五十三周黃徐姜申屠列傳第四十三易曰君子之道或出或處或默或語孔子稱蘧伯玉邦有道則仕邦無道則可卷而懷也然用舍之端君子之所以存其誠也故其行也則濡足蒙垢出身以効時及其止也則窮棲茹菽臧寶以迷國太原閔仲叔者世稱節士雖周黨之潔清自以弗及也黨見其含菽飲水遺以生蒜受而不食建武中應司徒侯霸之辟既至霸不及政事徒勞苦而已仲叔恨曰始蒙嘉命且喜且懼今見明公喜懼皆去以仲叔為不足問邪不當辟也辟而不問是失人也遂辭出投劾而去復以博士徵不至客居安邑老病家貧不能得肉日買猪肝一片屠者或不肯與安邑令聞勑吏常給焉仲叔怪而問之知乃歎曰閔仲叔豈以口腹累安邑邪遂去客沛以壽終仲叔同郡荀恁字君大少亦脩清節資財千萬父越卒悉散與九族隱居山澤以求厥志王莽末匈奴寇其本縣廣武聞恁名節相約不入荀氏閭光武徵以病不至永平初東平王蒼為驃騎將軍開東閤延賢俊辟而應焉及後朝會顯宗戲之曰先帝徵君不至驃騎辟君而來何也對曰先帝秉德以惠下故臣可得不來驃騎執法以檢下故臣不敢不至後月餘罷歸卒於家桓帝時安陽人魏桓字仲英亦數被徵其鄉人勸之行桓曰夫干祿求進所以行其志也今後宮千數其可損乎廄馬萬匹其可減乎左右悉權豪其可去乎皆對曰不可桓乃慨然歎曰使桓生行死歸於諸子何有哉遂隱身不出若二三子可謂識去就之㮣候時而處夫然豈其枯槁苟而已哉蓋詭時審己以成其道焉余故列其風流區而載之周燮字彥祖汝南安城人法決曹掾燕之後也燮生而欽頤折頞醜狀駭人其母欲𠫓廾之其父不聽曰吾聞賢聖多有異貌興我宗者乃此兒也於是養之始在髫鬌而知廉讓十歲就學能通詩論及長專精禮易不讀非聖之書不脩賀問之好有先人草廬結于罔畔下有陂田常肆勤以自給非身所耕漁則不食也鄉黨宗族希得見者舉孝廉賢良方正特徵皆以疾辭延光二年安帝以玄纁羔幣聘燮及南陽馮良二郡各遣丞掾致禮宗族更勸之曰夫修德立行所以為國自先世以來勳寵相承君獨何為守東岡之陂乎燮曰吾既不能隱處巢穴追綺季之跡而猶顯然不遠父母之國斯固以滑泥揚波同其流矣夫修道者度其時而動動而不時焉得亨乎因自載到潁川陽城遣門生送敬遂辭疾而歸良亦載病到近縣送禮而還詔書告二郡歲以羊酒養病良字君郎出於孤微少作縣吏年三十為尉從佐奉檄迎督郵即路慨然恥在厮役因壞車殺馬毀裂衣冠乃遁至犍為從杜撫學妻子求索蹤迹斷絕後乃見草中有敗車死馬衣裳腐朽謂為虎狼盜賊所害發喪制服積十許年乃還鄉里志行高整非禮不動遇妻子如君臣鄉黨以為儀表燮良年皆七十餘終黃憲字叔度汝南慎陽人也世貧賤父為牛醫潁川荀淑至慎陽遇憲於逆旅時年十四淑竦然異之揖與語移日不能去謂憲曰子吾之師表也既而前至袁閎閬所未及勞問逆曰子國有顏子寧識之乎閎閬曰見吾叔度邪是時同郡戴良才高倨而見憲未嘗不正容及歸罔然若有失也其母問曰汝復從牛醫兒來邪對曰良不見叔度不自以為不及既覩其人則瞻之在前忽焉在後固難得而測矣同郡陳蕃周舉常相謂曰時月之閒不見黃生則鄙吝之萌復存乎心及蕃為三公臨朝歎曰叔度若在吾不敢先佩印綬矣太守王龔在郡禮進賢達多所降致卒不能屈憲郭林宗少游汝南先過袁閎閬不宿而退進往從憲累日方還或以問林宗林宗曰奉高之器譬諸汎氿濫雖清而易挹叔度汪汪若千頃陂澄之不清淆之不濁不可量也憲初舉孝廉又辟公府友人勸其仕憲亦不拒之暫到京師而還竟無所就年四十八終天下號曰徵君論曰黃憲言論風旨無所傳聞然士君子見之者靡不服深遠去玼吝將以道周性全無德而稱乎余曾祖穆侯以為憲隤然其處順淵乎其似道淺深莫臻其分清濁未議其方若及門於孔氏其殆庶乎故嘗著論云徐稺字孺子豫章南昌人也家貧常自耕稼非其力不食恭儉義讓所居服其德屢辟公府不起時陳蕃為太守以禮請署功曹稺不免之既謁而退蕃在郡不接賓客唯稺來特設一榻去則縣之後舉有道家拜太原太守皆不就延熹二年尚書令陳蕃僕射胡廣等上疏薦稺等曰臣聞善人天地之紀政之所由也詩云思皇多士生此王國天挺俊乂為陛下出當輔弼明時左右大業者也伏見處士豫章徐稺彭城姜肱汝南袁閎京兆韋著潁川李曇德行純備著于人聽若使擢登三事協亮天工必能翼宣盛美增光日明矣桓帝乃以安車玄纁備禮徵之並不至帝因問蕃曰徐稺袁閎韋著誰為先後蕃對曰閎出生公族聞道漸訓著長於三輔禮義之俗所謂不扶自直不鏤自雕至於稺者爰自江南卑薄之域而角立傑出宜當為先稺嘗為太尉黃瓊所辟不就及瓊卒歸葬稺乃負糧徒步到江夏赴之設雞酒薄祭哭畢而去不告姓名時會者四方名士郭林宗等數十人聞之疑其稺也乃選能言語生茅容輕騎追之及於塗容為設飯共言稼穡之事臨訣去謂容曰為我謝郭林宗大樹將顛非一繩所維何為栖栖不遑寧處及林宗有母憂稺往弔之置生芻一束於廬前而去衆怪不知其故林宗曰此必南州高士徐孺子也詩不云乎生芻一束其人如玉吾無德以堪之靈帝初欲蒲輪聘稺會卒時年七十二子胤字季登篤行孝悌亦隱居不仕太守華歆禮請相見固病不詣漢末寇賊從橫皆敬胤禮行轉相約勑不犯其閭建安中卒李曇字雲少孤繼母嚴酷曇事之愈謹為鄉里所稱法養親行道終身不仕姜肱字伯淮彭城廣戚人也家世名族肱與二弟仲海季江俱以孝行著聞其友愛天至常共臥起及各娶妻兄弟相戀不能別寑以係嗣當立乃遞往就室肱博通五經兼明星緯士之遠來就學者三千餘人諸公爭加辟命皆不就二弟名聲相次亦不應徵聘時人慕之肱嘗與季江謁郡夜於道遇盜欲殺之肱兄弟更相爭死賊遂兩釋焉但掠奪衣資而已既至郡中見肱無衣服怪問其故肱託以它辭終不言盜盜聞而感悔後乃就精廬求見徵君肱與相見皆叩頭謝罪而還所略物肱不受勞以酒食而遣之後與徐稺俱徵不至桓帝乃下彭城使畫工圖其形狀肱臥於幽闇以被韜面言患眩疾不欲出風工竟不得見之中常侍曹節等專執朝事新誅太傅陳蕃大將軍竇武欲借寵賢德以釋衆望乃白徵肱為太守肱得詔乃私告其友曰吾以虛獲實遂藉聲價明明在上猶當固其本志況今政在閹豎夫何為哉乃隱身遯命遠浮海濱再以玄纁聘不就即拜太中大夫詔書至門肱使家人對云久病就醫遂羸服閒行竄伏青州界中賣卜給食召命得斷家亦不知其處歷年乃還年七十七熹平二年終于家弟子陳留劉操追慕肱德共刊石頌之申屠蟠字子龍陳留外黃人也九歲喪父哀毀過禮服除不進酒肉十餘年每忌日輒三日不食同郡緱氏女玉為父報讎殺夫氏之黨吏執玉以告外黃令梁配配欲論殺玉蟠時年十五為諸生進諫曰玉之節義足以感無恥之孫激忍辱之子不遭明時尚當表旌廬墓況在清聽而不加哀矜配善其言乃為讞得減死論鄉人稱美之家貧傭為漆工郭林宗見而奇之同郡蔡邕深重蟠及被州辟乃辭讓之曰申屠蟠稟氣玄妙性敏心通喪親盡禮幾於毀滅至行美義人所鮮能安貧樂潛味道守真不為燥濕輕重不為窮達易節方之於邕以齒則長以德則賢後郡召為主簿不行遂隱居精學博貫五經兼明圖緯始與濟陰王子居同在太學子居臨歿以身託蟠蟠乃躬推輦車送喪歸鄉里遇司隸從事於河鞏之閒從事義之為封傳護送蟠不肯受投傳於地而去事畢還學太尉黃瓊辟不就及瓊卒歸葬江夏四方名豪會帳下者六七千人互相談論莫有及蟠者唯南郡一生與相酬對既別執蟠手曰君非聘則徵如是相見於上京矣蟠勃然作色曰始吾以子為可與言也何意乃相拘教樂貴之徒邪因振手而去不復與言再舉有道不就先是京師游士汝南范滂等非訐朝政自公卿以下皆折節下之太學生爭慕其風以為文學將興處士復用蟠獨歎曰昔戰國之世處士橫議列國之王至為擁篲先驅卒有阬儒燒書之禍今之謂矣乃絕迹於梁碭之閒因樹為屋自同傭人居二年滂等果罹黨錮或死或刑者數百人蟠確然免於疑論後蟠友人陳郡馮雍坐事繫獄豫州牧黃琬欲殺之或勸蟠救雍蟠不肯行曰黃子琰為吾故邪未必合罪如不用吾言雖往何益琬聞之遂免雍罪大將軍何進連徵不詣進必欲致之使蟠同郡黃忠書勸曰前莫府初開至如先生特加殊禮優而不名申以手筆設几杖之坐經過二載而先生抗志彌高所尚益固竊論先生高節有餘於時則未也今潁川荀爽載病在道北海鄭玄北面受署彼豈樂羈牽哉知時不可逸豫也昔人之隱遭時則放聲滅迹巢棲茹薇其不遇也則裸身大笑被髮狂歌今先生處平壤游人閒吟典籍襲衣裳事異昔人而欲遠蹈其迹不亦難乎孔氏可師何必首陽蟠不荅中平五年復與爽玄及潁川韓融陳紀等十四人並博士徵不至明年董卓廢立蟠及爽融紀等復俱公車徵唯蟠不到衆人咸勸之蟠笑而不應居無幾爽等為卓所脅迫西都長安京師擾亂及大駕西遷公卿多遇兵飢室家流散融等僅以身脫唯蟠處亂末終全高志年七十四終于家贊曰琛寶可懷貞期難對道苟違運理用同廢與其遐棲豈若蒙穢悽悽碩人陵阿窮退韜伏明姿甘是堙曖
