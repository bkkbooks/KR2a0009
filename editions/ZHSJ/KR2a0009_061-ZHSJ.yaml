body:
  text: 後漢書卷五十六張王种陳列傳第四十六張晧字叔明犍為武陽人也六世祖良高帝時為太子少傅封留侯晧少游學京師初永元中歸仕州郡辟大將軍鄧騭府五遷尚書僕射職事八年出為彭城相永寧元年徵拜廷尉晧雖非法家而留心刑斷數與尚書辯正疑獄多以詳當見從時安帝廢皇太子為濟陰王晧與太常桓焉太僕來歷廷爭之不能得事已具來歷傳退而上疏曰昔賊臣江充造構讒逆至令戾園興兵終及禍難後壺關三老一言上乃覺悟雖追前失悔之何逮今皇太子春秋方始十歲未見保傅九德之義宜簡賢輔就成聖質書奏不省及順帝即位拜晧司空在事多所薦達天下稱其推士時清河趙騰上言災變譏刺朝政章下有司收騰繫考所引黨輩八十餘人皆以誹謗當伏重法晧上疏諫曰臣聞堯舜立敢諫之鼓三王樹誹謗之木春秋採善書惡聖主不罪芻蕘騰等雖干上犯法所言本欲盡忠正諫如當誅戮天下杜口塞諫爭之源非所以昭德示後也帝乃悟減騰死罪一等餘皆司寇四年以陰陽不和策免陽嘉元年復為廷尉其年卒官時年八十三遣使者弔祭賜葬地於河南縣子綱綱字文紀少明經學雖為公子而厲布衣之節舉孝廉不就司徒辟高第為侍御史時順帝委縱宦官有識危心綱常感激慨然歎曰穢惡滿朝不能奮身出命埽國家之難雖生吾不願也退而上書曰詩曰不愆不忘率由舊章尋大漢初隆及中興之世文明二帝德化尤盛觀其理為易循易見但恭儉守節約身尚德而已中官常侍不過兩人近倖賞賜裁滿數金惜費重人故家給人足夷狄聞中國優富任信道德所以姦謀自消而和氣感應而頃者以來不遵舊典無功小人皆有官爵富之驕之而復害之非愛人重器承天順道者也伏願陛下少留聖思割損左右以奉天心書奏不省漢安元年選遣八使徇行風俗皆耆儒知名多歷顯位唯綱年少官次最微餘人受命之部而綱獨埋其車輪於洛陽都亭曰豺狼當路安問狐狸遂奏曰大將軍冀河南尹不疑蒙外戚之援荷國厚恩以芻蕘之資居阿衡之任不能敷揚五教翼讚日月而專為封豕長蛇肆其貪叨甘心好貨縱恣無底多樹諂諛以害忠良誠天威所不赦不辟所宜加也謹條其無君之心十五事斯皆臣子所切齒者也書御京師震竦時冀妹為皇后內寵方盛諸梁姻族滿朝帝雖知綱言直終不忍用時廣陵賊張嬰等衆數萬人殺刺史二千石寇亂揚徐閒積十餘年朝廷不能討冀乃諷尚書以綱為廣陵太守因欲以事中之前遣郡守率多求兵馬綱獨請單車之職既到乃將吏卒十餘人徑造嬰壘以慰安之求得與長老相見申示國恩嬰初大驚既見綱誠信乃出拜謁綱延置上坐問所疾苦乃譬之曰前後二千石多肆貪暴故致公等懷憤相聚二千石信有罪矣然為之者又非義也今主上仁聖欲以文德服叛故遣太守思以爵祿相榮不願以刑罰相加今誠轉禍為福之時也若聞義不服天子赫然震怒荊楊兗豫大兵雲合豈不危乎若不料彊弱非明也𠫓廾善取惡非智也去順效逆非忠也身絕血嗣非孝也背正從邪非直也見義不為非勇也六者成敗之幾利害所從公其深計之嬰聞泣下曰荒裔愚人不能自通朝廷不堪侵枉遂復相聚偷生若魚遊釜中喘息須臾閒耳今聞明府之言乃嬰等更生之晨辰也既陷不義實恐投兵之日不免孥戮綱約之以天地誓之以日月嬰深感悟乃辭還營明日將所部萬餘人與妻子面縛歸降綱乃單車入嬰壘大會置酒為樂散遣部衆任從所之親為卜居宅相田疇子弟欲為吏者皆引召之人情悅服南州晏然朝廷論功當封梁冀遏絕乃止天子嘉美徵欲擢用綱而嬰等上書乞留乃許之綱在郡一年年四十六卒百姓老幼相攜詣府赴哀者不可勝數綱自被疾吏人咸為祠祀祈福皆言千秋萬歲何時復見此君張嬰等五百餘人制服行喪送到犍為負土成墳詔曰故廣陵太守張綱大臣之苗剖符統務正身導下班宣德信降集劇賊張嬰萬人息干戈之役濟蒸庶之困未升顯爵不幸早卒嬰等縗杖若喪考妣朕甚愍焉拜綱子續為郎中賜錢百萬王龔字伯宗山陽高平人也世為豪族初舉孝廉稍遷青州刺史劾奏貪濁二千石數人安帝嘉之徵拜尚書建光元年擢為司隸校尉明年遷汝南太守政崇溫和好才愛士引進郡人黃憲陳蕃等憲雖不屈蕃遂就吏蕃性氣高明初到龔不即召見之乃留記謝病去龔怒使除其錄功曹袁閬請見言曰聞之傳曰人臣不見察於君不敢立於朝蕃既以賢見引不宜退以非禮龔改容謝曰是吾過也乃復厚遇待之由是後進知名之士莫不歸心焉閬字奉高數辭公府之命不修異操而致名當時永建元年徵龔為太僕轉太常四年遷司空以地震策免永和元年拜太尉在位恭慎自非公事不通州郡書記其所辟命皆海內長者龔深疾宦官專權志在匡正乃上書極言其狀請加放斥諸黃門恐懼各使賓客誣奏龔罪順帝命亟自實前掾李固時為大將軍梁商從事中郎乃奏記於商曰今旦聞下太尉王公勑令自實未審其事深淺何如王公束脩厲節敦樂蓺文不求苟得不為苟行但以堅貞之操違俗失衆橫為讒佞所構毀衆人聞知莫不歎慄夫三公尊重承天象極未有詣理訴冤之義纖微感㮣輒引分決是以舊典不有大罪不至重問王公沈靜內明不可加以非理卒有它變則朝廷獲害賢之名羣臣無救護之節矣昔絳侯得罪袁盎解其過魏尚獲戾馮唐訴其冤時君善之列在書傳今將軍內倚至尊外典國柄言重信著指撝無違宜加表救濟王公之艱難語曰善人在患飢不及餐斯其時也商即言之於帝事乃得釋龔在位五年以老病乞骸骨卒於家子暢論曰張晧王龔稱為雅推士若其好通汲善明發升薦仁人之情也夫士進則世收其器賢用即人獻其能能獻既已厚其功器收亦理兼天下其利甚博而人莫之先豈同折枝於長者以不為為難乎昔柳下惠見抑於臧文淳于長受稱于方進然則立德者以幽陋好遺顯登者以貴塗易引故晨門有抱關之夫柱下無朱文之軫也暢字叔茂少以清實為稱無所交黨初舉孝廉辭病不就大將軍梁商特辟舉茂才四遷尚書令出為齊相徵拜司隸校尉轉漁陽太守所在以嚴明為稱坐事免官是時政事多歸尚書桓帝特詔三公令高選庸能太尉陳蕃薦暢清方公正有不可犯之色由是復為尚書尋拜南陽太守前後二千石逼懼帝鄉貴戚多不稱職暢深疾之下車奮厲威猛其豪黨有釁穢者莫不糾發會赦事得散暢追恨之更為設法諸受臧二千萬以上不自首實者盡入財物若其隱伏使吏發屋伐樹堙井夷竈豪右大震功曹張敞奏記諫曰五教在寬著之經典湯去三面八方歸仁武王入殷先去炮格之刑高祖鑒秦唯定三章之法孝文皇帝感一緹縈蠲除肉刑卓茂文翁召父之徒皆疾惡嚴刻務崇溫厚仁賢之政流聞後世夫明哲之君網漏吞舟之魚然後三光明於上人物悅於下言之若迂其效甚近發屋伐樹將為嚴烈雖欲懲惡難以聞遠以明府上智之才日月之曜敷仁惠之政則海內改觀實有折枝之易而無挾山之難郡為舊都侯甸之國園廟出於章陵三后生自新野士女沾教化黔首仰風流自中興以來功臣將相繼世而隆愚以為懇懇用刑不如行恩孳孳求姦未若禮賢舜舉臯陶不仁者遠隨會為政晉盜奔秦虞芮入境讓心自生化人在德不在用刑暢深納敞諫更崇寬政慎刑簡罰教化遂行郡中豪族多以奢靡相尚暢常布衣皮褥車馬羸敗以矯其敝同郡劉表時年十七從暢受學進諫曰夫奢不僭上儉不逼下循道行禮貴處可否之閒蘧伯玉恥獨為君子府君不希孔聖之明訓而慕夷齊之末操無乃皎然自貴於世乎暢曰昔公儀休在魯拔園葵去織婦孫叔敖相楚其子被裘刈薪夫以約失之鮮矣聞伯夷之風者貪夫廉懦夫有立志雖以不德敢慕遺烈後徵為長樂衞尉建寧元年遷司空數月以水災策免明年卒於家子謙為大將軍何進長史謙子粲以文才知名种暠字景伯河南洛陽人仲山甫之後也父為定陶令有財三千萬父卒暠悉以賑卹宗族及邑里之貧者其有進趣名利皆不與交通始為縣門下史時河南尹田歆外甥王諶名知人歆謂之曰今當舉六孝廉多得貴戚書命不宜相違欲自用一名士以報國家爾助我求之明日諶送客於大陽郭遙見暠異之還白歆曰為尹得孝廉矣近洛陽門下史也歆笑曰當得山澤隱滯近迺洛陽吏邪諶曰山澤不必有異士異士不必在山澤歆即召暠於庭辯詰職事暠辭對有序歆甚知之召署主簿遂舉孝廉辟太尉府舉高第順帝末為侍御史時所遣八使光祿大夫杜喬周舉等多所糾奏而大將軍梁冀及諸宦官互為請救事皆被寑遏暠自以職主刺舉志案姦違乃復劾諸為八使所舉蜀郡太守劉宣等罪惡章露宜伏歐刀又奏請勑四府條舉近臣父兄及知親為刺史二千石尤殘穢不勝任者免遣案罪帝乃從之擢暠監太子於承光宮中常侍高梵從中單駕出迎太子時太傅杜喬等疑不欲從惶惑不知所為暠乃手劒當車曰太子國之儲副人命所係今常侍來無詔信何以知非姦邪今日有死而已梵辭屈不敢對馳命奏之詔報太子乃得去喬退而歎息愧暠臨事不惑帝亦嘉其持重稱善者良久出為益州刺史暠素慷慨好立功立事在職三年宣恩遠夷開曉殊俗岷山雜落皆懷服漢德其白狼槃木唐菆卭僰諸國自前刺史朱輔卒後遂絕暠至乃復舉種向化時永昌太守冶鑄黃金為文蛇以獻梁冀暠糾發逮捕馳傳上言而二府畏懦不敢案之冀由是銜怒於暠會巴郡人服直聚黨數百人自稱天王暠與太守應承討捕不克吏人多被傷害冀因此陷之傳逮暠承太尉李固上疏救曰臣伏聞討捕所傷本非暠承之意實由縣吏懼法畏罪迫逐深苦致此不詳比盜賊羣起處處未絕暠承以首舉大姦而相隨受罪臣恐沮傷州縣糾發之意更共飾匿莫復盡心梁太后省奏乃赦暠承罪免官而已後涼州羌動以暠為涼州刺史甚得百姓歡心被徵當遷吏人詣闕請留之太后歎曰未聞刺史得人心若是乃許之暠復留一年遷漢陽太守戎夷男女送至漢陽界暠與相揖謝千里不得乘車及到郡化行羌胡禁止侵掠遷使匈奴中郎將時遼東烏桓反叛復轉遼東太守烏桓望風率服迎拜於界上坐事免歸後司隸校尉舉暠賢良方正不應徵拜議郎遷南郡太守入為尚書會匈奴寇并涼二州桓帝擢暠為度遼將軍暠到營所先宣恩信誘降諸胡其有不服然後加討羌虜先時有生見獲質於郡縣者悉遣還之誠心懷撫信賞分明由是羌胡龜茲莎車烏孫等皆來順服暠乃去烽燧除候望邊方晏然無警入為大司農延熹四年遷司徒推達名臣橋玄皇甫規等為稱職相在位三年年六十一薨并涼邊人咸為發哀匈奴聞暠卒舉國傷惜單于每入朝賀望見墳墓輒哭泣祭祀二子岱拂岱字公祖好學養志舉孝廉茂才辟公府皆不就公車特徵病卒初岱與李固子燮同徵議郎燮聞岱卒痛惜甚乃上書求加禮於岱曰臣聞仁義興則道德昌道德昌則政化明政化明而萬姓寧伏見故處士种岱淳和達理耽悅詩書富貴不能回其慮萬物不能擾其心稟命不永奄然殂殞若不槃桓難進等輩皆已公卿矣昔先賢既沒有加贈之典周禮盛德有銘誄之文而岱生無印綬之榮卒無官謚之號雖未建忠效用而為聖恩所拔遐邇具瞻宜有異賞朝廷竟不能從拂字穎伯初為司隸從事拜宛令時南陽郡吏好因休沐游戲市里為百姓所患拂出逢之必下車公謁以愧其心自是莫敢出者政有能名累遷光祿大夫初平元年代荀爽為司空明年以地震策免復為太常李傕郭汜之亂長安城潰百官多避兵衝拂揮劒而出曰為國大臣不能止戈除暴致使凶賊兵刃向宮去欲何之遂戰而死子劭劭字申甫少知名中平末為諫議大夫大將軍何進將誅宦官召并州牧董卓至澠池而進意更狐疑遣劭宣詔止之卓不受遂前至河南劭迎勞之因譬令還軍卓疑有變使其軍士以兵脅劭劭怒稱詔大呼叱之軍士皆披遂前質責卓卓辭屈乃還軍夕陽亭及進敗獻帝即位拜劭為侍中卓既權而惡劭彊力遂左轉議郎出為益涼二州刺史會父拂戰死竟不之職服終徵為少府大鴻臚皆辭不受曰昔我先父以身徇國吾為臣子不能除殘復怨何面目朝覲明主哉遂與馬騰韓遂及左中郎劉範諫議大夫馬宇共攻李傕郭汜以報其仇與汜戰於長平觀下軍敗劭等皆死勝遂還涼州陳球字伯真下邳淮浦人也歷世著名父亹廣漢太守球少涉儒學善律令陽嘉中舉孝廉稍遷繁陽令時魏郡太守諷縣求納貨賄球不與之太守怒而撾督郵欲令逐球督郵不肯曰魏郡十五城獨繁陽有異政今受命逐之將致議於天下矣太守乃止復辟公府舉高第拜侍御史是時桂陽黠賊李研等羣聚寇鈔陸梁荊部州郡懦弱不能禁太尉楊秉表球為零陵太守球到設方略朞月閒賊虜消散而州兵朱蓋等反與桂陽賊胡蘭數萬人轉攻零陵零陵下溼編木為城不可守備郡中惶恐掾史白遣家避難球怒曰太守分國虎符受任一邦豈顧妻孥而沮國威重乎復言者斬乃悉內吏人老弱與共城守弦大木為弓羽矛為矢引機發之遠射千餘步多所殺傷賊復激流灌城球輒於內因地埶反決水淹賊相拒十餘日不能下會中郎將度尚將救兵至球募士卒與尚共破斬朱蓋等賜錢五十萬拜子一人為郎遷魏郡太守徵拜將作大匠作桓帝陵園所省巨萬以上遷南陽太守以糾舉豪右為執家所謗徵詣廷尉抵罪會赦歸家復徵拜廷尉熹平元年竇太后崩太后本遷南宮雲臺宦者積怨竇氏遂以衣車載后尸置城南市舍數日中常侍曹節王甫欲用貴人體殯帝曰太后親立朕躬統承大業詩云無德不報無言不酬豈宜以貴人終乎於是發喪成禮及將葬節等復欲別葬太后而以馮貴人配祔詔公卿大會朝堂令中常侍趙忠監議太尉李咸時病乃扶輿而起擣椒自隨謂妻子曰若皇太后不得配食桓帝吾不生還矣既議坐者數百人各瞻望中官良久莫肯先言趙忠曰議當時定怪公卿以下各相顧望球曰皇太后以盛德良家母臨天下宜配先帝是無所疑忠笑而言曰陳廷尉宜便操筆球即下議曰皇太后自在椒房有聰明母儀之德遭時不造援立聖明承繼宗廟功烈至重先帝晏駕因遇大獄遷居空宮不幸早世家雖獲罪事非太后今若別葬誠失天下之望且馮貴人冢墓被發骸骨暴露與賊併尸魂靈汙染且無功於國何宜上配至尊忠省球議作色俛仰蚩球曰陳廷尉建此議甚健球曰陳竇既冤皇太后無故幽閉臣常痛心天下憤歎今日言之退而受罪宿昔之願公卿以下皆從球議李咸始不敢先發見球辭正然後大言曰臣本謂宜爾誠與臣意合會者皆為之愧曹節王甫復爭以為梁后家犯惡逆別葬懿陵武帝黜廢衞后而以李夫人配食今竇氏罪深豈得合葬先帝乎李咸乃詣闕上疏曰臣伏惟章德竇后虐害恭懷安思閻后家犯惡逆而和帝無異葬之議順朝無貶降之文至於衞后孝武皇帝身所廢𠫓廾不可以為比今長樂太后尊號在身親嘗稱制坤育天下且援立聖明光隆皇祚太后以陛下為子陛下豈得不以太后為母子無黜母臣無貶君宜合葬宣陵一如舊制帝省奏謂曹節等曰竇氏雖為不道而太后有德於朕不宜降黜節等無復言於是議者乃定咸字元貞汝南人累經州郡以廉幹知名在朝清忠權倖憚之六年遷球司空以地震免拜光祿大夫復為廷尉太常光和元年遷太尉數月以日食免復拜光祿大夫明年為永樂少府乃潛與司徒河閒劉郃謀誅宦官初郃兄侍中儵與大將軍竇武同謀俱死故郃與球相結事未及發球復以書勸郃曰公出自宗室位登台鼎天下瞻望社稷鎮衞豈得雷同容容無違而已今曹節等放縱為害而久在左右又公兄侍中受害節等永樂太后所親知也今可表徙衞尉陽球為司隸校尉以次收節等誅之政出聖主天下太平可翹足而待也又尚書劉納以正直忤宦官出為步兵校尉亦深勸於郃郃曰凶豎多耳目恐事未會先受其禍納曰公為國棟梁傾危不持焉用彼相邪郃許諾亦結謀陽球球小妻程璜之女璜用事宮中所謂程大人也節等頗得聞知乃重賂於璜且脅之璜懼迫以球謀告節節因共白帝曰郃等常與藩國交通有惡意數稱永樂聲埶受取狼籍步兵校尉劉納及永樂少府陳球衞尉陽球交通書疏謀議不軌帝大怒策免郃郃與球及劉納陽球皆下獄死球時年六十二子瑀吳郡太守瑀弟琮汝陰太守弟子珪沛相珪子登廣陵太守並知名贊曰安儲遭譖張卿有請龔糾便佞以直為眚二子過正埋車堙井种公自微臨官以威陳球專議桓思同歸
