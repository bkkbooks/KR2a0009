body:
  text: 後漢書卷六十七黨錮列傳第五十七孔子曰性相近也習相遠也言嗜惡之本同而遷染之塗異也夫刻意則行不肆牽物則其志流是以聖人導人理性裁抑宕佚慎其所與節其所偏雖情品萬區質文異數至於陶物振俗其道一也叔末澆訛王道陵缺而猶假仁以效己憑義以濟功舉中於理則強梁裭氣片言違正則厮臺解情蓋前哲之遺塵有足求者霸德既衰狙詐萌起彊者以決勝為雄弱者以詐劣受屈至有畫半策而綰萬金開一說而錫琛瑞或起徒步而仕執珪解草衣以升卿相士之飾巧馳辯以要能釣利者不期而景從矣自是愛尚相奪與時回變其風不可留其敝不能反及漢祖杖劒武夫興憲令寬賒文禮簡闊緒餘四豪之烈人懷陵上之心輕死重氣怨惠必讎令行私庭權移匹庶任俠之方成其俗矣自武帝以後崇尚儒學懷經協術所在霧會至有石渠分爭之論黨同伐異之說守文之徒盛於時矣至王莽專偽終於篡國忠義之流恥見纓紼遂乃榮華丘壑甘足枯槁雖中興在運漢德重開而保身懷方彌相慕襲去就之節重於時矣逮桓靈之閒主荒政繆國命委於閹寺士子羞與為伍故匹夫抗憤處士橫議遂乃激揚名聲互相題拂品覈公卿裁量執政婞直之風於斯行矣夫上好則下必甚矯枉故直必過其理然矣若范滂張儉之徒清心忌惡終陷黨議不其然乎初桓帝為蠡吾侯受學於甘陵周福及即帝位擢福為尚書時同郡河南尹房植有名當朝鄉人為之謠曰天下規矩房伯武因師獲印周仲進二家賓客互相譏揣遂各樹朋徒漸成尤𨻶由是甘陵有南北部黨人之議自此始矣後汝南太守宗資任功曹范滂南陽太守成亦委功曹岑晊二郡又為謠曰汝南太守范孟博南陽宗資主畫諾南陽太守岑公孝弘農成但坐嘯因此流言轉入太學諸生三萬餘人郭林宗賈偉節為其冠並與李膺陳蕃王暢更相襃重學中語曰天下模楷李元禮不畏強禦陳仲舉天下俊秀王叔茂又渤海公族進階扶風魏齊卿並危言深論不隱豪強自公卿以下莫不畏其貶議屣履到門時河內張成善說風角推占當赦遂教子殺人李膺為河南尹督促收捕既而逢宥獲免膺愈懷憤疾竟案殺之初成以方伎交通宦官帝亦頗誶其占成弟子牢脩因上書誣告膺等養太學遊士交結諸郡生徒更相驅馳共為部黨誹訕朝廷疑亂風俗於是天子震怒班下郡國逮捕黨人布告天下使同忿疾遂收執膺等其辭所連及陳寔之徒二百餘人或有逃遁不獲皆懸金購募使者四出相望於道明年尚書霍諝城門校尉竇武並表為請帝意稍解乃皆赦歸田里禁錮終身而黨人之名猶書王府自是正直廢放邪枉熾結海內希風之流遂共相摽搒指天下名士為之稱號上曰三君次曰八俊次曰八顧次曰八及次曰八廚猶古之八元八凱也竇武劉淑陳蕃為三君君者言一世之所宗也李膺荀翌杜密王暢劉祐魏朗趙典朱𧜛為八俊俊者言人之英也郭林宗宗慈巴肅夏馥范滂尹勳蔡衍羊陟為八顧顧者言能以德行引人者也張儉岑晊劉表陳翔孔昱苑康敷翟超為八及及者言其能導人追宗者也度尚張邈王考劉儒胡母班秦周蕃嚮王章為八廚廚者言能以財救人者也又張儉鄉人朱並承望中常侍侯覽意旨上書告儉與同鄉二十四人別相署號共為部黨圖危社稷以儉及彬褚鳳張肅薛蘭馮禧魏玄徐乾為八俊田林張隱劉表薛郁王訪劉祗宣靖公緒恭為八顧朱楷田槃疎耽薛敦宋布唐龍嬴咨宣襃為八及刻石立墠共為部黨而儉為之魁靈帝詔刊章捕儉等大長秋曹節因此諷有司奏捕前黨故司空虞放太僕杜密長樂少府李膺司隸校尉朱𧜛潁川太守巴肅沛相荀翌河內太守魏朗山陽太守翟超任城相劉儒太尉掾范滂等百餘人皆死獄中餘或先歿不及或亡命獲免自此諸為怨𨻶者因相陷害睚眦之忿濫入黨中又州郡承旨或有未嘗交關亦離禍毒其死徙廢禁者六七百人熹平五年永昌太守曹鸞上書大訟黨人言甚方切帝省奏大怒即詔司隸益州檻車收鸞送槐里獄掠殺之於是又詔州郡更考黨人門生故吏父子兄弟其在位者免官禁錮爰及五屬光和二年上祿長和海上言禮從祖兄弟別居異財恩義已輕服屬疎末而今黨人錮及五族既乖典訓之文有謬經常之法帝覽而悟之黨錮自從祖以下皆得解釋中平元年黃巾賊起中常侍呂彊言於帝曰黨錮久積人情多怨若久不赦宥輕與張角合謀為變滋大悔之無救帝懼其言乃大赦黨人誅徙之家皆歸故郡其後黃巾遂盛朝野崩離綱紀文章蕩然矣凡黨事始自甘陵汝南成於李膺張儉海內塗炭二十餘年諸所蔓衍皆天下善士三君八俊等三十五人其名迹存者並載乎篇陳蕃竇武王暢劉表度尚郭林宗別有傳荀翌附祖淑傳張邈附呂布傳胡母班附袁紹傳王考字文祖東平壽張人冀州刺史秦周字平王陳留平丘人北海相蕃嚮字嘉景魯國人郎中王璋字伯儀東萊曲城人少府卿位行並不顯翟超山陽太守事見陳蕃傳字及郡縣未詳朱𧜛沛人與杜密等俱死獄中唯趙典名見而已劉淑字仲承河閒樂成人也祖父稱司隸校尉淑少學明五經遂隱居立精舍講授諸生常數百人州郡禮請五府連辟並不就永興二年司徒种暠舉淑賢良方正辭以疾桓帝聞淑高名切責州郡使輿病詣京師淑不得已而赴洛陽對策為天下第一拜議郎又陳時政得失災異之占事皆效驗再遷尚書納忠建議多所補益又再遷侍中虎賁中郎將上疏以為宜罷宦官辭甚切直帝雖不能用亦不罪焉以淑宗室之賢特加敬異每有疑事常密諮問之靈帝既位宦官譖淑與竇武等通謀下獄自殺李膺字元禮潁川襄城人也祖父脩安帝時為太尉父益趙國相膺性簡亢無所交接唯以同郡荀淑陳寔為師友初舉孝廉為司徒胡廣所辟舉高第再遷青州刺史守令畏威明多望風𠫓廾官復徵再遷漁陽太守尋轉蜀郡太守以母老乞不之官轉護烏桓校尉鮮卑數犯塞膺常蒙矢石每破走之虜甚憚懾以公事免官還居綸氏教授常千人南陽樊陵求為門徒膺謝不受陵後以阿附宦官致位太尉為節志者所羞荀爽嘗就謁膺因為其御既還喜曰今日乃得御李君矣其見慕如此永壽二年鮮卑寇雲中桓帝聞膺能乃復徵為度遼將軍先是羌虜及疏勒龜茲數出攻鈔張掖酒泉雲中諸郡百姓屢被其害自膺到邊皆望風懼服先所掠男女悉送還塞下自是之後聲振遠域延熹二年徵再遷河南尹時宛陵大姓羊元羣罷北海郡臧罪狼藉郡舍溷軒有奇巧乃載之以歸膺表欲按其罪元羣行賂宦豎膺反坐輸作左校初膺與廷尉馮緄大司農劉祐等共同心志糾罰姦倖緄祐時亦得罪輸作司隸校尉應奉上疏理膺等曰昔秦人觀寶於楚昭奚恤莅以羣賢梁惠王瑋其照乘之珠齊威王荅以四臣夫忠賢武將國之心膂竊見左校薥刑徒前廷尉馮緄大司農劉祐河南尹李膺等執法不撓誅舉邪臣肆之以法衆庶稱宜昔季孫行父親逆君命逐出莒僕於舜之功二十之一今膺等投身彊禦畢力致罪陛下既不聽察而猥受譖訴遂令忠臣同愆元惡自春迄冬不蒙降恕遐邇觀聽為之歎息夫立政之要記功忘失是以武帝捨安國於徒中宣帝徵張敞於亡命緄前討蠻荊均吉甫之功祐數臨督司有不吐茹之節膺著威幽并遺愛度遼今三垂蠢動王旅未振易稱雷雨作解君子以赦過宥罪乞原膺等以備不虞書奏乃悉免其刑再遷復拜司隸校尉時張讓弟朔為野王令貪殘無道至乃殺孕婦聞膺厲威嚴懼罪逃還京師因匿兄讓弟舍藏於合柱中膺知其狀率將吏卒破柱取朔付洛陽獄受辭畢即殺之讓訴冤於帝詔膺入殿御親臨軒詰以不先請便加誅辟之意膺對曰昔晉文公執衞成公歸于京師春秋是焉禮云公族有罪雖曰宥之有司執憲不從昔仲尼為魯司寇七日而誅少正卯今臣到官已積一旬私懼以稽留為愆不意獲速疾之罪誠自知釁責死不旋踵特乞留五日剋殄元惡退就鼎鑊始生之願也帝無復言顧謂讓曰此汝弟之罪司隸何愆乃遣出之自此諸黃門常侍皆鞠躬屏氣休沐不敢復出宮省帝怪問其故並叩頭泣曰畏李校尉是時朝庭日亂綱紀穨阤膺獨持風裁以聲名自高士有被其容接者名為登龍門及遭黨事當考實膺等案經三府太尉陳蕃卻之曰今所考案皆海內人譽憂國忠公之臣此等猶將十世宥也豈有罪名不章而致收掠者乎不肯平署帝愈怒遂下膺等於黃門北寺獄膺等頗引宦官子弟宦官多懼請帝以天時宜赦於是大赦天下膺免歸鄉里居陽城山中天下士大夫皆高尚其道而汙穢朝廷及陳蕃免太尉朝野屬意於膺荀爽恐其名高致禍欲令屈節以全亂世為書貽曰久廢過庭不聞善誘陟岵瞻望惟日為歲知以直道不容於時悅山樂水家于陽城道近路夷當即聘問無狀嬰疾闕於所仰頃聞上帝震怒貶黜鼎臣人鬼同謀以為天子當貞觀二五利見大人不謂夷之初旦明而未融虹蜺揚煇𠫓廾和取同方今天地氣閉大人休否智者見險投以遠害雖匱人望內合私願想甚欣然不為恨也願怡神無事偃息衡門任其飛沈與時抑揚頃之帝崩陳蕃為太傅與大將軍竇武共秉朝政連謀誅諸宦官故引用天下名士乃以膺為長樂少府及陳竇之敗膺等復廢後張儉事起收捕鉤黨鄉人謂膺曰可去矣對曰事不辭難罪不逃刑臣之節也吾年已六十死生有命去將安之乃詣詔獄考死妻子徙邊門生故吏及其父兄並被禁錮時侍御史蜀郡景毅子顧為膺門徒而未有錄牒故不及於譴毅乃慨然曰本謂膺賢遣子師之豈可以漏奪名籍苟安而已遂自表免歸時人義之膺子瓚位至東平相初曹操微時瓚異其才將沒謂子宣等曰時將亂矣天下英雄無過曹操張孟卓與吾善袁本初汝外親雖爾勿依必歸曹氏諸子從之並免於亂世杜密字周甫潁川陽城人也為人沈質少有厲俗志為司徒胡廣所辟稍遷代郡太守徵三遷太山太守北海相其宦官子弟為令長有姦惡者輒捕案之行春到高密縣見鄭玄為鄉佐知其異器即召署郡職遂遣就學後密去官還家每謁守令多所陳託同郡劉勝亦自蜀郡告歸鄉里閉門埽軌無所干及太守王昱謂密曰劉季陵清高士公卿多舉之者密知昱激己對曰劉勝位為大夫見禮上賓而知善不薦聞惡無言隱情惜己自同寒蟬此罪人也今志義力行之賢而密達之違道失節之士而密糾之使明府賞刑得中令問休揚不亦萬分之一乎昱慙服待之彌厚後桓帝徵拜尚書令遷河南尹轉太僕黨事既起免歸本郡與李膺俱坐而名行相次故時人亦稱李杜焉後太傅陳蕃輔政復為太僕明年坐黨事被徵自殺劉祐字伯祖中山安國人也安國後別屬博陵祐初察孝廉補尚書侍郎閑練故事文札強辨每有奏議應對無滯為僚類所歸除任城令兗州舉為尤異遷揚州刺史是時會稽太守梁旻大將軍冀之從弟也祐舉奏其罪旻坐徵復遷祐河東太守時屬縣令長率多中官子弟百姓患之祐到黜其權強平理冤結政為三河表再遷延熹四年拜尚書令又出為河南尹轉司隸校尉時權貴子弟罷州郡還入京師者每至界首輒改易輿服隱匿財寶威行朝廷拜宗正三轉大司農時中常侍蘇康管霸用事於內遂固天下良田美業山林湖澤民庶窮困州郡累氣祐移書所在依科品沒入之桓帝大怒論祐輸左校後得赦出復歷三卿輒以疾辭乞骸骨歸田里詔拜中散大夫遂杜門絕迹每三公缺朝廷皆屬意於祐以譖毀不用延篤貽之書曰昔太伯三讓人無德而稱焉延陵高揖華夏仰風吾子懷蘧氏之可卷體甯子之如愚微妙玄通沖而不盈蔑三光之明未暇以天下為事何其劭與靈帝初陳蕃輔政以祐為河南尹及蕃敗祐黜歸卒于家明年大誅黨人幸不及禍魏朗字少英會稽上虞人也少為縣吏兄為鄉人所殺朗白日操刃報讎於縣中遂亡命到陳國從博士郤仲信學春秋圖緯又詣太學受五經京師長者李膺之徒爭從之初辟司徒府再遷彭城令時中官子弟為國相多行非法朗與更相章奏幸臣忿疾欲中之會九真賊起乃共薦朗為九真都尉到官奬厲吏兵討破羣賊斬首二千級桓帝美其功徵拜議郎頃之遷尚書屢陳便宜有所補益出為河內太守政稱三河表尚書令陳蕃薦朗公忠亮直宜在機密復徵為尚書會被黨議免歸家朗性矜嚴閉門整法度家人不見墯容後竇武等誅朗以黨被急徵行至牛渚自殺著書數篇號魏子云夏馥字子治陳留圉人也少為書生言行質直同縣高氏蔡氏並皆富殖郡人畏而事之唯馥比門不與交通由是為豪姓所仇桓帝初舉直言不就馥雖不交時宦然以聲名為中官所憚遂與范滂張儉等俱被誣陷詔下州郡捕為黨魁及儉等亡命經歷之處皆被收考辭所連引布徧天下馥乃頓足而歎曰孽自己作空汙良善一人逃死禍及萬家何以生為乃自翦須變形入林慮山中隱匿姓名為冶家傭親突煙炭形貌毀瘁積二三年人無知者後馥弟靜乘車馬載縑帛追之於涅陽市中遇馥不識聞其言聲乃覺而拜之馥避不與語靜追隨至客舍共宿夜中密呼靜曰吾以守道疾惡故為權宦所陷且念營苟全以庇性命弟柰何載物相求是以禍見追也明旦別去黨禁未解而卒宗慈字孝初南陽安衆人也舉孝廉九辟公府有道徵不就後為脩武令時太守出自權豪多取貨賂慈遂𠫓廾官去徵拜議郎未到道疾卒南陽羣士皆重其義行巴肅字恭祖勃海高城人也初察孝廉歷慎令貝丘長皆以郡守非其人辭病去辟公府稍遷拜議郎與竇武陳蕃等謀誅閹官武等遇害肅亦坐黨禁錮中常侍曹節後聞其謀收之肅自載詣縣縣令見肅入閤解印綬與俱去肅曰為人臣者有謀不敢隱有罪不逃刑既不隱其謀矣又敢逃其刑乎遂被害刺史賈琮刊石立銘以記之范滂字孟博汝南征羌人也少厲清節為州里所服舉孝廉光祿四行時冀州飢荒盜賊羣起乃以滂為清詔使案察之滂登車攬轡慨然有澄清天下之志及至州境守令自知臧汙望風解印綬去其所舉奏莫不厭塞衆議遷光祿勳主事時陳蕃為光祿勳滂執公儀詣蕃蕃不止之滂懷恨投版𠫓廾官而去郭林宗聞而讓蕃曰若范孟博者豈宜以公禮格之今成其去就之名得無自取不優之議也蕃乃謝焉復為太尉黃瓊所辟後詔三府掾屬舉謠言滂奏刺史二千石權豪之黨二十餘人尚書責滂所劾猥多疑有私故滂對曰臣之所舉自非叨穢姦暴深為民害豈以汙簡札哉閒以會日迫促故先舉所急其未審者方更參實臣聞農夫去草嘉穀必茂忠臣除姦王道以清若臣言有貳甘受顯戮吏不能詰滂覩時方艱知意不行因投劾去太守宗資先聞其名請署功曹委任政事滂在職嚴整疾惡其有行違孝悌不軌仁義者皆埽迹斥逐不與共朝顯薦異節抽拔幽陋滂外甥西平李頌公族子孫而為鄉曲所𠫓廾中常侍唐衡以頌請資資用為吏滂以非其人寑而不召資遷怒捶書佐朱零零仰曰范滂清裁猶以利刃齒腐朽今日寧受笞死而滂不可違資乃止郡中中人以下莫不歸怨乃指滂之所用以為范黨後牢脩誣言鉤黨滂坐繫黃門北寺獄獄吏謂曰凡坐繫皆祭皐陶滂曰皐陶賢者古之直臣知滂無罪將理之於帝如其有罪祭之何益衆人由此亦止獄吏將加掠考滂以同囚多嬰病乃請先就格遂與同郡袁忠爭受楚毒桓帝使中常侍王甫以次辨詰滂等皆三木囊頭暴於階下餘人在前或對或否滂忠於後越次而進王甫詰曰君為人臣不惟忠國而共造部黨自相襃舉評論朝廷虛搆無端諸所謀結並欲何為皆以情對不得隱飾滂對曰臣聞仲尼之言見善如不及見惡如探湯欲使善善同其清惡惡同其汙謂王政之所願聞不悟更以為黨甫曰卿更相拔舉迭為脣齒有不合者見則排斥其意如何滂乃慷慨仰天曰古之循善自求多福今之循善身陷大戮身死之日願埋滂於首陽山側上不負皇天下不愧夷齊甫愍然為之改容乃得並解桎梏滂後事釋南歸始發京師汝南南陽士大夫迎之者數千兩同囚鄉人殷陶黃穆亦免俱歸並衞侍於滂應對賓客滂顧謂陶等曰今子相隨是重吾禍也遂遁還鄉里初滂等繫獄尚書霍諝理之及得免到京師往候諝而不為謝或有讓滂者對曰昔叔向嬰罪祁奚救之未聞羊舌有謝恩之辭祁老有自伐之色竟無所言建寧二年遂大誅黨人詔下急捕滂等督郵吳導至縣抱詔書閉傳舍伏牀而泣滂聞之曰必為我也即自詣獄縣令郭揖大驚出解印綬引與俱亡曰天下大矣子何為在此滂曰滂死則禍塞何敢以罪累君又令老母流離乎其母就與之訣滂白母曰仲博孝敬足以供養滂從龍舒君歸黃泉存亡各得其所惟大人割不可忍之恩勿增感戚母曰汝今得與李杜齊名死亦何恨既有令名復求壽考可兼得乎滂跪受教再拜而辭顧謂其子曰吾欲使汝為惡則惡不可為使汝為善則我不為惡行路聞之莫不流涕時年三十三論曰李膺振拔汙險之中蘊義生風以鼓動流俗激素行以恥威權立廉尚以振貴埶使天下之士奮迅感㮣波蕩而從之幽深牢破室族而不顧至于子伏其死而母歡其義壯矣哉子曰道之將廢也與命也尹勳字伯元河南鞏人也家世衣冠伯父睦為司徒兄頌為太尉宗族多居貴位者而勳獨持清操不以地埶尚人州郡連辟察孝廉三遷邯鄲令政有異迹後舉高第五遷尚書令及桓帝誅大將軍梁冀勳參建大謀封都鄉侯遷汝南太守上書解釋范滂袁忠等黨議禁錮尋徵拜將作大匠轉大司農坐竇武等事下獄自殺蔡衍字孟喜汝南項人也少明經講授以禮讓化鄉里鄉里有爭訟者輒詣衍決之其所平處皆曰無怨舉孝廉稍遷冀州刺史中常侍具瑗託其弟恭舉茂才衍不受乃收齎書者案之又劾奏河閒相曹鼎臧罪千萬鼎者中常侍騰之弟也騰使大將軍梁冀為書請之衍不荅鼎竟坐輸作左校乃徵衍拜議郎符節令梁冀聞衍賢請欲相見衍辭疾不往冀恨之時南陽太守成等以收糾宦官考廷尉衍與議郎劉瑜表救之言甚切厲坐免官還家杜門不出靈帝即位徵復拜議郎會病卒羊陟字嗣祖太山梁父人也家世冠族陟少清直有學行舉孝廉辟太尉李固府舉高第拜侍御史會固被誅陟以故吏禁錮歷年復舉高第再遷冀州刺史奏案貪濁所在肅然又再遷虎賁中郎將城門校尉三遷尚書令時太尉張顥司徒樊陵大鴻臚郭防太僕曹陵大司農馮方並與宦豎相姻私公行貨賂並奏罷黜之不納以前太尉劉寵司隸校尉許冰幽州刺史楊熙涼州刺史劉恭益州刺史龐艾清亮在公薦舉升進帝嘉之拜陟河南尹計日受奉常食乾飯茹菜禁制豪右京師憚之會黨事起免官禁錮卒於家張儉字元節山陽高平人趙王張耳之後也父成江夏太守儉初舉茂才以刺史非其人謝病不起延熹八年太守翟超請為東部督郵時中常侍侯覽家在防東殘暴百姓所為不軌儉舉劾覽及其母罪惡請誅之覽遏絕章表並不得通由是結仇鄉人朱並素性佞邪為儉所𠫓廾並懷怨恚遂上書告儉與同郡二十四人為黨於是刊章討捕儉得亡命困迫遁走望門投止莫不重其名行破家相容後流轉東萊止李篤家外黃令毛欽操兵到門篤引欽謂曰張儉知名天下而亡非其罪縱儉可得寧忍執之乎欽因起撫篤曰蘧伯玉恥獨為君子足下如何自專仁義篤曰篤雖好義明廷今日載其半矣欽歎息而去篤因緣送儉出塞以故得免其所經歷伏重誅者以十數宗親並皆殄滅郡縣為之殘破中平元年黨事解乃還鄉里大將軍三公並辟又舉敦朴公車特徵起家拜少府皆不就獻帝初百姓飢荒而儉資計差溫乃傾竭財產與邑里共之賴其存者以百數建安初徵為衛尉不得已而起儉見曹氏世德已萌乃闔門懸車不豫政事歲餘卒于許下年八十四論曰昔魏齊違死虞卿解印季布逃亡朱家甘罪而張儉見怒時王顛沛假命天下聞其風者莫不憐其壯志而爭為之主至乃捐城委爵破族屠身蓋數十百所豈不賢哉然儉以區區一掌而欲獨堙江河終嬰疾甚之亂多見其不知量也岑晊字公孝南陽棘陽人也父像豫為南郡太守以貪叨誅死晊年少未知名往候同郡宗慈慈方以有道見徵賓客滿門以晊非良家子不肯見晊留門下數日晚乃引入慈與語大奇之遂將俱至洛陽因詣太學受業晊有高才郭林宗朱公叔等皆為友李膺王暢稱其有幹國器雖在閭里慨然有董正天下之志太守弘農成下車欲振威嚴聞晊高名請為功曹又以張牧為中賊曹吏委心晊牧襃善糾違肅清朝府宛有富賈張汎者桓帝美人之外親善巧雕鏤玩好之物頗以賂遺中官以此並得顯位恃其伎巧用埶縱橫晊與牧勸收捕汎等既而遇赦晊竟誅之并收其宗族賓客殺二百餘人後乃奏聞於是中常侍侯覽使汎妻上書訟其冤帝大震怒徵下獄死晊與牧亡匿齊魯之閒會赦出後州郡察舉三府交辟並不就及李杜之誅因復逃竄終于江夏山中云陳翔字子麟汝南邵陵人也祖父珍司隸校尉翔少知名善交結察孝廉太尉周景辟舉高第拜侍御史時正旦朝賀大將軍梁冀威儀不整翔奏冀恃貴不敬請收案罪時人奇之遷定襄太守徵拜議郎遷揚州刺史舉奏豫章太守王永奏事中官吳郡太守徐參在職貪穢並徵詣廷尉參中常侍璜之弟也由此威名大振又徵拜議郎補御史中丞坐黨事考黃門北寺獄以無驗見原卒于家孔昱字元世魯國魯人也七世祖霸成帝時歷九卿封襃成侯自霸至昱爵位相係其卿相牧守五十三人列侯七人昱少習家學大將軍梁冀辟不應太尉舉方正對策不合乃辭病去後遭黨事禁錮靈帝即位公車徵拜議郎補洛陽令以師喪𠫓廾官卒於家苑康字仲真勃海重合人也少受業太學與郭林宗親善舉孝廉再遷潁陰令有能迹遷太山太守郡內豪姓多不法康至奮威怒施嚴令莫有干犯者先所請奪人田宅皆遽還之是時山陽張儉殺常侍侯覽母案其宗黨賓客或有迸匿太山界者康既常疾閹官因此皆窮相收掩無得遺脫覽大怨之誣康與兗州刺史第五種及都尉壺嘉詐上賊降徵康詣廷尉獄減死罪一等徙日南潁陰人及太山羊陟等詣闕為訟乃原還本郡卒於家字文有山陽瑕丘人也少為諸生家貧而志清不受鄉里施惠舉孝廉連辟公府皆不就立精舍教授遠方至者常數百人桓帝時博士徵不就靈帝即位太尉黃瓊舉方正對策合時宜再遷議郎補蒙令以郡守非其人𠫓廾官去家無產業子孫同衣而出年八十卒於家劉儒字叔林東郡陽平人也郭林宗常謂儒口訥心辯有珪璋之質察孝廉舉高第三遷侍中桓帝時數有灾異下策博求直言儒上封事十條極言得失辭甚忠切帝不能納出為任城相頃之徵拜議郎會竇武事下獄自殺賈彪字偉節潁川定陵人也少遊京師志節慷慨與同郡荀爽齊名初仕州郡舉孝廉補新息長小民困貧多不養子彪嚴為其制與殺人同罪城南有盜劫害人者北有婦人殺子者彪出案發而掾吏欲引南彪怒曰賊寇害人此則常理母子相殘逆天違道遂驅車北行案驗其罪城南賊聞之亦面縛自首數年閒人養子者千數僉曰賈父所長生男名為賈子生女名為賈女延熹九年黨事起太尉陳蕃爭之不能得朝廷寒心莫敢復言彪謂同志曰吾不西行大禍不解乃入洛陽說城門校尉竇武尚書霍諝武等訟之桓帝以此大赦黨人李膺出曰吾得免此賈生之謀也先是岑晊以黨事逃亡親友多匿焉彪獨閉門不納時人望之彪曰傳言相時而動無累後人公孝以要君致釁自遺其咎吾以不能奮戈相待反可容隱之乎於是咸服其裁正以黨禁錮卒于家初彪兄弟三人並有高名而彪最優故天下稱曰賈氏三虎偉節最怒何顒字伯求南陽襄鄉人也少遊學洛陽顒雖後進而郭林宗賈偉節等與之相好顯名太學友人虞偉高有父讎未報而篤病將終顒往候之偉高泣而訴顒感其義為復讎以頭醊其墓及陳蕃李膺之敗顒以與蕃膺善遂為宦官所陷乃變姓名亡匿汝南閒所至皆親其豪桀有聲荊豫之域袁紹慕之私與往來結為奔走之友是時黨事起天下多離其難顒常私入洛陽從紹計議其窮困閉戹者為求援救以濟其患有被掩捕者則廣設權計使得逃隱全免者甚衆及黨錮解顒辟司空府每三府會議莫不推顒之長累遷及董卓秉政逼顒以為長史託疾不就乃與司空荀爽司徒王允等共謀卓會爽薨顒以它事為卓所繫憂憤而卒初顒見曹操歎曰漢家將亡安天下者必此人也操以是嘉之嘗稱潁川荀彧王佐之器及彧為尚書令遣人西迎叔父爽并致顒屍而葬之爽之冢傍贊曰渭以涇濁玉以礫貞物性既區嗜惡從形蘭蕕無並銷長相傾徒恨芳膏煎灼燈明
