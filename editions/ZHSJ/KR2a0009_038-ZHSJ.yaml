body:
  text: 後漢書卷三十四梁統列傳第二十四子松竦曾孫商玄孫冀梁統字仲寧安定烏氏人晉大夫梁益耳即其先也統高祖父子都自河東遷居北地子都子橋以貲千萬徙茂陵至哀平之末歸安定統性剛毅而好法律初仕州郡更始二年召補中郎將使安集涼州拜酒泉太守會更始敗赤眉入長安統與竇融及諸郡守起兵保境謀共立帥初以位次咸共推統統固辭曰昔陳嬰不受王者以有老母也今統內有尊親又德薄能寡誠不足以當之遂共推融為河西大將軍更以統為武威太守為政嚴猛威行鄰郡建武五年統等各遣使隨竇融長史劉鈞詣闕奉貢願得詣行在所詔加統宣德將軍八年夏光武自征隗囂統與竇融等將兵會車駕及囂敗封統為成義侯同產兄巡從弟騰並為關內侯拜騰酒泉典農都尉悉遣還河西十二年統與融等俱詣京師以列侯奉朝請更封高山侯拜太中大夫除四子為郎統在朝廷數陳便宜以為法令既輕下姦不勝宜重刑罰以遵舊典乃上疏曰臣竊見元哀二帝輕殊死之刑以一百二十三事手殺人者減死一等自是以後著為常準故人輕犯法吏易殺人為心刑罰在衷無取於輕是以五帝有流殛放殺之誅三王有大辟刻肌之法故孔子稱仁者必有勇又曰理財正辭禁民為非曰義高帝受命誅暴平蕩天下約令定律誠得其宜文帝寬惠柔克遭世康平唯除省肉刑相坐之法它皆率由無革舊章武帝值中國隆盛財力有餘征伐遠方軍役數興豪桀犯禁姦吏弄法故重首匿之科著知從之律以破朋黨以懲隱匿宣帝聰明正直總御海內臣下奉憲無所失墜因循先典天下稱理至哀平繼體而即位日淺聽斷尚寡丞相王嘉輕為穿鑿虧除先帝舊約成律數年之閒百有餘事或不便於理或不厭民心謹表其尤害於體者傅奏於左軌回神明察考量得失宣詔有司詳擇其善定不易之典施無窮之法天下幸甚統復上言曰有司以臣今所言不可施行尋臣之所奏非曰嚴刑竊謂高帝以後至乎孝宣其所施行多合經傳宜比方今事驗之往古聿遵前典事無難改不勝至願願得召見若對尚書近臣口陳其要帝令尚書問狀統對曰聞聖帝明王制立刑罰故雖堯舜之盛猶誅四凶經曰天討有罪五刑五庸哉又曰爰制百姓于刑之衷孔子曰刑罰不衷則人無所厝手足衷之為言不輕不重之謂也春秋之誅不避親戚所以防患救亂全安衆庶豈無仁愛之恩貴絕殘賊之路也斷獄益少至初元建平所減刑罰百有餘條而盜賊浸多歲以萬數閒者三輔從橫羣輩並起至燔燒茂陵火見未央其後隴西北地西河之賊越州度郡萬里交結攻取庫兵劫略吏人詔書討捕連年不獲是時以天下無難百姓安平而狂狡之埶猶至於此皆刑罰不衷愚人易犯之所致也擇賢臣孔光師丹等議後出為九江太守定封陵鄉侯統在郡亦有治迹吏人畏愛之卒於官子松嗣松字伯孫少為郎尚光武女舞陰長公主再遷虎賁中郎將松博通經書明習故事與諸儒脩明堂辟廱郊祀封禪禮儀常與論議寵幸莫比光武崩受遺詔輔政永平元年遷太僕松數為私書請託郡縣二年發覺免官遂懷怨望四年冬乃縣飛書誹謗下獄死國除子扈後以恭懷皇后從兄永元中擢為黃門侍郎歷位卿校尉溫恭謙讓亦敦詩書永初中為長樂少府松弟竦竦字叔敬少習孟氏易弱冠能教授後坐兄松事與弟恭俱徙九真既徂南土歷江湖濟沅湘感悼子胥屈原以非辜沈身乃作悼騷賦繫玄石而沈之顯宗後詔聽還本郡竦閉門自養以經籍為娛著書數篇名曰七序班固見而稱曰孔子著春秋而亂臣賊子懼梁竦作七序而竊位素餐者慙性好施不事產業長嫂舞陰公主贍給諸梁親疎有序特重敬竦雖衣食器物必有加異竦悉分與親族自無所服竦生長京師不樂本土自負其才鬱鬱不得意嘗登高遠望歎息言曰大丈夫居世生當封侯死當廟食如其不然閑居可以養志詩書足以自娛州郡之職徒勞人耳後辟命交至並無所就有三男三女肅宗納其二女皆為貴人小貴人生和帝竇皇后養以為子而竦家私相慶後諸竇聞之恐梁氏得志終為己害建初八年遂譖殺二貴人而陷竦等以惡逆詔使漢陽太守鄭據傳考竦罪死獄中家屬復徙九真辭語連及舞陰公主坐徙新城使者護守宮省事密莫有知和帝梁氏生者永元九年竇太后崩松子扈遣從兄奏記三府以為漢家舊典崇貴母氏而梁貴人親育聖躬不蒙尊號求得申議太尉張酺引訊問事理會後召見因白奏記之狀帝感慟良久曰於君意若何酺對曰春秋之義母以子貴漢興以來母氏莫不隆顯臣愚以為宜上尊號追慰聖靈存錄諸舅以明親親帝悲泣曰非君孰為朕思之會貴人姊南陽樊調妻嫕上書自訟曰妾同產女弟貴人前充後宮蒙先帝厚恩得見寵幸皇天授命誕生聖明而為竇憲兄弟所見譖訴使妾父竦冤死牢獄骸骨不掩老母孤弟遠徙萬里獨妾遺脫逸伏草野常恐沒命無由自達今遭值陛下神聖之運親統萬機羣物得所憲兄弟姦惡既伏辜誅海內曠然各獲其宜妾得蘇息拭目更視乃敢昧死自陳所天妾聞太宗即位薄氏蒙榮宣帝繼統史族復興妾門雖有薄史之親獨無外戚餘恩誠自悼傷妾父既冤不可復生母氏年殊七十及弟棠等遠在絕域不知死生願乞收竦朽骨使母弟得歸本郡則施過天地存歿幸賴帝覽章感悟乃下中常侍掖庭令驗問之嫕辭證明審遂得引見具陳其狀乃留嫕止宮中連月乃出賞賜衣被錢帛第宅奴婢旬月之閒累資千萬嫕素有行操帝益愛之加號梁夫人擢樊調為羽林左監調光祿大夫宏兄曾孫也於是追尊恭懷皇后其冬制詔三公大鴻臚曰夫孝莫大於尊尊親親其義一也詩云父兮生我母兮鞠我撫我畜我長我育我顧我復我出入腹我欲報之德昊天罔極朕不敢興事覽于前世太宗中宗寔有舊典追命外祖以篤親親其追封謚皇太后父竦為襃親愍侯比靈文順成恩成侯魂而有靈嘉斯寵榮好爵顯服以慰母心遣中謁者與嫕及扈備禮西迎竦喪詣京師改殯賜東園畫棺玉匣衣衾建塋於恭懷皇后陵傍帝親臨送葬百官畢會徵還竦妻子封子棠為樂平侯棠弟雍乘氏侯雍弟翟單父侯邑各五千戶位皆特進賞賜第宅奴婢車馬兵弩什物以巨萬計寵遇光於當世諸梁內外以親疎並補郎謁者棠官至大鴻臚雍少府棠卒子安國嗣延光中為侍中有罪免官諸梁為郎吏者皆坐免商字伯夏雍之子也少以外戚拜郎中遷黃門侍郎永建元年襲父封乘氏侯三年順帝選商女及妹入掖庭遷侍中屯騎校尉陽嘉元年女立為皇后妹為貴人加商位特進更增國土賜安車駟馬其歲拜執金吾二年封子冀為襄邑侯商讓不受三年以商為大將軍固稱疾不起四年使太常桓焉奉策就第即拜商乃詣闕受命明年夫人陰氏薨追號開封君贈印綬商自以戚屬居大位每存謙柔虛己進賢辟漢陽巨覽上黨陳龜為掾屬李固周舉為從事中郎於是京師翕然稱為良輔帝委重焉每有飢饉輒載租穀於城門賑與貧餧不宣己惠檢御門族未曾以權盛干法而性慎弱無威斷頗溺於內豎以小黃門曹節等用事於中遂遣子冀不疑與為交友然宦者忌商寵任反欲陷之永和四年中常侍張逵蘧政內者令石光尚方令傅福從僕射杜永連謀共譖商及中常侍曹騰孟賁云欲徵諸王子圖議廢立請收商等案罪帝曰大將軍父子我所親騰賁我所愛必無是但汝曹共妒之耳逵等知言不用懼迫遂出矯詔收縛騰賁於省中帝聞震怒勑宦者李歙急呼騰賁釋之收逵等悉伏誅辭所連染及在位大臣商懼多侵枉乃上疏曰春秋之義功在元帥罪止首惡故賞不僭溢刑不淫濫五帝三王所以同致康乂也竊聞考中常侍張逵等辭語多所牽及大獄一起無辜者衆死囚久繫纖微成大非所以順迎和氣平政成化也宜早訖竟以止逮捕之煩帝乃納之罪止坐者六年秋商病篤勑子冀等曰吾以不德享受多福生無以輔益朝廷死必耗費帑臧衣衾飯唅玉匣珠貝之屬何益朽骨百僚勞擾紛華道路秖增塵垢雖云禮制亦有權時方今邊境不寧盜賊未息豈宜重為國損氣絕之後載至冢舍即時殯斂斂以時服皆以故衣無更裁制殯已開冢冢開即葬祭食如存無用三牲孝子善述父志不宜違我言也及薨帝親臨喪諸子欲從其誨朝廷不聽賜以東園朱壽之器銀鏤黃腸玉匣什物二十八種錢二百萬布三千匹皇后錢五百萬布萬匹及葬贈輕車介士賜謚忠侯中宮親送帝幸宣陽亭瞻望車騎子冀嗣冀字伯卓為人鳶肩豺目洞精矘眄口吟舌言裁能書計少為貴戚逸游自恣性嗜酒能挽滿彈格五六博蹴鞠意錢之戲又好臂鷹走狗騁馬鬬雞初為黃門侍郎轉侍中虎賁中郎將越騎步兵校尉執金吾永和元年拜河南尹冀居職暴恣多非法父商所親客洛陽令呂放頗與商言及冀之短商以讓冀冀即遣人於道刺殺放而恐商知之乃推疑於放之怨仇請以放弟禹為洛陽令使捕之盡滅其宗親賓客百餘人商薨未及葬順帝乃拜冀為大將軍弟侍中不疑為河南尹及帝崩沖帝始在繈褓太后臨朝詔冀與太傅趙峻太尉李固參錄尚書事冀雖辭不肯當而侈暴滋甚沖帝又崩冀立質帝帝少而聰慧知冀驕橫嘗朝羣臣目冀曰此跋扈將軍也冀聞深惡之遂令左右進鴆加餅帝即日崩復立桓帝而枉害李固及前太尉杜喬海內嗟懼語在李固傳建和元年益封冀萬三千戶增大將軍府舉高第茂才官屬倍於三公又封不疑為潁陽侯不疑弟蒙西平侯冀子胤襄邑侯各萬戶和平元年重增封冀萬戶并前所襲合三萬戶弘農人宰宣素性佞邪欲取媚於冀乃上言大將軍有周公之功今既封諸子則其妻宜為邑君詔遂封冀妻孫壽為襄城君兼食陽翟租歲入五千萬加賜赤紱比長公主壽色美而善為妖態作愁眉嗁墯馬髻折步齲齒笑以為媚惑冀亦改易輿服之制作平上軿車埤幘狹冠折上巾擁身扇狐尾單衣壽性鉗忌能制御冀冀甚寵憚之初父商獻美人友通期於順帝通期有微過帝以歸商商不敢留而出嫁之冀即遣客盜還通期會商薨冀行服於城西私與之居壽伺冀出多從倉頭篡取通期歸截髮刮面笞掠之欲上書告其事冀大恐頓首請於壽母壽亦不得已而止冀猶復與私通生子伯玉匿不敢出壽尋知之使子胤誅滅友氏冀慮壽害伯玉常置複壁中冀愛監奴秦宮官至太倉令得出入壽所壽見宮輒屏御者託以言事因與私焉宮內外兼寵威權大震刺史二千石皆謁辭之冀用壽言多斥奪諸梁在位者外以謙讓而實崇孫氏宗親冒名而為侍中卿校尉郡守長吏者十餘人皆貪叨凶淫各遣私客籍屬縣富人被以它罪閉獄掠拷使出錢自贖貲物少者至於死徙扶風人士孫奮居富而性吝冀因以馬乘遺之從貸錢五千萬奮以三千萬與之冀大怒乃告郡縣認奮母為其守臧婢云盜白珠十斛紫金千斤以叛遂收考奮兄弟死於獄中悉沒貲財億七千餘萬其四方調發歲時貢獻皆先輸上第於冀乘輿乃其次焉吏人齎貨求官請罪者道路相望冀又遣客出塞交通外國廣求異物因行道路發取妓伎女御者而使人復乘埶橫暴妻略婦女敺擊吏卒所在怨毒冀乃大起第舍而壽亦對街為宅殫極土木互相誇競堂寢皆有陰陽奧室連房洞戶柱壁雕鏤加以銅漆窻牖皆有綺疎青瑣圖以雲氣仙靈臺閣周通更相臨望飛梁石蹬陵跨水道金玉珠璣異方珍怪充積臧室遠致汗血名馬又廣開園囿採土築山十里九坂以像二崤深林絕澗有若自然奇禽馴獸飛走其閒冀壽共乘輦車張羽蓋飾以金銀游觀第內多從倡伎鳴鍾吹管酣謳竟路或連繼日夜以騁娛恣客到門不得通皆請謝門者門者累千金又多拓林苑禁同王家西至弘農東界滎陽南極魯陽北達河淇包含山藪遠帶丘荒周旋封域殆將千里又起菟苑於河南城西經亙數十里發屬縣卒徒繕修樓觀數年乃成移檄所在調發生菟刻其毛以為識人有犯者罪至刑死嘗有西域賈胡不知禁忌誤殺一兔轉相告言坐死者十餘人冀二弟嘗私遣人出獵上黨冀聞而捕其賓客一時殺三十餘人無生還者冀又起別第於城西以納姦亡或取良人悉為奴婢至數千人名曰自賣人元嘉元年帝以冀有援立之功欲崇殊典乃大會公卿共議其禮於是有司奏冀入朝不趨劒履上殿謁讚不名禮儀比蕭何悉以定陶陽成陽餘戶增封為四縣比鄧禹賞賜金錢奴婢綵帛車馬衣服甲第比霍光以殊元勳每朝會與三公絕席十日一入平尚書事宣布天下為萬世法冀猶以所奏禮薄意不悅專擅威柄凶恣日積機事大小莫不諮決之宮衛近侍並所親樹禁省起居纖微必知百官遷召皆先到冀門牋檄謝恩然後敢詣尚書下邳人吳樹為宛令之官辭冀冀賓客布在縣界以情託樹樹對曰小人姦蠹比屋可誅明將軍以椒房之重處上將之位宜崇賢善以補朝闕宛為大都士之淵藪自侍坐以來未聞稱一長者而多託非人誠非敢聞冀嘿然不悅樹到縣遂誅殺冀客為人害者數十人由是深怨之樹後為荊州刺史臨去辭冀冀為設酒因鴆之樹出死車上又遼東太守侯猛初拜不謁冀託以它事乃斬之時郎中汝南袁著年十九見冀凶縱不勝其憤乃詣闕上書曰臣聞仲尼歎鳳鳥不至河不出圖自傷卑賤不能致也今陛下居得致之位又有能致之資而和氣未應賢愚失序者埶分權臣上下壅隔之故也夫四時之運功成則退高爵厚寵鮮不致災今大將軍位極功成可為至戒宜遵懸車之禮高枕頤神傳曰木實繁者披枝害心若不抑損權盛將無以全其身矣左右聞臣言將側目切齒臣特以童蒙見拔故敢忘忌諱昔舜禹相戒無若丹朱周公戒成王無如殷王紂願除誹謗之罪以開天下之口書得奏御冀聞而密遣掩捕著著乃變易姓名後託病偽死結蒲為人市棺殯送冀廉問知其詐陰求得笞殺之隱蔽其事學生桂陽劉常當世名儒素善於著冀召補令史以辱之時太原郝絜胡武皆危言高論與著友善先是絜等連名奏記三府薦海內高士而不詣冀冀追怒之又疑為著黨勑中都官移檄捕前奏記者並殺之遂誅武家死者六十餘人絜初逃亡知不得免因輿櫬奏書冀門書入仰藥而死家乃得全及冀誅有詔以禮祀著等冀諸忍忌皆此類也不疑好經書善待士冀陰疾之因中常侍白帝轉為光祿勳又諷衆人共薦其子胤為河南尹胤一名胡狗時年十六容貌甚陋不勝冠帶道路見者莫不蚩笑焉不疑自恥兄弟有隙遂讓位歸第與弟蒙閉門自守冀不欲令與賓客交通陰使人變服至門記往來者南郡太守馬融江夏太守田明初除過謁不疑冀諷州郡以它事陷之皆髡笞徙朔方融自刺不殊明遂死於路永興二年封不疑子馬為潁陰侯胤子桃為城父侯冀一門前後七封侯三皇后六貴人二大將軍夫人女食邑稱君者七人尚公主者三人其餘卿將尹校五十七人在位二十餘年窮極滿盛威行內外百僚側目莫敢違命天子恭己而不得有所親豫帝既不平之延熹元年太史令陳授因小黃門徐璜陳災異日食之變咎在大將軍冀聞之諷洛陽令收考授死於獄帝由此發怒初掖庭人鄧香妻宣生女猛香卒宣更適梁紀梁紀者冀妻壽之舅也壽引進猛入掖庭見幸為貴人冀因欲認猛為其女以自固乃易猛姓為梁時猛姊壻邴尊為議郎冀恐尊沮敗宣意乃結刺客於偃城刺殺尊而又欲殺宣宣家在延熹里與中常侍袁赦相比冀使刺客登赦屋欲入宣家赦覺之鳴鼓會衆以告宣宣馳入以白帝帝大怒遂與中常侍單超具瑗唐衡左悺徐璜等五人成謀誅冀語在宦者傳冀心疑超等乃使中黃門張惲入省宿以防其變具瑗勑吏收惲以輒從外入欲圖不軌帝因是御前殿召諸尚書入發其事使尚書令尹勳持節勒丞郎以下皆操兵守省閣斂諸符節送省中使黃門令具瑗將左右廄騶虎賁羽林都候劒戟士合千餘人與司隸校尉張彪共圍冀第使光祿勳袁盱持節收冀大將軍印綬徙封比景都鄉侯冀及妻壽即日皆自殺悉收子河南尹胤叔父屯騎校尉讓及親從衛尉淑越騎校尉忠長水校尉戟等諸梁及孫氏中外宗親送詔獄無長少皆棄市不疑蒙先卒其它所連及公卿列校刺史二千石死者數十人故吏賓客免黜者三百餘人朝廷為空唯尹勳袁盱及廷尉邯鄲義在焉是時事卒從中發使者交馳公卿失其度官府市里鼎沸數日乃定百姓莫不稱慶收冀財貨縣官斥賣合三十餘萬萬以充王府用減天下稅租之半散其苑囿以業窮民錄誅冀功者封尚書令尹勳以下數十人論曰順帝之世梁商稱為賢輔豈以其地居亢滿而能以愿謹自終者乎夫宰相運動樞極感會天人中於道則易以興政乖於務則難乎御物商協回天之埶屬彫弱之期而匡朝卹患未聞上術憔悴之音載謠人口雖輿粟盈門何救阻飢之戹永言終制未解尸官之尤況乃傾側孽臣傳寵凶嗣以至破家傷國而豈徒然哉贊曰河西佐漢統亦定筭襃親幽憤升高累歎商恨善柔冀遂貪亂
