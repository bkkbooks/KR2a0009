body:
  text: 後漢書卷三十三朱馮虞鄭周列傳第二十三朱浮字叔元沛國蕭人也初從光武為大司馬主簿遷偏將軍從破邯鄲光武遣吳漢誅更始幽州牧苗曾乃拜浮為大將軍幽州牧守薊城遂討定北邊建武二年封舞陽侯食三縣浮年少有才能頗欲厲風迹收士心辟召州中名宿涿郡王岑之屬以為從事及王莽時故吏二千石皆引置幕府乃多發諸郡倉穀稟贍其妻子漁陽太守彭寵以為天下未定師旅方起不宜多置官屬以損軍實不從其令浮性矜急自多頗有不平因以峻文詆之寵亦佷強兼負其功嫌怨轉積浮密奏寵遣吏迎妻而不迎其母又受貨賄殺害友人多聚兵穀意計難量寵既積怨聞之遂大怒而舉兵攻浮浮以書質責之曰於鄭也權時救急二者皆為國耳即疑浮相譖何不詣闕自陳而為族滅之計乎朝廷之於伯通恩亦厚矣委以大郡任以威武事有柱石之寄情同子孫之親匹夫媵母尚能致命一餐豈有身帶三綬職典大邦而不顧恩義生心外畔者乎伯通與吏人語何以為顏行步拜起何以為容坐臥念之何以為心引鏡窺影何施眉目舉措建功何以為人惜乎棄休令之嘉名造梟鴟之逆謀捐傳世之慶祚招破敗之重災高論堯舜之道不忍桀紂之性生為世笑死為愚鬼不亦哀乎伐以為功高天下往時遼東有豕生子白頭異而獻之行至河東見羣豕皆白懷慙而還若以子之功論於朝廷則為遼東豕也今乃愚妄自比六國六國之時其埶各盛廓土數千里勝兵將百萬故能據國相持多歷年世今天下幾里列郡幾城柰何以區區漁陽而結怨天子此猶河濱之人捧土以塞孟津多見其不知量也盛時內聽驕婦之失計外信讒邪之諛言長為羣后惡法永為功臣鑒戒豈不誤哉定海內者無私讎勿以前事自誤願留意顧老母幼弟凡舉事無為親厚者所痛而為見讎者所快時二郡畔戾北州憂恐浮以為天子必自將兵討之而但遣游擊將軍鄧隆陰助浮浮懷懼以為帝怠於敵不能救之乃上疏曰昔楚宋列國俱為諸侯莊王以宋執其使遂有投袂之師魏公子顧朋友之要觸冒強秦之鋒夫楚魏非有分職匡正之大義也莊王但為爭強而發忿公子以一言而立信耳今彭寵反畔張豐逆節以為陛下必棄捐它事以時滅之既歷時月寂寞無音從圍城而不救放逆虜而不討臣誠惑之昔高祖聖武天下既定猶身自征伐未嘗寧居陛下雖興大業海內未集而獨逸豫不顧北垂百姓遑遑無所繫心三河冀州曷足以傳後哉今秋稼已孰復為漁陽所掠張豐狂悖姦黨日增連年拒守吏士疲勞甲冑生蟣蝨弓弩不得薥上下燋心相望救護仰希陛下生活之恩詔報曰往年赤眉跋扈長安吾策其無穀必東果來歸降今度此反虜埶無久全其中必有內相斬者今軍資未充故須後麥耳浮城中糧盡人相食會上谷太守耿況遣騎來救浮浮乃得遁走南至良鄉其兵長反遮之浮恐不得脫乃下馬刺殺其妻僅以身免城降於寵尚書令侯霸奏浮敗亂幽州構成寵罪徒勞軍師不能死節罪當伏誅帝不忍以浮代賈復為執金吾徙封父城侯後豐寵並自敗帝以二千石長吏多不勝任時有纖微之過者必見斥罷交易紛擾百姓不寧六年有日食之異浮因上疏曰臣聞日者衆陽之所宗君上之位也凡居官治民據郡典縣皆為陽為上為尊為長若陽上不明尊長不足則干動三光垂示王者五典紀國家之政鴻範別災異之文皆宣明天道以徵來事者也陛下哀臣攵心海內新離禍毒保宥生人使得蘇息而今牧人之吏多未稱職小違理實輒見斥罷豈不粲然黑白分明哉然以堯舜之盛猶加三考大漢之興亦累功効吏皆積久養老於官至名子孫因為氏姓當時吏職何能悉理論議之徒豈不諠譁蓋以為天地之功不可倉卒艱難之業當累日也而閒者守宰數見換易迎新相代疲勞道路尋其視事日淺未足昭見其職既加嚴切人不自保各相顧望無自安之心有司或因睚眦以騁私怨苟求長短求媚上意二千石及長吏迫於舉劾懼於刺譏故爭飾詐偽以希虛譽斯皆羣陽騷動日月失行之應夫物暴長者必夭折功卒成者必亟壞如摧長久之業而造速成之功非陛下之福也天下非一時之用也海內非一旦之功也願陛下遊意於經年之外望化於一世之後天下幸甚帝下其議羣臣多同於浮自是牧守易代頗簡舊制州牧奏二千石長吏不任位者事皆先下三公三公遣掾史案驗然後黜退帝時用明察不復委任三府而權歸刺舉之吏浮復上疏曰陛下清明履約率禮無違自宗室諸王外家后親皆奉遵繩墨無黨埶之名至或乘牛車齊於編人斯固法令整齊下無作威者也求之於事宜以和平而災異猶見者而豈徒然天道信誠不可不察竊見陛下疾往者上威不行下專國命即位以來不用舊典信刺舉之官黜鼎輔之任至於有所劾奏便加免退覆案不關三府罪譴不蒙澄察陛下以使者為腹心而使者以從事為耳目是為尚書之平決於百石之吏故羣下苛刻各自為能兼以私情容長憎愛在職皆競張空虛以要時利故有罪者心不厭服無咎者坐被空文不可經盛衰貽後王也夫事積久則吏自重吏安則人自靜傳曰五年再閏天道乃備夫以天地之靈猶五載以成其化況人道哉臣浮愚戇不勝惓惓願陛下留心千里之任省察偏言之奏七年轉太僕浮又以國學既興宜廣博士之選乃上書曰夫太學者禮義之宮教化所由興也陛下尊敬先聖垂意古典宮室未飾干戈未休而先建太學進立橫舍比日車駕親臨觀饗將以弘時雍之化顯勉進之功也尋博士之官為天下宗師使孔聖之言傳而不絕舊事策試博士必廣求詳選爰自畿夏延及四方是以博舉明經唯賢是登學者精勵遠近同慕伏聞詔書更試五人唯取見在洛陽城者臣恐自今以往將有所失求之密邇容或未盡而四方之學無所勸樂凡策試之本貴得其真非有期會不及遠方也又諸所徵試皆私自發遣非有傷費煩擾於事也語曰中國失禮求之於野臣浮幸得與講圖讖故敢越職帝然之二十年代竇融為大司空二十二年坐賣弄國恩免二十五年徙封新息侯帝以浮陵轢同列每銜之惜其功能不忍加罪永平中有人單辭告浮事者顯宗大怒賜浮死長水校尉樊儵鯈言於帝曰唐堯大聖兆人獲所尚優遊四凶之獄厭服海內之心使天下咸知然後殛罰浮事雖昭明而未達人聽宜下廷尉章著其事帝亦悔之論曰吳起與田文論功文不及者三朱買臣難公孫弘十策弘不得其一終之田文相魏公孫宰漢誠知宰相自有體也故曾子曰君子所貴乎道者三籩豆之事則有司存而光武明帝躬好吏事亦以課覈三公其人或失而其禮稍薄至有誅斥詰辱之累任職責過一至於此追感賈生之論不亦篤乎朱浮譏諷苛察欲速之弊然矣焉得長者之言哉馮魴字孝孫南陽湖陽人也其先魏之支別食菜馮城因以氏焉秦滅魏遷于湖陽為郡族姓王莽末四方潰畔魴乃聚賓客招豪桀作營以待所歸是時湖陽大姓虞都尉反城稱兵先與同縣申屠季有仇而殺其兄謀滅季族季亡歸魴魴將季欲還其營道逢都尉從弟長卿來欲執季魴叱長卿曰我與季雖無素故士窮相歸要當以死任之卿為何言遂與俱歸季謝曰蒙恩得全死無以為報恩有牛馬財物願悉獻之魴作色曰吾老親弱弟皆在賊城中今日相與尚無所顧何云財物乎季慙不敢復言魴自是為縣邑所敬信故能據營自固時天下未定而四方之士擁兵矯稱者甚衆唯魴自守兼有方略光武聞而嘉之建武三年徵詣行在所見於雲臺拜虞令為政敢殺伐以威信稱遷郟令後車駕西征隗囂潁川盜賊羣起郟賊延襃等衆三千餘人攻圍縣舍魴率吏士七十許人力戰連日弩矢盡城陷魴乃遁去帝聞郡國反即馳赴潁川魴詣行在所帝案行鬬處知魴力戰乃嘉之曰此健令也所當討擊勿拘州郡襃等聞帝至皆自髡剔負鈇鑕將其衆請罪帝且赦之使魴轉降諸聚落縣中平定詔乃悉以襃等還魴誅之魴責讓以行軍法皆叩頭曰今日受誅死無所恨魴曰汝知悔過伏罪今一切相赦聽各反農桑為令作耳目皆稱萬歲是時每有盜賊並為襃等所發無敢動者縣界清靜十三年遷魏郡太守二十七年以高第入代趙憙為太僕中元元年從東封岱宗行衞尉事還代張純為司空賜爵關內侯二年帝崩使魴持節起原陵更封楊邑鄉侯食三百五十戶永平四年坐考隴西太守鄧融聽任姦吏策免削爵土六年顯宗幸魯復行衞尉事七年代陰嵩為執金吾魴性矜嚴公正在位數進忠言多見納用十四年詔復爵土明年東巡郡國留魴宿衞南宮建初三年以老病乞身肅宗許之其冬為五更詔魴朝賀就列侯位元和二年卒時年八十六子柱嗣尚顯宗女獲嘉長公主少為侍中以恭肅謙約稱位至將作大匠柱卒子定嗣官至羽林中郎將定卒無子國除定弟石襲母公主封獲嘉侯亦為侍中稍遷衞尉能取悅當世為安帝所寵帝嘗幸其府留飲十許日賜駁犀具劒佩刀紫艾綬玉玦各一拜子世為黃門侍郎世弟二人皆郎中自永初兵荒王侯租秩多不充於是特詔以它縣租稅足石令如舊限歲入穀三萬斛錢四萬遷光祿勳遂代楊震為太尉及北鄉侯立遷太傅與太尉東萊劉喜參錄尚書事順帝既立石與喜皆以阿黨閻顯江京等策免復為衞尉卒子代嗣代卒弟承嗣為步兵校尉石弟珖和帝時詔封楊邑侯亦以石寵官至城門校尉卒子肅嗣為黃門侍郎虞延字子大陳留東昏人也延初生其上有物若一匹練遂上升天占者以為吉及長長八尺六寸要帶十圍力能扛鼎少為戶牖亭長時王莽貴人魏氏賓客放從延率吏卒突入其家捕之以此見怨故位不升性敦朴不拘小節又無鄉曲之譽王莽末天下大亂延常嬰甲冑擁衞親族扞禦鈔盜賴其全者甚衆延從女弟年在孩乳其母不能活之棄於溝中延聞其號聲哀而收之養至成人建武初仕執金吾府除細陽令每至歲時伏臘輒休遣徒繫各使歸家並感其恩德應期而還有囚於家被病自載詣獄既至而死延率掾吏史殯于門外百姓感悅之後去官還鄉里太守富宗聞延名召署功曹宗性奢靡車服器物多不中節延諫曰昔晏嬰輔齊鹿裘不完季文子相魯妾不衣帛以約失之者鮮矣宗不悅延即辭退居有頃宗果以侈從被誅臨當伏刑擥涕而歎曰恨不用功曹虞延之諫光武聞而奇之二十年東巡路過小黃高帝母昭靈后園陵在焉時延為部督郵詔呼引見問園陵之事延進止從容占拜可觀其陵樹株蘖皆諳其數俎豆犧牲頗曉其禮帝善之勑延從駕到魯還經封丘城門門下小不容羽蓋帝怒使撻侍御史延因下見引咎以為罪在督郵言辭激揚有感帝意乃制誥曰以陳留督郵虞延故貰御史罪延從送車駕西盡郡界賜錢及劒帶佩刀還郡於是聲名遂振二十三年司徒玉況辟焉時元正朝賀帝望而識延遣小黃門馳問之即日召拜公車令明年遷洛陽令是時陰氏有客馬成者常為姦盜延收考之陰氏屢請獲一書輒加篣二百信陽侯陰就乃訴帝譖延多所冤枉帝乃臨御道之館親錄囚徒延陳其獄狀可論者在東無理者居西成乃回欲趨東延前執之謂曰爾人之巨蠹久依城社不畏熏燒今考實未竟宜當盡法成大呼稱枉陛戟郎以戟刺延叱使置之帝知延不私謂成曰汝犯王法身自取之呵使速去後數日伏誅於是外戚斂手莫敢干法在縣三年遷南陽太守永平初有新野功曹鄧衍以外戚小侯每豫朝會而容姿趨步有出於衆顯宗目之顧左右曰朕之儀貌豈若此人特賜輿馬衣服延以衍雖有容儀而無實行未嘗加禮帝既異之乃詔衍令自稱南陽功曹詣闕既到拜郎中遷玄武司馬衍在職不服父喪帝聞之乃歎曰知人則哲惟帝難之信哉斯言衍慙而退由是以延為明三年徵代趙憙為太尉八年代范遷為司徒歷位二府十餘年無異政績會楚王英謀反陰氏欲中傷之使人私以楚謀告延延以英藩戚至親不然其言又欲辟幽州從事公孫弘以弘交通楚王而止並不奏聞及英事發覺詔書切讓延遂自殺家至清貧子孫不免寒餧延從曾孫放字子仲少為太尉楊震門徒及震被讒自殺順帝初放詣闕追訟震罪由是知名桓帝時為尚書以議誅大將軍梁冀功封都亭侯後為司空坐水災免性疾惡宦官遂為所陷靈帝初與長樂少府李膺等俱以黨事誅鄭弘字巨君會稽山陰人也從祖吉宣帝時為西域都護弘少為鄉嗇夫太守第五倫行春見而深奇之召署督郵舉孝廉弘師同郡河東太守焦貺楚王英謀反發覺以疏引貺貺被收捕疾病於道亡沒妻子閉繫詔獄掠考連年諸生故人懼相連及皆改變名姓以逃其禍弘獨髡頭負鈇鑕詣闕上章為貺訟罪顯宗覺悟即赦其家屬弘躬送貺喪及妻子還鄉里由是顯名拜為騶令政有仁惠民稱蘇息遷淮陰陽太守四遷建初初為尚書令舊制尚書郎限滿補縣長令史丞尉弘奏以為臺職雖尊而酬賞甚薄至於開選多無樂者請使郎補千石令令史為長帝從其議弘前後所陳有補益王政者皆著之南宮以為故事出為平原相徵拜侍中建初八年代鄭衆為大司農舊交阯七郡貢獻轉運皆從東冶汎海而至風波艱阻沈溺相係弘奏開零陵桂陽嶠道於是夷通至今遂為常路在職二年所息省三億萬計時歲天下遭旱邊方有警人食不足而帑藏殷積弘又奏宜省貢獻減徭費以利飢人帝順其議元和元年代鄧彪為太尉時舉將第五倫為司空班次在下每正朔朝見弘曲躬而自卑帝問知其故遂聽置雲母屏風分隔其閒由此以為故事在位四年奏尚書張林阿附侍中竇憲而素行臧穢又上洛陽令楊光憲之賓客在官貪殘並不宜處位書奏吏與光故舊因以告之光報憲憲奏弘大臣漏泄密事帝詰讓弘收上印綬弘自詣廷尉詔勑出之因乞骸骨歸未許病篤上書陳謝并言竇憲之短帝省章遣醫占弘病比至已卒臨歿悉還賜物勑妻子褐巾布衣素棺殯殮以還鄉里周章字次叔南陽隨人也初仕郡為功曹時大將軍竇憲免封冠軍侯就國章從太守行春到冠軍太守猶欲謁之章進諫曰今日公行春豈可越儀私交且憲椒房之親埶傾王室而退就藩國禍福難量明府剖符大臣千里重任舉止進退其可輕乎太守不聽遂便升車章前拔佩刀絕馬鞅於是乃止及憲被誅公卿以下多以交關得罪太守幸免以此重章舉孝廉六遷為五官中郎將延平元年為光祿勳永初元年代魏霸為太常其冬代尹勤為司空是時中常侍鄭衆蔡倫等皆秉埶豫政章數進直言初和帝崩鄧太后以皇子勝有痼疾不可奉承宗廟貪殤帝孩抱養為己子故立之以勝為平原王及殤帝崩羣臣以勝疾非痼意咸歸之太后以前既不立恐後為怨乃立和帝兄清河孝王子祐是為安帝章以衆心不附遂密謀閉宮門誅車騎將軍鄧騭兄弟及鄭衆蔡倫劫尚書廢太后於南宮封帝為遠國王而立平原王勝事覺勝策免章自殺家無餘財諸子易衣而出并日而食論曰孔子稱可與立未可與權權也者反常者也將從反常之事必資非常之會使夫舉無違妄志行名全周章身非負圖之託德乏萬夫之望主無絕天之舋地有既安之埶而創慮於難圖希功於理絕不已悖乎如令君器易以下議即斗筲必能叨天業狂夫豎臣亦自奮矣孟軻有言曰有伊尹之心則可無伊尹之心則篡矣於戲方來之人戒之哉贊曰朱定北州激成寵尤魴用降帑延感歸囚鄭竇怨偶代相為仇周章反道小智大謀
