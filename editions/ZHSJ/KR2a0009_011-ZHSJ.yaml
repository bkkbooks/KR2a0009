body:
  text: 後漢書卷十上皇后紀第十上夏殷以上后妃之制其文略矣周禮王者立后三夫人九嬪二十七世婦八十一女御以備內職焉后正位宮闈同體天王夫人坐論婦禮九嬪掌教四德世婦主喪祭賓客女御序于王之燕寢頒官分務各有典司女史彤管記功書過居有保阿之訓動有環佩之響進賢才以輔佐君子哀窈窕而不淫其色所以能述宣陰化修成內則閨房肅雍險謁不行也故康王晚朝關雎作諷宣后晏起姜氏請愆及周室東遷禮序凋缺諸侯僭縱軌制無章齊桓有如夫人者六人晉獻升戎女為元妃終於五子作亂冢嗣遘屯爰逮戰國風憲逾薄適情任欲顛倒衣裳以至破國亡身不可勝數斯固輕禮薥防先色後德者也秦并天下多自驕大宮備七國爵列八品漢興因循其號而婦制莫釐高祖帷薄不修孝文衽席無辯然而選納尚簡飾翫少華自武元之後世增淫費至乃掖庭三千增級十四妖倖毀政之符外姻亂邦之迹前史載之詳矣及光武中興斲彫為朴六宮稱號唯皇后貴人貴人金印紫綬奉不過粟數十斛又置美人宮人采女三等並無爵秩歲時賞賜充給而已漢法常因八月筭人遣中大夫與掖庭丞及相工於洛陽鄉中閱視良家童女年十三以上二十已下姿色端麗合法相者載還後宮擇視可否乃用登御所以明慎聘納詳求淑哲明帝聿遵先旨宮教頗修登建嬪后必先令德內無出閫之言權無私溺之授可謂矯其敝矣向使因設外戚之禁編著甲令改正后妃之制貽厥方來豈不休哉雖御己有度而防閒閑未篤故孝章以下漸用色授恩隆好合遂忘淄𢀿自古雖主幼時艱王家多釁必委成冢宰簡求忠賢未有專任婦人斷割重器唯秦羋太后始攝政事故穰侯權重於昭王家富於嬴國漢仍其謬知患莫改東京皇統屢絕權歸女主外立者四帝臨朝者六后莫不定策帷帟委事父兄貪孩童以久其政抑明賢以專其威任重道悠利深禍速身犯霧露於雲臺之上家嬰縲絏於圄犴之下湮滅連踵傾輈繼路而赴蹈不息燋爛為期終於陵夷大運淪亡神寶詩書所歎略同一揆故考列行跡以為皇后本紀雖成敗事異而同居正號者並列于篇其以私恩追尊非當時所奉者則隨它事附出親屬別事各依列傳其餘無所見則係之此紀以纘西京外戚云爾光武郭皇后諱聖通真定人也為郡著姓父昌讓田宅財產數百萬與異母弟國人義之仕郡功曹娶真定恭王女號郭主生后及子況昌早卒郭主雖王家女而好禮節儉有母儀之德更始二年春光武擊王郎至真定因納后有寵及即位以為貴人建武元年生皇子彊帝善況小心謹慎年始十六拜黃門侍郎二年貴人立為皇后彊為皇太子封況緜蠻侯以后弟貴重賓客輻湊況恭謙下士頗得聲譽十四年遷城門校尉其後后以寵稍衰數懷怨懟十七年遂廢為中山王太后進后中子右翊公輔為中山王以常山郡益中山國徙封況大國為陽安侯后從兄竟以騎都尉從征伐有功封為新郪侯官至東海相竟弟匡為發干侯官至太中大夫后叔父梁早終無子其壻南陽陳茂以恩澤封南侯二十年中山王輔復徙封沛王后為沛太后況遷大鴻臚帝數幸其第會公卿諸侯親家飲燕賞賜金錢縑帛豐盛莫比京師號況家為金穴二十六年后母郭主薨帝親臨喪送葬百官大會遣使者迎昌喪柩與主合葬追贈昌陽安侯印綬謚曰思侯二十八年后薨葬于北芒帝憐郭氏詔況子璜尚淯陽公主除璜為郎顯宗即位況與帝舅陰識陰就並為特進數授賞賜恩寵俱渥禮待陰郭每事必均永平二年況卒贈賜甚厚帝親自臨喪謚曰節侯子璜嗣元和三年肅宗北巡狩過真定會諸郭朝見上壽引入倡飲甚歡以太牢具上郭主冢賜粟萬斛錢五十萬永元初璜為長樂少府子舉為侍中兼射聲校尉及大將軍竇憲被誅薔憲女壻謀逆故父子俱下獄死家屬徙合浦宗族為郎吏者悉免官新郪侯竟初為騎將從征伐有功拜東海相永平中卒子嵩嗣嵩卒追坐染楚王英事國廢建初二年章帝紹封嵩子勤為伊亭侯勤無子國除發干侯匡官至太中大夫建武三十年卒子勳嗣勳卒子駿嗣永平十三年亦坐楚王英事失國建初三年復封駿為觀都侯卒無子國除郭氏侯者凡三人皆絕國論曰物之興衰情之起伏理有固然矣而崇替去來之甚者必唯寵惑乎當其接牀笫承恩色雖險情贅行莫不德焉及至移意愛析嬿私雖惠心妍狀愈獻醜焉愛升則天下不足容其高歡隊故九服無所逃其命斯誠志士之所沈溺君人之所抑揚未或違之者也郭后以衰離見貶恚怨成尤而猶恩加別館增寵黨戚至乎東海逡巡去就以禮使後世不見隆薄進退之隙不亦光於古乎光烈陰皇后諱麗華南陽新野人初光武適新野聞后美心悅之後至長安見執金吾車騎甚盛因歎曰仕宦當作執金吾娶妻當得陰麗華更始元年六月遂納后於宛當成里時年十九及光武為司隸校尉方西之洛陽令后歸新野及鄧奉起兵后兄識為之將后隨家屬徙淯陽止於奉舍光武即位令侍中傅俊迎后與胡陽寧平主諸宮人俱到洛陽以后為貴人帝以后雅性寬仁欲崇以尊位后固辭以郭氏有子終不肯當故遂立郭皇后建武四年從征彭寵生顯宗於元氏九年有盜劫殺后母鄧氏及弟訢帝甚傷之乃詔大司空曰吾微賤之時娶於陰氏因將兵征伐遂各別離幸得安全俱脫虎口以貴人有母儀之美宜立為后而固辭弗敢當列於媵妾朕嘉其義讓許封諸弟未及爵土而遭患逢禍母子同命愍傷于懷小雅曰將恐將懼惟予與汝將安將樂汝轉𠫓廾予風人之戒可不慎乎其追爵謚貴人父陸為宣恩哀侯弟訢為宣義恭侯以弟就嗣哀侯後及尸柩在堂使太中大夫拜授印綬如在國列侯禮魂而有靈嘉其寵榮十七年廢皇后郭氏而立貴人制詔三公曰皇后懷執怨懟數違教令不能撫循它子訓長異室宮闈之內若見鷹鸇既無關雎之德而有呂霍之風豈可託以幼孤恭承明祀今遣大司徒涉宗正吉持節其上皇后璽綬陰貴人鄉里車歸自微賤自我不見于今三年宜奉宗廟為天下母主者詳案舊典時上尊號異常之事非國休福不得上壽稱慶后在位恭儉少嗜玩不喜笑謔性仁孝多矜慈七歲失父雖已數十年言及未曾不流涕帝見常歎息顯宗即位尊后為皇太后永平三年冬帝從太后幸章陵置酒舊宅會陰鄧故人諸家子孫並受賞賜七年崩在位二十四年年六十合葬原陵明帝性孝愛追慕無已十七年正月當謁原陵夜夢先帝太后如平生歡既寤悲不能寐即案歷明旦日吉遂率百官及故客上陵其日降甘露於陵樹帝令百官采取以薦會畢帝從席前伏御牀視太后鏡奩中物感動悲涕令易脂澤裝具左右皆泣莫能仰視焉明德馬皇后諱某伏波將軍援之小女也少喪父母兄客卿敏惠早夭母藺夫人悲傷發疾慌惚后時年十歲幹理家事勑制僮御內外諮稟事同成人初諸家莫知者後聞之咸歎異焉后嘗久疾太夫人令筮之筮者曰此女雖有患狀而當大貴兆不可言也後又呼相者使占諸女見后大驚曰我必為此女稱臣然貴而少子若養它子者得力乃當踰於所生初援征五溪蠻卒於師虎賁中郎將梁松黃門侍郎竇固等因譖之由是家益失埶又數為權貴所侵侮后從兄嚴不勝憂憤白太夫人絕竇氏婚求進女掖庭乃上書曰臣叔父援孤恩不報而妻子特獲恩全戴仰陛下為天為父人情既得不死便欲求福竊聞太子諸王妃匹未備援有三女大者十五次者十四小者十三儀狀髮膚上中以上皆孝順小心婉靜有禮願下相工簡其可否如有萬一援不朽於黃泉矣又援姑姊妹並為成帝婕妤葬於延陵臣嚴幸得蒙恩更生冀因緣先姑當充後宮由是選后入太子宮時年十三奉承陰后傍接同列禮則脩備上下安之遂見寵異常居後堂顯宗即位以后為貴人時后前母姊女賈氏亦以選入生肅宗帝以后無子命令養之謂曰人未必當自生子但患愛養不至耳后於是盡心撫育勞悴過於所生肅宗亦孝性淳篤恩性天至母子慈愛始終無纖介之閒后常以皇嗣未廣每懷憂歎薦達左右若恐不及後宮有進見者每加慰納若數所寵引輒增隆遇永平三年春有司奏立長秋宮帝未有所言皇太后曰馬貴人德冠後宮即其人也遂立為皇后先是數日夢有小飛蟲無數赴著身又入皮膚中而復飛出既正位宮闈愈自謙肅身長七尺二寸方口美髮能誦易好讀春秋楚辭尤善周官董仲舒書常衣大練裙不加緣朔望諸姬主朝請望見后袍衣疎麤反以為綺縠就視乃笑后辭曰此繒特宜染色故用之耳六宮莫不歎息帝嘗幸苑囿離宮后輒以風邪露霧為戒辭意款備多見詳擇帝幸濯龍中並召諸中下邳王已下皆在側請呼皇后帝笑曰是家志不好樂雖來無歡是以遊娛之事希嘗從焉十五年帝案地圖將封皇子悉半諸國后見而言曰諸子裁食數縣於制不已儉乎帝曰我子豈宜與先帝子等乎歲給二千萬足矣時楚獄連年不斷囚相證引坐繫者甚眾后慮其多濫乘閒言及惻然帝感悟之夜起仿偟為思所納卒多有所降宥時諸將奏事及公卿較議難平者帝數以試后后輒分解趣理各得其情每於侍執之際輒言及政事多所毗補而未嘗以家私干欲故寵敬日隆始終無衰及帝崩肅宗即位尊后曰皇太后諸貴人當徙居南宮太后感析別之懷各賜王赤綬加安車駟馬白越三千端雜帛二千匹黃金十斤自撰顯宗起居注削去兄防參醫藥事帝請曰黃門舅旦夕供養且一年即無襃異又不錄勤勞無乃過乎太后曰吾不欲令後世聞先帝數親後宮之家故不著也建初元年帝欲封爵諸舅太后不聽明年夏大旱言事者以為不封外戚之故有司因此上奏宜依舊典太后詔曰凡言事者皆欲媚朕以要福耳昔王氏五侯同日俱封其時黃霧扒諢不聞澍雨之應又田蚡竇嬰寵貴橫恣傾覆之禍為世所傳故先帝防慎舅氏不令在樞機之位諸子之封裁令半楚淮陽諸國常謂我子不當與先帝子等今有司柰何欲以馬氏比陰氏乎吾為天下母而身服大練食不求甘左右但著帛布無香薰之飾者欲身率下也以為外親見之當傷心自勑但笑言太后素好儉前過濯龍門上見外家問起居者車如流水馬如游龍倉頭衣綠領袖正白顧視御者不及遠矣故不加譴怒但絕歲用而已冀以默愧其心而猶懈怠無憂國忘家之慮知臣莫若君況親屬乎吾豈可上負先帝之旨下虧先人之德重襲西京敗亡之禍哉固不許帝省詔悲歎復重請曰漢興舅氏之封侯猶皇子之為王也太后誠存謙虛柰何令臣獨不加恩三舅乎且衞尉年尊兩校尉有大病如令不諱使臣長抱刻骨之恨宜及吉時不可稽留太后報曰吾反覆念之思令兩善豈徒欲獲謙讓之名而使帝受不外施之嫌哉昔竇太后欲封王皇后之兄丞相條侯言受高祖約無軍功非劉氏不侯今馬氏無功於國豈得與陰郭中興之后等邪常觀富貴之家祿位重疊猶再實之木其根必傷且人所以願封侯者欲上奉祭祀下求溫飽耳今祭祀則受四方之珍衣食則蒙御府餘資斯豈不足而必當得一縣乎吾計之孰矣勿有疑也夫至孝之行安親為上今數遭變異穀價數倍憂惶晝夜不安坐臥而欲先營外封違慈母之拳拳乎吾素剛急有匈中氣不可不順也若陰陽調和邊境清靜然後行子之志吾但當含飴弄孫不能復關政矣時新平主家御者失火延及北閣後殿太后以為己過起居不歡時當謁原陵自引守備不慎慙見陵園遂不行初太夫人葬起墳微高太后以為言兄廖等即時減削其外親有謙素義行者輒假借溫言賞以財位如有纖介則先見嚴恪之色然後加譴其美車服不軌法度者便絕屬籍遣歸田里廣平鉅鹿樂成王車騎朴素無金銀之飾帝以白太后太后即賜錢各五百萬於是內外從化被服如一諸家惶恐倍於永平時乃置織室蠶於濯龍中數往觀視以為娛樂常與帝旦夕言道政事及教授諸小王論議經書述敘平生雍和終日四年天下豐稔方垂無事帝遂封三舅廖防光為列侯並辭讓願就關內侯太后聞之曰聖人設教各有其方知人情性莫能齊也吾少壯時但慕竹帛志不顧命今雖已老而復戒之在得故日夜惕厲思自降損居不求安食不念飽冀乘此道不負先帝所以化導兄弟共同斯志欲令瞑目之日無所復恨何意老志復不從哉萬年之日長恨矣廖等不得已受封爵而退位歸第焉太后其年寢疾不信巫祝小醫數勑絕禱祀至六月崩在位二十三年年四十餘合葬顯節陵賈貴人南陽人建武末選入太子宮中元二年生肅宗而顯宗以為貴人帝既為太后所養專以馬氏為幼故貴人不登極位賈氏親族無受寵榮者及太后崩乃策書加貴人王赤綬安車一駟永巷宮人二百御府雜帛二萬匹大司農黃金千斤錢二千萬諸史並闕後事故不知所終章德竇皇后諱某扶風平陵人大司徒空融之曾孫也祖穆父勳坐事死事在竇融傳勳尚東海恭王彊女沘陽公主后其長女也家既廢壞數呼相工問息耗見后者皆言當大尊貴非臣妾容貌年六歲能書親家皆奇之建初二年后與女弟俱以選例入見長樂宮進止有序風容甚盛肅宗先聞后有才色數以訊諸姬傅及見雅以為美馬太后亦異焉因入掖庭見於北宮章德殿后性敏給傾心承接稱譽日聞明年遂立為皇后妹為貴人七年追爵謚后父勳為安成思侯后寵幸殊特專固後宮初宋貴人生皇太子慶梁貴人生和帝后既無子並疾忌之數閒於帝漸致疎嫌因誣宋貴人挾邪媚道遂自殺廢慶為清河王語在慶傳梁貴人者襃親愍侯梁竦之女也少失母為伯母舞陰長公主所養年十六亦以建初二年與中姊俱選入掖庭為貴人四年生和帝后養為己子欲專名外家而忌梁氏八年乃作飛書以陷竦竦坐誅貴人姊妹以憂卒自是宮房惵息后愛日隆及帝崩和帝即位尊后為皇太后皇太后臨朝尊母沘陽公主為長公主益湯沐邑三千戶兄憲弟篤景並顯貴威權後遂密謀不軌永元四年發覺被誅九年太后崩未及葬而梁貴人姊嬺嫕上書陳貴人枉歿之狀太尉張酺司徒劉方司空張奮上奏依光武黜呂太后故事貶太后尊號不宜合葬先帝百官亦多上言者帝手詔曰竇氏雖不遵法度而太后常自減損朕奉事十年深惟大義禮臣子無貶尊上之文恩不忍離義不忍虧案前世上官太后亦無降黜其勿復議於是合葬敬陵在位十八年帝以貴人酷歿斂葬禮闕乃改殯於承光宮上尊謚曰恭懷皇后追服喪制百官縞素與姊大貴人俱葬西陵儀比敬園和帝陰皇后諱某光烈皇后兄執金吾識之曾孫也后少聰慧善書蓺永元四年選入掖庭以先后近屬故得為貴人有殊寵八年遂立為皇后自和熹鄧后入宮愛寵稍衰數有恚恨后外祖母鄧朱出入宮掖十四年夏有言后與朱共挾巫蠱道事發覺帝遂使中常侍張慎與尚書陳襃於掖庭獄雜考案之朱及二子奉毅與后弟軼輔敞辭語相連及以為祠祭祝詛大逆無道奉毅輔考死獄中帝使司徒魯恭持節賜后策上璽綬遷于桐宮以憂死立七年葬薔重部父特進綱自殺軼敞及朱家屬徙日南比景縣宗親外內昆弟皆免官還田里永初四年鄧太后詔赦陰氏諸徙者悉歸故郡還其資財五百餘萬和熹鄧皇后諱綏太傅禹之孫也父訓護羌校尉母陰氏光烈皇后從弟女也后年五歲太傅夫人愛之自為翦髮夫人年高目冥誤傷后額忍痛不言左右見者怪而問之后曰非不痛也太夫人哀憐為斷髮難傷老人意故忍之耳六歲能史書十二通詩論語諸兄每讀經傳輒下意難問志在典籍不問居家之事母常非之曰汝不習女工以供衣服乃更務學寧當舉博士邪后重違母言晝修婦業暮誦經典家人號曰諸生父訓異之事無大小輒與詳議永元四年當以選入會訓卒后晝夜號泣終三年不食鹽菜憔悴毀容親人不識之后嘗夢捫天蕩蕩正青若有鍾乳狀乃仰嗽飲之以訊諸占夢言堯夢攀天而上湯夢及天而咶之斯皆聖王之前占吉不可言又相者見后驚曰此成湯之法也家人竊喜而不敢宣后叔父陔言常聞活千人者子孫有封兄訓為謁者使修石臼河歲活數千人天道可信家必蒙福初太傅禹歎曰吾將百萬之眾未嘗妄殺一人其後世必有興者七年后復與諸家子俱選入宮后長七尺二寸姿顏姝麗絕異於眾左右皆驚八年冬入掖庭為貴人時年十六恭肅小心動有法度承事陰后夙夜戰兢接撫同列常克己以下之雖宮人隸役皆加恩借帝深嘉愛焉及后有疾特令后母兄弟入視醫藥不限以日數后言於帝曰宮禁至重而使外舍久在內省上令陛下有幸私之譏下使賤妾獲不知足之謗上下交損誠不願也帝曰人皆以數入為榮貴人反以為憂深自抑損誠難及也每有讌會諸姬貴人競自修整簪珥光采袿裳鮮明而后獨著素裝服無飾其衣有與陰后同色者即時解易若並時進見則不敢正坐離立行則僂身自卑帝每有所問常逡巡後對不敢先陰后言帝知后勞心曲體歎曰修德之勞乃如是乎後陰后漸疎每當御見輒辭以疾時帝數失皇子后憂繼嗣不廣恆垂涕歎息數選進才人以博帝意陰后見后德稱日盛不知所為遂造祝詛欲以為害帝嘗寢病危甚陰后密言我得意不令鄧氏復有遺類后聞乃對左右流涕言曰我竭誠盡心以事皇后竟不為所祐而當獲罪於天婦人雖無從死之義然周公身請武王之命越姬心誓必死之分上以報帝之恩中以解宗族之禍下不令陰氏有人豕之譏即欲飲藥宮人趙玉者固禁之因詐言屬有使來上疾已愈后信以為然乃止明日帝果瘳十四年夏陰后以巫蠱事廢后請救不能得帝便屬意焉后愈稱疾篤深自閉絕會有司奏建長秋宮帝曰皇后之尊與朕同體承宗廟母天下豈易哉唯鄧貴人德冠後庭乃可當之至冬立為皇后辭讓者三然後即位手書表謝深陳德薄不足以充小君之選是時方國貢獻競求珍麗之物自后即位悉令禁絕歲時但供紙墨而已帝每欲官爵鄧氏后輒哀請謙讓故兄騭終帝世不過虎賁中郎將元興元年帝崩長子平原王有疾而諸皇子夭沒前後十數後生者輒隱秘養於人閒殤帝生始百日后乃迎立之尊后為皇太后太后臨朝和帝葬後宮人並歸園太后賜周馮貴人策曰朕與貴人託配後庭共歡等列十有餘年不獲福祐先帝早𠫓廾天下孤心煢煢靡所瞻仰夙夜永懷感愴發中今當以舊典分歸外園慘結增歎燕燕之詩曷能喻焉其賜貴人王青蓋車采飾輅驂馬各一駟黃金三十斤雜帛三千匹白越四千端又賜馮貴人王赤綬以未有頭上步搖環珮加賜各一具是時新遭大憂法禁未設宮中亡大珠一篋太后念欲考問必有不辜乃親閱宮人觀察顏色即時首服又和帝幸人吉成御者共枉吉成以巫蠱事遂下掖庭考訊辭證明白太后以先帝左右待之有恩平日尚無惡言今反若此不合人情更自呼見實覈果御者所為莫不歎服以為聖明常以鬼神難徵淫祀無福乃詔有司罷諸祠官不合典禮者又詔赦除建武以來諸犯妖惡及馬竇家屬所被禁錮者皆復之為平人減大官導官尚方內者服御珍膳靡麗難成之物自非供陵廟稻梁米得導擇朝夕一肉飯而已舊大官湯官經用歲且二萬萬太后勑止曰日殺省珍費自是裁數千萬及郡國所貢皆減其過半悉斥賣上林鷹犬其蜀漢釦器九帶佩刀並不復調止畫工三十九種又御府尚方織室錦繡冰紈綺縠金銀珠玉犀象瑁彫鏤翫弄之物皆絕不作離宮別館儲峙米糒薪炭悉令省之又詔諸園貴人其宮人有宗室同族若羸老不任使者令園監實覈上名自御北宮增喜觀閱問之恣其去留即日免遣者五六百人及殤帝崩太后定策立安帝猶臨朝政以連遭大憂百姓苦役殤帝康陵方中祕藏及諸工作事事減約十分居一詔告司隸校尉河南尹南陽太守曰每覽前代外戚賓客假借威權輕薄謥詷至有濁亂奉公為人患苦咎在執法怠懈不輒行其罰故也今車騎將軍騭等雖懷敬順之志而宗門廣大姻戚不少賓客姦猾多干禁憲其明加檢勑勿相容護自是親屬犯罪無所假貸太后愍陰氏之罪廢赦其徙者歸鄉勑還資財五百餘萬永初元年爵號太夫人為新野君萬戶供湯沐邑二年夏京師旱親幸洛陽寺錄冤獄有囚實不殺人而被考自誣羸困輿見畏吏不敢言將去舉頭若欲自訴太后察視覺之即呼還問狀具得枉實即時收洛陽令下獄抵罪行未還宮澍雨大降三年秋太后體不安左右憂惶禱請祝辭願得代命太后聞之即譴怒切勑掖庭令以下但使謝過祈福不得妄生不祥之言舊事歲終當饗遣衞士大儺逐疫太后以陰陽不和軍旅數興詔饗會勿設戲作樂減逐疫侲子之半悉罷象橐駝之屬豐年復故太后自入宮掖從曹大家受經書兼天文筭數晝省王政夜則誦讀而患其謬誤懼乖典章乃博選諸儒劉珍等及博士議郎四府掾史五十餘人詣東觀讎校傳記事畢奏御賜葛布各有差又詔中官近臣於東觀受讀經傳以教授宮人左右習誦朝夕濟濟及新野君薨太后自侍疾病至乎終盡憂哀毀損事加於常贈以長公主赤綬東園祕器玉衣繡衾又賜布三萬匹錢三千萬騭等遂固讓錢布不受使司空持節護喪事儀比東海恭王謚曰敬君太后諒闇既終久旱太后比三日幸洛陽錄囚徒理出死罪三十六人耐罪八十人其餘減罪死右趾已下至司寇七年正月初入太廟齋七日賜公卿百僚各有差庚戌謁宗廟率命婦羣妾相禮儀與皇帝交獻親薦成禮而還因下詔曰凡供薦新味多非其節或鬱養強孰或穿掘萌牙味無所至而夭折生長豈所以順時育物乎傳曰非其時不食自今當奉祠陵廟及給御者皆須時乃上凡所省二十三種自太后臨朝水旱十載四夷外侵盜賊內起每聞人飢或達旦不寐而躬自減徹以救災戹故天下復平歲還豐穰元初五年平望侯劉毅以太后多德政欲令早有注記上書安帝曰臣聞易載羲農而皇德著書述唐虞而帝道崇故雖聖明必書功於竹帛流音於管弦伏惟皇太后膺大聖之姿體乾坤之德齊蹤虞妃比跡任姒孝悌慈仁允恭節約杜絕奢盈之源防抑逸欲之兆正位內朝流化四海及元興延平之際國無儲副仰觀乾象參之人譽援立陛下為天下主永安澈綏靜四海又遭水潦東州飢荒垂恩元元冠蓋交路菲薄衣食躬率羣下損膳解驂以贍黎苗惻隱之恩猶視赤子克己引愆顯揚仄陋崇晏晏之政敷在寬之教興滅國繼絕世錄功臣復宗室追還徙人蠲除禁錮政非惠和不圖於心制非舊典不訪於朝弘德洋溢充塞宇宙洪澤豐沛漫衍八方華夏樂化戎狄混并丕功著於大漢碩惠加於生人巍巍之業可聞而不可及蕩蕩之勳可誦而不可名古之帝王左右置史漢之舊典世有注記夫道有夷崇治有進退若善政不述細異輒書是為堯湯負洪水大旱之責而無咸熙假天之美高宗成王有雉雊迅風之變而無中興康寧之功也上考詩書有虞二妃周室三母修行佐德思不踰閾未有內遭家難外遇灾害覽總大麓經營天物功德巍巍若茲者也宜令史官著長樂宮注聖德頌以敷宣景燿勒勳金石縣之日月攄之罔極以崇陛下烝烝之孝帝從之六年太后詔徵和帝弟濟北河閒王子男女年五歲以上四十餘人又鄧氏近親子孫三十餘人並為開邸第教學經書躬自監試尚幼者使置師保朝夕入宮撫循詔導恩愛甚渥乃詔從兄河南尹豹越騎校尉康等曰吾所以引納羣子置之學官者實以方今承百王之敝時俗淺薄巧偽滋生五經衰缺不有化導將遂陵故欲襃崇聖道以匡失俗傳不云乎飽食終日無所用心難矣哉今末世貴戚食祿之家溫衣美飯乘堅驅良而面牆術學不識臧否斯故禍敗所從來也永平中四姓小侯皆令入學所以矯俗厲薄反之忠孝先公既以武功書之竹帛兼以文德教化子孫故能束脩不觸羅網誠令兒曹上述祖考休烈下念詔書本意則足矣其勉之哉康以太后久臨朝政心懷畏懼託病不朝太后使內人問之時宮婢出入多能有所毀譽其耆宿者皆稱中大人所使者乃康家先婢亦自通中大人康聞詬之曰汝我家出爾敢爾邪婢怒還說康詐疾而言不遜太后遂免康官遣歸國絕屬籍永寧二年二月寢病漸篤乃乘輦於前殿見侍中尚書因北至太子新所繕宮還大赦天下賜諸園貴人王主羣僚錢布各有差詔曰朕以無德託母天下而薄祐不天早離大憂延平之際海內無主元元戹運危於累卵勤勤苦心不敢以萬乘為樂上欲不欺天愧先帝下不違人負宿心誠在濟度百姓以安劉氏自謂感徹天地當蒙福祚而喪禍內外傷痛不絕頃以廢病沈滯久不得侍祠自力上原陵加欬逆唾血遂至不解存亡大分無可柰何公卿百官其勉盡忠恪以輔朝廷三月崩在位二十年年四十一合葬順陵論曰鄧后稱制終身號令自出術謝前政之良身闕明辟之義至使嗣主側目斂衽於虛器直生懷懣懸書於象魏借之儀者殆其惑哉然而建光之後王柄有歸遂乃名賢戮辱便孽黨進衰斁之來茲焉有徵故知持權引謗所幸者非己焦心卹患自強者唯國是以班母一說闔門辭事愛姪微愆髡剔謝罪將杜根逢誅未值其誠乎但蹊田之牛奪之已甚
