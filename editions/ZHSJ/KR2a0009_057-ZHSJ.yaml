body:
  text: 後漢書卷五十二崔駰列傳第四十二子瑗孫寔崔駰字亭伯涿郡安平人也高祖父朝昭帝時為幽州從事諫刺史無與燕剌王通及剌王敗擢為侍御史生子舒歷四郡太守所在有能名舒小子篆王莽時為郡文學以明經徵詣公車太保甄豐舉為步兵校尉篆辭曰吾聞伐國不問仁人戰陳不訪儒士此舉奚為至哉遂投劾歸莽嫌諸不附己者多以法中傷之時篆兄發以佞巧幸於莽位至大司空母師氏能通經學百家之言莽寵以殊禮賜號義成夫人金印紫綬文軒丹轂顯於新世後以篆為建新大尹篆不得已乃歎曰吾生無妄之世值澆羿之君上有老母下有兄弟安得獨潔己而危所生哉乃遂單車到官稱疾不視事三年不行縣門下掾倪敞諫篆乃強起班春所至之縣獄犴填滿篆垂涕曰嗟乎刑罰不中乃陷人於穽此皆何罪而至于是遂平理所出二千餘人掾吏叩頭諫曰朝廷初政州牧峻刻宥過申枉誠仁者之心然獨為君子將有悔乎篆曰邾文公不以一人易其身君子謂之知命如殺一大尹贖二千人蓋所願也遂稱疾去建武初朝廷多薦言之者幽州刺史又舉篆賢良篆自以宗門受莽偽寵慙愧漢朝遂辭歸不仕客居滎陽閉門潛思著周易林六十四篇用決吉凶多所占驗臨終作賦以自悼名曰慰志其辭曰嘉昔人之遘辰兮美伊傅之時應規矩之淑質兮過班倕而裁之協準矱之貞度兮同斷金之玄策何天衢於盛世兮超千載而垂績豈脩德之極致兮將天祚之攸適六柄制于家門兮王綱漼以陵黎共奮以跋扈兮羿浞狂以恣睢睹嫚臧而乘釁兮竊神器之萬機思輔弼以媮存兮亦號咷以詶咨嗟三事之我負兮乃迫余以天威豈無熊僚之微介兮悼我生之殲夷庶明哲之末風兮懼大雅之所譏遂翕翼以委命兮受符守乎艮維恨遭閉而不隱兮違石門之高蹤揚蛾眉於復關兮犯孔戒之冶容懿氓蚩之悟悔兮慕白駒之所從乃稱疾而屢復兮歷三祀而見許悠輕舉以遠遁兮託峻峗以幽處竫潛思於至賾兮騁六經之奧府皇再命而紹卹兮乃云眷乎建武運欃槍以電埽兮清六合之土宇聖德滂以橫被兮黎庶愷以鼓舞闢四門以博延兮彼幽牧之我舉分畫定而計決兮豈云賁乎鄙耇遂懸車以縶馬兮絕時俗之進取歎暮春之成服兮闔衡門以埽軌聊優游以永日兮守性命以盡齒貴啟體之歸全兮庶不忝乎先子篆生毅以疾隱身不仕毅生駰年十三能通詩易春秋博學有偉才盡通古今訓詁百家之言善屬文少游太學與班固傅毅同時齊名常以典籍為業未遑仕進之事時人或譏其太玄靜將以後名失實駰擬楊雄解嘲作達旨以荅焉其辭曰發其華秋收其實有始有極爰登其質今子韞櫝六經服膺道術歷世而游高談有日俯鉤深於重淵仰探遠乎九乾窮至賾於幽微測潛隱之無源然下不步卿相之廷上不登王公之門進不黨以讚己退不黷於庸人獨師友道德合符曩真抱景特立與士不羣蓋高樹靡陰獨木不林隨時之宜道貴從凡于時太上運天德以君世憲王僚而布官臨雍泮以恢儒疏軒冕以崇賢率惇德以厲忠孝揚茂化以砥仁義選利器於良材求鏌於明智不以此時攀台階闚紫闥據高軒望朱闕夫欲千里而咫尺未發蒙竊惑焉故英人乘斯時也猶逸禽之赴深林蝱蚋之趣大沛胡為嘿嘿而久沈滯也天地初制皇綱云緒帝紀乃設傳序歷數三代興滅昔大庭尚矣赫胥罔識淳𣾴散離人物錯乖高辛攸降厥趣各違道無常稽與時張薥失仁為非得義為是君子通變各審所履故士或掩目而淵潛或盥耳而山棲或草耕而僅飽或木茹而長飢或重聘而不來或屢黜而不去或冒訽以干進或望色而斯舉或以役夫發夢於王公或以漁父見兆於元龜若夫紛塞路凶虐播流人有昏墊之戹主有疇咨之憂條垂藟蔓上下相求於是乎賢人授手援世之災跋涉赴俗急斯時也昔堯含慼而臯陶謨高祖歎而子房慮禍不散而曹絳奮結不解而陳平權及其策合道從克亂弭衝乃將鏤玄珪冊顯功銘昆吾之冶勒景襄之鍾與其有事則褰裳濡足冠挂不顧人溺不拯則非仁也當其無事則躐纓整襟規矩其步德讓不修則非忠也是以險則救俗平則守禮舉以公心不私其體衆異齊品類之萬殊參差同量坏冶一陶羣生得理庶績其凝家家有以樂和人人有以自優威械臧而俎豆布六典陳而九刑厝濟茲兆庶出於平易之路雖有力牧之略尚父之厲伊臯不論奚事范蔡夫廣廈成而茂木暢遠求存而良馬縶陰事終而水宿臧場功畢而大火入方斯之際處士山積學者川流衣裳被宇冠蓋雲浮譬猶衡陽之林岱陰之麓伐尋抱不為之稀蓺拱把不為之數悠悠罔極亦各有得彼採其華我收其實舍之則臧己所學也故進動以道則不辭執珪而秉柱國復靜以理則甘糟糠而安藜藿衒鬻縣旌自表非隨和之寶也暴智燿世因以干祿非仲尼之道也游不倫黨苟以徇己汗血競時利合而友子笑我之沈滯吾亦病子而不已也先人有則而我弗虧行有枉徑而我弗隨臧否在予唯世所議固將因天質之自然誦上哲之高訓詠太平之清風行天下之至順懼吾躬之穢德勤百畝之不耘縶余馬以安行俟性命之所存昔孔子起威於夾谷晏嬰發勇於崔杼曹劌舉節於柯盟卞嚴克捷於彊禦范蠡錯埶於會稽五員樹功於柏舉魯連辯言以退燕包胥單辭而存楚唐且華顛以悟秦甘羅童牙而報趙原衰見廉於壺𧹞宣孟收德於束脯吳札結信於丘木展季効貞於門女顏回明仁於度轂程嬰顯義於趙武僕誠不能編德於數者竊慕古人之所序元和中肅宗始修古禮巡狩方岳駰上四巡頌以稱漢德辭甚典美文多故不載帝雅好文章自見駰頌後帝常嗟歎之謂侍中竇憲曰卿寧知崔駰乎對曰班固數為臣說之然未見也帝曰公愛班固而忽崔駰此葉公之好龍也試請見之駰由此候憲憲屣履迎門笑謂駰曰亭伯吾受詔交公公何得薄哉遂揖入為上客居無幾何帝幸憲第時駰適在憲所帝聞而欲召見之憲諫以為不宜與白衣會帝悟曰吾能令駰朝夕在傍何必於此適欲官之會帝崩竇太后臨朝憲以重戚出內詔命駰獻書誡之曰駰聞交淺而言深者愚也在賤而望貴者惑也未信而納忠者謗也三者皆所不宜而或蹈之者思効其區區憤盈而不能已也竊見足下體淳淑之姿躬高明之量意美志厲有上賢之風駰幸得充下館序後陳是以竭其拳拳敢進一言隆百僚觀行當堯舜之盛世處光華之顯時豈可不庶幾夙夜以永衆譽弘申伯之美致周邵之事乎語曰不患無位患所以立昔馮野王以外戚居位稱為賢臣近陰衞尉克己復禮終受多福郯氏之宗非不尊也陽侯平之族非不盛也重侯累將建天樞執斗柄其所以獲譏於時垂愆於後者何也蓋在滿而不挹位有餘而仁不足也漢興以後迄于哀平外家二十保族全身四人而已書曰鑒于有殷可不慎哉自中興內以忠誠自固外以法度自守卒享祚國垂祉於今夫謙德之光周易所美滿溢之位道家所戒故君子福大而愈懼爵隆而益恭遠察近覽俯仰有則銘諸几杖刻諸盤杅矜矜業業無殆無荒如此則百福是荷慶流無窮矣及憲為車騎將軍辟駰為掾憲府貴重掾屬三十人皆故刺史二千石唯駰以處士年少擢在其閒憲擅權驕恣駰數諫之及出擊匈奴道路愈多不法駰為主簿前後奏記數十指切長短憲不能容稍疎之因察駰高第出為長岑長駰自以遠去不得意遂不之官而歸永元四年卒于家所著詩賦銘頌書記表七依婚禮結言達旨酒警合二十一篇中子瑗瑗字子玉早孤銳志好學盡能傳其父業年十八至京師從侍中賈逵質正大義逵善待之瑗因留游學遂明天官歷數京房易傳六日七分諸儒宗之與扶風馬融南陽張衡特相友好初瑗兄章為州人所殺瑗手刃報仇因亡命會赦歸家家貧兄弟同居數十年鄉邑化之年四十餘始為郡吏以事繫東郡發干獄獄掾善為禮瑗閒考訊時輒問以禮說其專心好學雖顛沛必於是後事釋歸家為度遼將軍鄧遵所辟居無何遵被誅瑗免歸後復辟車騎將軍閻顯府時閻太后稱制顯入參政事先是安帝廢太子為濟陰王而以北鄉侯為嗣瑗以侯立不以正知顯將敗欲說令廢立而顯日沈醉不能得見乃謂長史陳禪曰中常侍江京陳達等得以嬖寵惑蠱先帝遂使廢黜正統扶立疎孽少帝即位發病廟中周勃之徵於斯復見今欲與長史君共求見說將軍白太后收京等廢少帝引立濟陰王必上當天心下合人望伊霍之功不下席而立則將軍兄弟傳祚於無窮若拒違天意久曠神器則將以無罪并辜元惡此所謂禍福之會分功之時禪猶豫未敢從會北鄉侯薨孫程立濟陰王是為順帝閻顯兄弟悉伏誅瑗坐被斥門生蘇祇具知瑗謀欲上書言狀瑗聞而遽止之時陳禪為司隸校尉召瑗謂曰第聽祇上書禪請為之證瑗曰此譬猶兒妾屏語耳願使君勿復出口遂辭歸不復應州郡命久之大將軍梁商初開莫府復首辟瑗自以再為貴戚吏不遇被斥遂以疾固辭歲中舉茂才遷汲令在事數言便宜為人開稻田數百頃視事七年百姓歌之漢安初大司農胡廣少府竇章共薦瑗宿德大儒從政有迹不宜久在下位由此遷濟北相時李固為太山太守美瑗文雅奉書禮致殷勤歲餘光祿大夫杜喬為八使徇行郡國以臧罪奏瑗徵詣廷尉瑗上書自訟得理出會病卒年六十六臨終顧命子寔曰夫人稟天地之氣以生及其終也歸精於天還骨於地何地不可臧形骸勿歸鄉里其賵贈之物羊豕之奠一不得受寔奉遺令遂留葬洛陽瑗高於文辭尤善為書記箴銘所著賦碑銘箴頌七蘇南陽文學官志歎辭移社文悔祈草書埶七言凡五十七篇其南陽文學官志稱於後世諸能為文者皆自以弗及瑗愛士好賓客盛脩肴膳單極滋味不問餘產居常蔬食菜羹而已家無擔石儲當世清之寔字子真一名台字元始少沈靜好典籍父卒隱居墓側服竟三公並辟皆不就桓帝初詔公卿郡國舉至孝獨行之士寔以郡舉徵詣公車病不對策除為郎明於政體吏才有餘論當世便事數十條名曰政論指切時要言辯而确當世稱之仲長統曰凡為人主宜寫一通置之坐側其辭曰箕作訓而殷周用隆及繼體之君欲立中興之功者曷嘗不賴賢哲之謀乎凡天下所以不理者常由人主承平日久俗漸敝而不悟政寖衰而不改習亂安危怢不自覩或荒耽嗜欲不恤萬機或耳蔽箴誨厭偽忽真或猶豫歧路莫適所從或見信之佐括囊守祿或疎遠之臣言以賤廢是以王綱縱薥於上智士鬱伊於下悲夫姓囂然咸復思中興之救矣且濟時拯世之術豈必體堯蹈舜然後乃理哉期於補決壞枝柱邪傾隨形裁割要措斯世於安寧之域而已故聖人執權遭時定制步驟之差各有云設不彊人以不能背急切而慕所聞也蓋孔子對葉公以來遠哀公以臨人景公以節禮非其不同所急異務也是以受命之君每輒創制中興之主亦匡時失昔盤庚愍殷遷都易民周穆有闕甫侯正刑俗人拘文牽古不達權制奇偉所聞簡忽所見烏可與論國家之大事哉故言事者雖合聖德輒見掎奪何者其頑士闇於時權安習所見不知樂成況可慮始苟云率由舊章而已其達者或矜名妒能恥策非己舞筆奮辭以破其義寡不勝衆遂見擯𠫓廾雖稷契復存猶將困焉斯賈生之所以排於絳灌屈子之所以攄其幽憤者也夫以文帝之明賈生之賢絳灌之忠而有此患況其餘哉宜重賞深罰以御之明著法術以檢之自非上德嚴之則理寬之則亂何以明其然也近孝宣皇帝明於君人之道審於為政之理故嚴刑峻法破姦軌之膽海內清肅天下密如薦勳祖廟享號中宗筭計見效優於孝文及元帝即位多行寬政卒以墮損威權始奪遂為漢室基禍之主政道得失於斯可監昔孔子作春秋襃齊桓懿晉文歎管仲之功夫豈不美文武之道哉誠達權救敝之理也故聖人能與世推移而俗士苦不知變以為結繩之約可復理亂秦之緒干戚之舞足以解平城之圍蓋為國之法有似理身平則致養疾則攻焉夫刑罰者治亂之藥石也德教者興平之梁肉也夫以德教除殘是以梁肉理疾也以刑罰理平是以藥石供養也方今承百王之敝值戹運之會自數世以來政多恩貸馭委其轡馬駘其銜四牡橫奔皇路險傾方將柑勒鞬輈以救之豈暇鳴和鑾清節奏哉昔高祖令蕭何作九章之律有夷三族之令黥劓斬趾斷舌梟首故謂之具五刑文帝雖除肉刑當劓者笞三百當斬左趾者笞五百當斬右趾者𠫓廾巿右趾者既殞其命笞撻者往往至死雖有輕刑之名其實殺也當此之時民皆思復肉刑至景帝元年乃下詔曰加笞與重罪無異幸而不死不可為民人乃定律減笞輕捶自是之後笞者得全以此言之文帝乃重刑非輕之也以嚴致平非以寬致平也必欲行若言當大定其本使人主師五帝而式三王盪亡秦之俗遵先聖之風𠫓廾苟全之政蹈稽古之蹤復五等之爵立井田之制然後選稷契為佐伊呂為輔樂作而鳳皇儀擊石而百獸舞若不然則多為累而已其後辟太尉袁湯大將軍梁冀府並不應大司農羊傅少府何豹上書薦寔才美能高宜在朝廷召拜議郎遷大將軍冀司馬與邊韶延篤等著作東觀出為五原太守五原土宜麻枲而俗不知織績民冬月無衣積細草而臥其中見吏則衣草而出寔至官斥賣儲峙為作紡績織綀縕之具以教之民得以免寒苦是時胡虜連入雲中朔方殺略吏民一歲至九奔命寔整厲士馬嚴烽候虜不敢犯常為邊最以病徵拜議郎復與諸儒博士共雜定五經會梁冀誅寔以故吏免官禁錮數年時鮮卑數犯邊詔三公舉威武謀略之士司空黃瓊薦寔拜遼東太守行道母劉氏病卒上疏求歸葬行喪母有母儀淑德博覽書傳初寔在五原常訓以臨民之政寔之善績母有其助焉服竟召拜尚書寔以世方阻亂稱疾不視事數月免歸初寔父卒剽賣田宅起冢塋立碑頌葬訖資產竭盡因窮困以酤釀販鬻為業時人多以此譏之寔終不改亦取足而已不致盈餘及仕官歷位邊郡而愈貧薄建寧中病卒家徒四壁立無以殯斂光祿勳楊賜太僕袁逢少府段熲為備棺槨葬具大鴻臚袁隗樹碑頌德所著碑論箴銘荅七言祠文表記書凡十五篇寔從兄烈有重名於北州歷位郡守九卿靈帝時開鴻都門榜賣官爵公卿州郡下至黃綬各有差其富者則先入錢貧者到官而後倍輸或因常侍阿保別自通達是時段熲樊陵張溫等雖有功勤名譽然皆先輸貨財而後登公位烈時因傅母入錢五百萬得為司徒及拜日天子臨軒百僚畢會帝顧謂親倖者曰悔不小靳可至千萬程夫人於傍應曰崔公冀州名士豈肯買官賴我得是反不知姝邪烈於是聲譽衰減久之不自安從容問其子鈞曰吾居三公於議者何如鈞曰大人少有英稱歷位卿守論者不謂不當為三公而今登其位天下失望烈曰何為然也鈞曰論者嫌其銅臭烈怒舉杖擊之鈞時為虎賁中郎將服武弁戴鶡尾狼狽而走烈罵曰死卒父檛而走孝乎鈞曰舜之事父小杖則受大杖則走非不孝也烈慙而止烈後拜太尉鈞少交結英豪有名稱為西河太守獻帝初鈞與袁紹俱起兵山東董卓以是收烈付郿獄錮之鋃鐺鐵鎖卓既誅拜烈城門校尉及李傕入長安為亂兵所殺烈有文才所著詩書教頌等凡四篇論曰崔氏世有美才兼以沈淪典籍遂為儒家文林駰瑗雖先盡心於貴戚而能終之以居正則其歸旨異夫進趣者乎李固高絜之士也與瑗隣郡奉贄以結好由此知杜喬之劾殆其過矣寔之政論言當世理亂雖鼂錯之徒不能過也贊曰崔為文宗世禪雕龍建新恥潔摧志求容永矣長岑于遼之陰不有直道曷取泥沈瑗不言祿亦離冤辱子真持論感起昏俗
