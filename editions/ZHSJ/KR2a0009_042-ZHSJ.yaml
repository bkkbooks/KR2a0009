body:
  text: 後漢書卷三十八張法滕馮度楊列傳第二十八張宗字諸君南陽魯陽人也王莽時為縣陽泉鄉佐會莽敗義兵起宗乃率陽泉民三四百人起兵略地西至長安更始以宗為偏將軍宗見更始政亂因將家屬客安邑及大司徒鄧禹西征定河東宗詣禹自歸禹聞宗素多權謀乃表為偏將軍禹軍到栒邑赤眉大衆且至禹以栒邑不足守欲引師進就堅城而衆人多畏賊追憚為後拒禹乃書諸將名於竹署其前後亂著笥中令各探之宗獨不肯探曰死生有命張宗豈辭難就逸乎禹歎息謂曰將軍有親弱在營柰何不顧宗曰愚聞一卒畢力百人不當萬夫致死可以橫行宗今擁兵數千以承大威何遽其必敗乎遂留為後拒諸營既引兵宗方勒厲軍士堅壘壁以死當之禹到前縣議曰以張將軍之衆當百萬之師猶以小雪投沸湯雖欲戮力其埶不全也乃遣步騎二千人反還迎宗宗引兵始發而赤眉卒至宗與戰卻之乃得歸營於是諸將服其勇及還到長安宗夜將銳士入城襲赤眉中矛貫胛又轉攻諸營保為流矢所激皆幾至於死及鄧禹徵還光武以宗為京輔都尉將突騎與征西大將軍馮異共擊關中諸營保破之遷河南都尉建武六年都尉官省拜太中大夫八年潁川桑中盜賊羣起宗將兵擊定之後青冀盜賊屯聚山澤宗以謁者督諸郡兵討平之十六年琅邪北海盜賊復起宗督二郡兵討之乃設方略明購賞皆悉破散於是沛楚東海臨淮羣賊懼其威武相捕斬者數千人青徐震慄後遷琅邪相其政好嚴猛敢殺伐永平二年卒於官法雄字文彊扶風郿人也齊襄王法章之後秦滅齊子孫不敢稱田姓故以法為氏宣帝時徙三輔世為二千石雄初仕郡功曹辟太傅張禹府舉雄高第除平氏長善政事好發擿姦伏盜賊稀發吏人畏愛之南陽太守鮑得上其理狀遷宛陵令永初三年海賊張伯路等三千餘人冠赤幘服絳衣自稱將軍寇濱海九郡殺二千石令長初遣侍御史龐雄督州郡兵擊之伯路等乞降尋復屯聚明年伯路復與平原劉文河等三百餘人稱使者攻厭次城殺長吏轉入高唐燒官寺出繫囚渠帥皆稱將軍共朝謁伯路伯路冠五梁冠佩印綬黨衆浸盛乃遣御史中丞王宗持節發幽冀諸郡兵合數萬人乃徵雄為青州刺史與王宗并力討之連戰破賊斬首溺死者數百人餘皆奔走收器械財物甚衆會赦詔到賊猶以軍甲未解不敢歸降於是王宗召刺史太守共議皆以為當遂擊之雄曰不然兵凶器戰危事勇不可恃勝不可必賊若乘船浮海深入遠島攻之未易也及有赦令可且罷兵以慰誘其心埶必解散然後圖之可不戰而定也宗善其言即罷兵賊聞大喜乃還所略人而東萊郡兵獨未解甲賊復驚恐遁走遼東止海島上五年春乏食復抄東萊閒雄率郡兵擊破之賊逃還遼東遼東人李久等共斬平之於是州界清靜雄每行部錄囚徒察顏色多得情偽長吏不奉法者皆解印綬去在州四年遷南郡太守斷獄省少戶口益增郡濱帶江沔又有雲夢藪澤永初中多虎狼之暴前太守賞募張捕反為所害者甚衆雄乃移書屬縣曰凡虎狼之在山林猶人之居城市古者至化之世猛獸不擾皆由恩信寬澤仁及飛走太守雖不德敢忘斯義記到其毀壞檻穽不得妄捕山林是後虎害稍息人以獲安在郡數歲歲常豐稔元初中卒官子真在逸人傳滕撫字叔輔北海劇人也初仕州郡稍遷為涿令有文武才用太守以其能委任郡職兼領六縣風政修明流愛于人在事七年道不拾遺順帝末揚徐盜賊羣起磐牙連歲建康元年九江范容周生等相聚反亂屯據歷陽為江淮巨患遣御史中丞馮緄將兵督揚州刺史尹燿九江太守鄧顯討之燿顯軍敗為賊所殺又陰陵人徐鳳馬勉等復寇郡縣殺略吏人鳳衣絳衣帶黑綬稱無上將軍勉皮冠黃衣帶玉印稱黃帝築營於當塗山中乃建年號置百官遣別帥黃虎攻沒合肥明年廣陵賊張嬰等復聚衆數千人反據廣陵朝廷博求將帥三公舉撫有文武才拜為九江都尉與中郎將趙序助馮緄合州郡兵數萬人共討之又廣開賞募錢邑各有差梁太后慮羣賊屯結諸將不能制又議遣太尉李固未及行會撫等進擊大破之斬馬勉范容周生等千五百級徐鳳遂將餘衆攻燒東城縣下邳人謝安應募率其宗親設伏擊鳳斬之封安為平鄉侯邑三千戶拜撫中郎將督揚徐二州事撫復進擊張嬰斬獲千餘人趙序坐畏懦不進詐增首級徵還𠫓廾市又歷陽賊華孟自稱黑帝攻九江殺郡守撫乘勝進擊破之斬孟等三千八百級虜獲七百餘人牛馬財物不可勝筭於是東南悉平振旅而還以撫為左馮翊除一子為郎撫所得賞賜盡分於麾下性方直不交權埶宦官懷忿及論功當封太尉胡廣時錄尚書事承旨奏黜撫天下怨之卒於家馮緄字鴻卿巴郡宕渠人也少學春秋司馬兵法父煥安帝時為幽州刺史疾忌姦惡數致其罪時玄菟太守姚光亦失人和建光元年怨者乃詐作璽書譴責煥光賜以歐刀又下遼東都尉龐奮使速行刑奮即斬光收煥煥欲自殺緄疑詔文有異止煥曰大人在州志欲去惡實無它故必是凶人妄詐規肆姦毒願以事自上甘罪無晚煥從其言上書自訟果詐者所為徵奮抵罪會煥病死獄中帝愍之賜煥光錢各十萬以子為郎中緄由是知名家富好施賑赴窮急為州里所歸愛初舉孝廉七遷為廣漢屬國都尉徵拜御史中丞順帝末以緄持節督揚州諸郡軍事與中郎將滕撫擊破羣賊遷隴西太守後鮮卑寇邊以緄為遼東太守曉喻降集虜皆弭散徵拜京兆尹轉司隸校尉所在立威刑遷廷尉太常時長沙蠻寇益陽屯聚積久至延熹五年衆轉盛而零陵蠻賊復反應之合二萬餘人攻燒城郭殺傷長吏又武陵蠻夷悉反寇掠江陵閒荊州刺史劉度南郡太守李肅並奔走荊南皆沒於是拜緄為車騎將軍將兵十餘萬討之詔策緄曰蠻夷猾夏久不討攝各焚都城蹈籍官人州郡將吏死職之臣相逐奔竄曾不反顧可愧言也將軍素有威猛是以擢授六師前代陳湯馮傅之徒以寡擊衆郅支夜郎樓蘭之戎頭懸都街衞霍北征功列金石是皆將軍所究覽也今非將軍誰與修復前迹進赴之宜權時之策將軍一之出郊之事不復內御已命有司祖于國門詩不云乎進厥虎臣闞如虓虎敷敦淮濆仍執醜虜將軍其勉之時天下飢饉帑藏虛盡每出征伐常減公卿奉祿假王侯租賦前後所遣將帥宦官輒陷以折耗軍資往往抵罪緄性烈直不行賄賂懼為所中乃上疏曰埶得容姦伯夷可疑苟曰無猜盜跖可信故樂羊陳功文侯示以謗書願請中常侍一人監軍財費尚書朱穆奏緄以財自嫌失大臣之節有詔勿劾緄軍至長沙賊聞悉詣營道乞降進擊武陵蠻夷斬首四千餘級受降十餘萬人荊州平定詔書賜錢一億固讓不受振旅還京師推功於從事中郎應奉薦以為司隸校尉而上書乞骸骨朝廷不許監軍使者張敞承宦官旨奏緄將傅婢二人戎服自隨又輒於江陵刻石紀功請下吏案理尚書令黃儁奏議以為罪無正法不合致糾會長沙賊復起攻桂陽武陵緄以軍還盜賊復發策免頃之拜將作大匠轉河南尹上言舊典中官子弟不得為牧人職帝不納復為廷尉時山陽太守單遷以罪繫獄緄考致其死遷故車騎將軍單超之弟中官相黨遂共誹章誣緄坐與司隸校尉李膺大司農劉祐俱輸左校應奉上疏理緄等得免後拜屯騎校尉復為廷尉卒於官緄弟允清白有孝行能理尚書善推步之術拜降虜校尉終於家度尚字博平山陽湖陸人也家貧不修學行不為鄉里所推舉積困窮乃為宦者同郡侯覽視田得為郡上計吏拜郎中除上虞長為政嚴峻明於發擿姦非吏人謂之神明遷文安令遇時疾疫穀貴人飢尚開倉稟給營救疾者百姓蒙其濟時冀州刺史朱穆行部見尚甚奇之延熹五年長沙零陵賊合七八千人自稱將軍入桂陽蒼梧南海交阯交阯刺史及蒼梧太守望風逃奔二郡皆沒遣御史中丞盛修募兵討之不能剋豫章艾縣人六百餘人應募而不得賞直怨恚遂反焚燒長沙郡縣寇益陽殺縣令衆漸盛又遣謁者馬睦督荊州刺史劉度擊之軍敗睦度奔走桓帝詔公卿舉任代劉度者尚書朱穆舉尚自右校令擢為荊州刺史尚躬率部曲與同勞逸廣募雜種諸蠻夷明設購賞進擊大破之降者數萬人桂陽宿賊渠帥卜陽潘鴻等畏尚威烈徙入山谷尚窮追數百里遂入南海破其三屯多獲珍寶而陽鴻等黨衆猶盛尚欲擊之而士卒驕富莫有鬬志尚計緩之則不戰逼之必逃亡乃宣言卜陽潘鴻作賊十年習於攻守今兵寡少未易可進當須諸郡所發悉至爾乃并力攻之申令軍中恣聽射獵兵士喜悅大小皆相與從禽尚乃密使所親客潛焚其營珍積皆盡獵者來還莫不泣涕尚人人慰勞深自咎責因曰卜陽等財寶足富數世諸卿但不并力耳所亡少少何足介意衆聞咸憤踊尚勑令秣馬蓐食明旦徑赴賊屯陽鴻等自以深固不復設備吏士乘銳遂大破平之尚出兵三年羣寇悉定七年封右鄉侯遷桂陽太守明年徵還京師時荊州兵朱蓋等征戍役久財賞不贍忿恚復作亂與桂陽賊胡蘭等三千餘人復攻桂陽焚燒郡縣太守任胤𠫓廾城走賊衆遂至數萬轉攻零陵太守陳球固守拒之於是以尚為中郎將將幽冀黎陽烏桓步騎二萬六千人救球又與長沙太守抗徐等發諸郡兵并埶討擊大破之斬蘭等首三千五百級餘賊走蒼梧詔賜尚錢百萬餘人各有差時抗徐與尚俱為名將數有功徐字伯徐丹陽人鄉邦稱其膽智初試守宣城長悉移深林遠藪椎髻鳥語之人置於縣下由是境內無復盜賊後為中郎將宗資別部司馬擊太山賊公孫舉等破平之斬首三千餘級封烏程東鄉侯五百戶遷太山都尉寇盜望風奔亡及在長沙宿賊皆平卒於官桓帝下詔追增封徐五百戶并前千戶復以尚為荊州刺史尚見胡蘭餘黨南走蒼梧懼為己負乃偽上言蒼梧賊入荊州界於是徵交阯刺史張磐下廷尉辭狀未正會赦見原磐不肯出獄方更牢持械節獄吏謂磐曰天恩曠然而君不出何可乎磐因自列曰前長沙賊胡蘭作難荊州餘黨散入交阯磐身嬰甲冑涉危履險討擊凶患斬殄渠帥餘盡鳥竄冒遁還奔荊州刺史度尚懼磐先言怖畏罪戾伏奏見誣磐備位方伯為國爪牙而為尚所枉受罪牢獄夫事有虛實法有是非磐實不辜赦無所除如忍以苟免永受侵辱之恥生為惡吏死為敝鬼乞傳尚詣廷尉面對曲直足明真偽尚不徵者磐埋骨牢檻終不虛出望塵受枉廷尉以其狀上詔書徵尚到廷尉辭窮受罪以先有功得原磐字子石丹陽人以清白稱終於廬江太守尚後為遼東太守數月鮮卑率兵攻尚與戰破之戎狄憚畏年五十延熹九年卒於官楊琁字機平會稽烏傷人也高祖父茂本河東人從光武征伐為威寇將軍封烏傷新陽鄉侯建武中就國傳封三世有罪國除因而家焉父扶交阯刺史有理能名兄喬為尚書容儀偉麗數上言政事桓帝愛其才詔妻以公主喬固辭不聽遂閉口不食七日而死琁初舉孝廉稍遷靈帝時為零陵太守是時蒼梧桂陽猾賊相聚攻郡縣賊衆多而琁力弱吏人憂恐琁乃特制馬車數十乘以排囊盛石灰於車上繫布索於馬尾又為兵車專彀弓弩剋共期會戰乃令馬車居前順風鼓灰賊不得視因以火燒布布然馬驚奔突賊陣因使後車弓弩亂發鉦鼓鳴震羣盜波駭破散追逐傷斬無數梟其渠帥郡境以清荊州刺史趙凱誣奏琁實非身破賊而妄有其功琁與相章奏凱有黨助遂檻車徵琁防禁嚴密無由自訟乃噬臂出血書衣為章具陳破賊形埶及言凱所誣狀潛令親屬詣闕通之詔書原琁拜議郎凱反受誣人之罪琁三遷為勃海太守所在有異政以事免後尚書令張溫特表薦之徵拜尚書僕射以病乞骸骨卒於家論曰安順以後風威稍薄寇攘橫緣𨻶而生剽人盜邑者不闋時月假署皇王者蓋以十數或託驗神道或矯妄冕服然其雄渠魁長未有聞焉猶至壘盈四郊奔命首尾若夫數將者並宣力勤慮以勞定功而景風之賞未甄膚受之言互及以此而推政道難乎以免贊曰張宗裨禹敢殿後拒江淮海岱虔劉寇阻其誰清之雄尚緄撫琁能用譎亦云振旅
