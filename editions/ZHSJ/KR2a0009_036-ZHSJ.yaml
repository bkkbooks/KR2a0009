body:
  text: 後漢書卷三十二樊宏陰識列傳第二十二宏子鯈族曾孫準識弟興樊宏字靡卿南陽湖陽人也世祖之舅其先周仲山甫封于樊因而氏焉為鄉里著姓父重字君雲世善農稼好貨殖重性溫厚有法度三世共財子孫朝夕禮敬常若公家其營理產業物無所棄課役童隸各得其宜故能上下勠力財利歲倍至乃開廣田土三百餘頃其所起廬舍皆有重堂高閣陂渠灌注又池魚牧畜有求必給嘗欲作器物先種梓漆時人嗤之然積以歲月皆得其用向之笑者咸求假焉貲至巨萬而賑贍宗族恩加鄉閭外孫何氏兄弟爭財重恥之以田二頃解其忿訟縣中稱美推為三老年八十餘終其素所假貸人閒數百萬遺令焚削文契責家聞者皆慙爭往償之諸子從勑竟不肯受宏少有志行王莽末義兵起劉伯升與族兄賜俱將兵攻湖陽城守不下賜女弟為宏妻湖陽由是收繫宏妻子令出譬伯升宏因留不反湖陽軍帥欲殺其妻子長吏以下共相謂曰樊重子父禮義恩德行於鄉里雖有罪且當在後會漢兵日盛湖陽惶急未敢殺之遂得免脫更始立欲以宏為將宏叩頭辭曰書生不習兵事竟得免歸與宗家親屬作營自守老弱歸之者千餘家時赤眉賊掠唐子鄉多所殘殺欲前攻宏營宏遣人持牛酒米穀勞遺赤眉赤眉長老先聞宏仁厚皆稱曰樊君素善且今見待如此何心攻之引兵而去遂免寇難世祖即位拜光祿大夫位特進次三公建武五年封長羅侯十三年封弟丹為射陽侯兄子尋玄鄉侯族兄忠更父侯十五年定封宏壽張侯十八年帝南祠章陵過湖陽祠重墓追爵謚為壽張敬侯立廟於湖陽車駕每南巡常幸其墓賞賜大會宏為人謙柔畏慎不求苟進常戒其子曰富貴盈溢未有能終者吾非不喜榮埶也天道惡滿而好謙前世貴戚皆明戒也保身全己豈不樂哉每當朝會輒迎期先到俯伏待事時至乃起帝聞之常勑騶騎臨朝乃告勿令豫到宏所上便宜及言得失輒手自書寫毀削草本公朝訪逮不敢衆對宗族染其化未嘗犯法帝甚重之及病困車駕臨視留宿問其所欲言宏頓首自陳無功享食大國誠恐子孫不能保全厚恩令臣魂神慙負黃泉願還壽張食小鄉亭帝悲傷其言而竟不許二十七年卒遺勑薄葬一無所用以為棺柩一臧不宜復見如有腐敗傷孝子之心使與夫人同墳異臧帝善其令以書示百官因曰今不順壽張侯意無以彰其德且吾萬歲之後欲以為式賻錢千萬布萬匹謚為恭侯贈以印綬車駕親送葬子鯈嗣帝悼宏不已復封少子茂為平望侯樊氏侯者凡五國明年賜鯈弟鮪及從昆弟七人合錢五千萬論曰昔楚頃襄王問陽陵君曰君子之富何如對曰假人不德不責食人不使不役親戚愛之衆人善之若乃樊重之折契止訟其庶幾君子之富乎分地以用天道實廩以崇禮節取諸理化則亦可以施於政也與夫愛而畏者何殊閒哉鯈字長魚謹約有父風事後母至孝及母卒哀思過禮毀病不自支世祖常遣中黃門朝暮送饘粥服闋就侍中丁恭受公羊嚴氏春秋建武中禁網尚闊諸王既長各招引賓客以鯈外戚爭遣致之而鯈清靜自保無所交結及沛王輔事發貴戚子弟多見收捕鯈以不豫得免帝崩鯈為復土校尉永平元年拜長水校尉與公卿雜定郊祠禮儀以讖記正五經異說北海周澤琅邪承宮並海內大儒鯈皆以為師友而致之於朝上言郡國舉孝廉率取年少能報恩者耆宿大賢多見廢棄宜勑郡國簡用良俊又議刑辟宜須秋月以順時氣顯宗並從之二年以壽張國益東平王徙封鯈燕侯其後廣陵王荊有罪帝以至親悼傷之詔鯈與羽林監南陽任隗雜理其獄事竟奏請誅荊引見宣明殿帝怒曰諸卿以我弟故欲誅之即我子卿等敢爾邪鯈仰而對曰天下高帝天下非陛下之天下也春秋之義君親無將將而誅焉是以周公誅弟季友鴆兄經傳大之臣等以荊屬託母弟陛下留聖心加惻隱故敢請耳如令陛下子臣等專誅而已帝歎息良久鯈益以此知名其後弟鮪為子賞求楚王英女敬鄉公主鯈聞而止之曰建武時吾家並受榮寵一宗五侯時特進一言女可以配王男可以尚主但以貴寵過盛即為禍患故不為也且爾一子柰何棄之於楚乎鮪不從十年鯈卒賵贈甚厚謚曰哀侯帝遣小黃門張音問所遺言先是河南縣亡失官錢典負者坐死及罪徙者甚衆遂委責於人以償其秏鄉部吏司因此為姦鯈常疾之又野王歲獻甘醪膏每輒擾人吏以為利鯈並欲奏罷之疾病未及得上音歸具以聞帝覽之而悲歎勑二郡並令從之長子汜嗣以次子郴梵為郎其後楚事發覺帝追念鯈謹恪又聞其止鮪婚事故其諸子得不坐焉梵字文高為郎二十餘年三署服其重慎悉推財物二千餘萬與孤兄子官至大鴻臚汜卒子時嗣時卒子建嗣建卒無子國絕永寧元年鄧太后復封建弟盼盼卒子尚嗣初鯈刪定公羊嚴氏春秋章句世號樊侯學教授門徒前後三千餘人弟子潁川李脩九江夏勤皆為三公勤字伯宗為京宛二縣令零陵太守所在有理能稱安帝時位至司徒準字幼陵宏之族曾孫也父瑞好黃老言清靜少欲準少勵志行修儒術以先父產業數百萬讓孤兄子永元十五年和帝幸南陽準為郡功曹召見帝器之拜郎中從車駕還宮特補尚書郎鄧太后臨朝儒學陵替準乃上疏曰明師傅及光武皇帝受命中興羣雄崩擾旌旗亂野東西誅戰不遑啟處然猶投戈講蓺息馬論道至孝明皇帝兼天地之姿用日月之明庶政萬機無不簡心而垂情古典游意經蓺每饗射禮畢正坐自講諸儒並聽四方欣欣雖闕里之化矍相之事誠不足言又多徵名儒以充禮官如沛國趙孝琅邪承宮等或安車結駟告歸鄉里或豐衣博帶從見宗廟其餘以經術見優者布在廊廟故朝多皤皤之良華首之老每讌會則論難衎衎共求政化詳覽羣言響如振玉朝者進而思政罷者退而備問小大隨化雍雍可嘉朝門羽林介冑之士悉通孝經博士議郎一人開門徒衆百數化自聖躬流及蠻荒匈奴遣伊秩訾王大車且渠來入就學八方肅清上下無事是以議者每稱盛時咸言永平辭文吏則去法律而學詆欺銳錐刀之鋒斷刑辟之重德陋俗薄以致苛刻昔孝文竇后性好黃老而清靜之化流景武之閒臣愚以為宜下明詔博求幽隱發揚巖穴寵進儒雅有如孝宮者徵詣公車以俟聖上講習之期公卿各舉明經及舊儒子孫進其爵位使纘其業復召郡國書佐使讀律令如此則延頸者日有所見傾耳者月有所聞伏願陛下推述先帝進業之道準再遷御史中丞永初之初連年水旱災異郡國多被飢困準上疏曰臣聞傳曰飢而不損茲曰太厥災水春秋穀梁傳曰五穀不登謂之大侵大侵之禮百官備而不製羣神禱而不祠由是言之調和陰陽寔在儉節朝廷雖勞心元元事從省約而在職之吏尚未奉承夫建化致理由近及遠故詩曰京師翼翼四方是則今可先令太官尚方考功上林池諸官實減無事之物五府調省中都官吏京師作者如此則化及四方人勞省息年故事遣使持節慰安尤困乏者徙置荊揚孰郡既省轉運之費且令百姓各安其所今雖有西屯之役宜先東州之急如遣使者與二千石隨事消息悉留富人守其舊土轉尤貧者過所衣食誠父母之計也願以臣言下公卿平議五年轉河內太守時羌復屢入郡界準輒將兵討逐修理塢壁威名大行視事三年以疾徵三轉為尚書令明習故事遂見任用元初三年代周暢為光祿勳五年卒於官陰識字次伯南陽新野人也光烈皇后之前母兄也其先出自管仲管仲七世孫修自齊適楚為陰大夫因而氏焉秦漢之際始家新野及劉伯升起義兵識時游學長安聞之委業而歸率子弟宗族賓客千餘人往詣伯升伯升乃以識為校尉更始元年遷偏將軍從攻宛別降新野淯陽杜衍冠軍胡湖陽二年更始封識陰德侯行大將軍事建武元年光武遣使迎陰貴人於新野并徵識識隨貴人至以為騎都尉更封陰鄉侯二年以征伐軍功增封識叩頭讓曰天下初定將帥有功者衆臣託屬掖廷仍加爵邑不可以示天下帝甚美之以為關都尉鎮函谷遷侍中以母憂辭歸十五年定封原鹿侯及顯宗立為皇太子以識守執金吾輔導東宮帝每巡郡國識常留鎮守京師委以禁兵入雖極言正議及與賓客語未嘗及國事帝敬重之常指識以勑戒貴戚激厲左右焉識所用掾史皆簡賢者如虞延廷傅寬薛愔等多至公卿校尉顯宗即位拜為執金吾位特進永平二年卒贈以本官印綬謚曰貞侯子躬嗣躬卒子璜嗣永初七年為奴所殺無子國絕永寧元年鄧太后以璜弟淑紹封淑卒子鮪嗣躬弟子綱女為和帝皇后封綱吳房侯位特進三子軼輔敞皆黃門侍郎后坐巫蠱事廢綱自殺輔下獄死軼敞徙日南識弟興興字君陵光烈皇后母弟也為人有膂力建武二年為黃門侍郎守期門僕射典將武騎從征伐平定郡國興每從出入常操持小蓋障翳風雨躬履塗泥率先期門光武所幸之處輒先入清宮甚見親信雖好施接賓然門無俠客與同郡張宗上谷鮮于裒不相好知其有用猶稱所長而達之友人張汜杜禽與興厚善以為華而少實但私之以財終不為言是以世稱其忠平第宅苟完裁蔽風雨九年遷侍中賜爵關內侯帝後召興欲封之置印綬於前興固讓曰臣未有先登陷陣之功而一家數人並蒙爵土令天下觖望誠為盈溢臣蒙陛下貴人恩澤至厚富貴已極不可復加至誠不願帝嘉興之讓不奪其志貴人問其故興曰貴人不讀書記邪亢龍有悔夫外戚家苦不知謙退嫁女欲配侯王取婦眄睨公主愚心實不安也富貴有極人當知足夸奢益為觀聽所譏貴人感其言深自降挹卒不為宗親求位十九年拜衞尉亦輔導皇太子明年夏帝風眩疾甚後以興領侍中受顧命於雲臺廣室會疾瘳召見興欲以代吳漢為大司馬興叩頭流涕固讓曰臣不敢惜身誠虧損聖德不可苟冒至誠發中感動左右帝遂聽之二十三年卒時年三十九興素與從兄嵩不相能然敬其威重興疾病帝親臨問以政事及羣臣能不興頓首曰臣愚不足以知之然伏見議郎席廣謁者陰嵩並經行明深踰於公卿興沒後帝思其言遂擢廣為光祿勳嵩為中郎將監羽林十餘年以謹勑見幸顯宗即位拜長樂衞尉遷執金吾永平元年詔曰故侍中衞尉關內侯興典領禁兵從平天下當以軍功顯受封爵又諸舅比例應蒙恩澤興皆固讓安乎里巷輔導朕躬有周昌之直在家仁孝有曾閔之行不幸早卒朕甚傷之賢者子孫宜加優異其以汝南之鮦陽封興子慶為鮦陽侯慶弟博為強侯博弟員丹並為郎慶推田宅財物悉與員丹帝以慶義讓擢為黃門侍郎慶卒子琴嗣建初五年興夫人卒肅宗使五官中郎將持節即墓賜策追謚興曰翼侯琴卒子萬全嗣萬全卒子桂嗣興弟就嗣父封宣恩侯後改封為新陽侯就善談論朝臣莫及然性剛不得衆譽顯宗即位以就為少府位特進就子豐尚酈邑公主公主嬌妒豐亦狷急永平二年遂殺主被誅父母當坐皆自殺國除帝以舅氏故不極其刑陰氏侯者凡四人初陰氏世奉管仲之祀謂為相君宣帝時陰子方者至孝有仁恩臘日晨炊而竈神形見子方再拜受慶家有黃羊因以祀之自是已後暴至巨富田有七百餘頃輿馬僕隸比於邦君子方常言我子孫必將彊大至識三世而遂繁昌故後常以臘日祀竈而薦黃羊焉贊曰權族好傾后門多毀樊氏世篤陰亦戒侈恂恂苗胤傳龜襲紫
