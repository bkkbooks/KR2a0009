body:
  text: 後漢書卷四十九王充王符仲長統列傳第三十九王充字仲任會稽上虞人也其先自魏郡元城徙焉充少孤鄉里稱孝後到京師受業太學師事扶風班彪好博覽而不守章句家貧無書常游洛陽市肆閱所賣書一見輒能誦憶遂博通衆流百家之言後歸鄉里屏居教授仕郡為功曹以數諫爭不合去充好論說始若詭異終有理實以為俗儒守文多失其真乃閉門潛思絕慶弔之禮戶牖牆壁各置刀筆箸論衡八十五篇二十餘萬言釋物類同異正時俗嫌疑刺史董勤辟為從事轉治中自免還家友人同郡謝夷吾上書薦充才學肅宗特詔公車徵病不行年漸七十志力衰耗乃造養性書十六篇裁節嗜欲頤神自守永元中病卒于家王符字節信安定臨涇人也少好學有志操與馬融竇章張衡崔瑗等友善安定俗鄙庶孽而符無外家為鄉人所賤自和安之後世務游宦當塗者更相薦引而符獨耿介不同於俗以此遂不得升進志意蘊憤乃隱居著書三十餘篇以譏當時失得不欲章顯其名故號曰潛夫論其指訐時短討讁物情足以觀見當時風政著其五篇云爾貴忠篇曰夫帝王之所尊敬者天也皇天之所愛育者人也今人臣受君之重位牧天之所愛焉可以不安而利之養而濟之哉是以君子任職則思利人達上則思進賢故居上而下不怨在前而後不恨也書稱天工人其代之王者法天而建官故明主不敢以私授忠臣不敢以虛受竊人之財猶謂之盜況偷天官以私己乎以罪犯人必加誅罰況乃犯天得無咎乎夫五世代之臣以道事君澤及草木仁被率土是以福祚流衍本支百世季世之臣以諂媚主不思順天專杖殺伐白起蒙恬秦以為功天以為賊息夫董賢主以為忠天以為盜易曰德薄而位尊智小而謀大鮮不及矣是故德不稱其禍必酷能不稱其殃必大夫竊位之人天奪其鑒雖有明察之資仁義之志一旦富貴則背親捐舊喪其本心疎骨肉而親便辟薄知友而厚犬馬寧見朽貫千萬而不忍貸人一錢情知積粟腐倉而不忍貸人一斗骨肉怨望於家細人謗讟於道前人以敗後爭襲之誠可傷也常失人君有常過嬰兒常病傷於飽也貴臣常禍傷於寵也哺乳多則生病富貴盛而致驕疾愛子而賊之驕臣而滅之者非一也極其罰者乃有仆死深牢銜刀都巿豈非無功於天有害於人者乎夫鳥以山為埤而增巢其上魚以泉為淺而穿穴其中卒所以得者餌也貴戚願其宅吉而制為令名欲其門堅而造作鐵樞卒其所以敗者非苦禁忌少而門樞朽也常苦崇財貨而行驕僭耳之危而圖太山之安為朝露之行而思傳世之功豈不惑哉豈不惑哉浮侈篇曰王者以四海為家兆人為子一夫不耕天下受其飢一婦不織天下受其寒今舉俗舍本農趨商賈牛馬車輿填塞道路游手為巧充盈都邑務本者少浮食者衆商邑翼翼四方是極今察洛陽資末業者什於農夫虛偽游手什於末業是則一夫耕百人食之一婦桑百人衣之以一奉百孰能供之天下百郡千縣巿邑萬數類皆如此本末不足相供則民安得不飢寒飢寒並至則民安能無姦軌姦軌繁多則吏安能無嚴酷嚴酷數加則下安能無愁怨愁怨者多則咎徵並臻下民無聊而上天降灾則國危矣之誨之慎微防萌以斷其邪故易美節以制度不傷財不害民七月之詩大小教之終而復始由此觀之人固不可恣也事丁夫不扶犂鋤而懷丸挾彈攜手上山遨遊或好取土作丸賣之外不足禦寇盜內不足禁鼠雀或作泥車瓦狗諸戲弄之具以巧詐小兒此皆無益也舞事神以欺誣細民熒惑百姓妻女羸弱疾病之家懷憂憤憤易為恐懼至使奔走便時去離正宅崎嶇路側風寒所傷姦人所利盜賊所中或增禍重祟至於死亡而不知巫所欺誤反恨事神之晚此妖妄之甚者也截衆縷繞帶手腕或裁切綺縠繨紩成幡皆單費百縑用功千倍破牢為偽以易就難坐食嘉穀消損白日夫山林不能給野火江海不能實漏巵皆所宜禁也王制固亦甚矣且其徒御僕妾皆服文組綵牒錦繡綺紈葛子升越筩中女布犀象珠玉虎魄瑁石山隱飾金銀錯鏤窮極麗靡轉相誇咤其嫁娶者車軿數里緹帷竟道騎奴侍童夾轂並引富者競欲相過貧者恥其不逮一饗之所費破終身之業古者必有命然後乃得衣繒絲而乘車馬今雖不能復古宜令細民略用孝文之制槨桐木為棺葛采為緘下不及泉上不泄臭中世以後轉用楸梓槐柏杶樗之屬各因方土裁用膠漆使其堅足恃其用足任如此而已今者京師貴戚必欲江南檽梓豫章之木邊遠下土亦競相放効夫檽樟豫章所出殊遠伐之高山引之窮谷入海乘淮逆河泝洛工匠彫刻連累日月會衆而後動多牛而後致重且千斤功將萬夫而東至樂浪西達敦煌費力傷農於萬里之地古者墓而不墳中世墳而不崇仲尼喪母冢高四尺遇雨而崩弟子請修之夫子泣曰古不修墓及鯉也死有棺無椁文帝葬芷陽明帝葬洛南皆不臧珠寶不起山陵墓雖卑而德最高今京師貴戚郡縣豪家生不極養死乃崇喪或至金縷玉匣檽梓楩多埋珍寶偶人車馬造起大冢廣種松柏廬舍祠堂務崇華侈案鄗畢之陵南城之冢周公非不忠曾子非不孝以為襃君愛父不在於聚財揚名顯親無取於車馬昔晉靈公多賦以雕牆春秋以為非不君華元樂舉厚葬文公君子以為不臣況於羣司士庶乃可僭侈主上過天道乎實貢篇曰國以賢興以諂衰君以忠安以佞危此古今之常論而時所共知也然衰國危君繼踵不絕者豈時無忠信正直之士哉誠苦其道不得行耳夫十步之閒必有茂草十室之邑必有忠信是故亂殷有三仁小衞多君子今以大漢之廣土士民之繁庶朝廷之清明上下之脩正而官無善吏位無良臣此豈時之無賢諒由取之乖實夫志道者少與逐俗者多疇是以朋黨用私背實趨華其貢士者不復依其質幹準其才行但虛造聲譽妄生羽毛略計所舉歲且二百覽察其狀則德侔顏冉詳覈厥能則鮮及中人皆總務升官自相推達夫士者貴其用也不必求備故四友雖美能不相兼三仁齊致事不一節高祖佐命出自亡秦光武得士亦資暴莽況太平之時而云無士乎以石洗金以鹽濯錦以魚浣布以灰夫物固有以賤理貴以醜化好者矣智者𠫓廾短取長以致其功今使貢士必覈以實其有小疵勿彊衣飾出處默語各因其方則蕭曹周韓之倫何足不致吳鄧梁竇之屬企踵可待孔子曰未之思也夫何遠之有愛日篇曰國之所以為國者以有民也民之所以為民者以有穀也穀之所以豐殖者以有民功也功之所以能建者以日力也化國之日舒以長故其民閑暇而力有餘亂國之日促以短故其民困務而力不足舒長者非謂羲和安行乃君明民靜而力有餘也促短者非謂分度損減乃上闇下亂力不足也孔子稱既庶則富之既富乃教之是故禮義生於富足盜竊起於貧窮富足生於寬暇貧窮起於無日聖人深知力者民之本國之基也故務省徭役使之愛日是以堯勑羲和欽若昊天敬授民時明帝時公車以反支日不受章奏帝聞而怪曰民廢農桑遠來詣闕而復拘以禁忌豈為政之意乎於是遂蠲其制令今冤民仰希申訴而令長以神自畜百姓廢農桑而趨府廷者相續道路非朝餔不得通非意氣不得見或連日累月更相瞻視或轉請鄰里饋糧應對歲功既虧天下豈無受其飢者乎斷者而類多枉曲蓋有故焉夫理直則恃正而不橈事曲則諂意以行賕不橈故無恩於吏行賕故見私於法若事有反覆吏應坐之吏以應坐之故不得不枉之於庭以羸民之少黨而與豪吏對訟其埶得無屈乎縣承吏言故與之同若事有反覆縣亦應坐之縣以應坐之故而排之於郡以一民之輕而與一縣為訟其理豈得申乎事有反覆郡亦坐之郡以共坐之故而排之於州以一民之輕與一郡為訟其事豈獲勝乎既不肯理故乃遠詣公府公府復不能察而當延以日月貧弱者無以曠旬彊富者可盈千日理訟若此何枉之能理乎正士懷怨結而不見信猾吏崇姦軌而不被坐此小民所以易侵苦而天下所以多困窮也之民官事相連更相檢對者日可有十萬人一人有事二人經營是為日三十萬人廢其業也以中農率之則是歲三百萬人受其飢者也然則盜賊何從而銷太平何由而作乎詩云莫肯念亂誰無父母百姓不足君誰與足可無思哉可無思哉述赦篇曰凡療病者必知脈之虛實氣之所結然後為之方故疾可愈而壽可長也為國者必先知民之所苦禍之所起然後為之禁故姦可塞而國可安也今日賊良民之甚者莫大於數赦贖赦贖數則惡人昌而善人傷矣何以明之哉夫謹勑之人身不蹈非又有為吏正直不避彊禦而姦猾之黨橫加誣言者皆知赦之不久故也善人君子被侵怨而能至闕庭自明者萬無數人數人之中得省問者百不過一既對尚書而空遣去者復什六七矣其輕薄姦軌既陷罪法怨毒之家冀其辜戮以解畜憤而反一㮣悉蒙赦釋令惡人高會而誇咤老盜服臧而過門孝子見讎而不得討遭盜者覩物而不敢取痛莫甚焉夫養稂莠者傷禾稼惠姦軌者賊良民書曰文王作罰刑茲無赦先王之制刑法也非好傷人肌膚斷人壽命也貴威姦懲惡除人害也故經稱天命有德五服五章哉天討有罪五刑五用哉詩刺彼宜有罪汝反脫之古者唯始受命之君承大亂之極寇賊姦軌難為法禁故不得不有一赦與之更新頤育萬民以成大化非以養姦活罪放縱天賊也夫性惡之民民之豺狼雖得放宥之澤終無改悔之心旦脫重梏夕還囹圄嚴明令尹不能使其斷絕何也凡敢為大姦者才必有過於衆而能自媚於上者也多散誕得之財奉以諂諛之辭以轉相驅非有第五公之廉直孰不為顧哉論者多曰久不赦則姦軌熾而吏不制宜數肆眚以解散之此未昭政亂之本源不察禍福之所生也後度遼將軍皇甫規解官歸安定鄉人有以貨得鴈門太守者亦去職還家書刺謁規規臥不迎既入而問卿前在郡食鴈美乎有頃又白王符在門規素聞符名乃驚遽而起衣不及帶屣履出迎援符手而還與同坐極歡時人為之語曰徒見二千石不如一縫掖言書生道義之為貴也符竟不仕終於家仲長統字公理山陽高平人也少好學博涉書記贍於文辭年二十餘游學青徐并冀之閒與交友者多異之并州刺史高幹袁紹甥也素貴有名招致四方遊士士多歸附統過幹幹善待遇訪以當時之事統謂幹曰君有雄志而無雄才好士而不能擇人所以為君深戒也幹雅自多不納其言統遂去之無幾幹以并州叛卒至於敗并冀之士皆以是異統統性俶儻敢直言不矜小節默語無常時人或謂之狂生每州郡命召輒稱疾不就常以為凡遊帝王者欲以立身揚名耳而名不常存人生易滅優遊偃仰可以自娛欲卜居清曠以樂其志論之曰使居有良田廣宅背山臨流溝池環帀竹木周布場圃築前果園樹後舟車足以代步涉之艱使令足以息四體之役養親有兼珍之膳妻孥無苦身之勞良朋萃止則陳酒肴以娛之嘉時吉日則亨羔豚以奉之蹰躇畦苑遊戲平林濯清水追涼風釣游鯉弋高鴻諷於舞雩之下詠歸高堂之上安神閨房思老氏之玄虛呼吸精和求至人之仿佛與達者數子論道講書俯仰二儀錯綜人物彈南風之雅操發清商之妙曲消搖一世之上睥睨天地之閒不受當時之責永保性命之期如是則可以陵霄漢出宇宙之外矣豈羨夫入帝王之門哉又作詩二篇以見其志辭曰騁風無足垂露成幃張霄成幄沆瀣當餐九陽代燭恆星豔珠朝霞潤玉六合之內恣心所欲人事可遺何為局促要在我寄愁天上埋憂地下叛散五經滅𠫓廾風雅百家雜碎請用從火抗志山栖游心海左元氣為舟微風為柂敖翔太清縱意容冶尚書令荀彧聞統名奇之舉為尚書郎後參丞相曹操軍事每論說古今及時俗行事恆發憤歎息因著論名曰昌言凡三十四篇十餘萬言獻帝遜位之歲統卒時年四十一友人東海繆襲常稱統才章足繼西京董賈劉楊今簡撮其書有益政者略載之云理亂篇曰豪傑之當天命者未始有天下之分者也無天下之分故戰爭者競起焉于斯之時並偽假天威矯據方國擁甲兵與我角才智程勇力與我競雌雄不知去就疑誤天下蓋不可數也角知者皆窮角力者皆負形不堪復伉埶不足復校乃始羈首係頸就我之銜紲耳夫或曾為我之尊長矣或曾與我為等儕矣或曾臣虜我矣或曾執囚我矣彼之蔚蔚皆匈詈腹詛幸我之不成而以奮其前志詎肯用此為終死之分邪養子孫天下晏然皆歸心於我矣豪傑之心既絕士民之志已定貴有常家尊在一人當此之時雖下愚之才居之猶能使恩同天地威侔鬼神暴風疾霆不足以方其怒陽春時雨不足以喻其澤周孔數千無所復角其聖賁育百萬無所復奮其勇矣彼後嗣之愚主見天下莫敢與之違自謂若天地之不可亡也乃奔其私嗜騁其邪欲君臣宣淫上下同惡目極角觝之觀耳窮鄭衞之聲入則耽於婦人出則馳於田獵荒廢庶政𠫓廾亡人物澶漫彌流無所底極信任親愛者盡佞諂容說之人也寵貴隆豐者盡后妃姬妾之家也使餓狼守庖廚飢虎牧牢豚遂至熬天下之脂膏斲生人之骨髓怨毒無聊禍亂並起中國擾攘四夷侵叛土崩瓦解一朝而去昔之為我哺乳之子孫者今盡是我飲血之寇讎也至於運徙埶去猶不覺悟者豈非富貴生不仁沈溺致愚疾邪存亡以之迭代政亂從此周復天道常然之大數也以遠甚豈不然邪漢興以來相與同為編戶齊民而以財力相君長者世無數焉而清絜之士徒自苦於茨棘之閒無所益損於風俗也豪人之室連棟數百膏田滿野奴婢千羣徒附萬計船車賈販周於四方廢居積貯滿於都城琦賂寶貨巨室不能容馬牛羊豕山谷不能受妖童美妾填乎綺室倡謳樂列乎深堂賓客待見而不敢去車騎交錯而不敢進三牲之肉臭而不可食清醇之酎敗而不可飲睇盼則人從其目之所視喜怒則人隨其心之所慮此皆公侯之廣樂君長之厚實也苟能運智詐者則得之焉苟能得之者人不以為罪焉源發而橫流路開而四通矣求士之舍榮樂而居窮苦𠫓廾放逸而赴束縛夫誰肯為之者邪夫亂世長而化世短亂世則小人貴寵君子困賤當君子困賤之時跼高天蹐厚地猶恐有鎮厭之禍也逮至清世則復入於矯枉過正之檢老者耄矣不能及寬饒之俗少者方壯將復困於衰亂之時是使姦人擅無窮之福利而善士挂不赦之罪辜苟目能辯色耳能辯聲口能辯味體能辯寒溫者將皆以脩絜為諱惡設智巧以避之焉況肯有安而樂之者邪斯下世人主一切之愆也心屠裂天下吞食生人暴虐不已以招楚漢用兵之苦甚於戰國之時也漢二百年而遭王莽之亂計其殘夷滅亡之數又復倍乎秦項矣以及今日名都空而不居百里絕而無民者不可勝數此則又甚於亡新之時也悲夫不及五百年大難三起中閒之亂尚不數焉變而彌猜下而加酷推此以往可及於盡矣嗟乎不知來世聖人救此之道將何用也又不知天若窮此之數欲何至邪損益篇曰作有利於時制有便於物者可為也事有乖於數法有翫於時者可改也故行於古有其迹用於今無其功者不可不變變而不如前易有多所敗者亦不可不復也漢之初興分王子弟委之以士民之命假之以殺生之權於是驕逸自恣志意無厭魚肉百姓以盈其欲報蒸骨血以快其情上有篡叛不軌之姦下有暴亂殘賊之害雖藉親屬之恩蓋源流形埶使之然也降爵削土稍稍割奪卒至於坐食奉祿而已然其洿穢之行淫昏之罪猶尚多焉故淺其根本輕其恩義猶尚假一日之尊收士民之用況專之於國擅之於嗣豈可鞭笞叱咤而使唯我所為者乎時政彫敝風俗移易純樸已去智惠已來出於禮制之防放於嗜欲之域久矣固不可授之以柄假之以資者也是故收其奕世之權校其從橫之埶善者早登否者早去故下土無壅滯之士國朝無專貴之人此變之善可遂行者也辰龍章之服不為編戶一伍之長而有千室名邑之役榮樂過於封君埶力侔於守令財賂自營犯法不坐刺客死士為之投命至使弱力少智之子被穿帷敗寄死不斂冤枉窮困不敢自理雖亦由網禁疎闊蓋分田無限使之然也今欲張太平之紀綱立至化之基趾齊民財之豐寡正風俗之奢儉非井田實莫由也此變有所敗而宜復者也者無傷於人髡笞不足以懲中罪安得不至於死哉夫雞狗之攘竊男女之淫奔酒醴之賂遺謬誤之傷害皆非值於死者也殺之則甚重髡之則甚輕不制中刑以稱其罪則法令安得不參差殺生安得不過謬乎今患刑輕之不足以懲惡則假臧貨以成罪託疾病以諱殺科條無所準名實不相應恐非帝王之通法聖人之良制也或曰過刑惡人可也過刑善人豈可復哉曰若前政以來未曾枉害善人者則有罪不死也是為忍於殺人也而不忍於刑人也今令五刑有品輕重有數科條有序名實有正非殺人逆亂鳥獸之行甚重者皆勿殺嗣周氏之祕典續呂侯之祥刑此又宜復之善者也人上者也衆者為人下者也一伍之長才足以長一伍者也一國之君才足以君一國者也天下之王才足以王天下者也愚役於智猶枝之附幹此理天下之常法也制國以分人立政以分事人遠則難綏事總則難了今遠州之縣或相去數百千里雖多山陵洿澤猶有可居人種穀者焉當更制其境界使遠者不過二百里明版籍以相數閱審什伍以相連持限夫田以斷并兼定五刑以救死亡益君長以興政理急農桑以豐委積去末作以一本業敦教學以移情性表德行以厲風俗覈才蓺以官宜簡精悍以習師田修武器以存守戰嚴禁令以防僭差信實罰以驗懲勸糾游戲以杜姦邪察苛刻以絕煩暴審此十六者以為政務操之有常課之有限安寧勿懈墯有事不迫遽聖人復起不能易也狄居漢地者尚不在焉丁壯十人之中必有堪為其什伍之長推什長已上則百萬人也又十取之則佐史之才已上十萬人也又十取之則可使在政理之位者萬人也以筋力用者謂之人人求丁壯以才智用者謂之士士貴耆老充此制以用天下之人猶將有儲何嫌乎不足也故物有不求未有無物之歲也士有不用未有少士之世也夫如此然後可以用天性究人理興頓廢屬斷絕網羅遺漏拱柙天人矣也曰若是三代不足摹聖人未可師也君子用法制而至於化小人用法制而至於亂均是一法制也或以之化或以之亂行之不同也苟使豺狼牧羊豚盜跖主征稅國家昏亂吏人放肆則惡復論損益之閒哉夫人待君子然後化理國待蓄積乃無憂患君子非自農桑以求衣食者也蓄積非橫賦斂以取優饒者也奉祿誠厚則割剝貿易之罪乃可絕也蓄積誠多則兵寇水旱之灾不足苦也故由其道而得之民不以為奢由其道而取之民不以為勞天灾流行開倉庫以稟貸不亦仁乎衣食有餘損靡麗以散施不亦義乎彼君子居位為士民之長固宜重肉累帛朱輪四馬今反謂薄屋者為高藿食者為清既失天地之性又開虛偽之名使小智居大位庶績不咸熙未必不由此也得拘絜而失才能非立功之實也以廉舉而以貪去非士君子之志也夫選用必取善士善士富者少而貧者多祿不足以供養安能不少營私門乎從而罪之是設機置穽以待天下之君子也者猥萬里懸乏首尾不救徭役並起農桑失業兆民呼嗟於昊天貧窮轉死於溝壑矣今通肥饒之率計稼穡之入令畝收三斛斛取一斗未為甚多一歲之閒則有數年之儲雖興非法之役恣奢侈之欲廣愛幸之賜猶未能盡也不循古法規為輕稅及至一方有警一面被灾未逮三年校計騫短坐視戰士之蔬食立望餓殍之滿道如之何為君行此政也二十稅一名之曰貊況三十稅一乎夫薄吏祿以豐軍用緣於秦征諸侯續以四夷漢承其業遂不改更危國亂家此之由也今田無常主民無常居吏食日稟祿班祿未定可為法制畫一定科租稅十一更賦如舊今者土廣民稀中地未墾雖然猶當限以大家勿令過制其地有草者盡曰官田力堪農事乃聽受之若聽其自取後必為姦也法誡篇曰周禮六典冢宰貳王而理天下春秋之時諸侯明德者皆一卿為政爰及戰國亦皆然也秦兼天下則置丞相而貳之以御史大夫自高帝逮于孝成因而不改多終其身漢之隆盛是惟在焉夫任一人則政專任數人則相倚政專則和諧相倚則違戾和諧則太平之所興也違戾則荒亂之所起也光武皇帝慍數世之失權忿彊臣之竊命矯枉過直政不任下雖置三公事歸臺閣自此以來三公之職備員而已然政有不理猶加譴責而權移外戚之家寵被近習之豎親其黨類用其私人內充京師外布列郡顛倒賢愚貿易選舉疲駑守境貪殘牧民撓擾百姓忿怒四夷招致乖叛亂離斯瘼怨氣並作陰陽失和三光虧缺怪異數至蟲螟食稼水旱為灾此皆戚宦之臣所致然也反以策讓三公至於死免乃足為叫呼蒼天號咷泣血者也又中世之選三公也務於清売心謹慎循常習故者是婦女之檢柙鄉曲之常人耳惡足以居斯位邪埶既如彼選又如此而欲望三公勳立於國家績加於生民不亦遠乎昔文帝之於鄧通可謂至愛而猶展申徒嘉之志夫見任如此則何患於左右小臣哉至如近世外戚臣豎請託不行意氣不滿立能陷人於不測之禍惡可得彈正者哉曩者任之重而責之輕今者任之輕而責之重昔賈誼感絳侯之困辱因陳大臣廉恥之分開引自裁之端自此以來遂以成俗繼世之主生而見之習其所常曾莫之悟嗚呼可悲夫左手據天下之圖右手刎其喉愚者猶知難之況明哲君子哉光武奪三公之重至今而加甚不假后黨以權數世而不行蓋親疏之埶異也母后之黨左右之人有此至親之埶故其貴任萬世常然之敗無世而無之莫之斯鑒亦可痛矣未若置丞相自總之若委三公則宜分任責成夫使為政者不當與之婚姻婚姻者不當使之為政也如此在位病人舉用失賢百姓不安爭訟不息天地多變人物多妖然後可以分此罪矣或曰政在一人權甚重也曰人實難得何重之嫌昔者霍禹竇憲鄧騭梁冀之徒籍外戚之權管國家之柄及其伏誅以一言之詔詰朝而決何重之畏乎今夫國家漏神明於媟近輸權重於婦黨筭十世而為之者八九焉不此之罪而彼之疑何其詭邪論曰百家之言政者尚矣大略歸乎寧固根柢革易時敝也夫遭運無恆意見偏雜故是非之論紛然相乖嘗試妄論之以為世非胥庭人乖鷇飲化迹萬肇情故萌生雖周物之智不能研其推變山川之奧未足況其紆險則應俗適事難以常條如使用審其道則殊塗同會才爽其分則一豪以乖何以言之若夫玄聖御世則天同極施舍之道宜無殊典而損益異運文朴遞行用明居晦回泬於曩時興戈陳俎參差於上世及至戴黃屋服絺衣豐薄不齊而致化則一亦有宥公族黥國儲寬慘巨隔而防非必同此其分波而共源百慮而一致者也若乃偏情矯用則枉直必過故葛屨履霜敝由崇儉楚楚衣服戒在窮賒疎禁厚下以尾大陵弱斂威峻罰以苛薄分崩斯曹魏之刺所以明乎國風周秦末軌所以彰於微滅故用舍之端興敗資焉是以繁簡唯時寬猛相濟刑書鐫鼎事有可詳三章在令取貴能約太叔致猛政之襃國子流遺愛之涕宣孟改冬日之和平陽循畫一之法斯實薥張之弘致可以徵其統乎數子之言當世失得皆究矣然多謬通方之訓好申一隅之說貴清靜者以席上為腐議束名實者以柱下為誕辭或推前王之風可行於當年有引救敝之規宜流於長世稽之篤論將為敝矣如以舟無推陸之分瑟非常調之音不陽局以疑遠不拘玄以妨素則化樞各管其極理略可得而言與贊曰管視好偏羣言難一救朴雖文矯必疾舉端自理滯隅則失詳觀時蠹成昭政術
