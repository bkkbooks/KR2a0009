body:
  text: 後漢書志第一律歷上律準候氣古之人論數也曰物生而後有象象而後有滋滋而後有數然則天地初形人物既著則筭數之事生矣記稱大橈作甲子隸首作數二者既立以比日表以管萬事夫一十百千萬所同用也律度量衡曆其別用也故體有長短檢以度物有多少受以量量有輕重平以權衡聲有清濁協以律呂三光運行紀以曆數然後幽隱之情精微之變可得而綜也漢興北平侯張蒼首治律曆孝武正樂置協律之官至元始中博徵通知鍾律者考其意義羲和劉歆典領條奏前史班固取以為志而元帝時郎中京房房字君明知五聲之音六律之數上使太子太傅韋玄成字少翁諫議大夫章雜試問房於樂府房對受學故小黃令焦延壽六十律相生之法以上生下皆三生二以下生上皆三生四陽下生陰陰上生陽終於中呂而十二律畢矣中呂上生執始執始下生去滅上下相生終於南事六十律畢矣夫十二律之變至於六十猶八卦之變至於六十四也宓羲作易紀陽氣之初以為律法建日冬至之聲以黃鍾為宮太蔟為商姑洗為角林鍾為徵南呂為羽應鍾為變宮蕤賓為變徵此聲氣之元五音之正也故各終統一日其餘以次運行當日者各自為宮而商徵以類從焉禮運篇曰五聲六律十二管還相為宮此之謂也以六十律分朞之日黃鍾自冬至始及冬至而復陰陽寒燠風雨之占生焉於以檢攝羣音考其高下苟非草革木之聲則無不有所合虞書曰律和聲此之謂也房又曰竹聲不可以度調故作準以定數準之狀如瑟長丈而十三弦隱閒九尺以應黃鍾之律九寸中央一弦下有畫分寸以為六十律清濁之節房言律詳於歆所奏其術施行於史官候部用之文多不悉載故總其本要以續前志律術曰陽以圓為形其性動陰以方為節其性靜動者數三靜者數二以陽生陰倍之以陰生陽四之皆三而一陽生陰曰下生陰生陽曰上生上生不得過黃鍾之清濁下生不得及黃鍾之數實清皆參天兩地圓蓋方覆六耦承奇之道也黃鍾律呂之首而生十一律者也其相生也皆三分而損益之是故十二律之得十七萬七千一百四十七是為黃鍾之實又以二乘而三約之是為下生林鍾之實又以四乘而三約之是為上生太蔟之實推此上下以定六十律之實以九三之數得萬九千六百八十三為法於律為寸於準為尺不盈者十之所得為分又不盈十之所得為小分以其餘正其強弱截管為律吹以考聲列以物氣道之本也術家以其聲微而體難知其分數不明故作準以代之準之聲明暢易達分寸又粗然弦以緩急清濁非管無以正也均其中弦令與黃鍾相得案畫以求諸律無不如數而應者矣音聲精微綜之者解元和元年待詔候鍾律殷肜上言官無曉六十律以準調音者故待詔嚴崇具以準法教子男宣宣通習願召宣補學官主調樂器詔曰崇子學審曉律別其族協其聲者審試不得依託父學以聾為聰聲微妙獨非莫知獨是莫曉以律錯吹能知命十二律不失一方為能傳崇學耳太史丞弘試十二律其二中其四不中其六不知何律宣遂罷自此律家莫能為準施弦候部莫知復見熹平六年東觀召典律者太子舍人張光等問準意光等不知歸閱舊藏乃得其器形制如房書猶不能定其弦緩急音不可書以時曉人知之者欲教而無從心達者體知而無師故史官能辨清濁者遂絕其可以相傳者唯大搉常數及候氣而已夫五音生於陰陽分為十二律轉生六十皆所以紀斗氣效物類也天效以景地效以響即律也陰陽和則景至律氣應則灰除是故天子常以日冬夏至御前殿合八能之士陳八音聽樂均度晷景候鍾律權土灰炭放效陰陽冬至陽氣應則樂均清景長極黃鍾通土灰炭輕而衡仰夏至陰氣應則樂均濁景短極蕤賓通土灰炭重而衡低進退於先後五日之中八能各以候狀聞太史封上效則和否則占候氣之法為室三重戶閉塗釁必周密布緹縵室中以木為案每律各一內庳外高從其方位加律其上以葭莩灰抑其內端案曆而候之氣至者灰去動其為氣所動者其灰散人及風所動者其灰聚殿中候用玉律十二惟二至乃候靈臺用竹律六十候日如其曆
