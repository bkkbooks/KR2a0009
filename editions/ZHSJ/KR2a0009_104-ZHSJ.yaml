body:
  text: 後漢書志第四禮儀上合朔立春五供上陵冠夕牲耕高禖養老先蠶祓禊夫威儀所以與君臣序六親也若君亡君之威臣亡臣之儀上替下陵此謂大亂大亂作則羣生受其殃可不慎哉故記施行威儀以為禮儀志禮威儀每月朔旦太史上其月曆有司侍郎尚書見讀其令奉行其政朔前後各二日皆牽羊酒至社下以祭日日有變割羊以祠社用救日日變執事者冠長冠衣皁單衣絳領袖綠緣中衣絳袴以行禮如故事立春之日夜漏未盡五刻京師百官皆衣青衣郡國縣道官下至斗食令史皆服青幘立青幡施土牛耕人于門外以示兆民至立夏唯武官不立春之日下寬大書曰制詔三公方春東作敬始慎微動作從之罪非殊死且勿案驗皆須麥秋退貪殘進柔良下當用者如故事正月上丁祠南郊禮畢次北郊明堂高廟世祖廟謂之五供五供畢以次上陵西都舊有上陵東都之儀百官四姓親家婦女公主諸王大夫外國朝者侍子郡國計吏會陵晝漏上水大鴻臚設九賓隨立寢殿前鍾鳴謁者治禮引客羣臣就位如儀乘輿自東廂下太常導出西向拜止折旋升阼階拜神坐退坐東廂西向侍中尚書陛者皆神坐後公卿羣臣謁神坐太官上食太常樂奏食舉舞文始五行之舞禮樂闋君羣臣受賜食畢郡國上計吏以次前當神軒占其郡國穀價民所疾苦欲神知其動靜孝子事親盡禮敬愛之心也周徧如禮最後親陵遣計吏賜之帶佩八月飲酎上陵禮亦如之凡齋天地七日宗廟山川五日小祠三日齋日內有汙染解齋副倅行禮先齋一日有汙穢災變齋祀如儀大喪唯天郊越紼而齋地以下皆百日後乃齋如故事正月甲子若丙子為吉日可加元服儀從冠禮乘輿初加緇布進賢次爵弁次武弁次通天以據冠訖皆於高祖廟如禮謁王公以下初加進賢而已正月天郊夕牲晝漏未盡十八刻初納夜漏未盡八刻初納進熟獻太祝送旋皆就燎位宰祝舉火燔柴火然天子再拜興有司告事畢也明堂五郊宗廟太社稷六宗夕牲皆以晝漏未盡十四刻初納夜漏未盡七刻初納進熟獻送神還有司告事畢六宗燔燎火大然有司告事畢正月始耕晝漏上水初納執事告祠先農已享耕時有司請行事就耕位天子三公九卿諸侯百官以次耕力田種各耰訖有司告事畢是月令曰郡國守相皆勸民始耕如儀諸行出入皆鳴鍾皆作樂其有災眚有他故若請雨止雨皆不鳴鍾不作樂仲春之月立高禖祠于城南祀以特牲明帝永平二年三月上始帥羣臣躬養三老五更于辟雍行大射大禮郡縣道行鄉飲酒于學校皆祀聖師周公孔子牲以犬於是七郊禮樂三雍之義備矣養三老五更之儀先吉日司徒上太傅若講師故三公人名用其德行年耆高者一人為老次一人為更也皆服都紵大袍單衣皁緣領袖中衣冠進賢扶玉王杖五更亦如之不杖皆齋于太學講堂其日乘輿先到辟雍禮殿御坐東廂遣使者安車迎三老五更天子迎于門屏交禮道自阼階三老升自賓階至階天子揖如禮三老升東面三公設几九卿正履天子親袒割牲執醬而饋執爵而酳祝鯁在前祝饐在後五更南面公進供禮亦如之明日皆詣闕謝恩以見禮遇大尊顯故也是月皇后帥公卿諸侯夫人蠶祠先蠶禮以少牢是月上巳官民皆絜於東流水上曰洗濯祓除去宿垢疢為大絜絜者言陽氣布暢萬物訖出始絜之矣
