body:
  text: 後漢書卷六十五皇甫張段列傳第五十五皇甫規字威明安定朝那人也祖父棱度遼將軍父旗扶風都尉永和六年西羌大寇三輔圍安定征西將軍馬賢將諸郡兵擊之不能克規雖在布衣見賢不卹軍事審其必敗乃上書言狀尋而賢果為羌所沒郡將知規有兵略乃命為功曹使率甲士八百與羌交戰斬首數級賊遂退卻舉規上計掾其後羌衆大合攻燒隴西朝廷患之規乃上疏求乞自効曰臣比年以來數陳便宜羌戎未動策其將反馬賢始出頗知必敗誤中之言在可考校臣每惟賢等擁衆四年未有成功懸師之費且百億計出於平人回入姦吏故江湖之人羣為盜賊青徐荒飢襁負流散夫羌戎潰叛不由承平皆由邊將失於綏御乘常守安則君侵暴苟競小利則致大害微勝則虛張首級軍敗則隱匿不言軍士勞怨困於猾吏進不得快戰以徼功退不得溫飽以全命餓死溝渠暴骨中原徒見王師之出不聞振旅之聲酋豪泣血驚懼生變是以安不能久敗則經年臣所以搏手叩心而增歎者也願假臣兩營二郡屯列坐食之兵五千出其不意與護羌校尉趙沖共相首尾土地山谷臣所曉習兵埶巧便臣已更之可不煩方寸之印尺帛之賜高可以滌患下可以納降若謂臣年少官輕不足用者凡諸敗將非官爵之不高年齒之不邁臣不勝至誠沒死自陳時帝不能用沖質之閒梁太后臨朝規舉賢良方正對策曰伏惟孝順皇帝初勤王政紀綱四方幾以獲安後遭姦偽威分近習畜貨聚馬戲謔是聞又因緣嬖倖受賂賣爵輕使賓客交錯其閒天下擾擾從亂如歸故每有征戰鮮不挫傷官民並竭上下窮虛臣在關西竊聽風聲未聞國家有所先後而威福之來咸歸權倖陛下體兼乾坤聰哲純茂攝政之初拔用忠貞其餘維綱多所改正遠近翕然望見太平而地震之後霧氣白濁日月不光旱魃為虐大賊從橫流血丹野庶品不安譴誠累至殆以姦臣權重之所致也其常侍尤無狀者亟便黜遣披埽凶黨收入財賄以塞痛怨以荅天誡今日立號雖尊可也實宜增脩謙節輔以儒術省去遊娛不急之務割減廬第無益之飾夫君者舟也人者水也羣臣乘舟者也將軍兄弟操檝者也若能平志畢力以度元元所謂福也如其怠薥將淪波濤可不慎乎夫德不稱祿猶鑿墉之趾以益其高豈量力審功安固之道哉凡諸宿猾酒徒戲客皆耳納邪聲口出諂言甘心逸遊唱造不義亦宜貶斥以懲不軌令冀等深思得賢之福失人之累又在位素餐尚書怠職有司依違莫肯糾察故使陛下專受諂諛之言不聞戶牖之外臣誠知阿諛有福深言近禍豈敢隱心以避誅責乎臣生長邊遠希涉紫庭怖慴失守言不盡心時太山賊叔孫無忌侵亂郡縣中郎將宗資討之未服公車特徵規拜太山太守規到官廣設方略寇賊悉平延熹四年秋叛羌零吾等與先零別種寇鈔關中護羌校尉段熲坐徵後先零諸種陸梁覆沒營塢規素悉羌事志自奮効乃上疏曰自臣受任志竭愚鈍實賴兗州刺史牽顥之清猛中郎將宗資之信義得承節度幸無咎譽今猾賊就滅太山略平復聞羣羌並皆反逆臣生長邠岐年五十有九昔為郡吏再更叛羌豫籌其事有誤中之言臣素有固疾恐犬馬齒窮不報大恩願乞冗官備單車一介之使勞來三輔宣國威澤以所習地形兵埶佐助諸軍臣窮居孤危之中坐觀郡將已數十年矣自鳥鼠至于東岱其病一也力求猛敵不如清平勤明吳孫未若奉法前變未遠臣誠戚之是以越職盡其區區至冬羌遂大合朝廷為憂三公舉規為中郎將持節監關西兵討零吾等破之斬首八百級先零諸種羌慕規威信相勸降者十餘萬明年規因發其騎共討隴右而道路隔絕軍中大疫死者十三四規親入菴廬巡視將士三軍感悅東羌遂遣使乞降涼州復通先是安定太守孫儁受取狼籍屬國都尉李翕督軍御史張稟多殺降羌涼州刺史郭閎漢陽太守趙熹並老弱不堪任職而皆倚恃權貴不遵法度規到州界悉條奏其罪或免或誅羌人聞之翕然反善沈氐大豪滇昌飢恬等十餘萬口復詣規降規出身數年持節為將擁衆立功還督鄉里既無它私惠而多所舉奏又惡絕宦官不與交通於是中外並怨遂共誣規貨賂羣羌令其文降天子璽書誚讓相屬規懼不免上疏自訟曰四年之秋戎醜蠢戾爰自西州侵及涇陽舊都懼駭朝廷西顧明詔不以臣愚駑急使軍就道幸蒙威靈遂振國命羌戎諸種大小稽首輒移書營郡以訪誅納所省之費一億以上以為忠臣之義不敢告勞故恥以片言自及微効然比方先事庶免罪悔前踐州界先奏郡守孫儁次及屬國都尉李翕督軍御史張稟旋師南征又上涼州刺史郭閎漢陽太守趙熹陳其過惡執據大辟凡此五臣支黨半國其餘墨綬下至小吏所連及者復有百餘吏託報將之怨子思復父之恥載贄馳車懷糧步走交搆豪門競流謗讟云臣私報諸羌謝其錢貨若臣以私財則家無擔石如物出於官則文簿易考就臣愚惑信如言者前世尚遺匈奴以宮姬鎮烏孫以公主今臣但費千萬以懷叛羌則良臣之才略兵家之所貴將有何罪負義違理乎自永初以來將出不少覆軍有五動資巨億有旋車完封寫之權門而名成功立厚加爵封今臣還督本土糺舉諸郡絕交離親戮辱舊故衆謗陰害固其宜也臣雖汙穢廉絜無聞今見覆沒恥痛實深傳稱鹿死不擇音謹冒昧略上其年冬徵還拜議郎論功當封而中常侍徐璜左悺欲從求貨數遣賓客就問功狀規終不荅璜等忿怒陷以前事下之於吏官屬欲賦斂請謝規誓而不聽遂以餘寇不絕坐繫廷尉論輸左校諸公及太學生張鳳等三百餘人詣闕訟之會赦歸家徵拜度遼將軍至營數月上書薦中郎將張奐以自代曰臣聞人無常俗而政有治亂兵無強弱而將有能否伏見中郎將張奐才略兼優宜正元帥以從衆望若猶謂愚臣宜充軍事者願乞冗官以為奐副朝庭從之以奐代為度遼將軍規為使匈奴中郎將及奐遷大司農規復代為度遼將軍規為人多意筭自以連在大位欲退身避第數上病不見聽會友人上郡太守王旻喪還規縞素越界到下亭迎之因令客密告并州刺史胡芳言規遠軍營公違禁憲當急舉奏芳曰威明欲避第仕塗故激發我耳吾當為朝廷愛才何能申此子計邪遂無所問及黨事大起天下名賢多見染逮規雖為名將素譽不高自以西州豪桀恥不得豫乃先自上言臣前薦故大司農張奐是附黨也又臣昔論輸左校時太學生張鳳等上書訟臣是為黨人所附也臣宜坐之朝廷知而不問時人以為規賢在事數歲北邊威服永康元年徵為尚書其夏日食詔公卿舉賢良方正下問得失規對曰天之於王者如君之於臣父之於子也誡以災妖使從福祥陛下八年之中三斷大獄一除內嬖再誅外臣而災異猶見人情未安者殆賢愚進退威刑所加有非其理也前太尉陳蕃劉矩忠謀高世廢在里巷劉祐馮緄趙典尹勳正直多怨流放家門李膺王暢孔翊絜身守禮終無宰相之階至於鉤黨之釁事起無端虐賢傷善哀及無辜今興改善政易於覆手而羣臣杜口鑒畏前害互相瞻顧莫肯正言伏願陛下暫留聖明容受謇直則前責可弭後福必降對奏不省遷規弘農太守封壽成亭侯邑二百戶讓封不受再轉為護羌校尉熹平三年以疾召還未至卒于穀城年七十一所著賦銘碑讚禱文弔章表教令書檄牋記凡二十七篇論曰孔子稱其言之不怍則其為之也難察皇甫規之言其心不怍哉夫其審己則干祿見賢則委位故干祿不為貪而委位不求讓稱己不疑伐而讓人無懼情故能功成於戎狄身全於邦家也張奐字然明敦煌酒淵泉人也父惇為漢陽太守奐少遊三輔師事太尉朱竉學歐陽尚書初牟氏章句浮辭繁多有四十五萬餘言奐減為九萬言後辟大將軍梁冀府乃上書桓帝奏其章句詔下東觀以疾去官復舉賢良對策第一擢拜議郎永壽元年遷安定屬國都尉初到職而南匈奴左薁鞬臺耆且渠伯德等七千餘人寇美稷東羌復舉種應之而奐壁唯有二百許人聞即勒兵而出軍吏以為力不敵叩頭爭止之奐不聽遂進屯長城收集兵士遣將王衞招誘東羌因據龜茲使南匈奴不得交通東羌諸豪遂相率與奐和親共擊薁鞬等連戰破之伯德惶恐將其衆降郡界以寧羌豪帥感奐恩德上馬二十匹先零酋長又遺金鐻八枚奐並受之而召主簿於諸羌前以酒酹地曰使馬如羊不以入廏使金如粟不以入懷悉以金馬還之羌性貪而貴吏清前有八都尉率好財貨為所患苦及奐正身絜己威化大行遷使匈奴中郎將時休屠各及朔方烏桓並同反叛燒度遼將軍門引屯赤阬烟火相望兵衆大恐各欲亡去奐安坐帷中與弟子講誦自若軍士稍安乃潛誘烏桓陰與和通遂使斬屠各渠帥襲破其衆諸胡悉降延熹元年鮮卑寇邊奐率南單于擊之斬首數百級明年梁冀被誅奐以故吏免官禁錮奐與皇甫規友善奐既被錮凡諸交舊莫敢為言唯規薦舉前後七上在家四歲復拜武威太守平均徭賦率厲散敗常為諸郡最河西由是而全其俗多妖忌凡二月五月產子及與父母同月生者悉殺之奐示以義方嚴加賞罰風俗遂改百姓生為立祠舉尤異遷度遼將軍數載閒幽并清靜九年春徵拜大司農鮮卑聞奐去其夏遂招結南匈奴烏桓數道入塞或五六千騎或三四千騎寇掠緣邊九郡殺略百姓秋鮮卑復率八九千騎入塞誘引東羌與共盟詛於是上郡沈氐安定先零諸種共寇武威張掖緣邊大被其毒朝廷以為憂復拜奐為護匈奴中郎將以九卿秩督幽并涼三州及度遼烏桓二營兼察刺史二千石能否賞賜甚厚匈奴烏桓聞奐至因相率還降凡二十萬口奐但誅其首惡餘皆慰納之唯鮮卑出塞去永康元年春東羌先零五六千騎寇關中圍祋祤掠雲陽夏復攻沒兩營殺千餘人冬羌岸尾摩蟞等脅同種復鈔三輔奐遣司馬尹端董卓並擊大破之斬其酋豪首虜萬餘人三州清定論功當封奐不事宦官故賞遂不行唯賜錢二十萬除家一人為郎並辭不受而願徙屬弘農華陰舊制邊人不得內移唯奐因功特聽故始為弘農人焉建寧元年振旅而還時竇太后臨朝大將軍竇武與太傅陳蕃謀誅宦官事泄中常侍曹節等於中作亂以奐新徵不知本謀矯制使奐與少府周靖率五營士圍武武自殺蕃因見害奐遷少府又拜大司農以功封侯奐深病為節所賣上書固讓封還印綬卒不肯當明年夏青蛇見於御坐軒前又大風雨雹霹靂拔樹詔使百僚各言災應奐上疏曰臣聞風為號令動物通氣木生於火相須乃明蛇能屈申配龍騰蟄順至為休徵逆來為殃咎陰氣專用則凝精為雹故大將軍竇武太傅陳蕃或志寧社稷或方直不回前以讒勝並伏誅戮海內默默人懷震憤昔周公葬不如禮天乃動威今武蕃忠貞未被明宥妖眚之來皆為此也宜急為改葬徙還家屬其從坐禁錮一切蠲除又皇太后雖居南居而恩禮不接朝臣莫言遠近失望宜思大義顧復之報天子深納奐言以問諸黃門常侍左右皆惡之帝不得自從轉奐太常與尚書劉猛刁韙衞良同薦王暢李膺可參三公之選而曹節等彌疾其言遂下詔切責之奐等皆自囚廷尉數日乃得出並以三月俸贖罪司隸校尉王寓出於宦官欲借寵公卿以求薦舉百僚畏憚莫不許諾唯奐獨拒之寓怒因此遂陷以黨罪禁錮歸田里奐前為度遼將軍與段熲爭擊羌不相平及熲為司隸校尉欲逐奐歸敦煌將害之奐憂懼奏記謝熲曰小人不明得過州將千里委命以情相歸足下仁篤照其辛苦使人未反復獲郵書恩詔分明前以寫白而州期切促郡縣惶懼屏營延企側待歸命父母朽骨孤魂相託若蒙矝憐壹惠咳唾則澤流黃泉施及冥寞非奐生死所能報塞夫無毛髮之勞而欲求人丘山之用此淳于髡所以拍髀仰天而笑者也誠知言必見譏然猶未能無望何者朽骨無益於人而文王葬之死馬無所復用而燕昭寶之黨同文昭之德豈不大哉凡人之情冤則呼天窮則叩心今呼天不聞叩心無益誠自傷痛俱生聖世獨為匪人孤微之人無所告訴如不哀憐便為魚肉企心東望無所復言熲雖剛猛省書哀之卒不忍也時禁錮者多不能守靜或死或徙奐閉門不出養徒千人著尚書記難三十餘萬言奐少立志節嘗與士友言曰大丈夫處世當為國家立功邊境及為將帥果有勳名董卓慕之使其兄遺縑百匹奐惡卓為人絕而不受光和四年卒年七十八遺命曰吾前後仕進十要銀艾不能和光同塵為讒邪所忌通塞命也始終常也但地厎冥冥長無曉期而復纏以纊緜牢以釘密為不喜耳幸有前窀朝殞夕下措屍靈牀幅巾而已奢非晉文儉非王孫推情從意庶無咎吝諸子從之武威多為立祠世世不絕所著銘頌書教誡述志對策章表二十四篇長子芝字伯英最知名芝及弟昶字文舒並善草書至今稱傳之初奐為武威太守其妻懷孕夢帶奐印綬登樓而歌訊之占者曰必將生男復臨茲邦命終此數既而生子猛以建安中為武威太守殺刺史邯鄲商州兵圍之急猛恥見擒乃登樓自燒而死卒如占云論曰自鄛鄉之封中官世盛暴恣數十年閒四海之內莫不切齒憤盈願投兵於其族陳蕃竇武奮義草謀徵會天下名士有識所共聞也而張奐見欺豎子揚戈以斷忠烈雖恨毒在心辭爵謝咎詩云啜其泣矣何嗟及矣段熲字紀明武威姑臧人也其先出鄭共叔段西域都護會宗之從曾孫也熲少便習弓馬尚遊俠輕財賄長乃折節好古學初舉孝廉為憲陵園丞陽陵令所在有能政遷遼東屬國都尉時鮮卑犯塞熲即率所領馳赴之既而恐賊驚去乃使驛騎詐齎璽書詔熲熲於道偽退潛於還路設伏虜以為信然乃入追熲熲因大縱兵悉斬獲之坐詐璽書伏重刑以有功論司寇刑竟徵拜議郎時太山琅邪賊東郭竇公孫舉等聚衆三萬人破壞郡縣遣兵討之連年不克永壽二年桓帝詔公卿選將有文武者司徒尹訟頌薦熲乃拜為中郎將擊竇舉等大破斬之獲首萬餘級餘黨降散封熲為列侯賜錢五十萬除一子為郎中延熹二年遷護羌校尉會燒當燒何當煎勒姐等八種羌寇隴西金城塞熲將兵及湟中義從羌萬二千騎出湟谷擊破之追討南度河使軍吏田晏夏育募先登懸索相引復戰於羅亭大破之斬其酋豪以下二千級獲生口萬餘人虜皆奔走明年春餘羌復與燒何大豪寇張掖攻沒鉅鹿塢殺屬國吏民又招同種千餘落并兵晨奔熲軍熲下馬大戰至日中刀折矢盡虜亦引退熲追之且鬬且行晝夜相攻割肉食雪四十餘日遂至河首積石山出塞二千餘里斬燒何大帥首虜五千餘人又分兵擊石城羌斬首溺死者千六百人燒當種九十餘口詣熲降又雜種羌屯聚白石熲復進擊首虜三千餘人冬勒姐零吾種圍允街殺略吏民熲排營救之斬獲數百人四年冬上郡沈氐隴西牢姐烏吾諸種羌共寇并涼二州熲將湟中義從討之涼州刺史郭閎貪共其功稽固熲軍使不得進義從役久戀鄉舊皆悉反叛郭閎歸罪於熲熲坐徵下獄輸作左校羌遂陸梁覆沒營塢轉相招結唐突諸郡於是吏人守闕訟熲以千數朝廷知熲為郭閎所誣詔問其狀熲但謝罪不敢言枉京師稱為長者起於徒中復拜議郎遷并州刺史時滇那等諸種羌五六千人寇武威張掖酒泉燒人廬舍六年寇埶轉盛涼州幾亡冬復以熲為護羌校尉乘驛之職明年春羌封僇良多滇那等酋豪三百五十五人率三千落詣熲降當煎勒姐種猶自屯結冬熲將萬餘人擊破之斬其酋豪首虜四千餘人八年春熲復擊勒姐種斬首四百餘級降者二千餘人夏進軍擊當煎種於湟中熲兵敗被圍三日用隱士樊志張策潛師夜出鳴鼓還戰大破之首虜數千人熲遂窮追展轉山谷閒自春及秋無日不戰虜遂飢困敗散北略武威閒熲凡破西羌斬首二萬三千級獲生口數萬人馬牛羊八百萬頭降者萬餘落封熲都鄉侯邑五百戶永康元年當煎諸種復反合四千餘人欲攻武威熲復追擊於鸞鳥大破之殺其渠帥斬首三千餘級西羌於此弭定而東羌先零等自覆沒征西將軍馬賢後朝廷不能討遂數寇擾三輔其後度遼將軍皇甫規中郎將張奐招之連年既降又叛桓帝詔問熲曰先零東羌造惡反逆而皇甫規張奐各擁強衆不時輯定欲熲移兵東討未識其宜可參思術略熲因上言曰臣伏見先零東羌雖數叛逆而降於皇甫規者已二萬許落善惡既分餘寇無幾今張奐躊躇久不進者當慮外離內合兵往必驚且自冬踐春屯結不散人畜疲羸自亡之埶徒更招降坐制強敵耳臣以為狼子野心難以恩納埶窮雖服兵去復動唯當長矛挾脅白刃加頸耳計東種所餘三萬餘落居近塞內路無險折非有燕齊秦趙從橫之埶而久亂并涼累侵三輔西河上郡已各內徙安定北地復至單危自雲中五原西至漢陽二千餘里匈奴種羌並其地是為疽伏疾留滯脅下如不加誅轉就滋大今若以騎五千步萬人車三千兩三冬二夏足以破定無慮用費為錢五十四億如此則可令羣羌破盡匈奴長服內徙郡縣得反本土伏計永初中諸羌反叛十有四年用二百四十億永和之末復經七年用八十餘億費耗若此猶不誅盡餘孽復起于茲作害今不暫疲人則永寧無期臣庶竭駑劣伏待節度帝許之悉聽如所上建寧元年春熲將兵萬餘人齎十五日糧從彭陽直指高平與先零諸種戰於逢義山虜兵盛熲衆恐熲乃令軍中張鏃利刃長矛三重挾以強弩列輕騎為左右翼淚怒兵將曰今去家數千里進則事成走必盡死努力共功名因大呼衆皆應騰赴熲馳騎於傍突而擊之虜衆大潰斬首八千餘級獲牛馬羊二十八萬頭時竇太后臨朝下詔曰先零東羌歷載為患熲前陳狀欲必埽滅涉履霜雪兼行晨夜身當矢石感厲吏士曾未浹日凶醜奔破連尸積俘掠獲無筭洗雪百年之逋負以慰忠將之亡魂功用顯著朕甚嘉之須東羌盡定當并錄功勤今且賜熲錢二十萬以家一人為郎中勑中藏府調金錢綵物增助軍費拜熲羌將軍夏熲復追羌出橋門至走馬水上尋聞虜在奢延澤乃將輕兵兼行一日一夜二百餘里晨及賊擊破之餘虜走向落川復相屯結熲乃分遣騎司馬田晏將五千人出其東假司馬夏育將二千人繞其西羌分六七千人攻圍晏等晏等與戰羌潰走熲急進與晏等共追之於令鮮水上熲士卒飢渴乃勒衆推方奪其水虜復散走熲遂與相連綴且鬬且引及於靈武谷熲乃被甲先登士卒無敢後者羌遂大敗𠫓廾兵而走追之三日三夜士皆重繭既到涇陽餘寇四千落悉散入漢陽山谷閒時張奐上言東羌雖破餘種難盡熲性輕果慮負敗難常宜且以恩降可無後悔詔書下熲熲復上言臣本知東羌雖衆而輭弱易制所以比陳愚慮思為永寧之筭而中郎將張奐說虜強難破宜用招降聖朝明監信納瞽言故臣謀得行奐計不用事埶相反遂懷猜恨信叛羌之訴飾潤辭意云臣兵累見折衂又言羌一氣所生不可誅盡山谷廣大不可空靜血流汙野傷和致災臣伏念周秦之際戎狄為害中興以來羌寇最盛誅之不盡雖降復叛今先零雜種累以反覆攻沒縣邑剽略人物發冢露尸禍及生死上天震怒假手行誅昔邢為無道衞國伐之師興而雨臣動兵涉夏連獲甘澍歲時豐稔人無疵疫上占天心不為災傷下察人事衆和師克自橋門以西落川以東故宮官縣邑更相通屬非為深險絕域之地車騎安行無應折衂案奐為漢吏身當武職駐軍二年不能平寇虛欲修文戢戈招降獷敵誕辭空說僭而無徵何以言之昔先零作寇趙充國徙令居內煎當亂邊馬援遷之三輔始服終叛至今為鯁故遠識之士以為深憂今傍郡戶口單少數為羌所創毒而欲令降徒與之雜居是猶種枳棘於良田養虺蛇於室內也故臣奉大漢之威建長久之策欲絕其本根不使能殖本規三歲之費用五十四億今適朞年所耗未半而餘寇殘燼將向殄滅臣每奉詔書軍不內御願卒斯言一以任臣臣時量宜不失權便二年詔遣謁者馮禪說降漢陽散羌熲以春農百姓布野羌雖暫降而縣官無廩必當復為盜賊不如乘虛放兵埶必殄滅夏熲自進營去羌所屯凡亭山四五十里遣田晏夏育將五千人據其山上羌悉衆攻之厲聲問曰田晏夏育在此不湟中義從羌悉在何面今日欲決死生軍中恐晏等勸激兵士殊死大戰遂破之羌衆潰東奔復聚射虎谷分兵守諸谷上下門熲規一舉滅之不欲復令散走乃遣千人於西縣結木為柵廣二十步長四十里遮之分遣晏育等將七千人銜枚夜上西山結營穿塹去虜一里許又遣司馬張愷等將三千人上東山虜乃覺之遂攻晏等分遮汲水道熲自率步騎進擊水上羌却走因與愷等挾東西山縱兵擊破之羌復敗散熲追至谷上下門窮山深谷之中處處破之斬其渠帥以下萬九千級獲牛馬驢騾氈裘廬帳什物不可勝數馮禪等所招降四千人分置安定漢陽隴西三郡於是東羌悉平凡百八十戰斬三萬八千六百餘級獲牛馬羊騾驢駱駝四十二萬七千五百餘頭費用四十四億軍士死者四百餘人更封新豐縣侯邑萬戶熲行軍仁愛士卒疾病者親自瞻省手為裹創在邊十餘年未嘗一日蓐寢與將士同苦故皆樂為死戰三年春徵還京師將秦胡步騎五萬餘人及汗血千里馬生口萬餘人詔遣大鴻臚持節慰勞於鎬軍至拜侍中轉執金吾河南尹有盜發馮貴人冢坐左轉諫議大夫再遷司隸校尉熲曲意宦官故得保其富貴遂黨中常侍王甫枉誅中常侍鄭颯董騰等增封四千戶并前萬四千戶明年伐李咸為太尉其冬病罷復為司隸校尉數歲轉潁川太守徵拜太中大夫光和二年復代橋玄為太尉在位月餘會日食自劾有司舉奏詔收印綬詣廷尉時司隸校尉陽球奏誅王甫并及熲就獄中詰責之遂飲鴆死家屬徙邊後中常侍呂強上疏追訟熲功靈帝詔熲妻子還本郡初熲與皇甫威明張然明並知名顯達京師稱為涼州三明云贊曰山西多猛三明儷蹤戎驂糾結塵斥河潼規奐審策亟遏囂凶文會志比更相為容段追兩狄束馬縣鋒紛紜騰突谷靜山空
