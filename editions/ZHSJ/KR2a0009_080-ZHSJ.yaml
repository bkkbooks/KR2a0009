body:
  text: 後漢書卷七十四上袁紹劉表列傳第六十四上紹子譚袁紹字本初汝南汝陽人司徒湯之孫父成五官中郎將紹壯健好交結大將軍梁冀以下莫不善之紹少為郎除濮陽長遭母憂去官三年禮竟追感幼孤又行父服服闋徙居洛陽紹有姿貌威容愛士養名既累世台司賓客所歸加傾心折節莫不爭赴其庭士無貴賤與之抗禮輜軿柴轂填接街陌內官皆惡之中常侍趙忠言於省內曰袁本初坐作聲價好養死士不知此兒終欲何作叔父太傅隗聞而呼紹以忠言責之紹終不改後辟大將軍何進掾為侍御史虎賁中郎將中平五年初置西園八校尉以紹為佐軍校尉靈帝崩紹勸何進徵董卓等衆軍脅太后誅諸宦官轉紹司隸校尉語已見何進傳及卓將兵至騎都尉太山鮑信說紹曰董卓擁制強兵將有異志今不早圖必為所制及其新至疲勞襲之可禽也紹畏卓不敢發頃之卓議欲廢立謂紹曰天下之主宜得賢明每念靈帝令人憤毒董侯似可今當立之紹曰今上富於春秋未有不善宣於天下若公違禮任情廢嫡立庶恐衆議未安卓案劒叱紹曰豎子敢然天下之事豈不在我我欲為之誰敢不從紹詭對曰此國之大事請出與太傅議之卓復言劉氏種不足復遺紹勃然曰天下健者豈惟董公橫刀長揖徑出懸節於上東門而奔冀州董卓購募求紹時侍中周珌城門校尉伍瓊為卓所信待瓊等陰為紹說卓曰夫廢立大事非常人所及袁紹不達大體恐懼出奔非有它志今急購之埶必為變袁氏樹恩四世門生故吏徧於天下若收豪傑以聚徒衆英雄因之而起則山東非公之有也不如赦之拜一郡守紹喜於免罪必無患矣卓以為然乃遣授紹勃海太守封邟鄉侯紹猶稱兼司隸初平元年紹遂以勃海起兵以與從弟後將軍術冀州牧韓馥豫州刺史孔伷兗州刺史劉岱陳留太守張邈廣陵太守張超河內太守王匡山陽太守袁遺東郡太守橋瑁濟北相鮑信等同時俱起衆各數萬以討卓為名紹與王匡屯河內伷屯潁川馥屯鄴餘軍咸屯酸棗約盟遙推紹為盟主紹自號車騎將軍領司隸校尉董卓聞紹起山東乃誅紹叔父隗及宗族在京師者盡滅之卓乃遣大鴻臚韓融少府陰循執金吾胡母班將作大匠吳循越騎校尉王瓌譬解紹等諸軍紹使王匡殺班瓌吳循等袁術亦執殺陰循惟韓融以名德免是時豪傑既多附紹且感其家禍人思為報州郡蜂起莫不以袁氏為名韓馥見人情歸紹忌方其得衆恐將圖己常遣從事守紹門不聽發兵橋瑁乃詐作三公移書傳驛州郡說董卓罪惡天子危逼企望義兵以釋國難馥於是方聽紹舉兵乃謀於衆曰助袁氏乎助董氏乎治中劉惠勃然曰興兵為國安問袁董馥意猶深疑於紹每貶節軍糧欲使離散明年馥將麴義反畔馥與戰失利紹既恨馥乃與義相結紹客逢紀謂紹曰夫舉大事非據一州無以自立今冀部強實而韓馥庸才可密要公孫瓚將兵南下馥聞必駭懼并遣辯士為陳禍福馥迫於倉卒必可因據其位紹然之益親紀即以書與瓚瓚遂引兵而至外託討董卓而陰謀襲馥紹乃使外甥陳留高幹及潁川荀諶等說馥曰公孫瓚乘勝來南而諸郡應之袁車騎引軍東向其意未可量也竊為將軍危之馥懼曰然則為之柰何諶曰君自料寬仁容衆為天下所附孰與袁氏馥曰不如也臨危吐決智勇邁於人又孰與袁氏馥曰不如也世布恩德天下家受其惠又孰與袁氏馥曰不如也諶曰勃海雖郡其實州也今將軍資三不如之埶久處其上袁氏一時之傑必不為將軍下也且公孫提燕代之卒其鋒不可當夫冀州天下之重資若兩軍并力兵交城下危亡可立而待也夫袁氏將軍之舊且為同盟當今之計莫若舉冀州以讓袁氏必厚德將軍公孫瓚不能復與之爭矣是將軍有讓賢之名而身安於太山也願勿有疑馥素性恇怯因然其計馥長史耿武別駕閔純騎都尉沮授聞而諫曰冀州雖鄙帶甲百萬穀支十年袁紹孤客窮軍仰我鼻息譬如嬰兒在股掌之上絕其哺乳立可餓殺柰何欲以州與之馥曰吾袁氏故吏且才不如本初度德而讓古人所貴諸君獨何病焉先是馥從事趙浮程渙將強弩萬人屯孟津聞之率兵馳還請以拒紹馥又不聽乃避位出居中常侍趙忠故舍遣子送印綬以讓紹紹遂領冀州牧承制以馥為奮威將軍而無所將御引沮授為別駕因謂授曰今賊臣作亂朝廷遷移吾歷世受寵志竭力命興復漢室然齊桓非夷吾不能成霸句踐非范蠡無以存國今欲與卿戮力同心共安社稷將何以匡濟之乎授進曰將軍弱冠登朝播名海內值廢立之際忠義奮發單騎出奔董卓懷懼濟河而北勃海稽服擁一郡之卒撮冀州之衆威陵河朔名重天下若舉軍東向則黃巾可埽還討黑山則張燕可滅回師北首則公孫必禽震脅戎狄則匈奴立定橫大河之北合四州之地收英雄之士擁百萬之衆迎大駕於長安復宗廟於洛邑號令天下誅討未服以此爭鋒誰能御之比及數年其功不難紹喜曰此吾心也即表授為奮武將軍使監護諸將魏郡審配鉅鹿田豐並以正直不得志於韓馥紹乃以豐為別駕配為治中甚見器任馥自懷猜懼辭紹索去往依張邈後紹遣使詣邈有所計議因共耳語馥時在坐謂見圖謀無何如廁自殺其冬公孫瓚大破黃巾還屯槃河威震河北冀州諸城無不望風響應紹乃自擊之瓚兵三萬列為方陳分突騎萬匹翼軍左右其鋒甚銳紹先令麴義領精兵八百強弩千張以為前登瓚輕其兵少縱騎騰之義兵伏楯下一時同發瓚軍大敗斬其所置冀州刺史嚴綱獲甲首千餘級麴義追至界橋瓚斂兵還戰義復破之遂到瓚營拔其牙門餘衆皆走紹在後十數里聞瓚已破發鞌息馬唯衞帳下強弩數十張大戟士百許人瓚散兵二千餘騎卒至圍紹數重射矢雨下田豐扶紹使却入空垣紹脫兜鍪抵地曰大丈夫當前鬬死而反逃垣牆閒邪促使諸弩競發多傷瓚騎衆不知是紹頗稍引却會麴義來迎騎乃散退三年瓚又遣兵至龍湊挑戰紹復擊破之瓚遂還幽州不敢復出四年初天子遣太僕趙岐和解關東使各罷兵瓚因此以書譬紹曰趙太僕以周邵之德銜命來征宣揚朝恩示以和睦曠若開雲見日何喜如之昔賈復寇恂爭相危害遇世祖解紛遂同輿並出釁難既釋時人美之自惟邊鄙得與將軍共同斯好此誠將軍之羞眷而瓚之願也紹於是引軍南還三月上巳大會賓徒於薄落津聞魏郡兵反與黑山賊干毒等數萬人共覆鄴城殺郡守坐中客家在鄴者皆憂怖失色或起而啼泣紹容貌自若不改常度賊有陶升者自號平漢將軍獨反諸賊將部衆踰西城入閉府門具車重載紹家及諸衣冠在州內者身自扞衞送到斥丘紹還因屯斥丘以陶升為建義中郎將六月紹乃出軍入朝歌鹿腸山蒼巖谷口討干毒圍攻五日破之斬毒及其衆萬餘級紹遂尋山北行進擊諸賊左髭丈八等皆斬之又擊劉石青牛角黃龍左校郭大賢李大目于氐根等復斬數萬級皆屠其屯壁遂與黑山賊張燕及四營屠各鴈門烏桓戰於常山燕精兵數萬騎數千匹連戰十餘日燕兵死傷雖多紹軍亦疲遂各退麴義自恃有功驕縱不軌紹召殺之而并其衆興平二年拜紹右將軍其冬車駕為李傕等所追於曹陽沮授說紹曰將軍累葉台輔世濟忠義今朝廷播越宗廟殘毀觀諸州郡雖外託義兵內實相圖未有憂存社稷卹人之意且今州城粗定兵強士附西迎大駕即宮鄴都挾天子而令諸侯士馬以討不庭誰能禦之紹將從其計潁川郭圖淳于瓊曰漢室陵為日久矣今欲興之不亦難乎且英雄並起各據州郡連徒聚衆動有萬計所謂秦失其鹿先得者王今迎天子動輒表聞從之則權輕違之則拒命非計之善者也授曰今迎朝廷於義為得於時為宜若不早定必有先之者焉夫權不失幾功不猒速願其圖之帝立既非紹意竟不能從紹有三子譚字顯思熙字顯雍尚字顯甫譚長而惠尚少而美紹後妻劉有寵而偏愛尚數稱於紹紹亦奇其姿容欲使傳嗣乃以譚繼兄後出為青州刺史沮授諫曰世稱萬人逐兔一人獲之貪者悉止分定故也且年均以賢德均則卜古之制也願上惟先代成則敗之誡下思逐兔分定之義若其不改禍始此矣紹曰吾欲令諸子各據一州以視其能於是以中子熙為幽州刺史外甥高幹為并州刺史建安元年曹操迎天子都許乃下詔書於紹責以地廣兵多而專自樹黨不聞勤王之師而但相討伐紹上書曰臣聞昔有哀歎而霜隕悲哭而崩城者每讀其書謂為信然於今況之乃知妄作何者臣出身為國破家立事至乃懷忠獲釁抱信見疑晝夜長吟剖肝泣血曾無崩城隕霜之應故鄒衍嵵婦何能感徹義故遂解節出奔創謀河外時卓方貪結外援招悅英豪故即臣勃海申以軍號則臣之與卓未有纖芥之嫌若使苟欲滑泥揚波偷榮求利則進可以享竊祿位退無門戶之患然臣愚所守志無傾奪故遂引會英雄興師百萬飲馬孟津歃血漳河會故冀州牧韓馥懷挾逆謀欲專權埶絕臣軍糧不得踵係至使猾虜肆毒害及一門尊卑大小同日并戮鳥獸之情猶知號呼臣所以蕩然忘哀貌無隱戚者誠以忠孝之節道不兩立顧私懷己不能全功斯亦愚臣破家徇國之二驗也狡敵知亡故韓馥懷懼謝咎歸土張楊黑山同時乞降臣時輒承制竊比竇融以議郎曹操權領兗州牧會公孫瓚師旅南馳陸掠北境臣即星駕席卷與瓚交鋒假天之威每戰輒克臣備公族子弟生長京輦頗聞俎豆不習干戈加自乃祖先臣以來世作輔弼咸以文德盡忠得免罪戾臣非與瓚角戎馬之埶爭戰陣之功者也誠以賊臣不誅春秋所貶苟云利國專之不疑故冒踐霜雪不憚劬勤實庶一捷之福以立終身之功社稷未定臣誠恥之太僕趙岐銜命來征宣明陛下含弘之施蠲除細故與下更新奉詔之日引師南轅是臣畏怖天威不敢怠慢之三驗也列而州郡牧守競盜聲名懷持二端優游顧望皆列土錫圭跨州連郡是以遠近狐疑議論紛錯者也臣聞守文之世德高者位尊倉卒之時功多者賞厚陛下播越非所洛邑乏祀海內傷心志士憤惋是以忠臣肝腦塗地肌膚橫分而無悔心者義之所感故也今賞加無勞以攜有德杜黜忠功以疑衆望斯豈腹心之遠圖將乃讒慝之邪說使之然也臣爵為通侯位二千石殊恩厚德臣既叨之豈敢闚覬重禮以希彤弓玈矢之命哉誠傷偏裨列校勤不見紀盡忠為國飜成重愆斯蒙恬所以悲號於邊獄白起歔欷於杜郵也太傅日磾位為師保任配東征而耗亂王命寵任非所凡所舉用皆衆所捐𠫓廾而容納其策以為謀主令臣骨肉兄弟還為讎敵交鋒接刃搆難滋甚臣雖欲釋甲投戈事不得已誠恐陛下日月之明有所不照四聰之聽有所不聞乞下臣章咨之羣賢使三槐九棘議臣罪戾若以臣今行權為釁則桓文當有誅絕之刑若以衆不討賊為賢則趙盾可無書弒之貶矣臣雖小人志守一介若使得申明本心不愧先帝則伏首歐刀褰衣就鑊臣之願也惟陛下垂尸鳩之平絕邪諂之論無令愚臣結恨三泉於是以紹為太尉封鄴侯時曹操自為大將軍紹恥為之下偽表辭不受操大懼乃讓位於紹二年使將作大匠孔融持節拜紹大將軍錫弓矢節鉞虎賁百人兼督冀青幽并四州然後受之紹每得詔書患有不便於己乃欲移天子自近使說操以許下埤溼洛陽殘破宜徙都甄城以就全實操拒之田豐說紹曰徙都之計既不克從宜早圖許奉迎天子動託詔令響號海內此筭之上者不爾終為人所禽雖悔無益也紹不從四年春擊公孫瓚遂定幽土事在瓚傳紹既并四州之地衆數十萬而驕心轉盛貢御稀簡主簿耿包密白紹曰赤德衰盡袁為黃胤宜順天意以從民心紹以包白事示軍府僚屬議者以包妖妄宜誅紹知衆情未同不得已乃殺包以弭其迹於是簡精兵十萬騎萬匹欲出攻許以審配逢紀統軍事田豐荀諶及南陽許攸為謀主顏良文醜為將帥沮授進說曰近討公孫師出歷年百姓疲敝倉庫無積賦役方殷此國之深憂也宜先遣使獻捷天子務農逸人若不得通乃表曹操隔我王路然後進屯黎陽漸營河南益作舟船繕修器械分遣精騎抄其邊鄙令彼不得安我取其逸如此可坐定也郭圖審配曰兵書之法十圍五攻敵則能戰今以明公之神武連河朔之強衆以伐曹操兵其埶譬若覆手今不時取後難圖也授曰蓋救亂誅暴謂之義兵恃衆憑強謂之驕兵義者無敵驕者先滅曹操奉迎天子建宮許都今舉師南向於義則違且廟勝之策不在彊弱曹操法令既行士卒精練非公孫瓚坐受圍者也今𠫓廾萬安之術而興無名之師竊為公懼之圖等曰武王伐紂不為不義況兵加曹操而云無名且公師徒精勇將士思奮而不及時早定大業所謂天與不取反受其咎此越之所以霸吳之所以滅也監軍之計在於將軍持牢而非見時知幾之變也紹納圖言圖等因是譖沮授曰授監統內外威震三軍若其浸盛何以制之夫臣與主同者昌主與臣同者亡此黃石之所忌也且御衆於外不宜知內紹乃分授所統為三都督使授及郭圖淳于瓊各典一軍未及行五年左將軍劉備殺徐州刺史車冑據沛以背曹操操懼乃自將征備田豐說紹曰與公爭天下者曹操也操今東擊劉備兵連未可卒解今舉軍而襲其後可一往而定兵以幾動斯其時也紹辭以子疾未得行豐舉杖擊地曰嗟乎事去矣夫遭難遇之幾而以嬰兒病失其會惜哉紹聞而怒之從此遂疏焉曹操畏紹過河乃急擊備遂破之備奔紹紹於是進軍攻許田豐以既失前幾不宜便行諫紹曰曹操既破劉備則許下非復空虛且操善用兵變化無方衆雖少未可輕也今不如久持之將軍據山河之固擁四州之衆外結英雄內修農戰然後簡其精銳分為奇兵乘虛迭出以擾河南救右則擊其左救左則擊其右使敵疲於奔命人不得安業我未勞而彼已困不及三年可坐剋也今釋廟勝之策而決成敗於一戰若不如志悔無及也紹不從豐強諫忤紹紹以為沮衆遂械繫之乃先宣檄曰福由己終有望夷之禍汙辱至今及臻呂后祿產專政斷萬機決事禁省下陵上替海內寒心於是絳侯朱虛興威奮怒誅夷逆暴尊立太宗故能道化興隆光明融顯此則大臣立權之明表也嵩乞匄攜養因臧買位輿金輦寶輸貨權門竊盜鼎司傾覆重器操姦贅閹遺醜本無令德僄狡鋒俠好亂樂禍幕府董統鷹揚埽夷凶逆續遇董卓侵官暴國於是提劒揮鼓發命東夏廣羅英雄𠫓廾瑕錄用故遂與操參咨策略謂其鷹犬之才爪牙可任至乃愚佻短慮輕進易退傷夷折衂數喪師徒幕府輒復分兵命銳修完補輯表行東郡太守兗州刺史被以虎文授以偏師奬就威柄冀獲秦師一克之報而遂乘資跋扈肆行酷烈割剝元元殘賢害善故九江太守邊讓英才儁逸以直言正色論不阿諂身被梟懸之戮妻孥受灰滅之咎自是士林憤痛人怨天怒一夫奮臂舉州同聲故躬破於徐方地奪於呂布彷徨東裔蹈據無所幕府惟強幹弱枝之義且不登畔人之黨故復援旍擐甲席卷赴征金鼓響震布衆破沮拯其死亡之患復其方伯之任是則幕府無德於兗土而有大造於操也會後鑾駕東反羣虜亂政時冀州方有北鄙之警匪遑離局故使從事中郎徐勳就發遣操使繕修郊廟翼衛幼主而便放志專行威劫省禁卑侮王僚敗法亂紀坐召三臺專制朝政爵賞由心刑戮在口所愛光五宗所怨滅三族羣談者受顯誅腹議者蒙隱戮道路以目百辟鉗口尚書記期會公卿充員品而已至觸情放慝不顧憲章又議郎趙彥忠諫直言議有可納故聖朝含聽改容加錫操欲迷奪時明杜絕言路收立殺不俟報聞又梁孝王先帝母弟墳陵尊顯松栢桑梓猶宜恭肅操率將吏士親臨發掘破棺裸尸掠取金寶至令聖朝流涕士民傷懷又署發丘中郎將摸金校尉所過毀突無骸不露身處三公之官而行桀虜之態汙國虐民毒施人鬼加其細政苛慘科防互設矰繳充蹊阬穽塞路舉手挂網羅動足蹈機埳是以兗豫有無聊之人帝都有呼嗟之怨意含覆冀可彌縫而操豺狼野心潛包禍謀乃欲橈折棟梁孤弱漢室除忠害善專為梟雄往歲伐鼓北征討公孫瓚強禦桀逆拒圍一年操因其未破陰交書命欲託助王師以見掩襲故引兵造河方舟北濟會行人發露瓚亦梟夷故使鋒芒挫縮厥圖不果屯據敖倉阻河為固乃欲運螳蜋之斧禦隆車之隧莫府奉漢威靈折衝宇宙長戟百萬胡騎千羣奮中黃育獲之士騁良弓勁弩之埶并州越太行青州涉濟漯大軍汎黃河以角其前荊州下宛葉而掎其後雷震虎步並集虜廷若舉炎火以焚飛蓬覆滄海而注熛炭有何不消滅者哉之禍因斯而作乃忠臣肝腦塗地之秋烈士立功之會也可不勗哉乃先遣顏良攻曹操別將劉延於白馬紹自引兵至黎陽沮授臨行會其宗族散資財以與之曰埶存則威無不加埶亡則不保一身哀哉其弟宗曰曹操士馬不敵君何懼焉授曰以曹兗州之明略又挾天子以為資我雖剋伯珪衆實疲敝而主驕將軍之破敗在此舉矣楊雄有言六國蚩蚩為嬴弱姬今之謂乎曹操遂救劉延擊顏良斬之紹乃度河壁延津南沮授臨船歎曰上盈其志下務其功悠悠黃河吾其濟乎遂以疾退紹不許而意恨之復省其所部并屬郭圖紹使劉備文醜挑戰曹操又擊破之斬文醜再戰而禽二將紹軍中大震操還屯官度紹進保陽武沮授又說紹曰北兵雖衆而勁果不及南軍南軍穀少而資儲不如北南幸於急戰北利在緩師宜徐持久曠以日月紹不從連營稍前漸逼官度遂合戰操軍不利復還堅壁紹為高櫓起土山射營中營中皆蒙楯而行操乃發石車擊紹樓皆破軍中呼曰霹靂車紹為地道欲襲操操輒於內為長以拒之又遣奇兵襲紹運車大破之盡焚其穀食相持百餘日河南人疲困多畔應紹紹遣淳于瓊等將兵萬餘人北迎粮運沮授說紹可遣蔣奇別為支軍於表以絕曹操之鈔紹不從許攸進曰曹操兵少而悉師拒我許下餘守埶必空弱若分遣輕軍星行掩襲許拔則操為成禽如其未潰可令首尾奔命破之必也紹又不能用會攸家犯法審配收繫之攸不得志遂奔曹操而說使襲取淳于瓊等瓊等時宿在烏巢去紹軍四十里操自將步騎五千人夜往攻破瓊等悉斬之初紹聞操擊瓊謂長子譚曰就操破瓊吾拔其營彼固無所歸矣乃使高覽張郃等攻操營不下二將聞瓊等敗遂奔操於是紹軍驚擾大潰紹與譚等幅巾乘馬與八百騎度河至黎陽北岸入其將軍蔣義渠營至帳下把其手曰孤以首領相付矣義渠避帳而處之使宣令焉衆聞紹在稍復集餘衆偽降曹操盡阬之前後所殺八萬人沮授為操軍所執乃大呼曰授不降也為所執耳操見授謂曰分野殊異遂用圮絕不圖今日乃相得也授對曰冀州失策自取奔北授知力俱困宜其見禽操曰本初無謀不相用計今喪亂過紀國家未定方當與君圖之授曰叔父母弟懸命袁氏若蒙公靈速死為福操歎曰孤早相得天下不足慮也遂赦而厚遇焉授尋謀歸袁氏乃誅之紹外寬雅有局度憂喜不形於色而性矜愎自高短於從善故至於敗及軍還或謂田豐曰君必見重豐曰公貌寬而內忌不亮吾忠而吾數以至言迕之若勝而喜必能赦我戰敗而怨內忌將發若軍出有利當蒙全耳今既敗矣吾不望生紹還曰吾不用田豐言果為所笑遂殺之官度之敗審配二子為曹操所禽孟岱與配有𨻶因蔣奇言於紹曰配在位專政族大兵強且二子在南必懷反畔郭圖辛評亦為然紹遂以岱為監軍代配守鄴護軍逢紀與配不睦紹以問之紀對曰配天性烈直每所言行慕古人之節不以二子在南為不義也公勿疑之紹曰君不惡之邪紀曰先所爭者私情今所陳者國事紹曰善乃不廢配配紀由是更協冀州城邑多畔紹復擊定之自軍敗後發病七年夏薨未及定嗣逢紀審配宿以驕侈為譚所病辛評郭圖皆比於譚而與配紀有𨻶衆以譚長欲立之配等恐譚立而評等為害遂矯紹遺命奉尚為嗣
