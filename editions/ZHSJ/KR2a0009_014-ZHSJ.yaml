body:
  text: 後漢書卷十二王劉張李彭盧列傳第二王昌一名郎趙國邯鄲人也素為卜相工明星歷常以為河北有天子氣時趙繆王子林好奇數任俠於趙魏閒多通豪猾而郎與之親善初王莽篡位長安中或自稱成帝子子輿者莽殺之郎緣是詐稱真子輿云母故成帝謳者嘗下殿卒僵須臾有黃氣從上下半日乃解遂姙身就館趙后欲害之偽易他人子以故得全子輿年十二識命者郎中李曼卿與俱至蜀十七到丹陽二十還長安展轉中山來往燕趙以須天時林等愈動疑惑乃與趙國大豪李育張參等通謀規共立郎會人閒傳赤眉將度河林等因此宣言赤眉當至立劉子輿以觀衆心百姓多信之更始元年十二月林等遂率車騎數百晨入邯鄲城止於王宮立郎為天子林為丞相李育為大司馬張參為大將軍分遣將帥徇下幽冀移檄州郡曰制詔部剌史郡太守曰朕孝成皇帝子子輿者也昔遭趙氏之禍因以王莽篡殺賴知命者將護朕躬解形河濱削迹趙魏王莽竊位獲罪於天天命佑漢故使東郡太守翟義嚴鄉侯劉信擁兵征討出入胡漢普天率土知朕隱在人閒南嶽諸劉為其先驅朕仰觀天文乃興于斯以今月壬辰即位趙宮休氣熏蒸應時獲雨蓋聞為國子之襲父古今不易劉聖公未知朕故且持帝號諸興義兵咸以助朕皆當裂土享祚子孫已詔聖公及翟太守亟與功臣詣行在所疑刺史二千石皆聖公所置未覩朕之沈滯或不識去就強者負力弱者惶惑今元元創痍已過半矣朕甚悼焉故遣使者班下詔書郎以百姓思漢既多言翟義不死故詐稱之以從人望於是趙國以北遼東以西皆從風而靡明年光武自薊得郎檄南走信都發兵徇旁縣遂攻柏人不下議者以為守柏人不如定鉅鹿光武乃引兵東北圍鉅鹿郎太守王饒據城數十日連攻不剋耿純說曰久守王饒士衆疲敝不如及大兵精銳進攻邯鄲若王郎已誅王饒不戰自服矣光武善其計乃留將軍鄧滿守鉅鹿而進軍邯鄲屯其郭北門郎數出戰不利乃使其諫議大夫杜威持節請降威雅稱郎實成帝遺體光武曰設使成帝復生天下不可得況詐子輿者乎威請求萬戶侯光武曰顧得全身可矣威曰邯鄲雖鄙并力固守尚曠日月終不君臣相率但全身而已遂辭而去因急攻之二十餘日郎少傅李立為反閒開門內漢兵遂拔邯鄲郎夜亡走道死追斬之劉永者梁郡睢陽人梁孝王八世孫也傳國至父立元始中立與平帝外家衞氏交通為王莽所誅更始即位永先詣洛陽紹封為梁王都睢陽永聞更始政亂遂據國起兵以弟防為輔國大將軍防弟少公御史大夫封魯王遂招諸豪傑沛人周建等並署為將帥攻下濟陰山陽沛楚淮陽汝南凡得二十八城又遣使拜西防賊帥山陽佼彊為橫行將軍是時東海人董憲起兵據其郡而張步亦定齊地永遣使拜憲翼漢大將軍步輔漢大將軍與共連兵遂專據東方及更始敗永自稱天子建武二年夏光武遣虎牙大將軍蓋延等伐永初陳留人蘇茂為更始討難將軍與朱鮪等守洛陽鮪既降漢茂亦歸命光武因使茂與蓋延俱攻永軍中不相能茂遂反殺淮陽太守掠得數縣據廣樂而臣於永永以茂為大司馬淮陽王蓋延遂圍睢陽數月拔之永將家屬走虞虞人反殺其母及妻子永與麾下數十人奔譙蘇茂佼彊周建合軍救永為蓋延所敗茂奔還廣樂彊建從永走保湖陵三年春永遣使立張步為齊王董憲為海西王於是遣大司馬吳漢等圍蘇茂於廣樂周建率衆救茂茂建戰敗𠫓廾城復還湖陵而睢陽人反城迎永吳漢與蓋延等合軍圍之城中食盡永與茂建走酇諸將追急永將慶吾斬永首降封吾為列侯蘇茂周建奔垂惠共立永子紆為梁王佼彊還保西防四年秋遣捕虜將軍馬武騎都尉王霸圍紆建於垂惠蘇茂將五校兵救之紆建亦出兵與武等戰不剋而建兄子誦反閉城門拒之建茂紆等皆走建於道死茂奔下邳與董憲合紆奔佼彊五年遣驃騎大將軍杜茂攻佼彊於西防彊與劉紆奔董憲時平狄將軍龐萌反叛遂襲破蓋延引兵與董憲連和自號東平王屯桃鄉之北龐萌山陽人初亡在下江兵中更始立以為冀州牧將兵屬尚書令謝躬共破王郎及躬敗萌乃歸降光武即位以為侍中萌為人遜順甚見信愛帝常稱曰可以託六尺之孤寄百里之命者龐萌是也拜為平狄將軍與蓋延共擊董憲時詔書獨下延而不及萌萌以為延譖己自疑遂反帝聞之大怒乃自將討萌與諸將書曰吾常以龐萌社稷之臣將軍得無笑其言乎老賊當族其各厲兵馬會睢陽憲聞帝自討龐萌乃與劉紆蘇茂佼彊去下邳還蘭陵使茂彊助萌合兵三萬急圍桃城帝時幸蒙聞之乃留輜重自將輕騎三千步卒數萬晨夜馳赴師次任城去桃鄉六十里旦日諸將請進賊亦勒兵挑戰帝不聽乃休士養銳以挫其鋒城中聞車駕至衆心益固時吳漢等在東郡馳使召之萌等乃悉兵攻城二十餘日衆疲困而不能下及吳漢與諸將到乃率衆軍進桃城而帝親自搏戰大破之萌茂彊夜棄輜重逃奔董憲乃與劉紆悉其兵數萬人屯昌慮自將銳卒拒新陽帝先遣吳漢擊破之憲走還昌慮漢進守之憲恐乃招誘五校餘賊步騎數千人屯建陽去昌慮三十里帝至蕃去憲所百餘里諸將請進帝不聽知五校乏食當退勑各堅壁以待其敝頃之五校糧盡果引去帝乃親臨四面攻憲三日復大破之衆皆奔散遣吳漢追擊之佼彊將其衆降蘇茂奔張步憲及龐萌走入繒山數日吏士聞憲尚在復往往相聚得數百騎迎憲入郯城吳漢等復攻拔郯憲與龐萌走保朐劉紆不知所歸軍士高扈斬其首降梁地悉平吳漢進圍朐明年城中穀盡憲萌潛出襲取贛榆琅邪太守陳俊攻之憲萌走澤中會吳漢下朐城進盡獲其妻子憲乃流涕謝其將士曰妻子皆已得矣嗟乎久苦諸卿乃將數十騎夜去欲從閒道歸降而吳漢校尉韓湛追斬憲於方與方與人黔陵亦斬萌皆傳首洛陽封韓湛為列侯黔陵關內侯張步字文公琅邪不其人也漢兵之起步亦聚衆數千轉攻傍縣下數城自為五威將軍遂據本郡更始遣魏郡王閎為琅邪太守步拒之不得進閎為檄曉喻吏人降得贛榆等六縣收兵數千人與步戰不勝時梁王劉永自以更始所立貪步兵彊承制拜步輔漢大將軍忠節侯督青徐二州使征不從命者步貪其爵號遂受之乃理兵於劇以弟弘為衞將軍弘弟藍玄武大將軍藍弟壽高密太守遣將徇太山東萊城陽膠東北海濟南齊諸郡皆下之步拓地廣兵甲日盛王閎懼其衆散乃詣步相見欲誘以義方步大陳兵引閎怒曰步有何過君前見攻之甚乎閎按劒曰太守奉朝命而文公擁兵相距閎攻賊耳何謂甚邪步嘿然良久離席跪謝乃陳樂獻酒待以上賓之禮令閎關掌郡事建武三年光武遣光祿大夫伏隆持節使齊拜步為東萊太守劉永聞隆至劇乃馳遣立步為齊王步即殺隆而受永命是時帝方北憂漁陽南事梁楚故步得專集齊地據郡十二及劉永死步等欲立永子紆為天子自為定漢公置百官王閎諫曰梁王以奉本朝之故是以山東頗能歸之今尊立其子將疑衆心且齊人多詐宜且詳之步乃止五年步聞帝將攻之以其將費邑為濟南王屯歷下冬建威大將軍耿弇破斬費邑進拔臨淄步以弇兵少遠客可一舉而取乃悉將其衆攻弇於臨淄步兵大敗還奔劇帝自幸劇步退保平壽蘇茂將萬餘人來救之茂讓步曰以南陽兵精延岑善戰而耿弇走之大王柰何就攻其營既呼茂不能待邪步曰負負無可言者帝乃遣使告步茂能相斬降者封為列侯步遂斬茂使使奉其首降步三弟各自繫所在獄皆赦之封步為安丘侯後與家屬居洛陽王閎亦詣劇降八年夏步將妻子逃奔臨淮與弟弘藍欲招其故衆乘船入海琅邪太守陳俊追擊斬之王閎者王莽叔父平阿侯譚之子也哀帝時為中常侍時倖臣董賢為大司馬寵愛貴盛閎屢諫忤旨哀帝臨崩以璽綬付賢曰無妄以與人時國無嗣主內外恇懼閎白元后請奪之即帶劒至宣德後闥舉手叱賢曰宮車晏駕國嗣未立公受恩深重當俯伏號泣何事久持璽綬以待禍至邪賢知閎必死不敢拒之乃跪授璽綬閎持上太后朝廷壯之及王莽篡位僭忌閎乃出為東郡太守閎懼誅常繫藥手內莽敗漢兵起閎獨完全東郡三十餘萬戶歸降更始李憲者潁川許昌人也王莽時為廬江屬令莽末江賊王州公等起衆十餘萬攻掠郡縣莽以憲為偏將軍廬江連率擊破州公莽敗憲據郡自守更始元年自稱淮南王建武三年遂自立為天子置公卿百官擁九城衆十餘萬四年秋光武幸壽春遣揚武將軍馬成等擊憲圍舒至六戎縣諢拔之憲亡走其軍士帛意追斬憲而降憲妻子皆伏誅封帛意漁浦侯後憲餘黨淳于臨等猶聚衆數千人屯灊山攻殺安風令楊州牧歐陽歙遣兵不能剋帝議欲討之廬江人陳衆為從事白歙請得喻降臨於是乘單車駕白馬往說而降之灊山人共生為立祠號白馬陳從事云彭寵字伯通南陽宛人也父宏哀帝時為漁陽太守偉容貌能飲飯有威於邊王莽居攝誅不附己者宏與何武鮑宣並遇害寵少為郡吏地皇中為大司空士從王邑東拒漢軍到洛陽聞同產弟在漢兵中懼誅即與鄉人吳漢亡至漁陽抵父時吏更始立使謁者韓鴻持節徇北州承制得專拜二千石已下鴻至薊以寵漢並鄉閭故人相見歡甚即拜寵偏將軍行漁陽太守事漢安樂令及光武鎮慰河北至薊以書招寵寵具牛酒將上謁會王郎詐立傳檄燕趙遣將徇漁陽上谷急發其兵北州衆多疑惑欲從之吳漢說寵從光武語在漢傳會上谷太守耿況亦使功曹寇恂詣寵結謀共歸光武寵乃發步騎三千人以吳漢行長史及都尉嚴宣護軍蓋延狐奴令王梁與上谷軍合而南及光武於廣阿光武承制封寵建忠侯賜號大將軍遂圍邯鄲寵轉糧食前後不絕及王郎死光武追銅馬北至薊寵上謁自負其功意望甚高光武接之不能滿以此懷不平光武知之以問幽州牧朱浮浮對曰前吳漢北發兵時大王遺寵以所服劒又倚以為北道主人寵謂至當迎閤握手交歡並坐今既不然所以失望浮因曰王莽為宰衡時甄豐旦夕入謀議時人語曰夜半客甄長伯及莽篡位後豐意不平卒以誅死光武大笑以為不至於此及即位吳漢王梁寵之所遣並為三公而寵獨無所加愈怏怏不得志歎曰我功當為王但爾者陛下忘我邪是時北州破散而漁陽差完有舊鹽鐵官寵轉以貿穀積珍寶益富彊朱浮與寵不相能浮數譖搆之建武二年春詔徵寵寵意浮賣己上疏願與浮俱徵又與吳漢蓋延等書盛言浮枉狀固求同徵帝不許益以自疑而其妻素剛不堪抑屈固勸無受召寵又與常所親信吏計議皆懷怨於浮莫有勸行者帝遣寵從弟子后蘭卿喻之寵因留子后蘭卿遂發兵反拜署將帥自將二萬餘人攻朱浮於薊分兵徇廣陽上谷右北平又自以與耿況俱有重功而恩賞並薄數遣使要誘況況不受輒斬其使秋帝使游擊將軍鄧隆救薊隆軍潞南浮軍雍奴遣吏奏狀帝讀檄怒謂使吏曰營相去百里其勢豈可得相及比若還北軍必敗矣寵果盛兵臨河以拒隆又別發輕騎三千襲其後大破隆軍浮遠遂不能救引而去明年春寵遂拔右北平上谷數縣遣使以美女繒綵賂遺匈奴要結和親單于使左南將軍七八千騎往來為游兵以助寵又南結張步及富平獲索諸豪傑皆與交質連衡遂攻拔薊城自立為燕王其妻數惡夢又多見變卜筮及望氣者皆言兵當從中起寵疑子后蘭卿質漢歸故不信之使將兵岩無親於中五年春寵齋獨在便室蒼頭子密等三人因寵臥寐共縛著牀告外吏云大王齋禁皆使吏休偽稱寵命教收縛奴婢各置一處又以寵命呼其妻妻入大驚寵急呼曰趣為諸將軍辦裝於是兩奴將妻入取寶物留一奴守寵寵謂守奴曰若小兒我素愛也今為子密所迫劫耳解我縛當以女珠妻汝家中財物皆與若小奴意欲解之視戶外見子密聽其語遂不敢解於是收金玉衣物至寵所裝之被馬六疋使妻縫兩縑囊昬夜後解寵手令作記告城門將軍云今遣子密等至子后蘭卿所速開門出勿稽留之書成即斬寵及妻頭置囊中便持記馳出城因以詣闕封為不義侯明旦閤門不開官屬踰牆而入見寵屍驚怖其尚書韓立等共立寵子午為王以子后蘭卿為將軍國師韓利斬午首詣征虜將軍祭遵降夷其宗族盧芳字君期安定三水人也居左谷中王莽時天下咸思漢德芳由是詐自稱武帝曾孫劉文伯曾祖母匈奴谷蠡渾邪王之姊為武帝皇后生三子遭江充之亂太子誅皇后坐死中子次卿亡之長陵小子回卿逃於左谷霍將軍立次卿迎回卿回卿不出因居左谷生子孫卿孫卿生文伯常以是言誑惑安定閒王莽末乃與三水屬國羌胡起兵更始至長安徵芳為騎都尉使鎮撫安定以西更始敗三水豪傑共計議以芳劉氏子孫宜承宗廟乃共立芳為上將軍西平王使使與西羌匈奴結和親單于曰匈奴本與漢約為兄弟後匈奴中衰呼韓邪單于歸漢漢為發兵擁護世世稱臣今漢亦中絕劉氏來歸我亦當立之令尊事我乃使句林王將數千騎迎芳芳與兄禽弟程俱入匈奴單于遂立芳為漢帝以程為中郎將將胡騎還入安定初五原人李興隨昱朔方人田颯代郡人石鮪閔堪各起兵自稱將軍建武四年單于遣無樓且渠王入五原塞與李興等和親告興欲令芳還漢地為帝五式李興閔堪引兵至單于庭迎芳與俱入塞都九原縣掠有五原朔方雲中定襄鴈門五郡並置守令與胡通兵侵苦北邊六年芳將軍賈覽將胡騎擊殺代郡太守劉興芳後以事誅其五原太守李興兄弟而其朔方太守田颯雲中太守橋扈恐懼叛芳舉郡降光武令領職如故後大司馬吳漢驃騎大將軍杜茂數擊芳並不剋十二年芳與賈覽共攻雲中久不下其將隨昱留守九原欲脅芳降芳知羽翼外附心膂內離遂棄輜重與十餘騎亡入匈奴其衆盡歸隨昱昱乃隨使者程恂詣闕拜昱為五原太守封鐫胡侯昱弟憲武進侯十六年芳復入居高柳與閔堪兄林使使請降乃立芳為代王堪為代相林為代太傅賜繒二萬匹因使和集匈奴芳上疏謝曰臣芳過託先帝遺體棄在邊陲社稷遭王莽廢絕以是子孫之憂所宜共誅故遂西連羌戎北懷匈奴單于不忘舊德權立救助是時兵革並起往往而在臣非敢有所貪覬期於奉承宗廟興立社稷是以久僭號位十有餘年罪宜萬死陛下聖德高明躬率衆賢海內賓服惠及殊俗以胏附之故赦臣芳罪加以仁恩封為代王使備北藩無以報塞重責冀必欲和輯匈奴不敢遺餘力負恩貸謹奉天子玉璽思望闕庭詔報芳朝明戎縣諢其冬芳入朝南及昌平有詔止令更朝明歲芳自道還憂恐乃復背叛遂反與閔堪閔林相攻連月匈奴遣數百騎迎芳及妻子出塞芳留匈奴中十餘年病死初安定屬國胡與芳為寇及芳敗胡人還鄉里積苦縣官徭役其中有駮馬少伯者素剛壯二十一年遂率種人反叛與匈奴連和屯聚青山乃遣將兵長史陳訢率三千騎擊之少伯乃降徙於冀縣論曰傳稱盛德必百世祀孔子曰寬則得衆夫能得衆心則百世不忘矣觀更始之際劉氏之遺恩餘烈英雄豈能抗之哉然則知高祖孝文之寬仁結於人心深矣周人之思邵公愛其甘棠又況其子孫哉劉氏之再受命蓋以此乎若數子者豈有國之遠圖哉因時擾攘苟恣縱而已耳然猶以附假宗室能掘強歲月之閒觀其智略固無足以憚漢祖發其英靈者也贊曰天地閉革野戰羣龍昌芳僭詐梁齊連鋒寵負強地憲縈深江實惟非律代委神邦
