body:
  text: 後漢書志第二律曆中賈逵論曆永元論曆延光論曆漢安論曆熹平論曆論月食自太初元年始用三統曆施行百有餘年曆稍後天朔先於曆朔或在晦月或朔見考其行日有退無進月有進無退建武八年中太僕朱浮太中大夫許淑等數上書言曆朔不正宜當改更時分度覺差尚微上以天下初定未遑考正至永平五年官曆署七月十六日月食待詔楊岑見時月食多先曆即縮用筭上為日因上言月當十五日食官曆不中詔書令岑普候與官曆課起七月盡十一月弦望凡五官曆皆失岑皆中庚寅詔書令岑署弦望月食官復令待詔張盛景防鮑鄴等以四分法與岑課歲餘盛等所中多岑六事十二年十一月丙子詔書令盛防代岑署弦望月食加時四分之術始頗施行是時盛防等未能分明曆元綜校分度故但用其弦望而已先是九年太史待詔董萌上言曆不正事下三公太常知曆者雜議訖十年四月無能分明據者至元和二年太初失天益遠日月宿度相覺浸多而候者皆知冬至之日日在斗二十一度未至牽牛五度而以為牽牛中星從後天四分日之三晦朔弦望差天一日宿差五度章帝知其謬錯以問史官雖知不合而不能易故召治曆編訢李梵等綜校其狀二月甲寅遂下詔曰朕聞古先聖王先天而天不違後天而奉天時河圖曰赤九會昌十世以光十一以興又曰九名之世帝行德封刻政朕以不德奉承大業夙夜祗畏不敢荒寧予末小子託在於數終曷以續興崇弘祖宗拯濟元元尚書琁璣鈐曰述堯世放唐文帝命驗曰順堯考德顧題期立象且三五步驟優劣殊軌況乎頑陋無以克堪雖欲從之末由也已每見圖書中心恧焉閒者以來政治不得陰陽不和災異不息癘疫之氣流傷於牛農本不播夫庶徵休咎五事之應咸在朕躬信有闕矣將何以補之書曰惟先假王正厥事又曰歲二月東巡狩至岱宗柴望秩于山川遂覲東后叶時月正日祖堯岱宗同律度量考在璣衡以正曆象庶乎有益春秋保乾圖曰三百年斗曆改憲史官用太初鄧平術有餘分一在三百年之域行度轉差浸以謬錯琁璣不正文象不稽冬至之日日在斗二十二一度而曆以為牽牛中星先立春一日則四分數之立春日也以折獄斷大刑於氣已迕用望平和隨時之義蓋亦遠矣今改行四分以遵於堯以順孔聖奉天之文冀百君子越有民同心敬授儻獲咸喜熙以明予祖之遺功於是四分施行而訢梵猶以為元首十一月當先大欲以合耦弦望命有常日而十九歲不得七閏晦朔失實行之未期章帝復發聖思考之經讖使左中郎將賈逵問治曆者衞承李崇太尉屬梁鮪司徒掾嚴勗太子舍人徐震鉅鹿公乘蘇統及訢梵等十人以為月當先小據春秋經書朔不書晦者朔必有明晦不朔必在其月也即先大則一月再朔後月無朔是明不可必梵等以為當先大無文正驗取欲諧耦十六日望月朓昬晦當滅而已又晦與合同時不得異日又上知訢梵穴見勑毋拘曆已班天元始起之月常當小定後年曆數遂正永元中復令史官以九道法候弦望驗無有差跌逵論集狀後之議者用得折衷故詳錄焉逵論曰太初曆冬至日在牽牛初者牽牛中星也古黃帝夏殷周魯冬至日在建星建星即今斗星也太初曆斗二十六度三百八十五分牽牛八度案行事史官注冬夏至日常不及太初曆五度冬至日在斗一二十一度四分度之一石氏星經曰黃道規牽牛初直斗二十度去極二十五度於赤道斗二十一度也四分法與行事候注天度相應尚書考靈曜斗二十二度無餘分冬至在牽牛所起又編訢等據今日所在未至牽牛中星五度於斗二十一度四分一與考靈曜相近即以明事元和二年八月詔書曰石不可離令兩候上得筭多者太史令玄等候元和二年至永元元年五歲中課日行及冬夏至斗一二十一度四分一合古曆建星考靈曜日所起其星閒距度皆如石氏故事他術以為冬至日在牽牛初者自此遂黜也逵論曰以太初曆考漢元盡太初元年日朔食二十三事其十七得朔四得晦二得二日新曆七得朔十四得晦二得三二日以太初曆考太初元年盡更始二年二十四事十得晦以新曆十六得朔七得二日一得晦以太初曆考建武元年盡永元元年二十三事五得朔十八得晦以新曆十七得朔三得晦三得二日又以新曆上考春秋中有日朔者二十四事失不中者二十三事天道參差不齊必有餘餘又有長短不可以等齊治曆者方以七十六歲斷之則餘分稍消長稍得一日故易金火相革之卦象曰君子以治曆明時又曰湯武革命順乎天應乎人言聖人必曆象日月星辰明數不可貫數千萬歲其閒必改更先距求度數取合日月星辰所在而已故求度數取合日月星辰有異世之術太初曆不能下通於今新曆不能上得漢元一家曆法必在三百年之閒故讖文曰三百年斗曆改憲漢興當用太初而不改下至太初元年百二歲乃改故其前有先晦一日合朔下至成哀以二日為朔故合朔多在晦此其明效也逵論曰臣前上傅安等用黃道度日月弦望多近史官一以赤道度之不與日月同於今曆弦望至差一日以上輒奏以為變至以為日却縮退行於黃道自得行度不為變願請太史官日月宿簿及星度課與待詔星象考校奏可臣謹案前對言冬至日去極一百一十五度夏至日去極六十七度春秋分日去極九十一度洪範日月之行則有冬夏五紀論日月循黃道南至牽牛北至東井率日日行一度月行十三度十九分度七也今史官一以赤道為度不與日月行同其斗牽牛東井輿鬼赤道得十五而黃道得十三度半行東壁奎婁軫角亢赤道十七度黃道八度或月行多而日月相去反少謂之日却案黃道值牽牛出赤道南二十五度其直東井輿鬼出赤道北二十五度赤道者為中天去極俱九十度非日月道而以遙準度日月失其實行故也以今太史官候注考元和二年九月已來月行牽牛東井四十九事無行十一度者行婁角三十七事無行十五六度者如安言問典星待詔姚崇井畢等十二人皆曰星圖有規法日月實從黃道官無其器不知施行案甘露二年大司農中丞耿壽昌奏以圖儀度日月行考驗天運狀日月行至牽牛東井日過一度月行十五度至婁角日行一度月行十三度赤道使然此前世所共知也如言黃道有驗合天日無前却弦望不差一日比用赤道密近宜施用上中多臣校案逵論永元四年也至十五年七月甲辰詔書造太史黃道銅儀以角為十三度亢十氐十六房五心五尾十八箕十斗二十四四分度之一牽牛七須女十一虛十危十六營室十八東壁十奎十七婁十二胃十五昴十二畢十六觜三參八東井三十輿鬼四柳十四星七張十七翼十九軫十八凡三百六十五度四分度之一冬至日在斗十九度四分度之一史官以郭部日月行參弦望雖密近而不為注日儀黃道與度轉運難以候是以少循其事逵論曰又今史官推合朔弦望月食加時率多不中在於不知月行疾意永平中詔書令故太史待詔張隆以四分法署弦望月食加時隆言能用易九六七八支爻知月行多少今案隆所署多失臣使隆逆推前手所署不應或異日不中天乃益遠至十餘度梵統以史官候注考校月行當有疾不必在牽牛東井婁角之閒又非所謂朓側匿乃由月所行道有遠近出入所生率一月移故所疾處三度九歲九道一復凡九章百七十一歲復十一月合朔旦冬至合春秋三統九道終數可以知合朔弦望月食加時據官注天度為分率以其術法上考建武以來月食凡三十八事差密近有益宣宜課試上案史官舊有九道術廢而不修熹平中故治曆郎梁國宗整上九道術詔書下太史以參舊術相應部太子舍人馮恂課校恂亦復作九道術增損其分與整術並校差為近太史令颺上以恂術參弦望然而加時猶復先後天遠則十餘度永元十四年待詔太史霍融上言官漏刻率九日增減一刻不與天相應或時差至二刻半不如夏曆密詔書下太常令史官與融以儀校天課度遠近太史令舒承梵等對案官所施漏法令甲第六常符漏品孝宣皇帝三年十二月乙酉下建武十年二月壬午詔書施行漏刻以日長短為數率日南北二度四分而增減一刻一氣俱十五日日去極各有多少今官漏率九日移一刻不隨日進退夏曆漏刻隨日南北為長短密近於官漏分明可施行其年十一月甲寅詔曰告司徒司空漏所以節時分定昬明昬明長短起於日去極遠近日道周圜不可以計率分當據儀度下參晷景今官漏以計率分昬明九日增減一刻違失其實至為疏數以耦法太史待詔霍融上言不與天相應太常史官運儀下水官漏失天者至三刻以晷景為刻少所違失密近有驗今下晷景漏刻四十八箭立成斧官府當用者計吏到班予四十八箭文多故魁取二十四氣日所在并黃道去極晷景漏刻昬明中星刻于下昔太初曆之興也發謀於元封啟定於天元鳳積百三十年是非乃審及用四分亦於建武施於元和訖於永元七十餘年然后儀式備立司候有準天事幽微若此其難也中興以來圖讖漏泄而考靈曜命曆序皆有甲寅元其所起在四分庚申元後百一十四歲朔差却二日學士修之於草澤信向以為得正及太初曆以後大天為疾而修之者云百四十四歲而太歲超一表辰百七十一歲當棄朔餘六十三中餘千一百九十七乃可常行自太初元年至永平十一年百七十一當去分而不去故令益有疏闊此二家常挾其術庶幾施行每有訟者百寮會議羣儒騁思論之有方益於多聞識之故詳錄焉安帝延光二年中謁者亶誦言當用甲寅元河南梁豐言當復用太初尚書郎張衡周興皆能曆數難誦豐或不對或言失誤衡興參案儀注者考往校今以為九道法最密詔書下公卿詳議太尉愷等上侍中施延等議太初過天日一度弦望失正月以晦見西方食不與天相應元和改從四分四分雖密於太初復不正皆不可用甲寅元與天相應合圖讖可施行博士黃廣大行令任僉議如九道河南尹祉太子舍人李泓等四十人議即用甲寅元當除元命苞天地開闢獲麟中百一十四歲推閏月六直其日或朔晦弦望二十四氣宿度不相應者非一用九道為朔月有比三大二小皆疏遠元和變曆以應保乾圖三百歲斗曆改憲之文四分曆本起圖讖最得其正不宜易愷等八十四人議宜從太初尚書令忠上奏諸從太初者皆無他效驗徒以世宗攘夷廓境享國久長為辭或云孝章改四分災異卒甚未有善應臣伏惟聖王興起各異正朔以通三統漢祖受命因秦之紀十月為年首閏常在歲後不稽先代違於帝典太宗遵修三階以平黃龍以至刑犴以錯五是以備哀平之際同承太初而妖孽累仍痾禍非一議者不以成數相參考真求實而汎采妄說歸福太初致咎四分太初曆衆賢所立是非已定永平不審復革其弦望四分有謬不可施行元和鳳鳥不當應曆而翔集遠嘉前造則喪表其休近譏後改則隱其福漏見曲論未可為是臣輒復重難衡興以為五紀論推步行度當時比諸術為近然猶未稽於古及向子歆欲以合春秋橫斷年數損夏益周考之表紀差謬數百兩曆相課六千一百五十六歲而太初多一日冬至日直斗而云在牽牛闊不可復用昭然如此史官所共見非獨衡興前以為九道密近今議者以為有闕及甲寅元復多違失皆未可取正昔仲尼順假馬之名以崇君之義況天之曆數不可任疑從虛以非易是上納其言遂寢改曆事順帝漢安二年尚書侍郎邊韶上言世微於數虧道盛於得常數虧則物衰得常則國昌孝武皇帝攄發聖思因元封七年十一月甲子朔旦冬至乃詔太史令司馬遷治曆鄧平等更建太初改元易朔行夏之正乾鑿度八十一分之四十三為日法設清臺之候驗六異課效觕密太初為最其後劉歆研機極深驗之春秋參以易道以河圖帝覽嬉雒書甄乾曜度推廣九道百七十一歲進退六十三分百四十四歲一超次與天相應少有闕謬從太初至永平十一年百七十一歲進退餘分六十三治曆者不知處之推得十二度弦望不效挾廢術者得竄其說至永元和二年小終之數寖過餘分稍增月不用晦朔而先見孝章皇帝以保乾圖三百年斗曆改憲就用四分以太白復樞甲子為癸亥引天從筭耦之目前更以庚申為元既無明文託之於獲麟之歲又不與感精符單閼之歲同史官相代因成習疑少能鉤深致遠案弦望足以知之詔書下三公百官雜議太史令虞恭治曆宗訢等議建曆之本必先立元元正然後定日法法定然後度周天以定分至三者有則曆可成也四分曆仲紀之元起於孝文皇帝後元三年歲在庚辰上四十五歲歲在乙未則漢興元年也又上二百七十五歲歲在庚申則孔子獲麟二百七十六萬歲尋之上行復得庚申歲歲相承從下尋上其執不誤此四分曆元明文圖讖所著也太初元年歲在丁丑上極其元當在庚戌而曰丙子言百四十四歲超一辰凡九百九十三超歲有空行八十二周有奇乃得丙子案歲所超於天元十一月甲子朔旦冬至日月俱超日行一度積三百六十五度四分度一而周天一帀名曰歲歲從一辰日不得空周天則歲無由超辰案百七十一歲二蔀一章小餘六十三自然之數也夫數出於杪曶以成毫氂亮氂積累以成分寸兩儀既定日月始離初行生分積分成度日行一度一歲而周故為術者各生度法或以九百四十或以八十一法有細觕以生兩科其歸一也日法者日之所行分也日垂令明行有常節日法所該通遠無已損益毫氂差以千里自此言之數無緣得有虧棄之意也今欲飾平之失斷法垂分恐傷大道以步日月行度終數不同四章更不得朔餘一雖言九道去課進退恐不足以補其闕且課曆之法晦朔變弦以月食天驗昭著莫大焉今以去六十三分之法為曆驗章和元年以來日變二十事月食二十八事與四分曆更失定課相除四分尚得多而又便近孝章皇帝曆度審正圖儀晷漏與天相應不可復尚文曜鉤曰高辛受命重黎說文唐堯即位羲和立禪渾夏后制德昆吾列神成周改號萇弘分官運斗樞曰常占有經世史所明洪範五紀論曰民閒亦有黃帝諸曆不如史官記之明也自古及今聖帝明王莫不取言於羲和常占之官定精微於晷儀正衆疑祕藏中書改行四分之原及光武皇帝數下詔書草創其端孝明皇帝課校其實孝章皇帝宣行其法君更三聖年歷數十信而徵之舉而行之其元則上統開闢其數則復古四分宜如甲寅詔書故事奏可靈帝熹平四年五官郎中馮光沛相上計掾陳晃言曆元不正故妖民叛寇益州盜賊相續為害曆當用甲寅為元而用庚申圖緯無以庚申為元者近秦所用代周之元太史治治曆中郭香劉固意造妄說乞與本庚申元經緯有明文受虛欺重誅乙卯詔書下三府與儒林明道者詳議務得道真以羣臣會司徒府議議郎蔡邕議以為曆數精微去聖久遠得失更迭術術無常是漢興以承秦曆用顓頊元用乙卯百有二歲孝武皇帝始改正朔曆用太初元用丁丑行之百八十九歲孝章皇帝改從四分元用庚申今光晃各以庚申為非甲寅為是案曆法黃帝顓頊夏殷周魯凡六家各自有元光晃所據則殷曆元也他元雖不明於圖讖各自一家之術皆當有效於其當時黃武帝始用太初丁丑之元有六家紛錯爭訟是非太史令張壽王挾甲寅元以非漢曆雜候清臺課在下第卒以疏闊連見劾奏太初效驗無所漏失是則雖非圖讖之元而有效於前者也及用四分以來考之行度密於太初是又新元有效於今者也延光元年中謁者亶誦亦非四分庚申上言當用命曆序甲寅元公卿百寮參議正處竟不施行且三光之行速進退不必若一術家以筭追而求之取合於當時而已故有古今之術今術之不能上通於古亦猶古術之不能下通於今也元命苞乾鑿度皆以為開闢至獲麟二百七十六萬歲及命曆序積獲麟至漢起庚子午蔀之二十三歲竟己酉戊子及丁卯蔀六十九歲合為二百七十五歲漢元年歲在乙未上至獲麟則歲在庚申推此以上上極開闢則不元在庚申讖雖無文其數見存而光晃以為開闢至獲麟二百七十五萬九千八百八十六歲獲麟至漢百六十二一歲轉差少一百一十四歲云當滿足則上違乾鑿度元命苞中使獲麟不得在哀公十四年下不及命曆序獲麟至漢相去四蔀年數與奏記譜注不相應者須以弦望晦朔光魄虧滿可得而見者考其符驗而光晃曆以考靈曜為本二十八宿度數及冬至日所在與今史官甘石舊文錯異不可考校以今渾天圖儀檢天文亦不合於考靈曜光晃誠能自依其術更造望儀以追天度遠有驗於圖書近有效於三光可以易奪甘石窮服諸術者實宜用之難問光晃但言圖讖所言不服元和二年二月甲寅制書曰朕聞古先聖王先天而天不違後天而奉天時史官用太初鄧平術冬至之日日在斗二十二一度而曆以為牽牛中星先立春一日則四分數之立春也而以折獄斷大刑於氣已迕用望平和蓋亦遠矣今改行四分以遵於堯以順孔聖奉天之文是始用四分曆庚申元之詔也深引河雒圖讖以為符驗非史官私意獨所興構而光晃以為香固意造妄說違反經文謬之甚者昔堯命羲和曆象日月星辰舜叶時月正日湯武革命治曆明時可謂正矣且猶遇水遭旱戒以蠻夷猾夏寇賊姦宄而光晃以為陰陽不和姦臣盜賊皆元之咎誠非其理元和二年乃用庚申至今九十二歲而光晃言秦所用代周之元不知從秦來漢三易元不常庚申光晃區區信用所學亦妄虛無造欺語之愆至於改朔易元往者壽王之術已課不效亶誦之議不用元和詔書文備義著非羣臣議者所能變易太尉耽司徒隗司空訓以邕議劾光晃不敬正鬼薪法詔書勿治罪太初曆推月食多失四分因太初法以河平癸巳為元施行五年永元元年天以七月後閏食術以八月其十二年正月十二日蒙公乘宗紺上書言今月十六日月當食而曆以二月至期如紺言太史令巡上紺有益官用除待詔甲辰詔書以紺法署施行五十六歲至本初元年天以十二月食曆以後年正月於是始差到熹平三年二十九年之中先曆食者十六事常山長史劉洪上作七曜術甲辰詔屬太史部郎中劉固舍人馮恂等課效復作八元術固等作月食術並已相參固術與七曜術同月食所失皆以歲在己未當食四月恂術以三月官曆以五月太史上課到時施行中者丁巳詔書報可其四年紺孫誠上書言受紺法術當復改今年十二月當食而官曆以後年正月到期如言拜誠為舍人丙申詔書聽行誠法光和二年歲在己未三月五月皆陰太史令修部舍人張恂等推計行度以為三月近四月遠誠以四月奏廢誠術施用恂術其三年誠兄整前後上書言去年三月不食當以四月史官廢誠正術用恂不正術整所上五正屬太史太史主者終不自言三月近四月遠食當以見為正無遠近詔書下太常其詳案注記平議術之要效驗虛實太常就耽上選侍中韓說博士蔡較穀城門候劉洪右郎中陳調於太常府覆校注記平議難問恂誠各對恂術以五千六百四十日月有九百六十一食為法而除成分空加縣法推建武以來俱得三百二十七食其十五食錯案其官素注天見食九十八與兩術相應其錯辟二千一百誠術以百三十五月二十三食為法乘除成月從建康以上減四十一建康以來減三十五以其俱不食恂術改易舊法誠術中復減損論其長短無以相踰各引書緯自證文無義要取追天而已夫日月之術日循黃道月從九道以赤道儀日冬至去極俱一百一十五度其入宿也赤道在斗中十一而黃道在斗十九兩儀相參日月之行曲直有差以生進退故月行井牛十四度以上其在角婁十二度以上皆不應率不行以是言之則術不差不改不驗不用天道精微度數難定術法多端曆紀非一未驗無以知其是未差無以知其失失然後改之是然後用之此謂允執其中今誠術未有差錯之謬恂術未有獨中之異以無驗改未失是以檢將來為是者也誠術百三十五月月二十三食其文在書籍學者所修施行日久官守其業經緯日月厚而未愆信於天文述而不作恂久在候部詳心善意能揆儀度定立術數推前校往亦與見食相應然協曆正紀欽若昊天宜率舊章如甲辰丙申詔書以見食為比今宜施用誠術棄放恂術史官課之後有效驗乃行其法以審術數以順改易耽以說等議奏聞詔書可恂整誠各復上書恂言不當施誠術整言不當復棄恂術為洪議所侵事下永安臺覆實皆不如恂誠等言劾奏謾欺詔書報恂誠各以二月奉贖罪整適作左校二月遂用洪等施行誠術光和二年萬年公乘王漢上月食注自章和元年到今年凡九十三歲合百九十六食與官曆河平元年月錯以己巳為元事下太史令修上言漢所作注不與見食相應者二事以同為異者二十九事尚書召穀城門候劉洪勑曰前郎中馮光司徒掾陳晃各訟曆故議郎蔡邕共補續其志今洪其詣修與漢相參推元謂課分考校月食審己巳元密近有師法洪便從漢受不能對洪上言推元漢己巳元則考靈曜旃蒙之歲乙卯元也與光晃甲寅元相經緯於以追天作曆校三光之步今為疏闊孔子緯一事見二端者明曆興廢隨天為節甲寅曆於孔子時效己巳顓頊秦所施用漢興草創因而不易至元封中迂闊不審更用太初應期三百改憲之節甲寅己巳讖雖有文略其年數是以學人各傳所聞至於課校罔得厥正夫甲寅元天正正月甲子朔旦冬至七曜之起始於牛初乙卯之元人正己巳朔旦立春三光聚天廟五度課兩元端閏餘差自百五十二分二之三朔三百四中節之餘二十九以效信難聚漢不解說但言先人有書而已以漢成注參官施行術不同二十九事不中見食二事案漢習書見己巳元謂朝不聞不知聖人獨有興廢之義史官有附天密術甲寅己巳前已施行效後格而已不用河平疏闊史官已廢之而漢以去事分爭殆非其意雖有師法與無同課又不近密其說蔀數術家所共知無所采取遣漢歸鄉里
