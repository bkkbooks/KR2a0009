body:
  text: 後漢書卷七十六循吏列傳第六十六初光武長於民閒頗達情偽見稼穡艱難百姓病害至天下已定務用安靜解王莽之繁密還漢世之輕法身衣大練色無重綵耳不聽鄭衞之音手不持珠玉之玩宮房無私愛左右無偏恩建武十三年異國有獻名馬者日行千里又進寶劒賈兼百金詔以馬駕鼓車劒賜騎士損上林池之官廢騁望弋獵之事其以手迹賜方國者皆一札十行細書成文勤約之風行于上下數引公卿郎將列于禁坐廣求民瘼觀納風謠故能內外匪懈百姓寬息自臨宰邦邑者競能其官若杜詩守南陽號為杜母任延錫光移變邊俗斯其績用之最章章者也又第五倫宋均之徒亦足有可稱談然建武永平之閒吏事刻深亟以謠言單辭轉易守長故朱浮數上諫書箴切峻政鍾離意等亦規諷殷勤以長者為言而不能得也所以中興之美蓋未盡焉自章和以後其有善績者往往不絕如魯恭吳祐劉寬及潁川四長並以仁信篤誠使人不欺王堂陳寵委任賢良而職事自理斯皆可以感物而行化也邊鳳延篤先後為京兆尹時人以輩前世趙張又王渙任峻之為洛陽令明發姦伏吏端禁止然導德齊禮有所未充亦一時之良能也今綴集殊聞顯迹以為循吏篇云衞颯字子產河內脩武人也家貧好學問隨師無糧常傭以自給王莽時仕郡歷州宰建武二年辟大司徒鄧禹府舉能案劇除侍御史襄城令政有名迹遷桂陽太守郡與交州接境頗染其俗不知禮則颯下車修庠序之教設婚姻之禮朞年閒邦俗從化先是含洭湞陽曲江三縣越之故地武帝平之內屬桂陽民居深山濱溪谷習其風土不出田租去郡遠者或且千里吏事往來輒發民乘船名曰傳役每一吏出傜及數家百姓苦之颯乃鑿山通道五百餘里列亭傳置郵驛於是役省勞息姦吏杜絕流民稍還漸成聚邑使輸租賦同之平民又耒陽縣山出鐵石佗郡民庶常依因聚會私為冶鑄遂招來亡命多致姦盜颯乃上起鐵官罷斥私鑄歲所增入五百餘萬諷理卹民事居官如家其所施政莫不合於物宜視事十年郡內清理二十五年徵還光武欲以為少府會颯被疾不能拜起勑以桂陽太守歸家須後詔書居二歲載病詣闕自陳困篤乃收印綬賜錢十萬後卒于家南陽茨充代颯為桂陽亦善其政教民種殖桑柘麻紵之屬勸令養蠶織屨民得利益焉任延字長孫南陽宛人也年十二為諸生學於長安明詩易春秋顯名太學學中號為任聖童值倉卒避兵之隴西時隗囂已據四郡遣使請延延不應更始元年以延為大司馬屬拜會稽都尉時年十九迎官驚其壯及到靜泊無為唯先遣饋禮祠延陵季子時天下新定道路未通避亂江南者皆未還中土會稽頗稱多士延到皆聘請高行如董子儀嚴子陵等敬待以師友之禮掾吏貧者輒分奉祿以賑給之省諸卒令耕公田以周窮急每時行縣輒使慰勉孝子就餐飯之吳有龍丘萇者隱居太末志不降辱王莽時四輔三公連辟不到掾史白請召之延曰龍丘先生躬德履義有原憲伯夷之節都尉埽洒其門猶懼辱焉召之不可遣功曹奉謁修書記致醫藥吏使相望於道積一歲萇乃乘輦詣府門願得先死備錄延辭讓再三遂署議曹祭酒萇尋病卒延自臨殯不朝三日是以郡中賢士大夫爭往宦焉建武初延上書願乞骸骨歸拜王庭詔徵為九真太守光武引見賜馬雜繒令妻子留洛陽九真俗以射獵為業不知牛耕民常告糴交阯每致困乏延乃令鑄作田器教之墾闢田疇歲歲開廣百姓充給又駱越之民無嫁娶禮法各因淫好無適對匹不識父子之性夫婦之道延乃移書屬縣各使男年二十至五十女年十五至四十皆以年齒相配其貧無禮娉令長吏以下各省奉祿以賑助之同時相娶者二千餘人是歲風雨順節穀稼豐衍其產子者始知種姓咸曰使我有是子者任君也多名子為任於是徼外蠻夷夜郎等慕義保塞延遂止罷偵候戍卒初平帝時漢中錫光為交阯太守教導民夷漸以禮義化聲侔於延王莽末閉境拒守建武初遣使貢獻封鹽水侯領南華風始於二守焉延視事四年徵詣洛陽以病稽留左轉睢陽令九真吏人生為立祠拜武威太守帝親見戒之曰善事上官無失名譽延對曰臣聞忠臣不私私臣不忠履正奉公臣子之節上下雷同非陛下之福善事上官臣不敢奉詔帝歎息曰卿言是也既之武威時將兵長史田紺郡之大姓其子弟賓客為人暴害延收紺繫之父子賓客伏法者五六人紺少子尚乃聚會輕薄數百人自號將軍夜來攻郡延即發兵破之自是威行境內吏民累息郡北當匈奴南接種羌民畏寇抄多廢田業延到選集武略之士千人明其賞罰令將雜種胡騎休屠黃石屯據要害其有警急逆擊追討虜多殘傷遂絕不敢出河西舊少雨澤乃為置水官吏修理溝渠皆蒙其利又造立校官自掾吏史子孫皆令詣學受業復其傜役章句既通悉顯拔榮進之郡遂有儒雅之士後坐誅羌不先上左轉召陵令顯宗即位拜潁川大守永平二年徵會辟雍因以為河內太守視事九年病卒少子愷官至太常王景字仲通樂浪亻六邯人也八世祖仲本琅邪不其人好道術明天文諸呂作亂齊哀王襄謀發兵而數問於仲及濟北王興居反欲委兵師仲仲懼禍及乃浮海東奔樂浪山中因而家焉父閎為郡三老更始敗土人王調殺郡守劉憲自稱大將軍樂浪太守建武六年光武遣太守王遵將兵擊之至遼東閎與郡決曹史楊邑等共殺調迎遵皆封為列侯閎獨讓爵帝奇而徵之道病卒景少學易遂廣闚衆書又好天文術數之事沈深多伎蓺辟司空伏恭府時有薦景能理水者顯宗詔與將作謁者王吳共修作浚儀渠吳用景流法水乃不復為害初平帝時河汴決壞未及得修建武十年陽武令張汜上言河決積久日月侵毀濟渠所漂數十許縣脩理之費其功不難宜改脩堤防以安百姓書奏光武即為發卒方營河功而浚儀令樂俊復上言昔元光之閒人庶熾盛緣隄墾殖而瓠子河決尚二十餘年不即擁塞今居家稀少田地饒廣雖未脩理其患猶可且新被兵革方興役力勞怨既多民不堪命宜須平靜更議其事光武得此遂止後汴渠東侵日月廣而水門故處皆在河中兗豫百姓怨歎以為縣官興佗役不先民急永平十二年議修汴渠乃引見景問以理水形便景陳其利害應對敏給帝善之又以嘗修浚儀功業有成乃賜景山海經河渠書禹貢圖及錢帛衣物夏遂發卒數十萬遣景與王吳脩渠築隄自滎陽東至千乘海口千餘里景乃商度地埶鑿山阜破砥績直溝澗防遏衝要疎決壅積十里立一水門令更相洄注無復潰漏之患景雖簡省役費然猶以百億計明年夏渠成帝親自巡行詔濱河郡國置河堤員吏如西京舊制景由是知名王吳及諸從事掾史皆增秩一等景三遷為侍御史十五年從駕東巡狩至無鹽帝美其功績拜河堤謁者賜車馬縑錢建初七年遷徐州刺史先是杜陵杜篤奏上論都賦欲令車駕遷還長安耆老聞者皆動懷土之心莫不眷然佇立西望景以宮廟已立恐人情疑惑會時有神雀諸瑞乃作金人論頌洛邑之美天人之符文有可採明年遷廬江太守先是百姓不知牛耕致地力有餘而食常不足郡界有楚相孫叔敖所起芍陂稻田景乃驅率吏民修起蕪廢教用犂耕由是墾闢倍多境內豐給遂銘石刻誓令民知常禁又訓令蠶織為作法制皆著于鄉亭廬江傳其文辭卒於官初景以為六經所載皆有卜筮作事舉止質於蓍龜而衆書錯糅吉凶相反乃參紀衆家數術文書冢宅禁忌堪輿日相之屬適於事用者集為大衍玄基云秦彭字伯平扶風茂陵人也自漢興之後世位相承六世祖襲為潁川太守與羣從同時為二千石者五人故三輔號曰萬石秦氏彭同產女弟顯宗時入掖庭為貴人有寵永平七年以彭貴人兄隨四姓小侯擢為開陽城門候十五年拜騎都尉副駙馬都尉耿秉北征匈奴建初元年遷山陽太守以禮訓人不任刑罰崇好儒雅敦明庠序每春秋饗射輒修升降揖讓之儀乃為人設四誡以定六親長幼之禮有遵奉教化者擢為鄉三老常以八月致酒肉以勸勉之吏有過咎罷遣而已不加恥辱百姓懷愛莫有欺犯興起稻田數千頃每於農月親度頃畝分別肥塉差為三品各立文簿藏之鄉縣於是姦吏跼蹐無所容詐彭乃上言宜令天下齊同其制詔書以其所立條式班令三府並下州郡在職六年轉潁川太守仍有鳳皇麒麟嘉禾甘露之瑞集其郡境肅宗巡行再幸潁川輒賞賜錢穀恩寵甚異章和二年卒彭弟惇襃並為射聲校尉王渙字稚子廣漢郪人也父順安定太守渙少好俠尚氣力數通剽輕少年晚而改節敦儒學習尚書讀律令略舉大義為太守陳寵功曹當職割斷不避豪右寵風聲大行入為大司農和帝問曰在郡何以為理寵頓首謝曰臣任功曹王渙以簡賢選能主簿鐔顯拾遺補闕臣奉宣詔書而已帝大悅渙由此顯名州舉茂才除溫令縣多姦猾積為人患渙以方略討擊悉誅之境內清夷商人露宿於道其有放牛者輒云以屬稚子終無侵犯在溫三年遷兗州刺史繩正部郡風威大行後坐考妖言不實論歲餘徵拜侍御史永元十五年從駕南巡還為洛陽令以平正居身得寬猛之宜其冤嫌久訟歷政所不斷法理所難平者莫不曲盡情詐壓塞羣疑又能以譎數發擿姦伏京師稱歎以為渙有神筭元興元年病卒百姓市道莫不咨嗟男女老壯皆相與賦斂致奠醊以千數渙喪西歸道經弘農民庶皆設槃桉於路吏問其故咸言平常持米到洛為卒司所鈔恆亡其半自王君在事不見侵枉故來報恩其政化懷物如此民思其德為立祠安陽亭西每食輒弦歌而薦之永初二年鄧太后詔曰夫忠良之吏國家所以為理也求之甚勤得之至寡故孔子曰才難不其然乎昔大司農朱邑右扶風尹翁歸政迹茂異令名顯聞孝宣皇帝嘉歎愍惜而以黃金百斤策賜其子故洛陽令王渙秉清脩之節蹈羔羊之義盡心奉公務在惠民功業未遂不幸早世百姓追思為之立祠自非忠愛之至孰能若斯者乎今以渙子石為郎中以勸勞勤延熹中桓帝事黃老道悉毀諸房祀唯特詔密縣存故太傅卓茂廟洛陽留王渙祠焉鐔顯後亦知名安帝時豫州刺史時天下飢荒競為盜賊州界收捕且萬餘人顯愍其困窮自陷刑辟輒赦之因自劾奏有詔勿理後位至長樂衛尉自渙卒後連詔三公特選洛陽令皆不稱職永和中以劇令勃海任峻補之峻擢用文武吏皆盡其能糾剔姦盜不得旋踵一歲斷獄不過數十威風猛於渙而文理不及之峻字叔高終於太山太守許荊字少張會稽陽羨人也祖父武太守第五倫舉為孝廉武以二弟晏普未顯欲令成名乃請之曰禮有分異之義家有別居之道於是共割財產以為三分武自取肥田廣宅奴婢強者二弟所得並悉劣少鄉人皆稱弟克讓而鄙武貪婪晏等以此並得選舉武乃會宗親泣曰吾為兄不肖盜聲竊位二弟年長未豫榮祿所以求得分財自取大譏今理產所增三倍於前悉以推二弟一無所留於是郡中翕然遠近稱之位至長樂少府荊少為郡吏兄子世嘗報讎殺人怨者操兵攻之荊聞乃出門逆怨者跪而言曰世前無狀相犯咎皆在荊不能訓導兄既早沒一子為嗣如令死者傷其滅絕願殺身代之怨家扶荊起曰許掾郡中稱賢吾何敢相侵因遂委去荊名譽益著太守黃兢舉孝廉和帝時稍遷桂陽太守郡濱南州風俗脆薄不識學義荊為設喪紀婚姻制度使知禮禁嘗行春到耒陽縣人有蔣均者兄弟爭財互相言訟荊對之歎曰吾荷國重任而教化不行咎在太守乃顧使吏上書陳狀乞詣廷尉均兄弟感悔各求受罪在事十二年父老稱歌以病自上徵拜諫議大夫卒於官桂陽人為立廟樹碑荊孫靈帝時為太尉孟嘗字伯周會稽上虞人也其先三世為郡吏並伏節死難嘗少脩操行仕郡為戶曹史上虞有寡婦至孝養姑姑年老壽終夫女弟先懷嫌忌乃誣婦厭苦供養加鴆其母列訟縣庭郡不加尋察遂結竟其罪嘗先知枉狀備言之於太守太守不為理嘗哀泣外門因謝病去婦竟冤死自是郡中連旱二年禱請無所獲後太守殷丹到官訪問其故嘗詣府具陳寡婦冤誣之事因曰昔東海孝婦感天致旱于公一言甘澤時降宜戮訟者以謝冤魂庶幽枉獲申時雨可期丹從之即刑訟女而祭婦墓天應澍雨穀稼以登嘗後策孝廉舉茂才拜徐令州郡表其能遷合浦太守郡不產穀實而海出珠寶與交阯比境常通商販貿糴糧食先時宰守並多貪穢詭人採求不知紀極珠遂漸徙於交阯郡界於是行旅不至人物無資貧者餓死於道嘗到官革易前敝求民病利曾未踰歲去珠復還百姓皆反其業商貨流通稱為神明以病自上被徵當還吏民攀車請之嘗既不得進乃載鄉民船夜遁去隱處窮澤身自耕傭鄰縣士民慕其德就居止者百餘家桓帝時尚書同郡楊喬上書薦嘗曰臣前後七表言故合浦太守孟嘗而身輕言微終不蒙察區區破心徒然而已嘗安仁弘義耽樂道德清行出俗能幹絕羣前更守宰移風改政去珠復還飢民蒙活且南海多珍財產易積掌握之內價盈兼金而嘗單身謝病躬耕壟次匿景藏采不揚華藻實羽翮之美用非徒腹背之毛也而沈淪草莽好爵莫及廊廟之寶𠫓廾於溝渠且年歲有訖桑榆行盡而忠貞之節永謝聖時臣誠傷心私用流涕夫物以遠至為珍士以稀見為貴槃木朽株為萬乘用者左右為之容耳王者取士宜拔衆之所貴臣以斗筲之姿趨走日月之側思立微節不敢苟私鄉曲竊感禽息亡身進賢嘗竟不見用年七十卒于家第五訪字仲謀京兆長陵人司空倫之族孫也少孤貧常傭耕以養兄嫂有閑暇則以學文仕郡為功曹察孝廉補新都令政平化行三年之閒鄰縣歸之戶口十倍遷張掖太守歲飢粟石數千訪乃開倉賑給以救其敝吏懼譴爭欲上言訪曰若上須報是𠫓廾民也太守樂以一身救百姓遂出穀賦人順帝璽書嘉之由是一郡得全歲餘官民並豐界無姦盜遷南陽太守去官拜護羌校尉邊境服其威信卒於官劉矩字叔方沛國蕭人也叔父光順帝時為司徒矩少有高節以叔父叔遼未得仕進遂絕州郡之命太尉朱寵太傅桓焉嘉其志義故叔遼以此為諸公所辟拜議郎矩乃舉孝廉稍遷雍丘令以禮讓化之其無孝義者皆感悟自革民有爭訟矩常引之於前提耳訓告以為忿恚可忍縣官不可入使歸更尋思訟者感之輒各罷去其有路得遺者皆推尋其主在縣四年以母憂去官後太尉胡廣舉矩賢良方正四遷為尚書令矩性亮直不能諧附貴埶以是失大將軍梁冀意出為常山相以疾去官時冀妻兄孫祉為沛相矩懼為所害不敢還鄉里乃投彭城友人家歲餘冀意少悟乃止補從事中郎復為尚書令遷宗正太常延熹四年代黃瓊為太尉瓊復為司空矩與瓊及司徒种暠同心輔政號為賢相時連有灾異司隸校尉以劾三公尚書朱穆上疏稱矩等良輔及言殷湯高宗不罪臣下之義帝不省竟以蠻夷反叛免後復拜太中大夫靈帝初代周景為太尉矩再為上公所辟召皆名儒宿德不與州郡交通順辭默諫多見省用復以日食免因乞骸骨卒於家劉寵字祖榮東萊牟平人齊悼惠王之後也悼惠王子孝王將閭將閭少子封牟平侯子孫家焉父丕博學號為通儒寵少受父業以明經舉孝廉除東平陵令以仁惠為吏民所愛母疾𠫓廾官去百姓將送塞道車不得進乃輕服遁歸後四遷為豫章太守又三遷拜會稽太守山民愿朴乃有白首不入市井者頗為官吏所擾寵簡除煩苛禁察非法郡中大化徵為將作大匠山陰縣有五六老叟尨眉皓髮自若邪山谷閒出人齎百錢以送寵寵勞之曰父老何自苦對曰山谷鄙生未嘗識郡朝它守時吏發求民閒至夜不絕或狗吠竟夕民不得安自明府下車以來狗不夜吠民不見吏年老遭值聖明今聞當見棄去故自扶奉送寵曰吾政何能及公言邪勤苦父老為人選一大錢受之轉為宗正大鴻臚延熹四年代黃瓊為司空以陰霧愆陽免頃之拜將作大匠復為宗正建寧元年代王暢為司空頻遷司徒太尉二年以日食策免歸鄉里寵前後歷宰二郡累登卿相而准清約省素家無貨積嘗出京師欲息亭舍亭吏止之曰整頓洒埽以待劉公不可得也止寵無言而去時人稱其長者以老病卒于家弟方官至山陽太守方有二子岱字公山繇字正禮兄弟齊名稱董卓入洛陽岱從侍中出為兗州刺史虛己愛物為士人所附初平三年青州黃巾賊入兗州殺任城相鄭遂轉入東平岱擊之戰死興平中繇為楊州牧振威將軍時袁術據淮南繇乃移居曲阿值中國喪亂士友多南奔繇攜接收養與同優劇甚得名稱袁術遣孫策攻破繇因奔豫章病卒仇覽字季智一名香陳留考城人也少為書生淳默鄉里無知者年四十縣召補吏選為蒲亭長勸人生業為制科令至於果菜為限雞豕有數農事既畢乃令子弟羣居還就黌學其剽輕游恣者皆役以田桑嚴設科罰躬助喪事賑恤窮寡朞年稱大化覽初到亭人有陳元者獨與母居而母詣覽告元不孝覽驚曰吾近日過舍廬落整頓耕耘以時此非惡人當是教化未及至耳母守寡養孤苦身投老柰何肆忿於一朝欲致子以不義乎母聞感悔涕泣而去覽乃親到元家與其母子飲因為陳人倫孝行譬以禍福之言元卒成孝子鄉邑為之諺曰父母何在在我庭化我鳲梟哺所生時考城令河內王渙政尚嚴猛聞覽以德化人署為主簿謂覽曰主簿聞陳元之過不罪而化之得無少鷹鸇之志邪覽曰以為鷹鸇不若鸞鳳渙謝遣曰枳棘非鸞鳳所棲百里豈大賢之路今日太學曳長裾飛名譽皆主簿後耳以一月奉為資勉卒景行覽入太學時諸生同郡符融有高名與覽比宇賓客盈室覽常自守不與融言融觀其容止心獨奇之乃謂曰與先生同郡壤隣房牖今京師英雄四集志士交結之秋雖務經學守之何固覽乃正色曰天子脩設太學豈但使人游談其中高揖而去不復與言後融以告郭林宗林宗因與融齎刺就房謁之遂請留宿林宗嗟歎下牀為拜覽學畢歸鄉里州郡並請皆以疾辭雖在宴居必以禮自整妻子有過輒免冠自責妻子庭謝候覽冠乃敢升堂家人莫見喜怒聲色之異後徵方正遇疾而卒三子皆有文史才少子玄最知名童恢字漢宗琅邪姑幕人也父仲玉遭世凶荒傾家賑卹九族鄉里賴全者以百數仲玉早卒恢少仕州郡為吏司徒楊賜聞其執法廉平乃辟之及賜被劾當免掾屬悉投刺去恢獨詣闕爭之及得理掾屬悉歸府恢杖策而逝由是論者歸美復辟公府除不其令吏人有犯違禁法輒隨方曉示若吏稱其職人行善事者皆賜以酒肴之禮以勸勵之耕織種收皆有條章一境清靜牢獄連年無囚比縣流人歸化徙居二萬餘戶民嘗為虎所害乃設檻捕之生獲二虎恢聞而出呪虎曰天生萬物唯人為貴虎狼當食六畜而殘暴於人王法殺人者死傷人則論法汝若是殺人者當垂頭服罪自知非者當號呼稱冤一虎低頭閉目狀如震懼即時殺之其一視恢鳴吼踴躍自奮遂令放釋吏人為之歌頌青州舉尤異遷丹陽太守暴疾而卒弟翊字漢文名高於恢宰府先辟之翊陽喑不肯仕及恢被命乃就孝廉除須昌長化有異政吏人生為立碑聞舉將喪𠫓廾官歸後舉茂才不就卒於家贊曰政畏張急理善亨鮮推忠以及衆瘼自蠲一夫得情千室鳴弦懷我風愛永載遺賢
