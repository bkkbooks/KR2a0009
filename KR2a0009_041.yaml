body:
  text: 後漢書卷三十七桓榮丁鴻列傳第二十七桓榮字春卿沛郡龍亢人也少學長安習歐陽尚書事博士九江朱普貧窶無資常客傭以自給精力不倦十五年不闚家園至王莽篡位乃歸會朱普卒榮奔喪九江負土成墳因留教授徒衆數百人莽敗天下亂榮抱其經書與弟子逃匿山谷雖常飢困而講論不輟後復客授江淮閒建武十九年年六十餘始辟大司徒府時顯宗始立為皇太子選求明經乃擢榮弟子豫章何湯為虎賁中郎將以尚書授太子世祖從容問湯本師為誰湯對曰事沛國桓榮帝即召榮令說尚書甚善之拜為議郎賜錢十萬入使授太子每朝會輒令榮於公卿前敷奏經書帝稱善曰得生幾晚會歐陽博士缺帝欲用榮榮叩頭讓曰臣經術淺薄不如同門生郎中彭閎揚州從事臯弘帝曰俞往女諧因拜榮為博士引閎弘為議郎車駕幸大學會諸博士論難於前榮被服儒衣溫恭有蘊籍辯明經義每以禮讓相猒不以辭長勝人儒者莫之及特加賞賜又詔諸生雅吹擊磬盡日乃罷後榮入會庭中詔賜奇果受者皆懷之榮獨舉手捧之以拜帝笑指之曰此真儒生也以是愈見敬厚常令止宿太子宮積五年榮薦門下生九江胡憲侍講乃聽得出旦一入而已榮嘗寢病太子朝夕遣中傅問病賜以珍羞帷帳奴婢謂曰如有不諱無憂家室也後病愈復入侍講二十八年大會百官詔問誰可傅太子者羣臣承望上意皆言太子舅執金吾原鹿侯陰識可博士張佚正色曰今陛下立太子為陰氏乎為天下乎即為陰氏則陰侯可為天下則固宜用天下之賢才帝稱善曰欲置傅者以輔太子也今博士不難正朕況太子乎即拜佚為太子太傅而以榮為少傅賜以輜車乘馬榮大會諸生陳其車馬印綬曰今日所蒙稽古之力也可不勉哉榮以太子經學成畢上疏謝曰臣幸得侍帷幄執經連年而智學淺短無以補益萬分今皇太子以聰叡之姿通明經義觀覽古今儲君副主莫能專精博學若此者也斯誠國家福祐天下幸甚臣師道已盡皆在太子謹使掾臣汜再拜歸道太子報書曰莊以童蒙學道九載而典訓不明無所曉識夫五經廣大聖言幽遠非天下之至精豈能與於此況以不才敢承誨命昔之先師謝弟子者有矣上則通達經旨分明章句下則去家慕鄉求謝師門今蒙下列不敢有辭願君慎疾加餐重愛玉體三十年拜為太常榮初遭倉卒與族人桓元卿同飢戹而榮講誦不息元卿嗤榮曰但自苦氣力何時復施用乎榮笑不應及為太常元卿歎曰我農家子豈意學之為利乃若是哉顯宗即位尊以師禮甚見親重拜二子為郎榮年踰八十自以衰老數上書乞身輒加賞賜乘輿嘗幸太常府令榮坐東面設几杖會百官驃騎將軍東平王蒼以下及榮門生數百人天子親自執業每言輒曰大師在是既罷悉以太官供具賜太常家其恩禮若此永平二年三雍初成拜榮為五更每大射養老禮畢帝輒引榮及弟子升堂執經自為下說乃封榮為關內侯食邑五千戶榮每疾病帝輒遣使者存問太官太醫相望於道及篤上疏謝恩讓還爵土帝幸其家問起居入街下車擁經而前撫榮垂涕賜以茵帷帳刀劒衣被良久乃去自是諸侯將軍大夫問疾者不敢復乘車到門皆拜牀下榮卒帝親自變服臨喪送葬賜冢塋于首山之陽除兄子二人補四百石都講生八人補二百石其餘門徒多至公卿子郁嗣論曰張佚訐切陰侯以取高位危言犯衆義動明后知其直有餘也若夫一言納賞志士為之懷恥受爵不讓風人所以興歌而佚廷議戚援自居全德意者以廉不足乎昔樂羊食子有功見疑西巴放麑以罪作傅蓋推仁審偽本乎其情君人者能以此察則真邪幾於辨矣郁字仲恩少以父任為郎敦厚篤學傳父業以尚書教授門徒常數百人榮卒郁當襲爵上書讓於兄子汎顯宗不許不得已受封悉以租入與之帝以郁先師子有禮讓甚見親厚常居中論經書問以政事稍遷侍中帝自制五家要說章句令郁校定於宣明殿以侍中監虎賁中郎將永平十五年入授皇太子經遷越騎校尉詔勑太子諸王各奉賀致禮郁數進忠言多見納錄肅宗即位郁以母憂乞身詔聽以侍中行服建初二年遷屯騎校尉和帝即位富於春秋侍中竇憲自以外戚之重欲令少主頗涉經學上疏皇太后曰禮記云天下之命懸於天子天子之善成乎所習習與智長則切而不勤化與心成則中道若性昔成王幼小越在襁保周公在前史佚在後太公在左召公在右中立聽朝四聖維之是以慮無遺計舉無過事孝昭皇帝八歲即位大臣輔政亦選名儒韋賢蔡義夏侯勝等入授於前平成聖德近建初元年張酺魏應召訓亦講禁中臣伏惟皇帝陛下躬天然之姿宜漸教學而獨對左右小臣未聞典義昔五更桓榮親為帝師子郁結髮敦尚繼傳父業故再以校尉入授先帝父子給事禁省更歷四世今白首好禮經行篤備又宗正劉方宗室之表善為詩經先帝所襃宜令郁方並入教授以崇本朝光示大化由是遷長樂少府復入侍講頃之轉為侍中奉車都尉永元四年代丁鴻為太常明年病卒郁經授二帝恩寵甚篤賞賜前後數百千萬顯於當世門人楊震朱寵皆至三公初榮受朱普學章句四十萬言浮辭繁長多過其實及榮入授顯宗減為二十三萬言郁復刪省定成十二萬言由是有桓君大小太常章句子普嗣傳爵至曾孫郁中子焉能世傳其家學孫鸞曾孫彬並知名焉字叔元少以父任為郎明經篤行有名稱永初元年入授安帝三遷為侍中步兵校尉永寧中順帝立為皇太子以焉為太子少傅月餘遷太傅以母憂自乞聽以大夫行喪踰年詔使者賜牛酒奪服即拜光祿大夫遷太常時廢皇太子為濟陰王焉與太僕來歷廷尉張晧諫不能得事已具來歷傳順帝即位拜太傅與太尉朱寵並錄尚書事焉復入授經禁中因讌見建言宜引三公尚書入省事帝從之以焉前廷議守正封陽平侯固讓不受視事三年坐辟召禁錮者為吏免復拜光祿大夫陽嘉二年代來歷為大鴻臚數日遷為太常永和五年代王龔為太尉漢安元年以日食免明年卒於家弟子傳業者數百人黃瓊楊賜最為顯貴焉孫典典字公雅復傳其家業以尚書教授潁川門徒數百人舉孝廉為郎居無幾會國相王吉以罪被誅故人親戚莫敢至者典獨𠫓廾官收斂歸葬服喪三年負土成墳為立祠堂盡禮而去辟司徒袁隗府舉高第拜侍御史是時宦官秉權典執政無所回避常乘驄馬京師畏憚為之語曰行行且止避驄馬御史及黃巾賊起滎陽典奉使督軍賊破還以啎宦官賞不行在御史七年不調後出為郎靈帝崩大將軍何進秉政典與同謀議三遷羽林中郎將獻帝即位三公奏典前與何進謀誅閹官功雖不遂忠義炳著詔拜家一人為郎賜錢二十萬從西入關拜御史中丞賜爵關內侯車駕都許遷光祿勳建安六年卒官鸞字始春焉弟子也少立操行褞袍糟食不求盈餘以世濁州郡多非其人恥不肯仕年四十餘時太守向苗有名迹乃舉鸞孝廉遷為膠東令始到官而苗卒鸞即去職奔喪終三年然後歸淮汝之閒高其義後為巳吾汲二縣令甚有名迹諸公並薦復徵辟拜議郎上陳五事舉賢才審授用黜佞倖省苑囿息役賦書奏御啎內豎故不省以病免中平元年年七十七卒于家子曄曄字文林一名嚴尤修志介姑為司空楊賜夫人初鸞卒姑歸寧赴哀將至止於傳舍整飾從者而後入曄心非之及姑勞問終無所言號哭而已賜遣吏奉祠因縣發取祠具曄拒不受後每至京師未嘗舍宿楊氏其貞忮若此賓客從者皆祗其志行一餐不受於人仕為郡功曹後舉孝廉有道方正茂才三公並辟皆不應初平中天下亂避地會稽遂浮海客交阯越人化其節至閭里不爭訟為凶人所誣遂死于合浦獄彬字彥林焉之兄孫也父麟字元鳳早有才惠桓帝初為議郎入侍講禁中以直道啎左右出為許令病免會母終麟不勝喪未祥而卒年四十一所著碑誄讚說書凡二十一篇彬少與蔡邕齊名初舉孝廉拜尚書郎時中常侍曹節女壻馮方亦為郎彬厲志操與左丞劉歆右丞杜希同好交善未嘗與方共酒食之會方深怨之遂章言彬等為酒黨事下尚書令劉猛猛雅善彬等不舉正其事節大怒劾奏猛以為阿黨請收下詔獄在朝者為之寒心猛意氣自若旬日得出免官禁錮彬遂以廢光和元年卒於家年四十六諸儒莫不傷之所著七說及書凡三篇蔡邕等共論序其志僉以為彬有過人者四夙智早成岐嶷也學優文麗至通也仕不苟祿絕高也辭隆從窊絜操也乃共樹碑而頌焉劉猛琅邪人桓帝時為宗正直道不容自免歸家靈帝即位太傅陳蕃大將軍竇武輔政復徵用之論曰伏氏自東西京相襲為名儒以取爵位中興而桓氏尤盛自榮至典世宗其道父子兄弟代作帝師受其業者皆至卿相顯乎當世孔子曰古之學者為己今之學者為人為人者憑譽以顯物為己者因心以會道桓榮之累世見宗豈其為己乎丁鴻字孝公潁川定陵人也父綝字幼春王莽末守潁陽尉世祖略地潁陽潁陽城守不下綝說其宰遂與俱降世祖大喜厚加賞勞以綝為偏將軍因從征伐綝將兵先度河移檄郡國攻營略地下河南陳留潁川二十一縣建武元年拜河南太守及封功臣帝令各言所樂諸將皆占豐邑美縣唯綝願封本鄉或謂綝曰人皆欲縣子獨求鄉何也綝曰昔孫叔敖勑其子受封必求墝埆之地今綝能薄功微得鄉亭厚矣帝從之封定陵新安鄉侯食邑五千戶後徙封陵陽侯鴻年十三從桓榮受歐陽尚書三年而明章句善論難為都講遂篤志精銳布衣荷擔不遠千里初綝從世祖征伐鴻獨與弟盛居憐盛幼小而共寒苦及綝卒鴻當襲封上書讓國於盛不報既葬乃挂縗絰於冢廬而逃去留書與盛曰鴻貪經書不顧恩義弱而隨師生不供養死不飯唅皇天先祖並不祐助身被大病不任茅土前上疾狀願辭爵仲公章寢不報迫且當襲封謹自放𠫓廾逐求良醫如遂不瘳永歸溝壑鴻初與九江人鮑駿同事桓榮甚相友善及鴻亡封與駿遇於東海陽狂不識駿駿乃止而讓之曰昔伯夷吳札亂世權行故得申其志耳春秋之義不以家事廢王事今子以兄弟私恩而絕父不滅之基可謂智乎鴻感悟垂涕歎息乃還就國開門教授鮑駿亦上書言鴻經學至行顯宗甚賢之永平十年詔徵鴻至即召見說文侯之命篇賜御衣及綬稟食公車與博士同禮頃之拜侍中十三年兼射聲校尉建初四年徙封魯陽鄉侯肅宗詔鴻與廣平王羨及諸儒樓望成封桓郁賈逵等論定五經同異於北宮白虎觀使五官中郎將魏應主承制問難侍中淳于恭奏上帝親稱制臨決鴻以才高論難最明諸儒稱之帝數嗟美焉時人嘆曰殿中無雙丁孝公數受賞賜擢徙校書遂代成封為少府門下由是益盛遠方至者數千人彭城劉愷北海巴茂九江朱倀皆至公卿元和三年徙封馬亭鄉侯和帝即位遷太常永元四年代袁安為司徒是時竇太后臨政憲兄弟各威權鴻因日食上封事曰臣聞日者陽精守實不君之象也月者陰精盈毀有常臣之表也故日食者臣乘君陰陵陽月滿不下驕盈也昔周室衰季皇甫之屬專權於外黨類強盛侵奪主埶則日月薄食故詩曰十月之交朔月辛卯日有食之亦孔之醜春秋日食三十六弒君三十二變不空生各以類應夫威柄不以放下利器不可假人覽觀往古近察漢興傾危之禍靡不由之是以三桓專魯田氏齊六卿分晉諸呂握權統嗣幾移哀平之末廟不血食故雖有周公之親而無其德不得行其埶也謁辭求通待報雖奉符璽受臺勑不敢便去久者至數十日背王室向私門此乃上威損下權盛也人道悖於下效驗見於天雖有隱謀神照其情垂象見戒以告人君閒者月滿先節過望不此臣驕溢背君專功獨行也陛下未深覺悟故天重見戒誠宜畏懼以防其禍詩云敬天之怒不敢戲豫若勑政責躬杜漸防萌則凶妖銷滅害除福湊矣莫不忽於微細以致其大恩不忍誨義不忍割去事之後未然之明鏡也臣愚以為左官外附之臣依託權門傾覆諂諛以求容媚者宜行一切之誅閒者大將軍再出威振州郡莫不賦斂吏人遣使貢獻大將軍雖云不受而物不還主部署之吏無所畏憚縱行非法不伏罪辜故海內貪猾競為姦吏小民吁嗟怨氣滿腹臣聞天不可以不剛不剛則三光不明王不可以不彊不彊則宰牧從橫宜因大變改政匡失以塞天意時大郡口五六十萬舉孝廉二人小郡口二十萬并有蠻夷者亦舉二人帝以為不均下公卿會議鴻與司空劉方上言凡口率之科宜有階品蠻夷錯雜不得為數自今郡國率二十萬口歲舉孝廉一人四十萬二人六十萬三人八十萬四人百萬五人百二十萬六人不滿二十萬二歲一人不滿十萬三歲一人帝從之六年鴻薨賜贈有加常禮子湛嗣湛卒子浮嗣浮卒子夏嗣論曰孔子曰太伯三以天下讓民無得而稱焉孟子曰聞伯夷之風者貪夫廉懦夫有立志若乃太伯以天下而違周伯夷率絜情以去國並未始有其讓也故太伯稱至德伯夷稱賢人後世聞其讓而慕其風徇其名而昧其致所以激詭行生而取與妄矣至夫鄧彪劉愷讓其弟以取義使弟受非服而己厚其名於義不亦薄乎君子立言非苟顯其理將以啟天下之方悟者立行非獨善其身將以訓天下之方動者言行之所開塞可無慎哉原丁鴻之心主於忠愛乎何其終悟而從義也異夫數子類乎徇名者焉贊曰五更待問應若鳴鍾庭列輜駕堂修禮容穆穆帝則擁經以從丁鴻翼翼讓而不飾高論白虎深言日食
