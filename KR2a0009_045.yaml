body:
  text: 後漢書卷四十下班彪列傳第三十下子固主人喟然而歎曰痛乎風俗之移人也子實秦人矝夸館室保界河山信識昭襄而知始皇矣惡睹大漢之云為乎夫大漢之開原也奮布衣以登皇極繇數期而創萬世蓋六籍所不能談前聖靡得而言焉當此之時功有橫而當天討有逆而順人故婁敬度藝而獻其説蕭公權宜以拓其制時豈泰而安之哉計不得以已也吾子曾不是睹顧耀後嗣之末造不亦暗乎今將語子以建武之理永平之事監乎泰太清以變子之或志絶壑無完柩郛罔遺室原野猒人之肉川谷流人之血秦項之災猶不克半書契已來未之或紀也故下民號而上訴上帝懷而降鑒致命于聖皇於是聖皇乃握乾符闡坤珍披皇圖稽帝文赫爾發憤應若興雲霆發昆陽憑怒雷震遂超大河跨北嶽立號高邑建都河洛紹百王之荒屯因造化之蕩滌體元立制繼天而作系唐統接漢緒茂育羣生恢復疆宇動兼乎在昔事勤乎三五豈特方軌並迹紛綸后辟理近古之所務蹈一聖之險易云爾哉且夫建武之元天地革命四海之內更造夫婦有父子君臣初建人倫實始斯乃虙羲氏之所以基皇德也分州土立市朝作舟車造器械斯軒轅氏之所以開帝功也龔行天罰應天順民人斯乃湯武之所以昭王業也遷都改邑有殷宗中興之則焉即土之中有周成隆平之制焉不階尺土一人之柄同符乎高祖克己復禮以奉終始允恭乎孝文憲章稽古封岱勒成儀炳乎世宗案六經而校德妙古昔而論功仁聖之事既該帝王之道備矣廟正豫樂人神之和允洽君臣之序既肅乃動大路遵皇衢省方巡狩窮覽萬國之有無考聲教之所被散皇明以燭幽然後增周舊修洛邑翩翩巍巍顯顯翼翼光漢京于諸夏總八方而為之極是以皇城之內宮室光明闕庭神麗奢不可踰儉不能侈外則因原野以作苑順流泉而為沼發蘋藻以潛魚豐圃草以育獸制同乎梁騶義合乎靈囿若乃順時節而搜狩簡車徒以講武則必臨之以王制考之以風雅歷騶虞覽四驖嘉車攻采吉日禮官正儀乘輿乃出於是發鯨魚鏗華鍾登玉輅乘時龍鳳蓋颯灑和鸞玲瓏天官景從祲威盛容山靈護野屬御方神雨師泛灑風伯清塵千乘雷起萬騎紛紜元戎竟野戈鋋彗雲羽旄掃霓旌旗拂天焱焱炎炎揚光飛文吐爓生風吹野燎山日月為之奪明丘陵為之搖震遂集乎中囿陳師案屯駢部曲列校隊勒三軍誓將帥然後舉烽伐鼓以命三驅輕車霆發驍騎電騖遊基發射范氏施御弦不失禽轡不詭遇飛者未及翔走者未及去指顧倏忽獲車已實樂不極般殺不盡物馬踠餘足士怒未泄先驅復路屬車案節於是薦三犧效五牲禮神祇懷百靈御覲明堂臨辟雍揚緝熙宣皇風登靈臺考休徵俯仰乎乾坤參象乎聖躬目中夏而布德瞰四裔而抗稜西蕩河源東淡海漘北動幽崖南躍朱垠殊方別區界絶而不鄰自孝武所不能征孝宣所不能臣莫不陸讋水栗奔走而來賓遂綏哀牢開永昌春王三朝會同漢京是日也天子受四海之圖籍膺萬國之貢珍內撫諸夏外接百蠻乃盛禮樂供帳置乎雲龍之庭陳百僚而贊羣后究皇儀而展帝容於是庭實千品旨酒萬鍾列金罍班玉觴嘉珍御大牢饗爾乃食舉雍徹太師秦樂陳金石布絲竹鐘鼓鏗鎗管絃曄煜抗五聲極六律歌九功舞八佾韶武備太古畢四夷間奏德廣所及仱兜離罔不具集萬樂備百禮暨皇歡浹羣臣醉降煙熅調元氣然後撞鍾告罷百僚遂退也乃申舊章下明詔命有司班憲度昭節儉示大素去後宮之麗飾損乘輿之服御除工商之淫業興農桑之上務遂令海內𠫓廾末而反本背偽而歸真女修織紝男務耕耘器用陶匏服尚素玄恥纖靡而不服賤奇麗而不珍捐金於山沈珠於淵於是百姓滌瑕蕩穢而鏡至清形神寂漠耳目不營嗜欲之原滅廉正之心生莫不優遊而自得玉潤而金聲是以四海之內學校如林庠序盈門獻酬交錯俎豆莘莘下舞上歌蹈德詠仁登降飫宴之禮既畢因相與嗟歎玄德讜言弘説咸含和而吐氣頌曰盛哉乎斯世清濁究漢德之所由唯子頗識舊典又徒馳騁乎末流溫故知新已難而知德者鮮矣且夫辟界西戎險阻四塞修其防禦孰與處乎土中平夷洞達萬方輻湊秦領九嵕涇渭之川曷若四瀆五嶽帶河泝洛圖書之淵建章甘泉館御列仙孰與靈臺明堂統和天人太液昆明鳥獸之囿曷若辟雍海流道德之富遊俠踰侈犯義侵禮孰與同履法度翼翼濟濟也子徒習秦阿房之造天而不知京洛之有制也識函谷之可關而不知王者之無外也位今將喻子五篇之詩賓既卒業乃稱曰美哉乎此詩義正乎楊雄事實乎相如非唯主人之好學蓋乃遭遇乎斯時也小子狂簡不知所裁既聞正道請終身誦之其詩曰及肅宗雅好文章固愈得幸數入讀書禁中或連日繼夜每行巡狩輒獻上賦頌朝廷有大議使難問公卿辨論於前賞賜恩寵甚渥固自以二世才術位不過郎感東方朔楊雄自論以不遭蘇張范蔡之時作賓戲以自通焉後遷玄武司馬天子會諸儒講論五經作白虎通德論令固撰集其事時北單于遣使貢獻求欲和親詔問羣僚議者或以為胸奴變詐之國無內向之心徒以畏漢威靈逼憚南虜故希望報命以安其離叛今若遣使恐失南虜親附之歡而成北狄猜詐之計不可固議曰竊自惟思漢興已來曠世歷年兵纏夷狄尤事胸奴綏御之方其塗不一或修文以和之或用武以征之或卑下以就之或臣服而致之雖屈申無常所因時異然未有拒絶𠫓廾放不與交接者也故自建武之世復修舊典數出重使前後相繼至於其末始乃暫絶永平八年復議通之而廷爭連日異同紛回多執其難少言其易先帝聖德遠覽瞻前顧後遂復出使事同前世以此而推未有一世闕而不修者也今烏桓就闕稽首譯官康居月氏自遠而至胸奴離析名王來降三方歸服不以兵威此誠國家通於神明自然之徵也臣愚以為宜依故事復遣使者上可繼五鳳甘露至遠人之會下不失建武永平羈縻之義虜使再來然後一往既明中國主在忠信且知聖朝禮義有常豈同可逆詐示猜孤其善意乎絶之未知其利通之不聞其害設後北虜稍強能為風塵方復求為交通將何所及不若因今施惠為策近長固又作典引篇述漢德以為相如封禪靡而不典楊雄美新典而不實蓋自謂得其致焉其辭曰成命人主五德初始同于草昧玄混之中踰繩越契寂寥而亡詔者系不得而綴也厥有氏號紹天闡繹者莫不開元於大昊皇初之首上哉敻乎其書猶可得而修也亞斯之世通變神化函光而未曜胤而禪有虞虞亦命夏后稷契熙載越成湯武股肱既周天乃歸功元首將授漢劉俾其承三季之荒末值亢龍之災孽懸象暗而恆文乖彝倫斁而舊章缺故先命玄聖使綴學立制宏亮洪業表相祖宗贊揚迪哲備哉燦爛真神明之式也雖前聖臯夔衡旦密勿之輔比茲褊矣是以高光二聖辰居其域時至氣動乃龍見淵躍拊翼而未舉則威靈紛紜海內雲蒸雷動電熛胡縊莽分不蒞其誅然後欽若上下恭揖羣后正位度宗有于德不台淵穆之讓靡號師矢敦奮撝之容蓋以膺當天之正統受克讓之歸運蓄炎上之烈精蘊孔佐之弘陳云爾也並開迹於一匱同受侯甸之所服奕世勤民以伯方統牧乘其命賜彤弧黃戚之威用討韋顧黎崇之不格至乎三五華夏京遷鎬亳遂自北面虎離其師革滅天邑是故義士偉而不敦武稱未盡護有慙德不其然與然猶於穆猗那翕純皎繹以崇嚴祖考殷薦宗祀配帝發祥流慶對越天地者舄奕乎千載豈不克自神明哉誕略有常審言行於篇籍光藻朗而不渝耳重光襲四宗之緝熙神靈日燭光被六幽仁風翔乎海表威靈行於鬼區慝亡迥而不泯微胡瑣而不頤故夫顯定三才昭登之績匪堯不興鋪聞遺策在下之訓匪漢不弘厥道至乎經緯乾坤出入三光外運混元內浸豪芒性類循理品物咸亨其已久矣謙兢兢業業貶成抑定不敢論制作至令遷正黜色賓監之事煥揚宇內而禮官儒林屯朋篤論之士而不傳祖宗之仿佛雖云優慎無乃葸歟天經惇睦辨章之化洽巡靖黎蒸懷保魚衆寡之惠浹燔瘞縣沈肅祗羣神之禮備是以鳳皇來儀集羽族於觀魏肉角馴毛宗於外囿擾緇文皓質於郊升黃暉采鱗於沼甘露宵零於豐草三足軒翥於茂樹若乃嘉穀靈草奇獸神禽應圖合諜窮祥極瑞者朝夕坰牧日月邦畿卓犖乎方州羡溢乎要荒昔姬有素雉朱烏玄秬黃之事耳君臣動色左右相趨濟濟翼翼峨峨如也蓋用昭明寅畏承聿懷之福亦以寵靈文武貽燕後昆覆以懿鑠豈其為身而有顓辭也若然受之宜亦勤恁旅力以充厥道啓恭館之金縢御東序之祕寶以流其占也順命以創制定性以和神答三靈之繁祉展放唐之明文茲事體大而允寤寐次于聖心瞻前顧後豈蔑清廟憚勑天乎伊考自邃古乃降戾爰茲作者七十有四人有不俾而假素罔光度而遺章今其如台而獨闕也源肴核仁義之林藪以望元符之臻焉既成羣后之讜辭又悉經五繇之碩慮矣將絣萬嗣煬洪暉奮景炎扇遺風播芳烈久而愈新用而不竭汪汪乎丕天之大律其疇能亘之哉唐哉皇哉皇哉唐哉固後以母喪去官永元初大將軍竇憲出征胸奴以固為中護軍與參議北單于聞漢軍出遣使款居延塞欲修呼韓邪故事朝見天子請大使憲上遣固行中郎將事將數百騎與虜使俱出居延塞迎之會南胸奴掩破北庭固至私渠海聞虜中亂引還及竇憲敗固先坐免官固不教學諸子諸子多不遵法度吏人苦之初洛陽令种兢嘗行固奴干其車騎吏椎呼之奴醉罵兢大怒畏憲不敢發心銜之及竇氏賓客皆逮考兢因此捕繫固遂死獄中時年六十一詔以譴責兢抵主者吏罪固所著典引賓戲應譏詩賦銘誄頌書文記論議六言在者凡四十一篇論曰司馬遷班固父子其言史官載籍之作大義粲然著矣議者咸稱二子有良史之才遷文直而事核固文贍而事詳若固之序事不激詭不抑抗贍而不穢詳而有體使讀之者亹亹而不猒信哉其能成名也彪固譏遷以為是非頗謬於聖人然其論議常排死節否正直而不殺身成仁之為美則輕仁義賤守節愈矣固傷遷博物洽聞不能以智免極刑然亦身陷大戮智及之而不能守之嗚呼古人所以致論於目睫也贊曰二班懷文裁成帝墳比良遷董兼麗卿雲彪識皇命固迷世紛
