body:
  text: 後漢書卷七孝桓帝紀第七孝桓皇帝諱志肅宗曾孫也祖父河閒孝王開父蠡吾侯翼母匽氏翼卒帝襲爵為侯本初元年梁太后徵帝到夏門亭將妻以女弟會質帝崩太后遂與兄大將軍冀定策禁中閏月庚寅使冀持節以王青蓋車迎帝入南宮其日即皇帝位時年十五太后猶臨朝政秋七月乙卯葬孝質皇帝于靜陵齊王喜薨辛巳謁高廟光武廟丙戌詔曰孝廉廉吏皆當典城牧民禁姦舉善興化之本恆必由之詔書連下分明懇惻而在所玩習遂至怠慢選舉乖錯害及元元頃雖頗繩正猶未懲改方今淮夷未殄軍師屢出百姓疲悴困於徵發庶望羣吏惠我勞民蠲滌貪穢以祈休祥其令秩滿百石十歲以上有殊才異行乃得參選臧吏子孫不得察舉杜絶邪僞請託之原令廉白守道者得信其操各明守所司將觀厥後九月戊戌追尊皇祖河閒孝王曰孝穆皇夫人趙氏曰孝穆皇后皇考蠡吾侯曰孝崇皇冬十月甲午尊皇母匽氏為孝崇博園貴人建和元年春正月辛亥朔日有食之詔三公九卿校尉各言得失戊午大赦天下賜吏更勞一歲男子爵人二級為父後及三老孝悌力田人三級魚衆寡孤獨篤貧不能自存者粟人五斛貞婦帛人三匹灾害所傷什四以上勿收田租其不滿者以實除之二月荊揚二州人多餓死遣四府掾分行賑給沛國言黃龍見譙夏四月庚寅京師地震詔大將軍公卿校尉舉賢良方正能直言極諫者各一人又命列侯將大夫御史謁者千石六百石博士議郎郎官各上封事指陳得失又詔大將軍公卿郡國舉至孝篤行之士各一人壬辰詔州郡不得迫脅驅逐長吏長吏臧滿三十萬而不糾舉者刺史二千石以縱避為罪若有擅相假印綬者與殺人同𠫓廾巿論丙午詔郡國繫囚減死罪一等勿笞唯謀反大逆不用此書又詔曰比起陵塋彌歷時歲力役既廣徒隸尤勤頃雨澤不沾密雲復散儻或在茲其令徒作陵者減刑各六月是月立阜陵王代兄勃遒亭侯便為阜陵王郡國六地裂水涌井溢芝草生中黃藏府六月太尉胡廣罷大司農杜喬為太尉秋七月勃海王鴻薨立帝弟蠡吾侯悝為勃海王八月乙未立皇后梁氏九月丁卯京師地震太尉杜喬免冬十月司徒趙戒為太尉司空袁湯為司徒前太尉胡廣為司空十一月濟陰言有五色大鳥見于己氏戊午減天下死罪一等戍邊清河劉文反殺國相射皓欲立清河王蒜為天子事覺伏誅蒜坐貶為尉氏侯徙桂陽自殺前太尉李固杜喬皆下獄死陳留盜賊李堅自稱皇帝伏誅二年春正月甲子皇帝加元服庚午大赦天下賜河閒勃海二王黃金各百斤彭城諸國王各五十斤公主大將軍三公特進侯中二千石二千石將大夫郎吏從官四姓及梁鄧小侯諸夫人以下帛各有差年八十以上賜米酒肉九十以上加帛二匹綿三斤三月戊辰帝從皇太后幸大將軍梁冀府白馬羌寇廣漢屬國殺長吏益州刺史率板楯蠻討破之夏四月丙子封帝弟顧碩為平原王奉孝崇皇祀尊孝崇皇夫人馬氏為孝崇園貴人嘉禾生大司農帑藏五月癸丑北宮掖廷中德陽殿及左掖門火車駕移幸南宮六月改清河為甘陵立安平王得子經侯理為甘陵王秋七月京師大水河東言木連理冬十月長平陳景自號黃帝子署置官屬又南頓管伯亦稱真人並圖舉兵悉伏誅三年春三月甲申彭城王定薨夏四月丁卯晦日有食之五月乙亥詔曰蓋聞天生蒸民不能相理為之立君使司牧之君道得於下則休祥著乎上庶事失其序則咎徵見乎象閒者日食毀缺陽光晦暗朕祗懼潛思匪遑啓處傳不云乎日食修德月食修刑昔孝章帝愍前世禁徙故建初之元並蒙恩澤流徙者使還故郡沒入者免為庶民先皇德政可不務乎其自永建元成揖今歲凡諸妖惡支親從坐及吏民減死徙邊者悉歸本郡唯沒入者不從此令六月庚子詔大將軍三公特進侯其與卿校尉舉賢良方正能直言極諫之士各一人乙卯震憲陵寢屋秋七月庚申廉縣雨肉八月乙丑有星孛于天巿京師大水九月己卯地震庚寅地又震詔死罪以下及亡命者贖各有差郡國五山崩冬十月太尉趙戒免司徒袁湯為太尉大司農河內張歆為司徒十一月甲申詔曰朕攝政失中灾眚連仍三光不明陰陽錯序監寐寤歎疢如疾首今京師廝舍死者相枕郡縣阡陌處處有之甚違周文掩胔之義其有家屬而貧無以葬者給直人三千喪主布三匹若無親屬可於官壖地葬之表識姓名為設祠祭又徒在作部疾病致醫藥死亡厚埋藏民有不能自振及流移者稟穀如科旭檢察務崇恩施以康我民和平元收正月甲子大赦天下改元和平己乙丑詔曰曩者遭家不造先帝早世永惟大宗之重深思嗣續之福詢謀台輔稽之兆占既建明哲克定統業天人協和萬國咸寧元服已加將即委付而四方盜竊頗有未靜故假延臨政以須安謐幸賴股肱禦侮之助殘醜消蕩民和年稔普天率土遐邇洽同遠覽復子明辟之義近慕先姑歸授之法及今令辰皇帝稱制羣公卿士虔恭爾位勠力一意勉同斷金展也大成則所望矣二月扶風妖賊裴優自稱皇帝伏誅甲寅皇太后梁氏崩三月車駕徙幸北宮甲午葬順烈皇后夏五月庚辰尊博園匽貴人曰孝崇皇后秋七月梓潼山崩冬十一月辛巳減天下死罪一等徙邊戍元嘉元年春正月京師疾疫使光祿大夫將醫藥案行癸酉大赦天下改元元嘉二月九江廬江大疫甲午河閒王建薨夏四月己丑安平王得薨京師旱任城梁國飢民相食司徒張歆罷光祿勳吳雄為司徒秋七月武陵蠻叛冬十月司空胡廣罷十一月辛巳京師地震閏月庚午任城王崇薨太常黃瓊為司空二年春正月西城長史王敬為于填國所殺丙辰京師地震夏四月甲寅孝崇皇后匽氏崩庚午常山王豹薨五月辛卯葬孝崇皇后于博陵秋七月庚辰日有食之八月濟陰言黃龍見句陽金城言黃龍見允街冬十月乙亥京師地震十一月司空黃瓊免十二月特進趙戒為司空右北平太守和旻坐臧下獄死永興元年春二月張掖言白鹿見三月丁亥幸鴻池夏五月丙申大赦天下改元永興丁酉濟南王廣薨無子國除秋七月郡國三十二蝗河水溢百姓飢窮流道路至有數十萬戶冀州尤甚詔在所賑給乏絶安慰居業冬十月太尉袁湯免太常胡廣為太尉司徒吳雄罷司空趙戒免以太僕黃瓊為司徒光祿勳房植為司空十一月丁丑詔減天下死罪一等徙邊戍是歲武陵太守應奉招誘叛蠻降之二年春正月甲午大赦天下二月辛丑初聽刺史二千石行三年喪服癸卯京師地震詔公卿校尉舉賢良方正能直言極諫者各一人詔曰比者星辰謬越坤靈震動灾異之降必不空發勑己修政庶望有補其輿服制度有踰侈長飾者皆宜損省郡縣務存儉約申明舊令如永平故事六月彭城泗水增長逆流詔司隸校尉部刺史曰蝗灾為害水變仍至五穀不登人無宿儲其令所傷郡國種蕪菁以助人食京師蝗東海朐山崩九月丁卯朔日有食之詔曰朝政失中雲漢作旱川靈涌水蝗螽孳蔓殘我百穀太陽虧光飢饉荐臻其不被害郡縣當為飢餒者儲天下一家趣不糜爛則為國寶其禁郡國不得賣酒祠祀裁足太尉胡廣免司徒黃瓊為太尉閏月光祿勳尹頌為司徒減天下死罪一等徙邊戍蜀郡李伯詐稱宗室當立為太初皇帝伏誅冬十一月甲辰校獵上林苑遂至函谷關賜所過道傍年九十以上錢各有差太山琅邪賊公孫舉等反叛殺長吏永壽元年春正月戊申大赦天下改元永壽二月司隸冀州飢人相食勑州郡賑給貧弱若王侯吏民有積穀者一切貣十分之三以助稟貸其百姓吏民者以見錢雇直王侯須新租乃償夏四月白烏見齊國六月洛水溢壤鴻德苑南陽大水司空房植免太常韓縯為司空詔太山琅邪遇賊者勿收租賦復更算三年又詔被水死流失尸骸者令郡縣鉤求收葬及所唐突壓溺物故七歲以上賜錢人二千壞敗廬舍亡失穀食尤貧者稟人二斛巴郡益州郡山崩秋七月初置太山琅邪都尉官南胸奴左薁鞬臺耆且渠伯德等叛寇美稷安定屬國都尉張奐討除之二年春正月初聽中官得行三年服二月甲申東海王臻薨三月蜀郡屬國夷叛秋七月鮮卑寇雲中太山賊公孫舉等寇青兗徐三州遣中郎將段熲討破斬之冬十一月置太官右監丞官十二月京師地震三年春正月己未大赦天下夏四月九真蠻夷叛太守兒式討之戰歿遣九真都尉魏朗擊破之復屯據日南閏月庚辰晦日有食之六月初以小黃門為守宮令置從右僕射官京師蝗秋七月河東地裂冬十一月司徒尹嘗屆長沙蠻叛寇益陽司空韓縯為司徒太常北海孫朗為司空延熹元年春三月己酉初置鴻德苑令夏五月己酉大會公卿以下賞賜各有差甲戌晦日有食之京師蝗六月戊寅大赦天下改元延熹丙戌分中山置博陵郡以奉孝崇皇園陵大雩秋七月己巳雲陽地裂甲子太尉黃瓊免太常胡廣為太尉冬十月校獵廣成遂幸上林苑十二月鮮卑寇邊使胸奴中郎將張奐率南單于擊破之二年春二月鮮卑寇鴈門己亥阜陵王便薨蜀郡夷寇蠶陵殺縣令三月復斷刺史二千石行三年喪夏京師雨水六月鮮卑寇遼東秋七月初造顯陽苑置丞丙午皇后梁氏崩乙丑葬懿獻皇后于懿陵大將軍梁冀謀為亂八月丁丑帝御前殿詔司隸校尉張彪將兵圍冀第收大將軍印綬冀與妻皆自殺衛尉梁淑河南尹梁胤屯騎校尉梁讓越騎校尉梁忠長水校尉梁戟等及中外宗親數十人皆伏誅太尉胡廣坐免司徒韓縯司空孫朗下獄壬午立皇后鄧氏追廢懿陵為貴人冢詔曰梁冀姦暴濁亂王室孝質皇帝聰敏早茂冀心懷忌畏私行殺毒永樂太后親尊莫二冀又遏絶禁還京師使朕離母子之愛隔顧復之恩禍害深大罪釁日滋賴宗廟之靈及中常侍單超徐璜具瑗左悺唐衡尚書令尹勳等激憤建策內外協同漏刻之閒桀逆梟夷斯誠社稷之祐臣下之力宜班慶賞以酬忠勳其封超等五人為縣侯勳等七人為亭侯於是舊故恩私多受封爵大司農黃瓊為太尉光祿大夫中山祝恬為司徒大鴻臚梁國盛允為司空初置祕書監官冬十月壬申行幸長安乙酉幸未央宮甲午祠高廟十一月庚子遂有事十一陵壬寅中常侍單超為車騎將軍十二月己巳至自長安賜長安民粟人十斛園陵人五斛行所過縣三斛燒當等八種羌叛寇隴右護羌校尉段熲追擊於羅亭破之天竺國來獻三年春正月丙申大赦天下丙午車騎將軍單超薨閏月燒何羌叛寇張掖護羌校尉段熲追擊於積石大破之白馬令李雲坐直諫下獄死夏四月上郡言甘露降五月甲戌漢中山崩六月辛丑司徒祝恬薨秋七月司空盛允為司徒太常虞放為司空長沙蠻寇郡界九月太山琅邪賊勞丙等復叛寇掠百姓遣御史中丞趙某持節督州郡討之丁亥詔無事之官權絶奉豐年如故冬十一月日南蠻賊率衆詣郡降勒姐羌圍允街段熲擊破之太山賊叔孫無忌攻殺都尉侯章十二月遣中郎將宗資討破之武陵蠻寇江陵車騎將軍馮緄討皆降散荊州刺史度尚討長沙蠻平之四年春正月辛酉南宮嘉德殿火戊子丙署火大疫二月壬辰武庫火司徒盛允免大司農种皓為司徒三月省從右僕射官太尉黃瓊免夏四月太常劉矩為太尉甲寅封河閒王開子博為任城王五月辛酉有星孛于心丁卯原陵長壽門火己卯京師雨雹六月京兆扶風及涼州地震庚子岱山及博尤來山並穨裂己酉大赦天下司空虞放免前太尉黃瓊為司空犍為屬國夷寇鈔百姓益州刺史山昱擊破之零吾羌與先零諸種並叛寇三輔秋七月京師雩減公卿以下奉貣王侯半租占賣關內侯虎賁羽林緹騎營士五大夫錢各有差九月司空黃瓊免大鴻臚劉寵為司空冬十月天竺國來獻南陽黃武與襄城惠得昆陽樂季訞言相署皆伏誅先零沈氐羌與諸種羌寇并涼二州十一月中郎將皇甫規擊破之十二月夫餘王遣使來獻五年春正月省太官右監丞壬午南宮丙署火三月沈氐羌寇張掖酒泉壬午濟北王次薨夏四月長沙賊起寇桂陽蒼梧驚馬逸象突入宮殿乙丑恭陵東闕火戊辰虎賁掖門火己巳太學西門自壞五月康陵園寢火長沙零陵賊起攻桂陽蒼梧南海交址遣御史中丞盛修督州郡討之不克乙亥京師地震詔公卿各上封事甲申中藏府承祿署火秋七月己未南宮承善闥火鳥吾羌寇漢陽隴西金城諸郡兵討破之八月庚子詔減虎賁羽林住寺不任事者半奉勿與冬衣其公卿以下給冬衣之半艾縣賊焚燒長沙郡縣寇益陽殺令又零陵蠻亦叛寇長沙己卯罷琅邪都尉官冬十月武陵蠻叛寇江陵南郡太守李肅坐奔北𠫓廾市辛丑以太常馮緄為車騎將軍討之假公卿以下奉又換王侯租以助軍糧出濯龍中藏錢還之十一月馮緄大破叛蠻於武陵京兆虎牙都尉宗謙坐臧下獄死滇那羌寇武威張掖酒泉太尉劉矩免太常楊秉為太尉六年春二月戊午司徒种皓薨三月戊戌大赦天下衛尉潁川許栩為司徒夏四月辛亥康陵東署火五月鮮卑寇遼東屬國秋七月甲申平陵園寢火桂陽盜賊李研等寇郡界武陵蠻復叛太守陳奉與戰大破降之隴西太守孫羌討滇那羌破之八月車騎將軍馮緄免冬十月丙辰校獵廣成遂幸函谷關上林苑十一月司空劉寵免南海賊寇郡界十二月衛尉周景為司空七年春正月庚寅沛王榮薨三月癸亥隕石于鄠夏四月丙寅梁王成薨五月己丑京師雨雹秋七月辛卯趙王乾薨野王山上有死龍荊州刺史度尚擊零陵桂陽盜賊及蠻夷大破平之冬十月壬寅南巡狩庚申幸章陵祠舊宅遂有事于園廟賜守令以下各有差戊辰幸雲夢臨漢水還幸新野祠湖陽新野公主魯哀王壽張敬侯廟護羌校尉段熲擊當煎羌破之十二月辛丑車駕還宮八年春正月遣中常侍左悺之苦縣祠老子勃海王悝謀反降為癭廮陶王丙申晦日有食之詔公卿校尉舉賢良方正二月己酉南宮嘉德署黃龍見千秋萬歲殿火太僕左稱有罪自殺癸亥皇后鄧氏廢河南尹鄧萬世虎賁中郎將鄧會下獄死護羌校尉段熲擊罕姐羌破之三月辛巳大赦天下夏四月甲寅安陵園寢火丁巳壞郡國諸房祀濟陰東郡濟北河水清五月壬申罷太山都尉官丙戌太尉楊秉薨六月丙辰緱氏地裂桂陽胡蘭朱蓋等復反攻沒郡縣轉寇零陵零陵太守陳球拒之遣中郎將度尚長沙太守抗挾母酸鶠蓋大破斬之蒼梧太守張為賊所執又桂陽太守任胤背敵畏儒皆𠫓廾市閏月甲午南宮長秋和歡殿後鉤楯掖庭朔平署火六月段熲擊當煎羌於湟中大破之秋七月太中大夫陳蕃為太尉八月戊辰初令郡國有田者畝斂稅錢九月丁未京師地震冬十月司空周景免太常劉茂為司空辛巳立貴人竇氏為皇后勃海妖賊蓋登等稱太上皇帝有玉印圭璧鐵券相署置皆伏誅十一月壬子德陽殿西閣黃門北寺火延及廣義神虎門燒殺人使中常侍管霸之苦縣祠老子九年春正月辛亥卯朔日有食之詔公卿校尉郡國舉至孝沛國戴異得黃金印無文字遂與廣陵人龍尚等共祭井作符書稱太上皇伏誅己酉詔曰比歲不登民多飢窮又有水旱疾疫之困盜賊徵發南州尤甚灾異日食譴告纍至政亂在豫仍獲咎徵其令大司農絶今歲調度徵求及前年所調未畢者勿復收責其灾旱盜賊之郡勿收租餘郡悉半入三月癸巳京師有火光轉行人相驚譟司隸豫州飢死者什四五至有滅戶者遣三府掾賑稟之陳留太守韋毅坐臧自殺夏四月濟陰東郡濟北平原河水清司徒許栩免五月太常胡廣為司徒六月南胸奴及烏桓鮮卑寇緣邊九郡秋七月沈氐羌寇武威張掖詔舉武猛三公各二人卿校尉各一人太尉陳蕃免庚午祠黃老於濯龍宮遣使胸奴中郎將張奐擊南胸奴烏桓鮮卑九月光祿勳周景為太尉南陽太守成太原太守劉質並以譖𠫓廾市司空劉茂免大秦國王遣使奉獻冬十二月洛城傍竹柏枯傷光祿勳汝南宣酆為司空南胸奴烏桓率衆詣張奐降司隸校尉李膺等二百餘人受誣為黨人並坐下獄書名王府永康元年春正月先零羌寇三輔中郎將張奐破平之當煎羌寇武威護羌校尉段熲追擊於鸞鳥大破之西羌悉平夫餘王寇玄菟太守公孫域與戰破之夏四月先零羌寇三輔五月丙申京師及上黨地裂廬江賊起寇郡界壬子晦日有食之詔公卿校尉舉賢良方正六月庚申大赦天下悉除黨錮改元永康丙寅阜陵王統薨秋八月魏郡言嘉禾生甘露降巴郡言黃龍見六忖水勃海海溢詔州郡賜溺死者七歲以上錢人二千一家皆被害者悉為收斂其亡失穀食稟人三斛冬十月先零羌寇三輔使胸奴中郎將張奐擊破之十一月西河言白菟見十二月壬申復癭廮陶王悝為勃海王丁丑帝崩于德陽前殿年三十六戊寅尊皇后曰皇太后太后臨朝是歲復博陵河閒二郡比豐沛論曰前史稱桓帝好音樂善琴笙飾芳林而考濯龍之宮設華蓋以祠浮圖老子斯將所謂聽於神乎及誅梁冀奮威怒天下猶企其休息而五邪嗣虐流衍四方自非忠賢力爭屢折姦鋒雖願依斟流彘亦不可得已贊曰桓自宗支越躋天祿政移五幸刑淫三獄傾宮雖積皇身靡續
