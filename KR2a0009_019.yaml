body:
  text: 後漢書卷十七馮岑賈列傳第七馮異字公孫潁川父城人也好讀書通左氏春秋孫子兵法漢兵起異以郡掾監五縣與父城長苗萌共城守為王莽拒漢光武略地潁川攻父城不下屯兵巾車鄉異間出行屬縣為漢兵所執時異從兄孝及同郡丁綝呂晏並從光武因共薦異得召見異曰異一夫之用不足為強弱有老母在城中願歸據五城以效功報德光武曰善異歸謂苗萌曰今諸將皆壯士屈起多暴橫獨有劉將軍所到不虜掠觀其言語舉止非庸人也可以歸身苗萌曰死生同命敬從子計光武南還宛更始諸將攻父城者前後十餘輩異堅守不下及光武為司隸校尉道經父城異等即開門奉牛酒迎光武署異為主簿苗萌為從事異因薦邑子銚期叔壽段建左隆等光武皆以為掾史從至洛陽更始數欲遣光武徇河北諸將皆以為不可是時左丞相曹竟子詡為尚書父子用事異勸光武厚結納之及度河北詡有力焉自伯升之敗光武不敢顯其悲戚每獨居輒不御酒肉枕席有涕泣處異獨叩頭寬譬哀情光武止之曰卿勿妄言異復因間進説曰天下同苦王氏思漢久矣今更始諸將從橫暴虐所至虜掠百姓失望無所依戴今公專命方面施行恩德夫有桀紂之亂乃見湯武之功人久飢渴易為充飽宜急分遣官屬徇行郡縣理冤結布惠澤光武納之至邯鄲遣異與銚期乘傳撫循屬縣録囚徒存魚衆寡亡命自詣者除其罪陰條二千石長吏同心及不附者上之及王郎起光武自薊東南馳晨夜草舍至饒陽無蔞亭時天寒烈衆皆飢疲異上豆粥明旦光武謂諸將曰昨得公孫豆粥飢寒俱解及至南宮遇大風雨光武引車入道傍空舍異抱薪鄧禹熱火光武對竈燎衣異復進麥飯菟肩因復度呼沱河至信都使異別收河間兵還拜偏將軍從破王郎封應侯異為人謙退不伐行與諸將相逢輒引車避道進止皆有表識軍中號為整齊每所止舍諸將並坐論功異常獨屏樹下軍中號曰大樹將軍及破邯鄲乃更部分諸將各有配隸軍士皆言願屬大樹將軍光武以此多之別擊破鐵脛於北平又降胸奴于林闟頓王因從平河北時更始遣舞陰王李軼廩丘王田立大司馬朱鮪白虎公陳僑將兵號三十萬與河南太守武勃共守洛陽光武將北徇燕趙以魏郡河內獨不逢兵而城邑完倉廩實乃拜寇恂為河內太守異為孟津將軍統二郡軍河上與恂合藝以拒朱鮪等異乃遺李軼書曰愚聞明鏡所以照形往事所以知今昔微子去殷而入周項伯畔楚而歸漢周勃迎代王而黜少帝霍光尊孝宣而廢昌邑彼皆畏天知命覩存亡之符見廢興之事故能成功於一時垂業於萬世也笱令長安尚可扶助延期歲月疏不間親遠不踰近季文豈能居一隅哉今長安壞亂赤眉臨郊王侯搆難大臣乖離綱紀已絶四方分崩異姓並起是故蕭王跋涉霜雪經營河北方今英俊雲集百姓風靡雖邠岐憬不足以喻季文誠能覺悟成敗亟定大計論功古人轉禍為福在此時矣如猛將長驅嚴兵圍城雖有悔恨亦無及已初軼與光武首結謀約加相親愛及更始立反共陷伯升雖知長安已危欲降又不自安乃報異書曰軼本與蕭王首謀造漢結死生之約同榮枯之計今軼守洛陽將軍鎮孟津俱據機軸千載一會思成斷金唯深達蕭王願進愚策以佐國安人軼自通書之後不復與異爭鋒故異因此得北攻天井關拔上黨兩城又南下河南成臯已東十三縣及諸屯聚皆平之降者十餘萬武勃將萬餘人攻諸畔者異引軍度河與勃戰於士鄉下大破斬勃獲首五千餘級軼又閉門不救異見其信效具以奏聞光武故宣露軼書令朱鮪知之鮪怒遂使人刺殺軼由是城中乖離多有降者鮪乃遣討難將軍蘇茂將數萬人攻溫鮪自將數萬人攻平陰以綴異異遣校尉護軍將軍將兵與寇恂合擊茂破之異因度河擊鮪鮪走異追至洛陽環城一匝而歸移檄上狀諸將皆入賀并勸光武即帝位光武乃召異詣鄗問四方動靜異曰三王反畔更始敗亡天下無主宗廟之憂在於大王宜從衆議上為社稷下為百姓光武曰我昨夜夢乘赤龍上天覺悟心中動悸異因下席再拜賀曰此天命發於精神心中動悸大王重慎之性也異遂與諸將定議上尊號建武二年春定封異陽夏侯引擊陽翟賊嚴終趙根破之詔異歸家上冢使太中大夫齎牛酒令二百里內太守都尉已下及宗族會焉時赤眉延岑暴亂三輔郡縣大姓各擁兵衆大司徒鄧禹不能定乃遣異代禹討之車駕送至河南賜以乘輿七尺具劒勑異曰三輔遭王莽更始之亂重以赤眉延岑之酷元元塗炭無所依訴今之征伐非必略地屠城要在平定安集之耳諸將非不健鬬然好虜掠卿本能御吏士念自修勑無為郡縣所苦異頓首受命引而西所至皆布威信弘農羣盜稱將軍者十餘輩皆率衆降異異與赤眉遇於華陰相拒六十餘日戰數十合降其將劉始王宣等五千餘人三年春遣使者即拜異為征西大將軍溝禹率車騎將軍鄧弘等引歸與異相遇禹弘要異共攻赤眉異曰異與賊相拒且數十日雖屢獲雄將餘衆尚多可稍以恩信傾誘難卒用兵破也上今使諸將屯黽池要其東而異擊其西一舉取之此萬成計也禹弘不從弘遂大戰移日赤眉陽敗棄輜重走車皆載土以豆覆其上兵士飢爭取之赤眉引還擊弘弘軍潰亂異與禹合兵救之赤眉小卻異以士卒飢倦可且休禹不聽復戰大為所敗死傷者三千餘人禹得脫歸宜陽異棄馬步走上回溪阪與麾下數人歸營復堅壁收其散卒招集諸營保數萬人與賊約期會戰使壯士變服與赤眉同伏於道側旦日赤眉使萬人攻異前部異裁出兵以救之賊見藝弱遂悉衆攻異異乃縱兵大戰日昃賊氣衰伏兵卒起衣服相亂赤眉不復識別衆遂驚潰追擊大破於崤底降男女八萬人餘衆尚十餘萬東走宜陽降璽書勞異曰赤眉破平士吏勞苦始雖垂翅回溪終能奮翼黽池可謂失之東隅收之桑榆方論功賞以答大勳時赤眉雖降衆寇猶盛延岑據藍田王歆據下邽芳丹據新豐蔣震據霸陵張邯據長安公孫守據長陵楊周據谷口呂鮪據陳倉角閎據汧駱蓋延據盩厔任良據鄠汝章據槐里各稱將軍擁兵多者萬餘少者數千人轉相攻擊異且戰且行屯軍上林苑中延岑既破赤眉自稱武安王拜置牧守欲據關中引張邯任良共攻異異擊破之斬首千餘級諸營保守附岑者皆來降歸異岑走攻析異遣復漢將軍鄧曄輔漢將軍于匡要擊岑大破之降其將蘇臣等八千餘人岑遂自武關走南陽時百姓飢餓人相食黃金一斤易豆五升道路斷隔委輸不至軍士悉以果實為糧詔拜南陽趙匡為右扶風將兵助異并送縑穀軍中皆稱萬歲異兵食漸盛乃稍誅擊豪傑不從令者褒賞降附有功勞者悉遣其渠帥詣京師散其衆歸本業威行關中唯呂鮪張邯蔣震遣使降蜀其餘悉平明年公孫述遣將程焉將數萬人就呂鮪出屯陳倉異與趙匡迎擊大破之焉退走漢川異追戰於箕谷復破之還擊破呂鮪營保降者甚衆其後蜀復數遣將間出異輒摧挫之懷來百姓申理枉結出入三歲上林成都異自以久在外不自安上書思慕闕廷願親帷幄帝不許後人有章言異專制關中斬長安令威權至重百姓歸心號為咸陽王帝使以章示異異惶懼上書謝曰臣本諸生遭遇受命之會充備行伍過蒙恩私位大將爵通侯受任方面以立微功皆自國家謀慮愚臣無所能及臣伏自思惟以詔勑戰攻每輒如意時以私心斷決未嘗不有悔國家獨見之明久而益遠乃知性與天道不可得而聞也當兵革始起擾攘之時豪傑競逐迷惑千數臣以遭遇託身聖明在傾危溷殽之中尚不敢過差而況天下平定上尊下卑而臣爵位所蒙巍巍不測乎誠冀以謹勑遂自終始見所示臣章戰栗怖懼伏念明主知臣愚性固敢因緣自陳詔報曰將軍之於國家義為君臣恩猶父子何嫌何疑而有懼意六年春異朝京師引見帝謂公卿曰是我起兵時主簿也為吾披荊棘定關中既罷使中黃門賜以珍寶衣服錢帛詔曰倉卒無蔞亭豆粥呼沱河麥飯厚意久不報異稽首謝曰臣聞管仲謂桓公曰願君無忘射鉤臣無忘檻車齊國賴之臣今亦願國家無忘河北之難小臣不敢忘巾車之恩後數引宴見定議圖蜀留十餘日令異妻子隨異還西夏遣諸將上隴為隗囂所敗乃詔異軍栒邑未及至隗囂乘勝使其將王元行巡將二萬餘人下隴因分遣巡取栒邑異即馳兵欲先據之諸將皆曰虜兵盛而新乘勝不可與爭宜止軍便地徐思方略異曰虜兵臨境忸忕小利遂欲深入若得栒邑三輔動搖是吾憂也夫攻者不足守者有餘今先據城以逸待勞非所以爭也潛往閉城偃旗鼓行巡不知馳赴之異乘其不意卒擊鼓建旗而出巡軍驚亂奔走追搬數十里大破之祭遵亦砟萱齗撠於是北地諸豪長耿定等悉畔隗囂降異上書言狀不敢自伐諸將或欲分其功帝患之乃下璽書曰制詔大司馬虎牙建威漢中忠捕虜武威將軍虜兵猥下三輔驚恐栒邑危亡在於旦夕北地營保按兵觀望今偏城獲全虜兵挫折使耿定之屬復念君臣之義征西功若丘山猶自以為不足孟之反奔而殿亦何異哉今遣太中大夫賜征西吏士死傷者醫藥棺斂大司馬已下親弔死問疾以崇謙讓於是使異進軍義渠并領北地太守事青山胡率萬餘人降異異又擊盧芳將賈覽胸奴薁鞬日逐王破之上郡安定皆降異復領安定太守事九年春祭遵卒詔異守征虜將軍并將其營及隗囂死其將王元周宗等復立囂子純猶總兵據冀公孫述遣將趙匡等救之帝復令異行天水太守事攻匡等且一年皆斬之諸將共攻冀不能拔欲且還休兵異固持不動常為衆軍鋒明年夏與諸將攻落門未拔病發薨于軍諡曰節侯長子彰嗣明年帝思異功復封彰弟欣為析鄉侯十三年更封彰東緡侯食三縣永平中徙封平鄉侯彰卒子普嗣有罪國除永初六年安帝下詔曰夫仁不遺親義不忘勞興滅繼絶善善及子孫古之典也昔我光武受命中興恢弘聖緒橫被四表昭假上下光耀萬世祉祚流衍垂於罔極豫末小子夙夜永思追惟勳烈披圖案籍建武元功二十八將佐命虎臣讖記有徵蓋蕭曹紹封傳繼於今況此未遠而或至乏祀朕甚愍之其條二十八將無嗣絶世若犯罪奪國其子孫應當統後者分別署狀上將及景風章舊德顯茲遺功焉於是紹封普子晨為平鄉侯明年二十八將絶國者皆紹封焉岑彭字君然南陽棘陽人也王莽時守本縣長漢兵起攻拔棘陽彭將家屬奔前隊大夫甄阜阜怒彭不能固守拘彭母妻令效功自補彭將賓客戰鬬甚力及甄阜死彭被創亡歸宛與前隊二嚴説共城守漢兵攻之數月城中糧盡人相食彭乃與説舉城降諸將欲誅之大司徒伯升曰彭郡之大吏執心堅守是其節也今舉大事當表義士不如封之以勸其後更始乃封彭為歸德侯令屬伯升及伯升遇害彭復為大司馬朱鮪校尉從鮪擊王莽楊州牧李聖殺之定淮陽城鮪薦彭為淮陽都尉更始遣立威王張卬與將軍徭偉鎮淮陽偉反擊走卬彭引兵攻偉破之遷潁川太守會舂陵劉茂起兵略下潁川彭不得之官乃與麾下數百人從河內太守邑人韓歆會光武徇河內歆議欲城守彭止不聽既而光武至懷歆迫急迎降光武知其謀大怒收歆置鼓下將斬之召見彭彭因進説曰今赤眉入關更始危殆權臣放縱矯稱詔制道路阻塞四方蜂起羣雄競逐百姓無所歸命竊聞大王平河北開王楚此誠皇天祐漢士人之福也彭幸蒙司徒公所見全濟未有報德旋被禍難永恨於心今復遭遇願出身自效光武深接納之彭因言韓歆南陽大人可以為用乃貰歆以為鄧禹軍師更始大將軍呂植將兵屯淇園彭説降之於是拜彭為刺姦大將軍使督察衆營授以常所持節從平河北光武即位拜彭廷尉歸德侯如故行大將軍事與大司馬吳漢大司空王梁建義大將軍朱祐右將軍萬修執金吾賈復驍騎將軍劉植揚化將軍堅鐔積射將軍侯進偏將軍馮異祭遵王霸等圍洛陽數月朱鮪等堅守不肯下帝以彭嘗為鮪校尉令往説之鮪在城上彭在城下相勞苦歡語如平生彭因曰彭往者得執鞭侍從蒙薦舉拔擢常思有以報恩今赤眉已得長安更始為三王所反皇帝受命平定燕趙盡有幽冀之地百姓歸心賢俊雲集親率大兵來攻洛陽天下之事逝其去矣公雖嬰城固守將何待乎鮪曰大司徒被害時鮪與其謀又諫更始無遣蕭王北伐誠自知罪深彭還具言於帝帝曰夫建大事者不忌小怨鮪今若降官爵可保況誅罰乎河水在此吾不食言彭復往告鮪鮪從城上下索曰必信可乘此上彭趣索欲上鮪見其誠即許降後五日鮪將輕騎詣彭顧敕諸部將曰堅守待我我若不還諸君徑將大兵上轘轅歸郾王乃面縛與彭俱詣河陽帝即解其縛召見之復令彭夜送鮪歸城明旦悉其衆出降拜鮪為平狄將軍封扶溝侯鮪淮陽人後為少府傳封纍代建武二年使彭擊荊州下犨葉等十餘城是時南方尤亂南郡人秦豐據黎丘自稱楚黎王略十有十二縣董欣起堵鄉許邯起杏又更始諸將各擁兵據南陽諸城帝遣吳漢伐之漢軍所過多侵暴時破虜將軍鄧奉謁歸新野怒吳漢掠其鄉里遂返反擊破漢軍獲其輜重屯據淯陽與諸賊合從秋彭破杏降許邯遷征南大將軍復遣朱祐賈復及建威大將軍耿弇漢中忠將軍王常武威將軍郭守越騎將軍劉宏偏將軍劉嘉耿植等與彭并力討鄧奉先擊堵鄉而奉將萬餘人救董欣欣奉皆南陽精兵彭等攻之連月不剋三年夏帝自將南征至葉董欣別將將數千人遮道車騎不可得前彭奔擊大破之帝至堵陽鄧奉夜逃歸淯陽董欣降彭復與耿弇賈復及積弩將軍傅俊騎都尉臧宮等從追鄧奉於小長安帝率諸將親戰大破之奉迫急乃降帝憐奉舊功臣且釁起吳漢欲全宥之彭與耿弇諫曰鄧奉背恩反逆暴師經年致賈復傷痍朱祐見獲陛下既至不知悔善而親在行陳兵敗乃降若不誅奉無以懲惡於是斬之奉者西華侯鄧晨之兄子也車駕引還令彭率傅俊臧宮劉宏等三萬餘人南撀秦豐拔黃郵豐與其大將蔡宏拒彭等於鄧數月不得進帝怪以讓彭彭懼於是夜勒兵馬申令軍中使明旦西擊山都乃緩所獲虜令得逃亡歸以告豐豐即悉其軍西邀彭彭乃潛兵度沔水擊其將張楊於阿頭山大破之從川谷間伐木開道直襲黎丘擊破諸屯兵豐聞大驚馳歸救之彭與諸將依東山為營豐與蔡宏夜攻彭彭豫為之備出兵逆擊之豐敗走追斬蔡宏更封彭為舞陰侯秦豐相趙京薨城降拜為成漢將軍與彭共圍豐於黎丘時田戎擁衆夷陵聞秦豐被圍懼大兵方至欲降而妻兄辛臣諫戎曰今四方豪傑各據郡國洛陽地如掌耳不如按甲以觀其變戎曰以秦王之強猶為征南所圍豈況吾邪降計決矣四年春戎乃留辛臣守夷陵自將兵沿江泝沔止黎丘刻期日當降而辛臣於後盜戎珍寶從間道先降於彭而以書招戎戎疑必賣己遂不敢降而反與秦豐合彭出兵攻戎數月大破之其大將伍公詣彭降戎亡歸夷陵帝幸黎丘勞軍封彭吏士有功者百餘人彭攻秦豐三歲斬首九萬餘級豐餘兵裁千人又城中食且盡帝以豐轉弱令朱祐代彭守之使彭與傅俊南擊田戎大破之遂拔夷陵追至秭歸戎與數十騎亡入蜀盡獲其妻子士衆數萬人彭以將伐蜀漢而夾川穀少水險難漕運留威虜將軍馮駿軍江州都尉田鴻軍夷陵領軍李玄軍夷道自引兵還屯津鄉當荊州要會喻告諸蠻夷降者奏封其君長初彭與交址牧鄧讓厚善與讓書陳國家威德又遣偏將軍屈充移檄江南班行詔命於是讓與江夏太守侯登武陵太守王堂長沙相韓福桂陽太守張隆零陵太守田翕蒼梧太守杜穆交址太守錫光等相率遣使貢獻悉封為列侯或遣子將兵助彭征伐於是江南之珍始流通焉六年冬徵彭詣京師數召宴見厚加賞賜復南還津鄉有詔過家上冢大長秋以朔望問太夫人起居八年彭引兵從車駕破天水與吳漢圍隗囂於西城時公孫述將李育將兵救囂守上邽帝留蓋延耿弇圍之而車駕東歸勑彭書曰兩城若下便可將兵南擊蜀虜人苦不知足既平隴復望蜀每一發兵頭鬚為白彭遂壅谷水灌西城城未沒丈餘囂將行巡周宗將蜀救兵到囂得出還冀漢軍食盡燒輜重引兵下隴延弇亦相隨而退囂出兵尾擊諸營彭殿為後拒故諸將能全師東歸彭還津鄉九年公孫述遣其將任滿田戎程泛將數萬人乘枋箄下江關擊破馮駿及田鴻李玄等遂拔夷道夷陵據荊門虎牙橫江水起浮橋鬬樓立欑柱絶水道結營山上以拒漢兵彭數攻之不利於是裝直進樓船冒突露橈數千艘十一年春彭與吳漢及誅虜將軍劉隆輔威將軍臧宮驍騎將軍劉歆發南陽武陵南郡兵又發桂陽零陵長沙委輸棹卒凡六萬餘人騎五千匹皆會荊門吳漢以三郡棹卒多費糧穀欲罷之彭以蜀兵盛不可遣上書言狀帝報彭曰大司馬習用步騎不曉水戰荊門之事一由征南公為重而已彭乃令軍中募攻浮橋先登者上賞於是偏將軍魯奇應募而前時天風狂急彭奇船逆流而上直浮橋而欑柱鉤不得去奇等乘藝殊死戰因飛炬焚之風怒火盛橋樓崩燒彭復悉軍順風並進所向無前蜀兵大亂溺死者數千人斬任滿生獲程泛而田戎亡保江州彭上劉隆為南郡太守自率臧宮劉歆長驅入江關令軍中無得虜掠所過百姓皆奉牛酒迎勞彭見諸耆老為言大漢哀愍巴蜀久見虜役故興師遠伐以討有罪為人除害讓不受其牛酒百姓皆大喜悅爭開門降詔彭守益州牧所下郡輒行太守事彭到江州以田戎食多難卒拔留馮駿守之自引兵乘利直指墊江攻破平曲收其米數十萬石公孫述使其將延岑呂鮪王元及其弟恢悉兵拒廣漢及資中又遣將侯丹率二萬餘人拒黃石彭乃多張疑兵使護軍楊翕與臧宮拒延岑等自分兵浮江下還江州泝都江而上襲擊侯丹大破之因晨夜倍道兼行二千餘里徑拔武陽使精騎馳廣都去成都數十里藝若風雨所至皆奔散初述聞漢兵在平曲故遣大兵逆之及彭至武陽繞出延岑軍後蜀地震駭述大驚以杖擊地曰是何神也彭所營地名彭亡聞而惡之欲徙會日暮蜀刺客詐為亡奴降夜刺殺彭彭首破荊門長驅武陽持軍整齊秋豪無犯邛穀王任貴聞彭威信數千里遣使迎降會彭已薨帝盡以任貴所獻賜彭妻子諡曰壯侯蜀人憐之為立廟武陽歲時祠焉子遵嗣徙封細陽侯十三年帝思彭功復封遵弟淮為穀陽侯遵永平中為屯騎校尉遵卒子伉嗣伉卒子嵵嗣元初三年坐事失國建光元年安帝復封嵵細陽侯順帝時為光祿勳嵵卒子熙嗣尚安帝妹涅陽長公主少為侍中虎賁中郎將朝廷多稱其能遷魏郡太守招聘隱逸與參政事無為而化視事二年輿人歌之曰我有枳棘岑君伐之我有蟊賊岑君遏之狗吠不驚足下生氂含哺鼓腹焉知凶災我喜我生獨丁斯時美矣岑君於戲休茲熙卒子福嗣為黃門侍郎賈復字君文南陽冠軍人也少好學習尚書事舞陰李生李生奇之謂門人曰賈君之容貌志氣如此而勤於學將相之器也王莽末為縣掾迎鹽河東會遇盜賊等比十餘人皆放散其鹽復獨完以還縣縣中稱其信時下江新市兵起復亦聚衆數百人於羽山自號將軍更始立乃將其衆歸漢中王劉嘉以為校尉復見更始政亂諸將放縱乃説嘉曰臣聞圖堯舜之事而不能至者湯武是也圖湯武之事而不能至者桓文是也圖桓文之事而不能至者六國是也定六國之規欲安守之而不能至者亡六國是也今漢室中興大王以親戚為藩輔天下未定而安守所保所保得無不可保乎嘉曰卿言大非吾任也大司馬劉公在河北必能相施第持我書往復遂辭嘉受書北度河及光武於柏人因鄧禹得召見光武奇之禹亦稱有將帥節於是署復破虜將軍督盜賊復馬羸光武解左驂以賜之官屬以復後來而好陵折等輩調補鄗尉光武曰賈督有折千里之威方任以職勿得擅除光武至信都以復為偏將軍及拔邯鄲遷都護將軍從擊青犢於射犬大戰至日中賊陳堅不卻光武傳召復曰吏士皆飢可且朝飯復曰先破之然後食耳於是被羽先登所向皆靡賊乃敗走諸將咸服其勇又北與五校戰於真定大破之復傷創甚光武大驚曰我所以不令賈復別將者為其輕敵也果然失吾名將聞其婦有孕生女邪我子娶之生男邪我女嫁之不令其憂妻子也復病尋愈追及光武於薊相見甚歡大饗士卒令復居前擊鄴賊破之光武即位拜為執金吾封冠軍侯先度河攻朱鮪於洛陽與白虎公陳僑戰連破降之建武二年益封穰朝陽二縣更始郾王尹尊及諸大將在南方未降者岫帝召諸將議兵事未有言沈吟久之乃以檄叩地曰郾最強宛為次誰當擊之復率然對曰臣請擊郾帝笑曰執金吾擊郾吾復何憂大司馬當擊宛遂遣復與騎都尉陰識驍騎將軍劉植南度五社津擊郾連破之月餘尹尊降盡定其地引東擊更始淮陽太守暴汜汜降屬縣悉定其秋南擊召陵新息平定之明年春遷左將軍別擊赤眉於新城澠池間連破之與帝會宜陽降赤眉復從征伐未嘗喪敗數與諸將潰圍解急身被十二創帝以復敢深入希令遠征而壯其勇節常自從之故復少方面之勳諸將每論功自伐復未嘗有言帝輒曰賈君之功我自知之十三年定封膠東侯食郁秩壯武下密即墨梃胡觀陽凡六縣復知帝欲偃干戈修文德不欲功臣擁衆京師乃與高密侯鄧禹並剽甲兵敦儒學帝深然之遂罷左右將軍復以列侯就第加位特進復為人剛毅方直多大節既還私第闔門養威重朱祐等薦復宜為宰相帝方以吏事責三公故功臣並不用是時列侯唯高密固始膠東三侯與公卿參議國家大事恩遇甚厚三十一年卒諡曰剛侯子忠嗣忠卒子敏嗣建初元年坐誣告母殺人國除肅宗更封復小子邯為膠東侯邯弟宗為即墨侯各一縣邯卒子育嗣育卒子長嗣宗字武孺少有操行多智略初拜郎中稍遷建初中為朔方太守舊內郡徙人在邊者率多貧弱為居人所僕役不得為吏宗擢用其任職者與邊吏參選轉相監司以擲發其姦或以功次補長吏故各願盡死胸奴畏之不敢入塞徵為長水校尉宗兼通儒術每宴見常使與少府丁鴻等論議於前章和二年卒朝廷愍惜焉子參嗣參卒子建嗣元初元年尚和帝女臨潁長公主主兼食潁陰許合三縣數萬戶時鄧太后蟈愈光寵最盛以建為侍中順帝時為光祿勳論曰中興將帥立功名者衆矣唯岑彭馮異建方面之號自函谷以西方城以南兩將之功實為大焉若馮賈之不伐岑公之義信乃足以感三軍而懷敵人故能剋成遠業終全其慶也昔高祖忌柏人之名違之以全福征南惡彭亡之地留之以生災豈幾慮自有明惑將期數使之然乎贊曰陽夏師克實在和德膠東鹽吏征南宛賊奇鋒震敵遠圖謀國
